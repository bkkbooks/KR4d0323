  - {type: variant, offset: 44, length: 16432, content: 名始此宋不常置掌經畫邉鄙軍旅之事政和中熙秦用兵以内侍童貫為之宣和末姚古為京畿輔郡兵馬制置使靖康初种師道為河東道制置使錢葢為陜西五路制置使建炎元年有招捉盜賊制置使自王淵始三年有行在五軍制置使自劉光世始又諸路皆有副使自江浙陳彦文程千秋始六年浙西安撫使康允之帶本路制置使安撫帶制置自此始有沿江都制置使紹興六年有沿海制置使三年有安撫制置使六年始鑄印以某路制置司為名其後盡省惟四川沿海有焉賀桂侍郎如淵再任制帥知榮州作宋史理宗紹定五年四月以寳章直學士桂如淵頃帥蜀日北兵攻城不能合謀死守而遁致軍民罹殃反以㨗聞詔褫職罷祠四川制置司在成都府進直奎文孝經援神契奎星屈曲相鉤似文章之畫東坡答李寳文啓奎文寳訓入直禁嚴借畱井絡河圖曰岷山之地為井絡帝以㑹昌神以建福上為天井郭璞岷山贊岷山之精上絡東井左思蜀都賦岷山之精上為井絡天帝運期而㑹昌景福肹蠁而興作栁文井絡坤垠時惟外區奎井宿名惟益部刺史之寄在漢已嚴漢百官表元封五年初置部刺史掌奉詔條察州秩六百石員十三人地理志武帝開地斥境南置交趾北置朔方之州兼徐梁幽并夏周之制改雍曰凉改梁曰益凡十三部益州刺史部漢中廣漢武都犍為越雋益州牂牁蜀郡凡八郡而瀛洲學士之官至唐尤重唐書禇亮傳秦王以海内浸平乃向儒學開館于宫城西收聘賢才下教以王府屬杜如晦等竝以本官兼文學館學士號十八學士天下向慕得與其選者謂之登瀛洲備兹異數允在真儒見前恭惟某官器博以周材洪而毅文武式萬邦之憲詩文武吉甫萬邦為憲疏王師所以得勝者以有文德武功之臣尹吉甫其才畧可為萬國之法受命逐狄王委任焉故北狄遠去也精神折千里之衝李尋傳本彊則精神折衝本弱則招殃致凶江漢經營早追蹤於羊杜詩江漢湯湯武夫洸洸經營四方告成于王晉羊祐字叔子為都督荆州諸軍事甚得江漢之心後卒襄陽百姓于峴山祐平日游憩之處建碑立廟望其碑者莫不流涕杜預名為墮淚碑預字元凱祐病舉預自代祐卒預都督荆州諸軍事江漢懐德化被萬里衆庶賴之號曰杜父日月獻納旋接武於䕫龍見前帝念岷峨岷山在茂州汶山縣俗謂之鐡豹嶺郡縣志岷山在岷州溢樂縣南一里峨睂大山在嘉州峨睂縣西七里兩山相對望之如峨睂大峨山在峨睂縣南百里中峨山在南二十里小峨山在南三十里為三峨地連闗陜髙帝紀闗中注自函谷闗以西縂名闗中説文𢎞農陜也古虢國四松候對中權足壯於前茅續通典開成元年勅自今以後毎遇入閤日次對官未要隨班出竝於東堦松樹下立待宰相奏事退令齊至香案前各奏本司公事左右史待次對官奏事訖同出文昌雜錄元㣲之詩云松門待詔應全遠藥樹監搜可得知盖有唐宣政殿為正衙殿廷東西有四松松下待制官立班之地舊圖至今猶存餘見前尺箠策勲數節可窺於破竹箠主蘂切説文擊馬也後漢書馬援傳赤睂無穀自當來東吾折箠笞之非諸将憂也韓詩恨無一尺箠為國笞四夷東坡富鄭公神道碑篤生萊公尺箠笞之山谷詩可用折箠笞羌胡杜預傳昔樂毅藉濟西一戰以并强齊今兵威已振譬如破竹數節之後皆迎刃而解互見前爰進真學士之職山谷詩玉堂端要真學士須得儋州秃鬢翁式重大元帥之威河内共借於冦君襜帷暫駐王勃滕王閣序都督閻公之雅望棨㦸遥臨宇文新州之懿範襜帷暫駐闗中既留於蕭相營壘益堅杜詩闗中既留蕭丞相李光弼傳營壘士卒麾幟無所更而光弼一號令之氣色乃益精明互見前光増東壁之圖書晉天文志東壁二星主文章天下圖書之秘府也權重北門之管鑰左傳鄭人使我掌其北門之管韻㑹管鍵也禮記管人注掌管鑰之人月令慎管鑰注管籥摶鍵器也蕭何世家髙祖出征何每居守管籥谷永傳執管籥于外式遄衮繡詩式遄其歸歸耀旂常某乘障雪邊杜詩闗山雪邊看庇身宇下左傳況衛在君之宇下而敢有異志又大國在敝邑之宇下是以告急按大國敝邑四字顛倒宜云敝邑在大國之宇下世説庾太尉少為王睂子所知庾過江歎王曰庇其宇下使人忘寒暑愧涸魚之喁噞喁魚容切説文噞喁魚口上見也淮南子水濁則魚喁司馬相如傳喁喁然師古曰衆口向上也噞疑撿切韓詩諷詠口喁噞亦作噞喁魚口聚貌一曰魚口出水貌庾肩吾詩江潭作噞喁左思吴都賦噞喁沈浮東坡詩寒魚亦不睡竟夕相噞喁隨賀燕以差池淮南子大厦成而燕雀相賀詩燕燕于飛差池其羽注謂舒張其尾翼牽牛而奪之牛誰能囘幕中之辯左傳牽牛以蹊人之田而奪之牛韓文幕中之辯人反以汝為叛御馬而窮其馬度決非門下之心家語帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力儻或愛尺寸之膚更欲貸斗升之水我有二天之飲酒誰敢望其私恩竝見前爾來三月之無鹽更乞參於公議東坡詩老翁七十自腰鎌慙愧春山筍蕨甜豈是聞韶解忘味爾來三月食無鹽其為頌望曷既敷陳賀黄安撫大卿除工部侍郎仍兼安撫制置副使渙册元戎元戎周戎車名此借用詳見前升卿起部晉宋有起部尚書而不常置毎營宗廟宫室則權置之事畢省修車馬備器械夙重小司空之權宋元豐官制尚書工部掌天下城池宮室舟車器械符印錢寳之事凡土木金革之工役皆有程式悦禮樂崇詩書将正大行臺之任劉禹錫詩南荆西蜀大行臺令申重㢲易重㢲以申命驩溢全坤全坤猶云全蜀范謩砌街記市區櫛比衢隧棊布太少二城坤維大都㑹也司馬温公詩政簡坤維静仁深井絡安㢲坤卦名恭惟某官知勇且仁直方而大肝膽鍾一雙之劒韓詩肝膽一古劒精神峻百丈之峯南史王規傳神峯標映千里絶迹百尺無枝梁書朱异傳器宇𢎞深神表峯峻叔度萬頃之陂世莫得而澄撓郭泰別傳泰少游汝南先過袁閬不宿而退遂徃從黄憲累日方還或問林宗林宗曰奉髙之器譬諸汜濫雖清而易挹叔度汪汪君子若千萬頃陂澄之不清淆之不濁不可量也次公重臨之政人轉服其寛明漢書黄覇字次公為潁川太守以外寛内明得吏民心治為天下第一徵守京兆尹貶秩歸潁川治如其前前後八年郡中愈治栁詩重臨事異黄丞相三黜名慙栁士師坐令火井之沈熒左思蜀都賦火井沈熒於幽泉髙爓飛煽於天垂詳見前真覺雪山之増重杜詩公來雪山重敬刑而成三德既平夏辟之三千尚書惟敬五刑以成三德又五刑之屬三千左傳夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也晉刑法志夏后氏之王天下也則五刑之屬三千殷因于夏有所損益書序穆王訓夏贖刑事典以治萬民爰長冬官之六十周禮太宰掌建邦之六典六曰事典以富邦國以任百官以生萬民又冬官其屬六十藉五雉五工之正挽一龜一琴之留竝見前當益州疲敝之秋出師表天下三分益州疲敝須朔方精明之令李光弼傳其代子儀朔方也營壘士卒麾幟無所更而光弼一號令之氣色乃益精明互見前星辰聽履豈但髙法從之班杜詩聽履上星辰揚䧺傳毎上甘泉常法從師古曰法從者言以法當從耳非失禮也一曰從法駕也日月為常行滿載元功之籍釋名九旂日月為常謂畫日月於其端天子所建言常明也漢書功臣表究其本末并序次位盡於孝文以昭元功之籍云某承流支郡見前席芘和門周禮以旌為左右和之門注軍門曰和今謂之壘門立兩旌以為之序和出用次第出和門也疏左傳云師克在和不在衆田獵象戰伐故其門曰和門誰其采白露之葭詩蒹葭蒼蒼白露為霜所謂伊人在水一方顧使轉青天之粟杜詩轉粟上青天不能者止未容叱馭而驅之見前克壯其猷尚倚約軧之率只軧音竒説文長轂之軧也以朱約之詩方叔元老克壯其猷又方叔率止約軧錯衡詩詁曰軧轂之旁出者也言方叔為将既率戎車将率而行乃乗金車以朱纒約其車之軧錯置其文于車之上衡賀聶侍郎子述除制置代董侍郎宋史寧宗嘉定十二年正月召董居誼詣行在以新利州路安撫使聶子述為四川制置使二月金人破洋州董居誼自利州遁四月紅巾賊張福入利州聶子述遁殺楊九鼎五月召子述詣行在躋班禹閣宋紹興十年置敷文閣以藏徽宗御製置學士直學士待制以次列職宅牧蜀都尚書宅乃牧文選夫蜀都者葢肇基於上世開國於中古輟言語侍從之臣盡護諸将西都賦言語侍從之臣司馬相如吾丘壽王東方朔枚臯王襃劉向之屬朝夕論思日月獻納陳平傳拜以為護軍守尉盡護諸将藉文武威風之帥式遏四夷韓文非有文武威風知大體可畏信者則不幸往往有事詩式遏冦虐渙號風行易風行水上渙又渙汗其大號坤垠雷動栁文劒閣銘井絡坤垠時維外區息夫躬傳邊境雷動四野風起恭惟某官氣嘘海岱尚書海岱惟青州胷湛氷霜善刃游肯綮之間全牛立解見前意匠淡經營之表凡馬坐空杜詩詔謂将軍拂絹素意匠慘淡經營中斯須九重真龍出一洗萬古凡馬空惟其日千里而有餘王允傳允字子師世仕州郡為冠蓋同郡郭林宗嘗見允而竒之曰王生一日千里王佐才也史記驥壯盛之時一日千里至其老也駑馬先之是以歲九遷而無慊東觀漢紀車丞相自髙寑郎一月九遷為丞相鸞臺鳳閣積彌縫輔贊之功新唐書百官志光宅元年改中書為鳳閣令為内史垂拱元年改門下省為鸞臺李嶠傳進麟臺少監同鳳閣鸞臺平章事姚崇傳聖厯三年進同鳳閣鸞臺平章事房杜傳贊輔贊彌縫而藏諸用詳見前螭陛雞翹𢎞獻納論思之益見前上矜逺服中遣近臣弄印無以易堯爰峻西清之職司馬相如傳象輿婉僤於西清師古曰西清者西箱清静之處也餘見前披圖指以示禹俾圖北代之功東觀漢紀上至廣阿止城門樓上披輿地圖指示鄧禹曰天下郡國如是我乃始得一處卿言天下不足定何也互見前惟真學士象十二月之班新唐書百官志直學士十二人以象十二月詳見前而大府帥總六十州之重郅都傳郡守畏都如大府師古曰言猶如統屬之也韓文嶺之南其州七十有二其二十二𨽻嶺南節度府其四十餘分四府府各置帥獨嶺南節度為大府玁狁匪茹須方叔之壯猷詩玁狁匪茹整居焦穫注匪非茹度也言玁狁之所侵者非其意所當度皇帝曰嘻命崇文而奉詔韓文皇帝曰噫豈不在我爰命崇文分卒禁禦崇文奉詔進退規矩戰不貪殺擒不濫數不但洗岷峨之愴杜詩珠玉走中原岷峨氣悽愴又将蕩秦隴之妖唐六典隴右道古梁雍二州之境其名山有秦嶺隴坻詩注秦者隴西谷名説文隴天水大坂也栁文西出秦隴南過樊鄧玉壘既安玉壘山在今灌縣西北二十九里湔水所出左思賦包玉壘以為宇郭璞賦玉壘作東别之摽杜詩玉壘浮雲變古今金甌必啓栁氏舊聞𤣥宗命相皆先以御札書其名置案上㑹太子入侍上舉金甌覆之曰此宰相名也汝庸知其誰耶肅宗拜而稱曰非崔琳盧從愿乎上曰然因舉甌以示之詳見前某五年承乏左傳攝官承乏杜詩椎薦非承乏百伎已窮賴公為父老而來亦許託子孫之寄田間索栗看即騰新尹之誇杜詩田翁逼社日邀我嘗新酒酒酣誇新尹畜眼未見有語多雖雜亂説尹終在口髙聲索果栗欲起時被肘門外種瓜便可遂故侯之隱史記邵平故秦東陵侯秦滅後為布衣種𤓰長安城東種𤓰有五色甚美故世謂之東陵瓜也又云青門瓜青門東陵也阮藉詩昔聞東陵𤓰近在青門外連畛距阡陌子母相鉤帶五色曜朝日嘉賔四面㑹賀聶侍郎交割代董侍郎涓選剛辰禮記外事以剛日正義曰外事郊外之事也剛日竒日也十日有五竒五偶甲丙戊庚壬五竒為剛日東坡手澤云古今㳙吉外事用剛日内事用柔日如甲子為剛乙丑為柔至為簡易甲午治兵壬午大閲吉日庚午既差我馬皆外事也故用剛日丁丑蒸乙亥嘗凡祭之日用丁酉辛卯内事也故用柔日然社稷用甲郊以日至亦不拘也恢張制閫説文恢大也謂志大也詩孔修且張傳大也正義曰物之小者張之使大千二百里之邊面威令風行六十餘郡之人心驩呼雷動並見前恭惟某官秀姿玉峙烱識氷明杜詩烱如一段清氷出萬壑置在迎風寒露之玉壺鞭霆駕風既出漢廷臣之右見前捫參厯井肯為蜀父老而來司馬相如傳乃著書籍蜀父老為辭行宣暢於皇靈郭璞賦禮羣望告皇靈即蕩摇於戎索索法也左傳疆以戎索疆以周索謂之戎法周法疆理其土地也又索虜魏書宋齊謂魏為索虜謂晉宋為島夷佛貍之死卯有數何待來年宋書臧質傳拓跋燾率大衆數十萬向彭城以質為輔國将軍北救質軍奔散投盱眙燾築長圍攻之與質書質答之曰爾自恃四脚屢犯國疆諸如此事不可具説王𤣥謨退于東梁坦散于西爾不聞童謡言耶虜馬飲江水佛貍死卯年此期未至以二軍開飲江之徑爾冥期使然非復人事寡人受命相滅期之白登師行未逺爾自送死豈容復令生全饗有桑乾哉是時虜中童謡曰軺車北來如穿雉不意虜馬飲江水虜主北歸石濟死虜欲渡江天不徙故質答引拓跋燾魏太武名佛貍其小字也太武正平真君十二年歲在辛卯明年春二月為宗愛所弑南史臧質傳質報太武書云假令寡人不能殺爾爾由我而死爾若有幸得為亂兵所殺爾若不幸則生相鎖縛載以一驢負送都市爾識智及衆豈能勝苻堅耶頃年展爾陸梁者是爾未飲江太歲未卯故耳晉公之雄甲成功應在今日晉公謂裴度雄甲見前氣色一新於壁壘勲勞滿載於旂常某聳聞建牙竝見前遂可納履説苑田子方曰夫士貧賤者言不用行不合則納履而去耳詳見前催飛將而追驕敵正虞或累於指麾李廣傳號曰漢飛将軍魏志呂布傳布便弓馬膂力過人號為飛将嚴武詩昨夜秋風入漢闗朔雲邉雪滿西山更催飛将追驕敵莫遣沙塲匹馬還躍歸鞭而飛賀書猶冀亟諧於邂逅賀聶制置子述庭揚成渙閫制全坤渙坤卦名壁府奎圖莫重東頭之學士晉天文志東壁二星主文章天下圖書之秘府也明則圖書集道術行孝經援神契奎星屈曲相鉤似文章之畫唐天文志注奎主文章蒼頡效象畫字新唐書熊望者字原師性險躁以辯説游公卿間出入劉栖楚門下為刺取事機敬宗喜為歌詩議置東頭學士以備燕狎栖楚薦望未及用帝崩夢溪筆談云東西頭供奉官本唐從官之名自永徽以後人主多居大明宫别置從官謂之東頭供奉官西門具員不廢謂之西頭供奉官參旗井鉞况專西道之行營隋志參旗一曰天旗一曰天弓主司弓弩之張候變禦難文獻通考參旗九星在參西五車之間天旗也明而希則邊冦不動不然反是晉輿服志參旗分景帝車含曜史記天官書東井為水事其西曲星曰鉞晉天文志列鉞一星附井之前王伺奢淫而斬之故不欲其明大與井齊或摇動則用鉞於大臣蘇易簡擬大言賦參旗井鉞嚴武備也魏志賈逵傳此西道之要職林唐宣宗大中五年以白敏中充招討党項行營都統制等使制使之名始此壁奎參井宿名邉鄙膽寒士民心愜恭惟某官天資𢎞毅風采浚明霍灮傳天下想聞其風采精神五兵六丁莫疑其鋭韓詩腸胃繞萬象精神驅五兵後漢書梁節王暢傳從官卞忌自言能使六丁注六丁謂六甲中丁神也若甲子旬中則丁卯為神甲寅旬中則丁巳為神之類也役使之法先齋戒然後其神至可使致逺方物及知吉凶也老君六甲符圖云丁卯神司馬卿丁丑神趙子任丁亥神張文通丁酉神臧文公丁未神石叔通丁已神崔石卿肝膽一劔百壬爭避其鋒韓詩肝膽一古劒波濤兩浮萍山谷詩朝聞不及夕百壬避其鋒策勳自馴雉而來魯恭傳恭為中牟令郡國螟傷稼犬牙緣界不入中牟河南尹袁安疑其不實使仁恕掾肥親徃亷之恭隨行阡陌俱坐桑下有雉過止其旁旁有童兒親曰兒何不捕之兒言雉方将雛親瞿然而起與恭訣曰所以來者欲察君之政迹耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳還府具以狀白安取官有驅羊之易杜牧之詩願爾出門去取官如驅羊山谷詩南山豹霧出文章云取公卿易驅羊今之從政容有位隆而道汚禮記道隆則從而隆道汚則從而汚公所過人正惟功大而心小杜詩成王功大心轉小郭相謀深古來少兹煩雍橐司馬遷傳薄從上上雍雍於用切郊祀志自古以雍州積髙神明之隩故立畤郊上帝趙充國傳持橐簮筆張晏曰橐契囊也近臣負橐簪筆從備顧問或有所紀也師古曰橐所以盛書也來牧蜀都許以金城之便宜趙充國傳至金城圖上方畧又條不出兵留屯田便宜十二事盡護玉闗之疆場宋程大昌北邊備對漢之兩闗皆在燉煌郡壽昌縣通典曰漢龍勒縣也玉門在縣北陽闗在玉門之南故曰陽一縣而兩設闗者自此而趨西域有南北道故也場音亦邊境也左傳疆場之事又疆埸無主三分籌策小試渭濵耕戰之謀杜詩三分割據紆籌策萬古雲霄一羽毛蜀志武矦據武功五丈原與司馬宣王對於渭南毎患糧不繼使已志不伸是以分兵屯田為久駐之基耕者雜於渭濵居民之間而百姓安堵軍無私焉百二山河行復闗中帝王之業髙帝紀田肯曰秦形勝之國也帶河阻山縣隔千里持㦸百萬秦得百二焉應劭曰言河山之險與諸侯相縣隔絶千里也所以能禽諸侯者得天下之利百二也功名留於久逺蔡君謨詩世間萬事俱塵土留取功名久逺看富貴乃其緒餘某夙稟公知何辭吏役受敢不敬早夜之祝愧乏寸長韓文祝曰使先生無圖利於大夫而私便其身圖先生起拜祝辭曰敢不敬蚤夜以求從祝規讀忍著主衣裳之詩義難再適陳後山詩主家十二樓一身當三千古來妾命薄事主不盡年起舞為主壽相送南陽阡忍著主衣裳為人作春姸况妻病不離於牀簀説文簀牀棧也爾雅簀謂之笫左傳牀笫之言不踰閾笫壯士切而男寒久澀於詩書韓詩男寒澀詩書妻瘦剰腰襻固知公爾以忘私賈誼傳為人臣者主耳忘身國耳忘家公耳忘私然亦愛之而莫助榆枋尺鷃但願適逍遙之遊莊子我決起而飛槍榆枋又斥鷃笑之逍遙遊莊子篇名郭象云夫小大雖殊而放於自得之塲則物任其性事稱其能各當其分逍遥一也豈容勝負于其間哉渤海雙鳧亦不計多少之數揚雄傳譬若江湖之雀勃解之鳥乗鴈集不為之多雙鳧飛不為之少妻病以下語意與上不倫疑有舛錯賀丁制置交割紫殿陞班建碧幢而制閫成帝紀永始四年行幸甘泉郊泰畤神灮降集紫殿西京雜記成帝設雲帳雲幄雲幕於甘泉紫殿世謂三雲殿白樂天詩碧油幢引向東川歐陽詹詩十萬兵驅擁碧油綠綈趣駕滌紅籕以開藩外戚傳中黄門田容持詔記盛綠綈方底封御史中丞印師古曰綈厚繒也綠其色也方底盈書囊形若今之算幐耳紅籕謂印文新唐書百官志節度使判宰相觀察使判節度使團練使判觀察使三日洗印視其刓缺四履重臨見前萬井改觀刑法志提封萬井履臨井觀四卦名恭惟某官材𢎞以毅德直而方所學一本於孔周韓詩所學皆周孔有言皆合於稷契一堂偃月勢炙手以絶倫杜詩炙手可熱勢絶倫慎莫近前丞相嗔餘見前四海倚氷公掉頭而不住天寳遺事或勸陜部進士張彖謁楊國忠曰見之富貴可立圖彖曰君輩倚楊右相為泰山吾以為氷山耳若皎日既出君輩得無失所恃乎杜詩巢父掉頭不肯住東将入海隨烟霧詩巻長留天地間釣竿欲拂珊瑚樹四國于蕃之已久詩四國于蕃四方于宣注四國有難則往捍禦之為之藩屏九卿當相以何疑顧自桂林桂山在臨桂縣東山海經云八桂成柱張衡詩我所思兮在桂臨杜詩五嶺皆炎熱宜人獨桂林韓詩蒼蒼森八桂兹地在湘南又英英桂林伯白樂天詩桂林無瘴氣柏署有清風復尋卭竹卭崍山在臨卭縣南山海經云山出卭竹史記西南夷傳張騫使大夏來言居大夏時見蜀布卭竹杖韋昭曰卭縣之竹屬蜀瓚曰卭山名此竹節髙實中可作杖蜀紀張騫奉使尋河源得髙節竹植於卭山堪為杖清獻之琴再鼔當阜民財舜弹五絃琴造南風之歌云南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮清獻先知益州再知成都故云再鼔乖崖之劍重磨足新軍律言行錄張忠定公去蜀留一巻實封文字與僧希白云候十年觀此後十年公薨于陳訃至希白為公設大㑹齋請知府凌䇿發所留文字乃公畫像自為贊云乖則違俗崖則絶物乖崖之名聊以表德因號乖崖公公性剛毅因決一吏彼枝辭不伏公曰這的莫要喫劍彼云決不得喫劍則得公牽出斬之以徇軍吏􅌓眙相顧自是俱服公之威信令出必行鶴林玉露云乖崖為崇陽令一吏自庫中出盜一錢命杖之吏勃然曰爾能杖我不能斬我也乖崖援筆判云一日一錢千日一千䋲鋸木㫁水滴石穿自仗劍下堦斬之申臺府自劾葢自五代以來軍卒凌将帥胥吏凌長官餘風至此未除乖崖此舉非為一錢其意深矣按公與趙清獻公皆再臨蜀丁帥亦然故云中權有資於後勁外攘全賴於内修暫分治於四封即盡護於諸将竝見前先聲誕播和氣交騰雪嶺之白界天公來則重杜詩雪嶺界天白又公來雪山重詳見前騎火之紅照夜王曰遄歸韓詩西來騎火照山紅餘見前某乗傳無堪代庖非據崇詩書閲禮樂忻逢元帥之鼎來封府庫籍吏民敬待将軍而解去竝見前解鼎卦名通董制置居誼十乗啓行既孤剡牘詩元戎十乗以先啓行三年過隙又玷招羅魏豹傳人生一世間如白駒過隙師古曰言其速疾也白駒謂日景也隙壁隙也曾微曉暢之才出師表将軍向寵性行淑均曉暢軍事可答頻煩之顧費褘傳以奉使稱㫖頻煩至吴杜詩三顧頻煩天下訃兩朝開濟老臣心疾驅行李往役前茅伏念某學餒而材蕪氣凋而力腐俱見前少年妄意頗懐竹帛之功名鄧禹傳垂功名於竹帛詳見前半世拙謀未了布韋之事業尚書予亦拙謀强為禄仕直坐饑驅陶詩饑來驅我去諸公貴人間欲出其門下昌黎栁子厚墓誌諸公要人爭欲令出我門下交口薦譽之古來此物自當棄之道旁山谷詩古來和鼎實此物升廟廊終然不可口擲置官道旁獨銜國士之知積愧丈人之厚杜詩甚愧丈人厚詳見前因同邑而薦嚴助自古有之朱買臣傳㑹邑子嚴助貴幸薦買臣今云云未詳未下車而辟慈明此恩異甚晉東海王越與江應元書昔王子師為豫州未下車辟荀慈明下車辟孔文舉詳見前窮人命薄中道憂歸勞心慱慱鑽火頓驚於三蟄慱音團從心專聲爾雅憂也詩庶見素冠兮棘人欒欒兮勞心慱慱兮達官衮衮刺天難附於羣飛昌黎祭栁子厚文子之視人自以無前一斥不復羣飛刺天止或尼之㑹且歸矣詩㑹且歸矣無庶予子憎駭置郵之有命仍尊選以見招山谷別友賦曩聞義于孫李指尊選以見招惜予行之舒舒曰其夜以為期惟兩喜多溢美之言見前故再鼔囘愈淡之聽韓詩再鼔味愈淡奏函朝徹俞㫖夕頒俞音余爾雅然也疏然應也尚書帝曰俞孔傳然也然其所舉荀文若之不進不休今寜愧古荀勗傳帝嘗謂曰魏武帝言荀文若之進善不進不止荀公達之退惡不退不休二令君之美亦望于君也閔仲叔之且喜且懼寵實若驚後漢書太原閔仲叔者世稱節士建武中應司徒侯覇之辟既至覇不及政事徒勞苦而已仲叔恨曰始蒙嘉命且喜且懼今見明公喜懼皆去以仲叔為不足問耶不當辟也辟而不問是失人也遂辭出投劾而去老子寵辱若驚何謂寵辱辱為下得之若驚失之若驚是謂寵辱若驚兹葢伏遇某官以社稷臣為詩書帥留泰階台符之步撫坤垠井絡之民竝見前去來闗雪山之重輕見前出入係蜀道之難易尚書故事李白嘗為蜀道難云云刺嚴武也後陸暢復為蜀道易曰蜀道易易于履平地佞韋臯也初暢受知于臯乃為蜀道易獻之臯大喜贈羅八百匹公鎮踰嵗月共期裴相之來歸杜詩斯人亦何幸公鎮踰嵗月注公謂僕射裴冀公晃也言裴公為尹尚有嵗月之期此斯人之幸也此可見杜公初來成都非為嚴氏也小隊出郊埛復喜嚴公之再駐少陵嚴中丞見過詩元戎小隊出郊埛詳見前羣彦固多於集幕杜詩入幕羣彦集匹夫猶恥於納溝龜放長江使認重來之路呂氏家塾記趙清獻公初任成都攜一龜一鶴以來其再往也屛去龜鶴止一蒼頭執事張公裕學士送以詩云馬諳舊路行來滑龜放長河不共來燕尋故壘復窺新捲之簾見前豈但顯不遺故舊之仁亦足占雜進巧拙之量韓文登明選公雜進巧拙某敢不循其頂踵銘在肺肝謹無負有志斯世之将仍每守圖利大夫之戒見前忽騎将軍馬難希處士之壯懷韓詩長把種樹書自云避世士忽騎将軍馬自號報恩子風雲入壯懷泉石別幽耳互見前真釣錦江魚敢學拾遺之懶性杜詩奉引濫騎大宛馬幽栖真釣錦江魚又小來習性懶晚嵗慵轉劇又拾遺曽奏數行書懶性從來水竹居通制帥安大資丙代董制帥作筆橐贅員濫竊郡符之寵見前鞾刀執禮行依制閫之尊韓文嶺之南其州七十其二十二𨽻嶺南節度府其四十餘分四府府各置帥然獨嶺南節度為大府大府帥或道過其府府帥必戎服左握刀右屬弓矢帕首袴鞾迎郊䖍若小矦之事大國有大事諮而後行杜詩情依節制尊瞻中權後勁之威見前脩小侯事大之敬見上文輒裁柔牘仰溷髙牙恭惟某官直大以方清和而任凜然忠貫於日月見前巍乎義薄於雲天杜詩故人有孫宰髙義薄層雲左袒以呼作熊羆不二之士髙后紀為劉氏左袒軍皆左袒師古曰袒脱衣袖而肉袒也左右者偏脱其一耳尚書則亦有熊羆之士不二心之臣右顧而跽收麒麟第一之功韓文韓𢎞墓誌銘河流兩壖盜連為羣雄唱雌和首尾一身公居其間為帝督姦察其嚬呻與其睨眴左顧失視右顧而跽蔡先鄆鉏三年而墟蘇武傳上思股肱之美廼圖畫其人於麒麟閣皇咨耆定之勳耆音指詩勝殷遏劉耆定爾功册命保釐之寄周禮内史凡命諸矦及孤卿大夫則䇿命之注謂以簡策書王命尚書御王冊命又王命作冊又王命周公後作冊詩受言藏之箋云言者謂冊命也又王謂尹氏命程伯休父箋云王使大夫尹氏冊命休父盡護諸将外撫四夷見前料天驕之必亡匈奴傳匈奴天之驕子李詩彎弓辭漢月挿羽破天驕諒風寒之宜護三國志注猶人雖有八尺之軀靡不受患其護風寒亦數處耳王吉傳冬則為風寒之所匽薄曾極詩慿誰數處護風寒詳見前蕭何全闗中以鎮撫西顧何憂見前周公有天下之勳勞東歸孔邇禮記成王以周公為有勳勞于天下是以封周公于曲阜注王功曰勳事功有勞佇由節斧經秉鈞樞立非常之功待非常之人剩光竹帛司馬相如傳世必有非常之人然後有非常之事有非常之事然後有非常之功建無窮之基有無窮之聞滿載旂常見前某承學無竒董仲舒傳今陛下幸加意留聽于承學之臣師古曰言轉承師説而學之盖謙辭也立朝何補二螭載筆初無紀述之長五雉貳卿非有論思之益誤蒙一札竝見前假守三刀王濬傳夜夢懸三刀於梁上須臾又益一刀主簿李毅賀曰三刀為州字又益一者明府其臨益州乎詳見前不辭捫厯之艱李詩捫參厯井仰脅息但切震凌之懼法言震風凌雨然後知夏屋之為帡幪也欲且宣於上意司馬相如傳且因宣其使指令百姓皆知天子意正有託於下風左傳臣敢在下風鄒陽傳竊髙下風之行望太白横岷峨惟切髙山之仰止李詩西當太白有鳥道可以横絶峨睂巔東坡詩西望太白横岷峨詩髙山仰止景行行止詣大府受約束更希隂雨而膏之韓文袁於南昌為屬邑私喜幸自語以為當得躬詣大府受約束於下執事詩芃芃黍苗隂雨膏之左傳小國之仰大國也如百穀之仰膏雨焉代囘成都黄待制疇若輟賢禁甬甬尹竦切通作埇漢書甬道韓詩龍施垂天衞雲韶凝禁甬作鎮少城駱賔王詩彭山折坂外井絡少城隈容齋續筆晉益州刺史治太城蜀郡太守治少城猶言大城小城耳詳見前周家地官方賴小司徒之貳周官地官小司徒中大夫二人益州天府遽勤大元帥之行蜀志益州險塞沃野千里天府之土髙帝因之以成帝業隋盧思道詩西蜀稱天府由來擅沃饒雲浮玉壘夕日映錦城朝戾止髙牙見前屹然方面後漢書馬融傳方面重寄注當四方之一面岑彭傳論中興将帥立功名者衆矣惟岑彭馮異建方面之號馮異傳位大将爵通侯受任方面又專命方面龎參傳以一臣之身折方面之難者選用得也梁書劉坦傳贊方面之功坦為多矣魏書劉尼傳曽祖政為方面大人唐書衞伯玉傳伯玉有幹略可方面大事田布傳諸子皆有方面功倪若水傳時天下久平人皆重内任雖自冗官擢方面皆謂下遷恭惟某官靖恭而肅括膚敏而疏通生寳劔之故墟地靈人傑疇若豐城人故云王勃滕王閣序物華天寶龍光射牛斗之墟人傑地靈徐孺下陳蕃之榻接金蕐之宗派玉潔日光神仙傳皇初平年十五家使牧羊有道士見其良謹将至金蕐山石室中遂得道山谷詩牧羊金蕐山早通玉皇籍至今風低草􅋾􅋾見白石金蕐風煙下亦有君履迹何為紅塵裏頷髪欲雪白楊升菴云山谷答俞清老寒夜三詩其一引牧羊金蕐山皇初平事言之葢黄上世亦出金蕐也李漢韓文序日光玉潔周情孔思自策名躔徧儀要路厭承明勞侍從久陪上雍之祠嚴助傳厭承明之廬勞侍從之事司馬遷傳薄從上上雍郊祀志自古以雍州積髙神明之隩故立畤郊上帝畤説文云天地五帝所基址祭地望太白横峨睂爰馳諭蜀之檄司馬相如傳乃遺相如責唐蒙等因諭告巴蜀民以非上意檄曰告巴蜀大守云云餘見上條擁元戎之小隊布方國之細書火井沈熒蜀都賦火井沈熒于幽泉髙爓飛煽于天垂雪山増重考西鄰之近比歸秉左鈞左傳西鄰責言不可償也易東鄰之殺牛不如西鄰之禴祭鈞陶旊輪賈誼傳大鈞播物師古曰今造瓦者謂所轉者為鈞盖取周囘調勻之義周語細勻大鈞調也通作均詩尹氏太師秉國之均故世謂宰執為秉鈞左鈞猶言左相况東極之深知可操右券説文券契也券別之書以刀剖曰契券以木櫝為要約之書以其旁故剖之屈曲犬牙毛氏曰從力不從力從力作劵古倦字也史記平原居傳事成操右券以責某老不得謝曲禮大夫七十而致仕若不得謝則必賜之几杖命作納言慕㡬兩㡬駟之榮㑹且歸矣詩㑹且歸矣無庶予子憎望一琴一鶴之出行或使之見前代囘成都吴制置獵裁一箋而起敬未宣摧謝之私張湯傳奏事即譴湯摧謝蘇林曰深自挫按也師古曰若上有責即摧折而謝也疊累幅以鳴謙仍拜駢章之寵見前施輕報重虛往實來莊子立不教坐不議虚而往實而歸佩故舊之髙情發衰遲之深愧恭惟某官知推人傑髙帝紀三者皆人傑師古曰傑言桀然獨出也學覺天民屹偉績於控荆孟浩然詩荆門控巴蜀蔚奇勳於諭蜀司馬相如傳乃遣相如責唐蒙等因諭告巴蜀凜然趙清獻之氣節行以張忠定之規模竝見前賀丁制置交割條撫五十四州之軍民瘡痍帖泰杜詩端拱問瘡痍孟郊詩中原多瘡痍壯一百八盤之門戶氣色晶明一百八盤自峽州入黔中之路山谷書萍鄉縣㕔云略江陵上䕫峽過一百八盤涉四十八渡故其詩云浮雲一百八盤縈落日四十八渡明又云風餐水宿六十里蛇退猿啼百八盤又云一百八盤攜手上至今猶夢遶羊腸又云一百八盤天上路去年明日返流人陸務觀入蜀記云南陵山極髙大有路如綫盤屈至絶頂謂之一百八盤盖施州正路山谷詩云云即謂此也説文晶精光也通作精雪山之重既多沙堤之築非逺國史補凡拜相禮絶班行府縣載沙填路自私第至于子城東街名曰沙堤李德裕傳初作相罷京兆作沙堤詳見前某不堪視䕃復此綴班無以公歸或一見而後去竝見前豈惟我賀亦衆目之具瞻左傳叔弓如晉賀虒祈也游吉相鄭伯以如晉亦賀虒祈也史趙見子大叔曰甚哉其相蒙也可弔也而又賀之子大叔曰若何弔也其非唯我賀将天下實賀代囘李制帥大東疇庸帥閫升鎮制垣犀甲熊旂名在江淮之草木平淮西雅犀甲熊旂威命是荷新唐書張萬福傳德宗以萬福為濠州刺史召謂曰先帝改爾名正者所以襃也朕謂江淮草木亦知爾威名若從所改恐賊不曉是卿也復賜舊名萬福山谷詩塞垣草木識威名麟符魚鑰光通河洛之圖書隋書樊子盖傳文帝令留守東都曰社稷大事終以委公凡可施行不勞形迹今為公別造玉麟符以代銅獸比之蕭何冦恂云唐書車服志兩京北都留守給麟符左二十右十九左者進内右者隨身説文鑰關下牡也禮記疏以鐵為之搢鏁内以搏取其鍵魚鑰者取魚不瞑目守夜之義宋熈寧中以京城門禁不嚴更造銅契中刻魚形以門名識之左符留門右符請鑰即魚鑰之遺意也龍圖閣奉太宗御製楊億詩羣玉天中開策府神龜温洛薦圖書甚惬師言可為國賀恭惟某官材由世濟學與古稽禮記儒有今人與居古人與稽桓榮傳今日所蒙稽古之力也自其不卑於小官人知將降之大任故國非喬木之謂夙盤仙李之根李詩仙李盤根大今人莫棠棣之如皆近宫槐之影詩棠棣之華鄂不韡韡凡今之人莫如兄弟雅聞偉望尤抱長材洊分半虎之符妙落全牛之刃風寒數處人物眇然固封守以畫郊圻徒得君重竝見前訖外庸而作丞輔無以公歸韓文迄其外庸可作丞輔詩無以我公歸兮某濫守洪都洪崖去洪州三十里楊傑記洪崖在翠巖應聖宫之間代有異人居之世以為洪崖先生云先生三皇時人盖得道之士也星子志隋文帝以洪崖所居遂以名州王勃滕王閣序南昌故郡洪都新府密依廣厦落霞秋水漸欲㝷吳㑹之舟滕王閣序落霞與孤鶩齊飛秋水共長天一色又望長安於日下指吴㑹於雲間按吳㑹盖指吳興㑹稽二郡文選魏文帝詩惜哉時不遇還與飄風㑹吹我東南行直行至吴㑹連用两字為韻昔人所無則上㑹為黄外切下為古外切明矣又蔡邕傳逺迹吴㑹注引㑹稽髙遷亭竹椽為笛事諸葛武侯言荆州形勢曰東運吴㑹王羲之為㑹稽内史時朝廷賦役繁重吴㑹尤甚石崇論伐吴之功曰吴㑹僭逆指言孫氏則吴㑹當是吴郡與㑹稽猶言吴越也暮日春天安得對江東之酒杜詩渭北春天樹江東日暮雲何時一尊酒重與細論文代董侍郎囘京湖趙制置方分閫罔功濫叨璽詔循牆俟命敢辱賀緘左傳三命而俯循牆而走牆謂公門循牆而走不敢安行也顧蒙一介之專遠畀雙鱗之重見前巻還有靦杜詩鯨錦巻還客始覺心和平詩有靦面目冒受何居恭惟某官以社稷臣為詩書帥細氊廣厦應接武於夔龍王吉傳廣夏之下細㫋之上師古曰廣厦大屋也氊與㫋同新唐書上官儀傳時以雍州司士參軍韋絇為殿中侍御史或疑非遷儀曰此野人語耳御史供奉赤墀下接武夔龍簉羽鵷鷺豈雍州判佐比乎緩帶輕裘即追蹤於羊杜羊祜傳祜鎮南夏在軍常輕裘緩帶身不被甲鈴閣之下侍衛不過十數人杜謂杜預一賢制勝萬里折衝見前天子遣趙將軍真得破羌之策趙充國傳羌豪相數責曰語汝亡反今天子遣趙将軍來年八九十矣善為兵今請欲壹鬬而死可得耶路人問霍去病行收絶漠之勳南史曹景宗傳景宗破魏振旅凱入帝於華光殿宴飲連句令沈約賦韻景宗不得韻意色不平啓求賦詩帝曰卿伎能甚多人才英拔何必正在一詩景宗已醉求作不已令約賦韻時韻已盡唯餘競病二字景宗便操筆斯須而成其辭曰去時兒女悲歸來笳鼓競借問行路人何如霍去病帝嘆不已約及朝賢驚嗟竟日詔令上左史説文漠北方流沙也通作幕武帝紀李将軍絶幕又衛青復将六将軍絶幕注沙漠匈奴之南界瓚曰沙上曰幕直度曰絶師古曰即今突厥中磧李陵歌經千里兮度沙幕霍去病傳約輕齎絶大幕功名剰跨於數公同書竹帛黄霸傳功名損於治郡時陳後山詩聖朝未有徐州相剰作功名跨數公步武徑躋於兩社歸勒鼎勳左傳間于兩社為公室輔注周社亳社兩社之間朝廷執政所在漢書宣帝時美陽得實鼎上刻書云王命尸臣官此栒邑賜爾旂鸞黼黻琱戈尸臣拜手稽首曰敢對揚天子丕顯休命張敞議曰殆周之襃賜大臣大臣子孫刻銘其先功者也崔瑗鼎銘禹鏤其鼎湯刻其盤紀功申戒貽則後人後漢書注蔡邕銘論曰呂尚作周太師封于齊其功銘于昆吾之鼎某守蜀非才戍邉不力杜詩歸來頭白還戍邉史記發閭左戍漁陽以此衆戰無可奏之膚公左傳以此衆戰誰能禦之以此攻城何城不克詩薄伐玁狁以奏膚功不自意全亦粗殱於羣醜吴王濞傳吾乗傳至此不自意全詩順彼長道屈此羣醜注屈治醜惡也治此羣為惡之人尚欲決焚舟之戰左傳秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還乃不容俟駕而行已貢天箋願省愆於田里山谷詩此事可箋天公查道元有與天公箋言其好髙尚依雲芘得佚老於林泉莊子佚我以老囘趙副帥彦呐守偏城而愒日無以瘉人臧洪傳論偏城既危曹袁方睦左傳翫歲而愒日其與㡬何汲黯傳任職居官亡以瘉人師古曰瘉勝也使一道以觀風何為至我禮記命太師陳詩以觀民風董仲舒傳此言何為至於我哉方兹踳地詩謂天盖髙不敢不局謂地盖厚不敢不踳説文踳小步也徐氏曰步小而輕也詩注累足箋云畏怖之言也志在囘天文選囘天轉日之力敢圖副元帥之尊栁文副元帥勳塞天地先畀小行人之問周禮春官小行人掌邦國賓客之禮籍以待四方之使者恭惟某官篤誠而明允剛直而忱恂見前無鳳笙龍管之豪奢李詩車旁仄挂一壺酒鳳笙龍管行相催有麟趾兎置之信厚詩麟之趾振振公子注趾足也麟信而應禮以足至者振振信厚也文王之昭周公之胙固多千里之駒左傳管蔡郕霍魯衞毛𥅆郜雍曹滕畢原豐郇文之昭也胙祭福肉也又建置社稷曰胙左傳胙之土而命之氏正義曰報也有德之人必有美報又守社稷曰胙左傳無克胙國杜氏春秋序本乎其始則周公之胙𦙍也劉德傳德字路叔少脩黄老術有智略少時數言事召見甘泉宫武帝謂之千里駒師古曰言若駿馬可致千里也年齒幼少故謂之駒詳見前河間之略江夏之功罕露一斑之豹新唐書宗室傳河間元王孝恭少沈敏有識量輔公祏反孝恭為行軍元帥討之李靖李勣黄君漢張鎮州盧祖尚皆稟節度初隋亡盜賊徧天下皆太宗身自討定謀臣驍将竝𨽻麾下無特将專勳者獨孝恭有方面功以自見云江夏郡王道宗字承範年十七從秦王討賊破突厥兵髙祖謂裴寂曰昔魏任城王彰有却敵功道宗似之因封任城王突厥入居五原道宗逐出之斥地贏千里助李靖破虜親執頡利可汗晚好學接士大夫不倨于貴唐初宗室唯道宗孝恭為最賢晉書王獻之字子敬少有盛名而髙逸不羈年數歲觀門生樗蒲曰南風不競門生曰此郎亦管中窺豹時見一斑獻之怒曰逺慙荀奉倩近愧劉真長遂拂衣而去王荆公詩文彩初無豹一斑山谷詩觀道詩書豹一斑獨公慷慨同國戚休星紀一周未皇皇而奠枕禮記以星辰為紀廣雅丑宫辰名七政終始於斗牛故名星紀法言昔在姬公用于周而四海皇皇奠枕于京注皇皇美也奠定也定枕猶言安枕也四海皇皇美盛安枕無虞歸仰京師風寒數處屹在在之長城見前寸心如丹杜詩以兹報主寸心赤百煉愈白四郊多壘未容㝷鷗鷺之閒壘魯水切説文軍壁也禮記四郊多壘此卿大夫之辱也注辱其謀人之國不能安也數見侵伐則多壘二矛重弓且竝總貔貅之旅詩朱英緑縢二矛重弓注二矛重弓備折壊也兵車之法左人持弓右人持矛中人御峴山既捷峴山去襄陽十里歐陽公峴山亭記峴山臨漢上望之隱然盖諸山之小者而其名特著于荆州者豈非以其人哉其人謂誰羊祜叔子杜預元凱是已泗水來歸説文泗受沛水東入淮周禮注泗水出魯國濟隂乗氏源在兖州泗水縣東陪尾山其源有四以為名不十日至長安㑹有官軍見威儀之喜魏略夏侯楙為安西将軍鎮長安魏延請假精兵五千負糧五千直從褒中出循秦嶺而東當子午而北不過十日可到長安詳見前光武紀時三輔吏士東迎更始見諸将過皆冠幘而服婦人衣諸于繡镼莫不笑之及見司隸僚屬皆懽喜不自勝曰不圖今日復見漢官威儀用丸泥封函谷無以劇賊遺君父之憂隗囂傳請以一丸泥為大王東封函谷闗詳見前耿弇傳光武在魯聞弇為張步所攻自往救之未至陳俊謂弇曰劇擊兵盛可閉營休士以須上來弇曰乗輿且到臣子當牛釃酒以待百官反欲以賊遺君父耶惟國爾忘家主爾忘身賈誼傳為人臣者主耳忘身國耳忘家公耳忘私則男子當戰女子當運蜀志揚洪傳先主爭漢中急書發兵諸葛孔明以問洪洪曰漢中則益州咽喉存亡之機若無漢中則無蜀矣此家門之禍也方今之事男子當戰女子當運發矢何疑黄河以南行皆晉土祖逖傳逖愛人下士雖疎交賤隸皆恩禮遇之由是黄河以南盡為晉土互見前自陜而東是在周公公羊傳自陜而東者周公主之自陜而西者召公主之詳見前某愛莫助之見前遐不謂矣詩心乎愛矣遐不謂矣注謂勤也我心愛此君子君子雖逺在野能不勤思之乎木牛流馬敢辭轉粟以上天杜詩築城依白帝轉粟上青天桃蟲荓蜂但願徹桑於未雨詩予其懲而毖後患莫予荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難予又集于蓼荓音注莑蜂掣曵也掣曵者從旁牽挽之言是挽離正道使就邪僻若管蔡流言之類汝如是徒自求辛苦毒螫耳肇始允信也桃蟲鷦也鳥之始大終小者始信流言之罪如鷦鳥之小不登誅之後乃反叛翻飛為大鳥也此借用經略唐貞觀二年邉州別置經略使此使名所昉節度兼度支營田招討經略使則有副使判官各一人儀鳳二年以黑齒常之為河源經略大使永淳元年婁師德為河源經略副使至德三年賀蘭進明除嶺南五府經略兼節度使宋不常置咸平五年始以右僕射張齊賢為汾寧環慶涇原路經略使又以鄧州觀察使錢若水為并代經略使自後不除人寶元中夏人入冦始命陜西沿江大将皆兼經略皇祐間儂智髙擾邊詔知廣桂竝帶經略安撫使自後西南二邊常帶經略所以重帥權而服羌夷也其經略安撫竝以直秘閣以上充掌帥臣任河東陜西嶺南路職任綏御戎夷則為經略安撫使南渡之初依舊制廣南東路帶主管經略安撫使公事西路帶經略安撫使紹興五年令襄陽守臣湖北帥帶經略安撫使後罷而二廣如故代囘廣西李經略訦代何月湖宋廣西路經略司治静江府小司冦之持平躐陞五雉周禮小司冦之職掌外朝之政張釋之傳釋之持議平大帥府之委重逺寄雙魚見前懷感有之寘慚無所陳書蕭摩訶傳老夫受脤專征不能戰勝攻取今被困迫慙寘無地恭惟某官名髙斗北新唐書狄仁傑傳藺仁基毎曰狄公之賢北斗以南一人而已恵滿天南槃槃都會之雄庶邦君之奔走槃槃屈曲貌劉劭趙郡賦經絡疇邑詰曲縈槃李頻詩楚地八千里欒欒此都㑹巍峩數里城逺水相映帶尚書爾庶邦君又矧咸奔走英英文武之特一號令而精明韓詩英英桂林伯實惟文武特公無遐心詩毋金玉爾音而有遐心注疏逺我之心民可吐氣某斵輪既老山谷詩問取人間老斵輪整履已晡宜人獨桂林遥想玉篸之碧杜詩五嶺皆炎熱宜人獨桂林梅花萬里外雪片一冬深韓詩蒼蒼森八桂兹地在湘南江作青羅帶山如碧玉篸注篸粗含切與簪同釵􅀢也梁劉孝威詩金篸臨鬢斜忍渴望梅嶺願調金鉉之黄山谷詩空餘見賢心忍渴望梅嶺易鼎黄耳金鉉利貞鉉湖畎切説文舉鼎也易謂之鉉禮謂之鼎易注扛鼎而舉之也代囘廣西李經略訦荷囊輟直見前桂筦分符唐張安逺記五筦之地桂為大被山帶江控制數千里詳見前韡刀列郡之迎古稱大府韓文大府帥或道過其府府帥必戎服左握刀右屬弓矢帕首袴韡迎郊襦袴萬家之喜今在細侯郭伋字細侯仁氣南驅善聲東迤恭惟某官通材治劇厚德鎮浮財貨本末源流早振地官之職侍從論思獻納晚深天扆之知遽厭承明之廬歸拜散人之號時方多事公未可間謀帥須賢起家甚寵竝見前若衛公之鎮撫九十六郡新唐書李靖傳靖度嶺至桂州分道招慰酋領馮盎等皆以子弟來謁南方悉定裁量款效承制補官得郡凡九十六戶六十餘萬詔書勞勉授嶺南撫慰大使檢校桂州總管與襲志之都督二十八年新唐書李襲志字重光蕭銑平襲志誘致嶺南六十餘州送款趙郡王孝恭承制授桂州總管轉桂州都督襲志守桂二十八年政尚清省南荒便之以光禄大夫汾州刺史致仕卒能安越人莫非李姓宜其苗裔復此蕃宣顧恐青羅碧玉之江山注見上條難駐黄閣紫樞之步武某龍鍾已久燕賀無由竝見前夔府竹枝之歌既成昨夢劉禹錫竹枝歌白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人莫上動鄉情山桃紅花滿上頭蜀江東水拍江流花紅易衰似郎意水流無限似儂愁溪上春來新雨晴瀼西春水縠紋生橋東橋西妙楊栁人來人去唱歌行日出三竿春霧消江頭蜀客住蘭橈憑寄狂夫書一紙住在成都萬里橋兩岸山花似雲開家家春酒滿銀盃昭君坊中多女伴永安宫外踏青來瞿塘嘈嘈十二灘此中道路古來難長恨人心不如水等閑平地起波瀾巫峽蒼蒼煙雨時清猿啼在最髙枝箇裏愁人腸自斷由來不是此聲悲楊栁青青江水平聞郎江上唱歌聲東邊日出西邊雨道是無晴還有晴陸務觀思䕫州詩壯憶公孫舞劍器愁思賓客竹枝歌山谷詩驚夢如昨日又昨夢春氷釋東坡詩昨夢那可逐漢節梅花之句願寄故人杜詩漢節梅花外春城海水邊餘見前代囘廣西李經略訦价藩報政詩价人維藩注价者甲之别名被甲之人謂卿士掌軍事者于周禮司馬之卿也秘殿升班四朝國史王珪傳英宗即位之明年忽召至蘂珠殿傳詔令兼端明殿學士諭之曰秘殿之職非直器卿于翰林間二府員缺即出命矣呂正獻謝表兼華秘殿欒城集秘殿隆名言加觀文等殿大學士八桂不曰炎荒固號登仙之勝八桂堂在今桂林府治宋守范至能建李彥弼有記八桂之名本出仙經後人因植八桂于堂又以名郡韓詩蒼蒼森八桂兹地在湘南范至能桂海虞衡志序始予自紫微垣出帥廣右姻戚故人張飲松江皆以炎荒風土為戚余取唐人詩攷桂林之地少陵謂之宜人樂天謂之無瘴氣退之至以湘南江山勝於驂鸞仙去則宦遊之適寧有逾於此者乎韓詩蒼蒼森八桂兹地在湘南逺勝登仙去飛鸞不暇驂四松取之熱撰殆非寄禄之常元㣲之詩云松門待制應全逺藥樹監搜可得知文昌雜錄唐宣政殿為正衙殿廷有四松松下為待制官立班之地詳見前沈存中夢溪筆談舊日官為中允者極少唯老于幕官者累資方至故為之者多潦倒之人近嵗州縣官進用者多除中允遂有冷中允熱中允又集賢殿修譔舊多以館閣久次者為之近嵗有自常官超授要任未至從官者多除修撰亦有冷修撰熱修撰時人謂熱中允不博冷修撰宋淳熈重定官制特進至承務郎為寄祿官帝綍渙孚帥符鼎重渙鼎卦名恭惟某官材全業鉅器博聲宏厭直承明之廬作牧始安之徼桂州禹貢荆州之地春秋百越地東漢為始安國吴置始定郡屬荆州玉篸羅帶江山分一半之天見前金節油幢庭戶行千里之外韓文令修於庭戸數日之間而人自得於湖山千里之外餘見前果臻帝璽進庀宸奎河洛圖書之淵榮灮上燭尚書中候榮灮出河休氣四塞休美也榮灮五色嶺海輦轂之治和氣旁行韓文雖在萬里之外嶺海之陬待之一如畿甸之間輦轂之下會見出綸又迎歸衮某無由旅賀猥辱撝謙誦太古而歌散人吾事濟矣陸龜蒙散人歌江湖散人天骨竒短髪㧓來蓬半垂手提孤篁曵寒蠒口誦太古滄浪詞曹瞞傳公聞許攸來跣出迎之撫掌笑曰子卿逺來吾事濟矣宋書武帝紀公既入峴舉手指天曰吾事濟矣南史劉穆之傳卿能自屈吾事濟矣去上天而辭宰相公自計之古今詩話冦萊公訪魏野議論騷雅相得甚驩公再秉鈞軸野嘗游門下一日獻詩曰好去上天辭富貴却來平地作神仙公得詩不悦後二年貶通州毎題前詩于窻朝夕吟哦之四六標準巻二十, SBCK: ''}
