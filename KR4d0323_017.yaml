body:
  text: 四六標準卷十七宋李劉撰中書宋制中書省在左掖門外西靣北廊掌進擬庶務宣奉命令行臺諫章疏羣臣奏請興創改革及中外無法式事應取㫖者凡除臺省寺監長二以下及侍從職事官外任監司節鎮知州軍通判武臣遙郡橫行以上除授皆掌之尼命令之體有七曰冊書立后妃封親王皇子太長公主拜三師三公三省長官則用之曰制書處分軍國大事頒赦宥德音命尚書左右僕射開府儀同三司節度使凡告廷除授則用之曰誥命應文武官遷改職秩內外命婦除授及封叙贈典應命辭則用之曰詔書賜待制大卿監中大夫觀察使以上則用之曰敕書賜少卿監中散大夫防禦使以下則用之曰御札布告祭封郊祀宗祀及大號令則用之曰敕榜賜酺及戒勵百官曉諭軍民則用之皆承制畫㫖以授門下省令宣之侍郎奉之舍人行之留其所得㫖為底大事奏稟得㫖者為畫黃小事擬進得㫖者為録黃凡事于因革損益而非法式所載者論定而上之諸司傳宣特㫖承報審覆然後行下設官十有一令侍郎右散騎常侍各一人舍人四人右諫議大夫起居舍人右司諫右正言各一人分房八曰吏房曰户房曰兵禮房曰刑房曰工房曰生事房曰班簿房曰制勑庫房元祐以後析兵禮為二增催驅檢㸃分房十有一又改生事房為開拆賀太府余大卿鑄除中書舍人仍兼右司除户部侍郎兼知臨安成都運司作帝重詞臣王荆公題中書壁詩夜開金鑰詔詞臣對御抽毫草帝綸須信朝家重儒術一時同榜用三人公遷閣老新唐書百官志中書舍人六人以久次者一人為閣老判本省雜事楊綰傳拜起居舍人知制誥纍遷中書舍人故事舍人年久者為閣老其公廨雜料獨取五之四綰悉均給之杜工部集有贈嚴八閣老留别賈嚴二閣老詩韓昌黎集有次潼關寄張十二閣老詩又有與張籍遊楊尚書林亭寄第三閣老兼呈白馮二閣老詩裁縫雲霧便應拜學士之真杜詩裁縫雲霧成御衣言行録綦北海崇禮字叔厚覃思於學問文章彊記默識繇唐虞三代以暨國朝之隆君臣事跡如指諸掌視唐燕許常楊為不足道上每曰綦某之文有體真學士也山谷詩玉堂端要真學士須得儋州秃髮翁鼓舞風雷更盡展舍人之樣舊唐書徐堅西臺舍人齊𣆀子也少好學遍覽經史聖厯中車駕在三陽宫御史大夫楊再思左庶子王方慶為東都留守引堅為判官表奏專以委之方慶賞其文章典實常稱曰掌綸誥之選也再思亦曰此鳯閣舍人樣如此才識走避不得互見前紫微炳煥唐㑹要開元中改中書舍人為紫薇舍人又曰紫薇省白樂天詩紫薇花對紫薇郎岑參詩三殿花香入紫薇黃道開明王維詩閭闔開黃道山谷詩日月黃道明恭惟某官忠肅而惠和左傳高辛氏有才子八人忠肅共懿宣慈惠和天下之民謂之八元博習而修潔董仲舒傳公舉賢良修潔博習之士清姿秀骨下獨鶴於人間杜詩仙鶴下人間獨立霜毛整矯然江海思復與雲路永又獨鶴不知何事舞又獨鶴歸何晚又獨鶴原依渚厚德長材載六鼇於海上見前心醉六經之醲郁列子問之而心醉中說心若醉六經目若營四海山谷詩手抄萬卷未閣筆心醉六經還荷鋤韓文沈浸醲郁含英咀華目營四海之溺饑莊子視若營四海注視之㒦然似營他人事者文人多不護文細行易虧於大德魏文帝與吳質書觀古今文人類不護細行鮮能以名節自立而偉長獨懷文抱質恬淡寡欲有箕山之志可謂彬彬君子矣南史顔謝傳論文人不護細行古今之所同焉宰士固習為宰逺圖或奪於近功公羊傳曷為以官氏宰士也翟方進傳以宰士督察天子奉使命大夫山公啓事太尉掾滿奮樂廣司徒掾何助劉琚司空掾官粹王正劉淡太尉掾劉遐有才事義宰士之雋也又今尚書郎御史東宫洗馬舍人多缺宰士中後進美者太尉掾樂廣司徒掾劉琚王瓚司空掾王正劉淡皆其選也宋㑹要紹興十三年三省進擬右司郎中上謂輔臣曰神宗祖訓司官便是學為宰相豈可不謹擇惟公超然過人逺矣彌綸兩省標表九卿久兼內史之贊書通典中書舍人屬春官隋內史舍人八員專掌詔誥煬帝減四人後改為內書舍人唐初為內史舍人至武德三年改為中書舍人宋除蘇轍制政令之出公卿為朕行之臺諫為朕言之方其未行內史舍人得聞其議與其既行而後言孰若未行而議之哉孔光傳已刻侯印書贊師古曰贊進也延進而拜之書贊者書贊辭於䇿也茲正中書之三字東坡集雖四户擅權非當時之公議而五花判事亦前代之美談及夫三字之除乃是一切之政翰府名談何中正登第求卜于郭從周從周贈之詩曰三字來時月正圓一麾從此出秦關後以八月十五日授知制誥言邊事忤㫖出知秦州陳後山詩一官早要稱三字注三字謂知制誥王禹稱詩摛毫終要居三字出郡終須借一麾惟天子之義範曰制文中子賈瓊問續書之義子曰天子之義列乎範者有四曰制曰詔曰志曰䇿以聖人之情見乎辭繫辭爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭扶山東之癃戀漢恩而忍死賈山傳臣聞山東吏布詔令民雖老羸癃疾扶杖而往聽之願少須㬰母死思見德化之成也回河朔之悍存唐祚於幾亡新唐書陸贄傳贄為帝言今盜遍天下宜痛自咎悔以感人心陛下誠不吝改過以言謝天下使臣持筆亡所忌庶叛者革心帝從之故奉天所下詔書雖武人悍卒無不感動流涕李抱貞入朝為帝言陛下在奉天山南時赦令至山東士卒聞者皆感泣思奮臣是時知賊不足平議者謂興元戡難功雖爪牙宣力蓋贄有助焉一札可受於隗囂後漢書循吏傳一札十行隗囂傳囂既有功於漢又受鄧禹爵署其腹心議者多勸通使京師囂乃上書詣闕光武素聞其風聲報以殊禮言稱字用敵國之儀所以慰藉之良厚尺書足招於贊普東坡詩小臣願對紫薇花試草尺書招贊普新唐書吐菑列傳其俗謂雄强曰贊丈大曰普故號君長曰贊普不但取九制一揮之敏宋神宗實録劉敞字原父博學無所不通在西掖時一日追封皇子公主九人敞將下直為之立馬卻坐一揮九制數千言已就文詞典雅各得其體亦非專四駢六儷之工栁文駢四儷六錦心繡口宫沉羽振笙簧觸手俾萬姓咸曰大哉尚書俾萬姓咸曰大哉王言又曰一哉王心則一字不容易也北史文苑傳陸操伏渾卒楊愔使樊孝謙代已作書以告晉陽朝士令魏收潤色之收不能改一字新唐書文藝傳孫逖為中書舍人開元間蘇頲齊浣蘇晉賈曽韓休許景先及逖典詔誥為代言最而逖尤精密張九齡視其草欲易一字卒不能也衣冠盛事夙尊八葉之科新唐書蕭瑀傳贊梁蕭氏興江左實有功在民厥終無大惡以寖微而亡故餘祉及其後裔自瑀逮遘凡八葉宰相名德相望與唐盛衰世家之盛古未有也翰墨大勳詎止五花之判曹植與楊修書以翰墨為勳績辭賦為君子唐故事中書有軍國政事則中書舍人各執所見雜署其名謂之五花判事中選一人明練事者知樞密謂之解事舍人既敷華而緯國班彪傳敷文華以緯國典守賤薄而無悶容行迪哲以爽邦尚書爽邦由哲亦惟十人迪知上帝命越天忱文章於道未為尊風斯在下矣杜詩文章一小技於道未為尊莊子故九萬里則風斯在下矣富貴乃吾所自有時來則為之蔡澤傳富貴吾所自有吾所不知者壽也張嘉貞傳宰相時來即為之豈能長據詳見前某頃侍同朝且依鄰壁西京雜記匡衡勤學無燭鄰舍有燭而不建乃穿壁引其光以書映光而讀之韓非老子又嘗共傳南史王儉王敬則同拜開府儀同三司時徐孝嗣於崇禮門候儉因嘲之曰今日可謂連璧儉曰不意老子遂與韓非同傳史記太史公自序李耳無為自化清淨自正韓非揣事循循勢理作老子韓非列傳第三按今本史記老子伯夷為列傳第一乃唐開元二十三年奉敕升為列傳首申韓列第三公叔大夫詎望同升范叔一寒哀之命也不哀之命也韓文其哀之命也其不哀之命也知其在命而且鳴號之者亦命也杜陵十暑可以言歟未可以言歟杜詩十暑岷山葛聞恥納溝亦嘗推轂上界足官府斷不希雞犬之仙韓詩上界真人足官府豈如散仙鞭笞鸞鳯終日相追陪神仙傳淮南王安仙去餘藥器置在中庭雞犬舐啄之盡得升天故雞鳴天上犬吠雲中也散人拜江湖願徑入魚蝦之侣新唐書隱逸傳陸龜蒙字魯望居松江甫里多所論撰得書熟誦乃録讐比勤勤朱黃不去手不喜與流俗交雖造門不肯見不乘馬升舟設蓬席齎束書茶竈筆牀釣具往來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人其散人歌云江湖散人天骨竒短髮搔來蓬半垂手提孤篁曵寒繭口誦太古滄浪詞江湖散人悲古道悠悠幸寄羲皇傲官家未議活蒼生拜賜江湖散人號東坡集竄流海國脫身羈鬼之林灑掃真祠拜賜散人之號又侣魚蝦而友麋鹿賀黃祕監序除中書舍人代董制置中宸渙號西京賦消氛埃於中宸易㵰汗其大號內史升賢杜氏通典隋內史舍人八員専掌詔誥煬帝減四人後改為內書舍人唐初為內史舍人至德中改中書三神在海上之山久勤攝領見前一佛出人間之世遂見真除楊文公談苑太宗尤重內外制之任嘗曰詞臣之選古今所重朕聞朝廷每除舍人六親相賀諺曰一佛出世豈容易哉莊子內篇有人間世綸綍有光紳緌胥慶紳大帶緌音㽔如佳切冠纓也郭有道碑纓緌之徒紳綍之士恭惟某官材猷膚碩學術醇深探周情孔思之微淵源千載發宋豔班香之祕膾炙四方親結龍扆之知聿新鳳閣之樣並見前辭達而已矣要必見聖人之情易聖人之情見乎辭才難不其然蓋欲極天下之選栁詩才難不其然卒與大患期杜氏通典自永淳以來天下文章道盛臺閣髦彥無不以文章逹故中書舍人為文士之極任朝廷之盛選諸官莫比焉得君為重汲黯傳吾徒得君重緯國以文見前好對紫薇草尺書而招贊普東坡詩小臣願對紫薇花試草尺書招贊普詳見前卻登黃閣提一筆以福蒼生劉夢得送令狐相公詩終當持一筆再入福蒼生某聳聽除音阻陪賀履千門栁色誰憐芻狗之陳人岑參西省即事詩千門栁色垂青瑣三殿花香入紫薇老子天地不仁以萬物為芻狗莊子夫芻狗之未陳也盛以篋衍巾以文繡尸祝齊戒以將之及其已陳也行者踐其首脊蘇者取而㸑之而已郭象注廢棄之物於時無所用萬里草堂遙想槐龍之新影杜詩萬里橋西一草堂百花潭水即滄浪注蜀有萬里橋在浣花溪之東昔孔明送吳使至此曰萬里之行從此始矣因是得名東坡詩日高黃繖下西清風動槐龍舞交翠公自注邇英閣前有雙槐樛然屬地如龍形宋張邦基墨莊漫録云邇英閣前雙槐極高而柯葉拂地狀如龍蛇或謂之鳯尾槐蘇子由詩云銅瓶灑遍不知寒雨㸃勻圓凍未乾回首瞳朧朝日上槐龍對舞覆衣冠賀直院莊少卿夏除中書舍人宋史莊夏字子禮泉州人為宗正少卿權直學士院試中書舍人詳見第二十四卷優詔上卿益都耆舊傳趙興為太常雖處上卿而布被瓦器正班內史見上條北門視草謂當進學士之班新唐書百官志自太宗時名儒學士時時詔以草制然猶未有名號乾封以後始號北門學士𤣥宗初置翰林待詔掌四方表疏批答應和文章唐職林至德後天子召集賢學士於禁中草書詔雖宸翰所揮亦資其檢討謂之視草淮南王傳常召司馬相如等視草師古曰草為文之藁草班字重上西掖拜真聊復示舍人之樣應劭漢官儀左右曹受尚書事前世文士以中書在右因謂中書為右曹又稱西掖劉楨贈徐幹詩誰謂相去逺隔此西掖垣唐詩太微西掖鳯池邊又西掖深沉大帝居又西掖重雲開禁署又西掖幾年綸綍貴餘見前斯文增氣有識傾心恭惟某官蓄學醇明掞材巨麗吳質書發函伸紙是何文采之巨麗而慰諭之綢繆乎沉浸醲郁蓋下逮於莊騷進學解沉浸醲郁含英咀華上規姚姒下建莊騷雅健雄深無足多之崔蔡劉夢得栁文序嘗評其文雄深雅健似司馬子長崔蔡不足多也盡兼兩制五代職官志晉天福五年詔翰林學士院公事宜並歸中書舍人自是舍人畫直者當中書制夜直者當內制至開運元年復召翰林學士與中書舍人分為兩制各置六員事實國朝翰林學士謂之內制中書舍人知制誥謂之外制其後並雜學士待制通謂之兩制已四五年號令鼓舞風雷亦云多矣獻納司存雨露莫若專之濃薰班馬之香並見前高振綺園之翼張良傳四人為夀已畢趨去上目送之召戚夫人指示曰我欲易之彼四人為之輔羽翼已成難動矣師古曰四人謂園公綺里季夏黃公甪里先生所謂商山四皓也夏兼太子侍讀有偉用儒之效荀子非聖人莫之能為夫是之謂大儒之效㑹當秉國之鈞某假守魚鳬阻陪燕雀並見前碧梧幕府幸稍安雪外之城杜詩清秋幕府井梧寒獨宿江城蠟炬殘永夜角聲悲自語中天月色好誰看又秋風嫋嫋動高旌玉帳分弓射虜營已收滴博雲中戍欲奪蓬婆雪外城注蓬婆乃吐蕃城名在雪山之外紅藥主人儻或念天涯之客謝𤣥暉直中書省詩紅藥當階翻蒼苔依砌上韓詩令君縱署天涯吏投檄北去何難哉史掖宋起居郎起居舍人掌記天子言動御正殿則俟於門廡外便殿則侍立行幸則從大朝㑹則對立于殿下螭首之側凡朝廷命令赦宥禮樂法度損益因革賞罰勸懲羣臣進對文武除授及祭祀燕享臨幸引見之事四時氣候四方符瑞户口增減州縣廢置皆書以授著作官元豐六年詔左右史分紀言動元祐元年仍詔不分賀聶左史子述見第六卷首條中宸渙號見前左史升賢杜氏通典起居周官有左右史記其言事蓋今起居之本至隋煬帝以為古有內史外史今著作如外史矣宜置起居官以掌其內乃於內史省置起居舍人唐顯慶中子中書省置起居舍人與起居郎分掌左右龍朔三年改為左右史夾立螭頭均為清切見前進攜龍角逾近凝嚴漢天文志杓攜龍角注龍角東方宿也攜連也天官書大角者天王帝庭晉天文志大角在攝提間天五座也彰清朝選用之公示君子登庸之漸恭惟某官材全而業巨學廣而聞多並見前秀出班行固已芒寒而色正韓文秀出班行乃勤帝目帝省竭心思顧日渥凜然氣節不為義疚而利回左傳君子動則思禮行則思義不為利回不為義疚五年省闥之彌綸千里户庭之清晏韓文令修於户庭數日之間而人自得於湖山千里之外晏音按說文天清也揚雄賦天清日晏注晏無雲也三輔人以日出清濟為晏晏而溫楊素傳東夏清晏嘉庸茂績於是乎在賴舍人之解事見首條五花判注為天子而記言晉起居注古者天子諸侯二史左史記言右史記動績用孔殷序遷惟允楚左史之能讀八索蓋儲倚相之材左傳左史倚相趨過王曰是良史也能讀三墳五典八索九邱倚相左史名孔安國尚書序八卦之說謂之八索求其義也韓安國傳天子倚以為漢相元載杜相國神道碑俾時不迷倚以為相唐中禁之用第一流亦為議政之地禁居䕃切天子所居曰禁蔡雍云天子所居門闔有禁非侍御之臣不得妄入行道豹尾中亦曰禁中避元后父名改曰省中㑹要唐人言左右史當用第一流貞觀中每日仗退上與宰臣參議政事即令起居郎一人執簡記録佳傳相期於千載晉書陳壽傳丁儀丁廙有盛名於魏壽謂其子曰可覓千斛米見與當為尊公作佳傳丁不與之竟不為立傳北齊書魏收傳收為太常少卿修國史得揚休之助因曰無以謝德當為卿作佳傳北史爾朱文略嘗大遺魏收金請為父作佳傳收因論榮比韓彭伊霍修名剩跨於數公離騷老冉冉其將至兮恐修名之不立陳後山詩聖朝未有徐州相剩作功名跨數公某逺落魚鳬阻陪燕雀見前甚愧丈人厚頃嘗聞所聞而來杜詩甚愧丈人厚甚愧丈人真嵇康傳聞所聞而來見所見而去屢為丞相言是有得不得之命韓詩屢為丞相言雖懇不見録灩澦既令其膽破岷峨亦使之眠高望五雲多處之星早登魁輔杜詩五雲多處是三台倩萬里橋邊之水聊送客心代董制置賀聶左史南衙渙號天子居曰衙行曰駕韓文東方朔詩詆欺劉天子正畫溺殿衙唐故事宣政前殿也謂之衙衙有仗紫宸便殿也謂之閣衙朝也其禮尊閣宴見也其事殺宣政殿為正衙朔望大冊拜則御之紫宸殿謂之上閣亦曰內衙竒日視朝則御之新唐書宇文士及傳南衙羣臣靣折廷爭高元裕傳西頭勢乃重南衙樞密之權過宰相東史升賢晉書天文志極東一星曰柱下史主記過左右史此之象也雖君舉必書均號司存之切左傳君舉必書書而不法後嗣何觀唐杜正倫知起居注太宗嘗謂侍臣曰朕每日坐朝欲出一言即思此言於百姓有利益否所以不能多言正倫曰君舉必書言存於左右史臣職當修起居注不敢不盡愚直杜詩獻納司存雨露邊地分清切任才賢而王置諸左益知位置之親尚書爰立作相王置諸其左右置字重有舛正人登崇善類鼓舞恭惟某官負材有用蓄學不資蓋寬饒傳用不訾之身師古曰訾與資同不資言無資量可以比之貴重之極也健步豐扛連六鼇於海上東坡詩我留待玉座弱步欹豐扛列子龍伯之國有大人舉足不盈數步而暨五山之所一釣而連六鼇合負而趨歸其國清標秀質下獨鶴於雲間杜詩仙鶴下人間獨立霜毛整詳見前五年密贊於宰司胡文恭集賜曾公亮批答參聞政道陪二宰司庶績自凝於道揆尚書庶績其凝螭頭坳處久稱解事之舍人見首條龍尾道中遂進讀書之倚相唐李德裕獻替録朝官退朝後從龍道出宋㑹要西京大內正殿曰太極殿殿前有左右龍尾道日樓月樓龍尾道在殿前以青石甃之望之蜒如龍尾姚合寄右史李定言詩才歸龍尾含雞舌更立螭頭運兔毫又和盧給事詩鴛鷺簮裾上龍尾蓬萊宫殿壓鰲頭白樂天詩步登龍尾上虗空立去天顔無咫尺又螭頭陛下立龍尾道邊行又龍尾趂朝兼氣力牛頭參道有心期張籍詩身貴蚤登龍尾道功高自破鹿頭城王荆公詩忽隨諸彥登龍尾尚憶當年應鵠頭餘見上條柱下之光有耀晉天文志極東一星曰柱下左右史之象甌中之姓可占桞氏舊聞𤣥宗善八分書凡命將相先以御札書其名置案上㑹太子入侍上舉金甌覆其名以告之曰此宰相名汝知誰耶肅宗拜而稱曰非崔琳盧從願乎上曰然舉甌示之乃賜巵酒某再辱挈提尤深距躍見前歸心羽翼已久懷石澗之泉謝靈運詩銅陵映碧澗石磴瀉紅泉紅泉在今撫州府城西三十二里銅山下餘論齒牙更幸及玉關之老東軒筆録蔡挺自實元以後厯邊任至熙寧初猶帥平涼㑹邊無事因作樂歌以教邊人有誰念玉關人老之句盛傳都下未幾召為樞密副使詳别見六部宋初尚書侍郎郎中員外郎皆為空官特以寓祿秩序品位而已自真宗仁宗以來議者多以正名為請咸平中楊憲首言文昌㑹府有名無實宜復其舊既而言者相繼乞復二十四司之制至和中吳育亦言尚書省天下之大有司而廢為閒所當漸復之神宗即位慨然欲更其制元豐三年下詔肇新官制凡省臺寺監領空名者一切罷去而易之以階六年詳定所上寄祿格而省臺寺監之官各還所職矣賀章尚書穎宋史章穎字荗獻臨江軍人厯太學録遷博士左司諫以救趙汝愚被劾家居久之起知衢州侍御史林行可劾罷之尋知贑州御史王益祥復劾寢其命韓托胄誅纍遷刑部侍郎兼侍講對延和殿上歎曰卿為權臣沮抑甚久除吏部侍郎遷禮部尚書升侍讀嘉定十一年卒穎操履端直生平風節不為窮達所移雖仕多偃蹇而清議與之贈光祿大夫諡文肅申命秩宗申重也易重巽以申命尚書申命羲叔又天其申命用休又汝作秩宗正班常伯尚書王左右常伯常任唐百官志龍朔二年改尚書為太常伯咸亨元年復舊春官六十立之長以維專周禮以官府之六屬舉邦治三曰春官其屬六十掌邦禮大事則從其長小事則專達曲禮三千待其人而後舉有隆圖任茲遂真除恭惟某官重德鎮浮清規厲俗中流砥柱百壬夙避其鋒尚書巧言令色孔壬爾雅壬佞也山谷題王黃州墨蹟詩往時王黃州謀國極匪躬朝聞不及夕百壬避其鋒九鼎安磐石一身轉孤蓬餘見前野水孤舟六丁莫措其手言行録冦萊公知歸州巴東縣嘗賦詩有野水無人渡孤舟盡日橫之句時以為若得用必濟大川老君六甲符圖云丁卯神司馬卿丁丑神趙子壬丁亥神張文通丁酉神臧文公丁未神石叔通丁已神崔石卿王荆公詩主張壽祿無三甲收拾文章有六丁是六丁又可對三甲管輅傳背無三甲腹無三壬皆不壽之驗偉雲山之舒卷關天下之重輕逮茲改絃復此持槖堅車大艎安徐而後進艎大舟名光風霽月逾久而益明山谷濓溪詩序舂陵周茂叔人品甚高胸中灑落如光風霽月粵從二卿東坡除陸佃制文昌二卿位次八座實典三禮尚書有能典朕三禮振自古寅清之職尚書夙夜惟寅直哉惟清還斯民子諒之心禮記致樂以治心則易直子諒之心油然生矣注子讀如不子之子尚書啓呱呱而泣余弗子是子愛之義而此經子是亦慈愛故云不惟和上下而治神人尚書宗伯掌邦禮治神人和上下蓋將經國家而定社稷兹引星辰而上杜詩持衡留藻鑒聽履上星辰益高日月之依武德間有讜言忠無不報新唐書陳叔達字子聰陳宣帝子也擢禮部尚書始太子建成等䦧間太宗帝惑之叔達極意救辨至是謂曰武德內難卿有讜言故以此報叔達謝曰豈獨為陛下乃社稷訃耳鄒陽傳忠無不報信不見疑宋史章穎傳時樞密都承㫖王朴以言者奉外祠穎復言其風金使過求欲已任調護以為功孝宗謂其言太訐久之不遷及奏考議官孝宗曰章穎可乃知上猶記其讜論也貞觀初踐台斗理有固然杜子美送重表姪王砅評事使南海詩及乎貞觀初尚書踐台斗容齊隨筆云觀此詩疑指王圭圭相唐太宗贈禮部尚書然細考之史大不合唐高祖在位日太子建成與秦王不睦圭為太子中允其後楊文幹事起高祖責以兄弟不睦歸罪圭等而流之則圭與太宗非素交明矣杜公稱其祖姑事不應不實且太宗時宰相别無姓王者真不可曉也史記孟嘗君傳物有必至事有固然某阻作鳬趨但深鼇抃見前小草有逺志懷哉竝世之醫和山谷詩小草有逺志相依在平生醫和不竝世深根且固蒂詩懷哉懷哉注懷安也思鄉里處者曰今亦安否哉山谷詩懷哉譴逐魂大厦無棄材盍以與聞於匠石韓詩大匠無棄材尋尺各有施賀工部任尚書希夷兼給事晉長冬官周禮以官府之六屬舉邦治六曰冬官其屬六十掌邦事大事則從其長小事則專達復兼夕闥漢舊儀黃門屬黃門令日暮入對青瑣門拜名曰夕郎白氏長慶集給事東闥王維詩夕奉天書拜瑣闈姚合詩夕郎夜直吟仙掖國有六典孰如事典之優閒周禮太宰之職掌建邦之六典以佐王治邦國一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典命出一人實賴舍人之駁正通典唐武德三年改給事郎為給事中龍朔二年改為東臺舍人況躋中庶通典古者天子有庶子之官秦因之置中庶子庶子員漢因之沈約宋書中庶子漢置古者世祿卿大夫之子既為副倅謂之國子天子諸侯必有庶子官以掌教之晉齊王攸與山濤書中庶子東宫顯職山濤啓事中庶子東宫顯選尤簡上知恭惟某官胸湛秋霜山谷詩萬卷曲肱裏胸中湛秋霜筆翻春潦獻納日月仁義陳於王前鼓舞風雷言語妙於天下並見前久典三禮既諧兆民任希夷傳開僖初主太常寺薄奏紹興以來禮書未經編次嵗月滋久恐或散亡乞下本寺修纂從之遷禮部尚書兼給事中疇若豫工併任塗歸之責尚書疇若豫工僉曰垂哉隋百官志給事中掌侍左右分判省事凡百官奏抄侍中既審則駁正違失詔勑不便者塗竄而奏還謂之塗歸乃在吾禁就兼翼贊之華畢誠傳召入翰林為學士宣宗嘗召訪邊事誠援質古今條破羌狀甚悉帝悅曰孰謂頗牧在吾禁中杜詩常怪商山老兼存翊贊功忠既結於兩宫名益高於九牧孔文舉論盛孝章書孝帝要為有天下大名九牧之人所共稱難投珠委地必有清乎尚書之言謝承後漢書鍾離意字子阿明帝徵為尚書交趾太守坐贓伏法以資物簿入大司農詔班賜羣臣意得珠璣悉以委地而不拜帝怪問其故對曰臣聞孔子忍渴於盜泉之水曽參回車於勝母之鄉惡其名也贓穢之寶不敢拜帝笑曰清乎尚書賜錢三十萬唐中宗授張錫尚書制宜升賜劔之榮式表委珠之潔批勑回天更觀儒者給事之效後漢書給事中常從左右無員位次侍中之下常侍或名儒或國親晉書陳劭字節良武帝詔曰燕王師陳劭清貞亷潔行著邦族篤學好古博通六藉宜在左右以敦儒訓可給事中山谷送顧子敦詩儒者給事中顧公甚魁偉既劑高馮之藥石新唐書高馮字季輔以字行為中書舍人列上五事書奏太宗稱善進授太子右庶子數上書言得失辭誠切至帝賜鍾乳一劑曰而進藥石之言朕以藥石相報即羮傅說之鹽梅某聳聞除音喜至滿靣君子得輿民所載也豈但收稽古之功易剝上九君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也桓榮傳榮為少傅賜以緇車乘馬榮大㑹諸生陳其車馬印綬曰今日所蒙稽占之力也可不勉哉衮職有闕我儀圖之知必稱納言之任詩王命仲山甫式是百辟出納王命王之喉舌德輶如毛民鮮克舉之我儀圖之維仲山甫舉之袞職有闕維仲山甫補之若方朔之餓欲死東方朔傳侏儒長三尺餘奉一囊粟錢二百四十臣朔長九尺餘亦奉一囊粟錢二百四十侏儒飽欲死臣朔飢欲死與杜陵之凍且僵杜詩杜陵野老骨欲折注杜陵野老公自稱也杜陵乃公所居之地前漢地理志杜陵屬長安古杜伯國宣帝葬此因曰杜陵杜詩吾廬獨破受凍死亦足不知命而且鳴且號亦無恥矣韓文知其在命而且鳴號之者亦命也其潔已之與進與退惟所命之賀陳尚書率除吏部尚書仍兼內翰成都運司作峻長六卿白集鄭絪吏部制天官太宰秩序常尊自昔迄今冠諸卿首增崇八座續漢書光武分增三公曹為二公其一曹主嵗盡諸州郡事常侍曹主選舉祠祀民曹主繕工作鹽池苑囿客曹主護駕羌胡朝賀二千石曹主詞訟中都官主水火盜賊與三公為六曹并一令一僕二人謂之八座惟王有成績紀於日月之常尚書萬邦咸休惟王有成績又厥有成績紀於太常命汝作納言引此星辰之履尚書命汝作納言夙夜出納朕命惟允杜詩聽履上星辰仍専鼇禁筆談宋白賈黃中皆先達巨儒同在鼇禁李衛公詩素壁有飛鶴仙圖見巨鼇國老閒談衆景文公祈守益州以翰林承㫖召以詩寄丞相云寧知不是神仙骨上到鼇峯最上頭增重雞翹說文翹尾長毛也後漢書輿服志鸞旗者編羽毛列繫幢旁民或謂之雞翹李商隱詩屬車無復插雞翹恭惟某官學嚌道真嚌音劑說文嘗也禮記小祥之祭主人之酢也嚌之注嘗也至齒新唐書文藝傳擩嚌道真涵泳聖涯器涵天粹法言天精天粹萬物作類絶識洗空於萬馬全才立解於千牛見前積江漢經營之勞詩序江漢尹吉甫美宣王也能興衰撥亂命召公平淮夷詩江漢湯湯武夫洸洸經營四方告成于王有河山帶礪之烈見前允文允武詩穆穆魯侯敬明其德敬慎威儀維民之則允文允武昭假烈祖立德立功左傳太上立德其次立功還頗牧於禁中悍卒回心於讀詔見前講唐虞於氊上頑民聽命於舞干尚書舞干羽於兩階七旬而有苖格茲膺典選之升陳蕃傳與黃琬共典選舉不偏權富新唐書裴行儉傳與李敬𤣥馬載同典選有能名時號裴馬始是奮庸之漸文昌垂象實為上將上相之躔史記天官書戴匡六星曰文昌宫一曰上將二曰次將三曰貴相四曰司命五曰司中六曰司祿李尋傳天官上相上將皆顓靣正朝注朝太微宫垣也西垣為上將東垣為上相武帳前龜行有為保為師之命霍光傳盛服坐武帳中汲黯傳上嘗坐武帳應劭曰武帳織成帳為武士象也孟康曰今御武帳置兵闌五兵於帳中也師古曰孟說是也梁書何敬容傳回豐貂而步文昌聳高蟬而趨武帳許敬宗詩武帳臨光宅文衛象鈎陳禮記龜為前列先知也東坡集庭實旅百貢先前列之龜工歌拜三義取食野之鹿大戴禮周成王幼在襁褓之中召公為太保周公為太傅太公為太師環濟要略殷時有阿衡伊摯佐之太甲改為保衡皆三公官也暫煩長文制九品之任魏略陳羣字長文延康元年始建九品官人之法拜吏部尚書行見曲逆遂萬物之宜陳平傳帝南過曲逆曰壯哉縣吾行天下獨見雒陽與是耳於是更封平為曲逆侯王陵傳宰相者上佐天子理陰陽順四時下遂萬物之宜行字重上某未解漕冰趙充國傳冰解漕下正馳驛路北山移文馳煙驛路勒移山庭聞尚書之踐台斗或垂念於孤槎杜詩萬象皆春氣孤槎自客星聽散人之拜江湖早歸身於三徑陸龜蒙詩官家未議活蒼生拜賜江湖散人號詳見前賀鍾侍郎震除左侍郎兼中書及侍講大君渙號小宰升賢周禮小宰之職掌建邦之宫刑以治王宫之政令曲阜除傳堯俞制吏部古之天官而侍郎小宰之職三銓審官尤重左曹之衡尺杜氏通典開元以來宰相員少資地崇高又以兵吏尚書權位尤美而宰臣多兼領之但從容衡軸不自銓綜其選試之任皆侍郎專之尚書通署而已遂為故事或分領其事則列為三銓尚書掌其一侍郎分其二尚書所掌謂之尚書銓侍郎所掌其一為中銓其一為東銓江總讓吏部尚書表內侍帷扆入尸衡尺權集吏部郎裁百辟之章疏助九流之刀尺一佛出世仍兼右掖之絲綸見前碧落彌高杜詩碧落真難涉青雲不可梯互見前紫薇增煥見前恭惟某官目營四海莊子視若營四海注視之儡然似營他人事者胸著千年陳後山詩胸中厯厯著千年筆下源源赴百川關百聖於寸心不夷不惠而願孔子之學法言或問子蜀人也謂人曰有李仲元者人也其為人也奈何曰不屈其意不纍其身曰是夷惠之徒歟曰不夷不惠可否之間也黃瓊傳不夷不惠可否之間蓋聖賢居身之所珍也掃千軍於獨筆非韓非孟而成歐陽之文老泉上歐陽內翰書孟子之文語約而意盡不為巉刻嶄絶之言而其鋒不可犯韓子之文如長江大河渾浩流轉魚黿蛟龍萬怪惶惑而抑遏蔽掩不使自露而人望見其淵然之光蒼然之色亦自畏避不敢迫視執事之文紆徐委備往復百折而條達疏暢無所間斷氣盡語極急言竭論而容與間易無艱難勞苦之態此三者皆斷然自為一家之文也蓋執事之文非孟子韓子之文而歐陽子之文也雲雷十載之經綸易雲雷屯君子以經綸注屯者天地造始君子經綸之時江漢六年之方泳詩漢之廣矣不可泳思江之永矣不可方思泳音羕爾雅游也方音舫傳泭也爾雅舫泭也疏云水中為泭筏也怒鵬既擊凡馬皆空蛻骨地仙直上蓬萊瀛洲之島仙經上士舉形升虛謂之天仙中士遊於名山謂之地仙下士先死後蛻謂之尸解餘見前彯纓天策遍儀承明金馬之庭彯紕紹切彯彯長組貌文選士子彯華纓梁書張充傳彯纓天閣既謝廊廟之華綴組雲臺終慙衣冠之秀唐書褚諒傳上以秦王功大前代官不足稱之特置天策上將軍位在王公上開天䇿府置官屬西都賦有承明金馬著作之庭漢書注承明廬在石渠閣外金馬門武帝時相馬者東門京作銅馬法獻之立馬於魯班門外更名魯班門為金馬門堯醲舜醺最宜為誥洪適啓堯醲舜醺絶翰墨之畦徑周情孔思酌道德之淵源韓文天子曰王某之文可思最宜為誥有古風班香宋豔安敢比材非道不陳於前在庭無出其右日獻月納爾有嘉謀並見前年拜嵗遷士無異論四輔既備命史佚以記言大戴禮明堂之位曰道者導天子以道者也常立於前是周公也充者充天子之志常立於左是太公也弼者拂天子之過者也常立於右是召公也承者承天子之遺忘者也常立於後是史佚也故成王中立而聽朝則四聖維之是以慮無失計而舉無過事五禮有庸咨伯夷而降典尚書天秩有禮自我五禮有庸哉又伯夷降典折民惟刑露門重席周書武帝建德三年朝羣臣露門武帝平齊拜熊安生露門傳士保定中置露門學沈重於露門館講論語以劉臻明克遜為露門學士戴慿傳憑為博士正旦光武令羣臣說經史相詰難有不通輒奪其席以益通者慿遂重坐五十餘席殷氏世傳殷亮建武中徵拜博士遷講學大夫諸儒講論勝者賜席亮重席至八九帝嘉之曰學不當如是耶星户鳴珂杜詩星臨萬户動新唐書張嘉祐傳兄嘉貞為相嘉祐任右金吾衛將軍昆弟每上朝軒蓋騶導盈閭巷時號所居坊曰鳴珂里王維詩更慙衰朽質南陌共鳴珂隋辛德源詩鳴珂蹀細柳飛雲出宜春緝熙有賴於仔肩詩學有緝熙於光明佛時仔肩示我顯德行佛音弼大也仔音兹任也言大是肩任也左右宜咨於汝翼尚書豫欲左右有民汝翼掌六典之二更追裴馬之蹤周禮小宰之職掌邦之六典八法八則之二以逆邦國都鄙官府之治新唐書盧從願傳睿宗立拜吏部侍郎吏選自中宗後綱紀耗蕩從願精力於官僞牒詭功擲檢無所遺銓總六年以平允聞初高宗時吏部號稱職者裴行儉馬載及是從願與李朝隱為有名故號前有裴馬後有盧李遂萬物之宜即接䕫龍之武新唐書上官儀傳接武䕫龍簉羽鵷鷺餘見前某夙蒙推挽左傳或推之或挽之竟自顛隮尚書今爾無指告于顛隮史記微子世家今爾無指告豫顛隮如之何其今墮孤雲落照之邊東坡詩膠西高處望西川應在孤雲落照邊誰復高山流水之賞吕氏春秋伯牙鼓琴鍾子期善聽之方鼓琴志在太山鍾子期曰善哉乎鼓琴巍巍乎如太山志在流水鍾子期曰善哉乎鼓琴洋洋若流水江梅尚難於寄驛荆州記陸凱與范曄相善自江南寄梅花一枝詣長安與曄贈詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春學齊占俾云寄梅事人皆以為始於陸范不知劉向說苑已載越使諸發執一枝梅遺梁王梁王之臣曰韓子者顧左右曰焉有一枝梅乃遺列國之君則折梅遣使始此海棕詎易以移根杜陵海棕行左綿公館清江濆海棕一株高入雲龍鱗犀角相錯落蒼棱白皮十抱文自是衆木亂紛紛海棕焉知身出羣移栽北辰不可得時有西域胡僧識然蓬娑雪邊十暑碎杜陵之葛杜詩欲奪蓬娑雪外城又十暑岷山葛餘見前在玉堂天上一寒望范叔之袍山谷詩天上玉堂森寶書餘見前賀江陵趙制置方除工部侍郎宋史趙方字彥直衡山人少從張栻學淳熙八年舉進士纍官金部員外郎加直祕閣改湖北轉運判官兼知鄂州升直煥章閣進祕閣修撰知江陵府主管湖北安撫司使兼權荆湖置司進右文殿修撰權工部侍郎寶謨閣待制京湖制置使兼知襄陽府以禦金人功遷龍圖閣待制封長沙縣男進煥章閣直學士再進徽猷閣待制大中大夫權刑部尚書卒纍贈太師諡忠肅論曰方少從張栻學許國之忠應變之略隱然有尊爼折衝之風其部曲如扈再興孟宗政皆為名將方之子范葵皆以功名自見不愧其父有足稱者優詔元戎詩元戎十乘元大也元戎周車名有戎車十乘以在軍先此指將帥升卿起部杜氏通典晉宋以來有起部尚書而不常置每營宗廟宫室則權置之事畢則省以其事分屬都官左民二尚書司空用以寵舊荆之牧未曰殊恩貴人不待入長安之城亶為異數史記張丞相列傳韋丞相死匡君代為丞相封樂安侯以十年之間不出長安城門而至丞相豈非遇時而命也哉中權增壯上眷彌深恭惟某官氣直而溫尚書直而溫材𢎞以毅稟衡山扶輿之積人知鍾駿嶽之神韓文衡山之神既靈而郴之為州又當中州清淑蜿蟺扶輿磅礴而鬱積意必有魁竒忠信材德之民生其間詳見前詩嵩高維嶽駿極于天維嶽降神生甫及申師葵軒正大之傳天使夀熊湘之學方輿勝覽昔熊繹始封于此故名熊湘史記南至于江登熊湘注熊耳山在商州洛縣西十里湖山一名艑山在嶽州巴陵縣南十八里聞善若決疾惡如風後漢朱震字伯厚為州從事奏濟陰太守單匡贓罪並連匡兄中常侍超桓帝收匡下獄以譴超超詣獄謝三府諺曰車如雞栖馬如狗疾惡如風朱伯厚粵從使指之膚司馬相如傳宣其使指令百姓皆知天子意法言古之膚使膚美也出領制垣之重姦貪膽落洗空當道之豺狼孫寶傳豺狼橫道不宜復問狐貍後漢張綱傳豺狼當道安問狐貍邉徼心寒驚遁繞枝之烏雀寬九重顧既四三年尚書或五六年或四三年江左見導無憂固將大用北門非凖不可未免小留惟無敵知儒者之真況有功見賢人之久徒得君重使若豫工竝見前豹尾雞翹獻納上司於雨露後漢書輿服志大駕屬車八十一乘最後一車懸豹尾崔豹古今注豹尾車周制也象君子豹變尾言謙也古軍正建之今惟乘輿得建焉餘見前熊旗犀節嘽焞外震於雷霆韓文錫盾雕戈犀甲熊旗詩嘽嘽焞焞如霆如雷嘽吐丹反衆也焞吐雷反盛也言戎車既衆盛其威又如雷霆又嘽嘽然閒暇而有餘力之貌營壘旗幟初無所更新唐書李光弼傳光弼治師訓整天下服其威名其代郭子儀朔方也營壘士卒麾幟無所更而光弼一號令之氣色乃益精明云朝野人士皆為之慶王導傳人士每至暇日相邀出新亭飲宴應參傳臨漳人士無不詣之三都賦序課人士之優劣王羲之傳與東土人士盡山水之遊周顗傳人士益宗附之殷浩傳都下人士盧志傳人士一時駭散梁書劉峻傳吳㑹人士多從其學王澄傳嘗為天下人士月侯景傳人士競談𤣥理不習兵事晉書甘卓傳學校久替人士流播陳頵傳河北白壤膏梁何故少人士又豫州人士常半天下顧衆傳吳中人士同時響應刁協傳人士何故反助寒門溫嶠傳人士結舌又拘録人士又仗人士之誠又著于人士之口南史王泰傳泰能接人士王𢎞傳謂之人士便無庶人之坐署為庶人輒受人士之罰洞庭彭蠡可但為分北之區史記吳起傳昔三苗氏左洞庭右彭蠡德義不修禹滅之尚書庶績咸熙分北三苗廣漢江沱蓋亦繫二南之化詩序漢廣德廣所及也文王之道被於南國美化行乎江漢之域無思犯禮求而不可得也江有汜美媵也勤而能怨嫡能悔過也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也況占雲祲祲子鴆切周禮保章氏以五雲之物辨吉凶水旱視祲掌十輝之法一曰祲注陰陽氣相侵廣韻日旁氣也師古曰祲謂陰陽相沒漸以成災祥當護風寒見第五卷榮州到任謝制置條竊窺往年根本宜固之言及讀近日無窮事業之奏萬國玉帛豈甘安王業之偏左傳禹合諸侯於塗山執玉帛者萬國出師表漢賊不兩立王業不偏安百世邱墟亦貴度時賢之力公孫𢎞傳丞相府客館邱墟而已師古曰虛讀曰墟王羲之傳大為時賢所笑南史王儉傳欲引時賢參贊大業願謹郊圻之申畫姑思牖户之綢繆中興當用實材更訪英豪於物外上策莫如自治合商得失於楮中與民守之吾庸多矣朝廷已深知治行豈但儀簪槖之班魏相傳丙吉豫相書曰朝廷已深知弱翁治行方且大用矣牙纛不足為公榮要當勉旗常之績歐陽公畫錦堂記高牙大纛不足為公榮桓圭衮冕不足為公貴某雖無學術知有忠賢頃捧辟書輒千賔謁不緣介紹蒙稱人品之高尋困憂恫又為地主之纍左傳侯伯致禮地主歸餼注地主所㑹主人也杜詩若非劉皓為地主懶回鞭轡成高宴韓翃詩吳郡陸機稱地主錢塘蘇小是鄉親今者尋磨驢之步東坡詩應笑謀生拙團團如磨驢又團團如磨牛步步踏陳迹復茲修賀燕之恭登樓而憶仲宣豈但感凋零之迹下堂而執鬷蔑或許傾結納之心竝見前賀趙制置彥呐除兵部侍郎宋史趙彥呐字敏若彭州人登四川類試第少以材稱吳曦叛以祿禧僞守䕫彥呐結義士殺之遂顯名嘉定十三年關外西和州新被兵制使安丙檄使經理金人再至戰却之在州五年得軍兵心轉提㸃刑獄尋帥沔及崔與之代丙始察其大言無實謂他日誤事必此人尋奪其節制寶慶元年移帥興元三年鄭損棄四州彥呐力爭不勝罷歸家者五年紹定四年桂如淵代損起彥呐為副使更李􅌫黃伯固皆彥呐副之端平元年遂拜正使三年金人大入彥呐大敗貶衡州卒顯冊宗藩史記楚元王世家為漢宗藩升卿武部通典天寶十一載改兵部為武部至德初復舊司馬掌九伐之法外益重於中權周禮大司馬之職以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之㬥內凌外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弒其君則殘之犯令凌政則杜之內亂禽獸行則滅之元戎先十乘之行逺式遄於近列詩元戎十乘以先啓行又式遄其歸注元戎周車名可以先列啓突敵陳之前行式用遄連也傳聞四海欣懌一詞東坡啓傳聞四海歡喜一詞恭惟某官迪德碩膚負材壞特獻宗英之禮樂卓爾不羣河間獻王傳武帝時獻王來朝獻雅樂對三雍贊曰夫唯大雅卓爾不羣河間獻王近之矣謀元帥於詩書飄然無敵杜詩白也詩無敵飄然思不羣餘見前文武作萬邦之憲精神折千里之衝見前三百㕓兮竊笑無功之利祿詩不稼不穡胡取禾三百㕓兮十八年矣備嘗在外之艱難左傳晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情僞盡知之矣自殄鯨鯢之妖言誅祿禧益壯貔貅之氣尚書爾尚桓桓如虎如貔蘇詩野宿貔貅十萬軍詳見前兹膺天寵易在師中吉承天寵也迄拜夏卿職林大司馬亦曰夏卿奬三軍以定中原聿觀偉績出師表南方已定兵甲已足當奬帥三軍北定中原間兩社而輔公室佇接前芳左傳間於兩社為公室輔注周社亳社兩社之間朝廷執政所在疏魯是周之諸侯故國社謂之周社哀四年亳社災是魯國有亳社魯外朝在庫門之內東有亳社西有國社歐陽公詩誠知非所敵但欲繼前芳王荆公詩中和助宣布循吏綴前芳某治任方歸聞報失喜杜詩似聞胡騎走失喜間京華注失喜言出於不自覺知有功之則悅見前見無德之不酬詩無言不酬無德不報錦城雖樂不如蚤還益增西望杜詩錦城雖云樂不如早還家繡裳無所於汝信處更佇東歸詩我覯之子衮衣繡裳鴻飛遵渚公歸無所於女信處注再宿曰信我周公未得王迎之禮歸則無其住所故於汝東方信宿而處耳言終不久留賀朱倉在除度支任兩浙運幹宋史道學傳在熹之子紹定中為吏部侍郎理宗寶慶二年工部侍郎朱在進對奏人主學問之要上曰光卿中庸序言之甚詳朕讀之不釋手恨不與同時勞使臣之還而歌四牡知入重於郎垣見前旅天子之命而作嘉禾又暫留於輔邸書序唐叔得禾異畝同穎獻諸天子王命歸周公于東作嘉禾蕞爾幕下之士託於畿內之侯敬德已深修辭敢後恭惟某官政由學出心以家傳昔者周公固望伯禽之後見前趨亦夫子誰知孔鯉之異聞莊子夫子步亦步夫子趨亦趨雖剛大之氣浩然而中庸之德至矣揭節以出送以禮樂而有光馮衍傳懷金垂紫揭節奉使注揭持也餘見前當官而行編之詩書而無愧左傳當官而行何彊之有韓文鋪張對天之閡休揚厲無前之偉績編之乎詩書之䇿而無愧措之乎天地之間而不虧兹拜握蘭之召李山甫詩南宫郎暑握新蘭又為騎竹而留見前斂惠而施一州寧容黔突韓文斂此大惠兮施於一州班固賔戲孔席不暖墨突不黔輯瑞而班羣后即聽紫泥尚書輯五瑞既月乃日覲四嶽羣牧班瑞于羣后隴右記武都紫水有泥其色亦紫而粘貢之用封璽書故詔誥有紫泥之美李山甫詩紫泥飛詔下金鑾某偶爾依蓮正兹索米囊粟二百之俸實隸治封遣介咫尺之書敢修庸敬竝見前代回宫使待制史侍郎彌堅詳啓意蓋代月湖二訓夏之刑己慙弗績書序吕命穆王訓夏贖刑傳訓暢夏禹贖刑之法尚書三載績用弗成攝司冬之典有愧誤恩蔡謨傳昔階謬恩䝉忝非據阮籍傳乞回謬恩以光清舉陳後山詩將老蒙誤恩受弔不受賀王荆公詩誤恩三品竟何酬東坡湖州謝上表荷先帝之誤恩擢置三館蒙陛下之過聽付以兩州又辭免翰林學士承㫖狀計此誤恩必難安處曾㢲謝之未遑遽謙光之先辱恭惟某官久勞於外式遄其歸詩仲山甫徂齊式遄其歸大纛高牙茂展幹方之略晉書王渾傳齊王攸當之藩渾上書諫曰攸於大晉姬旦之親也宜贊皇朝與聞政事今陛下出攸之國假以虛號而無典戎幹方之實非陛下追述先帝太后待攸之宿意也餘見前珍臺閒館暫從均佚之謀甘泉賦珍臺間館西京賦珍臺蹇産以極壯六一居士集賜韓琦詔方均逸豫適此外虞言領宫使輟湘水之曉行趣宣室之夜對有勤餘芘亦及陳人竝見前某視蔭幾何左傳趙孟視蔭曰朝夕不相及誰能待五蔭日景也周書王裒傳視蔭愒日猶趙孟之徂年負杖行吟同劉琨之積慘強顏已甚司納言之㗋舌轉覺濫竽韓子齊宣王使人吹竽必三百人齊吹南郭先生不善吹竽而濫於三百之中食祿宣王死湣王立好一一聽之先生乃逃梁書庾肩吾傳懷鼠知慙濫竽自恥借餘論於齒牙早期納履說苑田子方曰士貧賤者言不用行不合則納履而去耳禮記坐左納右疏云納猶著也著右足之屨曲禮俯而納屨同此義按古詩云瓜田不納履當作納屨經傳無納履之語曲禮俯而納屨俯低頭也納猶著也低頭著屨似有所取故人見疑履無帶著時不必低頭然則說苑納履亦當是納屨之誤臺諫臺謂御史臺前代沿革不常宋元豐三年李定請復六察於是以御史專領六察其後大正官名不除大夫檢校官帶憲銜者亦除去以中丞為長知雜事為侍御史言事官為殿中侍御史六察官為監察御史諫謂諫院宋承五代之弊官失其守官職差遣才以定俸入而不親職諫議大夫司諫正言皆須别降勑許赴諫院供職者方為諫官明道元年陳執中為諫官屢請置院于是以門下省為諫院置諫院自此始元豐正名左右諫議大夫為諫垣之長專言責焉左隸門下右𨽻中書同掌規諫諷諭凡朝政闕失大臣至百官任非其人三省至百司事有失當皆得諫正賀洪郎中咨䕫除察院成都運司作宋史洪咨䕫字舜俞於潜人嘉定二年進士纍官祕書郎遷金部員外郎忤史彌逺臺諫李知孝梁成大交論鐫二官彌逺死帝親政五日即以禮部員外郎召入見問在外人物以崔與之真德秀魏了翁對異日與王遂竝拜監察御史厯官刑部尚書翰林院知制誥力求去加端開殿學士卒贈兩官親擢郎濳張衡思𤣥賦尉龎睂而郎濳兮逮三葉而遘武漢武帝故事帝輦過郎署見顏駟龎睂皓髮問曰叟何時為郎對曰臣文帝時為郎文帝好文而臣好武景帝好美而臣貌醜陛下好少而臣已老是以三世不過故老於郎署帝感其言擢拜㑹稽都尉進司臺察五代㑹要御史六員監察謂之分察使唐百官志監察御史其一察官人善惡其二察户口流散帳籍隱沒賦役不均其三察農桑不勤倉廩耗減其四察妖猾盜賊不事生業為私蠧害其五察德行孝弟茂才異等藏器晦迹應時用者其六察㸃吏豪宗兼并縱暴貧弱寃苦不能自伸者十年去國安泉石之膏肓錢氏私志云張天覺丞相再召到闕謝表云十年去國門前之雀可羅一日還朝屋上之烏亦好後有一達官效顰云十年去國不聞長樂之鍾一日還朝復見大君之鼎時魏漢津所鑄九鼎初成也新唐書田游嚴傳泉石膏肓煙霞痼疾詳見前洪咨䕫傳咨䕫以臺諫交論鐫二秩讀書故山七年一札起家任朝廷之耳目劉歆傳以病免官起家復為安定屬國都尉新唐書韋思謙傳進御史大夫見王公未嘗屈禮或以為譏答曰耳目官固當特立鵰鶚鷹鸇豈衆禽之偶奈何屈以狎之公無欣戚邦有榮懷尚書邦之榮懷亦尚一人之慶恭惟某官行守宫庭荀子是君子之所以騁意於壇宇宫庭也詳見前道探壼奧漢書叙傳究先聖之壼奧壼苦本切宫中門謂之闈宫中巷謂之壼養以剛大獨扛百斛之龍文史記秦武王與孟說舉龍文赤鼎絶臏死東京賦寶鼎見兮色氤氲煥其炳兮被龍文韓詩龍文百斛鼎筆力可獨扛出其緒餘連中八科之鱗角莊子道之真以治身其緒餘以為國家唐張鷟文章俊敏凡應八舉皆登甲科員半千見其文曰張子之文如青錢萬簡萬中時目為青錢學士舒元輿傳披剔剖抉拔犀之角擢象之齒北史文苑傳學者如牛毛成者如麟角惟其守専而退勇是以任重而進難社下之肉既均尋拜護軍之曲逆陳平傳里中社平為宰分肉甚均父老曰善陳孺子之為宰歸漢漢王與說悅之拜平都尉典護軍餘見前治中之足未展顧令乘障於陰平蜀志龎統傳使居治中别駕之任始當展其驥足張湯傳遣山乘障老學庵筆記陰平在今文州有橋曰陰平淳熙初為郡守者大書立石於橋下曰鄧艾取蜀路過者笑之按鄧艾所出古陰平道在今文州漢陰平也其地與江油為鄰宋隆慶府陰平縣自晉宋始置非鄧艾之陰平也儀粉省以歸班杜詩馨香粉署妍錢起詩粉署花驄入又粉署含香别白樂天詩紫界宫墻白粉闈韋應物詩歸來坐粉闈羅隱詩清貧粉署官封皂囊而論事蔡雍傳以皂囊封上注漢官儀凡章表皆啓封其言密事見皂囊也回天有力方將批徑尺之鱗史記韓非傳夫龍之為蟲也可擾狎而騎也然其喉下有逆鱗徑尺人有嬰之則必殺人人主亦有逆鱗說之者能無嬰人主之逆鱗則幾矣荆軻傳奈何以見陵之患欲批其逆鱗哉餘見前偃月生疑已不容立仗之馬新唐書奸臣傳李林甫有堂如偃月號月堂每欲排搆大臣即居之思所以中傷者若喜而出即其家碎矣林甫居相位諫官皆持祿養資無敢正言者補闕杜再上書言政事斥為下邽令因以語動其餘曰君等不見立仗馬平終日無聲飫三品芻豆一鳴則黜之矣洪咨䕫傳遷金部員外郎㑹求直言慨然曰吾可以盡言寤主矣史彌逺讀至濟王之死非陛下本心大惠擲於地轉考功員外郎轉對復言李全必為國患於是臺諫交論鐫二官曾謂考工一出息之頃韓文韋侯以考功副郎守盛山人謂考功顯曹盛山僻郡韋侯將怨且不釋矣或曰不然韋侯儒者儒者之于患難茍非其自取之拒而不受於懷況一不快于考功盛山一出入息之間哉遂見拾遺九鑽火之明杜詩九鑽巴噀火三蟄起初雷星既坼於中台晉天文志惠帝永康元年三月中台星坼占曰台星失常三公憂是月趙王倫斬司空張華夷三族洪咨䕫傳咨䕫讀書故山七年而彌逺死席遂前於半夜宋史理宗紹定六年冬十月史彌逺薨十一月禮部郎中洪咨䕫進對命咨䕫洎王遂同為監察御史甫登表著左傳叔向曰朝有著定㑹有表㑹朝之言必聞於表著之位師古曰朝內列位有定處所謂表著者也徑拜裏行新唐書百官志有御史裏行使侍御史裏行使殿中裏行使監察裏行史以未為正官無員數獬豸觸邪難置豺狼而不問六典法冠亦名獬豸冠以獬豸觸不直故執憲者以為冠唐則天時侯思止為遊擊將軍高元禮謂之曰國家用人不次若言侯大不識字即奏云獬豸亦不識字而能觸邪則天果如其問思止以獬豸對乃拜左臺侍御史鷹隼始擊尤關龍象之共觀孫寶傳立秋鷹隼始擊當順天氣取姦惡以成嚴霜之誅言行録吕希哲除右司諫蘇軾戲之曰法筵龍象當觀第一義傳燈録波羅是法中龍象言其力大龍水行中力大象陸行中力大故以負荷大法者比之龍象杜詩如聞龍象泣山谷詩高居大士是龍象聳聞破頭宋史理宗紹定六年洪咨䕫言資政殿學士袁韶仇視善類諂附彌逺險忮傾危詔袁韶奪職罷祠祿已足膽落舊唐書溫造字簡輿拜侍御史李祐自夏州入拜金吾違制進馬一百五十匹造正衙彈奏祐股戰流汗私謂人曰吾夜踰蔡州城禽吳元濟未嘗心動今日膽落於溫御史吁可畏哉刋九山滌九川陂九澤通地氣以上騰尚書九山刋旅九川滌源九澤既陂四海㑹同禮記孟春之月天氣下降地氣上騰天地和同闢四門明四目達四聰發天光而下濟尚書詢於四嶽闢四門明四目達四聰易天道下濟而光明地道卑而上行此真御史矣言行録王敏懿公素既升臺憲風力愈徑嘗與同列奏事上前有不合衆皆引去公方論列是非候得㫖乃退帝歎曰真御史也議者目公為獨擊鶻國史張錫為御史言丁謂不當徙內地昭應災不當以罪人京師之人皆曰張御史貌柔和而心剛正真御史也豈憂胸奴哉馮唐傳吾獨不得亷頗李牧為將豈憂胸奴哉詳見前鑄金鼎以圖姦不難調鼎左傳昔夏方有德逺方圖物貢金九牧鑄鼎象物百物而為之備使人知神姦故民入川澤山林魑魅魍魎莫能逢之說文昔禹貢九牧之金鑄鼎荆山之下崔瑗鼎銘大禹鑄鼎象物百神察玉衡而齊政然後保衡尚書在璿璣玉衡以齊七政又在太甲時則有若保衡孔傳言天下所取安所取平某一寒漕冰六暑戍雪俱見前將返閭閻而曝日列子宋國有田夫常衣賡過冬春東作曝日於野美之不識廣厦綿纊之屬謂其妻曰負日之暄以獻吾君必獲重賞歐陽公內制集序涼竹簞之暑風曝茅簷之冬日喜聞臺閣之生風陳子昻集繡衣始拜珥筆升朝臺閣以之生風豪貴由是斂手山谷詩霜臺御史生風鵰鶚之在秋天儻或寬於西擊杜詩蛟龍得雲雨鵰鶚在秋天烏鵲之繞夜月願姑聽其南飛見前賀王寺簿遂除察院成都運司作宋史王遂字去非一字頴叔韶之𤣥孫後為鎮江府金壇人嘉定二年進士厯太常寺主簿遷監察御史極論史嵩之欺君誤國李知孝梁成大莫澤肆無忌憚纍官工部尚書與同里劉宰素同志遂守平江宰贈之言曰士友當親而賢否不可不辨財利當逺而㑹計不可不明折獄以情毋為私意所牽薦士以才毋為權要所奪當言則言不視時而退縮可去則去不計利而遲回蓋格言也峻擢容臺尚書式商容之閭史記索隱商禮樂官知禮容故禮部太常稱容臺進司糾院唐㑹要六察紏繩百司理宗紀紹定六年以王遂為監察御史明天子厲精之日爭覩親除循吏傳始躬萬幾厲精為治洪咨䕫傳咨䕫與遂竝拜監察御史咨䕫感激知遇謂遂曰朝無親擢臺諫久矣要當極本窮源而先論之真御史遴選其人迄符衆望見上條風雲感㑹易雲從龍風從虎班固答賔戲彼皆躡風雲之㑹劉𤣥傳贊假我風雲二十八將傳論感㑹風雲奮其智勇晉書戢鱗濳翼思屬風雲王猛傳斂翼待時候風雲而後動杜詩風雲感㑹起屠釣韓詩風雲一朝㑹變化在一身元稹詩風雲一㑹合呼吸期萬里山嶽動搖舊唐書韋仁約字思謙援監察御史嘗謂人曰御史出都若不動搖山嶽震懾州縣誠曠職耳恭惟某官心幹九秋文熖萬丈摘髭名第不應州縣之徒勞韓詩連年收科第若摘頷底髭王遂傳遂調富陽主簿厯官差幹辦諸司審計司䇿足要津共擬公侯之必復古詩胡不䇿高足立登要路津餘見前堅車大艦每難於進光風霽月既久則明上欲求忠臣之尊王尊傳王陽為孝子王尊為忠臣詳見前念無易太常之肅魏志王肅字子雍嘉平六年持節兼太常嚴霜烈日姑令鑄金鼎以察姦縫霧裁雲行即登玉堂而草制俱見前某久違楓陛聞進藎臣詩王之藎臣無念爾祖傳藎進也王之進用臣當念汝祖為之法行行且止而避驄莫陪旅賀皇皇者華之維駱願以汰歸竝見前賀董司諫居誼進思補闕史記管晏傳進思盡忠退思補過仍侍爾英玉海景祐二年名崇政殿西閣曰延義西南閣曰邇英二閣在崇政殿東西侍臣講讀之所趙師民勸講針肇開二閣以延儒服西臨邇英北啓延義責重寄隆益可告嘉猷於後謀從言聽專當下膏澤於民朝野喧然蔡君謨詩御筆親除三諫官喧然朝野競相歡宗社幸甚恭惟某官所養剛大而道中庸人方此重而彼輕公獨以退而為進法言請問進退曰昔乎顔子以退為進天下鮮儷焉韓文知吾之退未始不為進而衆人之進未始不為退也廷臣無出右者天子居然器之俱見前拔自州麾遍儀朝著亟拜拾遺之命通典武后垂拱中置補闕拾遺二官以掌供奉諷諫自開元以來尤為清選仍陪勸講之聯楊秉傳桓帝即位秉以引尚書徵入勸講上疏不納以病乞退太尉黃瓊惜其去朝廷上言秉勸講帷幄不宜外遷留拜光祿大夫緝日月之光良多啓沃詩日就月將學有緝熙于光明注將行也緝熙光明也每日有所成就至于一月則有可行言當習之以積漸也學有緝熙於光明謂選擇賢中之賢乃從之學以賢者必有光明之德故以光明表賢也此借用尚書啓乃心沃朕心犯雷霆之怒大有激揚新唐書韋溫傳遷右補闕宰相宋申錫被搆罪不測溫倡曰丞相操履有初不宜反乃奸人陷之吾等豈避雷霆使上蒙霿咎率同舍伏閣切爭由是益知名不賣直以取名新唐書姜公輔傳公輔為諫議大夫諫厚葬唐安公主帝怒謂陸贄曰朕以公輔才不足以相而又自求解朕既許之內知且罷故賣直售名爾惟格王而正事尚書惟先格王正厥事簡在中扆遂升左垣考司諌七品官之階雖云序進歐陽永叔上范司諫書司諫七品官爾於執事得之不為喜而獨區區欲一賀者誠以諫官者天下之得失一時之公議係焉然大人一正君之事正屬斯存今目前無必至之憂而天下有未形之患敵鋒外熾民力中乾天文變怪而難諶尚書天難諶命靡常宋史理宗寶慶元年六月辛卯太白晝見十一月癸巳有流星大如太白二年四月辛亥有流星大如太白九月辛亥熒惑嵗星填星合于女熒惑犯填星十一月辛酉熒惑犯嵗星三年七月乙酉太陰犯星八月庚戌太白熒惑合於翼紹定元年六月己酉流星晝隕七月戊戌熒惑犯南斗十月戊申熒惑犯壁壘陳星丁巳熒惑填星合於危甲子熒惑犯填星十一月癸酉熒惑入羽林二年正月丁亥熒惑嵗星合于婁九月壬辰有流星大如太白十一月己丑熒惑入氐三年六月己酉嵗星入井十月己巳熒惑填星合于室十一月丁酉有星孛于天市垣丁未流星晝隕四年七月庚戌有流星大如太白五年五月癸巳太白經天晝見六月乙丑熒惑填星合于婁熒惑順行犯填星七月甲申太白入井八月壬申太白嵗星合於張閏九月己酉有流星大如太白庚戌彗星出于角六年二月癸卯熒惑犯東井五月庚戌太白熒惑合於柳人才卑少而不競增韻競盛也左傳南風不競民保於信而信屢失位守以仁而仁不流易何以守位曰仁吏惰且貪兵虛仍脆無非事者請先大者之圖彼何人斯尤賴辨之之早詩彼何人斯其心孔艱易由辨之不早辨也自古建久安之勢成長治之業莫若杜羣枉之路開衆正之門竝見前國人曰賢左右皆曰賢無使滯淹之久君心以正逺近一以正切防浸潤之行董仲舒傳為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不一於正閫內閫外不容二心史記馮唐傳上古王者之遣將也跪而推轂曰閫以內者寡人制之閫以外者將軍制之注門中橛曰閫漢書作闑謂門限也宫中府中當為一體出師表宫中府中俱為一體陟罰臧否不宜異同舍豺問貍則民不服孫寶傳豺狼橫道不宜復問狐貍師古曰言不當釋大而取小也張綱傳豺狼當道安問狐貍如鷹逐雀則君自尊左傳見無禮於其君者誅之如鷹鸇之逐鳥雀也察嫠婦之私憂左傳嫠不恤其緯而憂宗周之隕回倉公於驚走史記扁鵲傳扁鵲過齊桓侯客之入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾後五日扁鵲復見曰君有疾在血􅀈不治恐深桓侯曰寡人無疾後五日扁鵲復見曰君有疾在腸胃間不治將深桓侯不應後五日扁鵲復見望見桓侯而退走使人問其故扁鵲曰疾之居腠理也湯尉之所及也在血􅀈針石之所及也其在腸胃酒醪之所及也其在骨髓雖司命無之何今在骨髓臣是以無請也按倉公當作扁鵲庶淮南知憚於汲黯汲黯傳淮南王謀反憚黯曰黯好直諫守節死義至說公孫𢎞等如發蒙耳而昌黎無惑於陽城諍臣論若陽子之用心如此滋所謂惑者矣名爵皎然芬芳多矣舊唐書宋璟傳張易之誣搆魏元忠引鳳閣舍人張說使證之說惶惑迫懼璟謂說曰名義至重神道難欺必不可黨邪陷正以求茍堯若緣犯顔流貶芬芳多矣富貴乃吾所有何足計哉蔡澤傳富貴吾所自有吾所不知者夀也忠良得路之難切宜念此蔡君謨詩當年流落丹心在自古忠良得路難某當獻嘉頌顧進苦辭蓋有感平日之知不敢作細人之愛禮記君子之愛人也以德細人之愛人也以姑息諸公不喜生語柔則茹之韓文諸公貴人既志得皆樂軟熟媚耳目者不喜聞生語一見輒戒門以絶詩人亦有言柔則茹之剛則吐之維仲山甫案亦不茹剛亦不吐善人能受盡言遐不謂矣韓文傳曰惟善人能受盡言謂其聞而能改之也詩心乎愛矣遐不謂矣注見前尚欲作石守道紀德之頌言行録石介字守道慶厯三年吕夷簡罷相夏竦罷樞使而杜衍章得象晏殊賈昌期范仲淹富弼韓琦同時執政歐陽修余晴王素蔡襄竝為諫官先生喜曰此盛事也歌頌吾職其可已乎乃作慶厯聖德詩略曰衆賢之進如茅斯拔大姦之去如距斯脫衆賢謂衍等大姦斥竦也詩且出孫明復見之曰子之禍始於此矣幸勿還李師中落韻之詩宋史李師中字誠之楚􅏀人年十五上封事言時政杜衍苑仲淹富弼皆薦其有王佐才唐介字子方江陵人劾宰相文彥博守蜀日造間金竒錦緣閹寺通宫掖以得執政帝怒貶介春州别駕師中與梅堯臣皆賦詩以激美師中詩云孤忠自許衆不與特立敢言人所難去國一身輕似葉高名千古重如山竝遊英俊顔何厚未死奸諛骨已寒天為吾皇扶社稷肯教夫子不生還邵氏聞見録唐介為臺官時言文潞公燈籠錦獻張貴妃事上怒甚謫春州李誠之送以詩云云後介用潞公薦官於朝無所言誠之以書從介索所遺詩介無以報取詩還之曰我固不用落韻詩也以山寒二字韻不同故云青箱雜記云鄭谷與齊已黃損等定今體詩云一曰葫蘆格二曰轆轤格三曰進退格葫蘆韻者先二後四轆轤韻者雙出雙入進退韻者一進一退如李師中送唐介詩兩韻中用韻進退格也代回傅大諫伯成宋史傅伯成字景初少從朱熹學登隆興元年進士權吏部侍郎進寶謨閣侍制知鎮江府全活饑民瘞藏野殍不可勝數制置司欲移焦山防江軍於圗山石碑作成謂虛此實彼利害等耳包港在焦圗之中不若兩寨之兵迭戍焉厯官寶文閣學士贈開府儀同三司賜諡忠簡自天分閫易有隕自天謝安傳贊任總中臺效章分閫杜詩分閫救世用賢豪詳見前易地殿藩韻㑹殿鎮也詩殿天子之邦伯成以知建寧府改知鎮江南內思賢已使候西廂之對地理志唐龍朔初皇帝常居大明宫謂之西內宫城之東北隅曰東內本永安宫貞觀八年置興慶宫在皋城東北距京城之東開元初置十四年增廣之曰南內上林賦象輿婉僤於西清師古曰西清者西廂清淨之處也東坡詩幸子遇明主陳經入西廂東甌報政又當綰北固之符惠帝紀三年夏五月立閩越王搖為東海王都東甌師古曰即今泉州是其地史記東越傳立閩君搖為東海王都東甌徐廣曰今之永寧也索隱曰甌水名永嘉記水出寧山行三十餘里去郡城五里入江一統志東甌城在今建寧府東南十里北固山在今鎮江府治北下臨長江其勢險固梁武帝嘗登覽此山又名北顧山唐竇常詩山趾北來固潮頭西去長王安石詩天末海門橫北固煙中沙岸似西興恭惟某官王之藎臣詩王之藎臣無念爾祖注藎進也王之進用臣當念汝祖為之法此借用邦之司直詩彼其之子邦之司直注言彼服羔裘之是子一邦之人主以為直刺今無此人觀其動搖於山嶽安問狐貍見前使之感㑹乎風雲蔚如虎鳳蜀志秦宓傳虎生而文炳鳳生而五色餘見賀王寺簿條汲黯願居於禁闥汲黯傳出入禁闥補過拾遺臣之願也望之顧出於平原蕭望之傳以望之為平原太守望之雅意在本朝逺為郡守意不自得一言寧急於封侯車千秋傳千秋無他才能學術又無閥閲功勞特以一言寤意旬月取宰相封侯世未嘗有也萬物盍令其吐氣杜工部集覽元使君結舂陵行志之曰今盜賊未息知民疾苦得結輩十數公落落然參錯天下為邦伯萬物吐氣天下少安可待矣兹驅大纛又卧長江邊秋一鴈聲幸騎烽之灌燧杜詩戍鼓斷人行秋高一鴈聲劉長卿詩江南相送隔煙波況復新秋一鴈過說文烽燧候表也邊有警則舉火漢書文穎注邊方避寇作高土櫓櫓上作桔皋桔皋頭兜零以薪草置其中常低之有冦即然火舉之以相告曰烽又多積薪寇至即然之望其煙曰燧師古曰畫則燔燧夜則舉火人生五馬貴羡燕寢之凝香某自愧秋零阻陪厦賀竝見前仁義與王言者寧千里而莫追邂逅適我願兮或一見而後去詩邂逅相遇適我願兮四六標準卷十七
