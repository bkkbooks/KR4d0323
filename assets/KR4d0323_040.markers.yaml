  - {type: variant, offset: 28514, length: 622, content: 湖襄安𨽻焉即今無為之地也曹操屯軍居巢後屬呉周瑜為居巢長梁屬南豫州又屬合州今屬廬州唐武徳以居巢縣為巢州宋太平興國間析舊廬州廬江縣為巢縣以無為鎮為無為軍又耆舊相傳云無為軍本號城口鎮𨽻巢縣淳化中鎮居土豪侯仁信等進狀乞創軍壘時僣偽悉平思與天下安於無事因取無為而治之意以名之熈寧間又析巢縣廬陵之六鄉置無為縣至本朝以縣省入屬廬州府宋史趙善湘字清臣濮安懿王五世孫慶元二年進士調金壇縣丞知餘姚縣通判婺州提轄文思院出判無為軍兼淮南轉運判官淮西提㸃刑獄歴知常湖和三州遷知大宗正丞兼權户部郎官改知秘閣淮南轉運判官兼淮西提舉常平兼知無為軍進直徽猷閣主管淮南制置司公事兼知廬州兼本路安撫仍兼轉運判官提舉常平進直寶文閣以平固始㓂功進直龍圖閣知鎮江府拜大理少卿進右文殿修撰知鎮江府封祥符縣男進集英殿修撰拜大理卿權刑部侍郎進寶章閣待制沿海制置使兼知建康府江東安撫使進封子以剏防江軍寧淮軍及平楚州畔冦等功進龍圖閣待制煥章閣直學士進封伯以李全犯淮東進煥文閣學士江淮制置使命專征討許便宜從事進封侯及戮全露布上聞進兵部尚書以平閩冦功轉江淮安撫制置使以復泰州淮安州鹽城淮隂縣四城功進端眀殿學士仍升任留守以復旴𣅿軍泗夀二州功進資政殿學士進大學士提舉洞霄宫封天水郡公卒贈少師所著有周易約説周易或問周易續問學易補過洪範統論中庸約説大學解論語大意孟子解老子解春秋三傳通議詩詞雜著地雷既復易雷在地中復疏雷是動物復卦以動息為主故曰雷在地中星昴初臨尚書日短星昴以正仲冬孔傳冬至之日昴白虎之中星七星並見, SBCK: ''}
