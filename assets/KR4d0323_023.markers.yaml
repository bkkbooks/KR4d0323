  - {type: page-break, offset: 0, content: '', id: KR4d0323_SBCK_022-5b}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 經制於裁節之内粟塞其􅁃巳成末乃取闢之功印弄於庭冝有無以易堯之命庸進執羔之寵以彰流馬之勞正觀游刃之若新何慮強弩之巳末某僝功愒日得謝為期取御史於九卿之中行觀更迭序王人於諸侯之上願立斯湏代回湖廣趙緫領彦橚疇庸外府進位上卿禮樂光華旣茂明於調度貨財平凖兹益重於事權除目一朌輿言胥穆恭惟某官持心信厚臨事浚明恭懿篤誠繼髙陽之六子切磋磨􅅣蹈衛國之武公揚歷彌􅀷聲華甚茂兹肅將於使指俾緫視於軍儲曽不淹時巳聞奏最爰進}
  - {type: page-break, offset: 2, content: '', id: KR4d0323_SBCK_022-6a}
  - {type: variant, offset: 3, length: 1, content: 庫, SBCK: 大夫之禄仍斡半天下之贏是亦平遷行有峻擢某未繇旅賀例辱巽牋卿不同乎巳陞華於元冕公歸無所㑹加寵於繡裳代回湖北錢緫領文子自違貝闕寖逺珠庭迹雖逺於行藏心實馳於賢德恭惟某官材}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 而業鉅學廣而聞多鞭霆駕風巳上蓬萊之島捫參歷井遽登蜀道之天飛芻遍給於列屯叱馭不辭於九折成功者去盍歸乎來惟是洞庭彭蠡之間實接夜郎牂牁之徼少湏澄按庶免繹騷當飢饉師旅之餘民亦勞止在諮諏詢度之事公優為之顧恐詔温不容席煖某腰黄無􅀘頭白思歸嬉􅀏文章良感􅀟魚之遺光華禮樂願遄四牡之驅遷召新榮眷委庸敬不敢煩瀆併幸照知代回淮西趙緫卿不儳陞卿九扈給餽列屯人自日邊恩榮晝錦之遣錢流地上師有􅀫飽之期下車云􅀄載路相慶恭惟某官直温而肅括明敏而䟽通早練逹於民庸洞講明於􅀖計懋轉輸之績飛不盡翰持經濟之材翔而後集屬邊防之小定惟糧道之孔艱爰興前席之思乆不見賈復念弄印而授無以易堯庸䟽執羔之榮俾專流馬之運序王人於諸侯之上姑驅馳數月之間求宰相於宗室之中㑹凌厲九人之後某託交惟舊話别方新闖伺眡􅀛正欲致燕雀之賀勤渠專􅀐乃先辱鯉魚之}
  - {type: page-break, offset: 5, content: '', id: KR4d0323_SBCK_022-6b}
