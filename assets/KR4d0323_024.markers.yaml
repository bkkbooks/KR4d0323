  - {type: variant, offset: 0, length: 295, content: 欽定四庫全書四六標準巻二十四宋李劉撰漕使職官志宋藝祖開基懲五季之亂藩臣擅有財賦不歸王府自乾徳以後僣偽略平始置諸道轉運使以總利權開寳六年廣南平除徐澤為判官盖轉運判官始此其轉運使之名國初但曰勾當某路水陸計度轉運事官髙者則曰某路計度轉運使太平興國初皆曰使兩省以上則為都轉運使又置副使與諸路判官又置同勾當轉運事俄罷諸路副使真宗毎用兵或令都部署兼轉運使王師征討則有隨軍轉運使事畢即停至道中詔曰天下物宜民間利害轉運使得以周知令更互赴闕延見詢問慶厯中皆帶按察之任六年罷之先是判官與轉運争權而罷至嘉祐中復置熈寜三年詔轉運使用本資序人即充資序下一等為權二等為權發遣中興以來逐路都轉運使除授不常惟使副判官常置焉, SBCK: ''}
