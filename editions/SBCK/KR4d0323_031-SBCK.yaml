front:
  text: 三十一
  hash: sha256:df93f417c1deeee2056c628bef9b7adf9f4e9d7ab33fff32a0a42d676e919b1a
body:
  text: 教官通武岡陳教授造託湘流疑已就碧油之幙延緣巫水乃聞還絳帳之紗愧執訊之已稽盍通名而告至恭惟某官學探千載文擅一家聲摩殿前皆三誦阿房之賦禮羅幙下顧載歌泮水之詩兹聞交章行即陛覲紫皇好學正爾恢天網之收黃閣招賢㑹亟勸露門之講州縣徒勞人耳將相寧有種乎某垂老無聞甚愚不肖向者誨諸生於館下要是牛溲兹焉試别駕之治中亦非􅂹足不曰丞哉之余負亦惟善者之吾師儻諧半面之期亦勝交臂之失監州無蠏恐非直杯水之官廣文有氊幸或作數旬之客回武岡連教授嶸補黔中之上佐問字茫然聞稷下之諸生迎師幸甚未皇執訊先辱鳴謙恭惟某官正學純明懿文炳蔚一門三秀聮翩千佛之題六舘十年卓犖諸儒之倡頋棲鸞於矮屋又繫馬於堂階君子所樂三在得英材而教育天下達道五正湏師席之琢磨佇令巫水之磻咸識沂風之詠遄班玉筍遂講金華某典午非材同寅何幸君來重席底虞坐客之無氊丞未全聾尚聽講經之有笥回武岡何教授老形旣具久欲挂神武之冠族姓未寒幸不冷廣文之席有來􅀟鯉如對三鱣恭惟某官挺特令名飛騰茂實圜橋策足振鬛先登方策蟠胷摘髭獨晚邂逅泮林之集頡頑蓬島之游某急景凋年閑官窘步閉蕃於六館之空舍其亦有施乎識堅也十年為故人將賀其鳴已回白教授舉爾所知期不辱賢材之實與我共理亦惟頼庠序之申何勤謙撝更加巽謝恭惟某官器能膚敏學問純明問一得三子職早深於學禮喝五作六甲科共傒於為郎兹暫憇於冷氊合亟膺於温綍某愛莫之助情見乎辭繫馬堦前切勿羡諸公之衮衮㗸鱣堂上正湏效夫子之循循回白教授法從舉賢真誠知人矣廣文道謝何為至我哉靖惟暗中摸索之明何待送上吹嘘之助恭惟某官器中瑚璉行存宫庭䝉求我而我匪求䝉識其大者學優仕而仕則優學人自即之是冝四牡之章不待􅀟魚之請某初無寸力過辱尺牋上臣事君以人斯為可賀貪天之功為已則不敢知回白教授下車聞庠序之教亟欲引賢積閲限銓選之文甫能剡奏是亦公舉何費属辭恭惟某官行無玼瑕學有源委繫堂下之馬安能鬱􅊊以久居釣海上之鰲行即飄飄而高舉聊助鼓旗之譟何勤珠璧之投某愛莫助之顔之厚矣引鼎不程其力聊復露章推轂有味其言更祈強學回白教授二毛五馬詎知千騎之榮尺素􅀟魚倐拜三鱣之辱未能先施敢缺報章恭惟某官武安故家文公宿學丁年出使便入對天子之庭甲科為郎何至落諸侯之客佇由芹水徑上蓬山某濫領斗州又捫井絡杜陵十暑復重尋流汙之炎范叔一寒行可伴無氊之冷其為欣幸曷既鋪棻代回王教授同八公同辰推薦賢之轂一第溷子寒坐客之氊輙用名聞何勤私謝恭惟某官學省佳士詞埸雋人何蕃貌不任其心而行焯焯仲舒言有補於世其對洋洋鴞既集於冸林鳳當巢於阿閣平昌足信况有李翺之言翁歸不私何害山陽之託吾徒得君重耳子亦來見我乎某過辱臨存更勤賁况扈甘泉之八十一乗殊愧所䝉登凌煙者二十四人更期自勉回漢州劉教授大川生日鴈塔聮名料有感屏中之鶴鯉庭寘饋何足惠堂下之鱣或承之羞不忘所賀恭惟某官世家政駿郷犮郷雲舊憶杏園同走馬看花之賞近懹蘭省共饕蝨爆竹之吟揆余度之余名俾爾􅂄而爾壽君子之言信有證旣正而葩我生之􅀄尚無為其何能榖某恭承嘉惠倍感故情避蓋公之堂願安承教推鄚莊之毂但懼罔功梅亭先生四六標準巻之三十一梅亭先生四六標準卷之
