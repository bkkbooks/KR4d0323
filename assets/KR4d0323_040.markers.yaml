  - {type: variant, offset: 15893, length: 1, content: 西, SBCK: 畢安撫再遇冬緹􅁅候氣一新太史之占茸纛宣風載重元戎之􅀉冝從亞歳茂擁百祺恭惟某官識逺且明材沉}
  - {type: variant, offset: 15895, length: 5, content: 瞻使節載駕, SBCK: 毅輕裘緩帶備􅀚雲祲之祥堅甲利兵孰測霜威之勁佇寕邊鑰入揔中􅁠徑從魯􅀚之登即見漢壇之築某属紆朝組莫捧賀觴玉律和聲旣届朋來之慶金印如斗願迎方至之休代回宋緫領鈎冬日轂回輈舒永五紋之線}
