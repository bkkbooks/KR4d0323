body:
  text: 代回丁制機鎔某恭審進通閨籍出運幄籌閲道放出蜀之􅀛侯誰在矣令威跨歸遼之鶴而子和之恭惟某官斈裕家傳才優時用一經受業固無羡黃金之籯萬里隨翁欲重吟青玉之案冝輕蒲壁樂近蘭陔暫主畫於中權即舒翹於表選乃今王謝之子弟率多信布之功名佇奏膚公亟觀趾美某八年于外一節以趍欲贈丁儀愧乏子建之好句得見嵇紹益知中散之有人代回楊制幹異桂林勞從事之賢講聞高誼久矣草堂就參謀之辟邂逅適我願兮况聞在楊侯之鄉已嘗識李邕之面偶忘摸索重感記怜共惟某官姱節紉蘭妙齡拾芥章指之義數萬志在春秋縱橫之對三千文之禮樂畫諾肥越人之瘠􅀏談易蜀道之難北山有楊想君子樂與賢者西方曰棘嗟逺道胡爲來哉行矣章交亟其王覲某昔遲去魯今倦游梁忻聞瀟湘之故人來作臨卭之重客潭府淳古亦嘗倚席於麓山錦里逢迎更覺驚心於石鏡代回耿制属重客及隍缺於逺肅高文衘袖厚甚先施恭惟某官山立清標淵回懿斈暫試三語之椽迄無一夫之􅁈兹被制梱之知俯按荒城之陋某幸諧再覿仍拜属辭徒深巾衍之藏更效䄡䄖之報代回陳制幹噲青天轉粟之難漸欲歸雞豚之社綠水紅蓮之麗鼎來見鴻鴈之賓與汝爲鄰於余同業何幸萬里似人之喜然非九垓若士之期伏惟某官斈行醇明詞章炳蔚頃嘗識老人大父之處已知異吾黨小子之狂八韻之驚試官果妙年而中鵠三仕而爲令尹冝即日以飛鳬頋從嶺表之炎來依劒外之冷孔明用蜀府中實委之費禕嚴武鎮川幕下固謀之杜甫所謂有爲之亦若安知來者之不如某戍雪無庸漕氷欲解十乗乆違於文子至於它􅀖尺書如見於孟公爲之驚坐代回史機冝識嵇父於未仙知敬人中之鶴見徐卿之有子真成地上之麟辱貽秋月之兩章尤服春雲之多態恭惟某人材爲國瑞斈有家傳手敏八义亦欲吹嘘而送上眼迷五色竟難模索於暗中不妨利吾器以俟時行即溉其根而食實斯文如女有正色安用自怜我相夫子非癯仙即騰善價某方謀下榻聞偶税郊兹勤連璧之臨咸有聨珠之贈寸田耕不盡益信任忠敏之詩二季對相望誑有歐陽子之識代回成機冝晉䟽寵承家拜恩諾仕男兒慷慨不難自致於一科母氏劬勞且合亟營於三釡固爲親屈難與俗言伏惟某人茂實英聲瑰意琦行象賢崇德豈惟聞禮以聞詩續間成宗是在難兄而難弟姑紆綠綬用當綵衣佇觀名第之摘髭即步要津而策足某未皇贊慶猥辱貽箋識野鶴於未仙但深感愧期名駒之越國㑹見騫騰代回劉撫幹孟虎先庚有命焉知賢才而舉之高甲爲郎何見公等之晩也冒然剡入無以謝爲恭惟某官斈超人羣詞窺天巧一第直溷子政有貴於晩成屡薦不入官亦何慊於同隊假以嵗月矯焉雲霄某得於所聞言之不怍燭之武老矣無能爲矣一力告休仲山甫舉之愛莫助之萬祈自重代回胡帥機網諸公獻納共騰薦士之章老子婆娑亦竊挂名之寵徒得君重何以謝爲恭惟某官父教之忠丗濟其美故國非謂喬木意風烈之猶存此笏乃今甘棠况天章之固在黃閤門䦨之喜青油談笑之長推轂有言滿坐稱善􅂓附蒼蠅之尾何補黃鵠之毛然未嘗得承顔而接辭則非所謂納交而要譽履聲來止巽謝何哉某無與提衡亦勤衘袖暗投珠於道路何以相酬朝發軔乎梁津幸其自愛代回楊撫属紹雲老形已具濫塵喉舌之司賀櫝鼎來逺借齒牙之論恭惟某官文獻􅀶雅機量䟽明爲入幕之賔諒多禆賛舉筦庫之士㑹即騫騰某歸興雲飛宦情氷冷推賢揚善亦有味其言哉度力量時懼無􅀘於賢者代回蒲撫機仲乙聮名接武憶共尋皇子之陂異事同僚喜來入烏公之幕情親有素辭費何居伏惟某官逺抱淵􅀷清標冲粹二十而作文賦早拾科名八百之除吏貟偶非親故然大車檻檻毎難銳進而餘刃恢恢正覺硎新杜老參謀正不出浣花之里晉公賛畫固可參古栢之碑况今連鑣向闕之人莫非講劒摛文之客北多良馬暫入禮羅南有嘉魚即登賢罩某託交年拜起敬月評風動帳中亦欲更親於談笑氷解漕下自兹恐隔於行藏代回李緫属鑄懐中散之野鶴夙荷心知見少傅之停鸞今能趾美未遑賛慶猥辱陳箋恭惟某官斈有家傳才爲國許金閨天上夙尋瑶草之期玉樹風前善継石林之志佇膺丗選不俟民庸某家寓峨峯族出成紀重來訪鴈湖之鴈已隔煙霄何幸見龍津之龍早騰雲漢其爲頌詠曷既敷陳代回朱緫属喻講書乆於睽離辱此臨賁頓解塵埃之渴更勤月露之文退而復白圭之三何翅得黃金之百駕彼四牡量材未敢以載驅遺我雙魚拜賜惟知於長跪代回鄧緫幹剛共州隔邑偶萬里之盍簪異事同寮借一章而推轂所慚假蓋何用陳牋恭惟某官才器鴻厖詞章犀鋭倦乗箕而騎尾甘歷井以捫參北風既亟只且獨何爲乎愁苦南鄭多道亡者頋不行兮夷猶天實生之人爲瞠若去國朞年見似者喜矣嗟尔逺道胡爲乎來哉引鼎不程乞鄰非直偉卿以一身從我安敢蔽賢伯道之五皷不來忽聆執誶某乆於戍雪行矣解冰當百里半九十之時敢辤賤役有一石三十鍾之窘更頼仁言代回陳檢察鑄仰仲子之丗家積百聞於一見得孟公之手牘將異事而同寮所愧先施之未能乃䝉下問而不耻恭惟某官斈有家法材應時須登賢能之書合竟丹墀之對作神僊之尉未忘文石之忠尋小試於幕謀謂徑通於閨籍居然歛板復此曵􅅂百斛千鍾來察聖賢之實一石五斗肯聽婦兒之言無嫌從事之獨勞行應司徒之計治某燕巢既舊蝗粟知慙明珠暗投固已覺我之形穢寒氷烱立尚或使人之眼明通湖南韓運管望桐韓之閥閲夙仰泰山恃苦李之姓名敢通北海􅆌然縣椽之賤望之使筦之尊以言自鳴於分甚僣恭惟某官材猷孔碩文獻甚都東萊其師􅂹固冝於汗血南澗之嫡鳳何有於凢毛君遣使之皇皇筵得賔而秩秩坐紆三組臥護重湖使胸吞雲夢而恢然則背􅀒天風也必矣某卑棲矮屋仰席崇䑓安得自高政有資於引重能令公怒寕無望於包荒代回胡運管極回首祝融之峯前乆無鴻鴈濯足清江之䆫下忽送鯉魚既感故情又慙褒語恭惟某官士林翹楚䆠海汩齊騰身方脱於選堦歛手又償於邑債頼割鷄之敏甚卒馴雉以靡然觀其不辭州縣之勞終焉必爲䑓閣之器聊依緣水即致青雲某不安田廬又塵班列老矣無能爲也行即告歸忠焉能勿誨乎毋忘嗣訊代回胡運管極西清舉賢争剡需頭之薦南郭濫吹與題䈤尾之名計效則無何謝之有恭惟某官抱致逺之度無欲速之心才名四十年始償邑債扶摇九萬里猶作幕賔歸張迭嗟崔李交説射雉而用一矢緜力可慙烹魚而得尺書雄文何腆某亡能爲役有味其言末路再得朋喜而不寐吾􅀒二冝去人謂斯何代回添差呉運筦鑰戚侯四姓既聨中秘之華部使六條頋倚上賔之重方欲展大僚之敬乃先勤小牘之恭一謙尊光三復愧感恭惟某官器函天粹材軼人群太姒徽音雖不聞而亦式少君高節豈以貴而自驕榮通東壁之圖書暗接西廂之筆槖頋肯參聨於氷潜不辤主諾於日畿世選爾勞聊復飬脩門之望徒得君重詎眞煩細務之親無王事鞅掌之勤有皇華咨諏之任銅龍甲觀生民又望於姜嫄路馬乗車褒賞誰如於申伯某凄其紛白復此依紅蛙以墟拘豈是緣青􅁳之脚魚於川泳尚或同白水之心代回許運幹儀枉駕臨存属辤賁重今作禁門鍵敢當百年幾見之稱君如雙井茶㑹赴衆口一嘗之願恭惟某官氣墟海岱文耀虹霓羅致幕中信一第之直溷子寶橫道側乃屢薦而不入官今歸張之迭嗟又崔李之交説敢愛其力而隱於言惟是日夕之牛羊㑹且歸矣瞻彼月明之烏鵲愛莫助之某有味推賢無能爲役然前驅弩矢固余力之不任儻旁譟皷旗或此心之可效代回奚運幹祝題鴈塔之名夙有同升之幸依􅌐駕之漕兹叨聮事之榮愧削牘之未遑感飛牋之先辱恭惟某官巋然地望雋甚天資手决丗科不用懐綳之簮笏力行家斈固求竹帛之功名便當正奚仲之車何用主李悝之糴湟中四百萬石暫􅀝經營廣内一百三家即煩校理某偶攀末甲復託同寅自揣頭顱猶是五侯之賓客視如手足亦惟四海之弟兄代衞内機回新任趙運幹師秀内幕主書濫竊機謀之禄外臺賛畫鼎來禮樂之英盍修同寅之恭適坐旁午之冗高情厚甚下問燁然恭惟某官傑立宗標焯爲儒倡麟振振而一角鳳翽翽以九苞太乙吹灯豈特傳五行之斈長庚吐熖固冝光萬丈之文吾道非耶公等安在既低飛於枳棘又屢泛於芙蓉輟天塹之元僚佐星軺之計吏棟簾雲雨似聞曾駐於襜帷庭户湖山復見重來之賔佐􅂓副皇華之咨度即登清切之司存某濩落束書參差一第不狩不獵豈能談笑於青油爲箕爲裘􅂓戲爛斑之綵服薾然薄陋安所依歸異事同寮儻怜草木之吾味百聞一見當爲珠玉之脩容代回曾運幹準射雉而用一矢緜力可慙烹魚而得尺書雄文甚寵初無足謝何過乎恭恭惟某官殖斈精深摛辭鉅䴡一讀阿房之賦信凢馬之皆空再歌泮水之詩知祝螟之速肖􅂓贊星軺之畫盍歸天網之收某老矣綴班闕然報國徒得君重輒剡牘於公車何以文爲更歸恩於私室不辦七襄之報姑容十襲之藏代回新成都趙帳幹益計幕借材鼎來主畫郵筒聞報方欲貢書猥勤下問之先殊感高情之厚恭惟某官丗濟其美父教之忠材刃有餘解全牛而不頓智囊無底洗凢馬而可空是冝即復於青氊不謂尚淹於墨綬惟兹漕軵正重賓筵惠然肯來恊贊皇皇之轡出其所斈行豊暴暴之財不俟章交㑹應召用某冐焉行險甫此依仁及同君子之寮亶爲幸㑹所媿小夫之牘不盡傾期代回唐提幹元齡夏辟三千參聨無補冬官六十攝長可慚何勤執訊之來更辱徽言之寵恭惟某官摘髭名第策足英游暮拔其尤乆幕中之羅致􅀊計其入知地上之錢流行交公車之章當爲清廟之器某不能者止乃分之冝方鳩僝功忘以年之當廢我􅀛既厭知曷月之還歸代回陳提幹伯震明詔選賢争抗需頭之薦老夫涉筆但深遯尾之慙幸而得君可以報國恭惟某官摘髭名第策足俊游人嘆老而嗟卑急於速化士任重而道逺貴在晚成欲功名留乆逺之看信温飽非平生之志日諸公之暗摸露尺櫝以明揚今猶待詔於公車底用謝恩於私室某隨人作許爲役無能感北山之移文逝將命駕觀東閤之竒士更幸改轅代回䕫路馬提幹巳榮二年滿戍鷁回首以東歸再命觸藩蟇朶頥而西顧本欲潜深而伏隩頋使出幽而迁喬欲罷未能不知所賀恭惟提幹岷峨濯秀江漢飬源淬剸犀之鋒馳騁不難於萬里賦射熊之舘吹嘘亦在於九天若爲二紀之塵埃良負兩科之冠劒方江濤之如此覺人物之􅆌然勳業終伏波之歸圖畫勉凌煙之継某濫竽榜下曵尾􅅺中推轂有味其言心乎愛矣引鼎不程其力人謂斯何代回新班李茶幹鏗白髮强顔洊叨乗障黃塵眯目未暇見賢敢圖宗家之英辱貽記室之牘恭惟某官人門第一才氣無􅀟蔚然丹山之羽毛展也青雲之歩武麒麟地上已通籍於煙霄龍鶴山中難窺班於霧雨切聞六經三史之斈欲追一翁二季之蹤行膺綸綍之招何待弦歌之試某夙同鯶譜近倚龍門所恨室邇而人遐未由展覿敢謂禮踰而情過更費属辤感鍥惟深鋪棻曷既代回提幹監鎮楊修職埴問一得三夙服名駒之譽駢四儷六兹窺汗馬之功得非所䝉願竊有復恭惟某官岷峨毓秀江漢濯英挺有祖風固合間於兩社裕乃父烈寧當乆於諸侯兹耿耿以發硎已纍纍其綴組芝蘭庭下子弟正欲自佳槐棘班中公侯必復其始某辱崇丗契見頋邦交老欲荷鋤歸問南山而種豆古來和鼎相期東閤之觀梅代回許知縣鴻祖虞判院提幹㠭袖賀屣履迎門獲解塵埃之渴文書衘袖辱貽月露之篇所慙先施之未能又覺成章之匪報惟感千金之贈當深十襲之藏代回䕫路常平馬提幹已榮偏城守土曾微牧御之庸一道觀風猥被將輸之命亟控循墻之避但期接淅而行敢意鳴謙秪深自訟恭惟某官銅柱氣槩絳帳文章早收楊葉之功尋擢桂林之第全材孔碩迅步何稽羅而致幕中足占頴脱争令出門下行即章交佇軒翥以砉然知乗除之必爾某濫叨小節甚愧同升兩科文武之英幸獲陪於年拜三川人物之論亦竊服於旦評所愧匹雛無力之人莫旅萬牛回首之送區區之悃續續以言代回詹書監淵庶獄哀矜參聨弗績八材飭化率属罔功過辱高情更勤下問恭惟某官有志於丗用力斯文儼素韠之倚廬耿丹心之戀闕范希文之守服必通時相之書富彦國之從權冝有天子之詔不然暮召當在朝祥某乆玷憲曹又共事典㑹且歸矣所願爲聖人之氓愛莫助之猶幸惜天下之寶代回詹書監淵八年一别瞠若可驚千里尺書跫然有喜只慙善頌未免過情恭惟某官义手成章摘髭取第民曹補掾已小試十二牛之刀詞學問津又將垂五十犗之餌不虞衘恤猶鬱交章少須彈琴之成聲㑹見積薪之居上某强顔于此視䕃幾何尋有味推轂之言老夫髦矣持受羮反錦之意執事亮之代回饒殿幹時亨貳職祥刑罔功犴獄誤恩率属遂長雉工視䕃幾何取數多矣恭惟某官素材孔碩清德不腓醉面春風之和良多行樂宦情秋光之薄還動出機有赫寶儲行觀幹裕某宜燕居息而鳩僝功某水某丘所釣遊㑹且歸矣在阡在陌可來徃亦有意欤代回饒殿幹時亨頭顱如此甚慚朝夕之論思足音跫然眞成親戚之謦欬輙因陳謝併賀新除恭惟某官家食甚都宦情未憗里門飬望乆倦游紫樞之庭冊府辦嚴將司存白玉之牒不妨遊戲㑹在薦揚某宜在挂冠又此持槖􅂓復爾耳姑出應於俗緣歸去來兮猶可尋於情話梅亭先生四六標凖卷之三十梅亭先生四六標凖卷之
