  - {type: variant, offset: 21332, length: 356, content: 漢天文志虚危南有衆星曰羽林天軍軍西為壘晉志羽林四十五星在營室南宣帝紀羽林孤兒應劭曰天有羽林大將軍之星林喻若林木之盛羽羽翮鷙擊之意故以名官漢儀注羽林從官七百人師古曰言其如羽之疾如林之多百官表羽林屬郎中令掌從送次期門續百官志羽林中郎將主羽林郎掌宿衞侍從常選六郡良家子補本武帝以便馬從獵還宿殿陛巖下室中故號巖郎東軒筆錄蔡挺自寶元已後歴邊任至于熈寧初猶帥平凉㑹邊無事因作樂歌以教邊人有誰念玉關人老之句自此盛傳都下未幾召為樞密副使墨客揮犀云蔡子正久在邊任晚年以龍圖閣直學士再守平凉作喜遷鶯一闋以自廣曰霜天清曉望紫塞古木寒雲衰草溪馬嘶風邊鴻翻月隴上鐵衣寒早欲歌倚曲悲壯盡道君恩須報塞垣東盡頭路鞬錦領山西年少談笑刃斗靜烽火一把長報平安耗聖主憂邊威懐遐方驕縱且寛天討歲華向晩愁思誰念玉關人老太平也且懽娯須把金樽頻倒此曲成大傳都下, SBCK: ''}
