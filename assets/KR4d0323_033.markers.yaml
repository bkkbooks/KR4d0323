  - {type: variant, offset: 22738, length: 10, content: 昌黎雪後寄崔二十六丞, SBCK: 回新神泉史知縣大川依美蓉之幕甞辱贈言宰松桂之林未皇執訊兹守鳴珂之里過蒙投璧之光恭惟某官器宇宏􅀷丰神峻整陽休山立克世金魁之家玉潤氷清近續符溪之學暫牛刀之小試即鶚表之交飛論坡頴歐蘇之交旣聞耳矣嗣嚴楊陳李之鄉尚寓目焉某未果避堂先蒙枉駕拜関睢五章之貺真盈耳以洋洋歌白駒一束之詩無遐心而皎皎回新都史知縣季温聞武城之歌未窺半靣讀阿房之賦敢靳一言粗欲無患其不}
