  - {type: variant, offset: 3, length: 15054, content: 庫全書四六標準巻三十八宋李劉撰學職謝永州鄭學諭永州為漢零陵郡晉分零陵置營陵郡梁改營陽為永陽郡隋罷二郡置永州大業初改為零陵郡唐初復置永州天寳初改零陵郡宋復為永州屬荆湖南路永山在州城西南一百里永水出焉州因山以名一聴履聲已喜似人之見鄭崇傳我識鄭尚書履聲荘子子不聞夫越之流人乎去國數日見其所知而喜去國旬月見所嘗見於國中者喜及期年也見似人者而喜矣詳見前載披手筆更欽博我之文後漢書申屠蟠傳申以手筆趙壹傳逺辱手筆追路相尋南史范曄傳手筆差易于文不拘韻故也王儉傳手筆典裁為當時所重新唐書蘇頲傳自景龍後頲與張説以文章顯稱望畧等故時號燕許大手筆韓文貶損道徳乃至手筆以問之得非所䝉陳後山詩呼我過其廬所得非所䝉願竊有復曲禮侍坐於君子若有告者曰少閒願有復也恭惟某官學探聖瀆法言仲尼之道猶四瀆也經營中國終入大海它人之道者西北之流也綱紀夷貉或入於沱或淪於漢秀出愚溪愚溪在永州西一里源出鵶山舊名冉溪栁子厚改今名愚溪詩序云灌水之陽有溪焉東流入于瀟水余以愚觸罪謫瀟水上愛是溪得其尤絶者家焉更之為愚溪愚溪之上買小邱為愚邱自愚邱東北行六十步得泉焉又買居之為愚泉愚泉凡六穴合流屈曲而南為愚溝遂負土累石塞其隘為愚池池北為愚堂其南為愚亭池之中為愚島於是作八愚詩紀于溪石上窮司農之經諒皆殫洽鄭𤣥傳公車徴為大司農𤣥乃以病自乞還家凡𤣥所注周易尚書毛詩儀禮禮記論語孝經尚書大傳中侯乾象厯又著天文七政論魯論禘祫義六藝論毛詩譜駮許慎五經異義答臨孝周禮難凡百餘萬言經傳洽熟稱為純儒齊魯間稱之文選元元本本殫見洽聞客廣文之舍大似淹回新唐書文藝傳𤣥宗愛鄭䖍之才欲置左右以不事事更為置廣文館以䖍為博士䖍聞命不知廣文曹司所在訴宰相宰相曰上増國學置廣文館以居賢者令後世言廣文博士自君始不亦美乎䖍乃就職久之雨壊廡舍有司不復修完寓治國子館自是遂廢杜詩廣文到官舍繫馬堂階下醉即騎馬歸常遭官長罵佇即摘髭韓詩連年收科第如摘頷下髭亟其奮翼馮異傳始雖垂翅回谿終能奮翼澠池注以鳥為喻某不能教胄有負轉丞由國錄倅武岡儻簿書獄訟之餘其交以道則道徳性命之理當誦所聞謝張學諭元之詳啟意倅武岡作吟牆竹之公事自分丞聾韓文藍田縣丞㕔壁記庭有老槐四行南牆鉅竹千挺對樹二松日哦其間有問者輙對曰余方有公事黄霸傳長吏許丞老病聾督郵白彼逐之聞泮林之好音還成技癢詩翩彼飛鴞集于泮林食我桑黮懐我好音風俗通義云荆軻入秦事敗而死髙漸離變姓易名為人庸保匿作于宋子久之作苦聞其家堂上客擊筑技癢不能出言曰彼有善不善從者告其主彼庸乃知音潘岳射雉賦徒心煩而技癢注有技不能自忍如癢也梁書劉孝標傳古人不以委約而能不技癢文苑傳庾肩吾傳有慙技癢更同故態杜詩貫穿無遺恨薈蕞何技癢山谷集彼族庖之技癢兮伐大觚以嘗巧梅亭嘗為國録故云亟裁四六就謝萬分詳第一巻恭惟某官氣韻淑均出師表性行淑均曉暢軍事風猷膚敏見前尋西塞桃花之鱖豈其河鯉之逢新唐書隠逸傳張志和字子同母夢楓生腹上而産十六擢明經以䇿干肅宗特見賞重命待詔翰林親䘮不復仕居江湖自稱煙波釣徒著𤣥真子亦以自號嘗撰漁歌憲宗圖真求其歌不能致歌云西塞山邊白鷺飛桃花流水鱖魚肥青箬笠綠蓑衣斜風細雨不須歸詩豈其食魚必河之鯉思東吴蓴莱之鱸行矣溟鯤之化晉書文苑傳張翰字季鷹吴郡吴人也齊王冏辟為東曹掾翰因見秋風起乃思吴中菰莱蓴羮鱸魚膾曰人生貴得適志何能覊宦數千里以要名爵乎遂命駕而歸俄而冏敗人皆謂之見機無厭俗情之傲贅贅朱芮切音與惴同聚也風結病也即觀鄉賦之拔尤某聊爾治中奚勞賀上白樂天詩賀上人来得報書膺何如昔已無可取之楷模南史蜀士李膺字公𦙍為令有才辯西昌侯藻為益州以為主簿使至都武帝悦之曰今李膺何如昔李膺對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對乃以為益州别駕後漢書黨錮傳天下模楷李元禮不畏强禦陳仲舉籍也抱能尚可相從於閭里昌黎代張籍與李浙東書無所能人乃宜以盲廢有所能人雖盲當廢于俗輩不當廢於行古人之道者回唐學録淵題輿非據箝紙尾以何心昌黎藍田縣丞㕔壁記文書行吏抱成案詣丞巻其前鉗以左手右手摘紙尾鴈鶩行以進詳見前銜袖見貽羨筆頭之有口北史古弼傳弼頭尖帝嘗名之曰筆頭唐僧智永於樓上學書有秃筆頭十甕語林張曲江語人曰學者常想胸次吞雲夢筆頭湧若耶溪量既并包文亦浩瀚陳後山詩筆頭滚滚懸秋江李咸用詩意下紛紛造化機筆頭濟濟文章髓文士傳成公綏口不能談而有劇問以筆答之朱建傳建為人辯有口陸賈傳畏大臣及有口者師古曰有口謂辯士田蚡傳為中大夫辯有口淮南王傳慧有口僧慧洪詩人疑錦繡纒肺肝不然筆端應有口一謙厚甚三復悚然恭惟某官清挹畹蘭畹委逺切説文田二十畆也集韻韻㑹田三十畆曰畹離騷經余既滋蘭之九畹兮王逸注畹十二畆秀分泮藻詩思樂泮水言采其藻䝉開蜀道諒餘挺挺之風司馬相如傳唐䝉使略通夜郎僰中發巴蜀吏卒千人郡又多為發轉漕萬餘人用軍興法誅其渠率魏謩傳挺挺有祖風烈勒續楚辭定出遥遥之胄史記屈原傳屈原既死之後有宋玉唐勒景差之徒者皆好辭而以賦見稱然皆祖屈原之從容辭令終莫敢直諫藝文志大儒孫卿及楚臣屈原離讒憂國皆作賦以諷咸有惻隠古詩之義其後宋玉唐勒漢興枚乘司馬相如下及揚子雲競為侈麗閎衍之詞沒其風諭之義唐勒賦四篇南史梁何昌㝢為吏部尚書有姓閔求官者昌㝢問君是誰後對曰閔子騫昌㝢掩口笑曰遥遥華胄佇帝庭之大對尚書乃命于帝庭此借用豈鄉校之久淹左傳鄭人㳺於鄉校以論執政然明曰毁鄉校何如某教胄無庸負丞有靦靦他典切説文面見也詩有靦面目疏面見人之貌徐曰凡人所視瞻心實見之故有别識無恥之人面見之而已心實否也露繁天豁敢希南嶽之鳳鳴杜詩爽氣金天豁清談玉露繁佇鳴南嶽鳯欲化北溟鯤澗愧林慙但覺北山之鶴怨北山移文林慙無盡澗愧不歇蕙帳空兮夜鶴怨山人去兮曉猿驚回吴學正應龍洗塵土之袍未遑請益山谷詩忽看髙馬頓風塵亦思歸家洗袍袴披月露之牘良佩鳴謙北史李諤論文體書連篇累牘不出月露之形積案盈箱惟是風雲之状易鳴謙貞吉又鳴謙利用行師征邑國藏以為榮報於何有恭惟某官風猷凝逺天韻淑均炳扶輿磅礴之靈蜀都賦江漢炳靈韓文必蜿蟺扶輿磅礴而鬱積詳見前富詰屈聱牙之學聱五交切説文不聴也聱牙謂其不相聴從也又言辭不平易貌韓文周誥殷盤詰屈聲牙注謂不入人語也又皆艱澁貌生九辨九歌之地豈自隔於脩門離騷經啓九辨與九歌兮夏康娱以自縱又九歌者屈原之所作也沅湘之間其俗信鬼好祀原見其祝辭鄙陋因為更定且以事神之言寓忠君之意而詞之所指惟在神耳九辨者宋玉之所作也玉惜其師忠信見放故作此辭以辨之宋玉招魂䰟兮来歸入脩門些脩門郢城門挟八戰八克之能將差强於敵國吴漢傳漢與公孫述戰於廣都威都之間八戰八克又吴公差彊人意隠若一敵國矣詳見前四六且工於駢儷栁文駢四儷六錦心繡口三千足想於縱横夏竦詩縱横禮樂三千字詳見前某有幸依仁過勤委贄故將軍之雌伏難言李廣之無雙李廣傳李廣材氣天下無雙又故李将軍後漢趙温為京兆郡丞歎曰大丈夫當雄飛安能雌伏互見前新進士之龍飛惟祝吴公之第一宜春傳信録薛逢赴朝值新進士榜下綴行而出前導曰迴避新郎君法言龍必欲飛天乎曰時飛則飛東京賦龍飛白水荀崧傳聖哲龍飛回卓學諭邁聞凌雲之作方幸友仁司馬相如傳天子大悦飄飄有凌雲氣㳺天地之間意拜明月之投更髙陳誼鄒陽傳明月之珠夜光之璧以闇投人於道荘子屠羊説居處卑賤而陳義甚髙不知所報左傳晉人歸楚公子榖臣與連尹襄老之尸于楚以求知罃王送知罃曰子歸何以報我對曰臣不任受怨君亦不任受徳無怨無徳不知所報藏弆為榮陳遵傳性善書與人尺牘主皆藏弆以為榮注弆亦藏也恭惟某官秀出閩中史記東越傳以其地為閩中郡徐廣曰今建安侯官是漢書帥閩中兵以佐滅秦師古曰閩越之泉州建安是也又立無諸為閩粤王王閩中地僑㳺黔鄙僑寓也旅寓而居也栁文武岡銘黔巫東鄙蠻獠雜擾横經重席方依夫子之宫牆謝承後漢書董春字紀陽少好學師事王君仲受古文尚書後詣京房授易後還為師立精舍諸生每升講堂横經捧手請問者百人又戴慿字次仲世祖正旦朝賀令羣臣説經更相難詰義有不通輙奪其席以益通者慿遂重坐五十餘席殷氏家傳殷亮為博士講學大夫諸儒論勝者賜席亮坐八九重席帝曰學不當如是耶荘子倚孔子之牆問舍求田豈為王孫之僮客魏志求田問舍言無可采司馬相如傳臨卭多富人卓王孫僮客八百人程鄭亦數百人師古曰僮謂奴佇摘髭於名第即䇿足於要津某教胄無庸負丞何美俱見前楊脩有智但欽絶妙之受辛世説魏武嘗過曹娥碑下楊脩從碑背上見題作黄絹㓜婦外孫虀臼八字魏武謂脩曰解不答曰解魏武曰卿未可言待我思之行三十里魏武乃曰吾已得令脩别記所知脩曰黄絹色絲也於字為絶㓜婦少女也於字為妙外孫女子也於字為好虀臼受辛也於字為辤所謂絶妙好辤也魏武亦記之與修同乃歎曰我才不及卿乃覺三十里典畧楊修有才智魏文為世子厯陳太邱碑過見碑題云云魏文思之不解問徳祖答曰陳寔之墓蔡邕之辭鍾繇之書此絶妙好辭也魏文曰才與不才相校四十里也劉孝標云魏武楊脩未嘗過江意當以此為正韓子非才頗覺長慙於典午昌黎和裴晉公詩長慙典午非材職得就聞官即至公回寜鄉魏學賔抗塵縣椽真成拓落之官北山移文抗塵容李時為寜鄉簿故謙言縣掾揚雄傳何為官之拓落也引領黨庠知有耆明之彦禮記古之教者家有塾黨有庠術有序國有學䟽黨有庠者黨謂周禮五百家也庠學名也於黨中立學教閭中所升者也未瞻丈席禮記席間函丈函音咸注函容也謂講問之時其席相對席間足以指畫先沐尺書韓信傳奉咫尺之書古樂府中有尺素書恭惟某官漢相雲仍王商傳此真漢相矣此指魏相鄭公風烈見前北多良馬老伏櫪之駿龎韓文冀北多良馬晉拂舞歌老驥伏櫪詩受小共大共為下國駿龎注駿大龎厚也又四牡龎龎或作䮾南有嘉魚秩賔筵之燕衎詩南有嘉魚烝然汕汕君子有酒嘉賔式燕以衎衎苦旦反樂也用酒與賢者燕飲而樂也又賔之初筵左右秩秩正爾廩人之繼粟何如天子之執漿禮記食三老五更於太學天子袒而割牲執醬而饋疏執醬而饋者謂天子親執醬而饋之今按醬即諒切説文醢也漿資艮切酢漿也音義俱不同此以醬為漿未詳佇裹蒲輪見前即空蕙帳北山移文蕙帳空兮夜鶴怨某盍請鄰而祭竈顧越爼以代庖李時為寜鄉簿權司戸禮貌衰則去之友其士之仁者㑹計當而已矣忠焉能勿誨乎回魏教諭得一旅進接辭未遑欵曲雋不疑傳今乃承顔接辭光武紀文叔少時諥信不與人欵曲謙撝委贄備仞勤渠旅謙卦名所慙枵然之胸左傳𤣥枵虗中也枵耗名也注𤣥枵三宿虚在其中有孤厚甚之意恭惟某官故家古汴説文汴水汲水出陳留浚儀隂溝至䝉為雝水東入于泗水經云即今浪蕩渠又州名秦屬三川郡東魏置梁州五代間改汴州久客都梁漢分長沙為零陵郡都梁夫夷屬焉今武岡山東五十里有漢都梁故城渾渾無涯窮虞夏商周之奥義進學解上規姚姒渾渾無涯周誥殷盤佶屈聱牙法言虞夏之書渾渾爾商書灝灝爾周書噩噩爾挺挺有烈願臯䕫稷契之良臣魏謩傳贊挺挺有祖風烈魏徴傳願陛下俾臣為良臣母俾臣為忠臣帝曰忠良異乎曰良臣稷契咎陶也忠臣龍逢比干也昨膺氷漕之計偕趙充國傳氷解漕下武帝紀縣次續食令與計偕師古曰計者上計簿使也郡國每嵗遣詣京師上之偕者俱也令所徴之人與上計者俱来盍對天階之親䇿暫留鴞泮行奮鯤溟某教胄非才負丞知愧並見前友其士之仁者盖有望於名邦忠焉能勿誨乎詎敢當於溢美荘子兩喜必有溢美之言回彭學賔居仁觀國之賔顧屈習鄉之齒易觀國之光利用賔于王禮記元日習射上功習鄉上齒注鄉請飲酒也鄉禮春秋射國蜡而飲酒養老愛人以徳何勤博我之文禮記君子之愛人也以徳細人之愛人也以姑息一謙恵然三復感甚恭惟某官夙充嶽貢班固傳嶽修貢兮川效珍詳見前見謂楚材趙充國傳見謂忠謹左傳雖楚有材晉實用之詳見前子佩明經詎肯受安昌之薦彭宣傳宣字子佩治易事張禹舉為博士禹以帝師見尊信薦宣經明有威重可任政事繇是入為右扶風張禹傳代王商為丞相封安昌侯成就弟子尤著淮陽彭宣至大司空籛鏗好古祇欲為孔子之徒神仙傳彭祖者姓籛名鏗帝顓頊之𤣥孫也殷末已七百六十七歳而不衰行膺拾芥之科寜久采芹之客某自慙學落左傳夫學殖也不殖將落更愧名浮禮記先王謚以尊名節以壹恵恥名之浮于行也憂則違之幸不失黔中之上佐易樂則行之憂則違之注心以為憂已則違之王忠嗣傳明日見青不失一金吾羽林将軍歸宿衛不者黔中上佐耳互見前士之仁者或憐澤畔之大夫屈原漁父篇屈原既放㳺於江潭行吟澤畔漁父見而問之曰子非三閭大夫與何故至於斯回朱齋長兹䝉謙巽又復賁臨用六卦名退而歌鹿鳴之三禮記宵雅肄三官其始也注宵之言小也肄習也習小雅之三謂鹿鳴四牡皇皇者華也疏正義也按鄉飲酒禮燕禮皆歌鹿鳴四牡皇皇者華左傳工歌文王之三又不拜歌鹿鳴之三三拜何止重犀渠之百犀渠楯名周禮犀甲七屬又犀甲夀百年荀子楚人犀兕以為甲堅如金石國語奉文犀之渠左思賦家有鶴膝戸有犀渠注皆楯名蟾枝鵬路所有更以贈君葉少藴避暑錄世以登科為折桂盖用晉書郤詵傳語自唐以来用之温庭筠詩云猶喜故人新折桂自憐覊客尚飄蓬其後以月中有桂故又謂之月桂而月中又言有蟾故又改月為蟾以登科為登蟾宫用郤詵事固已可笑而展轉相訛復爾然文士亦或沿襲因之弗悟也按韓文毛穎傳竊姮娥騎蟾蜍入月盖本寓言然五經通義云月中有兎與蟾蜍何月隂也蟾蜍陽也而與兎並明隂與陽也是月中真有蟾矣又宋仁宗天聖中七月八月之望秋色甚朗有桂子從空降如雨其大如豆有黄白黒三色食之有味辛香僧道式取以種之得二十五本皆成大木其花白其實丹今西湖飛来峯支分而環拱者有曰月桂峰峰有亭曰月桂亭皆因是得名也是月中真有桂矣東坡詩蟾枝不獨同攀桂山谷詩君家所有更贈君餘見前燕厦鶯喬此言何為至我淮南子大厦成而燕雀相賀詩伐木丁丁鳥鳴嚶嚶出自幽谷遷於喬木鶯或作鸎詩有鶯其羽詩傳鶯然有文章鳥倉庚也幽州人謂之黄鶯董仲舒傳此言何為至於我哉回趙省元易學諭以其習易故通篇用卦名盖以文為戲兹䝉躧履寵臨雋不疑傳躧履起臨師古曰履不著根曰躧躧謂納履未正曵之而行言其遽也躧亦作屣王符傳衣不及帶屣履出迎䝉履臨三卦名鳴謙垂賁謙責二卦名栁子之業甚淺未見可師栁文答韋中立論師道書辱書云欲相師僕道不篤業甚淺近環顧其中未見可師者師卦名李翊之問何恭恐孤求益韓文答李翊書生之書辭甚髙而其問何下而恭也重答翊書生之志求知於我耶求益於我耶益卦名恭惟某官氣函趙璧趙璧即和氏璧史記藺相如傳趙惠文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧所謂連城之價也學貫羲圖易繫辭河出圖洛出書聖人則之王弼周易略例邢璹序河龍負圖羲皇畫卦釋文序伏犧因河圖而畫八卦因而重之為六十四禮記河出馬圖正義云伏犧氏有天下龍馬負圖出于河遂法之畫八卦東京賦龍圖受羲龜書畀姒家人則有嚴君觀復不逺易家人有嚴君焉父母之謂也又不逺復无祇悔元吉祇大也迷而不逺故无大悔所以大吉家人觀復三卦名主器莫若長子幹蠱奚先易主器者莫若長子故受之以震又幹父之蠱有子考无咎厲終吉蠱卦名惟精研三聖之書周禮筮人氏掌三易夏曰連山殷曰歸藏周曰周易解此不同按杜子春曰連山伏犧也歸藏黄帝也按禮記曰我欲觀夏道得坤乾焉今歸蔵先以坤後乾則知是殷明矣推歸蔵既在殷製連山理是夏書且博究九師之傳劉向别録所校讐中易傳淮南九師道訓除復重定著十三篇淮南王聘善為易者九人從之採獲故中書題曰淮南九師書鴻漸之為儀可必易鴻漸于陸其羽可用為儀吉漸卦名鶴鳴之好爵何逃繫辭鶴鳴在隂其子和之我有好爵吾與爾縻之注見前某屯蹇餘生屯蹇二卦名乾坤長物長直諒切餘也一曰多也冗也剰也世説王悦見王恭六尺簟謂有餘求之恭即送後悦見恭更無簟恭曰吾平生無長物東坡詩念當掃長物乾坤二卦名相從講朋友之兑不亦悦乎易麗澤兊君子以朋友講習兊悦也同門曰朋同志曰友朋友聚居講習道義相悦之盛莫過於此兊卦名然有非頰舌之咸所能宣者易咸其輔頰舌王弼注輔頬舌者所以為語之具也咸卦名回宋直學學詩侯貢士友徳史掌儀霆楊贊講大价宗西漢之文辭未遑請益東都事畧王珪知制誥其文典麗有西漢風祖東坡之翰墨猥辱鳴謙所願就有道而正焉敢恨何相見之晩也恭惟某官岷峨山立禮記山立時行正義曰山立者若住兵則嶷如山之固不摇動也又摠干而山立江漢淵澄晏如揚雄固已越度於諸子揚雄傳家産不過十金乏無儋石之儲晏如也賛曰揚子之書文義至深而論不詭于聖人若使遭遇時君更閲賢知為所稱善則必越度諸子矣飄然李白誰容流落於六丁牡詩白也詩無敵飄然思不羣韓詩李杜文章在光熖萬丈長仙官敕六丁雷電下取將流落人間者太山一毫芒無忘澤豹以培鵬見前㑹即騰蛟而起鳳王勃滕王閣序騰蛟起鳳孟學士之詞宗紫電清霜王將軍之武庫某再鼓愈淡韓詩有琴具徽絃再鼓聴愈淡五技已窮荀子鼯䑕五技而窮詳見前嘗聞蜀都盖亦兆基於上世左思蜀都賦盖兆基於上世開國於中古蜀王之先名蠶叢柏獲魚鳬滿澤開明是時人萌椎髪左袵不曉文字未有禮樂從開明上至蠶叢積三萬四千歳故曰兆基於上世思樂泮水尚期克廣於徳心詩思樂泮水言采其芹回衆學職濯太白之冰壺知卧月花之影眉州象耳山有李白留題云夜来月下臥醒花影零亂滿人襟袖疑如濯魄於冰壺也磨文饒之璞玉願聞水薤之規辱委贄之寵先愧識賢之緩後恭惟某官炳靈世載蜀都賦江漢炳靈世載其英文獻老成蚤聞髙軒過之吟羅胸有耀新唐書李賀傳七歳能辭章韓愈皇甫湜始聞未信過其家使賀賦詩援筆輙就如素搆自目曰髙軒過二人大驚自是有名賀詩二十八宿羅心胸元精耿耿貫當中左傳光逺而自他有耀者也詎意古戰塲之讀過眼還迷舊唐書李華傳華文體温麗少宏傑之氣蕭穎士辭鋒俊發華自以所業過之疑其誣詞乃為弔古戰塲文熏汚之如故物置於佛書之閣華與穎士因閣佛書得之華謂之曰此文何如穎士曰可華曰當代秉筆者誰及於此穎士曰君稍精思便可及此華愕然東坡送李方叔下第詩平生謾説古戰塲過眼終迷日五色是宜不見於諸侯猶辱觀過於吾黨九萬里風斯下願培鵬路之程三千字日未斜即對龍墀之影俱見前某兹䝉投璧鄒陽傳明月之珠夜光之璧以闇投人於道始悟遺珠狄仁傑傳舉明經調汴州参軍為吏誣訴黜陟使閻立本召訊異其才謝曰仲尼稱觀過知仁君可謂滄海遺珠矣有司以公不以情且相同於采藻昌黎送牛堪序吾未聞有登第於有司而進謝於其門者豈有司之待之也抑以公不以情舉者之望於有司也亦将然乎詩思樂泮水言采其藻於我無怨亦無徳願更草於凌雲左傳無怨無徳不知所報東坡送李方叔詩青袍白苧五千人知子無怨亦無徳又歸家但草凌雲賦我相夫子非臞仙進士回李校正息肩屬爾未遂見賢左傳子駟請息肩于晉霍光傳将軍之廣明都郎屬耳師古曰屬耳近耳也振履跫然猥勤委贄跫虚容切人行聲又喜貌荘子聞人足音跫然而喜退而展玩悚若感慙恭惟某官作賦摩空李賀詩殿前作賦聲摩空成文翻水韓詩文如翻水成飄然太白空望眼於岷峨籍甚仲元輩修名於夷惠法言或問子蜀人也謂人曰有李仲元者人也其為人也奈何曰不屈其意不累其身曰是夷惠之徒與曰不夷不惠可否之間也輩補妹切廣韻等也又類也又比也吴志張温傳孫權問公卿曰温當今與誰為比大司農劉基曰可與全琮為輩太常顧雍曰基未詳其為人温當今無輩離騷經老冉冉其将至兮恐修名之不立若為將仕之諾尚淹行秘之書隋唐嘉話太宗嘗出行有司請載副書以從帝曰不須虞世南在此行秘書也東坡詩豈惟鄴侯三萬軸家有世南行秘書暫客諸侯無謂道旁之苦王戎傳嘗與羣兒戲於道側見李樹多實等輩競趨之戎獨不往或問其故戎曰樹在道邊而多子必苦李也取之信然行賔王國即為席上之珍禮記儒有席上之珍以待聘唐崔逺文才清麗風神峻整當時目為飣座梨言席上之珍也互見前某得姓偶同左傳天子因生以賜姓白虎通姓生也人所稟以生也史記黄帝二十五子其得姓者十四人卜鄰不敏左傳惟鄰是卜又謝不敏焉事其賢者友其仁者足慰逺㳺愛勿勞乎忠勿誨乎尚希餘論南史謝朓好奬人才㑹稽孔顗粗有才筆未為時知孔珪嘗令草讓表以示朓朓嗟吟良久手自折簡寫之謂珪曰士子聲名未立應共奨成無惜齒牙餘論其好善如此代回曾秘校炳世契故人有子昂然野鶴之標見前妙語及門副以家雞之帖庾翼書少與王右軍齊名右軍後進翼猶不分在荆州與都下人書云小兒輩賤家雞愛野雉皆學右軍書栁詩聞道近來諸子弟臨池尋已厭家雞東坡詩君家自有元和腳莫厭家雞更問人恍如喚夢山谷詩為公喚起黄州夢殆不勝情劉禹錫詩二十餘年别帝京重聞天樂不勝情舊人惟有何戡在更與殷勤唱渭城謝疊山云夢得怨舊時之害己者今無一存惟一伎獨在不勝情三字極有味恭惟某官自出清門杜詩于今為庶為清門不為俗學接茶山先生之派信有委而有源曽幾字吉甫自號茶山宋史有傳詳見第一巻上曾樞宻條禮記三王之祭川也皆先河而後海或源也或委也此之謂務本繼郴陽從事之賢諒肯堂而肯搆尚書厥子乃弗肯堂矧肯搆有懐父黨劉向説苑晏子曰臣父之黨無不乗車者見惠客卿揚䧺傳聊因筆墨成文章故藉翰林以為主人子墨為客卿以風共阿戎談自覺後生之可畏王戎傳阮籍與王渾為友戎年十五隨渾在郎舍戎少籍二十歳而籍與之交籍每適渾俄頃輙去過視戎良久然後出謂渾曰濬沖清賞非卿倫也共卿言不如共阿戎談薦禰衡表孰知吾力之不任禰衡傳魯國孔融深愛其材上疏薦之曰處士平原禰衡淑質貞諒英才卓犖性與道合思若有神任座抗行史魚厲節殆無以過也韓文既識路又疾驅兮孰知余力之不任姑記九苞鳳之祥徐思千里馬之報俱見前代回陳宣教植世契紅蓮緑水談舊事以無人詳前翠竹碧梧喜故人之有子韓文退見少傅翠竹碧梧鸞鵠停峙能守其業者也投文為惠陳義甚髙荘子屠羊説居處卑賤而陳義甚髙恭惟某官閥閲芳華典刑炳蔚塤箎伯仲皆嶄然之秀嶄鋤銜切嵒山貌或作嶃司馬相如傳嶄巖尖鋭貌又慈染切餘見前金玉氣質疑小者之佳楚辭金相玉質晉康帝哀册文徽猷豈弟金質玉潤王獻之傳嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒温而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之早騰吐鳳之辭西京雜記揚雄讀書有人語之曰無為自苦𤣥故難傳忽然不見雄著太𤣥經夢吐鳯凰集𤣥之上頃而滅夙記鳴蟬之賦蔡邕曹植陸雲傅咸孫楚並有蟬賦既偶遺於世禄㑹自奮於儒科觀其紙上之詞韓詩開緘忽覩送歸作字向紙上皆軒昂此豈池中之物吴志周瑜傳蛟龍得雲雨終非池中物也栁宗元之記先友賸有人焉栁子厚先君石表先友記先君之所與友凡天下善士舉集焉信讓而大顯道博而無雜今之世言交者以為端敢悉書所尤厚者附兹石以銘於背山巨源之念遺孤焉知来者山濤傳與嵇康吕安善康後坐事臨誅謂子紹曰巨源在汝不孤矣某有懐世契幸及英㳺思不忘久要之言既聞耳矣並見前有可相料理之處願盡心焉料力弔切増韻計也理也王徽之傳卿在府日久比當相料理南史梁末童謡云黄塵汚人衣皂莢相料理代回廖宣義慶成共阿戎談獨未見其父耳嵇紹傳紹始入洛或謂王戎曰昨於稠人中始見嵇紹昂昂然如野鶴之在雞羣戎曰君復未見其父耳餘見前條作靈光賦果有異於人乎後漢書文苑傳王延夀字文考有雋才少逰魯國作靈光殿賦後蔡邕亦造此賦未成及見延夀所為甚竒之遂輟翰而已申之雄箋展也厚意展誠也詩展也大成周禮内司服疏展者言之誠爾雅信也方言荆吴淮泗之間謂信曰展互見前恭惟某官清門有奕素學甚都司馬相如傳雍容閒雅甚都安在何見晩耶小淹賢業繫辭可大業則賢人之幸哉有子如此足表義方王渾妻鍾琰傳生子如此足慰人心左傳愛子教之以義方頗聞及瓜已戒行李韓文宵則沐浴戒行事注事或作李顧念江湖之賜號陸龜䝉江湖散人歌官家未議活蒼生拜賜江湖號散人亦勤煙霧之勒移北山移文鍾山之英草堂之靈馳煙驛路勒移山庭想像朝雲已覺鋪張之巧東坡滿庭芳詞全勝宋玉想像賦髙唐宋王髙唐賦王曰朝雲始出状若何也玉對曰其始出也㬣兮若松榯其少進也晰兮若姣姬揚袂障目而望所思忽焉改容偈兮若駕駟馬建羽旗湫焉如風淒焉如雨風止雨霽雲無處所扶持夜燎更勞駢驪之工陳後山詩人言我語勝黄語扶竪夜燎齊朝光栁文駢四儷六錦心繡口某無以報瓊詩報之以瓊琚又報之以瓊瑶又報之以瓊玖重於辭璧左傳受飱返璧靈椿一而仙桂五跂予望之馮道贈竇禹鈞詩靈椿一株老丹桂五枝芳詳見前詩跂予望之胡琴四而鹿鳴三聊相復也東坡詩自從大雅亾七絃久已廢心知鹿鳴三不及胡琴四左傳歌鹿鳴之三胡琴琵琶也本胡中馬上所鼓四絃以象四時回韋省元患在人師濫綴虞庠之屬禮記有虞氏養國老于上庠養庶老于下庠太學為上庠小學為下庠周制太學為東膠小學為虞庠惠而好我獲窺唐律之工詩恵而好我擕手同行珊瑚鈎詩話蘇李而上髙簡古澹謂之古沈宋而下法律精切謂之律恭惟某官詩解人頤匡衡傳匡説詩解人頤注使人笑不能止也句穿月脅皇甫湜顧況集序逸歌長句駿發踔厲往往穿天心出月脅意外驚人語非尋常所能及也金籯一經之學信有家傳韋賢傳遺子黄金滿籯不如一經蒲帆百尺之風勉為國許羅隠詩唯應鮑叔深知我他日蒲帆百尺風某有勤投璧所乏報瓊鄉人之善好之𤣥遂忘其尚白揚雄傳𤣥得母尚白乎何為官之拓落也後生焉知來者青正望於出藍荀子學不可以已青出於藍而青於藍水水為之而寒於水代回孫秘校暄盖代月湖薄宦走何邕躐升五雉少陵贈别何邕詩生死論交地何由見一人悲君隨燕雀薄宦走風塵故人有孫宰忽寄雙魚杜詩故人有孫宰髙義薄層雲恭惟某官學業甚均交情未憖憖疑僅切缺也左傳兩軍之士皆未憖也重憐瓠落壮不如人荘子瓠落無所容注瓠落猶廓落也左傳臣之壮也尚不如人今老矣無能為也矧復蒲凋老當佚我世説顧悦與簡文同年而髪早白簡文問曰卿何以先老答曰蒲栁之姿望秋而落松柏之姿隆冬轉茂荘子大塊載我以形勞我以生佚我以老息我以死與其佩水蒼而徒爾禮記大夫佩水蒼玉而純組綬百官表注尚書僕射佩水蒼玉官品第三不如飲山緑而終焉東坡詩吴儂生長湖山曲呼吸湖光飲山緑許邁傳眇爾自得有終焉之志王羲之傳初渡浙江便有終焉之志江逌傳耽玩載籍有終焉之志郄愔傳築室章安有終焉之志梁書處士傳劉慧斐逰匡山過處士張孝秀相得甚歡遂有終焉之志又劉紆卜築宋熙寺東澗有終焉之志止足傳陶季直及在京口便有終焉之志魏志陳思王傳登魚山臨東阿喟然有終焉之志南史王彬傳卜室於積榖山有終焉之志王秀之傳營理舍亭山宅有終焉之志陳書江總傳貽厥子孫有終焉之志南史謝靈運傳與隠士王𢎞之等放蕩為娛有終焉之志北史韓延之傳来往北谷塢省魯宗之墓有終焉之志某自揣頭顱陶𢎞景與從兄書今三十六方作奉朝請頭顱可知詳見前難司喉舌未能免俗復叨曳履之榮豈不懐歸已動挂冠之興詩豈不懐歸王事靡盬餘見前代回辛宣教穰辯謗恵以朋箋獸二為友貝二為朋詩朋酒斯饗毛傳兩尊曰朋申之儷語儷即訃切偶也左傳不能庇其伉儷又鳥獸猶不失儷辯先正之謗勁氣凛然尚書昔我先正保衡韓文勁氣沮金石杜詩憶君誦時神凜然叙通家之情髙懐厚甚恭惟某官象賢濟美燕譽蜚英並見前李師中之讀書不難擢第宋史李師中字誠之楚邱人父緯為涇原都監夏久十餘萬犯鎮緯率兵出戰而帥司所遣别将郭志髙逗遛不進諸将以衆寡不敵不敢復出緯坐責降師中詣宰相辯父無罪時吕夷簡為相詰問不屈夷簡怒以為非布衣所宜言對曰師中所言父事也由是知名舉進士王文正之有子猶未沾恩王旦傳贈尚書令魏國公謚文正名臣言行録公以儉約率子弟兄子睦欲舉進士公曰吾常以太盛為懼其可與寒士争進至其薨也子素猶未官遺表不求恩澤是非以久而明賈模傳賈充年衰疾劇恒憂已謚傳模曰是非久自見不可掩也公侯必復其始左傳公侯子孫必復其始一生一死詎敢為翟公之交鄭當時傳下邳翟公為廷尉賔客填門及廢門外可設爵羅後復為廷尉客欲往翟公大署其門曰一死一生廼知交情一貧一富廼知交態一貴一賤交情廼見三浴三熏所望聴韓子之説韓文方将坐足下三浴而三熏之聴僕之所為少安無躁某緬懐契闊詩死生契闊與子成説注契濶勤苦也王肅云言國人室家之志欲相與從生至死契闊勤苦而不相離後漢書范丹傳行路倉卒非陳契闊之所王隆傳契闊夙夜庶不懈怠晉書鍾雅傳贊契闊艱虞㑹稽王道子傳契闊皇家南史劉穆之傳契闊屯夷旋觀終始謝朓傳契闊戎㫋從容讌語梁書王茂傳綢繆休戚契闊屯夷栁慶逺傳契闊禁旅重牧西藩蕭頴達傳契闊屯夷載形心事張𢎞䇿傳自藩升朝契闊夷阻鄭紹叔傳契闊藩朝情跡顯著吕珍傳與朕契闊情兼屯泰沈約傳契闊屯邅困于朝夕侯景傳契闊夷險魏武短歌行契闊談讌心念舊恩陸機詩安得擕手俱契闊成騑服盧諶詩契闊百罹杜詩青雲猶契闊又白首甘契闊李詩生事多契闊按契闊二字人多誤用故詳証之倍有䀌傷䀌迄力切説文傷痛也尚書民罔不䀌傷心吾言之聴者誰與法當小待韓文吾言之而聴者誰與吾唱之而和者誰與馮奉世傳法當倍用六萬人山谷詩法當憔悴百寮底子歸而求有餘也願益自强易君子以自强不息代回曽秘校三益共千里之月猶愆半面之期謝荘賦隔千里兮共明月詩匪我愆期子無良媒謝承書應奉嘗詣袁賀賀時出行閉門造車匠於内開扇出半面視奉奉即委去後數十年於路見車匠識而呼之北齊書楊愔聰記强識半面不忘寄五朶之雲仍負隔年之債債側賣切逋財也廣韻負也白樂天詩顧我酒狂久負君詩債多又走筆還詩債抽衣當藥錢雖迷於復易迷復凶有災𤯝王弼注最處復後是迷者也以迷求復故曰迷復也實感所䝉羊祜傳臣雖小人敢緣所䝉念存斯義陳後山詩所得非所䝉復䝉卦名恭惟某官咳唾成珠後漢書趙壹傳咳唾自成珠牛僧孺贈劉禹錫詩珠玉㑹應成咳唾山川猶覺露精神弟兄連璧魏書陸暐字道暉與弟恭之季順並有時譽洛陽令賈楨見其兄弟歎曰僕以老年更覩雙璧晉書潘岳與夏侯湛並美姿行止同輿接茵京師謂之連璧素所蓄積捲湖海之波瀾司馬遷傳常思奮不顧身以狥國家之急其素所蓄積也作為文章粲朝廷之翰墨韓文沈浸醲郁含英咀華作為文章其書滿家公等安在吾道非耶見前某日既薄西揚雄傳臨汨羅而自隕兮恐日薄於西山星猶拱北晉天文志北極北辰最尊者也極星不移故曰居其所而衆星共之邯鄲借枕雖重㳺廣樂之天宋周煇清波雜志云邯鄲屬磁州䢻山名單盡也言邯山至此而盡見地理志及寰宇記枕中記開元中吕翁經邯鄲有盧生同邸主人方蒸黄粱盧具言處世困厄翁取囊中枕以授之曰枕此當榮適如願盧適枕未㡬登第出入将相五十年榮盛無比忽寤吕翁在旁黄粱猶未熟山谷詩生涯谷口耕世事邯鄲夢史記趙世家與百神逰於鈞天廣樂神武挂冠將終老菟裘之地左傳使營菟裘吾将老焉菟與兎同菟裘魯邑在泰山梁父縣南一云今山東泗水縣有菟裘聚即其地如君善頌非我敢知尚書我不敢知回蹇秘校兹䝉盛服左傳盛服将朝雋不疑傳盛服至門上謁見賁長箋䝉賁卦名吾政何及公言耶深慙溢美劉寵傳拜㑹稽太守郡中大化徴為将作大匠山隂縣有五六老叟自若邪山谷間出人齋百錢以送寵寵勞之曰父老何自苦對曰自明府下車以来狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言耶勤苦父老為人選一大錢受之荘子兩喜多溢美之言是邦友其士仁者尚頼告忠至如社廩之儲尤藉里仁之唱并此叙謝兼布願言回袁進士此君將無是乎愧識賢之不早晉書孟嘉傳嘉少知名褚裒有器識庾亮大㑹州府士人嘉坐次甚逺裒問亮江南有孟嘉其人何在亮曰在坐卿但自覔裒厯觀指嘉曰此君小異得無是乎亮欣然而笑嘉裒得嘉竒嘉為裒所得乃益契焉公等何見晩也辱委贄以甚恭見前景星負先覩之懐韓文朝廷之士引頸東望若景星鳳凰之始見也争先覩之為快明月重闇投之恨鄒陽傳明月之珠夜光之璧以闇投人於道恭惟某人器資凝逺業履端温文章滿家有曄天葩之吐韓文作為文章其書滿家又天葩吐竒芬俊乂觀國何難地芥之收尚書俊乂在官易觀國之光兩夏侯傳士病不明經術經術若明其取青紫如俛拾地芥爾始疑泄栁之閉門今感任棠之出戸並見前某濫分小壘久避正堂曹參傳參於是避正堂舍盖公焉聞髙議傾枚鄒何嫌末至韓詩三賢推侍從卓犖傾枚鄒髙議㕘造化清文煥皇猷謝恵連雪賦召鄒生延枚叟相如末至見刺史即周孔則不敢知栁子厚與杜温夫書来栁州見一刺史即周孔之今而去我道連而謁于潮之二邦又得二周孔去之京師京師顯人為文詞立聲名以千數又宜得周孔千百何吾生胸中擾擾焉多周孔哉回景省元所求乎友未能方深訟愧不見諸侯何義始辱臨存訟臨卦名有勤委贄之華寜恨盍簪之晩見前恭惟某人胸蟠義氣腹溢儒書春登孟子之門固妾婦儀秦之學差入孔氏之室定奴僕屈宋之騷屈原傳屈原既死之後楚有宋玉唐勒景差之徒皆好辭而以賦見稱法言詩人之賦麗以則辭人之賦麗以淫如孔氏之門用賦也則賈誼升堂相如入室矣杜牧李賀集序盖騷之苗裔理雖不及詞或過之使賀未死少加以理奴僕命騷可也新唐書杜審言傳吾文章當得屈宋作衙官吾筆當得王羲之北面其在雲仍山谷墨竹賦第其曽髙昭穆至于來昆仍雲諒有風烈況已入地官之獻周禮地官鄉大夫之職三年則大比考其徳行道藝而興賢者能者鄉大夫羣吏獻賢能之書于王佇亟膺天網之收典論設天網以該之頓八紘以掩之山谷詩天恢獵徳網某假守非才識賢不早當戸而見龎守既爼豆予荘子爼豆予賢人之間餘見前避堂而舍盖公無金玉爾詩無金玉爾音而有遐心餘見前回尋進士救荒以下三條徽本闕今補某問隠遯之肥見賢不早易肥遯无不利子夏傳曰肥饒裕也王弼注超然絶志心無疑顧憂患不能累繒繳不能及是以肥遯无不利也救流離之瘠借助良多詩𤨏兮尾兮流離之子疏瑣者小貌流離梟也爾雅云鳥少美長為鷂􅝎流離之子長大還食其母此流離指饑民方圖草具以盍簪陳平傳以惡草具進楚使注去肴肉更以惡草之具遽屬英辭之􅋦袖韓文文書􅋦袖伏惟某官才髙時輩譽藹月評不見諸侯若小然方踰垣而閉戸為食於路待饑者乃被髪而纓冠禮記齊大饑黔敖為食於路以待餓者而食之思饑諒切於已饑獨樂孰如於衆樂彼或以鄰國而為壑此獨恥匹夫之納溝相友助相扶持得人焉耳無衆寡無小大易地則然某假守䝉成薛宣傳馮翊垂拱蒙成强顔逃責梁書任昉傳四海之議於何逃責既見君子已忻慰趯趯之螽詩喓喓草蟲趯趯阜螽未見君子憂心忡忡注草蟲常羊也趯趯躍也爰及矜人要共念嗷嗷之鴈詩爰及矜人哀此鰥寡又鴻鴈于飛哀鳴嗸嗸注矜憐也矜人可憐之人嗸本作嗷五刀反聲也回蘇秘校榮祖詳啓意知眉州作秘校盖三蘇之裔九州四海知有百年㡬見之人陳後山送蘇公知杭州詩一代不數人百年能㡬見五兩半通偶在一翁二季之里法言五兩之綸半通之銅注綸青絲綬也五兩之綸半通之銅皆有秩嗇夫之印綬印綬之微者也陳後山贈二蘇公詩一翁二季對相望言官三蘇之里濟世乎美見前吾見其孫韓文孔戣墓誌銘孔世卅八吾見其孫恭惟某官規矩髙曽爾雅王父之考為曽祖王父曽祖王父之考為髙祖王父詩曽孫田之疏曽重也自曽祖至無窮皆得稱曽孫山谷集第其曽髙昭穆至於來昆仍雲淵源師友董仲舒傳贊考其師友淵源所漸黄樓一河水親承宗派之傳黄樓在徐州城東北隅東坡為守時増築徐城以捍水因作樓堊以黄土曰土實勝水潁濱作賦陳後山為銘東坡詩青派連淮上黄樓冠海隅又此外有黄樓樓下一河水美哉洋洋乎可以療饑并洗耳青松萬株栽更覺孫枝之茂東坡集予少年頗知種松手植數萬株皆中樑棟矣都梁山中見杜輿秀才求學其法戲贈詩云露宿泥行草棘中十年春雨養髯龍如今尺五城南杜欲問東坡學種松風俗通梧桐生于嶧陽採東南孫枝為琴聲極清麗周禮注孫枝之根末生者也東坡詩縣令若同倉庾氏亭松應長子孫枝互見前佇用元祐之學入對蓬萊之宫蓬萊唐宫名李詩朝天入花中謁帝蓬萊宫某濫長於斯得人焉耳袴歌今五詎能及亷叔之暮來並見前樓近古三儻肯為黎侯而晩賦東坡逺景樓記吾州之俗有近古者三又云軾将歸老于故邱布衣幅巾從邦君於其上酒酣樂作援筆而賦之以頌黎侯之遺愛未晩也詳見前回蘇秘校烝孤雲落照敢言歌樂職之章東坡寄黎眉州詩膠西髙處望西川應在孤雲落照邊王褎傳益州刺史王襄欲宣風化於衆庶使褎作中和樂職宣布詩使好事者令依鹿鳴之聲習而歌之東坡送賈訥倅眉詩我老不堪歌樂職後生試覔子淵才名山大川疑尚有英靈之氣尚書告于皇天后土及所過名山大川稗史東坡之沒士大夫及門人作祭文甚多惟李方叔文尤傳其畧云皇天后土鑒平生忠義之心名山大川還千古英靈之氣在賢者識其大者惟有之是以似之恭惟某人學有家傳文必已出韓文樊宗師墓誌銘惟古于詞必已出降而不能乃剽賊不作人間煙火之語西京雜記揚子雲曰長卿賦不似從人間来其神化所至耶山谷跋東坡卜筭子詞云語意髙妙似非吃煙火食人語非胸中有萬巻書筆下無一㸃塵俗氣誰能至此宜在天上雲霧之窻山谷詩奈此雲窻霧閣何遥遥賈誼之有嘉賈誼傳孝武初立舉賈生之孫二人至郡守賈嘉最好學世其家挺挺魏謩之似證見前子弟何與人事謝𤣥傳子弟亦何豫人事而正欲使其佳詳見前兒郎自有家風新唐書楊𢎞禮隋尚書令素弟之子太宗征遼東拜兵部侍郎駐蹕之役領步騎二十四軍跳出賊背所向披靡帝自山下望其衆袍仗精整人人盡力壮之謂許敬宗曰越公兒郎自有家風力行所知董仲舒傳行其所知則光大矣不聞亦式某朅來假守獲識真儒並見前松聲聞十里之風幸同臭味山谷上東坡詩青松出澗壑十里聞風聲小草有逺志相依在平生小大才則殊氣味固相似薤本置一盂之水更望箴規見前回蘇貢士辰之下第辰之盖坡翁之裔故通篇用坡語童而挾䇿莫非誦眉山之書荘子挾䇿讀書老矣懐章乃獲守通徳之里鄭𤣥傳可廣開門衢令容髙車號為通徳門未遑下榻徐穉傳陳蕃在郡不接賔客唯穉来特設一榻去則懸之王勃文徐孺下陳蕃之榻先辱踵門恭惟某人學有宫庭荀子是君子之所以騁志意於壇宇宫庭也注宫謂之室庭門屏之内也君子雖騁志意論説不出此壇宇宫庭之内也是時百家異説多妄引前古以亂當世故荀卿屢有此言詞無枝葉禮記天下有道則行有校葉天下無道則辭有枝葉注行有枝葉所以益徳也言有枝葉是衆虚華也枝葉依根而生言行亦由禮出承老翁青藜之植王子言拾遺記劉向於成帝之末校書天禄閣夜有老人植青藜杖扣閣而進詳見前擅㓜婦黄絹之才見前平時謾説古戰塲豈料還迷於五色東坡送李方叔詩平生謾説古戰塲過眼終迷日五色歸家但草凌雲賦㑹將放出於一頭東坡送李方叔詩歸家但草凌雲賦我相夫子非臞仙東坡年譜嘉祐二年春赴禮部文忠公知舉得公論騖喜欲以冠多士疑曽子固所為子固文忠門下士也乃寘第二復以春秋義第一謂公必名世以書抵梅聖俞曰讀軾書不覺汗出快哉快哉老夫當避此人放出一頭地互見前某正愧遺賢顧勤委贄貧家見珠貝真成負昡晃之羞晃戸廣切説文明也増韻照耀也東坡詩貧家見珠貝昡晃目難審使君洗樽罍行欲致荒唐之謝東坡送賈訥倅眉州詩童子遥知領襦袴使君先已洗樽罍公自注李大夫眉之賢太守也荘子謬悠之説荒唐之言回孫省元和之吟風弄月之歸未遑請益伊洛淵源明道先生言自再見周茂叔後吟風弄月以歸有吾與㸃也之意裁霧縫雲之作猥辱擊䝉杜詩裁縫雲霧成御衣易擊䝉不利為冦利禦冦注擊去童䝉以發其昧喜聞足音仍拜手筆並見前恭惟某人學行之上法言學行之上也言之次也教人又其次也世載其英蜀都賦江漢炳靈世載其英古稱閉戸之先生豈其苗裔後漢書孫敬字文寳好學閉户讀書不堪其睡以繩繫頭懸之梁上市人呼之曰閉戸先生項籍傳贊舜盖重瞳子項羽又重瞳子豈其苗裔耶霍光傳贊昔霍叔封于晉晉即河東光豈其苗裔乎近恥呈身之御史殆有典刑東軒筆錄孫参抃為御史中丞薦唐介吳中復為御史或問曰君未嘗與二人相識而遽薦之何也答曰昔人恥呈身御史今豈求識面臺官也後二人皆以風力稱於天下久江湖魏闕之逰荘子身在江湖之上居心乎魏闕之下注魏象魏觀闕人君門也許慎云天子兩觀也識伊洛濓溪之派知其主信其客必窮㳺夏之淵源韓文知其主可以信其客者湖南也董仲舒傳贊考其師友淵源所漸猶未及乎㳺夏加其膏希其光詎止卿雲之黼黻韓文養其根而竢其實加其膏而希其光劉孝標廣絶交論卿雲黼黻河漢某未遑避舍見前猥辱踵門一瓣薫南豐之香願觀卒業荘子卒業於夫子楚元王傳浮邱伯在長安元王遣子郢客與申公俱卒業劉歆傳復領五經卒父前業藝文志哀帝復使向子侍中奉車都尉歆卒父業東坡詩逝将棄官往卒業餘見前幅巾援東坡之筆嗣得乞言東坡逵景樓記布衣幅巾從邦君於其上酒酣樂作援筆而賦之禮記凡祭與養老乞言與語之禮注養老人之賢者因從乞善言可行者也四六標準巻三十八, SBCK: ''}
