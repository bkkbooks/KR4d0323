  - {type: variant, offset: 7085, length: 7169, content: 竝見前政恐公車之暮召主父偃傳廼上書門下朝奏暮召入見不容湘水之曉行某嘗具一箋未敢多賀駕彼四牡諒有功而見知竝見前雖則七襄愧成章之匪報詩匪報也永以為好也代囘章提舉良肱郡符訢合庾節光華昔湖南之一州歛此大恵竝見前今江西之列郡汔可小康詩民亦勞止汔可小康說文汔水涸也詩傳危也箋幾也正義曰爾雅􅠟汔也疏近也郭璞曰謂相摩近反覆相訓是汔得為幾也左傳亦引此杜預云期也然則期字雖别皆是近義縯而申之縯引也增韻長也易引而伸之觸類而長之自此升矣見前恭惟某官器資凝逺學行淵源領著讐中豈固薄蓬萊之島劉向傳詔向領校中五經秘書師古曰言中者以别於外栁文謫龍說薄蓬萊羞崑崙而不即抗章請外必欲開祝融之雲見前人言衡山千里之遥禮記自江至于衡山千里而遥孰知周公期年而變兹從畫㦸易畀繡衣載馳載驅民已安於四境見前受容受察吏知服於六條韓文受容受察不復進謝將由膚使之功又趣面君之詔燕人為函粤人為鎛奏技闕然鎛音博田器函鎧也考工記粤之無鎛也非無鎛也夫人而能為鎛也燕之無函也非無函也夫人而能為函也伯氏吹壎仲氏吹篪均茵幸甚周陽由傳汲黯為忮司馬安之文惡俱在二千石列同車未嘗敢均茵焉師古曰茵車中褥也言此二人皆下讓由故同車之時自處其偏側不均敵也互見前某自聞除目尤切懽顔見前託諸矦以寓公自今以始禮記諸矦不臣寓公故古者寓公不繼世正義曰寄公者何也失地之君也或天子削地或被諸矦所逐詩自今以始嵗其有受一㕓於仁政曷月于歸見前代回文思趙提舉希倉疇庸百里進轄五工轄下瞎切音與黠同或作牽說文車軸耑鍵也禮儀知皇帝之尊所闗甚重叔孫通傳髙帝曰吾廼今日知為皇帝之貴也臺閣須子弟之習未占已孚新唐書選舉志李徳裕對武宗曰朝廷選官須公卿子弟為之何者少習其業自熟朝廷事臺閣之儀不教而自成詳見前恭惟某官禮樂宗英典刑家法兩試一同之地並騰三異之聲所去見思願留借㓂後來居上無以易堯並見前夏氏上匠虞氏上陶小煩鳩僝攷工記有虞氏上陶夏后上匠殷人上梓周人上輿尚書共工方鳩僝功周公拜前魯公拜後㑹即象賢見前某天幸同曹霍去病傳亦有天幸早勤委質名父子之歴塊俯仰為僚見前老詩書之斵輪始知終免莊子行年七十而老斵輪山谷詩問取人間老斵輪代回孟提舉植憲曹贊治自揆罔功起部虚員遽叨攝長月湖自刑部侍郎遷工部尚書故云冐國㤙而有靦託隣芘以知歸恭惟某官宻邇王畿尚書宻爾王室久將使簜有功則說行當勞四牡之來並見前位事惟能必進扈六飛之御尚書建官惟賢位事惟能袁盎傳陛下騁六飛馳不測山如淳曰六飛六馬之疾若飛也何㫄觀之巧匠韓文巧匠㫄觀縮手袖間猶不廢乎拙工特枉雙魚見華五雉竝見前某瀆三不告易初筮告再三瀆瀆則不告負四宜休山谷四休居士詩序粗茶淡飯飽即休補破遮寒暖即休三平二滿過即休不貪不妬老即休某水某丘乃童子所釣遊也韓文某水某丘吾童子時所釣遊也詳見前彼鋸彼斧惟梓人之進退焉栁文梓人傳委群材㑹衆工或執斧斤或執刀鋸梓人左持引右執杖而中處焉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斵刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢怨焉代囘廣東孟提舉植避直郎闈服勤使節番陽之召來朝何錫予之詩采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乗馬又何予之𤣥衮及黼嶺嶠于行言逺而光華也恭惟某官受才膚敏賦政中和竝見前不俟駕固將朝陳前甚敬將入門奔而殿敢後則非驅駱馬之嘽嘽詩四牡騑騑嘽嘽駱馬嘽音灘說文喘息也詩傳喘息之貌妥飛鳶之跕跕見前梅花雪片洗空五嶺之炎杜詩梅花萬里外雪片一冬深茶焙鹽帆贍足九年之食使乎不辱王所謂何某有幸卜隣並見前謂當聨事北山瞋膽已移猿鶴之文北山移文蕙帳空兮夜鶴怨山人去兮曉猿驚又叢條瞋膽疊頴怒魄或飛柯以折輪乍低枝而掃迹東野囘頭猶有駏蛩之願昌黎醉留東野詩低頭拜東野願得終始如駏蛩東野不廻頭有如寸筳撞鉅鐘蛩音窮駏音巨說文蛩蛩巨虛獸名也孔叢子北方有獸名蟨食得甘草必齧以遺蛩蛩巨虚二獸見人來必負蟨以走二獸非愛蟨也為其得甘草以遺之蟨非愛二獸也為其假足也司馬相如子虚賦作蛩蛩距虛注卭卭青獸如馬距虚似驘而小郭璞曰距虚即蛩蛩互言耳吕氏春秋北方有獸名蟨䑕前而兎後趨則頓走則顛蛩蛩前足髙不得食而善走蟨常為蛩蛩取食蛩蛩負之而走爾雅西方有比肩獸焉與卭卭岠虚比為卭卭岠虚齧甘草即有難卭卭岠虚負而走其名曰蟨疏云今鴈門廣武縣夏屋山下有獸形如兎而大相負共行土俗名之爲蟨䑕又云亦名巨虚郭璞比肩獸賛曰蟨與岠虚乍兎乍䑕長短相濟彼我俱舉有若自然同心共膂代囘湖北趙提舉師古虎符訢合牡轡光華卧護重湖材素雄於辦治尹賞傳四子皆至郡守皆尚威嚴有辦治名張敞傳武必辦治梁矣互見前身兼數印權益重於按臨見前恭惟某官徳秉忱恂尚書廸知忱恂于九徳之行識全膚敏一路大計惟錢榖幾何刑獄幾何連年多虞盖蓄積缺矣忠信缺矣詩序皇皇者華廢則忠信缺矣華黍廢則蓄積缺矣繡斧兹煩於直指采衣尤樂於平反雋不疑傳即不疑多所平反母喜笑為言語飲食異于他時東坡詩京兆平反一笑春載馳載驅想星言之夙駕是穮是衮將天道之好還穮悲嬌切說文耕禾間也徐曰禾已長大復鉏其間草也廣韻除田薉蓘壅苖也左傳是穮是蓘老子以道佐入主者不以兵强天下其事好還某闕然僝功偶此攝長送之以禮樂愧賀幅之已稽是以有衮衣願徳音之是懋並見前代囘淮東陳倉孔碩抗辭請外將指臨邉明啓刑書未覺丞哉之負尚書明啓刑書胥占時月湖為刑侍式遏㓂虐正觀使者之功詩式遏㓂虐憯不畏明注㓂虐害加于民當用法遏止之恭惟某官表嚴而裏寛人今而學古孔懐同氣蟬孰嘆於有緌詩死䘮之威兄弟孔懐注言兄弟之㤙至厚有死䘮可怖畏之事維兄弟之親甚相思念餘人則不能也禮記成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰正義曰成孟氏所食采邑子臯孔子弟子蠶則績絲作繭蟹背殻似匡范蜂也蜂頭上有物似冠蟬喙長在口下似冠之緌也蠶則須匡以貯繭而今無匡蟹背有匡匡自著蟹則非為蠶設蜂冠無緌而蟬口有緌緌自著蟬非為蜂設譬如成人兄死初不作衰後畏子臯方為制服服是子臯為之非為兄施亦如蟹匡蟬緌各不闗於蠶蜂也折獄片言雀難欺於無角詩誰謂雀無角何以穿我屋注物有似而不同雀之穿屋不以角乃以咮言人誰謂雀無角乎雀若無角何以得穿我屋乎適淮民之饑饉勤周道之逶迤側聞褰帷列子吾側聞之試以告汝良多負襁粟塞其庾斯成末乃取闢之功昌黎元和聖徳詩末乃取闢駭汗如冩優賞將吏扶珪綴組帛堆其家粟塞其庾印弄於朝行有無以易堯之命見前某濫司飾化周禮以九職任萬民五曰百工飾化百材詳見前莫贊光華遺我雙魚豈止加餐之字古詩客從逺方來遺我雙鯉魚呼童烹鯉魚内有尺素書長跽讀素書書中意何如上有加餐飯下有長相思駕彼四駱請歌靡盬之詩見前代囘江西章提舉良肱五雉工正之聯承人之乏左傳攝官承乏餘見前四牡使臣之重博我以文得非所蒙願竊有復恭惟某官内外揚歴表裏融明開南嶽之雲厥功已茂激西江之水所恵滋多竝見前蘇民氣於崇朝詩曽不崇朝又崇朝其雨注崇終也從旦至食時為終朝尚書大傳五嶽皆觸石而出雲膚寸而合不崇朝而雨者唯㤗山雲乎斧盗吭兮未晩吭吉郎切㗋也韓文孰為不順徃斧其吭皇華原隰之上願益咨陬清切雨露之邉㑹觀獻納某强顔曵履决意投簮觀風而問髙年想憐其拙畫地而數佳政亦足以歸代囘浙西林提舉拱辰簮筆何功䝉誤㤙之起廢函牋為恵感妙語之噓枯或承之羞不知所賀並見前恭惟某官髙誼絶俗厚徳鎮浮宜頡頏於飛霞韓詩乞君飛霞佩與我髙頡頏猶簸弄於明月韓詩婆娑海水南簸弄明月珠駕彼四牡名大震於京師法言谷口鄭子真不詘其志耕於巖石之下名震於京師遺我䨇魚光自生於庭戸某拜命之辱左傳莊公十一年宋大水公使弔焉曰天作滛雨而害于粢盛若何不弔對曰孤實不敬天降之災又以為君憂拜命之辱又齊人獲臧堅齊矦使夙沙衛笞之且曰無死堅稽首曰拜命之辱有味其言咫尺不違顔雖少華於末路鄒陽傳晚節末路八十猶行脚諒見笑於大方代回淮東劉提舉庶斜日投閑冐誤㤙而入侍朶雲借潤儷好語以相先自惟闕然何以得此恭惟某官早飛雋望寖踐夷塗忽持漢節之光華出問淮人之饑饉民為國之本不應一付之烏鳶並見前君乘使者車乃可再安於鴻鴈詩序鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之餘見前行且召矣願少需之某生也有涯見前身其餘幾左傳畏首畏尾身其餘㡬言人之一身既畏其首又畏其尾則其中不畏者不多意行迷路又渉赤墀之塗興盡囘船終尋黄石之約晉書王徽之嘗居山隂夜雪初霽月色清朗四望皓然獨酌酒詠左思招隐詩忽憶戴逵逵時在剡便夜乘小舟詣之經宿方至造門不前而反人問其故徽之曰本乘興而來興盡而反何必見安道耶張良傳老父曰後十三年孺子見我濟北穀城山下黄石即我已後十三年從髙帝過濟北果得穀城山下黄石取而寳祠之代囘淮東趙提舉希道甸侯底績栁詩繼酬天禄署俱尉甸侯家庾節遄驅十二政之聚民可觀近效周禮荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛役五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昬十有一曰索鬼神十有二曰除盗賊六百石之察郡益究逺圖漢百官表武帝元封五年初置部刺史掌奉詔條察州秩六百石邉靣得賢宋史曹彦約傳彦約以蜀之邉靣諸司並列兵權不一作病夫議獻之廟堂上心倚重恭惟某官禀資信厚詩序麟趾闗雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也毓徳直温尚書命汝典樂教胄子直而温寛而栗頃結綬於王畿顔延之詩結綬登王畿即分符於輔郡適時艱食尚書奏庶艱食鮮食極力救荒能活數千萬人之饑何必四十二考之政宋富鄭公弼坐謗徙知青州㑹河北大水流民轉徙東下者六七十萬人公一皆招納之勸民出粟自為區畫散處境内室廬飲食醫藥纎悉無不備從者如歸市有勸公非所以處疑弭謗禍且不測公曰吾豈以一身易此六七十萬人之命哉行之愈力明年河北二麥大熟人皆襁負而歸則公所全活也公嘗與一所厚書云在青州偶能全活數萬人勝二十四考中書令逺矣出葉少蘊避暑語錄有華出綍亟命搴帷財貨本末源流諒皆素習荀子田野縣鄙者財之本也垣窌倉廪者財之末也百姓時和事業得叙者貨之源也等賦府庫者貨之流也勞來還定安集自有成規六轡既均二節以走某欽聞視篆未果襞牋遺我䨇魚良感從逺方之恵駕彼四牡何幸勞使臣之來並見前代回湖北曹提舉彦約短衣疋馬又塵紫槖之班長跪䨇魚如見繡衣之面盧仝詩開緘如見諫議靣餘竝見前雖無以報東坡祭韓忠獻公文雖無以報不辱其門敢誦所聞恭惟某官學本遺經韓詩獨抱遺經究終始用周當世一種陶潜之秫秫食律切說文穀之黏者増韻糯也考工記鍾氏以朱湛丹秫晉書隐逸傳陶潜為彭澤令在縣公田悉令種秫穀曰令吾常醉於酒足矣再依王儉之蓮見前扞敵騎於淮濱晉書謝𤣥敗苻堅於淮水見八公山草木皆兵屹長城於漢水恢然游刅經肯綮之未嘗並見前快哉此風摶扶摇而在下宋玉風賦快哉此風寡人所與庶人共者耶屬重湖之瘡痏痏榮美切說文疻痏也廣韻瘡痏顔真卿傳瘡痏未平西京賦所惡成瘡痏東坡詩莫生尤物為瘡痏煩一節之咨諏禮記一節以走詩周爰咨諏因而訪桃源之桃不妨假館桃源山在常徳府桃源縣二十里圖經云山下有桃川宫西南一里有桃源洞云是昔秦人避亂之地有洞如門巨石屏蔽靈跡猶存今為第三十五小洞天陶淵明桃花源記云晉太元中武陵漁人沿溪行忽逢桃花夾岸行盡小源得一山有小口捨舟從口入豁然開朗男女衣著悉如外人自云先世避秦來此問今是何代乃不知有漢無論魏晉漁人出具告太守遣人隨徃迷不得路後遂無問津者任安貧武陵記晉太康中武陵漁人黄道真泛舟自沅泝流而入道真既出白太守劉歆歆與俱徃則已迷路與陶記畧同宋鄭景望蒙齋筆談云陶淵明所記桃花源今鼎州桃花觀即是其處湖湘間人頗能言其勝事云自晉宋來由此上昇者六人假館曹交事恐未熟橘洲之橘已見趣裝橘洲在常徳府龍陽縣西北五十里周回三里長二十里本名汎洲盛𢎞之云李衡字平叔仕呉為丹陽太守每欲理産業妻習氏不許衡宻遣人於龍陽汎洲種橘千株臨終勅其子曰汝母惡吾營家故貧如此吾於汎洲種橘乃千頭木奴不匱汝衣食太史公言江陵千株橘其人與千戸侯等盖謂此也今洲上民數百家橘不存矣湘中記或曰昭潭無底橘洲浮每大水諸洲皆沒而橘洲獨存焉趣裝曹參事某久於離群禮記離群索居兹焉還綴綴林衛切音與惴同禮記行綴疏謂鄼也正義曰謂鄼聚舞人行位之處老夫耄矣更數旬金馬之門左傳老夫髦矣無能為也晉書索紞傳老夫耄矣不為媒也顔真卿傳老夫髦矣曾掌國禮我公歸兮或一笑銅駝之陌詩無以我公歸兮薛宣傳壹关相樂師古曰壹关謂一為歡关耳关古笑字晉書索靖傳靖有先識逺量知天下將亂指洛陽宫門銅駝歎曰㑹見汝在荆棘中耳白帖洛陽大道有銅駝因名銅駝陌陸機洛陽記金馬門外聚群賢銅駝陌上集少年又云有銅駝二枚在宫之南四㑹道師古曰亦云銅駝街在洛陽西京無也陳書徐陵傳盧龍之徑于彼新開銅駝之街於我長閉梁詩穿渠引金谷闢道出銅駝代囘趙提舉汝讜代衛參帥趙汝讜傳為大理司農丞與史彌逺不合請外改湖南提舉常平易江西尋提㸃刑獄分閫罔功願歸吳下江表傳吳下阿䝉改轅有命俾牧閩中史記東越傳以其地為閩中郡徐廣曰今建州侯官是髙帝紀帥閩中兵以佐滅秦業已控辭期於得請欲謝吹嘘之送杜詩揚雄更有河東賦唯待吹嘘送上天已成怠緩之慙恭惟某官屈漢宗英持周使簜江湖表裏勤四牡之載驅並見前山岳動摇覺千牛之立觧唐韋仁約除御史曰御史啣命出使不能動摇山嶽震懾州縣誠曠職耳莊子所觧數千牛矣謋然已觧如土委地注理觧而無刀迹若聚土也饑者欲令其得食慨然已見於登車諒必由洪都新府而來猶可陪冀州故人之飲俱見前行止非人能也得無戀戀之情范睢傳綈袍戀戀有故人之意邂逅適我願兮宜有諄諄之誨苐恐一節之走能回六轡之馳某正爾思蓴又䝉分竹俱見前冞入其阻足觀海上之禽魚詩冞入其阻注冞者深入之意不已於行只負山中之猿鶴詩或燕燕居息或盡瘁事國或息偃在牀或不已於行北山移文蕙帳空兮夜鶴怨山人去兮曉猿驚代回王提舉遇代月湖右翊合符左畿易節田里之無愁歎畫地共談原隰之有光華去天一握三秦記民謡曰武功太白去天三百孤雲兩角去天一握山水險阻黄金子午蛇盤馬櫳勢與天通方輿勝覽孤雲山在興元府亷水縣東南百七十里與兩角山相連玉堂閑話云興元之南有太行路通於巴州其路險峻三日而達於山頂其絶髙處謂之孤雲兩角去天一握淮隂廟在焉按興元即今陜西漢中府宋𨽻利州東路恭惟某官學為儒倡新唐書韓愈傳贊以六經之文為諸儒倡政作吏師朱愽傳贊所在而治為世吏師出守晋陵適楚氛之甚惡常州晋為毘陵郡又諱毗改晋陵郡又京口亦稱晋陵宋書武帝紀過江居晋陵郡丹徒縣之京口里左傳楚氛甚惡獨明名教救周民於孑遺茲由畫㦸之香進席繡衣之寵席藉也尚書兹殷庶士席寵惟舊公方念越人之瘠加戚於心韓文若越人視秦人之肥瘠忽焉不加喜戚於其心上將思王某之文最宜為誥韓文王某之文可思最宜為誥某比方謁入復辱書來四牡之勞使臣行且召矣五雉之為工正猶幸見之俱見前囘尤提舉棐去國奉祠久抱伐檀之愧詩序伐檀刺貪也在位貪鄙無功而受禄君子不得仕進爾起家進職忽叨分竹之榮曾巽謝之未遑何謙撝之甚寵恭惟某官見聞博洽議論崇谹尚書之履有聲典刑是似部使之斧直指風采凛然皇華寜乆於咨諏清切即觀於獻納並見前某仝為吳客共落楚鄉徳必有隣倚輔車而増重輔說文頰車也左傳輔車相依注輔頰輔車牙車也或作䩉易咸其䩉虞云耳目之間稱䩉釋名曰頥或曰輔車其骨彊可以輔持其口或謂牙車牙所載也或謂頷車也詩巧笑倩兮毛傳云好口輔也詳此則牙車頷車牙下骨之名也頰之與輔口旁肉之名也葢輔車一處分為二名耳輔是外表車是内骨故云相依觀唇齒之喻則皆近取諸身耳恐人以為車輔之輔故詳著之服之無斁藏簡牘以為榮詩為絺為綌服之無斁宗正宋四朝志元豐官制行詔大宗正司不𨽻六曹大宗正以宗室團練使以上有徳望者為之次一人為同知位髙屬尊者為判掌紏合族屬而訓之以徳行道藝受其詞訟而紏正其愆違有罪則先劾以聞法例不能决者同上殿取裁凡宗室服屬逺近之數及其賞罸規式皆總屬之代囘西外趙知宗不懬懬苦謗切說文闊也漢武帝詔庶僚久懬宋㑹要崇寜九年蔡京申請宗正既許分居兩京輔郡乞於兩京置外宗正司擇宗正賢者管幹逐處各置一人仍於本州通判職官内選二人兼領丞簿凡外任宗室事不于州縣者外宗正受理大觀三年罷政和二年復置南渡後南外置司泉州西外置司福州丞係猝兼簿係僉判兼小宰立班愧星辰之曵履周禮小宰之職掌建邦之宫刑以治王宫之政令杜詩聽履上星辰大宗維翰貽月露之連篇詩大邦維屏大宗維翰注大宗王之同姓適子翰幹也李諤書連篇累牘不出月露之形積案盈箱惟是風雲之狀雖過乎情良感此意恭惟某官忱恂有守信厚不浮並見前敷天揖同姓之聨肅然紏合左傳昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府太師職之桓公是以紏合諸矦而謀其不協彌逢其闕而匡救其災昭舊職也晝日宣三徳之敬莫不浚明易晝日三接尚書日宣三徳雖云為善之居家尤樂推賢而報國有華新渥杜詩新渥照乾坤猥及陳人某司臬亡庸共工甚忝見前虎拜稽首願觀蕃錫之榮詩虎拜稽首天子萬年易康矦用錫馬蕃庶晝日三接龍作納言已懼曠瘝之辱尚書龍命汝作納言代囘西外趙知宗不懬疏詔東平後漢書東平憲王蒼建武十五年封東平公十七年進爵為王贊曰東平好善辭中委相展親西外尚書時庸展親王曰叔父立愛始于家邦詩王曰叔父建爾元子尚書立愛惟親立敬惟長始于家邦終于四海汝作秩宗受祉施於孫子尚書帝曰俞咨伯汝作秩宗詩既受帝祉施於孫子棣華韡韡韡音偉說文盛也詩棠棣之華鄂不韡韡鄂通作萼毛傳鄂猶鄂鄂然言外發也箋云承華者曰鄂𤓰瓞緜緜瓞音垤詩緜緜𤓰瓞民之初生自土沮㵕詩傳曰瓞小𤓰在枝間連大𤓰也以喻子孫承嗣也毛傳𤓰紹也箋云𤓰之本實繼先嵗之𤓰必小狀似瓝故謂之瓞正義云𤓰族類有二種大者𤓰小者瓞𤓰蔓近本之𤓰必小於先嵗之大𤓰其小如瓝瓞是瓝之别名恭惟某官大雅不羣為善最樂並見前箴規磨琢蹈衛武之流風詩序淇澳羙武公也有文章又能聽其規諫以禮自防故能入相于周羙而作是詩也忠義輪囷粲劉向之封事劉向傳天子擢周堪為光禄勲堪弟子張猛光禄大夫給事中大見信任𢎞恭石顯憚之數譛毁焉更生見堪猛在位幾已得復進懼其傾危乃上封事時上無繼嗣政由王氏出災異寖甚向謂陳湯曰災異如此而外家日盛其漸必危劉氏吾幸得同姓末屬歴事三主吾而不言孰當言者遂上封事極諫庸專紏合之任見上條助成睦族之仁周之宗盟誰若滕矦之長左傳滕矦薛矦來朝爭長薛矦曰我先封滕矦曰我周之卜正也薛庶姓也我不可以後之公使羽父請于薛矦曰周之宗盟異姓為後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯唐之宰相豈遺徳裕之賢新唐書宗室宰相傳贊唐宰相以宗室進者九人林甫姦䛕幾亡天下李程和柔在位無所發明其餘以財稱職號賢宰相某側聽渙揚未遑旅賀渙旅卦名召伯分治諒信如麟趾之時詩序闗雎之化行雖衰世之公子皆信厚如麟趾之時詳見前長卿倦㳺愧莫續兎園之賦見前四六標準卷二十六, SBCK: ''}
