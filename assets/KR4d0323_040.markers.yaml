  - {type: variant, offset: 33771, length: 6063, content: 律厯志取竹之解谷斷兩節間而吹之以為黄鍾之宫制十二筩以聴鳳之鳴又五聲之本生於黄鍾之律九寸為宫或損或益以定商角徵羽賀胡通判衍甲申甲申為寧宗嘉定十七年梅亭時年五十一歳在申而得酒已回葭律之温見前斗建子以挹漿正作菊潭之夀風俗通南陽酈縣有甘谷谷水甘美云其山有大菊水從山上流下得其滋液谷中有三十餘家不復穿井悉飲此水上夀百二三十中百餘下七八十者名之大夭菊花輕身益氣令人堅强故也司空王暢太尉劉寛袁隗為南陽太守聞有此事令酈縣月送水二十斛用之飲食諸公多患風眩皆得瘳盛宏之荆州記酈縣菊花水太尉胡廣乆患風羸恒汲飲此水後疾遂瘳年近百歳非惟天夀亦菊延之此菊甘美廣後收此菊實播之京師處處傳植星屏所舍雲氣可占恭惟某官徳與時偕道随剛長見前千里分風月之半邦國不空古詞獨倚胡牀庾公樓外峯千朶與誰同坐明月清風我别乗一來有唱終須和還知麽自從添箇風月半分破王祥傳邦國不空别駕之功六爻見天地之心公侯必復易六爻發揮旁通情也左傳公侯子孫必復其始餘見前諒裒純嘏即上清班東坡詩珪璋滿清班某百念灰寒白樂天冬至詩心灰不似爐中火鬢雪過於砌下霜寸材線短窮簷日煖不堪輸炙背之忠嵇康與山濤絶交書野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣别駕氷清詎敢作持杯之祝隋書循吏傳趙軌河南雒陽人為齊州别駕在州四年考績連最高祖徵軌入朝父老相送者各揮涕曰别駕在官水火不與百姓交是以不敢以壺酒相送公清若水請酌一杯水奉餞軌受而飲之賀史通判湜葭律浮灰候臨小至少陵有小至詩注或云陽為大隂為小冬至隂極故曰小至稗史說者謂冬至前一日為小至歳時雜詠盧照隣年日述懷云人歌小歳酒花舞大唐春是以元日為小歳以此觀之子美之小至即冬至也杜詩有小寒食舟中作注云小寒食如小至謂前一日也棘評佐獄慶叶大來禮記正以獄成告于大司冦大司冦聽之棘木之下陳子昻集豫參評于詔獄易㤗小往大來吉亨遠莫捧於兕觥見前誠敢輸於魚素古樂府呼童烹鯉魚中有尺素書恭惟某官氣鍾温厚禮記天地温厚之氣始于東北而盛于東南此天地之盛徳氣也此天地之仁氣也徳廸中和尚書允迪厥徳傑然驥展之材監此龍潜之邸易乾初九潜龍勿用鸚鵡杯鸕鷀杓滿介夀祺李詩鸕鷀杓鸚鵡杯百年三萬六千日一日須傾三百盃孔雀扇麒麟爐即儀禁甬少陵至日遣興詩麒麟不動爐煙上孔雀徐開扇影還甬尹竦切韓詩龍斾垂天衛雲韶凝禁甬某襪材綫短泥軾氷寒見前乃分之宜詎敢耻狐貉之厠韓文投閒置散乃分之宜厠初吏切韻㑹間也次也惟鄰是卜尚祈分燈燭之光左傳非宅是卜惟鄰是卜二三子先卜鄰矣史記甘茂傳甘茂之亡秦奔齊逢蘇代代為齊使於秦甘茂曰臣得罪於秦懼而遯逃無所容跡臣聞貧人女與富人女㑹績貧人女曰我無以買燭而子之燭光幸有餘子可分我餘光無損子明而得一斯便焉今臣困而君方使秦而當路矣茂之妻子在焉願君以餘光振之回寶慶陳通判中清氷出壑未皇瞻仲舉之輿杜詩炯如一段清氷出萬壑置在迎風寒露之玉壺謝承書周景為豫州辟陳蕃為别駕不就景題别駕輿曰陳仲舉座也不復更辟蕃惶懼起視職至日閉關乃倐領孟公之牘倐式竹切説文走也從犬攸聲讀若叔廣韻倏忽犬即走也通作儵俗作倐非游俠傳陳遵字孟公性善書與人尺牘主皆藏弆以為榮既先施之不敏復倒置之可慙莊子䘮已于物失性于俗者謂之倒置之民感君子之鳴謙增小人之自訟謙訟卦名恭惟某官徳星維夏郊祀志望氣王朔言獨見填星出如𤓰食頃復入有司皆曰陛下建漢家封禪天其報徳星云師古曰徳星即填星也言天以徳星報於帝異苑陳寔與諸子姪造荀淑父子討論于是徳星聚太史奏曰五百里有賢人喜氣排冬韓詩喜氣排寒冬汗漫九垓共佇舊氊之復淮南子吾與汗漫期于九垓之外吾不可以乆駐王獻之傳夜卧齋中而有偷人入其室盗物都盡獻之徐曰青氊我家舊物可特置之翺翔半刺暫增新府之雄杜詩半刺已翺翔王勃滕王閣詩序南昌故郡洪都新府召棠之䕃既成漢竹之符孔邇見前將恐合八能於鸞殿關中記未央殿東有鳳皇殿鴛鸞殿西京賦鳳皇鴛鸞注皆後宫别名唐太宗實録貞觀十八年十一月宴父老于儀鸞殿八能見本巻代回大理趙少卿條徑當歸三㸃之鴛行見前某未遂披雲曹植謝入覲表若披浮雲而曬白日樂廣傳尚書令衛瓘見而竒之曰此人之水鏡見之瑩然若披雲霧而睹青天也已深蒙霧東坡集餘膏所燭常分無盡之光蒙霧而行皆獲不知之潤無蠏徒名於監郡歸田録宋初懲藩鎮之弊置通判以貳州事既非官屬故嘗與知州爭權每云我是監郡朝廷使我監汝舉動為其所制太祖聞而患之下詔書戒勵使與長吏恊和自此稍戢然至今州郡往往與通判不和往時有錢昆少卿者家世餘杭人也杭人嗜蠏昆嘗求外補人問其所欲何州昆曰但得有螃蠏無通判處則可矣至今士人以為口實東坡詩欲問君王乞符竹但憂無蠏有監郡不龜敢望於封侯莊子宋人有善為不龜手之藥者世世以洴澼絖為事客聞之請買其方百金以説呉王越有難呉王使之將冬與越人水戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也蒙篤二郡三武岡之情武岡州今屬寶慶府特有一紙十從事之况劉宏傳得劉公一紙書賢于十部從事公歸無所亟觀孔雀扇影之還詩公歸無所於女信處杜詩孔雀徐開扇影還徳必有隣尚憶狐貉緼袍之立代回嘉興楊倅祖堯圭日舒長頓覺牽牛之逺屏星絢彩益知展驥之長諒當來復之辰見前丕擁疇離之祉易否九四有命旡咎疇離祉疏疇謂疇匹謂初六也離麗也謂附著也言九四命初身既无咎初既被命附依祉福伏惟某官禀姿温厚賦政和明詩賦政于外四方爰發題别駕之輿流聲藉甚懷刺史之綬闔境安之朱買臣傳懷其印綬歩歸郡邸幸為嘉禾之民呉黃龍五年嘉禾生於由拳改嘉禾縣益廣甘棠之䕃某無由面賀猥辱手書劉宏傳手書守相丁寧欵宻感佩高情藏但深於十襲闕子宋愚人得燕石藏之以為大寶革匱十重緹巾十襲詳見前噓呵凍筆報有愧於七襄天寶遺事李白嘗於便殿對明皇撰詔誥時十月大寒筆凍不能書字帝勅宫嬪十人侍白左右各執牙筆呵之代回華亭錢宰徳謙華亭秦漢為婁縣地漢末孫呉封陸遜為華亭侯華亭之名始見唐為崑山嘉興海鹽三縣地天寶間割置華亭縣宋因之律中黄鍾之宫是名天統見前身為赤縣之令盖近日畿杜氏通典唐縣有赤畿望𦂳上中下六等之差注京師所治為赤縣京之旁邑為畿縣赤縣三府共有六縣韓詩嗟我身為赤縣令操權不用欲何俟尚書考靈憲崑崙東南有赤縣之州風雨有時寒暑有節茍非此土南則多暑北則多寒東則多隂故聖人不處焉白虎通京師者千里之邑號也法日月之徑千里周書注畿方千里取象于日互見前動惟厥時尚書慮善以動動惟厥時利有攸往易七日來復利有攸往彖曰利有攸往剛長也恭惟某官用儒飾吏循吏傳序唯江都相董仲舒内史公孫宏兒寛居官可紀三人皆儒者通於世務明習文法以經術潤飾吏事以政凝民一綫初長技可伸於刀錦左傳子皮欲使尹何為邑子産曰不可猶未能操刀而使割也其傷實多子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎重緹方煖政肯急於繭絲亟諧六鳳之筩遂振雙鳬之舄某濫紆朝紱持辱賀緘烹魚得書莫報五雲之體拂龜端策但占七日之來俱見前代回黃巖楊宰圭黄巖在台州東南六十里本東漢章安縣地永和中置永寧縣呉屬臨海郡隋改永寧曰永嘉又分其地入臨海縣屬永嘉郡唐復析置永寧縣屬台州天授初改黄巖縣以山為名宋因之黄巖山在黄巖縣西一百二十里山頂有黄石一名仙石山俗傳仙人王方平居此上有王公客堂魯臺紀瑞肇新太史之占見前楚縣分封亶為令尹之室杜氏通典周官有縣正春秋時列國相滅多以其地為縣則縣大而郡小故傳云上大夫受縣下大夫受郡縣邑之長曰宰曰尹曰令曰大夫晉謂之大夫魯衛謂之宰楚謂之令尹恭惟某官天朝儀羽韓文智以謀之仁以居之吾知其去是而羽儀於天朝也不逺矣巖邑絃歌地氣浮葭新漢庭之律吕見前岸容舒栁認陶令之風流杜詩岸容待臘將舒栁陶潜傳嘗著五栁先生傳以自况曰先生不知何許人不詳姓字宅邊有五栁樹因以為號届此令辰宜其遐祉某寵勤下問愧未先施紅蠟塗金良照形容之獨老杜詩題詩蠟炬紅又江上形容吾獨老黄柑噀玉仍慙口腹之累人風土記甘橘之屬滋味甜美特異者也有黄者有頳者謂之壺甘司馬相如傳黄甘橙榛郭璞曰黄甘橘屬而味精崔寔政論今之臣妾皆餘黄甘而厭文繡晉令閩中縣置守黄甘吏一人廣志犍為南安縣出黄甘梁劉孝儀謝晉安王賜甘啟削彼金衣咽兹玉液稗史貞柑在品類中最貴可珍膚理如澤蠟始霜之旦園丁採以獻風味照座擘之則香霧噀人東坡食柑詩清泉蔌蔌先流齒香霧霏霏欲噀人又二年洞庭秋香霧長噀手今年洞庭春玉色疑非酒後漢書周黄徐姜申屠傳序太原閔仲叔者世稱節士客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞敕吏常給焉仲叔恠而問之知乃歎曰閔仲叔豈以口腹累安邑耶遂去客沛代回趙縣宰天運回壬萬物以之姙育壬如林切説文位北方也隂極陽生故易曰龍戰于野戰者接也象人懷妊之形月令注壬之言任也律厯志懷任于壬斗柄挿子一陽於是孽生韓詩元和庚寅斗挿子曹植表千載昌期一陽嘉節四方交㤗萬物昭蘇時惟字民之官説文字字乳也易女子貞十年不字乳也又愛也左傳大不字小周禮地官之注小國貢輕字之也坐膺善治之福恭惟某官仁風破臘喜氣排冬舒栁放梅散作河陽之煖李詩河陽花作縣吹竹生黍薫為嶰谷之和律厯志取竹之解谷斷兩節間而吹之劉向别録鄒衍在燕燕有谷地美而寒不生五榖鄒子居之吹律而温氣至而榖生今名黍谷趙日之愛既深見前堯雲之就何逺史記帝堯本紀就之如日望之如雲注如日之照臨人咸依就之若葵藿傾心以向日如雲之覆幄言徳化廣大而浸潤生人人咸仰望之如百榖之仰膏雨也某寸材綫短百念灰寒雪後擁爐固已重拜其細左傳晉侯享穆叔金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子曰吾子舍其大而重拜其細何也天隅把繡更得三復之藏杜詩刺繡五紋添弱線又天隅把繡衣回外縣復其見天地之心小人恐矣左傳齊孝公伐我北鄙公使展喜犒師齊侯曰魯人恐乎對曰小人恐矣君子則否此借用誠者合内外之道君子觀焉宜有隂隲之祥尚書惟天隂隲下民式介陽休之徳伏惟某官氣排冬凛政體春和文帝紀詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡而莫之省憂為民父母將何如坎維心亨既生芸而挺荔易習坎有孚維心亨行有尚注陽不外發而在乎内心亨者也泰交征吉將連茹以㧞茅易天地交泰初九㧞茅茹以其彚征吉詳見前對栁舒梅放之辰擁松茂竹苞之慶見前某幸叨聨事辱畀屬辭禮記屬辭比事春秋教也正義曰屬合也比近也春秋聚合㑹同之辭是屬辭比次襃貶之事是比事也於我如浮雲臺空登於魯觀見前其志在流水琹孰聽於圜丘吕氏春秋伯牙鼔琴鍾子期善聽之方鼔琴志在流水鍾子期曰善哉乎鼔琴洋洋乎若流水周禮孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之普回州縣官視朔登觀又逢十九歳之章左傳日南至公既視朔遂登觀臺以望而書禮也後律厯志四時推移故置十二中以定月位有朔而無中者為閏月中之始日節與中為二十四氣以除一歳日為一氣之日數也其分積而成日為沒沒并歳氣之分如法為一歳沒沒分于中中終于冬至冬至之分積如其法得一日四歳而終月分成閏閏七而盡其歳十九名之曰章測日候圭可愛一丈三之日周禮大司徒以土圭之法測土深正日景以求地中日南景短多暑北景長多寒東景夕多風西景朝多隂日至之景尺有五寸謂之地中左傳趙衰冬日之日也注冬日可愛易氏解冬至日在北陸躔牽牛去極一百十六度有竒而景長丈有三尺因微芒之陽徳杜牧之詩陽徳比君子初生甚㣲芒賀方榖之正人尚書凡厥正人既富方榖孔傳凡正直之人既當以爵禄富之又當以善道接之伏惟某官毓秀昴躔春秋佐助期蕭何禀昴宿而生任昉王文憲集序昴宿垂芒徳精降祉尚書日短星昴以正仲冬垂光井絡禰衡傳揚聲紫㣲垂光虹蜺文選岷精垂曜于東井又岷山之精上為井絡噓物以氣既挺荔以生芸見前贈人以言亦連珠而合璧荀子贈人以言者重於金石珠玉説苑贈人以軒不若贈人以言尚書考靈曜日月五星冬至起牽牛日月若懸璧仰觀天形如車盖衆星纍纍如連貝其考六日四分之鳳厯入陪五更三㸃之鵷行並見前某睆彼牽牛睆音莞詩睆彼牽牛不以服箱注睆明星貌河鼓謂之牽牛服牝服也箱大車之箱也眇焉負鶴天隅把繡自知無一綫之長見前漢女支機聊復效七襄之報荆楚歳時記漢武帝令張騫使大夏尋河源乗槎經月而至一處見城郭如州府室内有一女織又見一丈夫牽牛飲河騫問曰此是何處答曰可問嚴君平織女取支機石與騫而還後至蜀問君平君平曰某年某月客星犯牛女支機石為東方朔所識集林昔有一人尋河源見婦人浣沙以問之曰此天河也乃與一石而歸問嚴君平云此織女支機石也南墅閒居録元豐末有人擕支機石投進者廣可二斗許不圓㣲峩而碧色天漢左界北斗經其上宋之問明河篇明河可望不可親願得乗槎一問津更將織女支機石還訪成都賣卜人謝寄居鄉官杓攜龍角天正肇新律厯志天統之正施於子半律轉鳳筩人時敬授有如是邦大夫之賢者宜曰予攸好徳而錫之尚書而康而色曰予攸好徳女則錫之福恭惟某官和氣融氷修名揭日離騷經老冉冉其將至兮恐修名之不立修名修潔之名也放梅舒栁不妨泛栢以浮椒挺荔生芸行即㧞茅而連茹七日來復百禄是遒並見前某假守鄭鄉鄭𤣥傳相國孔融深敬於𤣥為𤣥特立一鄉曰鄭公鄉詳見前又登魯觀見前按商旅不行之卦敬已閉關易雷在地中復先王以至日閉關商旅不行味形容獨老之詩每思專壑杜詩江上形容吾獨老陸機文古之逸民輕天下而欲專一丘之懽擅一壑之美豈不身重於宇宙哉世説明帝問謝鯤君自謂何如庾諒曰端委廟堂使百官凖則臣不如諒一丘一壑自謂過之徒拜嘉於綿繡左傳鹿鳴君所以嘉寡君也敢不拜嘉莫效報於䄡䄖見前謝同官杓躔建子又届新陽見前斗壘同寅有勤善頌壘魯水切説文軍壁也斗喻其小猶言得州如斗也尚書同寅恊恭和衷哉惠而好我詩惠而好我携手同行更以贈君山谷詩君家所有更贈君恭惟某官明氷其相愛日之政靜以待隂陽之定盈則有孚並見前復其見天地之心受之无妄繫辭復則不妄矣故受之以无妄式裒龎祉丕對龍光某獲託為寮又逄亞歳十年之閱凋謝詎更思三㸃之朝並見前萬物之随開張惟當勉一箱之讀杜牧冬至日示小姪阿宜詩陽徳比君子初生甚㣲芒排隂出九地萬物随開張一似小兒學日就復月將願爾一祝後讀書日日忙一日讀十紙一月讀一箱回鄉官學職聽六日四分之鳳律又見新陽詠五更三㸃之鵷行已迷舊夢見前兹勤善頌但愧過情恭惟某官語染芸香陳子昂集持三寸筆入芸香之閣氣薰葭琯見前登觀以望自堪織雲漢之章詩倬彼雲漢為章于天東坡詩手抉雲漢分天章天孫為織雲錦裳閉關而居亦足驗地雷之卦某寸材綫短百念氷寒並見前井底之陽未回若為觀復韓渥詩隂氛未向河源塞陽氣今從地底回東坡冬至詩井底㣲陽回未回蕭蕭寒雨濕秋荄注月令冬至則水泉動江上之容獨老良感相親杜詩江上形容吾獨老天涯風物自相親回學職杓綱建子厯新五鳳之書五鳳漢宣帝年號應劭曰鳳皇五至因以改元云魁首枕參祥應六龍之邸天文志魁枕參首易時乗六龍以御天對時道長易先王以茂對時育萬物即日言揚禮記或以事舉或以言揚伏惟某人心醉六經莊子列子見之而心醉中説云心若醉六經目若營四海山谷詩手抄萬巻未閣筆心醉六經還荷鉏志在千里王敦傳每醉後輒詠魏武帝樂府歌曰老驥伏櫪志在千里烈士暮年壯心不已文史三冬之用既足三餘東方朔傳三冬文史足用如淳曰貧子冬日乃得學書言文史之事足可用也杜詩古人已用三冬足魏畧董遇字季直人有從學者遇不肯教而云必當先讀百徧而義自見從學者云苦渴無日遇言當以三餘冬者歳之餘夜者日之餘隂雨者時之餘也任昉策秀才文聽覽之下三餘靡失劉孝標答劉之遴書九冬有隟三餘暇時多遊書圃代樹萱蘇庾信詩託情忻六學游目愛三餘山谷詩少年基一簣長歳足三餘又皇文開萬巻家學陋三餘雲霄一握之程亟觀一躍天葩既茂韓詩天葩吐竒芬地芥坐收兩夏侯傳士病不明經術經術茍明其取青紫如俛拾地芥爾某一障灰寒百懷氷冷不遠之復願歸飲顔子之瓢繫辭顔氏之子其殆庶㡬乎易曰不遠復无祗悔元吉論秀而升尚或勸漢人之駕禮記論選士之秀者而升之學曰俊士高帝紀其有意稱明徳者必身勸為之駕文頴曰有賢者郡守身自往勸勉令至京師駕車遣之四六標準巻四十, SBCK: ''}
