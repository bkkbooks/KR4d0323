  - {type: variant, offset: 46855, length: 1567, content: 通末年至謂夢張景陽奪錦郭景純徵筆才不逮前夫才命于氣氣稟于志志立于學者也豈一夢之間他人所得而予奪乎冦恂傳從陛下復借冦君一年帝念髙安之父老江西道院賦且為髙安之父老雪耻詳見前誰為元祐之子孫弄印相除周昌傳髙祖持御史大夫印弄之過家甚寵岑彭傳有詔過家上冢東坡詩過家父老喜九轉之丹砂㸃鐵如探諸懐傳燈録雲門如九轉丹砂㸃鐡成金澄公藥汞銀入煅則流去詳見前十行之紫詔封泥可拱而竢隴右記武都紫水有泥其色亦紫而粘貢之用封璽書故詔告有紫泥之美終軍傳斯拱而竢之耳某無能束緼緼於粉反亂麻也蒯通傳客謂通曰先生知梁石君東郭先生世俗所不及何不進之於相國乎通曰諾臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之里母曰女安行我今令而家追女矣即束縕請火於亡肉家曰昨暮夜犬得肉争鬬相敎請火治之亡肉家遽追呼其婦故里母非談説之士也束縕乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國又見韓詩外傳及韓非子文各稍異徒慶得輿去騎之逐雙旌不得負郷人之弩韓詩免勞去騎逐雙旌烹魚而得尺素乃屢分隣壁之燈見前代回章衡州良能衡州已見尺書起敬莫測浮沉晉書殷羡字洪喬為豫章太守都下人士因其致書者百餘函行次石頭皆投之水中曰沉者自沉浮者自浮殷洪喬不為致書郵累幅勞謙至勤駢儷易勞謙君子有終吉注居謙之世何可安尊上承下接勞謙匪懈恐前魚之未逹于武陵詩一從悲畫扇㡬度泣前魚用史記龍陽君事此前魚蓋借用對囘鴈以生慙衡山有囘鴈峯此囘鴈亦借用恭惟某官識足洞今學皆到古韓文但力為之古人不難到上規姚姒發壁中科斗之文韓文上規姚姒渾渾無涯孔安國尚書序魯共王好治宮室壊孔子舊宅以廣其居於壁中得先人所蔵古文虞夏商周之書及傳論語孝經皆科斗文字平到隂何粲雪裏飛鴻之句陳後山詩崔蔡論文不足多新詩平處到隂何東坡詩人生到處知何似應似飛鴻踏雪泥又白鬚相映松間鶴清句更酬雪裏鴻薄蓬莱而引去栁文薄蓬莱羞崑崙郊祀志蓬莱方丈瀛洲在渤海中且至則風輙引船而去指嶽麓以請行盛𢎞之荆州記長沙西岸有麓山蓋衡山之足又名靈麓峰乃嶽山七十二峯之數自湘西古渡登岸夾徑喬松泉澗盤繞諸峯疊秀下瞰湘江嶽麓寺道林寺嶽麓書院皆在焉皂蓋春濃姑棠隂之少憩紫樞地近佇棣蕚之相輝某復此隨班幾何視䕃曉行湘水固知畫㦸之清並見前暮見吳山亦望碧雲之合東坡詩朝見吳山横暮見吳山從吳山故多態轉側為君容江淹雜體詩日暮碧雲合美人殊未来代回史蘄州宜之蘄州春秋戰國並屬楚西漢為蘄春縣𨽻江夏郡三國時為蘄春郡晉以為縣屬戈陽郡避宣太后諱改春為陽北齊置齊昌郡及羅州後周改為蘄州隋改為郡唐復為州宋因之分虎合符灼龜視篆見前惟兩淮之上郡宋闗泳蘄州神光觀記蘄西故封浠水古邑溪山重複占淮濡之上腴屬帝轂之衝㑹在三楚之中邦史記楚文王徙都於郢江陵為西楚蘄居三楚之中尚書成賦中邦雙旌得人五袴有日恭惟某官美由世濟學有家傳歛板轅門糧自通於流馬言為運幕奏功巖邑技益敏於割鷄左傳制巖邑也巖險之邑言為令結綬登畿顔延之詩結綬登王畿把麾出守維古英氏之國英國名史記禹封臯陶後於英六索隠云安國六縣皋陶後偃姓所封國英地闕不知所在以為黥布是其後也髙帝紀立當陽君英布為九江王都六注六者縣名本古國臯陶之後英布傳黥布六人也皇覽云臯陶冢在廬江六縣乃今蘄春之區見題下大膞以還韓文曹成王碑艦歩二萬人以與賊遌嘬鋒蔡山踣之剜蘄之黄梅大鞣長平鏺廣濟掀蘄春􅈪蘄水掇黄岡莢漢陽行跳汉川還大膞注音傅又處落切左傳殺而膊諸城上注膞磔也髙牙是仰佇懋民庸之最乃為王覲之圖某縻身於朝莫面以賀雙魚尺素之遺何以報之並見前乗馬四黄之迎焉知来者詩四黄既駕兩驂不倚詳見前代囘曹岳州格岳州已見分虎專城拂龜視印碧油紅斾宣中扆之寬條並見前赤壁黄岡控上流之重寄王禹偁瑞慶堂記齊安郡治據依黄岡山来自天柱王元之詩淮甸為内地黄岡壓上流餘見前恭惟某官長材濟美雋軌蜚英三仕舂容罙入淮濡之地詩罙入其阻淮濡見上條一麾晼晚始分邾子之邦文選日晼晚其將暮楚滅黄而有其地楚宣王滅邾徙其君于此又名邾城雲夢在胸, SBCK: 德}
