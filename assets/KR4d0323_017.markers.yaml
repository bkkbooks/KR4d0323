  - {type: variant, offset: 20744, length: 306, content: 宋史李師中字誠之楚􅏀人年十五上封事言時政杜衍苑仲淹富弼皆薦其有王佐才唐介字子方江陵人劾宰相文彦博守蜀日造間金竒錦縁閹寺通宫掖以得執政帝怒貶介春州别駕師中與梅堯臣皆賦詩以激美師中詩云孤忠自許衆不與特立敢言人所難去國一身輕似葉高名千古重如山竝遊英俊顔何厚未死奸䛕骨已寒天為吾皇扶社稷肯教夫子不生還邵氏聞見録唐介為臺官時言文潞公燈籠錦獻張貴妃事上怒甚謫春州李誠之送以詩云云後介用潞公薦官於朝無所言誠之以書從介索所遺詩介無以報取詩還之曰我固不用落韻詩也以山寒二字韻不同故云青箱雜記云鄭谷與齊已黄損等定今體詩云一曰葫蘆格二曰轆轤格三曰進退格葫蘆韻者先二後四轆轤韻者雙出雙入進退韻者一進一退如李師中送唐介詩兩韻中用韻進退格也, SBCK: ''}
