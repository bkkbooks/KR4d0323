  - {type: variant, offset: 0, length: 1, content: 欽, SBCK: 四六標凖巻之三十四丞通寜郷陳縣丞愷武功之丞簡靖乆矣沐芳臨邑之簿卑棲兹焉假䕃敢以尺書之敬進於再拜之先恭惟某官逺抱甚都壯猷孔碩清明志氣胷中風月之無邊沈浸文章筆下源泉之不擇盍徑要津之立顧淹賛邑之留鳳凰自下而升髙聊復爾耳鴈鶩鉗左而摘右端使然哉􅀟陸之􅀔無休九萬之程斯下某﨑嶇副墨漫浪勾朱士安得自高妄欲比鄰之託余方有公事願聞掃溉之吟回桐廬朱丞中肖短啓代庖已忘西施之唐突長牋倒廪尚憐東野之龍鍾一謙之光三復以愧恭惟某官人門済美風調軼羣觀東閣之竒詎當相吏歌南陽之直真足自强試窺千萬琳琅之毫芒豈以八九雲夢而芥蔕對藍田千挺之竹肯負丞哉續桐江一􅁝之風今召君矣某見賢不敏拜賜何居士廉未識桃椎亟當進謁永叔强差韓愈願勿失言回華陽李丞梃題曲江之名夙甞託契賛武功之理兹幸為寮方有􅀱於中㳙乃先勤於下問恭惟某官行無瑕纇斈有本原充長吉錦囊之文命騷可僕飽鄴侯牙籤之讀継别為宗胡為再命之材淹此一同之貳鴈鶩鉗左而摘右端使然哉鳳凰自下而升髙將在此矣某冐甞險阻全蹈拙踈数同年琴上之星感舊游之如夢共萬里橋邊之月幸末路之得朋代回武進陳縣丞貴成名家勝士自有公言助國舉賢古無私謝枉長牋之委重搔短髮以寘慚恭惟某官千里名駒九苞威鳳大科異等一翁二季之相望茂實英聲七略羣書之兼緫謂即登瀛洲而給札猶欲破崖岸而為文余不負丞丞負余誰其知者斈而優仕仕優斈似是兼之無謂我豈要子隣始為人識亦知吾徒得君重少應時湏所愧明陟之章適引暗投之惠某三復墨妙十襲珍藏儀圖之莫助之更期進徳匪報也為好也聊復成章回樂安趙縣丞彦杉老􅂹媻􅘐猶戀天山之秣名駒竒俊遹追電影之鞭幸許論交過勤執訊恭惟某官近於大雅博以羣書太白詞章冝有六丁之取更生經術豈無太乙之知不應賜第之餘復作賛公之試鴈鶩平立未妨破崖岸以為文鸞鳳髙翔㑹即决雲霄而布武某為寮有舊辱問相先揣弘景之頭顱歸已晚矣畫嚴丞之手版猶願見之代回樂安趙縣丞彦杉推士轂而及丞味言何有旁使車而從子哦句已來一謙之光三復以愧恭惟某官諸劉族屬為漢宗英馳閶闔入凌兢則為冝耳去角牙破崖岸端使然哉剡三載之陟明愧一言之不智然無華乃安静之吏則所美豈鞶帨之文有望於君不孤此意某已成㱕計更辱贈言布襪青行纒吾已從此逝矣珠宫紫貝闕子盍歸而求之代回樂安趙縣丞彦杉題藍田之壁君受代以不遥厭承明之廬我治任兮更迫何勤委翰仍費属辤恭惟某官以貴王孫為名進士巖邑更刀之後非復昔時賛公游刃其間疑有餘地及􅀲近只拔茹誰歟敢愉陟明之章少寓愛助之意某投簮不力曳履胡顔以一身而備百工朞可已矣緫羣書而奏七略子必勉之回錢塘趙縣丞彦的余方有公事鼎來赤縣之官曹我未免鄉人益愧白頭之幕府有勤執訊敢闕報章恭惟某官卓爾不羣飄然無敵尋玉清洞中之字已書㑹計之功展錢塘江上之圖更動吟哦之興手版暫煩於畫地觚稜何逺於去天某轍鮒孤蹤磨牛陳迹喜似人於千里况辱託於枌榆雖異事而同寮尚不遺於葑菲回冨陽趙縣丞光祖倚使者之車笑癡兒之未了題丞哉之壁聞公子之鼎來未果修辭先勤執訊恭惟某官五潢龍種千里駒材早宣采棒之威坐獲緑林之賞鴈鶩箝行而平立端使然哉鳳凰自下而升髙恐不免耳某強名入幕正愧面墻赤縣官曹喜依仁之有幸黄塵衣㡌或分䕃之自今回益陽李縣丞江西之有宗􅂀昔巳論交湘水之逢故人今將聮事尺紙良勞於遺逺白頭何至於如新恭惟某官翰墨勝流典刑前輩人言短李釣竿已負於􅃢瑚天遣長庚霞佩正垂於金薤謂進參於諸老頋退貳於一􅀖箝尾無辭需頭有薦某束春秋於五傳訪離騷之一經士安得自髙政欲比鄰之請余方有公事願聞掃溉之吟代回麗水童知壎考陟明之績輙剡需章属比事之辭遽鳴謙德於禮為過此意則勤恭惟某官文獻故家詩書宿好彼不即汝而汝即彼既執蝮蛇余不負丞而丞負余寜問鴈鶩烏何関於屋上黔固詠於邑中時而颺之聊復爾耳某有二冝去以兆足行㪯能其官亦有無窮之聞仕優則斈願収可大之功代回宣仁張縣丞曼徳升陟一章何能借重謙勤尺牘又復拜嘉其文固是粲然此禮略之可也恭惟某官清餘家法敏有吏材翠竹􅀷林乆巳􅀚於停峙老槐古縣兹良費於吟哦無俟書來亦當剡入未見分毫之補又勤四六之貽某辭璧未能報瓊又乏楼臺近水柰何秋月之䦨干桃李成蹊佇見春風之披拂代回宣城張縣丞曼徳厭承明之廬我動歸歟之興題藍田之壁公傳至止之期四六鼎來再三復熟恭惟某官彯纓華秩簮筆名家再轉為丞坐閱十年之乆一鼓作氣㑹搏万里之程願嗇龍文虎脊之精神静聽蟲臂䑕肝之造化某自知日薄豈可夜行疲馬之恋君軒已將告老騎驢之到京國猶及語離代回海塩梁丞成章五雉分工近承誤渥􅀟魚尺素逺認故情恭惟某官拾芥有年哦松何晚翦伐誰能送只令志士之嗟精悍無所聞正自可人之意猶借齒牙之餘論見華㗋舌之納言某似是水曹已承天寵告者過也想以為司馬之官行或使之惟當返屠羊之肆回崇仁朱丞况文昌之座髙華偶然序進武功之官簡靖亦以書來所愧陳人有慚善頌恭惟某官天葩吐藻地芥决科鸞鳳髙翔時來則為之耳鴈鶩平立丞豈端使然哉似聞臺府之見知又欲弦歌而相試解牛既效薦鶚何疑某司臬無庸僝功有命老夫耄矣恐孤喉舌之納言曷月歸哉猶借齒牙之餘論回彰明黄縣丞亘老我蹣跚甘一麾之出守故人騰踏甫再轉而為丞馳情室迩而人遐示問禮踰而情過恭惟某官金華一􅂀玉井􅀟流煎瀘川之茶忘酸寒之異味賦􅈎道之笋尚冠冕於兩川獨怜胷次書傳之香方從此中文字之樂鴈鶩箝左而摘右端使然哉鳳凰自下而升髙恐不免耳某凄其一别瞠若百罹立館下招諸生嘆虀塩之亡味坐堂上稱太守驚􅂎菊之已莎方欲求拔薤之規乃聞對哦松之壁桃李春風一盃酒尚佇來歸風霆劇談九河翻願安承教回江原郭縣丞允拜屣履迎門未皇執贄文書衘袖猥沐贈言仰佩鳴謙之光俯􅀷盱豫之悔恭惟某官見聞殫洽意氣醇明發而中節謂之和見於眉睫粲然有文以相接示以肺肝所慙先施之未能更斍徽言之難受某欲還鯨錦懼損繭緘雖則七㐮終乏襜褕之報藏之十襲永為篋笥之珍回新津孫縣丞庭傑吟哦公事藍田丞端使然哉觀采風謡益州分故知之耳有勤迂顧更費属辭恭惟某官齊子武之家楚叔敖之胄枕流漱石尚有典刑擲地作金粲然文采淹回貳令之壁鏗鏘千室之弦有怜并州之迎已孤竹馬安得祁山之出能辦木牛或錫之鞶願還此笏十鍾一石自昔固病於西南三令五申湏君更教其左右若為委翰頗似過情某已控需章匄還節傳承夙駕之命弗敢與聞補晚賦之章願安承教梅亭先生四六標凖巻之三十四梅亭先生四六標凖巻之三十五簿通寜鄉蔡主簿汝說交代望俊􅄤於淮海知敬儒先問邅道於洞庭偶從誤後貂不足而狗續鴻髙舉而燕來及未治任可無執訊恭惟某官負材鴻碩蓄學駿厖中郎典刑晚亦冝於東觀客卿冨貴乆盍見於西秦吾道非耶公等安在跨揚州之鶴安得自髙麾湘水之蛟能令公喜方今漢庭之老用矣敢問呉㑹之意何如某志大心勞材䟽意拙一科不􅀘欲釣鰲而未能五技易窮覺屠龍之無用所頼鸞凰之先戒棲枳何如無謂牛羊之下來求芻而止尚托子孫之契欲窮師友之源向來一瓣曾南豐苦難並世安知四海習鑿齒不勝讀書代回上髙劉簿昌詩衆賢雜遝共騰薦士之章老子婆娑切與挂名之寵無可謝者安用文之恭惟某官節抱秋竿詞摛春藻諸公評論謂當䇿足於要津何物簿書欲使擡頭於矮屋人争送上我亦譟旁引重鼎兮不程問大鈞而未答某挽士不寸冝休者三遺我雙鯉魚似虚取勤渠之辱漸階羣振鷺願無忘醇正之歸回江夏范主簿之損屈就􅁄棲榮趨􅀲戍漢之廣江之永古稱夏口之雄簿如􅁝訟如糜今敢秋毫之隱方圖賛喜巳沐飛牋恭惟某官翰墨功名塤箎學問一門叔父慨然孟博之登車十萬甲兵喜爲㓜度而折屐頋就銓曹之調俯從簿正之供難爲弟難爲兄正􅀚競秀能令喜能令怒佇即蜚英㑹蹋翻鸚鵡之洲見􅀝頼巨鰲之釣某一寒寡與三暑投閑頃者綴文石之班不堪教胄今兹佐武岡之治正恐負丞所忻楚服之同尚切晉波之及修西門種栁之課君必勉之尋南嶽煨芋之禪我之懐矣回綏寜譚簿尉成子老􅂹垂頭有愧治中之展名駒䇿足不孤簿正之供幸游從諸父之間有稠疊同僚之好恭惟某官美由世濟仕本學優乃翁知國如知兵手板無倉黄之失它日聞詩又聞禮心印得清白之傳寕嫌矮屋之卑㑹即髙門之亢某再叨半刺不羡羣飛士安得自髙儻可請比鄰而與祭余方有公事亦當破崖岸而為文回武岡黄主簿海􅀷叢見孤羆曾聽阿房之讀逺方遺雙鯉來司臨邑之曹可謂聞音而跫然抑訝何見之晚也恭惟某官源委􅀷厚波瀾老成潁川第一之功固起甚廉之簿江夏無雙之學蓋觀未見之書暫湏矮屋以擡頭即快要津之策足某㒺功教胄承乏佐州聾丞尚可送迎儻或免督郵之逐短簿能令喜怒何幸同君子之僚回蔣主簿時懋雌伏郡丞自笑廣文之何用鸞棲簿領渠云髙士之不為聞湏及􅀲之期尚請拔薤之教恭惟某官掞材有裕蓄學不貲黔山之㠝夙負權竒之質湘水如舞聊攄㑹計之材佇即飛騰徧儀華膴某卧雲已幸分月何為靡有他長友其士之仁者能令公喜忠焉能勿誨乎代回廬陵嚴簿世明老夫耄矣不堪再皷之衰主簿何如猶致一牋之賀恐孤厚意聊具報章恭惟某官􅂀分釣瀬之清文似漆園之壯驊騮開道㑹即秣天山之禾鸞鳳冲霄姑少棲人間之枳交章載路增秩匪朝贈我明月珠可見多時之簸弄乞君飛霞佩㑹看萬里之頡頏某髙卧北䆫卻遮西日軟紅可厭敢長戀屬車之塵堅白争鳴惟欲據槁梧而瞑謀歸决矣因謝及之代回吳主簿盟昭誣辨謗方欲賀君比事屬辭何為至我恭惟某官居官能大遇事直前象有齒以焚身古今如此䑕無牙而速訟事理固然幸疑似之既明將功名之自致暫蹶霜蹄未為失何必尤人勿諱泥坑乃良規願觀進德代回永豐洪簿樒尋陶潜之丘壑方此息交托孫寶之比隣惠然執訊頋有復也何以報之恭惟某官地望穹華人門炳蔚故國非喬木信有典刑用人如積薪寕分先後暫勾朱之遊戯佇薦墨之飛騰某已乞垂車殆難推轂俟有可乗之間詎敢蔽賢設或未同而言則懼辱命代回崇仁黄簿元告移文之猿鶴方此投林訪奉詔之鳳凰居然棲枳先勤下問良戢髙情恭惟某官家學􅀷純天才膚敏誦詩三百已多識草木之名下筆五行遂得雋蓬萊之殿乃屈丹鈆之點暫為朱墨之勾聊復培鵬行且展􅂹某抗章納履望寵剖符賦張衡之歸田便堪税駕聞孫寳之祭􅍳尤幸卜鄰回范主簿君子實冩我心未遑走謁主簿能令公喜猥辱飛牋既勞十部之臨敢廢七襄之報恭惟某官噐姿瓌碩學問醇明胷中十萬之甲兵吐為筆陣硯裏三千之禮樂俯拾儒科便應䇿足於要津厎用擡頭於矮屋兩府以孫寳為可如彼斯何百里非􅄷覧所棲自此升矣某偶巢燕幕例拜魚書遺我翠織成欲卷還而不敢報之青玉案愧營度之無竒代回上饒趙簿汝騋老夫耄矣陞華五雉之工鄉人好之委重􅀟魚之素伏惟某官學優而仕業􅁛其家邑大民殷無憚勾朱之冗政成事舉㑹觀薦墨之飛有憐龍鍾之共鳩僝某偶然曵履甚矣濫巾已再具致休之章期於得請行重尋邂逅之願兹不瀆辭回武岡何簿尉强顔貮郡慚非典午之材箝尾爲僚喜有同寅之幸曾修辭之未敏辱垂問之相先恭惟某官淸神五兵肝膽一劒積月書於右序己播英聲奏天對於左廬更登峻級方西北二邊之未靖何杳南一尉之足淹行矣章交亟其王􅀚某無能教冑頋使轉丞烹􅀟魚得尺素書良勤垂念從一􅀐踔五百里即遂承顔忻幸良􅀷敷宣罔旣回靈泉李主簿君子之居是􅀖未皇進謁它人不如同姓先辱陳牋既感臨存亦􅀷訟愧恭惟某官隆山望族隴右名家飛將軍之功名寜論妄校謫仙人之苗裔頋落夜郎進士論}
