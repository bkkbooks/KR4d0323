  - {type: variant, offset: 48465, length: 338, content: 舊山谷詩赤壁歸来入紫清堂堂心在鬢凋零江沙踏破青鞋底却結絲絇侍禁庭某識賢已後辱問相先歌桂棹以長懐未應陳迹東坡赤壁賦桂棹兮蘭槳擊空明兮泝流光渺渺兮予懐望美人兮天一方記竹樓而有感願繼盛名竹樓在州治西北城上宋郡守王禹偁元之建自作記云黄岡之地多竹大者如椽竹工破之用代陶瓦比屋皆是以其價廉而工省也子城西北隅雉堞圮毁蓁莽荒穢因作小竹樓二間與月波樓通逺吞山光平揖江瀨幽閴遼夐不可具狀夏宜急雨有瀑布聲冬宜密雪有碎玉聲宜鼔琴琴調和暢宜詠詩詩韻清絶宜圍棊子聲丁丁然宜投壺矢聲錚錚然皆竹樓之所助也公退之暇披鶴氅戴華陽巾手執周易焚香黙坐銷遣世慮江山之外第見風帆沙鳥煙雲竹木而已迨其酒力醒茶煙歇送夕陽迎素月亦謫居之勝槩也彼齊雲落星髙則髙矣井幹麗譙華則華矣止于貯妓女蔵歌舞非騷人之事吾所不取四六標準卷二十七, SBCK: 謀}
