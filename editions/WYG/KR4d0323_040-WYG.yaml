body:
  text: 四六標準巻四十宋李劉撰賀冬賀楊尚書汝明楊汝明青神人舉進士為成都府觀察推官時呉曦叛汝明不受逆儔之招及曦平宣諭使呉獵以聞遂召汝明入補官累遷工部尚書貢禹舉冬式敬人時之授魏相傳趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬應劭曰四時各舉所施行政事服䖍曰主一時衣服禮物朝祭百事也師古曰高帝時自有二貢禹尚書乃命羲和厯象日月星辰敬授人時伯趙司至肇迎天統之長左傳郯子曰我高祖少皥摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏厯正也𤣥鳥氏司分者也伯趙氏司至者也注伯趙伯勞也以夏至鳴冬至止唐于尹躬詩官稱伯趙氏色辨五方雲律厯志十一月乾之初九陽氣伏于地下始著為一萬物萌動鍾於太隂故黄鍾為天統相維玉帳之籌杜詩空留玉帳術李詩身居玉帳臨河魁東坡詩玉帳夜談風雪苦注玉帳將軍帳也古有玉帳經詳見上巻歸斡璇璣之柄食貨志擅斡山海之貨師古曰斡謂主領也音與管同尚書在璇璣玉衡以齊七政恭惟某官望隆星履杜詩持衡留藻鑒聽履上星辰清湛氷壺杜詩金鐘大鏞在東序氷壺玉衡懸清秋詳見前仁風舒栁以放梅注詳上巻和氣生芸而挺荔禮記仲冬之月芸始生荔挺出注芸香草也荔挺馬䪥也芸音云荔力計反正義曰以其具香草故應陽氣而出説文芸草也似苜蓿著於衣書辟蠧漢種之于蘭臺石室藏書之府荔似蒲而小根可為㕞本草馬蘭江東呼旱蒲多植於階庭侯伯以七為節教民既閱於七年周禮典命侯伯七命其國家宫室車旗衣服禮儀皆以七為節注侯伯之城盖方七里宫方七百歩天下有三達尊論道亟登於三事尚書論道經邦爕理隂陽又立政任人凖夫牧作三事又三事暨大夫韋𤣥成傳於赫三事師古曰三事三公之位也某寸材線短北夢𤨏言韓昭仕王蜀至禮部尚書文思殿大學士粗有文章至於琴棋書筭射法悉皆渉獵以此承恩于後主有朝士李台嘏曰韓八座事藝如拆襪線無一條長時人韙之歳時記晉魏間宫中以紅線量日影冬至後日添長一線雜録唐宫中以女功揆日之長短冬至後比常日増一線之功杜詩何人錯憶窮愁日愁日愁随一線長一障灰寒張湯傳居一鄣間師古曰障謂塞上要險之處别築為城因置吏士而為鄣蔽以扞冦也莊子心若死灰韓安國傳死灰獨不然乎杜詩眼穿當落日心死著寒灰續漢書以葭莩灰實律之端按律而候之其月氣至則飛灰而管通杜詩刺綉五紋添弱線吹葭六琯動浮灰此一聨用此意困窮井遷要匪井遷而射鮒射石亦切鮒音付繫辭困窮而通井居其所而遷注處窮而不失其道井所居不移而能遷其施也易井九二井谷射鮒甕敝漏象曰井谷射鮒无與也孔疏云井之為徳以下汲上九二上無其應反下比初如谷中之水下注轍鮒井而似谷故曰井谷射鮒也子夏傳云井中蝦䗫呼為鮒魚剥爛復反但希復反於屠羊繫辭剥爛也復反也注物熟則剥落也莊子楚昭王失國屠羊説走而從於昭王昭王反國將賞從者及屠羊説屠羊説曰大王失國説失屠羊大王反國説亦反屠羊臣之爵禄已復矣又何賞之言尚憐九地之微芒杜牧之詩陽徳比君子初生甚微芒排隂出九地萬物随開張曲借五雲之終䕃左傳凡分至啓閉必書雲物周禮保章氏以五雲之物辨吉㐫水旱降豐荒之祲杜詩五雲多處是三台賀桂制置如淵庚寅按庚寅為理宗紹定三年時梅亭年五十七宋史理宗紹定五年四月以寶章閣直學士桂如淵頃帥蜀日北兵攻城不能合謀死守而遁致軍民罹殃反以㨗聞詔褫職罷祠舉貢禹之冬人時敬授見上條司伯趙之至天正踐長曹植冬至獻襪表伏見舊儀國家冬至獻履貢襪所以迎福踐長風土記天日正南黄鍾踐長粥饘追萌微納休昌餘見上條有如元帥之詩書左傳晉謀元帥趙衰曰郤縠可説禮樂而敦詩書詩書義之府也禮樂徳之則也徳義利之本也君其試之庸介宜民之福禄詩宜民宜人受禄于天干福百禄子孫千億恭惟某官徳潛剛克道配陽休前茅中權威已肅武功之草左傳左轅右追蓐前茅慮無中權後勁詳見前漢志右扶風武功縣斜水出衙嶺山北至郿入渭一統志武功縣古邵國秦孝公始置武功縣以武功山水為名舊在郿縣境武功山在縣南一百里北連太白山最為秀傑杜詩遥瞻太白雪喜近武功天五丈原在武功縣西南七十里即諸葛武侯屯兵處采薇遣戍人期聽文徳之麻詩序采薇遣戍役也文王之時西有昆夷之患北有玁狁之難以天子之命命將率遣戍役以守衛中國故歌采薇以遣之出車以勞還杕杜以勤歸也玉堂雜記凡鎻院文臣職事明日赴文徳殿聽麻詳見前諒由於菟顧兔之交蘇子由守歳詩於菟絶繩去顧兔追龍蛇奔走十二蟲羅網不及遮注是歳壬寅遂趣孔雀麒麟之覲少陵至日遣興詩憶昨逍遥供奉班去年今日侍龍顔麒麟不動爐烟上孔雀徐開扇影還椿齡彌永槐䕃益髙某竊芘五雲並見前茍容再歳井勿幕于元吉在上猶冀有孚易井上六井收勿幕有孚元吉象曰元吉在上大成也王弼注處井上極水已出井井功大成矣故曰井收幕猶覆也不擅其有不私其利則物歸之往無窮矣故曰勿幕有孚元吉復閉關而商旅不行尚何祗悔易復象曰雷在地中復先王以至日閉關商旅不行后不省方初九不遠復無祗悔元吉王弼注冬至隂之復也夏至陽之復也故為復則至于寂然大靜先王則天地而行者也不遠而復㡬悔而反以此脩身患難逺矣賀黄制置伯固暢月建子觀復見兩儀之心吕氏春秋仲冬之月命之曰暢月注隂陽在上民人空閑無所事作故命之曰暢月禮記疏暢充也言名此月為充實之月當使萬物充實不發動故也禮記注仲冬者日月㑹於星紀斗建子之辰易復其見天地之心乎王弼注復者反本之謂也天地以本為心者也寂然至無是其本矣故動息地中乃天地之心見也繫辭易有太極是生兩儀王弼注有必始于無故太極生兩儀孔疏云不言天地而言兩儀指其物體至日得壬帥師應三錫之命月令仲冬之月其日壬癸注壬之言任也癸之言揆也日之行東北從黒道閉藏萬物月為之佐時萬物懷任于下揆然萌芽又因以為日名焉易師九二在師中吉无咎王三錫命王弼注以剛居中而應于上在師而得其中者也行師得吉莫善懷邦邦懷衆服錫莫重焉故乃得成命時維玉帳見三十九巻賀制置安撫條妙合璇璣見前恭惟某官濟北一編張良傳出一編書曰讀是則為王者師後十年興十三年孺子見我濟北榖城山下黄石即我已汝南千頃後漢書黄憲字叔度汝南慎陽人也郭林宗少游汝南先過袁閎不宿而退進往從憲累日方還或以問林宗林宗曰奉髙之器譬諸汎濫雖清而易挹叔度汪汪若千頃陂澄之不清淆之不濁不可量也和門晝靜士知挾纊之温周禮以旌為左右和之門注軍門曰和今謂之壘門立兩旌以為之敘和出用次第出和門也疏左傳曰師克在和不在衆田獵象戰伐故其門曰和門也唐禮志仲冬之月講武於都外建旗為和門如方色左傳王拊而廵之三軍之士皆如挾纊候柝宵沉民謝閉關之樂易重門擊柝左傳魯擊柝聞于邾謂判兩木夾於門為機相擊以警夜也後漢書閉關謝西域易先王以至日閉關顧恐六日四分之鳳律後漢志元帝時郎中京房知五聲之音六律之數郎宗學京氏易善六日七分崔子玉明京房易傳六日七分又太史待詔張隆以四分法署弦望月食加時晉書藝術傳臺産善星算六日六分之學孔頴達七日來復疏云按易緯指覽圖云卦氣起中孚故離坎震兌各主一方其餘六十卦卦有六爻爻别主一日凡主三百六十日餘有五日四分日之一者每日分為八十分五日分為四百分四分日之一又為二十分是四百二十分六十卦分之六七四十二卦别各得七分是每卦得六日七分也剥卦陽氣之盡在九月之末十月當純坤用事坤卦有六日七分坤卦之盡則復卦陽來是從剥盡至陽氣來復隔坤之一卦六日七分舉成數言故輔嗣言凡七日也鳳律見上巻將催五更三㸃之鵷行杜詩去歳兹辰捧御床五更三㸃入鴛行獻履徑上於星辰曹植冬至獻襪表曰伏見舊儀國家冬至獻履貢襪所以迎福踐長臣不勝感節拜表奉賀并獻絲履七緉襪若干副後魏崔浩女儀近古婦人常以冬至日上履襪于舅姑踐長至之義也杜詩聽履上星辰合璧長依於日月尚書考靈曜冬至日月五緯俱起牽牛初日月若懸璧五星若編珠某身依雲芘心實灰寒白樂天詩心灰不似爐中火鬢雪過於砌下霜雷在地中想魏博三軍之喜易雷在地中復先王以至日閉關魏博二州唐𨽻河南道元和郡縣圖志魏州春秋時晉地戰國時魏衛二國之地秦滅魏置東郡滅趙置邯鄲郡漢以秦邯鄲之南郡東郡之地置魏郡博平郡春秋時濟之西界聊攝地也戰國時為齊地秦漢為東郡也章孝標雪詩朱門到曉難盈尺盡是三軍喜氣消東坡詩三軍喜氣鑠飛花睡起空驚月在沙氷解漕下乏營平一線之功趙充國傳以定册尊立宣帝封營平侯又氷解漕下明皇雜録唐宫中以女功揆日之長短冬至後比常日増一線之功焦氏筆乗云杜詩刺繡五紋添弱線又愁日愁随一線長魯直詩宫線添尺餘皆指女紅以驗日也荆楚歳時記則云冬至後日影添長一線又與此異未知孰是代回大理趙少卿師石緹陽襲管後漢書律厯志候氣之法為室三重户閉塗釁必周宻布緹縵室中以木為案每律各一内痺外髙從其方位加律其上以葭莩灰抑其内端案厯而候之氣至者灰去其為氣所動者其灰散人及風所動者其灰聚蕭慤詩天宫初動磬緹室已飛灰杜詩吹葭六管動飛灰韓偓詩中宵忽見動葭灰劉商詩灰管移新律窮隂變一陽綫景延圭線古文作綫説文縷也歳時記晉魏間宫中以紅線量日影冬至後日添長一線周禮大司徒以土圭之法測土深正日景以求地中易緯通卦驗冬至之日植八尺之表日中視晷景長短以占和否周髀云成周土中夏至景一尺六寸冬至景一丈三尺五寸候六律而合八能既滋羣動易通卦驗冬至始人主致八能之士或調黄鍾或調六律或調五行或調律厯或調隂陽或調正徳樂協圖徴八能之士以日冬至作隂樂以成天文後漢書禮儀志冬至使八能之士八人或吹黄鍾之律間竽或撞黄鍾之鐘或度晷景權水輕重或擊黄鍾之磬或鼓黄鍾之瑟或擊黄鍾之鼓樂叶圖徴聖人作樂非以自娯所以觀得失之效故不取備一人必從八能之士故撞鐘者當知鐘擊鼓者當知鼓吹管者當知管吹竽者當知竽擊磬者當知磬鼓瑟者當知瑟故八士曰或調隂陽或調律厯或調五音故撞鐘者以知法度鼓瑟者以知四海擊磬者以知民事鍾音調則君道得黄鍾㽔賔之律應鼓音調則臣道得太蔟之律應管音調則律厯正夷則之律應磬音調則民道得林鍾之律應竽音調則法度得無射之律應瑟音調則四海合歳氣百川一合徳鬼神之道行祭祀之道得如此則姑洗之律應五樂皆得則應鍾之律應否則反是敬五刑以成三徳宜介百祥尚書惟敬五刑以成三徳一人有慶兆民頼之其寧惟永又作善降之百祥恭惟某官同寅協恭見前分職率屬尚書六卿分職各率其屬以倡九牧阜成兆民各抱黄鍾之氣韻禮記仲冬之月律中黄鍾髙誘曰陽氣聚于下隂氣盛于上萌于黄泉下故曰黄鍾晉書樂志冬至徳為上土色黄故曰黄鍾共司丹筆之簡書㑹稽典録盛吉字君達拜廷尉吉性多仁恩務在哀矜每至冬月罪囚當斷其妻執燭吉手丹筆夫妻相向垂泣詩豈不懷歸畏此簡書佇積平反入儀華要某濫因聨事獲慶踐長並見前一道氷銜猥辱先施之寵國老談苑陳彭年在翰苑兼十餘職皆文翰清秘之目人謂其署銜為一條氷五色雲物願迎方至之休詩如川之方至餘見前代回程監丞準灰浮緹縵新北臺太史之占緹縵注見上條杜氏通典周官太史掌建邦之六典正歳年以敘事左傳日南至登觀臺以望而書禮也凡分至啟閉必書雲物為備故也歳華紀麗漢樂曾陳於前殿魯雲爰紀於候臺雲卧衣裳添南極老人之夀杜詩天闕象緯逼雲卧衣裳冷天丈志狼北地有大星曰南極老人老人見治安不見兵起常以秋分時候之南郊晉天文志南極老人一星在弧南常以秋分之旦見于丙春分之夕没于丁見則化平主夀昌月令秋分日饗夀星于南郊杜詩南極老人應夀昌恭惟某官襟懷霜潔談笑春温未老得閒飽味桑榆之暖遯齊閒覽趙嘏詩早晚粗酬心事了水邊歸去一閒人若身事了則仕宦之心益熾愈無歸期矣王易簡云青山得去且歸去官職有來還自來是豈能須臾忘情於軒冕哉余嘗於驛舍見人題壁云謀生待足何時足未老得閒方是閒余深味其言服其精當而愧其未能行也此與夫一日看除目三年損道心者異矣詩話唐閩川長溪縣薛令之登第開元中為東宫侍讀官作詩自歎曰朝日上團團照見先生盤盤中何所有苜蓿長闌干飯澁匙難綰羮稀箸覺寛只宜謀旦夕何由保歳寒𤣥宗至東宫見其詩舉筆續之曰啄木觜距長鳳凰毛羽短若嫌松桂寒任逐桑榆暖薛遂謝病歸久靜思動佇儀槐棘之班某莫捧兕觥兕徐履反獸名爾雅兕似牛説文如野牛而青交州記兕有一角角長三尺餘形如馬鞭柄陸佃云兕善抵觸故先王制罰爵以為酒戒觥古横反以兕角為之詩我姑酌彼兕觥乂兕觥其觩過勤魚素見前葡萄一㪷知公不為於凉州燉煌張氏傳扶風孟佗字伯郎中常侍張讓專權用事佗以葡萄酒一斗遺讓即拜凉州刺史東坡詩誰能斗酒博西凉史記大宛國以蒲蔔為酒富人藏酒多至萬石數十年不敗漢武内傳西王母當下帝設蒲蔔酒博物志西域有蒲蔔酒積年不敗彼俗傳云可至十年欲飲之醉彌日方解魏文帝詔朝臣曰蒲蔔釀以為酒過之流涎咽唾况親飲之毛氏曰考工記一豆注當作斗豆即古斗字左傳豆區鍾釜當音斗後人誤作俎豆之豆讀之今俗書作㪷盖誤併耳嶰竹數聲在我頓忘其寒谷律厯志取竹之解谷㫁兩節間而吹之以為黄鍾之宫制十二筩以聽鳳之鳴其雄鳴為六雌鳴亦六劉向别録燕有谷地美而寒不生五榖鄒衍居之吹律而温氣至而榖生今名黍谷代回王寺丞庭芝陽徳由子而蘖地氣上騰説文子十一月陽氣動萬物滋入以為偁徐曰十一月夜半陽氣所起人承陽故以為稱白虎通子孳也孶孳無已也蘖牙枿也律厯志始于子在十一月大吕吕旅也言隂大旅助黄鍾宣氣而牙物也月令孟春之月天氣下降地氣上騰孟冬之月天氣上騰地氣下降正義曰若以爻象言之則七月天氣上騰地氣下降若以氣應言之則從五月地氣上騰至十月地氣六陽俱升各取其義不相妨也善類觀復之亨天休滋至恭惟某官沉潛剛克並見前消息時偕月令注陽生為息隂死為消莊子消息盈虛一晦一明易終日乾乾與時偕行手縮袖間復添補衮之線韓文巧匠旁觀縮手袖間杜牧詩平生五色線願補舜衣裳山谷詩公有胸中五色線平生補衮用功深春回井底已驗浮緹之灰東坡詩井底微陽回未回月令冬至則水泉動對此令辰任昉牋今月令辰肅膺典册宜其遐福某適拘旅𤨏易旅𤨏𤨏斯其所取災正義云𤨏𤨏者細少卑賤之貌也初六當旅下極寄旅不得所安而為斯卑賤之役莫綴賀綦綦音竒廣韻履餙鳴鳳聽筩應九天之下詔李詩鳳凰初下紫泥詔餘見前拂龜端策驗七日之朋來屈原卜居詹尹乃端策拂龜曰君將何以教之易復亨出入无疾朋來无咎反復其道七日來復利有攸往代回江東李制帥大東七日來復可知天地之心見賀黄制置條千里折衝實頼詩書之帥道随剛長政與和俱恭惟某官徳配陽休並見前氣排冬凛李賀詩依移和氣排冬嚴名播江淮之草木張萬福傳江淮草木亦知爾威名詳見前識通河洛之圖書繫辭河出圖洛出書聖人則之緩帶輕裘方靜觀於雲祲羊祜傳常緩帶輕裘身不被甲詳見前易通卦驗冬至之日見雲送迎從下嚮來歳大美人民和不疾疫無雲送迎徳薄歳惡故其雲赤者旱黒者水白者為兵黄者有土功諸從日氣送迎其効也獻履貢襪佇直上於星辰見前㑹由五更三㸃之行見上賀黄制置條益近一寸四分之景劉向洪範傳夏至景一尺五寸八分冬至景一丈三尺一寸四分春秋二分景七尺三寸六分某材如綫短心亦灰寒並見前倚棠棣之華猶書紙尾詩棠棣之華鄂不韡韡凡今之人莫如兄弟南史蔡廓傳徴為吏部尚書廓問傅亮選事若悉以見付不論不然不能拜也亮以問録尚書徐羨之羨之曰黄門郎以下悉以委蔡吾徒不以厝懷自此以上固宜共參同異廓曰我不能為徐干木署紙尾遂不拜選案黄紙録尚書與吏部尚書連名故廓言署紙尾也韓文藍田縣丞㕔壁記右手摘紙尾鴈鶩以進平立睨丞曰當署丞渉筆占位署惟謹曝茅簷之煖但夢刀頭歐文内制集序凉竹簟之暑風曝茅簷之冬日韓詩暉暉簷日暖且鮮陳後山詩暮年五斗得千里有愧寒簷背朝日古詩藁砧今何在山上復有山何當大刀頭破鏡飛上天大刀頭謂環也杜詩滿目飛明鏡歸心折大刀栁詩贈君從此去何日大刀頭王荆公詩世事但知吹劒首官身難得問刀頭賀曾安撫從龍任武岡倅長至之逄辛日允符雲觀之書律厯志悉新于辛月令注辛之言新也史記辛者言萬物之辛出也左傳僖公五年春王正月辛亥日南至公既視朔遂登觀臺以望而書禮也凡分至啟閉必書雲物為備故也是歳至日亦逄辛故云允符稗史㑹編云文人冬至用書雲字宋人以分至啟閉皆書雲物獨以為冬至事非也春秋感應符云冬至有雲迎送者來歳美宋忠注云雲迎日出送日没也觀此則冬至獨用書雲事亦未為失南極之次丁躔正應星沙之夀晉天文志南極常以秋分之旦見于丙春分之夕没于丁史記天官書軫為車主風其旁一小星曰長沙正義曰長沙一星在軫中主壽命占明主長夀子孫昌也詳見前晉天文志長沙一星在軫之中自軫十二度至氐四度為夀星於辰在辰鄭之分野自張十七度至軫十一度為鶉尾於辰在已楚之分野長沙星明則主夀故曰星沙又曰夀沙宋湖南帥府治潭州故云維時玉帳見三十九巻賀制置安撫條昭對璇璣恭惟某官徳配陽休道偕剛長地中雷復豈容小袖之回旋長沙定王傳注應劭曰景帝後二年諸王來朝有詔更前稱夀定王但張袖小舉手左右笑其拙上恠問之對曰臣國小地狹不足回旋帝乃以武陵零陵桂陽益焉魁下台明即播大鈞之坱圠天文志魁下六星兩兩而比者曰三能注能音台賈誼傳大鈞播物坱圠無垠仁等沅湘之永方輿勝覽湖嶺之間湘水貫之無出湘之右者凡水皆㑹焉但以瀟水合則曰瀟湘以蒸水合則曰蒸湘以沅水合則曰沅湘耳楚辭濟沅湘以南征兮又回湘沅而遠遷福齊翼軫之髙長沙星度當鶉尾之次翼軫之度某半刺灰寒杜詩半刺已翺翔寸材綫短見前碧油元帥繡歸即相於西周詩衮衣繡裳又公歸無所白脚門生襪貢尚憐於東郭史記滑稽傳東郭先生久待詔公車貧困饑寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之東郭先生應之曰誰能履行雪中令人視之其上履也其履下處乃似人足者乎賀安撫提刑都大夀考維祺介以福福豈待祈詩夀考維祺以介景福注祺吉也介助也養老人而得吉所以助大福也此借用文帝紀昔先王遠施不求其報望祀不祈其福其令祠官致敬無有所祈至朔同日謂之章章必有慶後律厯志歳首至也月首朔也至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀歳朔又復謂之元詩我覯之子維其有章矣維其有章矣是以有慶矣箋章禮文也言我得見古之明王雖無賢臣猶能使其政有禮文法度政有禮文法度是則我有慶賜之榮也此借用輙脩魚繭後漢書蔡倫造紙用樹膚麻頭及敝布魚網以為紙稽含南方草木狀蜜香紙以蜜香樹皮葉作之微褐色青文如魚子劉恂嶺表異録廣管羅州多棧香樹堪作紙有文如魚子牋晉王羲之書蘭亭序用蠶繭紙䑕鬚筆仰頌鴻龎龎當作厖説文石大貌司馬相如傳湛恩洪厖歐陽永叔詩上摩青蒼似腌靈下壓后土之鴻厖恭惟某官徳合陽休氣排冬凜五雉五工之正帝有絲綸左傳五雉五工正也禮記王言如絲其出如綸並詳見前一龜一琴之回民皆襦袴宋史趙抃傳神宗立自成都召知諫院及謝帝曰聞卿疋馬入蜀以一琴一鶴自随為政簡易亦稱是乎兹對五雲之瑞宻回九地之春注見首條某竊伏蟇頥蟇頥山在眉州詳見前阻瞻龍節周禮澤國用龍節天隅把繡自知無一線之長杜詩春日垂山鬢天隅把繡衣餘見前月琯吹葭更願假重緹之庇晉律厯志黄帝作律以玉為管長尺六孔為十二月音至舜時西王母獻昭華之琯以玉為之餘見前代回揚州崔安撫與之宋史崔與之字正子廣州人紹熈四年進士始授潯州司法參軍知建昌新城縣通判邕州發遣賔州軍事提㸃廣西刑獄召為金部員外郎金南遷於汴朝議疑其進迫特授直寶謨閣權發遣揚州事主管淮東安撫司公事寧宗宣引入内親遣之與之修戰守備遣精鋭布要害金人深入無功而和議亦寢召為秘書少監升秘書監兼太子侍講權工部侍郎未㡬成都帥董居誼以黷貨為叛卒所逐總領楊九鼎遇害蜀大擾與之以選為煥章閣待制知成都府本路安撫使至即帖然詔盡䕶四蜀之師開誠布公人心悦服初至府庫錢僅萬餘其後至千餘萬金帛稱是以疾告歸朝廷以鄭損代既受代金人諜知之大入與之再為臨邊金人乃退召為禮部尚書不拜蜀人思之肖其像於成都仙遊閣以配張詠趙抃名三賢祠理宗親政召為吏部尚書數以御筆起之皆力辭拜參知政事右丞相控辭至十有三疏嘉熈三年乃得致仕薨年八十二累封至南海郡公諡清獻史臣論曰唐張九齡姜公輔宋余靖皆出嶺嶠之南番禺崔與之晩出屹然大臣之風卒與三子者方駕造物者曷嘗擇地而生材哉先王立賢無方葢為是也互見前三微肇始三微注見上巻回林嘉興條萬彚滋亨彚音謂集韻類也易以其彚征又㧞茅茹以其彚曹植冬至獻襪表四方交泰萬彚昭蘇集康寧富夀之疇尚書九五福一曰夀二曰富三曰康寧四曰攸好徳五曰考終命孔傳百二十年為夀財豐備為富無疾病為康寧所好者徳福之道為攸好徳各成其短長之命以自終不横天曰考終命在禮樂詩書之帥見前恭惟某官克壯其猷詩方叔元老克壯其猷久勞於外斗牛有耀坐觀推筴之長孝經説斗指子為冬至尚書考靈曜冬至日月五緯俱起牽牛初史記黄帝得寶鼎宛朐問於鬼臾區對曰帝得寶鼎神筴是歳己酉朔旦冬至得天之紀終而復始於是黄帝迎日推筴後率二十歳復朔旦冬至淮海無波自適觀梅之興尚書淮海惟揚州杜詩東閣觀梅動詩興還如何遜在揚州詳見前卦已占於七日易七日來復班即近於五雲杜詩五雲多處是三台某託契惟深脩辭不敏易脩辭立其誠左傳謝不敏焉韓詩買羊沽酒謝不敏拜長箋之委貺掻短髪以寘慚詩掻首踟蹰杜詩羞將短髪還吹㡌又白頭掻更短渾欲不勝簮陳書蕭摩訶傳老夫受脤專征不能戰勝攻取今被危迫慙寘無地報不成章詩不成報章永以為好詩匪報也永以為好也代回淮西王安撫柟宋史王柟字汝良大名人祖倫使北死孝宗訪求其孫之未禄者二人官之柟其一也調通州海門尉以近臣薦擢監登聞鼓院假右司郎中使金守軍器少監知楚州累官至太府卿告歸以右文殿修撰知太平州加集英殿修撰致仕贈寶章閣待制詳見上一陽來復既見天地之心易傳冬至日一陽為復二陽為臨三陽為泰十國為連共載詩書之帥禮記十國以為連連有帥正義曰連是連接且從榖旦見前茂介叢休㳟惟某官肅括𢎞深法言或問士何如斯可以禔身曰其為中也𢎞深其為外也肅括則可以禔身矣靖共正直詩靖共爾位好是正直圖書中秘星連五緯之光月令仲冬之月昏東壁中晉天文志東壁二星主文章天下圖書之秘府也劉向傳詔向領校中五經秘書師古曰言中以别於外天官書五星者天之五佐為經緯見伏有時盈縮有度周禮疏五星左旋為緯隋天文志周五緯入房啟姬王之肇迹郎顗傳五緯循軌四時和睦樽俎邊城雷動三軍之喜揚雄傳天下之士雷動雲合章孝標雪詩朱門到曉難盈尺盡是三軍喜氣消佇應葭莩之動見前歸儀槐棘之班某猥辱手書劉宏傳每有興廢手書守相丁寧欵宻無由面賀維藩維翰願歸疆理之功詩价人維藩大宗維翰又廼疆廼理廼宣廼畆左傳疆理天下如阜如岡共享國家之福詩如山如阜如岡如陵如川之方至以莫不増代回淮南畢安撫再遇緹灰候氣一新太史之占見前茸纛宣風載重元戎之寄栁文嶺南節度使饗軍堂記幢牙茸纛金節析羽旂旗旟旞咸餙於下宜從亞歳曹植獻襪表亞歳迎祥履長納慶沈約宋書魏晉冬至日受萬國及百寮稱賀因小㑹其儀亞於歳朝茂擁百祺恭惟某官識遠且明材沉而毅輕裘緩帶備觀雲祲之祥羊祜傳祜在軍常輕裘緩帶身不被甲堅甲利兵孰測霜威之勁杜詩戲假霜威促山簡李詩情親不避馬為我解霜威山谷詩春色已知回寸草霜威從此霽寒松佇寧邊鑰又總中權徑從魯觀之登並見前即見漢壇之築韓信傳擇日齋戒設壇塲具禮乃可水經注安陽縣故𨽻漢中有韓信臺髙十餘丈上容百許人相傳漢高祖齋七日置壇設九賔禮以禮拜信某屬紆朝組莫捧賀觴玉律和聲既屆朋來之慶金印如斗願迎方至之休俱見前賀黄總領申律諧鳳應日迎天統之長律厯志制十二筩以聽鳳之鳴其雄鳴為六雌鳴亦六比黄鍾之宫而皆可以生之是為律本又十一月乾之初九陽氣伏於地下始著為一萬物萌動鍾于太隂故黄鍾為天統士飽馬騰雷動雲屯之喜韓文平淮西碑士飽而歌馬騰於槽揚雄傳天下之士雷動雲合魚鱗雜襲列子望之若雲屯焉杜詩王有虎臣司苑門入門天廐皆雲屯李詩西秦百萬衆戈甲猶雲屯又劒閣重關蜀北門上皇歸馬若雲屯陳後山詩子弟無頼皆西奔踵門父老如雲屯王人序諸侯之上見上巻小人腓君子之依腓音肥説文脛腨也詩君子所依小人所腓毛傳避也正義云戍役小人之所避忌恭惟某官道配陽休徳存隂隲尚書惟天隂隲下民馬云隲升也升猶舉也舉猶生也總領甚稱豈惟是戊巳之營魏相傳總領衆職甚稱上意元帝紀戊巳校尉屯田吏士師古曰戊巳校尉者鎮安西域無常治處亦猶甲乙等各有方位而戊與巳四季寄王故以名官也時有戊校尉又有巳校尉一説戊巳位在中央今所置校尉處三十六國之中故名戊巳也留屯並行諒已得甲寅之報趙充國傳充國既得讓乃上書謝罪因陳兵利害六月戊申奏七月甲寅璽書報從充國計焉又留屯以為武備因田致榖威徳並行茂得丈三之景周禮馮相氏冬夏致日注冬至景丈三尺夏至景尺五寸易氏解曰夏至日在南陸躔東井去極六十六度有竒而景尺有五寸冬至日在北陸躔牽牛去極一百十六度有竒而景丈有三尺亟膺尺一之褎匈奴傳漢遺單于書以尺一牘陳蕃傳尺一選舉注尺一謂板長尺一以寫詔書也陽球傳帝徙球為衛尉勑尚書令召拜不得稽留尺一某自分灰寒仍逢澤竭孔子世家竭澤涸魚所見者今我也初無有一線之長東坡答李端叔書謫居無事黙自觀省回視三十年以來所為多其病者足下所見皆故我非今我也無乃聞其聲不考其情取其華而遺其實乎非吾之故人耶更望垂五雲之庇賀綦總領奎綦奎嘉定人以朝散郎直敷文閣占七日之來道漸通於君子序諸侯之上權莫重於王人並見前與時偕行易終日乾乾與時偕行正義曰建寅之月三陽用事三當生物之初生物不息同于天時故曰與時偕行何福不至詩何福不除恭惟某官氣排冬凛徳配陽和灰動重緹撫三軍於挾纊見前日長一綫總六轡以如絲詩我馬維騏六轡如絲毛傳言調忍也諒從獻履之辰見前行拜予環之命荀子聘人以珪問士以璧召人以瑗絶人以玦反絶以環楊倞注玦如環而决肉好若一謂之環古者臣有罪待放于境三年不敢去與之環則還與之玦則絶皆所以見意也某甚慚玩歳左傳主民玩歳而愒日其與㡬何又見書雲見前涸轍西江愧難辨青雀之舸莊子周昨來有中道而呼者顧見車轍有鮒魚焉曰我東海波臣也君豈有升斗之水而活我哉周曰我將南遊呉越之王激西江之水而迎子可乎釋名船上屋曰廬其上重室曰飛廬又在其上曰雀室於中候望若烏雀之驚視也方言曰船首謂之間或謂之鷁首郭璞注今江東貴人舟前作青雀是其象也王隠晉書陶侃擊蜀賊王真真以鉤得上侃青雀舟侃欲投水都督王禳蘇品扶侃入小舟得脫梁元帝船名詩池邊白鵠舞林深青雀歸舸賈我切説文舟也又大船也方言南楚江淮凡船大者謂之舸小舸謂之艖挹漿北斗何因搥黄鶴之樓太白醉後贈丁十八詩黄鶴高樓已搥碎詳見前賀安總領癸仲子丙之雷在地復君子占七日之來見前雪應年豐王人序諸侯之上舊唐書長夀二年元日大雪上謂侍臣曰俗云元日有雪則百榖豐有何故實文昌左丞姚璹對曰氾勝之書云雪是五榖之精以其汁和種則年榖大穰又宋武帝大明五年元日降雪以為嘉瑞上曰朕心存百姓如得年登即為大瑞陳徐陵詩三農喜盈尺六出儛崇花張正見詩九冬飄逺雪六出表豐年宋謝惠連雪賛氣遍霜繁年豐雪積朝野僉載正月三白田公笑赫赫自今以始詩自今以始歳其有何福不臻詩何福不除恭惟某官徳並春融氣排冬凛糴湟中之粟未易斗量趙充國傳充國曰金城湟中榖斛八錢吾謂耿中丞糴二百萬斛榖羌人不敢動矣師古曰湟水出金城臨羌塞外東入河湟水之北是漢地言豫備糧食可以制敵流地上之錢端如雲滃劉晏傳自言如見錢流地上每朝謁馬上以鞭筭滃烏孔切説文雲氣起也徐曰雲起于水一曰大水貌増韻雲濃貌伯趙聿司於短至左傳伯趙氏司至者也禮記仲冬之月日短至隂陽爭諸生蕩又日短至則伐木取竹箭安期逺迓於長年見上巻賀安總領條某百念灰寒單車氷塞通典自魏以來庶姓為州而無將軍者謂之單車刺史凡單車刺史加督進一品都督進二品繭絲已竭何由沃六轡之絲襪綫非長更願寛五雲之綫俱見前代回宋總領鈞日轂回輈舒永五紋之線轂古福切説文輻所輳也輈音周説文轅也淮南子爰止羲仲爰息六螭是謂懸車注日乗車駕以六龍羲和御之廣雅日御曰羲和杜詩刺繡五紋添弱線吹葭六琯動飛灰星軺給餉光華六轡之絲見前諒對剛辰王制注二五象五行剛柔十日疏五剛甲丙戊庚壬五柔乙丁巳辛癸益綏純嘏恭惟某官盛名晝永清徳氷明弩矢前驅見錢流於地上樵蘇後㸑如挾纊於軍中俱見前底績懋哉尚書乃言底可績又惟時懋哉歸班近只某濫聨筆槖阻奉椒觴君子占一陽之來當體復亨之動並見前王人序諸侯之上即膺晉錫之蕃易晉康侯用錫馬蕃庶晝日三接代回林總領祖洽陽月終更慶一陽之亨復段㑹宗傳毋求竒功終更亟還福星出使符五福之照臨東坡詩斯人乃福星遣出虛危間公自注司馬温公謂軾曰子駿福星也東京人困甚且令往彼詳見前宜對令辰茂膺純嘏見前㳟惟某官剛随天運和本時中養九徳於黄鍾鳳鳴嶰谷尚書亦行有九徳亦言其人有徳又九徳咸事餘見前持貳卿之紫槖虎卧長江南豐除李常制奉常貳卿董宣傳摶擊豪彊莫不震慄京師號為卧虎南史蕭慧開傳嚴用刑威蜀人號曰卧虎衮繡晝行樵蘇宿飽見前牽牛極晷既占候於漢臺易氏解冬至日在北陸躔牽牛去極一百十六度有竒而景丈有三尺月令章句冬至為極晝漏極短遠極極遠晷景極長三輔黄圖靈臺在長安西北八里始曰清臺本為候者觀隂陽天文災異更名曰靈臺郭延生述征記長安宫有靈臺髙十五仞上有渾儀水經云城南渠漕有漢靈臺然則漢城西之上林城南之漕渠皆在候景之臺也駱馬懷歸寧逶遲於周道詩嘽嘽駱馬豈不懷歸又四牡騑騑周道倭遲某濫塵朝綴莫旅賀綦烹鯉得書先辱五雲之墜拂龜占易惟期七日之來並見前代回趙總領不儳化日迎長王符傳化國之日舒以長易通卦驗冬至始人主與左右羣臣從樂五日天下亦家家從五日以迎日至之禮卿雲紀瑞史記若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲慶雲見嘉氣也易通卦驗冬至初陽雲出箕如樹木之狀諸侯之上序莫重於王人一陽之來道益亨於君子並見前茂綏福履詩樂只君子福履綏之請致頌言㳟惟某官秉徳忱恂尚書廸知忱恂于九徳之行孔傳禹之臣蹈知誠信于九徳之行凝姿信厚詩序關睢之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也詩振振公子毛傳振振信厚也峙糧天塹星夙駕以載驅尚書峙乃糗糧無敢不逮陳書都官尚書孔範曰長江天塹古以為限隔南北今日虜軍豈能飛度耶千湖居士集流柹投鞭規濟天塹楊廷秀揚子江詩天將天塹䕶呉間不數殽函百二關塹七豔切説文坑也詩星言夙駕給餉雲屯雷歡聲而四起薛能詩欲識普恩無遠近萬人懽忭一聲雷暫回留鑰漢書蕭何以信謹守管鑰注高祖出征何每居守坐鎮陪京文選坐鎮雅俗又於顯樂都既麗且康陪京之南居漢之陽陪京謂洛陽宜對南至之書左傳僖公五年正月辛亥朔日南至注周正月今十一月冬至之日日南極正義曰日之行天有南有北常立八尺之表以候景之短長夏至之景尺有五寸日最長而景最短是謂日北至也自是以後日漸近南冬至之景一丈三尺日最短而景最長是謂日南至也即侈東歸之詠詩序東山周公東征也周公東征三年而歸某材如線短心亦灰寒並見前刺繡吹葭空覺杜陵之老大杜詩刺繡五紋添弱線吹葭六琯動飛灰又杜陵有布衣老大意轉拙獻履貢襪但觀曹植之文章魏曹植冬至獻襪表曰伏見舊儀國家冬至獻履貢襪所以迎福踐長杜詩文章曹植波瀾濶賀都大首尾同第九條賀安撫恭惟某官徳合陽休氣排冬凜萬馬並馳而獨立恪秉素絲詩羔羊之皮素絲五紽退食自公委蛇委蛇四牡有功而遄歸亟登紫槖詩序四牡勞使臣之來也有功而見知則説矣詩式遄其歸遄速也列子不若遄歸也紫槖紫荷槖兹對五雲之瑞周禮保章氏以五雲之物辨吉凶水旱降豐荒之祲左傳分至啟閉必書雲物宻回九地之春杜詩排隂出九地萬物随開張詳見前代回鞏都大嶸天復一陽滋萌帝澤律厯志滋萌於子星聨五緯照映使華見前維時山立之休禮記山立時行盛氣顛實揚休玉色翕受川増之祉尚書翕受敷施詩如川之方至以莫不増恭惟某官和鍾玉律李元標詩玉律動年灰清徹氷壺選詩清如玉壺氷方今之務孔殷孰堪經濟李固傳方今之事復同於前尚書九江孔殷左傳方事之殷也有韎韋之跗注陶侃傳方事之殷當頼羣㒞圜法之司尤急政藉阜通食貨志太公為周立九府圜法又錢圜函方注外圜而内孔方也㑹當錢流地上之餘即有人自日邊之召某心随灰冷技蔑線長並見前賦問大鈞將為天下而實賀劉禹錫有問大鈞賦左傳叔弓如晉賀虒祈也游吉相鄭伯以如晉亦賀虒祈也史趙見子大叔曰甚哉其相蒙也可弔也而又賀之子大叔曰若何弔也其非惟我賀將天下實賀韓文其為吾以前所稱為天下賀詩成小至亦驚人事之相催杜陵有小至詩注云陽為大隂為小冬至隂極故云小至一説或云冬至前一日為小至按歳時雜詠盧照隣年日述懷詩人歌小歳酒花舞大唐春是以元日為小歳由此觀之子羙之小至即冬至也杜詩又有小寒食舟中作注小寒食如小至謂前一日也又天時人事日相催冬至陽生春又來賀牛茶馬大年端策拂龜地雷之復攸往屈原卜居詹尹乃端策拂龜曰君將何以教之易七日來復利有攸往又雷在地中復摘茗市駿山澤之節遄歸初寮除李昌孺制在昔元豐留神武備摘山市駿具著科條周禮山國用虎節澤國用龍節詩王曰遄歸與時偕行易終日乾乾與時偕行有秩斯祜詩嗟我烈祖有秩斯祜恭惟某官陽休山立禮記山立時行盛氣顛實陽休玉色神動天随莊子尸居而龍見淵嘿而雷聲神動而天随注神順物而動天随理而行獨鶴整江海之毛雲程駿歩少陵八哀詩相國張公九齡云相國生南紀金璞無留礦仙鶴下人間獨立霜毛整矯然江海思復與雲路永又獨鶴不知何處舞又獨鶴歸何處又獨鶴原依渚萬牛回丘山之首風節自髙杜詩大厦將傾要梁棟萬牛回首丘山重諒當伯趙司至之辰左傳伯趙氏司至者也注伯趙伯勞也益對顔氏庶㡬之吉繫辭子曰顔氏之子其殆庶㡬乎有不善未嘗不知知之未嘗復行也易曰不遠復无祗悔元吉某真成浪出杜詩龎公不浪出蘇氏今有之久俟汰歸魏舒傳時欲沙汰郎官非其才者罷之舒曰吾即其人也襆被而出趨走傷心良厭看於新厯少陵至日遣興詩欲知趨走傷心地正想氤氲滿眼香東坡詩老去怕看新厯日形容獨老儻尚念於故人少陵冬至詩江上形容吾獨老天涯風俗自相親賀黃運使桂詳啟意任武岡倅作斗北中而建子厯肇應於周郊月令仲冬之月日在斗昏東壁中旦軫中説文冬至斗指子夜半時交午者也日南至而逄辛書允符於魯觀左傳僖公五年正月辛卯朔日南至詳見前維時英節周禮司節凡邦國之使節皆金也以英蕩輔之注英蕩畫函疏其函猶是簜但以英華有畫義故云畫函輔之者以函輔此節使不壞損也茂擁休祺恭惟某官徳配陽剛氣排冬凛氷解漕下既曉行湘水之春並見前雷復地中即夜對宣室之席賈誼傳文帝思誼徵之至及見上方受釐坐宣室上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝前席師古曰未央前正室也前席者漸促近誼聽悦其言也諒應四分之牛晷説文晷日景也易氏解冬至日在北陸躔牽牛劉向洪範傳冬至景一丈三尺一寸四分詳見前坐齊七政於龍魁天文志北斗七星所謂璇璣玉衡以齊七政杓攜龍角衡殷南斗魁枕參首詳見前某材乏綫長見前分甘車副胡文㳟制分乗倅車又分乗别車儻憐紫陌看花随綴於馬蹄水經注塗陽縣有紫陌深圖杜詩垂鞭嚲鞚凌紫陌孟郊詩春風得意馬蹄疾一日看徧長安花雖在黔山吹黍固希於鳳律武岡銘黔山之巑餘見前賀李運使鼎化日舒長共紀魯臺之至見前卿雲紛郁重行湘水之春見代回趙總領條况兼熊旂龍節之華韓文平淮西雅犀甲熊旂威命是荷周禮澤國用龍節宜介羔酒兕觥之夀宋陶榖得党進家姬遇雪陶取雪水烹團茶謂姬曰党家應不識此姬曰彼粗人安有此但能於銷金煖帳中淺斟低唱喫羊羔兒酒陶嘿然慙其言宋張能臣鄖鄉集記天下酒名姜宅園子正店羊羔酒又關右塞上有黄羊無角色類麞麂造酒以荻管吸于瓶中老杜送從弟亞赴河西判官詩黄羊飯不羶蘆酒還多醉謂此餘見前㳟惟某官仁排冬凛徳配陽休見前物換星移又復濯滄浪之水王勃詩物換星移㡬度秋滄浪水在龍陽縣二十里浪水與滄水合故號滄浪乃漁父濯纓之處漕下氷解便當登碧落之天韻㑹碧落天也李詩歩綱繞碧落王維詩鳳扆朝碧落李渉詩碧落高高雲萬里餘見前仁風梅放以栁舒和氣竹苞而松茂某寸材綫短半刺氷寒並見前飯蔬飲水而曲肱將歸尋於舊物左傳祀夏配天不失舊物王獻之傳青氊我家舊物詳見前衣繡觀風之直指諒未按於故人見前代回喬運使行簡喬行簡傳升秘書郎為淮西轉運判官知嘉興府改淮南轉運判官兼淮西提㸃刑獄提舉常平詳啟意與本傳合餘見前短日舒長益永六螭之馭月令仲冬之月日短至隂陽爭諸生蕩又日短至則伐木取竹箭王符傳化國之日舒以長淮南子爰止羲和爰息六螭廣雅日馭曰羲和長淮清晏遥知四牡之功韓詩淮水出桐栢山東馳遥遥千里不能休揚雄傳天清日晏師古曰晏無雲也説文晏天清也三輔人以日出清濟為晏晏而温楊素傳東夏清晏嘉庸茂勣于是乎在對此令辰宜其遐福詩降爾遐福維日不足㳟惟某官和鍾玉律清徹氷壺俱見前聚人曰財坐斡流泉之運繫辭何以聚人曰財注財所以資物生者也食貨志擅斡山海之貨師古曰斡謂主領也讀與管同又貨寶於金利於刀流於泉布於布如淳曰流行如泉也噓物以氣潜回寒谷之温見前式遄其歸遄淳沿切説文往來數也爾雅疾也詩式遄其歸可拱而竢終軍傳斯拱而竢之耳某濫持荷槖阻捧栢觴歳時記元旦進椒栢酒栢是仙藥詳見前占卦六日七分是為道長易反復其道七日來復天行也利有攸往剛長也詳見前賀黄制置符脩身千二百歳請致祝規莊子黄帝問於廣成子曰敢問治身奈何而可以長久廣成子曰慎守女身物將自壯我守其一以處其和故我脩身千二百歳矣吾形未嘗衰韓文敢不敬蚤夜以求從祝規代回淮西徐運使煇緹灰襲候肇基來復之祥見前繡節臨邊茂介踐長之慶三朝志旌節唐天寶中置凡命節度使有司給門旗二旌一節一麾槍二豹尾二金節隋制也黑漆竿上施圓盤周綴紅綜拂八層黄繡龍袋籠之王公以下皆有節制同金節韜以碧油恭惟某官身兼數器薛宣傳經術文雅足以謀王體斷國論身兼數器有退食自公之節夙駕單車詩星言夙駕信陵君傳今單車來代之何如哉龔遂傳單車獨行至府張綱傳單車之職魏裴潜拜代郡單車之部互見前招來鴻鴈之民衆如雲集餽餉􅆛貅之旅令若霜嚴並見前宜對天統之辰律厯志天統之正始於子半丕擁日來之福易七日來復某屬拘朝綴莫旅賀絇絇權俱切禮記童子不屨絇注屨頸餙也鳴鳳律和知已宣於九徳尚書日宣三徳又九徳咸事牽牛晷短聊具報以七襄見前賀吕提刑祖烈六雄召律觀象見天地之心律厯志制十二筩以聽鳳之鳴其雄鳴為六雌鳴亦六詳見前易君子居則觀其象而玩其辭又復其見天地之心乎四牡周咨用龍在山澤之節詩四牡騑騑又周爰咨諏周禮山國用虎節澤國用龍節矧佩纍纍之重石顯傳印何纍纍綬若若耶師古曰纍纍重積也宜膺簡簡之祥詩降福簡簡恭惟某官道與時偕易與時偕行徳随剛長易利有攸往剛長也二節三節之趨走詎鬱鬱於岷峨禮記凡君召以三節二節以走一節以趨疏節者以玉為之所以明信輔於君命者也急則以二節緩則以一節急緩不出於三節耳不謂節盡于三也韓信傳安能鬱鬱久居此乎八命九命之朝宗即浮浮於江漢周禮八命作牧九命作伯禮記制三公一命巻若有加則賜也不過九命注巻俗讀也其通則曰衮三公八命矣唯加一命則服龍衮與王者之後同尚書江漢朝宗于海注諸侯朝于天子春見曰朝夏見曰宗詩江漢浮浮武夫滔滔諒對一陽之復益臻百福之遒詩敷政優優百福是遒毛傳聚也某席芘雲深效官氷冷莊子知效一官嘆至日之長為客但切懷歸杜詩年年至日長為客忽忽窮愁泥殺人因風物而暗思親敢伸善頌王維詩獨在異鄉為異客每逢嘉節倍思親代衞參政賀樂提刑緹陽襲管綫晷延圭周禮大司徒以土圭之法測土深正日景以求地中典瑞土圭以致四時日月玉人土圭尺有五寸以致日明謹用刑克廣好生之徳尚書好生之徳洽于民心靖恭介福諒裒滋至之休詩靖恭爾位好是正直神之聽之介爾景福恭惟某官清徹氷壺和鍾玉律見前棠隂晝永訟已息於楚氛左傳楚氛甚惡葭室灰浮暖自回於嶰谷見前某偶叨分閫謝安傳賛任總中臺效彰分閫正阻造門端策拂龜七日已占於不逺見前聽筩鳴鳳九成更佇於來儀尚書簫韶九成鳳凰來儀賀陳提刑天宜黃鍾恊律可推復見之心見前繡斧詳刑茂對咸中之慶唐龍朔中改廷尉正為詳刑大夫晉書元帝紀布帳練帷詳刑簡化王粲從軍行凉風厲秋節司典告詳刑詳見前尚書屬于五極咸中有慶受王嘉師監于兹祥刑惟明克允尚書惟明克允何福不臻恭惟某官徳配陽休氣排冬凛周原苞栩久勞六轡之馳驅見前漢節梅花已報一枝之消息杜詩漢節梅花外春城海水邊又萬木凍欲折孤根煖獨回前村深雪裏昨夜一枝開風雲之㑹易雲從龍風從虎劉𤣥傳假我風雲二十八將傳論感㑹風雲奮其知勇日月以需某有幸同僚惟深善頌㫖且多多且㫖莫遂稱觴昌而熾熾而昌願加視履俱見前賀劉提刑垕詳啟意盖湖南提刑此啟倅武岡作鳳筩回律肇倡應於六雄見前龍節詳刑方驅馳於四牡見上條勞行邁之靡靡詩行邁靡靡中心摇摇注邁行也靡靡猶遲遲也行舒之意沈佺期詩今君出使車行邁方靡靡宜降福之穰穰恭惟某官徳本剛潜道偕陽長繡衣持斧曉行湘水之春並見前縞帶随車暮對江天之雪昌黎雪詩随車翻縞帶逐馬散銀盃杜詩恣意向江天所虞馹召靡俟鴈回回鴈峯在衡陽之南鴈至此不過遇春而回故名湖南提刑司在衡州某佐此斗州㣲哉星屏屏必郢切星屏當作箳篂韻㑹云箳篂車蔽簹也車上竹席障塵者前曰藩後曰箳旁曰翰摠曰茀通作屏星孔恂傳别駕車舊有屏星刺史欲去之恂曰别駕可去屏星不可去按箳篂刺史車非特别駕也俗專以為别駕事誤矣或作星屏益誤篂本平聲亦可押息井蘇挺二切李欲以星斗相對故倒用之耳託刺史二天之庇聊復編茅占夫子七日之爻敢希㧞茹見前賀游提刑佀雷在地而復吉實開泰内之亨易雷在地中復初九不遠復无祗悔元吉泰小往大來吉亨彖曰内陽而外隂内健而外順内君子而外小人天違水而訟清宜介咸中之慶易天與水違行訟疏天道西轉水流東注是天與水相違象人彼此乖戾故致訟也尚書屬于五極咸中有慶矧壬公之司至趣辰告之遠猷詩訐謨定命逺猷辰告箋猷圖也大謀定命謂正月始和布政于邦國都鄙也為天下遠圖庶事而以歳時告施之恭惟某官徳與氣游道偕剛長昔時諫草懶㸔省砌之花杜詩退朝花底散歸院栁邊迷避人焚諫草騎馬欲雞棲今日判花聊鞠圜扉之草唐故事中書有軍國政事則中書舍人各執所見雜署其名謂之五花判事文選鞠茂草于圜扉栁舒梅放松茂竹苞見前知㡬其神繫辭知㡬其神乎疏神道㣲妙寂然不測人能豫知事之㡬㣲則能與神道合㑹也何福不除除遲遽切詩天保俾爾單厚何福不除毛傳除開也箋云何福而不開皆開出以予之某身依雲芘心實灰寒乃積乃倉吹鳳尚希於生黍見前我任我輦牽牛何補於服箱詩我任我輦我車我牛又睆彼牽牛不以服箱傳河鼔謂之牽牛服牝服也車内容物之處為箱賀提刑首尾同前第九條賀安撫恭惟某官徳合陽休氣排冬凛見前合東西而瞻使節載駕星軺杜詩川合東西瞻使節地分南北任浮萍審簡孚以嚴天威益揚風采尚書簡孚有衆惟貌有稽無簡不聽具嚴天威黄霸傳風采不及丙魏于定國兹對五雲之瑞宻回九地之春見前回永州陳提刑翿永州已見作詳啟意倅武岡竊潁川之河潤亦飽聞新尹之誇郭伋傳潁川盗起拜伋為太守帝勞曰賢能太守去帝城不遠河潤九里冀京師蒙福少陵遭田父泥飲詩酒酣誇新尹畜眼未見有隔巫水之山巑未果賀中丞之蒞栁文武岡銘序黔巫東鄙蠻獠雜擾時惟潭帥御史中丞栁公綽練立將校提卒五千屯於武岡云云銘云巫山之㠝巫水之磻蒙以羲爻之七日賁然郇翰之五雲並見前遂令寒灰頓有生氣世説亷頗藺相如雖千載上死人懔懔恒如有生氣恭惟某官仁排冬凛義配陽剛英簜繡衣固已淹五綵之線見前朱轓皁葢聊復壯萬石之亭萬石亭在永州見上巻賀永州陳守條重緹回襦袴之温一札趣絲綸之召見前某覩先未快韓文朝廷之上引頸東望若景星鳳皇之始見也爭先覩之為快禮後知慚陳遵尺牘之可藏詎止榮從事之十部陳遵傳性善書與人尺牘主皆藏弆以為榮劉宏傳得劉公一紙書賢于十部從事李膺别駕之非昔正足辱太學之諸生南史蜀士李膺為涪令有材辯西昌侯藻為益州使至都武帝謂曰今李膺何如昔李膺對曰今勝昔昔事桓靈之主今逄堯舜之君帝嘉其對以為益州别駕韓文國子先生晨入太學招諸生立館下李以學録倅武岡惟依湘水之深張衡詩我所思兮在桂林欲往從之湘水深當借楚波之及左傳其波及晉國者君之餘也代回浙東譙提刑令憲清臺占候肇推三統之元禮記夏為清臺商為神臺周為靈臺律厯志雜候上林清臺課厯疏宻三輔黄圖靈臺在長安西北八里始曰清臺本為候者觀隂陽天變災異更名曰靈臺亢倉子齊太子坐清臺之上宋書孝武大明六年八月己丑置清臺令繡斧馳驅茂應一陽之動恭惟某官清標範俗雅度鎮浮望蓬萊之雲已書五色郊祀志蓬萊方丈瀛洲此三神山者其傳在渤海中未至望之如雲周禮保章氏以五雲之物辨吉凶易通卦驗冬至初陽雲出箕如樹木之狀左傳凡分至啟閉必書雲物杜詩雲近蓬萊常五色吹孤竹之管即造九階周禮靁鼔靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之鄭元注孤竹竹特生者説文階陛也廣韻級也賈誼傳陛九級上某濫綴朝紳阻陪賀履驗丈三尺餘之日晷既麗牽牛見前列五六百之火城更觀仗馬國史補元日冬至立仗百官皆備珂傘列燭有至五六百炬謂之火城有堂火城宰相火城將至則衆火皆撲滅以避宰相代回江東葉提刑簣魯雲紀瑞兵書曰韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬衛雲如犬周雲如輪秦雲如行人魏雲如䑕齊雲如絳衣越雲如龍蜀雲如囷左傳黄帝氏以雲紀故為雲師而雲名注黄帝受命有雲瑞故以雲紀事堯日迎長史記帝堯者其仁如天其智如神就之如日望之如雲曹植表冬至獻履貢襪所以迎福踐長黄鍾倡應於六雄繡斧光華於四牡恭惟某官氣養剛大徳合中和慷慨澄清節凛氷霜之操將明欽恤復見天地之心並見前茂對令辰易天地雷行物與无妄先王以茂對時育萬物注茂盛也對當也言先王以此无妄盛事當其无妄之時育養萬物也宜裒繁祉詩綏我睂夀介以繁祉箋繁多也安助以夀考多與福禄某才如線短心亦灰寒對五更三㸃之御床無由陪賀杜詩去歳兹辰捧御床五更三㸃入鵷行布一札十行於方國佇見遄歸後漢循吏傳序其以手迹賜方國者皆一札十行細書成文詩仲山甫徂齊式遄其歸賀提刑提舉律動黄鍾倡六雄而叶氣漢律厯志黄帝使伶倫取竹之解谷斷兩節間而吹之以為黄鍾之宫制十二筩以聽鳳之鳴其雄鳴為六雌鳴亦六比黄鍾之宫而皆可以生之是為律本風生畫簜歌四牡之有功趙廣漢傳見事風生無所回避傅𤣥傳貴遊懾伏臺閣生風周禮以英簜輔之杜子春云簜當為帑謂以函器盛此節或曰英簜畫函疏以英華有畫義故曰畫函詩序四牡勞使臣之來也有功而見知則説矣其在皇皇之華宜膺簡簡之福詩降福簡簡恭惟某官徳潜剛克功播民和星駕朝天又見一陽之復詩星言夙駕雲書占歳載祈五糓之豐左傳凡分至啟閉必書雲物易通卦驗冬至之日見雲送迎從下嚮來歳大美人民和不疾疫無雲送迎徳薄歳惡故其雲赤者旱黒者水白者為兵黄者有土功諸從日氣送迎其効也諒策持斧繡衣之庸即詠鳴玉紫宸之句杜詩杖藜雪後臨丹壑鳴玉朝來散紫宸某心如灰冷材乏線長使者汝容固足回春於黍谷東坡詩勸農使者不汝容因君作詩先自効丞哉余負行歸曝日於茅簷韓文丞哉丞哉余不負丞而丞負余列子宋國有田夫嘗衣黂過冬暨春東作自曝於日美之不知天下之有廣厦隩室綿纊狐貉謂其妻曰負日之暄人莫知者以獻吾君必獲重賞歐文内制集序凉竹簟之暑風曝茅簷之冬日韓詩暉暉簷日暖且鮮陳後山詩暮年五斗得千里有愧寒簷背朝日賀趙提舉甲申甲申為寧宗嘉定十七年魯雲書至實呈紛郁之祥史記若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂卿雲趙日御冬益顯光華之遠左傳趙衰冬日之日也趙盾夏日之日也錫公純嘏詩天錫公純嘏眉夀保魯箋純大也受福曰嘏乂我烝民尚書烝民乃粒萬邦作乂恭惟某官徳配陽休氣排冬凛舊游天禄飽看芸草之芳漢書天禄石渠顔師古曰三輔故事天禄石渠並在未央大殿北以藏秘書漢宮閣疏天禄麒麟蕭何造以藏秘書處賢才西都賦天禄石渠典籍之府西京賦天禄石渠校文之處東京賦内有天禄宣明揚雄傳校書天禄閣上靈帝紀注天禄獸也今鄧州南陽縣北有宗資碑旁有二獸鐫其膞一曰天禄一曰辟邪據此則並獸名也漢有天禄閣亦因獸立名月令仲冬之月芸始生注芸香草也著於衣書可以辟蠧漢種之於蘭臺石室藏書之府故秘書省謂之芸局陳子昻集持三寸筆入芸香之閣爾雅翼云老子云夫物芸芸各歸其根芸當一陽初起復卦之時于是而生此則歸根復命取之于芸洛陽宫殿簿云顯陽徽音含章殿前各植芸晉宫閣名曰太極殿前芸香四畦式乾殿前芸香八畦乃知九畹百畮非虛語也今使江南尚作梅花之寄見前驗刺繡五紋之永杜詩刺繡五紋添弱線知衮衣九罭之歸詩九罭之魚鱒魴我覯之子衮衣繡裳鴻飛遵渚公歸無所於女信處某材乏線長心尤灰冷負暄炙背詎敢輸􅅵畆之忠嵇康與山濤絶交書野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣餘見上條安性掩身尚或備軒輶之訪月令仲冬之月君子齋戒處必掩身身欲寧去聲色禁嗜慾安形性事欲靜以待隂陽之所定風俗通周秦常以歳八月遣軒輶之使採異代方言還奏之西京雜記揚子雲好事常懷鉛提槧從諸計吏訪殊方絶域四方之語以為裨補軒輶所載亦洪意也賀林提舉清臺課厯肇新三統之元説文課試也増韻計也程也律厯志雜候上林清臺課厯疎宻繡節觀風順應一陽之動王莽傳遣使者分行天下覽觀風俗恭惟某官剛大養氣豈弟近民詩豈弟君子史記魯世家平易近民民必歸之斂散得宜粟若源泉之混食貨志民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重凡輕重斂散之以時則準平宋職官志提舉常平司操常平斂散之法申嚴兌役之政令治荒修廢賑民艱阨職源提舉常平司掌常平義倉免役市易坊塲河渡水利之法因民之有無歳之豐凶而斂散賑濟之周益公詩斂散新陳倚繡衣荀子財貨渾渾如泉源汸汸如河海暴暴如丘山中和誕布黍回寒谷之温王褎傳使褎作中和樂職宣布詩師古曰中和者言政治和平也宣布者風化普洽無所不被諒對休辰益裒純嘏某適拘分閫良阻造門視履考祥願觀不遠之復並見前仁民愛物無忘自養之頥易觀頥觀其所養也自求口實觀其自養也賀趙提舉汝讜按緹候氣律已兆於六雄後漢律厯志候氣之法為室三重户閉塗釁必周宻布緹縵室中以木為案加律其上案厯而候之氣至者灰去餘詳見前衣繡觀風功益高於四牡道随剛長徳與福崇恭惟某官清湛氷壺和鍾玉琯琯或作管説文古者琯以玉舜時西王母來獻白玉之琯零陵文學姓奚於泠道舜祠下得笙玉琯以玉作音故神人以和鳳凰來儀趙日可愛既開南嶽之雲左傳酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也注冬日可愛夏日可畏豳雨其濛更激西江之水詩我來自東零雨其濛莊子激西江之水而迎子可乎詳見前慨然攬轡行矣賜環栁詩賜環留逸響某濫長十連禮記十國為連連有帥又逄亞歳江湖兩地幸再同君子之僚韓文留守無事多君子僚原隰五章請重拜使臣之善左傳四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜賀王提舉與權身為國史自當書辛日之雲杜氏左傳序身為國史躬覽載籍必廣記而備言之左傳僖公五年正月辛亥朔日南至公登臺以望而書禮也凡分至啟閉必書雲物為備故也君遣使臣顧使餐丁年之雪詩序皇皇者華君遣使臣也李陵答蘇武書丁年奉使皓首而歸梁書王僧孺傳丁年蓄積與此銷亡盧照隣詩丁年遊蜀道斑鬢向長安王荆公詩丁年結客盛遊從宛洛氊車處處逄蘇武傳幽武置大窖中絶不飲食天雨雪武卧齧雪與氊毛并咽之有功則説詩序有功而見知則悦矣何福不臻恭惟某官致孝卧氷董仲舒傳舜業業日致其孝王祥傳性至孝繼母朱氏常欲生魚時天寒氷凍祥解衣將剖氷求之氷忽自解雙魚躍出移忠叱馭孝經君子之事親孝故忠可移於君叱馭王尊事屢見生芸挺荔厭夜直於承明嚴助傳厭承明之廬注承明廬在石渠閣外直宿所止曰廬舒栁放梅甘曉行於湘水見前花甲方周於六十吕氏春秋大撓作甲子唐李淳風有六十花甲子歌椿齡正衍於八千見前某雌伏負丞後漢趙温字子柔為京兆郡丞歎曰丈夫當雄飛安能雌伏遂棄官去鳳鳴倚嶽杜詩佇鳴南嶽鳳欲化北溟鯤繡衣持斧儻憐同三㸃之鵷行見前黄鍾為宫尚或收一聲之牛鐸律厯志五聲之本生於黄鍾之律九寸為宫或損或益以定商角徴羽晉書荀朂傳初朂於路逄趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者山谷詩牛鐸調與黄鍾同代回浙西王提舉棐和叔正冬尚書申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬伯趙司至儀圖道長之慶允屬陽休之賢伏惟某官清徹氷壺和鍾玉琯送之禮樂不離尺五之天任以公卿即近丈三之日俱見前某無由面賀例辱手箋烹魚得書莫報五雲之體韋陟傳所書陟字若五朶雲時人慕之號郇公五雲體周禮保章氏以五雲之物辨吉凶水旱降豐荒之祲象雲有五色以分至之日眡之拂龜端策但占七日之爻見前代回福建陳提舉鑄日官候氣書嚴魯觀之登前律厯志春秋冬十月朔日有食之傳曰不書日官失之也天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官於朝言告朔也又云主厯使者鮮于妄人請與治厯大司農麻光等雜候日月晦朔弦望八節二十四氣星使觀風福等閩山之厚閩山一名烏石山形如龜在福州西南一里恭惟某官器姿凝遠業履端宏平糴有方粟若源泉之混亷車所部黍回寒谷之温宜對亨辰茂綏純嘏某贅員簮筆辱賜函牋視履考祥願觀不遠之復裕民足國無忘自養之頥俱見前代回周馬帥虎星轉璇璣一陽既復見前霜華玉帳百福交升隋煬帝冬至受朝詩霜華凈朱庭皎日光纓珮詩是生后稷降之百福又神嗜飲食卜爾百福隋音樂志百福四象初萬夀三元始又百福具膺嘉祥允洎靈威以降百福來綏又卜倫以具百福斯滋乂上靈鍾百福羣臣歸萬年餘見前恭惟某官肅振戎昭左傳戎昭果毅以聽之之謂禮恪共武服詩有嚴有翼共武之服共武之服以定王國馬騰士飽方夸洪鼎之扛韓文士飽而歌馬騰於槽王充論衡力能扛鴻鼎揭華旗鳳應律諧氣恊黄鍾之動佇寧邊鑰入總中權見前某莫慶踐長先勤委重韓文若以義請而强委重焉仰觀雲祲既符登觀之書登觀之觀去聲歸扈日營即見築壇之拜晉明帝紀王敦將舉兵内向帝宻知之乃乘巴滇駿馬㣲行至于湖隂察敦營壘而出有軍士疑帝非常人又敦正晝寢夢日環其城驚曰此必黄鬚鮮卑奴來也使五騎物色追帝帝已馳去劉夢得詩望夫人化石夢帝日環營賀薛太守師旦甲申是為寧宗嘉定十七年梅亭時年五十一歳籥在申驗乞漿之踰願説文籥本作龠樂之竹管三孔以和衆聲也律厯志龠者黄鍾律之實也躍㣲動氣而生物也釋名籥躍也氣躍而出古者取卯地之竹以為籥春分之音萬物振躍而出也蘇文屢更歳籥袁子正論太歳在酉乞漿得酒斗柄挿子盍挹酒以迎年韓詩元和庚寅斗挿子月十四日三更中詩維北有斗不可以挹酒漿封禪書黄帝時為五城十二樓以候神人於執期命曰迎年時維二千石之良循吏傳與我共此者其唯良二千石乎敷錫十萬户之福尚書皇建其有極斂時五福用敷錫厥庶民新唐書陳子昻傳一州得才刺史十萬户頼其福得不才刺史十萬户受其困國家興衰在此職也恭惟某官功參隂隲徳配陽休襦袴温然適應重緹之煖絲綸近只遹随一綫之添諒經伯趙司至之餘並見前即有薛侯來朝之命春秋隠公十有一年春滕侯薛侯來朝某身棲棠䕃心委葭灰見前陪五更三㸃之鵷行敢論交於結綬蕭育傳少與陳咸朱愽為友著聞當世往者有王陽貢禹故長安語曰蕭朱結綬王貢彈冠言其相薦達也依一寸四分之牛晷或委照於受廛尚書考靈曜冬至日月五緯俱起牽牛初劉向洪範傳冬至景一丈三尺一寸四分賀全州趙守必愿按本傳必愿差充兩浙運使主管文字再考特差充提舉安邊所主管文字差知全州陛辭奏乞下道江二州訪周惇頥之後餘見前魯雲必書暮映衡山之月趙日可愛曉行湘水之春全州有湘春樓在郡治西特惟大雅之英景十三王傳賛夫唯大雅卓爾不羣敘傳禮樂是修為漢宗英茂對細書之札恭惟某官道随剛長徳配陽休字民之仁温若重緹之律噓物以氣煖然五袴之歌諒觀荔挺而芸生益慶竹苞而松茂某襪材綫短並見前泥軾氷寒黄覇傳别駕主簿車緹油屏泥于軾前以章有徳三夀作朋請效魯頌萬千之祝詩三夀作朋如岡如陵萬有千歳眉夀無有害注三夀三卿也國之三夀考之卿與作朋友七日來復幸觀羲爻六二之辭易復六二休復吉象曰休復之吉以下仁也賀寶慶趙守善湛寶慶已見魯雲必書將召和於嶰竹見前趙日可愛况小憩於甘棠詩蔽芾甘棠勿翦勿敗召伯所憩毛傳憩息也維時循良茂介福禄恭惟某官以佳公子史記平原君翩翩濁世之佳公子也繼古諸侯王隠晉書郡守之權雖輕猶御千里比之於古列國之君也白集殷彪制今之郡守古侯伯也服政龍藩驗龍杓之回次寶慶府本唐邵州宋乾徳間陞為中州以理宗潜邸陞寶慶府故曰龍藩天文志杓攜龍角注杓斗柄也龍角東方宿也月令日窮于次月窮于紀星回于天潜心鴻寶佇鴻羽之來儀劉向傳淮南有枕中鴻寶苑秘書師古曰鴻寶苑秘書並道術篇名易鴻漸于陸其羽可用為儀吉履芸生荔挺之辰萃松茂竹苞之慶即歸北闕遂冠南班某半刺灰寒寸材綫短並見前空睆牽牛之景詩睆彼牽牛不以服箱注睆明星貌河鼓謂之牽牛了無展驥之能楚波有餘自是回春於燕谷並見前魯酒甚薄不堪賦雪於梁園莊子魯酒薄而邯鄲圍音義曰楚宣王朝諸侯魯恭公後至而酒薄宣王怒恭公曰我周公之𦙍勲在王室送酒已失禮方責其薄無乃太甚遂不辭而還宣王乃發兵與齊攻魯梁惠王常欲擊趙而畏楚楚以魯為事故梁得圍邯鄲言事相因也一説古者魯人不能為酒惟中山之人善釀美者醉人至千日魯人求其方不得有仕于中山者主酒家取其糟歸以魯酒漬之謂人曰中山之酒也一日中山之酒主來索而飲之吐而笑曰此余之糟液也奚其酒謝惠連雪賦歳將暮時既昏寒風積愁雲繁梁王不悦遊于兔園乃置㫖酒命賔友召鄒生延枚叟相如末至居客之右王乃授簡于司馬大夫曰抽子秘思騁子妍辭侔色揣稱為寡人賦之代回全州趙守必愿懷五更三㸃之鴛行舊同班於呉下傅咸感别賦序友人魯虎叔雅量宏濟秉心邃遠余少與之遊長情相親相友愛如同生生後遷太子洗馬俄而謬蒙朝私猥忝兹職雖懼不稱而喜與此子同班共事江表傳非復呉下阿蒙驗一寸四分之牛晷今假䕃於黔中蘇秦傳秦要楚欲得黔中地白起傳取楚定巫黔中郡西夷傳略巴蜀黔中以西王忠嗣傳不者黔中上佐耳方圖修獻履之辭已先拜鳴謙之寵故情未整弱念易盈韓詩強懷張不滿弱念缺易盈恭惟某官禮樂宗英侯王相種陳渉傳侯王將相寧有種乎决科唐殿肯吟麗日之煌煌摭言李程貞元中試日五色賦先牓落矣初出試楊於陵見其賦藁破曰徳動天鑒祥開日華於陵覽之謂程曰公今須作狀元翌日雜文無名於陵深不平擕之以詣主文遂命取程所納面對不差一字主文因擢為狀元前牓不復放矣程後出大梁間浩虛舟應宏辭復試此題慮浩愈於已專馳一介取既至將啟緘尚有憂色及觀浩破題云麗日煌煌中含瑞光程喜曰李程在裏宅牧湘源聊和舞風之湑湑全州漢屬長沙國兆陽縣屬焉即今湘源晉高祖時改永州之湘源縣為清源縣置全州湑冩與切詩其葉湑湑毛傳枝葉不相比也詩詁云猶沃沃也栁文湘源二妃廟碑銘南風湑湑湘水如舞將子無讙神聽鐘鼔對此重緹之候藹然五袴之歌魯雲必書翻手足看於短至杜詩翻手作雲覆手雨月令仲冬之月日短至趙日可愛舉頭即近於長安晉明帝紀元帝問帝曰汝謂日與長安孰遠對曰長安近不聞人從日邊來明日宴羣僚又問之對曰日近舉頭見日不見長安由是益竒之某芘徳㣲茫杜牧詩陽徳比君子初生甚㣲茫甘心半刺左傳請受而甘心焉史記世主莫不甘心焉地爐煨芋已漸參南嶽之禪高僧傳唐李泌與明瓉禪師遊禪徒謂之懶殘者泌嘗於衡岳寺讀書察其所為謂懶殘經音先悽愴而後喜悦必謫墮之人時將去矣中夜潜往謁焉懶殘命坐發火取芋以啖之曰勿多言領取十年宰相東坡詩他年記此味芋火對懶殘詳見前山意放梅儻尚憶西湖之飲杜詩山意衝寒欲放梅西湖孤山有梅代回婺州王守補之婺州已見鳳筩候氣律中黄鍾燕寢凝香衞森畵㦸届新陽之漸進知純嘏之鼎來俱見前恭惟某官平易近民史記政不簡不易民不有近平易近民民必歸之中和布政温其五袴不惟田里之安見前清在一盂可作京師之潤龎參傳為漢陽太守郡人任棠有竒節參到先候之棠不與言但以水一盂置户屛前參思其㣲意曰水者欲吾清也郭伋傳河潤九里冀京師并蒙福也俱詳見前履長之後晉接何疑易晉康侯用錫馬蕃庶晝日三接注以訟受服則終朝三褫柔進受寵則晝日三接某濫綴周行行寒剛切傳列也詩寘彼周行箋云周之列位謂朝廷臣也左傳君子謂楚於是乎能官人詩云嗟我懷人寘彼周行能官人也主及公侯伯子男甸采衛大夫各居其列所謂周行也又逄趙至左傳伯趙氏司至者也詳見前㫖且多多且㫖莫捧葡萄之觴博物志西域有葡萄酒積年不敗彼俗傳云可至十年欲飲之醉彌日乃解魏文帝詔朝臣曰且設蒲萄解酒宿酲掩露而食甘而不䬼酸而不脆冷而不寒味長汁多除煩解䬼又釀以為酒甘于麴米善醉而易醒道之固以流涎咽唾况親飲之金人元好問葡萄酒賦序云劉光甫言安邑多葡萄而不知有釀酒法少日嘗摘其實并米炊之釀雖成而古人所謂甘而不䬼冷而不寒者失之矣貞祐中隣里一民家避㓂自山中歸見竹器所貯葡萄在空盎上枝蔕已乾而汁流盎中薫然有酒氣飲之良酒也盖久而腐敗自然成酒不傳之秘于是而發元云嘗見還自西域者言大食人絞葡萄漿理之未㡬成酒愈久愈佳其説與劉合又云世無此酒久矣得之數百年之後而證數萬里之遠物顯晦有時非偶然者代回慶元韓守元禮慶元已見堯厯正冬魯臺書至其在惟良之牧宜膺滋至之休見前恭惟某官明氷其相富嘉謨明氷篇明氷時出御至尊又明氷畢賦周在位相思將切質也詩金玉其相愛日之政左傳注冬日可愛民無遺便已歌襦袴之功韓文凡為民去害興利若嗜慾居三年於江西八州無遺便帝有恩言即拜絲綸之命諒對復來之慶即膺晉接之榮某濫次近班無從旅賀猥勤謙徳特畀問緘餘同王提舉條代回吉州鄭守寅吉州已見天復一陽氣陶萬類其在惟良之牧宜膺可致之祥見前恭惟某官清徳猶氷盛名如晝白鷺青原之山水暫屈外庸白鷺洲在吉州東贑江中有洲曰白鷺其長數里徐俯江上野望詩金陵與廬江俱有白鷺洲相望萬里江中同二水流青原山在吉州東南十五里中有駱駝峯鷓鴣嶺勢甚喬聳王廷珪游青原詩異時黄魯直嘗賦青原詩至今青原山名與星斗垂黄龍五鳳之詔書即膺表選黄龍五鳳漢宣帝年號師古曰黄龍元年二月黄龍見廣漢郡故改年應劭曰鳳皇五至因以改元循吏傳序二千石有治理效輒以璽書勉厲增秩賜金或爵至關内侯公卿缺則選諸所表以次用之㑹從亞歳入覲書雲某濫綴紫囊阻趣畫㦸先辱飛緘之祝惟深藏襲之榮俱見前代回信陽趙守善張信陽軍古申國地秦屬南陽郡漢立平氏縣𨽻荆州之南陽縣魏分置義陽郡宋文帝於北義陽復立司州又置宋安郡梁改北司州尋罷北宋又改郢州周武帝改申州隋煬帝改為義州尋為義陽郡唐立申州改為義陽郡復為申州即宋軍治宋以戸口少降為義陽軍改信陽軍周圭測日魯觀書雲見前諒惟牧御之賢冦恂傳帝南定河内鄧禹曰冦恂文武備足有牧人御衆之才乃拜恂河内太守宜介康寧之福尚書九五福一曰夀二曰富三曰康寧恭惟某官秉姿剛大賦政中和洞明固圉之方圉語許切爾雅垂也注守圉在外垂也左傳聊以固吾圉也疏拒邊垂也茂著扞城之績扞亦作干詩公侯干城爾雅干扞也干盾自蔽扞也左傳諸侯所以扞城其民也若時道長行有詔追某濫綴荷囊阻持椒斚謹馮手筆略布𠂻忱並見前代回諸州璿杓建子觀仍驗於五雲綺甸選侯復聿來於七日並見前仁賢所茇説文茇舍也詩召伯所茇茀禄其穰茀福也詩茀禄爾康矣恭惟某官徳與時偕道随剛長絲綸近只祥催宫綫之添襦袴煖然聲恊律緹之應並見前諒對四分之鳳厯杜詩鳳厯軒轅紀趣歸三㸃之鴛行某百念灰寒寸材襪短並見前歸吾視諸故府漫見新陽左傳士彌平曰晉之從政者新子姑受功歸吾視諸故府蹇誰留兮中洲願膺表選屈原九歌君不行兮夷猶蹇誰留兮中洲代回紹興黃尚書由黄由長洲人舉進士第一累官刑部尚書兼直學士院侍御史張巖論其植偽黨遂奉祠嘉定間起為浙東安撫使仍官刑部尚書兼直學士院卒贈少師陽正於子厯嚴伯趙之司見前星拱乎辰光燦文昌之座天官書戴匡六星曰文昌宫晉天文志文昌六星在北斗魁前天之六府也後百官志尚書出納王命敷奏萬機斯乃文昌天府劉伯疏八座比於文昌二丞方於管轄後漢有六曹尚書并令僕二人謂之八座尚書魏凡五尚書二僕射并令為八座顔魯公詩尚書北斗尊宜從亞歳茂介新祺恭惟某官徳禀中和氣全剛大給扶鳴履早儀㗋舌之司南史朱脩之傳脚疾不堪獨行見特給扶侍袁憲傳表請解職不許尋給扶二人始安王遥光傳加侍中中書令給扶衡陽公諶傳轉南徐州刺史給扶王廣之傳徐侍中鎮軍將軍給扶武陵王􅁮傳給油絡車給扶二人韓文許國公神道碑上殿拜跪給扶贊元經體不治細㣲山谷詩殿内給扶鳴漢履螭頭簮筆見秦冠詩維仲山甫王之㗋舌李固傳陛下之有尚書猶天之有北斗也北斗為天之㗋舌尚書亦陛下之㗋舌均佚偃藩暫鎮股肱之郡王荆公集賜韓琦詔方均佚豫適此外虞漢書敘傳木偃息以藩魏兮師古曰木段干木也客居魏魏王敬而禮之過其廬未嘗不式也秦欲伐魏或諫曰魏君賢者是禮國人稱仁未可圖也秦遂止兵左思詠史詩吾希段干木偃息藩魏君梁書王僧孺傳偃息藩魏甘卧安郢宋子京與王相公書董琴順署雌閣偃藩季布傳河東吾股肱郡故特召君耳南至既書於魯史見前東歸宜詠於周詩詩我東曰歸我心西悲某才無綫長心亦灰冷紫宸朝散空驚獨老之形容載記符丕傳賛赤縣成蛇豕之墟紫宸遷鼃黽之穴少陵臘日詩縱酒欲謀良夜醉還家初散紫宸朝又冬至詩江上形容吾獨老天涯風俗自相親杖藜雪後臨丹壑鳴玉朝來散紫宸畫㦸晝森願謹凝香之寢衛見前代回廣徳余守嶧廣徳已見緹灰應律圭綫迎長諒畫㦸之凝香叶黄鍾而宣徳恭惟某官温恭為政平易近民善頌洋溢於内畿和氣周流於寒谷並見前兹一陽之既復諒百禄之交并詩受天百禄又百禄是荷又百禄是遒又百禄是總某偶綴朝參杜詩頗恠朝參懶白樂天詩時暑放朝參莫陪旅賀五雲下墜如瞻魯觀之書見前七日朋來㑹見潁川之璽黄霸傳天子以霸治行終長者下詔稱揚曰潁川太守霸宣布詔令百姓鄉化可謂賢人君子矣其賜爵關内侯秩中二千石代回台州常守建台州已見斗柄北攜天文志杓攜龍角注杓斗柄也攜連也日躔南至驗侯伯化行之美詩序鵲巢騶虞之徳諸侯之風也又美化行乎江漢之域又文王之化行乎汝墳之國應君子道長之休恭惟某官江漢把麾杜牧詩欲把一麾江海去樂游原上望昭陵京師蒙潤擁碧油之斾歛惠一州三朝志旌節唐天寶中置韜以碧油白樂天詩碧油幢引向東川韓文歛此大惠兮施于一州標赤城之雲載書五色赤城山在天台縣北六里一名燒山其上石壁皆如霞色望之如雉堞故名孫綽天台山賦赤城霞起以建標李詩天台隣四明華頂高百越門標赤城霞樓棲滄海月宜從榖旦見前即覲楓宸文選楓槐被宸注漢殿前多植楓某偶綴顔行嚴助傳執事之顔行文潁曰顔行猶鴈行在前行故曰顔也無從面慶頌魯侯之受祉益熾而昌詩魯侯燕喜既受多祉問顔子之為邦不遠而復繫辭顔氏之子其殆庶㡬乎易曰不遠復无祇悔代回平江李大諫大異平江已見黄鍾應律地回燕谷之春畫㦸香凝人詠蘇州之守見前宜從亞歳益介繁禧禧虛其切福也或作釐禮樂志媪神蕃釐師古曰釐讀作禧蕃多也禧福也恭惟某官以厭承明嚴助傳厭承明之廬而試馮翊蕭望之傳宣帝察望之經明持重論議有餘材任宰相欲詳試其政事復以為左馮翊獻履貢襪益深旒扆之思今袴昔襦聊借京師之潤布緹宻驗召綍顯頒並見前某縻身於朝莫面以賀靈臺龡竹已黙應於殿中後律厯志截管為律吹以考聲列以物氣道之本也殿中候用玉律十二惟二至乃候靈臺候用竹律六十候日如其厯山意放梅更相期於鼎實易鼎有實注以陽之質處鼎之中有實者也又鼎黄耳中以為實也注以中為實所受不妄也潘岳詩王生和鼎實山谷詩古來和鼎實此物升廟廊代回處州林守孔昭處州已見化日迎長卿雲紀瑞見前黄鍾動地叶陽律六鳳之鳴律厯志十一月乾之初九陽氣伏於地下始著為一萬物萌動鍾于太隂故黄鍾為天統紅斾行春驗人生五馬之貴見前恭惟某官剛全天運和恊時中言從古括之邦處州隋改括州以括蒼山得名暫布甘棠之教詩序甘棠美召伯也召伯之教明於南國三重緹縵既觀葭律之浮一札絲綸即趣楓宸之侍某無由旅賀猥辱謙施問顔子之為邦不逺而復願魯侯之受祉俾熾而昌俱見前代回常州王守遇常州已見氣動黄鍾潛應一陽之復香凝畫㦸孰如千里之常宜對休辰茂膺蕃祉並見前恭惟某官心焉禹稷政則龔黄東坡詩龔黄側畔難言政羅趙前頭且眩書似聞十萬户之民各安汝止尚書安汝止此借用咸賴二千石之福以莫不増詩如川之方至以莫不増緹琯灰浮絲綸鼎至某末由獻履莫獲稱觴山意放梅試問和羮之信靈臺龡竹盡同寒谷之温俱見前代回建寧傅大諫伯成建寧已見魯臺觀象肇新五物之書周禮保章氏以五雲之物辨吉凶水旱降豐荒之祲注至分觀雲色青為蟲白為䘮赤為兵荒黒為水黄為豐漢殿陳儀爰合八能之奏見前代回大理趙少卿條惟良作牧與國同休恭惟某官節凛氷霜氣塞天地一麾出守績已茂於循良千里見王道豈忘於仁義當陽徳彚進之始非君子道長而何宜對熈辰茂膺純嘏並見前某無由稱慶輒致頌言攜角斗杓厯已開於周正歳華紀麗冬至節次周正餘見前植鰭箕尾夢即兆於商巖鰭渠伊切魚脊上骨也禮記疏夏時陽氣上在魚脊故右鰭几陽氣所在之處肥美通作鬐荀子非相篇傅説之狀身如植鰭言如魚鬐之植立也楊倞注云如魚之立誤矣莊子傅説相武丁奄有天下乗東維騎箕尾而比于列星注傅説星精也而傅説一星在箕尾上然箕尾則是二十八宿之數維持東方故言乗東維騎箕尾而與角亢等星比並行故云比于列星尚書説命恭黙思道夢帝賚予良弼乃審厥象俾以形旁求于天下説築傅巖之野惟肖代回慶元程守凖慶元已見鳳籥寸全中黄鍾之律籥説文本作龠樂之竹管律厯志五聲之本生於黄鍾之律九寸為宫黄帝使伶倫取竹之解谷斷兩節間而吹之以為黄鍾之宫制十二筩以聽鳳之鳴比黄鍾之宫而皆可以生之是為律本又三統相通故黄鍾林鍾太簇律皆長全寸而亡餘分也虎符分渥凝畫㦸之香見前履此休辰宜其遐福恭惟某官氣全剛大徳禀中和聊卧治於潜藩汲黯傳吾徒得君重卧而治之宋以明州為奉化郡建隆三年改奉化軍慶元元年以潜藩陞慶元府迄坐寧於瀚海瀚侯旰切北海名初學記北海大海之别有瀚海漢書漢使驃騎將軍霍去病北伐單于至瀚海而還六宫一綫添樂國之棠隂歳時記晉魏間宫中以紅線量日影冬至後日添長一線雜録唐宫中以女功揆日之長短冬至後比常日増一線之功互見前五緯連珠接故家之樞柄律厯志武帝元封元年十一月甲子朔旦冬至五星如連珠應劭曰七曜皆㑹牽牛何天之寵何或作荷詩荷天之寵敷奏其勇不日而還某濫司秋雲左傳黄帝雲師雲名黄帝受命雲瑞故以雲紀官秋官為白雲莫捧春酒詩為此春酒以介眉夀葭浮六琯足知君子之亨杜詩吹葭六琯動飛灰易復亨剛反麥熟兩岐請副輿人之禱張堪傳堪為漁陽太守百姓歌曰桑無附枝麥秀兩岐輿衆也左傳晉侯聽輿人之謀又輿人之誦注輿衆也代回湖州魏守大中湖州已見杓攜龍而建子象自天旋見前筩吹鳳以及辰陽從地復律厯志十一月乾之初九陽氣伏于地下始著為一易雷在地中復諸侯之應百福是宜恭惟某官坐分左符文帝紀初與郡守為銅虎符師古曰與郡守為符者謂各分其半右留京師左以與之東坡詩横空好在脩眉色頭白猶堪乞左符卧治右翊地理志左馮翊右扶風此借用耳三微統正知顧渚之春回顧渚在長興西北即水口鎮唐置貢茶院於此張元之銘云呉王夫差顧其渚次平衍可為都邑故名餘見前一綫影舒覺長安之日近道随剛長福與時升某兹辱朋緘獸二為友貝二為朋詩朋酒斯饗毛傳兩尊曰朋又古者貨貝五貝為朋無由旅賀葭莩六琯是為神策朔復朔之祥封禪書公孫卿曰今年得寶鼎其冬辛巳朔旦冬至與黄帝時等卿有札書曰黄帝得寶鼎宛胊問於鬼臾區鬼臾區對曰黄帝得寶鼎神策是歳己酉朔旦冬至得天之紀終而復始於是黄帝迎日推策後率二十歳復朔旦冬至麥熟兩岐莫陪太守樂其樂之宴歐陽永叔醉翁亭記臨溪而漁溪深而魚肥釀泉為酒泉香而酒冽山殽野蔌雜然而陳前者太守宴也宴酣之樂非絲非竹射者中奕者勝觥籌交錯起坐而諠譁者衆賔懽也蒼顔白髪頽乎其間者太守醉也已而夕陽在山人影散亂太守歸而賔客從也樹林隂翳鳴聲上下游人去而禽鳥樂也然而禽鳥知山林之樂而不知人之樂人知從太守游而樂而不知太守之樂其樂也代回嘉興林守良嘉興已見鳳厯起黄鍾之籥地氣上騰月令孟春之月天氣下降地氣上騰燕寢凝畫㦸之香天休滋至尚書天休滋至惟時二人弗戡恭惟某官謹身率下循吏傳序皆謹身帥先居以廉平善政致和魯觀雲開接呉王之檇李檇音醉春秋定公十有四年五月於越敗呉於檇李地理志㑹稽郡由拳注柴辟故就李鄉呉越戰地應劭曰古之檇李也今嘉興西南四十五里有檇李城周畿日永憩召伯之甘棠緹氣既温綸音必渙易渙九五渙汗其大號注九五處尊履正在號令之中能布號令以渙險阨也某濫塵豹尾後漢書輿服志最後一車懸豹尾豹尾以前比省中小學漢書篇曰豹尾過後罷屯解圍胡廣曰施於道路豹尾之内為省中故須過後屯圍乃得解皆所以戒不虞也莫捧兕觥見前代回程監丞條諧秬黍之和既知谷煖律厯志度者分寸尺丈引也所以度長短也本起于黄鍾之長以子榖秬黍中者一黍之廣度之師古曰子榖猶言榖子秬即黑黍中者不大不小也作嘉禾之命即聽庭揚書序唐叔得禾異畆同穎獻諸天子王命歸周公于東作歸禾呉志黄龍五年㑹稽言嘉禾生改由拳為嘉禾縣易夬揚于王庭孚號有厲代回通州李守直養通州秦屬九江郡漢屬臨淮郡東漢屬廣陵郡隋初郡廢屬江都郡唐屬揚州南唐李氏於海陵之東境置靜海都鎮制置院周世宗建靜海軍為通州宋因之改崇川尋復今屬揚州府初陽見天地之心三微既兆見三十九巻回林嘉興條太守為吏民之本百禄是遒循吏傳序太守吏民之本也數變易則下不安詩百禄是遒毛傳聚也恭惟某官和而不流剛而無虐尚書剛而無虐簡而無傲森凝畫㦸共稱二千石之良見前顧瞻白雲遥上九十親之夀狄仁傑傳授幷州法軍參軍親在河陽登太行山及顧見白雲孤飛謂左右曰吾親舍其下瞻悵久之雲移乃得去勞謙有吉易勞謙君子有終吉注上承下接勞謙匪懈視履考祥見前某方具賀緘先承慶牘五袴既煖共瞻刺史之天趙嘏詩尋花偶坐將軍樹飲水方重刺史天東坡詩一見刺史天稍忘獄吏尊一線已添請近長安之日見前代回嚴州胡守楶嚴州已見葭管灰浮肇正三㣲之統棠隂日永况親千里之畿百禄是遒諸侯之應並見前恭惟某官敷華緯國班彪傳敷文華以緯國典守賤薄而無悶容斂惠專城韓文斂此大惠兮施于一州李詩虎符合專城嶰谷冬寒既恊鳳鳴之律桐江春滿足凝燕寢之香桐江在嚴州許渾詩潮去潮來洲渚春山花如綵草如茵嚴陵臺下桐江水解釣鱸魚有㡬人雲物一新左傳分至啟閉必書雲物天休滋至某未由旅賀猥辱謙施氣有推移願體璇璣之運並見前民無愁歎佇調玉燭之和爾雅四時和謂之玉燭注道光照疏道言也言四時和氣温潤明照故曰玉燭李廵云人君徳美如玉而明若燭代回婺州趙守善下婺州已見月臨周正肇書魯觀之雲見前天胙漢宗佇賦梁園之雪胙存故切福之使社稷之長曰胙揚子天胙明徳周語天地所胙福也又胙以天下禄也宜裒茨福詩君子至止福禄如茨茨音慈以茅覆屋曰茨言宻比也以厚桐封史記唐叔虞者成王弟成王與叔虞戲削桐葉為珪以封叔虞史佚因言請擇日立叔虞成王曰與之戲耳史佚曰天子無戲言於是遂封叔虞於唐後為晉恭惟某官徳禀忱恂尚書廸知忱恂于九徳之行才無驕吝天子有命俾司玉葉之盟左傳公子公族之枝葉也故公族謂之金枝玉葉古今注黄帝與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上价人維藩暫試金華之牧詩价人維藩大師維垣玉臺新詠序云金星與婺女爭華故婺州曰金華神仙傳皇初平丹溪人也年十五家使牧羊有道士見其良謹將至金華山石室中其兄初起行山尋索道士曰金華山中有一牧羊兒是卿弟非疑此借用不遠之復未占已孚某濫綴秋官阻陪夏賀淮南子大厦成而燕雀相賀獻履貢襪既書南至之祥衮衣繡裳願副東歸之詠俱見前代回邵武周知軍章邵武本漢冶縣地東漢為東侯官縣地屬㑹稽郡三國呉於此置邵武縣屬建安郡晉改縣曰邵武隋平陳後縣廢尋置屬撫州大業初屬臨川郡唐改屬建州宋以縣置邵武軍又領歸化建寧光澤三縣屬福建路維斗建子既復一陽受地視侯懋綏百禄恭惟某官中和布政撫字勞心今五袴之載歌紛迎騎竹並見前添一線之徙䕃聊復憩棠新唐書桑䕃未徙而大功立諒當凝燕之香丕介龎鴻之祉某未遑旅賀先辱謙施鳴鳳召和想二天之獨有並見前拂龜端策驗七日之朋來易復朋來无咎反復其道七日來復王弼注所謂陽也陽氣始剥盡至來復時凡七日代回無為趙知軍善湘無為軍古巢伯國秦為九江郡漢高帝更為淮南國以黥布為王景帝為廬江郡統縣十一而居巢臨湖襄安𨽻焉即今無為之地也曹操屯軍居巢後屬呉周瑜為居巢長梁屬南豫州又屬合州今屬廬州唐武徳以居巢縣為巢州宋太平興國間析舊廬州廬江縣為巢縣以無為鎮為無為軍又耆舊相傳云無為軍本號城口鎮𨽻巢縣淳化中鎮居土豪侯仁信等進狀乞創軍壘時僣偽悉平思與天下安於無事因取無為而治之意以名之熈寧間又析巢縣廬陵之六鄉置無為縣至本朝以縣省入屬廬州府宋史趙善湘字清臣濮安懿王五世孫慶元二年進士調金壇縣丞知餘姚縣通判婺州提轄文思院出判無為軍兼淮南轉運判官淮西提㸃刑獄歴知常湖和三州遷知大宗正丞兼權户部郎官改知秘閣淮南轉運判官兼淮西提舉常平兼知無為軍進直徽猷閣主管淮南制置司公事兼知廬州兼本路安撫仍兼轉運判官提舉常平進直寶文閣以平固始㓂功進直龍圖閣知鎮江府拜大理少卿進右文殿修撰知鎮江府封祥符縣男進集英殿修撰拜大理卿權刑部侍郎進寶章閣待制沿海制置使兼知建康府江東安撫使進封子以剏防江軍寧淮軍及平楚州畔冦等功進龍圖閣待制煥章閣直學士進封伯以李全犯淮東進煥文閣學士江淮制置使命專征討許便宜從事進封侯及戮全露布上聞進兵部尚書以平閩冦功轉江淮安撫制置使以復泰州淮安州鹽城淮隂縣四城功進端眀殿學士仍升任留守以復旴􅇇軍泗夀二州功進資政殿學士進大學士提舉洞霄宫封天水郡公卒贈少師所著有周易約説周易或問周易續問學易補過洪範統論中庸約説大學解論語大意孟子解老子解春秋三傳通議詩詞雜著地雷既復易雷在地中復疏雷是動物復卦以動息為主故曰雷在地中星昴初臨尚書日短星昴以正仲冬孔傳冬至之日昴白虎之中星七星並見州牧之政惟和尚書庶政惟和君子之道斯長易君子道長小人道消也恭惟某官名駒千里劉徳傳有智畧武帝謂之千里駒師古曰言若駿馬可致千里也年齒㓜少故謂之駒詳見前分雉列城雉通作埃城三堵也王肅云城高一丈曰堵三堵曰雉禮記坊記都城不過百雉注雉度名髙一丈長三丈春秋正義曰五版而堵五堵而雉堵四十尺雉二百尺公羊傳百雉而城注二萬尺周十一里三十二歩二尺高二雉公侯之制天子千雉高七雉伯七十雉高五雉子男五十雉高三雉胡氏曰雉飛不過二丈曰雉者取其飛之遠近為喻葉氏曰雉守死而不犯分有自衛之道故都城言雉淮水湯湯遠借藩維之重詩鍾鼓將將淮水湯湯無為軍宋𨽻淮南西路引詩斷章唐書忝備藩維李詩諸王若鸞虬肅穆列藩維東坡詩山河地襟帶軍鎮國藩維周原膴膴近觀還定之功詩周原膴膴堇荼如飴傳周原沮漆之間也膴膴美也箋廣平曰原周之原地在岐山之南膴膴然肥美詩序鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之宜對剛辰茂膺純嘏某無由陪賀兹辱飛緘憩甘棠之隂益舒樂日奏孤竹之管即聽鈞天俱見前代回寧國王守補之寧國已見登魯臺而書雲物載叶剛長易復利有攸往剛長也注往則小人道消也剛長當音上聲今叶平聲者古亦有之唐太宗周易詩云暉光日新照于四方小人勿用君子道長是也頌宣州之賢主人宜裒景貺韓文愈未嘗至宣州而樂頌其主人之賢者以其取人信之也廣韻景大也説文貺賜也恭惟某官氣鍾高厚徳備中和昔華貫之徧儀今大邦之為殿殿鎮也詩殿天子之邦何天之寵詩何天之龍何音賀擔負也龍當作寵榮名之謂如日之升詩如月之恒如日之升傳恒弦升出也言俱進也箋月上弦而就盈日始出而就明某莫捧兕觥過勤魚素並見前反復其道公宜歸槐棘之班易反復其道七日來復支離其形我欲息桑榆之影莊子支離其形者猶足以養其身終其天年又况支離其徳者乎注支離形體不全貎淮南子日西垂景在樹端謂之桑榆莊子處隂以休影處靜以息迹代回池州陳守奕池州秦屬鄣郡漢改丹陽郡三國呉為石城侯邑晉屬宣城及豫章郡梁屬南陵郡陳屬北江州隋初屬宣州後改州為宣城郡唐初始置池州治秋浦以地有貴池故名貞觀初州廢永泰初復置南唐陞康化軍宋復為池州今因之鳳律浮葭既迎日至虎符分竹茂擁天休恭惟某官克壯其猷共武之服甘棠教洽樂晝晷之移隂並見前細栁營堅新岸容之待臘周亞夫傳亞夫為將軍軍細栁杜詩岸容待臘將舒栁宜裒多祉以對休期某濫綴朝行阻陪賀旅雙旌風動熟觀雲祲之祥白樂天詩紅斾擁雙旌六纛霜嚴佇應雷聲之震新唐書百官志節度使掌總軍旅顓誅殺初授具帑抹兵仗詣兵部辭見觀察使亦如之辭日賜雙旌雙節行則建節樹六纛中官祖送代回安豐史知軍天錫安豐已見魯臺南至卦占七日之來見前淮水東馳人詠二天之有韓詩淮水出桐栢山東馳遥遥千里不能休宜裒多祉以錫諸侯恭惟某官風調不羣隋書楊素頗推高熲其才藝風調優於熲器資茂盛承師旅饑饉之後力撫瘡痍杜詩願聞哀痛詔端拱問瘡痍孟郊詩天下無義劒中原多瘡痍收愁恨歎息之聲復堅保障屬當荔挺宜介椿祺並見前某莫或飛觴歐詩惟應陪主諾不費日飛觴猥勤染翰惟君子之道既長如川之增詩如川之方至以莫不增箋方至謂水縱長之時也萬物之收皆增多也願方伯之政惟和何天之寵禮記千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正六十八帥三百三十六長尚書内有百揆四岳外有州牧侯伯庶政惟和萬國咸寧餘見前代回信州李寺丞昌信州已見律中黄鍾日運躔於斗北方言躔歴也日運為躔月運為胶淮南子日冬至則斗北中繩香凝畫㦸雲紀瑞於江東黄帝受命有雲瑞故以雲紀事易通卦驗冬至初陽雲出箕如樹木之狀杜詩江東日暮雲肇對剛辰宜裒蕃祉恭惟某官器資氷潔徳政川流並見前盤仙李之根豈假葭莩之援杜詩仙李盤根大景十三王傳葭莩之親張晏曰葭蘆也莩葉裏白皮也晉灼曰莩葭裏之白皮也皆取喻於輕浮也師古曰葭蘆也莩者其筩中白皮至薄者也葭莩喻著後律厯志候氣之法以木為案加律其上以葭莩灰抑其内端注葭莩出河内憩甘棠之䕃茂騰桑麥之歌張堪傳堪為漁陽太守百姓歌之曰桑無附枝麥秀兩岐詳見前來復之爻既占視履之祥可考見前某濫班朝綴莫履賀絇問㣲陽之回未回誰汲無波之井東坡冬至詩井底微陽回未回蕭蕭寒雨濕秋荄注月令冬至則水泉動白樂天詩無波古井水有節秋竹竿此用兩事知太守之樂其樂賸頒有脚之春賸以證切説文物相増加也徐曰今鄙俗謂物餘為賸増韻益也餘也代回濠州何都統汝霖濠州已見新陽浮琯寅賔化日之長見前元帥開藩茂介自天之祜詩受天之祜四方來賀又曽孫夀考受天之祜恭惟某官深沉而能勇果毅而善謀鶴唳淮淝早立鼓鼙之績謝𤣥傳决戰肥水南苻堅中流矢堅衆奔潰死者不可勝計肥水為之不流餘衆棄甲宵遁聞風聲鶴唳皆以為王師樂記鼓鼙之聲讙讙以立動動以進衆君子聽鼔鼙之聲則思將帥之臣魚游濠上今宣保障之勞莊子莊子與惠子游于濠梁之上莊子曰鯈魚出游從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣莊子曰請循其本惠子曰女安知魚樂云者既已知吾知之而問我我知之濠上也茂對休辰宜裒多祉某未遑馳慶猥辱貽箋登觀書雲已宻觀於道長見前築壇擇日佇益振於戎昭韓信傳擇日齋戒設壇場具禮左傳戎昭果毅以聽之之謂禮代回無為趙知軍善湘宻緹布室地氣上騰緩帶專城天休滋至俱見前恭惟某官飛英屬籍史記啇君傳宗室非有軍功論不得為屬籍索隠曰謂宗室若無軍功則不得入屬籍謂除其籍則雖無功不反爵秩也文帝紀復諸劉有屬籍家無所與田蚡傳舉謫諸竇宗室無行者除其屬籍斂惠价藩韓文斂此大惠兮施于一州詩价人維藩草木知名威肅江淮之遠葭莩候律春回嶰谷之温燕喜惟新並見前龍光有渥詩為龍為光某無由稱慶過辱屬辭梅放栁舒既宻回於一氣竹苞松茂願益對於百祺並見前代回衢州孫守子直衢州已見孤竹之管雲和之琴律諧冬至周禮大司樂孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圓丘奏之孤竹特生之竹雲和山名太末之城姑􅑪之里和共春回韓文衢州徐偃王廟碑姑􅑪之墟太末之里又太末之里姑篾之城太音闥衢州春秋為越姑篾之地秦屬㑹稽為太末縣左傳越伐呉王孫彌庸自泓上觀之見姑篾之旗曰吾父之旗也杜預注姑篾越也今浙江龍游縣有姑篾城時維甸侯栁詩繼酬天禄署俱尉甸侯家懋綏疇祉易否九四有命无咎疇離祉孔疏疇疇匹謂初六也離麗也謂附著也言九四命初身既无咎初既被命附依祉福言初六得福也恭惟某官氣資氷潔政術泉流桑䕃在庭認憩棠之勿翦新唐書桑䕃未徙而大功立黍生於谷笑刻楮之不成列子宋人有為其君以玉為楮葉者三年而成鋒殺莖柯毫芒繁澤亂之楮葉中而不可别也列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣佇即從日邊而來晉明帝紀不聞人從日邊來居然可知也詳見前斯可後天下而樂某漫聨枌社郊祀志高祖禱豈枌榆社鄭氏曰枌榆鄉名也社在枌榆晉灼曰枌白榆也社在豐東北十五里師古曰以此樹為社神因立名也阻捧栢觴見前畫㦸凝香已不殊於雲物少陵小至詩雲物不殊鄉國異教兒且覆掌中杯紫宸朝散猶及見於風標杜詩縱酒欲謀良夜飲還家初散紫宸朝又杖藜雪後臨丹壑鳴玉朝來散紫宸任昉進封衡陽王詔風標秀特器體淹𢎞南史栁登傳栁澄風標才氣恐不能為少主臣代回南安趙知軍師傳南安已見魯雲既書陽從地復見前趙日可愛福與時升詩神之弔矣詒爾多福如月之恒如日之升恭惟某官信厚存心詩序關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也中和布政灰浮緹室民知襦袴之温線永繡紋公豈繭絲之急佇息潢池之盜益凝畫㦸之香並見前某未果馳箋猥勤飛翰軍聲破竹㑹清洞口之塵埃杜預傳兵威已振譬如破竹數節之後皆迎刃而解無復著手處也杜詩胡危命在破竹中峒山在南安城北十八里上有泉出石隙瀑流數尋下匯為澄潭山意放梅試問嶺頭之消息大庾嶺在大庾縣西南二十里呉録南野縣有大庾嶺自嶺嶠九磴二里至嶺下七里平行十里至平亭劉嗣之南康記云平亭謂之横亭圖經云嶺初險觕唐張九齡開鑿新路乃斷崖成峽兩壁聳立仰視霄漢中塗坦夷又名梅嶺其上多梅南安志嶺上有寺有婦人題云妾㓜侍父任英州司冦既代歸以大庾有梅嶺之名而反無梅遂植三十株於道傍既又題此詩於壁間云英江今日掌刑回上得梅山不見梅輟俸買將三十本清香留與雪中開代回吉州史守定之吉州已見律中黄鍾謹書雲於太史見前香凝畫㦸歌湛露之諸侯詩序湛露天子燕諸侯也箋云諸侯朝覲㑹同天子與之燕所以示慈惠茂對休辰宜膺純嘏恭惟某官榮分漢竹式憩甘棠並見前執樂三千俯就專城之樂東坡詩紅粧執樂三千指白粲連檣十萬艘提兵數萬更書擊賊之功晉書朱伺傳諸人以舌擊賊伺惟以力耳魏書傅永傳上馬能擊賊下馬作露布惟傳修期耳福與時升道随剛長某未由敘賀猥辱馳箋敢因勒復之間輙致鳴謙之謝並見前代回江州陳守卓江州已見七日來復聖人見天地之心見前九江孔殷太守宅生靈之命尚書九江孔殷禹貢釋文九江謂烏白江蚌江烏江嘉靡江畎江源江廩江提江箘江張須元縁江圖九江謂三里江五州江嘉靡江烏土江白蚌江白烏江箘江沙提江廪江曽氏云過九江至于東陵東陵今之巴陵巴陵之上即洞庭也考之前志沅水漸水潕水辰水敘水酉水醴水湘水資水皆合洞庭中東入于江致和以政均福於民恭惟某官喜氣排冬盛名如晝日長一線賦豈急於繭絲氣煖重緹香自凝於燕寢並見前佇朌襃璽集韻頒或作朌通作班周禮匪頒注讀為班布之班謂分賜也遂秉覲圭詩以其介珪入覲于王某辱託為寮過勤示問修户庭之令有愧頌言寛田里之愁無忘愛助俱見前代回新順慶李守鏜順慶府古巴子國秦滅巴立為巴郡即漢巴郡之安漢縣也亦為充國縣地二縣並屬益州之巴郡劉璋分墊江置巴西郡宋於安漢故城置南宕渠郡隋罷宕渠郡以安漢縣屬隆州改安漢縣為南充縣改隆州為巴西郡唐割隆州南充相如二縣置果州𨽻山南西道改南充郡復為果州改為充州尋復為果州偽蜀為永寧節度宋平蜀𨽻梓州路以寧宗潜邸陞順慶府書雲登觀願面慶於考祥易視履考祥其旋元吉至日閉關辱手箋之却謁易先王以至日閉關商旅不行后不省方敢馮尺牘陳遵傳遵性善書與人尺牘主皆藏弆以為榮雜志晉宋兵革之間禁書疏非弔䘮問疾不得行尺牘就布寸扄扄涓熒切説文外閉之關也左傳引逸詩周道挺挺我心扄扄恭惟某官心與氣游徳随剛長出守數已六逺邁鄴侯之行年韓詩鄴侯家多書挿架三萬軸偉哉羣聖文磊落載其腹行年餘五十出守數已六京邑有舊廬不容久食宿近古俗有三喜見坡仙之歸里東坡眉山逺景樓記吾州之俗有近古者三其士大夫貴經術而重氏族其民尊吏而畏法其農夫合耦以相助盖有三代漢唐之遺風而他郡之所莫及也既新鳳律宜簉鴛行見前至朔同日謂之章章有慶矣後律厯志至朔同日謂之章同在日首謂之蔀易來章有慶詩維其有章矣是以有慶矣俱詳見前夀考維祺介以福福履綏之詩夀考維祺以介景福又樂只君子福履綏之某欲厠賔綦綦音其履餙也禮記屨著綦注屨繫也疏云屨頭施繫以為行戒或屨上自有繫以結于足也張恊詩案無蕭氏牘庭有貢公綦王荆公詩游客經年斷履綦先厪旅拒陳徐陵為王質移文氐羌旅拒已跨伊瀍胡羯慿陵方踰汾潞牛僧孺鷄觸人述以長纓覊繫彼莫得旅拒靜以待隂陽之定願致頌言月令仲冬之月日短至君子齋戒處必掩身身欲寧去聲色禁嗜欲安形性事欲靜以待隂陽之所定復其見天地之心即觀征吉東坡冬至致語觀其來復見乎天地之心靜以無為待此隂陽之定代回前權萬州趙太守萬安軍本漢珠崖郡也唐為崖州文昌縣地貞觀中析置萬安縣𨽻瓊州後改𨽻崖州龍朔初置萬安州至徳初改萬全郡乾元初復萬安州宋熈寧中改為萬安軍紹興初廢軍為萬安縣後復置軍仍改縣為萬安元因之今為萬州昴星正當式應堯時之授尚書日短星昴以正仲冬又厯象日月星辰敬授人時辛日書至允符魯觀之占維時元帥之詩書並見前茂介宜民之福禄詩宜民宜人受禄于天干禄百福子孫千億董仲舒傳詩云宜民宜人受禄于天為政而宜于民者固當受禄于天恭惟某官徳潛剛克道配陽休雷在地中吉既亨於七日見前風行水上身即近於五雲易風行水上渙疏風行水上激動波濤散釋之象又渙汗其大號此取渙號之義杜詩五雲多處是三台押鴛行三㸃之班轉鴻鈞八荒之氣某寸材線短一障氷寒並見前牽牛之景丈三實窘蹊田之奪左傳牽牛以蹊人田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣餘見前鳴鳳之筒七寸誰回嶰谷之温律厯志取竹之解谷斷兩節間而吹之以為黄鍾之宫制十二筩以聴鳳之鳴又五聲之本生於黄鍾之律九寸為宫或損或益以定商角徵羽賀胡通判衍甲申甲申為寧宗嘉定十七年梅亭時年五十一歳在申而得酒已回葭律之温見前斗建子以挹漿正作菊潭之夀風俗通南陽酈縣有甘谷谷水甘美云其山有大菊水從山上流下得其滋液谷中有三十餘家不復穿井悉飲此水上夀百二三十中百餘下七八十者名之大夭菊花輕身益氣令人堅强故也司空王暢太尉劉寛袁隗為南陽太守聞有此事令酈縣月送水二十斛用之飲食諸公多患風眩皆得瘳盛宏之荆州記酈縣菊花水太尉胡廣乆患風羸恒汲飲此水後疾遂瘳年近百歳非惟天夀亦菊延之此菊甘美廣後收此菊實播之京師處處傳植星屏所舍雲氣可占恭惟某官徳與時偕道随剛長見前千里分風月之半邦國不空古詞獨倚胡牀庾公樓外峯千朶與誰同坐明月清風我别乗一來有唱終須和還知麽自從添箇風月半分破王祥傳邦國不空别駕之功六爻見天地之心公侯必復易六爻發揮旁通情也左傳公侯子孫必復其始餘見前諒裒純嘏即上清班東坡詩珪璋滿清班某百念灰寒白樂天冬至詩心灰不似爐中火鬢雪過於砌下霜寸材線短窮簷日煖不堪輸炙背之忠嵇康與山濤絶交書野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣别駕氷清詎敢作持杯之祝隋書循吏傳趙軌河南雒陽人為齊州别駕在州四年考績連最高祖徵軌入朝父老相送者各揮涕曰别駕在官水火不與百姓交是以不敢以壺酒相送公清若水請酌一杯水奉餞軌受而飲之賀史通判湜葭律浮灰候臨小至少陵有小至詩注或云陽為大隂為小冬至隂極故曰小至稗史說者謂冬至前一日為小至歳時雜詠盧照隣年日述懷云人歌小歳酒花舞大唐春是以元日為小歳以此觀之子美之小至即冬至也杜詩有小寒食舟中作注云小寒食如小至謂前一日也棘評佐獄慶叶大來禮記正以獄成告于大司冦大司冦聽之棘木之下陳子昻集豫參評于詔獄易㤗小往大來吉亨遠莫捧於兕觥見前誠敢輸於魚素古樂府呼童烹鯉魚中有尺素書恭惟某官氣鍾温厚禮記天地温厚之氣始于東北而盛于東南此天地之盛徳氣也此天地之仁氣也徳廸中和尚書允迪厥徳傑然驥展之材監此龍潜之邸易乾初九潜龍勿用鸚鵡杯鸕鷀杓滿介夀祺李詩鸕鷀杓鸚鵡杯百年三萬六千日一日須傾三百盃孔雀扇麒麟爐即儀禁甬少陵至日遣興詩麒麟不動爐煙上孔雀徐開扇影還甬尹竦切韓詩龍斾垂天衛雲韶凝禁甬某襪材綫短泥軾氷寒見前乃分之宜詎敢耻狐貉之厠韓文投閒置散乃分之宜厠初吏切韻㑹間也次也惟鄰是卜尚祈分燈燭之光左傳非宅是卜惟鄰是卜二三子先卜鄰矣史記甘茂傳甘茂之亡秦奔齊逢蘇代代為齊使於秦甘茂曰臣得罪於秦懼而遯逃無所容跡臣聞貧人女與富人女㑹績貧人女曰我無以買燭而子之燭光幸有餘子可分我餘光無損子明而得一斯便焉今臣困而君方使秦而當路矣茂之妻子在焉願君以餘光振之回寶慶陳通判中清氷出壑未皇瞻仲舉之輿杜詩炯如一段清氷出萬壑置在迎風寒露之玉壺謝承書周景為豫州辟陳蕃為别駕不就景題别駕輿曰陳仲舉座也不復更辟蕃惶懼起視職至日閉關乃倐領孟公之牘倐式竹切説文走也從犬攸聲讀若叔廣韻倏忽犬即走也通作儵俗作倐非游俠傳陳遵字孟公性善書與人尺牘主皆藏弆以為榮既先施之不敏復倒置之可慙莊子䘮已于物失性于俗者謂之倒置之民感君子之鳴謙增小人之自訟謙訟卦名恭惟某官徳星維夏郊祀志望氣王朔言獨見填星出如𤓰食頃復入有司皆曰陛下建漢家封禪天其報徳星云師古曰徳星即填星也言天以徳星報於帝異苑陳寔與諸子姪造荀淑父子討論于是徳星聚太史奏曰五百里有賢人喜氣排冬韓詩喜氣排寒冬汗漫九垓共佇舊氊之復淮南子吾與汗漫期于九垓之外吾不可以乆駐王獻之傳夜卧齋中而有偷人入其室盗物都盡獻之徐曰青氊我家舊物可特置之翺翔半刺暫增新府之雄杜詩半刺已翺翔王勃滕王閣詩序南昌故郡洪都新府召棠之䕃既成漢竹之符孔邇見前將恐合八能於鸞殿關中記未央殿東有鳳皇殿鴛鸞殿西京賦鳳皇鴛鸞注皆後宫别名唐太宗實録貞觀十八年十一月宴父老于儀鸞殿八能見本巻代回大理趙少卿條徑當歸三㸃之鴛行見前某未遂披雲曹植謝入覲表若披浮雲而曬白日樂廣傳尚書令衛瓘見而竒之曰此人之水鏡見之瑩然若披雲霧而睹青天也已深蒙霧東坡集餘膏所燭常分無盡之光蒙霧而行皆獲不知之潤無蠏徒名於監郡歸田録宋初懲藩鎮之弊置通判以貳州事既非官屬故嘗與知州爭權每云我是監郡朝廷使我監汝舉動為其所制太祖聞而患之下詔書戒勵使與長吏恊和自此稍戢然至今州郡往往與通判不和往時有錢昆少卿者家世餘杭人也杭人嗜蠏昆嘗求外補人問其所欲何州昆曰但得有螃蠏無通判處則可矣至今士人以為口實東坡詩欲問君王乞符竹但憂無蠏有監郡不龜敢望於封侯莊子宋人有善為不龜手之藥者世世以洴澼絖為事客聞之請買其方百金以説呉王越有難呉王使之將冬與越人水戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也蒙篤二郡三武岡之情武岡州今屬寶慶府特有一紙十從事之况劉宏傳得劉公一紙書賢于十部從事公歸無所亟觀孔雀扇影之還詩公歸無所於女信處杜詩孔雀徐開扇影還徳必有隣尚憶狐貉緼袍之立代回嘉興楊倅祖堯圭日舒長頓覺牽牛之逺屏星絢彩益知展驥之長諒當來復之辰見前丕擁疇離之祉易否九四有命旡咎疇離祉疏疇謂疇匹謂初六也離麗也謂附著也言九四命初身既无咎初既被命附依祉福伏惟某官禀姿温厚賦政和明詩賦政于外四方爰發題别駕之輿流聲藉甚懷刺史之綬闔境安之朱買臣傳懷其印綬歩歸郡邸幸為嘉禾之民呉黃龍五年嘉禾生於由拳改嘉禾縣益廣甘棠之䕃某無由面賀猥辱手書劉宏傳手書守相丁寧欵宻感佩高情藏但深於十襲闕子宋愚人得燕石藏之以為大寶革匱十重緹巾十襲詳見前噓呵凍筆報有愧於七襄天寶遺事李白嘗於便殿對明皇撰詔誥時十月大寒筆凍不能書字帝勅宫嬪十人侍白左右各執牙筆呵之代回華亭錢宰徳謙華亭秦漢為婁縣地漢末孫呉封陸遜為華亭侯華亭之名始見唐為崑山嘉興海鹽三縣地天寶間割置華亭縣宋因之律中黄鍾之宫是名天統見前身為赤縣之令盖近日畿杜氏通典唐縣有赤畿望𦂳上中下六等之差注京師所治為赤縣京之旁邑為畿縣赤縣三府共有六縣韓詩嗟我身為赤縣令操權不用欲何俟尚書考靈憲崑崙東南有赤縣之州風雨有時寒暑有節茍非此土南則多暑北則多寒東則多隂故聖人不處焉白虎通京師者千里之邑號也法日月之徑千里周書注畿方千里取象于日互見前動惟厥時尚書慮善以動動惟厥時利有攸往易七日來復利有攸往彖曰利有攸往剛長也恭惟某官用儒飾吏循吏傳序唯江都相董仲舒内史公孫宏兒寛居官可紀三人皆儒者通於世務明習文法以經術潤飾吏事以政凝民一綫初長技可伸於刀錦左傳子皮欲使尹何為邑子産曰不可猶未能操刀而使割也其傷實多子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎重緹方煖政肯急於繭絲亟諧六鳳之筩遂振雙鳬之舄某濫紆朝紱持辱賀緘烹魚得書莫報五雲之體拂龜端策但占七日之來俱見前代回黃巖楊宰圭黄巖在台州東南六十里本東漢章安縣地永和中置永寧縣呉屬臨海郡隋改永寧曰永嘉又分其地入臨海縣屬永嘉郡唐復析置永寧縣屬台州天授初改黄巖縣以山為名宋因之黄巖山在黄巖縣西一百二十里山頂有黄石一名仙石山俗傳仙人王方平居此上有王公客堂魯臺紀瑞肇新太史之占見前楚縣分封亶為令尹之室杜氏通典周官有縣正春秋時列國相滅多以其地為縣則縣大而郡小故傳云上大夫受縣下大夫受郡縣邑之長曰宰曰尹曰令曰大夫晉謂之大夫魯衛謂之宰楚謂之令尹恭惟某官天朝儀羽韓文智以謀之仁以居之吾知其去是而羽儀於天朝也不逺矣巖邑絃歌地氣浮葭新漢庭之律吕見前岸容舒栁認陶令之風流杜詩岸容待臘將舒栁陶潜傳嘗著五栁先生傳以自况曰先生不知何許人不詳姓字宅邊有五栁樹因以為號届此令辰宜其遐祉某寵勤下問愧未先施紅蠟塗金良照形容之獨老杜詩題詩蠟炬紅又江上形容吾獨老黄柑噀玉仍慙口腹之累人風土記甘橘之屬滋味甜美特異者也有黄者有頳者謂之壺甘司馬相如傳黄甘橙榛郭璞曰黄甘橘屬而味精崔寔政論今之臣妾皆餘黄甘而厭文繡晉令閩中縣置守黄甘吏一人廣志犍為南安縣出黄甘梁劉孝儀謝晉安王賜甘啟削彼金衣咽兹玉液稗史貞柑在品類中最貴可珍膚理如澤蠟始霜之旦園丁採以獻風味照座擘之則香霧噀人東坡食柑詩清泉蔌蔌先流齒香霧霏霏欲噀人又二年洞庭秋香霧長噀手今年洞庭春玉色疑非酒後漢書周黄徐姜申屠傳序太原閔仲叔者世稱節士客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞敕吏常給焉仲叔恠而問之知乃歎曰閔仲叔豈以口腹累安邑耶遂去客沛代回趙縣宰天運回壬萬物以之姙育壬如林切説文位北方也隂極陽生故易曰龍戰于野戰者接也象人懷妊之形月令注壬之言任也律厯志懷任于壬斗柄挿子一陽於是孽生韓詩元和庚寅斗挿子曹植表千載昌期一陽嘉節四方交㤗萬物昭蘇時惟字民之官説文字字乳也易女子貞十年不字乳也又愛也左傳大不字小周禮地官之注小國貢輕字之也坐膺善治之福恭惟某官仁風破臘喜氣排冬舒栁放梅散作河陽之煖李詩河陽花作縣吹竹生黍薫為嶰谷之和律厯志取竹之解谷斷兩節間而吹之劉向别録鄒衍在燕燕有谷地美而寒不生五榖鄒子居之吹律而温氣至而榖生今名黍谷趙日之愛既深見前堯雲之就何逺史記帝堯本紀就之如日望之如雲注如日之照臨人咸依就之若葵藿傾心以向日如雲之覆幄言徳化廣大而浸潤生人人咸仰望之如百榖之仰膏雨也某寸材綫短百念灰寒雪後擁爐固已重拜其細左傳晉侯享穆叔金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子曰吾子舍其大而重拜其細何也天隅把繡更得三復之藏杜詩刺繡五紋添弱線又天隅把繡衣回外縣復其見天地之心小人恐矣左傳齊孝公伐我北鄙公使展喜犒師齊侯曰魯人恐乎對曰小人恐矣君子則否此借用誠者合内外之道君子觀焉宜有隂隲之祥尚書惟天隂隲下民式介陽休之徳伏惟某官氣排冬凛政體春和文帝紀詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡而莫之省憂為民父母將何如坎維心亨既生芸而挺荔易習坎有孚維心亨行有尚注陽不外發而在乎内心亨者也泰交征吉將連茹以㧞茅易天地交泰初九㧞茅茹以其彚征吉詳見前對栁舒梅放之辰擁松茂竹苞之慶見前某幸叨聨事辱畀屬辭禮記屬辭比事春秋教也正義曰屬合也比近也春秋聚合㑹同之辭是屬辭比次襃貶之事是比事也於我如浮雲臺空登於魯觀見前其志在流水琹孰聽於圜丘吕氏春秋伯牙鼔琴鍾子期善聽之方鼔琴志在流水鍾子期曰善哉乎鼔琴洋洋乎若流水周禮孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之普回州縣官視朔登觀又逢十九歳之章左傳日南至公既視朔遂登觀臺以望而書禮也後律厯志四時推移故置十二中以定月位有朔而無中者為閏月中之始日節與中為二十四氣以除一歳日為一氣之日數也其分積而成日為沒沒并歳氣之分如法為一歳沒沒分于中中終于冬至冬至之分積如其法得一日四歳而終月分成閏閏七而盡其歳十九名之曰章測日候圭可愛一丈三之日周禮大司徒以土圭之法測土深正日景以求地中日南景短多暑北景長多寒東景夕多風西景朝多隂日至之景尺有五寸謂之地中左傳趙衰冬日之日也注冬日可愛易氏解冬至日在北陸躔牽牛去極一百十六度有竒而景長丈有三尺因微芒之陽徳杜牧之詩陽徳比君子初生甚㣲芒賀方榖之正人尚書凡厥正人既富方榖孔傳凡正直之人既當以爵禄富之又當以善道接之伏惟某官毓秀昴躔春秋佐助期蕭何禀昴宿而生任昉王文憲集序昴宿垂芒徳精降祉尚書日短星昴以正仲冬垂光井絡禰衡傳揚聲紫㣲垂光虹蜺文選岷精垂曜于東井又岷山之精上為井絡噓物以氣既挺荔以生芸見前贈人以言亦連珠而合璧荀子贈人以言者重於金石珠玉説苑贈人以軒不若贈人以言尚書考靈曜日月五星冬至起牽牛日月若懸璧仰觀天形如車盖衆星纍纍如連貝其考六日四分之鳳厯入陪五更三㸃之鵷行並見前某睆彼牽牛睆音莞詩睆彼牽牛不以服箱注睆明星貌河鼓謂之牽牛服牝服也箱大車之箱也眇焉負鶴天隅把繡自知無一綫之長見前漢女支機聊復效七襄之報荆楚歳時記漢武帝令張騫使大夏尋河源乗槎經月而至一處見城郭如州府室内有一女織又見一丈夫牽牛飲河騫問曰此是何處答曰可問嚴君平織女取支機石與騫而還後至蜀問君平君平曰某年某月客星犯牛女支機石為東方朔所識集林昔有一人尋河源見婦人浣沙以問之曰此天河也乃與一石而歸問嚴君平云此織女支機石也南墅閒居録元豐末有人擕支機石投進者廣可二斗許不圓㣲峩而碧色天漢左界北斗經其上宋之問明河篇明河可望不可親願得乗槎一問津更將織女支機石還訪成都賣卜人謝寄居鄉官杓攜龍角天正肇新律厯志天統之正施於子半律轉鳳筩人時敬授有如是邦大夫之賢者宜曰予攸好徳而錫之尚書而康而色曰予攸好徳女則錫之福恭惟某官和氣融氷修名揭日離騷經老冉冉其將至兮恐修名之不立修名修潔之名也放梅舒栁不妨泛栢以浮椒挺荔生芸行即㧞茅而連茹七日來復百禄是遒並見前某假守鄭鄉鄭𤣥傳相國孔融深敬於𤣥為𤣥特立一鄉曰鄭公鄉詳見前又登魯觀見前按商旅不行之卦敬已閉關易雷在地中復先王以至日閉關商旅不行味形容獨老之詩每思專壑杜詩江上形容吾獨老陸機文古之逸民輕天下而欲專一丘之懽擅一壑之美豈不身重於宇宙哉世説明帝問謝鯤君自謂何如庾諒曰端委廟堂使百官凖則臣不如諒一丘一壑自謂過之徒拜嘉於綿繡左傳鹿鳴君所以嘉寡君也敢不拜嘉莫效報於䄡䄖見前謝同官杓躔建子又届新陽見前斗壘同寅有勤善頌壘魯水切説文軍壁也斗喻其小猶言得州如斗也尚書同寅恊恭和衷哉惠而好我詩惠而好我携手同行更以贈君山谷詩君家所有更贈君恭惟某官明氷其相愛日之政靜以待隂陽之定盈則有孚並見前復其見天地之心受之无妄繫辭復則不妄矣故受之以无妄式裒龎祉丕對龍光某獲託為寮又逄亞歳十年之閱凋謝詎更思三㸃之朝並見前萬物之随開張惟當勉一箱之讀杜牧冬至日示小姪阿宜詩陽徳比君子初生甚㣲芒排隂出九地萬物随開張一似小兒學日就復月將願爾一祝後讀書日日忙一日讀十紙一月讀一箱回鄉官學職聽六日四分之鳳律又見新陽詠五更三㸃之鵷行已迷舊夢見前兹勤善頌但愧過情恭惟某官語染芸香陳子昂集持三寸筆入芸香之閣氣薰葭琯見前登觀以望自堪織雲漢之章詩倬彼雲漢為章于天東坡詩手抉雲漢分天章天孫為織雲錦裳閉關而居亦足驗地雷之卦某寸材綫短百念氷寒並見前井底之陽未回若為觀復韓渥詩隂氛未向河源塞陽氣今從地底回東坡冬至詩井底㣲陽回未回蕭蕭寒雨濕秋荄注月令冬至則水泉動江上之容獨老良感相親杜詩江上形容吾獨老天涯風物自相親回學職杓綱建子厯新五鳳之書五鳳漢宣帝年號應劭曰鳳皇五至因以改元云魁首枕參祥應六龍之邸天文志魁枕參首易時乗六龍以御天對時道長易先王以茂對時育萬物即日言揚禮記或以事舉或以言揚伏惟某人心醉六經莊子列子見之而心醉中説云心若醉六經目若營四海山谷詩手抄萬巻未閣筆心醉六經還荷鉏志在千里王敦傳每醉後輒詠魏武帝樂府歌曰老驥伏櫪志在千里烈士暮年壯心不已文史三冬之用既足三餘東方朔傳三冬文史足用如淳曰貧子冬日乃得學書言文史之事足可用也杜詩古人已用三冬足魏畧董遇字季直人有從學者遇不肯教而云必當先讀百徧而義自見從學者云苦渴無日遇言當以三餘冬者歳之餘夜者日之餘隂雨者時之餘也任昉策秀才文聽覽之下三餘靡失劉孝標答劉之遴書九冬有隟三餘暇時多遊書圃代樹萱蘇庾信詩託情忻六學游目愛三餘山谷詩少年基一簣長歳足三餘又皇文開萬巻家學陋三餘雲霄一握之程亟觀一躍天葩既茂韓詩天葩吐竒芬地芥坐收兩夏侯傳士病不明經術經術茍明其取青紫如俛拾地芥爾某一障灰寒百懷氷冷不遠之復願歸飲顔子之瓢繫辭顔氏之子其殆庶㡬乎易曰不遠復无祗悔元吉論秀而升尚或勸漢人之駕禮記論選士之秀者而升之學曰俊士高帝紀其有意稱明徳者必身勸為之駕文頴曰有賢者郡守身自往勸勉令至京師駕車遣之四六標準巻四十
