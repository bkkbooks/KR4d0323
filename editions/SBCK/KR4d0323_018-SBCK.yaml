body:
  text: 寺監賀黄安撫除大理少卿知榮州作晉卿叢􅁄升帥前茅乗八月之槎旣瞻相於斗柄回二星之部仍典領於參旗四履歡然重臨幸甚恭惟某官􅀒材明允蓄德碩膚奫沄澄深得龍津炳靈之秀扶輿鬱積継􅀛山正學之傳乆留金馬之坊妙斡木牛之運中兼閫制外憺戎昭逺略折衝􅀯人不復反矣從臣虚位東山以公歸􅀆然河内競借於㓂恂冝􅀜中復留於蕭相峻升金掌併緫玉鈐公去公來信有􅀜於輕重時行時止俱不失其光明共羡班景倩登仙之除咸有樂正子爲卿之喜佇盡護於諸將遂進長於六官某凄其一寒去此十暑未問五馬二毛之無用最覺孤鴻獨影之可怜矧􅆈波之素封今掃地而赤立水旱重蓼蟲之苦風景増蓴鱠之思所幸頴川黄霸之復來或察夜郎李白之可念老牛䑛犢誰敢論􅀲葛之連孤鳯求凰或亦備蘋蘩之薦其爲頌傒罔旣鋪棻賀岳緫領珂除大卿四牡奏最九扈升班王人不微夙序諸侯之上臣卿雖少有光八使之間邊面驩然帝心簡在恭惟某官天材敏邵地望穹華滿腹精神解千牛之肯綮撐腸文字空萬馬之躊躇豈惟建武功臣之家亦習正元供奉之曲乆將餉指仍領价藩盍歸乎來遂登龍尾見知則恱聊進豹祛卿不同乎暫掌九功之貳侯誰在矣亟膺一札之招某共飲玻璃未覿珪玠視諸故府龍豬􅀼幸於同宫于彼新田燕雀敢稽於賀夏代回王大卿􅀘之入覲楓宸升卿􅁄寺民之攸塈乆凝􅀞㦸之清香王曰遄歸復畀靑氊之舊物恭惟某官器質膚敏機量浚明京兆有王之歌至今未冺江東無卿之嘆所去見思輟自銀符入躋金掌敬爾攸獄監于祥刑民自以不􅁈行課淸明之效王言惟作命即登獻納之班某過沐幸臨更勤委重冷秋菰寒水玉覺執􅀬之頓淸金錯刀英瓊瑶愧報嘉之不腆代回李寺正直柄拜命楓宸陞華􅁄正好生如舜方惟刑之恤哉選衆舉臯則不仁者逺矣恭惟某官持心近厚折獄惟良自再轉而爲丞益揚淑問冝片言之寤主茂進崇階某有幸爲寮未皇稱慶猥辱鳴謙之賜聊申叙復之私代回劉寺正刑期無刑丞非余􅀒正率不正帝曰汝諧先庚具孚同寅良幸某謬忝秋官之貳極深夏賀之私姑奉手牋别遲面慶代回李寺正直柄拜命明庭司刑賛府一麾岀守所至如破竹然再轉爲丞此行􅀂登仙矣恭惟某官機神明浚識度端凝治已治人洞知周孔之情思讀書讀律又欲堯舜其君民徧儀􅁄寺之華幾致草扉之鞠郡符旣合邊瑣多驚甫淸逺障之風塵旋奉殊庭之香火帝念師旅飢饉之後折民惟刑人思賢明慈惠之師命汝作士肆敡芝檢參貳李官昔張蘊古之直聲由兹論賞雖狄梁公之相業自此升階欲識逺圖請觀近比某與聞犴獄似是馬曹具嚴天威望盡心於閱實頗哀老子或䄂手以蒙成少遲九遷當不一賀代回陳寺丞振方欲取違先勤言别出處亦吾輩之先事是非至他日而後明風雨蕭蕭願雞鳴之不爽雪霜貿貿終麥秀以何疑敢因報章并申善禱代回吕寺丞祖平奏最竹符陞華􅁄寺辟以止辟九重之念在兹丞不􅀒丞三尺之平必矣恭惟某官象賢濟美燕譽騰芳伯仲塤篪曲突之忠甚切公侯閥閲直鈎之釣猶遲兹從漢化之更冝有吕刑之命某辱同寮寀喜倍等倫自此蒙成不􅀒嘉師之託逃於司敗亦惟餘潤之依代回大理沈寺丞繹乆參􅁄屬進貳李官丞不􅀒丞益懋平反之蹟辟以止辟助成欽䘏之仁某有幸爲寮未遑趍慶代回沈評事榮持邑最歸領廷評惟丹筆之祥刑實靑氊之舊物頭衘如故歩武巳髙恭惟某官服襲芳馨蜚騰聲實早脫囊中之頴詳明柱後之文􅁄寺參華竹書惟允属拘􅀖典暫試民庸麥熟兩岐雖道途之交詠桃㘽千樹冝車馬之重來某有幸爲寮未遑賛慶遣長􅂡而致􅀟鯉良感先施跂織女而終七㐮更慙匪報代回大理樓評事澄舉賢有格當簡乃僚折獄惟良徒得君重公車之牘晩矣私室之謝何哉恭惟某官地望已髙天資仍茂讀書不讀律懼無術以致君治已後治人寕以身而試法决科雋甚詳讞瞭然豈無他人恐未如於一鶚惠而好我何不吝於􅀟魚某濫貳秋卿又見春序小狐汔濟亦奚事於聽氷良馬空羣望自期於追電代回程監丞準五雉分工誤恩攝長􅀟魚尺素取數過情恭惟某官四海老成累朝􅂄舊人生待足何時足得住爲佳官職有來還自來不聞亦式應􅀏戀軒之疲馬未能返肆於屠羊某自揣頭顱難司喉舌匪朝伊夕即騰納禄之章爲官擇人空忍見賢之渴代回程監丞準岀命明庭祝􅁵間館雋永乎山林之味樂且無央參寥乎香火之縁老當益壯恭惟某官棲遟盛福􅀏傲明時詔禄珍臺又拜散人之號飬神丹鼎應與造化者游所恐蒲迎不容橘隱某歸巳晩矣行或使之汗漫相期本許以急流之勇退侏儒獨飽敢乆於暮夜而倒行代回軍器王監簿渥對越宸綸勾稽武庫爲太守選所表旣有交章除戎器戒不虞亶爲稱職公議如此私謝何爲恭惟某官故家典刑中州胄岀婉賛幕中之畫勇分海上之符焉能使予不遇哉姑從外􅀘有欲爲王留行者迄得内除時雖旣戢於干戈法合咸精於器械小煩㑹計㑹即騫騰某自嘆望秋未遑賀夏豈無靑精飯此心惟切於謀歸贈我緑綺琴無􅀃可從而厚報回朱司令在渙奉宸綸晉司帝籍用過庭所學之礼習祈年孔夙之詩有渥新除式光舊德恭惟某官清門偉望名丗故家先正接伊洛之宗源流甚正後學出河汾之泒沾丐居多卒老于行克昌厥後故從緑水紅蓮之幕入庀紺轅黛耜之司此非不稼而取禾政欲敷菑而肯播少培飛歩即輅華􅂗某偶此綴班何勤委贄自憐往日識野鶴於未仙猶喜殘年見名駒之有種代回詹大社乆中陞華司社賛治容臺惟是詩書禮樂之儒始明籩豆簠簋之事用人如此通國欣然恭惟某官奮自清門徑収名第下帷分教不辭獨冷之氊當路交章争取横前之寳果從蜀道入典漢祠拜如絲如綸如綍之言實自今始考以松以栢以栗之義應有古心某有幸識賢過蒙委贄數旬爲客㑹已見於榮遷一日不齋猶願安於承教代回趙太社汝讜庀司太社賛治奉常舎文字旁午之勞共夙夜惟寅之命恭惟某官九苞威鳯千里名駒抱朱虚之忠請鉏吕産􅀏紅休之陋更媚王音毅然料虎之頭樂只跋狼之尾忠精旣白論諌如丹徑咨禮樂之英入司籩豆之事雝雝肅肅何嫌三百日之齋親親賢賢行有十六相之舉某未遑旅賀先辱臨存贈緑綺琴愧不辦南金之報植靑藜杖滿期校東壁之書學官代回李國録誠之知賢不早聊剡需章委贄相先足鳴謙德不知所報藏去爲榮恭惟某官殖學精􅀷摛文鉅䴡早飛英於學省即中雋於儒科固知几閣之文書難屈朝廷之翰墨爲數旬客已光文學掌故之聮無幾何時果見國子先生之入比者公車之牘豈其私室之恩過辱臨存更勤巽謝某無能報國惟有薦賢慿豐隆愬飛廉雖􅀉聲之巳晚登閬風歷閶闔猶刮目以相期代回曽國正準晉司樂正益重儒官盈几閣之文書乆勤作主申庠序之孝弟茲遂得師恭惟某官賦敵凌雲文成翻水排空直上合盛之白玉之堂取􅀔斜飛亦冝在青藜之舘兹以文學之掌故入爲國子之先生佇德成而教尊必言􅀭而事舉某過勤投璧愧乏報瓊化民成俗由學乎儀圖莫助傳道授業解惑也切幸自強宫教賀聶宫教子􅄒疇庸軍計分教宫藩王事我獨賢勞恬然終嵗仁人􅁩不謀利展也自今除目一傳滿口交慶恭惟某官蓄學有􅁉掞材不貲人見其五兵之精神孰窺其一劔之肝膽長沙射鴨䄂不足以回旋郴嶺割雞氣益髙而磅礴甫通班筍又宰盤根取美最以來朝紛交章之至闕諸公之登臺省盍息吾黥此士之落江湖真令人癭爲州别駕去國期年皇帝曰嘻誰㑹廪人之岀丞相言是莫如國士之追方當楮幣新舊之交承頗覺中外人情之訌阻公能調益民得懋迁茂丕績於帝庭進嘉謀於王府㑹計當而已昔專出納之司誦􅀃云乎哉今乃範模之職於皇列邸肇建明師髙帝子孫固有殊人之龍種梁王賔客豈徒授簡於兎園必明禮義廉耻之原使知君臣父子之實庶淮南知憚汲黯而東海亦敬王尊此外功名時來則爲之耳向來斈問公烏得無情哉某辱知頗􅀷圗報失喜行行騘馬孰不知尺五之去天戢戢魚頭詎敢乞斗升而活我卷終梅亭先生四六標凖卷之十九
