body:
  text: 四六標準卷十八宋李劉撰寺監説文寺廷也有法度者也左傳疏寺司也廷有法度令官所止皆曰寺釋名嗣也治事者相嗣續于其内廣韻官之所列職有九寺漢書注凡府廷所在皆謂之寺宋朝列寺有太常宗正大理司農大府光禄衛尉太僕鴻臚謂之九寺中興光禄倂太常衛尉併兵部鴻臚併禮部後復光禄鴻臚監居懴切臨也領也宋有少府監都水監將作軍器監謂之三監淳化元年詔九寺三監國之羽儀其詳分見各題下賀黄安撫除大理少卿宋大理寺卿一少卿二丞四中興初併冗職省卿而斷刑治獄少卿各一員一統志黄伯固將樂人累官四川安撫制置使終兵部侍郎涖官行已為時所重卒諡忠簡詳啓意即其人也晉卿叢棘禮記凡聽五刑之訟成獄辭史以獄成告於正正聽之正以獄成告於大司冦大司冦聽之棘木之下鄭云棘取赤心而外刺春秋元命苞樹棘槐聽訟於其下棘赤心有刺言治人者原其心不失赤實事所以刺人其情令各歸實易係用徽纆寘于叢棘三嵗不得凶白帖大理曰棘署鄭氏綺談曰大棘晏公類要曰棘司升帥前茅見前乘八月之槎既瞻相於斗柄隋天文志相一星在北斗南詩維北有斗西柄之揭周禮注斗柄月建一辰十二月而周餘見前囘二星之部仍典領於參旗見前四履歡然文選地狹乎四履勢卑乎九伯山谷詩東盡齊四履重臨幸甚宋書始興王澹字僧逺為荆州刺史曹無留事獄無滯囚還朝人歌曰始興王人之父赴民急如水火時復來乳哺我重臨荆州男女出境迎者萬餘人其得人情如此柳詩重臨事異黄丞相三黜名慙栁士師恭惟某官負材明允見前蓄德碩膚詩公孫碩膚注碩大膚美也奫沄澄深得龍津炳靈之秀奫紆倫切水深貎文選泓澄奫潫注奫潫廻復貌李漢韓文序汙瀾卓踔奫泫澄深龍津在延平府晉雷煥得二劍于豐城一與張華一留自佩華死失劍所在其後煥子佩劍渡延平津劍躍入水化為龍故名龍津亦名劍津伯固延平人故云文選江漢炳靈扶輿鬱積繼龜山正學之傳韓文蜿蟺扶輿磅礴而鬱積詳見前一統志楊時將樂人熈寧中登進士從二程游得河洛之傳仕至工部侍郎直學士世號龜山先生龜山在將樂縣北三里山形如龜先生歸休於此因號龜山乆留金馬之坊金馬坊在成都妙斡木牛之運中兼閫制外憺戎昭憺徒濫反李廣傳威稜憺乎隣國注憺猶動也左傳戎昭果毅以聽之之謂禮逺略折衝南人不復反矣漢晉春秋諸葛武侯在南中所在戰捷聞孟獲者為夷漢所服募生致之縱使更戰七縱七擒而猶遣獲獲止不去曰公天威也南人不復反矣從臣虛位東山以公歸兮見前然河内競借於㓂恂冦恂傳車駕南征恂從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借冦君一年乃留恂長社鎮撫吏人宜闗中復留於蕭相杜詩闗中既留蕭丞相幕下復用張子房峻升金掌見前併總玉鈐玉鈐兵書歐陽公詩將論縱横輕玉鈐詳見前公去公來信有闗於輕重杜詩公來雪山重公去雪山輕時行時止俱不失其光明易艮止也時止則止時行則行動静不失其時其道光明共羡班景倩登仙之除新唐書倪若水傳時天下乆平朝廷尊榮人皆重内任班景倩自楊州採訪使入為大理少卿過州若水餞于郊顧左右曰班公是行若登仙吾恨不得為騶僕咸有樂正子為卿之喜佇盡䕶於諸將陳平傳拜以為䕶軍中尉盡䕶諸將遂進長於六官某凄其一寒去此十暑見前未問五馬二毛之無用杜詩人生五馬貴不受二毛侵最覺孤鴻獨影之可憐盧思道有孤鴻賦東坡詞縹緲孤鴻影矧熬波之素封南史張融傳漉沙搆白熬波出素史記貨殖傳無秩禄之奉爵邑之入而樂與之比者命曰素封今掃地而赤立韓文公私掃地赤立水旱重蓼蟲之苦孔衷蓼蟲賦略曰覩兹茂蓼紛葩吐榮爰有蠕蟲厥狀似螟羣聚其間食之以生悟物托事以况乎人㓜長斯蓼莫知其辛風景增蓴鱠之思見前所幸潁川黄霸之復來黄霸傳霸為潁川太守外寛内明得吏民心治為天下第一徴守京兆尹坐乏軍興貶秩有詔歸潁川太守官以八百石居治如其前前後八年郡中愈治或察夜郎李白之可念新唐書李白傳安禄山反永王璘辟為府僚佐璘起兵逃還彭澤璘敗當誅郭子儀請解官以贖有詔長流夜郎老牛䑛犢誰敢論瓜葛之連後漢書楊彪傳子修為曹操所殺操見彪問曰公何瘦之甚對曰愧無日磾先見之明猶懷老牛䑛犢之愛後漢書禮儀志上陵儀注蔡邕獨斷曰凡與先后有瓜葛者陸佃埤雅云𤓰葛皆蔓延相及故屬綿逺者取譬𤓰葛晉書王悦傳悦事親色養父導甚愛之嘗共奕棋爭道導笑曰相與有𤓰葛那得為爾邪山谷詩𤓰葛比諸從又萬事相依𤓰與葛又𤓰葛附㛰友又頗似𤓰葛相依攀又數靣成𤓰葛又向來情義比𤓰葛孤鳳求凰或亦備蘋蘩之薦司馬相如琴歌鳯兮凰兮歸故鄉遨遊四海求其凰詩于以采蘩于沼于沚于以用之公侯之事又于以采蘋南澗之濵其為頌徯罔既舖棻西京賦桑麻舖棻舖陳也布也漢門有舖首乃舖陳之義棻與紛通盛貌賀岳總領珂除大卿珂霖之子武穆王孫詳見前詳啓意除司農卿宋史理宗寶慶三年五月詔岳珂户部侍郎依前淮東總領兼制置使宋司農寺判寺事二人以兩制或朝官以上充四牡奏最九扈升班通典少皡氏以九􅟾為九農正虞之后稷周之太府秦之治粟内史漢之大農令後世大司農皆其職也詳見前王人不微夙序諸侯之上公羊傳王人者何微者也曷序乎諸侯之上先王命也漢書王人雖微序乎諸侯之上臣卿雖少有光八使之間魏書孫紹傳紹使吐谷渾還為太府少卿曾因朝見靈太后謂曰卿年稍老矣紹曰臣年雖老臣卿乃少張綱傳漢安元年選遣八使徇行風俗皆耆儒知名多厯顯位唯綱年少官次最微奏劾梁冀兄弟京師震竦邊靣驩然宋史曹彦約傳彦約以蜀之邊靣諸司竝列兵權不一作病夫議獻之廟堂稗史宋隆興初賀子忱知樞密院有武臣陳理功賞辭氣不平謂朝廷推賞一次輕如一次賀正色云只為邊靣一次近如一次武臣無辭帝心簡在恭惟某官天材敏邵地望穹華北史公孫表傳雁門李氏地望懸隔滿腹精神解千牛之肯綮撐膓文字空萬馬之躊躇竝見前豈惟建武功臣之家孫寶傳建武中録舊徳臣以寶孫伉為諸長何並傳建武中以並孫為郎後漢書論建武之世侯者百餘永平中顯宗追感前世功臣乃圖畫二十八將於南宫雲臺亦習開元供奉之曲李太白集序開元中禁中沉香亭前牡丹繁開上曰賞名花對妃子焉用舊樂命李龜年持金花牋宣賜翰林供奉李白立進清平調詞三章乆將餉指馮奉世傳奉使有指司馬相如傳宣其使指仍領价藩詩价人維藩注价甲也被甲之人謂卿士掌軍事者盍歸乎來遂登龍尾許渾詩纔歸龍尾含鷄舌更立螭頭運兎毫詳見前見知則悦聊進豹袪詩序有功而見知則悦矣袪音區説文衣袂也詩羔裘豹袪正義云袂是袖之大名袪是袖頭之小稱其通皆為袂羔裘豹袪乃在位卿大夫之服卿不同乎暫掌九功之貳尚書水火金木土榖惟修正德利用厚生惟和九功惟叙傳六府三事之功侯誰在矣亟膺一札之招詩侯誰在矣張仲孝友注侯維也其所進諸友之中維復誰在其中間矣某共飲玻璃東坡詩我家峨眉陰與子同一邦相望六十里共飲玻璃江詳見前未覿珪玠杜陵贈太常卿張均詩軒冕羅天闕琳琅識介珪視諸故府龍豬竊幸於同宫左傳士彌牟曰晉之從政者新子姑受功歸吾視諸故府家語昔者武王堯啇肅慎氏貢楛矢石砮先至欲昭其令徳之致逺物也故分陳以肅慎氏貢焉求諸故府其可得也韓詩三十骨骼成乃一龍一豬于彼新田燕雀敢稽于厦賀詩薄言采芑于彼新田于此菑畆方叔蒞止注芑菜也田一嵗曰菑二嵗曰新田三嵗曰畬新田新成柔田生長之芑肥美可食以興軍士養育其身勇武可用代囘王大卿補之盖大理卿入覲楓宸何晏景福殿賦槐楓被宸綴以萬年注漢殿前多植楓説文楓厚葉弱枝善摇升卿棘寺見前民之攸塈乆凝畫㦸之清香詩豈弟君子民之攸塈注塈息也成王以恩意及羣臣羣臣愛之不懈于位民之所以休息由此也王曰遄歸復畀青氊之舊物詩王曰還歸遄疾也餘見前恭惟某官器質膚敏詩殷士膚敏機量浚明京兆有王之歌至今未冺漢書趙尹韓張兩王傳贊自孝武置左馮翊右扶風京兆尹而吏民為之語曰前有趙張後有三王江東無卿之歎所去見思南史謝莊傳南平王獻赤鸚鵡竝詔羣臣為賦太子左衛率袁淑文冠當時作賦畢以示莊及見莊賦歎曰江東無我卿當獨秀我若無卿亦一時之傑遂隠其賦輟自銀符唐車服志高祖頒銀莵符後改銅魚符以起軍旅易守長入躋金掌見前敬爾由獄尚書式敬爾由獄以長我王國監于祥刑尚書受王嘉師監于兹祥刑民自以不寃行課明清之效于定國傳朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃尚書明清于單詞王言惟作命即登獻納之班尚書王言惟作命不言臣下㒺攸稟令某過沐幸臨更勤委重冷秋菰寒水玉覺執熱之頓清杜詩乞為寒水玉願作冷秋菰詩誰能執熱逝不以濯金錯刀英瓊瑶愧報嘉之不腆張衡四愁詩美人贈我金錯刀何以報之英瓊瑶左傳鹿鳴所以嘉寡君也敢不拜嘉柳詩憲府初收績丹墀共拜嘉説文腆多也左傳不腆之田謂不多也公羊傳不腆先君之服又不腆先君之器代囘李寺正直柄宋神宗復置大理獄後置寺正元豐五年刑部乞分評事司直與正為斷司丞與長二為議司凡斷案先上正看詳當否論難改正然後過議司覆議建炎併省冗職斷刑治獄寺正各一員拜命楓宸陞華棘正見上條好生如舜方惟刑之恤哉尚書好生之德洽于民心又欽哉欽哉惟刑之恤哉選衆舉臯則不仁者逺矣恭惟某官持心近厚折獄惟良尚書非佞折獄惟良折獄自再轉而為丞益揚淑問韓文以前大理評事言得失黜官再轉而為丞兹邑詩淑問如臯陶在泮獻囚宜片言之寤主茂進崇階車千秋傳以一言寤意某有幸為僚左傳同官為寮未遑稱慶猥辱鳴謙之賜易六二鳴謙貞吉象曰鳴謙貞吉中心得也上六鳴謙利用行師征邑國象曰鳴謙志未得也聊申叙復之私謙復卦名代囘劉寺正刑期無刑丞非余負尚書刑期于無刑韓文余不負丞而丞負余正率不正帝曰汝諧尚書帝曰兪往哉汝諧先庚具孚易先庚三日後庚三日同寅良幸某謬忝秋官之貳南豐集秩貳秋官參執邦典極深夏賀之私姑奉手牋别遲靣慶代囘李寺正直柄拜命明庭司刑贊府一麾出守所至如破竹然再轉為丞此行若登仙矣竝見前恭惟某官機神明浚陶侃傳陶公機神明鑒似魏武忠順勤勞似孔明識度端凝治已治人洞知周孔之情思見前讀書讀律又欲堯舜其君民東坡詩讀書萬卷不讀律致君堯舜終無術徧儀棘寺之華㡬致草扉之鞠文選鞠茂草於圜扉詩鞠為茂草注鞠窮也郡符既合邊瑣多驚甫清逺障之風塵旋奉殊庭之香火漢書郊祀志望祀蓬萊之屬㡬至殊庭焉師古曰殊庭蓬萊中仙人庭也東坡詩灑掃古玉局香火通帝闉王荆公詩絃歌無舊習香火有新縁又東人香火有因縁又香火靈山亦有緣又香火因緣寄此山帝念師旅饑饉之後折民惟刑尚書伯夷降典折民惟刑人思賢明慈惠之師命汝作士刑法志聖哲之上明察之官忠信之長慈惠之師師古曰長師皆列職之首也尚書汝作士肆敡芝檢檢居奄切説文書署也徐曰書函之益也三刻其上䋲緘之然後填以泥題書而印之也武帝紀主封禪有金策石函金泥玉檢謂以玉為檢束也一云俗謂燕尾今世書袠簽陳江總為南陽王讓吳郡表芝泥馳印發命開函張鶩奏章芝泥發彩宣鳳藻而騰文蘭檢浮香潤龍縑而動色按王子年拾遺記元封中浮圻國貢蘭金芝泥常以封函匣及宫門鬼魅不敢近衛青張騫皆受金泥璽封所謂芝泥蘭檢也參貳李官韻會治獄官曰理月令命理瞻傷注治獄官夏曰大理唐世系表臯陶為堯大理世為理氏紂時有逃難食李得全遂改為李管子書大理皆作理古文理與李通左傳行理之命注使人也又云行李往來國語行理以節逆之周禮小行人注亦作李漢書天文志騎官左角曰理史記天官書作李是理與李通也昔張蘊古之直聲由兹論賞唐幽州記室張藴古上大寶箴太宗嘉之賜以束帛除大理丞貞觀五年河内人李好徳有心疾為妖言藴古按之奏好徳實被疾不當坐治書侍御史權萬紀劾其阿縱太宗怒斬之今云論賞不知所謂雖狄梁公之相業自此升階新唐書狄仁傑傳遷大理丞嵗中斷乆獄萬七千人時稱平恕左威衛大將軍權善才右監門中郎將范懷義誤斧昭陵栢罪當免高宗詔誅之仁傑力諍帝意解遂免死數日授侍御史欲識逺圖當觀近比某與聞犴獄犴或作豻説文胡地野狗韻㑹獄曰犴犬所以守故謂獄為犴詩宜犴宜獄今文作岸毛傳岸訟也韓詩鄉亭之獄曰豻揚子狴犴使人多禮似是馬曹晉書王徽之字子猷性卓犖不羈為桓沖騎兵參軍沖問卿署何曹對曰似是馬曹又問管㡬馬曰不知馬何由知數又問馬比死多少曰未知生焉知死具嚴天威望盡心于閱實尚書無簡不聽具嚴天威墨辟疑赦其罰百鍰閱實其罪頗哀老子或袖手以蒙成馬援傳頗哀老子使得遨遊薛宣傳屬縣各有賢君馮翊垂拱蒙成少遲九遷文選千秋一月九遷荀爽十句逺至詳見前當不一賀代囘陳寺丞振方欲取違先勤言别出處亦吾輩之常事是非至他日而後明賈模傳充年衰疾劇恒憂已謚傳模曰是非乆自見不可掩也風雨瀟瀟願雞鳴之不爽詩風雨瀟瀟雞鳴膠膠既見君子云何不瘳注瀟瀟暴疾也言風而且雨寒凉瀟瀟然雞以守時而鳴聲音膠膠然喻君子雖居亂時不改其節詩序風雨思君子也亂世則思君子不改其度焉霜雪貿貿終麥秀以何疑韓文猗蘭操霜雪貿貿薺麥之茂子如不傷我不爾覯注貿貿不明也言我如薺麥之茂當霜雪之時不改其操敢因報章并申善禱代囘呂寺丞祖平奏最竹符文帝紀與郡守為銅虎符竹使符注竹使符皆以竹箭五枝長五寸䥴刻篆書第一至第五與郡守為符者各分其半右留京師左以與之陞華棘寺辟以止辟九重之念在兹尚書有弗若于汝政弗化于汝訓辟以止辟乃辟丞不負丞三尺之平必矣杜周傳不循三尺法注以三尺竹簡書法律也恭惟某官象賢濟美見前燕譽騰芳詩慶既令居韓姞燕譽燕安譽樂也伯仲塤篪曲突之忠甚切詩伯氏吹壎仲氏吹篪霍光傳客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患公侯閥閲直鈎之釣猶遲楚詞以直針而為鈎維何魚之能得詳見前兹從漢化之更董仲舒傳為政而不行甚者必變而更化之乃可行也宜有吕刑之命尚書惟呂命王享國百年耄荒度作刑以詰四方某辱同寮寀爾雅寮宷官也郭璞注同地為宷同官為寮疏寀采也采取賦税以供喜倍等倫甘延夀傳絶於等倫杜詩尊榮邁等倫自此蒙成不負嘉師之託逃於司敗亦惟餘潤之依並見前囘大理沈寺丞繹乆參棘屬進貳李官見前丞不負丞益懋平反之績劉德傳每行京兆事多所平反罪人蘇林曰反音幡幡罪人辭使從輕也雋不疑傳有所平反活㡬何人辟以止辟助成欽恤之仁見上條某有幸為寮未遑趨慶末四句同後代囘沈評事宋初評事為京官寄禄視後來承事郎隆興二年詔評事以八員為額以雷霆號令星斗文章為號榮持邑最歸領廷評惟丹筆之詳刑後漢書劉愷傳以輕從重懼及善人非先王詳刑之意也注書曰有邦有土告爾詳刑鄭𤣥注詳審察之也王粲從軍行凉風厲秋節司典告詳刑晉書元帝紀布帳練帷詳刑簡化新唐書百官志大理寺掌折獄詳刑龍朔二年改曰詳刑寺學齋佔畢云先師鶴山在遂寧漕廨作極堂碑時攝憲書詳刑字余後繼忝漕節重新極堂仍立鶴山之碑一時僚屬咸疑詳刑字以為尚書呂刑篇吿爾祥刑監于兹祥刑只作祥字余因謂之曰唐百官志改大理正為詳刑大夫固已用此詳刑字然不為無所本也周禮太宰之職五曰刑典以詰邦國䟽引書曰度作詳刑以詰四方今古文尚書無詳字然出經注亦可通用也今按後漢書選詩晉書又在賈疏之前則詳刑二字其來乆矣實青氊之舊物頭銜如故談苑官銜之名當時選補授須存資厯開奏之時先具舊官名品於前次書擬官於後使新舊相銜不斷故曰官銜亦曰頭銜如人口銜物取其連續之義如馬有銜以制其首前馬以進後馬續來相次不絶古人謂之銜尾相屬即其義也歩武已高説文歩行也禮記執轡然後歩爾雅堂下謂之歩歩布也白虎通德論人踐三尺法天地再舉足曰歩猶陰陽也爾雅武迹也詩履帝武敏歆毛傳武迹也曲禮堂上接武堂下布武錢氏云每移足半躡之中人之迹尺二寸恭惟某官服襲芳馨蜚騰聲實早脱囊中之穎俱見前詳明柱後之文張敞傳當以柱後惠文彈治之耳秦時獄法吏冠柱後惠文武意欲以刑法治梁棘寺參華竹書惟允漢書注以三尺竹簡書法律詳見上條胡文恭制用除棘路之丞往治竹刑之讞又用進丞于棘路往治讞于竹刑屬拘邦典暫試民庸麥熟兩岐雖道途之交詠束觀漢記張堪為漁陽太守勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支桃栽千樹宜車馬之重來劉禹錫詩𤣥都觀𠂻桃千樹盡是劉郎去後栽又種桃道士今何處前度劉郎今又來某有幸為寮未遑贊慶周禮大行人賀慶以贊諸侯之喜張于湖集嘗附啓緘少陳贊喜贊助也遣長鬚而致雙鯉良感先施韓詩先生有意許降臨更遣長鬚致雙鯉跂織女而終七襄更慙匪報見前代囘大理樓評事澄舉賢有格當簡乃僚尚書慎簡乃僚折獄惟良徒得君重見前公車之牘晩矣史記滑稽傳東方朔初入長安至公車上書凡用三千奏牘私室之謝何哉羊祜傳拜爵公朝謝恩私門吾所不取恭惟某官地望已高北史公孫表傳雁門李氏地望懸隔天資仍茂讀書不讀律懼無術以致君東坡詩讀書萬巻不讀律致君堯舜終無術治已後治人寧以身而試法法言先自治而後治人之謂大器王尊傳為安定太守出教告屬縣曰願諸君卿勉力正身以率下明慎所職母以身試法决科雋甚詳讞瞭然豈無他人恐未如於一鶚惠而好我何不吝於雙魚竝見前某濫貳秋卿又見春序小狐汔濟亦奚事於聽冰易未濟亨小狐汔濟濡其尾無攸利文帝紀狐疑師古曰狐之為獸其性多疑每渡冰河且聽且渡故言疑者而稱狐疑郭縁生述征人北風勁河水始合要須狐行云此物善聴聴氷下無水聲然後過河良馬空羣望自期於追電崔豹古今注秦始皇有七名馬追風白兎躡景追電飛翮銅爵晨鳬代囘程監丞凖以下二條盖囘致仕及祠禄者亦未審是何監丞簿姑缺之五雉分工誤恩攝長左傳五雉為五工正阮籍傳乞囘謬恩以光清舉陳後山詩將老蒙誤恩受弔不受賀詳見前雙魚尺素取數過情見前恭惟某官四海老成詩雖無老成人尚有典刑累朝耆舊人生待足何時足得住為佳僧晦菴滿江紅詞擾擾勞生待足何時是足據見在隨家豐儉便堪龜縮辛稼軒長短句宦遊吾倦矣玉人留我醉明日落花寒食得且住為佳耳升菴詞品云天氣殊未佳汝定成行否寒食近且住為佳耳此晉無名氏帖中語也語本入妙而詞又融化之可謂珠璧相照矣官職有來還自來不聞亦式遯齋閒覽王易簡云青山得去且歸去官職有來還自來是豈能須㬰忘情於軒冕耶余嘗見人題壁云浮生待足何時足未老得間方是閒深味其言服其精當詳見前應笑戀軒之疲馬鮑昭詩疲馬戀君軒未能返肆於屠羊某自揣頭顱並見前難司喉舌詩惟仲山甫王之喉舌匪朝伊夕即騰納禄之章張子湖集趣召來歸匪朝伊夕為官擇人空忍見賢之渴魏志杜恕傳以此推之知國家以人擇官不為官擇人也晉書郭黙傳時當為官擇才若人臣自擇官安得不亂乎新唐書陽嶠傳嶠舉八科皆中御史中丞桓彥範袁恕已争取為御史楊再思素與嶠善知其意不樂彈抨事語彥範彥範曰為官擇人豈待情樂乎山谷詩空餘見賢心忍渴待梅嶺蜀志武侯傳總攬英雄思賢如渴代囘程監簿凖出命明庭祝釐閒館文帝紀祠官祝釐注釐福也音同禧甘泉賦珍臺閒館雋永乎山林之味樂且無央蒯通傳通論戰國時説士權變亦自叙其説凡八十一首號曰雋永師古曰雋音字兖反肥肉也永長也言其所論甘美而味深長也央於良切説文乆也已也王逸注楚辭云盡也詩夜未央箋云未渠央也梁元帝詩舉杯聊轉笑歡兹樂未央參寥乎香火之縁老當益壯莊子𤣥冥闈之參寮參寮聞之詩疑始注參高也高逺寥曠不可名也劉禹錫魚書曾㬱代香火有因縁東坡詩灑掃古玉局香火通帝闉王荆公詩絃歌無舊習香火有新縁又東人香火有因縁又香火靈山亦有縁又香火因縁寄此山馬援傳丈夫為志窮當益堅老當益壯恭惟某官棲遲盛福詩衡門之下可以棲遲笑傲明時詩謔浪笑傲劉仙倫詞笑傲煙霞裏詔祿珍臺又拜散人之號見前飬神丹鼎應與造化者遊莊子上與造物者遊而下與外生死無終始者為友所恐蒲迎不容橘隠見前某歸已晩矣行或使之汗漫相期本許以急流之勇退淮南子盧敖遊大海至蒙谷之上見一士巻龜殻而食蛤蜊敖曰夫子可與敖為友矣士笑曰我方南遊乎㒺䍚之野北息乎沉嘿之鄉西窮冥冥之里束貫洪濛之光吾與子汗漫遊於九垓之上乃舉臂聳身入雲中敖仰視曰吾比夫子猶黄鵠與壤蟲也杜詩復見陶唐理因成汗漫遊餘見前侏儒強飽敢乆於暮夜而倒行史記伍子胥傳吾日暮塗逺吾故倒行而逆施之主父偃傳吾日暮故倒行逆施之師古曰此語本出伍子胥偃述而稱之代回軍器王監簿渥軍器監始于後周武帝四年唐武德初置貞元後省天寶六年復置宋初領于三司胄案官無專職熈寜六年廢冑案乃按唐令置監擇從官總判元豐正名分案五所隸官屬四東西作坊掌造兵器旗幟戎帳行物卞其名也建炎歸併工部紹興復置長貳各一員隆興初詔軍器已隸工部本監惟置丞一員乾道後置監少監及簿淳熈初詔戎器非進入毋輒出所由是呈驗寖省嘉定以後事最稀簡特為儲材之所對越宸綸勾稽武庫通典主簿謂主諸簿自漢有之掌付事勾稽省署抄目朝野僉載怯斷大事好勾小稽羅隠詩朱篆勾稽官六典軍器監掌繕造甲弩之屬辨其名物審其制度以時納於武庫為太守選所表既有交章循吏傳選諸所表以次用之注所表謂增秩賜金爵也除戎器戒不虞亶為稱職易澤上於地萃君子以除戎器戒不虞注聚而無防則衆心生公議如此私謝何為談賓録唐證聖中劉竒為侍郎注張文成司馬鍠為御史二人因申屠瑒以謝竒正色曰舉賢無私何見謝恭惟某官故家典刑中州胄出李詩我李百萬葉柯條布中州冑説文𦙍也從肉由聲介冑之胄從月音胃周語晉人殺懷公無冑注胄後也出生也左傳康公我之自出爾雅男子謂姊妹之子為出公羊傳接菑晉出也貜且齊出也注出外生也婉贊幕中之畫選詩婉婉幕中畫勇分海上之符焉能使予不遇哉姑從外補安帝紀永初二年詔上尚書公府通調令得外補唐書馬周傳或京官不稱職始出補外山谷詩補外儻天幸有欲為王留行者迄得内除時雖既戢於干戈法合咸精於器械小煩㑹計㑹即騫騰某自歎望秋世説顧悦與簡文同年而髮早白簡文曰卿何以先白對曰蒲栁之姿望秋而落詳見前未遑賀夏豈無青精飯此心惟切於謀歸杜詩豈無青精飯使我顔色好贈我緑綺琴無説可從而厚報見前囘朱司令在宋史在熹之子紹定中為吏部侍郎詳見前宋元豐三年詔藉田令隸太常寺渡江初缺紹興十五年初除康與之為藉田令三十一年罷後復置渙奉宸綸晉司帝籍東京賦修帝籍之千畆山谷詩帝籍開千畆農功先九州用過庭所學之禮習祈年孔夙之詩詩祈年孔夙方社不莫注我祈豐年甚早祭四方與社又不晚有渥新除式光舊德申屠剛傳贊任敖以舊徳用班固西京賦士食舊徳之名字東坡詩高才食舊徳恭惟某官清門偉望名世故家先正接伊洛之宗源流甚正宋史道學傳黄幹曰由孔子而後曽子子思繼其微至孟子而始著由孟子而後周程張子繼其絶至熹而始著識者以為知言所著有伊洛淵源行于世後學出河汾之泒沾匄居多文中子世家隋季文中子之教興於河汾雍雍如也新唐書杜甫傳贊殘膏賸馥沾丐後人多矣卒老於行進學解孟軻好辯孔道以明轍環天下卒老于行克昌厥後詩燕及皇天克昌厥後鄭箋云文王之徳安及皇天謂降瑞應無變異也又能昌大其子孫故從緑水紅蓮之幕見前入庀紺轅黛耜之司庀音嚭治也又具也左傳官庀其司潘岳藉田賦蔥犗服于縹軛紺轅綴于黛耜儼儲駕於㕓左俟萬乘之躬履此非不稼而取禾詩不稼不穡胡取禾三百㕓兮政欲敷菑而肯播尚書若稽田既勤敷菑又厥父菑厥子乃弗肯播矧肯穫少培飛歩即輅華塗某偶此綴班六一居士詩玉殿清霜綴曉班東坡詩他日許綴蓬萊班又豈意彤庭綴兩班何勤委贄自憐往日識野鶴於未仙東坡詩何人更識嵇中散野鶴昻藏未是仙猶喜殘年見名駒之有種説文馬二嵗曰駒三嵗曰駣代回詹大社允中宋嘉祐元年置郊社令命石祖元為之熈寜元年郊社局令張伯世言令有郊社名而不主四郊之事於是始主四郊壇壝之事渡江初缺紹興十九年始除韓彥直為太社令請給竝依五監主簿例陞華司社贊治容臺太社令太常屬官惟是詩書禮樂之儒始明籩豆簠簋之事用人如此三國志毛玠傳為束曹掾太祖歎曰用人如此使天下人自治吾復何為哉通國欣然恭惟某官奮自清門徑收名第竝見前下帷分教不辭獨冷之氊董仲舒傳孝景時為博士下帷講誦弟子傳以乆次相授業杜詩廣文先生官獨冷又坐客寒無氊當路交章爭取横前之寶韓文不忍竒寶横棄道側果從蜀道入典漢祠通典漢有太祝令屬奉常景帝改為祠祀武帝更曰廟祀梁有明堂太社二令拜如絲如綸如綍之言實自今始見前攷以松以栢以栗之義應有古心某有幸識賢過蒙委贄數旬為客㑹已見於榮遷舊唐書皇甫公義檢校沛王府長史引韋思謙為同府倉曺謂思謙曰公豈池中之物屈公為數句客以望此府耳一日不齋猶願安於承教應劭漢官儀北海周澤字雉都為太常恒齋有疾其妻憐其年老被病闚内問之澤大怒以為干齋掾吏叩頭爭之不聽遂收送詔獄並自劾謝諺曰居世不諧為太常妻一嵗三百六十日三百五十九日齋一日不齋醉如泥既作事復低迷代回趙太社汝讜宋史趙汝讜字蹈中少俶儻有軼材智略出人上與兄汝談齊名天下稱為二趙以從臣薦監行在右藏西庫忤韓侂胄被斥生廢十年以前官改鎮東軍登嘉定元年進士第為太社令遷將作監簿大理司農丞與史彌逺不合請外改湖南提舉常平易江西尋提㸃刑獄遷知温州卒汝讜常言宗子不忘君孝子不辱身臨難則功業當如朱虚立身當如子政庀司太社贊治奉常見前舍文字㫄午之勞霍光傳使者㫄午如淳曰㫄午分布也師古曰一縱一横為㫄午猶言交横也學林云古篆五字象陰陽六爻之義午字亦取此義周禮壺涿氏掌除水蟲若欲殺其神則以橭午貫象齒而沉之鄭氏注午故書為五交五貫于橭水之上也故書别本作五則午五通用明矣史言㫄午者四方八達皆通亦縱横交五之義也共夙夜惟寅之命見前恭惟某官九苞威鳳論語摘襄聖鳯有九苞一曰口苞含不妄鳴也二曰心合度進退精也三曰耳聽達居高明也四曰舌詘伸能變聲也五曰彩色光文彩呈也六曰冠矩朱南方行也七曰距鋭鉤武可稱也八曰音激揚聲逺聞也九曰腹文户不妄納也漢宣帝地節二年鳯集魯郡羣鳥從之詔曰威鳳為寶服䖍曰威鳯鳥名也晉灼曰鳳之有威儀者也與尚書鳯凰來儀同意杜詩威鳯高其翔長鯨吞九州千里名駒漢書劉德字路叔有智略召見甘泉宫武帝謂之千里駒北齊書馮翊王潤字子澤神武第十四子㓜時神武稱曰此吾家千里駒也東坡詩未應良木棄大匠要使名駒試千里詳見前抱朱虛之忠請鉏呂產高五王傳朱虚侯章有氣力忿劉氏不得職嘗入侍燕飲酒酣章曰請為太后言耕田高后兒子畜之笑曰顧乃父知田耳若生而為王子安知田乎章曰臣知之深耕穊種立苗欲䟽非其種者鉏而去之吕禄吕產作亂章先斬吕產太尉勃等乃盡誅諸吕笑紅休之陋更媚王音劉歆傳遷中壘校尉封紅休侯王莽傳封少阿羲和京兆尹紅休侯劉歆為國師嘉新公元后傳以侍中太僕音為御史大夫列于三公音太后從弟長樂衞尉𢎞子吕產王音盖指韓侂胄侂胄高宗憲聖慈烈皇后女弟之子毅然料虎之頭料音聊莊子料虎頭編虎須㡬不免虎口哉樂只䟦狼之尾詩樂只君子注只之言是也樂是有德之君子又狼䟦其胡載㚄其尾注䟦躐㚄跲也老狼有胡進則躐其胡退則跲其尾進退有難然而不失其猛忠精既白論諫如丹徑咨禮樂之英叙傳河間賢明禮樂是脩為漢宗英入司籩豆之事雝雝肅肅何嫌三百日之齋詩有來雝雝至止肅肅餘見上條親親賢賢行有十六相之舉史記高陽氏有才子八人世得其利謂乏八愷高辛氏有才子八人世謂之八元此十六族者世濟其美不隕其名舜舉八愷使主后土舉八元使布五教於四方某未遑旅賀先辱臨存嚴助傳使重臣臨存注存謂省問之旅臨卦名贈緑綺琴愧不辦南金之報見前植青藜杖滿期校東壁之書李泌傳東壁圖書之府晉天文志東壁二星主文章天下圖書之祕府也餘見前學官國子正録宋大觀初置掌行學規紏不如規者罰之紹興十三年詔正録各置一員代回李國録誠之知賢不早聊剡需章剡以丹切爾雅剡㗉利也易剡水為矢法言奏不剡蔡邕獨斷章者需頭奏者亦需頭表者不需頭詳見前委贄相先足鳴謙德易鳴謙貞吉需謙卦名不知所報藏弆為榮見前恭惟某官殖學精深摛文鉅麗見前早蜚英於學省新唐書歸崇敬傳天子學曰辟雍故前世或曰璧池或曰璧沼亦言學省文選沈休文有學省愁卧詩注學省國學也山谷詩學省得佳士又學省非簿領又學省困韲鹽即中雋於儒科左傳得雋曰克又以中雋也或作儁固知几閣之文書刑法志文書盈於几閣難屈朝廷之翰墨為數旬客已光文學掌故之聯儒林傳能通一藝以上補文學掌故缺餘見代回詹大社條無幾何時果見國子先生之入比者公車之牘豈其私室之恩過辱臨存更勤㢲謝竝見前臨㢲卦名某無能報國惟有薦賢吳良傳為國所重必在得人報恩之義莫大薦士憑豐隆愬飛亷雖寄聲之已晚豐隆雲師飛亷風伯離騷經吾令豐隆乘雲兮吕氏春秋應劭注飛亷神禽能致風氣晉灼注飛亷鹿身頭如雀有角而蛇尾豹文趙廣漢傳界上亭長寄聲謝我栁文黄鵠一去青冥無極安得不憑豐隆愬飛亷以寄聲于寥廓耶登閬風厯閶闔猶刮目以相期離騷經登閬風而絏馬又倚閶闔而望予司馬相如傳排閶闔而入帝宫兮又登閬風而遥集兮吕蒙傳注士别三日即更刮目相待代回曽國正準晉司樂正禮記樂正崇四術立四教順先王詩書禮樂以造士益重儒官成帝紀儒林之官四海淵源盈几閣之文書乆勤作主見前申庠序之孝弟茲遂得師恭惟某官賦敵凌雲司馬相如傳相如既奏大人賦天子大説飄飄有凌雲氣游天地之間意文成翻水韓詩文如翻水成初不用意為排空直上合盛之白玉之堂史記玉堂璧門西都賦金華玉堂西京賦宣室玉堂杜詩上君白玉堂陳後山詩小却盛之白玉堂取勢斜飛亦宜在青藜之館劉禹錫詩青雲直上無多路却作斜飛取勢回餘見前兹以文學之掌故入為國子之先生竝見前將德成而敎尊禮記君子曰德德成而教尊教尊而官正官正而國治君之謂也又天子之為樂也以賞諸侯之有德者也德盛而教尊五榖時熟然後賞之以樂必言揚而事舉禮記凡語于郊者必取賢斂才焉或以德進或以事舉或以言揚某過勤投璧愧乏報瓊見前化民成俗由學乎儀圖莫助禮記君子如欲化民成俗其必由學乎傳道授業解惑也切幸自強見前宫教宋太宗至道元年以員外郎孫蠙充皇姪皇孫教授從所號也真宗咸平元年以朱昻兼南宅教授張蔚兼北宅教授南宫者太祖太宗諸王之子孫處之所謂睦親宅也北宫者魏悼王子孫處之所謂廣親宅也崇寧五年又改稱某王宫宗子博士位國子博士之上靖康之亂宗學遂廢紹興四年始復置諸王宫大小學教授二員隆興省其一嘉定九年十二月復始置宗學改教授為博士旋有㫖復存諸王宫大小學教授一員賀聶宫教子述疇庸軍計栁文皇天疇庸審厥保承分教宫藩王事我獨賢勞恬然終嵗仁人誼不謀利展也自今董仲舒傳仁人者正其誼不謀其利明其道不計其功詩允矣君子展也大成注展誠也周禮疏展者言之誠除目一傳滿口交慶梁宣帝宋鮑昭梁范雲陳沈烱俱有建除詩此聯亦取除滿相對恭惟某官蓄學有裕掞材不貲掞舒贍切舒也盖寛饒傳用不貲之身注貲與資同詳見前人見其五兵之精神孰窺其一劔之肝膽俱見前長沙射鴨袖不足以回旋射鴨言為尉孟郊為溧陽尉開射鴨堂詳見前漢景帝後二年諸王來朝有詔更前稱夀歌舞長沙定王但張袖小舉手左右笑其拙上怪問之對曰臣國小地狹不足囘旋郴嶺割雞氣益高而磅礴割雞言為令韓文衡南八九百里地益高山益峻水清而益駛其最高而横絶南北者嶺郴之為州在嶺之上測其高下得三之二焉中州清淑之氣于是焉窮氣之所窮盛而不過必蜿蟺挟輿磅礴而鬱積甫通班筍楊誠齋詩合於玉筍班中立却向紅蓮幕裏行詳别見又宰盤根虞詡傳不遇盤根錯節何以别利器乎取美最以來朝紛交章之至闕諸公之登臺省盍息吾黥莊子夫堯既黥汝以仁義而劓汝以是非矣庸詎知夫造物者之不息我黥而補我劓使我乘成以隨先生耶山谷詩飬生息天黥餘見前此士之落江湖真令人癭説文癭頸瘤也么郢切山谷送李德素歸舒城詩天恢獵德綱日饎養賢鼎此士落江湖熟思令人癭三國志注賈逵在𢎞農與典農校尉爭公事不得理乃發憤生癭為州别駕去國期年皇帝曰嘻誰㑹廪人之出韓文皇帝曰嘻無汝煩苦周禮廪人掌九榖之數以待國之匪頒賙賜稍食以嵗之上下數邦用以知足否以詔榖用以治年之凶豐丞相言是莫如國士之追灌夫傳丞相言亦是唯明主裁之韓信傳蕭何聞信亡不及以聞自追之上罵曰諸將亡者以十數公無所追追信詐也何曰諸將易得至如信國士無雙方當楮幣新舊之交承頗覺中外人情之訌阻公能調益民得懋遷尚書懋遷有無化居茂丕績於帝庭尚書嘉乃丕績進嘉謀於王府會計當而已㫺專出納之司誦説云乎哉今乃範模之職文中子學者博誦云乎哉必也貫乎道文者茍作云乎哉必也濟乎義法言師者人之模範也於皇􅍌邸詩於皇時周詳見前肇建明師高帝子孫固有殊人之龍種杜詩高帝子孫盡隆準龍種自與常人殊春秋合誠圖云堯母慶都生大石中常有黄雲覆盖之及年二十出觀三河之首有赤龍與慶都婚有娠生堯宋志漢高帝父曰劉執嘉其母夢赤馬若龍戲已而生執嘉漢高帝紀母媼嘗息大澤之陂是時雷電晦㝠父太公往視則見交龍于上已而有娠遂產高祖又云漢帝本系出自唐帝龍種之説盖本諸此梁王賓客豈徒授簡於兎園謝惠連雪賦嵗將暮時既昏寒風積愁雲繁梁王不悦遊於兎圍俄而微霰零密雪下授簡於司馬大夫曰為寡人賦之必明禮義亷恥之原管子國有四維一曰禮二曰義三曰亷四曰恥使知君臣父子之實庶淮南知憚汲黯汲黯傳淮南王謀反憚黯曰黯好直諫守節死義至説公孫𢎞等如發蒙耳而東海亦敬王尊王尊傳遷東平相是時東平王以至親驕奢不奉法度雅聞尊高名大為尊屈酌酒具食相對極驩此外功名時來則為之耳向來學問公烏得無情哉某辱知頗深聞報失喜杜詩似聞胡騎走失喜問京華尹師魯云失喜言出于不自覺行行驄馬孰不知尺五之去天見前戢戢魚頭詎敢乞斗升而活我盧仝詩但見萬國赤子戢戢魚頭生杜詩小魚脱漏不可紀半死半生猶戢戢餘見前四六標準巻十八
