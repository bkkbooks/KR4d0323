  - {type: variant, offset: 10829, length: 299, content: 曲江池在今西安府東南十里漢武帝所鑿其水曲折似嘉陵江因名唐開元中疏鑿為勝境都人遊賞盛於中和節江邉菰蒲蔥翠桞陰四合毎錫燕臣僚㑹于山亭池備綵舟唯宰相三司北省官翰林學士登焉宋張禮遊城南記云江以水流屈曲得名其深處下不見底司馬相如賦曰臨曲江之隑洲蓋其地也劇談曰曲江本秦隑洲唐開元中疏鑿為勝境歐陽詹曲江記畧曰此地循原北峙迴岡旁轉圓環四匝中成坎窞窙窌港洞生泉翕源東西三里而遥南北三里而近崇山濬川鉤結盤䕶不南不北湛然中停蕩惡含和厚生蠲疾涵虗抱景氣象澄鮮滌慮追歡棲神育靈觀此可以得其槩矣唐劉滄及第後宴曲江詩及第新春選勝遊杏園初宴曲江頭紫毫粉壁題仙籍栁色簫聲拂御樓霽景露光明逺岸晚空山翠墮芳洲歸時不省花間醉綺陌香車似水流, SBCK: ''}
