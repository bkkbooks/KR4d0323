front:
  text: 六標凖卷之九
  hash: sha256:03225bec6a10e736632ee4c7cd6e1206f19e153e5acba8ca83d350fd769e8cf9
body:
  text: 謝辟置再辟制幹入蜀謝丞相遮曰而走長安幾穿破履登天而攀蜀道忽得舊氊知坱圠之無垠難趑趄而不進輙修贄見併吐謝􅂨伏念某骯髒亡竒雎盱有志一科不補墮身溝瀆之尋常萬物皆塵妄意簡編之尺寸繇頃年之從辟抵中道而遭艱跨海渉湖痛尤未定捫參歷井夢不敢尋故因祥除甘就部闕適於西清之衆論許爲東閣而一言遂令索米之人或動乞漿之興鬻璞而售乾璞誰適爲容翹材以待大材汝非所及猶頼益州之元德尚思吳下之阿蒙羅而致之兆足行矣幾葬魚腹固甞回孝子之車又過羊腸益合叱忠臣之馭切聞殿西之顧頗及雲南之師要是四蜀之可憂殆匪一端而遽止雖托重固在詩書之帥然㧞尤宜得文武之才置諸鄒枚之間蓋有禕允之任豈應庸下可在選中伏遇某官身佩安危功存開濟獨揮九日再爲天地以立心八荒一雲復令山澤之通氣行政如彼其乆樂不存焉當今捨我其誰聖之任也粤從更化專務調元三階既平元首有股肱之喜五胡方擾中國無疥癬之憂然欲折千里之衝是必開衆正之路得人朝廷得人幕下寕有重輕誠死城郭誠死封疆要加儲飬如有所試俾勉此行某敢不體認一陶攀縁九折堪其事者謂之力藉莫酬相國之知逺而使之觀其忠詎敢作衆人之報謝董制置居誼辟充成都撫幹簿領抗塵自分湘濵之憔悴帥幢辟属許令蜀道之攀縁初無待於懇祈便力爲之振㧞請裁四六少謝萬分切觀我宋帥蜀之臣無若後趙前張之懿忠定之薦辟必方廉恬退之人清獻之奏惕皆骨鯁敢言之士欲濟其美在簡乃僚伏念某殖學不豐聞道尤淺怵於爲飬強營三釡之謀拙不適時竟墮一科之底謂屠龍之可學又􅀞虎之不成孫寳安得自髙且棲矮屋王珣能令公喜偶傍轅門其實出朱入墨之材終非泛緑依紅之器駭從臣之出牧指尊選以見招我猶未免鄉人固應累陶鎔之造翁真善幹國事何至湏斗筲之材聞已牋閶闔之風欲共泛瞿塘之水成都萬事好每歌誰能委珪幣之詩長沙千里平恐發忍着主衣裳之笑進退維谷傴僂循墻及見文移不容控避鮑叔真能知我他復誰知政身未可許人盍爲公許恭惟某官含弘光大明允篤誠親結冕旒進儀筆槖晝日三接而天心黙契終嵗九迁而人望尚奢一節使燕言靣無幾微之見三刀夢益氣色歸號令之明欲擇幙賔必先朝彦况幾兩幾駟而出定多驥尾之攀何一琴一􅀛之餘亦取鶴翎之短以識字有數爲敏贍淹該之學以多言數窮爲貫穿通逹之材自視歉然公言過矣然已入朝取良馬之數難更作夕避長蛇之疑某敢不澡雪此心鞭磨所學銘諸肺腑惟國士遇之國士報之借以齒牙乃執事事也執事責也縱使盡無用於世亦將求不辱其門舉李生何辭當謹佩愛直之贈爲董公從事豈但陪合樂之嬉代趙主簿希坡謝衛參帥辟撫属黄綬抗塵幸蒙恩而受代碧幢率属辱剡奏以充貟雖未占天問之果酬豈不假人言而後得頂踵皆歸於特逹肺肝倍激扵輪囷伏念某名爲皇宗實本素士先人存趾甞首列於儒科元舅拊頭謂必成於宅相遭家多難欲仕無津躡屩擔簦輕别家園之松菊懐鈆抱槧甘依學舎之虀塩偶爾登名漫而試吏㑹計而已初無出位之思名實未加濫􅀼代庖之譽不堪位置何足控摶泰堦六符忽擁旄麾而至明堂一柱不遺扂楔之微曲假存全屢令任使及􅀲而代詎希東閣之留繞木何依空結南枝之戀不圖裁鍳忽辱薦揚錐之處囊中初無見頴羅而致幕下欲使空羣重惟蟣蝨之官夐乏蚍蜉之援一齊衆楚豈能回莊岳之音九舜十堯不敢望隆冬之榖知賢而舉惟断乃成縱􅀉牋閶闔之風未知利鈍然銘心泰華之石豈易銷磨伏遇某官四海真儒三朝舊弼文章有再見武公之賢招選無遺一洗將軍之陋自元戎十乗之啟至長沙千里之平苟有寸長悉入大鈞之播不遺餘力復收小子之狂欲令奔走於顔行力借吹噓而送上萬一所請或不見却㝷常之恩豈可並言某敢不銘佩異知激昂晚節將母來諗身雖未可以許人懐德惟寕士固必伸於知己代盧尉仲雋謝諸司辟知資興縣箠楚塵埃之徼福偶幸代更繭絲保障之謀人猥勤特辟戴使天之私覆循材地以中慙惟義郴據楚之上流而資興號晉之古縣數百年瓦礫之迹猶有刼灰五六載鋒鏑之餘肇稱新邑俗多䑕嘯財欠鬼輸欲其賣劔以買牛相與抱孫而歌犢是在撫字之職宜得通練之材歷數部封何限囊中之頴豈期庸委遂蒙送上之嘘雖未占天問之果酬然敢不星言而夙駕伏念某起於寒逺持是空踈三年飲墜露於湘濵一念繞落霞於滕閣下車攘臂敢嬰搏虎之嘲學道愛人難奉割雞之笑不虞製錦輙使代庖此蓋伏遇某官大鈞無垠小善必録耻納溝不被其澤欲惠逺黔出推轂有味之言不遺寒素或者封囊之露許還假印之真借以聲光寛其轡䇿某敢不力摩凋俗盡布教條不鄙夷其民當使鳥言夷靣之俗事慈惠之帥如在熊旂金節之前舉自代謝李侍郎􅐉舉自代玉堂圖舊趣四軰以來宣寳閣冠班舉匹夫而爲代止流言於智者發􅐹記而信然感固感於相知慙則慙於不稱竊以伯禹固遜于后稷曷甞稽首于殳斨宣尼謂不如顔淵何與及肩之子貢蓋惟善能舉其類然擬人必以其倫未聞取原隰馳驅之夫謂可備軒墀供奉之數鳯􅀆巢閣方將揚覧德之輝馬也守閭正恐累知人之鍳伏念某嶔﨑萬狀拓落一官器窳識凡安能超卓學荒術陋何有深醇當先皇之末年教胄子者數月一鳴輙斥剌天不羡於羣飛四國于宣見雪幸逃於衆吠十暑貫岷山之葛一寒仍范叔之袍乏四騏四駱之咨諏端方烏有無一鶴一􅀛之風采登按何功豈謂我家侍郎之賢曲念吾宗孫子之老惟學士學先王之道况敷文敷國典之華两命以起知章足爲光寵一字之拔叔夜却恐麄踈德不待於成身士固伸於知己此蓋伏遇某官四朝元老一世真儒奉命任危難之間固國還封疆之界南人不復反矣東山以公歸􅀆然神旗㦸纛既乆長於魏師則光禄金紫當即封於晉國走卒知司馬頋今領嵩陽崇福之宫胡兒問大蘇亦知起元祐眉山之學宜煩泥檢來趣脂車幸舎人之治裝副天子之虛佇帝乃誕敷文德正藉臣鄰王惟圖任舊人遹登丞弼藉令念小草之有逺志何至引老芋而替伏神某敢不衘佩異知磨礲晚節集賢以待侍讀固使臣不敢與聞征夫豈不懐歸願君子惟能通志代回董惠州居􅁩謝舉自代咨垂共工自當申稽首之遜舉康自代得無笑炙背之䟽衘䄂惠然開緘愧甚恭惟某官有致逺之器無欲速之心屢薦不入官姑取一麾而去三宿而出晝無勤千里之追難進易退我不如見賢不薦誰當耻聊復尔耳止或尼之某欲爲王留徒得君重得隴望蜀戯已驗於前言召鄒延枚客正觀於末至代回倪告院千里謝舉自代禀令推賢得公爲重袖箋委貺陳義甚髙文則其文謝非所謝恭惟某官學有源本行無瑕疵委蛇結緑之珍是宜廟序騰踏飛黄之駿而伏塩車使在論思献納之班必有輔賛弥縫之益某濫持荷槖謬厠李官守正奉公實不如於戴胄明刑弼教義當遜於臯陶不謂髙情猶勤私謝惠而好我皆藹如仁義之言更以贈君願力蹈中庸之正宣賜賀黄制置伯固賜金帶分閫疇庸錫鞶䟽寵三品百鍊焜煌内府之朌萬釘九環褒表中權之勁不勤使請弥覺道存恭惟某官追琢其相柔惠以直言忠信行篤敬學素得於書紳極髙明道中庸強何虞於祍革上嘉羊祐輕裘之緩欲厲田單仗鍤之横肆分紫磨之真昭示黄河之信爲兵餽之何不受從革作辛匪伊垂之則有餘在師中􅁻向來衆口之鑠曾不累月而銷賜爾通天略吐胷中之十萬用汝作礪便㸔腰下之两重某聳聽夬揚阻陪旅賀寛營平先零之漕倘免褁屍賜賛皇于闑之珍尚祈拭目賀魏侍郎了翁賜金帶賜璽褒賢横金增秩書盈于閣進思緯國之文華帶錫之鞶昭示立朝之賔客登庸有漸賚爾非常恭惟某官根柢六經光芒五緯忠信篤敬學素得於書紳髙明中庸強何関於祍革一笑微生於偃月十年良耻於􅀝氷上應念徙薪之言人望還采薇之帥姑朌芝檢仍進松班申錫九鐶誰曰有常而循故庚金百鍊式彰從革之作新垂則有餘服無不斁褭蹏麟趾不由郿塢之貯儲鳯閣鸞臺端属趙家之世界無勤使請更覺道存横安平之金不難破狄解武侯之帶寕乆渡瀘衮以公歸礪資汝作某聳聞郵報切賀厦成兩赤重黄自異佩芄蘭之葉千紅萬紫寕能對松栢之柯頌詠惟深敷宣罔既代回嗣秀王師揆謝賜玉帯揚庭渙號分寳展親追琢其章璀璨簮紳之長温潤而澤彰施衮綉之光恭惟某官徳濬璿源望儲琳館合宫薦瑞恪陪圭邸之恭御府闡珍寕假玉之人琢萬釘錯落六服焜煌某未能造朝猶稽走賀揚休屹立更勤珠璧之投病骨難堪莫辦瓊瑶之報被召賀綿州髙知府赴召定子疇庸廉水奏計甘泉駕朱兩轓去載屹頽波之柱奉尺一詔兹辰趍文石之塗用人如斯通國幸甚恭惟某官參旗孕秀井絡載英師友卿雲黼黻交輝於河漢伯仲伊吕羽毛盍在於雲霄言從磊落之州茂著蕃宣之最適貔貅之狼狽委鴻鴈於犬羊一人之情千萬人之情親援桴而立鼓百歩而止五十歩而止紛棄甲以曵兵公獨作張雎陽之守城上不識顔平原之何狀兹令四輩趣覲九宸此行登仙冨貴乃緒餘之事惟公懋德功名留乆逺之㸔某屯蹇百罹暌離半世玷征夫之濡轡幸君子之得輿有德進則朝廷尊既聞耳矣所任賢則功施普當拭目焉回諸處賀召命匹雛無力乆動歸去來􅀆之思四牡何功誤叨詣行在所之命方切循孔墻之避未皇謝鄭轂之推敢意雲箋先馳霧驛恭惟某官璽書增秩斧綉生輝徳既厚於蘇枯道仍隆於㧞茹嘘是拂是起死草之華風縶之維之怜生芻之空谷齒牙所借羽翼斯成頋某欲拜威顔既愆膂力不能者止詎堪再傍於九関兆足以行或許退專於一壑徒勤褒􅅚但愧感藏謝趙制置彦呐安緫領癸仲賀辤召不允漕氷未解敢希全璧之歸戍雪將更誤玷予環之寵傴僂再三而引避威顔咫尺之難違此非左右之先容孰與吹嘘而送上伏念某志隨學落氣與年凋虛警空悲皆信書而成誤乾愁漫解覺行道之猶非自再泝於岷江已九鑚於巴火奉法循理奈倡矣而莫隨節用愛人愧行之之未盡毎覺匹雛之無力敢言四牡之有功招大夫以旌豈爲我設越小臣諸節亦厠旁招未敢隨召馹之塵但乞返屠羊之肆詎期巽櫝莫返渙揚此蓋制置某官以禮樂英爲詩書帥十七年干城之底績數百戰尊爼之折衝迄厲二矛重弓之威俾無疋馬隻輪之返草尺書而招賛普聞巳請降奬三軍而定中原即􅀚奏凱每借齒牙之餘論不遺毛髪之謭材致兹無用之人亦有罔功之奏此蓋緫領某官丗濟膚公家傳逺略卿月髙升於金掌陣雲連捷於玉関智運木牛師不憂於左次􅁠兼茗駿貢争效於右牽佇積勲庸徑登鬷假每借齒牙之重不遺毛毳之微致此湮淪許令敷奏某敢不益加黾勉復䇿駑庸雖無治聲塞海内寡二之問願陳民隱當雲中第一之歌謝利路髙提刑稼賀辤召不允氷漕終更誤玷予環之寵露章未允難從俟駕之私退循頂踵之歸皆出齒牙之借至勤下問尤佩髙情恭惟某官胷着千年材兼數器人或劫劫而不足公獨恢恢乎有餘􆇅之維之惟恐生芻之空谷嘘是拂是能吹死草之華風德既辱於蘇枯道亦隆於㧞茹致兹頑鈍亦預招徠某敢違威顔既愆膂力不能者止詎堪再傍於九関兆足以行或可退休於一壑梅亭先生四六標凖卷之九梅亭先生四六標凖卷之十進職賀董待郎進職雜斈除斈士制垣晉秩寳閣升班諭蜀良勞勉侚假留之囯登瀛固寵况加真拜之榮綸綍載揚紳緌交慶恭惟某官清如秋刷和若春陽雲夢胸寛平吞一百八盤而無險天風背厚獨負三十六郡而有餘三年有成萬物吐氣不見賈誼固深半夜之思願借冦君難抑庶民之請仍魚鳬之開國峻龍馬之􅀒圗一札細行增井鉞參旗之重三謨大訓貫奎文璧府之華歡動两衙瞻寒西賊斈士象八節不過一嵗之少留剌史入三公便在五雲之多處何限麒麟之􅀞滿期􅀛鶴之還某何足控搏洊蒙料理白水魚竿之入暮竟作退飛青天鳥道之撫膺又勤羅致与其徒索長安之米不如來賦灧澦之堆直爲文翁再剖符兆足行矣安得仙人九節杖亟往從之賀陳提刑天冝進職懋賞外臺升班中祕激西江之水已驗澄清貫東壁之星有光臨照恭惟某官載揚淑問誕受嘉師方當攬轡之初適有跳梁之冦無煩獮薙竟折萌芽爲赤子爲龍蛇各安汝迹不鯀鯢不虺蜮時乃之功簡于楓陛之知華以蓬山之直雲煙縹緲暫煩俯章貢之流朝夕論思行即遂承明之謁某切聞成命輒布賀緘何敬非刑諒益謹五辝之聽有功則恱行將勞四牡之還代回趙茶馬彦綰謝進職寳儲進直璽命諭留經河緯洛之文書官由人重控蜀通秦之􅅦牧功以久成何更為哉其有試矣恭惟某官天潢擢秀奕葉飛英礼樂逺而光華遄車言邁忠信行於變貊思馬斯臧兹膺因任之榮仍拜加恩之寵嵗九遷其自此晝三接以必然某越在師屯例蒙巽謝翦白鹿坡前之草中夜枕戈對碧雞坊裏之花何時樽酒轉官代董侍郎轉官謝三府守關山之戍愧乏殊勲序嵗月之勞猥升華秩無功報上有愧積中伏念某一出西垂六逢朔易惟是窮日之力粗守封疆不敢貪天之功輒僥爵賞兹蒙恩紀俯録年勞揆厥所元豈無其自恭惟某官翼扶萬化器使羣工天地爲炉每曲成於萬物山藪藏疾豈求備於一夫致此􅀌蹤亦叨異数誓殫駑力仰荅鴻休轉朝請郎謝黄侍郎伯固荒服輦輸何益樵蘇之後副郎銖積叨升糠粃之前曾微入奏之功僅守年勞之叙然於踈拙亦是僥踰自昔就第之侯號奉朝請本朝雜端之職頃視班聮自官制正名之餘􅀉貟郎前行之禄遥瞻粉省知隔幾塵近視土山不容一蹴頋某無似知命不猶載馳載驅曾何禆於苞栩不稼不穡亦胡取於􅒡禾偶成鑚貟外之天誰實爲將軍之地兹蓋伏遇某官以大司馬爲冠軍侯飬民以致賢人開誠而布公道河以南皆爲晉土争擊楫以渡江挾而東主之周公且徹桑於未雨藉腹中之兵甲戍塞上之金湯燕人恱則取之昆夷維其喙矣猶念猕猴􅀐土牛之鈍欲試奔蜂化藿蠋之竒下至斗量尚叨寸進某所慙骯髒不足控摶吾愛吾廬詎敢希於軒冕我任我輦願少緩於鞭笞轉朝請郎謝監司内服輦輸何益樵􅂫之後外郎銖積叨升糠粃之前曽微日奏之功僅守年勞之次然於庸譾亦是僥逾自昔就第之侯號奉朝請本朝横榻之任实視班聮其爲貟外之前行蓋在官制之改後遥瞻粉省知隔幾塵仰視土山詎容一蹴頋某無似知命不猶水馬之走徒勞自甘退舎土牛之􅀐宜鈍何敢着鞭偶成鑚貟外之天誰实爲將軍之地兹蓋伏遇某官仁深引類義重噓枯怜其剪籠中之翎假之羽翼憫其困轅下之軛借以齒牙既費挈提又加奬勞愧無成績可書日月之常尚託餘庥帰守煙霞之痼回趙司户等賀轉官斗壘藏瘝曾微嵗最天朝懋賞俾叙年勞是爲平進之常難講同寮之謝敢圗髙誼見畀属辝恭惟某官義篤官聨情親事契胥保惠胥教誨有味其言孰披拂孰吹噓不愛其力有怜邊賞躐綴外郎笑猴􅀐土牛之蹤真成鈍滯觀雀化水蛤之變要是沈淪或承之羞不知所賀某未能辟榖久已思蓴士夫争磨勘而殺人幸容苟免將軍以告身而易醉行可匄歸攺官改官謝丞相璧水綴貟已抱罔功之愧金閨登籍復叨寓禄之恩此聖世優職事之常而愚儒無功狀之实全出鑪錘之造敢忘竿牘之恭切以禄至宣徳之階雖八品秩俗羡通班之寵號再登科舉必五貟職湏六考貳卿爲之進卷萬乗至於臨軒使百里或九十之差則分寸有千丈之落幸獲通於班筍又免待於戍􅀲惟甄異於庭紳許帯行於職組以此刈薪於翹楚斯亮天功如其不稼以取禾曷孚人望如某者起於素賤加以朱愚自安鷽鳩斥鷃之棲亦乏蚍蜉蟻子之援隨材官蹶張之後不自意全補文學掌故之聮已逾分願感大鈞無垠之播物欲小子有造於成人進之東膠告于南靣如絲如綸而如綍有隕自天在沚在陵而在阿孰爲之地伏遇某官坤厚載物鼎亨飬賢耻一夫之納溝中欲得其所招諸生而立館下恐毁于隨故雖紏録之曹亦假超遷之渥某敢不修其可願欽乃攸司卑者止髙者流當益厲六館之仁勇直而温寛而栗庶可助九徳之敷施改官謝喬司業行簡同第七卷除国録謝􅁑祭酒啓頭伏遇某官道航聖瀆材棟儒林左史讀五典三墳蓋將􅀝相國子學九徳六舞暫假司成當江濤如此之時軫根本􅆌然之慮欲作成於六館以表厲於四方有漼者淵不嫌葭葦之衆言刈其楚蓋爲薪槱之儲况素出於門墻尤願承其模範某敢不尊其瞻視識所歩趍雖藻火粉米之不同貴賤位矣儻蘋蘩錡釡之可薦左右芼之回劉教授大川謝舉改官綴曲江之題知賢已乆玷直指之􅀉察士爲先方踧踖於循墻遂蹉跎於削牘有來巽謝良仭謙光伏惟某官行有宫庭文爲鞶帨吹更生之蔾杖孰非鴻寳之書栽夢得之桃花不作大鈞之問淹回如此静退恬然兹雖騰一鶚之章恨未足五豝之数某蟇頥無政龍節非材下車而舉慈明豈種私門之桃李築臺而招郭隗欲開公道之荆榛惟慙程力之緜更辱摛文之綺宫觀賀瀘帥楊尚書汝明進職奉祠元帥賢勞清都均逸文昌八座昔倡九牧以阜民幕府十年今解伍符而還里顯拜緑綈之寵峻加紫殿之班歸哉歸哉幸甚幸甚恭惟某官柔嘉維則從容以和節槩抗岷峨之横淵源深江漢之濯髙塵迅歩不受人間風日之塵緩轡徐驅徑曵天上星辰之履五月瀘溪之入九鑚巴火之新大國十連民無遺便細書一札王曰遄歸乃思晝行之榮欲就晚賦之樂日出而作皆言倦飛則知還夜行不休誰作急流之勇退偉公髙節立我懦夫孔戣耳目未覺衰力控二冝之䟽温公肺腸爲巳有暫營獨樂之謀况幾兩幾駟羡巨源之歸而一壥一區足子雲之樂南方巳定足可從赤松之游東征是皇尚當爲蒼生而起某夙􅂪異顧輙布賀忱既羡公未老而得閑又愧我每懐之靡及挹浮丘之使尚願執鞭登黎侯之樓或􅂪援筆賀李侍郎進秩敷文閣學士提舉嵩山崇福宫枤杜勞還崧髙均逸大行臺之保大載纉武功真學士之拜真誕敷文德有偉急流之退式觀晚節之香恭惟某官博極羣書洞視萬古用之禮義講唐虞於細氊詰爾戎兵撻秦楚之堅甲昔者狂瀾之倒屹然暢轂之堅逺揚邇昭外鎮内撫盡護諸將不聳一塵王曰遄歸將運籌帷幄之内我戍未定且收身矢石之間學士象四時光禄正二品祝釐太室真聞呼萬歳之三詔禄禁廬又可襲六藝而七班接西京之鵉鶴歡騰北墅之􅀛魚名與身而孰親事隨憂而共减起視當世允謂全人某聳聞除書亟裁斐語起温公於崇福不無願公入相之人迎老子於函閞且致爲我著書之請賀安觀文丙除節使開府宫觀代董制置元老求閑清朝䟽寵齋壇授鉞新大將之威儀揆路彯纓等上公之体貌仍峻竹宫之領用華梓里之歸綸綍載揚紳緌胥慶恭惟某官材弘且毅器博而周所守匪親化爲豺狼頃幾失劔門之壯無禮於君誅如鳥雀公迄回沔水之朝是爲非常之功宜受不次之賞况尅復四州於談笑而撫摩八載之瘡痍若時登庸遂典樞機之貳聞命就道又成藩屏之留方深虛佇之思忽控飬恬之請櫜兠㦸纛儼十乘以啟行衡紞紘綖視三階而命秩仍從神圉以佚安期是爲地上之仙何愧山中之相向也雲無心而出岫今則水有時乎回淵惟出入將相之榮雖聖賢而難必至功名終始之際尤今古之罕全貫一節於行藏知百年之夀考從容甲第寕肯甘田宅之汙笑傲午橋自可窮園林之勝某聳聞盛事敬仰髙風季鷹思吳亦欲爲適志之舉司馬還蜀何當效負弩之迎代秘丞林郎中夢英謝丞相得祠禄老而妄動自速煩言罪以疑輕尚沾㣲禄重惟踈謬倍費保全戴洪造之難名撫􅀌蹤而増感伏念某狷弗諧世戇獨愈人少而耻有道之賤貧妄希干禄壯始悟不義之冨貴亦足辱身固甞把江海之麾惟不願氷山之􅀝甫違繒繳便入林泉食神圉之祠凡五六任頓屠坦之刃㡬十九年自量叔夜之不堪任笑仲連之強作毋友不如已者乃師教之以義強委重焉則君命也自屠羊之反肆即殺馬而毁車誰誤聽聞忽㧞加擢念士非其招而往孔子奚取焉苟傲無所恃而行韓愈亦人耳抗辭有罪引疾爲欺冒然扶憊以奉承識者逆憂其顛沛清班難僣顧再轉而爲丞素行乆愆非一鳴而輒斥既云欺世安所避刑竊鈇無往而非疑聚鐵不容於鑄錯乍賢乍佞身已變於三期僞行僞言誅何逃於七日投荒已幸續食謂何豈老芋之似茯神元非罔市而逺志之爲小草失在出山無墜諸淵姑予之釡譽而召毁而去聖則何心吉之先動之微汝曾不悟致勤大播如此曲成伏遇某官謙虛受人坤厚載物謂士非梁兾之賔客謾與招徠至人言盧杞之姦邪固難覆護怒猶疑其溢惡殺寕失之不經疾雷震霆於物無存全之理蓋天容地乃今知寅亮之功見大徳之好生豈匹夫之受賜某仰衘厚施已廹頽齡斗升之活波臣固貪舊物七十而致君事正在新年與其身後重作僞之愆不若生前瀝祈哀之悃澗愧林慙之無盡悔不可追鍾鳴漏盡而不休行將焉入得反初服實出大鈞小人之過必文何嗟及矣君子之愛以徳願卒成之代李制機大有得祠謝丞相幕府效愚猥蒙重劾公朝宥過特畀真祠感無地以􅀉言徳如天而難論伏念某才固無似命亦不猶門户百年難問庭前之雀科名二紀真同竿上之魚幸且安百里之子男誰使作諸侯之賔客既叨賛畫安敢隠情堂上之兵未可屈人於不戰幕中之辯真乃以我而爲傾怒因水蟹之移殃竟池魚之及言如綸綍固疑乍佞以乍賢法猶權衡寕免則筆而則削奪其兩秩倐已朞年適逢肆􅌌之恩輒動問鈞之請賜之大知之至前感已多閔其窮察其愚兹恩尤厚過蒙復玷特賜祝釐疾雷震霆於物無存全之理祥風甘雨乃今有覆露之功恭惟某官社禝世臣鼎彛家學以一二日萬幾之無曠乃十五年獨力而有餘得伊尹以格皇天亦既俘三鬷之寳玉問鄧禹而披輿地行將膺萬國之貢珍諒欲四海之㑹同益思九徳之咸事矧惟􅀌迹夙累一陶兹加􅋞拭之仁殆有發生之漸某敢不銘心圖報沒齒衘恩桃李尽在公門豈終使一株之慘淡葑菲無以下体尚希發寸草之華滋致仕回李致政坤載聮事少城一星終矣懐章仁里數月于兹未皇致擁篲之恭猥先辱踵門之見恭惟某官盤根仙種發藻儒英夷恵可否之間夙播仲元之譽逹榮前後之舉莫回令伯之髙終難縮手於袖間竟出摘髭於頷下一第直溷子終嫌識路之疾驅再轉不負丞甘作急流之勇退㝷橘中之四皓見林下之一人致爲臣而歸良可厚近古之俗從邦君其上尚爲賦逺景之樓某爲長於斯得人焉耳車幾兩馬幾駟孰不羡楊侯之賢薤一本水一盂更願聞任棠之誨回彭致政琛謝致政壬仲一經教子人服義方五福錫民天頒仁爵未皇走慶先沐陳箋㐲惟某官典刑老成魁壘耆艾漢庭用少功名雖恨於蹉跎周王作人夀考固同於飛躍蔚秋蘭之流馥忻春草之隨袍貴老爲近於親式稱綵衣之飬乞言以成其禄㑹聞黄髪之詢某及交阿戎還識叔夜夀胥與試此何與魯侯之功盍歸乎來行即顯文王之世卷之十梅亭先生四六標凖卷之十一雜謝代林運幹良顕謝丞相書考求文字干大播於一陶俾登畿幕積小成於三考獲進選階頂踵歸坱圠之功肝膽極輪囷之感敢因摧謝更叙依歸伏念某材無瘉人學未聞道半世寒牕之燈火中年太學之虀塩篆刻雕蟲覺兎毛之欲秃衘枚戰蟻偶雞口之先鳴遂采魯芹出燃楚竹未滿戍􅀲之代忽纏家棘之悲隙駒之制易終林烏之哺益切上書光範初無蟠木之先容得闕長安乃辱采葑於下體朅來半載何有寸勞夏屋督工粗逃曠敗春闈考士獲厠使令及大庭聞魁三之傳則本房有簋貳之數然雖有依紅之樂尚未霑破白之章七十偏親一則以喜一則以懼斗升微禄時乎爲飬時乎爲貧茫然寸歩之謀甚矣分隂之惜䑕肝蟲臂固難躁進以妄圖馬渤牛溲或恐兼收而並蓄恭惟某官鼎彛家學衮冕世臣撫五辰於泰階之平載萬物以坤元之厚復文武之境已昭元老之壯猶歸鄆讙之田足見真儒之已效然益旁招於俊乂欲令聚在於闕庭故凡絲粟之材未始蒯菅之棄尚念某亢身無䇿仰首自鳴桃李成蹊自合安不言之分樓臺近水詎能忘先得之情代察判徐愿謝史丞相得五帋文字補京兆之椽曾㣲賛畫之長交公車之章兹拜成終之賜自匪載驅於四牡何由一發而五豝毫髪不假之他門頂踵皆歸於化冶有言雖淺進謝敢稽伏念某才乏線長力尤綿薄十年太學身甞百甕之虀一第集英袍已半霜之葉昨終素韠重累洪鈞泛緑依紅猥使近長安之日草􅀇尚白誰肯牋閶闔之風始焉一鶚之飛繼以乗鴈之集再而衰三而竭孰與㸃睛二之下四之中正湏合穎况當百里九十之半更覺分寸千丈之強忽蒙雷電下取之勞遂有埃風上征之路何物不由於洪造此身獨拜於全功兹蓋伏遇某官八柱世臣三槐家學方當鯉趨過庭之際已傳虎拜稽首之心更化十六年無匹夫不被其澤闢國數千里復寜王有指之疆益閎翕受之規丕廣旁招之意里仁爲美似怜桑梓之偶同舉能其官特取蘋蘩之可薦感一力挈提之厚增寸心銘鏤之私某敢不勉自激昻圗惟報稱雞犬䑛鼎難更干㸃化之功鼴䑕飲河當自詭承流之效感藏不盡敷述奚殫代吳省倉玭謝丞相縮次貧累清時許守漢倉之粟老湏逺次忽臨齊戍之􅀲此恩夙出於大鈞於義冝伸於小牘伏念某身勤事左意廣才踈家丗占寳唐之濵學問皆環溪之訓少而有志頗欲就博習修㓗之科壯則無竒亦屢玷徳行道藝之貢嵗不我與命與仇謀烏帽黄塵凡五排於禮部青衫白首又兩進於計臺終然蹉跎成此遲暮漫作兵厨之隱聊爲簿竈之依青天鳥道之拊膺雖甞奏辟白水魚竿之入幕何敢疾驅如此頭顱凄其脚色奚敢作堂除之夢猶難干京局之除時方張更化之弦公實權造化之柄冐爲冶躍便辱甄收使守九年之儲令待四政之闕樝梨橘柚大非老人所種之冝欂櫨侏儒偶在宰相兼收之列聊裝鋪席歸老林泉不謂俟河之清乃成縮地之脉洛中親舊書傳犬耳之黄吳下官曹事報烏頭之白僮奴欣怪里巷驚疑髙下在心只合避賢者之路進退維谷反恐負相國之知尚堪一行不逺千里然非恃無垠之坱圠亦寕免將進而趑趄恭惟某官清任以和直方而大手麾九日太陽行黄道之中坐鎮八年微物岀洪鈞之播雖風霆不言流形之利然天地能照許國之心外撫四夷内熈百度收毛髪絲粟之細入竹頭木屑之藏晉卿之舉七十家不遺筦庫祐甫之除八百吏皆是舊知冒焉而來恃此無恐某敢不靖共爾位洗濯其心却日揮戈收效在桑榆之景涓辰擁篲奉身歸桃李之門代饒運幹􅁩謝史丞相改任幹茗事於畨禺妄求易地賛漕輸於湘浦竟辱回天俾依青草之湖庶免黄茅之瘴此恩渥甚何感猶之伏念某樸學無竒散材不腆踏槐半世幾隨兎目之黄采藻十年似守烏頭之白偶叨終秩未及問鈞五嶺聞其皆炎初無去志諸公怜其獨冷誤有辟書元戎欲處之油幢之中真宰遂寘之茗寮之末等勤大播徑合疾驅惟是􅀌㷀之蹤寸勇尺懦實聞疫癘之地十室九空率爾陳情期於避禍媒身無䇿難空兾北之士夫換骨有方乃綴湖南之賔客獲避飛鳶之跕姑從檣燕之留茲蓋伏遇某官秉國之鈞熈帝之載更政化當更之琴瑟續聖賢難續之鼎彛益賛禹而格苖誕布舞干之化尹相湯而伐夏迄垂典寳之書然猶耻溝中之推必欲濟天下之溺印趣銷而趣刻足昭從善之仁衣改造而攺爲益表好賢之意某敢不敬其可願欽乃攸司緑水紅蓮已感移栽之恵青芝赤箭尚希並蓄之恩代李緫幹伯長改任謝史丞相回馬首於塩亭不良擇地䕶䑕牙於粟􅁃有渥自天當趑趄將進之間拜坱圠無垠之賜謭焉􅀌賤辱此一陶竊惟京口之積倉實切邊頭之仰哺緫司創闕褁粮兼坐甲之司堂選掄材弄印致閲時之乆蓋戰徳戰謀之際惟去兵去食之難爲米折腰雖不離於禄仕簸糠眯目易有誤於軍須必爲官而擇人庶因能而任職伏念某一寒無挾百拙有餘伯父取之庭階補以京秩弟兄習乎弓冶志在世科偶尺寸之蹉􅋸漫斗升之嚵嚼中嬰家難復詣吏銓煮海爲塩妄欲供富媪之役無麪作餅或謂非巧婦之能况當避嫌不免易闕自笑鮎魚之上竹何翅羝羊之觸藩一指之不若人猥勤伯氏之請匹夫之失其所亦関造物之憐迄蒙倉庫氏之除全出光範門之造恭惟某官鼎彛家學社稷世臣巫賢之継巫咸不但底王家之乂伊陟之紹伊尹真足格上帝之心雖九徳敷施均不遐遺而一門小大尤蒙器使烏鵲遶樹真同撼木之蚍蜉牛羊求芻乃肯發機於鼷䑕某敢不修其可願欽乃攸司錢榖甲兵問於廟堂當識士大夫之職椳闑扂楔成其室屋無忘明宰相之功謝丞相書考補上佐於黔㠝偶書下考貢空函於黄閣莫報實恩偶暫攝於竹符尤倍希於樾䕃忘其喋喋布此惓惓伏念某殖學踈蕪渉道短淺青泥盤足毎思範我之馳驅白雪滿頭寕復􅀄心之邂逅進乏犬雞之效退從鹿豕之遊辱坯冶之一陶俾翺翔於半剌䍧牱爲徼雖非監螃蠏之州盤瓠見容偶免築鯨鯢之觀竹齋藥竈不礙雲山芰製荷衣無邊風月適挈瓶之缺守又越爼而代庖胡瞻爾庭人固疑其鶉宎此非子坐自亦愧於象環所祈新尹之疾驅庶遂陳人之退屏明年今日固可歸三逕之荒凌雨震風尚合假萬間之芘恭惟某官得聖之任爲帝者師衡紞紘綖増鼎鉉九九之重箕裘弓冶恊泰階兩兩之符行由絶席之尊徑陟維垣之峻人主聀論一相具瞻槐面之專太􅀓府有三才詎棄竹頭之細所祈全度非兾超遷某敢不補拙以勤謹終如始深懲往轍躋分寸而落千丈之強雖踵常塗視九十爲行百里之半其爲㱕􅀝罔旣敷宣謝魏侍郎了翁爲先祖先父作墓誌先美無傳凛負子孫之責幽䥴有託蔚爲祖考之光属拘柱後之文莫布堂下之武敬裁儷啟恪布謝悰竊惟隧刻罕見於先秦之前墓碑似昉於後漢之末正而斃斯亦已矣身將隠焉用文之如郭林宗尚可免伯喈之愧若陶元亮又何待延年之辭降逮李唐㝡崇韓栁韓銘正曜定非䛕墓以攫金栁表文通亦豈遺人之矴石蓋斍良工之獨苦有怜没世而不稱發其幽光時乃天道重惟先祖父之斈不事今科第之謀一門千餘指之肅雍是亦爲政九流百三家之貫穿止以潤身不徒稱鄉里之善人實有得名教之樂地維廉藺固不羡曹蜍之無恙然夷齊要是得夫子而益彰恭惟某官有徳立言以文貫道粹若出六經之正凛然寒五緯之芒搴芙蓉而賦詩洞識隂陽之消長傍梅花而讀易詎忘天地之彌綸頗哀墜緒之茫茫恐与常流而泯泯既取賛皇之實録以誌楚金復叙奕城之世家就銘明允仍加篆書八分之賜俾免不稱三服之羞一門存亡百世感激某敢不昭告屏攝表刻墓埏儻得保首領從九京之遊庶無泚面目逹中心之愧㣲薄不以廢其礼何足爲碑板之酬夙夜無忝爾所生用此爲師門之報其爲感鍥罔既鋪棻謝衛參政涇差校正書籍小材出位願㱕朱墨之勾稽大府量能留備丹鈆之㸃勘少振塵埃之冗倍勤坯冶之陶竊以三館文書固遴讎正編摩之選諸侯賔客率多獄訟財賦之司寕有伺候公卿之門更容休息篇籍之囿憐韓愈之非聀俾就閑官期吕蒙之讀書非爲博士沫濡鮒轍啄抱鶴翎使飬是氣而塞天地之間將和其聲以鳴國家之盛知花於見根之始乞漿有得酒之恩求之古人亶在今日伏念某少諧平側長識偏傍不深石室之紬僅曉金根之讀遺經獨抱未辨豕渡河之三良史博觀粗知馬与尾而五有時北䆫髙卧之夢頗思東觀未見之書三神􅄅在於海中五鬼難驅於坐上挿架三萬軸但當守鄴侯之書家集二百篇幸皆是撫州之冩然作吏此事便廢亦有命焉惟投閑乃分之冝傷哉貧也乆留戯下冝在遣中遽冒小朝廷之除使䇿行祕書之職兹蓋伏遇某官榮分湘閫並用楚材义􅀒偃植各安所施耻匹夫之弗獲椳闑扂楔惟器是適無一藝之不庸試黄閣之規模收碧油之人物至如狂簡之小子亦勞坱北之大鈞某敢不祗此簡書呻其佔畢珥貂分陜已收下體之菲葑給札登瀛願備一株之桃李代袁子固謝縣宰寛假箠楚之下何求知難全璧縲絏之中非罪迄就罰金敢不持咫尺之書少謝寛一分之賜惟越人之相攻擊蓋其俗然而長安之羣殺傷各有主者况已過都而歷塊誠難被髪以纓冠儒者好髙未免爲役而耻役􅀠也不力又可與言而不言但催科未動是閑人豈期㑹不報爲大政所謂行人失者乃使吾身親之方入聞言偃之弦忽使受曾參之杖主人讀未知主人罪也自怪其頑天下寳當爲天下惜之誰興此念惟體膚受之父母而衣冠耻在國家馬遷腐刑何面上先人之墓孫臏刖足快心蹶上將之軍故滕公釋韓信之囚而小白解夷吾之縛知其不可復續所以寜失不經向使當時滛及善人安得異日報以國士如某者詩書門户燈火生涯非其職矣千乗之邑百乗之賦切願學焉惟是受滕一㕓敢辭于役然且去齊三􅀫難疾其驅偶隣境之胥􅆷坐家人之失告鶴非有禄徒以鶴警之失期鴈或不鳴要亦鴈奴之有罪不虞投足卒禍及身業已逮於桁楊􅀔難逃於􅅰楚自度受李日知之杖又當變余安道之名然使撻之市朝得無傷於冠帯無小人無君子冝玉石之俱焚有里胥有大夫伏遇某官堯族俊德周家懿親粹然麟角之祥屈此牛刀之試謂重士所以重國要當躰朝廷長育之心知察獄先於察情又豈容胥吏上下其手况開設學校方將馴化於鴟梟則愛惜人才何忍鞭笞於鸞鳯致此㸑餘之棄亦從金作之刑某敢不䇿髀肉之功名勉皮膚之學問痛懲臨難之苟免益思學道以愛人儻許國之可期當措刑於不式自此不復贖矣安用以撻記之鞭􅑔越而立威名既知免於東海出鄒陽而爲上客尚有望於梁園謝曹直學賀雨伏以和巴歌之二闋遏雲足繼於謳青贈唐律之七言喜雨宛同於醉白莫辦雙金之報徒深十襲之藏謝曹直學喜雨詩伏以瘨我以旱良窘望雲有志乎民辱書喜雨徒切誦清風之穆未遑和白雪之髙回平江府沈侍郎送酒杓斡龍躔日又賔於暘谷香凝燕寢地孰勝於蘇州矧惟荷槖之賢冝介椒盤之祉恭惟某官徳參隂隲道配陽休奉行寛大之書繭絲免矣宣布中和之樂襦袴煖然諒報政於吳門即歸班於魏闕某一寒寡與獨冷何辭猶幸太嵗之在申例容乞酒遥祝夀星之出丙莫遂稱觴回岳緫領珂送酒賀正天躔回甲聿新曆數之朌嵗紀在申將應酒泉之䜟時維膚使日進啿祺恭惟某官徳配陽休功多隂隲漕下氷解師有宿飽之期掌上月升日佇辰猷之告聊暫紆於羔袖即徑上於雞翹某家本一寒官冝獨冷窮年兀兀只自慙廪粟之糜清夜沉沉頼肯續燈花之酌回新都廖宰子材送酒及石榴伏蒙郇翰寵賁陶籬餉以乗壺定有可人之味侑之碩果中存多子之祥續歡伯之風流洗醋兒之酸楚已從竹葉獲觀令尹之清尚想榴皮可頌中書之考代回安撫趙尚書送物共六尺之輿同寅良幸分丈二之組先甲巳頒悵遂告違顧勤亟餽恵而好我慚取數之孔多卻之不恭敢下拜而登受區區􅂨謝續續面陳又同前一麾出守漸可解維同官爲寮蒙加折爼維多維㫖且感且慚敢貢記室之辭少致兵厨之謝代回趙京尹餞送已辤軒陛漸理艅艎更勤加餽之稠重冞仞大寮之篤叙既醉既飽腹不勝其属饜載忻載奔面無由而控謝代回臨安府七夕送物抱拙終身倦乞犬牙之巧未能免俗頗安犢鼻之貧臺餽鼎來尹釐意厚酒醪醇壹况加雞柘之甘􅊡餌馨香仍儐螺甲之㫖備此四美跂彼七襄莫宣衘戢之私但劇嚅嚌之感回寋學諭賀得粟九穂一莖九穂昔甞疑司馬之䛕異壟同榮今顧辱昌黎之頌雖君子之政不以物恠然太師於詩可見民風要非于祥而于仁恨弗以規而以頌民曰太守太守不有何敢當儒館之歌秀升司馬司馬辨材請以旅天子之命回李僉判賀瑞粟某導九穂於漢庖此真偶爾歌五言之唐律何徳當之不敢續貂恐譏集鶡唐叔之得同頴安敢望周公之歸劔南之進嘉禾亦難上栁子之表姑藏佳句以俟豐年回王監酒提督修城伏以三里之城不修則壊一日必葺欲罷不能擬煩督戊巳之屯相與營甲戌之築龍見而畢不妨節用以使民隼射于墉亦可待時而藏器代回運使賀雪黄雲紀瑞肇新魯觀之書白雪效祥遄應梁園之賦能令公喜不在我先恭惟某官徳配陽和氣排冬凛有功使臣歌四牡兼此二難省事天公厭兩回併成一賀方圖面慶又辱手牋不成報章尚幾幸察回陳術士某適勤枉顧寵畀儷箋不但知五行之精抑又窺多文之冨其爲感佩罔既報酬梅亭先生四六標凖卷之十一梅亭先生四六標凖卷之十二謝惠詩文謝張祕校晉臣投詩並代月湖蒙以契家之舊贈之佳句之新昔人三百篇世寡和矣古詩十九首君突過之但深巾笥之藏莫效䄡䄖之報謝汪祕校莘惠詩方味大篇又饕長句冠切雲佩明月正自不凡濟白水登閬風居然相導恭惟某官抱負竒志屈摺壯圖文采離離猶可和其聲而鳴國家之盛詩律坎坎何至虛其腹而藏天地之愁子亦來見我歟僕未有可師者參横月落不堪喚夢於羅浮目擊道存何必相期於汗漫區區􅂨曲續續面陳謝監鎮陸子遹惠詩今早特勤古風見畀句有家法信他日之聞詩老無喜機羡故人之有子恭惟某官爽貫眉目清入肝脾昌黎門庭未免金根之誤杜陵衣鉢僅存玉案之吟郎君於此勉之放翁爲不亡矣某幸蒙委重愧乏報嘉欲爼豆予我乆周旋寜作我願金玉汝君家所有更贈君謝林祕校季熊投詩伏勤枉顧寵惠名篇曾前惠之未酬已厚章之洊至雪巢有子不􅀌珠玉之編月湖無詩可作瓊瑶之報聊以數語寫此寸誠謝盛登仕夢弼長書寵示長牋就貽大􅁽非至篤好何能多如是耶所謂立言亦甚似而幾矣愧乏䄡褕之報徒華巾笥之藏謝許新恩􅁉惠詩兹勤佳句良感髙情或疑年使之年此事可念以吾老及人老何力可施徒參患脚之禪莫救旋渦之佛謝蘇祕教丙杜門具奏方此乞骸叩户論詩失於倒屣恭惟某官長材素藴餘事清唫觀秋月之兩章羡春雲之多態天未䘮斯文也復聞永嘉之音子亦來見我乎應認江西之􅂀某亦聿既耄兆足以行贈我綺琴乏雙南之報答乞君霞珮請萬里以頡頏謝程監丞凖荐勤真蹟加貺名篇對秋月之兩章仰春雲之多態爲施厚矣無謝可乎恭惟某官一世典刑三朝夀雋雖老子婆娑自安於橘顆然此翁矍鑠猶可以蒲輪誰知幽桂之遺榛菅坐令積雪之困桃李咀氷嚼玉戲刻畫於無鹽洗醆傾樽巧噤吟於唐舉惠而好我何以報公某乆􅀝長松竟成小草借君詩而消永夜自不成眠期吾王之召將軍更宜善飯謝朱新恩遜投書比辱訪存特勤書况雖過情之可耻然荷意則甚勤恭惟某官學踵乃翁氣吞餘子襟懐磊落不專紙上之蟲魚談笑從容遂蹙草中之狐兎當季康子患盗之日正班定逺封侯之時乃援古人以方我輩一之爲甚四者難并人豈不自知耶今願竊有復也殺賊奴取金印何待明年縛單于寘藁街更期他日謝吉州楊司理彭年惠詩比勤三顧寵惠六詩巧刻畫於無鹽力扶持於夜燎不知所報當贈以言恭惟某官自䇿英躔冝收名第青衫白首氣硉兀而未降丹筆墨曹翅翩翻而方展不謂睡龍之寳猥加羅雀之門衘盃酒接慇勤且承至止遣一介奉咫尺更幸亮之謝周祕校噩之惠梅詩叢桂移文問周倫之好在官梅動興笑何遜之重來非吾之故人耶所見者今我也恭惟某官城市大隱山澤真癯拍洪崖挹浮丘疑遊八極召鄒生延枚叟又客諸侯兹辱顧存未遑迎肅終然不可口過勤黄山谷之詩殊不類其人殆似宋廣平之賦某甚安斗食焉用鼎羮月落參横荷喚起羅浮之夢水邊雪後願更續和靖之篇謝㑹稽趙宰善韞委剌見臨袖書爲贄惟是事契之有素豈假文字而後明恭惟某官仕有長材政多善狀製劔池釀丹井乆樂林居探禹穴上㑹稽猶湏􅀲戌雖淵明不辤五斗之屈然士元豈是百里之材兆足以行攺之爲貴某緬懷先契幸及英游主司疑則辨之此情可亮相國知之至矣何􅀃之云謝石祕校巖比勤下顧寵示髙文贈盈把之瓊瑶拜嘉已腆列成編之鍾磬取數何多恭惟某官水北名聲山西家世耻懐綳之簮笏服韋布之縑緗傖父機雲欲上規於姚姒衙官屈宋肯平到於隂何藉少低建隆之功勲足可備慶曆之諫諍公等安在吾道非耶遺我明珠皆映骨而睡驪目乞君飛佩㑹剌手而㧞鯨牙某得非所蒙願竊有復文章小技計已空處士之羣節􅁩大閑願不替純臣之教回劉進士日起惠書及封事藁代月湖作惠以長書將之奏藁一介而言天下古亦有之十漸之當帝心人誰辦此恭惟某人山澤志士畎畒忠臣范希文之居憂不忘國計張齊賢之獻䇿㑹即面陳某乆已語離忽勤言贈吾愧之不敢恨也徒抱朝飢公安在何見晚耶佇觀暮召代回謝祕校耘投詩代衛參寵投短剌就貺長篇梨非飣坐之珍豈能抵玉桃匪蟠枝之實敢辱報瓊至於濁醪亦如惡札不敢詠酌君之語乃先辱起予之詩占此奉酬察之良幸回吳教授投啓和詩伏勤巧思見和拙詩細窺秋月之兩章備見春雲之多態廹斯可以見矣敢疑識面之遲忠焉能勿誨乎安用過情之譽代回朱上舎中有餉以新詩儐之舊藁蕭然四立之壁得此兼乗之珠藏去爲榮不知所報恭惟某人胷蟠古學手抉天章兹遥賦於髙唐已洗空於下蔡詳味三四篇之健語載觀十九首之遺音失餘子於牛毛發寒光於驪目惠而好我雋甚逼人某愛莫助之顔之厚矣開張篋笥諒無湏津筏之求劃豁垠崖所願見琳琅之取回前蘄春陳尉格惠詩昨日伏勤古風見惠論交既乆陳􅁩甚髙恭惟某官服襲典刑緒餘翰墨太丘遺愛多池上之鳯毛季方難爲蓋眼中之犀角猶怜緑水紅蓮之舊客曽陪碧梧翠竹之英游舂容大篇刻畫老醜如猛起約丗故之句顧不偉歟抑擇術無小用之言猶相憶否王何必假更爲綵棒之淹儒果用真㑹復青氊之舊某過勤投璧莫辦報瓊登樓而憶侍郎既無及矣指㕔而坐縣尉何幸見之回張上舎端道博我以文竊承嘉惠愛人以德何至溢言請以屬辭報其盛意恭惟某官勇髙六館學綜九流􅀚其崇論谹議之間眇然深思長慮之計以道相盥兹意甚深覺民之先此言何爲至我任士之重所有更以贈君某有幸納交願安承教凡是爼豆予之意固已拜嘉亦有金玉汝之情尚幾見亮回羅省元垂琳琅於金薤得所未曾報瓊琚以木􅀲闕然無有敢修儷語略謝盛心恭惟某官蘭菊之家楩柟其質一經接踵不難俯拾於紫青萬卷蟠胷安得長嘲於􅀇白時來爲耳人謂斯何有來秋月之兩章足見春雲之多態然下有千歳苓之意雖東坡尚不敢當至向來一瓣香之恭惟南豐乃爲無愧某自知不武難與斯文借聽於聾求道於盲正恐無益於賢者加膏而光飬根而實其敢有愛於言乎回熊省元投贈漫剌下臨極慰仰髙之想屬辭光賁能無投暗之疑恭惟某官學冨家傳美宜世濟桑弧有志豈徒糊口於四方蓽路何憂蓋將友士於千乗兹沐檐褕之贈但深巾衍之藏某德愧多凉官甘獨冷厚意慰跫然之喜何敢或忘虛名誤賢者之來不知所報回徐殿幹暄投四六登畿入幙榮不揜慚趨隅摳衣幸堪親敎甫諧望履遄辱鳴謙藹然仁義之言既聞之矣豈以筋力之禮望長者哉重勤四六之貽莫效萬分之報輙裁狂簡少謝髙明代回張祕校子賢惠詩比勤謁入㝷辱詩來良深感荷之情敢虛往復之義恭惟某官湖海豪氣風雲壯懐諫批逆鱗昔甞長太息者六工歌鳴鹿今將肄宵雅之三得句驚人以文博我卿言大好能無夜光暗投之疑民可小康當在朝奏暮召之後回吳判院玭惠詩榮被新除寵貽佳句脱身枳􅁄來監公子之倉回首芙蓉寜戀假王之印我厭朝班之綴公方故歩之㝷判院不比㝷常惟當拭目山莊元無呵殿更望垂情回屈學正投書詩丞哉􅀒余余􅀒丞哉殊乏吟哦之伴長者絶子子絶長者抑何交際之遲振履鼎來鳴謙泰過恭惟某官莫敖華胄正則故家宗􅂀西江識快閣千山之大僑居東鄙開逺軒三尺之明兹終素韠之祥行奉丹墀之對龍飛九五庚桑盍早於贏粮鵬擊三千子木何勞於􅂨甲兹蒙布武見賁雄文加之仁義之七篇華此蓬蒿之三徑不知所報藏去爲榮某爲州治中在固恨何相見之晚也猶欲就有道而正焉友其士之仁子若無言幾失子文以氣爲主君家所有更贈君回吕將仕某伏蒙紆顧寵賁長牋未先覩於景星幸兹小尉辱暗投之明月復此大慚但深箧笥之藏莫效瓊英之報囘衆官袖啓伏蒙衘袖見賁儷牋合璧連珠於粲光芒之正編鍾列磬了非世俗之音良欽墨妙以筆精但覺禮踰而情過兩喜而多溢美曷克堪任七㐮不成報章但深愧􅀒囘官貟學職袖啓洊承厚意疊貺儷牋墨妙筆精仰窺贍麗禮踰情過洊極感慚甞修造謝之恭僅奉留名之命惟息肩之方始覺脫腕之頗勞七㐮不成報章良􅀌隆施兩喜之多溢美仰懼瀆辝回學職士人兹蒙盛剌見賁屬辝竊闚四六之工良重再三之嘆亟甞造謝僅辱留名退深巾衍之藏莫效襜褕之報回景省元夙勤臨顧見賁儷牋偶缺肅迎退深誦味辱引前賢之跡俾爲後學之師佩意甚勤拊躬曷稱尚規晤語敬布謝忱囘宗子與銓伏勤屢顧見畀屬辭極欽著語之工但重過情之愧恭惟某人天潢濯秀風調軼羣上方重歆向之材錫之蕃庶君冝勉賀白之學副此簡求佇􅀚千里之駒亟振九苞之鳯某濫膺郡􅀉幸託里仁承焚林竭澤之餘若爲共理有拔薤置水之警切幸告忠囘王省元屣履迎門喜接雙鳬之舄文書衘䄂辱摛􅀌鶩之詞既見異人頓忘九折恭惟某人譚髙玉麈材擅瓊杯逃狗曲之譏暫且謝諸生而還舎依鹿鳴之樂行當頌聖主之得賢結襪以湏彈冠伊邇某十年出幕兩􅆋生巾甚苦月攘一雞之征無復人生五馬之貴乏李膺之模楷誤辱肯臨範王良之馳驅當圖請益回李叔璋伏蒙衘袖寵賁駢珠知爲河北之相家且接江西之宗􅂀欣逢若士何啻似人惟是過情之褒殆非望賜之意它人不如同姓願聞㧞薤之規終日雖則七襄莫稱投桃之報回合同王將仕兹蒙寵頋見􅂌雄文竊窺四六之工良重再三之感恭惟某官人門具美地位夙髙淹回筦􅅦之卑培益事功之㑹某過勤奬予彌切兢慙徒勞篋笥之藏莫效䄡䄖之報回王進士伏蒙紆頋寵賁長書味藹如仁義之言知賢者深逺之慮􅀫蠧正難於驟革頽瀾未易以亟回苟有祝規更希忠告區區􅂨曲續續面敶回黄將仕伏蒙下頋損賁長篇知宗􅂀之由來信家風之不墜見似人而喜真足慰蓬藋之逃和此君之題㑹更洗筝琶之俗回王進士兹佩髙情見貽佳句歌剌史之頌愧非西京二千石之良繫諸侯之風乃合召南十四篇之數報於何有藏以爲榮回楊貢士伏以樂正論士而升之未皇請益公等何見之晚也忽辱鳴謙非所宜蒙願竊有復恭惟某官詞章炳蔚器度端温得意狗監之官肯輕進取子雲羽獵之賦行有吹噓試觀屬辭比事之文足見發䇿决科之學某濫分守印獲託士鄉非浮橋之魚廹斯可以見矣哀涸轍之鮒忠焉能勿誨乎回蘇祕校材吳蜀萬里夙知益者之多聞蘇李五言良愧倡焉而寡和近古之三信在得名之雙謂何地下日月光應察驥箱之服江空歳年晚誰爲馬口之衘回史機冝大異一門三秀未見長公之波濤七言五章始窺㓜婦之機杼喜故人之有子爲老成以賦詩但深巾衍之藏莫效瓊瑶之報回程祕校以南辨蘆菔之獄夙知纉隂騭之功謁薤本之規未及望陽休之色有勤枉駕更賁屬辭伏惟某人德􅁉乃身世済其美待時藏器冠蜀都沈冥之珍它日趨庭寔漢朝方正之學若爲公等之見晩真覺我輩之厚顔某未皇欵門先辱傾蓋自衛尉將軍之􅀫契是可通家藉翰林墨客以報章别圖問政回見任官袖賀承流支郡曾微牧御之方出節本朝誤被將輸之命已伸免牘亟奉俞音敢圖衘袖之書特枉編鍾之奏恭惟某官風猷俊茂天韻碩膚齒牙秋露之甘手筆春雲之藹嘘物以氣可回燕谷之温贈人以言何翅楚珩之重遂令載馳載驅之任猥及不狩不獵之夫某畏此簡書蕭然疲役某水某丘某樹願歸遂於釣遊我任我輦我車希别謀於咨度回史祕校公誨獻䇿迷日五色智良愧於失人置水一盂惠足占於好我屬辭爲教陳􅁩益髙恭惟某人直哉史魚飄然司馬遐想六王畢之作必無萬物茁之疑大樂正詔王升諸冝登春講諸弟子隨臣乆矣竟坐冬烘敢謂愛忘不加督過有來論事益見憂時言言非無益之談鑿鑿皆可行之䇿顧恨挈瓶之守不敢越畔而思前茅中權今皆鄉人之善者積薪上寢自可纓冠而救之幸疾其驅且忠以告某一麾乃出再皷而衰磨牙殺人未覺早還家之非計泣涕陳䇿何待夜前席而後言回楊普州伯雨袖詩啓千古在前萬古後僕安知栗陸之書六字常語一字難公真得栢梁之體所慙佳句適重愧情恭惟某官氣抗岷峨文濯江漢子雲河東之賦天自吹噓伯起􅀜西之聲家傳清白所居民冨而畏人知行登鵷鷺之班安用蚍蜉之援金鑾論事之語何至我哉鈞天無人之悲今召君矣回趙進士大正伏辱郇公之翰知爲韓國之家社稷丗臣自合襲山河之爵箕裘夙學亦應簉俊造之班兹窺筆下之雲煙可見胷中之湖海願安承教不成報章梅亭先生四六標凖卷之十二梅亭先生四六標凖卷之十三科舉􅀘中附謝及第在後謝得解丁夘仰破屋而抱遺經嘖㑹心之無幾裹麄繒而隨舉子嘻免俗之未能解后吾味之偶同摸索此君之小異欲棄雞肋復美羊腔人驚喝盧得雉之危我抱志目中眉之愧甞謂選舉所以籠豪傑安知亦足銷豪傑之心塲屋謂之興賢能或者疑爲老賢能之術士任重而道逺辰去速而來遟鄧髙宻願效尺寸之心笑人寂寂禇彦回少過三十之念使已囂囂蓋欲乗感㑹之風雲豈堪送瀟洒之日月如某至愚不肖甚賤且貧每懐萬物皆塵土之思頗念吾道非曠野之物年當五嵗日記萬言實希蹤楊文公之辭章復妄意晏元獻之科目莫能送上安得􅀬中付甲子於泥塗逐庚癸之飢渇君門不可以徑入法當從試於有司夜光屢失之暗投或是晚成之大器雖杜陵許身稷契之意誰肯信之然草廬自比管樂之心恐不免爾吟髙軒過羅胷謾詫於星芒􅀃古戰場過眼還迷於日色五隨秋試例困冬烘翦翎觀百鳥之翔回首覺萬牛之重無能辨璞只合更刀脱漢賦辭楚騷雖依依而未忍觀魯史知周典幸歷歷之可明技癢爲之途窮甚矣求田問舎已破除湖海之豪應舉覔官又勒回山林之駕或謂餘勇猶足先登及工歌鹿鳴之三乃夢踐飛翼之八芳杜厚顔薜荔蒙耻願一洗之菉葹盈室荃蕙爲茅由來乆矣要之借汝腹中過耳又何山人跨下慙乎鵬怒而飛鷙匿則擊是亦細事無足多言唯是吾皇頒詔舉賢之時實以今日多事得人爲急裴晉公之解韋釋布正淮西盗起之時韓魏公之發䇿决科乃天聖日升之始有益於國無競維人感人物之􅆌然嘆江濤之如此四郊多壘士之耻也萬里長城國有人乎冝㧞實才入充嵗貢不應庸下亦在選中伏遇某官持刑明允已清碧草之扉畫諾從容復入紅蓮之幕兹獲聮於薦送何謬及於單微云云某敢不髙束三傳精研一經思游夏不能措之辭條舒蕡所未陳之䇿謹按直筆猶足誅未死之姦䛕稍遂初心誓不忘平生之温飽縣補魁中謝縣令聖經賢傳指未究於數千遂序黨庠首辱推於第一其細已甚不足乎揚然累土乃九層之階故積律自一黍而起况是萬家之縣利用百篇之書由鄉校以發聲粲仕途之接武至如直筆見謂􅀌經前軰罕用此以下帷後學遂束之於髙閣豈知數百世盛衰之監具在萬八千褒貶之言孫弘慙而謝鄉人丈夫淺矣仲舒褎然爲舉首吾道非耶某甲志無竒丁年逾邁無端讀書已墮左計登髙能賦更負悔心手縱敏於八义眼易迷於五色造化無功於筆補瑕玼皆得而毛吹用是息黥倦於取刖蠧書叢只麟史在焉遂偷白日之閑竊考素王之㫖筆則筆削則削頗知齊晉正譎之情信傳信疑傳疑仍見公榖婉裁之趣亦創通於大義豈盡逹於微言長恐􅀞虎之不成必至屠龍之無用自惟鑄錯孰與訂頑属聞君子之弦歌將興春誦咸謂有司之衡鑑莫遯秋毫聊爾逢場豈其定覇萋菲具錦果聞其後播揚糠粃不意在前謂我不堪於公何有伏遇某官以魯禽父作楚縣公妙割無雞牛民自得於桁楊之外空弦落狐兎士亦慙於檟楚之威有懐桑椹之好音還舉􅁄闈之故事且從隗始以善鄭來某敢狃近功遂忘逺業玉川破屋而巳矣當益抱於遺經武城得人焉耳乎請僣陳於故事西府先生之在吾泮賸有菁莪東閤郎君之稱其家可無桃李胡不招諸生而立館下從而養弟子以敎國中盡拔十得五之功必有濟以上酬以一當千之夢寜謂秦無人謝成都解頭劉省元應起制春秋之義傑出妙齡貢郷曲之英褎爲舉首未遑賛慶過辱修辭恭惟某人青藜故家碧梧雋質被孟母三遷之教獨抱遺經當陶舒二八之年創通大義遂魁里選行冠臚傳某何預升賢亦􅂪巽謝愧游夏一辭之莫措但知頂戴於名經慕回路二子之與言更兾潜心於大業謝成都解元五十一人恭審論秀貢英䇿名偕計少城百重列隧自應炳井絡之靈後賢五十一人夙已載華陽之志兹應元年明先聖之詔式副吾皇紹烈祖之期伏惟某人屹自岷峨濯以江漢相如七經之授不專靡麗之辭子雲四賦之工蓋有湛深之思兹並登於天府聞允愜於月評某未遂納交過勤委贄客星入斗恐當回八月之槎魁首枕參尚及窺五雲之瑞回臨安江解頭克家遺經究終始指洞識於數千考官敢瑕玼擢冝居於第一雖知有無德無怨之語然可逭不公不明之嘲何煩摛文更加摧謝恭惟某人傳家忠孝餘事文章安夏攘夷聊復道威文之事發凡言例又能措游夏之詞空萬馬以皆瘖戴六鰲而爲首其義則竊取矣幸不辱天府之書盡心將親覧焉尚幸聽雲門之奏某慙無識鍳濫主文衡掣鯨鯢於碧海之中僅塞直鈎之責對龍蛇於丹墀之下願無曲學以言謝解頭景簡文屢入澤宫聞夙擅春秋之學褎爲舉首喜可塞月旦之評有勤属辭良髙陳誼伏惟某官學濟世美敎自母慈景子君臣之大倫乆於舒究仲尼筆削之微意何止創通當再進再郤之餘厲萬選萬中之技楚雖有玉正恐在三獻之餘秦豈無人其誓告羣言之首某濫叨勸駕愧闕贈鞭先十二以犒師已窺肯綮擊三千而徙海尚見扶摇謝衆解元貢郡國之英濫修嵗貢詢鄉曲之譽喜恊月評何勤属辭特枉抒謝伏惟某官學窮根柢文識波瀾挿架五千耻爲無用之蠧累棊十二迄承若掇之蜩省元張焱用百篇坦然之書占七人作者之列辰省髙拱元兹提麟筆之􅀌上應鳯苞之九省元句龍道兹䇿彫蟲之工竟登乗鴈之數有司論秀免不公不明之嘲國家急賢望斯謀斯猷之入某過勤委贄何與提衡三魁天下之儒在加意耳五靈王者之瑞尚寓目焉回陳上舎伯鳯相如入室蜀賦自工張叔詣京漢都增重有勤曵履且辱鳴謙恭惟某人江漢載英岷峨擢秀子昻始髙蹈信有雲仍季方難爲兄夙髙月旦比者齊魯之賦粲然虞夏之庠志目中眉屈居曰俊曰造之冠擢角㧞齒粗免不公不明之嘲兹蒙四六之貽良重再三之愧某頃從化闥獲讀阿房吹河東以上天幸窺吐鳯圗天南而擊海更願培鵬回水丘先輩謝解褎考其行藝恐遺天府之賢擇乎中庸偶協月評之望所謂得子之是頼少逭有司之不明敢圗撝謙更加巽謝考其行藝恐遺天府之賢擇乎中庸偶恊月評之望所謂得子之是頼少逭有司之不明敢圗謙撝更加巽謝恭惟某人殖學有裕掞才不貲曲禮三千得恭儉莊敬之教重言十七非􅃈碎排偶之詞兹歌鳴鹿之三遂賦良馬之四強學待問不難得禄以得名正心脩身諒必踐言而踐行某摩挲俗眼邂逅譽髦何勤纚履之臨更垂衘袖之贈洗風塵之袍袴愧少緩於報章對日月之衮衣願更思於長䇿回趙先輩子直謝解登于天府正恐􅀒賢能之書採之月評幸不失鄉曲之譽何勤私謝更費雄文恭惟某人學深百篇氣蓋諸子不但勤簡編之燈火蓋亦冨師友之淵源浩乎沛然乆已喧京師之價論其秀者固應㧞俊造之羣兹歌鹿鳴之三果空鷙鳥之百某濫賔計吏冒主文盟考十七之重言幸逃迷眼勉三千之獨對更望盡心回武岡新舉蕭漢龍詢鄉曲之譽未遂承顔獻賢能之書忻聞舉首有來委質益仞鳴謙恭惟某官巫水之英斗山其秀深灝灝噩噩之學䆒明明穆穆之源吕侯之辟三千既知奥義蕭何之功第一冝稱名家幸益窮上世之遺書庶亟對皇帝之清問某濫叨渉筆何與提衡聞東海生之名喜先鳴於雞口飬北宫黝之勇願拭目於龍頭回新舉王道明采芹論秀夙聞能賦之聲撤􅁄登名果中賢書之選未皇走賀猶辱謝牋恭惟某官家學有源鄉評甚膴擬靈光之作乆􅀒逸材奏混成之篇行占逺器兹歩漢南之獨遂空冀北之羣鵬擊三千更觀變化龍飛九五亟快依乗某不武之資斯文何與一第溷子未足見志士之榮三釡及親願以爲執事者勉回免舉士人謝啓樂正論秀而升諸得時則駕公等何見之晚也博我以文鳴謙尊光擊節降嘆恭惟某官舊穿楊葉新躡桂叢鵬怒而飛九萬里風斯在下龍潜以躍三千字日固未斜惟時懋哉遐不謂矣某已稽掃榻偶失迎門子來見我乎良感贈言之繾綣吾亦欲東耳尚容拭目於騰驤回免解杜省元論定秀士之賢者乆欲納交不見諸侯若小然兹勤委贄文旣工於儷六雅復許之肄三恭惟某官句似少陵學如元凱牧之能賦冝髙擢於唐科子夏直言盍亟登於漢殿公等安在主上喟然從先生者七十人有勤私淑摶扶摇而九萬里㑹即髙騫有如骳骩之文何辱簸揚之巧某聿來和義深願友仁一話一言固已可觀於竒崛三熏三沐尚圗續欵於清揚回試官袖啓某伏以獻賢能之書有嚴春貢登文章之籙來主夏盟既爲國以得人更以文而博我恭惟某官學探宏奥味别澠淄夜凡䟦紅寕慮三條之燭盡寒䆫穿碧豈容五色之眼迷提玉尺以裁雲倒珠胎之貫月捜阿房之賦料亦焦心論石渠之經諒多㧞角春秋十二已歸此日之權衡禮樂三千何惜當年之衣鉢某兹承撤􅁄幸遂識荆思飢􅅙蝕葉之聲悵難㝷於舊夢冩饕蝨濕薪之景尚願聽於新篇及第回王省元冑謝取中觀春秋之林潜心乆矣登文章之籙爲首褎然足愜公言何勤私謝恭惟某官深於蓄德餘以績文束五傳而抱遺經獨明大義外四夷而内中夏洞䆒微言果以海内寡二之才出當天下第一之選義則竊取矣可逭有司之不明來不亦樂乎更幸斯文之未䘮至如榮進之素定何待抗聲而自陳某偶綴蝨官預窺麟筆求珠而徑寸先得自賀其遭跂織而七襄不成未知所報回何釋褐大圭中的璇魁解韋璧省十九年無全牛之刃頓見異材九萬里運化鵬之程實開逺業恭惟某官學有源委行無瑕玼曲禮三千冨春誦夏弦之學圜橋億萬髙月書季攷之功果收傑出之科亟被非常之渥榮進素定無􅀒明天子之殊知要路在前自有鄉先生之近比某濫叨􅀝席例沐投瓊夀知武故厚之敢爲䛕語堅於愈同業也敬誦祝規回郭正奏應王正奏巳之䇿名外省趣對中宸三卯風塵率聚五星於十月六丁雷電迄摶六翮于九霄得賢之稱通國以懌恭惟某人箕裘家學圭璧鄉評讀百篇科斗之文夙研奥義及重闈慈烏之哺遂擢巍科某人夙堅雅操獨抱遺經瀘水七禽轉蓬不嫌於地逺沅江九肋擢桂遂破於天荒諒加強學待問之功式究正主庇民之藴某誤蒙渙號濫主坤文頴人稱之曰門生既聞耳矣仲舒褎然爲舉首尚拭目焉占謝惟􅀷敷宣罔既回嘉定張正奏庚仲奏賦蜀都登名漢殿西望太白固疑有沉􅁳之珍東越玉津乃今得暐曄之秀公言甚惬私謝何厪恭惟某人岷峨之英江漢以濯學皆齊魯箕裘殆張叔之家文麗卿雲皷吹有平子之作嘉魚固出於丙穴頋兎迄變於卯年皷三級以先登及雙親之未老龍墀之對三千字更幸勉之犍爲之磬十六枚自此升矣某幾迷五色幸放一頭吟饕蝨濕薪之詩何幸快風塵之洗轉走馬㸔花之句願亟乗天地之寛回辛正奏守謙張正奏東寅摛藻奏名集英趣對毛頴封於卯地開蟾蜍入月之祥雲夢吞於子虚展駟馬題橋之志恭惟某人玉津毓秀磬水蜚聲辛云周太史之雲仍冝箴王闕魏佐治之風烈盍引帝裾張云遥遥張叔之家學固同於齊魯巖巖孟陽之裔銘逺綴於岷嶓遂掃三峽千人之軍上輔五星十月之聚九萬里風斯下已開鵬海之程三千字日未斜無􅀒龍墀之問某朅來石郭獲讀阿房􅀃古戰場幸免眼迷於日色吟髙軒過尚幾手决於天章回類元唐正奏應龍學者發凡言例多違舊章大夫精心致思褎爲舉首幸公言之惟允何私謝之敢當恭惟某人大江炳靈通泉噴薄能賦如勒夙擅詞章學易於都更深經術䆒遺經於獨抱㑹大義於創通文成數萬指數千首先鳴於雞口臣書第一無第二今徑躡於龍頭惟功名留乆逺之看即温飽非生平之志察牛堪之意既不違俗而取名知頋郎之恩更期蓄力而秉志某初微風鑒濫佐星堂青袍白紵之糊名已多迷於方叔紫磨黄金之定價願無􅀒於長公回郭正奏佺闕郭公之疑昔甞恐春秋之罪我道齊威之事今始論秀造而告王愧余五色之眼迷遲公十年之身到恭惟某人岷峨世載江漢淵回墊林宗之巾夫子歩亦夫子老汾陽之考中書乃不中書信大器之晚成嫌脩門之徑入秋風退鷁坐觀巴火之九鑚春浪化龍始透禹門之三級願培鵬背徑跨鰲頭某濫佐星堂安知風鍳束之髙閣知無用公榖左氏之文造在大庭尚聳聽晁董公孫之䇿回曹正奏䇿名上第趣對中宸司徒論秀而升諸幾迷五色公等何見之晚也亟放一頭幸愜公言何勤私謝恭惟某人振鐸昭穆子建波瀾列仙甚癯聞素甘於蓼藿良工獨苦善致飬於􅁄薪兹遂一鳴以驚人式副三遷之教子曹交假館所謂求之有餘師仲舒造庭佇見褎然爲舉首某朅來五壘得讀阿房青衫當綵衣至羡封人之有母丹墀攄素藴更觀讜論之告君回曹正奏二年滿戍鷁回首以東歸再命作州蟇朶頥而西頋有勤賀語祗發愧情恭惟某人春藻吐葩秋竿秉節一第溷子聊償戀闕之丹心三釡及親足慰在堂之白髪猥承妙製見遺陳人某藏去爲榮已知所賀踟蹰五馬良慙出谷以迁喬縹緲􅀌鴻但願送江而入海回王正奏正寅一第直溷子耳安用謝爲幾日來見我乎更勤言贈爲之三復佩此一謙恭惟某人世載其英學優則仕紫電將軍之庫尚有典刑紅帶宣義之家豈其苖裔奏河東之賦空兾北之羣某偶佐文衡獲觀筆陣於我無怨亦無德但吟坡老之詩有司以公不以情愧乏昌黎之序回張正奏申之䇿名外省趣對中宸知我者春秋罪我者春秋幸已酬俯拾之芥先進於禮樂後進於禮樂安知非居上之薪恭惟某人家傳一編胷藏三篋遺經獨抱精於措游夏之詞大義創通較若辨威文之事迄膺衆選進以言揚某偶綴文闈獲觀筆陣辨棟樑於七年之後幸免遺材器根柢於萬乗之前更觀㧞萃回特奏名李學正鳴鳯射䇿登名拜恩諾仕公等何見晚也而迷其邦論定然後官之其有所試伏惟某人負材瓌特蓄學奫深太白有文章之光冝早登於唐殿仲元豈華藻之力頋乆滯於蜀都有來桑榆之收不􅀌芹藻之采冨貴必從勤苦得少酬鐵硯之勞功名亦在老大時行對蒲輪之召某未皇走慶猥沐貽箋春草隨袍等是天公之雨露秋竿有節相期嵗晩之氷霜回王特奏相悟􅂋膺恩紀榮簉儒科東隅而收桑榆雖􅀒心期之壯北山之有杻楰足爲眉夀之光恭惟某人波瀾老成魁壘耆艾如尊乃勇合爲叱馭之忠臣薦褒有材冝即運籌於聖主何踞鞍之矍鑠始奮䄂以低昂亮無恨青衫之枯行即膺紅帶之寵某未皇賛慶猥沐貽牋㧞薤而規龐參願聞忠告褁蒲而迎枚乗尚見詔除回特奏侯新恩曾榮偕計該恩登名筮仕半世就舉選良忻叔起之未衰朝廷少舊臣更喜君房之肯出伏惟某人抱材膚碩蓄斈弘深風翮大鵬本有垂雲之翼天閑老驥不争暮日之塗器固大於晩成召亟膺於朝奏魏有隱士實由年德之髙漢迎太公亦籍老成之力某未皇謁賀猥沐貽牋愧無乖崖翁屈留賢者近識峨眉老尚問政焉梅亭先生四六標凖卷十三梅亭先生四六標凖卷之十四生辰代胡侍郎謝朝士賀生日生我劬勞撫六弧而增感俾爾􅂄艾捧連璧以知慚恭惟某官厚德嘘枯高詞發藻五十之年過二應憐坡老之衰三萬之日無多欲擬茶山之老華其斑白飾以青黄人情欲壽欲安知所蒙矣君子善頌善禱何以報之代謝朝士巳下五十之年過二孰記衰顔什伍之星有三猥勤善頌頋方思罔極之德何敢當不􅀋之歌簸弄明珠藏但􅀷於十襲嘘呵凍筆報有愧於七襄謝黄侍郎伯固生日詩絳縣老人之生甲擁翠節以知慙黄絹㓜婦之受辛感碧幢之委重愧踰垣之莫避且返璧之未能恭惟某官帷幄近臣詩書元帥怜生我勞瘁之旦有愴蒿莪歌俾爾􅂄艾之詩使堅松栢勞以春天之尊酒副之秋月之兩章殆念苞栩憇棠之隂􅂚稱飛芻刻楮之役某平頭六十関慮萬千思玉局老之養生安得還郷而􅀐鵠從金華仙而學道或􅂪叱石以爲羊謝魏侍郎了翁生日詩乆生不學蹇蒲栁之先零􅀄度無能困樵蘇之後㸑過辱兩章之秋月見期千載之春風留歸壓於魚舟難捲還於鯨錦恭惟某官拍肩諸老畜眼一人天不㭬民將謀及詩書之帥人能棟道恐冝在條理之科閔六十服戎之夫窘千里餽糧之役我辰安在敢祈牛斗之能神夫子言之或免蟪菌之俱腐某属有國故且無親存方兹疚懷於劬勞只得痛謝於頌禱先生與之言則對參乎奚避席之疑小子何莫學夫詩武也請卒章之受謝諸處監司賀生日我年六一真成薄頽景於西山春餘半分未許託老人於南極茲届劬勞之旦敢當褒借之詞恭惟云提刑六轡澄清十行炳煥云運使斧繡光輝珠璣咳唾賢者告以善揆亡菑亡害之􅀄愛之欲其生有爾熾爾昌之詠所愧泥􅂗之絳甲要非光熖之白庚某有味其言不知所賀君子謂之善頌相期食蛤以踞􅀛使臣不敢與聞但願放牛而歸馬謝都大賀生日詩匪莪伊蔚正􅃡思罔極之天以蘿施松辱許共後凋之嵗然頭白走雪山之戍覺􅁂青􅀒寳蓋之峯幸聮公子之婚姻見假長庚之光熖恭惟某官粃糠團鳯轡䇿翔麟一雄將十萬之雌識神駿於驪黄之外六經佐三尺之法辨澠淄於兎􅄄之中眷此陳人寵其􅀄度正欲歸耕於詎思入對於延英某有味其言不知所報絳縣老人之生甲花六十以旣周黄絹㓜婦之受辛椿八千其安用謝都大賀生日詞皇揆余度巳勤溢羙之言子與人歌更作新凉之賀輙駢四六仰謝再三恭惟某官學廣文多筆精墨妙歌鍾二肆和諧魏絳之聲騋牝三千教習開元之舞寛望秋先零之念賦陽春寡和之章某重拜珍投宛成珠貫贈以緑綺愧莫報於􅀟南冩之烏絲惟謹藏於十襲謝吕提刑壽詩泥􅂗絳老正自疑甲子之年霄漢繡衣猶記揆庚寅之度鼎來好語賁飾孤生恭惟某官高􅁩薄雲長毫裁霧舊游楚地未寒車馬笠之盟今戴蘇天尚念斗牛箕之􅀫􅀟節帡風而幪雨兩章對月以偕星某逺守石􅀛􅀷慚玉燕報德罔極劬勞但感於蓼莪有功見知勞來請歌於枤杜謝提刑蕭艾賤生桑蓬􅀄度但切劬勞之感敢當頌禱之勤恭惟某官盛德嘘枯髙文發藻旣旌厚意又蕆多儀區區私情拳拳戢佩謝吕運使賀生日霄漢繡衣遷轉木牛之運瓊瑶錦叚寵光芻狗之陳揆􅀄度以何榮受徽言而增愧恭惟某官脩名揭日高􅁩薄雲篤車馬笠之盟不挾貴不挾長問斗牛箕之􅀫無以名無以懷七言撮白玉之舟一字重黄金之價某身方受察心巳懷歸使臣必諮於周惠而好我人情莫不欲壽更以贈君謝生日投詩代何月湖彼其之子鵜積愧於在梁我生之辰牛豈神於奮角茲勤善頌徒發愧情恭惟某官藻掞天庭句穿月脇怜絳人之甲子混在泥􅂗記孟陬之庚寅眷焉遲暮特華其老相贈以言某取數旣多餘年無幾欲報罔極之德巳廢蓼莪敢當不􅀋之歌請辭假樂代謝生日投詞皇覽揆余􅀄度漫扈江蘺子欲養親不存但悲風木茲勤妙語徒發愧情恭惟某官脫時丗粧續古樂府温柔重厚有二雅之正言婉麗清新無六朝之俳體惠而好我何以報公某愧乏辰猷空踰亥首聽陽春之寡和爲調彌髙享肆夏之升歌請拜其細普謝見任官賀生日詩詞伏以小人不知紀年恍近平頭之六十君子爲善頌禱仰勤厚意之再三受言藏之有感多矣恭惟某官英詞漱潤盛德噓枯愛之欲其生忘泥􅂗之爲辱賢者告以善任牛斗之不神所慙雌甲之辰難擬長庚之夢某未能返璧又乏報瓊三嘆而音有遺良服朱弦之䟽越千嵗而眉無害還祈黄髮之壽胥謝學職十四人投詩賀生日伏以召南之詩十四固足繫騶虞之風魯侯之嵗萬千何以當冸宫之頌良見維桑與梓之敬然增匪莪伊蔚之思伏惟某人學士岷峨之英江漢以濯他年事業半雲閣之功臣此日詞章倍建安之才子怜香山艶陽之過九信眉山近古之有三勁氣芳詞髙文大冊序所爲作者之意陳􅁩尤髙相接以粲然之文過情是耻某薾然蒲桞感此桑蓬人情莫不欲壽欲安生則烏可巳也君子謂之善頌善禱忠焉能勿誨乎謝潼川提刑謝太博賀生日伏以問甲辰之雄木旣遄諏度之載驅守癸亥之犍爲眞覺棲遲之萬狀猶蒙佳句見貺陳人恭惟某官髙義薄雲英詞組霧牛頭衮衮詎止隨丗界之花象耳耽耽猶記生池塘之草曲怜苦李承藉甘棠皇揆余降庚寅紛吾有此我與君皆丙子欲並生哉某獲守蕭規敢當唐律思其人愛其樹何如對秋月之兩章誦其詩讀其書安得共春天之尊酒謝郷官􅀉居士人賀生日詩伏以匪莪伊蒿增劬勞勞瘁之感維桑與梓辱熾昌昌大之詞何以報木􅀲之三用是光蓬矢之六恭惟某官嘘枯意厚發藻才雄半百過九年􅀏白傳艶陽之巳老分寸落千丈怜韓公牛斗之不神贈汝好辭揆余􅀄度某安知燕喜但􅀏龍鍾一唱三嘆而音有遺難和朱弦之䟽越萬有千嵗而眉無害還祈黄髮之壽胥謝潼川知府趙監丞賀生日詩伏以男子始生有負大人占之之夢我辰安在敢當先生長者之褒有愧徽言莫酬隆眷恭惟某官爲善最樂大雅不羣發更生寳􅁐之書浩如淵海岀長吉錦囊之句迅􅀂風檣有怜桃李之一株重感桑蓬之六矢吹以七言之律重於􅀟璧之貽某夙荷甄収竟成椎鈍老人無一子誰知絳甲之泥􅂗仙官勑六丁長􅀝白庚之光熖謝列郡太守以上賀生日小劫六十之風雨齒邁二齡大川三百之波濤心驚萬里揆余􅀄而增感俾爾壽以何居恭惟某官云云河漢淵海冨卿雲舒向之儲月露風煙陋盧駱王􅀭之作憐絳縣老人之生甲贈黄絹㓜婦之受辛某仕則慕君老當佚我不俟駕固將朝也良感徽言射以弧受乃􅀒之敢忘㓜志謝通判以下賀生日六十二嵗之樂愧無白鶴之新居萬里幾年之歸孰念碧雞之老客皇揆余度何及公言伏惟某官盛德嘘枯英文掞藻念苞栩之使雖叨四牡之還感蓼莪之詩無復三牲之養煖於布帛贈以襜褕某六轡旣均二節以走夙興夜寐亦希無忝於所生日邁月征尚祈不諌之亦入謝王制參等八貟賀生日王制參翊丁制機鎔蒲制機仲乙楊制幹異陳制幹噲宋制幹拱王撫幹三桂王鈐幹澥四方有志愧孤􅀒於桑蓬八公同辰辱褒期於樗櫟固辤不獲厚意何居恭惟某官合志同方集思廣益依紅泛緑培懷黄拖紫之程取白媲青忘看朱成碧之醜揆余􅀄度贈汝好詞某返璧未能報瓊焉有􅀚我生之進退真成維谷之羞俾爾壽而熾昌􅂚副如岡之頌謝丁制置壽詞轉粟青天之上牋詞來謝於青天射蓬白雪之邊度曲敢當於白雪有美朝中之措見貽方外之游恭惟某官遼鶴髙標庖牛餘刃春風楊栁之句冝拍紅牙夜月梧桐之篇何関白髮某旣聞耳矣又寓目焉適有髙峯縁雲之行别圖公堂披霧之謝謝丁制置賀壽詩塵外花村巳辱春風之一曲雪邊蓬矢又勤秋月之兩章拜君貺以何多揆余􅀄而增感恭惟某官詩書元帥翰墨宗工歷井捫參憐長庚之伴月簸箕挹斗􅀏韓子之生辰旣貽一倡之三復畀七言之二拊躬感槩拜賜駢蕃某政爾避喧又蒙委重自爲青城客愧擬住之未能贈我翠織成欲捲還而安敢回賀生日戊子生我勞悴揆􅀄度以增悲俾爾熾昌受徽言而重愧甞巳戒門而辤璧猶蒙擲地以鏗金恭惟某官厚德嘘枯英文發藻憐香山花前之嵗正可閑行吟老坡月下之風不妨同坐特􅂢妙語見寵孤蹤某自􅀏朱愚老爲黔佐問昌􅀺之南斗乗除難挹於酒漿歌靈均之東皇偃蹇謾陳於竽瑟回武官賀生日勞我以生却青雲於垂上愛人以德歌白雪以彌髙感及爾同僚之私增揆余􅀄度之愧恭惟某官共武之服克壯其猷談􅀏詞鋒足當八面緒餘筆陣亦掃千軍有憐桑弧蓬矢之辰見致松荗竹苞之祝某不能返璧又乏報瓊人情欲壽欲安尚徼餘芘君子善頌善禱但耻過情代回曽運使生我劬勞廢蓼莪而興感俾爾􅂄艾攬茹惠以增慚敢圗髙情見畀妙語恭惟某官文得家法句通古人怜牛斗之不神了無善狀因參辰之相比借以餘光摛藻粲然厚甚某不知所賀藏去爲榮八千爲春盡自之五十而慕但激終身之思代回安撫趙尚書師睪賀生日蒲栁旣凋又届始生之旦蓼峩罔極滋􅀷弗洎之思特逹髙情勤渠下問置慚無所懷感有之恭惟某官曵履公餘鳴謙私惠憐絳人之甲子混在泥􅂗記孟陬之庚寅撫其遲暮函牋甚寵䑓餽孔殷某祗佩眷存但􅀷衘戢取公竹馬愧請謝之未能投我木桃復報章之不稱代回衆官賀生日皇揆余以􅀄度内美闕然牛與斗􅀆不神善名安在過勤妙語秪發愧情恭惟某官嬉􅀏文章游戯翰墨摩娑銅狄欲相許以乆長刻畫無塩殊不知其老醜此意厚甚而我謂何某返璧未能報瓊無有此乃相親重道拜而受之何敢當不􅀋歌顔之厚矣代回道士賀生日勞我以生能嬰兒之除滌游方之外􅀏老子之婆娑佳句惠然私情媿甚恭惟某人簸弄明月頡頏飛霞指石鼎於爐中便成聮句用榴皮於壁上豈不中書見􅂌名章有光􅀄度某偶差一念獻􅀏諸公飲馬麾蛟望崦嵫而勿迫踞􅀛食蛤與汗漫以相期代回僧賀生日拖泥帶水􅀂爲還我之未生賞月吟風更愧情人之相訪恭惟某人句中有眼筆下無痕應憐生朝認本來之面目雖脫死籍當自揣於頭顱特贈以言足華其老某似僧有髮在俗得禪庵外松枝覺嵗華之難數庭前栢樹或祖意之少分回張縣尉煥五十學易闕然觀我之生七歩成章厚甚揆余之度顧切劬勞之感敢當頌禱之私恭惟某官簮笏名家弓刀小隱擬姑熟之十詠肯爲東野之酸師廬陵之諸賢尚接江西之􅂀值分鄰燭見貺門弧某德旣多凉官仍獨冷弟子有􅀏于列者雖未見治郷人皆好之何如莫知所報回同官預賀壽詩生我勞瘁隔彌月之實訏俾爾熾昌荷祈年之孔夙感髙情之見厚豈善頌之敢當恭惟某官義篤官聮禮隆僚好怜絳縣老人之辱越在泥􅂗加黄絹㓜婦之辭寵其遲暮及差科之未動勞朋友之先施某旣感且慚罔知所報人生不滿百孰非欲壽而欲安天下逹尊三各願彌髙而彌邵回郷官上壽庚寅伏以我生之辰與王􅀲而同日物出於甲柰雌木之非材何勤黄絹㓜婦之辭更爲絳縣老人之祝恭惟某官英文發藻厚德嘘枯五十七之歸遲每怜白􅀓二千石之強直俯念朱卿假以徽言寵其􅀄度某不知所賀藏去爲榮吾黨小子之斐然乏瓊琚之效報是􅀖大夫之賢者希藥石以相生回謝同官投詩五十七之歸遲愧見唐人之句萬有千之無害敢當魯頌之歌何勤黄絹㓜婦之辭更爲蒼顔太守之祝恭惟某官薄雲髙􅁩翻水成文及爾同寮喜參辰之相比揆余􅀄度􅀏牛斗之不神贈以徽言極其善頌某自憐雌甲難問長庚匪莪伊蒿但感劬勞之罔極有枤之杜敢希守衛之勤歸回士人投生日詩生我劬勞曽莫報昊天之德俾爾昌熾詎敢當冸水之詩有勤黄絹之辭但重朱絃之歎伏惟某官文如翻水思􅀂涌泉憐白􅀓五十七之齡巳遲歸計比絳人三分一之數大似疑年贈以徽言寵其􅀄度某不知所賀藏去爲榮愛之欲其生倍有加於布帛施不求其報愧莫辨於瓊琚回三江文將仕誦白􅀓五十七之詩巳遲歸計辱魯侯萬有千之頌俾試壽胥愧非所蒙願􅀼有復恭惟某官瑰辭發藻瓊翰嘘枯贈汝好辭磨厲桑蓬之意揆余􅀄度堅凝松栢之心得非愛之欲其生所謂友以乆其道某自怜單獨倍感劬勞維摩想日邊之朝難陪雄甲謫仙尋夜郎之夢且伴長庚回學職二十四人投詩香山五十七嵗嘆歸計之巳遲凌煙二十四賢忘歌詩之不􅀋揆余􅀄度懷我好音伏惟某官氣應嵗躔才堪郎省比周家八士之數價喜倍三較魯頌四篇之文數幾用六冠以鱣堂之序寵茲鯉饋之辰小人不知紀年自甘雌甲君子善爲頌禱誤擬長庚列磬編鍾舂金撼玉某自慚一喙莫辨七襄孰殺子産吾其與之幸可免輿人之誦守得陽公民又賢也所希篤同業之盟回同官上壽詩詞揆余􅀄度終身惟切於慕親及爾同寮君子頋多於善頌過情可耻佩意亦勤伏惟某官義篤官聮材雄筆陣憐白􅀓五十七之感歸計巳遲比絳人三分一之年輿人何筭旣加膏沃復借品題某自頋衰殘難當奬予加桑弧於蓬矢之六空走四方報綺琴以南金之􅀟僅慿尺牘回衆官賀生日詩癸巳蘧伯六十之年重感劬勞於􅀄度魯侯萬千之頌難當褒拂之徽言無容屣履以迎門正恐文書之衘䄂拜珠璣之終惠列鍾磬以成編恭惟某官直氣抗峨英詞倒峽濯錦江之錦洗空黄絹之􅁝撫琴臺之琴髙掩朱絃之瑟厚同官爲僚之􅁩忘歌詩必􅀋之言使臣弗敢與聞固以王宅憂之故人情莫不欲壽且懷祝矯舉之羞某莫報七襄但藏十襲今日之受非也璧恐暗於投人忠告而善道之石尚期於生我其爲感佩罔旣敷陳回諸㕔属官賀生日五十人生我劬勞永􅀒綵衣七旬之養俾爾􅂄艾敢當錦瑟五十之絃良感同僚之盡心􅂚稱髙文之大冊恭惟某官文濯江漢筆抗岷峨四揲二分洞包犧大􅄛之數三章九㫖合公羊外傳之篇有憐揆􅀄寵貽善頌考華陽之志復見三州之後賢享穆叔之歌敢忘五善之重拜某捲還不敢藏去爲榮虀臼外孫固荷假長庚之光熖桑弧男子巳甘付雌甲於泥􅂗回魏制幹賀生日老瞻南極違入丁出丙之躔詩夢西堂愧换甲生申之句有勤親􅁩見畀英詞恭惟某官挺有祖風卓爲人鑑老者人所敬爲近於親愛之欲其生俾昌而熾對兩章之秋月藹多態之春雲某􅀝玉知慙報瓊何有沈香吟芍藥之調詎敢與聞逺志有當歸之心尚希愛助回黄侍郎伯固賀生日白鶴新居有頽景六十一之嘆碧雞老客無廣厦千萬間之思敢意逹尊特形善頌恭惟某官疇庸參井趣覲房心草蟲阜螽之勞還自天子所木牛流馬之積困哀我人斯有怜花甲之周曲借虀辛之妙某未知淑後况敢揆􅀄錦城早還徒仰羡夏官之典午清溪夜發或思伴秋月之長庚回魏機冝賀生日糟糠之堂偶當􅀄度芙蓉之褥猥辱英詞非所冝蒙願竊有復恭惟某官句穿月脇筆掞天庭借泛霞之光轉而白雪􅄃浣溪之水冩以烏絲所愧瓦磚之床􅂚副珠璣之詠但􅀷十襲莫效七㐮婚姻爲顯孫通魏宅問名啓了翁言念二星分野適並舎於魚鳬兩家提孩許問津於烏鵲仰甘棠之有笏愧苦李之無蹊熟固在於地同合殆由於天作兹者伏承某官小娘子周旋内則夙閑十七之少儀而某大學生位長孫某温習中庸詎逹三千之曲禮况未䇿賛皇之名第乃􅀼附公子之婚姻亦惟陪萬里之游因得合二姓之好卜妻占八丗克協鳯飛之和􅂆郎勤六經寔望雞鳴之戒爲顯孫通魏宅納釆啓言念納釆問名嘉禮寧嫌於重請居敬行簡省事固厭於兩回不敢虚拘敬將厚意必河之魴必河之鯉亦惟釆藻以釆蘋言秣其馬言秣其駒更冀刈蔞而刈楚菲儀不腆别楮是陳請媒書言念㭊薪匪斧􅂚諧二姓之驩釣􅁝伊緡良借一言之重况以葭莩之契獲聮榛􅀥之昏遂孫枝攀附之榮皆媒葉往來之助請期書十月在䇿交月夙契於丙辰五曰爲期吉日又符於庚午冝其孫子宴爾室家敢修一介之尺書拱俟八鸞之百兩代姜寺丞注回史丞相府定親相門岀相方託身槐􅁄之隂丞璧􅀒丞敢妄意松蘿之附􅂪以遣而下賤聘不腆之􅀂人徼福甚榮雀心知愧恭承某官階蘭堪佩足繼史魚之風而某女澗藻可湘粗閑姜鯉之教屈禮絶百僚之重今好合二姓之驩君子不㢮其親巳敬佩魯公之訓公俟必復其始願益綿魏國之封梅亭先生四六標凖卷之十四梅亭先生四六標凖卷之十五師􅀓封爵附賀丞相除少師巽避公槐升魁師􅁄萬丗䇿定盍徑躋萬石之班三台色齊乃退位三孤之長寸心如此千載無之恭惟某官厚大而􅁉和端凝而洪毅周拜乎前魯拜乎後邁韋平父子之榮陟格于帝尹格於天續堯舜君民之業自開禧之末一麾九日相嘉定之治十有七年於我如浮雲心本游於淡泊用汝作霖雨身爰佩於安危旣難挽鼎湖之龍乃力洗咸池之日周勃之誅吕迎代尚􅀚望於軍情霍光之擁昭立宣幾動摇於庭議未有獨運於掌上不煩執事之顔行爲天下得人與生民立極導慿几之命而晏然仍几輔垂簾之政而遄巳徹簾三邊絶赤白之囊萬國布黄朱之乗風雷屏息日月重光冝神聖建道德之師見輔弼爲社稷之寶比播維垣之命允孚巖石之瞻乃執撝謙力回成渙弗敢基命定命正􅀝弼諧􅀂曰父師少師何拘等級姑冠班於洪化即顓靣以經􅀖坤載物而承天盖得下裳之吉鼎以木而巽火實存上鉉之虚九重尊李泌以先生四海戴子儀爲尚父黄河如帶山如礪豈惟難拒於公珪青櫺有洞石有䆫恐合紹開於王社某夙勤坏冶自抵簡書泥􅂗乆隔於朝紳夢寐尚隨於賀臆輙慿魚繭之素恭布燕雀之私亮天地而弼一人諒益基無窮之聞理隂陽而遂萬物尚祈澤不獲之夫代董侍郎賀丞相除少師巽避公槐升魁孤􅁄奮庸而宅百揆輔茂陵十八載之隆平寅亮而弼一人開寶慶億萬年之晏粲明良交際動植均驩恭惟某官德鉅材全器閎用博累丗躬行於忠孝四朝身佩於安危河决平原力挽百川而注海風摇厦屋獨髙一柱之擎天盡返齊疆全歸趙璧金甌閑暇從容作啇野之霖玉几導􅀭談􅀏取虞淵之日與生民而立極爲天下以得人九夷八蠻服整頓乾坤之手兩宫二聖知扶持社稷之心肆疇巖石之瞻亟出維垣之命甫􅀭成渙遽執撝謙重違再命三命之共甫轉父師少師之拜元圭衮冕上猶恨無官以酬公夏􅂐通旃公豈以辭榮而邀上惟楓陛比隆於皇祖則茅封仰紹於先王西平有子我有臣垂光簡􅁽周公拜前魯拜後濟美鼎彞某自分泥塗夙蒙甄冶毫􅁵千里旣自投丹筆之書首尾八年未易復白圭之玷兹復坦明之制但增踴躍之私黄麻之似六經自此尚觀於蕃錫洪鈞之轉一氣更祈俯振於餘生賀史丞相除太􅀓成都運司作師臣巽命帝􅀓升班七十從心公亦何心於極品三千同德獨髙崇德之紹勲叶朱衣介幘之祥增黄耳玉鉉之重􅀼以􅀓者􅀓之德義不惟其官惟其人臣哉臣作股肱罕有是父有是子􅀂西京厚王陵之寵及東都旌卓茂之年雖加衡紞以鞶纓俱匪箕裘之鼎鼐於皇孝廟舊學越王當淳熈丙午之壽上皇以正月戊子而進亞父今專槐之正位有喬木之丗臣父子一家兩兩齊三台之色君臣千載重重聚四紀之間賁然緑綈之新復此青氊之舊恭惟某官清和而任直大以方禹以功臯以謨遹全絶德絳之果霍之勇難擬脩能無敵知儒者之真可乆見賢人之德一柱障黄河之决兩手洗白日之光三登二十七年萬機幾千百變内除狗䑕旋安鴻鴈之居外殄犬羊顯築鯨鯢之觀風震雨凌而棟梁自吉火炎水􅃳而鼎實各調蓋享天心非要人爵陶侃之指紋貫徹猶三遜以滋髙丁固之松夢留連甘十年之不調上念慈闈之訓日思元老之功無官酬公維師尚父猶堅謙抑力反渙􅀭姑隆絶席之班式舉載輿之典虹明帶玉􅀛顧印金備兖冕之上儀増衣冠之盛事攺容而禮論道以經平淮用八千兵更酬謝􅀓蒼生之志辤齊封三萬户㑹尋留侯黄石之盟某乆累播鈞遐瞻巖石聳聽上卷之一命阻陪潭府之三才斐然成章是以有慶乗雪邊之節傳無因拜壽杖之尊窺天上之階符願長輔化樞之運賀史丞相除太􅀓顯拜師臣榮躋帝􅀓聖人惟能饗帝復歸美於重闈太宰以禮佐王併加恩於一命實清廟之盛典非元老之私榮昔周家旣立三事之官在成王尤遴仲父之選始命􅁎旦以其師保萬民繼用畢髙以其弼亮四丗自茲以往稱此惟艱􅀂西京之遷王陵與東都之寵鄧禹雖稱異數實飾虚文惟我孝廟之盛時夙敬越王之舊學奉巵爲壽驩旣洽於兩宫絶席隆師秩爰登於一品疇昔鯉趨於學禮只今虎拜以􅀭休千載君臣聚見四十年之内一家父子併成二萬石之榮與國咸休生民自有恭惟某官鼎彜家學柱石丗臣惟說緫百官力賛事神之勿黷暨湯有一德首明立愛之惟親相儀南至之郊蕆敬東朝之􅁽克禋克祀敷皇極而錫厥庶民得禄得名受介福而于其王母二難具美三遜滋髙旣力避於維垣亦何辤於命衮日月如璧映玉佩之魚垂天地爲鑪鑄金章而􅀛頋一相主乎内幾年淹九􅁄之班三公惟其人今日正專槐之面是固舊物青氊之赤舄尤覺明公黄閤之黒頭行開茅土之封式對山河之誓某夙勤甄録聳聽郵音雖箝尾在虺蜮之區然馳心賀燕雀之厦宣麻綴文德之聽身隔重湖揲􅆱考武岡之占公冝百禄賀丞相除少􅀓雄麻渙命孤􅁄升班相堯之功巳書二十八載之半弘周之化始介三公九卿之間取之甚廉簡在則厚恭惟某官直方而大智勇且仁海晏河清藉整頓乾坤之手天明地察鍳經綸社稷之心奏琴瑟攺絃之功賛匕鬯主器之决進律固加於有徳酬公真恨於無官矧如拔去􅇯邪収洪範福威之柄且復芟夷煩亂整素王筆削之功是皆非常之元冝受不次之賞猶且固辤於專面姑令明陟於貳公惟時亞保之官蓋古司空之選􅀂稽漢制專司萬乗之宴私其在周官實任兩儀之寅亮聊丕昭於蕃錫豈盡荅於元勲昔魏王再相於淳熈首升此職故高宗獨稱於德壽謂無幾人馴正師垣宏開壽域尚式周公之猷訓惟其有之是以似之以覲文王之景光心乎愛矣遐不謂矣某忻逢盛典倍激懽悰歌芘士之詩敢忘燕雀之賀夏作得賢之頌或憐蟋蟀之吟秋代任參政希夷賀丞相除少傳􅁽命元勲序升孤􅀓三少特揖雖均爲貳公之官四夷咸賔見時乃萬丗之績君臣叶慶朝野交驩恭惟某官明允而篤誠洪􅀷而肅括調政化不調之琴瑟續古今難續之鼎彜中書十五秋得賢人可乆之德闢國數百里復寧王有指之疆迄今大寳之還詎止小球之受蓋帝王盛德之必頌獨頌獻琛而春秋常事之不書特書得玉然皆出魯公之力庸並垂周室之休敢圖古風復見今日冝亟正專槐之面乃姑循次􅁄之階功臣封爵山河聿觀繼丗少􅀓寅亮天地詎足酬庸某全託一陶獲歸三徑􅀛魚􅀼新亭之䕃亦有肺腸燕雀賀大夏之成恨無羽翼賀史丞相父太師魏王追封越王宻希夷代任樞加􅁽元勳配祠清廟考十八侯定位之次惟蕭盍侑於􅀕廷應五百年異姓之封於越肇開於封土遂吾相顯親之願彰我皇念舊之恩宗社同休華夷胥懌恭惟先正大丞相文惠師王始終三紀師保萬民湯於伊尹蓋學而臣之克同一德舜舉臯陶不仁者逺矣允協重華冝侑食以匹休曾易名之未稱思股肱於甘露想形貎於凌煙一卷之書必立師矧實先朝之舊學七丗之廟可觀德誰踰烈祖之老臣徹彼土疆儐爾籩豆惟冒丕單稱德峻加茅胙之分茲予大享先王永配椒馨之薦丕昭異數夐掩前聞伏遇少保樞使大丞相國公克享天心善繼人志故國非謂喬木蓋􅀝丗臣成績紀于太常以昭先烈用宏茲賁曰篤不忘某丗沐殊恩身逢盛事属嬰美疢莫陪東閤之賔疇允大􅀖切頌西平之子宰相賀鄭參政清之除右相兼樞使進光禄大夫成都運司作登庸舊學揆序元台能自得師謹厥終而唯始爰立作相置諸右以輔台兼緫鈞樞屹隆柱石恭惟某官兩儀間氣四海真儒淡乎如列仙之癯傑然乃萬夫之特虀塩太學四賦接古詩之流芹藻泮宫三峽避詞源之水領䄂貫九經之庫範模徧􅀟宇之宫虎􅀚螭􅉾司存雨露麟䑓鰲禁鼔舞風雷􅂎人憂天馭方危於六馬虞淵取日功卓冠於五龍學焉而後臣之政不足與間也况苞苴賄賂獨不入沂公之門且鼎鼐樓䑓抑未聞㓂相之第衆浩然其歸重公持此以安歸天下無如召公乆當相成王之左生民未有夫子今乃得伊尹之時然萬丗永頼乃可謂功使匹夫不獲焉能無耻予惟克邁乃訓千載一時天之降任是人百年幾見萬國魚頭正有関於已任十年鳯池亦何足爲公榮見伊吕而失蕭曹則知管晏之卑矣濟英衛而遜王魏此豈房杜之細耶願荷棟桴力光竹帛某一寒戍雪十暑飲冰昔周旋康成之間夙親氊坐且班次巨君之下實認履聲今聞宣黄麻之六經適尚盤靑泥之九折緇衣三章知不遺於寸善洪鈞一氣亦何間於八荒子獻相國書乎往愬㡳虞於逢怒君遣使臣禮也終更願聽其亟還賀丞相明堂慶壽并􅁽皇后禮成平淮㓂奏捷􅀖慶頻仍王勳赫奕事天明事母孝新周南正始之基有文德有武功䇿召公平夷之績一相主内四夷具瞻恭惟某官氣塞乾坤心貫日月大鈞播物風霆不顯其流形直柄當􅁠水火共成於正味無妄式遄於勿藥有孚信利於渉川理身理國厥旣兩全治内治外粲然兼舉肅雍顯相而於穆清廟㳙選休成而爰熈紫壇太姒嗣徽音正九重之寶􅁽王母受介福奉萬嵗之玉巵豈謂孽臣之姦驕敢負湛恩之汪濊楚氛甚惡動兵􅀖域之中漢相有真折衝尊爼之上薄言討伐亟遂殄殲南方之強歟北方之強歟風移俗易東夷之人也西夷之人也氣奪膽寒風聲鶴唳不但平淮雪夜鵝鳴更􅀚擒蔡信君子不戰戰必勝知人臣無將將則誅非能人百而已千疇見兼三而施四輔成帝略悉出廟謨近使􅀚其知煩使􅀚其能曾不陳於聲色無事用之禮有事用之戰悉顯奏於膚公非無敵用儒者之真孰自任以天下之重黄河如帶山如礪疇髙蕭相之功西平有子我有臣請継栁侯之雅某乆違光範逖守夜郎揆分雖一蟻之微聞喜極六鼇之抃燕雀賀夏豈惟免風雨之憂鴻鴈賔秋更乞遂江湖之樂上史丞相從辟岀蜀西去而辤大臣誤辱再三之命東征而勞歸士竟無分寸之功顧忘百謫之盈猶冒一慙之忍斐裁狂簡忸布鬱陶伏念某意廣才踈身勤事左飢來驅我遂違吾斯未能信之防年不後人巳落無聞不足畏之境徒守童烏之氣習未忘子墨之生涯滿七除二之跳踉誠覺語言之無味駢四儷六之啽哢厎堪豪傑之跪呈間或小慙小好之逢迄難大言大利之望相國禮之過矣昔甞伏光範之門大夫羅而致之乃使入河陽之幕路經灔澦􅁂已􅀟蓬身入褒斜命危一葉旣乏先登搴旗之績何逃相収連坐之刑然而聖主不加誅復令因任此非元戎所自辟殆出宻庸㑹旣建宣威之牙始獲捧從事之檄西曹地忍幸不汝疵東閤天寛理難自絶惟受性酷好學問迂哉韓子之謀矧報國獨惟文章悲矣栁侯之志顧且甘敗鼔勃溲之比至欲效朽株芝􅌲之祥有如萬不及於古人其他百無用於今丗天之未䘮斯文也儻或容小道之觀人之爲言胡得焉盍勉作大鈞之問恭惟某官道濟四海勳塞兩儀續古今難續之鼎彞調政化不調之琴瑟屹承天之一柱回障海之百川業業兢兢賛一日萬機而無曠湯湯蕩蕩作十有三載而乃同適茲殘羯之餘尚爲困獸之鬬非用儒無敵於天下何不戰可屈於人兵齊歸侵疆寧湏慿軾之力魏適樂土曾無傳檄之勞我適克至今日休汝其敬識百辟享爲天地立心生民立極賔春布萬國之和以隂陽爲炭造化爲工脩月揭重輪之照茲峻三孤之秩益章萬丗之功以保保身在明明德耻一夫之不獲當無求備於一夫輔萬物之自然要必曲成於萬物巨川作舟楫則剡木皆有用之器震風知帡幪則廣夏無可弃之材􅀖其永孚于休公有無窮之聞尚念某倍勤埏埴獨困泥􅂗菁莪在彼中阿曾出於春風披拂之内菲葑無以下體望収之秋霜刻轢之餘代黄知縣燾上史丞相錦製彌年天不哀其陟屺琴祥踰月人交􅂆其入京盍從小宰之銓勿累大鈞之播惟是沈憂之後難於故歩之尋故提孤蹤更干宰物伏念某骨凢難換器窳亡竒廣殿賜􅂁巳作半枯之葉短檠照字終無太喜之花幸脫選於七階甘服勞於百里凄其風木越在塊苫􅁄人欒欒亦旣畢三年之制余髮種種難更宰百乗之家儻繩以半九十之行寧能免落千丈之懼然痛定而思方痛其可再乎謂弓人而耻爲弓則無是也窮於五技望在一陶此蓋伏遇某官乂我受民承天載物暨湯有一德旣簡在上帝之心惟說緫百官必監于先王之憲然並用湖海之士未甞拘日月之功旣於萬物而曲成豈忍一夫之求備乞漿得酒詎敢希鵷鷺之行㸃鐵成金庶不辱龍虎之榜某敢不刮摩所學澡雪此心桃李悉在公門詎敢詠沙堤之避葑菲無以下體尚庶幾藥籠之収梅亭先生四六標凖卷之十五梅亭先生四六標凖卷之十六參政
