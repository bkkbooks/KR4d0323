  - {type: line-break, offset: 0, content: '', id: KR4d0323_WYG_021-1a01}
  - {type: variant, offset: 0, length: 2, content: 欽定, SBCK: 十九六院代回史文思彌忠率其屬以僝功慙於尸位簡乃僚而剡奏幸甚得賢公義冝然私謝何也恭惟某官早収名第晩歩選階鶺鴒在原固不私詔王之爵禄鴻鴈于野寕當廢治丗之羽儀茲聮事之偶同難見善而不舉惟是}
  - {type: variant, offset: 3, length: 2, content: 庫全, SBCK: 六之惠則貽方寸之慙某非曰納交聊復借重子􅀂無言幾失子幸暮取之拔尤君家所有更贈君無嵗寒而易葉代回黄文思燾共工率屬獲陪郷曲之英應格薦賢實致􅀖家之助是爲公舉何以謝爲恭惟某官早决科名乆淹選調學􅀷純而有本氣穏重而不浮乆矣卜鄰欠李邕之識面偶然結綬勤貢禹之彈冠何愛一鶚之章少效匹雛之力名節皎日冨貴浮雲願無忘激昻之言庶不孤期待之意某不善爲斵兆足以行偶成一簣之山亦持自賀切玩連編之月却愧所蒙代回王文思自適聮事爲僚見賢當舉同年有子相識已深輙剡櫝於公車豈収恩於私室恭惟某官丗濟其美父教之忠不謂二十年之間未脫六七階之選聊爲破白何必謝青某老矣斵輪味於推轂奏記誓報非所望於髙明處事律身願不孤於題品代回趙文思師㮚率屬共工已愧薦賢之不武陳篇奏記更勤博我之以文恭惟某官天􅂀甚淸人門具美轅駒奏歩自是千里之竒方鳩僝功未脫七階之選察其實歷當以名聞某不勝匹雛濫長五雉同官爲僚之義固巳盡心爲善最樂之功更期勉力代回彭文思耕五雉爲工正甚幸爲僚􅀟魚有尺}
