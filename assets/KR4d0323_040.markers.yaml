  - {type: variant, offset: 17113, length: 2375, content: 後漢循吏傳序其以手迹賜方國者皆一札十行細書成文詩仲山甫徂齊式遄其歸賀提刑提舉律動黄鍾倡六雄而叶氣漢律厯志黄帝使伶倫取竹之解谷斷兩節間而吹之以為黄鍾之宫制十二筩以聽鳳之鳴其雄鳴為六雌鳴亦六比黄鍾之宫而皆可以生之是為律本風生畫簜歌四牡之有功趙廣漢傳見事風生無所回避傅𤣥傳貴遊懾伏臺閣生風周禮以英簜輔之杜子春云簜當為帑謂以函器盛此節或曰英簜畫函疏以英華有畫義故曰畫函詩序四牡勞使臣之來也有功而見知則説矣其在皇皇之華宜膺簡簡之福詩降福簡簡恭惟某官徳潜剛克功播民和星駕朝天又見一陽之復詩星言夙駕雲書占歳載祈五糓之豐左傳凡分至啟閉必書雲物易通卦驗冬至之日見雲送迎從下嚮來歳大美人民和不疾疫無雲送迎徳薄歳惡故其雲赤者旱黒者水白者為兵黄者有土功諸從日氣送迎其効也諒策持斧繡衣之庸即詠鳴玉紫宸之句杜詩杖藜雪後臨丹壑鳴玉朝來散紫宸某心如灰冷材乏線長使者汝容固足回春於黍谷東坡詩勸農使者不汝容因君作詩先自効丞哉余負行歸曝日於茅簷韓文丞哉丞哉余不負丞而丞負余列子宋國有田夫嘗衣黂過冬暨春東作自曝於日美之不知天下之有廣厦隩室綿纊狐貉謂其妻曰負日之暄人莫知者以獻吾君必獲重賞歐文内制集序凉竹簟之暑風曝茅簷之冬日韓詩暉暉簷日暖且鮮陳後山詩暮年五斗得千里有愧寒簷背朝日賀趙提舉甲申甲申為寧宗嘉定十七年魯雲書至實呈紛郁之祥史記若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂卿雲趙日御冬益顯光華之遠左傳趙衰冬日之日也趙盾夏日之日也錫公純嘏詩天錫公純嘏眉夀保魯箋純大也受福曰嘏乂我烝民尚書烝民乃粒萬邦作乂恭惟某官徳配陽休氣排冬凛舊游天禄飽看芸草之芳漢書天禄石渠顔師古曰三輔故事天禄石渠並在未央大殿北以藏秘書漢宮閣疏天禄麒麟蕭何造以藏秘書處賢才西都賦天禄石渠典籍之府西京賦天禄石渠校文之處東京賦内有天禄宣明揚雄傳校書天禄閣上靈帝紀注天禄獸也今鄧州南陽縣北有宗資碑旁有二獸鐫其膞一曰天禄一曰辟邪據此則並獸名也漢有天禄閣亦因獸立名月令仲冬之月芸始生注芸香草也著於衣書可以辟蠧漢種之於蘭臺石室藏書之府故秘書省謂之芸局陳子昻集持三寸筆入芸香之閣爾雅翼云老子云夫物芸芸各歸其根芸當一陽初起復卦之時于是而生此則歸根復命取之于芸洛陽宫殿簿云顯陽徽音含章殿前各植芸晉宫閣名曰太極殿前芸香四畦式乾殿前芸香八畦乃知九畹百畮非虛語也今使江南尚作梅花之寄見前驗刺繡五紋之永杜詩刺繡五紋添弱線知衮衣九罭之歸詩九罭之魚鱒魴我覯之子衮衣繡裳鴻飛遵渚公歸無所於女信處某材乏線長心尤灰冷負暄炙背詎敢輸畎畆之忠嵇康與山濤絶交書野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣餘見上條安性掩身尚或備軒輶之訪月令仲冬之月君子齋戒處必掩身身欲寧去聲色禁嗜慾安形性事欲靜以待隂陽之所定風俗通周秦常以歳八月遣軒輶之使採異代方言還奏之西京雜記揚子雲好事常懷鉛提槧從諸計吏訪殊方絶域四方之語以為裨補軒輶所載亦洪意也賀林提舉清臺課厯肇新三統之元説文課試也増韻計也程也律厯志雜候上林清臺課厯疎宻繡節觀風順應一陽之動王莽傳遣使者分行天下覽觀風俗恭惟某官剛大養氣豈弟近民詩豈弟君子史記魯世家平易近民民必歸之斂散得宜粟若源泉之混食貨志民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重凡輕重斂散之以時則準平宋職官志提舉常平司操常平斂散之法申嚴兌役之政令治荒修廢賑民艱阨職源提舉常平司掌常平義倉免役市易坊塲河渡水利之法因民之有無歳之豐凶而斂散賑濟之周益公詩斂散新陳倚繡衣荀子財貨渾渾如泉源汸汸如河海暴暴如丘山中和誕布黍回寒谷之温王褎傳使褎作中和樂職宣布詩師古曰中和者言政治和平也宣布者風化普洽無所不被諒對休辰益裒純嘏某適拘分閫良阻造門視履考祥願觀不遠之復並見前仁民愛物無忘自養之頥易觀頥觀其所養也自求口實觀其自養也賀趙提舉汝讜按緹候氣律已兆於六雄後漢律厯志候氣之法為室三重户閉塗釁必周宻布緹縵室中以木為案加律其上案厯而候之氣至者灰去餘詳見前衣繡觀風功益高於四牡道随剛長徳與福崇恭惟某官清湛氷壺和鍾玉琯琯或作管説文古者琯以玉舜時西王母來獻白玉之琯零陵文學姓奚於泠道舜祠下得笙玉琯以玉作音故神人以和鳳凰來儀趙日可愛既開南嶽之雲左傳酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也注冬日可愛夏日可畏豳雨其濛更激西江之水詩我來自東零雨其濛莊子激西江之水而迎子可乎詳見前慨然攬轡行矣賜環栁詩賜環留逸響某濫長十連禮記十國為連連有帥又逄亞歳江湖兩地幸再同君子之僚韓文留守無事多君子僚原隰五章請重拜使臣之善左傳四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜賀王提舉與權身為國史自當書辛日之雲杜氏左傳序身為國史躬覽載籍必廣記而備言之左傳僖公五年正月辛亥朔日南至公登臺以望而書禮也凡分至啟閉必書雲物為備故也君遣使臣顧使餐丁年之雪詩序皇皇者華君遣使臣也李陵答蘇武書丁年奉使皓首而歸梁書王僧孺傳丁年蓄積與此銷亡盧照隣詩丁年遊蜀道斑鬢向長安王荆公詩丁年結客盛遊從宛洛氊車處處逄蘇武傳幽武置大窖中絶不飲食天雨雪武卧齧雪與氊毛并咽之有功則説詩序有功而見知則悦矣何福不臻恭惟某官致孝卧氷董仲舒傳舜業業日致其孝王祥傳性至孝繼母朱氏常欲生魚時天寒氷凍祥解衣將剖氷求之氷忽自解雙魚躍出移忠叱馭孝經君子之事親孝故忠可移於君叱馭王尊事屢見生芸挺荔厭夜直於承明嚴助傳厭承明之廬注承明廬在石渠閣外直宿所止曰廬舒栁放梅甘曉行於湘水見前花甲方周於六十吕氏春秋大撓作甲子唐李淳風有六十花甲子歌椿齡正衍於八千見前某雌伏負丞後漢趙温字子柔為京兆郡丞歎曰丈夫當雄飛安能雌伏遂棄官去鳳鳴倚嶽杜詩佇鳴南嶽鳳欲化北溟鯤繡衣持斧儻憐同三㸃之鵷行見前黄鍾為宫尚或收一聲之牛鐸律厯志五聲之本生於黄鍾之律九寸為宫或損或益以定商角徴羽晉書荀朂傳初朂於路逄趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者山谷詩牛鐸調與黄鍾同, SBCK: ''}
