body:
  text: 四六標準巻十宋李劉撰進職賀董侍郎居誼進職雜學除學士制垣進秩職源翰林學士與中書舍人分為兩制權徳輿集左右掖垣承天子誥命寳閣升班宋㑹要龍圗閣宋大中祥符中建在㑹慶殿西偏以奉太宗御書御製文集及典籍圖書寶瑞之物東坡集中禁寶儲學士班在樞宻直學士之下大中祥符六年詔結銜在本官之上諭蜀良勞勉狥假留之願司馬相如傳諭告巴蜀民以非上意冦恂傳百姓遮道曰願從陛下復借冦君一年乃留恂長社鎮撫吏人登瀛固寵况加真拜之榮宋史職官志仕人以登臺閣升禁從為顯官而不以官之遲速為榮滯以差遣要劇為貴途而不以階勲爵邑有無為輕重時人語曰寜登瀛不為卿寜抱槧不為監翰苑新書李昉入直翰林盧多遜已任學士太祖見昉在多遜下問其故宰相曰昉以本官直學士院未即真拜真拜學士在多遜之上綸綍載揚紳緌交慶見前恭惟某官清如秋刷爾雅釋詁挋拭刷清也周禮淩人職夏頒氷掌事秋刷注刷清也先鄭云刷除氷室當更納新氷後鄭云秋凉氷不用可以清除其室和若春陽雲夢胸寛吞一百八盤而無險司馬相如傳吞若雲夢者八九其於胸中曽不蔕芥陸務觀入蜀記南陵山極高大有路如綫盤屈至絶頂謂之一百八盤葢施州正路山谷詩浮雲一百八盤縈落日四十八渡明又云一百八盤擕手上又云一百八盤天上路又云蛇退猿啼百八盤即此謂也一百八盤自荆州上峽入黔中路名山谷書萍鄊縣㕔云略江陵上䕫峽過一百八盤渉四十八渡天風背厚獨負三十六郡而有餘莊子風之積也不厚則其負大翼也無力故九萬里則風斯在下矣而後乃今培風背負青天而莫之夭閼者而後乃今將圖南三年有成萬物吐氣杜少陵舂陵行序今盗賊未息知民疾苦得結軰十數公落落然參錯天下為方伯萬物吐氣天下少安可待矣不見賈誼固深半夜之思賈誼傳文帝思誼徵之至入見至夜半文帝前席既罷曰吾乆不見賈生自以為過之今不及也願借冦君難抑庶民之請見上文仍魚鳬之開國見前峻龍馬之負圗曲阜集河圖寵名増峻班列一札細行增井鉞參旗之重後漢書一札十行細書成文天官書東井為水事其西曲星曰鉞晉天文志列鉞一星附井之前主伺滛奢而斬之故不欲其明明與井齊則用鉞于大臣參旗九星在參西晉書輿服志參旗分景帝車含曜蘇易簡擬宋玉大言賦日烏月兎曜文明也參旗井鉞嚴武偹也詳見賀綿州高知府赴召條三謨大訓貫奎文壁府之華尚書有二典三謨又赤刀大訓孝經援神契奎主文章注奎星屈曲相鉤似文章之畫晉天文志東壁二星主文章天下圖書之秘府也明則圖書集道術行歡動南衙唐制天子居曰衙行曰駕一曰行軍有衙尊者所在後人因以治為衙宇文士及傳南衙諸臣靣折廷爭李揆傳本朝置南比衙文武區别高元裕傳西頭勢乃重南衙樞宻之權過宰相膽寒西賊宋名臣傳范文正公與韓魏公協謀必欲收復靈夏横山之地邉上謡曰軍中有一韓西賊聞之心骨寒軍中有一范西賊聞之驚破膽學士象八節不過一嵗之少留新唐書百官志分注景龍二年置𢎞文館大學士四人以象四時學士八人以象八節直學士十二人以象十二時又翰林學士一嵗則遷刺史入三公便在五雲之多處後漢書尚書令僕出為郡守郡守入為三公杜詩南極一星朝北斗五雲多處是三台何限麒麟之畫漢宫殿䟽天禄麒麟閣蕭何造以藏秘書畫賢臣蘇武傳宣帝甘露三年二月單于始入朝上思股肱之羙乃畫霍光等至蘇武凡十一人於麒麟閣明著中興輔佐列於方叔召虎仲山甫焉滿期龜鶴之還某何足控搏並見前洊蒙料理南史陳帝紀論黄塵汚人衣皂莢相料理王徽之傳為桓冲騎兵參軍冲謂徽之曰卿在府日乆比當相料理白水魚竿之入幕竟作退飛杜詩白水魚竿客清秋鶴髪翁胡為來幕下秪合在舟中左傳六鷁退飛過宋都青天鳥道之撫膺又勤羅致李詩蜀道難難於上青天西當太白有鳥道可以横絶峩眉巔捫參歴井仰脅息以手撫膺坐長歎韓文以禮為羅羅而致之幕下與其徒索長安之米見前不如來賦灧澦之堆李詩瞿塘灔澦堆東坡作灔澦堆賦云世以瞿塘灔澦堆為天下之至險以余觀之葢有功于斯人者因為之賦以待好事者試觀而思之直為文翁再剖符兆足行矣杜詩得歸茅屋赴成都直為文翁再剖符安得仙人九節杖亟往從之真誥楊義夢蓬萊仙翁柱赤九節杖而視白龍杜詩安得仙人九節杖柱到玉女洗頭盆賀陳提刑天宜進職懋賞外臺尚書功懋懋賞謝夷吾傳尋功簡能為外臺之表晉書刺史國之外臺升班中秘見前激西江之水已驗澄清莊子我將南游吳越之王激西江之水而迎子貫東壁之星有光臨照石氏星經東壁之星主文籍恭惟某官載揚淑問詩淑問在臯陶在泮獻囚淑問善問獄誕受嘉師尚書受王嘉師方當攬轡之初見前適有跳梁之冦蕭朢之傳小夷跳梁於山谷間梁絶水取魚者無煩芟薙薙音豸廣韻芟草也韓文乃草薙而禽獮之竟折萌芽李尋傳防絶萌芽以盪滌濁穢東坡冨鄭公神道碑維彼北戎謂帝我驕帝聞其言折其萌芽為赤子為龍蛇各安汝迹韓文以武則忿以憾以㤙則横而肆一以為赤子一以為龍蛇不鯨鯢不虺蜴時乃之功栁文小不為虺蜮大不為鯨鯢恩重事持不邇而逺莫可追已簡于楓陛之知説文觧字云楓木厚葉弱枝漢宫殿中多植之景福殿賦芸若充庭槐楓被宸陛音婢華以蓬山之直華嶠後漢書學者稱東觀為老氏藏室道家蓬萊山直秘書省雲烟縹緲暫煩俯章貢之流緲㣲也海賦神仙縹緲飱玉清杜詩築居仙縹緲章貢二水合為贛水東坡詩風酣章貢秋朝夕論思行即遂承明之謁兩都賦朝夕論思日月獻納嚴助傳君厭承明之廬注翰林有承明金鑾在石渠門外選詩謁帝承明廬某竊聞成命輒布賀緘何敬非刑諒益謹五辭之聽尚書何敬非刑何度非及又兩造具偹師聽五辭有功則悦行將勞四牡之征詩序四壮勞使臣之來也有功而見知則悦矣代回趙茶馬彦綰謝進職寳儲進直東坡謝除龍圖閣學士表中禁寶儲上應奎壁之象先朝謨訓逺同河洛之符趙葢以龍圖閣學士提舉川司茶馬璽命諭留經河緯洛之文章官由人重易繫辭河出圖洛出書聖人則之言進直龍圖閣控蜀通秦之𣙜牧功以久成山谷詩玉鈐金印臨参井控蜀通秦四十州𣙜謂茶牧謂馬宋制秦馬舊二萬疋乾道秦川買馬之額嵗為萬有一千九百匹有竒川司六千秦司五千九百成都利州路十一州産茶二千一百二萬斤其後文州改𨽻秦司而川司增珍州之額共為四千八百九十六秦司六千一百二十合兩司為萬有一千十有六疋所謂控蜀通秦之𣙜牧也更何為哉其有試矣恭惟某官天潢擢秀史記天官書王良旁有五星絶漢曰天潢元命包曰潢主河渠所以度神通八方宋均云天潢天津也津湊也主計度也崔廓答豫章王啟禀秀天潢承輝日觀吕安書植根芳苑擢秀清流奕葉飛英禮樂逺而光華遄車言邁並見前忠信行扵蠻貊思馬斯臧詩駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黄以車彭彭思無疆思馬斯臧正義云僖公思遵伯禽之法反復思之無有竟已至于馬亦令使至此善兹膺因任之榮宋制進秩還任者謂之因任平齋集鞏嶸擢都大坑冶鑄錢司職事修舉直秘閣因其任凡十餘年曠典也仍拜加恩之寵嵗九遷其自此見前晝三接其必然易晝日三接某越在師屯漢律勒兵而守曰屯例蒙巽謝翦白鹿坡前之草中夜枕戈白鹿山在今成都府彭縣四北二十里舊有金覺禅寺相傳晉佛圖澄所建劉琨傳琨與范陽祖逖為友聞逖被用與親故書曰吾枕戈待旦志梟逆虜常恐祖生先吾著鞭其意氣相期如此對碧鷄坊裏之花何時樽酒碧鷄坊在成都杜詩時出碧鷄坊西郊近草堂市橋官栁細江路野梅香東坡詩時夢碧鷄坊杜詩何時一樽酒重與共論文轉官代董侍郎轉官謝三府守關山之戍愧乏殊勲梁簡文詩關山逺可度逺度復難思王訓詩驅車度關山關山恒晻靄陳陸瓊詩邉城與明月俱在關山頭徐陵詩關山三五月客子憶秦川阮卓詩關山陵漢開霜月正徘徊北周王褎詩關山夜月明秋色照孤城唐崔融詩萬里照關山蒼茫非一狀沈佺期詩暈落關山迥光含霜霰㣲杜詩關山空月寒又關山同一照孟郊詩行當獻天子然後致殊勲序嵗月之勞猥升華秩無功報上有愧積中愧字重伏念某一出西垂説文垂逺邉也左傳䖍劉我邉垂谷永傳三垂晏然庾亮傳吾憂西陲過于歴陽此西垂指蜀言六逢朔易尚書平在朔易惟是窮日之力麄守封疆禮記正其封疆潘岳詩申命群司保爾封疆不敢貪天之功輒僥爵賞左傳竊人之財猶謂之盗况貪天之功以為已力乎兹蒙恩紀後漢書孔融傳文舉既非舊好鴻豫亦無恩紀吳志朱治傳所以供奉輔䕶甚有恩紀蜀志先主至京見權綢繆恩紀二主妃子傳人倫之始恩紀之隆莫尚于此矣晉書陳敏傳公胄早交恩紀特隆刁協傳協素無恩紀募從者皆委之陳書江縂傳夙荷昭晉恩紀契闊姚察傳東朝攀附恩紀謬加江淹詩儲后䧏嘉命㤙紀被㣲身俯録年勞後魏吏部郎中薛淑上言使選曹惟取年勞不簡賢否則義均行鴈次若貫魚勘簿呼名一吏足矣東魏高澄秉政乃革後魏崔亮年勞之制務求才實宋張栻胡銓乆不理年勞上嘉其亷静詔栻特進兩官銓磨勘四官揆厥所元豈無其自恭惟某官翼扶萬化器使羣工天地為爐每曲成扵萬物賈誼傳天地為鑪造化為工繫辭範圍天地之化而不過曲成萬物而不遺山藪藏疾豈求備于一夫左傳山藪藏疾瑾瑜匿瑕尚書爾無忿疾于頑無求偹于一夫致此孤蹤亦叨異數左傳禮亦異數誓殫駑力仰答鴻休轉朝請郎謝黄侍郎伯固杜氏通典朝請郎隋置散官葢採晉宋齊梁陳並有奉朝請為名唐因之顯慶制侯出身正七品上叙宋元豐更官制以朝請郎換前行員外郎侍御史荒服輦輸何益樵蘇之後尚書五百里荒服冦恂傳以輦車驪駕轉輸前後不絶韓信傳樵蘇後㸑師不宿飽注樵取薪也蘇取草也副郎銖積叨升糠粃之前韓文韋侍講盛山詩序韋矦以考功副郎守盛山東坡集寒女之絲銖積寸累孫綽傳簸之颺之糠粃在前曾㣲日奏之功尚書敷同日奏罔功僅守年勞之叙見上條然扵踈拙亦是僥踰自昔就第之侯號奉朝請後漢書賈復傳復以列矦就第二十八將傳論所加特進朝請而已注耿弇好畤矦食邑二縣奉朝請漢律春曰朝秋曰請杜氏通典奉朝請無員本不為官位宣帝紀宣帝為皇孫時得奉朝請漢官觧注三輔職如太守獨奉朝請張禹以特進奉朝請蕭朢之以關内矦奉朝請續漢書前漢列矦奉朝請在長安次三公通典東京罷省三公外戚皇室諸矦多奉朝請奉朝請者奉朝㑹請召而已野客叢書今呼朝請郎及奉朝請並作上聲攷漢書朝請其説有二如漢律所云此合從去聲如竇嬰不得朝請王陵竟不朝請之類是也師古注才姓反如杜氏通典所云當作上聲故韓退之東坡詩並作上聲押也本朝雜端之職頃視班聨杜氏通典侍御史之職有四謂推彈公廨雜事定殿中監察以下職事及進名改轉臺内之事悉主之號為臺端他人稱之曰端公其知雜事者謂之雜端最為雄劇自官制正名之餘宋史職官志宋承唐制居其官不知其職者十常八九自真宗仁宗以來議者多以正名為請咸平中楊億首言文昌㑹府有名無實宜復其舊既而言者相繼乞復二十四司之制至和中吳育亦言尚書省天下之大有司而廢為閑所當漸復之然朝論異同未遑釐正神宗即位慨然欲更其制熈寜末始命館閣校唐六典元豐三年以摹本賜群臣乃置局中書命翰林學士張璪等詳定下詔肇新官制省臺寺監領空名者一切罷去而易之以階寄員郎前行之禄仝上元豐三年詳定所上寄禄格元祐初以流品無别詔寄禄官悉分左右詞人為左餘人為右兩京新記尚書郎自兩漢已後妙選其人唐武徳貞觀以來尤重其寄吏兵部為前行最為要劇自後行改入皆為羙選考功員外專掌試貢舉人員外郎之最朢者司門都門屯田虞水膳部主客皆在後行閑簡無事宋史職官志元豐寄禄格以階易官新官朝請郎舊官前行員外郎侍御史新官朝散郎舊官中行員外郎起居舍人新官朝奉郎舊官後行員外郎左右司諫通典開元令尚書六曹吏部兵部為前行户部為中行禮部工部為後行遥瞻粉省知隔㡬塵杜詩馨香粉署妍白樂天詩文昌新入有光輝紫界宫墻白粉闈錢起詩粉署花騘入丹霄紫誥重杜氏通典省中皆以胡粉塗壁廣異記唐韋行式為西川採訪使有姪曰子威溺于神仙修煉之術有歩卒丁約者執厮役于部下子威頗私之一日辭去謂子威曰郎君道情深厚不欺暗室終當棄俗尚隔兩塵子威曰何謂兩塵約曰儒謂之世釋謂之刼道謂之塵善堅此心亦復遐夀近視土山不容一蹴談賔錄唐諸郎不自員外拜者謂之土山頭果毅言遽拜崇品有似長征兵回便授邉逺果毅景雲中趙謙光自大理正便遷戸部郎中而員外郎賀渉遂戲詠曰員外由來羙郎中望不優寜知粉署裏飜作土山頭蹴子六切説文躡也頋某無似知命不猶見前載馳載驅曾何禆扵苞栩詩肅肅鴇羽集于苞栩王事靡盬不能藝稷黍䟽言先勞而後獲所集以喻人當先勞而後得所安不稼不穡亦何取扵廛禾詩不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有懸貆兮偶成鑚員外之天誰實為將軍之地灌夫傳今衆辱程將軍獨不為李將軍地乎師古曰言既毁程令廣何地自安兹盖伏遇某官以大司馬杜氏通典大司馬古官也掌武事項羽以曹無咎周殷並為大司馬朱博傳武帝罷太尉始置大司馬以冠將軍之號春秋運斗樞黄帝坐𤣥滬與大司馬容光臨觀鳳銜圖置黄帝前為冠軍侯霍去病傳上曰票姚校尉去病斬首捕虜二千二十八級得相國當户斬單于大父行藉若侯産捕季父羅姑比再冠軍以二千五百户封去病為冠軍矦飬民以致賢人蕭何傳臣願大王王漢中飬其民以致賢人牧用巴蜀還定三秦天下可圖也開誠而布公道蜀志諸葛武矦傳評約官職從權制開誠心布公道河以南皆為晋土爭擊楫以渡江祖逖傳帝以逖為奮威將軍豫州刺史渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨歎逖愛人下士雖踈交賤𨽻皆恩禮遇之由是黄河以南盡為晉土陜而東主之周公且徹桑於未雨公羊傳自陜而東者周公主之自陜而西者召公主之詳別見藉腹中之兵甲崔浩傳世祖指浩示高車渠帥曰此人尫纎懦弱手不能彎弓持矛其胸中所懐乃踰于甲兵成塞上之金湯山谷詩塞上金湯惟粟粒燕人恱則取之昆夷維其喙矣詩混夷駾矣維其喙矣傳駾突喙困也箋混夷夷狄國也見文王之使者將士衆過已國則惶怖驚走奔突入此柞棫之中而逃甚困劇也王伯厚辭學指南云宣和取燕山群臣稱賀令一館職作表仍語以燕人悦則取之一句不得不使其人捜經句欲對未得王初寮曰何不曰昆夷維其喙矣遂用之猶念獮猴騎土牛之鈍魏志州泰為司馬宣王所知屢在艱中宣王留缺待之至三十六日擢為新城太守宣王為泰㑹使尚書鍾繇調泰曰君釋褐登宰府三十六日擁麾葢守兵馬郡乞兒乘小車一何駛乎泰曰誠有此君名公之子少有文采故守吏職獮㺅騎土牛又何遲也衆賔咸悦李詩獮㺅騎土牛羸馬夾䨇轅又沐㺅而冠不足言身騎土牛滯東魯欲試奔蜂化藿蠋之竒莊子奔蜂不能化藿蠋越鷄不能伏鵠卵注奔蜂小蜂也蠋音蜀藿蠋豆藿中大青蟲也説文蜀葵中蠶詩蜎蜎者蠋一名蚅爾雅蚅為蠋下至斗量吳書吳使中大夫趙咨使魏魏主問吳如大夫者㡬人咨曰聪明特逹者八九十人如臣之比車載斗量不可勝数唐武后遣使存撫四方所舉之人無問賢愚悉加擢用時人為之語曰補闕連車載拾遺平斗量欋槌侍御史盌脱校書郎尚叨寸進老子不敢進寸而退尺韓文進寸退尺卒無所成某所慙骯髒趙壹傳伊優北堂上骯髒倚門邉注骯髒高亢悻直之貎不足控搏見前吾愛吾廬詎敢希扵軒冕陶詩孟夏草木長遶屋樹扶踈衆鳥欣有託吾亦愛吾廬莊子今之所謂得志者軒冕之謂也軒冕在身物之儻來者也我任我輦願少緩扵鞭笞詩我任我輦我車我牛詳見前轉朝奉郎謝監司内服輦輸何益樵蘇之後尚書越在内服百寮庶尹餘見前外郎銖積叨升糠粃之前惠帝紀中郎郎中滿六嵗爵三級四嵗二級外郎滿六嵗二級蘇林曰外郎散郎也餘見前曾㣲日奏之功僅守年勞之次然扵庸謭亦是僥逾自昔就第之侯號奉朝請並見前本朝横榻之任實視班聨通典侍御史知雜事者謂之雜端最為雄劇食坐之南設横榻謂之南床其為員外之前行葢在官制之改後遥瞻粉省知隔㡬塵仰視土山詎容一蹴頋其無似知命不猶並見前水馬之走徒勞自甘退舍杜詩鴈兒爭水馬注水馬生水中善行如馬亦謂之海馬陳藏器云水馬一名水黽群游水上水涸即飛長寸許四脚非海馬之水馬也東坡詩君不見水馬兒歩歩逆流水大江東流日千里此蟲趯趯長在此左傳凡師一宿為舍増韻三十五里曰一舍左傳其避君三舍吕覽宋景有三善言熒惑徙三舍土牛之騎宜鈍何敢著鞭野客叢書前軰馬詩多引劉琨傳事如山谷詩眼明見此玉花騘徑思著鞭随詩翁是也此大綱言著鞭耳非為馬設前此葢有為馬言者按蜀志何秪謂楊洪曰故吏馬不敢駛但明府未著鞭耳世人局於所見推究不廣類如此餘見上條偶成鑚員外之天誰實為將軍之地兹盖伏遇某官仁深引類劉向傳在上則引其類在下則推其類義重噓枯後漢書嘘枯吹生憐其剪籠中之翎假之羽翼韓詩惟此兩夫子家居率荒凉帝欲長吟哦故遣起且僵翦翎送籠中使㸔百鳥翔憫其困轅下之軛借以齒牙灌夫傳侷促若轅下駒既費挈提陳餘傳左提右挈挈詰結切説文縣持也從手劫聲又加奬勞愧無成績可書日月之常尚書厥有成績紀于太常釋名日月為常尚託餘庥歸守烟霞之痼新唐書田游巖傳高宗幸嵩山親至其門謂曰先生比佳否答曰臣所謂泉石膏肓煙霞痼疾者帝曰朕得君何異漢獲四皓乎回趙司户等賀轉官斗壘藏瘝曾㣲嵗最瘝或作癏病也尚書若時瘝厥官天朝懋賞俾叙年勞見前是為平進之常晉書庾亮傳皆非姻族各以平進南史蔡興宗傳吾素門平進與主上甚疎王騫傳嘗從客謂諸子曰吾家本素族自可依流平進不須茍求禇淵傳論平流進取坐致公卿周書劉璠字寶義沛人慷慨好功名志欲主事邉城不樂随牒平進新唐書李徳裕嘗論公卿子弟艱于進取武宗曰向聞楊虞卿兄弟朋比貴勢有妨平進之路昨黜楊知立鄭朴等抑其太甚耳互見前難講同僚之謝敢圗髙誼平原君傳寡人聞君髙義願與君為布衣交董仲舒傳講聞高誼之日乆矣杜詩故人有孫宰高義薄層雲見畀屬辭恭惟某官義篤官聨周禮冡宰以八法治官府三曰官聨以㑹官治注官聨謂國有六事一官不能獨共則六官共舉之聨讀作連古書連作聨聨謂連事通職相佐助也情親事契胥保恵胥教誨有味其言尚書古之人猶胥訓誥胥保惠胥教誨鄭當時傳誠有味其言也孰披拂孰吹噓不愛其力莊子風起北方一西一東有上彷徨孰嘘吹是孰居無事而披拂是韓文吾豈有愛於力乎哉有憐邉賞躐綴外郎笑猴騎土牛之蹤真成鈍滯見前觀雀化水蛤之變要是沉淪禮記季秋之月爵入大水為蛤述異記淮水中黄雀至秋化為蛤至春復為黄雀五百年化為蜃蛤國語趙簡子歎曰雀入于海為蛤雉入于淮為蜃黿鼉魚鼈莫不能化唯人不能哀夫或承之羞不知所賀見前某未能辟榖史記留矦世家乃學辟榖道引輕身郊社志李少君以榖道郤老方見上李竒曰榖道辟榖不食之道也魏文帝典論潁川郤儉能辟榖餌茯苓久已思蓴蓴通作蒓水葵也本草生水中葉似鳬葵浮水上採莖堪噉三月至八月莖細如釵股名絲蓴九月至十月漸麤在泥中名瑰蓴張翰傳翰字季鷹吳郡人齊王冏辟為大司馬東曹掾因見秋風起乃思吳中菰菜蓴羮鱸魚膾曰人生貴得適志何能覊宦數千里以要名爵乎遂命駕而歸著首邱賦士夫爭磨勘而殺人幸容茍免宋史蘇軾傳王安石曰人須知行一不義殺一不辜得天下弗為乃可軾戲曰今之君子爭減半年磨勘雖殺人亦為之安石笑而不言將軍以告身而易醉行可匄歸唐書至徳中專以官爵賞功及收散卒大將軍告身一通纔易一醉改官改官謝丞相璧水綴員已抱罔功之愧禮記天子辟雍注辟雍圜如璧實以水内如覆盆外如偃葢也桓譚新論王者作圖池以璧形實水其中以圜壅之名曰辟雍言為國錄金閨登藉復叨寓禄之恩齊謝朓詩謬通金閨藉李詩謬題金閨籍言為架閣此聖世優職事之常而愚夫無功狀之實全出鑪錘之造敢忘竿牘之恭並見前竊以禄至宣徳之階雖八品秩通典宣德郎隋置散官唐因之顯慶制伯出身七品下叙子出身從七品上叙宋史職官志文散官朝奉承直郎正六奉直通直郎從六朝請宣徳郎正七朝散宣奉郎從七給事承事郎正八承奉承務郎從八儒林登仕郎正九文林將仕郎從九俗羡通班之寵號再登科劉知㡬史通忤時篇僕少小從時早躡通班班次也舉必五員職須六考宋紹興二十九年洪遵王希亮等上議曰自一命已上仕于州縣之間雖有真賢實亷勢不能自逹于上故為之立薦舉之法必使之歴任六考所以遲其嵗月而責其赴功必使之舉官五員所以多其保任而必其可用貳卿為之進巻東坡集文昌貳卿位次八座謂侍郎也萬乘至扵臨軒史丹傳天子自臨軒檻使百里或九十之差則分寸有千丈之落幸或通扵班筍又免待扵戍𤓰並見前惟甄異扵庭紳許帯行扵職組以此刈薪扵翹楚斯亮天功詩翹翹錯薪言刈其楚注翹翹薪貎錯雜也楚雜薪之中尤翹翹者尚書欽哉惟時亮天功如其不稼以取禾曷孚人望見前如某者起于素賤加以朱愚莊子不知乎人謂我朱愚知乎反愁我軀自安鷽鳩斥鷃之棲莊子蜩與鷽鳩笑之注崔云鷽讀為滑滑鳩一名滑雕司馬云學鳩小鳩也李云鶻鵰也毛詩草木疏云鶻鳩班鳩也簡文云月令鳲鳩拂其羽是也又斥鴳笑之注司馬云斥小澤也亦作尺鴳於諫反字亦作鷃韻㑹鴽屬爾雅鳸鴞陸佃云品中膳羞禮記内則鶉鴳鴳不木處安矣故謂之鴳亦乏蚍蜉蟻子之援見前隨材官蹶張之後不自意全申屠嘉傳以材官蹶張從高帝擊項籍如淳曰材官之多力能脚蹋彊弩張之故曰蹶張師古曰今之弩以手張者曰擘張以足蹋者曰蹶張吳王濞傳吾乘傳至此不自意全補文學掌故之聨已逾分願儒林傳以治禮掌故以文學禮義為官又嵗課丙科四十人補文學掌故師古曰言治禮掌故之官本以有文學習禮義而為之感大鈞無垠之播物見前欲小子有造扵成人詩肆成人有徳小子有造進之東膠禮記周人飬國老于東膠注東膠亦太學在國中王宫之東通典周制太學為東膠小學為虞庠膠之言紏也所以紏収學士也告扵南靣如絲如綸而如綍有隕自天易姤九五以杞包𤓰有隕自天疏言無能傾隕之者唯天能隕之此借用在沚在陵而在阿孰為之地詩菁菁者莪在彼中阿既見君子樂且有儀菁菁者莪在彼中沚既見君子我心則喜菁菁者莪在彼中陵既見君子錫我百朋注菁菁然茂盛者蘿蒿所以得茂盛者由生在阿沚陵之中得阿沚陵之長飬故茂盛以興君之長飬人才伏遇某官坤厚載物見前鼎烹飬賢易鼎象也以木巽火亨餁也聖人亨以享上帝而大亨以飬聖賢耻一夫之納溝中欲得其所招諸生而立館下恐毁扵隨故雖紏録之曹亦加超遷之渥某敢不修其可願欽乃攸司並見前卑者止髙者流當益厲六館之仁勇韓文太學生何蕃傳惜乎蕃之居下其可以施于人者不流也譬之水其為澤不為川乎川者高澤者卑高者流卑者止是故蕃之仁義充諸心行諸太學積者多施者不遐也直而温寛而栗庶可助九徳之敷施尚書帝曰䕫命女典樂教胄子直而温寛而栗剛而無虐簡而無傲又翕受敷施九徳咸事改官謝喬司業行簡同第七巻除國錄謝葛祭酒啟頭宋史喬行簡字夀朋婺州東陽人學于吕祖謙之門登紹熈四年進士第歴官浙西提㸃刑獄兼知鎮江府遷起居郎兼國子司業拜參知政事兼知樞密院事尋拜右丞相嘉熈三年拜平章軍國重事四年加少師封魯國公贈太師謚文惠所著有周禮縂説孔山文集癸辛雜志云喬文惠行簡嘉熈之末自相位拜平章軍國重事年八袠矣時皆以官貴長年羡之而公晚年子孫淪䘮况味尤惡嘗作上梁文云有園有冶聊為卒嵗之遊無子無孫盡是他人之物又乞休表云少壯老百年已踰八袠祖子孫三世僅存一身聞者憐之伏遇某官道航聖瀆法言捨舟航而濟乎瀆者末矣捨五經而濟乎道者末矣材棟儒林史記有儒林傳董仲舒發藻儒林左史讀五典三墳葢將倚相左傳左史倚相趍過王曰是良史也子善視之是能讀三墳五典八索九邱注倚相左史名韓安國傳天子方倚以為漢相元載杜相國神道碑俾時不迷倚以為相國子學九徳六舞暫假司成尚書亦行有九徳周禮以樂舞教國子舞雲門大卷大咸大磬大夏大濩大武禮記大司成論説在東序職林隋煬帝改國子學為國子監復置祭酒唐龍朔改為司成館祭酒為大司成光宅改為成均監當江濤如此之時朱新仲詩江濤如此欲安行詳見前軫根本𦕈然之慮欲作成扵六館通典西京國子領六學一曰國子學生徒三百人二曰太學生徒五百人三曰四門學生徒千三百人四曰律學生徒五十人五曰書學生徒三十人六曰算學生徒三十人以表厲扵四方儒林傳本人倫勸學興禮崇化厲賢以風四方太平之原也有漼者淵不嫌葭葦之衆詩菀彼栁斯鳴蜩嘒嘒有漼者淵萑葦淠淠漼丁罪反深也淠淠衆也正義曰栁木盛而多蟬淵水深而生葦言大者之旁無所不容言刈其楚葢為薪槱之儲詩翹翹錯薪言刈其楚觧見上條又芃芃棫樸薪之槱之濟濟辟王左右趣之傳芃芃本盛貌棫白桵也樸枹木也槱積也山木茂盛萬民得而薪之賢人衆多國家得用蕃興槱音酉積木焼也晉書羅憲傳薪槱之任清規自逺况素出扵門墻尤願承其模範法言務學不如務求師師者人之模範也模不模範不範為不少矣某敢不尊其瞻視識所歩趨莊子夫子言亦言也歩亦歩也趍亦趍也雖藻火粉米之不同貴賤位矣孝經非先王之法服不敢服鄭注云天子服日月星辰諸矦服山龍華蟲卿大夫服藻火士服粉米繫辭天尊地卑乾坤定矣卑高以陳貴賤位矣儻蘋蘩錡釡之可薦左右芼之詩于以采蘋南澗之濵于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釡于以奠之宗室牖下注蘋大蓱也藻聚藻也方曰筐圓曰筥湘烹也錡釡屬有足曰錡無足曰釡又參差荇菜左右芼之注左右助也芼擇也回劉教授大川謝舉改官綴曲江之題知賢已久玉泉子慈恩寺連接曲江京輦勝景毎嵗新得第者畢列名于此張禮遊城南記江以水流屈曲得名司馬相如賦臨曲江之隑洲葢其地也劇談云曲江本秦隑洲唐開元中䟽鑿為勝境歐陽詹曲江記兹地循原北峙迴岡旁轉圜環四匝中成坎窞窙窌港洞生泉翕源崇山濬川鉤結盤䕶涵虛抱景氣象澄鮮滌慮延歡棲神育靈于此觀之可以得其槩矣玷直指之寄察士為先見前方踧踖扵循墻韻㑹踧踖若不自容也詩詁引論語踧踖如也謂歛足則踖踖小歩也餘見前遂蹉跎扵削櫝韓詩烏乎吾意其蹉跎杜詩淮海莫蹉跎原陟傳削櫝為䟽有來巽謝良仭謙光易謙尊而光伏惟某官行有宫庭荀子君子言有壇宇行有防表道有一隆言道徳之求不下於安存言志意之求不下於事言道徳之求不二後王道過三代謂之蕩法二後王謂之不雅髙之下之小之臣之不外是矣是君子之所以騁志意於壇宇宫庭也注宫謂之室庭門户之内也君子雖騁志意論説不出此壇宇宫庭之内也文為鞶帨法言今之學也非獨為之華藻也又從而繡其鞶帨惡在老不老也注鞶音盤帨音税鞶大帶也帨佩巾也所以佩物而為飾也言古之學者存其大體所以易也今之學者有經傳章句如華藻繡鞶帨其文彌繁所以難也吹更生之藜杖孰非鴻寳之言王子年拾遺記劉向校書天祿閣専精覃思夜有老人植青藜杖扣閣而進見向暗中獨坐誦書老父乃吹杖端爛然大明因以照向説開闢以前事向因受五行洪範之文至曙而去向請問姓字云我是太乙之精天帝聞金卯之子有博學者下觀焉劉向傳淮南有枕中鴻寶秘書向父徳治淮南獄得其書更生幼而讀誦栽夢得之桃花不作大鈞之問劉禹錫字夢得再遊𤣥都觀詩序云余貞元二十一年為屯田員外郎時此觀未有花是嵗出牧連州尋貶朗州司馬居十年召至京師人人皆言有道士手植仙桃滿觀如紅霞因戲贈㸔花諸君子詩云紫陌紅塵拂靣來無人不道㸔花回𤣥都觀裏桃千樹盡是劉郎去後栽以志一時之事旋又出牧今十有四年復為主客郎中重遊𤣥都觀蕩然無復一樹唯兎葵燕麦動摇於春風耳因再題以俟後逰詩云百畆庭中半是苔桃花浄盡菜花開種桃道士歸何處前度劉郎今又來禹錫有問大鈞賦詳别見淹回如此静退恬然兹雖騰一鶚之章恨未足五豝之數並見前某蟇頥無政蟇頥山在眉山縣東七里狀如蟇頥因名陸務觀入蜀記蝦蟇培在山麓頭鼻吻頷絶類而背脊皰處尤逼真造物之巧有如此者自背上深入得一洞穴石色綠潤泉泠泠有聲自洞出垂蝦蟇口鼻間成水簾水品所載第四泉是也龍節非材周禮澤國用龍節下車而舉慈明豈種私門之桃李晉東海王越臨兗州以江應元為别駕委以州事與應元書曰昔王子師為豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應此者不元舉郄鍳為賢良阮修為直言程收為方正時稱其得人王允傳允字子師黄巾賊起特選拜豫州刺史辟荀爽孔融等為從事荀爽傳爽字慈明㓜而好學潁川為之語曰荀氏八龍慈明無䨇築臺而招郭隗欲開公道之荆榛鮑昭樂府將起黄金臺上谷郡圖經黄金臺易水東南十八里燕昭王置千金于臺上以延天下之士孔融書燕昭築臺以招郭隗王隐晉書段匹碑進屯故安縣故燕太子丹金臺述異記燕昭王故城中土人呼賢士臺亦謂招賢臺詳見前曹鄴詩一旦公道開青雲在平地杜詩王風委草莽戰國多荆榛惟慙程力之綿程説文品也禮記注謂器所容䟽容受多少禮記引重鼎不程其力漢書緜力薄材注緜弱也更辱摛文之綺説文綺文繪也選詩高談一何綺宫觀宋設祠禄之官以佚老優賢祖宗時員數絶少熈寕以後乃増焉時方經理時政患疲老不任事者廢職欲悉罷乃使任宫觀以食其禄時相王安石亦欲以此處異議者遂詔宫觀母限員並差知州人以三十月為任賀瀘帥楊尚書汝明進職奉祠元帥賢勞清都均逸列子清都紫㣲鈞天廣樂帝之所居注清都紫㣲天帝之所居也唐凌敬詩聊排靈璅闥徐歩入清都王荆公集賜韓琦詔方均逸豫適此外虞潁濵龍川志畧均逸偃藩文昌八座昔倡九牧以阜民劉伯䟽八座比於文昌二丞方於管轄尚書六卿分職各率其屬以倡九牧阜成萬民幕府十年今解五符而還里杜詩十年出幕府張釋之傳安知尺藉五符注軍士伍伍相保之符信也唐車服志西京北都留守給麟符東方青龍符南朱雀符西騶虞符北𤣥武符顯拜緑綈之寵説文綈厚繒也外戚傳中黄門持詔緑綈方底注厚繒方底盛書囊形峻加紫殿之班成帝紀永始四年春正月行幸甘泉郊泰畤神光降集紫殿西京雜記成帝設雲帳雲幄雲幕于甘泉紫殿世謂三雲殿三輔黄圖帝于甘泉宫起紫殿刻鏤黼黻以玉餙之又唐有紫㣲殿紫宸殿續通典端明殿學士馮道趙鳳制擢自玉堂升于紫殿歸哉歸哉詩殷其靁在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉注勸以為臣之義未得歸也幸甚幸甚韓文伏惟俯加憐察幸甚幸甚白樂天醉吟先生傳幸甚幸甚餘何求哉伏惟某官柔嘉維則詩仲山甫之徳柔嘉維則令儀令色小心翼翼注柔和而羙善唯可以為法則從容以和尚書無依勢作威無倚法以削寛而有制從容以和節槩抗岷峨之横節㮣操介也郭觧傳感槩師古曰感意氣而立節㮣李詩可以横絶峨眉顛淵源深江漢之濯髙缺迅歩不受人間風日之塵梁四公記羅子春為梁武帝入龍洞求珠得食如花藥膏飴食之香羙賫食至京師得人間風日乃堅如石不可食唐蘇鶚杜陽雜編寶厯二年浙東國貢舞女二人舞態艶逸非人間所有每歌舞罷上令内人藏之金屋寶帳葢恐風日所侵故也山谷詩人間風日不到處天上玉堂森寶書又人間風日不可奈故待成隂葉下來緩轡徐驅徑曵天上星辰之履周亞夫傳按轡徐行杜詩持衡留藻鑒聼履上星辰五月瀘溪之入漢書地里志瀘惟水出牂牱郡句町縣諸葛武矦傳五月渡瀘深入不毛九鑚巴火之新杜詩九鑚巴噀火大國十連民無遺便禮記十國以為連連有帥昌黎韋丹墓誌居三年於江西八州無遺便細書一札王曰遄歸後漢書循吏傳皆一札十行細書成文詩徐方不回王曰還歸乃思晝行之榮項籍傳冨貴不歸故鄊如錦衣夜行魏張允為雍州刺史太祖曰卿還本州可謂衣繡晝行矣劉禹錫詩朝服歸來晝錦榮欲就晚賦之樂注見下文日出而作皆言倦飛則知還莊子日出而作日入而息逍遥於天地之間而心意自得歸去來辭雲無心以出岫鳥倦飛而知還周益公集張忠簡公闡已奉祠禄陛辭上曰卿姑暫還秋凉復召卿矣公既退詩云八請犯天顔今日出漢關渾如倦飛鳥日暮傍朝還夜行不休誰作急流之勇退魏田豫乞遜位曰年過七十而居位譬猶鍾鳴漏盡而夜行不休罪人也遂稱疾邵氏見聞録云錢若水為舉子時見陳希夷于華山希夷曰明日當再來若水如期徃見一老僧與希夷擁地爐坐熟視若水乆之不語以火箸畫灰作做不得三字徐曰急流勇退人也畫墁錄若水謁華山陳摶曰目如㸃漆黒白分明當作神仙有紫閣老僧曰不然他日但能冨貴急流勇退人也偉公髙節立我懦夫孔戣耳目未覺衰力控二宜之䟽昌黎尚書左丞孔公墓誌公年七十三三上書去官愈謂曰公尚壯奚去之果曰吾年至一宜去吾為左丞不能進退郎官惟相之為二宜去愈明日奏䟽曰戣為人守節清苦筋力耳目未覺衰老戞國忘家用意至到不宜苟順其求温公肺腸為已有暫營獨樂之謀司馬温公獨樂園記逍遥相羊惟意所適明月時至清風自來行無所牽止無所抳耳目肺腸巻為已有魏鶴山經外雜抄元次山心規云我鼻我目我口我耳温公之意葢出於此况㡬兩㡬駟羡巨源之歸昌黎送楊少尹序昔䟽廣受二子以年老一朝辭位而去于時公卿設供張祖道都門外車數百兩道路觀者多歎息泣下共言其賢今楊與二疏其意豈異也予忝在公卿後遇病不能出不知楊矦去時城門外送者幾人車幾兩馬幾匹道邉觀者亦有歎息知其為賢與否而一㕓一區足子雲之樂楊雄傳雄字子雲其先楊李官至廬江太守漢元鼎間避仇復遡江上處㟭山之陽曰陴有田一壥有宅一區世世以農桑為業南方已定足可從赤松之逰出師表南方已定兵甲已足張良傳願棄人間事從赤松子遊耳師古曰赤松子仙人號也神農時為雨師服水上教神農能入火自焼至昆山上常止西王母石室随風雨上下炎帝少女追之亦得仙俱去東征是皇尚當為蒼生而起詩既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將注皇匡也周公既反攝政東伐此四國誅其君罪正其民人而已謝安傳安石不肯出將如蒼生何殷浩傳深源不起當如蒼生何某夙䝉異顧輙布賀忱既羡公未老而得閒遯齊閑覽趙嘏詩早晚粗酬心事了水邉歸去一閑人若身事了則仕進之心益熾愈無歸期矣王易簡云青山得去且歸去官職有來還自來是豈能須㬰忘情於軒冕邪余嘗於驛舍見人題壁云謀生待足何時足未老得閒方是閒余深味其言服其精當而愧未能行也此與夫一日㸔除目三年損道心者異矣又愧我每懐之靡及詩皇皇者華于彼原隰駪駪征夫每懐靡及箋春秋外傳曰懐私為每懐衆行夫既受君命當速行每人懐其私相稽留則于事將無所及挹浮邱之袂尚願執鞭郭璞遊仙詩左挹浮邱袂右拍洪崖肩列仙傳浮邱公接王子喬以上嵩高山史記雖為之執鞭所欣慕焉登黎侯之樓或蒙援筆東坡眉山逺景樓記今太守黎矦希聲軾先君子之友人也作逺景樓日與賔客僚吏游處其上軾方為徐州吾州之人以書徃來未嘗不道黎矦之善而求文以為記嗟夫軾之去郷乆矣所謂逺景樓者雖想見其處而不能道其詳矣然州人之所以樂斯樓之成而欲記焉者豈非上有易事之長而下有易治之俗也哉若夫登臨覽觀之樂山川風物之羙軾將歸老於故邱布衣幅巾從邦君於其上酒酣樂作援筆而賦之以頌黎矦之遺愛尚未晚也賀李侍郎進秩敷文閣學士提舉嵩山崇福宫敷文閣紹興十年置以藏徽宗御製置學士直學士待制以次列職嵩山即禹貢外方山東謂大室西謂少室嵩其縂名也謂之室者以其下各有石室崇福宫有管勾或提舉提㸃官枤杜勞還枤音第木獨生又孤髙貎詩有枤之杜有睆其實王事靡盬繼嗣我日日月陽止女心傷止征夫遑止詩序枤杜勞還也嵩髙均逸白虎通中央之岳獨加高字者何中央居四方之中而高故名餘見前大行臺之保大載纘武功魏書以僕射源懐為行臺巡北邉隋書百官志行臺尚書令視正二品劉禹錫詩南荆西蜀大行臺左傳夫武禁暴戢兵保大定功安民和衆豐財者也暴而不戢安能保大猶有晉在安能定功晉紀縂論逆取順守保大定功詩二之日其同載纉武功言私其豵獻豜于公注纉繼功事也繼續武事年常習之使不忘戰也真學士之拜真誕敷文徳言行錄綦崇禮字叔厚覃思於學問文章視唐燕許常揚為不足道上每曰綦某之文有體真學士也山谷詩玉堂端要真學士須得儋州秃鬢翁漢書嵗滿為真宋李昉入直翰林先是盧多遜已任學士太祖見昉在多遜下問其故宰相曰昉以本官直學士院未即真拜真拜學士在多遜之上尚書帝乃誕敷文徳舞干羽于兩階有偉急流之退見上條式觀晚節之香李彦平録韓魏公在北門九日燕諸僚佐有詩云不羞老圃秋容淡且㸔黄花晚節香識者知其晚節之髙恭惟某官博極羣書司馬遷傳自劉向楊雄博極群書皆稱遷有良史之才馮衍傳九嵗能誦詩至二十而博通群書洞視萬古李漢韓文序洞視萬古愍惻斯世用之禮義講唐虞扵細氊禮記故勇敢强有力者天下無事則用之于禮義天下有事則用之于戰勝王吉傳廣厦之下細㫋之上明師居前勸誦在後上論唐虞之際下及殷周之盛詰爾戎兵撻秦楚之堅甲尚書其克詰爾戎兵以陟禹之迹昔者狂瀾之倒韓文障百川而東之迴狂瀾於既倒屹然暢轂之堅詩文茵暢轂駕我騏馵注暢長也轂車輪中之木周書庾信傳棧秦車於暢轂沓漢鼓於雷門王元長詩序暢轂埋轔轔之轍逺揚邇昭栁河東平淮西雅宛宛周道于山于川逺揚邇昭陟降連連外鎮内拊王陵傳外鎮拊四夷諸矦内親附百姓盡護諸將陳平傳拜以為護軍中尉盡䕶諸將不聳一塵左傳邉鄙不聳注聳動也王曰遄歸將軍籌帷幄之内詩徐方不回王曰遄歸餘見前我戍未定且收身矢石之間詩我戍未定靡使歸聘注言我方戍于北狄未得定止無人使歸問安否所以憂也左傳親受矢石叔孫通傳䝉矢石争天下韓詩放意機衡外收身矢石間東坡詩道傍儻有山中舊問我收身早晩回學士象四時新唐書百官志景龍二年置𢎞文館大學士四人以象四時詳見前光禄正二品宋史百官志諸金紫光祿大夫知樞宻院事參知政事同知樞密院事太尉開國郡公上柱國為正二品祝釐太室真聞呼萬歳之三封禪書文帝制曰祝釐者歸福于朕百姓不與焉自今祝致敬毋有所祈注釐福也尚書大傳尚考太室之儀唐為虞賓鄭𤣥曰太室明堂之中央室也王融曲水詩序接禮貳宫考庸太室武帝紀帝至於中岳獲駮麃見夏后啟母石翌日親登嵩高御史乘屬在廟旁吏卒咸呼萬嵗者三於是令祠官加増太室祠詔禄禁廬又可襲六藝而七閣職曰禁塗亦曰禁廬封禪書一藝襲六為七司馬相如傳將襲舊六為七注六經加一為七班接西京之鸞鶴歡騰北墅之龜魚韓詩瓦影䕃龜魚又谿有薲芡有龜有魚身與名而孰親老子名與身孰親身與貨孰多注名遂則身退財多則害身也事隨憂而共減韓詩事随憂共减詩與酒俱還起視當世允謂全人莊子工乎天而俍乎人者唯全人能之俍音良注工於天即俍於人矣謂之全人全人則聖人也崔云俍良工也某聳聞除書亟裁斐語起温公扵崇福不無願公入相之人東坡司馬温公行狀公居洛十五年再任留司御史臺四年提舉崇福宫神宗崩公赴闕臨衞士見公入以手加額曰此司馬相公也民遮道呼曰公無歸洛留相天子活百姓所在數千人聚觀之宋史温公傳論新法害民將二十年方是時光退居于洛若將終身焉而世之賢人君子以及庸夫愚婦日夕引領朢其為相至或號呼道路願其無去朝廷是豈區區材智能得此於人哉徳之盛而誠之至也迎老子扵函闗且致為我著書之請史記老子傳居周乆之見周之哀廼遂去至關關令尹喜曰子將隐矣彊為我著書於是老子廼著書上下篇言道徳之意五千餘言而去代董制置賀安觀文丙除節使開府宫觀宋史安丙字子文廣安人淳熈間進士開僖二年邉事方興程松為四川宣撫使吳曦副之丙陳十可憂于松松不省曦反丙與楊巨源李好義合謀誅之七年丙為湖廣安撫使政尚嚴酷判官章徠劾丙丙授崇信軍節度使開府儀同三司萬夀觀使賜旌節金印衣帶鞍馬卒贈少師理宗賜謚忠定宋羅大經鶴林玉露云安子文與楊巨源李好義合謀誅逆曦旋殺巨源而専其功乆之朝廷疑其䟦扈俾帥長沙子文盡室出蜀嘗自賛云靣目鄒捜行歩藞䕢人言托住半周天我道一場直戲耍今日到湖南又成閒話靶在長沙計利析秋毫㕔前豢豕成群糞穢狼籍肥腯則烹而賣之罷鎮捆載歸蜀元老求閒詩方叔元老克壯其猶傳元大也五官之長出于諸矦曰天子之老清朝䟽寵李詩更奏逺清朝齋壇授鉞新大將之威儀韓信傳信亡蕭何追還漢王曰以為大將何曰王素慢無禮今拜大將如呼小兒此乃信所以去也王必欲拜之宜擇日齋戒設壇場具禮乃可王許之淮南子國有難君卜吉日以授旗鼓將入廟門趨至堂下北靣而立主親操鉞持頭授將軍其柄曰從此上至天者將軍制之復操斧持授將軍其柄曰從此下至淵者將軍制之摯虞新禮議漢魏故事遣將出征符節郎授鉞于朝堂新禮遣將御臨軒尚書授節鉞古兵書跪而推轂之義也東坡啟出節少府授鉞齋壇杜詩授鉞築壇聞意㫖揆路彯纓等上公之體貌尚書使宅百揆狄梁公表載塵鉉路韻㑹彯彯長組貌梁書張充與王儉書彯纓天閣既謝廊廟之華綴組雲臺終慙衣冠之秀選詩仕子彯華纓駱賔王詩彯纓倍紱冕尚書庸建爾于上公賈誼傳夫嘗已在貴寵之位天子改容而體貎之矣仍峻琳宫之領大中祥符除向敏中制式建琳宫用華梓里之歸詩惟桑與梓必恭敬止綸綍載揚紳緌胥慶恭惟某官材宏且毅器博而周所守匪親化為豺狼頃㡬失劔門之壯李詩劔閣峥嶸而崔嵬一夫當關萬夫莫開所守或匪親化為狼與豺宋史安丙傳吳曦為四川宣撫副使受金詔稱蜀王僣號建官稱臣于金以丙為丞相長史丙度徒死無益陽與而隂圖之遂與楊巨源李好義等誅曦無禮扵君誅如鳥雀公迄回沔水之朝左傳見無禮於其君者誅之如鷹鸇之逐鳥雀也詩沔彼流水朝宗于海宋史孫忠銳失守散關丙檄其還欲廢之先命楊巨源以沔兵二千策應巨源至鳯州斬忠鋭丙遂以忠鋭附偽進表之罪聞于朝丙以沔州都統司所統十軍權太重故自吳璘至挺曦皆有尾大不掉之憂乃請分置副都統制各不相𨽻是為非常之功陳琳為袁紹檄州郡有非常之人然後有非常之事有非常之事然後立非常之功宜受不次之賞丙傳曦反朝廷初聞變莫知所為密䧏帛書曰安丙素推才具有志事功如能圖曦報國以明本心即當不次推賞雖二府之崇亦無所吝况尅復四州扵談笑楊巨源傳巨源謂丙曰曦死賊膽已破關外四州為蜀要害不取必有後患于是分遣李好義復西和州張林李簡復成州劉昌國復階州孫忠鋭復散關而撫摩八載之瘡痍劉敬傳瘡痍者未起季布傳創痍未瘳杜詩端拱問瘡痍若時登庸遂典樞機之貳丙傳開僖七年三月詔丙同知樞密院事兼太子賔客手書召之聞命就道又成藩屏之留丙傳丙行次廣徳軍進觀文殿學士知潭州湖廣安撫使方深虛佇之思忽控飬恬之請莊子古之治道者以恬飬知生而無以知為也謂之以知飬恬注恬静而後知不蕩知不蕩而性不失也夫無以知為而任其自知則雖知周萬物而恬然自得也槖兠㦸纛儼千乘以啟行禮軍事懸壺以序聚􅝵注懸壺為漏以次更序柝守偹以兩木相擊行夜説文兠鍪首鎧也東觀漢紀馬武擊隗囂身被兠鍪鎧甲獻帝春秋太史慈與孫策戰于神亭策得慈兜鍪車頴秦書符登刻兜鍪作死休字齊書周盤龍曰貂蟬出於兠鍪説文㦸有枝兵也増韻䨇枝為㦸單枝為戈周禮掌舍棘門棘即㦸也以㦸為門太公兵法㦸之神名大將風土記㦸長一丈三尺奮揚俯仰能兼五兵子虛賦建干將之雄㦸郭躬傳漢制棨㦸即為斧鉞纛軍中大皂旗名韓文槖兠㦸纛以長魏師互見前詩元戎十乘以先啟行戎車既安如輊如軒元戎大車也有戎車十乘以在軍先欲以啟突敵陣之前行衡紞紘綖視三階而命秩紞都感切紘音横綖音延冠下曰衡説文紞冕冠塞耳者紘冠巻也一曰纓從下而上者纓無緌者從下仰屬於冠綖冠上覆通作延禮記前後邃延注言皆出冕前後而垂䟽云延用三十升布染黄覆冕上冕以板為之左傳衮冕黻珽帶裳幅舄衡紞紘綖昭其度也注衡所以維持冠者紞冠之垂者紘纓從下而上者綖冠之上覆者四者皆冠之餙張衡東京賦乃整法服正冕帶珩紞紘綖玉笄綦㑹火龍黼黻藻綷鞶厲仍從神圉司馬相如傳靈圉燕于閑館注靈圉衆仙號也以佚安期列仙傳安期先生者瑯琊阜鄊人也賣藥於東海邉時人皆言千嵗翁秦始皇東逰請見與語三日三夜賜金璧度數千萬出於阜鄊亭皆置留書以赤玉舄一量為報曰後數年求我於蓬萊山是為地上之仙墨客揮犀蜀人魏野隐居不仕人多與之遊冦萊公尤愛之嘗有贈公詩云好向天上辭冨貴却來平地作神仙䝉齋筆談王魏公當國屢求退不許魏野寄以詩云人間宰相唯三載君在中書十四年西祀東封俱已了好來平地作神仙東坡詩羡君平地作飛仙何愧山中之相南史隐逸傳陶𢎞景字通明丹陽秣陵人梁武帝早與之游即位後恩禮愈篤屢加禮聘並不出國家每有吉凶征討大事無不前以諮詢月中常有數信時人謂為山中宰相向也雲無心而出岫今則水有時乎回淵東坡醉翁操醉翁去後空有朝吟夜怨山有時而童巔水有時而回淵思翁無歳年惟出入將相之榮雖聖賢而難必至功名終始之際尤今古之罕全貫一節扵行藏知百年之夀考詩夀考且寕以保我後生從容甲第寜肯甘田宅之汚胡建傳射甲舍門師古曰甲舍即甲第髙帝紀賜大第室孟康曰有甲乙次第故曰第也史記王翦傳翦將六十萬人攻燕請羙田宅園池甚衆既至關使使還請善田者五軰或曰將軍之乞貸亦已甚矣翦曰秦王怛而不信人今空秦國甲士而專委於我我不多請田宅為子孫業以自堅顧令秦王坐而疑我矣笑傲午橋自可窮園林之勝新唐書裴度傳時内䜿擅權天子擁虛器度不復有經濟意乃治第東都集賢里沼石林叢岑繚幽勝午橋作别墅具燠館凉臺號緑野堂度野服蕭散不問人間事昌黎和裴相公感㤙言志詩文武成功後居為百辟師林園窮勝事鍾鼓樂清時某聳聞盛事敬仰髙風季鷹思吳亦欲為適志之舉張翰傳見秋風起乃思吳中蓴鱸曰人生貴得適志遂命駕而歸詳見前相如還蜀何當效負弩之迎司馬相如傳至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵代秘丞林郎中夢英謝丞相得祠禄林夢英字仲虎與陸九淵年相若篤信其學遂師焉登淳熈二年第授祁陽簿再調衡州法曹所至整飭精明為部使者郡守所知一日改官五剡俱集改知武陵縣寛民戢姦興學勤教士習丕變通判靖州討平峒蠻知武岡軍未上退居城西金石臺建藏書樓徜徉其間薛叔似辟為宣撫司參議官召除國子監丞遷宗正丞權工部郎又除秘書丞權司封奉祠歸年踰八十人稱山房先生老而妄動自速煩言左傳嘖有煩言注忿争也詳見前罪以疑輕尚沾㣲禄尚書功疑惟重罪疑惟輕重惟踈謬倍費保全東坡集向非人主獨賜保全則臣之㣲生豈有今日又顧已於時齟齬於人費力保全戴洪造之難名東坡集草芥賤㣲敢干洪造乾坤廣大曲遂私誠撫孤蹤而増感伏念某狷弗諧世戇獨愈人少而耻有道之賤貧妄希干禄東坡集忠臣可使死封疆不能受無根之謗議志士本不求富貴不能安有道之貧賤壯始悟不義之富貴亦足辱身司馬遷傳太上不辱先其次不辱身固嘗把江海之麾杜牧將赴呉興登樂游原詩清時有味是無能閑愛孤雲静愛僧欲把一麾江海去樂遊原上望昭陵惟不願氷山之倚天寶遺事楊國忠為右相或勸陕郡進士張彖謁之彖曰君軰倚楊右相如泰山吾以為氷山耳遂隐居嵩山詳見前甫違繒繳繒音增箭有綸繳音皎箭著之以罥鳥足謂之矰繳子虛賦㣲矰出纎繳施便入林泉杜詩悵朢好林泉曽子固詩清興入林泉王荆公詩身世託林泉黄山谷詩書札到林泉食神圍之祠凡五六任見前頓屠坦之刃㡬十九年賈誼傳屠牛坦一朝觧十二牛而芒刃不頓者所排擊剝割皆衆理觧也注頓讀曰鈍莊子臣之刀十九年矣而刀刃若新發於硎自量叔夜之不堪見前任笑仲連之強作毋友不如已者乃師教之以義強委重焉則君命也韓文先生仁且勇若以義請而强委重焉其何説之辭自屠羊之反肆見前即殺馬而毁車後漢書周爕傳馮良字君郎出于孤㣲少作縣吏奉檄迎督郵慨然耻在厮役因壊車殺馬毁裂衣冠乃遁至犍為從杜撫學妻子求索踪迹斷絶後乃見草中有敗車死馬衣裳腐朽謂為虎狼盗賊所害發䘮制服積十許年乃還郷里東坡詩殺馬毁車從此逝子來何處問行藏誰誤聽聞忽蒙㧞擢念士非其招而往孔子奚取焉茍傲無所恃而行韓愈亦人耳韓文傲雖凶徳必有恃而敢行愈之族親鮮少無扳聨之勢於今不善交人無相先相死之友於朝無宿資蓄貨以釣聲勢弱于才而腐于力不能奔走乘機抵巇以要權利夫何恃而傲餘見前抗辭有罪引疾為欺冐然扶憊以奉承憊音稗廣韻羸困也通俗文疲極曰憊疲劣也易係遯之厲有疾憊也莊子先生之憊識者逆憂其顛沛清班難玷顧再轉而為丞白樂天詩早接清班登玉陛東坡詩珪璋滿清班餘見前素行久愆非一鳴而輒斥李林甫傳不見立仗馬乎終日無聲飫三品芻豆一鳴則黜之矣既名欺世安所避刑竊鈇無往而非疑列子人有亡鈇者意其隣之子視其行歩竊鈇也顔色竊鈇也言語竊鈇也動作態度無徃而不竊鈇也俄而扣其谷而得其鈇也日復見其隣人之子動作態度無似竊鈇者聚鐵不容扵鑄錯通鑑初田承嗣鎮魏博選募六州驍勇之士五千人為牙軍以自衞日益驕恣羅紹威惡之力不能制借兵朱全忠誅之紹威雖去其逼而魏兵自是衰弱紹威悔之謂人曰合六州四十三縣鐵不能為此錯也互見前乍賢乍佞身已變扵三期見前偽行偽言誅何逃扵七日孔子家語孔子朝政七日而誅亂政大夫少正卯子貢曰少正卯魯之聞人也夫子為政而始誅之或者為失乎孔子曰天下有大惡五而竊盗不與焉一曰心逆而險二曰行辟而堅三曰言偽而辯四曰記醜而博五曰順非而澤五者有一於人則不免君子之誅而少正卯皆兼有之此乃人之姦雄不可以不除投荒已幸柳詩投荒垂一紀新詔下荆扉又一身去國六千里萬死投荒十二年續食謂何武帝紀徴吏民明當世之務習先聖之業者縣次續食令與計偕豈老芋之似茯神元非罔市見前而逺志之為小草失在出山世説謝太傳始有東山之志桓公見藥中有逺志公問謝此藥又名小草何以一物二稱謝未即答郄參軍答曰處則為逺志出則為小草謝公殊有慙色無墜諸淵禮記稷公問子思曰為舊君反服古與子思曰古之君子進人以禮退人以禮故有舊君反服之禮今之君子進人若將加諸膝退人若將墜諸淵母為戎首不亦善乎又何反服之禮之有姑予之釡譽而召毁而去聖則何心季布傳陛下以一人譽召臣一人毁去臣臣恐天下有識者聞之有以窺陛下吉之先動之㣲汝曾不悟繫辭㡬者動之㣲吉之先見者也致勤大播見前如此曲成繫辭曲成萬物而不遺伏遇某官謙虛受人謙當作咸易咸君子以虛受人坤厚載物見前謂士非梁冀之賔客謾與招徠梁冀傳冀誅故吏賔客免黜者三百餘人朝廷為空至人言盧杞之姦邪固難覆護舊唐書盧杞傳上曰衆人論杞姦邪朕何不知李勉曰盧杞姦邪天下人皆知唯陛下不知此所以為姦邪也怒猶疑其溢惡莊子兩怒必多溢羙之言殺寜失之不經尚書與其殺不辜寧失不經疾雷震霆扵物無存全之理春秋大雨震雷榖梁傳震雷電霆也説文云震霹靂也電者即雷之光與此傳異易震為雷故何休亦以震為雷霆者霹靂之别名有霆必有電故傳曰電霆也或當電霆為一也公羊傳何休注有聲名曰雷無聲名曰電葢天容地乃今知寅亮之功高后紀盖之如天容之如地見大徳之好生繫辭天地之大徳曰生尚書好生之徳洽于民心豈匹夫之受賜某仰銜厚施已廹頽齡斗升之活波臣固貪舊物莊子我東海波臣也君豈有升斗之水而活我哉王坦之傳青氊我家舊物七十而致君事正在新年禮記大夫七十而致事若不得請則必賜之几杖與其身後重作偽之愆尚書作偽心勞日拙不若生前瀝哀祈之悃澗愧林慙之無盡悔不可追北山移文林慙無盡澗愧不歇秋桂遣風春蘿罷月鍾鳴漏盡而不休行將焉入魏志田豫傳答司馬宣王書曰年過七十而居位譬猶鍾鳴漏盡而夜行不休是罪人也隋書栁彧傳其人年垂八十鍾鳴漏盡若令舉刺所損殊大王僧孺為韋雍州致仕表途遥齒截漏廹鍾鳴高舂之景一斜不周之風忽至徐陵為王儀同致仕表星迴日薄通人有乞老之言漏盡鍾鳴前史有夜行之誡左傳棄疾曰吾與殺吾父行將焉入又臣而不臣行將焉入得反初服離騷經進不入以離憂兮退將修吾初服張九齡詩征途屢反此初服已非然實出大鈞小人之過必文何嗟及矣詩啜其泣矣何嗟及矣君子之愛以徳願卒成之禮記君子之愛人也以徳細人之愛人也以姑息代李制機大有得祠謝丞相幕府效愚猥蒙重劾嚴延年傳延年遣吏掾趙繡按大姓高氏得其死罪繡為兩劾欲先白其輕者觀延年意怒迺出其重劾延年已知其如此矣趙繡至果白其輕者延年索懐中得重劾即論殺之公朝宥過特畀真祠尚書宥過無大刑故無小宋宫觀曰真祠亦曰真廷真館感無地以寄言山谷白山茶賦諒無地以寄言故莫傳于膾炙徳如天而難論伏念某才固無似命亦不猶並見前門户百年難問庭前之雀夏矦湛傳承門户之業受過庭之訓南史王奐傳百年門户宜思後計新唐書崔信明傳信明五月五日日方中生有異雀五色集庭樹太史良占之曰五月為火火為離為文日中文之盛也雀五色而鳴雀文彩此兒將以文顯但雀形既小祿位不高貞觀中為秦川令卒科名二紀真同竿上之魚歐陽公歸田録梅聖俞以詩名當世然終不得一館職晚年在唐書局充修書官尚冀書成酬勞得一貼職以償素碩書垂就而卒時人莫不歎其竒薄初受敕修書語其妻刁氏曰吾之修書可謂猢猻入布袋矣刁氏對曰君於仕宦亦何異鮎魚上竹竿耶聞者皆以為善對幸且安百里之子男左雄傳今之墨綬猶古諸矦注墨綬謂令長卽古子男之國也誰使作諸矦之賓客杜詩甫也諸矦老賓客既叨賛畫安敢隠情堂上之兵未可屈人于不戰張協詩何必操干戈堂上有竒兵法言堯舜不戰而屈人兵皇甫嵩傳百戰百勝不如不戰而屈人之兵幕中之辯真乃以我而為傾韓詩幕中之辯人反以汝為叛臺中之詳人反以汝為傾怒因水蟹之移東坡詩怒移水中蟹詳見第一巻殃竟池魚之及言如綸綍固疑乍佞以乍賢並見前法猶權衡寜免則筆而則削禮樂志今之刑非臯陶之法也而有司請定法削則削筆則筆救時務也奪其兩秩倐已朞年適逢肆𤯝之恩尚書眚災肆赦輒動問鈞之請賜之大知之至前感已多並見前閔其窮察其愚兹恩尤厚韓文屬乎其容若閔其窮也又邈乎其容若不察其愚也過蒙復玷特賜祝釐見前疾雷震霆扵物無存全之理見上條祥風甘雨乃今有覆露之功黄帝占風不及地和緩而來謂之祥風符瑞圖祥風者瑞風也一名景風禮稽命徴出號令合民心則祥風至孝經援神契徳至八方則祥風至尚書大傳王者徳及皇天則祥風起詩以御田祖以祈甘雨文選習習祥風祈祈甘雨括地圖谷山有叢雲甘雨晁錯傳覆露萬民如淳曰覆䕃也露膏澤也恭惟某官社禝世臣鼎彛家學梁任昉序功名鼎彛杜詩昭然開鼎彛以一二日萬㡬之無曠尚書一日二日萬幾無曠庶官乃十五年獨力而有餘得伊尹以格皇天亦既俘三鬷之寳玉問鄧禹而披輿地行將膺萬國之貢珍諒欲四海之㑹同益思九徳之咸事矧惟孤迹夙累一陶並見前兹加抆拭之仁朱博傳長陵大姓尚方禁少時嘗盗人妻見斫創著其頰博聞知召見問禁是何等創也禁叩頭服狀博笑曰大丈夫固時有是馮翊欲灑卿恥抆拭用禁能自效不師古曰抆拭摩也殊有發生之漸某敢不銘心圗報沒齒銜恩桃李盡在公門豈終使一株之慘淡韓詩傍有一株李顔色慘慘似含嗟餘見前葑菲無以下體尚希發寸草之華滋梁王筠詩素莖表朱實綠葉厠華滋東坡詩憐我枯槁質借潤生華滋王荆公詩仰㸔青青草亦復少華滋又草木已華滋又遶屋正華滋又小園封植佇華滋致仕回李致政坤載聫事少城一星終矣孟浩然詩華省曾聨事仙舟復與俱少城在成都駱賓王詩彭山折坡外井絡少城隈詳見前左傳十二年矣是謂一終一星終也注嵗星十二年而一周天故云一星終懐章仁里數月扵兹朱買臣傳買臣懐其印綬歩歸郡邸守邸前引其綬視其印㑹稽大守章也未皇致擁篲之恭篲音遂史記騶子如燕昭王擁彗先驅索隐曰彗帚也謂為之掃地以衣袂擁帚而却行恐塵埃之及長者所以為敬也高帝紀擁彗迎門猥先辱踵門之見恭惟某官盤根仙種杜詩仙李盤根大猗蘭奕葉光發藻儒英漢書董仲舒發藻儒林夷恵可否之間夙播仲元之譽法言或問子蜀人也請人曰有李仲元者人也其為人也奈何曰不屈其意不累其身曰是夷惠之徒歟曰不夷不惠可否之間也黄瓊傳不夷不惠可否之間葢聖賢居身之所珍也蜀志秦宓傳王商為李𢎞立祠宓與書曰李仲元不遭法言令名必淪其無虎豹之文故也可謂攀龍附鳳者矣仲元名𢎞逹榮前後之舉莫回令伯之髙晉書李宻字令伯詔徵為太子洗馬以祖母年高乃上疏曰前太守臣逵察臣孝亷後刺史臣榮舉臣秀才臣以供飬無主辭不赴命終難束手扵袖間韓文不善為斵血指汗顔巧匠旁觀縮手䄂間竟出摘髭扵頷底韓詩連年收科第若摘頷底髭迴首卿相位通途無他岐一第直溷子終嫌識路之疾驅新唐書元結傳一第慁子耳有司得子是賴韓文既識路又疾驅兮孰知余力之不任再轉而為丞甘作急流之勇退見前㝷橘中之四皓幽恠錄巴卭人家有橘園霜後諸橘盡收餘二大橘巴人剖之每橘有二叟髮眉皓然皆相對象戲一叟曰橘中之樂不減商山詳見前見林下之一人遯齋間覧韋丹鎮江西以詩寄僧靈澈云王事紛紛無暇日浮生冉冉只如雲已為平子歸休計五老峯前必共君澈答詩云年老心閒無外事麻衣草坐亦容身逢人盡道休官去林下何曾見一人葢譏之也致為臣而歸良可厚近古之俗東坡逺景樓記吾州之俗有近古者三詳别見從邦君其上尚為賦逺景之樓東坡逺景樓記軾將歸老于故邱布衣幅巾從邦君於其上酒酣樂作援筆而賦之詳見前車㡬兩馬㡬匹孰不羡楊矦之賢見前薤一本水一盂更願聞任棠之誨龎參傳參為漢陽太守郡人任棠有竒節參到先候之棠不與言但以薤一大本水一盂置户屏前自抱孫兒伏于户下參思其㣲意良乆曰水者欲吾清也㧞大本薤者欲吾擊强宗也抱兒當户欲吾開門恤孤也歎息而還回彭致政琛謝致政壬仲一經教子人服義方韋賢傳賢四子長子方山為高寢令次子𢎞至東海太守次子舜留魯守墳墓少子𤣥成復以明經歴位至丞相故鄒魯諺曰遺子黄金滿籯不如一經左傳石碏曰臣聞愛子教之以義方五福錫民天頒仁爵尚書歛時五福用敷錫厥庶民未皇走慶先沐陳箋伏惟某官典刑老成詩雖無老成人尚有典刑注老成人若伊尹伊陟臣扈之屬雖無此臣猶有常事故法可案用也魁壘耆艾壘音磊魁壘壯貌鮑宣傳朝臣亡有大儒骨鯁白首耆艾魁壘之士五十曰艾六十曰耆漢庭用少功名雖恨扵蹉跎陳后山詩漢庭用少公何在不使群飛接羽翰杜詩閒君已朱紱且得慰蹉跎孟郊詩顧已誠拙訥干名已蹉跎周王作人夀考固同扵飛躍詩周王夀考遐不作人又鳶飛戾天魚躍于淵豈弟君子遐不作人注周王文王也文王是時九十餘矣故云夀考作人者變舊造新之辭言變化紂之惡俗近如新作人也鳶䲭類惡鳥飛而至天喻惡人逺去不為民害魚躍于淵喻民喜得所此引詩斷章不必如本義也蔚秋蘭之流馥晉潘尼詩流聲馥秋蘭摛藻艶春華北周宗懔詩一枝猶桂馥千歩有蘭香忻春草之隨袍杜詩春草随青袍又渚花兼素錦汀草亂青袍貴老為近扵親式稱綵衣之飬禮記貴老為其近於親也敬長為其近於兄也列女傳老萊孝飬二親行年七十作嬰兒自娛著五采斒斕衣嘗取漿堂上跌仆因卧地為小兒啼或弄鶵鳥於親側乞言以成其禄㑹聞黄髪之詢禮記凡飬老五帝憲三王有乞言五帝憲飬氣體而不乞言有善則記之為惇史三王亦憲既飬老而后乞言亦㣲其禮皆有惇史尚書尚猷詢茲黄髪則罔所愆某及交阿戎王戎傳戎年十五少阮籍二十嵗而籍與之交籍嘗謂戎父渾曰濬冲清賞非卿倫也共卿言不如共阿戎談還識叔夜嵇紹傳中散大夫康之子紹始入洛或謂王戎曰昨于稠人中始見嵇紹昻昻然如野鶴之在鷄群戎曰卿復未見其父耳夀胥與試此何與魯侯之功詩黄髪台背夀胥與試又奄有龜䝉遂荒大東至於海邦淮夷來同莫不率從魯矦之功注髮有黄色之髮背有台文之背得有如此長夀相與講試氣力竒其老而不衰也盍歸乎來行即顯文王之世詩文王孫子本支百世凡周之士不顯亦世注凡于周為臣之士豈不有顯徳乎言其皆有顯徳而亦得繼世食禄四六標準巻十
