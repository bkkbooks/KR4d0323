  - {type: variant, offset: 2, length: 0, content: '', SBCK: 而官之公等何見之晚也暫且出朱而入墨猶堪紆紫以懐黄某有幸識賢特勤委贄置一盂之水正有望於吾宗夢三刀於梁􅀄何關於我輩回長沙蕭主簿歌鹿鳴而􅂆駕叨預旁􅀚聞鵬化之回程巳違旅賀有髙陳􅁩猶念故侯恭惟某官挺秀楚材效珍嶽貢頃􅀚奥義洞明吕辟之三千固擬大庭當擢蕭何於第一􅀛果登於前列鸞暫屈於卑棲長沙不足回旋㑹計而已短簿能令喜怒騰踏在兹惟是資水之淵源寥乎曲江之姓字閱世三紀闔郡一人進士業於進士同若為愛助天下寳為天下惜當自激昻某叨守三榮將書一考已進南嶽香火之請或可言旋儻過東園山水之亭更希勿毀回新威逺蕭主簿與橒鳳凰千仞不辭棲􅁄之卑鯉魚尺書見報戍􅀲之及良髙陳􅁩復愧過情伏惟某官卓爾不羣飄然無敵心潜寳苑冨金淵玉海之藏句滿錦囊多篆鼎風檣之作既儒科之峻擢何簿領之足淹矮屋擡頭聊復爾耳要津䇿足由是而之某乆於知名行矣聮事取青嫓白愧修報之弗工入墨出朱惟疾驅之是望回新盤石曹主簿開驊騮之道萬馬皆瘖飛鸞鳳之驂一䕫亦足未皇􅀱氣先辱修辭恭惟某官履行醇明風猷凝逺吐天葩而抜俗拾地芥以决科齒清如冰豈羡景宗之笳皷學至於海方觀子建之波瀾俯從簿正之供宻近里仁之美能令公喜公怒直為假館之謀爾有嘉謀嘉猷又恐趣裝之入某欣聞還舍未遑欵門諸侯不臣寓公無曰一㕓之願受進士於吾同業尚湏尊酒以細論回趙主簿伏䝉枉顧見畀屬辭備知家學之淵源仍見詞場之根柢繼沈侯之八詠諒有祖風吟趙嘏之一聮肯孤宗􅂀但􅀷藏感曷既報酬回任主簿二錫欲見組纓取瑟尚疑於將命鼎來緑綺彈琴足想於成聲望履未先鳴謙何厚恭惟某官諸任望族}
  - {type: page-break, offset: 2, content: '', id: KR4d0323_SBCK_035-7a}
