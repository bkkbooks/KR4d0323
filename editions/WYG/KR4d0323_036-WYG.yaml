body:
  text: 四六標準巻三十六宋李劉撰尉宋建隆三年始每縣置一尉位簿下俸與簿同其鎮将只許勾當鎮下煙火争競公事至和二年開封祥符二縣増置一員元豐五年詔重立法地縣尉並差使臣元祐元年蘇轍言舊法縣尉皆用選人近歳並用武臣盜賊不為衰止請復舊法詔除沿邉縣尉依舊外餘並差選人崇寜元年詔重法地縣尉舊差武臣處並依元豐法宋周輝清波雜志云古治百里之邑令拊其俗尉督其姦故令曰明府尉曰少府唐之名臣繇尉馴至公卿者不可以數計雖陸贄牛僧孺裴度顔真卿李絳皆此塗出今銓法以處試吏者腰弓撚箭從事鞍馬巡警阡陌餞迎貴臣斂板揖於路左類以麤官目之判司簿尉不可説未免箠楚塵埃間不特興歎於昌黎公也通寜鄉李尉尚寜鄉已見一行作吏祭竈鬼以媚饑嵇叔夜與山巨源絶交書一行作吏此事便廢梁書何𦙍傳欲卧逰千載畋漁百氏一行作吏此事便乖孫寳傳御史大夫張忠署寳主簿寳徙入舍祭竈請比鄰王荆公詩竈鬼何為便赫然又如何竈鬼尚嫌嗔五絰異義云顓頊有子曰黎為祝融火正也祀以為竈神姓蘇名吉利婦姓生名摶頬漢宣帝時隂子方者至孝嘗臘日晨炊竈神形見子方再拜受慶所謂竈鬼也同官為僚禱尉仙而徼福左傳同官為僚梅福傳福居家常以讀書養性為事至王莽顓政一朝棄妻子去九江至今傳以為仙太白贈瑕邱王少府詩皎皎鸞鳳姿飄飄神仙氣梅生亦何事来作南昌尉又酬陸少府詩一尉居倐忽梅生有仙骨岑参送江陵泉少府詩神仙尉姓梅人吏待君求又送楚邱麴少府詩青袍美少年黄綬一神仙蔡希寂詩不知君作神仙尉特訝行来雲霧深常遵詩以言神仙尉因致瓊瑶音錢起詩且樂神仙道終隨鴛鷺行張蠙詩釋褐從仙尉之官興若何左傳願徼福于周公可無牋託牋亦作箋説文表識書也古者記其事以竹編次為之故从竹記書疏也漢書鄭朋奏記蕭望之注記書也先布姓名項籍傳書足記姓名而已恭惟某官機量浚明尚書夙夜浚明有家風猷膚敏任昉表存樹風猷沒著徴烈千里之馬騏驥顧服鹽車漢書孝文皇帝時有獻千里馬者袁宏漢紀第五倫為司空有人與倫千里馬者荀子驊騮騏驥驖離騄耳古之良馬也鹽鐵論騏驥負鹽車垂頭於太行之坂戰國䇿夫驥之齒至矣服鹽車而上太行漉汚灑地白汗交流中坂遷延負轅不能上九罭之魚鱒魴合登廟鼎罭影逼切説文魚網也詩注百囊網爾雅㯶罟謂之九罭郭云江東呼為緵孫炎云魚所入有九囊毛云小魚之網鱒音樽似鯶而鱗細眼赤魴符方切説文赤尾魚爾雅注魴一名魾江東呼為鯿陸璣云魴廣而薄肥恬而少肉詩九罭之魚鱒魴左傳取郜大鼎於宋納於太廟東觀漢紀永平六年廬江出寳鼎太守王雄獻之納於太廟歸蔵占鼎有黄耳利用鱣鯉韓詩魯侯國至小廟鼎猶納郜鬱鬱赤墀之志鬱紆勿切韓信傳安能鬱鬱久居此乎梅福傳願壹登文石之陛渉赤墀之塗當戸牖之法座匆匆采棒之行怱説文本作悤多遽悤悤也𨽻作忽晉衛恒傳忩忩不暇草俗作匆非顔氏家訓云世稱勿勿不知所由按説文勿者州里所建之旗象其柄及三斿之形所以趣民事故怱遽者稱勿勿東觀餘論曰今俗又妄於勿中加點作勿勿為怱遽字彌失真矣魏志武帝紀除洛陽北部尉曹瞞傳太祖初入尉廨繕治四門造五色棒懸門左右各十餘枚有犯禁者不避豪彊皆棒殺之茅舍之聴雞聲孰非王事温庭筠詩雞聲茅店月人跡板橋霜花村之無犬吠即是民庸古詩雨後有人耕緑野月明無犬吠花村人憐野水之孤舟東都事畧冦凖為巴東令巴東有秋風亭凖拆韋應物一言為二句云野水無人渡孤舟盡日横識者知其必用誰識倚天之長劍宋玉賦長劍耿介倚天外選詩長劍倚天外彎弓掛扶桑韓詩誰把長劍倚太行衝風吹破落天外乘除必爾韓詩名聲相乘除注厯象有増減率遲速積故有乘除之法吴志趙達傳頭乘尾除一算之法漢徐岳數術記遺云按乘之法重張其位以上呼一置得於中置所除之數於下又置得於上亦三重張位然則乘之與除法用不同欲以一算上下當六重之身増損為衆位之實又云積一算者盖一位用一算也頭乘尾除者欲使乘别位乘時以針鋒指之除時則用針尾撝之故有頭乘尾除之名也夢溪筆談云算法多門皆不離乘除唯増乘一法稍異其術多不用乘除但補闕就盈而已假如欲九除者増一便是八除者増二便是但一位一因之若位數少則頗簡捷位數多則愈煩不若乘除之有常翹跂俟之集韻翹尾起也又企也説文企舉踵也通作跂詩跂予望之温嶠傅州之文武莫不翹企凉武昭王傳延首雲極翹企遐方某不自力田列女傳力田不如逢年輙謀耕禄家貧親老誠有待於斗升韓詩外傳任重道逺者不擇地而息家貧親老者不擇官而仕荘子豈有升斗之水而活我哉官小職輕亦欲伸其尺寸鄧禹傳得效其尺寸埀功名於竹帛耳然平生之短朱墨山谷詩平生短朱墨吏考仰丞佐須僚友之助丹青山谷詩吾方師豈弟僚友助丹青此聫用山谷語渾然天成儻念卑棲難倚掣鼇之釣杜詩舍弟卑棲邑防川領簿曹又倚頼天涯釣猶能掣巨鼇詳見前猶能拍浪請陪射鴨之弓孟郊詩短蓑不怕雨白鷺相争飛短楫畫菰蒲闘作豪横歸笑伊水健兒浪戰求光輝不如竹枝弓射鴨無是非又射鴨復射鴨射鴨驚菰蒲又銅斗引江水手拍銅斗歌儂是拍浪兒飲則拜浪婆東坡題縣尉水亭詩兩尉鬱相望東西百歩楊揮旗蒲栁市伐鼔水雲鄉已作觀魚檻仍開射鴨堂又桃弓射鴨罷獨速短蓑舞通寜鄉陳尉愷我為祭竈之謀惟鄰是卜左傳非宅是卜惟鄰是卜二三子先卜鄰矣杜詩李邕求識面王翰願卜鄰歐陽公詩江湖前日真成夢鄠杜他年恐卜隣公有折腰之役及爾同僚杜陵官定後戲贈詩不作西河尉凄涼為折腰錢起送孫十尉温縣詩雲衢有路終驤首吏道無媒且折腰人多用之縣令觀此則卑官皆可用之古人政不拘拘也詩我雖異事及爾同僚聞五采之鼎来見前盍尺牋之豫附鼎豫卦名恭惟某官濳心蓄學法言敢問濳心於聖曰仲尼濳心於文王矣敏手決科山谷詩敏手擘泰華法言須以發䇿決科文石陛髙定抱南昌之憤梅福傳為郡文學補南昌尉餘見上條青㝠箭送暫為東野之酸昌黎薦士詩有窮者孟郊受材實雄鶩酸寒溧陽尉五十幾何耄又青㝠送吹嘘强箭射魯縞狐定蹙於草中杜詩草中狐兎盡何益蘇詩草中狐兎不須驚蛟何為兮水裔九歌麋何為兮庭中蛟何為兮水裔某效顰白戰李詩蛾眉不可妬況乃效其顰東坡詩白戰不許持寸鐵失步朱勾班固傳有學步於邯鄲者未得髣髴失其故步羅隠詩朱篆勾稽官所至賈胡願早酬於一識賈音古馬援傳伏波類西域賈胡到一處輙止注言似商賈所至之處輙停留不知仙吏竟尚隔於幾塵白帖尉一命仙吏唐闕史韋子威眈玩道術叔採訪使有步卒丁約者周旋恪勤子威頗私之一日辭欲他適謂子威曰郎君得道尚隔兩塵子威曰何謂兩塵對曰儒謂之世釋謂之劫道謂之塵善堅此心亦復遐夀詳見前回武岡陳尉武岡已見宋尉有二沿邉縣差武臣重地差使臣詳啓意陳尉盖武人東膠退士合佐黔中禮記周人養國老於東膠注東膠亦大學在國中王宫之東膠之言糾也栁文武岡銘黔山之巑巫水之磻新唐書王忠嗣傳明日見責不失一金吾羽林將軍歸宿衛不者黔中上佐耳梅亭以國録倅武岡故云北部英逰宜留洛下魏志武帝紀除洛陽北部尉漢制長安有四尉分左右部城東南置廣部尉是為左部城西北置明部尉是為右部枚乘傳久為大國上賔與英俊並逰顧訪湘纍之悴揚雄傳因江潭而􅐹記兮欽弔楚之湘纍李竒曰諸不以罪死曰纍荀息仇牧皆是也屈原赴湘死故曰湘纍屈原漁父辭屈原既放逰於江潭行吟澤畔顔色憔悴不辭溧尉之酸韓詩酸寒溧陽尉恭惟某官材調崇谹器資果毅久逰雙宇夙閑龍豹之韜潘岳閒居賦兩學齊列雙宇如一右延國胄左納良逸太公六韜文韜一武韜二龍韜三虎韜四豹韜五犬韜六學敵萬人足奪貔貅之氣項籍傳劍一人敵不足學學萬人敵耳貔頻脂切説文豹屬出貉國詩獻其貔皮尚書如虎如貔注云貔似虎或曰似熊一名執夷一名白狐遼東人謂之白貔貅音休集韻鷙獸也禮記前有摯獸則載貔貅宜䇿勲於榆塞左傳舍爵䇿勲禮也史記䝉恬為秦将北逐戎人開榆中地數千里注即今榆林古上郡界始皇三十六年徙民三萬家於北河榆中漢書枚乘説吴王曰秦北備榆中之闗注即今所謂榆關隋書文帝紀開皇三年城榆闗注秦有榆中闗漢有榆溪舊塞廣韻長榆塞名史記正義曰今榆木塞也王恢所謂植榆為塞也師古曰在朔方或謂之榆中唐地理志勝州榆林縣東有榆林闗水經注榆中在金城東五十許里顧試步於竹弓注見首條繞黄山穿昆明㑹當奏揚雄之賦揚雄傳上陟西岳以望八荒跡殷周之盛眇然以思唐虞之風雄以為臨川羨魚不如歸而結網還上河東賦以勸其辭曰武帝廣開上林南至宜春鼎湖御宿昆吾旁南山而西至長楊五柞北繞黄山瀕渭而東周袤數百里穿昆明池象滇河云云涉赤墀登文石不徒上梅福之書見前某自分駑庸王陵傳陛下不知其駑下注駑凡馬之稱非駿者也故以自喻蘇武傳陵雖駑怯亦嘗側聞長者遺風矣甘心雌伏别駕始可展足豈其然乎俱見前同寮敢不盡心乃所望耳左傳同官為寮吾嘗與同寮敢不盡心乎代回湘潭游尉林湘潭在今長沙府西一百里本秦湘南縣漢屬長沙郡晉屬衡陽郡梁改湘南曰湘潭因昭潭為名隋以建寜隂山攸水茶陵四縣省入屬衡州唐屬潭州宋因之青鞋左計又迷京洛之塵杜詩吾獨胡為在泥滓青鞋布襪從此始韻㑹䇿盡不適事宜曰左計韓文身勤而事左陸機詩京洛多風塵素衣化為緇謝朓詩誰能久京洛緇塵染素衣繡段右牋可認瀟湘之故四愁詩美人贈我繡錦段何以報之青玉案許渾詩瀟湘逢故人詳别見誰能執熱此不聴冰陸佃埤雅云袁狎曰河氷上有貍迹便堪人渡崔劼以為貍當作狐狐性好疑故渡氷輙聴盖不知聴氷不獨狐貍亦有之述征記曰盟津寒則氷厚數丈氷合車馬未敢過要須狐行云此物善聴氷下無水聲乃過人見狐行方渡恭惟某官胄出清門杜詩将軍魏武之子孫於今為庶為清門源流正學轅固傳公孫子務正學以言無曲學以阿世單傳伊洛寜忘厥祖之典刑宋史道學傳㳺酢字定夫建州建陽人與兄醇以文行知名所交皆天下士程頤見之京師謂其資可與進道程灝典扶溝學招使肄業盡棄其學而學焉晚官監察御史厯知三州平視荘騷盍勉乃翁之文字魏畧文帝為太子嘗請諸文學酒酣坐歡命甄夫人出拜坐中咸伏惟劉楨獨平視杜牧李賀集序使賀未死少加以理奴僕命騷可也得解牛於肯綮失射鴨之酸寒見首條行矣交章從而増秩某重尋故步真是陳人俱見前懐鈞天半餉之榮聊復爾耳史記我之帝所甚樂與百神逰於鈞天廣樂九奏萬舞餉説文饟也爾雅饁餉饋也韓詩雖得一餉樂陳後主詞夢裏不知身是客一餉貪歡東坡詩鈞天一餉夢中榮追汗漫九垓之約行或使之淮南子吾與子汗漫逰於九垓之上垓柯開切説文兼垓八極地也國語天子居九垓之田郭璞逰仙詩升降隨長煙飄飄戲九垓互見前代回崇仁舒尉若拙崇仁已見識中散於雞羣夙有通家之好晉書忠義傳嵇紹入洛或謂王戎曰昨於稠人中始見嵇紹昂昂然如野鶴之在雞羣戎曰卿復未見其父耳孔融傳造李膺門語門者曰我是李君通家子弟門者言之膺問曰髙明祖父嘗與僕有恩舊乎融曰然先君孔子與君先人李老君同徳比義而相師友則融與君累世通家栁子厚送崔羣序予與崔君有通家之舊懐少傅之鵠峙未諧識面之期韓文少傅翠竹碧梧鸞鵠停峙詳見前北齊書酷吏傳宋逰道廣平人除司州中從事神武自太原来朝見之曰此人宋逰道耶嘗聞其名今日始識其面識字重上飛牋惠然佩意厚甚恭惟某官冠裳閥閲詩禮典刑無忌即劉牢之甥風流是似晉書何無忌東海剡人也少有大志鎮北将軍劉牢之即其舅也初劉裕嘗為劉牢之参軍與無忌素相親結及桓𤣥簒位遂共舉義兵𤣥聞甚懼其黨曰劉裕烏合之衆勢必無成願不以為慮𤣥曰劉裕勇冠三軍當今無敵劉毅家無儋石之儲樗蒲一擲百萬何無忌劉牢之之甥酷似其舅共舉大事何謂無成鄭公乃魏謩之祖氣象如存韓詩氣象硉兀未可攀又氣象日凋耗餘見前綵棒所臨緑林其遯佇公侯之必復豈州縣之徒勞俱見前某正爾借交偶然浪出杜詩龎公不浪出北山馳驛儻無俗駕之勒移孔稚珪北山移文馳烟驛路勒移山庭又請回俗士駕為君謝逋客東野回頭猶及射堂之著句昌黎醉留東野詩低頭拜東野願得終始如鉅蛩東野不回頭有如寸莛撞鉅鐘東坡詩仍開射鴨堂孟郊詩不如竹枝弓射鴨無是非又射鴨復射鴨射鴨驚菰蒲詳見前回舒縣尉詳啓意盖求汲引而答之者再書美最陪賀旅以未能十部華牋感鳴謙之先辱杜詩佳句染華牋樂於蔵弆愧在暗投見前恭惟某官疏通之才禮記疏通知逺書教也膚敏於學南昌小隠自當登文石之塗杜詩吏隠逢梅福白樂天詩大隠在朝市小隠入邱樊邱樊大冷落朝市太囂喧不如作中隠隠作留司官東野壮圖誰可任通波之漕杜詩居然屈壮圖昌黎薦士詩鶴翎不天生變化在喙菢通波非難圖尺地易可漕善善不汲汲後時徒悔懊願少安之無躁昌黎答吕毉山人書方将坐足下三浴而三熏之聴僕之所為少安無躁孰云多而不揚昌黎進學解占小善者率以録名一藝者無不庸爬羅剔抉刮垢磨光盖有幸而獲選孰云多而不揚某芻狗已陳荘子夫芻狗之未陳也盛以箧衍巾以文繡尸祝齋戒以将之及其已陳也行者踐其首脊蘇者取而㸑之而已露螢不煖梁元帝螢火詩著人疑不熱集草訝無煙友其士之仁者敢隠於言今者人謂斯何恐孤此意韓文公之蓄此邦其勤不亦至乎此邦之人纍公之化惟所令之不亦順乎上勤下順以濟登兹不亦休乎昔者人謂斯何今者人謂斯何更欲見可續得表微回通山廖尉士正通山在今興國州西一百八十里本隋永興縣地屬鄂州唐因之五代時揚吴屬斗山鎮南唐始置通山縣宋屬興國軍蓬矢之生厚甚臨存之寵禮記子生男子設弧於門左女子設帨於門右射人以桑弧蓬矢六射天地四方注桑弧蓬矢本太古也正義曰以桑與蓬皆質素之物故知本太古也嚴助傳使重臣臨存瓜期而往先之謙施之光施始䜴反易地中有山謙君子以裒多益寡稱物平施似顛倒於衣裳詩東方未明顛倒衣裳顛之倒之自公召之亦輪囷於肝膽韓詩窮途致感激肝膽還輪囷恭惟某官美由世濟才應時須山谷詩公自才力應時湏抱壁中科斗之文人無能識孔安國尚書序魯共王好治宫室壊孔子舊宅以廣其居於壁中得先人所蔵古文虞夏商周之書及傳論語孝語皆科斗文字科斗書廢已久時人無能知者元吾衍子行學古編科斗為字之祖象蝦蟇子形也今人不知乃巧畫形状失本意矣上古無筆墨以竹挺點漆書竹上竹硬漆膩畫不能行故頭麤尾細似其形耳通志蒼頡石室記有二十八字周時無人識秦李斯始識八字漢叔孫通識二十字對殿上龍蛇之影日獨未斜顧為東野之酸小作南昌之隠並見前願俟時乎将刈正安結緑之委蛇離騷經余既滋蘭之九畹兮又樹蕙之百畆畦留夷與揭車兮雜杜蘅與芳芷冀枝葉之峻茂兮願竢時吾将刈史記范睢傳臣聞周有砥砨宋有結緑梁有懸藜楚有和璞此四寳者土之所生良工之所失也而為天下名器委音威蛇音移詩退食自公委蛇委蛇傳委蛇行可從迹也箋委曲自得之貌左傳杜注順貌言人臣自公門入私門無不順禮從順也既失路又疾驅忽報飛黄之騰踏韓文既識路又疾驅兮孰知余力之不任又飛黄騰踏去不能顧蟾蜍勉為親屈見前剩了兒癡傅咸傳生子癡了公事詳見前某已拜散人唐書隠逸傳陸龜䝉居松江甫里升舟設蓬席齎束書茶竈筆牀釣具往来時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人陸龜䝉江湖散人歌云江湖散人悲古道悠悠幸寄羲皇傲君王未議活蒼生拜賜江湖散人號足休餘日張華詩從容養餘日取樂於桑榆或出或處漸為雋軌之疎繫辭君子之道或出或處或默或語六一居士詩萬國㑹王州羣英馳雋軌惟孝惟忠敢致祝規之敬尚書惟忠惟孝爾乃邁迹自身韓文敢不敬早夜以求從祝規回錢塘張尉錢塘已見屢薦入官公為淹矣選詩屢薦不入官一麾乃出守一官禦冦前輩願之易䝉上九不利為冦利禦冦象曰利用禦冦上下順也漸九三利禦冦象曰利用禦冦順相保也陳後山宿錢塘尉廨詩平湖遶舍山無盜官事常閑俸有金安得終身為禦寇不辭兒女作吴音愧執訊之不先説文訊問也爾雅問以言也詩執訊獲醜又執訊連連辱屬辭之見及恭惟某官珪璋之質詩如珪如璋令問令望藻火其文東坡詩承明正須君文字粲藻火誦三箧之亡書深於汲古張安世傳用善書給事尚書上行幸河東嘗亡書三箧詔問莫能知唯安世識之具作其字後購求得書以相校無所遺失上竒其材擢為尚書令遷光禄大夫韓詩汲古得修綆授一編之秘略盍以濟時張良傳出一編書曰讀是則為王者師後十年興十三年孺子見我濟北榖山下黄石即我已師古曰編謂編次之也聫簡牘以為書故云一編文獻通考晁氏曰黄石公上中下三畧論用兵機權之妙嚴明之決明妙審決軍可以死易生以存易亡經籍志云下邳神人撰世傳此即圯上老人以一編授張良者東坡詩濠梁空腹五車書圯上從来一編足杜詩整頓乾坤濟時了顧尋東野之酸韓詩酸寒漂陽尉来主西湖之勝西湖在杭州週迴三十里其涯出諸澗泉山川秀發四時畫舫遨逰歌鼓之聲不絶好事者嘗命十題有曰平湖秋月蘇堤春曉斷橋殘雪雷峯落照南屏晩鐘麯院風荷花港觀魚栁浪聞鶯三潭印月兩峯挿雲白樂天詩湖上春来似畫圖亂峯圍繞水平鋪松排山面千重翠月㸃波心一顆珠碧毯線頭抽早稻青羅裙帶展新蒲未能抛得杭州去一半勾留是此湖東坡詩水光瀲灔晴方好山色空濛雨亦竒好把西湖比西子淡粧濃抹兩相宜弓刀閒睱聊暫為平地之仙山谷詩騎從望弓刀又弓力陌上望行色東坡詩聞道新春恣㳺覽羨君平地作飛仙文字芳鮮行即入名經之佛色麗曰鮮杜詩鮮鮮雨中菊歐陽公詩知君苦寂寞妙語嚼芳鮮東坡詩逰遍錢塘湖上山歸来文字帶芳鮮某濫巾畿幕見前投袂吏塵袂音昧説文袖也左傳楚子投袂而起陸機詩投袂赴門堂攬衣不及裳雙魚書之臨極承厚意九牛毛之冗聊具報章司馬遷傳若九牛亡一毛晉書華譚傳或問譚曰諺言人之相去如九牛毛寜有此理乎譚對曰昔許由巢父讓天子之貴市道小人争半錢之利此之相去何啻九牛毛也東坡詩乃知賢達與愚陋豈直相去九牛毛此九牛毛借用代回武進黄尉大中武進已見曵履罔功我二宜去鄭崇傳每見曵革履上笑曰朕識鄭尚書履聲韓文吾負二宜去尚奚頋子言飛牋見問君獨賢勞恭惟某官早決儒科晩逰吏役願登文石豈無梅福之書猶抱竹弓小著孟郊之句俱詳見前有勤魚素見勞雉工某自揣頭顱摭遺陶𢎞景與從兄書昔擬四十左右作尚書郎即投簮髙邁今三十六方作奉朝請頭顱可知不如早去出納王命詩出納王命王之喉舌已控挂冠之請聞命即行南史陶𢎞景家貧求宰縣不遂永明十年脱朝服挂神武門上表辭詔禄許之敢因授簡之歸占辭奉報謝恵連雪賦授簡於司馬大夫占章艷切隠度其辭口以授人曰占朱博傳博口占檄文陳遵傳隠儿口占注隠度其言口授之回善化黄尉善化本長沙湘潭二縣地宋分長沙五鄉湘潭二鄉置善化縣屬潭州今因之習委吏之㑹計正爾卑棲杜詩舍弟卑棲邑防川領簿曹聞飛仙之遨逰超然髙隠東坡詩聞道新春恣逰覽羨君平地作飛仙杜詩隠吏逢梅福方圖執訊先辱飛牋恭惟某官文獻名流典刑勝士羊祜傳賢達勝士陳後山詩江西勝士與長吟為公室輔家夙近於魁三左傳間於兩社為公室輔杜詩爾家最近魁三象時論同歸尺五天有伯父風學諒求於已百顧紆塗轍小試弓刀河西之尉淒涼不常厥邑杜詩不作西河尉凄涼為折腰老夫怕趨走率府且逍遥尚書不常厥邑于今五邦湖南之地清絶幸疾其驅杜詩湖南清絶地萬古一長嗟韓文無疾其驅行即章交亟膺剡辟某㝠心祭竈袁昂傳思隆絶望之辰慶集㝠心之日焰灰非喻荑枯未擬杜詩㝠心若死灰迫命代庖李時權司户短主簿髯㕘軍總無闗於喜怒李時以寜鄉簿權司戸故云餐落英飲墜露願同廣於離騷屈原離騷絰朝飲木蘭之墜露兮夕餐秋菊之落英回新威逺王尉葵之威逺已見題千佛之經夙聞秀望晉書王雅傳帝以王恭等為當時秀望試五采之棒似屈長才世説太傅府有三才劉慶孫長才潘陽仲大才裴景聲清才八王故事劉輿才長綜覈為東海王所暱時人稱曰長才有来委翰之勤良動得朋之喜易西南得朋東北䘮朋杜詩遲暮嗟為客西南喜得朋韓詩幸同學省官末路再得朋孟東野詩涉江莫涉淩得意須得朋恭惟某官天葩掞藻地芥拾科見前頌聖主之得賢定是雲仍之派爾雅晜孫之子為仍孫仍孫之子為雲孫郭璞注仍亦重也雲言輕逺如浮雲移忠臣而為孝固安風土之宜孝經君子之事親孝故忠可移於君孔安國尚書序土地所生風氣所宜若為翰墨之材肯就弓刀之役見前月明静夜應無犬吠之聲古詩雨後有人耕緑野月明無犬吠花村雲入古㕔小寓燕巢之舍李詩退食無外事琴堂向山開緑水寂以閑白雲有時来熊皎詩廢土有人耕不畏古㕔無訟醉何妨左傳夫子在此猶燕之巢於幕上東野寜淹於射鴨詳首條南昌㑹見於驂鸞太白贈瑕丘王少府詩皎皎鸞鳳姿飄飄神仙氣梅生亦何為来作南昌尉江淹别賦駕鶴上漢驂鸞騰天某濫守郡符幸聨王事瓊玖匪報永以為好也聊飾魚緘詩投我以木李報之以瓊玖匪報也永以為好也玖玉黒色餘見前珠玉将至得無脩容乎惟占騎氣列仙傳闗令尹喜者周大夫也善内學星宿服精華施徳行仁時人莫知老子西逰喜先見其氣知真人當過侯物色而跡之果得老子索隠曰物色而跡謂視其氣物有異色而尋跡之又按列異傳老子西逰闗令尹喜望見有紫氣浮闗而老子果乘青牛而過漢志車氣騎氣徒氣白土功氣黄車氣乍髙乍下往往而聚騎氣卑而布卒氣摶回新榮徳郭尉光旴榮徳已見效官錦里昔未識賢荘子知效一官杜詩錦里逢迎有主人乘障斗州今将聨事鳴謙委況擊節拜嘉王籍傳至若耶溪賦詩云蟬噪林逾静鳥鳴山更幽劉孺見之擊節不能己巳王筠傳沈約製郊居賦讀至墜石堆星及水懸塪而帶坁筠皆擊節稱賛袁宏傳尚想遐風載揖載味後生擊節懦夫増氣謝安傳坐者撫掌擊節左傳敢不拜嘉謙節卦名伏惟某官摛藻天葩曹植文章序質素也如秋蓬摛藻也如春葩決科地芥見前待公車之詔誰明東郭之賢史記滑稽傳東郭先生久待詔公車貧困饑寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之東郭先生應聲曰誰能履行雪中令人視之其上履也其履下處乃似人足者乎及其拜為二千石榮華道路立名當世此所謂衣褐懐寶者也當其貧困時人莫省視至其貴也乃争附之涉文石之塗還作南昌之隠見前顧慙陋邑恐負英躔左思吴都賦習其敝邑而不覩上邦者未知英雄之所躔也然代公實發軔於通泉新唐書郭震字元振以字顯少有大志十八舉進士為通泉尉任侠使氣撥去小節嘗盜鑄及掠賣部中口千餘以餉遺賔客武后知所為召欲詰既與語竒之索所為文章上寳劍篇后覽嘉歎詔示學士李嶠等即授右武衛鎧曹㕘軍少陵過郭代公故宅詩豪雋初未遇其跡或脱落代公通泉尉放意何自若及夫登衮冕直氣森噴薄磊落見異人豈伊常情度定䇿神龍後宫中翕清廓俄頃辨尊親指揮存頋託羣公見慙色王室無削弱迥出名臣上丹青照臺閣我行得遺迹池館皆疏鑿壮公臨事斷顧步涕横落髙詠寳劍篇神交付㝠漠至尚父亦奮身於長史新唐書郭子儀傳以武舉異等補左衛長史徳宗朝攝冢宰充山陵使賜號尚父進位太尉中書令繼其風烈将在雲仍見上條無嫌射鴨之弓見首條即引穿鵰之箭李廣傳武帝使中貴人從廣匈奴射中貴人廣曰是必射鵰者也廣射殺二人生得一人果射鵰者也後魏書秦王幹善弓馬太宗出逰於白登之東北幹以騎從有雙鵰飛鳴於上太宗命左右射之莫能中鵰旋飛稍髙幹自請射之以二箭而落雙鵰軍中號為落鵰都尉今按鵰魏書作䲭北齊書斛律光嘗從世宗于洹橋校獵見一大鳥雲表飛颺光引弓射之正中其頸旋轉而下乃大鵰也丞相屬邢子髙見而歎曰此射鵰手也當時傳號落鵰都尉隋書長孫晟送千金公主於突厥每共㳺嘗有二鵰飛而争肉因以兩箭與晟曰請射取之晟乃彎弓馳往遇鵰相攫一箭而雙貫焉某出幕十暑杜詩十年出幕府又十暑岷山葛試郡一寒范睢傳范叔一寒如此哉此借用同僚敢不盡心必䝉愛助一官願為禦冦更幸疾驅見前回錢塘張尉條回新應靈趙尉與槱應靈已見一門父子謂皆分唐叔之珪楊萬里詩憐君有子又擢桂父子仇香仍一門史記晉世家成王與叔虞戲削桐葉為珪以與叔虞曰以此封若史佚因請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言言則史書之禮成之樂歌之於是遂封叔虞於唐五色神仙顧少屈趙家之玉太白送趙少府詩仙尉趙家玉英風凌四豪維舟至長蘆目送雲煙髙餘見前有来委翰知可得朋恭惟某官千里名駒九苞威鳳俱見前宗室隨二千石飽聞議論之髙漢書劉辟彊字少卿好讀書能屬文武帝時以宗室子隨二千石議論冠諸宗室文章長萬丈光坐想垠崖之豁韓詩李杜文章在光燄萬丈長徒觀斧鑿痕不矚治水航想當施手時巨刃磨天揚垠崖劃崩豁乾坤擺雷硠注郭璞江賦巴東之峡夏后疏鑿絶岸萬丈壁立赮駁又云豃如地裂豁若天開觸曲岸以縈繞駭奔浪而相礧詩意謂李杜文章如禹疏鑿江峡雖有跡可尋而當時運量之巧則不可得而覩矣況已摩空而奏賦李賀詩殿前作賦聲摩空筆補造化天無功不難趾美以決科韓文及先人存趾美進士續間成家何為渭北清新之材杜詩白也詩無敵飄然思不羣清新庾開府俊逸鮑参軍渭北春天樹江東日暮雲何時一尊酒重與細論文乃屈河西淒涼之職杜詩不作西河尉淒涼為折腰吟竹弓之射始昌東野之詩韓文孟東野墓銘於戲貞曜維執不猗維出不貲惟卒不施以昌其詩餘見前登文石之塗即上南昌之疏梅福傳數因縣道上言變事求假軺傳詣行在所條對急政某舊交中壘劉向傳以向為中壘校尉中壘校尉掌北軍管壘門内外又掌西域今見休矦楚元王傳景帝即位以親親封元王寵子富為休矦劉歆傳遷中壘校尉羲和京兆尹使治明堂辟雍封紅休矦此休矦未詳所指正望弓刀帖䑕竊狗偷之警帖音鐵通作怙廣韻安也服也公羊傳卒帖荆叔孫通傳此特羣盜䑕竊狗偷何足置齒牙間哉郡守尉令捕誅何足憂郤從筆硯窺蛇神牛鬼之竒杜牧李賀集序荒國侈殿梗莽邱隴不足為其恨怨悲愁也鯨吐鼇擲牛神蛇鬼不足為其虚荒誕幻也詳見前回新資陽曹尉資陽以在資山之陽得名范淳甫詩資山崖谷多神仙鸞車鳳馬隨飛煙是也宋屬資州今改資州為資縣又分資縣地置資陽縣屬簡州皆𨽻成都府趣曹装而東上莫企風帆曹参傳告舍人趣治装杜詩去年起家列雙㦸一日過海收風帆東坡詩卧看落月横千丈起喚清風得半帆試梅隠以西還未瞻星表方規賀謁已沐贄牋伏惟某官學有家傳文為國緯班彪傳敷文華以緯國偉然九尺之幹用曹交事幹軀幹也宋玉招魂去君之恒幹晉書魏詠之傳庸神而宅偉幹韓詩子雖軀幹小老氣横九州輔以八斗之材謝靈運云天下才共一石曹子建獨得八斗我得一斗自古及今共用一斗竒才博識安足及之進士論定然後官之久宜脱穎史記平原君傳使遂早得處囊中乃穎脱而出鄭𤣥曰穎環也公等安在何見晩也今始奪袍舊唐書宋之問傳之問弱冠知名尤善五言詩當時無能出其右者預修三教珠英常扈從逰宴則天幸洛陽龍門令從官賦左史東方虬詩先成則天以錦袍賜之及之問詩成則天稱其詞愈髙奪虬錦袍以賞之李詩龍舟移棹晚獸錦奪袍新折腰暫就於河西見上條入幕即空於冀北韓文伯樂一過冀北之野而馬羣遂空某濫兹假守幸可借交以公歸兮正望發棠之恵無吾以也更希拔薤之規並見前回新遂寜長江張尉長江已見瞻海上之槎恨差池於八月博物志天河與海通有人居海濵者年年八月有浮槎去来不失期詳見前取圯下之履望傳授之一編見前袖箋臨之展巻愧甚恭惟某官負材孔碩詩其詩孔碩蓄學不貲盖寛饒傳用不訾之身師古曰訾與貲同言無貲量可以比之貴重之極也英英修月之文詩英英白雲韓詩英英桂林伯酉陽雜爼有人逰嵩山迷歸路見一人問之其人曰君知月乃七寳合成乎月勢如丸其影日爍於凸處也常有八萬二千戸修之予即一數王荆公詩玉斧修成寳月圓東坡詩從来天上修月手又天匠麾月斧又借君月斧修朦朧飄飄凌雲之賦司馬相如傳相如既奏大人賦天子大悦飄飄有凌雲氣㳺天地之間意朝華本髙於夕秀陸機文賦收百世之闕文採千載之遺韻謝朝華於已披啟夕秀於未振觀古今之湏臾撫四海於一瞬夙知乃墜於暮成入對大庭良負誦書之三箧見本巻回錢塘張尉條出次逺闕尚賢不調之十年張釋之傳釋之為郎官十年不得調況長江素委之詩人唐賈島字浪仙文宗時謫長江主簿有墓在焉杜荀鶴詩謫官自麻衣銜怨至死時山根三尺墓人口數聨詩仙桂終無分皇天似有私暗松風雨夜空使老猿悲安錡過賈島墓詩倚恃才難斷昂藏貌不恭騎驢衝大尹奪巻忤宣宗馳譽超前輩吟詩下我儂司倉舊曹署一見一心沖鄭谷旅次過裴晤員外謫居詩誰解登髙問上𤣥謫官何事謫詩仙不知幾首南行曲留與巴兒萬口傳豈市門可淹於仙吏梅福傳至今傳以為仙其後人有見福於㑹稽者變姓名為吴市門卒云暫返扁舟於吳㑹杜詩扁舟下吴㑹主簿意何如即歸大老於周家某甫欲欵門見前先䝉命駕以霸陵李将軍之老儻不見訶李廣傳屏居藍田南山中射獵嘗夜從一騎出從人田間飲還至亭霸陵尉醉呵止廣廣騎曰故李将軍尉曰今将軍尚不得夜行何故也則天上張公子之賢敢忘加敬杜詩天上張公子宫中漢客星漢書外戚傳先是有童謡曰燕燕尾涎涎張公子時相見成帝毎微行出常與張放俱而稱富平矦家故曰張公子回王尉昌大訪南榮之隠冒懐太守之章榮州在榮隠山之南榮隠山在州北三十里相傳有榮隠先生修道于此楚辭與吾期兮南榮此借用朱買臣傳買臣衣故衣懐其印綬步歸郡邸少見其綬守邸怪之前引其綬視其印㑹稽太守章也宣北部之威正藉少公之棒洛陽有四尉分東西南北四部曹操為北部尉白帖馳聲南昌宣威北部晏公類要云李白贈瑕邱王少府别西河劉少府贈秋浦栁少府杜甫贈華陽栁少府當是唐時縣尉多稱少府也容齋隨筆云杜詩有野望因過常少仙一篇落盡髙天日幽人未遣還蜀士注曰少仙應是言縣尉也縣尉謂之少府而梅福為尉有神仙之稱二字與俗呼仙尉不侔矣按通典縣佐自晉以後無丞自漢以来主簿皆令長自調用如考城令王渙署仇覽為主簿是也則縣惟一令一尉者為多故令稱明府縣尉稱少府古者令亦稱公故尉稱少公李太白集有與賈少公書及餞石艾尹少公序皆指尉也宋馬永卿懶真子云縣尉稱為少府者古官名也漢百官表有大司農少府府是别蔵少者小也故稱少府以亞大司農也國朝之初縣多惟令尉令既呼明府故尉呼少府以亞於縣令也按今人疑尉不當稱少府而以少府强歸于丞及觀李杜贈少府諸詩語多不類盖丞自稱賛府惟少公二字李集之外少所經見及觀東坡集書張少公判状云張旭為常熟尉有父老訴事為判其状欣然持去不數日復有所訴亦為判之他日復来張甚怒以為好訟叩頭曰非敢訟也誠見少公筆跡殊妙欲家藏之耳㨿此則唐人呼尉為少公明矣可稱少公顧不可稱少府乎有勤委翰良仞垂情恭惟某官科級髙華説文級次第也廣韻等級又階級禮記拾級光武紀斬首數千級注秦法斬首多者進爵一級因謂斬首為級器能膚敏試竹弓之射不辭東野之酸寒登文石之塗行繼南昌之讜直俱見前功名之㑹磨厲以須左傳磨鴈以須王出吾刃將斬矣子革以鋒刃自喻言欲自磨厲以俟王之出而斬其淫慝也某出幕星終左傳晉侯曰十二年矣是謂一終注一星終也吕氏春秋季冬之月日窮於次月窮於紀星迴于天此謂一終得州斗大宋宗慤為豫州典籖毎多連執慤怒曰慤年六十得一州如斗大不能復與典籖共臨之烹鮮勿撓固當謹庭戸之修老子治大國若烹小鮮注鮮魚烹小魚不去膓不去鱗不敢撓恐其縻也治國煩則下亂治身煩則精散撓女巧切説文擾也韓文令修於庭戸數日之間而人自得于湖山千里之外吠犬不驚是則藉弓刀之助後漢書劉寵為㑹稽太守狗不夜吠岑熙為東郡太守無為而化輿人歌之曰我有枳棘岑君伐之我有蠡賊岑君遏之狗吠不驚足下生氂回秦尉謝差校正九韶善繼人志當為黄素之校讐讐校也謂兩本相覆校如仇讐也文選魏都賦注一人持本一人讀書如怨家相對也山谷詩久次不進遷天禄勤校讐肯從吾逰小試丹鉛之點勘髙帝紀賢士大夫有肯從我㳺者吾能尊顯之韓詩不如覷文字丹鉛事㸃勘説文丹巴越之赤石也又赤色謂之丹鉛粉筆也點説文小黒也廣韻點畫増韻㸃注爾雅滅謂之㸃注以筆滅字為㸃勘説文校也表微愧甚嘗巧可乎禮記爾以人之母嘗巧則豈不得以其母以嘗巧者乎注以與已字同母音無疏公輸般欲為機窆之事公肩假止之曰汝欲以人母嘗試已巧事誰有强偪於汝而為此乎豈不得休已者哉其無以人母嘗試已巧恭惟某官心夷而志崇詩我心則夷尚書功崇惟志齒新而意宿新唐書李百藥傳太宗嘗與偕賦帝京篇歎其工手詔曰卿何身老而才之壮齒宿而意之新乎詳見前試劍馳馬早欲範王良之驅㳺刃解牛今将進庖丁之道荘子庖丁為文恵君解牛文恵君曰嘻善哉技盖至此乎庖丁釋刀對曰臣之所好者道也進乎技矣注直寄道理於技耳所好者非技也綵棒行施於北部見前青氊㑹憶於西崑王獻之傳青氊我家舊物可特置之穆天子傳天子西登崑崙至羣玉之山先王所謂䇿府也儒林公議楊億在兩禁變文章之體劉筠錢惟演輩皆從而斆之時號楊劉三公以新詩更相屬和極一時之麗億復編叙之題曰西崑酬唱集當時佻薄者謂之西崑體其他賦頌章奏雖頗傷於彫摘然五代以来蕪鄙之氣由兹盡矣洪适啓西崑彯組居張率之清官東觀紬書稱董狐之良史今開萬巻餘義理在文辭之表杜詩古人已用三冬足年少今開萬巻餘嚴助傳中外相應以義理之文端能正幾字始終有條理之科明皇雜録劉晏以神童為秘書年方十歳形状獰劣而聰悟過人𤣥宗召于勤政樓中簾下貴妃置于膝上為施粉黛與之巾櫛𤣥宗問晏曰卿為正字正得幾字晏曰天下字皆正罹明字未正得陳後山詩端能正幾字敢恨十年遲所望逺来之朋共成相勸之善卿自用卿法在良弓之子必學為箕世説王太尉不與庾子嵩交庾卿之不置王曰君不得為爾庾曰卿自君我我自卿卿我自用我法卿自用卿法禮記良冶之子必學為裘良弓之子必學為箕正義曰良善也冶謂鑄冶也裘謂衣裘也言善冶之家其子弟見其父兄世業陶鑄金鐡使之柔合以補治破器皆令全好故此子弟仍能學為袍裘補續獸皮片片相合以至完全也箕栁箕也言善為弓之家使幹角撓屈調和成其弓故其子弟亦覩其父兄世業仍學取栁和軟撓之成箕也人患為人師然他山之石可以攻玉詩樂彼之園爰有樹檀其下維榖他山之石可以攻玉注他山喻異國攻錯也他山逺國之石取而得之可以為錯物之用以興異國沈滯之賢任而官之可以為理國之政此借用回武岡何尉强顔二郡慚非典午之材司馬遷傳及已至此言不辱者所謂强顔耳韓詩長慙典干非材職箝尾為寮喜有同寅之幸見前曾修辭之未敏辱垂問之相先恭惟某官精神五兵韓詩腸胄繞萬象精神驅五兵肝膽一劍韓詩肝膽一古劍波濤兩浮萍積月書於右序已播英聲禮記夏后氏養國老于東序養庶老於西序殷人養國老於右學養庶老于左學注皆學名四代相變耳奏天對於左廬更登峻秩方西北二邉之未靖何東南一尉之足淹揚雄傳東南一尉西北一矦孟康曰㑹稽東部都尉也行矣章交亟其王覲某無能教冑顧使轉丞烹雙魚得尺素書良勤垂念從一騎踔五百里即遂承顔忻幸良深敷陳罔既此啓注多見前四六標準巻三十六
