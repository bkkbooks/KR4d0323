  - {type: variant, offset: 18241, length: 288, content: 金鯽池在杭州西北九里山澗水清有金銀魚東坡志林云舊讀杜子美六和寺詩云松橋待金鯽竟日獨遲留初不喻此語及倅錢塘乃知寺後池中有此魚如金色昨日復游池上投餅餌久之乃略出不食復入不可復見自子美作詩至今四百餘年已有遲留之語則此魚自珍貴蓋久矣茍非難進易退而不妄食安得如此夀耶定山在杭州西南四十里突出浙江中數百丈潮至此輒抑聲過此則雷吼霆怒東坡往富陽李節推先行留風水洞見待詩春山磔磔鳴春禽此間不可無我吟路長漫漫傍江浦此間不可無君語金鯽池邊不見君追君直過定山村路人皆言君未逺騎馬少年清且婉風巖水穴舊聞名只隔山溪夜不見溪橋曉溜浮梅萼知馬繫馬巖花落出城三日尚逶遲妻孥怪罵歸何時世上小兒誇疾走如君相待今安有, SBCK: ''}
