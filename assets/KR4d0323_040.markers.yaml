  - {type: variant, offset: 7238, length: 20, content: 帥董居誼以黷貨為叛卒所逐總領楊九鼎遇害蜀, SBCK: ''}
  - {type: punctuation, offset: 7250, content: /, id: KR4d0323_krp_040-bkkpn782}
  - {type: variant, offset: 7259, length: 380, content: 擾與之以選為煥章閣待制知成都府本路安撫使至即帖然詔盡䕶四蜀之師開誠布公人心悦服初至府庫錢僅萬餘其後至千餘萬金帛稱是以疾告歸朝廷以鄭損代既受代金人諜知之大入與之再為臨邊金人乃退召為禮部尚書不拜蜀人思之肖其像於成都仙遊閣以配張詠趙抃名三賢祠理宗親政召為吏部尚書數以御筆起之皆力辭拜參知政事右丞相控辭至十有三疏嘉熈三年乃得致仕薨年八十二累封至南海郡公諡清獻史臣論曰唐張九齡姜公輔宋余靖皆出嶺嶠之南番禺崔與之晩出屹然大臣之風卒與三子者方駕造物者曷嘗擇地而生材哉先王立賢無方葢為是也互見前三微肇始三微注見上巻回林嘉興條萬彚滋亨彚音謂集韻類也易以其彚征又㧞茅茹以其彚曹植冬至獻襪表四方交泰萬彚昭蘇集康寧富夀之疇尚書九五福一曰夀二曰富三曰康寧四曰攸好徳五曰考終命孔傳百二十年為夀財豐備為富無疾病為康寧所好者徳福之道為攸好徳各成其短長之命以自終不横天曰考終命在禮樂詩書之帥見前, SBCK: ''}
