  - {type: variant, offset: 16, length: 174, content: 附梁武帝普通五年魏以酈道元為大使鎮撫六鎮大使始此隋文帝開皇九年以楊素為河北安撫大使唐聖厯中狄仁傑為河北道安撫宋不常置自咸平二年以王欽若為四川安撫使梁灝為陜西安撫使安撫使之名始此其後景德三年始置河北沿邊安撫使陜西沿邊諸州亦有安撫使慶厯二年詔置湖南安撫司八年詔置河北四路安撫皇祐四年詔廣桂二州帶經略安撫使熈寧五年罷諸路安撫司宣和三年睦賊猖獗詔杭越州江寧, SBCK: ''}
