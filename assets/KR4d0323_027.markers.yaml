  - {type: variant, offset: 1370, length: 206, content: 宋寧宗紀開禧二年以李璧參知政事遂寧春秋戰國為蜀地秦為蜀郡漢分為廣漢郡今州為廣漢縣又分為徳陽縣東晉於徳陽縣界東南置遂寧郡宋以徽宗潛邸陞遂寧府宋王明清玉照新志云正和中五年十二月宣徳郎王恬等言本貫遂州按九域志都督府遂州為遂寧郡武信軍節度使元豐八年陛下初封遂寧郡王紹聖元年復以遂寧郡王出閣與蘇潤二州時同而事均縁本州遂寧縣元符二年縣下慧明院秋冬間忽觀佛像五次出見父老咸曰遂寧佛出越二年奉陛下即位此其祥兆乞改府額詔陞為遂寧府, SBCK: ''}
