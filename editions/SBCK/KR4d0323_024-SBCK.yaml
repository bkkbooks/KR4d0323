body:
  text: 賀新潼川黄運使申知榮州作䟽恩北闕將漕東州次公之最旣殊冝登丞弼叔度之撓不濁暫借澄清和氣褰帷仁聲載路恭惟某官􅀒材瓌碩迪德忱恂怡然不辭小官之時恢乎可以大受之量盤根利器無四顧之全牛大輅鳴鵉洗萬古之凡馬兹収三近古之郡實昔再轉丞之􅀖田里無愁嘆之声所居民冨原隰有光華之遣果􅀂人言惟益部之使星俱髙而潼漕之門地尤峻建臺移治蓋田諌議之言持節䇿名有趙淸献之烈惟公濟美與古匹休使臣得咨訪之周上意知緫領之稱某偶乗一障獲託萬間蹊田方窘於奪牛斗水誰哀於涸鮒即日褰裳而求去聞公􅄃轡而少留有刺史之榮無刺史之難是在使者飲故人者恩按故人者法惟所命之賛慶攸􅀄乞怜是愧賀黄運使交割申知榮州作攬轡撫封褰帷問俗漕下冰解傒原隰之載馳財阜風薫與軺軒而偕至民無罪􅀊帝有徳星恭惟某官簡要而恢通優游而昭晰萬頃不濁何能撓叔度之清四國于宣所去思次公之政暫别峨眉之月來􅀚涪右之風豈徒榮練鵲之􅂁察二千石蓋將􅀝木牛之運出五丈原列城暫􅀝於澄淸衆職恐煩於緫領某冒乗斗壘幸􅀠井封君子憂道不憂貧缾之罄矣國人望公如望􅀊雨以􅃳之賀吕提刑徐運使詳刑奏最轉漕升華統部不移令巳孚於先甲事􅁠益進命不待於重申六轡借留百城胥抃恭惟某官􅀒材鴻碩蓄德駿厖家學渊源擅箕裘之弓冶丗臣閥閱屹鼎鼐之楼䑓盍徑歸清切之班顧洊屈皇華之􅀉二節三節俾詳察於風謡特書屡書巳茂登於􅀊績兹峻登於延閣俾專制於計䑓地上錢流欲暫煩於鞭筭日邊人至即遄上於槖班某幸甚受容復兹竊䕃三熏三沐僅能寓致於􅀟魚載馳載驅行賦勞還之四牡賀䕫路徐運使瑄叱馭及疆褰帷問俗察二千石知逺有於光華登百八盤亦備甞於險阻神明所相忠厚為周恭惟某官德配春華氣涵秋杳平生仁義所學皆本於孔周單辭明淸致君亦欲其堯舜出騰縣最入重郎潜謂拾級以升髙忽抗章而引外汶川鄖水今爲湖北之偏州漢廣江沱乆矣召南之美化􅀟旌戾止五袴暖然諒思檢校於杜詩遂賦馳驅之周雅瞿唐五六月自昔畏團團之天巫山十二峯何况濟朝朝之雨遂勞六轡峻陟萬山蛇退猿愁人何堪而至此狨啼鼪嘨公所過以晏然聞蜀道分八使之􅁠以䕫漕爲諸司之冠家有塩井固足操用度之贏民無錢爐似亦困征輸之役一賢旣入百姓何憂逺而使之􅀚其忠可窺上意使者專焉得其道寜有遐心功名留乆逺之看冨貴乃緒餘之事如某者无用於丗所敬惟賢頃聞武城之弦睢盱慕藺近載益州之舫邂逅識荆便􅂪許載之後車且復指迷於前路稱曰知已知已未也更容受察於六條待以國士國士報之寕敢貢䛕於尺牘賀李運使鼎起家將漕掲節濟湘舊令尹之􅀟鳬甫去十五年之近部刺史之四牡今察二千石而來民距躍以争迎公馳驅其何惮恭惟某官篤誠而明允簡要而淸通言行擇君子之中庸德業得賢人之乆大十年出幕孰居行營司馬之前萬里封侯乃在諸妄校尉之後勇襆望郎之􅀍出褰膚使之帷爰從緑波靑草之間尽覧赤甲白塩之勝金掌甫升於卿月玉鈴又属之將星与其食武昌之魚又看種栁不若蠟永嘉之屐少待戍􅀲有懷清絶之大招復賦皇華之小雅暮捲西山之雨曉行湘水之春洞庭無波聊護木牛之運䍧牱為徼皆知竹馬之迎有功見知不逺伊邇某強顔佐郡傴指終更非有海沂之功可歌别駕豈謂瀟湘之地又逢故人偶聞報之不先慚奏記之已晩儻怜秋水長天之共且善助之庶安清風明月之分㑹且歸矣通張運使嗣古飲水西江未及瞻舎人之様披雲南嶽行當參都漕之臺欲提聾丞上累膚使寸丹炯􅀂尺素布之恭惟某官心契九秋眼髙四海周情孔思探鳯髓以調膠宋艷班香拔鯨牙於剌手早司存於雨露旣感㑹於風雲厭承明之廬人共期於三入巋靈光之殿天實相其獨存聊歌小雅之皇華來領大招之清絶上原下隰拓長沙千里之平重江􅃨湖護洞庭九州之大齒髮未凋於計相腹心當属於留侯豈舎王哉今召君矣伏念某蝉聮成紀鳬徙臨川家故一寒無蚍蜉蟻子之援官仍獨冷有􅌐駒狗曲之嘲㱕尋黄獨之苖甘老靑精之飯猥􅂪丈石之陛俾讀武岡之銘自非使者之汝容轉恐丞哉之余􅀒郷人見孺子之入諒亦惻於仁心長史無宰相之才詎敢干於薦口通湖南黄運使乗軺將漕􅄃轡濟湘光粲璧奎卿月謂升於金掌祥開翼軫魁星顧聚於玉衡四海歉然重湖幸甚恭惟某官果逹而藝直大以方文武兩科蚤占羣英之冠冕忠信一念允為百丗之楷模恬要路之在前甘急流之勇退東􅀚聿躋於蓬頂南風遽愴於􅁄心旣釋素冠盍持紫槖顧賦皇華之雅來㝷清絶之騷開天柱紫蓋之雲民巖洞見澄洞庭靑草之水地險弥堅杜陵何惮於曉行賈􅀓即􅀚於夜對某一寒寡与三暑投閑頃者誨館下之生不能教胄今兹􅀘黔中之佐定是􅀒丞所幸綴曲江之題或可逃直指之斧貴賤位矣雖有一龍一猪之分左右釆之固在四牡四駱之下通潼川程運使遇孫度劒閣之險戍月凄然望玉臺之遥使星明甚乆欲布仰髙之悃兹併修賀上之恭恭惟某官心平而行髙人今而學古彯纓諾仕大夫争羅而致之澤笏造朝廷臣無出其右者捨萬里九霄之騰踏甘五年一節之回翔不辭載馳載驅之勞兹見可乆可大之業碩果何嫌於不食包􅀲自得於含章皇皇者華昔固重周原之􅀉湜湜其沚今况屯渭上之師願䇿木牛流馬之功却振金爵觚稜之歩某學未能信年不後人直為文翁留再剖之符遂使石洪弃一盂之飯舟經灧澦􅁂巳斍其􅀟蓬路入褒斜命已危於破竹徒斍長安之咫尺竟慚淝水之八千河内願借留恂豈但任轉輸之委漢中無所事信倘或辱薦引之知代通成都梁運使綸代董制帥隨八月之槎遂離漢闕望一星之分巳次蜀都瞻之在前瞠􅀂乎後敢伺下車之始􅂺修上記之恭恭惟某官器宇弘􅀷風猷凝茂學有家法肯甘州縣之徒勞政作吏師自合公侯之必復勇襆潜郎之􅀍髙褰膚使之帷古來天府之􅃾莫如益部今使雪山之重是在我公諒由四牡之華即有九年之積不勞黔突亟下紫泥某乆汙班行獲聮事契豈謂半符之剖又依六轡之馳江路市橋想已遂碧雞之訪天梯石棧得无憐黄鶴之飛上兩浙丘運使壽雋索米待公車之命僅志抱関轉粟給中都之官猥容入幕實有得賢主人之賀未知事大君子之方斐然修辭滂􅀂下汗伏念某寸勇尺懦一拙百罹學不知方徒爾疲精神於蹇淺仕未能信尚何計班資之崇庳然半生脫進士之塲巳三仕作諸侯之客碧雞坊裏側身猶望於早還白鹿坡前􅀾骨自甘於速朽偶獲返屠羊之役乃洊罹䑛犢之悲五削猶温一簣正湏於􅀘考百念旣冷連年不果於到銓親故開陳勉強抵此公卿推輓伺候乆之敢期得闕於日畿乃可託身於氷漕使者持斧實緫陜東陜西之􅁠賔之􅀄筵冝得洛北洛南之彦詎應庸譾可備諮諏伏遇某官斈本家傳材周丗濟四顧千牛之立解一鳴萬馬以皆瘖人懷召虎之來宣日望伯禽之拜後導夙夜宥宻之命亦旣許時聮朝夕論思之班自應平歩頋以翼翼四方之極託之皇皇六轡之華磔其梟狼了不容於掩耳壯哉雀䑕必從是以革心六條􅀚風萬物吐氣孝者善継人志是以似之欽哉時亮天功自此升矣尚念某一無操挾全蹈闊踈鵲繞月以何依幸二天之獨有魚泳川而相得或尺地之可通尚從吏師稍勉政斈大事則從其長倘堪藏拙於小官先達者爲之前諒亦垂情於後輩上湖南曽運使槃主俗吏之簿書竈方夜􅀕瞻華使之禮樂槎自天來半生忍渇於見賢一旦奉身而受察喜而不寐丈以足言恭惟某官得春委和与秋争㓗接江西之正􅂀克肖茶山抱河南之遺書乆窺禹穴根柢學問緒餘功名平生􅁖巧宦之圖握蘭属耳所至成循吏之傳􅀐竹驩然洊蔽芾於甘棠始逶迤於苞栩謂予環而趣侍又濡轡以載馳去江入湖彼善此蓋有之矣轉倉將漕唯与阿相去幾何人疑王事之獨賢公未帝城之願入洞庭九州之大近困轉輸衡山千里而遥正湏廉訪撢王志慮摩俗痛愁續荆潭唱和之詩不妨幽􅆌對宣室􅀑神之問㑹即超遷某承學諸生就官一列寒䆫事業私知對白以抽黄矮屋官曹今使出朱而入墨懷哉君子之易事樂只小官而不辤向來一瓣香之詩南豐固在下有千嵗苓之句東坡謂何通􅁠運司牛都大大年承流弗績亦思㱕味於蓴鱸轉漕非才敢取弃餘之竹馬􅀒决難於超乗偻已見於循墻盍以寸扄布之尺牘恭惟某官洙泗正斈淮海俊人言行一擇乎中庸名實兩孚於上下清標雅操立獨鶴於人間逺韻遐心送孤鴻於天末頃厭獬豸鵰鶚之命來爲蚕叢魚鳬之遊天子十二閑爛如雲錦月圑三百片美􅀂金莖廉不近名儉皆中礼脂膏自􅃳昔者人謂斯何圖史凝塵去之日如始至王覲為可帝念在兹正湏清献之一琴往减汾陽之半樂某游從二紀奔走百罹方甘弄月於眉山敢望占星於益部巳騰免牘兾奉俞音萬一不巳於馳驅再三尚求於教誨汝張汝弓汝鼔當飽顔行我任我輦我車悉希指示代回䕫路王漕顧問疇庸司􅁃易節將輸激江西之波旣蘇涸轍之鮒踏巴東之磧更􅀚常山之蛇使乎賢勞王所簡在恭惟某官德浮於位材􅁉其官熟路輕車固有長驅之地急流巨艦獨髙難進之風一麾江海之行千里湖山之得旣田里之無愁恨冝原隰之有光華或謂歛散之􅁠未展澄清之志木牛轉漕何妨籌䇿之紆金馬著書行見詔除之渥某緬惟新治恍憶舊遊福星所臨遥想疲民之樂業豐年可慶幸為老守而􅀉聲代回䕫路王運判宗孟洊歷麾符榮將節傳彤䄡繍斧新礼樂之光華赤甲白塩壯江山之弹壓旣均六轡坐斡千艘恭惟某官抱􅀒甚竒踐揚兹乆屡登一鶚之表綽著能聲四分五馬之符居多善政有華將指不逺􅀚風認常山之蛇黙識木牛之運跨灧澦之象佇􅀚􅀞鷁之來某漫浪之期差池其羽走長安之日又陪上雍之祠占蜀道之星還作髙唐之想代回潼川張運判師夔代董制置傾蓋相驩夙承雅契驅車見顧敬佩髙情更勤四六之貽弥認再三之眷恭惟某官材猷膚敏器諝端凝使節皇皇夙抱靡依之感吉事緫緫行膺不次之除某甚感珍投莫知瓊報藏之十襲足為篋笥之光雖則七㐮不稱䄡褕之贈代回楊國博丹筆祥刑幸依光於翼軫繍衣轉漕忽攺次於斗牛甚慙徇鐸之􅀄有觖褰帷之慶髙情厚甚下問燁然恭惟某官獨抱古心力行正道太斈晨入士皆樂於有師湘水曉行民蓋幾於无訟自天出綍易地乗軺莫非王民何此界彼疆之隔徒得君重助春生秋殺之仁尤恐紫􅅺不容黔突某罔功閱嵗撫事懷人有所不通方將考德而問業何去之速遂使離羣而索居所幸鄰壁之輝尚借滎河之潤交㤗亨而君子長惟此為然有德進則朝廷尊遐不謂矣代董制置回利路楊運判九鼎升班延閣易漕价藩煥乎有文章上直堯言之祕送之以礼樂再華周道之驅就擁􅀟旌榮開疊組恭惟某官掞材膚敏禀德浚明湘水兒童能說輶軒之風釆峴山父老尚懷裘帶之功名暫從神圉之遊實簡明庭之眷駕言龍節將指䕫藩冨媪孕靈坐溢牢盆之利姦胥落膽盡空訟缿之􅁈帝念葭萌地鄰嶓􅃁木牛轉粟路即逹於褒斜銅虎剖符師可臨於秦隴有嚴三命欲集兩長東璧圖書自它有耀北門管鑰無競惟人某辱託爲寮尤􅀷賛慶聞之道路恐又啓十乗之行修其簡書尚當爲九遷之賀代回湖南鄭漕肇之曉行湘水逺知礼樂之華老入明光近抱簡書之畏因遺我􅀟魚之繾綣知駕彼四牡之舂容恭惟某官奥斈長材英声茂實勒足奔電洗凡馬而一空運斤成風解全牛於四顧入朝甫爾出牧翩然撫字勞心香未安於燕寢澄清有志恩巳賜於鵲袍拓長沙千里之平旣均六轡護洞庭九州之險坐斡萬艘行奏計於甘泉即立班於文石某蒲栁之質糠粃在前芻狗巳陳不意復蒙於文繍槐龍對舞所期及識於衣冠代回淮南徐運判煇榮驅漢節給饋淮壖礼樂逺而光華著聞于古師旅加之飢饉聚見于今欲息隱雷之聲正藉福星之照恭惟某官斈為可用才靡不冝素所藴藏皆及物之志乆於歛退無希丗之心旣交章於北臺迄來歸於東海夜前席而入對晝衣繍以亟行奪螻蟻烏鳶之遺􅀺使肉骨之再活捕螟蟊螣賊之餘孽無翅股之復摇茍可救民諒􅀷體國盤根之别利器􅀊計有餘乗槎而歷天津風斯在下某過勤巽謝仰認謙撝寒日茺茺詎冝貪帝所之夢春郊處處猶將􅀚使者之功代回福建趙運判善宣起家越上將漕閩中送禮樂而有光華古莫重乎膚使一道德而同風俗今又在於廉車公無遐心民可吐氣恭惟某官持操甚厚揚歷罙􅀷至今京兆之歌曰前有趙冝入承明之直無以易堯不應七聚落之間復勤單軺傳之出惟西北風塵之巳息而東南雨露之猶慳問俗及豚羔山谷之詩云爾羡君超鸞鶴坡仙所詠非耶少觀荔子之丹即拜芝函之紫某未由旅賀例辱損箋分民病之憂願謹衣篝之護後天下而樂佇榮衮繡之歸代回江東莊運使夏奏功司􅁃將漕陪京一道服於教條不勤易地六轡熟於原隰益足觀風中扆眷隆上流􅀔重恭惟某官材全業鉅學廣聞多髙義之薄雲天早奮何蕃之勇道山之鄰日月晩讎劉向之書輟從著作之庭出任皇華之􅀉聚萬民於荒政驅四牡以賢勞如此人才盍來歸於金馬柰何天塹方仰給於木牛風景不殊星言夙駕師旅因之飢饉正藉筭鞭氣色益以晶明佇頒召璽某冐焉浪出未以汰歸訪斗牛邊已後君平之問以春秋對佇􅀚莊助之來代回江西李運使􅑻起家乗傳將漕餽軍淛河以東之民去思未逺大江而西之地來莫已歌有志澄清何憂盤錯恭惟某官名隨日起材應時需近使之煩使之殆無施而不可善人也信人也似未足以相名方人物之􅆌然而江濤之如此天子有詔固將大任於陸君皇帝曰嘻猶有未平之劉闢樵蘇後㸑弩矢前驅繭絲乎保障乎公必本根之急濡需者卷婁者彼何鼎鑊之逃紅旗破賊黄紙除書直相先後􅀞棟飛雲珠簾捲雨寜乆回旋某側聞下車方規上記受一㕓於仁政亟欲謀歸勞四牡之使臣别遟賛喜代回成都林漕文仲將輸􅃆北易節劔南斜谷列屯方仰木牛之運少城一道巳先牡馬之迎下車云􅀄載路相慶恭惟某官好是正直擇乎中庸迎風寒露之玉壷㓗其淸矣暖日生煙之錦瑟和亦温然自奏郡庸出司漕計乗槎直上天巳界於漢中叱馭疾驅星忽臨於益部聞数萬人通千里之役湏十餘鍾致一石之粮弩矢前驅樵蘇後㸑諒賢勞之无惮在聖眷則甚􅀷某借潤德鄰升華工正錦城雖樂期公乃在於早還金門少留即日㑹􅀚於暮召代回湖南曹漕彦約按刑湖右轉漕湘中六轡如絲雖賢勞於原隰三軍挾纊亦流􅃳於京師恭惟某官儒學醇明吏材膚敏自䇿扞城之績亟膺持斧之榮告舎人趣治裝適當㓂警見大夫無可使誰給軍儲徑煩行李之來以成破竹之捷民亦勞止因之師旅以柰何我儀圖之殱厥渠魁而巳矣小􅀚􅂄定即見勞還某縻職雉官馳神燕夏嵗月如代空驚揚粃之在前造化為工行見積薪之居上代回湖北王漕允􅀄起曹愒日甚慙清切之司信使􅀚風有渥皇華之遣先勤下問良佩髙情恭惟某官望實飛騰典刑炳蔚一俞一咈當入陪廣厦之氊載馳載驅還復動陽春之脚有華淸樾施及凋蒲某曵履胡顔投簮甚力老􅂹真老寕復恋立仗之芻孤山不孤行當迓在原之轡代回淮西􅀓漕誠虎符奏最龍節疇庸礼樂逺而光華遐心何有師旅因之飢饉敏手是資恭惟某官機量醇明材猷敏劭駒在彼谷巳空北馬之羣魚躍于渊盍展南鵬之翼甫班天上復守雲中帖四境之繹騷集萬民之離散兹由􅀞㦸就易繍衣雖合符得節􅀂平進之常然疊組重珪非他道之比少煩咨度㑹即勤帰某願友多聞獨欠一識整六師而截淮浦正藉來宣使百工而求􅀓岩猶堪共役代回趙漕彦倓殿藩江介轉漕湘流􅀽得賢侯州乃无於一事衡為巨鎮食何有於九年冝煩单車以餉千里恭惟某官傑韜國器表立宗英出而專城玺書勉厲之有效入焉繕器工匠技巧之咸精侈􅀆南箕帰止西陌自起家而予郡巳知國之得人田里旣無於嘆愁原隰遂華於礼樂四郊如靖一節以趍某引分投簮􅂪恩分組景翳翳以將入所欣瞻衡宇而載奔芳菲菲其弥章更願折瓊枝而継佩代回江西胡漕槻奪情許國將指餽軍移孝則忠蓋古所謂大臣者知逺之近故今用之郷人焉恭惟某官挺有祖風蔚為丗德中外踐􅆒之乆聖明簡注之􅀷素韠三年方枕曾參之塊緑林一日忽于通德之郷􅀚察使急於賦焉見大夫无可使者惟閔子甞要絰而服事至伯禽亦卒哭而御戎帝曰汝諧公為民起樵蘇後㸑政􅀚韓信之竒弩矢前驅豈耀長卿之貴某相識雖晩所聞巳多山林魑魅之姦何遽至是京􅀚鯨鯢之績願早圖之代回黄漕犖典獄參聮乆虞瘝曠共工闕長忽冐攝承退自揣於頭顱難上司於喉舌露章控免天聽莫回諒四牡之光實分隣壁致五鳩之正躐代庖人方伺遄帰亟圖候謝忽鳴謙之先辱寕裁復之敢稽代回湖南徐運判輝四牡之勞使臣乆稽王覲五雉之為工正謬竊君恩曽巽謝之未遑巳謙光之先辱恭惟某官王之膚使古之謀人雖駕单車身實兼於数器故纍四印勞不嘆於獨賢淮海无波京師知􅃳遂使雲司之白与分水佩之蒼某聽履可慙投簮甚切集于苞栩遥瞻星言夙駕之光収之桑榆巳畏日暮倒行之戒代回廣西楊漕方起家予節將漕宅南髙明有融及物之心未了選擇而使重逺之意可知恭惟某官明善成身為仁由已三仕无喜色三巳无愠色養之浩然兩喜多羙辭兩怒多􅁖辭聽其自爾及兹更化復此立朝遽為襆􅀍之行遄有褰帷之寵莫非王土寕辭五嶺之炎無有遐心行歌四牡之勞某罔功曳履有請投簮我營小山之居將委身而就老公作太元之草願載酒以相從代董侍郎回辛運使克承帖荆報政泝峽􅀚風原隰之事孔殷正煩咨度疆場之虞未靖尤藉轉輸賢者之來民所攸頼恭惟某官天資凝逺風韵浚明巍峩千佛之姓名早冝臺閣屈折三神之歩武晩落江湖兹煩漢節之華來假䕫藩之重跨灧澦之象不辭王事之艱難俯常山之蛇要識老臣之開濟飛騰自此翹企俟之某别德恍然為僚幸甚尚憐往日聽夜雨於巴山安能扁舟披朝雲於巫峽代回淮南林運使拱陞班中祕將漕邊陲礼樂逺而光華遐心何有師旅因之飢饉敏手為冝天不違顔星言夙駕恭惟某官器資膚敏德履弘􅀷自司庾於日畿益舒翹於􅀊最属淮人之離散求牧与芻忘漢德之寛仁帶牛佩犢徒得君重無俾民憂峻奎璧圖書之聮兼錢榖刑獄之任餽千金之日費正頼通材護数處之風寒更觀竒績某未遑望履甚慶得輿遺我􅀟魚愧莫酬於繾綣駕彼四牡願加毖於馳驅代回湖北范漕子長粛將使指兼擁州麾一道觀風足展澄清之志專城宣化又彰鎮撫之材重湖无憂四海相慶恭惟某官人門具羙天分素髙乆矣踐揚名實孚於上下恬然歛退言行擇乎中庸公道方申薦章旁午冝􅁝綸之一札􅂌符節以並驅夏口武昌三國之山川如舊江沱漢廣諸侯之風化一新不俟席温即膺環召某摧頽暮齒塵綴朝紳只今数日以謀㱕外無榮望期公五月之報政别致賀忱梅亭先生四六標凖卷之
