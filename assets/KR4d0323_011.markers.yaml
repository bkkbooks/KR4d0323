  - {type: variant, offset: 0, length: 11376, content: 欽定四庫全書四六標準巻十一宋李劉撰雜謝代林運幹良顯謝丞相書考求文字書考謂書其考之殿最唐趙璘因話錄云裴充為太常寺太祝年甚少時京司書考官之清髙者例得上考充之同儕以例止得中考訴于卿長曰此舊例也充曰奉常職重地高不同他寺大卿在具瞻之地作事當出于人本設考課為奬勤勞豈係于官秩若一一以官髙下為優劣則卿合書上上考少卿合上中考丞合中上考主簿合中考恊律合下考某等合喫杖矣卿笑且慙遂特書上考干大播於一陶俾登畿幕顔延之詩結綬登王畿餘見前積小成於三考獲進選階杜氏通典周制三載考績三考黜陟其訓曰三嵗而小考其功也小考者正職而行事也九嵗而大考其功也大考者黜無職而賞有功也頂踵歸坱圠之功見前肝膽極輪囷之感韓詩窮途致感激肝膽還輪囷敢因摧謝張湯傳奏事即譴湯摧謝蘇林曰深自挫按也師古曰若上有責即摧折而謝也更叙依歸韓文彼人者有聖者為之依歸又若僕無所依歸伏念某材無瘉人汲黯傳亡以瘉人師古曰瘉勝也讀與愈同學未聞道半世寒牕之燈火元稹詩暗風吹雨入寒窓陳後山詩寒窓冷硯欲生塵中年太學之虀鹽送窮文太學四年朝虀暮鹽篆刻雕蟲覺兎毫之欲脫法言或問吾子好賦曰然童子雕蟲篆刻俄而曰壯夫不為也李詩書秃千兎毫詩裁兩牛腰銜枚戰蟻偶鷄口之先鳴歐陽公詩無譁戰士銜枚勇下筆春蠶食葉聲梅聖俞詩萬蟻戰酣春晝永五星明處夜堂深蘇秦傳寕為鷄口無為牛後索隐曰戰國策曰寕為鷄尸不為牛從延篤注云尸鷄中主也從謂牛子也言寜為鷄中之主不為牛子之從後也左傳平隂之役先二子鳴遂采魯芹詩思樂泮水薄采其芹魯矦戾止言觀其旂注芹水菜也言水則采取其芹宫則采取其化出燃楚竹柳詩漁翁夜傍西岩宿曉汲清湘燃楚竹未滿戍𤓰之代見前忽纏家棘之悲詩棘人注棘急也身服䘮服情急隙駒之制易終莊子人生天地間若白駒之過隙忽然而已魏豹傳人生一世間如白駒之過隙師古曰言其速疾也白駒謂日景也隙壁際也林烏之哺益切杜詩林烏反哺聲詳别見上書光範初無蟠木之先容得闕長安乃辱采葑之下體並見前朅來半載朅邱傑切説文去也又發語辭呂氏春秋膠鬲見武王于鮪水曰西伯朅來無欺我也注朅何也若然則朅之言盍也非發語辭矣楚詞車既駕兮朅而歸不得見兮心傷悲文選注劉向七言曰朅來歸耕禾自踈顔延年詩朅來空復辭皆謂盍來始通何有寸勞夏屋督工麄逃曠敗夏大屋也通作廈詩夏屋渠渠禮記若見覆夏屋者矣注今之門廡旁廣而卑春闈考士獲厠使令見前及大庭聞魁三之傳杜詩爾家最近魁三象時論同歸尺五天則本房有簋貳之數易坎六四樽酒簋貳用缶然雖有依紅之樂見前尚未霑破白之章燕翼貽謀録云元祐元年以改官員多吏部侍郎孫覺請嵗以百人為額從之紹聖三年吏部乞以每甲五人引見不拘數則是嵗有三百餘員也中興以來改官人數絶少嵗不過數十人雖令選人舉官逐員放散數亦不増至紹興初號為頓増亦僅三十餘員慶元以後嵗有溢額葢孤寒路絶得者舉有五員俱足不得者多不破白勢使然也七十偏親一則以喜一則以懼斗升㣲禄時乎為飬時乎為貧茫然寸歩之謀甚矣分隂之惜陶侃傳大禹聖人乃惜寸隂至于凡俗當惜分隂䑕肝蟲臂固難躁進以妄圗馬渤牛溲或恐兼收而並蓄並見前恭惟某官鼎彛家學衮冕世臣撫五辰於泰階之平尚書撫于五辰庶績其凝東方朔傳願陳泰階六符注泰階三台也三階平則隂陽和風雨時社稷神祗咸獲其宜天下大安是謂太平載萬物以坤元之厚見前復文武之境已昭元老之壯猶詩序宣王能内修政事外攘夷狄復文武之竟土詩方叔元老克壯其猶注元大也五官之長出于諸矦曰天子之老壯大猶道也方叔天子之大老能光大其軍謀之道以討之歸鄆讙之田足見真儒之已效法言孔子用于魯齊人章章歸其侵疆魯不用真儒故也如用真儒無敵於天下安得削然益旁求於俊乂見前欲令聚在於闕庭梅福傳天下布衣各厲志竭精以赴闕廷故凡絲粟之材老泉集天下之人毛髮絲粟之才紛紛而起合而為一未始蒯菅之棄蒯音快菅音姦左傳詩曰雖有絲麻無棄菅蒯雖有姬姜無棄蕉萃此逸詩也絲可為帛麻可為布皆精細之物菅蒯皆草之可為粗布者尚念某亢身無策卬首自鳴俱見前桃李成蹊自合安不言之分李廣傳桃李不言下自成蹊師古曰蹊謂徑道也言桃李以其蕐實之故非有所召呼而人爭歸趍來往不絶其下自然成蹊以喻人懐誠信之心故能潜有所感也樓臺近水誰能忘先得之情見前代察判徐愿謝史丞相得五紙文字補京兆之掾曾㣲賛畫之長掾俞絹切從手彖聲官屬北堂書抄五官掾後漢有之署功曹及諸曹事交公車之章兹拜成終之賜自匪載驅於四牡何由一發而五豝並見前毫髪不假之他門頂踵皆歸於化冶李義山集卵翼不自於他門頂踵實非其己物莊子天地為大鑪造化為大冶有言雖淺進謝敢稽伏念某才乏線長力尤綿薄並見前十年太學身嘗百甕之虀韓文太學四年朝虀暮鹽東坡集王狀元未第時醉墮汴河為水神扶出曰公有三百千料錢若死何處消破士有效之陽醉落河河神亦扶出士人喜曰我料錢㡬何神曰吾不知也但有三百甕黄虀無處消破耳山谷詩世傳寒士有食籍一生當飯百甕菹一第集英袍已半霜之葉集英殿舊名元徳亦曰廣政明道元年改元和尋改今名春秋誕聖節錫宴此殿熈寜以後親䇿進士于此殿東坡詩青袍半作霜葉枯昨終素韠詩庶見素韠兮箋祥祭朝服素韠者韠從裳色重累洪鈞泛緑依紅猥使近長安之日劉劭㓜童傳元帝為江東都督鎮揚州時中原散亂有人從長安來元帝問洛中消息潸然流涕時明帝年數嵗問泣故具以東渡意告之因問帝汝意謂長安何如日逺答曰不聞人從日邉來只聞人從長安來居然可見元帝念之明日集群臣宴㑹設以此問明帝又以為日近元帝動容問何故異昨日之言曰舉頭見日不見長安以是知近帝大悦餘見前草元尚白誰肯牋閶闔之風揚雄傳時雄方草太𤣥有以自守泊如也或嘲雄以𤣥尚白師古曰𤣥黒色也言雄作之不成其色猶白故無禄位也餘見前始焉一鶚之飛繼以乘鴈之集再而衰三而竭孰與㸃睛二之下四之中正須合頴况當百里九十之半更覺分寸千丈之強並見前忽蒙雷電下取之勞韓詩平生千萬篇金薤垂琳琅仙官勅六丁雷電下取將異人記上元中台州道士王逺知善易知人生死禍福作易縂十五巻一日雷雨雲霧中一老人語逺知曰所泄者書何在上帝命吾攝六丁雷電追取上方秘文自有飛天保衞金科秘藏𤣥都汝何者輒藏緗帙逺知曰青邱元老傳授也遂有埃風上征之路離騷經駟玉蚪以乘鷖兮溘埃風余上征埃塵也言我設往行游將乘玉蚪駕鳯車奄塵埃而上征何物不由於洪造東坡集草木賤㣲敢干洪造此身獨拜於全功兹葢伏遇某官八柱世臣淮南子地有九州八柱神異經崑崙有柱焉其髙入天所謂天柱也圍三千里圖如削下有仙人九府治與天地同休息張説姚崇碑八柱承天髙明之法列四時成嵗亭毒之功存三槐家學周禮朝士掌建邦外朝之法靣三槐三公位焉注槐之言懐也懐來人於此欲與之謀方當鯉趨過庭之際已傳虎拜稽首之心詩虎拜稽首天子萬年虎拜稽首對揚王休注拜稽首者受王命策書也臣受恩無可以報謝者稱言使君夀考而已更化十六年無匹夫不被其澤董仲舒傳為政而不行甚者必變而更化之乃可理也當更化而不更化雖有大賢不能善治也闢國數千里復寜王有指之疆詩昔我先王受命有如召公日辟國百里今也日蹙國百里尚書率寜人有指疆土益宏翕受之規丕廣旁招之意里仁為美似憐桑梓之偶同舉能其官特取蘋蘩之可薦感一力挈提之厚增寸心銘鏤之私某敢不勉自激昻圗惟報稱鷄犬䑛鼎難更千㸃化之功並見前鼷䑕飲河當自詭承流之效莊子偃䑕飲河不過滿腹注偃䑕鼷䑕也京房傳臣得出守郡自詭效功師古曰詭責也自以為憂責也董仲舒傳郡守縣令民之師帥所使承流而宣化者也感藏不盡敷述奚殫代吳省倉玭謝丞相縮次中興㑹要紹興三年行在省倉内鎮城倉改為行在南倉州倉仁和倉改為行在北倉監官四員兼管幹和糴十一年詔行在三倉以行在省倉上中下界為名監官監行在省倉上中下界繫銜貧累清時許守漢倉之粟杜牧詩清時有味是無能高帝紀據敖倉之粟後周史蘇綽為郎中文帝至城西漢故倉地顧問左右莫有知者綽具以狀對帝大悦老須逺次忽臨齊戍之𤓰此恩夙出扵大鈞扵義宜伸扵小牘並見前伏念某身勤事左昌黎與竇秀才書身勤而事左辭重而情約非計之得也意廣才踈見前家世占寳唐之濵寶唐山在撫州崇仁縣西南一百五里跨樂安之境寳唐水出焉學問皆環溪之訓吳沆崇仁人㓜孤事母孝致和間獻書于朝不用歸隐環溪後舉不求聞逹郡以沆應詔所著有易論語發㣲老子觧環溪集省倉葢其後也少而有志頗欲就博習修潔之科董仲舒傳郡國諸矦公選賢良修潔博習之士欲聞大道之要至論之極壯則無竒亦屢玷徳行道藝之貢周禮卿大夫之職三年則大比攷其徳行道藝而興賢者能者歳不我與命與仇謀韓文命與仇謀取敗㡬時陳後山詩命與仇謀得老窮烏㡌黄塵凡五排扵禮部山谷詩九陌黄塵烏㡌底五湖春水白鷗前青衫白首又兩進扵計臺白樂天詩白髪更添今日鬢青衫不改去年身又青衫不改白髮已多終然蹉跎説文蹉跎失時也一曰跌也廣韻失足杜詩淮海莫蹉跎韓詩烏乎吾意其蹉跎成此遲暮離騷經惟草木之零落兮恐羙人之遲暮漫作兵厨之隠阮籍傳籍聞歩兵厨營人善釀有貯酒三百斛乃求為歩兵校尉遺落世事聊為簿竈之依孫寳傳御史大夫張忠署寳主簿寳徙入舍祭竈請比隣詳見前青天鳥道之拊膺雖嘗奏辟李詩蜀道之難難于上青天西當太白有鳥道可以横絶峩眉巔捫参歴井仰脅息以手撫膺坐長歎白水魚竿之入幕何敢疾驅杜詩白水魚竿客清秋鶴髮翁胡為來幕下祗合在舟中韓文既識路又疾驅兮又無疾其驅天子有詔如此頭顱摭遺陶𢎞景與從兄書三十六方作奉朝請頭顱可知詳别見凄其脚色詩凄其以風東軒筆錄張鑄河北轉運使降通判太平州時葛原初得江東西提㸃銀銅坑冶欲荐鑄移文取其脚色鑄不與以詩答之曰銀銅坑冶是新差職比催綱勝一階若使下官供脚色下官踪跡轉塵埋侯鯖録東坡云世之對偶如紅生白熟手文脚色二對無復加也奚敢作堂除之夢續事始曰舊制内外皆吏部授自隋以來五品以上官中書門下訪擇聞奏然後下制肅宗復令中書以功除官今謂堂除也李濟翁資暇集云除授二字當辨分明今多不能窮審意義俗吏非調選得官者皆自大曰我乃堂除而亦有随俗語新拜官者曰某乙除某官至有遺賀書題之曰送上新除某官是詛新官俾除去之也按漢書凡言除其官以除故官就新官也晉宋已降史無班馬之筆語不根理或以拜授為除及載夲語則義㫖宛在如王導讓中書監請為三師表云乞得除中書監竭誠保傳是也今授代無新拜之官者云有除無授唯此語允當其有謂之除書者乃除去前人舊官與新人也欒城集祖宗朝堂除舊例皆見缺然後差除因事然後超擢所除皆有限量故用缺不至乆逺乞今後堂除皆竢有缺方差且將見今堂除人輪環充補尤難干京局之推宋以封樁庫贍軍所打套局惠民局軍器所車輅院騏驥院省倉豐儲倉交引庫草料塲樓店務排岸司為京局時方張更化之絃公實秉曲成之柄冐為冶躍便辱甄收並見前使守九年之儲禮記三年耕必有一年之食九年耕必有三年之食令待四政之闕樝梨橘柚大非老人所種之宜欂櫨侏儒偶在宰相兼收之列並見前聊裝鋪席歸老林泉不謂俟河之清左傳俟河之清人夀㡬何王粲賦惟日月之逾邁兮俟河清乎其未極乃成縮地之脉列異傳費長房能縮地脉坐客在家至市買鮓一日之間人見之千里者數處洛中親舊書傳犬耳之黄陸機傳初機有駿犬名曰黄耳甚愛之既而覊寓京師乆無家問笑語犬曰我家絶無書信女能齎書取消息否犬摇尾作聲機乃為書以竹筒盛之而繫其頸犬尋路南走遂至其家得報還洛其後因以為常述異記陸機少時頗好遊獵在吳豪盛客獻快犬名曰黄耳機後仕洛常將自随此犬黠慧能觧人語機覊旅京師乆無家問戲語犬曰吾家絶無書信汝能賫書馳還取消息否犬喜摇尾作聲應之機試為書盛以竹筒繫之犬頸犬出驛路疾走向吳逕至機家得書馳還計人行程五旬犬往返才半月吳下官曹事報烏頭之白燕丹子燕太子丹質於秦秦王遇之無禮不得意欲歸秦王不聼謬言曰令烏頭白馬生角乃可丹仰天歎烏即白頭馬為生角秦王不得已而遣之僮奴欣恠里巷驚疑髙下在心只合避賢者之路左傳諺曰髙下在心川澤納汗山藪藏疾瑾瑜匿瑕國君含垢天之道也殷浩傳桓温上疏罪浩曰浩過䝉朝恩寵靈超卓不能㳟慎所任恪居職次而侵官離局髙下在心隋書楊素傳賛阿諛時主髙下其心公孫𢎞傳願歸侯乞骸骨避賢者路劉向傳宣帝進蕭朢之等以通賢者之路進退維谷反恐負相國之知詩進退維谷傳谷窮也正義云谷是山谷墜谷是窮困之義故云谷窮韓文相國之知至矣尚堪一行李靖傳臣雖老尚堪一行詳見前不逺千里然非恃無垠之坱圠見前亦寜免將進而趦趄韓文足將進而趑趄口將言而囁嚅恭惟某官清任以和直方而大見前手麾九日太陽行黄道之中淮南子堯時十日並出草木焦枯堯命羿仰射十日中其九日日中九烏皆死墮其羽翼莊子疏堯時十日並出使羿射九烏落為沃焦歸藏鄭母經昔者羿善射彃九日果彃之天問羿焉彃日烏焉觧羽黄帝占天有三道黄道者日月五星所乘漢天文志日有中道中道者黄道一曰光道中興天文志王奕按渾天説黄道九道厥初本無是因日行而强名之日行曰黄道者黄色之中也黄道即中道也日道居中月五星循道而行故日道獨謂之黄坐鎮八年㣲物荷洪鈞之播文選坐鎮雅俗雖風霆不言流形之利禮記地載神氣神氣風霆風霆流形庶物露生易乾始能以羙利利天下而不言所利然天地能照許國之心周札傳以身許國死而後已孔稚圭詩本持許國志况復武功彰東坡詩許國心猶在匡時術已虛外撫四夷王陵傳外填撫四夷諸矦内熈百度收毛髪絲粟之細入竹頭木屑之藏晉卿之舉七十家不遺管庫祐甫之除八百吏皆是舊知冐焉而來恃以無恐某敢不靖共爾位洗濯其心並見前却日揮戈收效在桑榆之景淮南子魯陽公與韓搆難戰酣日暮援戈而撝之日為之退三舍又日西垂景在樹端謂之桑榆注言其光在桑榆樹上郭璞詩槐無魯陽徳回日令三舍梁李鏡逺詩曾泉豈停舍桑榆忽在斯迴戈安得中長䋲不可羈涓辰擁篲奉身歸桃李之門左傳奉身而退餘見前代饒運幹誼謝史丞相改任斡茗事扵畨禺妄求易地漢書注斡謂主領音與管同爾雅檟苦茶注早採者為茶晚採者為茗晉書温嶠表遣取供御之條列真上茶千斤茗三百大薄番禺秦南海郡番禺縣以番禺二山得名番山在南禺山在北韓詩番禺軍府盛賛漕輸扵湘浦竟辱回天浦説文水濵也風土記大水有小口别通曰浦詩餘依稀淮岸湘浦張𤣥素傳張公論事遂有回天之力俾依青草之湖荆州記巴陵南有青草湖周廻百里日月出沒其中湖南有青草山故因以為名青草湖一名洞庭湖洞庭亦謂之太湖南遷録洞庭湖西岸有沙洲堆阜隆起即青草廟下一湖之内中有此洲南名青草北名洞庭所謂重湖也杜詩洞庭猶在目青草續為名顧况詩青草湖邉日色低黄茅瘴裏杜鵑啼庶免黄茅之瘴番禺雜編嶺外二三月為青草瘴四五月為黄梅瘴六七月為新禾瘴八九月為黄茅瘴桂海虞衡云瘴者山嵐水毒與草莾冷氣鬰勃蒸熏之所為春曰青草瘴夏曰黄梅瘴六七月新禾瘴八九月曰黄茅瘴通真子瘴論曰嶺南從仲春訖仲夏行青草瘴季夏訖孟冬行黄茅瘴舊五代史成汭鎮荆門與宰相徐彦若不平銜之及彦若出鎮南海路過江陵汭思嶺外有黄茅瘴患者髪落乃謂彦若曰黄茅瘴朢相公深重彦若應聲答曰南海黄茅瘴不死成和尚葢譏汭曾為僧也汭甚愧之東坡詩陣雲冷壓黄茅瘴此恩渥甚何感猶之伏念某樸學亡奇儒林傳兒寛有俊材初見武帝語經學上曰吾始以尚書為樸學弗好及聞寛説可觀散材不腆莊子匠石之齊至乎曲轅見櫟社樹其大蔽牛絜之百圍觀者如市匠石不顧弟子厭觀之走及匠石曰自吾執斧斤以随夫子未嘗見材如此其羙也先生不肯視行不輟何耶曰已矣勿言之矣散木也是不材之木也無所可用故能若是之夀注不在可用之數故曰散木踏槐半世㡬隨兎目之黄南部新書長安舉子六月後落第者不出京謂之過夏多借静坊廟院及閑宅居住作新文章謂之夏課亦有十人五人醵率酒饌請題目於知已朝逹謂之私試七月後投獻新課并於諸州府㧞觧人為語曰槐花黄舉子忙翁承賛有詩云雨中粧㸃朢中黄勾引蟬聲送夕陽憶得當年随計吏馬蹄終日為君忙山谷詩槐催舉子著黄花淮南子槐之生也入季春五日而兎目十日而䑕耳更旬而始規二旬而葉成齊民要術凡栽樹棗鷄口槐兎目桑蝦蟇眼榆負瘤散自餘雜木䑕耳䖟趨各其時采藻十年似守烏頭之白偶叨終秩未及問鈞並見前五嶺聞其皆炎初無去志杜詩五嶺皆炎熱宜人獨桂林諸公憐其獨冷誤有辟書見前元戎欲處之油幢之中方干詩問津求拜碧油幢真宰遂置之茗寮之末等勤大播徑合疾驅惟是孤㷀之蹤寸勇尺懦山谷詩士為欲心縛寸勇輒尺懦實聞瘴癘之地十室九空杜詩江南瘴癘地逐客無消息率爾陳情期扵避禍媒身無策難空冀北之士夫韓文伯樂一過冀北之野而馬羣遂空東都固士大夫之冀北也又以石生為媒以禮為羅又羅而致之幕下換骨有方乃綴湖南之賔客歐詩換骨莫求丹九轉山谷詩欲換凡骨無金丹韓文有問湖南之賔客者愈曰知其主可以信其客者湖南也去年奉詔為邑於陽山然後得謁湖南之賔客於幕下於是知前之信之也不失矣獲避飛鳶之跕馬援傳下潦上霧毒氣熏蒸仰視飛鳶跕跕墮水中注鳶鴟也跕跕堕貎跕音都牒泰牒二反姑從檣燕之留杜詩檣燕語留人茲葢伏遇某官秉國之鈞詩尹氏太師維周之氐秉國之均四方是維注均平也言尹氏持國政之平居權衡之任熈帝之載更政化當更之琴瑟並見前續聖賢難續之鼎彛益賛禹而格苖誕布舞干之化尚書益賛于禹曰惟徳動天無逺弗届至諴感神矧茲有苗帝乃誕敷文徳舞干羽于兩階七旬有苗格尹相湯而伐夏迄垂典寳之書史記湯遂伐三朡俘厥寶玉義伯仲伯作典寳注言國之常寳寕宗嘉定十五年正月朔御大慶殿受恭膺天命之寶然猶耻溝中之推必欲濟天下之溺東坡韓文公廟碑文起八代之衰而道濟天下之溺印趣銷而趣刻足昭從善之仁張良傳項羽急圍漢王于滎陽漢王憂恐與酈食其謀撓楚權酈生曰秦無道伐滅六國陛下復立其後楚必歛袵而朝漢王曰善趣刻印先生因行佩之酈生未行具以其計告張良曰於子房何如良曰臣請借前箸籌之誠用此謀陛下事去矣漢王輟食吐哺罵曰䜿儒㡬敗迺公事令趣銷印衣改造而改為益表好賢之意詩緇衣之宜兮敝予又改為兮緇衣之好兮敝予又改造兮傳緇衣卿士聴朝之正服此衣若敝願王家復改而為之願其常居此位常服此服也禮記好賢如緇衣惡惡如巷伯則爵不瀆而民作愿刑不試而民咸服某敢不敬其可願欽乃攸司並見前緑水紅蓮已感移栽之恵杜子羙海棕行移栽北辰不可得時有西域胡僧識青芝赤箭尚希並蓄之恩見前代李總幹伯長改任謝史丞相縂領古無其官宋南渡後置天下凡四縂領縂幹以縂領某處軍馬錢糧所幹辦公事繫銜樓玫媿集汪大猷為淮西縂幹金兵犯邉饋饟王師髙宗廵幸供億百出公佐其長以辦羣工扈從皆知公名此葢以京口縂幹改任監倉回馬首扵鹽亭不良擇地杜詩馬首見鹽亭髙山擁縣青注鹽亭縣屬梓州東九里也一統志鹽亭縣本漢廣漢縣地屬廣漢郡梁置北宕渠及鹽亭縣䕶䑕牙扵倉庾有渥自天詩誰謂䑕無牙何以穿我墉當趦趄將進之間拜坱圠無垠之賜左傳若從君惠而免之三年將拜君賜餘並見前謭焉孤賤辱此一陶竊惟京口之積倉圖經京口因山以為壘縁江以為境爾雅邱絶髙曰京故名一説京峴山在府東五里謂之京鎮京口得名以此劉禹錫詩土山京口峻鐵瓮郡城牢王元之詩京口浪花迎棹白海門山色入樓寒劉貢父詩縹壺盈前京口酒紅斾相随北府兵宋鎮江諸軍錢糧𨽻淮東縂領治鎮江積音恣聚也儲蓄也左傳居則具一日之積注芻米菜薪詩乃積乃倉乃褁餱糧實切邉頭之仰哺杜詩邉頭公卿仍獨驕岑参詩邉頭詞客舊來稀總司創闕褁糧兼坐甲之司下司字複疑有舛誤堂選掄才弄印致閲時之乆周昌傳髙祖持御史大夫印㺯之皇甫冉詩位重登壇後恩深㺯印時盖戰徳戰謀之際惟去兵去食之難為米折腰雖不離于禄仕東坡詞為米折腰因酒棄家口體交相累簸糠眯目易有誤于軍須莊子播糠眯目則天地四方易位矣朝野雜記東南三縂領皆仰朝廷科發獨四川縂領專括契佐軍須即有軍興朝亦不問必為官而擇人蜀志許靖傳審量五材為官擇人晉愍帝紀賛選者為人擇官官者為身擇利郭黙傳時當為官擇才若人臣自擇官安得不亂乎詳第八巻成都漕到任謝丞相條庶因能而任職伏念某一㣲無挾百拙有餘伯父取之庭階補以京秩謝𤣥傳為叔父安所器嘗曰子弟亦何豫人事而正欲使其佳𤣥答曰譬如芝蘭玉樹欲使其生于庭階耳兄弟習乎弓冶志在世科偶尺寸之蹉跎漫斗升之嚵嚼並見前中嬰家難詩未堪家多難予又集于蓼復詣吏銓煮海為鹽妄欲供富媪之役世本宿沙氏煮海為鹽宋衷曰宿沙齊靈公臣齊負海故有魚鹽之利或曰宿沙氏炎帝時諸矦鹽鐵論古者豪强大家得煮海為鹽民皆效之作姦之業也吳都賦煮海為鹽採山鑄錢杜詩煮海為鹽速焼畬度地偏栁文晉問猗氏之鹽晉寶之大也人之賴之與榖同化若神造非人力之功也決源釃流脉冩膏浸神液隂漉甘鹵宻起富媪孕靈不愛其羙迴眸一瞬積雪百里注媪烏皓切老女稱禮樂志后土富媪注媪老母稱也坤為母故稱媪無麪作餅或謂非巧婦之能陳后山詩巧手難為無麵餅誰能留渇待逺井况當避嫌趙充國傳媮得避慊之使注慊即嫌字公羊傳言伐何避嫌也惡乎嫌嫌與鄭人戰也不免易闕自笑鮎魚之上竹見前何啻羝羊之觸藩易羝羊觸藩不能退不能遂无攸利艱則吉一指之不若人猥勤伯氏之請匹夫之失其所亦闗造物之憐迄蒙倉庫氏之除王嘉傳孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也全出光範門之造恭惟某官鼎彛家學東京賦銘勲彛器歴世彌光曹植表功銘于景鍾名垂于竹帛社稷世臣巫賢之繼巫咸不但底王家之乂伊陟之紹伊尹真足格上帝之心並見前雖九徳敷施均不遐遺易泰九二包荒用馮河不遐遺而一門大小尤蒙器使烏鵲遶樹真同撼木之蚍蜉蚍音毗蜉音浮大蟻也韓詩蚍蜉撼大樹可笑不自量餘見前牛羊求芻乃肯發機扵鼷䑕魏志杜襲為丞相長史時許攸不附太祖而有慢言欲先伐之襲曰千鈞之弩不為鼷䑕發機萬石之鍾不以挺撞起音區區許攸何足以勞神武哉某敢不修其可願欽乃攸司並見前錢榖甲兵問扵廟堂當識士大夫之職韓文上宰相書幸今天下無事小大之官各守其職錢榖甲兵之問不至于廟堂論道經邦之暇捨此宜無大者焉椳闑扂楔成其室屋無忘明宰相之功韓文進學觧夫大木為杗細木為桷樽櫨侏儒椳闑扂楔各得其宜施以成室者匠氏之功也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也謝丞相書考補上佐扵黔㠝偶書下考王忠嗣傳不則黔中上佐耳㠝族凡切髙也栁文黔山之㠝巫水之磻陽城傳州當上考功第城自署曰撫字心勞追科政拙考下下貢空函扵黄閣莫報實恩殷浩傳桓温將以浩為尚書令遺書告之浩欣然許焉將答書慮有謬誤開閉者數十竟逹空函梁書武帝紀是馳兩空函定一州矣通典陳三公之制開黄閣㕔事置鴟尾比齊三公之官並置府其府三門當中門黄閣設内屏沈約宋書三公黄閣前史無其義按禮記云士韠與天子同公矦大夫即異鄭𤣥注云三公之與天子禮數相亞故黄其閣以示謙不敢斥天子疑是漢末制也偶暫攝扵竹符權武岡軍尤倍希扵樾䕃樾王伐切字林樹隂也淮南子盥汗交流休樾䕃則脱然而喜注樹如車葢狀為樾言多䕃也又武王䕃暍人于樾下而天下懐之感于㤙也忘其喋喋喋音牒張釋之傳豈效此嗇夫喋喋利口捷給哉布此惓惓見第一巻伏念某學殖疎蕪見前渉道短淺青泥盤足毎思範我之馳驅蜀道難青泥何盤盤百歩九折縈巖巒白雪滿頭寜復初心之邂逅杜詩鬢髮還應雪滿頭韓詩出宰山水縣讀書松竹林蕭條捐末事邂逅得初心進乏鷄犬之效韓詩進乏鷄犬效退從鹿豕之遊辱坯冶之一陶見前俾翺翔扵半刺杜詩半刺已翺翔䍧牱為徼雖非監螃蟹之州盤瓠見容偶免築鯨鯢之觀並見前竹齋藥竈不礙雲山杜詩竹齋焼藥竈花嶼讀書牀芰製荷衣無邉風月離騷經製芰荷以為衣兮集芙蓉以為裳適挈瓶之缺守左傳雖有挈缾之知守不假器禮也注缾汲水器也言小知為人守器尚知不以假人又越爼而代庖胡瞻爾庭人固疑其鶉突此非子座自亦耻扵象環所祈新尹之疾驅庶遂陳人之退屏明年今日固可歸三逕之荒凌雨震風尚合假萬間之庇並見前恭惟某官得聖之任為帝者師衡紞紘綖增鼎鉉九九之重易鼎六五鼎黄耳金鉉利貞上九玉鉉大吉戰國策昔周之代殷得九鼎凡一鼎而九萬人輓之九九八十一萬人士卒師徒械器被具所以偹者稱此餘見前箕裘弓冶協泰階兩兩之符東方朔傳願陳泰階六符注泰階三台也每台二星凡六星六符六星之符驗也天文志三台六星兩兩而居者在天為三台在人為三公餘見前行由絶席之尊張禹傳禹為太尉居禁中詔與三公絶席來歙傳賜歙班坐絶席在諸將之右王常傳拜常為横野大將軍位次與諸將絶席注絶席謂尊顯之也徑陟維垣之峻詩太師維垣注太師三公也垣墻也人主職論一相具瞻槐靣之尊荀子治國有道人主有職論一相以兼率之使臣下百吏莫不宿道嚮方而務君者論一相陳一法明一指以兼覆之兼炤之以觀其盛者也注論謂討論選擇之也餘見前太傅府有三才詎棄木頭之細晉東海王越少有令名謙虛持布衣之操惠帝反洛陽詔越以太傅録尚書以劉輿為長史時稱越府三才潘滔大才劉輿長才裴邈清才八王故事云劉輿才長於綜覈潘滔以博學為名裴邈彊立方正皆為東海王所暱俱顯一府故時人稱太傅府有三才劉慶孫長才潘仲陽大才裴景聲清才也時史彌逺為太傅餘見前所祈全度趙充國傳安世本持槖簮筆事孝武帝數十年見謂忠謹宜全度之師古曰安全而免度之不令䘮敗也非冀超遷某敢不補拙以勤白樂天詩救煩無若静補拙莫如勤山谷詩他人勤拙猶相補謹終如始尚書謹終于始深懲往轍躋分寸而落千丈之強見前雖踵常塗視九十而行百里之半韓文踵常塗之役役窺陳編以盗竊餘見前其為歸倚罔旣敷宣謝魏侍郎了翁為先祖先父作墓誌先美無傳凛負子孫之責禮記先祖無羙而稱之是誣也有羙而弗知不明也知而弗傳不仁也幽鐫有託蔚為祖考之光鐫遵全切廣韻鑚也韓文鑚石埋辭以列幽墟叙傳蔚為辭宗師古曰蔚文采盛也音鬰屬拘柱後之文張敞傳以柱後惠文彈治之晉灼曰漢執法冠也莫布堂下之武禮記堂上接武堂下布武敬裁儷啟恪布謝悰竊惟隧刻罕見扵先秦之前宋顧文薦負暄日録墓有碑碣未詳所起按儀禮廟中有碑所以繫牲并視日景禮記公室視豐碑三家桓楹天子諸矦塟時下棺之柱其上有孔以貫綷索懸棺而下取其安審事畢則閉壙中臣子或書君父勲伐於其上後人立隧口故謂之神道碑言神靈之道也今碑碣往往有孔者葢貫綷之遺制前漢碑極少後漢蔡邕崔瑗之徒乃為人立碑魏晉之後其流浸盛灸轂子雜錄云齊太子穆妃將塟議立石誌王儉曰石誌不出禮經起宋元嘉中顔延之為王洙作墓誌以其素族無名誄故以紀行自爾遂相祖習儲妃之重禮絶常例既有哀册不煩石誌也又齊時有發古塜得銘云東州世子東海女郎河東豐旻以為司馬越子嫁為茍晞子婦騐之果然又東都殖業坊十字街有王戎墓穿㫄得銘曰晉司徒安豐元公王君之銘然則昔之塟者晉魏以來皆有墓誌也按西京雜記前漢杜子夏臨終作文曰魏郡杜鄴立志忠欵犬馬未陳奄先草露骨肉歸于后土魂氣無所不之及死命刋石埋于墓側厥後墓誌恐自此始矣墓碑似昉扵後漢之末釋名碑被也此本王莾時所設也施其轆轤以繩被其上以引棺也臣子追述君父之功羙以書其上後人因焉乃建于道陌之頭顯見之處名其文就謂之碑也正而斃斯亦已矣禮記曾子曰吾何求哉吾得正而斃斯已矣身將隠焉用文之左傳言身之文也身將隐焉用文之是求顯也遂隐而死如郭林宗尚可免伯喈之愧郭泰傳㤗卒四方之士千餘人皆來㑹塟同志者乃共刻石立碑蔡邕為文既而謂盧植曰吾為碑銘多矣皆有慙徳惟郭有道無媿色耳若陶元亮又何待延年之辭顔延年為始安郡道經尋陽嘗飲淵明舍自晨逹昏及淵明卒延之為誄極其思致其略曰仁焉而終知焉而斃黔婁既沒展禽亦逝其在先生同塵徃世降逮李唐最重韓栁韓銘正曜定非䛕墓以攫金正當作貞避宋廟諱昌黎貞曜先生墓誌銘曰於戲貞曜維執不猗維出不訾維卒不施以昌其詩新唐書劉乂者亦一節士聞韓愈接天下士歩歸之後以争語不能下賔客因持愈金數斤去曰此諛墓中人得耳不若與劉君為夀攫厥縳切持也撲取也列子攫其金而去栁表文通亦豈遺人之矴石栁子厚陸文通先生墓表以先生能文聖人之書通於後世遂相與諡曰文通先生矴丁定切亦作碇錘舟石隋文王子齊王攸薨寮佐請立碑帝曰欲求名只一巻史書足矣不能為後人作矴石新唐書楊瑒傳瑒在官清白吏請立石紀徳瑒曰事益于人書名史氏足矣若碑頌者徒遺後人作矴石耳葢覺良工之獨苦杜詩已知仙客意相親更覺良工心獨苦有憐没世而不稱發其幽光韓文發潜徳之幽光時乃天道尚書滿招損謙受益時乃天道重惟先祖父之學不事今科舉之謀一門千餘指之肅雍是亦為政貨殖傳童手指千孟康曰古者無空手游口皆有作務作務須手指以别馬牛蹄角也師古曰手指謂有巧技者指千則人百九流百三家之貫穿止以潤身穿摳絹切貫也漢藝文志有儒道隂陽法名墨縱横雜農九流凡六藝一百三家三千一百二十三篇司馬遷傳貫穿經傳馳騁古今不徒稱鄉里之善人馬援傳援從容謂官屬曰吾從弟少游常哀吾慷慷多大志曰士生一世但取衣食裁足乘下澤車御欵段馬為郡掾吏守墳墓郷里稱善人斯可矣致求盈餘但自苦耳實有得名教之樂地樂廣傳名教内自有樂地何必乃爾雖亷藺固不羡曹蜍之無恙世説庾道季云藺相如雖千載上死人凛凛恒如有生氣曹蜍李志雖見在厭厭如在九泉下恙音様賈誼傳令此六七公者皆亡恙師古曰無恙言無憂病也元陶宗儀輟耕録戰國䇿趙威后問齊使嵗無恙耶王亦無恙耶楚辭九辨還及君之無恙魏文矦語倉庚曰擊無恙乎元帝詔貢禹今生有恙聘禮注拜其無恙顧愷之箋行人安稳布帆無恙神異經曰北方大荒中有獸咋人則疾名曰㺊恙也爾雅恙憂也風俗通上古草居露宿恙噬人蟲也然則恙有三義廣干禄書兼取憂及蟲事物紀原兼取憂及獸廣韻分㺊恙為二神異經合之誤矣然夷齊要是得夫子而益彰伯夷傳伯夷叔齊雖賢得夫子而名益彰顔淵雖篤學附驥尾而名益顯恭惟某官有徳立言以文貫道李漢韓文序文者貫道之器也不深于斯道有至焉者不也粹若出六經之正新唐書韓愈傳賛愈以六經之文為諸儒倡當其所得粹然一出於正凛然寒五緯之芒劉夢得栁文序粲然如䌓星麗天而芒寒色正人朢而敬者五行而已搴芙蓉而賦詩洞識隂陽之消長九歌米薜荔兮水中搴芙蓉兮木末易内陽而外隂内健而外順内君子而外小人君子道長小人道消也傍梅花而讀易詎忘天地之彌綸鶴林玉露魏鶴山了翁詩云逺鐘入枕報新晴衾鐵衣稜夢不成起傍梅花讀周易一窓明月四簷聲後貶渠陽於古梅下立讀易亭作詩云向來未識梅生時繞谿問訊巡簷索絶憐玉雪倚横参又愛青黄弄煙日中年易裏逢梅生便向根心見華實候蟲奮地桃李妍野火焼原葭菼出方從陽壯争出門直待隂窮排闥入随時作計何太癡爭似此君藏用宻推究精㣲前此咏梅花者未之及繫辭易與天地, SBCK: ''}
