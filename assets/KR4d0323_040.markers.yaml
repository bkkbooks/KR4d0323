  - {type: variant, offset: 8095, length: 417, content: 茂介叢休㳟惟某官肅括𢎞深法言或問士何如斯可以禔身曰其為中也𢎞深其為外也肅括則可以禔身矣靖共正直詩靖共爾位好是正直圖書中秘星連五緯之光月令仲冬之月昏東壁中晉天文志東壁二星主文章天下圖書之秘府也劉向傳詔向領校中五經秘書師古曰言中以别於外天官書五星者天之五佐為經緯見伏有時盈縮有度周禮疏五星左旋為緯隋天文志周五緯入房啟姬王之肇迹郎顗傳五緯循軌四時和睦樽俎邊城雷動三軍之喜揚雄傳天下之士雷動雲合章孝標雪詩朱門到曉難盈尺盡是三軍喜氣消佇應葭莩之動見前歸儀槐棘之班某猥辱手書劉宏傳每有興廢手書守相丁寧欵宻無由面賀維藩維翰願歸疆理之功詩价人維藩大宗維翰又廼疆廼理廼宣廼畆左傳疆理天下如阜如岡共享國家之福詩如山如阜如岡如陵如川之方至以莫不増代回淮南畢安撫再遇緹灰候氣一新太史之占見前茸纛宣風載重元戎之寄栁文嶺南節度使饗軍堂記幢牙茸纛金節析羽旂旗旟旞咸餙於下宜從亞歳曹植獻襪表亞歳迎祥履長納慶沈約宋書魏晉冬至日受萬國及百寮稱賀因小㑹其儀亞於歳朝茂擁百祺, SBCK: 提刑}
