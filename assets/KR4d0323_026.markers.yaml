  - {type: variant, offset: 0, length: 7090, content: 欽定四庫全書四六標準卷二十六宋李劉撰倉使提舉常平即漢耿壽昌常平之任宋淳化中建常平倉景祐元年令轉運司舉長吏舉所部官專領之然猶𨽻漕臣熈寜遣使提領此提舉常平之始九年府界畿内亦專置提舉常平倉一員不令司農丞兼領提舉常平司操常平斂散之法申嚴免役之政令治荒修廢賑民艱阨則𨽻提舉司嵗察所部亷能而保任之若疲軟或犯法則隨其職事劾奏元祐初罷紹聖九年復置建炎元年併歸提刑司二年復還其糴本通王提舉與權詳啓意盖倅武岡時通湖南倉使抗章引外掲節司平馮衍傳懐金垂紫掲節奉使注掲持也漢宣帝時耿壽昌請于邉郡皆築倉榖賤時増價而糴貴時減價而糶名曰常平倉常平之名始於此宋淳化中建常平倉熈寜中遣使提領此提舉常平之始正士去朝四海之疑未釋望郎問俗三湘之幸則多元氏長慶集嘉乃令子為吾望郎孫樵康郎中墓誌鴛行望郎錦川星使山谷詩同舍多望郎杜詩問俗九州箴寰宇記三湘謂湘潭湘鄉湘源况以部刺史之天趙嘏詩尋花偶坐將軍樹飲水方重刺史天東坡詩一見刺史天來臨舊令尹之地民信之矣帝念在兹恭惟某官天韻崇谹風猷膚碩學問廣大日光玉潔而蛟翔李漢韓文序詭然而蛟龍翔蔚然而虎鳯躍鏘然而韶鈞鳴日光玉潔周情孔思千態萬貌氣志清明燭照數計而龜卜禮記清明在躬氣志如神正義云言聖人清静光明之徳在於躬身氣志變化㣲妙如神韓文若燭照數計而龜卜也詳見前早提邑最入踐朝行徧儀清選而人訝其遲訝五駕切増韻疑恠也立登要路而公不之願杜詩自謂頗挺出立登要路津古之君子寜可禄歉而氣豐今之謀人詎恤身進而徳退尚書今之謀人姑將以為親拂衣勇甚范丹傳便起告違拂衣而去楊彪傳孔融魯國男子明日便當拂衣而去羊祜傳衍拂衣而起南史王僧䖍傳彼若見惡當拂衣去耳梁書何㸃傳弱冠拂衣華首一操謝朏傳斂迹康衢拂衣林沚又拂衣東山𦕈絶塵軌又建武之世拂衣止足晉書郗超傳性好聞人棲遁有能辭榮拂衣者超為之起屋宇作器服畜僕竪費百金而不吝唐胡宿詩稽康懶慢仍躭酒范蠡逋逃久拂衣東坡詩賢哉仲氏早拂衣占斷此山長洗耳又拂衣自注下下考芋魁飯荳吾豈無攬轡慨然載歌小雅之皇華見前復領大招之清絶楚屈平為懐王左徒博聞强志􅈺於辭令同列心害其能而讒之王怒疏平平自傷忠而被謗乃作離騷經以諷不見省納及襄王立又放之江南復作九歌天問九章逺㳺卜居漁父大招自沉汨羅以死屈潭在湘隂縣六十里酈道元水經云汨水西經玉笥又西為屈潭即羅潭也杜詩湖南清絶地互見前我聞在昔三異具見於一同尚書我聞在昔餘見前民到于今五善固忻於重拜見前所虞驛召靡俟鴈囘迴鴈峰在衡州亦屬湖南某去國三年起家二郡見前瞻霄漢之佳士昔蒙或輓以或推杜詩繡衣春當霄漢立左傳或推之或輓之能無入乎逄瀟湘之故人今乃受容而受察栁渾詩瀟湘逄故人詳見前偶甫至丞哉之壁倅武岡末由望使者之車文儒申申既喜迎栁公之不逺武岡矯矯亦幾見王導而無憂俱見前通湖南樂提舉章詳啓意盖簿寜鄉時上倉使所作寜鄉𨽻潭州湖南所轄也人一天而我二未遑樂霧之披宋王楙野客叢書今用披霧覩青天事多指樂廣如梁孝元詩還思逄樂廣能令雲霧褰駱賔王詩逺披樂廣天是也不知此語非創見于晉徐榦中論曰文王畋於渭水遇太公釣召而與之言載之而歸文王之識也灼然如驅雲而見白日霍然如開霞而覩青天晉人盖引此語以美樂令耳戒七日而齋三將展衡雲之拜禮記子云七日戒三日齋注七日戒者謂散齋也三日齋者謂致齋也昌黎謁衡嶽詩五嶽祭秩皆三公四方環鎮嵩當中噴雲泄霧藏半腹雖有絶頂誰能窮我來正逄秋雨節隂氣晦昧無清風潜心黙禱若有應豈非正直能感通森然魄動下馬拜松栢一逕趨靈宫湖南提舉常平司治在衡州故云持不腆之上轄腆他典切說文多也又厚也左傳不腆之田又不腆敝邑之禮公羊傳不腆先君之服又不腆先君之器轄下瞎切說文車軸耑鍵也通典唐主簿上轄曠莫達乎中涓曹參傳參以中涓從如淳曰中涓如中謁者師古曰涓潔也言其在中主知潔清灑掃之事盖親近左右也削牘斐然原渉傳削牘為疏負芒悚甚霍光傳上内嚴憚之若芒刺在背悚通作聳或作𢥠說文懼也漢刑法志𢥠之以行恭惟某官器資顯允詩顯允方叔徳履碩膚詩公孫碩膚亞卿之呼吸智謀雲仍固在左傳為亞卿焉史記樂毅傳毅為魏昭王使于燕燕王以客禮待之毅辭讓遂委質為臣昭王以為亞卿齊湣王昏亂昭王使毅為上將軍以伐齊破之濟西追至臨淄下齊七十餘城皆為郡縣英雄記吕布與袁術書昔樂毅攻齊呼吸下齊七十餘城正子之充實善信風烈猶存巍科摘髭要路䇿足落筆坐奔於萬馬善刀立觧于千牛竝見前縣庸蔚乎浮湘郡最卓於守郢郢以井切說文故楚都在南郡江陵北十里不但别盤根之利器見前要已知勁草於疾風南史庾仲逺初為明帝府佐廢帝景和中明帝疑防賔客故人無到門者唯仲逺朝謁不替明帝即位謂曰卿所謂疾風知勁草蕭瑀傳帝賜瑀詩曰疾風知勁草版蕩識誠臣盍歸清切之班朝夕獻納勉副皇華之遣原隰馳驅甫湘水之曉行遄蔡城之夜縳酃醁有酒竝見前洞庭無波九歌洞庭波兮木葉下六轡既均復戍清絶之地見前一節以走恐登碧落之天禮記凡君召以三節二節以走一節以趨碧落天也李渉詩碧落髙髙雲萬里詳見前某不肖至愚無聞甚陋二科鹿鹿遂謀三釡以飬親王制注獨獨鹿鹿也鹿鹿無所依莊子吾及親仕三釡而心樂詳見前千里魚魚誰以四方而供簿韓文魚魚雅雅注魚鳥飛行成隊山谷詩從師學道魚千里然專令朱出而墨入見前决不敢黄放而白催李燾長編宇文粹中進對云朝廷黄紙放白紙催有先達者為之前此志或遂居下位不獲乎上兹道難行受察云初願忠敢隐移慈竹而栽率土定未忘故里之情述異記章帝三年子母筍生白虎殿前時謂之孝竹群臣獻孝竹頌詩義曰南中生子母竹今慈竹是也杜少陵集堂下累土為山一匱盈尺以代彼朽木旁植慈竹率字疑誤賦梅花而獻繡衣敢妄冀聞人之目劉禹錫上權舍人書宋廣平之沉下僚也蘇公味道時為繡衣直指使者廣平投以梅花賦蘓盛稱之自是乃列於聞人之目通新江西提舉兼知撫州徐監丞瑑榮驅龍節周禮掌節澤國用龍節疏澤多龍者若鄭國之類也以金為節鑄龍之象兼綰魚符隋文帝紀開皇九年頒木魚符於總管刺史雌一雄一唐車服志初髙祖入長安罷隋竹使符班銀菟符其後改為銅魚符以起軍旅以易守長内府轉丞方表循良之最周禮内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉外臺選使更疇牧御之庸一道驩然六條秩若恭惟某官器資膚敏業履淑均竝見前無終義理之文夙髙朱賈徐樂傳樂燕郡無終人也嚴助傳上令助等與大臣辯論中外相應以義理之文朱謂買臣賈謂捐之有功平反之徳逺邁于張朝野僉載云客問司農卿徐有功何如浮休子曰有功耿直之士也明而有膽剛而能斷處陵夷之運不偷媚以取容居版蕩之朝不遜辭以茍免來俊臣羅織者有功出之袁智𢎞鍛錬者有功寛之鳯跱梟鴟之内直以全身豹變豺狼之間忠以逺害若值清平之代則張釋之于定國豈同年而語哉峻名胄之遥遥南史何昌寓傳為吏部尚書有一客姓閔求官昌寓問君是誰後答曰子騫後昌寓團扇掩口而笑謂坐客曰遥遥華胄知餘風之挺挺魏謩傳贊挺挺有祖風烈詳見前君山出牧屹隆維屏之藩君山在岳州洞庭湖中方六十里狀如十二螺髻北夢𤨏言湘江北流至岳陽達蜀江夏潦後蜀江漲遏住湘波溢為洞庭湖凡數百里而君山宛在水中秋水歸此山復居于陸惟一條湘川而已劉夢得詩湖光秋色兩相和潭面無風鏡未磨遥望洞庭山水翠白銀盤裏一青螺山谷詩滿川風月獨凭欄綰結湘娥十二鬟可惜不當湖水滿銀山堆裏㸔青山汝水竊隣已沐餘波之潤汝水在撫州府其源上接旴江流經金谿縣南曲折行百餘里東流合豫章水其上流之分派自千金陂西流至郡城東抱城而北合宜黄崇仁二縣溪水流至南昌界合豫章水入鄱陽湖帝念西江之涸民多南畆之離肆咨六轡之良并任雙旌之重安其甲里而無恨有蔽芾之甘棠送以禮樂而有光寜逶迤於苞栩諒恥納溝之失所必已攬轡而慨然竝見前式遄其歸詩仲山甫徂齊式遄其歸注遄疾也周人望仲山甫欲其用是疾歸不諌亦入詩不聞亦式不諌亦入王肅云不聞道而自合于法無諌者而自入于道唯聖徳乃然此借用某淹囘蜀道企想滕仁畏此簡書乏流馬木牛之智詩豈不懐歸畏此簡書同惡相恤之謂也李商隐詩魚鳥猶知畏簡書風雲長自護儲胥薾然疲敝知奔蜂藿蠋之難莊子薾然疲役而不知所歸可不哀耶注薾音捻忘貌疲病困之狀凡物各以其所好役于形骸至于疲困薾然不知所以好此之歸於已云何也又奔蜂不能化藿蠋越鷄不能伏鵠卵注奔蜂小蜂蠋音蜀豆藿中大青虫也詩蜎蜎者蠋淮南子蠶與蠋相類而愛憎異也何由囘北斗之槎尚冀下南州之榻其為頌傒罔槩鋪棻竝見前代囘胡提舉楶詳啓意以下皆代月湖訢合守符禮記天地訢合傅爕傳初郡將范津名知人舉爕孝亷及津為漢陽與爕交代合符而去鄉邦榮之載馳使節田里之無愁歎已茂民庸原隰之有光華宜膺君選見前恭惟某官器資凝逺徳履端深迎寒露置玉壺撓而不濁杜詩烱如一段清冰出萬壑置在迎風寒露之玉壺黄憲傳澄之不清淆之不濁懐連城佩寳璐即之也温屈原九章被明月兮被寳璐山谷濓溪詩懐連城兮佩明月璐魯故切說文玉也有華左轓景帝紀令長吏二千石車朱兩轓注轓甫元反有障蔽之車也二千石雙朱其次乃偏其左詳試右翊右馮翊歛嚴瀨釣竿之于將賦歸來嚴光傳少有髙名與光武同遊學帝思其賢以物色訪之齊國上言有一男子披羊裘釣澤中遣使聘之三返而後至終不屈乃耕於富春山後人名其釣處為嚴陵瀨焉顧野王輿地志七里瀬在東陽江下與嚴陵瀨相接有嚴山桐廬縣南有嚴子陵漁釣處今山邉有石上平可坐十人臨水名為嚴陵釣臺也項安世詩君房足下竟成䛕只有韓歆已破除豈有江湖釣竿手與君臺閣奉文書適武夷粟粒之牙猶煩料理武夷山在崇安南三十里為第十六昇真元化洞天昔有神仙降此山曰予為武夷君總錄地仙受節於此由是得名武夷志云周迴百二十里凡峯巒巖石三十有六此外以名著者復不下十餘所東坡詩君不見武夷溪邉粟粒芽前丁後蔡相籠加注粟粒芽茶之極品北苑别録茶有小芽有中芽有紫芽有白合有烏蔕凡茶以水芽為上小芽次之中芽又次之餘皆在所不取料力弔切増韻計也理也王㣲之傳比當相料理南史梁末童謡黄塵汚人衣皁莢相料理山谷詩睡魔正仰茶料理宋福建提舉常平司治建寜龍光渥甚詩為龍為光又何天之龍鄭注讀作寵榮名之謂互見前牡轡如濡君乘使者車民知免矣岑參詩故人方乘使者車吾知郭丹却不如詳見前詔詣行在所予日望之方欲通咫尺之書乃先勤四六之恵竝見前某老未得謝禮記大夫七十而致事若不得謝則必賜之几杖命作納言不善斵而汗顔稍麾即去史記汲黯傳招之不來麾之不去餘見前望持斧之直指更勉其驅見前代囘淮東齊倉礪訢合守符肅將使指田里之無愁恨厥績茂焉宣帝詔㤙惠卓異厥功茂焉禮樂之有光華此行寵矣恭惟某官人門具羙陳書蔡凝傳髙宗嘗謂凝曰我欲用義興主壻錢肅為黄門郎卿意何如凝正色對曰帝鄉舊戚㤙由聖㫖則無所復問若格以僉議黄散之職固須人門兼美惟陛下裁之髙宗黙然而止東坡詩清朝固多士人門子皆冠風調不羣溫恭惟徳之基於文無害詩温温㳟人惟徳之基注寛柔之人温温然則能為徳之基止言内有其性乃可以有為徳也蕭何傳以文毋害為沛主吏椽服䖍曰為人觧通無嫉害也應劭曰雖為文吏而不刻害也蘇林曰無害若言無比也一曰害勝也無能勝害之者晉灼曰酷吏傳趙禹為丞相亞夫吏府中皆稱其亷然亞夫不任曰極知禹無害然文深不可以居大府蘇說是也師古曰害傷也無人能傷害之者蘇晉兩說皆得其意服應非也野客叢書云按後漢書百官表秋冬遣無害都吏案訊諸囚注按律有無害都吏如今言公平吏漢書音義曰文無所枉害蕭何傳所云正如此也乃知無害吏亦漢律中語齊永明間䇿文云賢牧分陜文而無害此意正與蕭何文無害同平易近民之政所去見思史記夫政不簡不易民不有近平易近民民必歸之眷是榆邉趙武靈王西略胡地至榆中戰國䇿王胡服率騎入胡至榆中辟地千里伍被傳廣長榆開朔方即衛青傳所云榆谿舊塞或謂之榆中始皇本紀西北斥逐匃奴自榆中竝河以東屬之隂山以為三十四縣城河上為塞正義曰榆中即今勝州榆林縣也廣記榆林縣南有榆溪塞即䝉恬侵胡植榆為塞是也東有榆林關隋開皇三年置宋南渡後以淮東為邉鬱然棠䕃兹自天而出綍不易地而褰帷淮水湯湯式展澄清之志湯尸羊切湯湯水流貌詩鐘鼓鏘鏘淮水湯湯又汶水湯湯毛傳大貌又水盛貌尚書湯湯洪水方割詩其流湯湯放縱無所入也周原膴膴行觀勞來之功膴美也厚也詩周原膴膴堇荼如飴勞郎到切慰也杜預云叙其勤以答也來落代切音與頼同通作徠答其勤曰勞撫其至曰來原渉傳勞來慰勉詩勞來還定安集之互見前某縻迹於朝莫面以賀五雉之為工正久已懐歸四牡之勞使臣别遲贊喜竝見前代回湖南楊倉九鼎鶴林玉露云楊九鼎在蜀以刻剝致諸軍之怨軍士莫簡倡亂殺九鼎剖其腹實以金銀曰使其貪腹飽飫宋史寜宗嘉定十一年四月張福入利州殺總領財賦楊九鼎顯升簿正改賁使華升賁卦名國方貪賢使服班行之上韓文論孔戣致仕狀優以禄秩不聽其去以明人君貪賢敬老之道又今戣據禮求退若不聽許亦無傷於義而有貪賢之羙王荆公詩從來貴勢公何慕自是賢名上所貪行寒剛切列也詩寘彼周行傳列也傳周之列位謂朝廷臣也韓詩班行再肅穆民尤望賜故資原隰之驅晝繡分光宵衣寛顧竝見前恭惟某官性資寛栗尚書寛而栗材具碩膚觀其不辭州縣之勞固知必為廊廟之器兩著扞城之績去則見思左傳百官承事朝而不夕此諸矦所以扞城其民也桓温傳賛受寄扞城用恢威畧東坡詩誰信儒冠也扞城一罹枕塊之悲毅然執禮禮記寢苫枕塊哀親之在土也枕之䕃反塊土也又父母之䘮居倚廬寢苫枕塊又寢苫枕塊所以為至痛飾也既畢祥琴之御東坡詩祥琴雖未調餘悲不敢留爰膺戎器之除易君子以除戎器戒不虞此除軍器監借用除字適是重湖年饑而用不足加之諸洞地大而蘖易牙蘖魚列切木餘也謂斬而復生魯語山不槎蘖注以株生曰蘖牙通作芽淮南子萌兆牙蘖未有形埒垠堮韓文平淮西碑物衆地大蘖牙其間東坡詩詰曲自牙蘖欲其澄清知所歛散周益公詩歛散新陳倚繡衣非輟寛閎通敏之士難課還定安集之功四牡載馳萬物吐氣突不黔席不煖了無媮安避事之情居有倉行有糧㑹見節用愛人之學竝見前某賀我選厥晉語趙宣子言韓獻子於靈公以為司馬河曲之役趙孟使人以其乘車干行獻子執而戮之衆咸曰韓厥必不没矣其主朝升之而莫戮其車其誰安之宣子召而禮之皆告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免於罪矣注宣子趙盾獻子韓厥司馬軍吏也干犯也行音杭軍列也没終也車車僕也朝莫喻速也逄人説斯見前暮見吳山有老大徒傷悲之感古樂府長歌行百川東到海何時復西歸少壯不努力老大徒傷悲曉行湘水願功名留久逺之㸔見前代回浙東孟提舉植肅將星駕分察日畿見前逺而光華况去天之尺五杜詩爾家最近魁三象時論同歸尺五天公自注俚語曰城南韋杜去天尺五近在旦夕佇擊水之三千莊子鵬之徙于南㝠也水擊三千里曾旅進之未由何謙撝之先辱恭惟某官器資凝重徳宇浚明陸玩傳搢紳之徒莫不廕其徳宇柳詩宏䂓髙徳宇麗藻競詞林方公少年嘗棲棘於獨秀之下獨秀峰在南安府南康縣東舊名鷄籠東坡南遷更名獨秀維時老子偶泛蓮於鬱孤之傍馬援傳頗哀老子陶侃傳老子婆娑鬱孤臺在贛州麗譙坤維隆阜鬱然孤起平地數丈冠冕一郡之形勢而襟帶千里之江山唐李勉為䖍州刺史登臨北望慨然曰余雖不及子牟而心在魏闕一也鬱孤豈令名乎改為望闕郡守曾慥増創二臺南為鬱孤北為望闕東坡詩煙雲縹緲鬱孤臺積翠浮空雨半開想見之罘觀海市絳宫明滅是蓬萊程師孟詩昔人善名名鬰孤下視百里如平鋪千巖迤邐何獨秀白雲蔽虧青骨瘦屢獲過從劉禹錫詩官班髙後少過從山谷詩稍喜過從近又巷僻過從少不勝傾倒杜詩蘇侯得數過懽喜每傾倒山谷詩推轂天下士誠心要傾倒凄其三紀詩凄其以風存者幾人細思一夢之囘東坡詩夢回聞剥啄李後主詞細雨夢回鷄塞逺何啻千帆之過劉禹錫詩沉舟側畔千帆過枯木前頭萬樹春天子有詔選公卿於西漢之循韓文毋疾其驅天子有詔循吏傳公卿缺則選諸所表以次用之太守謂誰疑姓名必東家之故歐文醉翁亭記太守謂誰廬陵歐陽脩也顧取斜飛之勢又為直指之行見前登蓬萊宫問百萬蒼生之辛苦唐髙宗紀龍朔二年四月作蓬萊宫禮樂志唐初鐘磬凡三十六簴蓬萊宫成増用七十二簴杜甫三獻賦蓬萊宫探㑹稽穴添一部史記之雄深司馬遷傳上會稽探禹穴又遷為太史令紬史記石室金鐀之書馬子才贈盖邦式序司馬子長之文章不在書學者每以書求之則終身不知其竒予有一部史記在天下名山大川壯麗可恠之處將與子周㳺而歴覽之庶幾可以知此文矣舉頭即在於長安濯足㑹登於雲漢見前某鷄豚共社韓詩願為同社人鷄豚燕春秋詳見前虎䑕同宫國史補陸長源以舊徳為宣武行軍司馬韓愈為廵官同在使幕或譏年軰相懸周愿曰大蟲老䑕俱為十二屬何恠之有旬日此語布之長安方欲冩贊喜之忱乃先沐過情之謝厭承明之廬勞侍從之事無以公歸竝見前為邦家之光非閭里之榮豈惟我賀左傳叔弓如晉賀虒祈也㳺吉相鄭伯以如晉亦賀史趙見子大叔曰甚哉其相䝉也可弔也而又賀之子大叔曰若何弔也其非唯我賀將天下實賀餘見前代囘江西王提舉顧問簮筆何功蒙誤㤙之起廢蔡謨傳昔階謬㤙䝉忝非據東坡集計此誤㤙必難安處陳後山詩將老蒙誤㤙太史公自敘春秋補敝起廢東坡詩今年聞起廢函牋為恵感妙語之噓枯鄭太𫝊清談髙論嘘枯吹生東坡集固無心於集苑而有力于嘘枯有味其言見前不知所賀左傳國老皆賀子文蒍賈尚㓜後至不賀子文問之對曰不知所賀恭惟某官王之膚使古之謀人慷慨登車覺范滂之不逺竝見前勤渠下榻正徐穉以前來詩夏屋渠渠注夏屋大具也渠渠勤勤也言於我設禮食大具以食我其意勤勤然餘見前故當駕彼四牡之勞不廢遺我雙魚之寵見前某老將及耄左傳老將知而耄及之生也有涯莊子吾生也有涯而知也無涯注所禀之分各有極也夫舉重攜輕而神氣自若此力之所限也而尚名好勝者雖復絶膂猶未足以慊其願此知之無涯也故知之為名生於失當而滅於㝠極㝠極者任其至分而無豪銖之加是故雖負萬鈞茍當其所能則忽然不知重之在身雖應萬機冺然不覺事之在已此飬生之主也雖則荷囊還本來之靣目法寳壇經不思善不思惡正與麽時那箇是明上座本來面目東坡詩一任秋霜換鬢毛本來面目還如故其如蓬髩當自揣於頭顱見前曷月還歸定相從於杖履還音旋詩懐哉懐哉曷月予還歸哉注懐安也思鄉里處者故曰今亦安否哉安否哉何月我得還歸見之哉思之之甚韓文古之老於鄉者閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨徃來也因風占謝愧莫報於瓊琚李陵答蘇武書時因北風復恵徳音晉書何劭傳諸方貢獻帝輙賜之而觀其占謝焉南史謝顥傳詣齊髙帝自占謝言辭清麗容儀端雅左右為之傾目代回湖南葉提舉宗魯起自家林肅將庾節民以財為本當加培植之功食貨志洪範八政一曰食二曰貨所以分財布利通有無者也二者生民之本君乘使者車必有阜通之政得人如此通國驩然恭惟某官風調不群天材甚茂郎潜既久忽為襆被之謀邉隙方開亟進徙薪之計身謀雖左物望益髙兹膺禮樂之光華復任貨財之平, SBCK: ''}
