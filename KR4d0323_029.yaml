body:
  text: 四六標準卷二十九宋李劉撰倅倅音翠説文副也副車曰倅周禮戎僕掌王倅車之政宋懲五季蕃鎮之弊乾德初下湖南始置諸州通判命刑部郎中賈玭等充建隆四年詔知府公事並須長史通判簽議連書方許行下時大郡置兩員餘置一員州不及萬戶不置廣南小州有試秩充通判兼知州者正刺史以上及諸司使副知州者雖小郡亦特置掌倅二郡政與長吏均禮凡兵民錢榖户口賦役獄訟聽斷之事可否裁決與守通簽所部官有善否及職事修廢得舉刺以聞至景德宋興三十四年户口寢息解州以滿萬户置通判自是諸郡多滿萬户矣宣和二年詔諸州茶鹽香礬並委通判建炎初諸州通判二員減一員通潭州馬通判赴寧鄉簿潭州即今長沙府為楚黔中地秦置長沙郡漢為長沙國晉永嘉初置湘州隋置潭州以昭潭得名寧鄉縣屬潭州在州西一百二十六里本漢長沙益陽縣地吳析置新陽縣改曰新康屬衡陽郡隋省入益陽宋析長沙縣地置寧鄉縣治故新康縣之玉潭鎮榮膺宸綍顯二價藩詩價人維藩箋價甲也被甲之人謂卿士掌軍事者千里展長沙之平古稱清絶韓詩長沙千里平杜詩湖南清絶地詳見前別駕居刺史之半今得仁賢晉書庾亮答郭豫書曰別駕舊與刺史別乘同宣王化於萬里之外其任居刺史之半安可用非其人續通典唐以堂吏朱儉廉為華州別駕給事中蕭倣駁曰別駕古為治中從事與刺史同宣教化任居刺史之半豈宜以人吏兼副政之名杜詩半刺已翺翔東坡詩賴有風流半刺史先驅有嚴司馬相如傳縣令負弩矢先驅和氣已溢恭惟某官材猷凝逺識度閎夷勳業終歸於伏波雲仍固在杜詩勳業終歸馬伏波功曹非復漢蕭何方略何如於討虜風烈隱然討當作捕馬武傳武字子張世祖從容謂武曰吾得漁陽上谷突騎欲令將軍將之何如武曰駑怯無方略世祖曰將軍久將習兵豈與我掾吏同哉永平中圖畫南宫雲臺署曰捕虜將軍楊虛侯馬武久載休聲宜躋華貫尚屏星之借重説文車當謂之屏星韻會箳篂車蔽當也詳別見使湘水之安流湘水亦曰湘灕一水而背流湘猶相也灕猶離也以言湘水有所合而離則違湘而南也互見前屈原九歌令沅湘兮無波使江水兮安流沅湘即湘水以與沅水合故曰沅湘清風明月之平分折瓊枝而繼佩清風峽在潭州嶽麓寺下明月山在潭州攸縣北九十里峰巒高聳月出即見上有衫仙廟靈谷巖龍鬚灘巖前有井明月池在州城內世傳池在長沙星下故未嘗涸宋政和中嘗命取醴陵明月石置池上因名人但知風月平分為別駕事而不知清風明月為長沙山水其工如此離騷經折瓊枝以為羞兮又紉秋蘭以為佩高蓋華軒之一丈齊玉軑而並馳黃霸傳賜車蓋特高一丈別駕主簿車緹油屏泥于軾前以章有德軑音第大計切説文車輨也又音大度奈切博雅車輪也韓魏謂車輪曰軑離騷經屯余車其千乘兮齊玉軑而並馳邦國不空王祥傳邦國不空別駕之功公侯必復左傳公侯子孫必復其始某失身副墨易臣不密則失身司馬相如傳文君既失身於司馬趙廣漢傳贊失身墮功山谷詩失身來作管城公莊子聞諸副墨之子注可副二玄墨也食志勾朱羅隱詩金庭養真地朱篆勾稽官綴簿上而趨閣前繞枝已久韓詩點綴簿上字趨蹌閣前鈴魏武帝短歌行月明星稀烏鵲南飛繞枝三匝何枝可依采水中而搴木末托蔭方新屈原九歌采薜荔兮水中搴芙蓉兮木末尚徼風雨之帡幪法言震風凌雨然後知夏屋之為帡幪也雷政虐世然後知聖人之為郛郭也庶免塵埃之箠楚韓詩判司卑官不可説未免箠楚塵埃中通潭州張通判履信潭州已見書生漫仕抗塵祭竈之卑元結傳浪者亦漫為官乎呼為漫郎北山移文抗塵容而走俗狀孫寶傳署寶主簿寶徙入舍祭竈請比鄰詳見前卜史涓期𨽻役題輿之下説文卜均剝龜也周禮府史注掌書者宰夫之職龜人史二人所謂卜史也漢禮樂志涓選休成注涓除也除惡選取美成者也謝承後漢書周景為豫州刺史辟陳蕃為別駕不就景題別駕輿曰陳仲舉坐不復更辟蕃惶懼視職昉去民而就吏公羊傳昉于此乎注昉適也齊人語昉甫兩切始也韓文登第于有司者去民畝而就吏祿持不肖以事賢恭承攝龜衛宏漢舊儀二千石銀印龜紐攝龜言權知軍尤願前馬越語其身親為夫差前馬注驅在馬前也恭惟某官器資凝逺德宇𢎞深陸玩傳搢紳之徒莫不蔭其德宇法言其為中也𢎞深紅蓮幕下之婉謀楊誠齋詩合於玉筍班中立却向紅蓮幕裏行選詩婉婉幕中畫青草湖邊之美製長沙志南曰青草北曰洞庭所謂重湖山谷詩乙丑越洞庭丙寅渡青草左傳子有美錦不使人學製焉所立皆偉其他可知天道好還共擬公侯之必復老子其事好還好去聲還音旋餘見前王事靡盬肯辭州縣之徒勞見前駕言屏星詩駕言出遊以寫我憂戾止湘水詩魯侯戾止亦是戾矣傳至也箋止也平分風月已歌邦國之不空見前暫建鼓旗更覺湖山之自得韓詩傳建大將旗鼓會趣長沙之召賈誼傳以誼為長沙王太傅後歲餘文帝思誼徵之徑登文石之班見前某副墨陋儒荀子末世窮年不免為陋儒而已注陋儒言不知通變也餘見上條勾朱冗職見上條無蚍蜉之援奈何與上大夫而言韓文外無蚍蜉蟻子之援説文蚍蜉大蟻也蟻或作蟻説文蟻蚍蜉也非鸞鳳所棲此豈為我等輩設阮籍傳籍嫂嘗歸寧籍相見與別或譏之籍曰禮豈為我設耶惟倚帡幪於厦屋庶寬箠楚於塵埃並見前通潭州吳通判鏜潭州已見歌海沂之別駕無路事賢見前詠臨邑之卑棲涓辰效役杜工部集臨邑舍弟書至苦雨黃河泛濫隄防之患簿領所憂因寄此詩詩云舍弟卑棲邑防川領簿曹尺書前日至版築不時操敢以尺書之敬徹於再拜之先韓文再拜獻書相公閣下恭惟某官地望穹華北史公孫表傳鴈門李氏地望懸隔人門峻特見前冠切雲帶長鋏夙超四姓之侯屈原九章帶長鋏之陸離兮冠切雲之崔巍漢明帝永平中為外戚樊氏郭氏隂氏吳氏諸子弟立學以非列侯故曰四姓小侯佩明月懷連城要是萬人之敵屈原九章被明月兮佩寶璐山谷濂溪詩懷連城兮佩明月項籍傳學萬人敵耳舒翹緑水栁文今之聖智莫不舒翹揚英推類援朋南史庾杲之傳泛緑水依芙蓉何其麗也展足赤城赤城山在天台縣北六里孫綽遊天台山賦赤城霞起以建標詳見前盍歸乎來何去之速峻溫洛榮河之直述征記洛水底有礬石故水上無冰易乾鑿度帝盛德之應洛水先溫七日乃寒五日變為五色玄黃尚書中候帝堯即位榮光出河文選青雲浮洛榮光塞河易河出圗洛出書分清風明月之平邦國不空足表監州之績東坡詩欲問君王乞符竹但憂無蟹有監州公侯必復益光著令之忠吳芮傳贊吳芮之起不失正道故能傳號五世慶流支庶有以矣夫著於令甲而稱忠也卧而治之行且召矣見前某﨑嶇白戰東坡詩當時號令君聽取白戰不許持寸鐵詳見前漫浪朱勾見上條不卑小官寧免塵埃之箠楚見前當詣大府尚希風雨之帡幪韓文以為當得躬詣大府受約束於下執事代回衡州謝通判衡州已見詳啓意蓋代月湖曳革履之聲足容縮縮鄭崇傳每見曳革履上笑曰我識鄭尚書履聲禮記足容重手容恭擁緹屏之駕手畢渠渠黃霸傳別駕主簿車緹油屏泥於軾前爾雅簡謂之畢注簡竹簡也古未有紙載文於簡謂之簡札一名畢禮記呻其占畢癸辛雜志云宋子京用伏奉手畢南人謂筆為畢謂但吟誦所視簡之文是謂簡為畢也詩於我乎夏屋渠渠注渠渠猶勤勤也敢因謝緘并致賀臆臆乙力切説文胸骨也通作意賈誼傳請對以意恭惟某官人今而學古齒宿而意新新唐書李百藥傳百藥字重規七歲能屬文太宗朝為宗正卿久之乞致仕帝嘗與偕賦帝京篇歎其工手詔曰卿何身老而才之壯齒宿而意之新乎徘徊金馬之門何相見晚東方朔傳待詔金馬門詳見前璀粲銀魚之佩曾不逾時會要唐永徽二年開府儀同三司及京官文武職事四品五品並給隨身魚袋咸亨三年始令京官四品職事五品佩銀魚杜詩碧山學士焚銀魚白馬却走身岩居白樂天詩魚佩葺鱗光照地鶻銜瑞帶勢沖天又魚綴白金隨步躍鶻銜紅綬繞身飛泛緑水之芙蓉見前栽赤縣之桃李韓詩嗟我身為赤縣令兹展驥足乃在熊湘見前王祥垂年別駕之功始立王祥傳刺史吕虔檄為別駕祥年垂耳順虔委以州事時寇盜充斥祥討破之政化大行時人歌之曰邦國不空別駕之功互見前柬之雖老宰相之器固存張柬之傳武后謂狄仁傑曰安得一竒士用之仁傑曰荆州刺史張柬之雖老宰相材也詳見前某見謂龍鍾趙充國傳見謂忠謹猶共鳩僝見前迫壬戌赤壁之夢恍已九齡東坡赤壁賦壬戌之秋七月既望蘇子與客泛舟遊於赤壁之下禮記夢帝與我九齡同甲子絳縣之人幸成二老杜少陵與贊上人詩與子成二老來往亦風流東坡詩解組歸來成二老風流他日與君同代回婺州高倅禾婺州已見鳳凰下千仞頗疑遙增擊而去之賈誼傳鳳凰翔於千仞兮覽德輝而下之見細德之險微兮遙增擊而去之師古曰增重也言見苛細之人厄隘之證故重擊其羽而高去鯉魚中尺書乃有長相憶而遺我古辭飲馬長城窟行呼兒烹鯉魚中有尺素書上言加餐飯下言長相憶形骸更逺説文骸脛骨也莊子今子與我遊于形骸之內而子索我于形骸之外不亦過乎臭味已同見前恭惟某官賦料凌雲杜詩賦料揚雄敵司馬相如傳相如既奏大人賦天子大説飄飄有凌雲氣遊天地之間意文成翻水韓詩文如翻水成排空直上合盛之白玉之堂何遜詩何因生羽翰千里暫排空北文移文干青雲而直上南史王惠傳靈運固自蕭散直上陳後山詩小却盛之白玉堂取勢斜飛亦宜在青藜之館劉禹錫詩青雲直上無多路却作斜飛取勢回王子年拾遺記劉向校書天祿閣有老人黃衣植青藜詳別見居然雞肋後漢書楊修傳雞肋食之則無所得棄之則如可惜詳見前屈此牛刀宜未折彭澤之腰已先盡剡川之興王徽之傳嘗居山隂忽憶戴逵逵時在剡便乘船詣之造門不前而反人問其故曰本乘興而來興盡而反何必見安道耶空願一廛於仁政竟違十乘於他邦何許飛鳧乃今展驥聞及瓜之不逺知行李之鼎來並見前某已薄暮齡宜收朝迹韓詩足弱不能步自宜收朝迹聞有長塵尾固願再欵於名談王導傳導妻曹氏性妬導甚憚之乃密營別館以處衆妾曹氏知將往焉導恐妾被辱遽令命駕猶恐遲之以所執塵尾柄驅牛而進司徒蔡謨戲導曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物惟有短轅犢車長柄麈尾王衍傳衍妙善玄言惟談老莊為事每捉玉柄麈尾與手同色何當大刀頭却恐寖疏於良覿古詩藁砧今何在山上復有山何當大刀頭破鏡飛上天代回肇慶方倅信孺見第二十五卷方提刑條肇慶已見託先世之遊從凄其一夢詩凄其以風注凄寒風也杜詩白首颯凄其東坡詩三十三年真一夢見通家之姓字粲若尺書孔融傳融答李膺曰先君孔子與君先君李老君同德比義而相師友則融與君纍世通家似聞逸氣之無前尤喜故人之有後恭惟某官褆身膚敏褆音提説文衣厚法言其為中也𢎞深其為外也肅括則可以褆身矣發聞芳馨頃冒甚危之機肯使不測之險蓋寬饒傳用不訾之身臨不測之險注不測謂深也宋史方信孺傳自春至秋使金三往返以口舌折強敵金人計屈情見迄從權變復合和親婁敬傳使敬往結和親約奈何衆口之難調東坡詩酸釅不堪調衆口責以一言之相應馮唐傳終日力戰斬首捕虜上功幕府一言不相應文吏以法繩之其賞不行方信孺傳信孺還言敵所欲五事舉其四其一不言韓托胄厲聲詰之信孺徐曰欲得太師頭耳托胄大怒奪三秩臨江軍居住忠無不報鄒陽傳忠無不報信不見疑事久益明果復舊氊遄紆新組治中展驥足才即應於時須杜詩管葛亦時須池上有鳳毛美更觀於世濟杜詩欲知世掌絲綸美池上于今有鳳毛信孺從祖廷實政和間進士父嵩卿隆興間進士某偶然浪出杜詩龎公然浪出蘇氏今有之頗似倒行史記伍子胥傳吾日暮途逺吾故倒行而逆施之主父偃傳吾日暮故倒行逆施之緑槐十二街此非佚我老之計中朝事迹云天街兩畔槐樹俗號為槐街白樂天詩下視十二街録槐間紅塵韓詩緑槐十二街渙散馳輪蹄愚惟戅書生孤身無所齎莊子大塊載我以形勞我以生佚我以老息我以死白髮三千丈行當致為臣而歸李詩白髮三千丈緣愁似箇長代回撫州魏倅峴撫州已見此啓蓋代月湖魏倅求援而月湖答以此啓伏勤專價價通作介一夫曰介左傳一介之使見畀屬辭禮記屬辭比事春秋教也試乞巧於天女孫則為宜耳乞巧文栁子夜歸有設祠者且拜且祈怪而問焉女𨽻進曰今兹秋孟七夕天女之孫將嬪於河鼓邀而祠者幸而與之巧為是禱也栁子曰茍然歟吾亦有所大拙倘可因是以求去之顧求福於木居士不亦左乎木居士廟在衡州來陽縣鼇口寺韓文公題詩云火透波穿不計春根如頭面幹如身偶然題作木居士便有無窮求福人羅隱詩云鳥噪殘陽草滿庭此中枯木似人形只應水物長為主未必浮槎即有靈八月風波飄不去四時黍稷薦惟馨南朝庾信無因賦牢落祠前水氣腥宋元豐初來陽令禱雨無應析而薪之今所祀者乃寺僧再刻也宋鄭景望蒙齋筆談云昌黎木居士詩蓋有所為來陽令伐而焚之東坡在黃州聞而喜曰木居士之誅固已晚矣世間乃有此明眼人乎過丹霞逺矣後主寺者利其祭餘復倣其像刻之張藝叟謫郴州過而見之題詩云波穿水透本無竒初見潮州刺史詩當日老翁終不免後來居士欲奚為山中雷雨誰宜主水底蛟龍自不知若使天年俱自遂如今已復有孫枝得非所蒙陳後山詩呼我過其廬所得非所蒙願竊有復禮記若有告者曰少間願有復也恭惟某官世濟其美材稱乎官一同甚敏於割雞淮南子古者天子一畿諸侯一同司馬法曰十成為終終千井十終為同同方百里萬井半刺即觀於展驥有渥題輿之寵何待推轂之功見前不即人而人即之行且召矣即就也野王二老傳即人者人亦即之東坡答山谷書此人如精金美玉不即人而人即之其求士甚士求我蓋亦有焉東坡錢塘勤上人詩集序太子少師歐陽公好士為天下第一士有一言中於道不逺千里而求之甚於士之求公某既受一廛當迎別駕比何武之薦龔舍則恐過情何武傳武為人仁厚好進士奬稱人之善為楚內史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此人顯於世者何侯力也注兩龔龔勝龔舍也兩龔傳大司空何武薦勝勝薦舍有詔皆徴期魏謨之繼鄭公所當拭目新唐書魏謨傳贊謨之論議挺挺有祖風烈詩所謂是以似之者與代回處州董通判居誼處州已見一官藏拙焉知賢才而舉之國史典纂梁常侍徐陵聘齊時魏收有文學北朝之秀收録其文集以遺陵令傳之江左徐還濟江而沈之從者問之曰吾為魏公藏拙韓詩倚玉難藏拙吹竽久混真三載陟明不如鄉人之善者尚書三載黜陟幽明冒焉剡去何以謝為恭惟某官敏手決科山谷詩敏手擘泰華法言須以發䇿決科潔身從政君門不可以徑寧緩其驅韓文君之門不可徑而入兮又無疾其驅公事之了雖癡姑行所學傅咸傳楊濟與咸書曰天下大器非可稍了而相觀每事欲了生子癡了官事官事未易了也了事正作癡復為怪耳事常出乎名上材益展於治中足應時須敢孤歲舉需章比入蔡雍獨斷凡羣臣上書於天子者有四名一曰章二曰奏三曰表四曰駁議章者需頭奏者亦需頭表者不需頭詳見前巽牘鼎來需比巽鼎四卦名顧恐將去齊之情莫酬復望蜀之意光武賜岑彭書人苦不知足既得隴復望蜀蓋來啓別有所求某余髮如此左傳余髮如此種種余奚能為歸志浩然儀圖之莫助之漫將短綆綆索也荀子短綆不可以汲深井之泉韓詩汲古得修綆匪報也為好也聊實空函見前代回單通判端已詳啓意單乃故人之子謝其相訪故有此答識中散於未仙知音者寡嵇康傳康有竒材逺邁不羣拜中散大夫常修養性服食之事以為神仙稟之自然非積學所得至於導養得理則安期彭祖之倫可及東坡詩何人更識嵇中散野鶴昻藏未是仙詳別見思元賔而不見訪別其孤韓文思元賔而不見見元賔之所與者則如元賔焉報謁良勞贈言尤寵恭惟某官槐根之芷蘭茁其芽俱見前題別駕之輿少紆轍迹老子善行無轍迹聽文昌之履會振家聲見前疑只在於山中賈島詩松下問童子言師採藥去只在此山中雲深不知處遂徑造其竹下王徽之傳時吳中一士大夫家有好竹欲觀之便出坐輿造竹下諷誦良久主人灑掃請坐徽之不顧將出主人乃閉門徽之便以此賞之盡歡而去南史袁粲傳郡南一家頗有竹石粲率爾步往亦不通主人直造竹所嘯咏自得主人出語笑欵然俄而車騎翼儀併至門方知是袁尹亦既見止萬金之産不虛詩未見君子憂心忡忡亦既見止亦既覯止我心則降韓詩吾老著讀書餘事不挂眼有兒雖甚憐教示不免簡君來好呼出踉蹡越門限留君住廳食使立侍盤􅊦薄暮歸見君迎我笑而莞指渠相賀言此是萬金産吾愛其風骨粹美無可揀何以贈之兼乘之珠相比詩我送舅氏曰至渭陽何以贈之路車乘黃史記魏王謂齊威王曰若寡人國小尚有徑寸之珠照車前後十二乘宋書劉孺七歲能屬文父嘗謂賔客曰此吾家明珠也某愧無瓊報徒辱珍投書門前之一死一生客則陋矣史記汲鄭傳贊始翟公為廷尉賔客闐門及廢門外可設雀羅翟公復為廷尉賔客欲往翟公乃大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見汲鄭亦云悲夫東坡錢塘勤上人詩集序昔翟公罷廷尉賔客云云余嘗薄其為人以為客則陋矣而公之所以待客者獨不為小哉坐足下而三熏三沐愛莫助之齊語三釁三浴之注以香塗身曰釁釁或作熏韓文方將坐足下三浴而三熏之聽僕之所為少安無躁代回臨江鄭通判元鼎臨江已見奉詔舉賢幸不負公車之櫝史記東方朔初入長安至公車上書凡用三千奏牘公車令兩人共持舉其書僅然能勝之師古曰公車令屬衛尉上書者所詣也開緘見面真乃題別駕之輿盧同詩開緘宛見諫議面揣力則綿嚴助傳綿力薄材摛文何綺文選高談一何綺恭惟某官材猷膚敏器度浚明君子學道愛人已之無慍亷吏謹身率下去則見思循吏傳皆謹身帥先居以亷平所居民富所去見思意一鶚之可言忘匹雛之無力此亦公舉殆非私謝之求談賔録唐證聖中劉竒為侍郎注張文成司馬鍠為御史二人因申屠錫以謝竒正色曰舉賢無私何見謝所愧外除無復裏言之助猥勤泥軾更枉緹函並見前某歸老杜門味言推轂鄭當時傳其推轂士及官屬丞史誠有味其言也治中展驥足豈徒風月之平分見前池上有鳳毛即看雲霄之獨步杜詩池上于今有鳳毛代施倅楄回邵州王倅祖壵邵州即寶慶府漢為長沙國昭陵縣東漢屬零陵郡吳置邵陵郡屬荆州即今郡是也晉武改昭陽曰邵陽縣隋廢郡地屬潭州唐置南梁州改為邵州宋乾德間升為中府以理宗潛藩升寶慶府以邵水得名裹緹命駕黃霸傳別駕主簿車緹油屏泥於軾前引綬露章朱買臣傳引其綬視其印會稽太守章也湖南二邵之豪雄今稱第一二邵謂邵陵邵陽詳見前江左諸王之竒俊顧屈平分東坡詩江左風流王謝家下車之初載路相慶詩厥聲載路沈休文碑威令首塗仁風載路恭惟某官典刑炳蔚才諝浚明楩柟大厦之材久於聳壑司馬相如傳楩柟豫章師古曰楩音便又涉田反即今黃楩木也柟音楠即交讓木其木直上柯葉不相妨南史陸慧曉傳此木便是交讓俗作楠新唐書房玄齡傳高孝基名知人謂裴矩曰僕觀人多矣未有如此郎者當為國器恨不見其聳壑昻霄云瑚璉清廟之器何乃潤山荀子玉在山而草木潤淵生珠而崖不枯滿期留中還又補外安帝紀永初二年詔上尚書公府通調令得外補厥為澬水尚存漁父之滄浪澬水在州北源出靖州綏寧縣至此合邵水禹貢九江孔殷澬其一也匪直海沂可養公台之度量王祥傳徐州刺史吕虔檄為別駕時人歌之曰海沂之康實賴王祥虔以佩刀贈祥曰茍非其人刀或為害卿有公輔之量故以相與飛騰由此翹企俟之溫嶠傳州之文武莫不翹企涼武昭王傳延首雲極翹企遐方某再轉無庸同寅有幸託交承於前政不但為瀟湘之故人許渾詩瀟湘逢故人詳見前話契闊於期年渾未隔京華之舊夢詩死生契闊傳契闊勤苦也從生至死契闊勤苦而不相離後漢書范丹傳行路倉卒非陳契闊之所王隆傳契闊夙夜庶不懈怠注契闊謂辛苦也沈約傳契闊屯邅困於朝夕南史謝朓傳契闊戎旃從容宴語晉書會稽王道子傳阿衡二世契闊王家劉照傳贊﨑嶇寇難契闊艱虞梁書王茂傳綢繆休戚契闊屯夷栁慶逺傳契闊禁旅重牧西藩蕭穎達傳契闊屯夷載形心事張𢎞䇿傳自藩升朝契闊險阻鄭紹叔傳契闊藩朝情績顯著吕珍傳與朕契闊情兼屯泰侯景傳契闊夷險魏武短歌行契闊談宴心念舊恩陸機詩安得擕手俱契闊成騑服盧諶詩契闊百罹杜詩青雲猶契闊又白首甘契闊問兩鴻鵠諒歸詔之鼎來翟方進傳童謡曰反乎覆陂當復誰云者兩黃鵠注此言有神來告之遺雙鯉魚覺報章之不腆見前代回紹興史倅紹興秦為會稽郡漢屬江都國東漢以浙西為吳郡浙東為會稽郡晉因之隋改為越州唐改會稽郡又為越州宋南渡後升紹興府今因之詳啓意史倅蓋彌逺從子䇿驥足於治中方開軌轍文選古詩何不策高足棲燕巢於幕下正託帡幪左傳季札謂孫林父曰夫子在此猶燕之巢於幕上曾望履之未遑乃鳴謙之先辱見前藏固深於十襲闞子宋之愚人得燕石於梧臺之東歸而藏之以為寶革匱十重緹巾十襲客見之掩口而笑報敢廢於七襄詩跂彼織女終日七襄恭惟某官天分素高人門具美並見前焜煌相業接王家三樹之槐焜户衮切説文煌也增韻焜煌光也或作輝司馬相如傳燠炳輝煌又公渾切服虔曰明也煌胡光切説文輝也新唐書王勃傳勔勮勃皆著才名故杜易簡稱三珠樹東坡三槐堂銘序故兵部侍郎晉國王公嘗手植三槐於庭曰吾子孫必有為三公者已而其子魏國文正公相真宗皇帝魏公之子懿敏公以直諫事仁宗皇帝銘曰魏公之業與槐俱萌封殖之勤必世乃成爛漫世科掩竇氏五枝之桂爛郎旰切詩爛其盈門箋爛爛粲然鮮明且衆多之貌范文正公竇諫議隂德記竇禹鈞范陽人生五子儀儼侃稱僖儀禮部尚書儼禮部侍郎皆為翰林學士侃左補闕稱左諌議大夫參知政事僖起居即世稱教子者必曰燕山竇十郎云馮瀛王道贈公詩云燕山竇十郎教子有義方靈椿一株老丹桂五枝芳宜自庭階之秀謝玄傳譬如芝蘭玉樹欲使其生於庭階耳徑躋臺閣之崇後漢黃瓊傳初瓊隨父在臺閣習見故事及後居職練達官曹爭議朝堂莫能抗奪要津顧厭於立登杜詩自謂頗挺出立登要路津佳境不辭於漸入世説顧凱之為虎頭將軍每食蔗自尾至本人或問之曰漸入佳境鳴琴單父已昭利器之功別駕海沂更養佩刀之望有來易地益近去天並見前萬壑千巖暫煩接應顧凱之傳荆州人問會稽山川之狀凱之云千巖競秀萬壑爭流草木蒙籠若雲興霞蔚世説王子敬云從山隂道上行山川自相映發使人應接不暇若秋冬之際尤難為懷清風明月真足平分長史有宰相之材寧無識者張柬之傳武后謂狄仁傑曰安得一竒士用之仁傑曰荆州長史張柬之雖老宰相材也詳別見羣從繼叔父之烈行即見之世説一門叔父則有阿大中郎羣從兄弟則有封胡羯末詳見前某一拙百罹十趨九蹶未了癡兒之事復蒙華使之咨見前一水相望悵有同於蓬弱望平聲東城詩蓬萊在何許弱水空相望五雲借潤幸不棄於菅茅菅音姦詩英英白雲露彼菅茅代回道州宋倅蒙道州已見詳啓意蓋代月湖月湖除工書而來啓誤為兵書故有馬曹之答司臬罔功躐升雉正臬法也尚書汝陳時臬事發函得教似是馬曹吳質書發函伸紙教猶令也張敞傳使主簿持教又并編敞教王徽之傳為車騎桓沖騎兵參軍沖問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何由知數又問馬比死多少曰未知生焉知死東坡詩微官似馬曹歸斯受之告者過也恭惟某官抱負甚偉揚厯益深酌別駕一杯之清隋書循吏傳趙軌河南洛陽人也少有行檢為齊州別駕有能名在州四年考績連最持節使者郃陽公梁子恭狀上高祖嘉之徵軌入朝父老相送者各揮涕曰別駕在官水火不與百姓交是以不敢以壺酒相送公清如水請酌一杯水奉餞軌受而飲之試舂陵二三之䇿山谷磨崖碑詩臣結舂陵二三䇿臣甫杜觴再拜詩安知忠臣痛至骨世上但賞瓊琚詞佇觀驥展會即雄飛後漢書趙溫字子柔為京兆郡丞歎曰丈夫當雄飛安能雌伏遂棄官去某久覺龍鍾又共鳩僝並見前甲兵之問不至乃所願聞韓文錢榖甲兵之問不至於廟堂山林之味更長奚其不去代回黃通判犖亦代月湖題別駕之坐君子宜之詩左之左之君子宜之右之右之君子有之戀屬車之塵老夫髦矣司馬相如傳犯屬車之清塵注塵謂行而起塵也左傳老夫髦矣無能為也鼎來郵問益仞鄰光鼎益卦名恭惟某官早䇿名躔寖儀華路文章爾雅猶存元祐之故家儒林傳文章爾雅訓辭深厚師古曰言詔辭雅正而深厚也風采老成不減貞元之朝士黃霸傳風采不及丙魏于定國元稹詩屈指貞元舊朝士幾人同見太和春小淹驥展佇即雄飛某密託枌榆既凋蒲栁並見前榮鈞天之一餉續夢無多史記扁鵲傳我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂餉式諒切説文餉也一餉言不久韓詩雖得一餉樂李後主詞夢裡不知身是客一餉貪歡東坡詩鈞天一餉夢中榮唐詩馬上續殘夢及崦日之半規告歸已決釋名晷規也如規畫也謝靈運詩密林含餘清延峰隱半規隋孟康詠日詩洛浦全開鏡衡山半隱規山谷詩新月吐半規小須驛召猶或郊迎回李通判銓歎峨峰之客子舊嘗綴於金臺史記范睢傳謁君得無與諸侯客子俱來乎曹丕詩棄置勿復陳客子常畏人徐陵詩關山三五月客子憶秦川杜詩客子入門日杲杲上谷郡圖經金臺在易水東南十八里傅毅述遊賦出北薊厯良鄉登金臺顧武陽選詩豈伊白璧賜將起黃金臺李詩燕昭延郭隗遂築黃金臺又灑掃黃金臺招邀廣平客又如登黃金臺遙謁紫霞仙又侍宴黃金臺傳觴青玉案又何人更掃黃金臺杜詩揚眉義結黃金臺又黃金臺貯俊賢多羅隱詩百尺黃金郭隗臺栁詩燕有黃金臺逺致望諸君元周公謹癸辛雜志云郭隗史記止云築宫而師事之初無臺字而李白詩有何人為築黃金臺之語吳虎臣漫録以此為據按新序通鑑皆云為築宫不言臺也然李杜及栁子厚詩皆有黃金臺之語唐人承用甚多不特本於白也又按唐皇甫松有登郭隗臺詩梁任昉述異記云郭隗臺在幽州故城中則實有此臺矣孔文舉論盛孝章書曰昭王築臺以尊郭隗然皆無黃金字鮑昭放歌行云豈伊白璧賜將起黃金臺然則黃金之名始見於此懷石林之主人今獲依於玉樹世説魏明帝使后弟毛曽與夏侯玄共坐時人謂蒹葭倚玉樹謝玄傳如芝蘭玉樹欲使生於階庭隋煬帝詩輕舉金臺上高會玉樹墟所願拜一盂之水乃先飛五朵之雲並見前恭惟某官世載其英蜀都賦江漢炳靈世載其英學優則仕繩其祖武合薰班馬之香詩昭兹來許繩其祖武裕乃父功宜踵韋平之躅平淮西雅皇曰咨訴裕乃父功平當傳漢興唯韋平父子至丞相况是一門叔父之貴世説一門叔父則有阿大中郎詳見前新領三軍元帥之權雪夜鵝鳴亦識西平之有子李訴傳夜半至懸瓠城雪甚城旁皆鵝鶩池訴令擊之以亂軍聲平淮西雅蔡人率止唯西平有子風聲鶴唳倚須幼度之平戎謝玄傳玄字幼度淝水之捷堅衆奔潰聞風聲鶴唳皆以為王師互見前詎容全材更淹半刺式觀挺挺之風烈魏謨傳贊詳見前克稱衮衮之公侯杜詩吾知徐公百不憂積善衮衮生公侯時來為之張嘉貞傳宰相者時來即為豈能長據詳見前風斯下矣莊子故九萬里則風斯在下矣某朅來通義朅丘謁切發語辭吕氏春秋膠鬲見武王於鮪水曰西伯朅來無欺我也眉州唐天寶初為通義郡正幸依仁杜詩此邦今尚武何處且依仁所恨五色之迷東坡詩平生漫説古戰場過目終迷日五色有負六王之畢托言崔偃試進士東都吳武陵謂偃曰公方為天子求竒才敢獻所益因出袖中書讀之乃杜牧阿房宫賦坐客皆驚武陵曰牧方試有司請以第一人處之偃謝已得其人至第五偃未應武陵勃然曰不爾宜以賦見還偃曰如教牧果異等同姓同業也底勞敘元禮之通家三熏三沐之尚擬迎蓋公而避舍並見前回綿州程通判植綿州已見化闥禮闈不隔公堂之霧杜詩公堂宿霧披廉泉遜水久暌緹屏之星廉水在綿州彰明縣北平地出泉宋書范柏年初見明帝因言及廣州有貪泉帝問卿州有此水否對曰梁州唯有文川武鄉廉泉讓水又問卿宅在何處曰臣所居在廉讓之間帝善之屏音丙通作箳車蔽當也車上竹席障塵者箳篂刺史車非特別駕今專用之別駕者誤見後漢書孔恂傳伻來以書僕感且悚恭惟某官器資沖逺德業碩膚崛然岷峨之高皓乎江漢之濯發研遊刃已知立解於千牛並見前按轡徐驅亦覺坐空於萬馬周亞夫傳天子乃按轡徐行不謂九垓之汗漫淮南子吾與子汗漫遊於九垓之上尚從半刺之翺翔杜詩半刺已翺翔然富樂之山固有富樂之實富樂山在巴西縣東五里劉備自荆州入蜀劉璋延之於此山望見蜀之全盛飲酒樂甚故得富樂之名唐子西詩富樂之名誰所留建安年中劉豫州擁兵入蜀萬貔貅孱璋送國來迎頭軍中釀酒椎千牛炙如巴山酒如涪酒酣握手登高丘極目紫芋蹲春疇富樂之名此其由君聞此説還信不當時兵起四十秋折屋不足供誅求生靈嗷嗷鼎中油山中胡為乃爾優想今富樂萬倍劉端能容我逃窮愁山僧笑言客罷休佐磊落之府正須磊落之人杜詩綿州州府何磊落顯慶年中越王作韓詩爾雅注蟲魚必非磊落人豈有不龜之封侯莊子宋人有善為不龜手之藥客買其方百金以説吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之而忘無蟹之監郡東坡詩擬向君王乞符竹却憂無蟹有監州詳見前某罔功龍邸謂榮州洊試蟇津謂眉州俱詳見前無以我公歸兮試問蕭朱之好詩無以我公歸兮無使我心悲兮蕭育傳少與陳咸朱博為友著聞當世往者有王陽貢禹故長安語曰蕭朱結綬王貢彈冠言其相薦達也事其大夫賢者尚修程李之風灌夫傳程李俱東西宫衛尉注李廣為東宫程不識為西宫又今日斬頭冗胸何知程李代回吳通判昌裔對月半輪何不厭平分之破李詩峨眉山月半輪秋東坡詞風月平分破詳見前觀風一道乃遽叨進寸之除唐貞觀八年分遣蕭瑀李靖等巡省天下觀風俗得失韓文寸進尺退卒無所成破除相對用建除體感曳履以見臨且鳴謙而加賁履臨謙賁四卦恭惟某官清標山立禮記山立時行奧學淵停石崇楚妃歎矯矯莊王淵停嶽峙濮陽朱絲之桐洗盡人間之箏笛東坡聽賢師琴詩歸家且覔千斛水淨洗從前箏笛耳東坡詩話歐陽公嘗問僕琴詩何者最佳余以退之聽穎師琴詩答之公言此詩固竒麗然自是聽琵琶詩非琴詩國史補于頔令客彈琴其嫂知音曰三分中一分箏聲二分琵琶全無琴韻唐段安節樂府雜録箏者蒙恬所造笛羌樂也傅玄琵琶賦序云世本不載作者故老云漢送烏孫公主念其行道思慕使知音者於馬上作之史記黃帝使伶倫伐竹於崑溪斬而作笛吹之作鳳鳴豫章白羽之扇留為世上之舟航詎容蟇頥久淹驥足見前頗哀老子馬援傳頗哀老子使得遨遊夙託年家東坡詩通家不隔同年面噓枯吹生絡繹寄聲於員嶠鄭太傳孔公緒清談高論噓枯吹生絡繹往來不絶貌通作駱驛王莽傳駱驛道路師古曰駱驛言不絶趙廣漢傳界上亭長寄聲謝我嶠渠廟切列子渤海之東有大壑名曰歸墟其中有五山焉一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊駕輕就熟馳驅俾踵於方舟韓文若駟馬駕輕車就熟路而王良造父為之先後也詩載馳載驅又方之舟之劉向説苑諸侯維舟為梁大夫方舟方舟臣之職也某已控需章丐還節傳需節卦名集于苞栩集于苞杞但切懷歸詩翩翩者隼載飛載下集于苞栩又集于苞杞又豈不懷歸王事靡盬投以木瓜投以木桃祗慙匪報詩投我以木瓜又投我以木桃又匪報也永以為好也代回敘州通判楊承議德輔敘州即禹貢西戎即敘之地故以名州古為僰國漢為犍為郡治東漢徙治武陽南齊復為犍為郡治梁武帝立戎州又置六同郡於南廣縣隋初廢六同而存戎州大業初改州為犍為郡唐武德初復為戎州移治南溪貞觀初復移治僰道乾元初復為戎州宋政和四年戎州父老上言戎者西夷之名僰侯蕃夷舊稱也乞別立名額敕改為敘州今為敘州府揚鈴監郡舲郎丁切亦作􅫲舟也一曰舟有忩者王維詩赭圻將赤岸擊汰復揚舲王荆公詩委佩去辭廷殖殖揚舲來得府潭潭又門前秋水可揚舲有意西尋白下亭懷寶睦鄰左傳親仁善鄰國之寶也秋月兩章真有風人之託杜詩兩章對秋月一字偕華星春雲多態不為時世之粧韓詩君詩多態度藹藹春空雲東坡詩自是風流時世粧詳見第十四卷載詠落英踐實之言足窺結根孤生之節水色異諸水安能為清紺之塵君家更贈君無忘厚培植之力山谷詩我提養生之四印君家所有更贈君四六標準卷二十九
