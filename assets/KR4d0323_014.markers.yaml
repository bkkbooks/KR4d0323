  - {type: variant, offset: 3, length: 25572, content: 庫全書四六標準卷十四宋李劉撰生辰代胡侍郎謝朝士賀生日生我劬勞撫六弧而增感詩蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞禮記男子生桑弧蓬矢六以射天地四方俾爾耆艾捧連璧以知慙詩俾爾昌而大俾爾耆而艾恭惟某官厚德嘘枯後漢書鄭大傳孔公緒清談高論嘘枯吹生東坡啓固無心于集苑而有力于嘘枯高詞發藻董仲舒傳發藻儒林五十年之過二應憐坡老之衰孔融與曹操書嵗月不居節序如流五十之年忽焉已至公為始滿融又過二東坡詩五十之年今過二衰顏記我今如此三萬日之無多欲擬茶山之老曾幾字吉甫號茶山有詩行世詳宋史列傳按茶山乃上饒名刹華其斑白飾以青黄莊子百年之木破為犧尊青黄以文之人情欲壽欲安知所蒙矣鼂錯傳人情莫不欲夀三王生而不傷也人情莫不欲安三王扶而不危也羊祜表臣雖小人敢緣所蒙念存斯義君子善頌善禱何以報之張衡詩美人贈我金錯刀何以報之英瓊瑶餘見前代謝朝士以下五十之年過二孰記衰顏見上條什伍之星有三猥勤善頌韓文三星行三星各在天什伍東西行顧方思罔極之德詩父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極何敢當不類之歌左傳晉平公與諸侯宴于温使諸大夫舞曰歌詩必類齊高厚之詩不類荀偃曰諸侯有異志矣類謂從其義類山谷詩向侯賦我菁莪何敢當不類歌簸弄明珠藏但深於十襲韓詩婆娑海水南簸弄明月珠嘘呵凍筆報有愧於七襄天寳遺事李白撰詔時大寒帝敕宫嬪執牙筆呵之詳別見謝黄侍郎伯固惠生日詩黄伯固見第九巻宣賜類絳縣老人之生甲擁翠節以知慙左傳晉悼夫人食輿人之城杞者絳縣人或年長矣無子而往與于食有與疑年使之年曰臣生之嵗正月甲子朔四百有四十五甲子矣其季于今三之一也使問諸師曠曰七十三年矣周禮道路用旌節注使者所擁節是也玉藻凡君召臣以三節注今漢使擁節䟽擁持也黄絹㓜婦之受辛感碧幢之委重石林燕語節度使節及麾鎗網以碧油故謂之碧油紅斾白樂天詩碧油幢引向東川方干詩問津求拜碧油幢愧踰垣之莫避且返璧之未能左傳受飱返璧恭惟某官帷幄近臣魏書高允傳公帷幄寵臣答詔宜實詩書元帥憐生我勞瘁之旦有愴蒿莪詩蓼蓼者莪匪莪伊蒿又哀哀父母生我勞瘁正義曰憂思之深每事皆不精識故視莪以為蒿以已二親今且病亡身在役中不得侍養精神昏亂故視物不察也歌俾爾耆艾之詩使堅松栢詩徂徠之松新甫之栢勞以春天之尊酒杜詩渭北春天樹江東日暮雲何時一尊酒重與細論文副之秋月之兩章杜詩兩章對秋月一字偕華星殆念苞栩憩棠之陰詩肅肅鴇羽集於苞栩王事靡盬不能蓻稷黍又蔽芾丼棠勿剪勿拜召伯所憩曷稱飛芻刻楮之役漢書秦欲攻匈奴使天下飛芻輓粟轉輸河北列子宋人以玉為楮葉三年而成某平頭六十白樂天詩病眼少眠非守嵗老心多感又臨春火銷燈盡天明後便是平頭六十人又白髪平頭五十人闗慮萬千杜詩時危闗百慮思玉局老之養生安得還鄉而騎鵠玉局觀在成都北二十里彭乘記漢永夀初李老君與張道陵至此老君升座為道陵説經既去而座隠地中故以玉局名之東坡年譜元符三年先生被命提舉成都玉局觀先生嘗著續養生論又詩云鏡湖敕賜老江東未似西歸玉局翁則東坡自稱為玉局翁也烏孫公主歌居常士思兮心内傷願為黄鵠兮歸故鄉太白蜀道難黄鵠之飛尚不得過猨猱欲度愁攀援從金華仙而學道或䝉叱石以為羊神仙傳黄初平年十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年不復念家其兄初起行索初平歴年不得後遇道士隨往金華山中與初平相見問羊何在云在山東兄往視但見白石平乃往言叱叱於是白石皆化為羊謝魏侍郎了翁惠生日詩乆生不學蹇蒲柳之先零世説顧悦與簡文同年而髪早白簡文問曰卿何以先老答曰蒲栁之姿望秋而落松栢之姿隆冬轉茂學林爾雅曰檉河桞旄澤桞楊蒲栁所謂蒲栁乃桞之一種是一物也左傳董澤之蒲可勝既乎注蒲栁可以為箭栁詩手自移蒲栁家才足稻粱是以蒲栁為二物誤矣初度無能困樵蘇之後覺離騷經皇覽揆余于初度兮肇錫余以嘉名過辱兩章之秋月見期千載之春風留歸壓于漁舟廖融詩雲穿搗藥屋雪壓釣漁舟難捲還於鯨錦杜詩奈何田舍翁受此厚貺情鯨錦巻還客始覺心和平恭惟某官拍肩諸老郭璞詩右拍洪厓肩畜眼一人杜詩蓄眼未見有天不㭬民將謀及詩書之帥㭬音卓詩民今之無祿天天是椓箋民于今而無祿者天以薦瘥天殺之王者之政又復㭬破之正義曰㭬使破壞然㭬如㭬杙之㭬謂打之也人能棟道恐宜在條理之科南史陳帝紀論黄塵汙人衣皂莢相料理詳見前閔六十服戎之夫内則五十不從力政六十不與服戎七十不與賔之事注服戎謂從軍為士卒也蜀志宗預傳鄧芝自江州來朝謂預曰禮六十不服戎而卿甫受兵何也預答曰卿七十不還兵我六十何為不受耶窘千里餽糧之役韓信傳千里餽糧士有饑色我辰安在敢祈牛斗之能神詩天之生我我辰安在箋言我生所值之辰安所在乎謂六物之吉凶正義曰左傳何謂六物嵗時日月星辰是也昌黎三星行我生之辰月宿南斗牛奮其角箕張其口三星各在天什伍東南行嗟汝牛與斗汝獨不能神夫子言之或免蟪菌之俱腐莊子朝菌不知晦朔蟪蛅不知春秋注菌其隕反大芝也天陰生糞土見日則死一名日及故不知月之始終也蟪蛄寒蟬也一名蝭蟧春生夏死夏生秋死即楚辭所云寒螿者是也某屬有國故且無親存方兹疚懷於劬勞疚病也詩憂心孔疚只得痛謝於頌禱先生與之言則對參乎奚避席之疑禮記遭先生於道趨而進正立拱手先生與之言則對不與之言則趨而退孝經仲尼閒居曾子侍坐子曰參先王有至德要道以順天下民用和睦上下無怨女知之乎曾子避席曰參不敏何足以知之小子何莫學夫詩武也請卒章之受左傳鄭伯享趙孟於垂隴子展伯有子西子産子大叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子産賦隰桑趙孟曰武請受其卒章隰桑詩小雅篇名義取既見君子其樂如何其卒章云心乎愛矣遐不謂矣中心藏之何日忘之孟欲子産見規故受之謝諸處監司賀生日我年六十真成薄頽景於西山寡婦賦嵗云暮兮日西頽反離騷恐日薄於西山東坡詩我今六十一頽景薄西山春餘十分未許託老人於南極天文志狼比地有大星曰南極老人見則治平主夀昌晉灼曰比近也茲届劬勞之旦敢當襃借之辭恭惟提刑云六轡澄清詩六轡如濡范滂傳登車攬轡慨然有澄清天下之志十行炳煥後漢循吏傳序一札十行運使云斧繡光輝暴勝之傳衣繡持斧威振州郡珠璣咳唾牛僧孺詩珠玉㑹應成咳唾山川猶覺露精神賢者告以善揆亡菑亡害之初詩時維后稷誕彌厥月先生如逹不坼不副無災無害以赫厥靈注其生之時不坼割不副裂其母故其母無災殃無患害愛之欲其生有爾熾爾昌之詠詩俾爾夀而臧俾爾熾而昌所愧泥塗之絳甲左傳絳縣人或年長矣無子而往與于食趙孟曰武不才不能由吾子使吾子辱在泥塗乆矣由用也辱在泥塗謂受版築之役詳見前要非光熖之白庚新唐書白之生母夢長庚星因以命之韓詩李杜文章在光熖萬丈長某有味其言鄭當時傳誠有味其言也不知所賀左傳楚子將圍宋使子文治兵于暌終朝而畢不戮一人子玉復治兵于蒍終日而畢鞭七人貫三人耳國老皆賀子文蒍賈後至不賀子文問之對曰不知所賀子文欲委重子玉故不戮一人賀子文者賀其所舉得人盖謂子文畧而子玉詳也蒍賈逆知子玉必敗國事故曰不知所賀君子謂之善頌相期食蛤以踞龜淮南子盧敖游乎北海經乎太陰入乎𤣥闕至于蒙穀之上見一士焉深目而𤣥鬢淚注而鳶肩方倦龜殻而食蛤蜊注楚人謂踞為倦龜殻龜甲也蛤梨海蚌也使臣不敢與聞但願放牛而歸馬左傳三夏天子所以享元侯也使臣弗敢與聞又牀笫之言不踰閾况在野乎非使人之所得與聞也尚書歸馬于華山之陽放牛于桃林之野示天下弗服謝都大惠生日詩通篇用茶馬事詳啓意似與魏鶴山匪莪伊蔚正緬思罔極之天詩蓼蓼者莪匪莪伊蔚又欲報之德昊天罔極詳見前以蘿施松辱許共後凋之嵗詩蔦與女蘿施于松上爾雅唐蒙女蘿女蘿兔絲陸佃云在木為女蘿在草為兔絲注蔦寄生也女蘿兔絲松蘿也蔦與女蘿施于松栢之上非自有根依于松栢之根故松栢存而茂松栢殞而亡是存亡在松栢然頭白走雪山之戍杜詩西山白雪三城戍詳見前覺鬢青負寳葢之峰寳葢山在撫州崇仁縣南三十里號江南絶頂形如寳葢上有浮休臺乃王郭二真人昇仙之地顏魯公為之記幸聯公子之婚姻史記平原君讓魏公子曰勝所以自附為婚姻者以公子之高義為能急人之困也見假長庚之光熖見上條恭惟某官糠粃團鳳建州郡志國朝太平興國二年始置籠焙造龍鳳茶咸平中丁謂為福建漕監造御茶進龍鳳團蔡襄為漕始改造小龍團茶仁廟尤所珍惜歐陽公茶錄後序茶為物之至精而小團尤其精者仁廟尤所珍惜雖輔相之臣未嘗輒賜惟南郊大禮致齋之夕中書樞密各四人共賜一餅宫人剪金為龍鳳花草貼其上兩府八家分割以歸不敢碾試宰相家藏以為寳時有佳客出而傳玩爾東坡詩糠粃團鳳友小龍奴𨽻日注臣雙井舊唐書白居易傳贊錙銖採葛糠粃懷沙轡策翔龍新唐書百官志武后萬嵗通天元年置仗内六閑一曰飛龍二曰翔麟三曰鳳苑四曰鵷鸞五曰吉良六曰六郡亦號六廐李適傳天子享㑹游豫惟宰相及學士得從給翔麟馬注翔麟廐名一雄將十萬之雌識神駿於驪黄之外山谷詩一雄可將十萬雌餘見前六經佐三尺之法辨淄澠於兎褐之中山谷煎茶賦乃至中夜不眠耿耿既作温齊殊可屢㰱如以六經濟三尺法雖有除治與人安樂又酌兎褐之甌瀹魚眼之鼎宋趙彥衞雲麓漫抄云陸羽辨天下水味各立名品列子云淄澠之合易牙能辨之易牙齊威公大夫能别二水威公不信數試皆驗陸羽豈得其遺意乎互見前眷此陳人寵其初度正欲歸耕於劒外杜詩劒外官人冷又劒外春天逺又彭門劒闗外又草木變衰行劒外詎思入對於延英六典延英殿在西上閣之西唐書楊瑒傳𤣥宗召對宰相議天下户版延英殿惟瑒言利病尤詳苗晉卿傳代宗立年老乞閑帝優之為御小延英召對宰相對小延英自晉卿始詳别見某有味其言見前不知所報左傳君亦不任受怨臣亦不任受德無怨無德不知所報絳縣老人之生甲花六十以既周李淳風有六十花甲子歌黄絹㓜婦之受辛椿八千其安用見前謝都大惠生日詩皇揆余度已勤溢美之言見前子與人歌更作新凉之賀宋楊湜古今詞話蘇子瞻守錢塘有官妓秀蘭善應對湖中有宴羣妓畢至唯秀蘭不來子瞻問其故則以髪結沐浴告坐中倅車屬意于蘭見其晚來恚恨不已子瞻作賀新凉以解之取其沐浴新凉也後誤為賀新郎苕溪漁隱云野哉楊湜之言真可入笑林東坡此詞冠絶古今託意高逺寧為一伎而發賀新郎乃古曲名今乃云云誤矣輙駢四六仰謝再三恭惟某官學廣聞多韓文學廣而聞多不求聞於人也筆精墨妙江淹别賦淵雲之墨妙嚴樂之筆精歌鍾二肆和諧魏絳之聲左傳鄭人賂晉侯以歌鍾二肆及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和請與子樂之魏絳于是始有金石之樂注肆列也縣鍾十六為一肆二肆三十二鍾騋牝三千教習開元之舞詩秉心塞淵騋牝三千注馬七尺以上曰騋明皇雜錄𤣥宗嘗令教舞馬四百疋分為左右目為某家驕某家寵時塞外亦以善馬來貢者上俾教習無不曲盡其妙因命衣以文繡絡以金鈴飾其鬛間雜以珠玉其曲謂之傾盃樂若歌其曲奮首鼔尾縱横應節又施三層板牀馬乘而上旋轉如飛或命壯士舉一榻馬舞于榻上樂工數十人立于前後左右皆衣淡黄衫文玉帶必求少年而姿貌美秀者每千秋節常命舞於勤政樓下寛朢秋先零之念見本巻謝魏侍郎條賜陽春寡和之章某重拜珍投左傳臣獲五善敢不重拜宛成珠貫禮記歌者倨中矩句中規纍纍乎如貫珠故歌之為言也長言之也贈以綠綺愧莫報於雙南張衡四愁詩美人贈我綠綺琴何以報之雙南金寫之烏絲惟謹藏於十襲烏絲紙名國史補朱亳間紙有織成界道謂之烏絲欄霍小玉取珠珞縫繡囊出越姬烏絲欄素段三尺以授李生生多才思援筆成章東坡與錢志仲尺牘云烏絲當用寫道經一篇惡詩不足錄也又與劉器之云志仲本以烏絲欄求某錄雜詩耳某自出意欲與寫廣成子山谷詩正圍紅袖寫烏絲又下筆却到烏絲欄汪彦章詩玉為蟾蜍氷作滴烏絲欄開寳鴉黒餘見前謝吕提刑惠夀詩泥塗絳老正自疑甲子之年見前霄漢繡衣猶記揆庚寅之度杜詩繡衣春當霄漢立離騷攝提貞于孟陬兮惟庚寅吾以降鼎來好語李賀詩沙路歸來聞好語東坡詩輦路歸來聞好語又山寺歸來聞好語又好語夜喧街賁飾孤生周榮傳榮江淮孤生張霸傳起自孤生致位郡守岑文本傳自以興孤生栁詩孤生易為感失路少所宜鼎賁卦名恭惟某官高誼薄雲揚雄傳高義薄雲天杜詩故人有孫宰高誼薄層雲長毫裁霧杜詩裁縫雲霧成御衣舊游楚地未寒車馬笠之盟左傳吳使太宰嚭請尋盟子貢曰盟所以周信也若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也段公路北户錄越人每相交作壇祭以白犬丹鷄盟曰卿若乘車我戴笠後日相逢下車揖我若歩行君乘馬後日相逢馬當下今戴蘇天尚念斗牛箕之宿三星行我生之辰月宿南斗牛奮其角箕張其口詳見前雙節帡風而幪雨唐百官志節度使辭日賜雙旌雙節法言震風凌雨然後知夏屋之為帲幪也兩章對月以偕星杜詩兩章對秋月一字偕蕐星某逺守石龜海錄碎事榮州榮黎山有石洞洞中有石狀如龜形十道圖云即古石龜州也李嘗知榮州深慙玉燕天寳遺事張説母夢玉燕自東南飛來投入懷中而有孕生説果為宰相其至貴之祥也報德罔極劬勞但感於蓼莪見前有功見之勞來請歌於枤杜詩序枤杜勞還役也餘見前謝提刑蕭艾賤生蕭先彫切説文蕭艾蒿也爾雅注今藾蒿也離騷户服艾以盈腰兮謂幽蘭其不可佩又何昔日之芳草兮今直為此蕭艾也淮南子巫山之上順風縱火膏夏紫芝與蕭艾俱死注蕭艾賤草諭不肖張衡傳珍蕭艾于重笥兮謂蘭蕙之不香宋羅願爾雅翼云蕭艾皆香草古者天子摯鬯諸侯蕙大夫蘭士蕭庶人艾至離騷則薄之蕭艾雖非惡物要之庶人所服比之蘭蕙芳草君子所服則有間矣桑蓬初度但切劬勞之感敢當頌禱之勤恭惟某官盛德嘘枯高文發藻並見前既旌厚意又蕆多儀蕆音闡備也區區之私楚元王傳豈為區區之禮哉師古曰區區謂小也詳别見拳拳戢佩戢藏也謝吕運使賀生日霄漢繡衣遷轉木牛之運見前瓊瑶錦段寵光芻狗之陳張衡四愁詩美人貽我金錯刀何以報之英瓊瑶又美人貽我錦繡段何以報之青玉案莊子芻狗未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘇者取而㸑之而已揆初度以何榮見前受徽言而增愧尚書予旦已受人之徽言恭惟某官修名揭日離騷老冉冉其將至兮恐修名之不立高誼薄雲篤車馬笠之盟不挾貴不挾長見前問斗牛箕之宿無以名無以懷七言撮白玉之丹韓詩壯非少者哦七言六字常語一字難我以指撮白玉丹行且咀噍行詰盤一字重黄金之價穀梁傳序一字之襃寵踰華衮之贈杜詩一字偕華星季布傳得黄金百不如得季布諾某身方受察韓文受容受察不復致謝樂毅傳以身得察于燕心已懷歸詩豈不懷歸王事靡盬使臣必諮于周惠而好我人情莫不欲夀更以贈君並見前謝生日投詩代何月湖彼其之子鵜積愧於在梁鵜音啼鵜鶘水鳥爾雅鵜鴮鸅一名涸澤詩彼候人兮何戈與祋彼其之子三百赤芾維鵜在梁不濡其翼彼其之子不稱其服注鵜在梁當濡其翼而不濡者非其常也不稱者言德薄而服尊我生之辰牛莫神於奮角韓詩我生之辰月宿南斗牛奮其角箕張其口又嗟汝牛與斗汝獨不能神茲勤善頌徒發愧情恭惟某官藻掞天庭李詩秀句滿江國高文掞天庭句穿月脇皇甫湜顧况集序逸歌長句駿發踔厲往往穿天心出月脇意外驚人語非尋常所能及也憐絳人之甲子混在泥塗見前記孟陬之庚寅眷焉遲暮離騷攝提貞于孟陬兮惟庚寅吾以降又信草木之凋落兮恐美人之遲暮特華其老東坡集慶元宣義王丈人有書求紅帶既以遺之且作詩為戲黄魯直學士秦少游賢良各賦一首為老人光華又答于連州啓過情之譽知無其實而愧于中起廢之文欲借此言以華其老相贈以言見前某取數既多禮記取數多者仁也餘年無幾晉書張忠傳苻堅遣使徵之沐浴而起謂弟子曰吾餘年無㡬不可以逆時主之意又劉敏元字道光永嘉之亂同郡管平以年老從敏元西奔為賊所刼敏元謂盜曰此公餘年無幾願以身代東坡詩餘年知㡬何佳月豈屢逢又六祖塔功德䟽念餘年之無幾賜以安閑憐㓜穉之無辜除其疾恙欲報罔極之德已廢蓼莪晉書孝友傳王裒字偉元痛父非命未嘗北靣而坐示不臣朝廷也隱居教授三徵七聘皆不就讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇齊顧歡字景怡早孤讀詩至哀哀父母輒執書慟哭由是受業者廢蓼莪篇不講敢當不類之歌請辭假樂左傳晉侯降辭登成拜公賦嘉樂降辭降階辭讓也嘉音假嘉樂詩大雅篇名取其顯顯令德宜民宜人受祿于天以祝晉侯也餘見前代謝生日投詩皇覽揆余初度漫扈江蘺楚辭扈江蘺與薜荔兮紉秋蘭以為佩扈後五切披也王注楚人名披為扈爾雅翼云愽物志謂芎藭苗曰江蘺根曰􅐘蕪本草亦曰芎藭有二種一種似芹一種似蛇床然則小葉似蛇牀者􅐘蕪大葉似芹者名江蘺爾餘見前子欲養親不存但悲風木韓詩外傳孔子行聞哭聲甚悲至則皋魚也曰子非有喪何哭之悲也皋魚曰樹欲静而風不止子欲養而親不待也往而不可得見者親也吾請從此辭矣立槁而死孔子曰弟子戒之足以識矣茲勤妙語徒發愧情恭惟某官脱時世粧唐趙璘因話錄崔吏部樞夫人西平王女也婦德克備治家整肅貴賤皆不許時世粧梳勲臣之家特數西平禮法白氏諷諫時世粧儆戒也時世粧時世粧出自城中傳四方時世流行無逺近顋不施朱靣無粉烏膏注唇唇似泥䨇眉盡作八字紙妍蚩黑白失本態粧成盡似含悲啼圓鬟無鬢堆髻様斜紅不暈赭靣狀昔聞披髪伊川中辛有見之知有戎元和粧梳君記取髻堆靣赭非華風又上陽白髪人愍怨曠也上陽人紅顔闇老白髪新小頭鞋履窄衣裳青黛點眉眉細長外人不見見應笑天寳末年時世粧東坡詩揚州近日紅千葉自是風流時世粧續古樂府稗史類編古人初不定聲律因所感發為歌而聲律從之唐虞三代以來是也餘波至西漢末始絶西漢時今之所謂古樂府者漸興晉魏為盛隋氏取漢以來樂器歌章古調併入隋樂餘波至李唐始絶中葉雖有古樂府而播在聲律則尠矣白樂天讀張籍古樂府詩張君何為者業文三十春尤工樂府詩舉代少其倫為詩意何如六義互鋪陳風雅比興外未嘗著空文上下禆教化舒之濟萬民下可理性情巻之善一身時無采詩官委棄如泥塵温柔厚重有二雅之正言禮記温柔敦厚詩教也詩序雅者正也言王政所由興廢也政有大小故有小雅焉有大雅焉婉麗清新無六朝之俳體俳音排説文戲也漢書談笑類俳倡注俳雜戲也惠而好我何以報公某愧乏辰猷詩逺猷辰告空踰亥首左傳史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬六千六百有二句也按二亥字二畫在上三人在下故以二為首以六為身下猶置也如往也除下亥上二畫往置身傍二畫為二萬三六為六千六百六旬此是老人所生至今日之數也因亥畫似筭法故假之以為言而下如二字亦用筭法之義葢一甲子為六十日總之合有二萬六千六百日其末之甲子止得三分之一故少四十日餘見前聽陽春之寡和為調彌高見前享肆夏之升歌請拜其細左傳穆伯如晉晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱于敕邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也普謝見任官惠生日詩詞伏以小人不知紀年恍近平頭之六十左傳絳縣人曰臣小人也不知紀年餘見前君子為善頌禱仰勤厚意之再三見前受言藏之詩彤弓弨兮受言藏之有感多矣恭惟某官英詞潄潤陸機文賦傾羣言之瀝液潄六藝之芳潤盛德噓枯愛之欲其生忘泥塗之為辱賢者告以善任牛斗之不神並見前所慙雌甲之辰盧氏雜説裴晉公在相位日有人寄槐癭一枚欲削其枕時郎中庾威世稱博物召請别之庾捧良乆白曰此槐癭是雌樹生者恐不堪用裴曰郎中甲子多少庾曰某與令公同是甲辰生公笑曰郎中便是雌甲辰今按雌甲固出裴公戲語然年月支干實有雌雄之説虞喜天文論漢太初厯十一月甲子夜半冬至云嵗雄在閼逢雌在攝提格月雄左畢雌在觜日雄在子又云甲嵗雄也畢月雄也陬月雌也郎顗傳有易雌雄秘厯采玉賦有雄風沈約賦有雌霓師曠占有雄雷雌雷可類推矣難擬長庚之夢某未能返璧又乏報瓊並見前三歎而音有遺良服朱絃之䟽越禮記清廟之瑟朱絃而䟽越壹倡而三歎有遺音者矣千嵗而眉無害還期黄髮之夀胥詩俾爾昌而熾俾爾夀而富黄髮台背夀胥與試俾爾昌而大俾爾耆而艾萬有千嵗眉夀無有害謝學職十四人投詩賀生日伏以召南之詩十四固足繫騶虞之風召南鵲巢至騶虞凡十四篇詩序鵲巢騶虞之德諸侯之風也先王之所以教故繫之召公魯侯之嵗萬千何以當泮宫之頌詩序泮水頌僖公能修泮宫也餘見上條良見維桑與梓之敬詩維桑與梓必恭敬止注凡人父之所樹者維桑與梓見之必加恭敬之止况父身乎然增匪莪伊蔚之思見前伏惟某人學士岷峨之英江漢以濯他年事業半雲閣之功臣洛陽記雲臺高閣十四間丼泉賦乘雲閣而上下注高連雲也黄圖雲閣高如雲故言雲西京賦途閣雲蔓注閣道如雲氣連蔓後漢書傳論顯宗圖二十八將于南宫雲臺馬援傳援女立為皇后顯宗圖畫建武中名臣列將於雲臺以椒房故獨不及援此日詞章倍建安之才子魏文帝典論今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐幹偉長陳留阮瑀元瑜汝南應瑒徳璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸以自騁騄驥于千里仰齊足而並馳以此相服亦良難矣韓詩建安能者七卓犖變風操憐香山艷陽之過九白居易自號香山居士五十九詩半百過九年艷陽殘㡬日信眉州近古之有三東坡眉州逺景樓記吾之俗有近古者三其士大夫貴經術而重士族其民尊吏而畏法其農夫合耦以相助葢有三代漢唐之遺風而他郡之所莫能及也詳見前勁氣芳詞韓文勁氣沮金石高文大册西京雜記揚子雲曰軍旅之際戎馬之間飛書馳檄用枚皋廊廟之下朝廷之中高文典册用相如序所為作者之意陳誼尤高孔安國尚書序書序序所以為作者之意昭然義見宜相附近故引之各冠其篇餘見前相接以粲然之文過情是恥董仲舒傳粲然有文以相接驩然有恩以相愛此人之所以貴也師古曰粲明貌某薾然蒲桞感此桑蓬人情莫不欲夀欲安生則惡可已也君子謂之善頌善禱忠焉能勿誨乎並見前謝潼川提刑謝太博賀生日伏以問甲辰之雄木既遄諏度之載馳見前條守癸亥之犍為真覺棲遲之萬狀地理志犍為郡應劭曰古夜郎國詩衡門之下可以棲遲猶蒙佳句見貺陳人恭惟某官高義薄雲英詞組霧牛頭衮衮詎止隨世界之花寰宇記牛頭山在梓州郪縣西南二里四靣孤絶形如伏牛俯臨州郭自長樂寺樓閣烟花為一方之勝概杜子美上牛頭寺詩青山意不盡衮衮上牛頭又登惠義寺詩春日無人境虛空不住天鶯花隨世界樓閣倚山巅梓州即今潼川府象耳耽耽猶記生池塘之草象耳山在眉州彭山縣東北二十五里上有大悲道塲㑹昌寺下有寳硯磨鍼二溪龍池蟹泉及李白讀書臺杜光庭詩有青蓮居士㡬時來之句耽音眈説文耳大垂也南史謝惠連傳惠連十嵗能屬文族兄靈運嘉賞之曰每有篇章對惠連輙得佳語嘗於永嘉西堂思詩竟日不就忽夢見惠連即得池塘生春草大以為工常云此語有神功非吾語也曲憐苦李晉書王戎年六七嵗羣兒見李競趨戎獨不往曰李在道傍而多子必苦李也東坡詩顧我如苦李全生依路傍承藉丼棠皇揆余降庚寅紛吾有此離騷紛吾既有此内美兮又重之以修能餘見前我與君皆丙子欲並生哉東坡詩嗟我與君皆丙子四十九年窮不死尚書書用識哉欲並生哉某獲守蕭䂓曹參傳蕭何為政講若畫一曹參代之守而勿失法言蕭也規曹也隨敢當唐律思其人愛其樹何如對秋月之兩章左傳武子之德在民如周人之思召公焉愛其丼棠况其子乎誦其詩讀其書安得共春天之尊酒見前謝鄉官寄居士人賀生日詩伏以匪莪伊蒿增劬勞勞瘁之感詩哀哀父母生我劬勞又生我勞瘁餘見前維桑與梓辱熾昌昌大之詩詩俾爾熾而昌又俾爾昌而大何以報木𤓰之三詩序木𤓰美齊桓公也魏國有狄人之敗出處於漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也詩凡三章凡是光蓬矢之六恭惟某官嘘枯意厚發藻才雄並見前半百過九年笑白傳艷陽之已老見上條分寸落千丈憐韓公牛斗之不神韓詩躋攀分寸不可上失勢一落千丈强餘見前贈汝好辭揆余初度某安知燕喜詩吉甫燕喜既多受祉注吉甫既伐玁狁而歸天子以燕禮樂之則歡喜矣又魯侯燕喜令妻夀母注燕燕餘也魯侯燕飲于内寢則善其妻壽其母為之祝慶也但笑龍鍾蘇鶚演義龍鍾者不昌熾不翹首如䰐鬖拉搭斛觫之類李濟翁資暇集或問龍鍾之義鍾即涔爾鍾與涔並蹄足所踐處則龍之致雨上下所踐之鍾固淋漓濺澱矣義當止此餘俟該通今按龍鍾之義其説多端蔡邕琴操卞和歌云空山欷歔涕龍鍾周書王褒與周𢎞讓書云援筆攬紙龍鍾横集唐詩亦有雙袖龍鍾淚不乾之句則于淋漓濺澱之義為近廣韻云龍鍾竹名年老者如竹枝葉摇曵不自禁持韓詩已作龍鍾後時者又東野不得官白首誇龍鍾東坡詩龍鍾三十九勞生已强半互見前一唱三歎而音有遺難和朱絃之䟽越萬有千嵗而眉無害還祈黄髮之夀胥並見上普謝見任官條代回孟提舉此條劉本無庭芾門弧方切蓼莪之感詩殖殖其庭有覺其楹乃生男子朱芾斯皇注芾天子純朱諸侯黄朱皇猶煌煌也東坡啓蓬矢之祥雖世俗之所尚蓼莪之感終衰老而不忘函牋臺餽仰勤桑梓之情却之不恭用是下拜左傳敢不下拜下拜登受恭惟某官高誼絶俗厚德嘘枯記孟陬之庚寅撫其遲暮憐絳人之甲子混在泥塗並見前華以緹緘緹田黎切説文帛丹黄色緘居咸切説文束篋也廣韻緘封也江總陶貞白集序校之鉛墨緘以緹緗加之飲饌某丁年託契見前亥字過期劉禹錫詩亥字老人迎鵝鴨之惱比隣甚華登爼杜詩休怪兒童延俗客不教鵝鴨惱比隣左傳鳥獸之肉不登于爼鷄豚之同保社敢不舉觴白樂天詩牛馬因風逺鷄豚過社稀韓詩願為同社人鷄豚燕春秋東坡詩鷄豚異日為同社應有千篇唱和詩兒寛傳敬舉君之觴謝潼川知府趙監丞賀生日詩伏以男子始生肯負大人占之之夢詩大人占之維熊維羆男子之祥箋大人占之謂以聖人占夢之法占之也正義曰占夢之官中士耳而言大人占之明其法大人所為故曰聖人占夢之法我辰安在敢當先生長者之褒詩天之生我我辰安在注見前曲禮謀於長者必操几杖以從之又從于先生不越路而與人言有愧徽言莫酬隆眷恭惟某官為善最樂後漢書明帝詔問東平王處家何事最樂王言為善最樂薛道衡詩幸逢為善樂頻降濟時才大雅不羣發更生鴻寳之書浩如淵海出長吉錦囊之句迅若風檣俱見前有憐桃李之一株談叢王泠然上裴耀卿書拾遺補闕寧有種乎僕不侫亦相公一株之桃李也重感桑蓬之六矢吹以七言之律重於雙璧之貽東坡詩烱烱明珠暎雙璧某夙荷甄收竟成椎鈍老人無一子誰知絳甲之泥塗仙官勅六丁長倚白庚之光熖並見前謝列郡大守以上賀生日按理宗端平三年梅亭六十二嵗小刼六十之風雨齒邁二齡東坡别子由詩願君亦莫歎留滯六十小刼風雨疾注法華經有六十小刼又八十小刼大川三百之波濤心驚萬里揆余初而增感俾爾夀以何居居居之切語助也檀弓何居我未之前聞也郊特牲二日伐鼔何居注語助也恠之也恭惟某官云云河漢淵海富卿雲舒向之儲廣絶交論舒向之金玉淵海卿雲之黼黻河漢月露風烟陋盧駱王楊之作北史李諤字士恢以時文體尚輕薄上書曰自魏之三祖更尚文詞江左齊梁其弊彌甚遺理存異尋虚逐㣲連篇累牘不出月露之形積案盈箱唯是風雲之狀捐本逐末流徧華壤逓相師祖乆而愈扇憐絳縣老人之生甲贈黄絹㓜婦之受辛俱見前某仕則慕君老當佚我莊子大塊勞我以生佚我以老不俟駕固將朝也良感徽言射以弧受乃負之敢忘㓜志禮記生男子設弧于門左三日始負射人以桑弧蓬矢六射天地四方保受乃負之謝通判以下賀生日六十二嵗之樂愧無白鶴之新居東坡年譜紹聖四年先生六十二嵗二月十四日白鶴新居成有連娟缺月黄皆後縹緲新居紫翠間之句萬里㡬年之歸孰念碧鷄之老客見前皇揆余度何及公言劉寵傳吾政何能及公言耶伏惟某官盛德嘘枯英文掞藻念苞栩之使雖叨四牡之還並見前感蓼莪之詩無復三牲之養孝經三者不除雖日用三牲之養猶為不孝也三者謂驕亂爭三牲謂牛羊豕禮記三牲之爼八簋之實美物備矣餘見前煖於布帛茍子與人善言煖于布帛傷人之言深于矛㦸贈以襜褕張衡四愁詩美人贈我貂襜褕何以報之明月珠六轡既均詩我馬維駰六轡既均注均調也二節以走禮記凡君召以三節二節以走一節以趍詳見前夙興夜寐亦希無忝於所生孝經忠順不失以事其上然後能保其爵位而守其祭祀葢士之孝也詩云夙興夜寐無忝爾所生日邁月征尚祈不諫之亦入詩題彼眷令載飛載鳴我日斯邁而月斯征注我我王也邁征皆行也王位無常須自勤于政日行視朝之禮月行視朔之政與羣臣議政事日有所決月有所行無時休息也又不聞亦入不諫亦式注言性與天合也文王之聖德自生知無假學習不聞人之道説亦自合于法不待人之諫諍亦自入于道此斷章謝王制參等八員賀生日王制參翊丁制機鎔蒲制機仲乙楊制幹異陳制幹噲宋制幹拱王撫幹三桂王鈐幹澥四方有志愧孤負於桑蓬禮記男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志于其所有事然後敢用穀也互見前八公同辰辱褎期於樗櫟晉書職官志世祖武皇帝即位之初以安平王孚為太宰鄭冲為太傅王祥為太保司馬望為太尉何曾為司徒荀顗為司空石苞為大司馬陳騫為大將軍世所謂八公同辰攀雲附翼者也樗音樞爾雅栲山樗材易大而不中器用櫟力狄反莊子匠石之齊見櫟社樹其大蔽牛匠石不顧曰是不材之木也無所可用故能若是之夀固辭不獲厚意何居見謝列郡太守條恭惟某官合志同方禮記儒有合志同方營道同術並立則樂相下不厭乆不相見聞流言而不信集思廣益蜀志廣衆思廣忠益詳見前依紅泛緑培懷黄拖紫之程楊僕傳懷銀黄垂三組注黄金印也揚雄傳紆青拖紫朱丹其轂晉書儒林傳序莫不紆青拖紫服冕乘軒沈隱侯集自茲以降懷青拖紫崇基巖巖長瀾瀰瀰南史卞彬蝦蟆賦紆青拖紫名為蛤魚取白媲青忘看朱成碧之醜栁文世之模擬鼠竊取青媲白肥皮厚肉柔筋脆骨而以為辭者之讀之也其大笑固宜又抽黄對白渰渰飛走王臺新詠夜愁詩誰知心眼亂看朱忽成碧李詩催絃拂柱與君飲看朱成碧顔始紅劉禹錫贈眼醫詩看朱漸成碧羞日不禁風山谷詩亂我朱碧眼又醉眠朱碧亂又邂逅相將倒一壺看朱成碧倩人扶揆余初度贈汝好詞某返璧未能報瓊焉有觀我生之進退真成維谷之羞易觀六三觀我生進退孔䟽三處進退之時以觀進退之㡬詩人亦有言進退維谷俾爾夀而熾昌曷副如岡之頌詩如山如阜如岡如陵如川之方至以莫不増注言其福禄委積高大也謝丁制置黼惠詞宋史忠義傳丁黼成都制置使也嘉熈三年北兵自新井入詐竪宋將李顯忠之旗直趨成都黼以為潰卒以旗榜招之既知其非引兵夜出兵散力戰死之北兵未至黼自誓死守至是從黼者唯幕客楊大異及所信任者數人大異死而復蘇黼帥蜀為政寛大蜀人思之事平賜額立廟轉粟青天之上牋詞來謝於青天杜詩轉粟上青天樂廣傳若披雲霧而覩青天射蓬白雪之邊度曲敢當於白雪禮記男子生桑弧蓬矢以射天地四方白雪即雪山杜詩西山白雪三城戍野客叢書云漢書自度曲如瓚注謂歌終更授其次引張衡賦度曲未終之語為證西京賦復引漢書為證正如瓚之失是不深攷耳二音各有意義元帝度曲乃隱度之度音鐸如應劭所注師古所音是也西京賦乃度次之度音杜豈漢書之意哉注但見漢書有此二字故引為證而不知其意自别文苑宋玉笛賦度曲羊腸此語却可以為證又在漢書之先今人詞中用此二字類祖漢書非也漢書元帝紀贊自度曲被歌聲師古曰度大各反應劭曰自隱度作新曲因持新曲以為歌詩聲也荀悦曰被聲能播樂也張衡西京賦度曲未終雲起雪飛田藝蘅云歌終更授其次曰度曲即今之逓曲也吕詵曰曲之節度非也沈約傷美人賦信美顔如玉咀清哇而度曲杜詩翠眉縈度曲山谷詩松風自度曲我琴不須彈又時時能度曲秀句入新腔杜氏通典雜歌曲有白雪周曲也平調清調瑟調皆周房中之遺聲也漢代謂之三調按張華博物志云白雪是天帝使素女鼔五絃琴曲名以其調高人和遂寡自宋玉以來迄于今祀未有能歌白雪者有美朝中之措朝中措小令名宋有時相本寒生及登台位常以措大自負生日都下有一妓易歐陽公朝中措數字為夀曰平山欄檻倚晴空山色有無中手種庭前桃李别來㡬度春風文章宰相揮毫萬字一飲千鍾行樂不須年少目前看仙翁時相憐其善改易又愛朝中措之名厚賞之取見貽方外之游莊子彼游方之外者也而丘游方之内者也恭惟某官遼鶴高標續捜神記遼東城門有華表柱忽有一鶴集徘徊空中言曰有鳥有鳥丁令威去家千載今來歸城郭如古人民非何不學仙去空伴冢纍纍遂上冲天庖牛餘刅莊子庖丁為惠文君解牛注庖人丁其名也又恢恢乎其于游刅必有餘地矣春風楊栁之句宜拍紅牙歐陽文忠公守維揚日于大明寺側建平山堂頗得游觀之勝劉原父出守揚州文忠公作朝中措以餞之其詞有云手種堂前楊栁别來㡬度春風後東坡亦守是邦登平山堂有感賦西江月云欲弔文章太守仍歌楊栁春風此因丁帥贈朝中措詞故云春風楊栁之句葢以歐蘇美之也紅牙謂拍板又東坡在玉堂有幕士善謳因問我詞比栁詞何如對曰栁郎中詞只好十七八女孩兒執紅牙拍板唱楊栁外曉風殘月學士詞須闗西犬漢執鐡板唱大江東去公為之絶倒夜月梧桐之篇何闗白髮某既聞耳矣食貨志既聞耳矣如淳曰聞于天子之耳詳見前又寓目焉左傳得臣與寓目焉詳見前適有高峰縁雲之行高峯縁雲言登丈人峯也少陵丈人山詩丈人祠西佳氣濃緣雲擬住最高峯魯靈光殿賦飛陛揭孽緣雲上征别圖公堂披霧之謝樂廣傳此人之水鏡見之瑩然若披雲霧而睹青天也梁元帝詩還思逢樂廣能令雲霧褰駱賓王詩情披樂廣天杜詩天宇清霜浄公堂宿霧披謝丁制置惠夀詩塵外花村已辱春風之一曲雪邊蓬矢又勤秋月之兩章拜君貺以何多揆余初而增感並見前恭惟某官詩書元帥翰墨宗工歴井捫參憐長庚之伴月韓詩東方半明大星沒獨有太白配殘月東坡詩天留殘月伴長庚又長庚到曉空陪月簸箕挹斗笑韓子之生辰見前既貽一倡之三禮記清廟之瑟朱絃而䟽越一唱而三歎復畀七言之二拊躬感槩郭解傳隂賊感槩師古曰感意氣而立節槩朱博傳好感槩之士拜賜駢蕃左傳晉人以為拜賜之師又便蕃左右亦是率從某政爾避喧沈隱侯集從宦非宦侣避世非避喧又蒙委重見前自為青城客愧擬住之未能杜詩自為青城客不唾青城地為愛丈人山丹梯近幽意又縁雲擬住最高峰詳上條贈我翠織成欲捲還而安敢杜詩客從逺方來遺我細織成領客珍重意顧我非公卿留之懼不祥施之混柴荆錦鯨巻還客始覺心和平互見前回賀生日戊子按戊子為理宗紹定元年詳啓意是年梅亭年五十五遡其生乃孝宗乾道十一年嵗在乙未此啓倅武岡作生我勞瘁揆初度以增悲俾爾熾昌受徽言而重愧並見前嘗已戒門而絶璧韓文一見即戒門以絶猶蒙擲地以鏗金孫綽傳綽作天台山賦示范榮期曰卿試擲地當作金石聲詳别見李嶠詩乍有凌雲勢時聞擲地聲恭惟某官厚德嘘枯英文發藻俱見前憐香山花前之嵗正可閒行白樂天詩前年花前五十二今年花前五十五儻年七十猶强健尚得閒行十五春吟老坡月下之風不妨同坐東坡詞閒倚胡床庾公樓外峯千朶與誰同坐明月清風我某自笑朱愚老為黔佐俱見前問昌黎之南斗乘除難挹於酒漿三星行斗不挹酒漿又名聲相乘除詳見前歌靈均之東皇偃蹇漫陳於竽瑟屈原九歌東皇太乙云陳竽瑟兮浩倡靈偃蹇兮姣服回武官賀生日勞我以生卻青雲於垂上莊子夫大塊載我以形勞我以生佚我以老息我以死劉禹錫詩青雲直上無多路却作斜飛取勢回愛人以德歌白雪以彌高禮記君子愛人以德餘見前感及爾同僚之私詩我雖異事及爾同僚增揆余初度之愧見前恭惟某官共武之服詩有嚴有翼共武之服共武之服以定王國注服事也言今師之羣帥有威嚴者有恭敬者而共興是兵言文武之人備克壯其猷詩方叔元老充壯其猷注見前談笑詞鋒足當八靣劉禹錫詩鮮有一身兼將相更能八靣占文章高僧傳道標詩章比之潘陸當時吳興有清晝㑹稽有靈澈語曰霅之晝儲清秀越之徹洞氷雪杭之標摩雲霄每飛章寓韻竹夕花時彼三上人者當四靣之敵緒餘筆陣亦掃千軍杜詩筆陣獨掃千人軍有憐桑弧蓬矢之辰見致松茂竹苞之祝詩秩秩斯干悠悠南山如竹苞矣如松茂矣注苞本也言時民殷衆如竹之本生矣其佼好又如松柏之暢茂矣此借用某不能返璧又乏報瓊人情欲夀欲安尚徼餘芘君子善頌善禱但恥過情並見前代回曾運使生我劬勞廢蓼莪而興感東坡啓雖大人占斯干之夢喜獲嘉言而弟子廢蓼莪之篇難忘永慕俾爾耆艾攬茹惠以增慙楚辭攬茹惠以掩泣兮霑余襟之淋浪敢圖高情見畀妙語恭惟某官文得家法儒林傳序各以家法教授後漢徐防傳博士弟子皆以意説不修家法左雄傳諸生試家法注儒有一家之學故稱家句逼古人憐牛斗之不神了無善狀見前因參辰之相比借以餘光法言吾不觀辰參之相比也是以君子貴遷善注參辰三星名晉語董史曰公子重耳以辰出而參入言重耳以驪姬之難出晉當辰于外十九年入晉當參也參辰出沒不相比列而重耳象之終免其禍左傳子産曰昔高辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討君帝不臧遷閼伯於商邱主辰商人是因故辰為商星遷實沈于大夏主參唐人是因故參為晉星山谷詩徒言參隔辰摛藻粲然噓枯厚甚某不知所賀藏弆為榮並見前八千為春盡自原本闕四字徽本作冥靈之嵗改盡自二字為敢望今按八千嵗為春乃大椿非㝠靈也五十而慕但激終身之思代回安撫趙尚書師􅋷賀生日宋史趙師􅋷字從善和州防禦使伯驌之子燕懿王之後舉進士第歴官兵部尚書以附韓侂胄為士類所鄙按􅋷古擇字故字從善師􅋷四尹臨安皆有能聲知鎮江府亦有善政今碑碣尚存以撻武學生柯子冲盧宣德故為兩學士子所譟其鷄鳴犬吠之誚葢誣之也白獺髓云㑹稽郡治有賢牧堂祀范文正公趙清獻公翟忠惠公朱忠靖公趙忠簡公史越王浩張毘陵守儀從善帥浙使門吏諭耆宿經倉憲兩司陳乞于州治賢牧堂增從善像一時奉承從請有題詩于堂曰師􅋷隨衆入祠堂要學朱張與趙王大家飛上梧桐樹自有傍人説短長蒲栁既凋又届始生之日蓼峩罔極滋深弗洎之思特達高情勤渠下問俱見前置慙無所陳書蕭摩訶傳老夫受脤專征不能戰勝攻取今被圍迫慙寘無地懷感有之恭惟某官曵履公餘鄭崇傳每見曳革履詳見前鳴謙私惠憐絳人之甲子混在泥塗記孟陬之庚寅撫其遲暮並見前函牋甚寵臺餽孔殷某祗佩眷存但深銜戢陶詩銜戢知何謝㝠報以相貽取公竹馬愧請謝之未能殷浩傳浩敗桓温謂人曰少時吾與浩共騎竹馬我棄去浩輒取之固當出我下也投我木桃復報章之不稱見前代回衆官賀生日皇揆余以初度内美闕然離騷紛吾既有此内美兮又重之以修能牛與斗兮不神善名安有三星行無善名已聞無惡聲已讙餘見前過勤妙語秪發愧情恭惟某官嬉笑文章宋史蘇軾傳軾自言作文如行雲流水初無定質但常行於所當行止於所不得不止雖嬉笑怒罵之詞皆可書而誦之其體渾潤光芒雄視百代自有文章以來葢亦鮮矣山谷贊東坡像云嬉笑怒罵皆成文章解羈而歸紫㣲玉堂游戲翰墨東坡詩退之仙人也游戲于斯文山谷墨竹賦游戲翰墨龍蛇起陸摩挲銅狄欲相許以乆長後漢書薊子訓傳有百嵗翁自説兒童時見子訓賣藥於㑹稽市顔色不異于今後人復于長安東覇城見與一老人共摩挲銅人相謂曰適見鑄此而已近五百嵗矣注魏文帝黄初元年徙長安金狄重不可致因留霸城南刻畫無鹽殊不知其老醜周顗傳何乃刻畫無鹽唐突西施詳見前杜詩舉動見老醜又老醜難翦拂又自覺成老醜又親故傷老醜此意厚甚而我謂何某返璧未能報瓊無有此乃相親重道拜而受之韓文此乃相親厚之道耳非所以待足下者也何敢當不類歌顔之厚矣山谷詩向侯贈我菁莪何敢當不類歌詳見前詩巧言如簧顔之厚矣代囘道士賀生日勞我以生能嬰兒之除滌莊子大塊勞我以生老子能孾兒滌除𤣥覽河上公注能如嬰兒内無思慮外無政事則精神不出洗其心使潔静居𤣥㝠之處覽知萬事故謂之𤣥覽游方之外笑老子之婆娑莊子彼游方之外者也陶侃傳老子婆娑正坐公輩詳見前佳句惠然私情媿甚恭惟某人簸弄明月韓詩簸弄明月珠頡頏飛霞韓詩乞君飛霞佩與我高頡頏指石鼎於爐中便成聯句韓文石鼎聯句詩序衡山道士軒轅彌明舊與劉師服進士相識夜抵其居宿有校書郎侯喜新有能詩聲夜與劉説詩彌明在其傍視之若無人彌明指爐中石鼎謂喜曰子言能詩能與我賦此乎用榴皮於壁上豈不中書東坡詩止用榴皮縁底事中書君豈不中書詳見前見畀名章有光初度某偶差一念東坡詩我本三生人疇昔一念差獻笑諸公飲馬麾蛟朢崦嵫而勿迫楚辭飲余馬於咸池兮總余轡乎扶桑麾蛟龍使津梁兮詔西皇使渉余吾令羲和弭節兮朢崦嵫而勿迫踞龜食蛤與汗漫以相期見前代囘僧賀生日拖泥帶水若為還我之未生山谷䟦渡水羅漢畫云阿羅漢皆具神通何至拖泥帶水如此賞月吟風更愧情人之相訪僧圓澤詩三生石上舊精魂賞月吟風不要論慙愧情人逺相訪此身雖異性常存恭惟某人句中有眼山谷詩拾遺句中有眼彭澤意在無絃陳後山詩句中有眼黄别駕洗滌煩熱生清涼冷齋夜話造語之工至于荆公東坡山谷盡古今之變荆公云江月轉空為白畫嶺雲分瞑與黄昏又云一水䕶田將緑遶兩山排闥送青來東坡海棠詩云只恐夜深花睡去高燒銀燭照紅粧又云我擕此石歸袖中有東海山谷曰此皆謂之句中有眼學者不知此妙語韻終不勝又山谷題法帖云余嘗評書字中有筆如禪家句中有眼至如右軍書如湼槃經説伊字具三眼也張于湖詩句中有眼悟方知悟處還同病著錐一箇機闗無兩用烏窠拈起布毛吹筆下無痕應憐生朝認本來之靣目法寳壇經不思善不思惡正與麽時那箇是明上座本來靣目東坡詩一任秋霜換鬢毛本來靣目還如故雖脱死籍當自揣於頭顱特贈以言足華其老俱見前某似僧有髮在俗得禪福德三昧經若有菩薩作是三昧雖在家當説是人名為出家烏窠禪師謂㑹通禪師曰汝若得浄智圓妙體自空寂即真出家何假外相汝當為在家菩薩戒施俱修東坡詩平生寓物不留物在家學得忘家禪庵外松枝覺嵗華之難數庭前栢樹或祖意之少分傳燈録趙州觀音院從諗禪師有僧問如何是祖師西來意師曰庭前栢樹子僧曰和尚莫將境示人師曰我不將境示人曰如何是祖師西來意師曰庭前栢樹子回張縣尉煥五十學易闕然觀我之生易觀六三觀我生進退九五觀我生君子旡咎七歩成章厚甚揆余之度世説曹子建七歩成章世目為繡虎又文帝嘗令東阿王植七歩中作詩不成者行大法應聲便為詩曰煮豆持作羮漉䜴以為汁箕在釡下然豆在釡中泣本是同根生相煎何太急漫叟詩話曹子建七歩詩世傳煮豆然豆箕豆在釡中泣一本云萁向釡下然豆在釡中泣其工拙淺深必有能辨之者任昉竟陵王行狀淮南取貴於食時陳思見稱于七歩北史魏收傳閔帝立妙選近侍詔試收為封禪書收下筆便成不立藁草文將千言所改無㡬時黄門郎曹思同侍立深竒之白帝曰雖七歩之才無以過此新唐書栁公權傳公權從幸未央宫帝駐輦曰朕有一喜邊戍賜衣乆不時今中春而衣已給當賀我以詩宫人迫之公權應聲成文婉切而麗令再試復無停思天子甚悦曰子建七歩爾乃三焉唐中宗詩雄才七歩謝陳王顧切劬勞之感敢當頌禱之私恭惟某官簮笏名家陳子昻集屈富貴于沉㝠雜薜蘿于簮笏韓詩簮笏自懷繃弓刀小隱唐詩大雪滿弓刀單于夜遁逃東坡詩使君夕不坐衙門散弓刀山谷詩騎從嚴弓刀又弓刀陌上朢行色又昨解弓刀丞太僕又巻旗解弓刀王康琚詩小隱隱陵藪大隱隱朝市擬姑孰之十詠肯為東野之酸姑孰即今太平府李白有姑孰十詠詩謂姑孰溪丹陽湖謝公宅凌敲臺桓公井慈姥山望夫山牛渚磯靈虚山天門山也東坡志林云過姑孰堂下讀李白十詠疑其語淺陋不類太白孫邈云聞之王安國此李赤詩秘閣下有赤集此詩在焉白集中無此赤見栁子厚集自比李白故名赤卒為厠鬼所魅而死今觀此詩止如此而自比太白必其人心疾已乆非特厠鬼之罪陸務觀入蜀記云太白姑孰十詠東坡自黄州還過當塗讀之撫掌大笑曰贗物敗矣豈有李白作此語郭功父爭以為不然東坡笑曰但恐是太白後身所作耳功父甚愠盖功父少時詩句俊逸前輩或許之以為太白後身功父亦遂以自負東坡因是戲之或曰十詠本非太白詩宋次道再編時貪多務得之過也韓詩有窮者孟郊受材實雄驁酸寒溧陽尉五十幾何髦師廬陵之諸賢尚接西江之派見前值分隣燭西京雜記匡衡勤學而無燭隣舍有燭而不逮乃穿壁引其光以書暎光而讀之駱賔王啓漏㣲潤于江波流末光於隣燭見貺門弧見前某德既多凉左傳虢多凉德注凉德薄德也官仍獨冷見前弟子有笑于列者雖未見治進學解言未既有笑于列者又冗不見治鄉人皆好之何如莫知所報回同官預賀夀詩生我勞瘁隔彌月之實訏詩誕彌厥月又實覃實訏注誕大彌終也后稷之在其母終人道十月而生訏王遇切大也謂張口嗚呼也俾爾熾昌荷祈年之孔夙詩祈年孔夙方社不莫注我祈豐年甚早此借用餘見前感高情之見厚豈善頌之敢當恭惟某官義篤官聯周禮太宰以八法治官府三曰官聯以㑹官治注聯非一官也禮隆僚好憐絳縣老人之辱越在泥塗加黄絹㓜婦之辭寵其遲暮並見前及差科之未動韓詩白布長衫紫領巾差科未動是閑人麥苗含穗桑生葚共向田頭樂社神勞朋友之先施某既感且慙罔知所報人生不滿百孰非欲夀而欲安選詩人生不滿百常懷千嵗憂天下達尊三各願彌高而彌劭法言年彌高而德彌劭者是孔子之徒歟注劭美也亦高也回鄉官上夀庚寅按庚寅為理宗紹定三年梅亭時年五十七伏以我生之辰與王𤓰而同日三星行我生之辰月宿南斗禮記孟夏之月王𤓰生注王𤓰萆挈也通志曰王𤓰曰土𤓰曰􅀈姑曰鉤􅕕曰菲芴均房間曰老鴉𤓰又曰莵𤓰其根可生食類𤓰故得𤓰名而鄭𤣥以為菝葜誤矣圖經以為生平野田宅及墻垣葉似括樓烏藥圓無了缺有毛如刺蔓生五月開黄花花下結子如彈丸生青熟赤根似葛細而多糝又名土𤓰一名落鵶𤓰今藥中所用也鄭𤣥以為即萆挈本草作菝葜王氷王𤓰生作赤葥生即此也以色赤故耳物出於甲奈雌木之非材漢律厯志出甲于甲史記甲者言萬物剖符甲而出也説文甲位東方之孟陽氣萌動從木載孚甲之象餘見前何勤黄絹㓜婦之辭更為絳縣老人之祝恭惟某官英文發藻厚德嘘枯並見前五十七之歸遲每憐白傅白樂天詩我年五十七歸去誠已遲二千石之强直俯念朱卿朱穆傳再遷臨淮太守吏民愛畏為之歌曰彊直自遂南陽朱李吏畏其威民懷其惠假以徽言寵其初度某不知所賀藏去為榮吾黨小子之斐然乏瓊琚之效報並見前是邦大夫之賢者希藥石以相生左傳臧孫曰季孫之愛我疢疾也孟子之惡我藥石也美疢不如藥石夫石猶生我疢之美其毒滋多囘謝同官投詩五十七之歸遲愧見唐人之句見上條萬有千之無害敢當魯頌之歌詩萬有千嵗眉夀無有害何勤黄絹㓜婦之辭更為蒼顔太守之祝醉翁亭記蒼顔白髮頽然乎其間者太守醉也恭惟某官薄雲高誼見前翻水成文韓詩文如翻水成初不用意為及爾同寮喜參辰之相比見囘曽運使條揆余初度笑牛斗之不神贈以徽言極其善頌某自憐雌甲難問長庚匪莪伊蒿但感劬勞之罔極並見前有枤之杜敢希守衛之勤歸詩序采薇遣戍役也文王之時西有昆夷之患北有玁狁之難以天子之命命將帥遣戍役以守衛中國故歌采薇以遣之出車以勞還枤杜以勤歸也詩有枤之杜有睆其實王事靡盬繼嗣我日枤大計切音悌説文樹貌正義云有枤然特生之杜囘士人投生日詩生我劬勞曾莫報昊天之德俾爾昌熾詎敢當泮水之歌有勤黄絹之辭但重朱絃之歎伏惟某官文如翻水並見前思若涌泉新唐書蘇頲傳中書令李嶠曰舍人思若涌泉吾所不及憐白傅五十七之齡已遲歸計見囘鄉官上夀條比絳人三分一之數大似疑年見謝黄侍郎條贈以徽言寵其初度某不知所賀藏弆為榮愛之欲其生倍有加於布帛見謝通判以下條施不求其報愧莫辦于瓊琚文帝紀昔者先王逺施不求其報望祀不祈其福回三江文將仕誦白傅五十七之詩己遲歸計見前辱魯侯萬有千之頌俾試夀胥詩黄髮台背夀胥與試注胥相也夀而相與試謂講氣力不衰倦詳見前愧非所蒙竊願有復恭惟某官瑰文發藻瓊翰嘘枯並見前贈汝好辭磨厲桑蓬之志左傳摩厲以須揆余初度堅凝松栢之心得非愛之欲其生所謂交以乆其道栁文與李睦州服氣書友者欲乆存其道客者欲乆存其利宗族姻婭欲乆存其戚閨門之内子姓親眤欲乆存其恩臧獲僕妾欲乆存其主將卒胥吏欲乆存其勢某自憐單獨倍感劬勞維摩想日邊之朝難陪雄甲謫仙尋夜郎之夢且伴長庚並見前回學職二十四人投詩香山五十七嵗歎歸計之已遲見前凌煙二十四賢惠歌詩之不類唐凌煙閣在西内太極宫三清殿側太宗貞觀十七年二月圖功臣於凌煙閣秦瓊傳十七年詔長孫無忌河間孝王恭杜如晦魏徵房𤣥齡尉遲敬德李靖蕭瑀段志𤣥劉𢎞基屈突通殷開山許紹長孫順德張亮侯君集張公謹程知節虞世南劉政㑹唐儉李勣高士亷秦叔寶圖形凌煙閣揆余初度懷我好音詩食我桑黮懷我好音伏惟某官氣應嵗躔漢律厯志斗十二度大雪牽牛初冬至婺女八度小寒危初大寒危十六度立春營室十四度驚蟄奎五度雨水婁四度春分胄七度穀雨昴八度清明畢十二度立夏井初小滿井十六度芒種井三十一度夏至栁九度小暑張三度大暑張十八度立秋翼十五度處暑軫十二度白露角十度秋分氐五度寒露房五度霜降尾十度立冬箕七度小雪才堪郎署杜氏通典都堂之東有吏部户部禮部三行每行四司左司統之都堂之西有兵部刑部工部三行每行四司右司統之凡二十四司分曹共理而天下之事盡矣按二十四司謂吏司封司勲考功户度支金部倉部禮祠部膳部主客兵職方駕部庫部刑都官比部司門工屯田虞部水部比周家八士之數價喜倍三韓文伯樂一顧價增三倍較魯頌四篇之文數幾用六詩魯頌駟有駜泮水閟宫凡四篇禮記其數六冠以鱣堂之序寵茲鯉饋之辰小人不知紀年自丼雌甲君子善為頌禱誤擬長庚並見前列磬編鐘列磬編鐘皆二十四詳見前舂金撼玉韓詩金舂撼玉應厥臭劇蘭鬱某自慙一喙喙許穢切音與未韻諱同説文口也栁文余雖家置一喙以自稱道詬益甚耳莫辦七襄孰殺子産吾其與之幸可免輿人之誦左傳子産從政一年輿人誦之曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産教之我有田疇子産殖之子産而死誰其嗣之守得陽公民又賢也所希篤同業之盟韓文送何堅序堅以進士舉于吾為同業堅道州人道之守陽公賢也堅為民堅又賢也詳見前回同官上夀詩詞揆余初度終身惟切於慕親及爾同僚君子顧多於善頌過情可恥佩意亦勤伏惟某官義篤官聯材雄筆陣憐白傅五十七之感歸計已遲比絳老三分一之年輿人何筭並見前既加膏沃韓文加其膏而沃其光復借品題某自顧衰殘難當奬予加桑弧於蓬矢之六空走四方報綺琴以南金之雙僅慿尺牘並見前回衆官賀生日詩癸已按癸已為理宗紹定六年時梅亭年六十蘧伯六十之年重感劬勞於初度莊子蘧伯玉行年六十而六十化魯侯萬千之頌難當襃拂之徽言無容屣履以迎門正恐文書之銜袖拜珠璣之終惠列鐘磬以成編並見前恭惟某官直氣抗峨蜀都賦帶二江之雙流抗峩眉之重阻英詞倒峽杜詩詞源倒流三峽水濯錦江之錦洗空黄絹之絲宋郡縣志初李氷既鑿離堆又開二渠一渠由永康過新繁入成都謂之外江一渠由永康過郫入成都謂之内江蜀人以此水濯錦鮮明故又名錦江撫琴臺之琴高掩朱絃之瑟琴臺在今成都府西南五里漢司馬相如宅益部耆舊傳少城中笮橋下有琴臺十道志果州左濵西漢水叢薄蔚然名相如琴臺寰宇記在華陽縣市橋西成都志在浣花溪之海安寺南今為金花寺城内非其舊成都記琴臺院以司馬相如琴臺得名而非相如舊臺在浣花溪正路金花寺北相號海安寺梁蕭藻鎮蜀増建樓臺以備游觀元魏伐蜀下營于此掘為塹得大甕二十餘盖所以響琴也隋蜀王秀更増五臺并舊為六杜詩茂陵多病後尚愛卓文君酒肆人間世琴臺日暮雲餘見前厚同官為僚之義左傳同官為僚忘歌詩必類之言見前使臣弗敢與聞固以王宅憂之故尚書王宅憂諒陰人情莫不欲夀且懷祝矯舉之羞左傳今民餒而君逞欲祝史矯舉以祭臣不知其可也言祝史詐稱功德以欺鬼神某莫報七襄但藏十襲今日之受非也璧恐暗於投人忠告而善道之石尚期於生我左傳石猶生我詳見前其為感佩罔既敷陳回諸㕔屬官賀生日五十人人衆難以徧謝遂以五十起義此作文一法生我劬勞永負綵衣七旬之養列女傳老萊子孝養二親行年七十作嬰兒自娛著五采斒斕衣嘗取漿上堂跌仆因卧地為小兒啼或弄雛鳥于親側俾爾耆艾敢當錦瑟五十之絃史記封禪書天帝使素女鼔五十絃瑟而悲帝禁不止故破其瑟為二十五絃李商隱詩錦瑟無端五十絃良感同僚之盡心左傳吾嘗同僚敢不盡心乎詳見前曷稱高文之大册西京雜記廊廟之下朝廷之中高文典册用相如恭惟某官文濯江漢筆抗岷峨四揲二分洞庖犧大衍之數繫辭大衍之數五十其用四十有九分而為二以象兩卦一以象三揲之以四以象四時又古者庖犧氏之王天下也仰則觀象于天俯則觀法于地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦揲食列切説文閲持也廣韻數蓍正義云揲之以四以象四時者分揲其蓍皆以四四為數分而為二以象兩者以四十九分而為二庖犧太昊伏羲氏大演者衍天地之數五十者謂十日十二辰二十八宿也三章九㫖合公羊外傳之篇三章當作三科公羊訓詁解十二巻漢司空掾任城何休撰春秋公羊䟽以何氏三科九㫖為宗本其説曰何氏之意三科九㫖正是一事總而言之謂之三科析而言之謂之九㫖新周故宋以春秋當新王此一科三㫖也所見異辭所聞異詞所傳聞異辭此二科六㫖也内其國而外諸夏内諸夏而外夷狄此三科九㫖也又云三科者一曰張三世二曰存三綂三曰異内外九㫖者一曰時二曰月三曰日四曰王五曰天王六曰天子七曰譏八曰貶九曰絶時與日月詳略之㫖也王與天王天子是録逺近親䟽之㫖也譏與貶絶則輕重之㫖也藝文志公羊傳十一巻外傳五十篇章句三十八篇皆公羊之學也按此一聫乃借大衍公羊以影五十之數有憐揆初寵貽善頌考華陽之志復見三州之後賢享穆叔之歌敢忘五善之重拜某捲還不敢藏弆為榮虀臼外孫荷假長庚之光燄桑弧男子丼付雌甲於泥塗並見前回魏制幹賀生日老瞻南極違入丁出丙之躔漢天文志狼比地有大星曰南極老人晉天文志老人一星在弧南常以秋分之旦見于丙春分之夕沒于丁見則治平主夀昌常以秋分候之南郊詩夢西堂愧换甲生申之句南史謝惠連十嵗能屬文族兄靈運嘉賞之云常于永嘉西堂思詩竟日不就忽夢見惠連即得池塘生春草大以為工有勤親誼見畀英辭恭惟某官挺有祖風魏謩傳贊謨之論議挺挺有祖風烈卓為人鑑老者人所敬為近於親東方朔傳老者人所敬也禮記敬老為其近於親也愛之欲其生俾昌而熾對兩章之秋月藹多態之春雲並見前某倚玉知慙世説魏明帝使后弟毛曾與夏侯𤣥共坐時人謂蒹葭倚玉樹報瓊何有沉香吟芍藥之調詎敢與聞李翰林别集序開元中禁中初重木芍藥得四本上因移植於興慶池東沉香亭前㑹花方繁開上乘照夜車太真妃以歩輦從詔選黎圉子弟中尤者得樂一十六色李龜年以歌擅一時之名手捧檀板押衆樂前將欲歌之上曰賞名花對妃子焉用舊樂詞命龜年持金花牋宣賜翰林供奉李白立進清平調詞三章白欣然承㫖援筆賦之逺志有當歸之心尚希愛助吳志曹公問太史慈遺書一篋發看無所道但貯當歸魏氏春秋異同姜維得母書并當歸維曰良田百頃不在一畆但有逺志不見當歸其背義狥利如此古詩曰上山採蘼蕪下山逢故夫崔豹古今注牛亨問董仲舒曰將離相贈以芍藥者何答曰芍藥一名可離故將別贈之亦猶相招贈以文無文無一名當歸也以夫當歸故下山逢之爾如藁砧刀頭之義也沉香芍藥逺志當歸用四藥名回黄侍郎伯固賀生日白鶴新居有頽景六十一之歎東坡詩已買白鶴峰規作終老計又我年六十一頽景薄西山碧鷄老客無廣厦千萬間之思見前敢意達尊特形善頌恭惟某官疇庸參井栁文皇天疇庸審厥保承蜀郡井鬼分野入參一度趣覲房心周禮䟽房心天帝明堂天文志房心為明堂又房心天子宫也注天子布政之宫文獻通考心六度一名大火天王位也中星曰明堂為大辰天子之正位也草蟲阜螽之勞還自天子所詩序出車勞還率也詩我出我車于彼牧矣自天子所謂我來矣又喓喓草蟲趯趯阜螽未見君子憂心忡忡注草蟲鳴阜螽躍而從之天性也喻近西戎之諸侯聞南仲既征玁狁將伐西戎之命則跳躍而鄉朢之自從也有人從王所來謂我來矣謂以王命召已使為將帥也木牛流馬之積困哀我人斯詩哀我人斯亦孔之將又哀我人斯于何從禄有憐花甲之周曲借虀辛之妙見前某未知淑後况敢揆初錦城早還徒仰夏官之典午李詩錦城雖云樂不如早還家典午謂司馬蜀志譙周傳嘗書版示文立曰典午忽兮月酉沒兮典午司馬也月酉八月也至八月而司馬文王崩王導傳贊典午發蹤本于陵寡恭帝紀贊宋高非典午之臣孫恩豈金行之冦賈充傳贊當塗闕翦公閭笠實肆其勞典午分崩南風亦盡其力周書庾信傳居轂而掌兵出蘭池而典午韓詩甚慙典午非材職清溪夜發或思伴秋月之長庚李詩夜發清溪向三峽東坡詩天留明月伴長庚回魏機宜賀生日糟糠之堂偶當初度宋𢎞傳貧賤之知不可忘糟糠之妻不下堂芙蓉之褥猥辱英詞杜詩屏開金孔雀褥隱繡芙蓉非所宜蒙竊願有復見前恭惟某官句穿月脅見前筆掞天庭李詩秀句滿江國高文掞天庭借泛霞之光轉而白雪十洲記景雲燭日朱霞流光攬浣溪之水寫以烏絲浣花溪在成都府西南五里吳中復冀國夫人任氏碑記夫人㣲時見一僧墮汚渠為濯其衣百花滿潭因名其潭曰涴花唐妓薛濤家潭旁以水造紙為十色箋李商隱詩浣花牋紙桃花色即此烏絲見謝都大惠生日詞條所愧瓦磚之牀詩乃生女子載寢之地載衣之裼載弄之瓦後漢書列女傳古者生女三日卧之牀下弄之瓦塼而齋告焉毛傳瓦紡磚也箋云紡塼其所有事于紡績也曷副珠璣之詠但深十襲莫效七襄並見前代胡尚書回趙編脩二日栗烈寒但感於寘冰詩一之日觱發二之日栗烈又誕寘之寒冰鳥覆翼之鳥乃去矣后􅀈呱矣五雲郁紛文乃工於翻水韋陟傳自謂所書陟字若五朶雲時人慕之號郇公五雲體史記郁郁紛紛蕭索輪囷是謂卿雲韓詩文如翻水成初不用意為物將其意愧在于肝東坡詩有愧在其肝恭惟某官有偉宗英叙傳禮樂是脩為漢宗英入倍廟筭孫五子兵未戰而廟筭勝者得筭多也未戰而廟筭不勝者得筭少也潘岳賦定廟筭之勝負駕輕就熟問津槐棘之榮噓枯吹生假寵桑蓬之賤粲然駢儷幸此衰遲並見前郭令二十四考之書此言何為至我董仲舒傳此言何為至于我哉魯侯萬有千嵗之頌所有更以贈君山谷詩君家所有更贈君餘並見前回漢川劉教授大川漢川見太守類鴈塔聯名料有感屏中之鶴南部新書韋肇初及第偶于慈恩塔下題名後進慕效之遂成故事詳見别鯉庭寘饋何足惠堂下之鱣或承之羞不知所賀並見前恭惟某官世家政駿劉向字子政子歆字子駿師友卿雲舊憶杏園同走馬看花之賞杏園在曲江池西長三十里唐進士錫宴于此摭言神龍以來杏園宴後皆于慈恩寺塔下題名唐武宗禁曲江亭宴聚大中元年正月敕進士放榜後杏園依舊宴集宋張茂中游城南記云杏園與慈恩寺南北相值唐新進士遊宴于此樂史撰杏園集十巻劉滄詩及第新春選勝游杏園初宴曲江頭孟郊詩春風得意馬蹄疾一日看徧長安花餘見前近懷蘭省共饕蟲爆竹之吟應劭漢官儀尚書郎含鷄舌香伏奏事黄門郎對揖跪受故稱尚書郎懷香握蘭趨走丹墀白帖粉署蘭省山谷詩儀鸞供帳饕蝨行翰林濕薪爆竹聲言同在禮部貢院揆余度之余名離騷肇錫余以嘉名餘見前俾爾耆而爾夀見前君子之言信有證既正而葩左傳叔向曰子野之言君子哉君子之言信而徵故怨逺於民小人之言僣而無徵故怨咎及之韓文易竒而法詩正而葩我生之初尚無為其何能穀詩我生之初尚無為我生之後􅑮此百罹又握粟出卜自何能穀某恭承嘉惠賈誼傳恭承嘉惠兮竢罪長沙倍感故情避葢公之堂願安承教曹參傳膠西有盖公善治黄老言參使人厚幣請之既見盖公為言治道參于是避正堂舍盖公焉推鄭莊之轂但懼罔功漢書鄭當時字莊其推轂士及官屬丞史誠有味其言也師古曰推轂言薦舉人如車輪之運轉也回家縣宰午仲不腆糟糠值此瓦磚之旦何勤翰墨曄然黼黻之詞調固仰於彌高歌亦慙於不類並見前同我婦而饁南畆但切懷歸詩同我婦子饁彼南畆饁炎輒反野饋也跂彼女之織七襄竟成匪報見前婚姻為顯孫通魏宅問名啓了翁禮記昏義昏禮納采問名納吉納徴請期正義曰問名者問其女所生母之姓名故昏禮云謂誰氏言女之母何姓氏也納采問名一使而兼行之言念二姓分野適並舍於魚鳬禮記昏禮將合二姓之好上以事宗廟而下以繼後世也周語嵗之所在則我有周之分野也唐天文志五帝分野與帝車相植揚雄蜀本紀蜀始王曰蠶叢次曰伯雍次曰魚鳬兩家提孩許問津於烏鵲淮南子烏鵲填河而渡織女庾肩吾詩倩語雕陵鵲填河未可飛宋之問明河篇鴛鴦機上踈螢度烏鵲橋邊一鴈飛又奔龍多渡月飛鵲亂填河沈叔安詩彩鳳齊駕初成輦雕鵲填河已作梁王建七夕曲遥愁今夜河水隔龍駕車轅鵲填石李商隱詩豈能無意酬烏鵲唯與蜘蛛乞巧絲又鸞扇斜分鳳幄開星橋横過鵲飛廻唐彦謙詩天外鳳凰何寂寞世間烏鵲謾辛勤李郢詩烏鵲橋頭雙扇開年年一度過河來杜審言詩天􅒯兎欲落河曠鵲停飛李嶠詩查來人泛海橋渡鵲填河仰丼棠之有笏魏謩傳帝問卿家書詔頗有存者乎謩對唯故笏在詔令上送鄭覃曰在人不在笏帝曰覃不識朕意此笏乃今丼棠愧苦李之無蹊東坡詩顧莪如苦李全生依路傍新唐書李乂字尚真趙州房子人為吏部尚書知制誥與宋璟等同典選事請謁不行時人語曰李下無蹊徑熟固在於地同孟子其地同樹之時又同至於日至之時皆熟矣合殆由於天作詩文王初載天作之合傳載識合配也箋文王生適有所識則為之生配於氣勢之處使必有賢才謂生太姒茲者伏承某官小娘子周旋内則夙閑十七之少儀内則第十二少儀第十七皆禮記篇名而某太學生位長孫某温習中庸詎達三千之曲禮曲禮中庸亦禮記篇名况未策贊皇之名第李德裕傳徳裕宰相子少力於學既冠卓犖有大節不喜與諸生試有司以䕃補官乃竊附公子之婚姻史記信陵君傳平原君讓魏公子曰勝所以自附為婚姻者以公子之高義為能急人之困也亦惟陪萬里之游萬里橋在成都因得合二姓之好見上文卜妻占八世克恊鳳飛之鳴左傳懿氏卜妻陳敬仲其妻占之是謂鳳皇于飛和鳴鏘鏘八世之後莫之與京勸郎勤六經寔朢鷄鳴之戒杜詩客來洗粉黛日暮拾流螢不是無膏火勸郎勤六經詩序鷄鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉為顯孫通魏宅納采啓了翁禮記正義曰納采者謂采擇之禮故昏禮云下達納采用鴈也必用鴈者白虎通云鴈取其隨時而南北不失節也又是隨陽之烏妻從夫之義也言念納采問名嘉禮寧嫌於重請儀禮昏有六禮納采問名納吉納徴請期親迎鄭𤣥注曰納采者將為婚必先媒通其言乃後使人納其采擇之禮用鴈為贄取其陰陽往來之義也問名者謂問女名將歸卜之也納吉者卜於廟得吉兆復使往告婚姻之事於是定也納徵者用束帛徵成也請期者謂吉日將親迎謂成禮也周禮大宗伯以嘉禮親萬民居敬行簡省事固厭於兩回東坡詩省事天公厭兩回立春元日併相催不敢虛拘敬將厚意必河之魴必河之鯉亦惟采藻以采蘋詩豈其食魚必河之魴豈其娶妻必齊之姜豈其食魚必河之鯉豈其娶妻必宋之子箋言何必大國之女然後可娶亦娶其貞順而已又于以采蘋南澗之濱于以采藻于彼行潦言秣其馬言秣其駒更冀刈蔞而刈楚詩翹翹錯薪言刈其楚之子于歸言秣其馬翹翹錯薪言刈其蔞之子于歸言秣其駒注翹翹薪貌錯雜也楚雜薪中尤翹翹者我欲刈取之以喻衆女皆貞潔又欲取其尤高潔者秣養也之子是子也謙不敢斥其適已于是子之嫁我願秣其馬致禮餼示有意焉蔞草中翹翹然六尺以上曰馬五尺以上曰駒菲儀不腆别楮是陳請媒書説文媒謀也謀合二姓周禮媒氏注媒之言謀也謀合異類使和成也言念㭊薪匪斧曷諧二姓之歡㭊或作析説文破木也考工記㭊幹詩析薪如之何匪斧不克娶妻如之何匪媒不得正義云言析薪之法如之何乎非用斧不得斫之以興娶妻之法如之何乎非使媒不能得之又詩云伐柯如何匪斧不充取妻如何匪媒不得箋云媒者能通二姓之言定人室家之道釣絲伊緡良借一言之重詩其釣維何維絲伊緡齊侯之子平王之孫注伊維緡綸也其釣魚之法維何以為之乎維以絲為繩則是善釣以興其娶妻之法亦何以為之乎維以禮為之則是善娶况以葭莩之契中山王傳非有葭莩之親師古曰葭蘆也莩其筒中白皮至薄者言其輕薄而附著王莾傳有葭莩之故獲聯榛棗之昬禮記婦人之贄椇榛脯脩棗栗䟽婦人無外事惟初歸用贄以見舅姑故用此六物為摯也椇即今之白石李也榛似栗而小所以用此六物者椇訓法也榛訓至也脯始也棗早也栗肅也婦人有法始至脩身早起肅敬也必知以名為義者左傳云女摯不過榛栗棗脩以告䖍也見榛是䖍始之名明諸物皆取名為義案昬禮婦見舅以棗栗見姑以脯脩其榛椇所用無文遂孫枝攀附之榮傅毅琴賦盖雅琴之麗樸乃升伐其孫枝嵇康琴賦乃斵孫枝准量所任至人攄思制為雅琴周禮孫竹之管鄭注云孫竹竹枝根未生者也東坡集凡木本實而末虛惟桐反之試取小枝削皆堅實如蠟而其本皆中虛空故世所以貴孫枝者貴其實也白樂天詩老去長孫枝東坡詩庭松應長子孫枝王荆公詩籜龍空此見孫枝皆梅葉往來之助劉斧青瑣高議流紅記唐僖宗時有儒士于祐晚歩禁衢于御溝得一脱葉上題云流水何太急深宫盡日閑殷勤謝紅葉好去到人間祐亦題一葉云曾聞葉上題紅怨葉上題詩寄阿誰置溝上流宫女韓夫人得之後帝放宫女三千人祐娶韓成禮各于笥中得葉韓氏賦詩云一聯佳句題流水十載幽思滿壯懷今日却成鸞鳯友方知紅葉是良媒宋龎元英談藪云唐人記紅葉事凡四一本事詩顧况在洛乘興與一二詩友遊苑中流水上得大梧葉題詩云一入深宫裏年年不見春聊題一片葉寄與有情人况明日于上流亦題云愁見鸚啼栁絮飛上陽宫女斷腸時君恩不禁東流水葉上題詩寄阿誰後十餘日有客來苑中又于葉上得詩以示况曰一葉題詩出禁城誰人酬和獨含情自嗟不及波中葉蕩澲乘春取次行一雲溪友議云明皇代以楊妃虢國寵盛宫娥皆頗衰悴不備掖庭嘗書落葉隨御溝水而流云舊寵悲秋扇新恩寄早春聊題一片葉將去接流人顧况著作聞而和之既達宸聽遣出禁内者不少或有五使之號焉顧所和詩即本事詩所記也盧渥舍人應舉之嵗偶臨御溝見一紅葉命僕搴來葉上乃有一絶句置于巾箱或呈于同志及宣宗既省宫人初下詔許從百官司吏獨不許貢舉人渥後亦一任范陽獲其退宫人覩紅葉而吁嗟乆之曰當時偶選隨流不謂郎君收藏巾篋驗其書跡無不訝焉所題詩即流紅記所紀也一玉溪編事侯繼圖嘗倚檻于大慈寺樓時秋風四起忽有木葉飄墜上有詩曰拭翠歛雙蛾為鬱心中事搦管下庭除書成相思字此字不書石此字不書紙書向秋葉上願逐秋風起天下有心人盡解相思死後貯巾篋凡五六年旋與任氏為婚嘗念此詩任氏曰此詩在左綿時書爭得至此余意前三則本一事而傳記者各異耳劉斧流紅記最為鄙妄盖竊取前説而易其名為于祐云本朝詞人罕用此事惟周清真樂府兩用之埽花游云信流去想一葉怨題今到何處六醜詠落花云飄流處莫趂潮汐恐斷紅尚有相思字見得脱胎換骨之妙極矣又太平廣記載北夢瑣言云進士李茵襄陽人嘗遊苑中見紅葉自御溝流出上題詩云流水何太急云云茵收貯書囊後僖宗幸蜀茵奔竄南山民家見一宫娥自云宫中侍書名雲芳子頗有才思茵與之欵接因見紅葉歎曰此妾所題也同行詣蜀具述宫中之事及綿州逢内官田大人識之曰書家何得在此按此事又談藪所未載備記以廣異聞請期書禮記正義請期者謂男家使人請女家以婚時之期由男家告于女家何必請者男家不敢自專執謙敬之辭故云請也女家終聽男家之命乃告之十月在策交月夙契於丙辰五日為期吉日又符於庚午詩五日為期六日不詹注詹至也婦人五日一御箋云婦人過于時乃怨曠五日六日者五月之日六月之日也期至五月而歸今六月猶不至是以憂思又詩云吉日庚午既差我馬注以吉善之日庚午日也宜其孫子宴爾室家敢修一介之尺書見前拱竢八鸞之百兩終軍傳斯拱而竢之耳詩百兩彭彭八鸞鏘鏘䟽韓侯親迎于蹶父之里其迎之時則有百兩之車彭彭然而行每車皆有八鸞之聲鏘鏘然而鳴也代姜寺丞注回史丞相府定親相門有相方託身於槐棘之陰孟嘗君傳相門必有相南史王訓傳訓召見文德殿上目送之謂朱异曰可謂相門有相丞壁負丞敢妄意松蘿之附詩蔦與女蘿施于松栢注女蘿莵絲餘見前䝉以貴而下賤易以貴下賤大得民也聘不腆之若人公羊傳不腆先王之服又不腆先王之器左傳不腆敝邑之禮又靈王求后于齊齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后于諸侯諸侯對曰夫婦所生若而人妾婦之子若而人無女而有姊妹及姑姊妹則曰先守某公之遺女若而人若而人言如常人不敢譽也徼福甚榮左傳君若不忘先君之好惠顧齊國辱收寡人徼福于太公丁公照臨敝邑則猶有先君之適及遺姑姊妹若而人若而人省心知愧恭承某官堦蘭堪佩足繼史魚之風謝𤣥傳譬如芝蘭玉樹欲使其生于堦庭耳離騷紉秋蘭以為佩而某女澗藻可湘粗閑姜鯉之教詩于以採蘋南澗之濱于以湘之維錡及釜湘烹也後漢列女傳姜詩妻者龎盛之女詩事母至孝妻奉順尤篤姑嗜魚膾又不能獨食夫婦常力作供鱠呼隣母共之舍側忽有涌泉每旦輒出雙鯉魚常以共二母之膳居禮絶百僚之重涑水紀聞宰相自唐以來謂之禮絶百僚見者無少長皆拜相少垂手扶之送客未嘗下階客坐稍乆則吏從傍唱曰相公尊重客踧踖起退選詩平生禮數絶式瞻在國楨薛能詩清如氷玉重如山百辟嚴趍禮絶攀嚴維詩禮數自憐今日絶風塵空記往來歡令好合二姓之驩見前君子不施其親已敬佩魯公之訓史浩先封魯公公侯必復其始願益綿魏國之封左傳合而能固安而能殺公侯之卦也公侯子孫必復其始史浩進封魏王四六標準巻十四, SBCK: ''}
