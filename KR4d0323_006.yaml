body:
  text: 四六標準巻六宋李劉撰通交代代董侍郎居誼囘聶制置子述聶子述建昌府南城縣人紹熈中進士官至吏部侍郎尋以制置出帥西蜀已而致仕歸適有盗殺郡守朝廷遣將欲屠城子述單騎至麾下力陳民寃乃止殺其渠魁民頼以安卒諡文定按宋史寧宗嘉定十二年春正月召董居誼詣行在以新利州路安撫使聶子述為四川制置使二月董居誼自利州遁夏四月紅巾賊張福入利州聶子述遁殺總領楊九鼎董居誼落職奪三官五月召聶子述詣行在聮鑣北闕不得同父母之邦韓詩即是聮鑣向闕時分閫西垂兹又託子孫之契陲是為切本作垂説文逺邊也尚書西垂注垂逺外之名左傳虔劉我邊垂庾亮傳吾憂西陲過于歴陽杜詩起予幸斑白因是託子孫童蒙訓曰同僚之契交承之分有兄弟之義至其子孫亦世講之前輩專以此為務今人知之者蓋少矣王元之詩古人重交代子孫不相忘頓足欲舞文選頓足起舞抗首髙歌東坡詩我聞其來喜欲舞盥手修辭盥古玩切説文澡手也左傳奉匜沃盥増韻以盆沃洗曰盥恭惟某官節凜松筠儲光羲詩特逹踰珪璋節操方松筠識髙蓍蔡蔡龜名食貨志元龜為蔡一曰出蔡因以為名法言樗里子之智也使其知國如知葬則吾以疾為蓍龜韓詩刺史肅蓍蔡有謀猷則順於外孰窺省闥之功尚書爾有嘉謀嘉猷則入告爾后于内爾乃順之於外汲黯傳願出入禁闥補過拾遺非仁義不陳於前親結冕旒之眷杜詩萬國衣冠拜冕旒柳詩天冕垂前旒兹峻登瀛之歩唐禇亮傳太宗為天䇿將軍寇難旣平於是以杜如晦房𤣥齡等十八人命圖其像使亮為之贊號十八學士分為三番遞宿閣下給珍膳天下傾慕謂之登瀛洲載馳諭蜀之車司馬相如傳乃遣相如責唐蒙等因諭告巴蜀民以非上意騎火照山紅奏功伊邇韓詩西來騎火照山紅夜宿桃林臘月中手把命珪兼相印一時重疊賞元功詩不逺伊邇雪嶺界天白借重方深雪山在威州西南一百里與乳川白苟嶺相連山有九峯上有積雪春夏不消杜詩雪嶺界天白錦城曛日黄佇展壯猷進膺顯册某久於蚊負甚矣䑕窮俱見前糠粃在前安得有告新之政南史傅劌代劉元明為山隂令問元明曰願以舊政告新令尹山藪藏疾尚或希議故之恩左傳山藪藏疾正議云山有木藪有草毒蟲所聚故云藏疾周禮八議一曰議親二曰議故三曰議賢四曰議能五曰議功六曰議䝿七曰議勤八曰議賓通項運使寅孫星臨玉壘李郃傳有二使星向益州分野詳别見玉壘山在灌縣西北二十九里湔水出焉左思賦包玉壘以為宇郭璞江賦玉壘作東别之標杜詩玉壘浮雲變古今冰觧金城趙充國傳馳至金城圖上方略又水觧漕下王人之上諸矦宜復次地官之屬公羊傳王人者何微者也曷序乎諸矦之上先王命也周禮地官其屬六十使臣之拜五善乃肯來天府之雄左傳穆叔如晉晉矦享之歌鹿鳴之三三拜韓獻子使行人子員問之對曰鹿鳴君所嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮于周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜蜀志益州險塞沃野千里天府之土江漢頓清岷峨增重恭惟某官忠為國許周札傳以身許國死而後已孔稚珪詩本持許國志況復武功彰東坡詩許國心猶在匡時術已虛學富家傳聖門服七歲之師新序齊有閭丘卭年十八道遮宣王願仕宣王曰子年尚稚未有咫角驂駒而能服重致逺者也對曰不然昔者顓頊行年十二而治天下秦項橐七歲為聖人師由此觀之卭不肖耳年不稚矣戰國䇿文信矦使張唐相燕弗肯行少庶子甘羅請行之文信矦叱去甘羅曰夫項橐生七歲為孔子師今臣生十二歲于兹矣君其試臣奚遽言叱兵法擅萬人之敵項籍傳書足記姓名而已劒一人敵不足學學萬人敵耳矧在鯉趨之日已聞禽拜之風公羊傳封魯公為周公也周公拜乎前魯公拜乎後筆鋒萬馬之交奔鮑照詩五説窮舌端五車摧筆鋒才刃千牛之立觧見前亷而不劌出幕府之十年劌音媿説文利傷也禮記君子比徳於玉亷而不劌義也杜詩十年出幕府直哉惟清典容臺之三禮尚書夙夜惟寅直哉惟清淮南子夏桀之時容臺振而掩覆注行禮容之臺類要太常曰容臺尚書典朕三禮出登郡冣魏顔斐字文林治為雍州十郡之最入庀郎闈庀普弭切治也又具也左傳官庀其司旋為一節之趨見前盡司六路之餉生財有道立武足兵詩序有常徳以立武事爰趣覲於嚴宸謂亟登於禁甬韓詩龍旂垂天衛雲韶凝禁甬師旅因之饑饉天顧在西蜀志呉使張温來聘温問秦宓曰天有頭乎曰有之曰在何方宓曰詩云乃眷西顧以此推之頭在西方寇恂傳髙祖任蕭何於闗中無復西顧之憂禮樂逺而光華水焉得北杜詩愁邊有江水焉得北之朝爰進木天之直夢溪筆談内諸司舍屋唯秘閣最宏壯閣下穹窿髙敞相傳謂之木天重尋蓬雪之游杜詩欲奪蓬婆雪外城歴井捫參昔既依蓮於緑水見前張箕舒翼今將轉粟於青天張衡東京賦鵝鸛魚麗箕張翼舒王濟注鵝與鸛皆陣名魚麗陣勢箕張翼舒亦陣之名杜詩轉粟上青天寧須漕軵之淹軵音冗説文反推車令有䂤付也一曰輕車也淮南子軵車而餉馮奉世傳再三發軵既報賦輿之總左傳羣臣率賦輿為魯衞請注兵車也月升金掌杜詩卿月升金掌王春度玉墀天近玉京玉京山在成都府資縣西南五十里峭嶮壁立挿天連雲儼然在目上有觀曰太霄山谷詩注玉京山在香罏峯下落星寺僧開軒對之某一介無他八年於外何幸故人之至可容老我之歸王荆公詩老我孤主恩結草以為期陳後山詩老我何所懐糠粃揚前愧無補庚癸之諾見前樵蘇爨後知可飽戊巳之營韓信傳千里餽糧士有饑色樵蘇後爨師不宿飽師古曰樵取薪也蘇取草也詩樵彼桑薪餘見前願及戍𤓰亟戒行李韓文宵則沭浴戒行李遣信使謝蜀道已騰父老之驩司馬相如傳遣信使曉諭百姓師古曰誠信之人以為使也與將軍皆楚人亦有子孫之託季布傳曹丘生至揖布曰僕與足下皆楚人使僕游揚足下名于天下顧不羙乎杜詩起予幸班白因是託子孫其為欣幸罔既編摩通眉州趙開國希濬魯衛兄弟之政班固後於先茅漢書馮立與兄野王相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰明賢知惠吏民政如魯衛徳化均周公康叔猶二君班次也左傳使魯為之班後鄭言使魯序其次第魯人以鄭伯爵使居後餘見前召杜父母之歌揚更慙於前粃召信臣傳百姓親愛號之曰召父杜詩傳時人方于召信臣故南陽為之語曰前有召父後有杜母餘見前肅迎千騎漢書東方千騎長人古辭陌上桑東方千餘騎夫壻居上頭隋盧思道日出東南隅行會待東方騎遥居最上頭徐伯陽詩欲識東方千騎歸藹藹日暮風塵起張孝祥詩千騎東方白玉鑣敬遣䨇魚恭惟某官卓爾不羣飄然無敵並見前更生寳苑蘊金淵玉海之竒劉向傳向本名更生通材能屬文辭淮南有枕中鴻寶苑秘書更生得之㓜而讀誦劉峻廣絶交論舒向金玉淵海卿雲黼黻河漢梁書朱异傳异字彦和有詔求異能之士明山賓表薦异曰竊見錢塘朱异器宇宏深神表峯峻金山萬丈縁陟未登玉海千尋窺映不測長吉錦囊挾陣馬風檣之逸新唐書文藝傳李賀字長吉系出鄭王後七歲能文章每騎弱馬從小奚奴背古錦囊遇所得書投囊中母探囊中見所書多怒曰是兒嘔出心乃已耳杜牧之李賀集序雲烟聯綿不足為其態也水之迢迢不足為其情也春之盎盎不足為其和也秋之明潔不足為其清也風檣陣馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國侈殿梗莽丘隴不足為其怨恨悲愁也鯨呿鼇擲牛鬼蛇神不足為其虛荒誕幻也三峽洊依於緑水水經注三峽謂廣溪峽巫峽西陵峽連鑣決勝於赤雲韓詩城上赤雲呈勝氣又即是連鑣向闕時寰内五等之侯洊敭已遍寰説文王者封畿内縣也穀梁傳寰内諸矦非有天子之命不得出會諸矦疏寰内者三都在中諸矦四面繞之故曰寰内寰音縣古縣字一音環禮記王者之制禄爵公侯伯子男凡五等注獨以矦為名而稱諸矦者舉中而言又爾雅矦為君故以矦言之腰間六國之印滌濯方新蘇秦傳使我有雒陽負郭田二頃豈能佩六國相印乎唐百官志三日洗印視其刓缺今得蟇頥蟇頥山在州城東七里自象耳山連峯壁立西瞰玻瓈江五十餘里至此磅礴蹲踞形類蟇頥故名宋陸務觀詩玻瓈江上栁如絲行樂家家要及時只怪今朝空巷出使君人日宴蟇頥張逺宵詩水突蟇頥灘穿龍𤓰大似雞肋見前然四蜀衣冠之郡宜煩禮樂之英巴蜀黔漢為四蜀唐通義志士以名節相尚東漢時多死節光武嘉之曰士大夫之郡也在三蘇翰墨之塲宜著文章之守杜詩徃者十四五出游翰墨塲栁詩足逸詩書囿鋒摇翰墨塲六一居士詞文章太守揮毫萬斛一飲千鍾尚念黎侯之晩賦東坡眉山逺景樓記太守黎矦希聲先君子之友人也作逺景樓吾州之人求文以為記軾將歸老故丘布衣幅巾從邦君于其上酒酣樂作援筆而賦之以頌黎侯之遺愛尚未晩也無為叔度之暮來見前千里之駒原隰每懐於靡及劉徳傳徳字路叔少修黄老術有智略少時數言事召見甘泉宫武帝謂之千里駒師古曰言若駿馬可致千里也年齒㓜少故謂之駒按千里駒數見史傳難以悉舉姑列其目劉徳之外魏曹休晉傅咸劉曜符朗宋張敏梁蕭映王規劉杳王茂任昉齊丘仲孚袁昂北魏李孝伯袁曜北齊馮翊王潤崔昂元文選後周杜杲隋張乾威唐李暠成王千里詩皇皇者華于彼原隰駪駪征夫每懐靡及注征夫謂使臣駪駪多貌使臣之行必有上介衆介既受君命當速行毎人懐其私相稽留則于事將無所及九罭之鱒朝廷何患其不知鱒音樽詩九罭之魚鱒魴我覯之子衮衣繡裳注緵罟謂之九罭孫炎曰九罭謂魚之所入有九囊也鱒才損反郭璞云似鯶子赤眼者江東人呼魴魚為鯿疏鱒魴是大魚處九罭之小網非其宜以興周公是聖人處東方之小邑亦非其宜詩序九罭羙周公也周大夫刺朝廷之不知也魏相傳朝廷已深知弱翁治行方且大用矣某夙托門朋更連隣䕃豈料託子孫之契又將合郡國之符俱見前綈袍戀戀願見故人范雎傳以綈袍戀戀有故人之意索隱曰綈厚繒也音啼葢今之絁也歩屧村村久誇新尹杜詩歩屧隨春風村村自花栁田翁逼社日邀我甞新酒酒酣誇新尹蓄眼未見有恐鞭其後俾營斜谷之木牛莊子善養生者若牧羊然視其後者而鞭之蜀志建興九年出軍圍祁山始以木牛運十二年由斜谷出始以流馬運幸疾其驅式慰并州之竹馬韓文無疾其驅天子有詔郭伋傳伋前并州素結恩徳始至行部至河西羙稷有童兒數百各騎竹馬道次迎拜伋問兒曹何自逺來對曰聞使君到喜故來奉迎伋辭謝之其為忻幸罔旣敷宣通徐架閣天麟宋四朝史何執中傳執中為吏部尚書以四選按集吏藏於家以舞文取賄請置架閣庫命官莅之以主管尚書某官架閣為名或遇其廢則以省郎兼之否則以六部監門兼之徐天麟清江人開禧初進士累官武學博士論對言人主當持心以敬通判惠潭二州權英徳府所至興學明教有惠政著兩漢㑹要漢兵夲末西漢地理疏山經等書隨冠葢於京華昔焉託契鄒陽傳使者冠葢相望杜詩悄悄憶京華又旅食京華春主文書於几閣今乃為僚漢刑法志文書盈於几閣典者不能徧覩偶因越尊俎而代庖人之勞又可封府庫以待將軍之至俱見前不容禮緩敢用書先恭惟某官南州高士之家徐穉傳郭林宗有母憂穉徃弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州高士徐孺子也西園先生之子天麟為徐夢筆商老從子西園先生葢其父也通介寧從世俗不煩孟徳之疑魏志徐邈字景山魏國初建為尚書郎時科禁酒而邈私飲校事趙達問以曹事邈曰中聖人太祖甚怒盧欽著書稱邈曰或問欽徐公當武帝時人以為通自在涼州及還京師人以為介何也欽曰徃者毛孝先崔季珪等用事貴清素之士皆變易車服以求名高而徐公不改其常故人以為通比來天下奢靡轉相效倣而徐公雅尚自若不與俗同故前日之通乃今日之介也名位豈肯卑微眞符釋氏之送杜陵徐卿二子歌君不見徐卿二子生絶竒感應吉夢相追隨孔子釋氏親抱送並是天上麒麟兒吾知徐公百不憂積善衮衮生公矦丈夫生兒有如此二雛者名位豈肯卑微休蔚然三館之望西京雜記平律矦三館一曰欽賢次曰翹材次曰接士東坡詩三館曝書防蠧毁注三館謂昭文集賢史館總名崇文院也已在八年之前誰令甲科亦補文學之掌故匡衡傳衡射䇿甲科不應令儒林傳歲課甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故聊復庚約即是翰林之主人揚雄傳藉翰林以為主人子墨為客卿以風某偶獲交龜應劭漢官儀云印者因也龜者隂也抱甲負文隨時蟄藏以示臣道功成而退衛宏漢舊儀中二千石銀印龜紐大𤣥經龜緺孔愉傳印龜左顧梁陸倕敎謬叨龜組竊願已祗眞成附驥史記伯夷傳顔淵雖篤學附驥尾而行益顯漢書樊酈傳贊方其鼓刀僕御販繒之時豈自知附驥之尾勒功帝籍慶流子孫哉後漢書隗囂傳蒼蠅之飛不過數歩即託驥尾得以絶塵合而離離而合詎知有聮事之期史記老子傳始秦與周合而離離五百歲而復合同自異異自同又當廣結交之句盧仝與馬異結交歌昨日仝不仝異不異是謂大同而小異今日仝自仝異自異是謂仝不往兮異不至韓詩往年弄筆嘲同異怪辭驚衆嘲不已通魏府判岠李膺非昔自應陪澤畔之大夫南史蜀士李膺有才辯西昌矦藻使至都武帝謂曰今李膺何如昔李膺對曰今勝昔昔事桓靈之主今逢堯舜之君帝嘉其對以為益州别駕詳見前屈原漁父屈原既放行吟澤畔顔色憔悴漁父見而問之曰子非三閭大夫與魏相有孫顧亦補黔中之上佐新唐書魏徴傳徴五世孫謩為宰相議事讜切無所囘畏宣宗甞曰謩名臣孫有祖風朕心憚之將託交龜之契盍修致鯉之恭並見前恭惟某官家夲黄扉翰苑新書漢丞相金印紫綬黄扉黒幡所以異車服於百辟也心如白屋吾丘壽王傳由窮巷起白屋師古曰白屋以白茅覆屋也蕭望之傳致白屋之意師古曰謂白葢之屋以茅覆之賤人所居風烈挺挺稱故國之世臣新唐書魏謩傳謩之議論挺挺有祖風烈詩所謂是以似之者歟領袖堂堂成外家之宅相魏舒傳少孤為外家甯氏所養甯氏造宅相宅者云當出貴甥外祖母以魏氏甥小而慧意謂應之舒曰當為外家成此宅相為相國參軍文帝深器重之每朝會目送之曰魏舒堂堂人之領袖也梁書王規傳規子褎七歲能屬文外祖袁昻重之謂賓客曰此兒當成吾宅相北史李繪傳舅邢晏與繪清談歎其高逺每歎曰若披雲霧如對珠玉宅相之寄良在此矣聞塤篪之伯仲見前皆規矩於高曽爾雅王父之考為曽祖王父曽祖王父之考為高祖王父晉書周訪傳贊曰子曰孫重規疊矩白眉最良蜀志馬良字季常襄陽人兄弟五人並有才名鄉里為之諺曰馬氏五常白眉最良良眉中有白毛故以稱之黒頭必貴晉書諸葛恢傳弱冠知名庾亮甞謂曰明府當為黒頭三公王珣傳桓温謂之曰王掾當作黒頭公北史元彧傳崔光見彧謂人曰黒頭三公必此人也顧屈閬風之歩崑崙山有三角其一正北干星辰之輝曰閬風巔其一正西曰𤣥圃臺其一正東名崑崙宫皆仙人所居張衡賦似閬風之遐坂杜詩閬風𤣥圃與蓬壺中有高堂天下無來監巫水之州栁文武岡銘巫水之磻此地之峻嶺崇岡昔罕羣賢之至王右軍蘭亭序羣賢畢至少長咸集此地有崇山峻嶺茂林修竹同坐之清風明月近方别駕之添見前公胡為乎來哉李詩嗟爾逺道之人何為乎來哉民何修而得此但恐傍觚稜之月西都賦上觚稜而棲金爵觚稜闕角也東坡詩囘首觚稜一夢中又璧月挂罘罳珠星照觚稜難久淹緹屏之星黄霸傳别駕車緹油屏豫章列士傳孔恂字巨卿為别駕别駕車舊有屏星如刺史車刺史因怒欲去之恂曰徹去屏星毁國舊儀别駕可去屏星不可去乃止不俟突黔見前即迎泥紫漢舊儀天子六璽皆以武都紫泥封之李詩天書降紫泥又銜出紫泥封杜詩亨衢照紫泥某一寒竊禄再暑負丞韓文余不負丞而丞負余北山久笑於驚猿北山移文蕙帳空兮夜鶴怨山人去兮暁猿驚南嶽忻迎於鳴鳯杜詩佇鳴南嶽鳯半載之期非逺尺書之貢敢稽願察來何暮之謡及瓜而代俱見前庶幾推不去之令接淅而行鄧攸傳謝令推不去通武岡權通判譚知録良弼湘濱試吏綴寮寀於元昆高祖紀及壯試吏注初官曰試吏昆通作晜説文周人謂兄曰昆儀禮疏昆兄也杜詩戮力自元昆韓文受命于元兄黔鄙轉丞附交承於貴介武岡銘序黔巫東鄙藍田縣丞㕔壁記再轉而為丞兹邑左傳王子圍寡君之貴介弟也劉伶傳貴介公子縉紳處士既共飲玻瓈之水東坡詩我家眉山隂與子同一邦相望六十里共飲玻瓈江今按玻瓈江在眉州蟇頥山下即岷江也源出岷山瑩若玻瓈因名一名蟇頥津即唐田令孜沈孟昭圗處又並馳琬琰之山昌黎陪杜侍御游湘西兩寺詩深林高玲瓏青山上琬琰託契良多修辭敢後恭惟某官魯沂華胄梁史何昌寓為吏部尚書有閔姓求官者昌寓問是誰後曰閔子騫昌寓笑曰遥遥華胄虞學高流禮記有虞氏養國老于上庠注上庠太學也在西郊所謂傑然摘頷不難於取第韓詩連年收科第若摘頷下髭式相好矣因心尤篤於友兄詩兄及弟矣式相好矣無相猶矣又維此王季因心則友則友其兄注善兄弟曰友屈從樾䕃之清淮南子盥汗交流休樾䕃則脱然而喜注樹如車葢狀為樾言多隂也又武王䕃暍人于樾下而天下懐之感于恩也良見棣華之厚詩棠棣之華鄂不韡韡凡今之人莫如兄弟兹借糾曹之望糾吉酉切或作糺察也周禮大司徒糾萬民式隆監郡之權職官分紀闕宗時中丞孫汴上言通判古監郡闕一州利害全籍論議與近下僚屬不同乞今後闕曰州郡設通判夲與闕移藩鎭不得奏辟通判上判一郡之事知州有不法者得舉奏之今既辟闕必不執守卿言極闕只恩地事有不可得辟簽判一員行矣章交劉向傳章交公車亟其圭覲詩以其介圭入覲于王注以其所藏之大圭入行覲禮而見於王某里閭晩出閥閲早凋昨倚席之不才投閒乃分後漢書儒林傳自安帝覧政薄於藝文愽士倚席不講朋徒相視怠散樊準傳博士倚席不講儒者競論浮麗韓文投閒置散乃分之宜兹題輿之有命佐治何能唐中宗授李承嘉户部尚書制栢臺憲府高膺弄印之榮芝甸神州獨著題輿之任中興會要知成都席益奏州郡置倅所以佐郡守之治入則貳政出則按縣所幸規矩之陳前可容瓦石之在後孫綽傳沙之汰之瓦石在後友一鄉之善舊正頼於告新歌别駕之功今敢希於勝昔王祥傳祥字休徴徐州刺史吕虔檄為别駕委以州事于是冦盜充斥祥討破之州界清静時人歌之曰海沂之康實頼王祥邦國不空别駕之功餘見上條通李制機元龍望太白於岷峨知登上佐東坡詩西望太白横岷峨注太白鳯翔山也岷峨蜀山也辭石洪之瀍榖幸託底寮昌黎送石處士序先生居嵩邙瀍穀之間東坡詩青衫莫厭百僚底山谷詩李侯畫隱百僚底又法當憔悴百僚底又從軍補掾百僚底漫期飛逐於冥鴻法言鴻飛冥冥弋人何簒焉敢恥棄餘之竹馬殷浩傳浩少與桓温齊名而每心競温既以豪傑自許每輕浩浩不知憚也及浩廢温語人曰少時吾與浩共騎竹馬我棄去浩輙取之故當出我下也斐裁手筆南史王儉傳手筆典裁為當時所重范曄傳手筆差易于文不拘韻故也韓文貶損道徳乃至手筆以問之敬控心期楊公筆録宋向桞與顔竣友善竣貴栁貧曰我與士遜心期久矣豈可以勢利處之任彦昇詩中道遇心期栁詩誰為後來者當與此心期陳後山詩得失妍蚩只自知略容千載有心期王荆公詩心期自與衆人殊山谷詩少日心期轉謬悠又心期曉月秋霜又心期誠不淺恭惟某官飛譽隱谹仇覧傳今日太學曵長裾飛名譽者皆主簿後耳盧照隣詩伊人表時彦飛譽滿司存谹音横亦作􅀈揚雄傳隱隱􅀈􅀈掞材良實大科異等一翁二季之相望陳後山贈二蘇公詩異人間出駭四方嚴主陳李司馬揚一翁二季對相望竒寳横道驥服箱誰其識者有歐陽大科異等固其常小却盛之白玉堂望平聲鉅典雄編三史六經之可亞詩書樂易禮春秋為六經書詩春秋為三史又史記兩漢書為三史君陳父祖固存世績見前越公兒郎信有家風新唐書楊𢎞禮傳𢎞禮字履莊素弟之子太宗征遼拜兵部侍郎領歩騎二十四軍跳出賊背所向披靡帝壯之謂徐敬宗曰越公兒郎故有家風還拜中書侍郎遷司農卿滿腹精神燭照數計而龜卜温嶠傳錢世儀精神滿腹韓文若河汱下流而東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也撐腸文字日光玉潔而蛟翔盧仝詩三椀搜枯膓惟有文字五千巻東坡詩撐膓拄腹文字五千巻李漢韓文序詭然而蛟龍翔蔚然而虎鳯躍鏗然而韶鈞鳴日灮玉潔周情孔思千態萬貌卒澤於道徳仁義炳如也若為碧落之功名碧落天也李陟詩碧落高高雲萬里王維詩鳯扆朝碧落又碧落風烟外李白詩歩綱繞碧落淹此青油之談笑韓愈與李正封聨句從軍古云樂談笑青油幕燈明夜觀棊月暗秋城柝辟書薦墨一飛皆可以冲天六一居士集未乾薦禰之墨已彎射羿之弓山谷詩更磨薦禰墨推挽起疲懦淳于髠傳此鳥不飛則已一飛冲天不鳴則已一飛驚人檄筆幙謀三進顧遲於及霤韓詩檄筆無與讓幕謀職其膺左傳三進及溜而後視之正義云溜謂簷下水溜之處入門伏而不省起而更進三進而及于君之屋漏言廹于公之前也諒惟中幄張良傳運籌帷幄中正借前籌張良傳臣請借前箸以籌之張晏曰求借所食之箸用指畫也韓詩兹道誠可尚誰能借前籌斟酌損益必盡忠言出師表斟酌損益進盡忠言則攸之禕允之任也治法征謀抑有主出韓文方今㓂聚于垣師環其疆農不耕收財粟殫亡吾所處地歸輸之塗治法征謀宜有所出竊聞機筦徑即州麾君薄淮陽耶寧更迂朱幡之駕汲黯傳君薄淮陽耶吾今召君矣景帝紀詔曰吏者民之師也車駕衣服宜稱令長吏二千石車兩朱幡注幡車之蔽也後漢書輿服志二千石皆皂葢朱兩幡誰踰仲卿者會即趨丹掖之班王章傳初章為諸生學長安獨與妻居章疾病無被卧牛衣中與妻决涕泣妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困戹不自激卬乃反涕泣何鄙也王僧孺表神夢紫霄心飛丹掖某無挾而窮不殖以落見前上青天而仰脅頃逄三峽之倒流李詩蜀道難難於上青天又捫參歴井仰脅息杜詩詞源倒流三峽水瞻白日於舉頭還望九門而郤走韓詩孟生江海士古貌又古心豈識天子居九重鬰沈沈一門百夫守無籍不可尋遷延乍却走驚恠靡自任舉頭看白日泣涕下霑巾偶文翁剖符之再駐文翁傳景帝末為蜀郡守仁愛好教化杜詩得歸茅屋赴成都眞為文翁再剖符許于思棄甲而復來左傳宋城華元為植廵功城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復來于思多鬚貌舊政既幸於告新大事又忻於從長周禮大事則從其長小事則專逹豈無他人不如同姓後先兩託於交承詩有枤之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉既見君子庶幾有臧早夜一期於規誨詩未見君子憂心怲怲既見君子庶幾有臧韓文敢不敬蚤夜以求從祝規通呉運幹彬登畿入幕濫同賓客之聯顔延年詩結綬登王畿餘見前授印合符將託子孫之契見前恐以我而為簡敢脩辭而立誠恭惟某官學業醇明器資凝逺長卿凌雲之氣入室何難司馬相如傳相如既奏大人賦天子大悦飄飄有淩雲氣游天地之間意法言如孔氏之門用賦也則賈誼升堂相如入室矣興公擲地之聲摩空有素孫綽傳甞作天台山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲也李賀詩殿前作賦聲摩空筆補造化天無功自來歸於韶石韶石山在韶州曲江縣北四十里相傳舜奏樂於此竒石三十六韶之山多竒而韶石為最䨇闕又韶石之竒絶者王荆公詩沄沄曲江水天借九秋色樓臺飛半空秀氣盤韶石東坡詩首參虞舜歎韶石次謁六祖登南華詳别見謂徑上於瀛洲見前顧煩上界之官韓詩上界眞人足官府豈如散仙鞭笞鸞鳯終日相追陪更贊中都之漕杜氏通典漢興高皇帝時漕轉山東之粟以給中都官歲不過数十萬石中都官謂京師之官府駕輕車就夷路聊養修名韓文若駟馬駕輕車就熟路而王良造父為之先後也離騷老冉冉其將至兮恐修名之不立入太學招諸生請觀近比某不堪索米又復泛蓮俱見前敢圖觧后之間適有交承之好隴西李愽與處者所敬惟賢韓文送楊支使序愈聞當今藩翰之賓客惟宣州為多賢與之游者二人隴西李愽清河崔羣羣與愽之為人吾知之道不行于主人與之處者非其類雖有享之以季氏之富不一日留也愈未甞至宣州而樂頌其主人之賢者以其取人信之也河南呉公甞學焉自今以始賈誼傳河南守呉公聞誼秀材召置門下文帝聞呉公治平為天下第一故與李斯同邑而甞學事焉詩自今以始歲其有通兩浙林運幹良顯湖船一笑夙傾觧后之心薛宣傳壹关為樂師古曰壹关謂一為歡笑耳关古笑字氷幕同僚強附交承之契韋蘇州詩文史臺中妙氷壺幕下清望筍輿而來止張耳傳箯輿前師古曰箯輿者編竹木以為輿北堂書鈔云亦云筍輿飭竿牘以斐然見前恭惟某官秀出三山譽騰四海摩空作賦能瘖萬馬之聲李賀詩殿前作賦聲摩空東坡三馬贊振鬛長鳴萬馬皆瘖發䇿决科卓踞六鼇之首法言須以發䇿决科列子使巨鼇十五舉首而戴之又一釣而連六鼇采魯芹於泮水詩思樂泮水薄采其芹魯矦戾止言觀其旂注泮水泮宫之水也芹水菜也言水則采取其芹宫則采取其化燃楚竹於清湘栁詩漁翁夜傍西巖宿曉汲清湘燃楚竹藉未為國子之先生亦合入文學之掌故見前顧屈清廟之器新唐書李珏傳珏為殿中侍御史宰相韋處厚曰清廟之器豈擊搏才乎除禮部員外郎來贊皇華之灮飄氣凌雲寧肯久依於緑水舉頭見日便應直上於青霄俱見前某拆襪短材北夢瑣言偽蜀韓昭仕至禮部尚書文思殿大學士粗有文章至於琴棋書算射法悉皆渉獵以此承恩於後主時有朝士李台嘏曰韓八座事藝如拆襪線無一條長時人韙之濫巾末屬北山移文濫巾北嶽偶然承乏遂供越俎之勞左傳攝官承乏杜詩雅薦非承乏正爾失眞久抱佩環之愧屬聞行李之問道俱見前喜至捲書而欲狂杜詩謾巻詩書喜欲狂江漢以濯之豈但慰懐賢之渇草木吾味也庶幾慰承教之私左傳季武子曰今譬草木寡人在君君之臭味也又譬諸草木吾臭味也臭味言同類也文選臭味風雲千載無爽通潭州劉教授時可潭州古三苖國秦漢長沙郡晉置湘州隋置潭州宋屬荆湖南路武安軍節度湖南安撫轉運司治所在焉詳别見祭孫寳之竈既竭吾才見前倚仲尼之牆此非子坐法言倚孔子之牆絃鄭衛之聲誦韓莊之書餘見前懐哉觧去詩懐哉懐哉曷月子還歸哉注懐安也思鄉里處者故曰今亦安不哉安不哉何月我得還歸見之哉賢者鼎來見前是雖期會之偶然賈誼傳大臣特以簿書不報期會之間以為大故師古曰言特以簿書期會為急劉昆傳偶然耳強曰交承亦可也恭惟某官學有源夲行無瑕玼玼音疵玉中石也亦作疵左傳予取予求不爾瑕庛韓詩佳句喧衆口考官敢瑕玼自題千佛之姓名宜展三神之歩武俱見前居官能大何嫌枳棘之棲栁文能使所居官大詳見前匪我求蒙思樂藻芹之采易匪我求童䝉詩思樂泮水薄采其芹又思樂泮水薄采其藻注藻水草槃槃潭府槃盤同韓詩潭潭府中君犖犖楚材犖力角切史記天官書此其犖犖大者左傳雖楚有材晉實用之孟浩然詩共理分荆國招賢貴楚材人非生知之其必由學禮記君子如欲化民成俗其必由學乎教亦多術矣先致其知道夲諸身士速哉肖法言速哉七十子之肖仲尼也舞雩沂水共觀夫子之循循發軔天津即繼諸公之衮衮軔音認王逸云止輪木去木動輪而發行天津即析木之津在箕斗之間日月五星於此徃來故謂之津離騷朝發軔於天津兮夕余至乎西極某強顔越俎見前矯首望塵思𤣥賦仰矯首以遥望兮魂敞惘而無儔餘見前佩有若之環此難久假叱王尊之馭所冀疾驅俱見前通善化盧縣丞補之善化夲漢臨湘縣地宋析置與長沙俱潭州倚郭縣請隣祭竈不知枳棘之棲見前越俎代庖定匪竹松之對韓文南牆鉅竹千挺對樹二松日哦其間懐哉觧去賢者鼎來俱見前請從臭味之同郭璞贈温嶠詩人亦有言松竹有林及爾臭味異苔同岑試論踐更之代見前恭惟某官胷蟠萬巻山谷詩胷蟠萬巻夜灮寒筆倒三江硯滴乾又故衣未補新衣綻空蟠胷中書萬巻學綜九流見前人見千佛之姓名有坐涎者賈誼新書垂涎相告杜詩道逢麴車口流涎渠知一第之溷子眞摘頷然見前惟其具大受之規模故不辭小官於州縣九年考績再轉為丞亟辭禹穴之雲烟史記太史公自序上㑹稽探禹穴張晏曰禹廵狩至會稽而崩因葬焉上有孔穴民間曰禹入此穴正義曰呉越春秋禹登委宛之山發石乃得金簡玉字以水泉之脉山中又有一穴深不見底謂之禹穴杜詩南尋禹穴見李白來慰湘江之草木守經据古寧肯破崖岸而為文貢禹傳生有伯夷之亷史魚之直守經據古不阿當世韓文博陵崔斯立種學績文以蓄其有既噤不得施用則盡析去牙角一躡故跡破崖岸而為之為之一作為文騰實飛聲會即登瀛洲而入直見前某非據而據繫辭非所據而據焉時行則行顚倒衣裳公豈嫌於李下詩東方未明顚倒衣裳古詩君子防未然不處嫌疑間𤓰田不納履李下不整冠簸揚糠粃我眞愧於盧前新唐書文㙯傳盧照隣駱賓王皆以文章齊名天下稱王楊盧駱四傑楊烱甞曰吾愧在盧前恥居王後幸叱馭而疾驅即裹章而送上俱見前子生孫孫生子且強附於交承列子子又生孫孫又生子余負丞丞負余姑别容於商㩁韓文余不負丞而丞負余漢書揚㩁古今㩁克角切説文敲擊也博雅揚㩁都凡也徐曰㩁之言罩也人謂粗略而舉之曰揚㩁集韻大舉也又虛郭切手反復也韓詩聖籍飽商㩁劉子𤣥史通序載削餘暇商㩁史篇四六標準巻六
