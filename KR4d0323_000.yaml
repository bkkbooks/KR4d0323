body:
  text: 四六標準别集類三宋提要臣等謹按四六標準提要四十卷宋李劉撰明孫雲翼箋釋劉字公甫崇仁人嘉定七年進士歷官寶章閣待制雲翼有橘山四六箋注已著録劉平生無他事可述惟以儷語為専門所著有類藁續類藁梅亭四六今皆未見此本乃其門人羅逄吉所編以劉初年館何異家及在湖南蜀中所作彚為一集題曰標準蓋門弟子尊師之詞也凡分七十一目共一千九十六首自六代以來箋啓即多駢偶然其時文體皆然非以是别為一格也至宋而嵗時通候仕宦遷除吉凶慶弔無一事不用啓無一人不用啓其啓必以四六遂於四六之內别有専門南渡之始古法猶存孫覿汪藻諸人名篇不乏逮劉晚出惟以流麗穩貼為宗無復前人之典重沿波不返遂變為類書之外編公牘之副本而冗濫極矣然劉之所作頗為隸事親切措詞明暢在彼法之中猶為寸有所長故舊本流傳至今猶在録而存之見文章之中有此一體為别派别派之中有此一人為名家亦足以觀風會之升降也至雲翼之注蕪雜特甚然亦有足備考證者舊本所載亦姑附存焉乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部四四六標準目録别集類三宋卷一言時政贄見卷二論事卷三薦舉卷四舉科目謝座主卷五謝到任謝解任卷六通交代卷七謝除授內除卷八謝除授外除卷九謝辟置舉自代宣賜被召卷十進職轉官改官宫觀致仕卷十一雜謝卷十二謝惠詩文卷十三謝及第謝科舉卷十四生辰婚姻卷十五師傅封爵附宰相卷十六參政樞密卷十七中堂史掖六部臺諫卷十八寺監學官宫教卷十九六院架閣卷二十制帥經略卷二十一安撫帥守附卷二十二總領卷二十三都大提舶卷二十四漕使卷二十五憲使卷二十六倉使宋正卷二十七太守上卷二十八太守下卷二十九倅卷三十諸司屬官卷三十一教官卷三十二州官武官寄居官卷三十三宰卷三十四丞卷三十五簿卷三十六尉卷三十七監官卷三十八學職進士卷三十九賀正卷四十賀冬
