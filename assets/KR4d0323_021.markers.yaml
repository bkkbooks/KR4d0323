  - {type: variant, offset: 6, length: 0, content: '', SBCK: 先勤委贄恭惟某官崇蘭流馥喬木故家在梓匠輪輿亦足以試有凖繩規矩何患無成所恐出入如相避然莫助左右爲先容也某濫茲攝長行矣告休聞弦賞音巳認相求之意留渴待飲所望見察以情代回龔告院堪疇庸外轄服釆中朝乃積乃倉乃糧乆勤回謁如絲如綸如綍盍頼主張恭惟某官學本家傳羙由丗濟京邑翼翼恬於風月之分江漢浮浮􅁉此丘山之積進掌四司之吿出專一札之文諒不俟駕而行必有勿藥之喜某凄其骯髒乆此蹣􅘐巳騰二冝去之章足以行矣猶及再相别而去頋不幸哉代回万俟檢院侣渙奉明綸晉司理匭導人使諌聖上實千載之逢命汝納言堂下無萬里之隔恭惟某官丗濟其美德浮于言練詳臺閣之儀服襲廟堂之學積勞于外益閎其中果騰列剡之章入掌四方之牘告嘉謀于后應無不得其言下膏澤於民亦有無窮之聞某未遑燕賀先辱魚牋驅飛廉而􅀉聲恍巳迷於昨夢排閶闔而披腹猶有望於朝陽代回新監文思院門史從政弥忠分職率属疇􅀂予工同官爲寮徒得君重貽書寵甚陳義曄然恭惟某官氣節雄􅀷詞華炳蔚丹穴五色皆鳴孤竹之聲青雲共登巳正三槐之面居然歛板獨此抱􅀜漢相不以兄故私未妨緩歩史魚直哉􅀖有道願接芳塵某爲長於斯懷歸乆矣或論道或審曲等是王官非邀譽非納交願成晚器架閣代回吳架閣柔勝起自珍祠入司故府人登龍断孰知静退之風公不蠅營冝有登崇之命恭惟某官器資莊􅁉德履淑均讀數萬言信一第之直溷子閱三十載猶屢薦而不入官茲回香火之功名來主文書之凡閣假途數月發軔九衢某有幸協恭先勤遣記匪我言耄實慚堂下之斵輪及爾同寮知免䄂間之縮手代回薛架閣君用渙奉新綸晉司故籍文書盈於几愛莫助之牒訴裝其懷今知免矣恭惟某官河東鸑鷟冀北麒麟自中雋於文闈即舒翹於侯泮鴟梟未集豺虎巳多車轔轔馬蕭蕭君誰與守印纍纍綬􅀂􅀂吾不徒行冝哉薦􅀭有此除寵佇憲章之明習即臺閣之飛騰某甚愧濫巾猥勤衘䄂居州在宋真足爲王所之賢夫子却齊願更觀儒者之效代回曽架閣凖奉一扎之新除司兩部之故籍簿書獄訟之事似屈長材文學禮義之官豈非妙選未繇旅賀猥辱損牋恭惟某官琴瑟廉温琮璜秀潤摩空作賦早呼殿陛之臚重席談經乆繫堂堦之馬身纔趍於幕府名益震于京師朝方虛掌故之貟人皆有欲炙之色下交章而薦禰上弄印以授堯群無留良衆乃退聽今雖刑清而役簡政湏綱舉而目張几閣文書何厭數旬之客朝廷翰墨㑹歸三館之英某一自識賢數勤委贄引重鼎不程力長恐見􅀏於大方旣識路又疾驅敢願益堅於壯履代回黄架閣伯劑渙奉新綸晉司故府爼豆軍旅之事允藉通材文學禮義之官亶爲妙選恭惟某官蟠書拄腹取第摘髭􅀕竈一同有珞珞琭琭之氣隨軺萬里無無剌剌之情流聲實於朝廷主文書於几閣更培風力㑹决雲衢某何與推賢過勤委翰投我木李莫輸論報之情期君蟠桃姑冩願忠之意梅亭先生}
