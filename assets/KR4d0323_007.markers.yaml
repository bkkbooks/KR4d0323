  - {type: variant, offset: 4557, length: 257, content: 宋史陳韡字子華福州侯官人開禧元年進士嘉定十四年賈渉辟京東河北幹官改淮東制置司幹辦公事遷將作監丞又遷太府寺丞差知眞州淮東提㸃刑獄加直寳章閣兼知寳應州遷宗正寺丞權工部郎中改倉部員外郎紹定三年盗起閩中以寳章閣直學士起復知南劒州提舉汀州邵武軍兵甲公事福州路兵馬鈐轄兼招捕使加提㸃刑獄四年盗平進右文殿修譔六年進寳章閣待制知隆興府贛冦起詔節制江西廣東福建三路捕冦軍馬盗平進權工部侍郎改江東安撫使知建康府遷權工刑二部尙書淳祐四年拜參知政事七年知樞密院景定二年卒贈少師諡忠肅史臣曰陳韡將帥才也優于劉之傑多矣將作監丞漢官後漢魏晉因之, SBCK: ''}
