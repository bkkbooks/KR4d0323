body:
  text: 四六標準卷二十七宋李劉撰太守上宋祖懲五季之患召諸鎭留京師命朝臣出守列郡號權知軍州事軍謂兵州謂民政其後文武官參為知軍州事二品以上及帶中書樞密院宣徽使職事稱判太守若河南應天大名府則兼留守司公事太原府延安府慶州渭州衡州秦州則兼經畧安撫使馬歩軍都總管定州眞定府瀛州大名府京兆府則兼安撫使馬歩軍都總管瀘州潭州廣州桂州雄州則兼安撫使兵馬鈐轄潁昌府青州鄆州許州鄧州則兼安撫使兵馬廵檢其餘大蕃府或沿邊州郡或當一道衝要者並兼兵馬鈐轄廵檢都監或帶沿邊安撫提轄兵甲沿邊溪峒都廵檢餘州軍則否賀趙尚書知平江府汝述平江即今蘇州春秋吳國所都秦漢為㑹稽郡三國時吳郡陳為吳州隋改蘇州以姑蘇山得名宋太平興國改平江軍政和陞府通班媯閣宋以華文閣為媯閣見慶元批答作牧吳門周禮八命作牧離騷伯昌號衰秉鞭作牧盧照隣詩星樓望蜀道月峽指吳門李咸用詩一柱表吳門厭承明之勞岀領黄堂之寄郭丹傳勑以丹事編署黄堂以為後法注黄堂太守之㕔事吳郡志今太守所居之宅即春申君之子為假君之殿也因數失火塗以雌黄故曰黄堂以厭火災游姑蘇之勝請吟畫㦸之詩姑蘇山在吳縣西三十里或曰姑胥或曰姑餘越絶書闔閭就山起臺三年聚材五年乃成髙見三百里韋應物為郡守郡齋雨中與諸文士讌集詩云兵衛森畫㦸宴寢凝清香海上風雨至逍遥池閣凉煩疴近消㪚嘉賔復滿堂自慙居處崇未覩斯民康理㑹是非遣性達形迹忘鮮肥屬時禁蔬果幸見嘗俯飲一杯酒仰聆金玉章神歡體自輕意欲凌風翔吳中盛文史羣彦今汪洋方知大蕃地豈曰財賦疆和氣先庚而已孚驩聲旁午以交慶恭惟某官飄然無敵卓爾不羣重禄勸親亦既曵星辰之履大宗維翰乃欲把江海之麾並見前尺一之留甚堅尺一者漢遺單于書以尺一牘選舉召拜書之尺一板蕭子良古今篆𨽻文體曰鶴頭書與偃波書俱詔板所用在漢則謂之尺一簡後漢楊政傳范升嘗繫獄政乃肉袒以箭貫耳哀請即尺一出升李雲傳尺一拜用不經御省注尺一之板詔䇿也陳蕃傳尺一選舉委尚書三公注尺一謂板長尺一以冩詔書也楊賜傳斥佞巧之臣召鶴鳴之士斷絶尺一陽球傳不得稽留尺一再三之請彌力君陳順我后于内寧煩更尹於東郊並見前召公繫諸侯之風何害暫分於西陜詩序鵲巢騶虞之徳諸侯之風也先王之所以教故繫之召公登以瀛洲之秩試之馮翊之邦見前月滿一輪虎􅏀幸甚記纂淵海虎􅏀僧上太守詩昨夜虎􅏀山上望一輪明月照蘇州虎􅏀山在郡城西北九里又名海湧山遥望平田中一小􅏀越絶書吳王闔閭葬虎􅏀山下發五都之士十萬人共治葬穿土為川積壤為􅏀池廣六十歩水深一丈五尺銅棺三重澒池六尺黄金珠玉為鳬鴈扁諸之劒魚膓之干在焉葬三日金精上騰為白虎蹲踞于上河潤九里鳳闕賴之郭伋傳賢能太守去帝城不逺河潤九里冀京師并䝉福也羽獵賦序營建章鳳闕三輔故事其闕圜上有銅鳳皇關中記鳳闕一名别鳳闕黄圖鳳闕髙七丈五尺三秦記栢梁臺有銅鳳因名鳳闕魏繁敏建章鳳闕賦序秦漢規模泯毁惟建章鳳闕聳然獨存無以我公歸兮恐須袞繡見前有安社稷臣者宜在廟堂虞詡傳君儒者當謀謨廟堂某全抱迂疎獨䝉賞識燕巢於幕正有望於捲簾左傳夫子在此猶燕之巢于幕上湘山野錄呂申公累乞致仕仁宗問誰堪代者公荐陳文惠公堯佐遂大拜極懐荐引之徳作燕詞為謝有主人恩重朱簾捲之句詳見前鴻漸于磐今若為而遵渚易鴻漸于磐飲食衎衎吉注磐山石之安者也詩鴻飛遵渚公歸無所然感恩正在於知己韓文感恩則有之矣將以稱於天下曰知己知己則未也則受徳豈待於成身柳文其受徳者不待成身而後拜賜感知而已使相國賜之相國禮之則韓愈亦人耳此執事事也執事責也於蘇洵何有哉並見前賀李參政知遂寧府璧宋寧宗紀開禧二年以李璧參知政事遂寧春秋戰國為蜀地秦為蜀郡漢分為廣漢郡今州為廣漢縣又分為徳陽縣東晉於徳陽縣界東南置遂寧郡宋以徽宗潛邸陞遂寧府宋王明清玉照新志云正和中五年十二月宣徳郎王恬等言本貫遂州按九域志都督府遂州為遂寧郡武信軍節度使元豐八年陛下初封遂寧郡王紹聖元年復以遂寧郡王出閣與蘇潤二州時同而事均縁本州遂寧縣元符二年縣下慧明院秋冬間忽觀佛像五次出見父老咸曰遂寧佛出越二年奉陛下即位此其祥兆乞改府額詔陞為遂寧府升班書殿曲阜除孫永制進書殿之寵名頒眞官之優秩宅牧价藩見前入為帝王師難戀洞霄之香火方輿勝覽洞霄宮在餘杭縣西十八里漢武帝元封間創祥符間改為洞霄宮按眞境錄宮有五洞交扄九峯回挹千巖萬谷秀聚其中東坡詩上帝髙居愍世頑故留瓊管在凡間青山九鎻不可到作者七人相對閑亭下泉流翠蛟舞洞中飛䑕白鴉翻長松怪石宜霜鬢不用金丹苦駐顔岀補父兄處重尋川路之風煙佛説阿彌陀經云其中多有一生補處補處言補佛位如一佛出世之喻楞嚴經彌勒菩薩言得授記次補佛位朱穆傳更選海内清淳之士明達國體者以補其處山谷送范徳孺知慶州詩妙年出補父兄處公自才力應時須杜詩川路風煙擾俱宜下鳳凰民説無涯公歸有漸恭惟某官材全而業鉅學廣而聞多並見前伯夷待天下之清一星終矣左傳十二年矣是謂一終一星終也注歲星十二年而一周天故云一星終互見前李璧傳御史葉時論璧反復詭譎削三秩謫居撫州後輔臣言誅韓侂胄事璧實預聞乃令自便復官提舉洞霄宮久之復以御史奏削三秩罷祠越四年復除端明殿學士知遂寧府伊尹得聖人之任天下信之若為聴文徳之麻並見前尚使分武信之竹遂寧為唐武信軍節度周公主陜曷嘗瑕公孫之碩膚詩公孫碩膚徳音不瑕山甫徂齊殆欲纘祖考之明哲詩仲山甫徂齊式遄其歸又纘戎祖考王躬是保又既明且哲以保其身然有撫四夷之急王陵傳宰相者舛塡撫四夷諸侯能無先一州之疑韓文先一州而後天下豈吾居吾相之心哉向參耐官或謂恐任宣威之寄向敏中傳進右僕射兼門下侍郎太宗謂翰林學士李宗諤曰敏中今日賀客必多卿往觀之既至敏中謝客門闌寂然宗諤具以所見對帝曰敏中大耐官職詳見前冦公暫撫不如歸圖克敵之勳宋名臣言行錄處士魏野贈冦萊公詩有無地起樓臺之句及北使至賜宴厯觀坐中問誰是無地起樓臺相公丁謂令譯者答曰上初即位南方須大臣鎮撫冦公暫撫南夏非久即還東坡冨鄭公神道碑銘維彼狡師謂帝我驕帝聞其言折其萌芽篤生萊公尺箠笞之所謂眞儒無敵之功豈容匹夫不被其澤某聞報失喜杜詩似聞胡騎走失喜問京華尹洙注失喜言出於不自覺捲書欲狂杜詩却看妻子愁何在謾巻詩書喜欲狂按此聨全用杜詩而失喜二字特為梅亭拈岀眉山之見端明不但願岀陳黄之泒陳後山黄山谷洛社之起司馬庶幾卒成遼夏之盟宋史司馬光傳遼夏使至必問光起居􅎁其邊吏曰中國相司馬矣毋輕生事開邊隙賀寶慶李知府到任大諫寶慶府秦為長沙郡漢屬長沙國東漢屬長沙零陵二郡吳屬荆州晉屬潭州唐置南梁州宋寶慶元年以理宗潛藩陞府錫命菟符唐高祖紀義寧二年停竹使符班銀菟符開藩龍邸寶慶為理宗潛藩故云龍邸鄴侯岀守衍仙李之盤根韓詩鄴侯家多書揷架三萬軸偉哉羣聖文磊落載其腹行年餘五十岀守數已六杜詩仙李盤根大猗蘭奕葉光召伯來宣新甘棠之美䕃詩王命召虎來旬來宣莊子方得美䕃而忘其身驩騰千里喜溢四隣尚書欽四隣孔傳四近前後左右之臣恭惟某官筆槖世臣箕裘家學見前禀衡岳之淑氣真磅礴而扶輿韓文衡山之神既靈而郴之為州又當中州清淑之氣蜿蟺扶輿磅礴而鬱積注相如子虚賦扶輿猗靡郭璞注淮南所謂曽折摩也扶輿猗委也韻㑹佳氣貌詳見前汎濂溪之光風聊逍遥兮容與山谷濂溪詩序舂陵周茂叔人品甚高胸中灑落如光風霽月九歌聊逍遥兮容與相如子虚賦周流容與師古曰容暇而安豫也與讀為豫韻㑹閑適貌濂溪先生治平五年以永倅来攝郡事遷家于郡東濂溪在道州營道縣西二十里又寶慶府亦有濂泉在通道坊以濂溪先生嘗飲此泉故名既贊星軺之畫又司天塹之糧塹七艷切説文坑也廣韻遶城水也楊素引舟師襲陳孔範曰長江天塹古以為限隔南北虜軍豈能飛渡江耶張于湖集流柹投鞭䂓濟天塹楊廷秀詩天將天塹䕶吳間不數殽函百二關所去見思厥臨孔惠自合歸軒墀之供奉顧猶試田里之循良並見前惟此三湘僧希白開元寺塔記接九疑之形勢據三湘之上流方輿勝覽湖嶺之間湘水貫之無出湘之右者凡水皆㑹焉但以瀟水合則曰瀟湘以蒸水合則曰蒸湘以沅水合則曰沅湘耳互見前壯哉二邵寶慶吳為邵陵郡唐天寶初改邵陽郡邵水在府城北源出邵陽縣龍山經馬鞍山諸葛孔明廟下號相公潭深不可測流至此合資水歐陽識詩澬水西來兼邵水龍山横鶩際梅山考姚合之句誇五雲才子之除新唐書姚合崇之曾孫元和中進士及第調武功尉善詩世號姚武功遷監察御史轉給事中厯陜虢觀察使終秘書監有集十巻行世姚少監送人赴邵州詩詔書飛下五雲間才子分符不等閑驛路算程都是水州圖管地少於山江頭斑竹應尋徧洞裏丹砂自採還清淨化人人自理終朝無事更相關參韓翃之詩詫萬里滄波之勝韓翃字君平南陽人仕為駕部郎中知制誥有詩名號大厯才子終中書舍人翃送從兄典邵州詩登樓暮結邵陽情萬里滄波煙靄生他日新詩應見報還如宣遠在安城矧今新府王勃滕王閣詩序南昌故郡洪都新府密邇故郷詳啓意大諫蓋郴州人汛掃松楸宿舂糧而可至汛音信説文灑也或作洒東方朔傳洒掃之職韓詩深思罷官去畢命依松楸山谷詩歸掃松楸下洒我萬里涕張舜民送李傑帥湖南詩舊置義田賙族黨新持使節拜松楸清湘樓曉揮金上明月池開衣錦遊莊子適百里者宿舂糧適千里者三月聚糧注所適彌遠則聚糧彌多緜聨桑梓晝衣錦以何殊梁書柳慶逺傳為雍州刺史高祖餞于新亭謂曰卿衣錦還郷朕無西顧之憂矣劉表遴傳出為南郡高祖謂曰卿母年徳並高故令卿衣錦還郷盡榮養之理暫擁㦸香亟遄珪覲詩以其介珪入覲于王某漫為佐貳正託附庸李時倅武岡武岡今𨽻寶慶府向忻一識於荆州見前今幸再依於劉表王粲傳以西京亂乃之荆州依劉表表以粲貌寢而體弱通侻不甚重也杜詩徑欲依劉表還疑厭禰衡偶欲叱卭崍之馭難隣燭之久分見前尚或濯滄浪之纓叙宗盟而後去滄浪水在武岡州東五十里有漁父亭相傳漁父與屈原相見處左傳周之宗盟異姓為後宗盟同宗之盟賀虞漢州公著代月湖漢州即廣漢郡之雅縣後漢為益州刺史理所宋齊為廣漢郡唐宋為漢州渙奉恩綸復紆郡組紫樞黄閣蓋舊物之青氊紅斾碧油又凝香於畫㦸亶為欽惠㑹即疇庸並見前恭惟某官父教之忠左傳子之能仕父教之忠仕優則學識其小者指為東閣之郎君杜詩郎君玉樹高注古稱貴人之子及嘗事其父者曰郎君東坡詩又見郎君白髪新注古人識其父而又識其子則謂為郎君唐開元東封有太原人于伯龍年百二十八嵗詣闕引見曰臣神堯皇帝之臣也荏苒歲月得至今日復事郎君上笑而憫之則人主亦可稱郎君矣戴氏䑕璞云今人以宰相子為東閣按公孫宏為宰相開東閣以延賓客于子弟無預今之引用乃李商隱詩郎君官貴施行馬東閣無由得再窺上言郎君乃令狐綯下言東閣指令狐楚之舊舘東坡九日詩引此合而言之聞道郎君閉東閣且容老子上南樓雖使令狐綯絶義山事然東閣之開閉于郎君何預又云南屏老宿閑相過東閣郎君懶重尋以郎君加于東閣下猶言宰相子也與汪龍溪云東閣郎君之未有用之皆無病今竟以東閣呼郎君誤矣見而知之始信西州之竒士任文公傳西州智士勞心兩郡袖手四年兹奉板輿之親潘岳閑居賦太夫人乃御板輿升輕軒逺覽王畿近周家園野客叢書世以板輿為奉母事如樂天詩朱旛四從板輿行是也不知三公告老亦許板輿上殿如傳祗是也梁韋睿以板輿自載督厲衆軍則板輿不止一事仍分竹符之使維今廣漢見題下實古雒城漢州本漢雒縣廣漢郡治焉洛水出漢州治東出什邡縣章山寰宇記水性剛宜淬刀有犀橋大拞州境上下衆水皆㑹于金堂縣同出峽謂之内江登橋而訪君平探河漢之逺泒嚴君平或云廣漢人州有七星井相傳為君平所鑿橋未詳臨池而憶諸葛懷宇宙之大名杜詩諸葛大名埀宇宙池未詳無疑牛鼎之烹雞後漢書函牛之鼎以烹鷄多汁則淡少汁則熬政使蟻封而試馬王湛傳湛謂濟曰此馬任重方知平路無以别也當于蟻封内試之詳見前佇䇿勳於召杜歸接武於韋平某舊及同寅新聞報政並見前老驥眞老空歌挽士不能寸之詩東坡詩可憐老驥真老矣無心更秣天山禾山谷贈秦少儀詩挽士不能寸推去輙數尺㝠鴻未㝠猶見治平為第一之召法言鴻飛㝠㝠弋人何慕焉賈誼傳文帝初立聞河南守吳公治平為天下第一徵以為廷尉賀太平宇文守紹彭太平秦屬鄣郡漢武改鄣郡曰丹陽郡晉平吳分丹陽置于湖縣成帝時以江北之當塗縣流人過江在于湖者僑立為當塗縣宋以來或治姑孰或徙于湖宋改平南軍太平興國二年與興國軍並建蓋分紀年以名之也陸務觀入蜀記云太平州本金陵之當塗縣周世宗時南唐元宗失淮南僑置和州于此謂之新和州改為雄遠軍國朝開寳八年下江南改為平南軍然獨領當塗一邑而已太平興國二年遂以為州且割蕪湖繁昌來屬所治當塗與興國軍同時建置故分紀年以名之恭審輟賢中臺𥘉學記尚書為中臺謁者為外臺御史為憲臺謂之三臺作牧上郡引嫌得請辭兄弟並相之榮宋史宇文紹節成都廣都人寧宗朝簽書樞密院詳啓意則紹彭亦為蜀人豈其羣從耶歛惠承流新父母斯民之政雙旌戾止五袴煖然並見前恭惟某官氣禀岷峨家傳莘渭莘虢地名濟隂莘仲城西有莘地郡國志郃陽南有古莘國史注莘國在陳留縣東五里説文渭水出隴西首陽渭首亭南谷東入河後魏莊帝置渭州以渭水名唐沒吐蕃置于平凉宇文南單于之後因獵得玉璽其俗以天為宇以璽為文遂以為氏抗㫋出使勇登老上之庭終軍傳票騎抗旌注抗舉也竇憲傳焚老上之龍庭注冒頓子稽粥號老上單于匃奴五月大㑹龍庭祭其先天地鬼神持節歸來亟荷甘泉之槖時惟重鎮孰若當塗當塗本漢丹陽縣地晉分丹陽置于湖縣東晉成帝時以江北當塗流民南渡者衆乃于于湖僑立當塗縣隋徙當塗于姑孰屬丹陽郡爰分半竹之符小憩甘棠之䕃朱轓皁蓋暫凝畫㦸之香黄閣紫樞自是青氊之舊某取違未久遣賀猶稽方國一札之成寧須符合並見前刺史三公之入即佇袞歸通典後漢重郡守之任或以尚書令僕射出為郡鍾離黄香桓榮胡廣是也或自郡守入為三公虞延第五倫桓虞鮑昱是也代羅司法有開上撫州林守岊撫州秦屬九江郡漢為豫章郡地吳以豫章東部置臨川郡隋罷郡置撫州以後沿革不常宋仍為撫州𨽻江南西路一官待戍頗安塵土之卑千里懷賢未快雲天之睹李詩日夕聴猿愁懐賢盈夢想樂廣傳若披雲霧而覩青天韓文争先覩之為快忘越國過都之逺王襃傳過都越國蹶如歴塊失擔簦躡蹻之勞史記范睢傳虞卿躡履擔簦孟嘗君傳馮驩聞孟嘗君好客躡屩而見索隱曰屩音脚字亦作蹻説文屐也廣韻草履增韻麻曰屩木曰屐簦音登説文笠蓋也徐廣曰笠有柄者宋之滕而踵門若為藉手左傳宣子私覲于子産以玉與馬曰敢不藉手以拜詳見前何與韓為同業庸可潔身韓文何與韓同姓為近堅以進士舉於吾為同業詳見前不然凝清兵衛之香見前視此卑陬法曹之掾莊子注卑陬愧恧貎韓詩棲棲法曹掾何處事卑陬説文掾俞絹切從手彖聲官屬續漢書百官志漢舊制有東西曹掾無謂而謁匪狂則諛恭惟某官徳宇浚明性資凝逺深造自得獨扛百斛之龍文韓詩龍文百斛鼎筆力可獨扛幼學壯行連舉八科之麟角新唐書張薦傳祖鷟字文成登進士第八以制舉皆甲科員半千稱鷟文辭猶青銅錢萬選萬中時號青錢學士今按張鷟楊嶠陸元方員半千崔融皆試中八科北史文苑傳學者如牛毛成者如麟角諸老未能言者賈誼傳文帝召以為博士是時誼年二十餘最少每詔令議下諸老先生未能言誼盡為之對人人各如其意所出諸生於是以為能天子居然器之循吏傳序三人皆儒者通于世務天子器之朱邑傳性公正不可干以私天子器之朝廷敬焉互見前彯組西崑不受人間之風日穆天子傳穆天子登西崑崙見王母至于羣玉之山先王所謂策府也宋初劉子儀楊大年諸人學李義山詩謂之西崑體墨莊漫錄本朝之文五代之舊多駢麗之詞楊文公始為西崑體洪适啓西崑彯組居張率之清官東觀紬書稱董狐之良史山谷詩人間風日不到處又人間風日不可奈詳見前紬書東壁漸摩天上之星辰石氏星經東壁之星主文籍後天文志東壁為文章晉天文志東壁二星主文章天下圖書之秘府也六鼇方戴於瀛洲列子渤海之東有大壑焉名曰歸墟中有五山一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊五山之根無所連著常隨潮上下往還帝使巨鼇十五舉首而戴之五山始峙而龍伯國有大人一釣而連六鼇五馬遄驅於汝水汝水其源上接旰江流經金谿縣南曲折行百餘里東流合豫章水謝靈運集序臨川在江西瀕汝之水以為郡而靈谷銅陵諸峯環列屏障詳見前穿天出月續康樂之詩章皇甫湜顧况集序往往穿天心出月脅意外驚人語謝靈運為臨川内史有入華子岡麻源谷諸詩貫日凌霜儲平原之氣節顔真卿傳貶峽州别駕吉州司馬遷撫湖二州刺史新書傳贊雖千五百歲其英烈言言如嚴霜烈日可畏而仰哉無多借冦見前㑹即詔黄循吏傳宣帝下詔曰制詔御史其以賢良髙節揚州刺史覇為潁川太守秩比二千石功名剰誇於數公陳後山詩聖朝未有徐州相剰作功名誇數公史冊相期於千載某地寒無挾天禀甚慳並見前童而習之偶成蠅於誤筆吳錄曹不興善畫孫權使畫屏風誤落筆㸃素因就以作蠅既進御權以為生蠅舉手彈之王維詩屏風誤㸃惑孫郎齒已長矣僅得雉於鳴盧左傳子之齒長矣不能事人又君之齒長矣未有太子南史顔師伯傳師伯多納賄賂家累千金孝武與摴蒲帝擲得雉大悦謂必勝師伯後得盧帝失色師伯遽歛子曰幾作盧詳見前欲留久逺之看蔡襄詩世間萬物俱塵土留取功名久逺看恐未遺餘之補韓文豈不登名于一科兮曾不補其遺餘渠其繞樹魏武短歌行繞樹三匝何枝可依何所托根山谷詩托根桃李塲拄笏而看西山幸遲瓜代山谷詩安知四海習鑿齒拄笏看度西山雲挂席而上南斗徑造棠隂杜詩隨雲拜東皇挂席上南斗注南斗吳地也南斗之地挂席而上之言適吳也初非商財賄之有無計班貲之崇庳止欲觀道徳於前後聴議論於左右俱見前特恐驢鳴之止一柳文他日驢一鳴虎大駭逺遁以為且噬已也然往来視之覺無異能者稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳難希馬價之倍三韓文晉人有鬻馬不售于市者知伯樂之善相也從而求之伯樂一顧增價三倍見刺史即周孔之初無他望河東復杜温夫書来柳州見一刺史即周孔之今而去我道連而謁于潮之二邦又得二周孔去之京師京師顯人為文辭立聲名以千數又宜得周孔千百向吾生胸中擾擾焉多周孔哉與童子慕回路也請在下風昌黎贈張童子序愈與童子俱陸公之門人也慕回路二子之相請贈與處也故有以贈童子通撫州林知府澤之撫州已見隨鴛鷺之行昔陪朝綴杜詩空慙鴛鷺行投鷄豚之社兹𨽻氓編韓詩願為同社人鷄豚燕春秋東坡詩鷄豚異日同為社應有千篇唱和詩未修負弩之恭見前敢緩馳牋之敬恭惟某官心扄凝粹扄涓熒切説文外閑之關也左傳周道挺挺我心扄扄淮南子中欲不出謂之扄徳宇恢通陸玩傳搢紳之徒莫不廕其徳宇柳詩宏規高徳宇麗藻競詞林杞梓廊廟之材宜其隆棟左傳晉大夫皆卿材也杞梓皮革韋承慶傳韋趙兄弟人之杞梓易棟隆吉璠璵瑚璉之器而乃潤山逸論語曰璠璵魯之寳玉也孔子曰美哉璠璵逺而望之煥若也近而視之瑟若也一則理勝一則孚勝荀子玉在山而木草潤淵生珠而岸不枯顧協傳貢玉之士歸之潤山論珠之人出于枯岸粤課民庸入司簿正居然難進而易退禮記事君難進而易退則位有序易進而難退則亂也可見特立而獨行禮記其特立獨行有如此者厭承明之廬抗嚴助之素志嚴助傳厭承明之廬勞侍從之事㸃臨川之筆尋靈運之舊游爾雅不律謂之筆滅謂之㸃注以筆滅字為㸃杜詩石欄斜㸃筆南史謝靈運傳為臨川内史臨川今撫州也宋書謝靈運傳為臨川内史賜秩中二千石在郡游放不異永嘉為有司所紏維此偏城臧洪傳論偏城既危曹袁方穆雖云凋郡韓文豈無凋郡庸以自效登瀛平地了無三島之風波瀛洲亭在撫州府治金柅園西其景為一郡之冠金柅園在郡城晏同叔詩臨川樓上柅園中十五年前此㑹同一曲清歌滿樽酒人生何處不相逄擬峴高臺盡領五峯之煙雨曾子固擬峴臺記尚書司門員外郎晉國裴君治撫州之二年因城之東隅作臺以遊而命之曰擬峴臺謂其溪山之形擬乎峴山也王介甫詩君作新臺擬峴山羊公千載得追攀歌鐘隱地登臨處花木移春指顧間城似大隄来宛宛溪如清漢落潺潺時平不比征吳日緩帶尤宜向此閑撫州城中有五峯三市謂青雲嶺逍遥嶺鹽嶺蕭家嶺與慶嶺而五曽子固贈撫州錢郎中詩名郎原是足風流得郡東南地更幽翠幙管絃三市曉畫堂煙雨五峯秋黄柑巧綴星垂檻香稻勻翻雪滿甌應與謝公資健筆邦人才薄詎能詶均洪十萬户之福韓文胡不均𢎞俾執事樞新唐書陳子昂傳一州得才刺史十萬户賴其福得不才刺史十萬户受其困企望二千石之良亟聴璽褒式遄珪覲詩以其介珪入覲于王某强名半刺實受一㕓㧞薤而擊强宗諒無待任棠之諷龎參傳參為漢陽太守郡人任棠有竒節參到先候之棠不與言但以薤一大本置戸屏前參曰㧞大本薤者欲吾擊强宗也詳見前索棗而夸新尹但切吟杜甫之詩杜詩酒酣誇新尹蓄眼未見有髙聲索果栗欲起時被肘通武岡呂知府祖烈武岡已見典午非材偶躐踐更之次恭帝紀贊宋高非典午之臣王導傳贊典午發踪賈充傳贊典午分崩韓詩長慙典午非材職詳見前涓辰秪戍式嚴事長之恭半生傾耳以懐賢張敞傳拭目傾耳觀化聴風韓信傳傾耳以待命者一旦奉身而佐治左傳奉身而退斐裁四六聊具萬分恭惟某官才應時需美兼世濟並見前丹青霖雨家傳三相之畫圖杜詩霖雨思賢佐丹青憶老臣三相謂䝉正夷簡公著宋史宰輔表端拱二年呂䝉正自給事中參知政事與趙普同相諡文穆天聖七年䝉正從弟䝉亨子夷簡自龍圖閣直學士兼侍讀知開封府守本官加同平章事與王曾張士遜同相謚文靖元祐元年夷簡子公著自金紫光禄大夫門下侍郎依前官加右僕射兼中書侍郎與司馬光文彦博同相謚正獻朱紫風流人敬千鍾之名字呂氏本萊州人自夢竒仕唐至户部侍郎子龜圖仕周為起居郎徙家河南龜圖弟龜祥仕宋以殿中丞知夀州因家焉龜祥𤣥孫好問以恩封東萊郡侯道統聿新於南渡宋史呂希哲字原明公著子夷簡孫少從焦于之孫復石介胡瑗學復從程顥程頥張載游聞見由是益廣晚年名益重逺近皆師尊之子好問孫祖謙文盟寔主於東萊宋史儒林傳呂祖謙字伯恭尚書右丞好問之孫祖謙之學本之家庭有中原文獻之傳長從林之竒汪應辰胡憲游既又友張栻朱熹講索益精初䕃補入官後舉進士復中博學宏詞科歴官著作郎兼國史院編修謚曰成學者稱為東萊先生今人莫棠棣之如蓋優家學詩棠棣之華鄂不韡韡凡今之人莫如兄弟故國非喬木之謂正倚世臣乃再轉而為丞始一麾而出守並見前由也果賜也達從政裕如黔之巑巫之嶓斯民幸甚巑族丸切高也磻音盤曲也柳文武岡銘黔山之巑巫水之磻然稽近比詎許久留式觀一節之趨禮記凡君召以三節二節以走一節以趨入侍九扉之闢某學未能信禄以代耕入誨諸生非敢絶吟而停手韓文口不絶吟於六藝之文手不停披於百家之編出延五鬼真成觸忌於轉喉昌黎送窮文捩手覆羮轉喉觸諱甘心曝簷日之溫歐陽公内制序凉竹簟之暑風曝茅簷之愛日韓詩暉暉簷日煖且鮮陳後山詩暮年五斗得千里有愧寒簷皆朝日豈意趣屏星之代見前今何如昔寧敢為李膺之大言南史蜀士李膺字公𦙍為涪令有才辯西昌侯藻為益州以為主簿使至都武帝悦之謂曰今李膺何如昔李膺對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對乃以為益州别駕著益州記三巻我不為公抑豈冀呂䖍之嘉贈王祥傳徐州刺史呂䖍檄為别駕委以州事政化大行時人歌之曰邦國不空别駕之功王覽傳初呂䖍有佩刀工相之以為必登三公可服此刀䖍謂祥曰茍非其人刀或為害卿有公輔之量故以相與此一聨不但用李呂當家語兼用别駕事所幸處治中之任而展其足見前固有負天下之望者為之前韓文士之能享大名顯當世者莫不有天下之士負天下之望者為之前焉風清月明秪望平分於别乘見前露繁天豁或容欵奉於清談杜陵贈虞司馬詩爽氣金天豁清談玉露繁上知贑州胡尚書榘贑州漢高帝使灌嬰畧定江南始為贑縣後漢屬廬陵郡吳分立南部都尉晉立南康郡東晉太守髙琰置郡城於章貢二水之間即今城是也隋罷南康郡為䖍州以䖍化水為名唐因之宋陞昭信軍節度紹興改為贑州胡榘字仲方為江西憲寧宗朝以工部尚書鎮三山作百花荘按宋史寧宗嘉定十二年五月太學生何處恬等伏闕上書以工部尚書胡榘欲和金人請誅之以謝天下聴尚書之履無以公歸分刺史之符徒得君重並見前地便過家之計後漢書宋均傳賜以金帛令過家上冢韓稜傳特聴稜得過家上冢岑彭傳有詔過家上冢東坡詩得郡書生榮還家昔人重又過家父老喜天知體國之忠宜奉十行遂倡九牧尚書六卿分職以倡九牧恭惟某官篤誠而明允肅括而𢎞深雲岫無心自然萬物之吐氣並見前秋竿有節豈以四時而改柯白樂天詩有節秋竹竿禮記其在人也如松柏之有心也故貫四時不改柯易葉萬人仰星辰之班六合無風塵之警誰因五單于爭立之釁宣帝紀五鳳三年詔匈奴諸王並自立分為五單于更相攻擊死者以萬數詳見匈奴傳五單于呼韓邪單于屠耆單于呼揭單于車犁單于烏藉單于也按寧宗嘉定十二年為金宣宗興定二年金史興定二年六月樞密院言諸道表稱大元集兵應州飛狐將分道南下所謂五單于争立也遂生十萬衆横行之謀季布傳單于嘗為書嫚呂太后太后怒召諸將議之上將軍樊噲曰臣願得十萬衆横行匈奴中非上智必英豪談何容易晉書蔡謨傳石季龍死朝野咸謂當太平復舊謨獨不然語所親曰夫能順天而奉時濟六合于草昧若非上哲必由英豪度徳量力非時賢所及東方朔傳談何容易師古曰不見寬容則事不易故曰談何容易時榘主和議太學生何處恬等上書請誅之故云厭承明勞侍從兆足以行見前尚煩西清學士之真上林賦象輿婉僤于西清師古曰西清者西廂清静之處也山谷詩玉堂端要真學士須得儋州秃鬢翁俾為南國諸侯之長詩序召公之教明於南國詩既敬既戒惠此南國東坡詩並為東諸侯長此佳山川牙旗鐵馬虎頭素重於百城方輿勝覽紹興二十三年校書郎董徳元言䖍州謂虎頭州非佳名也天下皆安獨此州有小警意其名有以召之既而廷臣建議亦謂䖍有䖍殺之義請去其不令之名遂改贑州東坡詩行看鳳尾詔却下虎頭州寶帶金魚龍尾仍通於八座隋書楊素傳賜萬釘寶帶唐百官志中尚令製魚袋給百官三品四品有飾金與銀之别賈氏談錄含元殿側龍尾道自平階至凡詰曲九轉由丹鳳門北望宛如龍尾下垂于地焉新唐書李徳裕傳凡罷朝由龍尾趨出遂無輙至閣者安禄山傳禄山逆謀日熾每過朝堂龍尾道南北睥睨久乃去宋㑹要西京大内正殿曰太極殿殿前有左右龍尾道日樓月樓龍尾道以青石甃之望之蜿蜒如龍尾張籍詩身貴早登龍尾道功髙自破鹿頭城白樂天詩步登龍尾上虚空立去天顔無咫尺又龍尾趂朝無氣力牛頭參道有心期姚合詩纔歸龍尾舍鷄舌更立螭頭運毫又鴛鷺簪裾上龍尾蓬萊宮殿壓鼇頭王荆公詩忽隨諸彦登龍尾尚憶當年應鵠頭納獨峰於胸次莊子喜怒哀樂不入於胸次山谷詩胸次要落落又胸次欲空洞又胸次不使俗塵生又胸次九流清似鏡攬八境於毫端東坡八境圖詩序云南康八境圖者太守孔君之所作也君既作石城即其城上樓臺觀榭之所見者而作是詩也東望七閩南望五嶺覽羣山之參差俯章貢之奔流雲煙出沒草本蕃麗邑屋相望鷄犬之聲相聞觀斯圖也可以茫然而思粲然而笑慨然而歎也䖍州八境詩坐看奔灘遶石樓使君髙㑹百無憂三犀竊比秦太守八詠聊同沈隱侯濤頭寂寞打城還章貢臺前暮靄寒倦客登臨無限思孤雲落日是長安白鵲樓前翠作堆縈雲嶺路若為開故人應在千山外不寄梅花逺信来朱樓深處日微明皂盖歸時酒半醒薄暮漁樵人去盡碧溪青嶂遶螺亭使君那暇日參禪一望叢林一悵然成佛莫教靈運後著鞭從使祖生先却從塵外望塵中無限樓臺煙雨濛山水照人迷向背只尋孤塔認西東煙雲縹緲鬰孤臺積翠浮空雨半開想見之罘觀海市絳宮明滅是蓬莱回峯亂嶂鬰參差雲外髙人世得知誰向空山弄明月山中木客解吟詩富貴歸郷人知從太守之樂其樂項籍傳富貴不歸故郷如衣錦夜行六一居士醉翁亭記人知從太守遊而樂而不知太守之樂其樂也謀猷入告誰其先天下之憂而憂見前無疾其驅韓文無疾其驅天子有詔不諫亦入詩不聞亦式不諫亦入某一違絇繶絇音渠説文纑繩絇也禮記童子不屨絇注絇屨頸飾也繶音憶屨縫中紃周禮屨人為赤臆黄臆青句赤臆黄臆者以黄赤之絲為下縁也句通作絇青句以青絲飾屨頭之鼻也五見袗絺從事無分寸之功失勢有千丈之落並見前路經灧澦髩聳雙蓬杜詩路經灧澦雙蓬鬢天入滄浪一釣舟身出褒斜命危一葉謫甘滿百並見前黜不待三北宮之挫一毫縱無膚撓撓女教切擾也屈也東野之失連産轉覺心寒昌黎孟東野失子詩序東野連産三子不數日輙失之幾老念無後以悲其友人昌黎韓愈懼其傷也推天假其命以喻之惟是頃者之誤傳或聞舉之以自代士固伸於知己史記管晏傳吾聞君子詘于不知己而信于知己者索隱曰信讀曰申謂以彼知我而我志獲申吾不足以累公袁盎傳公幸有親吾不足絫公注絫古累字音類韻㑹事相縁及也増韻縈也玷也巨源之表嵇康良非素望嵇康傳山濤將去選官舉康自代康乃與濤書告絶南史王繢傳齊武帝為撫軍吏部尚書張岱選繢為長史呈選牒髙帝笑曰此可為素望王鎮之傳阮萬齡少知名為孟昶建威長史時袁豹江夷相係為昶司馬時人謂昶府有三素望范泰傳泰卒議贈開府殷景純曰泰素望不重不可擬議台司昌黎之薦侯喜亦足自竒昌黎與祠部陸員外書文章之尤者有侯喜喜之文章學西京而為也舉進士十五六年矣幸而出大賢之門亦合進小夫之牘寔以熏心於憂患未由奏記於門墻並見前道逢千騎之上頭古樂府東方千餘騎夫壻居上頭何用識夫壻白馬從驪駒喜甚六鼇之抃足輙裁賀語併控謝忱名在惡子之中敢廢南豐瓣香之敬陳後山觀兗文忠公家六一堂圖書詩向来一瓣香敬為曾南豐世雖嫡孫行名在惡子中斯人其已逺千歲幸一逢吾老不可待草露濕寒蛩門無行媒之迹亦甘師道三徑之荒山谷詩門無行媒迹草木何憔悴又海宇日清明廟堂勤洒掃何為陳師道白髪三徑草通武岡虞知軍衡武岡已見詳啓意虞蓋厯宰倅而轉知軍仁侯出牧韓文今天幸惠仁侯和氣先驅黔之巑巫之磻地稱樂土詩逝將去女適彼樂土樂土樂土爰得我所餘見前軫之旁鶉之尾天假徳星晉天文志自張十七度至軫十一度為鶉尾於辰在已楚之分野屬荆州長沙一星在軫之中謹藉雙魚候迎千騎恭惟某官人門具美並見前風調不羣利器盤根縣最茂朝歌之長虞詡傳為朝歌長故舊皆弔詡笑曰志不求易事不避難臣之職也不遇槃根錯節何以别利器乎詳别見清談繁露家聲稱秘監之孫杜陵贈虞十五司馬詩逺師虞秘監今喜識𤣥孫形象丹青逼家聲器宇存爽氣金天豁清談玉露繁公自注秘監世南也虞世南傳遷太子右庶子固辭改秘書監封永興縣子從容再轉之丞恬退一麾之守惟武岡之矯矯晉數茂𢎞晉書王導字茂𢎞以討華軼功封武岡侯贊曰武岡矯矯匡時緝政懿績克宣忠規靡競若文儒之申申唐推公綽桞文武岡銘御史中丞栁公綽練立將校提卒五百屯于武岡不震不騫如山如林文儒申申有此武功考之近比尤不久留吳公治平之勳甫簪筆而持槖見前此吳公指武岡前守呂侯詳刑之命又攬轡以登車書序呂命穆王訓夏贖刑此呂侯指前武岡知軍呂祖烈言田郡守轉提刑也我公來合於左符此事即探於右劵虞卿傳事成操右券以責詳見前湘水如舞暫迎五袴之來栁文湘源二妃廟碑銘南風湑湑湘水如舞將于無讙神聴鐘鼓嶽雲既開又趣雙旌之入某頃因退鷁並見前及識匿犀李固傳固貌狀有竒表鼎角匿犀足履龜文注匿犀伏犀也謂骨當額上入髮際隱起也何幸宣州主人之来韓文愈未嘗至宣州而樂頌其主人之賢者以其取人信之也將有黔中上佐之託見前惟是箝尾以涉筆韓文吏抱成案詣丞巻其前鉗以左手右手摘紙尾平立睨丞曰當署丞涉筆占位署惟謹偶然越俎以代庖兹僭修副貳之恭非强附交承之末時梅亭權知軍除道路而迎太守願亟驅畫隼之旟朱買臣傳㑹稽聞太守且至發民除道縣吏並送迎車百餘乗旟説文錯革畫鳥其上周禮州里建旟州里所建鳥隼取其勇捷爾雅錯革鳥曰旟郭璞注此所謂合剥鳥皮毛置之竿頭徐游藝碑秩映隼旟榮驂熊軾封府庫以待將軍庶早反屠羊之肆見前謝綿州虞知府普綿州即漢廣漢郡之涪縣莽曰綂睦東漢復曰涪縣蜀漢屬梓潼郡隋唐為綿州宋因之南渡後兼綿茂石泉沿邊安撫節制屯戍軍馬將指非材連需章而祈免蔡邕獨斷章者需頭奏者亦需頭表者不需頭詳見前陳情未達勤巽命之重申易重巽以申命需巽卦名力不足以回天文選回天倒日之力張𤣥素傳𤣥素諫營洛陽宮魏徴名梗挺聞其言歎曰張公論事有回天之力錢何由而流地劉晏傳自言如見錢流地上詳見前洊䝉問勞洊通作臶才甸切重也仍也廣韻再至也易水洊至洊雷震秪重悚慙恭惟某官才應時需美全世濟連擁雙旌之駕喜騰五袴之歌並見前紫闥黄扉自合傳登庸之鉢蜀志郤正傳躊躇紫闥喉舌是執曹植表注心皇極結情紫闥崔駰達㫖攀台階闚紫闥皇甫謐傳排閶闔步玉岑登紫闥侍北辰魯褎錢神論排金門入紫闥南史庾仲文傳陛下便可閑臥紫闥無復一事也金坡遺事玉署之設密邇紫闥廣韻漢號禁門曰黄闥顔師古曰宮中小門曰闥扉説文户扇也爾雅闔謂之扉漢丞相金印紫綬黄扉黑幡所以異車服於百辟也邵氏聞見錄摭言云禪家相傳法謂之傳衣鉢唐狀元以下往謝主司同科名者謂之謝衣鉢故范質舉進士主文和凝愛其文以第十三人登第謂質曰君之文宜冠多士屈居十三欲傳老夫衣鉢也質以為美有獻詩云從此廟堂添故事登庸衣鉢亦相傳互見前傳燈錄池州使君問五祖曰㑹中有五百僧不傳衣鉢為甚却付盧行者五祖曰四百九十九人㑹佛法唯有盧行者一人不㑹佛法他則悟道謂之過量人方傳得衣鉢朱甍碧瓦且暫分磊落之州甍謨盲切説文屋棟也徐曰所以承瓦故從甍釋名屋脊曰甍甍䝉也在上覆䝉屋也唐顯慶中太宗子越王正為綿州刺史於州城西北隅建樓故杜詩云綿州州府何磊落顯慶年中越王作孤城西北起髙樓碧瓦朱甍照城郭互見前有憐芻狗之陳非具木牛之智並見前薾然疲役莊子薾然疲役而不知其所歸可不哀耶詳見前畏此簡書見前猶加從臾之詞方言南楚凡已不欲喜怒而旁人説者謂之慫慂或作從臾衡山王傳日夜縱臾如淳曰縱才勇切臾讀作勇師古曰奬勸也互見前乃相親厚之道韓文乃相親重之道耳非所以待足下者也某冐申傴僂傴於語切僂音縷增韻身向前也詳見前冀免馳驅澤國龍節土國人竟莫回於先甲周禮掌節土國用人節澤國用龍節大家牛車小家擔尚有望於同寅兒寛傳大家牛車小家擔負輸租繦屬不絶代回開州張守晉方輿勝覽開州秦漢為巴郡朐䏰縣地後漢分朐䏰西北界今州南二里置漢豐縣屬固陵郡蜀漢改為巴東郡西魏於達州新寧縣置開州因開州以為名後周置漢豐縣為永寧縣自東開郡城移開州于今治今州西九十里濁水故城是也隋煬帝改永寧為盛山縣恭帝於盛山縣置萬州及萬歲郡唐重置開州改盛山縣復為開州宋因之元以縣省今改開縣屬夔州府詳啓意蓋代月湖下同榮分漢竹少憩召棠絶冀北騎麒麟真成歴塊麒麟當作騏驎騏音其詩有騂有騏毛傳蒼棋曰騏正義云謂青而微黒今之驄馬也説文騏馬青驪文如博棊也驎馬色駁也今之連錢驄韓文冀北馬多天下又披髮騎騏驎王褎傳蹶如歴塊出巴東屬朐䏰審已開藩地理志開州盛山郡義寧二年置天寳元年更名朐䏰故城在今夔州雲安縣西劉禹錫云朐䏰蚯蚓也地濕多此蟲故名昌黎韋侍講盛山十二詩序不知其出於巴東以屬朐䏰也注朐䏰説文蟲名考其義當作潤蠢唐韻音蠢潤劉禹錫音屈忍漢書朐音劬今按漢書地理志巴郡有朐忍縣容母水所出南有橘官鹽官顔師古云朐音劬誤也説文朐其俱切從肉句聲脯脡也又山名地理志齊郡臨朐縣有臨朐山洋水所出説文朐如順切從肉旬聲䏰尺尹切從内忍聲蟲名漢中有􅓃䏰縣地下多此蟲因以為名今以朐作朐傳寫之訛也而顔氏大儒乃誤音何與恭惟某官文學浚明器資膚敏談笑千牛之解游刃有餘見前超騰一鶚之飛揷翎甚勁言從涪水説文涪水出廣漢巴􅗲外南至墊江入漢一綂志涪江在今重慶府西北来自嘉陵江經合州至城北入岷江易守固陵開州漢屬固陵郡詳見題下編元子之珠璣多傳詩賦奏韋矦之金石又妙詞章韋侍講盛山十二詩序韋矦讀六藝之文以探周公孔子之意又妙能為詞章可謂儒者夫儒者之於患難茍非其自取之其拒而不受於懐也若築河堤以障屋霤其容而消之也若水之於海冰之於夏日其翫而忘之以丈辭也若奏金石以破蟋蟀之鳴秋蟲之聲臥而治之行且召矣見前某罔功犴獄詩宜犴宜獄犬所以守故謂獄為犴亦作岸毛傳岸訟也韓詩云郷亭之獄曰犴躐長雉工無論思朝夕之才漫誇文石並見前有追逐雲月之友邈在盛山韋侍講盛山十二詩序有以韋矦所為十二詩遺予者其意方且以入谿谷上巖石追逐雲月不足日為事讀而歌詠之令人欲棄百事往而與之游云云今按盛山在開州北三里山下有宿雲亭隱月岫流杯渠琵琶臺綉衣石山形如盛字故昔人有拄笏看山尋盛字之句謝諤詩金房開達皆名州盛山更在天上頭韋侍講名處厚唐書有傳代回融州沈守暐融州漢為鬰林郡潭中縣地吳分鬱林郡置鬱林縣蕭齊置齊熈郡梁置東寜州隋改東寧為融州又改齊熈郡為義熈縣煬帝𨽻始安郡即今之桂州也唐置融州改融水郡宋復為融州方輿勝覽云玉融山水為天下最而老人巖真仙巖之類又其最也出綸西掖宅牧南交惟帝念功不泄邇而忘逺並見前建侯樹屏率崇徳而象賢尚書乃命建矦樹屏在我後之人屏音丙恭惟某官風調不羣人門具美製百里之錦游刃有餘題别駕之輿建幡甚邇朝陽之鳴已近並見前夜郎之徼方虛圖經融州東南接桂林都㑹之境西北有牂牁夜郎之地君無遐心民有吐氣某無由旅賀猥辱謙施五馬不受二毛此可慶耳雙魚中有尺素何以報之並見前代回江州莫殿撰中書子純江州禹貢為荆楊二州之境春秋為吳西境為楚東境後屬楚秦屬廬江郡漢髙帝改九江曰淮南國晉置江州因江水為名又分尋陽柴桑二縣置尋陽郡屬江州陳治尋陽隋置江州移治湓城唐為尋陽郡復為江州宋因之今為九江府叢棘藏瘝改司平之常伯禮記凡聴五刑之訟成獄辭史以獄成吿于正正聴之正以獄成告于大司冦聴于棘木之下鄭云棘取赤心而外刺春秋元命苞樹槐棘聴訟于其下棘者心有刺言治人者原其心不失赤實而以刺人其情令各歸實易坎上六係用徽纆寘于叢棘三歲不得凶月湖以刑部侍郎遷工郎尚書故云五花委重勤解事之舍人通鑑唐故事中書有軍國政事則中書舍人各執所見雜署其名謂之五花判事其中選一人明練事者知機密謂之解事舍人新唐書齊澣傳為中書舍人論駁及詔誥皆援凖古義朝廷大政必諮之號解事舍人敢祓謝箋并捈賀臆捈抽居切通作攄博雅舒也増韻摛也恭惟某官多士冠冕九牧羽儀要路在前獨有韓稚圭之識榮進素定了無張師徳之譏忠結人主之知文鼓天下之動乃從右掖而綰左符並見前鞭鳳笞鸞宜有燕閑之樂韓詩上界真人足官府豈如散仙鞭笞鸞鳳終日相追陪帶牛佩犢反勤禽制之威王尊傳曠日煩費不能禽制龔遂傳二千石不能禽制兹陞秘殿之華歐陽修除劉沆制惟兹秘殿之嚴就易大邦之翰九江虎渡交騰来暮之謡宋均傳遷九江太守郡多虎暴常募設檻穽而猶多傷害均到下記屬縣務退貪姦思進忠善一去檻穽除削課制其後傳言虎相與東游度江十年鳳池恐有見晚之召夢溪筆談張唐卿進士第一人登科期集於興國寺題詩句於壁曰一舉首登龍虎榜十年身到鳳凰池有人續云君看姚曄併梁固不到朝官未可知後果終于京官姚曄梁固真宗朝狀元唐卿仁宗朝狀元某老當謝事禮記七十而致事若不得謝則必賜之几杖頑復即工尚書苖頑弗即工此借用君薄淮南耶計登庸之不逺吾在汶上矣恐邂逅之無期代回方韶州信孺見第二十五巻方提刑條注曲韶州漢初屬南粤武帝平南粤而江以縣𨽻桂陽郡統於荆州後漢因之置始興都尉三國屬吳晉以始興郡屬廣州宋更郡名曰廣興齊復為始興陳覇先為始興太守起兵討矦景陳於此置東衡州隋開皇元年改為韶州以州有韶石相傳舜登此石奏韶歌因取以名郡五雉分工何補鷄翹之末後漢輿服志鸞旗者編羽旄列繫幢旁民或謂之鷄翹非也李商隱詩屬車無復揷鷄翹雙魚尺素又勤驛使之来藏弆為榮不知所賀恭惟某官器資膚敏政術融明以專對之學專城裕乎不裕宋史方信孺傳自春至秋使金三往返以口舌折强敵金人計屈情見用平戎之策平盜難豈其難新唐書王忠嗣傳上平戎十八策髙駢詩恨乏平戎䇿慙登拜將壇輙從三章之谿宋史信孺忤韓侂胄奪三秩臨江軍居住臨江有章山使鎮九韶之石韶石在韶州東北八十里郡國志斗勞水開有兩石相峙髙百仞廣五里相去一里大小畧均似雙闕州取名焉此外又有三十六石各有名楊廷秀望韶亭詩新隆寺後看韶石三三兩兩畧依稀金坑井頭看韶石十十五五不整齊一来望韶亭上看九韶八音堆一案金鐘大鏞浮水涯玉瑟瑶琴倚天半堯時文物也麄疎禮樂猶帶鴻荒餘茅茨殿上搥土鼓葦葉聲外無笙竽黄能郎君走州嶽領取后夔搜禮樂嶧山桐樹夜半鳴泗水石頭清盡曜山神川后争獻珎姚家制作初一新帝思南嶽来時廵宮琛廟寳皆駿奔曲江清澈碧瓊軟海山孤尖翠屏展天顔有喜后夔和一奏雲韶供亞飯帝登九疑忘却歸不知斑盡湘笛枝后夔一脛跛莫随坐委衆樂江之湄儀鳳舞獸掃無迹獨留一狻守其側至今喚作獅子石雨淋日炙爛不得洞庭張樂已莓苔犍為獲磬亦塵埃不如九韶故無恙戞擊尚可起冬雷何時九秋霜月裏来聴湘妃瑟聲美曲終莫道不見人江上數峰是誰子顯允方叔佇獲醜以言歸詩顯允方叔伐鼓淵淵方叔率止執訊獲醜注明信之方叔執其可言問所獲敵人之衆以言歸也埶競武王豈泄邇而忘逺詩執競武王無競維烈注言能持强盛之道者惟有武王某罔功雲部攝長水曹勞侍從厭承明㑹且歸矣詩㑹且歸矣無庶予子憎選賢良安渤海跂予望之跂去智切音與棄同通作企説文舉踵也詩跂予望之餘見前代回譙沅州得遇秦昭王使白起侵楚取蠻夷地為黔中郡漢髙帝改為武陵郡屬舞陽地武帝置䍧牱郡屬益州梁置沅陵郡隋以郡為陜州唐析辰溪置麻陽縣以龍標置巫州更曰沅州復為巫州為潭陽郡又更巫州為叙州宋熙寧間章惇為湖北常平使者收復其地置沅州榮分竹使出牧杏城安邊境立功名維其時矣鼂錯傳安邊境立功名在於良將不可不擇也詩物其有矣維其時矣崇詩書閱禮樂盍少試焉恭惟某官濟美勳門蜚英學省新唐書歸崇敬傳天子學曰璧雍前世或曰璧池或曰璧沼亦言學省沈約學省愁臥詩注學省國學也山谷詩學省得佳士又學省非簿領又學省困虀鹽班超投筆當加萬里之封班超傳家貧常為官傭書久勞苦嘗輟業投筆歎曰大丈夫無他志畧猶當效傅介子張騫立功異域以取封矦安能久事筆研間乎韓信登壇可决千里之勝見前得州如斗宋宗慤為豫州典籖多所連埶慤大怒曰慤年六十得一州如斗大不能復與典籖共臨之游刃成風荘子恢恢乎游刃有餘地又匠石運斤成風沅芷公子之思聊逍遥兮容與屈原九歌沅有芷兮澧有蘭思公子兮未敢言又時不可以驟得聊逍遥兮容與楚茅王祭之入應紏合而彌縫左傳爾貢包茅不入王祭不共無以縮酒寡人是徴又糾合諸矦而謀其不協彌縫其闕而匡救其災昭舊職也今按包茅山在沅州麻陽縣西南三百五十里武陽記云上有三脊茅可以縮酒寰宇記云即楚國入貢之茅豈舍王哉今召君矣某雖當請别猶闕賀成淮南子大厦成而燕雀相賀選用賢良欲安之願察舉龔之意龔遂傳渤海盜賊並起上選能治者丞相御史舉遂可用召見不副所聞問遂何以息其賊盜遂對曰陛下欲使臣勝之耶将安之也上悦其對答曰選用賢良固欲安之也備足文武可使也更疇借冦之功冦恂傳光武定河内難其守問於鄧禹禹曰冦恂文武備足有牧人御衆之才非此子莫可使也餘見前代回張澧州忠恕澧州秦屬黔中郡漢改武陵郡屬荆州州治即漢武陵之零陽縣地吳立天門郡晉置南平郡及僑置南義陽郡隋廢郡置松州尋改澧州以州在澧水之北故以為名大業為澧陽郡唐改澧陽郡復為澧州屬山南道宋仍之𨽻荆湖北路夏后之辟三千罔功亞旅晉刑法志夏后氏之王天下也則五刑之屬三千殷因于夏有所損益尚書司徒司馬司空亞旅爾雅亞次也旅衆也孔傳衆大夫其位次卿冬官其屬六十謬玷上卿五馬髙情雙魚下問恭惟某官受材膚敏涖事靖恭挺挺魏謩寧無祖烈並見前昂昂嵇紹宜有父風晉書忠義傳嵇紹字延祖魏中散大夫康之子始入洛或謂王戎曰昨於稠人中始見嵇紹昻昻然如野鶴之在鷄羣戎曰君復未見其父耳聊分漢竹之符出結澧蘭之佩楚辭遺余珮兮澧浦又紉秋蘭以為佩詳見上條某罔功曳履有味投簪左思詩躊蹰足力煩聊與投吾簪張協詩抽簪解朝衣散髪歸海隅荒元亮之菊籬竟成何事陶靖節集三徑就荒松菊猶存又種菊東籬下悠然見南山想浮㐀之松塢空送此心大浮山在澧陽縣西南一百三十五里圖經載石門縣亦有浮山以為浮㐀先生學道之所蓋浮山濶逺跨據數縣也宋樓鑰詩讀書記羣玉採藥思浮㐀代回尤衡州棐衡州秦為長沙郡漢屬桂陽郡又長沙國吳置湘東郡晉置湘州宋為國齊為郡梁置衡州陳置東衡州以本州為西衡州隋置衡州煬帝改為衡山郡唐復為衡州宋因之按宋史尤袤傳袤子棐槩孫焴禮部尚書則棐袤之子也仕至工部侍郎焴即棐之子榮分漢竹言憩甘棠崇徳象賢共謂錫山之有後尤袤傳袤字延之常州無錫人入太學以詞賦冠多士尋冠南宫登紹興十八年進士第歴官禮部尚書贈金紫光禄大夫諡文簡錫山在無錫縣西七里慧山東峰也周秦間曾産鉛錫有樵者於山下得古銘云有錫兵天下争無錫寧天下清有錫沴天下弊無錫乂天下濟至漢初錫殫故縣以無錫名新莽改曰有錫自光武以後不復有錫復名無錫牧人御衆從知衡嶽之無虞冦恂傳鄧禹曰冦恂文武備足有牧人御衆之材非此子莫可使也恭惟某官業履粹明聲華茂麗喬术非謂故國文獻固存茁蘭稱其家兒典刑是似韓文蘭茁其牙稱其家兒也兹紆魚珮作牧熊湘見前平庶民愁恨之心去其螟螣詩不稂不莠去其螟螣注食心曰螟食葉曰螣皆蝗類也皆政貪所致還中州清淑之氣懐彼鴟梟韓文衡山之神既靈又當中州清淑之氣蜿蟺扶輿詩翩彼飛鴞集于泮林食我桑黮懐我好音佇增秩以賜金復鳴謙而曳玉某無由旅賀猥沭謙撝謙字複上用賢良固欲安之既深簡在龔遂傳選用賢良固欲安之也詳見前冀京師并䝉福也更乞勉㫋郭伋傳徵拜潁川太守召見辭謁帝召之曰賢能太守去帝城不逺河潤九里冀京師并䝉福也楊惲傳願勉㫋無多談師古曰㫋之也杜詩困學適從衆明公各勉㫋歐陽永叔詩憂傷白髮吾今爾仕宦青雲子勉㫋山谷詩勉㫋吾子富春秋代回富和州嘉謀和州於天文直南斗魁下秦為厯陽縣𨽻九江郡漢屬淮南國後屬九江郡而厯陽為治所後漢揚州移治於此三國吳為重鎮晉立厯陽郡宋為南豫州治厯陽劉禹錫和州㕔壁記云梁之亡也北齊圖覇功擁正陽矦淵明以歸王僧辯来迎㑹於兹地二國和協故以名州隋唐或為歴陽郡或為和州宋因之𨽻淮西路起之家林山谷詩小溪風物似家林分以竹符用忠良慈惠之帥漢書刑法志忠信之長慈恵之師慰愁恨歎息之民邊圉底寧前旒寛顧家語聖王冕而前旒栁詩忽如朝玉皇天冕垂前旒恭惟某官名門濟美雋軌舒翹六一居士詩萬國㑹王州羣英馳雋軌栁文舒翹揚美推類援朋方事之殷能運糧而排泗左傳方事之殷也有韎韋之跗注殷盛也陶侃傳方事之殷當賴羣儁相時而動復得計以觀濠易君子蔵器於身待時而動荘子於魚得計又荘子與惠子游於濠梁之上荘子曰儵魚出游從容是魚樂也栁詩魚樂知觀濠濠梁即河水在臨濠城下荘子與恵子觀魚處何小智之自私賈誼傳小智自私賤彼貴我疑大勇之若怯禮記勇者若怯忠無不報鄒陽傳忠無不報信不見疑事乆益明兹從珍臺西京賦珍臺蹇産以壮極甘泉賦珍臺閒館璇題玉英蜵蚹蠖濩之中遂殿藩服周禮又其外五百里曰藩服惟是烏江之重鎮實係垣墉烏江在和州城北故烏江縣東四里即亭長艤船待項王處金陵世紀云江浦即舊烏江縣王介甫詩百戰疲勞壮士哀中原一敗勢難迴江東子弟今雖在肯為君王卷土来胡曾詩争帝争王勢已傾八千兵散楚歌聲烏江不是無船渡恥向東吳再起兵尚書若作家室既勤垣墉非資青社之餘規難安田里史記小子閎受兹青社民之瘼矣瘼通作莫説文病也詩民求之莫又亂離瘼矣君必勉之某雖忻除目之頒姚合詩一日看除目三年損道心猶缺建牙之賀禮含文霧牙旗者将軍所建也後漢滕輔祭牙文敬建髙牙神武攸託晉袁宏祭牙文敢建髙牙烈烈桓桓宋王誕祭牙文敬建髙牙顯兹威靈宋鄭鮮之祭牙文崇牙既建義鋒增厲除建對緑琴委贈莫辦貂褕之酬畫㦸凝香願謹燕寢之衛並見前代回趙饒州師㞧饒州秦為鄱陽縣屬九江郡漢屬豫章郡東漢置鄱陽屬廬陵郡隋改廬陵郡為饒州唐宋因之州以物産豐饒得名故唐章孝標詩云饒陽因得富州名是也取材右戚文帝紀左賢左戚先民後已師古曰以賢為上然後及親也予節左符東坡詩横空好在修眉色頭白猶堪乞左符南土跕鳶風俗昔諳於瀧吏馬援傳當吾在浪泊西里間虜未滅之時下潦上霧毒氣熏蒸仰視飛鳬跕跕墮水中昌黎瀧吏詩云南行逾六旬始下昌樂瀧往問瀧頭吏潮州尚幾里行當何時到土風復何似注瀧音雙水名昌樂今韶州縣樂昌五里有昌山有樂石瀧在縣上五里今按昌山在樂昌乃士庶嬉游之所樂石即韶石也許申張曲江祠記樂石竒怪而甲出俗謂未湍浚為瀧東方擁騎江湖今樂於番君古辭陌上桑東方千餘騎夫壻居上頭吳芮傳秦時番陽令也甚得江湖間民心號曰番君恭惟某官麟趾清標詩序闗雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也鴻寳奥學劉向傳淮南有枕中鴻寳苑秘書師古曰鴻寳苑秘書並道術篇名蔵在枕中言常存錄之不漏洩也文章賀白决科俊造之羣禮記司徒論選士之秀者而升之學曰俊士升于司徒者不征于鄉升于學者不征于司徒曰造士政事龔黄接武循良之傳東坡詩龔黄側畔難言政羅趙前頭且眩書梅花萬里杜詩五嶺皆炎熱宜人獨桂林梅花萬里外雪片一冬深麥穗兩岐東觀漢紀張堪為漁陽太守勸民耕種以致殷富百姓歌曰桑無附枝麥穂兩岐張君為政樂不可支盍歸乎来為王卿士尚書蔡仲克庸祗徳周公以為卿士然宅乃牧亦福京師尚書宅乃事宅乃牧郭伋傳河潤九里冀京師并䝉福也訪九賢之風流九賢吳周魴黄武間為鄱陽太守鄱人彭綺作亂魴生擒之賜爵闗内矦晉虞溥為鄱陽内史大修郡學廣招生徒風化大行梁陸襄為鄱陽内史郡人鮮于琮作亂襄生擒琮為政六年郡中大寧隋梁文謙大業中為鄱陽太守招撫饑民民甚徳之治行為天下最隋栁荘討平徐璒等即授饒州刺史甚有治名唐馬植太和間為鄱陽太守嘗築堤百姓便之呼為馬公堤唐李復建中初為饒州刺史築堤捍江民徳之號曰李公堤唐顔真卿乾元初為饒州刺史時盜掠郷村真卿捕首惡磔于市郡中肅然宋范仲淹景徳中坐朋黨出知饒州興學校明教化一以豈弟為政賑濟饑民賴全活者以萬計郡治有九賢堂圖像其中安庶民於田里亟其璽賜當以衮歸某猶缺賀成乃勤委重並見前雙魚中有尺素已尊君子之謙易謙尊而光五馬不受二毛更覺王孫之貴杜詩尚覺王孫貴豪家意頗濃代回林撫州㞯撫州已見右虎留符文帝紀初與郡守為銅虎符師古曰與郡守為符者謂各分其半右留京師左以與之左龜拂印何法盛晉中興書孔愉經餘亭放龜溪中龜中流左顧後以功封餘亭矦及鑄矦印而龜左顧更鑄亦然印工以聞愉愉悟乃取佩以栁易播君何改刺之嫌韓文劉夢得在遣中當詣播州子厚泣曰播州非人所居将拜疏願以栁易播遇有以夢得事白上者夢得改刺連州自宋之滕我得受㕓之幸月湖為郡人故云恭惟某官材全業鉅韓文鏗鏘發金石幽眇感鬼神信所謂材全而能鉅者也學廣聞多韓文學廣而聞多不求聞于人也七嵗而賦方圓靜若得意新唐書李泌傳泌七嵗知為文𤣥宗召見方與燕國公張説觀奕因使説試其能説請賦方圎動静泌逡廵曰願聞其畧説因曰方若棋局圓若棋子動若棋生静若棋死泌即答曰方若行義圓若用智動若騁材静若得意説因賀帝得竒童連年之取科第易於摘髭韓詩連年取科第若摘頷底髭教胄西宗言知西外宗正司在福州抗㫋北漠説文漠北方流沙也通作幕漢書絶幕注沙漠匈奴之南界旋被南衙之薦李揆傳本朝置南北衙文武區别髙元裕傳西頭勢乃重南衙樞密之權過宰相宇文士及傳南衙羣臣面折廷爭入讐東觀之書通典後漢圖書在東觀詳别見輟從第一之秘丞梁書劉孝綽傳七嵗能屬文號曰神童出為上虞令還除秘書丞髙祖謂舍人周捨曰第一官當用第一人故以孝綽居此職進陪十五之郎位天官書五帝座後聚一十五星曰郎位天文志南宮後聚一十五星曰哀烏郎位願試馮翊蕭望之傳宣帝察望之材任宰相欲詳試其政事復以為左馮翊勇下蓬莱華嶠後漢書學者稱東觀為老氏藏室道家蓬莱山今轉為汝水之行謝靈運宋謝逸文集序臨川在江西瀕汝水以為郡而靈谷銅陵諸峰環列如屏障詳見前殆亦是吾州之慶寘薤一本未能獻邦人之規歌麥兩岐已略聞太守之政所願召參之使少寛借冦之民某方欲賀成先勤委重並見前倡父老曰陽公賢也行亦謀歸昌黎送何堅序堅道州人道之守陽公賢也堅歸倡其州之父老子弟服陽公之令有子弟而子産誨之别遲善頌代回方連州桷連州春秋楚州秦為長沙郡之南境西漢有桂陽郡而桂陽陽山以縣屬焉吳分桂陽置始興郡宋改始興為廣興郡齊復為始興郡梁武帝分置陽山郡隋廢郡置連州因黄連嶺以為名煬帝改熙平郡唐復置連州宋因之疏恩北闕宅牧南交見前唐陽山之都雖云窮處昌黎送區冊序陽山天下之窮處也陸有㐀陵之險虎豹之虞江流悍急横波之石㢘利侔劒㦸舟上下失勢破碎淪溺者往往有之縣郭無居民官無丞尉夾江荒茅篁竹之間小吏十餘家皆鳥言夷面始至言語不通畫地為字然後可告以出租税奉期約九域志日出光照故名陽山漢桂陽之守蓋有聞人後漢書循吏傳衛颯為桂陽太守郡與交州接境俗不知禮則颯下車脩庠序之教設婚姻之禮朞年間邦俗從化南陽茨克代之亦善其政教此得利益許荆和帝時遷桂陽太守郡濵南州風俗脆薄不識學義荆為設䘮紀婚姻制度使知禮禁在事十二年父老稱歌桂陽人為立廟樹碑互見前恭惟某官抱負雄深韓文抱負其業東歸於家踐揚詳熟為丞再轉人歌别駕之功韓文再轉而為丞兹邑王祥傳時人歌之曰邦國不空别駕之功詳見前出守一麾上念專城之重選詩屢薦不入官一麾乃出守新唐書虞奐傳為陜州刺史𤣥宗嘉其美政題賛于㕔事曰専城之重分陜之雄亦既利物内存匪躬斯為國寳不墜家風古辭陌上桑四十専城居有蕐銀嶺銀山在今饒州府徳興縣東三里一名鄧公山山出銀唐總章初置塲至宋天聖間山穴傾摧而銀課未除范文正奏罷之一在今長沙府湘潭縣西一百二十里其山石白如銀此銀嶺未詳所在逺畀銅符無疾其驅恐有天子之詔韓文無疾其驅天子有詔起視汝穴更觀刺史之謡栁文連山郡復乳穴記石鍾乳餌之最良者也楚越之山多産焉于連于韶者獨名于世連之人告盡焉者五載矣今刺史崔公至逾月穴人以乳復言邦人悦是祥也雜然謡曰氓之熙熙崔公之来公化所徹土石蒙烈以為不信起視乳穴某遥想履封無由旅賀望千騎上頭之去應有光華因雙魚中素之来就申冩送並見前代回錢漳州蔤漳州秦閩中郡漢為東冶縣地東漢為南部都尉地並屬㑹稽郡晉屬晉安縣梁屬南安郡隋屬閩州唐武后垂拱初析福州西南境置漳州以南有漳水故名治漳浦縣開元初徙治李澳溪天寳初改漳浦郡乾元初復為漳州徙治龍溪今州理是也五代時留從效改為南州宋復為漳州榮剖漢符既臨漳浦見題下人生五馬賸收及物之功杜詩人生五馬貴盧奐傳亦既利物内存匪躬詳見上條山有九龍豈少專城之樂郡志九龍山下有九龍溪梁大同中有九龍游戲此江今祭九龍翁甚盛山北又有金溪水宋陳堯佐詩人生五馬貴山有九龍游恭惟某官飛騰聲實明習憲章馬周傳贊由一介草茅言天下事明習憲章若素官于朝近使之逺使之皆駕韶鈞之韻荘子君子逺使之而觀其忠近使之而觀其敬詳見前汝器也何器也宜為廊廟之珍惟其洊著於民庸是以復煩於郡寄雙旌畫㦸無辭遵海而南一札緑綈㑹即自天而下並見前某持荷惟舊視䕃無多説文䕃草隂也又隂景曰䕃左傳趙孟視䕃曰朝夕不相及誰能待五馮熊兩轓愧莫陪於賀夏烹魚尺素聊復具於報章並見前代回唐光化􅎡光化軍春秋穀伯國楚地隂國所遷秦漢為隂縣及鄼縣屬南郷郡後漢末魏武分南郷郡晉武改南郷為順陽郡梁立鄼城郡領隂鄼二縣後周廢為縣屬襄陽郡隋改隂曰隂城唐立鄼州領穀城鄼城二縣尋廢為鎮𨽻襄陽之穀城縣宋陞隂城鎮為光化軍治光化縣又以光化軍為通化軍後金人渝盟復為軍縣如初考工弗績久慙五雉之司宅牧惟良逺效雙魚之問並見前洗此執熱儼如即温恭惟某官宜在中朝漢書注中朝内朝也大司馬左右前後將軍侍中常侍散騎諸史為中朝丞相以下為外朝顧乗邊障九夷通道既歸馬於華山之陽尚書遂通道于九夷八蠻又歸馬于華山之陽千里專城姑擊牛享雲中之士馮唐傳唐對文帝曰臣聞魏尚為雲中守軍市租盡以給士卒出私飬錢五日一殺牛以饗賔客軍吏舍人是以匈奴逺避不近雲中之塞今召君矣豈舎王哉某曳履胡顔投簪甚力人生五馬貴願森衛之有加並見前天髙數鴻鳴愧報章之不腆柳詩霞散衆山迫天髙數鴈鳴代回趙袁州彦倓袁州秦屬九江郡地漢為宜春縣屬豫章郡吳立安成郡領宜春等六縣晉屬江州又避太后諱改宜春為宜陽縣隋廢安成郡置袁州因袁山以為名唐宋因之宋史趙彦倓字安卿彭城矦叔聚曽孫父公廣饒州太守厯官溧陽尉揚州司戸平江府推官攝宜興縣知臨安於潛縣臨安府通判知興國軍遷湖南運判知紹興府改大府少卿遷顯謨閣知太平府調江西轉運使所在皆有善政獨不言知袁州盖逸之也此啓可以補史之闕矣袁山有髙士袁京居之故名起自家林山谷詩小溪風物似家林分之符竹庶民安其里是在二千石之良並見前刺史得其人兹為十萬户之福新唐書陳子昂傳一州得才刺史十萬户賴其福得不才刺史十萬户受其困國家興衰在此職也恭惟某官蜚聲屬籍見前擢秀宗標呂安傳植根芳苑擢秀清流孔穎達毛詩正義序擢秀幹于一時騁絶轡于千里頃聞絃歌之聲已髙物表不謂肯綮之技久縮袖間荘子技經肯綮之未嘗説文肯骨間肉肯肯著也肯綮脅肉結處韓文巧匠旁觀縮手袖間兹由祝釐文帝紀祠官祝釐注釐福也賈誼傳受釐宣室是也音同僖始復出牧杜詩民到于今歌出牧袁雖小郡古號名邦江山勝游謝靈運之風流猶在韓詩莫以宜春逺江山多勝游郡志袁州萬載縣本漢建城縣地屬豫章郡吳析置陽樂縣晉改康樂縣謝靈運封康樂公故云閭里無事韓昌黎之政術可師昌黎袁州謝上表州小地狹賦税及時民安吏循閭里無事㣲臣惟當布陛下維新之澤守國家承平之規勸以農桑使無怠惰臥而治之行且召矣某違離滋久企仰良深聞去騎之逐雙旌喜而不寐韓詩旦夕公歸伸拜謝免勞去騎逐雙旌因烹魚之有尺素文以足言左傳言以足志文以足言餘見前代回處州趙守伯麟處州古縉雲之墟天文吴地斗分野春秋屬越秦屬㑹稽郡後越王無疆七世孫摇佐漢有功立為東越王都東甌今温州永嘉是也後以甌地為迴浦縣東漢改為章安吳立臨海郡晉分臨海立永嘉郡隋改為處州尋改為括州唐為松州𤣥宗改為縉雲郡徳宗又改為處州大厯間以處士星見詔更州名宋因之分竹南衙憩棠東輔庶民安其里是在二千石之良刺史得其人何止十萬户之福恭惟某官凝姿信厚蓄徳恵和大雅不羣信其来之有自並見前小邦懐徳宜所去之見思尚書大邦畏其力小邦懐其徳兹屈髙陽子之才出為縉雲山之牧左傳髙陽氏有才子八人謂之八愷縉雲氏有不才子謂之饕餮縉雲黄帝氏官名山在麗水縣舊傳黄帝游仙之處有孤石特起髙二百丈峰數十或如羊角或如蓮花有龍鬚草云是羣臣攀龍鬚所墜者徐凝題縉雲山詩黄帝旌旗去不回空餘片石碧崔嵬有時飛捲鼎湖浪散在晴天雨㸃来鼎湖在縉雲仙都山頂相傳以為黄帝上仙處李詩杉蘿色裏縉雲山楊億詩逺辭金虎觀来守縉雲城民庸益懋王覲不遥某側聞建牙列子吾側聞之試以告女側旁也建牙詳本巻富和州條未由削櫝原陟傳削牘為疏雙魚中有尺素先承君子之謙易謙謙君子五馬不受二毛祗覺王孫之貴杜詩人生五馬貴不受二毛侵又尚覺王孫貴豪家意頗濃代回葉廣徳延年廣徳軍春秋屬吳楚子伐吳及桐汭即其地秦置漳郡漢改漳郡為丹陽郡復以為廣徳國封中山靖王之後後漢置廣徳縣晉屬宣城郡宋立綏安縣梁分置石封縣隋改石封為綏安縣又屬宣州又更綏安縣為廣徳縣宋建為廣徳軍以郎步鎮置建平縣以𨽻焉分命竹符承流桐汭桐源山在廣徳南八十里桐汭水在廣徳西北五十里源出白石自宣城界流入丹陽湖水内曰汭安庶民於田里是在刺史之良潤千里之京師尤借近畿之重恭惟某官識𢎞且敏材裕而通鏘百里之絃歌紛諸臺之剡薦並見前明廷擢雋方通振鷺之班詩序振鷺二王之後来助祭也詩振鷺于飛于彼西雝注振振羣飛貌又振振鷺鷺于下注潔白之士羣集于君之朝韓詩漸階羣振鷺神圉祝釐遂抗㝠鴻之志司馬相如傳靈圉燕于閑館注靈圉衆仙號也文帝紀祠官祝釐如淳曰釐福也賈誼傳受釐坐宣室是也音僖法言鴻飛冥㝠弋人何慕焉起家而得二千石漢書諸附麗之者或起家為二千石去天而在咫尺間勉䇿民庸佇遄王覲某未馳賀幅猥辱謝緘豈自知雲中哉固行蔵之難料田叔傳叔對文帝曰貫髙等謀反天子下明詔趙敢有隨張王者罪三族然孟舒自髠鉗隨張王以身死之豈自知為雲中守哉吾必在汶上矣恐邂逅之無期回趙全州必愿賀權軍全州即湘源五代晉髙祖時改永州之湘源縣為清湘縣置全州割永之清湘灌陽二縣𨽻焉宋因乏宋史趙必愿字立夫以大父汝愚遺表補承務郎嘉定七年舉進士厯知全常處泉台婺六州淳祐五年以文華直學士知福州福建安撫使居官四年卒贈銀青光禄大夫必愿才周器愽心平量廣而又蚤聞家庭忠孝之訓師友正大之言世濟其美可謂信厚之公子矣此啓權武岡軍作比䝉省劄暫攝郡章退惟渉筆之文丞韓文丞渉筆注渉或作濡又破崖岸而為文丞言猶文具也朱文公改定文字為之字丞字屬下句詎久挈瓶之假守左傳雖有挈瓶之知守不假器祗慙越畔左傳子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣説文畔田界也無敢告隣然雖五日京兆之間張敞傳今五日京兆耳安能復案事亦竊千里榮河之潤尚書中候榮光出河休氣四塞武帝紀河海潤千里顔師古四大河祝文分導九枝傍潤千里輙憑咫尺韓信傳發一乗之使奉咫尺之書師古曰八寸曰咫咫尺者言其簡牘或長咫或長尺喻輕率也今俗言尺書或言尺牘盖其遺語耳借布萬分谷永傳不足以報塞萬分桓榮傳補益萬分詳見第一巻代回李信州昌信州春秋戰國迭為吳楚之地秦屬九江㑹稽二郡漢屬豫章之餘干縣及㑹稽郡之太末縣三國又屬鄱陽郡葛陽縣之地晉宋及隋屬鄱陽東陽二郡陳改葛陽為弋陽縣唐析饒之弋陽衢之玉山常山及建撫二州之地置信州宋因之振職司均揚雄大司農箴農臣司均敢告執繇又司農屬官有均輸令抗章請外治粟方資於内史韓信傳信歸漢以為治粟内史漢官云初秦置理粟内史掌穀貨漢因之傳聲俄典於信州張敞傳復奉使典州杜工部送王信州詩下詔選郎省傳聲典信州周南之滯有之司馬遷傳太史公留滯周南注周南洛陽也洛陽而謂周南者自陜以東皆周南之地也江東之幸多矣杜詩江東日暮雲恭惟某官茂騰聲實蔚有典刑叙傳蔚為辭宗師古曰蔚文采盛也音鬱仙李盤根三百年之閥閱見前秋蘭流馥四十載之才名杜詩才名三十年坐客寒無氊陳後山詩才名四十年盛氣盖諸儒方陞九扈之司忽念五馬之貴並見前詔書催發難潄石而枕流孫楚傳楚少時欲隐居謂王濟曰當枕石漱流誤云漱石枕流濟曰流非可枕石非可漱楚曰所以枕流欲洗其耳所以漱石欲厲其齒徳政甫臨已反風而滅火劉昆傳為江陵令時縣連年火災昆輙向火叩頭多能降雨止風詔問昆曰前在江陵反風滅火行何徳政而致是事為繭絲為保障豈無素定之規有社稷有人民足展平生之學某未諧旅賀猥沐損牋旅損卦名耄矣綴班將何逃於司敗左傳遂歸復命而自拘于司敗司敗即司冦歸歟假道猶有謁於館人代回林嘉興良嘉興春秋時地名長水又名檇李魯定公時越敗吳於檇李即此搜神記秦始皇東廵望氣者云五百年後江東有天子氣始皇至令囚徒十萬餘人掘汙其地表以惡名故曰由拳一説始皇見山下出王氣使諸囚鑿之囚倦後人訛為由拳吳黄龍五年嘉禾生於由拳改置嘉禾縣隋屬蘇州又屬杭州五代時錢氏奏置秀州宋屬浙西路政和間名為嘉禾郡慶元初陞為嘉興府至本朝因之然宋之嘉興領嘉興華亭海鹽崇徳四縣今領嘉興秀水嘉善海鹽平湖崇徳桐郷七縣華亭改𨽻松江秀水嘉善平湖桐郷則宣徳中割嘉興海鹽崇徳三縣地所析置輙丞外府通典周官有太府梁置太府卿陳因之北齊曰太府寺後周有太府中大夫唐龍朔二年改太府為外府作牧内畿羞崑崙薄蓬莱孰窺雅意柳文謫龍説澤州有竒女墮地貴游年少駭且悦之稍狎焉其女頳爾怒曰不可吾故居鈞天帝宮下上星辰呼吸隂陽薄蓬莱羞崑崙而不即帝以吾心侈大怒而謫来七日當復今吾雖辱在塵土中非若儷也蕭望之傳望之雅意在本朝右扶風左馮翊欲展通材漢地理志武帝太初元年更名左内史為左馮翊主爵都尉為右扶風臥而治之行且召矣恭惟某官持操甚正揚歴彌深武城之愛播於絃歌宰海沂之康流於頌詠倅藹然譽處詩是以有譽處兮正義云言常處此聲譽之美服在班行韓詩班行再肅穆甫更再轉之餘太府寺丞遽請一麾之去守言從檇李檇子遂反通作醉公羊傳醉李史記越世家吳師敗于檇李杜預曰吳郡嘉興縣南有檇李城少憩甘棠舉頭即在於長安晉明帝紀舉目見日不見長安濯足㑹登於雲漢陸機詩濯足升龍淵某未遑燕賀先辱魚書儻未挂𢎞景之冠猶願見黄覇之璽並見前代回晁南康百談南康秦屬九江郡漢為海昏彭澤二縣地屬豫章郡晉屬潯陽郡宋齊因之隋唐屬九江宋太平興國六年相國張師亮轉漕江表請改邑為軍詔曰南方之俗其在康哉可賜名南康軍領星子都昌建昌三縣至本朝正徳中以建昌嘯聚山賊割安義五郷置安義縣訪靈谷之煙雲既擁千騎靈谷山在撫州南四十里中有石室靈像荀伯子臨川記云懸崖半岫有瀑飛流分于木梢映日望之如掣練宋王介甫靈谷詩序吾州之東南有靈谷者江南之名山也龍蛇之神虎豹翬翟之文章楩楠豫章竹箭之材皆自山出而神林鬼冢魑魅之穴與夫仙人釋子詭譎之觀咸附託焉至其淑靈清和之氣盤礴委積于天地之間萬物之所不能得者乃屬之于人言先為臨川守懐廬山之風月忽寄雙魚廬山在今南康府西北二十里古名南障世傳周武王時匡俗兄弟七人結廬隠居於此故名其山疊障九層崇巖萬仞周五百餘里實南方巨鎮也道書為第八洞天忻然發函吳質書發函伸紙喜至折屐謝安傳還内過户限心喜甚不覺屐齒之折恭惟某官清門秀望杜詩于今為庶為清門王雅傳帝以恭等為當時秀望名世真材即之温然不減天球之器韵説文球玉磬也尚書天球河圖在東序又美玉名山谷詩天球不琢終粹温識其小者漫知月斧之精神酉陽雜俎月勢如丸其影日爍其凸處也常有八萬二千户修之其人開襆有斤鑿數事王荆公詩玉斧修成寳月圓東坡詩天匠麾月斧又借君月斧修朦朧又從来天上修月手又月斧雲斤琢肺肝山谷詩執斧修月輪鍊石補天陬方羣飛之刺天韓文一斥不復羣飛刺天寧一麾而出守兵衛森畫㦸豈特倡韋應物之詩韋應物嘗為州刺史游賞於簡寂觀其詩卒章云曠嵗懐兹賞行春始重尋聊将横笛吹一寫山水音山水含清暉政欲考謝康樂之句謝靈運都昌石壁精舍詩昏旦變氣候山水含清暉清暉能娱人遊子澹忘歸出谷日常早入舟陽已微林壑歛暝色雲霞收夕霏芰荷迭映蔚蒲稗相因依披拂趨南徑愉悦偃東扉慮澹物自輕意愜理無違寄言攝生客試用此道推徒得君重行以公歸並見前某密託桑隂劉子堯之知舜不違桑䕃唐書尉遲敬徳傳贊桑䕃不徙而大功立既凋蒲質見前腰黄何用愧山靈之移文白樂天詩眼前何日赤腰下幾時黄北山移文鍾山之英草堂之靈馳煙驛路勒移山庭頭白早歸煩謫仙之寄語圖經李白性喜名山飄然有物外志以廬阜水石佳處遂徃遊焉卜築五老峯下有書堂舊基後北歸猶不忍去指廬山曰與君再㑹不敢寒盟丹崖緑壑神其鑒之杜少陵詩匡山讀書處頭白早歸来代回真州閻宗簿一徳閻一徳嘉定初以朝請郎知真州時兵燹後官民居畧盡乃創建㕔事所著有古今政事錄二十巻觀所撰述蓋亦存心于及物者宋秘書省正字陳暘樂書後南豐知縣陳芾跋云樂書正誤一巻得之尚書樓公即轉白郡太守閻公欣然欲鋟諸木屬將代還乃以工費俾芾圖之所以昌文師幸惠後學之意繄閻公樂善好修之美也公名一徳今守真州云真州本漢江都縣地唐為揚州揚子縣地五代時偽吳為永正縣地南唐置迎鑾鎮宋初陞為建安軍祥符間司天臺言建安軍西山有旺氣詔即其地鑄聖像時有青鸞白鶴景雲盤繞爐冶之處詔建儀真觀立青鸞白鶴亭陞軍為真州至本朝洪武二年改為儀真縣持槖無功忝青氊之舊物飛牋為惠辱黄絹之好辭有味其言不知所謝並見前恭惟某官踐敡滋久望實具孚既朝蹟之居多韓詩足弱不能步自宜收朝蹟亦民庸之洊著以恢然十二牛之刃賈誼傳屠牛坦一朝解十二牛而芒刃不頓者所排擊剥割皆衆理解也宜快哉九萬里之風宋玉風賦有風颯然而至王乃披襟而當之曰快哉此風荘子故九萬里則風斯在下矣屬淮甸兵甲之餘民亦勞止詩民亦勞止汔可小康惟閻公棨㦸之雅帝曰俞哉王勃滕王閣序都督閻公之雅望棨㦸遥臨宇文新州之懿範襜帷暫駐尚書禹曰俞哉不待席温行膺璽召某乆安芰製離騷經製芰荷以為衣兮集芙蓉以為裳北山移文焚芰製而裂荷衣又玷荷囊斜日銜山所謂聊復爾耳浮雲出岫未妨歸去来兮並見前徒佩先施莫諧厚報代回魏湖州大中湖州古防風氏之國楚為菰城即春申君之邑也秦以其地置烏程縣介于㑹稽鄣二郡之間漢因之東漢光和末張角亂荆揚尤甚此郷守險助國漢朝嘉之立縣名安吉吳置吳興郡隋平陳廢吳興郡置湖州取太湖為名唐宋因之宋寳慶二年改湖州為安吉州領烏程歸安安吉長興徳清武康六縣至本朝改為湖州府領縣如舊𢎞治元年析安吉縣地置孝豐縣正徳二年陞安吉為州陞華簿正得請州麾既建髙牙詳本巻代回富和州條屹隆方面馮異傳位大将爵通侯受任方靣又專命方靣龎參傳以一臣之身折方面之難者選用得也岑彭傳論中興将帥立功名者衆矣惟岑彭馮異建方面之號馬融傳方面重寄注當四方之一面魏書劉尼傳曽祖政為方面大人梁書劉坦傳贊方面之功坦為多矣唐書衞伯玉傳伯玉有幹畧可方面大事田布傳諸子皆有方面功倪若水傳時天下久平人皆重内任雖自冗官擢方面皆謂下遷宋史董遵誨傳遵誨遣外弟劉琮進馬太祖解所服珍珠盤龍袍賜之琮曰遵誨人臣豈敢當太祖曰吾方委以方面不此嫌也曽未遑於馳慶猥先辱於飛牋恭惟某官早煥英躔吳都賦未知英雄之所躔也寖儀膴仕詩𤨏𤨏姻婭則無膴仕神皐治劇久風月之平分西京賦寔為地之奥區神皐注神者美言之澤畔曰臯匠監參聮去雲霄而一握言為将作監簿惟古馮翊乃今吳興見題下帝掄輔郡之材僉曰明公之可承流方爾歸譽翕然潤九里而及京師君有餘矣先一州而後天下人謂斯何並見前某自笑龍鍾馬融笛賦惟籦籠之竒生兮于終南之隂崖蔡邕琴操空山歔欷涕龍鍾韓詩白首誇龍鍾廣韵龍鍾竹名年老者如竹枝摇曳不自禁持韻㑹籠籦竹名吳都賦竹則籠籦注伶倫吹以為律稗史唐貞元五年番禺有海户犯鹽禁逃羅浮山深入至第十三嶺遇巨竹百千萬竿圍二十一尺有三十九節節長二丈許慎説文長節竹謂之䇗得非羅浮龍鍾之義乎唐蘇鶚演義云龍鍾者不昌熾不翹首如䰐篸拉搭斛觫之類詳别見阻陪燕賀天時向熱望少留水晶之宮歐陽永叔送胡學士知湖州詩武平天下才四十滯鉛槧忽乗使君舟傍榜不可䌫都門春漸動栁色緑将暗挂㠶千里風水闊江灔灔吳興水晶宮樓閣在寒鑑橘柚秋苞繁烏程春甕釅清談越客醉屢舞吳娘艶寄詩毋憚煩以慰離居念説郛云吳興之水晶宮不載圖經刺史楊漢九月十五夜絶句云江南地暖少南風九月炎凉正得中溪上玉樓樓上月清光合作水晶宮後来林子中聞滕元發得湖州以詩賀何洵直邦彦云清風樓下兩溪春三十餘年一夢新欲識玉皇香案吏水晶宮裏謫仙人因為故事今按水晶宮乃髙句驪宮名見范石湖桂海虞衡志元趙孟頫湖州人也刻私印曰水晶宮道人周密以瑪瑙寺行者對之遂不復用蘇子由送文與可知湖州詩宮開水晶潔人寄畫屏住氣候稍凉却歸侍玉皇之案見前代回李和州大東和州已見上車强顔又綴甘泉之法從揚雄傳每上甘泉常法從師古曰法從言以法當從耳一曰從法駕也開緘見靣重逢采石之謫仙盧仝詩開緘宛見諫議面采石山在當塗北三十里山下有磯方輿勝覽云李陽冰草堂集序劉全白墓碣皆謂太白以夀終而侯鯖錄載太白過采石酒狂捉月恐好事者為之乃梅聖俞詩云采石月下逢謫仙夜披錦袍坐釣船醉中愛月江底懸以手弄月身翻然不應暴落饑蛟涎便當騎鯨上青天又似有之新唐書云李陽冰為當塗令太白依之是時當塗未為州𨽻宣城而陽冰序謂白疾亟枕上授簡俾為集序無捉月之説豈古不弔溺故史氏為白諱耶抑小説多妄而詩人好竒姑以發新意耶妙語爛然賈捐之傳君房下筆言語妙天下髙情厚甚恭惟某官名門勝士羊祜傳賢達勝士陳後山詩江西勝士與長吟昭代通才杜詩昭代今垂白自其不卑於小官固已可卜其逺器婉婉幕謀之賛選詩婉婉幕中畫煌煌簿正之光胡然把麾為此歛惠意淮民之離散已數萬人寛漢詔之歎愁惟二千石徒得君重無俾民憂郷黨宗族稱盛焉何朱輪之陸續並見前父子兄弟相繼也㑹紫槖之聨翩桓榮傳父子兄弟代作帝師某幸託南隣白樂天詩今朝白校擡頭語先問南隣有酒無已投西崦聊復爾耳便當挂神武之冠行或使之猶見賜潁川之璽並見前代回太平王左史居安太平已見宋史王居安字資道黄巖人淳熙十四年進士授徽州推官連遭内外艱十年不調授江東提刑司幹官入為國子正太學博士遷校書郎改司農丞遷著作郎兼國史實錄院檢討編修官兼權考功郎誅韓侂胄實贊其决擢右司諫遷起居郎兼崇政殿説書上疏極言御史中丞雷孝友論其越職奪一官罷太學諸生舉旛乞留四明揚簡邂逅山隂道中謂此舉吾道増重江陵項安世致書曰左史人中龍也踰年復官知太平州威惠流行以龍圖閣提㸃浙西刑獄入對權工部侍郎以集英殿修撰知隆興府平峒寇徙鎮襄陽以言者罷閒居十有一年嘉定十五年與魏了翁同召遷工部侍郎甫兩月以集英殿修撰提舉玉隆宮未幾以寳謨閣待制知温州理宗即位以敷文閣待制知福州升龍圖閣直學士轉大中大夫提舉崇福宫㑹鹽冦起寧化命居安專任招捕降之即拜疏歸卒贈少保有方巖集行世諫大夫之去國公議謂何百官志諫大夫秦官漢初不置至武帝始因秦置之無常員光武増議字為諫議大夫置三十人王吉為諫議大夫上疏論得失上以其迂闊不甚寵異吉遂謝病歸琅琊良刺史之為邦疲民幸甚愧貢書之已後辱垂問之相先恭惟某官粹學淵停王崇楚妃歎矯矯荘王淵停嶽峙英姿山立識其小者巍巍拾芥之科並見前誰其似之挺挺伏蒲之節史丹傳頓首伏青蒲上應劭曰以青規地曰青蒲自非皇后不得至此魏謩傳贊挺挺有祖風烈交懽将相陸賈傳将相和則士豫附君何不交驩太尉拔去兇邪此非淺之為丈夫左傳吾淺之為丈夫也所謂上不負天子見前捫中無愧補外亦榮載酒龍山尋孟嘉之風味陶靖節集孟府君傳九月九日大将軍桓温游龍山參佐畢集有風吹君帽墮落温命諮議參軍孫盛為文嘲之君請筆作答了不容思文辭超卓四座歎之按落帽事當在江陵今江陵縣西龍山有落㡌臺而元和志及寰宇記皆指為當塗之龍山未知所據泛舟牛渚問公瑾之功名牛渚山在當塗縣北三十里山下有磯古津渡也與和州横江陵相對幽明錄淮南牛渚津水極深無可算記人見一金牛形甚醜壮以金鏁絆之輿地志牛渚山昔有人潜行云此處通洞庭傍達無底見金牛状異乃見怪而出吳志周瑜傳瑜恩信著於廬江出備牛渚今按牛渚六朝以来為屯戍之地隋師伐陳賀若弼従此北渡雖未均𢎞韓文何不均𢎞俾執事樞亦不落莫韓詩吾相兩優游他人雙落莫山谷詩光隂行晼晚吾事益落莫某年運而往荘子年運而往矣日昃之離易離九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也注處邦離之終明在将没故曰日昃之離也猶冐恩除聊復持甘泉之槖小須興盡行當掛神武之冠並見前代回鄒汀州非熊鄒非熊字宗望宜黄人淳熙十一年進士授樂昌尉親獲强盜耻受賞不言攝邑事修復石渠以溉民田諸司以才力奏辟曲江令非熊一意撫摩獄無滯囚平反死罪十有二人邑為刻石改知宜章值嵗歉盜相挺而起非熊先為備得不擾後除廣東提刑未上而卒年七十自號竹巖晉分建安郡置晉安郡又立新羅縣汀州始基于此宋而後無所攷唐開元二十四年開撫福二州山洞置汀州天寳元年曰臨汀郡屬江南道唐末閩王據之石晉時附南唐後改南州宋乾徳四年改南州為汀州淳化五年陞府後復為州黄㡌青鞋又踏東華之塵土杜詩青鞋布襪從此始又黄㡌青鞋歸去来注黄㡌籜冠青鞋芒履東坡詩東華塵土北窓風又軟紅猶戀屬車塵公自注云前輩戲語西湖風月不如東華軟紅塵土朱轓畫㦸未忘北社之比隣比頻脂切相次也廣韻並也杜詩不教鵝鴨惱比隣有来緘縢説文緘束篋也尚書傳縢緘也陽球傳皆各緘縢不敢陳設荘子攝緘縢固扄鐍杜詩三嵗清秋至未敢闕緘縢良慰離索禮記吾離羣而索居亦已久矣注羣謂同門朋友也索猶㪚也離音詈索悉各反恭惟某官温然國器韓安國傳惟天子以為國器注國器言其器用重大可施於國政也房𤣥齡傳如此郎者當為國器厚甚交情自頃杜門寂寞雀羅之設鄭當時傳下邽翟公為廷尉賔客填門及廢門外可傳爵羅注言寂静無人行也猥蒙枉駕從容鷄黍之期謝承後漢書山陽范式字巨卿與汝南張元伯為友春别京師以秋為期至九月十五日殺鷄作黍二親笑曰山陽去此幾千里何必至元伯曰巨卿信士不失期言未絶而巨卿至范雲詩恨不具鷄黍得與故人揮山谷詩人間鷄黍期又魏畧田豫罷官歸汝南遣健步詣征北感豫宿㤙過拜之豫為殺鷄炊黍求今人中有此客不謝安傳桓温請為司馬既到温甚喜言生平歡笑竟日既出温問左右頗嘗見我有如此客不自榮驅于五馬已屢寄於雙魚平生所聞陳汀州風流未逺宋陳軒為汀州守黄魯直贈詩云平生所聞陳汀州蝗不入境年屢豐丞相皆舉龔渤海即日當遷龔遂傳渤海左右郡嵗饑盜賊並起二千石不能禽制上選能治者丞相御史舉遂可用上以為渤海太守孰知厚禄之故人杜詩厚禄故人書㫁絶政爾頗哀於老子馬援傳此丞掾之任何足相煩頗哀老子使得遨遊某持荷仍舊視䕃轉斜並見前骯髒伊優總不若掛冠而去趙壹傳伊優比堂上骯髒倚門邊注伊優屈曲謟佞之貌骯髒髙亢婞直之貌也媚者見親故昇堂直者見棄故倚門按東方朔傳伊優亞者辭未定也謟佞之人視人意以為轉移故辭多未定盖漢時有此語也媻跚勃窣或猶及召璽之来司馬相如傳媻跚勃窣上金隄注謂行于叢薄之間此心所期須面以既代回錢漳州蔤漳州已見晚景投閒叨承賜召韓文投閑置散秋官庀屬竊玷貳卿庀普弭切治也具也左傳官庀其司言為刑侍靖循僥忝之由寧非游揚之助季布傳使僕游揚足下名于天下顧不美乎未遑控謝先辱飛牋千騎上頭悵莫陪於祖送古辭陌上桑東方千餘騎夫壻居上頭何用識夫壻白馬從驪駒風俗通祖徂也今人謂餞行為祖道一曰共工氏之子好逺遊祀之以為祖神雙魚中素窘不盡於報酬見前代回王筠州樞瑞州漢為豫章郡建城縣唐即縣地置靖州又以隠太子諱改建城曰髙安又改靖州為筠州以土産篁竹故名宋因之寶慶初以州名犯諱改瑞州停鸞起敬長懐東閣之郎君韓文退見少傅翠竹碧梧鸞鵠停峙能守其業者也李商隠詩郎君官貴施行馬東閣無由得再窺詳見此巻賀虞漢州條烹魚得書知在西江之道院古詩呼童烹鯉魚中有尺素書江西道院在筠州府治州守栁子儀建詳見下文飛文璀璨荷意勤渠見前恭惟某官早著英猷寖躋膴仕詩𤨏𤨏姻婭則無膴仕注膴厚也淵然韋元成之學問韋𤣥成傳𤣥成字少翁少好學修文業繼父相位封侯故國榮當時焉濟以伯禽父之謙恭律厯志燮父禽父並事康王師古曰禽父即伯禽也父讀曰甫甫者男子之美稱史記魯世家周公戒伯禽曰我文王之子武王之弟成王之叔父我于天下亦不賤矣然我一沐三捉髮一飯三吐哺起以待士猶恐失天下之賢人子之魯慎毋以國驕人簿正搴華人已疑於晼晚陸機歎逝賦老晼晚其将及潘岳懐舊賦日晼晚而将暮楚辭白日晼晚其将入民庸得請君何有於鄙夷見前風行水波少為髙安之父老雪耻山谷江西道院賦序江西之俗士大夫多秀而文其細民險而健以終訟為能由是玉石俱焚名曰珥筆之民惟筠為州獨不囂於訟故筠州太守號為守江西道院然與南康廬陵宜春三郡並䝉惡聲元祐八年武陵栁侯樂其俗之􅍇使為政者不勤乃新燕居之堂榜曰江西道院以鼓舞其國風且為髙安之父老雪耻焉賦略曰風行於上而水波此天下之至文仁形於心而民服此天下之善化云云日獻月納行見王家之子弟超人西都賦朝夕論思日月獻納梁武帝評書王僧䖍書如揚州王謝家子弟縱復不端正皆有一種風氣山谷墨竹賦王家子弟生長見聞文獻不足猶超人羣郎選方虛食貨志入財者得補郎郎選衰矣公来則重杜詩公来雪山重某不量衰白猶踏軟紅東坡詩注京師有西湖風月不如有東華軟紅香塵之語山翁愛山行乞身而去矣東坡詩山翁不出山溪翁長在溪韓詩山僧愛山出無期俗士牽俗来何時相門有相望進徳以須之曹植令諺云相門有相將門有将夫相者文徳昭将者武功烈南史王訓傳訓召見文徳殿上目送之謂朱异曰可謂相門有相代回前建昌羅知軍勲已下並代衛參帥建昌為漢豫章南城縣地吳置臨川郡治南城晉改南城曰新城隋罷臨川郡置撫州南唐升南城縣為建武軍宋改建昌及瓜受代分竹過家岑彭傳有詔過家上冢詳見前適聞千騎之還未遑賀下東坡跋歐陽文忠公書賀下不賀上此天下通語士人厯官一任得外無官謗中無所愧於心釋肩而去如大熱逺行雖未到家得清凉館舍一解衣潄濯已足樂矣洊辱雙魚之遺有媿積中遺去聲恭惟某官從容以和尚書寛而有制從容以和柔嘉維則詩柔嘉維則令儀令色日奉平反之笑五馬甚榮雋不疑傳即不疑多有所平反毋喜笑為飲食言語異于他時人無愁歎之聲衆狙亦喜狙七餘切猿屬荘子狙公賦序朝四暮三羣狙皆喜列子智籠衆狙杜詩攀援絶衆狙去之日如始至左傳叔孫所館者雖一日必葺其牆屋去之如始至昔者人謂斯何韓文昔者人謂斯何今者人謂斯何引綬還郷端足見買臣之貴朱買臣傳前引其綬視其印㑹稽太守章也詳見前昔襦今袴恐已歌叔度之来㢘范傳為蜀郡太守百姓歌之曰㢘叔度来何暮昔無襦今五袴某正爾䝉成薛宣傳馮翊垂拱䝉成師古曰自言端拱無為而受縣之成功又承解替䝉觧卦名知賢當舉慮無益於髙明所去見思㑹亟登於華要代回新南劒朱守吳立建安郡以南平縣屬焉晉武平吳易南平為延平宋明帝廢延平縣五代王審知以為鎮審知子延翰改為永平鎮又改為龍津縣王延政以延平鎮為鐔州南唐改置劒州宋太平興國中以利路亦有劒州改曰南劒州疇庸監郡疏寵專城言由江州倅守南劒别駕之功澤既瀦於彭蠡王祥傳邦國不空别駕之功詳見前尚書彭蠡既瀦彭蠡在江州徳化縣一名宮亭湖言朱先為江州倅三刀之夢劒終合於延平王濬傳濬夢懸三刀於屋梁上須㬰又益一刀意甚惡之主簿李毅賀曰三刀為州字又益一者明府其臨益州乎岑參詩刀州先入夢李端詩夜夢見刀州雍陶詩今宵難作刀州夢張華傳初吳未滅斗牛之間常有紫氣道術者皆以吳方强盛未可圖惟華以為不然及吳平紫氣愈明華聞豫章人雷煥妙達緯象乃要煥登樓仰觀煥曰寳劒之精上徹于天耳因問在何郡煥曰在豫章豐城華即補煥為豐城令煥到縣掘地得雙劒一以送華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰靈異之物終當化去不永為人佩也華報書曰詳觀劒文乃干将也莫邪何復不至雖然天生神物終當合耳華誅失劒所在煥卒子華為州從事持劒經延平津劒忽於腰間躍出墮水使人取之見雙龍蟠縈有文章於是失劒華歎曰先君化去之言張公終合之論此其騐乎交劎潭在今南平縣治東東溪自建溪来西溪邵武順昌沙縣来合流於此即劒躍之所唐歐陽詹詩想像精靈欲見難通津一去水漫漫空餘昔日淩霜色長與澄潭生畫寒銅虎初分竹馬交慶見前恭惟某官世科舄奕班固傳發祥流慶對越天地者舄奕乎千載注舄奕猶蟬聨不絶也政學練詳左傳僑聞學而後入政未聞以政學者也屬爾立朝名實既孚於上下霍光傳屬耳師古曰屬耳近耳也翩然引外動静不失其光明易時止則止時行則行動静不失其時其道光明久題湓浦之輿湓浦在江州徳化縣西一里源出瑞昌青盆山亦名盆水相傳有人於此洗銅盆水忽暴漲失盆投水取之見一龍啣盆奪之而出故名盆水晉志作盆隋志作湓李詩湓浦逺横簾幕外廬山青落酒杯中劉禹錫詩廬峯逺刻削湓浦帶縈紆来明詩浪生湓浦千層雪雲起爐峯一炷香遂擁衍山之㦸衍仙山在劒浦縣東北十里古號含源山昔衍客避晉亂結廬煉丹其上相傳以為仙去吳致堯神秀軒記延平號山水佳處衆峯連屬鳳騫鼇峙望之蔚然神刓天劃者衍山也衍仙堂在郡圃據山之阜溪山環繞一日可盡有登覽之勝佇由明試亟用遄歸遄速也列子不若遄歸也詩式遄其歸某辱託同寅良深贊喜周禮慶賀以贊諸侯之喜詳見前引㑹稽之綬足紹光榮見上條聴臨淮之歌更觀强直朱暉傳暉字文季南陽宛人性矜嚴遷臨淮太守好節槩吏人畏愛為之歌曰彊直自遂南陽朱季吏畏其威民懐其惠代回興國趙知軍興國軍漢江夏郡地吳屬武昌隋屬鄂州宋太平興國二年析鄂州永興縣置永興軍三年改興國軍引嫌抗疏改命作州共此大江尤倚上流之重吳志周瑜傳此為長江之險已與我共之矣殷仲堪傳受腹心之任居上流之重又欲重復上流為習坎之防又藩扞之大機上流之至要陶侃傳贊超居外相𢎞總上流劉毅傳上流之任皆以相委均之維屏是資公族之英詩麟之角振振公族恭惟某官擢秀銀潢呂安書植根芳苑擢秀清流杜詩偶然擢秀非難取東坡詩銀潢左界上通靈注銀漢一名銀潢史記天官書西宮咸池曰天五潢又王良旁有八星絶漢曰天潢梁何遜詩鳳駕出天潢李敬𤣥詩詞波照五潢文苑英華魏元忠有侍宴銀潢宮詩舒翹玉幹栁文今之聖智莫不舒翹揚英推類援朋持平棘寺獄勿誤于有司尚書其勿誤于庶獄惟有司之牧夫歛惠竹符民甫誇於新尹見前倦游廬阜乗興印山印山在興國軍南十里常湖之中形如印浮水面圓正蒼潔初非求喬木之遷姑欲廣甘棠之憩恐未煖席又有温綸某倡牧無庸尚書六卿分職以倡九牧為僚有幸左傳同官為僚千里湖山之自得此豈力能庶民田里之相安尚希愛助並見前代回建昌趙知軍時適建昌已見抗章請外得郡来南東坡詩得郡書生榮兩科禮樂之英宜居表著百里循良之寄寔賴藩維並見前恭惟某官大雅軼羣清標映世七畧百家之浩浩既䇿雋躔藝文志劉歆總羣書而奏其七畧有輯畧有六藝畧一百三家諸子畧一百八十九家詩賦畧一百六家兵書畧五十三家術數畧一百九十家方技畧三十六家共六百七十七家言百家者舉成數也十事九律之嚴嚴更游餘刃主父偃傳上書闕下所言九事八事為律詳見前乃觀再轉遽取一麾見前金盌玉杯考顔碑之遺跡顔魯公麻姑壇記王方平過蔡經家遣人與麻姑相聞麻姑至是好女子年十八九坐定各進行厨金盤玉杯多是諸華而香氣逹於内外擗麟脯行之麻姑山在南城西南十五里髙九里五十歩周迴四百一十四里為第二十八小洞天劉禹錫詩雲盖青山龍臥處日臨丹洞鶴歸時霜凝上界花開晚月冷中天果熟遲銅陵石澗尋謝屐之舊游謝靈運入華子岡麻源第三谷詩銅陵映碧澗石磴瀉紅泉華子岡在建昌城西十五里相傳華子期者甪里先生弟子得仙翔集於此故名宋書謝靈運傳尋山陟嶺必造幽峻巖嶂千里莫不備盡登躡常著木屐上山則去前齒下山去其後齒特恐未煖席之間又有不俟駕之召某濫兹聮事行且䝉成並見前我思古人雖有愧於户庭之令詩我思古人俾無訧兮韓文令修於户庭數日之間而人自得於湖山千里之外民曰太守尚相圖田里之安東坡喜雨亭記民曰太守太守不有代回鄂州趙監丞彦綰楚熊渠封子紅為鄂王始名鄂春秋時謂之夏汭漢置江夏郡領鄂縣吳自公安徙治鄂更名曰武昌晉立鄂縣宋武立鄂州治江夏是為郢城隋改鄂州後為江夏郡唐復為鄂州宋以鄂州屬荆湖北路領六縣至本朝改武昌府領州一縣九借材武監李絳傳聖主選當代之人極其才分自可致治豈借才異代哉唐百官志武徳初有武器監一人少監一人掌兵仗廏牧開元以前軍器皆出右尚署三年分少府甲鎧弓弩置軍器監作鎮价藩皇華以遣使臣有嚴並命見前他人不如同姓足壯上流詩豈無他人不如我同姓餘見前恭惟某官卓爾不羣見前淵乎似道黄憲傳隤然其處順淵乎其似道注老子曰道冲而用之或不盈淵乎似萬物之宗言淵深不可知也翔而後集刺天不羡於羣飛韓文一斥不復羣飛刺天用之則行奔電何難於千里王褒傳追奔電逐遺風周流八極萬里壹息何其遼哉人馬相得也甫從再轉亟領一麾種柳西門人固望陶公之政陶侃傳侃性纎密嘗課諸營種柳都尉夏拖盜官柳植之於已門侃後見駐車問曰此是武昌西門前柳何因盜来此種拖惶怖謝罪憩棠南國公盍明召伯之風詩序甘棠美召伯也召伯之教明于南國又鵲巢騶虞之徳諸侯之風也故繫之召公㑹於文昭武穆之英禮記天子七廟三昭三穆大傳序以昭穆孝經注疏云昭明也穆敬也故昭南面穆北面孫從父坐决疑要錄父南面曰昭明也子北面曰穆順也左傳管蔡郕霍魯衛毛𥅆郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也復此漢廣江沱之化詩序漢廣徳廣所及也文王之道被于南國美化行乎江漢之域無思犯禮求而不可得也江有汜美媵也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也富貴乃其自有蔡澤傳富貴吾所自有歐陽永叔畫錦堂記所謂将相而富貴皆公所宜素有治行當以上聞魏相傳朝廷已深知弱翁治行某襆被歸田魏舒傳時欲汰郎官非其材者罷之舒曰吾即其人也被襆而出陸納傳臨發止有被襆而已分符易地東連吳㑹馬牛非不及之風㑹稽吳門為吳㑹謂其地本吳㑹稽二郡也左傳惟是風馬牛不相及也牝牡相誘曰風尚書云馬牛其風左傳言風馬牛言二國去逺雖馬牛風亦不相及陸農師云牛走順風馬走逆風楚是以云西望武昌烏鵲有可依之月東坡赤壁賦月明星稀烏鵲南飛此非曹孟徳之詩乎西望夏口東望武昌山川相繆鬱乎蒼蒼此非孟徳之困于周郎者乎代回南安趙知軍伯鳳南安為漢豫章贑南壄二縣地晉為南康縣地隋屬䖍州唐因之宋淳化二年置南安軍治大庾縣以䖍州南康上猶二縣改𨽻至本朝陞府正徳末分三縣地置崇義縣解珮治中杜氏通典治中從事史一人居中治事主衆曹文書用漢制也厯代皆有分符嶺下大庾嶺在大庾縣西南吳錄南野縣有大庾山自山嶠九磴二里至嶺下七里平行十里至平亭圖經云嶺初險觕唐張九齡開鑿新路乃㫁崖成峽兩壁聳立仰視霄漢中塗坦夷又名梅嶺疇庸外服知更試之已詳見前就任除書見用賢之不次墨客揮犀云除拜官職謂除拜舊籍不然也除猶易也以新易舊曰除如新舊嵗之交謂之嵗除易除戎器戒不虞以新易弊所以備不虞也東方朔傳待以不次之位孫伏伽傳髙祖初受禪伏枷最先諫欲盡下情故不決見拔以示羣臣崔造傳徳宗貞元二年以給事中同平章事帝謂造敢言為能立事故不次用之互見前伏惟某官天資㢘靖政術寛明惟其有之美不忘於世濟詩惟其有之是以似之注似嗣也我先人有此二徳是以先王使我子孫嗣之潔其清矣畏尤在於人知法言楚兩龔之潔其清矣乎胡威傳遷徐州刺史勤於政術風化大行後入朝武帝語及平生因歎其父清謂威曰卿孰與父清對曰臣父清恐人知臣清恐人不知臣不及逺也帝以威言直而婉謙而順洊分男國之封綽有子民之惠與其半吉陽之刺吉陽軍漢珠崖郡隋置臨振郡唐改寧逺郡宋紹興十二年更置吉陽軍何如專横浦之城横浦在大庾縣西以郡城大江自西流東横繞南岸故名南康記漢将軍楊㒒討呂嘉出章郡下横浦即此宋張九成謫南安自號横浦居士耎暴而循耎乳兖切說文稍前大也大他達切通作輭柔也集韻或作軟需惟良共理報政無遲於五月飛車即下於九天某政爾蔵瘝濫兹聮事並見前胡越同舟而濟尚無可異之心孔叢子胡越之人同舟濟江中流遇風波其相救如左右手不慎所同之患是不如吳越之人也賈子同舟而濟胡越何患乎異心互見前魯邾擊柝之聞幸假相扶之力左傳魯伐邾茅成子諸告于吳不許曰魯擊柝聞于邾吳二千里不三月不至何及于我代回沈興化紡興化軍治莆田自陳文帝朝陳寳應走至莆口其地始見載籍唐析泉州置豐州領縣二曰南安曰莆田又置武榮州莆田𨽻焉後武榮州改為泉州莆田自此常為屬縣宋太宗時置太平軍尋改興化軍莆田縣為軍理諸公奉詔共騰薦士之章老子綴班亦竊挂名之寵馬援傳頗憐老子陶侃傳老子婆娑東坡詩豈意彤庭綴兩班文選使名挂史筆徒得君重見前實獲我心詩我思古人實獲我心恭惟某官實徳蜚英名門濟美閩有山川之勝自昔已然韓文閩越地肥衍有山泉禽魚之樂莆田志郡治自游洋徙建始因都廵檢𪠘為之北枕陳岩南揖壺公東薄寧海西縈石室木蘭壽溪環流左右山川之秀甲於閩中莆為文物之邦惟良共此宋陳長卿貢院記莆蕞爾介于福泉之間市㕓户版不能五之一而秀民特多焉游驛通判題名記民物繁夥比屋業儒號衣冠盛處至今公卿相望宋熙寧九年韓奕武舉第一時徐鐸亦擢進士第一神宗御製詩賜之云一方文武魁天下萬里英雄入彀中頗聞賢明慈惠之政刑法志聖哲之上明察之官忠信之長慈惠之師寂無愁恨歎息之民輙以名聞是為衆選未見升遷之報又何巽謝之為升巽卦名某陳力不能奉身而退左傳義則進否則奉身而退亦有專城之命似可卜隣左傳非宅是卜惟隣是卜二三子已卜隣矣已無叱馭之心何因假館見前代回何巴州友諒巴州古巴國之地秦屬巴郡宕渠縣後漢分宕渠北界置漢昌縣今州理是也厯代沿革不常唐改巴州三巴此居其中為中巴亦曰清化亦曰字江符分銅虎將尋栗里之歸栗里在今九江府徳化縣柴桑里陶靖節故居白樂天訪陶公舊宅詩今来訪故宅森若君在前不慕樽有酒不慕琴無絃柴桑古村路栗里舊山川不見籬下菊但餘爐中煙興在驪駒獨奉巴州之寄漢書王式傳注驪駒逸詩篇名也見大戴禮客欲去歌之其辭云驪駒在門僕夫具存驪駒在路僕夫整駕杜陵奉寄別馬巴州詩勲業終歸馬伏波功曹非復漢蕭何扁舟繫纜沙邊久南國浮雲水上多獨把漁竿終逺去難隨烏翼一相過知君未愛春湖色興在驪駒白玉珂勤渠逺問詩夏屋渠渠注夏屋大具也渠渠勤勤也言于我設禮食大具其意勤勤然感戢深情陶詩感戢知何謝冥報以相賠恭惟某官井絡聞家河圖括地象岷山之精上為井絡桞文井絡坤垠坤維秀望選詩大火流坤維淮南子坤維在西南王雅傳帝以恭等為當時秀望南賓出守是為四十而專城陳後山詩四十專城古亦稀北闕上書且有九重之知己孟浩然詩北闕休上書南山歸弊廬謂式遄於王覲詩式遄其歸左傳王覲為可乃復懋於民庸他日有殊㤙計不逺矣杜陵送鮮于萬州遷巴州詩京兆先時傑琳琅照一門朝廷偏注意接近與名藩祖帳維舟數寒江觸石喧看君妙為政他日有殊恩十年為同姓與有榮焉昌黎送何堅序何與韓同姓為近其識堅也十年為故人某納履星辰説苑田子方曰士貧賤者言不用行不合則納履而去耳杜詩聴履上星辰把麾江海杜牧詩欲把一麾江海去樂游原上望昭原歸鴻遵渚難隨鳥翼之過詩鴻飛遵渚公歸無所餘見上文杜陵寄馬巴州詩浮鷁朝天猶覬鴈行之附方言船首或謂之閣又謂之鷁首注云今江東貴人船有作青雀是其象也司馬相如子虛賦浮文鷁揚旌栧張翠帷建羽盖張楫曰鷁水鳥也畫其象于船首賈至詩銀燭朝天紫陌長禮記父之齒隨行兄之齒鴈行注行如字或音户剛反詩兩驂鴈行箋鴈行者言與中服相次序疏鴈飛其首不齊詳啓意盖代月湖代回建寧李守訦已下代衛參政建寧府周為七閩地秦屬閩中郡漢為東冶縣地屬㑹稽郡隋唐為建安郡宋初𨽻兩浙南路尋改𨽻福建路端拱初為建寧軍孝宗潛邸陞府贈琴兮桂林知將行於湘水張衡四愁詩我所思兮在桂林欲往從之湘水深張載擬四愁詩美人遺我緑綺琴何以報之雙南金疑誤用發軔兮𤣥圃復出守於价藩離騷經朝發軔於蒼梧兮夕余至乎縣圃注縣圃神山也崑崙在西北元氣所出其巔曰縣圃上通于天甘泉賦配帝居之縣圃兮注曾城縣圃閬風崑崙之山二重也天帝神居其上詩价人維藩傳价善也藩屏也愧迎賀之未遑感勞謙之見及易勞謙君子有終吉恭惟某官典刑炳蔚器采端深靈光之殿獨存是闗衆目王延夀靈光殿賦序魯靈光殿者盖景帝程姬之子恭王餘之所立也遭漢中㣲盜賊奔突自西京未央建章之殿皆見隳壊而靈光巋然獨存互見前承明廬之三入又把一麾應㻛詩問我何功徳三入承明廬五年憩南國之棠再命典西清之槖並見前謂歸班于文石梅福傳壹登文石之陛還分閫于武夷武夷山在崇安南三十里周迴百二十里其峯巒大者三十六道書謂為第十六昇真元化洞天韓无咎武夷精舍記武夷在閩粤直北其山勢雄深槃礴自漢以来見於祀事閩之諸山皆後出也其峯之最大者豐上而斂下巋然若巨人之戴弁縁隙磴道可望而不可登世傳避秦而仙者蜕骨在焉溪出其下絶壁髙峻皆數十丈岸則巨石林立磊落竒秀好事者一目不能盡則臥小舟杬溪而上號為九曲以左右顧視至其地或平衍景物環㑹必為之停舟曳杖徙倚而不忍去水流有聲其深處可泳草木四時敷華此武夷之大槩也互見前無疾其驅即有詔追之寵韓文無疾其驅天子有詔不聞亦式况深猷告之知詩不聞亦式不諫亦入又訏謨定命逺猷辰告某承惠長沙賈誼弔屈原賦恭承嘉惠兮竢罪長沙師古曰嘉惠謂詔命也懐歸茂苑長洲苑在長洲縣西南七十里太湖北岸吳王闔閭游獵處左思吳都賦佩長洲之茂苑是也白樂天詩茂苑太繁雄一綂志衛涇自華亭徙崑山之石浦遂為郡人故云雙魚中素莫殫報施之情見前千騎上頭尚佇臨存之惠嚴助傳使重臣臨存師古曰存謂省問之餘見前代回臨江丁知軍必稱臨江軍秦為九江郡地漢初屬淮南郡後屬豫章郡吴為豫章安成巴􅏀三郡地隋屬洪吉袁三州唐因之南唐陞髙昌縣之蕭灘鎮為縣改名清江屬洪州後屬筠州宋淳化間以清江縣置臨江軍𨽻江南西路得覲楓宸何晏景福殿賦芸若充庭槐楓被宸分蕐竹使朱轓皁蓋豈但人生五馬之榮續漢志二千石皁蓋朱轓碧嶂清江盡在都城百雉之内臨江郡治西偏有章山郡之来山也清江在府南五里本贑江經吉安至此為清江東北流入南昌界恭惟某官耆明山立㢘潤春温才名四十年久於許國後山詩才名四十年盛氣盖諸儒周札傳以身許國死而後已刺史二千石甫此起家揚雄傳諸附離之者或起家至二千石伊誰云從何見之晚吳城葛井吳城有二一在郡西三十里一在郡西南三十五里一綂志臨江府九星井劉仙井虎跑井獨葛井未詳所在袁水蕭灘袁江源出袁州府萍郷縣至新喻為喻水至臨江南十里入清江蕭水在臨江西五里源出棲梧山及烏塘合流而為蕭水中有灘曰蕭灘亦曰蕭洲下流至南昌界入江韓文云自袁州還京孟簡乗舸邀我於蕭洲是也王文公先大父述臨江軍有蕭灘號難度以腐船度輙返吏呼公為判官灘云李與詩云葛峯相對為文筆蕭水回環當墨池説與晚衙休報事長官亭上有新詩上文葛井豈葛嶺之誤歟姑俟知者無嫌如斗之州正藉成風之刃不容席煖行有輪迎某聮事方新懐歸已切叔度何暮定闗襦袴之有無並見前令尹重来試問人民之非是續搜神記遼東城門有華表柱忽有一鶴集徘徊空中言曰有鳥有鳥丁令威去家千嵗今来歸城郭如古人民非何不學仙去空伴冢壘壘遂上沖天代回趙建昌建昌已見訪洪崖之井漸欲東還豫章記厭原山有洪井飛流懸注其深無底舊説洪崖先生井也洪崖在南昌去郡三十里宋楊傑記西山洪崖在翠巖應昌宮之間石壁峭絶飛泉北来其下井洞深不可測每嵗六七月時水髙一二丈湍激可畏其傍人語不相聞及過井洞則聲勢斗殺鑠流出山前代有異人居之世以為洪崖先生云先生三皇時人盖得道之士也問歐冶之池又令南徙吳越春秋越王允嘗聘歐冶子作名劒五枚一曰純鉤二曰湛盧三曰豪曹四曰魚膓五曰巨闕越絶書楚王召風胡子而問之曰寡人聞吳有干将越有歐冶子寡人願請此二人作鐵劒乃令風胡子之吳見干将越見歐冶子劒池在虎􅏀山即吳王闔閭𦵏處扁諸之劎魚膓之鉤在焉又處州龍泉縣南五里亦有劒池相傳歐冶子為吳王闔閭鑄劒就池淬之池上有歐冶子廟上章自列中詔未俞羊祜傳降發中之詔加非次之榮欲馳話别之牋又辱駢章之寵恭惟某官身兼數器薛宣傳謀王體㫁國論身兼數器氣蓋諸公史記季布傳布弟季心氣盖闗中王濛傳風姿英爽氣盖一時陳後山詩才名四十年盛氣盖諸儒暫為清香畫㦸之吟益增碧澗紅泉之勝並見前二千石之有效宜莫如君循吏傳序二千石有治理效輙以璽書勉厲増秩賜金一再鼓而已衰何以教我左傳一鼓作氣再而衰三而竭某又隨麾纛特畏簡書閩越地肥聞亦有禽魚之樂韓文閩越地肥衍有山泉禽魚之樂吳江水冷何當逐鷗鷺之閒唐崔信明詩楓落吳江冷餘見前代回姚開州自舜開州已見題慈恩之姓久遂託交見前傳盛山之詩始知出守韓文有韋侍講盛山十二詩序詳見前逺勤委翰更費屬辭恭惟某官續三世科為諸儒倡新唐書韓愈傳贊以六經之文為諸儒倡頡頏飛霞之佩宜在漢庭韓詩乞君飛霞佩與我髙頡頏田叔傳漢廷臣無能出其右者簸弄明月之珠久留蜀道韓詩婆娑淮水南簸弄明月珠㑹膺表選循吏傳選諸所表以次用之亟有裏除某洊守銅魚甚思蓴鱠並見前同年千里恍如琴上之星東坡詩吾州同年友粲若琴上星何日一尊共聴簾間之雨代回林饒州潔已饒州已見顯膺帝綍榮領价藩番君得江湖之心定酬民望漢書吳芮秦時番陽令也甚得江湖間民心號曰番君雷令候斗牛之氣乃借隣光張華傳吳之未滅斗牛之間常有紫氣華與雷煥登樓仰觀煥曰寳劒之精上徹于天在豫章豐城華補煥為豐城令詳見前恭惟某官籍甚才名陸賈傳名聲籍甚孟康曰言狼籍甚盛蔚為壽俊叙傳蔚為儒宗師古曰蔚文采盛也蔚音鬱尚書罔或耆壽俊在厥服道赤墀而容與揚厯已深梅福傳涉赤墀之塗應劭曰以丹漆泥塗殿上也上青天之峥嶸咨諏有賴李詩蜀道難難于上青天又劒閣峥嶸而崔嵬居然蠖屈詩居然生子易尺蠖之屈以求信也始此雄飛趙典傳典弟溫字子柔為京兆郡丞歎曰大丈夫當雄飛安能雌伏遂棄官去惟是餘干控於粤服記纂淵海餘干本春秋越國西境于越地漢為餘汗縣屬豫章晉屬鄱陽隋開皇九年去水存干曰餘干唐屬饒州餘干山一名羊角山兩峰相面狀如羊角逺考劉長卿之舊政劉長卿餘干縣故城詩孤城上與白雲齊萬古荒凉楚水西官舍已空秋草緑女牆猶在夜烏啼平江渺渺来人逺落日亭亭向客低沙鳥不知陵谷變朝飛暮去弋陽溪又于越亭詩天南愁望絶亭下栁條青落日獨歸鳥孤舟何處人山谷詩曩誰築孤亭勝日有感遇永懐劉隨州因榜白雲句近師范文正之餘規范文正公詩三出邊城鬢似絲齋中瀟洒過禪師每踈歌酒縁多病不負雲山須有詩半雨黄花秋賞健一江明月夜歸遲人間禍福何須道問着衰翁也自知李深題文正公祠詩一章奏免貢新茶恵及饒民幾萬家遺老至今懐徳政為余談此屢咨嗟御屛記名新唐書循吏傳序太宗嘗曰朕思天下事丙夜不安枕永惟治人之本莫重刺史故錄姓名于屏風臥與對之得才否狀輙疏之下方以擬廢置天子有詔韓文無疾其驅天子有詔某留連洪府王勃滕王閣序洪都新府密邇大邦飛畫棟之雲既勤郇翰見前酌清灣之水尚賴晉波左傳其波及晉國者君之餘也代囘徐濠州翦已下代何月湖作濠州古塗山氏國春秋為鍾離子國戰國屬楚秦屬九江郡漢為淮南國東漢為鍾離侯國莽曰蠶富宋立徐州齊改西楚州隋改濠州宋因之至本朝為臨濠府洪武七年改鳳陽府拔尤蓮幕分寄竹符當從軍三四年之餘有起家二千石之寵並見前可知才美超出等夷張良傳諸将皆陛下故等夷師古曰夷平也言故時皆齊等杜詩清襟照等夷恭惟某官滿腹甲兵摘髭科第並見前小試東南之尉揚雄傳東南一尉西北一侯曾子固送南城尉羅君詩羅夫子東南一尉方出盤白樂天詩王夫子送君為一尉東南三千五百里勇隨西北之師贊盡碧幢見前息氛紫塞崔豹古今注秦所築長城土色皆紫漢塞亦然側聞鴻鴈之離散淮甸皆然列子吾側聞之試以告女詩序鴻雁美宣王也萬民離散不安其居而能勞來還定安集之重罹虎狼之噬吞濠梁為甚漢書鄒陽傳夫以區區之濟北而與諸侯争強是以羔犢之仇弱而扞虎狼敵也後漢書袁紹二傳翹企延頸待望敵委慈親于虎狼之牙濠水有東源出鍾乳山西源出鏌邪山二水至昇仙橋合流至郡舊城有石絶水謂之濠梁又東流經新河口入淮帝咨誰守僉曰公宜非常之任待非常之才斯言益信漢武帝元封五年詔盖有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之累而立功名不次之除有不次之報指日可期某偶綴公朝例蒙私謝窺威顔咫尺天之意寧有遐心誦良吏拊循時之詩即觀奏最代囘張興化聲遒興化已見畫㦸清香有闕恭先之問見前明珠繡段例承委貺之勤張衡四愁詩美人贈我貂襜褕何以報之明月珠美人贈我錦繡段何以報之青玉案左傳是委君貺于草莽也情文燦然衰遲愧甚恭惟某官器資凝逺材具端方久朝績之踐敡思民庸之展布選侯千里韓文視邦選侯以公来尸岀守一麾閩為保障之雄莆乃衣冠之㑹徒得君重無俾民憂某偶綴近班過勤私謝乞為寒水玉方無計以滌煩杜詩乞為寒水玉願作冷秋菰贈我金錯刀諒不深於責報四愁詩美人贈我金錯刀何以報之英瓊瑶代囘王歸州茹歸州漢屬南郡三國先入蜀後歸吳屬建平郡晉因之劉宋屬荆州南齊屬巴州後周置秭歸郡唐置歸州天寳初改巴東郡乾元初復為歸州宋因之塵埃伺候甚思何氏之山林韓文伺候於公卿之門杜子美有陪鄭廣文遊何将軍山林及重過何氏詩翰墨淋漓似見王家之子弟王羲之傳尤善𨽻書為古今之冠論者稱其筆勢以為飄若浮雲矯若驚龍甚為從伯敦導所器重時陳留阮裕有重名為敦主簿敦當謂羲之曰汝是吾家佳子弟當不減阮主簿梁武帝評書云王僧䖍書如揚州王謝家子弟縱復不端正皆有一種風氣玩之終日灑然清風恭惟某官材地寛餘晉書王藴傳遷吏部郎每一官闕求者十輩藴輙連状白之曰某人有地某人有才務存進退各隨其才故不得者無怨焉後魏辛雄疏選補之法妙盡才具如不可並後地先才陳書蔡凝傳凝年位未髙而才地為時所重後主謂蔡徴曰蔡凝負地矜才無所用也人門秀整陳書蔡凝傳髙宗嘗謂凝曰我欲用義興主壻錢肅為黄門郎卿意何如凝正色對曰黄散之職固須人門兼美帷陛下察之唐書李揆傳肅宗謂揆曰卿門第人物才學皆當世第一摭言崔仁師之孫湜滫等昆弟數人文翰列官清要毎私宴之際自比王謝之家謂人曰吾之人門及出身官歴未嘗不為第一丈夫當先據要路以制人豈能黙黙受制于人東坡詩清朝固多士人門子皆冠瑰意琦行真淮海之俊人杜詩淮海維揚一俊人玉友金昆皆貞元之朝士南史王琳子銓錫銓雖學術不及錫而孝行齊焉時人謂之玉昆金友元微之詩屈指貞元舊朝士幾人同見太和春未空羣於冀北姑斂恵於巴東注見題下方千里而封諸侯豈不足以為政先一州而後天下特有感于斯文王羲之傳後之覽者亦将有感于斯文餘見前某自笑衰蒲更為小草見前迷途未逺已令僮僕之迎歸去来辭寔迷途其未逺又僮僕歡迎稚子候門俗駕當迴奚待逋客之謝北山移文請迴俗士駕為君謝逋客代囘金黄州㒜黄州春秋為黄國楚滅黄而有其地楚宣王滅邾徙其君于此又名邾城秦屬南郡漢屬江夏郡晉為西陽國隋唐為黄州宋因之百舎思賢夢過黄泥之坂王文公集一涯承乏自悔于座容百舍懐賢坐傾于風美又思賢百舍無階贄見之儀承乏一涯彌闊門牆之使荘子百舍重趼而不敢息注百舍止宿也思賢堂在黄陂縣尉㕔二程先生生于此故名東坡後赤壁賦步自雪堂将歸于臨皋二客從子過黄泥之坂一書委貺坐来赤壁之風水經載赤鼻山齊安拾遺遂以赤鼻山為赤壁山以三江下口為夏口以武昌縣華容鎮為曹操敗走華容道其説乖謬蓋周瑜自柴桑至武昌縣樊口而後遇于赤壁則赤壁當在樊口之上今赤鼻山在樊口對岸何待進軍而後遇之乎又赤壁初戰操軍不利引次江北而後有烏林之敗則赤壁當在江之南岸今赤壁乃在江北亦非也然東坡赤壁賦乃疑似語而大江東去之詞亦云人道是三國周郎赤壁又可見矣宋張邦基墨荘漫錄云今岳陽之下嘉魚之上有烏林赤壁盖公瑾自武昌列艦風帆便順泝流而上遇戰于赤壁之間也杜牧有寄岳州李使君詩云烏林芳草逺赤壁健帆開此真敗魏軍之地也讀之洒然何以得此恭惟某官彯纓腆仕彯匹妙切彯彯長組貌選詩士子彯華纓脱穎竒材屢風月之平分盍雲霄之獨步屬當冦至能與城存遂就畀於麾符俾益堅於保障並見前綸巾羽扇訪故壘之西邊按傅元羽扇賦云吳人取鳶烏翼摇之滅吴之後翕然貴重似為羽扇之起而裴起語林言諸葛武侯持白羽扇指麾三軍又在晉武平呉之前矣王嘉拾遺記云周昭王時修塗國獻丹鵲一雌一雄子夏取鵲翅以為扇一名條融一名仄景此疑羽扇之始餘見下畫㦸清香歌大江之東去東坡赤壁懐古詞云大江東去浪淘盡千古風流人物故壘西邊人道是三國周郎赤壁亂石穿空驚濤拍岸捲起千堆雪江山如畫一時多少豪傑遥想公瑾當年小喬初嫁了雄姿英發羽扇綸巾談笑間强虜灰飛煙滅故國神遊多情應笑我早生華髮人間如夢一樽還酬江月杜詩大江東流去詞名或本此何以累君子猶有十萬之羸東坡和孔郎中荆林馬上見寄詩朱輪未及郊清風已先馳何以累君子十萬貧與羸進而彊本朝行膺尺一之詔李尋傳拔進英雋退不任職以彊本朝餘見前某既乗下澤馬援傳乗下澤車注周禮曰車人為車行澤者欲短轂行山者欲長轂短轂則利長轂則安也又戀屬車邊秋一鴈聲漸起江湖之興杜詩戍鼔㫁人行秋髙一鴈聲人生五馬貴願精茵鼎之調説文茵車重席也禮記注著褥也家語累茵而坐列鼎而食王荆公詩水菽中嵗樂鼎茵暮年悲代囘太平王左史居安太平已見迎五馬問専城已嘗上記陳後山詩似聴兒童迎五馬稍修書札問専城烹雙魚有尺素始報下車厚賜駢蕃旅酬窘澁恭惟某官眼髙四海氣蓋諸公並見前惟素其位而行不得其言則去今之君子遑恤位隆而道汚詩我躬不閲遑恤我後禮記道隆則從而隆道汚則從而汚賢哉大夫可使頑廉而懦立疏廣傳道路觀者皆曰賢哉二大夫故於去國一二年之近戴氏鼠璞云世以去朝廷為去國蓋用孔子去父母國出處然今與列國時不同春秋之世去魯之齊去晉之秦可言去國今天下一家非能北走胡南走越雖辭榮闕庭退蔵巖谷何地非王土也遂有起家二千石之榮報政匪朝歸班有日某久踈顔采未隔心期陳後山詩得失妍蚩只自知畧容千載有心期詳見前君薄淮陽耶願早歸於禁闥吾在汶上矣㑹猶見於璽書代囘滕饒州安饒州已見入膺顯命出殿雄藩殿鎮也詩殿天子之邦餘干乃番之故都有華作牧見前逺方聞滕之仁政必願受㕓眡龜之賀未遑周禮卜大封拜則眡髙作龜大祭祀則眡髙命龜烹鯉之書何腆恭惟某官褆身肅括操行淑均獨扛百斛之龍文恢然抱負韓文抱負其業東歸于家連中兩科之麟角雋甚聲華厯試民庸率登政最再持平於廷讞旋入直於郎闈萋兮錦文並見前翩哉襆被魏舒傳襆被而出陸納傳臨發止有襆被而已新唐書蘇瓌傳瓌單身襆被自将水清見石古樂府艷歌行夫壻從門来斜柯西北盼語卿且勿盼水清石白見山谷詩水清石見君所知此是吾家秘密蔵又難以口舌争水清石自見雲散月明故從二千石以起家且使十萬户之䝉福並見前考古文翁之宅記纂淵海漢文翁宅左饒州東百里按漢書文翁廬江舒人題詩栁渾之樓新唐書栁渾字夷曠天寳初擢進士第大厯初江西魏少游表為判官路嗣恭代少游渾遷團練副使俄為袁州刺史拜顔魯公於堂已見心期之磊落顔魯公乾元初為饒州刺史郡治有九賢堂公其一也繼范文正之轍㑹看步武之騫騰范文正公景徳初知饒州互見前某方此違離悒然馳傃悒乙及切説文不安也傃蘇故切韻㑹向也傾蓋如故何幸兵衛之凝香鄒陽傳傾蓋如故注傾蓋猶交蓋駐車也游刃若新亦使鼓旗之旁譟六一居士集安得二子接揮鋒兩交鋩我亦願助勇鼓旗譟其旁代囘林處州孔昭處州已見起自家林岀守輔郡以賢明慈惠之帥寛愁恨歎息之民上意甚隆下情惟允恭惟某官蜚英雋軌䇿步華塗表裏瑩乎純明中外久於敡歴屬當赤白囊之警岀分赭黄繖之憂並見前未明李廣之功李廣傳廣不為後人然終無尺寸功遽得樂羊之謗史記甘茂傳魏文侯令樂羊将而攻中山三年而拔之樂羊返而論功文侯示之謗書一篋忠無不報鄒陽傳忠無不報信不見疑事久益明徑畀竹符枉臨栝郡小括山髙三十五丈周迴三里州治其上寰宇記云栝蒼山在台州今蒼嶺是也隋志云處州有栝蒼山抱濟北老人之石何必智勇之功名張良傳十三年孺子見我濟北穀城山下黄石即我已孫子善戰者無智名無勇功張良傳贊聞張良之智勇以為其貌魁梧竒偉山谷詩智名勇功不入眼訪江南處士之星㑹有太平之官府記纂淵海處州上應牽牛之宿下當少陽之位方輿勝覽唐大厯間以處士星見詔更州名州治有少微閣以少㣲乃郡之星也續晉陽秋謝敷隐居㑹稽山初月犯少微星一名處士星時戴逵名重于敷時人憂之俄而敷死故㑹稽士人嘲吳人曰吳中髙士求死不得山谷詩鳬飛葉縣郎官宰虹貫江南處士星唐崔謩為秦州刺史人喜曰不意復見太平官府周禮治典以治官府教典以教官府又以八法治官府官府二字出此某猥塵班綴過辱緘縢弩矢前驅雖少稽於賀厦鼓旗旁譟猶有待於賜環並見前代回劉袁州履忠袁州已見光膺漢詔岀牧江城杜詩鼔角動江城穀旦于差詩穀旦于差南方之原注穀善也旦明于曰差擇也良辰美景可以佚樂故見朝日善明無隂雲風雨則曰可以相擇而行樂矣此㫁章瓜期而往左傳齊侯使連稱管至父戍葵邱瓜時而往曰及𤓰而代所謂十萬户之福其惟二千石之良並見前恭惟某官望實髙華典刑秀整自頃割鷄之政交騰薦鶚之章服在班行韓詩强顔班行内藹然譽處恬為丞于再轉甘出守之一麾並見前布新澤勸耕桑請驗韓昌黎之表昌黎袁州謝上表州小地狹税賦及時人安吏循閭里無事微臣惟當布陛下惟新之澤守國家太平之規勸以耕桑使無怠惰而已得賢君游庠序自有李泰伯之文李泰伯袁州學記爾袁得賢君俾爾由庠序踐古人之迹洗空珥筆之聲古諺云筠袁贑吉腦後插筆詳别見即聴璽書之召某偶塵槖綴爾雅塵久也注塵垢稽久也蔡謨傳豈惟微臣其亡之誡實招聖朝惟塵之累例辱緹緘緹上禮切説文帛丹黄色又都黎切當太守入境之初雖稽燕雀之賀夏頌聖主得賢之美猶期蟋蟀之唫秋並見前代回程慶元凖春秋時吳封越王句踐東至于鄞即今鄞縣句踐破呉欲徙吳王甬東即此郡境戰國為楚地秦以後屬㑹稽郡隋屬越州唐置明州宋以明州為奉化郡建隆三年改奉化軍慶元元年以寧宗潛藩陞慶元府至本朝吳元年改明州府洪武十四年改寕波府榮驅節傳易殿价藩凝燕寢之清香並見前護龍潛之舊邸見題下寛條一布和氣四騰恭惟某官器宇端凝才猷敏劭盤根利器游刃有餘並見前野水横舟乗流則逝賈誼傳乗流則逝遇坎則止餘見前襆潛郎之被屢褰華使之帷並見前宣室不見賈生方議以公卿之任賈誼傳於是天子議以誼任公卿之位又文帝思誼徵之至入見上方受釐宣室曰吾久不見賈生自以為過之今不及也潁川必得黄霸始慰其父老之心見前瀚海澄波史記衛青傳登臨瀚海索隠云按崔浩云北海名羣鳥之所觧羽故云瀚海廣志在沙漠北宋程大昌北邊備對北海之名不著于經而霍去病之封狼居胥山也其山實臨瀚海者北海也京師䝉潤近長安之日豈舍王哉望蓬莱之雲今召君矣杜詩雲近蓬莱常五色某比方䝉潤復辱損箋比䝉復損四卦名陪旅進旅退之餘雖已遲於賀夏拜特書屢書之况亦自足以生春韓文将大書特書屢書不一書而已也此借用代回姜道州楷道州即舜封象有庳國地春秋戰國屬楚秦屬長沙郡漢分長沙置零陵郡吳分零陵郡置營陽郡今州是也以郡在營水之南故名南齊為營道郡梁改永陽郡唐改南營州尋改道州宋因之至本朝屬永州府起從珍館揚雄傳珍臺閒館璇題玉英岀綰銅符板輿迎養之榮板輿一名步輿方四尺素木為之以皮為􅀈掆之潘岳閑居賦太夫人乃御版輿升輕軒野客叢書云世率以板輿為奉母事如樂天詩朱轓四從板輿行蓋取閑居賦意不知當時三公告老亦許以板輿上殿如傳祗者是則板輿不專為奉母事梁韋睿以板輿自載督厲衆軍則知板輿非止一事竹馬歡呼之切見前教條一布黄霸傳為教條置父老師帥五長班行之喜氣四馳恭惟某官夙抱通材蚤儀華貫西風便面厭隨京洛之塵張敝傳以便面拊馬師古曰便面所以障面盖扇之類也不欲見人以此自障面則得其便故曰便面郭子庾公名位漸重足傾王公時庾在石頭王公在城忽風起塵揚王公以扇拂之曰元規塵汚人陸機詩京洛多風塵素衣化為緇謝朓詩誰能久京洛緇塵染素衣孟郊詩如知吳楚水不及京洛塵歐陽修詩浩然滄洲思日厭京洛塵東海邊頭歸望蓬莱之氣岑參詩邊頭詞客舊来稀雖某水某邱方便於幽討韓文某水某邱吾童子時所釣游也杜詩李侯金閨彦脱身事幽討然吾山吾水正賴於主盟浯溪在道州祁陽縣南五里流入湘江唐元結自道州歸愛其山水因家焉又為峿臺唐亭石室諸銘宋陳衍云元氏始命之意因水以為浯溪因山以為峿山作室以為唐室三吾之稱我所自也制字從水從山從广我所命也三者之目皆自吾焉我所擅而有也左傳無徳何以主盟考陽城之勞心知所從矣新唐書城為道州賦税不時觀察使數誚責州當上考功第城自署曰撫字勞心催科政拙考下下得元結而吐氣竊有待焉杜子美集覽道州元使君舂陵行志之曰當天子分憂之地效漢官良吏之目今盜賊未息知民疾苦得結輩數十公落落然參錯天下為邦百萬物吐氣天下少安可待矣安知良刺史之歸不應吾太公之望史記齊太公世家西伯将出獵卜之曰所獲非熊非彲非虎非羆所獲霸王之輔於是周西伯獵果遇太公于渭之陽與語大悦曰自吾先君太公曰當有聖人適周周以興子真是耶吾太公望子久矣故號之曰太公望載與俱歸某未遑旅賀先辱謙施旅謙卦名欲往從之湘水深莫效綺琴之報張衡四愁詩我所思兮在桂林欲往從之湘水深詳見前歸去来兮山酒熟亦吟畫㦸之香淵明詩歸去来山中山中酒應熟代回光化唐知軍曄光化已見蘭芷可佩頗懐瀟湘之故人離騷經扈江蘺與辟芷兮紉秋蘭以為佩雲溪友議徐侍郎安貞久居中書嘗參李右座議恐其罪累乃逃隠衡山嶽寺為行者李北海邕游嶽寓寺見所題寺梁召至握手曰朝列于公已息論矣因同載北歸止潭州察使相迓徐侍郎指李北海呼曰行者瀟湘逢故人得隨歸客栁渾詩瀟湘逢故人草木知名似是江淮之刺史張萬福傳江淮草木亦知爾威名詳見前徒得君重實獲我心詩我思古人寔獲我心恭惟某官文史蟠胸精神滿腹觀牛刀之游刃並見前已牛足之生氂華嶠後漢書岑熙為東郡太守輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂自為入幕之賔彌露處囊之穎並見前果從交辟杜詩幕府初交辟郎官幸備員逕把一麾邊城蹂躪之餘野馬也塵埃也王商傳百姓奔走相蹂躪師古曰蹂踐也躪轢也蹂人九反躪音藺荘子野馬也塵埃也生物之以息相吹也注天地間氣如野馬之馳其蓊鬱如塵埃揚也郡守經理之始繭絲乎保障乎無有遐心政觀逺業並見前某恭承嘉恵甚覺故情汎乎不繫舟漸為興盡之計賈誼傳澹乎若深淵之靚汜乎若不繫之舟鮑泉詩宛溪霜夜聴猿愁去國長為不繫舟王徽之傳乗興而来興盡而反詳見前賞此無瑕璧但歌靡盬之詩山谷詩但歌靡盬詩賞此無瑕璧詩王事靡盬毛傳盬不堅固也代回傅贑州伯召贑州已見奉詔舉賢詘公充賦鼂錯傳以臣錯充賦如淳曰猶言備數也臣瓚曰充賦此錯之謙也云如賦調也貽書陳誼期我過情言及而言謝非所謝恭惟某官器資宏毅識量浚明四顧而解全牛號霹靂手唐書裴琰之絳州聞喜人永徽中為同州司户參軍年少美容儀不主曹務刺史李崇義内輕之先是州中有積年舊案數百道崇義一使趣㫁琰之為省決一日而畢既予奪當理而筆詞勁妙崇義驚曰公何忍蔵鋒以貽鄙夫之過由是知名謂之霹靂手一洗而空凡馬真騕褭蹄杜詩一洗萬古凡馬空褭乃了切騕褭古良馬名長喙赤色日行萬里又褭蹏麟趾師古曰古駿馬名漢書音義騕褭神馬赤喙黒身與飛同明君有徳則至張衡思𤣥賦繫騕褭以服箱臥汲黯於淮陽固許召還於禁闥並見前試望之於馮翊不如即置之本朝蕭望之傳望之雅意本朝又宣帝察望之材任宰相欲詳試其政事復以為左馮翊日君有命於庭日君字出左傳詳見前星郎多虛其户天文志五帝座後聚十五星曰哀烏郎位凡在班列許以名聞雖不勝匹雛固為無力人矣然有如一鶚敢不表而出之劉賔客集表而出之為生羽翼露請頗勤天髙未動不度徳不量力誠見笑於大方左傳君子是以知息之将亡也不度徳不量力不親親不徵辭不察有罪犯五不韙以伐人其䘮師也不亦宜乎又隨之見伐不量力也量力而動其過鮮矣荘子吾長見笑于大方之家非要譽非納交亦粗賢於流俗不虞手筆申屠蟠傳申以手筆趙壹傳逺辱手筆追路相尋王儉傳手筆典裁為當時所重范曄傳手筆差易于文韓文貶損道徳乃至手筆以問之却重背芒霍光傳若有芒刺在背囘首邱山何害四十圍之溜雨少陵古栢行霜皮溜雨四十圍黛色參天二千尺又大厦如傾要梁棟萬年囘首邱山重濯足雲漢㑹看九萬里之摶風見前某濩落無容荘子瓠落無所容注瓠音護一音户郭反瓠落猶廓落也媻跚未去迷邦故令晚方微吟黄太史之詩山谷詩迷邦故令成晚器不琢原非匠石羞可人期不来亦太息陳後山之句陳後山詩書當快意讀易盡客有可人期不来代囘林嘉定潔已嘉定府即漢犍為郡南安縣地梁武帝開通外徼立青州取青衣以為名西魏改為眉州取峨眉山以為名後周改為嘉州取漢嘉郡以為名隋復為眉州唐復為嘉州宋因之以寧宗潜藩陞嘉定府對月半輪好在漢家之太守太白峨眉山月歌峨眉山月半輪秋影入平羌江水流宋李巽巖雅州學田記昔公孫述據蜀青衣不賔光武嘉之因改青衣曰漢嘉東坡送呂昌朝知嘉州詩横空好在修眉色又送張嘉州詩少年不願萬户侯亦不願識韓荆州頗願身為漢嘉守載酒時作淩雲游披雲五朶乃是瀟湘之故人雲溪友議徐侍郎安貞久居中書嘗參李右座議恐其罪累乃逃隠衡山嶽寺為行者李北海邕游嶽寓寺見所題寺梁乃召至握手曰朝列于公已息論矣因同載北止潭州察使相迓徐侍郎指李北海呼曰行者瀟湘逄故人得隨歸客間者闊焉嚴助傳間者闊焉久不聞問得此足矣恭惟某官玲瓏俊識玲瓏増韻明貌文選珊瑚幽茂而玲瓏甘泉賦和氏瓏玲注瓏玲明見貌玲亦作􅌑法言瓏􅌑其聲者其質玉石乎卓犖通材見前和荆潭之詩氣已吞於餘子韓文有荆潭倡和詩序東坡詩氣吞餘子無全目詩到諸郎尚絶倫隨巴蜀之檄名益震於諸公司馬相如傳有諭告巴蜀檄兵衛森畫㦸之香見前談笑入青油之幕韓詩從軍古云樂談笑青油幕聊將八詠金華志八詠詩南齊隆昌元年太守沈約所作題於𤣥暢樓時號絶倡後人因更𤣥暢為八詠樓云八詠謂登樓望秋月㑹圃臨春風嵗暮愍衰草霜来悲落桐夕行聞夜鶴晨征聴曉鴻解珮去朝市被褐守山東東坡送呂嘉州詩不羡三刀夢益都聊将八詠繼東呉還受一錢劉寵傳為㑹稽太守郡中大化徵為将作大匠山隂縣有五六老叟自若邪山谷間出人齎百錢以送寵寵為人選一大錢受之東坡送張嘉州詩歸来選受一大錢好意莫違黄髮叟按八詠一錢原非嘉州故事自東坡入詠便可移入嘉州然不讀坡詩未免疑為錯用也特為拈出載酒訪揚雄之居揚雄傳家素貧嗜酒人希至其門時有好事者載酒肴從游學方輿勝覽揚雄山在嘉定府治西有洞深邃相傳子雲隠居于此今為延祚觀一統志揚雄山舊有西蜀子雲亭又犍為縣南十八里有子雲山下有揚雄灘登樓歌李白之句見上文亦職有利盍歸乎来某久欲掛冠又還持槖並見前庚星之伴殘月寧容到曉之不收韓詩東方半明大星沒獨有太白配殘月嗟爾殘月勿相疑同光共影須臾期東坡詩天教明月伴長庚又長庚到曉空陪月丙穴之有嘉魚所願得賢之與共蜀都賦嘉魚出于丙穴詳見前詩序南有嘉魚樂與賢也太平之君子至誠樂與賢者共之也代囘全州莫守若冲全州已見以下六條徽本缺今補奉詔舉賢徒得君重見前貽書問訊至辱伻来晉書郄超傳常躡履問訊杜詩道甫問訊今何如爾雅伻使也尚書伻来此意何敢忘耶東坡與刁景純書吳興自晉以来賢守風流相望而不肖獨以罪去垢累溪山景純相愛之深特與洗飾此意何敢忘耶以頌非所望也韓文愈于使君非燕游一日之好也故其贈行不以頌而以規恭惟某官久騰茂實宜在本朝荀子人君用之則勢在本朝而宜竒寶横道驥服箱誰其識者陳後山贈二蘇公詩竒寳横道驥服箱誰其識者有歐陽大科異等固其常小却盛之白玉堂張衡思𤣥賦繫騕褭以服箱斜風吹帷雨注面愛莫助之東坡戱子由詩斜風吹帷雨注面先生不愧傍人羞任從飽死笑方朔肯為雨立求秦優今雖方千里而為諸侯猶是先一州而後天下韓文先一州而後天下豈吾君吾相愛之心哉昨者命出輙以名聞天空而日月髙或未裁擇於此奏昌黎送張道士詩天空日月髙下照理不遺或是章奏繁裁擇未及斯水深而波浪闊寜當憔悴於斯人杜陵夢李白詩水深波浪闊無使蛟龍得又冠蓋滿京華斯人獨顦顇細讀綺談選詩髙談一何綺只慙緜力嚴助傳緜力薄材某無能為役左傳於先大夫無能為役詳見前豈不懐歸詩豈不懐歸王事靡盬直如朱絲絃願加意於自愛鮑昭白頭吟直如朱絲絃清如玉壺冰髙帝紀願季自愛報之青玉案媿出吻之無竒張衡四愁詩美人贈我錦繡段何以報之青玉案韓文毎營度欲出口吻聲鳴益悲操筆欲書将下復止竟亦不能竒也餘見前代囘曹岳州格岳州為春秋麋羅二國秦屬長沙漢屬南郡吳以為重鎮晉屬長沙宋曰巴陵梁置巴州又置羅州隋曰岳州又置玉州唐置巴州改岳州宋因之以英宗潛邸陞岳陽軍節度入對宣室見前出守湖隂岳州在洞庭之北布寛大之六條百官表刺史以六條問事非條所問即不省詳見前銷愁歎於千里見前桐魚既合唐髙祖紀武徳元年改銀兔符為銅魚符隋文帝紀開皇九年頒木魚符竹馬交驩恭惟某官操行靖共賦姿凝逺學術齊相之清淨猶有典刑曹參傳百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靜民以寧一文章子建之波瀾豈其苗裔杜詩文章曹植波瀾闊史記舜目蓋重瞳子又聞項羽亦重瞳子豈其苗裔耶霍光傳贊昔霍叔封于晉晉即河東光豈其苗裔乎自蚤騰於夷路謂立據於要津杜詩立登要路津居然偏城臧洪傳論偏城既危曹袁方睦杜詩宇宙蜀城偏李燾詩偏城越雋東斂此大惠韓文斂此大恵兮施于一州展洞庭萬頃之眼自足行春范文正公岳陽樓記上下天光一碧萬頃杜氏通典太守常以春行所主縣秋冬遣無害吏按訊諸囚平其罪法論課殿最吞雲夢八九於胸不妨坐嘯黨錮傳南陽太守岑公孝𢎞農成瑨但坐嘯化行俗美何必慮潢池之驚見前政通人和自可後天下而樂范文正公岳陽樓記慶厯四年春滕子京謫守巴陵郡越明年政通人和百廢具興又先天下之憂而憂後天下之樂而樂某坐遲一職過辱屢書韓文将特書大書屢書此借用吟髙柱清唱之詩悵莫陪於履舄昌黎岳陽樓别竇司直詩開筵交履舄爛漫倒家釀盃行無停留髙柱送清唱史記滑稽傳履舄交錯柱謂瑟柱持燕寢凝香之句願更切於鼎茵見前代回黄筠州榮筠州已見為丞再轉出守一麾用山谷先生之家試江西道院之郡山谷江西道院賦武陵栁侯守筠之明年樂其俗之美使為政者不勤乃新燕居之堂榜曰江西道院互見前先聲所暨和氣可知恭惟某官離竒長材鄒陽傳輪囷離竒注委曲盤戾也奫宏雅量奫紆倫切水深貌吳都賦泓澄奫潫奫潫迴復貌人皆刼刼知足效於一官韓文人皆刼刼我獨有餘荘子知效一官行比一郷公獨恢恢身可兼於數器韓宣傳身兼數器有退食自公之節聴琵琶于湓浦幾成三嵗之淹白樂天琵琶行序元和十年予左遷九江郡司馬明年秋送客湓浦口聞舟中夜彈琵琶者聴其音錚錚然有京都聲問其人本長安倡女嘗學琵琶於穆曹二善才年長色衰委身為賈人婦遂命酒使快彈數曲曲罷憫然自叙少小時歡樂事今漂淪憔悴轉徙于江湖間予出官二年恬然自安感斯人言是夕始覺有遷謫意因為長句歌以贈之命曰琵琶行夢綵筆於武夷又作一年之借方輿志建寧浦城邑本漢東侯官之地吳永興三年改為吳興縣梁尚書郎江淹嘗為吳興令齊書江淹嘗宿于冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃探懐中得五色筆一以授之爾後為詩絶無美句時人謂之才盡魏鶴山夢筆山房記世傳江文通為吳興令夢人授五色筆繇是文藻日新今浦城縣故吳興也縣故有孤山里人因以夢筆稱之真希元於山之麓營闔廬為蔵修遊息之所以書抵了翁曰子為我發之了翁毎惟聖賢之生鮮不百年曷嘗以老少為鋭惰窮逹為榮悴哉如史所書任彦升丘靈鞠江文通諸人皆有才盡之歎而史於文通末年至謂夢張景陽奪錦郭景純徵筆才不逮前夫才命于氣氣稟于志志立于學者也豈一夢之間他人所得而予奪乎冦恂傳從陛下復借冦君一年帝念髙安之父老江西道院賦且為髙安之父老雪耻詳見前誰為元祐之子孫弄印相除周昌傳髙祖持御史大夫印弄之過家甚寵岑彭傳有詔過家上冢東坡詩過家父老喜九轉之丹砂㸃鐵如探諸懐傳燈録雲門如九轉丹砂㸃鐡成金澄公藥汞銀入煅則流去詳見前十行之紫詔封泥可拱而竢隴右記武都紫水有泥其色亦紫而粘貢之用封璽書故詔告有紫泥之美終軍傳斯拱而竢之耳某無能束緼緼於粉反亂麻也蒯通傳客謂通曰先生知梁石君東郭先生世俗所不及何不進之於相國乎通曰諾臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之里母曰女安行我今令而家追女矣即束縕請火於亡肉家曰昨暮夜犬得肉争鬬相敎請火治之亡肉家遽追呼其婦故里母非談説之士也束縕乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國又見韓詩外傳及韓非子文各稍異徒慶得輿去騎之逐雙旌不得負郷人之弩韓詩免勞去騎逐雙旌烹魚而得尺素乃屢分隣壁之燈見前代回章衡州良能衡州已見尺書起敬莫測浮沉晉書殷羡字洪喬為豫章太守都下人士因其致書者百餘函行次石頭皆投之水中曰沉者自沉浮者自浮殷洪喬不為致書郵累幅勞謙至勤駢儷易勞謙君子有終吉注居謙之世何可安尊上承下接勞謙匪懈恐前魚之未逹于武陵詩一從悲畫扇㡬度泣前魚用史記龍陽君事此前魚蓋借用對囘鴈以生慙衡山有囘鴈峯此囘鴈亦借用恭惟某官識足洞今學皆到古韓文但力為之古人不難到上規姚姒發壁中科斗之文韓文上規姚姒渾渾無涯孔安國尚書序魯共王好治宮室壊孔子舊宅以廣其居於壁中得先人所蔵古文虞夏商周之書及傳論語孝經皆科斗文字平到隂何粲雪裏飛鴻之句陳後山詩崔蔡論文不足多新詩平處到隂何東坡詩人生到處知何似應似飛鴻踏雪泥又白鬚相映松間鶴清句更酬雪裏鴻薄蓬莱而引去栁文薄蓬莱羞崑崙郊祀志蓬莱方丈瀛洲在渤海中且至則風輙引船而去指嶽麓以請行盛𢎞之荆州記長沙西岸有麓山蓋衡山之足又名靈麓峰乃嶽山七十二峯之數自湘西古渡登岸夾徑喬松泉澗盤繞諸峯疊秀下瞰湘江嶽麓寺道林寺嶽麓書院皆在焉皂蓋春濃姑棠隂之少憩紫樞地近佇棣蕚之相輝某復此隨班幾何視䕃曉行湘水固知畫㦸之清並見前暮見吳山亦望碧雲之合東坡詩朝見吳山横暮見吳山從吳山故多態轉側為君容江淹雜體詩日暮碧雲合美人殊未来代回史蘄州宜之蘄州春秋戰國並屬楚西漢為蘄春縣𨽻江夏郡三國時為蘄春郡晉以為縣屬戈陽郡避宣太后諱改春為陽北齊置齊昌郡及羅州後周改為蘄州隋改為郡唐復為州宋因之分虎合符灼龜視篆見前惟兩淮之上郡宋闗泳蘄州神光觀記蘄西故封浠水古邑溪山重複占淮濡之上腴屬帝轂之衝㑹在三楚之中邦史記楚文王徙都於郢江陵為西楚蘄居三楚之中尚書成賦中邦雙旌得人五袴有日恭惟某官美由世濟學有家傳歛板轅門糧自通於流馬言為運幕奏功巖邑技益敏於割鷄左傳制巖邑也巖險之邑言為令結綬登畿顔延之詩結綬登王畿把麾出守維古英氏之國英國名史記禹封臯陶後於英六索隠云安國六縣皋陶後偃姓所封國英地闕不知所在以為黥布是其後也髙帝紀立當陽君英布為九江王都六注六者縣名本古國臯陶之後英布傳黥布六人也皇覽云臯陶冢在廬江六縣乃今蘄春之區見題下大膞以還韓文曹成王碑艦歩二萬人以與賊遌嘬鋒蔡山踣之剜蘄之黄梅大鞣長平鏺廣濟掀蘄春􅈪蘄水掇黄岡莢漢陽行跳汉川還大膞注音傅又處落切左傳殺而膊諸城上注膞磔也髙牙是仰佇懋民庸之最乃為王覲之圖某縻身於朝莫面以賀雙魚尺素之遺何以報之並見前乗馬四黄之迎焉知来者詩四黄既駕兩驂不倚詳見前代囘曹岳州格岳州已見分虎專城拂龜視印碧油紅斾宣中扆之寬條並見前赤壁黄岡控上流之重寄王禹偁瑞慶堂記齊安郡治據依黄岡山来自天柱王元之詩淮甸為内地黄岡壓上流餘見前恭惟某官長材濟美雋軌蜚英三仕舂容罙入淮濡之地詩罙入其阻淮濡見上條一麾晼晚始分邾子之邦文選日晼晚其將暮楚滅黄而有其地楚宣王滅邾徙其君于此又名邾城雲夢在胸陽春有脚並見前願將印綬少分黄屋之憂髙帝紀黄屋左纛注天子車以黄繒為蓋裏却著絲絇歸復青氊之舊山谷詩赤壁歸来入紫清堂堂心在鬢凋零江沙踏破青鞋底却結絲絇侍禁庭某識賢已後辱問相先歌桂棹以長懐未應陳迹東坡赤壁賦桂棹兮蘭槳擊空明兮泝流光渺渺兮予懐望美人兮天一方記竹樓而有感願繼盛名竹樓在州治西北城上宋郡守王禹偁元之建自作記云黄岡之地多竹大者如椽竹工破之用代陶瓦比屋皆是以其價廉而工省也子城西北隅雉堞圮毁蓁莽荒穢因作小竹樓二間與月波樓通逺吞山光平揖江瀨幽閴遼夐不可具狀夏宜急雨有瀑布聲冬宜密雪有碎玉聲宜鼔琴琴調和暢宜詠詩詩韻清絶宜圍棊子聲丁丁然宜投壺矢聲錚錚然皆竹樓之所助也公退之暇披鶴氅戴華陽巾手執周易焚香黙坐銷遣世慮江山之外第見風帆沙鳥煙雲竹木而已迨其酒力醒茶煙歇送夕陽迎素月亦謫居之勝槩也彼齊雲落星髙則髙矣井幹麗譙華則華矣止于貯妓女蔵歌舞非騷人之事吾所不取四六標準卷二十七
