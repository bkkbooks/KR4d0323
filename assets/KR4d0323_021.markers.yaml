  - {type: variant, offset: 22592, length: 358, content: 宋史畢再遇字德卿兖州人父進從岳飛轉戰江淮間積階至武義大夫再遇以恩補官武藝絶人挽弓至二石七斗累官鎮江都統制兼權山東京東招撫司事驍衛大将軍兼知揚州淮東安撫使嘉定元年除左驍衛上将軍和好成累疏乞歸田里賜詔不許十年以武信軍節度使致仕贈太師謚忠毅再遇姿貌雄傑早以拳勇聞屬時寢兵無所自見一旦邊事起諸将望風奔衂再遇威聲始著遂為名將云鶴林玉露云開禧用兵諸将皆敗唯畢再遇數有功敵常以水櫃敗我再遇夜縳藁人數千衣以甲胄持旗幟戈矛儼立成行昧爽鳴鼓敵人驚視亟放水櫃旋知其非真甚沮乃出師攻之敵大敗又嘗引敵與戰且前且却至于數四視日已晩乃以香料煮黒豆布地復前搏戰佯敗敵乗勝逐北馬饑戀食豆鞭之不前我師反攻之敵人馬死者不可勝計又嘗與敵對壘度敵兵至者日衆難與爭鋒一夕㧞營去慮敵相追乃留旗幟于營縛注羊置前二足于鼓上擊鼔有聲敵不覺為空營相持竟日比覺追之則已逺矣, SBCK: ''}
