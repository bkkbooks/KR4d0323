body:
  text: 謝除授代魏兵部除編修檢討謝丞相郎省真除叨綴夏官之屬史闈假寵仍紬東觀之書曽微共二之材况冒兼三之􅀉一陶厚甚重拜悚然􅀼以兵書之在史家近分四種文事之有武備古號二􅂗故長槍大劔雖有毛錐之嘲而亂臣賊子難免麟筆之懼欲兼羙職冝屬全材如某者見謂迂踈藐無操挾少徒志科名之苟得壯始知事業之無窮頃因去蓬島之船甘回泛瞿唐之棹旣徧塵於藩閫亦洊駕於軺軒州縣十七年詎曰朞年之去國水陸八千里寕論千里而見王敢圗三朝之㑹同倐􅂪一札之収召義難俟駕禮合造朝甫入覲於朶雲遄進班於列􅀫載惟文昌之務尤嚴武部之司蓋五材民並用之古無去兵之理而多壘士之耻也今當整旅之時矧不崇朝之間兼綴編年之職昔楊雄經􅀊餘之待詔僅試郎貟至韓愈願年老而著書尚辤史事蛙固難於語海蚊詎可以􅀒山恭惟某官柱石九筵權衡庶彚合皐陶合稷契天知許國之心􅀂伊陟􅀂巫賢人仰傳家之學調十五載更絃之化収七十城慿軾之功雖當百志之惟熈益思九德之咸事必欲與天地以相似不容委人物以眇然猥挈􅀌蹤亦汚髙選某敢不勉思厥職惟旣乃心乏姚崇奏決之材恐空塵於戎部成魏収直筆之願當圖勉於䇿書代鍾監丞震除祕書省著作佐郎謝丞相渉筆膠庠正覺丞哉之􅀒濫竽冊府復叨儒者之榮蛻凡骨於髙明聳危肝而感激切以圖書之府實通天上之星辰英雋所􅄤不受人間之風日未能免俗何自爲郎左太冲之賦三都始求此職岑文本之奏二頌乃稱是官况黄道日月之明值紫皇春秋之冨鏘韶鈞而蔚虎鳯邁漢九流充棟宇而汗馬牛過唐四庫職固隣於書蠧名亦近於郎烏是爲淸資冝擢素望伏念某楚狂一介鄭重半生丗科不􅀘於遺餘家學僅安於淡泊三仕甘廣文之冷􅀂將終焉一朝拔從事之尤聊復爾耳敢意大鈞之播真無鈍鑛之遺因其就湏入之章華之以不次之擢籍田之芟載柞旣沐三熏博士之冗不治更榮再轉但欲乞治中而去詎敢窺廣内之藏蓬弱風波敢望接三神之武虀塩朝暮􅀄無送五􅀑之文忽從米􅅒之間驟綴蘭臺之属孰主張是遂濟登兹伏遇某官命丗眞儒爽􅀖哲輔載萬物以坤元之厚飪百度於鼎實之和李賛皇五十四􅀊而相君其年如父王文正一十八載之當國惟德之符方宏翕受之規益廣旁招之路有憐冗散亦玷超遷某敢不讀未見之書求多聞之友緫一百三家之略益􅀷稽古之功摭五三載籍之遺或上得賢之頌代江淮陳制幹韡除監丞謝丞相烏幕充貟方驟通於閨籍雉工列属更躐造於朝紳不三閱月之間乃兩承天之寵感恩踰分拊已増慙切惟國朝立法之至公人材循序而後進欲其脫選必限以六考而舉以五貟至􅀂轉丞非内之列院則外之諸郡縱有特頒之殊渥亦難盡越於常規蓋湏得百年幾見之人乃可稱一􅀊九遷之命詎容異数猥及凡材如某者禀質顓􅂪賦材迂滯蚤記教忠之訓未知造道之方摘句分章粗耻空談而無用陳力就列豈敢大言以爲欺容貌不能以勝衣智略何有於湊輻適英主際中興之運而遺􅀺懷内附之思遂令白面之書生往賛碧幢之元帥雖戎政無能爲役然君命寕敢辤難齊人歸疆正可閔離離之􅁰周行多士詎容伐坎坎之檀敢圖禀議之來洊沐超遷之寵甫離七階之選遽參貳監之聮家人蓋有嚴君昔居是職癡兒未了公事乃丗此官旣材能不及於中庸又名實未孚於上下挈提至此稱塞謂何恭惟某官命丗宗工爽􅀖碩輔積十五年秉鈞之績成七十城慿軾之功謂明王立政惟人當廣開於􅂗轍而宰相代天理物難純用於規繩將収度外之材用作邊隅之氣必使􅂪皐比以出姑爲買馬首之謀故略等夷特加簡拔某敢不仰衘恩意退激懦􅂨指心誓報於寵靈臨事益思於忠力得人朝廷得人幕下無愧石洪温造之流遇我國士遇我衆人明辨中行智伯之報除國子録謝丞相金耀庀司愧乏主書之最璧流選属叨升紏事之聮非有清資而致然夫何素望之及此一陶厚甚三省矍然切以化民成俗由學乎其來巳古授業傳道解惑也必惟其賢况風化之夲原尤國人之矜式雖居小職亦選鉅儒在元祐間實用張横渠之輩至紹聖末亦取游建安之流此豈庸虚所能稱塞伏念某禀姿苦窳殖學踈蕪小人可以小知無廣大髙明之見大慙謂之大好乃􅃈碎俳偶之辭矧至四五十之無聞重感三千鍾之弗洎兩􅁂巳雪百念皆氷敢意登畿獲齒筦庫陳人無用苟安掌故之蹤名士滿前詎堪首善之職忽􅂪分席莫遂循墻有先逹者爲之前尚恐後生之可畏占小善者必以録益知大播之無垠伏遇某官柱石九筵􅁠衡百度粉米山藻之色别繪以衮章塩梅水火之味殊飪之鼎實雖當靑衿剌學之後不替緇衣好賢之心有憐蠧魚之專俾致螟蛉之祝天位與共天職是豈出王公之私人患好爲人師特恐犯聖賢之戒某敢不益磨行檢加飭禮維懲創孝先之晝眠追隨昌􅀺之晨入命汝教胄豈徒教小技之文章匪我求􅂪願勉求放心之學問除國子録謝執政抱􅀜金耀巳汙掌故之科分席璜宫􅀄乏知新之學進非有德遷不以勞永言小善必録之由全出大鈞無垠之造所感厚甚無謝可乎切以太學風化之本原其來巳古大夫國人所矜式必立之師故雖尾僚亦􅀜首善道出羲皇而過屈宋猶曰於我何有哉文規姚姒而逮莊騷尙聞有􅀏于列者不善螟蛉蜾臝之祝寧無驪駒狗曲之嘲伏念某學不知方仕未能信呻其佔畢缺師友之淵源著之話言皆童孺之糠粃冒昧登畿之綬追隨筦庫之家甲第梁􅁏之紛紛豈爲我設窮年膏油之兀兀反教人爲敢意成均獲齒紏録居然從國子先生之後何以報王公大人之知伏遇某官該輔天功奮庸人望収歛攻教恐駑馬有十駕之材搜攪流離謂鱒魴皆九罭之選亦旣招諸生而立舘下不嫌養萬鍾而教國中憐其役役之常課以循循之誘某敢不益磨行檢謹飭廉隅孝先晝眠正恐嘲師之無笥昌􅀺晨入詎應詰匠以爲楹除國録謝給舍臺諌􅀘文學掌故之官何心髙位崇京師首善之化乃尾下僚是名清資非有素望躐進金閨之秩仍依璧水之流三省踈庸一何僥冒切以成均合國之子弟爰立之師簡書畏我之友朋必歸之録官曹雖小職任不輕在元祐間則伊川横渠其選至紹聖後則建安􅀛山之流今雖乏人何爲至我伏念某志雖語上材不逮中㓜而學之亦欲垂竹帛之尺寸齒之長矣􅀄未離溝瀆之㝷常甘心此士之江湖絶意真人之官府敢意主文書於几閣又獲陪冠帶於橋門鄭䖍無氊亦懼官長之罵邊韶有笥尙貽弟子之嘲頋敢招諸生以來前亦恃有仁人之在上伏遇某官綱維國論管攝文盟存先覺覺後之心推欲立立人之學雖當靑衿挑闥之後不攺緇衣館粲之誠念聖人之及萬民亦惟養士思君子之有三樂無􅀂育材故宫啇執㸑之桐以規矩登場之木某敢不靖共爾位滌濯其心業精于勤荒于嬉固當檢押學行之上言之次􅀹願琢磨除國録謝􅁑􅀕酒洪掌故無文學之實正覺靦顔首善蓋風化之原猥容䈤尾環顧其中未見可者先逹之士爲之前焉忻然小官之不辤樂在君子之易事切以授業傳道解惑也旣立之師同寅恊恭和􅂨哉必率其属思昔吕正獻長成均之日實舉張横渠居正録之官今兹㝷墜緒之茫茫詎冝用餘子之碌碌阜螽草蟲非得其􅀋奔蜂藿蠋難奏爾庸如某者鹿鹿凡材魚魚末學賦資蹇淺迷髙明廣大之天淵渉丗坎艱多患難賤貧之日月漫焉未能信之仕凄其不足畏之年兹由几閣之文書躐綴橋門之冠帶出羲皇過屈宋猶曰儒術於我何有哉規姚姒逮莊騷尙聞諸生有􅀏于列者况無所挾何恃而前亦惟親大司函丈之間可以習小雅􅀠三之業伏遇某官以􅂄壽俊爲社稷臣天下之逹尊三公難他遜君子之所教五帝曰汝諧資自治治人之凖繩垂先覺覺後之榘彠天之髙也星辰之逺也今幸立弟子之行陽以􅁀之江漢以濯之􅀄何畏官長之罵某敢不尊其瞻視審所歩趍啇財賄之有無計班貲之崇庳遐不謂矣觀道德於前後聽教誨於左右願卒成之除國録回諸州掌故金耀巳愧曠瘝首善璧流誤叨紏録載省吹嘘之自一歸披拂之仁恭惟某官以欲立立人之心推先覺覺後之學黼黻溝中之斷宫啇㸑下之焦致兹一寒之蹤分此獨冷之席某未由面謝先辱手牋有感輪囷無詞稱塞除架閣謝丞相十年出幕迷舊跡於新蹊一氣轉鈞納陳人於故府拔之喧囂倥偬之役賦以棲遲偃仰之間蛻凡骨以漸輕聳危肝而知感切以周九職之任旣重司書唐六典之分巳存掌故至􅀂版曹之籍專之金耀之藏在昔時特曰筦庫之官至聖丗則爲儲材之地栽培拱把備震風凌雨之帡幪追瑑璵璠供方澤圎丘之琮璧豈應庸下偶玷選中伏念某質窳無竒學落不殖少時磊隗尙抱風雲之壯懷中􅀊蹉跎稍除湖海之豪氣漫焉未能信之仕巳是不足畏之年生辰挹斗而揚箕竟失餘而得少奴星結栁而送􅀑柰驅去以復還周行萬里之􅀜山復累一陶之坯冶馬伏轅而蜷局直爲仰秣之謀燕巢幕以差池猥沐捲簾之頋南宫攷藝濫厠使令東閣望塵曽微懇禱忽使接紳緌之武遽令司几閣之文蠅頭牛腰姑備朝廷之遺忘䑕牙雀角僅防吏胥之謾欺白日青春了無公事黄簾緑幕宛是儒生非大鈞妙播物之仁則小人無得輿之理兹蓋伏遇某官經􅀖碩德濟丗元勲􅀼窺堯舜君民之心豈數韋平父子之業寳鼎九廟以衣裳之㑹金城四方於樽爼之前元齡入相二十三年求賢則如一日吉甫薦士三千餘軰流澤蓋在異時頋慙􅀌賤之蹤亦綴収羅之數某敢不温㝷􅀫學討理􅀄心啇財賄計班貲恐􅀌德懋懋官之意厲廉耻行禮義圖報先覺覺後之恩除架閣謝五府臺諌侍從賔氷漕之筵正虞謫滿主地官之庋猥玷恩除有憐鞅掌之勞少佚筋骸之束此大鈎大造待從妙播物之巧然小人有乗器之慚切惟周設司書旣任版圖之職漢立掌故實崇文學之流馴至皇朝率儲清望元豐設庫巳重此官紹興正名益艱其選况三司併歸民曹之後以獨貟專庀金耀之藏英俊聚于闕庭多由此出文書盈于几閣􅀄不爾煩士當利吾器以俟時上亦漑其根而食實詎容瓠落獲預茹連伏念某意廣才踈名浮味薄韓子四十八以後轉􅀒􅀄心栁侯五六從以來無爲朝士矧可憎之面目仍不利於走趨從軍無分寸之功失勢幾千丈之落燕巢于幕固非丹穴之羽毛蛙拘於墟亦豈青􅁳之脚手孰爲之地有隕自天拔之輶軒咨度之餘付以桉牘文書之􅀉開門羅雀得鼷䑕不食之倉充棟汗牛皆鴈鶩所䈤之紙或容暇日稍理陳編此流俗所謂寂寞之濵而愚儒則爲藏修之計伏遇樞密弼諧兵柄參輔政機強本朝以折千里之衝舉明主以建萬丗之䇿綢繆牖户収义􅀒偃植之材絺繡衣裳辨藻火黼黻之色肆令謏聞之士亦入旁招之儲某敢不跧伏寛閑温㝷廢忘歐永叔之辨曲直或得於陳桉之觀魏弱翁之條便冝亦願􅂇故事之奏代陳架閣登謝丞相賛使指於計臺曽微素望主吏文於民部猥玷清流未論分寸之躋攀且遂斗升之饞嚼少安三釜實感一陶惟天朝􅃊法令之藏不遺片紙而地官專版圖之掌又異他曹凡財貨之本末源流與夫家之施舎戒令悉從閣束特設司存故凡守金耀之門多以儲玉班之彦汗牛充棟雖同鴈鶩之生涯待兎守株或綴鴛鸞之歩武欲諧衆口必取譽髦如某者才不瘉人學徒是古﨑嶇一第志其目而中眉奔走四方困於心而衡慮亦念聖賢之所立底湏爵位而後傳彼正巳而不求於人此言何謂然居下而不獲於上吾道難行冒焉爲東閣之趨志在便南陔之養索長安之米衆固揶揄對昆明之荷再逢揺落敢意篤豚魚之信不肯遺蟣蝨之微竟挈陳人俾洿故府雀角䑕牙之案牘善而藏之牛溲馬渤之階梯庶其在此伏遇某官乾坤間氣社稷世臣寸心結人主之知一力任天下之重使宅百揆乆著經􅀖論道之功兹惟三􅀌始膺貳公洪化之􅀉文武萬􅀖而爲憲精神千里而折衝章章巳見於歸疆汲汲不忘於求士殆欲市燕人之駿故先揖越國之蛙知某親老家貧難以待三年之艾憐某身勤事左無使虧一簣之山姑令守几閣之文書庶或備朝廷之遺忘某敢不靖共爾位増益未能芽甲根荄固巳累洪鈞之一氣椳闑扂楔尚希託廣厦之萬間代舒架閣祐除藉田令謝丞相故府抱書安分百僚之厎新畬載耜庀司千畒之間絲綸如拜於王言耕鑿詎忘於帝力頂踵出生成之造肺肝􅀷銘鏤之私􅀼惟周立甸師漢爲田令中古不常於廢置本朝獨厚於􅄖崇端拱親耕猶附九農正之本元祐著令巳班五監簿之前用爲羽儀湏淸流而後􅂌取諸閥閱必素望之巳髙如某者學旣粃糠才尤蕪穢早荒家訓不自䇿力田之科晩藉丗資乃就食代耕之禄一官漫尉再轉􅀒丞㑹逢除吏八百之恩偶玷筦庫七十之數心雖同於白水夢不到於青雲適金耀之虚貟濫角巾而承乏小人属饜而巳旣慙地位之髙大鈞坱北無垠更陟天田之峻束吏文於髙閣習容典於曲臺矧當大享之丁辰聿嚴祼鬯其在先農之乙地正給粢盛使之參保介之間于以聞籩豆之事漸階閨籍可齒朝紳載柞載芟何敢耻有道之榖不稼不穡所愧取無功之禾伏遇某官柱石九筵權衡百辟明堂以序五位遹􅀚四海之㑹同少保兹惟三􅀌實任兩儀之寅亮謂臺閤之儀正湏子弟庶宗廟之器可交神明丕蕆八䆫四逹之儀式講三公五推之典肆令駑鈍猥備駿奔某敢不滌濯其心靖共爾位誕后稷之稼有相當益䖍晨正之司帥甸師之属而耕尚終託天官之造代舒架閤除耤田令謝五府侍從故府綴貟粗謹吏文之守容臺列属叨陞帝藉之司跽綸綍之王言齒簮紳於京秩寵踰望表愧溢情涯惟漢家田令之官實周制甸師之職歷代不常於廢置本朝獨厚於􅄖崇元祐定班蓋在五監簿之上端拱蕆事猶附九農正之中馴至中興始歸宗伯禮樂以俟君子惟寅又欲其惟清籩豆則有司存弗仕則幾於弗問豈圗庸下偶玷選中如某者同前謝丞相啓伏遇某官當丗真儒斯民先覺文武爲萬􅀖之憲精神折千里之衝朝夕輔台有猷必告于我后夙夜基命不戰可屈於人兵方將厚塩梅麯糵之功諒必廣芝木參苓之蓄肆令駑鈍猥效駿奔某敢不欽乃攸司修其可願八政一食勤身敢怠於共齍三公五推拭目尚􅀚於載耜代范文思應鈴謝史丞相試邑三年乏民庸之善狀入京一月玷工尹之異除身未登光範之門夢弗到文石之陛非求而得何德以堪􅀼以半面之異孟嘉非相求於未面一言而得鬷蔑亦幾失於無言次焉湏左右之譽褒否則出公卿之論薦今者絶蚍蜉之援驟而綴鵷鷺之行是爲特逹之知未有報酬之計伏念某一愚自信三仕無庸􅀄隱弓刀不敢學上書之尉継逃麯糵偶叨舉筦庫之家當父母喜懼之年效子男附庸之役取田疇而伍早知有殺之之歌聞弦􅁔之聲晚乃多莞爾之􅀏偶成善罷安有去思身未可以許人仕有時乎爲養巳干小宰題治中別駕之輿敢問大鈞録時文思索之量誰實吹嘘而送上遽􅂪摸索於暗中天生五材古豈容於一闕國有六職今未廢於百工然宫室􅁐囿之無増且律度量衡之巳正惟服食器用間属尚方在梓匠輪輿率多居肆是雖虚轄盍得實材猶泥猶金固豈逃於陶冶不稼不穡果胡取於囷㕓雖衘卵翼肉骨之恩實􅀒血指汗顔之愧兹蓋伏遇某官塩梅家學衮冕丗臣一柱擎天獨扶千萬間之廣厦三槐䕃地詎数十八載之中書毎翕受以敷施務兼収而並蓄惟是其所非非其所是旣杜閉羣枉之門故求者不予予者不求以恢洪志士之氣某敢不仰思識拔誓竭縻􅂢赤水無心詎敢作還珠之語白雲在目願終怜􅀒米之情代衛運幹樸除太社令謝丞相計幕終更方俟通班之命容臺置属遽叨司社之除非鈞播之無垠知㸑餘之必弃㤙淪骨髓感鍥肺肝切惟太祝奉禮之攸司實與正字校書而相埓禮樂自天子出義先郊社之明籩豆則有司存職在典章之習非取簮紳之素望必先閥閱之淸流庶存子諒之心克賛寅清之職詎應庸下遽玷選中伏念某累舉無成􅀌蹤何取三仕庇身於内幕無足䇿名一官主畫於外臺僅知守法惟是日畿之奔走實多風浪之侵陵獨慿卵翼之㤙曲全覊迹盡出齒牙之賜遂足薦章旣可脫離選調之灘便使属饜小人之腹適値糟糠之在褥小稽松菊之迎門除書有隕以自天愧汗滂流而至地身如病鶴詎容陪鵷鷺之行技止黔馿何足玷麒麟之楦此大丞相所謂釆葑之意在小丈夫則懷據蒺之慚摩頂放踵而知㤙糜骨􅂢􅥟而難報伏遇某官棟桴九廟坯冶萬殊少保兹惟三􅀌獨任兩儀之寅亮􅃁宰掌建六典並収四海之賢能惟俊乂冝在於旁招何巧拙亦容於雜進曲念一門之父子甚如異姓之弟兄輔翼之振德之不遺餘力吹嘘是披拂是倍費元功憐某在伯仲之間獨􅀘選階之冗恐某試子男之邑未閑吏道之師必令致曲以有成不忍徑麾之使去天生地育尚難回霜雪之餘嶽峻海􅀷何甞假㳙塵之助受知如此揣分謂何某敢不退省内愆甘求外􅀘成終成始得􅂪亟屏之四方使過使功猶願少殫於一得代董惠州居􅁩除鼔院謝丞相􅀒丞支郡冒分千里之符承命本朝俾典四方之􅁤㤙逾望外愧溢情涯切惟聖王量能授官寧無差擇君子居易俟命惟有靖共傳明戒於鄙夫史大書於巧宦苟睥睨孔鵉之集皆覬覦雞犬之僊材固難全官亦有限牛溲馬渤雖待用於醫師虫臂䑕肝盍􅁳心於造化如某者材真樗散性實􅀥昏科名不􅀘於遺餘塵俗敢辤於抗走楚萍試邑僅逃製錦之傷古栝佐州濫􅀼代庖之譽冒然乗障許以造朝旣得郡於南交漸理裝而西返常鱗凡介之儔匹自分􅅺沙􅀟凫乗鴈之去來何心渤澥頋惟椎鈍乃辱甄収其求士甚士之求公寥寥斯道不即人而人自即我愧愧此恩伏遇某官忠結主知道先民覺大鈞播物惟隨器以剸裁直柄當􅁠肯徇情而俯仰察某乏蟻子之援知某無鴞炙之求特使啞鍾入司路鼔爰鶋聞樂不勝疑駭之情罔象得珠殆匪經營之力某敢不仰承殊渥勉䇿􅀌蹤守虎豹之􅀜無使君門之壅逹豭豚之訟必思民瘼之通代回鄒泉州賀新除應龍夏辟三千參聮弗績冬官六十攝長何庸非帡幪實免其震凌則川薮密藏其汙疾恭惟某官儒者給事王之藎臣海水簸弄明月珠兹亦竒矣曉漏追隨青􅃈闥誰其似之曲爲蟠木之容未許槁梧之瞑然以挂冠之􅀊月居然曵履於星辰恐嘖人言誰侜予羙欲乞骸骨而去更借齒牙之餘某視䕃可驚託根自喜望崦嵫而勿迫漸爲歷吉日之謀驅豊隆以􅀉聲敢致登閬風之祝代回諸路賀新除旅小宰之班􅀷慚乆假渙大昕之號猥遂爲真雖參筆槖之華實懼瓶罍之溢未遑摧謝先辱飛牋鏘然韶鈞杳黙咸池之奏粲􅀂藻火扶持夜燎之光徒􅀷篋衍之藏莫效䄡褕之報代回衆官賀新除攝事貳卿閱時無􅀘􅂪㤙進律滿􅀊爲真曽巽謝之未遑辱謙撝之先及燁然駢麗寵此畸涼牘制有嚴不克視施而爲報􅁭期甚厚惟當永矢以勿諼梅亭先生四六標凖卷之七梅亭先生四六標凖卷之八
