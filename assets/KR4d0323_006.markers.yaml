  - {type: indent, offset: 7, content: 　, id: KR4d0323_krp_006-bkkind3}
  - {type: variant, offset: 8, length: 0, content: '', SBCK: 之歸敢圖分銅獸之符猥使展石􅀛之郡惟和義之僻壌實光廟之潜藩升軍開府獨未沾恩視􅀖選侯率多就近蓋民田􅀊租止五千石而公使年計僅六百緡財匪􅀑輸全仰作鹹之􅃳郡資井養詎堪竭澤之漁比縁花破於皂胥今遂草薙而赤立欲俾㝷常之外頓増十萬之輸數􅅈入池寕保四郊之無擾強弩射市但嗟薄命之先穿上下交征公私可痛弗獲於上不可治矣欲加之罪其無辭乎恭惟某官師保萬民弼亮四丗天欲吾君繼壽皇之聖帝賚我公紹忠定之勳禹以功皐以謨遹全絶德絳之果霍之勇抑又餘収不惟垂紳正笏而措泰山之安且復守志厲操而抗浮雲之節勤勞二紀無寸晷之敢休懇避三公至累年而不受戒謹恐懼之如此熾昌􅂄艾以固然周公仰而思之不迷勤教伊尹聖之任也尤務旁招肆令愚儒來效凋郡尚念某進退維谷兢戰履冰思庶民所以安恐有􅀒十行之賜得一事可自罷庶幾免百謫之盈輙修謝上之緘併控申中之悃太守謝史丞相眉州到任伏以乗榮隱之障方幸終更分通義之符濫叨詳試適值賔賢而觀國又令主試於坤文旣徹􅁄圍遂趨􅀲戍伏念某賦資蹇淺觸事坎艱學術荒卑弗知􅀷造之以道技能譾薄又非適用之謂才出幕十年一登文石奉祠三載半剌武岡曽未滿秩之間倐奉專城之寵跨犍䍧之徼命與􅄷謀求牛羊之芻心勞政拙得以理去不自意全丙穴維舟徑欲歸耕於谷口庚書傳置顧令攺牧於峩眉惟是四蜀之封疆重在三蘇之郷國然好文而慕權􅀔至今餘西漢之風其事守如古君臣近丗異北墉之記比縁兵潰轉覺民流厥旣獻賢能之書甫及理愁恨之嘆伋去誰守猶幸滴博之雲収超願乞歸孰念玉関之人老兹蓋伏遇某官箕裘輔弼祉角君臣精神峻喬嶽之瞻談􅀏回狂瀾之倒大鈞播物實細别於九流直柄當權亦曲成於萬物有念一寒之蹇剥巳成十暑之睽離更以一麾試之再鼔某敢不謹固封守宣布中和前江陵後洪農詎能及}
