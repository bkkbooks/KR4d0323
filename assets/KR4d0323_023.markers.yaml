  - {type: variant, offset: 49, length: 271, content: 成都紀國朝熈寜七年始詔三司鹽鐵判官李杞勾當公事蒲宗閔經畫川蜀買茶充秦國熈河路博馬就除成都府路買茶公事杞于秦川宗閔于成都置司後改名都大提舉茶馬事朝野雜記元豐四年群牧判官郭茂恂又言茶司既不兼買馬遂立法以害馬政乞併茶塲買馬為一司從之茶馬司掌收摘山之利以佐邦國凡市馬于蕃夷以茶易之大觀以來茶馬之政廢川茶不以博馬唯市珠玉故馬政廢缺紹興四年從闗師古之請以乏戰馬始令四川宣撫司支茶博馬七年宰臣趙鼎言得㫖復置茶馬官舊有主管茶馬同提舉茶馬都大提舉茶馬凡三等上曰考其資歴命之乾道川秦買馬之額川司六千秦司五千九百成都利州路十一州産茶二千一百二萬斤茶馬司所収大較如此, SBCK: ''}
