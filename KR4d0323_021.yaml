body:
  text: 四六標準卷二十一宋李劉撰安撫帥守附梁武帝普通五年魏以酈道元為大使鎮撫六鎮大使始此隋文帝開皇九年以楊素為河北安撫大使唐聖厯中狄仁傑為河北道安撫宋不常置自咸平二年以王欽若為四川安撫使梁灝為陜西安撫使安撫使之名始此其後景德三年始置河北沿邊安撫使陜西沿邊諸州亦有安撫使慶厯二年詔置湖南安撫司八年詔置河北四路安撫皇祐四年詔廣桂二州帶經略安撫使熙寧五年罷諸路安撫司宣和三年睦賊猖獗詔杭越州江寧府守臣竝帶安撫使洪州守臣可依江寧府安撫使凡諸路安撫掌總護諸將統制軍旅察治奸宄以肅清一道凡兵民之政皆掌焉率其屬而聽其獄訟頒其禁令定其賞罰稽其錢穀甲械出納之名籍若事難專決則具可否稟奏至于機速邊防及士卒抵罪則聽以便宜裁斷賀衛參政除江西帥涇宋江西路安撫司統郡十一領縣八治南昌新建兩縣宋史寧宗開禧三年十一月以衛涇簽書樞密院事兼參知政事十二月以涇參知政事嘉定元年六月涇罷理宗寶慶元年八月涇薨九重圖任起東府之元勳離騷天之門九重尚書亦惟圖任舊人共政宋執政里第曰東府樞密曰西府嘉祐中孫坦請為兩府治第以便詔召熙寧三年作東西府于掖城之南明年東西府成陳繹東府記云禁衛三帥率有公廨庶官省寺亦各有居而獨大臣不列府舍乃出聖畫新創二府凡八位總千二百楹熙寧四年秋東府四位成詔知制誥臣繹為之記按山謙之丹陽記東府城池則晉簡文帝㑹稽王時第非此東府也十乘申咨撫南昌之故郡滕王閣序南昌故郡洪都新府蔚憩棠之未翦紛騎竹以爭迎四履歡然重臨幸甚竝見前恭惟某官智仁且勇直大而方崑山片玉之挺生天寧無意桓寬鹽鐵論崑山之傍以玉璞抵烏鵲呂氏春秋人不愛崑山之玉江漢之珠而愛巳之蒼璧小璣晉書郤詵傳泰始中詔天下舉賢良直言之士太守文立舉詵應選以對策上第纍遷雍州刺史武帝於東堂會送問詵曰卿自以為何如詵對曰臣舉賢良對策為天下第一猶桂林之一枝崑山之片玉帝笑崑山在今崑山縣一統志晉陸機陸雲生於此時人比之崑山出玉因名梁大同中置縣以山為名衛涇自華亭徙崑之石浦淳熙中舉進士第一故云虎丘一輪之未滿公亦何心記纂淵海虎丘僧上太守詩昨夜虎丘山上望一輪明月照蘇州然敵使之問冦公言行録處士魏野贈冦公詩有無宅起樓臺之句北使至賜宴兩府預坐厯視坐中問誰是無宅起樓臺相公詳見前與兒童之誦君實東坡獨樂園詩兒童誦君實走卒知司馬是關國體難久家居楊惲傳失爵位家居與我處畎畝之中只成歸潔使人得湖山之外盍慰去思韓文人自得於湖山千里之外詳見前宜煩熊旗犀甲之嚴栁文平淮西雅犀甲熊旗威命是荷更借鶴嶺鸞峰之重方鸞勝覽鶴嶺在東在隆興府隆興即今南昌軍民雷動共欣吾父之重來揚雄傳雷動雲合息夫躬傳邊境雷動道路風傳仍喜我公之未老凡自卯至酉之交說杜陵遭田父泥飲美嚴中丞詩語多雖雜亂說尹終在口朝來偶然出自卯將及酉蓋先庚後甲之素孚易蠱元亨利涉大川先甲三日後甲三日巽九五貞吉悔亡無不利無初有終先庚三日後庚三日詳見前善人七年流秋殺春生之惠管子春生于左秋殺于右韓文春生秋殺陽開陰閉楊誠齊詩春生陰殺震江湖長天一色洗星移物換之悲王勃滕王閣詩間雲潭影日悠悠物換星移幾度秋閣中帝子今何在檻外長江空自流按春生秋殺滕王閣記語物換星移滕王閣詩語故以相對昔黃霸之於潁川黃霸傳以賢良髙第揚州刺史霸為潁州太守治為天下第一徴守京兆尹坐乏軍興貶秩有詔歸潁川太守官治如其前前後八年郡中愈治及馬總之於鄆鎮新唐書馬總字㑹元李師道平析鄆曹濮等為一道除總節度賜號天平軍長慶初劉總上幽鎮地召總徙天平而召總還將大用會劉總卒穆宗以鄆人附賴總復詔還鎮雖云再涖詎足竝言蓋申命宅南之咨尚書申命羲叔宅南交乃歸公于東之漸魁台齊色益足光斗牛之墟律厯志魁于六星兩兩而比者曰三台三台色齊君臣和王勃滕王閣序龍光射斗牛之墟霖雨思賢會即騎箕尾而上杜詩霖雨思賢佐丹青憶老臣莊子傅說得之以相武丁奄有天下乘東維騎箕尾比于列星注東維箕斗間天漢津東維星經曰一星在尾上言其乘東維騎于箕尾之間傅說死其精神乘東維託龍尾乃列宿今尾上有傅說星晉天文志傅說一星在尾後某一違材館西京雜記平津侯營客館以招天下賢才其次曰翹材館以待大材任九卿將軍二千石者處之四候觀臺左傳日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也服氏曰天子曰靈臺諸矦曰觀臺在明堂之中晉天文志明堂西二百里曰靈臺觀臺也主觀雲物察符瑞候災變造舟為梁鬢已蓬於灧澦詩造舟為梁不顯其光注比其舟而渡曰造舟中央左右相維持曰維舟併兩舟曰方舟一舟曰特舟造舟者比船于水加板其上即今之浮橋故杜預云造舟為梁則河橋之謂也杜詩路經灧澦雙蓬鬢天入滄浪一釣舟荷戈與役骨幾藁於褒斜杜詩深梗無安地銜枚有荷戈難爭汗馬之功蕭何傳未有汗馬之勞徑反屠羊之肆莊子願復反吾屠羊之肆詳見前忽聞悅禮樂之有帥見前喜至捲詩書而欲狂杜詩却看妻子愁何在漫卷詩書喜欲狂偶見苦於小兒新唐書杜審言傳審言病甚宋之問武平一等省候何如答曰甚為造化小兒相苦尚何言然吾在久壓公等今且死固大慰未得詣於大府韓文詣一府受約束詳見前下榻而延孺子詎敢希舊物之收方輿勝覽徐稚字孺子南昌人陳蕃為守不接賔客惟禮孺子特設一榻孺子去則懸之蘇子由過豫章詩白屋可能無孺子黃堂不是缺陳蕃古人冷淡今人笑湖水年年剩舊㾗踵門而告文公惟當致新氓之敬賀任樞密除福建帥希夷宋福建路安撫司統郡八領縣十二治閩候官兩縣元老得閒詩方叔元老注元大也五官之長出于諸矦曰天子之老價藩出牧杜詩人到于今歌出牧道古今而譽盛德既將相之兼資韓文才畯滿前道古今而譽盛德入耳而不煩王圭傳兼資文武出將入相吾不如李靖至將相而歸故鄉在古今而有幾歐陽公晝錦堂記仕宦而至將相富貴而歸故鄉此人情之所榮而古今之所同也遹觀全德足立懦夫恭惟某官輔世真儒爽邦良弼尚書爽邦舊哲又夢帝賚豫良弼春風沂水夙卑游夏之淵源董仲舒傳贊仲舒潛心大業為羣儒首然考其師友淵源所漸猶未及呼游夏界雪岷山更陋卿雲之河漢杜詩雪嶺界天白廣絶交論舒向金玉淵海卿雲黼黻河漢早克勤于小物尚書惟公懋德克勤小物晚服在于大僚尚書夏迪簡在王庭有服在百僚非仁義莫陳於前有謀猷乃順于外竝見前雖風霆不顯流形之迹禮記風霆流行庶物露生然天地能知體國之心用兵數年拓地萬里杜篤傳拓地萬里威振八荒南史徐羡之傳今二方已平拓地萬里唯有小羌未定疇若豫采方當顓面以正槐尚書疇咨若豫采李尋傳各顓面正朝周禮面三槐三公位焉民具爾瞻胡遽剖符而分竹杜詩剖符來蜀道又幾分漢庭竹拂衣勇甚范丹傳便起告違拂衣而去楊彪傳孔融魯國男子明日便當拂衣而去羊祜傳衍拂衣而起郤超傳性好聞人棲遁有能辭榮拂衣者超為之起屋宇作器服畜僕豎費百金而不吝南史王僧䖍傳彼若見惡當拂衣去耳謝朓傳斂跡康衢拂衣林沚又拂衣東山眇絶塵軌又建武之世拂衣止足梁書何㸃傳弱冠拂衣華首一操謝靈運詩髙楫九州外拂衣五湖裏東坡詩賢哉仲氏早拂衣占斷此山長洗耳又拂衣自注下下考芋魁飯豆吾豈無懷綬欣然朱買臣傳買臣衣故衣懷其印綬步歸郡邸問之往來皆云昔病而今愈決於去就足窺衆醉而獨醒為之兆兆足行奠而發發必中法言修身以為弓立義以為的奠而後發發必中注奠定也全閩鄉部說文閩東南越周禮職方氏七閩注閩蠻之别也國語閩芊蠻也叔熊避難於濮蠻隨其俗如蠻人從子從分為七種故曰七閩周禮注疏八蠻在南方閩其别也地理沿革表越王無疆為楚所滅子孫分散或居閩地其後無諸搖遂有閩粵祕殿政塗尋某丘童子之釣遊昌黎送楊少尹序今之歸指某樹曰某樹吾先人之所種也某水某丘吾童子時所釣遊也互見前聽去時兒女之笳鼓曹景宗時去時兒女悲歸來笳鼓競詳見上卷所貴於天下士者動靜不失其光明史記魯仲連傳所謂貴於天下之士者為人排患釋難解紛亂而無取也易時行則行時止則止動靜不失其時其道光明豈不誠大丈夫哉進退一歸於禮義不負所學竝見前是在我公林下有人少伴越地禽魚之樂僧靈徹詩逄人盡說休官去林下何曽見一人韓文閩越地肥衍有山泉禽魚之樂橘中未老尚見商山鴻鵠之飛王貢兩龔鮑傳序漢興有東園公綺里季夏黃公甪里先生此四人者當秦之世避而入商雒深山張良傳四人者從太子年皆八十上怪問曰何為者四人各言其姓名上召戚夫人指視曰我欲易之彼四人為之輔羽翼已成難動矣乃歌曰鴻鵠髙飛一舉千里羽翼已就橫絶四海餘見前某夙纍公知敬為國賀江空而歲年晚載歌百年幾見之詩陳後山送蘇公知杭州詩一代不數人百年能幾見又風帆目力短江空嵗年晚水煩而鱗介勞更致列城一陶之請禮記土敝則草木不長水煩則魚鱉不大山谷詩土敝禾黍惡水煩鱗介勞崔駰達㫖壞冶一陶代曹安撫賀衛參帥涇宋湖南路安撫司統郡十領縣十二治長沙善化疇咨舊弼出牧價藩見前泰階六符下照星沙之地晉天文志長沙一星在軫之中主壽命明則主壽長子孫昌郡以星得名闞駰十三州記云西自湘江至東萊萬里故曰長沙餘見前元戎十乘大開天柱之雲一統志天柱峯在衡山形如雙柱聳拔西北有香岡石室自回雁至仙人七峯任衡陽縣界自祝融至天柱五峯及巾子金簡降真芙蓉等五十五峯俱在衡山縣境其吐霧碧岫屏嶂日華嶽麓則在長沙縣界共為七十二峯紫蓋雲密石廩天柱四峯皆去衡山縣三十里韓文公謁衡嶽廟詩我來正逄秋雨節陰氣晦昧無清風潛心默禱若有應豈非正直能感通須㬰靜掃衆峯出仰見突兀撐青空紫蓋連延接天柱石廩騰擲堆祝融前茅甫臨全楚􅔄豫恭惟某官𢎞深而肅括明允而篤誠魁下三台付榮進於素定竝見前胸中五色補造化而不言山谷詩公有胸中五色線平生補衮用功深杜牧詩平生五色線願補舜衣裳由兩地以養恬莊子古之治道者以恬養知生而無以知為也謂之以知養恬注恬靜而後知不蕩知不蕩而性不失也夫無以知為而任其自知則雖知周萬物而恬然自得也為二天而出守辰猷定命聫漢殿以通班詩訏謨定命逺猷辰告甲令著忠盡衡山而賜履吳芮傳秦時番陽令也髙祖以芮將梅鋗偕攻析酈芮率百越佐諸矦從入關故立芮為衡山王都邾薨諡曰文王初文王芮髙祖賢之制詔御史王忠其定著令注漢約非劉氏不王而芮王故著令中使特王也贊曰吳芮之起不失正道故能傳號五世慶流支庶有以矣夫著于甲令而稱忠也師古曰甲者令篇之次也左傳賜我先君履玉麟欣合竹馬歡迎見前令湘安流屈原九歌令沅湘兮無波使江水兮安流使嶽修貢班固寶鼎詩嶽修貢兮川效珍政平訟理而無愁歎聊寬南顧之宵衣李德裕傳敬宗聽朝簡忽德裕上丹扆六針一曰宵衣諷視朝希晚也白氏長慶集舜外叙百揆內勤萬機旰食宵衣念其不息之道國小地狹不足回旋即徯東歸之晝錦某濫揚前粃幸及戍瓜竝見前以望君如歲之心願言叱馭左傳國人望君如望歲焉餘見前然用汝作霖之命猶恐追鋒晉書輿服志追鋒車去小平蓋加通幰如軺車駕二追鋒之名蓋取其迅速也施於戎陳之間是為傳乘傅暢晉諸公贊髙貴鄉公常與司馬望王沈裴秀鍾會等講宴於東堂並屬文論帝性急請召欲速秀等在內職到得及時以望在外特給追鋒車虎賁卒五人每有集㑹望輒奔馳而至賀廣西管漕湛除靜江帥代衛參帥作宋廣西路安撫司統郡二十五治靜江府即今㑹城寓班東觀華嶠後漢書學者稱東觀為老氏藏室道家蓬萊山通典後漢圖書在東觀桓帝始置祕書監一人掌典圖書古今文字崔援東觀針洋洋東觀古之史官三墳五典靡義不貫華嶠謝祕書監表劉向父子世典史籍馬融博通三入東觀宅牧南交一道熟於馳驅不勤易地五管資其節制何止觀風舊唐書地理志嶺南東道節度使治廣州管廣韶循梅恩春賀朝端藤康封龍髙義新勤竇等州嶺南西道桂管經略觀察使治桂州管桂韶蒙富梧潯龔鬱林平琴賔澄繡象郴融等州雍管經略使治雍州管桂黨橫田嚴山立羅潘等州容管經略使治容州管容辨白牢欽巖禺湯瀼古等州安南都護節度使治安南府管交武峩川粵芝愛田福祿川長峯陸亷雷籠環崖儋振瓊萬安等州恭惟某官器諝浚明風猷凝劭自望郎而襆被進退可觀元微之行韋審規父漸制嘉乃令子為吾望郎李商隱詩望郎臨古郡東坡詩東川得望郎魏舒傳選浚儀令入為尚書郎時欲沙汰郎官非其才者罷之舒曰吾即其人也被襆而出同寮素無清論者咸有愧色談者稱之由膚使而褰帷光華益逺法言雖古之膚使其猶劣諸注膚美也後漢書賈琮字孟堅為冀州刺史舊典傳車驂駕垂赤帷裳迎於出界及琮之部升車言曰刺史當逺視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震詩序送之以禮樂言逺而有光華也詳見前尋領將輸之寄益髙澄按之功帝謀帥之惟難公撫封而少駐常衮集撫其四封率彼五長英英桂林之伯願懋膚公韓詩英英桂林伯實惟文武特詩以奏膚公注公功也渺渺洞庭之波尚資餘潤屈原九歌帝子降兮北渚目渺渺兮愁豫嫋嫋兮秋風洞庭波兮木葉下郭伋傳賢能太守去帝城不逺河潤九里冀京師并蒙福也某濫承嘉惠賈誼傳恭承嘉惠兮俟罪長沙師古曰嘉惠謂詔命也竊倚德鄰湘水安流正藉戈船之重屈原九歌令沅湘兮無波使江水兮安流武帝紀歸義越侯嚴為戈船將軍出零陵下離水張晏曰越人於水中負人船又有蛟龍之害故置戈於船下因以為名也臣瓚曰伍子胥書有戈船以載干戈因謂之戈船也夜郎為徼敢忘銅柱之威西南夷傳南夷君長以十數夜郎為大夜郎者臨牂牁江漢平南夷夜郎遂入朝上以為夜郎王一統志漢馬援既平交趾立銅柱為漢界相傳在欽州古森洞上有援誓云銅柱折交人滅安南人每過其下以一石培之遂成丘陵唐馬揔為安南都護夷獠為建二銅柱於伏波之處以明揔為伏波之裔日南郡西有西屠夷國援嘗經其地亦植二銅柱表漢界俱未詳所在賀夔路徐安撫除瀘帥瑄宋潼川府路安撫司統郡十五領縣三治瀘州西瀼奏功瀼音乃朗切楚俗以山谷間水可涉為瀼水經注瀼東瀼西水兩旁之名也方輿勝覽大瀼水在奉節縣䕫州城以宋景德二年遷瀼西唐元結家瀼濵杜詩瀼東瀼西一萬家江南江北春冬花又瞿唐春欲至定卜瀼西居東川徙鎮梓州為東川成都為西川占一星之入蜀謂合遄歸見前不五月而渡瀘却疑深入蜀志五月渡瀘深入不毛地理志瀘惟水出牂牁郡句町縣方輿勝覽瀘江在州城東一名汶江源自岷山流入合江縣界州因以名李􅌫西山堂記郡得名為瀘者蓋始因梁大同中嘗徙治馬湖江口置瀘州蓋馬湖即瀘水下流因逺取瀘水以名州賢勞何憚聖眷惟深恭惟某官胸湛明冰膽韜古劔意匠淡經營之表凡馬皆空才刃游肯綮之間全牛立解竝見前入朝屬爾霍光傳將軍之廣明都郎屬爾師古曰屬爾近爾也乞郡翻然漢水為池民無愁歎左傳楚國方城以為城漢水以為池雖衆無所用之巫山猶錦使有光華巫山在巫山縣圖經云此山當抗峰岷峨偕嶺衡嶽凝結翼附竝出青雲有十二峰曰望霞翠屏朝雲松巒集仙聚鶴淨壇上升起雲飛鳳登龍聖泉沿峽首尾一百六十里雲出無心且聊爾陽臺之下歸去來辭雲無心而出岫宋玉髙唐賦妾在巫山之陽髙丘之岨旦為朝雲暮為行雨朝朝暮暮陽臺之下方輿勝覽陽雲臺在巫山縣西北五十步南枕大江髙一百二十丈春行有腳又移之僰道之間司馬相如傳略通夜郎僰中師古曰夜郎僰中皆西南夷也僰蒲北反西南夷傳以夜郎為犍為郡發巴蜀卒治道自僰道指牂牁江瀘州鎮逺樓記瀘州東接巴渝西連僰道南望夜郎牂牁若時江陽方輿勝覽瀘州春秋戰國為巴子國秦屬巴郡漢武帝分置犍為郡而犍為之江陽符縣即今之州城是也東漢末劉璋立為江陽郡晉寄治武陽穆帝置東江陽郡宋齊因之實雄益部地隆望重視古元矦李􅌫瀘州西山堂記乾道升領劒南一道十五州權任益重民俗恬熙為今道院山谷江西道院賦武陵栁矦守筠之明年樂其俗之美使為政者不勤乃新燕居之堂榜曰江西道院以鼓舞其國風然天大地大自足著鵾鵬之游老子道大天大地大王亦大域中有四大莊子北冥有魚其名為鵾鵾之大不知其幾千里也化而為鳥其名為鵬鵬之背不知其幾千里也何月更歲更獨不出魚鳬之國昭帝紀注更有三品有卒更有踐更有過更古者正卒無常人皆當迭為之一月一更是為卒更貧者欲得顧更錢者次直者出錢顧之月二千是為踐更也天下之人皆直戍邊三日亦名為更律所謂繇戍也雖丞相子亦與戍邊之調不可人人自行三日戍又行者當自戍三日不可往便還因使住一嵗一更諸不行者出錢三百入官官以結戍者是謂過更也揚雄蜀王本紀蜀之先稱王者有蠶叢柏灌魚鳬開明是時椎髻左衽不曉文字未有禮樂從開明已上至蠶叢凡四千嵗殆欲紓憂於西顧冦恂傳髙祖任蕭何於關中無復西願之憂即觀錫命以東歸易王三錫命詩我東曰歸某越在師行無由旅賀師旅卦名轅下甚安於局促灌夫傳局趣效轅下駒應劭曰駒者駕著轅下局促䠞小之貌狹中敢纍於提檠韓文石鼎聫句陋質荷斟酌狹中愧提檠不進不休聞又綴鶚書之末荀朂傳帝嘗謂曰魏武帝言荀文若之進善不進不止荀公達之退惡不退不休二令君之美亦望于君也載饑載渴但願從魚服之歸詩憂心烈烈載饑載渴又象弭魚服詩序采薇遣役戍也注烈烈憂貌則饑則渴言其苦也其弓以象骨為之弭其矢以魚皮為服弭弓弰之名魚服魚獸之皮魚獸似猪東海有之庶因青簾白舫之回舫甫妄切爾雅舟也注云竝兩船增韻方舟也杜詩青簾白舫益州來巫峽秋濤天地回注劉濬自益州歸荆渚白舫百棹皆繡帆青簾多載妓女峽人呼為天上樓船一見紅斾碧油而去斾蒲蓋切說文繼旐之旗沛然而垂石林燕語節度使旗則綢以紅繒節及麾槍則綢以碧油故謂之碧油紅斾白樂天詩紅斾將軍昨日歸又碧油幢引向東川方干詩問津求拜碧油幢歐陽詹詩十萬兵樞擁碧油賀徐漕除東路安撫瑄宋利州東路安撫司統郡十領縣五治南鄭即今陜西漢中府升班延閣藝文志注內則有延閣廣內祕室之府就領價藩耀東壁之圖書光於列宿竝見前控西陵之門戶專在三巴一統志西陵峽在夷陵西北二十五里峽長二十里層崖萬仞三峽之一也元和志郡城陸抗所築吳改西陵以為重鎮楊炯西陵峽詩絶壁聳萬仞長波射千里盤薄荆之門滔滔南國紀杜詩疏鑿控三巴華陽國志三巴巴郡今重慶府巴東今䕫州巴西今合州無改舍易轍之勞有珥節建牙之寵屈原離騷經吾令羲和珥節兮望崦嵫而勿迫通作彌李廣傳彌節白檀注彌少安之貌相如賦餌節徘徊揚雄傳靡節竝與珥同兵書牙旗者將軍之精凡豎牙必以剛日魏志初平中張邈舉義典韋為士屬司馬趙寵牙門長大人莫能勝韋一手建之後漢滕輔祭牙文敬建髙牙神武攸託晉袁宏祭牙文敢建髙牙烈烈桓桓用賢如此通國歡然恭惟某官得天委和莊子生非汝有是天地之委和也性命非汝有是天地之委順也孫子非汝有是天地之委蛻也與月爭皎皎吉了切說文月之白也詩月出皎兮一時歐范共推無黨之雄文宋徐無黨字師錫皇祐間進士仕至郡博士歐陽修送無黨序云東陽徐生少從豫學為文既去而與羣士試于禮部得髙第由是知名其文辭日進如水涌而山出所著有五代史注王荆公見無黨五代史序曰釋迦佛頭上不堪著糞千載于張終愧有功之隂德新唐書徐有功傳鹿城主簿潘好禮慕有功為人論之曰昔稱張釋之為廷尉天下無寃人今有功斷獄亦天下無寃人然釋之當漢文帝時中外無事守法而已唐革命之際周興來俊臣等掩義隱賊崇飾惡言以誣盛德有功守死明道此其賢於釋之明甚或稱有功仁恕過漢于張起居舍人盧若虛曰徐公當雷霆之震而能全仁恕雖千載未見其比甫更再轉亟取一麾化行江漢之未幾詩序漢廣德廣所及也文王之道被于南國美化行乎江漢之域名震京師而難掩法言谷口鄭子真不詘其志耕于巖石之下名震于京師周爰咨度詩載馳載驅周爰咨度注忠信為周爰於也訪問于善為咨禮義所宜為度大夫出使見忠信之賢人則於是訪問禮義所宜遠有光華白帝城髙符節久煩於兼領元和志䕫州白帝山即州城所據與赤甲山相接初公孫述殿前井有白龍因號白帝杜詩伏枕雲安縣遷居白帝城又嵯峨白帝城東西南有龍湫北虎溪又絶塞烏蠻北孤城白帝邊又白帝城中雲出門白帝城南雨翻盆又白帝城樓詩江度寒山閣城髙絶塞樓烏孫國亂藩籬有貴於預防西域傳烏孫國大昆彌治赤谷城過秦論築長城而守藩籬宋史寧宗嘉泰三年冬金國多難始開邊釁嘉定四年六月遣余嶸賀金主生辰金國有難不至而還六年十月遣真德秀賀金主即位金國亂不至而還就煩使指之膚司馬相如傳宣其使指令百姓皆知天子意法言古之膚使專總帥連之重禮記十國以為連連有帥肆加內祕益壯中權見前不十日至長安漸試魏延之策魏略夏矦楙鎮長安武矦與羣下計議魏延曰楙少主壻也怯而無謀今假延精兵五千負糧五千直從褎中出循秦嶺而東當子午而北不過十日可到長安公從斜谷來必足以達如此則一舉而咸陽以西可定矣命一將向宛洛將圖諸葛之功蜀志諸葛武矦謂先主曰天下有變則命一上將將荆州之軍以向宛洛將軍身率益州之衆以出秦川百姓孰敢不簞食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善諒飽巖排峽束之詩杜陵䕫府詠懷詩峽束滄江起巖排石樹圓拂雲霾楚氣何處覔平川合勒地闢天開之頌元結大唐中興頌地闢天開蠲除妖災瑞慶大來某絶無操挾獨辱知憐頃徒據地以承顏雋不疑傳不疑據地曰竊伏海瀕聞暴公子威名舊矣今乃承顔接辭聞亦為天而啓齒山谷詩佳人何時來為天啓玉齒實不知師德之薦新唐書婁師德傳狄仁傑未輔政師德薦之及同列數擠令外武后覺問仁傑曰師德知人乎對曰臣嘗同寮未聞其知人也后曰朕用卿師德薦也出其奏仁傑慙已而歎曰婁公盛德我為所容乃不知遂有缺君房之書嚴光傳司徒侯霸與光素舊遣使奉書皇甫諡髙士傳霸使西曹屬侯子道奉書光讀訖問子道曰君房素癡今為三公寧小差否子道曰位已鼎足不癡也光曰遣卿來何言子道傳霸言光曰卿言不癡是非癡語耶諒姑克賦於公車鼂錯傳以臣錯克賦注云如賦調也豈欲收恩於私室羊祜傳拜爵公朝謝恩私門吾所不取待李生者何道寧當求益於速成韓文贈李君房别今之從事於彼也吾為南陽公愛之又未知人之舉李生于彼者何辭彼之所以待李生者何道又答李翊書李生足下生之書辭甚髙而其問何下而恭也能如是誰不欲告生以其道又將蘄至於古之立言者則無望其速成知徐公之有常定不昨取而今捨魏志徐邈傳盧欽著書稱邈曰世人無常而徐公有常詳見前通湖南安撫曾參政從龍任武岡倅作宋湖南路安撫司統郡十領縣十二治長沙善化曾從龍傳以參知政事提舉洞霄宫起知建寧府丁內艱服除為湖南安撫使安撫洞獠威惠竝行興學養士湘人紀之石望魁台之下久隔師門天文志魁下六星兩兩而比者曰三能注能音台趨翼軫之旁今依帥閫晉天文志自張十七度至軫十一度為鶉尾於辰在已為楚之分野屬荆州一統志禹貢荆州之域天文翼軫分野軫旁有小星曰長沙互見前肅馳函於籖府嗣斂板於轅門唐㑹要笏周制也晉宋謂之手板近代惟尚書執笏公卿但以手板梁書到溉傳溉斂板謝詳見前項籍傳羽見諸矦將入轅門張晏曰軍行以車為陳轅相向為門師古曰周禮軍舍王行則故車宫轅門也恭惟某官氣擊扶搖莊子水擊三千里搏扶搖而上者九萬里注扶搖風名上行風謂之扶搖爾雅扶搖謂之飈郭璞注暴風從下上也胸藏磅礴韻㑹磅礴混同也莊子磅礴萬物太𤣥經中首昆侖旁礴幽通作薄揚雄傳旁薄羣生亦作魄司馬相如傳旁魄四塞學粹然而出正新唐書韓愈傳贊當其所得粹然一出於正刋落陳言橫騖别驅汪洋大肆要之無抵牾聖人者文卓爾以不羣榮進負素定之科曽從龍傳初名一龍慶元五年擢進士第一始賜今名溫飽非平生之志見前蓋中興狀頭之盛三十有三髙宗朝李易張九成汪應辰黃中度陳誠之劉章王佐趙逵張孝祥王十朋梁克家孝宗朝木待問蕭國梁鄭僑黃定詹騤姚穎黃由衛涇王容光宗朝余復陳亮寧宗朝鄒應龍曾從龍傅行簡毛自知鄭自誠趙建大袁甫吳潛劉渭蔣重珍理宗朝王㑹龍共三十三人自大節終身而觀幾年無幾獨凜凜梅溪之氣槩王十朋傳十朋字龜齡溫州樂清人資穎悟日誦數千言及長有文行聚徒梅溪受業者以百數秦檜死上親策士十朋以權為對幾萬餘言上嘉其經學淹通議論醇正遂擢為第一詔十朋乃朕親擢授紹興府簽判學者傳誦其策以擬古朝董厯官龍圖學士諡文忠十朋以諸葛亮顔真卿冦準范仲淹韓琦唐介自比朱熹張栻雅敬之與英英無垢之風標張九成傳九成字子韶自開封徙居錢塘從楊時學紹興二年上將策士詔考官直言者置髙等九成首選楊時遺九成書曰廷對自中興以來未之有非剛大之氣不為得喪屈不能為也授鎮東軍簽判以忤秦檜以權刑部侍郎謫知邵州先是徑山僧宗杲善談禪理九成往來其間檜恐其議已誣以謗訕朝政謫居南安軍十四年檜死起知溫州丐祠歸卒寶慶初特贈太師封崇國公諡文忠無垢其自號也南史栁憕傳風標才氣恐不能為少主臣任昉進封衡陽王詔風標秀特器體淹𢎞民鮮舉之公其人也平當傳則周公其人也魏志曹公令曰夫受九錫廣闢土宇周公其人也不然既登兩地之峻何至弗能一日之安曽從龍傳進端明殿學士簽書樞密院太子賔客改參知政事疾胡矩憸壬排阻正論陳其罪矩嗾言者劾罷以前職提舉洞霄宫舂容東海之濵舂式容切禮記持其從容然後盡其聲注從讀如富父舂戈之舂舂容謂重撞擊也正義曰舂謂擊也以為聲之形容言鐘之為體必待其擊每一舂而為一容然後盡其聲左傳富父終甥以戈摏長狄㗋而殺之殫盡南陔之孝子夏詩序南陔廢則孝友闕矣言南者南方養萬物此以戒養故取之為名也陔隴也束晳補亡詩南陔孝子相戒以養也詩云循彼南陔言採其蘭眷戀庭闈心不遑安曽從龍傳從龍提舉洞霄宫起知建寧府丁內艱三年過隙謂當宣文德之麻見前十乘啓行顧使分武安之竹潭州漢長沙國唐景福中改武安軍節度宋降為防禦使復為武安節度升為帥府洞庭九州之大詎止價藩昌黎嶽陽樓詩洞庭九州間厥大誰與讓南匯羣崖水比注何奔放詩價人維藩詳見前衡山千里而遙是為嶽牧王制自江至于衡山千里而遙疏以千里言其地稍逺不啻千里韓詩衡山千里平勝地猶在險况當江濶處斗起藝匪漸暫借傅巖之雨略行湘水之春杜詩夜醉長沙酒曉行湘水春岸花飛送客檣燕語留人無回旋不足之疑見前見坱圠無垠之大賈誼傳坱圠無垠注其氣坱圠非有限齊也對半夜之問亟遄宣室之歸見前反九章之騷即報修門之入揚雄傳怪屈原文過相如至不容作離騷自投江而死悲其文讀之未嘗不流涕也乃作書往往托離騷之文而反之自岫山投諸江流以弔屈原名曰反離騷宋玉招魂入修門些栁詩南來不作楚臣悲重入修門自有期惟公懋德相我受民某甘以迂愚老於廢棄誨諸生於館下以冗見治試别駕之治中無材可展竝見前然都梁之斗壘都梁謂武岡詳見前固全楚之井疆自昔無螃蟹之鄉詎容置倅倅音翠說文副也又副車曰倅車周禮戎僕掌王倅車之政餘見前比年更虺蜮之警浪轉為丞茲載欣而載奔幸受容而受察門生不知恩非人也竊自憐栁子之窮竝見前相國求豫文知我哉何敢學韓公之傲韓文釋言有來謂愈者曰子獻相國詩書乎曰然曰有為讒於相國之座者曰韓愈曰相國徴豫文豫不敢匿相國豈知我哉餘見前通興元楊安撫九鼎任武岡倅宋史寧宗嘉定十二年夏四月張福入利州四川置制使聶子述遁殺總領財賦禓九鼎鶴林玉露九鼎在蜀以刻剝致諸軍之怨軍士莫簡倡亂殺九鼎剖其腹實以金銀曰使其貪腹飽飫時安丙家居散財結士生擒莫簡剖心以祭九鼎按宋史張威捕賊衆一千三百餘人誅之莫簡自殺與此不同隨帥幕於西滇濫綴賔僚之末滇多年切說文益州地名史記滇池水原廣末更挾以倒流故曰滇池故滇王國西南夷傳南夷君長以十數夜郎最大其西靡莫之屬以十數滇最大滇池方三百里師古曰地理志益州滇池縣其澤在西北武帝紀注西南夷昆明國有滇池漢欲伐之故作昆明池以象之又滇陽縣名地理志在汝南望將壇於南鄭遙依節制之尊一統志拜將臺在今漢中府城內西南漢髙祖拜韓信為大將處遺址尚存宋張少愚詩漢用亡臣策登壇授鉞時須知數仞土曽立太平基南鄭本周褒國之附庸周衰鄭桓公殁於犬戎其民南奔居此因曰南鄭秦厲公城其地漢為南鄭縣東漢置漢中郡始治此西魏改光義縣隋復為南鄭宋利州東路安撫司治南鄭縣姓名難摸於暗中見前箋記盍馳於麾下麾旗屬周禮建大麾以田或作戲項籍傳戲下師古曰戲大將之旗韓信傳兩將之頭可致戲下伏念某嶔﨑半世拓落一官竝見前口耳止數寸之間淺哉學問荀子小人之學也入乎口出乎耳口耳之間則四寸耳曷足以美七尺之軀哉頭顱入四十之後荒矣功名亦欲守山澤之癯俱見前又恐俱草木之腐朱穆傳彼與草木俱朽此與金石相傾新唐書髙士亷竇威傳贊古來賢豪不遭興運埋光鏟采與草木俱腐者可勝咤哉東坡淮陰矦廟碑亦有此語昨獻公車之牘謾投光範之書大鈞坱圠而無垠曷嘗遐棄竝見前小枝卷曲而不中自欲卷懷莊子其小枝卷曲而不中規矩注卷本又作拳同音權適為文翁留重剖之符杜詩得歸茅屋赴成都真為文翁再剖符復令王陽叱九折之馭見前沐浴而戒行李極知見笑於大方昌黎送石處士序宵則沐浴戒行事載書冊問道所由餘見前蹉跎而效小忠亦欲少酬於知己杜詩束縳酬知己蹉跎效小忠詳見前然乏蚍蜉蟻子之援而落魚鳬蠶叢之邦繞樹凄然竝見前託根何所宋璟梅花賦序嗚呼斯梅託根非其所山谷詩託根桃李場恭惟某官肝膽一劒精神五兵見前攬轡登車湘水詠楊憑之德韓文常侍楊公領湖之南壤地二千里德刑之政竝勤爵祿之報兩崇乃能存志乎詩書寓辭乎詠歌從事與部屬之吏屬而和之輕裘緩帶峴山登叔子之名既思鱠以歸吳忽乘軺而諭蜀竝見前天旋夔峽良費馳驅杜詩天旋䕫子峽春近嶽陽樓地重秦關徑煩彈壓李詩回鞭指長安西日落秦關况是四郊之多壘尤須千里以折衝見前遠其慮以圖非常之功司馬相如傳有非常之事然後有非常之功積其力以俟可乘之隙公固有辭於世世寧無望於公惟無敵知儒者之真則可大皆賢人之業竝見前尚念某藐無操挾全蹈踈庸仰天漢之云高相國方追於國士蕭何傳語曰天漢其稱甚美注流俗語云天漢其言常以天配漢此美名也髙帝紀漢王既至南鄭韓信為治粟都尉亡去蕭何追還之因薦於漢王漢王齊戒設壇場拜信為大將軍今南鄭有拜將壇是也思月湖之所與中郎或識其典刑月湖何異別號宋史有傳詳見前蔡雍傳初平元年拜左中郎將從獻帝遷都長安封高陽鄉矦孔融傳與蔡雍素善雍卒後有虎賁士貌類於雍融每酒酣引與同坐曰雖無老成人且有典刑通湖南曹安撫彥約宋史曹彥約字簡甫都昌人淳熙八年進士嘗從朱熹講學厯建平尉桂陽司録辰溪令知樂平縣主管江西安撫司機宜文字攝漢陽守金人大入彥約追擊金人大敗去以守禦功進秩二等就知漢陽尋提舉湖北常平權知鄂州兼湖廣總領改提㸃刑獄遷湖南轉運判官遷直祕閣知潭州湖南安撫以華文閣學士轉通議大夫致仕贈宣奉大夫嘉熙初賜諡文簡寧宗紀嘉定三年三月以湖南轉運判官曹彥約知潭州督捕峒冦六月彥約與李元礪戰為所敗賊勢愈熾詳啓意簿寧鄉時作截江而屹廬山仰髙有日方輿勝覽廬山在南康城北十五里周武王時有匡俗兄弟七人皆有道術結廬於此山中仙去廬在故曰廬山歐陽公廬山髙詩廬山髙哉幾千仭兮根盤幾百里截然屹立乎長江長江西南走其下趙一傳仰髙希驥厯年滋多披雲而覩衡嶽拜下可期昌黎謁衡嶽詩森然魄動下馬拜松柏一徑趨靈宫藐然縣吏之抗塵北山移文抗塵容走俗狀昉此帥連之𨽻役昉音倣始也公羊傳昉於此乎注昉適也齊人語事有稽於故實文選吳質箋賦事行刑資于故實書足達其姓名項籍傳書足記姓名而已敢以畸凉說文畸殘田通作竒不耦也亦作倚莊子南方有倚人焉荀子倚魁之行注倚讀竒偶之竒方言秦晉之間凡物體全而不具者謂之倚說文凉薄也左傳作法於凉又虢多凉德􅞽之偶儷恭惟某官風猷明浚任昉表存樹風猷沒著徽烈天韻恢谹自其不卑小官於州縣之時曹彥約傳厯建平尉桂陽司録辰溪令知樂平縣已知將降大任為社稷之器袁宏詩汲黯社稷器棟梁天表骨曩者恢復之役事有至難元結中興頌事有至難宗廟再安二聖重歡山谷詩事有至難天幸爾誰歟倉猝之謀談何容易說文猝犬從草暴出逐人也通作卒平帝紀倉卒時橫賦斂者償其直師古曰卒讀曰猝東方朔傳談何容易師古曰不見寬容則事不易故曰何容易也維時漢廣詩漢之廣矣不可泳思漢廣軍治有漢廣堂曹彥約傳彥約知灃州未上薛叔似宣撫京湖辟主管機宜文字漢陽關守檄攝軍事時金人大入郡兵素弱彥約搜訪土豪俾總民兵授以方略斬其先鋒焚其戰艦晝夜殊死戰北渡追擊金人敗去孰是皇華漢廣皇華皆毛詩篇名能與城以俱存尊乃勇耳王尊傳天下皆言王勇顧但負貴安能勇如尊乃勇耳使自焚之弗戢燕可伐歟左傳兵猶火也弗戢將自焚中冒鵝鸛魚麗之行左傳昭公二十一年救宋與華氏戰于赭丘鄭翩願為鸛其御願為鵝注鸛鵝皆陳名又王伐鄭鄭原繁髙渠彌以中軍奉公為魚麗之陳蔣子萬機論云魚麗鵝鸛之陳進退有節按古有破陳樂舞圖左圓右方先偏後整魚麗鵝鸛箕張翼舒交錯屈伸首尾回顧以象戰陳之形旁絶蚍蜉蟻子之援所忠者國昌黎張中丞傳後序當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳遑恤乎他屹然孤墉遂作百川之障新唐書張巡許逺傳贊以疲卒數萬嬰孤墉抗方張不制之虜使不得摶食宋南只此一事已堪千載之垂來自重湖遍持三節見題下人不疑其為驟天亦慊於未酬鋒蝟斧螳敢肆萌芽之怒栁文平淮西雅進次于郾彼昏卒狂褒凶鞠頑鋒蝟斧螳赤子匍匐厥父是亢怒其萌芽以悖太陽曹彥約傳時盜羅世傳李元礪李新等相繼竊發壤地千里莽為盜區帶牛佩犢忍為葱韭之安龔遂傳勸民務農桑令口種一樹榆百本䪥五十本葱一畦韭家二母彘五雞民有帶持刀劒者使賣劔買牛賣刀買犢曰何為帶牛佩犢曹彥約傳彥約既安撫湖南時江西言欲招安李元礪朝命下湖廣議招討之宜彥約言其不可乃督諸將逼賊巢而屯奏刀剨然莊子砉然嚮然奏刀騞然注砉音畫皮骨相離聲騞呼獲反又音麥然聲大如砉也苞枿􅀈矣枿牙葛切說文伐木餘也廣韻伐木餘枿也謂斫髠而復生漢叙傳三枿之起木根既朽􅀈音隊栁文苞枿􅀈矣惟根之蟠彌巴蔽荆負南極以安太守不有肯與許以爭功東坡喜雨亭記民曰太守太守不有左傳其敢以許自為功乎夫許大嶽之𦙍也天而既厭周德矣吾其能與許爭乎曹彥約傳羅世傳素與李元礪有隙請圖之以自效彥約録賞格報之世傳遂禽元礪世傳既自以為功遲留以邀重賂彥約不許時池州副統制許俊厚結世傳許超轉官資世傳遂以元礪解江西右司胡矩欲以世傳為帥盡撤戍兵彥約固爭矩不悅彥約密誘胡友睦殺世傳江西來爭功不與校此與許爭功指許俊皇帝曰嘻盍召曹而入相韓文皇帝曰嘻豈不在我復念鯨鯢之已戮得無鴻鴈之未安非髙牙大纛之小留竝見前恐右粥左飱之或缺昌黎平淮西碑始時蔡人進戰退戮今旰而起左飱右粥仍熊羆之總帥韓文來帥熊羆四方作儀峻龍馬之負圖宋祥符初建龍圖閣以藏太宗御書閣在含光殿西偏北連禁中無以我公歸兮恐須繡衮見前樂為天下道也請被絃歌歐陽公晝錦堂記其豐功盛烈所以銘彛鼎而被絃歌者乃邦家之光非閭里之榮也余雖不獲登公之堂幸嘗竊誦公之詩樂公之志有成而喜為天下道也某拙不時宜窮自天賦粗識丹鉛之㸃勘鉛音㳂粉筆也勘苦紺切說文校也韓詩不如覻文字丹鉛事㸃勘安知朱墨之勾稽山谷詩朱墨本非工王事少閒暇又平生短朱墨吏考仰丞佐又朱墨不可紊羅隱詩金庭養真地朱篆勾稽官負米屢空為親勉出繞枝自許非賢疇依竝見前然長沙不足回旋先生升矣楊震傳先生自此升矣餘見前縱短簿能令喜怒伊誰念之見前使得侍一日之間亦足慰平生之願湖南於人不輕接何恃而來昌黎送陳秀才彤序夫湖南之於人不輕以事接爭名者之於藝不可以虛屈吾見湖南之禮有加而同進之士交譽也又以信吾信之不失也冀北之野無留良實非所望見前通安撫衛大參涇宋史寧宗嘉泰三年十一月衛涇簽書樞密院事兼參知政事十二月以涇參知政事嘉定元年六月涇罷理宗寶慶二年八月涇卒詳文意蓋湖南安撫李時為寧鄉簿書生漫仕抗塵縣掾之卑卜史涓辰𨽻役帥連之下竝見前藐塵埃之簿領韓文判司卑官不堪說未免捶楚塵埃間獨孤及詩不憚關山逺寧辭簿領勤東坡詩一笑簿領間陳後山詩簿領三年久雲霄一武趍詳見前跂霄漢之階符斐然修辭甚矣犯分恭惟某官造道自得經德不回退然得聖人之清進則任天下之重外凌雲之未翦內偃月之方深竝見前去而違之十載孤舟之橫水冦萊公詩野水無人渡孤舟盡日橫時乎可矣一朝巨棟之擎天不負獨對衮衣之詩竝見前盡洗兩造吾門之誚言行録王文正公旦曰纍於上前說張師德名家子有士行不意兩及吾門狀元及第榮進素定但當靜以待之耳互見前入參國論出庀祠宫卒以道而屈伸初何心於止速在外則植旌旄羅弓矢公豈此榮韓文坐於廟朝進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞路其功之銘鼎彛被絃歌士誠有望見上條不謂聽麻於文德轉而分竹於武安竝見前長沙千里之平右稱清絶杜詩湖南清絶地萬古一長嗟洞庭九州之大新困繹騷詩徐方繹騷傳繹陳騷動也疏陳說王之此威往告以恐動之茲勤二三執政之行殆非尋常謀帥之比自天有命固已興宣室之思竝見前惟帝念功寧久作南邦之式尚書惟帝念功詩王命申伯式是南邦注使為法度于南方暫撫湘纍之蘭芷揚雄傳欽弔楚之湘纍注諸不以罪死曰纍離騷經余既滋蘭之九畹兮又樹蕙之百畝畦留夷與揭車兮雜杜蘅與芳芷即歸商鼎之鹽梅民無不獲之夫公有無窮之聞某起家素賤劉歆傳起家復為安定屬國都尉揚雄傳或起家至二千石受質朱愚莊子不知乎人謂我朱愚知乎反愁我軀學不前人空守嗜書之癖杜預傳武帝謂預曰卿有何癖對曰臣有左傳癖髙適詩公才山吏部書癖杜荆州皇甫冉詩服藥顔須駐耽書癖已成山谷詩老眼願力餘讀書真成癖饑來驅我遂生竊祿之饞見前不虞小吏之凌競揚雄傳馳閶闔而入凌競師古曰凌競者言寒凉戰栗之處正託大鈞之坱圠簉俊造而厠下列嘗纍一陶褁章服而揖上官惟當三沐竝見前通浙西袁安撫韶宋史袁韶字彥淳慶元府人淳熙十三年進士厯官臨安尹幾十年理訟精簡道不拾遺紹定元年拜參知政事李全叛揚州告急飛檄載道都城有逃避者乃拜韶浙西置制使仍治臨安鎮遏之端平初奉祠卒纍贈太師越國公韶父為郡小吏年近五十無子其妻資遣之往臨安置妾察有憂色問之乃故趙知府女即還其母且以囊中資結之明年生韶十年幕府負公事未了之癡杜詩十年出幕府自可持旌麾餘見前千里王畿𨽻華使周爰之度見前聊步邯鄲之故班固傳有學步於邯鄲者未得髣佛失其故步欲瞻京兆之真張敞傳京兆典京師長安中浩穰於三輔為尤劇郡國二千石以髙第入守及為真久者不過三二年近者數月一嵗輒毁傷失名以罪過罷唯廣漢及敞久任職輒修偶儷之詞薄叙畸孤之迹伏念某學惟洛誦莊子副墨之子聞諸洛誦之孫洛誦之孫聞之瞻明注誦通也苞洛無所不通也家本唐餘東坡獨遊富春普照寺詩富春真古邑此寺亦唐餘因應詔而惰農遂去民而就吏韓文去民畝而就吏祿詳見前昨貪近祿浪賦遠遊杜詩因人作逺遊又茅齊慰逺游李詩何以贈逺游厯井捫參再造魚鳬之國見前逾沔入渭兩經鳥鼠之邦尚書浮于潛逾于沔入于渭亂于河又終南惇物至于鳥鼠山海經鳥鼠同穴山在今隴西首陽縣西南山有鳥鼠同穴鳥名䳜鼠名鼵鼵如家鼠而短尾䳜如燕而黃穿地入數尺鼠在內鳥在外而共處孔安國傳鳥鼠共為雌雄沙州記鳥如家雀色小白鼠小黃而無尾凡同穴地皆肥壤盡軟熟如人耕多生黃花紫草河圖括地象鳥鼠同穴山地之幹也上為掩畢星渭水出其中杜詩水落魚龍夜山空鳥鼠秋魚龍水名鳥鼠山名偶爾得歸置之勿論茲操破斧來問大鈞辱令芻狗之陳更贊木馬之運竝見前舉頭見日良欣近咫尺之天晉書明帝紀舉頭則見日不見長安詳見前滿腹飲河政不過斗升之水莊子偃鼠飲河不過滿腹又君豈有升斗之水而活我哉然非有萬間之庇將若為三匝之依見前伏遇某官器博而周材𢎞且毅無曲學以阿世言言博士之風轅固傳武帝初即位復以賢良徵公孫𢎞亦徴反目而事固固曰公孫子務正學以言無曲學以阿世轅氏望出陳留新城其後去車為袁或作爰實同出一源也言言髙大貌詩崇墉言言不錮人以收功挺挺司徒之烈袁安傳為河南尹政號嚴明然未嘗以贓罪鞫人常稱曰凡學仕者髙則望宰相下則希牧守錮人於聖世尹所不忍為也聞之者皆感激自勵遍儀膴仕詩瑣瑣姻亞則無膴仕具載休聲惟長安諸夏之原西都賦漢之西都在於雍州實曰長安詩民勞箋京師者諸夏之根本視商邑四方之極詩商邑翼翼四方之極宜得翁歸之公潔尹翁歸傳翁歸為政雖任刑其在公卿之間清潔自守語不及私仍兼廣漢之聰明趙廣漢傳廣漢為二千石以和顔接士其慰薦待遇吏殷勤甚備廣漢聰明皆知其能之所宜盡力與否弄印無以易堯見前持教使之告舜張敞傳敞使主簿持教告舜曰五日京兆竟何如京師浩穰已迎刃肯綮之間張敞傳京兆典京師長安中浩穰於三輔尤為劇師古曰浩大也穰盛也言人重之多也侍從論思即聽履凝嚴之上宋治平四年初置寶文閣以呂公著兼學士詔曰俾服凝嚴之職因為咨訪之地某不堪位置何足控摶見前效韓愈謹奉大尹之書非為文也昌黎上李尚書書守四門博士韓愈謹載拜奉書尚書大尹閣下謹獻所為文兩卷凡十五篇非敢以為文也以為謁見之資也慕劉向獨叙馮翊之傳尚有志焉趙尹韓張二王傳贊自孝武置左馮翊右扶風京兆尹而吏民為之語曰前有趙張後有三王然劉向獨序趙廣漢尹翁歸韓延壽馮商傳王尊揚雄亦如之注劉向作新序不道王尊馮商續史記為作傳揚雄作法言亦論其美代回臨安趙尹師石拜命中宸說文宸屋宇也賈逵曰室之奧者後人指帝居曰宸西京賦消氛埃于中宸參華外府周禮外府掌邦布之入出以共百物而待邦之用彈壓輦轂既知天邑之尊舊唐書栁仲郢為河南尹以寬惠為政言者以為不類京兆之政仲郢曰輦轂之下彈壓為先郡邑之治惠養為本何取類耶尚書肆豫敢求爾於天邑商西京賦宜其可定以為天邑劉琨勸進表敢肆犬羊陵虐天邑平準京師又借月卿之重史記平準書桑𢎞羊請置大農大農之諸官盡籠天下之貨物貴即賣之賤即買之如此富商大賈無所牟大利則反本而萬物不得騰踊故抑天下物名曰平準少騰歌於張趙見上條即接武於䕫龍某方聽除書欲陳慶語不虞貶損猥賜鳴謙損謙卦名會見九遷之榮當不一賀而足竝見前代回䕫路王安撫宗孟垂共工而服命躐視大常伯之班尚書垂汝共工唐百官志龍朔二年改尚書為大常伯䕫有國以建侯遠致故將軍之禮史記楚世家文王三十九年滅䕫䕫不祀祝融鬻熊故也服䖍曰䕫熊渠之孫熊摯之後䕫在巫山之陽秭歸鄉是也李廣傳霸陵尉呵止廣廣騎曰故李將軍曄然尺牘展也千金展誠也詩展也大成周禮內司服疏展者言之誠爾雅信也方言荆吳淮泗之間謂信曰展恭惟某官殖學端深見前褆身凝遠法言其為中也𢎞遠其為外也肅括則可以褆身矣注括法也褆福也建武功臣之後文獻具存建武功臣河南尹阜成矦王梁上谷太守淮陽矦王霸橫野大將軍山桑矦王常光武紀建武二年正月封功臣為列矦策曰傳爾子孫長為漢藩馬援傳顯宗圖畫建武中名臣列將于雲臺貞元朝士之間德音孔碩貞元唐德宗年號元微之詩屈指貞元舊朝士幾人同見太和春周平原啓數朝士於貞元春風屢改得世臣於故國喬木猶存由觀風而分閫不易地以開藩眷是陳人接枌榆於西派郊祀志髙祖禱豐枌榆社注枌榆鄉名也枌白揄也以此樹為社神因立名也社在豐東北十五里宋吕居仁有江西詩派圖餘見前憐其舊日拾橡栗於東屯新唐書杜甫傳去官客秦州負薪採橡栗自結杜詩嵗拾橡栗隨徂公天寒日暮山谷裏東屯杜甫别業在䕫州方輿勝覽王龜齡云世傳計臺乃少陵舊宅今有祠堂舊經云少陵祠有三在漕臺奉節縣及東屯三處東屯乃公孫述留屯之所距白帝五里子美移居東屯詩白鹽危嶠北赤甲古城東平地一川穩髙齊四面同東屯有青苗陂杜詩云東屯稻田一百頃北有澗水通青苗晴浴狎鷗分處處雨隨神女下朝朝又云東屯復瀼西一種住青溪東屯之田可得百許頃稻米為蜀第一郡給諸官俸廩以髙下為差帥漕月得九斗故王龜齡詩云少陵别業古東屯一飯遺忠甽畝存我輩月叨宮九斗須知粒粒是君恩今按杜詩又云東屯大江北百頃平若按六月青稻多千畦碧泉亂杜又有東屯夜月東屯北崦詩雖糠粃不足乎播揚穀梁傳其不言齊矦何也以其不足乎揚不言齊矦也然草木實同於臭味見前春風披拂楸樹馨香杜詩楸樹馨香倚釣磯斬新花蘂未應飛不如醉裏風吹盡可忍醒時雨打稀仍飛翦縠之文說文縠細綺也法言霧縠之組麗李充翰林論潘安仁之為文猶翔禽之羽毛衣被之綃縠漢書辭賦大者與古詩同義小者辨麗可喜譬如女工有綺縠音樂有鄭衛見寵斫輪之老山谷詩問取人間老斫輪某强顔曵履見前有味挂冠逄萌傳王莽殺其子宇萌謂友人曰三綱絶矣不去禍將及人即解冠掛東都城門歸將家屬浮海南史陶𢎞景傳除奉朝請雖在朱門閉影不交外物家貧求宰縣不遂永明十年脫朝服挂神武門上表辭祿詔許之隋崔信明詩西上君飛蓋東歸我挂冠共飲玻瓈江固已蒙九里之潤東坡詩相望六十里共飲玻瓈江郭伋傳河潤九里詳見前俱是蓬萊守願早乘兩腋之風東坡詩樽前俱是蓬萊守莫放髙樓雪月天盧同謝孟諌議寄新茶詩七碗喫不得也唯覺兩腋習習清風生代回湖南曹安撫彥約宋史本傳遷湖南運判時盜羅世傳李元礪等相繼竊發壤地千里莽為盜區彥約至彼督運人心始定遷直祕閣知潭州湖南安撫改知隆興府江西安撫遷大理少卿權戶部侍郎理宗即位擢兵部侍郎卒贈文簡互見前升華延閣作牧價藩長沙千里之平孰主張是元戎十乘之啓實寵綏之恭惟某官抱負寬疏踐揚詳熟崇詩書閲禮樂天稟有餘羅弓矢植旗旄人疑為晚以扶輿磅礴之地竝見前有奪攘矯䖍之風尚書罔不冦賊鴟義奪攘矯䖍孔傳以相奪攘矯稱上命若固有之正義云釋詁曰䖍固也褒凶鞠頑未正鯨鯢之戮平淮西雅彼昏作狂褒凶鞠頑餘見前烜威赫德是資虎豹之韜昌黎元和聖德詩怛威赧德踧踖蹈舞注諸本怛作烜赧作赫方以文録定烜作怛以唐閣蜀文定赫作赧云公上尊號表有怛威愧德意與此同太公六韜謂文韜武韜龍韜虎韜豹韜犬韜願疇末乃取闢之功元和聖德詩末乃取闢駭汗如寫揮刃紛紜爭刌膾脯行有果使召參之寵曹參傳蕭何薨參聞之告舍人趣治行吾且入相居無何使者果召參某緬懷先契實託通家見前拙政在前乃不足乎揚之糠粃潘嶽閒居賦序孝乎惟孝友于兄弟此亦拙者之為政也餘見上條同年有後亦助旁而譟其鼓旗東坡答劉沔都漕書文章如金玉珠貝未易鄙棄見足下詞學如此又喜吾同年兄龍圖公之有後也冦恂傳士馬四集幡旗蔽野恂乃令士卒乘城鼓噪六一居士詩安得二子接揮鋒兩交鋩我亦願助勇鼓旗譟其旁管輅別傳單子春曰吾自與卿旗鼓相當詳見前代回䕫路王帥宗孟此條自慰太守之舊民以下舛錯今改正肅將使節就易帥垣號令晶明初不勤於易地說文晶明光也通作精圖書清邃果何逺於去天宋敏求春明朝退録治平三年六月豫為知制誥夢丞相遣朱衣吏召命草某人為清邃殿學士制明年五月丞相遣朱衣吏召當制舍人吕縉叔除邵不疑為寶文閣學士後數日得承㫖張公所作詔云乃規層宇邃在西清與夢若符契恭惟某官昭代通材杜詩昭代今垂白名門勝士陳後山詩江西勝士與長吟從容宦牒鴈所至而有聲栁文纍仕所至必有休聲剖決吏文牛雖全而自解見前茲乘漢傳傳張戀切廣韻郵馬曰傳古者以車駕馬乘詣京師謂之傳車其後又置單馬乘之謂之驛騎若今遞馬凡四馬髙足為置傳四馬中足為馳傳四馬下足為乘傳一馬二馬為軺傳出護蜀門八陳縱橫久督木牛之運荆州圖經八陳磧在奉節縣西南七里又云在永安宫南一里渚下平磧上有孔明八陳圖聚細石為之各髙五丈皆棊布相當中間相去九尺正中開南北巷悉廣五尺凡六十四聚或為人散亂及為夏水所沒及水退復依然如故又有二十四聚作兩層其後兩層各十二聚成都圖經云武矦八陳凡三在䕫者六十有四方陳法也在牟彌者一百二十有八當頭陳法也其在棊盤匝者二百五十有六十營法也興元志興元西縣亦有八陳則八陳凡四矣東坡詩平沙何茫茫髣佛見石蕝縱橫滿江上嵗嵗沙水齧孔明死已久誰復辨行列惟餘八陳圖千古壯䕫峽三巴疏鑿更分銅虎之符杜詩疏鑿控三巴注劉璋分三巴有中巴巴西巴東魚復巴東之屬也三巴記閬白二水東西流三曲如巴字故曰三巴餘見前念糠粃之在前餘草木之同味竝見前竹枝嘔啞敢望播揚啞么加切聲也么下切啞啞鳥聲白樂天詩豈無山歌與村笛啞啞嘲哳難為聽餘見前楸樹馨香滿期封植杜詩楸樹馨香倚釣磯詳見前左傳晉矦使韓宣子來聘公享之既享宴於季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公用仁矦之新政慰太守之舊民愛莫助之遐不謂矣某無由旅賀猥沐撝謙竝見前指爪偶然終憶飛鴻之泥上東坡詩人生到處知何似應似飛鴻踏雪泥泥上偶然留指爪飛鴻誰復計東西頭顱如此更慙神虎之門中見前代回襄陽劉安撫光祖以下二條徽本闕今補宋襄陽安撫司統郡七領縣四治襄陽升華殿左輟鎮山南襄陽隋唐皆為襄州唐復升為山南東道節度千里見王雖未究獻納論思之益十連為帥亦可策還定安集之功竝見前邊面晏然谷永傳三垂晏然餘見前上心簡在恭惟某官三代遺直左傳仲尼曰叔向古之遺直也治國制刑不隱於親三數叔魚之惡不為末減曰義也夫可謂直矣一代偉人魏志鍾繇傳時司徒華歆司空王朗與繇竝先世名臣文帝罷朝謂左右曰此三公者乃一代之偉人也詳別見儒特立而獨行蓋以有益於國禮記儒有澡身而浴德陳言而伏靜而正之上弗知也粗而翹之又不急為也不臨深而為髙不加少而為夕世治不輕世亂不沮同弗與異弗非也其特立獨行有如此者士任重而道逺不止獨善其身抗正論於經帷吐苦言於諫紙元稹詩榮班聫錦繡諫紙賜箋藤芳馨杳矣流落久之屬時改絃令公趣駕方抱同朝之喜忽聞分鑰之殊休兵屯田正須元凱之規畫杜預傳預既還鎮以天下雖安忘戰必危勤於講武修立泮宫攻破山夷錯置屯營分據要害之地以固維持之勢輕裘緩帶會繼叔子之功名無有遐心益觀逺業某會同臭味頗共浮沈竝見前唱白銅鞮空羡接籬之倒山簡傳簡字季倫鎮襄陽于是四方冦亂天下分崩簡優游卒嵗唯酒是耽諸習氏荆土豪族有佳園池簡每出游嬉多之池上置酒輒醉名之曰髙陽池時有童兒歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接籬舉鞭向葛疆何如并州兒李白襄陽歌落日欲沒峴山西倒著接籬山下迷襄陽小兒齊手拍攔街爭唱白銅鞮傍人借問笑何事笑殺山公醉似泥吟青玉案不供繡段之酬見前代回史安撫彌堅彌堅浩第四子彌逺之弟光膺芝檢檢書函之蓋也三刻其上繩緘之然後填以泥題書而印之也陳江總為南陽王讓吳郡表芝泥馳印發命開函詳見前進陟松班文昌雜録元微之詩松門待詔應全逺蓋唐宣政殿為正衙殿廷東西有四松四松之下待制官立班之地舊圖至今猶存一札細書渙絲綸之溫潤十連大國添旗幟之晶明恭惟某官世濟壯猷家傳遠業輦轂之下彈壓夙著能聲竝見前侍從之間論思益髙雋軌六一居士詩萬國㑹王州羣英馳雋軌遽厭承明之夜直出為湘水之曉行展長沙萬里之平袴襦自得鎖洞庭九州之險舟楫無虞竝見前蕞爾獠蠻囂於鼠穴蕞徂外切音與萃同小貌又藏活切義同史記趙奢傳道逺險狹譬之猶兩鼠鬬於穴中將勇者勝勝之不武雖多殺以奚為左傳勝之不武弗勝為笑綏之斯來宜脅從而罔治尚書殱厥渠魁脅從罔治帝嘉成績詔錫隆名東壁圖書姑暫煩於寓直南邦藩翰會趣用以遄歸某自愧望秋未遑賀夏竝見前徒以在前之糠粃荷不鄙夷韓文栁矦為州不鄙夷其民其如莫報以瓊瑶止深感戢見前代回徐安撫邦憲宋史徐邦憲字文子婺州義烏人紹興四年試禮部第一人登進士第三為祕書郎韓托胄開兵端同惡附和無敢先發一言議其非者邦憲獨首言之厯官寶謨待制致仕卒諡文肅升華法從從才用切說文隨行也爾雅重也疏云隨從重疊也從天子駕曰法從揚雄傳每上甘泉常法從師古曰法從者以言法當從耳一曰從法駕也從如字作尹神皋說文尹治也爾雅正也注謂官正也通典凡前代帝王所都皆曰尹徐邦憲知臨安府故云西京賦實為地之奧區神皋澤畔曰皋賈山傳江皋河濵李竒曰皋水淤地司馬相如傳亭皋千里師古曰為亭候于皋阻中疇若豫工有渥二卿之命徐邦憲傳徐左司為金賀正使接伴除宗正少卿權工部侍郎知臨安府徒得君重底寧千里之畿汲黯傳吾徒得君重臥而治之師古曰徒但也重威重也渙號既揚易渙汗其大號師虞允穆尚書出入自爾師虞恭惟某官靖共而正直詩靖共爾位好是正直肅括而𢎞深見前中外久於踐揚上下孚其名實大宗正之盤礴公豈曰淹莊子解衣盤礴注謂箕坐裸體間定貌少常伯之超騰人不謂早當日畿之謀帥竝見前勤天陛之掄材特升獻納之班俾任浩穰之寄張敞傳長安中浩穰注浩大也穰盛也言人衆之多也欲粟賤追李峴少慰閭閻新唐書李峴吳王恪孫也天寶時纍遷京兆尹出為零陵太守峴為政得人心時京師米翔貴百姓乃相與謡曰欲米賤追李峴録囚歸問不疑更光史册雋不疑傳為京兆尹每行縣録囚徒還其母輒問不疑有所平反活幾何人即不疑多有所平反母喜笑為飲食語言異於他時某自聞先庚之令亟展同寅之恭材俊滿前欲譽盛德而不敢韓文才畯滿前道古今而譽盛德詳見前珠玉在側始愧先施之未能衛玠傳驃騎將軍王濟玠之舅也雋爽有風姿每見玠輒歎曰珠玉在側覺我形穢又嘗語人曰與玠同遊冏若明珠之在側朗然照人代回潼川劉閣學甲宋史劉甲字師文元祐宰相摯之後也自東光流寓龍游中淳熙二年進士纍官至度支郎中樞密院檢詳兼國史編修官實録院檢討官使金還除司農少卿進太常擢工部侍郎升同修撰除寶謨閣待制知江陵府湖北安撫使知興元府利東安撫使吳曦反四川宣撫使程松謀遁甲固留不可欲自拔歸朝募兵持帛書遺參知政事李壁告變舉朝震駭壁袖帛書進上覽之稱忠臣者再召甲赴行在曦誅除甲宣撫使上念甲精忠拜寶謨閣學士賜衣帶鞍馬西邊諸事朝論多於甲取決人無知者罷宣撫司合利東西為一帥治興元移甲知潼川府尋進寶謨閣學士知興元府利路安撫使節制本路嘉定七年卒於官理宗詔諡清惠出綸北闕髙帝紀蕭何治未央宫立東闕北闕注未央殿雖南嚮而上書奏事謁見之徒皆詣北闕公車司馬亦在北焉是則以北闕為正門也賜履東川潼川為唐東川節度使治所臣作股肱宜職五言之納尚書臣作朕股肱耳目又豫欲聞六律五聲八音在治忽以出納五言汝聽王之㗋舌洊勤四國之蕃詩出納王命王之㗋舌箋出王命者王口所自言承而施之也納王命者時之所宜復于王也其行之也皆奉順其意如王口㗋舌親所言也西顧既寬詩乃眷西顧冦恂傳昔髙祖任蕭何干關中無復西顧之憂新唐書房𤣥齡傳公當蕭何之任朕無西顧憂矣南圖益大莊子而後乃今將圖南又然後圖南恭惟某官清標拔俗北山移文耿介拔俗之標蕭灑出塵之想厚德鎮浮二十四郡之無人己見真卿之節新唐書顔真卿傳安祿山反河朔盡陷獨平原城守具備使司兵參軍李平馳奏𤣥宗始聞亂歎曰河北二十四郡無一忠臣耶及平至帝大喜謂左右曰朕不識真卿何如人所爭乃若此劉甲傳吳曦叛獻四州於金金人破大散關曦致書於甲甲援大義拒之人遣其弟旻邀甲相見甲叱而去之乃援顔真卿河北故事自拔歸朝一千餘家之失火何勤長孺之行漢書汲黯字長孺河內失火燒千餘家上使黯往視之還報曰家人失火比屋延燒不足憂一統志甲知潼川屬火災之餘發廩以賑饑儲書以勸學席地以居民市田以養士前後省廢巨萬及代去郡人思而祀之然使玉帳之輕將幕曰玉帳杜詩玉帳分弓射虜營唐大詔令折衝之寄符玉帳而總金壇焦弱侯筆乘云杜詩空留玉帳術愁殺錦城人又但促銅壺箭休添玉帳旗王洙於玉帳術注云兵書也後來增釋者不過曰唐藝文志有玉帳經一卷而已至玉帳旗則不能通矣按顔之推觀我生賦云守金城之湯池轉絳宫之玉帳袁卓遁甲專征賦云或倚直使之游宫或居貴人之玉帳蓋玉帳乃兵家厭勝之方位謂主將于其方置軍帳則堅不可犯猶玉帳然其法出于黃帝遁甲以月建前三位取之如正月建寅則已為玉帳主將宜居李白司馬將軍歌曰身居玉帳臨河魁謂主將之帳在戍也非深識其法者不能為此語今按兵家五行類有李靖玉帳經一卷李筌六壬玉帳歌十卷抱朴子內篇兵在太乙玉帳之中不可攻也崇文目有彭門玉帳一卷孰借銅官之重一統志銅官山在今潼川府中江縣西南九十八里産銅即卓王孫鄧通冶鐵之所元戎小隊聊復班石谷之春杜詩元戎小隊出郊坰崔駰傳篆乃强起班春注班行春令石谷在四川方國細書恐趣侍雲臺之下後漢循吏傳其以手迹賜方國者皆一札十行細書成文五行志雲臺周家所造圖書術籍珍玩寶怪所藏馮魴傳建武三年召詣行在所見於雲臺范升傳建武四年朝公卿大夫博士見於雲臺周黨傳光武引見伏而不謁范升奏毁曰願與坐雲臺之下考試圖國之道索盧放傳建武末召不起光武使人輿之見於南宫雲臺賈逵傳建初元年召逵入講北宫白虎觀南宫雲臺順帝紀登雲臺召百官某久燕居息復鳩僝功見前憑飛亷以寄聲若為厚報栁文安得不憑豐隆訴飛亷以寄聲于寥廓耶望崦嵫而勿迫猶佇遄歸離騷經吾令羲和弭節兮望崦嵫而勿迫詩式遄其歸注遄速也列子不若遄歸也此啓蓋代月湖代回揚州崔安撫與之宋史崔與之字正子廣州人少卓犖有竒節不遠數千里遊太學紹熙四年舉進士廣士自太學取科第自與之始提刑廣西召為金部員外郎金南徙于汴朝議疑其進迫特授直寶謨閣權發遣揚州事主管淮東安撫司公事升祕書監兼太子侍講權工部侍郎未幾成都帥董居誼以黷貨為叛卒所逐總領楊九鼎遇害蜀大擾與之以選為煥章閣待制知成都府本路安撫至即帖然蜀人肖其像於成都以配張泳趙抃名三賢祠纍官觀文殿大學士提舉洞霄宫封南海郡公諡清獻揚州安撫司領郡九領縣二治江都建纛偃藩方欲馳於慶牘唐百官志節度使行則建節樹六纛漢書叙傳木偃息以藩魏兮申重繭以存荆師古曰木段干木也客居魏魏王敬而禮之過其廬未嘗不軾也秦欲代魏或諫曰魏君賢者是禮國人稱仁未可圖也秦遂止兵左思詠史詩吾希段干木偃息藩魏君濫巾分閫何遽辱於朋緘獸二為友貝二為朋詩朋酒斯饗謂兩尊也朋緘謂二緘餘見前一謙之光三復以愧南史何遜傳沈約嘗謂遜曰吾每讀卿詩一日三復猶不能已謙復卦名恭惟某官氣涵天粹材應時需德行得南方之强文字喧西都之價竝見前仁勇充然於六館獨何蕃歟韓文太學士何蕃傳蕃之仁義充諸心行諸太學積者多施者不遐也故凡貧賤之士必有待然後能有所立獨何蕃歟言行考之而一人如清河者昌黎與崔羣書至於心之所仰服考之言行而無瑕尤窺之閫奧而不見畛域明白淳粹輝光日新者惟吾崔君一人比亦有人說足下誠盡善盡美抑猶有可疑者僕謂之曰何疑疑者曰君子當有所好惡好惡不可不明如清河者人無賢愚無不說其善伏其為人以是而疑之耳羣飛方鋭韓文羣飛刺天勇退尤髙甫躋郎舍之華即領帥垣之寄堰橫古埭尚如召伯之棠埭音代召伯埭在今江都縣東北四十五里謝安傳安至新城築埭於城北後人追思之名為召伯埭地對長江曽擊祖生之楫晉書元帝以祖逖為奮威將軍豫州刺史渡江中流擊節而誓曰祖逖不能清中原而復濟者有如大江惟良刺史尚友古人使功名配於前聞即富貴乃其餘事某何功湘楚又守勾吳地理志泰伯初奔荆蠻荆蠻歸之號曰勾吳師古曰句音鉤夷俗語之發聲也亦猶越為於越也趙曄吳越春秋云古公卒太伯仲雍歸赴喪畢還荆蠻國民君而事之自號為勾吳吳人或問何像而為勾吳太伯曰吾以伯長居國絶嗣者也其當有封者吳仲也故自號勾吳非其方乎捲雨西山良有愧閻公之望滕王閣詩序都督閻公之雅望棨㦸遙臨餘見前觀梅東閣恨莫窺何遜之詩杜詩東閣官梅動詩興還如何遜在揚州詳見前代董侍郎回䕫路丁安撫黼本傳見十四卷疇庸靈石栁文皇天疇庸審厥保承一統志靈山在今廣信府城西北六十里山有七十二峰蓋郡之鎮山也道書為第三十三福地上有龍池多珍本竒卉産水晶其東北峰挺立孤石髙百餘丈西峰絶頂有葛仙壇遺址梅聖俞詩攢青厯厯向靈山神石在弋陽縣東南橫出大溪捍截東流縣治賴此無衝潰之患故以神名改牧䕫藩山谷詩月黑虎䕫藩此借用畫舫青簾昔固識灧澦之馬杜詩青簾白舫益州來張華詩象馬誠可駭彼神亦露機杜詩沈牛答雲雨如馬戒舟航詳見前碧油紅斾今重認常山之蛇孫子率然者常山之蛇也善用兵者譬如常山之蛇擊其首則尾至擊其尾則首至擊其腹則首尾俱至盛𢎞之荆州記魚腹縣鹽井以西石磧平曠騁望四逺諸葛孔明積細石為壘方可數百步壘西郭又聚石為八行相去二丈許謂之八陳圖曰八陳既成自今行師庶不復敗自後深識見者竝莫能了桓宣武伐蜀經之以為常山蛇勢餘見前建牙云初滿目交慶習鑿齒傳星列滿目董京傳洋洋乎滿目建滿對恭惟某官風華俊茂天韻崇谹正色立朝有嘉猷則告于后抗章請外取膏澤而下諸民廣信之政既成寰宇記唐上元元年因江淮轉運使元載之請謂川原敻邈關防襟帶宜置州又謂其信可美也故名廣信承明之召宜亟漢書厭承明之廬注承明廬在石渠閣外適茲魚復一統志魚復浦在今䕫州府治東南漢魚復縣以此得名今赤甲山上有魚復城相傳公孫述築即漢魚復縣基也重在麟符出幕十年去思未逺賜書一札易鎮攸宜盧矢彤弓新元戎之號令尚書用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹白鹽赤甲壯全蜀之藩垣方輿勝覽白鹽山有䕫州城東十七里崖壁五十餘里其色炳耀狀如白鹽元和志赤甲山在䕫州城北三里上有孤城漢時常取巴人為赤甲軍蓋犀甲之色也寰宇記公孫述築不生樹木土石悉赤如人袒臂故曰赤甲與舊白帝城相連類要赤甲城即古魚復縣基杜詩赤甲白鹽髙刺天閭閻繚繞接山川楓林大樹丹青合復道重樓錦繡懸不俟突黔即膺詔紫見前某守邊弗績受代得歸已問檣烏頓有身輕之喜杜詩雁兒爭水馬燕子逐檣烏東坡詩無官一身輕有子萬事足尚陪厦燕獲伸面賀之誠見前代回畢安撫再遇宋史畢再遇字德卿兖州人父進從嶽飛轉戰江淮間積階至武義大夫再遇以恩補官武藝絶人挽弓至二石七斗纍官鎮江都統制兼權山東京東招撫司事驍衛大將軍兼知揚州淮東安撫使嘉定元年除左驍衛上將軍和好成纍疏乞歸田里賜詔不許十年以武信軍節度使致仕贈太師諡忠毅再遇姿貌雄傑早以拳勇聞屬時寢兵無所自見一旦邊事起諸將望風奔衄再遇威聲始著遂為名將云鶴林玉露云開禧用兵諸將皆敗唯畢再遇數有功敵常以水匱敗我再遇夜縳藁人數千衣以甲胄持旗幟戈矛儼立成行昧爽鳴鼓敵人驚視亟放水匱旋知其非真甚沮乃出師攻之敵大敗又嘗引敵與戰且前且却至于數四視日已晚乃以香料煮黑豆布地復前搏戰佯敗敵乘勝逐北馬饑戀食豆鞭之不前我師反攻之敵人馬死者不可勝計又嘗與敵對壘度敵兵至者日衆難與爭鋒一夕拔營去慮敵相追乃留旗幟于營縛注羊置前二足于鼓上擊鼓有聲敵不覺為空營相持竟日比覺追之則已逺矣疇庸邊閫進職內徽直徽猷閣宣化承流將視儀於三事董仲舒傳今之郡守縣令民之師帥所使承流而宣化也尚書惟三事暨大夫韋𤣥成傳天子我監登我三事師古曰三事三公之位謂丞相也東觀記馬防儀同三事南齊百官志開府儀同三司如公定功保大仍作鎮於十連左傳夫武禁暴戢兵保大定功安民和衆豐財者也暴而不戢安能保大猶有晉在安能定功禮記十國以為連連有帥成渙載揚在師元吉易在師中吉象曰在師中吉承天寵也恭惟某官果毅而有守尚書爾衆士其尚迪果毅左傳殺敵為果致果為毅沈鷙而善謀說文鷙擊殺鳥也凡鳥之勇獸之猛皆曰鷙心潛濟北之一編張良傳老人出一編書曰讀是則為王者師後十年興十三年孺子見我濟北穀成山下黃石即我已旦日視其書乃太公兵法材駕山西之諸將辛慶忌傳贊秦漢已來山東出相山西出將何則山西處勢迫近羌胡民俗習修戰備高上勇力其風聲氣俗自古而然鶴唳風聲走符堅於淝水謝𤣥傳𤣥決戰淝水南堅衆奔潰棄甲宵遁聞風聲鶴唳皆以為王師互見前鵝鳴雪夜擒元濟於蔡城李訴傳行七十里夜半至懸瓠城雪甚城旁皆鵝鶩池訴令擊之以亂軍聲黎明雪霽訴入駐元濟外宅蔡吏驚曰城破矣互見前公將策大漠之功霍去病傳約輕齎絶大幕上已棄單于之過漢文帝詔單于反古之道計社稷之安便萬民之利新與朕俱棄細過偕之大道和親以定始于今年戢干戈櫜弓矢既放桃林之牛詩載戢干戈載櫜弓矢我求懿德肆于時夏允王保之尚書歸馬于華山之陽放牛于桃林之野安邊境立功名真跨揚州之鶴鼂錯傳兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可不擇也太平廣記有四人各言所願甲曰願多財乙曰願為揚州太守丙曰願為仙丁曰願腰纒十萬貫騎鶴上揚州東坡詩野無佩犢子府有騎鶴仙又有客打碑來薦福無人騎鶴上揚州鼎來恩綍晉錫師麾英節麟符勉狥借留之請周禮地官掌節掌守邦節而辨其用皆金也以英簜輔之神旗豹尾佇聞入衛之榮韓文田𢎞正先廟碑銘旌節有韜豹尾神旗槖兜載纛以長魏師某拘以綴班闕於馳慶十部從事慙無瓊玖之酬劉𢎞傳𢎞每有興發手書相守丁寧欵密所以人皆感悅爭赴之咸曰得劉公一紙書賢於十部從事說文瓊赤玉也詩注玉之美者玖音久石之次玉黑色者叶音茍起切詩投我以木李報之以瓊玖千里折衝願體冕旒之眷見前代衛大參涇回沈安撫作賔以下四條徽本闕宋史沈作賔字賔王吳興歸安人中刑法科厯江西提刑司檢法官入為大理評事改秩通判紹興府秩滿知台州除大理正改太府丞遷刑部郎淮南轉運判官直文華閣因其任擢太府少卿總領淮東軍馬錢糧繼升為卿直龍圖閣帥浙東知紹興府除兩浙轉運副使權工部侍郎兼戶部侍郎以言者罷歸起知鎮江府除集英殿修撰改知寧國府除寶謨閣待制知潭州除戶部侍郎龍圖閣待制知平江府尋命參贊督府兼權鎮江府權工部尚書權戶部尚書丁母憂服闋授顯謨閣直學士知建寧府入覲除寶謨閣學士江西安撫除煥章閣學士提舉隆興府玉隆萬壽宫進顯謨閣學士贈金紫光祿大夫煥被宸綸屈臨藩服都督居翼軫之分龍光近映於越壇王勃滕王閣秋曰餞别序星分翼軫地接衡廬義物華天寶龍光射牛斗之墟又都督閻公之雅望棨㦸遙臨尚書象台斗之躔符采上聫於奎閣杜詩尚書踐台斗曹子建七啓符采照爛流景揚耀魏文帝車渠碗賦發符采而揚榮魏略鍾繇報太子書賜玦尚方耆老頗識舊物名其符采必得處所傅𤣥乘輿馬賦符采橫發楊盈川送東川孫尉詩序東川孫尉文章動俗符采射人隋劉斌詩符采照千里銓衡總九流杜詩符采髙無敵聰明達所為杜牧之詩壇宇寬帖帖符采髙酋酋所欣晚歲及話平生王荆公詩草草杯盤供笑語皆昏燈火話平生恭惟某官望實夙孚人門具美唐鄭仁表為起居郎文章俊拔自謂門第人物文章俱美嘗曰天瑞有五色雲人瑞有鄭仁表東坡詩清朝固多士人門子皆冠詳別見氣深且厚會三光五嶽之全劉夢得栁文序夫政痝而土裂三光五嶽之氣分大音不完故必混一而後大振才碩以疏了四海九州之大自遍儀於省寺尋屢課於節麾值北風之方驚往籌玉壘嗟白日之可鑒忍附冰山天寶遺事或勸陜郡進士張彖謁楊國忠曰見之富貴可立圖彖曰君輩倚楊右相為泰山吾以為冰山若皎日既出君輩得無失所恃乎沈作賔傳韓托胄方用事族有居越者私釀公行作賔逮捕置于獄而竄其奴天必諒其肺肝帝用居之㗋舌見前比解欒欒之韠詩棘人欒欒兮又庶見素韠兮詳見前載揚孑孑之旟旟羊諸切詩孑子干旟在浚之都素絲組之良馬五之注孑孑干旟之貌鳥隼曰旟周禮州里建旟謂州長之屬州長中大夫天子之州長也賦政未幾已被五袴之燠詩賦政于外四方爰發䇿勳如許爰加六纛之榮纛音導唐百官志節度使掌總軍旅顓誅殺初授具帑抹兵仗諸兵部辭見觀察使亦如之辭日賜雙旌雙節行則建節樹六纛中官祖送瞻西序之嚴凝覺南州之雄重自文昌臺而為帥長已符益部之前規由節度府以拜僕臣好追陳許之舊事某悵故矦之老矣除新尹以慨然早共參謀之遊兩皆清齒韓詩憶昔初及第各以年少稱君頥始生鬚我齒清如冰後見諫議之面獨在素書盧同謝孟諫議寄茶詩開緘宛見諫議面手閲月團三百片為留襟帶之區滕王閣序襟三江而帶五湖以續槖簪之舊某丘某水儻遂莵裘之歸左傳使營莵裘吾將老焉莵裘魯邑今山東泗水縣有莵裘聚我笱我梁尚託緹袍之誼笱苟同說文曲竹捕魚笱也詩注以竹為之魚入其中詩毋逝我梁毋發我笱注逝之也梁魚梁笱所以捕魚也梁者為堰以障水空中央承之以笱餘見前代回洪廣帥伋升班東觀宅牧南交竝見前四牡載馳和氣交騰於大庾方輿勝覽大庾嶺在大庾縣西南二十里吳縣南野縣有大庾山自嶺嶠九磴至嶺下七里平行十里至平亭劉嗣之南康記平亭謂之橫亭圖經云嶺初險捔唐張九齡開鑿新路乃斷崖成峽兩壁聳立仰視霄漢中塗夷坦又名梅嶺五羊夾道歡聲乃見於細侯寰宇記昔髙固為楚相有五仙人騎五色羊各持榖穗一莖六出以遺州人騰空而去今呼為五羊其城周十里初尉陀築之後為步隲修之既而為黃巢所焚郭功父廣州五仙謡番禺五仙人騎羊各五色手持六秬穗翺翔繞城壁翻然去乘雲諸羊化為石至今留空祠異像猶可識曽聞經猛火毫髮無㾗迹五仙寧復來三說頗難測只憂風雨至半夜隨霹靂君不見羌廬列越之洞天萬象森羅無一尺恭惟某官器諝端方風猷凝逺力欲磨礲乎事業枚乘傳磨礱底厲不見其盡有時而損注礱亦磨也擊辭舉而措之天下之民謂之事業韓文遂得究窮于經傳史記百家之說沈潛乎訓義反覆乎句讀礱磨乎事業而奮發乎文章肯甘塵土之功名天上九虎關獨掉頭而不顧宋玉招魂魂兮來歸君無上天些虎豹九關喙害下人些杜詩巢父掉頭不肯住人生五馬貴四出守以無嫌見前果從乘軺竟遂分閫旗幢蓋海官亷知蚌蛤之回昌黎送鄭尚書赴南海詩番禺盛軍府欲說暫停杯蓋海旗幢出連天觀閣開衙時龍戶集上日馬人來風靜爰居去官亷蚌蛤回貨通師子國樂奏武王臺事事皆殊異無嫌屈大材茸纛饗軍食足驗羽鱗之飫栁文嶺南節度使饗軍堂記公命饗於新堂牙幢茸纛金節析羽旗旗旟旞咸飾于下羽鱗薶互之物沈泛醍盎之齊均沃于卒士自古常重於他鎮韓文嶺之南其州七十然獨嶺南節度為大府若嶺南帥得其人則一邊盡治故選帥常重於他鎮惟公克對於前人使扶胥黃木之灣民無遺便昌黎南海神廟碑在今廣州治之東南海道八十里扶胥之口黃木之灣又韋丹墓志居三年於江西八州無遺便則甘泉紫荷之槖王曰遄歸詩徐方不回王曰遄歸某濫長十連實鄰五管見前亟問亟餽良勤吾味之同既足既濡尚幸君波之及詩既沾既足生我百穀韓文嶺海之陬既足既濡左傳其波及晉國君之餘也代回成都黃安撫疇若長沙地濕漸謀下澤之乘賈誼傳長沙卑濕誼自傷悼以為壽不得長馬援傳乘下澤車騎欵段馬注周禮車人為車行澤者欲短轂行山者欲長轂短轂則利長轂則安也蜀道天髙猶竊上流之潤欲修辭而遲緩愧垂問之諄勤恭惟某官忠結兩宫名髙九牧文選九牧之人所共稱歎厭承明勞侍從暫違豹尾之班望太白橫岷峨還作鼇頭之望三年而化兩社方虛竝見前貞元朝士之無多今召君矣元微之詩屈指貞元舊朝士幾人同見太和春汲黯傳上曰君薄淮陽耶吾今召君矣潁川太守之第一世有人哉見前某息影投林莊子處隂以休影處靜以息迹袁閎傳散髮絶世投迹深林起家分閫秋毫皆出於帝力未有報酬張耳傳先王亡國賴皇帝得復國德流子孫秋毫皆帝力也夏畦不習於諂肩誰其全度趙充國傳宜全度之師古曰全安而免度之不令喪敗也詳見前欲動鱸魚之興莫瞻龜鶴之還竝見前回諸郡賀權安撫攬轡登車久慙一節見前代庖越爼暫攝五符張釋之傳安知尺籍五符注軍士五五相保之符信也迫便㫖以强顔申牢辭而俟命有勤嘉勞更重愧情伏惟某官亷平帥先宣帝紀吏不亷平則治道衰中和宣布平生無襦今五袴民則幸哉竝見前屢薦入朝乃一麾公為淹矣文選屢薦不入官一麾乃出守有憐諭蜀老之檄安用假齊王之封和𠂻巳藉於同寅竝見前遺使若為而旁午霍光傳使者旁午詳見前三夏元侯之享固使臣不敢與聞左傳穆叔如晉公奏肆夏之三不拜曰三夏天子所以享元侯也使臣不敢與聞五物衆庶之詢以夫家辨其可任周禮鄉大夫之職各掌其鄉之政教禁令以嵗時登其夫家之衆寡辨其可任者以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞此謂使民興賢出使長之使民興能入使治之豈謂京兆之五日見前亦蒙郇國之朵雲韋陟傳常以五采箋為書記使侍妾主之具裁答授意而已皆有楷法陟唯署名自謂所書陟字若五朵雲時人慕之號郇公五雲體某正爾循牆左傳三命而俯循牆而走期於弛擔左傳齊侯使敬仲為卿辭曰羇旅之臣若獲宥弛于負擔君之惠也又息肩弛擔於濟代之間籍吏民封府庫以待將軍見前顧草木望林巒請回俗駕北山移文望林巒而有失顧草木而若喪又請回俗士駕為君謝逋客四六標準卷二十一
