body:
  text: 四六標準卷三十二宋李劉撰州官詳各題下通宋簽判億赴寧鄉簿作宋太平興國中以贊善大夫十五員充諸州節度判官以王化基韋亶武元潁等為之蓋太宗以諸州戎幕缺官選朝士補之俾分理事且試其才此簽判所由始也蓋選人則為判官京官則為簽判總理諸案文移斟酌可否以白於其長而罷行之今按通判為州佐簽判為州幕官此宋制也近有為别駕者自恥通判之名題郵舍云簽判某府事而不知簽判之非通判也夏蟲不可語氷信哉一官走俗指囊粟以媚饑文選走塵容抗俗狀東方朔傳朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺餘亦奉一囊粟錢二百四十朱儒飽欲死臣朔饑欲死千里懷賢望嶺梅而傾渴世說魏武帝與軍士失道大渴而無水遂令曰前有梅林饒子甘酸可以止渴士卒聞之皆口中水出遂得及前源也山谷詩空餘見賢心忍渴望梅嶺將為半面之張本春秋昭公二十五年秋七月上辛大雩季辛又雩公羊傳言上辛者為下辛張本左傳注豫為後地曰張本隱十一年王取鄢劉注為桓五年從王伐鄭張本荀嵩傳左邱明張本繼末發明經意多竒偉餘見前請先三祓以修辭祓敷勿切說文除惡祭也徐曰祓之言拂也周語祓除其心注猶拂也恭惟某官天韻浚明風華膚敏不自多其閥閲見上卷白教授條必身致於功名鳳覽德輝下之則宜巢閣賈誼傳鳳凰翔於千仞兮覽德輝而下之巢閣見上卷麟為聖人出也而乃在郊昌黎獲麟解麟為聖人出也聖人者必知麟禮斗威儀君乘金而王其政平麒麟在郊荀子古之王者其政好生惡殺麟在郊野自古多才莫若湖南之賓客昌黎送楊支使序有問湖南之賓客者愈曰知其客可以信其主者宣州也知其主可以信其客者湖南也去年冬奉詔為邑於陽山然後得謁湖南之賓客於幕下於是知前之信之也不失矣得公為重已空冀北之士夫昌黎送溫處士赴河陽軍序東都固士大夫之冀北也朝取一人焉拔其尤暮取一人焉拔其尤若是而稱曰大夫烏公一鎮河陽而東都處士之廬無人焉豈不可也無久紅蓮之依恐有青藜之照俱見前某偶逃飲墨通典北齊選舉多沿後魏之制天子常乘輿出坐於朝堂中楹秀孝各以班草對字有脫誤者呼起立席後書有濫劣者飲墨水一升文理孟浪者奪席脫容刀東坡詩麻衣如再著墨水真可飲注云唐嚴選舉之法棘圍舉人至渴有飲墨水者開寶通禮北齊朝㑹儀諸郡守勞訖陳土宜字有謬誤及書跡濫劣者必令飲墨水一升遂得勾朱羅隱寄剡縣主簿詩金庭養真地朱篆勾稽官仕有時乎為貧惟㑹計當而已矣學然後知不足願教誨式穀似之禮記學然後知不足教然後知困知不足然後能自反也知困然後能自強也詩螟蛉有子蜾嬴負之教誨爾子式穀似之注螟蛉桑蟲也蜾嬴細腰蜂也負持也式用穀善也位在域中無非有常也所以為無常者桑蟲自有子而蠮螉負而養之以成已子若有聖德者能訓誨爾之萬民用善道則似之矣此借用通臨安趙簽判崇實天府元僚亦既入芙蓉之幕南齊書蕭緬與王儉書曰盛府元寮實難其選庾景行泛緑水依芙蓉何其麗也四六集營開楊柳幕展芙蓉冰臺末屬何幸託桃李之場韋應物詩氷壺幕下清劉向傳同姓末屬山谷詩江梅有佳實託根桃李場謂已納交遂忘執贄荀子周公曰吾所執贄而見者十人還贄而見者三十人貌贄之士百餘人敢圖銜袖之禮韓文文書銜袖適重斂袵之慙張良傳楚必斂衽而朝說文衽衣䘳也或作袵恭惟某官卓爾宗英濟之世美平氏之與韋氏僅聞閥閲之傳平當傳漢興唯韋平父子至宰相周公之謂魯公宜襲勳勞之舊禮記成王以周公為有勳勞於天下注王功曰勳事功曰勞俯試一同之治左傳天子之地一圻列國一同周禮小司徒井牧其田野注疏引司馬法曰十成為終終千井十終為同同方百里萬并疏云取象震驚百里所聞同故名百里為同考工記匠人為溝洫方百里為同迄騰三異之聲魯恭傳拜中牟令郡國螟傷稼犬牙緣界不入中牟河南尹袁安疑其不實使仁恕掾肥親往廉之恭隨行阡陌有雉過其傍傍有童兒親曰兒何不捕之兒言雉方將雛親瞿然而起曰蟲不犯境此一異也化及鳥獸此二異也童子有仁心此三異也還府具以白安故國蓋有世臣藉未取苴茅之賞漢雜事天子太社以五色為壇封諸侯者取其土苴以白茅授之各以所封方之色以立社於其國故謂之受茅土苴通作蒩說文茅藉也禮曰封諸侯以土蒩以白茅他人不如同姓自應聨棠棣之輝詩豈無他人不如我同姓又棠棣之華鄂不韡韡凡今之人莫如兄弟顧甘僉舍之勞來借神臯之潤張衡西京賦實為地之奧區神臯雲飛川泳是為近咫尺之天韓文志同而氣合魚川泳而鳥雲飛餘見前海運風摶行即擊三千之水莊子是鳥也海運則將徙於南冥鵬之徙於南冥也水擊三千里摶扶搖而上者九萬里某濫塵吏底缺效恭先倒著白接籬所愧反躬之未稱山簡傳簡鎮山陽唯酒是耽多之習氏池上置酒輒醉名之曰高陽池時有童兒歌曰山公出何許往至高陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接籬白接籬巾也詩彼其之子不稱其服報之青玉案更慚出吻之無竒四愁詩美人遺我錦繡段何以報之青玉案韓文每營度欲出口吻聲鳴益悲操筆欲書將下復止竟亦不能竒也回費簽判出易地借材詰朝入幕左傳詰朝相見注明早也謝靈運詩整駕辭金門命旅惟詰朝遷于喬木可見主人之相知昌黎送楊支使序羣與博之為人吾知之道不行於主人與之處者非其類雖有享之以季氏之富不一日留也愈未嘗至宣州而樂頌其主人之賢者以其取人信之也陟彼高岡良勞君子之于役詩陟彼高岡我馬𤣥黃又君子于役不知其期恭惟某官典刑勝士陳後山詩江西勝士與長吟文獻故家子弟欲其自佳不顯亦世謝𤣥傳子弟亦何預人事而正欲使自佳詩凡周之士不顯亦世世之不顯厥猷翼翼注凡周為臣之士豈不有顯德乎亦得繼世食祿公侯必復其始無競維人左傳公侯子孫必復其始詩無競維人四方其訓之注無彊乎維得賢人也得賢人則國家彊矣暫兹泛緑以依紅見前行矣紓青而拖紫揚雄傳紆青拖紫朱丹其轂魏略紓青拖紫以千萬為數晉書儒林傳序莫不紓青拖紫服冕乘軒沈隱侯集自兹以降懷青拖紫崇基巖巖長瀾瀰瀰卞彬蝦蟇賦紓青拖紫名為蛤魚某濫乘一障韓文上希卿大夫之位下猶取一障而乘之正窘百罹詩我生之初尚無為我生之後逢此百罹說文罹心憂也又遭也置也爾雅毒也注云憂思慘毒通作離屈原離騷言遭憂也又叶良何切詩逢此百罹尚寐無訛盧諶詩五臣奚與契闊百罹身經險阻足蹈幽遐互見前欣聞主畫之良將有䝉成之託薛宣傳屬縣各有賢君馮翊埀拱䝉成集思廣益何幸承賢者之來同寅協恭所望有忠焉之告見前回史簽判文舒徽本缺今補一麾出守逺從戍於安南安南古南交之地東漢至隋唐為交州唐調露初改安南都護府同官為僚幸留良於冀北左傳同官為僚吾嘗同僚敢不盡心乎韓文伯樂知馬遇其良輒取之羣無留良焉東都固士大夫之冀北也有勤下問尤佩高情恭惟某官業茂家傳美由世濟人人宗眉山之學惟其有之見前字字出史籕之餘由來久矣籀直又切後魏書周宣王太史史籀著大傳十五篇與古文或同或異時人即謂之籕書漢藝文志史籕十五篇注周宣王太史作大篆十五篇建武時亡六篇矣漢元帝紀多材藝善史書應劭曰史籕所作大篆許后傳善史書後安帝紀好學史書和帝稱之注史書者周宣王太史籕所作之書也可以教童幼薛宣傳日至吏以令休所繇來久翼奉傳所繇來久不改其本兹屈糟邱之隱六韜殷君為酒池回船糟邱而牛飲者三千人南史陳暄嗜酒復兄子書曰速營糟邱吾將老焉李詩壘麯使築糟邱臺且兼冰幕之游韋應物詩文苑臺中妙冰壺幕下清衆皆醉而我獨醒是亦為政屈原漁父世人皆濁我獨清衆人皆醉我獨醒人有酒而身無事定不廢書韓詩何人有酒身無事誰家多竹門可款注後漢孔融嘗曰坐上客常滿尊中酒不空吾無事矣某一障是乘再鼓甚淡韓詩有琴具徽絃再鼓聽愈淡思元賓而不見良欣子弟之自佳昌黎答李秀才書李觀元賓示愈别吳中故人詩六章其首章則吾子也元賓既歿其文益可貴重思元賓而不見見元賓之所與者則如元賓焉餘見上條待崔羣以相親尚幸朋友之責善昌黎與崔羣書所以如此云云者以為足下賢者宜在上位託于幕府則不為得其所是以及之乃相親重之道耳非所以待足下者也回權僉判李司法申子宋沿唐制諸州置司法參軍掌議法斷刑品同司户被命帥連禮記十國以為連連有帥屈參郡畫聞風已久幸分鄰壁之光史記甘茂傳茂之亡秦奔齊逢蘇代代為齊使于秦甘茂曰臣聞貧人女與富人女㑹績貧人女曰我無以買燭而子之燭光幸有餘可分我餘光無損子明而得一斯便焉今臣困而君方使秦而當路矣願君以餘光振之戰國策甘茂亡秦且之齊出關遇蘇子曰江上處女有家貧而無燭者處女相與語欲去之無燭者謂處女曰妾以無燭故常先至掃室布席何愛於餘明之照四壁者幸以賜妾何妨於處女列女傳齊女徐吾者東海上貧婦人其鄰婦李吾之屬合燭夜績徐吾燭不屬李吾曰徐吾燭數不屬請無與夜績徐吾曰一室之中益一人燭不為益明去一人燭不為益暗何愛東壁餘光西京雜記匡衡勤學而無燭鄰舍有燭而不逮衡乃穿壁引其光以書映光而讀之李詩願假東壁輝餘光照貧女駱賓王啓分其斗水濟濡沫之枯鱗惠以餘光照孀棲之寒女易地此來良覺賓筵之重詩賓之初筵韓詩賓筵盡狐趙恭惟某官蟠根奕葉杜詩仙李蟠根大猗蘭奕葉光騰茂蜚英司馬相如傳蜚英聲騰茂實古錦為囊非瓦棺之竒詭新唐書文藝傳李賀字長吉七歲能辭章每旦日出騎弱馬從小奚奴背古錦囊遇所得書投囊中及暮歸足成之母使婢探囊中見所書多即怒曰是兒當嘔出心乃已耳辭尚竒詭所得皆驚邁絶去翰墨畦徑當時無能效者杜牧李賀集序瓦棺篆鼎不足為其古也時花美女不足為其色也詳見前飛霞有佩足金薤之灮芒昌黎調張籍詩李杜文章在光焰萬丈長平生千萬篇金薤垂琳琅顧語地上友經營無太忙乞君飛霞佩與我高頡頏胡為繡節之家宋三朝志金節隋制也黑膝竿上施圓盤周綴紅綜拂八層黃繡龍袋籠之王公以下皆有節制同金節韜以碧油猶屈墨曹之椽杜氏通典兩漢有决曹曹椽主刑法歷代皆有或謂之賊曹法曹墨曹隋唐為參軍書佐唐掌律令定罪盜賊贓贖之事宋沿唐制諸州置司法參軍掌議法斷刑取青嫓白諒必工進取之文柳文模擬鼠竊取青嫓白肥皮厚肉柔筋脆骨詳見前泛緑依紅何足留軒騰之步曾南豐詩赤雲助軒騰此州斗絶竇融傳河西斗絶在羌胡中五峯高峻故云蜀志蜀土斗絶一隅山谷詩莫嫌斗絶無來往每事冰寒兹乃得君子之僚韓文留守無事多君子僚必能圖仁人之利左傳仁人之言其利溥哉某強顔乘障束手面牆尚書不學牆面涖事惟煩倒屣相迎何幸一賢之入幕魏志王粲傳獻帝西遷粲徙長安蔡雍見而竒之時雍才學顯著貴重朝廷常車騎填巷賓客盈坐聞粲在門倒屣迎之屣或作屣謂履不躡跟韻府羣玉倒屣注下併引世說王右軍夫人謂二弟曰王家見二謝傾筐倒屣不知原本作倒庋庋舉綺切閣藏食物也與傾筐連言意自可見二音不收之庋字注而強附屣字何憒憒歟然宋葉廷圭海録碎事亦作傾筐倒篋則非倒屣明矣同舟共濟庶無百姓之填溝孔叢子吳越之人同舟濟江中流遇風波其相救如左右手者所患同也詳見第一卷回權僉判李司法申子比沐袖箋已感再三之意兹承祓籕又貽四六之文韻㑹祓潔也徐曰祓之為言拂也周禮祓除其心注猶拂也籕蓋指印文祓籕猶云洗印也新唐書百官志上三日洗印視其刓缺此言祓籕猶言洗印也良感勞謙易勞謙君子有終吉注上承下接勞倦于謙亦幾迷復易迷復凶注以迷求復故曰迷復此借用恭惟某官臨卭重客司馬相如傳臨卭多富人卓王孫僮客八百人程鄭亦數百人乃相謂曰令有貴客為具召之高帝紀善沛令辟仇從之客因家焉沛中豪傑吏聞令有重客皆往賀成紀故家漢書李廣隴西成紀人也仲元在夷惠之間席珍審矣法言或問子蜀人也請人曰有李仲元者人也其為人也奈何曰不屈其意不纍其身曰是夷惠之徒與曰不夷不惠可否之間也黃瓊傳不夷不惠可否之間蓋聖賢居身之所珍也蜀志秦宓傳王商為嚴君平李𢎞立祠宓與書曰足下為嚴李立祠可謂厚黨勤類者也觀嚴文章冠冒天下由夷逸操山嶽不移使揚子不歎固自昭明如李仲元不遭法言令名必淪其無虎豹之文故也葉少藴避暑録云李仲元與嚴君平鄭子真為一等人顔師古以三輔决録君平名遵子真名朴獨仲元名不傳及讀蜀志始知名𢎞惜其行事不著爾禮記儒有席上之珍以待聘注席陳也珍善也鋪陳往古堯舜之善道以待聘召太白落羌渝之上袍繡謂何李詩峩眉山月半輪秋影入平羌江水流夜發青溪向三峽思君不見下渝州李白傳白浮游四方嘗乘月與崔宗之自采石至金陵著宫錦袍坐舟中旁若無人如聞飽曲禮之三千今復探直筆之數萬直筆謂春秋司馬遷傳春秋文成數萬其指數千詳見第十四卷大廷奉天人之對固利春秋董仲舒傳仲舒對曰陛下發德音下明詔求天命與性情皆非愚臣之所能及也臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也廣殿對日月之明今條禮樂夏竦詩殿上衮衣明日月硯中旗影動龍蛇縱橫禮樂三千字獨對丹墀日未斜拾芥不難於取紫夏侯勝傳經術茍明其取青紫如俯拾地芥耳泛蓮寧久於依紅南史廋杲之傳泛緑水依芙容詳見前肯為某來徒得君重汲黯傳吾徒得君重某濫兹主畫正爾䝉成薛宣傳屬縣各有賢君馮翊垂拱䝉成三沐三薰之初何事於三語韓文方將坐足下三浴而三熏之三語椽阮瞻事詳見前同姓同業也尚有望于同寅韓文同姓而近也同業也詳見前回郭僉判仲洪偏城假守凜虞末路之難臧洪傳論偏城既危曹袁方睦杜詩宇宙蜀城偏李燾詩偏城越雋東戰國策詩云行百里者半於九十此言末路之難二郡得賢所託初筵之重詩賓之初筵注賓之初入門以至升筵未遑􅐹記􅐹即往字揚雄傳因江潭而􅐹記兮又橫江湖以南􅐹互見前先辱飛箋恭惟某官學富家傳美優世濟林宗砥礪之節壯若山淵蔡伯喈郭有道碑文先生諱泰字林宗砥節礪行直道正辭貞固足以幹事隱括足以矯時於是樹碑表墓昭銘景行其辭曰於休先生明德通𤣥純懿淑靈受之自天崇壯幽浚如山如淵子儀金石之忠貫於日月舊唐書郭子儀傳德宗詔曰公柱石四朝藩翰萬里忠貞縣於日月寵遇冠於人臣贊曰猗歟汾陽功扶吳倉秉仁蹈義鐵心石腸新唐書郭子儀傳贊雖唐命方永亦由忠貫日月神明扶持者哉互見前其在遙遙之胄南史何昌寓傳為吏部尚書有客姓閔求官昌寓問君是誰後答曰子騫後昌寓團扇掩口笑曰遙遙華裔互見前諒餘挺挺之風魏謨傳挺挺有祖風烈詳見前四國于蕃寧止三令尹而無喜詩四國于藩注四國有難則往捍禦之為之藩屛五年須假顧方半刺史而同流尚書天惟五年須暇之子孫此借用晉書庾亮答郭豫書別駕舊與刺史别乘同宣王化於萬里之外其任居刺史之半安可用非其人惟時三榮榮州曰三榮詳見前強號一障蠱小有悔無咎尚可爬梳易幹父之蠱小有悔無大咎注以剛幹事而無其應故有悔履得其位故終無大咎爬蒲巴切搔也韓文進學解爬羅剔扶送鄭尚書序蜂屯蟻雜不可爬梳井居其所而遷竟難回斡繫辭井居其所而遷正義云言井卦居得其所恆住不移而能遷其潤澤施惠於外也斡烏括切廣韻轉也增韻旋也又古緩切音與管同運也轉也賈誼傳斡流而遷又斡棄周鼎食貨志斡鹽鐡又斡山海之貨求牧與芻而不得無麵造餅之滋難陳後山詩巧手難為無麵餅誰能留渴待逺并何幸别駕之來將賴同舟之助見前相勉以忠義宜兩家子弟之通知韓文張中丞傳後敘兩家子弟材智下不能通知二父志以為巡死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳衆望為神仙詎千載風流之敢繼郭太傳見河南尹李膺膺大竒之遂相友善於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟衆賓望之以為神仙焉東坡詩典刑存故老樽俎繼風流第恐飛黃之服皂淮南鴻烈解昔者黃帝治天下鳳凰翔於庭麒麟游於郊青龍進駕飛黃服早注飛黃乘黃也符瑞圖騰黃者神馬也王者輿服有度則出其色黃一名乘黃亦曰飛黃或作古黃或曰翠黃一名紫黃其狀如狐背上有兩角出白民之國日行萬里乘之壽三千歲萬畢術天下有道飛黃服皂誰能泛緑以依紅某昔未借交今欣聨事瓊瑶匪報永以為好也敬飭魚緘竝見前珠玉將至得無修容乎惟占騎氣漢書卒氣騎氣徒氣白土功氣黃車氣乍高乍下往往而聚騎氣卑而布卒氣摶回郭僉判仲洪函牘相先已佩再三之意袖箋為況更勤四六之文況通作貺魯語況使臣以大禮賜也武帝紀天地況施又拜况於郊宋謝伋四六談麈云韓子蒼為舍人曾公衮以啓賀之韓答云舊知四六之工彌起再三之歎則知此聮所由來矣損惠稠重重傳容切音與蟲同復也增韻疊也訟慚襞襀襞襀衣閒踧也通作積司馬相如傳襞積衣皺注即今之羣褶張衡思𤣥賦美襞積以酷裂兮損訟卦名恭惟某官西岷秀望左思蜀都賦於西則右挾岷山湧瀆發川南史王雅傳帝以恭等為當時秀望東郭故家東郭氏為齊公族桓公之後宰松桂之林良多美最韓詩出宰山水縣讀書松桂林泛芙蓉之幕似鬱壯圖杜詩居然屈壯圖佇自民庸式遄王覲某幸兹聨事甫此識賢凋郡蕭然正有望忠焉之誨韓文豈無凋郡庸以自效佳賓戾止或可容拙者之歸回趙僉判卨行吟憔悴忽玷竹符屈原漁父行吟澤畔顔色憔悴坐嘯從容將依蓮幕後漢書南陽太守岑公孝𢎞農成瑨但坐嘯方圖􅐹記揚雄傳因江潭而􅐹記兮遽辱鳴謙易謙上六鳴謙注但有聲鳴之謙恭惟某官學富家傳材優時措成季之勳有後夙載英聲左傳成季之勳宣孟之忠而無後為善者其懼矣成季趙衰也有保護文公之勳宣孟趙盾也有扶翊晉國之忠廣漢之政甚高宜躋膴仕趙廣漢傳長老傳以為自漢興以來治京兆者莫能及顧紆僉贊良鬱師言鴻漸于磐聊復爾耳易鴻漸于磐飲食衎衎吉正義云馬季長云山中石磐紆故稱磐也鴻水鳥山石非所集但取以應漸高之義阮咸傳未能免俗聊復爾耳北史慕容紹宗自云有水厄自投於水冀以厭當之房豹以為言紹宗曰不能免俗為復爾耳鵬怒而翼其孰禦之莊子怒而飛其翼若垂天之雲某出幕星終左傳一星終矣詳見前得州斗大見前於焉嘉客定非圖利于大夫詩所謂伊人於焉嘉客注為不知所適之辭韓文使先生無圖利於大夫而私便其身圖及爾同僚尚冀頗哀於老子詩我雖異事及爾同僚注言我雖與汝異其所職之事要乃與汝同其官僚馬援傳頗哀老子使得遨遊通潭州于節推晉宋沿五代之制諸州置判官推官各一人謂之節推者蓋唐州牧之官為節度觀察諸使而其屬官有推官判官書記支使之屬至宋而節度觀察特為貴官之虛名初不預方嶽之事而州牧之任自有閫帥漕憲等官各有掾屬若唐節度觀察之屬官反為列郡之元僚蓋雖冒以節度推官觀察推官等名實郡寮耳潭州即今長沙府詳别見詳啓意是任寧鄉簿時作數淮右之衣冠高門以世于定國傳定國父于公其閭門壞父老方共治之于公謂曰少高大門閭令容駟馬高蓋車我治獄多隂德子孫必有興者至定國為丞相子永為御史大夫封侯傳世云謁湖南之賓客上幕其人韓文去年冬奉詔為邑於陽山然後得謁湖南之賓客於幕下眇焉枳棘之棲仰止芙蓉之幕幕字復上不容禮後請以書先恭惟某官服襲典刑飛騰聲實莽西北三邊之警李嶠詩莫驚開百鍊特擬定三邊岌東南一尉之危揚雄傳東南一尉西北一侯孟康曰㑹稽東郡都尉也此借用誠死君上誠死封疆言之易耳賈誼傳故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄扞敵之臣誠死城郭封疆故曰聖人有金城者此物此志也今為妻子今為窮乏去者紛然能障狂瀾韓文障百川而東之回狂瀾於既倒可知徑草南史庾仲達為明帝府佐廢帝景和中明帝疑防賓客故人無到門者唯仲達朝謁不替明帝即位謂曰卿所謂疾風知徑草蕭瑀傳疾風知徑草版蕩識誠臣章交甚盛召擢宜優猶出依緑水之光殆斜取青雲之勢劉禹錫詩青雲直上無多路却作斜飛取勢回天地亦大矣㑹當録德而計功人物方眇然願思任重而致逺見前某因貪蝗粟白樂天詩是時斗粟錢三百蝗蟲之價與粟同為養蝨官見前今兩府之高士不為乃甘為此孫寶傳今兩府高士俗不為主簿子既為之詳見前後五日之孺子可教幸卒教之張良傳孺子可教矣後五日平明與我期此回吳節推澄代月湖蓮緑水之風流於焉嘉客詩所謂伊人於焉嘉客詳見前瓜青門之瓠落似是昔人史記邵平故秦東陵侯秦滅後為布衣種瓜長安城東種瓜有五色甚美故世謂之東陵瓜也又云青門瓜青門東陵也莊子瓠落無所容非不咢然大也吾為其無用而拮之薻翰惠然詩惠然肯來故情厚甚恭惟某官浚明其質膚敏於材錐之處囊中久於見穎羅而致幕下信矣拔尤聊秩初筵並見前即騰夷路韓詩出門各有道我道方未夷某罔功於國歸老是邦龎公入城或奉笑談之適後漢書逸民傳龎公者南郡襄陽人也居峴山之南未嘗入城府夫妻相敬如賓荆州刺史劉表數延請不能屈乃就候之後擕妻子登鹿門山因採藥不返楊儀在幕正觀聲實之流韓文送楊儀之支使歸湖南序儀之智足以造謀材足以立事忠足以勤上惠足以存下而又侈之以詩書六藝之學先聖賢之德音以成其文以附其質宜乎從事於是府而流聲實於天朝也回李節推欽十年别德謂已遡紫而凌清唐李肇翰林志時以居翰苑皆謂凌玉清遡紫霄豈止於登瀛洲哉一榻延賢今顧依紅而泛緑徐稚傳稚字孺子豫章南昌人屢辟公府不起時陳蕃為太守不接賓客唯稚來特設一榻去則縣之餘見前有勤委贄良愧過情恭惟某官學有家傳才宜時措仙李盤根猗蘭奕葉夙高通德之門杜詩仙李盤根大猗蘭奕葉灮鄭𤣥傳國相孔融深敬于𤣥曰昔東海于公僅有一節猶或戒鄉人侈其門閭矧乃鄭公之德而無駟牡之路可廣開門衢令容高車號為通德門椒蘭其臭芙蓉為裳宜待承明之詔離騷經覽椒蘭其若兹兮又况揭車與江籬又製芰荷以為衣兮集芙蓉以為裳繫辭其臭如蘭嚴助傳厭承明之廬張晏曰承明廬在石渠閣外直宿所止曰廬東方朔傳令待詔公車顧勞主畫暫屈賓僚川泳雲飛此豈容於暖席韓文志同而氣合魚川泳而鳥雲飛詳見前幕開風動佇即拜於溫綸郗超傳風動帳開詳見前某再守竹符獲依梓里詩維桑與梓必恭敬止同姓也故人也惟是焉依韓文同姓而近也同業也同道也故人也左傳周之東遷晉鄭焉依儀圖之愛助之尚期無隱見前通潭州趙察推汝倕察推所謂觀察推官也詳見前詳啓意簿寧鄉時作下邑椽曹之卑謬兹祭竈孫寶傳署寶主簿寶徙入舍祭竈請比僚上府元僚之重正爾秩筵南史庾杲之傳盛府元僚實難其選詩賓之初筵左右秩秩傳秩秩肅敬也妄欲託桃李之場山谷詩托根桃李場盍起敬芙容之幕庾杲之傳泛緑水依芙容恭惟某官身端行治學廣聞多禮樂宗英其賢城也逺矣漢書敘傳河間賢明禮樂是修為漢宗英新唐書李績傳太宗嘗曰煬帝不擇人守邊勞中國築長城以備虜今我用績守并突厥不敢南賢長城逺矣詩宗子維城左傳何城如之詩書元帥以禮羅而致之左傳晉謀元帥趙衰曰郤縠可說禮樂而敦詩書韓文以禮為羅羅而致之幕下湖南之客多賢姑紉蘭芷韓文當今藩翰之賓客唯宣州為多賢有問湖南之賓客者愈曰知其客可以信其主者宣州也知其主可以信其客者湖南也離騷經扈江蘺與辟芷兮紉秋蘭以為佩天祿之書當校行薄蓬萊漢書天祿石渠注三輔故事曰天祿石渠並在未央殿北以藏祕書漢宫閣疏天祿麒麟蕭何造以藏祕書處賢才西都賦天祿石渠典籍之府西京賦天祿石渠校文之處東京賦內有天祿宣明揚雄傳校書天祿閣上王子年拾遺記劉向成帝末校書天祿閣隋經籍志哀帝令向子歆嗣父之業乃徙溫室中書於天祿閣上歆遂總羣篇撮其指要著七略大凡三萬三千九十卷後漢書注天祿獸也鄧州南陽縣北有宗資碑旁有兩石獸鐫其膊一曰天祿一曰辟邪閣蓋因獸立名華嶠後漢書學者以東觀為老氏藏室道家蓬萊山某弄筆得官左思咏史詩弱冠弄柔翰注柔翰筆也婁敬傳齊奴以舌得官代耕求祿輕舟主簿奈何淩萬頃之茫杜陵寄唐興劉主簿弟詩分手開元末連年絶尺書江山且相見戎馬未安居劎外官人冷關中驛騎疏輕舟下吳㑹主簿意何如東坡赤壁賦縱一葦之所如凌萬頃之茫然叢桂王孫或者哀衆芳之穢劉安招隱士桂樹叢生兮山之幽偃蹇連卷兮枝相繚王孫遊兮不歸春草生兮萋萋屈原離騷經雖萎絶其亦何傷兮哀衆芳之蕪穢回新武岡王判官之經官制詳通潭州于節推條駕丹桂之梯夙聞香譽孟浩然詩桂枝如已折早逐鴈南飛李白詩欲折一枝桂還來鴈沼前岑參詩洛陽才子能幾人明年桂枝是君得皇甫冉詩共許卻詵工射策恩榮請向一枝看周墀詩雖欣月桂居先折更羡春蘭最後榮姚鵠詩登龍舊美無斜徑折桂新榮盡直枝東坡詩蟾枝不獨同攀林宋葉少藴避暑録話云世以登科為折桂此為卻詵對策東堂自云桂林一枝也自唐以來用之溫庭筠詩云猶喜故人新折桂自憐羈客尚飄蓬其後以月中有桂故又謂之月桂而月中又言有蟾故又改桂為蟾以登科為登蟾宫用卻詵事固已可笑而展轉相訛復爾然文士亦或沿襲因之弗悟也唐黃滔御試詩已表隋珠各自擕更從瓊殿立丹梯杜詩著處覓丹梯又青雲不可梯依紅蓮之幕兹屈英游枚乘傳與英俊竝游先辱朋箋獸二為友貝二為朋朋箋言二箋也詩朋酒斯饗毛傳兩尊曰朋良高僚誼恭惟某官負才膚碩蓄德奫沄奫紆倫切水深貌李漢韓文序奫泫澄深方云泫音𤣥郭璞江賦云瀇滉囦泫是也或作沄非是早收名第於摘髭韓詩連年收科第若摘頷下髭盍徑要津而策足選詩何不策高足立登要路津顧由倉庾東坡詩一官倉庾真堪老坐看松根落斷崖欲試絃歌㑹外臺重黔巫之邦後漢書注謁者為外臺柳文武岡銘黔山之巑巫水之磻以一賢任溫石之責見前使者持斧既已加桑梓之恭武帝紀遣直指使者暴勝之等衣繡衣持斧分部逐捕注謂建持之以為威詩維桑與梓必恭敬止注凡人父之所樹者維桑與梓見之必加恭敬之止况父身乎賓之初筵必有入蘋蘩之薦詩于以采蘩于沼于沚于以用之公侯之事又于以采蘋南澗之濱某一寒寡與獨冷多畸見前涉筆負丞已慙記壁韓文藍田縣丞㕔壁記丞涉筆占位署又余不負丞而丞負余挈瓶假守更使捫參左傳雖有挈瓶之知守不假器參壁宿名猶幸勝士之肯來羊祜傳賢達勝士陳後山詩江西勝士與長吟詩惠然肯來或望餘光而後去百聞不如見面未易立談趙充國傳百聞不如一見揚雄傳或立談而封侯同僚敢不盡心尚希愛助左傳吾嘗同寮敢不盡心乎回榮州羅推官聞琳琅之譽愧未盍簪晉書文苑傳羅舍字君章桂陽來陽人也少有志尚嘗畫臥夢一烏文彩異常飛入口中自此後藻思日新刺史庾亮以為部江夏從事太守謝尚與含為方外之好乃稱曰羅君章可為湘中之琳琅劉禹錫送王師魯赴湖南幕詩素風傳竹帛高論聘琳琅易勿疑朋盍簪注盍合也簪疾也疏若能不疑於物以信待之則羣朋合聚而疾來也王荆公詩天涯無路合朋簪六一居士詩惜豫不與朋盍簪賓玳瑁之筵幸聞命駕史記趙使於春申君欲誇楚為玳瑁簪劒器悉飾以玳瑁杜牧送杜顗赴潤州幕詩還須整頓韋弦佩莫獨矜誇玳瑁簪劉禹錫送陸侍御歸淮南幕詩歸路芙蓉幕離堂玳瑁筵王荆公詩難追老圃莓苔徑空對珍盤玳瑁筵鼎來儷語益仞高情恭惟某官子貢高門晉書羅憲字令則襄陽人父䝉蜀廣漢太守憲年十三能屬文早知名師事譙周周門人稱為子貢封西鄂侯諡曰烈文立傳立師事譙周門人以立為顔回陳壽李䖍為游夏羅憲為子貢公逺仙裔段成式酉陽雜俎𤣥宗學隱形於羅公逺或衣帶或巾腳不能隱上詰之公逺曰陛下未能脫屣天下而以道為戲若盡臣術必懷璽入人家將困於魚服也帝怒慢罵之公逺遂走入殿柱中極疏上失上愈怒令易柱破之復大言於石磶中乃易磶觀之明瑩見公逺形在其中長寸餘因碎為十數段悉有公逺形上懼謝焉忽不復見後中使於蜀道見之公逺笑曰為我謝陛下鄭綮開天傳信記上怒命力士裹以油幞置榨木下壓殺埋弃之不旬日有中使自蜀道回逢公逺於路乘騾笑謂使者曰上之為戲一何虐耶新唐書方伎傳太平廣記皆載此事公逺作思逺扶搖三萬里謂立致於要津莊子水擊三千里摶扶搖而上者九萬里杜詩立登要路津才名四十年胡尚淹於選穽暫此依紅而泛緑並見前亟其曵紫以紆朱後漢書宦者傳序高冠長劍紆朱懷金某濫守麾符正資幕畫選詩婉婉幕中畫戒行李載書冊幸疾其驅韓文送石處士序宵則沐浴戒行李載書冊問道所由廣忠益集衆思無孤此意蜀志諸葛武侯教與羣下曰夫參署者集衆思廣忠益也若逺小嫌難相違覆曠闕損矣違覆而得中猶棄敝屩而獲珠玉也回羅推官萬里試郡叨分和義之麾榮州為齊南安郡隋以其地屬資陽又置大牢縣唐置榮州又改大牢為應靈州改和義郡後為榮州聨事為僚正藉友仁之益未遑􅐹記先沐蜚箋恭惟某官世德蟬聨蟬聮不絶貌揚雄傳有周氏之蟬嫣兮應劭曰蟬嫣連也吳都賦蟬聮陵邱韓詩𦙍胄本蟬聨器為駿發詩駿發爾私注欲民大耕發其私田此借用明經而拾地芥早題千佛之名見前舉瓢而酌天漿合上三神之島韓詩刺手拔鯨牙舉瓢酌天漿史記封禪書蓬萊方丈瀛洲此三神山者其傳在渤海中去人不逺顧未吟於芍藥謝朓直中書省詩紅藥當階翻蒼苔依砌上紅藥謂芍藥也尚小泛於芙蓉暖席未幾溫綸即下某重捫井絡濫領斗州井斗宿名同寅協恭和衷哉正須賢者罔利征商自始矣能弗誨乎瞻晤非遙敷陳罔既竝見前回新本州藺推官尊祖慕藺相如夙服題橋之志司馬相如傳名犬子相如既學慕藺相如之為人也更名相如華陽國志蜀城十里有升􅋖橋送客亭司馬相如初入長安題其門曰不乘赤馬駟車不過汝下從李虞部暫為入幕之賓一介未先一夫曰介左傳一介之使雙鱗厚甚鱗介借對恭惟某官美優世濟才應時須劉琨答盧諶書才生於世世實須才山谷詩持此應時須智囊衮衮以生風宋趙崇絢雞肋智囊秦樗里疾漢鼂錯東漢魯匡三國桓範晉杜預高僧傳支謙月氐人游漢境博覽經籍時人為之語曰支郎眼中黃形軀雖細是智囊王充論衡劉歆漢朝智囊筆墨淵海詳見前才刃恢恢而餘地見前初試神仙之隱五采宣威杜詩吏隱逢梅福遊山憶謝公李詩一尉居倐忽梅生有仙骨曹瞞傳太祖初入尉廨造五色棒懸門左右有犯禁者皆棒殺之張來送江尉詩堂堂名公後尚奮采棒威繼為法令之師片言平獄薛宣傳吏道以法令為師可問而知便合紆朱而拖紫沈隱侯集自兹以降懷青拖紫崇基巖巖長瀾瀰瀰餘見前條乃猶泛緑以依紅蕞爾三榮榮州有榮德榮黎榮隱山故名鄰於九頂九頂山名在今嘉定州隔江山有九峯曰鳳集棲鸞靈寶就日丹霞祝融擁翠望雲兑說㑹昌以前峯各有寺至宋惟存報恩一寺范石湖吳船録云泊嘉州渡江遊凌雲在城對岸山不甚高綿延有九山頭故又名九頂舊名青衣山青衣蠶叢氏之神也蘇子由初發嘉州詩巉巉九頂峯可愛不可住飛舟過山足佛腳見江滸舟人盡斂容競欲揖其拇俄頃已不見烏牛在中渚移舟近山隂峭壁上無路云有古郭生此地苦箋注區區辨蟲魚爾雅細分縷洗硯去殘墨遍水如黑霧至今江上魚頂有遺墨處覓物悲古人嗟此空自苦事頓異於昔者公胡為乎來哉李詩嗟爾逺道之人胡為乎來哉廣忠益集衆思國無陋矣戒行李載書冊豫日望之俱見前回榮州羅推官條某乘障非才觸藩無計易羝羊觸藩詳見前求牧與芻而不得專俟罪歸襆被束擔而未行或容晤語陸納傳臨發止有被襆而已魏舒傳被襆而出新唐書蘇瓌傳瓌單身被襆自將餘見前回武岡彭知録岊宋沿唐制州有録事參軍然不盡置也諸府為司隸諸州為録事乾興元年丁度請諸州始置録事參軍慶厯二年河西河東陜西諸州權令京官知録事參軍熙寧三年詔煩難去處録事參軍竝差職官知縣及奏舉縣令人充政和三年尚書省言州建六曹參軍參軍之稱起於行軍之際恐不當襲欲改為司録詔改為掾建炎初復舊名録事掌州縣庶務糾諸曹稽違乾道中汪大猷申請依司理例不兼他職從之共江西之水昔嘗附總屬之題名莊子激西江之水中興㑹要紹興十一年制凡總領官屬有幹當公事差遣分黔東之風今乃際糾曹而聨事黔其淹切武岡春秋戰國皆以巫黔中地史記蘇秦傳一軍出武岡一軍出黔中則邯鄲動矣張儀傳秦要楚欲得黔中地白起傳取楚定黔巫郡西夷傳略巴蜀黔中以西柳文黔巫東鄙分風謂為别駕白帖録事為糾司閻用之初為彭州參軍嘗攝録事一日糾愆繆不法數十事太守以為材韋蘇州詩糾郡南海湄未遑􅐹記已沐飛箋恭惟某官學裕家傳才優世用裕三世登科之記安俟金籯唐重科目鄭皓知舉帝索科目記皓撰十三卷自武德至大中仍乞今後放榜録及第人姓名記賦題進入有司按續編次此登科記之始韋賢傳遺子黃金滿籯不如一經如淳曰籯竹器受三四斗今陳留俗有此器續一門叔父之芳正須玉樹晉書列女傳一門叔父則有阿大中郎謝𤣥傳譬如芝蘭玉樹欲使其生於庭階耳竝詳見前顧厄銓曹之限不辭郡椽之卑竊聞文學之穰穰穰如陽切衆也詩降福穰穰一曰豐也又豐年穰穰足贊武岡之矯矯王導傳贊武岡矯矯匡時緝政操持綱紀自來喜見於朱絲少陵送韋諷閬州録參詩韋生富春秋洞徹有清識操持紀綱地喜見朱絲直行往樹佳政慰我深相憶明習憲章詎得久淹於丹筆馬周傳贊由一介草茅言天下事明習憲章若素官於朝㑹稽典録盛吉字君逺性多仁恩冬月罪囚當斷其妻執燭吉手丹筆夫妻相向垂泣不容暖席即對溫綸某教胄非才言為國録佐州何取言倅武岡督郵地忍儻未逐重聽之聾丞黃霸傳長吏許丞老病聾督郵白彼逐之霸曰許丞廉吏雖老尚能拜起送迎正頗重聽何傷白帖州主簿郡督郵並今録事參軍丙吉傳西曹地忍之李竒曰地猶第也師古曰地亦但也語聲之急耳録事天通固甘作折威之司馬新唐書杜景佺傳性嚴正為益州録事參軍時隆州司馬房嗣業徙州司馬詔未下欲即視事先笞責吏以示威景佺曰公持咫尺制真僞莫辨即欲攪亂一府敬業揚州之禍非此類耶叱左右罷去既乃除荆州司馬吏歌之曰録事意與天通州司馬折威風由是寖知名代回新嚴州郭知録伯長對北臺之馬耳自昔通家馬耳山在今諸城縣西南六十里形如馬耳東坡雪後書北堂壁詩試掃北臺看馬耳未隨埋沒有雙尖又孤雲落日在馬耳照耀金碧開煙鬟超然臺記云南望馬耳常山出沒隱見若近若逺庶幾有隱君子乎孔融傳先君孔子與君先人李老君同德比義而相師友則融與君纍世通家柳文王氏子與余通家代為文儒問南山之鳳雛乃今補掾襄陽記諸葛孔明為臥龍龎士元為鳳雛司馬德操為水鏡皆龎德公語也貽書勤甚喚夢凄然山谷詩為公喚起黃州夢恭惟某官詩禮磨礲枚乘傳磨礱底厲師古曰礱亦磨也韓文磨礱乎事業而奮發乎文章典刑服襲飲冰食蘖不忘先訓之勤莊子朝受命而夕飲冰白樂天詩三年為刺史飲冰復食蘖斂板折腰猶待糾曹之次南史到溉傳武帝與溉戲賭竒石并禮記溉並輸焉帝謂朱辨曰卿謂到溉所輸可以送未斂板對曰臣既事君安敢失禮擅道鸞春秋桓𤣥嘗詣㑹稽王道子已醉對𤣥張眼曰桓賊長史謝重斂板正色曰公廢昏立明功高社稷風塵之論宜絶聖聽餘見前三語之機相契阮瞻傳王戎問瞻曰聖人貴名教老莊明自然其㫖同異瞻曰將無同戎咨嗟良久即命辟之時人謂之三語掾詳别見五章之剡何難某星且拱辰日將入酉白樂天詩黃雞催曉午時鳴白日催年酉時沒伏波牀下敢當盛意之勤渠馬援傳援嘗有疾梁松來候之獨拜牀下援不答松去後諸子問曰梁伯孫帝壻貴重朝廷公卿已下莫不憚之大人奈何獨不為禮援曰我乃松父友也雖貴何得失其序乎子陵臺邊或恐歸舟之邂逅子陵釣臺在桐廬西南二十九里東西二臺各高數百丈許渾詩潮去潮來洲渚春山花如綵草如茵嚴陵臺下桐江水解釣鱸魚有幾人代回李知録短綆汲深聊備一人之數荀子短綆不可以及深井之泉知不幾者不可與及聖人之言史記平原君傳今少一人願君即以遂備負而行矣長箋委重何啻三語之多見上條受之赧然無可謝者恭惟某官持心近厚克敬惟刑見前京兆浩穰小大之獄難察張敞傳京兆典京師長安中浩穰於三輔為尤劇師古曰浩大也穰盛也言人衆之多也禮記必察小大之比以成之注小大猶輕重已行故事曰比參軍俊逸輕重諸罰有權司録即隋唐録事參軍杜詩俊逸鮑參軍胡致隆喜曹劉二從事見過詩蕭蕭細雨鎖柴門喜見風流二使君俊逸萬春猶録事清新子建尚參軍尚書輕重諸罰有權刑罰世輕世重注輕重諸罪各有權宜冒騰一鶚之章自笑匹雛之力譬之推轂信當遵平陸之塗然而盤根豈宜後朽株之木虞詡傳盤根錯節杜詩仙李盤根大鄒陽傳枯木朽株某儀圖莫助欲與同升惜露螢無自暖之灮莫分鄰壁李嘉祐螢火詩夜風吹不滅秋露洗還明李百藥咏螢火詩不辭逢露濕祇為重宵行梁元帝詠螢火詩著人疑不熱集草訝無煙願天馬有長驅之足早入帝間回楊司理蕃林司法木燕翼詔謀録今之司理參軍五代之馬部軍都虞候判官也以牙校為之州鎮專殺而司獄事者輕視人命太祖開寶六年詔州府竝置司寇參軍以新及第九經五經及選人資序相當者充之後改為司理參軍司法參軍即漢唐法曹墨曹掾宋沿唐制置司法參軍掌議法斷刑紹興三年權行減罷後復舊䝉恩佐郡慚非典午之材聨事為僚將有同寅之契方圖􅐹記已沐飛箋恭惟某官業履直溫風猷明浚補三語之椽暫屈通材竝見前培萬里之程盍躋要路韓詩孑孑萬里程佇由鶚表徑造鵷班某倚席罔功題輿非據竝見前别乘分月愧初無倡和之能竝見前同舟遇風幸不靳維持之助鄧析書同舟涉海中流遇風救患若一所憂同故也詳見前過此以往繫辭過此以往未之或知也未知所裁代回江隂趙司法崇價江隂軍已見桑榆晼晚又塵紫槖之班淮南子日西垂景在樹端謂之桑榆潘嶽賦日晼晚而將暮又老晼晚而將及注晼晚日落貌晉輿服志八座尚書荷紫以生紫為夾囊綴之服外加於左肩昔周公負成王制此服衣至今以為朝服竹素勤渠良感墨曹之意東觀漢紀劉向典校書先書竹為易刋定可繕寫者以上素慙無好語東坡詩山寺歸來聞好語又輦路歸來聞好語李賀詩沙路歸來聞好語莫報故人恭惟某官清出璇源顔延年詩玉水記方流璇源載圓折粹藏玉質頃者勾稽之試羅隱詩朱篆勾稽官藹然廉直之聲滿謂頡頏身結飛霞之佩韓詩乞君飛霞佩與我高頡頏不虞簸弄胎寒明月之珠韓詩婆娑海水南簸弄明月珠山谷詩貝宫胎寒弄明月佇積平反雋不疑傳有所平反如淳曰反音幡幡奏使從輕也入儀華要勉為國計益振家聲某壯不如人左傳燭之武辭曰臣之壯也猶不如人今老矣無能為也已老當佚我莊子勞我以生佚我以老聊復爾耳更穿振鷺之行阮咸傳未能免俗聊復爾耳詩振鷺于飛于彼西雍姑少遲之徑返屠羊之肆莊子王延屠羊說以三旌之位說不敢當願復返屠羊之肆詳見前代回全州劉司法全州已見西崦餘齡冒誤恩而還綴淮南子曰入崦嵫經于細柳入虞淵之地曙于䝉谷之浦日西垂景在樹端謂之桑榆東坡集荷先帝之誤恩乂計此誤恩必難安處綴株衛切音與惴同禮記行綴正義曰舞人行位之處東鄰厚意飭儷語以分光易東鄰殺牛不如西鄰之禴祭晉馮素弗慷慨有大志不修小節成藻竒之曰吾逺求騏驥不知近在東鄰史記甘茂傳子之燭光幸有餘子可分我餘光詳見前情溢乎文愧浮于感恭惟某官簪裳胄望衣被典刑斕斑綵服之華趨庭有得列女傳老萊子孝養二親行年七十作嬰兒自娛著五采斒斕衣杜詩繡衣春當霄漢立綵服日向庭幃趣局促墨曹之試游刃不難局通作局踡局不伸也促通作趣局促蹶小貌灌夫傳局趣如轅下駒諒積平反之功見上條即登華要之路某枌榆相託郊祀志高祖禱豐枌榆社注枌榆鄉名詳見前蒲柳既凋晉書顧悅之傳松柏之姿經霜猶茂蒲柳常質望秋先零迷觚稜闕角之雲煙誤為出計班固傳設壁門之鳳闕上柧稜而棲金雀又紅塵四合煙雲相連說文柧稜殿堂上最高之處懷江上山間之風月已卜歸期東波赤壁賦江上之清風與山間之明月代回江隂趙司法崇價冬官率屬誤拜上恩春藻摛辭猥勤下問曹植文章序質素也如秋蓬摛藻也如春范恭惟某官禔身廉靖法言或問士何如斯可以禔身注安也一曰福也百順之名臨政疏明行矣瓜期又作墨曹之試豈能茅茹長為白璧之投易泰初九拔茅茹以其彚征吉否初六拔茅茹以其彚貞吉亨注茅之為物拔其根而相牽引彚類也鄒陽傳夜光之壁以間投人于道願少須之自此升矣楊震傳先生自此升矣某未能免俗阮咸傳未能免俗聊復爾耳豈不懷歸詩豈不懷歸玊事靡鹽稍戀君軒小曵鄭崇之履鮑昭詩弃席思君幄疲馬戀君軒行秣余馬言歸疏廣之廬詩之子于歸言秣其馬回新任李司法公澆題千佛之名夙欽雋望唐張倬柬之之孫數舉進士不第捧登科頂上戴之曰此千佛名經補三語之椽兹屈英游見前望履不先莊子願望履幕下注言視不敢望跖面望履結而還也鳴謙何厚履謙卦名恭惟某官掞材肅括法言其為外也肅括注外威儀也肅敬也括法也蓄學碩膚詩公孫碩膚注碩大膚美也五千言之修身盤根有種史記老子姓李氏名耳周守藏室之吏也著書上下篇言道德之意五千餘言杜詩仙李盤根大三萬軸之貫腹奕葉彌芳韓詩鄴侯家多書插架三萬軸為人強記覽過眼不再讀偉哉羣聖文磊落載其腹鄴侯謂李泌子繁也杜詩猗蘭奕葉光早擷頷於廣廷韓詩連年收科第若摘頷底髭甘擡頭於矮屋開元天寶遺事張彖登科為華隂簿為守令所抑歎曰大丈夫有凌雲蓋世之志而拘于下位若立身矮屋之下使人擡頭不得乃弃官而去盍騰華貫又領決曹杜氏通典兩漢有決曹賊曹掾主刑法歷代皆有或謂之賊曹法曹墨曹後漢書周燕為郡決曹掾太守欲枉殺囚燕數諫不聽囚家詣闕稱寃燕自承其罪又王昌為郡決曹史又郭𢎞為潁川郡決曹椽治獄至三十年用法平正郡內比之東海于公昔狄梁公之於并門新唐書狄仁傑字懷英并州太原人舉明經調汴州參軍為吏誣訴黜陟使閻立本召訊異其才謝曰仲尼稱觀過知仁君可謂滄海遺珠矣授并州法曹參軍洎韓昌黎之在荆渚新唐書韓愈傳遷監察御史上疏極論宫市貶陽山令改江陵法曹參軍昌黎集赴江陵途中寄贈三學士詩棲棲法曹椽何處事卑陬荆山渚宫皆在江陵府李詩所思採芳蘭欲贈隔荆渚皆居此職能大其官柳文袁高河南人給事中貞直忠蹇無與比能使所居官大景行行之詩高山仰止景行行止鶴林玉露云景明也謂所行之光明也世俗有景仰景慕之語失其義矣野客叢書云此誤自漢已然後漢書劉顗傳云今顗景仰前修注景慕也則知此謬其來久矣執事事也老泉上田樞密書執事事也執事責也於洵何有哉某負丞將滿聨事亦榮惟內惟貨惟來知片言之可折尚書五過之疵惟官惟反惟內惟貨惟來其罪惟均注五過之所病或嘗同官位或詐反獄辭或內親用事或行貨枉法或舊相往來同姓同業同道或一見而後行韓文同姓而近也同業也同道也詳見前代回唐司理惟良折獄何擇非人尚書何擇非人何敬非刑又非佞折獄惟良折獄恤功于民不聞亦式尚書乃命三后恤功于民注恤憂也憂欲與民施功詩不聞亦式不諫亦入注不聞人之道說亦自合于法性與天合也鼎來良椽漢書匡鼎來注鼎方也掾俞絹切官屬式慰疲氓恭惟某官有偉儒宗師丹傳丹經為世儒宗德為國黃耉蔚為壽俊敘傳蔚為辭宗任昉王文憲集序蔚為帝師尚書罔或耆壽俊在厥服注耆宿壽考俊德禀江陽之秀清德可知觀雪嶺之竒雄材斯展杜詩雪嶺界天白不煩三語行剡五章見前某歸夢飛騰宦情蕭颯王衍傳少無宦情隨牒推移遂至于此南史王微傳微素無宦情梁書何𦙍傳吾年已五十七月食四斗米不盡何容復有宦情颯悲合切說文朔風也又風聲亦已買江西之舫行即解維維繫也杜詩方期解纜初又解纜即長吁纜維舟絙也解維猶云解纜或可識劍南之英當圖望履劍州南唐置宋以利路亦有劒州加為南劎回羅司理振十年出幕濫叨一障之乘杜詩十年出幕府張湯傳居一障間又乃遣山乘障注障謂塞要險之處乘登也登而守之韓文上希卿大夫之位下猶取一障而乘之同官為僚賴有三語之椽左傳同官為僚吾嘗同僚敢不盡心乎方規請益先辱鳴謙益謙卦名伏惟某官學有家傳材優世用撥煩剸劇共知從事之賢勞增韻煩不簡也左傳正其違而治其煩剸徒官切說文截也劇音極說文尤甚也一曰艱也尹賞傳賞有治劇之才遷榮陽令袁安傳三輔舉安能理劇拜楚郡太守南史臧質傳為人敏贍有風力長于撥劇隋書蘇威為太子少保梁毗為御史劾威兼領五職安繁戀劇詩我從事獨賢傳賢勞也從事于役登明選公將在參軍之俊逸韓文登明選公雜進巧拙杜詩俊逸鮑參軍騫騰近只翹企俟之晉書凉武昭王傳延首雲極翹企遐方溫嶠傳州之文武莫不翹企某又入坤垠柳文劍門銘井絡坤垠時惟外區界山為門環于蜀都叨分斗壘同舟共濟諒無有於遐心詩毋金玉爾音而有遐心餘見前回楊司理林司法條縮袖旁觀亦恐孤於大手韓文巧匠旁觀縮手袖間厥惟期徯徯户禮切說文待也尚書徯豫后增韻望也莫既編摩說文摩研也通潭州曾司户應甫潭州已見宋沿唐制諸州置司户參軍掌户籍賦稅倉庫交納元祐令中州從八品下州從九品乾道六年汪大猷乞令司户專差主倉庫詳啓意蓋為寧鄉簿時曾權司户第二卷有上衛參帥辭權司户啓操觚學步敢論臭味之同觚通作䉉竹簡陸機文賦或操觚而率爾注觚之方者古人用之以書猶今之簡班固傳有學步于邯鄲者未得髣佛失其故步庾肩吾詩欲仰天庭掞終知學步艱餘詳見前舍墁代庖強附交承之契鏝謨官切通作墁說文鐵杇也徐曰所以泥也又莫半切鏝刀工人器韓文圬者王承福傳吾不敢一日捨鏝以嬉莊子庖人雖不治庖尸祝不越俎而代之揆材名而藐甚接步武以幸然恭惟某官胄出魯洙史記曾參南武城人注武城屬魯在兗州說文洙水出泰山蓋臨樂山北入泗一云入沇秀鍾閩嶺見前鏗爾舍瑟學傳先聖之不傳向來瓣香文到古人之未到陳後山詩向來一瓣香敬為曾南豐事業此其土苴苴都賈切土苴糟魄也又泥不熟也莊子土苴以治天下一曰不真物也又側下切和糞草也增韻查滓也科名真是遺餘韓文豈不登名於一科兮曾不補其遺餘居然三語之除見本卷郭知録條淹此八年之久爭先捷徑君不行兮夷猶陳了翁詩爭先徑路機關惡近後語言滋味長離騷經夫惟捷徑以窘步餘見前猶抱古心羌難得而覼縷韓詩古貌又古心又古心雖自鞭餘見前寧有圖書之彥晉天文志東壁二星主文章天下圖書之祕府也可留版籍之司分紀户曹參軍掌户口籍帳婚姻田宅雜徭道路之事深霧雨而澤之劉向列女傳陶答子化陶三年名譽不興家富三倍其妻諫曰妾聞南山有𤣥豹霧雨七日不下食者何也欲以澤其衣毛而成其文章詳見前望雲霄而近只某徂徂有志徂子魚切說文玃屬鹿鹿無竒蕭曹傳贊録録未有竒節師古曰録録猶鹿鹿言在凡庶之中也栖枳棘之叢中甚安斯寢史記齊世家客寢甚安殆非就國者也餘見前搴芙蓉於木末敢集其裳屈原九歌采薜荔於水中搴芙蓉兮木末離騷經製芰荷以為衣兮集芙蓉以為裳重違大府約束之嚴韓文躬詣大府受約束於下執事此謂辭權司户不允姑俟前驅弩矢之至司馬相如傳縣令負弩矢先驅鳳凰尚遙於千仞賈誼傳鳳凰翔于千仞兮鯉魚盍貢於尺書糠粃在前令公怒之未免孫綽傳簸之揚之糠粃在前郤超傳髯參軍短主簿能令公喜能令公怒珠玉將至覺我穢以何疑世說王武子是衛玠之舅俊爽有風姿見玠輒嘆曰珠玉在側覺我形穢代回邵武曾司户復邵武軍本漢治縣之地吳於此立昭武鎮屬建安郡晉平吳更曰邵武縣至隋郡縣俱廢尋復立邵武縣屬撫州唐屬建州宋升為邵武軍老子婆娑濫紆蒼佩陶侃傳老子婆娑正坐諸君輩禮記大夫佩水蒼王而純組綬詳見前參軍俊逸逺寄素書見前羅司理條恭惟某官植德潤身掞才資世用計然之半策已足豪雄史記貨殖傳昔者越王句踐困于㑹稽之上乃用范蠡計然范蠡既雪㑹稽之恥喟然嘆曰計然之策七越用其五而得意既已施於國吾欲用之家注計然者葵邱漢上人姓辛氏字文子其先晉國亡公子也嘗南游於楚范蠡師事之試琰之之一官㑹觀霹靂唐書裴琰之絳州聞喜人為同州司户參軍時年少美容儀刺史李崇義初甚輕之先是州有積年舊案數百道崇義促琰之使斷之琰之命書吏數人連紙進筆須臾剖斷竝畢文翰俱美且盡豫奪之理崇義大驚謝曰公何忍藏鋒以成鄙夫之過由是大知名號為霹靂手有憐西崦之景崦衣廉切山海經鳥鼠同穴西南曰崦嵫下有虞泉日所入互見前猶庀北斗之司庀普弭切治也具也左傳官庀其司李固傳陛下有尚書猶天之北斗顔魯公集尚書北斗尊某曵履罔功投簪孔武吾車吾馬漸為膏秣之謀詩載脂載牽還車言邁又言秣其馬說文秣食馬穀也以粟秣養其馬韓文膏吾車兮秣吾馬從子于盤兮終吾生以徜徉某水某邱或遂釣游之願見前回段司户干木之廬必式尚阻面承史記文侯受子夏經藝客段干木過其閭未嘗不軾也皇甫謐高士傳木晉人也守道不仕魏文侯以客禮待之出過其廬而軾其僕曰君何軾曰段干木賢者也隱處窮巷聲馳千里吾安得勿軾干木先乎德寡人先乎勢干木富乎義寡人富乎財勢不若德貴財不若義高子松之歲當更反觀言贈漢書段㑹宗字子松為西域都護騎都尉西域敬其威信三歲更盡還徙為鴈門太守坐法免西域諸國上書願得㑹宗復為都尉谷永閔其老復逺出豫書戒曰若子之材可以優游都城而取卿相何必勒功崑山之仄朋友以言贈行敢不略意願吾子因循舊貫毋求竒功更盡亟還如淳曰邊吏三歲一更更工衡反撝謙寵甚內訟悚然謙訟卦名伏惟某官育秀岷峨炳靈江漢見前秀實仁勇之節風烈固存新唐書段秀實傳贊柳宗元稱世言段太尉以為武人一時奮不慮死以取名非也太尉為人姁姁視之儒者也遇不可必達其志非偶然者非孔子所謂仁者必有勇乎文昌翰墨之聲雲仍是似新唐書段文昌字墨卿憲宗朝為翰林學士穆宗即位拜中書侍郎同中書門下平章事草凌雲而入奏司馬相如傳相如既奏大人賦天子大說飄飄有凌雲氣游天地之間意芥拾地以決科夏侯勝傳其取青紫如俯拾地芥耳法言射策決科小試椽曹未展霹靂之手見上條固為檄屈忽纒悽愴之心後漢毛義廬江人家貧以孝行稱南陽張奉往候之坐定而府檄適至以義為安陽令義捧檄而入喜動顔色奉心薄之及毋亡遂不仕奉曰賢者固不可測往日之喜為親屈也禮記霜露既降君子履之必有悽愴之心素冠已畢於三年詩庶見素冠兮丹檢㑹膺於一札後漢循吏傳一札十行制禮弗敢過也俯就朝祥禮記先王制禮而弗敢過也又魯人有朝祥而暮歌者任官然後爵之亟觀暮召禮記兄官民材必先論之論辨然後使之任事然後爵之主父偃傳朝奏暮召入見某避堂不敏曹參傳於是避正堂舍蓋公焉詳見前下榻已稽徐稚傳陳蕃為太守在郡不接賓客唯稚來特設一榻去則縣之王勃滕王閣詩序徐孺下陳蕃之榻將軍乃肯幸臨既不以服而為解灌夫傳將軍乃肯幸臨況魏其侯夫安敢以服為解師古曰解謂辭之也若今言分疏矣進士與吾同業是固將賀其善鳴韓文送何堅序詳見前回綿州家司户燉翁家將仕坤翁綿州已見鸞停鵠峙舊聞英物之不凡韓文少傳翠竹碧梧鸞鵠停峙能守其業者也晉書桓溫字元子生未朞而太原溫嶠見之曰此兒有竒骨可試使啼及聞其聲曰真英物也先賢傳薛勤造陳仲舉其父出迎勤曰足下有不凡子吾來候之不從卿也鴈後鴻前今見故人之有子見前未遑修贄先辱贈言恭惟某官世載其英學造乎道取青拾芥誇映秀士之羣韓詩舉舉江南子名以能詩聞一來取高第官佐東宫軍迎婦丞相府誇映秀士羣泛緑依蓮卓犖椽曹之表恭惟某官學有家傳美由世濟俯拾地芥不難一律之塤篪詩伯氏吹塤仲氏吹篪山谷詩豈無他人游不如我塤篪小試天葩便入三銓之衡尺韓詩東野動驚俗天葩吐竒芬六典尚書為尚書銓侍郎二人分為中銓東銓權文公集吏部員外郎裁百辟之章疏助九流之刀尺晏公類要秉刀尺於仙臺行遄王覲左傳王覲為可亟踐世官某自歎孤蓬山谷詩九鼎安磐石一身轉孤蓬復分半竹事其賢者友其仁者幸而在邦域之中愛勿勞乎忠勿誨乎特有望文辭之表通潭州段支使宋㑹要乾德三年詔歷兩任有文學者許兩使留後奏充掌書記太平興國六年詔諸節度州依舊置觀察支使一員凡書記支使不得竝置有出身曰書記無出身曰支使位在判官之下推官之上詳啓意蓋任寧鄉簿時作通篇組織韓文齒下士而望光明漫為委吏韓文曾不得列名薦書齒下士于朝以仰望天子之灮明詣大府而受約束將見元僚韓文躬詣大府受約束於下執事南史庾杲之傳盛府元僚實難其選或有三年之托根山谷詩江梅有佳實托根桃李場可無一紙以張本劉𢎞傳得劉公一紙書賢于十部從事杜預左傳注為桓五年從王伐鄭張本晉書荀嵩傳左邱明張本繼末發明經意多竒偉詳見前恭惟某官恢然材諝諝寫與切說文知也周禮注有才智之稱也藉甚典刑見前故笏猶存可落姦雄之膽魏謨傳帝問卿家書詔頗有存者乎謨對惟故笏在段秀實傳朱泚召秀實計事源休等在坐秀實戎服與休竝語至僭位勃然起執休腕奪其象笏奮而前唾泚面大罵曰狂賊可磔萬段我豈從汝反耶遂擊之泚舉臂捍笏中顙衊面匍匐走新硎既發孰嬰肯綮之芒兹依緑水之華暫贊碧幢之畫竝見前湖山自得皆春生秋殺之仁韓文滕王閣記詳見前賓主相歡有川泳雲飛之樂韓文節度堂書記㕔石記詳見前得文武於幕下已空冀北之士夫韓文送溫處士赴河陽軍序詳見前流聲實於朝端是必湖南之支使韓文送楊支使序詳見前某一科不補三釜是謀見前使我有二頃田寧爭雞鶩史記蘇秦傳使我有雒陽負郭田二頃吾豈能佩六國相印乎屈原卜居寧與黃鵠比翼乎將與雞鶩爭食乎屈公為數旬客幸䕃龜魚新唐書韋思謙傳屈公為數旬之客以望此府韓詩瓦影䕃龜魚竝詳見前武官代月湖回林御帶㟽宋㑹要國初以來嘗選三班以上武幹親信者佩櫜鞬御劒或以內臣為之初是職止名御帶咸平元年改為御帶器械景祐三年詔自今無得過六人慶歷元年詔遇闕員以厯邊任有功者補之詳啓意其人蓋有足疾而今愈者十年去國恍然孤鶴之歸列仙傳蘇耽去後忽有白鶴十數隻夜集郡東門樓上一隻口畫作書字言曰城郭是人民非三百里子當復歸咸謂是耽續搜神記遼東城門有華表柱忽有一鶴集徘徊空中言曰有鳥有鳥丁令威去家千載今來歸詳見前千里故人厚甚雙魚之遺遺以醉切所慙善頌未免過情恭惟某官鈐略通材鈐略皆兵法兵鈐以閉房神府以備非常後漢書鈐決之符注兵法有玉鈐篇李靖有兵鈐新書一卷隋藝文志有隂符鈐録一卷宋有景德虎鈐經隋藝文志有黃石公三略三卷唐志同璇魁名第春秋運斗樞北斗第一天樞第二璇第三璣第四權第一至四為魁朱華庀職早通二閣之班畫㦸凝香每作三刀之夢岑參詩刀州先入夢李端詩夜夢見刀州李逺詩何處夢刀州雍陶詩今宵難作刀州夢詳見前顧因微恙力請真祠尊足者存䕫何憐於踸踔莊子今吾來也猶有尊足者存郭象注刖一足未足以虧其德明夫形骸者逆旅也又䕫憐蚿蚿憐蛇夔謂蚿曰吾以一足趻踔而行注䕫一足獸也帝王世紀黃帝在位諸侯于東海流波山得竒獸其狀如牛蒼色無角一足龍走出入水即風雨目灮如日月其音如雷名曰夔黃帝殺之取皮以冒鼓聲聞五百里踸丑甚切說文踸踸行無常貌或作趻踔敕教切說文踶也徐曰踶亦常踏意踸踔不常貌又陟教切猿跳也又敕角切集韻跛也奉身而退龍豈困於騰驤左傳臣之祿君實有之義則進否則奉身而退楚國先賢傳神龍朝發崑崙之墟暮宿於孟諸超騰雲漢之表宛轉四瀆之裏既兩踵之生輝山谷詩我肱三折得此醫自覺兩踵生光輝宜單車而促覲信陵君傳今以單車代之何哉文選李陵答蘇武書以單車之使詳見前君王神武雖已謝單于而閉玉關繫辭古之聰明睿知神武而不殺者刑法志高帝躬神武之材長孫無忌傳陛下神武聖文卓冠千古後漢書延光二年北虜連與車師入寇河西議者以閉玉門陽關以絶其患元初六年北虜與車師後部共攻沒索班公卿多以為宜閉玉門關東坡詩終閉玉關辭馬武男子功名正當殺賊奴以取金印杜詩男兒功名遂亦在老大時周顓傳今年殺諸賊奴取金印如斗大繫肘某無能為役左傳於先大夫無能為役言不足為其役使非所納交天子欲伐先零未覺營平之老趙充國傳定冊尊立宣帝封營平侯羌先零反時充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰無踰老臣者矣丞相必舉龔遂佇觀渤海之安見前謝戴將使木邂逅適願已幸識荆見前倥􅘓裝懷未遑訪戴北山移文訴牒倥偬裝其懷王徽之傳嘗居山隂夜雪初霽月色明朗四望皓然獨酌酒詠左思招隱詩忽憶戴逵逵時在剡便夜乘小船詣之互見前既感輕身先匹夫之意復有一紙賢十部之榮見前通段支使條恭惟某官天分軼羣晉書列女傳王凝之妻謝氏字道韞嘗譏弟𤣥學植不進曰為塵務經心為天分有限耶人門濟美翼扶九萬里決應海運於南溟竝見前腹笥五十家暫隱天樞之北落邊韶傳腹便便五經笥藝文志凡兵書五十三家七百九十篇圖四十三卷春秋運斗樞北斗第一天樞史記天官樞斗戴匡六星曰文昌宫一曰上將鉞旁有一大星為北落北落若微亡軍星動角益稀及五星犯北落正義曰北落師門一星在羽林西南天軍之門也長安城有北落門以象此也主非常以候兵占明則軍安微弱則兵起金火守有兵為兵犯塞土水則吉晉天文志落者天之藩落也師門軍門也主非常以備兵張說詩將星移北落神雨避東京李白司馬將軍歌北落明星動光彩南征猛將如雲雷勇早聞於六館韓文何蕃傳已見筆獨掃於千軍杜詩筆陳獨掃千人軍㑹當定一霸於蝥弧左傳先軫曰報施救患取威定霸於是乎在矣又一戰而霸韓詩雖免十上勞何能一戰霸左傳穎考叔取鄭伯之旗蝥弧以先登蝥音侔弧音胡鄭伯旗名何難連八科之麟角見前衮明日月更看黃榜之新托言進士榜粘黃紙四張以淡墨氊筆書禮部貢院四字粘於榜首履上星辰始是青氊之舊見前某舊交羣從謝道韞傳羣從兄弟則有風胡羯末白樂天詩自知羣從為儒少今識清標聞元方季方之齊名亦既覯止詩亦既見止亦既覯止從延君少君而受禮更幸進之儒林傳戴德延君戴聖次君皆受禮於后倉德號大戴為信都太傅聖號小戴以博士論石渠於是禮有大戴小戴之學回成副將鑑詳啓意任榮州時作懷章試郡叨分榮邸之麾宋光宗自榮州刺史進封榮王故曰榮邸訓旅將屯知有和門之副周禮以旌為左右和之門注軍門曰和今謂之壘門立兩旌為之敘和出用次第出和門也疏左傳云師克在和不在衆田獵象戰伐故其門曰和門逺勤一介見畀雙鱗開緘粲然盧同詩開緘宛見諫議面佩意厚甚恭惟某官共武之服詩有嚴有翼共武之服共武之服以定王國克壯其猷詩方叔元老克壯其猷禀山西六郡之良性資鷙勇趙充國辛慶忌傳贊秦漢已來山東出相山西出將秦時將軍白起郿人王翦頻陽人漢興郁郅王圍甘延壽義渠公孫賀傅介子成紀李廣李蔡杜陵蘇建蘇武上邽上官桀趙充國襄武廉褎狄道辛武賢慶忌皆以勇武顯聞漢書地理志漢興六郡良家子選給羽林期門以材力為官名將多出焉胸奴傳贊文帝從六郡良家材力之士馳射上林六郡謂隴西天水安定北地二郡西河趙充國傳以六郡良家子善騎射補羽林為人沉勇有大略鷙音至說文擊殺鳥也廣雅鷙執也取其能執服衆鳥凡鳥之勇獸之猛皆曰鷙應婁北一星之象世胄蟬聨晉天文志天將軍十二星在婁北主武兵中央大星天之大將也外小星吏士也大將星搖兵起大將出小星不具兵起唐丹元子步天歌婁上十二將軍候韓詩𦙍胄本蟬聨兹煩寡二之材吾邱壽王傳天下少雙海內寡二來二第三之指為王爪士足增劒閣之天高詩祈父豫王之爪士傳士事也蜀都賦緣以劍閣李詩劍閣崢嶸而崔嵬歸衛羽林寧俟玉關之人老漢天文志虛危南有衆星曰羽林天軍軍西為壘晉志羽林四十五星在營室南宣帝紀羽林孤兒應劭曰天有羽林大將軍之星林喻若林木之盛羽羽翮鷙擊之意故以名官漢儀注羽林從官七百人師古曰言其如羽之疾如林之多百官表羽林屬郎中令掌從送次期門續百官志羽林中郎將主羽林郎掌宿衛侍從常選六郡良家子補本武帝以便馬從獵還宿殿陛巖下室中故號巖郎東軒筆録蔡挺自寶元已後歷邊任至于熙寧初猶帥平凉㑹邊無事因作樂歌以教邊人有誰念玉關人老之句自此盛傳都下未幾召為樞密副使墨客揮犀云蔡子正久在邊任晚年以龍圖閣直學士再守平凉作喜遷鶯一闋以自廣曰霜天清曉望紫塞古木寒雲衰草溪馬嘶風邊鴻翻月隴上鐵衣寒早欲歌倚曲悲壯盡道君恩須報塞垣東盡頭路鞬錦領山西年少談笑刃斗靜烽火一把長報平安耗聖主憂邊威懷遐方驕縱且寬天討歲華向晚愁思誰念玉關人老太平也且歡娛須把金樽頻倒此曲成大傳都下某濫乘一障見前回羅司理條將幸同僚共惟帝臣正爾賴熊羆之士尚書萬邦黎獻共惟帝臣又則亦有熊羆之士不二心之臣能以衆整尚願聞龍豹之韜左傳欒針曰日臣之使於楚也子重問晉國之勇臣對曰好以衆整言好以整齊師旅為勇太公六韜分文武龍虎豹犬六目占敘惟勤敷陳罔既寄居官代董制帥通許侍郎奕劉閣學光祖宋史許奕字成子簡州人以父任為長江簿慶元五年寧宗親擢進士第一歷起居舍人韓托胄議開邊奕貽書止之托胄不樂遣奕使金金人聞奕名久禮迓甚恭乃卒行成還奏帝優勞久之權禮部侍郎攝兼侍讀每進讀至古今治亂必參言時事帝曰如此則經筵不徒設矣遷吏部侍郎兼修玉牒官兼權給事中進龍圖閣待制加寶謨閣直學士卒贈通議大夫奕天性孝友所著有毛詩說論語尚書周禮講義奏議雜文行世劉光祖已見石坳和墨躐升獻納之班新唐書百官志起居舍人分侍左右秉筆隨宰相入殿若仗在紫宸內閣則夾香案分立殿下直二螭首和墨濡筆皆即坳處時號螭頭玉壘分符更冒蕃宣之寄玉壘山在茂州汶川縣東四里出璧玉蜀都賦包玉壘以為宇杜詩玉壘浮雲變古今巋然地重巋山貌魯靈光殿賦巋然獨存蕞爾人微實惟鄰寶之依左傳親仁善鄰國之寶也敢廢書函之敬吳張溫使蜀謂先主曰謹奉所齎書函恭惟某官清時碩德名世真儒法言如用真儒無敵乎天下桓榮傳詔賜竒果受者皆懷之榮獨舉手捧之以拜帝笑曰此真儒生也惟其特立而獨行造道自得韓文特立而獨行道力而事實故能難進而易退經德不回禮記事君難進而易退則位有序易進而難退則亂也故君子三揖而進一辭而退以逺亂也至今猶侍臣之冠山谷詩大似不䝉稽古力只今猶著侍臣冠歷年賜方伯之履左傳五侯九伯女實征之以夾輔周室賜我先君履履謂所踐履之界也在外則植旗旄羅弓矢公豈此榮韓文在外則樹旗旄羅弓矢武夫前呵從者塞途其功之銘鼎彞被絃歌士誠有望歐陽公晝錦堂記其豐功盛烈所以銘彛鼎而被絃歌者乃邦家之光非閭里之榮也佇起几安之舄詩赤舄几几傳絇貌疏其舄之飾几几然亟馳介大之圭詩以其介圭入覲于王介大也方言東齊海岱之間謂之介某見謂疏庸誤䝉簡在願乘一障豈能堪十乘之行見前縱駕兩轓何敢作三刀之夢岑參詩刀州先入夢雍陶詩今宵難作刀州夢詳見前冒焉叱馭願在執鞭嗟逺道胡為來哉孰寬脅息李詩嗟爾逺道之人胡為乎來哉又捫參歷井仰脅息居是邦事其賢者載慰心期見前代通費參政士寅分小隊於少城將安問政杜詩元戎小隊出郊埛蜀都賦亞以少城接乎其西少城在太城西張儀既築太城後一年又築少城詳見前倚巨人之長德行可庇身請裁吾黨之裴然來事是邦之賢者恭惟某官賦資肅括蹈行中庸長卿吞雲夢之胸豈以八九而芥蒂司馬相如傳吞若雲夢者八九其於胸中曾不蒂芥注蒂芥刺鯁也太白空岷峨之眼尚餘千萬之琳琅韓詩平生千萬篇金薤垂琳琅簡上帝心尚書惟簡在上帝之心注簡閲在天心為公室輔左傳間于兩社為公室輔固已重清廟九九之鼎戰國策周之代殷得九鼎凡一鼎而九萬人輗之九九八十一萬人謂當應泰階兩兩之符東方朔傳願陳泰階六符注泰階三台也每台二星凡六星符六星之符驗也天文志魁下六星兩兩而比者曰三能注能音台乃甘松菊之主人新唐書韋表微傳授監察御史裏行不樂曰爵祿譬滋味也人皆欲之吾年五十拭鏡􅲛白冒游少年間取一班一級不見其味也將為松菊主人不愧陶淵明云暫作園林之勝事韓詩園林窮勝事鐘鼓樂清時道之將行也命天將降任是人佇一馬二童之來東坡司馬溫公神道碑其相惟何太師溫公公來自西一馬二童萬人環之如渴赴泉孰不見公莫如我先增六鼇四極之重列子斷鰲之足以立四極又一釣而連六鰲公有無窮之聞聞去聲民無不獲之夫某薾然棗昏莊子薾然疲役宋書范曄傳和香方序云棗膏昏鈍甲煎淺俗非惟無助于馨烈乃當彌增于尤疾也棗昏以比羊𤣥保重以木訥躐冒清華之選遂塵碧落之班碧落天也李涉詩碧落高高雲萬里杜詩碧落真難陟詳見前所期乞一障之乘詎敢作三刀之夢見上條惟是夙仰翹材之館乃今得依通德之鄉避正堂而舍蓋公定難屈致置盂水以教龎守尚幸告忠俱見前回寄居官楊南平李涪州蒲運管侯茂州再命專城甚慚愒日古詩陌上桑四十專城居張正見採桑詩恐疑夫壻逺聊復答專城左傳玩歲而愒日其與幾何六條察郡誤玷觀風見前所幸依長者之牆法言倚孔子之牆用是攬慨然之轡見前曾修辭之不敏左傳敢告不敏又謝不敏焉辱委贄以相先恭惟楊南平牟涪州文武兼資後漢書陳蕃傳聰明寬達文武兼姿臣不如李膺劉攽曰姿是姿貌此當作資朱雲傳平陵朱雲兼資文武忠勇有智略可使試守御史大夫朱穆傳朱公兼資文武海內竒士盧植傳九江蠻反四府選植才兼文武拜九江太守魏志蔣濟傳兼資文武服勤盡職魏名臣奏孟達薦王雄疏雄才兼資文武忠烈之性踰越倫輩蜀志關羽傳孟超兼資文武勇略過人晉書劉𢎞傳將軍文武兼資王衍傳中國已亂當賴方伯宜得文武兼資以任之張重華傳謝艾文武兼資國之方邵南史到洽傳謝朓文章盛于一時見洽深相賞好每稱其兼資文武柳世隆傳高帝與武帝書曰汝既入朝當須文武兼資人世隆其人也褚玠傳贊公平諒直兼資文武是儀傳魯王天挺懿德兼資文武北齊書魏釗傳釗有當世材兼資文武裴行儉傳帝親勞宴曰行儉提孤兵深入萬里兵不血刃而叛黨禽夷可謂文武兼備今授二職乃除禮部尚書兼右衛大將軍唐書王圭傳兼資文武出將入相吾不如李靖循良可紀循吏傳董仲舒公孫𢎞兒寬居官可紀者三人侯守云器博而周才𢎞以毅蒲運管云洵美且仁詩不如叔也洵美且仁注洵信也言叔信美好而又有仁德柔嘉維則詩仲山甫之德柔嘉維則注和柔而美善惟可以為法則泛回衆官云筆力挾岷詞源倒峽見前作為黼黻卿雲河漢之無窮劉峻廣絶交論舒向金玉淵海卿雲黼黻河漢粲然琳琅李杜光焰之固在韓詩李杜文章在光焰萬丈長平生千百篇金薤垂琳琅有憐弄峨眉之月李詩一振高名滿帝都歸來還弄峨眉月詎能應益部之星見前財匪鬼輸安得有錢而使鬼魯褎錢神論有錢可使鬼而况於人乎子夏云死生有命富貴在天吾以為死生無命富貴在錢粟非天雨若為轉粟以上天周書神農之時天雨粟神農耕而種之雒書說禾曰倉帝起天雨粟青雲扶日風俗通燕太子丹仰天歎天為雨粟淮南子昔者倉頡作書而天雨粟古今注武帝建元四年天雨粟宣帝地節三年長安雨黑粟竟寧元年南陽山都縣雨粟色青黑味苦大者如小豆小者如麻子互見前杜詩轉粟上青天匪藉大家之牛車兒寬傳大家牛車小家擔負輸租繈屬不絶難沃小雅之牡轡詩四牡騑騑又六轡沃若某自知負乘易負且乘致寇至繫辭負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣更愧贈刀王祥傳初吕䖍有佩刀工相之以為必登三公可服此刀䖍謂王祥曰茍非其人刀或為害卿有公輔之量故以相與祥固辭強之乃受大夫儼然造焉既知感矣司馬相如傳至于蜀都耆老大夫搢紳先生之徒二十有七人儼然造焉是邦事其賢者能勿誨乎回寄居官賀除漕依君子之鄉正虞謫滿陳遵傳故事滿百適者斥滿百西曹白請斥注適讀曰謫按舊法令而罰之也歌使臣之雅忽冒恩除小雅皇皇者華詩序君之所以遣使臣也滿除對亟以籲天尚書以哀籲天期於易地敢意緘縢之賜莊子攝緘縢固扃鐍過形黼黻之辭恭惟某官厚德噓枯見前英詞發藻董仲舒傳發藻辭林通經學古用西漢以為宗援筆賦辭鑒東坡之太晚東坡逺景樓記若夫登臨覽觀之樂山川風物之美軾將歸老于故邱布衣幅巾從邦君于其上酒酣樂作援筆而賦之以頌黎侯之遺愛尚未晚也崇金蘭之氣類繫辭二人同心其利斷金同心之言其臭如蘭致水薤之針規任棠事已見送以禮樂而有光恐孤煩使詩序送之以禮樂言逺而有光華也莊子煩使之而觀其能卒然問焉而觀其知編之詩書而無愧曷稱徽言韓文鋪張對天之閎休揚厲無前之偉績編之乎詩書之策而無愧措之乎天地之間而無虧尚書豫旦已受人之徽言某攬轡安能循牆知懼見前是邦大夫之賢者知久敬以善交吾黨小子之斐然愧成章而匪報詩雖則七襄不成報章又匪報也永以為好也回鄉官未相識守鄭公之鄉方規問政鄭𤣥傳南山四皓潛灮隱耀世嘉其高皆悉稱公然則公者仁義之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉辱子雲之札有味贈言漢書谷永字子雲便筆札故時人云谷子雲之筆札婁君卿之唇舌荀子贈人以言重於金石珠玉說苑贈人以軒不若贈人以言愧先施之未能感高情之見厚藏惟深於筐笥報莫辦於瓊琚見前回鮮于將仕玨詳啓意將仕蓋故人子五月渡瀘曾奉青油之談笑諸葛忠武侯出漢中疏五月渡瀘深入不毛後漢書注瀘水一名若水出旄牛檄外入江有瘴氣三四月必死韓詩聯句從軍古云樂談笑青油幕十年去蜀未瞻丹穴之羽毛山海經丹穴之山有鳥狀如鶴五色而文名曰鳳敢圖伻來辱篤世好恭惟某官學優而仕父教之忠見前德星出虛危本南隆衣冠之望東坡謝二鮮于君以詩文見寄詩我懷元祐初圭璋滿清班維時南隆老奉使獨未還迂叟向我言青齊歲方艱斯人乃福星遣出虛危間注南隆䦘中也鮮于子駿閬中人虛危青齊分野南齊書天文志升明三年四月歲星在虛危徘徊𤣥枵之野則齊國有福厚為受慶之符高論已河漢信東坡眼目之長東坡謝二鮮于詩喜聞二三子結髮師閔顏高論已河漢清詩鳴佩環莊子吾驚怪其言若河漢而無極張邦基墨莊漫録云東坡在海外瓊州士人姜公弼來從學坡題其扇云滄海何曾斷地脉白袍端合破天荒公弼求足之坡云俟汝登科當為汝足後入廣被貢至京師時坡已薨乃詣黃門于許下子由乃為足之曰生長藝間已異芳風流謖下古諸姜還從瓊管魚龍窟秀出羊城翰墨場滄海何曾斷地脉白袍端合破天荒錦衣他日千人看始信東坡眼力長竊聞塤箎不朁弓冶見前章矣是以有慶矣正須子弟之自佳詩維其有章矣是以有慶矣注章禮文也言我得見古之明王雖無賢臣猶能使其政有禮文法度政有禮文法度是則我有慶賜之榮也謝𤣥傳子弟亦何豫人事而正欲使其佳詳見前喧兮終不可諼兮佇見公侯之復始左傳公侯子孫必復其始某未遑望履先辱鳴謙見前識野鶴於未仙固將有後東坡詩何人更識嵇中散野鶴昂藏未是仙期廄駒之越國所向無前王褒傳過都越國蹶如歷塊四六標準卷三十二
