  - {type: variant, offset: 8, length: 0, content: '', SBCK: 廣平之賦某甚安斗食焉用鼎羮月落參横荷喚起羅浮之夢水邊雪後願更續和靖之篇謝㑹稽趙宰善韞委剌見臨袖書爲贄惟是事契之有素豈假文字而後明恭惟某官仕有長材政多善狀製劔池釀丹井乆樂林居探禹穴上㑹稽猶湏􅀲戌雖淵明不辤五斗之屈然士元豈是百里之材兆足以行攺之爲貴某緬懷先契幸及英游主司疑則辨之此情可亮相國知之至矣何􅀃之云謝石祕校巖比勤下顧寵示髙文贈盈把之瓊瑶拜嘉已腆列成編之鍾磬取數何多恭惟某官水北名聲山西家世耻懐綳之簮笏服韋布之縑緗傖父機雲欲上規於姚姒衙官屈宋肯平到於隂何藉少低建隆之功勲足可備慶曆之諫諍公等安在吾道非耶遺我明珠皆映骨而睡驪目乞君飛佩㑹剌手而㧞鯨牙某得非所蒙願竊有復文章小技計已空處士之羣節􅁩大閑願不替純臣之教回劉進士日起惠書及封事藁代月湖作惠以長書將之奏藁一介而言天下古亦有之十漸之當帝心人誰辦此恭惟某人山澤志士畎畒忠臣范希文之居憂不忘國計張齊賢之獻䇿㑹即面陳某乆已語離忽勤言贈吾愧之不敢恨也徒抱朝飢公安在何見晚耶佇觀暮召代回謝祕校耘投詩代衛參寵投短剌就貺長篇梨非飣坐之珍豈能抵玉桃匪蟠枝之實敢辱報瓊至於濁醪亦如惡札不敢詠酌君之語乃先辱起予之詩占此奉酬察之良幸回吳教授投啓和詩伏勤巧思見和拙詩細窺秋月之兩章備見春雲之多態廹斯可以見矣敢疑識面之遲忠焉能勿誨乎安用過情之譽代回朱上舎中有餉以新詩儐之舊藁蕭然四立之壁得此兼乗之珠藏去爲榮不知所報恭惟某人胷蟠古學手抉天章兹遥賦於髙唐已洗空於下蔡詳味三四篇之健語載觀十九首之遺音失餘子於牛毛發寒光於驪目惠而好我雋甚逼人某愛莫助之顔之厚矣開張篋笥諒無湏津筏之求劃豁垠崖所願見琳琅之取回前蘄春陳尉格惠詩昨日伏勤古風見惠論交既乆陳􅁩甚髙恭惟某官服襲典刑緒餘翰墨太丘遺愛多池上之鳯毛季方難爲蓋眼中之犀角猶怜緑水紅蓮之舊客曽陪碧梧翠竹之英游舂容大篇刻畫老醜如猛起約丗故之句顧不偉歟抑擇術無小用之言猶相憶否王何必假更爲綵棒之淹儒果用真㑹復青氊之舊某過勤投璧莫辦報瓊登樓而憶侍郎既無及矣指㕔而坐縣尉何幸見之回張上舎端道博我以文竊承嘉惠愛人以德何至溢言請以屬辭報其盛意恭惟某官勇髙六館學綜九流􅀚其崇論谹議之間眇然深思長慮之計以道相盥兹意甚深覺民之先此言何爲至我任士之重所有更以贈君某有幸納交願安承教凡是爼豆予之意固已拜嘉亦有金玉汝之情尚幾見亮回羅省元垂琳琅於金薤得所未曾報瓊琚以木􅀲闕然無有敢修儷語略謝盛心恭惟某官蘭菊之家楩柟其質一經接踵不難俯拾於紫青萬卷蟠胷安得長嘲於􅀇白時來爲耳人謂斯何有來秋月之兩章足見春雲之多態然下有千歳苓之意雖東坡尚不敢當至向來一瓣香之恭惟南豐乃爲無愧某自知不武難與斯文借聽於聾求道於盲正恐無益於賢者加膏而光飬根而實其敢有愛於言乎回熊省元投贈漫剌下臨極慰仰髙之想屬辭光賁能無投暗之疑恭惟某官學冨家傳美宜世濟桑弧有志豈徒糊口於四方蓽路何憂蓋將友士於千乗兹沐檐褕之贈但深巾衍之藏某德愧多凉官甘獨冷厚意慰跫然之喜何敢或忘虛名誤賢者之來不知所報回徐殿幹暄投四六登畿入幙榮不揜慚趨隅摳衣幸堪親敎甫諧望履遄辱鳴謙藹然仁義之言既聞之矣豈以筋力之禮望長者哉重勤四六之貽莫效萬分之報輙裁狂簡少謝髙明代回張祕校子賢惠詩比勤謁入㝷辱詩來良深感荷之情敢虛往復之義恭惟某官湖海豪氣風雲壯懐諫批逆鱗昔甞長太息者六工歌鳴鹿今將肄宵雅之三得句驚人以文博我卿言大好能無夜光暗投之疑民可小康當在朝奏暮召之後回吳判院玭惠詩榮被新除寵貽佳句脱身枳􅁄來監公子之倉回首芙蓉寜戀假王之印我厭朝班之綴公方故歩之㝷判院不比㝷常惟當拭目山莊元無呵殿更望垂情回屈學正投書詩丞哉􅀒余余􅀒丞哉殊乏吟哦之伴長者絶子子絶長者抑何交際之遲振履鼎來鳴謙泰過恭惟某官莫敖華胄正則故家宗􅂀西江識快閣千山之大僑居東鄙開逺軒三尺之明兹終素韠之祥行奉丹墀之對龍飛九五庚桑盍早於贏粮鵬擊三千子木何勞於􅂨甲兹蒙布武見賁雄文加之仁義之七篇華此蓬蒿之三徑不知所報藏去爲榮某爲州治中在固恨何相見之晚也猶欲就有道而正焉友其士之仁子若無言幾失子文以氣爲主君家所有更贈君回吕將仕某伏蒙紆顧寵賁長牋未先覩於景星幸兹小尉辱暗投之明月復此大慚但深箧笥之藏莫效瓊英之報囘衆官袖啓伏蒙衘袖見賁儷牋合璧連珠於粲光芒之正編鍾列磬了非世俗之音良欽墨妙以筆精但覺禮踰而情過兩喜而多溢美曷克堪任七㐮不成報章但深愧􅀒囘官貟學職袖啓洊承厚意疊貺儷牋墨妙筆精仰窺贍麗禮踰情過洊極感慚甞修造謝之恭僅奉留名之命惟息肩之方始覺脫腕之頗勞七㐮不成報章良􅀌隆施兩喜之多溢美仰懼瀆辝回學職士人兹蒙盛剌見賁屬辝竊闚四六之工良重再三之嘆亟甞造謝僅辱留名退深巾衍之藏莫效襜褕之報回景省元夙勤臨顧見賁儷牋偶缺肅迎退深誦味辱引前賢之跡俾爲後學之師佩意甚勤拊躬曷稱尚規晤語敬布謝忱囘宗子與銓伏勤屢顧見畀屬辭極欽著語之工但重過情之愧恭惟某人天潢濯秀風調軼羣上方重歆向之材錫之蕃庶君冝勉賀白之學副此簡求佇􅀚千里之駒亟振九苞之鳯某濫膺郡􅀉幸託里仁承焚林竭澤之餘若爲共理有拔薤置水之警切幸告忠囘王省元屣履迎門喜接雙鳬之舄文書衘䄂辱摛􅀌鶩之詞既見異人頓忘九折恭惟某人譚髙玉麈材擅瓊杯逃狗曲之譏暫且謝諸生而還舎依鹿鳴之樂行當頌聖主之得賢結襪以湏彈冠伊邇某十年出幕兩􅆋生巾甚苦月攘一雞之征無復人生五馬之貴乏}
