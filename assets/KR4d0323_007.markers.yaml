  - {type: variant, offset: 4960, length: 169, content: 員宋史選舉志七階選人湏三任六考用奏薦及功賞迺得陞改凡流外人三任七考有舉者六員移縣令通判有班行舉者三員與磨勘凡進納人六考有職官或縣令舉者四員移注四任十考有改官者五人舉之與磨勘紹興二十九年洪邁王希亮等上議曰自一命已上仕于州縣之間雖有眞賢實廉勢不能自逹于上故為之立薦舉之法必使之歴任六考所以遲其歲月而責其赴功必使之舉官五員所以多其保任而必其可用, SBCK: 貟}
