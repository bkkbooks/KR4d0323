body:
  text: 四六標準卷七宋李劉撰謝除授內除代魏兵部了翁除編修檢討謝丞相魏了翁𫝊嘉定十五年被召入對蓋去國十有七年矣上嘉納其言進兵部郎中俄改司封郎中兼國史院編修官職官分紀太平興國八年以楊文舉為國子丞史館編修朝野雜記淳化二年以殿中丞郭延澤太子右贊善大夫董元亨並為史館檢討紹興九年詔史館見修徽宗實録以實録院為名檢討官無定員令提舉秦檜辟差近制檢討官六員嘉定二年曽君錫自起居郎兼檢討官除權侍郎當升𢃄修撰而員數已溢乃降㫖權以檢討官繫銜俟將來有闕日升𢃄以從官為檢討官蓋自曽君錫始也郎省真除叨綴夏官之屬岑參詩華省謬為郎周禮四曰夏官其屬六十掌邦政史闈假寵仍綢東觀之書陸機洛陽記東觀在南宫髙闕十二間介於承風觀和帝紀帝幸東觀閲篇籍博選藝術之士以充其官竇章傳太僕鄧康薦章入東觀為校書郎黃香傳詔詣東觀讀未見書酷吏傳高彪舉孝亷為郎中校書東觀吳華核傳東觀儒林之府當講校文藝處定疑難漢時皆名學碩儒乃任其職曽微共二之材左傳祝他曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也共二共二職也謂祝與嘉好之事況冒兼三之寄魏了翁傳嘉定十五年了翁被召入對進兵部郎中俄改司封郎中兼國史院編修官一陶厚甚崔駰傳壞冶一陶重拜悚然左傳敢不重拜竊以兵書之在史家近分四種漢書藝文志漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家諸吕用事而盜取之武帝時兵政楊僕捃托遺逸紀奏兵録猶未能備至孝成命任宏論次兵書為四種四種謂權謀形勢隂陽伎巧文事之有武備古號二塗家語有文事者必有武備有武事者必有文備故長槍大劒雖有毛錐之嘲唐白樂天與元微之應制各有纖鋒細毫之筆攜以就試相顧而笑目為毫錐故白贈元詩云策目穿如札毫鋒利似錐五代史史𢎞肇傳𢎞肇曰安朝廷定禍亂直須長槍大劒若毛錐子安足用哉三司使王章曰無毛錐子軍賦何從集乎毛錐子蓋言筆也山谷詩收拾從來古錦囊今知老將敵難當囊中尚有毛錐子花底樽前作戰場而亂臣賊子難免麟筆之懼吳融詩偶持麟筆侍金閨盧綸詩麟筆刪金篆欲兼美職宜屬全材如某者見謂迂疏藐無操挾少徒志科名之苟得壯始知事業之無窮頃因去蓬島之船了翁傳開禧元年召試學士院改祕書正字明年遷校書郎以親老乞外補甘回泛瞿唐之棹僧圓澤詩郤回烟棹上瞿唐了翁丁生父憂解官心喪既遍塵於藩閫釋詁塵久也歷官漢州眉州亦洊駕於軺軒嘉定四年擢潼川路提㸃刑獄公事八年兼提舉常平等事遷轉運判官遂寧闕守了翁行郡事十年遷直祕閣知瀘州主管潼川路安撫司公事州縣十七年詎曰朞年之去國嘉定十五年被召入對自了翁去國十有七年矣水陸八千里寧論千里而見王敢圖三朝之會同班固東都賦春王三朝會同漢京倏䝉一札之收召後漢書一札十行義難俟駕禮合造朝甫入覲於朵雲東坡詩一朵紅雲捧玉皇注翼聖傳玉皇君居於雲房常有紅雲繞之遄進班於列宿後漢書郎官上應列宿載惟文昌之務天文志斗魁載匡六星曰文昌宫又文昌在斗西北子亥之間後天文志文昌為貴臣後百官志法文昌尚書出納王命敷奏萬機斯乃文昌天府晉天文志文昌六星在北斗魁前天之六府也主集計天道晉百官志注尚書令是謂文昌天府唐天文志文昌天之六司劉伯疏八座比於文昌二丞方於管轄尤嚴武部之司通典魏置五兵尚書謂中兵外兵騎兵别兵都兵晉因之後魏有七兵尚書後周置大司馬唐因之龍朔二年改司戎大常伯光宅元年改夏官尚書天寶十一載改武部蓋五材民並用之古無去兵之理左傳天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也而多壘士之恥也今當整旅之時壘音磊曲禮四郊多壘此卿大夫之辱也注數見侵伐則多壘矧不崇朝之間詩曽不崇朝又崇朝其雨傳崇終也從旦至食時為終朝公羊傳不崇朝而雨兼綴編年之職新唐書元德秀傳蕭頴士罪子長不編年而為列傳後世因之非典訓也劉子𤣥史通陸機晉書列紀三祖直序其事競不編年年既不編何紀之有又紀者編年也傳者列事也編年者歷帝王之歲月猶春秋之經紀事者録人臣之行狀猶春秋之傳昔揚雄經歲餘之待詔僅試郎員揚雄傳大司馬王音竒其文雅薦雄待詔歲餘奏羽獵賦除為郎給事黃門至韓愈願年老而著書尚辭史筆昌黎答張籍書吾子論排釋老不若著書然有一說化當世莫若口傳來世莫若書又懼吾力文未至也三十而立四十而不惑吾於聖人既過之猶懼不及矧今未至請待五六十然後為之冀其少過也河東論史官書退之宜思可為速為果卒以為恐懼不敢則一日可引去又何以云行且謀也文選使名挂史筆蛙固難於語海莊子井蛙不可與語海者拘于虛也夏蟲不可與語氷者篤于時也蚊詎可以負山恭惟某官柱石九筵並見前權衡庶彚彚類也易庶類蕃殖合臯陶合稷契天知許國之心周札傳以身許國死而後已杜詩丈夫誓許國憤惋復何有東坡詩許國心猶在匡時術已虛若伊陟若巫賢人仰傳家之學尚書在昔成湯既受命時則有若伊尹在太戊時則有若伊陟巫咸在祖乙時則有若巫賢調十五載更絃之化收七十城憑軾之功俱見前雖當百志之惟熙尚書疑謀勿成百志惟熙益思九德之咸事尚書九德咸事俊乂在官必欲與天地而相似繫辭與天地相似故不違知周乎萬物而道濟天下不容委人物以眇然見前猥挈孤蹤亦汚高選某敢不勉思厥職惟既乃心乏姚崇奏決之材恐空塵於戎部新唐書姚崇傳為濮州司倉參軍遷夏官郎中契丹擾河北兵檄叢進崇奏決若流武后賢之即拜侍郎塵字重前成魏收直筆之願當圖勉於䇿書北齊書魏收傳初帝令諸臣各言所志收曰臣願得直筆東觀早成魏書故帝使收專其任敕收曰好直筆我終不作魏太武誅史官代鍾監丞震除祕書省著作郎謝丞相鍾震湘潭人受業朱文公建主一書院講道鄉士夫咸宗之學者稱為主一先生著作郎歷代沿革不常宋初以為寄祿官元豐正名始實有職掌修纂日厯祭祀祝辭則著作郎佐之涉筆膠庠正覺丞哉之負韓文丞涉筆占位署惟謹注涉或作濡東膠學名禮記養國老於東膠注膠之言糾也所以糾察王事疏東膠亦太學在國中王宫之外方氏曰飾也飾物者所以致其文韓文丞哉丞哉余不負丞而丞負余濫竽冊府復叨儒者之榮梁書庾肩吾傳懷鼠知慙濫竽自恥穆天子傳天子西登崑崙見王母癸巳至於羣玉之山先王所謂䇿府也東坡集皆儒者之極榮豈駑材之所稱餘見前蛻凡骨於高明聳危肝而感激切以圖書之府實通天上之星辰晉天文志東壁二星主文章天下圖書之祕府也星明王者興道術行國多君子星失色大小不同王者好武經士不用圖書隱李泌傳月蝕東壁泌曰東壁圖書之府吾以宰相并學士當之矣英雋所躔不受人間之風日方言躔歷也日運為躔月運為睃徐氏曰星之躔次星所履行也吳都賦英雄之所躔餘見前未能免俗見前何自為郎馮唐傳父老何自為郎師古曰言年已老矣何乃自為郎也左太冲之賦三都始求此職左思傳思欲賦三都會妹芬入宫移家京師乃詣著作郎張載訪岷卭之事遂搆思十年門庭藩溷皆著筆硯遇得一句即便疏之自以所見不博求為祕書郎岑文夲之奏二頌乃稱是官新唐書岑文夲傳貞觀元年除祕書郎兼直中書省太宗既籍田又元日朝羣臣文夲奏籍田三元頌二篇文致華贍李靖復薦於帝擢中書舍人況黃道日月之明月令正義日有九道考靈曜曰萬世不失九道謀鄭注河圖帝覽嬉曰黃道一青赤白黑道各二日春從青道夏赤秋白冬黑續厯志賈逵論星圖有規法日月實從黃道山谷詩日月黃道明桃李春畫永值紫皇春秋之富晉天文志紫微宫鉤陳口中一星曰天皇大帝史記齊悼惠世家高后崩皇帝春秋富未能治天下山谷詩紫皇訪問富春秋鏘韶鈞而蔚虎鳳邁漢九流李漢韓文序諸史百子皆搜抉無隱汗瀾卓踔奫泫澄深詭然而蛟龍翔蔚然而鳯虎躍鏘然而韶鈞鳴餘見前充棟宇而汗馬牛過唐四庫桞文其為書處則充棟宇出則汗牛馬新唐書藝文志序貞觀中魏徴虞世南顔師古繼為祕書監請購天下書藏於內庫𤣥宗置修書院於著作院其後大名宫光順門外東都明福門外皆創集賢書院學士通籍出入既而太府月給蜀郡麻紙五千畨季給上谷墨三百三十六丸歲給河間景城清河博平四郡兔一千五百皮為筆材兩都各聚書四部以甲乙丙丁為次列經史子集四庫其夲有正有副軸帶帙籖皆異色以别之職固鄰於書蠧蠧都故切說文木中蟲韓詩豈殊蠧書蟲生死文字間名亦近於郎烏漢天文志五帝坐後聚十五星曰哀烏郎位是為清資宜擢素望南史范泰傳泰卒議贈開府殷景仁曰泰素望不重不可擬議台司王繢傳齊武帝為撫軍吏部尚書張岱選繢為長史吏呈選牒高帝笑曰此可謂素望王鎮之傳阮萬齡少知名為孟昶建威長史時袁豹江夷相系為昶司馬時人謂昶府有三素望伏念某楚狂一介震湘潭人鄭重半生韻會鄭直正切重也鄭重殷勤也王莽傳非皇天所以鄭重降符命之意師古曰鄭重猶言頻煩也世科不補於遺餘見前家學僅安於淡泊揚雄傳人君以淡泊為夲韓詩泊與淡相遭三仕甘廣文之冷若將終焉魏志陳思王傳登魚山臨東阿喟然有終焉之志晉書郤愔傳築宅章安有終焉之志江逌傳耽玩載籍有終焉之志王羲之傳初度浙江便有終焉之志許邁傳眇爾自得有終焉之志梁書劉慧斐傳遊匡山遂有終焉之志劉紆傳卜築東澗有終焉之志陶季直傳及在京口便有終焉之志陳書江總傳貽厥于孫有終焉之志南史謝靈運傳放蕩為娛有終焉之志王彬傳卜築于積榖山有終焉之志王秀之傳營理舍亭小宅有終焉之志蕭視素傳天然簡素有終焉之志東坡啓頃者海外淡乎蓋將終焉偶然生還置之勿復道也一朝拔從事之尤聊復爾耳敢意大鈞之播俱見前真無鈍礦之遺礦古猛切夲作磺或作礦五金朴石因其就須入之章宋史選舉志監察御史陳垓建言乞申戒飭銓法十弊四曰須入不行徼幸撓法謂初改官人必作知縣今多規免茍圖京局躐求倅二遂使不曽歷縣之人冒當郡寄也宋制初改官人必作縣令謂之須入紹興初申嚴之後或廢弛孝宗在位持之甚嚴華之以不次之擢漢永初二年詔朕將親覽待以不次又靈帝好學侍中祭酒樂松賈護多引無行趨勢之徒喜陳方俗閭里之事帝甚悅之待以不次之位後漢書何進袁隗表陳實以不次之位唐書孫伏伽傳高祖初受禪伏伽最先諫欲盡下情故不次見拔崔造傳造以給事中同平章事德宗以造敢言為能立事故不次用之籍田之芟載柞既沭三薰芟所銜反柞音窄詩序載芟春籍田而祈社稷也詩載芟載柞其耕澤澤注載始也除草曰芟除木曰柞周公成王之時萬民樂治田業將耕先始芟柞其草木待土氣蒸逹然後耕之博士之冗不治更榮再轉但欲乞治中而去俱見前詎敢窺廣內之藏劉向七略武帝廣獻書之路百年之間書積如丘山外有太常太史博士之藏內則延閣廣內祕室之府蓬弱風波敢望接三神之武蓬蓬萊弱弱水三神山蓬萊方丈瀛洲虀鹽朝暮初無送五鬼之文送窮文太學四年朝韲暮鹽又子之朋儔非六非四在十去五滿七除二忽從米廩之間禮記米廩有虞氏之庠也注庠序亦學也魯謂之米廩疏言魯之米廩是有魯氏之庠魯以虞氏之庠為廩以藏粢盛虞帝上孝令藏粢盛之委焉驟綴蘭臺之屬唐龍朔二年改祕書省曰蘭臺其監改名太史孰主張是遂濟登兹兹蓋伏遇某官命世真儒並見前爽邦哲輔尚書爽邦由哲載萬物以坤元之厚易至哉坤元萬物資生又坤厚載物德合無疆飪百度於鼎實之和易以木㢲火亨飪也又鼎有實尚書百度惟貞晉書劉實傳正位上台光飪鼎實李贊皇五十四歲而相君其年如父李德裕祖栖筠封贊皇縣子父吉甫封贊皇縣侯德裕封贊皇縣伯舊唐書李德裕傳初德裕父吉甫年五十一出鎮淮南五十四自淮南復相今德裕鎮淮南復入相一如父之年亦為異事王文正一十八載之當國惟德之符王旦傳旦字子明大明莘人太平興國五年進士旦凡柄用十八年為相僅一紀贈太師尚書令魏國公諡文正方宏翕受之規益廣旁招之路俱見前有憐冗散亦玷超遷某敢不讀未見之書黃香傳香博學經典䆒精道術初除郎中肅宗詔香詣東觀讀所未見書北史李鉉傳鉉以鄉里寡文籍來游京師讀所未見書樓攻愧集王文定公淮為校書郎既入館屏去人事益讀未見書休假亦入抵暮始歸求多聞之友總一百三家之略益深稽古之功漢書藝文志劉歆總羣書而奏其七略故有輯略有六藝略有諸子略有詩賦略有兵書略有術數略有方技略六藝略易十三家書九家詩六家禮十三家樂六家春秋二十三家論語十二家孝經十一家小學十家凡六藝九種一百三家三千一百二十三篇托五三載籍之遺或上得賢之頌司馬相如傳五三六經載籍之傳惟見可觀也師古曰五五帝也三三王也餘見前代江淮陳制幹韡除監丞謝丞相宋史陳韡字子華福州侯官人開禧元年進士嘉定十四年賈涉辟京東河北幹官改淮東制置司幹辦公事遷將作監丞又遷太府寺丞差知真州淮東提㸃刑獄加直寶章閣兼知寶應州遷宗正寺丞權工部郎中改倉部員外郎紹定三年盜起閩中以寶章閣直學士起復知南劒州提舉汀州邵武軍兵甲公事福州路兵馬鈐轄兼招捕使加提㸃刑獄四年盜平進右文殿修撰六年進寶章閣待制知隆興府贛冦起詔節制江西廣東福建三路捕冦軍馬盜平進權工部侍郎改江東安撫使知建康府遷權工刑二部尚書淳祐四年拜參知政事七年知樞密院景定二年卒贈少師諡忠肅史臣曰陳韡將帥才也優于劉之傑多矣將作監丞漢官後漢魏晉因之烏幕充員方驟通於閨籍左傳楚幕有烏李詩謬題金閨籍得與銀臺通雉工列屬更躐造於朝紳左傳郯子曰我髙祖少皥之立也五雉為五工正利器用正度量夷民者也注雉有五色夷平也雉聲近夷故以五雉名工正之官不三閲月之間乃兩承天之寵易在師中吉承天龍也感恩踰分拊已增慚竊惟國家立法之至公人材循序而後進欲其脫選必限以六考而舉以五員宋史選舉志七階選人須三任六考用奏薦及功賞乃得升改凡流外人三任七考有舉者六員移縣令通判有班行舉者三員與磨勘凡進納人六考有職官或縣令舉者四員移注四任十考有改官者五人舉之與磨勘紹興二十九年洪邁王希亮等上議曰自一命已上仕于州縣之間雖有真賢實廉勢不能自逹于上故為之立薦舉之法必使之歷任六考所以遲其歲月而責其赴功必使之舉官五員所以多其保任而必其可用至若轉丞非內之列院則外之諸郡縱有特頌之殊渥亦難盡越於常規蓋須得百年幾見之人陳後山送蘇公知杭州詩一代不數人百年能幾見乃可稱一歲九遷之命任彥升表雖千秋之一日九遷荀爽之十旬逺至方之微臣未為速逹野客叢書云李善注文選一日九遷云東觀漢紀謂車丞相自高寢郎一月九遷為丞相日字當為月字之誤也李善此注未是按漢書高寢郎田千秋訟太子寃武帝立拜為大鴻臚師古注立拜者立見而即拜之言不移時也謂千秩因此一言頃刻之間自高寢郎超遷九級至大鴻臚非謂一日之間九次遷除也一日非誤千秋拜相在鴻臚數月之後非一月也此云一歲尤誤詎容異數左傳名位不同禮亦同數猥及凡材如某者稟質顓䝉法言天降生民倥侗顓䝉注頑愚也賦材迂滯蚤記教忠之訓左傳子之能仕父教之忠䇿名委質二乃辟也未知造道之方摘句分章粗恥空談而無用吳書趙咨使魏文帝嘲咨曰吳王頗知學乎咨曰吳王浮江萬艘帶甲百萬任賢使能志存經略雖有餘間博覽書傳歷史籍探竒異不效書生尋章摘句而已新唐書段秀實傳慨然有濟世意舉明經其友易之秀實曰􅊧章摘句不足以立功乃棄去陳力就列豈敢大言以為欺容貌不能以勝衣禮記其中退然如不勝衣其言呐呐然如不出諸其口韓詩外傳周公事文王身若不勝衣言若不出口智略何有於湊輻吾丘壽王傳子在朕前之時知略輻湊師古曰言其無方而至若車輪之歸於轂適英主際中興之運見前而遺黎懷內附之思遂令面白之書生宋書沈慶之傳太祖將北討慶之固陳不可上使徐湛之江湛難慶之慶之曰治國譬如治家耕當問奴織當訪婢今欲伐國而與白面書生輩謀之事何由濟上大笑往贊碧幢之元帥雖戎政無能為役俱見前然君命寧敢辭難李膺傳事不辭難罪不逃刑臣之節也齊人歸疆正可閔離離之黍詩彼黍離離彼稷之苖正義曰鎬京宫室毁壞其地盡為禾黍大夫行役見而傷之此歸疆指濠州大散關周行多士詎欲伐坎坎之檀詩示我周行又濟濟多士又坎坎伐檀兮注坎坎伐檀聲言君子之人不得仕進坎坎然身自斬伐檀木敢圖禀議之來洊沐超遷之寵甫離七階之選宋史選舉志凡選入階官為七等其一曰三京府判官留守判官節度觀察判官即後來承直郎其二曰節度掌書記觀察支使防禦團練判官即後來儒林郎其三曰軍事判官京府留守節度觀察推官即後來文林郎其四曰防禦團練軍事推官軍監判官即後來從事郎其五曰縣令録事參軍即後來從政郎其六曰試銜縣令知録事即後來修職郎其七曰三京軍巡判官司理户曹司户法曹司法參軍主簿縣尉即後來迪功郎是為七階選人又迪功修職從仕從政文林儒林承直為選人七階遽參二監之聮家人蓋有嚴君昔居是職易家人有嚴君焉父母之謂也按夲傳韡父孔碩為朱熹吕祖謙門人癡兒未了公事乃事此官見前既材能不及於中庸又名實未孚於上下挈提至此陳餘傳左提右挈稱塞謂何恭惟某官命世宗工爽邦實輔見前積十五年秉鈞之績文選秉鈞當軸之士成七十城憑軾之功見前謂明王立政惟人當廣開於塗轍尚書明王立政不惟其官惟其人而宰相代天理物難純用於規繩續通典當左輔右弼之寄總代天理物之名將收度外之材魏志楊阜傳曹公有雄才逺略能用度外之人所任各盡其力夢溪筆談范文正公常言諸葛武矦能用度外人用人者莫不欲盡天下之才常患近已之好惡而不自知也能用度外人然後能周天下事用作邊隅之氣必使䝉臯比以出比平聲臯比虎皮也左傳齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出䝉臯比而先犯之公從之大敗宋師于乘丘楊用修丹鉛續録云鄭𤣥曰樂記倒載干戈包之以虎皮名之曰建櫜櫜韜也其字或作建臯服虔引此以解左傳今人雖知臯比之為虎皮而不知其原出于此也姑為買馬首之謀見前故略等夷張良傳諸將皆陛下故等夷師古曰夷平也言故時皆齊等特加簡拔某敢不仰銜恩意退激懦衷指心誓報於寵靈蜀志曹操獲徐庶母庶辭先主而指其心曰夲欲與將軍共圖王霸之業者以此方寸之地也鄧騭傳寵靈顯赫臨事益思於忠力得人朝廷得人幕下無愧石洪溫造之流昌黎送溫處士序相為天子得人於朝廷將為天子得文武士於幕下求內外無治不可得也遇我國士遇我衆人明辨中行智伯之報見前除國子録謝丞相北齊國子寺有正録二員隋一人唐因之宋大觀元年從薛昻請始置正録二員金耀庀司愧乏主書之最庀音弭切治也又具也左傳官庀其司餘見前璧流選屬幸叨糾事之聮歸崇敬傳古天子學曰辟雍壅水環繞如璧故前世曰璧池璧沼糾吉酉切察也周禮小宰凡宫之糾禁注糾猶割也察也疏云糾舉其非事已發去依法斷割之事未發者審察之又祭僕有司糾百官之戒具注糾謂校録所當共之牲物續會要學正掌行學規凡諸生之犯規者待以五等之罰學録掌佐學正糾不如規者非有清資而至然夫何素望之及此見前代鍾監丞謝丞相條一陶厚甚三省瞿然蜀志先主傳伏自三省受國厚恩瞿驚視也禮記曽子聞之瞿然或作懼東方朔傳懼然易容申屠剛傳懼然自刻竊以化民成俗由學乎其來已古禮記君子如欲化民成俗其必由學乎古之王者建國君民教學為先傳道授業解惑也必立之師韓文古之學者必有師師者所以傳道受業解惑也法言一閧之市必立之平一卷之書必立之師況風化之夲原禮樂志劉向說上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖讓之容以風化天下薛宣傳御史大夫內承夲朝之風化王褒傳刺史王襄欲宣風化于衆庶王導傳風化之夲在于正人倫人倫之要在乎設學校尤國人之矜式雖居小職亦選巨儒揚雄傳鴻生巨儒俄軒冕雜衣裳修唐典匡雅頌在元祐間實用張橫渠之輩吕大臨橫渠先生行狀先生諱載字子厚世大梁人父迪仕仁宗朝知涪州卒于官不克歸僑寓于鳯翔郿縣橫渠鎮因家焉登嘉祐二年進士第未第時文潞公以故相判長安聞先生名行之美聘以束帛延之學宫異其禮際士子矜式焉至紹聖末亦取游建安之流伊洛淵源楊文靖公游察院墓志公諱酢字定夫建州建陽人登元豐六年進士第用侍臣薦召為太學録除博士公以食貧待次奉親不便就擬知河清縣范忠宣公判河南辟公自隨為學教授未幾還朝除公太學博士此豈庸虛所能稱塞伏念某禀資苦窳史記河濱器皆不苦窳注苦讀如盬音古盬粗也窳音庾病也殖學疏蕪小人可以小知無廣大髙明之見大慙謂之大好乃琑碎俳偶之辭桞文昡耀為文琑碎俳偶餘見前矧至四五十之無聞重感三十鍾之弗洎兩鬢已雪百念皆氷敢意登畿獲齒管庫俱見前陳人無用茍安掌故之蹤謂主金耀門書名士滿前詎堪首善之職韓文才畯滿前儒林傳教化之行也建首善自京師始繇內及外忽䝉分席席謂師席也禮記席間函丈謂講問之時其席相對席間足以指畫莫遂循墻家語正考父佐戴武宣三命兹益恭故其鼎銘曰一命而僂再命而傴三命而俯循牆而走亦莫余敢侮有先逹者為之前尚恐後生之可畏韓文士之能享大名顯當世者莫不有先逹之士負天下之望者為之前焉占小善者必以録益知大播之無垠進學解占小善者率以録名一藝者無不庸伏遇某官柱石九筵權衡百度俱見前粉米山藻之色别繪以衮章尚書子欲觀古人之象日月星辰山龍華蟲作會米宗彞藻火粉米黼黻絺繡孔傳粉若粟米米若聚藻水草有文者鹽梅水火之味殊飪之鼎實左傳和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪齊之以味易鼎象也以木㢲火亨飪也又鼎有實選詩王生和鼎實晉書劉實傳正位上台光飪鼎實雖當青襟刺學之後詩青青子襟悠悠我心詩序子襟刺學校廢也亂世則學校不修焉不㬱緇衣好賢之心禮記好賢如緇衣惡惡如巷伯有憐蠧魚之專韓詩豈如蠧書蟲生死文字間俾致螟蛉之祝法言螟蛉之子殪而逢蜾裸祝之曰類我類我久則肖之矣韓詩入學誨螟蛉天位與共天職是豈出王公之私人患好為人師特恐犯聖賢之戒某敢不益磨行檢加飭禮維懲創孝先之晝眠見前追隨昌黎之晨入進學解國子先生晨入太學命汝教胄豈徒教小技之文章尚書命汝典樂教胄子杜詩文章一小技匪我求䝉願勉求放心之學問見前除國子録謝執政抱關金耀已汙掌故之科見前分席黌宫初乏知新之學黌通作橫學舍鮑德傳修起橫舍進非有德遷不以勞永言小善必録之由進學解占小善者率以録全出大鈞無垠之造見前所感厚甚無謝可乎竊以太學風化之夲原其來已古大夫國人所矜式必立之師故雖尾僚亦關首善並見前道出羲皇而過屈宋猶曰於我何有哉少陵贈鄭廣文醉時歌先生有道出羲皇先生有才過屈宋又儒術於我何有哉文規姚姒而逮莊騷尚聞有笑於列者進學解有笑於列者曰先生欺余哉又作為文章其書滿家上規姚姒渾渾無涯下逮莊騷太史所録子雲相如同工異曲不善螟蛉蜾裸之祝詩螟蛉有子蜾裸負之教誨爾子式榖似之螟蛉桑蟲也俗謂之桑蟃蜾裸蒲盧也即細腰蜂俗呼為蠮螉埤雅云說文云天地之性細腰純雄無子列子曰純雄其名稚蜂蓋其類也摙泥作房如併竹管取桑蟲負之七日而化為子其祝聲可聽法言云類我蓋其音云也寧無驪駒狗曲之嘲儒林傳王式除博士博士江公心嫉式謂歌吹諸生曰歌驪駒式曰聞之於師客歌驪駒主人歌客毋庸歸今日主公為主人日尚早未可也江翁曰經何以言之式曰在曲禮江翁曰何狗曲也伏念某學不知方仕未能信呻其占畢缺師友之淵源呻音申一音新吟也占敕占反視也簡謂之畢禮記今之教者呻其占畢注言今之師自不曉經之義但吟誦其所視簡之文董仲舒傳贊考其師友淵源所漸猶未及乎游夏著之話言皆童孺之糠粃左傳樹之風聲分之采物著之話言為之律度冒昧登畿之綬選詩結綬登王畿追隨管庫之家甲第梁肉之紛紛豈為我設並見前窮年膏油之兀兀反教人為進學解焚膏油以繼晷恆兀兀以窮年頭童齒豁竟死何禆不知慮此而反教人為敢意成均禮記於成均以及取爵於上尊也疏董仲舒春秋繁露云成均為五帝之學虞庠是舜學則成均為五帝學也獲齒糾録見前居然從國子先生之後何以報王公大人之知伏遇某官該輔天功奮庸人望收斂攻教恐駑馬有十駕之材栁文其材之可者收斂攻教掉手飛縻指毛命物百步就羈荀子夫驥一日而千里駑馬十駕則亦及之矣此以馬喻搜攪流離謂鱒魴皆九罭之選栁文大罟斷流修網亘山罩罶䍡罣織紝其間扼龍吭拔鯨鰭戮白黿逐毒螭叱馮夷立水湄搜攪流離掬縮推移詩九罭之魚鱒魴此以漁喻亦既招諸生而立館下進學解招諸生立館下不嫌養萬鍾而教國中憐其役役之常進學解踵常塗之役役課以循循之誘某敢不益磨行檢謹飭亷隅孝先晝眠正恐嘲師之無笥見前昌黎晨入詎應詰匠以為楹進學解是所謂詰匠氏之不以杙為楹而訾醫師以昌陽引年欲進其豨苓也除國子録謝給舍臺諫補文學掌故之官何心髙位崇京師首善之化乃尾下僚是名清資非有素望並見前躐進金閨之秩謝朓詩既通金閨籍杜詩李侯金閨彥仍依璧水之流見前三省疏庸蜀先主傳伏自三省受國厚恩一何僥冒竊以成均合國之子弟爰立之師周師氏以三德三行教國子凡國之貴游子弟學焉簡書畏我之友朋必歸之録詩豈不懷歸畏此簡書傳簡書戒命也正義云古者無紙有事書之于簡謂之簡書左傳簡書同惡相恤之謂也官曹雖小職任不輕在元祐間則伊川橫渠其選伊川先生年譜游太學時海陵胡翼之先生方主教導嘗以顏子所好何學論試諸生得先生所試大驚即延見處以學職元豐八年司馬公光吕公公著韓公絳上其行誼於朝授西京國子監教授餘見前至紹聖後則建安龜山之流胡文定公楊文靖公墓志公諱時字中立熙寧九年中進士第晚以祕書郎召除邇英殿說書兼國子祭酒餘見前今雖乏人何為至我通鑑唐昭宗命鄭綮為相堂吏往告之綮笑曰諸君誤矣使天下更無人未至鄭綮新書夲傳人皆不識字宰相亦不及我伏念某志雖語上材不逮中幼而學之亦欲垂竹帛之尺寸見前齒之長矣初未離溝瀆之尋常左傳使少司冦挳以歸曰子之齒長矣爾雅水注谷曰溝注溝曰澮注澮曰瀆說文溝水瀆廣四尺深四尺六尺曰尋倍尋曰常甘心此士之江湖山谷詩此士落江湖絶意真人之官府韓詩上界真人足官府周禮太宰之職以經邦國以治官府又以八法治官府鄭注百官所居曰府敢望主文書於几閣漢刑法志文書盈於几閣典者不能遍覩又獲陪冠帶於橋門後漢儒林傳冠帶縉紳之人圜橋門而觀聽者蓋億萬計鄭虔無氊亦懼官長之罵少陵戲贈鄭廣文詩醉即騎馬歸頗遭官長罵才名三十年坐客寒無氊邊韶有笥尚貽弟子之嘲顧敢招諸生以來前俱見前亦恃有仁人之在上韓文伏念今有仁人在上位若不往告之而遂行是果于自弃而不以古君子之道待吾相也伏遇某官綱維國論管攝文盟存先覺覺後之心推欲立立人之學雖當青襟佻逹之後詩青青子襟又挑兮逹兮在城闕兮注挑逹往來相見貌不改緇衣館粲之誠詩緇衣之宜兮敝子又改為兮適子之館兮還豫授子之粲兮注緇黑色卿士聽朝之正服也宜德稱其服也敝而又改願常居此位常服此服也卿士于王宫有館舍干畿內有采祿欲其常朝于王常食此祿也念聖人之及萬民亦惟養士易天地養萬物聖人養賢以及萬民思君子之有三樂無若育材故宫商執爨之桐韓詩遇賞還同爨下餘樂天詩馬因回首雖增價桐遇知音已半焦駱賓王啓聽清音於爨餘枯桐發響收夜灮於𤣥璧怪石騰輝以規矩登場之木某敢不靖共爾位詩靖共爾位正直是與注靖謀也共具也言有德未仕之君子勿汲汲求仕自有明君謀具汝之爵位其志在于正直之人終是與之為治者滌濯其心見前業精於勤荒於嬉固當檢押進學解業精于勤荒于嬉行成于思毁于隨法言君子純終領聞蠢迪檢押師古曰蠢動也迪道也由也檢押猶隱括也言動猶檢押也學行之上言之次尤願琢磨法言學行之上也言之次也教人又其次也咸無焉為衆人除國録謝葛祭酒洪宋史夲傳洪字容父婺州東陽人登淳熙十一年進士第直煥章閣為國子祭酒遷工部侍郎仍兼祭酒拜參知政事封東陽郡公進大學士兼侍讀守夲官致仕卒諡端獻掌故無文學之實正覺靦顔儒林傳以治禮掌故以文學禮義為官師古曰言治禮掌故之官夲以有文學習禮義而為之詩有靦面目注靦姡也面醜也使汝為鬼蜮則不可得見今汝姡然有面目乃是人也姡與靦皆面見人之貌首善蓋風化之原猥容箝尾見前環顧其中未見可者栁河東答韋中立論師道書辱書云欲相師僕道不篤業甚淺近環顧其中未見可師者先逹之士為之前焉昌黎與于襄陽書士之能享大名顯當世者莫不有先逹之士負天下之望者為之前焉欣然小官之不辭樂在君子之易事切以受業傳道解惑也既立之師見前同寅協恭和衷哉必率其屬尚書六卿分職各率其屬思昔吕正獻掌成均之日實舉張橫渠居正録之官言行録吕正獻公公著之為祭酒也前後所薦學官如王回吳政姜濳張載皆一世大儒王存顧臨為元祐名臣常秩吳申黃履朱臨盛僑亦顯於世處士程頥隱居不仕公命博士即其家敦請以為太學正頥固辭公即命駕過之今兹尋墜緒之茫茫進學解尋墜緒之茫茫詎宜用餘子之碌碌禰衡傳唯善魯國孔融𢎞農楊修常稱曰大兒孔文舉小兒楊德祖餘子碌碌莫足數也阜螽草蟲非得其類詩喓喓草蟲躍躍阜螽未見君子憂心忡忡注草蟲常羊也阜螽蠜也草蟲鳴則阜螽躍而從之異種同類奔蜂藿蠋難奏爾庸莊子奔蜂不能化藿蠋越雞不能伏鵠卵注奔蜂小蜂也蠋音蜀豆藿中大青蟲也如某者鹿鹿凡材魚魚末學賦資蹇淺迷高明廣大之天淵涉世坎艱多患難賤貧之日月漫焉未能信之仕凄其不足畏之年兹由几閣之文書躐綴橋門之冠帶俱見前出羲皇過屈宋猶曰儒術於我何有哉杜詩先生有道出羲皇先生有才過屈宋又儒術于我何有哉孔邱盜跖俱塵埃規姚姒逮莊騷尚聞諸生有笑於列者韓文上規姚姒渾渾無涯下逮莊騷太史所録又招諸生立館下誨之言未既有笑于列者曰先生欺余哉況無所挾何恃而前亦惟親大司函丈之間函音咸唐龍朔中改國子監為司成館祭酒為大司成禮記布席席間函丈可以習小雅肄三之業禮記宵雅肄三官其始也注宵之言小也肄習也習小雅之三謂鹿鳴四牡皇皇者華也此皆君臣宴樂相勞苦之詩為始學者習之所以勸之以官且取上下相和厚也伏遇某官以耆壽俊尚書罔或耆壽俊在厥服為社稷臣見前天下之逹尊三公難他遜君子之所教五帝曰汝諧尚書帝曰俞往哉汝諧資自治治人之準繩法言大器其猶規矩準繩乎先自治而後治人之謂大器垂先覺覺後之矩彠彠音雘楚辭求矩彠之所同天之高也星辰之逺也今幸立弟子之行杜詩三千弟子行陽以㬥之江漢以濯之初何畏官長之罵杜詩廣文到官舍繫馬堂階下醉即騎馬歸頗遭官長罵某敢不尊其瞻視審所步趨莊子步亦步趨亦趨商財貨之有無計班資之崇庳遐不謂矣進學解商財貨之有無計班資之崇庳忘已量之所稱指前人之瑕疵詩心乎愛矣遐不謂矣注遐逺謂勤也我心愛此君子君子雖逺在野豈能不勤思之乎此借用觀道德於前後聽教誨於左右願卒成之韓文三為屬吏時經五年觀道德於前後聽教誨於左右除國録回諸州掌故金耀已愧曠瘝首善璧流誤叨糾録三省吹噓之自俱見前一歸披拂之仁莊子風起北方一西一東孰居無事而披拂是恭惟某官以欲立立人之心推先覺覺後之學黼黻溝中之斷莊子百年之木破為犧尊青黃而文之其斷在溝中比犧尊於溝中之斷則美惡有間矣宫商爨下之焦致兹一寒之蹤分此獨冷之席俱見前某未由面謝先辱手箋有感輪囷郤陽傳輪囷離竒注委曲盤戾也無詞稱塞除架閣謝丞相十年出幕迷舊跡於新蹊杜詩十年出幕府一氣轉鈞納陳人於故府左傳士彌牟曰晉之從政者新子姑受功歸吾視諸故府家語使有司求諸故府其可得也拔之喧囂倥􅘓之域北山移文敲朴喧囂犯其慮牒訴倥􅘓裝其懷賦以棲遲偃息之間詩或偃息在牀或棲遲偃仰蛻凡骨以漸輕聳危肝而知感竊以周九職之任既重司書周禮天官司書掌邦之六典八法八則九職九正九事唐六典之分已存掌故至若版曹之籍中興題名記舊制金耀門文書庫多藏三司帳籍三司今版曹也專之金耀之藏在昔時特曰管庫之官至聖世則為儲才之地栽培拱把僃震風凌雨之帡幪俱見前追琢璵璠供方澤圓丘之琮璧詩追琢其章左傳以璵璠斂家語美哉璵璠逺而望之奐若也廣雅圓丘大壇祭天方澤大圻祭地周官蒼璧禮天黃琮禮地豈應庸下偶玷選中劉孝綽啓寵光曲彼獨在選中伏念某質窳無竒學落不殖見前少時磊塊尚抱風雲之壯懷磊音壘說文衆石也塊當作隗五賄切音與洧同說文陮隗高也世說王遜問王忱阮籍何如司馬相如忱曰阮籍胸中磊隗故須澆之言同相如惟有酒異山谷詩酒澆胸次之磊隗韓詩風雲入壯懷泉石别幽耳中歲蹉跎稍除湖海之豪氣說文蹉跎失時也廣韻失足杜詩淮海莫蹉跎韓詩烏乎吾意其蹉跎李詩流灮欺人忽蹉跎魏志許汜與劉􅍯並在劉表坐共論天下人汜曰陳元龍湖海之士豪氣不除􅍯問汜君言豪寧有事邪汜曰昔過下邳見元龍久不與語自上大牀卧使客卧下牀備曰君有國士之名今天下大亂望君憂國忘家而君求田問舍是元龍所諱也何緣當與君語如小人欲卧百尺樓上卧君于地何但上下牀之間邪表大笑漫焉未能信之仕已是不足畏之年生辰挹斗而揚箕竟失餘而得少昌黎三星行我生之辰月宿南斗牛奮其角箕張其口牛不見服箱斗不挹酒漿箕猶有神靈無時停簸揚無善名已聞無惡聲已歡名聲相乘除得失少有餘奴星結栁而送鬼奈驅去以復還昌黎送窮文元和六年正月乙丑晦主人使奴星結栁作車縛草為船揖窮鬼而告之又蠅營狗苟驅去復還斗箕桞鬼四宿名周行萬里之關山韋莊詞寂寞關山道復纍一陶之壞冶崔駰傳壞冶一陶馬伏轅而蜷局直為仰秣之謀左思賦邦有湫厄而踡局踡局不伸也韓詩外傳伯牙鼓琴而六馬仰秣燕巢幕以參池猥沐卷簾之顧左傳夫子之在此也猶燕之巢於幕上也詩燕燕于飛差池其羽注謂張舒其尾翼南宫考藝濫厠使令唐職林舊說禮部郎中掌省中文翰謂之南宫舍人杜詩南宫吾故人白馬金盤陀東閣望塵曽微懇禱見前忽使接紳緌之武緌說文系冠纓內則緌結纓頷下以固冠結之餘者散而下垂謂之緌楊彪傳纓緌縉紳遽今司几閣之文見前蠅頭牛腰姑備朝廷之遺逸齊衡陽王鈞嘗手自細書五經置于巾箱以備遺忘賀玠問曰殿下家自足墳素復何須蠅頭細書藏巾箱中東坡詩蝸殼卜居心自放蠅頭寫字眼能明陳後山詩蠅頭小字密行書山谷詩青燈分坐寫蠅頭李詩書秃千兔毫詩裁兩牛腰山谷詩定作牛腰簡傳抄聽小胥鼠牙雀角謹防胥吏之漫欺詩誰謂雀無角何以穿我屋誰謂鼠無牙何以穿我墉傳不思物變而推其類雀之穿屋似有角者視牆之穿推其類可謂鼠有牙箋物有似而不同雀之穿屋不以角乃以咮今彊暴之男召我而獄不以室家之道於我乃以侵陵物與事有似而非者士師所當審也白日青春了無公事黃簾緑幕宛是儒生韓詩黃簾緑幕朱户閉風露氣入秋堂凉非大鈞妙播物之仁則小人無得輿之理易君子得輿小人剝廬兹蓋伏遇某官經邦碩德濟世元勳竊窺堯舜君民之心豈數韋平父子之業平當傳漢興惟韋平父子至宰相寶鼎九廟以衣裳之會吾丘壽王傳汾陽得寶鼎武帝嘉之薦見宗廟藏于甘泉宫又天祚有德而寶鼎自出韓文禘祫議謹按禮記天子立七廟一壇一墠今國家德厚流灮創立九廟是九廟始于唐也榖梁傳衣裳之會十有一未嘗有插血之盟也信厚也兵車之會四未嘗有大戰也愛民也隨隱漫録云齊桓公盟洮盟牡丘會鹹會淮兵車之會四莊十三年會北杏十四年會鄄十五年會鄄十六年盟豳二十七年盟豳會柳盟貫會陽榖首止寧毌葵丘衣裳之會十有一金城四方於樽俎之前陳涉世家金城千里餘見前𤣥齡入相二十三年求賢則如一日舊唐書房𤣥齡傳賊冦每平衆人競求珍玩𤣥齡獨先收人物致之幕府聞人有善若已有之自以居端揆十五年頻表辭位優詔不許吉甫薦士三十餘輩流澤蓋在異時新唐書李吉甫傳吉甫當國經綜政事衆職咸治引薦賢士大夫愛書無遺顧慙孤賤之蹤亦綴收羅之數某敢不溫尋宿學溫燖也暖也語溫故而知新疏云讀如溫燖之溫若溫燖可食也左傳尋盟注尋重也疏云尋溫也尋盟者前盟已寒更溫之使熱溫舊即是重義故以尋為重討理初心商財賄計班資恐孤德懋懋官之意尚書德懋懋官功懋懋賞餘見前厲亷恥行禮義圖報先覺覺後之恩除架閣謝五府臺諫侍從賓氷漕之筵正虞謫滿趙充國傳氷解漕下師古曰漕下以水運水而下也陳遵傳故事有百適者斥滿百西曹白請斥言為運幹主地官之庋猥玷恩除庋音已板為閣以藏物以作􅔑架閣屬户曹故云主地官之庋除滿對有憐鞅掌之勞詩王事鞅掌注鞅荷也掌捧之也負荷捧持以趨走言促遽也一曰鞅掌失容貌詩疏煩勞狀鄭云鞅如馬鞅之鞅掌以手拘物詩補傳鞅掌皆所以拘物謂為王事所拘少佚筋骸之束禮記禮義也者人之大端也所以講信修睦而固人肌膚之㑹筋骸之束也此大均妙播物之巧然小人有乘器之慚繫辭負也者小人之事也乘也者君子之器也竊惟周設司書既任版圖之職漢立掌故實崇文學之流俱見前馴至皇朝易馴致其道疏馴猶狎順也率儲清望元豐設庫已重此官紹興正名益艱其選中興題名記紹興三年立六部架閣庫況三司併歸民曹之後以獨員專庀金耀之藏英俊聚於闕庭多由此出文書盈於几閣初不爾煩並見前士當利吾器以俟時韓文進齊皥下第序有司連枉齊生齊生不以云乃曰我之未至也有司其枉我哉我將利吾器而俟其時耳上亦溉其根而食實韓文浚其源導其所歸沃其根將食其實詎容瓠落見前獲預茹連茹人余切相牽引貌又茅根易拔茅連茹伏念某意廣才疏見前名浮藝薄韓子四十歲以後轉負初心韓文余生三十有八年聰明不及于前時道德自負于初心又孤負平生心已矣知何奈栁侯五六從以來無為朝士栁文栁氏號為大族五六從以來無為朝士者豈愚䝉獨出數百人右哉矧可憎之面目仍不利於走趨俱見前從軍無尺寸之功杜詩從軍十年餘能無分寸功知勢幾千丈之落見前燕巢於幕固非丹穴之羽毛左傳季札謂孫林父曰夫子在此猶燕之巢於幕上抱朴子靈鳯值孟戲而反丹穴張正見詩丹山下威鳯來集帝梧中韓詩丹穴五色羽其名為鳯凰蛙拘於墟亦豈青冥之腳手莊子井蛙不可以語于海者拘于虛也昌黎月蝕詩把沙腳手鈍誰使汝解緣青冥孰為之地有隕自天易以杞包瓜有隕自天拔之輶軒咨度之餘輶音由說文輕車也風俗通周秦常以歲八月遣輶軒之使採異代方言張協七命語不傳於輶軒地不被乎正朔詩周爰咨度付以按牘文書之寄開門羅雀得鼷鼠不食之倉鄭當時傳門外可設爵羅禆雅鼷鼠有螫毒者甘口􅲪人及鳥獸皆不痛春秋所書食郊牛之角者也充棟汗牛皆鴈鶩所箝之紙韓文文書吏抱成案卷其前鉗以左手右手摘紙尾鴈鶩行以進餘見前或容暇日粗理陳編韓文窺陳編以盜竊此流俗所謂寂寞之濱韓文耕於寬間之野釣於寂寞之濱而愚儒則為藏修之計張湯傳此愚儒無知禮記故君子之於學也藏焉修焉息焉游焉注藏謂懷抱之修習也伏遇樞密弼諧兵柄尚書謨明弼諧爰盎傳夲兵柄注執兵權之夲參贊政機强夲朝以折千里之衝李尋傳閉絶私路拔進英雋退不任職以彊夲朝夲彊則精神折衝夲弱則招殃致凶舉明主以建萬世之策王吉傳欲治之主不世出公卿幸得遭遇其時言聽計從然未有建萬世之長策舉明主於三代之隆者也綢繆牖户收叉負偃值之材新唐書二劉殷許等列傳贊帝王之將興其威靈氣焰有以動物悟人者故士有一槩皆填然躍而附之若榱椽梁棟以成大室叉負偃植各安所施而無遺材諸將之謂耶絺繡衣裳辨火藻黼黻之色尚書藻火粉米黼黻絺繡孔傳藻水草有文者火為火字粉若粟米米若聚米黼若斧形黻為兩已相背葛之精者曰絺五色僃曰繡肆令謏聞之士禮記發慮憲求善良足以謏聞不足以動衆注謏思了反聞音問謏之言小也疏聞聲聞也足以謏聞者言不學之人能有片職謀慮法式求善以自輔此是人身上小善故小有聲聞也亦入旁招之儲某敢不跧伏寬間跧音專縮足也王延壽靈光殿賦狡兔跧伏於拊側溫尋廢忘忘無放切廣韻遺忘也歐永叔之辨曲直或得於陳案之觀宋史歐陽修傳貶夷陵無以自遣因取舊案反復觀之見其枉直乖錯不可勝數於是仰天嘆曰以荒逺小邑且如此天下固可知自爾遇事不敢忽也魏弱翁之條便宜願助故事之奏魏相傳相字弱翁明易經有師法好觀漢故事及便宜章奏以為古今異制方今務在奉行故事而已數條漢興已來國家便宜行事奏請施行之代陳架閣登謝丞相贊使指於計臺曽微素望馮奉世傳奉使有指司馬相如傳宣其使指都漕曰外計亦曰計臺餘見前主吏文於民部猥玷清流隋開皇三年改度支為民部三國志注沐並戒子書材質滓濁汙于清流未論分寸之躋攀且遂斗升之饞嚼少安三釜實感一陶俱見前惟天朝嚴法令之藏不遺片紙東坡詩隻字片紙皆收藏而地官專版籍之掌又異他曹周禮大司徒之職掌建邦土地之圖與其人民之數以佐王安擾邦國以天下土地之圖周知九州之地域廣輪之數凡財貨之夲末源流荀子田野縣鄙者財之夲也垣窖倉廩財之末也百姓時和事業得叙者貨之源也等賦府庫者貨之流也故禹十年水湯七年旱而天下無菜色十年之復年榖復熟而陳積有餘無他故焉知夲末源流之謂也與夫家之施舍戒令周禮鄉師之職以國比之法以時稽其夫家衆寡辨其老幼貴賤廢疾牛馬之物辨其可任者與其施舍者掌其戒令糾禁聽其獄訟悉從閣束庾翼傳此輩宜束之髙閣韓詩春秋三傳束髙閣特設司存故凡守金耀之門見前多以儲玉班之彥新唐書李宗閔傳為中書舍人典貢舉所取多知名士若唐冲薛庠袁都等世謂之玉笋北夢瑣言蔣凝侍郎有人物每到朝士家以為祥瑞號水月觀音前代潘安仁衛叔寶何以加此唐末朝士中有人物者時號玉笋班又外郎班清緊不雜亦號玉笋班鄭谷寄張起居詩渾無酒泛金英菊漫道官居玉笋班山谷次張文潛韻詩誰憐舊日青錢選不立春風玉筍班汗牛充棟雖同鴈鶩之生涯見前待兔守株或綴鴛鸞之步武􅍌子宋人有耕者田中有株兔走觸折頸而死因釋耕守株冀復得兔為宋國所笑李詩枳棘棲鵷鸞欲諧衆口東坡詩醋釅不堪調衆口必取譽髦詩譽髦斯士傳有名譽之俊士如某者才不愈人愈通作愈勝也晉語東方之士孰為愈注賢也學徒是古﨑嶇一第志其目而中眉左傳魯侵齊顏息射人中眉曰我無勇吾志其目也奔走四方困於心而衡慮亦念聖賢之所立底須爵位而後傳彼正已而不求於人此言何謂然居下而弗獲於上吾道難行冒焉為東閣之趨志在便南陔之養詩序南陔孝子相戒以養也索長安之米衆固揶揄王霸傳市人皆大笑舉手揶揄之注說文曰手相笑也對昆明之荷再逄搖落武帝紀元狩三年減隴西北地上郡戍卒半發適吏穿昆明地臣瓉曰西南夷傳有越嶲昆明國有滇池方三百里漢使求身毒國而為昆明所閉今欲伐之故作昆明池象之以習水戰在長安西南周回四十里庾信遊昆明池詩密菱障浴鳥高荷沒釣船薛道衡遊昆明池詩荷心宜露泫竹徑重風來元行恭遊昆明池詩欹荷瀉圓露卧桞橫清隂九辨草木搖落而變衰鄭谷詩那堪流落逄搖落敢意篤豚魚之信見前不肯遺蟣蝨之微史記摶牛之虻不可以破蟣蝨盧同詩下界蟣蝨臣竟挈陳人俾汙故府雀角鼠牙之案牘韞而藏之並見前牛溲馬勃之階梯庶其在此韓詩以為已階梯餘俱見前伏遇某官乾坤間氣春秋演孔圖正氣為帝間氣為臣秀氣為人玉堂遺範韓𢎞制天育間氣時推上材楊矩行韓建制星緯炳靈山河間氣楊巨源詩間氣登三事又廟謨膺間氣劉長卿詩間氣生真宰又大材生間氣王文公集受天間氣為世元龜社稷世臣見前寸心結人主之知一力任天下之重使宅百揆久著經邦論道之功尚書有能奮庸熙帝之載使宅百揆又論道經邦兹惟三孤始膺二公𢎞化之寄尚書少師少傅少保曰三孤二公𢎞化寅亮天地弼子一人文武萬邦而為憲精神千里而折衝俱見前章章已見於歸疆法言齊人章章歸其侵疆注章章當為慞慞蓋古通用懼也此指金人歸淮陜侵地汲汲不忘於求士殆欲市燕人之駿見前故先揖越國之蛙韓非子越王慮伐吳欲人之輕死也出見怒蛙乃為之式從者曰奚敬於此王曰為其有氣故也明年請以頭獻王者歲十餘人知某親老家貧難以待三年之艾憐某身勤事左無使虧一簣之山韓文身勤而事左辭重而請約姑令守几閣之文書庶或僃朝廷之遺逸某敢不靖共爾位增益未能芽甲根荄固已纍洪鈞之一氣說文芽萌芽也東方朔傳朱草萌芽揚雄針夲在萌芽草木初生曰甲說文甲位東方之孟陽氣萌動從木戴孚申之象徐曰孚猶葭莩殼籜也禮樂志根荄以遂五行志育孕根荄師古曰草根曰荄椳闑扂楔尚希託廣厦之萬間見前代舒架閣祐除藉田令謝丞相說文藉帝藉千畝也古者使民知借故謂之藉天子諸侯所耕田借人力以終之通典藉田令周為甸師漢文帝始開藉田置令丞東漢及魏闕晉武復置江左省宋元嘉中又置續會要宋元豐三年詔藉田令隸太常寺中興會要南渡初開紹興十五年初除康與之為藉田令三十一年詔藉田司權罷官吏後復置故府抱書安分百僚之底見前新畬載耜庀司千畞之間詩如何新畬於皇來牟傳田二歲曰新三歲曰畬箋云月令孟春之月天子親載耒耜措之於參保介之御間天子為藉千畝國語宣王即位不藉千畝張衡賦躬三推於天田修帝藉于千畝山谷詩帝藉開千畝農功先九州絲綸如拜於王言禮記王言如絲其出如綸王言如綸其出如綍正義綸粗於絲綍又大於綸明王者出言下所倣之其事漸大不可不愼耕鑿詎忘於帝力帝王世紀擊壤歌鑿井而飲耕田而食帝力於我何有哉頂踵出生成之造文選自頂至踵功歸造化李義山集卵翼不自于他門頂踵實非其已物肺肝深銘鏤之私竊惟周立甸師周禮甸師掌帥其屬而耕耨玉籍以時入之以共齍盛漢為田令文帝紀二年春詔曰夫農天下之夲也其開藉田朕親率耕以給宗廟粢盛注藉謂蹈藉也詳題下中古不常於廢置注見題下夲朝獨厚於優崇端拱親耕猶附九農正之末宋史太宗紀端拱元年正月乙亥親耕藉田左傳九扈為九農正元祐著令已班五監簿之前宋史無考用為羽儀須清流而後畀易其羽可用為儀三國志注沐並戒子書材質滓濁汚于清流取諸閥閲必素望之已高見前如某者學既粃糠才尤蕪穢早荒家訓不自策力田之科文帝紀孝悌天下之大順也力田為生之夲也晚藉世資乃就食代耕之祿一官漫尉山谷漫尉詩序庭堅讀漫叟文愛其不從于役而人性物理奫然詣于根理因戲作漫尉一篇其略云豫章黃魯直既拙又狂癡漫尉葉公城漫撫病餘黎山谷時為葉縣尉再轉為丞會逄除吏八百之恩偶玷管庫七十之數俱見前心雖同於白水左傳重耳曰所不與舅氏同心者如白水夢不到於青雲山谷詩海南海北夢不到又夢不到漢東適金耀之虛員濫角巾而承乏文選濫巾北嶽羊祜與從弟護書年已朽老既定邊事當角巾東洛還歸鄉里左傳攝官承乏小人屬饜而已既慙地位之高南史豫章王嶷傳自以地位隆重深懷退素盧同詩山上羣仙司下上地位清高隔風雨餘見前大鈞坱圠無垠更涉天田之峻後漢禮儀志高帝令天下立靈星祠言祀后稷而謂之靈星者以后稷又配食星也舊說星謂天田星也一曰龍左角為天田官主榖張晏曰農祥晨見而祭也宋兩朝天文志天田二星距西星去極八十二度半入角二度半東都賦躬三推於天田桞河東聞藉田有感詩天田不日降皇輿束吏文於高閣晉書庾翼傳此輩宜束之高閣韓詩春秋三傳束高閣習容典於曲臺見前矧當大享之丁辰聿嚴祼鬯封禪文逄吉丁辰景命也爾雅丁當也郭璞注當值也文選正丁厥時韓文適丁民之有是時也國語先時五日王即齊宫百官御事各即其齊三日王乃淳灌饗醴及期王祼鬯饗醴乃行其在先農之乙地正給粢盛漢章帝元和中正月北巡耕于懷縣其藉田儀正月始耕常以乙日祀先農乃耕于乙地唐禮樂志皇帝孟春吉日享先農遂以耕藉晉禮志漢儀縣邑常以乙日祠先農乃耕於乙地使之參保介之間禮記天子乃以元日祈榖于上帝乃擇元辰天子親載耒耜措之于參保介之御間疏措置也保介車右也御者御車之人車右及御人皆是主參乘於時天子在左御者在中車右在右言置此耒器於參乘保介及御者之間於以聞籩豆之事漸階閨籍韓詩漸階羣振鷺可齒朝紳增韻齒列也韓文齒下士于朝載柞載芟何敢恥有道之榖詩載芟載柞其耕澤澤傳除草曰芟除木曰柞疏言民樂治田業于是始芟其所田之草始除其所田之木待其土氣蒸逹然後耕之不稼不穡所愧取無功之禾詩不稼不穡胡取禾三百億兮傳種之曰稼斂之曰穡伏遇某官柱石九筵見前權衡百辟明堂以序五位遹觀四海之會同班固明堂詩於昭明堂明堂孔陽聖皇宗祀穆穆皇皇上帝宴饗五位時序誰其配之世祖光武遹音聿爾雅述也又自也西都賦春王三朝會同漢京受四海之圖籍膺萬國之貢珍少保兹惟三孤實任兩儀之寅亮繫辭易有太極是生兩儀謂臺閣之儀正須子弟唐選舉志李德裕曰朝廷顯官須公卿子弟為之何者少習其業臺閣之儀不教而自成詳别見庶宗廟之器可交神明丕蕆八窗四達之儀蕆音闡孝經援神契明堂者天子布政之宫上圓下方八窗四達在國之陽五經異義明堂上圓下方八牖四闥劉允濟明堂賦穆穆四門可納四氣明明八窗均調八風式講三公五推之典禮記帥三公九卿諸矦大夫躬耕帝藉天子三推三公五推卿諸矦九推肆令駑鈍猥備駿奔詩對越在天駿奔走在廟駿須閏切增韻云取敏疾之義禮記大傳注駿疾也疾奔走言勸事也某敢不滌濯其心靖共爾位並見前誕后稷之稼有相當益虔農正之司詩誕后稷之穡有相之道注大矣后稷之掌稼穡有見助之道謂若神助之力也左傳九扈為九農正詳見前帥甸師之屬而耕尚終託天官之造周禮天官冢宰甸師下士二人府一人史二人胥三十人徒三百人甸師掌帥其屬而耕耨王藉注屬謂府史胥徒也甸師字復出代舒架閣除藉田令謝五府侍從故府綴員粗謹吏文之守見前容臺列屬叨升帝藉之司宋太祖藉田令俱屬太常跽綸綍之王言跽音技說文長跽也釋名見所敬忌不敢自安莊子擎跽曲拳齒簮纓於京秩寵踰望表愧溢情涯惟漢家田令之官實周制甸師之職歷代不常於廢置夲朝獨厚於優崇並見前元祐定班蓋在三監簿之上元祐哲宗年號三監簿謂國子將作軍器端拱蕆事猶附九農正之中宋史太宗端拱元年正月乙亥親耕藉田還御丹鳯樓大赦宋史禮志藉田令三皆位司農卿南少退北上左傳以蕆陳事餘見前馴至中興以漸而致曰馴致易馴致其道餘見前始歸宗伯宋史高宗紀紹興十五年正月辛酉初置藉田十六年正月壬辰親饗先農於東郊行藉田禮執耒耜九推詔告郡縣禮樂以俟君子惟寅又欲其惟清尚書夙夜惟寅直哉惟清籩豆則有司存弗仕則幾於弗問詩弗仕弗問勿罔君子注仕察也問與察一也但纍文以丁寧之言王為政雖不監問之不察理之必天下之民勿得欺罔其上之君子也豈圖庸下偶玷選中同前謝丞相啓伏遇某官當世真儒斯民先覺文武為萬邦之憲精神折千里之衝俱見前朝夕輔台有猷必告於我后尚書朝夕納誨以輔台德又爾有嘉謀嘉猷則入告爾后于內夙夜基命不戰可屈於人兵詩夙夜基命宥密傳基始命信也正義云早起夜卧始于信順天命法言堯舜不戰而屈人兵方將厚鹽梅麴糵之功諒必廣芝术參苓之蓄肆令駑鈍猥效駿奔俱見前某敢不欽乃攸司尚書欽乃攸司愼乃出令敬修可願尚書敬修其可願八政一食勤身敢怠於共齍齍音資尚書三八政一曰食周禮甸師掌帥其屬而耕耨王籍以時入之以共齍盛注齍盛祭祀所用榖也粢稷也榖者稷為長是以名云在器曰盛三公五推拭目尚觀於載耜楊修書觀者駭視而拭目張敞傳拭目傾耳陳後山詩拭目萬人看餘見上條代范文思應鈐謝史丞相宋史范應鈐字旗叟豐城人開禧元年舉進士調永豐尉知崇仁縣調提轄文思院幹纍官直煥章閣大理少卿應鈐開明磊落守正不阿别白是非見義必為不以得失利害動其心徐鹿卿曰應鈐經術似兒寬決獄似雋不疑治民似龔遂風采似范滂理財似劉晏而正大過之人以為名言四朝會要太平興國三年置掌造金銀犀玉工巧之物金彩繪素裝鈿之飾以供輿輦册寶法物及凡器服之用𨽻少府監熙寧三年詔文思院兩界監官立定文臣一員武臣一員並朝廷選差其內侍勾當官並罷試邑三年乏民庸之善狀周禮民功曰庸賈誼傳自傷為傅無狀師古曰無善狀杜延年傳甚亡狀師古曰亡善狀入京一月典工尹之異除左傳使為工尹注掌百工之事身未登光範之門夢弗到文石之陛俱見前非求而得何德以堪竊以半面之異孟嘉非相求於未面謝丞書應奉年二十時詣彭城相袁賀賀時出行閉門造車匠於內開扇出半面視奉奉即委去後數十年於路見車匠識而呼之白帖半面之故元稹詩半面契終始陳後山詩尚記門中半面人孟嘉傳字萬年為庾亮勸學從事正旦亮大會州府人士禇裒有器識問江州有孟嘉其人安在亮曰在座卿但自覓裒歷觀指嘉曰此君小異將無是乎詳别見一言而得鬷蔑亦幾失於無言見前次焉須左右之譽褎否則出公卿之論薦今者絶蚍蜉之援見前俄而綴鵷鷺之行杜詩空慙鴛鷺行是為特逹之知四子講德論特逹而相知者千載之一遇也詳見前未有報酬之計伏念某一愚自信三仕無庸初隱弓刀不敢學上書之尉唐詩大雪滿弓刀山谷詩騎從嚴弓刀又弓刀陌上望行色又昨解弓刀丞太僕又卷旌解弓刀梅福傳補南昌尉後去官數因縣道上言變事繼逃麴糵偶叨舉管庫之家禮記乃命大酋秫稻必齊麴糵必時韓文尚何麴糵之託而昏冥之逃耶言監酒務當父母喜懼之年效子男附庸之役言為縣令取田疇而伍早知有殺之之歌左傳子産從政一年輿人誦之曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之聞絃歌之聲況乃多莞爾之笑偶成善罷安有去思身未可以許人見前仕有時而為養已干小宰題治中别駕之輿周禮天官治官之屬小宰中大夫二人小宰之職掌建邦之官刑以治王官之政令凡官之糾禁宋制縣令轉通判故云題輿敢問大鈞録時文思索之量青箱雜紀云事物紀原云唐有文思院蓋天子內殿之比也其事見畫斷然非工作之所而采太平興國三年始置文思院掌工巧之事而非唐制矣周禮考工記㮚氏掌攻金其量銘曰時文思索允臻其極嘉量既成以觀四國注時是也言是文德之君思求可以為民立法者而作此量信至於道之中故工作之所號文思院餘見前誰實吹噓而送上遽䝉摸索於暗中俱見前天生五材古豈容於一闕左傳天生五材民並用之謂金木水火土也考工記以飭五材鄭注云此五材金木皮玉土賈疏云鄭有皮玉無水火者以百工定造器物之人水火單用不得為器知有皮玉者此三十工內函人為甲韗人為臯陶造鼓鮑人主治皮又有玉人之等故知有皮玉無水火也國有六職今未廢於百工考工記國有六職百工與居一焉注事官之屬於天地四時之職亦處其一然宫室苑囿之無增漢文帝紀贊孝文皇帝即位二十三年宫室苑囿車騎服御無所增益且律度量衡之已正尚書同律度量衡傳律法制及尺丈斛斗斤兩皆均同惟服食器用間屬尚方尚書畢獻方物惟服食器用朱雲傳願賜尚方斬馬劒師古曰尚方少府之屬官也作供御器物劉向傳上令典尚方鑄作事師古曰尚方主巧作金銀之所若今之中尚署在梓匠輪輿率多居肆是雖虗轄宋𣙜貨務都茶場雜買務雜買場左藏庫文思院謂之四轄盍得實材猶泥猶金固難逃於陶冶董仲舒傳猶泥之在鈞惟甄者之所為猶金之在鎔惟冶者之所鑄不稼不穡顧何取於囷㕓詩不稼不穡何取禾三百囷兮又不稼不穡何取禾三百廛兮囷丘倫反正義曰月令修囷倉方者為倉圓者為囷周禮注囷圓倉是也一夫之居曰廛雖銜卵翼肉骨之恩左傳子西曰勝如卵余翼而長之又所謂生死而肉骨者也實負血指汗顔之愧韓文不善為斫血指汗顔巧匠旁觀縮手䄂間兹蓋伏遇某官鹽梅家學衮冕世臣一柱擎天獨扶千萬間之廣厦雲溪友議鄭太穆致書于于司空曰閣下為南溟之大鵬作中天之一柱騫騰則日月暗搖動則山嶽頽杜詩猶卧天一柱注神異經崑崙山地下有八柱拄廣十萬里有三千六百軸互相牽制名山大川孔穴相通明皇雜録張說撰姚崇神道碑石八柱承天高明之位列四時成歲亭毒之功成三槐䕃地詎數十八載之中書東坡三槐堂銘序晉國王公歷事大祖太宗天下望以為相卒以直道不容于時蓋嘗手植三槐于庭曰吾子孫必有為三公者已而其子魏國文正公相真宗於景德祥符之間享其福祿榮名者十有八年銘曰魏公之業與槐俱萌既相真宗四方砥平歸視其家槐隂滿庭王城之東晉公所廬鬱鬱三槐惟德之符每翕受以敷施務兼收而並蓄俱見前惟是其所非非其所是既杜閉羣枉之門劉向傳持不斷之意者開羣枉之門故求者不與與者不求以恢𢎞志士之氣出師表誠宜開張聖德以光先帝遺德恢𢎞志士之氣某敢不仰思識拔誓竭靡捐元后傳當殺身靡骨師古曰靡碎也音武皮反杜詩致君堯舜付公等早據要路思捐軀赤水無心詎敢作還珠之語莊子黃帝游乎赤水之北遺其𤣥珠使知索之而不得使離朱索之而不得也乃使象罔象罔得之注明得真者非用心也唐張籍用裴晉公薦為國子博士而東平帥李師道辟為從事籍賦節婦吟見志以辭之云君知妾有夫贈妾雙明珠感君纒綿意繫在紅羅𥜗妾家高樓連苑起良人執㦸明光裏知君用心如日月事夫誓擬同生死還君明珠雙淚垂何不相逢未嫁時白雲在目願終憐負米之情新唐書狄仁傑字懷英并州太原人授并州法曹參軍親在河南仁傑登太行山反顧見白雲孤飛謂左右曰吾親舍其下瞻悵久之雲移乃得去家語子路見於孔子曰由也事二親之時常食藜藿之實為親負米百里之外親殁之後南遊於楚積粟萬鍾願食藜藿為親負米不可復得也杜詩負米晚為身每食臉必泫代衛運幹朴除太社令謝丞相翰苑新書周建國左宗廟右社稷故有典祀掌以時祭祀秦漢有太祝令景帝改為祠祀武帝更曰廟祀後漢祠祀屬少府魏晉有太祝令丞宋有明堂令丞隋置郊社令唐因之掌郊社明堂祠祀祈禱及茅土衣冠等事夲朝嘉祐初置郊社令命石祖元為之熙寧初郊社局令張伯世言局有郊社名而不主四郊之事於是始主四郊壇壝之事渡江闕紹興十九年始除韓彥直為太社令計幕終更方俟通班之命谷永與段會宗書終更亟還劉子𤣥史通少小從仕早躡通班容臺置屬遽叨司社之除大社令屬太常非鈞播之無垠見前知爨餘之必棄韓詩遇賞還同爨下餘恩淪骨髓感鍥肺肝鍥音契去計切荀子鍥而不舍竊惟太祝奉禮之攸司實與正字校書而相埓埓音劣等也禮樂自天子出義先郊社之明籩豆則有司存職在典章之習非取簮紳之素望見前必先閥閲之清流三國志注沭並戒子書材質滓濁汙於清流庶存子諒之心禮記致樂以治心則易直子諒之心油然生矣疏子謂慈愛諒謂誠信克贊寅清之職見前詎應庸下遽玷選中劉孝綽啓寵灮曲被獨在選中伏念某纍舉無成韓文四舉而後有成孤蹤何取三仕庇身於內幕無足策名一官主畫於外臺僅知守法黨錮傳南陽宗資主畫諾謝夷吾傳尋功簡能為外臺之表袁紹傳注謁者為外臺陳頵傳刺史銜命國之外臺惟是日畿之奔走類說拾遺帝畿千里象日月徑圍故曰日畿實多風浪之侵凌獨憑卵翼之恩曲全羈迹盡出齒牙之賜遂足薦章既可脫離選調之灘便使饜飫小人之腹並見前適值糟糠之在褥宋𢎞傳糟糠之妻不下堂小稽松菊之迎門歸去來辭僮僕歡迎稚子候門三徑就荒松菊猶存除書有隕以自天昜姤九五以杞包瓜含章有隕自天愧汗滂流而至地莊子汗流至踵趙一傳下筆氣結流汗競趾身如病鶴詎容陪鵷鷺之行山谷詩身如病鶴翅翎短心似亂絲頭緒多技止黔驢何足玷麒麟之楦楦呼願切說文履法也朝野僉載盈州令楊炯詞學優長恃才簡傲不容于時每見朝官目為麒麟楦人問其故曰今酺樂弄假麒麟者刻畫頭角修飾皮毛覆之驢上巡場而走及脫皮褐還是驢耳無德而衣朱紫與覆麒麟皮何别陳後山詩是身雖臭腐寧作青紫楦山谷詩忽思麒麟楦突兀令人驚此大丞相所謂采葑之意見前在小丈夫則懷據蒺之慙易困于石據于蒺藜摩頂放踵而知恩糜骨捐軀而難報見上條伏遇某官棟桴九廟桴音孚爾雅棟謂之桴廣韻屋棟也班固傳荷棟桴而高驤壞冶萬殊崔駰傳壞冶一陶繫辭萬物散殊高適詩衆才淨萬殊少保兹惟三孤獨任兩儀之寅諒見前冡宰掌建六典並收四海之賢能周禮太宰之職掌建邦之六典以佐王治邦國一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典惟俊乂宜在於㫄招何巧拙亦容於雜進見前曲念一門之父子楊誠齊詩惟君有子又擢桂父子仇香仍一門甚如異姓之弟兄輔翼之振德之不遺餘力見前吹噓是披拂是倍費元功莊子孰噓吸是孰居無事而披拂是國語以贊元功憐某在伯仲之間獨補選階之冗恐某試子男之邑未間吏道之師薛宣傳吏道以法令為師朱博傳贊所在而治為世吏師必令致曲以有成鄭𤣥注曲猶小小之事不忍徑麾之使去史記汲黯傳招之不來麾之不去天生地育尚難回霜雪之餘嶽峻海深何嘗假㳙塵之助見前受知如此揣分謂何某敢不退省內愆甘求外補漢安帝紀永初二年詔上尚書公府通調令得外補成終成始得䝉亟屏之四方使過使功猶願少殫於一得新唐書李靖傳蕭銑據江陵詔靖安輯帝謂靖逗遛詔都督許紹斬靖紹為請而免靖率兵八百破其屯俘擒五千帝謂左右曰使功不如使過靖果然代董惠州居誼除鼓院謝丞相地理沿革表惠州春秋百越地後屬南海郡宋秦齊屬南海東莞二郡隋立循州大業州廢立龍川郡唐武德曰循州天寶曰海豐郡屬嶺南道漢改禎州别立循州於北境今按郡志惠州秦漢屬南海晉析置東官梁陳改梁化隋廢梁化置循州煬帝廢循州改龍川郡唐復循州中宗改雷鄉郡𤣥宗改海豐郡南漢劉鋹改禎州又析興寧置齊昌府宋仁宗天禧二年避御名改禎州為惠州徽宗宣和二年改博羅郡高宗紹興三年復為惠州會要登聞鼓院國初曰鼓司以內臣掌之在宣德門南街北廊至道三年命太子中舍王濟勾當鼓司用朝臣勾當自此始景德四年詔改為登聞鼓院掌諸上封而進之以達萬人之情燕翼詒謀録唐有理匭使五代以來無聞淳化三年詔置理檢司以錢若水領之其後改曰登聞院又置鼓于禁門外以逹下情名曰鼓司宋張湜雲谷雜記云文昌雜録云登聞鼓院未知起于何代因讀唐會要顯德五年有抱屈人賫鼓于朝堂訴遂令東西都門各置登聞鼓蓋始于此愚按世說晉元帝時張闓私作都門早閉晚開羣小患之詣州府不理撾登聞鼓又晉范堅傳帳吏邵廣盜官幔正刑棄市二子撾登聞鼓求自沒為奚官奴以贖父命後魏刑法志世祖闕左懸登聞鼓有窮寃則撾鼓公車上奏又隋高祖詔四方詞訟有枉屈州縣不理者乃詣闕伸訴有所未聽撾登聞鼓則登聞鼓其來已久非始于唐也元周密癸辛雜識云今登聞鼓院初供職吏具須知軍狀稱夲院舊管鼓一面在東京宣政門外被太學生陳東等擊碎不曽搬取前來負丞支郡冒分千里之符見前承命夲朝俾典四方之匭匭音軌匣也唐百官志武后垂拱二年有魚保宗者上書請置匭以受四方之書乃鑄銅匭青匭曰延恩在東丹匭曰招諫在南白匭曰伸寃在西黑匭曰通𤣥在北恩逾望外愧溢情涯竊惟聖王量能授官寧無差擇差初加切擇也詩既差我馬差擇釋詁文君子居昜俟命惟有靖共見前傳明戒於鄙夫史大書於巧宦韓文將大書特書汲黯傳黯姊子司馬安亦少與黯為太子洗馬安文深巧善宦四至九卿茍睥睨孔鸞之集睥音譬睨音詣傍視也司馬相如子虛賦宛雛孔鸞注孔孔雀鸞鸞鳥上林賦遒孔鸞促鵕儀韓詩明庭集孔鸞曷取于鳬鷖山谷詩入對隨孔鸞皆覬覦雞犬之仙覬音寄覦音于廣韻欲得也左傳下無覬覦白樂天詩世務經摩揣周行竊覬覦材固難全官亦有限牛溲馬勃雖待用於醫師見前蟲臂鼠肝盍冥心於造化南史袁昻傳恩隆絶望之辰慶集冥心之曰杜詩冥心若死灰餘俱見前如某者才真樗散莊子吾有大木人謂之樗又匠石之齊見櫟社樹其大蔽牛弟子曰自吾執斧斤以隨夫子未嘗見材如此其美也匠石曰已矣勿言之矣散木也注不在可用之數故曰散木杜詩鄭公樗散鬢如絲性實棗昏范曄香序棗膏昏䝉甲馢淺俗非謂無助於馨烈乃當彌增於尤疾棗膏昏䝉比羊𤣥保科名不補於遺餘見前塵俗敢辭於抗走北山移文抗塵容而走俗狀楚萍試邑僅逃製錦之傷家語楚昭王渡江江中有物大如斗圓而赤直觸王舟王使使問於孔子孔子曰此所謂萍實者也可剖而食吉祥也杜詩充饑憶楚萍一統志萍鄉縣在袁州西一百四十里夲宜春縣地孫吳析置萍鄉縣屬安成郡以楚昭王渡江得萍實於此故名左傳猶未能操刀而使割也其傷實多子有美錦不使人學製焉大官大邑身之所庇而使學者製之其為美錦不亦多乎古栝佐州濫竊代庖之譽處州為古栝蒼州有小括山冒然乘障張湯傳乃遣山乘障注乘登也登而守之許以造朝既得郡於南交尚書宅南交指惠州漸理裝而西返常鱗凡介之儔匹自分泥沙韓文大江之濱有怪物焉非常鱗凡介之品彚儔匹也然是物也負其異於衆也且曰爛死于泥沙吾寧樂之雙鳧乘鴈之去來何心渤澥揚雄傳譬若江湖之雀渤澥之鳥乘鴈集不為之多雙鳧飛不為之少顧惟椎鈍乃辱甄收其求士甚士之求公廖廖斯道見前不即人而人自即我愧愧此恩東坡答山谷書此人如精金美玉不即人而人即之將逃名而不可得伏遇某官忠結主知道先民覺大鈞播物惟隨器以剸裁剸音團裁割也直柄當權肯狥情而俯仰韓文石鼎聯句直柄未當權塞口且吞聲莊子引之則俯舍之則仰彼人之所引非引人也察某乏蟻子之援知某無梟炙之求俱見前特使啞鍾唐初即用隋樂隋用黃鍾一宫唯擊七鍾其五懸而不擊謂之啞鍾張文收乃依古斷竹為十二律與祖孝孫等次調五鍾叩之而應由是十二鍾皆用入司路鼓周禮夏官太僕出入王之大命建路鼓于大寢之門外而掌其政以待逹窮者爰居聞樂不勝疑駭之情國語海鳥曰爰居止于魯東門之外臧文仲使國人祭之莊子海鳥止于魯魯矦觴之于廟奏九韶以為樂具大牢以為膳鳥眩視憂悲不敢食一臠不飲一杯三日而死司馬彪曰即爰居也罔象得珠殆匪經營之力莊子黃帝遊乎赤水之北登乎崑崙之丘而南望還歸遺其𤣥珠使知索之而不得使離朱索之而不得使喫詬索之而不得也乃使象罔象罔得之黃帝曰異哉象罔乃可以得之乎某敢不仰承殊渥勉䇿孤踪守虎豹之關無使君門之壅宋玉招魂虎豹九關啄害下人些逹豭豚之訟必思民瘼之通瘼音莫說文病也詩求民之瘼郭璞曰東齊謂病曰瘼通作莫今詩作求民之莫代回鄒泉州應龍賀新除詳啓意蓋代月湖下同夏辟三千參聮弗績晉書刑法志夏后氏之王天下也則五刑之屬三千殷因于夏有所損益書序吕命穆王訓夏贖刑參七南反周禮設其參注參三分也謂卿三人又官聮以會官治注聯讀為連謂國有大事不能獨共則六官共舉之小宰職曰以官府之六聮合邦治冬官六十攝長何庸周禮六曰冬官其屬六十大事則從其長小事則專逹非帡幪實免其震凌見前則山澤密藏其汙疾左傳川澤納汙山藪藏疾正義云川是流水澤是委水衆水所歸故總云納汙山有木藪有草毒蟲所聚故總云藏疾恭惟某官儒者給事山谷詩儒者給事中顧公甚魁偉晉書儒林傳陳劭字節良以儒學徴為陳留內史泰始中詔曰陳劭博通六籍耽悅典誥老而不惓宜在左右以篤儒教可為給事中藝文類聚胡廣曰給事中常侍從左右無員位次侍中之下常侍或名儒或國親王之藎臣詩王之藎臣無念爾祖無念爾祖聿修厥德傳藎進也箋今王之進用臣當念汝祖為之法吕氏曰忠愛之篤進進無己海水簸弄明月珠兹亦竒矣韓詩婆娑海水南簸弄明月珠曉漏追隨青瑣闥誰其似之杜詩曉漏追隨青瑣闥晴窗㸃檢白雲篇曲為蟠木之容見前未許槁梧之暝莊子儻然立於四虛之道倚於槁枯而吟注無所復為也然以挂冠之歲月見前居然曳履於星辰杜詩聽履上星辰恐嘖人言左傳嘖有煩言韻會嘖嘖鳴也又爭言貌誰侜豫美侜音周說文有雍蔽也詩誰侜豫美心焉忉忉傳侜張誑也箋誰誰讒人也汝衆讒人誰侜張誑欺我所美之人乎欲乞骸骨而去疏廣傳上疏乞骸骨張安世傳上疏歸侯乞骸骨杜延年傳以老病乞骸骨更借齒牙之餘見前某視䕃可驚左傳趙孟視䕃曰朝夕不相及誰能待五䕃日景也趙孟意衰以日景自喻託根自喜山谷詩託根桃李場望崦嵫而勿迫漸為歷吉日之謀離騷經欲少留此靈璅兮日忽忽其將暮吾令羲和弭節兮望崦嵫而勿迫又靈氛既告子以吉占兮歷吉日乎吾將行張華詩羲和䇿六龍弭節越崦嵫歷遍歷而選之也言靈氛告我還去今選擇吉日將為逺行也驅豐隆以寄聲敢致登閬風之祝豐隆或曰雲師或曰雷師郭璞云豐隆筮師御雲得大壯卦遂為雷師離騷經吾令豐隆乘雲兮求宓妃之所在又朝吾將濟于白水兮登閬風而絏馬閬風仙山也栁文安得不憑豐隆訴蜚亷以寄聲于寥廓耶代回諸路賀新除旅小宰之班自慙久假旅序也儀禮鄉飲酒禮司正升相旅周禮小宰之職掌建邦之官刑以治王官之政令凡宫之糾渙大昕之號猥遂為真昕音欣說文旦明也日將出也周禮大昕之朝趙廣漢傳為京兆尹滿歲為真尹翁歸傳以髙第入守扶風滿歲為真雖參筆槖之華趙充國傳夲持槖簪筆師古曰槖所以盛書也簪筆者插筆于首實懼瓶罍之溢杜詩瓶罍易滿船未遑摧謝張湯傳湯摧謝師古曰若上有責即摧折而謝也先辱飛箋鏘然韶鈞杳默咸池之奏李漢韓文序蔚然而虎鳯躍鏗然而韶鈞鳴莊子咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走又帝張咸池之樂于洞庭之野吾始聞之懼復聞之怠卒聞之而惑蕩蕩默默乃不自得粲若藻火扶持夜燎之灮東坡詩文字粲藻火詩夜未央庭燎之灮陳後山詩扶豎夜燎齊朝灮徒深篋衍之藏莊子夫芻狗之未陳也盛以篋衍中以文繡尸祝齊戒以將之注衍笥也盛狗之物也司馬云合也莫效襜褕之報張衡四愁詩美人贈我貂䄡䄖何以報之明月珠說文直裾謂之䄡䄖代回衆官賀新除攝事二卿閲時無補攝失涉切廣韻兼也一曰假也左傳攝官承乏閲欲雪切車千秋傳無伐閲功勞師古曰閲經歷也閲時猶言經時䝉恩進律滿歲為真王制有功德于民者加地進律注律法也正義曰即大行人上公九命繅藉九寸冕服九章建常九斿之等是也平帝紀吏在位二百石以上一切滿秩為真韓延壽傳滿歲稱職為真曽㢲謝之未遑辱謙撝之先及見前燦然駢麗寵此畸涼畸或作竒不耦也說文涼薄也左傳虢多涼德牘制有嚴不克視施而為報襟期甚厚惟當永矢以弗諼梁書高澄與侯景書繾綣襟期綢繆素分陳書侯安都傳款襟期于話言推丹赤于造次世說顧孟著嘗以酒勸周伯仁伯仁不受顧因移勸柱曰詎可便作棟梁自遇周得之欣然遂為襟契也詩日糴太倉五升米時赴鄭老同襟期諼通作喧爾雅忘也詩獨寐寤言永矢弗諼四六標準卷七
