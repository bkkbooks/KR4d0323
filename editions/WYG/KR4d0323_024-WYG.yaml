body:
  text: 四六標準巻二十四宋李劉撰漕使職官志宋藝祖開基懲五季之亂藩臣擅有財賦不歸王府自乾徳以後僣偽略平始置諸道轉運使以總利權開寳六年廣南平除徐澤為判官盖轉運判官始此其轉運使之名國初但曰勾當某路水陸計度轉運事官髙者則曰某路計度轉運使太平興國初皆曰使兩省以上則為都轉運使又置副使與諸路判官又置同勾當轉運事俄罷諸路副使真宗毎用兵或令都部署兼轉運使王師征討則有隨軍轉運使事畢即停至道中詔曰天下物宜民間利害轉運使得以周知令更互赴闕延見詢問慶厯中皆帶按察之任六年罷之先是判官與轉運争權而罷至嘉祐中復置熈寜三年詔轉運使用本資序人即充資序下一等為權二等為權發遣中興以來逐路都轉運使除授不常惟使副判官常置焉賀新潼川黄運使申知榮州作䟽㤙北闕見前將漕東川方輿勝覽蜀分廣漢為梓潼郡晉又分置新都郡蕭紀於郪縣置新州隋改新州為梓州因梓潼水為名唐肅宗以梓州為東川節度治所次公之最既殊宜登丞弼黄覇傳天子以覇治行終長者下詔稱揚徵覇為太子太傅遷御史大夫代丙吉為丞相叔度之撓不濁暫借澄清世說郭林宗詣黄叔度至彌日信宿人問其故林宗曰叔度汪汪如萬頃之陂澄之不清擾之不濁其器深廣難測量也又陳仲舉登車攬轡有澄清天下之志和氣褰帷仁聲載路詩厥聲載路沈休文碑威令首塗仁風載路恭惟某官負材瓌碩迪徳忱恂尚書迪知忱恂于九徳之行怡然不辭小官之時恢乎可以大受之量盤根利器無四顧之全牛並見前大輅鳴鑾洗萬古之凡馬班固西都賦大輅鳴鑾容與徘徊集乎豫章之宇臨乎昆明之池餘見前兹牧三近古之郡東坡眉山逺景樓記吾州之俗有近古者三詳見前實昔再轉丞之邦韓文再轉而爲丞兹邑田里無愁歎之聲所居民富循吏傳序所居民富所去見思詳見前原隰有光華之遣果若人言惟益部之使星俱髙而潼漕之門地尤峻潼音同說文潼水出廣漢郡梓潼北界南入墊江一統志潼水出潼川府鹽亭縣南源自建州隂平縣竇圖山經綿州入本縣界下白馬河入涪江按宋潼川府路轉運司在遂寜府建臺移治盖田諌議之言田錫字表聖太宗真宗朝為諌議大夫持節䇿名有趙清獻之烈趙抃為潼川路轉運使詳見前惟公濟羙與古匹休尚書其作周匹休使臣得咨訪之周上意知總領之稱魏相傳總領衆職甚稱上意某偶乘一障獲託萬間蹊田方窘於奪牛斗水誰憐於涸鮒並見前即日褰裳而求去詩子惠思我褰裳渉溱崔駰傳褰裳濡足冠挂不顧聞公攬轡而少留有刺史之榮無刺史之難是在使者韓文丈夫官至刺史亦榮矣雖然民之豐約縣於州民就窮而歛愈急吾見刺史之難為也崔君為復州其連帥則于公崔君之仁足以蘇復人于公之賢足以庸崔君有刺史之榮而無其難為者將在於此乎飲故人者恩按故人者法惟所命之贊慶攸初乞憐是愧並見前賀黄運使交割申知榮州作攬轡撫封褰帷問俗漕下氷觧徯原隰之載馳並見前財阜風薫與軺軒而偕至舜南風歌南風之薫兮可以觧吾民之愠兮南風之時兮可以阜吾民之財兮民無罪嵗帝有徳星天官書景星者徳星也其狀無常常出於有道之國後漢書裴楷傳注徳星嵗星也晉天文志徳星大而中空或曰有三星亦名徳星黄色煌煌然所見之國大昌異苑陳實與諸子姪造荀淑父子討論於時徳星聚太史奏曰五百里内有賢人聚恭惟某官簡要而清通世說吏部郎闕文帝問其人于鍾㑹㑹曰裴楷清通王戎簡要皆其選也優游而昭晰韓文行峻而言厲心淳而氣和昭晰者無疑優游者有餘萬頃不濁何能撓叔度之清四國于宣所去思次公之政並見前暫别峨眉之月李詩峨眉山月半輪秋來觀涪右之風涪江在郪縣北通遂州通典潼川左帶涪水右挾中江杜詩涪右衆山内金華紫崔嵬注梓州在涪江之右故曰涪右豈徒榮練鵲之袍察二千石宋史輿服志錦袍有翠毛宜男雲鴈細錦師子練鵲寳照大錦景祐元年始詔河北河東陜西三路轉運使副並給方勝練鵲錦從劉錠之請也盖將倚木牛之運出五丈原蜀志建興元年復出祈山以木牛運十二年悉大衆由斜谷出以流馬運據武功五丈原按五丈原在今鳳翔府郿縣西南二十五里列城暫倚於澄清衆職恐煩於總領魏相傳宣帝始親萬機厲精為治練羣臣核名實而相總領衆職甚稱上意某冐乘斗壘幸𨽻井封漢書提封萬井井斗星名君子憂道不憂貧缾之罄矣詩缾之罄矣維罍之耻正義曰罍器大缾器小酌酒者當多酌罍少酌瓶不使小器先竭今瓶之既盡矣而罍尚盈滿是為酌罍者之耻也國人望公如望嵗雨以潤之左傳國人望君如望嵗焉繫辭雷以動之風以散之雨以潤之日以晅之艮以止之兊以說之乾以君之坤以藏之賀吕提刑除運使詳刑奏最後漢書劉愷傳以輕從重懼及善人非先王詳刑之意也注書曰有邦有土告爾詳刑鄭𤣥注云詳審察之也晉書𤣥帝紀布帳練帷詳刑簡化唐龍翔中改廷尉正為詳刑大夫詳見前轉漕升華漢食貨志轉漕甚逺又兵甲轉漕之費統部不移令已孚於先甲易先甲三日後甲三日王弼注甲者創制之令也創制不可責之以舊故先之三日後之三日使令治而後乃誅也事權益進命不待於重申易重巽以申命六轡借留百城胥抃恭惟某官負材鴻碩蓄徳駿厖詩受大共小共為下國駿厖厖豐也厚也家學淵源擅箕裘之弓冶世臣閥閱屹鼎鼐之樓臺盍徑歸清切之班顧洊屈皇華之寄並見前二節三節俾詳察於風謡禮記凡君召以三節二節以走一節以趨李宻傳觀省風謡特書屢書已茂登於嵗績韓文答元侍御書足下年尚彊嗣徳有繼將大書特書屢書不一書而已也茲峻躋於延閣俾專制於計臺地上錢流欲暫煩於鞭筭日邉人至即遄上於槖班某幸甚受容復茲竊䕃三熏三沐僅能寓致於䨇魚載馳載驅行賦勞還之四牡並見前賀䕫路徐運使瑄叱馭及疆見前褰帷問俗後漢書賈琮傳黄巾新破兵凶之後選清能吏以琮為冀州刺史舊典傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聴糾察羙惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震察二千石知逺有於光華見前登百八盤亦備嘗於險阻百八盤自峽入䕫之路詳見前左傳險阻艱難備嘗之矣神明所相忠厚為周國語忠信為周恭惟某官徳配春華氣涵秋杳杜詩尚書氣與秋天杳平生仁義所學皆本於孔周韓詩平生企仁義所學皆周孔單辭明清致君亦欲其堯舜尚書明清於單辭東坡詩讀書萬巻不讀律致君堯舜終無術出騰縣最入重郎潜張衡思𤣥賦尉龎眉而郎潜兮逮三葉而遘武謂拾級以升髙禮記拾級聚足連歩以上注謂前足躡一等後足併從之忽抗章而引外汶川鄖水今為湖北之偏州汶水在今徳安府應山縣西北二里經東南入方家河溳于分切溳水在府城西北源出陪尾山石巖下遶城西隅東流入漢江俗稱府河亦名石潼唐劉文房詩淮南摇落客心悲溳水悠悠怨别離早鴈初辭舊闗塞秋風先入古城池又暮雨不知溳口處春風只到穆陵西徳安府宋𨽻湖北路漢廣江沱久矣召南之羙化詩漢之廣矣不可泳思又江有沱之子歸雙旌戾止五袴爰昭見前諒思檢校於杜詩少陵有草堂檢校收稻詩東屯所作遂賦馳驅於周雅瞿唐五六月自昔畏團團之天韓詩瞿唐五六月驚電讓歸船怒水忽中裂千尋墮幽泉環迴勢益急仰見團團天巫山十二峰何况濟朝朝之雨李群玉宿巫山廟詩停舟十二峰巒下仙佩仙香夜半聞鮑溶巫山懐古詩十二峰巒闘翠㣲石煙花霧犯容暉李渉詩十二山晴花盡開楚宫雙闕對陽臺髙唐賦旦為朝雲暮為行雨朝朝暮暮陽臺之下遂勞六轡峻陟萬山蛇退猿愁人何堪而至此蛇倒退胡孫愁皆峽路地名山谷詩竹竿坡靣虵倒退摩圍山腰胡孫愁杜鵑無血可續淚何日金鷄赦九州又風飱水宿六十里虵退猿愁八百盤又撑崖掛谷蝮蛇愁入箐攀天猿掉頭狨啼鼷嘯公所至以晏然狨音戎禺屬陸佃云大小類猿長尾尾作金色俗謂之金線狨生川峽深山中稗史云狨者猿猱之屬其雄毫長尺五常自愛䕶今大官為煖座者是也生深山中千萬成群鼷弦鷄切說文小䑕也春秋成七年食郊牛角何休云䑕中之㣲者按少陵石龕詩云熊羆咆我東虎豹號我西我後鬼長嘯我前狨又啼則鼷嘯當作鬼嘯為是鼷䑕㣲物豈能嘯乎又韓退之詩猿呼鼯嘯鷓鴣啼則鼷嘯或作鼯嘯亦通聞蜀道分八使之權蜀道八使謂成都䕫州潼川利州四路轉運使副使共八也以䕫漕為諸司之冠家有鹽井固足操用度之贏杜陵䕫府書懷詩煑井為鹽速燒畬度地偏民無錢爐似亦困征輸之役一賢既入百姓何憂逺而使之觀其忠可窺上意使者專焉得其道寜有遐心功名留乆逺之看富貴乃緒餘之事並見前如某者無用於世所敬惟賢頃聞武城之絃睢盱慕藺睢呼回切盱匈于切睢盱視貎韻㑹小人喜悅司馬相如傳相如既學慕藺相如之為人也更名相如近載益州之舶邂逅識荆見前便䝉許載之從車詩命彼後車謂之載之魏文帝與吳質書從者鳴笳以啟路文學託乘於後車山谷詩後車載之回風騷且復指迷於前路歸去來辭問征夫以前路稱曰知已知己未也更容受察於六條昌黎上張僕射書若使隨行而入逐隊而趨言不敢盡其誠道有所屈於已雖日受千金之賜一嵗九遷其官感㤙則有之矣將以稱於天下曰知己知己則未也待以國士國士報之寜敢貢䛕於尺牘見前賀李運使鼎起家將漕掲節濟湘舊令尹之䨇鳬甫去十五年之近部刺史之四牡今察二千石而來民距躍以争迎公馳驅其何憚恭惟某官篤誠而明允簡要而清通言行擇君子之中庸徳業得賢人之久大並見前十年出幕孰居行營司馬之先杜詩十年出幕府新唐書韓愈傳裴度以宰相相度彰義軍宣慰淮西奏愈行軍司馬萬里封矦乃在諸妄校尉之後班超傳此萬里矦相也李廣傳廣與望氣者王朔語曰自漢擊匃奴廣未嘗不在其中而諸妄校尉以下材能不及中以軍功取矦者數十人廣不為後人然終無尺寸功以得封邑者何也張晏曰妄猶凡也勇襆望郎之被出褰膚使之帷並見前爰從綠波青草之間青草湖一名巴丘湖北連洞庭南接瀟湘束納汨羅之水每夏秋水泛與洞庭為一水涸則此湖先乾青草生焉張志和漁歌青草湖中月正圓巴陵漁父櫂歌連杜詩洞庭猶在目青草續為名盡覽赤甲白鹽之勝金掌甫升於卿月並見前玉鈐又屬之將星廣韻兵鈐以閉房神府以備非常後漢書方術傳鈐决之符注兵法有玉鈐篇王勃太公贊豹韜禳惡龍鈐辟邪隋志有隂符鈐錄一巻唐李靖有兵鈐新書一卷宋有景徳虎鈐經歐陽永叔詩將論縱横輕玉鈐謂兵書也春秋元命苞上天一將為郎將史記天官書五帝座後聚一十五星蔚然曰郎位旁一大星將位也晉天文志郎將在郎位北主閱具所以為武備也王維詩天官動將星漢上栁條青與其食武昌之魚又㸔種栁吳志陸凱傳童謡言寜飲建業水不食武昌魚寜還建業死不止武昌居王介甫寄鄂州張使君詩昔人寜飲建鄴水共道不食武昌魚公來建鄴毎自如亦復不厭武昌居陶侃傳侃性纎宻好問頗類趙廣漢嘗課諸營種栁都尉夏拖盗官栁植之已門侃見駐車問曰此是武昌西門前栁何因盗來此種劉禹錫詩一辭温室樹幾見武昌栁錢起詩曉泊武昌岸津亭踈栁風數株曽手植好事憶陶公又字重上不若蠟永嘉之屐少待戍𤓰阮孚傳孚性好屐或有詣孚正見自蠟屐因自嘆曰未知一生當着幾量屐神色甚閑暢南史謝靈運傳為永嘉太守尋山陟嶺必造幽峻巖嶂数十重莫不備盡登躡常着木屐上山則去其前齒下山則去其後齒有懷清絶之大招杜詩湖南清絶地萬古一長嗟大招屈平所作平為懷王左徒王信讒疏平平自傷忠而被謗乃作離騷經以諷不見省納及襄王立又放之江南乃復作九歌天問九章逺游卜居漁父大招自沉汨羅以死復賦皇華之小雅皇華小雅篇名暮捲西山之雨曉行湘水之春洞庭無波聊護木牛之運牂牁為徼皆知竹馬之迎並見前有功見知詩序四牡勞使臣之來也有功而見知則說矣不逺伊邇詩中心有違不逺伊邇箋邇近也言君子與已决别不能逺維近耳某强顔佐郡傴指終更傴委羽切說文僂也廣韻不伸也傴指猶言屈指非有海沂之功可歌别駕並見前豈謂瀟湘之地又逢故人雲溪友議徐侍郎安貞久居中書參李右座議恐其罪累乃逃隐衡山嶽寺為行者李北海邕寓寺見所題寺梁乃召至握手曰朝列于公已息論矣因同載北歸止潭州察使相迓徐侍郎指李北海呼曰行者瀟湘逢故人得隨歸客右座林甫也栁渾詩瀟湘逢故人劉長卿詩逺客瀟湘裏歸人何處逢詳見前偶聞報之不先慙奏記之已晩朱博傳文學儒吏時有奏記儻憐秋水長天之共其善助之庶安清風明月之分㑹且歸兮詩㑹且歸矣無庶予子憎餘並見前通張運使嗣古飲水西江未及瞻舍人之様古徳機縁龎居士參馬祖問不與萬法為侣者是甚麽人祖曰待汝一口吸盡西江水即向汝道此借用餘見前披雲南嶽行當參都漕之臺樂廣傳瑩然若披雲霧而覩青天詳别見東坡韓文公廟碑公之精誠能開衡山之雲而不能回憲宗之惑漕司兩省以上為都轉運使欲提聾丞黄覇傳長史許丞年老病聾督郵白彼逐之覇曰許丞亷吏雖老尚能拜起迎送正頗重聴何傷上累膚使寸丹炯若杜詩丹心一寸灰尺素布之飲馬長城窟行呼兒烹鯉魚中有尺素書恭惟某官心契九秋眼髙四海東坡詩眼髙四海空無人周情孔思探鳳髓以調膠十洲記鳳麟洲在西海中央地方一千五百里洲上多鳳麟仙家以鳳喙及麟角合煎作膠名曰集弦膠一名連金泥膠青色如碧玉漢武時西王母使獻靈膠四両帝不知其妙以付庫帝幸上林苑射虎弦斷使從駕因取一分膠口濡以集弦射虎而帝使武士對挽終不脫勝於舊弦杜詩麟角鳯觜世莫識煎膠續絃竒自見杜牧詩杜詩韓筆愁來讀似倩麻姑癢處掻天外鳳凰誰得髓無人觧作續絃膠宋艷班香㧞鯨牙於刺手杜牧詩髙摘屈宋艷濃熏班馬香韓詩刺手㧞鯨牙舉瓢酌天漿注魏道輔云髙至於酌天漿幽至於㧞鯨牙其思賾深逺如此詎止於曹劉沈宋之間耶早司存於雨露既感㑹於風雲並見前厭承明之廬人共期於三入嚴助傳厭承明之廬魏應瑒詩問我何功徳三入承明廬巋靈光之殿天實相其獨存王延夀魯靈光殿賦序自西京未央建章之殿皆見隳壞而靈光巋然獨存意者豈非神明依慿支持以保漢室者也聊歌小雅之皇華來領大招之清絶上原下隰拓長沙千里之平重江複湖䕶洞庭九州之大並見前齒髮未凋於計相張蒼傳天下初定公卿皆軍吏蒼為計相蒼免相後口中無齒食乳腹心當屬於留侯漢書叙傳信布𤓰牙腹心良平豈舍王哉今召君矣汲黯傳吾今召君矣伏念某蟬聨成紀揚雄傳有周氏之蟬嫣兮應劭曰蟬嫣連也說文聨連也從耳耳連於頰也從絲絲連不絶也吳都賦蟬聨丘陵韻㑹蟬聨不絶之貌南史宋王鈞七葉之中爵位相繼人人有集沈約謂人曰自開闢以來未有爵位蟬聨人才相繼如王氏之盛者韓詩𦙍胄本蟬聨漢書李廣隴西成紀人也鳬徙臨川爾雅鸍沈鳬沈鳬好沒楚辭將汜氾若水中之鳬乎鳬無定居故云鳬徙家故一寒無蚍蜉蟻子之援官仍獨冷有驪駒狗曲之嘲並見前歸尋黄獨之苖杜詩黄獨無苖山雪盛甘老青精之飯杜詩豈無青精飯使我顔色好猥䝉文石之陛梅福傳願壹登文石之陛渉赤墀之塗俾讀武岡之銘栁文有武岡銘自非使者之汝容東坡詩勸農使者不汝容因君作詩先自劾轉恐丞哉之余負見前鄉人見孺子之入諒亦惻於仁心長史無宰相之才詎敢干於薦口新唐書張柬之傳武后謂狄仁傑曰安得一竒士用之仁傑曰陛下求文章資歴今宰相李嶠蘇味道足矣豈文士齷齪不足與成天下務哉后曰然仁傑曰荆州長史張柬之雖老宰相材也韓詩幾欲犯嚴出薦口氣象硉兀未可攀通湖南黄運使桂乘軺将漕漕在到切說文水轉轂也王隆小學篇以水通輸曰漕攬轡濟湘光粲壁奎卿月謂升於金掌見前祥開翼軫魁星顧聚於玉衡晉天文志魁四星為旋璣杓三星為玉衡四海歉然重湖幸甚恭惟某官果達而藝直大以方宋孫宗鑑東皋雜錄云東坡好嘲謔以吕㣲仲豐碩毎戲之曰公真有大臣體此坤六二所謂直方大也微仲拜相東坡當制云果藝以達有孔門三子之風直大而方得坤爻六二之動文武兩科蚤占群英之冠冕忠信一念允為百世之楷模恬要路之在前甘急流之勇退東觀聿躋於蓬頂俱見前南風遽愴於棘心詩凱風自南吹彼棘心棘心夭夭母氏劬勞既釋素冠盍持紫槖顧賦皇華之雅來尋清絶之騷俱見前開天柱紫盖之雲民碞洞見長沙志衡山七十二峰最大者五祝融紫盖雲宻石廩天柱東坡詩洞庭青湖渺無際天柱紫盖森欲動尚書用顧畏于民碞澄洞庭青草之水地險彌堅杜陵何憚於曉行賈傅即觀於夜對某一寒寡與三暑投閑俱見前頃者誨館下之生不能教胄尚書命汝典樂教胄子今兹補黔中之佐定是負丞見前所幸綴曲江之題黄盖李之同年或可逃直指之斧貴賤位矣雖有一龍一豬之分繫辭卑髙以陳貴賤位矣韓詩三十骨骼成乃一龍一豬左右采之固在四牡四駱之下見前通潼川程運使遇孫宋潼川路轉運置司治遂寜府小溪縣度劍閣之險戍月悽然方輿勝覽大劍山在劍門縣亦名梁山小劍山在其西北三十里輿地廣記山有小石門穿山通道六丈有餘其地連山絶險又謂之劍閣道大劍雖號天險有阨塞可守崇墉之間徑路頗夷小劍則鑿石架閣有不容越太白所謂一夫當闗萬夫莫開者此也張載劍閣銘惟蜀之門作固作鎮是曰劍閣壁立千仭窮地之險極路之峻李詩劍壁門髙五千丈石為樓閣九天開又劍閣重闗蜀北門望玉臺之遥使星明甚少陵玉臺觀詩中天積翠玉臺遥上帝髙名絳節朝公自注玉臺觀滕王造又閬山歌閬州城東靈山白閬州城北玉臺碧注唐志閬州有靈山又有玉臺觀乆欲布仰髙之悃趙壹傳仰髙希驥歴年滋多兹併修賀上之恭白樂天詩賀上人為得報書大誇州宅似仙居恭惟某官心平而行髙人今而學古彯纓諾仕大夫争羅而致之澤笏造朝廷臣無出其右者並見前捨萬里九霄之騰踏韓詩飛黄騰踏去甘五年一節之回翔禮記翔回焉鳴號焉不辭載馳載驅之勞兹見可大可久之業碩果何嫌於不食易碩果不食君子得輿小人剥廬王弼注處卦之終獨全不落故果至于碩而不見食也包𤓰自得於含章易以杞包𤓰含章有隕自天王弼注包𤓰為物繫而不食者也九五履得尊位而不遇其應得地而不食含章而未發皇皇者華昔固重周原之寄湜湜其沚今况屯渭上之師湜承職切說文水清底見也詩涇以渭蜀湜湜其沚注涇濁水渭清水小渚曰沚言涇水以有渭水清故見其濁以興舊室以有新昏羙故見其惡湜湜盖言渭水之清引此以起下渭上屯師乃斷章取義蜀志十二年春丞相率大衆與司馬懿對於渭南患糧不繼分兵屯田為久住之基願策木牛流馬之功却振金爵觚稜之歩班固西都賦上觚稜而棲金爵注觚稜闕角也角上棲金雀某學未能信年不後人見前直為文翁留再剖之符杜詩得歸茅屋赴成都真為文翁再剖符遂使石洪棄一盂之飯韓文送石處士序先生居嵩邙瀍濲之間冬一裘夏一葛食朝夕飯一盂蔬一盤舟經灧澦鬢已覺其雙蓬杜陵寄别李劍州詩使君髙義驅今古牢落三年坐劍州路經灧澦雙蓬鬢天入滄浪一釣舟路入褒斜命復危於破竹杜詩懸危命在破竹中徒覺長安之咫尺竟慙淝水之八千謝𤣥傳𤣥以精鋭八千渉渡淝水堅衆奔潰自相蹈籍投水死者不可勝計淝水為之不流河内願借留恂豈但任轉輸之委見前漢中無所事信倘或辱汲引之知韓信傳王必欲長王漢中無所事信必欲争天下非信無可與計事者回潼川提刑權轉運謝太傅興甫守蔽芾之甘棠正疑謫滿游侠傳侍曹輙詣寺舍白遵曰陳卿今日以某事適遵曰滿百乃相聞師古曰案舊法令而罰之也適讀曰謫歌逶遲之苞栩敢冐㤙除詩四牡騑騑周道倭遲又翩翩者鵻集於苞栩王事靡盬不遑將父注倭本作委委遲歴逺之貌栩柞櫟也其子有皂斗殻可以染皁者是也滿除對甚慙不菑而畬易旡妄六二不耕穫不菑畬則利有攸徃王弼注不耕而穫不菑而畬代終已成而不造也此借用又懼無麫之餅見前亟從控避猥辱襃期恭惟某官心和而氣平人今而學古源流自康樂之裔宋書謝靈運傳祖𤣥晉車騎將軍靈運少便頴悟𤣥甚異之襲封康樂公性奢豪車服鮮麗衣裳器物多改舊制世共宗之咸稱謝康樂也灑落有宣逺之風南史謝瞻字宣逺六嵗能屬文與從叔琨族弟靈運俱有盛名招館下之諸生詎訾狶苓之進展治中之别駕不辭驥足之淹尋宅牧於兩川俱騰歌於五袴並見前手提文柄心造化爐杜詩功名造化爐禮樂逺而光華遂驅雙節白樂天送牛僧孺鎮揚州詩紅斾擁雙節白鬚無一莖師旅因之饑饉全出一陶兹暫尋香火之閑見前寜得歛雲霄之歩重珪疊組已觀游刃之恢然截鐙留鞭共㸔發硎之新若天中記澤州奏前刺史史延韜離州為軍民遮圍不放出城兼截下馬鐙其史延韜經三日後夜開城門越闗天寳遺事姚崇牧荆州三年受代吏民遮道泣擁馬首不使去所乘之馬鞭鐙皆截留之以表瞻戀佇遄四牡徑從六飛從去聲袁盎傳騁六飛注六馬之狀若飛某已愧代庖詎堪乘傳折楊而和白雪願亟賦於歸哉莊子大聲不入於里耳折揚皇荂則嗑然而笑注大聲謂咸池六英之樂也非委巷之所尚折揚皇荂皆古歌曲名也詩振振君子歸哉歸哉轉粟而上青天冀别求於能者杜詩築城依白帝轉粟上青天通成都梁運使綸代董制帥隨八月之槎遂離漢闕望二星之分已次蜀都並見前瞻之在前瞠乎若後瞠抽更切直視也莊子瞠若乎其後敢伺下車之始輙修上記之恭並見前恭惟某官器宇𢎞深梁書朱异傳器宇𢎞深神表峰峻王僧辨傳器宇凝深風格詳逺晉書魏詠之傳器宇𢎞劭識局貞隐劉長卿詩器宇溟渤寛文鋒鏌鋣利風猷凝茂任昉傳存樹風猷沒著㣲烈學有家法肯甘州縣之徒勞儒林傳各以家法教授左雄傳諸生試家法注儒有一家之法故稱家梁竦傳閒居可以飬志詩書足以自娛州縣之職徒勞人耳詳見前政作吏師自合公侯之必復朱博傳賛所在而治為世吏師勇襆潜郎之被髙褰膚使之帷古來天府之腴莫如益部今使雪山之重是在我公諒由四牡之華即有九年之積不勞黔突亟下紫泥並見前某乆汙班行韓詩班行再肅穆獲聨事契豈謂半符之剖又依六轡之馳江路市橋想已遂碧鷄之訪杜詩孰知江路近頻為草堂迴又市橋官栁細天梯石棧得無憐黄鶴之飛蜀道難地崩山摧壯士死然後天梯石棧相鉤連黄鶴之飛尚不得過猿猱欲度愁攀縁上兩浙丘運使夀雋索米待公車之命僅志抱闗見前轉粟給中都之官猥容入幕杜氏通典漢興髙皇帝漕轉山東之粟以給中都官嵗不過數十萬石中都官謂京師之官府實有得賢主人之賀昌黎代張籍與李浙東書近者閣下從事李協律翺到京師籍於李君友也不見六七年聞其至徃省之問無恙外不暇出一言且先賀其得賢主人未知事大君子之方昌黎為河南令上留守鄭相公啓以為事大君子當以道不宜茍且求容悅故於事未嘗敢疑惑宜行則行宜止則止受容受察不復進謝自以為如此真得事大君子之道斐然修辭滂若下汗呉質書申之再三赧然汗下魏蔣濟上䟽請封禪詔曰聞斯言汗出流足伏念某寸勇尺懦山谷詩士為欲心縳寸勇輙尺懦一拙百罹詩我生之初尚無為我生之後逄此百罹說文罹心憂也爾雅毒也注云憂思慘毒學不知方徒爾疲精神於蹇淺莊子小夫之知不離苞苴竿牘敝精神乎蹇淺注昏于小物所得者淺仕未能信尚何計班資之崇庳韓文商財賄之有無計班資之崇庳然半生脫進士之塲已三仕作諸矦之客杜詩蚤作諸矦客碧鷄坊裏側身猶望於早還杜詩時出碧鷄坊西郊望草堂山谷詩碧鷄坊西結茅屋百花潭水㓗冠纓馬援傳併肩側身於怨家之朝乎劉愷傳側身里巷晉書孫惠傳側身昏謬之俗跼蹐凶謟之間杜詩側身天地更懐古又側身千里道李詩錦城雖云樂不如早還家蜀道之難難于上青天側身西望長咨嗟白鹿坡前戰骨自甘於速朽白鹿山在彭縣西北二十里上有金覺禪寺相傳佛圖澄所建偶獲返屠羊之役見前乃洊罹䑛犢之悲楊彪傳愧無日磾先見之明猶懐老牛䑛犢之愛五削猶温一簣正須於補考削息約切考工記築氏為削即今書刀古用竹簡筆誤則以刀削之因名其刀曰削春秋筆則筆削則削原陟傳削牘為䟽百念既冷連年不果於到銓親故開陳勉强抵此公卿推輓伺􅇋乆之韓文伺􅇋於公卿之門敢期得闕於日畿見前乃可託身於氷漕趙充國傳氷觧漕下使者持斧實總陜東陜西之權王莽傳分陜立二伯師古曰分陜者欲依周公召公故事自陜以東周公主之自陜以西召公主之賔之初筵宜得洛南洛北之彦詩賔之初筵左右秩秩韓文恃才能深藏而不市者洛之北涯曰石生其南涯曰温生詎應庸謭謭者剪淺也史記能薄才謭可備諮諏伏遇某官學本家傳材周世濟四顧千牛之立觧見前一鳴萬馬以皆瘖東坡三馬賛時西域貢馬首髙八尺龍顱而鳳膺虎脊而豹章振鬛長鳴萬馬皆喑人懷召虎之來宣詩王命召虎來旬來宣日望伯禽之拜後見前導夙夜宥宻之命亦既許時許語助餘見前聨朝夕論思之班自應平歩白樂天詩平歩取公卿頃以翼翼四方之極託之皇皇六轡之華磔其梟狼了不容於掩耳韓文磔其梟狼飬以雨風六韜用兵之道使如疾雷令民不及掩耳卒電不暇瞑目梁書矦景傳疾雷不及掩耳散地不可圖全李靖傳兵機事以速為神震霆不及掩耳壯哉䑕雀必從是以革心梁書張率字士簡吳郡呉人嗜酒事事寛恕於家務尤忘懐為新安太守遣家僮載米三千石還呉宅既至遂耗大半率問其故答曰䑕雀耗也率笑曰壯哉䑕雀竟不研問六條觀風萬物吐氣見前孝者善繼人志是以似之詩維其有之是以似之欽哉時亮天功自此升矣尚書欽哉惟時亮天功楊震傳先生自此升矣尚念某一無操挾全蹈闊踈鵲遶月以何依幸二天之獨有並見前魚泳川而相得或尺地之可通昌黎徐泗濠三州節度掌書記㕔石記志同而氣合魚川泳而鳥雲飛也愈樂是賔主之相得也故請刻石以紀之薦士詩通波非難圖尺地易可漕尚從吏師韓非子明王之國無書簡之文以法為教無先王之語以吏為師漢書傳賛薛宣朱博皆起佐史歴位以登宰相宣所在而治為世吏師稍勉政學左傳子産曰僑聞學而後入政未聞以政學者也大事則從其長儻堪藏拙於小官周禮大事則從其長小事則専達國史典纂梁常侍徐陵聘齊時魏收文學北朝之秀收録其文集以示陵令傳之江左徐還濟江而沉之從者以問陵曰吾為魏公藏拙韓詩倚玉難藏拙吹竽乆混真先達者為之前諒亦垂情於後軰韓文士之能享大名顯當世者莫不有先達之士負天下之望者為之前焉上湖南曾運使槃盖任寜鄉簿作主俗吏之簿書竈方夜祭賈誼傳俗吏之所務在於刀筆筐篋而不知大體餘見前瞻華使之禮樂槎自天來見前半生忍渇於見賢諸葛武矦傳總攬英雄思賢如渇山谷詩空餘見賢心忍渇望梅嶺一旦奉身而受察左傳臣之禄君實有之義則進否則奉身而退喜而不寐文以足言左傳仲尼曰志有之言以足志文以足言不言誰知其志言之無文行之不逺恭惟某官得春委和莊子生非汝有是天地之委和也注委結而自成非汝有也與秋争潔接江西之正派克肖茶山曽幾字吉父贑州人以遺澤補官詮試第一賜上舍出身紹興未已老始擢用乾道中年八十三卒號茶山先生仕至禮部侍郎有文清集十五巻行于世其子逢逮皆顯于時詳見首卷抱河南之遺書久窺禹穴司馬遷傳上㑹稽探禹穴注禹廵狩至㑹稽而崩因塟焉上有孔穴民間云禹入此穴根柢學問柢音底平上去三聲通押說文木根也爾雅本也徐曰華葉之根曰蔕木之根曰柢杜詩詞林有根柢緒餘功名生平惡巧宦之圖握蘭屬爾汲黯傳深巧善宦四至九卿所至成循吏之傳騎竹驩然洊蔽芾於甘棠始逶迤於苞栩並見前謂予環而趣侍荀子聘人以珪問士以璧召人以瑗絶人以玦反絶以環又濡轡而載馳去江入湖彼善此盖有之矣轉倉將漕唯與阿相去幾何老子唯之與阿相去幾何唯阿皆應聲唯恭阿慢也人疑王事之獨賢公未帝城之願入陳湯傳陳咸滯於郡守數賂湯予書曰即蒙子公力得入帝城死不恨洞庭九州之大近困轉輸見前衡山千里而遥正須亷訪禮記自江至於衡山千里而遥撢王志慮撢他紺切說文探也周禮撢人掌誦王志道國之政事以廵天下之邦國而語之使萬民和說而正王靣又秋官掌交道王之徳意志慮使咸知王之好惡辟行之摩俗痛愁續荆潭唱和之詩不妨幽𦕈韓文有荆潭唱和詩序唐藝文志有裴均荆潭唱和集一卷乃裴均鎮荆州楊慿領湖南所作序云鏗鏘發金石幽𦕈動鬼神對宣室鬼神之問㑹即超遷見前某承學諸生董仲舒傳今陛下幸加意留聴於承學之臣師古曰言轉承師說而學之盖謙辭也就官一列莊子加富二等就官一列血牲而埋之寒窻事業昔知對白以抽黄元稹詩暗風吹雨入寒牕陳後山詩寒窻冷硯欲生塵栁文抽黄對白渰渰飛走矮屋官曹今使出朱而入墨周書蘇綽傳即拜大行臺左承參典機宻綽始制文案程式朱出墨入及計帳戸籍之法陳後山詩胡然落朱墨不坐致公矦懷哉君子之易事樂只小官而不辭向來一瓣香之詩南豐固在陳後山詩向來一瓣香敬為魯南豐下有千嵗苓之句東坡謂何山谷上蘓子瞻詩青松出澗壑千里聞風聲上有百尺絲下有千嵗苓通權運司牛都大大年宋史牛大年字隆叟揚州人慶元二年進士歴官將作監主簿遷軍器監主簿太宗正丞四川提舉茶馬兼權總領知黎州兼管内安撫司公事節制黎雅州屯戍軍馬加直寳章閣工部郎官遷侍左郎中進直華文閣浙東提㸃刑獄遷守秘書少監宗正少卿升秘書監遷起居舍人升起居郎兼崇政殿說書以寳章閣待制提舉太平興國宫卒大年清操凛然所至以亷㓗自將承流弗績亦思歸味於蓴鱸晉書文苑傳張翰因見秋風起乃思呉中菰菜蓴羮鱸魚膾曰人生貴適志何能覊宦數千里以要名爵乎轉漕非才敢取棄餘之竹馬殷浩傳桓温語人曰少時吾與浩共騎竹馬我棄去浩輙取之故當出我下也負决難於超乘易負且乘致㓂至左傳秦師過周北門左右免胄而下超乘者三百乘超乘謂車正行之時超上車而乘之以示勇也僂已見於循墻僂隴主切増韻俯也又郎侯切増韻身向前也左傳一命而傴再命而僂三命而俯循墻而走盍以寸扄扄涓熒切左傳周道挺挺我心扄扄淮南子中欲不出謂之扄布之尺牘恭惟某官洙泗正學禮記吾與汝事夫子于洙泗之間注洙泗魯水名地理志洙泗之間斷齗如也從征記洙泗二水交于魯城東北七十里闕里有洙泗墻南北一百二十歩東西二十歩四門各有石閫北門去洙水百餘歩論語考䜟注夫子教于洙泗之間今于城北二水之中即夫子領徒之所儒林傳務正學以言淮海俊人杜詩淮海維揚一俊人言行一擇乎中庸名實兩孚於上下清標雅操立獨鶴於人間杜詩仙鶴下人間獨立霜毛整又獨鶴不知何事舞又獨鶴歸何晩又獨鶴原依渚逺韻遐心送孤鴻於天末新唐書韋夏卿傳夏卿性通簡好古有逺韻詩母金玉爾音而有遐心頃厭獬豸鵰鶚之命來為蠶叢魚鳬之遊天子十二閑爛如雲錦並見前月團三百片羙若金莖金莖謂露也班固西都賦撫仙掌以承露擢雙立之金莖餘見前亷不近名莊子為善無近名儉皆中禮詩序蟋蟀刺晉僖公也儉不中禮其詩曰無已太康職思其居毛萇注云已甚也鄭箋云君雖當自樂亦無甚太樂欲其用禮為節也南史何炯傳必須儉而中禮無取茍異脂膏自潤昔者人謂斯何東觀記孔奮字君魚守姑臧長七年詔書以為奮在姑臧治有絶迹賜爵關内矦奮素孝在姑臧惟老母極珍膳妻子飲食葱芥時人笑之或嘲奮曰置脂膏中不能自潤而奮不改其操又見後漢書昌黎鄆州谿堂詩昔者人謂斯何今者人謂斯何圖史凝塵去之日如始至新唐書楊綰字公權性沉静獨處一室左右圖史凝塵滿席澹如也左傳叔孫所舍雖一日必葺其墻屋去之日如始至王覲為可左傳厚問定君於石子石子曰王覲為可帝念在兹尚書念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功正須清獻之一琴見前徃减汾陽之半樂楊綰傳綰儉約未嘗問生事始輔政御史中丞崔寛本豪侈城南别墅池觀堂皇為當時第一即日遣人毁之京兆尹黎幹出入從騶騎數百省損才留十餘騎中書令郭子儀在邠州行營方大㑹除書至音樂散五之四聞風靡然自化者不可勝計某從游二紀奔走百罹見前方甘弄月於眉山李詩一振髙名滿帝都歸時還弄峨眉月敢望占星於益部見前已騰免牘冀奉俞音萬一不已於馳驅再三尚求於教誨汝張汝弓汝鼓當飽顔行韓文元和聖徳詩汝張汝弓汝鼓汝鼓汝為表書求我帥汝我任我輦我車悉希指示詩我任我輦我車我牛我行既集盖云歸哉䟽召伯南行其轉運有我負任者我輓輦者我將車者我牽傍牛者在前曰牽在旁曰傍代回䕫路王漕顧問疇庸司庾易節將輸激江西之波既蘇涸轍之鮒莊子車轍中有鮒魚焉曰我東海之波臣也君豈有斗升之水而活我哉周曰諾哉且南遊吳越之王激西江之水而迎子可乎踏巴東之磧更觀常山之虵圖經䕫人重諸葛武矦以人日傾城出遊八陣磧上謂之踏磧婦人拾小石之可穿者貫以綵索繫於釵頭以為一嵗之祥府帥宴於磧上王梅溪詩今日為人日傾城出江皋遨頭老病守呼賔酌春醪好遨蜀風俗䕫人貧亦遨陸務觀詩鬼門闗外逢人日踏歌千家萬家出餘見前使乎賢勞王所簡在恭惟某官徳浮於位材裕其官熟路輕車固有長驅之地急流巨艦獨髙難進之風一麾江海之行千里湖山之得既田里之無愁恨宜原隰之有光華並見前或謂歛散之權周必大詩歛散新陳倚繡衣未展澄清之志木牛轉漕何妨籌䇿之紆食貨志兵甲轉漕之廢杜詩三分割據紆籌䇿萬古雲霄一羽毛金馬著書行見詔除之渥某緬惟新治恍憶舊遊福星所臨遥想疲民之樂業並見前豐年可慶幸為老守而寄聲趙廣漢傳界上亭長寄聲謝我韓詩因風數寄聲代回䕫路王運判宗孟洊歴麾符榮將節傳彤幨繡斧新禮樂之光華幨蚩占切車幨謂之裳帷職源皂盖分輝彤幨昭采赤甲白鹽壯江山之彈壓見前既均六轡詩我馬惟駰六轡既均注均調也坐斡千艘漢書注斡謂主領也音與管同艘蘇曹切說文船總名杜詩海湖洶千艘恭惟某官抱負甚竒後漢書儒林傳莫不抱負墳䇿雲集京師韓文抱負其業東歸於家踐揚兹久屢登一鄂之表綽著能聲四分五馬之符居多善政有華將指不逺觀風認常山之虵黙識木馬之運並見前跨灧澦之象佇觀畵鷁之來韻集鷁首天子船也淮南子龍舟鷁首浮吹以虞此遊於水也注鷁水鳥也畵其象著船首方言船首或謂之閣又謂之鷁首注今江東貴人船前作青雀是其象也子虛賦怠而後發游於青池浮文鷁揚旌栧梁王筠詩凌波漾鷁彩汎水渙蛟文陳張正見詩鷁汎青鳬後鷄鳴白鷺前餘見前某漫浪之期差池其羽詩燕燕于飛差池其羽走長安之日又陪上雍之祠杜牧詩惆悵江湖釣竿手却遮西日向長安司馬遷傳又薄從上雍郊祀志上初至雍郊見五畤占蜀道之星還作髙唐之想見前回潼川張運判師䕫代董制置傾盖相驩夙承雅契家語孔子之剡遭程子於途傾盖而語終日鄒陽傳白頭如新傾盖如故注傾盖猶交盖駐車也驅車見顧敬佩髙情更勤四六之貽彌仞再三之眷恭惟某官材猷膚敏器諝端凝使節皇皇夙抱靡依之感詩皇皇者華傳皇皇猶煌煌也忠臣奉使能光君命吉事總總行膺不次之除禮記䘮事欲其縱縱爾吉事欲其折折爾注縦讀如總領之總急遽貌折音提安舒貌正義曰言凶事欲疾吉事欲舒今云吉事總總未詳東方朔傳待以不次之位張九齡選舉疏每一官缺以不次用之孫伏伽傳髙祖初受禪伏伽最先諫欲盡下情故不次見㧞以示群臣崔造傳徳宗貞元二年以給事中同平章事帝謂造敢言為能立事故不次用之某盛感珍投莫知瓊報見前藏之十襲足為篋笥之光闞子宋之愚人得燕石于梧臺之東歸而藏之以為寳革匱十重緹巾十襲客見之掩口而笑山谷詩十襲一日三摩莎雖則七襄不稱襜褕之贈見前代囘運使楊國博楫丹筆詳刑幸依光於翼軫地理志楚地翼軫之分埜王勃滕王閣序星分翼軫餘見前繡衣轉漕忽改次於斗牛食貨志轉漕甚逺又兵甲轉漕之費天文志斗江湖牽牛婺女揚州地理志吳地斗之分野粤地牽牛婺女之分野天文志自南斗十二度至須女七度為星紀於辰在丑吳越之分野屬揚州甚慙狥鐸之初尚書每嵗孟春遒人以木鐸狥于道路食貨志孟春之月群居者將散行人振木鐸狥于路以采詩有􅔵褰帷之慶韻㑹􅔵通作訣别也恐當作􅆙少也虧也髙情厚甚下問􅈌然恭惟某官獨抱古心韓詩孟生江海士古貌又古心力行正道太學晨入士皆樂於有師湘水曉行民盖幾於無訟師訟卦名自天出綍易地乘軺並見前莫非王民何此界彼疆之隔詩無此疆爾界陳常于時夏徒得君重助春生秋殺之仁管子春生於左秋殺於右夏長於前冬藏於後韓文春生秋殺陽開隂閉猶恐紫泥不容黔突某罔功閱嵗撫事懷人有所不通方將考徳而問業何去之速遂使離羣而索居禮記吾離群而索居亦已乆矣注離音詈群謂同門朋友也索悉各反猶散也所幸隣壁之輝尚借榮河之潤尚書中􅇋帝堯即政榮光出河文選青雲浮洛榮光塞河莊子河潤九里澤及三族交㤗亨而君子長惟此為然易泰小徃大來吉亨則是天地交而萬物通也上下交而其志同也君子道長小人道消也有徳進則朝廷尊遐不謂矣東坡集士以德望進則風俗厚而朝廷尊代董制置回利路楊運判九鼎升班延閣易漕价藩見前煥乎有文章上直堯言之秘夏侯勝傳嘗見出道上語上聞而讓勝勝曰陛下所言善臣故揚之堯言布于天下至今見誦臣以為可傳故傳耳送之以禮樂再華周道之驅就擁䨇旌榮開疊組恭惟某官掞材膚敏禀徳浚明湘水兒童能說輶軒之風采黄覇傳風采不及丙魏于定國趙壹傳名動京師士大夫想望風采峴山老父尚懷裘帶之功名見前暫從神圉之遊主宫觀實簡明廷之眷駕言龍節詩駕言出游以冩我憂將指䕫藩見前富媪孕靈坐溢牢盆之利栁文晉問猗氏之鹽晉寳之大也神液隂漉甘鹵宻起富媪孕靈不愛其羙迴眸一瞬積雪百里詳見前食貨志因官器作䰞鹽官與牢盆蘇林曰牢價值也今世人言顧手牢如淳曰牢廩食也古者名廩曰牢盆鬻鹽盆也師古曰蘇說是也䰞古煮字姦胥落膽盡空訟缿之寃缿徒口切說文受錢器也一曰缿可受投書徐曰謂入而不能出之器也趙廣漢傳教吏為缿筩酷吏傳惡少年投缿師古曰缿若今盛錢藏瓶為小孔可入而不可出或缿或筩皆為此制而用受書令投於其中也帝念葭萌前漢地理志廣漢郡有葭萌縣應劭曰音家盲師古曰明音萌後漢書同華陽國志葭萌有水通於漢川杜詩葭萌氐種逈坐擔大戎屯地隣嶓冡尚書嶓冢導漾東流為漢河圖括地象嶓冡山上為狼山木牛轉粟路即達於褒斜漢溝洫志有人上書欲通褒斜道及漕言蜀故道多回逺今穿褒斜道近四百里而褒水通沔斜水通渭皆可以行船漕銅虎剖符師可臨於秦隴說文隴天水大阪也在天水者最大因以名州漢汧縣後魏東秦縣栁文西出秦隴南過樊鄧有嚴三命欲集兩長東壁圖書自他有耀左傳陳厲公生敬仲使周史筮之遇觀之否曰是謂觀國之光利用賔於王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也他指異國耀光燄也言所謂觀國之光者其光悠逺自他處相射而有耀者也北門管鑰無競維人見前某辱託為寮左傳同官為寮尤深贊慶周禮秋官大行人慶賀以贊諸矦之喜注贊助也聞之道路恐又啟十乘之行左傳衛矦使祝佗私於萇𢎞曰聞諸道路不知信否南史何敬容傳草萊之人聞諸道路餘見前脩其簡書尚當為九遷之賀見前代囘湖南鄭漕肇之曉行湘水逺知禮樂之華見前老入明光近抱簡書之畏東坡詩老入明光踏舊班因遺我䨇魚之繾綣詩以謹繾綣傳繾綣反覆也左傳繾綣從公無通内外知繾綣者牢固相看之意侯景傳繾綣衿期綢繆言語知駕彼四牡之舂容詩駕彼四駱載驟駸駸禮記待其從容然後盡其聲注從讀如富父舂戈之舂舂容謂重撞擊也正義曰舂謂擊也以為聲之形容言鐘之為體必待其擊每一聲而為一容然後盡其聲東坡詩我欲棄官重問道寸蓬何以得舂容恭惟某官奥學長材英聲茂實動足奔電洗凡馬而一空運斤成風觧全牛於四顧並見前入朝甫爾甫韻㑹始也出牧翻然撫字勞心香未安於燕寢並見前澄清有志㤙已賜於鵲袍宋江北河東陜西三路轉運使賜方勝練鵲錦從劉錠之請也互見前拓長沙萬里之平既均六轡韓詩長沙千里平勝地猶在險護洞庭九州之險坐斡萬艘韓詩洞庭九州間厥大誰與讓魏文帝浮淮賦序王師自譙東征大興水軍浮舟萬艘赫哉盛矣雖孝武盛唐之狩舳艫千里殆不過之傅𤣥正都賦艨衝舸􅑳蜀艇吳航萬艘咸興雲帆齊張行奏計於甘泉即立班於文石某蒲栁之質糠粃在前並見前芻狗已陳不意復蒙於文繡莊子夫芻狗之未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘇者取而㸑之而已槐龍對舞所期及識於衣冠東坡詩日髙黄繖下西清風動槐龍舞交翠公自注邇英閣前有雙槐樛然屬地如龍形宋張邦基墨莊漫録云邇英閣前雙槐極髙而柯葉拂地狀如龍蛇或謂之鳯尾蘇子由詩云銅瓶灑遍不知寒雨㸃匀圓凍未乾回首瞳矓朝日上槐龍對舞覆衣冠代回淮南徐運判煇榮驅漢節杜詩漢節梅花外春城海水邉給饋淮壖壖而宣切集韻江湖邊地漢書壖地師古曰壖餘也諸縁河壖地廟垣壖地其義皆同禮樂逺而光華著聞於古師旅加之饑饉聚見於今欲息隐雷之聲陳後山詩饑雷收聲酒如雨正得福星之照見前恭惟某官學為可用才靡不宜素所藴藏皆及物之志久於歛退無希世之心莊子希世而行比周而友學以為人教以為己既交章於北臺鄴都故事御史臺在宫闕西南其門北開以取冬殺之義迄來歸於東海夜前席而入對晝衣錦以啟行並見前拊螻蟻烏鳶之遺黎使肉骨之再活莊子莊子將死弟子欲厚葬之莊子曰吾以天地為棺槨日月為連璧星辰為珠璣萬物為齎送𦵏具豈不備邪弟子曰吾恐烏鳶之食夫子也莊子曰在上為烏鳶食在下為螻蟻食奪彼與此何其偏也詩周餘黎民靡有孑遺左傳所謂生死而肉骨之也趙壹傳使乾皮復含血枯骨復被肉捕螟蟊螣賊之餘孽無翅股之復摇詩去其螟螣及其蟊賊無害我田穉毛詩義䟽亦螣蝗也許慎曰使乞貸則生螣舊說螟螣蟊賊一種蟲也如言㓂賊姦宄内外言之耳故捷為文學曰此四種皆蝗也實不同故分别釋之爾雅食苖心曰螟春秋哀十二年十三年螟食苖根曰蟊食苖節曰賊詩五月斯螽動股六月莎雞振羽韓文折其尾毒不得動摇茍可救民諒深體國盤根之别利器嵗計有餘莊子今吾日計之而不足嵗計之而有餘注日計之而不足無旦夕小利也嵗計之而有餘順時而大穰也乘槎而歴天津風斯在下爾雅注箕龍尾斗南斗天漢之津梁宋之問明河篇明河可望不可親願得乘槎一問津某過勤巽謝仰仞謙撝寒日荒荒詎宜貪帝所之夢杜詩野日荒荒白春流冺冺清史記扁鵲傳我之帝所甚樂與百神㳺於鈞夭廣樂九奏萬舞不類三代之樂東坡詩鈞天一餉夢中榮春郊處處猶將觀使者之功代回福建趙通判善宣起家越上將漕閩中史記東越傳以其地為閩中郡徐廣曰今建安侯官是漢書立無諸為閩粤王王閩中地又帥閩中兵以佐㓕秦師古曰閩越今泉州建安是也其人本蛇種故其字從虫曾子固道山亭記閩故𨽻周者七至秦開其地列于中國始并為閩中郡福州治􅇋官於閩為土中所謂閩中也送禮樂而有光華古莫重乎膚使一道徳而同風俗今又在於亷車禮記司徒修六禮以節民性明七教以與民徳齊八政以防滛一道徳以同俗公無遐心民可吐氣恭惟某官操持甚厚揚歴最深至今京兆之歌曰前有趙宜入承明之直無以易堯並見前不應七聚落之間後漢書聚落化其徳注小于鄉曰聚廣雅落居也周禮職方氏七閩注閩蠻之别也叔熊避難於濮蠻隨其俗如蠻人子孫分為七種故曰七閩山谷送劉士彦赴福建運判詩維閩七聚落惸獨困吏饕復勤單軺傳之出惟西北風塵之已息而東南雨露之猶慳問俗及豚羔山谷之詩云爾山谷前詩察人極涇渭問俗及豚羔羡君超鸞鶴坡仙所詠非耶東坡送張職方吉甫赴閩漕詩羡君超然鸞鶴姿江湖欲下還飛去空使吳兒怨不留青山漫漫七閩路門前江水去掀天寺後清池碧玉環君如大江日千里我如此水千山㡳少觀荔子之丹韓文荔子丹兮蕉黄王介甫詩蕉黄荔子丹即拜芝函之紫陳江總為衡陽王讓吳郡表芝泥馳印發命開函詳見前某未由旅賀例辱損牋旅損卦名分民病之憂願謹衣篝之䕶篝音溝說文笿也可薫衣徐曰竹籠也又以籠覆火也陳渉世家夜簼火注簼籠也盖然火而籠罩其上山谷詩攬轡都城風露秋行臺無妾䕶衣篝又柿葉鋪庭紅顆秋熏爐沉水度衣篝後天下而樂佇榮衮繡之歸范文正公神道碑公少有大節其於富貴貧賤毁譽欣戚不一動其心而慨然有志於天下當自誦曰士當先天下之憂而憂後天下之樂而樂也代回江東莊運使夏宋史莊夏字子禮泉州人淳熈八年進士慶元六年大旱詔求言夏時知贛州興國縣上封事召為太學博士遷國子博士召除吏部員外郎遷軍器監大府少卿出知漳州為宗正少卿兼國史院編修官尋權直學士院兼太子侍讀試中書舍人兼太子右庻子左諭徳除兵部侍郎煥章閣待制與祠歸嘉定十年卒宋江東路轉運置司治上元江寜奏功司庾將漕陪京西都賦陪京之南居漢之陽建康志序坐鎮江淮以為陪都一道服於教條不勤易地六轡熟於原隰益足觀風並見前中扆眷隆上流勢重項籍傳古之王者地方千里必居上游注居水之上流游流也陶侃傳論超居外相宏總上流温嶠傳使嶠為上流形援殷仲堪傳受腹心之任居上流之重又欲重復上流為習坎之防又藩扞之大機上流之至要劉毅傳上流之任皆以相委恭惟某官材全業鉅韓文鏗鏘發金石幽𦕈感鬼神信所謂材全而能鉅者也學廣聞多韓文學廣而聞多不求聞於人也髙義之薄雲天早奮何蕃之勇杜詩故人有孫宰髙義薄雲天韓文朱泚之亂太學諸生將從之來請起蕃蕃正色叱之六館諸生不從亂兹非其勇歟道山之隣日月晩讐劉向之書華嶠後漢書學者稱東觀為老氏藏室道家蓬萊山王肅論秘書表云青龍中議秘書丞郎與博士議郎同職近日月冝在三臺上漢書藝文志天下文籍悉在天禄石渠之閣廣内秘府之室謂之秘書成帝時劉向父子以本官典其事劉向傳詔向領校中五經秘書讐時流切校也謂兩本相覆校如仇讐也文選魏都賦注一人持本一人讀書如怨家相對也輟從著作之庭西都賦又有承明金馬著作之庭出任皇華之寄聚萬民於荒政周禮大司徒之職以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛役五曰舍禁六曰去幾七曰𤯝禮八曰殺哀九曰蕃樂十曰多昬十有一曰索鬼神十有二曰除盗賊宋史莊夏傳時流民來歸夏言荆襄兩淮多不耕之田計口授地貸以屋廬牛具吾乘其始至可以得其欲彼幸其不死可以㤀其勞兵民可合屯田可成此萬世一時也驅四牡以賢勞如此人才盍來歸於金馬公孫𢎞傳待詔金馬門如淳曰武帝時相馬者東門京鑄作銅馬法獻之立于魯班門外更名魯班門為金馬門史記東方朔傳避世金馬門主父偃嚴安徐樂王襃劉向張子僑華龍栁褒賈捐之鄭朋馮商皆待詔金馬門揚雄傳公孫創業於金馬西京賦蘭臺金馬遞宿迭居奈何天塹方仰給於木牛見前風景不殊王導傳過江人士每至暇日相邀出新亭飲宴周顗中坐而歎曰風景不殊舉目有江山之異皆相視流涕惟導愀然變色曰當共戮力王室尅復神州何至作楚囚相對泣耶星言夙駕詩星言夙駕說于桑田師旅因之饑饉正藉筭鞭劉晏傳每朝謁馬上以鞭筭氣色益以晶明佇頒召璽李光弼傳其代郭子儀朔方也營壘士卒麾幟無所更而光弼一號令之氣色乃益精明云某冐焉浪出杜詩龎公不浪出蘇氏今有之未以汰歸訪斗牛邊已後君平之問見前以春秋對佇觀莊助之來嚴助傳賜書曰㑹稽東接於海南近諸越北枕大江間者闊焉乆不聞問具以春秋對毋以蘇秦縱横代囘江西李運使珏起家乘傳傳張戀切廣韻云驛馬曰傳古者以車駕馬乘詣京師謂之傳車其後又置單馬乘之謂之驛騎若今遞馬凡四馬髙足為置傳四馬中足為馳傳四馬下足為乘傳一馬二馬為軺傳將漕餽軍淛河以東之民去思未逺淛之列切或作浙說文江水東至㑹稽山隂為浙江廣韻江名在東陽増韻在錢塘出歙縣玉山浙者折也水勢曲折激起潮頭故曰浙江山海經禹治水以至淛河莊子自淛河以東注即今浙江大江而西之地來暮已歌有志澄清何憂盤錯並見前恭惟某官名隨日起荀子貴名起之如日月天下應之如雷霆董仲舒傳勉彊行道則徳日起而大有功材應時需文選才為世用世亦須才孫逖行崔綸制名當嵗調才應時須山谷詩妙年出補父兄處公自才力應時須近使之煩使之殆無施而不可莊子君子逺使之而觀其忠近使之而觀其敬煩使之而觀其能詳見前善人也信人也似未足以相名方人物之𦕈然王逸少帖蔡公遂委篤深可憂當今人物𦕈然而艱疾若此令人短氣山谷詩人物方𦕈然誰能委圭幣又人物於今𦕈然詳見前而江濤之如此宋朱新仲詩天氣未佳宜且住風濤如此亦安歸詳見前天子有詔固將大任於陸君昌黎送陸歙州詩我衣之華兮我佩之光陸君之去兮誰與翺翔歛此大惠兮施于一州今其去兮胡不為留我作此詩歌于逵道無疾其驅天子有詔皇帝曰嘻猶有未平之劉闢元和聖徳詩疆外之險莫過蜀土韋臯去鎮劉闢守後血人于牙不肯吐口皇帝曰嗟無汝煩苦樵蘇後㸑弩矢前驅見前繭絲乎保障乎公必本根之急左傳葛藟猶能庇其本根故君子以為比濡需者卷婁者彼何鼎鑊之逃莊子有濡需者有巻婁者濡需者豕蝨是也擇䟽鬛自以廣宫大囿奎蹄曲隈乳間股脚自以為安室利處不知屠者之一旦鼓臂布草操煙火而已與豕俱焦也卷婁者舜也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悦之年齒長矣聰明衰矣而不得歸休所謂卷婁者也此引為羊豕之喻増韻鑊釡屬栁文懲咎賦進與退吾無歸兮甘脂潤兮鼎鑊紅旗破賊黄紙除書直相先後白樂天詩紅旗破賊非吾事黄紙除書無我名畫棟飛雲珠簾捲雨寜乆回旋某側聞下車方規上記受一廛於仁政亟欲謀歸勞四牡之使臣别遲贊喜並見前代囘成都林漕文仲將輸沔北易節劔南見前斜谷列屯方仰木牛之運方輿勝覽斜谷在興元府西北入斜谷路至鳯州界百五十里有棧谷二千九百八十九間板閣二千八百九十二間土人云其間有一溪可行舟少城一道已先竹馬之迎見前下車云初張酺傳下車擢用義勇搏擊豪强周䊸傳下車先問大姓主名張衡傳下車治威嚴整法度載路相慶沈休文碑威令首塗仁風載路恭惟某官好是正直詩靖共爾位好是正直注好猶與也正直為正能正人之曲曰直擇乎中庸迎風寒露之玉壺潔其清矣杜詩烱如一段清氷出萬壑置在迎風寒露之玉壺張衡西京賦既新作於迎風増寒露與儲胥武帝因秦林光宫元封二年增通天迎風儲胥寒露四館法言楚兩龔之潔其清矣乎暖日生煙之錦瑟和亦温然李商隐錦瑟詩滄海月明珠有淚藍田日暖玉生煙自奏郡庸出司漕計乘槎直上天已界於漢中宋興元府即今漢中府宋𨽻利州東路蕭何傳語曰天漢其稱甚美姚合詩詩書理漢中叱馭疾驅星忽臨於益部見前聞數萬人通千里之役溝洫志拜湯子卬為漢中守發數萬人作襃斜道五百餘里湯張湯也須十餘鍾致一石之糧漢食貨志衛青嵗以數萬騎出擊匈奴遂取河南地築朔方時又通西南夷道作者數萬人千里負擔餽饟率十餘鍾致一石六斛四斗為鍾弩矢前驅樵蘇後㸑諒賢勞之無憚在聖眷則甚深某借潤徳隣升華工正錦城雖樂期公乃在於早還並見前金門少留即日㑹觀於暮召叙傳平津斤斤晩躋金門師古曰金門金馬門也揚雄傳歴金門上玉堂代囘湖南曹漕彦約已見按刑湖右轉漕湘中六轡如絲雖賢勞於原隰詩我馬維騏六轡如絲注言調忍也三軍挾纊亦流潤於京師左傳楚莊王圍蕭申公巫臣曰師人多寒王廵三軍撫而勉之三軍之士皆如挾纊郭伋傳賢能太守去帝城不逺河潤九里冀京師并䝉福也恭惟某官儒學醇明吏材膚敏自䇿扞城之績左傳百官承事朝而不夕此諸矦所以扞城其民也桓温傳贊受寄扞城用恢威畧東坡詩誰信儒冠也扞城亟膺持斧之榮告舍人趣治裝適當㓂警曹參傳告舍人趣治行吾且入相見大夫無可使誰給軍需王嘉傳前蘇令發欲遣大夫使遂問狀時見大夫無可使者召盩厔令尹逄拜為諌議大夫遣之師古曰言見在大夫皆不堪為使也申屠嘉傳遷御史大夫張蒼免相文帝念髙帝時之臣餘見無可者乃以御史大夫嘉為丞相師古曰見謂見在之人徑煩行李之來以成破竹之捷杜預傳今兵威已振譬如破竹數節之後皆迎刃而觧無復著手處也杜詩胡危命在破竹中民亦勞止因之師旅以奈何我儀圖之殱厥渠魁而已矣尚書殱厥渠魁脅從㒺治小觀耆定詩勝殷遏劉耆定爾功即見勞還某縻職雉官馳神燕夏嵗月如代空驚揚粃之在前造化為工行見積薪之居上並見前代回湖北王漕允初起曹愒日甚慙清切之司晉宋有起部尚書而不常置每營宗廟宫室則權置之事畢則省白集起曹書殿兼而委之南豐集中臺起曹信使觀風有渥皇華之遣先勤下問良佩髙情恭惟某官望實飛騰典刑炳蔚一俞一咈當入陪廣厦之氊尚書帝曰俞孔傳俞然也然其所舉正義曰俞然釋言文又帝曰吁咈哉正義云咈者相乖詭之意載馳載驅還復動陽春之脚見前有華清樾樾王代切字林樹隂也山谷詩東西開軒䕃清樾施及凋蒲世說顧悅與簡文同年而髮蚤白簡文曰卿何以先白對曰蒲栁之姿望秋而落松栢之質經霜彌茂互見前某曵履何顔見前投簮甚力文選昔聞投簮逸海岸又聊以投吾簮老驥真老寜復戀立仗之芻東坡詩可憐老驥真老矣無心更秣天山禾餘見前孤山不孤行當迓在原之轡東坡訪僧惠勤詩孤山孤絶誰肯廬道人有道山不孤紙窻竹屋深自煖擁褐坐睡依團蒲代回淮西傅漕誠虎符奏最龍節疇庸禮樂逺而光華遐心何有並見前師旅因之饑饉敏手是資山谷詩敏手擘㤗華恭惟機量醇明材猷敏劭駒在彼谷已空北馬之羣詩皎皎白駒在彼空谷魚躍于淵盍展南􅉇之翼甫班天上復守雲中馮唐傳魏尚為雲中守亷范傳再遷為雲中太守帖四境之驛騷帖通作怗静也廣韻安也服也公羊傳卒帖荆注服也詩徐方驛騷騷動也徐國傳遽之驛知王兵必克歸以報其國馳去以相恐動集萬民之離散詩序鴻鴈羙宣王也萬民離散不安其居而能勞來還定安集之兹由畫㦸就易繡衣雖合符得節若平進之常南史王騫傳謂諸子曰吾家本素族自可依流乎進不須茍求蔡興宗傳吾素門平進與主上甚踈庾諒傳皆非姻族各以平進後周劉璠傳欲立邉功不樂隨牒平進新唐書選舉志朋比貴勢妨平進之路互見前然疊組重珪非他道之比少容咨度㑹即遄歸某願友多聞獨欠一識整六師而截淮浦正藉來宣詩整我六師以修我戎又截彼淮浦王師之所注截治也治彼淮浦之旁有罪之國使百工而求傅巖猶堪共役史記殷本紀武丁夜夢得聖人名曰說以夢所見視羣臣百吏皆非也於是迺使百工營求之野得說于傅險中舉以為相遂以傅險姓之號曰傅說代囘趙漕彦倓宋史彦倓字安卿彭城矦叔聚曾孫初調溧陽尉改揚州司戸平江府推官攝宜興縣知臨安於潜縣累遷湖南運判尋知紹興府改大府少卿遷顯謨閣知太平州調江西轉運使嘉定十一年卒於官殿藩江介殿丁練切鎮也詩殿天子之邦介側畔也楚辭悲江介之遺風轉漕湘流賈誼傳造託湘流兮師古曰造至也言至湘水因託其流袁得賢矦州乃無於一事李㤗伯袁州學記今代遭聖神爾袁得賢君俾爾由庠序踐古人之迹韓文吾雖欲出意見論利害聽命於幕下而吾州乃無於一事可假而行者東坡詩老㓜化服一事無有鞭不施安用蒲衡為巨鎮食何有於九年周禮正南曰荆州其山鎮曰衡山禮記國無九年之蓄曰不足宜煩單車信陵君傳今單車來代之何如哉李陵書單車之使張綱傳獨單車之職又單車入嬰壘杜氏通典自魏以來庻姓為州而無將軍者謂之單車刺史凡單車刺史加督進一品都督進二品李頎詩所思但乘興逺適惟單車以餉千里韓信傳千里餉糧士有饑色恭惟某官傑韜國器韓安國傳唯天子以為國器師古曰言其器用重大可施於國政也表立宗英漢書叙傳河間賢明禮樂是修為漢宗英出而專城璽書勉勵之有效古辭陌上桑四十專城居循吏傳序二千石有治理效輙以璽書勉勵增秩賜金或爵至闗内矦入而繕器工匠伎巧之咸精將作監唐龍朔二年改為繕工監光宅改營繕監漢宣帝紀贊政事文學法理之士咸精其能至於伎巧工匠器械自元成間鮮能及之此言為將作少府侈兮南箕詩哆兮侈兮成是南箕彼䜛人者誰適與謀哆昌者反說文云張口也箋去箕星哆然躔狹而舌廣今䜛人因寺人之近嫌而成言其罪猶因箕星之哆而侈大之歸止北陌韓文親戚之不仕與倦而歸者不在東阡在北陌可杖履徃來也自起家而予郡已知國之得人田里既無於歎愁原隰遂華於禮樂四郊殊靖一節以趨某引分投簮蒙恩分組俱見前景翳翳以將入所欣衡宇而載奔歸去來辭景翳翳兮以將入撫孤松而盤桓又乃瞻衡宇載欣載奔芳菲菲其彌章願折瓊枝而繼佩離騷經佩繽紛其繁節兮芳菲菲其彌章又折瓊枝以為羞兮精瓊靡以為粮代囘江西胡漕槻奪情許國耿恭傳恭征䟽勒時母卒及還追行䘮制有詔使五官中郎將齎賜牛酒釋服注奪情不令追服吳志君子不奪人情故三年盡孝子之情至於有故則殺禮以從宜要絰故聖人制法有禮無時不行䘮不奔訃非古也周札傳以身許國死而後己將指餽軍移孝則忠盖古所謂大臣者孝經君子之事親孝故忠可移於君知逺之近故今用之鄉人焉詩序故用之鄉人焉用之邦國焉恭惟某官挺有祖風新唐書魏徴傳謩之論議挺挺有祖風烈詳見前蔚為世徳叙傳蔚為辭宗師古曰蔚文采盛也音鬱中外踐敡之久聖明簡注之深素韠三年方枕曾參之塊詩庶見素韠兮我心藴結兮綠林一日忽於通徳之鄉劉𤣥傳王莽末南方饑饉人庶羣入野澤掘鳬茈而食之更相侵奪新市人王王鳳為平理争訟遂推為渠帥於是諸亡命馬武王常成丹等徃從之藏於緑林中數月間至七八千人後至五萬人注緑林山在今荆州當陽縣東北李渉井欄砂宿遇夜客詩暮雨蕭蕭江上村綠林豪客夜知聞他時不用相廻避世上如今半是君鄭𤣥傳孔融深敬於𤣥告髙宻縣為𤣥特立一鄉曰鄭公鄉廣開門衢令容髙車號曰通徳門觀察使急於賦焉見大夫無可使者並見前惟閔子嘗要絰而服事禮閔子騫以孝聞者也腰絰而服事君既而曰若是乎古之道不即人心退而致事孔子善之注既事畢言古者不敢斥君即近也退退身也致事致禄位於君也孔子善其服事君之義内不失親親之恩也至伯禽亦卒哭而御戎禮記子夏曰三年之䘮卒哭金革之事無避也者禮與初有司與孔子曰夏后氏三年之䘮既殯而致事殷人既葬而致事記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無辟也者非與孔子曰吾聞諸老􅆅曰昔者魯公伯禽有為為之也今以三年之䘮從其利者吾弗知也鄭注云疑有司初使之然致事還其職位於君也伯禽有徐戎作難䘮卒哭而征之急王事也帝曰汝諧尚書帝曰俞徃哉汝諧孔傳汝能諧和此官公為民起樵蘇後㸑正觀韓信之竒韓信傳信所出竒兵二千騎者􅇋趙空壁逐利即馳入趙壁弩矢前驅豈耀長卿之貴司馬相如傳至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵某相識雖晩所聞已多山林魑魅之姦何遽至是左傳昔夏方有徳逺方圖物貢金九牧鑄鼎象物百物而為之備使人知神姦故民入川澤山林魑魅魍魎莫能逄之京觀鯨鯢之績願早圖之左傳古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲滛慝鯨鯢皆海中大魚鯨長千里鯢者鯨之雌亦長千里崔豹古今注云鯨鯢一生數萬子常以五六月就岸生子至七八月𨗳從其子還大海中鼓浪成雷噴沫成雨水族畏避莫敢當者盖鯨鯢有力能驅食小魚故以為疆暴凌弱之喻如獸之有猰㺄蟲之有長虵鳥之有鴟梟然京觀之喻不取彼而取此者盖鯨鯢導從種類䟦扈海中有渠魁之義且其死也彗為之出玉者行戮亦除舊布新之義京大也鯨字從京亦京觀之義與代囘黄漕犖山谷從孫朝散郎直顯謨閣西浙路轉運判官弟㽦台州太守典獄參聨久虞瘝曠尚書王曰嗟四方司政典獄非爾惟作天牧共工闕長忽冐攝承左傳攝官承乏退自揣於頭顱難上司於㗋舌露章控免並見前天聽莫囘秦宓傳天處髙而聽卑諒四牡之光實分隣壁致五鳩之正躐代庖人方伺遄歸亟圖􅇋謝忽鳴謙之先辱寜裁復之敢稽並見前代囘湖南徐運判煇四牡之勞使臣久稽王覲左傳王覲為可五雉之為工正謬竊君㤙曽巽謝之未遑已謙光之先辱恭惟某官王之膚使並見前古之謀人尚書惟古之謀人曰未就予忌雖駕單車身實兼於數器薛宣傳經術文雅足以謀王體斷國論身兼數器有退食自公之節餘見前故纍四印勞不歎於獨賢石顯傳印何纍纍師古曰纍纍重積也力追切詩大夫不均我從事獨賢淮海無波京師知潤見前遂使雲司之白杜氏通典黄帝雲師雲名注黄帝受命有雲瑞故以雲紀事春官為青雲夏官為縉雲秋官為白雲冬官為黒雲中官為黄雲也黄帝有景雲之應因以名師與官也裴復除制俾踐白雲之司與分水佩之蒼禮記公矦佩山𤣥玉大夫佩水蒼玉晉公卿禮秩曰特進佩水蒼玉尚書令僕射中書監令皆佩水蒼玉某聽履可慙投簮甚力見前集于苞栩遥瞻星言夙駕之光詩星言夙駕說于桑田注星雨止星見夙早也命主駕者雨止為我晨早駕收之桑榆已畏日暮倒行之戒史記伍子胥傳吾日暮塗逺吾故倒行而逆施之主父偃傳吾日暮故倒行逆施之代回廣西楊漕方起家予節將漕宅南髙明有融及物之心未了詩昭明有融髙朗令終注融長也天既光大成王以昭明之道甚有長也言與之明道未有極已之時選擇而使重逺之意可知恭惟某官明善誠身為仁由己三仕無喜色三已無愠色飬之浩然兩喜多美辭兩怒多惡辭聽其自爾及兹更化復此立朝遽為襆被之行遄有褰帷之寵並見前莫非王土寜辭五嶺之炎杜詩五嶺皆炎􅉯無有遐心行歌四牡之勞某罔功曵履有請投簮並見前我營小山之居將委身而就老南史何𦙍傳𦙍以㑹稽山多靈異居若邪山雲門寺初𦙍兄求㸃並棲遁𦙍又隠世號㸃為大山𦙍為小山左傳使營莬裘吾將老焉公作太𤣥之草願載酒以相從揚雄傳雄以病免復召為大夫家素貧嗜酒人希至其門時有好事者載酒肴從遊學而鉅鹿矦芭常從雄居受其大𤣥法言焉代董侍郎囘辛運使克承帖楚報政韻㑹帖音與鐡同通作怗静也廣韻安也服也公羊傳僖四年卒帖荆注服也荆楚也史記周公世家三年而後報政泝峽觀風原隰之事孔殷正煩咨度尚書九江孔殷此借用詩周爰咨度疆埸之虞未靖尤藉轉輸詩疆埸有𤓰食貨志殖于疆埸左傳疆埸之事又疆埸無主謂邉境也賢者之來民所攸頼恭惟某官天資凝逺風韻浚明南史栁惔傳帝善其詩謂豫章王嶷曰惔不但風韻清爽亦屬文遒麗張敷傳性整貴風韻甚髙王筠傳沈約見筠以為似外祖袁粲謂張稷曰王郎非惟額類袁公風韻多欲相似王規傳王威明風韻直上神峰標映千里絶跡百尺無枝臨川獻王映傳風韻韶靡陸杲傳舅張融有髙名杲風韻舉止頗類孔珪傳風韻清踈巍峩千佛之姓名早宜臺閣摭言張倬柬之之孫數舉進士不第捧登科記頂上戴之曰此千佛名經屈折三神之歩武晩落江湖郊祀志蓬萊方丈瀛洲此三神山者其傳在渤海中山谷詩此士落江湖兹煩漢節之華來假䕫藩之重跨灧澦之象不辭王事之艱難灧澦歌灧澦大如馬瞿塘不可下灧澦大如象瞿塘不可上俯常山之蛇要識老臣之開濟杜詩百年開濟老臣心餘見前飛騰自此翹企俟之翹祈堯切韻㑹企也左傳引逸詩翹翹車乘服䖍曰逺貌企音棄說文舉踵也爾雅鳬鴈醜其踵企注飛即伸其脚跟企直通作跂詩跂予望之山海經有跂踵國人行脚跟不著地如人之跂足也温嶠傳州之文武莫不翹企凉武昭王傳延首雲極翹企遐方某别徳怳然為僚幸甚尚憐徃日聽夜雨於巴山巴山在今歸州巴東縣治南又撫州崇仁縣南六十里亦有巴山以山有巒巴祠故名巴山唐詩夜聲曽隔巴山雨露氣仍和震澤春安能扁舟披朝雲於巫峽見前代囘淮南林運使拱辰陞班中秘劉向傳詔向領校中五經秘書師古曰言中者以别於外將漕邊陲陲是為切說文逺邉也左傳䖍劉我邉陲薛道衡詩逺略振邉陲禮樂逺而光華遐心何有師旅因之饑饉敏手為宜山谷詩敏手擘泰華天不違顔左傳天威不違顔咫尺言君尊如天其威嚴常在顔面星言夙駕恭惟某官氣資膚敏徳履𢎞深自司庾於日畿益舒翹於嵗最屬淮人之離散求牧與芻忘漢徳之寛仁帶牛佩犢徒得君重母俾民憂峻奎壁圖書之聨兼錢榖刑獄之任並見前餽千金之日費正頼通材孫子凡用兵之法日費千金然後十萬之衆舉矣護數處之風寒更觀竒績三國志注紀渉曰猶人雖有八尺之軀靡不受患其護風寒亦數處耳宋曽極詩未得三軍如挾纊憑誰數處護風寒詳見前某未遑朢履甚慶得輿遺我雙魚愧莫酬於繾綣駕彼四牡願加毖於馳驅並見前代囘湖北范漕子長肅將使指兼擁州麾一道觀風足展澄清之志並見前專城宣化又彰鎮撫之材陳平傳外鎮撫四夷諸矦重湖無憂四海相慶見前恭惟某官人門具美唐鄭仁表為起居郎文章俊㧞自謂門第人物文章俱美嘗曰天瑞有五色雲人瑞有鄭仁表天分素髙晉書列女傳王凝之妻謝道韞嘗譏謝𤣥學植不進曰為塵務經心為天分有限邪久矣踐揚名實孚於上下恬然歛退言行擇乎中庸公道方申薦章旁午霍光傳使者旁午師古曰一從一横為旁午猶言交横也學林云古篆五字象隂陽六爻之義午字亦取此義周禮壺涿氏掌除水虫若欲殺其神則以牡橭午貫象齒而沉之鄭注午為五橭榆木名以橭為幹穿孔以象牙從橭貫之為十字史言旁午者四方八達皆通亦從横交五之義也宜絲綸之一札畀符節以並驅夏口武昌三國之山川具在夏口一曰沔口江水東至華容縣西夏水出焉依山傍江對岸則入沔津故城以夏口為名劉表傳注夏口即今沔州武昌今鄂州武昌縣郡縣志云武昌郡舊名鄂漢以為縣屬江夏郡薛氏曰夏口南臨大山三方阻水漢陽以北阻隔陂湖敵出上蔡則武昌夏口當其衝武昌乃吳建都而王陶温庾之所為督府者其地襟帶江沔依阻湖山左控廬淝右連襄漢南北二途有如繩直北人南牧常出此以襲豫章東坡赤壁賦西望夏口東望武昌山川相繆鬱乎蒼蒼江沱漢廣諸矦之風化一新詩序江有汜美媵也勤而無怨嫡能悔過也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也漢廣徳廣所及也文王之道被於南國美化行乎江漢之域無思犯禮求而不可得也不俟席温即膺環召某摧頽暮齒塵綴朝紳只今數日以謀歸外無榮望期公五月之報政别致賀忱並見前代回浙漕黄檢正犖徽本闕今補陞華延閣將漕神臯綸命先庚而具孚輿人旁午以相慶並見前恭惟某官器資山立禮記山立時行注山立不摇動也正義曰山立者若住立則巋如山之固不摇動也樂記云總干而山立不摇動也才諝淵停石崇楚妃歎矯矯莊王淵停嶽峙洊著民庸政安駭馬荀子馬駭輿則君子不安輿庶人駭政則君子不安政馬駭輿則莫若静之庶人駭政則莫若惠之韓非子造父御四馬馳驟周旋而恣欲於馬者擅轡筴之制也然馬驚於出彘而造父不能禁制者非轡筴之嚴不足也威分於出彘也遍儀宰旅妙割全牛宰旅言為宰相屬官檢正之屬東坡詩妙割無全牛考前此之彛章宜引之於禁近屬日畿之選使勤天陛之掄材青雲不厭於斜飛劉禹錫詩青雲直上無多路却作斜飛取勢回互見前繡斧暫勞於直指未離五尺天之近儼立筍班前知七八月之間即持荷槖並見前某卜隣舊矣聞報躍然誦水鏡是人材之篇喜詩仙之有後山谷詩塞上金湯惟粟粒胸中水鏡是人材思金石出丞相之語恐里諺之可占豫章有日月湖中有石人灘里諺相傳日月湖明良將出石人灘合狀元生金石出丞相之說未詳不成報章實致私賀詳啟意檢正為山谷後人故知為豫章人郡志有黄㽦者為山谷從孫盖其群從也四六標準卷二十四
