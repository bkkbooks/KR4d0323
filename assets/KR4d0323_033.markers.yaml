  - {type: variant, offset: 13, length: 299, content: 宋建隆元年應天下諸縣除赤畿外有望𦂳上中下掌總治民政有戍兵則兼兵馬都監或監押三年始以朝臣為知縣或參用京官自大理正奚嶼監察御史王祐等始或幕職為之天聖間天下多缺官而令選尤猥下為清流所不與乆不得調乃為縣令人數言其病民乃詔為舉法以重令選凡知州轉運使嵗舉見任判司薄尉有罪非贓私有出身三考無出身四考堪為令者一人或二人自是人重為令令選稍精慶厯間詔天下知縣非鞫獄毋得差自政和以来重内輕外人輕縣令之選吏部兩選不注者甚多靖康初詔初改官必為縣紹興七年詔寺監丞簿等任滿已改官人未歴民事者各與堂除知縣一次借緋九年詔自後縣令差文臣乾道二年御筆自今非兩任縣令不除御史慶元初詔除殿試上二名省元外竝作邑自後雖宰相子殿試科甲人無宰邑者矣, SBCK: ''}
