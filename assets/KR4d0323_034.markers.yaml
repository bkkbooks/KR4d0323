  - {type: variant, offset: 5, length: 9300, content: 三十四宋李劉撰丞漢丞尉多以本部人為之晉後無丞唐置京縣丞三員北京太原晉陽各置一人宋初不置丞天聖中因蘇耆請開封兩縣始各置丞一員在簿尉之上仍於有出身幕職令録内選充皇祐中詔赤縣丞並除新改官人熈寜四年諸路軍州繁劇縣令戸二萬以上增置縣丞一員以幕職官或縣令人充元祐元年詔應因結納常平免役置丞並行省罷以後沿革不常紹興三年以淮東累經兵火權罷縣丞十八年置海陵丞一員嘉定後小邑不置丞以簿兼通寜鄉陳縣丞愷寜鄉已見李時為其邑簿武功之丞簡靖乆矣沐芳栁文武功縣丞㕔壁記武功為甸内大縣潁川陳南仲居是官邑人宜之號為簡靖夫以武功疆理之大人徒之多而陳生以簡靖輔其理斯固難矣臨邑之簿卑棲兹焉假䕃杜工部集臨邑舍弟書至苦雨黄河汎溢隄防之患簿領所憂因寄此詩以寛其意詩云舍弟卑樓邑防川領簿曹尺書前日至版築不時操互見前敢以尺書之敬進於再拜之先韓文謹伏光範門下再拜獻書相公閣下恭惟某官逺抱甚都司馬相如傳雍容閒雅甚都師古曰都閒美之稱也壯猷孔碩詩克壯其猷又其詩孔碩説文碩頭大也廣韻大也清明志氣胸中風月之無邉禮記清明在躬氣志如神山谷濓溪詩序舂陵周茂叔人品甚髙胷中灑落如光風霽月沈浸文章筆下源泉之不擇進學解沈浸醲都含英咀華作為文章其書滿家陳後山詩胸中厯厯著千年筆下源源赴百川盍徑要津之立杜詩立登要路津顧淹贊縣之留鳳凰自下而升髙聊復爾耳張鷟集九千里之丹鳳自下升髙七十日之黄龍從微至著注宋玉曰鳳凰上擊力千里翺翔乎窈㝠之上藩籬之鷃豈得料其高哉相書占氣要曰日中有黄氣如龍七十日遷為丞也阮咸傳未能免俗聊復爾耳鴈鶩鉗左而摘右端使然哉昌黎藍田縣丞壁記文書行吏抱成案詣丞巻其前鉗以左手右手摘紙尾鴈鶩行以進丞渉筆占位署惟謹不敢略省漫不知何事丞之設豈端使然哉互見前雙陸之勢無休大唐新語宋守敬為吏清白謹慎累遷臺省終于絳州刺史其任龍門丞年已五十八數年而登列嶽毎謂寮屬曰公輩但守清白何憂不遷俗云雙陸無休勢余以為仕宦亦無休勢各宜勉之九萬之程斯下某﨑嶇副墨漫浪勾朱士安得自高妄欲比隣之託俱見前余方有公事願聞掃溉之吟藍田縣丞㕔壁記庭有老槐四行南墻鉅竹千挺儼立若相持水㶁㶁循除鳴斯立痛掃溉對樹二松日哦其間有問者輒對曰余方有公事子姑去互見前回桐廬朱縣丞中肖桐廬本漢富春縣之桐溪鄉孫呉廣武中析置桐廬縣屬呉郡隋初廢仁夀中復置屬睦州唐初置嚴州尋廢以縣屬睦州宋初屬杭州後屬建徳府短啟代庖已㤀西施之唐突㤀無放切廣韻遺㤀也周顗傳何乃刻畫無鹽唐突西施詳見前長箋倒廩尚憐東野之龍鍾韓文遇足下之請懇懇猶將倒廩傾囷羅列而進也醉留東野詩東野不得官白首誇龍鍾一謙之光三復以愧恭惟某官人門濟美見前風調拔羣觀東閣之竒詎當相吏朱雲傳薛宣為丞相雲往見之宣備賔主禮因留雲宿從容謂雲曰在田野無事且留我東閣可以觀四方竒士雲曰小生廼欲相吏耶宣不敢復言歌南陽之直真足自强朱暉傳暉字文季南陽宛人也遷臨淮太守吏人畏愛為之歌曰强直自遂南陽朱季吏畏其威人懐其惠易天行健君子以自强不息試窺千萬琳琅之毫芒韓詩平生千萬篇金薤垂琳琅流落人間者太山一毫芒詳見前豈以八九雲夢而芥蔕見前對藍田千挺之竹肯負丞哉見上條續桐江一絲之風今召君矣山谷嚴陵釣臺詩平生久要劉文叔不肯為渠作三公能令漢家重九鼎桐江波上一絲風汲黯傳君薄淮陽耶吾今召君矣某見賢不敏拜賜何居左傳秦獲孟明釋之孟明曰若從君惠而免之三年将拜君賜又戰於彭衙秦師敗續晉人謂之拜賜之師士廉未識桃椎亟當進謁新唐書隠逸傳朱桃椎益州成都人澹泊絶俗高士廉為長史備禮以請降階與之語不答瞪視而出士廉拜曰祭酒其使我以無事治蜀耶乃簡條目薄賦斂州大治東坡詩士廉豈識桃椎妙妄意稱量未必然永叔强差韓愈願勿失言回華陽李縣丞挺之華陽本秦成都縣地唐貞觀中分置蜀縣與成都縣分治郭下乾元初改為華陽縣取華陽黒水惟梁州之義宋因之題曲江之名夙嘗託契見前贊武功之理兹幸為僚見首條方有候於中㳙見前乃先覲於下問恭惟某官行無瑕纇瑕何加切説文玉小赤也廣韻玉病禮記瑕不掩瑜注瑕玉之病也疏云案字林瑕玉小赤而云病者以瑕與瑕瘕字義同故云纇音類説文絲節也又疵也栁玭傳玭嘗戒其子曰凡門第髙可畏不可恃門高則驕心易生族盛則為人所嫉少有疵纇人皆指之學有本原充長吉錦囊之文命騷可僕杜牧李賀集序使賀未死少加以理奴僕命騷可也餘見前飽鄴侯牙籤之讀繼别為宗見上巻回新應靈趙知縣條胡為再命之材周禮再命受服淹此一同之貳見前鴈鶩鉗左而摘右端使然哉鳳凰自下而升高将在此矣並見首條某冐嘗險阻左傳險阻艱難備嘗之矣全蹈拙疎歎同年琴上之星感舊游之如夢東坡送家退翁知懐安軍詩吾州同年友粲若琴上星當時功名意豈止拾紫青共萬里橋邉之月幸末路之得朋謝荘賦隔千里兮共明月萬里橋在成都韓詩幸同學省官末路再得朋代回武進陳縣丞貴成武進本漢丹徒曲阿二縣地三國魏黄龍初改丹徒為武進晉太康初别置武進縣於丹陽之東境太興初於武進僑置南蘭陵郡梁天監中改為蘭陵縣屬南蘭陵郡隋省入曲阿屬江都郡唐武徳復置武進縣貞觀省入晉陵垂拱初復置五代楊呉時徙治都城内與晉陵俱為附郭宋因之不本朝省晉陵縣入武進今人但見曲阿之褊而知武進金壇皆其一支也名家勝士自有公言羊祜傳賢達勝士陳後山詩江西勝士與長吟文帝紀所言公公言之東坡詩緑衣有公言助國舉賢古無私謝枉長箋之委重搔短髮以寘慙詩搔首踟蹰杜詩羞将短髮還吹帽又白頭搔更短渾欲不勝簪陳書蕭摩訶傳慙寘無地恭惟某官千里名駒九苞威鳳俱見前大科異等一翁二季之相望陳後山贈二蘇公詩一翁二季對相望大科異等固其常詳見前茂實英聲七略羣書之兼總劉歆傳歆乃集六萟羣書種别為七畧萟文志劉向卒哀帝復使向子歆卒父業於是總羣書而奏其七畧餘見前謂即登瀛洲而給札司馬相如傳請為天子遊獵之賦上令尚書給筆札師古曰札簡之薄小者也時未多用紙故給札以書顧欲破崖岸而為文韓文藍田縣丞㕔壁記破崖岸而為之注為之方作為文而讀連下句曰為文丞謂猶文具也朱文公云按文丞不成文理今云為文似歇後語斷章取義可也余不負丞丞負余誰其知者見前學而優仕仕優學似是兼之無謂我豈要子隣始為人識亦知吾徒得君重少應時須汲黯傳吾徒得君重杜詩竇氏檢察應時須又管葛本時須山谷詩公自才力應時須所愧明陟之章尚書三考黜陟幽明適引暗投之惠鄭陽傳以暗投人于道詳别見某三復墨妙文選淵雲之墨妙十襲珍藏闞子宋之愚人得燕石於梧臺之東歸而藏之以為寳革匱十重緹巾十襲客見之掩口而笑儀圖之莫助之更期進徳匪報也為好也聊復成章並見前回樂安趙縣丞彦彬樂安本撫州崇仁縣西南三鄉及吉安永豐縣一鄉宋紹興中割置樂安縣因有樂安鄉故名老驥媻珊猶戀天山之秣晉拂舞歌老驥伏櫪志在千里子虚賦媻珊勃窣上金隄漢書漢使貳師将兵三萬騎出酒泉擊右賢王於天山又且西彌國王治天山東大谷去長安八千六百七十里續漢書竇固出塞至天山西河舊事天山高冬夏常雪故曰白山匈奴謂之天山過之皆下馬拜在蒲海東一百里即漢貳師擊右賢王之䖏山海經天山多金玉有雄黄莢水出焉而西流注於陽谷九州要記涼州古武都有天山黄帝受金液神丹于此今按天山雪山祁連山白山其實一也明帝紀擊破白山虜於蒲類海上章懐注云山冬夏有雪故曰白山匈奴謂之天山西河舊事祁連山在張掖酒泉二界宜六畜匈奴失祁連山歌曰亡我祁連山使我六畜不蕃息東坡詩可憐老驥真老矣無心更秣天山禾名駒竒俊遹追電影之鞭王襃傳追奔電逐遺風崔豹古今注秦始皇有七名馬追風白兎躡景追電飛翔銅爵晨鳬幸喜論交過勤執訊爾雅訊言也疏云訊問以言也説文問也詩執訊連連恭惟某官近於大雅景十三王傳贊夫惟大雅卓爾不羣河間獻王近之矣博以羣書司馬遷傳劉向揚雄皆博極羣書太白詞章宜有六丁之取更生經術豈無太乙之知不應賜第之餘復作贊公之試鴈鶩平立未妨破崖岸以為文鸞鳳高翔㑹即決雲霄而布武某為寮有幸辱問相先揣宏景之頭顱歸已晚矣俱見前畫嚴丞之手板猶願見之唐鄭棨開天傳信記𤣥宗御勤政樓大酺縱士庶觀看百戲競作人物填咽金吾衛士白棒雨下不能制止上患之謂高力士曰吾以海内豐稔四方無事故盛為宴樂與百姓同歡不知下人喧亂如此汝何方止之力士曰臣不能也陛下試詔嚴安之處分打塲以臣所見必有可觀上從之安之至則周行廣塲以手板畫地示衆曰犯此者死以是終五日酺宴咸指其畫曰嚴公界竟無一人敢犯者封氏見聞嚴安之崔譚俱為赤尉力行猛政譚恐安之名出已右毎事欲先之安之使五百執大杖引前譚則益麄其杖安之越麄譚亦轉麄至不能舉安之遂令執小杖譚亦益細其杖安之越細譚亦轉細至不堪用安之遂都去其杖譚果不能學今按安之為赤尉此云丞不知何據代回樂安趙縣丞彦彬推士轂而及丞味言何有鄭當時傳其推轂士及官屬丞史誠有味其言也旁使車而從子哦句已来藍田縣丞㕔壁記對二松日哦其間一謙之光三復以愧恭惟某官諸劉族屬文帝紀復諸劉有屬籍家無所與王莽傳諸劉更屬籍又諸劉為郡守皆徙為諫大夫高駢詩本支强我李磐石冠諸劉東坡詩南嶽諸劉豈易逢為漢宗英叙傳禮樂是修為漢宗英馳閶闔入凌競則為宜耳甘泉賦馳閶闔而入凌競師古曰凌競者言寒涼戰栗之䖏去角牙破崖岸端使然哉見上條剡三載之陟明愧一言之不智然無華乃安靜之吏章帝紀安靜之吏悃愊無華日計不足月計有餘則所美豈鞶帨之文法言今之學也非獨為之華藻也又從而繡其鞶帨注鞶大帶也帨佩巾也所言備物而為飾也言古之學者存其大體所以易也今之學者有經傳章句如華藻繡鞶帨其文彌繁所以難也有望於君不孤此意某已成歸計更辱贈言布襪青行纒吾已從此逝矣纒澄延切古樂府有雙行纒謂行縢即足衣也杜詩青鞋布襪從此始東坡詩我遊蘭溪訪清泉已辦布襪青行纒史記髙祖本紀公等皆去吾亦從此逝矣珠宫紫貝闕子盍歸而求之屈原九歌魚鱗屋兮龍堂紫貝闕兮朱宫東坡詩豈有貝闕藏珠宫代回樂安趙縣丞彦彬題藍田之壁君受代以不遥厭承明之廬我治任兮更迫並見前何勤委翰仍費屬辭恭惟某官以貴王孫韓信傳吾哀王孫而進食注王孫如言公子也杜詩尚覺王孫貴豪家意頗濃為名進士巖邑更刀之後非復昔時贊公游刃其間疑有餘地及瓜近只並見前拔茹誰歟易拔茅以其連茹敢揄陟明之章少寓愛助之意某投簪不力曳履胡顔並見前以一身而備百工朞可已矣時月湖為工書總羣書而奏七略子必勉之藝文志哀帝使劉向子歆卒父業歆于是總羣書而奏其七畧故有輯略六藝略諸子略詩賦略兵書略術數略方技略回錢塘趙縣丞彦的秦置錢塘縣屬㑹稽郡漢為㑹稽西部都尉治所東漢縣省晉復置屬呉郡陳於此置錢塘郡隋為杭州治唐改唐為塘宋因之余方有公事鼎来赤縣之官曹韓文藍田縣丞㕔壁記余方有公事子姑去杜詩赤縣官曹擁材傑軟裘快馬當氷雪我未免鄉人益愧白頭之幕府杜詩白頭趨幕府有勤執訊見回樂安趙縣丞條敢闕報章恭惟某官卓爾不羣飄然無敵尋玉清洞中之字已書㑹計之功茅君内傳第六赤城丹山之洞周迴三百里名曰紫玉清平之天方輿勝覽玉京洞在天台北七里赤城山右蓋第六洞天許邁常居之與王羲之書曰自天台至臨海多有金堂玉室仙人芝草余爽詩東臨滄海見羣仙誤入桃源小洞天一局殘碁消㡬刻老龍鬚甲已蒼然展錢唐江上之圖更動吟哦之興錢唐江源自歙州界經州又東北流入於海劉禹錫詩八月濤聲吼地来頭高數丈觸山回須臾郤入海門去巻起沙堆似雪堆李白詩浪打天門石壁開海神来過惡風回浙江八月何如此潮似連山噴雪来東坡詩江神河伯兩醯鷄海若東来氣吐霓安得夫差水犀手三千强弩射潮低手板暫煩於畫地見上條觚稜何逺於去天稜盧登切西都賦上觚稜而棲金雀注殿堂上最高處某轍鮒孤蹤見前磨牛陳迹東坡詩團團如磨牛歩歩踏陳迹喜似人於千里況辱託於枌榆雖異事而同寮尚不遺於葑菲俱見前回富陽趙縣丞光祖富陽本漢富春縣屬㑹稽郡東漢屬呉郡孫呉置東安郡治富陽尋廢郡仍屬呉郡晉改富陽縣屬杭州宋因之倚使者之車笑癡兒之未了傅咸傳生子癡了官事詳見前題丞哉之壁聞公子之鼎来未果修辭先勤執訊俱見前恭惟某官五潢龍種史記天官書咸池曰天五潢五潢者五帝車舍杜詩龍種自與凡人殊千里駒材見前早宣采棒之威曹瞞傳太祖初入尉廨繕治四門造五色棒縣門左右各十餘枚有犯禁者不避豪强皆棒殺之坐獲緑林之賞後漢書諸亾命聚藏緑林山中注緑林荆州山名鴈鶩箝行而平立端使然哉鳳凰自下而升高恐不免耳俱詳首條某強名入幕正愧面墻赤縣官曹喜依仁之有幸杜詩何處可依仁餘見上條黄塵衣㡌或分䕃之自今杜詩時危兵甲黄塵裏山谷詩黄塵逆㡌馬辟易又九陌黄塵烏㡌㡳五湖春水白鷗前回益陽李縣丞益陽本䅈舊縣屬長沙郡以縣在益水之陽故名漢屬長沙國孫呉屬衡陽郡唐屬潭州宋屬鼎州尋復屬潭州詳啟意蓋時為寜鄉簿寜鄉益陽皆長沙屬縣江西之有宗𣲖昔已論交吕居仁有江西詩𣲖圖詳見前湘水之逢故人今將聫事許渾詩瀟湘逢故人詳見前尺紙良勞於遺逺白頭何至於如新鄒陽傳語曰白頭如新孟康曰初相識至白頭不相知恭惟某官翰墨勝流典刑前輩人言短李釣竿已負於珊瑚新唐書李紳字公垂為人短小精悍於詩最有名時號短李白樂天詩悶勸迃辛酒閒吟短李詩又毎被老元偷格律苦教短李伏歌行乂老張知定伏短李愛應顛公自注張十八籍李二十紳皆攻律詩故云杜詩巢父掉頭不肯住東将入海隨煙霧詩巻長留天地間釣芉欲拂珊瑚樹短李蓋以自况李時為簿亦暗用短主簿事天遣長庚霞佩正垂於金薤李陽氷草堂集序驚姜之夕長庚入夢故生而名白以太白字之世稱太白之精得之矣東坡詩天教明月伴長庚韓詩李杜文章在光熖萬丈長平生千萬篇金薤垂琳琅乞君飛霞佩與我高頡頏長庚以況李丞葢以太白方之謂進參於諸老顧退貳於一邦箝尾無辭需頭有薦蔡邕獨㫁章者需頭奏者亦需頭表者不需頭詳見前某束春秋於五傳韓詩春秋三傳束高閣方本三作五朱文公云鄒夾春秋世已無傳而當世見行三傳作五非也李所引用多取方本蓋文公校定本未出故也訪離騷之一經長沙為屈原自沉之地故云士安得自高政欲比隣之請余方有公事願聞掃溉之吟俱見前代回麗水童縣丞壎麗水已見考陟明之績輙剡需章屬比事之辭遽鳴謙徳俱見前於禮為過此意則勤恭惟某官文獻故家詩書夙好陶詩詩書敦夙好園林無俗情彼不即汝而汝即彼既執蝮蛇河東宥蝮蛇文家有僮善執蛇晨持一蛇来謁曰是謂蝮蛇余謂僮曰彼居榛中汝居宫内彼不即汝而汝即彼後漢書野王三老傳即人者人亦即之注即就也易曰即鹿無虞余不負丞而丞負余寜問鴈鶩見前烏何闗於屋上詩瞻烏爰止于誰之屋太公六韜武王登夏臺以臨殷民周公旦曰臣聞之愛其人及其屋上烏憎其人者憎其除胥杜詩丈人屋上烏烏好人亦好黔固詠於邑中左傳宋太宰皇國父為平公築臺於門妨於農收子罕請人農功之畢公弗許築者謳曰澤中之晳實興我役邑中之黔實慰我心澤門宋東城南門也皇國父白晳而居近此子罕黒色而居邑中時而颺之尚書工以納言時而颺之聊復爾耳某有二宜去俱見前以兆足行舉能其官亦有無窮之聞尚書舉能其官惟爾之能仕優則學願收可大之功代回宣城張縣丞曼徳宣城本漢丹陽郡宛陵縣地順帝置宣城縣隋宣州治此唐初析置懐安縣尋省宋因之升陟一章何能借重謙勤尺牘又復拜嘉左傳鹿鳴所以嘉寡君也敢不拜嘉栁詩憲府初收迹丹墀共拜嘉其文固自粲然此禮略之可也恭惟某官清餘家法徐防傳搏士弟子皆以意説不守家法敏有吏才崔寔傳明於政體吏才有餘翠竹深林乆已觀於停峙韓文當是時見王於北庭猶高山深林鉅谷龍虎變化不測傑魁人也退見少傅翠竹碧梧鸞鵠停峙能守其業者也老槐古縣兹良費於吟哦韓駒父詩縣古槐根出官清馬骨高藍田縣丞㕔壁記庭有老槐四行日哦其間詳見前無俟書来亦當剡入未見分毫之補又勤四六之貽某辭璧未能報瓊又乏俱見前樓臺近水奈何秋月之䦨干䦨干横斜貌曹植詩月落參横北斗闌干餘見前桃李成蹊佇見春風之披拂李廣傳贊桃李不言下自成蹊師古曰蹊謂徑道也言桃李以其華實之故非有所召呼而人爭歸趨来往不絶其下自然成徑以喻人懐誠信之心故能濳有所感也莊子孰嘘吸是孰居無事而披拂是代回宣城張縣丞曼徳厭承明之廬我動歸歟之興題藍田之壁公傳至止之期四六鼎来再三復熟俱見前恭惟某官彯纓華秩選詩仕子彯華纓簪筆名家再轉為丞坐閱十年之乆東坡詩坐閲諸公半廊廟一鼓作氣㑹摶萬里之程左傳一鼓作氣再而衰三而竭願嗇龍文虎脊之精神杜子美畫馬贊魚目瘦腦龍文長身雪垂白肉風蹙蘭筋漢書禮樂志天馬徠出泉水虎脊兩化若鬼應劭曰馬毛色如虎脊者有兩也靜聽蟲臂䑕肝之造化莊子以汝為蟲臂乎以汝為䑕肝乎某自知日薄揚雄傳臨汨羅而自殞兮恐日薄於西山豈可夜行魏志田預字國讓徴為衛尉屢乞遜位司馬宣王以為預克壯書喻未聽豫書答曰年過七十而以居位譬猶鐘鳴漏盡而夜行不休是罪人也遂固稱疾篤疲馬之戀君軒已将告老鮑昭詩疲馬戀君軒騎驢之到京國猶及語離韓詩騎驢到京國欲和薰風琴豈識天子居九重鬰沉沉代回海鹽梁縣丞成章秦析呉縣地置海鹽縣屬㑹稽郡漢因之莽曰展武後䧟為湖移治武原鄉改為武原縣東漢復為海鹽屬呉郡又改故邑縣晉復為海鹽陳省入鹽官縣唐復置石晉屬秀州宋初仍舊後屬嘉興府詳啟意蓋代月湖五雉分工近承誤渥雙魚尺素逺仞故情恭惟某官拾芥有年哦松何晚俱見前翦伐誰能送只令志士之嗟杜陵古栢行大厦如傾要梁棟萬牛回首邱山重不露文章世已驚未辭翦伐誰能送苦心豈免容螻蟻香葉終驚宿鸞鳯志士幽人莫怨嗟古来才大難為用精悍吾所聞正自可人之意東坡詩城西兩謝俱能文穰丞精悍吾所聞猶借齒牙之餘論見華㗋舌之納言俱見前某似是水曹通典魏尚書有水部郎後魏北齊有水部屬都官尚書後周有司水大夫隋初為水部侍郎屬工部唐天寶中改水部為司水杜詩愛酒晉山簡能詩何水曹注何遜能詩為水部郎王微之傳似是馬曹時月湖遷工部尚書故云已承天寵易在師中吉承天寵也告者過也想以為司馬之官行或使之惟當返屠羊之肆月湖以刑侍陟工書而来啟誤為兵書故云回崇仁朱縣丞汛崇仁已見此啟亦代月湖文昌之座髙華偶然序進晉天文志文昌六星在北斗魁前天之六府也主集計天道唐天文志天之六司劉伯疏八座比于文昌二丞方於管轄武功之官簡靖亦以書来見首條所愧陳人有慙善頌恭惟某官天葩吐藻俱見前地芥決科法言須以發䇿決科鸞鳳高翔時来則為之耳鴈鶩平立丞豈端使然哉似聞臺府之見知又欲絃歌而相試解牛既效薦鶚何疑某司臬無庸僝功有命老夫耄矣恐孤㗋舌之納言曷月歸哉猶借齒牙之餘論並見前回彰明黄縣丞亘彰明本漢涪縣地晉自沙成移漢昌縣僑治于此屬巴西郡後魏改為昌隆縣隋屬金山郡唐先天初改為昌明縣屬綿州後唐時又改為彰明縣宋因之通篇用山谷語黄丞豈其後人耶老我蹣跚甘一麾之出守王荆公詩老我孤主恩陳後山詩老我何所懐蹣蒲官切跚相干切蹣跚行不進貌通作媻姍司馬相如傳媻姍勃窣又作媻㪚平原君傳有躄者媻㪚行汲故人騰踏甫再轉而為丞踏達合切韓詩飛黄騰踏去馳情室邇而人遐詩東門之墠茹蘆在阪其室則邇其人則逺梁書阮孝緒傳任昉尋其兄履欲造而不敢望而歎曰其室則邇其人則逺為名流所欽尚如此示問禮逾而情過韓文茍来者吾斯進之而已矣烏待其禮逾而情過乎恭惟某官金華一𣲖神仙傳黄初平丹溪人年十五家使牧羊有道士見其良謹将至金華山石室四十餘年不復念家其兄初起行山尋索歴年不得後見市中有一道士請占之道士引至金華山中遂得相見問羊所在曰在山東初起往視之但見白石初平乃叱曰羊起於是白石皆變為羊數萬頭初起便棄家留住學道初平改字赤松子初起改字魯班山谷詩牧羊金華山早通玉帝籍楊用修云山谷答俞清老寒夜三詩云云引黄初平事言之葢黄上世亦出金華也按陳後山詩云黄公金華伯則山谷之出金華審矣玉井雙流雙井在今寜州西二十里黄山谷所居之南溪有二井土人汲以造茶為草茶之第一山谷有送雙井茶與東坡詩為公喚起黄州夢獨載扁舟汎五湖東坡答云江夏無雙種竒茗汝隂六一誇新書又山谷答黄冕仲索煎雙井詩家山鷹爪是小草皆指此也煎瀘川之茶㤀酸寒之異味山谷煎茶賦余嘗為嗣直瀹茶因録其滌煩破睡之功為之甲乙建溪如割雙井如處日鑄如㔢其餘苦則辛螯甘則底滯嘔酸寒胃令人失睡亦未足與議或曰無甚髙論敢問其次涪翁曰味江之羅山嚴道之蒙頂黔陽之都濡髙株瀘川之納溪梅嶺夷陵之壓甎臨邛之火井不得已而去於三則六者亦可以酌兎褐之甌瀹魚眼之鼎者也韓詩雲夫吾兄有狂氣嗜好與俗殊鹹酸賦僰道之笋尚冠冕於兩川山谷苦笋賦僰道苦笋冠冕兩川甘脆愜當小苦而反成味温潤縝宻多啖而不疾人葢苦而有味如忠諫之可活國多而不害如舉士之皆得賢是其鍾江山之秀氣故能深雨露而避風煙食肴以之開道酒客為之流涎彼桂斑之夢永又安得與之同年獨憐胸次書傳之香山谷詩捜攪十年燈火讀令我胸中書傳香荘子喜怒哀樂不入於胸次山谷詩胸次不使塵俗生又胸次九流清似鏡方從此中文字之樂山谷詩邑中亦有文字樂惜不同君澗谷槃鴈鶩鉗左而摘右端使然哉鳳凰自下而升髙恐不免耳某凄其一别瞠若百罹俱見前立館下招諸生歎虀鹽之無味進學解國子先生晨入太學招諸生立館下送窮文太學四年朝虀暮鹽互見前坐堂上稱太守驚杞菊之已莎東坡後杞菊賦吁嗟先生誰使汝坐堂上稱太守前賔客之造請後掾屬之趨走朝衙達午夕坐過酉曾杯酒之不設攪草木以誑口莎或作桫禮記注挼莎也謂摩莎出其香汁也方欲求拔薤之規乃聞對哦松之壁見前桃李春風一杯酒尚佇来歸山谷寄黄機復詩桃李春風一杯酒江湖夜雨十年燈風霆劇談九河翻願安承教山谷詩落筆塵沙百萬奔劇談風霆九河翻回江原郭縣丞允升江原即漢蜀郡江原縣地在今崇慶州東南三十里唐初置唐隆縣屬蜀州宋改江原縣屬崇慶府今縣廢府降為州屬成都府屣履迎門未遑執贄王符傳皇甫規解官歸安定白符在門衣不及帶屣履出迎屣或作躧履不躡跟直不疑傳躧履而迎注謂納履未正曳之而行文書銜袖猥沐贈言韓文文書銜袖仰佩鳴謙之光易鳴謙貞吉王弼注鳴者聲名聞之謂也又謙尊而光俯深盱豫之悔易盱豫悔遲有悔象曰盱豫有悔位不當也正義云盱謂睢盱睢盱者喜悦之貌恭惟某官見聞殫洽西都賦元元本本殫見洽聞意氣醇明發而中節謂之和見於眉睫睫本作䀹説文目旁毛也列子察其眉睫之間而得其情魏書崔亮字敬儒年十嵗家貧傭書自業時隴西李冲當朝任事亮從兄光往依之謂亮曰彼家饒書因可得學亮曰自可觀書於市安能看人眉睫乎粲然有文以相接示乃肺肝董仲舒傳粲然有文以相接驩然有恩以相愛所慙先施之未能更覺徽言之難受尚書子旦已受人之徽言某欲還鯨錦杜詩錦鯨巻還客始覺心和平懼損繭緘韓詩書饒罄魚繭又繭淨雪難如雖則七襄終乏襜褕之報藏之十襲永為篋笥之珍俱見前回新津孫縣丞庭傑新津在今崇慶州東南十里本漢武陽縣地屬犍為郡後周始置新津縣徙犍為郡治于此隋初郡廢以縣屬益州唐屬蜀州宋屬崇慶府今府改為州縣仍屬焉𨽻成都府吟哦公事藍田丞端使然哉見前觀采風謡益州分故知之耳後漢書方伎傳李郃善河圖風星縣召署幕門候吏和帝分遣使者㣲服單行觀采風謡使者二人到益部投郃候舍時夏夕露坐郃因仰觀問曰二君發京師知朝廷遣二使耶二人驚問何以知之郃指星示曰有二使星向益州分野故知之耳互見前有勤迂顧更費屬辭恭惟某官齊武子之家史記孫子武者齊人也以兵法見於呉王闔閭卒以為将西破彊楚入郢北威齊晉顯名諸侯孫子與有力焉楚叔敖之胄史記孫叔敖者楚之䖏士也虞邱相進之於楚荘王以自代也三月為楚相施教導民上下和合世俗盛美政緩禁止三得相而不喜知其材自得之也三去相而不悔知非已之罪也枕流潄石尚有典刑孫楚傳楚少時欲隠居謂王濟曰當欲枕石潄流誤云潄石枕流濟曰流非可枕石非可潄楚曰所以枕流欲洗其耳所以潄石欲厲其齒擲地作金粲然文采孫綽傳嘗作天台賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲也榮期曰恐此金石非中宫啇然每至佳句輒云應是我輩語淹回貳令之壁鏗鏘十室之絃有憐并州之迎已孤竹馬見前安得祁山之出能辦木牛蜀志建興六年丞相復出祁山以木牛運糧盡退軍與魏將張郃交戰射殺郃十二年春悉大衆由斜谷出以流馬運或錫之鞶易或錫之磐帶終朝三禠之説文鞶大帶也注以訟受服榮何可保願還此笏新唐書禇遂良傳帝将立武昭儀召遂良入遂良極諫因致笏殿階曰還陛下此笏丏歸田里十鍾一石自昔固病於西南漢食貨志時又通西南夷道作者數萬人千里負擔餽饟率十餘鍾致一石師古曰言其勞費用功重三令五申須君更教其左右孫子傳令之曰汝知而心與左右手背乎前則視心左視左手右視右手後即視背乃設斧鉞即三令五申於是鼓之右婦人大笑復三令五申而鼓之左婦人復大笑若為委翰頗似過情某已控需章匄還節傳需節卦名承夙駕之命弗敢與聞詩星言夙駕左傳使臣弗敢與聞補晚賦之章願安承教晚或作輓東坡逺景樓記酒酣樂作援筆而賦之以頌黎侯之遺愛未晚也詳見前四六標準巻三十四, SBCK: ''}
