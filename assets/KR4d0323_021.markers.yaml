  - {type: variant, offset: 24271, length: 2248, content: 王荆公詩草草杯盤供笑語皆昏燈火話平生恭惟某官望實夙孚人門具美唐鄭仁表為起居郎文章俊㧞自謂門第人物文章俱美嘗曰天瑞有五色雲人瑞有鄭仁表東坡詩清朝固多士人門子皆冠詳別見氣深且厚會三光五岳之全劉夢得栁文序夫政痝而土裂三光五嶽之氣分大音不完故必混一而後大振才碩以疏了四海九州之大自徧儀於省寺尋屢課於節麾值北風之方驚往籌玉壘嗟白日之可鑒忍附冰山天寶遺事或勸陜郡進士張彖謁楊國忠曰見之富貴可立圖彖曰君輩倚楊右相為泰山吾以為冰山若皎日既出君輩得無失所恃乎沈作賔傳韓侂胄方用事族有居越者私釀公行作賔逮捕寘于獄而竄其奴天必諒其肺肝帝用居之㗋舌見前比解欒欒之韠詩棘人欒欒兮又庶見素韠兮詳見前載揚孑孑之旟旟羊諸切詩孑子干旟在浚之都素絲組之良馬五之注孑孑干旟之貌鳥隼曰旟周禮州里建旟謂州長之屬州長中大夫天子之州長也賦政未㡬已被五袴之燠詩賦政于外四方爰發䇿勲如許爰加六纛之榮纛音導唐百官志節度使掌總軍旅顓誅殺初授具帑抹兵仗諸兵部辭見觀察使亦如之辭日賜雙旌雙節行則建節樹六纛中官祖送瞻西序之嚴凝覺南州之雄重自文昌臺而為帥長已符益部之前規由節度府以拜僕臣好追陳許之舊事某悵故矦之老矣除新尹以慨然早共參謀之遊兩皆清齒韓詩憶昔初及第各以年少稱君頥始生鬚我齒清如冰後見諫議之面獨在素書盧仝謝孟諫議寄茶詩開緘宛見諫議面手閲月團三百片為留襟帶之區滕王閣序襟三江而帶五湖以續槖簪之舊某丘某水儻遂莵裘之歸左傳使營莵裘吾将老焉莵裘魯邑今山東泗水縣有莵裘聚我笱我梁尚託緹袍之誼笱苟同説文曲竹捕魚笱也詩注以竹為之魚入其中詩毋逝我梁毋發我笱注逝之也梁魚梁笱所以捕魚也梁者為堰以障水空中央承之以笱餘見前代囘洪廣帥伋升班東觀宅牧南交竝見前四牡載馳和氣交騰於大庾方輿勝覽大庾嶺在大庾縣西南二十里吴縣南野縣有大庾山自嶺嶠九磴至嶺下七里平行十里至平亭劉嗣之南康記平亭謂之横亭圖經云嶺初險捔唐張九齡開鑿新路乃㫁崖成峽兩壁聳立仰視霄漢中塗夷坦又名梅嶺五羊夾道懽聲迺見於細侯寰宇記昔髙固為楚相有五仙人騎五色羊各持榖穂一莖六出以遺州人騰空而去今呼為五羊其城周十里初尉陀築之後為步隲修之既而為黄巢所焚郭功父廣州五仙謡番禺五仙人騎羊各五色手持六秬穂翺翔遶城壁翻然去乗雲諸羊化為石至今留空祠異像猶可識曽聞經猛火毫髪無㾗迹五仙寧復來三説頗難測只憂風雨至半夜隨霹靂君不見羌廬列越之洞天萬象森羅無一尺恭惟某官器諝端方風猷凝逺力欲磨礲乎事業枚乗傳磨礱底厲不見其盡有時而損注礱亦磨也擊辭舉而措之天下之民謂之事業韓文遂得究窮于經傳史記百家之説沈潛乎訓義反覆乎句讀礱磨乎事業而奮發乎文章肯甘塵土之功名天上九虎闗獨掉頭而不顧宋玉招魂魂兮來歸君無上天些虎豹九闗喙害下人些杜詩巢父掉頭不肯住人生五馬貴四出守以無嫌見前果從乗軺竟遂分閫旂幢葢海官亷知蚌蛤之囘昌黎送鄭尚書赴南海詩番禺盛軍府欲説暫停盃葢海旂幢出連天觀閣開衙時龍戸集上日馬人來風静爰居去官亷蚌蛤迴貨通師子國樂奏武王臺事事皆殊異無嫌屈大材茸纛饗軍食足驗羽鱗之飫栁文嶺南節度使饗軍堂記公命饗於新堂牙幢茸纛金節析羽旂旗旟旞咸飾于下羽鱗薶互之物沈泛醍盎之齊均沃于卒士自古常重於他鎮韓文嶺之南其州七十然獨嶺南節度為大府若嶺南帥得其人則一邊盡治故選帥常重於他鎮惟公克對於前人使扶胥黄木之灣民無遺便昌黎南海神廟碑在今廣州治之東南海道八十里扶胥之口黄木之灣又韋丹墓誌居三年於江西八州無遺便則甘泉紫荷之槖王曰遄歸詩徐方不囘王曰遄歸某濫長十連實隣五筦見前亟問亟餽良勤吾味之同既足既濡尚幸君波之及詩既沾既足生我百穀韓文嶺海之陬既足既濡左傳其波及晉國君之餘也代囘成都黄安撫疇若長沙地濕漸謀下澤之乗賈誼傳長沙卑濕誼自傷悼以為壽不得長馬援傳乗下澤車騎欵段馬注周禮車人為車行澤者欲短轂行山者欲長轂短轂則利長轂則安也蜀道天髙猶竊上流之潤欲修辭而遲緩愧垂問之諄勤恭惟某官忠結兩宫名髙九牧文選九牧之人所共稱歎厭承明勞侍從暫違豹尾之班望太白横岷峨還作鼇頭之望三年而化兩社方虛竝見前貞元朝士之無多今召君矣元㣲之詩屈指貞元舊朝士㡬人同見太和春汲黯傳上曰君薄淮陽耶吾今召君矣潁川太守之第一世有人哉見前某息影投林莊子處隂以休影處静以息迹袁閎傳散髪絶世投迹深林起家分閫秋毫皆出於帝力未有報酬張耳傳先王亡國賴皇帝得復國德流子孫秋毫皆帝力也夏畦不習於謟肩誰其全度趙充國傳宜全度之師古曰全安而免度之不令喪敗也詳見前欲動鱸魚之興莫瞻龜鶴之還竝見前囘諸郡賀權安撫攬轡登車乆慙一節見前代庖越爼暫攝五符張釋之傳安知尺籍五符注軍士五五相保之符信也迫便㫖以强顔申牢辭而俟命有勤嘉勞更重愧情伏惟某官亷平帥先宣帝紀吏不亷平則治道衰中和宣布平生無襦今五袴民則幸哉竝見前屢薦入朝乃一麾公為淹矣文選屢薦不入官一麾乃出守有憐諭蜀老之檄安用假齊王之封和𠂻巳藉於同寅竝見前遺使若為而旁午霍光傳使者旁午詳見前三夏元侯之享固使臣不敢與聞左傳穆叔如晉公奏肆夏之三不拜曰三夏天子所以享元侯也使臣不敢與聞五物衆庶之詢以夫家辨其可任周禮鄉大夫之職各掌其鄉之政教禁令以嵗時登其夫家之衆寡辨其可任者以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞此謂使民興賢出使長之使民興能入使治之豈謂京兆之五日見前亦蒙郇國之朶雲韋陟傳常以五采牋為書記使侍妾主之具裁答授意而已皆有楷法陟唯署名自謂所書陟字若五朶雲時人慕之號郇公五雲體某正爾循牆左傳三命而俯循牆而走期於弛擔左傳齊侯使敬仲為卿辭曰羇旅之臣若獲宥弛于負擔君之恵也又息肩弛擔於濟代之間籍吏民封府庫以待將軍見前顧草木望林巒請囘俗駕北山移文望林巒而有失顧草木而若喪又請迴俗士駕為君謝逋客, SBCK: ''}
