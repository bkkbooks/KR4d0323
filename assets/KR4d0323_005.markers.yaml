  - {type: variant, offset: 0, length: 25606, content: 欽定四庫全書四六標準巻五宋李劉撰謝到任代鄒給事到帥任謝任參政鄒給事當是鄒應龍時除潭帥詳啓意可見詳本巻後條任參政當是希夷詳第一巻上任中書條輿轎隃嶺方營三徑之謀嚴助傳輿轎而踰嶺拕舟而入水服䖍曰轎音橋謂隘道輿車也臣瓉曰今竹輿車也徑音勁説文歩道也徐曰道不容車故曰歩道小道也三輔決錄蔣詡竹下開三徑惟故人求仲羊仲從之㳺陶潛傳聊欲絃歌以為三徑之資可乎鼓枻浮湘又玷十連之寄屈原漁父篇漁父莞爾而笑鼔枻而去枻以制切楫也一曰柁也或作栧梁劉峻詩鼓枻浮大川在相國知之至矣韓文四海九州之人自百官已下欲以其業徹相國左右者多矣皆憚而莫之敢獨愈辱先索相國知之至矣殆鄉人善者好之任希夷傳其先睂州人其祖賢臣仕閩因家邵武鄒應龍邵武府泰寧縣人故云昉涖事之云初公羊傳昉於此乎何休注適也齊人語豈修詞其敢後恭惟某官人今而心古氣勁而貌和學問淵源得尊主庇民之道舊唐書太宗紀贊以房杜之智不踰乎丘軻遂能尊主庇民者遭時也李晟傳功與時並才與世生茍藴其才遇其時尊主庇人何代蔑有東坡詩尊主庇民君有道樂天知命我無憂緒餘土苴為開物成務之才莊子道之真以治身其緒餘以為國家其土苴以治天下繫辭夫易何為者也夫易開物成務冐天下之道如斯而已者也疏開通天下之志成就天下之務自翊輔於天樞鬼谷子人君亦有天樞生飬成藏亦復不别干而逆之逆之雖盛必衰迄規恢於土宇揚䧺諫書規恢萬載之業詩爾土宇昄章亦孔之厚矣晉參大政益播壯猷天將降任是人庸釋髙文之宿憤班固封燕然山銘序上以攄高文之宿憤光祖宗之𤣥靈予惟克邁乃訓共觀周召之同心尚書爾交脩予㒺予棄予惟克邁乃訓某分閫㒺功杜詩分閫救世用賢豪歸田已幸張衡有歸田賦敢意躋班於延閣延長也藝文志孝武建藏書之䇿置寫書之官如淳曰劉歆七略曰外則有太常太史博士之職内則有延閣廣内秘室之府淮南子延閣棧道蜀都賦結陽城之延閣更令承惠於价藩賈誼傳恭承嘉惠兮詩价人惟藩惟是清淑扶輿之區藝苑雌黄云後漢陳球傳太尉李咸時病乃扶輿而起韓退之送廖道士序云衡山之神既靈而郴之為州又當中州清淑之氣蜿蟺扶輿磅礴而鬱積王襃九懐云登羊角兮扶輿王介甫詩扶輿渡陽羨窕窈一川花按趙穆别傳汲郡修武趙君薦宰相不就太守羊伊遂扶輿激喻以灮歲貢尚多愁恨歎息之俗䑕窮已甚俱見前蚊負奚堪莊子其於治天下也猶渉海鑿河而使蚊負山也必先逹之士為之前焉既感裏言之賜韓文士之能享大名顯當世者莫不有先逹之士負天下之望者為之前焉左傳寡人出伯父無裏言裏言納我之言有刺史之榮無其難者尚祈終惠之私韓文丈夫官至刺史亦榮矣雖然民之豐約懸於州縣令不以言連帥不以信民就窮而歛愈急吾見刺史之難為也崔君為復州其連帥則于公崔君之仁足以蘓復人于公之賢足以庸崔君有刺史之榮而無其難為者將在於此乎代鄒給事到帥任謝鄭參政籲天還印甫辭五嶺之炎尚書保抱擕持厥婦子以哀籲天籲音喻呼也杜詩五嶺皆炎熱宜人獨桂林易地剖符遽得三湘之勝杜詩得歸茅屋赴成都眞為文翁再剖符李詩嘯起白雲飛七澤歌吟綠水動三湘三湘謂湘潭湘鄉湘陰小學紺珠經三湘謂江湘沅也將母固諧於安便詩王事靡盬不遑將母注將飬也拊躬但愧於叨逾冒再僂而弗俞左傳一命而僂再命而傴三命而俯知一陶之有自崔駟傳坏冶一陶恭惟某官才𢎞而毅器博以周鬷假無言贊一日萬幾之運詩鬷假無言時靡有爭傳云鬷總假大也總大無言無爭也箋云總升堂而齊一皆服其職勸其事寂然無言語者禮記注言奏大樂于清廟之中人皆肅敬金聲玉色無有言者尚書一日二日萬幾柔嘉維則聳六服羣辟之瞻詩仲山甫之德柔嘉維則令儀令色小心翼翼疏云言此仲山甫之德如何乎柔和而美善唯可以為法則尚書六服羣辟㒺不承德人固料代何之用參曹參傳蕭何薨參聞之告舍人趣治行吾且入相居無何使者果召參上亦知安劉之必勃高帝紀周勃厚重少文然安劉氏者必勃也两地碧雲之暫駐既厚仔肩江淹雜體詩日暮碧雲合美人殊未來詩佛時仔肩示我顯德行傳佛大也仔肩克也箋佛輔也輔弼是任示道以顯明之德正義曰鄭讀佛為輔弼之弼肩勝也即堪任之義九天黃道之安行亟膺顓靣唐詩九天日月開黄道月令正義日有九道河圖帝覽嬉云黄道一青赤白黒道各二春從靑道夏赤秋白冬黒李尋傳天官上相上將皆顓面正朝孟康曰朝太微宮垣也西垣為上將東垣為上相各專一面而正天之朝事也某守藩弗績席䕃終更谷永與段㑹宗書終更亟還所願歸田徑返林烏之哺成公綏烏賦序夫烏為瑞乆矣以其返哺識養故為吉鳥春秋運斗樞飛翔羽翮為陽陽氣仁故烏返哺也譙子法訓夫孝行之本朁本而求末者未有得之者也如或得之君子不貴矣烏者而有返哺之心况人而無孝心者乎張協七命囿絶反哺之烏束晳文嗷嗷林烏受哺于子杜詩林烏返哺聲山谷詩看盡林烏反哺兒敢期易鎭竟為檣燕之畱杜詩檣燕語留人惟一重一掩號淳古之江山杜工部集岳麓山道林二寺行一重一掩吾肺腑山鳥山花吾友于注一重一掩山也有如吾肺腑然又潭府邑中甚淳古太守庭内不喧呼而九辨九歌餘芬香之草木離騷啓九辨與九歌兮夏康娯以自縱屈原有九歌六首以事神之言寓忠君之意原弟子宋玉惜其師忠信見放作九辨五首以辨之皆代原之意豈小材之能任由大造之曲成謂國小不足囘旋此豈為我輩而設漢書注應劭曰景帝後二年諸王來朝有詔更前稱壽歌舞長沙定王但張袖小舉手左右笑其拙上怪問之對曰臣國小地狭不足囘旋阮籍傳藉嫂嘗歸寧籍相見與别或譏之籍曰禮豈為我設耶使政平而無愁歎庻不為門下之羞見前榮州到任謝丞相榮州即今嘉定州榮縣本漢南安縣地齊立南安郡隋置太牢縣屬資州唐析太牢置旭川縣以縣置榮州宋以光宗潜藩陞紹熈府佐黔巫之東鄙甘半刺之翺翔河東武岡銘序元和七年四月黔巫東鄙蠻獠雜擾杜詩半刺已翺翔守巴僰之南榮累一陶之坏冶榮州有榮梨榮隱榮德三山故名楚辭與吾期兮南榮崔駰傳坏冶一陶羣生待理幕府十年之未久杜詩十年出幕府自可持旌麾角巾兩火之可逃羊祜與弟書云既定邊事當角巾東洛歸故里薛革除左散騎常侍年至而無疾請告角巾東洛時甚重之李詩角巾東出商山道道經云兩火一刀可以逃言剡中多名山可以避災也剡字從兩火榮字亦兩火故云諸集拾遺李畋為國子直講求郡晨登講席諸生見畋巾上兩焰火起是日得榮州間關半朞王莽傳馳入宫間關至漸臺荀彧傳荀君乃越河冀間關以從曹氏注猶言崎嶇展轉也辛苦萬狀杜詩寂寞甘辛苦孟郊詩感激増萬狀甫兹領事率爾裁牋伏念某才不瘉人瘉通作愈勝也前藝文志不猶瘉於野乎學徒泥古招諸生於館下幾毁於隨昌黎進學解國子先生晨入太學招諸生立館下誨之曰業精於勤荒於嬉行成於思毀於隨處别駕之治中無材可展蜀志龎統傳統守來陽令不治免官吳將魯肅遺先主書曰士元非百里才也使處治中别駕之任始當展其驥足耳姑俟及瓜之代見前式遄行李之歸詩式遄其歸注式用遄速也言周人欲仲山甫之速歸敢圖分銅獸之符文帝紀初與郡守為銅虎符竹使符栁文皇帝下銅獸符猥使展石龜之郡宋葉廷珪海錄碎事榮州榮梨山有石洞洞中有石狀如龜形案十道圖云此州乃古石龜州也惟義和之僻壤榮州唐天寳初改義和郡乾元初又為榮州宋因之實光廟之濳藩朝野雜記天子即位嘗所領州鎮自防禦而下皆陞軍名若節鎮州則建為府宋史光宗紀紹興十七年生于籓邸二十年授右監門衛率府副率轉榮州刺史進封榮王升軍開府獨未霑恩榮州以光宗潜藩陞為紹熈府視邦選矦率多就近韓文視邦選矦以公來尸葢民田嵗租止五千石而公使年計僅六百緡財匪鬼輸全仰作鹹之潤尚書潤下作鹹郡資井養詎堪竭澤之漁易㢲乎水而上水井井養而不窮也史記竭澤涸漁則蛟龍不合隂陽呂氏春秋竭澤而漁豈不得魚而明年無魚焚林而田豈不得獸而明年無獸比縁花破於皁胥周禮注胥讀如諝謂其有才知為什長左傳士臣皁賤人直馬者今遂草薙而赤立薙音㬱除草也禮記季夏燒薙注先薙其草燒之韓文乃草薙而禽獮之又公私掃地赤立欲俾尋常之外頓增十萬之輸數罟入池寧保四郊之無擾强弩射市但嗟薄命之先穿後漢書李業傳賢者不避害譬猶彀弩射市薄命者先死上下交征公私可痛食貨志漢之為漢幾四十年矣公私之積猶可哀痛失時不雨民且狼顧弗獲於上不可治矣欲加之罪其無辭乎左傳晉矦將殺里克使謂之曰子弑二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎恭惟某官師保萬民尚書昔周公師保萬民民懐其德弼亮四世尚書弼亮四世正色率下天欲吾君繼壽皇之聖宋史淳熈十六年孝宗内禪光宗上孝宗尊號曰至尊壽皇聖帝帝賚我公紹忠定之勳尚書夢帝賚予良弼史浩傳賜諡文惠改諡忠定禹以功臯以謨遹全絶德法言君子絶德小人絶力或問絶德曰舜以孝禹以功臯陶以謨非絶德耶絳之果霍之勇抑又餘收法言或問近世社稷之臣曰若張子房之智陳平之無悞絳矦勃之果霍将軍之勇終之以禮樂則可謂社稷之臣矣不惟垂紳正笏而措泰山之安歐陽公晝錦堂記垂紳正笏不動聲色而措天下於泰山之安且復守志厲操而抗浮雲之節劉愷傳躬浮雲之志兼浩然之氣勤勞二紀無寸晷之敢休晉潘尼詩寸晷難可踰懇避三公至累年而不受史彌逺傳寧宗崩擁立理宗拜太師依前右丞相兼樞宻使進封魏國公六辭不拜戒謹恐懼之如此熾昌耆艾以固然詩俾爾熾而昌俾爾壽而臧又俾爾壽而大俾爾耆而艾正義曰使汝得福則昌而且大使汝年壽則耆而又艾周公仰而思之不迷勤敎尚書旁作穆穆迓衡不迷文武勤教伊尹聖之任也尤務旁招肆令愚儒張湯傳此愚儒無知來效凋郡韓文豈無凋郡庸以自效尚念某進退維谷詩人亦有言進退維谷傳谷窮也正義曰谷是山谷墜谷是窮困之義故云谷窮兢戰履冰詩戰戰兢兢如臨湥淵如履薄冰思庻民所以安恐有負十行之賜循吏傳庶民所以安其田里後漢書循吏傳皆一扎十行細書成文得一事可自罷庶幾免百謫之盈韓文愈無適時才用漸不喜為吏得一事為名可自罷去不啻如棄涕唾游俠傳陳遵為京兆史曹事數廢西曹以故事適之侍曹輙詣寺舍白遵曰陳卿今日以某事適遵曰滿百乃相聞輙修謝上之緘韓文有潮州袁州謝上表併控由中之悃太守到任謝丞相權武岡地理沿革表武岡夲漢零陵郡都梁縣晉武帝分都梁置武岡縣宋省武岡入都梁隋省都梁入長沙郡邵陽縣後復置武攸縣唐武德改武攸曰武岡宋置武岡軍竊以邊郡負丞愧何功於渉筆韓文丞渉筆占位署惟謹又予不負丞而丞負予中朝改牧命以次而設麾漢書注中朝内朝也大司馬左右前後將軍侍中常侍散騎諸史為中朝丞相以下為外朝雖時暫以從權亦日虞於非據繫辭非所據而據焉身必危桓豁傳階藉門寵遂叨非據重感大造陶鎔之賜敢廢小吏竿牘之恭俱見前伏念某全抱迃疎倍勤抆拭朱博傳抆拭用禁注抆拭摩也廣文轗軻既保全茅屋之歸杜詩德尊一世常轗軻名垂萬古知何用先生早賦歸去来石田茅屋荒蒼苔又得歸茅屋赴成都半刺翺翔又減縮葵邱之代無蟹易嫌於監郡不龜敢望於封矦方圖下攷之書恪布中涓之謝俱見前日君乏使故矦攬轡以疾驅左傳日臣之使於楚也又寡君乏使又日君乏使使臣斯司馬東坡詩故矦𤓰在有頽垣范滂傳登車攬轡韓文無疾其驅天子有詔夜枕不安新尹懷章而未上婁敬傳安枕而臥杜詩酒酣誇新尹朱買臣傳買臣衣故衣懐其印綬守邸怪之前引其綬視其印㑹稽太守章也勤廟堂之軫念楚辭鬱結紆軫兮謝荘月賦情紆軫其何託韓文軫其饑寒慮獄市之擾姦曹參傳夫獄市者所以幷容也今君擾之姦人安所容乎孟康曰獄市兼受善惡若窮極姦人姦人無所容竄久且為亂姑令副貳之車職源王之倅車注倅乃副車今以通判為倅者周禮謂太守之副且護方寸之印淮南王傳以方寸之印丈二之組塡撫方外鶉兮胡瞻於不獵詩不狩不獵胡瞻爾庭有懸鶉兮馬也詎可以守閭韓文鼎也不可以柱車馬也不可使守閭正使五日京兆之間張敞傳今五日京兆耳安能復案事亦有千里宅生之寄宋翰苑新書云後漢書劉愷曰二千石宅生千里之師尤宜尊重典禮以身先之今按劉愷傳無宅生二字科瑣邊吏非蒙眞漢相之知丙吉傳召東曹案邊長吏瑣科條其人注瑣録也欲科條其人老少及所經歴知其夲以文武進也王商傳此眞漢相矣詳見前申畵郊圻安得假齊王之命尚書申畫郊圻慎固封守淮隂矦傳齊夸詐多變不為假王以塡之其埶不定臣請自立為假王兹葢伏遇某官得聖之任為帝者師張良傳以三寸舌為帝者師萬億年敬天之休豈止書郭中令之考尚書公其以予萬億年敬天之休餘見前五百歲名世者出葢欲傳孟軻氏之宗更新紹定之初元紹定宋理宗年號遴選神爵之良吏神爵漢宣帝年號循吏傳孝宣繇仄陋登至尊厲精為治拜刺史守相輙親見問觀其所繇二千石有治效輙以璽書勉厲増秩賜金故漢世良吏於是為盛謂友邦必立之亞旅正欲充虛尚書嗟我友邦冢君司徒司馬司空亞旅幸督郵未逐於聾丞不妨借聽黄覇傳長史許丞老病聾督郵白彼逐之韓文借聽於聾雖小人乘器終於必奪繫辭負也者小人之事也乗也者君子之器也小人而乗君子之器盗思奪之矣然大鈞播物允矣無垠詩允矣君子餘見前某敢不三思而行一日必葺左傳叔孫所舍雖一日必葺其牆屋去之日如始至雖慙尸祝越尊俎而代庖人之勞荘子庖人雖不治庖尸祝不越尊俎而代之矣當籍吏民封府庫以待將軍之至髙帝紀籍吏民封府庫待將軍師古曰籍謂為簿籍太守謝史丞相眉州到任眉州為漢武陽南安二縣地屬犍為郡蜀漢及晉宋皆因之齊分置齊通郡梁立青州西魏改眉州伏以乘榮隱之障方幸終更張湯傳迺遣山乗障師古曰乗登也登而守之鄣謂塞上要險之處别築為城因置吏士而為障蔽以捍冦也榮隱山在榮州北三十里相傳古有榮隱先生脩道於此分通義之符濫叨詳試西魏眉州治通義縣唐天寳初改通義郡蕭望之傳帝察望之經明持重材任宰相欲詳試其政事復以為左馮翊適値賓賢而觀國易觀六四觀國之光利用賔於王象曰觀國之光尚賔也又令主試於坤文淮南子坤維在西南言主蜀試既徹棘圍通典武德以來禮部閱試之日皆嚴設兵衛薦棘圍之捜索衣服譏訶出入以防假濫焉五代史和凝傳凝知貢舉是時進士多浮薄喜為諠譁以動主司主司每放牓則圍之以棘閉省門絶人出入以為常凝徹棘開門而士皆肅然無譁所取皆一時之秀遂趨𤓰戍伏念某賤資蹇淺荘子敝精神乎蹇淺觸事坎艱蹇坎卦名學術荒卑弗知深造之以道技能譾薄又非適用之謂才譾音翦淺也史記能薄材譾韓文適於用之謂才堪其事之謂力出幕十年一登文石杜詩十年出幕府梅福傳願一登文石之陛奉祠三載半刺武岡輿地紀勝武岡因漢伐五溪蠻保此岡故名左右二岡相峙曾未滿秩之間倏奉專城之寵古詩陌上桑四十專城居跨犍牂之徼命與仇謀犍音乾牂音贓後漢郡國志益州有犍為郡牂牁郡韓丈命與仇謀取敗幾時犍犗牛牂牝羊也借地名對牛羊甚巧求牛羊之芻心勞政拙陽城傳撫字心勞征科政拙得以理去不自意全東坡集七年逺讁不自意全萬里生還適有天幸丙穴維舟徑欲歸耕於谷口後漢書公孫述傳注丙穴出嘉魚在漢中按丙穴在今䕫州府逹州東北廢明通縣井峡中凡十穴穴口向丙故名杜詩魚知丙穴由來美法言谷口鄭子真不屈其志而耕乎巖石之下名震于京師豈其卿豈其卿庚書傳置顧令改牧於峩眉禮記注庚之言更也律厯志斂更于庚易先庚後庚取更變之義王弼注申命令謂之庚漢制有卒更踐更過更庚書猶更書也峩眉在今嘉定州南二百里來自岷山連岡疊嶂延袤三百里至此突起三峰其二峰對峙宛若蛾眉惟是四蜀之封疆巴蜀黔漢為四蜀重在三蘇之鄉國然好文而慕權勢至今餘西漢之風漢書地理志景武間文翁為蜀守教民讀書法令未能篤信道德反以好文刺譏貴慕權勢其事守如古君臣近世異北墉之記東坡眉山逺景樓記吾州之俗有迎古者三其民尊吏而畏法事太守縣令如古君臣既去輙畫像事之今太守黎矦希聲軾先君子之友人也既滿将代不忍其去相率而畱之上不奪其請既畱三年民益信遂以無事因守居之北墉而增築之作逺景樓比縁兵潰轉覺民流厥既獻賢能之書周禮卿大夫之職三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫羣吏獻賢能之書於王甫及理愁恨之歎伋去誰守猶幸滴博之雲收杜詩已收滴博雲中戍注滴博西山城名雲中言其髙也高適上疏所謂在窮山之巔公西山詩轉粟上青天是也超願乞歸孰念玉關之人老班超傳臣不敢望到酒泉郡但願生入玉門關墨客揮犀云蔡持正久在邊任晚年以龍圖閣直學士再守平涼作喜遷鶯一闋以自廣云霜天清曉望紫塞古木寒雲衰草溪馬嘶風邊鴻翻月隴上鐵衣寒早欲歌倚曲悲壯盡道天恩須報塞垣樂盡路鞬錦領山西年少談笑刁斗靜烽火一把長報平安耗聖主憂邊威懐遐方驕虜且寛天討歲華向晚愁思誰念玉關人老太平也且歡娯須把金尊頻倒此曲成大傳都下束軒筆録蔡挺自寳元以後歴邊任至熈寧初猶帥平凉㑹邊無事因作樂歌以敎邊人有誰念玉關人老之句自此盛傳至都下未幾召為樞密副使兹蓋伏遇某官箕裘輔弼徴角君臣精神峻喬嶽之瞻朱异傳器宇𢎞深神表峯峻談笑囘狂瀾之倒韓文障百川而東之廻狂瀾于既倒大鈞播物實細别於九流見前直柄當權亦曲成於萬物侯喜石鼎聫句直柄未當權塞口且呑聲繫辭範圍天地之化而不過曲成萬物而不遺有念一寒之蹇剝定命錄魏元忠有善相者謂曰公當位極人臣然命多蹇剝已成十暑之暌離蹇剝暌離四卦名更以一麾見前試之再鼓韓詩有琴具徽絃再鼔聴愈淡某敢不謹固封守尚書慎固封守宣布中和王襃傳使襃作中和樂職宣布詩師古曰中和者言政治和平也樂職者言百官各得其職也宣布者風化暜洽無所不被王楙野客叢書云今率以中和樂職詩為太守事詳王襃何武傳乃監司頌朝廷德化非太守事也中和樂職宣布乃三詩萹名注謂中和者政教隆平樂職者百官樂職宣布者德化周洽豈郡守所安哉前江陵後𢎞農詎能及劉昆之政後漢書儒林傳劉昆字桓公徴為光祿勲光武詔問昆曰前在江陵反風滅火後守𢎞農虎北渡河行何德政而致是事昆對曰偶然耳治南陽如上蔡仰在申召父之規前漢書循吏傳召信臣字翁卿遷上蔡長其治視民如子遷南陽太守其治如上蔡吏民親愛信臣號之日召父感悚惟深敷陳㒺旣榮州到任謝桂制置假守三榮叨塵統部三榮謂榮棃榮隱榮德牽江萬里既見吏民杜詩百丈牽江色又呉檣楚艦牽百文又百丈内江船昌黎潮州謝上表到州上訖與官吏百姓等相見東坡潁州謝到任表已見吏民惟知感怍比甞奏記以徹名朱博傳文學儒吏時有奏記復敢修辭而謝上見前惟和義之斗絶寳融傳河西斗絶在羗胡中注斗峻絶也蜀志蜀土斗絶一隅栁詩西垂下斗絶實夜郎之奎隈漢地里志犍為郡屬益州應劭曰故夜郎國陸務觀入榮州境詩眇然孤城天一方傳者或云古夜郎莊子奎蹄曲隈乳間股腳自以為安室利處山谷詩奎蹄曲隈取脂澤奎傾畦切説文兩髀之間隈烏回切説文水曲隩也斗奎二宿名事簡地偏舊稱道院眉州志俗敦禮讓政清訟簡李熈績詩民俗畏公無訟事郡齋閒似野人居山谷西州道院賦云筠懐不嚚於訟故筠守號為江西道院按官閒事簡皆謂之道院宋人以江隂為兩浙道院通州為淮南道院吏貪民悍今類法塲葢一歲止五百石之經租而諸司近八十萬之折估郡資井養財匪鬼輸井鬼宿名屬因權攝之多馴至綱維之敗壯哉䑕雀公肆侵牟梁書張率字士簡呉郡吳人嗜酒事事寛恕于家務尤忘懐為新安太守遣家僮載米三千石還呉宅既至遂耗大半率問其故答曰䑕雀耗也率笑曰壮哉䑕雀竟不研問景帝紀漁奪百姓侵牟萬民注牟若蛑賊也漁若漁獵也翩彼鴟鴞交騰喧譟鴞音梟詩翩彼飛鴞集於泮林注翩飛貌鴞惡聲之鳥也鴟稱脂切爾雅茅鴟怪鴟郭璞曰茅鴟即今鳩鴟似鷹而白恠鴟即鵂鶹鴞于矯切鴟屬陸佃曰大如斑鳩綠色其鳴有禍俗云禍鳥致連帥括三井之羡今眉州彭山縣有九井為屬縣代二稅之輸上關閫制之聽聞關白也王襃傳進退得關其忠佞幸傳公卿皆因關說玉海諸司相質其制有三一曰關二曰刺三曰移下籍吏胥之專擅去其螟螣始云歛此以錫民螟音㝠螣音特詩去其螟螣及其蟊賊無害我田穉李廵云食禾心曰螟言其姦冥冥難知也食禾葉者言其假貸無厭故曰螣也食禾節者言貪狼故曰賊也食禾根者言其梲取萬民貨財故云蟊也孫炎曰皆政貪所致因以為名尚書歛時五福用敷錫厥庻民信及豚魚今則改之以僃塞易中孚豚魚吉彖曰豚魚吉信及豚魚也正義云魚者蟲之幽隱豚者獸之微賤人君内有誠信雖隱微之物信皆及矣莫非王事均是邦財黔其廬赭其垣正足為參元之喜栁河東賀進士王參元失火書黔其廬赭其垣以示其無有而足下之才能乃可以顯白而不汚其實出矣是祝融回禄之相吾子也是以終乃大喜也馬若羊金若粟初何與張奐之家張奐傳羌豪帥感奐恩德上馬二十匹先零奠長又遺金鐻八枚奐竝受之而召主簿於羌前以酒酹地曰使馬如羊不以入廐使金如粟不以入懐悉以金馬還之不才之劉甞仕於蜀亦知風寒之數處王吉傳冬則為風寒之所偃薄干寳晉紀呉使紀陟奉使如魏晉文王問呉之戍備幾何陟對曰自西陵至江都五千七百里又問曰道理甚逺難為堅固對曰疆界雖逺而險要必爭之地不過数四猶人雖有八尺之軀靡不受患其䕶風寒亦數處耳文王善之裴松之曰人有八尺之軀靡不受患防護風寒豈惟數處取譬若此未足稱能若曰譬如金城萬雉所急防者四門而已方陟此對不猶愈乎玉海逺連夷徼先江陽僰水之扞防近護風寒謹昌元巴川之控禦按此正蜀數處之風寒也曾極詩兵戈歲歲渉江干将帥誅求盍少寛未得三軍如挟纊憑誰數處護風寒何止日費於千金孫子用兵之法日費千金然後十萬之衆舉矣與其捐潤下之鹹徒滋他族尚書潤下作鹹注水鹵所生孰若助攻苦之淡以張吾軍叔孫通傳呂后與陛下攻苦食啖師古曰啖當作淡淡謂無味之食也言其攻擊勤苦之事而食無味之食也左傳我張吾三軍而被吾甲兵以武臨之韓詩亦足張吾軍然一郡四邑之間四邑謂眉山彭山丹棱青神有百孔千瘡之費韓文百孔千瘡隨亂隨失得斗勺之水斯活矣庶逃涸轍之枯見前無尺寸之膚不愛焉實恐剝膚之及易剝牀以膚切近災也王弼注牀者人之所以安剝牀未及其身也牀既剝盡以及其身恭惟某官𢎞深而肅括見前簡要而清通世説新語吏部郎闕文帝問其人於鍾㑹㑹曰裴楷清通王戎簡要皆其選也於是用裴後勁中權文武作萬邦之憲左傳前茅慮無中權後勁詩文武吉甫萬邦為憲疏王師所以得勝者以有文德武功之臣尹吉甫其才略可為萬方之法受命逐狄王委任焉故北狄逺去也外鎮内附精神折千里之衝王陵傳宰相者上佐天子理隂陽順四時下遂萬物之宜外填撫四夷諸矦内親附百姓李尋傳夲彊則精神折衝家語不出尊俎之間折衝千里之外定不奪牛於蹊田左傳抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣但欲捕蝗之害稼新唐書姚崇傳開元四年山東大蝗民祭拜不敢捕崇請遣使分道焚瘞倪若水拒不應命崇移書誚之若水懼乃縱捕得蝗十四萬石蝗害訖息有憐薄命值雷轟薦福之碑冷齋夜話范文正公守鄱陽有書生獻詩甚工文正禮之書生自言天下之寒饑者無在某右時盛行歐陽率更文字薦福碑石夲直千錢文正為打千夲使售于京紙墨已具一夕雷碎其碑故時人為之語曰有客打碑來薦福無人騎鶴上揚州東坡作窮措大詩曰一夕雷轟薦福碑王明清玉照新志云雷轟薦福碑事見楚僧慧洪冷齋夜話去嵗婁彦發機自饒州通判歸詢之云薦福雖號鄱陽巨刹元無此碑乃慧洪偽為是説然東坡已有詩云云攷慧洪此書距坡下世已逾一紀葢未甞先接則非洪之鑿空矣或辱寛征使乳復零陵之穴栁文零陵郡復乳穴記石鍾乳餌之最良者也連之人告盡焉者五載矣今刺史崔公至穴人来以乳復告邦人恱是祥也穴人笑之曰是惡知所謂祥耶嚮者吾以刺史貪戾嗜利徒吾役而不吾貨也吾是以病而紿焉今吾刺史令明而志潔先頼而後力吾是以誠告焉乞從舊額以惠疲甿甿謨盲切通作氓說文民也周禮注懵懵無知貌亦通作萌劉向傳民萌何以戒勉其敢不祗遹寛條尚書今民將在祗遹乃文考布宣隆指修慘怛忠利之實怛當割切說文憯也漢書支體傷則心憯怛銷愁恨歎息之聲見前可以言未可以言亦恃有仁人之在上韓文今有仁人在上位若不往告之而遂行是果于自棄而不以古之君子待吾相也哀之命不哀之命也更惟恕躁者之多辭韓文其哀之命也其不哀之命也知其在命而且鳴號之者亦命也繫辭躁人之辭多歸倚惟深敷宣㒺既通判到任謝薛參政宣武岡軍滿神圉之祠廪無繼粟司馬相如傳悉徵靈圉而選之兮部署衆神於遥光又鬼神接靈圉賓于閑館注靈圉衆仙號也贊夫夷之長戍偶及𤓰武岡軍夲漢零陵郡夫夷縣地武帝時為武夷矦國題輿佐岳以安能謝承書周景為豫州辟陳蕃為别駕不就景題别駕輿曰陳仲舉座不復更辟蕃起就職陳子昻集題輿佐嶽無展驥之能白帖貳職四嶽佐理六條伐輻寘河之有愧詩坎坎伐輻兮寘之河之側兮注輻檀輻也側猶涯也言君子之人不得仕進坎坎然身自伐輻置之于河之側若待明君乃仕輒裁小牘少謝大鈞見前伏念某全抱迂疎平沈庸俗徒有黽勉六七年之歎黽音閔爾雅勉也詩黽勉同心亦作僶陸機文賦在有無而僶勉通作閔谷永傳閔勉通樂嚴氏詩詁云力所不堪心所不欲而勉强為之曰黽又詩何有何亡黽勉求之又黽勉從事不敢告勞尚何扶摇三萬里之圖頃由掌故之官鼂錯傳以文學為太常掌故匡衡傳以不應令除為太常掌故儒林傳丙科四十人補文學掌故應劭曰掌故六百石吏主故事言為架閣猥分齒胄之教唐𤣥宗紀入學齒胄文選入虎闈而齒胄言為國錄大風有隧俄然電掃以雷驅詩大風有隧貪人敗類傳隧道也箋西風謂之大風正義曰大作泰西風成物物豐泰也上言王用惡人此云惡有夲性不可改變如大風所從之來自有其道唐太宗紀風除霆掃文選雷動風驅古井無波幸爾水清而石見白樂天詩無波古井水古樂府艶歌行夫壻從門來斜柯西北眄語卿且勿盻水清石自見山谷詩水清石見君所知此是吾家秘密藏又難以口舌爭水清石自見職林海邊有越王石甞隠雲霧相傳云清亷太守乃得見宋虞愿為晉安太守往觀之清徹無所隱蔽特畀治中之任漢官儀文帝時丞相于定國條州大小為設吏員治中别駕諸郡從事通典治中從事史一人居中治事主衆曹文書漢制也白帖别駕亦曰治中從事俾從方外之游世說謝奕字無奕桓温辟為司馬奕既上猶推布衣交在温座岸幘嘯詠無異常日宣武每曰我方外司馬北史王昕性閑澹寡欲雖王事鞅掌而雅操不移人謂之方外司馬維時都梁之區都梁山在武岡軍東一百三十里漢以此名縣都梁石在武岡州治東南髙十丈餘都梁水在武岡城西南㑹夫夷水經新化益陽入于洞庭乃昔槃瓠之境後漢書西南夷傳昔髙辛氏有犬戎之冦募有能得其將呉将軍頭者購黄金千鎰邑萬家妻以少女時帝有狗其毛五采名曰槃瓠遂銜人頭造闕診之乃呉將軍首也帝不得已以女配槃瓠槃瓠負女走入南山經三年生六男六女其後滋蔓號曰蠻夷今長沙武陵蠻是也歲租仰於永邵永州漢長沙國邵州即今寳慶府峒窟接於辰沅辰州漢武陵郡唐置州沅州梁沅陵郡隋屬辰州唐改沅州元和遣兵惡其置魁而立伍伍當作帥栁文武岡銘序元和七年黔巫東鄙蠻獠雜擾盜弄庫兵賊脅守帥南鉤牂牁外誘西原置魁立帥殺牲盟誓崇寧升郡猶未建牧而立參宋崇寧四年以邵州疆境廣漠析武岡綏寧二縣置武岡軍周禮太宰乃施典于邦國而建其牧立其監設其參傳其伍陳其殷置其輔葢一歲止萬石之租而四郊無百金之子漢文帝紀百金中人十家之産也然而事簡鴈鶩之左右亦稀韓文文書行吏抱成案詣丞巻其前鉗以左手右手摘紙尾鴈騖行以進況已食浮螃蠏之有無何計禮記故君子與其使食浮于人也寧使人浮于食東坡詩欲問君王乞符竹但憂無蠏有監州詳見前儻水火不交於百姓北史趙軌隋文帝時為齊州别駕有能名後詔徴入朝父老送者各揮涕曰别駕在官水大不與百姓交是以不敢杯酒相送公清如水請酌一杯水相餞軌受飲之則風月亦足以平分東坡詞獨倚胡牀庾公樓外峯千朶與誰同坐明月清風我别乗一來有唱終須和還知麽自從添箇風月平分破此葢伏遇某官弼亮天功平章人品尚書平章百姓謂柳子而在臺省未必如司馬之可傳昌黎栁子厚墓誌銘使子厚在臺省時自持其身已能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮然子厚斥不久窮不極其文學辭章必不能自力以致必傳於後如今無疑也使趙温而果丈夫又何患郡丞之能伏後漢趙温字子柔為京兆郡丞歎曰丈夫當雄飛安能雌伏遂棄官去後官至三公況黔東嘯呼之已靖武岡銘序黔巫東鄙洞窟林麓嘯呼成羣有湖南清絶之可親杜詩湖南清絶地萬古一長嗟宋陳簡齋武岡詩黛染峯巒水染藍右分湖北左湖南使自謀之何以過此于湖居士集祿優足以仁族事簡足以養痾使某自謀不過如此其敢不謹修厥職勉既乃心思曹王踔騎之功無羞宗派昌黎曹成王碑初觀察使虐使將國良往戍界良以武岡叛于是以王帥湖南以討良為事王即假為使者從一騎踔五百里抵良壁大呼我曹王來受良降良不得已錯愕迎拜盡降其軍哦杜老化鯤之句更問詞源杜詩佇鳴南嶽鳳欲化北溟鯤又浩蕩問詞源通判到任謝葛簽樞武岡軍誨館下之諸生夙蒙采菲見前補黔中之上佐兹遂及瓜職源别駕長史司馬通謂之上佐新唐書王忠嗣傳明日見責不失一金吾羽林將軍歸宿衛不者黔中上佐耳詳見前揣弱念以易盈韓詩强懐張不滿弱念缺易盈撫窮途而致感阮籍傳籍率意獨駕不由徑路車跡所窮輙慟哭而返杜詩似欲慰窮途伏念某學不聞道才無瘉人負米為親飽固悲於弗泪家語子路見於孔子曰由也事二親之時常食藜藿之食為親負米百里之外親殁之後南遊於楚從車百乘積粟萬鍾欲食藜藿為親負米不可復得也餘見前析薪無子賤亦覺其有涯左傳其父析薪其子弗克負荷莊子吾生也有涯顧平生竊祿以代耕乃三歲賣文而求活丁隱君歌前日相逢正賣文一錢不直空云云今來利作採山斧可以抛身麛鹿羣杜詩夲賣文為活翻令室倒懸焦氏筆乘云言其無假借也語不露味之愈佳揚子雲却蜀人錢十萬穆修却富人五百金二子之自負何如哉賣文為活段湛事頃申以柳易播之請昌黎栁子厚墓誌中山劉夢得當詣播州子厚泣曰播州非人所居將拜疏願以栁易播遂忘得隴望蜀之嫌岑彭傳人苦不足既平隴復望蜀愧在其䏏悵莫追於駟馬東坡詩有愧在其肝謝惠連口箴宣納之由寔伊樞機唯舌是出馳駟莫追言提其耳甘束咮於孤雄詩非靣命之言提其耳箋非但對靣語之親提撕其耳言教道之熟咮音晝説文喙也廣韻鳥口或作喙栁文牝雞咿嚘兮孤雄束咮既待牧羝蘇武傳使牧羝羝乳乃得歸師古曰羝牡羊也羝不當産乳故設此言示絶其事若燕太子丹烏頭白馬生角之比詎容展驥見前兹出回天之力文選回天倒日之力張𤣥素傳張公論事遂有囘天之力竟諧縮地之功神仙傳費長房遇壺公能縮地千里聚在目前沈佺期詩縮地黄泉出昇天白日飛鮑叔不以我為貪傷哉貧也史記管晏列傳吾始困時甞與鮑叔賈分財多自與鮑叔不以我為貪知我貧也禮記子路曰傷哉貧也生無以為養死無以為禮也伊尹恥匹夫不獲眞若推之公豈謂長史之有材新唐書張柬之傳武后謂狄仁傑曰安得一竒士用之仁傑曰荆州長史張柬之雖老宰相材也僕固感國士之遇我兹葢伏遇某官爽邦良弼尚書爽邦由哲注爽邦言明國事輔世眞儒欲立立人所學實資於孔孟匪求求我此心脗合於羲文易蒙亨匪我求童蒙童蒙求我疏闇者求明明者不咨于闇莊子為其脗合注脗然自合之道又脗合無波際貌然韓魏公自恨用明允之太遲宋史文苑傳宰相韓琦見蘇洵所著權書而善之奏于朝召試舍人院不至而歐陽子亦愧知聖俞而不薦見前雖昔何如今今何如昔南史蜀士李膺為涪令有才辯西昌矦藻為益州以為主簿使至都武帝恱之謂曰今李膺何如昔李膺對曰今勝昔昔事桓靈之主今逢堯舜之君帝嘉其對以為益州别駕願公之求士甚士求公見前庻皆有突兀大厦之驩杜詩安得廣厦千萬間大庇天下寒士俱歡顔嗚呼何時眼前突兀見此屋吾廬獨破受凍死亦足斯不但屬饜小人之腹左傳願以小人之腹為君子之心屬厭而已杜注言小人腹飽猶知厭足某敢不俯安雌伏見前仰任鳶飛文儒申申詎能繼巫磻之公綽河東武岡銘御史中丞栁公綽為時碩臣殿於大邦文儒申申有此武功又黔山之巑巫水之磻武岡矯矯尚及見江左之夷吾王導傳桓彛初過江見朝廷㣲弱憂懼不樂往見導極譚世事曰向見管夷吾無復憂矣導以討華軼功封武岡矦贊曰虎嘯焱馳龍升雲映武岡矯矯匡時緝政懿績克宣忠規靡競通判到任謝臺諌李趙留梁汪别洛下之諸生久歸來於茅屋謝安傳安能為洛下諸生詠王摩詰詩洛下諸生解詠詩杜詩先生早賦歸去來石田茅屋荒蒼苔言學錄解任補黔中之上佐偶及代於葵丘王忠嗣傳明日見責不失一金五羽林將軍歸宿衛不者黔中上佐耳左傳齊矦使連稱管至父戍葵邱詳見前既滌籀以服勤籀音宙謂印文也周宣王時太史籀作大篆故稱籀文滌籀猶云洗印新唐書百官志三日洗印視其刓缺盍濡毫而貢謝伏念某地寒寡挾天巧亦慳俱見前鹵莽而耕鹵莽而耘已慙學落莊子昔予為禾耕而鹵莽之則其實亦鹵莽而報予芸而滅裂之其實亦滅裂而報予左傳夫學殖也不學將落鼓譟以入鼓譟以出更愧名浮左傳宋公子圍龜為質於楚而歸華元享之請鼓譟以出鼓譟以復入曰習攻華氏宋公殺之禮記先王諡以尊名節以壹惠恥名之浮于行也頃從文學掌故之聫儒林傳能通一藝以上補文學掌故言為架閣躐綴國子先生之後進學解國子先生晨入太學言為國錄經笥之嘲未發邊韶傳韶字孝先以文學知名教授數百人曽晝日假臥弟子私嘲之曰邉孝先腹便便懶讀書但欲眠韶應時對曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢靜與孔子同意師而可嘲出何典記嘲者大慙謗篋之惡已盈史記甘茂傳魏文侯令樂羊將而攻中山三年而拔之樂羊返而論功文矦示之謗書一篋樂羊再拜稽首曰此非臣之功也主君之力也鄉人不善者惡之成是貝錦詩萋兮斐兮成是貝錦彼譛人者亦已太甚貝水介蟲也餘蚳貝甲黄質白文餘泉貝甲白質黄文女工集采而織錦使萋兮斐兮文章相錯以成是貝文以興讒人集已諸過而搆之以過惡相積以成此罪狀也相國之賜也大矣止於甌㬰韓文遷於南者三人獨愈為先収用相國之賜大矣荀子流丸止于甌㬰流言止于智者注甌㬰皆器也揚子方言陳魏鄭宋之間謂罃為㬰甌㬰謂地之坳坎如甌㬰者也荏苒三年荏音衽苒音染荏苒猶侵尋也又展轉也通作荏染詩荏染柔木潘岳詩荏苒冬春謝僥倖貳郡軫之旁鶉之尾不惟非螃蠏之宫春秋元命苞軫星散為楚州分為楚國南方三辰秦為鶉首周為鶉火楚為鶉尾釋典十二星宮有巨蟹焉巨蟹宮於辰為未度分井鬼晉天文志自張十七度至軫十一度為鶉尾於辰在已楚之分野屬荆州故云非螃蟹之宮山谷詩雖為天上三辰次未免人間五鼎烹正謂蟹也隂陽家以井鬼之分為巨蟹宮丹之穴犀之顚近又築鯨鯤之觀武岡銘有穴之丹有犀之顛匪曰余固公不可賂左傳古者明王伐不敬取其鯨鯤而封之以為大戮於是有京觀以懲滛慝詳别見然以非材之典午譙周甞書版示文立曰典午忽兮月酉没兮典午謂司馬也月酉八月也至八月而文王果崩賈充傳賛典午分崩韓詩長慙典午非材職得就閒官即至公固在協恭而同寅尚書同寅協恭和衷哉水火弗與百姓交無須餞别見謝薛參政條風月不用一錢買何必平分李詩清風明月不用一錢買玉山自倒非人推餘别見兹葢伏遇某官道格君心識通治體賈誼傳賛通逹國體進務閑邪而陳善退思激濁以揚清王珪傳激濁揚清嫉惡好善天豁露繁南嶽要聞於鳴鳳杜詩爽氣金天豁清談玉露繁佇鳴南嶽鳳欲化北冥鯤氷清霜潔北臺自肅於棲烏蘇味道懐臺中諸侍御詩薄游忝霜署直措戒氷心鄴都故事御史臺在宮闕西南其門北開以取冬殺之義通典御史府中列柏樹常有野烏數十棲宿其上晨去暮来號曰朝夕烏姑試治中通典治中從事史一人居中治事主衆曹文書漢制也且遊方外莊子彼游方之外者也而邱由方之内者也世說桓温辟謝奕為司馬既上猶推布衣交在温坐岸幘嘯詠無異常日宣武每曰我方外司馬某敢不修其可願尚書敬修其可願勉爾遁思詩慎爾優游勉爾遁思正義曰思而不來設言與之訣汝誠在外優游之事勉力行汝遁思之志勿使不終也極而與之自訣之辭思語辭不為義聾且何傷正欲不聞於黜陟黄霸傳許丞亷吏頗重聽何傷且善助之幸無失賢者意韓文理亂不知黜陟不聞大丈夫不遇于時者之所為也噤不得用又當且止於吟哦韓文博陵崔斯立黜官再轉而為丞兹邑既噤不得施用對樹二松日哦其間除兩浙運幹謝趙尚書汝述䑛淮南之丹久辱青㝠之送韓詩青㝠送吹嘘餘見前涸江西之轍仍為綠水之依見前非公寔與之主張荘子孰主張是此事亦幾於濩落莊子瓠落無所容注瓠音濩濩落猶廓落也既祗賤役盍控謝牋恭惟某官北海脩身後漢書北海王睦少好學博通書傳謙恭好士千里交結自名儒宿德莫不造門由是聲價益廣東平樂善東平王傳帝手詔國中傅曰日者問東平王處家何等最樂王言為善最樂其言甚大副是要腹矣禮樂三雍之對卓爾不羣漢書河間獻王德武帝時來朝獻雅樂對三雍宮賛曰夫惟大雅卓爾不羣河間獻王近之矣文章萬丈之光飄然無敵韓詩李杜文章在光燄萬丈長杜詩白也詩無敵飄然思不羣密勿星辰之履後漢書謝夷吾傳雖密勿在公而身出心隱魏志杜恕傳密勿大臣晉書王坦之傳賛或寄重文昌允釐于衮職或任蕐綸閣密勿于王言南史劉穆之傳密勿軍國心力俱盡杜詩經緯固密勿夢弼注黽勉也髙適詩深沉謀九德密勿契千齡王荆公詩優遊太平日密勿老成人杜詩聽履上星晨彌縫天地之爐左傳彌縫其闕而匡救其菑賈誼傳天地為鑪兮造化為工當江濤如此之時宋朱新仲詩天氣未佳宜且住江濤如此欲安行思烝徒楫之之計詩烝徒楫之箋烝衆也渒渒然涇水中之舟順流而行乃衆徒船人以楫擢之故也興衆臣賢者行君政令汲引不遺於片善李習之集汲引之惠如㠶得風鮑照詩一言分珪爵片善辭草萊縶維長恐其遐心詩序白駒大夫刺宣王也箋刺其不能留賢也詩皎皎白駒食我塲苖縶之維之以永今朝又毋金玉爾音而有遐心注宣王不能用賢有乗白駒而去者願此白駒食我塲中之苖我則絆之繫之以永今朝愛而欲留之也既不可留當傳書信毋得自愛音聲貴如金玉而有疎逺我之心潤物之澤無聲既優既渥杜詩好雨知時節當春乃發生隨風潜入夜潤物細無聲詩既優既渥既霑既足正義云既已優洽既已饒渥推轂之言有味不進不休荀勗傳帝甞謂曰魏武帝言荀文若之進善不進不止荀公逺之退惡不退不休斷度收羅欲細桷大杗之各得柳文然後斷度收羅捎危顛芟繁柯乗水潦之波以入于河而注焉杗音盲韓文大木為杗細木為桷此以木喻叉負偃植將震風凌雨而後知唐書劉𢎞基傳賛若榱椽梁柱以成大室叉負偃植各安所施而無遺材法言震風凌雨然後知夏屋之為帡幪也此以室喻能令此意之常存豈獨於今之受賜如某無用所向多艱未能茹商嶺之芝前漢王貢傳序漢興有東園公綺里季夏黄公甪里先生此四人者當秦之世避而入商雒深山以待天下之定皇甫謐髙士傳四皓見秦亂作歌曰漠漠髙山深谷迤邐曄曄紫芝可以療飢唐虞世逺吾將安歸賈至詩悠哉千里心欲采商山芝杜詩吾愛漢初老時清猶茹芝又千載商山芝還復索長安之米見前誰其知者公獨惻然夲欲化鯤而為鵬莊子北冥有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名為鵬鵬之背不知其幾千里也不料喝盧而成雉南史顔師伯傳孝武甞與樗蒲帝擲得雉大恱謂必勝師伯後得盧帝失色師伯遽歛手曰幾作盧唐李翺五木經元章注雉為二梟為六盧為四然感恩固在於知已則受德豈待於成身俱見前但令古路之未荒韓詩仁義路久荒柳詩銅駝御路荒敢恨吾廬之獨破杜詩吾廬獨破受凍死亦足愈幸甚三為屬吏矣相國知之韓文愈幸甚三得為屬吏朝夕不離閣下出入五年又相國知之至矣起在此勤至他人乎執事責也老泉集若夫其言之可用與其身之可貴與否者執事事也執事責也於洵何有哉餘見前代石僉判孝理到任謝丞相絃歌學道偶得代於𤓰期見前造化為工俾充員於蓮幕賈誼傳天地為鑪兮造化為工餘見前待闕之日既淺陪京之地甚䧺張衡賦於顯樂都既麗且康陪京之南居漢之陽偏親有就養之驩數口無啼饑之苦韓文冬暖而兒號寒年豐而妻啼飢孰主張是見上條遂濟登兹韓文上勤下順遂濟登兹全由大鈞鑪錘之功敢廢小夫竿牘之敬俱見前伏念某粗勤家學尚缺世科揆材僅可以麤供渉世敢萌於厚望惟宵人之乃祖乃父廣陵王傳母邇宵人注小人也尚書惟乃祖乃父世篤忠貞與先生則非故非親唐崔祐甫為相不至期年除吏八百多其親舊或者以為譏祐甫曰不然非親與舊則安得而知之辱收夾袋之姓名力加論薦名臣言行錄吕文穆公夾袋中有冊子每四方人㬱罷謁見必問其有何人才客去隨即疏之悉分門類或有一人而數人稱之者必賢也朝廷求賢取之囊中故公為相文武百官各稱職者以此凡今懷繃之簪笏實出挈提繃悲萌切説文束也廣韻束皃衣也韓詩爵勲逮僮𨽻簮笏自懐繃注繃小兒衣也以繒帛為之亦謂之襁陳餘傳左提右挈家世受知已四十年兄弟感恩非一二數兹偶償百里之債亦欲干半刺之除然而母老家貧難需久次矧是望輕資淺當避勝流適聞僉掾之虛僉掾即僉判輒致緘詞之請亟䝉中入非有裏言見前尋承繼粟繼肉之頒又沐載笑載色之遇詩載色載笑匪怒伊教由衷所請如嚮之從繫辭其受命也如嚮人或謂分寸之躋攀何其廉也韓詩躋攀分寸不可上東方朔傳割之不多又何廉也自不翅三百之距踊惟恐失之左傳距躍五百曲踊三百百莫白切勵也距躍超越也謂距地向前超躍越物而過凡三次勉勵而為之曲踊跳踊也謂向上跳而折腹下亦三次勉勵而為之百猶勵也一説百猶阡陌之陌距躍直跳也曲踊横跳也捧檄而歸倚門亦喜俱見前伏遇某官相邦哲輔經國元勳喬木有臣既世襲格天之業泰山若礪將代膺裂地之封漢功臣表封爵之誓曰使黄河如帶泰山若礪國以永存爰及苖裔應劭曰帶衣帶也厲砥厲石也河當何時如衣帶山當何時如砥石言如帶礪國尤永存以及後世之子孫也衛青傳臣青子在襁褓中未有勤勞上幸裂地封為三矦蔡邕釋誨德𢎞者建宰相而裂土惟元老克壯其猷詩方叔元老克壯其猶正義云方叔天子之大老能光大其軍謀之道以討之故人兵不戰而屈法言不戰而屈人兵堯舜也寧王遺寳復還受命之符尚書寧王遺我大寳龜傳寜王安天下之王周密癸辛雜志云嘉定十四年七月賈渉為淮東制閫日遣都統司計議官趙珙徃河北蒙古軍前議事得其大將富勒呼所獻皇帝恭膺天命之寶一座進于朝明年正月朔御大慶殿受寳大赦天下此寳眞宗初即位所製其後每朝效之易世則藏去靖康之變金人取玉寳十有四以去而此寶居其二及金人内亂寶玉多為蒙古所得識者謂此物不宜鋪張是以鄭昭先有可弔不可賀之論宋史賈渉傳初翟朝宗得玉璽獻諸朝至是趙珙還又得玉璽文與璽同而加大朝廷喜璧之歸行慶賞李全以璽賞為節度使匈奴奉珍行納稱藩之欵宣帝紀匈奴呼韓單于款五原塞願奉國珍朝匈奴傳臣服稱藩諒深綢繆牖戶之計不廢收蓄欂櫨之材見前有如龍蟠虎踞之邦呉錄劉備曾使諸葛亮至京因覩秣陵山阜乃歎曰鍾山龍盤石頭虎踞帝王之宅也豈但魚泳鳥飛之樂韓文志同而氣合魚川泳而鳥雲飛也愈樂是賓主之相得也因其粗更於民事使之往贊於藩條晉書應詹傳贊入居列位則嘉謨屢陳出撫藩條則惠政斯洽某敢不滌濯其心靖共爾位見前石生羅致於幕下已叨從欲之仁尚書俾予從欲以治餘見前越王胎養於國中終冀亢身之賜魏志王朗傳胎養必全則孕者無自傷之哀新生必復則孩者無不育之累蔣濟傳句踐胎養以待用昭王恤病以雪仇後漢書章帝紀諸懷􅗖者賜胎養穀人三斛越語將免者以告公令醫守之生丈夫二壺酒一犬生女子二壺酒一豚彌逺父浩封越王故借用越事左傳不能亢身焉能亢宗幕官到任謝丞相掃曹相之門慙非齊俊見前趨嚴公之幕已次蜀都杜詩白頭趨幕府又昔在嚴公幕仰銜坯冶之陶崔駰傳坯冶一陶退整韋弦之佩韓非子說林西門豹之性急故佩韋以緩已董安于之心緩故佩弦以自急故以餘補不足以長續短之謂明主范丹傳以性狷急不能從俗常佩韋於朝輒于涓吏肅布謝牋伏念某窳薄無堪嶔﨑可笑桓彞傳彞字茂倫少孤貧雖簞瓢處之晏如雅為周顗所重甞歎曰茂倫嶔﨑歴落固可笑人也弱於材腐於力絶知天巧之慳韓文夫傲雖凶德必有恃而敢行愈弱於材而腐於力不能奔走乗機抵巇以要權利夫何恃而傲李詩披豁露天慳東坡詩嘲詠破天慳又若人富天巧又似亦費天巧加其膏希其光又覺已功之淺韓文養其根而竢其實加其膏而希其光根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也徒緣稽古之力桓榮傳榮大㑹諸生陳其車馬印綬曰今日所蒙稽古之力也未忘及物之心然既更憂患之甞亦漸失賤貧之恥漢庭諸老誤欲招之使來劉文房餞蕭郎中赴潤州序蕭公建隼此地化行五年漢庭羣公待以羙職吕和劉公神道碑重氛再闢闔境昭蘇由是漢庭諸公始重其節山谷詩漢庭諸公必動色史記汲黯傳招之不來麾之不去魯國一男何所恃而敢傲楊彪傳孔融魯國男子明日便當拂衣而去韓文傲雖凶德必有恃而敢行愈弱于材而腐于力夫何恃而傲豈謂没階之進洊勤吐哺之勞誨之以先正之規模未甞忘敵勉之以中權之謨畫莫若審機並見前趣令沐浴以宵行韓文宵則沐浴戒行事載書冊問道所由不容濡滯於晝出南浮江漢既聞克敵之聲詩江漢浮浮武夫滔滔西望岷峨僅獻養威之䇿東坡詩西望太白横岷峨陸機論深溝髙壘按甲養威只今疆埸埸音易邊境也詩疆埸翼翼又疆埸有瓜左傳疆埸之邑一彼一此食貨志殖於疆易粗立藩籬過秦論北築長城守藩籬却匈奴要恃吾有以待之孫子無恃其不來恃吾有以待之無恃其不攻恃吾有所不可攻則雖來無能為也蜀志先主傳劉璋聞曹公將向漢中内懐恐懼從事張松説之曰劉豫州使君之宗室而曹公之深讎也若使之討張魯魯必破魯破則益州彊曹公雖來無能為也又曹公自長安舉衆南征先主遥䇿之曰曹公雖來無能為也我必有漢川矣惟是受禕允之任孔明出師表斟酌損益進盡忠言則攸之禕允之任也居然乏羣博之材韓文當今藩翰之賓客惟宣州為多賢與之游者二人隴西李博清河崔羣羣與博之為人吾知之以羣博論之凡在宣州之幕下者雖不盡與之游皆可信而得其為人矣大鈞坱圠以無垠寧忍匹夫之求僃尚書無求僃于一夫餘見前小枝拳曲而不中徒勞巧匠之旁觀莊子仰而視其細枝則拳曲而不可以為棟梁俯而視其大根則軸解而不可以為棺槨韓文巧匠旁觀縮手袖間每念食浮禮記君子與其使食浮于人也寜使人浮于食倍成顔厚尚書顔厚有忸怩詩顔之厚矣此葢伏遇某官直方而大智勇且仁王曰惟爾君陳率由舊典尚書王若曰君陳惟爾令德孝恭又乃惟由先正舊典時式時則有若伊陟克對保衡尚書在太戊時則有若伊陟臣扈積十年調鼎之功成四海覆盂之勢史記滑稽傳連四海之外以為席安於覆盂豈謂魚潰之敵潰音㑹散也左傳民逃其上曰潰後漢書劉陶傳八方分崩中夏魚潰尚為鼠竊之謀叔孫通傳此特羣盗䑕竊狗偷未煩十乘之啓行已使隻輪之不返竝見前破竹數節之後當無留難杜預傳預伐呉衆議百年之寇未可盡尅宜俟来冬更為大舉預曰昔樂毅籍濟西一戰以并强齊今兵威已振譬如破竹數節之後皆迎刃而解無復著手處也杜詩胡危命在破竹中取果旬日之間不妨持重晉載紀慕容農謂慕容垂曰取果于未熟與自落不過旬日之間然其難易美惡相去逺矣北齊書陸法和傳侯景度江朱元英問法和曰景今圍城其事云何法和曰凡人取果宜待熟時不撩自落檀越但待侯景熟何勞問也願狥金城之略趙充國傳願馳至金城圖上方略勿貪石堡之功新唐書王忠嗣傳帝方事石堡董延灮建言請下石堡詔忠嗣分兵接應忠嗣出軍而士無賞格李灮弼入說曰大夫惜數萬段賜以啓讒口有如不㨗歸罪大夫大夫先受􅍔矣忠嗣曰吾固審得一城不足制敵失之未害于國吾忍以數萬人命易一官哉明日見責不失一金吾羽林將軍歸宿衛不者黔中上佐耳灮弼謝曰大夫乃行古人事灮弼又何言復楚而泣請師勝於天定史記伍子胥傳人衆者勝天天定亦能破人東坡詩人衆者勝天天定亦勝人伐崇而功因壘必以地降詩與爾鉤援以爾臨衝以伐崇墉左傳文王聞崇徳亂而伐之軍三旬而不降退修教而復伐之因壘而降如某者戰野非長袁盎傳非有奇計攻城野戰之功銘山猶勇韓詩銘山子所工觀我竒士極知東閤之多賢見前裕乃父功只頌西平之有子柳河東平淮西雅王曰咨愬裕乃父功昔我文祖惟西平是庸蔡人率止惟西平有子西平有子惟我有臣代囘鄒泉州應龍到任宋史鄒應龍字景初邵武之泰寧人慶元二年進士第一歴官資政殿學士簽書樞密院事知慶元府兼沿海制置使卒贈少保諡文清洪景盧夷堅志云泰寧鄒景初為士人時詣大乾廟焚香夢到一處拾錢錢堆撇滿地而才得二十五文而止意甚少傍人云邵武解額二十六名若更得一錢便為壓腳矣慶元乙卯秋試遂占第二說者曰此居二十五人之上夢已驗矣次年春乃魁天下㦯者賀曰錢上有元字状元之謂也君以壬辰生恰二十五歲尤為的確神告他人不如是之切也鄒自書其事以告友人危微云又云慶元元年邵武軍秋試進士其春秋義第一篇題乃公㑹晉矦宋公云云公至自㑹考官懐安丞王遇得兩巻而解額有限但可取其一乃攜示同院衆皆曰甲者詞意清快勝于次巻然不見公至自㑹之意于是寘乙選中及再讀乙䇿語犯廟諱乃黜乙取甲洎折封乙為李閎祖甲乃鄒應龍也鄒原名某乞夢于太乾廣祐王廟夢兩龍盤旋已騰上一龍背越前而出遂更名次年省闈莫子純冠首鄒居第二子純已有官遂升鄒為大魁泉州春秋七閩地秦閩中郡漢閩越國南朝置南安郡隋平陳廢郡屬泉州詳别見執草東臺六典唐龍朔二年改給事中為東臺舍人翰苑新書按類要云德宗實録上命盧杞為饒州刺史給事中袁髙宿直當草制遂執以謁宰相按此則給事直宿亦草制矣職林初寮除毛友給事中制東臺論駁之司此言應龍由給事中出守泉州也本傳不載亦史失之憩棠南國憩音器息也夲作憩詩蔽芾甘棠勿翦勿敗召伯所憩詩序甘棠美召伯也召伯之教明於南國言求諸道駁正之氣凛然尚書有言逆于汝心必求諸道白集除鄭覃制給事中之職凡制敕不便于時者得封奏之刑獄有未合於理者得駁正之惠斂一州牧御之材裕矣韓文斂此大惠兮施於一州後漢書寇恂文武僃足有牧人御衆之才恭惟某官𢎞深而肅括明允而篤誠俱見前魁下三台付榮進於素定宋史寧宗夲紀慶元二年賜禮部進士鄒應龍以下四百九十有九人及第出身胷中五色肯噤默以求容山谷詩公有胷中五色線平生補衮用功深說文噤口閉也韓文既噤不得施用名滿四海而守之以謙山谷詩名滿四海非真榮忠結兩宮而退然不恃露門晩講緝熙日月之光明周書武帝建德三年正月朝羣臣露門蕭撝傳及撝入朝屬置露門學高祖以撝為文學博士玉海沈重於露門館講論語詩日就月將學有緝熈於光明注緝熈光明也日就謂學之使每日有成就月將謂至于一月則有可行緝熈于光明言學作光明于彼有光明之人謂選擇賢中之賢乃從之學此借用天禁夕趨鼔舞風雷之號令孫逖詩上林天禁裏王維詩夕奉天書拜瑣闡揚子法言鼔萬物者其雷風乎甚念含飴之樂後漢書馬皇后紀含飴弄孫飴音怡力抗陳情之章晉書孝友傳李密字令伯父早亡母何氏改醮祖母劉氏躬自撫養密奉事以孝謹聞泰始初徵為大子洗馬以祖母年髙無人奉養遂不應命上疏陳情萬牛挽之首不囘杜詩萬牛囘首邱山重六鼇去而山為重列子龍伯之國有大人暨五山之所一釣而連六鼇於是岱輿員嶠二山流于北極沈于大海前驅畫㦸韋蘇州詩兵衛森畫㦸出鎮清源泉州唐天寳中為清源郡唐末閩王所據石晉時附南唐陞清源軍節度輿地紀勝清源洞在泉山之顛謝履泉南詩閩嶺天南表清源第一州海道無虞雖京師蒙九里之潤郭伋傳徵拜潁川太守帝勞之曰賢能太守去帝城不逺河潤九里冀京師并蒙福也天子有詔則刺史乃三公之儲韓文無疾其驅天子有詔後漢書尚書令僕出為郡守郡守入為三公某夙託同寮尤深贊慶周禮大行人慶賀以贊諸矦之喜注贊助也燭之武老矣無能為矣一力謀歸左傳燭之武曰臣之壯也猶不如人今老矣無能為也仲山甫舉之愛莫助之萬祈自重見前代囘史吉州定之到任吉州春秋百越地秦九江郡漢豫章郡呉分置廬陵安城二郡隋廢二郡置吉州詳見後定之當是彌逺之族詳啓意可見選侯相閱韓文視邦選矦以公來尸功臣表積其功曰閱作牧价藩詩价人維藩箋价甲也被甲之人謂卿士掌軍事者正義云价者甲之别名以其身被甲故稱甲人于周禮司馬之卿也以兵甲之事國之所重且舉司馬以明六卿藩屏也除目初傳道路知其辦治姚合詩一日觀除目三年損道心張敞傳審如掾言武必辦治梁矣辦治猶言能治也尹賞傳四子皆至郡守皆尚威嚴有辦治名建牙伊始氣色益以精明兵書曰牙旗者將軍之精凡始竪牙必以剛日魏志典韋初為張遼士屬趙寵牙門長吏莫能勝韋一手建之晉袁宏祭牙文敢建髙牙烈烈桓桓宋王誕祭牙文敬建髙牙顯兹威靈鄭鮮之祭牙文崇牙既建義鋒増厲後漢滕輔祭牙文敬建髙牙神武攸託新唐書李光弼傳光弼與郭子儀齊名世稱李郭其代子儀朔方也營壘士卒麾幟無所更而光弼一號令之氣色乃益精明云恭惟某官材應時須晉書世既須才才應世至劉琨答盧諶書才生于世世實須才孫逖行崔綸制名當嵗調才應時須杜詩管葛亦時須又竇氏檢察應時湏山谷詩持此應時須美由世濟左傳此十六族也世濟其美不隕其名疏廣與受早承給侍之恩疏廣傳廣為太子太傅兄子受為少傅太子每朝因進見太傅在前少傅在後父子竝為師傅朝廷以為榮南史朱脩之傳脚疾不堪獨行見特給扶侍袁憲傳表請解職不許給扶二人始安王遥光傳加侍中中書令給扶謝安有𤣥當是後來之慶謝𤣥傳𤣥字㓜度少穎悟與從兄朗俱為叔父安所器重安甞戒約子弟因曰子弟亦何豫人事而正欲使其佳𤣥答曰譬如芝蘭玉樹欲使其生于庭階耳有華分竹俶載戍瓜詩俶載南畞斡白粲之連檣斡古緩切運也轉也食貨志擅斡山海之貨師古曰斡謂主領也讀與管同粲蒼按切說文稻重一䄷為粟二十斗為米十斗曰穀為米六斗大半斗為粲刑法志為鬼薪白粲謂舂也杜詩精鑿成白粲又連檣荆州船東坡詩白粲連檣一萬艘驅紅旗而破賊白樂天詩紅旗破賊非吾事黄紙除書無我名帶牛佩犢漫游魑魅之䰟龔遂傳民有帶持弓劒者使買劍買牛賣刀買犢曰何為帶牛佩犢張重華傳石季龍自斃遺燼游䰟宜速平蕩鋒蝟斧螗佇築鯢鯨之觀説文蝟蟲似豪豬爾雅彚毛刺方言蜩秦晉謂之蝉楚謂之蜩宋衛謂之螗河東平淮西雅進次于郾彼昬卒狂衰兇鞠頑鋒蝟斧螗餘見前印金斗大周顗傳今年殺諸賊奴取金印如斗大繫肘詔璽星馳斗星宿名某快覩未先韓文爭先覩之為快賀成已後杜詩髙飛燕雀賀新成烹魚拜貺良深藏弆之榮古詩飲馬長城窟行呼童烹鯉魚中有尺素書貺通作況武帝紀拜況于郊注況賜也揷羽奏功預卜遄歸之慶韓詩銘山子所工挿羽余何怍荘子不若遄歸也遄速也代囘張建昌嵩到任建昌軍秦九江郡地漢豫章南城縣地呉置臨川郡治南城隋廢郡置撫州宋改今名詳别見入覲夲朝荀子人君用之則勢在夲朝而宜蕭望之傳雅志在夲朝法眞傳光贊夲朝四子講德論陳懇誠於夲朝之上出藩支郡鼂錯傳割其支郡師古曰支郡在國之四邊者也韓詩漢刑支郡黜宋史職官志昔者興國初詔廢支郡出乎一時十國為連周法斯在一道署使唐制可尋至若號令之行風教之出先及于府府以及州州以及縣支郡之不可廢明矣宜復置支郡𨽻于大府蘇文重使一夫之不獲特捐支郡以見收朱轓皂葢分竹使之半符續漢志二千石皂葢朱轓文帝紀初與郡守為竹使符應劭曰竹使符皆以竹箭五枚長五寸鑴刻篆書第一至第五師古曰與郡守為符者右畱京師左以與之碧澗紅泉壯麻源之三谷謝靈運入華子岡麻源第三谷詩南州實炎德桂樹緣寒山銅陵映碧澗石磴瀉紅泉郡志紅泉在南城縣麻源第三谷自砂中流出色紅謝靈運賦訊丹砂於紅泉宋李柸詩一派寒泉下翠巒彩虹飛出亂雲端紅流傳是丹砂液深處應藏九轉丹華子岡者相傳甪里先生弟子華子期得仙翔集於此雙旌戾止唐貢官志節度使辭日賜雙旌雙節詩我客戾止戾止至止也五袴煖然莊子煖然如春恭惟某官濟美篤誠左傳世濟其美又明允篤誠受材膚敏詩殷士膚敏神俊一鳴之表萬馬皆喑東坡三馬贊時西域貢馬首高八尺龍顱而鳳膺虎脊而豹章出東華門入天駟監振鬛一鳴萬馬皆瘖父老縱觀以為未始見也躊蹰四顧之間全牛自解荘子庖丁為文惠君解牛文惠君曰善哉技葢至此乎對曰始臣解牛之時所見無非牛者三年之後未甞見全牛也動刀甚㣲謋然已解如土委地提刀而立為之四顧為之躊蹰滿志需章交上蔡邕獨斷章者需頭奏者亦需頭詳别見渙渥畱中忽願奏於民庸遽勇收於朝蹟盧子諒詩收迹府朝遂去左右言辭職而去也韓詩足弱不能歩自宜收朝蹟江漘閩徼旴為佳麗之邦說文漘水涯也爾雅上坦平而下水深為漘詩置之河之漘兮獨孤及新亭記建昌與兩粤七閩相犬牙王平叔建昌軍記抗禦七閩牽制百粤西漢地理志南城縣注旴水西北至南昌入湖漢旴水之名肇于此或謂江南旴村有老姥自此山去故號旴母江見南唐韓熈晟旴江亭記或謂旴真君窮水源至血木嶺因此得名宋陳起文旴為江西佳郡地界閩粤顔記謝詩公有按行之便宋楊堯臣詩軍壘近仙山麻姑第三谷靈運詩亦存魯公記可讀無嫌斗絶竇融傳河西斗絶在羌胡中注斗峻絶也前漢書云成山斗入海蜀志蜀土斗絶一隅㑹即升遷斗升對某漸欲投簪左思詩躇蹰足力煩聊與投吾簪歸聽擊柝左傳魯擊柝聞于邾有山房三萬軸之私積託在部封東坡李氏山房藏書記余友李公擇少時讀書於廬山五老峯下既去而山中之人思之指其所居為李氏山房韓詩鄴侯家多書挿架三萬軸願刺史二千石之公餘賜之覆護代囘楊贛州長孺到任贛州以章貢二水合流得名漢豫章郡雩都贛縣地隋廢郡置䖍州後唐陞昭信軍節度宋軍額仍舊紹興中改贛州詳别見坐分龜組衛宏漢官儀列矦黄金印龜紐文曰印丞相將軍黄金印龜紐文曰章中二千石銀印龜組文曰章應劭漢官儀曰印者因也龜者隂也抱甲負文隨時蟄藏以示臣道功成而退李尤印銘龜紐犢鼻用爾作程孔愉傳以討華軼功封餘不亭矦愉甞行經餘不亭見籠龜于路者買而放之龜中流左顧數四及是鑄矦印而印龜左顧三鑄如初陸倕教文太守薄德謬叨龜組臥護虎城張良傳卧而護之新唐書裴度傳為朕卧護北門可也郡志贛城舊名䖍城宋紹興中有小警意䖍字為虎頭或有以兆之乃改名贛東坡詩行看鳳尾詔却下虎頭州謂贛州也世選爾勞上固望象賢之美尚書世選爾勞予不掩爾善又惟稽古崇德象賢皇揆余度公肯孤熊夢之邦離騷皇覧揆余于初度兮詩吉夢維何維熊維羆又維熊維羆男子之祥建牙云初詳上條交口相慶恭惟某官麋珠果腹莊子腹猶果然注飽貌佩璐潤身説文璐玉也楚辭被明月兮佩寳璐世溷濁而莫余知璐音路素所自期豈止二中而四下見於歴試眞覺一洗而萬空杜詩一洗萬古凡馬空甫畢素冠詩庻見素冠兮棘人欒欒兮聿來朱紱李詩朱紱白銀章杜詩朱紱有哀憐又聞君已朱紱即家以拜龔勝傳即拜勝為講學祭酒師古曰就其家而拜之趙充國傳即拜酒泉太守辛武賢為破羌將軍得郡也榮東坡詩得郡書生榮還家昔人重清冰在壺決不作繭絲之計選詩清如玉壺冰杜詩烱然一段清氷出萬壑置之迎風寒露之玉壺國語以為繭絲乎注繭絲賦稅丹砂點鐵復何憂薤本之強山谷與洪駒父書古之能為文章者真能陶冶萬物雖取古人之陳言入于翰墨如靈丹一粒點鐵成金也龎參傳為漢陽太守郡人任棠有竒節參到先候之棠不與言但以薤一大夲水一盂置户屏前參思其微意曰水者欲吾清也拔大夲薤者欲吾擊强宗也歎息而還東坡詩㧞薤已觀賢守政詳見前若作霖雨則無怨咨之民尚書小民惟曰怨咨如臨父母則有慘怛之愛繫辭無有師保如臨父母武帝紀君者心也民猶支體支體傷則心憯怛㦧亦作慘惠而好我詩惠而好我攜手同行注惠爱也性仁愛而又好我者與我相攜持同道而去更以贈君山谷詩君家所有更贈君願觀清白之子孫楊震傳子孫常蔬食歩行或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎大慰華巓之父老新序齊宣王對閭邱印曰士亦華髮墮顚而後不用耳蔡邕傳華顛胡老注顛頂也謂白首也崔駰傳唐且華顛而悟秦甘羅童牙而報趙崆峒日麗姑暫歌桂子之香崆峒山在贛州南六十里章貢二水夹以北馳唐十道記其顛有湖湖有艑艚底人或動之風雨立至方輿勝覽崆山在州南二十里南康記山出空青因以名之或呼為崆峒山多林木果實蓋州治地脉之母也東坡詩日麗崆峒曉風酣章貢秋閶闔天開即歸報麥岐之熟説文閶闔天門也楚人名門曰閶闔徐曰按楚辭叫帝閽使開關兮倚閶闔而望予潘岳賦夢良人兮來遊若閶闔兮洞開此則通名為閶闔今人但指天門誤矣張堪傳堪為漁陽太守民歌曰桑無附枝麥穗兩岐張君為政樂不可支某㒺功分閫謝安傳贊任總中臺效章分閫有幸卜鄰左傳晏子如晉公更其宅反則成矣既拜乃毁之而為里室皆如其舊則使宅人反之且諺曰非宅是卜唯隣是卜二三子先卜隣矣杜詩李邕求識面王翰願卜隣屬州之得陽公同業也同道也昌黎送何堅序堅以進士舉於吾為同業其在太學也吾為博士堅為生生博士為同道同業也同道也於其不得願而歸其可無言耶堅道州人道之守陽公賢也道於湖南為屬州湖南楊公又賢也便道而至滕閣為記之為賦之昌黎滕王閣記愈少時聞江南多臨觀之美而滕王閣獨為第一十四年以言事斥守揭陽便道取疾又不得過南昌而觀所謂滕王閣者太原王公觀察江南西道以書命愈曰子其為我記之竊喜載名其上乃不辭而承公命其江山之好登望之樂雖老矣尚能為公賦之謝解任太守解任謝丞相權武岡軍補上佐以㒺功叨書下考見前攝邊城而非據又遂合符易非所據而據焉蔡謨傳昔階謬恩蒙忝非據傅爕傳郡將范津名知人舉爕孝廉及津為漢陽與爕交代合符而去鄉邦榮之虔控謝於大鈞併修辭於小櫝見前伏念某至愚不肖多病早衰壯不如人紛兩髦之已雪説文髦髮也詩髡彼兩髦毛傳髦者髮至睂禮記脱髦注幼時剪髮為之至年長垂著兩邊髦然也宋璟致仕表霜毫在頸雪刺滿頭杜詩鬢髮還應雪滿頭老而無子寒百念以成冰左傳小人老而無子知擠于溝壑矣徒依突兀之萬間杜詩安得廣厦千萬間大庇天下寒士俱歡顔嗚呼何時眼前突兀見此屋吾廬獨破受凍死亦足尚獲翺翔於半刺杜詩半刺已翺翔夜聽紞如之五鼓頗似官蛙鄧攸傳攸守吴郡刑政清明後稱疾去百姓數千人畱牽攸船不得進攸乃小停夜中發去吳人歌之曰紞如打五鼔雞鳴天欲曙鄧矦挽不畱謝令推不去晉惠帝紀甞在華林園聞蝦蟇聲謂左右曰此鳴者為官乎為私乎或對曰在官地為官在私地為私曉聞欵乃之一聲便如野鹿栁詩漁翁夜傍西巖宿曉汲清湘然楚竹煙消日出不見人欵乃一聲山水綠山谷云欵乃湖中節歌聲音襖靄項氏家説云劉蜕文集有湖中靄迺歌劉言史瀟湘詩有閑歌暖迺深峡裏元次山有湖南欵乃歌三者皆一事但用字異爾欵夲音哀亦作上聲讀後人因柳子厚集中有注字云一夲作襖靄遂欲音欵為襖音乃為靄不知彼注自謂别夲作襖靄非謂欵乃當音襖靄也山谷不加深考從而實之是特未見劉蜕劉言史之詩爾莊子上如標枝民如野鹿張藉寄紫閣隱者詩野鹿伴茅屋秋猿守栗林偶挈甁之缺守左傳雖有挈瓶之智守不假器注瓶汲水器也喻小智為人守器猶知不以借人陸機賦患挈瓶之屢空病昌言之難屬缾小器也暫越爼以代庖敢言田里便無於歎愁俱見前似覺蠻貊可行其忠信淺有蒲蓮深有葭葦昌黎鄆州谿堂詩公作谿堂播播流水淺有蒲蓮深有蒹葦公以賓燕其鼔駭駭小不虺蜮大不鯨鯢河東武岡銘序我老洎幼由公之仁小不為虺蜮大不為鯨鯢思重事持不邇而逺莫可追已胡瞻爾庭人固疑其鶉突詩不狩不獵胡瞻爾庭有懸鶉兮莊子未甞好田而鶉生于突郭璞云鶉鸙之屬也此非子坐自亦愧於象環史記仲尼弟子傳孔子既没弟子思慕有若狀似孔子弟子相與共立為師師之如夫子時也他日弟子進問曰昔夫子當行使弟子持雨具已而果雨弟子問曰夫子何以知之夫子曰詩不云乎月離于畢俾滂沱矣昨暮月不宿畢乎他日月宿畢竟不雨商瞿年長無子其母為取室孔子使之齊瞿母請之孔子曰無憂瞿年四十後當有五丈夫子已而果然敢問夫子何以知此有若默然無以應弟子起曰有子避之此非子之座也禮記孔子佩象環五寸而綦組綬注象有文理者也環取可循而無窮疏孔子以象牙為環廣五寸以綦組為綬也所以然者失魯司寇故謙不復佩德佩及事佩示已無德事也佩象環者象牙有文理言已有文章也而為環者示已文教所循環無窮也幸新尹之鼎來許陳人之屏退俱見前竹齋藥竈尚堪清風明月之分少陵寄高使君適岑長史参詩豈異神􅋖宅俱兼山水鄉竹齋燒藥竈花嶼讀書牀餘見前桂棹蘭舟已夢秋水長天之共楚辭桂棹兮蘭枻斵氷兮積雪劉綺莊詩桂楫木蘭舟風江竹箭流曾子固詩從此七橋風與月夢魂長到木蘭舟王勃滕王閣詩序落霞與孤鶩齊飛秋水共長天一色滿秩雖無於多日庇身尚假於一雲任彦昇牋徒生之倫庇身有地杜詩四海八荒同一雲恭惟某官直大以方清和而任天以寧皇同符於孝祖寕皇謂寕宗孝祖謂孝宗揚䧺甘泉賦同符三皇馬援傳同符高祖帝賚我公濟美於越王尚書夣帝賚予良弼宋史史浩傳紹興三十二年立建王為皇太子浩除起居郎兼太子右庶子孝宗受禪遂以中書舍人遷翰林學士知制誥隆興元年拜尚書右僕射淳熈初除少保觀文殿大學士五年復為右丞相十年請老除太保致仕封魏國公光宗即位進太師紹熈五年薨封㑹稽郡王寕宗登極賜諡文惠嘉定十四年追封越王繼自今文子文孫宜用汝作霖雨尚書繼自今文子文孫其勿誤于庻獄庶慎惟正是乂之乃立太師太傅眞於我如浮雲宋史史彌逺傳寧宗崩推立理宗於是拜太師依前右丞相兼樞密使進封魏國公六辭不拜因乞解機政歸田里亟出關帝從之寳慶二年拜少師賜玉帶紹定元年上太后尊號拜太傅八辭不拜六年將拜太師三具奏辭乞免出命不許乃拜太師依前右丞相兼樞密使魯國公又三具奏辭紹定五年上疏乞謝事拜太傅未幾拜太師左丞相竟囘渙汗之揚易渙九五渙汗其大號渙王居旡咎注處尊履正居㢲之中散汗大號以盪險阨者也人遇險阨驚怖而勞則汗從體出故以汗喻險阨劉向傳言號令如汗汗出而不反者也可見撝謙之確易謙六四旡不利撝謙象曰旡不利撝謙不違則也注指撝皆謙邴侯病瘉合從隂德以受封丙吉傳宣帝生數月以皇曾孫坐衛太子事繫吉見而憐之擇謹厚女徒令保養曾孫望氣者言長安獄中有天子氣上遣使者無輕重一切皆殺之吉閉門拒使者不納曾孫病幾不全者數焉吉數敇保養乳母加致醫藥視遇甚有恩惠昌邑王廢大臣議所立未定吉奏記光尊立皇曾孫宣帝初即位賜吉爵關内矦吉為人深厚不伐善自曾孫遭遇絶口不道前恩掖庭宮婢則令民夫上書自陳甞有阿保之功辭引使者丙吉知狀上親見問然後知吉有舊恩而終不言上大賢之封吉為博陽矦臨當封吉疾病上將使人加紼而封之及其生存也夏矦勝曰臣聞有隂德者必享其樂以及子孫今吉未獲報而疾甚非其死疾也後病果瘉富公年高固有夲朝之故事富弼傳弼請老加拜司空進封韓國公諒恥匹夫之不獲必遂萬物以攸宜王陵傳宰相者上佐天子下遂萬物之宜尚念某何足控摶不堪位置雞壅也豕苓也亦嘗累藥籠之收竝見前䑕肝乎蟲臂乎斯固在化罏之運杜詩功名造化鑪餘見前其為頌徯㒺既編摩代林提管岊謝五府抱管𣙜之文書眞成為米𣙜音角漢天漢元年初𣙜酒酤韋昭曰以木渡水曰𣙜謂禁民酤獨官開置如道路設木為𣙜獨取利也陶濳傳為五斗米折腰杜詩負米晩為身每食臉必泫守踐更之嵗月有幸及𤓰帡幪曲免於震凌俱見前川藪密藏於疾汚左傳川澤納汙山藪藏疾注川是流水澤是委水衆水所歸故總言納汙山有木藪有草毒蟲所聚故云藏疾孰主張是遂濟登兹良勞大造之陶鈞敢廢小夫之竿櫝某箕裘有緒筆硯不靈勃窣盤珊僅脫身於選穽竝見前嶔嵜歴落姑策足於縣灘選詩何不䇿髙足先據要路津餘見前盍求泥軾之榮黄覇傳賜車葢特高一丈别駕主簿車緹油屏泥於軾前以章有德郤落銅官之冗銅官主鑄錢昔潭州長沙有銅官山楚鑄錢處王頥赴建州錢監詩官曹似是錫與銅聚鐵成錯未能羨泉府之泉唐哀帝時魏博羅紹威以牙軍之逼召朱全忠殪八千餘家其餘攻討悉平全忠畱魏半年供億所殺牛羊豕近七十萬資糧稱是所賂遺又近百萬比全忠之去蓄積為之一空紹威雖去其偪而魏兵自是衰弱乃悔曰聚六州四十三縣鐵鑄此一錯不成也周禮大府玉府内府外府泉府天府職内職金職幣皆掌財幣之官餔糟獨醒豈善㑹酒人之酒漁父衆人皆醉何不餔其糟而歠其醴周禮酒正之出日入其成月入其要小宰聽之歲終則㑹唯王及后之飲酒不㑹以酒式誅賞酒人掌為五齊之酒祭祀則共奉之以役世婦冐依行缺聊復坐曹山谷詩我方凍坐酒官曹為公然薪炙氷硯二親高年一則以喜而一則以懼三釜微祿時乎為養而時乎為貧誰為元帥之謀載復歩兵之餼阮籍傳籍聞歩兵厨營人善釀有貯酒三百斛乃求為歩兵校尉遺落世事歲糜月費不共桂玉之爨炊韓文月費俸錢嵗靡廩粟戰國䇿蘇秦對楚王曰楚國之食貴於玉薪貴於桂謁者難得見如鬼王難得見如天帝今臣食玉炊桂因鬼見帝冬暖年登未辦布荆之包裹韓文冬暖而兒號寒年豐而妻啼饑南史王誕傳荆釵布裙足得成禮范雲傳江祏求雲女婚姻酒酣巾箱中取剪刀與雲曰且以為聘雲笑受之至祏貴雲又因酣曰荆布之家理隔華盛因出剪刀還之李商隱祭外舅文紵衣縞帶雅貺或比于僑呉荆釵布裙髙誼每符于梁孟東坡詩森然有六女包裏布與荆有懷覲省屢願汰歸魏舒傳時欲沙汰郎官非其才者罷之舒曰吾即其人也樸被而出日食太倉之陳亦皆帝力杜詩日糴太倉五升米漢書太倉之粟陳陳相因高適詩耕耘忘帝力杜詩汝等豈知䝉帝力人言長安之樂豈為我曹桓譚新論人聞長安樂出門向西笑人知肉味美即對屠門而嚼不自意全見前遂得善罷伏遇某官彌綸天縡揚雄賦上天之縡杳旭卉兮注縡音載事也新唐書杜黄裳傳贊皆足穆天縡經國體涵養人材椳闑扂楔各得宜與其進也見前風雨霜露無非教栽者培之禮記天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流行庻物露生無非教也福遂及於容容漢書白璧不可為容容多後福考亦書於下下某自非木石亦有肺腸詩自有肺腸俾民卒狂正義云肺腸五臟之物言之以表其心元氏長慶集忝非木石粗有肺肝烏獲力足為器足施維其時矣伯樂過不睨遇不顧亦有命焉俱見前四六標準巻五, SBCK: 卷}
