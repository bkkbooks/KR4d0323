body:
  text: 四六標準卷三宋李劉撰薦舉宋史選舉志紹興二十二年右諫議大夫林大鼐言薦舉一路貪躁者速化亷靜者陸沉請立為限隔舉狀年勞參酌竝用下其議中書舍人洪遵給事中王希亮等上議曰本朝立薦舉之法必使厯任六考所以遲其歲月而責其赴功必使舉官五員所以多其保任而必其可用今如議臣之請則有力者惟圖見涎無材者茍冀終更出官十餘年可以坐待京秩不可一也今欲減改官分數以待無舉削者則當被舉之人必有失職淹滯之歎不可二也京官易得馴至郎位任子之恩愈不可減非可以救入流之弊不可三也更祖宗成法不可四也如故便議遂寢謝董侍郎居誼舉狀隨驃騎之幕濫備執鞭霍去病傳元狩三年春為驃騎將軍右北平太守路博德屬驃騎將軍封邳離矦北地都尉衛山從驃騎將軍封義陽矦歸義矦因淳王復陸支樓剸王伊即靬皆從驃騎將軍封復陸支為杜矦伊即靬為衆利矦從驃矦破奴昌武矦安稽從驃騎有功益封各三百戶杜詩雲深驃騎幕夜隔孝廉船史記管晏列傳假令晏子而在余雖為之執鞭所欣慕焉剡公車之章遽蒙推轂剡音焰說文鋭利也易剡木為矢禮圭剡上削爾雅剡㗉利也法言奏不剡東方朔傳待詔公車師古曰公車今屬衛尉上書者所詣也劉向傳章交公車田蚡傳推轂趙綰為御史大夫王臧為郎中令師古曰推轂謂升薦之若轉車轂之為也鄭當時傳其推轂士師古曰推轂言薦舉人如車轂之運轉也杜詩推轂期孤騫心感恩於破白燕翼貽謀録元祐元年以改官甚多吏部侍郎孫覺請歲以百人為限從之紹聖三年吏部乞以每申五人引見不拘數則其歲有三百餘員也中興以來改官人數絶少歲不過數十人雖令選人舉官逐員放散數亦不增至紹熙初號為頓增亦僅三十餘員慶元以後歲有溢額蓋孤寒路絶得者五員俱足而不得者多不破白勢使然也按破白宋人語指舉員而言鄭雪巖啓經年夜雨誰憐泮茆之清一日春風忽破庾梅之白戴象麓啓榮甚初官之破白恍如再第之取青面抱愧而發紅山谷詩皺面黃鬚已一翁尊前猶發少年紅伏念某稟生多艱從宦尤拙潘嶽閒居賦司馬安四至九卿良史題之以巧宦之目巧誠有之拙亦宜然貴人令其出門下既不善於走趨韓文柳子厚墓志諸公要人爭欲出我門下交口薦譽之試大理評事王君墓志鼎也不可以柱車馬也不可使守閭佩玉長裾不利走趨大夫羅而致幕中亦倍勤於收拾韓文以禮為羅羅而致之幕下又頽墮委靡潰敗不可收拾又無人收拾理則那又收拾不可遲又非其人雖與同列未嘗比數收拾互見前豈謂半年之內復為千里之行治法征謀紛紛未定昌黎送石處士序方今寇聚於垣師環其疆農不耕收財粟殫亡吾所處地歸輸之塗治法征謀宜有所出幕謨檄筆録録無竒昌黎送矦參謀赴河中幕詩檄筆無與讓幕謀職其膺漢書録録未有竒節然白日實照其積誠則赤雲可占於勝氣韓昌黎郾城晚飲詩城上赤雲呈勝氣睂間黃色見歸期注蔡未平數月前吳武陵自硤石望東南氣如旗鼓矛盾皆顚倒少選黃白氣從西北出盤蜿相交告公曰今西北王師所在黃白喜氣也敗氣為賊賊必亡矣按兵書云雲如日天有赤氣繞地不可攻況值胸奴百年之運胸奴傳孝宣之世承武帝奮擊之威直胸奴百年之運因其壞亂幾亡之厄權時施宜覆以威德必復春秋九世之讐胸奴傳天子意欲遂困胡乃下詔曰髙皇帝遺朕平城之憂髙后時單于書絶悖逆昔齊襄公復九世之讐春秋大之師古曰公羊傳莊四年春齊襄公滅紀復讐也襄公之九世祖昔為紀矦所譛而烹殺于周故襄公滅紀也颭犀札而咤犛旄在此行矣韓孟征蜀聯句刑神咤犛旄隂焰颭羣札說文西南夷長髦牛曰犛一角曰犀犛尾曰氂以飾物曰旄颭職琰切風吹貌札甲也夫差水西之甲三千刑神隂焰主我師而言餘見前封龍額而獵麟腳竊有望焉韓文晚秋郾城夜會聯句䇿勳封龍額歸獸獵麟腳韓王信傳以校尉擊胸奴封龍額矦曽未輸橫草之勞終軍傳軍無橫草之功得列宿衛注言行草中使草偃臥故曰橫草何遽辱采蘋之薦詩于以采蘋南澗之濵乏吳下阿蒙之學顧曰淹該淹漬也禮記淹之以樂好注謂浸漬之該備也韓詩包羅委瑣該餘見第二卷代回袁通判條無江南子布之詞反云典麗吳志張昭字子布彭城人也少好學博覽衆書才士陳琳等皆稱善之典略曰劉荆州嘗自作書欲與孫伯符以示禰正平正平蚩之言如是為欲使孫䇿帳下兒讀之耶將使張子布見乎裨益之功甚寡說文禆接益也徐曰若衣之接益也儀禮注裨之言埤也詩政事一埤益我奬豫之實何多兹蓋伏遇某官以社稷臣汲黯傳古有社稷之臣至如汲黯近之矣蕭望之傳望之堂堂折而不撓輔佐之能近古社稷臣也為詩書帥左傳晉謀元帥趙衰曰卻縠可說禮樂而敦詩書詩書義之府也禮樂德之則也孤忠可貫於日月新唐書郭子儀傳贊雖唐命方永亦由忠貫日月神明扶持者哉至誠足逹於天淵班固答賔戲聲盈塞於天淵一鶴一琴人皆望清獻之出宋史趙抃傳神宗立召知諫院及謝帝曰聞卿匹馬入蜀以一琴一鶴自隨為政簡易亦稱是乎詳别見萬牛萬甕賊必待崇文之擒唐憲宗即位劒南劉闢自稱留後元和元年正月以高崇文為左神䇿行營節度使討闢九月克成都十月闢伏誅韓文元和聖德詩萬牛臠炙萬甕行酒以錦纒股以紅帕首有恇其凶有餌其誘佇觀十乘之行詩元戎十乘以先啓行大作三軍之氣繫單于之頸慰祖宗在天之靈賈誼傳請必繫單于之頸而制其命伏中行說而笞其背犂胸奴之庭為蠻夷猾夏之戒胸奴傳犂其庭掃其閭郡縣而置之師古曰犂掃也尚書蠻夷猾夏寇賊姦宄孔傳猾亂也於以侈旗常之績歸而䇿鼎鼐之勳俱見前凡在紅蓮緑水之間南史庾杲之字景行王儉用為衛將軍長史蕭緬與儉書曰盛府元僚實難其選庾景行泛淥水依芙蓉何其麗也時人以入儉府為蓮花池必入赤箭青芝之用韓文進學解赤箭青芝注赤箭生陳倉山谷及太山少室青芝出太山某敢不力磨其鈍梅福𫝊爵祿束帛者天下之底石髙祖所以厲世磨鈍也圖稱所蒙羊祜表臣雖小人敢緣所蒙念存斯義陳后山詩所得非所蒙插羽銘山敢衒文章之小技昌黎郾城聯句銘山子所上插羽余何怍杜詩文章一小技於道未為尊冶金伐石願歌竹帛之大功韓文冶金伐石垂耀無極鄧禹傳垂功名於竹帛耳謝魏運使了翁舉狀魏了翁嘉定八年遷潼川路轉運判官宋張荃翁貴耳集云鶴山先生母夫人方坐蓐時其先公晝寢夢有人朝服入其臥內因問為誰答曰陳了翁覺而先生生故用其號命名陳瑩中前三名登第後兩甲子鶴山中第亦第三名其出處風節相似處極多在東南時有了翁家子弟必異遇之據地承顔非有豚蹄之祝雋不疑傳不疑據地曰竊伏海濵聞暴公子威名舊矣今乃承顔接辭史記滑稽傳淳于髠曰臣從東方來見道傍有穰田者操一豚蹄酒一盂而祝曰甌窶滿篝汙邪滿車五穀蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之為天啓齒乃蒙蟲臂之收山谷詩佳人從何來為天啓玉齒莊子以汝為蟲臂乎勞軍將之打門盧同詩日髙丈五睡正濃軍將叩門驚周公口云諫議送書信白絹斜封三道印發函書而驚坐吳質答東阿王書奉所惠貺發函伸紙陳遵傳時列矦有與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云難道今人之不古但虞吾黨之纍公袁盎傳吾不足以纍公伏念某於道無聞甚愚不肖每思名教之樂地何必事功樂廣傳王澄胡母輔之等皆任放為逹或至裸體廣聞而歎曰名教內自有樂地何必乃爾亦知富貴之浮雲不如貧賤徒緣一第之底彊為三釜之謀莊子曾子曰吾及親仕三釜而心樂陳后山詩可堪親老須三釡中罹弗洎之悲莊子不洎吾心悲洎及也言祿不逺親甚悔未信之仕以風為解遂回蓬島之船郊祀志蓬萊方文瀛洲此三神山者在渤海中及到三神山反居水下水臨之患且至則風輒引船而去及秦始皇至海上使人入海求之船交海中皆以風為解斡流而遷徑泛瞿塘之水賈誼傳斡流而遷或推而還注斡音菅斡轉也還讀曰旋瞿塘見第一卷上董制置條既元戎所自辟於天子韓文書記之任亦難矣非兼人之材莫宜居之然皆元戎自辟然後命於天子非先生敢圖利於大夫韓文使先生無圖利于大夫而私便其身圖綴錦城雪嶺之觀未容黔突錦官城在萬里橋南因其有錦官故名猶合浦之珠官也李詩錦城雖云樂不如早還家雪山在威州西南一百里與乳州白狗嶺相連山有九峯上有積雪春夏不消杜詩公來雪山重公去雪山輕淮南子孔子無黔突墨子無暖席韓文孔席不暇暖墨突不得黔厠天水祈山之役濫佐青油諸葛亮傳亮身率諸軍攻祈山戎陳齊整賞罰肅而號令明南安天水安定三郡叛魏應亮關中震響李正封詩從軍古云樂談笑青油幕宋劉瑀與顔峻書曰朱修之三代叛兵一朝居青油幕下作謝宣明面向人青油幕宋將幕也以青油縑為之方深國事之憂遑復身謀之恤詩我躬不閲遑恤其後車輪四角何敢纍推轂之人陸龜蒙詩君心欲漂落妾意正棲託願得雙車輪一夜生四角東坡詩多謝新詩纍推轂豨膏那解轉方輪淳于髠曰豨膏棗軸所以為滑也而不能運方軸餘見前厦屋萬間亦莫認捲簾之處杜詩安得廣厦千萬間陳堯佐燕詞為誰歸去為誰來主人恩重珠簾捲詳見前敢謂誠心之傾倒杜詩志士懷感傷心胸已傾倒山谷詩推轂天下士誠心要傾倒竟煩强箭之吹噓韓詩青冥送吹噓强箭射魯縞兹蓋伏遇某官學者泰山新唐書韓愈傳贊學者仰之如泰山北斗云國之元氣前律厯志太極元氣函三為一郎顗傳助順元氣含養萬物李固傳斟酌元氣運平四時紀瞻傳原元氣之本求天地之根髙適詩獨立調元氣清心豁窅冥年不可及寧妨待天下之清崔湜傳湜舉進士纍官中書令執政時年三十八嘗暮出端門緩轡賦詩張說見之歎曰文與位固可致其年不可及也時來則為終必得聖人之任張嘉貞傳宰相者時來則為豈能長據詳見前引扁舟於蓬島隗囂傳范蠡收責句踐乘偏舟於五湖注偏舟特舟也劉攽曰偏舟按史傳皆作扁舟扁特也不當作偏按上云回蓬島之船此句復出疑有舛誤閲十暑於岷山杜詩十暑岷山雪三霜楚戶砧人疑魁枕參首之淹史記天官書衡殷南斗魁枕參首正義曰衡斗衡也魁斗第一星也言北方斗斗衡直當北之魁枕於參星之首北斗之杓連於龍角南斗六星為天廟丞相太宰之位公無瓶居井睂之悔游俠傳揚雄酒針譬之於物子猶瓶矣觀瓶之居居井之睂酒漿不入口臧水滿懷卿自用卿法晉書庾敳傳敳字子嵩王衍不與敳交敳卿之不置行曰君不得為耳敳曰卿自君我我自卿卿我自用我家法卿自用卿家法吾親屬吾思昌黎送張道士序張道士嵩高之隱者有文武長材寄迹老子法中為道士以養其親聞朝廷將治東方貢賦之不如法者三獻書不報長揖而去詩曰詣闕三上書臣非黃冠師臣有平賊策陛下幸聽之寧當不俟報歸袖風披披答我不事爾吾親屬吾思魏了翁傳遷校書郎以親老乞補外乃知嘉定府駭聞渡瀘之行說文瀘水名出牂牁江一名若水放旄牛徼外入江有瘴氣蜀志五月渡瀘魏了翁傳了翁行次江陵蜀大將吳曦以四川叛了翁䇿其必敗明年曦誅蜀平了翁奉親還里倐罹陟屺之變詩陟彼屺兮瞻望母兮母曰嗟豫季行役夙夜無寐上愼旃哉由來無棄魏了翁傳丁生父憂解官心喪故者無失其故未能致唁於生芻禮記親者毋失其為親也故者毋失其為故也唁說文弔生也詩疏弔謂弔死唁謂唁生皆是相痛傷之名也徐稚傳稚字孺子豫章南昌人郭林宗有毋憂稚往弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州髙士徐孺子也詩不云乎生芻一束其人如玉吾無德以堪之誅之不可勝誅敢望噓枯於死草鄭泰傳孔公緒清談高論噓枯吹生詩無草不死無木不萎李賀詩誰知死草生華風忽辱遺我雙魚之寵古樂府客從遠方來遺我雙鯉魚呼童烹鯉魚中有尺素書見貽駕彼四牡之章詩駕彼四牡四牡騤騤君子所依小人所肥學落質凡顧謂識髙而韻邃左傳閔子騫曰夫學殖也不學將落氣凋力腐反云才贍而意新韓文弱於才而腐於力李百藥傳何身老而才之壯齒宿而意之新乎近功缺然遠業安在初不敢冀緇衣之改詩緇衣之宜兮敝豫又改為兮注緇衣卿士聽朝之正服此衣若敝願王家復改而為之願其常居此位常服此服何為過蒙華衮之褎穀梁傳序一字之褎寵逾華衮之贈片言之貶辱過市朝之撻師魯之從事陜西容有知之而弗薦尹洙傳洙字師魯河南人以儒學知名舉進士厯河南府戶曹參軍安國軍節度推官舉書判拔萃改山東道節度掌書記用大臣薦召試為館閣校勘歐陽公尹師魯墓志世之知師魯者或推其文章或尚其議論或多其材能至其忠義之節處窮逹臨禍福無愧于古君子則天下未必能盡知之師魯遇事無茍難而勇于敢為其所以見推于世者亦所以取嫉於人故其卒窮以死永叔之退居潁上乃虞賢者之不聞東坡勤上人詩集序歐陽公好士為天下第一盡致天下豪傑自庸衆人以顯于世者固多矣然士之負公者亦時有之意公之於士自是少倦而其退老於潁水之上則猶論士之賢者惟恐其不聞於世也所欣吾道之有歸豈獨小人之受賜某不知所報左傳臣不任受怨君亦不任受德無怨無德不知所報當勉其頑氣象未可攀但感幽桂榛菅之薦韓詩稱多量少鑒裁密豈念幽桂遺榛菅幾欲犯顔出薦口氣象硉兀未可攀歲月坐成晚尚託江梅桃李之香山谷詩江梅有佳實託根桃李場孤芳忌皎潔氷雪空自香歲月坐成晚煙雨青已黃謝鄒運使孟卿舉狀鄒孟卿字淳甫開禧中登進士第除知豐城㑹興元軍士莫簡張福亂制置使聶子述遁殺總領楊九鼎陷朗州果州朝議孟卿文武全材授行軍參議一戰敗之簡自殺福請降官至四川制置兼茶馬使時西北敵不敢犯邊被譛賜死明年事白復其官諡忠襄得勑葬王事靡盬未敢懷歸詩四牡騑騑周道逶遲豈不懷歸王事靡盬我心傷悲注盬不堅固也疏云無不堅固我當從役以堅固之使臣見知忽叨論薦詩序四牡勞使臣之來也有功而見知則說矣韻會叨濫也況沐成終之賜尤銜引重之恩灌夫傳兩人相為引重張晏曰相薦逹為聲勢也師古曰相牽引而至于尊重也伏念某蠢蠢隨行韓詩十年蠢蠢隨朝行又豈比恆人長蠢蠢狙狙何算狙七餘切韓文瞿瞿狙狙少始知學亦有立功立言之心左傳穆叔曰豹聞之大上有立德其次有立功其次有立言雖久不廢此之謂不朽壯不如人已作為貧為養之仕左傳燭之武曰臣之壯也猶不如人今老矣無能為也已偏親弗洎見上條百念頓消漢庭諸公漫惜斯人之憔悴劉文房餞蕭郎中赴潤州序蕭公建隼此地化行五年漢庭羣公待以美職呂和劉公神道碑重氛再廓闔境昭蘇由是漢庭諸公始重其節東坡詩漢庭諸公必動色又歷詆漢諸公杜詩冠蓋滿京華斯人獨憔悴魯國男子自知吾意之蹉跎績漢書曹操將殺楊彪孔融聞之不及朝服見操曰融魯國男子便當褰衣而去不復朝矣東坡詩遙知魯國真男子韓詩嗚呼吾意其蹉跎引船既遠於蓬萊見上條鼓枻試觀於灩澦枻音裔楫也一曰柂也屈原漁父篇漁父莞爾而笑鼓枻而去灎澦見第一卷上董制置條沭浴而戒行李人謂何斯韓文沭浴戒行李載書冊問道所由又昔者人謂斯何今者人謂何斯饑渴之歌采薇歲亦陽止詩采薇采薇薇亦柔止曰歸曰歸心亦憂止憂心烈烈載饑載渴又曰歸曰歸歲亦陽止箋西伯將遣戍役先與之期以采薇之時饑渴言其苦也十月為陽曰汝何時歸乎亦至十月乃得歸也又丁寧歸期定其心也雖連收乘矢之發恐未免一簣之虧豈無他人欲令出其門下詩豈無他人韓文諸公要人爭欲令出我門下不有君子寧可棄之道傍左傳襄仲曰不有君子其能國乎國無陋矣韓大誠不忍竒寶橫棄道側山谷詩擲置官道傍兹蒙四牡之章詩序四牡勞使臣之來也四牡五章遂足五豝之數詩彼茁者葭一發五豝毛傳豕牝曰豝虞人翼五豝以待公之發在繡衣六條之察定匪狥私見第一卷上曽運使條然華衮一字之褎郤疑過實見上條蓋經邦本諸政事尚書論道經邦而緯國取於文章班彪傳敷文華以緯國游夏求賜之異科雖孔門而難僃董賈龔黃之殊傳在漢世而罕全漢書敘傳賈生矯矯弱冠登朝遭文睿聖屢抗其疏述賈誼傳抑抑仲舒再相諸矦讜言訪對為世純儒述董仲舒傳龔遂黃霸在循吏傳自視欿然前言戲耳士固伸於知己蓋非搖尾而後憐史記越石父曰君子詘于不知己而信于知己者詳第二卷上衛參帥條韓文若俯首帖耳搖尾而乞憐者非我志也德不待於成身郤合銘心而自厲柳文古之知己者不待來求而後施德舉能而已其受德者不待成身而後拜賜感知而已兹蓋伏遇某官人今而心古行峻而氣平分閫乘軺欲轍環於四海謝安傳贊任總中臺效章分閫陸贄奏選將而任分之以閫儒林傳申公弟子乘軺傳從至見天子韓文轍環天下揚金斂璞真鑒别於九流老泉集上文丞相書於此有人求金於沙斂而揚之惟其揚之也精是以責金於揚而斂則無擇焉不然金與沙礫皆不録而已矣唐六典定九流之品格補萬方之闕政權德輿集裁百辟之章疏助九流之刀尺尚煩入蜀之星李郃傳郃字孟節善河圖風星和帝即位分遣使者微服單行至各州縣觀採風謡使者二人當到益部投郃候舍時夏夕露坐郃因仰觀問曰二君發京師時寧知朝廷遣二使耶二人默然驚相視曰不聞也問何以知之卻指星示云有二使星向益州分野故知之耳東坡詩須煩凌雲手去作入蜀星正及渡瀘之月蜀志諸葛亮傳出師表云五月渡瀘遂見山平劍閣浪靜瞿塘劉闢就誅昌黎上元和之頌唐書劉闢反詔髙崇文與兵馬使李元奕河南西道礪討之闢陷梓州執東川節度李康崇文引兵趨梓州闢歸康以自雪崇文斬康又敗闢衆于鹿頭關遂克成都擒闢至長安誅之昌黎集有元和聖德詩內及誅劉闢事子璋授首少陵形敬定之功唐書梓州刺史段子璋反襲李奐于綿州道遇遂州殺刺史虢王巨奐戰敗奔成都子璋自稱梁王西川節度使崔光遠與奂共攻斬之杜甫贈花卿歌子璋髑髏血糢糊手提擲還崔大夫孟卿有平興元功故云既飲至而䇿勳復重臨而領郡劉禹錫詩郡人重得黃丞相子午之竒可出但當飽戊巳之屯魏略夏矦楙為安西將軍鎮長安諸葛亮於南鄭與羣下計議魏延請假精兵五千負糧五千直從裦中出循秦嶺而東當子午而北不過十日可到長安楙聞延至必乘船逃走而公從斜谷來二十許日足逹一舉而咸陽以西可定矣三秦記子午長安正南地也山名秦嶺谷名褎斜平帝紀元始五年秋通子午道從杜陵直絶南山徑漢中師古曰子北方午南方言通南北道相當今京城直南山有谷通梁漢道者名子午谷又宜州西界慶州東界有山名子午嶺此則北山是子南山是午共為子午道元帝紀發戊巳校尉注戊巳校尉者鎮安西域無常治處亦猶甲乙等各有方位而戊與已四季寄旺故以名官也一說戊巳居中校尉處三十六國之中故曰戊巳又屯田以耕土為事故取戊巳甲寅之報未來何以寬庚癸之呼趙充國傳上以書敕讓充國充國上書謝罪因陳兵利害六月戊申奏七月甲寅璽書報從充國計焉呼去聲左傳吳申儀乞糧於公孫有山氏曰佩玉蕊兮余無所繫之㫖酒一盛兮余與褐之父睨之對曰梁則無矣粗則有之若登首山以呼曰庚癸乎則諾尚屈餽餉關中之手漢書楚漢相距滎陽蕭何轉漕關中給食不乏高帝曰填國家撫百姓給餽餉不絶糧道吾不如蕭何且圖轉輸渭上之功漢書溝洫志鄭當時為大司農言異時關中漕粟從渭上渡六月罷而渭水道九百餘里時有難處引渭穿渠起長安旁南山下至河三百餘里徑易漕度可令三月罷上以為然發卒穿渠三歲而通以漕大便利諒思人物之眇然山谷詩人物方眇然詳見第一卷上任中書條僅有征夫之邇止詩卜筮偕止會言近止征夫邇止注卜筮俱會聚人占之其言近止則征夫如今應到不遠矣劒外之官易冷聊借吹噓杜詩劒外官人冷詳見前幕中之辨非傾謾加收録韓文幕中之辨人反以汝為叛臺中之評人反以汝為傾某敢不稍鐫懶習鐫遵全切琢石也杜詩小來習性懶謹佩味言鄭當時傳誠有味其言也號門生而知恩例欲自同於蛇雀柳文凡號門生而不知恩之所自者非人也餘見第一卷上董制置條報國士之遇我誓當小異於馬牛史記豫讓傳至於智伯國士遇我故國士報之韓文小人之懷惠兮猶知獻其至愚固余異於馬牛兮寧止乎飲水而求芻謝衛參帥涇舉關升宋高宗紹興十四年司封郎中李澗上言今知縣再任六考乃升通判而丞與諸司屬官初無吏責及以自考關升故人皆有所擇而不願就又因民事得罪之人雖微罪亦終身廢弃故人皆有所懼而不肯就請自今應理親民者竝通及六考關升而應緣民事之人自徒以上乃取旨小子狂簡之成章無能為役左傳於先大夫無能為役言不足為其役使也大鈞坱圠而播物有味其言賈誼傳大鈞播物坱圠無垠餘見上條幸辱僃於使令亦足謂之遭遇不應論薦便纍吹噓伏念某受質無竒望世亦狹童而强學粗知萬物之皆塵蔡君謨詩世間萬物皆塵土留取功名久遠看壯不如人縱得一科而何補左傳燭之武曰臣之壯也猶不如人韓文豈不登名於一科兮曽不補其遺餘舍對白抽黃之業柳文眩耀為文瑣碎排偶抽黃對白啽哢飛走為出朱入墨之謀周書蘇綽傳綽字令綽武功人拜大行臺左丞始制文案程式朱出墨入及計帳戶籍之法陳后山詩胡然落朱墨不坐致公矦人言棲枳之官決無鸞鳳仇香傳枳棘非鸞鳳之棲百里豈大賢之路渠知求芻之志固異馬牛見上條不圖賈子之泛湘賈誼傳誼既以適去意不自得及渡湘水為賦以弔屈原偶際召公之分陜公羊傳自陜而東者周公主之自陜而西者召公主之注陜者𢎞農陜縣是也郡國志陜縣有陜陌二伯所分括地志陜縣在陜州西南二十五里分陜從原為界王莽傳分陜立二伯師古曰分陜者言依周公召公故事自陜以東周公主之自陜以西召公主之望塵雅拜孰非夾道以疾馳潘嶽傳與石崇等諂事賈謐每候其出與崇輒望塵而拜何武傳槃辟雅拜服䖍曰行禮容拜也韓文武夫前呵從者塞途供給之人各執其物夾道而疾馳敷袵陳詞獨念此君之小異離騷經跪敷袵以陳辭兮耿吾得此中正孟嘉傳嘉少知名禇褎有器識庾亮大會府州人士嘉坐次甚逺褎問亮江南有孟嘉其人何在亮曰在坐卿但自覓褎厯觀指嘉曰此君小異得無是乎令以竿牘小夫之智莊子小夫之智不離苞苴竿牘效於詩書元帥之前左傳晉謀元帥趙衰曰卻縠可說禮樂而敦詩書一年於兹五技窮矣荀子梧鼠五技而窮詳見前可以止則止方願返於屠羊莊子屠羊說曰願復返吾屠羊之肆詳見前莫之為而為駭忽勞於薦鶚鄒陽傳臣聞鷙鳥纍百不如一鶚詳見前亟嘗輸欵願且避賢公孫𢎞傳願歸矦印乞骸骨避賢者路高適詩避賢初罷相豈期刺史之天趙嘏詩尋花偶坐將軍樹飲酒方重刺史天東坡詩一見刺史天決為將軍之地灌夫傳獨不為李將軍地乎識字有數敢當淹博之稱楊文公談苑晉開運中詔令兩制各作詩賦一篇付禮部為考試之式獨學士李懌不肯曰李懌識字有數因人成事使令白衣入貢部中下第必矣胡能作文章為世模楷時論美之山谷詩識字有數我自知又按蜀志南史皆有所識不過十數字之語此亦識字有數之意了事亦癡寧有疏通之實傅咸傳楊駿弟濟素與咸善與書曰江海之流混混故能成其深廣天下大器非可稍了而相觀每事欲了生子癡了官事官事未易了也了事正作癡復為快耳非相國賜之大禮之過詎至是耶韓文愈為御史得罪德宗朝同遷於南者凡三人獨愈為先收用相國之賜大矣百官之進見相國者或立語以退而愈辱賜坐語相國之禮過矣賜之大禮之過於敵以下受之宜何以報況在天子之宰乎使天下洋然動于然來其必由此韓文枯槁沉溺魁閎寬通之士必且洋洋焉動其心峨峨焉纓其冠于于焉而來矣古之所以求士今者於是見公恭惟某官身佩安危新唐書李晟傳贊提孤軍抗羣賊身佩安危而氣不少衰者徒以忠義感人故豪英樂為之死耳東都事略王曽毅然大節身佩安危力關造化兒童之誦君實久佚丘園東坡獨樂園詩兒童誦君實走卒知司馬易賁于丘園逺使之問潞公暫司管鑰宋史文彥博傳彥博逮事四朝任將相五十一年名聞四夷元祐間契丹使耶律永昌劉霄來聘入朝望見彥博卻改立容曰此潞公耶問其年曰何壯也又彥博為王安石所惡力引去判大名府轉運判官汪輔之奏彥博不事事帝批其奏以付彥博曰以侍中舊德故煩卧護北門此用寇萊公北門鎖鑰事察湖南之從事韓文李生自湖南從事請告來覲欲冀北之空羣韓文伯樂一過冀北之野而馬羣遂空雖有絲麻左傳雖有絲麻無棄菅蒯詳見前且揚糠粃晉書習鑿齒與孫綽共行時綽在前顧鑿齒曰沙之汰之瓦石在後鑿齒曰簸之揚之糠粃在前意者恥匹夫之不獲欲其收多士以攸奔詩濟濟多士秉文之德對越在天駿奔走在廟無以我公亟展伊周之業詩無以我公歸兮豈惟委吏得專文武之功某既纍公知寧當自棄少留東閣難掩人言魏勃之庸朱雲傳薛宣為丞相謂雲曰在田野亡事且留我東閣可以觀四方竒士雲曰小生乃欲相吏耶宣不敢復言高五王傳灌嬰在滎陽聞魏勃本教齊王反責問勃勃曰失火之家豈暇先言丈人後救火乎因退立股戰而栗灌將軍熟視笑曰人謂魏勃勇妄庸人耳何能為乎更繞南枝或僃臣客馬周之對魏武短歌行月明星稀烏鵲南飛繞樹三匝何枝可依舊唐書馬周傳周至京師舍於中郎將常何之家太宗令百寮上書言得失何以武吏不涉經學周乃為條陳便宜二十餘事事皆合旨太宗怪其能問何何曰此非臣所能家客馬周具草也謝曽運使槃舉關升宋王明清玉照新志云曽吉父早歲入館然平生不曽關升後來雖厯監司郡守猶帶權發遣也吉甫為廣西漕嘗舉其屬吏姓黃者改官赴部告行吉甫云有一事久擬奉白先生早往下關升于門下實有利害耳今按吉父名幾宋史有傳即曽運使之先也詳啓意任寧鄉簿作墨綬主書苦乏曳裾之譽左雄傳今之墨綬猶古諸矦注墨綬謂令長北山移文紐金章綰墨綬漢官儀邑宰銅章墨綬秩六百石白帖主簿主掌簿目仇覽傳今日太學曳長裾飛名譽者皆主簿後耳繡衣察吏忽承推轂之言鄭當時傳其推轂士及官屬丞史誠有味其言也況下考之甫書曽微勞之未效便辱吹噓之送杜詩揚雄更有河東賦惟待吹噓送上天允為特達之知四子講德論特逹而相知者千載之一遇也詳別見伏念某何足控摶賈誼鵩賦千變萬化兮未始有極忽然為人兮何足控揣孟康曰控引也揣持也言人生忽然何足引持自貴惜也如淳曰控引也摶音團控摶玩弄愛生之意也不堪位置梁武帝書評羊欣書如婢作夫人不堪位置而舉止羞澀終不似真抱鉏犂而餓空谷乃無端以讀書王粲詩不能效沮溺相隨抱鉏犂韓詩奈何君獨抱竒才手把鉏犂餓空谷又今者無端讀書史智慧只足勞精神裹章服而揖上官還不習於為吏嵇康與山濤絶交書危坐一時痺不得搖性復多蝨爬搔無已而當裹以章服拜揖上官三不堪也賈誼傳不習為吏視已成事邂逅六條之察見第一卷上曾運使條吉蠲一瓣之香詩吉蠲為饎注吉善蠲潔也善潔為酒食之饌陳后山詩向來一瓣香敬為曾南豐祝甌窶而操豚蹄不夸而狹見上謝魏運使條見丸彈而求鶚炙匪躁斯狂莊子見卵而求時夜見彈而求鶚炙不謂蘇天尚為李地俱見前燈花夜報杜詩燈花何太喜奏藁朝馳誦說云乎顧謂文章之典雅文中子學者博誦云乎哉必也貫乎道文章茍作云乎哉必也濟乎義㑹計而已反稱政術之疏通難當一字之褒穀梁傳序一字之褎寵踰華衮之贈乃辱八珍之犒昌黎薦士詩善善不汲汲後時徒悔懊救死具八珍不如一簞犒周禮珍用八物注八珍謂淳熬淳母炮豚炮牂搗珍漬熬肝膋也小草之有遠志但欲深根山谷詩小草有逺志相依在平生醫和不竝世深根且固蒂老芋之為茯神誰欺精鑒柳文余病痜且悸謁醫視之曰唯茯神為宜明日市諸市烹而餌之病加甚召醫而尤其故醫求視其滓曰吁盡老芋也彼鬻藥者欺子而獲售子之懵也而反尤於豫不亦過乎伏遇某官家傳忠恕嫡嗣文清宋史曾幾傳遷通奉大夫卒諡文清詳見第一卷上曾運使條洊疇剖竹之庸李詩我家小阮賢剖竹赤城邊繼著握蘭之望應劭漢官儀尚書郎懷香握蘭濡轡而馳原隰疑若小然詩六轡如濡載馳載驅注如濡言鮮澤也聽履而上星辰恐不免耳杜詩持衡留藻鑑聽履上星辰謝安傳安妻見家門富貴而安獨靜退乃謂曰丈夫不如此也安掩鼻曰恐不免耳尚念斗升之饞嚼山谷詩看人取卿相忘意亦饞嚼若為分寸之躋攀韓詩躋攀分寸不可上目其貌耳其言雖乏同進之交譽韓文潁川陳彤始吾見之楊湖南門下頎然而長薰然而和吾目其貌耳其言因以得其為人及其久也果若不可及吾見湖南之禮有加而同進之士交譽也又以信吾信之不失也知其主信其客姑令從事之流聲韓文知其客可以信其主者宣州也知其主可以信其客者湖南也宜乎從事於是而流聲實于天朝也鶚薦一飛馬價三倍俱見前某雖無以報敢辱所知東坡祭韓忠獻公文況我小生罕見寡聞敢不師公治民與軍雖無以報不辱其門又祭歐陽文忠公文蒼顔白髮復見潁人潁人思公曰此門生雖無以報不辱其門始與箠楚辭儻遂少陵脫身之願杜詩脫身薄尉中始與箠楚辭尚煩左右芼請歌昌黎薦士之詩昌黎薦士詩彼微水中荇尚煩左右芼謝林提舉行知舉關升詳啓意任寧鄉簿作抱會計之簿書安知鼇釣杜詩舍弟早棲邑防州領簿曹倚賴天涯釣猶能掣巨鼇瞻光華之禮樂忽拜鶚書曾微攀援之緣何自聽聞之誤伏念某性徒是古學不前人陳后山集學不前人年不後人尋墜緒之茫茫我之懷矣進學解尋墜緒之茫茫獨旁搜而逺紹詩我之懷矣自貽伊阻注懷安也踵常途之役役誰者念之進學解踵常途之促促窺陳編以盜竊注促促諸本多作役役坐違汗漫之期淮南子若士與汗漫期於九垓之上遂逐侏儒之飽東方朔傳侏儒飽欲死詳見前主簿四十亦知鄧禹之笑人仇覽傳覽少為書生淳默鄉里無知者年四十縣召補吏選為蒲亭長朞年稱大化時考城令河內王渙政尚嚴猛聞覽以德化人署為主簿南齊書王融傳為爾寂寂鄧禹笑人詳見前公車三千豈乏鄭莊之薦士史記滑稽傳東方朔初入長安至公車上書凡用三千奏牘公車令兩人共持舉其書僅然能勝之注公車司馬掌殿司馬門夜徼宫天下上事及闕下凡所徵召皆總領之漢書鄭當時字莊贊曰張釋之之守法馮唐之論將汲黯之正直鄭當時之推土不如是亦何以成其名哉未有不求而得者曹植與吳質書夫求而不得者有之矣未有不求而自得者也吾非惡此而逃之韓文大丈夫之遇知於天子用力於當世者之所為也吾非惡此而逃之是有命焉不可幸而致也馬失之瘦士失之貧其來已久史記滑稽傳當其貧困時人莫省視至其貴也乃爭附之諺曰相馬者失之瘦相士者失之貧其此之謂耶牂生於奧鶉生於突彼各有由莊子吾未嘗為牧而牂生於奧未嘗好田而鶉生於突注牂牝羊也奧西南隅未地突東南隅鶉火地甘心妄校尉之行間李廣傳諸妄校尉已下注妄猶凡也吳王濞傳諸賔客皆得為將校尉行間候司馬師古曰在行伍間絶意諸貴人之門下韓文諸公要人爭欲令出我門下忽繡斧之問俗漢書武帝紀遣直指使者暴勝之等衣繡衣杖斧分部逐捕後漢書張綱傳遣八使循行風俗如緇衣之好賢禮記好賢如緇衣惡惡如巷伯則爵不瀆而民作願刑不試而民咸服察之進旅之間寵以關升之剡妄庸人耳顧稱履行之端詳見前謝衛參帥舉關升條誦說云乎反謂詞章之典雅見上條一字已榮於華衮見前八音何有於爰居八音謂履行端詳詞章典雅八字莊子昔者海鳥止於魯郊魯君御而觴之於廟奏九韶以為樂具太牢以為膳注海鳥國語爰居止魯東門之外三日臧文仲使國人祭之又曰魯矦也東坡詩爰居非所養俯仰眩金奏其求士甚士之求公公無愧古東坡勤上人詩集序歐陽公好士為天下第一士有一言中于道不逺千里而求之甚十士之求公以故盡致天下豪俊不即人而人自即我我則靦顔野王二老傳即人者人亦即之東坡答山谷書此人如精金美玉不即人而人即之將逃名而不可得何以我稱揚為伏遇某官斂經濟才舊唐書𤣥宗紀廟堂之上無非經濟之才裴度李晟神道碑有經邦濟世之才攬澄清轡范滂傳登車攬轡慨然有澄清天下之志世說陳仲舉言為士則行為世範登車攬轡有澄清天下之志衆人皆醉揩醒眼以旁觀屈原漁父辭舉世皆濁何不掘其泥而揚其波衆人皆醉何不餔其糟而啜其醨揩丘皆切揩摨摩拭也萬物走圓改方心而不忍柳河東乞巧文敢願聖靈悔禍矜臣獨艱付與媚姿易臣頑顔鑿臣方心規以大圓拔去呐舌納以工言念天地之大矣懼人物之眇然顧以毛髮絲粟之長俱見前悉在權度錙銖之內律厯志度長短者不失毫釐權輕重者不失黍絫十黍為絫十絫為銖八銖為錙二十四銖為兩禮記雖分國如錙銖有如齷齪酈食其傳齷齪好苛禮應劭曰齷齪急促之貌司馬相如傳委瑣齷齪拘文牽俗師古曰齷齪局狹也齪音初角反韓詩駑駘誠齷齪市者何其稠亦與吹噓惟今之謀人念不到此尚書惟今之謀人姑將以為親雖古之膚使何以加諸法言張騫蘇武之奉使也執節沒身不屈王命雖古之膚使其猶劣諸某敢不䇿不肖身為必報計馬價既增於三倍驢技更勉於一鳴俱見前大夫薦人與之大夫固無是事國士遇我報以國士惟既厥心謝衛參帥涇特薦周公還贄僅收三士之材荀子周公謂伯禽之傳曰我文王之為子武王之為弟成王之為叔父吾於天下不賤矣然而吾所執贄而見者十人還贄而相見者三十人貌贄之士百有餘人欲言而請畢事者千有餘人於是吾僅得三士焉以正吾身以定天下注禮臣見君則不還贄敵者不敢當則還之禮尚往來也士相見禮曰主人復見之以其贄曰吾夫子辱使某見請還贄於將命者毛遂僃員輒在一人之數平原君傳趙平原君求救合從於楚約與門下文武備具者二十人偕得十九人餘無可取者有毛遂者自贊於平原君曰遂聞君將合從於楚約與食客門下二十人偕不外索今少一人願君即以遂備員而行矣不求而獲曹植與吳質書夫求而不得者有之矣未有不求而得者也其得也榮竊惟范蜀公之封章七輩皆為名勝宋史范鎮字景仁成都革陽人纍封蜀郡公贈金紫光祿大夫諡忠文輩補妹切說文若軍發車百兩為輩以車非聲廣韻等輩按婁敬傳使者十輩韓安國傳漢使十輩至梁傳介子傳三輩趙克國傳凡七十輩吕文靖之賔客三朝賴其儀刑宋史呂夷簡字坦夫壽州人贈太師中書令諡文靖殆勱相國家之功尚書其惟吉士用勱相我國家孔傳勉治我國家自旁招俊彥而始尚書旁招俊彥啓迪後人孔傳旁非一方美士曰彥然主擇客客擇主亦各有宜馬援傳當今之世非獨君擇臣也臣亦擇君矣故公求士士求公苦難相值見上條裴晉公於韓愈至公僅使之就閒昌黎和裴晉公詩長愁典午非材職得就閒官即至公歐陽子於聖俞素交乃忘於推薦宋史文苑傳梅堯臣字聖俞宣州宣城人工為詩錢惟演留守西京特嗟賞之為忘年交歐陽修與為詩友自以為不及纍遷尚書都官員外郎預修唐書書成未奏而卒歐陽公梅聖俞詩序聖俞以䕃補為吏纍舉進士輒抑于有司困于州縣自以其不得志者樂於詩而發之故其平生所作於詩尤多世既知之矣而未有薦於上者昔王文康公嘗見而歎曰二百年無此作矣亦不果薦況在疏賤何與品題某殖學多荒賦姿不頴偶掇一科之底强為三釜之謀入墨出朱職甚安於祭竈俱見前依紅泛緑夢不到於轅門山谷詩夢不到漢東又海南海北夢不到周禮掌舍設車宫轅門注王行上宿阻險之處則以車為陳相向為門穀梁傳置旃以為轅門注轅門卬車以轅表門項籍傳諸侯將入轅門膝行而前餘見前敢圖前茅左傳前茅慮無注楚以茅為旌識慮無慮備有無也如今軍行前有斥候采及下菲詩采葑采菲無以下體詳見前逮今數月無補報於絲毫韓文曾無絲毫事為報答效未始一言乞躋攀於分寸韓詩躋攀分寸不可上小人屬饜而已非惡此而逃之左傳願以小人之腹為君子之心屬饜而已屬足也言小人之腹飽猶知饜足君子之心亦宜然韓文吾非惡此而逃之是有命焉大鈞坱北無垠果何修得此見前欲使塵埃之吏韓詩判司卑官不堪說未免捶楚塵埃問進為館學之儲太學六館受德者不待成身感知而已柳文士之知己者不待來求而後施德舉能而己其受德者不待成身而後拜賜感知而已盡己者謂之確論揣分謂何舊唐書王圭傳太宗謂圭曰卿識鑒清通尤善談論自房𤣥齡等咸宜品藻又可自量孰與諸子賢對曰孜孜奉國知無不為臣不如𤣥齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如溫彥博處繁理劇衆務必舉臣不如戴胄以諫諍為心恥君不及於堯舜臣不如魏徴至如激濁揚清嫉惡好善臣於數子亦有一日之長太宗深然其言羣公亦各以為盡己所懷謂之確論伏遇某官以社稷臣為詩書帥俱見前傅說之輔台德宜楫巨川尚書朝夕納誨以輔台德又若濟巨川用汝作舟楫君陳之和厥中暫藩王室尚書惟周公克愼厥始惟君陳克和厥中惟公克成厥終又以藩王室以和兄弟式篤緇衣之好見上條庸為夾袋之藏巵史吕䝉正為相諸子嘗云大人為相甚善但人言無能為公曰我誠無能但能用人此真宰相事也公夾袋中有冊子每四方人替罷謁見必問有何人才客去隨即疏之悉分門類或一人而數人稱之者必賢也朝廷求賢取之囊中故公為相文武百官各稱職者以此故令駑才亦玷鶚表某敢不激昂大節王章傳不自激昂如淳曰激厲抗揚之意師古曰卬讀曰仰仰頭為健揚雄傳激昂萬乘之主感刻異知諸侯薦人與之諸侯固無是理國士遇我報以國士請事斯言見前謝曾安撫從龍特薦詳啓意時倅武岡權知軍伏蒙鈞慈露章特薦者何武傳所舉奏二千石長史必先露章服罪者為虧除免之而已露章者欲使之知虧減也減除其狀直令免去也宋史選舉志嘉泰二年命監司守臣舉十科政績所知自代露章列薦竝籍記審察任滿則取其舉數多有政績行誼者升擢之竊以儀曹論秀舊纍殊知南史孔逖好典故學為齊尚書儀曹郎唐授禮部郎制儀曹之任實籍文雄郎吏之選必資時秀禮記大樂正論造士之秀者以告于王而升諸司馬曰進士嘉定七年曽從龍知貢舉梅亭是年登第故云帥閫舉能今叨亞選負留連之藻鑑北史王晞傳晞詣晉祠賦詩曰日落應歸去魚鳥見留連忽相王使召晞不時至明日盧思道曰昨被召得無以魚鳥致怪耶晞曰昨晚陶然頗以酒漿致責卿輩亦是留連之一物豈直魚鳥而已辱根柢於朽株鄒陽傳蟠木根柢又有人先游則枯木朽株樹功而不忘注根柢下本也施重人輕感深言淺伏念某不堪位置何足控摶見前謝曾運使舉關升條少而恥有道之賤貧冒焉干祿壯欲行所知之學問愚不適時今難望不龜之封見第二卷末條聊爾監無蟹之郡歸田録宋初懲藩鎮之弊置通判以二州事既非宫屬故嘗與知州爭權每云我是監郡朝廷使我來監汝舉動無所制有錢昆少卿者餘杭人常求補郡人問其所欲昆曰但得有螃蟹無通判則可至今以為口實東坡詩欲問君王乞符竹但憂無蟹有監州由二攝長無儋石之儲晏然揚雄傳雄家不過十金無儋石之儲晏如也粗廉且平信蠻貊之邦行矣漢宣帝紀吏不亷平則治道衰初無詞藻何有聲名周公欺我哉還贄僅收於三士見上條韓愈亦人耳願忠豈後於百官韓文韓愈亦人耳彼傲宰相又傲翰林其將何求又四海九州之人自百官已下其孰不願忠而望賜濫吹其間韓非子齊宣王使人吹竽南郭處士請為王吹竽宣王說之廩食以數百人宣王死湣王立好一一聽之處士逃一曰韓昭矦曰吹竽者衆吾無以知其善者田嚴對曰一一而聽之梁書庾肩吾傳懷鼠知慙濫竽自恥循涯而懼任昉箋顧已循涯實知塵沗陳子昂集顧揣涯分實靦心顔兹蓋伏遇某官爽邦良弼尚書爽邦由哲又夢帝賚于良弼命世元臣見前暫勤分竹於武安杜詩幾分漢庭竹潭州古長沙郡唐景福中改武安軍節度使宋湖南安撫司治所在焉曾蓋時為湖南安撫共徯聽麻於文德玉堂雜記凡鎖院文臣職事明日赴文德殿聽麻宰相樞密皆不在惟輪參政一員押麻董巴記云東京有蔡矦紙即倫也用故麻名麻紙木皮名縠紙故網名網紙初學記以生布作紙絲綖如麻故名麻紙宋文德殿即文明殿雍熙元年改名文德淳化中張洎奏今之文德殿即唐之宣政在周為中朝在漢為前殿在唐為正衙凡朔望起居大冊拜對四夷君長試制舉人皆在此曉行夜醉已開南嶽之雲杜詩夜醉長沙酒曉行湘水春東坡集公之精誠能開衡山之雲而不能回憲宗之惑宋朱辨風月堂詩話云昌黎謁衡嶽詩云噴雲泄霧藏半腹雖有絶頂誰能窮濳心默禱若有應豈非正直能感通須㬰淨掃衆峯出仰見突兀撑青空東坡廟碑即取此詩也其議論雄偉讀者皆竦或謂坡取此似傷于太易余曰三百篇詩中有婦人女子自言志者仲尼不刪去以垂訓後世乃獨疑坡之於退之乎況坡所閲文字過眼無遺他人不過蓄為詩料坡乃取之作大碑板以為議論尤不可及暮捲朝飛又作西山之雨王勃詩畫棟朝飛南浦雲朱簾暮捲西山雨雖自湖入海是亦東歸之兆詩我東曰歸然望魁與台亟還北落之樞魁四星為璇璣三台六星兩兩而居一曰天柱史記天官書北落師門一星在羽林南北長安城北門曰北落門以象此也漢天文志北宫𤣥武虗危危為蓋屋虗為哭泣之事其南有衆星曰羽林天軍軍西為壘或曰戍旁一大星北落北落若微亡軍星動角益稀及五星犯北落入軍軍起火金水尤甚火入軍憂水水患木土軍吉晉天文志北落師門一星在羽林南落者天之藩落也師門軍門也主非常以備兵李太白司馬將軍歌北落明星動光彩南征猛將如雲雷庶不戰可屈於人兵孫子百戰百勝非善之善者也不戰而屈人之兵善之善也法言狙詐家曰但詐之計不戰而屈人兵堯舜也曰不戰而屈人兵堯舜也霑項漸襟堯舜乎見用儒無敵於天下法言如用真儒無敵于天下一莊荒甚亦思向花木之陽唐餘録崔羣自中書舍人知舉歸其妻李氏勸樹莊田為子孫業羣笑曰豫有美莊良田遍在天下夫人何憂夫人曰不聞君有此業羣曰吾前歲放春榜三十人豈非良田耶夫人曰若然者君非陸贄相門生乎曰然夫人曰往年君掌文柄使人約其子簡札不令就試如君以為良田即陸氏一莊荒矣羣慙而退纍日不食餘見前半刺芬然詎意入蘋蘩之薦庾亮答郭豫書别駕舊與刺史别乘同宣王化於萬里其任居刺史之半維昔武矦之一表實同說命之三篇東坡樂全先生文集序諸葛孔明不以文章自名而開物成務之資綜理名實之意自見于言語至出師表簡而盡直而不肆大哉言乎與伊訓說命相表裏非秦漢以來以事君為悅者所能也首焉推向寵之淑均繼則舉費褘之忠實武矦出師表侍中侍郎郭攸之費褘董允等此皆良實志慮忠純是以先帝簡拔以遺陛下將軍向寵性行淑均曉暢軍事先帝稱之曰能今以二難并之美滕王閣序四美具二難并併於一不肖之身韓文忽忘身之不肖兮謂青紫其可拾自視欿然公言過矣然士固伸於知己則聽豈待於成身俱見前諸侯薦人與之諸矦久無是事國士遇我報以國士當厲乃心某敢不剗磢鈍頑剗楚限切通作剷廣韻削也磢楚兩切或作㼽說文磋垢瓦石韓文滌濯剗磢磨滅瑕垢鞭磨慵惰號門生而不知恩者非人也詎敢弭忘柳文凡號門生而不知恩之所自者非人也詩心之憂矣不可弭忘王僧孺傳思子為勞未能忘弭舊唐書郭子儀傳悼之流涕曷可弭忘唐德宗段太尉紀功碑行路興悲懦夫增氣矧豫之懷其可弭忘視匹夫不獲其所者若推之更祈終惠其為感槩郭解傳隂賊感槩師古曰感槩者感意氣而立節槩也吳都賦俗有感槩之風罔既鋪棻文選桑麻鋪棻注棻與紛通盛貌謝林寺丞行知特薦素韠御祥夢空懷於故宇韠壁吉切說文韍也所以蔽前以韋為之古者席地而坐以臨俎豆故設蔽膝以備濡漬禮記韠君朱大夫素士爵韋注此𤣥端服之韠也韠之言蔽也凡韠以韋為之以象裳色則天子諸侯𤣥端朱裳大夫素裳惟士𤣥裳黃裳雜裳也服皆素韠儀禮士冠禮筮于廟門主人𤣥冠朝服緇帶素韠即位於門東繡衣薦士選猶及於陳人莊子人而無人道是謂之陳人暌離恍隔於纍年韓詩與子昔暌離嗟余苦屯剝屯蹇既濵於九死文選紛屯邅與蹇連兮又雖九死具猶未悔暌離屯蹇用四卦名乃䝉記憶北史陳元康傳神武馬上有所號令九十餘條元康屈指數之盡能記憶尚送吹噓杜詩惟待吹噓送上天始而驚疑終則慙懼人棄而已獨取此心定異於常情史記貨殖傳人棄我取人取我與今無而古則聞兹事實關於世道非言可謝於禮敢違伏念某命固不猶詩實命不猶材亦無似禮記寡人雖無似湘濵憔悴安得自髙漁父篇屈原既放遊于江潭行吟澤畔顔色憔悴孫寶傳士安得獨自高詳别見蜀道嘻嚱固為親屈嚱休宜切通作戲李詩噫吁嚱危乎高哉蜀道之難難於上青天後漢書廬江毛義家貧以孝行稱南陽張奉慕其名往候之坐定而府檄適至以義守安陽令義捧檄而入喜動顔色奉者志尚士也心薄之固辭而去及義母死公車徴遂不至奉歎曰賢者固不可測往日之喜乃為親屈也彼蒼有罰詩彼蒼者天爾雅穹蒼蒼天也春為蒼天注萬物蒼蒼然生莫白此心棘人欒欒勞心忉忉幸而終制詩庶見素冠兮棘人欒欒勞心慱慱兮慱音團注棘急也欒欒瘠貌詩無思遠人勞心忉忉注憂勞也忉音刀正義曰以言勞心故云憂勞逹官紛紛諸公衮衮誰實恤孤杜詩諸公衮衮登臺省廣文先生官獨冷甲第紛紛厭粱肉廣文先生飯不足忽聞一節之趨禮記凡君召以三節二節以走一節以趨在官不俟履在外不俟車注節所以明信輔君命也使使召臣急則持二緩則持一常及十夫之獻尚書民獻有十夫漫令厠九人之後才難不其然厠閒也柳詩才難不其然卒與大患期山谷詩才難不其然有亦未易識至謂冠一路之賢吾斯未能信豈固察驪黃之外詩有驪有黃毛傳純墨曰驪黃騂曰黃列子秦穆公使九方皋求馬反報曰牝而黃使人取之牡而驪伯樂曰皋之所觀在其內而忘其外馬至果天下之良馬也憐其困牛皂之同鄒陽傳使不羈之士與牛驥同皂師古曰皂厯也揚雄方言云梁宋齊楚燕之間謂厯曰皂皂在早反人謂斯何韓文昔者人謂斯何公言過矣舊游門下既已玷一株之桃談叢王泠然上裴耀卿書拾遺補闕寧有種乎僕不佞亦相公一株之桃李也今去籠中乃猶取三年之艾舊唐書元行冲傳嘗謂狄仁傑曰門下賔客堪充㫖味者多願以小人備一藥物仁傑乃笑謂人曰此吾藥籠中物何可一日無也恩淪於髓漢書淪肌浹髓愧溢其肝兹蓋伏遇某官德與春和氣如秋杳杜詩司徒清鑒懸明鏡尚書氣與秋天杳方淳熙之雜然竝進固不乏於時才淳熙宋孝宗年號惟簡肅之老而愈剛實見稱於聖主宋史林栗字黃中福州福清人紹興十二年進士厯官兵部侍郎以論朱熹罷知泉州卒諡簡肅栗為人强介有才而性狷急欲快其私憤遂至詆毁名儒廢絶師教雖疇昔議論雄辨可觀不足以蓋晚節之謬也今賢者識其大者蓋有之是以似之詩左之左之君子宜之右之右之君子有之惟其有之是以似之注似嗣也左陽道朝祀之事右隂道喪戎之事此二德我先人竝能有之是以先王使其子孫嗣之不然再轉而為丞韓文再轉而為丞兹邑誰能三已而無慍遍持使簜周禮掌節以英簜輔之注謂為函器盛節一曰畫函疏云其函猶是簜但以英華有畫意故更曰畫函也始入郎闈君不行兮夷猶九歌君不行兮夷猶蹇誰留兮中州羌難得而覼縷離騷羌中道而改路羌楚人發語辭猶言何為也左思吳都賦斯實神妙之饗象嗟難得而覼縷爾梁吳筠移此乃方寸之恆情羌難得而覼縷也覼縷次第也言難知其次第也廣帥之重唐制已然韓文嶺之南其州七十其二十二𨽻嶺南節度其四十餘分四府府各置帥然嶺南節度為大府若嶺南帥得其人則一邊盡治故選帥常重於他鎮非有文武威風知大體可畏信者則不幸往往有事上弄印以選賢趙堯傳高祖持御史大夫印弄之曰誰可以為御史大夫者皇甫冉詩位重登壇後恩深弄印時公聞命而就道新唐書郭子儀傳贊朝聞命夕引道無纖介自嫌何恙弗已公孫𢎞傳君不幸罹霜露之疾何恙不已師古曰恙憂也已止也言何憂于疾不止也禮記曰疾止復初也盡興則歸王徽之傳徽之字子猷性卓犖不羈嘗居山隂夜雪初霽月色清朗忽憶戴逵逵時在剡便乘小舟詣之經宿方至造門不前而反人問其故徽之曰本乘興而來興盡而反何必見安道耶得之傳聞似恐昔疾而今愈恬於出處豈非人醉而我醒然天下之所少者非才則海濵之來歸者有日勱相我國尚書用勘相我國家謹簡乃僚尚書愼簡乃僚勉令進進不已之人皆動于于然來之意韓文必且洋洋焉動其心峨峨焉纓其冠于于焉而來矣某敢不請事斯語力勉其頑德不待於成身豈知敘柳河東之感見前謝鄒運使舉狀條士固伸於知己自當發韓昌黎之狂韓文答崔立之書士固信于知己微足下無以發吾之狂言謝瀘帥楊尚書汝明瀘州為古巴國地梁置瀘州取瀘川為名隋析富義縣置瀘川為瀘州治後置郡仍縣號唐復瀘州後改瀘川郡後復瀘州宋因之宣和初置瀘川軍節度景定初為元所取尋收復改江安州徙治江之南楊汝明眉州青神人舉進士為成都府觀察推官時吳曦叛汝明不受逆曦之招及曦平宣諭使吳獵以聞遂召汝明入補官纍遷工部尚書屬城受察已感芘身北山移文跨屬城之雄冠百里之首韓文受容受察左傳大官大邑身之庇也任昉集庇身有地帥閫簡僚更叨舉首董仲舒傳子大夫褎然為舉首得固榮於劵外莊子劵內者行乎無名劵外者志乎期費注劵分也夫行于分內者行不由于名期費有益無益期於損己以為物也山谷詩人生但安樂劵外豈吾力愧有玷於牘端嘗觀七篇之包羅史記孟子列傳退而與萬章之徒序詩書述仲尼之意作孟子七篇頗考五人之名數齊王為都之知罪惟孔距心獻子取友之難忘必樂正子使下駟或當於上駟史記孫臏之齊齊將田忌善而客待之忌數與齊諸公子馳逐重射孫子見其馬有上中下輩謂田忌曰今以君之下駟與彼上駟取君上駟與彼中駟取君中駟與彼下駟既馳三輩畢而田忌一不勝而再勝卒得王千金則後魚或誚於前魚史記魏王與龍陽君共船而釣龍陽君得千餘魚而涕下曰臣之始得魚也臣甚喜後得益大臣欲棄前所得矣今以臣之凶惡也而得為王拂枕席夫四海之內其美人亦甚多矣聞臣之得幸于王也畢蹇裳而趍王矣亦曩臣之所棄前魚也矧某不才舉世所鄙坐力田之傷地脉迄不逢年史記佞幸傳諺曰力田不如逢年善仕不如遇合列女傳力田不如逢年力桑不如遇國卿蒙恬傳此其中不能無絶地脉哉欲養生以息天黥未能絶粒莊子庸詎知夫造物者之不息我黥而補我劓使我乘成以隨先生耶任昉述異記荀環字叔偉濳修卻粒得郡豈嫌於如斗南史宗慤為豫州典籤多所連執慤大怒曰慤年六十得一州如斗大不能復與典籤共臨之蹊田適值於奪牛左傳牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣有土此有財貧於近監改邑不改井窮乃無錐易改邑不改井無喪無得傳燈録香巖頌去年貧未是貧今年貧始是貧去年貧無卓錐之地今年貧錐也無華陽國志瀘州土地雖迫山川特美鹽井魚池一郡豐沃不幸千里之旱可哀竟無斗升之水以活莊子君豈有升斗之水而活我哉詳見前蒙袂弗勝其貿貿禮記有餓者蒙袂輯履貿貿然來納溝寖覺其纍纍石顯傳印何纍纍師古曰纍纍重積也救火暇問丈人只得焦頭而爛額高五王傳失火之家豈暇先言丈人而後救火乎霍光傳曲突徙薪亡恩澤焦頭爛額為上客耶無麵欲為巧婦但知剜肉以醫瘡陳后山詩巧手莫為無麵餅誰能留渴待逺井聶夷中詩醫得眼前瘡剜卻心頭肉陳後山詩昔日剜瘡今補肉思飢實自於己飢忍痛難思於方痛韓文今而思之如痛定之人思當痛之時不知何能自處也非惡其聲也實關鄉人孺子之心何誕之節兮固賴方伯連帥之惠誕音單詩旄丘之葛兮何誕之節兮注誕濶也言旄丘之葛兮何為濶之節兮以當蔓延相及以興方伯之國何為使之連屬亦當憂患相及禮記天子百里之內以共官千里之內以為御千里之外設方伯五國以為屬屬有長十國以為連連有帥鶴膝蜂腰尚未全復南史齊陸厥傳沈約用以聲制韻有平頭上尾蜂腰鶴膝此借用牛溲馬勃何足兼收韓文牛溲馬勃俱收竝蓄兹蓋伏遇某官德與春融氣如秋杳杜詩尚書氣與秋天杳閶闔之開黃道夙高北闕之星辰杜詩閶闔開黃道衣冠拜紫宸高帝紀蕭何治未央宫立東闕北闕師古曰未央殿雖南嚮而上書奏事謁見之徒皆詣北闕公車司馬亦在北焉是則以北闕為正門也斧鉞之下青冥暫養南山之霧雨杜詩斧鉞下青冥樓船過洞庭北風隨爽氣南斗避文星列女傳陶答子相陶其政不修而家益富其妻抱子而泣姑問泣何也曰妾聞南山有𤣥豹霧雨不下食欲以澤其身而有文章也故有威而逺害今夫子不修德而家益厚禍且至矣謝朓詩雖無𤣥豹姿且隱南山霧七年可即戎矣九罭以公歸兮詩序九罭美周公也詩是以有衮衣兮無以我公歸兮箋云願以衮衣封公于此無以西歸此借用觀察急於賦刺史私於民洞知委折韓文為刺史者恆私于其民不以實應乎府觀察使者恆急於其賦不以情信乎州誠使刺史不私于其民觀察使不急于其賦如是而政不均令不行者未之有也今日飲者恩來日按者法未忍舉行蘇章傳故人為清河太守章行部按其姦臧乃請太守為設酒肴陳平生之好曰今日蘇孺文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪閔其存活數千之羸說文羸瘦也禮記注羸憊貌東坡詩何以纍君子十萬貧與羸寵以治平第一之薦賈誼傳河南守吳公治平為天下第一然飢饉札瘥之甫定熙洽謂何札側八切周禮司關凶札注謂疾疫死亡也國語夭札瘥昏注疫死曰札瘥才何切爾雅病也杜預曰小疫曰瘥大疫曰札且文詞學問之久荒博深安在尚書拔十得五矣文選拔十得五尚曰比肩蜀志龎統性好人倫每所稱述多過其才時人怪而問之統曰當今雅道陵遲善人少而惡人多今拔十失五猶得其半而可以崇邁世教使有志者自厲不亦可乎新唐書趙憬傳拔十得五賢愚猶半李綘傳古人言拔十得五猶得其半孝亷聞一知幾耶左雄傳雄請孝亷年不滿四十不得察舉廣陵徐淑年未及舉臺郎詰之答曰詔書曰有如顔回子竒不拘年齒是以本郡以臣充選郎不能屈雄詰之曰昔顔回聞一知十孝亷聞一知幾耶德不待於成身士固伸於知已見前某敢不懲羮吹沸楚辭懲於羮而吹虀兮何不變於此志也傅奕傳懲沸羮者吹冷虀傷弓之鳥驚曲木求牧與芻諸侯失國託於諸侯無使飢餓於吾土國士遇我報以國士敢忘佩服於斯言銜荷惟深戴宣罔既代謝衛參帥涇浮食畫墁又占芙蓉之幕禮記君子與其食浮於人也寧使人浮於食四六集營開楊柳幕展芙蓉李文饒詩芙蓉客暫依劉夢得詩歸路芙蓉幕飛章推轂遂依桃李之門蔡雍傳陳璜使人飛章言雍餘見前敬裁小子狂簡之章少謝大鈞坱圠之賜見前伏念某地寒無狹劉向别録鄒衍在燕地美而寒不生五穀新唐書舒元輿傳地寒不與士齒詳見前天巧亦慳韓詩文字窺天巧束坡詩召用既晚矣天命良復慳又若人富天巧又似亦費天巧又嘲笑破天慳李詩披豁露天慳王介甫詩不恤我躬瘁乃歎天澤慳膽落穹廬莫繼忠宣之衣鉢蘇武傳賜武馬畜服匿穹廬揚雄傳碎轒輼碎穹廬注旃帳也胸奴傳胸奴父子同穹廬卧師古曰其形穹隆故曰穹廬洪皓傳皓字光弼番陽人少有竒節登政和四年進士假禮部尚書使金不屈流遞冷山留北中凡十五年忠義之聲聞於天下以忤秦檜安置英州卒諡忠宣力扛洪鼎又慙文惠之箕裘法言力有扛洪鼎揭華旗洪適傳適字景伯皓長子也與弟遵同中博學宏詞科後三年弟邁亦中是選由是三洪名滿天下適以文學聞望遭時遇主自兩制一月入政府又四閲月居相位又三月罷政家居十有六年卒諡文惠徒藉義方左傳石碏曰臣聞愛子教之以義方獲沾世祿雖幸挂名於秋賦文選使名挂史筆韓文挂名經端韻㑹貢士曰賦朝錯傳以臣充賦猶民歸賦於縣官故曰上以正取謂之賦互見前未能得雋於春闈左傳得雋曰克又以中雋也元稹詩競走墻前稀得雋高懸日下表無私姚鵠詩三年竭力向春闈塞斷浮華衆路岐蒯希逸詩一振聲華入紫微三開秦鏡照春闈槃旋州縣之勞蔡雍釋誨盤旋乎周孔之庭宇韓文隱者之所盤旋祇栗簡書之畏偶終墨綬見前獲近碧幢方干詩問津求拜碧油幢歐陽詹詩十萬兵車擁碧油適泰階六符之光擁元戎十乘之寄俱見前生匠石之園長伯樂之廄固可卜其終身韓文是生於匠石之囷長於伯樂之廄者也挹浮丘之袂拍洪崖之肩復自憐其凡骨郭璞遊仙詩左挹浮丘袖右拍洪崖肩借問蜉蝣輩寧知龜鶴年聊作斗升之活敢希分寸之攀俱見前況西山行地之仙有八百輩許真君傳真君留讖云吾仙去一千二百四十年間豫章之境五陵之內當出地仙八百人其師出于豫章大揚吾教江心忽生沙洲掩過沙井口者是其時也而旌陽同日之舉僅十二人十二真君傳許真君名遜字敬之本汝南人也弱冠師大洞君吳猛傳三清法要鄉舉孝亷拜蜀旌陽令以晉室棼亂棄官東歸以東晉孝武帝太康二年八月一日於洪州西山上升與同升十二弟子作勸戒詩十首以遺世真君升龍車命弟子陳勳時荷冊前導周廣曽亨驂御黃仁覽與其父族侍從旴烈與其母郭侍從仙春四十二人同時白日拔宅上升雞夫亦從不應妄庸見前亦預推薦兹蓋伏遇某官三朝元老詩方叔元老四海真儒法言魯不用真儒故也如用真儒無敵于天下魁下兩星付榮進於素定史記天官書魁下六星兩兩相比者名曰三能餘見第一卷上曽樞密條胸中五色補造化而不言山谷詩公有胸中五色線平生補衮用功深李賀詩筆補造化天無功靡辭三命之滋共左傳宋正考父佐戴武宣三命滋益恭故其鼎銘曰一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是粥於是以糊余口要厯四方之維翰詩四方攸同王后維翰自洪移福瓣香續𣲖於南豐洪州有洪崖以洪崖先生居之隋文帝因以名州福州有福山郡國志上有神人裸身散髮人見必有福唐因更閩州曰福州按曽南豐行狀為英宗實録檢討官通判越州厯知齊襄洪州進直龍圖閣知福州兼福建路兵馬鈐轄所謂自洪移福也餘見前由登入京夾道寄聲於司馬登州古牟子國以文登山得名宋史司馬光傳蘇軾自登州召還緣道人相聚號呼曰寄謝司馬相公毋去朝廷厚自愛以活我司馬溫公行狀神宗崩公赴闕庭衛士見公入皆以手遮額曰此司馬相公也民遮道呼曰公無歸洛留相天子活百姓所在數千人公懼遂徑歸洛閩閫休歌於來暮見前吳儂莫切於去思東坡詩語音猶自帶吳儂何武傳其所居亦無赫赫名去後常見思謝安傳在官無當時譽去後為人所思陜而東陜而西方欲𢎞周召之化洛之南洛之北務多收溫石之材俱見前包荒得尚于中行易包荒用馮河得尚於中行采菲何嫌於下體見前致兹孤進亦纍一陶崔駰傳壞冶一陶某敢不退自激卬王章傳不自激卬勉圖報稱孔光傳無以報稱注稱副也滕王閣之合賔佐既辱異知韓文滕王閣記其年九月公與監軍使燕于此閣文武賔士皆與在席新唐書王勃傳勃道出鍾陵九月九日都督大宴宿命其壻作序以夸客因出紙筆遍請客莫敢當至勃泛然不辭都督怒起更衣遣吏伺其文輒報一再報語益竒乃矍然曰天才也請遂成文極歡罷翹材館之招賢人應無棄物見前代謝帥座契家子弟謝合尖五代史李嵩傳長興中明宗春秋高秦王從榮多不法晉高祖為六軍副使懼禍及求出外藩時契丹入鴈門明宗選將以捍太原晉祖欲之議久不決嵩曰太原國之北門宜得重臣非石敬塘不可晉祖深德之隂遣人謝嵩曰為浮圖者必合其尖蓋欲使嵩終始成已事也按宋制薦舉限以五員以初薦為破白末薦為合尖亦云合頴塵埃委吏夙依厦屋之萬間杜詩安得廣厦千萬間造化全功遂拜春風之一紙楊誠齊求陳壻薦書詩獨念東牀客猶沉左選曹春風半張紙立地作宜敖受知襞積相如傳襞積褰皺鬱橈溪谷張衡思𤣥賦美襞積以酷烈兮懷感輪囷鄒陽傳輪囷離竒注囷音去輪反輪囷離竒委曲盤戻也韓詩窮途致感激肝膽還輪囷竊以山巨源之念遺孤吾聞語矣山濤傳濤字巨源少有器量與嵇康吕安善後遇阮籍便為竹林之遊康後坐事臨誅謂子紹曰巨源在汝不孤矣杜詩范雲堪作友嵇紹自不孤柳子厚之記先友誰實圖之柳子厚先君石表隂先友記先君之所友凡天下善士舉集焉今之世言交者以為端敢悉書所尤厚者附兹石以銘于背非遲遲於救死之八珍韓詩救死具八珍不如一簞犒詳見前則淺淺於蘇枯之一溉韓文蘇枯弱彊嵇康養生論夫為稼于湯之世偏有一溉之功者雖終歸于焦爛必一溉者後枯然則一溉之益固不可誣也東坡詩區區效一溉豈能濟含生又一溉兹湯旱有如念故人之子擢之於管庫之中禮記趙文子所舉於晉國管庫之士七十有餘家成始成終不進不止魏志荀令君之進善不進不休宋書劉穆之為丹陽尹凡所薦逹不納不止以此稱於天下韓文感恩則有之矣將以稱於天下曰知己知己則未也豈當求之今人王衍傳武帝聞其名問王戎曰夷甫當今誰比戎曰未見其比當從古人中求耳杜詩似君須向古人求某窺管識卑東方朔傳以管窺天注管古管字三國志注庚申令曰議者以軍吏雖有功能德行不足堪任郡國之選明君不官無功之臣不賞不戰之士治平賞德行有事賞功能論者之言一似管窺虎歟世說王獻之數歲時嘗看諸門生樗蒲見有勝負因曰南風不競門生輩輕其小兒乃曰此郎亦管中窺豹時見一班宋莊綽雞肋云人知管窺為王獻之事而其原乃魏武令中語故兩著之挈瓶知小左傳雖有挈瓶之知守不假器禮也瓶汲水器也言小知為人守器尚知不以假人備太史牛馬之走終覺駑庸司馬遷報任少卿書太史公牛馬走走猶僕也謙言已為太史公掌牛馬之僕讀先人科斗之藏卒無象似孔安國尚書序於壁中得先人所藏古文虞夏商周之書及傳論語孝經皆科斗文字昌黎科斗書後記愈事董丞相幕府識閒封令服之者陽冰子授余以其家科斗孝經愈實蓄之而不暇學曽南豐詩深愧薄材無像肖羌為貧而出仕羌發語辭猶言何為窘將母之不遑詩王事靡盬不遑將母毛傳將養也倚門之望既深見第一卷上曽運使條對床之歡亦廢韋蘇州示元真元常詩那知風雨夜復此對牀眠東坡與子由詩對牀欲作連宵話野客叢書云東坡詩蓋祖韋蘇州然韋又有贈令狐士曹詩有秋簷滴滴對牀寢之句則夜雨對牀亦可施於朋友白樂天招張司業云能來同宿否聽雨對床眠此善用韋意不膠於兄弟也至鄭谷訪元秀上人詩云且共髙僧對榻眠思元昉上人詩云每思聞淨語夜雨對繩牀則夜雨對牀亦可施於僧矣今人但用之於兄弟者以其經東坡拈出故耳雞鶩爭食難舒狷者之懷烏鵲無依漸作歸歟之計俱見前豈謂荆潭之裴垍昌黎有荆潭唱和詩序注此謂裴垍楊憑唐藝文志有裴均荆潭倡和集一卷作裴垍非首求瀍榖之石洪昌黎送石處士序御史大夫烏公為節度之三月求士于從事之賢者有薦石先生者曰先生居瀍穀之閒仁且勇若以義請而彊委重焉其何說之詞總角丱兮憐其進拜於牀下丱古患切音慣本作丱束髮貌詩婉兮孌兮總角丱兮毛傳丱幼稚也箋云丱然而稚正義云總聚其髮以為兩角丱然兮幼稚如此馬援傳援有疾梁松來候之獨拜牀下援不答諸子問曰梁伯孫帝壻貴重朝廷大人奈何獨不為禮援曰我乃松父友也雖貴何得失其序乎厥齒長矣不應曵尾於途中左傳子之齒長矣不能事人又君之齒長矣未有太子莊子楚有神龜巾笥而藏之廟堂之上此龜者寧其留骨而貴乎寧其生而曵尾於塗中乎潘尼鱉賦或頓足而鷹距或曵尾於塗中假之寵靈後漢書鄧隲傳寵靈顯赫長其光價唐文粹生其羽翼長其光價韓詩光價豈止百倍過遂從數月卒獲四章譬如為山實易虧於一簣尚書為山九仞功虧一簣志在流水誰能寫之五絃李詩愧非流水韻叨入伯牙絃山谷詩當時朱絃寫心曲果在高山流水間禮記舜作五絃之琴以歌南風之詩而天下治忽逢公車之交劉向傳章交公車人滿北軍遂合浮圖之穎宋制改官限舉者五員最後一章謂之合穎父書是讀果何有於家聲史記趙奢傳藺相如曰括徒能讀其父書不知變也司馬遷傳陵既生降隤其家聲梁任昉傳四子竝無術業墜其家聲兒事已癡豈真明於吏治傅咸傳生子癡了官事官事未易了也詳見前伏讀八字足華一生卵而翼之所謂如天之福我左傳勝如卵豫翼而長之資治通鑑上問姚崇卿子何官才性何如對曰臣子為人多欲而不謹是必以事干魏知古知古微時臣嘗卵而翼之李義山集卵翼不自於他門頂踵實非其己物左傳如天之福兩君相見何以代此顔之厚矣未知何地以報公尚書顔厚有忸怩詩巧言如簧顔之厚矣此蓋伏遇某官藩屏重湖南遷録洞庭湖西岸有沙洲堆阜隆起在青草湖下一湖之內中有此洲南名青草北名洞庭所謂重湖也凖繩百吏坱圠播物大鈞運於無垠見前追琢成章小子至於有造詩周王壽考遐不作人追琢其章金玉其相毛傳追雕也金曰雕玉曰琢相質也又成人有德小子有造毛傳造為也鄭箋成人謂大夫士小子其弟子也憐宣孟之無後左傳韓厥言於晉矦曰成季之勳宣孟之忠而無後為善者懼矣成季謂趙衰宣孟謂趙盾也撫叔敖之如生滑稽傳楚相孫叔敖且死屬其子曰我死汝必貧困若往見優孟言我孫叔敖之子也居數年其子窮困負薪逢優孟與言曰我孫叔敖之子也優孟即為敖衣冠抵掌談語歲餘像敖莊王置酒優孟前為壽莊王大驚以為孫叔敖復生也褒華衮之一言器蟠木於萬乘俱見前遂令長往之興後漢書逸民傳贊江湖冥滅山林長往遠性風疏逸情雲上亦入旁招之儲重惟此恩將何以謝某敢不恪共爾位惟既厥心我有二天已幸厠七十家之舉士更三日猶希與八百吏之除俱見前代謝茶漕司詳啓意其人姓晏名大正蓋晏殊之後需次糟丘敢圖內舉李詩憶昔洛陽董糟丘為余天津橋南造酒樓又此江若變作春酒壘麯便作糟丘臺左傳外舉不避仇內舉不避親贅貟油幕使效裏言左傳寡人出伯父無裏言入又不念寡人昉兹服役之初昉音倣公羊傳昉於此乎注昉適也齊人語敢廢修詞之敬易修詞立其誠竊惟中興重藩宣之寄詩序蒸民尹吉甫美宣王也任賢使能周室中興焉漢宣帝紀贊可謂中興德侔殷宗周宣矣光武紀孝宣帝化致升平稱為中興後漢書光武受命中興丙吉傳贊孝宣中興丙魏有聲蘇武傳明著中興輔佐趙充國傳在漢中興充國作武循吏傳序漢世良吏于是為盛稱中興焉韋𤣥成傳荆蠻來威故稱中興劉歆傳武帝單于守藩百蠻服從中興之功未有高焉者也胸奴傳四夷賔服稱為中興王導傳禮樂征伐翼成中興茍嵩傳元帝天縱聖哲光啓中興祖逖傳士雅叶迹中興克復九州之半唐蔣義傳非我失之自我復之為中興光武是也郭子儀傳中興之功日月可冀杜詩今朝漢社稷重數中興年注中竹仲反又百年垂死中興時故於機事置書局之官中興㑹要國朝安撫司其屬有勾管機宜文字建炎初新置主管機宜文字書寫機宜文字各一員紹興四年詔書寫機宜文字除係事干機密其餘文字竝不得簽書俸給京官依通判選人依簽判當建炎羽檄之交實許陪於贊畫宋高祖即位改元建炎漢髙帝紀羽檄徵天下兵息夫躬傳羽檄重迹而狎至師古曰檄者以木簡為書長尺二寸用徵召也其有急事則加以鳥羽插之示速疾也魏武奏事云今邊有警露檄插羽逮紹興鞬櫜而後始無預於文移建炎五年改元紹興樂記包以虎皮名曰鞬櫜鄭𤣥注甲兵之衣曰櫜其字或作建臯史記車甲韜而藏之府庫而弗復用倒載干戈苞之以虎皮將率之士使為諸侯名之曰鞬櫜王肅曰所以能櫜干戈而不復用者將率之力也故建以為諸矦謂之建櫜也雖曰閒曹唐詩閒曹猶得醉薄俸勝耕田然亦異數左傳名位不同禮亦異數如某者志雖自好學未知方為箕為裘亦自勉家傳之業見前不狩不獵居然承世祿之恩詩不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有縣貆兮未敢荒筆硯之耕唐王勃所至請為文人謂舌織而衣筆耕而食然已負懷繃之愧韓詩簪笏自懷繃一行作吏甚安管庫之卑嵇康傳一行作吏此事便廢餘見前萬里侍親忽有從軍之命淮南王傳丁壯從軍傅介子傳以從軍為官猥容浮食禮記君子與其使食浮于人也寧使人浮于食使典內籌幸若出於天然恐有為之地者俱見前恭惟某官氣質凝遠新唐書宋璟傳璟風度凝遠人莫涯其量風調浚明黃鍾為宫散作人間之和氣律厯志問而吹之以為黃鍾之宮史記律中黃鐘白虎通黃鍾中和之氣言陽氣于黃泉之下動養萬物大玉不琢中藏天下之至文禮記大圭不琢山谷詩天球不琢中粹和肯為入蜀之星實卜守吳之嵗周爰咨度暫煩四牡之馳俱見前薄言旋歸即護六飛之馭詩執訊獲醜薄言還歸還音旋文帝紀帝躬御六飛親至潭袁盎傳陛下騁六飛馳不測注六馬之疾若飛也凡叨氣類文選𢎞長風流許與氣類例沐吹噓致令疵賤之蹤范雲詩物情棄疵賤獲𨽻走趨之數某敢不靖共爾位洗濯其心竝見前詩禮聞於過庭敬修可願尚書敬修其可願孝友施於有政增益未能代謝茶使與合尖以下徽本分作第三卷今依家藏本及鄢陵劉氏本併歸二卷綴玉鈐之冷幕已迫踐更鈐其淹切兵鈐以閉房神府以備非常後漢書方術傳鈐決之符注云兵法有玉鈐篇及𤣥女六韜要決曰太公對武王曰主將有隂符則鈐符皆兵家所用李靖有兵鈐新書一卷隋志有太公隂符鈐録一卷宋有景德虎鈐經王勃太公贊豹韜禳惡龍鈐辟邪六一居士詩符略縱橫輕玉鈐飛金節之薦函偶成合穎周禮凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以金為節鑄龍虎人之象柳文幢牙茸纛金節折羽功莫崇於引重灌夫傳兩人相為引重惠莫大於成終㳙吉日以修詞漢禮樂志㳙選休成注㳙除也除惡選取美成者也宋祖廟歌録時㳙日詩吉日維戊又吉日庚午順下風而請謝莊子黃帝順下風膝行而進左傳羣臣敢在下風鄒陽傳竊高下風之行竊惟選舉既弊授受俱難相易則從之輕已發蘇老泉之歎用決者恨其早可考黃山谷之詩山谷詩用智常恨髦用决常恨早推轂天下士誠心要傾倒海宇日清明廟堂勤灑掃何為陳師道白髮三徑草君驕士而士亦驕君主擇客而客或擇主故達官多寡助之恨而志士無茍合之期諸葛豐傳茍合取容兩不相逢一至此極況如大正可謂小知緬思舊學之碑有慙元獻宋史晏殊字同叔撫州臨川人七歲舉神童賜同進士出身仁宗朝宰相諡元獻篆其碑首曰舊學之碑不傍貴人之户卻似小山晏幾道字叔原有小山詞一卷山谷序之曰叔原人英也其癡亦自絶人仕宦連蹇而不能一傍貴人之門是一癡也論文自有體不肯一作新進士語此又一癡也費資千百萬家人飢寒而面有孺子之色此又一癡也百人負之而不恨己信人終不疑其欺己此又一癡也至其樂府可謂俠邪之大雅豪士之鼓吹若妙年美士近知酒色之娛苦節臞儒晚悟裙裾之樂鼓之舞之使宴安鴆毒而不悔是則叔原之罪也哉第恐荒簪笏之家陳子昂集屈富貴於沉冥雜薜蘿於簪笏未免厲布韋之業賈山傳布衣韋佩之士虀鹽十載於太學僅竊末科韓文太學四年朝虀暮鹽草茅一介之狂言幾投大僇馬周傳由一介草茅言天下事范滂傳今之循善身陷大僇莊子為世大僇甫息浮湘之枻冒隨諭蜀之車司馬相如傳遣相如責唐䝉等因諭告巴蜀民以非上意録録無竒安有幕中之辨漢書蕭曹傳贊録録未有竒節韓文幕中之辨人反以汝為叛沾沾自喜若為席上之珍竇嬰傳魏其沾沾自喜耳師古曰沾沾輕薄也禮記儒有席上之珍以待聘偶蒙諸臺共剡乘矢法言奏不剡繫辭剡木為矢言有四薦為山九仞極知一簣之虧見前撞鐘千鈞此豈寸莛之力莛音亭說文枝莖也魏志萬石之鐘不以寸莛起音誰其從臾韻會慂勸也方言南楚凡已不欲喜怒而旁人說者謂之慫慂或作臾衡山王傳日夜縱臾如淳曰縱才勇切臾讀作勇師古曰奬勸亦或作容辱此吹噓樂莫樂兮相知何敢急於自衒屈原九歌樂莫樂兮新相知東方朔傳自衒鬻者以千數梅福傳赴闕庭自衒鬻者不可勝數文選自衒自媒者士女之醜行也遲之遲而又久諒欲察其所安禮記賔牟賈起免席而請曰夫武之備戒之已久則既聞命矣敢問遲之遲而又久何也好不改於緇衣褒果踰於華衮竝見前退惟內朴反稱凝重之姿正愧中乾何取純深之學左傳外彊中乾柳文外邪中乾殆假㸃睛之筆水衡記張僧繇于金陵安樂寺畫四龍不㸃睛每云點之即飛去人以為妄誕因點其一須臾雷霆破壁一龍乘雲上天俾舐換骨之丹列仙傳淮南王仙去餘藥器置在中庭雞犬舐啄之盡得升天歐陽永叔詩換骨莫求丹九轉榮名何待祿千鍾山谷詩欲换凡骨無仙丹人訝其通籍之階宜淹而速元帝紀得為大父母父母兄弟通籍應劭曰籍者為二尺作牒記其年紀名字物色懸之宫門案省相應乃得入也陳湯傳宜以時解懸通籍孟康曰通籍不禁止令得出入也魏相傳霍夫人顯及諸女皆通籍長信宫師古曰通籍謂禁門之中皆有名籍恣出入也自恐負親民之計雖寵若驚老子寵辱若驚此蓋伏遇某官風鑒精明袁宏傳風鑒散朗或搜或引王導傳少有風鑒識量清逺陸機傳贊風鑒澄爽神情俊邁天機沉邃淮南子內有以通于天機而不以貴賤貧富勞逸失其志德者也晉書郭文傳天機鏗宏莫有窺其門者逶遲苞栩盍周道之遄歸詩肅肅鴇羽集于苞栩王事靡盬不能藝稷黍蔽芾甘棠殆召公之是似詩蔽芾甘棠又無曰豫小子召公是似峻東壁圖書之領晉天文志東壁二星主文章天下圖書之祕府也李泌傳月蝕東壁祕曰東壁圖書之府吾以宰相并學士當之矣專西秦權牧之司提舉秦州茶馬相馬舉肥恐小駟有足乘之理宋玉九辨今之相者兮舉肥騏驥伏匿而不見兮左傳乘小駟鄭入也小駟馬名鄭國所獻煎茶有味思大匠無可棄之材山谷煎茶賦前四後四各用其一少則美多則惡發揮其精神又益於咀嚼蓋大匠無可棄之材太平非一士之略以為茶馬提舉所薦故以茶馬為喻欲令轅下之駒漫僃籠中之物故雖弄印迄使在鎔某敢不謹佩此恩力鞭其鈍公車薦士諒不收私報之情直道事人持此答曲成之造竝見前代董侍郎謝史丞相詳啓意蓋代董居誼六年百謫託大造以全生陳遵傳故事有百適者斥注適讀曰謫左傳秦師克還無害則是我有大造于秦也一旦異恩録微勞而贖過劉向說苑主有超異之恩則臣必死以復之盡復官階之舊仍沾祠廩之新毫髮不出於他人李義山集卵翼不自於他門頂踵實非其己物頂踵皆歸於化地任彥升集自頂至踵功歸造化伏念某素無操挾積有僥逾州縣常才既躐從甘泉之槖揚雄傳每上甘泉常法從師古曰法從者以言法當從耳一曰從法駕也趙充國傳安世待槖簪筆張晏曰槖契囊也近臣負囊簪筆從備顧問或有所紀也藩垣重寄更溢分益部之符李郃傳使者二人當到益部指心願報於寵光蜀志徐庶辭先主而指其心曰本欲與將軍共圖王霸之業者以此方寸之地也詩為龍為光傳龍寵也疏為君所寵遇為君所光榮揣力終牽於分量體廟謨安靜之意何敢勤兵光武紀明明廟謨承宣司減汰之餘又難增戍然畫地而守之策孫子虗實篇我不欲戰雖畫地而守之敵不得與我戰者乖其所之也後漢書荀彧傳以十分居一之衆畫地而守之注言畫地作限隔也鄒陽傳畫地而不敢犯亦無日不討諸人㑹殘息欲竄身於三秦韓信傳三秦可傳檄而定也項羽三分關中立秦將章邯為雍王都廢丘司馬欣為塞王都櫟陽董翳為翟王都高奴是為三秦聚重兵專垂涎於四蜀賈誼新書垂涎相告巴蜀黔漢為四蜀計我師之籍無八萬人分邊面之屯幾二千里宋隆興初賀子忱知樞密院有武臣陳理功賞辭氣不平謂朝廷推賞一次輕如一次賀正色云只為邊面一次近如一次武臣無辭上藉朝廷之威德下憑將士之忠誠首殄渠魁既奏皂郊之一鼓尚書殲厥渠魁皂郊堡在天水軍天水縣四十里去秦州二十里左傳一鼓作氣既殲羣醜不遺嶓冢之隻輪詩順彼長道屈此羣醜榖梁傳匹馬踦輪無反者注踦輪一隻之輪公羊傳匹馬隻輪無反者注匹馬一馬也隻踦也皆喻盡潘嶽西征賦曾隻輪之不反􅔗三師以濟河偶興元偏帥殞於挑兵左傳三次及於事而帥偏師言非全軍致散關諸卒潰而延敵陸儼山知命録大散關在寶雞南二十里和尚原在焉山自西來即秦嶺一支不獨為秦蜀之界亦中國南北之界也方輿勝覽云大散關在沔州梁泉縣係極邊為秦蜀要路按漢高帝引兵從固道敗章邯於陳倉諸葛出散關圍陳倉曹操自陳倉出散關至河池後魏尉遲回自散關伐蜀後唐郭崇韜入散關取鳳州石敬塘伐蜀入散關後周王璪出兵自散關趨秦州李義山詩散關三尺雪回夢舊鴛機今按後漢書延岑引北入散關注在陳倉縣南十里有散谷水勝覽失引一統志大散關在今寶雞縣南五十二里通褒斜大路宋史寧宗開禧二年十二月金人破大散關三年夏四月四川忠義人復大散關尋復破嘉定元年六月金人歸大散關十年十二月統制劉雄棄大散關遁金人據之十一年二月金人焚大散關雖在韋臯去鎮之後韓文疆外之險莫過蜀土韋臯去鎮劉闢守後血人于牙不敢吐口難逃孔明貶職之辜蜀志街亭之敗戮馬謖以謝衆上疏曰臣以弱才叨竊非據不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣請自貶三等以督厥咎投畀囚山甘作浯溪之老詩取彼讒人投畀豺虎豺虎不食投畀有北有北不受投畀有昊柳河東囚山賦虎豹咆口闞代狴牢之吠嘷豫胡井眢以管視兮窮坎險其焉逃匪兕吾為柙兮非豕吾為牢聖日以理兮賢日以進誰使吾山之囚吾兮滔滔浯溪在今永州祈陽縣南五里流入湘江唐元結自道州歸愛其山水因家焉宋陳衍云元氏始命之意因水以為浯溪因山以為峿山作室以為􅝓室三吾之稱我所自也制字從水從山從廣我所命也三者之目皆自吾焉我所擅而有也適逢沛澤遂叨汝水之歸汝水在臨川東北六里謝靈運集序瀕汝水以為城兹遇飛龍之御天易飛龍在天又時乘六龍以御天曲念病駒之屬地柳河東起廢答中廄病顙之駒以其病不得齒他馬食斥棄異早恆少食屏立擯辱掣頓異甚垂首披耳懸涎屬地録其尺寸踦許復於鴈門孔光傳卒無尺寸之效踦音欹說文一足也方言梁楚之問物體不具者謂之踦雍梁之間獸支體不具者謂之踦段會宗傳足以復鴈門之踦注會宗為鴈門守坐事廢後復為都尉故云活以斗升涸足蘇於鮒轍見前孰主張是莊子孰主張是孰維綱是遂濟登兹韓文上勤下順遂濟登兹不亦休乎此蓋伏遇某官柱石九筵霍光傳將軍為國柱石師古曰柱者梁下之柱石者承柱之礎也言大臣負國重任如屋之柱及其石也周禮夏后氏太室殷人重屋周人明堂度有九尺之筵禮記疏明堂在國之陽其制東西九筵東北七筵堂崇一筵五室凡室二筵綱維八極淮南子廓四方析八極注八極八方之極晉地理志八絃之外名為八極八極之廣東西二億三萬一千三百里南北二億三萬一千三百里談笑洗咸池之日新唐書狄仁傑傳贊取日虞淵洗光咸池詳見前從容封函谷之泥隗囂傳囂將王元以為天下成敗不可知不願專心內事遂說囂曰今天水完固士馬最强北收西河上郡東收三輔之地案秦舊迹表裏山河元請以一丸泥為大王東封函谷關此萬世一時也梁戴皓從軍行當今函谷上惟見一丸泥博陸之益戶萬七千詎足報伊周之烈霍光傳以河北東武陽益封光萬七千戶與故所食凡二萬戶贊曰光以結髮內侍遂匡國家安社稷擁昭立宣雖周公阿衡何以加此汾陽之書考二十四自應褊齊晉之功新唐書郭子儀傳授中書令考二十四贊曰子儀完名高節爛然獨著福祿永終雖齊桓晉文比之為褊方藏疾以匿瑕左傳山藪藏疾瑾瑜匿瑕務厲世而磨鈍梅福傳爵祿束帛者天下之底石高祖所以厲世磨鈍也復其官為子孫之計見此恩乃父母之心某敢不仰佩殊私益磨晚節鄒陽傳晚節末路石顯傳元帝紀晚節寢疾師古曰晚節猶言末時也顔真卿傳晚節偃蹇誘我松桂未敢勒北山之移孔稚圭北山移文誘我松桂欺我雲壑收之桑榆庶幾補東隅之失馮異傳異大破赤睂於崤底降璽書勞異曰赤睂破平士卒勞苦始雖垂翅回溪終能奮翼澠池可謂失之東隅收之桑榆代陳帥機元勳謝衛參帥涇細書成文搜實材於公舉後漢書循吏傳其以手迹腸方國者皆一札十行細書成文大鈞播物挈冗吏以名聞雖嘗僃於使令初無堪於選録況受及瓜之代難徼采菲之恩竝見前不謂三人之占尚書三人占則從二人之言孔傳夏殷周卜筮各異三法竝卜乃使匹夫之被一陶異甚見前再省瞿然瞿權俱切說文鷹隼之視也徐曰驚視貌禮記曽子聞之瞿然又瞿瞿如有求而弗得疏眼目速瞻之貌又視容瞿瞿疏驚遽之貌伏念某頑疏之資浮沉於世游俠傳豈若卑論齊俗與世浮沉而取榮名哉世說顧劭問龎士元吾與子孰愈曰陶冶世俗與時浮沉吾不如子論王霸之餘䇿覽倚伏之要害吾似有一日之長塵容俗狀果何有於詳華文選抗塵容而走俗狀綿力薄材豈真能於强濟嚴助傳越人綿力薄材不能陸戰門䕃只宜於平進晉書范𢎞之傳階籍門䕃屢登崇顯庾亮傳皆非姻族各以平進後周劉璠欲立邊功不樂隨牒平進南史蔡興宗傳吾素門平進與主上甚疏新唐書選舉志朋比貴勢妨平進之路唐孫綮北里志序多膏梁子弟平進嵗不及三數人南史王騫傳謂諸子曰吾家本素族自可依流平進不須茍求閫僚自合其宣勞粗奉文書無可言之功狀史記鯀之治水無狀索隱曰言無功狀非有方略難曲盡於事宜霍去病傳上嘗欲教之吳孫兵法對曰顧方略何如耳趙充國傳上問度羌虜何如充國曰千聞不如一見兵難喻度臣願馳至金城圖上方略薛宣傳下至財用筆硯皆為設方略利用而省費是直常鱗凡介之匹儔韓文天池之瀆大江之濆曰有怪物焉蓋非常鱗凡介之品彚匹儔也何計乘鴈雙鳬之多少揚雄傳江湖之雀勃解之鳥乘鴈集不為之多雙鳬飛不為之少矧入幕之日淺而歸袖之風披韓詩寧當不俟報歸袖風披披三匝倣徨不識捲簾之意一封覼縷忽聞推轂之言俱見前得之駭然望不及此文選臣之始望尚未至是溫庭筠啓榮非始圖事過初望既非請益而得是為特逹之知公求士甚士求公久無是事俱見前子生孫孫復生子難報此恩列子子又生孫孫又生子子又有子子又有孫子子孫孫無窮匱也此蓋伏遇某官直大而方東坡啓直大以方廣博而良清和且任與人不求僃斯心即孔孟之心尚書與人不求僃檢身若不及乃言底可行所論合禹臯之論尚書皋陶曰朕言惠可底行禹曰俞乃言底可績暫甘棠之美召詩序甘棠美召伯也召公之教明於南國即淇澳之相周詩序淇澳美武公之德也有文章又能聽其規諫以禮自防故能入相於周美而作是詩也雖俊乂始入於旁招而巧拙或容於雜進俱見前遂令遁尾之客易遁尾厲勿用有攸往正義云為遁之尾最在後遁者亦入需頭之章蔡雍獨斷凡羣臣上書于天子者四一曰章二曰奏三曰表四曰駁議章者需頭稱稽首上書謝恩陳事詣闕通者也奏者亦需頭表者不需頭蔡君謨詩禁林京兆荷恩光三上需頭乞郡章楊升菴丹鉛續録云獨斷所謂需頭者蓋空其首一幅以待詔旨批答陳請之奏用之不需頭者申謝之奏用之楊萬里知筠州謝表云需章丐外退以其私便郡疏恩出於自擇需章字用獨斷語也然君謨在誠齊之前已先用其語升菴豈偶未見耶某敢不銘刻鴻私鞭磨駑鈍藉使百無逢於世亦有一回顧之榮指心圖稱於品題見前騰口難論於報效易咸其輔頰舌騰口說也然稱於天下曰知己今者非耶韓文感恩則有之矣將以稱於天下曰知己知己則未也使遇以國士報衆人天厭之矣見前代章監倉謝衛安撫瑑下士代耕之祿僅守積倉上臣事君以人忽騰薦櫝荀子下臣事君以貨中臣事君以身上臣事君以人憐其出身於幽谷詩出自幽谷遷于喬木使之陟彼乎高岡詩陟彼高岡我馬𤣥黃愧在盧前舊唐書文苑傳楊炯與王勃盧照鄰駱賔王以文辭齊名海內稱為王楊盧駱亦號為四傑炯聞之謂人曰吾愧在盧前恥居王後當時議者亦以為然感從隗始孟郊詩受恩慙始隗王安石詩恩從隗始詫燕臺竊以管庫七十家之舉古道久衰見前法筵第一義之觀今聞尤聳言行録崇政殿說書吕希哲除右司諫辭未獲命禮書蘇軾在邇英戲之曰法筵龍象當觀第一義希哲笑而不言退謂范祖禹曰若辭不獲當以楊畏為首時畏在言路而頗險為子瞻所厚故希哲及之武帝問逹磨如何是聖諦第一義答云廓然無聖杜詩願聞第一義回向心地初有嚴十乘詩元戎十乘所部九州鳳翼龍鱗孰不希於攀援法言攀龍鱗附鳳翼㢲以揚之勃勃乎其不可及乎牛溲馬勃皆有望於蓄藏見前及下車之云初李白與韓荆州書昔王子師為豫章未下車即辟荀慈明既下車又辟孔文舉乃推轂於綦賤綦音其極也荀子君綦貴其為銜戢陶詩銜戢知何謝冥報以相貽說文戢藏兵也詩載戢干戈爾雅聚也疏藏聚也實倍等夷張良傳諸將陛下故等夷師古曰夷平也言故時皆齊等杜詩清襟照等夷伏念某質窳無竒材卑莫抗服箱以走渠憐滿脰之黃鍾詩睆彼牽牛不以服箱柳河東牛賦若知牛乎牛之為物魁形巨首牟然而鳴黃鍾滿脰自種自斂服箱以走按劒無因誰肯先容於白璧鄒陽傳明月之珠夜光之璧以暗投人於道路莫不按劒相眄者何則無因而至前也强折腰於為米陶濳傳吾不能為五斗米折腰拳拳事鄉里小兒耶真眯目於簸糠莊子簸糠眯目則天地四方易位矣詳見前今蒙需章見上條可使升秩需升卦名父書是讀果何有於家傳兒事已癡豈真堪於世用一字之褒已過俱見前兩喜之溢何多莊子夫兩喜必多溢美之言兩怒必多溢惡之言伏遇某官以社稷臣為詩書帥與人不求僃收毛髮絲粟之微嘉善矜不能無絲麻菅蒯之間俱見前有如頑頓陳平傳士之頑頓嗜利無恥者注頓讀曰鈍頭鈍謂無亷隅首辱甄陶九罭之魚鱒魴即遄歸於周室詩九罭之魚鱒魴我覯之子衮衣繡裳鴻飛遵渚公歸無所千里之馬騏驥會交獻於燕庭某敢不增所未能修其可願嘗為委吏已蒙葑菲之收竝見前置彼周行尚幸蒹葭之采詩采采卷耳不盈傾筐嗟我懷人置彼周行又兼葭采采白露未已所謂伊人在水之涘代趙撫屬汝諿謝衛安撫合尖溝水流行久汙芙蓉之幕李文饒詩桃李蹊空久芙蓉客暫依劉夢得詩歸路芙蓉府離堂玳瑁筵南史庾景行泛緑水依芙蓉何其麗也詳見前岸花飛送暫違桃李之蹊杜詩岸花飛送酒檣燕語留人李廣傳贊桃李不言下自成蹊重感眷留倍深銜戀更裁四六少謝萬分伏念某再省妄庸一何僥幸當大參政十乘啓行之日適小丈夫三年垂滿之時惟其樂莫樂兮相知是以遲之遲而又久敷施翕受更無假於先容俱見前前挽後推又不遺於餘力左傳或推之或轅之史記平原君傳秦之攻我也不遺餘力矣居然穿縞之末詩居然生子韓安國傳强弩之末勢不能穿魯縞注曲阜善作縞尤為輕緩故曰魯縞迄成合穎之謀見前感溢瓶罍詩瓶之罄矣維罍之恥韓詩朝廷未省有遺䇿肯不垂意瓶與罍功歸爐冶乃瞻衡宇情已迫於欣奔歸去來辭乃瞻衡宇載欣載奔及告油幢恩數勤於眄睞釋名幢童也其狀童童然也三朝志金節隋制也黑漆竿上施圓盤周綴紅綜拂八層黃繡龍袋籠之王公以下皆有節制同金節韜以碧油名碧油幢方干詩問津求拜碧油幢任昉箋咳唾為恩眄睞成飾謫將滿百陳遵傳故事有百適者斥注適讀曰謫辭不免多易躁人之辭多今蒙慨然允為幸甚鯤鵬水擊强希萬里之圖莊子北溟有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名為鵬鵬之背不知其幾千里也是鳥也水擊三千里摶扶搖而上者九萬里烏鵲月明深結一枝之戀見前恭惟某官東郊道洽尚書命畢公保釐東郊又道洽政治西陜化成公羊傳自陜而西者召公主之展長沙萬里之平民無遺便見前對宣室半夜之問王曰遄歸賈誼傳上方受釐宣室問鬼神之本誼具道所以然之故至夜半文帝前席詩徐方不回王口還歸凡今日毛髮絲粟之材見前皆他時欂櫨侏儒之用韓文欂櫨侏儒欂音薄櫨音盧三者皆屋之短柱欂一名枅櫨一名楶侏儒一名梲欲作大鈞之問見前又虞小器之盈文選小器易盈先取沉頓敢陳攄謝之辭攄抽居切博雅舒也又摛也更致依投之悃常擬報一飯奈何回首於南山杜詩今欲東入海即將西去秦尚憐終南山回首清渭濵常擬報一飯況懷辭大臣白鷗沒浩蕩萬里誰能馴可以觀四方自此馳神於東閣朱雲傳薛宣為丞相雲往見之謂雲曰在田野無事且留我東閣可以觀四方竒士雲曰小生乃欲相吏耶宣不敢復言代趙撫屬汝諿上提刑此篇自亟蒙推轂以下徽本舛錯今依劉本改正油幕綴員漸迫終更之候青油幕宋將幕也以青油縑為之韓詩談笑青油幕谷永傳終更亟還繡衣察吏鼎來剡奏之章匡衡傳無說詩匡鼎來服䖍曰鼎猶言當也若言匡且來也應劭曰鼎方也法言奏不剡漸鼎卦名初非光明俊偉之材又無假借攀援之勢漢文帝紀假借納用莊子可攀援而窺注攀本作攀援引也古之所以薦士今者於是見公伏念某名為宗支詩本支百世注本本宗也支支子也實本士檢檢檢押也法言蠢迪檢押注檢押猶法度也言動必蹈於法度恥懷繃之簪笏恐受衆疑韓詩簪笏自懷繃隨韋布之縑緗偶叨一第縑堅嫌切說文并絲繪也廣韻絹也緗思將切說文帛淺黃色也梁書昭明太子傳遍該湘素王僧孺傳含吐緗縹之上今按縑緗皆書衮也江總陶貞白集序校之鉛墨緘以緹緗晉中興書傅𤣥盛書有青縑􅐆布􅐆絹􅐆昭明太子詠書袠詩幸雜緗囊用聊因班女織柳文具筆札拂縑緗贊揚大功慨念勉峴程回之術業新唐書宗室宰相傳李峴吳王恪孫折節下士翊戴肅宗李勉字𤣥卿鄭惠王元懿曾孫少好學鯁亮廉介為宗臣表諡貞簡李程字表臣襄邑恭王神符五世孫擢進士宏辭賦日五色造語警拔士流推之贈太師諡曰繆李回字昭度新興王德良六世孫長慶中擢進士第又䇿賢方正異等同中書門下平章事贊曰周之卿士周召毛原皆同姓國也唐宰相以宗室進者九人林甫姦諛幾亡天下李峴和柔在位無所發明餘以材稱職號賢宰相嗚呼盛歟終愧周召毛原之等夷張良傳諸將皆陛下故等夷師古曰夷平也言故時皆齊等餘見上文何以亢身左傳將行子南子産咨於太叔太叔曰吉不能亢身焉能亢宗莫如殖學左傳夫學殖也不學將落殖殖苖也不學如苖之不殖將裒落也方以此自勵於己何敢輕受知於人細桷大杗一冥心於輪扁杗音盲爾雅杗廇謂之梁說文屋大梁也桷椽也左傳抽桷擊扉韓文大木為杗細木為桷袁昂傳恩隆絶望之辰慶集冥心之日杜詩自古江湖客冥心若死灰莊子輪扁斫輪于堂下注斫輪人名扁長箋短櫝肯請命於子公陳咸傳咸滯於郡守時車騎將軍王音輔政信用陳湯咸數賂遺物豫書曰即蒙子公力得入帝城死不恨子公湯之字來事元戎實叨末屬適鼠竊狗偷之盜蕩搖我疆叔孫通傳此特羣盜鼠竊狗偷耳何足置之齒牙間左傳蕩搖我邊疆奪烏飛魚泳之歡劬勞於野韓文志同而氣合魚川泳而鳥雲飛也詩鴻鴈于飛肅肅其羽之子于歸劬勞于野濫承渙渥易渙汗其大號許减常員宋制限舉者五人減員言不必足數然風憲之一削不圓考工記築氏為削注即今書刀古用竹簡筆誤則以刀削之因名其刀曰削孔子世家筆則筆削則削原陟傳削牘為疏則天門之九關難叩楚辭虎豹九關兮啄害下人些陶侃傳夢生八翼飛而上天見天門九重已登其八唯一門不得入解后行露之聽詩序行露召伯聽訟也夤緣宿霧之披杜詩萍泛苦夤緣韓詩青壁無路難夤緣北史李繪傳儀貌端偉神情朗俊繪舅河間邢晏與繪清言歎其高遠每稱曰若披雲霧如對珠玉樂廣傳若披雲霧而覩青天甫及褰帷亟蒙推轂既不為有力負舟而走又不生無因按劒之疑俱見前伯氏塤仲氏箎安得齊名之譽詩伯氏吹塤仲氏吹箎及爾如貫諒不我知張萱疑耀云八音皆克諧無不和者而詩人喻兄弟之和獨以塤箎漢宋諸儒皆無明解今閲樂律諸書乃知七音各自為五聲如宫磬鳴而徵磬和獨塤箎則二器共為一音塤為宫而箎之徵和塤為宫而箎之羽和伯宫也仲徵也此古人所以喻同氣也臺中評幕中辨初無贊畫之功韓文言針幕中之辨人反以汝為叛臺中之評人反以汝為傾猥借溢言莊子兩喜必有溢美之言又傳其常情無傳其溢言特加吹送杜詩揚雄更有河東賦惟待吹噓送上天犍為之磬十六大似無心而得之禮樂志成帝時犍為郡於水濵得古磬十六枚議者以為譱祥劉向因是說上宜興辟雍設庠序隆雅頌之聲盛揖讓之容以風化天下三禮圗十六枚同一筍簴為編磬蓋薦語凡十六字公車之牘三千誰有不求而至者史記滑稽傳東方朔初入長安至公車上書凡用三千奏牘公車令兩人共特舉其書僅然能勝之注公車司馬天下上事及闕下凡所徴召皆總領之陳后山詩三千奏牘諸儒上曹植與吳質書夫求而不得者有之矣未有不求而自至者也內則感國士之遇我外則賀天下之有公輪囷在肝韓詩窮途致感激肝膽還輪囷緘封於髓韓詩緘封在骨髓耿耿空自竒伏遇某官人今而道古內介而外通嘉善矜不能所學皆周孔之學韓詩生平企仁義所學皆孔周舉直錯諸枉此心即伊傅之心侁侁六轡之載馳詩侁侁征夫每懷靡及六轡如濡載馳載驅侁疏臻切說文馬衆多貌落落萬物之吐氣杜工部覽元道州舂陵行兼賊退示官吏作二首志之曰當天子分憂之地效漢官良吏之目今賊盜未息知民疾苦得結輩十數公落落然參錯天下為州伯萬物吐氣天下少安可待矣有懷鵷鷺之序杜詩不息豺狼鬬空慙鴛鷺行韓詩鵷鷺欲歸仙仗裏又丹掖列鵷鷺趙冬曦詩從容會鵷鷺及識脊令之原詩脊令在原兄弟急難參以月評許劭傳劭與從兄靖俱有高名好共核論鄉黨人物每月輒更其品題故汝南俗有月旦評焉慨然露奏振雲天之高誼宋書謝靈運傳英辭潤金石高誼薄雲天䇿塵土之孤蹤暴公子之薦不疑昔聞其語雋不疑傳勝之知不疑非庸人敬納其戒遂表薦之徵詣公車拜為青州刺史楊湖南之信陳子今愧斯言韓文送陳秀才彤序潁川陳彤始吾見之楊湖南門下頎然其長薰然其和吾目其貌耳其言因以得其為人及其久也果若不可及夫湖南之于人不輕以事接爭名者之于藝不可以虗屈吾見湖南之禮有加而同進之士交譽也又以信吾信之不失也某敢不深自佩銘痛加砥礪鄒陽傳底厲名號者不以利傷行師古曰底厲言其自修亷隅若磨厲于石者謝恩私室敢矜小技之文章羊祜傳拜爵公朝謝恩私門吾所不取杜詩文章一小技於道未為尊不辱公門願勉大間之節誼蘇文雖無以報不辱其門新唐書卓行傳贊節義天下大間士不可不勉代趙撫屬上衛參帥求合尖自久無此事以上徽本舛錯依劉本改正一官頂踵冒假借之深恩文帝紀諫說雖切常假借納用焉三沭肺肝乞品題之終惠李翰林集一經品題便作佳士恃在有容之大尚書有容德乃大忘其取數之多禮記取數多者仁也伏念某雖出天潢史記天官書咸池曰天五潢五潢者五帝車舍又王良旁有八星絶漢曰天潢魏王固表分枝若木疏𣲖天潢何遜詩鳳駕出天潢初無地望北史公孫表傳鴈門李氏地望懸隔燈花何喜一科不補於遺餘杜詩燈花何太喜韓文豈不登名於一科兮曽不補其遺餘袍葉半枯萬事已甘於濩落東坡詩青衫半作霜葉枯莊子瓠落無所容注瓠音護瓠布護也落零落也浪爾依芙蓉之幕下見前誰其采薜荔於水中薜荔音鼻戾增韻香草屈原九歌采薜荔兮水中搴芙蓉兮木末心不同兮􅀈勞恩不甚兮輕絶適逢先十乘於偃藩漢書敘傳木偃息以藩魏兮申重繭以存荆師古曰段干木客居魏魏王敬而禮之秦欲伐魏或諫曰魏君賢者是禮國人稱仁未可圖也秦遂止兵左思詩吾希段干木偃息藩魏君梁書王僧孺傳偃息藩魏甘卧安郢遂得底百僚而𨽻役杜詩有材無命百僚底詳見前不虞一見便辱異知識元方而用季方久無此事徽本作人一天而我漢二天信有此事後書陳紀字元方弟諶字季方與紀齊德同行父子竝著高名時號三君每宰府辟召常同時旌命羔鴈成羣當世者靡不榮之媒石子而羅溫子不曰非才韓文以溫生為才於是以石生為媒以禮為羅又羅而致之幕下借以齒牙南史謝朓傳朓字元暉好奬人才會稽孔顗粗有才筆未為時知孔圭嘗令草讓表以示朓朓嗟吟良久手自折柬寫之謂圭曰士子聲名未立應共奬成無惜齒牙餘論其好善如此傳之羽翼柳文假以羽翼偶之騫騰駱口賔王詩倐忽摶風生羽翼矢我莫若鮑叔史記管晏列傳生我者父母知我者鮑子也逢人必說項斯見第一卷上任中書條遂令虧簣之山迄作合尖之塔見此卷代謝帥座條唯是過屠而大嚼桓談新論人聞長安樂則出門而西向笑知肉味美則過屠門而大嚼曹植與吳質書過屠門而大嚼雖不得肉貴且快意韓詩肯效屠門嚼難忘見麴以流涎杜詩道逢麴車口流涎兼幸生匠石之園託根未正韓文是生於匠石之園宋廣平梅花賦序嗚呼斯梅託根非其所山谷詩託根桃李場縱欲附翹材之館張本已疏西京雜記平津矦營客館以招天下賢才次曰翹材館以待大材任九卿將軍二千石者處之左傳注預為後地曰張本公羊傳昭公二十五年秋七月上辛大雩季辛又雩傳言上辛者為下辛張本荀嵩傳左丘明張本繼未發明經意多竒偉豈無列薦之員亦有十科之目宋哲宗元祐元年立十科舉士法詳别見或蒙送上亶謂成終大鈞無垠拔士不遺於餘力俱見前小子有造歸恩豈在於他門詩肆成人有德小子有造李義山集卵翼不自於他門恭惟某官以社稷臣為詩書帥俱見前喬嶽之蓄雲泄霧人蒙潤而不知韓魏公行狀公姿貌英待骨骼清聳圖繪傳天下人以謂高山大嶽望之氣象雄傑而包育細微蓄泄雲雨藏匿寶怪蓋自然也蘇文䝉霧而行皆獲不知之潤滄海之包乾括坤物何歸而不得水華海賦且其為器也包乾之奧括地之區尚念碧油之屬三朝志王公以下皆有節韜以碧油方干詩問津求拜碧油幢歐陽詹詩十萬兵樞擁碧油楊萬里詩錦水花潭照碧油欲舐丹竈之餘見前縹眇孤鴻漸恐回頭之斷漏東坡孤鴻辭缺月挂疏桐漏斷人初靜時見幽人獨往來縹眇孤鴻影驚起卻回頭有恨無人省揀盡寒枝不肯棲楓落吳江冷差池歸燕寧能絶望於捲簾見前幸從昌黎弟子之員韓文弟子不必不如師師不必賢於弟子經置陸氏門生之列韓文愈與童子俱陸公之門人也茅茹以其征吉今期已免於西曹易拔茅茹以其彚征吉丙吉傳西曹地忍之陳遵傳西曹以故事適之桃李悉在公門他日尚希於東閣見前代陳縣尉愷上衛參帥求舉削酸寒溧尉古須强箭之吹噓韓詩酸寒溧陽尉五十幾何髦青冥送吹噓强箭射魯縞憔悴湘濵今纍大鈞之坱圠屈原漁父辭屈原既放遊於江潭行吟澤畔顔色憔悴形容枯槁餘見前百無操挾萬有狂愚然而恃大參政之寬洪必不責小丈夫之躁妄竊以三吐哺三握髮而下士周公豈欺我哉一舉手一投足之乞憐韓愈抑亦人耳俱見前況幸在犀甲熊旗之下書周官函人為函犀甲七屬虎兕六屬國語夫差衣水犀之甲者三千劉熙釋名熊虎為旗軍將所建象其猛如虎與衆期其下也柳河東平淮西雅金第煌煌錫盾雕戈犀甲熊旗威命是荷乃無與豨苓雞壅之中莊子藥也其實堇也桔梗也雞癕也豕零也是時為帝者也注雞壅即雞頭名芡豨苓即猪苓恐虗此生何用於世是以頃者之詣府韓文躬詣大府受約束於下執事敢於冒焉以呈身舊唐書韋澳傳澳字子斐性貞退寡欲登第後十年不仕伯兄溫與御史中丞高元裕友善溫請用澳為御史謂澳曰高二十九持憲綱欲與汝相面汝必得御史澳不答溫曰高君端士汝不可輕澳曰然恐無呈身御史竟不詣元裕之門東軒筆録孫參政抃為御史中丞薦唐介吳中復為御史人或問曰聞君未嘗與二人相識而遽薦之何也孫答曰昔人恥呈身御史今豈求識面臺官也後二人皆以風力稱溫乎其和可知既蒙異顧韓文溫乎其容若加其新也粲然有文相接實激懦衷董仲舒傳粲然有文以相接歡然有恩以相愛惟是下考之垂成猶冀上天之吹送杜詩揚雄更有河東賦唯待吹噓送上天懼捲簾之或晚忘躍冶之非祥伏念某鹿鹿無庸徂徂何取俱見前砥節礪行不能窺前輩之藩籬蔡雍郭有道碑砥節礪行有道正辭爾雅樊籬郭璞云藩籬也史記曾無藩籬之艱又北築長城而守藩籬莊子吾願遊於其藩種學績文且未識古人之糟粕韓文種學績文以蓄其有泓涵演迤日大以肆莊子然則君之所讀者古人之糟魄已夫糟酒滓也魄亦作粕說文已漉粗糟也半生一第寸祿八年左太冲詩外望無寸祿內顧無斗儲白帖縣尉一命寸祿茅舍聽雞猶是儒酸之氣味溫庭筠詩雞聲茅店月人迹板橋霜竹弓射鴨安知吏隱之風流東坡詩已作觀魚檻仍開射鴨堂注孟郊為溧陽尉開射鴨堂孟郊詩短蓑不怕雨白鷺相爭飛短楫畫菰蒲鬬作豪橫歸笑伊水健兒浪戰求光輝不如竹枝弓射鴨無是非又射鴨復射鴨鴨驚菰蒲頭鴛鴦亦零落彩色難相求杜詩吏隱逢梅福山谷詩吏隱極風流然粗覺無愧於心幸以此不惡於下慨念一寒之迹范雎傳范叔一寒如此哉若為再命之階周禮再命受服得拜馬前已遂執鞭之願韓文以故人稚弟拜北平王於馬前史記雖為之執鞭所欣慕焉無為牛後遂興見彈之思蘇秦傳寧為雞口無為牛後莊子汝亦太早計見卵而求時夜見彈而求梟炙然記碧油之幢見上條頗辱黃金之諾季布傳得黃金百不如得季布諾以其時則可矣敢不長鳴異乎人之求歟真成自鬻梅福傳昔秦武公好力任鄙叩關自鬻伏遇某官直方且大清任而和公路垂紳即正槐庭之面歐文垂紳正笏周禮秋官朝士掌建邦外朝之法面三槐三公位焉矦方賜履暫為蘭畹之滋左傳賜我先君履東至於海西至於河南至於穆陵北至於無棣離騷經余既滋蘭之九畹兮詳見前遇民猶兒東坡詩青衫半作霜葉枯遇民如兒吏如奴求士如渴東山瓜苦共思零雨之遄歸詩我徂東山慆慆不歸我來自東零雨其濛有敦瓜苦蒸在栗薪箋云敦猶專專也婦人思其君子之居處專專如瓜之繫綴焉瓜之瓣有苦者以喻其心苦也南國甘棠未若敷天之純被詩序甘棠美召伯也召伯之教明於南國顧以椳闑扂楔之細椳竒限戶樞闑門限扂亭㸃切門關牡楔音屑門兩旁木韓文椳闑扂楔各得其宜皆在毛髮絲粟之中老泉集天下之人毛髮絲粟之材紛紛然而起合而為一欲善鄭來請從隗始某敢不激昂駑鈍報稱鴻私桃李悉在公門既感東風之鼓舞葑菲無以下體尚幾秋露之均沾俱見前代趙縣丞善倪上撫州林守洽求舉削贊長官之雨不善避嫌縣丞稱贊府南部新書裴子雨為下邳令張晴為縣丞二人俱有聲氣而善語言曽論事移時吏人竊相語曰縣官甚不和長官稱雨贊府即道晴贊府稱晴長官即道雨終日如此非不和乎語林商則任廩丘尉性廉縣令丞多貪因宴會舞令丞皆動手尉則回身而已令問其故則曰長官動手贊府亦動手惟有一尉亦動手百姓何容活耶韓文丞位高而逼例以嫌不可否事詩疏作詩之人自謂避嫌之不審趙充國傳偷得避嫌之便師古曰慊亦嫌字公羊傳言伐何避嫌也惡乎嫌嫌與鄭人戰也戴刺史之天夙蒙假䕃趙嘏詩尋花偶坐將軍樹飲酒方重刺史天䕃於禁切說文草隂地徐曰草所庇也入陰景曰䕃荀子木成蔭而衆鳥息焉亦作蔭左傳木根無所庇廕惟是升斗之活若為分寸之躋流涎久動於麴車俱見前病顙輒希於箕秣河東起廢答病顙駒大而不厖可飾焉於是衆牽駒上燥士大廡下莝以雕胡秣以香箕印刓果否韓信傳刻印刓忍不能豫注手弄角訛不忍授也冶躍可乎見前竊以寧戚之歌鬷明之言雖賢不免韓文夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聽而識之者之難遇也伏以閣下尚賢而與能哀窮而悼屈既有聽之之明又有振之之力寧戚之歌鬷明之言不發於左右則從而失其時矣匠石之園伯樂之廄所係尤深韓文是生於匠石之園長於伯樂之廄者也既辱在於使令且已叨於識察將以知已稱於天下乃使勤子至于他人俱見前縱欲冥心杜詩冥心若死灰何以藉口左傳晉人曰若茍有以藉口而復命於寡君伏念某號為宗姓實則儒生束髮所期豈念祖宗之簪笏束髮猶云結髮李廣傳臣結髮與胸奴戰師古曰言始勝冠霍光傳贊光以結髮內侍班彪傳結髮學問班固傳結髮修身摘髭不力竟慙伯仲之塤箎韓詩連年取科第若摘頷底髭怵於食貧詩自我徂爾三歲食貧注言三歲以來乏於榖食已貧矣遂爾諾仕一行作吏已徒勞州縣之間見前再轉為丞真覺出簿尉之下韓文文書行丞涉筆占位署惟謹不敢略省官雖尊勢力反出主簿尉下顧惟蹇拙乞巧文驅去蹇拙粗守公勤不利走趨寧免長官之罵韓文佩玉長裾不利走趨杜詩醉即騎馬歸頗遭官長罵尚能拜起孰非太守之恩循吏傳許丞廉吏雖老尚能拜起送迎試以代庖幾於環轍韓文轍環天下莽誰欺於揆牧尚書納于百揆孔傳揆度也度百事總百官又咨有十二牧州長謂之牧復攝事於子男左雄傳今之墨綬猶古諸矦注墨綬謂令長即古子男之國也奈何五章漠無寸援得不得之有命當安造物之爐錘增韻爐冶也錘傳追切通作鎚鍛器莊子爐鎚之間樂莫樂兮相知更傍誰家之門戶屈原九歌樂莫樂兮新相知古今詩話元和十三年士人下第多為詩刺試官獨章孝標作歸燕詩獻庾承宣侍郎曰積壘危巢泥已落今年故向社前飛連雲樓閣無棲處更傍誰家門戶飛伏遇某官眼高四海東坡詩眼高四海空無人氣蓋諸公史記季布傳布弟季心氣蓋關中晉書王濟傳風姿英爽氣蓋一時李詩大梁貴公子氣蓋蒼梧雲陳后山詩才名四十年盛氣蓋諸儒唐尚馳諸葛孔明賦氣蓋全吳胸吞大魏張說宋璟碑氣蓋風雲千佛姓名早宜登於文石唐王保定托言張倬柬之之孫數舉進士不第捧登科記頂上戴之曰此千佛名經也梅福傳登文石之陛涉赤墀之塗三神步武晚猶會於郎星郊祀志蓬萊方丈瀛洲此三神山者在渤海中天文志五帝坐後聚十五星曰哀烏郎位戴馳孑孑之旟詩孑孑干旟在浚之都注孑孑干旟之貌鳥隼曰旟建旟謂州長之屬有偉皇皇之轡見前胡然斂惠韓文斂此大惠兮施於一州復此專城古詩四十專城居后山詩四十專城古亦稀李詩虎符合專城王摩詰詩少年白晳專城居公不嫌旋馬於蟻封鄧粲晉紀王湛字處冲隱德人莫之知兄子濟往省湛濟性好馬而所乘馬駿駛湛曰此雖小駛然力薄不堪苦近見督郵馬當勝此濟取督郵馬與湛試之步驟不異於濟而馬不相勝湛曰今直行車路何以别馬勝不唯當就蟻封耳於是就蟻封盤旋馬果倒踣士則歎烹雞於牛鼎史記函牛之鼎不可以烹雞邊讓傳傳曰函牛之鼎以烹雞多汁則淡而不可食少汁則熬而不可熟雙旌屬耳新唐書百官志節度使辭日賜雙旌雙節記室新書太守雙旌五馬霍光傳將軍之廣明都郎屬耳注屬耳近耳也五袴暖然東觀漢紀廉范為蜀郡太守百姓歌之曰廉叔度來何暮昔無襦今五袴莊子暖然似春謝康樂之文章尚餘此地南史謝靈運幼便頴悟文章之美與顔延之為江左第一襲封康樂公為臨川內史在郡遊放為有司所糾顔平原之氣節如見其人新唐書顔真卿為殿中侍御史宰相楊國忠惡之出為平原太守後遷撫州刺史撫州志公為刺史建土塍陂溉田民感其惠立祠祀之竊觀帥屬之文尚書六卿分職各率其屬可見察吏之意不知庸下還入選中劉孝綽啓寵光曲被獨在選中既旁無蟠木之容姑且作大鈞之問俱見前盡枿去牙角雖無績學之泓涵枿牙葛切說文伐木餘也廣韻伐木餘枿也謂斫髠而復生漢書三枿之起或作蘖書若顚木之有由蘖韓文博陵崔斯立種學績文以蓄其有泓涵演迤日大以肆既禁不得施用則盡枿去牙角一躡故跡破崖岸而為之託根借恩光或許孤芳之皎潔山谷詩江梅有佳實託根桃李場桃李終不言朝露借恩光孤芳忌皎潔冰雪空自香代黃縣簿夢得上樓倉漕觀求合尖瞻使槎於霄漢無地修容荆楚歲時記漢武帝令張騫使大夏尋河源乘槎經月而至一處見城郭如官府室內有一女織又見一丈夫牽牛飲河杜詩繡衣春當霄漢立柳文修容於轅門之外躡履於油幢之前詳見前抗簿領之塵埃以身得察北山移文抗塵容而走俗狀梁書朱屛傳當局簿領伏挺傳簿領沉廢王瞻傳不廢簿領劉孝綽傳簿領亦宜稍習何敬容傳勤于簿領又簿領文案不復經懷韓詩判司卑官不堪說未免捶楚塵埃間樂毅傳假節于魏以身得察於燕聞高標之戍削李詩高標絶人喧杜詩妙選異高標又高標跨蒼穹子虗賦衯衯裶裶揚祂戍削師古曰揚舉也祂曵也或舉或曵則戍削然見其降殺之美也一云戍鮮也削刻除貌今按說文戍雪律切從戊含一滅也九月陽氣微萬物畢成陽下入地也戍音絮久人持戈守邊也二字宜有辨絶末俗之夤緣夤通作寅夤緣連也韓詩青壁無路難夤緣遂忍恥以自鳴望徼恩於回顧竊以為山九仞正虞一簣之虧見前持綆百尋斯動三塗之望左傳正義服䖍云三塗太行轘轅崤澠也謂三塗為三處道也柳文有行三塗之艱而墜千仞之下者過之者日千百人皆去而不顧其人猶望而不止也俄而有若烏獲者持長綆千尋徐而過焉其力足為也其器足施也號之而不顧顧而曰不能力則其人知必死於大壑矣故功莫崇於引重灌夫傳兩人相為引重而恩無大於成終必以為無益而舍之則未有不求而得者曹植與吳質書夫求而不得者有之矣未有不求而自得者也伏念某﨑嶇百戰陸賈傳﨑嶇山徑間潘嶽賦軌﨑嶇以低昂王昌齡詩為君百戰如過籌山谷詩劉郎才力能百戰濩落一科棲枳棘之叢中但合出朱而入墨搴芙蓉兮木末安知泛緑以依紅俱見前偶效役於轅門項藉傳羽見諸矦將入轅門張宴曰軍行以車為陳相向為門故曰轅門師古曰周禮掌舍王行則設車宫轅門也遂贅員於幕府文書堆案真成俗吏之為元稹詩滿眼文書堆案邊山谷詩文書堆案睡自語賈誼傳夫移風易俗使天下回心而向道類非俗吏之所能為也俗吏之所務在于刀筆筐篋而不知大體獄訟如絲粗了癡兒之事兩蒙連率交剡公車惟是緇衣之三章尚須華衮之一字月明繞樹自憐烏鵲之何依俱見前海上問津或謂斗牛之可訪宋之問詩明河可望不可親願得乘槎一問津惟是夙蒙於廉察惟是二字復出疑舛張敞傳察廉為甘泉倉長趙廣漢傳察廉為陽翟令未嘗得效於使令冒然有言可謂不韙韙羽鬼切說文是也左傳犯五不韙而以伐人然茍以昌平之言可信韓文友朋之中所敬信者昌平孟柬野東野吃吃說足下不離口崔大敦詩不多見每每說人物亦以足下為處子之秀近又得李七翺書亦云足下之文遠其兄甚夫以昌平之賢其言一人固足信矣況又崔與李繼至而交說耶則或如尹公之取必端徑援筆以㸃睛張彥遠名畫記張僧繇於金陵安樂寺畫四白龍不點眼睛每云點睛即飛去人以為妄誕固請㸃之須臾雷電震壁二龍乘雲騰去上天二龍未㸃眼者尚在當勒銘於刻骨曹植表鏤肌刻骨恭惟某官盛名如晝和氣猶春自其甲進士之科儒林傳歲課甲科四十人為郎中即合庚佐王之學禮記其日庚辛注庚之言更也易先庚三日王弼注申命令謂之庚百川既倒屹砥柱之固存韓文障百川而東之回狂瀾於既倒萬木盡僵凜嶺松之獨秀韓詩森森萬木夜僵立陶詩冬嶺秀孤松由曲臺之議禮翼奉傳未央宫有曲臺殿鄒陽傳秦倚曲臺之宫枚乘傳遊曲臺臨上路王尊傳行幸曲臺儒林傳孟喜舉孝廉為郎曲臺署長又后蒼說禮數萬言號曰后氏曲臺記藝文志曲臺后蒼九篇注行射禮於曲臺后蒼為記故名曲臺記漢官儀大射於曲臺晉灼曰天子射宫也長門賦覽曲臺之央央唐禮樂志唐初用隋禮元和間王彥盛始為曲臺新禮三十卷文選曲臺之禮九師之易沈隱矦集復禮曲臺反樂宣榭謂直筆以記言謂字疑舛居然偏城臧洪傳論偏城既危曹袁方穆斂此大惠韓文斂此大惠兮施於一州田里之無愁歎有偉民庸周禮民功曰庸原隰之有光輝亟將使指司馬相如傳宣其使指令百姓皆知天子意馮奉世傳奉使有指福星所照宋四朝國史哲宗念東國困於役竄復以鮮于侁為京東轉運使司馬光曰以侁之賢不宜使居外顧齊魯之區雕敝已甚須侁為福星救之耳比行曰福星往矣安得如侁百輩布列天下乎旱魃已消詩旱魃為虐如惔如焚箋曰魃鬼人形眼在頂上神異經南方有人長二尺袒身兩目在頂上走行如風名曰魃所見之國大旱赤地千里然設有膠東三萬户之流民循吏傳王成為膠東相治甚有聲宣帝最先褒之下詔曰膠東相成勞來不勸流民自占八萬餘口其賜成爵關內矦按三萬戶當作八萬口由記之誤必將丐江西斗升水而活我莊子君豈有升斗之水而活我哉又激西江之水而迎子尚煩周度詩周爰咨度為此曲防然後遄四牡之歸見前於以扈六飛之馭後從曰扈袁盎傳陛下騁六飛注六馬之疾若飛也思天地之大矣念人物之眇然欲善鄭來請從隗始俱見前主簿能令公喜今謂斯何郤超傳超為桓溫參軍傾意禮待時王珣為溫主簿亦為溫所重府中語曰髯參軍短主簿能令公喜能令公怒超髯珣短故也韓文今者人謂斯何使者或不汝容信乎命矣東坡詩勸農使者不汝容因君作詩先自劾代回楊評事洪之謝求薦立一鶚之表方有待焉鄒陽傳鷙鳥纍百不如一鶚詳見前遺雙魚之書何其駛也古辭飲馬長城窟行客從遠方來遺我雙鯉魚呼童烹鯉魚中有尺素書增韻駛馬行疾也魏晉世語司馬宣王辟州泰三十六日擢為新城太守宣王為泰㑹使尚書鍾繇調泰君釋褐登宰府三十六日擁麾蓋守兵馬郡乞兒乘小車一何駛乎泰曰誠有此君名公之子少有文采故守吏職獮㺅騎土牛又何遲也衆賔咸悅益部耆舊傳雜記云每朝會何祇坐次楊洪洪嘲祇曰君馬何駛祇曰故吏馬不敢駛但明府未著鞭耳不能辭璧左傳受飧反璧又愧報瓊詩投我以木瓜報之以瓊琚恭惟某官騰茂蜚英司馬相如傳激清流揚微波蜚英聲騰茂實閎中肆外韓文先生之於文可謂閎其中而肆其外矣十事九律僃知小大之情主父偃傳所言九事其八事為律令一事諫伐胸奴按十事九律當作九事八律但宋人承誤已久如余元一賀荆南劉帥啓云當寧興嗟幾十事而九律士林爭覩謂一代之幾人是也禮記必察小大之比以成之注小大猶輕重已行故事曰比千條萬端未容上下其手左傳穿封戌與公子圍爭鄭囚正于伯州犁伯州犁上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也見何晚也主父偃傳公皆安在何相見之晚也愛莫助之儻寬食麨之期東坡詩忍飢待食明年麨詳見前敢愛拔茅之力易拔茅茹韓文吾豈有愛于力乎哉此亦公舉安用謝為談賔録唐證聖中劉竒為侍郎注張文成司馬鍠為御史二人因申屠瑒以謝竒正色曰舉賢無私何以見謝某報國無功知賢不早翺亦云審知足下矣豈復置疑韓文近又得李七翺書亦云足下之文過其兄甚故不待求見相信已熟既相見不要約已相親審知足下之才充其容也起在此敢勤他人乎更祈加察見前回資官王縣尉昌大謝舉狀某謹簡乃僚因剡公車之牘見前冥升在上詎收私室之恩易冥升在土消不富也注進而不息故雖冥猶升羊祜傳拜爵公朝謝恩私門吾所不取從而謝焉非所望也伏惟某官器能環碩趨造端溫紫電神鋒夙志屠龍之學古今注吳大皇帝有實劒六一曰白虹二曰紫電三曰辟邪四曰流星五曰青冥六曰百里王勃滕王閣序紫電青霜王將軍之武庫唐中宗授張錫尚書制白虹良寶紫電竒鋒詳十三卷回王正奏條青冥强箭暫間射鴨之弓今大夫羅而置幕中宜諸公爭令出門下俱見前亦意飛黃之去符瑞圖曰騰黃者神馬也其色黃亦名乘黃亦曰服黃或作古黃或曰翠黃一名紫黃其狀如狐背上有兩角出白民之國乘之壽三千歲萬畢術曰天下有道飛黃服皂注黃帝時飛黃服皂韓詩飛黃騰踏去何憂破白之難勤子至他人乎輒復吹噓而送上見我有此客否定皆摸索於暗中俱見前某過厚貽箋良高陳誼莊子屠羊說居處卑賤而陳義甚高蘋蘩可薦其何恨行潦之濵左傳蘋蘩蕰藻之菜潢汙行潦之水可薦於鬼神可羞於王公桃李不言度有成蹊之日見前回郭僉判仲洪謝舉狀謹簡乃僚輒效吹噓之送尚書愼簡乃僚杜詩唯待吹噓送上天非相為賜何勤駢儷之詞榖梁傳虞虢之相救非相為賜也今日亡虢而明日亡虞矣公羊傳唇亡則齒寒虞虢之相救非相為賜則晉今日取虢而明日虞從而亡爾注賜猶惠也銜袖鳴謙韓文文書銜袖易鳴謙貞吉開緘擊節謝尚傳坐者撫掌擊節袁宏傳後生擊節懦夫增氣南史王籍傳至若耶溪賦詩云蟬噪林逾靜鳥鳴山更幽劉孺見之擊節不能已也王筠傳沈約製郊居賦讀至墜石堆星及水懸坎而帶坻皆擊節稱贊魏略王朗答太祖書承旨之日撫掌擊節東坡詩擊節為爾謡恭惟某官器資凝遠文獻靖共見前大夫不均我獨勞洊子男於四國詩大夫不均我從事獨賢陛下用少臣已老尚賓客於諸矦漢武故事上至郎署見一老郎鬢眉皓白問何其老也對曰臣姓顔名駟以文帝時為郎文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三葉不遇上感其言擢為會稽都尉杜詩甫也諸矦老賔客所聞止一簣之虧然久閲千帆之過劉夢得詩沉舟側畔千帆過枯木前頭萬樹春東坡詩流落千帆側陟彼北山而憂父母慕有切於終身詩陟彼北山言采其杞王事靡盬憂我父母失之東隅而收桑榆恩冀沾於錫命見前有嘉懇欵合命那融那囊何切爾雅於也注語之絶韻也融余中切爾雅長也此蓋俗語那移通融之意用是采焦尾之桐蔡雍傳吳人有燒桐以㸑者雍聞火烈之聲知其良木因請而裁為琴果有美音而其尾猶焦故時人名曰焦尾琴焉搜神記吳人有燒桐以㸑者蔡雍聞其爆聲曰此良桐也因請之削以為琴而燒不盡因名焦尾琴有殊聲焉蕭子顯齊書王仲雄善彈琴當時妙絶江左有蔡雍焦尾琴在主衣庫上勑五日一給仲雄初非有捩鼻之木捩力結切拗也增韻紾也捋也宋俞文豹唾玉集太宗子元儼有威聲號八大王有人謁張乖崖投丞相及給事書皆納之袖中無語及八大王書乃曰真捩鼻木按南史殷浩語孫盛曰莫作强口馬我當捩卿鼻孫曰卿不見決鼻牛人當勞卿頸捩鼻木乃獸醫所用牛馬鼻為木所捩不得不從猶云為人牽鼻也宋人好用當代人語入文字中如有蟹無通判及近水樓臺先得月等語唾玉集世罕見故此語似稍僻今以對焦尾之桐蓋以生對熟法也觀其主觀其所主幸可免勢利之嘲簡厥修簡其不修願不負品題之意尚書簡厥修亦簡其或不修回成都副將謝舉狀行三軍則誰與正賴戎昭左傳戎昭果毅以聽之之謂禮舉一人焉拔尤亦惟世選尚書世選爾勞何勤私謝更以文為恭惟某官揚厯甚詳慨慷自許慷口朗切或作慷說文慨也慨口溉切慷慨壯士不得志也通作愾晉書段灼傳此賈誼所以慷慨于漢文又私懷慷慨陸機傳言論慷慨冠乎終古夏統傳子路見夏南憤恚而慷愾執干戈衛社稷克稱其家禮記戰于郎公叔禺人與其鄰童汪踦往皆死焉魯人欲勿殤童汪踦孔子曰能執干戈以衛社稷雖欲勿殤也不亦可乎韓文稱其家兒也安邊境立功名不聞亦式鼂錯傳安邊境立功名在于良將不可不擇也詩不諫亦式不聞亦入傳性與天合也箋云不聞人之道說亦自合于法是堪勇往爰以名聞某獲共扞城詩傳干捍也箋干也城也皆所以禦難也左傳百官承事朝而不夕此公矦之以扞城其民也故詩曰糾糾武夫公矦干城東坡詩誰信儒官也捍城敢忘推轂馮唐傳臣聞上古王者遣將也跪而推轂詳見前霸陵醉尉呵李廣不足為懷李廣傳嘗夜從一騎出從人田間飲還至亭霸陵尉醉呵止廣成都猛將有花卿尚須努力杜詩成都猛將有花卿學語小兒知姓名回史郡僉謝提刑舉狀使家選衆所舉惟賢韓詩州家申名使家抑坎軻秖得移荆蠻記室修辭何為至我續漢百官志三公大將軍皆有記室主上表章報書記孔平仲談苑前輩與大官書多稱執事與足下劉子元與宰相書曰足下韓退之與張僕射書曰執事即其例也記室本王矦賔佐之稱他人不可通用自合卷還於鯨錦杜詩錦鯨卷還客始覺心和平又疑已費於麝煤山谷詩萬里風帆水著天麝煤鼠尾過年年滄江盡夜虹貫月定是米家書畫船麝煤謂墨也又廷圭贋墨出蘇家麝煤漆澤紋烏鞾又書回銀鉤壯句與麝煤香又成都九經石歲久麝煤寒又一幅溪藤照麝煙李建中題楊凝式大字壁詩枯杉倒枝霜天老松煙麝煤風雨寒伏惟某官掞材不資蓋寬饒傳用不資之軀師古曰訾與資同不資者言無資量可以比之貴重之極也藏器有用易君子藏器于身待時而動暫作糟丘之主監酒務屈為冰幕之賔韋應物詩文苑臺中妙氷壺幕下清奮迅驥程何慮缺書馬之一萬石君傳石建為郎中令奏事下建讀之曰書馬者與尾而五今乃四不足一獲譴死矣飛騰鶚表便當足鳴鹿之三左傳歌鹿鳴之三三拜是為特逹之知豈俟吹噓之送俱見前某誤勤稱謝但切負慙同寮未嘗聞知人遐不謂矣舊唐書婁師德傳狄仁傑未輔政師德薦之武后問師德知人乎對曰臣嘗同僚未聞其知人也后曰朕用卿師德薦也誠知人矣詩心乎愛矣遐不謂矣注遐逺謂勤也我心愛此君子君子雖逺在野豈能不勤思之乎貪天之功以為己渠敢爾邪左傳介之推曰竊人之財猶謂之盜況貪天之功以為己力乎代回楊評事洪之謝舉狀助國薦賢我已慙於不武吳良傳為國所重必在得人報恩之義莫大薦士左傳勝之不武不勝為笑又以亂易整不武又仁而不武無能逹也飛箋陳誼公何富於斯文莊子屠羊說身處卑賤而陳誼甚髙禮記多文以為富進而三薰韓文方將坐足下三浴而三薰之敢不重拜左傳穆叔曰臣聞之訪問於善為咨咨親為詢咨禮為度咨事為􅓪咨難為謀臣獲五善敢不重拜恭惟某官居官能大柳文先君石表陰先友記袁高河南人以給事中敢諫爭貞直忠謇舉無與比能使所居官大折獄惟良尚書非佞折獄惟良折獄廣厦萬間徒啓乏才之歎杜詩安得廣厦千萬間陽春一曲反成寡和之音岑參詩獨有鳳凰池上客陽春一曲和皆難頃珠璧之暗投恨衣裘之晚索俱見前深恐遠井之待陳后山詩巧手莫為無麵餅誰能留渴需遠井有孤時夜之求莊子見卵而求時夜注責司晨也汔濟云初易小狐汔濟濡其尾說文汔水涸也疏汔者將盡之名小才不能濟難事同小狐雖能渡水而無餘力必須水汔方可涉川踐盟敢後子若無言幾失子況又崔李之繼至交說耶左傳晉叔向適鄭鄭鬷蔑惡欲觀叔向從使之收器者而往堂下一言而善叔向執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以己子若無言吾幾失子矣韓文夫以昌平之賢其言一人固足信矣況又崔與李繼至而交說耶君家所有更贈君無忘孔孟之養氣傳道者山谷送張叔和詩但回此光還照已平生倦學皆日新我提養生之四印君家所有更贈君某初緣然諾張耳傳此固趙國立名義不侵為然諾者也灌夫傳夫不好文學喜任俠已然諾注已必也洊辱詞華得古磬於犍為君言過矣見前獻天球於清廟豫日望之尚書天球河圖在東序天球美玉也或作璆餘見前回高承直不倚謝舉奉一札以推賢徒得君重後漢書循吏傳一札十行汲黯傳吾徒得君重注徒但也重威重也合衆言而剡奏安用謝為見前貽箋惠然詩惠然肯來惠順肯可也有順心則可來為禮過矣恭惟某官蜚英戚畹漢紀寄肺腑於戚畹策雋儒林翠竹碧梧籍甚名家之秀韓文退見少傅翠竹碧梧鸞鵠停峙能守其業者也紅蓮緑水藹然入幕之賔南史庾杲之傳庾景行泛緑水依芙蓉何其麗也詳見前國人曰賢然後用之君子之道焉可誣也某與箝紙尾南史蔡廓遷吏部尚書曰選事若悉部見付不論不然我不能為徐干木署紙尾韓文鉗以左手右手摘紙尾鴈鶩行以進甚靦面顔說文靦面見也徐曰凡人所瞻視心實見之故有識别無恥之人面見之而已心實否也國語雖靦然人面哉實禽獸也詩注􅌤姡也姡戶刮反醜也使女為鬼蜮則不可得見汝姡然有面目乃是人也孫炎曰􅌤與姡皆面見人之貌遣介奉咫尺書良感渠渠之意韓信傳發一乘之使奉咫尺之書師古曰八寸曰咫咫尺者言其簡牘或長咫或長尺喻輕率也廣韻渠渠勤也今子使萬里外敢懷惘惘之憐昌黎送殷員外序今人適數百里出門惘惘有離別可憐之色今子使萬里外國獨無幾微出於言面豈不真知輕重大丈夫哉代回危教授稹謝列薦稹及第經年未脫選調入京注授幾一年而未得闕危稹字逢古臨川人淳熙中進士以詩名著厯屯田郎中上言國家治亂之故忤用事者出知漳州後歸與鄉老為真率㑹所著有巽齊集弟和開禧初進士為上元主簿大闢祠宇以祀明道先生真西山記之舉爾所知不如鄉人之善者於我乎館今為有力者奪之檀弓生於我乎館死於我乎殯莊子有力者負之而走隨衆笑而笑焉非所謝而謝也恭惟某官早收名第韓詩連年收科第獨振妙聲廣韻妙好也又小年也杜詩明公獨妙年潘嶽西征賦終童山東之英妙坐廣文之氊似成二十四考杜詩廣文到官舍又坐客寒無氊新唐書郭子儀傳校中書令考二十四待公車之詔行及三百六旬東方朔傳令待詔公車尚書朞三百有六旬有六日所賴金玉之相詩追琢其章金玉其相相思將切質也不改簞瓢之樂昔三人占而汝則逆用靜為宜尚書三人占則從二人之言又卿士從龜從筮從汝則逆庶民逆吉龜筮共違于人用靜吉用作凶今八音諧而人以和來儀可必尚書八音克諧無相奪倫神人以和又簫韶九成鳳凰來儀某甚腐於力韓詩弱于材而腐于力徒味其言鄭當時傳誠有味其言也荀文若之不進不休於豫愧甚吾夫子之可久可速惟君裁之代回崇仁潘宰方謝舉代何月湖比剡需章聊紀陟明之績尚書三考黜陟幽明詳見前鼎來巽牘顧捐投暗之疑比需鼎巽四卦名受言藏之詩彤弓弨兮受言藏之無可謝者恭惟某官刃有餘地莊子恢恢乎其於游刃必有餘地矣琴不下堂韓詩外傳子賤治單父彈鳴琴身不下堂而單父治君子學道則愛人計望風而成俗小人難事而易悅肯違道以近名尚書罔違道以干百姓之譽莊子為善無近名作新梟泮之好音梟音梟詩翮彼飛梟集于泮林食我桑黮懷我好音疏云惡聲之鳥食桑黮而變音喻不善之人感恩惠而從化餘事虹隄之竒觀韓詩餘事作詩人王荆公詩餘事文章海外傳山谷詩石隄眠長虹朝野簽載趙州石橋望之如初月出雲長虹飲澗六一居士集有偃虹隄記是為實茂司馬相如傳騰茂實當以名聞某推轂力綿鄭當時傳其推轂士嚴助傳綿力薄材投簪心棘文選昔聞投簪逸海岸今見解蘭縛塵纓又聊以投吾簪棘急也潘令君之桃李度已成隂晉潘嶽為河陽令植桃李花人號曰河陽一縣花庾信枯木賦若非金谷滿園樹即是河陽一縣花何將軍之山林惟當托䕃杜工部陪鄭廣文遊何將軍山林詩不識南塘路今知第五橋宋張禮茂中遊南城記云今第五橋在韋曲之西與沈家橋相近南塘不審所在按許渾詩云背嶺枕南塘其亦在杜曲左右乎月湖金溪人崇仁為鄰邑故偕以為況代回涂察推岑求舉未允通家講好托年契以為多孔融傳纍世通家柳文於崔君有通家之舊托言俱捷謂之同年進士會宴曲江崔彖告假不赴乃以雕幰載妓遊觀崔沆為主罰録事判之云紫陌紅塵便隔同年之面青雲得路可知異日之心杜荀鶴次同年張曙詩九華仙叟驚凡骨同到蓬萊豈偶然助國薦賢惜歲員之無幾裘不供於晚索璧乃負於暗投俱見前所幸在邦域之中必能察形骸之外莊子今子與我遊於形骸之內而子索我於形骸之外不亦過乎韓詩誰能檢㸃形骸外恭惟某官槐根之芷荀子蓬生麻中不扶而直蘭槐之根是為芷注蘭槐香草也本草白芷一名白茞陶𢎞景云離騷所謂蘭茞也蘭槐當是蘭茞别名故云蘭槐之根是為芷也蘭茁其芽韓文幼子姢好靜秀瑤環瑜珥蘭茁其芽稱其家兒也俊逸參軍已露囊中之穎李詩俊逸鮑參軍逍遙嘉客竟歸幕府之羅詩所謂伊人于焉逍遙又所謂伊人于焉嘉客乃今懷黃拖紫之人楊僕傳懷銀黃注黃金印也晉書儒林傳紆青拖紫服冕乘軒魏略紆青拖紫以千萬為數沈約齊司徒安陸昭王碑自兹以降懷青拖紫半是泛緑依紅之客寧須畫餅俱見前更助譟旗寇恂傳士馬四集幡旗蔽野恂乃令士卒乘城鼓譟六一居士集安得二子接揮鋒兩交鋩我亦願助勇鼓旗譟其旁管輅别傳琅琊太守單子春聞輅一黌之俊欲得見輅輅造之大㑹賔客百餘人輅問子春今欲與輅為對者若府君四座之士邪子春曰吾自與卿旗鼓相當某有味其言甚腐于力請待來年之麨時則易然俱見前恐及往戍之瓜風斯下矣莊子故九萬里則風斯在下矣四六標準卷三
