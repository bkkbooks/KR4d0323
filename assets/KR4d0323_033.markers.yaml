  - {type: variant, offset: 5370, length: 277, content: 多景樓在甘露寺宋張邦基墨荘漫録云鎮江府甘露寺在北山上江山之勝煙雲顯晦萃於目前舊有多景樓尤為登覽之勝蓋取李贊皇題臨江亭詩有多景懸牕牖之句以是命名即臨江故基也裴煜守潤日有詩云登臨毎憶衛公詩多景惟於此䖏宜海岸千艘浮若芥邦人萬室布如棊江山氣象囘環見宇宙端倪指㸃知禪老莫辭勤候迓使君官滿有歸期自經兵火樓廢近雖稍復經營而樓基已半侵削殊可惜也宋米芾詩兩州城郭青煙起十里江山白鷺飛海近雲濤驚夜夢天依月露濕秋衣北固山在府治北一里廻嶺下臨長江其勢險固即府治所據及甘露寺基建康實録梁武帝幸京口登北固樓遂改名北顧唐竇常詩山趾北来固潮頭西去長宋王安石詩天末海門横北固煙中沙岸似西興, SBCK: ''}
