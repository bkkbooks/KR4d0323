  - {type: variant, offset: 2, length: 0, content: '', SBCK: 安集欲慰疲甿同寅恊恭和􅂨正資益友所慙尺牘有觖朋箋魚相忘於江湖諒不責腹中之素鳯又繼之日夜尚同歌肘後之騷代回江東提刑譙寳文令憲寳廬寓直玉節按刑江淮草木之威名亶孚有衆河洛圖書之經緯爰寵此行恭惟某官奥閥剌天脩名拔地胷吞雲夢何小者之足言舟近蓬萊又悠然而引去萬牛莫挽}
