  - {type: variant, offset: 0, length: 0, content: '', SBCK: 卷之二十五憲使賀李知府除潼川提刑鐊丹檢起家繡衣問俗故國非喬木之謂世選爾勞奕葉茂猗蘭之光汝陳時臬星言􅀟節風聳列城恭惟某官器􅀶而通材弘以毅卓犖坐空於萬馬笑談立解於千牛謂之檮杌謂之春秋素髙家學有􅀂伊陟有􅀂臣扈冝襲丗官與其勞四國之蕃宣不􅀂奉六條而廉察公私之積可痛有頼阜通輕重諸罰有􅁠尤資閱實昔者鯉趍而獨立今兹虎拜以揚休載馳載驅共說西平之有子善繼善述更􅀚東府之象賢某濫守憇棠獲依䕃樾作鹹作辛作苦幾不容一日之安惟内惟貨惟來詎敢逭二天之按其為歸􅀝罔旣編摩賀潼川李提刑除䕫路提刑鐊自天出綍易地褰帷家人有嚴君焉舊膺此選皇華遣使臣也今丗其官雖曰因避親之嫌亦見善繼人之志䕫藩幸甚梓部駭然恭惟某官器重以周材弘且毅與人忠而執事敬見善明而用心剛四國于蕃茂甘棠之蔽芾六轡如組訝苞栩之倭遲曽未暖席之間倐有攺轅之命惟四蜀之門戸􅀝三峽爲咽吭昔先正保衡於此展澄清之志今命汝大正庶乎體}
