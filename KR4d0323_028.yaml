body:
  text: 四六標準卷二十八宋李劉撰太守下代回翟峽州畯峽州秦漢為南郡魏武置臨江郡蜀改宜都郡吳曰西陵宋齊竝為宜都郡梁置宜州西魏改為托州後周以地扼三峽之險改托為硤隋改夷陵郡唐改峽州始從山宋因之范石湖吳船録云古語曰荆門虎牙楚之西塞夷陵即其地自古以為重鎮三國時又為吳之西陵陸遜以為夷陵要害國之關限今吳蜀共道此地但為蕞爾荒壘耳陸務觀入蜀記云峽州在唐為硤州後改峽而印文則為陜州元豐中郎官何洵直建言陜與陜相亂請改鑄印文從山事下少府監而監丞歐陽發言湖北之陜州從阜從夾陜西之陜州從阜從夾邊㫄不同本不相亂恐四方謂少府監官皆不識字今按陜州之陜從夾夾音閃從二入湖北之陜從夾夾訖洽切從二人左右持也陜亦作峽詳啓意蓋代月湖下同象刑贊治自愧罔功尚書象以典刑又方施象刑惟明尚書大傳唐虞象刑犯墨者蒙帛巾犯劓者赭其衣犯臏者幪其臏犯大辟者衣無領晉刑法志犯黥者皂其巾犯劓者丹其服犯臏者墨其體犯宫者雜其屨大辟之罪殊死之極布其衣裾而無緣領王莽太傅唐尊出見男女不異路下車以象刑赭瀋汚其衣雉正共工猥令攝長杜氏通典五雉為五工正雉有五種西方曰樽雉東方曰鵰雉南方曰翟雉北方曰鵗雉伊洛之南曰翬雉愧未申於㢲謝遽先辱於謙撝易無不利撝謙恭惟某官燕譽甚休詩慶既令居韓姞燕譽注燕安譽樂也驛除不逺閒香山之白傅歲月已深白居易傳起為同州刺史不拜改太子少傅居易為當路所忌遂擯斥所蘊不能施遂無立功名意與弟行簡從祖弟敏中友愛東都所居履道里疏治種樹搆石樓鑿八節灘自號醉吟先生晚學浮屠法至經月不茹葷稱香山居士起東海之蕭生風雲胥㑹蕭望之傳宣帝自在民間聞望之名曰此東海蕭生耶後漢書馬武傳論咸能感㑹風雲奮其智勇劉𤣥傳贊聖公靡聞假我風雲注易曰雲從龍風從虎聖人作而萬物覩假借也言聖人初起無所聞知借我中興風雲之便有如衰朽諒借吹噓某自揣頭顱見前不堪指目栁文羣怪聚罵指目牽引新唐書李昭德傳昭德頗怙權為衆指目東坡詩所至人聚觀指目生毁譽聊復爾耳少陪鳴履之班行或使之即控挂冠之請竝見前代回程慶元準慶元已見制五刑即天論贊曹無補論音倫禮記凡制五刑必即天論注制斷也必即天論言與天意合居四民時地利攝長可慙尚書司空掌邦土居四民時地利即拜誤恩陳後山詩將老蒙誤恩詳見前亦懷厚芘恭惟某官賢勞於外聖眷已深憐草木之味同假之聲氣左傳今譬於草木寡君在君之臭味也惜桑榆之景晚借以寵光挽回神武之冠躐視文昌之座竝見前某餘年無幾晉張忠傳苻堅遣使徵之沐浴而起謂弟子曰吾餘年無幾不可以逆時主之意劉敏元字道光永嘉之亂同郡管平以年老從敏元西奔為賊所劫敏元謂盜曰此公餘年無幾願以身代東坡南華寺六祖塔功德疏憐幼稚之無辜除其疾恙念餘年之無幾賜以安閒又詩餘年知幾何佳月豈屢逢取數已多禮記取數多者仁也司喉舌之納言濫巾甚愧詩出納王命王之喉舌北山移文竊吹草堂濫巾北嶽借齒牙之餘論納履為期南史謝朓傳朓好奬人才㑹稽孔顗粗有才筆未為時知孔圭嘗令草讓表以示朓朓嗟吟良久手自折簡寫之謂圭曰士子聲名未立應共奬成無惜齒牙餘論其好善如此納猶著也禮記坐右納右言著右足之屨說苑田子方曰士貧賤者言不用行不合則納履而去耳代回孫衢州子直衢州春秋為越姑蔑之地秦屬㑹稽為太末縣漢因之東漢分太末立新安縣晉改曰信安唐平李子通析婺州之西境於信安縣置衢州元和志以州有三衢山故名吳㑹須知云以路通三越故名三衢山在常山縣圖經昔有洪水暴出派兹山為三道故名憲曹贊長徒玩歲以罔功通典唐天寶中改刑部為憲部起部虛負遂誤恩而率屬有渥枌榆之庇密榮蒲栁之凋竝見前恭惟某官作牧近畿肇基王業尚書肇基王迹有功則恱行頒一札之書詩序有功而見知則恱矣後漢書一札十行位事惟能㑹振六官之譽尚書建官惟賢位事惟能左傳成公十八年晉悼公即位于朝始命百官凡六官之長皆民譽也舉不失職官不易方爵不踰德師不陵正旅不逼師民無謗言所以復霸也晉作六軍以六卿統之六官之長即六卿也譽望也曲憐衰朽巧借吹噓鄭太傳清談高論噓枯吹生某久欲投簪左太冲詩躊躇足力煩聊與投吾簪寧堪鳴履司納言之喉舌恐乏告猷詩逺猷辰告尚書爾有嘉謀嘉猷則入告爾后于內借餘論於齒牙早期歸老見上條代回張澧州忠恕澧州已見分符竹使漢文帝紀初與郡守為竹使符注竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五出牧蘭江楚詞云捐余佩兮澧浦因稱珮浦又云澧有蘭故曰蘭江杜牧之詩蘭浦蒼蒼春欲暮落花流水動離襟劉夢得詩鄰境諸侯同舍郎芝江蘭浦恨無梁諒棨㦸之初臨已袴襦之交詠恭惟某官人門具美竝見前仕學皆優粵從幕水之依空羣冀野南史王儉用庾杲之為衛將軍長史蕭緬與儉書曰盛府元僚實難其選庾景行泛緑水依芙蓉何其麗也時人以入儉府為蓮花池故緬書美之韓文伯樂一過冀北之野而馬羣遂空尋駕屏星之寵歌滿海沂兹斂惠於一州行報政于五月竝見前某語離方爾賀上闕然白樂天詩賀上人回得報書邅吾道兮洞庭相知已晚屈原九歌駕飛龍兮北征邅吾道兮洞庭遺余褋兮澧浦藏弆為榮屈原九歌捐余袂兮江中遺余褋兮澧浦褋音牒說文南楚謂禪衣曰褋楚詞注襟襜褕事神所用代回潘真州友文真州已見象刑贊二自愧罔功雉正攝丞猥令率屬竝見前非餘波之逺竊左傳其波及晉國者君之餘也何誤渥之驟加恭惟某官朝績方華民庸甚茂駕輕就熟不忘推轂之言韓文若駟馬駕輕車就熟路噓枯吹生巧借託根之地後漢書鄭太傳孔公緒清談高論噓枯吹生注枯者噓之使生生者吹之使枯言談論有所抑揚也山谷詩江梅有佳實托根桃李場故令尸素亦復佩蒼禮記大夫佩水蒼玉而純組綬某餘年無多休日已晚惟是識鄭崇之履莫報君恩正當挂𢎞景之冠歸歌聖德竝見前代回安慶楊國博楫安慶春秋時為皖國匽姓咎繇之後亦為舒國桐國之地皆為楚所滅戰國屬楚秦屬九江郡漢屬廬江郡梁置豫州陳曰晉州隋曰熙州唐改舒州宋因之政和升德慶軍紹興以康州升德慶府改安慶軍又以寧宗潛邸升安慶府元帥辟賢名儒出牧傳道解惑太學固教化之原韓文師者所以傳道受業解惑也謹身帥先郡守亦吏民之本漢書循吏傳序皆謹身帥先居以廉平及至孝宣以為太守吏民之本也數變易則下不安恭惟某官器資端諒學術粹夷論不詭於聖人皆師友乎孔孟揚雄傳贊揚子之書文義至深而論不詭於聖人師古曰詭違也聖人謂周公孔子達可行於天下真妾婦乎儀秦自服班行韓詩班行再肅穆益隆譽處詩燕笑語兮是以有譽處兮詳見前士有矜式甚慰橋門億萬人之心民無歎愁却須刺史二千石之力竝見前用召父杜母之政杜詩傳遷南陽太守比室殷足時人方於召信臣故南陽為之語曰前有召父後有杜母注召信臣為南陽太守為人興利務在富之慰桐君皖伯之邦安慶懷寧縣本漢廬江郡皖縣周大夫皖伯始封於此桐城縣本春秋桐國世傳有桐君藥録互見前一郡得賢萬物吐氣某未由削櫝先辱飛緘君豈薄淮揚耶當還禁闥竝見前吾必在汶上矣猶見璽書循吏傳序二千石有治理效輒以璽書勉厲增秩賜金或爵至關內侯代回周建昌燧建昌已見入覲天陛出牧江城杜詩鼓角動江城地小而民實殷無謂附庸之陋政平則訟自理蔚為保障之雄循吏傳序庶民所以安其田里而亡歎息愁恨之心者政平訟理也恭惟某官濟美象賢蜚英燕譽竝見前頃為別乘既邦國之不空王祥傳邦國不空別駕之功詳別見今則專城諒湖山之自得古辭陌上桑三十侍中郎四十專城居韓文令行于户庭數日之間而人自得於湖山千里之外眷旴江之小壘西漢地理志南城縣注云旴水西北至南昌入湖漢旴江之名肇於此或謂江南旴村有老姥自此山去故號旴母江見南唐韓熙晟旴江亭記或謂旴真君窮水源至血木四因此得名宋曾布詩軍山流泉初濫觴繚繞東出為旴江峯巒隱映淵源長地靈物秀雄吾邦接閩嶠之要衝王平叔建昌軍記捍禦七閩牽制百粵欲寬愁恨歎息之民是在賢良慈惠之帥銅陵石磴尋謝屐之風流謝靈運華子岡詩詳見前金盤玉杯識顔碑之氣骨顔魯公麻姑壇記詳見前是不落莫何有鄙夷見前某方此違離悒然馳傃傃蘇故切向也插三萬軸嘗願託於主盟韓詩插架三萬軸左傳何以主盟奉咫尺書敢再溫於前請溫燖也以火熱物曰燖左傳若可燖也亦可寒也疏云燖溫也前盟已寒更溫之使熱代回趙肇慶肇慶本秦南海郡地漢置蒼梧郡高要以縣屬焉宋文帝割南海郡四㑹縣置綏建郡梁立高要郡隋立端州煬帝罷端州為信安郡唐立端州以州當入廣西之要口也為高要又以四㑹縣置南綏州改綏州為真州尋廢真州以四㑹縣𨽻廣州改高要郡復為端州宋以徽宗潛藩升興慶軍節度廣東運判燕瑛請賜美名遂名肇慶府鬚垂霜白甚便烏角之巾便毗連切說文安也晉羊祜與從弟護書曰年已朽老既定邊事當角巾東洛還歸鄉里海録碎事薛革除左散騎常侍年至而無疾請告角巾東洛時甚高之杜詩錦里先生烏角巾腰佩水蒼仍玷紫荷之槖禮記大夫佩水蒼玉晉書輿服志八坐尚書荷紫以生紫為夾囊綴之服外加于左肩昔周公負成王制此服衣至今以為朝服唐類表佩蒼玉服紫荷詳別見何勤妙墨文選淵雲之墨妙更示徽言尚書豫旦己受人之徽言恭惟某官大雅不羣在宗載考詩湛湛露斯在彼豐草厭厭夜飲在宗載考箋載之言則也考成也夜飲之禮在同姓諸侯則成之於庶姓其讓之則止駒翩翩兮長駕早空冀北之羣鳶跕跕兮卑飛猶落嶠南之逺馬援傳仰視飛鳶跕跕墮水中嶠渠廟切說文山鋭而高也增韻山道佇䇿龔黃之績東坡詩龔黃側畔難言政羅趙前頭且眩書歸圖勉峴之功李勉李峴唐宗室宰相詳見前某有七不堪嵇叔夜與山巨源絶交書自惟至熟有必不堪者七甚不可者二負二宜去昌黎孔戣墓志吾負二宜去尚奚顧子言詳別見㑹且歸矣願為聖人之氓詩㑹且歸矣無庶豫子憎愛莫助之請續循吏之傳見前代回王楚州益祥楚州即宋昭信軍春秋時為吳善道秦改東陽西漢為盱眙縣屬臨淮郡東漢屬下邳國東晉以來為盱眙郡陳置北齊州唐改西楚州改𨽻泗州宋屬楚州復𨽻於泗中興以來升為盱眙軍紹定間金人餘衆哈納邁珠乞降改招信軍領縣三治盱眙入紆漢組出牧淮壖壖而宣切江湖邊地銅虎分符資循良之共理石龜設險喜牧御之得人龜山在盱眙縣北三十里其西南上有絶壁下有重淵太平廣記禹治水以鐵鎖鎖淮渦水神巫支祁於此山之足唐永泰中李湯以牛五十引鎖出之鎖末有一青猿高五丈許復拽牛沒水宋張商英龜山水陸院記以佛書考之則五百梵僧游止之地以仙經考之則太真元君之別治也王荆公詩黃塵欲礙龜山出白浪空分汾水來恭惟某官材具寬詳器資敏劭循循善誘立美教於鱣堂楊震傳有冠雀銜三鱣魚飛集講堂前鱣音善通作鱓諤諤以昌振直聲於烏府家語湯武以諤諤而昌桀紂以唯唯而亡屈伸以道出處何心兹屈摶風九萬里之程姑從起家二千石之寵山陽古郡江北要衝都梁志序盱眙為國北門為今重鎮陸務觀翠屏堂記盱眙實梁宋吳楚之衝師旅饑饉之餘民亦勞止勞來安定之政公優為之禮記周公優為之某別日猶新㳙辰未審雙魚中素猥勤先施之光施施智切惠也與也毛氏曰凡施設之施平聲施與之施竝平去通押千騎上頭莫贊前驅之慶古辭陌上桑東方千餘騎夫壻居上頭徐伯陽詩欲識東方千騎歸藹藹日暮風塵起代回趙江隂彥造江隂為古延陵邑之地季札封於延陵故其地屬吳秦漢以來郡則㑹稽吳郡縣則毗陵鄉則暨陽晉武置毗陵郡併置暨陽縣屬焉梁敬宗始置江隂郡及江隂縣唐置暨州南唐始建江隂軍宋嘗三廢為縣南渡後以軍繼以知縣兼軍使及金人入寇復為軍其廢也竝為毗陵屬邑其復也竝為軍入對文石出牧澄江江隂名澄川見保大元年招隱院記天近帝畿已覺王孫之貴杜詩尚覺王孫貴豪家意頗濃地名道院諒無刺史之難宋王闢之澠水燕談云江隂軍北距大江地僻鮮過客無將迎之煩所𨽻一縣公事絶少通州南阻江東北濱海士夫罕至居民魚鹽自給不為盜獄訟希簡仕宦二州者最為優逸故士夫以江隂為兩浙道院通州為淮南道院韓文有刺史之榮而無其難為者將在於此乎恭惟某官卓然宗標展也國器爾雅展信也注方言荆吳淮泗之間謂信為展詩展也大成韓安國傳唯天子以為國器師古曰國器者言其器用重大可施於國政也房𤣥齡傳高孝基名知人謂裴矩曰僕觀人多矣未有如此郎者當為國器大功二十之一舉才子以為宜左傳天下同心戴舜以為天子以其舉十六相去四凶也舜有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也十六相謂高陽氏才子八人高辛氏才子八人高陽席顓頊之號高辛帝嚳之號十六人其苗裔也同姓五十有三友邦君而亦衆漢書諸侯王表昔周監於二代三聖制法立爵五等封國八百同姓五十有餘尚書嗟我友邦冢君眷浙河之奧壤莊子浙河以來宋江隂軍𨽻浙西路在申浦之名邦申浦在今江隂縣西三十里昔春申君開浦置田為上下屯自大江南導分而為二東入無錫西入武進戚墅俱達於漕河舳艫相銜如枕席之上武帝紀舳艫千里趙充國傳信威千里從枕席上過師注橋成軍行安易若於枕席上過也湖山自得歸庭户之中韓文令修於庭户數日之間而人自得於湖山千里之外使細民而息肩左傳請息肩于晉在大宗之維翰詩大邦維屏大宗維翰某儀圖賀厦寖迫歸田八座前銜恍已成於芻狗尺書厚意聊附報於歸鴻竝見前代回趙南雄善契南雄秦屬南海郡漢平南粵而曲江以縣𨽻桂陽郡統於荆州三國屬吳分桂陽為始興郡治曲江而始興以縣屬焉劉宋屬廣興郡齊復屬始興梁陳因之隋廢始興郡屬廣州唐初屬韶州復分其地置新昌縣南唐割韶之須昌始興二縣置雄州宋潘美征嶺南克英雄二州以河北有雄州故加南字宣和賜名保昌郡今為南雄府詳啓意蓋以韶州別駕遷南雄太守懷組新興韶州東漢置始興都尉孫吳置始興郡劉宋改唐興郡齊復為始興改轅舊部趙先為韶州別駕昔為半刺猶未究於全材兹既專城諒不孤於共理恭惟某官飛英屬籍司馬相如傳蜚英聲騰茂實文帝紀復諸劉有屬籍家無所與擢秀儒科吕安書植根芳苑擢秀清流杜詩偶然擢秀非難取楚令尹之清已之無慍漢良吏之盛去則見思循吏傳序漢世良吏於是為盛所居民富所去見思久於飛鳧王喬傳喬有神術為葉令每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳧從東南飛來於是候鳧至舉網張之但得一隻舄焉晚而展驥剔藪欲搜於劉闢昌黎元和聖德詩八月壬午闢棄城走是日崇文入處其宇分散逐捕搜原剔藪闢窮見窘無地自處啜羮不愧於樂羊戰國策樂羊為魏將攻中山其子時在中山中山君烹之作羮致於樂羊樂羊食之古今稱之曰樂羊食其子以自信明害父以求法山谷詩啜羮不如放麑樂羊終愧巴西兹從三楓方輿勝覽韶州記曰曲江縣修仁水西南連水北有三楓亭五渡水齊范雲為始興太守至修仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲修仁水不挹背邪流渡一作浪就領半竹文帝紀初與郡守為銅虎符竹使符注竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五各分其半右留京師左以與之吏民㫄午共欣別駕之重留號令先庚不待賢侯之再命竝見前紅旗破敵白樂天詩紅旗破賊非吾事黃紙除書無我名畫㦸凝香某側聞下車未由上記竝見前種栁而歌刺史願早成隂栁河東種栁詩栁州栁刺史種栁栁江邊談笑為故事推移成昔年垂隂當覆地聳幹㑹參天好作思人樹慚無惠化傳折梅而憶故人無忘寄驛荆州記陸凱與范曄相善自江南寄梅花一枝詣長安與曄贈詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春按梅嶺在南雄張子韶詩詩人嘗說嶺頭梅往往春風自此來我到嶺前都不見空將春夢又空回代回黃嶽州渙嶽州已見黃渙字德亨光澤人父敦義以六經教子七子皆有成立渙志篤學博嘗從吕祖謙游學淳熙戊戌南省第二人後守嶽州罷廚傳蠲魚稅毁淫祠卒年八十兄謙字德柄亦游朱吕之門入對楓宸出分竹使京洛雲山外方佇來儀乾坤日夜浮又煩坐鎮杜詩昔聞洞庭水今上嶽陽樓吳楚車南拆乾坤日夜浮任彥升箋道風高論坐鎮雅俗恭惟某官恢然抱負韓文抱負其業東歸于家多所踐􅏡攜龍枕參早冠南宫之進士漢書天文志杓携龍角衡殷南斗魁枕參首注杓斗柄也龍角東方宿也携連也禮部曰南宫唐韋永貽詩白蓮十朵照廊明一片升平雅頌聲才唱第三條燭盡南宫風月畫難成馮熊接軫厯試東方之諸侯唐徐游藝碑秩映隼旟榮驂熊軾職源隼飛旟上熊伏軾前尚書畢公率東方諸侯立應門右東坡詩若為東諸侯長此佳山川豈袁盎直諫乃不居中袁盎傳盎以數直諫不得久居中調為隴西校尉抑望之雅意固求補外蕭望之傳望之雅意在本朝逺為郡守意不自得屈伸以道出處何心今奉建武之細書建武光武年號循吏傳序一札十行皆細書成文坐覽嶽陽之大觀觀古玩切易大觀在上范文正公嶽陽樓記巴陵勝狀在洞庭一湖銜逺山吞長江浩浩湯湯橫無際涯朝暉夕隂氣象萬千此則嶽陽樓之大觀也先天下而憂後天下而樂不在兹乎范文正公嶽陽樓記其必曰先天下之憂而憂後天下之樂而樂歟噫微斯人吾誰與歸有刺史之榮無刺史之難亦足試矣韓文有刺史之榮而無其難為者詳見前某負二宜去見前有兆足行我欲破何山之葷且甘藿食南史何𦙍傳𦙍二兄求㸃並棲遁世號㸃為大山𦙍為小山初𦙍侈於味食必方丈後稍欲去其甚者猶食白魚鱔脯糖蟹汝南周顒與書勸令食菜故𦙍末年遂絶血食又常禁殺虞人逐鹿鹿徑來趨𦙍葷許云切說文臭菜也徐曰通謂藝臺椿韭蔥蒜阿魏之屬方術家所禁謂氣不潔也爾雅翼云釋以大小蒜興渠慈葱茖慈為五葷道以韭蒜藝臺胡荽薤為五葷後山和黃預感懷詩壁立無堪佐子貧謾修簡牒效殷勤起臨月鏡看生意卧向晴簷共白雲逸氣不應供潦倒劇談脫或致紛紜但令蘇晉禪妨醉不患何山病故葷曹植七啓豫甘藜藿未暇此食也代月湖故用何𦙍事公當增黃霸之秩而入筍班北夢瑣言唐末朝士中有人物者號玉筍班又外郎班清緊不雜亦號玉筍班鄭谷詩渾無酒泛金英菊漫道官居玉筍班山谷詩誰憐舊日青錢選不立春風玉筍班代回張潮州鎬潮州即漢南海之揭陽縣地晉成帝分立東官郡安帝又分東官置義安郡及海陽縣梁置東揚州又改瀛州隋置潮州大業中為義安郡唐武德中復為潮州天寶初改潮陽郡乾元初復為潮州宋因之出綸西掖劉楨詩誰謂相去逺隔此西掖垣注洛陽宫有東掖門西掖門作牧東揚潮州梁為東揚州魚佩虎符香自凝於燕寢新唐書循吏傳序初刺史準京官得佩魚品卑者假緋魚文帝紀二年九月初與郡守為銅虎符鳳城龍首患何有於鱷魚鳳凰山在海陽縣昔有爰居來集因名之鳳城得名以此龍首山在潮陽縣一名穫子山又名候子山鱷溪一名惡溪東流五十里入於海溪有鱷魚四足黃身修尾其形如鼉舉止趫疾口森鋸齒往往為人害鹿行崖上羣鱷鳴吼鹿怖墮崖為鱷所得唐書韓愈傳愈至潮問民疾苦皆曰溪有鱷魚食民畜産且盡民是以窮愈為文祝之是日風電起溪中水盡涸自是潮無鱷魚患類苑陳堯佐以言事謫潮州通判州人為鱷魚所食乃命吏督漁者網而得之鳴鼓告其罪戮之於市恭聞某官喬木聞家茁蘭秀質高山流水早收出宰之榮韓詩出宰山水縣明月清風尋取平分之寵民懷五袴竝見前君夢三刀岑參詩刀州先入夢東坡詩不羡三刀夢蜀都眷是潮陽雄于廣郡善必聞惡必見雖嶺海如畿甸之間昌黎潮州謝上表朝廷治平天子神聖雖在萬里之外嶺海之陬待之一如畿甸之間輦轂之下有善必聞有惡必見守此土治此民乃貢賦供宗廟之壤昌黎鱷魚文今天子神聖四海之外六合之內皆撫而有之况禹跡所掩揚州之近地刺史縣令之所治出貢賦以供天地宗廟百神之祀之壤者哉刺史受天子命守此土治此民而鱷魚與刺史亢拒爭為長雄刺史安肯為鱷魚低首下心以偷活於此耶惟能誕布韓昌黎之政自可細和鄭餘慶之詩鄭餘慶字君業鄭州滎陽人一統志云餘慶貶潮州司馬以詩自娛不以逺謫介意按新舊唐書皆云餘慶貶郴州司馬此云潮州當別有據又盧氏雜記云鄭餘慶清儉有重德一日忽召親朋數人㑹食間話移時諸人皆囂然餘慶呼左右曰處分廚家爛蒸去毛切莫拗折項諸人以為必鵝鴨之類良久就餐每人前下粟米飯一碗蒸胡蘆一枚相國餐美諸人強進而罷某從雙魚中聞千騎上見前文軫之薄桂海無有遐心選詩文軫通桂海姓名之在御屏願恢逺業新唐書循吏傳序太宗嘗曰朕思天下事丙夜不安枕永惟治人之本莫重刺史故録姓名於屏風卧興對之得賢否狀輒疏之下方以擬廢置代回章象州時言秦始皇南取百粵以為桂林象郡象郡之名始此然秦象郡乃交趾非今之象州漢初為趙他所據漢武平南越以桂林地置鬱林郡而秦之象郡更名日南今之象州即鬱林郡之中溜潭中二縣也吳分鬱林置桂林郡晉桂林郡有潭中而無中溜宋桂林郡有中溜而無潭中陳置象郡隋置象州此則象州之所從始也煬帝廢州為縣唐復置州宋因之夏辟三千二卿弗績晉刑法志夏后氏之王天下也則五刑之屬三千殷因於夏有所損益冬官六十攝長奚功過辱高情逺垂下問恭惟某官材猷膚敏政術融明竹使虎符亶謂人生之貴杜詩人生五馬貴桂林象郡諒增地望之雄象山在陽夀縣西五里以形得名西山與象山相連嶺外代答云象州郡治西樓正面西山山腹匆起白雲狀如白象經時不滅然不常有州之得名或由於此非秦之桂林象郡也今象州城門畫一白象不知何義然象州自昔不遭兵革凡有大盜皆相戒以不宜犯象鼻畫象之意其在兹歟稗史㑹編云徐中行參政廣西行出象州計此必多象不然何以為郡名問之舟人云此絶無象心怪之明日早作見山崖水次白象以千數或飲或食或趨或卧或相戲逐其狀不一中行詰舟人曰爾謂無象此為何物舟人曰此山氣所結日高當不見中行不信至日出象漸散滅無一存者乃知古人以其氣名之按此殆如登州海市之類嶺外代答所謂山腹白雲者豈即是歟因疑古人氣象二字或本於此猶枉雙魚見華五雉某去天雖近來日無多竹馬交迎公當厚南土之惠俱見前蓴鱸既熟我當御西風而行莊子列子御風而行泠然善也注泠然輕妙之貌代回施溫州緘溫州秦屬閩中郡漢屬㑹稽郡之回浦縣後改回浦為章安縣章帝分章安縣東甌鄉置永寧縣吳以㑹稽東郡都尉為臨海郡晉明帝分臨海郡五縣立永嘉郡隋改括州唐高宗分括州置溫州後建寧海軍使宋降為軍事咸淳元年以潛藩升瑞安府郡有溫嶺其地常燠少寒州名或本於此西曹叢棘之卿躐升五雉禮記正以獄成告于大司寇大司寇聽之棘木之下易坎上六係用徽纒置于叢棘三歲不得凶南國甘棠之伯逺寄雙魚詩序甘棠美召伯也召伯之教明於南國頌而不規韓文不以頌而以規榮亦為愧恭惟某官身兼數器薛宣傳經術文雅足以謀王體斷國論身兼數器有退食自公之節惠斂一州韓文斂此大惠兮施于一州雅志在乎本朝行召君矣蕭望之傳望之雅意在本朝汲黯傳吾今召君矣好善優於天下豈欺我哉故令陳人莊子人而無人道是之謂陳人復被新渥杜詩新渥照乾坤某亦聿既髦詩借曰未知亦聿既髦豈不懷歸詩豈不懷歸畏此簡書天子以孔戣為尚書三留甚愧韓文孔子之後三十八世有孫曰戣三上書去官天子以為禮部尚書吏部侍郎韓愈謂曰公尚壯上三留公奚去之果宰相舉龔遂於太守一見即行龔遂傳渤海左右郡歲饑盜賊並起二千石不能禽制上選能治者丞相御史舉遂可用上以為渤海太守代回王寧國補之寧國府即秦鄣郡漢改丹陽郡理宛陵即今治也東漢立宣城郡梁置南豫州隋改宣州唐昭宗時號寧國軍宋為宣州仍為寧國軍節度以孝宗潛藩升府制五刑以即天參聮無補禮記凡制五刑心即天論詳見前周禮設具參傳其伍又官聨以㑹官治居四民而時地率屬可慙尚書司空掌邦土居四民時地利簡拔非宜游揚有自季布傳使僕游揚足下名于天下恭惟某官久分符竹行及戍瓜國人曰賢當拾遺於禁闥汲黯傳臣願為郎中出入禁闥補過拾遺臣之願也天子有詔佇奉計於甘泉韓文無疾其驅天子有詔漢太初元年春受計甘泉師古曰受郡國所上計簿也若今之諸州計帳猶枉魚書見華雉正某日之夕矣詩日之夕矣牛羊下來人謂斯何韓文昔者人謂斯何今者人謂斯何納言喉舌之司濫竽何益見前餘論齒牙之借納履為期南史謝朓傳士子聲名未立應共奬成無惜齒牙餘論說苑田子方曰士貧賤者言不用行不合則納履而去耳代回建寧傅侍郎伯成建寧已見伯成本傳見十七卷臺諫類象刑贊治自愧罔功雉正分工猥令率屬誤恩有自餘芘焉依竝見前恭惟某官王之藎臣詩王之藎臣無念爾祖注藎進也王之進用臣當念汝祖為之法國之元氣禮記天地者元氣之所生萬物之祖律厯志太極元氣函三為一李固傳斗斟酌元氣運平四時淮南子宇宙生元氣班固傳降烟煴調元氣元戎小隊又頒千里之春杜詩元戎小隊出郊埛頒通作班崔駰傳乃強起班春注班布春令也方國細書行趣九重之覲曲憐衰朽韓詩肯將衰朽惜殘年密借品題李太白集一經品題便作佳士故躐長於中臺使少華於末路鄒陽傳晚節末路四子講德論曩從末路望聽玉音某身其餘幾左傳畏首畏尾身其餘幾欲者不多慮行道之獨非倚門骯髒趙一傳抗髒倚門邊注抗髒高亢悻直之貌髒子朗切韻㑹骯髒體胖又則浪切立貌愴休日之已晚搔首踟蹰詩愛而不見搔首踟蹰蹰重株切又陳留切注心既愛之而不得見故搔其首而踟蹰然鄭曼季答陸雲詩誰謂河廣曾不容舟企豫望之搔首踟蹰代回新平江趙待制希懌平江已見宋史本傳希懌字伯和燕王八世孫登淳熙十四年進士第趙汝愚帥福建希懌為屬吏薦於辛弃疾弃疾亦薦其能調江東運司幹辦改太平州通判遷江西茶鹽提舉升本路帥兼漕事經略郴寇李元礪功未竟移知平江府其後卒平元礪移知太平州已而乞祠遷端明殿學士換昭信軍節度使開府儀同三司致仕卒贈少保封成國公弭節江城離騷經吾令義和弭節兮建牙輔郡見前鸞鳴滕閣久雅望之遙臨王勃滕王閣詩滕王高閣臨江渚佩玉鳴鸞罷歌舞詩序都督閻公之雅望棨㦸遙臨燕寢蘇州暫凝香之森衛韋蘇州詩兵衛森畫㦸燕寢凝清香恭惟某官偃藩明德敘傳木偃息以藩魏左思詠史詩吾希段干木偃息藩魏君詳見前胙土大勳潘勗冊魏公九錫文先王竝建明德胙之以土分之以民崇其寵章備其禮物衮衣繡裳宜拜左周公之命見前雕弓皂蓋又分右馮翊之符荀子天子雕弓諸侯彤弓大夫黑弓禮也卧而治之汲黯傳吾徒得君重卧而治之爾東觀漢記景丹𢎞農太守帝謂曰知將軍病但得將軍威重卧以鎮之足矣行且召矣某罔功犴獄詩宜犴宜獄今文作岸毛傳岸訟也韓詩云鄉亭之獄曰犴法言梐犴使人多禮攝長雉工昔受一廛事其大夫賢者今為三輔無以我公歸兮竝見前代回陳撫州蕃孫撫州已見詳啓意陳蓋月湖同年之子牧夫庶獄之司躐升五雉尚書其勿誤于庶獄惟有司之牧夫邦君諸侯之寵逺寄雙魚尚書爾庶邦君又惟邦君月湖撫人故稱邦君受之赧然感亦厚甚恭惟某官器資敏劭治術寬明師出於陳鄭之間孰共屝屨屝父沸切說文履也從尸非聲釋名草履曰屝曰不借言賤易有宜各自足不假借也方言屝粗屨絲作曰屨麻作曰屝通作菲左傳申侯曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝屨其可也人樂其龔黃之教謂有璽書東坡詩龔黃側畔難言政羅趙前頭且眩書似聞棠䕃之成已迫葵丘之代民雖借寇使盍召參竝見前諒敬老之近親禮記貴有德何為也為其近于道也貴貴為其近于君也貴老為其近于親也敬長為其近于兄也慈幼為其近于子也不撫壯而棄穢離騷經惟草木之未零落兮恐美人之遲暮不撫壯而棄穢兮何不改其此度某偶然曳履鄭崇傳為尚書僕射數求見諫諍每聞曳履聲上笑曰我識鄭尚書履聲詳見前行矣投簪左思詩踟蹰足力煩聊與投吾簪君數父執於慈恩誰其存者禮記見父之執不謂之進不敢進不謂之退不敢退不問不敢對此孝子之行也注執友志同者李肇國史補進士既捷列姓名於慈恩寺塔謂之題名玉泉子慈恩寺連接曲江京輦勝境每歲新得第者畢列名於此我得廛氓於仁政顧不幸哉月湖撫州人代回趙常德師乘常德殷周為蠻蜒所居春秋戰國屬楚秦為黔中郡漢更武陵郡梁置武州隋改辰州煬帝更武陵郡唐因之復為朗州昭宗置武勝軍節度後唐為武平郡宋祥符中改鼎州升永安軍改靖康軍升武平軍節度乾道初以孝宗潛邸升常德府升材宗邸作牧價藩見前全楚故邦郡志在昔黔中為楚之南宇左包洞庭之險右控五溪之要秦以虎狼之威而必欲得楚之黔中故楚由是衰今武陵實古黔中郡也義陵雄郡方輿勝覽云初項羽殺義帝於郴武陵人縞素哭於招屈亭高帝聞而義之故曰義陵既有賢明慈惠之帥當無愁恨歎息之民竝見前恭惟某官玉派流芳玉派謂宗室金門賜第金門謂金馬門雲霄一握盍陪護於屬車司馬相如傳犯屬車之清塵應劭曰漢制大駕屬車八十一乘師古曰屬者言相連續不絶者風月平分久徘徊於別乘兹分符竹趣及戍瓜三閭大夫何至斯濯纓甚樂屈原漁父篇屈原既放游於江潭行吟澤畔漁父見而問之曰子非三閭大夫與何故至於斯云云乃歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足武陵太守好事者進棹尤宜昌黎桃源圖詩神仙有無何渺茫桃源之說誠荒唐流水盤回山百轉生綃數幅垂中堂武陵太守好事者題封逺寄南宫下南宫先生欣得之波濤入筆驅文辭文工畫妙各臻趣異境恍惚移于斯云云船開棹進一回顧萬里蒼蒼烟水暮世俗寧知僞與真至今傳者武陵人洞庭無波九歌令沅湘兮無波使江水兮安流又駕飛龍兮北征邅吾道兮洞庭又洞庭波兮木葉下宣室有詔某未遑上記候問下車張酺傳下車擢用義勇摶擊豪强張衡傳下車治威嚴整法度周䊸傳下車先問大姓主名客遺雙魚聊作不逺之復易復初九不逺復無祗悔元吉象曰不逺之復以修身也人生五馬願觀自養之頤易觀頤觀其所養也自求口實觀其自養也代回湖北范漕子長兼鄂州鄂州已見四牡之勞使臣久稽王覲詩序四牡勞使臣之來也左傳王覲為可五雉之為工正謬忝國恩手筆鼎來背芒益重竝見前恭惟某官岷峨雋特江漢經營詩江漢湯湯武夫洸洸經營四方告成于王方言利者析秋毫民力竭矣漢書食貨志郭咸陽齊之大鬻鹽孔僅南陽大冶皆致産纍千金故鄭當時進言之桑𢎞羊洛陽賈人之子以心計年十三侍中故三人言利事析秋毫矣自警編薛簡肅公天禧初為江淮發運使辭王文正公公無他語但云東南民力竭矣薛退謂人曰真宰相之言也得明公而守夏口使指裕如夏口一名魯口似指夏水之口然何尚之云夏口在荆江之中正對沔口通接雍梁實為津要於事為允而章懷太子注東漢水亦謂夏口戍在今鄂州故唐史皆指鄂州為夏口本在江北自吳大帝取對岸夏口之名以名之而江北之名始晦司馬相如傳宣其使指馮奉世者奉使有指式遄其歸詩式遄其歸吉甫作頌穆如清風不逺伊邇詩中心有違不逺伊邇注見前某負二宜去有七不堪竝見前詠南朝之數諸何恍非其舊山谷詩西漢功名相國多南朝人物數諸何南史何尚之傳廬江灊人子孫弟姪附傳者八人代月湖故云歌西賊之聞一范願疾其驅名臣傳范文正公與韓魏公協謀收復靈夏橫山之地邊上謡曰軍中有一韓西賊聞之心骨寒軍中有一范西賊聞之驚破膽互見前代回汪吉州楫吉州春秋屬吳戰國入楚秦屬九江長沙郡漢屬豫章郡及長沙國東漢置廬陵郡晉以廬陵郡𨽻揚州又割𨽻江州吳置安成郡隋改安福縣唐為吉州宋因之州有吉水相傳水紋成吉字故名詳刑訓夏莫輸贊二之功後漢書劉愷傳以輕從重懼及善人非先王詳刑之意也注書曰有邦有土告爾詳刑鄭𤣥注詳審察之也晉元帝紀布帳練帷詳刑簡化唐龍朔中改廷尉正為詳刑大夫書序吕命訓夏贖刑事典司冬忽被攝承之命周禮六曰事典以富邦國以任百官以生萬民左傳攝官承乏誤恩有靦餘芘焉依恭惟某官洊著民庸還分藩閫起家二千石佇看黃紙之除書揚雄傳或起家至二千石白樂天詩紅旗破賊非吾事黃紙除書無我名又緑醅新酒嘗初熟黃紙除書到不知連檣一萬艘豈戀紅粧之執樂東坡送江公著知吉州詩奉親官舍當有擇得郡江南差可喜白粲連檣一萬艘紅粧執樂三千指簿書期㑹有餘閒亦念人生行樂耳行且召矣願少須之某久覺龍鍾難司鳩僝已屢貢挂冠之請兆足以行雖逺勤削櫝之褒榮適為愧竝見前代回胡峽州坦峽州已見紀白雲之司已慚弗績杜氏通典黃帝受命有雲瑞故以雲紀事秋官為白雲嚴維詩蘇耽佐郡時近出白雲司詳見前分蒼玉之佩更愧罔功禮記大夫佩水蒼玉而純組綬齊職儀尚書絳幘朝服佩水蒼玉執笏負荷詳見前良馬五之詩孑孑干旟在浚之都素絲組之良馬五之傳驂馬五轡烹魚雙只恭惟某官賦資凝逺新唐書宋璟傳風度凝逺人莫測其量布政疏明居然一麾之臨邈在三峽之逺水經注三峽謂廣溪峽巫峽西陵峽詰曲羊腸之路王尊願為忠臣魏武帝苦寒行羊腸坂詰屈車輪為之摧王智深宋紀氐人楊難當居在仇池山高二十里羊腸盤道三十六回陳後山詩蹲滑踏青穿馬耳轉危緣險出羊腸餘見前崔嵬虎牙之山吳漢隱若敵國虎牙山在夷陵東南三十五里大江北岸與荆門山相對如虎牙荆南圖副曰宜都夷陵縣東六十里南岸有荆門山北有虎牙二山相對虎牙有石壁其文黃赤又似虎牙形荆州記虎牙二山臨江楚之西塞昔公孫述遣將依二山作浮橋拒漢師下有虎牙灘又名武牙歐陽永叔詩醉裏人歸青草渡夢中船下虎牙灘王龜齡詩南標銅柱北虎牙天險城邊古西寨吳漢傳建武十一年漢率征南大將軍岑彭等伐公孫述及彭破荆門長驅入江關漢留夷陵裝露橈船卒平述諸將見戰陳不利多惶懼失常漢意氣自若帝時遣人觀大司馬何為還言方修戰具乃歎曰吳公差強人意隱若一敵國矣願望此府北史王昕字景元太尉汝南王恱辟為騎兵參軍左右言其誕慢恱曰府望惟在此賢不可責也舊唐書皇甫公義檢校沛王府長史引韋思謙為同府倉曹謂思謙曰公豈此池中之物屈公為數旬客以望此府耳東坡詩留君望此府助我憐其衰無愧昔人某司臬無庸共工尤忝竝見前讀西陵至喜之記恍若夢游元和志峽州郡城陸抗所築吳改西陵以為重鎮歐陽永叔至喜亭記云岷江之來合蜀衆水出三峽為荆江傾折回直悍怒鬬激束之為湍觸之為旋順流之舟頃刻數百里不及顧視一失毫釐與崖石遇則糜潰漂沒不見踪跡故凡蜀之可以充內府供京師而移用乎諸州者皆陸出而其羡餘不急之物乃下於江若弃之然夷陵為州當峽口江出峽始漫為平流故舟人至此者必灑酒再拜相賀以為更生尚書虞部郎官朱公再治是州之三月作至喜亭於江津以為舟者之停留也且志夫天下之大險至此而平夷感北山勒移之文凄其歸晚詩凄其以風注凄寒風也杜詩白首颯凄其餘見前代回趙栁州師懿栁州秦屬桂林郡漢為鬱林郡潭中縣地梁置龍川隋以馬平縣置象州屬始安郡唐置南昆州又改為栁州以當栁宿之下又置崖山縣又置洛封洛容縣改龍城郡復為栁州更洛封曰洛曹宋仍為栁州以洛曹𨽻宜州改龍城為栁城省象縣入洛容羈縻思順歸化二州老夫髦矣躐分五雉之工左傳老夫髦矣無能為也餘見前公子何如逺致雙魚之素感藏甚厚報答莫宜恭惟某官千里名駒劉德傳武帝謂之千里駒師古曰言駿馬可致千里年齒幼少故謂之駒詳見前九苞威鳳論摘衰聖曰鳳有六像九苞漢書地節二年鳳集魯詔曰威鳳為寶唐太宗鳳賦有一威鳳憩翮朝陽詳見前榮分符竹行吟種栁之詩栁詩栁州栁刺史種栁栁江邊詳見前少候戍瓜即布甘棠之化有華下問逺及陳人某骯髒雲司張祐寄刑部鄭侍郎詩寄掩白雲司蜀都高卧時超騰水部見前曳鄭崇之履小立斯須杜詩且為王孫立斯須東坡詩長當從此別且復立斯須挂𢎞景之冠止慙遲暮見前代回孟嚴州導嚴州秦為鄣㑹稽兩郡之境漢以𨽻吳都及丹陽郡建安十三年分丹陽郡之歙縣立始新新定等縣置新都郡晉改郡曰新安而縣改新定曰遂安隋割杭之桐廬立遂安縣置睦州大業中改睦州為遂安郡唐復為睦州而析桐廬為嚴州乾元復為睦州宋政和間升為建德軍節度方臘平改軍曰遂安軍州曰嚴州咸淳元年以潛邸升為建德府分竹近畿及瓜代戍舉頭見日治行易於上聞晉書明帝紀舉目見日不見長安韓詩舉頭看白日魏相傳朝廷已深知弱翁治行運斤成風德澤亟其下究莊子匠石運斤成風恭惟某官抱負甚偉韓文抱負其業東歸于家揚歷罙詳恪守三尺法之平以長王國杜周傳不循三尺法注以三尺竹簡書法律也尚書太史司寇蘇公式敬爾由獄以長我王國忽請二千石之祿而課民庸維今嚴陵嚴陵山在桐廬縣西即富春縣晉避鄭太后諱改富陽按嚴光傳耕于富春山圖經不載此山但云今名嚴陵山者是其所耕處却載嚴光富陽人耕于富春山沈約宋書吳時分富春之地置桐廬縣則嚴陵即所耕富春山無疑矣視古馮翊見前范文正之風流未泯范文正公以論廢郭后出知睦州有詩云瀟灑桐廬郡烏龍山靄中使君無一事心共白雲空趙清獻之規範具存趙清獻公嘉祐中為殿院求郡得睦州州歲為杭州市羊公移文却之又民有茶稅而無茶地奏蠲之民懷其德舉而措之繫辭舉而措之天下之民謂之事業斯亦竒矣某縻於聽履杜詩聽履上星辰闕若盍簪易由豫大有得勿疑朋盍簪去騎之逐雙旌賀成已後韓詩旦夕公歸伸拜謝免勞去騎逐雙旌烹魚而有尺素先施甚慚施去聲代回李崇慶􅌫崇慶府即今成都府崇慶州在府南二百二十里漢為蜀郡之江原縣地晉因之李雄據蜀置漢原郡晉穆帝改晉原縣屬益州南齊改晉康郡西魏省郡入犍為郡隋置晉原縣屬益州唐置蜀州天寶初改唐安郡乾元初復為蜀州宋以高宗潛邸升崇慶軍節度紹興升府優詔起家分符子郡蜀更多故有愁恨歎息之民公勉一行真賢明慈惠之帥雙旌戾止五袴歡然竝見前恭惟某官德履直方器資凝逺夕長蛇朝猛虎去而違之蜀道難所守或匪親化為狼與豺朝避猛虎夕避長蛇乘赤豹從文貍潔其清矣屈原九歌乘赤豹兮從文貍辛夷車兮結桂旗法言楚兩龔之潔其清矣乎未走三節禮記凡君召以三節二節以走一節以趨聊把一麾導玻璃萬頃之江委諸汶井尚書岷山導江玻瓈江在蟇頤山下即岷江也源出岷山瑩若玻瓈因名一名蟇頤津即唐田令使沉孟昭圖處陸務觀詩玻瓈江上栁如絲又岷江俗名汶江經茂州城下西南至威州又過汶川轉而東南至灌縣過金馬口至新津縣與皂江水合雪花井在茂州治西脈通汶江泉水湧濆如雪花因名駐峨眉半輪之月照此唐安李詩峨眉山下半輪秋崇慶府唐天寶初改唐安郡詳見題下田里得以底寧公卿選諸所表見前某游從已舊俯仰成陳王逸少蘭亭修禊序向之所欣俯仰之間以為陳迹猶不能不以之興懷斂大惠於一州徒得君重賜細書於方國無以公歸竝見前代回洪臨安伋臨安秦屬㑹稽郡漢因之東漢分浙西為吳郡陳立錢唐郡隋平陳置杭州唐改餘杭郡宋改為寧海軍分浙東西兩路升為帥府南渡建都升杭州為臨安府敬爾由獄慙二職之亡庸尚書式敬爾由獄以長我王國咨汝共工遽叨恩而率屬尚書咨垂汝共工高情下問外靦內慙恭惟某官德履粹明政聲充實傳家萬卷洞先秦古史之書出守一麾續兩漢循吏之傳排閬風而直上離騷經登閬風而緤馬葛仙公傳曰崑崙山一曰𤣥圃臺一曰積石瑶房一曰閬風臺一曰華蓋一曰天柱皆仙人所居淮南子崑崙山去地萬一千里上有層城九重或上倍之是謂閬風或下倍之是為縣圃十州記崑崙山有三角一角正北名閬風嶺一角正西名𤣥圃臺一角正東名崑崙宫王母居焉列仙傳西王母所居崑崙之圃閬風之苑有五城三十里樓十二左帶瑶池右環翠水楊炯賦崑閬西北之天門也李德裕賦崑閬天岑峻極秋明厯吉日兮將行離騷經靈氛既告余以吉占兮厯吉日乎吾將行厯遍厯而選之也猶貽雙魚之緘見華五雉之正某強顔曳履有味投簪竝見前輪人為輪愧罔功於鳩僝考工記輪人為輪斬三材必以其時三材既具巧者和之相門有相願崇德而象賢孟嘗君傳將門必有將相門必有相尚書惟稽古崇德象賢代回眺南康自談參華陳臬玩歲亡庸尚書汝陳時臬事臬倪結切法也左傳玩歲而愒日率屬共工自天有命詩有命自天命此文王遂勤五馬特枉雙魚恭惟某官當世淳儒賈山傳涉獵書記不能為醇儒敘傳抑抑仲舒為世純儒鄭𤣥傳經傳洽熟稱為醇儒新唐書賈杜令狐傳贊耽佑楚皆淳儒大衣高冠雍容廟堂道古今處成務可也為時循吏得州如斗少低刺史之天趙嘏詩尋花偶坐將軍樹飲水方重刺史天東坡詩一見刺史天遵渚有星佇應郎官之宿詩鴻飛遵渚明帝紀郎官上應列宿交章已久趣覲不遐某自覺龍鍾寧堪鳩僝司納言之喉舌深愧濫巾借餘論於齒牙早期納履竝見前代回興國楊知軍迪興國軍即今武昌府興國州詳見前抗章引外得請專城見前六館諸生方有範模之地韓文太學六館之士法言師者人之模範也長江千里可無保障之人伏惟某官能賦摩空李賀詩殿前作賦聲摩空明經飭吏循吏傳序以經術潤飾吏事頃者一同之政藹然三異之稱竝見前鴻羽來儀易鴻漸于陸其羽可用為儀吉尚書鳳凰來儀鵷行增重孟郊詩鴛行參綺陌四方之供簿正兆豈足行九里之潤京師賢然後用闔閭故壘春秋定公四年吳入郢史記吳王闔閭伐楚五戰楚五敗昭王亡出吳兵遂入郢武昌劉宋兼置郢州闔閭山在興國州南九十里世傳伍子胥屯兵於此今有闔閭城彭蠡上游彭蠡即鄱陽湖在饒州項籍傳必居上游注居水之上流也纍年無露積之藏積子智切聚也儲蓄也左傳居則有一日之積杜注芻米菜薪漢書食貨志太倉之粟陳陳相因充溢露積於外腐敗不可食數處有風寒之護干寶晉紀蜀使紀陟如魏晉文王問吳之戍備幾何陟對曰疆界雖逺而險要必爭之地不過數四猶人雖有八尺之軀靡不受害其護風寒亦數處耳宋曾極詩兵戈歲歲涉江干將帥誅求盍少寬未得三軍如挾纊慿誰數處護風寒詳見前上為民計中遣公來能安田里之歎愁必記御屏之姓字某濫兹作牧政爾為僚竝見前屬州得陽公之賢亦云幸矣韓文道之守陽公賢也道於湖南為屬州湖南楊公又賢也便道因滕閣而至為我賦之韓文以言事斥守揭陽便道取捷以至海上又不得過南昌而觀所謂滕王閣者太原王公觀察江南西道與監軍使燕於此閣文武賔士皆與在席合辭言曰此屋不修且壞公應曰諾工既訖以書命愈曰子其為我記之愈既以未得造觀為歎竊喜載名其上乃不辭而承公命其江山之好登望之樂雖老矣如獲從公游尚能為公賦之代回陳安慶貴謙安慶已見望郎引外不孤銅虎之分元微之行韋審規父漸制嘉乃令子為吾望郎李義山詩望郎臨古郡東坡詩東州得望郎倦客得還只動蓴鱸之想見前未遑􅐹記揚雄傳因江潭而􅐹記兮注􅐹往也記書記也遽辱鳴謙恭惟某官奧學淵回陸機漢高祖功臣贊大略淵回元功響效清標山峙氣沮金石豈徒黃絹之好辭韓文正聲諧韶濩徑氣沮金石餘見前世掌絲綸宜得青氊之舊物杜詩欲知世掌絲綸美池上于今有鳳毛餘見前亦既纍年於東觀洛陽宫殿名南宫有東觀漢氏圖籍所在和帝紀永元十三年帝幸東觀覽書林閲篇籍博選藝術之士以充其官注陸機洛陽記東觀在南宫高闕十二間介于承鳳觀非惟百日於南宫唐職林舊說禮部郎中掌省中文翰謂之南宫舍人春明朝退録云百日內須知制誥故王元之與宋給事中詩須知百日掌絲綸乃懷棠棣之碑唐賈敦頤為洛州刺史百姓共立碑及弟敦實為長史復刻石頌美於兄碑之側時人號為棠棣碑徑賦桐鄉之政朱邑傳少時為桐鄉嗇夫廉平不苛所部吏民愛敬焉病且死囑其子曰我故為桐鄉吏其民愛我必葬我桐鄉後世子孫奉嘗我不如桐鄉民王介甫封舒國公詩桐鄉山逺復川長紫翠連城碧滿隍今日桐鄉誰愛我當時我自愛桐鄉詩賦政于外四方爰發朱光嘗為皖守非此地耶皖山在懷寧西十里皖伯始封之地三國時曹操遣朱元光屯皖大開稻田吳吕蒙上言皖地肥美若一收熟彼衆必增宜早除之乃征皖破之今吳塘陂即朱元光所開也汲黯不薄淮陽今召君矣某久荒三徑又長十連竝見前望吳㑹於雲間恨無飛羽王勃滕王閣詩序望長安於日下指吳㑹於雲間借潁川之河潤但切馳心見前代回羅建昌勳建昌已見陳情便養養去聲疏寵改麾顯升二千石之真龍光有渥詩為龍為光榮遂九十親之侍燕喜尤多詩魯侯燕喜令妻夀母恭惟某官左學英游杜氏通典殷制太學為右學小學為左學又曰瞽宗枚乘傳乘久為大國上賔與英俊竝游得其所好西樞貴介宋熙寧三年詔國家以西樞內輔翊贊本兵任為重矣左傳王子圍寡君之貴介弟也抱持醇固言行擇乎中庸揚厯詳深名實孚於上下輒從李寺項氏曰管子書大理皆作李古人理與李通出綰竹符建牙密邇於故鄉畜眼雄誇於新尹杜詩酒酣誇新尹畜眼未見有報政紅泉之澗紅泉澗在撫州詳見前徙藩白石之汀曽子固送南城尉羅君詩麻姑之路摩青天蒼苔白石松風寒側聞旴江列子吾側聞之試以告女旴江詳見前舊𨽻撫境建昌漢為豫章郡之南城縣地孫吳分豫章東部置臨川郡治南城隋罷郡置撫州治臨川縣而南城屬焉不離梓里勳撫州崇仁人端明殿學士羅㸃之弟洊奉板輿潘嶽閒居賦太夫人乃御板輿升輕軒豈惟有刺史之榮韓文有刺史之榮而無其難為者蓋亦全天下之樂苐虞選表循吏傳序選諸所表詳見前却合處中漢書車千秋傳贊當軸處中某幸甚為寮愛焉莫助問專城之五馬方欲修書陳後山詩似聽兒童迎五馬稍修書札問專城得尺素於雙魚惟深抱愧見前代回林安慶仲虎安慶已見簪筆何功蒙誤恩之起廢函箋甚寵辱妙語之噓枯藏弆為榮不知所謝竝見前恭惟某官心期到古世說向𤣥季栁立身方雅與袁太尉淑徐司空湛之顔揚州峻友善後揚州貴勢當朝𤣥季猶以素情自處范伯玉璩戒之曰名位不同禮有異數卿何得作曩時意邪𤣥季曰我與士遜心期久矣豈可以一旦勢利處之任彥升詩中道遇心期王荆公詩心期自與衆人殊山谷詩心期誠不淺又少日心期轉謬悠又心期曉月秋霜互見前後膽略過人一從右學以䇿名見上條三綰左符而出守竊窺近奏具見逺圖應憐老驥之服輿根塵猶在晉拂舞歌老驥伏櫪志在千里耳眼鼻舌身意為六根色聲香味觸法為六塵東坡詩聰明不在根塵裏又固知根塵在未免病藥俱故因飛鴻之送目書問先之嵇康詩目送歸鴻手揮五絃俯仰自得遊心太𤣥某髮白奚為腰黃弗稱見此古罍洗當韞櫝以儲藏山谷詩碌碌盆盎中見此古罍洗報之英瓊瑶愧探囊之羞澀莊子探囊發匱杜詩囊空恐羞澀留得一錢看餘見前代回常台州建台州春秋屬越秦屬閩中漢屬東甌國後為冶縣吳分冶縣為東南二郡都尉東部臨海南部建安後以㑹稽東郡為臨海郡梁改為赤城郡隋屬永嘉郡唐改為台州宋因之真詰天台山上應台星故曰天台州以此名斜日投閒冒誤恩而入侍朵雲借潤儷好語以相先有味其言莫知所謝竝見前恭惟某官早飛雋軌寖踐夷塗忽持江海之一麾出領湖山之千里韓文令修於户庭數日之間而人自得於湖山千里之外丹丘安堵孫興公天台山賦仍羽人於丹丘尋不死之福庭漢高帝紀吏民皆安堵如故注言不遷動也堵音覩桓溫傳居人皆安堵復業畫㦸凝香行有詔追即歸禁近某髮既種種見前心已休休莊子聖人休休焉則平易矣平易則恬淡矣新唐書司空圖傳名亭曰休休作文以見志曰休美也既休而美具故量才一宜休揣分二宜休耄而瞶三宜休咫尺不違顔雖少光於末路見前八十猶行腳祗見笑於大方莊子吾長見笑於大方之家代回陳撫州蕃孫撫州已見別畫㦸之凝香倐焉兩月見前讀烏絲之妙語燦若五雲國史補宋亳間紙有織成界道謂之烏絲欄東坡與錢至仲尺牘烏絲當用寫道經一篇惡詩不足録也山谷詩正圍紅袖寫烏絲詳別見未能先施良多不敏左傳敢告不敏又謝不敏焉恭惟某官粹資玉立桓溫表抗節玉立白氏長慶集玉立不倚金和有聲崔嘏行裴諗制風儀玉立器宇川停杜詩趙公玉立高歌起厚德春溫來臨父母之邦居多豈弟之政詩既見君子孔燕豈弟注豈樂弟易也逺方之君既朝見君子為君子所接遇故皆甚安而情又喜樂以怡易也民胥慶矣皆願受一廛而為氓我儀圖之又私喜同年之有後東坡答劉沔都漕書文章如金玉珠貝未易鄙棄見足下詞學如此又喜吾同年兄龍圖公之有後也比因造朝之役過垂下榻之情趙彥衛雲麓漫抄云後漢書徐稚傳陳蕃為豫章太守請為功曹蕃在郡不接賔客惟稚來特設一榻去則縣之及陳蕃傳不書此事却云蕃為樂安太守郡人周璆高潔之士前後郡守招命莫肯至惟蕃能致焉特為置一榻去則收之蓋陳蕃能尊禮賢士在豫章則下徐稚之榻在樂安則下周璆之榻范史不能發明之耳曾謝幅之未遑已慶箋之先及某去天雖近來日無多騎馬聽雞聊續邯鄲之夢宋彭乘墨客揮犀云歐陽公在政府將引去先一詩寄潁隂隱士常秩云笑殺汝隂常處士十年騎馬聽朝雞及公致仕還潁有詩贈秩曰賴有東鄰常處士披蓑戴笠伴春鋤後秩以王介甫薦判國子監有無名子改前詩云昔日潁隂常處士却來馬上聽朝雞枕中記開元中有吕翁經邯鄲有盧生同邸主人方蒸黃粱盧具言處世困厄翁取囊中枕以授之曰枕此當榮適如願盧適枕未幾登第出入將相五十年榮盛無比忽寤吕翁在㫄黃粱尚未熟唐詩馬上續殘夢山谷詩生涯谷口耕世事邯鄲夢踞龜食蛤終尋汗漫之期淮南子盧敖游于大海至蒙谷之上見一士卷龜殼而食蛤蜊敖曰夫子可與敖為友矣士笑曰我方南游乎罔䍚之野北息乎沈默之鄉西窮冥冥之里東貫鴻濛之光吾與子汗漫游于九垓之上乃舉臂聳身入雲中儻未疾驅尚容嗣見代回孫衢州洵衢州已見鄉里有賢者久矣傾心出入相避然失於交臂韓文解手背面遂十一年君出我入如相避然莊子吾終身與汝交一臂而失之可不哀與鼎來手筆益重背芒鼎益卦名恭惟某官抱負不凡韓文抱負其業東歸于家踐揚兹久甫安朝蹟豈少民庸屬錢楮之重輕竝見前生閭閻之愁歎衢故太末也今實輔藩衢州秦屬㑹稽為太末縣昌黎徐偃王廟碑衢州故㑹稽太末也君薄淮陽耶即歸禁闥見前日扁舟之東上王昌齡詩武陵溪口住扁舟高駢詩江海一扁舟歐詩散髮棹扁舟時千騎之西來所至賈胡馬援傳伏波類西域賈胡到一處輒止注言似商胡所至之處輒停留此借用以俟明府孫寶傳明府素著威名或恐銅駝陌上㑹相見故徑下嚴陵之灘晉懷帝紀步出西掖門至銅駝街載記咸寧二年石季龍使牙將張彌徙洛陽銅駝于鄴索靖傳靖有先識逺量知天下將亂指洛陽宫門銅駝歎曰㑹見汝在荆棘中耳陳書徐陵傳盧龍之徑于彼新開銅駝之街於我長閉陸機洛陽記洛陽有銅駝街漢鑄銅駝二枚在宫南四㑹道相對俚語云金馬門外聚羣賢銅駝陌上集少年顔師古曰亦云銅駝街在洛陽西京無也華延雋洛陽記兩銅駝在宫之南街東西相向高九尺洛陽謂之銅駝陌劉夢得詩籍通金馬門身在銅駝陌栁子厚詩玉漏天門靜銅駝御路荒東坡詩銅駝陌上㑹相見握手一笑三千年嚴陵瀨即七里灘在桐廬縣西即子陵垂釣處諺云有風七里無風七十里謝靈運詩目睹嚴子瀨想屬任公釣豈料金鯽池邊不見君遂直過定山之路金鯽池在杭州西北九里山澗水清有金銀魚東坡志林云舊讀杜子美六和寺詩云松橋待金鯽竟日獨遲留初不喻此語及倅錢塘乃知寺後池中有此魚如金色昨日復游池上投餅餌久之乃略出不食復入不可復見自子美作詩至今四百餘年已有遲留之語則此魚自珍貴蓋久矣茍非難進易退而不妄食安得如此夀耶定山在杭州西南四十里突出浙江中數百丈潮至此輒抑聲過此則雷吼霆怒東坡往富陽李節推先行留風水洞見待詩春山磔磔鳴春禽此間不可無我吟路長漫漫傍江浦此間不可無君語金鯽池邊不見君追君直過定山村路人皆言君未逺騎馬少年清且婉風巖水穴舊聞名只隔山溪夜不見溪橋曉溜浮梅萼知馬繫馬巖花落出城三日尚逶遲妻孥怪罵歸何時世上小兒誇疾走如君相待今安有荷長鬚之垂問韓詩一奴長鬚不裏頭又更遣長鬚致雙鯉搔短髮以懷慚詩搔首踟蹰左傳髮短而心甚長杜詩羞將短髮還吹帽又白頭搔更短渾欲不勝簪某不安田廬東坡詩居貧豈無食不自安田畝又趣殿陛以年亦當廢矣難借吹噓晉孝武帝紀時張貴人有寵年幾三十帝戲之曰汝以年當廢矣曷月豫還歸哉恐勤將送詩懷哉懷哉曷月豫還歸哉代回魏太守欽緒別去仞牆倐焉兩月有來尺素爛若五雲見前既愧先施又慙厚報恭惟某官棲遲盛福詩衡門之下可以棲遲邂逅初心韓詩蕭條捐永事邂逅得初心厭簪筆於承明嚴助傳厭承明之廬久挂冠於神武顧恐踞鞍之矍鑠見前猶堪奮袖以低昻楊惲傳拂衣而喜奮褎低昻注褎古袖字盍歸乎來何見之晚某不安西崦崦衣檢切山海經鳥鼠同穴西南曰崦嵫通作弇爾雅觚竹北户西王母日下謂之四荒注疏引穆天子傳天子賔于西王母乃紀其述于弇山名曰西王母之山是也又踏東華後漢隋俱有東華西華門梁有東西中華門惟有當歸已決焉於去計吳志曹公問太史慈遺書一篋發看無所道但貯當歸魏氏春秋同異姜維得母書并當歸維曰良田百頃不在一畝但有逺志不見當歸其背義徇利如此崔豹古今注牛亨問曰將離別相贈以芍藥者何答曰芍藥一名可離故將別以贈之亦猶相招召贈之以文無文無亦名當歸也入為逺志徒仰止於高風世說謝太傅始有東山之志復命掾屬不獲已始就桓公司馬時人有致桓公藥草者中有逺志公取以問謝此藥又名小草何以物有二稱謝未即答時郝隆在坐謝因曰郝參軍多知識試復通看郝應聲曰答此甚易解處入則為逺志出則為小草謝公殊有慙色桓目謝而笑曰郝參軍此乃不惡亦甚有㑹按本草逺志一名棘宛一名要繞葉名小草然則所謂出入者蓋指根葉而言非漫為譏而已詩高山仰止代回建昌傅侍郎伯成建昌已見宋史傅伯成傳拜左諫議大夫抗疏十有三皆軍國大義或致史彌逺意欲使有所彈劾將引以共政謝之曰吾豈傾人以為利哉疏引詔大臣以公滅私左遷權吏部侍郎以集英殿修撰知建昌府諫大夫之去國誰解引裾戴氏鼠璞云世以去朝廷為去國蓋本孔子去父母國語然今非春秋之世適於他邦可言去國天下一家不在朝廷則在家林莫非王土何去國之有魏志辛毗傳文帝欲徙冀州士家十萬户實河南毗諫帝不答起入內毗隨而引其裾帝遂奮衣不還良久乃出曰佐治卿持我何太急耶杜詩牽裾驚魏帝投閣為劉歆賢刺史之還鄉真成衣錦項籍傳富貴不歸故鄉如衣錦夜行既幸邂逅適我願矣猶恨出入如相避然竝見前恭惟某官性禀直方氣全剛大難進易退溫溫維德之基禮記其難進而易退也粥粥若無能也詩溫溫恭人維德之基遇事直前蹇蹇匪躬之故易王臣蹇蹇匪躬之故注執心不回志臣王室方此告嘉猷於后蓋將下膏澤于民無三諫之不從禮記為人臣之禮不顯諫三諫而不聽則逃之子之事親也三諫而不聽則號泣而隨之遽一麾而出守宋史傅伯成傳拜諫議大夫抗疏十有三皆軍國大議或致史彌逺意欲使有所彈劾將引以共政謝之曰吾豈傾人以為利哉疏乞詔大臣以公滅私左遷權吏部侍郎以集英殿修撰知建昌府拾遺補過寧忘汲黯之忠汲黯傳出入禁闥補過拾遺臣之願也納誨輔台行聽商宗之命尚書朝夕納誨以輔台德某不安西崦又踏東華見前戴惠文之冠身其餘幾張敞傳以柱後惠文彈治之爾惠一作蟪蟬也冠細如蟬翅今御史冠左傳畏首畏尾身其餘幾挂神武之服秋以為期詩將子無怒秋以為期代回吕常德昭逺常德已見歌滄浪之水猶記獨清滄浪水在龍陽縣二十里浪水與滄水合故號滄浪乃漁父濯纓之處屈原漁父篇天下皆濁我獨清望赤城之雲忽分五朵赤城山在天台縣北六里一名燒山其上石壁皆如霞色望之如雉堞孫綽遊天台山賦赤城霞起以建標韋陟傳自謂所書陟字若五朵雲時人慕之號郇公五雲體恭承嘉惠見前益仞故情東坡集仰仞至情益堅素守恭惟某官早䇿名躔盍躋膴仕瑚璉清廟之器寧久在山禮記夏后氏之四璉殷之六瑚注皆黍稷器杞梓明堂之材誰將作室游仙夢斷公定憶秦人之桃劉商桃源詩桃花流出武陵洞夢想仙家雲樹春今看水入洞中去却是桃源洞裏人詳見前弔古愁多我亦念靈均之蕙離騷經名余曰靈均兮字余曰正則又雜申椒與菌桂兮豈惟紉夫蕙茝有華妙語肯寄舊交某蹇步蹣跚見前斜陽寂厯李詩旅情初結切秋風方寂厯歐詩樹老無花春寂厯續東華之夢又聽朝雞東坡詩馬上續殘夢六一居士詩笑殺汝隂常處士十年騎馬聽朝雞詳前陳撫州條讀北山之移只慚夜鶴北山移文蕙帳空兮夜鶴怨挂冠有日見前望履無階莊子願望履幕下注言視不敢望面望履結而還也代黃漕斚回趙婺州善下婺州牽牛婺女之分野即漢㑹稽之烏傷縣吳分㑹稽置東陽郡在金華山之陽穀水之東因名東陽梁置金華郡隋置婺州宗邸賢勞邸典禮切說文屬國舍徐曰諸侯來朝所舍曰邸有根抵也根本所在也師古曰漢制郡國朝宿之舍在京師者率名邸邸至也言所歸至也宣元六王傳上謂其王曰爾長留侍我矣因留國邸朝夕侍上甸侯均佚栁詩繼酬天祿署俱尉甸侯家六一居士集賜韓琦詔方均逸豫適此外虞赫奕廉車之重裴子野賦赫奕翬煥隂臨鬱律焜煌郡紱之光焜户衮切說文煌也增韻焜煌光也或作輝封禪書燠炳輝煌又公渾切服䖍曰明也煌胡光切說文輝也既合虎符足凝燕寢見前恭惟某官直溫而寬栗尚書直而溫寬而栗明允而篤誠左傳昔高陽氏有才子八人齊聖廣淵明允篤誠天下之民謂之八愷早入對乎三雍近於大雅河間獻王傳武帝時獻王來朝獻雅樂對三雍之宫贊曰夫唯大雅卓爾不羣河間獻王近之矣注三雍靈臺辟雍明堂也雍和也言天地君臣人民皆和也藝文志儒家河間獻王對上下三雍宫之篇晚更條於七略博以羣書藝文志成帝時詔光祿大夫劉向校經傳諸子詩賦向輒條其篇目撮其指意録而奏之向卒哀帝復使向子歆卒父業歆於是總羣書而奏其七略詳見前司馬遷傳自劉向揚雄博極羣書兼左右之戚賢文帝詔右賢左戚先民後已至明之極也師古曰以賢為上然後反親也孚上下之名實糾合同盟而肅若左傳載在盟府太師職之桓公是以糾合諸侯而謀其不協詳見前欲分陜服而主之陜音閃說文𢎞農陜也從􅊟夾聲夾從二入與隘陜字不同陜從􅊟從夾夾從二人集韻州名周召所分之地公羊傳自陜而東者周公主之自陜而西者召公主之適咨牧於金華尚書咨十有二牧玉臺新詠序云金星與婺女爭華故曰金華爰取材於玉葉左傳公族公室之枝葉也故天族謂之玉葉慕容超傳天族多竒玉林皆寶高牙大纛迄隆屏翰之雄歐陽公畫錦堂記高牙大纛不足為公榮今袴昔襦諒借京師之潤某驅馳其職詩載馳載驅飛挽何功漢書秦欲攻胸奴使天下飛芻挽粟起於黃陲琅邪至負海之郡轉輸河北轉數十萬給中都實日虞於司敗漢書高帝時漕山東之粟給中都之官不過數十萬石左傳自拘於司敗良二千石有治理是天幸以蒙成霍去病傳軍亦有天幸薛宣傳馮翊垂拱蒙成餘見前代回趙南安師傳南安已見合符桂海之北選詩文軫通桂海易鎮梅關之南梅關在大庾嶺頭以分江廣之地章穎詩西州南北護梅關永日人行石壁間以忠肅恭懿之材左傳高辛氏有才子八人忠肅共懿宣慈惠和天下之民謂之八元慰愁恨歎息之俗循吏傳庶民所以安其田里而忘歎息愁恨之心者政平訟理也銅魚既合隋書開皇七年制京官五品以上佩銅魚符唐書武德元年改銀菟符為銅魚符車服志銅魚符以起軍旅易守長畿內則左三右一畿外則左五右一左者進內右者在外用始第一周而復始竹馬交歡恭惟某官夙派天潢漢書天文志王梁㫄有八星絶漢曰天橫橫史記作潢魏王固表疏派天潢崔廓答豫章王啓禀潤天潢承輝日觀梁何遜詩仙車駐七襄鳳駕出天潢張衡思𤣥賦乘天潢之泛泛兮早梯月窟杜詩青雲不可梯張說詩月窟窮天逺河源入塞清宣室志太和中有周生有道術中秋夜與客㑹月色方瑩謂坐客曰我能梯雲取之置之懷襟因取箸數百修繩而架之曰我梯此取月俄以手舉衣懷中出月寸許光色照爛寒氣入肌骨製尹何之錦愈出愈竒左傳子皮欲以尹何為邑子産曰子有美錦不使人學製焉詳見前題仲舉之輿再進再勇孟郊詩再接再礪乃遂厭飛鳶之影馬援傳仰視飛鳶跕跕墮水中懶移祭鱷之文昌黎有祭鱷魚文謂即入於直廬金坡遺事太祖鼎新大壯敞金馬之直廬猶于蕃於橫浦唐地理志橫浦在大庾縣西史記尉他傳移檄告橫浦陽山湟溪關索隱曰案南康記云南野大庾嶺三十里至橫浦有秦時關其下謂為塞上南康記昔漢將軍揚僕討吕喜出章郡下橫浦即此陽和有腳姑行大庾之春大庾在大庾縣西南二十里吳録南野縣有大庾山自嶺嶠九磴二里至嶺下七里平行十里至平亭咫尺違顔即近長安之日某繆塵班綴例辱緘縢逢驛使一枝之來喜承見寄跂織女七襄之報愧不成章竝見前代回洪筠州樇筠州即今瑞州府沿革見前解龜庸蜀謝靈運詩牽絲及元興解龜在景平杜詩解龜踰卧轍尚書庸蜀羌髳微盧彭濮人分虎勾吳史記吳太伯世家太伯之奔荆蠻自號勾吳索隱曰荆者楚之舊號以州而言之日荆蠻者閩也南夷之名亦稱越此言自號勾吳吳名起於太伯明以前未有吳號地在楚越之界故稱荆蠻顔師古曰以吳言勾者夷之發聲猶言於越耳惟筠為州號西江之道院山谷有記詳見前與鄱接境得北道之主人耿弇傳光武指弇曰是我北道主人也詳見前民起來暮之歌公有衣晝之寵洪蓋鄱人恭惟某官流芳名閥騰茂通材鳴單父之琴全牛自解入河陽之幕凡馬皆空竝見前方夢翼以朝天陶侃傳夢生八翼飛而上天詳見前遽捫參而厯井蜀道難捫參厯井仰脅息詳見前翼參宿名惟良作牧所去見思見前乃若高安之城筠州宋紹興間賜名高安郡亦出錦江之水瑞州蜀江源出袁州萬載縣龍門渡流至上高縣凌江合新昌縣滕江厯郡城而東匯於南昌之象潭而入章江世傳許真君為蜀旌陽令有竒術晉末人皆疫癘多詣真君請救真君與器水投于上流疾者飲之無不愈邑人以所投器水即蜀濯錦江之水故名蜀江亦曰錦水舉頭見日知漸近之使然孟嘉傳桓溫問嘉聽伎絲不如竹竹不如肉何也嘉答曰漸近使之然一座啓笑有腳陽春計無逺之弗屆尚書惟德動天無逺弗屆某重游碧落杜詩碧落真難陟詳見前轉覺黃昏淮南子日薄於虞泉是謂黃昏淪於蒙谷是謂定昏杜詩獨留青冢向黃昏東坡詩不堪細雨濕黃昏又半掩落日先黃昏王荆公詩嶺雲分暝與黃昏十部從事之來敢無酬於記室劉𢎞傳𢎞每有興廢手書守相叮寧欵密所以人皆感恱爭赴之咸曰得劉公一紙書賢於十部從事後漢書百官志太尉有記室令史主上章表報書詔晉書何曾傳人以小紙為書者敕記室勿報三公刺史之入願益大於相門杜氏通典後漢重刺史之任或自郡守入為三公虞延第五倫桓虞鮑昱是也孟嘗君傳將門必有將相門必有相杜詩相門清議衆吕不韋傳見子楚說曰吾能大子之門子楚笑曰且自大君之門而乃大吾門吕不韋曰子不知也吾門待子門而大洪蓋忠宣之裔代回章象州時言象州已見榮紆郡組漢百官公卿表太守品第五秩二千石銀章青綬誕布詔條象郡自秦既入中國之籍史記南越尉他傳秦時已并天下略定楊越置桂林南海象郡虎符分漢是資循吏之功雙旌鼎來五袴咸喜鼎咸卦名恭惟某官人門具美風調不羣惟服襲於典刑故飛騰於聲實屢製尹何之錦技敏奏刀載題仲舉之輿歌騰別乘宜森畫㦸出擁朱轓跕跕飛鳶公蔑鄙夷之意竝見前嗷嗷鳴鴈民有安集之期詩鴻鴈于飛哀鳴嗸嗸維此哲人謂我劬勞餘見前某例入㢲箋備知謙德㢲謙卦名龔遂良二千石必能致渤海之安見前申公年七十餘聊復議明堂而去儒林傳申公魯人也御史大夫臧綰請立明堂以朝諸侯不能就其事乃言師申公申公時已八十餘老至以為大中大夫舍魯邸議明堂事病免歸代衛參政回興國葉知軍興國已見榮分漢竹杜詩幾分漢庭竹言憩召棠二千石之起家上恩甚寵十萬户之蒙福民望已深竝見前恭惟某官文獻名家典刑勝士羊祐傳賢達勝士陳後山詩江西勝士與長吟盤旋州縣既不歎於徒勞韓文隱者之所盤旋容與班行亦自安於平進子虛賦翺翔容與郭璞曰言自得也河東賦周流容與師古曰容暇而安豫也與讀曰豫韓詩班行再肅穆又強顔班行內晉書庾亮傳皆非姻族各以平進南史王騫傳謂諸子曰吾家本素族自可依流平進不須茍求蔡興宗傳吾素門平進與主上甚疏新唐書選舉志朋比貴勢妨平進之路詳見前凄其在疚詩凄其以風注凄寒風也杜詩白首颯凄其詩閔子小子遭家不造嬛嬛在疚注疚病也遭武王崩家道未成嬛嬛然孤特在憂病之中甫此御祥禮記期而小祥又期而大祥適擇牧於山城韓翃詩山城無處不飛花爰借材於家食易不家食吉注有大畜之實以養賢令賢者不家食乃吉也川名曰富興國軍隋名富川以富池湖得名汪彥章詩路入麕䴥亭子嶺江圍蒲稗富川城人實多貧荒政十二聚萬民正煩料理周禮以荒政十二聚萬民詳見前料力弔切增韻計也理也王徽之傳卿在府日久比當相料理長江千里護數處庶免流離詩瑣兮尾兮流離之子餘見前某濫守帥藩幸同寮寀察鄰國之政寧敢自私安刺史之民更期忠告代回薛吉州璆杜陵老大久便白木之鑱杜詩杜陵有布衣老大意轉拙又長鑱長鑱白木柄我生託子以為命注鑱鋤銜切吳人云犂鐵說文鋭也顔之推訓俗音字鑱仕初切即鋭也俗謂之地鑱又仕鑒切便平聲漢殿論思又綴紫荷之槖見前此皆左右先為容也鄒陽傳以左右先為之容也注容謂雕刻加飾所恨出入如相避然韓文君出我入如相避然恭惟某官名閥甚華厯仕皆膴詩瑣瑣姻婭則無膴仕自分郢城之月郢州漢江夏郡雩社縣之地魏立郢州分月言為別駕即行閩嶺之春杜氏通典漢景帝中元二年更名郡守為太守常以春行所主縣謝承後漢書鄭𢎞為臨淮太守行春白鹿方道夾載而行閩山在今福州亦名烏石山行春言為郡守聲實交流班聨孔邇又森畫㦸出訪青原青原山在廬陵縣王庭圭詩異時黃魯直曽賦青原詩今日青原山名與星斗垂連檣一萬艘不廢撫摩之政東坡送江公著知吉州詩白粲連檣一萬艘紅粧執樂三千指起家二千石㑹有華要之除某見謂衰遲過勤比數司馬遷傳刑餘之人無所比數非一世也梅福傳亡與比數韓文是比數愈于人而收之杜詩長安布衣誰比數東坡詩君看東坡翁懶散誰比數又陋質從來誰比數雙魚中有尺素良感故情五馬不受二毛相期早貴竝見前代回建昌黃知軍敏德建昌已見迎五馬問專城甚慙不敏陳後山詩似聽兒童迎五馬稍修書札問專城左傳使夏謝不敏又使士文伯謝不敏焉烹雙魚有尺素乃辱相先雖感高情能無下汗吳質書申之再三赧然汗下恭惟某官器資凝厚材具寬餘鼓琴一再行誰識高山之志司馬相如傳酒酣臨邛令前奏琴曰竊聞長卿好之願以自娛相如辭謝為鼓一再行師古曰行謂曲引也吕氏春秋伯牙鼓琴鍾子期善聽之方鼓琴志在泰山鍾子期曰善哉乎鼓琴巍巍乎如泰山詳別見作詩三百首可默咸池之音周禮舞咸池以祭地又咸池之舞夏日至于澤中之方丘奏之樂緯黃帝樂曰咸池池音施道施於民故曰咸池莊子黃帝張咸池之樂於洞庭之野畫㦸朱幡新户庭之號令韓文令修於户庭數日之間紅泉碧澗添溪谷之精明紅泉碧澗在建昌詳見前不俟合符㑹膺召璽某崦嵫日薄淮南子日入崦嵫經於細栁入虞淵之池江海天游莊子心有天游注游不係也老入光明踏舊班固已戒來迎之僮僕東坡詩老入明光踏舊班染鬚那復唱陽關歸去來辭僮僕歡迎稚子候門輦路歸來聞好語又將選所表之公卿東坡詩輦路歸來聞好語共驚堯顙似高辛循吏傳公卿缺則選諸所表以次用之儻即疾驅猶容晤語詩彼美淑姬可與晤語代回傅贛州伯召贛州已見趣齊國之裝方圖迎候曹參傳相齊九年齊國安集蕭何薨參聞之告舍人趣治行注治行謂修行治裝也展山谷之啓乃辱先施雖多溢辭莊子兩喜必多溢美之言兩怒必多溢惡之言傳其常情無傳其溢言則幾乎全亦感厚意恭惟某官精明玉立芳潤春溫陸機文賦潄六藝之芳潤史記田完世家大絃濁以春溫者君也翩翩者隼一洗而空凡馬隼朱惟切鳺鴀也詩四牡翩翩者隼載飛載下集于包栩王事靡盬不遑將父毛云夫不也鄭云夫不鳥之慤謹人皆愛之此是謹慤孝順之鳥也又南有嘉魚翩翩者隼蒸然來思毛傳一宿之鳥鄭云一宿者一意於其所宿之水也恢恢其刃四顧而解全牛洊持江海之麾竝見前始駕山澤之節周禮山國用虎節澤國用龍節夜郎為徼西南夷傳南夷君長以十數夜郎最大夜郎者臨牂柯江江廣百餘步足以行船徼古弔切境也謂以木石水為界司馬相如傳南至牂柯為徼注以牂柯作徼塞也東北謂之塞西南謂之徼塞以障塞為名徼取徼遮之義彭蠡無波尚書彭蠡既瀦荆州記宫亭湖即彭蠡澤也一名青草湖一名洞庭湖史記左洞庭右彭蠡屈原九歌洞庭波兮木葉下又令沅湘兮無波乃今易鎮之除其殆過家之計岑彭傳有詔過家上冢詳見前虎頭城下雖爭為竹馬之迎虔名虎頭州東坡詩詔下虎頭州詳見前豹尾班中恐催看槐龍之舞前漢書揚雄傳在屬車豹尾中後漢書輿服志屬車八十一乘法駕半之尚書御史所載最後一乘懸豹尾豹尾以前比省中注小學漢官篇曰豹尾過後罷屯解圍胡廣曰施于道路豹尾之內為省中故須過後屯圍乃得解皆所以戒不虞也東坡詩日高黃繖下西清風動槐龍舞交翠注邇英閣前有雙槐樛然屬地如龍形宋張邦基墨莊漫録云邇英閣前雙槐極高而柯葉掃地狀如龍蛇或謂之鳳尾槐蘇子由詩云銅瓶灑遍不知寒雨㸃勻圓凍未乾回首曈曨朝日上槐龍對舞覆衣冠某不堪視䕃䕃說文草隂地又入䕃景曰䕃左傳趙孟視䕃曰朝夕不相及誰能待五又復綴班歐陽公詩玉殿清霜綴曉班東坡詩他日許綴蓬萊班又豈意彤庭綴兩班無以公歸少辦朝廷之事豈惟我賀是蓋邦國之光左傳叔弓如晉賀虒祈也游吉相鄭伯以如晉亦賀虒祈也史趙見子大叔曰甚哉其相蒙也可弔也而又賀之子大叔曰若何弔也其非唯我賀將天下實賀歐陽晝錦堂記其豐功茂烈所以銘彝鼎而被絃歌者乃邦家之光非閭里之榮也代回胡峽州坦峽州已見蒼顔華髮不堪東華之塵埃醉翁亭記蒼顔白髮頽然乎其間者太守醉也東坡詩此身與世真悠悠蒼顔華髮誰汝留東坡詩注前輩戲語西湖風月不如東華軟紅塵土畫㦸清香好在西陵之門户通鑑吳陸抗曰西陵建平國之藩表臣父遜昔上言西陵國之西門若不守荆州非吳有也飛箋璀粲璀取猥切璨蒼按切說文玉光也佩意勤渠廣韻渠渠勤也恭惟某官德性靖共詩靖共爾位注靖謀也共具也言有德未仕之君子勿汲汲求仕自有明君謀具汝之爵位此斷章器資肅括見前蒼皮溜雨此非朴􅈪之材杜詩霜皮溜而四十圍說文朴􅈪小木詩野有死麕林有朴􅈪息夫躬傳僕遫不足數師古曰僕遫凡短之貌也高浪駕天抑豈坳泓之水韓詩崔侯文章苦捷敏高浪駕天輸不盡坳么交切說文地不平也莊子置杯水於坳堂之上亦作凹泓烏宏切說文下深貌一曰水貌孟郊詩採月漉坳泓由轄而院既三四稔宋榷貨務都茶場雜買務雜買場左藏庫文思院謂之四轄登聞檢院登聞鼓院都進奏院糧料院審計司官誥院謂之六院稔其忍切說文穀熟也左傳鮮不五稔廣韻年也古人謂一年為一稔取榖一熟也以心去國已七八年居然一麾猶在千里自公言之誠屈為民計則甚良商旅願出於塗何憂郡計公卿選諸所表㑹有郵音竝見前某久矣地寒劉向別録燕有谷地美而寒不生五榖詳見前加之日薄揚雄傳恐日薄於西山勞承明侍從之事豈不懷歸詩豈不懷歸畏此簡書及潁川太守之來願安承教代回洪臨江伋臨江已見五馬專城未遑先問雙魚尺素良佩高情竝見前既自顧之闕然亦何修而得此恭惟某官器資閎敏材具寬餘孟子有言故國非謂喬木魏謨敢諫此笏乃今甘棠魏謨傳帝問卿家書詔頗有存者乎謨對惟故笏在詔令上送鄭覃曰在人不在笏帝曰覃不識朕意此笏乃今甘棠有如把麾何足游刃顧今近咫尺天之選左傳天威不違顔咫尺皆自良二千石而來勉分黃屋之憂高帝紀黃屋左纛李斐曰天子車以黃繒為蓋裏㑹取青氊之舊某景翳翳而將入歸去來辭景翳翳兮將入撫孤松而盤桓技斷斷兮無他乘興而來聊復續東華之夢王徽之傳乘興而來興盡而反餘見前乞身以去行將上北闕之書孟浩然詩北闕休上書南山歸敝廬代回薛漳州揚祖漳州已見百舍思賢寖闊承顔之便莊子百舍重趼而不敢息注百舍止宿也王文公集思賢百舍無階贄見之儀承乏一涯彌闊門牆之使雋不疑傳乃今承顔接辭尺書委貺具知存念之勤退惟衰遲山谷詩清如秋露蟬高栁咽衰遲良深感戢戢側立切爾雅聚也疏云藏聚也恭惟某官持心靜重臨事敏明中外揚厯之詳廣韻厯經厯也今稱人居官日久中外屢踐者曰揚厯揚即古揚字聲實飛騰之盛猥辭簿正出領州麾諒因報政之來即見歸班之寵某桑榆短景淮南子日西垂影在樹端謂之桑榆樗櫟散材莊子匠石之齊見櫟社樹其大蔽牛匠伯不顧弟子曰自吾執斧斤以隨夫子未嘗見材如此其美也夫子不肯視行不輟何也曰已矣勿言之矣散木也注不在可用之數故曰散木杜詩散才嬰薄俗簪筆甘泉姑對揚於休命尚書敢對揚天子之休命挂冠神武㑹邂逅於初心韓詩邂逅得初心代回趙徽州希逺徽州秦為鄣郡漢改丹陽郡吳分丹陽郡置新都郡晉改新安郡隋置歙州宋宣和間改為徽州以徽嶺得名宋史宗室世系表希逺秦王德芳九世孫祖伯南父師俯千騎上頭未遑贊慶古樂府東方千餘騎夫壻居上頭周禮慶賀以贊諸侯之喜詳見前雙魚中素猥辱謙施易謙象曰君子以裒多益寡稱物平施靜言思之詩靜言思之注安靜而思之為禮過矣恭惟某官神明帝胄左傳古我先王賴其利器用也與其神明之後也注舜大聖故稱神明禮樂宗英漢書敘傳河間賢明禮樂是修為漢宗英早詳七略之書宜應三雍之對竝見前翺翔半刺杜詩半刺已翺翔淹屈全材惟古郡之新安新安山在祁門縣西九十里新安江自歙縣來者出黟山自休寧者出率山自績溪者出大鄣山自婺源者出浙山自浙江泝休寧者為灘三百六十李詩聞說金華渡東連五百灘他年一攜手搖艇入新安聶道士詩千尋練帶新安水萬仞花屏問政山乃先正之舊治尚書昔先正保衡流風善政崇德象賢見前召杜龔黃勉䇿名於今日左傳䇿名委質二乃辟也毛原周召㑹配德於古人新唐書宗室宰相贊周之卿士周召毛原皆同姓也尚書追配于前人某雖綴近班已謀歸計暗中摸索頗有似曾相識之疑唐許敬宗性輕傲見人多忘之或謂其不聰曰卿自難記若遇何劉沈謝暗中摸索著亦可識左傳吳公子札聘於鄭見子産如舊相識陸機傳太康末與弟雲俱入洛造太常張華華素重其名如舊相識草堂詩餘李景詞似曾相識燕歸來送上吹噓不勝無能為役之歎杜詩揚雄更有河東賦唯待吹噓送上天左傳於先大夫無能為役詳見前所願召璽之下或在挂冠之前回施筠州緘筠州已見起家得郡東坡詩得郡書生榮便道開藩韓文便道取捷以至海上雙旌兩轓頓覺遍城之重見前一襦五袴想回寒谷之溫劉向別録方士傳言鄒衍在燕燕有谷地美而寒不生五榖鄒子居之吹律而溫氣至而榖生今名黍谷恭惟某官器采端華典刑炳蔚為博士為太尉茂譽處於前聞漢書儒林傳施讐字長卿沛人從田王孫受易與孟喜梁丘賀並為門人及賀為少府薦讐結髮事師數十年賀不能及詔拜讐為博士後漢施延字君子沛國蘄人明五經星官風角家貧嘗詣海鹽任作半路亭以養母時馮敷為督郵至知其賢者下車謝使入亭請與飲食脫衣與之餉錢不受順帝初徴拜太尉詩燕笑語兮是以有譽處兮有喬木有世臣盍躋登於要路洊分漢竹出憩甘棠惟筠為州夙號江西之道院竝見前貫蜀之水亶為錦里之主人詳見此卷回洪筠州條杜詩錦里逢迎有主人一郡得賢萬物吐氣某濫兹分閫幸甚為僚修豫章户庭之間正兹懷愧見前雪高安父老之恥當遂蒙成山谷江西道院記乃新燕居之堂㮄曰江西道院以鼓舞其國風且為高安之父老雪恥焉詳見前回王楚州柟楚州已見入紆漢組出牧淮壖銅虎分符資循良之共理竝見前石龜設險喜守禦之得人龜山在盱眙縣詳見此卷回王楚州條恭惟某官材具寬詳器資敏劭循循善誘立美教於鱣堂見前諤諤以昌振直聲於烏府家語湯武以諤諤而昌桀紂以唯唯而亡通典漢成帝時御史府中列柏樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏唐授蘇埛右臺大夫制烏臺峻秩望總鐵冠東坡詩烏府先生鐵作冠屈伸以道出處何心兹屈摶風九萬里之程姑承起家二千石之寵山陽古郡江北要衝師旅饑饉之餘民無勞止勞來還定之政公優為之某別日猶新涓辰未審雙魚中素猥勤先施之光千騎上頭敢廢前驅之慶竝見前回汪高郵絖秦因高郵置郵傳為高郵亭漢屬廣陵國晉屬臨淮郡東晉有三阿宋屬廣陵郡梁置廣業郡尋以有嘉禾為神農郡隋屬江都郡唐屬䢴州宋始建為軍掌故民部已覺厚顔鼂錯傳為太常掌故應劭曰掌故主故事儒林傳以治禮掌故以文學禮義為官尚書顔厚有忸怩首善賢關更叨附尾儒林傳序教化之行也建首善自京師始繇內及外董仲舒傳太學者賢士之所關也教化之本原也史記伯夷傳顔淵雖篤學附驥尾而行益顯樊噲傳贊附驥之尾師古曰蓋以蚊虻為喻言託驥之尾則涉千里隗囂傳蒼蠅之飛不過數步即託驥尾得以絶羣三省僥逾之自蜀志先主傳伏自三省受國厚恩一由披拂之功莊子孰居無事而披拂是恭惟某官厚德噓枯深仁蘇涸拔茅連茹引黨類以同升易拔茅茹以其彚征吉自葉流根先京師而蒙潤曲振孤寒之迹亦聮獨冷之官某倚席非材竝見前濫巾有靦詩有靦面目子厚齒牙之不少獨缺為師栁子厚與韋中立論師道書平居望外遭齒舌不少獨缺為人師耳少陵爾汝之肯忘無多酌我杜少陵醉時歌得錢即相覔沽酒不復疑忘形到爾汝痛飲真吾師蓋寬饒傳清平恩侯許伯入第丞相御史皆賀寬饒不行許伯請之乃往許伯自酌曰蓋君後至寬饒曰無多酌我我乃酒狂丞相魏侯笑曰次公醒而狂何必酒也詳啓意國録時作回桂陽張知軍國均桂陽軍秦屬長沙郡漢高帝分長沙為桂陽郡臨武南平郴縣屬焉吳分桂陽置始興郡後屬東衡州隋改郴州又改桂陽郡唐置郴州憲宗時即平陽縣置桂陽監以其地在桂洞之南故曰桂陽鄰東家之棗尚缺即溫王吉傳吉少居長安東家有大棗樹垂吉庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽婦去東家棗完去婦復還杜詩東鄰撲棗任西鄰無食無兒一婦人憩南國之棠猥蒙假䕃實未知千騎之上遂有稽一介之書鳴謙先之自訟悚甚恭惟某官美高世濟才應時須竝見前以持槖三世之家趙充國傳安世本持槖簪筆事孝武帝數十年見謂忠謹宜全度之守取履一編之學張良傳孺子下取履又出一編書師古曰編謂聮次之也聮簡牘以為書故云一編詳見前盤根錯節不辭州縣之勞虞詡傳不遇盤根錯節何以別利器梁竦傳州縣之職徒勞人耳茂實英聲共擬公侯之復封禪書蜚英聲騰茂實左傳合而能固安而能殺公侯之卦也公侯之子孫必復其始既奏絃歌之最俯甘管籥之司籥通作鑰說文關下牡也禮記慎管籥注摶鍵器也疏云以鐵為之搢鎖內以摶取其鍵管籥一物互見前倦直上於星辰杜詩聽履上星辰洊平分於風月東坡詞風月平分破言為倅兹膺竹使來撫桂封竊稽漢史之傳不但衛颯之政後漢書循吏傳衛颯為桂陽太守居官如家視事十年郡內清理詳見前茨充之代此郡俗始農桑衛颯傳南陽茨充代颯為桂陽亦善其政教民種植桑柘麻紵之屬勸令養蠶織屨民得利益焉許荆之繼是邦民知教化循吏傳許荆為桂陽太守郡濵南州風俗脆薄不識學義荆為設喪紀婚姻制度使知禮禁在事十二年卒於官桂陽人為立廟樹碑惟公善政與古匹休尚書其作周匹休豈久凝畫㦸之香亟歸取青氊之舊某不堪位置梁武帝命袁昻作書評羊欣書似婢作夫人不堪位置而舉止羞澀終不似真何足控摶賈誼傳忽然為人何足控揣如淳曰控引也揣音圑控摶玩弄愛生之意也既難封不龜之侯莊子宋人有善為不龜手之藥者世世以洴澼絖為事客請買其方百金得之以說吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也聊爾監無蟹之郡東坡詩擬問君王乞符竹只愁無蟹有監州詳見前已作紅泉石磴之夢更數月則可歸紅泉石磴在臨川詳見前然在紫蓋天桂之㫄希五雲之見庇南嶽有七十二峯紫蓋天桂皆峯名昌黎謁衡嶽廟詩紫蓋連延接天柱石廪騰擲堆祝融互見前詳啓意時倅武岡回富順楊知軍伯雨富順監秦為巴郡漢武初置犍為郡東漢末劉璋分犍為主江陽郡江陽縣仍屬焉江陽縣有富義井後周置洛陽郡及富世縣隋廢郡以縣屬瀘州唐因之後避太宗諱改為富義縣宋平蜀以瀘州富義縣地置富義監尋改富順監𨽻潼川府今為富順縣屬敘州府花嶼讀書敢作三刀之夢杜詩豈異神仙宅俱兼山水鄉竹齊燒藥竈花嶼讀書牀嶼音敘象吕切說文島也山在水中文選注海中洲上有石山也王濬傳濬夢懸三刀於梁上須臾又益一刀主簿李毅曰三刀為州字又益一刀明府其臨益州乎詳見前角巾還里顧開兩焰之祥羊祐與從弟護書曰年已朽老既定邊事當角巾東洛還歸鄉里諸集拾遺李畋為國子直講求郡晨登講席諸生見畋巾上兩焰火起是日得榮州孰分鄰壁之光見前實倚大邦之屏詩大邦維屏大宗維翰恭惟某官器資凝逺業履端方學斟酌乎六經真越諸子班固典引斟酌道德之淵源揚雄傳贊若使遭遇時君更閲賢知為所稱善則必度越諸子矣家清白者纍世仍畏四知楊震傳震遷東萊太守道經昌邑故所舉茂才王密為昌邑令懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知子知我知何謂無知密愧而出或欲令開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎頃從幕府之游茂著賦輿之最左傳羣臣率賦輿為魯衛請注賦輿兵車也既樵蘇之宿飽合斧繡以晝行游刃成風技飽經於肯綮竝見前得州如斗袖何足以回旋宋典籖權重宗慤為豫州典籖多所連執慤大怒曰慤年六十得一州如斗大不能與典籖共臨之漢景帝後二年諸王來朝有詔更前稱夀歌舞長沙王但張袖小舉手曰國小地狹不足回旋詳見前然既車輕而馭良何嫌舟大而水淺誰如仲卿者㑹有裏言王章傳京師尊貴在朝廷人誰踰仲卿者左傳寡人出伯氏無裏言君薄淮陽耶即膺中召見前某十年出幕杜詩十年出幕府自可持旌麾一障乘邊自憐無味以可憎昌黎送窮文凡所以使吾面目可憎語言無味者皆子之志也况聞不修而已壞韓文不修且壞楚餘波之及晉儻沐垂情左傳其波及晉國者君之餘也滕小國之間齊庶幾逃責帝王世紀周赧王負責於民無以歸之乃上臺以避之周人名其臺曰逃責任昉傳四海之議於何逃責回趙眉州希濬眉州秦屬武陽縣漢屬犍為郡齊分置齊通郡梁立青州取青衣縣為名西漢改眉州因峨眉山為名後周復曰青州改曰嘉州隋改眉州又改眉山郡唐改通義郡復為眉州武穆文昭又憩棠而出守左傳昔周公弔二叔之不咸故封建親戚以藩屏周管蔡郕霍魯衛毛𣆀郜雍曹滕畢原酆郇文之昭也䢴晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也召父杜母愧揚粃之在前召信臣傳遷南陽太守其化大行吏民親愛號曰召父杜詩傳遷南陽太守性節儉而政理清平時人方於召信臣故南陽為之語曰前有召父後有杜母孫悼傳簸之揚之糠粃在前比已修執訊之誠左傳鄭子家使執訊與之書注通訊問之官兹又辱㢲牘之寵恭惟某官飄然無敵卓爾不羣見前子政文章何止數十篇之頌劉向傳向字子政以通達能屬文辭與王褎張子僑等竝進封獻賦頌凡數十篇辟疆議論顧為二千石之淹劉辟疆傳辟疆字少卿好讀書能屬文武帝時以宗室子隨二千石論議冠諸宗室甫稅駕於龍泓李斯傳吾未知所稅駕注舍車曰稅張協賦停輿蕙渚稅駕蘭田方輿勝覽龍泓在嘉定府龍游縣東坡詩虛名無用今白首夢中却到龍泓口杜詩徘徊虎穴上面勢龍泓頭又偃藩於蟇嶺漢書敘傳木偃息以藩魏兮左思詩吾希段干木偃息藩魏君蟇頥山在眉山縣東七里狀如蟇頥因名詳見前先聲戾止和氣藹然江酌玻瓈暫領一盂之水玻瓈江即蜀江東坡詩共飲玻瓈江陸務觀詩玻瓈江上栁如絲詳見前龎參傳為漢陽太守郡人任棠有竒節參到先候之棠不與言但以薤一大本水一盂置户屏前詳見前袍分宫錦即銜七寶之杯新唐書李白傳嘗乘舟與崔宗之自采石至金陵著宫錦袍坐舟中㫄若無人杜詩龍舟移棹晚獸錦奪袍新唐樂文李翰林別集序白進清平調詞三章上命梨園子弟略約調撫絲竹遂促李龜年以歌之太真妃持頗黎七寶杯酌西凉州蒲萄酒笑領歌詞意甚厚某契託交龜情深賀燕袴歌今五已欣逢廉叔之來見前樓近古三安得有黎侯之愛東坡眉山逺景樓記吾州之俗有近古者三云云軾將歸老於故丘布衣幅巾從邦君於上酒酣樂作援筆而賦之以頌黎侯之遺愛尚未晚也詳見前回劉太守光詳啓意梅亭時為榮守劉太守其州人因姓同李名啓中避諱故答之云云通篇用劉姓故事十年出幕已迷蜀道之津李嘗辟成都安撫使幹辦公事兩焰生巾又在鄭公之里諸集拾遺李畋為國子直講求郡晨登講席諸生見畋巾上兩焰火起是日得榮州鄭𤣥傳孔融深敬於𤣥告高密縣為𤣥特置一鄉曰鄭公鄉天幸事大夫之賢者日可就有道而正焉恭惟某官夙擅三長新唐書劉子𤣥傳尚書鄭惟忠嘗問自古文士多史才少何耶子𤣥曰史有三長才學識世罕兼之故史者少夫有學無才猶愚賈採金不能貨殖有才無學猶巧匠無楩柟斧斤不能成室善惡必書使驕君賊臣知懼此為無可加者時以為篤論兼該七略見前尉中壘卿宗正雖鬱壯圖劉向傳蕭望之周堪薦更生宗室忠直明經有行擢為散騎宗正給事中典金敞四人同心輔政後上封事以為中壘校尉前江陵後𢎞農已多美最劉昆傳前在江陵反風滅火後守𢎞農虎北渡河詳見前顧戀三堂之竹洞韓退之和虢州劉給事三堂新題二十一詠詩序云虢州刺史宅連水池竹林往往為亭臺島渚目其處為三堂劉兄自給事中出刺此州在任逾歲職修人治頗復增飾作二十一詩以咏其事竹洞詩云竹洞何年有公初斫竹開洞門無鎖鑰俗客不曾來劉給事名伯芻元和八年出刺虢州白樂天行制詞懶尋千樹之桃栽劉禹錫詩𤣥都觀裏桃千樹盡是劉郎去後栽詳見前行當解五斗之醒劉伶傳常渴甚求酒於妻妻拍酒毁器泣諫伶曰吾不能自禁惟當祝以神自誓耳便可具酒肉妻從之伶跪祝曰天生劉伶以酒為名一飲一斛五斗解醒婦兒之言慎不可聽即入奉三雍之對河間獻王傳獻雅樂封三雍宫應劭曰辟雍明堂靈臺也雍和也言天地君臣人民皆和也某一寒寡與獨冷多畸畸居宜切說文殘田通作竒盤盤再辱於青泥李陵傳丈夫不能再辱李白蜀道難青泥何盤盤百步九折縈巖巒愧愧三榮之皂蓋榮州亦曰三榮以榮德榮黎榮隱三山得名續漢志二千石皂蓋朱幡方圖設榻而延孺子見前仍合避堂以舍蓋公曹參傳聞膠西有蓋公善治黃老言使人厚幣請之既見於是避正堂舍蓋公焉愛勿勞乎忠勿誨乎正願拜任棠之水見上條姓所同也名所獨也詎容避安石之墩王荆公謝安墩詩我名公字偶相同我屋公墩在眼中我去公來墩屬我不應墩姓尚隨公劉太守蓋榮州人梅亭時為榮守劉諱其名因改其姓故答啓云云擁篲不遙高帝紀太公擁篲迎門却行李竒曰為恭也如令卒持帚也師古曰彗者所掃也史記孟子列傳如燕昭王擁彗先驅索隱曰彗帚也謂為之掃地以衣袂擁彗而却行恐塵埃之及長者所以為敬也操觚罔既木簡曰觚古人用之以書陸機文賦或操觚以率爾或含毫而邈然回曹雅州澄雅州本秦蜀郡嚴道縣地漢因之晉屬漢嘉郡西魏於此置蒙山郡及雅州隋初郡廢州存大業初改州為臨邛郡治嚴道唐初復為雅州天寶初改盧山郡乾元初復為雅州孟蜀置永平軍治雅州宋復為雅州仍治嚴道提舉黎州兵甲今省嚴道入州領名山榮經盧山三縣直𨽻四川布政司千騎迂臨已諧望履雙魚寵賁尤佩鳴謙竝見前臨履賁謙四卦名徒欽博我之文敘傳從容風議博我以文師古曰謂以文章開博我也亦恥過情之譽恭惟某官清涵江漢秀擢岷峨萬字千鍾暫試文章之守六一居士集朝中措詞文章太守揮毫萬字一飲千鍾十行一札行登獻納之班見前觀剪裁鯨錦之工杜詩客從西北來遺我細織成開緘風濤湧中有棹尾鯨又錦鯨卷還客始覺心和平喻來啓之工知潤色龍縑之學所恨黃金之虛擲韓退之贈崔立之詩深藏篋笥時一發戢戢已多如束筍可憐無益費精神有似黃金擲虛牝注牝溪谷也真成白璧之暗投鄒陽傳夜光之璧以暗投人於道某分竹罔功飛芻何力見前見君子云何不喜既窺善者之機詩既見君子云何不喜莊子是殆見吾善者機也注機發而善於彼彼乃見之教使臣必咨於周願受忠焉之誨左傳皇皇者華君教使臣曰必咨於周詳別見回楊簡州汝為簡州即漢犍為郡牛鞞縣西魏置咨州及武康郡隋置簡州唐改陽安郡復為簡州宋因之載酒子雲之宅方欲欵門揚雄傳有田一㙻有宅一區家素貧耆酒人希至其門時有好事者載酒肴從游學揚雄宅在成都府岑參詩吾悲子雲居寂寞人已去娟娟西江月猶照草𤣥處晏子春秋前驅欵門韓詩騎雲欵天門欵叩也著鞭季休之州已聞開府蜀志楊洪字季休犍為武陽人也領蜀郡太守衆事皆辦遂即真益都耆舊傳雜記曰每朝㑹何祗次洪坐嘲祗曰君馬何駛曰故吏馬不敢駛但明府未著鞭耳蓋祗本洪門下書佐乃洪所舉野客叢書云著鞭二字人但知為劉琨傳中語而不知何祗已先言之世人局於所見如此魏以黃權為車騎將軍開府儀同三司開府之名始此此一聮同楊姓故事挾故闕修於耦牘念舊辱畀之朋箋一謙之光三復以愧恭惟某官器資凝逺業履清通大音農瑟而羲琴老子大音希聲大象無形農瑟羲琴當作羲瑟農琴世本庖羲氏作瑟瑟潔也使人精潔于心淳一於行也山海經帝陵生晏龍晏龍始為琴瑟桓談新論神農氏繼庖羲氏而王天下上觀法於天下取法於地近取諸身逺取諸物於是始削桐為琴繩絲為絃以通神明之德合天地之和焉晉書樂志農琴羲瑟倕鐘和磬正學周情而孔思其言明其行粹鄉譽夙高所居富所去思民庸甚茂循吏傳序所居民富所去見思詳見前早深丹扆之眷已奉緑綈之招外戚傳中黃門持詔記緑綈方底注綈厚繒君不行兮夷猶屈原九歌君不行兮夷猶蹇誰留兮中洲羌難得而覼縷離騷經羌中道而改路羌楚人發語辭猶言何為也吳都賦嗟難得而覼縷栁文欲秉筆覼縷神志昏耗覼盧戈切音與羅同俗作覼非說文好視也詳見前兹從便郡始用起家朝廷深知弱翁佇膺峻擢魏相傳朝廷已深知弱翁治行方且大用矣兒童爭迎郭伋安得久留某洊領銅符竝見前獲依珂里張嘉貞傳嘉貞為相弟嘉祐任金吾衛將軍每朝軒蓋騶導盈巷號所居曰鳴珂里詳見前車幾兩馬幾駟未敢希楊侯之歸薤一本水一盂所願受任棠之教俱見前回高嘉定泰叔嘉定已見去歲兹辰共對孤羆之傲兀杜詩去歲兹辰捧御牀韓詩西城負外丞心跡兩屈竒往歲戰詞賦不將勢利隨下駐入省門左右驚紛披傲兀坐試席深叢見孤羆文如翻水成初不用意為當朞之日獲迎五馬之逶迤說文逶迤斜去貌辱棨㦸之遙臨杜詩傳賜以棨㦸注漢雜事曰漢制假棨㦸以代斧鉞崔豹古今注曰棨㦸前驅之器也以木為之後世刻僞無復典刑以赤油韜之亦謂之油㦸亦曰棨㦸王公以下通用之以前驅也王勃滕王閣詩序棨㦸遙臨感珠璣之委貺說文璣珠不圓者周禮斿貢鄭注云燕好珠璣琅玕也此以况詩文左傳委君貺于草莽也惟深十襲闞子宋之愚人得燕石於梧臺之東歸而藏之以為寶革匱十重緹巾十襲客見之掩口而笑敢廢七襄詩雖則七襄不成報章恭惟某官業履粹夷風猷高潔任昉表存樹風猷沒著徽烈學問襲石室之富漢高朕蜀郡太守念文翁為政有法作石室以祠文翁鑒裁嫓金鏡之清唐高儉為吏部侍郎善銓敘人物帝賜金背鏡一况其清鑒卒諡曰憲安行鳴大輅之鑾張衡西京賦大輅鳴鑾容與徘徊詭遇謝小人之乘鴻陸有漸易鴻漸于陸鵬路自高得百姓之心以廉為本周禮以聽官府之六計弊羣吏之治注平治官府之計斷以六事以廉為本道千乘之國所去見思自奏最於三嵎三嵎山在今成都府仁夀縣益州記東西南嵎三山相對共號三嵎三山之名曰飛泉翳嘶跨鼇縣治居三嵎之中環合有自然之勢盍躋班於兩禁若為熊軾又𨽻龍藩嘉定為寧宗潛邸故曰龍藩太白對影成三人更弄平羌之明月李詩舉杯邀明月對影成三人又峨眉山月半輪秋影入平羌江水流又一振高名滿帝都歸時還弄峨眉月平羌山在夾江縣十五里平羌江在雅州城北東坡不願封萬户只尋古佛於凌雲凌雲寺在嘉定之南山唐開元中僧海通於瀆江沫水濛水三江之合悍流怒浪之濵鑿山為彌勒大像踰三百六十尺建七層閣以覆之至韋臯時積十九年而工始備臯有大像記又有清音亭天下山水之勝在蜀蜀之勝曰嘉州州之勝在凌雲寺寺之南又其勝也東坡名其亭曰清音又南山之勝也范石湖吳船録云嘉州凌雲寺天寧間即大像所在嘉為衆水之㑹導江沫水為岷江皆合於山下南流以下犍為沫水合大渡河由雅州而來直搗山壁灘瀧險惡號舟楫至危之地唐開元中浮屠海通始鑿山為彌勒佛像以鎮之高三百六十尺頂圍十丈目廣二丈為樓十三層自頭面以及其足極天下佛像之大兩耳猶以木為之佛足去江數步驚濤怒號洶湧過前不可安立正視今謂之佛頭灘佛閣正面三峨餘三面皆佳山衆江錯流諸山間登臨之勝自西州來始見此耳東坡送張嘉州詩少年不願萬戶侯亦不願識韓荆州頗願身為漢嘉守載酒時作凌雲遊又送吕嘉州詩卧看古佛凌雲閣敕賜詩人明月湖嘉州不負於此身見上文漢殿即嗟於見晚某獲依鄰壁正竊餘光田里愁歎之聲每拊心而知愧原隰光華之雅方拜手以固辭尚祈吾味之同不吝君波之及竝見前代回崇慶黎知府伯登袖啓崇慶已見恭承洊驅熊軾後漢輿服志公列侯安車朱班輪倚鹿較伏熊軾皂繒蓋黑轓右騑改牧龍藩崇慶係高宗潛邸奏二十七最之優且歸漢殿唐考功之法有二十七最一曰獻可替否拾遺補闕為近侍之最二曰銓衡人物擢盡才良為選司之最三曰揚清激濁褒貶必當為考較之最四曰禮制儀式動合經典為禮官之最五曰音律克諧不失節奏為樂官之最六曰決斷不滯與奪合理為判事之最七曰部統有方警守無失為宿衛之最八曰兵士調習戎裝充備為督令之最九日推鞫得情處斷平允為法官之最十曰讐校精審明于刋定為校正之最十一曰承旨敷奏吐納明敏為宣納之最十二曰訓導有方生徒克業為學官之最十三曰賞罰嚴明攻戰必勝為軍將之最十四曰禮義興行肅清所部為政教之最十五曰詳録典正詞理兼舉為文史之最十六曰訪察精密彈舉必當為糾正之最十七曰明於勘覆稽失無隱為勾檢之最十八日職事修理供承彊濟為監掌之最十九曰功課皆充丁匠無怨為役使之最二十曰耕耨以時收穫成課為屯官之最二十一曰謹於蓋藏明於出納為倉庫之最二十二曰推步盈虛究理精密為厯官之最二十三曰占候醫卜效驗多著為方術之最二十四曰檢察有方行旅無滯為關津之最二十五曰市廛弗擾姦濫不行為市司之最二十六曰牧養肥碩蕃息孳多為牧官之最二十七曰邊境清肅城隍修理為鎮防之最連六千石重之寄更守唐安吾丘夀王傳連十餘城之守任四千石之重唐分益州匹縣地於晉原縣立蜀州改唐安郡民曰幸哉君為淹矣維昔交雙麟之賀乃今瞻千騎之光恭惟某官學問淵停器資山立早結冕旒之眷入為臺閣之珍倦直承明復歸蜀道東藩兩郡所去見思竝見前西掖九遷最宜為誥韓文王某之文可思最宜為誥顧動觀梅之興杜詩東閣觀梅動詩興還如何遜在揚州又煩分竹之行不俟突黔即膺泥紫某同升有幸懷德滋深燕雀賀大厦之成幸諧面慶竝見前魚龜託美鄰之䕃尚慰心期韓詩水文浮枕簟瓦影䕃龜魚餘見前四六標準卷二十八
