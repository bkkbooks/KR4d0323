body:
  text: 代回翟峽州畯象刑賛治自媿罔功雉正共工猥令攝長愧未申於巽謝遽先辱於謙撝恭惟某官燕譽甚休馹除不逺閑香山之白傅歳月已深起東海之蕭生風雲胥㑹有如衰朽諒借吹嘘某自揣頭顱不堪指目􅂓復爾耳少陪鳴履之班行或使之即控挂冠之請代回程慶元凖制五刑即天論賛曹無補居四民時地利攝長可慙即拜誤恩亦懐厚芘恭惟某官賢勞于外聖眷已深怜草木之味同假之聲氣惜桑榆之景晩借以寵光挽回神武之冠躐視文昌之座某餘年無幾取數巳多司喉舌之納言濫巾甚愧借齒牙之餘論納履爲期代回孫衢州子直憲曹賛治徒玩􅀊以罔功起部虚貟遽誤恩而率屬有渥枌榆之芘宻榮蒲栁之凋恭惟某官作牧近畿肇基王業有功則說行頒一札之書位事惟能㑹振六官之譽曲怜衰朽巧借吹嘘某乆欲投簮寧堪鳴履司納言之喉舌恐乏告猷借餘論於齒牙早期歸老代回張澧州忠恕分符竹使出牧蘭江諒棨㦸之初臨已袴襦之交詠恭惟某官人門具美仕學皆優粤從幕水之依羣空兾野尋駕屏星之寵歌滿海沂兹歛惠於一州行報政於五月某語離方爾賀上闕然邅吾道兮洞庭相從已晩遺余褋兮澧浦藏去爲榮代回潘真州友文象刑賛貳自媿罔功雉正攝丞猥令率屬非餘波之逺竊何誤渥之驟加恭惟某官朝蹟方華民庸甚茂駕輕就熟不忘推轂之言嘘枯吹生巧借託根之地故令尸素亦復佩蒼某餘年無多休日已晩惟是識鄭崇之履莫報君恩止當挂􅀪景之冠歸歌聖德代回安慶楊國愽楫元帥辟賢名儒出牧傳道解惑太學固教化之原謹身帥先郡守亦吏民之本恭惟某官器資端亮學術粹夷論不詭於聖人皆師友乎孔孟逹可行於天下真妾婦於儀秦自服班行益隆譽處人有矜式甚慰橋門億萬計之心民無嘆愁却須刺史二千石之力用召父杜母之政慰桐君皖伯之􅀖一郡得才萬物吐氣某未由削櫝先辱飛緘君豈薄淮揚耶當還禁闥吾必在汶上矣猶見璽書代回周建昌燧入覲天陛出牧江城地小而民實殷無謂附庸之陋政平則訟自理蔚爲保障之雄恭惟某官濟美象賢蜚英燕譽湏爲別乗既􅀖國之不空今則專城諒湖山之自得眷盱江之小壘接閩嶠之要衝欲寛愁恨嘆息之民是在賢良慈惠之帥銅陵石磴尋謝屐之風流金盤玉柸識顔碑之氣骨是不落莫何有鄙夷某方此違離悒然馳傃挿三萬軸嘗願託於主盟奉咫尺書敢再溫於前請代回趙肇慶鬚垂霜白甚便烏角之巾腰佩水蒼仍玷紫荷之槖何勤妙墨更示徽言恭惟某官大雅不群在宗載考駒翩翩兮長駕早空兾北之群鳶跕跕兮卑飛猶落嶠南之逺佇䇿龔黄之績歸圖勉峴之功某有七不堪負四冝去㑹且歸矣願爲聖人之氓愛莫助之請續循吏之傳代回王楚州益祥入紆漢組出牧淮壖銅虎分符資循良之共理石􅀛設險喜牧御之得人恭惟某官材具寛詳器資敏劭循循善誘立美教於鱣堂諤諤以昌振直聲於烏府屈伸以道出處何心兹屈摶風九萬里之程姑承起家二千石之寵山陽古郡江北要衝師旅飢饉之餘民亦勞止勞來還定之政公優爲之某別日猶新㳙辰未審雙魚中素猥勤先施之光千騎上頭莫贊前驅之慶代回趙江隂彦适入對文石出牧澄江天近帝畿已覺王孫之貴地名道院諒無刺史之難恭惟某官卓然宗標展也國器大功二十之一舉才子以爲冝同姓五十有三友􅀖君而亦衆眷淛河之奥壤在中浦之名􅀖舳艫相衘如枕席之上湖山自得歸庭户之中使細民而息肩在天宗之維翰某儀圖賀厦寖迫歸田八座前衘恍已成於芻狗尺書厚意􅂓附報於歸鴻代回趙南雄善偰懐組新興改轅舊部昔爲半刺猶未究於全材兹既專城諒不孤於共理恭惟某官飛英属籍擢秀儒科楚令尹之清已之無慍漢良吏之盛去則見思久於飛鳬晩而展􅂹剔藪欲擒於劉闢啜羮不媿於樂羊兹從三楓就領半竹吏民旁午共忻別駕之重留號令先庚不待賢侯之再命紅旗破賊􅀞㦸凝香某側聞下車未由上記種栁而歌刺史願早成隂折梅而憶故人無忘寄驛代回黄岳州偰入對楓宸出分竹使京洛雲山外方佇來儀乾坤日夜浮又煩坐鎮恭惟某官恢然抱負多所踐􅏡􅂝龍枕參蚤冠南宫之進士馮熊接軫歴試東方之諸侯豈袁盎直諫乃不居中抑望之雅意固求補外屈伸以道出處何心今奉建武之細書坐覽岳陽之大觀先天下而憂後天下而樂不在兹乎有刺史之榮無刺史之難亦足試矣某負二冝去有兆足行我欲破何山之葷且甘藿食公當增黄覇之秩而入筍班代回張潮州鎬出綸西掖作牧東陽魚佩虎符香自凝於燕寢鳳城龍首患何有於鱷溪恭惟某官喬木聞家茁蘭秀質高山流水早收出宰之榮明月清風尋取平分之寵民懐五袴君夢三刀眷是潮陽雄於廣郡善必聞惡必見雖嶺海如畿甸之間守此土治此民乃貢賦供宗廟之壤惟能誕布韓昌黎之政自可細和鄭餘慶之詩某從􅀟魚中聞千騎上文軫之薄桂海無有遐心姓名之在御屏願恢逺業代回章象州時言夏辟三千貳卿弗績冬官六十攝長奚功過辱高情逺垂下問恭惟某官材猷膚敏政術融明竹使虎符亶謂人生之貴桂林象郡諒增地望之雄猶枉􅀟魚見華五雉某去天雖近來日無多竹馬交迎公當厚南土之惠蓴鱸既熟我欲御西風而行代回施溫州椷西曹叢􅁄之卿躐升五雉南國甘棠之伯逺􅀉􅀟魚頌而不規榮亦爲媿恭惟某官身兼數器惠歛一州雅志在乎本朝行召君矣好善優於天下豈欺我哉故令陳人復􅀍新渥某亦聿既耄豈不懐歸天子以孔戣爲尚書三留甚媿丞相舉龔遂於太守一見即行代回王寧國􅀘之制五刑以即天參聮無􅀘居四民而時地率属可慚簡拔非冝游揚有自恭惟某官乆分符竹行及戍􅀲國人曰賢當拾遺於禁闥天子有詔佇奏計於甘泉猶枉魚書見華雉正某日之夕矣人謂斯何納言喉舌之司濫竽何益餘論齒牙之借納履爲期代回建寧􅀓侍郎伯成象刑賛治自媿罔功雉正分工猥令率属誤恩有自餘芘焉依恭惟某官王之藎臣國之元氣元戎小隊又頒千里之春方國細書行趣九重之覲曲憐衰朽密借品題故躐長於中臺使少華於末路某身其餘幾欲者不多慮行道之猶非倚門骯髒愴休日之已晩搔首踟蹰代回新平江趙待制希懌弭節江城建牙輔郡鸞鳴滕閣久雅望之遥臨燕寢蘇州暫凝香之森衞恭惟偃藩明徳胙土大勳衮衣繡裳冝拜左周公之命彫戈皂蓋又分右馮翊之符卧而治之行且召矣某罔功犴獄攝長雉工昔受一㕓事其大夫賢者今爲三輔無以我公歸兮代回陳撫州蕃孫牧夫庶獄之司躐陞五雉􅀖君諸侯之寵逺寄􅀟魚受之赧然感亦厚甚恭惟某官器資敏劭治術寛明師出於陳鄭之間孰共屝屨人樂其龔黄之教謂有璽書似聞棠隂之成已迫葵丘之代民雖借寇使盍召參諒敬老之近親不撫壯而弃穢某偶然曳履行矣投簪君數父執於慈恩誰其存者我得㕓氓於仁政顧不幸哉代回常德趙守師乗輟材宗邸作牧价藩全楚故􅀖義陵雄郡既有賢明慈惠之帥當無愁恨歎息之民恭惟某官玉泒流芳金門賜第雲霄一握盍陪護於属車風月平分久徊翔於别乗兹分符竹趣及戍􅀲三閭大夫何至斯濯纓想樂武陵太守好事者進棹尤冝洞庭無波宣室有詔某未遑上記􅀱問下車客遺􅀟魚聊作不逺之復人生五馬願觀自飬之頤代回湖北范漕子長兼鄂州四牡之勞使臣乆稽王覲五雉之爲工正謬忝國恩手畢鼎來背芒益重恭惟某官岷峨雋特江漢經營方言利者析秋毫民力竭矣得明公而守夏口使指裕如式遄其歸不逺伊邇某負二冝去有七不堪詠南朝之數諸何恍非其舊歌西賊之聞一范願疾其驅代回新吉州汪守檝祥刑訓夏莫輸贊貳之功事典司冬忽被攝承之命誤恩有靦餘芘焉依恭惟某官洊著民庸還分藩閫起家二千石佇看黄􅁓之除書連檣一萬艘豈戀紅粧之執樂行且召矣願少須之某乆覺龍鍾難司鳩僝已屢貢挂冠之請兆足以行雖逺勤削櫝之褒榮式爲愧代回胡峽州紀白雲之司已慚弗績分蒼玉之佩更愧罔功良馬五之烹魚雙只恭惟某官賦姿凝逺布政䟽明居然一麾之臨邈在三峽之逺詰曲羊腸之路王尊願爲忠臣崔嵬虎牙之山吳漢隠若敵國願望此府無媿昔人某司臬無庸共工尤忝讀西陵至喜之記恍若夢游感北山勒移之文凄其歸晩代回栁州趙守師懿老夫髦矣躐分五雉之工公子何如逺致雙魚之素感藏甚厚報答莫宣恭惟某官千里名駒九苞威鳳榮分符竹行吟種栁之詩少俟戍􅀲即布甘棠之化有華下問逺及陳人某骯髒雲司超騰水部曳鄭崇之履小立斯須挂弘景之冠止慙遲暮代回孟嚴州導分竹近畿及瓜代戍舉頭見日治行易於上聞運斤成風徳澤亟其下究恭惟某官抱負甚偉揚歴罙詳恪持三尺法之平以長王國忽請二千石之禄而課民庸維今嚴陵視古馮翊范文正之風流未冺趙清獻之矩範具存舉而措之斯亦竒矣某縻於聽履闕若盍簪去騎之逐雙旌賀成已後烹魚而有尺素先施甚慚代回李崇慶􅐉優詔起家分符予郡蜀更多故有愁恨歎息之民公勉一行真賢明慈惠之帥􅀟旌戾止五袴驩然恭惟某官德履直方器資凝逺夕長蛇朝猛虎去而違之乗赤豹從文貍㓗其清矣未走三節􅂓把一麾導玻瓈萬頃之江委諸汶井駐峩眉半輪之月照此唐安田里得以底寧公卿選諸所表某游從已舊俯仰成陳歛大惠于一州徒得君重賜細書於方國無以公歸代回臨江洪守伋敬爾攸獄慚貳職之亡庸咨汝共工遽叨恩而率属高情下問外靦内慙恭惟某官業履粹明政聲充實傳家萬卷洞先秦古史之書出守一麾續兩漢循吏之傳排閬風而直上歴􅁻日兮將行猶貽􅀟魚之緘見華五雉之正某強顔曳履有味投簮輪人爲輪愧罔功於鳩僝相門有相願崇徳而象賢代回晁南康百談參華陳臬玩􅀊亡庸率属共工自天有命逺勤五馬特枉􅀟魚恭惟某官當世淳儒爲時循吏得州如斗少低剌史之天遵渚有星佇應郎官之宿交章已入趣覲不遐某自覺龍鍾寧堪鳩僝司納言之喉舌深愧濫巾借餘論於齒牙早期納履代回興國楊知軍迪抗章引外得請專城六舘諸生方有範模之地長江千里可無保障之人伏惟某官能賦摩空明經飾吏頃者一同之政藹然三異之稱鴻羽來儀鵷行増重四方之供簿正兆豈足行九里之潤京師賢然後用闔閭故壘彭蠡上游累年無露積之藏數處有風寒之護上爲民計中遣公來能安田里之嘆愁必記御屏之姓字某濫兹作牧政爾爲僚属州得陽公之賢亦云幸矣便道因滕閣而至爲我賦之代回安慶陳知府貴謙望郎引外不孤銅虎之分倦客得遷只動蓴鱸之想未遑􅐹記遽辱鳴謙恭惟某官奥學淵回清標山峙氣沮金石豈徒黄絹之好辭世掌絲綸冝得青氊之舊物亦既累年於東觀非惟百日於南宫乃懐棠棣之碑徑賦桐鄉之政朱光嘗爲皖守非此地耶汲黯不薄淮陽今召君矣某乆荒三徑又長十連望吳㑹於雲間恨無飛羽借頴川之河潤但切馳心代回羅建昌勲陳情便養䟽寵改麾􅂋升二千石之眞龍光有渥榮遂九十親之侍燕喜尤多恭惟某官左學英游西樞貴介抱持醇固言行擇乎中庸楊歴詳深名實孚於上下輟從李寺出舘竹符建牙密邇於故鄉畜眼雄誇於新尹報政紅泉之澗徙蕃白石之汀側聞盱江舊􅀠撫境不離梓里洊奉板輿豈惟有刺史之榮盖亦全天下之樂第虞選表却合處中某幸甚爲寮愛焉莫助問專城之五馬方欲修書得尺素於􅀟魚惟深抱愧代回安慶林知府仲虎簪筆何功蒙誤恩之起廢函牋甚寵辱妙語之嘘枯藏去爲榮不知所謝恭惟某官心期到古膽略過人一從右學以䇿名三綰左符而出守竊窺近奏具見逺圖應憐老􅂹之服輿根塵猶在故因飛鴻之送目書問先之某髪白奚爲腰黄弗稱見此古罍洗當韞櫝以儲藏報之英瓊瑶愧探囊之羞澁代回常台州建斜日投閑冒誤恩而入侍朶雲借潤儷好語以相先有味其言莫知所謝恭惟某官早飛雋軌寖踐夷塗忽持江海之一麾出領湖山之千里丹丘按堵􅀞㦸凝香行有詔追即歸禁近某髪真種種心已休休咫尺不違顔雖少光於末路八十猶行脚祗見笑於大方代回陳撫州蕃孫別畫㦸之凝香倐焉兩月讀烏􅁝之妙語燦若五雲未能先施良負不敏恭惟某官粹資玉立厚德春温來臨父母之􅀖居多豈弟之政民胥然矣皆願受一㕓而爲氓我儀圖之又私喜同年之有後比因造朝之役過勤下榻之情曾謝幅之未遑已慶緘之先及某去天雖近來日無多騎馬聽雞聊續邯鄲之夢踞􅀛食蛤終尋汗漫之期儻未疾驅猶容嗣見代回孫衢州洵鄉里有賢者乆矣傾心出入相避然失於交臂鼎來手畢益重背芒恭惟某官抱負不凢踐揚兹乆甫安朝蹟豈少民庸属錢楮之重輕生閭閻之愁嘆衢故太末也今實輔藩君薄淮陽耶即歸禁闥日扁舟之東上時千騎之西來所至賈胡以俟明府或恐銅駞陌上㑹相見故徑下嚴陵之灘豈料金鯽池邊不見君遂直過定山之路荷長鬚之垂問搔短髪以懐慚某不安田廬又趍殿陛以年亦當廢矣難借吹嘘曷月予還歸哉恐勤將送代回魏知守欽緒別去仞墻倐焉兩月有來尺素爛若五雲既媿先施又慙厚報恭惟某官棲遲盛福邂逅初心厭簪筆於承明乆挂冠於神武顧恐踞鞍之矍鑠猶堪奮袖以低昂盍歸乎來何見之晩某不安西崦又踏東華惟有當歸已决焉於去計入爲逺志徒仰止於高風代回建寧傅侍郎伯成諌大夫之去國誰解引裾賢剌史之還郷真成衣錦既幸邂逅適我願矣猶恨出入如相避然恭惟某官性禀直方氣全剛大難進易退温温維徳之基遇事直前蹇蹇匪躬之故方此告嘉猷于后盖將下膏澤於民無三諌之不從遽一麾而出守拾遺􅀘過寧忘汲黯之忠納誨輔台行聽啇宗之命某不安西崦又踏東華戴惠文之冠身其餘幾挂神武之服秋以爲期代回常徳吕守昭逺歌滄浪之水猶記獨清望赤城之雲忽分五朶恭承嘉惠益仞故情恭惟某早䇿名􅄤盍躋膴仕瑚璉清廟之器寧乆在山杞梓明堂之材誰將作室游仙夢断公定憶秦人之桃吊古愁多我亦念靈均之蕙有華妙語肯寄舊交某蹇步蹣跚斜陽寂歴續東華之夢又聽朝雞讀北山之移只慚夜鶴挂冠有日望履無階代黄漕斚回趙婺州善下宗邸賢勞甸侯均佚赫奕廉車之重焜煌郡紱之光既合虎符足凝燕寢恭惟某官直溫而寛栗明允而篤誠早入對乎三雍近於大雅晚更條於七略慱以羣書兼左右之戚賢孚上下之名實糾合周盟而肅若欲分陜服而主之適咨牧於金華爰取材於玉葉高牙大纛屹隆屏翰之維今袴昔襦諒借京師之潤某驅馳其職飛輓何功轉數十萬給中都實日虞於司敗良二千石有治理是天幸以蒙成代回趙南安師傳合符桂海之北易鎮梅關之南以忠肅恭懿之材慰愁恨嘆息之俗銅魚既合竹馬交驩恭惟某官夙派天潢早梯月窟製尹何之錦愈出愈竒題仲舉之輿再進再勇遽厭飛鳶之影􅂴移祭鱷之文謂即入於直廬猶于藩於横浦陽和有脚姑行大􅁃之春咫尺違顔即近長安之日某謬塵班綴例辱緘縢逢驛使一枝之來喜承見寄跂織女七襄之報愧不成章代回洪筠州樇解􅀛庸蜀分虎勾吳惟筠爲州號西江之道院與鄱接境得北道之主人民起來暮之歌公有衣晝之寵恭惟某官流芳名閥騰茂通材鳴單父之琴全牛自解入河陽之幕凢馬皆空方夢翼以朝天遽捫參而歴井惟良作牧所去見思乃若高安之城亦出錦江之水舉頭見日知漸近之使然有脚行春計無逺之弗届某重游碧落轉覺黄昏十部從事之來敢無酬於記室三公刺史之入願益大於相門代回章象州時言榮紆郡組誕布詔條象郡自秦既入中州之籍虎符分漢是資循吏之功雙旌鼎來五袴咸喜恭惟某官人門具美風調不群惟服襲於典刑故飛騰於聲實屢製尹何之錦技敏奏刀載題仲舉之輿歌騰別乗冝森􅀞㦸出擁朱轓跕跕飛鳶公蔑鄙夷之意嗷嗷鳴鴈民有安集之期某例辱㢲牋備知謙徳龔遂良二千石必能致渤海之安申公年七十餘􅂓復議明堂而去代回興國葉知軍代衛參政榮分漢竹言憇召棠二千石之起家上恩甚寵十萬户之受福民望已深恭惟某官文獻名家典刑勝士盤旋州縣既不嘆於徒勞容與班行亦自安於平進凄其在疚甫此御祥適擇牧於山城爰借材於家食川名曰富人實多貧荒政十二聚萬民正煩料理長江千里護數處庶免流離某濫守帥藩幸同寮寀察鄰國之政寧敢自私安刺史之民更期忠告代回吉州薛守璆杜陵老大久便白木之鑱漢殿論思又綴紫荷之槖此皆左右先爲容也所恨出入如相避然恭惟某官名閥甚華歴仕皆膴自分郢城之月即行閩嶺之春聲實交流班聨孔邇又森􅀞㦸出訪青原連檣一萬艘不廢撫摩之政起家二千石㑹看華要之除某見謂衰遲過勤比數􅀟魚中有尺素良感故情五馬不受二毛相期早貴代回建昌黄知軍迎五馬問專城甚慚不敏烹雙魚有尺素乃辱相先雖感高情能無下汗恭惟某官器資凝厚材具寛餘鼓琴一再行誰識高山之志作詩三百首可默咸池之音􅀞㦸朱幡新户庭之號令紅泉碧澗添溪谷之精明不俟合符㑹膺召玺某崦嵫日薄江海天遊老入明光踏舊班固已戒來迎之僮僕歸來輦路聞好語又將選所表之公卿儻即疾驅猶容晤語蒼顔華髪不堪東華之塵埃􅀞㦸清香好在西陵之門户飛牋璀璨佩意勤渠恭惟某官德性靖共器資肅括蒼皮溜雨此非樸樕之材高浪駕天抑豈􅉾泓之水由轄而院既三四稔以身去國已七八年居然一麾猶在千里自公言之誠屈爲民計則甚良商旅願出於塗何􅁨郡計公卿選諸所表㑹有郵音某乆矣地寒加之日薄勞承明侍從之事豈不懐歸及頴川太守之來願安承教代回臨江洪守伋五馬專城未遑先問􅀟魚尺素良佩高情自顧闕然何以得此恭惟某官器資閎敏材具寛餘孟子有言故國非謂喬木魏謩敢諫此笏乃今甘棠有如把麾何足游刃頋今近咫尺天之選皆自良二千石而來勉分黄屋之􅁨㑹取青氊之舊某景翳翳而將入技斷斷以無他乗興而來􅂓復續東華之夢乞身以去行將上北闕之書代回薛漳州揚祖百舍思賢寖闊承顔之便尺書委况具知存念之勤退惟衰遲良深感戢恭惟某官持心靜重臨事敏明中外揚歴之詳聲實飛騰之盛猥辭簿正出領州麾諒因報政之來即見歸班之寵某桑榆短景樗櫟散材簪筆甘泉姑對揚於休命挂冠神武㑹邂逅於初心代回趙徽州希逺千騎上頭未遑贊慶􅀟魚尺素猥辱謙勤靜言思之爲禮過矣恭惟某官神明帝胄禮樂宗英早詳七略之書冝應三雍之對翺翔半刺淹屈全材惟古郡之新安乃先正之舊治流風善政崇德象賢召杜龔黄勉䇿名於今日毛原周召㑹配德於古人某雖綴近班已謀歸計暗中摸索頗有似曾相識之疑送上吹嘘不勝無能爲役之嘆所願召璽之下或在挂冠之前代回筠州施守椷起家得郡便道開藩雙旌兩轓頓覺徧城之重一襦五袴想回寒谷之溫恭惟某官器采端華典刑炳蔚爲愽士爲太尉茂譽處於前聞有喬木有丗臣盍躋登於要路洊分漢竹出憇召棠惟筠爲州夙號江西之道院貫蜀之水亶爲錦里之主人一郡得賢萬物吐氣某濫兹分閫幸甚爲僚修豫章庭户之間正兹懐愧雪高安父老之耻當遂蒙成代回王楚州柟入紆漢組出牧淮壖銅虎分符資循良之共理石􅀛設險喜守禦之得人恭惟某官才具寛詳器資敏劭循循善誘立美教於鱣堂諤諤以昌振直聲於烏府屈伸以道出處何心兹屈搏風九萬里之程姑承起家二千石之寵山陽古郡江北要衝師旅飢饉之餘民亦勞止勞來還定之政公優爲之某別日猶新涓辰未審􅀟魚中素猥勤先施之光千騎上頭敢廢前驅之慶代回高郵汪守統掌故民部已覺厚顔首善賢関更叨附尾三省僥逾之自一由披拂之功恭惟某官厚德嘘枯深仁蘇涸拔茅連茹引黨類以同升自葉流根先京師而蒙潤曲振孤寒之跡亦聮獨冷之官某倚席非材濫巾有靦子厚齒牙之不少獨欠爲師少陵爾汝之肯忘無多酌我代回桂陽張知軍國鄰東家之棗尚欠即溫憇南國之棠猥蒙假䕃實未知千騎之上遂有稽一介之書鳴謙先之自訟悚甚恭惟某官美高丗濟才應時須以持槖三丗之家守取履一編之學盤根錯節不辤州縣之勞茂實英聲共擬公侯之復既奏絃歌之最俯甘管籥之司倦直上於星辰洊平分於風月兹膺竹使來抚桂封竊稽漢史之傳不但衞颯之政茨充之代此郡俗始農桑許荆之繼是􅀖民知教化惟公善政與古匹休豈乆凝畫㦸之香亟歸取青氊之舊某不堪位置何足控摶既難封不􅀛之侯聊爾監無蟹之郡已作紅泉石磴之夢更數月則可歸然在紫蓋天柱之旁希五雲之見庇代回富順楊知監伯雨花嶼讀書敢作三刀之夢角巾還里頋開兩熖之祥孰分隣壁之光寔倚大邦之屏恭惟某官器資凝逺業履端方斈斟酌乎六經真越諸子家清白者累丗仍畏四知頃從幕府之游茂著賦輿之最既樵蘇之宿飽合斧綉以晝行游刃成風技飽經於肯綮得州如斗袖何足以回旋然既車輕而馭良何嫌舟大而水淺誰如仲卿者㑹有裏言君薄淮陽耶即膺中召某十年出幕一障乗邊自怜無味以可憎况聞不修而已壊楚餘波之及晉儻沐垂情滕小國之間齊庶幾逃責代回眉州趙守希濬武穆文昭又憇棠而出守召父杜母愧楊粃之在前比已修執訊之誠兹又辱㢲牘之寵恭惟某官飄然無敵卓爾不羣子政文章何止十二篇之頌辟彊議論頋爲二千石之淹甫稅駕於龍􅇦又偃藩於蟇嶺先聲戾止和氣藹然江酌玻瓈暫領一盂之水袍分宫錦即衘七寳之盃某契託交􅀛情深賀燕袴歌今五已欣逢廉叔之來樓近古三安得有黎侯之愛代回劉知府光十年出幕巳迷蜀道之津兩熖生巾又在鄭公之里天幸事大夫之賢者日可就有道而正焉恭惟某官夙擅三長兼該七略尉中壘卿宗正雖欎壯圖前江陵後弘農已多美最顧戀三堂之竹洞􅂴尋千樹之桃裁行當解五斗之酲即日奉三雍之對某一寒寡與獨冷多畸盤盤再辱於青􅅺愧愧三榮之皂盖方圖設榻而延孺子仍合避堂以舍蓋公愛勿勞乎忠勿誨乎正願拜任棠之外姓所同也名所獨也詎庸避安石之墩擁篲不遥操觚罔既代回雅州費守澄千騎迂臨已諧望履􅀟魚寵賁尤佩鳴謙徒欽愽我之文亦耻過情之譽恭惟某官清涵江漢秀擢岷峨萬字千鍾暫試文章之守十行一札行登献納之班觀剪裁鯨錦之工知潤色龍縑之學所恨黄金之虛擲真成白壁之暗投某分竹罔功飛芻何力見君子云胡不喜既窺善者之機教使臣必咨於周願受忠焉之誨代回簡州楊知府汝爲載酒子雲之宅方欲欵門着鞭季休之州已聞開府挾故闕修於耦牘念舊辱畀之朋牋一謙之光三復以愧恭惟某官器資凝逺業履清通大音農瑟而羲琴正學周情而孔思其言明其行粹鄉譽夙高所居富所去思民庸甚茂早深丹扆之眷已奉綠綈之招君不行兮夷猶羗難得而覼縷兹從便郡始用起家朝廷深知弱翁佇膺峻擢兒童争迎郭伋安得久留某洊領銅符獲依珂里車幾兩馬幾駟未敢希楊侯之歸薤一本水一盂所願受任棠之教代回嘉定高知府㤗叔去嵗兹辰共對孤羆之傲兀當朞之日獲迎五馬之逶迤辱棨㦸之遥臨感珠璣之委貺惟深十襲敢廢七襄恭惟某官業履粹夷風猷高潔斈問襲石室之富鍳裁嫓金鏡之清安行鳴大輅之鑾詭遇謝小人之乗鴻陸有漸鵬路自高得百姓之心以廉爲本道千乗之國所去見思自奏最於三嵎盍躋班於兩禁若爲熊軾又涖龍藩太白對影成三人更弄平羗之明月東坡不願侯萬户只尋古佛於凌雲嘉州不負於此身漢殿即嗟於見晩某獲依鄰壁正竊餘光田里愁嘆之聲每拊心而知愧原隰光華之雅方拜手以固辤尚祈吾味之同不吝君波之及代回新崇慶黎知府袖啓伯登恭承洊驅熊軾改牧龍藩奏二十七最之優冝歸漢殿連六千石重之寄更守唐安民曰幸哉公爲淹矣維昔交􅀟鱗之賀乃今瞻千騎之光恭惟某官斈問淵停器資山立早結冕旒之眷入爲䑓閣之珍倦直承明復歸蜀道東藩兩郡所去見思西掖九迁最冝爲誥頋動觀梅之興又煩分竹之行不俟突黔即膺泥紫某同升有幸懐德滋深燕雀賀大夏之成幸諧面慶􅀛魚切美鄰之䕃尚慰心期梅亭先生
