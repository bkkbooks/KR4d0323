body:
  text: 賀喬樞宻行簡除參政兼知院成都運司作􅀳用真儒升參大政運籌决勝乆注意於安危當軸處中仍兼資於文武用人如此通國驩然恭惟某官廣渊而篤誠髙明而博厚好學本孔顔之學用心乃禹稷之心非仁義不陳於前雨露夙􅀷於獻納有謀猷則順于外風霆不顯其流形翊賛斗樞爕和天縡折衝尊爼鯨鯢服京􅀚之刑申畫郊圻鱗介慕衣裳之㑹然南北兩朝不能一統由東西二府分作兩􅂗今内治外治交急之時乃政柄兵柄合謀之日冝崇夙夜宥宻之任并䇿旦夕丞弼之功􅂫民力之中乾回夷情之内奰建乆安之􅀔而成長治之業杜羣枉之塗而開衆正之門嵗大旱而作霖啓沃良資於􅀓􅀃天未隂而徹土綢繆允頼於周公􅀖其永孚于休公有無窮之聞某雲邊輓粟雪裏聞麻回思太學之十年甞侍司成之丈席今三賢方施政於天下必無不獲之夫縱四牡非有功之使臣願鑒懷歸之悃代賀鄭簽書昭先除參政兼太子賔客顯用正人進參大政試之宥宻巳折衝樽爼之間􅀝以弼諧必銷患廟堂之上一賢得路四海傾心恭惟某官清任以和直方而大陽休山立粹爲廊廟之珍地􅀒海涵凛有社稷之器來從百里甫閱七年徧儀清切之司弥積均弘之望果由樞筦遂賛機衡作天子之股肱兼儲皇之羽翼惟公懋德相我受民式􅀚鼎鼐之調益永旂常之載某属拘郡組莫旅賔綦千萬間之􅂬顔旣􅀷賀厦三十幅之共轂尤慶得輿賀俞樞宻應符兼參政鼎升兵本晉豫政機立武有常將見五原之欵塞用儒无敵更􅀚三后之恊心膺一時稠疊之榮契千載明良之㑹恭惟某官材冝王佐智可帝師自其不辤小官之時巳􅀒將降大任之器夙夜宥宻甫參帷幄之籌乾坤清夷益結冕旒之眷旣兼資於文武盍並注於安危爰命宗工式兼亞相上帝將復髙祖德坐令趙璧之還皇天旣付中國民豈但齊疆之復惟股肱之􅀉在忠力則道德之威成安彊􅀖其永孚于休公有無窮之聞某夙蒙揃拂竟自沈冥直柄當􅁠恐不吝曲成之陶冶近畿入幕固未爲逺去於門墻賀陳簽書貴􅁩除參政兼同知成都運司作升參六政復翊洪樞仲子之辤三公夫固輕千鍾之禄曲逆之出六計終當遂萬物之冝一賢得輿多士舉笏恭惟某官直方而大智勇且仁早収麟角之科夙􅀒鼇頭之望讀孔璋之檄嚴嚴經國之文卧元龍之樓耿耿濟時之略四國茂蕃宣之績六條髙澄按之功登山有得於徐行乗舟惟恐其偏重禁中頗牧鼔舞號令之風雷氊上唐虞緝熈光明之日月迄由翰􅁐進陟機庭尊爼折衝京􅀚正鯨鯢之戮郊圻申畫介胄無蟣蝨之生立武事以有常顯真儒之無敵今南北分庭和戰未一則東西二府謀慮冝同爰籍前疑後丞之功入攄經文緯武之智邇人安逺人至憂民正急於憂邊大臣法小臣廉正已不難於正物相尊等耳時來爲之無謂於我如浮雲當念迨天之未雨不遐有佐無競維人某學旣拙踈法當憔悴十暑自安於絺葛一寒誰與之綈􅂁昔周旋元方之間亦欲學屠龍之技今疲敝益州之役良難見流馬之功忻聞黄麻之六經合入繡衣之九罭燕雀賀夏捲簾必念其差池蟋蟀鳴秋瑾户願徐於穹窒賀宣參政繒申命真儒顓參大政公輔間于兩社德因服而益彰天子必有四鄰官惟人而後備制書誕布􅂬頌交馳恭惟某官忠結主知道先民覺泰山喬岳無運動之迹人蒙􅃳而不知祥風和氣以長養爲心物有生而自遂與其參夙夜宥宻之􅀉不􅀂䇿旦夕承弼之功臣哉孰重於鄰哉賢者固識其大者今海内之事􅀔􅀂火未然公主上之信臣知風之自夷情外狡民力中乾即戎七年而無休息之期拓地千里而無堅凝之術使能定未保其能應則所憂將重於所欣實頼同心同德之臣亟合羣䇿羣力之助収草茅之公議而用之􅀖國推槐􅁄之和氣而逹諸閻閭非常之功待非常之人無窮之基有無窮之聞某﨑嶇巢幕冒昧掃門山甫舉之莫助之故妄陳於千慮原憲貧也非病也詎敢兾於一陶樞宻代賀禮部曾尚書從龍除簽書兼太子賔客登延駿望翊賛鴻樞增寳鼎九九之安國由人重齊泰階兩兩之色魁與台連廊廟得賢華夷胥慶恭惟某官造道自得經德不回一舉首登固有榮進之素定孤忠自立冝卑英俊之並游眷旣厚於兩宫名益髙於九牧果登宥府仍冠儲寮時來則爲之佇正乆虛之宰席年不可及也諒多仰羡於端門民無不獲之夫公有無窮之聞某逖聞成命倍動􅌚顔孤鶩落霞正􅀼垂天之庇六鰲抃地莫殫賀厦之悰賀薛樞使極成都運司作顓席紫樞均茵黄閣仲虺居薛冝登左揆之虛臯陶謨虞還􅀝右平之重有常立武無競維人恭惟某官學可帝師材堪王佐智周萬物炳蓍􅀛先見之明節貫四時凛松栢後凋之操周旋三省兩省之椽練逹一日二日之機合文武以兼資佩安危而注意熈帝載宅百揆民具爾瞻掌􅀖政統六師軍則誰與式端兵本專領使􅁠匈奴欵塞五原固出干羽之舞子房决勝千里正湏帷幄之籌帝曰欽哉相尊等耳山有木而工則度姑遜滕侯之先封河如帶而國永存實自薛公之上計佇膺帝眷徑位宰衡某夙累一陶尚驅六轡輓武功原上之粟覺心瘵而形疲聞文德殿下之麻嘆形留而神往賀薛僉書極顯膺上第進貳洪樞道德之威成安強有常立武股肱之􅀉在忠力無競維人渙號再􅀭師虞允穆恭惟某官風猷膚敏宇量浚明才刃立解於千牛豈躊躇於肯綮意匠洗空於萬馬寧慘淡於斯湏輔造化而不言正朝廷於旣治星辰聽履乆勤朝夕之論思雨露賜􅂁遂參夙夜之宥宻漢用三傑運籌允藉於子房舜有四鄰舞羽實資於伯益遹􅀚偉績追配前聞某濫厠冗貟獲瞻盛事帝王之興建輔弼固知時亮於天工甲兵之問至廟堂更願勿窮於國力賀程同知卓登庸儒宗陪輔兵本綢繆牖户及國家間暇之時典領樞機基夙夜宥宻之命軍民心愜夷虜膽寒恭惟某官峻禀扶輿清儲沆瀣何蕃􅀄入於太學共知仁義之必流下惠不卑於小官豈以佚遺而或怨􅀭歷勞人之州縣從容範我之馳驅迨作牧於閩山寖簡知於魏闕紬書史􅀚昭回雲漢之章批敕􅃈闈鼔舞風雷之令迄由東省進貳西樞惟春秋九丗之讎固將酬於千古然乾坤一擲之舉不如出於萬全願思無競之維人益務有常而立武運幄幃而决勝千里正頼恊心亮天地而弼予一人即􅀚顓靣某隴西冷裔江右庸儒頃作􅒡氓正出藍田老槐之下茲爲幕客詎忘豐水有􅉮之仁所未知鼎鼐之新果猶念鑪錘之舊燕雀之賀大夏豈憂凌雨而震風烏鵲之遶何枝尚託稀星於明月賀俞僉書應符使北道而簡僚曽玷網羅之舊翊西樞而基命茲逢鼎鼐之新往年身未可以許人今日士固伸於知巳輙修燕雀賀夏之敬併吐蟋蟀唫秋之懷恭惟某官背負天風胷吞雲夢自其克勤小物於州縣巳具可以大受之規模二螭􅉾處之記言一麾乃出千􅀐上頭之賦政再命茲共回回紫槖之間諤諤青蒲之上露門晝講緝熈日月之光明􅃈闥夕趨鼔舞風雷之號令廷臣無出右者天子居然器之迄自東臺峻躋西府九天渙號簡二三執政之股肱兩地升賢繫億兆生靈之肝腦有常立武無競維人春秋九丗之讎固將必報匈奴百年之運未有不亡今犬羊交噬之巳深計蚌鷸相持之不乆下䇿莫危於浪戰上兵實貴於伐謀在帝王之萬舉萬全固求􅂄定然疆埸之一彼一此正欠堅凝幸而及間暇之時亟冝定修攘之計取亂侮亡兼弱也時則易然同寅恊恭和衷哉政將焉往洪鈞旣轉於一氣黄麻即似於六經伏念某拓落一官嶔﨑萬狀才固自知其無似命亦可歎其不猶瞻白日於舉頭遭海風而引去上青天而仰脇僒峽水之倒流甫欲釣錦江之魚乃忽􅀐將軍之馬二年劔外寸歩矛頭徒令蟣蝨介胄之生安得貂蟬兠鍪之出茲㱕身於司敗妄干禄於有司適值大君子之登庸不勝小丈夫之距躍士曰時哉相君實皆舉笏以相驩誰其識之有歐陽辱捲簾之有素願煩啄抱稍養翅翎樂莫樂兮相知更傍誰家之門户遲之遲而又乆正湏大匠之鑪錐梅亭先生四六標凖卷之十六梅亭先生四六標凖卷之十七中書賀太府余大卿鑄除中書舎人仍兼右司除户部侍郎兼知臨安成都運司作帝重詞臣公遷閣老裁縫雲霧便應拜斈士之眞鼔舞雷風更盡展舎人之様紫微炳煥黄道開明恭惟某官忠肅而惠和博習而脩㓗清姿秀骨下獨鶴於人間厚德長材載六鼇於海上心醉六經之醲郁目營四海之溺飢文人多不護文細行易虧於大德宰士固習爲宰逺圖或奪於近功惟公超然過人逺矣彌綸兩省標表九卿乆兼内史之賛書兹正中書之三字惟天子之義範曰制以聖人之情見乎辝扶山東之癃戀漢恩而忍死回河朔之悍存唐祚於幾亡一札可服於隗囂尺書足招於賛普不但取九制一揮之敏亦非專四駢六儷之工俾万姓咸曰大哉則一字不容易也衣冠盛事夙尊八葉之科翰墨大勳詎止五花之判旣敷華而緯國行迪哲以爽􅀖文章於道未爲尊風斯在下矣冨貴乃吾所自有時來則爲之某頃侍同朝且依鄰壁韓非老子又甞共傳公叔大夫詎望同升范叔一寒哀之命也不哀之命也杜陵十暑可以言歟未可以言歟聞耻納溝亦甞推轂上界足官府断不希雞犬之仙散人拜江湖願徑入魚蝦之侣賀黄秘監序除中書舎人代董制置中宸渙號内史升賢三神在海上之山乆勤攝領一佛出人間之丗遂見真除綸綍有光紳緌胥慶恭惟某官材猷膚碩斈術醇􅀷探周情孔思之微淵源千載發宋艶班香之祕膾炙四方親結龍扆之知聿新鳯閣之様辝逹而巳矣要必見聖人之情才難不其然蓋欲極天下之選得君爲重緯國暑可以言歟未可以言歟聞耻納溝亦甞推轂上界足官府断不希雞犬之仙散人拜江湖願徑入魚蝦之侣賀黄秘監序除中書舎人代董制置中宸渙號内史升賢三神在海上之山乆勤攝領一佛出人間之丗遂見真除綸綍有光紳緌胥慶恭惟某官材猷膚碩斈術醇􅀷探周情孔思之微淵源千載發宋艶班香之祕膾炙四方親結龍扆之知聿新鳯閣之様辝逹而巳矣要必見聖人之情才難不其然蓋欲極天下之選得君爲重緯國以文好對紫微草尺書而招賛普却登黄閣提一筆以福蒼生某聳聽除音阻陪賀履千門栁色誰怜芻狗之陳人万里草堂遥想槐龍之新影賀直院莊少卿夏除中書舎人優詔上卿正班内史北門視草謂當進斈士之班西掖拜真聊復示舎人之様斯文增氣有識傾心恭惟某官蓄斈醇明掞材鉅麗沈浸醲郁蓋下逮於莊騷雅徤雄􅀷無足多之崔蔡尽兼兩制巳四三年號令鼔舞風雷亦云多矣獻納司存雨露莫􅀂專之濃薰班馬之香髙振綺園之翼有偉用儒之效㑹當秉國之鈞某假守魚鳬阻陪燕雀碧梧幙府幸稍安雪外之城紅藥主人儻或念天涯之客史掖賀聶左史子䢍中宸渙號左侍升賢夾立螭頭均爲清切進􅂝龍角逾近凝嚴彰清朝選用之公示君子登庸之漸恭惟某官材全而業鉅斈廣而聞多秀出班行固巳芒寒而色正凜然氣節不爲義疚而利回五年省闥之弥綸万里户庭之清晏頼舎人之解事爲天子而記言績用孔殷序遷惟允楚左史之能讀八索蓋儲􅀝相之材唐中禁之用第一流亦爲議政之地佳傳相期於千載脩名剩跨於数公某逺落魚鳬阻陪燕雀甚愧丈人厚頃甞聞所聞而來屢爲丞相言是有得不得之命灔澦旣令其膽破岷峨亦使之眠髙望五雲多處之星早登魁輔倩万里橋邊之水聊送客心賀聶左史代董制置南衙渙號東史升賢雖君舉必書均號司存之切而王置諸左益知位置之親正人登崇善􅀋鼔舞恭惟某官負材有用蓄斈不貲徤歩豊扛連六鼇於海上清標秀質下獨鶴於雲間五年宻賛於宰司庶績自凝於道揆螭頭􅉾處乆稱解事之舎人龍尾道中遂進讀書之􅀝相柱下之光有耀甌中之姓可占某最辱挈提尤􅀷距躍歸心羽翼巳乆懷石澗之泉餘論齒牙更幸及玉関之老六部尚書賀章尚書申命秩宗正班宰伯春官六十立之長以維專曲禮三千待其人而後㪯有隆圖任茲遂真除恭惟某官重德鎮浮清規厲俗中流砥柱百壬夙避其鋒野水孤舟六丁莫措其手偉雲山之舒卷関天下之重輕迨茲攺絃復此持槖堅車大艎安徐而後進光風霽月逾乆而益明粤從貳卿實典三禮振自古寅清之職還斯民子諒之心不惟和上下而治神人蓋將經國家而定社稷兹引星辰而上益髙日月之依武德間有讜言忠無不報正觀􅀄踐台斗理有固然某阻作鳬趨但􅀷鼇抃小草有逺志懷哉並丗之醫和大夏無弃材盍以與聞於匠石賀任尚書希夷晉長冬官復兼夕闥國有六典孰如事典之優閑命出一人實預舎人之駁正况躋中庶尤簡上知恭惟某官胷湛秋霜筆翻春潦献納日月仁義陳於王前鼔舞風雷言語妙於天下乆典三禮旣諧兆民疇􅀂予工併任􅂗歸之責乃在吾禁就兼翼賛之華忠旣結於兩宫名益髙於九牧投珠委地必有清乎尚書之言批勑回天更觀儒者給事之效旣劑髙馮之藥石即羮􅀓􅀃之塩梅某聳聞除音喜至滿面君子得輿民所載也豈但収稽古之功衮職有闕我儀圖之知必稱納言之任􅀂方朔之餓欲死與杜陵之凍且僵不知命而且鳴且號亦無耻矣其㓗已之與進與退惟所命之賀陳尚書率除吏部尚書仍兼内翰司作成都運峻長六卿增崇八座惟王有成績紀于日月之常命汝作納言引此星辰之履仍専鼇禁増重雞翹恭惟某官學嚌道眞器函天粹絶識洗空於萬馬全材立解於千牛積江漢經營之勞有河山帶礪之烈允文允武立德立功還頗牧於禁中悍卒回心於讀詔講唐虞於氊上頑民聽命於舞干茲膺典選之升始是奮庸之漸文昌垂象寔爲上將上相之躔武帳前􅀛行有爲保爲師之命暫煩長文制九品之任行見曲逆遂萬物之冝某未解漕冰正馳驛路聞尚書之踐台斗或垂念於孤槎聽散人之拜江湖早㱕身於三徑侍郎賀鍾侍郎震除侍左侍郎兼中書及侍講大君渙號小宰升賢三銓審官尤重左曹之衡尺一佛出丗仍兼右掖之絲綸碧落彌髙紫微增煥恭惟某官目營四海胷著千年關百聖於寸心不夷不惠而願孔子之斈掃千軍於獨筆非韓非孟而成歐陽之文雲雷十載之經綸江漢六年之方泳怒鵬旣擊凡馬皆空蛻骨地仙直上蓬萊瀛洲之島彯纓天䇿徧儀承明金馬之庭堯醲舜醺最冝爲誥班香宋艶安敢比材非道不陳於前在庭無出其右日獻月納亦有嘉謀年除嵗遷士無異論四輔旣備命史佚以記言五禮有庸咨伯夷而降典露門重席星户鳴珂緝熈有頼於仔肩左右冝咨於汝翼掌六典之貳更追裴馬之蹤遂万物之宜即接䕫龍之武某夙蒙推挽竟自顛隮今墮孤雲落照之邊誰復髙山流水之賞江梅尚難於􅀉驛海棕詎易以移栽然蓬娑雪邊十暑碎杜陵之葛在玉堂天上一寒望范叔之􅂁賀江陵趙制置方除工部侍郎優詔元戎升卿起部司空用以寵舊荆之牧未曰殊恩貴人不待入長安之城亶爲異數中權増壯上眷彌􅀷恭惟某官氣直而温材弘以毅禀衡山扶輿之積人知鍾駿嶽之神師葵軒正大之傳天使壽熊湘之斈聞善􅀂决疾惡如風粤從使指之膚出領制垣之重姦貪膽落洗空當道之豺狼夷虜心寒驚遁繞枝之烏鵲寛九重顧旣四三年江左見導無憂固將大用北門非準不可未免小留惟無敵知儒者之真况有功見賢人之乆徒得君重使􅀂予工豹尾鷄翹獻納上司於雨露熊旂犀節嘽啍外震於雷霆營壘旗幟􅀄無所更朝野人士皆爲之慶洞庭彭蠡可但爲分北之區廣漢江沱盖亦繫二南之化况占雲祲當護風寒􅀼窺往年根本冝固之言及讀近日事業無窮之奏万國玉帛豈甘安王業之偏百年丘墟亦貴度時賢之力願謹郊圻之申畫姑思牖户之綢繆中興當用實材更訪英豪於物外上䇿莫如自治合啇得失於禇中與民守之吾庸多矣朝廷已􅀷知治行豈但儀簮槖之班牙纛不足爲公榮要當勉旂常之績某雖無學術知有忠賢頃捧辟書輙千賔謁不縁介紹蒙稱人品之髙尋困憂恫又爲地主之累今者尋磨驢之歩復茲修賀燕之恭登楼而憶仲宣豈但感凋零之迹下堂而執鬷蔑或許傾結約之心賀趙制置彦呐除兵部侍郎顯冊宗藩升卿武部司馬掌九伐之法外益重於中權元戎先十乗之行逺式遄於近列傳聞四海忻懌一詞恭惟某官迪德碩膚􅀒材瓌特献宗英之禮樂卓爾不羣謀元帥於詩書飄然無敵文武作萬􅀖之憲精神折千里之衝三百㕓􅀆􅀼􅀏無功之禄利十八年矣備甞在外之艱難自殄鯨鯢之妖滋奪犬羊之氣兹膺天寵迄拜夏卿奬三軍以定中原聿觀偉績間兩社而輔公室佇接前芳某治任方歸聞報失喜知有功之則恱見無德之不酬錦城雖樂不如早還益增西望繡裳無所於汝信處更佇東歸賀朱倉在除度支任两浙運幹作勞使臣之還而歌四牡知入重於郎垣旅天子之命而作嘉禾又暫留於輔邸蕞爾幕下之士託於畿内之侯敬德巳深修辝敢後恭惟某官政由斈出心以家傳昔者周公固望伯禽之拜後趨亦夫子誰知孔鯉之異聞雖剛大之氣浩然而中庸之德至矣揭節以出送以禮樂而有光當官而行編之詩書而無愧兹拜握蘭之召又爲􅀐竹而留歛惠而施一州寕容黔突輯瑞而班羣后即聽紫泥某偶爾依蓮正兹索米囊粟二百之俸實隸治封遣介咫尺之書敢修庸敬代回宫使待制史侍郎弥堅貳訓夏之刑巳慙弗績攝司冬之典尤愧誤恩曽巽謝之未遑遽謙光之先辱恭惟某官乆勞于外式遄其㱕大纛髙牙茂展幹方之略珍臺間舘暫從均佚之謀輟湘水之曉行趣宣室之夜對有勤餘芘亦及陳人某視蔭幾何強顔巳甚司納言之喉舌轉覺濫竽借餘論於齒牙早期納履樞属代胡尚書回趙編修二日栗烈寒但感於寘氷五雲郁紛文乃工於翻水物將其意愧在於肝恭惟某官有偉宗英入陪廟筭駕輕就熟問津槐􅁄之榮嘘枯吹生假寵桑蓬之賤粲然駢儷幸此衰遲郭令二十四考之書此言何爲至我魯侯萬有千􅀊之頌所有更以贈君臺諌賀洪郎中咨夔除察院成都運司作親擢郎潜進司臺察十年去國安泉石之膏肓一札起家任朝廷之耳目公無欣戚􅀖有榮懷恭惟某官行守宫庭道探壼奥養以剛大獨扛百斛之龍文岀其緒餘連中八科之麟角惟其守專而退勇是以任重而進難社下之肉旣均尋拜護軍之曲逆治中之足未展頋令乗障於隂平儀粉省以歸班封皂囊而論事回天有力方將批徑尺之鱗偃月生疑巳不容立仗之馬曽謂考功一岀息之頃遂見拾遺九鑚火之明星旣坼於中台席遂前於半夜甫登表著徑拜裏行獬豸觸邪難置豺狼而不問鷹隼始擊尤関龍象之共觀聳聞破頭已足落膽刋九山滌九川陂九澤通地氣以上騰闢四門明四目逹四聦發天光而下濟此真御史矣豈憂匈奴哉鑄金鼎以圗姦不難調鼎察玉衡而齊政然後保衡某一寒漕氷六暑戍雪將返閭閻而曝日喜聞臺閣之生風鵰鶚之在秋天儻或寛於西擊烏鵲之遶夜月願姑聽其南飛賀王寺簿遂除察院峻擢容臺進司紏院明天子厲精之日争覩親除真御史遴選其人迄符衆望風雲感㑹山嶽動摇恭惟某官心幹九秋文熖万丈摘髭名第不應州縣之徒勞䇿足要津共擬公侯之必復堅車大艦每難於進光風霽月旣乆則明上欲求忠臣之尊念無易太常之肅嚴霜烈日姑令鑄金鼎以察姦縫霧裁雲行即登玉堂而草制某乆違楓陛聞進藎臣行行且止而避騘莫陪旅賀皇皇者華之維駱願以汰歸賀董司諫居􅁩進思􅀘闕仍侍迩英責重􅀉隆益可告嘉猷于后謀從言聽轉當下膏澤於民朝野喧然宗社幸甚恭惟某官所養剛大而道中庸人方此重而彼輕公獨以退而爲進廷臣無岀右者天子居然器之拔自州麾徧儀朝著亟拜拾遺之命仍陪􅂆誦之聮緝日月之光良多啓沃犯雷霆之怒大有激揚不賣直以取名惟格王而正事簡在中扆遂升左垣考司諌七品官之階雖云序進然大人一正君之事正属司存今目前無必至之憂而天下有未形之患戎心外狡民力中乾天文変恠而難諶人才卑少而不競民保於信而信屢爽位守以仁而仁不流吏惰且貪兵虚仍脆無非事者請先大者之圖彼何人斯尤願辨之之早自古建乆安之􅀔成長治之業莫􅀂杜羣枉之路開衆正之門國人曰賢左右皆曰賢無使滯淹之乆君心以正逺近一以正切防浸􅃳之行閫内閫外不容二心宫中府中當爲一躰舎豺問貍則民不服如鷹逐雀則君自尊察􅁵婦之私憂回倉公於驚走庶淮南知憚於汲黯而昌􅀺無惑於陽城名節皎然芬芳多矣冨貴乃吾所有何足計哉忠良得路之難切冝念此某當献嘉頌頋進苦辝蓋有感平日之知不敢作細人之愛諸公不喜生語柔則茹之善人能受尽言遐不謂矣尚欲作石守道紀德之頌幸勿還李師中落韻之詩代回􅀓大諫伯成自天分閫易地殿藩南内思賢巳使候西廂之對東甌報政又當綰北固之符恭惟某官王之藎臣􅀖之司直觀其動摇於山嶽安問狐貍使之感㑹乎風雲蔚如虎鳯汲黯願居於禁闥望之頋出於平原一言寕急於封侯萬物盍令其吐氣兹驅大纛又卧長江邊秋一鴈聲幸􅀐烽之灌燧人生五馬貴羡燕寢之凝香某自愧秋零阻陪夏賀仁義與王言者寧千里而莫追邂逅適我願􅀆或一見而後去梅亭先生四六標凖卷之十七梅亭先生四六標凖卷之十八
