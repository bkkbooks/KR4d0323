  - {type: variant, offset: 3, length: 1, content: 準, SBCK: 凖}
  - {type: substitution, offset: 4, original: 巻, replacement: 卷, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3741}}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 之四梅亭先生四}
  - {type: page-break, offset: 5, content: '', id: KR4d0323_SBCK_004-15a}
  - {type: page-break, offset: 5, content: '', id: KR4d0323_SBCK_005-1a}
  - {type: indent, offset: 6, content: 　　　　　, id: KR4d0323_krp_006-bkkind2}
  - {type: variant, offset: 6, length: 1, content: 宋, SBCK: 標凖卷之五謝到任帥到任謝任參政代鄒給事輿轎隃嶺方營三徑之謀鼔枻浮湘又玷十連之􅀉在相國知之至矣殆郷人善者好之昉涖事之云􅀄豈修辭其敢後恭惟某官人今而心古氣勁而貌和學問淵源得尊主庇民之道緒餘土苴爲開物成務之才自翊輔於天樞迄規恢於土宇晉參大政益播壯猷天將降任是人庸釋髙文之􅀫憤予惟克邁乃訓共􅀚周召之同心某分閫罔功歸田巳幸敢意躋班於延閣更令承惠於价藩惟是淸淑扶輿之區尚多愁恨嘆息之俗䑕窮巳甚蚊􅀒奚堪必先逹之士爲之前焉旣感裏言之賜有剌史之榮無其難者尚祈終惠之私師到任謝鄭參政代鄒給事籲天還印甫辭五嶺之炎昜地剖符遽得三湘之勝將母固諧於安便拊躬但愧於叨逾冒再僂而弗俞知一陶之有自恭惟某官才弘而毅器􅀶以周鬷假無言賛一日萬機之運柔嘉維則聳六服羣辟之瞻人固料代何之用參上亦知安劉之必勃兩地碧雲之暫駐旣厚仔肩九天黄道之安行亟膺顓靣某守藩弗績席䕃終更所願歸田徑返林烏之哺敢期易鎮竟爲檣燕之留惟一重一掩號淳古之江山而九辨九歌餘芬香之草木豈小材之能任由大造之曲成謂國小不足回旋此豈爲我輩而設使政平而無愁嘆庶不爲門下之羞太守到任謝丞相􅁠武岡軍􅀼以邊郡􅀒丞愧何功於渉筆中朝攺牧命以次而設麾雖時暫以從權亦日虞於非據重感大造陶鎔之賜敢廢小吏竿牘之恭伏念某全抱迂踈倍勤抆拭廣文轗軻旣保全茅屋之歸半剌翺翔又减縮葵丘之代無蟹昜嫌於監郡不􅀛敢望於封侯方圖下考之書恪布中㳙之謝日君乏使故侯􅄃轡以疾驅夜枕不安新尹懷章而未上勤廟堂之軫念慮獄市之擾姦姑令副貳之車且護方寸之印鶉􅀆胡瞻於不獵馬也詎可以守閭正使五日京兆之間亦有千里宅生之􅀉科􅃈邊吏非􅂪真漢相之知申畫郊圻安得假齊王之命兹者伏遇某官得聖之任爲帝者師萬億年敬天之休豈止書郭中令之考五百􅀊名丗者出蓋欲傳孟軻氏之宗更新紹定之􅀄元遴選神爵之良吏謂友􅀖必立之亞旅正欲充虚幸督郵未逐於聾丞不妨借聽雖小人乗器終於必奪然大鈞播物允矣無垠某敢不三思而行一日必葺雖慙尸祝越尊爼而代庖人之勞當籍吏民封府庫以待將軍之至榮州到任謝丞相佐黔巫之東鄙甘半剌之翶翔守巴􅈎之南榮累一陶之坯冶幕府十年之未乆角巾兩火之可逃間􅀜半朞辛苦萬狀甫兹領事率爾裁牋伏念某才不瘉人學徒泥古招諸生於館下幾毀于隨處別駕之治中無材可展姑俟及􅀲之代式遄行}
