  - {type: variant, offset: 9, length: 0, content: '', SBCK: 膺之模楷誤辱肯臨範王良之馳驅當圖請益回李叔璋伏蒙衘袖寵賁駢珠知爲河北之相家且接江西之宗􅂀欣逢若士何啻似人惟是過情之褒殆非望賜之意它人不如同姓願聞㧞薤之規終日雖則七襄莫稱投桃之報回合同王將仕兹蒙寵頋見􅂌雄文竊窺四六之工良重再三之感恭惟某官人門具美地位夙髙淹回筦􅅦之卑培益事功之㑹某過勤奬予彌切兢慙徒勞篋笥之藏莫效䄡䄖之報回王進士伏蒙紆頋寵賁長書味藹如仁義之言知賢者深逺之慮􅀫蠧正難於驟革頽瀾未易以亟回苟有祝規更希忠告區區􅂨曲續續面敶回黄將仕伏蒙下頋損賁長篇知宗􅂀之由來信家風之不墜見似人而喜真足慰蓬藋之逃和此君之題㑹更洗筝琶之俗回王進士兹佩髙情見貽佳句歌剌史之頌愧非西京二千石之良繫諸侯之風乃合召南十四篇之數報於何有藏以爲榮回楊貢士伏以樂正論士而升之未皇請益公等何見之晚也忽辱鳴謙非所宜蒙願竊有復恭惟某官詞章炳蔚器度端温得意狗監之官肯輕進取子雲羽獵之賦行有吹噓試觀屬辭比事之文足見發䇿决科之學某濫分守印獲託士鄉非浮橋之魚廹斯可以見矣哀涸轍之鮒忠焉能勿誨乎回蘇祕校材吳蜀萬里夙知益者之多聞蘇李五言良愧倡焉而寡和近古之三信在得名之雙謂何地下日月光應察驥箱之服江空歳年晚誰爲馬口之衘回史機冝大異一門三秀未見長公之波濤七言五章始窺㓜婦之機杼喜故人之有子爲老成以賦詩但深巾衍之藏莫效瓊瑶之報回程祕校以南辨蘆菔之獄夙知纉隂騭之功謁薤本之規未及望陽休之色有勤枉駕更賁屬辭伏惟某人德􅁉乃身世済其美待時藏器冠蜀都沈冥之珍它日趨庭寔漢朝方正之學若爲公等之見晩真覺我輩之厚顔某未皇欵門先辱傾蓋自衛尉將軍之􅀫契是可通家藉翰林墨客以報章别圖問政回見任官袖賀承流支郡曾微牧御之方出節本朝誤被將輸之命已伸免牘亟奉俞音敢圖衘袖之書特枉編鍾之奏恭惟某官風猷俊茂天韻碩膚齒牙秋露之甘手筆春雲之藹嘘物以氣可回燕谷之温贈人以言何翅楚珩之重遂令載馳載驅之任猥及不狩不獵之夫某畏此簡書蕭然疲役某水某丘某樹願歸遂於釣遊我任我輦我車希别謀於咨度回史祕校公誨獻䇿迷日五色智良愧於失人置水一盂惠足占於好我屬辭爲教陳􅁩益髙恭惟某人直哉史魚飄然司馬遐想六王畢之作必無萬物茁之疑大樂正詔王升諸冝登春講諸弟子隨臣乆矣竟坐冬烘敢謂愛忘不加督過有來論事益見憂時言言非無益之談鑿鑿皆可行之䇿顧恨挈瓶之守不敢越畔而思前茅中權今皆鄉人之善者積薪上寢自可纓冠而救之幸疾其驅且忠以告某一麾乃出再皷而衰磨牙殺人未覺早還家之非計泣涕陳䇿何待夜前席而後言回楊普州伯雨袖詩啓千古在前萬古後僕安知栗陸之書六字常語一字難公真得栢梁之體所慙佳句適重愧情恭惟某官氣抗岷峨文濯江漢子雲河東之賦天自吹噓伯起􅀜西之聲家傳清白所居民冨而畏人知行登鵷鷺之班安用蚍蜉之援金鑾論事之語何至我哉鈞天無人之悲今召君矣回趙進士大正伏辱郇公之翰知爲韓國之家社稷丗臣自合襲山河之爵箕裘夙學亦應簉俊造之班兹窺筆下之雲煙可見胷中之湖海願安承教不成報章梅亭先生四六標凖卷之十二梅亭先生四六標凖卷之十三科舉􅀘中附謝及第在後謝得解丁夘仰破屋而抱遺經嘖㑹心之無幾裹麄繒而隨舉子嘻免俗之未能解后吾味之偶同摸索此君之小異欲棄雞肋復美羊腔人驚喝盧得雉之危我抱志目中眉之愧甞謂選舉所以籠豪傑安知亦足銷豪傑之心塲屋謂之興賢能或者疑爲老賢能之術士任重而道逺辰去速而來遟鄧髙宻願效尺寸之心笑人寂寂禇彦回少過三十之念使已囂囂蓋欲乗感㑹之風雲豈堪送瀟洒之日月如某至愚不肖甚賤且貧每懐萬物皆塵土之思頗念吾道非曠野之物年當五嵗日記萬言實希蹤楊文公之辭章復妄意晏元獻之科目莫能送上安得􅀬中付甲子於泥塗逐庚癸之飢渇君門不可以徑入法當從試於有司夜光屢失之暗投或是晚成之大器雖杜陵許身稷契之意誰肯信之然草廬自比管樂之心恐不免爾吟髙軒過羅胷謾詫於星芒􅀃古戰場過眼還迷於日色五隨秋試例困冬烘翦翎觀百鳥之翔回首覺萬牛之重無能辨璞只合更刀脱漢賦辭楚騷雖依依而未忍觀魯史知周典幸歷歷之可明技癢爲之途窮甚矣求田問舎已破除湖海之豪應舉覔官又勒回山林之駕或謂餘勇猶足先登及工歌鹿鳴之三乃夢踐飛翼之八芳杜厚顔薜荔蒙耻願一洗之菉葹盈室荃蕙爲茅由來乆矣要之借汝腹中過耳又何山人跨下慙乎鵬怒而飛鷙匿則擊是亦細事無足多言唯是吾皇頒詔舉賢之時實以今日多事得人爲急裴晉公之解韋釋布正淮西盗起之時韓魏公之發䇿决科乃天聖日升之始有益於國無競維人感人物之􅆌然嘆江濤之如此四郊多壘士之耻也萬里長城國有人乎冝㧞實才入充嵗貢不應庸下亦在選中伏遇某官持刑明允已清碧草之扉畫諾從容復入紅蓮之幕兹獲聮於薦送何謬及於單微云云某敢不髙束三傳精研一經思游夏不能措之辭條舒蕡所未陳之䇿謹按直筆猶足誅未死之姦䛕稍遂初心誓不忘平生之温飽縣補魁中謝縣令聖經賢傳指未究於數千遂序黨庠首辱推於第一其細已甚不足乎揚然累土乃九層之階故積律自一黍而起况是萬家之縣利用百篇之書由鄉校以發聲粲仕途之接武至如直筆見謂􅀌經前軰罕用此以下帷後學遂束之於髙閣豈知數百世盛衰之監具在萬八千褒貶之言孫弘慙而謝鄉人丈夫淺矣仲舒褎然爲舉首吾道非耶某甲志無竒丁年逾邁無端讀書已墮左計登髙能賦更負悔心手縱敏於八义眼易迷於五色造化無功於筆補瑕玼皆得而毛吹用是息黥倦於取刖蠧書叢只麟史在焉遂偷白日之閑竊考素王之㫖筆則筆削則削頗知齊晉正譎之情信傳信疑傳疑仍見公榖婉裁之趣亦創通於大義豈盡逹於微言長恐􅀞虎之不成必至屠龍之無用自惟鑄錯孰與訂頑属聞君子之弦歌將興春誦咸謂有司之衡鑑莫遯秋毫聊爾逢場豈其定覇萋菲具錦果聞其後播揚糠粃不意在前謂我不堪於公何有伏遇某官以魯禽父作楚縣公妙割無雞牛民自得於桁楊之外空弦落狐兎士亦慙於檟楚之威有懐桑椹之好音還舉􅁄闈之故事且從隗始以善鄭來某敢狃近功遂忘逺業玉川破屋而巳矣當益抱於遺經武城得人焉耳乎請僣陳於故事西府先生之在吾泮賸有菁莪東閤郎君之稱其家可無桃李胡不招諸生而立館下從而養弟子以敎國中盡拔十得五之功必有濟以上酬以一當千之夢寜謂秦無人謝成都解頭}
