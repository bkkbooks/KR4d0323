  - {type: variant, offset: 1, length: 0, content: '', SBCK: 哉相尊等耳山有木而工則度姑遜滕侯之先封河如帶而國永存實自薛公之上計佇膺帝眷徑位宰衡某夙累一陶尚驅六轡輓武功原上之粟覺心瘵而形疲聞文德殿下之麻嘆形留而神往賀薛僉書極顯膺上第進貳洪樞道德之威成安強有常立武股肱之􅀉在忠力無競維人渙號再􅀭師虞允穆恭惟某官風猷膚敏宇量浚明才刃立解於千牛豈躊躇於肯綮意匠洗空於萬馬寧慘淡於斯湏輔造化而不言正朝廷於旣治星辰聽履乆勤朝夕之論思雨露賜􅂁遂參夙夜之宥宻漢用三傑運籌允藉於子房舜有四鄰舞羽實資於伯益遹􅀚偉績追配前聞某濫厠冗貟獲瞻盛事帝王之興建輔弼固知時亮於天工甲兵之問至廟堂更願勿窮於國力賀程同知卓登庸儒宗陪輔兵本綢繆牖户及國家間暇之時典領樞機基夙夜宥宻之命軍民心愜夷虜膽寒恭惟某官峻禀扶輿清儲沆瀣何蕃􅀄入於太學共知仁義之必流下惠不卑於小官豈以佚遺而或怨􅀭歷勞人之州縣從容範我之馳驅迨作牧於閩山寖簡知於魏闕紬書史􅀚昭回雲漢之章批敕􅃈闈鼔舞風雷之令迄由東省進貳西樞惟春秋九丗之讎固將酬於千古然乾坤一擲之舉不如出於萬全願思無競之維人益務有常而立武運幄幃而决勝千里正頼恊心亮天地而弼予一人即􅀚顓靣某隴西冷裔江右庸儒頃作􅒡氓正出藍田老槐之下茲爲幕客詎忘豐水有􅉮之仁所未知鼎鼐之新果猶念鑪錘之舊燕雀之賀大夏豈憂凌雨而震風烏鵲之遶何枝尚託稀星於明月賀俞僉書應符使北道而簡僚曽玷網羅之舊翊西樞而基命茲逢鼎鼐之新往年身未可以許人今日士固伸於知巳輙修燕雀賀夏之敬併吐蟋蟀唫秋之懷恭惟某官背負天風胷吞雲夢自其克勤小物於州縣巳具可以大受之規模二螭􅉾處之記言一麾乃出千􅀐上頭之賦政再命茲共回回紫槖之間諤諤青蒲之上露門晝講緝熈日月之光明􅃈闥夕趨鼔舞風雷之號令廷臣無出右者天子居然器之迄自東臺峻躋西府九天渙號簡二三執政之股肱兩地升賢繫億兆生靈之肝腦有常立武無競維人春秋九丗之讎固將必報匈奴百年之運未有不亡今犬羊交噬之巳深計蚌鷸相持之不乆下䇿莫危於浪戰上兵實貴於伐謀在帝王之萬舉萬全固求􅂄}
