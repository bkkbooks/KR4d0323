  - {type: variant, offset: 14449, length: 295, content: 古今詩話唐韋肇及第偶於慈恩寺鴈塔題名後人效之遂成故事宋張茂中游城南記慈恩寺夲隋無漏寺唐永徽三年沙門𤣥装起塔初惟五塔磚表上心效西域窣堵波即袁宏漢記所謂浮屠祠也長安中摧倒天后及王公施錢重加營建至十層其云鴈塔者天竺記逹親國有伽葉佛伽藍穿石山作塔五層最下一層作鴈形謂之鴈塔嘉話録謂張莒及進士第閒行慈恩寺因書同年姓名于塔壁後以為故事按唐登科記有張台無張莒台于大中十三年崔鉶下及第馮氏引之以為自台始若以為張莒則台詩亦有題名之説矣塔自兵火之後止存七層長興中西京留守安重霸再修之判官王仁裕為記長安士庶毎嵗春時遊者相屬熈寧中失火經宵塗圬皆剝而磚始露唐人墨蹟于是畢見今孟郊舒元輿軰尚存其無聞後世者不可勝數互見前, SBCK: ''}
