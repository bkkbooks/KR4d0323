  - {type: variant, offset: 0, length: 8624, content: 欽定四庫全書四六標準巻十宋李劉撰進職賀董侍郎居誼進職雜學除學士制垣進秩職源翰林學士與中書舍人分為兩制權徳輿集左右掖垣承天子誥命寳閣升班宋㑹要龍圗閣宋大中祥符中建在㑹慶殿西偏以奉太宗御書御製文集及典籍圖書寶瑞之物東坡集中禁寶儲學士班在樞宻直學士之下大中祥符六年詔結銜在本官之上諭蜀良勞勉狥假留之願司馬相如傳諭告巴蜀民以非上意冦恂傳百姓遮道曰願從陛下復借冦君一年乃留恂長社鎮撫吏人登瀛固寵况加真拜之榮宋史職官志仕人以登臺閣升禁從為顯官而不以官之遲速為榮滯以差遣要劇為貴途而不以階勲爵邑有無為輕重時人語曰寜登瀛不為卿寜抱槧不為監翰苑新書李昉入直翰林盧多遜已任學士太祖見昉在多遜下問其故宰相曰昉以本官直學士院未即真拜真拜學士在多遜之上綸綍載揚紳緌交慶見前恭惟某官清如秋刷爾雅釋詁挋拭刷清也周禮淩人職夏頒氷掌事秋刷注刷清也先鄭云刷除氷室當更納新氷後鄭云秋凉氷不用可以清除其室和若春陽雲夢胸寛吞一百八盤而無險司馬相如傳吞若雲夢者八九其於胸中曽不蔕芥陸務觀入蜀記南陵山極高大有路如綫盤屈至絶頂謂之一百八盤葢施州正路山谷詩浮雲一百八盤縈落日四十八渡明又云一百八盤擕手上又云一百八盤天上路又云蛇退猿啼百八盤即此謂也一百八盤自荆州上峽入黔中路名山谷書萍鄊縣㕔云略江陵上䕫峽過一百八盤渉四十八渡天風背厚獨負三十六郡而有餘莊子風之積也不厚則其負大翼也無力故九萬里則風斯在下矣而後乃今培風背負青天而莫之夭閼者而後乃今將圖南三年有成萬物吐氣杜少陵舂陵行序今盗賊未息知民疾苦得結軰十數公落落然參錯天下為方伯萬物吐氣天下少安可待矣不見賈誼固深半夜之思賈誼傳文帝思誼徵之至入見至夜半文帝前席既罷曰吾乆不見賈生自以為過之今不及也願借冦君難抑庶民之請見上文仍魚鳬之開國見前峻龍馬之負圗曲阜集河圖寵名増峻班列一札細行增井鉞參旗之重後漢書一札十行細書成文天官書東井為水事其西曲星曰鉞晉天文志列鉞一星附井之前主伺滛奢而斬之故不欲其明明與井齊則用鉞于大臣參旗九星在參西晉書輿服志參旗分景帝車含曜蘇易簡擬宋玉大言賦日烏月兎曜文明也參旗井鉞嚴武偹也詳見賀綿州高知府赴召條三謨大訓貫奎文壁府之華尚書有二典三謨又赤刀大訓孝經援神契奎主文章注奎星屈曲相鉤似文章之畫晉天文志東壁二星主文章天下圖書之秘府也明則圖書集道術行歡動南衙唐制天子居曰衙行曰駕一曰行軍有衙尊者所在後人因以治為衙宇文士及傳南衙諸臣靣折廷爭李揆傳本朝置南比衙文武區别高元裕傳西頭勢乃重南衙樞宻之權過宰相膽寒西賊宋名臣傳范文正公與韓魏公協謀必欲收復靈夏横山之地邉上謡曰軍中有一韓西賊聞之心骨寒軍中有一范西賊聞之驚破膽學士象八節不過一嵗之少留新唐書百官志分注景龍二年置𢎞文館大學士四人以象四時學士八人以象八節直學士十二人以象十二時又翰林學士一嵗則遷刺史入三公便在五雲之多處後漢書尚書令僕出為郡守郡守入為三公杜詩南極一星朝北斗五雲多處是三台何限麒麟之畫漢宫殿䟽天禄麒麟閣蕭何造以藏秘書畫賢臣蘇武傳宣帝甘露三年二月單于始入朝上思股肱之羙乃畫霍光等至蘇武凡十一人於麒麟閣明著中興輔佐列於方叔召虎仲山甫焉滿期龜鶴之還某何足控搏並見前洊蒙料理南史陳帝紀論黄塵汚人衣皂莢相料理王徽之傳為桓冲騎兵參軍冲謂徽之曰卿在府日乆比當相料理白水魚竿之入幕竟作退飛杜詩白水魚竿客清秋鶴髪翁胡為來幕下秪合在舟中左傳六鷁退飛過宋都青天鳥道之撫膺又勤羅致李詩蜀道難難於上青天西當太白有鳥道可以横絶峩眉巔捫參歴井仰脅息以手撫膺坐長歎韓文以禮為羅羅而致之幕下與其徒索長安之米見前不如來賦灧澦之堆李詩瞿塘灔澦堆東坡作灔澦堆賦云世以瞿塘灔澦堆為天下之至險以余觀之葢有功于斯人者因為之賦以待好事者試觀而思之直為文翁再剖符兆足行矣杜詩得歸茅屋赴成都直為文翁再剖符安得仙人九節杖亟往從之真誥楊義夢蓬萊仙翁柱赤九節杖而視白龍杜詩安得仙人九節杖柱到玉女洗頭盆賀陳提刑天宜進職懋賞外臺尚書功懋懋賞謝夷吾傳尋功簡能為外臺之表晉書刺史國之外臺升班中秘見前激西江之水已驗澄清莊子我將南游吳越之王激西江之水而迎子貫東壁之星有光臨照石氏星經東壁之星主文籍恭惟某官載揚淑問詩淑問在臯陶在泮獻囚淑問善問獄誕受嘉師尚書受王嘉師方當攬轡之初見前適有跳梁之冦蕭朢之傳小夷跳梁於山谷間梁絶水取魚者無煩芟薙薙音豸廣韻芟草也韓文乃草薙而禽獮之竟折萌芽李尋傳防絶萌芽以盪滌濁穢東坡冨鄭公神道碑維彼北戎謂帝我驕帝聞其言折其萌芽為赤子為龍蛇各安汝迹韓文以武則忿以憾以㤙則横而肆一以為赤子一以為龍蛇不鯨鯢不虺蜴時乃之功栁文小不為虺蜮大不為鯨鯢恩重事持不邇而逺莫可追已簡于楓陛之知説文觧字云楓木厚葉弱枝漢宫殿中多植之景福殿賦芸若充庭槐楓被宸陛音婢華以蓬山之直華嶠後漢書學者稱東觀為老氏藏室道家蓬萊山直秘書省雲烟縹緲暫煩俯章貢之流緲㣲也海賦神仙縹緲飱玉清杜詩築居仙縹緲章貢二水合為贛水東坡詩風酣章貢秋朝夕論思行即遂承明之謁兩都賦朝夕論思日月獻納嚴助傳君厭承明之廬注翰林有承明金鑾在石渠門外選詩謁帝承明廬某竊聞成命輒布賀緘何敬非刑諒益謹五辭之聽尚書何敬非刑何度非及又兩造具偹師聽五辭有功則悦行將勞四牡之征詩序四壮勞使臣之來也有功而見知則悦矣代回趙茶馬彦綰謝進職寳儲進直東坡謝除龍圖閣學士表中禁寶儲上應奎壁之象先朝謨訓逺同河洛之符趙葢以龍圖閣學士提舉川司茶馬璽命諭留經河緯洛之文章官由人重易繫辭河出圖洛出書聖人則之言進直龍圖閣控蜀通秦之𣙜牧功以久成山谷詩玉鈐金印臨参井控蜀通秦四十州𣙜謂茶牧謂馬宋制秦馬舊二萬疋乾道秦川買馬之額嵗為萬有一千九百匹有竒川司六千秦司五千九百成都利州路十一州産茶二千一百二萬斤其後文州改𨽻秦司而川司增珍州之額共為四千八百九十六秦司六千一百二十合兩司為萬有一千十有六疋所謂控蜀通秦之𣙜牧也更何為哉其有試矣恭惟某官天潢擢秀史記天官書王良旁有五星絶漢曰天潢元命包曰潢主河渠所以度神通八方宋均云天潢天津也津湊也主計度也崔廓答豫章王啟禀秀天潢承輝日觀吕安書植根芳苑擢秀清流奕葉飛英禮樂逺而光華遄車言邁並見前忠信行扵蠻貊思馬斯臧詩駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黄以車彭彭思無疆思馬斯臧正義云僖公思遵伯禽之法反復思之無有竟已至于馬亦令使至此善兹膺因任之榮宋制進秩還任者謂之因任平齋集鞏嶸擢都大坑冶鑄錢司職事修舉直秘閣因其任凡十餘年曠典也仍拜加恩之寵嵗九遷其自此見前晝三接其必然易晝日三接某越在師屯漢律勒兵而守曰屯例蒙巽謝翦白鹿坡前之草中夜枕戈白鹿山在今成都府彭縣四北二十里舊有金覺禅寺相傳晉佛圖澄所建劉琨傳琨與范陽祖逖為友聞逖被用與親故書曰吾枕戈待旦志梟逆虜常恐祖生先吾著鞭其意氣相期如此對碧鷄坊裏之花何時樽酒碧鷄坊在成都杜詩時出碧鷄坊西郊近草堂市橋官栁細江路野梅香東坡詩時夢碧鷄坊杜詩何時一樽酒重與共論文轉官代董侍郎轉官謝三府守關山之戍愧乏殊勲梁簡文詩關山逺可度逺度復難思王訓詩驅車度關山關山恒晻靄陳陸瓊詩邉城與明月俱在關山頭徐陵詩關山三五月客子憶秦川阮卓詩關山陵漢開霜月正徘徊北周王褎詩關山夜月明秋色照孤城唐崔融詩萬里照關山蒼茫非一狀沈佺期詩暈落關山迥光含霜霰㣲杜詩關山空月寒又關山同一照孟郊詩行當獻天子然後致殊勲序嵗月之勞猥升華秩無功報上有愧積中愧字重伏念某一出西垂説文垂逺邉也左傳䖍劉我邉垂谷永傳三垂晏然庾亮傳吾憂西陲過于歴陽此西垂指蜀言六逢朔易尚書平在朔易惟是窮日之力麄守封疆禮記正其封疆潘岳詩申命群司保爾封疆不敢貪天之功輒僥爵賞左傳竊人之財猶謂之盗况貪天之功以為已力乎兹蒙恩紀後漢書孔融傳文舉既非舊好鴻豫亦無恩紀吳志朱治傳所以供奉輔䕶甚有恩紀蜀志先主至京見權綢繆恩紀二主妃子傳人倫之始恩紀之隆莫尚于此矣晉書陳敏傳公胄早交恩紀特隆刁協傳協素無恩紀募從者皆委之陳書江縂傳夙荷昭晉恩紀契闊姚察傳東朝攀附恩紀謬加江淹詩儲后䧏嘉命㤙紀被㣲身俯録年勞後魏吏部郎中薛淑上言使選曹惟取年勞不簡賢否則義均行鴈次若貫魚勘簿呼名一吏足矣東魏高澄秉政乃革後魏崔亮年勞之制務求才實宋張栻胡銓乆不理年勞上嘉其亷静詔栻特進兩官銓磨勘四官揆厥所元豈無其自恭惟某官翼扶萬化器使羣工天地為爐每曲成扵萬物賈誼傳天地為鑪造化為工繫辭範圍天地之化而不過曲成萬物而不遺山藪藏疾豈求備于一夫左傳山藪藏疾瑾瑜匿瑕尚書爾無忿疾于頑無求偹于一夫致此孤蹤亦叨異數左傳禮亦異數誓殫駑力仰答鴻休轉朝請郎謝黄侍郎伯固杜氏通典朝請郎隋置散官葢採晉宋齊梁陳並有奉朝請為名唐因之顯慶制侯出身正七品上叙宋元豐更官制以朝請郎換前行員外郎侍御史荒服輦輸何益樵蘇之後尚書五百里荒服冦恂傳以輦車驪駕轉輸前後不絶韓信傳樵蘇後㸑師不宿飽注樵取薪也蘇取草也副郎銖積叨升糠粃之前韓文韋侍講盛山詩序韋矦以考功副郎守盛山東坡集寒女之絲銖積寸累孫綽傳簸之颺之糠粃在前曾㣲日奏之功尚書敷同日奏罔功僅守年勞之叙見上條然扵踈拙亦是僥踰自昔就第之侯號奉朝請後漢書賈復傳復以列矦就第二十八將傳論所加特進朝請而已注耿弇好畤矦食邑二縣奉朝請漢律春曰朝秋曰請杜氏通典奉朝請無員本不為官位宣帝紀宣帝為皇孫時得奉朝請漢官觧注三輔職如太守獨奉朝請張禹以特進奉朝請蕭朢之以關内矦奉朝請續漢書前漢列矦奉朝請在長安次三公通典東京罷省三公外戚皇室諸矦多奉朝請奉朝請者奉朝㑹請召而已野客叢書今呼朝請郎及奉朝請並作上聲攷漢書朝請其説有二如漢律所云此合從去聲如竇嬰不得朝請王陵竟不朝請之類是也師古注才姓反如杜氏通典所云當作上聲故韓退之東坡詩並作上聲押也本朝雜端之職頃視班聨杜氏通典侍御史之職有四謂推彈公廨雜事定殿中監察以下職事及進名改轉臺内之事悉主之號為臺端他人稱之曰端公其知雜事者謂之雜端最為雄劇自官制正名之餘宋史職官志宋承唐制居其官不知其職者十常八九自真宗仁宗以來議者多以正名為請咸平中楊億首言文昌㑹府有名無實宜復其舊既而言者相繼乞復二十四司之制至和中吳育亦言尚書省天下之大有司而廢為閑所當漸復之然朝論異同未遑釐正神宗即位慨然欲更其制熈寜末始命館閣校唐六典元豐三年以摹本賜群臣乃置局中書命翰林學士張璪等詳定下詔肇新官制省臺寺監領空名者一切罷去而易之以階寄員郎前行之禄仝上元豐三年詳定所上寄禄格元祐初以流品無别詔寄禄官悉分左右詞人為左餘人為右兩京新記尚書郎自兩漢已後妙選其人唐武徳貞觀以來尤重其寄吏兵部為前行最為要劇自後行改入皆為羙選考功員外專掌試貢舉人員外郎之最朢者司門都門屯田虞水膳部主客皆在後行閑簡無事宋史職官志元豐寄禄格以階易官新官朝請郎舊官前行員外郎侍御史新官朝散郎舊官中行員外郎起居舍人新官朝奉郎舊官後行員外郎左右司諫通典開元令尚書六曹吏部兵部為前行户部為中行禮部工部為後行遥瞻粉省知隔㡬塵杜詩馨香粉署妍白樂天詩文昌新入有光輝紫界宫墻白粉闈錢起詩粉署花騘入丹霄紫誥重杜氏通典省中皆以胡粉塗壁廣異記唐韋行式為西川採訪使有姪曰子威溺于神仙修煉之術有歩卒丁約者執厮役于部下子威頗私之一日辭去謂子威曰郎君道情深厚不欺暗室終當棄俗尚隔兩塵子威曰何謂兩塵約曰儒謂之世釋謂之刼道謂之塵善堅此心亦復遐夀近視土山不容一蹴談賔錄唐諸郎不自員外拜者謂之土山頭果毅言遽拜崇品有似長征兵回便授邉逺果毅景雲中趙謙光自大理正便遷戸部郎中而員外郎賀渉遂戲詠曰員外由來羙郎中望不優寜知粉署裏飜作土山頭蹴子六切説文躡也頋某無似知命不猶見前載馳載驅曾何禆扵苞栩詩肅肅鴇羽集于苞栩王事靡盬不能藝稷黍䟽言先勞而後獲所集以喻人當先勞而後得所安不稼不穡亦何取扵廛禾詩不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有懸貆兮偶成鑚員外之天誰實為將軍之地灌夫傳今衆辱程將軍獨不為李將軍地乎師古曰言既毁程令廣何地自安兹盖伏遇某官以大司馬杜氏通典大司馬古官也掌武事項羽以曹無咎周殷並為大司馬朱博傳武帝罷太尉始置大司馬以冠將軍之號春秋運斗樞黄帝坐𤣥滬與大司馬容光臨觀鳳銜圖置黄帝前為冠軍侯霍去病傳上曰票姚校尉去病斬首捕虜二千二十八級得相國當户斬單于大父行藉若侯産捕季父羅姑比再冠軍以二千五百户封去病為冠軍矦飬民以致賢人蕭何傳臣願大王王漢中飬其民以致賢人牧用巴蜀還定三秦天下可圖也開誠而布公道蜀志諸葛武矦傳評約官職從權制開誠心布公道河以南皆為晋土爭擊楫以渡江祖逖傳帝以逖為奮威將軍豫州刺史渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨歎逖愛人下士雖踈交賤𨽻皆恩禮遇之由是黄河以南盡為晉土陜而東主之周公且徹桑於未雨公羊傳自陜而東者周公主之自陜而西者召公主之詳別見藉腹中之兵甲崔浩傳世祖指浩示高車渠帥曰此人尫纎懦弱手不能彎弓持矛其胸中所懐乃踰于甲兵成塞上之金湯山谷詩塞上金湯惟粟粒燕人恱則取之昆夷維其喙矣詩混夷駾矣維其喙矣傳駾突喙困也箋混夷夷狄國也見文王之使者將士衆過已國則惶怖驚走奔突入此柞棫之中而逃甚困劇也王伯厚辭學指南云宣和取燕山群臣稱賀令一館職作表仍語以燕人悦則取之一句不得不使其人捜經句欲對未得王初寮曰何不曰昆夷維其喙矣遂用之猶念獮猴騎土牛之鈍魏志州泰為司馬宣王所知屢在艱中宣王留缺待之至三十六日擢為新城太守宣王為泰㑹使尚書鍾繇調泰曰君釋褐登宰府三十六日擁麾葢守兵馬郡乞兒乘小車一何駛乎泰曰誠有此君名公之子少有文采故守吏職獮㺅騎土牛又何遲也衆賔咸悦李詩獮㺅騎土牛羸馬夾䨇轅又沐㺅而冠不足言身騎土牛滯東魯欲試奔蜂化藿蠋之竒莊子奔蜂不能化藿蠋越鷄不能伏鵠卵注奔蜂小蜂也蠋音蜀藿蠋豆藿中大青蟲也説文蜀葵中蠶詩蜎蜎者蠋一名蚅爾雅蚅為蠋下至斗量吳書吳使中大夫趙咨使魏魏主問吳如大夫者㡬人咨曰聪明特逹者八九十人如臣之比車載斗量不可勝数唐武后遣使存撫四方所舉之人無問賢愚悉加擢用時人為之語曰補闕連車載拾遺平斗量欋槌侍御史盌脱校書郎尚叨寸進老子不敢進寸而退尺韓文進寸退尺卒無所成某所慙骯髒趙壹傳伊優北堂上骯髒倚門邉注骯髒高亢悻直之貎不足控搏見前吾愛吾廬詎敢希扵軒冕陶詩孟夏草木長遶屋樹扶踈衆鳥欣有託吾亦愛吾廬莊子今之所謂得志者軒冕之謂也軒冕在身物之儻來者也我任我輦願少緩扵鞭笞詩我任我輦我車我牛詳見前轉朝奉郎謝監司内服輦輸何益樵蘇之後尚書越在内服百寮庶尹餘見前外郎銖積叨升糠粃之前惠帝紀中郎郎中滿六嵗爵三級四嵗二級外郎滿六嵗二級蘇林曰外郎散郎也餘見前曾㣲日奏之功僅守年勞之次然扵庸謭亦是僥逾自昔就第之侯號奉朝請並見前本朝横榻之任實視班聨通典侍御史知雜事者謂之雜端最為雄劇食坐之南設横榻謂之南床其為員外之前行葢在官制之改後遥瞻粉省知隔㡬塵仰視土山詎容一蹴頋其無似知命不猶並見前水馬之走徒勞自甘退舍杜詩鴈兒爭水馬注水馬生水中善行如馬亦謂之海馬陳藏器云水馬一名水黽群游水上水涸即飛長寸許四脚非海馬之水馬也東坡詩君不見水馬兒歩歩逆流水大江東流日千里此蟲趯趯長在此左傳凡師一宿為舍増韻三十五里曰一舍左傳其避君三舍吕覽宋景有三善言熒惑徙三舍土牛之騎宜鈍何敢著鞭野客叢書前軰馬詩多引劉琨傳事如山谷詩眼明見此玉花騘徑思著鞭随詩翁是也此大綱言著鞭耳非為馬設前此葢有為馬言者按蜀志何秪謂楊洪曰故吏馬不敢駛但明府未著鞭耳世人局於所見推究不廣類如此餘見上條偶成鑚員外之天誰實為將軍之地兹盖伏遇某官仁深引類劉向傳在上則引其類在下則推其類義重噓枯後漢書嘘枯吹生憐其剪籠中之翎假之羽翼韓詩惟此兩夫子家居率荒凉帝欲長吟哦故遣起且僵翦翎送籠中使㸔百鳥翔憫其困轅下之軛借以齒牙灌夫傳侷促若轅下駒既費挈提陳餘傳左提右挈挈詰結切説文縣持也從手劫聲又加奬勞愧無成績可書日月之常尚書厥有成績紀于太常釋名日月為常尚託餘庥歸守烟霞之痼新唐書田游巖傳高宗幸嵩山親至其門謂曰先生比佳否答曰臣所謂泉石膏肓煙霞痼疾者帝曰朕得君何異漢獲四皓乎回趙司户等賀轉官斗壘藏瘝曾㣲嵗最瘝或作癏病也尚書若時瘝厥官天朝懋賞俾叙年勞見前是為平進之常晉書庾亮傳皆非姻族各以平進南史蔡興宗傳吾素門平進與主上甚疎王騫傳嘗從客謂諸子曰吾家本素族自可依流平進不須茍求禇淵傳論平流進取坐致公卿周書劉璠字寶義沛人慷慨好功名志欲主事邉城不樂随牒平進新唐書李徳裕嘗論公卿子弟艱于進取武宗曰向聞楊虞卿兄弟朋比貴勢有妨平進之路昨黜楊知立鄭朴等抑其太甚耳互見前難講同僚之謝敢圗髙誼平原君傳寡人聞君髙義願與君為布衣交董仲舒傳講聞高誼之日乆矣杜詩故人有孫宰高義薄層雲見畀屬辭恭惟某官義篤官聨周禮冡宰以八法治官府三曰官聨以㑹官治注官聨謂國有六事一官不能獨共則六官共舉之聨讀作連古書連作聨聨謂連事通職相佐助也情親事契胥保恵胥教誨有味其言尚書古之人猶胥訓誥胥保惠胥教誨鄭當時傳誠有味其言也孰披拂孰吹噓不愛其力莊子風起北方一西一東有上彷徨孰嘘吹是孰居無事而披拂是韓文吾豈有愛於力乎哉有憐邉賞躐綴外郎笑猴騎土牛之蹤真成鈍滯見前觀雀化水蛤之變要是沉淪禮記季秋之月爵入大水為蛤述異記淮水中黄雀至秋化為蛤至春復為黄雀五百年化為蜃蛤國語趙簡子歎曰雀入于海為蛤雉入于淮為蜃黿鼉魚鼈莫不能化唯人不能哀夫或承之羞不知所賀見前某未能辟榖史記留矦世家乃學辟榖道引輕身郊社志李少君以榖道郤老方見上李竒曰榖道辟榖不食之道也魏文帝典論潁川郤儉能辟榖餌茯苓久已思蓴蓴通作蒓水葵也本草生水中葉似鳬葵浮水上採莖堪噉三月至八月莖細如釵股名絲蓴九月至十月漸麤在泥中名瑰蓴張翰傳翰字季鷹吳郡人齊王冏辟為大司馬東曹掾因見秋風起乃思吳中菰菜蓴羮鱸魚膾曰人生貴得適志何能覊宦數千里以要名爵乎遂命駕而歸著首邱賦士夫爭磨勘而殺人幸容茍免宋史蘇軾傳王安石曰人須知行一不義殺一不辜得天下弗為乃可軾戲曰今之君子爭減半年磨勘雖殺人亦為之安石笑而不言將軍以告身而易醉行可匄歸唐書至徳中專以官爵賞功及收散卒大將軍告身一通纔易一醉改官改官謝丞相璧水綴員已抱罔功之愧禮記天子辟雍注辟雍圜如璧實以水内如覆盆外如偃葢也桓譚新論王者作圖池以璧形實水其中以圜壅之名曰辟雍言為國錄金閨登藉復叨寓禄之恩齊謝朓詩謬通金閨藉李詩謬題金閨籍言為架閣此聖世優職事之常而愚夫無功狀之實全出鑪錘之造敢忘竿牘之恭並見前竊以禄至宣徳之階雖八品秩通典宣德郎隋置散官唐因之顯慶制伯出身七品下叙子出身從七品上叙宋史職官志文散官朝奉承直郎正六奉直通直郎從六朝請宣徳郎正七朝散宣奉郎從七給事承事郎正八承奉承務郎從八儒林登仕郎正九文林將仕郎從九俗羡通班之寵號再登科劉知㡬史通忤時篇僕少小從時早躡通班班次也舉必五員職須六考宋紹興二十九年洪遵王希亮等上議曰自一命已上仕于州縣之間雖有真賢實亷勢不能自逹于上故為之立薦舉之法必使之歴任六考所以遲其嵗月而責其赴功必使之舉官五員所以多其保任而必其可用貳卿為之進巻東坡集文昌貳卿位次八座謂侍郎也萬乘至扵臨軒史丹傳天子自臨軒檻使百里或九十之差則分寸有千丈之落幸或通扵班筍又免待扵戍𤓰並見前惟甄異扵庭紳許帯行扵職組以此刈薪扵翹楚斯亮天功詩翹翹錯薪言刈其楚注翹翹薪貎錯雜也楚雜薪之中尤翹翹者尚書欽哉惟時亮天功如其不稼以取禾曷孚人望見前如某者起于素賤加以朱愚莊子不知乎人謂我朱愚知乎反愁我軀自安鷽鳩斥鷃之棲莊子蜩與鷽鳩笑之注崔云鷽讀為滑滑鳩一名滑雕司馬云學鳩小鳩也李云鶻鵰也毛詩草木疏云鶻鳩班鳩也簡文云月令鳲鳩拂其羽是也又斥鴳笑之注司馬云斥小澤也亦作尺鴳於諫反字亦作鷃韻㑹鴽屬爾雅鳸鴞陸佃云品中膳羞禮記内則鶉鴳鴳不木處安矣故謂之鴳亦乏蚍蜉蟻子之援見前隨材官蹶張之後不自意全申屠嘉傳以材官蹶張從高帝擊項籍如淳曰材官之多力能脚蹋彊弩張之故曰蹶張師古曰今之弩以手張者曰擘張以足蹋者曰蹶張吳王濞傳吾乘傳至此不自意全補文學掌故之聨已逾分願儒林傳以治禮掌故以文學禮義為官又嵗課丙科四十人補文學掌故師古曰言治禮掌故之官本以有文學習禮義而為之感大鈞無垠之播物見前欲小子有造扵成人詩肆成人有徳小子有造進之東膠禮記周人飬國老于東膠注東膠亦太學在國中王宫之東通典周制太學為東膠小學為虞庠膠之言紏也所以紏収學士也告扵南靣如絲如綸而如綍有隕自天易姤九五以杞包𤓰有隕自天疏言無能傾隕之者唯天能隕之此借用在沚在陵而在阿孰為之地詩菁菁者莪在彼中阿既見君子樂且有儀菁菁者莪在彼中沚既見君子我心則喜菁菁者莪在彼中陵既見君子錫我百朋注菁菁然茂盛者蘿蒿所以得茂盛者由生在阿沚陵之中得阿沚陵之長飬故茂盛以興君之長飬人才伏遇某官坤厚載物見前鼎烹飬賢易鼎象也以木巽火亨餁也聖人亨以享上帝而大亨以飬聖賢耻一夫之納溝中欲得其所招諸生而立館下恐毁扵隨故雖紏録之曹亦加超遷之渥某敢不修其可願欽乃攸司並見前卑者止髙者流當益厲六館之仁勇韓文太學生何蕃傳惜乎蕃之居下其可以施于人者不流也譬之水其為澤不為川乎川者高澤者卑高者流卑者止是故蕃之仁義充諸心行諸太學積者多施者不遐也直而温寛而栗庶可助九徳之敷施尚書帝曰䕫命女典樂教胄子直而温寛而栗剛而無虐簡而無傲又翕受敷施九徳咸事改官謝喬司業行簡同第七巻除國錄謝葛祭酒啟頭宋史喬行簡字夀朋婺州東陽人學于吕祖謙之門登紹熈四年進士第歴官浙西提㸃刑獄兼知鎮江府遷起居郎兼國子司業拜參知政事兼知樞密院事尋拜右丞相嘉熈三年拜平章軍國重事四年加少師封魯國公贈太師謚文惠所著有周禮縂説孔山文集癸辛雜志云喬文惠行簡嘉熈之末自相位拜平章軍國重事年八袠矣時皆以官貴長年羡之而公晚年子孫淪䘮况味尤惡嘗作上梁文云有園有冶聊為卒嵗之遊無子無孫盡是他人之物又乞休表云少壯老百年已踰八袠祖子孫三世僅存一身聞者憐之伏遇某官道航聖瀆法言捨舟航而濟乎瀆者末矣捨五經而濟乎道者末矣材棟儒林史記有儒林傳董仲舒發藻儒林左史讀五典三墳葢將倚相左傳左史倚相趍過王曰是良史也子善視之是能讀三墳五典八索九邱注倚相左史名韓安國傳天子方倚以為漢相元載杜相國神道碑俾時不迷倚以為相國子學九徳六舞暫假司成尚書亦行有九徳周禮以樂舞教國子舞雲門大, SBCK: ''}
