body:
  text: 四六標準卷三十三宋李劉撰宰宋建隆元年應天下諸縣除赤畿外有望緊上中下掌總治民政有戍兵則兼兵馬都監或監押三年始以朝臣為知縣或參用京官自大理正奚嶼監察御史王祐等始或幕職為之天聖間天下多缺官而令選尤猥下為清流所不與久不得調乃為縣令人數言其病民乃詔為舉法以重令選凡知州轉運使嵗舉見任判司薄尉有罪非贓私有出身三考無出身四考堪為令者一人或二人自是人重為令令選稍精慶厯間詔天下知縣非鞫獄毋得差自政和以來重內輕外人輕縣令之選吏部兩選不注者甚多靖康初詔初改官必為縣紹興七年詔寺監丞簿等任滿已改官人未歷民事者各與堂除知縣一次借緋九年詔自後縣令差文臣乾道二年御筆自今非兩任縣令不除御史慶元初詔除殿試上二名省元外並作邑自後雖宰相子殿試科甲人無宰邑者矣通寧鄉周知縣瑑李時為邑簿寧鄉見二十九卷首條學道愛人願效縣公之役左傳諸矦縣公皆慶寡人注縣公楚縣大夫册府元龜云縣令魯謂之宰仲尼為中都宰是也齊謂之大夫齊威王封即墨大夫烹阿大夫是也楚謂之尹沈尹戍為方城之外縣尹是也亦謂之公葉公諸梁是也會計試吏冒干簿正之供是非尋常之託根八尺曰尋倍尋曰常宋廣平梅花賦序嗚呼斯梅託根非其所山谷詩江梅有佳實託根桃李場請裁四六而張本左傳杜注豫為後地曰張本荀嵩傳左丘明張本繼末發明經意多竒偉恭惟某官人門具美陳書蔡凝傳高宗謂凝曰我欲用義興主壻錢肅為黃門郎卿意何如凝正色對曰黃散之職故須人門兼美惟陛下察之東坡詩清朝固多士人門子皆冠天分素高分去聲集韻分劑限量也晉書列女傳謝道韞譏弟玄學植不進曰為塵務經心為天分有限耶家聲蚤著於魁三杜詩爾家最近魁三象時論同歸尺五天世德不專於爵一安劉必勃高帝紀周勃厚重少文然安劉氏者必勃也破操在瑜江表傳劉備住樊口乘單舸往見周瑜問戰卒有幾瑜曰三萬人僃曰恨少瑜曰此自足用豫州但觀瑜破之學配前聞肯俯貪于蝸蚓尚書追配於前人新唐書選舉志取士試之小道而不以逺大是猶以蝸蚓之餌而望吞舟之魚不亦難乎所以食垂餌者皆小魚就科目者皆小藝律設大法謂徑掣於鯨鯢卓茂傳律設大法禮順人情杜詩或看翡翠蘭苕上未掣鯨鯢碧海中居然婆娑爾雅婆娑舞也詩市也婆娑又婆娑其下陶侃傳老子婆娑正坐君輩梁書止足傳贊懷祿耽寵婆娑人世尚此槃礴槃礴間定貌莊子畫史解衣槃礴得非堅車大艦利用逺遊寧有巨棟修梁驟堪轉致頗聞三異具見一同見前非百里材姑繞蟻封而試馬蜀志龎統傳魯肅遺先主書曰龎士元非百里才也晉書王湛傳此馬任重方知之平路無以别也於是當蟻封內試之並詳見前為萬乘器會扛龍鼎以函牛鄒陽傳蟠木根柢輪囷離奇而為萬乘器者以左右先為之容也師古曰萬乘器天子車與之屬也禮記祟鼎貫鼎天子之器史記趙世家秦武王與孟説舉龍文赤鼎絶臏而死東京賦嶽修貢兮川效珍吐金景兮敲浮雲寶鼎見兮色氤氲煥其炳兮被龍文韓詩龍文百斛鼎筆力可獨扛函容也莊子函牛之鼎沸蟻不得措一足焉後漢書邉讓傳傳曰函牛之鼎以烹雞多汁則淡而不可食少汁則熬而不可熟長沙令之讀五車綴班雖晚吳靖為長沙令一日自歎曰讀五車書辛苦十年不得綴鴛鷺班髮白蹤迹飄零為百里陶元諒復何人耶洛陽生之對半夜趣召可期見前某學不踰人飢來驅我陶詩飢來驅我去苦乏長裾之飛譽仇覽傳今日太學曵長裾飛名譽皆主簿後耳姑從矮屋以立身開元天寶遺事張彖為華陰簿為守令所抑歎曰大丈夫有凌雲蓋世之志而拘於下位若立身矮屋之下使人擡頭不得乃棄官而去先達者為之前定包荒於後輩韓文士之能享大名顯當世者莫不有先逹之士負天下之望者為之前焉易包荒用馮河大事則從其長足藏拙於小官周禮大事則從其長小事則專達餘見前冒然而來恃此不恐左傳展喜對齊矦曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐人果不可無勢豈矜駕御之能陶靖節集孟府君傳為征西大將軍桓溫參軍色和而正溫甚重之溫從容謂君曰人不可無勢我乃能駕御卿東坡志林云桓溫之才百倍於嘉所以云爾者自知其陰賦險狠不為高人勝士所比數耳士安得獨自高尚假比鄰之庇孫寶傳署寶主簿寶徙入舍祭竈請比鄰餘詳見前通崇仁曾宰穎秀崇仁縣在撫州西一百二十里本東漢豫章郡臨汝縣地吳分置新建縣晉屬臨川郡梁改曰巴山縣置巴山郡隋初郡縣俱廢置崇仁縣屬撫州唐宋因之曉行湘水我方尋欸乃之歌杜詩夜醉長沙酒曉行湘水春栁詩漁翁夜傍西巖宿曉汲清湘然楚竹煙銷日出不見人欸乃一聲山水緑注欸乃音襖靄山谷集云王稚川既得官都下有所眄未歸豫戲作林夫人欸乃歌二章與之竹枝歌本出三巴其流在湖湘耳欸乃湖南歌也春靜巴山君來賦蒍于之曲巴山在崇仁縣南六十里有欒巴祠故名唐改曰臨川山宋邑宰孫懋避欒仙諱改曰柏山舊傳巴山有四仙曰梅欒鄧葉梅即漢梅福欒即欒巴隱此山鄧葉俱南城人新唐書卓行傳元德秀字紫芝為魯山令玄宗在東都酺五鳯樓下命三百里縣令刺史各以聲樂集是時頗言帝且第勝負加賞罰河內太守輩優伎數百披錦繡或作犀象環譎光麗德秀惟樂工數十人聯袂歌于蒍于于蒍于者德秀所為歌也帝聞異之歎曰賢人之言哉非釣魴之厚味劉向説苑宓子賤為單父宰過於陽晝曰子亦有以送僕乎陽畫曰吾少也賤不知治民之術有釣道二焉請以送子夫投綸錯餌迎而吸之者陽鱎也其為魚薄而不美若存若亡若食若不食者魴也其為魚也博而厚味子賤曰善於是未至單父冠蓋迎之者交接於道子賤曰車驅之車驅之夫陽晝之所謂陽鱎者至矣至單父請其耆老尊賢者而與之共治單父詩豈其食魚必河之魴廣州記魴魚廣而肥甜魚之美者也漫致鯉於長鬚昌黎寄盧同詩先生有意許降臨更遣長鬚致雙鯉恭惟某官忠恕家傳倫魁世業揚雄傳皋伊之徒冠倫魁應劭曰冠其羣倫魁傑也師古曰冠等倫而魁傑恢恢遊刃如錐之處囊中莊子恢恢乎其於遊刃必有餘地矣史記平原君傳夫士之處世也譬若錐之處囊中其末立見在在彯纓皆羅而致幕下彯紕紹切彯彯長組貌梁書張允傳與王儉書彯纓天閣既謝廟堂之華綴組雲臺終慙衣冠之秀選詩仕子彯華纓適通玉籍屈綰銅章通典宋諸縣署令銅印墨綬進賢兩梁冠顧避談公之維私爾雅女子謂姊妹夫曰私詩談公維私孫炎云私無正親之言然則謂吾姨者我謂之私不云贛水之可厲贛水東江發源於汀州界之新樂山經雩都會於章水西江導源於南安大庾縣之聶都山與貢水合會於贛水二水合而為贛在州治後北流一百八十里至萬安縣界由萬安而上為灘十有八詩匏有苦葉濟有深涉深則厲淺則揭注以衣涉水為厲謂由帶以上也維寶唐之𥚹邑一統志寶唐山在崇仁縣西南一百五里跨六安之境寶唐水出焉固麻谷之舊邦謝靈運入華子岡麻源第三谷詩銅陵映碧澗石磴瀉紅泉錦製此來繡行甚寵改邑不改井易地則然易改邑不改井旡喪旡得注井以不變為德者也正義曰養物不窮莫過乎井君子修德養民始終無改如井體有常邑雖遷移而并體無改有土此有財得人焉耳奉潘輿其孔邇潘嶽間居賦大夫乃御板輿升輕軒詩父母孔邇馳魏闕以非遙莊子身在江海之上心居乎魏闕之下注魏闕天子兩觀也某兩鬢白紛隻身墨隱昨班文石不能誨館下之諸生梅福傳登文石之陛韓文招諸生立館下今戍武岡幸不失黔中之上佐武岡為楚巫黔中地蘇秦傳一軍出武關一軍下黔中張儀傳秦要楚欲得黔中地王忠嗣傳明日見責不失一金吾羽林將軍歸宿衛不則黔中上佐耳出晝尚遲於三日受滕願託於一㕓操韓子赤縣之權晉妄干於薄少晉字舛薄當作惡昌黎寄盧同詩昨晚長鬚來下狀隔墻惡少惡難似嗟我身為赤縣令操權不用欲何俟荒鄭虔蒼苔之屋尚見芘其歸來杜詩先生早賦歸去來石田茅屋荒蒼苔代回常寧曹宰輔世常寧在衡州西南一百二十里本漢耒陽縣地三國吳析置新平新寧二縣屬湘東郡東晉以新平省入新寧劉宋更曰常寧陳復曰新寧隋屬衡州唐復曰常寧宋因之詳啓意蓋代月湖不稼取禾我謾持於漢槖詩不稼不穡胡取禾三百㕓兮傳種之曰稼斂之曰穡趙充國傳持槖簪筆注槖契囊也近臣從備顧問或有所紀及瓜代戍公已趣於曹裝曹參傳告舍人趣治行師古曰治行謂修行治裝也一介惠然雙鱗厚甚恭惟某官百里為令後漢書郎官出宰百里上應列宿三年有成不求赫赫之名見思所去何武傳其所居亦無赫赫名去後常見思雖聽鼕鼕之鼓有挽無推鄧攸傳為吳郡守去郡吳人歌之曰紞如打五鼓雞鳴天欲曙鄧矦挽不來謝令推不去説文鼕鼕鼓聲交章翕然劉向傳章交公車增秩近只循吏傳序增秩賜金佇公矦之必復左傳合而能固安而能殺公矦之卦也公矦之子孫必復其始豈州縣之徒勞梁竦傳州縣之職徒勞人耳某骯髒雲司骯髒悻直貌趙一傳骯髒倚門邉除裴復制俾踐白雲司以黃帝時秩官為白雲也超騰水部通典工部尚書總判工部屯田虞部水部事魏尚書有水部郎後魏北齊有水部屬都宫後周有司水大夫隋初為水部侍郎屬工部唐天寶中改水部為司水會且歸矣不當戀仗馬之芻詩會且歸矣無庶豫子憎新唐書姦臣傳李林甫語諌官曰卿等不見立仗馬乎終日無聲而飫三品芻豆一鳴則黜之矣後雖欲不鳴得乎行或使之猶復見飛鳬之舄回武岡許令大用宋武岡軍領武岡綏寧新寧三縣治武岡縣今州即武岡縣地強顔二郡慙非典午之材韓詩長慙典午非材職箝尾為僚喜有同寅之幸韓文藍田縣丞廳壁記卷其前箝以左手右手摘紙尾睨丞曰當署尚書同寅協恭和衷哉會修辭之未暇辱垂問之相先恭惟某官精神五兵韓詩腸胃繞萬象精神驅五兵肝膽一劒韓詩肝膽一古劒波濤兩浮萍積月書於右序已播英聲通典有虞氏大學為上庠小學為下庠夏后氏太學為東序小學為西序殷制太學為右學小學為左學奉天問於左廬更登峻級劉禹錫問大鈞賦楚臣天問不酬今臣過幸一獻三售方西北二邉之未靖何東南一尉之足淹揚雄傳東南一尉西北一矦行矣章交見上條亟其王覲左傳王覲為可某無能教胄尚書命女典樂教胄子傳胄長也教訓世適長子言為國録顧使轉丞韓文再轉而為丞兹邑烹雙鯉得尺素書良勤垂念飲馬長城窟行客從逺方來遺我雙鯉魚呼兒烹鯉魚中有尺素書從一騎踔五百里即遂承顔韓文曹成王碑觀察使虐使將國良往戍界良以武岡叛於是以王帥湖南以討良為事良乞降狐鼠進退王即假為使者從一騎踔五百里抵良壁鞭其門大呼我曹王來受良降良不得已錯愕迎拜盡降其衆回武岡薛令仲庶聞三鳳之聲未遑面識新唐書薛收傳元敬與收及族兄德音齊名世稱河東三鳯收為長雛德音為鸞鷟元敬年最少為鵷雛聽雙鳬之舄良喜足音見前尺書惠然三復感甚恭惟某官材優世濟學贍家傳早安枳棘之棲簿為之兆仇覽傳枳棘非鸞鳳所棲百里豈大賢之路繼領桁楊之寄民自不寃桁寒剛切木在足曰械大械曰桁莊子椄槢桁楊注械夾足及脛皆曰桁楊于定國傳其決疑平法務在哀鰥寡朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃亟為製錦之謀可見鳴絃之志惟此黔巫之鄙栁文黔符東鄙蠻獠雜擾異乎江浙之間下若牛馬上若熊羆從昔少人而多石栁文鈷鉧潭西小丘記石之負土而出其􅋂然相纍而下者若牛馬之飲于溪其衡然角列而上者若熊羆之登于山石城山記其氣之靈不為偉人而獨為是物故楚之南少人而多石大不鯨鯢小不虺蜴乃可宣化而承流栁文武岡銘序由公之仁小不為虺蜴大不為鯨鯢恩重事持不邇而逺董仲舒傳今之郡守縣令民之師帥所使承流而宣化也公行勿遲民望攸屬某凄涼半刺僥幸同僚欸乃一聲定樂薛存義之至栁文送薛存義之任序河東薛存義將行栁子載肉於俎崇酒於觴追而送之江滸云云餘見通崇仁會宰條紞如五鼓幸遄鄧伯道之來見前回常寧曹宰條欣幸良多敷宣罔既回綏寧舒令杓綏寧本唐溪洞徽州之地宋置蒔竹縣屬邵州熙寧中廢崇寧中復置改曰綏寧縣紹興中屬武岡軍元屬武岡路本朝改屬靖州榮離霧隱列女傳陶答子妻日南山有玄豹隱霧雨而十日不下食詳别見出宰雷封白帖雷震百里縣令象之分土百里維今巫水之磻雖云巖邑栁文巫水之磻左傳制巖邑也巖險也在昔夫夷之長固有聞人夫夷水在新寧縣南源出廣西全州界遏此至邵陽會澬水夫夷故城在武岡東北二百四十里漢為縣長沙定王子義封夫夷矦國於此第五倫傳有詔以為扶夷長未到官追拜會稽太守注扶夷縣屬零陵郡故城在今都州武岡縣東北陶侃傳武庫令黃慶舉侃補武岡令與太守吕嶽有嫌棄官歸恭惟某官闕里故家闕里在魯城南孔子所居之地良弓宿學三仕為令從知學製之精並見前萬里封矦行見棄繻之勇班超傳相者曰祭酒布衣諸生耳而當封矦萬里之外終軍傳步入關關吏豫軍繻軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西遊終不復傳還棄繻而去注繻音須繻符也書帛裂而分之若劵契矣兹來蒔竹見題下已及戍瓜下若牛馬上若熊羆飽看竒狀大不鯨鯢小不虺蜴正藉撫摩並見上條某典午非材同寅有幸許丞重聲猶能聞欸乃之一聲鄧矦肯來諒不俟紞如之五鼓俱見前回武岡許令教胄本朝久歸來於茅屋尚書命女典樂教胄子荀子人君用之則勢在本朝而宜蕭望之傳雅志在本朝法真傳光贊本朝四子講德論陳懇誠於本朝之上杜詩先生早賦歸去來石田茅屋荒蒼苔負丞支郡偶及代於瓜期韓文余不負丞而丞負余朝錯傳割其支郡師古曰支郡在國之四邉者也詳别見夙因戍削之標子虗賦衯衯裶裶揚衪戍削師古曰揚舉也衪曵也或舉或曵則戍削然見其降殺之美也一云戍鮮也削刻除貌將托寅恭之契未遑􅐹記先辱鳴謙並見前恭惟某官氣稟沉雄性資果毅對摧鋒之月盍策勳名李詩太白入月敵可摧敵可摧旄頭滅旄頭星名主兵象詳見第三卷謝鄒運使舉狀戴作縣之星顧勞撫字説苑宓子賤治單父彈琴身不下堂單父治巫馬期亦治單父以星出以星入日夜不處以身親之單父亦治巫馬期問其故宓子曰我之謂任人子之謂任力任力者勞任人者佚佇民庸之入奏承天寵以遄歸易在師中吉承天寵也某倚席不材題輿非據二郡長縣固唇齒之相依體國愛民願腹心之無隱並見前代回丹徒姚宰丹徒本吳朱方邑後又名谷陽泰時望氣者言其地有王氣始皇使赭衣徒三千鑿京峴山為長坑以敗其勢因名丹徒漢為丹徒縣屬會稽郡後屬吳郡三國吳改武進縣晉復為丹徒置昆陵郡宋為南徐州治所隋省入延陵縣唐復置屬潤州宋因之宰山水之縣知在近郊韓詩出宰山水縣聞絃歌之聲未瞻逺器敢圖􅐹記施及泛負恭惟某官藉甚人門陸賈傳名聲藉甚注狼藉甚盛餘見首條巋然地望莊子巋然而有餘魯靈光殿賦巋然獨存善刀出匣孰嬰紫電之鋒莊子善刀而藏之崔豹古今注吳有白虹紫電辟邪流星青冥百里六劒唐中宗授張錫尚書制白虹良寶紫電竒鋒詳見前結綬登畿斜取青雲之勢顔延年詩結綬登王畿劉禹錫詩青雲直上無多路却作斜飛取勢回多景誰如於北固多景樓在甘露寺宋張邦基墨莊漫録云鎮江府甘露寺在北山上江山之勝煙雲顯晦萃於目前舊有多景樓尤為登覽之勝蓋取李贊皇題臨江亭詩有多景懸窗牖之句以是命名即臨江故基也裴煜守潤日有詩云登臨每憶衛公詩多景惟於此處宜海岸千艘浮若芥邦人萬室布如棊江山氣象回環見宇宙端倪指點知禪老莫辭勤候迓使君官滿有歸期自經兵火樓廢近雖稍復經營而樓基已半侵削殊可惜也宋米芾詩兩州城郭青煙起十里江山白鷺飛海近雲濤驚夜夢天依月露濕秋衣北固山在府治北一里回嶺下臨長江其勢險固即府治所據及甘露寺基建康實録梁武帝幸京口登北固樓遂改名北顧唐竇常詩山趾北來固潮頭西去長宋王安石詩天末海門橫北固煙中沙岸似西興瓣香寧舍於南豐陳後山詩向來一瓣香敬為會南豐改一聮云兹操權於赤縣韓詩嗟我身為赤縣令操權不用欲何俟姑斂惠於黔氓韓文斂此大惠兮施於一州史記始皇紀更名民曰黔首應劭曰黔亦黎黑也尚書黎民於變時雍繭絲乎保障乎定知緩急魴魚也陽鱎也決有後先見本卷通崇仁曽宰條雙鳬之舄翩然見前五鳳之酺近止通鑑開元二十三年正月上耕藉田都城酺三日上御五鳯樓酺宴元德秀傳玄宗在東都酺五鳳樓下酺音蒲説文王德布大飲酒也漢律三人已上無故聚飲罰金故賜酺得會聚飲食也唐無酺禁亦賜酺者蓋聚作伎樂高年賜酒麵某畫墁無補巢幕奚為左傳季札謂孫林父曰夫子在此猶燕之巢於幕上望金堂石室之間無因而至金堂峽在成都府金堂縣石室蜀人以祀文翁者姚宰蓋蜀人感繡段瓊英之贈藏弆為榮見前代回江陰何宰處博江陰本秦漢毗陵縣地屬會稽郡晉初析置暨陽縣屬毗陵郡梁始置江陰郡及江陰縣隋初廢郡以縣屬常州又以利城梁豐二縣省入唐初于縣置暨州復析置暨陽利城二縣尋廢暨州及省二縣入江陰縣屬常州五代南唐置江陰軍領江陰縣宋或為軍或為縣詳啓意蓋代月湖送紙上之軒昻皆我輩語韓詩開緘忽睹送歸作字向紙上皆軒昻孫綽傳嘗作天台賦以示范榮期云卿試擲地當作金石聲榮期曰恐此金石非中宫商然每至佳句輒云應是我輩語就暗中而摸索乃吾宗家左傳晉吾宗也豈害我哉李雍詩吾宗固神秀杜詩吾宗老孫子山谷詩江夏無雙乃吾宗餘見前有味其言見前不知所賀左傳楚子使子文治兵於暌終朝而畢不戮一人子玉復治兵于蒍終日而畢鞭七人貫三人耳國老皆賀蒍賈尚幼後至不賀子文問之對曰不知所賀恭惟某官人門具美天分仍髙並見本卷首條日食萬錢盍追隨於伯父何曾傳性奢豪務在華侈帷帳車服窮極綺麗厨膳滋味過於王者每燕見不食大官所設日食萬錢猶云無下箸處地方百里何局促於子男聊繼益昌之功名新唐書循吏傳何易于為益昌令刺史崔博乘春與賔客泛舟索民挽繂易于身引舟博愧疾驅去詔命𣙜茶易于不奉詔饋給往來傳符外一無所進故無異稱即見中牟之除寵魯恭傳拜中年令在事三年州舉尤異拜侍御史某日之夕矣人謂斯何乘興而來漸有回船之意同姓為近恐餘推轂之情並見前回成都吕知縣大全成都春秋時蜀矦所理秦始置成都縣漢宋益州治此晉宋齊梁並因之隋屬益州唐宋為成都府治所箝尾青油之幕那暇笑談韓詩聫句談笑青油幕傾心赤縣之官鼎來材傑杜詩赤縣官曹擁材傑軟裘快馬當冰雪聞舄鳬之近只得書鯉而躍然見前恭惟某官渭釣名家史記太公望吕尚者本姓薑氏蓋嘗窮困年老矣以漁釣姦周西伯西伯獵遇太公於渭之陽説苑吕望年七十釣於渭渚三日三夜魚無食者望即忿脫其衣冠上有農人者古之異人謂望曰子姑復釣必細其綸芳其餌徐徐而投無令魚駭望如其言初下得鮒次得鯉刺魚腹得書書文曰吕望封于齊望知其異蜀珍粹望法言蜀莊沉冥蜀莊之才之珍也不作茍見不治茍得久幽而不改其操雖隋和何以加諸詳見前恢乎遊刃豈難解盤錯之根注見前飛不盡翰殆欲培扶搖之翼韓文不長其年飛不盡翰盍班玉筍顧擁璧蒲士元非百里之才便應别駕並見前成都有萬事之好是在長官杜詩成都萬事好錦製奏功綈緘入覲某全提迂拙冒涉險艱舍嵩邙一室之書無能為役韓文送石處士序先生居嵩邙瀍榖之間坐一室左右圖書左傳於先大夫無能為役注言不足為其役使也投成華二縣之簡何處有詩投疑當作授成華謂成都華陽韓詩風霜滿面無人識何處如今更有詩代回新昌詹宰繼新昌在瑞州府西一百二十里本漢建城縣地吳析置宜豐縣隋省入建城縣唐復置尋省入髙安南唐以宜豐舊地為鹽步鎮宋以地勢廣險又於宜豐故城置新昌縣孤鶴重來恍難尋於舊侣續搜神記遼東城門有華表柱忽有一鶴集徘徊空中言曰有烏有鳥丁令威去家千載今來歸城郭如故人民非何不學仙去空作家纍纍遂上沖天雙鳬西望猶未廢於故情相贈以言足華其老東坡集過情之譽知無其實而愧於中起廢之文欲借此言以華其老恭惟某官早持雋望見謂通材趙充國傳見謂忠謹學道愛人固自不妨割雞之用治中别駕亦何足為展驥之謀種桃李於春風接蓬萊之雲氣並見前去天尺五孰云多而不揚杜詩時論同歸尺五天自注云俚語云城南韋杜去天尺五進學解蓋有幸而獲選孰云多而不揚擊水三千願少安之無躁韓文德僕之所為少安無躁某崦嵫日薄見前嶰谷地寒漢書律厯志取竹之解谷注崑崙之北谷名也劉向别録方士傳言鄒衍在燕有谷地美而寒不生五榖詳見前簪筆甘泉聊復覆蕉而尋夢列子鄭人有薪於野者遇駭鹿御而擊之斃之恐人之見之也遽而藏諸隍中覆之以蕉俄而遺其所藏之處遂以為夢焉詳别見挂冠神武豈須叢桂之移文淮南招隱士桂樹叢生兮山之幽偃蹇連卷兮枝相繚宋周顒初隱北山後出為山陰令秩滿入京復經此山孔稚圭代此山移文以絶之代回趙萍鄉彥逹萍鄉在袁州西一百四十里本宜春縣地孫吳析置萍鄉縣屬安成郡以楚昭王渡江得萍實於此故名隋屬袁州詳啓意蓋代舊令回新尹者名駒千里夙聞佳公子之聲東坡詩未應良木棄大匠要使名駒試千里史記平原君傳贊平原君翩翩濁世之佳公子也烹鯉尺書未忘舊令尹之好方當執熱如對調冰杜詩公子調冰水恭惟某官逺泒天潢晉天文志五車五星三柱九星在畢北其中五星曰天潢漢天文志王良傍有八星絶漢曰天潢崔廓答豫章王箋稟潤天潢承輝日觀早梯月窟宣室志唐太和中有周生者有道術中秋夜與客會月色方瑩謂坐客曰我能梯雲取月置之懷襟因取筯數百條繩而駕之曰我梯此取月俄以手舉衣懷中出月寸許光色照爛寒氣入肌骨卓犖千萬人之敵足亢磐石之宗韓文卓犖為傑項籍傳劒一人敵不足學學萬人敵耳左傳不能亢身焉能亢宗文帝紀高帝王子弟地犬牙相制所謂磐石之宗也低回三十載之間始入金閨之籍史記孔子世家諸生以時習禮其家余低回留之不能去云注祇敬也言祇敬遲回不能去之有本作低低回義亦通謝朓詩既通金閨籍復酌瓊筵醴杜詩謬題金閨籍得與銀臺通楚萍如斗家語楚昭王渡江江中有物大如斗圓而赤直觸王舟羣臣莫能識使問孔子孔子曰此謂萍實可剖而食之吉祥也互見前陶桞皆春陶靖節五栁先生傳先生不知何許人亦不詳其姓字宅邉有五栁樹因以為號焉不惟吏泗而民咷泗息利切詩涕泗滂沱毛傳自目曰涕自鼻曰泗咷徒刀切號咷哭聲也易同人先號咷而後笑料亦庭空而旅實爾袁得遊庠序又見賢君李泰伯袁州學記今代遭聖神爾袁得賢君俾爾遊庠序踐古人之迹天使亦好官員恐成故事東軒筆録范延賞為殿直押兵過金陵張忠定公為守因問曰天使沿路來還會見好官員否延賞曰昨過袁州萍鄉縣邑宰張希賢者雖不識之知其好官員也公曰何以言之延賞日自入縣境驛傳橋道皆完葺田菜墾闢野無惰農及至縣則㕓肆無賭博市易不敢喧爭夜宿邸中聞更鼓分明以是知其必善政也公大笑曰希賢固善矣天使亦好官員也即日同薦於朝希賢後為發運使延賞亦為閣門祇候皆能吏也某自慙揚粃安有憩棠老鶴乘軒可笑翅翎之短左傳狄人代衛衛懿公好鶴鶴有乘軒者東坡詩誤辱使君相抆拭寧聞老鶴更乘軒山谷詩身如病鶴翅翎短心似亂絲頭緒多飛鴻踏雪空驚指爪之留東坡詩人生到處知何似應似飛鴻踏雪泥泥上偶然留指爪鴻飛那復計東西代月湖回吳宰囦振履光臨屬辭寵賁臨賁封名靖共正直得之眉宇之間詩靖共爾位好是正直注靖謀也共具也言有德未仕之君子勿明明求仕自有明君謀具汝之爵位其志先在于正直之人終是與之為治者此斷章新唐書元德秀傳房綰每見德秀歎息曰見紫芝眉宇使人名利之心都盡雅健雄深粲然毫楮之上劉禹錫桞文序其文雄深雅健似司馬子長崔蔡不足多也東坡詩若人富天巧春色入毫楮君言雖過我心則降詩亦既見止亦既覯止我心則降降戶江反注言我心之憂則降下也恭惟某官敏手決科山谷詩敏手擘泰華法言須以發策決科洗心從政繫辭聖人以此洗心退藏於密盤根而别利器遊刃砉然見前促柱則少和聲鳴絃自若長笛賦絙絃促柱注絙急絃也謝靈運詩殷勤訴危柱慷慨命促管頗聞爐香茗碗之句仍見髯奴赤腳之詩並見前已窺一斑王獻之傳數嵗嘗觀門人摴蒲曰南風不競門生曰此郎亦管中窺豹時見一斑詳見前復尋尺素六察六院本以待邑最之來宋史職官志紹興三年殿中侍御史常同言元豐始置六察上自諸部寺監下至廪庫場務無不分𨽻以詔廢置而乃有夤緣申請乞不𨽻臺察者恐非法意宜遵舊制從之乾道二年詔自今非曾經兩任縣令不得除監察御史三沭三薰決不在時材之下某過勤委重莫可報嘉見前逢人而説項斯當無回隱劉禹錫隋唐嘉話楊敬之贈項斯詩度度見詩詩總好今觀標格過於詩平生不解藏人善到處逢人説項斯詳見首卷作書而見子布徒取嘲嗤典略日余曩聞劉荆州嘗自作書欲與孫伯符以示禰正平正平嗤之言如是為欲使孫䇿帳下兒讀之耶將使張子布見乎回鹽官林知縣申鹽官本漢海鹽地有鹽官吳王煮海之地吳置鹽官縣屬吳郡隋屬餘杭郡唐屬杭州武德七年省入錢唐貞觀年復置懷赤縣之章聞將引綬通典唐縣有赤畿望緊上中下六等之差京都所治為赤縣京之旁邑為畿縣朱買臣傳衣故衣懷其印綬步歸故邸守邸怪之前引其綬詳見前依緑水之幕行或望塵潘嶽傳嶽性輕躁趨勢利與石崇等諂事賈謐每候其出與崇輒望塵而拜南史何點傳豫章王尚望塵不及吾當望岫息心未遑名姓之通猥沭緘縢之寵見前恭惟某官風猷膚敏業履端溫杞梓之材異材是宜作室左傳晉大夫皆卿材也如杞梓皮革何氏語林韋氏孝友文學有承慶嗣立邃音樂有萬石逹禮儀則叔夏史才博識有述時趙冬䂀兄弟亦有美名張燕公嘗語曰韋趙兄弟人之杞梓陸機傳贊實荆衡之杞梓尚書若考作室瑚璉之器何器而使在山大戴禮玉在山而木潤川生珠而岸不枯板輿欲覽於王畿潘嶽間居賦太夫人乃御板輿升輕軒逺覽王畿近周家園蒲璧故來於京邑竊聞潮浪頗蝕邑封必欲植河陽之花潘嶽傳嶽才名冠世為衆所疾遂棲遲十年出為河陽令庾信枯木賦若非金谷滿園樹即是河陽一縣花白帖潘嶽為河陽令樹桃李花人號日河陽一縣花李詩河陽花作縣秋浦玉為人不若犍淇園之竹漢書溝洫志下淇園之竹以為犍晉灼曰淇園衛之苑也如淳曰樹竹塞水決之口稍稍布插按樹之水稍弱補令密謂之犍以草塞其中乃以土填之有石以石為之師古曰犍音其偃反某愧贊畫之非材實底寮之有幸俱見前癡公事未了也正懼鰥官傳咸傳楊濟與咸書曰天下大器非可稍了而相觀每事欲了生子癡了官事官事未易了也了事正作癡復為怪耳尚書若時瘝厥官鰥通作瘝見爾雅病也新令尹仁矣乎當期警誨回李知縣庭可雀羅辱再三之相過鄭當時傳翟公為廷尉賔客填門及廢門外可設雀羅門無鳳字有四六之見貽語林嵇康與吕安善每一相思千里命駕安來值康不在兄喜出迎安不前題門上鳳字而去喜不覺猶以為欣康至曰鳳凡鳥也王維詩到門不敢題凡鳥看竹何須問主人委重良多報嘉不腆恭惟某官器資肅括才具碩膚並見前祭彤方舉於鉏姦祭彤傳遷襄賁令時天下郡國尚未悉平襄賁盜賊白日公行彤至誅破姦猾殄其支黨數年襄賁政清璽書勉勵增秩一等賜縑百匹即墨遽從而造謗史記曰敬仲世家威王召即墨大夫而語之曰自子之居即墨也毀言日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬戶令尹無愠色亟歌歸去之詞童子有仁心迄動巡行之歎魯恭傳豎子有仁心此三異也詳見前再試巖邑左傳制巖邑也巖險之邑四達通衢爾稚一達謂之道路二達謂之岐旁三達謂之劇旁四達謂之衢五達謂之康六達謂之莊七達謂之劇驂八達謂之崇期九達謂之逵人疑故步之迷君若新硎之發吏材如此難逃六察六院之除並見前公論則然何假一話一言之贊尚書自一話一言我則末惟成德之彥以又我受民某緬懷先德幸接後塵力足為器足施非所求於我也栁文俄而有若烏獲者持長綆千尋徐而過焉其力足為也其器足施也問則告疑則辨敢有吝於公哉韓文凡此四子皆可以當執事首薦而極論者主司疑焉則辨之問焉則以告之未知焉則殷勤而語之期乎有成而後止可也代回武陵俞知縣成武陵本漢武陵郡臨沅縣東漢為武陵郡治晉因之梁置武州陳屬武陵郡隋改武陵縣屬朗州後屬武陵郡唐屬朗州宋初屬鼎州後屬常德府剡升陟之章真成僃數儀禮吾子有命且以僃數而擇之鳴謙撝之德更費屬辭受之過情謝若為語恭惟某官槐根之芷荀子蘭槐之根是為芷注蘭槐香草也其根是為芷也本草白芷一名白茝陶隱居曰離騷所謂蘭茞也蘭槐當是蘭茞别名蘭茁其芽韓文幼子娟好靜秀瑶環瑜珥蘭茁其芽稱其家兒也窮武陵之源吾為爾宰王維桃源行當時只記入山深青溪幾度到寒林春來遍是桃花水不辨山深何處尋家語有是哉顔氏之子使爾多財吾為爾宰歌滄浪之水清畏人知滄浪水在龍陽縣二十里浪水與滄水合故號滄浪水寰宇記云在武陵縣西二水合流禹貢又東為滄浪之水乃漁父濯纓之處晉陽秋胡質子威父子清慎名譽著聞歷位宰牧晉武帝見威論邉事語及平生帝歎其父清謂威曰卿清孰與父清威對曰臣不如也臣父清恐人知臣清恐人不知是臣不如者逺也官至前將軍意有雉馴可無鶚薦見前某過勤四六嘉歎再三宋謝伋四六談塵云韓子蒼為舍人曾公衮以啓賀之韓答云舊知四六之工彌起再三之歎即此聫所自來也雖則七襄覺成章之匪報見前儉於百里願賦政之又新詩賦政於外注布政於畿外代回弋陽曽知縣煥弋陽在廣信府西一百二十里本漢豫章郡餘汗縣地孫吳析置葛陽縣晉屬鄱陽郡隋改為弋陽以地有弋水故名唐初屬饒州後改屬信州宋因之已下俱代月湖刺手拔鯨欠丁官之下取韓詩刺手拔鯨牙舉瓢酌天漿又仙官勑六丁雷電下取將長鬚致鯉與甲藁以偕來韓詩先生有意許降臨更遣長鬚致雙鯉不謂垂槖而歸管子小正篇諸矦之使垂槖而入稇載而歸國語同韓文稇載而往垂槖而歸將有埓國之富貨殖傳與王者埓富師古日埓等也恭惟某官汲古得鯁韓詩歸愚識夷塗汲古得修綆績文有機韓文種學績文以蓄其有北史祖瑩以文學見重嘗語人日文章須自出機杼成一家風骨何能共人同生活也僧齊已詩李白李賀遺機杼散在人間不知處聞君收在芙蓉江日鬬蛟人織秋浦夜雨聽阿房之篇英詞偉甚見前春風接曲江之席舊夢瞭然曲江池在今西安府東南十里漢武帝所鑿其水曲折似嘉陵江因名唐開元中疏鑿為勝境都人遊賞盛於中和節江邉菰蒲蔥翠桞陰四合每錫燕臣僚會于山亭池備綵舟唯宰相三司北省官翰林學士登焉宋張禮遊城南記云江以水流屈曲得名其深處下不見底司馬相如賦曰臨曲江之隑洲蓋其地也劇談曰曲江本秦隑洲唐開元中疏鑿為勝境歐陽詹曲江記略曰此地循原北峙回岡旁轉圓環四匝中成坎窞窙窖港洞生泉翕源東西三里而遙南北三里而近崇山濬川鉤結盤護不南不北湛然中停蕩惡含和厚生蠲疾涵虗抱景氣象澄鮮滌慮追歡棲神育靈觀此可以得其槩矣唐劉滄及第後宴曲江詩及第新春選勝遊杏園初宴曲江頭紫毫粉壁題仙籍栁色簫聲拂御樓霽景露光明逺岸晚空山翠墮芳洲歸時不省花間醉綺陌香車似水流謂已方駕於蓬萊張九齡詩方駕與吾友同懷不異尋乃猶讀書於松桂韓詩出宰山水縣讀書松桂林古風一覽恍今日之未聞大册載觀尤小巫之所畏贈我繡段多矣俱見前期君蟠桃可乎東坡和山谷詩期君蟠桃枝千嵗終一嘗某何與斯文亦聿既髦詩借曰未知亦聿既髦曲禮八十九十曰髦角巾東洛諒無煩關尹之迎羊袩傳與從弟琇書曰既定邉事當角巾東洛歸故里為容棺之墟以白士而居重位何能不以盛滿受責乎史記老子傳見周之衰乃遂去至闕關令尹喜日子將隱矣強為我著書於是老子乃著書上下篇言道德之意瓣香南豐請歸為宗𣲖之賀見前代回餘姚趙知縣希祐餘姚在今紹興府東一百八十里舜後支庶所封以舜姓姚故名秦為縣屬會稽郡漢晉以後皆因之隋初省入竒章縣唐初復置又於縣置姚州尋廢州以縣屬越州宋南渡後升越州為紹興府聞武城之絃居多逺韻新唐書韋夏卿字雲客夏卿性通簡好古有逺韻談説多聞剡公車之牘輒及通材嘗試言之莊子嘗試論之荀子嘗試之説鋒起范睢傳豈敢以疑事嘗試於王哉説又嘗口味之也徐曰口試其味也東坡范文正公集序此豈口傳耳授嘗試為之策别嘗試嚌啜以知其才之短長無可謝者恭惟某官月題千里莊子加之以衡扼齊之以月題注月題馬額上當顱如月形者也風翮九霄曾子固詩鴻鵠舉千里鸞鳳翔九霄鯉趨過庭早有聞於夫子虎拜稽首將是似於召公詩無曰豫小子召公是似虎拜稽首天子萬年注似嗣也宣王命召虎日汝無得言我小子耳汝之所為乃汝先祖召康公之功是嗣言其堪繼召公也虎拜稽首者受王命册書也臣受恩無可報謝願君夀考而已觀其製錦而操刀足可衣繡而持斧見前參諸衆見僣以名聞蓋欲僃良師帥之儲董仲舒傳今之郡守縣令民之師帥師帥不賢則主德不宣非止託賢父兄之契某重蒙四六熟復再三舉之愛莫助之更期進德並見前老矣無能為矣何敢獻諛左傳今老矣無能為也已代回長沙楊宰宜中秦以青陽地置湘縣漢為臨湘縣東漢為長沙郡治宋為國齊以後為郡治隋為潭州治改臨湘縣曰長沙五代漢析置龍喜縣宋罷龍喜置常豐縣開寶中廢常豐入焉不鄙雀門見迂鳬舄見前特枉咫尺書之教韓信傳奉咫尺之書師古曰八寸曰咫咫尺者言其簡牘或長咫或長尺喻輕率也今俗言尺書或言尺牘蓋其遺語耳仍惠三百篇之詩拜賜便蕃滿心銜戢陶詩銜戢知何謝冥報以相詒恭惟某官清材汲古韓詩汲古得修綆奧識洞今作賦摩空阿房之縉笏已晚李賀詩殿前作賦聲摩空聞絃管笑長沙之短袖難旋應劭漢書注景帝後二年諸王來朝有詔更前稱壽歌舞長沙定王但張袖小舉手左右笑其袖上怪問之對曰臣國小地狹不足回旋禹稷用心固已失薛郇蘇郭之輩孔顔素學猶不廢房杜王魏之流至於佳句之耽杜詩為人性僻耽佳句語不驚人死不休更覺良工之苦杜詩已知仙客意相親更覺良工心獨苦取數多矣禮記取數多者仁也受言藏之詩彤弓弨兮受言藏之此士落江湖宜為時出山谷詩此士落江湖熟思令人癭諸公登臺省會以名聞杜詩諸公衮衮登臺省某何與斯文亦聿既髦見上條龍鍾韓子低頭負東野之慙昌黎醉留東野詩昔年因讀李白杜甫詩長恨二人不相從吾與東野生並世如何復躡二子蹤東野不得官白首誇龍鍾韓子稍姦黠自慙青蒿依長松低頭拜東野願得終始如駏蛩東野不回頭有如寸莛撞巨鍾吾願身為雲東野化為龍四方上下逐東野雖有離别無由逢刻畫無鹽捧心漫西施之學周顗傳何乃刻畫無鹽唐突西施也詳見前莊子師金曰西施病心而矉其里之醜人見而美之歸亦捧心而效其矉里之富人見之閉門而不出貧人見之挈妻子而去之彼知美矉而不知矉之所以美李詩娥睂不可妬況乃效其矉代回當陽林宰鎰當陽漢屬南郡又為臨沮縣晉臨沮屬襄陽來二繇俱屬南郡後梁置平州又置安居縣廢臨沮隋開皇置玉州未幾州郡並廢屬江陵州大業改荆臺後廢唐武德置平州又名玉州宋開寶五年置荆門軍治當陽老夫髦矣曳履可慙左傳老夫髦矣無能為也曲禮八十九十曰髦令尹何如飛箋見問恭惟某官名父之子蕭育之傳以育名父子著才能王述傳王導謂述曰名父之子不患無祿屈臨小縣自不宜耳山谷詩慶州名父子克世其家學裘之功已深寧能無譜南史山陰東土大縣難為長官傅僧祐在縣有稱子琰為武康令遷山陰令尤明察又著名二縣皆謂之傅聖父子並著竒績時云諸傅有治縣譜子孫相傳不以示人時劉玄明亦有吏能歷山陰令政常為天下苐一琰子劌代玄明為山陰問之玄明答曰我有竒術卿家譜所不載臨别當相示既曰作縣令唯日食一升飯莫飲酒此第一䇿也製錦之技既敏會即策勳某自笑龍鍾寧堪鳩僝見前空憐往日識野鶴於未仙東坡詩何人更識嵇中散野鶴昻藏未是仙猶幸殘年見名駒之汗血杜詩驊騮作駒已汗血鷙鳥舉翮連青雲代回麗水張宰元煥此啓徽本後有錯簡今依抄本改正麗水本漢回浦縣地東漢為章安縣吳為臨海郡松陽縣晉屬臨海又屬永嘉隋平陳分松陽東界置括蒼縣為處州治所唐大厯十四年改蒼水縣西崦投間冒誤恩之起廢崦音淹崦嵫山名山海經鳥鼠同穴西南曰崦嵫下有虞泉日所入韓文投間置散晉書蔡謨傳昔階謬恩蒙忝非據東坡集荷先帝之誤恩又計此誤恩必難安處栁文今兹是州起廢者二焉南鄰借潤駢好語以噓枯白樂天詩今朝自校擡頭語先問南鄰有酒無李賀詩沙路歸來聞好語東坡詩輦路歸來聞好語又山寺歸來聞好語鄭泰傳孔公緒清談高論噓枯吹生返璧未能左傳受餐返璧報瓊何有詩報之以瓊琚毛傳瓊玉之美者恭惟某官人門秀整見首條地望髙華鳬未來京花已開於滿縣風俗通義王喬為業令每月朔嘗詣臺朝臨至時常有雙鳬從南飛來李詩河陽花作縣並詳見前蝗不入境麥自秀於兩岐魯恭傳拜中牟令郡國螟傷禾犬牙緣界不入中牟卓茂傳為密令平帝時天下大蝗河南二十餘縣皆被其災獨不入密縣界東觀漢記張堪為漁陽太守勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支此下徽本有脫簡補續云某寤寐懷歸倦遊已久沭誨音之已厚虗辱品題愧馳謁之未能但慙衰朽與上文不相蒙今依家藏本改正如後行用最聞即膺世選尚書世選爾勞某髮真種種左傳余髮如此種種余奚能為心已休休見前懼方命之見誅尚書方命圮族聊強顔而入侍不能者止更數月以乞歸儻疾其驅或一面而後去代回常寧曹宰輔世常寧已見此後二條徽本闕今補老夫髦矣誤隨弓旌之招家語旌以招大夫弓以招士詩翹翹車乘招我以弓文選納旌弓於鉉台餘見前令尹何如更加錦繡之贈置慙無所陳書蕭摩訶傳老夫受脈專征不能戰勝攻取今被圍逼慙置無地懷感有之恭惟某官抱挾長材踐揚膴仕詩瑣瑣姻亞則無膴仕展驥足於百里料亦賢勞見前缺鹿鳴之三章猶稽改秩禮記小雅肄三官其始也鄭注小雅之三謂鹿鳴四牡皇皇者華也孔疏按鄉飲酒禮燕禮皆歌鹿鳴四牡皇皇者華又穆叔如晉歌小雅三篇故知鹿鳴四牡皇皇者華也權勢逼迫無患有司不公韓文行患不能成無患有司之不公政化流聞惟善能舉其類蠖伸於屈易尺蠖之屈以求伸也鵬怒則飛莊子鵬怒而飛翼若垂天之雲姑安種秫之期秫食律切説文稷之黏者增韻糯也陶濳傳在縣公田悉令種秫以俟及瓜之代某儀圖莫助有味薦賢見前借聽於聾求道於盲莫報勤渠之意昌黎答陳生書今之負名譽享顯榮者在上位幾人足下求連化之術不於其人乃以訪愈是所謂借聽於聾求道於盲雖其請之勤勤教之云云未有見其得者也加膏而光養根而實更伸頌禱之私昌黎答李翊書養其根而俟其實加其膏而希其光根之茂者其實逺膏之沃者其光曄代回興寧廖宰槻興寧本龍川縣地晉置興寧縣屬東管郡隋屬龍川郡唐屬循州貞觀省齊昌縣入焉南唐改齊昌府宋仍為縣鴻飛踏雪談舊事以無人東坡詩人生到處知何似應似飛鴻踏雪泥詳見前烹鯉得書知故人之有子因之喚夢山谷詩為公喚起黃州夢何以報嘉恭惟某官父教之忠世濟其美見前蚤回翔於簿領似屈鸞棲禮記翔回焉梁書朱異傳當局簿領伏挺傳簿領流廢王瞻傳不廢簿領劉孝綽傳簿領亦宜稍習何敬容傳勤于簿領又簿領文案不復經懷陳書黃法氍傳便書疏間明簿領南史張率傳未嘗留心簿領稍剸決於紏曹諒多鶚薦顧動鳴絃之興欲明製錦之才會觀棠蔭之成亟騰善最並見前雖在梅花之外必有賞音杜詩漢節梅花外春城海水邉某夕陽在山爾雅山西曰夕陽郭璞注暮乃見日邢昺疏日即陽也暮始得陽故名夕陽詩度其夕陽豳居允荒是也宋景文公筆記云莒公嘗言夕陽朝陽指山之處耳後人以夕陽謂斜日誤矣劉琨詩云夕陽忽西流古人亦誤用久矣浮雲出岫乃蒙篋笥之不遺千里所期願以民社而自愛回新西水勾龍知縣西水縣本秦閬中縣地後周置西水縣宋屬閬中元省新并新政西水三縣入南部縣今因之屬保寧府西水故城在今府西二十里僮僕來迎知已返柴桑之里歸去來辭僮僕歡迎稚子候門柴桑城在今九江府城南九十里漢置柴桑縣屬豫章郡隋改曰湓城柴桑山在德化縣西南九十里近栗里源靖節祠在焉白樂天訪陶公舊宅詩今來訪故宅森若君在前不慕樽有酒不慕琴無絃柴桑故村路栗里舊山川不見籬下菊但餘爐中煙舍館未定無敢過干木之廬史記魏世家文矦受子夏經藝客段干木過其廬未嘗不式也敢圖將進趦趄之間韓文足將進而趦趄竟蒙先垂特達之顧見前恭惟某官蜀都秀望王雅傳帝以恭等為當時秀望漢殿巍科跨躡犍牂良鬱康莊之驥步犍為牂牱皆郡名爾雅道路五達謂之康六達謂之莊栁詩秦民啼畎畝周士舞康莊鞭笞鸞鳳久棲官舍之燕巢韓詩上界真人足官府豈如散仙鞭笞鸞鳳終日相追陪兹聞西水之鳴琴行趂東風之叱馭劒門天下壯時皆收攬於胸中杜詩惟天有設險劒閣天下壯連山抱西南石角皆北向西崖崇墉倚刻畫城郭狀一夫怒當關百萬未可傍閬州城南稀更合包羅於筆下杜詩閬水歌嘉陵江色何所似石黛碧玉相因依正憐日破浪花出更復春從沙際歸巴童蕩漿倚側過水雞銜魚米去飛閬中勝事可腸斷閬州城南天下稀藉未召卓茂於密令卓茂傳遷茂為京部丞密人老少皆涕泣隨送光武即位先訪求茂乃下詔曰前密令卓茂束身自修執節淳固誠能為人所不能為夫名冠天下當受天下重賞今以茂為太傅封褒德矦會有言茍變於衛矦通鑑子思言茍變於衛矦曰其材可將五百乘公曰吾知其可將然變嘗為吏賦于民而食人二雞子故弗用也子思曰夫聖人之官人猶匠之用木也取其所長棄其所短故杞梓合抱而有數尺之朽良工不棄今若處戰國之世選爪牙之士而以二卵棄干城之將此不可使聞於鄰國也某兹戍雪邉杜詩鷗鳥鏡裡來關山雪邉看在公宇下左傳况在衛君之宇下而敢有異志又大國在敝邑之宇下是以告急按大國敝邑顛倒宜云敝邑在大國之宇下世説庾太尉少為王眉子所知庾遏江漢王曰庇其宇下使人忘寒暑置漢陽之薤方當求聽於鯁言種河陽之花又恐亟飛於鳬舄俱見前回新榮德王知縣子勉榮德本漢南安縣地齊屬南安郡隋置太牢縣屬資州唐析太牢置旭川縣以縣置榮州天寶初改和義郡乾元初又為榮州宋初因之治榮德縣後升為紹熙府倦甚衰翁已作歸歟之計杜詩肺氣久衰翁賢哉令尹甫聞至止之音甫始也有勤屬辭良髙陳誼恭惟某官才優世濟學富家傳頌聖主之得賢遙遙風烈王褒傳益州刺史奏褒有軼材上乃徴褒既至詔褒為聖主得賢臣頌其意文多不載移忠臣而為孝挺挺雲仍孝經君子之事親孝故忠可移于君王尊傳王陽為益州刺史行部至卭郲九折阪歎曰奉先人遺體奈何數乘此險後以病去及尊為刺史至其阪問史曰此非王陽所畏道耶吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣若為牛刀之割雞更欲蟻封而試馬見前三榮之強名郡縣井有仁焉井有仁焉注疏皆以為仁人墮井此借用榮州即今嘉定州榮縣蓋蜀鹽出於井寬之則民受其惠故曰井有仁焉兩年括利錙銖泉之竭矣詩池之竭矣不云自頻泉之竭矣不云自中箋泉中水生則益深水不生則竭此亦借指井鹽或恐一雞之損尚俟雙鳬之來幸疾華鑣鑣馬銜也韓詩清塗振華鑣以别利器虞詡傳不遇盤根錯節何以别利器乎某﨑嶇一障坎壈兩期坎苦感切説文陷也增韻儉也小阱也壈盧敢切坎壈不平一日失志也增韻屯蹇不得志也楚辭志坎壈而不違杜詩但看古來盛名下終日坎壈纒其身秋水落霞已決尋盟於鷗鷺膝王閣序落霞與孤鶩齊飛秋水共長天一色山谷詩惟有白鷗盟未寒又老驥心雖在白鷗盟已寒春雷奮地尚觀運化之魚龍易雷出地奮豫孔疏雷是陽氣之聲奮是震動之狀雷既出地震動萬物被陽氣而生各皆逸豫回王知縣應酉求士為國輒剡牘於公車博我以文敢收恩於私室見前一謙厚甚三復悚然恭惟某官學問淵源器能凝逺揚雄有河東之賦吹噓宜上於九天杜詩揚雄更有河東賦唯待吹噓送上天溫造空冀北之羣羅致敢違於三月昌黎送溫處士赴河陽軍序大夫烏公以鈇鉞鎮河陽之三月以石生為才以禮為羅羅而致之幕下未數月也以溫生為才於是以石生為媒以禮為羅又羅而致之幕下餘詳前兹表一鶚聊助雙鳬何勤四六之貽更致再三之謝某推轂有味並見前引鼎不程禮記引重鼎不程其力詳見前諸侯薦人與之諸侯安敢自必於天子國士遇我報以國士所祈自拔於衆人見前回遂寧青石席知縣遂寧為漢廣漢縣又分為德陽縣東晉於德陽縣界東南置遂寧郡後周置遂州又改曰石山郡唐改為遂州改遂寧郡復為遂州升東川防禦使又升武信軍節度宋因之提舉合遂等七州兵甲徽宗濳邸升遂寧府元改為州今為縣𨽻潼川府青石縣在州北五十里舊名晉興西魏改青石隋唐屬遂州宋屬遂寧府元併入小溪縣又併入遂寧州今為遂寧縣青石山在今蓬溪縣南一百七十里山有青石可為鍾磬縣以此得名伏以十年一别謂已造於筍班萬里重來胡尚淹於花縣逺勤一介見畀雙鱗並見前恭惟某官政地名家祖風餘韻魏謨傳挺挺有祖風烈故國之非喬木將在蘭蓀説文蓀香草也陶隱居云蓀生溪側似石菖蒲而葉無脊亦作荃大厦之無棄材寧遺杞梓韓詩大匠無棄材尋尺各有施況當營都邑杞梓用不疑顧限七階之選見前復疇百里之庸栁文皇天疇庸審厥保承會由晉興解見題下徑登魏闕某去此十暑杜詩十暑岷山葛依然一寒范雎傳范叔一寒如此哉不獨再辱於甄陶蜀志譙周傳再辱之恥何與一辱俾守三榮之保障紙書賢於十部過勤聫璧之貽終日雖則七襄終愧雙金之報俱見前回盤石李知縣盤石即漢犍為郡之資中縣後周改盤石縣以州北有石如盤陀得名徙資州治此兼置資中郡隋初廢郡後改州為資陽郡唐改郡為資州天寶初復為郡乾元初又為州宋為資州治元省入簡州今成都府資縣是也一麾假守獲託鄭鄉十部遺書過勤郇翰見前愧先施之不敏仰厚意以安窮韓文仰盛德以安窮兮恭惟某官唐太白之家蜀仲元之𣲖李仲元見法言見前麟為聖人出也亦既在郊韓文麟之出必有聖人在乎位麟為聖人出也詳見前鳳覽德輝下之是宜巢閣賈誼傳鳯皇翔於千仞兮覽德輝而下之尚書中候堯即政七十載鳳凰止庭巢阿閣歡樹顧屈一同之尹式騰三異之聲見前君子學道則愛人諒牛刀之立解縣令承流而宣化佇鳬舄之橫飛董仲舒傳今之郡守縣令民之師帥所使承流而宣化也某濫號專城適逢竭澤見前是邦大夫之賢者何以教之東坡答楊屯田啓聽其言信仁人之溥哉居是邦蓋大夫之賢者吾黨小子之斐然願有請也回劍門王知縣劍門本漢葭萌縣地蜀先主以霍峻為梓桐太守是時有劍門縣有閣道至險及有閣尉諸葛武矦於此立劍門秦苻堅遣余成冦蜀攻二劍克之始有二劍之號隋置閣之地皆有關官而於二劍尚未置關唐置劍門縣劍門始置關又有大劍戍小劍鎮五代時董璋遣兵扼劍門關為七寨又於關北置永定關宋伐蜀克劒門擒蜀將王昭逺以劒門縣隸劒門關兵馬都監主之南渡以來劍門關亦列在利路十七郡之數領縣一治劒門分榮德之麾濫乘一障見前聞湛恩之閥實冠四封司馬相如傳湛恩汪穢湛讀曰沈穢於喙反左傳我有四封而詰其盜史記張儀傳繕甲厲兵守四封之內未遂盍簪易朋盍簪注疏盍合也簪疾也若能不疑於物以信待之則衆隂羣朋合聚而疾來也此借用王荆公詩天涯無路盍朋簪歐陽公詩惜豫不與朋合簪猥勤貽翰恭惟某官人門具美天分夙髙並見前此笏乃今甘棠式光龜組新唐書魏謨傳此笏乃今甘棠衛宏漢舊儀列侯黃金印龜鈕文曰印丞相將軍黃金印龜鈕文曰章故國非謂喬木蓋在象賢藉魁竒忠信之才韓文意必有魁竒忠信材德之民生其間守崢嶸崔嵬之險蜀道難劍閣崢嶸而崔嵬一夫當關萬夫莫開佇交鶚薦徑作飛鳬某濫剖銅符獲倚珂里張嘉佑傳嘉佑任金吾昆弟每朝軒蓋騶輿盈閭巷世號所居日鳴珂里未見顔色願聞拔薤之規見前聊欲絃歌尚邇伐柯之則陶濳傳聊欲絃歌以為三徑之資可乎回新應靈趙知縣與侃榮州唐為應靈州改和義郡後為榮州宋立應靈縣與榮德威逺資官同隸榮州今廢瞻五潢之𣲖知敬清流漢天文志軫西宫咸池曰天五潢晉天文志三柱九星在畢北其中五星日天潢三國志注沐並戒子書材質滓濁汚於清流懷百里之章將迎新尹有勤一介先畀雙鱗恭惟某官大雅不羣並見前小宗繼别禮記别子為祖繼别為宗繼禰者為小宗注諸侯之庶子别為後世之始祖也謂之别子者公子不得稱先君别子之世長子為其族人為宗所謂百世不遷之宗别子庶子之長子為其昆弟為宗也謂之小宗者以其將遷也精石渠五經之學豈必祕鴻寶之藏劉向傳會立榖粱春秋召更生受榖粱講論五經于石渠淮南有枕中鴻寶苑祕書言神仙使鬼物為金之術及鄒衍重道延命方世人莫見而更生父德治淮南獄得其書更生幼而讀誦以為竒獻之酌玻璃七寶之杯自合受龍巾之寵李翰林别集序太白進清平調詞三章上命梨園子弟略約調撫絲竹使李龜年歌之上調玉笛以倚曲太直妃持玻璃七寶杯酌西涼州葡萄酒笑領歌詞意甚厚妃飲罷斂繡巾重拜乃肯宰山水之縣殆欲聞絃歌之聲一同歡然三異近只並見前某濫兹試郡幸甚得朋易西南得朋東北喪朋注西南致養之地與坤同道者也故曰得朋杜詩遲暮嗟為客西南喜得朋似聞製錦之刀既有所試更冀發硎之刃早疾其驅見前回三縣知縣三縣蓋威逺資官應靈皆榮州所轄出幕罔功一星周矣杜詩十年出幕府自可持旌麾尚書敷同日奏罔功左傳十二年謂一終一星終也注嵗星十二嵗而一周分符非據二火曄然易非所據而據焉道經云兩火一刀可以逃言剡中多名山可避災也榮字亦二火故云賴有同官之良或可聫事而治伏惟某官揆才膚敏迪德浚明學古入官小試子男之國尚書學古入官議事以制孔注言當先學古訓然後入官治政凝民以政共知父母之心佇交一鶚之章即趣雙鳬之覲某濫兹假守幸甚為寮共惟帝臣正賴同心之協濟尚書萬邦黎獻共惟帝臣孔傳萬國衆賢共為帝臣頗哀老子諒無袖手以旁觀馬援傳頗哀老子使得遨遊韓文巧匠旁觀縮手袖間回資官文知縣資官亦屬榮州今廢此啓蓋為徴發愆期故多誚讓之辭無嚴諸侯必反之君方養勇趙歧注無有尊嚴諸侯可敬者以惡聲加已已必以惡聲報之所養育勇氣如是與老人期後何也僕欲踐言張良傳父去里所復還日孺子可教矣後五日平明與我期此良因怪之跪曰諾五日平明更往父已先在怒曰與老人期後何也比立青紫囊以馳束觀漢記制尚書以青布囊素封書謝玄傳好佩紫羅香囊此青紫囊蓋用以盛文書者如丙吉傳赤白囊之類欲易黃皂衣之擾谷永傳皂衣之吏此黃皂衣蓋指吏胥輩不虞返斾斾蒲蓋切説文繼旐之旗沛然而垂廣韻旗也繫旐曰斾左傳令尹南轅反斾注將歸也更自寒盟左傳吳子使太宰嚭請尋盟公不欲使子貢對曰盟所以周信也寡君以為茍有盟焉弗可改也已若有可改日盟何益今吾子必曰尋盟若可尋也亦可寒也尋溫寒歇也言若重溫使熱亦可歇之使寒同僚敢不盡心自關大體左傳吾嘗同僚敢不盡心乎丙吉傳以吉知大體未信以為厲已故示小懲易小懲大戒兹望白圭之磨且聽青氊之復見前信近於義言可復也已更寬期會之程賈誼傳大臣特以簿書不報期會之間以為大故過而能改善莫大焉幸無託催科之拙左傳人誰無過過而能改善莫大焉回新宜賔黃知縣慥宜賔本漢犍為郡僰道縣後周改外江縣隋復為僰道縣唐為義賔縣宋改宜賔為敘州治所恭審榮分蒲璧入覲蘭陔束晢補亡詩南陔孝子相戒以養也循彼南陔言采其蘭眷戀庭闈心不遑安牛刀割雞更遡倒流之三峽杜詩詞源倒流三峽水鳳簫駕鶴來寧未老之雙親列仙傳蕭史秦穆公時善吹簫能致白鶴孔雀公女字弄玉好之以妻焉遂教弄玉作鳳鳴居數十年鳳凰來止其屋為作鳯臺夫婦止其上不下數年一旦皆隨鳳凰飛去故秦氏作鳳女祠喜氣先驅歡聲夾道韓文夾道而疾馳恭惟某官器資膚敏業履崇竑讀江夏未見之書盍登東觀黃香傳香博學經典究精道術能文章京師號曰天下無雙江夏黃童初除郎中肅宗詔香詣東觀讀所未嘗見書講延平相傳之學宜侍西廂宋道學傳李侗字願中南劍州劍浦人年二十四聞蜀人羅從彥得河洛之學從遊纍年從彥令靜中看喜怒哀樂未發前氣象而求所謂中者學者稱為延平先生周昌傳側耳於東廂聽注正寢之東西室皆曰箱言如箱篋之形上林賦象輿婉僤於西清注西清者西箱清淨之處若為出邾子之城邾曹姓顓頊之後周武王封其苖裔邾俠為附庸齊桓公行霸邾儀父附從進爵稱子説文邾江夏縣漢衡山王吳芮所都吳芮傳立芮為衡山王都邾還又宰僰侯之國説文僰犍為蠻夷從人棘聲司馬相如傳略通夜郎僰中注駹筰卬僰四種皆夷名地理志犍為郡僰道注莽曰僰治應劭曰古僰侯國音蒲北反即今敘州府宜賔縣地互見第八卷烏殆思於反哺杜詩林烏反哺聲詳見前燕亦急於歸梁種滿縣之花聊復爾耳見前采行潦之藻其順矣乎詩于以采藻于彼行潦毛傳藻聚藻也行潦流潦也孔疏大夫之妻將行嫁欲為教成之祭言往何處采此藻菜于彼流潦之中采之其順矣乎所謂以順為正也蓋黃令時有婚姻之事付笑談於青油韓詩談笑青油幕養聲名於丹闕李詩揚娥入丹闕鴻漸於陸不素飽也正佇來儀易漸六三鴻漸於磐飲食衎衎吉象曰飲食衎衎不素飽也正義曰素無祿養今日得之故願莫先焉上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀不可亂也王弼曰峨峨清逺儀可貴也鶴鳴在隂其子和之何辭好爵易鶴鳴在隂其子和之我有好爵吾與爾縻之王弼曰立誠篤至雖在暗昧物亦應焉不私權利唯德是與縻散也某蹣跚老矣司馬相如傳媻姍勃窣上金隄媻姍通作蹣跚踸踔依然莊子夔踸踔注足踏也但深吾愛吾廬之思陶詩孟夏草木長繞屋樹扶踈衆鳥欣有託吾亦愛吾廬濫叨我任我輦之役詩我任我輦我車我牛注轉運之役有負任者有挽輦者有將車者有牽傍牛者所幸依闑外之制馮唐傳上古王者遣將也跪而推轂曰闑以內寡人制之闑以外將軍制之注門中橛為闑音牛列反且獲聞庭下之趨悵銅駝陌上之十年陸機洛陽記洛陽有銅駝街漢鑄十二枚在宫南四會道相對俗語云金馬門外聚羣賢銅駝陌上集少年師古曰亦云銅駝街在洛陽西京無也晉懷帝紀步出西掖門至銅駝街陳書徐陵傳盧龍之徑於彼新開銅駝之街於我長閉獲金馬坊中之再見方與勝覽金馬坊在成都府金馬碧雞祠前漢宣帝聞益州有金馬碧雞之神遣諫議大夫王褒持節醮祭而致之宋賜額名昭應廟封其神為靈光侯莫懷漫刺禰衡傳初來遊許下始達潁川乃隂懷一刺既而無所之適至於刺字漫滅驚辱儷箋數面成親況嘗綴葭莩之契陶靖節答龎參軍詩序諺云數面成親舊汛情過此者乎山谷詩數面尚成親況乃居相棟説文莩草也一曰葭中白皮中山王傳非有葭莩之親鴻毛之重師古曰葭蘆也莩其筒中白皮至薄者葭莩喻著鴻毛喻輕薄甚也莩音孚論心道舊所願聞藥石之言新唐書髙季輔傳數上書言得失辭誠切至帝賜鍾乳一劑曰而進藥石之言朕以藥石相報欣幸惟深敷棻罔既見前回崇仁趙知縣崇仁已見鄰枌榆之社聞飛禮樂之英通典漢髙帝初起禱豐枌榆社二年東擊項籍還入關因名縣為公社後四年天下定詔御史令豐謹枌榆社注枌白榆社在豐東北十五里或曰枌榆鄉名高帝里社南史齊世祖在東宫日嘗於玄圃宴集沈文季數勸禇淵酒淵甚不平啓世祖曰沈文季謂淵經為其郡數加淵酒文季曰惟桑與梓必恭敬止豈如明府亡國失土不識枌榆互見前宰松桂之林知報詩書之政韓詩出宰山水縣讀書松桂林萬里偶馳於蜀道見前一㕓實受於滕仁李其邑人未遑馳箋猥辱委翰恭惟某官不羣卓爾無敵飄然見前薰南豐之香文章有種杜牧詩髙摘屈宋豔濃薰班馬香陳後山詩向來一瓣香敬為曽南豐樂東平之善性行無瑕左傳心茍無瑕何惜乎無家摘髭俯拾於巍科韓詩連年收科第若摘頷下髭策足宜騰於要路選詩何不策高足立登要路津留連棲鳳北史王晞嘗詣晉祠賦詩曰日落應歸去魚鳥見留連忽有相王使至召晞不時至明日在丞相西閣祭酒盧思道謂晞曰昨被召已朱顔得不以魚鳥致怪晞緩笑曰昨晚陶然頗以酒漿被責卿輩亦是留連之一物豈直魚鳥而已梁元帝詩人生行樂爾何處不留連邂逅飛鳬當師旅飢饉之餘得賢明慈惠之長佇交鶚表徑上鴛行俱見前某弱念易盈韓詩強懷張不滿弱念缺易盈老形已具陳後山詩老形已具臂膝痛春事無多櫻笋來我任我輦誤令置指以觀風吾愛吾廬但願曲肱而飲水俱見上條惟是玉川之破屋韓詩玉川先生洛城裏破屋數間而已矣仰依蒲邑之茂林家語子路治蒲三年孔子過之入其境三稱其善子貢問曰夫子未見由之政而三稱其善可得聞乎孔子曰吾見其政矣入其境田疇盡易草菜甚闢溝洫深治此其恭敬以信故其民盡力也入其邑墻屋完固樹木甚茂此其忠信以寬故民不偷也至其庭其庭清間諸下用命此其明察以斷故其政不擾也易地則然行亦返曾子之室得人焉耳會當聞言偃之絃回丹稜范知縣乙孫丹稜在眉州西八十里本漢南安縣地屬犍為郡南齊置齊樂郡後周改齊樂縣隋初改丹稜縣又析置洪雅縣俱屬嘉州唐屬眉州宋復以洪雅屬嘉州丹稜屬眉州眉州荀監酒辨之李監稅哲輔原本合為一則徽本分入監當官今仍合之山壘終更已上投間之請段會宗傳谷永閔其老復逺出與書戒曰毋求竒功終更亟還韓文投間置散江鄉改牧莫知誤渥之由唐崔敬嗣為房州刺史中宗安置在州官吏多無禮敬獨敬嗣以親賢待之供給豐贍中宗深德之及登位有某州刺史崔敬嗣既同姓名每進擬御筆超拜者數四及引與語方知誤寵方露悃以控辭荷雲箋之委貺恭惟知縣人門具美天分素髙見前暫紆臺閣之登紆音於説文詘也又曲也縈也周禮連行紆行屈試弦歌之政監酒典刑茂著學問深醇差池宦路之老成差池燕飛貌詩燕燕于飛差池其羽鄭箋謂張舒其尾翼主當糟邱之醲郁當工故切主也廣韻主當陳暄與兄子秀書速營糟邱吾將老焉韓文浸沈醲郁含英咀華監稅器資凝粹學業端深巍峩名第之英淹恤征商之𣙜恤通作恤音與屋韻肅同説文憂也左傳晉人曰天禍魯國君淹恤於外恢恢遊刃足立解於千牛整整華鑣可坐空於凡馬杜牧之詩整整復斜斜佇公車之交剡即要路之疾驅某五技已窮見前再鼓愈淡韓詩有琴具徽絃再鼓聽愈淡已乞歸銅陵之磴或許告還石磴在撫州城西三十二里銅山謝靈運入華子岡麻源第三谷詩銅陵映碧澗石磴瀉紅泉儻共飲玻璃之江尚希愛助玻璃江即蜀江在眉州城外漢安帝以蜀都廣漢犍為為三蜀故名蜀江東坡送楊孟容詩我家峨眉隂與子同一邦相望六十里共飲玻璃江回新神泉史知縣大川神泉本漢涪縣地晉僑置西充國以縣屬巴西郡隋屬金山郡開皇改神泉唐屬綿州宋置石泉軍以龍安神泉隸焉今廢神泉在縣西平地冬溫夏沸氣如附子能愈衆疾今亦不驗矣依芙蓉之幕嘗辱贈言荀子贈人以言重於金石珠玉宰松桂之林未遑執訊韓詩出宰山水縣讀書松桂林詩執訊連連詳見前兹守鳴珂之里見前回劒門王知縣條還蒙投璧之光恭惟某官器宇宏深梁書朱異傳器宇𢎞深神表峯峻王僧辨傳器宇𢎞深風格詳逺丰神峻整陽休山立克世金魁之家玉潤冰清近續符溪之學衛玠傳玠妻父樂廣有海內重名議者以為婦公冰清女壻玉潤暫牛刀之小試即鶚表之交飛論坡頴歐蘇之文既聞耳矣食貨志既聞耳矣如淳曰聞於天子之耳嗣嚴揚陳李之響尚寓目焉嚴君平揚雄陳子昻李白皆蜀名人陳後山詩異人間出駭四方嚴王陳李司馬揚左傳得臣與寓目焉言得寄目某未果避堂見前先蒙枉駕拜關雎五章之貺真盈耳以洋洋毛詩關雎五章章四句正義云五章是鄭玄所分歌白駒一束之詩無遐心而皎皎詩皎皎白駒在彼空谷生芻一束其人如玉毋金玉爾音而有遐心正義云言乘皎皎然白駒而去之賢人令在彼大國之中矣汝於彼所至主人禮餼雖薄止有生芻一束耳當得其人如玉者而就之不可以貪餼而棄賢也餘見前回新都史知縣奉溫新都在成都府北六十五里本漢舊縣屬廣漢郡後置新都郡晉徙新都郡治維縣仍屬焉梁置始康郡西魏郡廢隋改新都曰興樂縣後併入成都唐復置新都縣宋因之聞武城之歌未窺半面謝承後漢書應奉嘗詣彭城相袁賀賀時出行造車匠於內開門出半面視奉後數十年於路見匠識而呼之北齊書楊愔聰明強識半面不忘每有所召問或單稱姓或單稱名無有誤者後有選人魚漫漢自言猥賤獨不見識愔曰卿前在元子思坊騎秃尾草驢經見我不下以方麴障面我何不識卿漫漢驚服人調之曰名以定體漫漢果自不虛互見前讀阿房之賦敢靳一言靳居焮切韻會吝也粗欲無患其不公進學解行患不能成無患有司之不公敢冀有文以相接董仲舒傳粲然有文以相接歡然有恩以相愛此人之所以貴也恭惟某官玉壘名閥玉壘山在灌縣西北二十九里湔水所出左思賦包玉壘以為宇郭璞賦玉壘作東别之標杜詩玉壘浮雲變古今金魁故家文勝質質勝文不難百勝史記百戰百勝趙充國傳戰而百勝非善之善者也學優仕仕優學信是兩優戰青袍白紵之中東坡送李方叔詩青袍白紵五千人知子無怨亦無德鏗緑綺黃鍾之韻梁元帝纂要古琴名有清角鳴廉修況籃脅號鐘自鳴空中繞梁緑綺焦尾鳳凰注緑綺司馬相如琴樂叶圖徵黃鐘生一一生萬物故君子鑠金為鐘比見天地人之策本本元元班固西都賦元元本本殫見洽間漢書敘傳元元本本數始於一可知果達萟之材恢恢綽綽漫爾吹河東之賦俾之空冀北之羣其叨領竹符獲依枌社並見前於我本無怨而無德詎敢收私室之恩見上文贈行不以頌而以規更願直大廷之對昌黎送許郢州序余與使君非燕遊一朝之好也故其贈行不以頌而以規回青神權縣嚴縣丞酉青神縣在眉州南八十里本漢安南縣地屬犍為郡西魏置青衣縣蓋取蠶叢氏青衣以勸農桑為名後周改青神縣併置青神郡隋初罷郡以縣屬嘉州唐屬眉州宋因之聞蜀莊之珍幸於既見王貢兩龔鮑傳序谷口有鄭子真蜀有嚴君平師古曰地理志謂君平為遵三輔決録云子真名朴君平為尊則君平子真皆其字也蜀珍詳見前詩既見君子我心則降見韋郇之牘得所未聞韋陟傳襲郇國公常以五色箋為書記自謂所書陟字若五朵雲時人慕之號郇公五雲體報不成章詩不成報章還若為贄儀禮士相見禮主人復見之以其贄曰嚮者吾子辱使某見請還贄於將命者注復見之者禮尚往來也以其贄謂嚮時所執來者也恭惟某官岷峨峙秀江漢濯靈貢鄉英門率出下風之請韓詩嵗貢鄉曲英莊子黃帝順下風膝行而進左傳羣臣敢在下風鄒陽傳竊髙下風之行以春秋對亟膺上計之招嚴助傳賜書曰君厭承明之廬勞侍從之事懷故土出為郡吏間者闊焉久不聞問其以春秋對無以蘇䅈從橫居然全材屈此贊府南部新書裴子雨為下邳令張晴為縣丞二人有聲氣而善言語曾論事移時吏人竊相謂曰縣官甚不和長官稱雨贊府即道晴贊府稱晴長官即道雨終日如此非不和乎有來寄箋於紫夾夾音夾説文衣無絮徐曰夾衣也或作夾史記胸奴傳服繡夾綺衣注言繡表綺裏知既攝宰於青衣注見題下佇奏一同之庸亟登三異之最見前躡故迹破崖岸端使然哉昌黎藍田縣丞廳壁記博陵崔斯立以大理評事再轉而為丞喟曰丞哉丞哉余不負丞而丞負余則盡枿去牙角一躡故迹破崖岸而為之又諺數慢必曰丞至以相訾謷丞之設豈端使然哉馳閶闔入凌競自此升矣甘泉賦馳閶闔而入凌競師古曰凌競者言寒涼戰栗之處楊震傳先生自此升矣昌黎接後進之名何為至我昌黎答劉正夫書凡舉進士者於先進之門何所不往先進之於後輩茍見其至寧可以不答其意耶來者則接之舉城士大夫莫不皆然而愈不幸獨有接後輩名名之所存謗之所歸也董仲舒傳此言何為至我哉藍田愁羣山之望行又見君昌黎雪後寄崔二十六丞公詩藍田十月雪塞關我興南望愁羣山攢天嵬嵬凍相望君乃寄命於其間四六標準卷三十三
