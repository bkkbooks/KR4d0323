  - {type: variant, offset: 9940, length: 330, content: 東坡八境圖詩序云南康八境圖者太守孔君之所作也君既作石城即其城上樓臺觀榭之所見者而作是詩也東望七閩南望五嶺覽羣山之參差俯章貢之奔流雲煙出沒草本蕃麗邑屋相望鷄犬之聲相聞觀斯圖也可以茫然而思粲然而笑慨然而歎也䖍州八境詩坐看奔灘遶石樓使君髙㑹百無憂三犀竊比秦太守八詠聊同沈隱侯濤頭寂寞打城還章貢臺前暮靄寒倦客登臨無限思孤雲落日是長安白鵲樓前翠作堆縈雲嶺路若為開故人應在千山外不寄梅花逺信来朱樓深處日微明皂盖歸時酒半醒薄暮漁樵人去盡碧溪青嶂遶螺亭使君那暇日參禪一望叢林一悵然成佛莫教靈運後著鞭從使祖生先却從塵外望塵中無限樓臺煙雨濛山水照人迷向背只尋孤塔認西東煙雲縹緲鬰孤臺積翠浮空雨半開想見之罘觀海市絳宮明滅是蓬莱回峯亂嶂鬰參差雲外髙人世得知誰向空山弄明月山中木客解吟詩, SBCK: ''}
