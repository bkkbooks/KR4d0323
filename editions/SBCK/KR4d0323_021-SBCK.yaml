front:
  text: 十九
  hash: sha256:9340996fc6c404c0ff856bacaed35ee78791a147a2c7e1eb2a4e61cbdc984deb
body:
  text: 六院代回史文思彌忠率其屬以僝功慙於尸位簡乃僚而剡奏幸甚得賢公義冝然私謝何也恭惟某官早収名第晩歩選階鶺鴒在原固不私詔王之爵禄鴻鴈于野寕當廢治丗之羽儀茲聮事之偶同難見善而不舉惟是四六之惠則貽方寸之慙某非曰納交聊復借重子􅀂無言幾失子幸暮取之拔尤君家所有更贈君無嵗寒而易葉代回黄文思燾共工率屬獲陪郷曲之英應格薦賢實致􅀖家之助是爲公舉何以謝爲恭惟某官早决科名乆淹選調學􅀷純而有本氣穏重而不浮乆矣卜鄰欠李邕之識面偶然結綬勤貢禹之彈冠何愛一鶚之章少效匹雛之力名節皎日冨貴浮雲願無忘激昻之言庶不孤期待之意某不善爲斵兆足以行偶成一簣之山亦持自賀切玩連編之月却愧所蒙代回王文思自適聮事爲僚見賢當舉同年有子相識已深輙剡櫝於公車豈収恩於私室恭惟某官丗濟其美父教之忠不謂二十年之間未脫六七階之選聊爲破白何必謝青某老矣斵輪味於推轂奏記誓報非所望於髙明處事律身願不孤於題品代回趙文思師㮚率屬共工已愧薦賢之不武陳篇奏記更勤博我之以文恭惟某官天􅂀甚淸人門具美轅駒奏歩自是千里之竒方鳩僝功未脫七階之選察其實歷當以名聞某不勝匹雛濫長五雉同官爲僚之義固巳盡心爲善最樂之功更期勉力代回彭文思耕五雉爲工正甚幸爲僚􅀟魚有尺書先勤委贄恭惟某官崇蘭流馥喬木故家在梓匠輪輿亦足以試有凖繩規矩何患無成所恐出入如相避然莫助左右爲先容也某濫茲攝長行矣告休聞弦賞音巳認相求之意留渴待飲所望見察以情代回龔告院堪疇庸外轄服釆中朝乃積乃倉乃糧乆勤回謁如絲如綸如綍盍頼主張恭惟某官學本家傳羙由丗濟京邑翼翼恬於風月之分江漢浮浮􅁉此丘山之積進掌四司之吿出專一札之文諒不俟駕而行必有勿藥之喜某凄其骯髒乆此蹣􅘐巳騰二冝去之章足以行矣猶及再相别而去頋不幸哉代回万俟檢院侣渙奉明綸晉司理匭導人使諌聖上實千載之逢命汝納言堂下無萬里之隔恭惟某官丗濟其美德浮于言練詳臺閣之儀服襲廟堂之學積勞于外益閎其中果騰列剡之章入掌四方之牘告嘉謀于后應無不得其言下膏澤於民亦有無窮之聞某未遑燕賀先辱魚牋驅飛廉而􅀉聲恍巳迷於昨夢排閶闔而披腹猶有望於朝陽代回新監文思院門史從政弥忠分職率属疇􅀂予工同官爲寮徒得君重貽書寵甚陳義曄然恭惟某官氣節雄􅀷詞華炳蔚丹穴五色皆鳴孤竹之聲青雲共登巳正三槐之面居然歛板獨此抱􅀜漢相不以兄故私未妨緩歩史魚直哉􅀖有道願接芳塵某爲長於斯懷歸乆矣或論道或審曲等是王官非邀譽非納交願成晚器架閣代回吳架閣柔勝起自珍祠入司故府人登龍断孰知静退之風公不蠅營冝有登崇之命恭惟某官器資莊􅁉德履淑均讀數萬言信一第之直溷子閱三十載猶屢薦而不入官茲回香火之功名來主文書之凡閣假途數月發軔九衢某有幸協恭先勤遣記匪我言耄實慚堂下之斵輪及爾同寮知免䄂間之縮手代回薛架閣君用渙奉新綸晉司故籍文書盈於几愛莫助之牒訴裝其懷今知免矣恭惟某官河東鸑鷟冀北麒麟自中雋於文闈即舒翹於侯泮鴟梟未集豺虎巳多車轔轔馬蕭蕭君誰與守印纍纍綬􅀂􅀂吾不徒行冝哉薦􅀭有此除寵佇憲章之明習即臺閣之飛騰某甚愧濫巾猥勤衘䄂居州在宋真足爲王所之賢夫子却齊願更觀儒者之效代回曽架閣凖奉一扎之新除司兩部之故籍簿書獄訟之事似屈長材文學禮義之官豈非妙選未繇旅賀猥辱損牋恭惟某官琴瑟廉温琮璜秀潤摩空作賦早呼殿陛之臚重席談經乆繫堂堦之馬身纔趍於幕府名益震于京師朝方虛掌故之貟人皆有欲炙之色下交章而薦禰上弄印以授堯群無留良衆乃退聽今雖刑清而役簡政湏綱舉而目張几閣文書何厭數旬之客朝廷翰墨㑹歸三館之英某一自識賢數勤委贄引重鼎不程力長恐見􅀏於大方旣識路又疾驅敢願益堅於壯履代回黄架閣伯劑渙奉新綸晉司故府爼豆軍旅之事允藉通材文學禮義之官亶爲妙選恭惟某官蟠書拄腹取第摘髭􅀕竈一同有珞珞琭琭之氣隨軺萬里無無剌剌之情流聲實於朝廷主文書於几閣更培風力㑹决雲衢某何與推賢過勤委翰投我木李莫輸論報之情期君蟠桃姑冩願忠之意梅亭先生四六標凖卷之十九梅亭先生四六標凖卷之二十制帥賀桂侍郎如淵再任制帥知榮州作進直奎文借留井絡惟益部剌史之􅀉在漢巳嚴而瀛洲學士之官至唐尤重備兹異數允在真儒恭惟某官器博以周材洪而毅文武式萬􅀖之憲精神折千里之衝江漢經營早追蹤於羊杜日月獻納旋接武於䕫龍帝念岷峨地連関陜四松􅀱對中權足壯於前茅尺箠䇿勲數節可窺於破竹爰進真學士之職式重大元帥之威河内共借於㓂君䄡帷暫駐􅀜中旣留於蕭相營壘益堅光増東壁之圖書權重北門之管鑰式遄衮繡歸耀旂常某乗障雪邊庇身宇下愧涸魚之喁噞隨賀燕以差池牽牛而奪之牛誰能回幕中之辯御馬而窮其馬度决非門下之心儻或愛尺寸之膚更幸貸斗升之水我有二天之飲酒誰敢望於私恩爾來三月之無塩更乞參於公議其爲頌望曷旣敷陳賀黄安撫大卿除工部侍郎仍兼安撫制置副使渙􅁽元戎升卿起部修車馬備噐械夙重小司空之權閱禮樂崇詩書將正大行臺之任命申重巽驩溢全坤恭惟某官知勇且仁直方而大肝膽鍾一􅀟之劒精神峻百丈之峯叔度萬頃之陂丗莫得而澄撓次公重臨之政人轉服其寛明坐令火井之沈熒真覺雪山之増重敬刑而成三德旣平夏辟之三千事典以治萬民爰長冬官之六十藉五雉五工之正挽一􅀛一琴之留當益州疲敝之秋湏朔方精明之令星辰聽履豈但髙法從之班日月爲常佇滿載元功之籍某承流支郡席芘和門誰其采白露之葭頋使轉青天之粟不能者止未容叱馭而驅之克壯其猶尚􅀝約軝之率只賀聶侍郎子述除制置代董侍郎躋班禹閣宅牧蜀都輟言語侍從之臣盡護諸將藉文武威風之帥式遏四夷渙號風行坤垠雷動恭惟某官氣嘘海岱胸湛氷霜善刀遊肯綮之間全牛立解意匠淡經營之表凢馬坐空惟其日千里而有餘是以嵗九遷而無慊鸞臺鳯閣積彌縫輔賛之功螭陛雞翹弘獻納論思之益上矜逺服中遣近臣弄印無以易堯爰峻西清之職披圖指以示禹俾圖北代之功惟真學士象十二月之班而大府帥緫六十州之重玁狁匪茹湏方叔之壯猷皇帝曰嘻命崇文而奉詔不但洗岷峨之愴又將蕩秦隴之妖玉壘旣安金甌必啓某五年承乏百􅇊巳窮頼公爲父老而來許我託子孫之契田間索栗看即騰新尹之誇門外種􅀲便可遂故侯之隱賀聶侍郎交割代董侍郎㳙選剛辰恢張制閫千二百里之邊面威令風行六十餘郡之人心驩呼雷動恭惟某官秀姿玉峙烔識冰明鞭霆駕風旣出漢廷臣之右捫參歷井肯爲蜀父老而來行宣暢於皇靈即蕩摇於戎索佛狸之死夘有數何待來年晉公之雄甲成功應在今日氣色一新於壁壘勲勞滿載於旂常某聳聞建牙遂可納履催飛將而追驕虜正虞或累於躍歸鞍而飛賀書猶兾亟諧於邂逅賀聶制置子述庭􅀭成渙閫制全坤璧府奎圖莫重東頭之學士參旂井􅃏况專西道之行營夷虜膽寒士民心愜恭惟某官天資弘毅風采浚明精神五兵六丁莫擬其銳肝膽一劒百壬争避其鋒䇿勲自馴雉而來取官有驅羊之易今之從政容有位隆而道汚公所過人正惟功大而心小兹煩雍橐來牧蜀都許以金城之便冝盡護玉􅀜之疆場三分籌䇿小試渭濵耕戰之謀百二山河行復関中帝王之業功名留於久逺冨貴乃其緒餘某夙累公知何辭吏役然受敢不敬蚤夜之祝愧乏寸長况讀忍着主衣裳之詩義難再適况妻病不離於牀簀而男寒乆澁於詩書固知公爾以忘私然亦愛之而莫助某榆枋尺鷃但願適逍遥之遊渤澥􅀟鳬亦不計多少之數賀丁制置交割紫殿陞班建碧幢而制閫緑綈趣駕滌紅籕以開藩四履重臨萬井攺􅀚恭惟某官材弘以毅德直而方所學一本於孔周有言皆合於稷契一堂偃月􅀔炙手以絶倫四海􅀝冰公掉頭而不住四國于蕃之巳乆九卿當相以何疑頋自桂林復尋卭竹清獻之琴再鼔當阜民財乖崖之劒重磨足新軍律中􅁠有資於後勁外攘全頼於内修暫分治於四封即盡護於諸將先聲誕播和氣交騰雪嶺之白界天公來則重􅀐火之紅照夜王曰遄歸某乗傳無堪代庖非據崇詩書閲禮樂忻逢元帥之鼎來封府庫籍吏民敬待將軍而解去通董制置居􅁩十乗啓行旣孤剡牘三年過隙又玷招羅曽微曉暢之才可荅頻煩之頋疾驅行李往役前茅伏念某學餒而材蕪氣凋而力腐少年妄意頗懐竹帛之功名半丗拙謀未了布韋之事業強爲禄仕直坐飢驅諸公貴人間欲出其門下古來此物自當弃之道旁獨衘國士之知積愧文人之厚因同邑而薦嚴助自古有之未下車而辟慈明此恩異甚窮人命薄中道憂歸勞心慱慱鑚火頓驚於三蟄逹官衮衮剌天難附於羣飛止或尼之㑹且歸矣駭置郵之有命仍尊選以見招惟兩喜多溢美之言故再鼔回愈淡之聽奏函朝徹俞㫖夕頒荀文􅀂之不進不休今寕愧古閔仲叔之且喜且懼寵實􅀂驚兹蓋伏遇某官以社稷臣爲詩書帥留泰階台符之歩撫坤垠井絡之民去來􅀜雪山之重輕出入係蜀道之難易公鎮踰嵗月共期裴相之來歸小隊出郊坰復喜嚴公之再駐羣彦固多於集幙匹夫猶耻於納溝􅀛放長江使認重來之路燕尋故壘復窺新捲之簾豈但顯不遺故舊之仁亦足占􅄂進巧拙之量某敢不循其頂踵銘在肺肝謹無􅀒有志斯丗之將仍每守圖利大夫之戒忽􅀐將軍馬難希處士之壯懷真釣錦江魚敢學拾遺之􅂴性通制帥安大資丙代董制帥作筆橐贅貟濫竊郡符之寵鞾刀執禮行依制閫之尊瞻中􅁠勁後之威修小侯事大之敬輙裁柔櫝仰溷髙牙恭惟某官直大以方清和而任凛然忠貫於日月巍乎義薄於雲天左􅃝以呼作熊羆不二之士右頋而跽収麒麟第一之功皇咨􅂄定之勲􅁽命保􅁵之􅀉盡護諸將外撫四夷料天驕之必亡諒風寒之冝護蕭何全関中以鎮撫西頋何憂周公有天下之勲勞東歸孔邇佇由節斧經秉鈞樞立非常之功待非常之人剩光竹帛建無窮之基有無窮之聞滿載旂常某承學無竒立朝何􅀘二螭載筆􅀄無紀述之長五雉貳卿非有論思之益誤蒙一扎假守三刀不辤捫歷之艱但切震凌之懼欲且宣於上意正有託於下風望太白横岷峨惟切髙山之仰止詣大府受約束更希隂雨而膏之代回成都黄待制疇􅀂輟賢禁甬作鎮少城周家地官方頼小司徒之貳益州天府遽勤大元帥之行戾止髙牙屹然方面恭惟某官靖恭而肅括膚敏而䟽通生寳劔之故墟地靈人傑接金華之宗􅂀玉㓗日光自䇿名躔徧儀要路厭承明勞侍從乆陪上雍之祠望太白横峨嵋爰馳諭蜀之檄擁元戎之小隊布方國之細書火井沉熒雪山増重考西鄰之近比歸秉左鈞况東極之􅀷知可操右契某老不得謝命作納言慕幾兩幾駟之榮㑹且歸矣望一琴一􅀛之出行或使之代回成都吴制置獵裁一箋而起敬未宣摧謝之私疊累幅以鳴謙仍拜駢章之寵施輕報重虚往實來佩故舊之髙情發衰遲之􅀷愧恭惟某官知推人傑學覺天民屹偉績於控荆蔚竒勳於諭蜀凜然趙淸獻之氣節行以張忠定之規模撫五十四州之軍民瘡痍帖泰壯一百八盤之門户氣色晶明雪山之重旣多沙堤之築非逺某不堪視䕃復此綴班無以公歸或一見而後去豈惟我賀亦衆目之具瞻代回李制帥大東疇庸帥閫升鎮制垣犀甲熊旂名在江淮之草木麟符魚鑰光通河洛之圖書甚惬師言可爲國賀恭惟某官材由丗濟學與古稽自其不卑於小官人知將降之大任故國非喬木之謂夙盤仙李之根今人莫棠棣之如皆近宫槐之影雅聞偉望尤抱長材洊分半虎之符妙落全牛之刃風寒數處人物渺然固封守以畫郊圻徒得君重訖外庸作而丞輔無以公歸某濫守洪都宻依廣厦落霞秋水漸欲㝷吳㑹之舟暮日春天安得對江東之酒代董侍郎回京湖趙制置万分閫罔功濫叨玺詔循墻俟命敢辱賀緘頋蒙一介之專逺畀􅀟鱗之重卷還有􅌤冒受何居恭惟某官以社稷臣爲詩書帥細氊廣厦應接武於夔龍緩帶輕裘即近蹤於羊杜一賢制勝萬里折衝天子遣趙將軍真得破羌之䇿路人問霍去病行収絶漠之勲功名剰跨於數公同書竹帛歩武徑躋於兩社歸勒鼎勲某守蜀非才擒胡不力以此衆戰無可奏之膚公不自意全亦粗殱於羣醜尚欲决焚舟之戰乃不容俟駕而行巳貢天牋願省愆於田里尚依雲芘得佚老於林泉回趙副帥彦呐守偏城而愒日無以瘉人使一道以􅀚風何爲至我方兹蹐地志在回天敢圖副元帥之尊先畀小行人之問恭惟某官篤誠而明允剛直而忱恂無鳯笙龍管之豪奢有麟趾兎置之信厚文王之昭周人之祚固多千里之駒河間之略江夏之功罕露一斑之豹獨公慷􅁣同國戚休星紀一周未皇皇而奠枕風寒數處屹在在之長城寸心如丹百錬愈白四郊多壘未容㝷鷗鷺之閑二矛重弓且並揔貔貅之旅峴山旣捷泗水來歸不十日至長安㑹有官軍見威儀之喜用丸泥封函谷無以賊虜遺君父之憂惟國爾忘家主爾忘身則男子當戰女子當運黄河以南行皆晉土自陜而東是在周公某愛莫助之遐不謂矣木牛流馬敢辝轉粟以上天桃蟲荓蜂但願徹桑於未雨經略代回廣西李經略訦代何月湖小司㓂之持平躐陞五雉大府帥之委重逺􅀉􅀟魚懷感有之寘懷無所恭惟某官名髙斗北恵滿天南槃槃都會之雄庶􅀖君之奔走英英文武之特一號令而精明公無遐心民可吐氣某斵輪旣老整履巳晡冝人獨桂林遥想玉篸之碧忍渴望梅嶺願調金鉉之黄代回廣西李經略訦荷囊輟直桂筦分符靴刀列郡之迎古稱大府􅃭袴萬家之喜今在細侯仁氣南驅善聲東迤恭惟某官通材治劇厚德鎮浮財貨本末源流早振地官之職侍從論思獻納晚􅀷天扆之知遽厭承明之廬歸拜散人之號時方多事公未可閑謀帥湏賢起家甚寵􅀂衛公之鎭撫九十六郡與襲志之都督二十八年能安越人莫非李姓冝其苗裔復此蕃宣顧恐靑羅碧玉之江山難駐黄閣紫樞之歩武某龍鍾巳乆燕賀無由夔府竹枝之歌旣成昨夢漢節梅花之句願􅀉故人代回廣西李經略訦价藩報政祕殿升班八桂不曰炎荒固號登僊之勝四松取之􅀬撰殆非􅀉禄之常帝綍渙孚帥符鼎重恭惟某官材全業鉅器博聲宏厭直承明之廬作牧始安之徼玉簮羅帶江山分一半之天金節油幢庭户行千里之外果臻帝璽進庀宸奎河洛圖書之淵榮灮上燭嶺海輦轂之治和氣旁行㑹見出綸又迎歸衮某無由旅賀猥辱撝謙誦大古而歌散人吾事濟矣去上天而辤宰相公自計之梅亭先生四六標凖卷之二十梅亭先生四六標凖卷之二十一安撫帥守府賀衞參政除江西帥經九重圖任起東府之元勲十乗申咨撫南昌之故郡蔚憇棠之未翦紛􅀐竹以爭迎四履驩然重臨幸甚恭惟某官智仁且勇直大而方崑山片玉之挺生天寧無意虎丘一輪之未滿公亦何心然夷狄之問㓂公與兒童之誦君實是􅀜國體難久家居與我處畎畒之中只成㱕㓗使人得湖山之外盍尉去思宜煩熊旂犀節之嚴更借鶴嶺鵉峯之重軍民雷動共欣吾父之重來道路風傳仍喜我公之未老凢自卯至酉之交説蓋先庚後甲之素孚善人七年流秋殺春生之惠長天一色洗星移物換之悲昔黄霸之於頴川及馬揔之於鄆鎭雖云再涖詎足並言蓋申命宅南之咨乃歸公于東之漸魁台齊色益足光牛斗之墟霖雨思賢㑹即􅀐尾箕而上某一違材館四候􅀚臺造舟爲梁􅁂巳蓬於灧澦荷戈與祋骨幾藁於褒斜難争汗馬之功徑返屠羊之肆忽聞閱禮樂之有帥喜至捲詩書而欲狂偶見苦於小兒未得詣於大府下榻而延孺子詎敢希舊物之収踵門而告文公惟當致新甿之敬賀任樞密除福建帥希夷元老得閑价藩出牧道古今而譽盛德旣將相之兼資至將相而歸故郷在古今而有幾遹觀全德足立懦夫恭惟某官輔丗眞儒爽􅀖良弼春風沂水夙卑游夏之淵源界雪岷山更陋卿雲之河漢早克勤於小物晚服在於大僚非仁義莫陳於前有謀猷乃順於外雖風霆不顯流形之迹然天地能知體國之心兵數年拓地萬里疇若予釆方當顓靣以正槐民具爾瞻何遽剖符而分竹拂衣勇甚懷綬忻然問之往來皆云昔疾而今愈决於去就足窺衆醉而獨醒為之兆兆足行奠而發發必中全閩郷部祕殿政塗㝷某丘童子之釣遊聽去時兒女之笳鼔所貴於天下士者動静不失其光明豈不誠大丈夫哉進退一歸於禮義不􅀒所學是在我公林下有人少伴越地禽魚之樂橘中未老尚見商山鴻鵠之飛某夙累公知敬為國賀江空而􅀊年晚載歌百年幾見之詩水煩而鱗介勞更致列城一陶之請代曹安撫賀衛參帥經疇咨舊弼出牧价藩泰階六符下照星沙之地元戎十乗大開天柱之雲前茅甫臨全楚厎豫恭惟某官洪􅀷而肅括明允而篤誠魁下三台付榮進於素定胷中五色􅀘造化而不言由兩地以養恬為二天而出守辰猷定命聮漢殿以通班甲令著忠盡衡山而賜履玉麟訢合竹馬驩迎令湘安流使嶽修貢政平訟理而無愁嘆聊寛南顧之宵衣國小地狹不足回旋即徯東歸之晝繡某濫揚前粃幸及戍瓜以望君如􅀊之心願言叱馭然用汝作霖之命猶恐追鋒賀廣西管漕湛除静江帥代衛參帥作寓班東觀宅牧南郊一道熟於馳驅不勤易地五筦資其節制何止觀風恭惟某官器諝浚明風猷凝邵自望郎而襆􅀍進退可觀由膚使而褰帷光華益逺㝷領將輸之􅀉益髙澄按之功帝謀帥之惟難公撫封而少駐英英桂林之伯願懋膚功􅄅􅄅洞庭之波尚資餘潤某濫承嘉惠竊􅀝德鄰湘水安流正藉戈舡之重夜郎為徼敢忘銅柱之威賀夔路徐安撫除瀘帥瑄西瀼奏功東川徙鎭占一星之入蜀謂合遄歸不五月而渡瀘却疑冞入賢勞何憚聖眷惟􅀷恭惟某官胸湛明冰膽韜古劔意匠淡經營之表凢馬坐空才刃游肯綮之間全牛立解入朝属爾乞郡翩然漢水為池民無愁嘆巫山猶錦使有光華雲出無心且聊爾陽臺之下春行有脚又移之僰道之間若時江陽實雄益部地望隆重視古元侯民俗恬熈為今道院然天大地大自足着鵬鵾之游何月更􅀊更獨不出魚鳬之國殆欲紓憂於西顧即觀錫命以東歸某越在師行無由旅賀轅下甚安於局促狹中敢累於提檠不進不休聞又綴鶚書之末載飢載渴但願從魚服之歸庶因靑簾白舫之回一見紅斾碧油而去賀徐漕除東路安撫瑄升班延閤就鎭价藩耀東壁之圖書光干列􅀫控西陵之門戸專在三巴無攺舎易轍之勞有弭節建牙之寵用賢如此通國驩然恭惟某官得天委和與月争皎一時歐范共推無黨之雄文千載于張終愧有功之隂德甫更再轉亟取一麾化行江漢之未幾名震京師而難掩周爰咨度逺有光華白帝城髙符節乆煩於兼領烏孫國亂藩籬有貴於預防就煩使指之膚專緫帥連之重肆加内祕益壯中􅁠不十日而至長安漸試魏延之䇿命一將以向宛洛將圖葛亮之功諒飽巖排峽束之詩合勒地闢天開之頌某絶無操挾獨辱知憐頃徒據地以承顔聞亦為天而啓齒實不知師徳之薦遂有缺君房之書諒姑充賦於公車豈欲収恩於私室待李生者何道豈當求益於速成知徐公之有常定不昨取而今捨通湖南安撫曾參政從龍任武岡倅作望魁台之下乆隔師門趍翼軫之旁今依帥閫肅馳函於籖府嗣歛版於轅門恭惟某官氣擊扶搖胷藏磅礴學粹然而出正文卓爾以不羣榮進􅀒素定之科温飽非平生之志蓋中興狀頭之盛三十有三自大節終身而􅀚幾年無幾獨凛凛梅溪之氣槩與英英無垢之風標民鮮舉之公其人也不然旣登兩地之峻何至弗能一日之安舂容東海之濵殫盡􅀯陔之孝三年過􅂩謂當宣文徳之麻十乗啓行顧使分武安之竹洞庭九州之大詎止价藩衡山千里而遥是為岳牧暫借傅嵓之雨略行湘水之春無回旋不足之疑見坱圠無垠之大對半夜之問亟遄宣室之歸反九章之騷即報脩門之入惟公懋徳相我受民某甘以迂愚老於廢棄誨諸生於館下以冗見治試别駕之治中無材可展然都梁之斗壘固全楚之井疆自昔非螃蠏之郷詎容置倅比年更虺蜮之警浪轉爲丞兹載忻而載奔幸受容而受察門生不知恩非人也竊自怜栁子之窮相國求余文知我哉何敢學韓公之傲通興元楊安撫九鼎任武岡倅隨帥幙於西滇濫綴賔僚之末望將壇於􅀯鄭遥依節制之尊姓名難摸於暗中牋記盍馳於麾下伏念某嶔﨑半丗拓落一官口耳止数寸之間淺哉學問頭顱入四十之後荒矣功名亦欲守山澤之臞又恐俱草木之腐昨献公車之牘謾投光範之書大鈞坱圠而無垠曷甞遐弃小技卷曲而不中自欲卷懷適㑹文翁留再剖之符復令王陽叱九折之馭沭浴而戒行李極知見􅀏於大方蹉跎而效小忠亦欲少酬於知已然乏蚍蜉蟻子之援而落魚鳬􅅙叢之􅀖繞樹凄然託根何所恭惟某官肝膽一劒精神五兵􅄃轡登車湘水詠楊慿之德輕裘緩帶峴山留叔子之名旣思鱠以歸呉忽乗軺而諭蜀天旋夔峽良費馳驅地重秦関徑煩彈壓况是四郊之多壘尤須千里以折衝逺其慮以圖非常之功積其力以俟可乗之􅂩公固有志於丗丗寧無望於公惟無敵知儒者之眞則可大皆賢人之業尚念某藐無操挾全蹈踈庸仰天漢之云髙相國方追於國士思月湖之所與中郎或識其典刑通湖南曹安撫彦約截江而屹廬山仰髙有日披雲而覩衡嶽拜下可期藐然縣椽之抗塵昉此帥連之􅀠役事有稽於故實書足逹其姓名敢以畸凉敶之耦儷恭惟某官風猷明浚天韻崇谹自其不卑小官於州縣之時巳知將降大任為社稷之器􅇮者恢復之役事有至難誰歟倉猝之謀談何容易維時漢廣孰是皇華能與城以俱存尊乃勇耳使自焚之弗戢燕可伐歟中冒鵝鸛魚麗之行旁絶蚍蜉蟻子之援所忠者國遑恤乎他屹然􅀌墉遂作百川之障只此一事巳堪千載之垂來自重湖徧持三節人不疑其為驟天亦慊於未醻鋒蝟斧螗敢肆萌芽之怒帶牛佩犢忍違葱韭之安奏刀剨然苞枿矣太守不有肯與許以争功皇帝曰嘻盍召曹而入相復念鯨鯢之巳戮得無鴻鴈之未安非髙牙大纛之小留恐右粥左飡之或闕仍熊羆之緫帥峻龍馬之􅀒圖無以我公歸􅀆恐須衮綉樂為天下道也請􅀍弦歌某拙不時宜窮自天賦粗識丹􅉢之㸃勘安知朱墨之勾稽􅀒米屢空為親勉出繞枝自許非賢疇依然長沙不足回旋先生升矣縱短簿能令喜怒伊誰念之使得侍一日之間亦足尉平生之願湖南於人不輕接何恃而來兾北之野無留良實非所望通安撫衛大參經書生漫仕抗塵縣椽之卑卜史㳙辰􅀠役帥連之下藐塵埃之簿領􅉥霄漢之階符斐然修辝甚矣犯分恭惟某官造道自得經德不回退然得聖人之清進則任天下之重外凌雲之未剪内偃月之方􅀷去而違之十載􅀌舟之横水時乎可矣一朝巨棟之擎天不􅀒獨對衮衣之詩盡洗兩造吾門之誚入參國論出庀祠宫卒以道而屈伸􅀄何心於止速在外則植旗旄羅弓矢公豈此榮其功之銘鼎彛􅀍弦歌士誠有望不謂聽麻於文德轉而分竹於武安長沙千里之平古􅁛清絶洞庭九州之大新困繹騷兹勤二三執政之行殆非㝷常謀帥之比自天有命固巳興宣室之思惟帝念功寧乆作南􅀖之式暫撫湘纍之蘭芷即歸商鼎之塩梅民無不􅀗之夫公有無窮之聞某起家素賤受質朱愚學不前人空守􅄝書之癖飢來驅我遂生竊禄之饞不虞小吏之凌兢正託大鈞之坱圠簉俊造而厠下列甞累一陶褁章服而揖上官惟當三沭通浙西􅀽安撫韶十年幕府􅀒公事未了之癡千里王畿􅀠華使周爰之度聊歩邯郸之故欲瞻京兆之眞輙修偶儷之詞薄叙畸􅀌之迹伏念某斈惟洛誦家本唐餘因應而惰農遂去民而就吏昨貪近禄浪賦逺游歷并捫參再造魚鳬之國逾􅃆入渭兩經鳥鼠之􅀖偶爾得㱕置之勿論兹操破釡來問大鈞辱令芻狗之陳更賛木牛之運㪯頭見日良忻近咫尺之天滿腹飲河政不過斗升之水然非有万間之芘將若為三匝之依伏遇某官器博而周材弘且毅無曲斈以阿丗言言博士之風不錮人以収功挺挺司徒之烈徧儀膴仕具載休聲惟長安諸夏之原視商邑四方之極冝得翁㱕之公㓗仍兼廣漢之聦明弄印無以易堯持教使之告舜京師浩穣已迎刃肯綮之間侍從論思即聽履凝嚴之上尚念某不堪位置何足控摶效韓愈謹奉大尹之書非為文也慕劉向獨序馮翊之傳尚有志焉代回臨安趙帥師石拜命中宸參華外府弹壓輦轂旣知天邑之尊平凖京師又借月卿之重少騰歌於張趙即接武於䕫龍某方聽除書欲陳􅂟語不虞貶損猥賜鳴謙㑹見九遷之榮當不一賀而足代回䕫路王安撫宗孟垂共工而服命躐視大常伯之班䕫有國以建侯逺致故將軍之禮燁然尺櫝展也千金恭惟某官殖斈端􅀷禔身凝逺建武功臣之後文献具存正元朝士之間德音孔碩由􅀚風而分閫不易地以開藩睠是陳人接枌榆於西泒憐其舊日拾橡栗於東屯雖糠粃不足於簸揚然草木實同於臭味春風披拂楸樹馨香仍飛剪縠之文見寵斵輪之老某強顔曳履有味挂冠共飲玻瓈江固巳蒙九里之潤俱是蓬萊守願早乗兩腋之風代回湖南曹安撫彦約陞華延閣作牧价藩長沙千里之平孰主張是元戎十乗之啓實寵綏之恭惟某官抱􅀒寛䟽踐敭詳熟崇詩書閲禮樂天禀有餘羅弓矢植旂旄人疑為晚以扶輿磅礴之地有奪攘矯䖍之風裒兇鞠頑未正鯨鯢之戮烜威赫德是資虎豹之韜願疇末乃取闢之功行有使果召參之寵某緬懷先契實托通家拙政在前乃不足乎揚之糠粃同年有後亦助旁而譟其皷旗代回䕫州王帥宗孟肅將使節就易帥垣號令晶明􅀄不勤於易地圖書清䆳果何逺於去天恭惟某官昭代通材名門勝士從容官牒鴈所至而有聲剖决吏文牛雖全而自解兹乗漢傳出護蜀門八陣縱横乆督木牛之運三巴䟽鑿更分銅虎之符念糠粃之在前餘草木之同味竹枝嘔啞敢望播揚楸樹馨香滿期封植用仁侯之新政慰太守之舊民愛莫助之遐不謂矣某無由旅賀猥沐謙撝指爪偶然終憶飛鴻之􅅺上頭顱如此更慙神虎之門中代回襄陽劉安撫光祖陞華殿左輟鎮山南千里見王雖未䆒献納論思之益十連為帥亦可䇿還定安集之功邊靣晏然上心簡在恭惟某官三代遺直一丗偉人儒特立而獨行蓋以有益於國士任重而道逺不止獨善其身抗正論於經帷吐苦言於諌紙芳馨香矣流落乆之属時攺弦令公趣駕方抱同朝之喜忽聞分鑰之殊休兵屯田政須元凱之規畫輕裘緩帶㑹繼叔子之功名無有遐心益觀逺業某曾同臭味頗共浮沉唱白銅鞮空羡接籬之倒吟青玉案不供繍叚之酬代回史安撫彌堅光膺芝檢進陟松班一札細書渙􅁝綸之温潤十連大國添旗幟之晶明恭惟某官丗濟壯猷家傳逺業輦轂之下彈壓夙著能聲侍從之間論思益髙雋􅁤遽厭承明之夜直出為湘水之曉行展長沙千里之平袴􅃭自得鎻洞庭九州之險舟楫無虞蕞然獠蠻囂于鼠穴勝之不武雖多殺以奚為綏之斯來宜脅從而罔治帝嘉成績詔錫隆名東璧圖書姑暫煩於寓直南􅀖藩翰㑹趣用以遄歸某自媿望秋未遑賀夏徒以在前之糠粃荷不鄙夷其如莫報以瓊瑶止􅀷感戢代回徐安撫􅀖憲陞華法從作尹神皐疇􅀂予工有渥貳卿之命徒得君重底寧千里之畿渙號旣揚師虞允穆恭惟某官靖共而正直粛括而弘􅀷中外乆於踐揚上下孚其名實大宗正之盤礴公豈曰淹少常伯之超騰人不謂早當日畿之謀帥勤天陛之掄材特陞献納之班俾任浩穰之􅀉欲粟賤追李峴少慰閭閻録囚歸問不疑更光史册某自聞先庚之令亟展同寅之恭材俊滿前欲譽盛德而不敢珠玉在側始媿先施之未能代回潼川劉閣學甲出綸北闕賜履東川臣作股肱冝職五言之納王之喉舌洊勤四國之蕃西顧旣寛南圖益大恭惟某官清標拔俗厚德鎭浮二十四郡之無人巳見眞卿之節一千餘家之失火何勤長孺之行然使玉帳之輕孰借銅官之重元戎小隊聊復班石谷之春方國細書恐趣侍雲臺之下某乆燕居息復鳩僝功慿飛廉以􅀉聲若為厚報望崦嵫而勿迫猶佇遄歸代回揚州崔安撫與之建纛偃藩方欲馳於慶牘濫巾分閫何遽辱於朋緘一謙之光三復以愧恭惟某官氣涵天粹材應時需德性得南方之強文字喧西都之價仁勇充然於六館獨何蕃歟言行考之而一人如清河者羣飛方鋭勇退尤髙甫躋郎舎之華即領帥垣之􅀉堰横古埭尚如召伯之棠地對長江曾擊祖生之楫惟良刺史尚友古人使功名配於前聞則富貴乃其餘事某何功湘楚又守勾呉捲雨西山良有愧閻公之望􅀚梅東閤恨莫窺何遜之詩代董侍郎回䕫路丁安撫黼疇庸靈石攺牧䕫藩􅀞舫靑簾昔固識灧澦之馬碧油紅斾今重認常山之蛇建牙云􅀄滿目交慶恭惟某官風華俊茂天韻崇谹正色立朝有嘉猷則告于后抗章請外取膏澤而下諸民廣信之政旣成承明之召冝亟適兹魚復重在麟符出幕十年去思未逺賜書一扎易鎭攸冝盧矢彤弓新元戎之號令白鹽赤甲壯全蜀之藩垣不俟突黔即膺詔紫某守邊弗績受代得歸巳問檣烏頓有身輕之喜尚陪厦燕獲伸靣賀之誠代回畢安撫再遇疇庸邊閫進秩内徽宣化承流將視儀於三事定功保大仍作鎭於十連成渙載揚在師允􅁻恭惟某官果毅而有守沉鷙而善謀心潜済北之一編材駕山西之諸將属當敵警屡挫虜鋒鶴唳風声走符堅於淝水鵝鳴雪夜擒元済於蔡城公將䇿大漠之功上巳棄單于之過戢干戈槖弓矢旣放桃林之牛安邊境立功名眞跨揚州之鶴鼎來恩綍晉錫師麾英節麟符勉徇借留之請神旗豹尾佇聞入衛之榮某拘以綴班闕於馳􅂟十部從事慚無瓊􅅼之酬千里折衝願體冕旒之眷梅亭先生四六標凖卷之
