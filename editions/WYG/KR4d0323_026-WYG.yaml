body:
  text: 四六標準卷二十六宋李劉撰倉使提舉常平即漢耿壽昌常平之任宋淳化中建常平倉景祐元年令轉運司舉長吏舉所部官專領之然猶𨽻漕臣熈寜遣使提領此提舉常平之始九年府界畿内亦專置提舉常平倉一員不令司農丞兼領提舉常平司操常平斂散之法申嚴免役之政令治荒修廢賑民艱阨則𨽻提舉司嵗察所部亷能而保任之若疲軟或犯法則隨其職事劾奏元祐初罷紹聖九年復置建炎元年併歸提刑司二年復還其糴本通王提舉與權詳啓意盖倅武岡時通湖南倉使抗章引外掲節司平馮衍傳懐金垂紫掲節奉使注掲持也漢宣帝時耿壽昌請于邉郡皆築倉榖賤時増價而糴貴時減價而糶名曰常平倉常平之名始於此宋淳化中建常平倉熈寜中遣使提領此提舉常平之始正士去朝四海之疑未釋望郎問俗三湘之幸則多元氏長慶集嘉乃令子為吾望郎孫樵康郎中墓誌鴛行望郎錦川星使山谷詩同舍多望郎杜詩問俗九州箴寰宇記三湘謂湘潭湘鄉湘源况以部刺史之天趙嘏詩尋花偶坐將軍樹飲水方重刺史天東坡詩一見刺史天來臨舊令尹之地民信之矣帝念在兹恭惟某官天韻崇谹風猷膚碩學問廣大日光玉潔而蛟翔李漢韓文序詭然而蛟龍翔蔚然而虎鳯躍鏘然而韶鈞鳴日光玉潔周情孔思千態萬貌氣志清明燭照數計而龜卜禮記清明在躬氣志如神正義云言聖人清静光明之徳在於躬身氣志變化㣲妙如神韓文若燭照數計而龜卜也詳見前早提邑最入踐朝行徧儀清選而人訝其遲訝五駕切増韻疑恠也立登要路而公不之願杜詩自謂頗挺出立登要路津古之君子寜可禄歉而氣豐今之謀人詎恤身進而徳退尚書今之謀人姑將以為親拂衣勇甚范丹傳便起告違拂衣而去楊彪傳孔融魯國男子明日便當拂衣而去羊祜傳衍拂衣而起南史王僧䖍傳彼若見惡當拂衣去耳梁書何㸃傳弱冠拂衣華首一操謝朏傳斂迹康衢拂衣林沚又拂衣東山𦕈絶塵軌又建武之世拂衣止足晉書郗超傳性好聞人棲遁有能辭榮拂衣者超為之起屋宇作器服畜僕竪費百金而不吝唐胡宿詩稽康懶慢仍躭酒范蠡逋逃久拂衣東坡詩賢哉仲氏早拂衣占斷此山長洗耳又拂衣自注下下考芋魁飯荳吾豈無攬轡慨然載歌小雅之皇華見前復領大招之清絶楚屈平為懐王左徒博聞强志􅈺於辭令同列心害其能而讒之王怒疏平平自傷忠而被謗乃作離騷經以諷不見省納及襄王立又放之江南復作九歌天問九章逺㳺卜居漁父大招自沉汨羅以死屈潭在湘隂縣六十里酈道元水經云汨水西經玉笥又西為屈潭即羅潭也杜詩湖南清絶地互見前我聞在昔三異具見於一同尚書我聞在昔餘見前民到于今五善固忻於重拜見前所虞驛召靡俟鴈囘迴鴈峰在衡州亦屬湖南某去國三年起家二郡見前瞻霄漢之佳士昔蒙或輓以或推杜詩繡衣春當霄漢立左傳或推之或輓之能無入乎逄瀟湘之故人今乃受容而受察栁渾詩瀟湘逄故人詳見前偶甫至丞哉之壁倅武岡末由望使者之車文儒申申既喜迎栁公之不逺武岡矯矯亦幾見王導而無憂俱見前通湖南樂提舉章詳啓意盖簿寜鄉時上倉使所作寜鄉𨽻潭州湖南所轄也人一天而我二未遑樂霧之披宋王楙野客叢書今用披霧覩青天事多指樂廣如梁孝元詩還思逄樂廣能令雲霧褰駱賔王詩逺披樂廣天是也不知此語非創見于晉徐榦中論曰文王畋於渭水遇太公釣召而與之言載之而歸文王之識也灼然如驅雲而見白日霍然如開霞而覩青天晉人盖引此語以美樂令耳戒七日而齋三將展衡雲之拜禮記子云七日戒三日齋注七日戒者謂散齋也三日齋者謂致齋也昌黎謁衡嶽詩五嶽祭秩皆三公四方環鎮嵩當中噴雲泄霧藏半腹雖有絶頂誰能窮我來正逄秋雨節隂氣晦昧無清風潜心黙禱若有應豈非正直能感通森然魄動下馬拜松栢一逕趨靈宫湖南提舉常平司治在衡州故云持不腆之上轄腆他典切說文多也又厚也左傳不腆之田又不腆敝邑之禮公羊傳不腆先君之服又不腆先君之器轄下瞎切說文車軸耑鍵也通典唐主簿上轄曠莫達乎中涓曹參傳參以中涓從如淳曰中涓如中謁者師古曰涓潔也言其在中主知潔清灑掃之事盖親近左右也削牘斐然原渉傳削牘為疏負芒悚甚霍光傳上内嚴憚之若芒刺在背悚通作聳或作􅌶說文懼也漢刑法志􅌶之以行恭惟某官器資顯允詩顯允方叔徳履碩膚詩公孫碩膚亞卿之呼吸智謀雲仍固在左傳為亞卿焉史記樂毅傳毅為魏昭王使于燕燕王以客禮待之毅辭讓遂委質為臣昭王以為亞卿齊湣王昏亂昭王使毅為上將軍以伐齊破之濟西追至臨淄下齊七十餘城皆為郡縣英雄記吕布與袁術書昔樂毅攻齊呼吸下齊七十餘城正子之充實善信風烈猶存巍科摘髭要路䇿足落筆坐奔於萬馬善刀立觧于千牛竝見前縣庸蔚乎浮湘郡最卓於守郢郢以井切說文故楚都在南郡江陵北十里不但别盤根之利器見前要已知勁草於疾風南史庾仲逺初為明帝府佐廢帝景和中明帝疑防賔客故人無到門者唯仲逺朝謁不替明帝即位謂曰卿所謂疾風知勁草蕭瑀傳帝賜瑀詩曰疾風知勁草版蕩識誠臣盍歸清切之班朝夕獻納勉副皇華之遣原隰馳驅甫湘水之曉行遄蔡城之夜縳酃醁有酒竝見前洞庭無波九歌洞庭波兮木葉下六轡既均復戍清絶之地見前一節以走恐登碧落之天禮記凡君召以三節二節以走一節以趨碧落天也李渉詩碧落髙髙雲萬里詳見前某不肖至愚無聞甚陋二科鹿鹿遂謀三釡以飬親王制注獨獨鹿鹿也鹿鹿無所依莊子吾及親仕三釡而心樂詳見前千里魚魚誰以四方而供簿韓文魚魚雅雅注魚鳥飛行成隊山谷詩從師學道魚千里然專令朱出而墨入見前决不敢黄放而白催李燾長編宇文粹中進對云朝廷黄紙放白紙催有先達者為之前此志或遂居下位不獲乎上兹道難行受察云初願忠敢隐移慈竹而栽率土定未忘故里之情述異記章帝三年子母筍生白虎殿前時謂之孝竹群臣獻孝竹頌詩義曰南中生子母竹今慈竹是也杜少陵集堂下累土為山一匱盈尺以代彼朽木旁植慈竹率字疑誤賦梅花而獻繡衣敢妄冀聞人之目劉禹錫上權舍人書宋廣平之沉下僚也蘇公味道時為繡衣直指使者廣平投以梅花賦蘓盛稱之自是乃列於聞人之目通新江西提舉兼知撫州徐監丞瑑榮驅龍節周禮掌節澤國用龍節疏澤多龍者若鄭國之類也以金為節鑄龍之象兼綰魚符隋文帝紀開皇九年頒木魚符於總管刺史雌一雄一唐車服志初髙祖入長安罷隋竹使符班銀菟符其後改為銅魚符以起軍旅以易守長内府轉丞方表循良之最周禮内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉外臺選使更疇牧御之庸一道驩然六條秩若恭惟某官器資膚敏業履淑均竝見前無終義理之文夙髙朱賈徐樂傳樂燕郡無終人也嚴助傳上令助等與大臣辯論中外相應以義理之文朱謂買臣賈謂捐之有功平反之徳逺邁于張朝野僉載云客問司農卿徐有功何如浮休子曰有功耿直之士也明而有膽剛而能斷處陵夷之運不偷媚以取容居版蕩之朝不遜辭以茍免來俊臣羅織者有功出之袁智𢎞鍛錬者有功寛之鳯跱梟鴟之内直以全身豹變豺狼之間忠以逺害若值清平之代則張釋之于定國豈同年而語哉峻名胄之遥遥南史何昌寓傳為吏部尚書有一客姓閔求官昌寓問君是誰後答曰子騫後昌寓團扇掩口而笑謂坐客曰遥遥華胄知餘風之挺挺魏謩傳贊挺挺有祖風烈詳見前君山出牧屹隆維屏之藩君山在岳州洞庭湖中方六十里狀如十二螺髻北夢𤨏言湘江北流至岳陽達蜀江夏潦後蜀江漲遏住湘波溢為洞庭湖凡數百里而君山宛在水中秋水歸此山復居于陸惟一條湘川而已劉夢得詩湖光秋色兩相和潭面無風鏡未磨遥望洞庭山水翠白銀盤裏一青螺山谷詩滿川風月獨凭欄綰結湘娥十二鬟可惜不當湖水滿銀山堆裏㸔青山汝水竊隣已沐餘波之潤汝水在撫州府其源上接旴江流經金谿縣南曲折行百餘里東流合豫章水其上流之分􅉽自千金陂西流至郡城東抱城而北合宜黄崇仁二縣溪水流至南昌界合豫章水入鄱陽湖帝念西江之涸民多南畆之離肆咨六轡之良并任雙旌之重安其甲里而無恨有蔽芾之甘棠送以禮樂而有光寜逶迤於苞栩諒恥納溝之失所必已攬轡而慨然竝見前式遄其歸詩仲山甫徂齊式遄其歸注遄疾也周人望仲山甫欲其用是疾歸不諌亦入詩不聞亦式不諌亦入王肅云不聞道而自合于法無諌者而自入于道唯聖徳乃然此借用某淹囘蜀道企想滕仁畏此簡書乏流馬木牛之智詩豈不懐歸畏此簡書同惡相恤之謂也李商隐詩魚鳥猶知畏簡書風雲長自護儲胥薾然疲敝知奔蜂藿蠋之難莊子薾然疲役而不知所歸可不哀耶注薾音捻忘貌疲病困之狀凡物各以其所好役于形骸至于疲困薾然不知所以好此之歸於已云何也又奔蜂不能化藿蠋越鷄不能伏鵠卵注奔蜂小蜂蠋音蜀豆藿中大青虫也詩蜎蜎者蠋淮南子蠶與蠋相類而愛憎異也何由囘北斗之槎尚冀下南州之榻其為頌傒罔槩鋪棻竝見前代囘胡提舉楶詳啓意以下皆代月湖訢合守符禮記天地訢合傅爕傳初郡將范津名知人舉爕孝亷及津為漢陽與爕交代合符而去鄉邦榮之載馳使節田里之無愁歎已茂民庸原隰之有光華宜膺君選見前恭惟某官器資凝逺徳履端深迎寒露置玉壺撓而不濁杜詩烱如一段清冰出萬壑置在迎風寒露之玉壺黄憲傳澄之不清淆之不濁懐連城佩寳璐即之也温屈原九章被明月兮被寳璐山谷濓溪詩懐連城兮佩明月璐魯故切說文玉也有華左轓景帝紀令長吏二千石車朱兩轓注轓甫元反有障蔽之車也二千石雙朱其次乃偏其左詳試右翊右馮翊歛嚴瀨釣竿之于將賦歸來嚴光傳少有髙名與光武同遊學帝思其賢以物色訪之齊國上言有一男子披羊裘釣澤中遣使聘之三返而後至終不屈乃耕於富春山後人名其釣處為嚴陵瀨焉顧野王輿地志七里瀬在東陽江下與嚴陵瀨相接有嚴山桐廬縣南有嚴子陵漁釣處今山邉有石上平可坐十人臨水名為嚴陵釣臺也項安世詩君房足下竟成䛕只有韓歆已破除豈有江湖釣竿手與君臺閣奉文書適武夷粟粒之牙猶煩料理武夷山在崇安南三十里為第十六昇真元化洞天昔有神仙降此山曰予為武夷君總錄地仙受節於此由是得名武夷志云周􅂞百二十里凡峯巒巖石三十有六此外以名著者復不下十餘所東坡詩君不見武夷溪邉粟粒芽前丁後蔡相籠加注粟粒芽茶之極品北苑别録茶有小芽有中芽有紫芽有白合有烏蔕凡茶以水芽為上小芽次之中芽又次之餘皆在所不取料力弔切増韻計也理也王㣲之傳比當相料理南史梁末童謡黄塵汚人衣皁莢相料理山谷詩睡魔正仰茶料理宋福建提舉常平司治建寜龍光渥甚詩為龍為光又何天之龍鄭注讀作寵榮名之謂互見前牡轡如濡君乘使者車民知免矣岑參詩故人方乘使者車吾知郭丹却不如詳見前詔詣行在所予日望之方欲通咫尺之書乃先勤四六之恵竝見前某老未得謝禮記大夫七十而致事若不得謝則必賜之几杖命作納言不善斵而汗顔稍麾即去史記汲黯傳招之不來麾之不去餘見前望持斧之直指更勉其驅見前代囘淮東齊倉礪訢合守符肅將使指田里之無愁恨厥績茂焉宣帝詔㤙惠卓異厥功茂焉禮樂之有光華此行寵矣恭惟某官人門具羙陳書蔡凝傳髙宗嘗謂凝曰我欲用義興主壻錢肅為黄門郎卿意何如凝正色對曰帝鄉舊戚㤙由聖㫖則無所復問若格以僉議黄散之職固須人門兼美惟陛下裁之髙宗黙然而止東坡詩清朝固多士人門子皆冠風調不羣溫恭惟徳之基於文無害詩温温㳟人惟徳之基注寛柔之人温温然則能為徳之基止言内有其性乃可以有為徳也蕭何傳以文毋害為沛主吏椽服䖍曰為人觧通無嫉害也應劭曰雖為文吏而不刻害也蘇林曰無害若言無比也一曰害勝也無能勝害之者晉灼曰酷吏傳趙禹為丞相亞夫吏府中皆稱其亷然亞夫不任曰極知禹無害然文深不可以居大府蘇說是也師古曰害傷也無人能傷害之者蘇晉兩說皆得其意服應非也野客叢書云按後漢書百官表秋冬遣無害都吏案訊諸囚注按律有無害都吏如今言公平吏漢書音義曰文無所枉害蕭何傳所云正如此也乃知無害吏亦漢律中語齊永明間䇿文云賢牧分陜文而無害此意正與蕭何文無害同平易近民之政所去見思史記夫政不簡不易民不有近平易近民民必歸之眷是榆邉趙武靈王西略胡地至榆中戰國䇿王胡服率騎入胡至榆中辟地千里伍被傳廣長榆開朔方即衛青傳所云榆谿舊塞或謂之榆中始皇本紀西北斥逐匃奴自榆中竝河以東屬之隂山以為三十四縣城河上為塞正義曰榆中即今勝州榆林縣也廣記榆林縣南有榆溪塞即䝉恬侵胡植榆為塞是也東有榆林關隋開皇三年置宋南渡後以淮東為邉鬱然棠䕃兹自天而出綍不易地而褰帷淮水湯湯式展澄清之志湯尸羊切湯湯水流貌詩鐘鼓鏘鏘淮水湯湯又汶水湯湯毛傳大貌又水盛貌尚書湯湯洪水方割詩其流湯湯放縱無所入也周原膴膴行觀勞來之功膴美也厚也詩周原膴膴堇荼如飴勞郎到切慰也杜預云叙其勤以答也來落代切音與頼同通作徠答其勤曰勞撫其至曰來原渉傳勞來慰勉詩勞來還定安集之互見前某縻迹於朝莫面以賀五雉之為工正久已懐歸四牡之勞使臣别遲贊喜竝見前代回湖南楊倉九鼎鶴林玉露云楊九鼎在蜀以刻剝致諸軍之怨軍士莫簡倡亂殺九鼎剖其腹實以金銀曰使其貪腹飽飫宋史寜宗嘉定十一年四月張福入利州殺總領財賦楊九鼎顯升簿正改賁使華升賁卦名國方貪賢使服班行之上韓文論孔戣致仕狀優以禄秩不聽其去以明人君貪賢敬老之道又今戣據禮求退若不聽許亦無傷於義而有貪賢之羙王荆公詩從來貴勢公何慕自是賢名上所貪行寒剛切列也詩寘彼周行傳列也傳周之列位謂朝廷臣也韓詩班行再肅穆民尤望賜故資原隰之驅晝繡分光宵衣寛顧竝見前恭惟某官性資寛栗尚書寛而栗材具碩膚觀其不辭州縣之勞固知必為廊廟之器兩著扞城之績去則見思左傳百官承事朝而不夕此諸矦所以扞城其民也桓温傳賛受寄扞城用恢威畧東坡詩誰信儒冠也扞城一罹枕塊之悲毅然執禮禮記寢苫枕塊哀親之在土也枕之䕃反塊土也又父母之䘮居倚廬寢苫枕塊又寢苫枕塊所以為至痛飾也既畢祥琴之御東坡詩祥琴雖未調餘悲不敢留爰膺戎器之除易君子以除戎器戒不虞此除軍器監借用除字適是重湖年饑而用不足加之諸洞地大而蘖易牙蘖魚列切木餘也謂斬而復生魯語山不槎蘖注以株生曰蘖牙通作芽淮南子萌兆牙蘖未有形埒垠堮韓文平淮西碑物衆地大蘖牙其間東坡詩詰曲自牙蘖欲其澄清知所歛散周益公詩歛散新陳倚繡衣非輟寛閎通敏之士難課還定安集之功四牡載馳萬物吐氣突不黔席不煖了無媮安避事之情居有倉行有糧㑹見節用愛人之學竝見前某賀我選厥晉語趙宣子言韓獻子於靈公以為司馬河曲之役趙孟使人以其乘車干行獻子執而戮之衆咸曰韓厥必不没矣其主朝升之而莫戮其車其誰安之宣子召而禮之皆告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免於罪矣注宣子趙盾獻子韓厥司馬軍吏也干犯也行音杭軍列也没終也車車僕也朝莫喻速也逄人説斯見前暮見吳山有老大徒傷悲之感古樂府長歌行百川東到海何時復西歸少壯不努力老大徒傷悲曉行湘水願功名留久逺之㸔見前代回浙東孟提舉植肅將星駕分察日畿見前逺而光華况去天之尺五杜詩爾家最近魁三象時論同歸尺五天公自注俚語曰城南韋杜去天尺五近在旦夕佇擊水之三千莊子鵬之徙于南㝠也水擊三千里曾旅進之未由何謙撝之先辱恭惟某官器資凝重徳宇浚明陸玩傳搢紳之徒莫不廕其徳宇柳詩宏䂓髙徳宇麗藻競詞林方公少年嘗棲棘於獨秀之下獨秀峰在南安府南康縣東舊名鷄籠東坡南遷更名獨秀維時老子偶泛蓮於鬱孤之􅅖馬援傳頗哀老子陶侃傳老子婆娑鬱孤臺在贛州麗譙坤維隆阜鬱然孤起平地數丈冠冕一郡之形勢而襟帶千里之江山唐李勉為䖍州刺史登臨北望慨然曰余雖不及子牟而心在魏闕一也鬱孤豈令名乎改為望闕郡守曾慥増創二臺南為鬱孤北為望闕東坡詩煙雲縹緲鬱孤臺積翠浮空雨半開想見之罘觀海市絳宫明滅是蓬萊程師孟詩昔人善名名鬰孤下視百里如平鋪千巖迤邐何獨秀白雲蔽虧青骨瘦屢獲過從劉禹錫詩官班髙後少過從山谷詩稍喜過從近又巷僻過從少不勝傾倒杜詩蘇侯得數過懽喜每傾倒山谷詩推轂天下士誠心要傾倒凄其三紀詩凄其以風存者幾人細思一夢之囘東坡詩夢回聞剥啄李後主詞細雨夢回鷄塞逺何啻千帆之過劉禹錫詩沉舟側畔千帆過枯木前頭萬樹春天子有詔選公卿於西漢之循韓文毋疾其驅天子有詔循吏傳公卿缺則選諸所表以次用之太守謂誰疑姓名必東家之故歐文醉翁亭記太守謂誰廬陵歐陽脩也顧取斜飛之勢又為直指之行見前登蓬萊宫問百萬蒼生之辛苦唐髙宗紀龍朔二年四月作蓬萊宫禮樂志唐初鐘磬凡三十六簴蓬萊宫成増用七十二簴杜甫三獻賦蓬萊宫探㑹稽穴添一部史記之雄深司馬遷傳上會稽探禹穴又遷為太史令紬史記石室金鐀之書馬子才贈盖邦式序司馬子長之文章不在書學者每以書求之則終身不知其竒予有一部史記在天下名山大川壯麗可恠之處將與子周㳺而歴覽之庶幾可以知此文矣舉頭即在於長安濯足㑹登於雲漢見前某鷄豚共社韓詩願為同社人鷄豚燕春秋詳見前虎䑕同宫國史補陸長源以舊徳為宣武行軍司馬韓愈為廵官同在使幕或譏年軰相懸周愿曰大蟲老䑕俱為十二屬何恠之有旬日此語布之長安方欲冩贊喜之忱乃先沐過情之謝厭承明之廬勞侍從之事無以公歸竝見前為邦家之光非閭里之榮豈惟我賀左傳叔弓如晉賀虒祈也㳺吉相鄭伯以如晉亦賀史趙見子大叔曰甚哉其相䝉也可弔也而又賀之子大叔曰若何弔也其非唯我賀將天下實賀餘見前代囘江西王提舉顧問簮筆何功蒙誤㤙之起廢蔡謨傳昔階謬㤙䝉忝非據東坡集計此誤㤙必難安處陳後山詩將老蒙誤㤙太史公自敘春秋補敝起廢東坡詩今年聞起廢函牋為恵感妙語之􅌵枯鄭太𫝊清談髙論嘘枯吹生東坡集固無心於集苑而有力于嘘枯有味其言見前不知所賀左傳國老皆賀子文蒍賈尚㓜後至不賀子文問之對曰不知所賀恭惟某官王之膚使古之謀人慷慨登車覺范滂之不逺竝見前勤渠下榻正徐穉以前來詩夏屋渠渠注夏屋大具也渠渠勤勤也言於我設禮食大具以食我其意勤勤然餘見前故當駕彼四牡之勞不廢遺我雙魚之寵見前某老將及耄左傳老將知而耄及之生也有涯莊子吾生也有涯而知也無涯注所禀之分各有極也夫舉重攜輕而神氣自若此力之所限也而尚名好勝者雖復絶膂猶未足以慊其願此知之無涯也故知之為名生於失當而滅於㝠極㝠極者任其至分而無豪銖之加是故雖負萬鈞茍當其所能則忽然不知重之在身雖應萬機冺然不覺事之在已此飬生之主也雖則荷囊還本來之靣目法寳壇經不思善不思惡正與麽時那箇是明上座本來面目東坡詩一任秋霜換鬢毛本來面目還如故其如蓬髩當自揣於頭顱見前曷月還歸定相從於杖履還音旋詩懐哉懐哉曷月予還歸哉注懐安也思鄉里處者故曰今亦安否哉安否哉何月我得還歸見之哉思之之甚韓文古之老於鄉者閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨徃來也因風占謝愧莫報於瓊琚李陵答蘇武書時因北風復恵徳音晉書何劭傳諸方貢獻帝輙賜之而觀其占謝焉南史謝顥傳詣齊髙帝自占謝言辭清麗容儀端雅左右為之傾目代回湖南葉提舉宗魯起自家林肅將庾節民以財為本當加培植之功食貨志洪範八政一曰食二曰貨所以分財布利通有無者也二者生民之本君乘使者車必有阜通之政得人如此通國驩然恭惟某官風調不群天材甚茂郎潜既久忽為襆被之謀邉隙方開亟進徙薪之計身謀雖左物望益髙兹膺禮樂之光華復任貨財之平凖竝見前政恐公車之暮召主父偃傳廼上書門下朝奏暮召入見不容湘水之曉行某嘗具一箋未敢多賀駕彼四牡諒有功而見知竝見前雖則七襄愧成章之匪報詩匪報也永以為好也代囘章提舉良肱郡符訢合庾節光華昔湖南之一州歛此大恵竝見前今江西之列郡汔可小康詩民亦勞止汔可小康說文汔水涸也詩傳危也箋幾也正義曰爾雅􅠟汔也疏近也郭璞曰謂相摩近反覆相訓是汔得為幾也左傳亦引此杜預云期也然則期字雖别皆是近義縯而申之縯引也增韻長也易引而伸之觸類而長之自此升矣見前恭惟某官器資凝逺學行淵源領著讐中豈固薄蓬萊之島劉向傳詔向領校中五經秘書師古曰言中者以别於外栁文謫龍說薄蓬萊羞崑崙而不即抗章請外必欲開祝融之雲見前人言衡山千里之遥禮記自江至于衡山千里而遥孰知周公期年而變兹從畫㦸易畀繡衣載馳載驅民已安於四境見前受容受察吏知服於六條韓文受容受察不復進謝將由膚使之功又趣面君之詔燕人為函粤人為鎛奏技闕然鎛音博田器函鎧也考工記粤之無鎛也非無鎛也夫人而能為鎛也燕之無函也非無函也夫人而能為函也伯氏吹壎仲氏吹篪均茵幸甚周陽由傳汲黯為忮司馬安之文惡俱在二千石列同車未嘗敢均茵焉師古曰茵車中褥也言此二人皆下讓由故同車之時自處其偏側不均敵也互見前某自聞除目尤切懽顔見前託諸矦以寓公自今以始禮記諸矦不臣寓公故古者寓公不繼世正義曰寄公者何也失地之君也或天子削地或被諸矦所逐詩自今以始嵗其有受一㕓於仁政曷月于歸見前代回文思趙提舉希倉疇庸百里進轄五工轄下瞎切音與黠同或作牽說文車軸耑鍵也禮儀知皇帝之尊所闗甚重叔孫通傳髙帝曰吾廼今日知為皇帝之貴也臺閣須子弟之習未占已孚新唐書選舉志李徳裕對武宗曰朝廷選官須公卿子弟為之何者少習其業自熟朝廷事臺閣之儀不教而自成詳見前恭惟某官禮樂宗英典刑家法兩試一同之地並騰三異之聲所去見思願留借㓂後來居上無以易堯並見前夏氏上匠虞氏上陶小煩鳩僝攷工記有虞氏上陶夏后上匠殷人上梓周人上輿尚書共工方鳩僝功周公拜前魯公拜後㑹即象賢見前某天幸同曹霍去病傳亦有天幸早勤委質名父子之歴塊俯仰為僚見前老詩書之斵輪始知終免莊子行年七十而老斵輪山谷詩問取人間老斵輪代回孟提舉植憲曹贊治自揆罔功起部虚員遽叨攝長月湖自刑部侍郎遷工部尚書故云冐國㤙而有靦託隣芘以知歸恭惟某官宻邇王畿尚書宻爾王室久將使簜有功則說行當勞四牡之來並見前位事惟能必進扈六飛之御尚書建官惟賢位事惟能袁盎傳陛下騁六飛馳不測山如淳曰六飛六馬之疾若飛也何㫄觀之巧匠韓文巧匠㫄觀縮手袖間猶不廢乎拙工特枉雙魚見華五雉竝見前某瀆三不告易初筮告再三瀆瀆則不告負四宜休山谷四休居士詩序粗茶淡飯飽即休補破遮寒暖即休三平二滿過即休不貪不妬老即休某水某丘乃童子所釣遊也韓文某水某丘吾童子時所釣遊也詳見前彼鋸彼斧惟梓人之進退焉栁文梓人傳委群材㑹衆工或執斧斤或執刀鋸梓人左持引右執杖而中處焉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斵刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢怨焉代囘廣東孟提舉植避直郎闈服勤使節番陽之召來朝何錫予之詩采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乗馬又何予之𤣥衮及黼嶺嶠于行言逺而光華也恭惟某官受才膚敏賦政中和竝見前不俟駕固將朝陳前甚敬將入門奔而殿敢後則非驅駱馬之嘽嘽詩四牡騑騑嘽嘽駱馬嘽音灘說文喘息也詩傳喘息之貌妥飛鳶之跕跕見前梅花雪片洗空五嶺之炎杜詩梅花萬里外雪片一冬深茶焙鹽帆贍足九年之食使乎不辱王所謂何某有幸卜隣並見前謂當聨事北山瞋膽已移猿鶴之文北山移文蕙帳空兮夜鶴怨山人去兮曉猿驚又叢條瞋膽疊頴怒魄或飛柯以折輪乍低枝而掃迹東野囘頭猶有駏蛩之願昌黎醉留東野詩低頭拜東野願得終始如駏蛩東野不廻頭有如寸筳撞鉅鐘蛩音窮駏音巨說文蛩蛩巨虛獸名也孔叢子北方有獸名蟨食得甘草必齧以遺蛩蛩巨虚二獸見人來必負蟨以走二獸非愛蟨也為其得甘草以遺之蟨非愛二獸也為其假足也司馬相如子虚賦作蛩蛩距虛注卭卭青獸如馬距虚似驘而小郭璞曰距虚即蛩蛩互言耳吕氏春秋北方有獸名蟨䑕前而兎後趨則頓走則顛蛩蛩前足髙不得食而善走蟨常為蛩蛩取食蛩蛩負之而走爾雅西方有比肩獸焉與卭卭岠虚比為卭卭岠虚齧甘草即有難卭卭岠虚負而走其名曰蟨疏云今鴈門廣武縣夏屋山下有獸形如兎而大相負共行土俗名之爲蟨䑕又云亦名巨虚郭璞比肩獸賛曰蟨與岠虚乍兎乍䑕長短相濟彼我俱舉有若自然同心共膂代囘湖北趙提舉師古虎符訢合牡轡光華卧護重湖材素雄於辦治尹賞傳四子皆至郡守皆尚威嚴有辦治名張敞傳武必辦治梁矣互見前身兼數印權益重於按臨見前恭惟某官徳秉忱恂尚書廸知忱恂于九徳之行識全膚敏一路大計惟錢榖幾何刑獄幾何連年多虞盖蓄積缺矣忠信缺矣詩序皇皇者華廢則忠信缺矣華黍廢則蓄積缺矣繡斧兹煩於直指采衣尤樂於平反雋不疑傳即不疑多所平反母喜笑為言語飲食異于他時東坡詩京兆平反一笑春載馳載驅想星言之夙駕是穮是衮將天道之好還穮悲嬌切說文耕禾間也徐曰禾已長大復鉏其間草也廣韻除田薉蓘壅苖也左傳是穮是蓘老子以道佐入主者不以兵强天下其事好還某闕然僝功偶此攝長送之以禮樂愧賀幅之已稽是以有衮衣願徳音之是懋並見前代囘淮東陳倉孔碩抗辭請外將指臨邉明啓刑書未覺丞哉之負尚書明啓刑書胥占時月湖為刑侍式遏㓂虐正觀使者之功詩式遏㓂虐憯不畏明注㓂虐害加于民當用法遏止之恭惟某官表嚴而裏寛人今而學古孔懐同氣蟬孰嘆於有緌詩死䘮之威兄弟孔懐注言兄弟之㤙至厚有死䘮可怖畏之事維兄弟之親甚相思念餘人則不能也禮記成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰正義曰成孟氏所食采邑子臯孔子弟子蠶則績絲作繭蟹背殻似匡范蜂也蜂頭上有物似冠蟬喙長在口下似冠之緌也蠶則須匡以貯繭而今無匡蟹背有匡匡自著蟹則非為蠶設蜂冠無緌而蟬口有緌緌自著蟬非為蜂設譬如成人兄死初不作衰後畏子臯方為制服服是子臯為之非為兄施亦如蟹匡蟬緌各不闗於蠶蜂也折獄片言雀難欺於無角詩誰謂雀無角何以穿我屋注物有似而不同雀之穿屋不以角乃以咮言人誰謂雀無角乎雀若無角何以得穿我屋乎適淮民之饑饉勤周道之逶迤側聞褰帷列子吾側聞之試以告汝良多負襁粟塞其庾斯成末乃取闢之功昌黎元和聖徳詩末乃取闢駭汗如冩優賞將吏扶珪綴組帛堆其家粟塞其庾印弄於朝行有無以易堯之命見前某濫司􅅚化周禮以九職任萬民五曰百工􅅚化百材詳見前莫贊光華遺我雙魚豈止加餐之字古詩客從逺方來遺我雙鯉魚呼童烹鯉魚内有尺素書長跽讀素書書中意何如上有加餐飯下有長相思駕彼四駱請歌靡盬之詩見前代囘江西章提舉良肱五雉工正之聯承人之乏左傳攝官承乏餘見前四牡使臣之重博我以文得非所蒙願竊有復恭惟某官内外揚歴表裏融明開南嶽之雲厥功已茂􅈭西江之水所恵滋多竝見前蘇民氣於崇朝詩曽不崇朝又崇朝其雨注崇終也從旦至食時為終朝尚書大傳五嶽皆觸石而出雲膚寸而合不崇朝而雨者唯㤗山雲乎斧盗吭兮未晩吭吉郎切㗋也韓文孰為不順徃斧其吭皇華原隰之上願益咨陬清切雨露之邉㑹觀獻納某强顔曵履决意投簮觀風而問髙年想憐其拙畫地而數佳政亦足以歸代囘浙西林提舉拱辰簮筆何功䝉誤㤙之起廢函牋為恵感妙語之􅌵枯或承之羞不知所賀並見前恭惟某官髙誼絶俗厚徳鎮浮宜頡頏於飛霞韓詩乞君飛霞佩與我髙頡頏猶簸弄於明月韓詩婆娑海水南簸弄明月珠駕彼四牡名大震於京師法言谷口鄭子真不詘其志耕於巖石之下名震於京師遺我䨇魚光自生於庭戸某拜命之辱左傳莊公十一年宋大水公使弔焉曰天作滛雨而害于粢盛若何不弔對曰孤實不敬天降之災又以為君憂拜命之辱又齊人獲臧堅齊矦使夙沙衛笞之且曰無死堅稽首曰拜命之辱有味其言咫尺不違顔雖少華於末路鄒陽傳晚節末路八十猶行脚諒見笑於大方代回淮東劉提舉庶斜日投閑冐誤㤙而入侍朶雲借潤儷好語以相先自惟闕然何以得此恭惟某官早飛雋望寖踐夷塗忽持漢節之光華出問淮人之饑饉民為國之本不應一付之烏鳶並見前君乘使者車乃可再安於鴻鴈詩序鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之餘見前行且召矣願少需之某生也有涯見前身其餘幾左傳畏首畏尾身其餘㡬言人之一身既畏其首又畏其尾則其中不畏者不多意行迷路又渉赤墀之塗興盡囘船終尋黄石之約晉書王徽之嘗居山隂夜雪初霽月色清朗四望皓然獨酌酒詠左思招隐詩忽憶戴逵逵時在剡便夜乘小舟詣之經宿方至造門不前而反人問其故徽之曰本乘興而來興盡而反何必見安道耶張良傳老父曰後十三年孺子見我濟北穀城山下黄石即我已後十三年從髙帝過濟北果得穀城山下黄石取而寳祠之代囘淮東趙提舉希道甸侯底績栁詩繼酬天禄署俱尉甸侯家庾節遄驅十二政之聚民可觀近效周禮荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛役五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昬十有一曰索鬼神十有二曰除盗賊六百石之察郡益究逺圖漢百官表武帝元封五年初置部刺史掌奉詔條察州秩六百石邉靣得賢宋史曹彦約傳彦約以蜀之邉靣諸司並列兵權不一作病夫議獻之廟堂上心倚重恭惟某官禀資信厚詩序麟趾闗雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也毓徳直温尚書命汝典樂教胄子直而温寛而栗頃結綬於王畿顔延之詩結綬登王畿即分符於輔郡適時艱食尚書奏庶艱食鮮食極力救荒能活數千萬人之饑何必四十二考之政宋富鄭公弼坐謗徙知青州㑹河北大水流民轉徙東下者六七十萬人公一皆招納之勸民出粟自為區畫散處境内室廬飲食醫藥纎悉無不備從者如歸市有勸公非所以處疑弭謗禍且不測公曰吾豈以一身易此六七十萬人之命哉行之愈力明年河北二麥大熟人皆襁負而歸則公所全活也公嘗與一所厚書云在青州偶能全活數萬人勝二十四考中書令逺矣出葉少蘊避暑語錄有華出綍亟命搴帷財貨本末源流諒皆素習荀子田野縣鄙者財之本也垣窌倉廪者財之末也百姓時和事業得叙者貨之源也等賦府庫者貨之流也勞來還定安集自有成規六轡既均二節以走某欽聞視篆未果襞牋遺我䨇魚良感從逺方之恵駕彼四牡何幸勞使臣之來並見前代回湖北曹提舉彦約短衣疋馬又塵紫槖之班長跪䨇魚如見繡衣之面盧仝詩開緘如見諫議靣餘竝見前雖無以報東坡祭韓忠獻公文雖無以報不辱其門敢誦所聞恭惟某官學本遺經韓詩獨抱遺經究終始用周當世一種陶潜之秫秫食律切說文穀之黏者増韻糯也考工記鍾氏以朱湛丹秫晉書隐逸傳陶潜為彭澤令在縣公田悉令種秫穀曰令吾常醉於酒足矣再依王儉之蓮見前扞敵騎於淮濱晉書謝𤣥敗苻堅於淮水見八公山草木皆兵屹長城於漢水恢然游刅經肯綮之未嘗並見前快哉此風摶扶摇而在下宋玉風賦快哉此風寡人所與庶人共者耶屬重湖之瘡痏痏榮美切說文疻痏也廣韻瘡痏顔真卿傳瘡痏未平西京賦所惡成瘡痏東坡詩莫生尤物為瘡痏煩一節之咨諏禮記一節以走詩周爰咨諏因而訪桃源之桃不妨假館桃源山在常徳府桃源縣二十里圖經云山下有桃川宫西南一里有桃源洞云是昔秦人避亂之地有洞如門巨石屏蔽靈跡猶存今為第三十五小洞天陶淵明桃花源記云晉太元中武陵漁人沿溪行忽逢桃花夾岸行盡小源得一山有小口捨舟從口入豁然開朗男女衣著悉如外人自云先世避秦來此問今是何代乃不知有漢無論魏晉漁人出具告太守遣人隨徃迷不得路後遂無問津者任安貧武陵記晉太康中武陵漁人黄道真泛舟自沅泝流而入道真既出白太守劉歆歆與俱徃則已迷路與陶記畧同宋鄭景望蒙齋筆談云陶淵明所記桃花源今鼎州桃花觀即是其處湖湘間人頗能言其勝事云自晉宋來由此上昇者六人假館曹交事恐未熟橘洲之橘已見趣裝橘洲在常徳府龍陽縣西北五十里周回三里長二十里本名汎洲盛𢎞之云李衡字平叔仕呉為丹陽太守每欲理産業妻習氏不許衡宻遣人於龍陽汎洲種橘千株臨終勅其子曰汝母惡吾營家故貧如此吾於汎洲種橘乃千頭木奴不匱汝衣食太史公言江陵千株橘其人與千戸侯等盖謂此也今洲上民數百家橘不存矣湘中記或曰昭潭無底橘洲浮每大水諸洲皆沒而橘洲獨存焉趣裝曹參事某久於離群禮記離群索居兹焉還綴綴林衛切音與惴同禮記行綴疏謂鄼也正義曰謂鄼聚舞人行位之處老夫耄矣更數旬金馬之門左傳老夫髦矣無能為也晉書索紞傳老夫耄矣不為媒也顔真卿傳老夫髦矣曾掌國禮我公歸兮或一笑銅駝之陌詩無以我公歸兮薛宣傳壹关相樂師古曰壹关謂一為歡关耳关古笑字晉書索靖傳靖有先識逺量知天下將亂指洛陽宫門銅駝歎曰㑹見汝在荆棘中耳白帖洛陽大道有銅駝因名銅駝陌陸機洛陽記金馬門外聚群賢銅駝陌上集少年又云有銅駝二枚在宫之南四㑹道師古曰亦云銅駝街在洛陽西京無也陳書徐陵傳盧龍之徑于彼新開銅駝之街於我長閉梁詩穿渠引金谷闢道出銅駝代囘趙提舉汝讜代衛參帥趙汝讜傳為大理司農丞與史彌逺不合請外改湖南提舉常平易江西尋提㸃刑獄分閫罔功願歸吳下江表傳吳下阿䝉改轅有命俾牧閩中史記東越傳以其地為閩中郡徐廣曰今建州侯官是髙帝紀帥閩中兵以佐滅秦業已控辭期於得請欲謝吹嘘之送杜詩揚雄更有河東賦唯待吹嘘送上天已成怠緩之慙恭惟某官屈漢宗英持周使簜江湖表裏勤四牡之載驅並見前山岳動摇覺千牛之立觧唐韋仁約除御史曰御史啣命出使不能動摇山嶽震懾州縣誠曠職耳莊子所觧數千牛矣謋然已觧如土委地注理觧而無刀迹若聚土也饑者欲令其得食慨然已見於登車諒必由洪都新府而來猶可陪冀州故人之飲俱見前行止非人能也得無戀戀之情范睢傳綈袍戀戀有故人之意邂逅適我願兮宜有諄諄之誨苐恐一節之走能回六轡之馳某正爾思蓴又䝉分竹俱見前冞入其阻足觀海上之禽魚詩冞入其阻注冞者深入之意不已於行只負山中之猿鶴詩或燕燕居息或盡瘁事國或息偃在􅇃或不已於行北山移文蕙帳空兮夜鶴怨山人去兮曉猿驚代回王提舉遇代月湖右翊合符左畿易節田里之無愁歎畫地共談原隰之有光華去天一握三秦記民謡曰武功太白去天三百孤雲兩角去天一握山水險阻黄金子午蛇盤馬櫳勢與天通方輿勝覽孤雲山在興元府亷水縣東南百七十里與兩角山相連玉堂閑話云興元之南有太行路通於巴州其路險峻三日而達於山頂其絶髙處謂之孤雲兩角去天一握淮隂廟在焉按興元即今陜西漢中府宋𨽻利州東路恭惟某官學為儒倡新唐書韓愈傳贊以六經之文為諸儒倡政作吏師朱愽傳贊所在而治為世吏師出守晋陵適楚氛之甚惡常州晋為毘陵郡又諱毗改晋陵郡又京口亦稱晋陵宋書武帝紀過江居晋陵郡丹徒縣之京口里左傳楚氛甚惡獨明名教救周民於孑遺茲由畫㦸之香進席繡衣之寵席藉也尚書兹殷庶士席寵惟舊公方念越人之􅇤加戚於心韓文若越人視秦人之肥􅇤忽焉不加喜戚於其心上將思王某之文最宜為誥韓文王某之文可思最宜為誥某比方謁入復辱書來四牡之勞使臣行且召矣五雉之為工正猶幸見之俱見前囘尤提舉棐去國奉祠久抱伐檀之愧詩序伐檀刺貪也在位貪鄙無功而受禄君子不得仕進爾起家進職忽叨分竹之榮曾巽謝之未遑何謙撝之甚寵恭惟某官見聞博洽議論崇谹尚書之履有聲典刑是似部使之斧直指風采凛然皇華寜乆於咨諏清切即觀於獻納並見前某仝為吳客共落楚鄉徳必有隣倚輔車而増重輔說文頰車也左傳輔車相依注輔頰輔車牙車也或作䩉易咸其䩉虞云耳目之間稱䩉釋名曰頥或曰輔車其骨彊可以輔持其口或謂牙車牙所載也或謂頷車也詩巧􅀏倩兮毛傳云好口輔也詳此則牙車頷車牙下骨之名也頰之與輔口旁肉之名也葢輔車一處分為二名耳輔是外表車是内骨故云相依觀唇齒之喻則皆近取諸身耳恐人以為車輔之輔故詳著之服之無斁藏簡牘以為榮詩為絺為綌服之無斁宗正宋四朝志元豐官制行詔大宗正司不𨽻六曹大宗正以宗室團練使以上有徳望者為之次一人為同知位髙屬尊者為判掌紏合族屬而訓之以徳行道藝受其詞訟而紏正其愆違有罪則先劾以聞法例不能决者同上殿取裁凡宗室服屬逺近之數及其賞罸規式皆􅄣屬之代囘西外趙知宗不懬懬苦謗切說文闊也漢武帝詔庶僚久懬宋㑹要崇寜九年蔡京申請宗正既許分居兩京輔郡乞於兩京置外宗正司擇宗正賢者管幹逐處各置一人仍於本州通判職官内選二人兼領丞簿凡外任宗室事不于州縣者外宗正受理大觀三年罷政和二年復置南渡後南外置司泉州西外置司福州丞係猝兼簿係僉判兼小宰立班愧星辰之曵履周禮小宰之職掌建邦之宫刑以治王宫之政令杜詩聽履上星辰大宗維翰貽月露之連篇詩大邦維屏大宗維翰注大宗王之同姓適子翰幹也李諤書連篇累牘不出月露之形積案盈箱惟是風雲之狀雖過乎情良感此意恭惟某官忱恂有守信厚不浮並見前敷天揖同姓之聨肅然紏合左傳昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府太師職之桓公是以紏合諸矦而謀其不協彌逢其闕而匡救其災昭舊職也晝日宣三徳之敬莫不浚明易晝日三接尚書日宣三徳雖云為善之居家尤樂推賢而報國有華新渥杜詩新渥照乾坤猥及陳人某司臬亡庸共工甚忝見前虎拜稽首願觀蕃錫之榮詩虎拜稽首天子萬年易康矦用錫馬蕃庶晝日三接龍作納言已懼曠瘝之辱尚書龍命汝作納言代囘西外趙知宗不懬疏詔東平後漢書東平憲王蒼建武十五年封東平公十七年進爵為王贊曰東平好善辭中委相展親西外尚書時庸展親王曰叔父立愛始于家邦詩王曰叔父建爾元子尚書立愛惟親立敬惟長始于家邦終于四海汝作秩宗受祉施於孫子尚書帝曰俞咨伯汝作秩宗詩既受帝祉施於孫子棣華韡韡韡音偉說文盛也詩棠棣之華鄂不韡韡鄂通作萼毛傳鄂猶鄂鄂然言外發也箋云承華者曰鄂𤓰瓞緜緜瓞音垤詩緜緜𤓰瓞民之初生自土沮㵕詩傳曰瓞小𤓰在枝間連大𤓰也以喻子孫承嗣也毛傳𤓰紹也箋云𤓰之本實繼先嵗之𤓰必小狀似瓝故謂之瓞正義云𤓰族類有二種大者𤓰小者瓞𤓰蔓近本之𤓰必小於先嵗之大𤓰其小如瓝瓞是瓝之别名恭惟某官大雅不羣為善最樂並見前箴規磨琢蹈衛武之流風詩序淇澳羙武公也有文章又能聽其規諫以禮自防故能入相于周羙而作是詩也忠義輪囷粲劉向之封事劉向傳天子擢周堪為光禄勲堪弟子張猛光禄大夫給事中大見信任𢎞恭石顯憚之數譛毁焉更生見堪猛在位幾已得復進懼其傾危乃上封事時上無繼嗣政由王氏出災異寖甚向謂陳湯曰災異如此而外家日盛其漸必危劉氏吾幸得同姓末屬歴事三主吾而不言孰當言者遂上封事極諫庸專紏合之任見上條助成睦族之仁周之宗盟誰若滕矦之長左傳􅅬矦薛矦來朝爭長薛矦曰我先封滕矦曰我周之卜正也薛庶姓也我不可以後之公使羽父請于薛矦曰周之宗盟異姓為後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯唐之宰相豈遺徳裕之賢新唐書宗室宰相傳贊唐宰相以宗室進者九人林甫姦䛕幾亡天下李程和柔在位無所發明其餘以財稱職號賢宰相某側聽渙揚未遑旅賀渙旅卦名召伯分治諒信如麟趾之時詩序闗雎之化行雖衰世之公子皆信厚如麟趾之時詳見前長卿倦㳺愧莫續兎園之賦見前四六標準卷二十六
