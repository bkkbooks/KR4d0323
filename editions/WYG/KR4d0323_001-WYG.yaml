body:
  text: 四六標準卷一宋李劉撰言時政上史丞相嘉定丙子宋史寧宗紀嘉定元年以史彌逺為右丞相丙子為嘉定九年宋史本傳彌逺字同叔浩之子寧宗崩擁立理宗拜太師左丞相兼樞密使進封㑹稽郡王卒追封衞王諡忠獻初彌逺既誅韓侂胄相寧宗十有七年迨寧宗崩廢濟王非寧宗意立理宗又獨相九年擅權用事專任憸壬理宗德其立己之功不思社稷大計雖臺諫言其姦惡弗恤也彌逺死寵渥猶優其子孫厥後為製碑銘以公忠翊運定策元勳題其首濟王不得其死識者羣起而論之而彌逺反用李知孝梁成大等以為鷹犬於是一時君子貶竄斥逐不遺餘力云元李有古杭雜記云溫陵吕中作國史要略謂南渡之後一壊於紹興之檜再壊於開禧之韓三壊於嘉定之史愚亦謂理宗四十年在御一壊於嵩之再壊於大全三壊於似道也相之壊國如此哉索長安之米擬就辟書漢書東方朔傳臣言可用幸異其禮不可用罷之無令但索長安米上大笑因使待詔金馬門山谷詩公車徒詔老恢諧饑來索米長安街漢自詔舉之外其府寺郡國屬吏皆令自辟左雄疏吏職滿歲宰府州郡乃得辟舉晉書魏舒傳陳留周震屢為諸府所辟辟書既下公輒喪亡僉號震為殺公掾阮籍傳太尉蔣濟聞其有雋才而辟之籍詣都亭奏記曰開府之日人人自以為掾屬辟書始下而下走為首徐氏曰公府辟命自西京則然東漢之世公卿尤以辟士相高卓茂習詩禮為通儒而辟丞相府蔡邕博學好詞章而辟司徒橋𤣥府周舉博學洽聞為儒者宗而辟司徒李郃府又有五府交辟如黃瓊者四府並命如陳紀者一洗末世茍合之風矣宋史選舉志宋初内外小職任長吏得自奏辟熈寧間悉罷歸選部然處要職任尋又立專法聽舉於是辟置不能全廢也唐曹松詩辟書來幾日遂喜就嘉招張籍詩辟書逺到開呈客公服新成著謝恩王介甫詩辟書今日看君去伏光範之門尚干賓謁唐光範門在大明宫含元殿西舊唐書廣德二年郭子儀於都省領副元帥事宰臣百寮自光範門送至省門杜氏通典公主受冊設冊案便次於光範門韓文謹伏光範門再拜獻書柳文僕時通籍光範門含元殿賦瞵光範之揭揭謁於歇切説文白也爾雅請也告也曲禮問士之子長曰能典謁矣幼曰未能典謁也注謁請也謂能擯贊出入以事請告也左傳唯我鄭國之有請謁焉注謁告也增韻訪也請見也漢書謁歸謂請歸袁盎傳上謁注若今通名也史記酈生踵軍門上謁按劒叱使者使者懼而失謁跪拾謁還走入報特有惓惓之意劉向傳惓惓之義司馬遷傳惓惓之忠注惓惓忠謹之意亦作卷賈捐之傳敢冒死竭卷卷朱浮傳臣浮愚戇不勝惓惓未敢察察而言韻㑹察察過詳貌老子俗人察察又其政察察注察察急且疾也漢書五行志不敢察察言注不敢察察明言之夏侯勝傳惡察察言師古曰察謂計謀不敢明顯言之也屈原漁父篇安能以身之察察受物之汶汶者乎後漢書尹敏傳何為察察而遇斯患乎輒以萬分莊子今於道秋毫之端萬分未得處一焉又其存之國也無萬分之一戰國策故纒牽於事萬分之一也張釋之傳有如萬分一谷永傳不足以報塞萬分李尋傳庶幾萬分有一可采蕭望之傳奉萬分之一揚雄劇秦美新雖未究萬分之一亦臣之極思也黃瓊傳庶有萬分無恨三泉鄭興傳留聽少察以助萬分桓榮傳補益萬分杜密傳不亦萬分之一乎柳文茍有輔萬分之一雖死無憾寫之四六柳文駢四儷六錦心繡口盧氏記四六之作起自徐庾雲莊四六餘語云帝王之制備載乎書典謨訓誥誓命之文多以四字為句惟鮮對偶後之制誥間以六字而以四字成聨者亦多賦者古詩之流今則四六矣詩三百篇其間長短句固無幾四者殆四六之所祖陳後山詩四六老能工韓子蒼答曾公衮啓舊知四六之工彌起再三之歎儀圖愛助此周人待山甫之情詩人亦有言德輶如毛民鮮克舉之我儀圖之仲山甫舉之愛莫助之鄭𤣥云儀匹也人之言云德甚輕然而衆人寡能獨舉之以行者言政事易耳而人不能行者無其志也我與倫匹圖之而未能為也愛惜也仲山甫獨能舉此德而行之惜乎莫能助之者翕受敷施亦虞舜舉臯陶之意尚書翕受敷施九德咸事俊乂在官孔傳翕和也能合受三六之德而用之以布施政教他無求者公幸聽之竊惟國家閒暇之時東坡答試館職人啓國家求賢之道必於閑暇無事之時賢者報國之功乃在緩急有為之際當思文武久長之術陸賈傳賈時時前説詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而以順守之文武竝用長久之術也況外夷之雲擾長楊賦豪俊麋沸雲擾漢書敘傳天下雲擾注言盜賊擾亂如雲而起赤伏符曰四夷雲擾龍鬬於野杜篤傳海内雲擾諸夏滅微晉陽秋天子䝉塵四方雲擾貴内治之日嚴詩序天保以上治内采薇以下治外尚書日嚴祇敬六德詎云行李之通左傳行李之往來韻㑹舉要云昭十三年行理之命注使人也國語行理以節逆之周禮小行人孔鼂注亦作李漢天文志騎官左角曰理史記天官書作李蓋古文理與李通管子大理皆作李李濟翁資暇集謂􅡛為古文使字改行李為行使誤矣宋方勺泊宅編云世言行李杜預云使人也唐李濟翁曰當作行使余按史記臯陶為大理一本作大李天官書熒惑為李注云外則理兵内則理政又黄帝有理法一篇注李者法官之號總兵刑故名李法北史敘傳李氏為堯之理官因為氏後改為李則與理其義自通蓋人將有遠行必先治裝如孟子之言治任鄭當時之言治行理亦治也按宋史寧宗開禧三年韓侂胄誅後以許奕為金國通問使嘉定元年金人歸大散關及濠州遣使來賀瑞慶節金主殂命曾從龍使金弔祭遣宇文紹彭使金賀即位二年金遣費摩正來告哀遣俞應符賀金主生辰遣費培使金賀正旦三年遣黄中賀金主生辰四年遣余嶸賀金主生辰是年金國有難賀生長使不至五年遣傅誠賀金主生辰六年遣董居誼賀金主生辰遣真徳秀賀金主即位㑹金國亂不至而還七年金國來督歲幣真德秀奏罷歲幣八年遣丁煟賀金主生辰九年遣留筠賀金主生辰所謂行李之通也可緩苞桑之慮易其亡其亡繫於苞桑疏苞本也凡物繫於桑之苞本則堅固也若能其亡其亡以自戒慎則有繫於苞桑之固國虛難動民困易摇豈待謀國之數公知諱用兵之兩字宋名臣言行錄熈寧初富弼再相神宗首問邊事公曰臣愚以為首當推恩惠布德澤二十年未可道著用兵二字上問所當先如何公曰阜安宇内為先然能應則乃可謂定故欲翕者未始不張老子將欲翕之必固張之今徒千里而畏人未思四境之不治一氣先竭百為弗開尚書至於百為大不克開羣材付之乍佞以乍賢王尊傳尊之身三期之間乍佞乍賢正論聽其自鳴而自息東坡集譬之候蟲時鳴自鳴自己何足為損益耳目之受既狹心腹之委亦偏為赤子為龍蛇未始得敵情之實韓文以武則忿而憾以恩則肆而横一以為赤子一以為龍蛇以皮幣以犬馬但云量事力之宜軍籍既隱於蔽䝉將材又阨於媢嫉舟師未練馬政不修鑿斯池築斯城豈可無九攻之具呂氏春秋公輸般為高雲梯攻宋墨子設為守宋之備般九攻之墨子九卻之高適詩雲雷隨九攻鍛乃戈礪乃刃孰能遏再鼓之衰尚書鍛乃戈矛礪乃鋒刃左傳云戰勇氣也一鼓作氣再而衰三而竭仰而思之無非事者上作而下不應朝廷每有是言東坡策别云天下之禍莫大於上作而下不應其患起於天子無同憂患之臣而將軍無腹心之士一有緩急將誰為之倡哉外呼而内不聞郡國亦為此論惟事事備乃可無患尚書惟事事乃其有備有備無患言人人殊何以成功封禪書方士言封禪人人殊曹參傳諸人以百數言人人殊周得上漢得中策將安出匈奴傳王莽拜十二部將十道竝出窮追匈奴莽將嚴尤諫曰臣聞匈奴為害所從來久矣未聞上世有必征之者也後世三家周秦漢征之然皆未有得上策者也周得中策漢得下策秦無策焉蠡治内種治外責恐宜分越語范蠡曰四封之内百姓之事蠡不如種也四封之外敵國之制立斷之事種亦不如蠡也越絶書種躬正内蠡出治外内不煩濁外無不得臣主同心遂霸越邦東坡策略越之滅呉以内外不相擾是以能有所立范蠡治外凡四封之外所以待呉者種不知也大夫種治内凡四封之内所以富國强兵者蠡不知也二人者各專其能各致其力是以不勞而滅呉試考先朝立四總管之謀隋書韋世康傳時天下唯置四大總管并揚益三州竝親王臨統唯荆州委於世康時論以為美中興㑹要總管自魏始歴代沿革不常宋慶厯七年析河北四路各置都總管一員建炎元年李綱言守備當於沿江沿淮沿河置帥府要郡以控扼其帥府文臣一員帶安撫使馬步軍都總管武臣一員充副總管改路分為副總管路鈐轄為副鈐轄州鈐轄為副都監遇朝廷起兵則副總管為帥副鈐轄都監各以兵從出聽其節制及觀諸儒分三大鎮之説南齊三鎮謂壽陽盱眙淮隂元魏高閭曰三鎮淮南之本原魏了翁傳了翁轉對論江淮襄蜀當分為四重鎮擇人以任虛心以聽假以事權資以財用為聨絡守禦之計皆欲取之人望李膺傳雖匱人望内含秘願盧植傳盧尚書天下大儒人之望也從而假以事權宋史魏了翁傳了翁轉對論江淮襄蜀當分為四大鎮擇人以任虛心以聽假以事權資以財用此蓋出其緒論云一用孔明陸遜之規模蜀志諸葛亮傳亮外連東呉内平南越立法施度整理戎旅工械技巧物究其極科教嚴明賞罰必信無惡不懲無善不顯至於吏不容奸人懐自厲道不拾遺强不侵弱風化肅然也呉志陸遜傳評曰劉備天下稱雄一世所憚陸遜春秋方壯威名未著摧而克之罔不如志予既竒遜之謀略又歎權之識才所以濟大事也又曰遜忠誠懇至憂國忘身庶幾社稷之臣矣力行晁錯充國之議論漢書晁錯傳錯言守邊備塞勸農力本當世急務二事詔舉賢良文學士錯在選中上親策之對策者百餘人唯錯為高第趙充國傳充國上屯田奏留屯得十二便出兵失十二利充國奏毎上輒下公卿議臣初是充國計者什三中什五最後十八有詔諸前言不便者皆頓首服朝廷毎有四夷大議常與參兵謀問籌策焉移江上之屯於淮上實關表之粟如關中使權守禦之方漸講招懐之略袁安傳光武招懐南虜衆犬方狺則格天囘照狺疑斤切本作㹞説文㹞犬吠聲或作狺宋玉九辯豈不鬱陶而思君兮君之門九重猛犬狺狺而迎吠兮關梁閉而不通趙壹刺世嫉邪賦欲竭誠而盡忠路盡險而靡縁九重既不可啓又羣犬之狺狺杜詩㹞㹞國多狗栁文狺狺嘯呼曹植上疏求存問親戚曰葵藿之傾葉太陽雖不為之囘光然向之者誠也兩虎既傷則取亂侮亡既傷徽本誤作共鬬戰國策陳軫曰有兩虎爭人而鬬管莊子將刺之管與止之曰虎者戾蟲人者甘餌今兩虎爭人而鬬小者必死大者必傷子待傷虎而刺之則是一舉而兼兩虎也無刺一虎之勞而有刺兩虎之名史記莊子欲刺虎館竪子止之曰兩虎方且食牛食甘必爭爭則必鬬鬬則大者傷小者死從傷而刺之一舉必有兩虎之名又趙奢傳如虎鬬於穴中將勇者勝藺相如傳如兩虎共鬬勢不俱生春申君傳兩虎相與鬬而駑犬受其弊寇恂傳天下未定兩虎安得私鬬尚書兼弱攻昧取亂侮己是為屈羣策以共圖揚子法言漢屈羣策羣策屈羣力奚至無寸功之可論李廣傳自漢征匈奴廣未嘗不在其中然終無尺寸之功以封侯何也杜詩從軍十年餘能無分寸功與其待一朝之患始出於兹孰若折千里之衝早為之所家語不出尊俎之間折衝千里之外賈復傳有折衝千里之威馬融傳帝王之所以耀神武而折遐衝者也左傳不如早為之所無使滋蔓蔓難圖也若任人而疑疑人而任陸宣公奏議凡欲選任將帥必先考察行能疑者不使使者不疑李石傳贊任人不疑得親親用賢之道則聞事不實實事不聞新唐書陸贄傳任者不必才才者不必任聞不必實實不必聞所信不必誠所誠不必信行不必當當不必行桯史秦檜既死高宗詔湯鵬舉執法殿中選人任盡言以啓賀之曰請言有宋之姦臣無若亡秦之巨蠧忠臣不用而用臣不忠實事不聞而聞事不實忠憤扼腕智識寒心何怪草野之私言韓非子慮事廣肆則曰草野而倨侮動違槐棘之成算周禮左九棘孤卿大夫位焉面三槐三公位焉注樹棘以為位者取其赤心而外刺象以赤心三刺也槐之言懐也懐來人於此欲與之謀日月逝矣風雨萃之柳宗元弔樂毅文大厦之騫兮風雨萃之車亡其軸兮乘者棄之無謂天變不足慮人言不足從宋史王安石傳安石傳經義出己意辯論衆不能詘甚者謂天變不足畏祖宗不足法人言不足恤淳祐改元理宗幸太學御筆云王安石謂天命不足畏云云此三語為萬世之罪人豈宜從祀孔子合削去以正人心息邪説東坡擬進士對御試策云詩書所稱不可勝言所可知者必畏天必從衆必法祖宗未嘗言天命不足畏衆言不足從祖宗之法不足用也蓋指安石庶幾君子有所恃小人有所畏東坡祭歐陽文忠公文民有父母國有蓍龜斯文有傳學者有師君子有所恃而不恐小人有所畏而不為恭惟某官韻㑹某者未定之位宅也凡不知名者皆言某穀梁傳范寗注鄧某地陸德明釋文曰不知其國故云某地今知其為何官矣而亦云某官者如尚書云元孫某禮記云孝王某蓋指其官而省文云爾堪輿間氣漢書藝文志堪輿金匱十四巻許慎云堪天道輿地道也甘泉賦屬堪輿以壁壘兮張晏曰堪輿天地總名也春秋演孔圖正氣為帝間氣為臣玉堂遺範韓𢎞制天毓間氣時推上材楊矩行韓建制星緯炳靈山河間氣王摩詰詩入用還推間氣賢楊巨源詩間氣登三事又廟謨膺間氣劉真卿詩間氣生真宰又大才生間氣王文公集受天間氣為世元龜社稷世臣蕭望之傳望之堂堂折而不撓輔佐之能近古社稷臣也汲黯傳古有社稷之臣至如汲黯近之矣砥柱不移回平原黃河之決陜州志砥柱山一名三門山南曰鬼門中曰神門北曰人門水經注昔禹治洪水山陵當水者鑿之故破山以通河河水下流包山而過山見水中若柱然故曰砥柱也宋唐譽之昨夢錄云白馬之西即砥柱也水常高柱數尺方河怒為柱所抳力與石鬬晝夜有聲如雷震議者欲鑿柱以殺河之怒石堅終不能就山谷詩河從天來砥柱立吕氏春秋古龍門未闢吕梁未發河出孟門大溢逆流無有邱陵沃衍平原高阜盡滅之名曰洪水漢書黄河如帶物理論河色黄赤衆川之流蓋濁之也爾雅河出崑崙墟色白所渠并千七百一川色黄終風且曀洗咸池白日之光曀音縊詩終風且曀不日有曀終風終日風也隂而風曰曀山海經東南海之外甘水之間羲和之國有女子名曰羲和方日浴于甘淵羲和者帝俊之妻生十日郭璞注羲和蓋天地始生主日月者也故堯因此而立羲和之官淮南子日出於暘谷浴於咸池吕溫狄梁公立廬陵王傳讚取日虞淵洗光咸池潛授五龍夾之以飛黃山谷詩咸池浴日月力調更化琴瑟之絃董仲舒傳竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也復享和戎金石之樂左傳鄭人賂晉侯以歌鐘二肆及其鎛鐘女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳於是乎始有金石之樂如將道古今而譽德韓文才畯滿前道古今而譽盛德入耳而不煩亦可紀簡策以垂功然太師維垣輔隆興不滿一歲詩价人維藩太師維垣注太師三公也垣牆也彌遠父浩隆興元年拜右僕射兼樞密使五月除知紹興不拜淳熈五年復右僕射今西平有子相嘉定行且十年柳文蔡人率止惟西平有子西平有子惟我有臣彌逺嘉定元年入相至此九年此非門户之私榮晉書郗鑒傳是臣門户子弟孫盛傳自是關君門户事南史王曇首傳門户何寄王訓傳是興門户者陸慧曉傳顧琛一公兩掾英英門户王奐傳百年門户宜思後計實負乾坤之重寄用藥莫先於無病東坡志林節慎在未病之前而服藥在已病之後止車當在於未奔法言或曰奔壘之車沉流之航可乎曰否或曰焉用智曰用智於未奔沉相亦惟終尚書自周有終相亦惟終孔傳君臣用忠信有終邦其無斁尚書萬邦惟無斁孔傳萬國惟乃無斁我周德如某者拙由地稟狷不時宜獨竊考治亂之原知當謹幾微之㑹貧賤不能以達志憂患又從而熏心詩憂心如熏東坡集積憂熏心昔在服中欲上范文正之書而無路涑水紀聞范文正公服中上宰相書言朝政得失及民間利病凡萬餘言王曾見而偉之時晏殊亦在京師薦一人為館職曾謂殊曰公知范仲淹舍不薦而薦斯人乎已為公置不行宜更薦仲淹也殊從之范文正公集上執政書某居親之喪上書言事踰越典禮取笑天下豈欲動聖賢之知為身名之計乎某謂居喪越禮有誅無赦豈足動聖賢之知耶矧親安之時官小禄薄今親亡矣縱使異日授一美衣對一盛饌尚當泣感風樹憂思無窮豈今几筵之下可為身名之計乎蓋聞忠孝者天下之大本孝不逮矣忠可忘乎所以冒哀上書言天下事今來闕下願作石徂徠之頌而難言宋史石介傳介字守道耕徂徠山下魯人號介徂徠先生杜衍韓琦薦擢太子中允㑹吕夷簡罷相夏竦既除樞密使復奪之以衍代章得象晏殊賈昌朝范仲淹富弼及琦同時執政歐陽修余靖王素蔡襄竝為諫官介喜曰此盛事也歌頌吾職其可已乎作慶厯聖徳詩所稱多一時名臣其言大姦蓋斥竦也詩且出孫復曰子禍始於此矣薦之吾相皆欲令主金耀之書韓文薦之吾相致之吾君金耀門名宋西京宫城東二門曰賓耀啓明西二門曰金耀乾通金耀門有文書庫舊曰三司文書倉俗曰故紙倉多藏三司帳籍三司今版曹也自銓曹而下儲藏帳籍之所其後置六部架閣下大扺成案留部二年然後置而藏之又八年則入之金耀焉謀及乃心則姑願應銅梁之辟尚書謀及乃心謀及卿士謀及庶人銅梁山名在合州石照縣南五里一云銅梁山在涪江之南七里左思蜀都賦外負銅梁宕渠杜詩銅梁書及遠又銅梁阻一辭等勤大播賈誼傳大鈞播物注以造化為大鈞盍進小忠杜詩蹉跎效小忠敢輸肺腑之微誠劉向傳臣幸得託肺腑師古曰謂肝肺相附著王莽傳伏自惟念得託肺腑盡告腹心之元老詩方叔元老注元大也五官之長出於諸侯曰元老一毫有補萬坐亦甘廉范傳不勝師資之情罪當萬坐劉根傳小兒無狀分當萬坐平津之招賢有三惜難受汲生之戇西京雜記平津侯自以布衣為宰相乃開東閣營客館以招天下之士其一曰欽賢館以待大賢次曰翹材館以待大材次曰接士館以待國士公孫𢎞傳𢎞嘗與汲黯請間黯先發之𢎞推其後上常説所言皆聽嘗與公卿約議至上前皆背其約以順上指黯廷詰之汲黯傳上謂人曰甚矣汲黯之戇也洛陽之太息者六實欲全周勃之功賈誼傳誼雒陽人也拜梁懐王太傅數上疏陳政事言事勢可為痛哭者一可為流涕者二可為長歎息者六時丞相絳侯周勃免就國人有告勃謀反逮繫長安獄誼以此譏上上深納其言上鄭參政昭先宋史寜宗嘉定十二年以鄭昭先兼參知政事鄭昭先字景紹閩縣人初主蒲城簿歎曰僥倖一第問學未悉遂遊朱文公之門遷知歸安邑民愛之累官知樞密院事參知政事進右丞相鄭氏譜云昭先之祖長樂人弟嘗殺人扺死奮曰吾弟未有子吾當代之遂言於官官不察因死於獄而釋其弟弟出不德其兄而反凌其孤寡其子乃攜母渡水遊居嶺上遇一僧指山下地曰白羊眠處鷓鴣啼此貴宂也葬之五世出宰相又為擇居於山下五世果生昭先干祿選曹未遂斗升之食漢百官表百石以下有斗食佐吏之秩是為少吏注漢官名秩簿云斗食月俸十一斛一説計日而食一斗二升故云斗食也脩容政府率須四六之文禮記季孫之母死哀公弔焉曾子與子貢弔焉閽人為君在弗内也曾子與子貢入於其廐而脩容焉疏二子初時不具衣服故閽人拒之司馬相如傳脩容乎禮園翺翔乎書囿柳文脩容於轅門之外躡履於油幢之前循例之常非頌則禱禮記君子謂之善頌善禱疏頌者美盛德之形容禱者求福以自輔張老因美以譏之故為善頌文子聞過知服故為善禱然古者執可殺之贄周禮春官士執雉注雉取其守介而死不失其節疏雉性耿介不可生服其士執之亦當如雉耿介為君致死不失節操也東坡詩君看三代士執雉本以殺身為小補而今則獻無用之言柳文抱無用之文戴不肖之容反欺閽人周禮天官閽人注司農昏以啓閉者毛氏曰門者晨昏啓閉閽亦主啓閉舉昏以該之論語稱晨門而不言昏亦互見也謂有己見輒輟贊山譽斗之佞新唐書韓愈傳贊學者仰之如泰山北斗云移為滴露增海之忠後漢書楊倫傳塵加嵩岱霧集淮海晉書虞預傳山河之量非塵露可益虞溥傳積一勺以成江河累微塵以崇峻極張衡奏事飛塵增山霧露助海曹植求自試表冀以塵露微誠補益山海傅咸詩零露濬江海飛塵崇山嶽某聞夷夏貴賤名位不同左傳名位不同禮亦異數南北動息機緘相繫莊子意者其有機緘而不得已耶意者其轉運而不得自止耶兩庭分而漢室弱光武紀建武二十四年正月匈奴薁鞬日逐王比遣使欵五原塞求捍禦北虜十月匈奴薁鞬日逐王比自立為南單于於是分為南北匈奴袁安傳北單于為耿蘷所破遁走烏孫塞北地空餘部不知所屬竇憲日矜已功欲立左鹿蠡王為北單于下公卿議安以為宜令南單于反其北庭無緣更立北單于以增國費且漢供給南單于費直歲一億九十餘萬今北庭彌遠其費過倍乃空盡天下而非建策之要也憲險急負勢竟立右鹿蠡王為單于後遂反叛卒如安策所謂兩庭分而漢室弱也兩庭者沙鉢羅可汗建庭於雎合水謂之南庭吐陸建牙於鏃合山謂之北庭以伊列水為界所謂南單于北單于也唐詩二庭歸望斷萬里客心愁又二庭追虜騎六月動周師宋程大昌北邊備對云匈奴之族雖曰逐水草遷徙不常然亦擇形勢利便據一地以為之庭猶中國之有京邑也遇戰爭游獵則隨事而出事已復歸其舊其設險據要略與中國同惟不建築城郭則大異耳徽本改兩庭為三分殊無謂五胡擾而晉事多晉元帝紀贊五胡扛鼎七廟隳尊五胡劉淵匈奴石勒羯慕容皝鮮卑苻洪氐姚萇羌也嘗試考古以驗今韓非子嘗試君之動貌而後言之莊子嘗試論之荀子嘗試之説鋒起范雎傳豈敢以疑事嘗試於王哉恐當制治於未亂尚書制冶於未亂保邦於未危然而内備外禦之計墮在文恬武嬉之中韓文大慝適去狼莠不薅相臣將臣文恬武嬉習熟見聞以為當然民力中乾左傳張脉僨興外彊中乾柳文含蝎孕蠧外邪中乾又膚輳營胃外彊中乾精神内傷神沮脉殫邦儲内滲滲所禁切説文下漉也封禪書滋液滲漉以人材則弗競以士氣則不揚將多庸人軍半虛籍總無敵國之外患已非盛世之遠圖設有赤白囊之馳丙吉傳吉為相馭吏見驛騎持赤白囊邊郡發奔命書馳來至因隨至公車刺取知虜入雲中代郡吏歸府白狀因曰恐虜所入邊郡二千石有老病不任兵馬者宜可豫視吉善其言召東曹案邊長吏瑣科條其人未己詔召丞相御史問以虜所入郡吏吉具對御史大夫卒遽不能詳知以得譴讓必貽赭黃繖之慮説文繖蓋也廣韻織絲綾為蓋亦作傘六典尚輦局掌輿輦繖扇大朝㑹則繖一翰二陳於庭宋朝㑹要方繖古張帛避雨之制今有方繖大繖宋史輿服志政和八年詔民庶享神不得造紅黃繖扇東坡詩日高黄繖下西清天大地大託之真無敵之儒老子道大天大地大王亦大域中有四大法言魯不用真儒故也用真儒無敵於天下安得削人謀鬼謀當為不可勝之備易繫辭天地設位聖人成能人謀鬼謀百姓與能晉摯虞門銘人謀鬼謀道在則尊趙充國傳戰而百勝非善之善者也故先為不可勝以待敵之可勝此語出孫子無非事者必有先焉折衝尊俎之間固貴矯情而鎮物晉書謝安傳謝𤣥既破苻堅有捷書至安方對客圍碁看書了無喜色碁如故客問之徐答云小兒輩遂已破賊既還内心喜甚過户限不覺屐齒之折其矯情鎮物如此餘見前銷患廟堂之上要須從衆而廣謀撤去私情力行實政培植根本振刷精神李尋傳本强則精神折衝大勢既張何事弗立當機不發雖悔莫追尚書弗慎厥德雖悔可追應劭傳如或致悔其可追乎又敗法亂政悔其可追執政之猶股肱相尊等耳田蚡傳太尉相尊等耳有讓賢名熊克啓尚書之為喉舌寖具師瞻執政之猶股肱佇顓國秉憂國之如饑渴公早圖之恭惟某官學本六經氣鍾五緯五星謂之五緯李百藥詩經綸五緯同駱賔王詩五緯連影集星躔涵今茹古胷藏有本之源泉皇甫湜韓退之墓誌茹古涵今無有端涯渾渾灝灝不可窺測揭德振華身作不清之玉雪韓文貞曜先生墓志揭德振華於古有光又張給事墓銘嗚呼徹也世慕顧以行子揭揭也噎喑以為生子獨割也為彼不清作玉雪也不清徽本改不淆甚無謂自其不辭小官於州縣之日自警編范正平字子夷嘗言其家家學不卑小官居一官便盡心治一官之事只此便是學聖人也若以為州縣之職徒勞人耳非所以學聖人也已知可以大受為社稷之臣人交惜其用遲帝已嗟於見晩主父偃傳偃上書闕下朝奏暮召入見是時徐樂嚴安亦俱上書言世務書奏上召見三人謂曰公皆安在何相見之晚也致身兩社左傳間於兩社為公室輔注周社亳社兩社之間朝廷執政所在疏魯是周之諸侯故國社謂之周社哀四年亳社災是魯國有亳社外朝在庫門之内東有亳社西有國社臨川集間朝廷之兩社揉方域之萬邦又取甘茂之十官最先諸老間季友於兩社乃允具瞻倒指六年自生民以來未有盛於夫子任天下之重時則有若阿衡尚書在太甲時則有若保衡三台色齊史記天官書魁下七星兩兩相比者曰三能三能色齊君臣和不齊為乖戾注三能音三台東方朔傳願陳泰階六符注泰階三台也萬物氣吐杜甫舂陵行序得結輩數十公落落然參錯天下為邦伯萬物吐氣天下少安可待矣惟保我子孫黎民之衆則格於皇天上帝之心尚書我聞在昔成湯既受命時則有若伊尹格於皇天在太戊時則有若伊陟臣扈格於上帝如某者鹿鹿無竒王制疏獨獨鹿鹿也鹿鹿無所依漢書蕭曹傳贊錄錄未有竒節注錄錄猶鹿鹿言在凡庶之中也魚魚何算元和聖德詩魚魚雅雅注魚鳥飛行成隊謬塵一第爾雅塵久也晉書蔡謨傳豈惟微臣其亡之戒實昭聖世惟塵之累范𢎞之傳免惟塵之譏塞素飡之責唐王鐸詩三塵上相逢明主九合諸侯愧昔英濫底百寮底下也爾雅疏凡物之柢必在底下杜詩有才無命百寮㡳山谷詩李侯畫隱百寮底又法當憔悴百寮㡳又從軍補椽百寮底憔悴之吟湘濵孰為之地屈原漁父篇屈原既放游於湘潭行吟澤畔顔色憔悴形容枯槁灌夫傳獨不為李將軍地乎田延年傳欲為道地張湯傳文事有可以傷湯者不能為地注不能作道地也嗟吁而攀蜀道竟失所天李白蜀道難噫吁嚱危乎高哉蜀道之難難於上青天梁竦傳昧死自陳所天趙壹傳寧當慢傲加於所天文選剖心摩踵以報所天既銜弗洎之悲莊子曾子再仕而心再化曰吾及親仕三釡而心樂後仕三千鍾不洎吾心悲郭象注洎及也漫作為貧之仕適之謂才堪之謂力不足乎揚韓文凡適於用之謂才堪其事之謂力穀梁傳不言齊侯何也以其不足乎揚不言齊侯注不足稱揚薦之吾相致之吾君皆非所冀見上但願王者之佐管子霸言篇才振四海王之佐也董仲舒傳贊劉向稱仲舒有王佐之才雖伊吕無以加李固傳元精所生王之佐臣王允傳郭林宗見而竒之曰王生一日千里王佐才也延篤傳李文德謂公卿曰延叔堅有王佐之才奈何屈千里之足乎荀彧傳何顒異之曰王佐才也張華傳阮籍見之歎曰王佐才也世説司馬景王命虞松作表不可意鍾㑹為定五字王召見拊手歎息曰此生王佐才也南史臧盾傳幼從諸葛璩受五經璩學常有數十百人盾處其間無所狎比璩曰此生王佐才也北史于謹傳太宰元天穆見之歎曰王佐才也宋弁傳至京師見尚書李冲言論移日冲異之曰此生一日千里王佐才也新唐書李靖傳仕隋為殿内直長尚書牛𢎞見之曰王佐才也杜如晦傳時府屬多外遷王患之房𤣥齡曰去者雖多不足吝如晦王佐才也馬周傳贊非王佐才疇克及此蕭遇傳負大節以王佐自任楊琯傳贊雖古王佐無以加房琯傳贊德器有王佐才李晟傳贊雖三王之佐無進其能齊澣傳李嶠稱有王佐才杜黃裳傳達權變有王佐才略崔造傳與韓㑹盧東美張正則三人皆自謂有王佐才號四蘷毎先天下而憂五朝名臣言行錄范文正公少有大節慨然有志於天下嘗自誦曰先天下之憂而憂後天下之樂而樂也儀圖之莫助之斐然僭躐躐踰跨也禮記學不躐等跋躐前行曰躐餘見前其進也與退也惟所指撝説文摩所以指麾也通作撝易撝謙注謂指揮皆謙也韓文守官去官在今日指揮又誰復稟指撝上曾樞密從龍宋史寧宗嘉定十二年以曾從龍同知樞密院事三月參知政事四月罷理宗端平元年復以從龍參知政事本傳曾從龍字君錫慶元五年擢進士第一歴官知樞密院兼參知政事卒贈少師詳第二十一卷讀阿房之賦早累殊知摭言崔偃試進士東都呉武陵謂偃曰公方為天下求竒才敢獻所益因出袖中書偃讀之乃杜牧阿房宫賦坐客皆警武陵曰牧方試有司請以第一人處之偃謝已得其人至第五偃未應武陵勃然曰不爾宜以賦見還偃曰如教牧果異等曾從龍傳嘉定七年知貢舉公甫蓋是年登第投光範之書今無他覬詳首條特以門牆之舊法言倚門牆則麾之得觀鼎鼐之新杜詩調和鼎鼐新欲輸愚慮之千史記淮隂侯傳愚者千慮必有一得往扺賀錢之萬史記吕公善沛令避仇從之客因家焉沛中豪傑吏聞令有重客皆往賀蕭何為主吏主進令諸大夫曰進不滿千錢坐之堂下高祖為亭長素易諸吏乃紿為謁曰賀錢萬實不持一錢譬諸大海豈有待而增加然在細流固不嫌於傾寫李斯傳河海不擇細流山谷詩意氣要傾瀉某聞交隣有道寢兵固帝王之功管子寢兵之説勝則險阻不守制勝無形銷患在廟堂之上張協詩折衝尊俎間制勝在兩楹今虎狼之交噬宋史嘉定十二年三月金人㓂淮西知楚州賈涉使李全救却之詔加全廣州觀察使金人圍安豐軍及滁濠光州江淮制使李珏命池州都統制武師道忠義軍都統制陳孝忠救之皆不克進金人遂分兵自光州犯黄州之麻城自濠州犯和州之石磧自旴眙犯滁州之全椒來安及揚州之天長真州之六合淮南流民渡江避兵金逰騎數百至采石楊林渡建康大震久蚌鷸以相持戰國策趙且伐燕蘇代為燕謂惠王曰今者臣來過易水蚌方出曝而鷸喙其肉蚌合而箝其喙鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出即有死鷸兩者不肯相捨漁者得而并禽之陸賈春秋後語亦載此事即有死蚌作必見蚌脯以雨叶脯妙出天然殘喘儻甦怒將移於水蟹甦本作穌死而更生曰穌通作蘇今作甦乃俗書也禮記蟄蟲昭蘇注更息曰蘇晉書解系傳系字少連為雍州刺史與趙王倫有隙倫得志收系兄弟梁王彤救之倫曰我於水中見蟹且惡之況此人兄弟輕我乎東坡詩怒移水中蟹愛及屋上烏前人下語不茍如此句人只知用解系事而不知曾經東坡拈出也新酋稍逼殃易及於池魚酋愁秋切酋長魁帥之名風俗通曰城門失火禍及池魚舊説池仲魚人姓字也居宋城門城門失火延及其家仲魚燒死又云宋城門失火人汲取池中水以灌沃之池水空竭魚悉露死喻惡之流并傷良謹也宋周煇清波雜志云張無盡嘗作一表云魯酒薄而邯鄲圍城門火而池魚禍上句出莊子下句不知所出廣韻以池仲魚為人姓名白樂天詩有火發城頭魚水裡救火竭池魚失水不主姓名之説至如歸附之民亦是紛爭之釁宋史嘉定八年蘭州盜程彦輝求内附四川制置使董居誼卻之九年秦州人唐進與其徒何進等引衆十萬來歸董居誼拒卻之戰守和之未決難察察言兵食信之何先宜事事備竝見前令徒懲創已往之失創楚諒切懲也傷也遂致闊略方來之憂馮衍傳闊略梢小之禮鍾離意傳闊略逺縣細微之愆本惡張皇事反流於怠弛尚書張皇六師疏張大我之六師初求鎮靜弊乃致於蔽䝉最是民困易摇仍覺兵虛必潰言之唇腐東方朔傳唇腐齒落服膺而不釋儒林傳唇腐齒落而不知益識者心寒史記李斯傳足以為寒心又荆軻傳足為寒心注凡人寒甚則心戰恐懼亦心戰今以懼譬寒言可為心戰谷永傳臣永所以破膽寒心城非不高池非不深險誰與守飢者欲食勞者欲息怨豈在明尚書一人三失怨豈在明不見是圖藉令有效死之民亦未見決勝之將鼂錯傳有必勝之將無必勝之民外憂縱緩内蠧已多願察積薪厝火之形賈誼傳夫抱火厝之積薪之下而寢其上火未及然因謂之安方今之勢何以異此亟為徹桑未雨之計通民氣於士氣參天心於人心收拾羣材説文拾掇也廣韻收拾又斂也後漢書盧植傳宜勑收拾以安游魂徐昉傳收拾缺遺建立明經韓文頽墮委靡潰敗不可收拾又無人收拾理則􅃚又收拾不可遲恢張衆志戒牧守之忮刻斥將帥之驕殘亟厚邦儲速蒐軍實楚語榭不過講軍實注軍實戎士也左傳以數軍實又墮軍實而長寇讐軍實指車徒器械朱浮傳多置官屬以損軍實注謂甲兵糧儲也荀彧傳徼其軍實無非事者綱既舉則目張詩四方為綱箋綱者能張衆目文中子薛牧問於仲長子光子光曰舉一綱而衆目張不蚤圖之枝未害而本撥左傳若不早圖後君噬臍其及圖之乎詩人亦有言顛沛之揭枝葉未有害本實先撥注揭見根貌樹木將欲顛仆傾拔之時其根揭然而見此時枝葉未有折傷之害而根本實先斷絶和羮固異於濟水左傳和如羮焉水火醯􅊽鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心若以水濟水誰能食之同舟況迫於遇風鄧析書同舟涉海中流遇風救患若一所憂同故也孔叢子呉越之人同舟濟江中流遇風波其相救如左右手者所患同也王弼周易略例投戈散地則六親不能相保同舟而濟則胡越何患乎異心公輔居兩社之間相尊等耳田蚡傳太尉相尊等耳有讓賢名按相去聲言太尉與相其尊等耳今作平聲讀連下句蓋斷章餘見上條大臣不四方之慮人望謂何禮記邇臣守和宰正百官大臣慮四方疏謂二伯州牧之等謀慮四方此大臣亦兼冢宰恭惟某官恭懿而惠和左傳高辛氏有才子八人忠肅共懿宣慈惠和天下之民謂之八元𢎞深而肅括法言或問士何如斯可以禔身曰其為中也𢎞深其為外也肅括則可以禔身矣榮進素定夙瞻魁下之三台名臣遺事諫議大夫張師德謁向文簡敏中曰師德兩詣王相公門皆不得見恐為人輕毀望公從容明之一日方議知制誥公曰可惜張師德向公曰何謂公曰某於上前説張師德名家有士行不意兩及吾門狀元及第榮進素定但當靜以待之耳若奔競使無階而進者當何如也向公方以師德之意啓之公曰某處安得有人敢輕毀人但師德後進待我淺也餘見上條昭晰無疑豈待日中之見斗韓文昭晰者無疑優游者有餘易豐六二豐其蔀日中見斗往得疑疾有孚發若吉九四豐其蔀日中見斗遇其夷主吉注蔀覆煖障光明之物也所豐在蔀幽而無覩者也日中者明之盛也見斗者闇之極也疏處光大之世而為極闇之行譬日中而斗星見故曰日中見斗也唐書昭宗天祐元年二月丙寅日中見北斗信儒者有益於國見天之將任是人未嘗揚己以取名殆欲格王而正事尚書惟先格王正厥事自參宥密詩夙夜基命宥密傳宥寛密寧也箋早夜始順天命不敢解倦行寛仁安靜之政以定天下寛仁所以止苛刻也安靜所以息暴亂也益謀弼諧尚書謨明弼諧古所謂隣哉之臣尚書隣哉臣哉孔傳隣近也言君臣道近相須而成人將責賢者之備唐太宗贊春秋之法常責備於賢者誠能歸草茅之公議置在本朝梅福傳廟堂之議非草茅所當言也誠恐身塗野草尸并卒伍故數上書求見從而散廊廟之泰和達之薄海尚書外薄四海咸建五長此真漢相矣王商傳河平四年單于來朝引見白虎殿丞相商坐未央廷中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延卻退天子聞而歎曰此真漢相矣豈憂匈奴哉馮唐傳上既聞廉頗李牧為人良説乃拊髀曰嗟乎吾獨不得廉頗李牧為將豈憂匈奴哉上將恨無官以酬公新唐書李德裕傳劉稹誅策功拜太尉進封趙國公德裕固讓言唐興太尉惟七人尚父子儀乃不敢拜裴度為司徒十年亦不遷臣願守舊秩足矣帝曰吾恨無官酬公毋固辭公亦可有辭於永世尚書其爾之休終有辭於永世如某者戇由氣稟戇陟降切説文愚也從心贛聲或作惷周禮司刺三赦曰惷愚注惷愚生而癡騃意昏者禮記哀公問寡人惷愚表記其民之敝惷以愚注謂情不澆詭汲黯傳甚矣汲黯之戇也髙祖紀王陵可然少戇師古曰戇愚也拙不時宜頃因場屋之文特䝉偉視王荆公詩塲屋聲名看出羣繼修竿牘之敬又沐賞音莊子小夫之智不離苞苴竿牘敝精神於蹇淺注苞苴以遺竿牘以問遺問之具小知所殉文選雖實唱髙猶賞爾音山谷詩忍向時人覓賞音回回州縣之塵楚辭腸回回兮盤紆揚雄傳徒回回以徨徨馬融傳紛紛回回南北東西風行雲轉匃磕隱訇黄塵勃滃闇若霧昏劉公幹雜詩沈迷簿領書回回自昏亂回回心亂貌落落功名之夢落落不相入也老子落落如石耿弇傳落落難合馮衍傳落落如玉本謂伯樂之既顧羣馬可空韓文伯樂一過冀北之野而馬羣遂空夫冀北馬多天下伯樂雖善知馬安能空其羣耶解之者曰吾所謂空非無馬也無良馬也寧知烏獲之難逢匹雛莫舉竊料黑頭之宰相晉書諸葛恢傳恢弱冠知名試守即邱長轉臨沂令為政和平值天下大亂避地江左名亞王導庾亮嘗謂曰明府當為黒頭三公王珣傳珣弱冠與謝𤣥為桓溫掾溫嘗謂之曰王掾當作黑頭公北史濟南王彧字文若少有才學時譽甚美侍中崔光見而謂人曰黑頭三公當此人也亦憐白腳之門生唐趙璘因話錄李太師逢吉知貢舉牓成未放而入相禮部王尚書播代放牓及第人就中書見座主時語好腳踪門生白腳未詳然願廣萬間以庇寒杜詩安得廣厦千萬間大庇天下寒士俱歡顔詎敢私升斗之活涸莊子莊周家貧往貸粟於監河侯河侯曰我將得邑金貸子三百金周忿然作色曰周昨來有中道而呼者顧見車轍有鮒魚焉問之曰子何為者耶對曰我東海波臣也君豈有升斗之水而活我哉周曰諾我將南遊呉越之王激西江之水而迎子可乎鮒魚忿焉作色曰吾得升斗之水為活耳君乃言此曾不如早索我於枯魚之肆捲珠簾於未老勿疑驚燕之呢喃湘山野錄吕申公薦陳堯佐堯佐遂大拜極懐薦引之德因作燕詞曰二社良辰千家庭院翩翩又見新歸燕鳳凰巢穩許為隣瀟湘煙暝來何晩亂入紅樓低飛綠岸畫梁時拂歌塵散為誰歸去為誰來主人恩重珠簾捲申公笑曰自恨捲簾人已老莫愁調鼐子無功公老於廊廟而藴籍如此呢喃語不了也劉季孫詩呢喃燕子語梁間令江水兮安流庶遂間鷗之浩蕩楚辭令湘源兮無波使江水兮安流杜詩白鷗波浩蕩萬里誰能馴贄見見趙茶馬彦綰全篇用茶馬事茶馬沿革見都大門按職源併茶馬為一司始於元豐四年此蓋成都等路提舉故通篇兼用蜀事訪火井於臨邛偶逃水厄一統志火井在伏龍山下地窪若池以水引之隱隱出地中少頃炎熾夏月積雨停水則焰生水上水為沸而寒如故冬月水涸則上上有焰觀者至焚衣裾異苑臨邛縣有火井漢室之隆則炎赫彌熾桓靈之際火勢漸微諸葛孔明一瞰而更盛至景曜元年人以燭投即滅其年蜀并於魏博物志臨邛有火井縱廣五尺深二三丈在縣南百里昔時有以竹木投之以取火諸葛丞相往視之後火轉盛熱以盆著井上煑鹽得鹽入以家火即滅迄今不復燃也文選火井沉熒於幽泉高爓飛煽於天垂注蜀都有火井欲出其火先以家火投之隆隆如雷聲爓出爛然以竹筒盛之接其光而無灰杜詩斬木火井羣猿呼又煙塵侵火井注蜀有火井在邛州故邛有火井縣世説王濛好茶人至輙飲之士大夫甚以為苦毎欲候濛必曰今日有水厄洛陽伽藍記給事中劉縞慕王肅之風專習茗飲彭城王謂縞曰卿不慕王侯八珍專好蒼頭水厄海上有逐臭之夫里内有效顰之婦子其是也自是朝貴不復設茗惟江表殘民逺來降者侍中元叉欲為設茗先問卿於水厄多少蕭正德不曉乂意曰下官雖生水鄉立身以來不遭陽侯之厄舉座皆笑山谷詩不嫌水厄幸來辱寒泉湯鼎聽松風按火井亦出茶山谷煎茶賦云夷陵之壓磚臨邛之火井是也望星槎於仙漢行拜月題博物志舊説云天河與海通有人居海渚者年年八月有浮槎去來不失期人有竒志立飛閣於查上多齎糧乘槎而去十餘日中猶觀星斗日辰自後茫茫然亦不覺晝夜去十餘月奄至一處有城郭狀屋舍甚嚴遥望宫中多織婦見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人具説來意并問此是何處答曰君還至蜀郡訪嚴君平則知之後至蜀訪君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也周密癸辛雜志云自唐諸詩人皆以乘槎為張騫事雖老杜用事不茍亦有乘槎消息近無處問張騫之句按騫本傳止云漢使窮河源而已至張華博物志乃云云然未嘗指為張騫也及宗懔作荆楚歲時記乃言武帝使騫使大夏尋河源乘槎見牛女不知何據又王子年拾遺記云堯時有巨槎浮於西海查上有光若星月二月一周天名曰貫月查則堯時已有此查矣莊子加之以衡扼齊之以月題月題馬額上當顱如月形者東坡詩門外青驄響月題慰江湖渴夢之深山谷以雙井茶送孔常甫詩校經同省竝門居無日不聞公讀書故將茗椀澆舌本要聽六經如貫珠心知韻勝舌知腴何似寶雲與真如湯餅作魔應不寢慰君渴夢吞江湖唐何諷夢渴賦云奔九江走五湖手不暇於斡運心不息於躊蹰見波漸竭而百川如淺岸益高而低淤將枯腹慊爾而不覺肺燥然而不濡又云以吾此夕之一夢見自古不足者之心瞻原隰華鑣之沃詩皇皇者華於彼原隰鑣悲交切説文馬銜也爾雅鑣謂之钀釋名包也在旁包斂其口韓詩清塗振華鑣詩六轡沃若詩詁潤澤也伏念某地寒而根淺劉向别錄鄒衍在燕有谷地美而寒不生五穀晉書列女傳王渾妻鍾琰生子濟女亦有才淑為求賢夫時有兵家子甚俊濟欲妻之白琰琰曰要令我見之謂濟曰此人才足拔萃然地寒壽促不足展其器用楊方傳縉紳之徒咸厚遇之自以地寒不願久留京華求補逺郡北史陳元康傳元康地寒時以為殊賞新唐書李揆傳苗晉卿數薦元載揆輕載地寒載銜之舒元輿傳地寒不與士齒韓詩外傳草木根荄淺未必撅也飄風興暮雨墜則撅必先矣此以茶喻年運而骨高莊子予年運而往矣杜陵瘦馬行東郊瘦馬使我傷骨骼硉兀如堵牆韓駒父詩官清馬骨高此以馬喻斟酌胷中固乏可人之風味漢書敘傳斟酌六經蔡邕傳斟酌羣書李固傳斟酌元氣左慈傳手自斟酌莫不醉飽山谷以團茶贈晁無咎詩贈君越侯所貢蒼玉璧可以烹玉塵試春色澆君胷中過秦論斟酌古今來活國禮記孔子曰管仲遇盜取二人焉上以為公臣曰其所與游辟也可人也蜀志費禕傳君信可人晉書桓溫傳常行經王敦墓望之曰可人可人可人或作可兒兒與人通用梁書范雲傳沈攸之召與語聲色甚厲雲貌不變徐自陳説攸之乃笑曰卿定可兒山谷詩十年擇對無可人又平生心賞建溪春一邱風雨極可人穀梁傳僖元年注江熈曰雖千載之事難明然風味之所期古猶今也世説注高逸沙門傳支遁居㑹稽晉哀帝欽其風味杜詩西河共風味山谷詩風味窺大雅又風味極不淺喻茶局促轅下粗知範我之馳驅灌夫傳局趣效轅下駒應劭曰駒者駕著轅下局趣䠞小之貌張晏曰俛頭於車轅下隨母而已師古曰張説非也駕車不以牝馬皇皇者華曰我馬維駒非隨母也按説文局促也從口在尺下復局之趣亦作促音趨玉切廣韻短也蹙也喻馬與其包裹而供權倖之鑚東坡和錢安道寄思建茶詩收藏愛惜待佳客不敢包裹鑽權倖烏臺詩案云此詩譏世之小人喻茶不若蹭蹬而任風塵之老杜詩蒼茫風塵際蹭蹬騏驥老志士懐感傷心胷已傾倒蹬音鄧喻馬況乏揮毫之百斛山谷雙井茶送子瞻詩人間風日不到處天下玉堂森寶書想見東坡舊居士揮毫百斛瀉明珠喻茶固應病顙之十年柳文起廢答中廐病顙之駒顙之病且十年色𤣥不尨無異技硿然大耳喻馬懶問蓬萊羣仙之司盧仝謝孟諫議寄新茶詩蓬萊山在何處玉川子乘此清風欲歸去山上羣仙司下土地位清高隔風雨喻茶遂叱邛徠九折之馭王尊傳先是琅琊王陽為益州刺史行部至邛徠九折阪歎曰奉先人遺體奈何數乘此險後以病去及尊為刺史至其阪問吏曰此非王陽所畏道耶吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣山海經崍山江水出焉華陽國志嚴道縣南有邛郲山山上凝氷夏結縈迴九折王陽去官之所喻馬其甘如薺豈必衆嘗詩誰謂荼苦其甘如薺荼音徒薺音泚説文荼苦荼也徐曰即今之茶字薺廣韻云甘菜淮南子云薺水也冬水王而生仲夏土王而死又其枝葉細靡通謂之靡草師嚝占以薺為甘草稼穡作甘故以為歲豐之候王應麟玉海周詩記苦荼茗飲出近世春秋書齊荼漢書志荼陵陸顔諸人雖已轉入茶音而未易字文也自陸羽茶經盧仝茶歌趙贊茶禁以後遂易荼為茶丁謂進新茶表右件産異金沙名非紫笋江邊地暖方呈彼茁之形闕下春寒已發其甘之味有以少為貴者焉敢韞而藏諸無名氏詩甘薺非子敵宫槐讓我先陳後山詩君如雙井茶衆口願一嘗顧我如麥飯猶足填饑腸喻茶言刈其蔞願為君御詩翹翹錯薪言刈其蔞之子于歸言秣其駒蔞龍殊切爾雅翼云蔞古今以為珍菜大招云呉酸蒿蔞王逸曰蔞香草也郭氏云江東用以羮魚李膺傳荀爽嘗就謁膺因為其御既還喜曰今日得御李君矣喻馬恭惟某官雲龍氣局張舜民小説熈寧中有㫖下建州製宻雲龍其品尤高東都事略廖正一字明略晚登蘇門子瞻大竒之時黄秦晁張號蘇門四學士毎來必令侍者朝雲取密雲龍一日又命取蜜雲龍家人謂是四學士窺之乃明略也山谷蜜雲龍詩亂雲蒼璧小盤龍貢包新様出元豐午牕欲眠視濛濛喜君開包碾春風按宋龍鳳團今人徒聞名而不識其形製宋建安人黄儒作品茶要錄列四十餘色細色三十六品麤色五品近世江隂徐子擴暖姝由筆云嘉靖十六年正月丹陽孫曲水於留都得團茶一餅形如象棋子厚三四分面有戲珠盤龍中一方圍楷書萬壽龍芽四字真宋物也雲翼按此即茶錄中細色第五號宋大觀二年與貢新銙御苑玉芽同造蓋高品也曲水先大父别號即此可想其形製云天驥風標顔延年赭白馬賦漢道亨而天驥呈材任昉追封衡陽王詔風標秀特器體淹𢎞南史柳憕傳柳憕風標才氣恐不能為少主臣山谷詩遺編想風標架屋桃源三椀澆五千之巻昌黎桃源圖詩架巖鑿谷開宫室接屋連牆千萬日盧仝詩一椀喉吻潤二椀破孤悶三椀搜枮腸我有文字五千卷乘軺僰道一雄將十萬之雌軺市昭切使車也僰蒲北切説文犍為蠻夷从人棘聲司馬相如傳略通夜郎僰中注駹筰邛僰四種皆夷名山谷詠李伯時摹韓幹三馬詩緬懐胡沙英妙質一雄可將十萬雌卻笑前丁後蔡之籠加東坡詩君不見武夷溪邊粒粟芽前丁後蔡相籠加爭新買寵各出意今年鬬品充官茶建州郡志建州大小龍團始於丁晉公而成於蔡君謨國朝太平興國二年始置籠焙造龍鳳茶咸平中丁晉公為福建漕監造御茶進龍鳳團慶歴間蔡公端明為漕始改造小龍團茶仁廟尤所珍惜是後最精者曰龍團勝雪外有蜜雲龍一品號為竒絶方靈芽敷折之初常先民焙十餘日進發飛騎疾馳不出中春頭綱已至京師歐陽永叔聞君謨進小龍團驚歎曰君謨士人也何至作此事安得超范軒欒之繳繞柳文晉問晉國多馬屈焉是産四散惝怳開合萬狀其小者則連牽繳繞仰乳俯齕其材之可者收斂攻教棹手飛縻指毛命物百步就羈牽以荀息御以王良超以范鞅軒以欒鍼左傳范鞅超乘欒鍼為右軒公出於淖加臭味而厚賔客漫令策兔褐之功山谷煎茶賦云苦口利病解膠滌昏未嘗一日不放著而策茗椀之勲者也又云酌兔褐之甌瀹魚眼之鼎既加臭味而厚賓客前四後四各用其一蔡襄茶錄茶色白宜黑盞建安所造者紺黑紋如兔毫其坏微厚熁之久熱難冷為要用出他處者或薄或紫皆不及也畫骨相而遺毛皮諒必察驪黃之外山谷詩曹霸弟子沙苑丞喜作肥馬人笑之李侯論幹獨不爾妙畫骨相遺毛皮列子秦穆公謂伯樂曰子之年長矣子姓有可使求馬者乎伯樂對曰臣有所共與擔纒束薪者有九方皋此其於馬非臣之下也穆公見之使行求馬三月而反曰已得之矣牝而黄使人往取之牡而驪穆公不悦曰敗矣子之所使求馬者色物牝牡尚不能知又何馬之能知也伯樂喟然歎息曰一至於此乎是乃其千萬臣而無數者也若皋之所觀者天機也得其精而忘其粗見其内而忘其外若皋之相馬乃有貴於馬者也馬至果天下之馬也如某者不持圭璧山谷以小龍團及半挺贈晁無咎詩我持𤣥圭與蒼璧以暗投人渠不識城南窮巷有佳人不索賔郎常晏食未洗袴袍山谷題李伯時頓塵馬詩竹頭搶地風不舉文書堆案睡自語忽看高馬頓風塵亦思歸家洗袍袴特窘城南晏食之謀見上文遂入冀北暮取之數韓文伯樂一過冀北之野而馬羣遂空又朝取一人焉拔其尤暮取一人焉拔其尤味已輸於第一東坡詩注草茶盛於兩浙日注第一自景祐以來洪州雙井白芽製作尤精遂為草茶第一價敢望於倍三韓文昔人有鬻馬不售于市者知伯樂之善相也從而求之伯樂一顧價增三倍草茶無賴空有名敢妄希於湔袚東坡詩草茶無賴空有名高者妖邪次頑礦湔將先切滌也灑也袚敷勿切説文除惡祭也又絜也除也戰國策汙明説春申君曰君獨無湔袚我也山谷煎雙井茶詩能洗茗椀湔袚我風袂欲挹浮邱翁塞翁未必不為福或可備於走趨淮南子塞上之人其馬亡入胡中人皆弔之其父曰此何知不為福居數月其馬將胡駿馬而歸人皆賀之其父曰此何遽不為禍家富馬良其子好騎墮而折其脾人皆弔之其父曰此何不遽為福居一年胡人大入塞丁壯皆引弦而戰近塞之人死者十九此獨以跛之故父子相保韓文佩玉長裾不利走趨上魏運使了翁宋史魏了翁字華父邛州蒲江人慶元五年進士贈秦國公諡文靖詳見本條注聞宇宙之大名如瞻喬嶽杜詩諸葛大名垂宇宙又巫峽忽如瞻華嶽抱江湖之渴夢今在下風山谷詩慰君渴夢吞江湖詳見上條左傳羣臣敢在下風鄒陽傳竊高下風之行師古曰言在下風側聽高尚乏紹介以為容王褎四子講德論無介紹安從行乎公卿鄒陽傳蟠木輪囷離竒而為萬乘器者以左右先為之容也馬援傳無左右為容之介脩辭誠而求見易脩辭立其誠所以居業也宋李略該聞錄云林逋隱居西湖朝廷命守臣王濟體訪逋投䞇一啓其文皆儷偶聲律之流乃以文學保薦詔下賜束帛而已濟曰草澤之士文須滑稽不友王侯文學之士則修辭立誠俟時致用逋兩失之是宋人以儷語為脩辭也某聞士之任重固不止獨善其身儒者道高要當知有貴於巳若靡然斷趾以適屨荀爽傳後世之人好福不務其本惡禍不易其軌傳曰截趾適屨孰云其愚何與斯人追欲喪軀誠可痛也必至於舐痔以求車莊子宋人有曹商者為宋王使秦其徃也得車數乘王説之益車百乘反於宋見莊子曰夫處窮閭阨巷困窘織屨槁項黄馘者商之所短也一寤萬乘之王而從車百乘者商之所長也莊子曰秦王有病召醫破癰潰痤者得車一乘舐痔者得車百乘所治愈下得車愈多子豈治其痔耶何得車之多也子行矣趙壹傳舐痔結駟正色徒行操行既卑國家何賴有能卷舒之際袁宏傳蘧寗以之卷舒柳下以之三黜杜詩白髪甘雕喪青雲亦卷舒不為燥濕所移漢書律厯志銅為物至精不為燥濕寒暑移其節不為風雨暴露敗其形介然有常似乎士君子之行申屠蟠傳味道守貞不為燥濕輕重不為窮通易節淮南子夫烏之啞啞鵲之唶唶豈嘗為寒暑燥濕變其聲哉如蘇文忠之違熈豐亦不茍同於元祐宋史蘇軾傳高宗即位贈太師諡文忠熈寧元豐神宗年號王安石為相元祐哲宗年號司馬光為相若劉忠肅之惡章蔡然非强附於伊川宋史劉摰字莘老永靜東光人嘉祐中擢甲科哲宗即位擢侍御史疏蔡確十惡章惇凶悍輕侻無大臣體皆罷去紹興初贈少師諡忠肅伊川先生年譜云孔文仲奏先生汗下憸巧素無鄉行實錄孔文仲載呂申公之言曰文仲為蘇軾所誘又申公家傳亦載其與呂大防劉摯王存同較文仲所論朱光庭事語甚激切是名蜀珍法言蜀莊沉冥蜀莊之才之珍也不作茍見不治茍得久幽而不改其操雖隋和何以加諸舉兹以旃不亦寶乎吾珍莊也居難為也邵氏見聞錄薛簡肅公知成都范蜀公方為舉子一見愛之公還朝載蜀公以去或問簡肅曰自成都歸得何竒物曰蜀珍産不足道吾歸得一偉人耳可重趙鼎史記平原君傳毛先生一至楚而使趙重于九鼎大呂觀公氣象柳文先友記元全柔河南人氣象甚偉韓詩氣象硉兀未可攀又氣象難比侔視古等倫甘延壽傳投石超距絶於等倫杜詩尊榮邁等倫兹故賦明月烏鵲之詩魏武帝短歌行月明星稀烏鵲南飛繞樹三匝何枝可依明帝步出夏門行䠞迫日暮烏鵲南飛繞樹三匝何枝可依亟欲快景星鳳凰之覩韓文朝廷之士引領東望若景星鳳凰之始見也爭先覩之為快恭惟某官眼高四海東坡詩眼高四海空無人胷著千年陳后山詩胷中歴歴著千古筆下源源赴百川漢相有真宜居蕭曹丙吉之冠王商傳此真漢相矣丙吉傳贊近觀漢相高祖開基蕭曹為冠孝宣中興丙魏有聲文中子魏相篇子謂魏相真漢相識兵略達時令遠乎哉鄭公所願蓋在稷契臯陶之良新唐書魏徵傳徵頓首曰願陛下俾臣為良臣毋俾臣為忠臣帝曰忠良異乎曰良臣稷契咎陶也忠臣龍逢比干也良臣身荷美名君都顯號子孫承傳流祚無疆忠臣已嬰禍誅君陷昏惡喪國夷家祇取空名此其異也當炙手可熱之時唐裴光裕東觀奏記魏國公崔鉉秉政鄭魯楊紹復段環薛䝉一時俊造鉉所取信凡有補吏議事或與之參酌時人語曰炙手可熱楊鄭段薛欲得命通魯紹環䝉杜詩炙手可熱勢絶倫此指韓侂胄凜掉頭不顧之節杜詩巢父掉頭不肯住東將入海隨煙霧詩卷長留天地間釣竿欲拂珊瑚樹魏了翁傳遷秘書郎以親老乞外補長卿甫還於巴路司馬相如傳相如為郎數歲㑹唐䝉略通夜郎僰中發巴蜀吏卒千人郡又多為發轉漕萬餘人用軍興法誅其渠率巴蜀民大驚恐上聞之乃遣相如責唐䝉等因告諭巴蜀民以非上意元濟已叛於蔡城新唐書呉元濟傳少陽死子元濟匿不發喪偽表請元濟主兵㑹傳言董重質殺元濟族其家李吉甫請遣使弔賻元濟不得命乃悉兵四出焚舞陽及葉掠襄城陽翟關東大恐魏了翁傳了翁知嘉定府行次江陵蜀大將呉曦以四川叛神山可巢固自薄蓬萊而不即史記蓬萊方丈瀛洲三神山者在渤海中諸仙人及不死藥在焉未至望之如雲及到三神山反居水下風輒引去終莫能至韓詩我能屈曲自世間安能從女巢神山柳文謫龍説吾故居鈞天帝宫下上星辰呼吸隂陽薄蓬萊羞崑崙而不即魏了翁傳韓侂胄以誤國誅朝廷收召諸賢了翁預焉㑹史彌遠入相了翁察其所為力辭召命開門授徒欃槍未落必欲借荆楚以同功欃楚咸反槍楚行反爾雅彗星為欃槍注亦謂之孛言其形孛孛似掃彗史記天官志長二丈類彗星退而西北三月生天欃長四丈末兑退而西南三月生天槍京房曰天欃為兵赤地千里枯骨藉藉晉天文志云妖星四曰天槍其出不過三月必有破國亂君伏死其辜殃之不盡當為旱饑暴疾五曰天欃石氏曰雲如牛狀甘氏云本類星末鋭長數丈河圖曰歲星之精流為天槍熒惑散為天欃天槍歲星所生見以甲寅天欃辰星所生出以壬寅石氏曰槍欃棓彗異狀其殃一也天文志云孝文時天槍夕出西南占曰為兵喪亂其六年十一月匈奴寇上郡雲中漢起兵以衞京師也唐中宗文明元年七月辛未夕有彗星於西方長丈餘八月甲辰不見是為天欃昭宗景福元年十二月丙子天欃出於西南己卯化為雲而没崔駰傳運欃槍以電掃兮清六合之土宇杜詩戮力掃欃槍雖卒成孺子之名史記孫子傳遂成䜿子之名然已立懦夫之志袁宏傳後生擊節懦夫増氣一麾而出文選屢薦不入官一麾乃出守十暑於兹杜詩十暑岷山葛三霜楚户砧回視獨對三千字之人夏竦詩縱横禮樂三千字獨對丹墀日未斜誰肯甘頓十九年之刃莊子庖丁曰今臣之刀十九年矣賈誼傳屠牛坦一也朝解十二年而芒刃不頓者所排擊剝割皆衆理解注頓讀曰鈍魏了翁傳嘉定十五年被召入對蓋自了翁去國十有七年矣萬牛不能回邱山之重杜詩萬牛回首邱山重四牡又復勤原隰之馳詩四牡騑騑周道逶遲要路在前聊養韓忠獻之器韓琦傳琦字穉圭相州安陽人弱冠舉進士第二贈尚書令諡忠獻胡氏傳家錄公徙開封府推官理事不倦暑月汗流浹背府尹王博文大器重之曰此人要路在前而治民如此真宰相器也榮進素定何必王文正之門見前上曾樞密條魏了翁傳了翁再入朝史彌遠欲引以自助了翁正色不撓未嘗私謁然海内所以屬望於公蓋天下尚有可為之事五朝名臣言行錄吕誨字獻可官至御史中丞獻可病手書托溫公為墓志溫公亟省之已瞑目矣溫公呼之曰更有以見屬乎獻可復張目曰天下事尚可為君實勉之自警篇云獻可忍死謂溫公以天下尚可為當自愛後溫公相天下再致元祐之盛獻可不及見矣至溫公薨獻可之子由庚作挽詩曰地下若逢中執法為言今日早昇平記其先人之言也幸昌其志以濟斯民惟功名當久逺之看翰苑新書慶厯初歐陽永叔張安道王素俱除諫官蔡君謨以詩賀曰御筆親除三諫官喧然朝野競相歡當年流落丹心在自古忠良得路難必有謀猷禆帝右直須風采動朝端世間萬物俱塵土留取功名久遠看三人以其詩薦於上尋亦除諫官則富貴乃緒餘之事莊子其緒餘以為國家注緒者殘也謂殘餘也如某者居貧甚肆從仕難任韓詩居閒食不足從仕力難任大汗漫九垓之期分甘控地淮南子若士與汗漫期於九垓之上韓詩騰身誇汗漫莊子蜩與鷽鳩笑之曰我決起而飛槍榆枋時則不至而控於地而已矣逐侏儒一囊之俸豈必鑽天東方朔傳侏儒長三尺餘俸一囊粟錢二百四十臣朔長九尺餘亦俸一囊粟錢二百四十乃逺隨黃鵠之梯李白蜀道難地崩山摧壯士死然後天梯石棧相鉤連黄鵠之飛尚不得過猨猱欲度愁攀緣蓋願事碧鷄之使王褎傳方士言益州有碧鷄金馬之寳可祭祀致也宣帝使褎往祭焉注金形似馬碧形似鷄也王褎碧鷄頌曰持節使王褎謹拜南崖敬移金精神馬縹碧之鷄處南之荒深谿迴谷非士之鄉歸來歸來漢德無疆廉平唐虞澤配三皇左思蜀都賦金馬騁光而絶景碧鷄儵忽而曜光後漢書西南夷傳越嶲郡青蛉縣禹同山有碧鷄金馬光景時時出見華陽國志碧鷄光景人多見之杜詩如何碧鷄使把詔紫薇天雖神索於大巫之側莊子小巫見大巫拔茅而棄此其所以終身弗如也呉志張紘見柟榴枕愛其文為作賦陳琳在北見之以示人曰此吾鄉里張子綱所作也後紘見陳琳作武庫賦應機論與琳書深歎美之琳答曰自僕在河北與天下隔此間率少於文章易為雄伯故使僕受此過差之談非其實也今景興在此足下與子布在彼所謂小巫見大巫神氣盡矣杜詩不謂矜餘力還來謁大巫當氣蘇於君子之前杜詩計拙百僚下氣蘇君子前嗟逺道胡為來哉幸將在此蜀道難其險也如此嗟爾逺道之人胡為乎來哉居是邦事其賢者儻或許之上任中書希夷宋史本傳希夷字伯起其先眉州人四世祖伯雨為諫議大夫其後仕閩因家邵武登淳熈三年進士第調浦城縣簿從朱熹學開禧初主太常簿歴禮部尚書兼給事中端明殿學士簽書樞密院參知政事諡宣獻時史彌逺柄國專政希夷具員而已議者頗譏其拱嘿披雲漢之天章夙見舍人之様東坡詩手抉雲漢分天章新唐書徐堅字元固聖厯中東都留守楊再思王方慶共引為判官屬文典厚再思毎曰為鳳閣舍人様勒山林之俗駕來瞻學士之真孔稚圭北山移文請迴俗士駕為君謝逋客言行錄綦北海先生崈禮字叔厚公覃思於學問文章彊記默識繇唐虞三代以暨國朝之隆君臣事迹如指諸掌視唐燕許常楊為不足道上毎曰綦某之文有體真學士也山谷詩玉堂端要真學士須得儋州秃鬢翁蓋指東坡極知大匠之門難飭小夫之牘莊子小夫之知不離苞苴竿牘詳見前顧無藉手左傳宣子私覿子産以玉與馬曰敢不藉手以拜子命起舍夫玉是賜我玉而免我死也謂以玉馬藉手拜子産應奉傳心焉憤邑聊以藉手藉自夜反輒用引吭吭通作肮説文頸也鮑照賦引圓吭之纖婉韓詩引吭吐鏗轟竊聞師儒竝世之難山谷次子瞻韻師儒竝世難日月過箭疾史記仲尼弟子列傳孔子數稱臧文仲柳下惠然皆後之不竝世類有今古殊時之歎韓昌黎之於太白漫夜夢以晝思韓詩李杜文章在光焰萬文長夜夢多見之晝思反微茫陳後山之於大蘇恨江空而歲晚陳師道字無己號後山送蘇公知杭州詩平生羊荆州追送不作逺豈不畏簡書放麑誠不忍一代不數人百年能幾見昔如馬口銜今作禁門鍵一雨五月涼中宵大江滿風帆目力短江空歲年晚今有文章之伯杜詩毎語見許文章伯實在邦域之中公求士甚士之求公既聞命矣東坡勤上人詩集序歐陽公好士為天下第一有一言中於道不逺千里而求之者甚於士之求公以故能盡致天下豪傑後視今猶今之視昔盍往拜之京房傳臣恐後之視今猶今之視前也王羲之蘭亭序後之視今亦由今之視昔伏念某氣懦弗張骨凡難換歐詩換骨莫求丹九轉榮名何待禄千鍾一科十年之不補愧在無聞韓昌黎復志賦哀白日之不與吾謀兮至今十年其猶初豈不登名於一科兮曾不補其遺餘半通五兩之甚甘止於為養法言食如螘衣如華朱輪駟馬金朱煌煌無己泰乎曰由其德舜禹受天下不為泰不由其德五兩之綸半通之銅亦泰矣注五兩之綸半通之銅皆有秩嗇夫之印綬印綬之微者也曾幾何日竟失所天趙壹傳寧當慢傲加于所天文選剖心摩踵以報所天蜀志卻正傳託身所天心焉是恃陷眥腐膺僅能逃死柳文創鉅痛仍號於穹旻排土濡涕頓首成墳陷膺腐眥寒暑在廬草木悴死鳥獸躊蹰磨肌戛骨奚暇送窮韓昌黎送窮文磨肌戛骨吐出心肝企足以待寘我讐寃祥琴翕忽以成聲禮記祥之日鼓素琴告民有終也以節制者也又子張既除喪而見予之琴和之而和彈之而成聲作曰先王制禮不敢不至焉又孔子既祥五日彈琴而不成聲十日而成笙歌祥祭名去凶即吉之義王臨川集祥琴既御吉服以朝東坡詩祥琴雖未調餘悲不敢留李白賦揮霍翕忽塵甑雎盱而望賜范丹傳桓帝時以丹為萊蕪長不到官遇黨人禁錮結草室而居有時絶粒閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪雎呼回切盱凶于切説文盱仰目也蒼頡篇張目貌列子而雎雎而盱盱高誘注睢盱視聽貌王延壽賦鴻濛樸略厥伏睢盱儲光羲詩春光既蕩漭伏戰亦睢盱心口相語但欲從小宰之銓三國志心與口討韓詩手摩袖拂心語口周禮天官小宰中大夫二人説文銓衡也尚書銓掌七品以上選侍郎銓掌八品以下選流外謂之小選小宰銓即侍郎銓也面目可憎未敢作大鈞之問送窮文凡使吾面目可憎語言無味者皆子之志也劉禹錫問大鈞賦序孤居慮靜滯念歘起伊人理之不可以曉也將質諸神乎謹貢誠馳精敢問大鈞惟是忍見賢之渴諸葛武侯傳總攬英雄思賢如渴山谷詩空餘見賢心忍渴望梅嶺所當修覿德之恭或聞庸下之姓名已辱暗中之摸索語林許敬宗性輕傲見人多忘之或謂其不聰曰卿自難記若遇何劉沈謝暗中摸索著亦可識逢人必項斯之説幾於神比而天同道山清話余少時嘗與文潛在館中因看隋唐嘉話見楊祭酒贈項斯詩云度度見詩詩總好今觀標格勝於詩平生不解藏人善到處逢人説項斯因問諸公唐時未聞項斯有詩名也文潛曰必不足觀楊君詩律已如此想其所好者皆此類也葛常之韻語陽秋云劉禹錫隋唐嘉話載楊祭酒贈項斯詩云云斯集中佳句如晚春花云疎與香風㑹細將泉影移别張藉云子城西竝宅御水北同渠拙惡有餘宜祭酒公謂標格勝於詩也祭酒乃敬之也其贈斯詩鄙俗如此與斯亦奚逺哉今按項斯字子遷江東人㑹昌四年進士為丹徒尉有詩一卷受知於張水部籍不獨楊敬之也唐人作主客圖以李益為清竒雅正主張籍楊敬之為升堂客則敬之在唐與籍齊名文潛常之亦非定論也韓文感二鳥賦孰左右者為之先信天同而神比伴直難浩然之呼特以職親而地近孟浩然為王右丞所知一日王待詔金鑾召浩然商較風雅上忽臨幸浩然錯􅌓伏牀下王不敢隱因奏聞上欣然召見命吟舊作浩然拜舞誦詩至不才明主棄之句上憮然曰卿自不求朕朕未嘗棄卿奈何誣朕因放歸南山東坡詩玉堂清冷不成眠伴直難呼孟浩然韓文吾時在翰林職親而地禁不敢相聞仰高山之景行詩高山仰止景行行止傳景大也箋景明也古人有高德如山者則仰慕之有明行者則而行之鶴林玉露云景本訓明而世俗有景仰景慕之語失其義矣野客叢書云後漢書劉愷傳今愷景仰前修注景慕也則此謬其來久矣詳别見感流水之賞音呂氏春秋伯牙善鼔琴鍾子期善聽之方鼓琴志在泰山鍾子期曰善哉乎鼔琴巍巍乎如泰山志在流水鍾子期曰善哉乎鼓琴洋洋乎志在流水鍾子期死伯牙擗琴絶絃終身不復鼓琴為世無足鼓琴者也潘岳夏常侍誄雖實唱高猶賞爾音山谷詩寂寞吾道付萬世忍向時人覓賞音樂莫樂兮相知安有又傲翰林之理屈原九歌悲莫悲兮生別離樂莫樂兮新相知韓文韓愈亦人耳彼傲宰相又傲翰林其將何求必不然見所見而後去姑慰不願封侯之心嵇康傳康居貧與向秀共鍛於大樹之下以自贍給鍾㑹往造焉康不為之禮良久㑹去康謂曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去㑹以此憾之李白與韓荆州書白聞天下談士相聚而言曰生不用封萬户侯但願一識韓荆州何令人之景慕一至於此耶恭惟某官學冠儒纓道航聖瀆法言舍舟航而濟乎瀆者末矣舍五經而濟乎道者末矣家故雄於四蜀巴蜀黔漢為四蜀誰敢齒於諸任左傳周之宗盟異姓為後寡人若朝於薛不敢與諸任齒騎鯨暫駐於九龍説文鯨海大魚也春秋後語宋玉對楚王曰鯨魚朝發崑崙之墟暮宿孟津尺澤之鯢豈能與量江漢之大哉杜詩若逢李白騎鯨魚道甫問訊今何如東坡詩願持空手去獨控横山鯨振鬛遂喑於萬馬東坡三馬贊時西域貢異馬首高八尺龍顱而鳳膺虎脊而豹章出東華門入天駟監振鬛長鳴萬馬皆喑父老縱觀以為未始見也芥隱筆記云劉夢得稱韓文云鸞鳳一鳴蜩螗革音東坡字法昉此周情孔思心傳先聖之不傳李漢韓文序日光玉潔周情孔思宋豔班香文到古人之未到杜牧示姪阿宜詩高摘屈宋豔濃薫班馬香李杜泛浩浩韓柳摩蒼蒼韓文辱示初筮賦實有意思但力為之古人不難到久於詳試蕭望之傳欲詳試其政事復以為左馮翊昨乃遄歸詩式遄其歸遄速也莊子不若遄歸也士則快於睹先韓文朝廷之士引領東望若景星鳳凰之始見也爭先睹之為快帝已嗟於見晩見上鄭參政條能典朕禮咨伯直清尚書咨四岳有能典朕三禮又夙夜惟寅直哉惟清肯從吾兒煩君調護留侯傳四人從太子年皆八十餘上大驚曰吾求公數歲公避逃我今公何事從吾兒游乎煩公幸卒調護太子玉堂草罷又吟紅藥之翻揚雄傳上玉堂注黄圖有大玉堂小玉堂殿元城語錄太宗以玉堂之設其來尚矣但虛傳其號而無正名乃飛白書玉堂之署四字以賜焉夢溪筆談故事堂中設視草臺毎草制則具衣冠據堂而坐今但存空臺謝元暉直中書省詩紅藥當堦翻蒼苔依砌上紅藥謂紅芍藥金匱紬餘還對紫薇之伴司馬遷傳紬史記石室金鐀之書注紬謂綴集之音冑鐀與匱同通典中書之官舊矣謂之中書省自晉魏始後魏謂之西臺隋初改為内史省光宅元年改為鳳閣開化元年改為紫薇省岑參詩三殿花香入紫薇白樂天詩紫薇花對紫薇郎彼智效一官而不足莊子故夫知效一官行比一鄉德合一君而徴一國者其自處也亦若此矣此身兼數器而有餘薛宣傳經術文雅足以謀王體斷國論身兼數器有退食自公之節人望一條之冰其容已肅王君玉國老談苑陳彭年在翰林所兼十餘職皆文翰清秘之目人謂其署銜為一條冰公傍九霄之月所樂不存杜詩星臨萬户動月傍九霄多豈非為天子之私人實持公議新唐書百官志翰林學士專掌内命凡拜免將相號令征伐皆用白蔴其後選用益重而禮遇益親至號為内相又以為天子私人行且作清廟之近弼尤佩逺憂詩序清廟祀文王也鄭箋清廟者祭有清明之德者之宮也天德清明文王象焉故祭之而歌此詩也今外夷訌阻之時訌音虹説文䜋也詩蟊賊内訌增韻亂也通作虹詩實虹小子正中國圖回之日荀子圖回天下於掌上而辨白黑注回轉也言圖謀運轉天下之事如在掌上也天地亦大矣保邦當在於未危老子天大地大王亦大尚書制治於未亂保邦於未危人物方眇然求才不嫌於太廣王逸少帖蔡公遂委篤深可憂當今人物眇然而艱疾若此令人短氣山谷詩門無行媒迹草木傷憔悴人物方眇然誰能委圭幣又馬當一曲孤煙人物于今眇然蔡光啓詩人物於今歎眇然孤墳宿草已生煙與其待倉猝而市三年之艾猝通作卒説文犬從草暴出逐人也宋名臣言行錄范忠宣公純仁嘗曰人材難得欲隨事有用則緩急無以應手七年之病求三年之艾非儲之以待如病者何故雅以人才為己任毎有引薦必先公議及其至也内舉有所不避其不可則人君所主亦必爭不若及閒暇而滋九畹之蘭説文畹田二十畮也集韻韻㑹田三十畮曰畹離騷經余既滋蘭之九畹兮又樹蕙之百畮王逸注畹十二畞韓詩樹蘭盈九畹梁盧蕣詩滋蘭成秀畹時來為之新唐書張嘉貞傳秘書監姜皎得罪張嘉貞附㑹權幸請加詔杖俄而皎死後廣州都督裴伷先下獄帝問法當何如嘉貞復援皎例張説進曰臣聞刑不上大夫士可殺不可辱皎事既不可追伷先豈容復濫上然其言嘉貞退謂説曰何言事之深也説曰宰相者時來即為之豈能長據若貴臣盡當可杖恐吾等行當及之魏志劉廙傳遭乾坤之靈值時來之運晉書賈充傳贊邀遇時來遂階榮命晉書載記慕容垂傳但時來之運未至故韜光俟奮耳北史于謹傳州縣之職昔人所鄙台鼎之位須待時來南史膺時來之運劉長卿詩勿謂州縣卑時來自為用天下幸甚丙吉傳決定大策天下幸甚東坡賀韓丞相啓四方聳觀萬口同慶天下幸甚天下幸甚某藐無可贄輒誦所聞幽桂遺榛菅底敢累犯嚴之口榛音臻説文果實如小栗又木叢生貌菅音官説文茅也爾雅白華野菅昌黎雪後寄崔斯立詩藍田十月雪塞關我興南望愁羣山攢天嵬嵬凍相映君乃寄命於其間秩卑俸薄食口衆豈有酒食開容顔殿前羣公賜食罷驊騮蹋路驕且閑稱多量少鑒裁密豈念幽桂遺榛菅幾欲犯嚴出薦口氣象硉兀未可攀江梅託桃李但欲薰自潔之香山谷上東坡詩江梅有佳實託根桃李塲桃李終不言朝露借恩光孤芳忌皎潔冰雪空自香古來和鼎實此物升廟廊杜牧之詩濃薫班馬香山谷詩然以明哲之火熏以忠信之香又頗熏見知香陳後山詩松篁有節元宜晚桃李無蹊只自薫上呉宣撫獵宋史呉獵字德夫潭州醴陵人登進士第初主潯州平南簿時張栻經略廣西檄攝靜江府教授知常州無錫縣用陳傅良薦召試守正字光宗久不覲重華宮上疏切諫又白宰相留正乞召朱熹楊萬里時陳傅良以言過宮事不行求去獵切責之傅良改容謝㑹偽學禁興獵言陛下臨御未數月今日出一紙去宰相明日出一紙去諫臣昨又聞侍講朱熹以御札畀祠中外惶駭謂事不出於中書是謂亂政獵既駁史浩謚又請以張浚配享阜陵議皆不合出為江西轉運判官尋劾罷久之黨禁弛起為廣西轉運判官除户部員外郎總領湖廣江西京西財賦除秘閣修撰主管荆湖北路安撫司公事知江陵府金人圍襄陽朝廷命獵節制本路兵馬加寳謨閣待制京湖宣撫使呉曦俄反於蜀警報至獵請魏了翁攝參議官訪以西事募死士入竟陵命其將王宗廉死守調大軍及忠義保捷分道夾擊金人遂去又督董逵等援德安董世雄孟宗政等解襄陽之圍西事方殷獵為討叛計請于朝以王大才彭輅任西事仍分兵抗均房諸險漕粟歸峽以待王師及曦誅除刑部侍郎充四川宣諭使朝廷命旌别淑慝以敷文閣學士四川安撫制置使兼知成都府嘉定六年召還卒家無餘貲蜀人思其政畫像祠之獵初從張栻學乾道初朱熹㑹栻於潭獵又親炙湖湘之學一出於正獵實表率之有畏齋文集奏議六十卷諡文定陶朱新錄韓侂胄作偽學逆黨籍頒行天下獵列名其間詳啓意乃任寧鄉主簿作祭主簿之竈揆分已庳孫寳傳寳以明經為郡吏御史大夫張忠辟寳為屬欲令授子經更為除舍設儲偫寳自劾去忠固還之心内不平後署寳主簿徙入舍祭竈請比隣忠隂察怪之使所親問寳前大夫為君設除大舍子自劾去者欲為高節也今兩府高士俗不為主簿子既為之徙舍甚悦何前後不相副也寳曰高士不為主簿而大夫君以寳為可一府莫言非士安得獨自高且不遭者可無不為況主簿乎升侍郎之階見賢有耀韓詩升階揖侍郎歸舍日未欹未之藉手見上條率爾脩辭竊以平生識元魯山便無他憾新唐書卓行傳元德秀字紫芝河南人質厚少緣飾少孤事母孝舉進士不忍去左右自負母入京師既擢第母亡以不及親在而婚終身不娶兄子襁褓喪親無貲得乳媪德秀自乳之數日湩流能食乃止既長將為娶家苦貧乃求為魯山令房綰毎見德秀歎曰見紫芝眉宇使人名利之心都盡蘇源明嘗語人曰吾不幸生衰俗所不恥者識元紫芝也及卒李華諡曰文行先生天下高其行不名謂之元魯山於人見歐陽子乃謂竒逢欒城集上韓太尉書轍之來也於山見終南嵩華之高於水見黄河之大且深於人見歐陽公而猶以為未見太尉也故願得觀賢人之灮耀三復師儒竝世難之詩見前再歌生世何用早之句陳後山觀六一堂圖書詩生世何用早我已後此翁頗識門下士略已聞其風江濤如此孰能百斛而獨扛謝安傳嘗與孫綽等汎海風起浪湧安吟詠自若舟人以安為悦猶去不止安徐曰如此將安歸耶宋朱新仲詩風濤如此亦安歸韓詩龍文百斛鼎筆力可獨扛人物眇然誰可一洗乎萬古杜詩一洗萬古凡馬空餘見前疑山川之沉寂恐宇宙之泬寥尸子天地四方曰宇往古來今曰宙司馬相如傳追怪物出宇宙泬呼決切九辨泬寥兮天高而氣清韻㑹泬寥空貌適我願兮詩邂逅相遇適我願兮在此行矣左傳虞不獵矣在此行也又衣身之偏握兵之要在此行也恭惟某官肝膽一劒韓詩肝膽一古劒波濤兩浮萍精神五兵韓詩腸胃繞萬象精神驅五兵言行擇君子之中庸德業得賢人之久大繫辭可久賢人之徳可大賢人之業涕唾富貴韓文不啻如棄涕唾無一分顧藉心談笑功名蜀道天高久已放龜而縱鶴葉石林詩話趙清獻公以清德服一世平生蓄雷氏琴一張鶴與白龜各一所向與之俱始除帥成都公單車就道以琴鶴龜自隨元豐間再移蜀以龜投淮水故其詩曰馬尋舊路知歸去龜放長淮不復來張九成横浦語錄趙清獻帥蜀乃以一琴一鶴一龜自隨想其致可知及再帥蜀縱鶴放龜想又以為累矣自是渠清入妙處長沙地褊不妨狎鷺而馴鷗漢書注長沙王來朝稱壽歌舞但張袖小舉手上問之曰臣國小地狹不足回旋列子海上之人好鷗者毎旦之海上從鷗鳥游鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從汝游取來吾玩之明日之海上鷗鳥舞而不下杜詩白鷗波浩蕩萬里誰能馴山谷詩老驥心猶在白鷗盟已寒又唯有白鷗盟未寒又此心吾與白鷗盟又輕鷗白鷺定吾友新詔禄於壽宫玉清萬壽宮宋徽宗建乃命宰執兼使副用真宗玉清昭應宮故事也表眷懐於宣室賈誼傳文帝思賈誼徵之至入見上方受釐坐宣室未央前正室也東方朔傳宣室先帝之正處也何武陳湯王嘉皆召見宣室西京賦宣室玉堂譬衆星之拱極刑法志上常幸宣室注布政教之室也今天下尚有可為之事無競維人詩無競維人四方其訓之注言人君為國無疆乎維在得其賢人若得賢人則國家彊矣餘見上魏運使條凡海内所謂不獲之夫豈勝其衆能風霆於庶物禮記風霆流行庶物露生霆雷也謂地以神氣風雷之等流布其行庶衆也言衆物感此神氣風霆之形露見而生人君法此地之生物事事奉之以為教也必霖雨於四方尚書若歲大旱用汝作霖雨天之大任是人恐不免耳謝安傳安妻劉惔妹也既見家門富貴而安獨靜退乃謂曰大丈夫不如此也安揜鼻曰恐不免耳道之將行也命孰能止之某鹿鹿無庸見上鄭參政條狙狙有志韓文瞿翟狙狙狙七餘切半生拙學已不計班貲之崇庳韓文若夫商財賄之有無計班貲之崇庳是所謂詰匠氏之不以杙為楹而訾醫師以昌陽引年欲進其豨苓也一世偉人所願觀道德於前後魏志鍾繇傳文帝即位遷太尉封平陽鄉侯時司徒華歆司空王朗竝先世名臣文帝謂左右曰此三公者乃一代之偉人也後世殆難繼矣南史何炯傳從兄戢謂人曰此子非止吾門之寶亦為一代偉人范文正公王元之像贊昔王文正公居宰府二十年未嘗見愛惡之迹天下謂之大雅㓂萊公左右天子却契丹保社稷天下謂之至忠樞密馬公慷慨立朝有犯無隱天下謂之正直此三君子者一代之偉人也韓文三為屬吏時經五年觀道德於前後聽教誨於左右騷騷忍渴韻㑹騷愁也東坡詩夜牕騷騷閙風竹山谷詩忍渇望梅嶺貿貿望塵禮記有餓者䝉袂輯屨貿貿然來注貿貿目不明之貌趙咨傳望塵不及南史何點傳豫章王尚望塵不及吾當望岫息心然李生之從事湖南知㑹計當而已矣韓文送湖南李正字序李生自湖南從事請告來覲果呉公之召置門下豈遥增擊而去之賈誼傳年十八以能誦詩書屬文稱於郡中河南守呉公聞其秀材召置門下弔屈原賦見細德之險微兮遥矰擊而去之矰漢書作增注增重也言見苛細之人險阨之證故重擊其羽而高去上曾運使槃詳啓意蓋為寧鄉簿時作一行作吏俗莫俗於簿書嵇康傳一行作吏此事便廢梁書何𦙍傳一行為吏此事遂乖六轡觀風華莫華於禮樂詩六轡如濡禮記命太史陳詩以觀民風王莽傳遣使分行天下覽觀風俗唐貞觀八年分遣蕭瑀李靖楊恭仁王珪竇靜李大寛劉德威皇甫無逸韋挺李襲譽張亮杜正倫趙智等巡省天下延問疾苦觀風俗之得失察刑政之苛弊詩序皇皇者華君之遣使臣也送之以禮樂言逺而有光華也恃在鎔之所鑄董仲舒傳夫上之化下下之從上猶泥之在鈞惟甄者之所為猶金之在鎔惟冶者之所鑄忘躍冶之不祥莊子今大冶鑄金金踊躍曰我且為鏌鎁大冶必以為不祥之金斐然脩辭持此徼福左傳天惠徼福於敝邑之社稷辱收寡君又寡君願徼福於周公魯公以事君又徼福於太公丁公又徼福於厲宣桓武又徼福於先君獻穆又惠徼周公之福徼堅堯切求也邀也伏念某材庳莫亢庳説文中伏舍徐曰低小屋通作卑詩謂山蓋庳質窳無竒窳説文汚窬也史記舜陶河濵器不苦窳長鑱掘黃獨之苗只傷地脉杜詩長鑱長鑱白木柄我生托子以為命黄獨無苗山雪盛短衣數挽不掩脛黄獨俗名土芋根惟一顆而色黄故謂之黄獨山谷云往時儒者不解黄獨義改為黄精學者承之以余攷之蓋黄獨是也本草赭魁肉白皮黄色巴漢人蒸食之江東謂之土芋江西謂之土卵蒸煑食之類芋魁南州多食之而俗人改曰黄精子美流離未至作道人劒客食黄精也史記䝉恬傳此其中不能無傷地脉哉短檠喧綠幕之讀徒損天和韓詩長檠八尺空自長短檠二尺便且光黄簷綠幕朱户閉風露氣入秋堂涼太學儒生東魯客三十辭家來射策夜書細字綴語言兩目眵昏頭雪白此時提攜當案前看書到曉那能眠一朝富貴還自恣長檠高張照珠翠又囊空甑倒誰救之我今一食日還併自然憂氣損天和安得康强保天性東坡詩恐君雕琢傷天和苦無計以養親遂强顏而干禄司馬遷傳言不辱者所謂强顔耳劉向雜事此天下强顔女子也一科不補漫得雉於喝盧韓詩豈不登名於一科兮曾不補其遺餘晉書劉毅於東府聚樗蒲大擲一判應至數百萬餘人竝黑犢以還唯劉裕及毅在後毅次擲得雉大喜褰衣繞床大呌謂同坐曰非不能盧不事此耳裕惡之因挼五木久之曰老兄試為卿答既而四子俱黑其一子轉躍未定裕厲聲喝之即成盧毅意殊不快南史顔師伯為侍中孝武與樗蒲帝得雉大悦謂必勝師伯後得盧帝失色師伯遽斂手曰幾得盧五技已窮欲屠龍而單產荀子梧鼠五技而窮宋王楙野客叢書云今讀荀子梧鼠為貓鼠之鼠藝文類聚亦編入鼠門僕攷之乃螻蛄非鼠也案本草廣雅皆謂荀之梧鼠為螻蛄一名碩鼠易晉如碩鼠孔穎達正義引蔡邕勸學篇云碩鼠吾能不成一技注云能飛不能上屋能緣不能窮木能游不能度谷能穴不能藏身能走不能先人荀子梧鼠五技而窮竝為螻蛄也魏詩碩鼠刺重斂皆謂大鼠則爾雅所謂碩鼠關中呼為鼩鼠陸機云今河東有大鼠能人立交前兩足於頸上跳舞善鳴食人禾苗逐則走木空中亦有五技或謂之雀鼠然則螻蛄與此鼠同名碩鼠皆有五技但螻蛄技窮而此鼠技不窮耳陸佃埤雅謂五技而窮者為飛生與諸説異今按飛生人多不解為何物宋江陵幾雜志云先君知鳳翔府竹園中得一物如蝙蝠巨如大鴟有識者云此鼯鼠也一名飛生飛而生子毎欲飛則緣樹至顛能下不能高也莊子朱泙漫學屠龍於支離益單千金之家三年技成而無所用其巧注單盡也騷屑倚門之望騷説文擾也爾雅動也檀弓騷騷注急疾貌屑説文動作切切也方言屑屑不安也郭璞曰往來貌梁呉筠詩仲秋黄葉下長風正騷屑杜詩撫跡猶酸辛平人固騷屑又干戈況騷屑史記王孫賈母曰汝朝出而晚來吾倚門而望唐王泠然詩恨見高堂上朝朝獨倚門卑陬祭竈之謀陬將侯切莊子子貢卑陬失色瑣瑣然不自得注卑陬愧恧貌韓詩棲棲法曹椽何處事卑陬趨蹌閣前之鈴僅逃箠楚詩巧趨蹌兮正義云巧為步趨其舉動蹌然行而張足曰趨今之捷步禮有徐趨疾趨韓詩趨蹌閣前鈴太守有鈴閣羊祜傳鈴閣之下侍衞不過十數人野客叢書云杜詩脱身簿尉中始與箠楚辭鮑注曰非謂簿尉受杖杖有罪者耳僕謂不然官屬受杖其來久矣後漢戴宏為郡督郵曽以職事見詰府君欲撻之云云三國志黃蓋為守長署兩掾教曰若有姦欺終不加以鞭杖宜各盡心此屬官受杖之明驗也自晉至唐此類尤多晉書向雄傳雄初仕郡為主簿太守劉毅嘗以非罪笞雄後與毅俱為侍中初不交言北史庫狄連為鄭州刺史開府參軍皆加捶撻魏收為中外府主簿頻被撻楚唐書邕州經略使陳曇怒判官劉緩杖之二十五而卒浙西觀察使韓臯封杖决安吉令孫解臀杖十下而死劉晏考所部官六品以下杖訖而奏杜牧之詩云參軍與縣尉塵土驚劻勷一語不中治笞箠滿身瘡韓退之詩云判司卑官不堪説未免捶楚塵埃間舉此以驗杜詩之意可見豈謂杖有罪者哉倚賴天涯之釣大隔波濤杜詩二儀積風雨百谷漏波濤舍弟卑棲邑防川領簿曹又倚賴天涯釣猶能掣巨鰲我有二天三輔決錄蘇章為冀州刺史行部有故人為清河太守案得其姦貨乃設酒接以溫顔太守喜曰人各有一天我獨有二天章曰今日蘇孺文與故人歡飲私恩也明日冀州刺史白奏事公法也遂舉正其罪今既數月幸樓臺之近水詩話范文正公鎮錢塘蘇鱗為屬縣巡檢城中兵官往往皆獲薦書鱗在外邑未見收錄因公事入府獻詩曰近水樓臺先得月向陽花木易為春公即薦之盍桃李之托根宋廣平梅花賦序鳴呼斯梅託根非其所山谷詩江梅有佳實托根桃李塲薰南豐之香人爭出其門下杜牧詩濃薰班馬香陳後山觀六一堂圖書詩向來一瓣香敬為曾南豐韓文諸公貴人爭欲令出我門下交口薦譽之認西江之派我未免為鄉人吕居仁集歌詩至豫章始大出學者同作共和錄其名曰江西宗派以其源流皆出豫章也其次曰陳無己潘邠老謝無逸洪龜父饒德操何正平徐師川林子仁洪玉父汪信民李希聲韓子蒼李商老晁師川何正平曰吾乃居行間乎子蒼云我自學古人夏均父又以在下列為恥漁隱叢話吕居仁近世以詩得名自言傳衣江西作宗派圖自山谷以下列陳無己等二十五人為法嗣楊廷秀江西宗派詩序云江西宗派詩者詩江西也人非皆江西也人非皆江西而詩曰江西者何繫之也繫之者何以味不以形也文獻通考江西詩派一百三十七巻續派二十巻黄山谷而下三十五家又曾紘曾思父子詩試伸仰首之鳴韓文今有有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一擧手一投足之勞而轉之清波乎柳文仰首伸吭張目而視庸卜終身之遇恭惟某官眼高四海東坡詩眼高四海空無人筆落九天山谷懐淵明詩空餘詩語工落筆九天上惟其有之種種文清之似詩惟其有之是以似之宋史曾幾字吉甫其先贛州人徙河南府幼有識度入太學有聲兄弼提舉學事渡江溺死幾以遺澤補官銓試第一賜上舍出身除校書郎林靈素得幸朝士爭趨之幾稱疾不往視靖康初提舉淮東茶鹽高宗即位改提舉湖北徙廣西運判江西提刑又改浙西㑹兄開為禮部侍郎與秦檜力爭和議檜怒開去幾亦罷僑居上饒七年檜死起為浙西提刑知台州治尚清淨民安之賀允中薦召對帝大悦授秘書少監幾承平時已為館職去三十八年而復至鬚鬢皓白衣冠偉然權禮部侍郎孝宗受禪幾又上疏數千言將召屢請老乃遷通奉大夫致仕卒諡文清按宋曾氏三望最初溫陵宣靖公公亮明仲次南豐舍人鞏子固兄弟然其祖致堯起家又在溫陵之先其後則幾之族也繇來久矣源源忠恕之傳薛宣傳日至吏以休息所繇來久翼奉傳所繇來久不改其本司馬遷傳所從來逺矣宜供奉於軒墀新唐書李白傳有詔供奉翰林東坡詩供奉清班非老處㑹稽何日乞方回新唐書百官志以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢院學士分掌制誥書勑開元二十六年改翰林供奉為學士顧馳驅於原隰見前無波古井浸秀水之芙蓉白樂天贈元微之詩無波古井水有節秋竹竿一為同心友三及芳歲闌孟郊詩妾心古井水波瀾誓不起東坡詩年來煩惱盡古井無由波李詩清水出芙蓉天然去雕飾有腳陽春轉光風於蘭蕙開元遺事人謂宋璟為有腳陽春言所至之處如陽春及物也宋玉招䰟光風轉蕙汎崇蘭些雲開衡嶽韓詩五岳祭秩皆三公四方環鎮嵩當中噴雲泄霧藏半腹雖有絶頂誰能窮我來正逢秋雨節隂氣晦昧無清風潛心黙禱若有應豈非正直能感通須臾靜掃衆峯出仰見突兀撑青空蘇文公之精誠能開衡嶽之雲而不能回憲宗之惑星聚壽沙晉天文志長沙一星在軫之中主壽命明則壽命長子孫昌治不收聲各使安其田里韓文治不收聲事常出名上循吏傳庶民所以各安其田里而亡歎息愁恨之聲者政平訟理也與我共此者其惟良二千石乎民無遺便皆自得於湖山韓文韋丹墓志居三年于江西八州無遺便新修滕王閣記春生秋殺陽開隂閉令修於户庭數日之間而人自得於湖山千里之外六條逺憺於風稜漢百官表武帝元封五年初置郡刺史掌奉詔條察州治一條强宗豪右田宅踰制以强凌弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁詔守利侵漁百姓聚斂為姦三條二千石不卹疑獄風厲殺人怒則任刑喜則淫賞煩擾刻暴剝截黎元為百姓所疾山崩石裂訞祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟恃怙勞勢請託所監六條二千石違公下比阿附豪强通行賄賂割損正令也李廣傳威祾憺乎隣國注神靈之威曰稜憺動也韓詩四海欽風稜百吏莫逃於水鏡淮南子夫鏡水之與形接也不設智故而方圓曲直弗能逃也襄陽記諸葛孔明為臥龍龎士元為鳳雛司馬德操為水鏡皆龎德公語也晉書樂廣傳衞瓘㑹朝之耆舊適與魏正始中諸名士談論見廣而竒之曰此人之水鏡見之瑩然若披雲霧而見青天也北史蔡大寶見柳莊嘆曰襄陽水鏡復見於兹山谷詩塞上金湯惟粟粒胷中水鏡是人材尚念某頃嘗執贄頗辱賞音見前無地置錐慙處囊之非頴莊子堯舜有天下子無置錐之地史記枚臯傳舜無立錐之地以有天下食貨志貧者無立錐之地史記平原君傳使遂蚤得處囊中乃脱頴而出非特其末見而已注穎環也留渴待井愧汲綆之不脩曹植文渴而後穿井飢而後種植陳后山詩巧手莫為無麪餅誰能留渴待逺井莊子褚小者不可以懐大綆短者不可以汲深荀子短綆不可以汲深井之泉劉向説苑夫短綆不可以汲深井知鮮不可以與聖人之言韓詩歸愚識夷塗汲古得脩綆與其索大寒之裘法言大寒而後索衣裘不亦晚乎不若乞來年之麨麨音炒糗也一作麵東坡詩期君正似種宿麥忍餓待食來年麨注酉人呼搗麥屑為麨武帝元狩元年遣謁者勸種宿麥宿麥二字本此涓人買死馬首亦繫招徠戰國策燕昭王見郭隗曰齊因孤國之亂而襲破燕孤極知力小不足以報然得賢士與共國以雪先王之恥孤之願也郭隗對曰王誠博選國中之賢而朝其門下天下之士必趨於燕矣昭王曰寡人將誰朝而可郭隗曰古之君人有以千金求千里馬者三年不能得涓人請求之三月買千里馬馬已死買其首五百金反以報君君大怒涓人對曰死馬且買之況生馬乎馬今至矣不期年千里馬之至者三今王誠欲致士先從隗始隗且見事況賢於隗者乎上天不生鶴翎盍歸啄菢韓退之薦士詩鶴翎不天生變化在啄菢通波非難圖尺地易可漕注菢薄報切鳥伏卵謂之菢歸投之切敷敘奚殫上董制置居誼董居誼字仁夫臨川人淳熈中進士嘉定六年六月充賀金國生辰使至金㑹彼有内變悉得其國中事宜以歸陞學士四川制置使在蜀鎮靜不擾為政寛和民得安堵按宋史嘉定七年三月以董居誼為四川制置使八年蘭州盜程彦暉求内附居誼卻之九年秦州人唐進與其徒何進等引衆十萬來歸居誼卻之十二年春詔居誼詣行在以聶子述代之金人犯洋州洋州破居誼自利州遁沔州三月興元軍士張福莫簡等作亂以紅巾為號四月福入利州聶子述遁殺總領楊九鼎居誼落職奪三官七月張福伏誅奪居誼二官永州居住崔與之傳成都帥董居誼以黷貨為叛卒所逐總領楊九鼎遇害蜀大擾叛卒即張福莫簡也鶴林玉露云九鼎在蜀以刻剝致諸軍之怨軍士莫簡作亂殺九鼎以金銀實其腹曰使貪腹飽飫然則居誼九鼎俱黷貨之人同僨蜀事公甫為居誼所辟又同郡人故徃來啓劄多溢美云四年再累於大鈞非言可謝賈誼傳大鈞播物師古曰今造瓦者謂所轉者為鈞董仲舒傳猶泥之在鈞惟甄者之所為師古曰甄作瓦之人鈞造瓦之法萬里重瞻於小隊有喜難名杜詩元戎小隊出郊坰問柳尋花到野亭川合東西瞻使節地分南北任流萍竊聞没階之趨又須銜袖之贄韓文文書銜袖賈島詩銜袖有新詩欲見張與韓獵較固難於違俗效顰安得而成妍顰亦作矉蹙也莊子西子病心而矉其里之醜人見而美之亦捧心而顰里之富人見之閉門而不出貧人見之挈妻子而去之彼知美矉而不知矉之所以美伏念某意廣才疎孔融傳負其高氣志在靖難而才疎意廣迄無成功南史蕭惠開傳才疎意廣竟無成功名浮實淺禮記君子恥名之浮於行也諸公過聽雖欲挽之振鷺之羣詩振鷺于飛于彼西廱我客戾止亦有斯容注振振羣飛貌鷺白鳥也喻杞宋之君有潔白之德來助祭於周之廟蔡邕傳鴻漸盈階振鷺充庭注喻潔白之士羣集君之朝也邊讓傳振鷺之集西雍濟濟之在周庭一飽難諧敢望富於屠羊之肆山谷詩一飽事難諧五車書作伴東坡集抱百年之永歎博一飽之無時莊子王謂司馬子綦曰屠羊説居處卑賤而陳義甚高子綦為我延之以三旌之位屠羊説曰夫三旌之位吾知其貴於屠羊之肆也萬鍾之禄吾知其富於屠羊之利也然豈可以貪爵禄而使吾君有妄施之名乎説不敢當願復反吾屠羊之肆徒感招徠之厚遂忘跋履之勞經瞿塘灩澦之危寸心欲折瞿唐峽舊名西陵峽乃三峽之門兩岸對峙中貫一江灩澦堆當其口寰宇記䕫州灩澦堆在州之西蜀江中心瞿塘峽口冬水淺出二十餘丈夏水漲半没灩澦歌云灩澦大如馬瞿塘不可下灩澦大如牛瞿塘不可流又云灩澦大如象瞿塘不可上灩澦大如襆瞿塘不可觸謝靈運詩寸心若不諒微命察如絲杜詩寸心亦何有又戀主寸心明又以兹報主寸心赤又平生方寸心又羈絆心常折又歸心折大刀又心折此淹留又心折此時無一寸路迷何處問三秦别賦心折骨驚上梁山桂林之峻雙腳已低晉張載劒閣銘巖巖梁山積石峩峩逺屬荆衡近綴岷峨是曰劒閣壁立千仞窮地之險極路之峻桂林一名八柱又名八桂言八桂成柱也在臨桂不自意全高帝紀不自意先入關呉王濞傳吾乘傳至此不自意全東坡集七年逺謫不自意全萬里生還適有天幸得至公側韓文何由致其身於其人之側就新懦而悼前猛詎應寄斂退於趨營韓詩斂退就新懦趨營悼前猛歸愚識夷塗汲古得脩綆酬知己而效小忠或可因蹉跎而束縛杜詩束縛酬知己蹉跎效小忠周防期稍稍太簡遂匆匆兹蓋伏遇某官求士為國與物為春莊子使神滔蕩而不失其充日夜無傷而與物為春注與物為春言養物也網羅蜀珍既厚楓柞柟櫨之蓄楓音風説文厚葉弱枝善摇西京賦木則梓棫梗楓呉都賦木則楓柙豫章柞音怍漢五柞宫用木以名詩柞棫斯拔柟如占切上林賦楩楠豫章師古曰今所謂楠木櫨籠都切上林賦華楓枰櫨師古曰今黄櫨木也南都賦楓柙櫨櫪呉都賦綿杬杶櫨餘見前收拾鄭璞欲置璆鐵銀鏤之間戰國策應侯曰鄭人謂玉未理者璞周人謂鼠未腊者璞周人懐璞過鄭賈曰欲買璞乎鄭賈曰欲之出其璞乃鼠也因謝不取任昉王文憲公集序一眄之榮鄭璞踰於周鼎互見尹文子及漢書應奉傳尚書梁州厥貢鏐鐵銀鏤砮磬爾雅璆琳玉也郭璞云美玉之别名鏤鋼鐵可以刻鏤況如鄉里之小兒陶潛傳潛為彭澤令郡遣督郵至縣吏白應束帶見之潛歎曰吾不能為五斗米折腰拳拳事鄉里小兒邪杜詩五陵豪貴反顛倒鄉里小兒狐白裘陸務觀老學庵筆記晉語兒人二字通用桓溫行經王敦墓曰可兒可兒蓋以可人為可兒也故晉書及孫綽與庾諒箋皆作可人淵明不肯束帶見鄉里小兒亦謂小人耳乃是門牆之舊物法言倚門牆則麾之左傳祀夏配天不失舊物王獻之傳青氊我家舊物撰書辭具馬幣既加繾綣之誠韓文於是譔書詞具馬幣卜日以授使者求先生之廬而請焉詩無縱詭隨以謹繾綣説文不相離也集韻纒綿貌侯景傳繾綣衿期綢繆寤語防瘴癘養形神乃委駢蕃之貺韓詩遺我數幅書繼以藥物珍藥物防㢓厲書勸養形神左傳駢蕃左右亦是率從肺腑固知於銘德腑或作胕通作附劉向傳幸得託肺腑田蚡傳以肺腑為相衞青傳以肺附待罪行間注如肝肺之相附著猶言心膂也王莽傳伏自惟念得託肺腑魏志夏侯尚傳以親舊肺腑頂踵何足以酬知劉賔客集摩頂至趾豈足上酬某敢不思稱使令圖惟忠益蓋在元戎所自辟於天子豈欲收虵雀之恩韓文書記之任亦難矣非宏辯通敏兼人之材莫宜居之然皆元戎自辟然後命於天子茍其帥之不文則其所辟或不當亦其理宜也搜神記隋侯見大蛇傷救而治之蛇銜珠以報徑盈寸純白而夜光可以燭堂楊震傳注續齊諧記曰震父寶年九歲時至華隂山北見一黄雀為鴟梟所搏墮於樹下為螻蟻所困寶收歸置巾箱中唯食黃花百餘日毛羽成乃飛去其夜有黄衣童子向寶再拜曰我西王母使者君仁愛救拯實感成濟以白環三枚與寶令君子孫潔白位登三事當如此環矣其後楊氏世傳黃雀所銜玉環至天寶中為楊國忠所奪不知所在駱賔王啓隂山之雀敢懐飱蘂之心漢東之蛇期致投珠之報惟先生無圖利於大夫庶或盡鷄夫之報韓文使先生無圖利於大夫而私便其身圖史記孟嘗君傳秦昭王囚孟嘗君欲殺之孟嘗君使人扺昭王幸姬求解幸姬曰願得君狐白裘孟嘗君有一裘獻之昭王更無他裘客有能為狗盜者乃夜為狗以入秦宫藏中取出以獻孟嘗君得出夜半至函谷關昭王悔使人追之關法鷄鳴出客孟嘗君恐追至客有能為鷄鳴而鷄盡鳴遂發傳出始孟嘗君引此二人於賔客賔客盡羞之及有秦難卒此二人拔之自是之後賔客皆服孟嘗君韓詩進之雞犬效上李侍郎􅌫眉州志􅌫丹稜人燾第四子舉進士入為館職文聲赫然班對備陳忠讜為沿制置副使開閫于鄂甚得江漢之心入為禮部尚書資政殿學士卒諡文肅所著有悦齋集宋史寧宗嘉定四年四川制置大使司置安邊司以經制蠻事命成都路提刑李􅌫潼川路安撫許奕共領之理宗紹定四年以李􅌫為煥章閣直學士四川制置使知成都府六年詔崔與之李􅌫鄭性之赴闕嘉熈元年以李􅌫同知樞密院事四川宣撫使二年詔近覽李􅌫奏知蜀漸次收復然殘創之餘撫綏為急其降德音諭朕軫恤之意四月以李􅌫同簽樞密院事督視江淮京湖軍馬是年􅌫薨特贈資政殿大學士周密癸辛雜識云蜀中類試主司多與士人相約為暗號中朝亦有之而蜀以為常李壁季章􅌫季永同登庚戌科己酉類試二公皆以文名而律賦非所長鄉人侯某者以能賦稱因資之潤色既書巻不以詩示侯侯疑其必有為將出門故少留李遂先出侯踵其後至納卷所以小金牌與吏取二李卷一觀則景聨皆曰日射紅鸞扇風清白獸尊侯即改用之遂皆中選由此觀之則科塲關節繇來久矣二李以名父之子拔萃之材尚由此進何怪么䯢小醜乎因漫及之以為世慨捧從事之檄假道不專杜氏通典部郡國從事史毎郡國各一人漢制也主督促文書舉非法後漢朱震為州從事奏太守單匡贓罪管輅别傳刺史裴徽檄召輅為文學從事典略張楊靈帝時為井州武猛從事盧江七賢傳陳衆辟州從事有劇賊淳于臨等數千人攻縣州牧惶怖衆乘單車駕白馬諭賊降之民立生祠曰白馬從事應劭漢官儀司𨽻都官從事掌洛陽中百姓晉書孟嘉傳轉勸學從事鍾離意别傳三辟從事謝承後漢書周樹達於法善能解煩釋疑八辟從事東觀漢記樊準為别駕從事世稱氷清杜詩將軍昔著從事衫檄刑狄切説文二尺書後漢書毛義少節家貧以孝行稱張奉慕其名往候之坐定而府檄適至以義守令義捧檄而入注檄召書也袁安傳初為縣功曹奉檄從事從事因安致書於令安曰公事自有郵驛私請則非公曹所持辭不肯受注毎州史皆有從事史趙曄傳為縣吏奉檄迎督郵升侍郎之階見賢有便韓詩升階揖侍郎歸舍日未欹闕然藉手莊子闕然數日不見餘見上任中書條率爾脩辭恭惟某官心契九秋杜詩天寒奈九秋山谷詩霜落園林失九秋文焰萬丈韓詩李杜文章在光焰萬丈長二螭㘭處非仁義不陳王前新唐書百官志起居舍人分侍左右秉筆隨宰相入殿若仗在紫宸内閣則夾香案分立殿下直第二螭首和墨濡筆皆在㘭處時號螭頭螭抽知切説文若龍而黃北方謂之地螻或云無角曰螭宋趙彥衞雲麓漫抄云所謂螭首蓋殿陛間壓階石上鐫鑿之飾也五鳳樓中有言語必妙天下五鳳樓唐宋皆有之通鑑開元二十三年上御五鳳樓酺宴元德秀傳𤣥宗在東都大酺五鳳樓下宋㑹要兩京大内南面三門正南面曰五鳳樓國初建開寶元年御五鳳樓肆赦景德四年御五鳳樓觀酺祥符四年將賜酺有司請改五鳳樓名上曰太祖建樓因瑞應立名不可改也梁周翰五鳳樓賦五鳳翹翼若鵬運風雙龍蟠首若鼇戴宫李詩隱隱五鳳樓賈捐之傳君房下筆言語妙天下方餘色石列子天地亦物也物有不足故昔者女媧氏鍊五色石以補其闕山谷詩補天鍊五色忽觸佞山列子女媧氏斷鼇足以立四極其後共工與顓頊爭天下怒觸不周山史記共工氏與祝融戰不勝而怒乃頭觸不周山崩天柱折地維缺女媧乃鍊五色石以補天劉向傳用賢如轉石去佞如拔山遂横野水之舟韋應物詩春潮帶雨晚來急野渡無人舟自橫司馬溫公詩話寇萊公才思融逺年十九進士及第初知巴東縣有詩云野水無人渡孤舟盡日橫為人膾炙歸屹中流之柱山谷砥柱銘跋云余觀砥柱之屹中流閲頽波之東注有似乎君子士大夫立于世道之風波可以託六尺之孤寄百里之命不以千乘之利奪其大節則可以不為此石羞矣道之將行也命孰能止之天將大任是人恐不免耳見前上呉宣撫條暫輟北門之鑰左傳鄭人使我掌其北門之管注管鑰也王君玉國老閒談寇準鎮大名府北使路由之謂曰相公望重何以不在中書準曰主上以朝廷無事北門鎻鑰非準不可耳來分東梓之符唐改梓州為梓潼郡為東川節度使治所棠棣之華固已生光於五馬詩棠棣之華鄂不韡韡凡今之人莫如兄弟南齊柳元策兄弟五人皆領郡號五馬杜詩五馬爛生光􅌫兄弟垕坖壁塾皆知名棟梁之器詎應回首於萬牛世説庾子高目和嶠森森如百丈松雖磊坎有節目施之大厦有棟梁之用杜詩大厦將傾要梁棟萬牛回首邱山重㑹乘閶闔之風離騷經吾令帝閽開關兮倚閶闔而望余淮南子排閶闔注閶闔始升天之門也易通卦驗秋分閶闔風至服䖍曰兑音金其風閶闔亟對罘罳之月罘房尤切説文兎罟也揚雄羽獵賦張竞埜之罘罳新兹切説文罘罳屏也緗素雜記云漢文帝紀未央宫東闕罘罳災顏師古曰謂連闕曲閣也以覆重刻垣墉之處其形罘罳然一曰屏也崔豹古今注罘罳屏也罘復也罳思也臣來朝君至門外當就舍更詳熟思所應對之事也唐蘇鶚演義云二説皆誤罘罳从是形不思是聲罘浮也罳絲也謂織絲之文輕疎浮虛象網羅交文之狀蓋宫殿簷户之間也文宗實錄太和中甘露之變羣臣奉上出殿北門裂斷罘罳而去杜甫天寶末詩云罘罳朝共落棆桷夜同傾溫庭筠補陳武帝與王僧辨書罘罳晝卷閶闔晨開皆非曲閣屛障之意相如子虛賦罘網彌山此亦羅雀之網即罘罳為網不謬矣段成式酉陽雜俎云士林間多呼殿榱桷護雀網為罘罳其淺誤也如此禮記曰疏屏天子之廟飾鄭注云屏謂之樹今罘罳也刻之為雲氣蟲獸如今之闕張揖廣雅云罘罳謂之屏劉熈釋名曰罘罳在門外罘復也罳思也臣將入請事於此重復思之也漢書五行志文帝七年未央宫東閣罘罳災劉向以為罘罳在外諸侯之象後果七國舉兵又王莽性好時日小數遣使壊渭陵延陵園門罘罳曰使民無復思漢也魚豢魏略曰黃初三年築諸闕門外罘罳予自筮仕已來見搢紳數十人皆繆言罘罳事子謂二説皆通以罘罳為網則結繩為之施於宫殿楹門如蘇鶚之説是也以罘罳為屏則刻木為之施於城牆門闕之上如段成式之言是也然二説之中段説較長按五行志注云罘罳闕之屏也玉篇云罘罳樹屏門外也又云罘兎罟也但屏上雕刻為之其形如網罟之狀故謂之罘罳宋子京詩云秋色入罘罳又云嵩嶽倚罘罳皆其義也東坡詩壁月挂罘罳某久於竊䕃甫此望塵趙咨傳望塵不及潘岳傳望塵而拜異人異書不但慰望梅之渴王充傳充好論説閉門潛思户牖牆壁各置刀筆著論衡八十五篇袁山松漢書充所作論衡中土未有傳者蔡邕入呉始得之恒秘玩以為談助其後王期為㑹稽太守又得其書及還許下時人稱其才進或曰不見異人當得異書問之果以論衡之益由是遂見傳焉抱朴子曰時人嫌蔡邕為異書或搜求其帳中隱處果得論衡抱數卷持去邕丁寧之曰唯我與爾共之勿廣也世説魏武行役失道軍皆渴乃令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆出水乘此得及前源陳暄食梅賦魏無林而止渴范留信而前嘗同姓同業尚或希拔茹之征韓文送何堅序何與韓同姓而近堅以進士舉於吾為同業同姓而近也同業也於其不得願而歸其可以無言耶易拔茅連茹以其彚征吉茹如倨切茅根也又人余切相牽引貌見李提刑􅘊􅘊燾之子蘷路提黠刑獄系成紀之望敢論繼别之宗李廣傳廣隴西成紀人也地理志注隴即隴山此郡在隴之西故曰隴西成紀縣在天水郡禮記别子為祖繼别為宗繼禰者為小宗疏别子為祖者謂諸侯適子之弟别於正嫡故稱別子也為祖者别與後世為始祖謂此别子子孫為卿大夫立此别子為始祖繼别為宗者謂别子之世世長子恒繼别子與族人為百世不遷之大宗受月湖之知抑有同門之契月湖謂何異宋史何異字同叔撫州崇仁人紹興二十四年進士歴官刑部侍郎權工部尚書知泉州致仕異高自標置有詩名所著月湖集行世假道得見賢之便脩辭為執贄之先恭惟某官一世儒宗匡衡孔光傳贊自漢武興學公孫𢎞以儒相其後蔡義韋賢𤣥成匡衡張禹翟方進孔光平當馬宮及當子晏咸以儒宗居宰相位禮樂志叔孫通將制定禮儀見非于齊魯之士然卒為漢儒宗業垂後世蕭望之傳贊望之堂堂折而不撓身為儒宗輔佐之能近古社稷臣也翟方進傳贊方進以孤童身為儒宗致位宰相五行志景武之世董仲舒治公羊春秋始推隂陽為儒者宗續漢書盧植名著海内學為儒宗師丹傳唐林上疏曰丹經為世儒宗德為國黄耉後漢周舉傳博物洽聞為儒者所宗鄭𤣥傳經傳治熟稱為純儒齊魯間宗之賈逵傳謝鄭賈之學行乎數百年中遂為諸儒宗晉書賀循傳朝廷疑滯皆諮之於循循輒依經而對為當世儒宗晉書儒林傳贊范平等學府儒宗譽隆望重晉書鄭冲傳以儒宗登保傅三朝壽俊尚書罔或耆壽俊在厥服田里之無愁歎幾森畫㦸之香循吏傳庶民所以安其田而無歎息愁恨之心者政平訟理也韋應物詩兵衞森畫㦸燕寢凝清香原隰之有光華仍揭繡衣之節武帝紀遣直指使者暴勝之等衣繡衣杖斧分部逐捕使登表著左傳朝有著定㑹有表衣有襘帶有結㑹朝之言必聞於表著之位師古曰朝内列位有定處所謂表著者也丕究猷為尚書有猷有為有守豈惟朝廷賴有德之尊東坡集士以德望進則風俗厚而朝廷尊抑使海内䝉不知之潤東坡集餘膏所燭常分無盡之光䝉霧而行皆獲不知之潤不謂解彭門之組彭門山在成都路彭州北三十里雨峯對立如闕名天彭門蜀都賦出彭門之闕杜詩彭門劒閣外號略鼎湖旁便欲挂神武之冠南史隱逸傳陶𢎞景字通明稜陵人讀書萬餘卷一事不知以為深恥家貧求宰縣不遂脱朝服挂神武門公卿祖之供帳甚盛宋齊以來未有斯事正恐蒲輪之迎武帝紀遣使者安車蒲輪束帛加璧徵魯申公枚乘傳以安車蒲輪徵乘注蒲輪以蒲裹輪取其安也難遂橘顆之隱幽怪錄巴邛人有橘園霜後諸橘盡收餘二大橘如三斗盎巴人異之剖開毎橘有二叟鬚眉皤然肌膚紅明皆相對象戲談笑自若一叟曰橘中之樂不減商山但不得深根固蒂為愚人摘下耳詳别見即觀詔下入對席前賈誼傳至夜半文帝前席師古曰漸促近誼聽説其言也某久於傾心方此望履莊子邱得幸於季願望履幕下注言視不敢望其面望履結而還也雖吾宗之老孫子未知所裁杜詩吾宗老孫子質朴古人風然是邦之賢大夫或與之進上梁運使綸手捫參井冒希入幕之賔李白蜀道難捫參歷井仰脅息郗超傳桓溫懐不軌欲立霸王之基超為之謀謝安與王坦之嘗詣溫論事溫令超帳中臥聽之風動帳開安笑曰郗生可謂入幕之賔矣身近斗牛喜見乘槎之使詳見趙茶馬條竊循禮例再具贄緘伏念某不自力田列女傳力田不如逢年乃謀耕禄長風引去固應違汗漫之期史記及到三神山反居水下風輒引去終莫能至餘見前平地尚多亦可逐侏儒之俸白樂天詩更無平地堪行處虚受朱輪五馬恩東方朔傳侏儒長三尺餘俸一囊粟錢二百五十必欲勇乘灩澦之象灩澦歌灩澦大如馬瞿塘不可下灩澦大如象瞿塘不可上幾何不餧巫峽之魚餧弩罪切説文飢也五經文字云今經典相承以此為餧飼之餧别作餒為飢餓字百丈牽江失勢頓成於千丈南史朱超石傳宋武北伐超石前鋒入河軍人緣河南岸牽百丈有漂渡北岸者杜詩百丈内江船又百丈誰家上瀨船又呉檣楚艦牽百丈又百丈牽江色注百丈牽船索也連竹為之周公謹癸辛雜志云鍾㑹呼捉船索為百丈趙氏注云百丈者牽船篾内地謂之彈平聲韓詩躋攀分寸不可上失勢一落千丈强萬夫拱手納溝知恥於匹夫不自意全呉王濞傳吾乘傳至此不自意全僅以身免史記樂毅傳齊王遁而走莒僅以身免汩俱其出粗見平生忠信之功莊子與齊俱入與汩偕出郭象注磨翁而旋入者齊也回伏而湧出者汩也列子孔子自衞反魯息駕乎河梁而觀焉有懸水三十丈圜流九十里有一丈夫方將厲之孔子使人竝涯止之丈夫不以錯意遂度而出孔子問之曰巧乎有道術乎丈夫對曰始吾之入也先以忠信及吾之出也又從以忠信忠信錯吾軀於波流而吾不敢用私所以能入而復出也孔子謂弟子曰二三子識之水猶可以忠信誠身親之而況人乎宋唐子西謫官渡淮中流風作舟欲覆作詩曰聖宋非狂楚清淮異汨羅平生仗忠信今日任風波高適詩忠信涉波濤痛定而思可為行險僥倖之戒韓文今而思之如痛定之人思當痛之時不知何能自處也召驚魂而復幹柳文收召魂魄駱賔王詩萬行流别淚九折切驚魂東坡集收驚魂於散亡假餘生之晷刻又隻影自憐命寄江湖之上驚魂未定夢遊縲絏之中幹體也宋玉招魂乃下招曰魂兮來歸去君之恒幹何為乎四方些魏詠之傳庸神而宅偉幹韓詩子雖軀幹小老氣橫九州企英節以脩容漢書夜企而望歸注企謂舉足而竦身周禮掌節以英蕩輔之注謂為函器盛節餘見前營吻無竒周禮注吻口腃也韓文毎營度欲出口吻聲鳴益悲操筆欲書將下復止竟亦不能竒也汗顏有靦韓文血指汗顏詩有靦面目疏靦面見人之貌徐氏曰凡人所瞻視心實見之故有識别無恥之人面見之而已心實否也國語雖靦然人面哉實禽獸也陳子昂集顧揣涯分實靦心顏恭惟某官盛名如晝和氣猶春四牡勤原隰之咨三鑽巴火杜詩九鑽巴噀火神仙傳欒巴為尚書正朝大㑹巴後到又飲酒西南啖之詔問謝曰臣本縣成都市失火臣故因酒為雨以滅之後驛書問成都果然正旦失火萬牛回邱山之重共託蘇天杜詩萬牛回首邱山重人但知河内借寇之情寇恂傳建武二年拜潁川太守七年代朱浮為執金吾明年從車駕擊隗囂而潁川盜起帝引軍還謂恂曰潁川迫近京師當以時定惟念獨卿能平之耳恂對曰潁川輕剽聞陛下有事隴蜀故狂狡乘間相詿誤耳如聞乘輿南向賊必惶怖歸死即日車駕南征恂從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借寇君一年乃留恂長社鎮撫吏人誰能識關中留蕭之意杜詩關中既留蕭丞相幕下復用張子房邊陲既靜定稱幕下之冰壺韋應物詩文苑臺中妙冰壺幕下清吏道當澄尚託胷中之水鏡山谷詩塞上金湯惟粟粒胷中水鏡是人材詳見前上曾運使條特恐魚鳬之國揚雄蜀本紀蜀始王曰蠶叢次曰伯庸次曰魚鳬難稽龍馬之圖青箱雜記本朝太宗御書及典籍圖畫寶瑞之物竝藏於龍圖閣按宋太祖英宗無集不為閣太中祥符初以太宗以武定并汾以文致太平聖謨寶訓與河圖洛書相表裏建龍圖閣以藏太宗御書閣在含光殿西偏北連禁中東曰資政殿西曰述古殿上藏太宗御製御書并文集總五千一百一十五卷軸冊景德元年閣成以戚綸杜鎬兼待制㑹當紀日月之常劉熈釋名日月為常畫日月於其端天子所建言常明也尚書厥有成績紀於太常亟入聽星辰之履鄭崇傳崇為尚書僕射數求見諫諍上初納用毎見曵革履上笑曰我識鄭尚書履聲杜詩聽履上星辰尚念某不辭險道太白蜀道難其險也如此嗟爾逺道之人胡為乎來哉求備走趨韓文佩玉長裾不利走趨使臣之載馳載驅或小留於斧繡詩載馳載驅周爰咨諏雋不疑傳暴勝之為直指使者衣繡衣持斧辟客之且喜且懼尚迄託於帡幪後漢書太原閔仲叔者世稱節士建武中應司徒侯霸之辟既至霸不及政事勞苦而已仲叔恨曰始䝉嘉命且喜且懼今見明公喜懼皆去以仲叔為不足問邪不當辟也辟而不問是失人也遂辭出投劾而去代上安撫詳啓意似上衞涇者蓋涇自華亭徙居崑山中淳熈十一年狀元後黄由一科啓云應西山之石移果崑岡之玉出是也時涇為湖南帥去民畞而就吏夙歸坯冶之中韓文送牛堪序去民畞而就吏禄由是為卿相者常常有之崔駰傳坏冶一陶羣生得理坏鋪枚切瓦未燒郭璞爾雅注鎔物之冶聞仁政而受㕓今在帡幪之下法言震風凌雨然後知厦屋之為帡幪也久㷀㷀而在疚詩㷀㷀在疚左傳㷀㷀余在疚傅咸傳斬然在疚㷀葵營切或作惸憂也通作􅑱獨也疚音救病也難僕僕而望塵潘岳傳與石崇等諂事賈謐毎候其出輒望塵而拜逮兹祥除禮記朞而小祥又朞而大祥皆祭名去凶即吉之義敢以贄謁恭惟某官直方而大易坤六二直方大不習旡不利智勇且仁應西山之石移宋郭彖暌車志平江俚俗舊傳讖記云潮過唯亭出狀元又云西山石移狀元南歸淳熈庚子三月二十二日呉縣穹窿山大石自麓移立山半石所經草木皆壓藉宛然行迹可驗其秋八月十八日海潮大至過唯亭環城而西穹窿在城西唯亭距城東北四十五里明年省試平江歲貢者盡下唯黃由以國學解中選未廷試皆傳黃由魁天下已而唱名果然由字子由平江人按黃由宋孝宗淳熈八年狀元衞涇十一年狀元庚子為淳熈七年二人聨魁蓋應石移之兆果崑岡之玉出尚書火炎崑岡玉石俱焚呂氏春秋人不愛崑山之玉江漢之珠而愛已之蒼璧小璣淮南子崑崙山中有珠樹玉樹鹽鐵論崑山之旁以玉璞扺烏鵲識其小者數虎榜之十年歐陽詹傳詹與韓愈李觀崔羣玉王涯聨第進士時號龍虎榜宋張唐卿題壁詩一舉首登龍虎榜十年身到鳳凰池詳别見誰其似之扛龍文之百斛韓詩龍文百斛鼎筆力可獨扛付榮進於素定見上曾樞密條屢勇退於急流邵氏見聞錄錢若水為舉子時見陳希夷於華山希夷曰明日當早來如期往見有一老僧與希夷擁地爐坐熟視若水久之不語以火箸畫灰作做不得三字徐曰急流勇退人也若水辭去後為樞密使年四十餘致仕僧麻衣道者也怡然野水之孤舟見上李侍郎條屹若頽波之砥柱劉禹錫詩世道劇頽波我心如砥柱山谷詩砥柱閲頽波又頽波閲砥柱於皇更化詩於皇武王陸機詩於皇聖世時文維晉副帝登庸尚書疇咨若時登庸宋史開禧三年以衞涇參知政事彌綸兩社之間易繫辭易與天地準故能彌綸天地之道餘見上鄭參政條弼亮萬幾之務尚書弼亮四世又一日二日萬幾疏一日二日之間有萬種幾微之事騰身跨汗漫豈料羣兒之愚韓詩李杜文章在光燄萬丈長不知羣兒愚那用故謗傷又騰身跨汗漫不著織女襄宋史嘉定元年六月衞涇罷濯足歌滄浪少警衆人之醉屈原漁父篇舉世皆濁何不掘其泥而揚其波衆人皆醉何不補其糟而歠其醨乃歌曰滄浪之水清兮可以濯吾纓滄浪之水濁兮可以濯吾足假泰階六符之照東方朔傳陳泰階六符注泰階三台也毎台二星凡六星符六星之符驗也黃帝泰階六符經曰泰階者天之三階上階為天子中階為諸侯公卿大夫下階為士庶人上階上星為男主下星為女主中階上星為諸侯三公下星為卿大夫下階上星為元士下星為庶人措長沙千里之平韓詩長沙千里平勝地猶在險況當江濶處斗起勢匪漸少留蔽芾之甘棠詩蔽芾甘棠勿剪勿伐召伯所苃毛傳蔽芾小貌甘棠杜也庸展切磋之淇澳詩序淇澳美武公之德也有文章又能聽其規諫以禮自防故能入相於周美而作是詩也此以入相期衞且用當家故事故知此啓上涇公歸無所即有衮衣繡裳之詩詩九罭之魚鱒魴我覯之子衮衣繡裳鴻飛遵渚公歸無所於汝信處箋云王迎周公當以上公之服往見之時東都之人欲周公留不去故曉之云公西歸而無所居則可就汝誠處是東都也今公當歸復其位不得留也我儀圖之請繼濃墨大字之頌石介慶厯聖德頌序古者一雲氣之祥一草木之異一蹄角之怪一羽毛之瑞當時羣臣猶且濃墨大字金頭鈿軸以稱述頌美時君功德餘見前伏念某名在屬籍史記商鞅定法宗室非軍功不得為屬籍文帝紀復諸劉有屬籍家無所與實則寒儒朝虀暮鹽長兀窮年之燈火韓文太學十年朝虀暮鹽焚膏油以繼晷恒兀兀以窮年夏弦春誦恐孤傳世之詩書禮記春誦夏弦太師詔之注誦謂歌樂也弦謂以絲播詩陽用事則學之以聲隂用事則學之以事因時順氣於功易成也方小丈夫偕計之時武帝紀徵吏民有明當世之務習先聖之術者縣次續食令與計偕注計者上計簿使也郡國毎歲遣詣京師上之偕者俱也令所徵之人與上計者俱來而縣次給之食適大參政登朝之日對硯中龍蛇之影遥識璇魁夏竦詩殿上衮衣明日月硯中旗影動龍蛇春秋運斗樞斗第一天樞第二璇第三璣第四權第五衡第六開陽第七摇光第一至第四為魁第五至第七為標合而為斗接天邊鴻鴈之行偶聨金榜禮記兄弟之齒鴈行杜詩卿家兄弟功名震麒麟閣畫鴻鴈行劉禹錫詩熒煌仰金榜錯落飛濡翰所恨拘貴賤之分末由觀道德於前韓文觀道德於前後聽教誨於左右天惠仁侯韓文今天幸惠仁侯曉行湘水杜詩夜醉長沙酒曉行湘水春赤舄几几雖嘗再拜於車塵詩公孫碩膚赤舄几几疏周公遜避成功之大美為太師履其赤舄其舄之飾几几然素冠欒欒何敢數干於閽吏詩庶見素冠兮棘人欒欒兮勞心慱慱兮注素冠練冠也既祥之冠棘急也欒欒瘠貌賴廩人之繼粟活孝子於寢苫苫説文蓋也韻㑹凶服者以為覆席禮記居倚廬寢苫枕塊不脱絰帶又寢苫枕塊哀親之在土也幸周踰月之期禮記魯人有朝祥而暮歌者孔子曰又多乎哉踰月則其善也敢廢披雲之敬謝廣傳贊樂令披雲高天澄澈十年不調或欲為再命之圖張釋之傳以貲為騎郎事文帝十年不得調亡所知名周禮大宗伯以九儀之命正邦國之位一命受職再命受服一氣轉鈞願更使匹夫之獲杜詩八荒開壽域一氣轉鴻鈞代見丞相代朱提幹提幹見本門齒塵埃之下吏夙感大恩廣韻齒錄也禮記終身不齒注猶錄也增韻列也左傳不敢與諸任齒韓文齒下士於朝又判司卑官不堪説未免捶楚塵埃間拜雲漢之上台輒裁小櫝詩倬彼雲漢昭回於天箋雲漢謂天河也三台星名上台司命為太尉中台司中為司徒下台司禄為司空莊子小夫之知不離苞苴竿櫝戴德有邱山之重柳詩邱山仰德耀脩辭無月露之工李諤傳連篇累牘不出月露之形斐然摇毫毫筆也廣志云漢諸郡獻兔毫書鴻門題唯趙國毫中用西京雜記天子筆管以錯寶為跗毛皆以秋兎之毫曹植長歌行筆出狡兎之毫韓詩摇毫擲簡自不供滂若流汙呉質書申之再三赧然汗下韓文蹙然汗出以慙伏念某妄庸晚進高五王傳灌嬰聞魏勃教齊王反責問勃勃曰失火之家豈暇先言丈人後救火乎因退立股戰而慄灌將軍熟視笑曰人謂魏勃勇妄庸人耳艱苦早孤念昔先人固嘗拜龍虎之榜見上條不腆後嗣何敢吐蝸蚓之科公羊傳不腆先君之服不腆先君之器左傳不腆敝邑之禮又書而不法後嗣何觀新唐書選舉志取士試之小道而不以逺大是猶以蝸蚓之餌垂海而望吞舟之魚不亦難乎所以食垂餌者皆小魚就科目者皆小藝然徒用外家之恩王符傳安定俗鄙庶孽而符無外家為鄉人所賤南史到洽傳父坦以洽無外家乃求娶於羊𤣥保以為外氏始得塵下士之列爾雅塵久也注塵垢稽久也晉書蔡謨傳豈惟微臣其亡之誠實招聖朝惟塵之累范𢎞之傳免惟塵之譏塞素餐之責頂踵實歸於陶鑄任昉彈文自頂至踵功歸造化肺肝嘗切於鏤銘甘辭曹椽之優蓋延傳歷郡列椽州從事注古者三公下至郡縣皆有椽屬續漢志建武十八年立刺史十三人人主一州皆有從事史假佐毎郡皆置諸曹椽聊適步兵之隱阮籍傳聞步兵㕑營人善釀有貯酒三百斛乃求為步兵校尉遺落世事雖去佐職恒游府内朝宴必與焉經禮三百亦嘗偕計吏之行進士五千獨未中太常之第儒林傳其高第可以為郎中太常籍奏後漢書伏恭傳太常試經第一拜博士白樂天詩唯求太常第不管曲江花猶䝉藏疾左傳川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也獲遂養痾痾音阿説文病也高彪傳養痾傲士謝靈運詩養痾邱園中又臥痾對空林山谷詩丈人養痾臥侵尋二考之書漢武帝紀巡郡縣侵尋泰山矣郊祀志作浸尋注浸漸也尋就也王安石詩湖海老浸尋濩落再命之計莊子瓠落無所容注瓠音護瓠落猶廓落也杜詩居然成濩落然念長伯樂之廐茍不自鳴韓文以某在公之宇下而又辱居姻婭之後是生於匠石之園長於伯樂之廐者也縱或抱和氏之珍誰其見賞淮南子隋侯之珠和氏之璧得之者富失之者貧敢伸九頓首之請左傳申包胥如秦乞師公為之賦無衣九頓首而坐秦師乃出併祈一轉手之仁韓文庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎恭惟某官直大以方見前清和而任時則有若伊陟實繼阿衡之覺先尚書在太甲時則有若保衡在太戊時則有若伊陟臣扈公其惟時成周足邁伯禽之拜後尚書公其惟時成周建無窮之基公羊傳封魯公為周公也周公拜乎前魯公拜乎後注始受封父子俱拜文王廟明以周公之功封魯公也史彌逺浩之子亦封魯公此啓蓋上彌逺積十六載更弦之化董仲舒傳竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也收七十城馮軾之功酈食其傳馮軾下齊七十餘城注馮讀曰憑據也言但安坐乘車而游説蒯通傳酈生一士伏軾掉三寸舌下齊七十餘城宋史彌逺遣使詣金求和金人以大散隔牙二關濠州來歸營東豳西煩整頓乾坤之手列子東行至營人民猶是也問營之東復猶營也西行至豳人民猶是也問豳之西復猶豳也杜詩整頓乾坤濟時了燕南越北知扶持宗社之心王允傳故得扶持王室於危亂之中李固傳論至矣哉社稷之心乎方將恢萬世之基益廣開衆正之路劉向傳杜閉羣枉之門廣開衆正之路有如門下桃李之數唐狄仁傑薦張柬之為相又薦夏官侍郎姚崇監察御史桓彥範太平州刺史敬暉數人率為名臣或謂仁傑曰天下桃李盡在公門仁傑曰薦賢為國非為私也韻㑹小補云世稱薦用人士謂之桃李謂起自狄梁公然唐詩已有滿門桃李屬春官之句劉向説苑陽虎得罪於衞北見簡子曰自今以來不復樹人矣簡子曰唯賢者為能報恩不肖者不能夫樹桃李者夏得其休息秋得其實焉樹蒺藜者夏不得休息秋得其刺焉此其事祖也唐人嘲裴晉公詩破卻千家作一池不栽桃李種薔薇薔薇花落秋風起荆棘滿庭君始知正用此事或堪籠中參术之儲元行冲傳謂狄仁傑曰下之事上譬之富家儲積以自資也脯腊膎胰以供滋膳參术芝桂以防疢變門下充為味者多矣願以小人充備一藥石仁傑笑曰君正吾藥籠中物不可一日無是能容之非敢望也豫讓傳非所敢望也願布腹心尚念某難留冰幕韋應物詩文苑臺中妙冰壺幕下清盍反糟邱南史陳暄嗜酒兄子秀致書於暄友冀以諷諫暄聞與秀書曰昔周伯仁渡江惟三日醒吾不以為少鄭康成一飲三百杯吾不以為多又曰江諮議有言酒猶兵也兵可千日不用不可一日不備酒可千日不飲不可一飲不醉美哉江公可與論酒矣吾平生所願身沒之後題吾墓曰陳故酒徒陳君之神道又云何水部眼不識杯鐺吾不離瓢杓汝寧與何同日而醒與吾同日而醉乎速營糟邱吾將老焉李詩憶昔洛陽董糟邱為余天津橋南造酒樓又此江若變作春酒壘麴便作糟邱臺一氣之轉鴻鈞儻拜成終之賜萬間之庇寒士敢忘報國之心俱見前代上丞相代趙催綱誗夫宋紹興十一年置提舉坑冶司催綱官一員綴京幕之下寮茫無操挾左思詩英俊沉下僚瞻宰衡之上相敬布依歸王莽傳拜為宰衡位上公酈炎傳絳灌臨宰衡惟其恃我公之如昔賢故敢提孤生而進門下張霸傳起自孤生致位郡守周榮傳榮江淮孤生蓋臯陶之弼舜以翕受為規模尚書翕受敷施至伊尹之佐湯以旁招為事業尚書旁招俊乂下至蕭曹丙魏之於漢以及房杜姚宋之在唐皆因收拾四海之材説文拾掇也廣韻收拾又斂也徐防傳收拾缺遺建立明經盧植傳宜勑收拾以安遊魂韓文頽墮委靡潰爛不可收拾又無人收拾理則那又收拾不可遲用能輔成一代之治載在信史公羊傳如爾所不知何春秋之信史也是為元勳梁簡文詩護羌擁漢節校尉立元勳至如先正越王之忠實開孝宗隆興之業史浩傳浩字直翁明州斳縣人隆興元年拜尚書右僕射御史王十朋論之出知紹興自是不召者十二年淳熈初除少保觀文殿大學士五年復為右丞相浩喜薦人才自經筵將告歸乃於小官中進江浙之士十五人皆一時選如薛叔似楊簡陸九淵石宗昭陳謙葉適袁夑趙靜之張子智後皆擢用不至通顯者六人而已十年請老除太保致仕封魏國公嘉定十四年進封越王諡忠定張子公服其汲引之量宋史張燾字子公饒之德興人宣和八年進士第三人靖康元年坐李綱累貶紹興二年吕頥浩薦除司勳員外郎遷起居舍人提舉江州太平觀召為兵部侍郎尋權吏部尚書金使至朝議欲上拜金詔燾力爭於是廷臣皆不敢拜時秦檜方主和惟恐少忤敵意出燾知成都府兼本道安撫使在蜀四年西邊不驚乞祠以李璆代之臥家十三年二十五年檜死起燾留守金陵二十九年除吏部尚書三十年致仕三十一年復知建康府孝宗受禪同知樞密隆興元年遷參知政事以老病不拜固求致仕卒諡忠定燾外和内剛帥蜀有惠政民祠之不忘沈德和愧其錄用之吉沈介字德和德清人累官兵部尚書為荆湖制置使風采獨持金人潛卻其為郡卓有清聲豪猾斂迹不惟國以得士而昌亦是家有達賢之後東坡晁君成詩集序達賢者有後張湯是也達賢而有後吾是以知蔽賢之無後也黃石公三畧傷賢者殃及三世蔽賢者身當其害達賢者福流子孫嫉賢者其名不令故國非謂喬木實倚世臣成績紀於太常益光先業尚書厥有成績紀于太常恭惟某官忠貫日月新唐書郭子儀傳贊天寶末盜發幽陵外阻内訌子儀自朔方提孤兵轉戰逐北誼不還顧當是時天子西走唐祚若贅斿而能輔太子再造王室雖唐祚方永亦由忠貫日月神明扶持者哉誠塞天淵班固答賔戲聲盈塞乎天淵溫乎得聖人之和毅若任天下之重人見伯禽之拜後依然無驕士之風史記魯世家周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一浴三捉髪一飯三吐哺起以待士猶恐失天下之賢人子之魯慎毋以國驕人誰知孔鯉之異聞得之自趨庭之日垂紳正笏不動聲色歐文垂紳正笏不動聲色而措天下於泰山之安强本折衝自得精神李尋傳夫本强則精神折衝本弱則招殃致凶為邪謀所陵齊城既入於地官春秋定公十年夏齊人來歸鄆讙龜隂田按宋史寧宗嘉定元年遣王柟以韓侂胄蘇師旦首畀金金人來歸大散關及濠州周寶乃歸於天府春秋定公八年冬盜竊寶玉大弓九年夏得寶玉大弓周禮天府掌祖廟之守藏與其禁令凡國之玉鎮大寶器藏焉宋寧宗嘉定十四年京東河北節制使賈涉繳進富勒呼所獻皇帝躬膺天命之寶元符三年御府寶圖一冊鎮江都統翟朝宗以玉檢來上其文若合符契又得受命於天既受永昌玉璽七月丁亥太常奏受璽之禮製寶輿法物十一月詔曰朕觀前代宜陽受瑞江寧闡珍猶能洪濟大業今朕曷敢不承閏十二月奏獻宗廟十五年正月御大慶殿設黃麾半仗受玉璽奉安天章閣十六年七月置奉安符寶所建殿以内臣掌之元周密癸辛雜志云恭膺天命之寶真宗初即位所製其後毎朝效之易世則藏去靖康之變金人擕玉寶十有四以去而此寶居其二焉其一則哲宗元符三年所製其一欽宗靖康元年所製也及金人内亂南遷玉寶多為䝉古所取當時識者謂此物不宜鋪張故鄭昭先有可弔不可賀之論云然且厚椳闑扂楔之用韓文犬木為杗細木為桷欂櫨侏儒椳闑扂楔各得其宜施以成室者匠氏之工也椳音隈户樞也闑魚列切門限也扂亭㸃切門關牡也楔音屑門兩傍木也幾於無毫髮絲粟之遺老泉集天下之人毛髮絲粟之才紛紛然而起是乃傳禹稷之心豈但接韋平之武班固敘傳𤣥成退讓仍世作相平當傳漢興惟韋平父子至宰相伏念某強名屬籍見代上安撫條本實寒儒既無長吉之文章李賀傳賀字長吉系出鄭王後七歲能辭章韓愈皇甫湜始聞不信過其家使賀賦詩援筆輒就如素搆其目曰高軒過二人大驚自是有名又乏更生之學問劉向傳向字子政本名更生為人簡易廉靖樂道積思經術晝誦書傳夜觀星宿或不寐達旦幼年筆硯燈無太喜之花薛宣傳下至財用筆硯皆為設方略班超傳安能久事筆硯間乎注研音硯陸機傳君苖見兄文輒欲焚其筆硯杜詩燈花何太喜繼世簪裳袍已半枯之葉東坡詩青衫半作霜葉枯一尉南昌而奚補梅福傳福字子真為南昌尉一朝棄妻子去九江李詩梅生亦何為來作南昌尉再丞廣信以徒勞韓文再轉而為丞兹邑寰宇記唐上元元年因江淮轉運使元載之請謂廣信川原夐廣關防襟帶宜置州又謂其信可美也故以名州梁竦傳州縣之職徒勞人耳雖亦䝉臺府之吹嘘然終厄銓曹之選調兹贅員於冰漕漕在到切説文水轉穀也王隆小學篇以水通輸曰漕趙充國傳冰解漕下實隸役於日畿類説拾遺帝畿千里象日月徑圍故曰日畿幸逢大匠之鈞陶誰非躍冶見上曾運使條正恐無言之桃李下自成蹊史記李廣傳贊李將軍悛悛如鄙人口不能道辭及死之日天下知與不知皆為盡哀彼其忠實心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以喻大也敢因三吐哺之餘韓文周公之為輔相其急於見賢也方一食三吐其哺方一沭三捉其髮輒伸九頓首之懇左傳秦哀公為之賦無衣九頓首而坐無衣三章一章三頓首以謝故云九頓首譬諸草木安能酬雨露之恩左傳譬諸草木吾臭味也東坡詩草木盡能酬雨露榮枯安敢問乾坤刈為薪芻亦是報乾坤之造詩翹翹錯薪言刈其楚代上丞相代鄭司理燕翼貽謀錄今之司理參軍五代之馬部軍都虞侯判官也以牙校為之州鎮專殺而司獄事者輕視人命太宗開寶六年詔諸州竝置司寇參軍以新及第九經五經及選人資序相當者充之後為司理參軍觸五嶺之熱叨李椽以終更漢書張耳傳南有五嶺之戍注嶺者西自衡山之南東窮於海一山之限耳而别標名則有五焉裴氏廣州記云大庾始安臨賀桂陽揭陽是為五嶺鄧德明南康記五嶺者臺嶺之嶠在大庾騎田之嶠在桂陽都龎之嶠在九真萌渚之嶠在臨賀越城之嶠在始安杜詩五嶺皆炎熱宜人獨桂林胡建傳黃帝李法注獄官名師古曰李者法官之號也古文李與理通管子書大理皆作李左氏行李行理竝見於傳李濟翁資暇集謂李為古文使字改行李為行使誤矣昭帝紀注更有三品謂卒更踐更過更谷永與段㑹宗書終更亟還企六符之光趨槐庭而執贄東方朔傳願陳泰階六符詳見前周禮面三槐三公位焉既快鳳凰景星之覩韓文朝廷之士引頸東望若景星鳳凰之始見也爭先覩之為快輒謀烏鵲明月之依魏武帝短歌行月明星稀烏鵲南飛遶樹三匝何枝可依明帝步出夏門行䠞迫日暮烏鵲南飛遶樹三匝何枝可依脩辭斐然犯分愧甚伏念某簪裳墜緒塲屋老生王荆公詩塲屋聲名看出羣管輅傳鄧颺曰此老生之常譚輅答曰夫老生者見不生常譚者見不譚再鼓而衰已蹉跎於壯志左傳一鼓作氣再而衰三而竭廣雅蹉跎失足也杜詩淮海莫蹉跎韓詩嗚呼吾意其蹉跎三獻不刖乃塵綴於末科琴操卞和者楚野民得玉獻懐王使樂正子占之言玉石以為欺慢斬其一足懐王死子平王立和復獻之平王又以為欺斬其一足平王死子立為荆王和復欲獻之恐復見害乃抱其玉而哭晝夜不止涕盡繼之以血荆王遣使問之於是和隨使獻王王使剖之中果有玉昌黎答崔立之書其他可否自計已熟足下乃比獻玉者以為必竢工人之剖然後見知於天下雖兩刖足不為病僕之玉固未嘗獻而足固未嘗刖足下無為為我戚戚也初無進取之狂粗識簡書之畏詩王事多艱不遑啓居豈不懐歸畏此簡書毛傳簡書戒命也疏所以不得歸者畏此簡書奔命相救味我自愛桐鄉之句謾試弓刀朱邑傳我故為桐鄉吏其民愛我必葬我桐鄉後世子孫奉嘗我不如桐鄉民王介甫封舒國公詩桐鄉山逺復川長紫翠連城碧滿隍今日桐鄉誰愛我當時我自愛桐鄉唐詩大雪滿弓刀單于夜遁逃東坡詩使君夕不坐衙門散弓刀山谷詩昨解弓刀辭大僕又騎從嚴弓刀又卷旗懸弓刀又弓刀陌上望行色誦人誰送臨賀之詩往司狴犴唐楊憑為李夷簡所劾責授臨賀尉姻友無敢送者獨徐晦送至藍田不數日夷簡請為監察晦曰生平不踐公門公何取而見拔夷簡曰聞君送楊臨賀不顧犯難肯負國乎由是知名晦憑所薦也東坡詩當日無人送臨賀至今有廟祀潮州揚子狴犴使人多禮鄉亭之獄曰犴粗知勿誤於庶獄尚書其勿誤於庶獄庶慎初無可折之片言歲厄閏年良動故人之念東坡詩只有黃楊厄閏年宋陸佃埤雅云黃楊木性堅緻歲長一寸閏年倒長一寸羅願爾雅翼云黃楊歲長一寸遇閏年則否牡丹遇閏年花開輒小天憐孤迹偶逃新鬼之羣左傳吾見新鬼大故鬼小杜詩戰哭多新鬼又新鬼含寃舊鬼哭東坡詩老去常憂伴新鬼竊聞大鈞之無垠漢書大鈞播物坱北無垠韻㑹垠地埒也雖占小善而必錄韓文占小善者率一錄譬猶草木雨露無甘苦之分杜詩雨露之所濡甘苦齊結實雖在江湖潢潦願涓塵之助潢胡光切説文積水池潦魯皓切路上流水左傳潢汙行潦之水服䖍曰畜小水謂之潢韓詩潢潦無根源張衡奏事飛塵增山霧露助海謝朓傳潢汙之水思朝宗而毎竭恭惟某官道先民覺忠結主知司馬遷傳不能納忠效信有竒策材力之譽自結明主聖朝之相頻頻已過中書十四秋之數宋呉處厚青箱雜記云王文正公旦相真宗僅二十年值四夷納欵海内無事天書薦降祥瑞沓臻而大駕封岱祠汾皆為儀衞使扈蹕處士魏野獻詩曰聖朝宰相頻頻出君在中書十四秋西祀東封俱已畢可能來伴赤松遊閟宫之詩奕奕方開異姓五百年之封詩序閟宫頌僖公能復周公之宇也詩閟宫有侐實實枚枚又新廟奕奕奚斯所作箋閟神也姜嫄神所依故廟曰神宫奕奕姣美也舊傳郭璞讖云天目山垂兩乳長龍飛鳳舞到錢塘海門一點巽峯起五百年間異姓王史彌逺封㑹稽郡王故云按宋史寧宗嘉定十四年八月賜史彌逺家廟追封史浩為越王配享孝宗廟廷故有閟宫奕奕之語無敵知真儒之功法言魯不用真儒故也如用真儒無敵於天下安得削可久見賢人之德繫辭可久則賢人之德王弼注德業既成則入於形器故以賢人目其德業問鄧禹而披輿地蓋將膺萬國之貢珍鄧禹傳光武至廣阿舍城樓上披輿地圖指示禹曰天下郡國如是今始乃得其一子前言以吾慮天下不足定何也班固東都賦春王三朝㑹同漢京天子受四方之圖籍膺萬國之貢珍得伊尹以格皇天詎止俘三朡之寶玉尚書時則有若伊尹格於皇天三朡國名今定陶者相傳為然朡祖叢切或作艐書序夏師敗績湯遂從之遂伐三朡俘厥寶玉誼伯仲伯作典寳俘取也言夏師既敗走保於三朡其國之寶玉皆輸於三朡湯追之桀走南巢湯於是俘其寶玉以歸按宋史寧宗嘉定十五年正月朔御大慶殿受恭膺天命之寶惟有邦有家九德咸事尚書日宣三德夙夜浚明有家日嚴秖敬六德亮采有邦翕受敷施九德咸事則無怠無荒四夷來王尚書無怠無荒四夷來王豈以洵故官冗耶老泉上韓丞相書今洵幸為諸公所知似不甚淺而相公尤為有意至於一官則反遲疑不決者嗟豈天下官以洵故冗耶願善鄭以勸來者左傳鄭伯如周始朝桓王也王不禮焉周桓公言於王曰我周之東也晉鄭焉依善鄭以勸來者猶懼不蔇況不禮焉鄭不來矣尚念某固望斗升之活見上曾樞密條亦希尺寸之垂鄧禹傳光武見禹甚歡謂曰生逺來寧欲仕乎禹曰不願也但願明公威德加於四海禹得效其尺寸垂功名於竹帛耳猶泥在鈞猶金在鎔是全託一陶之造董仲舒傳猶泥之在鈞惟甄者之所為猶金之在鎔唯冶者之所鑄崔駰達㫖坯冶一陶若川作舟若旱作雨諒欲遂萬物之宜尚書若濟巨川用汝作舟楫若歲大旱用汝作霖雨王陵傳宰相者上佐天子理隂陽順四時下遂萬物之宜外鎮撫四夷諸侯内親附百姓使卿大夫各得任其職也四六標準卷一
