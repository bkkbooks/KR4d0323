body:
  text: 四六標準卷三十九宋李劉撰賀正賀嗣秀王師揆宋孝宗繼統封秀王子孫為嗣秀王斗攜龍角又頒羲仲之春史記天官書杓攜龍角注杓北斗杓也龍角東方宿也攜連也正義曰按角星為天關其間天門其內天庭黃道所經七曜所行左角為理主刑其南為太陽道右角為將主兵其北為太隂道也頒通作班崔駰傳强起班春注班布春令尚書分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春孔傳羲仲居治東方之官雪滿兔園請賦梁王之夀謝惠連雪賦嵗將暮時既昏寒風積愁雲繁梁王不恱逰於兔園俄而微霰零密雪下王乃歌北風於衛詩詠南山於周雅授簡於司馬大夫曰抽子祕思騁子妍辭侔色揣稱為寡人賦之恭惟某王宗藩明德詩大宗維翰價人維藩史記楚元王世家為漢宗藩潘朂册魏公九錫文先王並建明德胙之以土分之以民崇其寵章備其禮物所以藩衛王室左右厥世也左傳選建明德以藩屏周故周公相王室以尹天下于周為睦政路崇班蘇炯制鳥臺峻秩望總鐵冠蒼佩崇班威髙石室襲慶璿源默應璿璣之運璿亦作璇說文美玉也宋宗室有璇源分派字號宗正有四書曰玉牒曰仙源積慶圖曰宗藩慶系録曰宗支屬籍顔延年詩玉水記方流璇源載圓折尚書在璿璣玉衡以齊七政寶分玉帶益調玉燭之和尚書分寶玉於伯叔之國通鑑唐𤣥宗從復道中見衛士棄餘食寧王憲從容諫釋之是日上宴飲極歡自解紅玉帶賜憲第九卷有代回嗣秀王師揆賀賜玉帶啓爾雅四時和謂之玉燭注道光照也疏道言也言四時和氣溫潤明照故曰玉燭李巡云人君德美如玉而明若燭束晳詩玉燭陽明顯猷翼翼宜從桃葦之辰沈約宋書舊時嵗朔常設葦莢桃梗磔雞子宫及百寺之門以禳惡氣梁尚書宗懍荆楚嵗時記正月一日造桃板著户謂之仙木注桃鬼所畏畫作人首可以有所收縳不死之祥又桃者五行之精能制百鬼謂之仙木括地圖曰桃都山有大桃樹下有二神一名鬱一名壘執葦索以伺不祥之鬼得即殺之應劭風俗通云黃帝書稱上古有神荼鬱壘兄弟二人在度朔山桃樹下簡百鬼鬼妄搰人援以葦索執以食虎于是縣官以臘除夕飾桃人垂葦索畫虎于門效前事也丕介椿松之祉介助也詩介以繁祉栁文永介丕祉莊子上古有大椿者以八千嵗為春八千嵗為秋而彭祖乃今以久特聞衆人匹之不亦悲乎詩秩秩斯干幽幽南山如竹苞矣如松茂矣某愧無善頌禮記君子謂之善頌善禱疏頌者美盛德之形容禱者求福以自輔也張老因美而譏之故為善頌文子聞過即服而拜故為善禱也可賀履端左傳履端于始王燭寶典正月為端月臧榮緒晉書熊逺議曰履端元日正始之初有識之士於是觀禮樂榮耳目之觀崇玩㺯之好晉荀朂正大㑹行禮歌詩曰於皇元首羣生資始履端大享敬御福祉虞世南奉和獻嵗宴宮臣詩履端初啓節長苑命髙筵曵鄒陽之裾方規旅進鄒陽傳飾固陋之心則何王之門不可曵長裾乎授司馬之簡更佩謙光易謙尊而光餘見上文代董制置賀史丞相鳯紀更端復對戊寅之厯左傳郯子曰鳳鳥氏厯正也晉律厯志少昊則鳳鳥司厯顓帝則南正司天宋志考少昊氏有鳳鳥氏司厯唐藝文志戊寅厯一卷厯志髙祖受禪將治新厯東都道士傅仁均善推步之學太史令庾儉傅奕等參議合受命嵗名為戊寅元厯以唐以戊寅嵗甲子登極厯元戊寅日起甲子如漢太初髙祖詔司厯起二年用之按戊寅為寧宗嘉定十一年龍躔回次又新甲乙之司後漢書昔者聖人之作厯也觀璿璣之運三光之作道之發斂景之長短斗躔所建青龍所躔參伍以變錯綜其數而置術焉禮記孟春之月其日甲乙其帝太皞注乙之言軋也日之行春東從青道發生萬物月為之佐時萬物皆解孚甲自抽軋而出因以為日名焉乙不為月名者君統臣功也魏相傳東方之神太皞乘震執規司春時維元勳魏志髙柔疏並以元勳代作心膂謝靈運表鳴玉拖紱班景元勳梁簡文詩護羌擁漢節校尉立元勳坐膺純嘏嘏舉下切說文大逺也詩天錫公純嘏大逺之福也又叶果五切以古得聲福也詩俾緝熙于純嘏恭惟某官功髙王室尚書以蕃王室又乃心罔不在王室忠簡帝心尚書惟簡在上帝之心以道德而位三公應千載明良之運宋蘇易簡在翰林一日召對賜酒甚歡上謂易簡曰君臣千載遇易簡應聲答曰忠孝一生心上恱尚書元首明哉股肱良哉理隂陽而遂萬物成十年生聚之功王陵傳宰相者上佐天子理隂陽順四時下遂萬物之宜左傳越十年生聚而十年教訓生聚生民而聚財也宜誕受於春祺說文祺吉也詩受天之祺爾雅祥也注謂徴祥又吉也禮樂志羣生啿啿惟春之祺注祺福也用永符於皇極尚書五皇極皇建其有極宋書宜遵漢魏纂承皇極某一違鈞範五見嵗華唐竇牟詩嵗華春更早天瑞雪猶深身在西陲阻效椒觴之祝陲是為切說文逺邉也通鑑外紀禹使章亥步自東極至于西陲注陲是外逺之名庾亮傳吾憂西陲過于歷陽此西陲指蜀宗懍荆楚嵗時記正月一日進椒柏酒崔實四民月令過臘一日謂之小嵗拜賀君親進椒酒從小起椒是玉衡星精服之令人身輕耐老董勛云嵗首酌椒酒而飲之以椒性芬香又中為藥故此日采椒花以貢尊者成公子安椒花銘肇惟嵗首用正元日厥味惟珍蠲除百疾神馳東閣輒輸竹簡之誠閣當作閣公孫𢎞傳開東閣以延賢人朱雲傳且留我東閣師古曰閣者小門也東向開之避當庭門而引賔客以別於掾史官屬也閣音葛說文門傍戶也爾雅小閨謂之閣說文簡牒也從竹間聲詩畏此簡書疏古者無紙有事書之于簡代董制置賀鄭參政曽樞密三陽交泰驗正月之始和易天地交泰子夜歌適憶三陽初今已九秋暮易傳冬至日一陽為復二陽為臨三陽為泰周禮正月之吉始和布教于邦國都鄙乃縣教象之法于象魏賈公彥疏云正月之吉者謂建子之月一日也始和者從十二教已下于此月之時始調和也政教皆有故法依舊而行之言始和者若改造云爾其實不改造也始以對終對下縣之是在建寅之月為終也此借用蓋正月之吉四字為句下文凡數見今連讀始和故知為借用五福照臨瞻輔星而有耀尚書皇建其有極斂時五福又九五福一曰壽二曰冨三曰康寧四曰攸好德五曰考終命又若日月之照臨晉天文志北極四星曰四輔所以輔佐北極出度授政也東蕃四星南第一星曰上相北東太陽門第二星曰次相北中華東門第三星曰次將北東太隂門第四星曰上將所謂四輔也西蕃四星南第一曰上將北西太陽門第二曰次將北中華西門第三曰次相北西太隂門第四曰上相亦四輔左傳光逺而自他有耀者也宜介簡穰之福介助也詩以介景福爾雅穰穰福也注云言饒多簡大也詩降福穰穰降福簡簡傳穰穰衆也簡簡大也用彰弼亮之功尚書弼亮四世正色率下恭惟某官德協春溫氣排冬凛韓詩喜氣排寒冬參贊鈞陶之化曾云樞機之柄允釐百工鈞旊輪師古曰陶家名轉者為鈞蓋取周回調均之義說文陶瓦器也禮記有虞氏上陶注以陶去其土而為之故謂之陶董仲舒傳上之化下下之從上猶泥之在鈞唯甄者之所為師古曰甄作瓦之人也鈞造瓦之法其中旋轉者繫辭言行君子之樞機也尚書允釐百工庶績咸熙孔傳信治百官衆功皆廣沉潛帷幄之謀折衝千里尚書沉潜剛克髙帝紀運籌帷幄之中决勝千里之外家語不出尊爼之間折衝千里之外馮奉世傳折衝宿將李尋傳本强則精神折衝賈復傳有折衝千里之威馬融傳安不忘危治不忘亂帝王之所以耀神武而折遐衝也折衝言有能衝突為害則折挫之宜對青規之旦爾雅春為青陽尚書緯春為青帝魏相傳東方之神太皞乘震執規司春注木為仁仁者生生者圓故為規亟登黃閣之榮杜氏通典陳三公之制開黃閣聽事置鴟尾北齊三公之官並置府其府三公當中門黃閣沈約宋書云三公黃閣前史無其義按禮記云士韠與天子同公侯大夫即異鄭𤣥注云三公之與天子禮數相亞故黃其閣以示謙不敢斥天子宜是漢末制也某一自西來杜詩西來紫氣滿函關五逢朔易尚書平在朔易孔傳朔易謂嵗改易于北方正義朔盡也萬物盡於北蘇而復生爾雅朔北方也注謂幽朔詩城彼朔方吳蜀萬里未由稱壽於椒觴寰宇記諸葛武侯送費禕聘吳至萬里橋曰萬里之行始于此矣劉光祖萬里橋記孔明於此送吳使張溫曰此水下至揚州萬里范石湖吳船録云蜀人入吳者皆自合江亭登舟其西則萬里橋孔明送費禕處也杜詩門泊東吳萬里船此橋正為吳人設餘見上條蕭曹同心所願垂光於竹帛曹參傳始參微時與蕭何善及為宰相有隙至何且死所推賢唯參參代何為相國舉事無所變更一遵何之約束百姓歌之曰蕭何為法講若畫一曹參代之守而勿失禰衡傳揚聲紫微垂光虹霓鄧禹傳垂功名於竹帛耳賀制置安撫辛卯辛卯為理宗紹定四年梅亭時年五十八太嵗在辛令豫孚於三甲爾雅太嵗在辛曰重光易先甲三日後甲三日王弼注甲者創制之令也正義云甲為十日之首創造之令為在後諸令之首故謂之甲如漢之所謂甲令也甲前三日取改過自新故用辛甲後三日取丁寧之義故用丁也吉日維戊春先撫於五辰戊莫候切詩吉日維戊既伯既禱箋戊剛日也尚書撫于五辰庶績其凝孔傳百官順撫五行之時衆功乃成相維玉帳之籌詩相維辟公駱賔王詩七德龍韜開玉帳千里鼉鼓疊金鉦韓翊詩身隨玉帳心應愜官佐銅符勢又全羅隱詩百萬貔貅趨玉帳三千賔客冠金貂楊巨源詩心期玉帳親台位魏勃因君說姓名戎昱詩金鐃肅天外玉帳靜霜中兵書五行類有李清玉帳經一卷李筌六壬玉帳歌十卷崇文目有彭門玉帳一卷抱朴子內篇云兵在太乙玉帳之中不可攻也唐大詔令折衝之寄符玉帳而總金壇杜詩秋風嫋嫋動髙旌玉帳分弓射虜營注將幕曰王帳又細聲間玉帳又空留玉帳術李詩身居玉帳臨河魁東坡詩玉帳夜談風雪苦注玉帳將軍帳也古有玉帳經焦氏筆策云杜詩空留玉帳術又云休添玉帳旗王洙于玉帳術注云兵書也後來增釋者不過曰唐藝文志有玉帳經一卷而已至玉帳旗則難通矣按顔之推觀我生賦云轉絳宫之玉帳袁卓遁甲專征賦云或居貴神之玉帳蓋玉帳乃兵家厭勝之方位主將於其方置軍帳則堅不可犯猶玉帳然其法出於黃帝遁甲以月建前三位取之如正月建寅則已為玉帳餘凖此互見前對越璇璣之運越於也詩對越在天尚書在璇璣玉衡以齊七政恭惟某官川流厚化禮記小德川流大德敦化鄭注小德川流浸潤萌芽喻諸侯也大德敦化厚生萬物喻天子也山立陽休禮記山立時行盛氣顛實陽休玉色鄭注山立不搖動也時行時而後行也陽休盛身中之氣若陽氣之體物也仁行而春為青規而圜萬物尚書緯春東方青龍房位其帝仁好生不賊餘見上條剛養其氣轉鴻鈞以夀八荒杜詩八荒開夀域一氣轉鴻鈞聊賦顧追龍蛇之詩天問厥利維何而顧兔在腹鄭𤣥傳今年嵗在辰來年嵗在已注北齊劉畫髙才不遇傳論𤣥曰辰為龍已為蛇嵗至龍蛇賢人嗟蘇子由守嵗詩於菟絶繩去顧兔追龍蛇奔走十二蟲羅網不及遮更均蠶叢及魚鳬之福揚雄蜀本紀蜀始王曰蠶叢次曰伯雍次曰魚鳬按成都有蠶叢祠今呼為青衣神在聖夀寺蠶叢氏教民養蠶作金蠶數十家給一蠶後聚而弗給瘞之江土為蠶墓南史齊永明間始興王蕭鑑為益州刺史於州園得古冢以金為蠶數斗鑑一無取復為起冢且立祠焉問訊梅邉之味杜詩問訊東橋竹亟催花底之朝杜詩退朝花底散歸院栁邉迷某辱庇陳人莊子人而無人道謂之陳人注真是陳久之人耳俗便共信之此俗之所以為安固而習常尚棲故壘東坡詞故壘西邉人道是三國周郎赤壁千林有喜同欣捲賀燕之簾宋薛奎字宿藝絳州人舉進士時謁馮魏公首篇有囊書空自負早晚遇明君之句馮掩卷謂之曰不知秀才所負何事讀至第三篇春詩云千林如有喜一氣自無私乃曰秀才所負者如此淮南子大厦成而燕雀相賀湘山野録陳堯佐為吕申公所薦遂至大拜極懷薦引之德因作燕相携酒過之有主人恩重朱簾捲之句申公笑曰自恨捲簾人已老莫愁調鼎子無功老于廊廟而醖藉如此三徑就荒已願返屠羊之肆陶靖節集三徑就荒松菊猶存莊子楚昭王失國屠羊說走而從於昭王昭王反國將賞從者及屠羊說說曰大王失國說失屠羊大王反國說亦反屠羊臣之爵祿已復矣又何賞之言願復反吾屠羊之肆賀黃制置伯固送赴壑之鱗喜避蛇於劔閣東坡守嵗詩歘如垂盡嵗有似赴壑蛇修鱗半已沒去意誰能遮况欲繫其尾雖勤知奈何太白蜀道難劔閣崢嶸而崔嵬朝避猛虎夕避長蛇磨牙吮血殺人如麻振治兵之甲行歸馬於華陽詩序叔于田刺莊公也叔處于京繕甲治兵以出于田國人恱而歸之尚書歸馬于華山之陽放牛于桃林之野登寅車之勞還詩元戎十乘以先啓行注司馬法云夏后氏曰軥車先正也殷曰寅車先疾也周曰元戎先良也正義曰寅進也此車能進取逺道故云先疾也陳琳檄登寅車而戒路執金板而先驅麾鉞一臨凶黨冰泮詩序出車勞還率也杖杜勞還役也回午門而愷奏後漢李尤平城門銘平門督司午位處中外臨僚侍內達帝宫正陽南面炎暑赫融通作五白樂天詩載向五門宫道西愷軍勝之樂周禮奏愷樂左傳晉文公振旅愷以入于晉樂書風謂之愷風天地之怒氣散王師大獻謂之愷樂人之怒氣已焉或作凱恭惟某官盛心懿識惠氣威風韓文有文武威風知大體可畏信者橫腰下之黃升作眉間之色戰國策將軍黃金橫帶而馳乎淄澠之間白樂天詩眼前何日赤腰下幾時黃東軒筆録舊制學士以上並有一人朱衣吏引馬所服帶用黃金而無魚至入兩府則朱衣二人引馬謂之雙引金帶懸魚謂之重金世傳館閣望為學士者賦詩云眼裏何時赤腰間甚日黃及為學士又作詩曰眼赤何時兩腰黃幾日重謂雙引重金也東坡詩坐閲諸公半廊廟時看黃色起天庭注人面有天庭相書以黃色為喜色韓退之詩眉間黃色見歸期推腹中之赤立為城上之祥光武紀與銅馬大戰於蒲陽悉破降之降者猶不自安光武知其意敕令各歸營勒兵乃自乘輕騎案行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎韓退之詩城上赤雲呈勝氣注蔡未平數月前吳武陵自峽石望東南氣如旗鼓矛盾皆顛倒少選黃白氣從西北出盤蜿相交告公曰今西北王師所在黃白喜氣也敗氣為賊賊必亡矣噓師律而黍生易師出以律正義云律法也師出之時須以法制整齊之劉向別録方士傳言鄒衍在燕燕有谷地美而寒不生五穀鄒子居之吹律而溫氣至而穀生今名黍谷播民和於麥實尚書百工播民和見士于周東觀漢紀張堪為漁陽太守勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支紅塵晝靖不妨圍夜觀之棊杜詩從容靜塞塵觀音貫韓詩從軍古云樂談笑青油幕燈明夜觀棊月暗秋城柝紫禁春回㑹歸押曉班之仗杜詩紫禁正耐煙花繞歐陽永叔詩玉殿清霜綴曉班某又看新厯東坡詩老去怕看新厯日退歸擬學舊桃符真是陳人見本卷賀制置安撫條騎火照山紅遙想元功之疊賞昌黎賀裴相公詩西來騎火照山紅夜宿桃林臘月中手把命圭兼相印一時重疊賞元功雪嶺界天白何時尊酒以重論杜詩雪嶺界天白錦城曛日黃又何時一尊酒重與細論文代回大理趙少卿師古詳啓意蓋代月湖下同履端於始茂迎鼎至之祥鼎方也賈誼傳天子春秋鼎盛賈捐之傳鼎貴師古曰方且欲貴也匡衡傳匡鼎來服䖍曰若言方且來也餘見首條同官為僚丕對咸中之慶左傳同官為寮吾嘗同寮敢不盡心乎尚書哲人惟刑無疆之辭屬于五極咸中有慶注極中也慶善也以其折獄屬五常之中正皆中有善所以然也恭惟某官邦之司直詩彼其之子邦之司直注司主也彼服羔裘之是子一邦之人主以為直刺今無此人民以不寃于定國傳朝庭稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃凍解勾萌漸鞠圜扉之草禮記孟春之月東風解凍又勾者畢出萌者盡達注屈而生者曰勾芒而直者曰萌詩鞠為茂草注鞠窮也窮盡為茂草文選鞠茂草於圜扉隋劉曠傳曠為平鄉令七年風教大洽獄中無繫囚囹圄皆生草北史宣帝紀齊大寶初大赦郡無一囚獄內櫓上桃木蓬蒿並滿謂之神門日遲棘木益清訟舍之棠詩春日遲遲采蘩祁祁易係用徽纆置于叢棘三嵗不得凶王弼注險峭之極不可升也嚴法峻整難可犯也宜其囚執置于思過之地禮記凡聽五刑之訟史以獄成告于正正聽之正以獄成告于大司冦大司寇聽之棘木之下春秋元命苞樹棘槐聽訟于其下棘赤心有刺言治人者原其心不失赤實事所以刺人其情令各歸實詩蔽芾甘棠勿剪勿伐召伯所茇說文茇舍也增韻草舍也宜有天休尚書俟天休命又天休滋至相時星聚通厯文王五星聚于房天官書漢之興五星聚于東井唐天文志𤣥宗天寶九年五星聚於箕尾檀道鸞續晉陽秋陳仲弓從諸子姪造荀朗陵父子于是德星聚太史奏五百里賢人聚某濫同秋紀周禮秋官掌邦刑大理亦司刑法故云時月湖為刑侍又見春朝孔光傳注正月一日為嵗之朝月之朝日之朝有椒其馨未遂稱觴之慶椒子料切芬香也詩有椒其馨胡考之寧注椒猶飶也成公綏椒華銘嘉哉芳椒載繁其實厥味惟珍蠲除百疾肇惟嵗始正月元日永介眉壽以祈初吉荀朂正㑹王公上夀酒詩踐元辰延顯融獻羽觴祈令終如松之盛敢輸削牘之私詩如竹苞矣如松茂矣原陟傳削牘為疏師古曰牘木簡也代回程監簿凖重來及芳菲笑逢春之白傅誰能更拘束羡守嵗之杜陵少陵杜位宅守嵗詩四十明朝過飛騰暮景斜誰能更拘束爛醉是生涯三夀作朋詩三夀作朋如岡如陵注三夀三卿也國之三夀考之卿與作朋友百祿是總詩不戁不竦百祿是總注百衆之祿總聚而歸之恭惟某官以道怡性未老得間遁齊閒覽嘗於驛舍見人題壁云謀生待足何時足未老得閒方是閒余深味其言服其精當而愧不能行也此與夫一日看除目三年損道心者異矣詳見前櫪馬盍簮看破塞翁之馬少陵杜位宅守嵗詩守嵗阿咸家椒盤已頌花盍簮喧櫪馬列炬散林鴉易勿疑朋盍簮此言除夕賔朋宴㑹騎從喧譁燭炬輝煌鴉鵲驚散東坡詩欲喚阿咸來守嵗林烏櫪馬間喧譁正用此也淮南子北塞上之人其馬亡入胡中人皆弔之其父曰此何詎知不為福居數月其馬將胡駿馬而歸人皆賀之其父曰此何詎知不為禍家富馬良其子好騎墮馬折髀人皆弔之其父曰此何詎知不為福居一年胡夷大出虜壯者皆控弦而戰塞上之人死者十九此子獨以跛故子父相保幽通賦比叟頗識其倚伏畫雞貼户望成渻子之雞梁宗懍荆楚嵗時記正月一日帖畫雞或斫鏤五木及土雞于户上注莊周云有卦雞于户百鬼畏之董勛問禮俗曰正月一日為雞正旦畫雞于門一日不殺雞亦其義也拾遺記堯在位七年祇及國獻重明鳥狀如雞或一歲數來或數嵗一來國人莫不灑掃門户以望其來或刻金寶為其狀置户牖間則鬼類自服云今人每嵗元日刻畫為雞于户上蓋其遺像也渻所景反莊子記渻子為周宣王養鬬雞十日而問雞可鬬已乎曰未也方虛憍而恃氣十日又問曰未也猶應景嚮十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者已無變矣望之似木雞矣其德全矣異雞無敢應者反走耳注此言養之以至于全者猶無敵於外况自全乎宜對新年庾信詩正朝辟惡酒新年長命杯益裒盛福某過勤尺牘陳遵傳與人尺牘主皆藏去以為榮更枉五詩負三宜休愴歸日之已晚新唐書司空圖傳名亭以休休作文以見志曰休美也既休而美具故量才一宜休揣分二宜休老而瞶三宜休又少也惰長也率老也迂三者非濟時用則又宜休因自目為耐辱居士况四多懼何善頌之敢當東方朔十洲記月支使者對漢武帝曰仰鑒天姿非有道之君也眼多視則貪色口多言則犯難身多動則淫賊心多飾則奢侈莊子多男子則多懼賀曾安撫從龍三統肇子運開豐㮊之辰漢律厯志太極運三辰五星於上而元氣轉三統五行于下又日合於天統月合於地統斗合於人統又三統者天施地化人事之紀也十一月乾之初九陽氣伏于地下始著為一萬物萌動鍾于太隂故黃鍾為天統六月坤之初六隂氣受任于太陽繼養化柔萬物生長㮊之于未令種剛彊大故林鍾為地統正月乾之九三萬物棣通族出于寅人奉而成之寅水也為仁其聲商也為義故太簇為人統又始于子在十一月位于丑在十二月位于寅在正月禮記檀弓疏周以建子之月為正者謂之天統商以建丑之月為正者為地統夏以建寅之月為正者為人統㮊莫候切說文木盛也從木矛聲律厯志豐㮊于茂萬物出寅律應棣通之㑹棣音替律厯志正月乾之九三萬物棣通族出於寅孟康曰棣謂通意也維時重德茂擁啿祺啿徒感切漢禮樂志羣生啿啿惟春之祺服䖍曰啿音湛湛露斯師古曰豐厚之貌也恭惟某官得天委和莊子吾身非吾有也是天地之委形也生非汝有是天地之委和也注若身是汝有者則美惡死生當制之由汝今氣聚而生汝不能禁也氣散而死汝不能止也明其委結而自成耳非汝有也委積也行地載厚易地勢坤君子以厚德載物又行地無疆望公如嵗便當畫對於延英左傳國人望君如望嵗焉日日以幾嵗年穀也六典大明宫宣政殿之左曰東上閣右曰西上閣次西曰延英門其內之左曰延英殿右曰含象殿玉海云初有大明則有是殿召對大臣則始于代宗召苖晉卿對小延英貞元七年詔每御延英諸司官長奏本司事則百官許對延英矣憲宗時元稹為拾遺乞于延英訪問舊記元和元年武元衡請尚書省六品已上職事官東宫官於延英候對文宗開成二年御延英對刑法官又諫議馮定請許左右史從宰相至延英記所言則羣臣亦得對矣大厯二年御延英見畿縣令文宗開成元年中書門下奏舊例刺史授官遇延英開日候對是外官亦得對延英也入朝而對者則郭子儀張建封張茂昭裴度李吉甫論政事者則李景略樊澤崔珙鄭覃張仲方韋奧别賢佞則陽城王仲舒崔元諒獨孤郁王質承恩奬則李晟馬燧蘇辨將又崔芊穆贄韋渠牟武元衡李景儉牛元翼薛存慶對宰臣則楊綰裴垍李吉甫李德裕韋處厚牛僧孺見御史則李直方宴羣臣則郭子儀不可盡録與物為春可但曉行乎湘水淮南精神訓使神滔蕩而不失其充日夜無傷而與物為春注與物為春言飬物也杜詩夜醉長沙酒曉行湘水春南人不復反矣漢晉春秋諸葛亮在南中所在戰捷聞孟獲者為夷漢所並服募生致之既得使覲於營陳之間問曰此軍何如獲對曰向者不知虛實故敗今䝉賜觀看營陳若秖如此即定易勝耳亮笑縱使更戰七縱七禽而亮猶遣獲獲止不去曰公天威也南人不復反矣東山以公歸兮詩我徂東山慆慆不歸又是以有衮衣兮無以我公歸兮某投老黃塵仇覽傳苦身投老王羲之傳投老可得僕射晉書載記慕容垂傳且吾投老叩囊底智足以尅之王荆公詩投老歸來一幅巾又投老唯公最故人又約公投老此山棲又投老難堪與君别又道人投老寄山林又世間投老斷攀緣又主恩投老更人間又疏封投老誤明恩又談經投老拚悠悠又投老翻為世網嬰又投老心情非復昔又投老重來記管絃又投老歸來供奉班又人間投老事紛紛又投老安能長忍垢又黃塵投老倦匆匆又投老始知歡可惜又投老逍遙屺與堂又投老逢時追往事又投老承明無補助又投老心旌一片降荆公好用此二字特表出之佐州黔鄙栁文黔巫東鄙蠻獠雜擾願開夀域使無不逹之勾萌淮南時則訓養幼小存孤獨以通勾萌注勾屈生者萌直生者長養幼小存恤孤獨所以慎陽氣也故草木不勾萌者以通達尚念荒莊俾預向陽之花木獨異志崔羣自中書舍人知舉歸其妻李氏因暇嘗勸樹莊田以為子孫之業羣笑曰豫有美莊良田遍在天下夫人何憂夫人曰不聞君有此業羣曰吾前嵗放春榜三十人豈非良田耶夫人曰若然者君非陸贄門生乎曰然夫人曰往年君掌文柄使人約其子簡札不令就試如君以為良田即陸氏一莊荒矣羣慚而退纍日不食詩話云范文正公知杭州蘇鱗為屬縣巡檢城中兵官往往皆獲薦書獨鱗在外邑未見收録因公事入府獻詩曰近水樓臺先得月向陽花木易為春文正薦之代回畢安撫再遇天運璇璣又届履端之始馬融云渾天儀可旋轉故曰璣衡其橫簫所以視星宿也以璿為璣以玉為衡貴天象也易略例聖人處璿璣以觀天運後律厯志聖人之作厯也觀璿璣之運三光之行臧榮緒晉書熊逺議曰履端元日正始之初有識之士于是觀禮荀朂正大㑹行禮歌於皇元首羣生資始履端大享敬御福祉虞世南獻嵗宴宫臣詩履端初啓節長苑命髙筵春生玉帳載迎善政之祥尚書德惟善政餘見賀制置安撫條恭惟某官豹略沉深文獻通考六韜六卷周吕望傳按漢藝文志無此書梁隋唐始著録分文武龍虎豹犬六目兵家權謀之書也黃石公三略三卷西山真氏曰三略先秦書雖未必鷹揚翁自作要必其遺法然則韜略皆太公作故合言豹略也虎符靜謐文帝紀初與郡守為銅虎符應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之謐覓畢切說文靜語也爾雅靜也廣韻安也麥苖緑漲挽回幾千萬户之和月令孟春之月天子食麥與羊季春之月天子乃為麥祈實鄭𤣥注曰於含秀祈其成也梁鴻歌麥含金兮方秀栁葉青歸喚起二十四橋之夢杜詩紅入桃花嫩青歸栁葉新山谷詩為公喚起黃州夢獨載扁舟向五湖方輿勝覽二十四橋隋置並以城門坊市為名後韓令坤築州城分布阡陌別立橋梁所謂二十四橋者或存或廢莫可考矣杜牧之寄韓判官詩雲山隱隱水迢迢春盡江南草未凋二十四橋明月夜玉人何處教吹簫歐陽永叔自揚州移汝西湖詩緑芰紅蓮畫舸浮使君那復憶揚州都將二十四橋月換作西湖十頃秋東坡自汝移揚州詩二十四橋亦何有換此十頃玻璃風三陽為泰見前百祿交升詩百祿是總泰升卦名某方欲具箋猥勤委翰椒盤啓節莫殫頌禱之私杜詩椒盤已頌花虞世南詩履端初啓節禮記君子謂之善頌善禱樺燭朝天願保功名之重樺胡化切說文木也本作樗以其皮裏松脂韻㑹此即金人書樺子以其皮卷之然以為燭裹松脂亦所以為燭也李肇國史補京師每正旦曉漏已前宰相三司使大金吾皆以樺燭百炬擁馬方布象城謂之火城白樂天早朝詩月堤槐露氣風燭樺煙香鄭谷詩樺飄紅燼趨朝路蘭縱清香宿省時東坡詩空庭樺燭煙又送客林間樺燭香賀黃制機慥天地泰交乘少陽而出震易天地交泰后以裁成天地之道輔相天地之宜京房占正月建寅律為太簇雞雉孶尾招搖生聚少陽解凍其氣溫柔逆之則寒繫辭帝出乎震齊乎㢲正義云王輔嗣曰帝者生物之主興益之宗出震而齊㢲者也是以此帝為天帝也雷霆振旅利長子之帥師繫辭鼓之以雷霆春秋大雨震雷穀梁傳震雷電霆也疏霆者霹靂之別名有霆必有電故傳云電霆也史記蘇秦傳戰如雷霆解如風雨杜詩雲旗受號令千里肅雷霆尚書禹乃班師振旅孔注振旅言整衆易長子帥師象曰長子帥師以中行也疏長子謂九二德長于人外健蓋內順之亨外健內順當作內健外順易泰小往大來吉亨象曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也後徑亦中權之助左傳軍行右轅左追蓐前茅慮無中權後徑此言楚分其軍為五部使之各專其職右部挾轅為戰備左部追求草蓐為宿僃前部以茅為旗幟以慮有無之事預告軍中而為之僃後部用精兵以為之殿而中軍則出權謀以制勝恭惟某官氣排冬凛韓詩喜氣排寒冬德嫓春融偕召伯以來旬瓚流秬鬯詩王命召虎來旬來宣釐爾圭瓚秬鬯一卣告于文人注召伯召康公也來勤也旬當作營宣遍也王命召虎汝勤勞於經營四方勤勞於遍疆理衆國釐賜也秬鬯黑黍酒也卣器也王賜召虎以鬯酒一尊使以祭其宗廟文人文德之人也共阿咸而守嵗盤頌椒花杜詩守嵗阿咸家椒盤已頌花詳見前人知江夏之無雙黃香傳博學經典究精道術能文章京師號曰天下無雙江夏黃童我羡西平之有子栁文蔡人率止惟西平有子西平有子惟我有臣某漕居氷下趙充國傳冰解漕下身在雪邉杜詩鷗鳥鏡裏來關山雪邊看言為成都漕聲聞於天請以勉在隂之鶴詩鶴鳴于九皋聲聞于天易鶴鳴在隂其子和之我有好爵吾與爾靡之稼豐於野庶或寬我輦之牛栁文歸牛休馬豐稼于野詩我任我輦我車我牛我行既集蓋云歸哉賀總領運使辛卯按辛卯為理宗紹定四年嵗在元辛承以長生之兔爾雅太嵗在辛曰重光抱朴子兔夀千嵗滿五百嵗則色白杜詩入河蟾不沒搗藥兔長生日維吉戊臨於正旦之雞詩吉日維戊董勛答問禮俗曰一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人八日為穀以隂晴占豐耗出北史魏收傳互見後載馳四牡之有功詩序四牡勞使臣之來也有功而見知則恱矣定促八鸞而入覲詩四牡奕奕孔修且張韓侯入覲以其介圭入覲于王又百車彭彭八鸞鏘鏘注有百兩之車彭彭然而行每車皆有八鸞之聲鏘鏘然而鳴也按此乃言韓侯迎妻蹶里車馬之盛此言入覲借用之耳恭惟某官陽休山立大德川流俱見前賀制置安撫條福星臨參井之墟民無遺便東坡詩斯人乃福星遣出虛危間自注司馬溫公謂軾曰子駿福星也東京人困甚且令往彼北齊天文志升平三年四月嵗星在虛危徘徊𤣥枵之野則齊星有福厚為受慶之符則福星即嵗星也天文志觜觹參益州東井輿鬼雍州地理志秦地於天官井鬼之分野魏地觜角參之分野昌黎韋丹墓志銘凡為民去害興利若嗜欲居三年於江西八州無遺便卿月代房心之次帝有恩言尚書卿士惟月杜詩卿月升金掌王春度玉墀天文志房心宋豫州地理志宋地房心之分野天文志房心天子宫也房為將相心為子屬王荆公表信使恩言有華原隰三陽茅拔以茹連易泰初九拔茅茹以其彚征吉茹音汝據反茅根也百祿竹苞而松茂詩如竹苞矣如松茂矣注苞本也某尚棲舊䕃又見新年兩鬢霜濃難望東風之解凍李詩麻姑垂兩鬢一半已成霜一犁雨足願從南畝以歸耕東坡詞歸去歸去江上一犂春雨王荆公詩望雲才喜雨一犂山谷詩南村北村雨一犂詩俶載南畝賀總領陽春肇始是生萬物之輝文選陽春布德澤萬物生光輝王人載馳亶序諸侯之上公羊傳王人者微者也曷序乎諸侯之上先王命也宜介穰穰之福穰如陽切爾雅穰穰福也注云言饒多詩降福穰穰衆也鄭箋云神與之福又衆大謂如嘏辭也是言得福饒多也以稱皇皇之華稱昌孕切宜也適物之宜也易㢲稱而隱詩皇皇者華毛傳猶煌煌也恭惟某官清徹氷壺文選清如玉壺冰髙適詩崖谷倚冰壺杜詩冰壺玉衡懸清秋又炯如一段清冰出萬壑置之迎風寒露之玉壺和鍾玉律李元標詩銅渾變秋節玉律動年灰令朝陽詩玉律傳佳節青陽應北辰白帖候氣之法為室三重户閉塗釁周布緹縵室中以木為案每律各如之內卑外髙從其方位加律其上以葭管灰實其端案律而候之氣至者灰去其為氣所動者其灰散其為物所動者其灰聚也殿中候用玉律十二靈臺用竹律晉書黃帝作厯以玉為管長尺六孔為十二月音至舜時西王母獻昭華之琯以玉為之及漢章帝時零陵文學奚景於泠道舜祠下得白玉琯又武帝太康元年汲郡盜發六國時魏襄王冢亦得玉律則古者以玉為管矣以玉者取其體含廉潤也錦衣諭蜀榮弩矢之前驅項籍傳富貴不歸故鄉如衣錦夜行司馬相如傳乃遣相如責唐䝉等因諭告巴蜀民以非上意又拜相如為中郎將馳四乘之傳因巴蜀吏幣物以賂西南夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵繡斧控荆慰樵蘇之後㸑武帝紀遣直指使者暴勝之等衣繡衣杖斧分部逐捕師古曰杖斧持斧也謂建持之以為威也孟浩然詩荆門控三巴韓信傳樵蘇後釁師不宿飽師古曰樵取薪也蘇取草也履端於始見前何福不臻詩俾爾單厚何福不除某濫守竹符文帝紀為竹使符應劭曰竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之圭璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之阻持椒斝斝音假說文玉爵也夏曰盞商曰斝周曰爵鬱酒之尊畫禾稼者詩洗爵奠斝韓文奠璧獻斝木牛坐運送寒寧假於土牛蜀志復出祁山以木牛運注木牛者方腹曲頭一腳四足頭入領中舌著于腹載多而行少宜可大用不可小使特行者數十里羣行者二十里也禮記季冬之月命有司出土牛以送寒氣正義曰出猶作也此時强隂既盛年嵗以終隂若不去凶邪恐來嵗更為人害其時月建丑又土能尅水故特作土牛以畢送寒氣也冷朝陽詩土牛呈嵗稔綵燕表年春櫪馬交喧召見即登於金馬杜詩盍簮喧櫪馬詳見前漢書注武帝時相馬者東門京鑄作銅馬法獻之立於魯班門外更名魯班門為金馬門漢公孫𢎞東方朔主父偃嚴安徐樂王褒賈捐之鄭朋馮商皆待詔金馬門揚雄解嘲歷金門又公孫創業於金馬文選金閨諸彥注金閨金馬門也賀王總領鉛陽春生萬物之輝維其時矣詩物其有矣維其時矣餘見上條王人序諸侯之上何以豫之詩采菽采菽筐之筥之君子來朝何錫豫之雖無豫之路車乘馬又何豫之𤣥衮及黼餘見上條宜對三陽茂綏百福詩樂只君子福履綏之恭惟某官清標氷峙和氣緹溫緹田黎切說文帛丹黃也候氣之法為室三重户閉塗釁周布緹縵詳見前給餽江流聊總木牛之運髙帝紀給餉餽不絶糧道吾不如蕭何揚鑣天路即符櫪馬之喧鑣悲嬌切音與猋同說文馬銜也釋名包也在旁包斂其口南史裴子野傳蕭琛言其評論可與過秦王命分路揚鑣隋文帝紀詔民間情僞誠欲備聞己詔使人所在振恤分路揚鑣將遍四海必令為朕耳目陳子昻詩還疑赤松子天路坐相邀某濫守竹符良䝉樾䕃樾王伐切字林樹隂也淮南子盥汗交流休樾䕃則脫然而喜又武王䕃暍人于樾下而天下歸之注樹如車蓋狀為樾言多䕃也太𤣥八十一首又觀頒朔之新揚雄傳以為經莫大于易故作太𤣥潭恩渾天參摹而四分之極于八十一桓談新論太𤣥經三篇以紀天地人之道立三體有上中下如禹貢之陳三品三三而九因以九之八十一故為八十一卦王涯說𤣥曰八十一首擬乎卦九贊之位數夫爻自天元甲子朔旦冬至推一畫一夜終而復始天元二十七首地元二十七首人元二十七首廣成千二百年請致修身之祝莊子廣成子謂黃帝曰天地有官隂陽有藏慎守汝身物將自壯我守其一以處其和故我修身千二百嵗矣吾形未嘗衰代何尚書賀林總領祖洽一統志林祖洽淳熙中知常州尊禮耆儒延見秀士激勸學校後河湮沒久浚治之民賴其利嵗統開端茂蕆始和之吉蕆丑展切音與闡同左傳以蕆陳事杜預注敕也又備也餘見前王人共命肇迎滋至之休共居容切通作恭尚書天休滋至惟時二人弗戡餘見前恭惟某官望重持荷宋王楙野客叢書云前輩謂尚書紫荷囊事晉志八座尚書荷紫以生紫為夾綴之外服加於肩上又梁史周舍問劉杳尚書著紫荷槖竟何所出杳曰張安世傳持槖囊也荷乃負荷之荷人讀為平聲遂有此誤雖歐陽文忠公宋景文公有所不免僕謂不然紫荷囊事其說已久非歐宋之誤也觀唐類表有云佩蒼玉負紫荷歐宋之語豈無自耶僕因考之沈約宋志蕭子顯齊志皆謂紫夾囊俗呼曰紫荷或曰負荷以行隋志曰朝服綴紫荷録令左僕射左荷右僕射尚書右荷則是紫荷之說自晉宋以來有之劉杳謂持槖簮筆出張安世傳不知出於趙充國傳漫録謂左荷右荷出隋樂志不知出於禮志稗史范元卿上太守月詞中有云有人吟諷紫荷香滿晴陌韻語陽秋云按晉輿服志八座尚書則荷紫以生紫為夾囊服之在左肩所謂荷紫者非芰荷之荷乃負荷之荷也人徒見南史著紫荷囊四字遂作一句讀之不知晉書紫荷之義余讀宋史宣和間任子太濫諫官李㑹疏論有尚嬉竹馬已獲荷囊之語以竹馬對荷囊則荷囊相承之誤久矣按此啓以挽粟對持荷不用負荷之說功髙挽粟挽音晚說文引之也漢書秦欲攻胸奴使天下飛芻挽粟起于黃陲琅琊至負海之郡三陽謹始時已進於泰交見前一札遄歸寵益新於渙渥後漢書一札十行遄淳沿切爾雅疾也詩式遄其歸杜詩新渥照乾坤某又看新厯真是陳人道阻且長缺致椒觴之慶並見前儀圖莫助載馳竿牘之恭詩我儀圖之維仲山甫舉之愛莫助之莊子小夫之知不離苞苴竿牘注苞苴以遺竿牘以問遺問之具小知所殉賀安總領癸仲癸仲丙之子國典待來嵗之宜元正啓祚禮記季冬之月天子乃與公卿大夫共飭國典論時令以待來嵗之宜注飭國典者和六典之法也周禮以正月為之建寅而縣之今用此月則所因於夏殷也尚書正月元日王羲之月儀書日往月來元正首祚何充賀正表璇衡運周元正肇祚馮衍銘元正上日百福孔靈王肅賀正儀元正首祚璇璣改度傅充妻辛氏元正詩元正啓令節嘉慶肇自兹王人序諸侯之上夀考維祺詩夀考維祺以介景福注介助也祺吉也養老人而得吉所以助大福也疏由其尊耉老之人故得夀考維有吉慶以受大人之福餘見前况峙魯侯之糗糧糗去久切說文熬米麥也徐曰煼乾米麥也禮記糗餌注搗熬穀以為糗餌與餈同糧說文穀也周禮注行道曰糧謂糒也尚書峙乃糗糧無敢不逮均啖安期之瓜棗史記封禪書李少君言上曰臣嘗游海上見安期生安期生食臣棗大如瓜安期生仙者通蓬萊中合則見人不合則隱於是天子始遣方士入海求蓬萊安期生之屬東坡安期生詩序安期生世知其為仙者也然太史公曰蒯通善齊人安期生生嘗以䇿干項羽羽不能用羽欲封此兩人兩人終不爾受亡去豫每讀此未嘗不廢書而歎嗟乎仙者非斯人誰為之詩曰安期本策士平日交蒯通嘗干重瞳子不見隆凖公應如魯仲連扺掌吐長虹難堪踞牀洗寧挹扛鼎雄事既兩大謬飄然籋遺風乃知經世士出世或乘龍豈比山澤臞忍饑啖柏松縱使偶不死正堪為僕僮茂陵秋風客望祖猶蟻蜂海上如瓜棗可聞不可逢恭惟某官氣排冬凛德配春融寒送土牛坐斡木牛之運詳見賀總領條飽喧櫪馬行觀銅馬之降光武紀別號諸賊銅馬大肜髙湖重連鐵脛大搶尤來上江青犢五校檀卿五幡五樓富平獲索等光武擊銅馬於鄡復與大戰于蒲陽悉降之注銅馬賊帥東山荒秀上淮况等降胡江切說文服也本作降梅放柳舒杜詩岸容待臘將舒栁山意衝寒欲放梅竹苞松茂詩如竹苞矣如松茂矣總領甚稱上意式副師征魏相傳總領衆職甚稱上意此借用易利用行師征邑國朋亡得尚中行共扶泰道易泰九二包荒用馮河不遐遺朋亡得尚于中行王弼注無私無偏存乎光大故曰朋亡尚猶配也中行謂五某尚䝉戍雪杜詩西山白雪三城戍南浦清江萬里橋未解漕氷趙充國傳冰解漕下䝉解卦名糴穀湟中所願丘山之暴暴湟胡光切說文湟水中金城臨羌縣塞外至允吾東八河趙充國傳吾謂耿中丞糴二百萬斛穀羌人不敢動矣耿中丞請糴百萬斛乃得四十萬斛耳又大兵一出還不可復留湟中亦未可空師古曰湟水之北是漢地荀子上得天時下得地利中得人和則財貨渾渾如泉源汸汸如河海曓曓如邱山注曓曓卒起之貌言物委積如邱山也轉粟天上更宜原隰之皇皇杜詩築城依白帝轉粟上青天詩皇皇者華于彼原隰代回淮西趙總領不儳轉鴻鈞之一氣正月始和杜詩一氣轉鴻鈞周禮正月之吉始和布教于邦國都鄙疏正月之吉謂建子之月一日也于此正月之時調和教典訖即布于邦國都鄙此借用序王人于諸侯百祿是總見前恭惟某官德儀震動魏相傳東方之神太皞乘震執規司春尸子春為忠東方為春春動也禮記東方者春春之言蠢也産萬物者也注蠢動也尚書大傳東方者動方也物之動也何以謂之春春出也物之出故謂東方春也道協泰交見前峙乃糗糧坐給和門之衆周禮以旌為左右和之門注軍門曰和今謂之壘門疏左傳曰師克在和不在衆田獵象戰伐故其門曰和門也唐書禮志仲冬之月講武于都外建旗為和門互見前分之寶玉行疏中詔之溫尚書分寶玉於伯叔之國時庸展親羊祜傳降發中之詔加非次之榮駱馬遄歸駱歷各切說文馬白色黑鬛尾也爾雅白馬黑鬛陸佃云今呼黃馬尾鬛一道通黑如界者為駱蓋馬脊分黃白皆謂之駱若今衣脊絡縫故曰駱詩嘽嘽駱馬又駕彼四駱載驟駸駸豈不懷歸是用作歌將母來諗蟄蟲始振禮記孟春之月蟄蟲始振注振動也夏小正正月啓蟄蓋九月之末蟄蟲咸俯則至冬而皆藏矣春至而蘇始振動而將出未出也某已投西崦崦衣檢切崦嵫山名山海經鳥鼠同穴西南曰崦嵫下有虞泉日所出入通作弇爾雅觚竹北戶西王母日下謂之四荒穆天子傳天子賓于西王母及紀其迹于弇山名曰西王母之山是也淮南子日入崦嵫經於細栁入虞淵之池曙于䝉谷之浦又見東風學舊桃符漸恐門墻之逺山海經東海度朔山有大桃樹蟠屈三千里其卑枝向東北曰鬼門萬鬼出入也有二神一曰神荼一曰鬱壘主閲領衆鬼之出入者執以飼虎於是黃帝法而象之因立桃板於門户上畫神荼鬱壘以禦凶鬼此則桃板之制也蓋其起自黃帝故今世畫神像於板上猶於其下書左神荼右鬱壘以元日置之門户也風俗通黃帝上古之時有神荼鬱壘兄弟二人性能執鬼於度朔山桃樹下簡閲百鬼之無道者縛以葦索執以飼虎張平子東都賦云守以鬱壘神荼副焉戰國策蘇秦說孟嘗君曰土偶人語桃梗曰今子東國之桃木削子為人假以丹彩用子以當門户之厲初學記造桃板著戶謂之仙木玉燭寶典像鬱山桃樹百鬼畏之也王荆公詩爆竹聲中一嵗除春風送暖入屠蘇千門萬戶曈曈日總把新桃換舊符東坡除夕詩老去怕看新厯日退歸擬學舊桃符築新沙路莫觀衮繡之來國史補凡拜相禮絶班行府縣載沙填路自私第至于城東街名沙堤李德裕傳德裕初作相罷京兆築沙堤兩街上朝兵衛本事詩楊收王鐸皆薛逢同年也收作相逢行詩曰須知金印朝天客同是沙堤避路人收大銜之白氏諷諫官牛諷執政也官牛官牛駕官車滻水岸邉搬載沙一石沙幾斤重朝載暮載將何用載向五門官道西緑槐隂下鋪沙堤昨來新拜右丞相恐怕泥塗汚馬蹄右丞相馬蹄踏沙雖淨潔牛領牽車欲流血右丞相但能濟人治國調隂陽官牛領穿亦無妨代回鞏都大嶸杓攜龍角星駕賢勞說文杓斗柄也徐曰北斗之柄第一星取此為名杓猶標也天文志一至四為魁五至七為杓又玉衡屬杓杓攜龍角注用昏建者杓杓自華以西南又杓斗之尾尾為隂又其用昏昏隂位在西方故主西南隋天文志魁杓號令之主又為帝車取乎運動之義也唐天文志一行曰斗杓謂之外庚陽精之所布天官書攝者直斗杓所指以建時節律厯志玉衡杓建天之綱如淳曰杓斗端星也詩星言夙駕氣轉鴻鈞天休滋至見前恭惟某官司存圜法食貨志凡貨金錢布泉之用夏殷以前其詳靡記太公為周立九府圜法注圜即錢也宋庠云古圓字本作圜或作圓綦母氏錢神論體圎應乾孔方效地魯褎錢神論故使內方象地外圜象天贍足方今李固傳方今之事復同于前任昉啓陛下𢎞宣教義非求效于方今也壞冶一陶財不期而豐美壞鋪枚切音與披同瓦未燒也崔駰逹㫖壞冶一陶注土器未燒郭璞爾雅注鎔物之始隂陽為炭道已長于泰交賈誼傳天地為爐造化為工隂陽為炭萬物為銅師古曰以冶鑄為喻餘見前豐泰卦名撫于五辰尚書撫于五辰庶績其凝斂是百福尚書皇建其有極斂時五福某空糜囊俸東方朔傳朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺餘亦奉一囊粟錢二百四十猶綴槖班東坡詩他日許綴蓬萊班又豈意彤庭綴兩班誤出山林聚鐵已難于鑄錯語林哀帝時魏博羅紹威以牙兵之逼召朱全忠全忠殪八千餘家其餘攻討悉平全忠留魏半年紹威供億所殺牛羊豕近七十萬資糧稱是所賂遺又近百萬比全忠之去蓄積為之一空紹威雖除其逼而魏兵自是衰弱紹威悔之謂人曰合六州四十三縣鐡不能為此錯也東坡詩不知幾州鐵鑄此一大錯頌成椒柏磨鉛聊具於報章風俗記正旦楚人上松柏頌荆楚嵗時記正月一日進椒柏酒四民月令元日進椒柏酒椒是玉衡星精服之令人身輕能老柏是仙藥成公綏椒花銘曰肇惟嵗首月正元日厥味惟珍蠲除百疾晉劉臻妻元日獻椒花頌曰美哉靈花爰採爰獻聖容映之永夀千萬庾信詩柏酒隨銘至唐元日恩賜柏樹應制趙彥超詩器乏雕梁器材非搆厦材但將千載葉常奉萬年杯李乂詩徑節凌冬徑芳心待嵗芳偏令人益夀非止麝含香武平一詩緑葉迎春緑寒枝歷嵗寒願持柏葉夀長奉萬年歡鉛全傳切說文青金也錫之類古用以書西京雜記楊子雲好事常懷鉛提槧從諸討吏訪殊方絶域四方之語以為禆補詩雖則七襄不成報章代回周馬帥虎正月始和光轉崇蘭之畹宋玉招魂光風轉蕙泛崇蘭些光風謂雨止日出而草木之光因風而轉也崇蘭髙蘭也泛搖動貌屈原離騷經余既滋蘭之九畹兮又樹蕙之百畝畹委逺切說文田二十畝也韻㑹田三十畝曰畹楚辭王逸注田十二畝元戎小隊暖生細柳之營杜詩元戎小隊出郊坰問桞隨花到野亭周亞夫傳以河內守亞夫為將軍軍細栁恭惟某官克壯其猷詩方叔元老克壯其猷注能光大其軍謀之道共武之服詩有嚴有翼共武之服鄭注共如字言師之羣帥有威嚴者有恭敬者共典是兵事文武皆備東風解凍知挾纊於雲屯左傳楚子伐蕭申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊纊苦謗切說文絮也廣韻細綿也小爾雅絮之細者禮記纊為繭注云謂今之新綿也張華詩挾纊如懷冰列子望若雲屯杜詩王有虎臣司苑門入門天廏皆雲屯李詩西秦百萬衆戈甲猶雲屯又劍閣重鬬蜀北門上皇歸馬若雲屯北斗回杓即出綸於天陛說文杓斗柄也徐曰北斗之柄第一星取此為名猶標也晉天文志魁四星為璇璣杓三星為玉衡某濫持荷槖莫捧椒觴見前玉漏聲長行或聨於朝著張衡漏水轉渾天儀制曰以銅為器再疊差置實以清水下各開孔以玉虬吐漏水入兩壺右為夜左為畫北堂書鈔銅渾設象玉漏授時唐岑義詩銜歡不覺銀河曙更盡那知玉漏稀金印斗大願益㮊於勳名周顗傳今年殺諸賊奴取金印如斗大繫肘賀李提刑鐋鐋他浪切音儻重光單閼載新一嵗之元爾雅太嵗在辛曰重光在卯曰單閼玉燭寶典正月一日為元日亦云三元嵗之元時之元月之元五善六條誕布九重之意左傳穆叔曰臣聞之訪問于善為咨咨親為詢咨禮為度咨事為􅓪咨難為謀臣獲五善敢不重拜漢武帝元封五年初置部刺史掌奉詔條察州治一條强宗豪右田宅踰制以强凌弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁詔守利侵漁百姓聚斂為奸三條二千石不恤疑獄風厲殺人怒則任刑喜則淫賞煩擾刻暴剝截黎元為百姓所疾山崩石裂訞詳訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟恃怙榮勢請託所監六條二千石違公下比阿附豪强通行賄賂割損正令也後周蘇綽六條定心志敦教化盡地利擢賢良恤獄訟均賦役唐貞觀中以六條黜陟天下沈隱侯集振采六條觀風萬里離騷君之門九重天問圜則九重孰營度之與時偕極易亢龍有悔與時偕極注與時運俱終極何福不臻恭惟某官德配春融氣排冬凛遍儀兵衛之畫㦸韋蘇州詩兵衛森畫㦸宴寢凝清香出當霄漢之繡衣杜詩繡衣春當霄漢立綵服日向庭闈趨皇皇者華遣使臣喚起曲肱之夢詩皇皇者華君之遣使臣也山谷詩為公喚起黃州夢行行且止避御史遹觀直指之威桓典傳拜侍御史是時宦官秉權典執政無所回避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史武帝紀遣直指使者暴勝之等衣繡衣杖斧分部逐捕仁風梅放以柳舒晉書袁宏傳宏自吏部郎出為東陽太守謝安欲以率迫試之臨別取一扇授之曰聊以贈行宏應聲答曰輒當奉揚仁風慰彼黎庶文選仁風扇越惠露霑吳張說詩扇逐仁風轉髙湘詩千里仁風一扇清駱賔王啓仁風飄十地之雄惠露灑二天之渥餘見前和氣竹苞而松茂劉向傳和氣致祥乖氣致異餘見前某自憐苦李王戎傳嘗與羣兒戲於道側見李樹多實等輩競趨之戎獨不往或問其故曰樹在道邉而多子必苦李也取之信然東坡詩顧我如苦李全生依路傍獲掃甘棠我有二天正託故人之庇蘇章傳順帝時遷冀州刺史故人為清河太守章行部按其姦贓乃請太守為設酒肴陳平生之好太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪州境知章無私望風畏服士更三日尚希舊儒之思江表傅初孫權謂吕䝉及蔣欽曰卿今並當塗掌事宜學問以自開益䝉曰在軍中常苦多務恐不容復讀書權曰孤豈欲卿治經為博士耶但令涉獵見往事耳䝉始就學篤志不倦其所覽見舊儒不勝後魯肅過䝉言論常欲受屈肅撫䝉背曰吾謂大弟但有武略耳至于今者學識英博非復吳下阿䝉䝉曰士別三日即更刮目相待大兄今論何一稱穰侯乎代董侍郎賀周提刑青帝執規驗三陽之引逹尚書緯春為青帝漢書東方之神太皞乘震執圜司規律厯志春蠢也物蠢生乃動運木曲直仁者生生者圜故為規也律厯志引達於寅繡衣持斧新六轡之光華見前諒對端辰玉燭寶典正月為端月其一日為元日益裒純嘏裒蒲侯切爾雅聚也多也疏云聚之多也嘏舉下切說文大逺也又果五切詩天錫公純嘏又俾緝熙于純嘏逺大之福恭惟某官氣鍾溫厚禮記天地溫厚之氣始于東北而盛于東南此天地之盛德氣也此天地之仁氣也德尚和同老子和其光同其塵注言雖有獨見之明當如暗昧不當以曜亂人也當與衆庶同垢塵不當自殊別苞栩逶遲又逢梅於嶺驛詩四牡騑騑周道逶遲豈不懷歸王事靡盬我心傷悲又翩翩者隼載飛載下集于苞栩王事靡盬不遑將父荆州記陸凱與范曄相善自江南寄梅一枝詣長安與曄并贈詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春甘棠蔽芾還鞠草於圜扉見前佇有召除亟登要近某罔功分閫謝安傳贊任總中臺效彰分閫白帖衛霍寄重旌分閫外之憂杜詩分閫救世用賢豪有幸為僚對天地交泰之時當馳善頌易天地交泰后以裁成天地之道輔相天地之宜以左右民又先王以茂對時育萬物疏對當也言先王以此無妄盛事當其無妄之時育養萬物也體官師相規之義正賴協恭尚書每嵗孟春遒人以木鐸狥于道路官師相規工執藝事以諫賀提刑六螭回轄日又出于嵎夷淮南子爰止羲和爰息六螭是謂懸車注日乘車駕六螭以羲和御之日至此而薄於虞泉羲和至此而回六螭轄音黯說文車聲也一曰車鍵也尚書分命羲仲宅嵎夷曰暘谷寅賔出日四牡載馳春遍行于湘水杜詩夜醉長沙酒曉行湘水春端陽既逹純嘏其裒見前恭惟某官禀氣中和與時消息月令注陽生為息隂死為消莊子消息盈虛一晦一明皇華原隰之上暫借平反反孚袁切漢書録囚平反之謂舉治罪人也增韻理正幽枉也雋不疑傳不疑有所平反活幾何人如淳曰反音幡幡奏使從輕也史記平凖書杜周治之獄少平反者通作幡漢書張歐傳上具獄事可卻卻之注退令更平幡之清切雨露之邉即司獻納杜詩獻納司存雨露邊地分清切任才賢某濫陪結綬說文綬韍維也應劭漢書儀曰綬長一丈二尺法十二月廣三寸法天地人此佩印之組也古者佩玉有韍五代戰兵解去紱佩留其係璲徐廣曰今名璲為繸秦以系組連結于璲轉相結受故謂之綬史記蔡澤傳懷黃金之印結紫綬於要蕭育傳少與陳咸朱博為友著聞當世往者有王陽貢禹故長安語曰蕭朱結綬王貢彈冠言其相薦達也莫獲稱觴霆聲發榮共掔洲之宿莽說文霆雷餘聲也鈴鈴所以挺出萬物徐曰隂陽相薄而為雷激而為霆霹靂也爾雅疾雷謂之霆詩如雷如霆尚書洪範五行傳正月雷微動而雉雊初學記易曰雷出地奮豫雷者所以開發萌芽辟除災害萬物須雷而解故曰雷以動之莽叶滿補切宿草也屈原離騷經朝搴阰之木蘭兮夕攬洲之宿莽注冬生不死者爾雅釋草云卷􅀢草拔心不死注云宿草也掔亦作牽挽也星言夙駕願總轡於扶桑詩星言夙駕說于桑田注星雨止見星夙早也屈原離騷經飲余馬於咸池兮總余轡乎扶桑淮南子日出於暘谷浴於咸池拂於扶桑是謂晨明登于扶桑之上爰始將行是謂朏明王充論衡儒者論日旦出扶桑暮入細栁扶桑東方之地細栁西方之地賀游提刑似宋史游似字景仁嘉定十四年進士歷官大理司直大理寺丞大常亟權兵部郎官祕書丞權考功郎中直祕閣䕫路轉運判官潼川提㸃刑獄兼提舉常平軍器監宗正少卿權樞密都丞㫖兼侍讀權禮部侍郎兼同修國史實録院同修撰權禮部尚書遷吏部尚書入侍經幄嘉熙三年拜端明殿學士同簽書樞密院事封南充縣伯八月拜參知政事四年知樞密院事淳祐四年進爵郡公五年拜右丞相兼樞密使七年進爵國公十一年轉兩官致仕薨特贈少師諡清獻楊用修藝林伐山云游景仁廣安人南渡四賢相之一也有黃鶴樓詩云長江巨浪拍天浮城郭相望萬景收漢水北吞雲夢入蜀江西帶洞庭流角聲交送千家月帆影中分兩岸秋黃鶴樓髙人不見却隨鸚鵡過汀洲九十春光稱霄漢繡衣之立杜牧詩九十春光在何處古人今人留不住東坡詩餘九十日春都過了梅聖俞詩九十日春猶幾日王維詩才見春光生綺陌又尋逐春光著處迷杜詩繡衣春當霄漢立三千夏辟補日月黃道之明書序吕命穆王訓夏贖刑孔傳以穆王命作書訓暢夏禹贖刑之法尚書五刑之屬三千晉書刑法志夏后氏之王天下也則五刑之屬三千辟必益切說文法也從卩從辛節制其罪也從口用法者也漢刑法志夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之作皆叔世也補疑當作輔漢天文志日有中道月有九行中道者黃道一曰光道黑道二出黃道北赤道二出黃道南白道二出黃道西青道二出黃道東中興天文志曰黃道九道厥初本無是因日行而强名之日行曰黃道者黃色之中也黃道即中道也日道居中月五星循左右而行故日道獨謂之黃月行青朱白黑道各兼黃道而言故又謂之九道也蓋日月之行有遲有速難以一術御故因其合散分為數段每段以一色名之欲以別算位而已厯家不知其意遂以為實有九道甚可嗤也杜詩九天閶闔開黃道山谷詩賔日行黃道又日月黃道明時哉泰內之亨尚書時哉不可失易泰小往大來吉亨象曰內陽而外隂內健而外順內君子而外小人天只咸中之慶只音紙說文語已詞也從口象氣于引之形郭忠恕佩觽云只字音止本無質音今讀若質俗所音也詩母也天只餘見本卷代回大理趙少卿條恭惟某官臯陶明允尚書帝曰皋陶汝作士五刑有服五服三就五流有宅五宅三居惟明克允世叔討論世叔遊吉也即子大叔發白獸之樽尚存諌紙臧榮緒晉書元㑹設白獸樽於殿上樽蓋上施白獸若有能獻直言者則發此樽飲酒按禮曰白獸樽乃杜舉之遺式為獸監後世所為示不忌憚也白氏長慶集僕為諫官月請諫紙樂天詩月慚諫紙二百張元稹詩榮班聫錦繡諫紙賜箋藤拜碧雞之使暫擁節旄王褎傳方士言益州有金馬碧雞之寶可祭祀致也宣帝使褎往祀焉杜詩何如碧雞使把詔紫微天旄說文幢也蘇武傳卧起操持節旄盡落對六龍回日之標太白蜀道難上有六龍回日之髙標下有衝波逆折之回川奏四牡觀風之最王莽傳遣使者分行天下覽觀風俗修鱗赴壑已知夕避於長蛇注見本卷賀黃制置條召驛追鋒即作朝來之走馬晉書輿服志追鋒車去小平蓋加通幰如軺車駕二追鋒之名蓋取其迅速也施於戎乘之間是為傳乘魏志司馬望給追鋒車一乘杜預傳給追鋒車第二駙馬盧欽傳給追鋒軺車詩來朝走馬某一寒戍雪范睢傳范叔一寒如此哉杜詩西山白雪三城戍獨冷漕氷杜詩廣文先生官獨冷趙充國傳冰解漕下旁有一株儻庇無言之苦李韓詩平旦入西園梨花數株若矜夸旁有一株李顔色慘慘自含嗟談叢王泠然上裴耀卿書拾遺補闕寧有種乎僕不佞亦相公一株之桃李也李廣傳贊桃李不言下自成蹊罔兼庶獄惟依所茇之甘棠尚書文王罔攸兼於庶獄庶慎茇蒲撥切說文舍也增韻草舍也詩蔽芾甘棠勿翦勿伐召伯所茇箋云召伯聽男女之訟不重煩勞百姓止舍于甘棠之下而聽斷焉代回浙東譙提刑令憲青帝執規届始和之吉繡衣持斧裒滋至之休俱見前恭惟某官澄按日畿白虎通京師者何謂也千里之邑號也法日月之徑千里類說拾遺帝畿千里象日月徑圍故曰日畿振揚風采采比宰切通作彩說文文章也韻㑹文色也增韻精光也漢書想聞風采又風采不及丙魏于定國刑者警也以待猾夏之姦禮記刑者侀也侀者成也一成而不可變故君子盡心焉注上刑是刑罰之刑下侀是侀體之侀言刑罰之刑如人侀體侀體是人之成就容貌容貌一成之後若以刀鋸鑿之斷者不可續死者不可生故云不可變尚書蠻夷猾夏寇賊姦宄欲並生哉乃見先春之意尚書書用識哉欲並生哉法言或曰為政先殺後教曰嗚呼天先秋而後春乎將先春而後秋乎莊子尊卑先後天地之行也聖人取象焉春夏先秋冬後四時之序也風俗通義易稱天先春而後秋地先生而後凋日月先光而後幽是王者則之亦先教而後刑三皇結繩五帝畫像三王肉刑五霸黥刖此言步驟稍有優劣也君使如此福履綏之詩樂只君子福履綏之某濫司白雲杜氏通典黃帝雲師雲名注黃帝受命有雲瑞故以雲紀事春官為青雲夏官為縉雲秋官為白雲冬官為黑雲中官為黃雲也黃帝有景雲之應因以名師與官也裴復除制俾踐白雲之司猶趨紫禁謝莊文搖彩瑶光收華紫禁駱賔王詩紫禁終難呌朱門不易排杜詩青春復隨冠冕入紫禁正耐煙花繞履端于始未諧杜老之盍簪少陵杜位宅守嵗詩盍簪喧櫪馬詳見前式遄其歸敢後臯陶之拜手詩仲山甫徂齊式遄其歸注遄疾也仲山有德周人愛之欲其用此壯健車馬疾其在路而早歸也尚書皋陶拜手稽首揚言曰念哉代回江東葉提刑簣青帝執規兆三陽之泰繡衣持斧賔百祿之升俱詳前恭惟某官德體冲和沖持中切和也列子輕清者上為天濁重者下為地沖和氣者為人文選茂德淵沖氣鍾溫厚禮記天地溫厚之氣始于東北而盛於東南此天地之盛德氣也此天地之仁氣也勾萌畢出想茂鞠於圜扉禮記生氣方盛陽氣發泄勾者畢出萌者盡達文選鞠茂草于圜扉詳見前楊柳方華應勞旋於牡轡夏小正曰正月栁稊梅杏抱桃則華稊者發莩也伍緝之春芳詩桃栁發葇榮丹緑粲郊邑詩序四牡勞使臣之來也一和所囿多祉是宜詩既多受祉某濫綴朝行行寒剛切列也韓詩持狀為博士始獲升朝行阻陪賀列雲鴻江鯉輒傾削牘之恭李詩寄書訪衡嶠但與南飛鴻岑參詩水底鯉魚幸無數願君别後垂尺素周𢎞讓復王裒書蒼鴈頳鯉時傳尺素清風明月俱寄相思櫪馬林鴉尤切盍簪之願少陵守嵗詩盍簮喧櫪馬列炬散林鴉詳見前代衛參政賀林提舉行知六螭御日厯正羲嵎淮南子爰止羲和爰息六螭廣雅日御曰羲和尚書分命羲仲宅嵎夷曰暘谷互見前四牡觀風春回楚澤司馬相如傳楚有七澤韓詩迎我出秦關送我入楚澤其在皇皇之轡宜膺啿啿之祺禮樂志羣生啿啿惟春之祺詳見前恭惟某官政得陽和氣排冬凛見前周爰咨度使星已驗於回天度入聲詩載馳載驅周爰咨度李郃傳有二使星向益州分野詳見前禮記日窮於次月窮於紀星回于天數將幾終正義曰星回于天者謂二十八宿隨天而行每日雖周天一匝早晚不同至于此月復其故處與去年季冬早晚相似故曰星回于天胡不均𢎞卿月無勞於閲嵗韓文嶺海之陬既足既濡胡不均𢎞俾執事樞尚書卿士惟月杜詩卿月升金掌閲欲雪切漢書注經歷也與時偕極何福不臻俱見前某濫守竹符阻持椒斝籥周一甲極知愧見于葦桃籥弋約切樂之竹管三孔以和衆聲也釋名籥躍也氣躍而出古者取邜地之竹以為籥春分之音萬物振躍而出也東坡集屢更嵗籥嵗華紀麗傳云嵗在星紀而淫于𤣥枵注云謂天有十二辰嵗星一年一周行運也餘見前盤借五辛尚託味同之草木周處風土記元日造五辛盤月正元日五薰錬形注云五辛所以發五臟之氣莊子所謂春月飲酒茹葱以通五臟也爾雅翼云西方以大蒜小蒜興渠慈葱茖葱為五葷道家以韭蒜藝薹胡荽薤為五葷左傳今譬草木寡人在君君之臭味也又譬諸草木吾臭味也而何敢差池賀趙提舉汝談乙酉宋史趙汝談字履常生而頴悟登淳熙十一年進士第丞相周必大得其文異之曰是子他日有大名于世嘗從朱熹訂疑義十數條熹嗟異之佐丞相趙汝愚定大策汝愚驟欲以詞掖處之力辭去汝愚去國其弟汝讜疏留汝愚請斬韓托胄聞者吐舌兄弟罹黨禍斥去以李壁薦召試館職擢正字時吳曦叛或請以曦為王者汝談曰是可斬也其人面赤不能對通判嘉興府時金人內變令獻料敵備邉二策其言悉驗若蓍龜歷湖北江西提舉常平授江西轉運判官辭不獲命之官一月以言者罷先是汝談因疾去官言者謂其傲睨軒冕不樂為世用至是史彌逺不與祠乃杜門著述端平初以禮部郎官召入對改祕書少監權直學士院時集議出師汝談反復言不可輕戰而和尤非計既而三京收復雖前言用兵不便者亦喜汝談獨有憂色未幾洛師敗朝論始服其先見遷宗正少卿兼編修國史檢討實録兼崇政殿說書權吏部侍郎升侍讀兼直學士院兼同修國史院同修撰歷官刑部尚書汝談天資絶人沈思髙識自少至老無一日去書册所著有易詩書論語孟子周禮禮記荀子莊子通鑑杜詩注按乙酉為宋理宗寶慶元年梅亭時年五十二春王三朝元加於嵗春秋隱公元年春王正月公羊傳元年者何君之始年也春者何嵗之始也王者孰謂謂文王也曷為先言王而後言正月王正月也何言乎王正月大一統也孔光傳嵗之朝曰三朝師古曰嵗之朝月之朝日之朝故曰三朝董仲舒傳一者物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也是年乾道改元使臣五善帝降之祥尚書作善降之百祥餘見前諒當道長之辰易泰君子道長小人道消也即副公歸之望詩是以有衮衣兮無以我公歸兮無使我心悲兮恭惟某官小宗繼别禮記别子為祖繼别為宗繼禰者為小宗疏别子為祖者謂諸侯適子之弟別於正適故稱别子也為祖者別與後世為始祖謂此别子子孫為大夫立此別子為世祖也繼别為宗者謂別子之世世長子相繼別子與族人為百世不遷之大宗繼禰為小宗者禰謂別子之庶子以庶子所生長子繼此庶子與兄弟為小宗謂之小宗者以其五世則遷比大宗為小故云小宗也大雅不羣景十三王傳贊夫唯大雅卓爾不羣河間獻王近之矣氣貫斗牛久鬱長庚之焰張華傳吳之未滅也斗牛之間常有紫氣吳平之後紫氣愈明詳見前李陽冰草堂集序驚姜之夕長庚入夢故生而名白以太白字之世稱太白之精得之矣韓詩李杜文章在光焰萬丈長星回奎壁即吹大乙之燈孝經援神契奎星屈曲相鈎似文章之畫晉天文志東壁二星主文章天下圖書之祕府也李泌傳東壁圖書之府王子年拾遺記劉向校書天祿閣夜有老人植青藜杖扣閣而進見向暗中讀書乃吹杖端爛然大明因以照向向問姓名云我是太乙之精乃授懷中天文地理之書詳見前行將繫麟趾之風詩序風風也教也關雎麟趾之化王者之風故繫之周公詎止詠兔園之雪見本卷首條某密依樾䕃又見桃符見前櫪馬盍簪固已甘立仗之斥新唐書姦臣傳補闕杜璡再上書言政事斥為下邽令李林甫因以語動其餘曰明主在上羣臣將順不暇亦何所論君等獨不見立仗馬乎終日無聲而飫三品芻豆一鳴則黜之矣後雖欲不鳴得乎畫雞貼户詎更思失旦之鳴淮南子雞知將旦鵠知夜半白帖雞鳴戒旦則飄爾長征又早晨失旦吳志周瑜傳使失旦之雞復得一鳴抱罪之臣展其後效魏武選令諺曰失晨之雞思補更鳴代回福建陳提刑鑄嵗咢於午肇頒玉厯之新咢逆各切說文譁訟也爾雅徒擊鼓謂之咢詩或歌或咢孫炎云聲驚愕也律厯志咢布于午搜神記舜耕于厯山得玉厯於河際之巖知天命在已體道不倦晉書律厯志黃帝作律以玉為管至舜時西王母獻昭華之管以玉為之及漢章帝時零陵文學奚景于泠道舜祠下得白玉琯武帝太康元年汲郡盜發魏襄王冢亦得玉律則古者以玉為管矣以玉者取其體含亷潤也張叔良詩乘時玉厯長獨孤鉉詩玉厯頒窮律白樂天詩玉厯布春分元稹詩象魏才頒厯又青陽振蟄初頒厯物蔟乎寅密驗銅儀之轉蔟千木切太蔟正月律名禮記孟春之月律中太蔟注候律之管以銅為之中猶應也孟春氣至則太蔟之律應應謂吹灰也太蔟者林鍾之所生三分益一律長八寸凡律空圍九分周語太蔟所以金奏贊陽出滯注言陽氣太蔟達於上也說文寅臏也正月陽氣動去黃泉欲上出隂尚彊象索不達臏寅於下也律厯志引達於寅周禮注太蔟寅之氣正月建焉銅儀渾天儀也後漢明帝紀登靈臺見史官正儀度注儀謂渾儀以銅為之王者正天文之器和帝永元十五年詔造太史黃道銅儀以正星晨之度隋志桓帝延熹七年太史令張衡更以銅製渾天儀維時膚使法言雖古之膚使其猶劣諸注膚美也丕對蕃釐禮樂志惟泰元尊媪神蕃釐師古曰泰元天也蕃多也釐福也言天神至尊而地神多福也蕃扶元反釐讀曰禧恭惟某官德禀惠和政先仁恕六條奉漢久司廉察之權續通典魏謨疏曰韋長任膺廉使時長為觀察使崔鉉制厯居廉鎮餘見前七聚維閩咸服清平之教周禮職方氏七閩注閩蠻之别也國語曰閩芊蠻矣疏言叔熊避難于濮蠻隨其俗如蠻乂從子從分為七種故謂之七閩山谷詩維閩七聚落泰來既驗易泰小往大來節召不遐禮記凡君召以三節二節以走一節以趨某進旅莫陪鳴謙先辱易鳴謙利用行師征邑國泰節旅謙四卦名送土牛之寒氣願護衣篝篝居侯切說文笿也可熏衣徐曰以籠覆火也山谷詩攬轡都城風露秋行臺無妾護衣篝又柿葉鋪庭紅顆秋薰爐沉水護衣篝餘見前喧櫪馬之盍簪即迎詔綍詳見前代回福建張提舉聲道陽春有腳驗正月之始和開元遺事人謂宋璟為有腳陽春言所至之處如陽春及物也肆夏升歌肅使臣之拜善左傳穆叔如晉晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必咨於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜肆夏樂章名周禮以鐘鼓奏九夏一曰王夏二曰肆夏三曰昭夏四曰納夏五曰章夏六曰齊夏七曰族夏八曰陔夏九曰驁夏肆夏之三肆夏以下三夏也單車所戾信陵君傳以單車代之何哉李陵答蘇武書以單車之使適萬乘之虜龔遂傳單車獨行至府張綱傳請單車之職魏裴潜拜代郡單車之部通典自魏以來庶姓為州而無將軍者謂之單車刺史凡單車刺史加督進一品都督進二品李頎詩所思但乘興逺適唯單車百福是遒遒慈秋切詩敷政優優百祿是遒毛傳遒聚也又四國是道毛傳固也箋云斂也正義曰訓為聚亦堅固之義恭惟某官氣禀冲和詔行寬大後漢書禮儀志立春之日下寬大書曰制詔三公方春東作敬始慎微動作從之罪非殊死且勿案驗皆須麥秋退貪殘進柔良下當用者如故事侯霸傳霸明習故事條奏前世善政法度皆施行之每春下寬大之詔奉四時之令皆霸所建也黃堂整暇新美䕃於甘棠黃堂太守聽事之堂也亦謂之雄堂杜詩為南陽太守請郭丹為功曹敕以丹署黃堂以為後去是也吳郡志今太守所居之宅即春申君之子為假君之殿也因數失火塗以雄黃故曰黃堂以壓火災左傳欒針曰日臣之使於楚也子重問晉國之勇臣對曰好以衆整曰又何如臣對曰好以暇今兩國治戎行人不使不可謂整臨事而食言不可謂暇䕃於禁切說文草隂地徐曰草所庇也入隂景曰䕃荀子木成䕃而衆鳥息焉莊子方得美䕃而忘其身繡節光華侈新榮於苞栩三朝志金節隋制也黑漆竿上施圓盤周綴紅綜拂八層黃繡龍袋籠之詩序皇皇者華君遣使臣也送之以禮樂言逺而有光輝也有聞燕喜詩吉甫燕喜既多受祉㑹即鶯遷鶯說文鳥也詩有鶯其羽詩傳鶯然有文章鳥羽文也詩伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木蒯希逸詩龍門舊列金章貴鶯谷新遷碧落飛孟寧詩羣鶯共喜新遷木雙鳳皆當即入池某縻身於朝莫面以賀杓攜龍角密占星駕之旋詩星言夙駕餘見首條氣轉鴻鈞㑹鬯天機之運莊子天機不張淮南子而有以通於天機而不以貴賤貧富勞逸失其志德杜詩人生貴是男丈夫重天機代回福建趙運使善宣行夏之時撫辰熙績尚書撫于五辰庶績其凝又允釐百工庶績咸熙孟春之月視履考祥禮記孟春之月注孟長也日月之行一嵗十二㑹聖王因其㑹而分之以為大數焉觀斗所建命其四時此云孟春者日月㑹于娵訾而斗建寅之辰也易視履考祥其旋元吉王弼注禍福之祥生乎所履處履之極履道成矣故可視履而考祥也宜有休祺以勞華使勞郎到切詩神所勞矣箋云猶言佑助詩序四牡勞使臣之來也又皇皇者華君遣使臣也送之以禮樂言逺而有光華也恭惟某官德儀震動魏相傳東方之神大皞乘震執規司春尚書大傳東方者動方也物之動也何以謂之春春出也物之出故謂東方春也道協泰交易泰小往大來吉亨則是天地交而萬物通也上下交而其志同也律轉東風添旌旗之和氣禮記孟春之月東風解凍通卦驗立春條風至條風即東風也王升之詩東風轉節萬物爭揚杓回北斗聽綸綍之新除說文杓斗柄也徐曰北斗之柄第一星取此為名杓猶標也史記天官書杓端有兩星攝提者直斗柄所指以建時節某濫綴荷班阻稱椒斝雲鴻江鯉聊舒削牘之私櫪馬林鴉㑹遂盍簪之願並見前賀監司詳啓意蓋倅武岡時上湖南監司作湖南漕司在長沙故云雲墟日月初躔星紀復回於赤奮躔澄延切說文踐也徐曰星之躔次星所履行也漢律厯志日月初躔星之紀也孟康曰躔舍也二十八舍列在西方日月行焉起于星紀而又周之猶四聲為宫紀也晉灼曰下言斗綱之端連貫營室織女之紀指牽牛之初以紀日月故曰星紀五星起其初日月起其中是謂天之綱紀也爾雅太嵗在丑曰赤奮若地天交泰雲墟益播於青陽道甲經長沙福地雲陽之墟可以隱居雲陽氏古仙人也雲陽山在攸縣即雲陽之墟一統志雲陽山在今茶陵州西十五里上有七峯曰偃霞紫微石柱白蓮隱形五陽石耳又有百靈闕真仙同玉華洞赤松壇般若巖之類湘中記雲陽之墟可以避世隱居爾雅春為青陽一曰發生郭璞詩青陽暢和氣谷風穆以溫時維六轡之華茂緝百嘉之慶恭惟某官德潛剛克尚書沉潜剛克孔傳沉潜謂地雖柔亦有剛能出金石道配陽休禮記陽休玉色繡斧旍旗暫勸楚卿之農事旍與旌通後漢百官志凡郡國皆掌治民常以春行所至縣勸民農桑振救乏絶左傳晉卿不如楚其大夫則賢皆卿材也禮記孟春之月草木萌王命布農事命田舍東郊瑶車玉軑還逢湘水之孟陬車犬音大車轄也屈原離騷經為余駕飛龍兮離瑤象以為車屯余車其千乘兮齊王車犬而並馳又攝提貞于孟陬兮惟庚寅吾以降爾雅太嵗在寅曰攝提格律厯志孟陬殄滅攝提失方孟康曰攝提星名隨斗杓所指建十二月正月為孟陬仁風轉蕙以泛蘭宋玉招魂仁風轉蕙泛崇蘭些善類拔茅而連茹易拔茅茹茹茅根也詳見前某三年黔佐王忠嗣傳不者黔中上佐耳詳見前萬斛緇塵陸機詩京洛多風塵素衣化為緇謝朓詩誰能久京洛緇塵染素衣破崖岸而為文丞詎復敢喧於櫪馬韓文藍田縣丞㕔壁記盡梇去牙角一攝故跡破崖岸而為之朱文公考異云方本無而字為之方作為文而讀連下句曰為文丞猶文具也按文丞不成文理方說之僻類如此梅亭與文公同時蓋未見定本也瞻原隰之有華使尚祈出送於土牛後漢禮儀志季冬之月立土牛六頭於國都郡縣門外丑地以送寒氣互見前賀諸司庚寅知榮州作庚寅為理宗紹定三年梅亭時年五十七庚寅孟陬六十齡之復見說文齡年也古者謂年齡齒亦齡也禮記夢帝與我九齡餘見上條甲子朔旦四五紀之罕逢按宋史理宗紀紹定三年正月有甲申逆數前十九日逢甲子是此年正月朔旦為甲子也漢律厯志乃以前厯上元泰初四千六百一十七嵗至元封七年復得閼逢攝提格之嵗中冬十一月甲子朔旦冬至日月在建星唐厯志治厯之本必推上元日月如合璧五星如連珠夜半甲子朔旦冬至尚書四五紀其一曰嵗二曰月三曰日四曰星晨五曰厯數在皇皇之華宜膺簡簡之福注見此卷第三條恭惟某官德潛天粹法言神在所潜而已矣天神天明照知四方天精天粹萬物作類注人以神明精粹經緯萬物政播民和尚書百工播民和見士於周孔傳播率其民和悅圓萬物以青規之仁厥臨孔惠詩孔惠孔時維其盡之轉八荒于洪鈞之氣其泰大來易泰小往大來疏隂去故小往陽長故大來盤既頌于椒花杜詩椒盤已頌花詳見前户益蟠于桃實風俗通東海度朔山有大桃樹蟠屈三千里黃帝法而象之因立桃板於門戶上初學記造桃板著戶謂之仙木詳見前某得州斗絶竇融傳河西斗絶在羌胡中注斗峻絶也前書曰成山斗入海山谷詩莫嫌斗絶無來往觸緒氷寒多且㫖㫖且多不敢貢茆柴之釀詩魚麗于罶鱨鯊君子有酒㫖且多魚麗于罶魴鱧君子有酒多且㫖詳見前茒柴村釀也韓子蒼詩三年逐客卧江皋自與田工壓小糟飲慣茒柴諳苦硬不知如蜜有香醪謂苦硬之酒如茒柴火易過也東坡詩幾思壓茒柴注茒柴乃村落所釀薄酒也黃州人造私酒俗謂之壓茒柴熾而昌昌而熾但知祝椿柏之祺詩俾爾熾而昌俾爾夀而臧俾爾昌而熾俾爾夀而富莊子上古有大椿以八千嵗為春八千嵗為秋抱朴子大谷倒生之柏皆與天齊其長地等其久頌徯惟深敷陳罔既代回趙節使春明退朝録節度使無定員恩數與執政同初除鎖院降麻禮尤異焉神宗以待宗室近屬外戚國壻年勞久次在外任除殿帥始授此官亦止一負或有功勛顯著任帥守於外及前宰執拜者不輕授厯起丁丑數合太初之元武帝紀太初元年夏五月正厯以正月為嵗首應劭曰初用夏正以正月為嵗首故改年為太初也通鑑日録太初元年彊圉赤奮若丁丑爾雅嵗在丁曰彊圉在丑曰赤奮若兒寬傳將起大元注大元太初厯也陬正庚寅慶在髙陽之裔正本貞字避廟諱離騷經帝髙陽之苗裔兮朕皇考曰伯庸攝提貞于孟陬兮惟庚寅吾以降髙陽帝顓頊之號左傳髙陽氏有才子八人天下之民謂之八愷齊旄整暇左傳欒針曰日臣之使于楚也子重問晉國之勇臣對曰好以衆整曰又何如臣對曰好以暇戩穀駢臻戩音翦詩天保定爾俾爾戩穀爾雅履戩福也廣韻福祥也方言福祿謂之祓戩恭惟某官大雅不羣在宗載考詩湛湛露斯在彼豐草厭厭夜飲在宗載考鄭箋載之言則也考成也夜飲之禮在宗室同姓諸侯則成之於庶姓其讓之則止詠梁園之雪客至如雲詩其從如雲餘見前鑿豳國之氷公歸有日詩二之日鑿冰沖沖三之日納于凌隂孔疏豳在雍州岐山之北原隰之野于漢屬右扶風栒邑毛傳冰盛水腹則命取冰於山林沖沖鑿冰之意振振公子詩麟之趾振振公子毛傳振振信厚也啿啿春祺見此卷代衛參政賀林提舉條某自笑陳人東坡詩肯對紅裙辭白酒但愁新進笑陳人又逢新嵗酌九霞之醑莫陪璩瑒之賔十洲記崑崙山之上朱霞九光西王毋之所治也王充論衡河東蒲坂項曼都好道學仙去三年而返家人問其狀都曰欲飲食仙人輒飲我以流霞每飲一杯數日不饑揚雄甘泉賦吸青雲之流霞兮飲若木之露英神仙傳許碏自稱髙陽人也少為進士屢舉不第多遊盧江嘗醉吟曰閬苑花前是醉鄉誤餐王母九霞觴羣仙拍手嫌輕脫謫向人間作酒狂好事者或詰之曰我天仙也方在崑崙就宴失儀見謫人皆笑之後當春景把花作舞上酒家樓醉歌升雲飛去陳後主詩神仙定不及寧用流霞杯醑寫與切增韻清也酒之泲者魏志王粲傳汝南應瑒字德璉為五官將文學典論曰今之文人魯國孔融廣陵陳琳山陽王粲北海徐幹陳留阮瑀汝南應瑒東平劉楨斯七子於學無所遺於辭無所假瑒弟璩字休璉博學善屬文善為書記文對列仙之圖願介松喬之夀後漢書東平王蒼傳鴻臚奏遣諸王歸國帝特留蒼賜以祕書列仙圖隋經籍志漢時阮蒼作列仙圖集賢注記阮蒼仙圖一卷列仙傳赤松子神農時雨師服水玉散教神農能入火自燒至崑崙山西王母石室隨風雨上下炎帝少女追之亦得仙俱去髙辛持為雨師王子喬者周靈王太子也好吹笙作鳳凰鳴遊伊洛之間道士浮邱公接以上嵩山三十餘年後求之於山見桓良曰告我家七月七日待我於緱氏山頭果乘白鶴駐山嶺望之不到舉手謝時人數日而去後立祠於緱氏及嵩山代回趙開府師垂南窗紀談魏黃權以車騎將軍開府儀同三司開府之名始此國朝因唐節度使兼平章事號使相元豐定官制既罷同平章事遂以節制開府為使相而文武寄祿官亦存之玉厯授時日始和於象闕玉厯見此卷代回福建陳提刑條尚書厯象日月星晨敬授人時周禮太宰正月之吉始和垂治象之法于象魏注鄭司農云闕也疏雉門之外兩觀易氏曰治之見于象者為治象書治象之法者為象魏兩觀之垂治象者為魏闕莊子魏牟身在江海之上心居魏闕之下金支胙土天益厚於龍光白帖皇親金枝朱邸崔灝行路難君不見建章宫中金明枝萬萬長條拂地垂古今注黃帝與蚩尤戰于涿鹿之野常有五色雲氣金枝玉葉止于帝上宋狀元蕭翀峯詩名傳玉陛星晨曉澤霈金枝雨露春蓋是榜本趙忠定公為狀元故事設科以待草茅凡預屬籍桂仕版者法當遜避遂升蕭為榜首故云魏志潘朂册魏公九錫文先王並建明德胙之以土分之以民崇其寵章備其禮物詩既見君子為龍為光毛傳龍寵也疏為君所寵遇為君所光榮恭惟某官揆路崇勳宗藩令德棣華韡韡增光伯仲之聯詩伯氏吹塤仲氏吹箎注伯仲喻見弟也韡音偉說文盛也詩常棣之華鄂不韡韡注光明也瓜瓞綿綿襲慶神明之夀詩綿綿瓜瓞箋瓜之本實繼先嵗之瓜必小狀似瓝故謂之瓞綿綿然若將無長大時左傳古我先王賴其利器用也與其神明之後也注舜大聖故稱神明宜從穀旦詩穀旦于差南方之原穀善也益衍叢祥某濫綴荷行阻稱椒斝夏正人統已孚草木之和檀弓疏夏以建寅之月為正者為人統陳寵傳十二月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春禮記孟春之月天地和同草木萌動周以宗強願介椿松之夀諸侯王表昔周監于二代三聖制法立爵五等封國八百同姓五十有餘詩曰介人維藩大師維垣大邦維屏大宗維翰懷德維寧宗子維城所以親親賢賢深根固本為不可拔者也代回建康莊都統松建康為楚金陵邑楚威王以其地有王氣埋金鎮之故曰金陵或曰以其地接華陽金壇之陵秦改曰秣陵屬鄣郡漢改鄣郡為丹陽郡吳大帝自京口徙此因改為建業晉武帝改為秣陵又分秣陵北為建業改業為鄴後避愍帝諱改為建康東晉元帝渡江復都焉又為丹陽郡宋齊梁陳因之隋廢郡更於石頭城置蔣州唐為揚州置江寧為潤州屬縣後改為升州僞吳改為江寧府宋復為升州仁宗以升王建國復升江寧府建康軍節度朝野雜記晉武帝有河西大都統國朝詩軍都統制者自渡江已前亦有之然未為官稱蓋是時陜西河東三路皆以武臣職髙有智者為馬步軍副都總管遇出師征討則加以都總制軍馬之名猶今節制軍馬之稱非有司分也建炎元年置御營司遂擢王襄愍淵為都統制都統制名官自此始嵗開端月頓回寒谷之溫初學記正月孟春亦曰開嵗玉燭寶典正月為端月春入和門益壯長江之重詳見本卷代回淮西趙總領條恭惟某官戎昭果毅左傳戎昭果毅以聽之之謂禮殺敵為果致果為毅易之戮也戎兵事也昭明果敢也毅必行也聽從也言兵戎之事明此果毅以從之之謂禮剛克沉潛尚書沉潜剛克千里運籌令肅蟠花之甲髙帝紀運籌帷幄之中制勝千里之外蟠通作盤劉邵趙都賦詰曲縈盤宋曹翰詩庭前昨夜秋風起羞覩盤花舊戰袍三軍挾纊暖生細柳之營見本卷代回周馬帥條交泰大來見上賀諸司條在師中吉易在師中吉無咎象曰在師中吉承天寵也疏以剛居中而應于五是在師中吉也某無由叙賀猥辱貽箋草木知其威名諒深自愛張萬福傳德宗以萬福為濠州刺史召謂曰先帝改爾名者正所以褒也朕謂江淮草木亦知爾威名若從所改恐賊不曉是卿也復賜舊名萬福山谷詩塞上威名草木知葦桃禳夫惡氣願對殊休注見首條賀薛太守師旦乙酉乙酉為理宗寶慶元年乞漿得酒之占嵗仍在酉袁子正論嵗在申酉乞漿得酒嵗在辰已嫁妻賣子轉璣窺衡之驗斗又建寅尚書在璿璣玉衡以齊七政蔡雍云玉衡長八尺孔徑一寸下端望之以視星晨蓋垂璣以象天而衡望之轉璣窺衡以知星宿嵗華紀麗正月律中大蔟斗建寅位幸惠仁侯韓文今天幸惠仁侯永膺多福尚書豫小子永膺多福恭惟某官氣鍾溫厚見前政布中和王褒傳使褒作中和樂職宣布詩師古曰中和者言政治和平也宣布者風化普洽無所不被有腳陽春享人生五馬之貴杜詩人生五馬貴莫受二毛侵細氊廣厦佇河東三鳯之來王吉傳廣夏之下細㫋之上師古曰廣夏大屋也㫋與氊同新唐書薛收傳薛元敬隋選部郎邁之子與收及族兄德音齊名世稱河東三鳳收為長離德音為鸑鷟元敬年最少為鵷雛暫凝畫㦸之香見前即簇青旗之仗簇千木切聚也攢也漢立春之日迎春于東郊車旗服飾皆青杜詩晝刻傳呼淺春旗簇仗齊山谷詩春騎簇昭亭某陳人何用見前新尹焉依杜詩酒酣誇新尹蓄眼未見有左傳我周之東遷晉鄭焉依舊綴筍班固已借天街之潤東坡詩豈意肜庭綴兩班山谷詩不立東風玉筍班韓退之早春詩天街小雨潤如酥草色遙看近却無最是一年春好處絶勝花栁滿皇都兹鋤菜把詎敢忘地主之恩少陵園官送菜詩清晨䝉菜把常荷地主恩賀婺州趙守善下玉厯導和氣已諧於簇逹拾遺記黃帝吹玉律正璇衡大載禮孔子曰舜以天德嗣堯西王母來獻白琯淮南子堯得舜推而尊之贈以昭華之玉而傳天下西京雜記髙祖初入咸陽周行府庫有白玉琯長二尺三寸二十六孔隋志梁武帝鍾律緯稱主衣從上相承有周時銅尺一枚古玉律八枚李元標詩銅渾變秋節玉律動春灰律志位于丑太族族奏也氣大奏地而達物也璇源襲慶祿益厚於瓜綿顔延年詩玉水記方流璇源載圓折餘見上代回趙開府條與國同休裒時多祉恭惟某官飛英宗邸邸典禮切說文屬國舍徐曰諸侯來朝所舍曰邸師古曰漢制郡國朝宿之舍在京師者率名邸邸至也言所歸至也謝朓箋朱邸方開效蓬心於秋實陸扆棣王制分以白茅錫其朱邸賦政價藩詩賦政於外四方爰發又價人維藩賦布也近尺五之天旍旗有爛杜詩爾家最近魁三象時論同歸尺五天自注俚語曰城南韋杜去天尺五旍本作旌咨盈切說文遊車載旌析羽注旄首所以精進士卒爛郎旰切明也詩爛其盈門箋云爛爛粲然鮮明且衆多之貌方千里之地襦袴已溫某濫綴槖班阻趨㦸衛並見前三朝受四海之籍肇蕆上儀班固東都賦春王三朝㑹同漢京天子受四方之圖籍膺萬國之貢珍八荒轉一氣之鈞佇觀歸衮詩是以有衮衣兮無以我公歸兮賀永州陳守疇永州秦屬長沙郡漢分置零陵郡屬荆州蜀先主既得益州乃分荆州之湘水為界長沙江夏桂陽以東屬吳南郡零陵武陵以西屬蜀及關羽敗零陵屬吳孫皓分零陵南部為始安郡分北部為邵陵郡晉穆帝分零陵立營陽郡南齊為零陵郡隋置永州五季後周時宋藝祖以勝敵雋加永州防禦使開祉發祥實由此邦有若漢之豐沛唐之晉陽也戊巳日月之樞氣交離坎律厯志太極元氣豐茂於戊理紀于巳戊巳中位故曰日月之樞周髀冬至從坎陽在子日出㢲而入坤夏至從離隂在午日出艮而入乾子丑天地之紀喜溢乾坤檀弓疏周以建子之月為正者謂之天統商以建丑之月為正者謂之地統况行湘水之春杜詩曉行湘水春宜有魯人之頌詩序駉頌僖公也僖公能遵伯禽之法儉以足用寬以愛民務農重穀牧于坰野魯人尊之於是季孫行父請命於周而史克作是頌恭惟某官令修王正春秋春王正月政布民和見前奏寬大之書盡解東方之凍宣帝黃龍元年詔曰數申詔公卿大夫務行寬大成帝鴻嘉四年正月詔數敕有司務行寬大禁苛暴漢紀杜周嘗冬獄未竟㑹立春有寬大令互見前反離騷之賦遂開南嶽之雲揚雄傳怪屈原文過相如至不容作離騷自投江而死悲其文讀之未嘗不流涕也乃作書往往托離騷文而反之自岫山投諸江流以弔屈原名曰反離騷東坡韓文公廟碑公之精誠能開衡山之雲而不能回憲宗之惑詳見前攝提既正於孟陬見前耆老爭祈於萬石栁子厚永州萬石亭記耋老言曰懿夫公之名亭也公嘗六為二千石既盈其數漢之三公秩號萬石我公之德宜受兹錫漢有禮臣惟萬石君我公之化始于閨門道合于古祐之自天野夫獻辭公夀萬年某一來黔鄙栁文巫黔東鄙再見青陽爾雅春為青陽德不孤必有鄰願終垂於樾䕃見前夀維祺以介福愧莫捧於椒花詩夀考維祺以介景福箋介徑也養老人而得吉所以助大福也代回常州王宫教遇常州吳地延陵季子之采邑也秦置㑹稽郡延陵等四縣屬焉漢改延陵為毗陵縣東漢屬吳郡晉為毗陵郡又諱毗改晉陵隋於蘇州常熟縣置常州唐因之宋仍為常州領縣四冶晉陵武進屬浙西路今為府改江隂軍為縣𨽻焉又分江隂地為靖江縣治馬䭾沙日出嵎夷厯紀孟陬之月尚書分命羲仲宅嵎夷曰暘谷寅賔出日注嵎海嵎也夷萊夷也史記作禺鐵爾雅正月為陬離騷經攝提貞于孟陬春回陽羡祥開刺史之天陽羡古城在今宜興縣治南一名蝦虎城輿地志吳越間謂荆為楚秦以子名楚遂改荆溪為陽羡唐初析義興置陽羡臨津二縣尋省趙嘏詩尋花偶坐將軍樹飲水方開刺史天東坡詩一見刺史天恭惟某官德體震亨易震亨震來虩虩恐致福也疏由懼而獲通所以震有亨德道隨泰長將明賑貸之議猶已饑民漢刑法志有司無仲山甫將明之材師古曰詩云肅肅王命仲山父將之邦國若否仲山父明之將行也否不善也言王有誥命則仲山父行之邦國有不善之事則仲山父明之故引以為美傷今之不能然也文帝紀詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡而莫之憂省為民父母將何如其議所以振貸之師古曰振起也為給貸之今其存立也諸振贍其義皆同今流俗作字從貝者非也奉行寬大之書自今有嵗詩自今伊始嵗其有君子有穀詒孫子于胥樂兮餘見前鴻鈞一轉驛召載馳某久矣凋年鮑照詩窮隂殺草急景凋年見此芳嵗梁元帝纂要孟春曰芳嵗華嵗變則通通則久願體君子之四時繫辭易窮則變變則通通則久是以自天祐之吉無不利左傳子産曰君子有四時朝以聽政晝以訪問夕以修令夜以安身仁者生生者圜茂享太平之五福魏相傳東方之神太昊乘震執規司春張晏曰木為仁仁者生生者圜故為規律厯志春蠢也物春生乃運動木曲直仁者生生者圜故為規也詩序既醉太平也疏謂四方寧靜而無事此則事之大者故謂太平也詩介爾景福鄭箋謂五福也孔疏云福者備也備者大順之總名既醉福事數備于五君子萬年夀也天被爾祿冨也室家之壼康寧也昭明有融攸好德也髙朗令終景命有僕考終命也代回安豐史守天錫安豐軍即今鳳陽府夀州春秋為六蓼國後屬楚楚考烈王自陳徙都夀春命曰郢秦漢屬九江郡東漢為揚州刺史治所魏即安豐縣升為郡晉為淮南郡治夀春東晉為豫州刺史治所梁以夀陽為豫州隋曰夀州唐𤣥宗改夀春郡後復為州後唐升為順化軍節度南唐改為清淮軍周平淮南徙夀州治下蔡以清淮軍為忠正軍自此州治始在淮北而舊州廢為夀春縣仍𨽻焉宋因之後升為夀春府紹興間升安豐縣為軍候一氣於葭莩曰為改嵗後漢書律厯志候氣之法為室三重戶閉塗釁必周密布緹縵室中以木為案每律各一內庳外髙從其方位加律其上以葭莩灰抑其內端案厯而候之一氣至者灰去晉志取𢎞農宜陽縣金門山竹為管河內葭莩為灰詩曰為改嵗入此室處曰漢書作聿曰為改嵗者以仲冬陽氣始萌可以為年之始故改正朔者以建子為正望八公之草木更與頒春八公山在今夀州東北五里肥水之北淮水之南漢淮南王安與其賔客八公俱登此山學仙今山有安故臺及石上有人馬跡晉謝𤣥禦苻堅陳肥水堅軍望草木皆為旍旗即此山也謝𤣥暉和王著作八公詩云二别阻漢坁雙崤望河澳兹嶺復㠝岏分區奠淮服東限琅琊臺西距孟諸陸阡綿起雜樹檀欒䕃修竹日隱澗凝空雲聚岫如復出沒朓樓雉逺近送春目戎州昔亂華素景論伊穀阽危賴宗衮微管寄明牧長蛇因能翦奔鯨自此曝道峻芳塵流業遙年運倐平生仰令圖吁嗟命不淑浩蕩別親知連翩戒征軸再逺館娃宫雨去河陽谷風煙四時犯霜雨期夜沐春秀良已凋秋場庶能築頒通作班崔駰傳乃强起班春注班布春令恭惟某官世濟壯猷左傳世濟其美詩克壯其猷躬行仁政地控夀陽之阻莫重安豐圖經古夀春在淮南自周世宗攻劉仁瞻於此惡其險遂徙夀州治於淮北下蔡是安豐即古夀州劉禹錫寄揚夀州詩風獵紅旗入夀春滿城歌舞向朱輪八公山下清淮水千騎塵中白靣人天銷固隂之凝已成交泰宜屬始和之吉周禮正月之吉始和布教于邦國都鄙詳見前益臻諸福之祥董仲舒傳諸福之物可致之祥莫不畢至某欽承履端缺陪旅賀履旅卦名上林鴈過先勤繫帛之書蘇武傳漢求武等胸奴詭言武死後漢使復至胸奴常惠請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如惠語以讓單于單于視左右而驚謝漢使曰武等實在下蔡馬肥願懋扞城之績下蔡故城在今夀州北三十里漢為縣屬沛郡隋屬汝隂郡其城周世宗所築遺址尚存詩公侯干城毛傳干扞也鄭箋可任以國守扞城其民孫炎云干楯所以自蔽扞也左傳百官承事朝而不夕此公侯之所以扞城其民也桓溫傳贊爰寄扞城用恢威略東坡詩誰信儒冠也扞城代回湖州魏守大中湖州已見羲和授時日已賔於暘谷尚書乃命羲和欽若昊天厯象日月星辰敬授人時孔傳羲和世掌天地四時之官敬記天時以授人也日出于谷而天下明故稱暘谷甸侯宣化春自滿於苕溪說文甸天子五百里地甸之為言治也記大司馬方千里曰國畿其外方百里曰侯畿又其外方五百曰甸畿栁詩繼酬天祿署俱尉甸侯家董仲舒傳郡守縣令民之師帥所使承流而宣化也文選春色滿皇州苕溪在今湖州府治西溪有兩源一源發自天目山一源發自獨松嶺合浮玉山水俱至安吉州合流至府城西又分二派一自清源門入霅溪一至臨湖門外合霅溪入于太湖多生蘆葦故曰苕溪恭惟某官奉寬大之書布中和之政水晶宫冷何資桃梗之禳歐陽永叔送胡學士知湖州詩武平天下才四十滯鉛槧匆乘使君舟傍棹不可纜都門春漸動栁色緑將暗挂帆千里風水濶江灧灧吳興水晶宫樓閣在寒鑑橘柚秋苞繁烏程春甕釅清談越客醉屢舞吳娘豔寄詩無憚煩以慰離居念詳見前鸚鵡杯深滿介椿松之祉唐段柯古酉陽雜爼梁宴魏使魏肇師俄而酒至鸚鵡杯徐君房飲不盡屬肇師肇師曰海蠡蜿蜒尾翅皆張非獨為玩好亦所以為罰卿今日真不得辭責南州異物志鸚鵡螺狀似霞杯形如鳥頭向其腹視似鸚鵡故以為名離殼出食飽則還殼中若為魚所食殼乃浮出白質而紫文如鳥形故自像鳥為作兩目兩翅也梁陸倕蠡杯銘用邁羽杯珍愈渠碗實同蠡測形均朴滿李詩酒飛鸚鵡重李適詩銀河半倚鳳凰來玉酒相傳鸚鵡杯某已投西崦又見東風見前皂蓋晝行莫稱稱觴之賀後漢輿服志中二千石二千石皆皂蓋朱兩轓白蘋日暮㑹觀賜璽之來白蘋洲在湖州霅溪東栁渾詩汀洲採白蘋日暮江南春白樂天五亭記云湖州城東南一百步扺霅溪溪連汀洲洲一名曰白蘋梁吳興守栁渾於此賦詩因以為名也大厯十一年顔魯公為刺史作八角亭以逰息開成三年𢎞農楊君為刺史乃疏四渠濬二池樹三園搆五亭蓋是境也實栁守濫觴之顔公椎輪之楊君繢素之三賢始終能事畢矣循吏傳序二千石有治理效輒以璽書勉厲增秩賜金代回王寧國補之寧國已見三陽底日肇新正月之和底軫視切致也周禮馮相氏冬夏致日春秋致月以齊四時之序左傳天子有日官諸侯有日御日官居卿以底日禮也五馬頒春茂介自天之祐易自天祐之吉無不利恭惟某官中和布政見前豈弟宜民詩豈弟君子又宜民宜人椒盤已頌花嵗今始有杜詩守嵗阿咸家椒盤已頌花詩自今伊始嵗其有澄江淨如練福莫不增謝眺詩餘霞散成綺澄江淨如練詩受天百祿降爾遐福又如山如阜如岡如陵如川之方至以莫不增某竊承履端阻陪旅賀信宣州主人之賢者益侈新榮寧國唐之宣州昌黎送楊支使序愈未嘗至宣州而樂頌其主人之賢者以其取人信之也忘翰林客卿之囅然敢伸善禱揚雄傳聊因筆墨成文章故藉翰林以為主人子墨為客卿以風囅丑忍切韻㑹大笑貌莊子桓公囅然而笑曰此寡人之所見者也代回常台州建台州已見日在營室肇新太史之迎禮記孟春之月日在營室正義曰按三統厯立春日在危十六度正月中在室十四度晉天文志營室二星一曰元宫一曰清廟國語日月底天廟注底至也天廟營室也孟春之月日月皆在營室禮記孟春之月以立春先立春三日太史謁之天子曰某日立春盛德在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春于東郊注太史禮官之屬掌正嵗年以叙事霞起天台茂介元侯之祉天台山在天台縣西一百十里孫綽天台賦赤城霞起以建標瀑布飛流以界道太白天台曉望詩門標赤城霞樓棲滄海月詳見前左傳三夏天子所以享元侯也元侯九牧二伯諸侯之長也恭惟某官布中和之政行寬大之書見前維斗擕龍表少陽之用事漢天文志杓攜龍角注杓斗柄也龍角東方宿也攜連也律厯志少陽者東方東動也陽氣動物于時為春春蠢也物蠢生乃動運木曲直仁者生生者圜故為規也俾民觀象驗正月之始和周禮正月之吉始和布治于邦國都鄙乃縣治象之法于象魏使萬民觀治象挾日而斂之互見前君子履之天休萃止某退然厄閏宋陸佃埤雅云黃楊木性堅緻難長俗云嵗長一寸閏年倒長一寸宋羅願爾雅翼云黃楊嵗長一寸遇閏年則否牡丹遇閏嵗花開輒小東坡詩園中草木春無數只有黃楊厄閏年見此芳辰梁元帝纂要春辰曰良辰嘉辰芳辰道阻且長愧莫稱於椒斝見前年運而往只擬學于桃符莊子豫年運而往矣東坡詩老去怕看新厯日退歸擬學舊桃符代回林嘉興嘉興已見揆三微于人統既届始和後漢書陳寵傳三微成著以通三統注統者統一嵗之事王者三正遞用周環無窮故曰通三統班固白虎通德論三微者何謂也陽氣始於黃泉萬物動微而未著也十一月之時陽氣始養根株黃泉之下萬物皆赤赤者盛陽之氣也故周為天正色尚赤也十二月之時萬物始牙而白白者隂氣故殷為地正色尚白也十三月之時萬物始達孚由而出皆黑人得加功故夏為人正色尚黑不以二月後為正者萬物不齊莫適所統故必以三微之月也律厯志天統之正始施于子半日萌色赤地統受之于丑初日肇化而黃至丑半日牙化而白人統受之于寅初日蘖成而黑至寅半日生成而青天施復于子地化自丑畢于辰人生自寅成于申故厯數三統天以甲子地以甲辰人以甲申孟仲季迭用事為統首三微之統既著而五行自青始其序亦始之牧千里之日畿宜裒多祉白虎通德論京師者何謂也千里之邑號也京大也師衆也明諸侯法日月之徑千里帝王世紀天子畿方千里曰甸服服之內曰京師恭惟某官道符泰長德體震亨俱見前賔暘谷之春湖山自得尚書宅嵎夷曰暘谷寅賔出日韓文令修於户庭數日之間而人自得於湖山千里之外作嘉禾之命朝夕以須郡志吳黃龍五年嘉禾生于由拳因名嘉禾吳志赤烏七年㑹稽言嘉禾生改年為嘉禾書序唐叔得禾異畝同穎獻諸天子王命歸周公于東作歸禾注畝隴也穎穗也禾各生一壟而共為一穗天下禾同之象周公德所以致故歸之左傳磨厲以須某竊承履端莫陪旅賀雙魚中有尺素猥勤桃李之投古樂府客從逺方來遺我雙鯉魚呼童烹鯉魚中有尺素書詩投我以木桃又投我以木李五馬不受二毛請致椿松之祝杜詩人生五馬貴莫受二毛侵代回史蘄州蘄州已見日賔暘谷厯敬授於堯時尚書寅賔出日孔傳敬導出日天惠仁侯和先驅於楚澤韓文今天幸惠仁侯又送我入楚澤恭惟某官榮分半竹文帝紀初與郡守為竹使符注以竹箭五枚長五寸鐫刻篆書第一至第五師古曰與郡守為符者各分其半右留京師左以與之言憩甘棠詩蔽芾甘棠勿翦勿敗召伯所憩淮水湯湯扇條風而解凍湯音傷詩淮夷來鋪江漢湯湯易緯立春條風至禮記孟春之月東風解凍正義曰按易卦驗云立春而水降條風至條風即東風也周原膴膴生麥氣以烘晴膴音武詩周原膴膴堇荼如飴箋廣平曰原周之原地在岐山之南膴膴然肥美其所生菜雖有性苦者甘如飴也嵗華紀麗麥覆雉以當時注見庾信感春賦文選麥秋晨氣潤宜在凝香韋蘇州詩燕寢凝清香益裒流祉某濫持荷槖莫捧椒觴見前遵渚之有歸鴻請馳善頌詩鴻飛遵渚公歸無所鄭箋鴻大鳥也不宜與鳬鷖之屬飛而循渚以喻周公與凡人處東都之邑失其所也盍簪而喧櫪馬佇慶遄歸詩王曰遄歸餘見前代回趙徽州希逺徽州已見王正謹始肇新人統之頒見前侯度承休始自日畿之近詩質爾人民謹爾侯度注侯君也慎汝為君之法度恭惟某官奉行寬大宣布中和凍解東風共詠袴襦之暖杓回北斗茂迎綸綍之溫俱見前某仰辱先施未由候賀有椒有飶願儲滋至之休飶薄必切說文食之香也詩有椒其馨有飶其香注椒猶飶也飶芬香也如竹如松益茂方來之慶詩如竹苞矣如松茂矣代回張建昌嵩建昌已見正月始和少陽用事釋名云正月少陽見寅寅者演也諒魯侯之燕喜詩魯侯燕喜令妻夀母注燕燕飲也受周祉之鴻龎鴻通作洪爾雅龎洪大也揚雄傳鴻生巨儒龎當作厖說文石大貌司馬相如傳湛恩厖洪師古曰厖洪皆大也恭惟某官宣布中和奉行寬大見前東風解凍暫勤南國之蕃宣詩序文王之道被于南國又召公之教明于南國詩四國于蕃四方于宣北斗回杓即接西樞之步武宋熙寧三年詔國家以西樞內輔翊贊本兵任為重矣說文步行也爾雅堂下謂之步步布也禮記堂上接武堂下布武爾雅武跡也錢氏曰每移足半躡之中人之跡尺二寸某未由削牘見前先辱噓枯後漢書鄭太傅孔公緒清談髙論吹生噓枯有椒其馨莫遂飛觴之慶楊炯詩煙霞駐征蓋絃奏促飛觴餘見前如松之茂願培隆棟之材易棟隆吉象曰棟隆之吉不撓乎下也代月湖回新建寧李大諫大異蒼玉青旗趣元侯之北覲尚書考靈曜春佩蒼璧乘蒼馬以出逰發令于外春行仁政以順天之常以安國也後漢禮儀志立春之戶郡國縣官皆服青幘立青幡清香畫㦸轉仁氣以南驅誕對端辰裒時繁祉見前恭惟某官蜚英騰實司馬相如傳激清流揚微波蜚英聲騰茂實聽厲即溫肆夏升歌擬宣麻于文德左傳金奏肆夏之三又三夏天子所以享元侯也金奏擊鐘而奏也肆夏樂章名周禮以鐘鼓奏九夏一曰王夏二曰肆夏三曰昭夏四曰納夏五曰章夏六曰齊夏七曰族夏八曰陔夏九曰驁夏肆夏之三肆夏以下三夏也元侯來朝天子享之乃奏三夏翰林志唐中書用黃白二麻為綸命其後翰林専掌白麻中書獨得用黃麻玉堂雜記凡鎖院文臣職事明日赴文德殿聽麻宰相與樞密皆不往惟輪參政一員押麻玉海文德殿即文明殿太平興國五年殿災改今名淳化中張洎奏今之文德殿即唐之宣政在周為中朝在漢為前殿在唐為正衙凡朔望起居大册拜對四夷君長試制舉人皆在此陽春有腳還擷茗於武夷武夷山在崇安南三十里建茶所出詳見前東坡詩武夷溪邉粟粒芽前丁後蔡相籠加爭新買寵各出意今年鬬品充官茶芳嵗維新叢休滋至某龍鍾甚矣廣韻龍鍾竹名年老者如竹枝葉搖曵不自禁持韓詩東野不得官白首誇龍鍾東坡詩龍鍾一老翁詳見前燕賀缺然淮南子太厦成而燕雀相賀杜詩髙飛燕雀賀新成莊子今者闕然數日不見列炬盍簪願遂同朝之喜見前習鄉尚齒便為告老之謀禮記元日習射上功習鄉上齒注鄉請飲酒也鄉禮春秋射國蠟而飲酒養老代回建寧傅大諫伯成王正紀月肇頒象魏之和侯度觀時丕對龍光之渥宜裒百福以應三陽並見前恭惟某官早伏諫蒲史丹傳頓首伏青蒲上注以青規地曰青自非皇后不得至此出分符竹陽春布德已行寬大之書見前肆夏升歌即展論思之藴班固兩都賦序朝夕論思日月獻納仁賢來止福履綏之詩樂只君子福履綏之某落日在簾杜詩落日在簾鈎溪邉春事幽東坡詩斜陽半疏簾浮雲出岫歸去來辭雲無心而出岫憶爛柯之邂逅又見東風述異記信安都石室中晉時樵者王質逢二童子棊與質一物如棗核食之不饑置斧于坐而觀童子曰汝斧柯爛矣質歸鄉閭無復時人張萱疑耀云爛柯人皆知為奕者之事東陽記信安縣有懸室坂晉中朝時有民王質者伐木至室中見四童子彈琴而歌因倚柯聽之童子以一物如棗核與質含之便不復饑俄頃童子曰其歸承聲而去斧柯爛盡既歸質去家已數十年矣詩邂逅相遇及焙茶之後先願歸北闕大觀茶論茶工作於驚蟄尤以得天時為急故焙人以得茶天為慶北苑別録驚蟄節萬物始萌每嵗常以前三日開焙通閏則反之以其氣候之少遲故也按此所謂焙茶之後先也髙帝紀蕭何造未央宫立東闕北闕師古曰未央殿雖南嚮而上書奏事謁見皆詣北闕關中記未央宫北有𤣥武闕即北闕也張衡西京賦北闕甲第當道直啓代回施溫州緘溫州已見挾日觀治肇頒正月之和周禮正月之吉始和布治於邦國都鄙乃縣治象之法於象魏使萬民觀治象挾日而斂之注正月周之正月吉謂朔日始調和上六典八法已下之事和訖當月即頒布此治職文書下諸侯邦國卿大夫都鄙言乃縣者乃者緩辭至建寅之月乃縣治象之法于雉門象魏使萬民共觀治象挾日者從甲至甲凡十日斂藏之于明堂於後月月受而行之謂之告朔挾又作浹受地視侯丕介自天之祐恭惟某官良二千石漢書循吏傳序宣帝常稱曰庶民所以安其田里而亡歎息愁恨之心者政平訟理也與我共此者其唯良二千石乎福十萬家新唐書陳子昻傳一州得才刺史十萬户賴其福得不才刺史十萬户受其困國家興衰在此職也將明寬大之書昔無今有刑法志有司無仲山甫將明之才詳見前廉范傳范為蜀郡太守除火禁百姓便之歌曰廉叔度來何暮不禁火民安作昔無襦今五袴參酌隂陽之運小往大來易泰小往大來吉亨內陽而外隂內健而外順詳見前與物為春淮南子使神滔蕩而不失其充日夜無傷而與物為春則是合而生時於心也摶風斯下莊子鵬之徙於南冥也水擊三千里博扶搖而上者九萬里故九萬里則風斯在下矣某屬拘朝綴綴音與惴同禮記行綴注疏謂鄼也正義曰鄼謂鄼聚舞人行位之處莫旅賀綦綦音其廣韻履飾也禮記履著綦注綦繫也櫪馬林烏但切盍簪之願雲鴻江鯉聊傾削櫝之私俱見前代回施溫州緘溫州已見魯觀占雲觀郎旰切爾雅觀謂之門釋名觀以上觀望也三輔黃圖云登之可以逺觀故謂之觀左傳僖五年春正月朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也周禮保章氏以五雲之物辨吉凶水旱降豐荒之䘲周正紀月正音征增韻云本去聲始皇名政讀正如征驗陽律鳯鳴之應律厯志黃帝使泠綸自大夏之西昆侖之隂取竹之解谷生其竅厚均者斷兩節間而吹之以為黃鍾之宫制十二筒以聽鳳之鳴其雄鳴為六雌鳴亦六比黃鍾之宫而皆可以生之是為律本符凝香燕寢之祥見前恭惟某官政為吏師朱博傳贊所在而治為世吏師學有家法後漢書儒林傳序各以家法教授徐防傳太學試博士弟子皆以意說不修家法私相容隱開生姦路左雄傳諸生試家法注儒有一家之學故稱家召棠所舍迎化日之舒長詩蔽芾甘棠勿剪勿伐召伯所茇說文茇舍也王符傳化國之日舒以長故其民閒暇而力有餘亂國之日促以短故其民困務而力不足燕黍既回揚仁風於黎庶見前宜裒多祉以對休辰某濫綴朝行阻陪賔謁碧油紅斾願加意于頒春白樂天詩碧油幢引向東川又紅斾將軍昨日歸斾蒲蓋切說文繼旐之旗沛然而垂紫詔緑綈猶傾心于賀夏隴右記武都紫水有泥其色亦紫而粘貢之用封璽書故詔誥有紫泥之美綈田黎切說文繒也外戚傳中書黃門田客持詔記盛緑綈方底西京雜記漢中書以武都紫泥為璽室加緑綈其上代回程慶元凖慶元已見夏正建寅三陽簇逹禮記孟春之月律中太蔟正義曰此言孟春者夏正建寅之月也吕不韋在於秦世不用秦正而用夏時者以夏數得天正故用之也律候氣之管中猶應也孟春氣至則太蔟之律應應謂吹灰也律厯志太蔟族奏也言陽氣太奏地而達物也東風拆甲萬物光輝草木初生曰甲易天地解而雷雨作雷雨作而百果草木皆甲拆西京雜記董仲舒曰太平之世風不搖條開甲破萌而已時維哲人尚書哲人惟刑無疆之辭天錫純嘏詩天錫公純嘏眉夀保魯恭惟某官氣鍾溫厚德禀中和化洽甘棠接京師而蒙潤郭伋傳帝勞之曰賢能太守去帝城不逺河潤九里冀京師并蒙福也威行若木環瀚海以無波淮南子扶木在陽州日之所曊建木在都廣衆帝所自上下日中無景呼而無響蓋天地之中也若木在建未西末有十日其華照下地初學記北海大海之别有瀚海霍去病傳封狼居胥山禪於姑衍登臨瀚海如淳曰瀚海北海名韓詩外傳成王時有越裳氏重三譯而朝曰吾受命國之黃髮曰久矣天之不迅風雨海之不波溢也三年於兹矣意者中國有聖人乎盍往朝之當羲仲之授時見前宜魯侯之燕祉詩魯侯燕喜令妻夀母宜大夫庶士邦國是有既多受祉某又觀新厯真是陳人見前有椒其馨莫遂樽罍之捧東坡詩童子遙知領襦袴使君先已洗樽罍如松之茂姑伸竿牘之恭莊子小夫之知不離苞苴竿牘代回王廬州柟廬州春秋時屬舒戰國時屬楚秦為合肥縣漢分立廬江國東漢為合肥侯國仍𨽻九江郡又更為淮南國合肥𨽻焉魏晉為重鎮宋齊皆為廬江郡地梁改合肥為汝隂郡尋改為合州隋改合州為廬州以廬江名舊經云古廬子國此蓋惑於應劭之說非也又引左氏云自廬以往振廪同食此乃中廬之地去合肥逺矣煬帝改為廬江郡唐為廬州宋因之宋史王柟字汝良大名人祖倫使北死孝宗訪其孫調通州海門縣尉韓托胄以恢復起兵端天子思繼好息兵凡七遣使無成續遣方信孺往議垂成以忤托胄得罪顧在廷無可使者乃遣柟㑹托胄已誅柟持金人牒歸求托胄函首易淮陜侵地從之周公謹齊東野語云柟使金一日金人問韓大師何如人柟盛稱其忠賢威略彼徐以邉報示之曰如汝言南朝何故誅之柟窘懼不能對於是無厭之求難塞之請皆不敢與校以為脫身之計當時有題詩於侍從宅曰嵗幣頓增三百萬和戎又送一於期無人說與王柟道莫遣當年冦凖知亦一時公論也金主嘗令引南使觀忠繆侯墓且釋云忠於為國繆於為身詢之為托胄也按秦檜主和王倫出使胡忠簡請斬檜以謝天下時皆偉之托胄主戰倫之孫柟復出使竟函韓首以求和是和者當斬而戰者亦不免於死一是一非竟何如哉天回北斗新太史之授時公羊傳注昏斗指東方曰春指南方曰夏指西方曰秋指北方曰冬周禮太史正嵗年以序事頒之於官府及都鄙地重南巢慶元侯之受祉方輿勝覽堯世巢父即巢之耆艾也書稱成湯放桀於南巢左傳文公十二年楚人圍巢襄公二十六年吳伐巢昭公九年城巢即今巢縣也恭惟某官三槐襲組東坡三槐堂銘序故晉國王公顯於漢周之際歷事太祖太宋文武忠孝天下望以為相而公卒以直道不容於時蓋嘗手植三槐於庭曰吾子孫必有為三公者已而其子魏國文正公相真宗皇帝享其福祿榮名者十有八年半竹分符見前虎豹之皮和戎既寧諸夏左傳無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以請和諸戎無終山戎即今北直𨽻遵化縣子爵也嘉父戎君孟樂戎臣魏莊子魏綘也又魏綘曰勞師於戎而楚伐陳必勿能救是棄陳也諸華必叛注諸華中國猶諸夏也詩民勞箋京師者諸夏之根本苕之華箋京師以諸夏為障蔽刑法志內尊天子以安諸夏注諸夏中國之諸侯也夏大也言大于四夷和戎事見題下鴻鴈之民安宅咸與為春詩鴻鴈于飛集于中澤之子于垣百堵皆作雖則劬勞其究安宅詩序鴻雁美宣王也萬民離散不安其居而能勞來還定安築之至於矜寡無不得其所焉此指金人歸淮陜侵地一氣始和三靈錫羡揚雄傳上獵三靈之流如淳曰三靈日月星垂象之應也美盛貌封禪書大漢之德沕潏曼羡某無由捧爵還復烹魚分北果之甘芳又勤實篚篚府尾切廣韻方曰筐圓曰篚策也通作棐應劭漢書注方曰箱隋曰篚隋圜而長也愧東華之塵土僅有空函東坡詩軟紅猶戀屬車塵注戲語有西湖風月不如東傘軟紅塵土殷浩傳溫將以浩為尚書令遺書告之浩欣然許焉將答書慮有謬誤開閉者數十竟達空函梁武帝紀是馳兩空函定一州矣代回臨江洪寺簿伋臨江已見夏正建寅三陽簇逹春風拆甲萬物光輝俱見前天惠仁侯韓文今天幸惠仁侯日綏景福詩以享以祀以介景福恭惟某官世濟其美政鼓以和擁朱轓二千石之榮令行庭户後漢書輿服志中二千石二千石皆皂蓋朱兩轓韓文令修庭户數日間而人自得於湖山千里之外環清江十萬户之衆家有袴襦方輿勝覽南唐吳鸞以蕭灘之地當南粵䖍吉袁洪四會之衝編氓訴牒不及官事人夫辦集愆期唐主從其請遂取髙安及新喻建安之三鄉為清江縣屬洪州又置筠州以清江縣𨽻焉宜介始和益裒多祉詩既多受祉某濫班朝綴莫旅賀綦佩犢帶牛願懋循良之績龔遂傳民有帶持刀劒者使賣劒買牛賣刀買犢曰何為帶牛佩犢林鴉櫪馬式諧㑹合之期見前代回史吉州定之吉州已見陽春有腳又新象魏之頒見前函夏無塵正倚螺江之重函胡南切陸雲詩函夏無塵海外有謐顔延之赭白馬賦知函夏之充牣螺江即贑江吉州城北十里有螺山南臨江上宛委如螺或曰昔有漁忽遇風雨見神螺光彩五色取而懷之至山下涉水螺失所在俗呼為螺子山又螺湖在吉州西北而東流入贑江宋王庭􅀈詩鷺洲盤地軸螺浦㵼天津白鷺洲亦在贑江中恭惟某官氣全溫厚政協中和息潢池之干戈自溫襦袴龔遂傳陛下赤子弄陛下之兵於潢池中耳潢胡光切說文積水池左傳潢汙行潦之水服䖍曰畜小水謂之潢水不流謂之汙周語塞川原而為潢汙注小曰潢大曰汙厚晉陽之保障豈盡繭絲晉語趙簡子使尹鐸為晉陽請曰以為繭絲乎以為保障乎簡子曰保障哉尹鐸損其户數注繭絲賦稅保障蔽捍也小城曰保禮記遇入保者時維泰亨見前坐應鼎吉易鼎元吉亨王注革去故而鼎取新取新而當其人易故而法制齊明吉然後乃亨某備員朝綴申屠剛傳武帝時相許昌等皆以列侯繼踵􅐅􅐅亷謹為丞相備員而已儒林傳文學掌故補郡屬備員師古曰云備員者示以升擢之非藉其實用也莫簉賀綦簉初救切齊飛順疾也唐書簉羽鵷鷺佩犢帶牛願挽河而洗甲宋王楙野客叢書云吳曽漫録云杜詩有洗兵馬末云安得壯士挽天河淨洗甲兵長不用案說苑武王伐紂風霽而乘以大雨散宜生諫曰此非妖與王曰非也天洗兵也僕觀梁簡文詩洗兵逢驟雨送陳出黃雲裴行儉碑曰洗兵諾真之水刷馬草心之山此皆有洗兵之語所謂挽天河語子美之前罕聞李晟廟碑雨洗天兵風貍虜魄張說詩貫索挽河流林鴉櫪馬㑹列炬以盍簪見前代回李封州煥封州即今肇慶府之封川縣本漢蒼梧郡廣信縣地梁置梁信縣及梁信郡兼置成州隋平陳郡廢改成州曰封州改梁信縣曰封川大業初以封興縣省入尋改州為蒼梧郡治封川縣唐復為封州天寶初改臨封郡乾元初復為封州宋紹興中封州廢以縣屬德慶府尋復置元為封州路後復為州今屬肇慶府分符北闕見前宅牧南郊尚書宅乃牧又宅南交騎竹交迎不問瀧岡之吏東觀漢記郭伋為并州牧行部到西河美稷有童兒數百各騎竹馬於道次迎拜劉知幾史通難曰漢時方伯儀比諸侯其行也前驅競野後乘塞路彼草菜稚子齠齔童兒安能犯騶駕凌襜帷首觸威嚴自陳襟抱其不可信一也又方伯按部舉州振肅至於墨紱長吏黃綬羣官率彼吏人顒然佇候兼復行李有程憩息有所安得輕赴數童之期坐失百城之望其不可信二也夫晉陽無竹古今共知假有傳檄他方蓋亦事同大夏訪諸商賈不可多得况在童擩彌復難求其不可信三也按竹馬事引用已多子𤣥丈辨而雋故特著之書末瀧音雙奔湍也俗謂水湍浚為瀧愚謂粵水行山澗中多懸崖倒峽而下至險峻處則謂之瀧初無定所昌黎所問則昌樂瀧耳詩云南行逾六旬始下昌樂瀧險惡不可狀船石相舂撞往問瀧頭吏潮州尚幾里行當何時到土風復何似驛梅逺寄已知嶺表之春荆州記陸凱與范曄相善自江南寄梅花一枝詣長安與曄并贈詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春廣志大庾嶺上梅花南枝已落北枝方開寒暖之候異也恭惟某官服襲典刑發舒政術自為單父技已敏於割雞說苑宓子賤治單父彈琴身不下堂單父治巫馬期亦治單父以星出以星入日夜不處以身親之而單父亦治巫馬期問其故宓子曰我之謂任人子之謂任力任力者勞任人者佚及試海沂才益新於展驥王祥傳徐州刺史吕慶檄為別駕委以州事政化大行時人歌之曰海沂之康實賴王祥蜀志龎統守來陽令在縣不治免官魯肅遺先主書曰龎士元非百里才也使居治中别駕之任始當展其驥足耳兹宣寬札出領臨封封州唐為臨封郡諒因報政之來史記周公世家伯禽受封之魯三年而後報政太公亦封於齊五月而報政即遂立朝之願某凋零嵗月㸃綴星辰綴音惴說文合著也世說司馬太傅夜坐於時天月明淨歎以為佳謝重答曰意謂乃不如微雲㸃綴東坡詩雲散月明誰㸃綴張九齡詩葉作參差發枝從㸃綴新白樂天詩㸃綴佛髻上合為七寶冠杜詩聽履上星辰逺方雙魚不盡相酬之意見前人生五馬願牧自飬之功易觀頥觀其所養也自求口寶觀其自養也疏自養有節則是其德盛也代回孫衢州子直衢州已見頒象魏之法仗蔟春旗杜詩春旗蔟仗齊凝燕寢之香服先夏甸帝王世紀天子畿方千里曰甸服禹貢五百里甸服時維竹使文帝紀初與郡守為竹使符天錫茨禧茨音慈朱氏曰茨言密比詩君子至止福祿如茨恭惟某官躬綰左符東坡詩橫空好在修眉色頭白猶堪乞左符化行右翊漢書地理志左馮翊右扶風注故秦內史武帝建元六年分內史為左右太初元年更名左內史為左馮翊右內史為右扶風朞年而變莫不頌而歌之諸侯之風未有速於此者詩序鵲巢騶虞之德諸侯之風也有開鳯厯杜氏通典少昊摯之立也鳳鳥適至故鳥紀為鳥師而鳥名鳳鳥氏厯正也注鳳鳥知天時故以為厯正之官㑹出鶯喬唐孟寧詩羣鶯共喜新遷木蒯希逸詩鶯谷新遷碧落飛某束緼力微韓詩外傳齊有隱士東郭先生梁石君當曺相國為齊相客謂匱生曰夫東郭先生梁石君世之賢也隱於深山終不絀身以求仕吾聞先生得謁曺相國願為之先臣里母相善婦見疑盜肉其姑去之告於里母里母曰安行今令姑呼汝即束緼請火去婦之家曰吾犬爭肉相殺請大治之姑乃追還去婦故里母非談說之士束緼請火非還婦之道也然物有所感事有可通何不為之先匱生曰請盡力為東郭先生梁石君束緼請火乃見曺相國曰臣之里有夫死三日而嫁者有終身不嫁者則將奚娶相國曰娶不嫁者匱生曰齊有東郭先生梁石君隱於深山終不絀身求仕相國娶婦欲娶其不嫁者取臣獨不取不仕之臣耶於是相國因匱生束帛安車迎東郭先生梁石君又見漢書蒯通傳文小異互見前盍簪願切見前建牙開府阻斟酌于椒花魏志典韋初平中張邈舉義兵韋為士屬司馬趙寵牙門長大人莫能勝韋一手建之後漢滕輔祭牙丈敬建髙牙神武攸託餘見前上齒習鄉猶徑從于棠䕃禮記元日習射尚功習鄉尚齒代回紹興黃尚書由紹興已見黃由長洲人孝宗朝舉進士第一纍官刑部尚書兼直學士院侍御史張巖奏其植僞黨與遂奉祠嘉定間起為浙東安撫使仍官刑部尚書兼直學士院卒贈少師條風應節和生元帥之幢易緯立春條風至幢傳江切釋名童也其狀童童然也吳志陸遜討丹陽賊帥費棧遜乃益施牙幢鼓譟而前黃帝出軍决有所征伐作五采牙幢樺燭朝天光映尚書之履樺燭見本卷代回畢安撫條恭惟某官德儀震動道協泰亨與物為春又騰歌于襦袴並見前履端之始行促覲于冕旒杜詩九重閶闔間宫殿萬國衣冠拜冕旒某擬學桃符東坡詩退歸擬學舊桃符阻稱椒斝杓攜龍角已旋北斗之魁並見前身到鳯池即解東風之凍宋張唐卿進士第一人登科期集於興國寺題詩句於壁曰一舉首登龍虎榜十年身到鳳凰池有人續云君看姚曄并梁固不得朝官未可知後果終於京官姚曄梁固真宗朝狀元唐卿仁宗朝狀元代回趙湖州湖州已見嵗行在午咢布方新咢逆各切說文譁訟也爾雅徒擊鼓謂之咢詩或歌或咢孫炎云聲驚咢也律厯志咢布於午互見前斗指于寅棣通伊始棣音替律厯志正月乾之九三萬物棣通族出於寅孟康曰棣謂通意也是惟君子之道長見前實應諸侯之化行詩序鵲巢騶虞之德諸侯之風也又汝墳遵化行也文王之化行乎汝墳之國恭惟某官才應時須山谷詩少年出補父兄處公自才力應時須又持此應時須美全世濟水晶宫冷已回襦袴之溫見代回魏湖州條金鑾殿髙即奉冕旒之對王子年拾遺記瀛洲南有金鑾之觀兩京記大明宫有金鑾殿殿旁坡名金鑾坡翰林故事置東學士院於金鑾坡續翰林志德宗移學士院於金鑾坡上五代㑹要殿因金鑾坡以為名與翰林院相接李白傳召見金鑾殿論當世事衛次公傳與鄭絪皆召金鑾殿建議立順宗宦者傳召學士李程王涯等至金鑾殿草刮陸扆傳天子金鑾作賦命學士和扆先成李詩著書獨在金鑾殿某濫竽幕掾韓非子齊宣王使人吹竽必三百人南郭處士請為王吹竽宣王說之廪食以數百人宣王死湣王立好一一聽之處士逃一曰韓昭侯曰吹竽者衆吾無以知其善者田嚴對曰一一而聽之竊䕃甸侯見前一紙十部之肯臨已慚倒置劉宏傳得劉公一紙書賢於十部從事詳見前韓信傳大王乃肯臨臣莊子喪己於物失性於俗者謂之倒置之民四方六客之併至更慰俄空苕溪漁隱云吳興郡圃有六客亭即公擇子瞻元素子野令舉孝叔時公擇守吳興也東坡又云余昔與張子野劉孝叔李公擇陳令舉楊元素㑹於吳興時子野作六客詞其卒章盡道賢人聚吳興試問也應傍有老人星凡十五年再過吳興而五人皆已亡矣時張仲謀與曺子方劉景文蘇伯固張秉道為坐客仲謀請作後六客詞云月滿苕溪照野堂五星一老鬬光芒十五年閻真夢裡何事長庚對月獨悽涼緑鬢蒼顔同一醉還是六人吟笑水雲鄉賓主談鋒誰得似看取曺劉今對兩蘇郎代回鄰州倅龍杓回次協豐茂之嘉辰天文志杓攜龍角詳見前律厯志豐茂於戊說文茂木盛也鳯厯紀元新隆平之美號宋寧宗開禧四年改元嘉定嵗在戊辰終軍傳宜因昭時令日改定告元發嘉號於營邱以應緝熙其在溫溫之德詩溫溫恭人維德之基宜膺啿啿之祺見前恭惟某官剛體震亨道偕泰長召棠蔽芾拓函夏以無塵拓闥各切增韻斥開也陸雲詩辰咎重光協風應律函夏無塵海外有謐湘芷芳菲散陽春而有腳芷香草說文楚謂之蘺晉謂之䖀齊謂之茝離騷經扈江蘺與辟芷佇蔟青旗之仗杜詩春旗蔟仗齊趣歸紫禁之朝謝莊丈掩彩瑶光收華紫禁駱賓王詩紫禁終難呌朱門不易排杜詩青春復隨冠冕入紫禁正耐烟花繞某賦分朱愚莊子不知乎人謂我朱愚知乎反愁我軀負丞黔鄙栁文黔巫東鄙東風解凍不能消華髮之霜髙蟾詩人生莫遣頭如雪雖得春風亦不消南嶽焉依安得聽清談之露杜詩爽氣金天豁清談玉露繁佇鳴南嶽鳳欲化北溟鯤賀史通判湜嵗臨赤奮日月初躔爾雅太嵗在丑曰赤奮若律厯志玉衡杓建天之綱也日月初躔星之紀也互見前律動青陽地天交泰見前式對豫環之慶荀子召人以瑗絶人以玦反絶以環楊倞注古者臣有罪待放於境二年不敢去與之環則還與之玦則絶皆所以見意也栁詩長捐楚客珮未賜大夫環又賜環留逸響五馬助征騑亟催鳴玉之班邱遲表飛翠鳴玉出入禁門恭惟某官和與春融剛排冬凛大君有命復進司棘寺之平易大君有命開國承家小人勿用鄭氏綺談大理曰大棘張釋之傳廷尉天下之平也天下無怨行即報草扉之鞠于定國傳張釋之為廷尉天下無寃民文選鞠茂草於圜扉詳見前不但蔟青旗之仗見前又將開白獸之樽見賀遊提刑條某方竊鄰光西京雜記匡衡勤學而無燭鄰舍有燭而不逮衡乃穿壁引其光以書映而讀之忽聞召節禮記凡君召以三節二節以走一節以趨舉頭而見白日羡君即近於長安韓詩騎驢到京國欲和薰風琴豈識天子居九重鬱沉沉遷延乍却走驚怪靡自任舉頭見白日泣涕下霑襟晉書明帝紀幼而聰哲為元帝所寵異年數嵗嘗坐置膝前屬長安使來因問帝曰汝謂日與長安孰逺對曰長安近不聞人從日邉來居然可知也元帝異之明日宴羣僚又問之對曰日近元帝失色曰何乃異問者之言乎對曰舉目則見日不見長安由是益竒之側身而上青天笑我方趨于昧谷李詩蜀道之難難於上青天側身西望長咨嗟尚書宅西曰昧谷代回敖宗簿寧宗慶元五年嵗在己未嵗躔協洽仰參長烈之常爾雅太嵗在未曰協洽帝王世紀自井十六度至栁八度曰鶉首之次於辰在未謂之協洽於律為㽔賓斗建在午烈當作列史記天官書叶洽嵗嵗隂在未星居申以六月與觜觹參晨出曰長列昭昭有光利行兵月旅孟陬俯應大來之泰爾雅正月為陬楚辭攝提正於孟陬增韻孟陬即東北隅也恭惟某官溫溫秉德啿啿受祺見前九關已驗於氣衝宋玉招魂虎豹九關啄害下人些杜詩秀氣衝斗牛三殿何求于風引西京雜記金鑾西南曰長安殿長安北曰仙居殿仙居西北曰麟德殿此殿三面故以三殿名唐三殿即麟德殿也一殿而有三面故名開元元年引吐蕃使宴於三殿杜審言有蓬萊三殿侍宴詩李庾西都賦啓九重開三殿齒羣官於次坐召公族於內宴佇對蒼龍之礎禮記孟春之月天子居青陽左個乘鸞路駕蒼龍注馬髙八尺以上為龍礎創所切說文礩也韻㑹楹石也集韻柱下石也亟開白獸之樽見前某甫欲修容禮記曽子與子貢入於其廄而修容焉注更莊飾栁文修容於轅門之外躡履於油幢之前已蒙惠翰舊梅如夢小違千里之辰旌新棨行春即下十行之卯詔代回南康章僉判攀南康已見春回青陸正月之吉始和爾雅春為青陽續漢書日行東陸謂之春水泛紅蓮諸福之物畢至南史庾杲之字景行王儉用杲之為衛將軍長史安陸侯蕭緬與儉書曰盛府元僚實難其選庾景行泛緑水依紅蓮何其麗也時人以入儉府為蓮花池故緬書美之董仲舒傳諸福之物可致之祥莫不畢至恭惟某官器資溫厚政術融明畫諾從容行趣葵丘之戍黨錮傳汝南太守范孟博南陽宗資主畫諾左傳齊侯使連稱管至父戍葵邱瓜時而往曰及瓜而代笑談辦治飽尋廬阜之游張敞傳武必辦治梁矣尹賞傳四子皆至郡守皆尚威嚴有辦治名廬山在南康城北十五里周武王時有匡俗兄弟七人皆有道術結廬於此山中仙去廬在故曰廬山太史公亦嘗登廬山白樂天草堂記廬山奇秀甲天下當此履端宜其鼎盛鼎方也賈誼傳天子春秋鼎盛某未由削櫝猥辱貽緘列炬盍簪又見嵗華之換見前染雲翦水莫酬頌語之工回史郡僉文舒庚寅孟陬協建寅之夏正見前甲子昧爽轉拆甲之春風尚書甲子昧爽注昧冥爽明早旦魏書李業與傳立甲子元厯甲為日始子實天正命歷置元宜從此起易天地解而雷雨作雷雨作而百果草木皆甲拆疏孚甲開拆莫不解散仁賢履之吉祥萃止伏惟某官德潛剛克和配陽休正其所為王道之端云爾董仲舒傳臣謹按春秋之文求王道之端得之于正次王次春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云爾惠而不費仁言之利溥哉左傳齊景公問晏子曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之景公為是省於刑君子曰仁人之言其利溥哉踊尹竦切說文跳也一曰刖者以之接足官師無廢于相規尚書官師相規工執藝事以諫福祿適觀于來下詩公尸燕飲福祿來下疏為神所饗福祿來下而與之某幸同聯事良感贈言荀子贈人以言重于金石珠玉說苑贈人以軒不若贈人以言兩鬢霜濃難望東風之解凍見前一犁雨足願歸南畝以躬耕卜式傳雅行躬耕注躬耕于野不求名利餘見前回見任官羲和之賔春日復出嵎夷見前甘石之占嵗星適臨益部史記正義七録云甘德楚人戰國時作天文八卷史記天官書昔之傳天數者在齊甘公魏石申夫周禮大司樂疏引石氏星經說文引甘氏星經是甘石並有星經也周禮保章氏以十有二歲之相觀天下之妖祥注歲謂太歲歲星與日同次之月斗所建之辰也歲星為陽右行於天太歲為隂左行于地十二歲而小周其妖祥之占甘氏歲星經其遺象也使星入益部事屢見有如百祿之總是在同官之良恭惟某官德叶陽休氣排冬凛笑於莵絶維之去迎玉兔以長生於音烏菟音徒左傳楚人謂虎於菟或作􅂒亦作檡漢書敘傳楚人謂虎為於檡今雲夢縣有於菟鄉蘇子由守歲詩於菟絶繩去顧兔追龍蛇奔走十二蟲羅網不及遮抱朴子兔壽千歲滿五百則色白傅咸擬天問月中何有玉兔搗藥興福降祉杜詩入河蟾不沒搗藥兔長生此言前歲寅今歲卯對櫪馬盍簪之喧依金鴉而髙翥鴉當作鴉翥章恕切音與著同說文飛舉也韓詩金鴉既騰翥六合俄清新共餞梅邉之臘亟催花底之朝杜詩退朝花底散某自顧陳人見前又看新厯東坡詩老去怕看新厯日但希善類進聨茅茹之征見前庶遂寒踪退托桃符之換王荆公詩千門萬户曈曈日總把新桃換舊符東坡詩退歸擬學舊桃符回寄居鄉官太嵗在辛令既先於三甲尚書辛壬癸甲易先甲三日注先甲三日辛也詳見前吉日維戊春豫撫於五辰詩吉日維戊既伯既禱鄭箋戊剛日也言吉善之日維戊尚書撫于五辰庶績其凝孔傳順撫五行之時有如鄉大夫之賢周禮鄉大夫之職各掌其鄉之政教禁令宜介王正月之慶春秋春王正月恭惟某官氣鍾溫厚德備中和𠂻紱懷章暫飬旦評之望許邵傳邵與從兄靖俱有髙名好共核論鄉黨人物每月輒更其品題故汝南俗有月旦評焉餘見前彯纓澤笏行催元㑹之朝通典漢髙帝七年長樂宫成制諸侯羣臣朝賀儀後漢嵗首正月為大朝受賀魏晉以後損益不常荀朂正大㑹行禮歌詩於皇元首羣生資始履端大享敬御福祉肆覲羣后爰及卿士欽順時財允也天子餘見前三陽茅拔以茹連百祿竹苞而松茂俱見前某自慙政拙潘嶽閒居賦孝乎惟孝友于兄弟此亦拙者之為政也陽城傳撫字心勞征科政拙竊藉里仁一榻延徐孺子之來又勤銜袖徐稚傳陳蕃為太守在郡不接賔客唯稚來特設一榻去則縣之陳蕃傳郡人周璆髙潔之士前後郡守招命莫肯至唯蕃能致焉字而不名特為置一榻去則懸之五鼓推謝令尹之去所願歸田鄧攸傳吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯挽不來謝令推不去詳見前張衡有歸田賦東坡詩投竿因障日賣劍行歸田又世事飽諳思縮手主恩未報恥歸田山谷詩聞道省郎方結綬可容名士乞歸田後山詩升沉有流轉且復賦歸田回衆官袖啓庚寅孟陬度適符於皇覽楚辭攝提貞于孟陬兮惟庚寅吾以降皇覽揆余于初度兮肇錫余以嘉名皇皇考覽覩也甲子朔旦夀將邁於降人律厯志武帝元封七年復得閼逢攝提格之歲中冬十一月甲子朔旦冬至日月在建星太歲仕子左傳晉悼夫人食輿人之城杞者絳縣人或年長矣無子而往與於食有與疑年使之年曰臣小人也不知紀年臣生之歲正月甲子朔四百有四十五甲子矣惟言行得雷風之常易雷風恆君子以立不易方則吉亨應地天之泰易泰小往大來吉亨則是天地交而萬物通也伏惟某官氣排冬凛仁叶春融從容以和體東風之解凍尚書寬而有制從容以和洵美且直契北斗之回杓詩不如叔也洵美且好宜裒啿啿之祺式對溫溫之德見前某幸同寮宷爾雅宷寮官也郭璞曰同地為宷同官為寮疏云寀采也采取賦稅以供過辱頌言老我陳陳但願學桃符之退王荆公詩老我孤主恩結草以為期陳後山詩老我何所懷食貨志太倉之粟陳陳相因師古曰陳謂久舊也杜牧之詩誰覺老陳陳東坡詩退歸擬學舊桃符諸公衮衮幸早從樺燭之朝杜詩諸公衮衮登臺省白樂天早朝詩月堤槐露氣風燭樺煙香詳見前代回諸縣嵗躔協洽厯稽長列之常史記天官書叶洽歲歲隂在未星居申以六月與胔觹參晨出曰長列爾雅在未為叶洽李巡曰陽氣欲化萬物故曰協洽協和也洽合也互見前月旅孟陬卦應大來之吉見前時維茂宰少陵送趙明府之任詩連城為寶重茂宰得才新李詩天子思茂宰天枝得英才李嘉祐詩吏曹難茂宰又題詩招茂宰坐擁啿祺恭惟某官德並陽休氣排冬凛並見前藹然政譽續花縣之風流晉潘嶽為河陽令植桃李花人號曰河陽一縣花庾信枯木賦若非金谷滿園樹即是河陽一縣花李詩河陽花作縣秋浦玉為人後漢書周賈徐姜申屠列傳序故列其風流區而載之注言其清潔之風各有條流黃瓊傳髙心潔行激揚風流藉甚除音漏柳條之消息陸賈傳名聲藉甚子康曰言狼籍甚盛杜詩侵凌雪色還萱草漏泄春光有柳條亟飛鳬舄王喬傳喬河東人顯宗世為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳬從東南飛來於是候鳬至舉羅張之但得一雙舄焉乃詔上方診視則四年中所賜尚書官屬履也或云即古仙人王子喬也劉向列仙傳王子喬周靈王太子晉也應劭風俗通義論楚葉公子髙忠於社稷惠恤萬民及其終也葉人追思而立祠此乃春秋之時何有近孝明乎太子晉自豫知其死後世傳稱其仙名生而實死也太史寺令丞躬親靈臺何有伺一飛鳬建祠其處世之矯誣豈一事哉進簉鵷行簉初救切齊飛順疾也唐書簉羽鵷鷺杜詩空慚鵷鷺行某自是陳人又逢新厯尺書寄鯉愧􅐹記之不先揚雄傳因江潭而􅐹記兮列炬散鴉尚餘光之見及杜詩列炬散林鴉戰國策願君以餘光振之詳别見回外縣官葦桃倚户正月之吉始和見前椒柏浮觴賢人之德可久繫辭可久則賢人之德可大則賢人之業凡吾同志即日異除恭惟某官氣協陽休功多隂隲尚書惟天隂隲下民孔傳隲定也天不言而默定下民培溫植厚夙存有孚惠之心易益九五有孚惠心勿問元吉有孚惠我德王注以誠惠物物亦應之噓枯吹生共勉不忍人之政鄭泰傳孔公緒清談髙論噓枯吹生撫辰凝績尚書撫于五辰庶績其凝視履考祥見前某辱託為僚又逢改嵗詩曰為改歲所使承流宣化也尤謹履端董仲舒傳今之郡守縣令民之師帥所使承流而宣化也同寅協恭和𠂻哉當蒙終惠見前回學職士人杓攜龍角魁枕參維史記天官書北斗七星所謂旋璣玉衡以齊七政杓擕龍首衡殷北斗魁參首注衡斗衡也魁斗第一星也言北方斗斗衡直當北之魁枕于參星之道北斗之杓連于龍角氣轉鴻鈞嵗躔益部天文志自畢十二度至東井十五度為實沈於辰為申魏之分野屬益州其在藻芹之秀詩思樂泮水薄采其芹又思樂泮水薄采其藻聿觀茅茹之連見前恭惟某人文艷春葩山谷詩窮年抱新書挽條咀春葩香浮秋桂百步楊葉不難鵰鶚之穿戰國策楚有養由基善射去楊葉百步而射之百發百中枚乘傳養由基楚之善射者也去楊葉百步百發百中楊葉之大加百中焉可謂善射矣杜詩舊穿楊葉真是知東坡詩穿楊自笑非猿臂李廣傳是必射鵰者也文𨽻曰鵰鳥也故使善射者射之師古曰鵰大鷙鳥也一名鷲黑色互見前三月桃花即看鵾鵬之化韓詩外傳二月桃花水之時鄭國之俗於溱洧兩水之上拂除不祥溝洫志來春桃華水盛必羡溢有填淤反壤之害師古曰月令仲春之月始雨水桃始華蓋桃方花時既有雨水川谷氷泮衆流猥集波瀾盛長故謂之桃華水耳而韓詩傳云三月桃華水反壤者水塞不通故令其土壤反還也周王裒四瀆祠碑銘桃花春水靈草孤洲陳張正見詩櫂折桃花水帆橫竹箭流隋薛道衡詩桃花長新浪竹箭下奔流水經注鱣鮪出鞏穴三月則上渡龍門得渡為龍矣否則㸃額而還莊子北冥有魚其名曰鯤化而為鳥其名曰鵬不負月評之望見前即先天老之題天老黃帝臣河圖挺佐輔曰黃帝召天老問曰余夢見兩龍挺白圖以授余於河之都不知其理敢問于子天老曰河出龍圗雒出龜書天其授帝圖乎黃帝乃齊祓七日天老五聖皆從以游河雒之間至于翠媯之淵大魚泝流而至與天老跪而迎之五色畢具天老以授黃帝舒視之名曰録圖韓詩外傳黃帝未見鳳凰惟思其象乃召天老而問之曰鳳象何如天老對曰夫鳯象鴻前麟後蛇頸而魚尾龍文而龜身燕頷而雞啄戴德負仁抱中挾義張衡傳師天老而友地典注帝王紀曰黃帝以風后配上台天老配中台五聖配下台謂之三公杜詩天老書題日春官驗討論注天老宰相也春官禮部也某方欲修辭先勤委贄習鄉尚齒何幸陪庠序之申禮記元日習射尚功習鄉尚齒重席說經尚幾見賢能之獻東觀漢紀戴憑為侍中正旦朝賀帝令羣臣說經義不通者奪其席憑遂重五十餘席詳見前周禮鄉老及鄉大夫羣吏獻賢能之書于王回學職庚寅孟陬適合靈均之初度楚辭名余曰正則兮字余曰靈均餘見前甲子朔旦共希絳縣之老人見前未祓賀箋祓音拂周禮祓除其心注猶拂也司馬相如傳祓飾厥文已勤慶語伏惟某官陽休山立隂隲天通列炬合簪不但習鄉而上齒鳴佩澤笏行當重席以講經並見前亟看紫禁之鶯花杜詩紫禁正耐烟花繞何羡𤣥都之燕麥劉禹錫再逰𤣥都觀詩序余貞元二十一年為屯田員外郎時此觀未有花是歲出牧連州尋貶朗州司馬居十年召至京師人人皆言有道士手植仙桃滿觀如紅霞遂有前篇以志一時之事旋又出牧今十有四年復為主客郎中重逰𤣥都觀蕩然無復一樹唯菟葵燕麥動搖於春風耳某又看新厯直是陳人聽櫪馬之喧真難立仗觀土牛之送但願歸耕俱見前回李祕校叔璋元日之至人日未果修辭郭緣生述征記魏東平王翕七日登壽張縣安仁峰鑿山頂為㑹望處刻銘于壁曰正月元七厥日維人策我良駟陟彼安仁北史魏收傳魏帝宴百僚問何故名人日皆莫能知收對曰晉議郎董勛答問禮俗云正月一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人時邢邵亦在側甚恧焉杜詩元日到人日未有不隂時氷雪應難至春寒花較遲按宋永亨搜采異聞録云東方朔占書歲後八日一為雞二為犬三為豕四為羊五為牛六為馬七為人八為榖謂其日晴則所主之物育隂則災八日為榖所係尤重而人罕知者故書之新年之勝故年反勤善頌山谷詩但使新年勝故年即如常在郎罷前味雙鱗之佳甚見前抽獨繭以報之陸倕漏刻銘微若抽繭六一居士集問其别後學初若繭抽緒列子以獨繭為綸司馬相如傳曳獨繭之䄖袣郭璞曰獨繭一繭絲也女仙傳園客常種五色香草忽有五色蛾集其上收而薦之蠶出以香草飼之得繭百三十枚大如甕每一繭繅六七日乃盡山谷詩園客繅絲抽萬緒又王子吐佳句如繭絲出盆東坡詩獨繭長繅女媧笙老叨賦抽獨繭之長繅伏惟某官胄出兩河爾雅兩河間曰冀州僑游四蜀僑旅寓也巴蜀黔漢為四蜀謫仙霞佩飄然春樹之天韓詩李杜文章在光焰萬丈長又乞君飛霞珮與我髙頡頏杜詩白也詩無敵飄然思不羣又渭北春天樹江東日暮雲長吉錦囊亂若桃花之雨李賀傳每旦日出騎弱馬從小奚奴背古錦囊遇所得書投囊中未始先立題然後為詩如他人牽合程限者及暮歸足成之母使婢探囊中見所書多即怒曰是兒必嘔出心乃已耳李賀將進酒歌況是青春日將暮桃花亂落如紅雨琢句宜供于帖子荆楚歲時記立春日帖宜春字於門王沂公皇帝閣立春帖子云北陸凝隂盡千門淑氣新年年金殿裏寶字帖宜春溫公日録翰林書待詔請春詞以立春日剪帖於禁中門帳皇帝閣六篇其一曰漠然天造與時新根著浮流一氣均萬物不須雕琢巧正如恭己布深仁皇后閣五篇其一曰春衣不用蕙蘭薰領緣無煩刺繡紋曽在蠶宫親織就方知縷縷盡辛勤夫人閣四篇其一曰聖主終朝親萬機燕居專事養希夷千閣永畫春岑寂不用車前插竹枝隱居詩話溫成皇后初薨㑹立春進帖子是時歐陽修王瑀同在翰苑以其虛閣故不進俄有㫖令進王瑀遽口占一首云昔聞海上有仙山煙瑣樓臺日月閒花下玉容長不老只應春色勝人間歐陽公嘆其美麗荆楚歲時記立春日悉剪綵為燕以戴之王沂公春帖子云綵燕迎春入鬢飛輕寒末放縷金衣歐陽公云共喜叉頭燕已來鄭毅夫詩春殿鬬簪雙綵燕併知春色上叉頭夢華録立春日百寮皆賜幡勝周美成春帖子云鸞輅青旗殿閣寬祠官奠璧下春壇曉開魚鑰朝衣集綵勝飄揚百辟冠王初寮詩二年白玉堂揮翰供帖子風生起草臺墨㸃澄心紙袖箋猥及于衰翁杜詩江濤萬古峽肺氣久衰翁盧綸詩可憐歌酒夜相對兩衰翁山谷詩轉蓬相半世交臂各衰翁某閲嵗又新守藩亡狀嚴助傳臣安幸得為陛下守藩史記夏本紀鯀之治水無狀索隱曰言無功狀章帝紀刺史明加督察尤無狀者注無狀言其罪惡尤大其狀無可寄言故云無狀他皆類此同姓也同業也何必勤五朵之雲韓文同姓而近也同業也韋陟傳自謂所書陟字若五朵雲俱詳見前勿勞乎勿誨乎所願拜一盂之水龎參傳拜參漢陽大守郡人任棠有竒節參到先候之棠不與言但以薤一大本水一盂置戶屏前詳見前謝蹇校正伏以丹鉛㸃勘借重良多韓詩丹鉛事㸃勘朱墨縱橫遣書未暇周書蘇綽傳綽始制文案程式朱出墨入及計帳户籍之法有勤謙施施始鼓反易地中有山謙君子以裒多益寡稱物平施見賀履端謙履卦名八千嵗之為春何敢當噓枯之意莊子上古有大椿者以八千歲為春八千歲為秋後漢書鄭泰傳噓枯吹生斗升水之活我所祈廣貸粟之仁莊子莊周家貧往貸粟於監河矦曰周昨來有中道而呼者顧見車轍有鮒魚焉曰我東海波臣也君豈有升斗之水而活我哉詳見前回李監酒景初詳啓意為埋宗紹定四年歲在辛卯元辛之號重光天回西顧禮記天子乃以元日祈穀於上帝注謂以上辛郊祭天也爾雅太歲在辛曰重光秦宓傳張溫問曰天有頭乎宓曰有之溫曰在何方宓曰在西方詩曰乃眷西顧以此推之頭在西方剛卯之稱單閼日麗東迎王莽傳正月剛卯金刀之利皆不得行服䖍曰剛卯以正月卯日作佩之長三寸廣一寸四方或用玉或用金或用桃著革帶佩之今有玉在者銘其一面曰正月剛卯晉灼曰剛卯長一寸廣五分四方當中央從穿作孔以采絲葺其底如冠纓頭㽔刻其上面作兩行書文曰正月剛卯既央靈殳四方赤青白黃四色是當帝令祝融以教䕫龍庶疫剛疸莫我敢當爾雅太歲在卯曰單閼杜詩遲日江山麗史記迎日推策亨在泰通祥因履考俱見前恭惟某官清材蔟逹世說裴景聲清材律厯志太簇族奏也言陽氣大奏地而逹物也懿識規圜律厯志春蠢也物蠢生乃動運木曲直仁者生生者圜故為規也蒼璧絶瑕彌聳旦評之望月令孟春之月服蒼玉瑕何如切說文玉小赤也聘義瑕不掩瑜注瑕玉之病也疏云按字林瑕玉小赤而云病者以瑕與疵瘕字義同故云青旗蔟仗行登元㑹之班月令孟春之月載青旗衣青衣東坡詩春旗蔟仗齊諒對于菟顧兔之交見前回見任官條益介食蛤踞龜之夀淮南子若士乃倦龜殼而食蛤蜊王充論衡若士食蛤蜊之肉乃與民同食安能升天某尚稽賀牘過辱頌言所願歸田正有望土牛之送不堪立仗詎敢希櫪馬之喧並見前四六標準卷三十九
