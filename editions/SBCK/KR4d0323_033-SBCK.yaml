front:
  text: 三十三
  hash: sha256:e1447d0e02b86af74470b9fcb5c114196034cac7a9351ce6d65c975595ad47bc
body:
  text: 宰通寜鄉周知縣堟絃歌愛人願效縣公之役㑹計試吏冐干簿正之供是非尋常之託根請裁四六而張本恭惟某官人門具美天分素髙家聲早著於魁三世德不專於爵一安劉必勃破操在瑜學配前聞肯俯貪於蝸蚓律設大法謂徑掣於鯨鯢居然婆娑尚此盤礴得非堅車大艦利用逺遊寕有巨棟脩梁驟堪轉致頗聞三異具見一同非百里材姑繞蟻封而試馬為萬乗器㑹扛龍鼎以函牛長沙令之讀五車綴班雖晩洛陽生之對半夜趣召可期某學不踰人飢來驅我苦乏長裾之飛譽姑從矮屋以立身先達者為之前定包荒於後輩大事則從其長足藏拙於小官冐然而來恃此不恐人果不可無勢豈矜駕御之能士安得獨自髙尚假比隣之庇通崇仁曾宰頴秀曉行湘水我方尋欸乃之歌春静巴山君來賦蒍于之曲非鈎魴之厚味漫致鯉於長鬚恭惟某官忠恕家傳倫魁世業恢恢游刃如錐之處囊中在在彯纓皆羅而致幙下適通玉籍屈綰銅章頋避譚公之維􅀻不云贛水之可厲維寳唐之􅄶邑固麻谷之舊􅀖錦製此來綉行甚寵攺邑不攺井易地則然有土此有財得人焉耳奉潘輿其孔迩馳魏闕以非遙某兩鬢白紛􅃗身墨隱昨班文石不能誨館下之諸生今戍武岡幸不失黔中之上佐出晝尚遟於三日受滕願託於一㕓操韓子赤縣之權晉妄干於薄少荒鄭䖍蒼苔之屋尚見芘其歸來代回常寕曹宰輔丗不稼取禾我謾持於漢槖及􅀲代戍公已趣於曹裝一介惠然􅀟鱗厚甚恭惟某官百里為令三年有成不求赫赫之名見思所去雖聽鼕鼕之􅎏有挽無推交章翕然增秩近只佇公矦之必復豈州縣之徒勞某骯髒雲司超騰水部㑹且歸矣不當戀仗馬之芻行或使之猶復見飛鳬之舄回武岡許縣令大用强顔貳郡慙非典午之材箝尾為僚喜有同寅之幸曽修辭之未暇辱垂問之相先恭惟某官精神五兵肝膽一劒積月書於右序已播英聲奉天對於左廬更登峻級方西北二邊之未靖何東南一尉之足淹行矣章交亟其王覲某無能教胄頋使轉丞􅀟鯉得尺素書良勤垂念從一騎踔五百里即遂承顔回武岡薛縣令仲庶聞三鳳之聲未皇識靣聽􅀟鳬之舄良喜足音尺書惠然三復感甚恭惟某官材優世用學贍家傳蚤安枳棘之棲簿為之兆継領桁楊之寄民自不寃亟為製錦之謀可見鳴弦之志惟此黔巫之鄙異乎江浙之間下若牛馬上若熊羆從昔少人而多石大不鯨鯢小不虺蜮乃可宣化而承流公行勿遟民望攸属某凄凉半刺僥倖同寮欸乃一聲定樂薛存義之至紞如五皷幸遄鄧伯道之來析幸良多敷宣㒺既回綏寕野令杓榮離霧隱出宰雷封維今巫水之磻雖云巖邑在昔夫夷之長固有聞人恭惟某官闕里故家良弓宿學三仕為令從知學製之精萬里封矦行見弃繻之勇兹來蒔竹已及戍􅀲下若牛馬上若熊羆飽看竒壯大不鯨鯢小不虺蜮正藉撫摩某典午非材同寅有幸許丞重聽猶能聞欸乃之一聲鄧矦肯來諒不俟紞如之五鼓回武岡許令教胄本朝乆歸來於茅屋負丞支郡偶及代於􅀲期夙聞戍削之標將托寅恭之契未皇􅐹記先辱撝謙伏惟某官氣禀沉雄性資果毅對擒胡之月盍策勲名戴作孫之星頋勞撫字佇民庸之入奏承天寵以遄歸某倚席不材題輿非據貳郡長縣固脣齒之相依體國愛民願腹心之無隱代回丹徒姚知縣宰山水之縣知在近郊聞弦歌之聲未瞻逺器敢圖􅐹記施及汎貟恭惟某官籍甚人門巋然地望善刀出匣其孰嬰紫電之鋒結綬登畿頋斜取青雲之勢多景誰如於北固瓣香寕舍於南豐聮云攺一兹操權於赤縣姑歛惠於黔氓繭絲乎保障乎定知緩急魴魚也陽橋也决有後先􅀟鳬之舄翩然五鳳之酺近止某畫墁無補巢幕奚為望金堂石室之間無因而至感綉叚瓊英之贈藏去為榮代回江隂何宰處博送紙上之軒昻皆我輩語就暗中而摸索乃吾家有味其言不知所賀恭惟某官人門具美天分仍髙日食萬錢盍追隨於伯父地方百里何局促於子男聊継益昌之功名即見中牟之除寵某日之夕矣人謂斯何乗興而來漸有回舡之意同姓為近空餘推轂之情回成都吕知縣大全箝尾青油之幕那暇笑談傾心赤縣之官鼎來材傑聞舄鳬之近只得書鯉而躍然恭惟某官渭釣名家蜀珍粹望恢乎遊刃豈難解盤錯之根飛不盡翰殆欲培扶摇之翼盍班玉筍頋擁璧蒲士元非百里之材便應别駕成都有萬事之好是在長官錦製奏功綈緘入覲某全提迂拙冒渉險艱舍嵩印一室之書無能為役投成華兩縣之間何處有詩代回新昌詹宰継孤鶴重來恍難尋於舊侣􅀟鳬西望猶未廢於故情相贈以言足華其老恭惟某官早持雋望見謂通材學道愛人固自不妨割雞之用治中别駕亦何足為展􅂹之謀種桃李於春風接蓬萊之雲氣去天尺五孰云多而不揚擊水三千願少安之無躁某崦嵫日薄嶰谷地寒簮筆甘泉聊爲覆蕉而尋夢挂冠神武豈湏叢桂之移文代回趙萍鄉彦達名駒千里夙聞佳公子之聲烹鯉尺書未忘舊令尹之好方當執熱如對調氷恭惟某官逺泒天潢早梯月窟卓犖千萬人之敵足亢磐石之宗低回三十載之間始入金閨之籍楚萍如斗陶桞皆春不惟吏泗而民咷料亦庭空而旅實尔􅀽得游庠序又見賢君天使亦好官貟恐成故事某自慙揚粃安有憇棠老鶴乗軒可笑翅翎之短飛鴻踏雪空驚指爪之留代月湖回吳宰囦振履光臨属辭寵賁靖共正直得之眉宇之間雅健雄深粲然毫楮之上君言雖過我心則降恭惟某官敏手决科洗心從政盤根而别利器游刃砉然促柱則少和聲鳴絃自若頗聞鑊湯茗椀之句仍見髯翁稚子之詩已窺一斑復尋尺素六察六院本以待邑最之來三沐三熏决不在時材之下某過勤委重莫可報嘉逢人而説項斯當無回隱作書而見子布徒取嘲嗤回塩官林知縣申懐赤縣之章聞將引綬依緑水之幕行或望塵未遑名姓之通猥沐緘縢之寵恭惟某官風猷膚敏業履端温􅂎梓之材異材是冝作室瑚璉之器何器而使在山板輿欲覧於王畿蒲璧故來於京邑切聞潮浪頗蝕邑封必欲種河陽之花不若楗淇園之竹行􅀚驅鰐亟遂飛鳬某賛畫非材厎寮有幸癡公事未了也正懼􅘃官新令尹仁矣乎當期儆誨回李知縣庭可雀羅辱再三之相遇門無鳯字有四六之見貽委重良多報嘉不腆恭惟某官器資肅括才具碩膚祭彤方果於鉏姦即墨遽從而造毁令尹無愠色亟歌歸去之詞童子有仁心迄動巡行之歎再試巖邑四達通衢人疑故歩之迷君若新硎之發吏才如此難逃六察六院之除公論則然何假一話一言之賛某􅃡懐先德幸接後塵力足為器足施非所求於我也問則告疑則辯敢有吝於公哉代回俞知縣剡升陟之章真成備數鳴謙撝之德更費屬辭受之過情謝若爲語恭惟某官槐根之芷蘭茁其芽窮武陵之源吾爲尔宰歌滄浪之水清畏人知意有雉馴可無鶚薦某過勤四六嘉歎再三雖則七㐮覺成章之匪報儉於百里願賦政之又新代回弋陽曽知縣煥剌手拔鯨欠丁官之下取長鬚致鯉與甲藁以偕來不謂垂槖而歸將有埒國之冨恭惟某官汲古得綆績文有機夜雨聽阿房之篇英詞偉甚春風接曲江之席舊夢瞭然謂已方駕於蓬萊乃猶讀書於松桂古風一覧恍今日之未聞大冊載觀尤小生之所畏贈我綉叚多矣期君蟠桃可乎某何與斯文亦聿既髦角巾東路諒無煩関尹之迎瓣香南豐請歸為宗􅂀之賀代回餘姚趙知縣希祐聞武城之弦居多逺韻剡公車之牘輒及通材嘗試言之無可謝者恭惟某官月題千里風翮九霄鯉趍過庭早有聞於夫子虎拜稽首將是似於召公觀其製錦之操刀足可衣綉而持斧參諸衆見僣以名聞蓋欲俻良師帥之儲非止託賢父兄之契某重蒙四六熟復再三舉之愛莫助之更期進德老矣無能為矣何敢獻䛕代回長沙楊宰冝中不鄙雀門見迂鳬舄特枉咫尺書之教仍惠二百篇之詩拜賜便蕃滿心衘戢恭惟某官清材汲古奥識洞今作賦摩空阿房之搢笏已晚聞弦莞笑長沙之短袖難旋禹稷用心固已失薛郇蘇郭之輩孔顔素學猶不廢房杜王魏之流至於佳句之耽更覺良工之苦取數多矣受言藏之此士落江湖冝為時出諸公登臺省㑹以名聞某何與斯文亦聿既髦龍鍾韓子低頭負東野之慙刻畫無塩捧心漫西施之學代回當陽林宰鎰老夫耄矣曳履可慚令尹何如飛牋見問恭惟某官名父之子克世其家學裘之功已深寜能無譜製錦之技既敏㑹即䇿勳某自笑龍鍾寜堪鳩僝空憐往日識野鶴於未仙猶幸殘年見名駒之汗血代回麗水張宰元渙西崦投閑冒誤恩之起廢南鄰借潤駢好語以嘘枯返璧未能報瓊何有恭惟某官人門秀整地望髙華鳬未來京花已開於滿縣蝗不入境麥自熟於兩岐行用最聞即膺世選某髮真種種心已休休懼方命之見誅聊强顔而入侍不能者止更數月以乞歸倘疾其驅或一靣而後去代回常寜曹宰輔世老夫耄矣誤隨弓旌之招令尹何如更加錦綉之贈寘慙無所懐感有之恭惟某官抱挾長材踐揚膴仕展􅂹足於百里料亦賢勞缺鹿鳴之三章猶稽改秩權勢逼迫無患有司不公政化流聞惟善能舉其類蠖伸於屈鵬怒則飛姑安種秫之期以俟及􅀲之代某儀圖莫助有味薦賢借聽於聾求道於盲莫報勤渠之意加膏而光養根而實更伸頌禱之私代回興寜廖宰槻飛鴻踏雪談舊事以無人烹鯉得書喜故人之有子因之喚夢何以報嘉恭惟某官父教之忠世濟其美早回翔於簿領似屈鸞棲稍剸决於紏曹諒多鶚薦頋動鳴絃之興欲明製錦之材㑹觀棠䕃之成亟騰善最雖在梅花之外必有賞音某夕陽在山浮雲出岫咫尺之問乃蒙篋笥之不遺千里所期願以民社而日愛回家知縣午仲妻生日某不腆糟糠值此瓦磚之旦何勤翰墨燁然黼黻之詞調固仰於弥髙歌亦慙於不類同我婦而饁南畒但切懷歸􅉥彼女之織七襄竟成匪報回新西水勾龍知縣僮僕來迎知已返柴桑之里舍館未定無敢過干木之閭敢圖將進趑趄之間竟蒙先垂特達之頋恭惟某官蜀都秀望漢殿巍科跨躡犍䍧良鬱康莊之􅂹歩鞭笞鸞鳳乆棲官舍之燕巢兹聞西水之鳴琴行趂東風之叱馭劒門天下壯諒皆収檻於胷中閬州城南稀更合包羅於筆下藉未召卓茂於宻令㑹有言茍変於衛矦某兹戍雪邊在公宇下置漢陽之薤方當求聽於鯁言種河陽之花又恐亟飛於鳬舄回新榮德王知縣子勉倦甚衰翁已作歸歟之計賢哉令尹甫聞至止之音有勤屬辭良髙陳誼恭惟某官才優世濟學富家傳頌聖主之得賢遥遥風烈移忠臣而為孝挺挺雲仍若為牛刀之割雞更欲蟻封而試馬三榮之强名郡縣井有仁焉兩年之括利錙銖泉之竭矣或恐一雞之損尚俟􅀟鳬之來幸疾華鑣以别利器某﨑嶇一障坎􅇄兩朞秋水落霞巳决尋盟於鷗鷺春雷奮地尚􅀚運化之魚龍回王知縣應酉求士爲國輙剡牘於公車博我以文敢収恩於私室一謙厚甚三復悚然恭惟某官學問渊􅀷器能凝逺揚雄有河東之賦吹嘘冝上於九天温造空兾北之羣羅致敢違於三月兹表一鶚聊助􅀟鳬何勤四六之貽更致再三之謝某推轂有味引鼎不程諸侯薦人與之諸侯安敢自必於天子國士遇我報以國士所祈自拔於衆人回遂寕青石席知縣伏以十年一别謂已造於筍班萬里重來胡尚淹於花縣逺勤一介見畀􅀟鱗恭惟某官政地名家祖風餘韻故國之非喬木將在蘭蓀大厦之無弃材寕遺􅂎梓頋限七階之選復疇百里之庸㑹由晉興徑登魏闕某去此十暑依然一寒不虞再辱於陶甄俾守三榮之堡障紙書賢於十部過勤聮璧終日之牋雖則七㐮終愧􅀟金之報回盤石李知縣一麾假守獲託鄭鄉十部貽書過勤郇翰愧先施之不敏仰厚意以安窮恭惟某官唐太白之家蜀仲元之沠麟為聖人出也亦既在郊鳯覧徳輝下之是冝巢閣頋屈一同之尹式騰三異之聲君子學道愛人亮牛刀之立解縣令承流宣化佇鳬舄之橫飛某濫號專城適逢竭澤是邦大夫之賢者何以教之吾黨小子之斐然願有請也回劒門王知縣分榮德之麾濫乗一障聞湛恩之閥實冠四封未遂盍簮猥勤貽翰恭惟某官人門具美天分夙髙此笏乃今甘棠式光􅀛組故國非謂喬木蓋在象賢藉魁竒忠信之才守峥嶸崔嵬之險佇交鶚薦徑作鳬飛某濫剖銅符獲依珂里未見顔色願聞拔薤之規聊欲弦歌尚迩伐柯之則回新應靈趙知縣與佩瞻五潢之􅂀知敬清流懐百里之章將迎新尹有勤一介先畀􅀟鱗恭惟某官大雅不羣小宗継别精石渠五經之學豈必秘鴻寳之藏酌玻瓈七寶之盃自合受龍巾之寵乃肯宰山水之縣殆欲聞絃歌之聲一同驩然三異近只某濫兹試郡幸甚得朋似聞製錦之刀既有所試更冀發硎之刃早疾其驅回三縣知縣出幕罔功一星周矣分符非據二火燁然頼有同官之良或可聮事而治伏惟某官揆才膚敏迪德浚明學古入官小試子男之國凝民以政共知父母之心佇交一鶚之章即趣􅀟鳬之覲某濫兹假守幸甚爲僚共惟帝臣正頼同心之恊濟頗哀老子諒無䄂手以旁觀回資官文知縣無嚴諸侯必反之君方養勇與老人期後何也僕欲踐言比立青紫囊以馳欲易黄皂衣之擾不虞返斾更自寒盟同僚敢不盡心特関大躰未信以為厲已姑示小懲兹望白圭之磨且聽青氊之復信近於義言可復也已更寛期㑹之程過而能改善莫大焉幸無詫催科之拙回新冝賔黄知縣慥恭審榮分蒲璧入覲蘭陔牛刀割雞更遡倒流之三峽鳳簫駕鶴來寕未老之􅀟親喜氣先驅歡聲夾道恭惟某官器資膚敏業履崇谹讀江夏未見之書盍登東觀講延平相傳之學冝侍西廂若為出邾子之城還又宰􅈎侯之國烏殆思於反哺燕亦急於歸梁種滿縣之花聊復尔耳采行潦之藻其順矣乎付談􅀏於青油養聲名於丹闕鴻漸于陸不素飽也正佇來儀鶴鳴在隂其子和之何辤好爵某蹣跚老矣踸踔依然但深吾愛吾廬之思濫叨我任我輦之役所幸依闑外之制且獲聞庭下之趍悵銅駞陌上之十年獲金馬坊中之再見莫懐漫刺驚辱儷箋數靣成親况嘗綴葭莩之契論心道舊所願聞藥石之言忻幸惟􅀷敷棻㒺既回崇仁趙知縣鄰枌榆之社聞飛禮樂之英宰松桂之林知報詩書之政萬里偶馳於蜀道一㕓實受於滕仁未皇馳箋猥辱委翰恭惟某官不羣卓尔無敵飄然熏南豐之香文章有種樂東平之善性行無瑕摘髭俯拾於巍科䇿足冝騰於要路留連栖鳳邂逅飛鳬當師旅飢饉之餘得賢明慈惠之長佇交鶚表徑上鴛行某弱念易盈老形已具我任我輦誤令直指以觀風吾愛吾廬但願曲肱而飲水惟是玉川之破屋仰依蒲邑之茂林易地則然行亦返曾子之室得人焉耳㑹當聞言偃之弦回丹稜范知縣乙孫眉州荀監酒辯之眉州李監税喆甫山壘終更已上投閑之請江鄉改牧莫知誤渥之由方露悃以控辭荷雲牋之委貺恭惟知縣人門具美天分素髙暫紆臺閣之登屈試絃歌之政監酒典刑茂著學問􅀷醇差池宦路之老成主當糟丘之醲郁監稅器質凝粹學業端􅀷巍峩名第之英淹䘏征啇之榷恢恢才刃足立解於千牛整整華鑣可坐空於萬馬佇公車之交剡即要路之疾驅某五技已窮再鼓愈淡已乞歸銅陵之磴或許告還倘共飲玻瓈之江尚希愛助回青神權縣嚴縣丞酉聞蜀莊之珍幸於既見見韋郇之牘得所未聞報不成章還若為贄恭惟某官岷峨峙秀江漢濯靈貢鄉英門率出下風之請以春秋對亟膺上計之招居然全材屈此賛府有來寄箋於紫袷知既攝宰於青衣佇奏一同之庸亟登三異之最躡故跡破崖岸端使然哉馳閶闔入凌兢自此升矣某濫更治將遂爲僚昌􅀺接後輩之名何爲至我藍田愁羣山之望行又見君回新神泉史知縣大川依美蓉之幕甞辱贈言宰松桂之林未皇執訊兹守鳴珂之里過蒙投璧之光恭惟某官器宇宏􅀷丰神峻整陽休山立克世金魁之家玉潤氷清近續符溪之學暫牛刀之小試即鶚表之交飛論坡頴歐蘇之交旣聞耳矣嗣嚴楊陳李之鄉尚寓目焉某未果避堂先蒙枉駕拜関睢五章之貺真盈耳以洋洋歌白駒一束之詩無遐心而皎皎回新都史知縣季温聞武城之歌未窺半靣讀阿房之賦敢靳一言粗欲無患其不公敢兾有文以相接恭惟某官玉壘名閥金魁故家文勝質質勝文不難百勝學優仕仕優學信是兩優戰青􅂁白紵之中鏗緑綺黄鍾之韻比見天地人之䇿本本元元可知果達藝之材恢恢焯焯漫尔吹河東之賦俾之空兾北之羣某叨領竹符獲依枌社於我本無怨而無德詎敢収私室之恩贈行不以頌而以規更願直大庭之對梅亭先生四六標凖巻之三十三梅亭先生四六標凖巻之
