  - {type: variant, offset: 0, length: 1, content: 欽, SBCK: 之四舉科目謝劉閣學光祖舉節操方正可備獻納科遠客從軍自分塵埃之内近臣薦士許司雨露之邊以仞墻則未窺且尺牘之不貢敢謂暗中之摸索忽􅂪送上以吹嘘此難求之今人斯可稱曰知己竊以爲臣止於敬皆有陳善閉邪之心事君致其身豈無明目張膽之志自方正爲賢良之號而獻納㱕侍從之班視嘉言罔伏之時無不諫亦入之意然元祐十科之創建不落第三至紹興五載之選掄以此居一蓋象龍亦有致雨之理而存羊實餘愛禮之心儻非其人難稱此意如某者學未聞道年不後人好論古今未離舉子之習氣儳説得失不過處士之大言本浪爲錦城雪嶺之觀乃輙與祈山天水之役空有幕中之辯竟無堂上之奇誰誤聽聞忽􅂪論薦我於辭命則不能也謾稱春藻之葩人之彦聖其心好之浪許秋竿之節平生失在小丈夫之悻迺今亦有大君子之知所可貴者遇大賢韓子所以賀侯喜不待求而後施德栁侯於是感崔卿不謂古心復見今世兹蓋伏遇某官四朝壽俊一世儒真本本元元所學皆周孔之學孜孜汲汲此心即禹稷之心胷中風月之無邊筆下源泉之不擇使天下之大老二盍歸乎來則匈奴之長技三亦何所措方居家而爲善思報國之以人若爲控地之飛亦入牋天之剡某敢不圖惟報稱益自激昂待以國士待以衆人何敢作厠中之報不負天子不負所學庶免爲門下之羞謝李參政壁舉獻納科塵纓解􅅞方將發興於雲山宗衮垂褒欲使司存於雨露喜固多於溢美耻乃在於過情其殆無私之私豈容不德其德竊以士無賢不肖均欲希一世之知德不孤有隣亦樂道諸人之善蓋近來仕進之徑蓋罕由薦舉之門心肯命通厎勞介紹言甘幣重自有寅縁宗臣之考十科本爲何事冡宰之計羣吏不出此途遂令牋天之章僅作畫地之餠然某所見與衆則殊樂莫樂􅀆相知止願出大賢之門下得不得之有命寕湏啇小利於禇中矧如不腆之蹤可謂所持者狹識字有数學何有於多聞了事亦癡才豈周於庶務質不足以望粹然之器文不足以窺作者之藩宜諸公臺省之登任此士江湖之落莽誰欺於鑒裁羌忽累於明揚方正乃賢良之稱必名門而後稱獻納盖侍從之事豈俗吏之能爲况去國十三年之餘閱人多矣今起家二千石之薦舉丗觀焉不應凡材猥玷異目此蓋伏遇某官清朝良弼名丗真儒錬色石以􅀘天親揮九日觸佞山而還里坐閱一星甫尋川路之風煙適值岡巒之烽火内嚴殄捕外示招懷賊憚崇文之名若杵投臼民誦西平之子惟我有臣俊乂冝在於旁招巧拙猥容於雜進有如庸下亦備数中某敢不勉自激昻圖惟稱塞有吏才更丗事愧非臨川老子之倫絶當世追古人敢忘眉山端明之薦謝任尚書希夷舉著述科上命公以納言甫膺隆委公報上而薦士冝首異材是何濡滯出晝之人辱此吹嘘上天之賜名充著述實發兢慙某聞簡厥修簡其不修古不謂之恩地觀其主觀其所主近反類於市區然而推賢揚善之盛心乃是輔世長民之元氣眇然一世知此幾人司馬公請建十科本爲何事崔祐甫盡除羣吏不假此途謾勤爲天啓齒之勞間有畫地作餅之笑如僕所見與衆則殊盖伯牙之絶朱弦特爲知者如虞卿之取白璧是有命焉第令収名}
