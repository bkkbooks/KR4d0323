  - {type: variant, offset: 15902, length: 7, content: 杜詩川合東西瞻, SBCK: 給餉光華六轡之􅁝諒對剛辰益綏純嘏恭惟某官盛名晝永清徳氷明弩矢前驅見流錢於地上撨􅂫後㸑如梜纊於軍中厎績懋哉歸班近只某濫聮筆槖阻奉椒觴君子占一陽之來當體復亨之動王人序諸侯之上即膺晉錫之蕃代回林緫領祖洽冬陽月終更慶一陽之亨復福星出}
