  - {type: variant, offset: 13773, length: 283, content: 智算若囊槖之盛物也魯㳟傳祖父匡有權數號曰智囊干寶晉書桓範出赴曹爽司馬宣王謂蔣濟曰智囊往矣濟曰駑馬戀棧豆爽必不能用也王充論衡劉歆漢朝智囊筆墨淵海高僧傳支謙月支人游漢境博覽經籍時人為之語曰支郎眼中黃形軀雖細是智囊白氏六帖云樗里子癭多智號曰智囊又云杜預多智人號智囊釋常談云患癭者謂之智囊史記樗里子癭而多智時人號為智囊又杜預亦有癭也今按史記樗里子傳止言滑稽多智不言患癭晉書杜預亦無智囊之目但云呉人知預病癭憚其智計以瓠繫狗頸示之惟新唐書李義府傳云王德儉癭而智豈指癭為智囊耶晉書載記慕容垂欲伐慕容永曰吾投老叩囊底智足以尅之列子渤海之東有大壑焉實惟無底之谷山谷詩書囊無底談未了是宜, SBCK: 冝}
