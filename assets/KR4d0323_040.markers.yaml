  - {type: variant, offset: 15883, length: 0, content: '', SBCK: 八能旣滋羣動敬五刑以成三德冝介百祥恭惟某官同寅恊恭分職率属各抱黄鍾之器韻共司丹筆之簡書佇積平反入儀華要某濫因聮事獲慶踐長一道氷衘猥辱先施之寵五色雲物願迎方至之休代回程監丞凖冬灰浮緹縵新北臺太史之占雲卧衣裳添南極老人之壽恭惟某官襟懷霜㓗談􅀏春温未老得閑飽味桑榆之暖乆静思動佇儀槐棘之班某莫捧兕觥過勤魚素蒲萄一㪷知公不爲於凉州嶰竹数聲在我頓忘其寒谷代回王寺丞庭芝冬陽德由子而孳地氣上騰善􅀋􅀚復之亨天休滋至恭惟某官沉潜剛克消息時偕手縮䄂間復添補衮之線春回井底巳驗浮緹之灰對此令辰冝其遐福某適拘旅􅃈莫綴賀綦鳴鳳聽筩應九天之詔下拂􅀛端䇿驗七日之朋來代回江東李制帥大東冬七日來復可知天地之心千里折衝實頼詩書之帥道隨剛長政與和俱恭惟某官德配}
  - {type: page-break, offset: 15883, content: '', id: KR4d0323_SBCK_040-11b}
