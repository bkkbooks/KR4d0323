  - {type: variant, offset: 5, length: 7168, content: 二十二宋李劉撰總領總領財賦古無其官宋靖康末髙宗以大元帥駐軍濟州命隨軍轉運使梁揚祖總領措置財用然未以名官也南渡初嘗命朝臣總領都督府宣撫司財賦建炎末張浚甪趙開總領四川財賦始置所繫啣總領官始此紹興三年差戸部侍郎姚舜明徃建康府總領應于都督府錢物糧斛六年都督張浚言三宣撫司錢糧漕司互相占恡因至闕乏乞于戸部長貳内差一員來鎮江府置司專一總領詔差戸部侍郎劉寜止七年令户部郎官霍蠡前徃鄂州置局專一總領岳飛軍錢糧其後大軍在江上間遣版曹或大府司農少卿調其錢糧皆暫以總領為名而四川改置都轉運司故總領又廢紹興十一年諸將既罷兵乃收諸帥之兵以為御前軍屯駐諸處皆置總領以朝臣為之仍帶專一報發御前軍馬文字盖又使之與聞軍政不獨職餽餉而已敘位在轉運副使之上鎮江諸軍錢糧淮東總領掌之建康池州諸軍錢糧淮西總領掌之鄂州荆南江南諸軍錢糧湖廣總領掌之興元興州金州諸軍錢糧四川總領掌之賀牛都大除總領大年知榮州作宋史牛大年字隆叟揚州人慶元二年進士歴官將作監主簿遷軍器監主簿大宗正丞四川提舉茶馬兼權總領知黎州兼管内安撫司公事節制黎雅州屯戍軍馬加直寳章閣為工部郎官遷侍左郎中進直文華閣浙東提㸃刑獄守秘書少監宗正少卿升秘書監遷起居舍人升起居郎兼宗正殿說書以寳章閣待制提舉太平興國宫卒大年清操凛然所至以亷潔自將中興小厯紹興十年侍御史汪勃請置四川總領治利州結知宸扆扆音倚說文戸牖之間謂之扆新唐書馬燧傳帝賜宸扆台衡二銘以言君臣相成之美改領餉臺說文餉饟也爾雅饁餉饋也廣韻自家之野曰餉或作饟史髙帝紀老弱罷轉饟千里餽糧有饑孰堪將指見前六計以亷為本疇可易公周禮少宰之職以聼官府之六計弊羣吏之治一曰亷善二曰亷能三曰亷敬四曰亷正五曰亷法六曰亷辯注聼平治也平治官府之計有六事弊斷也既斷以六事又以亷為本先言亷後言善能之等故知以亷為本也成命風馳驩聲雷動恭惟某官𢎞深而肅括忠敏而篤誠見前為淮海維揚之俊人尚書淮海惟揚州杜詩淮海維揚一俊人金章紫綬照青春得伊洛入河之宗派尚書伊洛瀍澗既入於河孔傳伊出陸渾山洛出上洛山澗出沔池山瀍出河南北山四水合流而入河仁為己任此心即禹稷之心謹厥身修所學皆周孔之學尚書慎厥身修思永韓詩生平企仁義所學皆周孔安行塗轍動中和鑾崔豹古今注五輅衡上金爵者朱雀也口銜鈴鈴謂鑾所謂和鑾也月令乘鑾路注云有鸞和之節而飾之以青郭璞曰鸞鈴也在軌曰鸞在軾曰和五行志登車有鸞和之節名既震於京師法言谷口鄭子真不詘其志耕於巖石之下名震於京師才合居於給諌韓詩才名三十年久合居給諫行行且止避御史已播流聞皇皇者華遣使臣乃煩咨度並見前茗駿之登既羨謂都大提舉茶馬槐龍之對可占東坡詩風動槐龍舞交翠公自注邇英閣前有䨇槐摎然屬地如龍形詳見前留蕭相於關中且專餉事見前任武侯於渭上式敏戎功詩念兹戎功繼序其皇之注戎大也念此大功勤事不廢然劔閣雖曰峥嶸而崔嵬李詩劍閣峥嶸而崔嵬而益州實覺疲敝而危急出師表今天下三分益州疲敝此誠危急存亡之秋也䑛糠何止於及米呉王濞傳狧糠及米師古曰狧古􅜻字􅜻用舌食也盖以犬為喻也言初䑛糠遂至食米也􅜻食爾反放手寜恤於傷葵杜詩淘米少汲水汲多井水渾刈葵莫放手放手傷葵根人知罪嵗之徒然天遣福星之臨止東坡詩斯人乃福星遣徃虛危間詳見前序諸矦之上暫借重於王人見前折千里之衝即遄歸於政地詩式遄其歸某比縁井改易改邑不改井益覺困窮繫詞困窮而通比井益困四卦名雖飲冰食蘗以自將白樂天詩三年為刺史飲氷復食蘗然求牧與芻之未獲置郵傳命喜聞君子之得輿並見前升斗䟽㤙庶免波臣之涸轍莊子余東海波臣也文選滄溟未運波臣自蕩駱賔王詩揶揄慙路鬼憔悴泣波臣餘見前其為欣懌罔既敷宣賀黄運使除總領申内躋郎省外總餉臺西賔出幕之十年遂專主席班固西都賦西都賔問於東都主人栁詩若道栁家無子弟徃年何事乞西賔杜詩十年出幕府自可持旌麾東漕下車之三月盡總賦輿張衡傳下車治威嚴張酺傳下車擢用義勇周䊸傳下車先問大姓主名左傳群臣率賦輿為魯衛請注兵車也人歆錫命之蕃上恨用公之晩恭惟某官器資凝逺業履端温言行夙擇乎中庸名實久孚於上下頃嵗紅巾之變宋方勺青溪㓂軌云宣和二年睦州青溪縣人方臘託左道以惑衆自號聖公改元永樂置偏禆將以巾飾為别自紅巾而上凡六等宋史寜宗嘉定十二年三月興元軍士張福莫簡作亂以紅巾為號四月福入利州制置使聶子述遁殺總領楊九鼎掠閬州果州五月張福入遂寜府焚其城都統張威引兵捕福福入普州六月福請降張威執之七月福伏誅莫簡自殺紅巾賊悉平此紅巾指張福折衝白刃之間數進忠規刈葵惟恐其放手見上條縱無恩澤徙薪豈下於焦頭霍光傳曲突徙薪亡㤙澤焦頭爛額為上客耶共推江夏之無䨇再試潁川之第一維駒維騏維駱暫紓苞栩之飛並見前如熊如羆如貔孰飽樵蘇之㸑尚書如熊如羆如虎如貔孔傳貔執夷虎屬帝咨衆望僉曰公宜王人下視於諸矦有嚴天節並見前郎官上應於列宿肯歴土山明帝紀舘陶公主為子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里是以難之史記太㣲宫後二十五星郎位也唐新語晉宋以還尚書省置員外郎分判曹事唐朝彌重其選舊例郎中不歴員外選謂之土山頭景龍中趙謙光自彭州司馬入為大理正遷戸部郎中賀陟為員外乃戱詠之曰員外從來羙郎中望不優誰言粉署裏翻作土山頭謙光酬之曰錦帳隨時設金爐任意薫唯慙員外置不應列星文互見政令先庚而已孚軍民旁午以相賀田里愁恨歎息久已周知財貨本末源流尤皆宿講並見前皮不存則毛將安傅傅著也左傳皮之不存毛將安傳唇既亡則齒得無寒左傳諺所謂輔車相倚唇亡齒寒者其虞虢之謂也欲兵食兼足之沛然在制閫同心而已爾既無間秦越之肥瘠韓文若越人視秦人之肥瘠忽焉不加喜戚於其心何難圖韓范之功名韓琦范仲淹某百無一能億或屢中頃進總領甚稱之語葢在咨諏周爰之初兹聆除目之頒豈勝頓足之喜並見前惟榮之嵗租無五十斛而使所月觧近七萬緡昨賴管煎抱賣之贏用補大科帶補之欠近困井遷之後繫辭井居其所而遷榮州有公井難施箕歛之苛漢書頭㑹箕歛服䖍曰吏到其家人人頭數出穀以箕歛之井箕星名在小郡官兵既多空膓而大司符移尚理虚額巧但施於有麫並見前窮莫甚於無錐傳燈録去年貧無卓錐之地今年貧錐也無與物為春淮南子日夜無傷而與物為春注與物為春言飬物也望公如嵗左傳國人望君如望嵗焉嵗年數也今夕飲者恩明日按者法正累故人見前觀察急於賦刺史私於民頗哀老子韓文為刺史者恒私於其民不以實應乎府為觀察者恒急於其賦不以情信乎州馬援傳頗哀老子使得遨遊賀楊總領九鼎宋史寜宗嘉定十二年四月紅巾賊張福殺四川總領財賦楊九鼎詳見前升賢九列韋𤣥成傳注九列九卿也總賦兩川無踰老臣久望甲寅之報趙充國傳使御史大夫丙吉問誰可將者充國對曰亡踰於老臣者矣上書陳兵利害六月戊申奏七月甲寅璽書報從充國討焉互見前厥有成命足寛庚癸之憂尚書王厥有成命餘見前除目一傳滿口交慶除滿對恭惟某官資𢎞且毅器博而周觧十二牛而有餘才固髙於一世賈誼傳屠牛坦一朝觧十二牛而芒刃不頓者所排擊剝割皆衆理觧也師古曰坦屠牛者之名也事見管子繫千駟馬而弗視氣亦盖於諸公史記季布傳布弟李心氣盖闗中晉書王濟傳風姿英爽氣盖一時李詩大梁貴公子氣盖蒼梧雲陳後山詩才名四十年盛氣盖諸儒天使之為入蜀之星人以此愛如衰之日竝見前知彼知己漢中方務於養民孫子知己知彼百戰不殆不知彼而知己一勝一負不知彼不知己每戰必敗蕭何傳臣願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也擒賊擒王許下幾為之避地杜詩挽弓須挽强用箭須用長射人先射馬擒賊先擒王蜀志闗羽攻曹仁於樊曹操遣于禁助仁禁所督七軍皆沒禁降羽羽又斬將軍龎徳梁郟陸渾群盗或遥受羽印號為之支黨羽威鎮華夏操議徙許都以避其銳徒縁食乏遂致師還皇欲我公身任此事爰峻上卿之拜益都耆舊傳趙典為太常雖處上卿而布被瓦器俾專計相之權張蒼傳遷為計相師古曰專主計籍故號計相金掌月昇光無不燭見前玉闗夜閉守或有餘東坡詩終閉玉闗辭馬武聊寛西顧之憂即聽東歸之命某聳聞出綍竊喜得輿並見前敢問遲之遲長恐遭羣吠之恠禮記敢問遲之遲而又久何也栁文屈子賦曰邑犬羣吠吠所恠也可以速則速幸即遄四牡之驅通四川王總領鉛代董制置金郎宿之周天夙瞻景耀天官書太微内五星五帝座後聚一十五星蔚然曰郎位天文志南宫後聚一十五星曰哀烏郎位明帝紀郎官上應列宿唐韋叔諧與弟叔謙兄季武同省皆為郎中時號三列宿蘇味道詩逺從南斗外遥仰列宿文班固答賔戲含景曜吐英精曠千載而流光也望使星於蜀野行挹餘光戰國䇿甘茂謂蘇代曰臣聞貧人女與富人女㑹績貧人女曰我無以買燭而子之燈光幸有餘子可分我餘光今臣因君方使秦而當路願君以餘光振之駱賔王集分其斗水濟濡沬之枯鱗惠以餘光照孀棲之寒女又儻餘光之可照庶寒灰之復然李詩願假東壁輝餘光照貧女同是天涯白樂天琵琶行同是天涯淪落人相逄何必曽相識莫非王事欲抒方寸之悃太平御覽云徐庶母為人所執曰方寸亂矣今謂方寸為心似始乎此然列子巳嘗曰吾見子之心矣方寸之地虚矣可無咫尺之書恭惟某官器度崇谹典刑炳蔚江左風流之後代不乏人南史王儉傳作觧散幘斜挿簮朝野慕之相與放效儉嘗謂人曰江左風流宰相惟有謝安盖自况也襄陽耆舊之家世濟其羙習鑿齒有襄陽耆舊傳李詩襄陽耆舊幾人存王安石詩襄陽州望古為雄耆舊相傳有素風恬於再轉翻若一麾日近長安謂即登於金馬天通蜀道又出護於木牛惟闗中餽餉之功實海内安危之本樵蘇後㸑今多宿飽之師並見前弩矢前驅古有晝行之羙司馬相如傳縣令負弩矢先驅蜀人以為寵項藉傳富貴不歸故鄉如錦衣夜行行詠勞還之四牡佇觀趣侍於六飛袁盎傳陛下騁六飛如淳曰六馬之疾若飛也某起家單寒髙彪傳家本單寒蒙㤙優渥立朝已濫况塵六典之卿爾雅塵乆也注云塵垢稽久也試郡猶慙輙冐十連之帥周環四顧冐昧一來左傳子産曰晉楚將平諸矦將和楚王是故昧于一來詳見前惟方國奏十行之書妄希宣布後漢循吏傳其以手迹賜方國者皆一札十行細書成文王襃傳作中和樂職宣布詩注宣布者風化普洽無所不被諒王人序諸矦之上亦願將明刑法志有司無仲山父將明之材師古曰大雅蒸民之詩曰肅肅王命仲山父將之邦國若否仲山父明之將行也否不善言王有誥命則仲山父行之邦國有不善之事則仲山父明之故引以為羙傷今不能然也代囘趙總領不儳儳音䜛餉師天塹塹七艷切說文坑也廣韻遶城水也陳書都官尚書孔範曰長江天塹古以為限隔南比今日虜軍豈能飛度耶于湖居士集流柹投鞭䂓濟天塹楊廷秀揚子江詩天將天塹護吳間不數殽函百二闗晉秩月卿峙乃糗糧坐給列屯之衆尚書峙乃糗糧無敢不逮厲以爵禄宜登九州之先恭惟某官育徳忱恂掞材膚敏方公私之積可哀痛孰與阜通漢食貨志漢之為漢四十年矣公私之積猶可哀痛顧材貨之出有源流當加斟酌見前期年而變千里無饑韓信傳千里餉糧士有饑色載疇流馬之功宜進執羔之寵周禮射人掌國三公孤卿大夫之位其摯三公執璧孤執皮帛鄉執羔大夫執鴈某阻陪賀旅先辱撝謙旅謙卦名卿不同乎已升華於兖冕公歸無所㑹加畀於繡裳詩我覯之子衮衣繡裳又公歸無所於汝信處注王迎周公當以上公之服徃見之周公未得王迎之禮歸則無其住所故于汝東方信宿而處耳再宿曰信代董帥囘楊總卿交割崔與之傳成都帥董居誼以黷貨為叛卒所逐總領楊九鼎遇害蜀大擾榮駕駟車晉太康四年詔依漢故事給九卿朝車駕駟馬及安車各一乘遄開犀印司馬彪漢書二千石以下至四百石佩雙印皆以黒犀卿士惟月班通河海之間尚書王省惟嵗卿士惟月師尹惟日春秋漢含滋三公象五嶽九卿法河海二十七大夫法山陵謝承後漢書李淑諫更始曰夫三公上應垣宿九卿下括河海軍聲如雷驩溢闗山之外恭惟某官材𢎞且毅器博而周運斤成風觧全牛於四顧莊子郢人堊墁其鼻端若蠅翼使匠石斵之匠石運斤成風聴而斵之䇿轡奔電洗凡馬而一空王襃傳追奔電逐遺風周流八極萬里壹息何其遼哉人馬相得也皇咨分閫之勲史記馮唐傳上古王者之遣將也跪而推轂曰閫以内者寡人制之閫以外者將軍制之注此郭門之閫也門中橛曰閫正義曰謂門限也杜詩分閫救世用賢豪命亞執圭之位合東西而瞻使節共稱總賦之有人杜詩川合東西瞻使節地分南北任流萍分南北而立王庭何患勒銘之無日漢書幕南無王庭又絶大幕破寘顔襲王庭窮極其地沙鉢羅可汗建庭於睢合水謂之南庭吐陸建牙於鏃合山謂之北庭按宋史寜宗開禧二年䝉古却特特穆津起於鄂諾河稱青吉斯汗是為元太祖亟觀舍爵左傳凡公行告于宗廟反行飲至舍爵䇿勲焉禮也舍置也爵飲酒器也䇿勲書所出之功于䇿也舍爵即䇿勲言紀功之速也佇即歸班某有幸為僚又將徼福左傳君恵徼福於敝邑之社稷辱收寡君又寡君願徼福于周公魯公以事君又徼福于太公丁公又徼福于厲宣桓武又徼福于先君獻穆百里九十正倚同舟共濟之功戰國䇿詩云行百里者半於九十此言末路之難一日三秋願叱負弩前驅之效詩彼采蕭兮一日不見如三秋兮代囘趙總領不儳祥刑訓夏深愧曠官書序吕命穆王訓夏贖刑傳以穆王命作書訓暢夏禹贖刑之法事典司冬猥令率屬周禮六曰事典以富邦國又六曰冬官其屬六十掌邦事冐㤙有靦竊芘知歸恭惟某官給餉上流簡知中扆樵蘇宿飽知調度之賢勞周禮注均猶調度也䟽謂調之使依常度吳志陸遜傳今日乃知調度自有方耳蜀志譙周傳城守調度諸葛武矦傳臣身在外别無調度衮繡晝行佇詔書之趣覲有華餘潤且及陳人某度其夕陽宋文景筆記云莒公嘗言山東曰朝陽山西曰夕陽故詩云度其夕陽又云于彼朝陽指山之處耳後人便用夕陽為斜日誤矣予見劉琨詩夕陽忽西流古人亦誤用乆矣宜於野服裴度傳度野服蕭散與白居易劉禹錫為文章把酒窮晝夜相懽不問人間事猶曵鄭崇之履小立斯須李陵詩長當從此別且復立斯須杜詩不敢長語臨交衢且為王孫立斯須行巾元亮之車又奚惆悵歸去來辭或命巾車又奚惆悵而獨悲周禮春官巾車掌公車之政令注巾車掌在官之車者也謂之巾者以設飾為主也代囘四川陳總領咸宋史陳咸字逄儒登咸淳二年進士遷利路轉運判官吳曦反以咸蜀名士欲首脅之咸語子欽曰咸受國厚㤙義當擊賊恨無兵權獨有下䇿削髪以全臣節耳曦既誅咸語諸子曰吾不能討賊而棄官守罪也上表自劾安丙奏以咸總蜀賦從之咸晝夜精勤調度有方不二嵗賦額倍增金人犯上津守賴以固召為司農少卿卒安丙列奏其功賜謚勤節論曰陳咸不從逆曦雖不能死然理財於䘮亂之餘蜀賴以固守豈不賢於匹夫之自縊溝瀆者哉陞卿九農左傳少皞氏以九扈為九農正給餉四蜀巴蜀黔漢為四蜀事權増重光弩矢之前驅氣色益明飽樵蘇之後㸑並見前恭惟某官學宗洙泗禮記吾與汝事夫子於洙泗之間地理志洙泗之間齗齗如也從征記洙泗二水交于魯城東北十七里闕里有洙泗墻南北一百二十歩東南六十歩四門各有石閫北門去洙泗百餘歩論語考䜟注夫子敎于洙泗之間今城北二水之中即夫子領徒之所秀禀岷峨介然忠勤屹立江流之砥見於調度傍流地上之錢並見前致詳慮於講觧之餘觧舉蟹切說文判也從刀判牛角廣韻講也說也項籍傳業已講觧定經制於裁節之内粟塞其庾已成末乃取闢之功昌黎平淮西雅末乃取闢駭汗如冩揮刃紛紜争利膾脯優賞將吏扶珪綴組帛堆其家粟塞其庾印弄於庭宜有無以易堯之命周昌傳髙祖持御史大夫印弄之曰誰可以為御史大夫者孰視趙堯曰無以易堯庸進執羔之寵以彰流馬之勞正觀游刃之若新並見前何慮强弩之已末韓安國傳衝風之衰不能起毛羽彊弩之末力不能入魯縞師古曰縞素也曲阜之地俗善作之尤為輕細故以取喻也某僝功愒日見前得謝為期禮記七十而致事若不得謝則必賜之几杖取御史於九卿之中行觀更迭說文迭更迭也廣韻遞也増韻互也史記四國迭興更為伯主序王人於諸矦之上願立斯須見前代囘湖廣趙總領彦橚宋史趙彦橚字文長悼王七世孫登隆道二年進士知晉陵縣嵗饑振恤有方所活幾二十萬監登聞檢院時韓侂冑方柄用士趍其門彦橚惋歎出知汀州侂胄死詔戸部侍郎樞宻院檢詳遷湖廣總領清士卒虚籍減額錢百萬用度以饒比去餘七百萬知平江府奏置嘉定縣屯兵轉寳謨閣待制卒疇庸外府進位上卿禮樂光華既茂明於調度貨財平凖兹益重於事權除目一頒輿言胥穆竝見前恭惟某官持心信厚詩序麟之趾闗雎之應也闗雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也臨事浚明尚書夙夜浚明有家恭懿篤誠繼髙陽之才子左傳髙陽氏有才子八人齊聖廣淵明允篤誠髙辛氏有才子八人忠肅共懿宣慈惠和切磋磨琢蹈衛國之武公揚歴彌深聲華甚茂茲肅將於使指司馬相如傳因宣其使指令百姓皆知天子意俾總視於軍儲曽不淹時已聞奏最爰進四大夫之禄禮記卿四大夫禄君十卿禄仍斡半天下之贏是亦平遷行有峻擢某未繇旅賀例辱巽牋卿不同乎已陞蕐於𤣥冕公歸無所㑹加寵於繡裳並見前代囘湖北錢總領學自違貝闕紫貝闕河伯所居九歌魚鱗屋兮龍堂紫貝闕兮珠宫東坡詩豈有貝闕藏珠宫山谷詩貝闕珠宫開水府寖逺珠庭李珏傳甫冠舉明經李絳見之曰日角珠庭非庸人相迹雖間於行藏心實馳於賢徳恭惟某官材全而業鉅學廣而聞多鞭霆駕風已上蓬萊之島捫參歴井遽登蜀道之天飛芻遍給於列屯叱馭不辭於九折並見前成功者去蔡澤傳四時之序成功者去盍歸乎來惟是洞庭彭蠡之間史記三苖氏左洞庭右彭蠡實接夜郎牂牁之徼西南夷傳夜郎者臨牂牁江江廣百餘歩足以行船少須澄按庶免繹騷當饑饉師旅之餘民亦勞止詩民亦勞止汔可小康在諮諏詢度之事公優為之禮記為人臣者殺其身有益于君則為之况于其身以善其君乎周公優為之顧恐詔温不容席煖某腰黄無補頭白思歸並見前嬉笑文章良感雙魚之遺宋史蘇軾傳嘗自謂作文如行雲流水初無定質但常行於所當行止於所不可不止雖嬉笑怒罵之詞皆可書而誦之其體渾潤光芒雄視百代有文章以來盖亦鮮矣山谷東坡像賛嬉笑怒罵皆成文章觧覊而歸紫㣲玉堂光蕐禮樂願遄四牡之驅遷召新榮眷委庸敬不敢煩瀆併幸照知遷召以下十六字徽本闕代囘淮西趙總卿不儳陞卿九扈左傳少皞氏以九扈為九農正言為司農卿詳别見給餉列屯人自日邉㤙榮晝錦之遣晉明帝紀不聞人從日邉來詳别見錢流地上師有宿飽之期下車初云載路相慶詩厥聲載路爾雅路大也沈休文碑威令首塗仁風載路恭惟某官直温而肅括明敏而踈通早練達於民庸洞講明於邦計懋轉輸之績飛不盡翰韓文不長其年飛不盡翰乃生給事松貞玉剛持經濟之材翔而後集屬邉防之小定惟糧道之孔艱爰興前席之思久不見賈復念弄印而授無以易堯庸䟽執羔之榮俾專流馬之運序王人於諸矦之上姑馳驅數月之間並見前求宰相於宗室之中㑹凌厲九人之後新唐書宗室宰相傳贊周之卿士周召毛原皆同姓國也唐宰相以宗室進者九人林甫姦䛕幾亡天下李程和柔在位無所發明其餘以材稱職號賢宰相嗚呼盛歟文選凌厲㨗出又凌厲中原顧盼生姿李詩獨鶴思凌厲杜詩凌厲不飛翻某託交惟舊話别方新闖伺眡龜正欲致燕雀之賀闖丑禁切說文馬出門貌從馬在門中公羊傳開之闖然韓文姦首不敢闖皆以窺覘為義說文伺候望也奄闚也周禮卜大封則眡髙作龜大祭祀則眡髙命龜勤渠車騎乃先辱鯉魚之書車一作専徒華巾笥之藏莫遂襜褕之報並見前四六標準卷二十二, SBCK: ''}
