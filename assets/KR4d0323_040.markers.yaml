  - {type: variant, offset: 10338, length: 1851, content: 俱見前代回宋總領鈞日轂回輈舒永五紋之線轂古福切説文輻所輳也輈音周説文轅也淮南子爰止羲仲爰息六螭是謂懸車注日乗車駕以六龍羲和御之廣雅日御曰羲和杜詩刺繡五紋添弱線吹葭六琯動飛灰星軺給餉光華六轡之絲見前諒對剛辰王制注二五象五行剛柔十日疏五剛甲丙戊庚壬五柔乙丁巳辛癸益綏純嘏恭惟某官盛名晝永清徳氷明弩矢前驅見錢流於地上樵蘇後㸑如挾纊於軍中俱見前底績懋哉尚書乃言底可績又惟時懋哉歸班近只某濫聨筆槖阻奉椒觴君子占一陽之來當體復亨之動並見前王人序諸侯之上即膺晉錫之蕃易晉康侯用錫馬蕃庶晝日三接代回林總領祖洽陽月終更慶一陽之亨復段㑹宗傳毋求竒功終更亟還福星出使符五福之照臨東坡詩斯人乃福星遣出虛危間公自注司馬温公謂軾曰子駿福星也東京人困甚且令往彼詳見前宜對令辰茂膺純嘏見前㳟惟某官剛随天運和本時中養九徳於黄鍾鳳鳴嶰谷尚書亦行有九徳亦言其人有徳又九徳咸事餘見前持貳卿之紫槖虎卧長江南豐除李常制奉常貳卿董宣傳摶擊豪彊莫不震慄京師號為卧虎南史蕭慧開傳嚴用刑威蜀人號曰卧虎衮繡晝行樵蘇宿飽見前牽牛極晷既占候於漢臺易氏解冬至日在北陸躔牽牛去極一百十六度有竒而景丈有三尺月令章句冬至為極晝漏極短遠極極遠晷景極長三輔黄圖靈臺在長安西北八里始曰清臺本為候者觀隂陽天文災異更名曰靈臺郭延生述征記長安宫有靈臺髙十五仞上有渾儀水經云城南渠漕有漢靈臺然則漢城西之上林城南之漕渠皆在候景之臺也駱馬懷歸寧逶遲於周道詩嘽嘽駱馬豈不懷歸又四牡騑騑周道倭遲某濫塵朝綴莫旅賀綦烹鯉得書先辱五雲之墜拂龜占易惟期七日之來並見前代回趙總領不儳化日迎長王符傳化國之日舒以長易通卦驗冬至始人主與左右羣臣從樂五日天下亦家家從五日以迎日至之禮卿雲紀瑞史記若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲慶雲見嘉氣也易通卦驗冬至初陽雲出箕如樹木之狀諸侯之上序莫重於王人一陽之來道益亨於君子並見前茂綏福履詩樂只君子福履綏之請致頌言㳟惟某官秉徳忱恂尚書廸知忱恂于九徳之行孔傳禹之臣蹈知誠信于九徳之行凝姿信厚詩序關睢之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也詩振振公子毛傳振振信厚也峙糧天塹星夙駕以載驅尚書峙乃糗糧無敢不逮陳書都官尚書孔範曰長江天塹古以為限隔南北今日虜軍豈能飛度耶千湖居士集流柹投鞭規濟天塹楊廷秀揚子江詩天將天塹䕶呉間不數殽函百二關塹七豔切説文坑也詩星言夙駕給餉雲屯雷歡聲而四起薛能詩欲識普恩無遠近萬人懽忭一聲雷暫回留鑰漢書蕭何以信謹守管鑰注高祖出征何每居守坐鎮陪京文選坐鎮雅俗又於顯樂都既麗且康陪京之南居漢之陽陪京謂洛陽宜對南至之書左傳僖公五年正月辛亥朔日南至注周正月今十一月冬至之日日南極正義曰日之行天有南有北常立八尺之表以候景之短長夏至之景尺有五寸日最長而景最短是謂日北至也自是以後日漸近南冬至之景一丈三尺日最短而景最長是謂日南至也即侈東歸之詠詩序東山周公東征也周公東征三年而歸某材如線短心亦灰寒並見前刺繡吹葭空覺杜陵之老大杜詩刺繡五紋添弱線吹葭六琯動飛灰又杜陵有布衣老大意轉拙獻履貢襪但觀曹植之文章魏曹植冬至獻襪表曰伏見舊儀國家冬至獻履貢襪所以迎福踐長杜詩文章曹植波瀾濶賀都大首尾同第九條賀安撫恭惟某官徳合陽休氣排冬凜萬馬並馳而獨立恪秉素絲詩羔羊之皮素絲五紽退食自公委蛇委蛇四牡有功而遄歸亟登紫槖詩序四牡勞使臣之來也有功而見知則説矣詩式遄其歸遄速也列子不若遄歸也紫槖紫荷槖兹對五雲之瑞周禮保章氏以五雲之物辨吉凶水旱降豐荒之祲左傳分至啟閉必書雲物宻回九地之春杜詩排隂出九地萬物随開張詳見前代回鞏都大嶸天復一陽滋萌帝澤律厯志滋萌於子星聨五緯照映使華見前維時山立之休禮記山立時行盛氣顛實揚休玉色翕受川増之祉尚書翕受敷施詩如川之方至以莫不増恭惟某官和鍾玉律李元標詩玉律動年灰清徹氷壺選詩清如玉壺氷方今之務孔殷孰堪經濟李固傳方今之事復同於前尚書九江孔殷左傳方事之殷也有韎韋之跗注陶侃傳方事之殷當頼羣㒞圜法之司尤急政藉阜通食貨志太公為周立九府圜法又錢圜函方注外圜而内孔方也㑹當錢流地上之餘即有人自日邊之召某心随灰冷技蔑線長並見前賦問大鈞將為天下而實賀劉禹錫有問大鈞賦左傳叔弓如晉賀虒祈也游吉相鄭伯以如晉亦賀虒祈也史趙見子大叔曰甚哉其相蒙也可弔也而又賀之子大叔曰若何弔也其非惟我賀將天下實賀韓文其為吾以前所稱為天下賀詩成小至亦驚人事之相催杜陵有小至詩注云陽為大隂為小冬至隂極故云小至一説或云冬至前一日為小至按歳時雜詠盧照隣年日述懷詩人歌小歳酒花舞大唐春是以元日為小歳由此觀之子羙之小至即冬至也杜詩又有小寒食舟中作注小寒食如小至謂前一日也又天時人事日相催冬至陽生春又來, SBCK: ''}
