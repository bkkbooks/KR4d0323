  - {type: variant, offset: 7630, length: 270, content: 象山在陽夀縣西五里以形得名西山與象山相連嶺外代答云象州郡治西樓正面西山山腹怱起白雲狀如白象經時不滅然不常有州之得名或由於此非秦之桂林象郡也今象州城門畫一白象不知何義然象州自昔不遭兵革凡有大盜皆相戒以不宜犯象鼻畫象之意其在兹歟稗史㑹編云徐中行參政廣西行出象州計此必多象不然何以為郡名問之舟人云此絶無象心怪之明日早作見山崖水次白象以千數或飲或食或趨或卧或相戲逐其狀不一中行詰舟人曰爾謂無象此為何物舟人曰此山氣所結日高當不見中行不信至日出象漸散滅無一存者乃知古人以其氣名之按此殆如登州海市之類嶺外代答所謂山腹白雲者豈即是歟因疑古人氣象二字或本於此, SBCK: ''}
