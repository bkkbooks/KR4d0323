  - {type: variant, offset: 2, length: 4, content: 四庫全書, SBCK: 然疆埸之一彼一此正欠堅凝幸而及間暇之時亟冝定修攘之計取亂侮亡兼弱也時則易然同寅恊恭和衷哉政將焉往洪鈞旣轉於一氣黄麻即似於六經伏念某拓落一官嶔﨑萬狀才固自知其無似命亦可歎其不猶瞻白日於舉頭遭海風而引去上青天而仰脇僒峽水之倒流甫欲釣錦江之魚乃忽􅀐將軍之馬二年劔外寸歩矛頭徒令蟣蝨介胄之生安得貂蟬兠鍪之出茲㱕身於司敗妄干禄於有司適值大君子之登庸不勝小丈夫之距躍士曰時哉相君實皆舉笏以相驩誰其識之有歐陽辱捲簾之有素願煩啄抱稍養翅翎樂莫樂兮相知更傍誰家之門户遲之遲而又乆正湏大匠之鑪錐梅亭先生}
