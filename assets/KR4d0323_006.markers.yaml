  - {type: page-break, offset: 3, content: '', id: KR4d0323_SBCK_004-12a}
  - {type: page-break, offset: 3, content: '', id: KR4d0323_SBCK_004-12b}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 一第眞魯山之溷身未可許人也猶欲與後死之斯文子亦來見我乎政恐事先生之有罪伏遇某官求士爲國事君以人言動必}
  - {type: page-break, offset: 5, content: '', id: KR4d0323_SBCK_004-13a}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 今立二螭頭而和墨汁榮進素定寧止四龍首之至黄扉切聞滿籠之參芝豈少一株之桃李然勱相國家之業自旁招俊乂而基公求士甚士之求公㑹湏連茹子絶長非長者絶子自合負荆某一莊未荒萬間是芘向來瓣香之敬眞爲南豐此去翹材之延願觀東閤謝宗縣尉炳薦書下士徼君子之異知奏記中㳙缺門生之庸敬抑馬周實淹於逆旅非牛堪敢傲於有司未之負荆遐不削櫝恭惟某官眼髙四海筆落九天繙十二經尤有取太平之典對三千字謂當冠秀士之羣馬小殿於及門鰲固安於戴石孜孜甘旨屈爲孟東野之官懇懇忠精方抱梅南昌之節凄其風木越在塊苫諒朝祥之琴成声則暮召之蓋相望某頃偕鄉計嘗累公知由庶士而登司徒不知恩者非人也去民畒而就吏祿豈進謝則爲私乎顧迷京洛之塵實隔蓬萊之水故者无失爲故乃不知􅌂然衰絰之中誅之不可勝誅自當即麾之門墻之外顧勤一介先枉雙魚既倒植之可慙復暗投而失報青衫短笏漸從矮屋以着身紫磨眞金尚負洪鑪之定價然已長伯樂之廐敢逐荒陸氏之莊某無以報恩期於強學其行已若有愧於道何以文爲雖無報而不辱其門請從今始梅亭先生}
  - {type: page-break, offset: 6, content: '', id: KR4d0323_SBCK_004-13b}
