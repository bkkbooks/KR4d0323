  - {type: line-break, offset: 0, content: '', id: KR4d0323_WYG_000-1a01}
  - {type: variant, offset: 0, length: 725, content: 欽定四庫全書集部四四六標準别集類三宋提要臣等謹按四六標準提要四十巻宋李劉撰明孫雲翼箋釋劉字公甫崇仁人嘉定七年進士歴官寶章閣待制雲翼有橘山四六箋注已著錄劉平生無他事可述惟以儷語為専門所著有類藁續類藁梅亭四六今皆未見此本乃其門人羅逄吉所編以劉初年館何異家及在湖南蜀中所作彚為一集題曰標準蓋門弟子尊師之詞也凡分七十一目共一千九十六首自六代以來箋啓即多駢偶然其時文體皆然非以是别為一格也至宋而嵗時通候仕宦遷除吉凶慶弔無一事不用啓無一人不用啓其啓必以四六遂於四六之内别有専門南渡之始古法猶存孫覿汪藻諸人名篇不乏迨劉晚出惟以流麗穏貼為宗無復前人之典重沿波不返遂變為類書之外編公牘之副本而冗濫極矣然劉之所作頗為隸事親切措詞明暢在彼法之中猶為寸有所長故舊本流傳至今猶在錄而存之見文章之中有此一體為别派别派之中有此一人為名家亦足以觀風會之升降也至雲翼之注蕪雜特甚然亦有足備考證者舊本所載亦姑附存焉乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部四四六標準目録别集類三宋巻一言時政䞇見巻二論事巻三薦舉巻四舉科目謝座主巻五謝到任謝解任巻六通交代巻七謝除授内除巻八謝除授外除巻九謝辟置舉自代宣賜被召巻十進職轉官改官宫觀致仕巻十一雜謝巻十二謝惠詩文巻十三謝及第謝科舉巻十四生辰婚姻巻十五師傅封爵附宰相巻十六參政樞宻巻十七中堂史掖六部臺諫巻十八寺監學官宫教巻十九六院架閣巻二十制帥經畧巻二十一安撫帥守附巻二十二總領巻二十三都大提舶巻二十四漕使巻二十五憲使巻二十六倉使宋正巻二十七太守上巻二十八太守下巻二十九倅巻三十諸司屬官巻三十一教官巻三十二州官武官寄居官巻三十三宰巻三十四丞巻三十五簿巻三十六尉巻三十七監官巻三十八學職進士巻三十九賀正巻四十賀冬, SBCK: 谷}
