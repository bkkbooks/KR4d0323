  - {type: variant, offset: 22566, length: 251, content: 醉彌日乃解魏文帝詔朝臣曰且設蒲萄解酒宿酲掩露而食甘而不䬼酸而不脆冷而不寒味長汁多除煩解䬼又釀以為酒甘于麴米善醉而易醒道之固以流涎咽唾况親飲之金人元好問葡萄酒賦序云劉光甫言安邑多葡萄而不知有釀酒法少日嘗摘其實并米炊之釀雖成而古人所謂甘而不䬼冷而不寒者失之矣貞祐中隣里一民家避㓂自山中歸見竹器所貯葡萄在空盎上枝蔕已乾而汁流盎中薫然有酒氣飲之良酒也盖久而腐敗自然成酒不傳之秘于是而發元云嘗見還自西域者言大食人絞葡萄漿理之未㡬成酒愈久愈佳其説與劉合又云世無此酒久矣得之數百年之後而證數萬里之遠物顯晦有時非偶然者, SBCK: 壽}
