  - {type: variant, offset: 15967, length: 0, content: '', SBCK: 鞏都大嶸冬天復一陽滋萌帝澤星連五緯照映使華維時山立之休翕受川増之祉恭惟某官和鍾玉律淸徹氷壷方今之務孔殷孰堪經濟圜法之司尤急政藉阜通㑹當錢流地上之餘即有人自日邊之召某心隨灰冷技蔑線長賦問大鈞將爲天下而實賀詩成小至亦驚人事之相催代回喬運使行簡冬短日舒長益永六螭之馭長淮清晏遥知四牡之功對此令辰冝其遐福恭惟某官和鍾玉律清徹氷壷聚人曰財坐斡流泉之運嘘物以氣潜回寒谷之温式遄其歸可拱而俟某濫持荷槖阻捧栢觴占卦六日七分是爲道長修身千二百嵗請致祝規代回淮西徐運使煇冬緹灰襲􅀱肇基來復之祥繡節臨邊茂介踐長之慶恭惟某官身兼數器夙駕單車招來鴻鴈之民衆如雲集餽給􅆛貅之旅令若霜嚴冝對天統之辰丕擁日來之福某属拘朝綴莫旅賀絇鳴鳳律和知巳宣於}
