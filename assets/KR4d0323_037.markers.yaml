  - {type: variant, offset: 2, length: 10933, content: 標準巻三十七宋李劉撰監官宋四朝志監當官掌塲務庫蔵出納之事其征𣙜塲務歳有定額以登耗為殿最賞罰代回新監鄂州大軍向士芳詳啓意盖代月湖五雉分工謬叨誤渥雙魚尺素良仞故情俱見前恭惟某官冑出髙華出生也左傳康公我之自出公羊傳接菑晉出也貜且齊出也又盖欲立其出也注出外孫也才猷秀整所謂故國非喬木盖有典刑東坡詩故國依然喬木在典刑復見老成人不知公子是監倉誰相料理東坡詩但見東軒堪隠几不知公子是監倉又盖棺今幾日公子誰料理誰要卿料理欲説且止止按此一聫人知喬木典刑用孟子毛詩料理用桓沖語而不知皆用東坡詩句栽剪其工如此無忘澤霧劉向列女傳陶答子化陶三年名譽不興家富三倍其妻諫曰妾聞南山有𤣥豹霧雨七日不下食者何也欲以澤其毛衣而成其文章謝朓詩雖無𤣥豹姿終隠南山霧詳見前更與培風某罔功雲司謂刑曹攝長水部謂工部注俱見前血氣既衰戒在得何敢忘耶田園將蕪胡不歸兆足行矣回向監倉士芳老我匄閒濫分丈二之組王荆公詩老我孤主恩結草以為期陳後山詩老我何所懐匄音丐説文乞也或作匄蒼頡篇乞請也通俗文求願曰匄郗超傳自陳老病甚不堪人間乞閒地自養嚴助傳陛下以方寸之印丈二之組鎮撫方外故人委重逺遺咫尺之書韓信傳發一乘之使奉咫尺之書倚擔報之擔都濫切負也本作儋説文何也背曰負何曰儋史記虞卿傳躡屫擔簦摇毫率甚韓詩摇毫擲簡自不供詳第一巻恭惟某官象賢舄奕班固典引發祥流慶舄奕乎千載注猶言蟬聫不絶也今按詩松桷有舄舄大貌説文奕大也詩奕奕梁山則舄奕亦有大義燕譽飛騰詩慶既令居韓姞燕譽箋慶善也蹶父既善韓之國土使韓姞嫁焉而居之韓姞則安之盡其婦道有顯譽大耐官職之餘暫司倉粟宋史向敏中傳進右僕射門下侍郎兼修國史是日翰林學士李宗諤當對帝曰朕自即位以来未嘗除僕射今命敏中應甚喜賀客必多卿往觀之勿言朕意宗諤至敏中謝客門䦨寂然既退使人問庖中今日有親賔飲宴否亦無一人明日具以所見對帝曰向敏中大耐官職陳後山謝監倉詩平分太倉粟讀盡鄴侯書小試山林之久遂及戍𤓰駕賢業而心馳繫辭可久則賢人之徳可大則賢人之業佇薦書之交上某更勤来問仍費屬辭腐於力弱於才無能為役韓文弱於才而腐於力不能奔走乗機抵􅐵以要權利左傳於先大夫無能為役言不足為其役使問則告疑則辯敢愛乎言韓文此四子者皆可以當執事首薦而極論者主司疑焉則以辯之問焉則以告之未知焉則殷勤而語之又吾子之所為皆善矣謙謙然若不足而以徴于愈愈又敢有愛於言乎回宣城劉監税宣城已見趣譏征之期仕未能信講交承之好禮辱相先既登受之未安左傳下拜登受下拜者謂拜於堂下登受者登堂而受胙也欲捲還而不敢杜詩錦鯨巻還客始覺心和平藏惟深於十襲襲重也文選應門八襲又十襲珍藏報敢廢於七襄見前恭惟某官學本家傳美由世濟凛凛更生之志節博以羣書漢書劉向字子政本名更生石顯用事遂廢十餘年成帝即位顯等伏辜更生乃復進用更名向司馬遷傳贊劉向揚雄博極羣書英英夢得之辭章雄於一代新唐書劉禹錫字夢得登博學宏辭科工文章年益晏偃蹇寡所合乃以文章自適素善詩晩筆尤精與白居易酬復頗多居易以詩自名者嘗推為詩豪又言其詩在處應有神物護持顧從三語之掾復甘再轉之丞俱詳前勇尋葛井之神仙葛洪井在涇縣西寳勝寺側相傳此井乃洪煉丹取汲之處遂作宣州之賔客昌黎送楊支使序愈在京師時嘗聞當今藩翰之賔客惟宣州為多賢左右望而罔市為政在人貨賄掌其征㕓生財有道周禮賈師各掌其次之貨賄之治辦其物而均平之迄參幕畫入贊藩條晉書應詹傳贊入居列位則嘉謀屢陳出撫藩條則惠政斯洽馬也守閭雖少淹於歳月韓文鼎也不可以柱車馬也不可使守閭佩玉長裾不利走趨鳳焉巢閣即徑上於雲霄帝王世紀鳳止黄帝之東園或巢於阿閣某聞詩於庭干禄以閥抱闗非恥方浪為鎻棘之謀王代史記和凝傳凝知貢舉先是進士多浮薄喜為諠譁以動主司主司每放榜則圍之以棘閉省門絶人出入以為常凝撤棘開門而士皆肅然無譁所取皆一時之秀得闕正賖敢躐冀及𤓰之代賖逺也遲緩為賖謝靈運賦闕交臂之匪賖藉使承竹馬之棄殷浩傳桓温既以雄豪自許每輕浩浩不之憚也及浩敗坐廢為庶人温語人曰少時吾與浩共騎竹馬我棄去浩輙取之故當出我下也亦未得蕉鹿之真列子鄭人有遇駭鹿斃之覆之以蕉俄而遺其所蔵之處遂以為夢順塗而詠其事聞者用其言取之薪者不厭失鹿其夜真夢蔵之之處又夢得之之主遂訟而争之歸之士師士師請二分之以聞鄭君鄭君曰嘻士師将復夢分人鹿乎互見前敢圖臺𨽻之臨臺通作儓方言南楚罵庸賤謂之田儓𨽻賤稱師古曰屬著于人也左傳天有十日人有十等故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事許論子孫之契王元之詩古人重交代子孫不相忘去之日如始至知来者之䝉成左傳叔孫所舍雖一日必葺其墻屋去之日如始至薛宣傳垂拱䝉成舊之政必告新敢因之而請益回郫縣侯監税郫縣在成都西二十五里古郫邑為蜀王杜宇所都秦始置郫縣𨽻蜀郡漢以後並因之隋大業初縣省尋復置唐因之垂拱初析成都置犀浦縣宋省犀浦入焉郫音皮説文蜀縣也一在晉音府移切左傳趙孟使殺公子樂於郫是也無隴西李博之材濫兹巢幕昌黎送楊支使序愈在京師時嘗聞今藩翰之賔客惟宣州為多賢與之㳺者二人隴西李博清河崔羣羣與博之為人吾知之道不行於主人與之處者非其類有享之以季氏之富不一日留也左傳夫子在此猶燕之巢於幕上有夷門侯嬴之智亦爾抱闗史記信陵君傳魏有隠士曰侯嬴年七十家貧為大梁夷門監者公子厚遺之不肯受及秦攻趙急公子欲以客赴秦軍侯生為定計全趙自剄以送公子太史公曰吾過大梁之墟求問其所謂夷門夷門者城之東門也委贄相先報章敢後恭惟某官學卑衆楚家近三蘇東坡詩氊毳年来亦甚都時時鴂舌問三蘇公自注予與子由入京時北使已問所在後予館伴北使屢誦三蘇文衫曵枯荷難裹崔嵬之氣東坡詩青衫半作霜葉枯爾雅石戴土謂之崔嵬崔倉回切説文髙大也嵬魚回切説文髙不平也詩陟彼崔嵬嵬通作巍揚雄傳前殿崔嵬司馬相如傳巃嵸崔嵬筆漓𤣥草漫為拓落之官揚雄傳作太𤣥五千言支葉扶疎獨説十餘萬言然而位不過侍郎擢纔給事黄門竟者𤣥得毋尚白乎何為官之拓落也暫屈闗譏聊從吏隠孫綽傳嘗鄙山濤而謂人曰山濤吾所不解吏非吏隠非隠若以元禮門為龍津則當㸃額暴鱗矣汝南先賢傳鄭敬去吏隠於蟻陂之陽以漁釣自娛彈琴詠詩常方坐于陂側按韻府吏隠下引此不知去吏自為句隠字屬下句二字原不相屬也姑存以備考杜詩浣花溪裏花饒笑肯信吾兼吏隠名佇漢庭之用老陳後山詩漢庭用少公何在不使羣飛接羽翰今代貴人湏白髮挂冠髙處未宜彈從吴市以登仙見前某未洗袴袍山谷題頓塵馬詩忽看髙馬頓風塵亦思歸家洗袍袴辱迂車轍載披郇翰有言何至於失人見前儻憶郫筒無酒或容於酤我成都記郫縣因水得名華陽風俗記郫縣人刳大竹傾春釀於筒閉以藕絲苞以蕉葉信宿馨香達於竹外然後斷之以獻號郫筒酒范石湖吴船録云郫商截大竹長二丈以下留一節為底刻其外為花紋上有盖以鐵為提梁或朱或黒不漆大率挈酒竹筒耳華陽風俗記所載云云則是就竹林中為之今無此酒法矣一統志相傳晉山濤治郫時用筠管釀酴醾作酒兼旬方開香聞百步故蜀人傳其法杜詩魚知丙穴由来美酒憶郫筒不用酤千家注修可曰郫出大竹土人截以盛酒故號郫筒至今如此非傾釀於筒欲其香而斷之也故李商隠詩云錦石為碁子郫筒當酒壺郫筒為盛酒器可知矣酤通作沽説文一宿酒又賣也詩無酒酤我回髙監税李巡檢區區薦士盖採公言區音墟區區小貌左傳是區區者而不予畀楚元王傳豈為是區區之禮哉師古曰區區謂小也食貨志桓公用區區之齊禮樂志河間區區小國古詩一心抱區區杜詩懶計託區區亹亹陳牋何勤私謝亹通作娓増韻不倦之意又役役也詩亹亹文王易成天下之亹亹周語亹亹怵惕王莽傳亹亹翼翼韓詩亹亹抱秋明所願激昂於事業王章傳不自激昂揚雄傳激昂萬乘之主庶無孤負於品題太白與韓荆州書一經品題便作佳士報不成章詩雖則七襄不成報章言不盡意繫辭書不盡言言不盡意回江監酒名門諸彦夙忻投分之多文選二三諸彦杜詩休駕投諸彦注江淹云金閨諸彦潘岳詩投分寄石友白首同所歸計幕一時兹有為僚之幸左傳同官為僚杜詩為僚記腐儒欲修辭而不敏愧執訊之相先恭惟某官材本家傳美由世濟並見前英辭倚馬秀子弟芝蘭之階世説新語桓宣武北征袁虎時從被責免官㑹須露布文喚袁倚馬前令作手不輟筆俄得七紙殊可觀東亭在側極歎其材袁虒云當令齒舌間得利宣武桓温虎袁宏小字東亭王詢也唐常衮表學愧聚螢才非倚馬翰苑新書云世見李白集有日試萬言倚馬可待之語遂以倚馬為李白事誤矣謝𤣥傳安問子弟亦何預人事而欲使其佳𤣥荅曰譬如芝蘭玉樹欲使其生於階庭耳喜色乘龍隠王孫芙蓉之褥少陵李監宅詩尚覺王孫貴豪家意頗濃屛開金孔雀褥隠繡芙蓉且食雙魚美誰看異味重門䦨多喜氣女壻近乘龍楚國先賢傳孫雋李元禮俱娶太尉桓𤣥之女時人謂桓叔元兩女俱乘龍言得壻如龍也尚何事麴糵之託尚書若作酒醴爾惟麴糵韓文送王秀才序吾少時讀醉郷記私怪隠居者無所累於世而猶有是言及讀阮籍陶潜詩乃知彼猶未能平其心有託而逃焉者也若顔曽二子得聖人而師之汲汲每若不可及其於外也固不暇尚何麴糵之託而昏冥之逃耶居然營糟粕之餘説文糟粕酒滓也􅜷糟曰粕通作魄荘子君之所讀者古人之糟粕已夫注魄普各反爛食為魄一云糟爛為魄又作粕許慎云粕已漉麤糟也又普白反謂魂魄也左傳物生始化曰魄郎君可是管庫人聊復爾耳禮記所舉于晉國管庫之士七十有餘家注管庫之士府史以下官長所置舉之於君以為大夫士也管鍵也庫物所蔵正義曰月令注管鑰摶鍵器鍵謂鎖之入内者俗謂之鎖須管謂夹取鍵今謂之鑰匙則是管鍵為别物而云管鍵者對以細别散則大同為鍵而有故云管鍵特詳之者以管有主當之義恐以虚字解之互見前義並同此東坡詩郎君可是管庫人乃使驥騄隨蹇步餘見前碧香竊比主家釀將有望焉宋王銑晉卿尚晉國公主其家酒名碧香錢氏私志云親王宰相使相歳賜公使錢七千貫許造酒主第亦然李文和家酒名金波吾家酒名清淳王晉卿家酒名碧香蔡魯公家酒名君臣慶㑹秦師垣家酒名表勲皆賜名也山谷送碧香酒戲鄭彦能詩大農部丞送新酒碧香竊比主家釀東坡詩碧香近出帝子家漢書衛青傳季與主家僮衛媪通杜詩主家隂洞細煙霧李嶠詩主家山第接雲開蘇頲詩主家山第早春歸何充傳令人欲傾家釀茍無平原督郵之譏世説桓温有主簿善别酒有輙令先嘗好者謂之青州從事惡者謂平原督郵青州有齊郡言至臍平原有革縣言至膈上㑹博涼州刺史之任燉煌張氏傳扶風孟佗字伯郎中常侍張讓専權用事佗以葡萄酒一斗遺讓即拜涼州刺史東坡詩誰能斗酒博西涼又一斗勝涼州某自甘飲水隋書趙軌傳為齊州别駕有能名考績最優詔徵入朝父老揮涕隨逐曰公清如水請酌一杯水奉餞軌受而餘之晉書鄧攸傳為吴郡守攸載米之郡俸禄無所受唯餘吴水而已敢望啜醨屈原漁父衆人皆醉何不餔其糟而啜其醨交公瑾如醇醪將從今始江表傳程普頗以年長數陵侮周瑜瑜折節容下終不與校普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉時人以其謙讓服人如此為穆生設醴酒幸勿我忘楚元王傳少時嘗與魯穆生白生申公俱受詩於浮邱伯元王既至楚以穆生白生申生為中大夫元王敬禮申公等穆生不嗜酒元王每置酒常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市遂謝病去師古曰醴薄酒也少麴多米一宿而就不齊之回新榮州史監酒季儉鳳凰千仞昔聞将下而復飛賈誼傳鳳皇翔於千仞兮覽徳輝而下之見細徳之險微兮遥増擊而去之師古曰増重也言見苛細之人險阨之證故重擊其羽而髙去鯉魚尺書今見肯来之甚恵爾雅肯可也詩恵然肯来漢書桀黠不肯給太𤣥經匪其肯也有勤委贄敢廢報章伏惟某官胄出典刑家傳忠烈振振公姓不肯附黄閣之家詩麟之定振振公姓吁嗟麟兮杜氏通典陳三公之制開黄閣㕔事置䲭尾北齊三公之官並置府其府三門當中門黄閣設内屏沈約宋書三公黄閣前史無其義臣按禮記云士韠與天子同公侯大夫即異鄭𤣥注云三公之與天子禮數相亞故黄其閣以示謙不敢斥天子宜是漢末制也挺挺祖風殆欲伏青蒲之節魏謩傳贊挺挺有祖風烈史丹傳丹直入臥内頓首伏青蒲上應劭曰以青規地曰青蒲自非皇后不得至此謂立登於腆仕杜詩立登要路津詩瑣𤨏姻婭則無膴仕顧小隠於步兵阮籍傳籍聞步兵厨營人善釀有貯酒三百斛乃求為步兵校尉惟是三榮之陋哉詎堪再辱於賢者李陵傳丈夫不能再辱蜀志譙周傳再辱之恥何與一辱改邑不改井竟困井遷易改邑不改井无䘮无得又困窮而通井居其所而遷注井居所不移而能遷其施也有民此有財不勝財竭所謂蠅頭之入草堂詩餘蝸角虚名蠅頭微利全仰犢鼻之酤司馬相如傳相如與文君俱之臨邛盡賣車騎買酒舍乃令文君當爐相知身自著犢鼻褌與傭保雜作滌器於市中師古曰犢鼻即今之衳也形似犢鼻故以名云郎君可是管庫人聊復爾耳見上條先生未出禁酒國幸疾驅之東坡詩長安小吏天所放日夜歌呼和丞相豈知後世有阿瞞北海樽前捉私釀先生未出禁酒國詩語孤髙常近謗㡬回無酒欲酤君郤畏有司書籍帳某尚爾强顔真成婪尾婪盧舍切説文貪也楚辭注愛財曰貪愛食曰婪仇池筆記蘇鶚演義云以酒巡匝為婪尾又云婪貪也謂處於坐末得酒則貪婪之故云宋景文守歳詩云迎新送故只如此且盡尊前婪尾杯亦作藍白樂天詩三杯藍尾酒一堞膠牙餳又歳盞後推藍尾酒春盤先勸膠牙餳又老過占他藍尾酒病餘收得到頭身東坡寒食詩藍尾忽驚新火後遨頭要及浣花前但改婪為藍耳或以藍潁水其深三丈時人取之以為酒容齋隨筆云白樂天詩藍尾酒之義殊不可曉河東記載申屠澄與路傍草舍老父嫗及處女環火而坐嫗自外挈酒壺至曰此君冒寒且進一杯澄因揖遜曰始自主人翁即巡澄當藍尾盖以藍為婪當婪尾者謂最在後飲也葉少藴石林燕語云藍當作啉出侯白酒律謂酒巡通末坐者連餘三杯為婪尾末坐逺酒行到常遲故連飲以慰之以啉為貪婪之意或謂啉為熛如鐵出火貴其出色此尤無謂則唐人自不能曉葉説如此予謂不然白公三杯之句只言酒之巡數耳非連餘也按胡嶠詩云瓶内數枝婪尾春時人罔喻桑維翰曰唐末文人謂芍藥為婪尾春猶最後杯曰婪尾酒芍藥殿春故得是名則婪尾乃最後之義何必費辭回史監酒文舒同官為僚輙剡公車之牘見前薦賢報國豈收私室之恩通鑑狄仁傑嘗薦數十人率為名臣或謂仁傑曰天下桃李悉在公門仁傑曰薦賢助國非為私也羊祐傳凡所進達人皆不知或謂祐慎宻太過者祐曰拜爵公朝謝恩私門吾所不取又舉賢報國台輔之逺任也捜揚側陋亦台輔之宿心也一謙之撝三復以愧謙復卦名恭惟某官美由世濟材應時須山谷詩少年出補父兄處公自才力應時須舉瓢而酌天漿更觀逺業韓詩刺手抜鯨牙舉瓢酌天漿明經而拾地芥佇決巍科見前將猶錐之處囊中平原君傳夫賢士之處世也譬若錐之處囊中其末立見何至羅而致幕下某每勤婉畫選詩婉婉幕中畫良覺賢勞推轂有味其言式稽於衆鄭當時傳其推轂士及官屬丞史誠有味其言也尚書稽於衆舍已從人引鼎不程其力姑見此心禮記引重鼎不程其力詳見前回史僉判文舒見三十二巻回新榮州家監酒民獻某乏葡萄之博郡既竭吾才見囘江監酒條累糟粕以築臺徒得君重李詩此江若變作春酒壘麴便築糟邱臺顧念步兵隠嗣宗之職見新榮州史監酒條何勤天子使家父之来春秋桓公八年天王使家父来聘十五年天王使家父来求車注家氏父字天子大夫恭惟某官業精於勤韓文業精於勤荒於嬉行成於思毁於隨學優則仕族庖之刀有餘刃争自致於功名荘子族庖月更刀折也注族衆也一云離也良弓之子必為箕諒夙精於詩禮見三十六巻回秦尉謝差校正條少時嘗讀醉鄉記昌黎送王秀才序吾少時讀醉鄉記私怪隠居者無所累於世而猶有是言豈誠有㫖於味耶唐書隠逸傳王績字無功兄通隋末大儒也武徳初待詔門下省日給酒一斗時稱斗酒學士著醉鄉記以次劉伶酒徳頌其飲至五石不亂醉鄉記云醉之鄉去中國不知其㡬千里也其土曠然其人甚清其寢于于其行徐徐阮嗣宗陶淵明等十數人並逰其鄉沒身不返中國以為酒仙云郎君可是管庫人詳此巻回江監酒條惟此三榮之窮仰於一醉之富㫖且多多且㫖當辯聖賢詩魚麗于罶鱨鯊君子有酒㫖且多魚麗于罶魴鱧君子有酒多且㫖注有酒㫖絶句且多二字為一句言非直有此鱨鯊鯊大魚又君子有酒矣酒既㫖美魚復衆多多且㫖言酒多而此魚又美也魏志徐邈字景山魏國初建為尚書郎時科禁酒而邈私飲至於沈醉校事趙達問以曹事邈曰中聖人達白之太祖太祖甚怒度遼将軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性修慎偶醉言耳私勝公公勝私在權子母武帝紀初𣙜酒酤趙廣漢傳庾索私屠酤食貨志詩曰無酒酤我而論語曰酤酒不食非相反也詩㨿承平之世酒酤在官孔子當周衰亂酒酤在民請法古今令官作酒計其利而十分之以其七入官其三供工器薪樵之費又民患輕則為之作重幣以行之於是有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之應劭曰母重也其大倍故為母也子輕也其輕少半故為子也惟尊不空而客常滿漢書孔融傳性寛容少忌好士喜誘益後進及退閑職賔客日盈其門常歎曰坐上客常滿尊中酒不空吾無憂矣則人皆醉而我獨醒見前引勝地於一杯世説新語王衛君云酒正自引人著勝地杜詩勝地朝相引徐行得自娱山谷詩但對酒樽即眼開一杯引人著勝地趣朝天於三斗杜詩汝陽三斗始朝天恨不移封向酒泉汝陽王璡睿宗之孫讓皇帝之子某歠醨何有見前罸酎是憂酎直又切説文三重醇酒也西京雜記漢制常以正月作酒八月乃熟以獻宗廟張晏曰酎之言醇也周勃傳坐酎金免官王陵傳至𤣥孫坐酎金國除武帝紀元鼎五年九月列侯坐獻黄金酎祭宗廟不如法奪侯者百六人焦氏筆乘云漢諸侯以酎金失侯者甚衆按漢儀諸侯王歳以戸口酎黄金於漢廟皇帝臨受獻金金不如斤兩色惡王削縣侯免國注云因八月嘗酎㑹諸侯廟中出金助祭謂之酎金酎三重釀醇酒也味厚故以薦宗廟金黄金也不如法者奪爵以史漢注皆未明特詳疏之爾来三月寔無鹽不堪寡助東坡詩豈是聞韶解忘味爾来三月食無鹽破除萬事無過酒切幸疾軀韓詩杯行到君莫停手破除萬事無過酒回周監酒孝夑叨恩試郡正懼曠瘝尚書無曠庶官元帝紀衆僚久師古曰空也古曠字瘝或作癏病也尚書若時瘝厥官亦通作鰥見爾雅聨事為僚幸逢名勝愧陳牋之不敏辱垂問之相先伏惟某官抱負恢宏後漢儒林傳莫不抱負墳䇿雲㑹京師此偕用典刑膚碩暫屈糟邱之隠小試清醇東坡詩昨想玉堂空冷徹誰分銀榼送清醇又投以東阿清和以北海醇諒知酒誥之篇益加醲郁酒誥尚書篇名韓文沈浸醲郁含英咀華作為文章其書滿家佇皆騰踏韓詩飛黄騰踏去即踐髙華某老矣倦㳺冒焉逺戍對北海而捉私釀免俗未能曹操以年飢兵興表制酒禁孔融書争之融因得罪東坡詩豈知後世有阿瞞北海樽前捉私釀詳見前交公瑾如飲醇醪同寅是望見本巻回江監酒條其為傾徯罔既敷陳回榮州吕監酒逢年守榮黎之徼方幸終更方輿勝覽榮黎山在榮州東十五里上有龍池祈禱無不應徼古弔切境也漢書牂牁為徼又盜出徼外鑄錢師古曰徼猶塞也東北謂之塞西南謂之徼塞者以障塞為名徼者取徼遮之義段㑹宗傳終更亟還分通義之符洊叨詳試眉州本蜀郡地漢屬犍為郡齊分置齊通郡梁立青州西魏改眉州治通義縣唐天寳初改通義郡蕭望之傳所用皆更治民以考功君前為平原太守日淺故復試之于三輔有勤下問益仞髙情恭惟某官學有家傳材髙世濟故國非喬木之謂盖有箕裘見前恵風汜崇蘭之光有華階序宋玉招魂光風轉蕙汜崇蘭些謝𤣥傳謝安曰子弟亦何豫人事而正欲使其佳𤣥答曰譬如芝蘭玉樹欲使其生於庭階耳㑹即登於玉筍北夢𤨏言唐末朝市中有人物者號玉笋班又外郎班清𦂳不雜亦號玉笋班新唐書李宗閔為中書舍人典貢舉所取多知名若唐沖薛庠袁都等世謂之玉筍又蒋凝美風標朝士號為玉笋班鄭谷寄張起居詩渾無酒泛金英菊漫道官居玉笋班山谷詩誰憐舊日青錢選不立春風玉筍班互見前式並美於金屏杜詩屏開金孔雀何遜詩含悲下翠悵掩泣閉金屏某前者為僚兹焉改戍猶䝉奨借及於芻狗之陳要是飄流念在蓴蘆之熟並見前回監叙州茶帛庫張世永海上八月之仙槎昔幸逢於博望荆楚歳時記漢武帝使張騫使大夏尋河源乗槎經月而至一處見城郭如官府室内有一女織又見一丈夫牽牛飲河問是何處答曰可問嚴君平漢書張騫傳騫以校尉從大将軍擊匈奴封博望侯又漢使窮河源其山多玉石采來天子按古圖書名河所出山曰崑崙云山下十年之老石今再遇於榖城張良傳良始所見下邳圯上老人與書者從十三歳從髙帝過濟北果得榖城山下黄石取而寳祠之及良死并葬黄石淒其一夢之驚詩淒其以風山谷詩驚夢如昨日愧此尺牋之貺恭惟某官風標清重南史栁憕傳栁憕風標才氣恐不能為少主臣任昉進封衡陽王詔風標秀特器體淹𢎞曽鞏詩能舉邱山為筆力可麿雲日是風標王介甫詩沈魄浮魂不可招遺編一讀想風標器宇端温晉書魏詠之傳器宇𢎞邵識局貞隠梁書王僧辨傳器宇凝深風格詳逺朱异傳器宇𢎞深神表峯峻近世名卿疇若乃翁之清介法言或問近世名卿若張廷尉之平雋京兆之見尹扶風之潔王子貢之介斯名卿矣當家奥學定存是似之典刑詩無曰予小子召公是似紆餘入幕之賔協贊摘山之畫宋制在昔元豐留神武備摘山市駿具著科條又講摘山之利得充廐之良春風萱草承燕喜之慈顔詩焉得諼草言樹之背願言思伯使我心痗爾雅蘐忘也通作蘐爾雅翼云萱諼同音遂命萱以忘憂之草戴氏䑕璞云俗謂母為萱堂考之詩注背北堂也箋云憂以生疾恐将危身欲忘之是詩既以君子行役為王前驅而作以忘憂解之極通於母有何干預東坡詩我非女兒萱郤是鄙之之辭或引用樹萱事則不可用詩注之北堂詩魯侯燕喜令妻夀母秋露蘭芽已蟬聨於宦牒王衍傳吾少無宦情隨牒推移遂至于此佇觀濟美還入㫄招某叨領蟇頤蟇頤山在眉州東七里自象耳山連峯壁立西瞰玻瓈江五十餘里至此盤礴蹲踞形類蟇頤故名有至徳觀有尒朱陶丹泉傳記所載以為軒轅氏丹宅山腰有穴曰龍祠傳者以為四目老翁唐末有楊太虚得道于此今祠中有三仙像四目居中焉人日出東郊渡江逰蟇頤山眉之故事也互見前獲迎鷁首藝文類聚韻集曰鷁首天子船也淮南子龍舟鷁首浮吹以虞此逰于水也注鷁水鳥也畫其象著船首方言船首或謂之閣又謂之鷁首注今江東貴人船前作青雀是其象也梁王筠詩凌波漾鷁彩汎水渙蛟文張正見詩鷁汎青鳬後鷄鳴白鷺前見鳴駒之汗血良慰故情杜詩驊騮作駒已汗血東坡詩名駒已汗血老蚌空泥沙懐野鶴於未仙還悲往事東坡詩何人更識嵇中散野鶴昂蔵未是仙回趙船塲必孚巨川作楫夙知家學之髙尚書若濟巨川用汝作舟楫野水横舟謾借時才之重名臣言行録冦莱公知歸州巴東縣嘗賦詩有野水無人渡孤舟盡日横之句時以為若得用必濟大川互見前袖長箋而見畀搔短髮以懐慚詩掻首踟蹰左傳髮雖短而心甚長杜詩羞将短髮還吹帽又白頭掻更短渾欲不勝簮恭惟某官籍甚宗英陸賈傳名聲籍甚孟康曰言狼籍甚盛叙傳禮樂是修為漢宗英蔚然相種陳涉傳王侯将相寜有種乎若射有志已穿鵰鶚於西風尚書予告汝於難若射之有志杜詩鵰鶚在秋天其釣維何行掣鯨魚於東海詩其釣維何維絲伊緡杜詩或看翡翠蘭苕上未掣鯨魚碧海中顧屈箕裘之學暫司刳剡之工刳曰姑反説文判也増韻剖也虚其中也又恪侯切剜裏也或作剾剡音燄説文鋭利也禮圭剡上削令上鋭也繫辭刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下當斧斤閒睱之時聊聽數聲之鶴唳唳音戾説文鶴鳴也陸機傳華亭鶴唳豈可復聞乎收文字芳鮮之牘即看萬斛之龍驤東坡詩逰遍錢塘湖上山歸来文字帶芳鮮九國志王審知聞徐寅名辟居幕寅不樂一旦拂衣去曰大尺之水前波後堰焉能容萬斛之舟乎叙傳雲起龍驤化為侯王某巢幕非材濫巾有靦見前登天而攀蜀道昔逢峡水之倒流李詩畏途巉巖不可攀蜀道之難難於上青天杜詩詞源倒流三峡水航海而遡斗門今覺村船之逆上山谷詩想聽鎖忩深夜雨似看逆水上江船幸百聞之一見趙充國傳百聞不如一見及異事而同寮詩我雖異事及爾同僚胡越協心何況不殊於臭味孔叢子云吴越之人同舟濟江中流遇風波其相救如左右手者所患冋也王弼周易略例投戈散地則六親不能相保同舟而濟則吴越何患異心左傳今譬草木寡人在君君之臭味也又譬諸草木吾臭味也而何敢差池詳見前魁台齊色尚期勉繼於芳馨天文志魁下六星兩兩而比者曰三能三能色齊君臣和不齊為乖戾蘇林曰能音台回新添差趙監押儒緩無庸濫分郡寄緩舒也増韻遲也新唐書髙仙芝髙麗人美姿質善騎射其父猶以儒緩憂之戎昭且整將倚宗英左傳戎昭果毅以聴之之謂禮貽書粲然左傳叔向貽子産書董仲舒傳粲然有文以相接陳誼厚甚文有勤於四六感益倍於尋常恭惟某官胄出文昭左傳管蔡郕霍魯衛毛𣆀郜雍曹滕畢原酆郇文之昭也學深武略隋藝文志黄石公三略三巻下邳神人撰成氏注振振麟定夙髙趾角之仁詩麟之趾振振公子麟之定振振公姓麟之角振振公族定額也麟有額而不以抵趾足也麟之足不踐生草不履生蟲麟一角角端有肉肅肅兎置合任腹心之寄詩肅肅兎置施於中林﨣﨣武夫公侯腹心箋兎置之人鄙賤之事猶能恭敬則是賢者衆多也腹心言可用為謀䇿之臣以斗州之甚褊辱天族之肯来詩惠然肯来桴鼔不驚後漢書董宣字少平為懐令搏擊豪彊莫不震慄京師號為臥虎歌之曰枹鼔不鳴董少平注枹擊鼓杖也音浮其字從木藩維自壮唐書忝備藩維李詩諸王若鸞虬肅穆列藩維某獲叨聨事將幸分憂察閭里之奸邪願無犬吠劉寵傳為㑹稽太守狗不夜吠古詩月明無犬吠花村冠宗室之議論庶欵燕談劉辟疆傳武帝時以宗室子隨二千石議論冠諸宗室詳見前回龔監嶽良臣詳啓意監嶽乃武岡人李任武岡别駕以啓相通而復之者也范石湖驂鸞記云南嶽寺環廟皆市區江浙川廣衆貨之所聚生人所湏無不有既憧憧往来則汚穢喧雜盜賊亡命多隠其間或期㑹約結于此官置巡檢司焉南嶽四阿各有角樓兩廡土偶仗衛取則帝所正殿獨一神座監嶽與禮直官日上香火後殿乃與后並處廟吏常鏑後宫門非命官盛服母得擅入懐湘屈之清来隠城池之上湘江在長沙羅縣賈誼弔屈原賦反聞屈原兮自沈汨羅造託湘流兮敬弔先生揚雄反離騷因江潭而􅐹記兮欽弔楚之湘纍注屈原赴湘死故曰湘纍屈原漁父篇衆人皆濁我獨清王康琚詩小隠隠陵藪大隠隠朝市聞楚龔之潔實在邦域之中漢書兩龔皆楚人也勝字君賔舍字君倩二人相友並著名節故世謂之楚兩龔法言楚兩龔之潔其清矣乎方圖羾箋羾古送切飛至也甘泉賦登掾欒而羾天門注羾音貢至也已沭􅐹記􅐹通作往反離騷因江潭而􅐹記兮師古曰記書記也謂弔文也言因江水之邊而投書記以往弔也恭惟某官器資膚敏業履端方清淑炳衡嶽之靈韓文衡山之神既靈而郴之為州又當中州清淑之氣蜀都賦江漢炳靈世載其英忠信挺巫嶓之秀武岡銘願完父子卒為忠信又黔山之巑巫水之嶓束晳補亡詩黍發稠華禾挺其秀學歐陽子端是百年能幾見之人陳後山送蘇公知杭州詩一代不數人百年能幾見互見前師昌黎公顧有四舉乃一得之歎昌黎上宰相書四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畆之宫其可懐謂髙登於雲路乃勇退於急流錢希白洞微志上即位初鄧州觀察使錢太博若水雍容文雅亦近世竒士堅乞罷樞務遂拜禮部貳卿充集賢院學士其日晩予往謁賀諸客退獨相留後㕔同坐因云某初應舉欲求解遂往華隂謁陳先生通刺後䝉倒屣相迎臨出執手約後十日郤相訪至期徑往迎入山齊地爐中已先有一僧擁衲對坐某揖之寒暄之禮亦甚簡傲少年壮氣頗不平之良久僧熟視某而謂陳曰無此骨法二公皆微笑雖驚異其言而不敢詢問更有他客至逡巡先退次日再獨往見陳且問僧名及言者何事陳曰此即白閣道者也道行髙潔學通天人至於知人尤為有神仙之鑒欲勸留學道中心不決遂請道者決疑他云見足下非神仙骨法學道亦不能成但却得好官能於急流中勇退耳東坡詩勇退當年正急流洊奉真祠益彰雅操寜與騏驥將與雞鶩甘從考澗之槃屈原卜居寜與騏驥抗軛乎将隨駑馬之跡乎寜與黄鵠比翼乎将與雞鶩争食乎詩考槃在澗碩人之寛傳考成槃樂也山夹水曰澗正義曰言碩人成樂在於此澗謂成此樂而不去所謂終處也小不虺蜮大不鯨鯢可見在山之潤武岡銘我老洎㓜由公之仁小不為虺蜮大不為鯨鯢大戴禮玉在山而木潤川生珠而岸不枯紅藥猶堪於傍砌謝𤣥暉直中書省詩紅藥當堦翻蒼苔依砌上青蒲㑹報於裹輪武帝紀遣使者安車蒲輪東帛加璧徴魯申公師古曰以蒲裹輪取其安也韓詩青青水中蒲某拙不瘉人瘉通作愈勝也廣韻賢也増韻過也晉語東方之士孰為瘉注猶賢也狷弗諧世狷規掾切説文褊急也又古𤣥切急也誨諸生於館下以冗見治治平聲試别駕於中書何卑敢憚俱見前正擬編蒲之暇路温舒傳父使枚羊温舒取澤中蒲截以為牒編用寫書任昉表集螢暎雪編蒲緝栁欵求拔薤之規居是邦事其大夫願依賢者舉進士吾為同業能勿誨乎俱見前回史監廟龜十年出幕濫分和義之麾杜詩十年出幕府榮州唐為和義郡詳見前千室鳴絃將竊依仁之益杜詩此邦今尚武何處且依仁未遑􅐹記先沭蜚牋恭惟某官行無瘕疵學有源委儒林發藻不難地芥之收並見前簿枳擇棲行踐天衢之直易何天之衢文選濯鱗清流飛翼天衢某立朝無補乗障非材火兩燄之生巾真成妖夢諸集拾遺李畋為國子直講求郡晨登講席諸生見畋巾上兩焰火起是日得榮州左傳寡人之從君而西也亦惟晉之妖夢是踐妖夢謂昔年夢見申生之事水一盂而窺户更望忠規請誨非遥占謝惟略並見前四六標準巻三十七, SBCK: ''}
