  - {type: variant, offset: 0, length: 1, content: 欽, SBCK: 之二十二緫領賀牛都大除緫領大年知榮州作結知宸扆攺領餉臺千里餽糧有飢孰堪將指六計以廉為本疇可易公成命風馳驩聲雷動恭惟某官弘深而肅括忠肅而篤誠為淮海維揚之俊人得伊洛入河之宗􅂀仁為已任此心即禹稷之心謹厥身修所學皆孔周之學安行􅂗轍動中和鑾名旣震于京師才合居於給諌行行且止避御史巳播流聞皇皇者華遣使臣乃煩咨度茗駿之登旣羡槐龍之對可占留蕭相於関中且專餉事任武侯於渭上式敏戎公然劔閣雖曰峥嶸而崔嵬而益州實斍疲敝之危急䑛糠何止於及米放手寕恤於傷葵人知罪􅀊之徒然天遣福星之臨止序諸侯之上暫借重於王人折千里之衝即遄歸於政地某比縁井攺益斍困窮雖飲氷食蘖以自將然求牧與芻之未獲置郵傳命喜聞君子之得輿升斗踈恩庶免波臣之涸轍其為忻懌罔旣敷宣賀黄運使除緫領申内躋郎省外緫餉臺西賔出幕之十年遂專主席東漕下車之三月盡緫賦輿人歆錫命之蕃上恨用公之晩恭惟某官器資凝逺業履端温言行夙擇乎中庸名實乆孚於上下頃嵗紅巾之変折衝白刃之間数進忠規刈葵惟恐其放手縱無恩澤徙薪豈下於焦頭共推江夏之無􅀟再試頴川之第一維駒維騏維駱暫紆苞栩之飛如熊如羆如􅆛孰飽樵蘇之㸑帝咨衆望僉曰公冝王人下視於諸侯有嚴天節郎官上應於列􅀫肯歷土山政令先庚而已孚軍民旁午以相賀田里愁恨嘆息乆已周知財貨本末源流尤皆􅀫講皮不存則毛將安傳唇旣亡則齒得無寒欲兵食兼足之沛然在制閫同心而已爾旣無間越秦之肥瘠何難圖韓范之功名某百無一能億或屡中頃進緫領甚稱之語蓋在咨諏周爰之􅀄兹聆除目之頒豈勝頓足之喜惟榮之􅀊租無五千斛而使所月觧近七萬緡昨頼管煎抱賣之贏用􅀘大科帶􅀘之欠近困井仙之後難施箕歛之苛在小郡官兵旣多空腸而大司符移尚理虚額巧但施於有麫窮莫甚於無錐與物為春望公如嵗今夕飲者恩明日按者法正累故人觀察急於賦刺史私於民願哀老子賀楊緫領九鼎升賢九列緫賦兩川無踰老臣乆望甲寅之報厥有成命足寛庚癸之憂除目一傳滿口交慶恭惟某官資弘且毅器博而周解十二牛而有餘才固髙於一丗繫千駟馬而弗視氣亦蓋於諸公天使之爲入蜀之星人以此卜擒胡之月知彼知巳漢中方務於養民擒賊擒王許下幾爲之避地徒縁食乏遂致師還皇欲我公身任此事爰峻上卿之拜俾專計相之權金掌月升光無不燭玉關夜閉守或有餘聊寛西顧之憂即聽東歸之命某聳聞出綍竊喜得輿敢問遲之遲長恐遭羣吠之恠可以速則速幸即遄四牡之驅通四川王緫領鈆代董制帥企郎􅀫之周天夙瞻景耀望使星於蜀野行挹餘光同是天涯莫非王事欲捈方寸之悃可無咫尺之書恭惟某官器度崇谹典刑炳蔚江左風流之後代不乏人襄陽耆舊之家丗濟其美恬於再轉翩若一麾日近長安謂即登於金馬天通蜀道又出護於木牛惟􅀜中餽餉之功實海内安危之本樵蘇後㸑今多􅀫飽之師弩矢前驅古有晝行之羡行詠勞還之四牡佇觀趣侍於六飛某起家單平􅂪恩優渥立朝巳濫况塵六典之卿試郡猶慙輙冒十連之帥躊躇四顧冒昧一來惟方國奉十行之書妄希宣布諒王人序諸侯之上亦願將明代回趙緫領不餉師天塹晉秩月卿峙乃糗糧坐給列屯之衆厲以爵禄冝登九州之命恭惟某官育德忱恂掞材膚敏方公私之積可哀痛孰與阜通顧財貨之出有源流當加斟酌朞年而變千里無飢載疇流馬之功冝進執羔之寵某阻陪賀旅先辱撝謙卿不同乎巳升華於元冕公歸無所㑹加􅂌於繡裳代董帥回楊緫卿交割榮駕駟車遄開犀印卿士惟月班通河海之間軍聲如雷驩溢􅀜山之外恭惟某官材弘且毅器博而周運斤成風解全牛於四顧䇿轡奔電洗凡馬而一空皇咨分閫之勲命亞執珪之位合東西而瞻使節共稱緫賦之有人分南北而立王庭何患擒胡之無日亟觀舎爵佇即歸班某有幸為寮又將徼福百里九十正􅀝同舟共濟之功一日三秋願叱􅀒弩前驅之效代回趙緫領不祥刑訓夏深愧曠官事典司冬猥令率屬冒恩有靦竊芘知歸恭惟某官給餽上流簡知中扆樵蘇􅀫飽知調度之賢勞衮繡晝行佇詔書之趣覲有華餘􅃳且及陳人某度其夕陽冝於野服猶曳鄭崇之履小立斯湏行巾元亮之車又奚惆悵代回四川陳緫卿咸陞卿九農給餉四蜀事權増重光弩矢之前驅氣色益明飽樵蘇之後㸑恭惟某官學宗洙泗秀禀岷峨介然忠勤屹立江流之砥見於調度傍流地上之錢致詳慮於講解之餘}
