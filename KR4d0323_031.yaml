body:
  text: 四六標準卷三十一宋李劉撰教官宋初有四書院廬山白鹿洞嵩陽嶽麓應天府未建州學也乾道元年兗州守臣孫奭私建學舍聚生徒乞請太學助教楊光輔充本州講從之餘鎮未置學也景祐四年詔藩鎮始立學他州勿聽也寶元元年潁州守臣蔡齊請立學時大郡始立學而小郡猶未置也慶厯四年詔諸路州軍監各令立學學者二百人以上許吏置縣學於是州郡不置學者鮮矣又置教授以三年為一任以經術行義訓導諸生掌其課試之事而糾正其不如規者委運司及長吏於幕職州縣官内薦教授或本處舉人舉有德藝者充當時雖置教授或用兼官或舉士人委於漕司而未隸朝廷也熈寧六年詔諸路學官竝委中書門下差選至是教授始命於朝廷矣元豐元年州府學官共五十三員諸路惟大郡有之軍監蓋未盡有也元祐元年詔齊廬宿常等州各置教授一員自是以後列郡多有教官矣通武岡陳教授震造託湘流疑已就碧油之幕賈誼傳造託湘流兮敬弔先生師古曰造至也言至湘水而因託其流也造十到反方于詩問津求拜碧油幢歐陽詹詩十萬貔貅擁碧油延緣巫水乃聞還絳帳之紗莊子延緣葦間柳文武岡銘黔山之巑巫水之磻馬融傳常坐高堂施絳紗帳前授生徒後列女樂詳見前愧執訊之已稽詩執訊連連詳見前盍通名而告至恭惟某官學探千載文擅一家司馬遷傳究天人之際通古今之變成一家之言聲摩殿前皆三誦阿房之賦李賀詩殿前作賦聲摩空餘見前禮羅幙下顧載歌泮水之詩兹聞章交行即陛覲竝見前紫皇好學正爾恢天網之收晉天文志紫宫為帝皇之居又紫微大帝之座天子之常居也又紫微宫中鈎陳一星曰天皇大帝傳咸天地賦帝皇正坐於紫宫山谷詩紫皇訪問富春秋又天恢獵德網日饍養賢鼎魏文帝典論設天網以該之黃閣招賢㑹亟勸露門之講公孫𢎞傳開東閣以延賢人周書武帝平齊幸熊安生第拜露門博士保定中置露門學沈重於露門館講論語詳見前州縣徒勞人耳梁竦傳州縣之職徒勞人耳將相寧有種乎史記陳涉世家王侯將相寧有種乎某垂老無聞甚愚不肖向者誨諸生於館下要是牛溲韓文晨入太學招諸生立館下誨之曰云云又牛溲馬勃敗鼓之皮兹焉試别駕之治中亦非驥足蜀志魯肅遺先主書曰龎士元非百里才也使處治中别駕之任始當展其驥足耳不曰丞哉之余負韓文丞哉丞哉余不負丞而丞負余亦惟善者之吾師左傳鄭人游於鄉校以論執政然明曰毀鄉校何如子産曰其所善者吾則行之其所惡者吾則改之是吾師也若之何毀之儻諧半面之期謝承書應奉年二十時嘗詣彭城相袁賀賀時出行閉門造車匠於内開扇出半面視奉奉即委去後數十年於路見車匠識而呼之北齊書楊愔聰記强識半面不忘元稹詩半面契終始陳後山詩平生天上張公子尚記門間半面人亦勝交臂之失莊子吾終身與女交一臂而失之史記西南事秦交臂而服漢書交臂受事屈膝請和監州無蠏恐非直杯水之官東坡詩欲問君王乞符竹但愁無蟹有監州隋書趙軌傳為齊州别駕詔徵入朝父老揮涕曰公清如水請酌一杯水奉餞詳見前廣文有氊幸或作數旬之客杜詩廣文到官舍繫馬堂階下醉即騎馬歸頗遭官長罵才名二十年坐客寒無氊賴有蘇司業時時與酒錢舊唐書韋思謙傳左肅機皇甫公義檢校沛王府長史引思謙為同府倉曹謂思謙曰公豈池中之物屈公為數旬之客以望此府耳回武岡連教授嶸補黔中之上佐問字茫然新唐書王忠嗣傳明日見責不失一金吾羽林將軍歸宿衞不者黔中上佐耳詳見前揚雄耆酒好事者載酒從之問竒字東坡詩未許中郎得異書且與揚雄説竒字聞稷下之諸生迎師幸甚史記齊稷下學士復盛且數百千人劉向别錄齊有稷門城門也談説之士期㑹於稷下也索隱曰齊地記曰齊城西門側系水左右有講室趾往往存焉蓋因側系水故曰稷門古稷側音相近耳又虞嘻曰齊有稷山立館其下以待游士亦異説也春秋傳曰莒子如齊盟于稷門是也未遑執訊見首條先辱鳴謙易上六鳴謙注上六最處於外不與内改故但有聲名之謙此斷章取義恭惟某官正學純明儒林傳公孫子務正學以言懿文炳蔚一門三秀聨翩千佛之題新唐書杜正倫傳隋世重舉秀才天下不十人而正倫一門三秀才皆高第為世歆美詳見前六館十年卓犖諸儒之倡韓文卓犖為傑新唐書韓愈傳贊以六經之文為諸儒倡顧棲鸞於矮屋仇覽傳署考城王簿王渙曰枳棘非鸞鳳所棲開元天寶遺事張彖為華隂簿為守令所抑嘆曰大丈夫拘於下位若立身矮屋之下使人擡頭不得又繫馬於堂階見上條君子所樂三在得英才而教育天下達道五正須師席之琢磨荀子人之於文學也猶玉之於琢磨也佇令巫水之磻見上條咸識沂風之詠遄班玉筍山谷詩誰憐舊日青錢選不立春風玉筍班遂講金華漢書上方嚮學鄭寛中與張禹朝夕入説尚書論語於金華殿中詔班伯受焉某典午非材韓詩長慙典午非材識得就聞官即至公同寅何幸君來重席底虞坐客之無氊謝承後漢書戴憑字次仲世祖正旦朝賀令羣臣説經更相難詰義有不通輒奪其席以益通者慿遂重坐五十餘席杜詩坐客寒無氊丞未全聾尚聽講經之有笥黃霸傳長吏許丞年老病聾邊韶傳腹便便五經笥代回武岡何教授談老形已具久欲掛神武之冠陳後山詩老形已具臂膝痛南史陶𢎞景傳家貧求縣令不遂脱朝服挂神武門上表辭禄詔許之族姓未寒幸不冷廣文之席此啓蓋代月湖故云有來雙鯉如對三鱣楊震傳有三冠雀銜三鱣魚飛集講堂前都講取魚進曰虵鱣者卿大夫服之象也數三者法三台也注鱣音善鱣魚長者不過三尺黄地黑文故云卿大夫服之象此音張連切恭惟某官挺特令名飛騰茂實圜橋策足振鬛先登方策蟠胸摘髭獨晚並見前邂逅泮林之集詩集于泮林頡頏蓬島之游某急景凋年鮑昭舞鶴賦窮隂殺節急景凋年李商隱詩急景倐云暮頽年浸已衰閒官窘步韓詩得就閒官即至公離騷經何桀紂之昌披兮夫唯捷徑以窘步窘急也閉蕃於六館之空舍其亦有施乎昌黎何蕃傳蕃純孝人也閔親之老不自克一日揖諸生歸養於和州諸生不能止乃閉蕃空舍中於是六館之士言於陽先生城請諭留蕃又譬之水川者高澤者卑高者流卑者止天將雨水氣上無擇於川澤之高下然則澤之道其亦有施乎識堅也十年為故人將賀其鳴已昌黎送何堅序其識堅也十年為故人又吾聞鳥有鳳者恒出於有道之國當漢時黃霸為潁川是鳥實集而鳴焉若史可信堅歸吾將賀其見鳳而聞其鳴也已回白教授酉中舉爾所知期不辱賢材之實與我共理亦惟賴庠序之申循吏傳與我共此者其惟良二千石乎何勤撝謙易无不利撝謙注指撝皆謙動合於禮更加巽謝恭惟某官器能膚敏學問純明問一得三子職早深於學禮喝五作六甲科共徯於為郎晉書劉毅於東府聚樗蒲餘人並黑犢以還唯劉裕及毅在後毅次擲得雉大喜謂同座曰非不能盧不事此耳裕惡之曰老兄試為卿答既而四子俱黑其一子轉躍未定裕厲聲喝之即成盧焉五木經注雉為二梟為六盧為四儒林傳歲課甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故云兹暫憩於冷氊合亟膺於溫綍某愛莫之助情見乎辭繫辭聖人之情見乎辭繫馬階前切勿羨諸公之衮衮銜鱣堂上正須效夫子之循循俱見前回白教授酉中法從舉賢誠知人矣揚雄傳毎上甘泉常法從師古曰法從者以言法當從耳一曰從法駕也婁師德傳武后問狄仁傑曰師德知人乎對曰臣嘗同寮未聞其知人也后曰朕用卿師德薦也誠知人矣廣文道謝何至我哉董仲舒傳此言何為至於我哉靖惟暗中摸索之明何待送上吹嘘之助俱見前恭惟某官器中瑚璉見前行存宫庭荀子是君子之所以騁志意於壇宇宫庭也注宫謂之室庭門屏之内也君子雖騁志意論説不出此壇宇宫庭之内也䝉求我而我匪求䝉識其大者易匪我求童䝉童䝉求我注閣者求明明者不諮於闇學優仕而仕則優學人自即之野王三老傳是以即人者人亦即之東坡答山谷書此人如精金美玉不即人而人即之是宜四牡之章不待雙魚之請見前某初無寸力過辱尺箋上臣事君以人斯為可賀荀子下臣事君以貨中臣事君以身上臣事君以人貪天之功為已則不敢知左傳竊人之財猶謂之盜況貪天之功以為己力乎回白教授酉中下車聞庠序之教亟欲引賢華嶠後漢書衞颯遷桂陽太守下車修庠序之教設婚姻之禮朞年間邦俗從化積閲限銓選之文甫能剡奏史記明其等曰閥積其功曰閲車千秋傳無伐閲功勞師古曰伐積功也閲經歴也吏部掌三銓選法法言奏不剡是亦公舉何費屬辭恭惟某官行無玼瑕瑕玉病疵黑類左傳予取予求不爾瑕疵學有源委禮記學記三王之祭川也皆先河而後海或源也或委也此之謂務本繫堂下之馬安能鬱鬱以久居韓信傳吾亦欲東耳安能鬱鬱久居此乎釣海上之鼇行即飄飄而高舉侯鯖錄李白謁宰相封一板上題曰海上釣鼇客宰相問曰先生臨滄海釣巨鼇以何物為釣綸白曰以風波逸其情乾坤縱其志以虹蜺為絲明月為釣又問何物為餌曰以天下無義氣丈夫為餌宰相竦然聊助鼓旗之譟左傳師之耳目在吾旗鼓進退從之寇恂傳士馬四集幡旗蔽野恂乃令士卒乘城鼓譟六一居士詩安得二子接揮鋒兩交鋩我亦願助勇鼓旗譟其旁何勤珠玉之投某愛莫助之顔之厚矣詩巧言如簧顔之厚矣引鼎不程其力聊復露章禮記引重鼎不程其力何武傳所舉奏二千石長吏必先露章推轂有味其言更祈強學強上聲禮記夙夜強學以待問餘見前回白教授酉中二毛五馬何知千騎之榮杜詩人生五馬貴不受二毛侵古辭陌上桑東方千餘騎夫壻居上頭尺素雙魚倐拜三鱣之辱左傳拜命之辱餘見前未能先施敢缺報章恭惟某官武安故家史記白起傳起攻楚拔郢秦以郢為南郡白起遷為武安君文公宿學新唐書白居易傳遺命毋請諡敏中為相請諡有司曰文丁年出使便入對天子之庭李陵答蘇武書丁年奉使皓首而歸丁年謂壯年也梁書王僧孺傳丁年蓄積與此銷亡盧照隣詩丁年遊蜀道斑鬢向長安溫庭筠詩回日樓臺非甲帳去時冠蓋是丁年王荆公詩丁年結客盛游從宛洛氊車處處逢甲科為郎何至落諸侯之客杜詩甫也諸侯老賓客又早作諸侯客餘見上條佇由芹水徑上蓬山某濫領斗州南史宋典籤之權重宗慤為豫州典籤多所連執慤大怒曰慤年六十得一州如斗大不能復與典籤共臨之又捫井絡蜀道難捫參歴井仰脅息河圖岷山之地上絡東井帝以㑹昌神以建福斗井宿名杜陵十暑復重尋流汗之炎杜詩十暑岷山葛又炎赫衣流汗低垂氣不蘇又亭午減汗流北隣耐人聒范叔一寒行可伴無氊之冷其為欣幸曷既鋪棻竝見前代回王教授同八公同辰推薦賢之轂晉書職官志世祖武皇帝即位之初以安平王孚為太宰鄭冲為太傅王祥為太保司馬望為太尉何曾為司徒荀顗為司空石苞為大司馬陳騫為大將軍世所謂八公同辰攀雲附翼者也互見前一第溷子寒坐客之氊新唐書元結傳舉進士禮部侍郎楊浚見其文曰一第慁子耳有司得子是賴果擢上第復舉制科互見前輒用名聞何勤私謝恭惟某官學省佳士新唐書歸崇敬傳天子學曰辟雍故前世或曰璧池或曰璧治亦言學省沈約有學省愁臥詩注學省國學也山谷詩學省得佳士又學省非簿領又學省困虀鹽詞塲雋人何蕃貌不任其心而行焯焯昌黎太學生何蕃傳蕃之力不任其體其貌不任其心又司業祭酒撰次蕃之羣行焯焯者數十餘事以升之於禮部而以聞於天子焯音灼仲舒言有補於世其對洋洋鴞既集於泮林見前鳳當巢於阿閣尚書中候堯即政七十年鳳凰止庭伯禹拜曰黃帝軒轅氏鳳皇巢阿閣讙樹韓詩外傳黄帝時鳳凰止阿閣隋律志毛爽云黃帝聽鳳阿閣之下始造十二律平昌足信况有李翺之言昌黎答楊子書近又得李七翺書亦云足下之文逺其兄甚夫以平昌之賢其言一人固足信矣况又崔與李繼至而交説耶翁歸不私何害山陽之託尹翁歸傳拜東海太守於定國家在東海欲屬託邑子兩人令坐後堂待見定國與翁歸語終日不敢見其邑子既去定國乃謂邑子曰此賢將汝不任事也不可干以私吾徒得君重耳汲黯傳吾徒得君重注徒但也重威重也子亦來見我乎某過辱臨存嚴助傳使重臣臨存更勤賁况臨賁卦名扈甘泉之八十一乘殊愧所䝉揚雄傳毎上甘泉常法從在屬車間豹尾中服䖍曰大駕屬車八十一乘詳見前晉書羊祜表臣雖小人敢緣所䝉念存斯義登凌煙者二十四人更祈自勉唐㑹要貞觀十七年詔曰甘露良佐麟閣著其美建武功臣雲臺紀其跡無忌等二十四人宜酌故實並圖畫凌煙閣二十四人詳第十四巻四六標準巻三十一
