front:
  text: 四六標準巻之三
  hash: sha256:0df7aa7bdc6e8cbcb415bd5c89352dc70e63109c9d8ed46b7b4b8be0fa80184c
body:
  text: 薦舉謝董侍郎居􅁩舉狀隨驃騎之幕濫備執鞭剡公車之章遽蒙推轂心感恩於破白靣抱媿而發紅伏念某禀生多艱從䆠尤拙貴人令其出門下既不善於走趨大夫羅而致幕中亦倍勤於収拾豈謂半年之内復爲千里之行治法征謀紛紛未定幕膺檄筆錄錄無竒然白日實照其精誠則赤雲可占於勝氣况値匈奴百年之運必復春秋九世之讎颭犀札而咤􅏚旄在此行矣封龍額而獵麟脚竊有望焉曽未輸横草之勞何遽辱采蘋之薦乏呉下阿􅂪之學顧曰淹該無江南子布之詞反云典麗裨益之功甚寡奬予之實何多兹蓋伏遇某官以社稷臣爲詩書帥孤忠可貫於日月至誠足逹於天淵一􅀛一琴人皆望清獻之出萬牛萬甕賊必待崇文之擒佇觀十乘之行大作三軍之氣繫單于之頸慰祖宗在天之靈犂匈奴之庭爲蠻夷猾夏之戒于以侈旂常之績歸而䇿鼎鼐之勳凡在紅蓮綠水之間必入赤箭青芝之用某敢不力磨其鈍圖􅁛所蒙插羽銘山敢衒文章之小技冶金伐石願歌竹帛之大功謝魏運使了翁舉狀據地承顔非有豚蹄之祝爲天啓齒廼蒙蟲臂之収勞軍將之打門發函書而驚坐難道今人之不古但虞吾黨之累公伏念某於道無聞甚愚不肖毎思名敎之樂地何必事功亦知富貴之浮雲不如貧賤徒緣一第之彊爲三釡之謀中罹弗洎之悲甚悔未信之仕以風爲解遂回蓬島之舡斡流而遷徑泛瞿唐之水既元戎所自辟於天子非先生敢圖利於大夫綴錦城雪嶺之觀未容黔突厠天水祁山之役濫佐青油方深國事之憂遑復身謀之恤車輪四角何敢累推轂之人厦屋萬間亦莫認捲簾之處敢謂誠心之傾倒竟煩强箭之吹噓兹蓋伏遇某官學者泰山國之元氣年不可及寧妨待天下之清時來則爲終必得聖人之任引扁舟於蓬島閲十暑於岷山人疑魁枕參首之淹公無瓶居井眉之悔卿自用卿法吾親属吾思駭聞渡瀘之行倐罹陟屺之變故者無失其故夫能致唁於生芻誅之不可勝誅敢望噓枯於死草忽辱遺我雙魚之寵見貽駕彼四牡之章學落質凡顧謂識髙而韻邃氣凋力腐反云才贍而意新近功缺然遠業安在初不敢兾緇衣之改何爲過蒙華衮之褒師魯之從事陜西容有知之而弗薦永叔之退居頴上乃虞賢者之不聞所忻吾道之有歸豈獨小人之受賜某不知所報當勉其頑氣象未可攀但感幽桂榛菅之薦歲月坐成晚尚託江梅桃李之香謝鄒運使孟卿舉狀王事靡盬未敢懷歸使臣見知忽叨論薦况沐成終之賜尤衘引重之恩伏念某蠢蠢隨行狙狙何算少始知學亦有立功立言之心壯不如人已作爲貧爲養之仕偏親弗洎百念頓消漢庭諸公漫惜斯人之憔悴魯國男子自知吾意之蹉跎引舡既遠於蓬萊皷枻試觀於灧澦沐浴而戒行李人謂斯何飢渴之歌采薇歲亦陽止雖連収乘矢之發恐未免一簣之􅃜豈無他人欲令出其門下不有君子寧可弃之道傍兹蒙四牡之章遂足五豝之數在繍衣六條之察定匪徇私然華衮一字之褒却疑過實盖經邦本諸政事而緯國取於文章游夏求賜之異科雖孔門而難備董賈龔黄之殊傳在漢世而罕全自視然前言戯耳士固伸於知己蓋非搖尾而後怜德不待於成身却合銘心而自厲兹蓋伏遇某官人今而心古行峻而氣平分閫乘軺欲轍環於四海揚金歛璞眞鑑别於九流尚煩入蜀之星來卜擒胡之月子午之竒可出但當飽戊己之屯甲寅之報未來何以寛庚癸之呼尚屈餽餉關中之手且圖轉輸渭上之功諒思人物之渺然僅有征夫之邇止劒外之官易冷聊借吹嘘幕中之辯非傾謾加収録其敢不稍䥴􅈸習謹佩味言號門生而知恩例欲自同於蛇雀報國士之遇我誓當小異於馬牛謝衛參帥涇舉􅀜陞小子狂簡之成章無能爲役大鈞坱圠而播物有味其言幸辱備於使令亦足謂之遭遇不應論薦便累吹嘘伏念某受質亡竒望丗亦狹童而強學粗知萬物之皆塵壯不如人縱得一科而何補舍對白抽黄之業爲出朱入墨之謀人言棲枳之官决無鸞鳯渠知求芻之志固異馬牛不圖賈子之泛湘偶際召公之分陜望塵雅拜孰非夾道以疾馳敷袵敶詞獨念此君之小異令以竿牘小夫之智效於詩書元帥之前一年于兹五技窮矣可以止則止方願返於屠羊莫之爲而爲駭忽勞於薦鶚亟嘗輸􅅃願且避賢豈期刺史之天决爲將軍之地識字有數敢當淹博之稱了事亦癡寧有踈通之實非相國賜之大禮之過詎至是耶使天下洋然動于然來其必由此古之所以求士今者於是見公恭惟某官身佩安危力關造化兒童之誦君實乆佚丘園夷狄之問潞公暫司管鑰察湖南之從事欲兾北之空羣雖有絲麻且揚糠粃意者恥匹夫之不獲欲其収多士以攸奔無以我公亟展伊周之業豈惟委吏得專文武之功某既累公知寧當自弃少留東閤難掩人言魏勃之庸更遶南枝或備臣客馬周之對謝曽運使槃舉關陞墨綬主書苦乏曵裾之譽繍衣察吏忽承推轂之言况下考之甫書曽微勞之未效便辱吹嘘之送允爲特達之知伏念某何足控􅅮不堪位置抱鉏犂而餓空谷乃無端以讀書褁章服而揖上官還不習於爲吏解后六條之察吉蠲一瓣之香祝甌窶而操豚蹄不夸而狹見丸彈而求鴞炙匪躁斯狂不謂蘇天尚爲李地燈花夜報奏藁朝馳誦説云乎顧謂文章之典雅㑹計而已反􅁛政術之䟽通難當一字之褒乃辱八珍之犒小草之有遠志但欲􅀷根老芋之爲茯神誰欺精鑒伏遇某官家傳忠恕嫡嗣文清洊疇剖竹之庸繼著握蘭之望濡轡而馳原隰疑若小然聽履而上星辰恐不免耳尚念斗升之嚵嚼若爲分寸之躋攀目其貌耳其言雖乏同進之交譽知其主信其客姑令從事之流聲鶚薦一飛馬價三倍某雖無以報敢辱所知始與箠楚辝儻遂少陵脱身之願尚煩左右笔請歌昌黎薦牘之詩謝林提舉行知舉關陞抱會計之簿書安知鼇釣瞻光華之禮樂忽拜鶚書曾微扳援之緣何自聽聞之誤伏念某性徒是古學不前人尋墜緒之茫茫我之懷矣踵常途之役役誰者念之坐違汗漫之期遂逐侏儒之飽主簿四十亦知鄧禹之笑人公車三千豈乏鄭莊之薦士未有不求而得者吾非惡此而逃之馬失之瘦士失之貧其來已乆牂生於奥鶉生於突彼各有由甘心妄校尉之行間絶意諸貴人之門下忽繍斧之問俗如緇衣之好賢察之進旅之間寵以關陞之剡妄庸人耳顧􅁛履行之端詳誦説云乎反謂詞章之典雅一字已榮於華衮八音何有於爰居其求士甚士之求公公無愧古不即人而人自即我我則靦顔伏遇某官歛經濟材攬澄清轡衆人皆醉揩醒眼以旁觀萬物走圓改方心而不忍念天地之大矣懼人物之眇然顧以毛髪絲粟之長悉在權度錙銖之内有如齷齪亦與吹嘘惟今之謀人念不到此雖古之膚使何以加諸某敢不䇿不肖身爲必報計馬價既増於三倍驢技更勉於一鳴大夫薦人與之大夫固無是事國士遇我報以國士惟既厥心謝衛參帥涇特薦周公還贄僅収三士之材毛遂備賢輙在一人之數不求而獲其得也榮切惟范蜀公之封章七輩皆爲名勝吕文靖之賔客三朝頼其儀刑殆勱相國家之功自旁招俊乂而始然主擇客客擇主亦各有宜故公求士士求公苦難相値裴晉公於韓愈至公僅使之就閑歐陽子於聖俞素交乃忘於推薦况在踈賤何與品題某殖學多荒賦姿不穎偶綴一科之㡳強爲三釡之謀入墨出朱職甚安於祭竈依紅泛綠夢不到於轅門敢圖前茅采及下菲迨今數月無􅀘報於絲毫未始一言乞躋攀於分寸小人属饜而巳非惡此而逃之大鈞坱圠無垠果何修而得此欲使塵埃之吏進爲館學之儲受德者不待成身感知而巳盡己者謂之確論揣分謂何伏遇某官以社稷臣爲詩書帥傅説之輔台德宜楫巨川君陳之和厥終暫藩王室式篤緇衣之好庸爲夾袋之藏故令駑才亦玷鶚表某敢不激昂大節感刻異知諸侯薦人與之諸侯固無是理國士遇我報以國士請事斯言謝曾安撫從龍特薦伏蒙鈞慈露章特薦者竊以儀曹論秀舊累殊知帥閫舉能今叨亞選負留連之藻鑑辱根柢於朽株施重人輕感􅀷言淺伏念某不堪位置何足控搏少而恥有道之賤貧冒焉干祿壯欲行所知之學問愚不適時今難望不􅀛之封聊爾監無蠏之郡由貳攝長無儋石之儲晏然粗廉且平信蠻貃之邦行矣初無詞藻何有聲名周公欺我哉還贄僅収於三士韓愈亦人耳願忠豈後於百官濫吹其間循涯而懼兹蓋伏遇某官爽邦良弼命世元臣暫勤分竹於武安共徯聽麻於文德曉行夜醉已開南嶽之雲暮捲朝飛又作西山之雨雖自湖入海是亦東歸之兆然望魁與台亟還北落之樞庶不戰可屈於人兵見用儒無敵於天下一莊荒甚亦思向花木之陽半刺芬然詎意入蘋蘩之薦維昔武侯之一表實同説命之三篇首焉推向寵之淑均繼則舉費禕之忠實今以二難并之美併於一不肖之身自視欿然公言過矣然士固伸於知己則德豈待於成身諸侯薦人與之諸侯乆無是事國士遇我報以國士當厲乃心某敢不剗磢鈍頑鞭磨庸惰號門生而不知恩者非人也詎敢弭忘視匹夫不獲其所者若推之更祈終惠其爲感槩罔既鋪棻謝林寺丞行知特薦素韠御祥夢空懷於故宇綉衣薦士選猶及於陳人睽離恍隔於累年屯蹇既濵於九死廼䝉記憶尚送吹嘘始而驚疑終則慙懼人弃而已獨取此心定異於常情今無而古則聞兹事實關於世道非言可謝於禮敢違伏念某命固不猶材亦無似湘濵憔悴安得自髙蜀道嘻嘘固爲親屈彼蒼有罰莫白此心棘人欒欒勞心忉忉幸而終制逹官紛紛諸公衮衮誰實恤孤忽聞一節之趍甞及十夫之献漫令厠九人之後材難不其然至謂冠一路之賢吾斯未能信豈固察驪黄之外憐其困牛皂之同人謂斯何公言過矣舊游門下既已玷一株之桃今去籠中乃猶取三年之艾恩淪於髓媿溢其肝兹蓋伏遇某官德與春和氣如秋杳方淳熈之雜然並進固不乏於時材惟簡肅之老而愈剛實見􅁛於聖主今賢者識其大者蓋有之是以似之不然再轉而爲丞誰能三已而無慍徧持使盪始入郎闈君不行􅀆夷猶羌難得而覼縷廣帥之重唐制已然上弄印以選賢公聞命而就道何恙弗已盡興則歸得之傳聞似恐昔疾而今愈恬於出處豈非人醉而我醒然天下之所少者非材則海濵之來歸者有日勱相我國謹簡乃僚勉令進進不已之人皆動于于然來之意某敢不請事斯語力勉其頑德不待於成身豈但叙栁河東之感士固伸於知己自當發韓昌黎之狂謝瀘帥楊尚書汝明属城受察已感芘身帥閫簡僚更叨舉首得固榮於劵外愧有玷於牘端嘗觀七篇之包羅頗考五人之名数齊王爲都之知罪惟孔距心獻子取友之難忘必樂正子使下駟或當於上駟則後魚或誚於前魚矧某不才舉世所鄙坐力田之傷地脉迄不逢年欲養生以息天黥未能絶粒得郡豈嫌於如斗蹊田適値於奪牛有土此有財貧於近盬改井不改邑窮乃無錐不幸千里之旱可哀竟無斗升之水以活蒙􅃑弗勝其貿貿納溝寖覺其纍纍捄火暇問大人只得焦頭而爛額無麵欲爲巧婦但知剜肉以醫瘡思飢實自於己飢忍痛難思於方痛非惡其聲也實關鄉人孺子之心何誕之節􅀆固頼方伯連帥之惠鶴􅂰蜂腰尚未全復牛溲馬勃何足兼収此蓋伏遇某官德與春融氣如秋杳閶闔之開黄道夙高北闕之星辰斧􅃏之下青冥暫養南山之霧雨七年可即戎矣九罭以公歸􅀆觀察急於賦刺史私於民洞知委折今夕飲者恩來日按者法未忍舉行閔其存活数千之羸寵以治平第一之薦然饑饉扎瘥之甫定熈洽謂何且文詞學問之乆荒博􅀷安在尚書拔十得五矣孝亷聞一知幾耶徳不待於成身士固伸於知已某敢不懲羮吹沸求牧與芻諸侯失國託於諸侯無使飢餓於吾土國士遇我報以國士敢忘佩服於斯言衘荷惟􅀷敷宣罔既代謝衛參帥浮食畫墁又占芙蓉之幕飛章推轂遂依桃李之門請裁小子狂簡之章少謝大鈞坱圠之賜伏念某地寒無挾天巧亦慳膽落穹廬莫繼忠宣之衣鉢力扛洪鼎又慙文惠之箕裘徒藉義方獲沾世禄雖幸挂名於秋賦未能得雋於春闈盤旋州縣之勞祇慄簡書之畏偶終墨綬獲近碧幢適泰堦六符之光擁元戎十乘之􅀉生匠石之園長伯樂之廐固可卜其終身挹浮丘之􅃑拍洪崖之肩復自怜其凡骨聊作斗升之活敢希分寸之攀况西山行地之仙有八百輩而旌陽同日之舉僅十二人不應妄庸亦預推薦兹蓋伏遇某官三朝元老四海眞儒魁下兩星付榮進於素定胷中五色􅀘造化而不言靡辭三命之滋共要歷四方之維翰自洪移福瓣香續派於南豐由登入京夾道􅀉聲於司馬閩閫休歌於來暮呉儂莫切於去思陜而東陜而西方欲􅀪周召之化洛之南洛之北務多収温石之材包荒得尚于中行采菲何嫌於下體致兹孤進亦累一陶某敢不退自激昻勉圖報􅁛滕王閣之合賔佐既辱異知翹材館之招賢人應無棄物代謝帥座契家子弟謝合尖塵埃委吏夙依夏屋之萬間造化全功遂拜春風之一紙受知襞積懷感輪囷竊以山巨源之念遺孤吾聞語矣栁子厚之記先友誰實圖之非遟遟於捄死之八珍則淺淺於蘇枯之一溉有如念故人之子擢之於筦庫之中成始成終不進不止以此稱於天下豈當求之今人伏念某窺管識卑挈瓶知小備太史牛馬之走終覺駑庸讀先人科斗之藏卒無象似羌爲貧而出仕窘將母之不遑倚門之望既􅀷對床之歡亦廢雞鶩爭食難舒狷者之懷烏鵲無枝漸作歸歟之計豈謂荆潭之裴垍首求􅈆榖之石洪緫角丱􅀆憐其進拜於床下厥齒長矣不應曵尾於塗中假之寵靈長其光價遂從數月卒獲四章譬如爲山實易虧於一簣志在流水誰能冩之五弦忽逢公車之交遂合浮圖之頴父書是讀果何有於家聲兒事已癡豈眞明於吏治伏讀八字足華一生􅆑而翼之所謂如天之福我顔之厚矣未知何地以報公此蓋伏遇某官藩屏重湖凖繩百吏坱圠播物大鈞運於無垠追琢成章小子至於有造憐宣孟之無後撫叔敖以如生褒華衮之一言器蟠木於萬乘遂令長往之興亦入旁招之儲重惟此恩將何以謝某敢不恪共爾位惟既厥心我有二天已幸厠七十家之舉士更三日猶希與八百吏之除代謝茶漕司需次糟丘敢圖内舉贅貟油幕使效裏言昉兹服役之初敢廢修辭之敬竊惟中興重藩宣之寄故於機事置書局之官當建炎羽檄之交實許陪於賛畫迨紹興鞬櫜而後始無預於文移雖曰閑曹然亦異數如某者志雖自好學未知方爲箕爲裘亦自勉家傳之業不狩不獵居然承世祿之恩未敢荒筆硯之耕然已負懷綳之愧一行作吏甚安筦庫之卑萬里侍親忽有從軍之命猥容浮食使典内籌幸雖出於天然恐有爲之地者恭惟某官氣資凝遠風調浚明黄鍾爲宫散作人間之和氣大玉不琢中藏天下之至文肯爲入蜀之星實卜擒胡之月周爰咨度暫煩四壯之馳薄言旋歸即護六飛之馭凡叨氣類例沐吹􅌵致令疵賤之蹤獲􅀠走趍之數某敢不靖共爾位洗濯其心詩禮聞於過庭敬修可願孝友施於有政増益未能代謝茶使與合尖綴玉鈐之冷幕已廹踐更飛金節之薦函偶成合頴功莫崇於引重惠無大於成終㳙吉日以修辭順下風而請謝竊惟選舉既弊授受俱難相易則從之輕已發蘇老泉之嘆用决者恨其早可考黄山谷之詩君驕士而士亦驕君主擇客而客或擇主故達官多寡助之恨而志士無茍合之期兩不相逢一至此極况如大正可謂小知􅃡思舊學之碑有慙元獻不傍貴人之户却似小山第恐荒簪笏之家未免厲布韋之業虀塩十載於太學僅竊末科草茅一介之狂言幾投大僇甫息浮湘之枻冒隨諭蜀之車錄錄無竒安有幕中之辯沾沾自喜若爲席上之珍偶蒙諸臺共剡乘矢爲山九仞極知一簣之虧撞鍾千鈞此豈寸莛之力誰其從􅁷辱此吹嘘樂莫樂􅀆相知何敢急於自衒遲之遲而又乆諒欲察其所安好不改於緇衣褒果踰於華衮退惟内樸反稱凝重之姿正媿中乾何取純􅀷之學殆假㸃睛之筆俾䑛換骨之丹人訝其通籍之階冝淹而速自恐負親民之􅀉雖寵若驚此蓋伏遇某官風鑒精明天機沉邃逶遲苞栩盍周道之遄歸蔽芾甘棠殆召公之是似峻東壁圖書之領專西秦榷牧之司相馬舉肥恐小駟有足乘之理煎茶有味思大匠無可弃之材欲令轅下之駒謾備籠中之物故雖弄印迄使在鎔某敢不謹佩此恩力鞭其鈍公車薦士諒不収私報之情直道事人持此答曲成之造代董侍郎謝史丞相六年百謫託大造以全生一旦異恩録微勞而贖過盡復官階之舊仍沾祠廩之新毫髪不出於他人頂踵皆歸於化地伏念某夙無操挾積有僥逾州縣常才既躐從甘泉之槖藩垣重􅀉更濫分益部之符指心願報於寵光量力終牽於分量體廟謨安静之意何敢動兵承宣司減汰之餘又難増戍然盡地而守之䇿亦無日不討諸人㑹殘虜欲竄身於三秦聚重兵專垂涎於四蜀計我師之籍無八萬人分邊靣之屯幾二千里上藉朝廷之威德下慿將士之忠誠首殄渠魁既奏皂郊之一鼓繼殲羣醜不留蟠冢之隻輪偶興元偏帥殞於挑兵致散関諸卒潰而挻盗雖在韋皐去鎭之後難逃孔明貶秩之辜投􅂌囚山甘作浯溪之老適逢沛澤遂叨汝水之歸兹遇飛龍之御天曲念病駒之属地錄其尺寸踦許復於雁門活以斗升涸足蘇於鮒轍孰主張是遂登濟兹此盖伏遇某官柱石九筵綱維八極談笑洗咸池之日從容封函谷之􅅺博陸之益戸萬七千詎足報伊周之烈汾陽之書考二十四自應褊齊晉之功方藏疾以匿瑕務厲世而磨鈍復其官爲子孫之計見此恩乃父母之心某敢不仰佩殊私益磨晚節誘我松桂未敢勒北山之移収之桑榆庶幾補東隅之失代陳帥機元勲謝衛參帥細書成文蒐實材於公舉大鈞播物挈冗吏以名聞雖嘗備於使令初無堪於選錄况受及􅀲之代難徼采菲之恩不謂三人之占乃使匹夫之被一陶異甚再省矍然伏念某頑踈之資浮沉於世塵容俗狀果何有於詳華綿力薄材豈眞能於强濟門䕃只宜於平進閫僚自合其宣勞粗奉文書無可言之功狀非有方略難曲盡於事宜是直常鱗凢介之匹儔何計乘鴈雙鳬之多少矧入幕之日淺而歸袖之風披三匝彷徨不識捲簾之意一封覼縷忽聞推轂之言得之駭然望不及此既非請謁而得是謂特逹之知公求士甚士求公乆無是事子生孫復孫生子難報此恩伏遇某官直大而方清和且任與人不求備此心即孔孟之心乃言㡳可行所論合禹臯之論暫甘棠之美召即淇澳之相周雖俊乂始入於旁招而巧拙或容於雜進遂令遯尾之客亦入需頭之章某敢不銘刻鴻私鞭磨駑鈍藉使百無逢於世亦有一回顧之榮指心圖稱於品題滕口難論於報效然􅁛於天下曰知己今者非耶使遇以國士報衆人天厭之矣代章監倉謝衞安撫瑑下士代耕之祿僅守積倉上臣事君以人忽騰薦櫝憐其出身於幽谷使之陟彼乎高岡愧在盧前感從隗始切以筦庫七十家之舉古道乆衰法筵第一義之觀今聞尤聳有嚴十乘所部九州鳳翼龍鱗孰不希於攀援牛溲馬渤皆有望於蓄藏及下車之云初乃推轂於綦賤其爲衘戢實倍等夷伏念某質窳亡竒材庳莫抗服箱以走渠憐滿脰之黄鍾按劒無因誰肯先容於白璧强折腰於爲米眞眯目於簸糠今蒙需章可使升秩父書是讀果何有於家傳兒事已癡豈眞堪於世用一字之褒已過兩喜之溢何多伏遇某官以社稷臣爲詩書帥與人不求備収毛髪絲粟之微嘉善矜不能無絲麻蒯菅之間有如頑頓首辱甄陶九罭之魚鱒魴即遄歸於周室千里之馬騏􅂹會交獻於燕庭某敢不增所未能修其可願常爲委吏已蒙葑菲之収寘彼周行尚幸蒹葭之采代趙撫属汝諿謝衞安撫溝水流行乆汙芙蓉之幕岸花飛送漸違桃李之蹊重感眷留倍􅀷衘戀更裁四六少謝萬分伏念某再省妄庸一何僥倖當大參政十乘啓行之日適小丈夫三年垂滿之時惟其樂莫樂􅀆相知是以遲之遲而又乆敷施翕受更無假於先容前輓後推眞不遺於餘力居然穿縞之末迄成合頴之謀感溢瓶罍功歸爐冶乃瞻衡宇情已迫於忻奔及告油幢恩數勤於盻睞謫將滿百辤不免多今蒙慨然允爲幸甚鵾鵬水擊强希萬里之圖烏鵲月明罙結一枝之戀恭惟某官東郊道洽西陜化成展長沙千里之平民無遺便對宣室半夜之問王曰遄歸凢今日毛髪絲粟之才皆他時欂櫨侏儒之用欲作大鈞之問又虞小器之盈敢陳捈謝之詞更致依投之悃常擬報一飯柰何回首於南山可以觀四方自此馳神於東閤代趙撫属汝諿上提刑油幕綴員漸廹終更之候繡衣察吏鼎來剡奏之章初非光明俊偉之材又無假借板援之勢古之所以薦士今者於是見公伏念某名爲宗支實本士檢恥懷綳之簮笏恐受衆疑隨韋布之縑緗偶叨一第慨念勉峴程回之術業終愧毛原周召之等夷何以亢身莫如殖學方以此自厲於己何敢輕受知於人細桷大杗壹􅁳心於輪扁長箋短櫝肯請命於子公來事元戎實叨未属適䑕竊狗偷之盜蕩摇我疆奪鳥飛魚泳之驩劬勞于野濫承渙渥許减常貟然風憲之一削不圓則天門之九關難扣解后行露之聽寅緣􅀫霧之披甫及褰帷遽蒙推轂既不爲有力負舟而走又不生無因按劒之疑伯氏壎仲氏篪安得齊名之實臺中評幕中辯􅀄何賛畫之功猥借溢言特加吹送犍爲之磬十六大似無心而得之公車之牘三千誰有不求而至者内則感國士之遇我外則賀天下之有公輪囷在肝緘封於髓伏遇某官人今而道古内介而外通嘉善矜不能所學皆孔孟之學舉直錯諸枉此心同伊傅之心駪駪六轡之載馳落落萬物之吐􅂔有懷鴛鷺之序及識鶺鴒之原參以旦評慨然露奏振雲天之高􅁩䇿塵土之孤蹤暴公子之薦不疑昔聞其語楊湖南之信陳子今媿斯言某敢不􅀷自佩銘痛加砥礪謝恩私室敢矜小技之文章不辱公門願勉大閑之節􅁩代趙撫属上衛參帥求合尖汝諿一官頂踵冒假借之􅀷恩三沭肺肝乞品題之終惠恃在有容之大忘其取數之多伏念某雖出天潢初無地望燈花何喜一科不補於遺餘袍葉半枯萬事已甘於濩落浪爾依芙蓉之幕下誰其采薜荔於水中適逢先十乘於偃藩遂得厎百僚而􅀠役不虞一見便辱異知識元方而用季方乆無此事謀石子而羅温子不曰非才借以齒牙付之羽翼知我莫如鮑叔逢人必説項斯遂令􅃜簣之山迄作合尖之塔惟是過屠而大嚼難忘見麴以流涎兼幸生匠石之園託根未正縱欲附翹材之館張本已踈豈無列薦之貟亦有十科之目或蒙送上亶謂成終大鈞無垠拔士不遺於餘力小子有造歸恩豈在於他門恭惟某官以社稷臣爲詩書帥喬嶽之蓄雲泄霧人蒙潤而不知滄海之包乾括坤物何歸而不得尚念碧油之属欲䑛丹竈之餘縹緲孤鴻漸恐回頭之斷漏差池歸燕寧能絶望於捲簾幸從昌黎弟子之貟徑寘陸氏門生之列茅茹以其征吉今期已免於西曹桃李悉在公門他日尚希於東閤代陳縣尉愷上衛參帥求舉酸寒溧尉古須强箭之吹嘘憔悴湘濵今累大鈞之坱圠百無操挾萬有狂愚然而恃大參政之寛洪必不責小丈夫之躁妄切以三吐哺三握髪而下士周公豈欺我哉一舉手一投足之乞憐韓愈抑亦人耳况幸在犀甲熊旂之下乃無與豨苓雞壅之中恐虚此生何用於世是以頃者之詣府敢於冒焉而呈身温乎其和可知既蒙異顧粲然有文相接實激懦􅂨惟是下考之垂成猶兾上天之吹送懼捲簾之或晚忘躍冶之非祥伏念某鹿鹿亡庸狙狙何取砥節礪行不能窺前輩之藩籬種學績文且末識古人之糟粕半生一第寸祿八年茅舍聽雞猶是儒酸之氣味竹弓射鴨安知吏隱之風流然粗覺無媿於心幸以此不惡於下慨念一寒之迹若爲再命之階得拜馬前已遂執鞭之願無爲牛後遂興見彈之思然記碧油之幢頗辱黄金之諾以其時則可矣敢不長嗚異乎人之求歟眞成自鬻伏遇某官直方且大清任而和公路垂紳即正槐廷之靣侯方賜履暫爲蘭畹之滋遇民猶兒求士如渴東山􅀲苦共思零雨之遄歸南國棠甘未若敷天之純被顧以椳闑􅹣楔之細皆在毛髪絲粟之中欲善鄭來請從隗始某敢不激昂駑鈍報稱鴻私桃李悉在公門既感東風之鼔舞葑菲無以下體尚幾秋露之均沾代趙縣丞善倪上撫州林守洽求舉賛長官之雨不善避嫌戴刺史之天夙蒙假䕃惟是斗升之活若爲分寸之躋流涎乆動於麯車病顙輒希於箕秣印刓果否冶躍可乎切以寗戚之歌鬷明之言雖賢不免匠石之園伯樂之廐所係尤􅀷既辱在於使令且已叨於識察將以知已稱於天下乃使勤子至於他人縱欲􅁳心何以藉口伏念某號爲宗姓實則儒生束髪所期豈念祖宗之簪笏摘髭不力竟慙伯仲之塤篪怵於食貧遂爾諾仕一行作吏已徒勞州縣之間再轉爲丞眞覺出簿尉之下顧惟蹇拙粗守公勤不利走趨寧免長官之罵尚能拜起孰非太守之恩試以代庖幾於環轍莽誰欺於揆牧復攝事於子男柰何五章漠無寸援得不得之有命當安造物之鑪錘樂莫樂􅀆相知更傍誰家之門戸伏遇某官眼高四海氣蓋諸公千佛姓名早宜登於文石三神步武晚猶會於郎星戴馳孑孑之旟有偉皇皇之轡胡然歛惠復此專城公不嫌旋馬於蟻封士則嘆烹雞於牛鼎雙旌属爾五袴暖然謝康樂之文章尚餘此地顔平原之氣節如見其人竊窺帥之文可見察吏之意不知庸下還入選中既旁無蟠木之容姑且作大鈞之問盡枿去牙角雖無種學之􅇦澄託根借恩光或許孤芳之皎㓗代黄主簿夢得上樓倉求合尖􅀚瞻使槎於霄漢無地修容抗簿領之塵埃以身得察聞高標之戍削絶末俗之夤緣遂忍恥以自鳴望徼恩於回顧切以爲山九仞正虞一簣之􅃜持綆百尋斯動三途之望故功莫崇於引重而恩無大於成終必以爲無益而舍之則未有不求而得者伏念某﨑嶇百戰濩落一科棲枳棘之叢中但合出朱而入墨搴芙蓉􅀆木末安知泛綠以依紅偶效役於轅門遂贅貟於幕府文書堆桉眞成俗吏之爲獄訟如絲粗了癡兒之事兩蒙連率交剡公車惟是緇衣之三章尚須華衮之一字月明繞樹自憐烏鵲之何依海上問津或謂斗牛之可訪惟是夙蒙於廉察未甞得效於使令冒然有言可謂不韙然苟以平昌之言足信則或知尹公之取必端徑援筆以㸃睛當勒銘於刻骨恭惟某官盛名如晝和氣猶春自其甲進士之科即合庚佐王之學百川既倒屹砥柱之固存萬木盡僵凛嶺松之獨秀由曲臺之議禮謂直筆以記言居然偏城歛此大惠田里之無愁嘆有偉民庸原隰而有光華亟將使指福星所照旱魃巳消然設有膠東三萬户之流民必將匄江西斗升水而活我尚煩周度爲此曲防然後遄四牡之歸于以扈六飛之馭思天地之大矣念人物之􅆌然欲善鄭來請從隗始主簿能令公喜今謂斯何使者或不汝容信乎命矣代回楊評事洪之謝求薦具一鶚之表方有待焉遺雙魚之書何其駛也不能辭璧又愧報瓊恭惟某官騰茂蜚英閎中肆外十事九律備知小大之情千條萬端未容上下其手見何晚也愛莫助之儻寛食麨之期敢愛拔茅之力此亦公舉安用謝爲某報國無功知賢不早翺亦云審知足下矣豈復寘疑起在此敢勤他人乎更祈加察回資官王縣尉謝舉狀昌大某謹簡乃僚因剡公車之牘􅁳升在上詎収私室之恩從而謝焉非所望也伏惟某官器能瓌碩趣造端温紫電神鋒夙志屠龍之學青􅁳强箭暫閑射鴨之弓今大夫羅而置幕中冝諸公爭令出門下亦意飛黄之去何憂破白之難勤子至它人乎輒復吹嘘而送上見我有此客否定皆摸索於暗中某過辱貽箋良高陳誼蘋蘩可薦其何恨行潦之濵桃李不言度即有成蹊之日回郭僉判謝舉狀仲洪謹簡乃僚輙效吹嘘之送非相爲賜何勤駢儷之詞衘袖鳴謙開緘擊節恭惟某官器資凝遠文獻靖共大夫不均我獨賢洊子男於四國陛下用少臣已老尚賓客於諸侯所聞止一簣之虧然乆閲千帆之過陟彼北山而憂父母慕有切於終身失之東隅而収桑榆恩兾沾於錫命有嘉懇欵合命那融用是采焦尾之桐初非有捩鼻之木觀其主觀所爲主幸可免勢利之嘲簡厥修簡其不修願不負品題之意回成副將謝舉狀行三軍則誰與正頼戎昭舉一人焉拔尤亦維世選何勤私謝更以文爲恭惟某官揚歷甚詳慷慨自許執干戈衛社稷克稱其家安邊境立功名不聞亦式是堪勇往爰以名聞某獲共扞城敢忘推轂霸陵醉尉呵李廣不足爲懷成都猛將有花卿正須努力回史郡僉謝提刑舉狀使家選衆所舉惟賢記室修辭何爲至我自合巻還於鯨錦又疑已費於麝煤伏惟某官掞材不貲藏器有用暫作糟丘之主屈爲氷幕之賔奮迅􅂹程何慮缺書馬之一飛騰鶚表便當足鳴鹿之三是爲特逹之知豈俟吹嘘之送某誤勤稱謝但切負慚同僚未嘗聞知人遐不謂矣貪天之功以爲己渠敢爾耶代回楊評事洪之許舉狀助國薦賢我已慙於不武飛牋陳􅁩公何富於斯文進而三熏敢不重拜恭惟某官居官能大折獄惟良廣夏萬間徒啓乏才之歎陽春一曲反成寡和之音頃珠璧之暗投恨衣裘之晚索􅀷恐遠井之待有孤時夜之求汔濟云初踐盟敢後子若無言幾失子况又崔李之繼至交説耶君家所有更贈君無忘孔孟之養􅂔傳道者某粗緣然諾洊辱詞華得古磬於犍爲君言過矣獻天球於清廟予日望之代回高承直不􅀝謝舉奉一札以推賢徒得君重合衆言而剡奏安用謝爲貽牋恵然爲禮過矣恭惟某官蜚英戚畹策雋儒林翠竹碧梧籍甚名家之秀紅蓮緑水藹然入幕之聲國人曰賢然後用之君子之道焉可誣也某與䈤紙尾甚􅌤靣顔遣介奉咫尺書良感渠渠之意今子使萬里外敢懷惘惘之憐代回危教授謝列薦京注受幾一年而未得􅆣稹及第經年未脫選調入舉爾所知不如郷人之善者於我乎館今爲有力者奪之隨衆􅀏而􅀏焉非所謝而謝也恭惟某官早収名第獨振妙聲坐廣文之氊似成一十四考待公車之詔行及三百六旬所頼金玉之相不攺簞瓢之樂昔三人占而汝則逆用静爲宜今八音諧而人以和來儀可必某甚腐於力徒味其言荀文若之不進不休於予媿甚吾夫子之可乆可速惟君裁之代回崇仁潘知縣方謝舉代何月湖比剡需章聊紀陟明之績鼎來巽櫝頋􅂢投暗之疑受言藏之無可謝者恭惟某官刃有餘地琴不下堂君子學道則愛人計望風而成俗小人難事而易說肯違道以近名作新鴞泮之好音餘事虹隄之竒觀是爲實茂當以名聞某推轂力緜投簪心棘潘令君之桃李度已成隂何將軍之山林惟當託䕃代回涂察推岑求舉未允通家講好托年契以爲多助國薦賢惜歲貟之無幾裘不供於晚索璧乃負於暗投所幸在邦域之中必能察形骸之外恭惟某官槐根之芷蘭茁其芽俊逸叅軍已露囊中之頴逍遥嘉客竟歸幕府之羅乃今懷黄拖紫之人半是泛綠依紅之客寕湏􅀞餅更助譟旗某有味其言甚腐於力請待來年之麨時則易然恐及往戍之􅀲風斯下矣梅亭先生四六標準巻之三梅亭先生四六標凖卷之四
