  - {type: variant, offset: 3, length: 2, content: 準巻, SBCK: 凖卷之九梅亭先生四六標凖卷之十進職賀董待郎進職雜斈除斈士制垣晉秩寳閣升班諭蜀良勞勉侚假留之囯登瀛固寵况加真拜之榮綸綍載揚紳緌交慶恭惟某官清如秋刷和若春陽雲夢胸寛平吞一百八盤而無險天風背厚獨負三十六郡而有餘三年有成萬物吐氣不見賈誼固深半夜之思願借冦君難抑庶民之請仍魚鳬之開國峻龍馬之􅀒圗一札細行增井鉞參旗之重三謨大訓貫奎文璧府之華歡動两衙瞻寒西賊斈士象八節不過一嵗之少留剌史入三公便在五雲之多處何限麒麟之􅀞滿期􅀛鶴之還某何足控搏洊蒙料理白水魚竿之入暮竟作退飛青天鳥道之撫膺又勤羅致与其徒索長安之米不如來賦灧澦之堆直爲文翁再剖符兆足行矣安得仙人九節杖亟往從之賀陳提刑天冝進職懋賞外臺升班中祕激西江之水已驗澄清貫東壁之星有光臨照恭惟某官載揚淑問誕受嘉師方當攬轡之初適有跳梁之冦無煩獮薙竟折萌芽爲赤子爲龍蛇各安汝迹不鯀鯢不虺蜮時乃之功簡于楓陛之知華以蓬山之直雲煙縹緲暫煩俯章貢之流朝夕論思行即遂承明之謁某切聞成命輒布賀緘何敬非刑諒益謹五辝之聽有功則恱行將勞四牡之還代回趙茶馬彦綰謝進職寳儲進直璽命諭留經河緯洛之文書官由人重控蜀通秦之􅅦牧功以久成何更為哉其有試矣恭惟某官天潢擢秀奕葉飛英礼樂逺而光華遄車言邁忠信行於變貊思馬斯臧兹膺因任之榮仍拜加恩之寵嵗九遷其自此晝三接以必然某越在師屯例蒙巽謝翦白鹿坡前之草中夜枕戈對碧雞坊裏之花何時樽酒轉官代董侍郎轉官謝三府守關山之戍愧乏殊勲序嵗月之勞猥升華秩無功報上有愧積中伏念某一出西垂六逢朔易惟是窮日之力粗守封疆不敢貪天之功輒僥爵賞兹蒙恩紀俯録年勞揆厥所元豈無其自恭惟某官翼扶萬化器使羣工天地爲炉每曲成於萬物山藪藏疾豈求備於一夫致此􅀌蹤亦叨異数誓殫駑力仰荅鴻休轉朝請郎謝黄侍郎伯固荒服輦輸何益樵蘇之後副郎銖積叨升糠粃之前曾微入奏之功僅守年勞之叙然於踈拙亦是僥踰自昔就第之侯號奉朝請本朝雜端之職頃視班聮自官制正名之餘􅀉貟郎前行之禄遥瞻粉省知隔幾塵近視土山不容一蹴頋某無似知命不猶載馳載驅曾何禆於苞栩不稼不穡亦胡取於􅒡禾偶成鑚貟外之天誰實爲將軍之地兹蓋伏遇某官以大司馬爲冠軍侯飬民以致賢人開誠而布公道河以南皆爲晉土争擊楫以渡江挾而東主之周公且徹桑於未雨藉腹中之兵甲戍塞上之金湯燕人恱則取之昆夷維其喙矣猶念猕猴􅀐土牛之鈍欲試奔蜂化藿蠋之竒下至斗量尚叨寸進某所慙骯髒不足控摶吾愛吾廬詎敢希於軒冕我任我輦願少緩於鞭笞轉朝請郎謝監司内服輦輸何益樵􅂫之後外郎銖積叨升糠粃之前曽微日奏之功僅守年勞之次然於庸譾亦是僥逾自昔就第之侯號奉朝請本朝横榻之任实視班聮其爲貟外之前行蓋在官制之改後遥瞻粉省知隔幾塵仰視土山詎容一蹴頋某無似知命不猶水馬之走徒勞自甘退舎土牛之􅀐宜鈍何敢着鞭偶成鑚貟外之天誰实爲將軍之地兹蓋伏遇某官仁深引類義重噓枯怜其剪籠中之翎假之羽翼憫其困轅下之軛借以齒牙既費挈提又加奬勞愧無成績可書日月之常尚託餘庥帰守煙霞之痼回趙司户等賀轉官斗壘藏瘝曾微嵗最天朝懋賞俾叙年勞是爲平進之常難講同寮之謝敢圗髙誼見畀属辝恭惟某官義篤官聨情親事契胥保惠胥教誨有味其言孰披拂孰吹噓不愛其力有怜邊賞躐綴外郎笑猴􅀐土牛之蹤真成鈍滯觀雀化水蛤之變要是沈淪或承之羞不知所賀某未能辟榖久已思蓴士夫争磨勘而殺人幸容苟免將軍以告身而易醉行可匄歸攺官改官謝丞相璧水綴貟已抱罔功之愧金閨登籍復叨寓禄之恩此聖世優職事之常而愚儒無功狀之实全出鑪錘之造敢忘竿牘之恭切以禄至宣徳之階雖八品秩俗羡通班之寵號再登科舉必五貟職湏六考貳卿爲之進卷萬乗至於臨軒使百里或九十之差則分寸有千丈之落幸獲通於班筍又免待於戍􅀲惟甄異於庭紳許帯行於職組以此刈薪於翹楚斯亮天功如其不稼以取禾曷孚人望如某者起於素賤加以朱愚自安鷽鳩斥鷃之棲亦乏蚍蜉蟻子之援隨材官蹶張之後不自意全補文學掌故之聮已逾分願感大鈞無垠之播物欲小子有造於成人進之東膠告于南靣如絲如綸而如綍有隕自天在沚在陵而在阿孰爲之地伏遇某官坤厚載物鼎亨飬賢耻一夫之納溝中欲得其所招諸生而立館下恐毁于隨故雖紏録之曹亦假超遷之渥某敢不修其可願欽乃攸司卑者止髙者流當益厲六館之仁勇直而温寛而栗庶可助九徳之敷施改官謝喬司業行簡同第七卷除国録謝􅁑祭酒啓頭伏遇某官道航聖瀆材棟儒林左史讀五典三墳蓋將􅀝相國子學九徳六舞暫假司成當江濤如此之時軫根本􅆌然之慮欲作成於六館以表厲於四方有漼者淵不嫌葭葦之衆言刈其楚蓋爲薪槱之儲况素出於門墻尤願承其模範某敢不尊其瞻視識所歩趍雖藻火粉米之不同貴賤位矣儻蘋蘩錡釡之可薦左右芼之回劉教授大川謝舉改官綴曲江之題知賢已乆玷直指之􅀉察士爲先方踧踖於循墻遂蹉跎於削牘有來巽謝良仭謙光伏惟某官行有宫庭文爲鞶帨吹更生之蔾杖孰非鴻寳之書栽夢得之桃花不作大鈞之問淹回如此静退恬然兹雖騰一鶚之章恨未足五豝之数某蟇頥無政龍節非材下車而舉慈明豈種私門之桃李築臺而招郭隗欲開公道之荆榛惟慙程力之緜更辱摛文之綺宫觀賀瀘帥楊尚書汝明進職奉祠元帥賢勞清都均逸文昌八座昔倡九牧以阜民幕府十年今解伍符而還里顯拜緑綈之寵峻加紫殿之班歸哉歸哉幸甚幸甚恭惟某官柔嘉維則從容以和節槩抗岷峨之横淵源深江漢之濯髙塵迅歩不受人間風日之塵緩轡徐驅徑曵天上星辰之履五月瀘溪之入九鑚巴火之新大國十連民無遺便細書一札王曰遄歸乃思晝行之榮欲就晚賦之樂日出而作皆言倦飛則知還夜行不休誰作急流之勇退偉公髙節立我懦夫孔戣耳目未覺衰力控二冝之䟽温公肺腸爲巳有暫營獨樂之謀况幾兩幾駟羡巨源之歸而一壥一區足子雲之樂南方巳定足可從赤松之游東征是皇尚當爲蒼生而起某夙􅂪異顧輙布賀忱既羡公未老而得閑又愧我每懐之靡及挹浮丘之使尚願執鞭登黎侯之樓或􅂪援筆賀李侍郎進秩敷文閣學士提舉嵩山崇福宫枤杜勞還崧髙均逸大行臺之保大載纉武功真學士之拜真誕敷文德有偉急流之退式觀晚節之香恭惟某官博極羣書洞視萬古用之禮義講唐虞於細氊詰爾戎兵撻秦楚之堅甲昔者狂瀾之倒屹然暢轂之堅逺揚邇昭外鎮内撫盡護諸將不聳一塵王曰遄歸將運籌帷幄之内我戍未定且收身矢石之間學士象四時光禄正二品祝釐太室真聞呼萬歳之三詔禄禁廬又可襲六藝而七班接西京之鵉鶴歡騰北墅之􅀛魚名與身而孰親事隨憂而共减起視當世允謂全人某聳聞除書亟裁斐語起温公於崇福不無願公入相之人迎老子於函閞且致爲我著書之請賀安觀文丙除節使開府宫觀代董制置元老求閑清朝䟽寵齋壇授鉞新大將之威儀揆路彯纓等上公之体貌仍峻竹宫之領用華梓里之歸綸綍載揚紳緌胥慶恭惟某官材弘且毅器博而周所守匪親化爲豺狼頃幾失劔門之壯無禮於君誅如鳥雀公迄回沔水之朝是爲非常之功宜受不次之賞况尅復四州於談笑而撫摩八載之瘡痍若時登庸遂典樞機之貳聞命就道又成藩屏之留方深虛佇之思忽控飬恬之請櫜兠㦸纛儼十乘以啟行衡紞紘綖視三階而命秩仍從神圉以佚安期是爲地上之仙何愧山中之相向也雲無心而出岫今則水有時乎回淵惟出入將相之榮雖聖賢而難必至功名終始之際尤今古之罕全貫一節於行藏知百年之夀考從容甲第寕肯甘田宅之汙笑傲午橋自可窮園林之勝某聳聞盛事敬仰髙風季鷹思吳亦欲爲適志之舉司馬還蜀何當效負弩之迎代秘丞林郎中夢英謝丞相得祠禄老而妄動自速煩言罪以疑輕尚沾㣲禄重惟踈謬倍費保全戴洪造之難名撫􅀌蹤而増感伏念某狷弗諧世戇獨愈人少而耻有道之賤貧妄希干禄壯始悟不義之冨貴亦足辱身固甞把江海之麾惟不願氷山之􅀝甫違繒繳便入林泉食神圉之祠凡五六任頓屠坦之刃㡬十九年自量叔夜之不堪任笑仲連之強作毋友不如已者乃師教之以義強委重焉則君命也自屠羊之反肆即殺馬而毁車誰誤聽聞忽㧞加擢念士非其招而往孔子奚取焉苟傲無所恃而行韓愈亦人耳抗辭有罪引疾爲欺冒然扶憊以奉承識者逆憂其顛沛清班難僣顧再轉而爲丞素行乆愆非一鳴而輒斥既云欺世安所避刑竊鈇無往而非疑聚鐵不容於鑄錯乍賢乍佞身已變於三期僞行僞言誅何逃於七日投荒已幸續食謂何豈老芋之似茯神元非罔市而逺志之爲小草失在出山無墜諸淵姑予之釡譽而召毁而去聖則何心吉之先動之微汝曾不悟致勤大播如此曲成伏遇某官謙虛受人坤厚載物謂士非梁兾之賔客謾與招徠至人言盧杞之姦邪固難覆護怒猶疑其溢惡殺寕失之不經疾雷震霆於物無存全之理蓋天容地乃今知寅亮之功見大徳之好生豈匹夫之受賜某仰衘厚施已廹頽齡斗升之活波臣固貪舊物七十而致君事正在新年與其身後重作僞之愆不若生前瀝祈哀之悃澗愧林慙之無盡悔不可追鍾鳴漏盡而不休行將焉入得反初服實出大鈞小人之過必文何嗟及矣君子之愛以徳願卒成之代李制機大有得祠謝丞相幕府效愚猥蒙重劾公朝宥過特畀真祠感無地以􅀉言徳如天而難論伏念某才固無似命亦不猶門户百年難問庭前之雀科名二紀真同竿上之魚幸且安百里之子男誰使作諸侯之賔客既叨賛畫安敢隠情堂上之兵未可屈人於不戰幕中之辯真乃以我而爲傾怒因水蟹之移殃竟池魚之及言如綸綍固疑乍佞以乍賢法猶權衡寕免則筆而則削奪其兩秩倐已朞年適逢肆􅌌之恩輒動問鈞之請賜之大知之至前感已多閔其窮察其愚兹恩尤厚過蒙復玷特賜祝釐疾雷震霆於物無存全之理祥風甘雨乃今有覆露之功恭惟某官社禝世臣鼎彛家學以一二日萬幾之無曠乃}
