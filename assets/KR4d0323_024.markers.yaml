  - {type: variant, offset: 7022, length: 467, content: 終已成而不造也此借用又懼無麫之餅見前亟從控避猥辱襃期恭惟某官心和而氣平人今而學古源流自康樂之裔宋書謝靈運傳祖𤣥晉車騎將軍靈運少便頴悟𤣥甚異之襲封康樂公性奢豪車服鮮麗衣裳器物多改舊制世共宗之咸稱謝康樂也灑落有宣逺之風南史謝瞻字宣逺六嵗能屬文與從叔琨族弟靈運俱有盛名招館下之諸生詎訾狶苓之進展治中之别駕不辭驥足之淹尋宅牧於兩川俱騰歌於五袴並見前手提文柄心造化爐杜詩功名造化爐禮樂逺而光華遂驅雙節白樂天送牛僧孺鎮揚州詩紅斾擁雙節白鬚無一莖師旅因之饑饉全出一陶兹暫尋香火之閑見前寜得歛雲霄之歩重珪疊組已觀游刃之恢然截鐙留鞭共㸔發硎之新若天中記澤州奏前刺史史延韜離州為軍民遮圍不放出城兼截下馬鐙其史延韜經三日後夜開城門越闗天寳遺事姚崇牧荆州三年受代吏民遮道泣擁馬首不使去所乘之馬鞭鐙皆截留之以表瞻戀佇遄四牡徑從六飛從去聲袁盎傳騁六飛注六馬之狀若飛某已愧代庖詎堪乘傳折楊而和白雪願亟賦於歸哉莊子大聲不入於里耳折揚皇荂則嗑然而笑注大聲謂咸池六英之樂也非委巷之所尚折揚皇荂皆古歌曲名也詩振振君子歸哉歸哉轉粟而上青天冀别求於能者杜詩築城依白帝轉粟上青天, SBCK: ''}
