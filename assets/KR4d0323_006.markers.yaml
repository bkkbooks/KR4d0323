  - {type: page-break, offset: 0, content: '', id: KR4d0323_SBCK_004-4a}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 價於大君子之門何必啇功計利於賤丈夫之隴况歐陽公不能挽聖俞之逹而東坡老亦難拔方叔之窮物固假於氣嘘命實通於心肯况某無狀觸事多畸荷鋤而耕寛閑只傷地脉乘槎而游汗漫又犯天河無端讀書有時爲養既痛三千鐘之弗洎又瀕}
  - {type: variant, offset: 3, length: 1, content: 庫, SBCK: 五十之無聞小材不離於小官已知安分大慙或謂之大好人自過情馴致誤執事之知欲令備弟子之列先唱之矣又唱之矣肯引去蓬島之風舡昔謂斯何今謂斯何却回作瞿唐之煙棹旁觀千丈之落自計三寸之存心不同􅀆媒勞委禽勿強射有似乎君子正鵠是求敢圖進退之間偶合髙明之見徑持典䴡舉及妄庸皇帝曰嘻往賛碧幢之帥翰林爲主入言墨客之卿不以昧於時冝爲俗儒是可稱於天下曰知己兹盖伏遇某官眼髙四海胷首千年盛之白玉堂辭足以鼔天下之動拜于青􅃈闥學足以格君心之非龍墀引聽履之星辰鶴禁賓重離之日月是固見耐官之器孰能窺憂世之心大厦非一木之枝故椳闑扂楔與欂櫨而並蓄小市無千金之藥故芝苓參木合薑桂以兼収急求燭武則無以重朝廷近捨皇甫則無以勸巖穴雖隻字片言之無用亦三光五嶽之所関不忍弃􅂢力加収拾何其乆也必有以也知己在於遣中我儀圖之愛莫助之亦漫爲之言上感知而已勿謝得乎某敢不圖稱所􅂪力鞭其後舍文章之小技勉節義之大閑孔明之栢四十圍香葉試尋於鸞鳳任公之竿五十犗大鈎㑹掣於鯨鯢代虞制參謝劉閣學舉科目光祖梧幕綴貟曾微寸善荷囊薦士猥玷異科予之豈以爲私受者未能無愧蓋知祢而稱獻納嘗聞摩詰之詩若依劉而增感傷已發仲宣之賦殆主擇客則客亦擇主使官求人則人不求官自甘桃李之不言誰識蘋蘩之可薦矧如剛簡籍是迃踈山東山西不能世將相之業水南水北居然仕賓客之聮雖學問粗知德性之尊然英華恐非和順之發蛙拘墟而局促何所見聞燕巢幕以徘徊若爲材識徒以固窮之力頗知尚志之功反觀寸心粗識無邊之風月洞視萬古略知不廢之江河所願就有道而正焉未得事大夫之賢者曾摳衣之不敏乃推轂以見収元祐宗臣之立十科本爲何事紹興宰相之計羣吏尚出此途今徒有存羊之名或者發􅀞餅之嘆然受德者不待成身而拜賜栁子厚固已言之既有知􅀆又欲識路而疾驅韓退之亦安取此所感大矣無謝得乎此蓋伏遇某官道純粹精德直方大羽翼孔孟學傳先聖之不傳黼黻卿雲文到古人之未到碩果何嫌於不食匏􅀲自得於含章人之爲言何得焉特祝承明廬之三入天之未䘮斯文也故應靈光殿之獨存時來爲之民生幸甚豈謂誠心之傾倒肯収孤迹之沈􅁳得於不求亦可自賀某敢不佩所品題銘之􅂨曲歲月坐成晩且熏坡老之香江湖永相忘更勉後山之報謝曾尚書㬇舉著述科裁小子而成章亡能爲役觀近臣而爲主有味其言予之豈以爲私受者未能免愧切以十科薦士著述難堪八坐舉賢銓綜尤重唐文章之籙登者幾人晉人物之甄拔於一字使品題之太過恐稱塞之易孤伏念某命固不猶才亦無似萬巻未供於啜飲一科何補於遺餘結栁送窮仍斍語言之無味剖􅀲乞巧不堪豪傑之跪呈雖庚桑乆役於老聃然毛遂無聞於趙勝不圖科薦特辱名聞惟才薰班馬之香乃名秀發非斈􅊥舒向之海莫號渊􅀷至求英詞能配古作自李杜韓栁之不出殆歐蘇陳黄爲庶幾何者妄庸得此奬拂前言戯耳不待智者而後知小子識之則欲假之而自厲考古人之所佩仰盛德之安窮非盡讀三萬軸之牙籖難仰答十六枚之古磬恭惟某官國之喬木學者泰山公方引韋世康而告休士皆知杜如晦之必相平生五色線豈皖織女之㐮向來一瓣香不廢嫡孫之行滿期開閤早與捲簾某敢不仰體鴻鈞俯鞭駑鈍著作前烈之餘事豈足醻知節􅁩天下之大閑持此誓報謝趙尚書舉可備著述科汝述小子成章無可薦揚之實近臣爲主猥騰典麗之褒未嘗敢請於墻藩乃辱徑収之箧櫝感知而已懷愧柰何切以一字拔人今古稱山公之啓十科舉士兒童誦司馬之賢幸猶愛礼以存羊誰復按圖而索駿著作雖前列之餘事文斈亦先聖之末科珠玉不􅀘於飢寒豈堪混泥塗之辱干羽無取於戰陣猶足備宗廟之容有如一藝之不庸亦是匹夫之弗獲昔趙尚書垂德於不報栁侯甞感其収撫之恩至李從事因文而得交韓子又念其飢寒之聚不圖今日復見古人如某者蠢蠢隨行狙狙何取徒守寒素之氣習尚持文墨之生涯居於大江之濆甘見􅀏於獱􅆩行乎劎閣之險幸偶脫於豺狼既衘三釡弗洎之悲又罹二子更死之禍兩髦巳雪百念俱氷學業實負其􅀄心精􅀷安在詞華甚慙於大手炳蔚謂何今屡爲丞相而言蓋甚愧丈人之厚枚皐之窮且忍何敢躁耶孟郊之乆無成㑹且歸矣不虞科薦又累甄収伏遇某官氣杳秋天愛􅀷冬日作納言之喉舌惟山甫克舉之用夾輔之股肱則周公其人也長慮却顧爲根本之計兼収並蓄无葑菲之遺凡今􅀓羽翼而飛誰非借齒牙之助尚念朝廷半老儒之日無弃文章一小技之人必令綢繆於束芻廉耻缺矣故雖參差之荇菜左右芼之某敢不勉自激昻圖爲稱塞上不負天子下不負所學日監在兹待之以國士報之以衆人天厭之矣謝成都帥黄侍郎疇若舉科目旅床爭席夢難蜀道之登軍將打門驚報禰書之至世固有十科之薦士公獨能萬里而舉人愧在其肝感􅀷於髓伏念某至愚不肖素賤且貧無端讀書遂奪耕田之樂有時爲養不供啜菽之􅌚猛思萬物之皆塵彌斍一科之不􅀘汗漫卓踔欲尋墜緒之茫茫勃窣媻跚尚踵常途之役役雖大慙必謂大好然小材不離小官安得自髙聊復爾耳能令公喜定未必然行搴湘水之芙蓉誰托江梅之桃李今作禁門鍵要湏百年幾見之人君如雙井茶眞副衆口一償之願顧持著述猥舉妄庸經學無游夏之源修明安在文詞乏屈宋之艶秀發謂何然經品題敢自暴弃孰云􅀞餅初無益於飢腸如入太倉亦莫不有飽意伏遇某官斗牛間氣奎璧清􅄤筆裁霧而縫雲不作人間煙火之語身馭風而騎氣直依天上日月之光倦持上雍之囊出草諭巴之檄雪山增重天府益腴斯人乃德星頓釋冕旒之西顧用汝作霖雨共觀衮綉之東歸諒勱相於國家先旁招於俊乂兼収馬渤曲抱鶴翎仰盛德之安窮望夫人􅀆已逺主簿乃有分職縱欲福以難功侍郎非通神明曷不祈而得施某敢不謹佩恩意自鞭古心諸侯薦人與之諸侯寧有是事國士遇我報以國士請誦斯言代趙撫属謝衛參帥汝諿百舍治任己問征夫之前路十科取士又勞播物之大鈞頂踵知恩肺肝懷感切以賓筵有秩古歌衛武之功藩翰多賢舊説湖南之客今已時移而事異誰堪德舉以言揚况如日夕之牛羊㑹且歸矣相彼月明之烏鵲愛莫助之又勤科薦之榮允謂陶成之厚伏念某一寒無挾百拙有餘偶躐末科非有宗英之礼樂來依大府適逢元帥之詩書假以三能之光借以九鼎之重從骨而肉如翼斯飛粛粛宵征乆馳心於魏闕遲遲晝出終戀德於膺門果􅂪吹嘘薦以科目取其材術固无師友之渊源旌以勤勞是亦塵埃之職分政事之可觀安在館閣之稱選謂何强名器采之詳華浪應文章之典麗前言戯耳不待智者而後知小子識之敢不假兹而自勵伏遇某官清廟一柱泰階六符虛已受人不厭􅂪再三之瀆承天載物眞得坤六二之方暫爲召畢之保釐聊續荆潭之唱和牛溲馬渤隨所用以兼収虫臂䑕肝不以微而見弃故令庸下亦在数中某敢不增所未能求爲可貴著作前輩之餘事不足酬知節􅁩天下之大閑持此誓報代回舒尉謝科目從臣十科之薦一歲三人牧夫庶獄之難千變萬狀兹以盡公而舉又何私謝之爲恭惟某官遠抱甚都賢勞已乆居然前跋而後㚄誰其右挈而左提今歸幕下之羅定脫囊中之頴比來科選擬用名聞􅀷疑詐木鶴之仙豈復尋蕉鹿之夢然此本畫地之餅何以假爲果能受去堊之斤徑當削入不然時夜之早計無乃明月而暗投某疾讀來函病頓去枕家君作宰好吟孤騖之齊飛客食加餐持報雙魚之遠遺謝座主謝中書舍人曽從龍五芒色正夙瞻柱史之􅄤一刺字漫始見舍人之様仰髙山而景行感流水之知音由其願一識之未償是以身十返而不悔切惟去民就吏牛堪未始謝於門負業歸家齊皡亦不非其上惟是筆硯荒凉之業實受鑪錘特逹之知説戰􅂣文人還迷於五色讀刑賞論公放出於一頭若揆門生坐主之常當辨國士衆人之報伏念某學未至古年不後人少也好脩強記輙数千字長而無述覓舉凡二十年雖有道則耻賤貧亦無心於圖富貴可堪親老又着儒冠而忍羞寧試有司不願君門之徑入冒陳三策略吐寸􅂨自知明主可爲忠言特恐貴人不喜生語頭顱自揣口吻益悲卒猛吐其狂愚竟儳説於得失不謂暗中之摸索遂􅂪送上之吹嘘既有詞意皆精妙之褒復加筆力可敬服之語喘竹筒於儕輩増紙價於京朝人亦有言衣鉢恐成於故事我則無勇鼓旗空譟於後塵既經品題敢自暴弃遺餘不補十年任韓子之窮名節茍}
