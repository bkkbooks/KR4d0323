  - {type: variant, offset: 6363, length: 269, content: 魏略夏矦楙為安西將軍鎭長安諸葛亮於南鄭與羣下計議魏延請假精兵五千負糧五千直從裦中出循秦嶺而東當子午而北不過十日可到長安楙聞延至必乘船逃走而公從斜谷來二十許日足逹一舉而咸陽以西可定矣三秦記子午長安正南地也山名秦嶺谷名褎斜平帝紀元始五年秋通子午道從杜陵直絶南山徑漢中師古曰子北方午南方言通南北道相當今京城直南山有谷通梁漢道者名子午谷又宜州西界慶州東界有山名子午嶺此則北山是子南山是午共為子午道元帝紀發戊巳校尉注戊巳校尉者鎭安西域無常治處亦猶甲乙等各有方位而戊與已四季寄旺故以名官也一説戊巳居中校尉處三十六國之中故曰戊巳又屯田以耕土為事故取戊巳, SBCK: ''}
