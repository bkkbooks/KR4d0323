  - {type: variant, offset: 18127, length: 1859, content: 注葑蕪菁也即今菘菜葉與根皆可食而根時有美惡采者勿以其根惡時幷棄其葉故云無以下體轢琅狄切説文車所踐也漢書酷吏傳刻轢宗室師古曰轢謂陵踐也韓詩秋霜喜刻轢賀史丞相起復史彌逺傳嘉定元年拜右丞相丁母憂歸治葬太子請賜第行在令就第持服以便咨訪二年以使者趣行急乃就道起復右丞相兼樞密使兼太子少師劉本闕此條起躋上衮牟融傳贊牟公簡帝身終上衮併領元樞家事雖勤詎可辭於王事國容既肅爰兼整於軍容禮記軍容不入國國容不入軍宗社奠安華夷震服竊以人臣名世之盛者固宜獨佩於安危見前天子舉國而聽焉豈容或去於左右商君傳願王舉國而聽之如房𤣥齡奪服於貞觀之際新唐書房𤣥齡傳以母喪賜塋昭陵園起復其官㑹伐遼畱守京師詔曰公當蕭何之任朕無西顧憂矣若趙韓王復位於建隆之時趙普傳乾德五年春加右僕射昭文館大學士俄丁内艱詔起復視事真宗咸平初追封韓王時則宇縣迄平縣本作寰穀梁傳寰内諸侯注古縣字師古曰古書縣邑字皆作寰此直縣掛字後人轉用為州縣字乃加心以别之也邦家底定尚書震澤底定注底之履反致也史記音致非有干戈搶攘之事攘女耕切搶攘亂貎賈誼傳首尾衡決國制搶攘與夫疆埸騷動之虞埸音亦説文疆也通作易黄氏曰疆是大界場是小界詩廼場廼疆又疆埸有𤓰左傳疆埸之事又疆埸無主注邊境也正惟朝廷恃以稽疑尚書明用稽疑社稷因之倚重所謂同德惟一伊尹乃格於天見前豈無他人雖百曹參何補於漢詩豈無他人蕭何傳今雖無曹參等百數何缺於漢故一時必圖舊而共政尚書古我先王亦惟圖任舊人共政而二公亦移孝以為忠孝經君子之事親孝故忠可移于君事兄弟故順可移于長居家理故治可移于官况若主威雖振而體統未明國蠧既除而姦宄未戢天變洊臻而未弭詩饑饉薦臻民力乆困而未甦此豈具臣可以克相自非才若擎天之八柱河圖括地象地下有八柱柱廣一萬里有三千六百軸互相牽制名山巨川孔穴相通力如負海之六鼇列子渤海之中有五山焉其根無所連著帝使巨鼇十五舉首而戴之五山始峙而龍伯之國有大人一釣而連六鼇精誠一心勵翼庶務尚書庶明勵翼則何以結異眷於黄屋高帝紀黄屋左纛李斐曰天子車以黄繒為盖裏奪至情於素冠詩序素冠刺不能三年也詩庶見素冠兮廷有贊書漢書外戚傳刻侯印書贊師古曰贊謂延拜之文國無異論恭惟某官德崇而業鉅學博而用周功烈在人豈管晏之可許規模所至及周召而乃畱蕭望之傳鄭朋奏記望之曰窟穴黎庶莫不懽喜咸曰將軍其人也今將軍規橅云若管晏而休遂行日仄至周召乃留乎師古曰問望之立意當趣如管宴而至為欲恢廓其道至日昃不食追周召之蹟然後已乎橅讀曰模其字从木早繇禁塗獨贊密議祛邪崇俊決大疑於立談之間揚雄解嘲或七十説而不遇或立談而封侯偃武修文興長利於旋踵之頃尚書乃偃武修文司馬相如傳計不旋踵國本安固人心敉寧尚書予翼以于敉寧武圖功孔傳用撫安武事此借用弼諧未㡬經濟方懋甫正台衡之位宇文融詩謬立台衡重俱承雨露偏俄纏風木之悲見前中宸深懷竣迄襄於大事左貂洊遣爰趣復於宰司後漢書宦者傳漢興仍襲秦制置中常侍官然亦引用士人以參其選皆銀璫左貂給事殿省唐百官志㪚騎常侍分左右𨽻中書門下省皆金貂珥蟬左散騎與侍中為左貂右散騎與中書令為右貂謂之八貂張説詩賜釜同榮拜樅金宴宰司厥今為政之當先大率如前之所述雖無伯禽金革之事禮記子夏曰金革之事無避也者非與孔子曰吾聞之老聃曰昔者魯公伯禽有為為之也三年之喪從其利者吾不知也鄭注伯禽有徐戎作難喪卒哭而征之急王事也公羊傳古者臣有大喪則君三年不呼其門已練可以行冕服金革之事君使之非也臣行之禮也注謂以兵事使之當資傅説舟楫之才至若邊備弛於通和邦財空於横費名為更化而士夫趣向之莫一實欲恤民而州縣奉行之不䖍此其次焉又有大者必也羣工百職守法度而不變外戚近習保富貴而有終城社無所容其奸漢書虞延傳乆依城社不畏熏燒劉向説苑客謂孟嘗君曰狐者人之所攻也鼠者人之所熏也臣未見稷狐見攻社鼠見熏何則所託者然也韓非子社樹木而塗之鼠穴其間熏之則恐焚木灌之則恐塗陁此社鼠之所以不得也漢中山王傳社鼷不灌屋鼠不熏所託者然也韓詩外傳稷蜂不攻社鼠不熏所託者然也廟堂常得行其政孰出身而辦此韓延壽傳韓義出身彊諫嚴延年傳皆親鄉之出身不顧岑彭傳願出身自效三國志吕岱傳出身萬里為國勤事晉書邵續傳我出身為國豈得顧子而為叛臣哉顧舍公其誰哉此四海所以具瞻正九重所以虚竚任天下之重幸瞻赤舄之來詩赤舄几几舄音昔傳赤舄人君之盛履也几几絇貎正義曰上公九命得服衮冕故履赤舄為帝者之師佇復青氊之舊留侯世家以三寸舌為帝者師此布衣之極要使一門勳業之盛有光千載簡冊之傳某夙出洪鈞欽聆渙號睠疇昔已䝉於百諾季布傳得黄金百不如得季布諾高適詩何異千里心仍求百金諾諒匪伊定沐於一陶張于湖集趣召來歸匪朝伊夕歌杜陵之詩願永依於廣厦見前為魏公之客豈復出於他門李義山集卵翼不自於他門頂踵實非其已物, SBCK: ''}
