  - {type: variant, offset: 13, length: 439, content: 宋制中書省在左掖門外西靣北廊掌進擬庶務宣奉命令行臺諫章疏羣臣奏請興創改革及中外無法式事應取㫖者凡除臺省寺監長貳以下及侍從職事官外任監司節鎮知州軍通判武臣遥郡横行以上除授皆掌之尼命令之體有七曰冊書立后妃封親王皇子太長公主拜三師三公三省長官則用之曰制書處分軍國大事頒赦宥德音命尚書左右僕射開府儀同三司節度使凡告廷除授則用之曰誥命應文武官遷改職秩内外命婦除授及封叙贈典應命辭則用之曰詔書賜待制大卿監中大夫觀察使以上則用之曰勅書賜少卿監中散大夫防禦使以下則用之曰御札布告祭封郊祀宗祀及大號令則用之曰勅榜賜酺及戒勵百官曉諭軍民則用之皆承制畫㫖以授門下省令宣之侍郎奉之舍人行之留其所得㫖為底大事奏稟得㫖者為畫黄小事擬進得㫖者為録黄凡事于因革損益而非法式所載者論定而上之諸司傳宣特㫖承報審覆然後行下設官十有一令侍郎右㪚騎常侍各一人舍人四人右諫議大夫起居舍人右司諫右正言各一人分房八曰吏房曰户房曰兵禮房曰刑房曰工房曰生事房曰班簿房曰制勑庫房元祐以後析兵禮為二增催驅檢㸃分房十有一又改生事房為開拆, SBCK: ''}
