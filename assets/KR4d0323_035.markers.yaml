  - {type: variant, offset: 0, length: 14589, content: 欽定四庫全書四六標準巻三十五宋李劉撰簿主簿漢晉有之自漢以来皆令長自調用隋始置之唐主簿上轄赤縣置二人他縣一人以流外為之髙宗始以為品官吏部選授掌付事勾稽省署抄目紏正縣内非違宋開寳詔諸縣千戸以上置令簿尉四百戸以上置令尉令知主簿事四百戸以下置簿尉主簿兼知縣事元馬端臨曰丞簿尉雖均稱縣佐然漢書百官表所載只丞尉而已丞尉各有印綬簿獨無蓋古者官府皆有主簿自三公御史府九寺五監下逮州縣皆有之所職者簿書蓋曹掾之流耳漢人所謂髙士不為者御史府之主簿也元豐令寺監主簿不得與卿監連署文書然則主簿雖在雄要之司猶為卑賤而況縣乎後世以簿先尉非古義也通寜鄉蔡主簿汝説交代寜鄉已見望俊躔於淮海知敬儒先方言躔厯也日運為躔月運為胶徐曰星之躔次星所履行也呉都賦英雄之所躔尚書淮海惟揚州杜詩淮海維揚一俊人栁文今天下外多賢方伯連帥朝廷立槐棘之下多用儒先注猶云先生也按晁錯傳公卿言鄧先師古曰鄧先猶云鄧先生也葢本於此問邅道於洞庭偶從誤後洞庭太湖也在長沙巴陵間屈原九歌駕飛龍兮北征邅吾道兮洞庭邅張連切難行不進貌易屯如邅如貂不足而狗續趙王倫傳諸黨皆登卿将並列大封其餘同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位毎朝㑹貂蟬盈坐時人為之諺曰貂不足狗尾續鴻髙舉而燕来張良傳鴻鵠髙飛一舉千里外戚傳燕飛来喙王孫陳勝傳燕雀安知鴻鵠之志哉禮記孟春之月鴻鴈来仲春之月𤣥鳥至及未治任可無執訊詩執訊連連恭惟某官負材鴻碩鴻通作洪河渠書禹抑洪水揚雄傳鴻生鉅儒鴻大也説文碩頭大也詩碩大且儼爾雅碩大也蓄學駿龎詩為下國駿龎爾雅龎駿大也中郎典刑晚亦宜於東觀蔡邕傳建寜三年召拜郎中校書東觀初平元年拜左中郎将孔融傳與蔡邕素善邕卒後有虎賁士貌類於邕融毎酒酣引與同坐曰雖無老成人且有典刑客卿富貴乆盍見於西秦史記蔡澤傳從唐舉相曰富貴吾所自有吾所不知者夀也舉曰先生之夀從今以往者四十三嵗澤曰富貴四十三年足矣乃西入秦昭王與語大説之拜為客卿吾道非耶家語吾道非乎奚為至于此公等安在主父偃傳上召見三人曰公皆安在何相見之晚也跨揚州之鶴安得自髙小説有客相從各言所志或願為揚州刺史或願多貲財或願騎鶴上昇其一人曰腰纒十萬貫騎鶴上揚州欲兼三者東坡詩若對此君仍大嚼世間那有揚州鶴餘詳見前麾湘水之蛟能令公喜離騷經忽吾行此流沙兮遵赤水而容與麾蛟龍使津梁兮詔西皇使陟余餘見前方今漢庭之老用矣陳後山詩漢庭用少公何在不使羣飛接羽翰敢問呉㑹之意何如杜陵逢唐興劉主簿詩劍外官人冷闗中驛騎疎輕舟下呉㑹主簿意何如某志大心勞才疎意拙孔融傳意廣才疎迄無成功南史蕭惠開傳才疎意廣竟無成功杜詩老大意轉拙一科不補欲釣鼇而未能韓文豈不登名於一科兮曾不補其遺餘杜陵寄弟臨邑主簿詩倚頼天涯釣猶能掣巨鼇五技易窮覺屠龍之無用荀子梧䑕五技而窮荘子宋泙漫學屠龍於支離益殫千金之家三年技成而無所用其巧俱詳見前所頼鸞凰之先戒棲枳何如離騷經鸞皇為余先戒兮雷師告余以未具吾令鳳凰飛騰兮又繼之以日夜仇覽傳考城令王渙政尚嚴猛聞覽以徳化人署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志耶覽曰以為鷹鸇不如鸞鳯渙謝遣曰枳棘非鸞鳯所棲百里豈大賢之路無謂牛羊之下来求芻而止詩曰之夕矣牛羊下来昌黎復志賦固余異於牛馬兮寜止飲水而求芻尚託子孫之契童䝉訓曰同僚之契交承之分有兄弟之義至其子孫亦世講之前輩專以此為務今人知之者葢少矣杜詩起予有斑白因是託子孫王元之詩古人重交代子孫不相忘欲窮師友之源董仲舒傳贊老其師友淵源所漸向来一瓣曾南豐苦難並世史記仲尼弟子列傳孔子數稱臧文仲栁下惠然皆後之不並世韓詩吾與東野生並世山谷詩醫和不並世深根且固蔕又師儒並世難日月過箭疾餘見前安知四海習鑿齒不勝讀書習鑿齒傳鑿齒字彦威襄陽人時有桑門釋道安俊辯有高才自北至荆州與鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒時人以為佳對為桓温西曹主簿時温有大志追蜀人知天文者至夜執手問國家祚運脩短星人曰太微紫微文昌三宫氣候如此決無憂虞至五十年外不論耳温不悦送絹一疋錢五千文以與之星人乃馳詣鑿齒曰家在益州被命逺下今受㫖自裁無由致其骸骨縁君仁厚乞為標碣棺木耳鑿齒問其故星人曰賜絹一疋令僕自裁惠錢五千以買棺耳鑿齒曰君㡬誤死君嘗聞干知星宿有不覆之義乎此以絹戲君以錢供道中資是聽君去耳星人大喜便詣温别温問去意以鑿齒言答温笑曰鑿齒憂君誤死君定是誤活然徒三十年看儒書不如一詣習主簿代回上髙劉主簿昌詩上髙本漢豫章郡建城縣地晉為望蔡縣隋省入建城唐以故望蔡縣地置上髙鎮南唐易鎮為塲尋陞為上髙縣宋因之衆賢雜遝共騰薦士之章遝達合切説文䢔也劉向傳雜遝衆賢㒺不肅和師古曰雜遝聚積之貌遝音大合反杜詩賔從雜遝實要津東坡詩醉翁門下士雜遝難為賢老子婆娑竊與挂名之寵陶侃傳老子婆娑正坐諸君輩文選使名挂史筆韓文挂名經端無可謝者安用文之左傳身将隠焉用文之詳見前恭惟某官節抱秋竿樂天贈元稹詩豈無山上苖徑寸無嵗寒豈無要津水咫尺無波瀾之子異於是乆處誓不諼無波古井水有節秋竹竿詞摛春藻曹植文章序質素也如秋蓬摛藻也如春葩諸公評論謂當策足於要津文選何不策髙足先據要路津何物簿書欲使擡頭於矮屋王衍傅何物老嫗生寜馨兒國朝傳記有令史騎驢過臺衝裏行御史将杖之令史請數驢罪曰汝技藝可知精神極鈍何物驢畜敢於御史裏行天寳遺事張彖登科為華隂簿為守令所抑歎曰丈夫有凌雲葢世之志而居於下位若立身矮屋之下使人擡頭不得乃棄官而去人爭送上見前我亦譟旁六一居士集安得二子接揮鋒兩交鋩我亦願助勇鼔旗譟其旁引重鼎兮不程禮記引重鼎不程其力詳見前問大鈞而未答劉禹錫問大鈞賦云楚臣天問不酬詳見前某挽士不寸山谷詩挽士不能寸推去輒數尺宜休者三新唐書卓行傳司空圖字表聖河中虞郷人隠居中條山王官谷作亭名曰休休作文以見志曰休美也既休而美具故量才一宜休揣分二宜休耄而聵三宜休又少也惰長也率老也迂三者非濟時用則又宜休因自目為耐辱居士遺我雙鯉魚似虛取勤渠之辱見前漸階羣振鷺願無忘醇正之歸韓詩漸階羣振鷺入學誨螟蛉回江夏范主簿之損江夏本漢沙羡縣地屬江夏郡孫呉屬武昌郡後省晉太康中置沙羡縣太元初改為汝南縣復屬江夏郡隋初廢郡改縣曰江夏唐宋因之宋屬郢州屈就棘棲榮趨𤓰戍見前漢之廣江之永古稱夏口之雄詩漢之廣矣不可泳思江之永矣不可方思夏口一名魯口本指夏水之口然何尚之云夏口在荆州之中正對沔口浦大容舫於事為便而章懐太子注東漢亦謂夏口戍在今鄂州故唐史皆指鄂州為夏口本在江北自呉大帝取對岸夏口之名以名之而江北之夏口始晦簿如絲訟如糜今敢秋毫之隠方圖贊喜周禮大行人賀慶以贊諸侯之喜致禬以補諸侯之烖注贊助也張于湖集嘗附啟緘少陳贊喜已沐飛箋恭惟某官翰墨功名塤箎學問詩伯氏吹壎仲氏吹箎一門叔父慨然孟博之登車謝道韞傳一門叔父則有阿大中郎范滂傳登車攬轡慨然有澄清天下之志十萬甲兵喜為幼度而折屐名臣紀傳范文正公領延安閱兵選将日夕訓練又請戒諸路養兵蓄鋭毋得輕動夏人聞之相戒曰無以延州為意今小范老子腹中自有數萬甲兵不比大范老子可欺也晉書謝𤣥字㓜度既破苻堅有捷書至謝安方對客圍碁看書既見了無喜色客問之徐徐答云小兒輩遂已破賊還内過戸限心喜甚不覺屐齒之折顧就銓曹之調俯從簿正之供難為弟難為兄正觀競秀世説陳元方子羣季方子忠各論其父功徳爭之不能決咨於太邱太邱曰元方難為兄季方難為弟顧愷之傳千巖競秀萬壑爭流餘見前能令喜能令怒佇即蜚英見前㑹蹋飜鸚鵡之洲楊用修丹鉛總録云太白過武昌見崔顥黄鶴樓詩歎服之遂不復續其事本如此後有禪僧作一偈云一拳搥碎黄鶴樓一脚蹋飜鸚鵡州眼前有景道不得崔顥題詩在上頭原是借此事設辭非太白詩也流傳之乆信以為真宋初有人偽作太白醉後答丁十八詩云黄鶴髙樓已搥碎一首樂史編太白遺詩遂收入之何太白之不幸耶見倚頼巨鼇之釣注見本巻第一條某一寒寡與三暑投閑見前頃者綴文石之班不堪教胄言為國録今兹佐武岡之治正恐負丞言倅武岡所欣楚服之同戰國策異人至不韋使楚服以見尚竊晉波之及左傳其波及晉國者君之餘也修西門種栁之課君必勉之陶侃傳侃性纖宻好問頗類趙廣漢嘗課諸營種栁都尉夏拖盜官栁植於已門侃後見駐車問曰此是武昌西門前栁因何盜来此種拖惶怖謝罪尋南嶽煨芋之禪我之懐矣髙僧傳唐李泌與明瓚禪師遊禪徒謂之懶殘者泌嘗於衡嶽寺讀書察懶殘所為曰非凡人也聆其中後梵唱響徹山林泌頗知音能辨休戚謂懶殘經音先悽愴而後喜悦必謫墮之人時将去矣中夜濳往謁焉懶殘命坐發火取芋以啖之曰勿多言領取十年宰相泌拜而退懶殘性懶而食殘故以為號東坡詩他年記此味芋火對懶殘詩我之懐矣自貽伊阻箋安其朝而不去左傳趙宣子曰嗚呼我之懐矣自貽伊慼張載擬四愁詩登岸逺望涕泗頽我之懐矣心傷悲回綏寜譚主簿成子綏寜已見老驥垂頭有愧治中之展鹽鐡論騏驥負鹽車垂頭於太行之坂屠者持刀睨之名駒䇿足不孤簿正之供幸游從諸父之間有稠疊同僚之好杜詩稠疊多幽事恭惟某官美由世濟仕本學優乃翁知國如知兵手板無蒼黄之失山谷送范徳孺知慶州詩乃翁知國如知兵塞垣草木識威名敵人開戸玩處女掩耳不及驚雷霆法言樗里子之智也使知國如知塟則吾以疾為蓍龜按山谷語本此謝安傳桓温入赴山陵大陳兵衛将移晉室呼安及王坦之欲於坐害之坦之甚懼既見温坦之汗流沾衣倒執手板蒼黄失措急遽貌他日聞詩又聞禮心印得清白之傳髙適詩心持佛印乆標割魔軍退東坡詩還從舊社得心印楊震傳使後世稱清白吏子孫以此遺之不亦厚乎寜嫌矮屋之卑㑹即髙門之亢某再叨半刺不羡羣飛陳後山詩行地經須先八駿刺天終不羡羣飛士安得自髙儻可請比隣而與祭余方有公事亦當破崖岸而為文俱見前回武岡黄主簿海武岡已見深叢見孤羆曾聽阿房之讀昌黎寄崔立之詩城西員外丞心跡兩屈寄往嵗戰詞賦不將勢力隨下駐入省門左右驚紛披傲兀坐試席深叢見孤羆文如翻水成初不用意為餘見前逺方遺雙鯉来司臨邑之曹古樂府客從逺方来遺我雙鯉魚杜詩舍弟卑棲邑防川領簿曹詳見前可謂聞音而跫然抑訝何見之晚也見首條恭惟某官原委深厚禮記三王之祭川也皆先河而後海或原也或委也此之謂務本波瀾老成杜詩毫髪無遺恨波瀾獨老成潁川第一之功固起甚廉之簿黄霸傳入錢賞官補侍郎謁者復入榖沈黎郡補左馮翊二千石卒史馮翊以霸入財為官不署右職使領郡錢榖計簿書正以亷稱為潁川太守治為天下苐一江夏無雙之學盍觀未見之書暫須矮屋以擡頭即快要津之策足並見前某㒺功教胄承乏佐州左傳攝官承乏職源别駕長史司馬通謂之上佐晁无咎詩天教仁政滿東南青袍門人老州佐聾丞尚可送迎儻或免督郵之逐見前短簿能令喜怒何幸同君子之僚韓文留守無事多君子僚餘見前回蔣主簿時懋雌伏郡丞可笑廣文之何用後漢趙温字子柔初為京兆郡丞歎曰大丈夫當雄飛安能雌伏遂棄官去杜詩諸公衮衮登臺省廣文先生官獨冷甲第紛紛厭粱肉廣文先生飯不足先生有道出羲皇先生有文過屈宋徳尊一世常轗軻名垂萬古知何用李以國録倅武岡故云鸞棲簿領渠云髙士之不為詳三十三巻代回興寜廖宰條聞須及𤓰之期尚請拔薤之教見前恭惟某官掞材有裕蓄學不貲黔山之巑夙負權竒之質栁文武岡銘黔山之巑巫水之磻漢禮樂志太一況天馬下霑赤汗沫流赭志俶儻精權竒薾浮雲腌上馳體容與迣萬里今安匹龍為友湘水如舞聊攄㑹計之材栁文湘源二妃廟碑銘南風湑湑湘水如舞將事無讙神聽鐘鼓佇即飛騰徧儀華膴某臥雲已幸鮑昭詩雲卧恣天行杜詩雲臥衣裳冷李詩雲臥游八極又雲臥從所適又雲卧歸丹壑分月何為東坡詞别乘一来有唱終須和還知麽自從添箇風月平分破詳見前靡有他長友其士之仁者能令公喜忠焉能勿誨乎代回廬陵嚴主簿世明廬陵本漢舊縣孫呉置廬陵郡晉徙郡治石陽縣隋廢郡置吉州改石陽為廬陵縣唐永淳初州徙今治縣赤隨徙宋因之老夫耄矣不堪再鼓之衰左傳老夫耄矣無能為也又戰勇氣也一鼔作氣再而衰三而竭主簿何如猶致一牋之賀杜詩輕舟下呉㑹主簿意何如詳見前恐孤厚意即具報章恭惟某官𣲖分釣瀬之清後漢書逸民傳嚴光字子陵㑹稽餘姚人少與光武同遊學光武即位召為諫議大夫不屈乃耕于富春山後人名其釣處為嚴陵瀬焉顧野王輿地志七里瀬在東陽江下與嚴陵瀬相接有嚴山桐廬縣南有嚴子陵漁釣處今山邉有石上平可坐十人臨水名為嚴陵釣臺也文似漆園之壮史記荘子者蒙人也名周周嘗為蒙漆園吏正義曰括地志云漆園故城在曹州寃句縣北十七里此云荘周為漆園吏即此按其城古屬蒙縣驊騮開道㑹即秣天山之禾驊胡𤓰切騮力求切説文赤馬黒毛尾也爾雅注赤色黒鬛驊騮周穆王八駿之一列子左驊騮而右緑耳説文秣食馬榖也東坡詩可憐老驥真老矣無心更秣天山禾鸞鳳冲霄姑少棲人間之枳見前交章載道增秩匪朝循吏傳輒以璽書增秩賜金于湖集趣召来歸匪朝伊夕贈我明月珠可見多時之簸弄四愁詩美人贈我貂䄡褕何以報之明月珠韓詩婆娑海水南簸弄明月珠乞君飛霞佩㑹看萬里之頡頏韓詩乞君飛霞佩與我髙頡頏某髙卧北牕陶靖節與子儼等疏常言五六月中北牕下卧遇涼風暫至自謂是羲皇上人卻遮西日杜牧詩惆悵江湖釣竿手卻遮西日向長安軟紅可厭敢長戀屬車之塵東坡詩軟紅猶戀屬車塵注戲語有西湖風月不如東華軟紅香土司馬相如傳犯屬車之清塵師古曰屬車者言相連續不絶也塵謂行而起塵也言清者尊貴之意也堅白爭鳴惟欲據槁梧而瞑荘子今子外乎子之神勞乎子之精倚樹而吟據槁梧而瞑天選子之形子以堅白鳴注神不休於性分之内則外矣精不止於自生之極則勞矣故行則倚樹而吟坐則據梧而睡言有情者之自困也凡子所謂外神勞精倚樹據梧且吟且睡皆世之所謂情也而云天選明夫情者非情之所生而況他哉故雖萬物萬形云為趨舍皆在無情中来又何用情於其間哉瞑音眠据琴而睡也謀歸決矣因謝及之代回姜主簿盟昭誣辯謗方欲賀君比事屬辭何為至我董仲舒傳此言何為至于我哉恭惟某官居官能大栁文先君石表隂先友記袁髙河南人以給事中敢諫争貞直忠蹇舉無與比能使所居官大遇事直前象有齒以焚身古今如此左傳象有齒以焚其身賄也唐詩古往今来只如此䑕無牙而速獄事理固然詩誰謂䑕無牙何以穿我墉誰謂女無家何以速我訟史記孟嘗君傳物有必至事有固然幸疑似之既明栁文疑似不可不辨崔顥詩我来折此獄師聽辨疑似将功名而自致暫蹶霜蹄未為失何必尤人杜詩舊穿楊業真自知暫蹶霜蹄未為失荘子馬蹄可以踐霜雪勿諱泥坑乃良規願觀進徳昌黎病䲭詩僥倖非汝福天衢汝休窺京城事彈射孺子豈易欺勿諱泥坑辱泥坑乃良規代回永豐洪主簿樒永豐本漢廬陵縣地孫呉析置陽城縣晉太康中改為陽豐縣隋省入廬陵宋至和間始置永豐縣尋陶濳之邱壑方此息交歸去来辭歸去来兮請息交以絶游世既與我而相違復駕言以焉求或命巾車或掉孤舟既窈窕以尋壑亦﨑嶇而經丘託孫寶之比隣惠然執訊詳前願有復也曲禮若有告者曰少間願有復也何以報之四愁詩何以報之英瓊瑶又何以報之雙玉盤又何以報之明月珠又何以報之青玉案恭惟某官地望穹華人門炳蔚故國非喬木信有典刑並見前用人如積薪寜分先後汲黯傳陛下用人如積薪耳後来者居上上日人果不可以無學觀汲黯之言日益甚矣師古曰言其鄙俚也或曰積薪之言出曾子故云不可無學也宋王楙野客叢書云汲黯之言出於文子黯葢引而用之耳漢書注積字無音是從本音也按周禮甸人積薪音子賜切漢書合從此音暫勾朱之游戱見前佇薦墨之飛騰山谷詩更磨薦禰墨推輓起疲懦某已乞懸車薛廣徳傳懸其安車傳子孫師古曰懸其所賜安車以示榮幸也致仕懸車葢亦古法韋孟詩云懸車之義以洎小臣也韋賢傳注應劭曰古者七十懸車致仕叙傳抑抑仲舒再相諸侯身修國治致仕懸車蔡伯喈碑遂隠邱山懸車告老殆難推轂見前俟有可乘之間詎敢蔽賢設或未同而言則懼辱命代回崇仁黄主簿元崇仁已見告移文之猿鶴方此投林北山移文蕙帳空兮夜鶴怨山人去兮曉猿驚訪銜詔之鳳凰居然棲枳鄴中記石季龍與皇后在觀上有詔書銜木鳳口中以數百丈緋䋲廵轉飛下杜詩鳳凰丹禁裡銜出紫泥書先勤下問良戢髙情戢側立切音與節同説文藏兵也从戈咠聲詩載戢干戈爾雅聚也疏藏聚也陶詩銜戢知何謝恭惟某官家學深純天才膚敏誦詩三百已多識草木之名下筆五行遂得雋蓬莱之殿六典大明宫有蓬莱殿西京記蓬莱殿在紫宸殿北段秀實傳對蓬莱殿代宗問所以安邉者畫地以對許康佐傳文宗觀書蓬莱問康佐李訓春秋之義乃屈丹鉛之點韓詩不如覷文字丹鉛事點勘暫為朱墨之勾羅隠詩朱墨勾稽官聊復培鵬荘子而後乃今培風注培音裴重也行且展驥某抗章納履誤寵剖符見前賦平子之歸田便堪税駕後漢書張衡字平子南陽西鄂人善屬文才髙於世衡遊京師四十不遇順帝時閹宦用事欲歸田里作歸田賦其略曰遊都邑以永乆無明略以佐時徒臨川以羡魚俟河清乎未期感蔡子之慷慨從唐生以決疑諒天道之微昧追漁父以同嬉超塵埃以遐逝與世事乎長辭李斯傳吾未知所税駕注舍車曰税張恊賦佇輿蕙渚税駕蘭田聞孫寳之祭竈尤幸卜隣見前回范主簿君子實寫我心未遑走謁寫先野切詩蓼彼蕭斯零露湑兮既見君子我心寫兮爾雅寫憂也注有憂者思㪚寫也主簿能令公喜猥辱飛牋既勞十部之臨敢廢七襄之報俱見前恭惟某官器資瓌碩學問醇明胸中十萬之甲兵吐為筆陣十萬甲兵見前回江夏范主簿條杜詩筆陣獨掃千人軍東坡集射䇿玉堂方觀筆陣校書天禄遂秀儒林硯裏三千之禮樂俯拾儒科夏竦詩殿上衮衣明日月硯中旗影動龍蛇縱横禮樂三千字獨對丹墀日未斜便應䇿足於要津底用擡頭於矮屋俱見前兩府以孫寳為可如彼斯何孫寳傳張忠使所親問寳曰兩府髙士俗不為主簿子既為之徙舍甚説何也寳曰髙士不為主簿而大夫君以寳為可一府莫言非士安得自髙詳見前百里非仇覽所棲自此升矣某偶巢燕幕並見前例拜魚書古樂府呼童烹鯉魚中有尺素書詳見前遺我翠織成欲巻還而不敢少陵張舍人遺織成褥段詩客從西北来遺我細織成開緘風濤湧中有掉尾鯨領客珍重意顧我非公卿錦鯨巻還客始覺心和平互見前報之青玉案愧營度之無竒韓文石鼎聨句詩序每營度欲出口吻聲鳴益悲操筆欲書将下復止卒亦不能竒也代回上饒趙主簿汝騋上饒本漢豫章郡鄱陽縣地孫呉置上饒縣晉省宋復置隋省唐復置𨽻饒州以其在饒州之上故名尋省入弋陽乾元初復置為信州治宋因之老夫耄矣陞華五雉之工鄉人好之委重雙魚之素俱見前伏惟某官學優而仕業稱其家韓文幼子姢好静秀瑶環瑜耳蘭茁其牙稱其家兒也邑大民殷無憚勾朱之冗政成事舉㑹觀薦墨之飛見前有憐龍鍾李濟翁資暇集云鍾即涔耳涔與尋並蹄足所踐處則龍之致雨上下所踐之鍾固淋漓濺澱矣義當止此蘇鶚演義云龍鍾者不昌熾不翹首如䰐鬖拉搭斛觫之類互見前猶共鳩僝某偶然曵履見前甚矣濫巾北山移文學遁東魯習隠南郭竊吹草堂濫巾北岳已再具休致之章期於得請禮記大夫七十而致事若不得謝則必賜之几杖行重尋邂逅之願兹不瀆辭詩邂逅相遇適我願兮回靈泉李主簿靈泉在今成都府東五十里唐貞觀初置東陽縣天寳初改曰靈池宋改曰靈泉今廢君子之居是邦未遑進謁他人不如同姓先辱陳牋詩豈無他人不如我同姓既感臨存嚴助傳使重臣臨存師古曰存謂省問之亦深訟愧臨訟卦名恭惟某官隆山望族東晉析武陽縣東境置西域戍西魏陞為縣改普寜為隆山郡治宋改隆州又地理志注應劭曰隆慮山在北避殤帝諱改林慮屬河内郡隴右名家地理志隴西郡注應邵曰隴坁在其西也師古曰隴坁謂隴阪即今之隴山也此郡在隴山之西故曰隴西飛将軍之功名寜論妄校李廣傳召拜右北平太守廣在郡匃奴號曰漢飛将軍避之數嵗不入界廣與從弟李蔡俱為郎蔡為人在下中名聲出廣下逮甚封樂安侯代公孫𢎞為丞相然廣不得爵邑官不過九卿廣之軍吏及士卒或取封侯廣與望氣王朔語曰漢擊匃奴廣未嘗不在其中而諸妄校尉已下以軍功取侯者數十人廣不為後人然終無尺寸功以得封邑者何也張晏日妄猶凡也謫仙人之苗裔顧落夜郎太白集太子賔客賀監於長安紫極宫一見呼余為謫仙人因解金龜換酒為樂没後對酒悵然有懐而作是詩四明有狂客風流賀季真長安一相見呼我謫仙人曾子固李翰林集序明皇在蜀永王璘節度東南白時卧廬山璘迫致之璘兵敗丹陽白以璘事長流夜郎遂泛洞庭上峽江至巫山以赦得釋進士論定而官之禮記論進士之賢者以告於主而定其論論定然後官之鄭注各署其所長使之試守公等何見之晚也見首條暫且出朱而入墨周書蘇綽字令綽武功人博覽羣書尤善算術拜大行臺左丞始制文案程式朱出墨入及計帳戸籍之法互見前今按朱出墨入凡文案皆然作者以白帖主簿有朱勾之語羅隠寄剡縣主簿詩有朱篆勾稽官之句故用之主簿耳猶堪紆紫以懐黄晉書儒林傳序莫不紆青拖紫服冕乘軒沈隠侯集自兹以降懐青拖紫崇基嚴嚴長瀾瀰瀰楊僕傳懐銀黄垂三組注黄金印也互見前某有幸識賢特勤委贄置一盂之水正有望於吾宗左傳晉吾宗也豈害我哉李邕詩吾宗固神秀杜詩吾宗老孫子東坡詩吾宗先生有深意山谷詩江夏無雙乃吾宗又吾宗落筆賞幽事又吾宗端居聚百憂餘見前夢三刀於梁初何闗於我輩見前回長沙蕭主簿秦置湘縣為長沙郡治漢改曰臨湘隋改曰長沙五代漢析置龍喜縣宋罷龍喜置常豐縣開寳中廢常豐入焉按十三巻有回武岡新舉蕭漢龍啟詳此啟即其人也前啟云吕侯之辟三千既知奥義蕭何之功第一宜稱名家此云洞明吕辟之三千當擢蕭何於第一語意脗合歌鹿鳴而勸駕叨與旁觀禮記宵雅肄三官其始也注宵之言小也習小雅之三謂鹿鳴四牡皇皇者華也韓詩州家舉進士選試謬所當相公朝服立工席歌鹿鳴髙帝紀其有意稱明徳者必身勸為之駕文穎曰有賢者郡守身自往勸勉令至京師駕車遣之韓文巧匠旁觀縮手袖閒聞鵬化之回程已違旅賀荘子北冥有魚其名曰鯤化而為鳥其名曰鵬有髙陳誼見前猶念故侯蕭何傳召平者故秦東陵侯李徳裕詩雖非逃相第乃是故侯園東坡詩幅巾我欲隨君去海上何人識故侯恭惟某官挺秀楚材束晳詩黍發稠華禾挺其秀左傳雖楚有材晉實用之孟浩然詩共理分荆國招賢貴楚材效珍嶽貢班固傳寳鼎詩嶽秀貢兮川效珍吐金景兮歊浮雲頃觀奥義洞明吕辟之三千尚書吕刑五刑之屬三千上下比罪無僣亂辭固擬大庭當擢蕭何於第一蕭何傳列侯已受封奏位次皆曰平陽侯曹參功最多宜第一上心欲何第一鄂千秋進曰蕭何全闗中待陛下此萬世功也雖無曹參等百數何缺於漢奈何欲以一旦之功而加萬世之功哉蕭何當第一上曰善於是乃令何第一龜果登於前列禮記龜為前列先知也注此即旅幣無方之事也龜是靈知之物陳之於庭則列龜最在前故云先知也東坡徐州鹿鳴燕賦詩序庭實旅百貢先前列之龜工歌拜三義取食野之鹿鸞暫屈於卑棲長沙不足回旋㑹計而已短簿能令喜怒騰踏在兹俱見前惟是資水之淵源資江在今成都府資縣東四十里水深百丈為羣川總㑹之所寥乎曲江之姓字李肇國史補進士既捷列姓名於慈恩寺塔謂之題名大讌於曲江亭子謂之曲江㑹詳見前閱世三紀尚書既歴三紀闔郡一人進士業與進士同若為愛助韓文堅以進士舉於余為同業天下寳為天下惜當自激昻王坦之傳天下之寳故為天下所惜詳見前王章傳不自激昻乃反涕泣何鄙也某叨守三榮見前将書一考已進南嶽香火之請或可言旋南嶽一名衡山南嶽記衡山者朱陵之靈臺太虛之寳洞上承翼軫鈐總萬物故名衡山下踞離宫統攝火師故號南嶽赤帝館其巔祝融宅其陽逮於軒轅以濳靈二山副焉杜陵望嶽詩南嶽配朱鳥秩禮自古王歘汲頓地靈鴻洞半炎方劉禹錫詩東南倚葢車維嶽資柱石前當祝融峯上拂朱鳥翮南嶽廟在衡山西三十里南嶽記南宫四面險絶無得至者漢武帝移於霍山隋文帝移於今所昌黎謁南嶽廟詩五嶽登秩皆三公四方環鎮嵩居中火維地荒足妖怪天假神物專其雄范至能驂鸞記衡山縣西望嶽山岧嵬半空湘中山既皆岡阜迤邐至嶽山乃獨雄尊特起若衆山遜其髙寒者南嶽廟四阿各有角樓兩廡土偶儀仗皆取則帝所正殿獨一神座監廟與禮直官日上香火宋祠禄有提舉官觀嶽祠官南嶽其一也宋牋表修香火之因東坡詩灑掃古玉局香火通帝禋王荆公詩香火有新縁又東人香火有因縁又香火靈山亦有縁又香火因縁寄此山儻過東園山水之亭更希勿毀回新威逺趙主簿與橒威逺漢為蜀郡地隋置威逺戍後改為威逺縣屬資州唐屬榮州宋因之今屬嘉定州趙諸本俱作蕭今詳啟中語多用宗室事而與字乃宋玉牒璇源字號盖承上條蕭字之誤耳鳳凰千仞不辭棲枳之卑賈誼傳鳳凰翔於千仞兮師古曰八尺曰仞千仞言其極髙餘見前鯉魚尺書見報戍𤓰之及良陳髙誼復愧過情伏惟某官卓爾不羣飄然無敵俱見前心濳鴻苑富金淵玉海之藏劉向傳淮南有鴻寳苑秘書師古曰鴻寳苑秘書並道術篇名廣絶交論舒向金玉淵海卿雲黼黻河漢句滿錦囊多篆鼎風檣之作李賀傳每旦日出從一奚奴背古錦囊遇所得書投其中杜牧李賀集序瓦棺篆鼎不足為其古也陣馬風檣不足為其勇也詳見前既儒科之峻擢何簿領之足淹矮屋擡頭聊復爾耳要津䇿足由是而之俱見前某乆於知名行矣聫事取青嫓白愧修報之不工栁文世之模擬竄竊取青嫓白肥皮厚肉柔筋脆骨而以為辭者之讀之也其大笑固宜出墨入朱惟疾驅之是望見上回靈泉李主簿條回新盤石曹主簿盤石已見開驊騮之道萬馬皆瘖驊胡𤓰切騮才求切説文赤馬黒毛尾也爾雅注赤色黒鬛驊騮駿馬名周穆王八駿之一列子左驊騮而右緑耳漢地理志驊騮緑耳之乘師古曰言其色如華之赤杜詩驊騮作駒已汗血東坡三馬贊時西域貢馬首髙八尺龍顱而鳳膺虎脊而豹章出東華門入天駟監振鬛長鳴萬馬皆瘖飛鸞鳳之驂一䕫亦足風俗通義吕氏春秋魯哀公問於孔子樂正䕫一足信乎孔子曰昔者舜於䕫為樂正始治六律和均五聲以通八風而天下服重黎又薦能為音者舜曰夫樂天地之精得失之節故惟聖人為能和樂之本䕫能為之平天下若䕫一足矣故曰䕫一足非一足行説文䕫神䰧也如龍一足有角手人面之形國語木石之怪䕫蝄蜽注一足越人謂之山繅或云獨足司馬相如傳捐䕫魖而扶獝狂孟康注䕫神如龍有角人面一云似牛一足無角荘子䕫憐蚿注一足獸未遑候氣列仙傳闗令尹喜者周大夫也善内學星宿服精華者修徳行仁時人莫知老子西遊喜先見其氣知真人當過候物色而迹之果得老子索隠曰列仙傳是劉向所記物色而迹謂視其氣物有異色而尋迹之又按列異傳老子西遊關令尹喜望見有紫氣浮關而老子果乘青牛而過先辱修辭易修辭立其誠所以居業也疏辭謂文教誠謂誠實内則修理文教外則立其誠實恭惟某官履行醇明風猷凝逺見前吐天葩而拔俗韓詩東野動驚俗天葩吐竒芬拾地芥以決科齒清如冰豈羡景宗之笳鼓韓詩憶昔初及第各以少年稱君頥始生鬚我齒清如冰梁書曹景宗字子震新野人以膽畧知名頗愛史書每讀穰苴樂毅傳輒放巻歎息曰丈夫當如是為人自恃尚勝作書字有不解不以問人皆以意造焉南史曹景宗傳景宗破魏兵振旅凱入帝於華光殿宴飲連句令沈約賦韻景宗不得韻意色不平詔令約賦韻唯餘競病二字景宗操筆須臾而成其辭曰去時兒女悲歸来笳鼓競借問路行人何如霍去病詔令上左史詳見前學至於海方觀子建之波瀾法言百川學海而至於海邱陵學山而不至於山是故惡夫畫也注百川亦海之類而小故曰學海百川動而不息故至於海邱陵止而不進故不至於山學者亦猶是矣唐文粹序天下之人始知文有江而學有海識於人而際於天杜詩文章子建波瀾濶俯從簿正之供密邇里仁之美能令公喜公怒直為假館之謀曹交爾有嘉謀嘉猷又恐趣装之入曹參傳告舍人趣治行師古曰舍人猶家人也治行謂修行治装也某欣聞還舍未遑欵門韓詩誰家多竹門可欵諸侯不臣寓公無曰一㕓之願受禮記諸侯不臣寓公故古者寓公不繼世注寓寄也正義云寓公者何也失地之君也或天子削地或被諸侯所逐皆為失地也諸侯不臣者不敢以寓公為臣也進士與吾同業尚須尊酒以細論杜陵懐李白詩何時一尊酒重與細論文餘見前回趙主簿淵伏䝉枉顧見畀屬辭備知家學之淵源仍見詞塲之根柢柢典禮切説文木根也爾雅本也徐曰華葉之根曰蔕木之根曰柢杜詩詞林有根柢東坡詩問學有根柢山谷詩唯有文字工萬古抱根柢繼沈侯之八詠綽有祖風八詠樓在婺州子城西即沈隠侯元暢樓宋至道間郡守馮伉更今名八詠詳見前唐嚴維詩明月雙溪水清風八詠樓少年為客處今日送君遊崔顥詩梁日東陽守為樓望越中緑牕明月在青史古人空江静聞山狖川長數塞鴻登臨白雲晚留恨此遺風李易安詩千古風流八詠樓江山留與後人愁水通南國三千里氣壓江城十四州吟趙嘏之一聫肯孤宗𣲖趙嘏字承祐晚唐詩人㑹昌四年進士終渭南尉有渭南詩三巻行於世杜紫微讀其早秋詩云殘星㡬㸃鴈横塞長笛一聲人倚樓因目之為趙倚樓所謂一聫指此唐張夀詩人主客圖以鮑照為博解宏拔主人入室則李羣玉劉禹錫趙嘏長孫佐輔曹堂升堂則盧騏陳羽許渾張肅及門則張陵章孝標陶雍周祚袁不約亦江西宗𣲖之意也但深藏感曷既報酬回任主簿三錫詳啟意蓋其人服闋謁見而答之者欲見組纓取瑟尚疑於将命禮記有子盖既祥而絲履組纓注譏其早也正義云此絲履組纓􅎭後之服今既祥而著故云譏其早也此言欲謁而疑於早恐其見辭鼎来緑綺彈琴足想於成聲梁元帝纂要緑綺司馬相如琴名傅𤣥琴賦序齊桓公有名琴曰繞梁中世司馬相如有緑綺蔡邕有焦尾皆名器也張載擬四愁詩美人遺我緑綺琴何以贈之雙南金禮記孔子既祥五日彈琴而不成聲又子張既除喪而見子之琴和之而和彈之而成聲詳見前望履未先鳴謙何厚履讌卦名恭惟某官諸任望族任姓出樂安黄帝二十五子以徳為姓一為任左傳寡人若朝於薛不敢與諸任齒正義云謝章薛舒吕祝終泉畢過此十國皆任姓四蜀名家見前鄉老使興賢能乆應定爵周禮鄉大夫之職三年則大比攷其徳行道藝而興能者賢者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之禮記論定然後官之任官然後爵之疏堪任此官然後爵命之主簿能令喜怒晚乃棲鸞見前屬聞纒風木之悲韓詩外傳孔子行聞哭聲甚悲至則臯魚也孔子辟車與之言臯魚曰吾少而學游諸侯以後吾親失之一也髙尚吾志間吾事君失之二也與友厚而小絶之失之三矣樹欲静而風不止子欲養而親不待也不可得見者親也吾請從此辭矣立槁而死未敢于水薤之教見前捄䝉袂葺屨之餓乃辱協心禮記齊大餓黔敖為食於路以待餓者而食之有餓者䝉袂輯屨貿貿然来注䝉袂不欲見人也輯斂也斂屨力憊不能屨也尚書三后恊心推被髪纓冠之仁可占用世朝祥既御暮召何疑某方欲欵門並見前已勤命駕嵇康傳東平吕安服康髙致每一相思輒千里命駕李詩不以千里遥命駕来相挽發棠殆不可復敢更希馮婦之下車治齊問所以安或可延葢公而避舍曹參傳參之相齊盡召長老諸先生問所以安集百姓言人人殊參未知所定聞膠西有葢公善治黄老言使人厚幣請之於是避正堂舍葢公焉互見前回榮徳馬主簿竒之榮經縣本漢南安縣地歴代沿革不常宋為榮經縣為榮州治後州陞紹興府今為榮縣屬嘉定州應靈趙主簿綸應靈已見一麾出守慙非牧御之才冦恂傳并州未安光武難其守問於鄧禹禹曰昔髙祖任蕭何於闗中無復西顧之憂今河内帶河為固戸口殷實北通上黨南迫洛陽冦恂文武備足有牧人御衆之才非此子莫可使也乃拜恂河内太守同官為僚正藉老成之助詩雖無老成人尚有典刑有来下問極仞髙情伏惟某官腹溢儒書韓詩人之能為人由腹有詩書東坡詩腹有詩書氣自華氣吞餘輩東坡詩氣吞餘子無全目詩到諸郎尚絶倫倚頼巨鼇之釣時来為之杜詩倚頼天涯釣猶能掣巨鼇南史膺時来之運互見前低回祥鳳之棲公等安在史記低回留之不能去瑞應圖鳳王者之嘉祥主父偃傳上書言世務書奏上召見三人謂曰公等皆安在何相見之晚也互見前諒奏勾朱之最即遄薦墨之飛某自笑倦游何堪共理並見前友其士之仁者行即盍簪易朋盍簪注盍合也簪疾也忠焉能勿誨乎更希倒廩韓文猶捋倒廩傾囷羅列而進也其為傾徯曷既敷宣回汶川劉主簿成之汶川在茂州南二百里本漢綿虒廣柔二縣地初屬汶山尋𨽻蜀郡東漢以廣柔屬汶山郡晉省綿虒後廢廣柔後周置汶川縣隋屬汶山郡唐屬茂州宋熈寜九年即汶川縣治置威戎軍使汶山即禹貢岷山在列鵝村江水出焉汶江出岷山為大江按劉諸本皆作文葢梅亭名劉主簿避諱故改劉為文如錢武肅王諱鏐吴越間諱劉為金耳然避諱者或取音相近如孫荀之類或取義相近如嚴荘之類劉之為文不知所取豈俗書有以卯金省文从文者在宋已有此字乎詳啟意自見聞覲省之歸未遑一詣習鑿齒傳然徒三十年看儒書不如一詣習主簿辱臨存之寵仍畀屬辭嚴助傳使重臣臨存詳前得非所䝉願竊有復見前恭惟某官學優而仕徳世其家蕡下第之厚顔雖淹衆論新唐書劉蕡字去華幽州昌平人沈健于謀浩然有救世意擢進士第舉賢良方正能直言極諫文宗引諸儒百餘人於庭䇿之第䇿官馮宿賈餗龎嚴見蕡對嗟服以為過古晁董而畏中官睚眦不敢取士人讀其辭至感慨流涕者諫官御史交章論其直於是被選者二十有三人所言皆冗齪常務類得優調河南府參軍李郃曰蕡逐我留吾顔其厚耶互見前龔好古而篤論自有祖風董仲舒傳贊仲舒遭漢承秦滅學之後六經離析下帷發憤濳心大業令後學有所統壹為羣儒首然考其師友淵源所漸猶未及虖游夏而曰管晏不及伊吕弗加過矣至向曾孫龔篤論君子也以歆之言為然少屈鸞棲行觀鵾化某濫膺郡寄幸託士鄉将因其嫌乎将諱其姓乎固非所望韓文諱辯周之時有騏期漢之時有杜度此其子宜何如諱将諱其嫌遂諱其姓乎将不諱其嫌者乎吾見其人矣吾聞其語矣愧莫之酬回長江李主簿長江縣在遂寜府北三十里舊名巴興西魏改曰長江隋唐屬遂州宋陞州為遂寜府元併長江入蓬溪縣至本朝降遂寜府為縣與蓬溪俱𨽻潼川府出幕罔功詎堪再辱杜詩十年出幕府李陵傳歸易耳恐再辱又丈夫不能再辱蜀志譙周傳再辱之恥何與一辱分符非據恐負三榮榮州有榮梨榮隠榮徳三山故名三榮今為榮縣所幸在賢者之邦或可冀忠焉之誨恭惟某官學探聖處韓詩近憐老杜無檢束爛漫長醉多文辭屈原離騷二十五不肯餔啜糟與醨惜哉此子巧言語不到聖處寜非癡此聖處借用譽藹明時柱史五千言濳心有素史記老子傳老子者周守藏室之史也見周之衰廼遂去至闗闗令尹喜曰子将隠矣彊為我著書於是老子乃著書上下篇言道徳之意五千餘言而去索隠曰按藏室乃周藏書史之室也又張湯傳老子為柱下史即藏室之柱下因以為官名董仲舒傳濳心大業法言敢問濳心於聖曰昔仲尼濳心於文王矣達之顔淵亦濳心於仲尼矣未達一間耳鄴侯三萬軸載腹不遺韓詩鄴侯家多書架挿三萬軸一一懸牙籖新若手未觸為人强記覽過眼不再讀偉哉羣聖文磊落載其腹顧薄蓬莱栁文謫龍説扶風馬孺子言年十五六時在澤州與羣兒戱郊亭上頃然有竒女墜地有光曄然被緅裘白紋之裏首歩摇之冠貴游年少駭且悦之稍狎焉女頩然怒曰不可吾故居鈞天帝宫上下星辰呼吸隂陽薄蓬莱羞崑崙而不即者帝以吾心侈大怒而謫来七日當復今吾雖辱在塵土中非若儷也暫棲枳棘王珣能令公喜不足為歟孫寳安得自高聊復爾耳俱見前某濫守和義榮州漢為南安縣地李雄據蜀夷獠居之所謂生鐡獠也齊立南安郡隋以其地屬資陽又置太牢縣唐置榮州又改太牢為應靈州改和義郡復為榮州葢擇里仁無以我公歸兮使解凝塵之榻晉書簡文帝性冲澹所居凝塵滿席湛如也新唐書楊綰傳性沉靜獨處一室左右圖史凝塵滿席澹如也事其大夫賢者惠之止水之盂荘子人莫監於流水當監於止水餘見前回趙主簿頂戴登科記知一日之成名唐張倬東之之孫數舉進士不第捧登科記頂上戴之日此千佛名經劉賔客賀王魏公詩一日聲名徧天下滿城桃李屬春官白樂天及第後歸覲詩十年常苦學一日謬成名跪讀尺素書喜同年之有子古樂府長跪讀素書書中意何如東坡答劉沔都漕書文章如金玉珠貝未易鄙棄見足下詞筆如此又喜吾同年兄龍圖公之有後也既髙陳誼又恥過情恭惟某官賦擅凌雲司馬相如傳相如既奏大人賦天子大悦飄飄有凌雲氣游天地之間意文成翻水韓詩文如翻水成初不用意為能吟青玉案學素裕於鯉庭杜詩試吟青玉案莫羡紫羅囊楊汝士詩桃李新陰在鯉庭甫縱黄金羈名果聫於鴈塔東坡詩野馬不受黄金羈摭言神龍以来杏園晏後皆於慈恩寺塔下題名同年中推一善書者記之他時有将相則朱書之及第後知聞或過未及第時題名處則為添前字故昔人有詩云曾題名處添前字送出城人乞舊衣南部新書韋肇於及第偶於慈恩寺塔下題名後進慕效之遂成故事類苑佛在世時有比邱見羣鴈飛空念曰摩訶薩埵可充我費鴈乃墮地佛曰此鴈王也不可食乃立鴈塔宋馬永卿懶真子云長安慈恩寺塔有唐新進士題名雖妍蚩不同然皆髙古有法度鴈塔者唐𤣥奘法師往五印度取經得梵本五百六十七部師乃於寺造甎浮圖以藏梵本恐火災也所以謂之鴈塔者用西域故事王舍城中有僧娑窣堵波僧娑者唐言鴈也窣堵波者唐言塔也師至王舍城嘗禮是塔問其因縁云昔此地有伽藍依小乘食三浄食三浄食者謂鴈也犢者鹿也一日衆僧無食仰見羣鴈翔飛輒戱言曰今日衆僧闕供摩薩埵宜知其引前者應聲而墮衆僧飲泣遂依大乘更不食三浄仍建塔以鴈埋其下故師因此名塔薩埵好施之謂其後遂為遊人宴集之地唐張禮遊城南記云慈恩寺本隋無漏寺髙宗在東宫為文徳皇后立為慈恩寺永徽三年沙門𤣥奘起塔初惟五層甎表土心效西域窣堵波即袁宏漢記所謂浮屠祠也長安中摧倒武后及王公施錢重建至十層其云鴈塔者天竺記達嚫國有伽葉佛伽藍穿石山作塔五層最下一層作鴈形謂之鴈塔葢此意也熈寜中富民康生遺火經宵不滅塔既經焚塗圬皆剥而甎始露唐人墨跡於是畢見今孟郊舒元輿之類尚存其他不聞於後世者盖不可勝數也暫棲枳棘即上蓬莱某辱託通家栁文送崔羣序予於崔君有通家之舊過勤委贄憶曲江杏花之㑹陪野鶴於未仙唐張禮遊城南記杏園與慈恩寺南北相直唐新進士多遊宴於此芙蓉園在曲江之西南隋離宫也與杏園皆秦宜春下苑之地唐劉滄及第後宴曲江詩及苐新春選勝遊杏園初宴曲江頭東坡詩何人更識嵇中㪚野鶴昂藏未是仙餘見前尋平羌江水之流幸海鯨之有種李詩峨眉山月半輪秋影入平羌江水流崔豹古今注鯨大者長千里小者數丈一生數萬子嘗以五六月就岸生子至七八月導從其子還大海中鼓浪成雷噴沬成雨水族驚畏莫敢當者回崇仁趙主簿聞公子之翩翩受㕓良幸史記平原君趙勝者趙之諸公子也諸子勝最賢太史公曰平原君翩翩濁世之賢公子也還使臣之靡靡返室有期靡音美詩行邁靡靡中心摇摇行邁靡靡中心如醉行邁靡靡中心如噎沈佺期詩令君出使車行邁方靡靡将遂識賢預深引領恭惟某官負材開敏廸徳忱恂尚書廸知忱恂于九徳之行名千里之駒早騰燕譽見前振九苞之鳳迄對龍光詩既見君子為龍為光餘見前便當遡紫以凌青太白春日行深宫髙樓入紫清按上皇玉帝吟玉清之隠書曰上景發晨暉金霄鬱紫清翰林志時以居翰苑者為凌玉霄遡紫清顧屈出朱而入墨見前㑹膺鶚表徑造鴛行某将指雪邉杜詩鷗鳥鏡裏来闗山雪邉看傾心日下陸雲傳雲與荀隠素未相識嘗㑹張華坐華曰今日相遇可勿為常談雲因抗手曰雲間陸士龍隠曰日下荀鳴鶴一詣習主簿合應勝於讀書獨冷鄭廣文尚從容於歸賦俱見前其為欣幸罔既編摩普回簿尉監當已下不願封侯已快盍簪之悃既見君子又勤銜袖之文俱見前感煖於布帛之言荀子與人善言煖于布帛詳見前乏報以襜褕之語徒知十襲莫效七襄俱詳見前四六標準巻三十五, SBCK: 凖}
