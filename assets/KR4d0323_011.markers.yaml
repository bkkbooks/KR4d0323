  - {type: variant, offset: 11371, length: 13217, content: 故能彌綸天地之道頗哀墜緒之茫茫馬援傳頗哀老子韓文尋墜緒之茫茫恐與常流而冺冺既取賛皇之實録以誌楚金賛皇謂李翺翺嘗自為其皇祖考貝州司法参軍楚金實録求韓文公銘其墓實録末云先祖有美而不知不明也知而不傳不仁也翺欲傳懼文章不足以稱頌道徳光耀來世是以頓首欲假辭於執事者此翶乞銘之辭也山谷詩云習之實録塟皇祖斯文如女有正色葢謂此也復叙欒城之世家就銘明允歐陽公蘇明允墓誌銘曰蘇顯唐世實欒城人以宦留眉蕃蕃子孫自其髙曾郷里稱仁偉歟明允大發於文亦既有文而又有子其存不朽其嗣彌昌嗚呼明允可謂不亡仍加篆畫八分之賜郭忠恕法書苑自小篆散而八分生八分破而𨽻書出蔡文姬云吾父割𨽻字八分取二分割李篆字二分取八分故名八分大篆者周宣王太史史籕所作小篆者秦丞相李斯所作増損大篆謂之小篆杜詩蒼頡鳥跡既茫昧字體變化如浮雲陳倉石鼓文已訛大小二篆生八分俾免不稱三服之羞昌黎科斗書後紀愈叔父當大厯世文辭獨行中朝天下之欲銘述其先人功行取信來世者咸歸韓氏於時李監陽氷獨能篆書而同姓叔父擇木善八分不問可知其人不如是者不稱三服故三家傳子弟往来一門存亡百世感激某敢不昭告屏攝攝色甲切音與殺同亦作翣説文棺羽餙也天子八諸侯六大夫四士二漢謂扇為攝通作翜楚語屛攝之位注屏者并攝主人之位昭謂屏屏風也攝形如今翣扇皆所以分别尊卑為祭祀之位表刻墓埏埏墓道也文選哀永逝文棺㝠㝠兮埏窈窈注埏墓隧也儻得保首領從九京之逰禮記文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也京音原庶無泚靣目以逹中心之愧㣲薄不以廢其禮何足為碑版之酬詩序瓠葉大夫刺幽王也上棄禮而不能行雖有牲牢􅛰餼不肯用也故思古之人不以㣲薄廢禮焉舊唐書栁公權志耽書學不能治生為勲戚家碑版問遺嵗時鉅萬杜詩干謁走其門碑版照四裔蘇子由詩平生碑版無容繼此日銘詩誰能題夙夜無忝爾所生用此為師門之報詩我日斯邁而月斯征夙興夜寐無忝爾所生注當早起夜卧無辱所生之父母其為感鍥鍥吉屑切罔既鋪棻棻與紛通盛貎文選桑麻鋪棻謝衛參政涇差校正書籍小材出位願歸朱墨之勾稽羅隐詩金庭飬真地朱墨勾稽官大府量能留備丹鉛之㸃勘韓詩不如覷文字丹鈆事㸃勘少振塵埃之冗班固傳令塵埃之中永無荆山汨羅之恨倍勤坯冶之陶並見前竊以三館文書固遴讐正編摩之選三舘謂昭文集賢史館縂名崇文院東坡詩三館曝書防蠧毁諸侯賔客率多訟獄財賦之司寜有伺侯公卿之門韓文伺候於公卿之門奔走於形勢之途更容休息篇章之囿司馬相如傳游于六藝之囿又遥集乎文雅之囿文選吳質答魏太子牋優游典籍之塲休息篇章之囿班固答賔戲婆娑乎藝術之塲休息乎篇章之囿憐韓愈之非職俾就閑官昌黎和裴晉公詩長慙典午非材職得就閑官即至公期吕蒙之讀書豈為博士江表傳孫權謂吕䝉蔣欽曰卿今並當塗掌事宜學問以自開益䝉曰在軍事常苦多務恐不容復讀書權曰孤豈欲卿治經為博士邪但當令渉獵見往事耳沫濡鮒轍莊子泉涸魚相與處乎陸相煦以濡相濡以沫不若相㤀於江湖啄菢鶴翎韓詩鶴翎不天生變化在啄菢注菢薄報切鳥伏卵謂之菢使飬是氣而塞天地之間將和其聲以鳴國家之盛昌黎送孟東野序三子者之鳴信善矣抑不知天將和其聲而使鳴國家之盛耶抑將窮餓其身思愁其心腸而使自鳴其不幸耶知花扵見根之始邵康節見商守趙郎中與章子厚同㑹議論縦横不知敬康節語中因及洛中牡丹之盛趙謂章曰先生洛人也知花為甚詳康節因言洛人以見根撥而知花之髙下者上也見枝葉而知高下者次也見菩蕾而知高下者下也章黙然山谷詩見葉知根論材性乞漿有得酒之恩袁子正書嵗在申酉乞漿得酒嵗在辰己鬻妻賣子求之古人魏志陳登字元龍劉偹曰元龍文武膽志當求于古人耳王衍傳武帝聞衍名問王戎曰夷甫當世誰比戎曰不見其比當從古人中求耳宋書顔延之與武帝書司馬平西體國忠貞欵愛待物當于古人中求耳杜詩似君須向古人求亶在今日伏念某少諧平側側通作仄韻㑹平仄字聲也南齊陸厥傳周顒善識聲韻沈約等文皆以平上去入為四聲以此制韻不可増減世呼為永明體長識偏傍崇文目序爾雅出漢世而有訓詁之學三倉志字法許慎作説文而有偏傍之學皇甫湜與李生書書字未識偏旁高談稷契讀書未知句度下視服䖍林罕有字源偏旁小説三巻其序云漢大尉祭酒許子取其形類作偏旁餘例十五巻名為説文山谷詩摹書説偏旁不深石室之紬司馬遷傳紬史記石室金鐀之書僅曉金根之讀古今注金根車秦制也秦并天下閲天下之輿服謂殷得瑞山車一曰金根車故因作金根之車秦乃増餙而乘御焉漢因而不改唐李綽尚書故實昌黎韓㫤名父子雖教有義方而性頗闇劣為集賢校理史傳中有金根車處皆臆斷之曰豈其誤歟必金銀車悉改根字為銀字至除拾遺果為諫院不受俄有以故人子憐之者因辟為鹿門從事也遺經獨抱未辨豕渡河之三韓詩春秋三傳束髙閣獨抱遺經究終始家語卜商字子夏嘗返衛見讀史志者云晉師伐秦三豕渡河子夏曰非也己亥耳讀史志者問諸晉史果曰己亥於是衞人以子夏為聖埤雅云已象蛇之形亥象豕之形故三豕渡河子夏曰是己亥也張鷟集亥之與豕涇渭難分魯之與魚淄渑莫辨良史博觀麄知馬與尾而五萬石君傳石建為郎中令奏事下建讀之驚恐曰書馬者與尾而五今乃四不足一獲譴死矣師古曰馬字下曲者為尾并四㸃為四足凡五有時北窻髙卧之夢陶潜傳嘗曰夏月虛閑高卧北窓之下清風颯至自謂羲皇上人頗思東觀未見之書黄香傳肅宗詔香詣東觀讀所未見書三神𦕈在扵海中漢郊祀志使人入海求蓬萊方丈瀛洲此三神山者其傳在海中五鬼難驅扵坐上昌黎送窮文凡此五鬼為吾五患蝇營狗茍驅去復還又焼車與船延之上座挿架三萬軸但當守鄴侯之書韓詩鄴矦家多書挿架三萬軸家集二百篇幸皆是撫州之冩杜牧示小姪阿宜詩我家公相家劒佩常丁當舊第開朱門長安城中央第中無一物萬巻書滿堂家集二百篇上下馳皇王多是撫州冩今來五紀强尚可與爾讀助爾為賢良然作吏此事便廢嵇康絶交書一行作吏此事便廢安能舍其所樂而從其所懼哉梁書何𦙍傳欲卧游千載畋漁百氏一行為吏此事遂乖惟投閑乃分之宜韓文投閑置散乃分之宜傷哉貧也禮記傷哉貧也生無以為飬死無以為禮也亦有命焉韓文是有命焉不可幸而致也乆留戲下戲音羲大將之旗曰戲韓信傳兩將之頭可致戲下宜在遣中三國典略州郡被詔書有軍功為長吏者當沙汰之劉偹疑在遣中韓文中山劉夢得亦在遣中遽冐小朝廷之除新唐書鄭從讜傳從讜以宰相秩復為河東節度使詔自擇参佐從讜即表長安令王調自副兵部員外郎劉崇龜司勲員外郎趙崇為節度觀察府判官前進士劉崇魯推官左拾遺李渥掌書記長安尉崔澤支使皆一時選京師士人比太原為小朝延言得才多也使策行秘書之職隋唐嘉話太宗嘗出行有司請載副書以從帝曰不須虞世南在此行秘書也兹盖伏遇某官榮分湘閫並用楚材左傳其大夫則賢皆卿材也雖楚有材晉寔用之孟浩然詩共理分荆國招賢貴楚材叉負偃植各安所施耻匹夫之不獲新唐書二劉殷許等傳賛若榱椽梁柱以成大室叉負偃植各安所施詳見前椳闑扂楔惟器是適無一藝之不庸試黄閣之規模並見前收碧油之人物歐陽詹詩十萬兵樞擁碧油楊誠齋送趙子直帥益州詩錦水花潭照碧油西清學士舊鼇頭至如狂簡之小子亦勞坱圠之大鈞某敢不祗此簡書呻其佔畢並見前珥貂分陜已收下體之菲葑曹植文戴蟬珥貂左思詩金張藉舊業七葉珥漢貂餘見前給札登瀛願備一株之桃李司馬相如傳上令尚書給筆札師古曰札木簡之薄小者也時末多用紙故給札以書談叢王冷然上裴耀卿書拾遺補闕寕有種乎僕不佞亦相公一株之桃李也餘見前代袁子固謝縣宰寛假詳啟意葢郷隣有鬪傷而失于先告法當坐笞縣令貸之故有此謝箠楚之下何求知難全璧漢書路温舒傳人情安則樂生痛則思死捶楚之下何求而不得晉書劉隗傳捶楚之下無求不得囚人畏痛飭辭應之史記藺相如傳臣請完璧歸趙縲絏之中非罪迄就罸金沈佺期詩昔日公冶長無罪遭縲絏聖人降兄子古來歎獨絶白帖冶長非罪始因尼父而知張釋之傳釋之奏當此人犯蹕當罰金注乙令蹕先至而犯者罰金四兩敢不持咫尺之書韓信傳奉咫尺之書師古曰八寸曰咫咫尺者言其簡牘或長咫或長尺喻輕率也今俗言尺書或言尺牘葢其遺語耳少謝寛一分之賜宋史邵雍傳熈寕行新法雍門生故吏居州縣者皆貽書訪雍雍曰此賢者所當盡力之時新法固嚴能寛一分則民受一分賜矣惟越人之相攻擊葢其俗然高帝紀粤人之俗好相攻擊南海尉陀居南方長治之粤人相攻擊之俗益止汲黯傳東粤相攻上使黯往視之至吳而還報曰粤人相攻固其俗不足以辱天子使者嚴助傳越人相攻擊其常事閩粤王傳閩粤發兵圍東甌東甌使人告急天子問太尉田蚡蚡曰粤人相攻擊固其常不足以煩中國往救也而長安之羣殺傷各有主者丙吉傳吉嘗出逢清道群闘者死傷横道吉過之不問或以譏吉吉曰民闘相殺傷長安令京兆尹職所當禁偹捕逐宰相不親小事非所當於道路間也王陵傳各有主者况已過都而歴塊王襃傳過都越國蹶如歴塊師古曰如經歴一塊言其速疾之甚塊音口内反誠難被髪以纓冠儒者好髙未免為役而耻役𨽻也不力又可與言而不言楚公子㣲服出亡過宋門者難之其僕操箠而罵曰𨽻也不力門者出之但催科未動是閑人韓詩白布長衫紫領巾催科未動是閒人麥苖含穟桑生葚共向田頭樂社神豈期㑹不報為大政賈誼傳大臣特以簿書不報期㑹之間以為大故師古曰言公卿大臣特以簿書期㑹為急不知正風俗厲行誼也所謂行人失者左傳彘子以為謟使趙括從而更之曰行人失辭王羲之傳遣使詣朝廷求分㑹稽為越州行人失辭大為時賢所笑乃使吾身親之方入聞言偃之絃史記仲尼弟子傳言偃吳人字子游為武城宰孔子過聞絃歌之聲忽使受曾參之杖家語曾子耘𤓰誤斬其根曾晳怒建大杖以擊其背曾子仆地而不知人乆之乃蘇主人讀未知主人罪也自恠其頑公羊傳定哀多㣲辭主人習其讀而問其傳則未知己之有罪焉爾何休注讀謂經傳謂訓詁主人謂定哀設使定哀習其經而讀之問其傳觧詁則不知己之有罪此借用天下寳當為天下惜之誰興此念王坦之傳初謝安愛好聲律朞功之慘不廢妓樂坦之遺書曰天下之寶故為天下所惜天下之所非何為不可以天下為心乎劉琨答盧諶書天下之寶固當與天下共之惟髪膚受之父母孝經身體髪膚受之父母不敢毁傷孝之始也而衣冠耻在國家新唐書李傑傳代宋璟為御史大夫尚衣奉御長孫昕素惡傑遇于道内恃𤣥宗婭壻與所親湯仙玉共敺辱之傑訴曰敗髮膚痛在身辱衣冠恥在國帝怒勅杖殺之馬遷腐刑何靣上先人之墓司馬遷傳僕以口語遇遭此禍重為卿黨戮笑汙辱先人亦何面目復上父母之邱墓乎孫臏刖足快心蹶上將之軍史記孫子傳臏亦孫武之後世子孫也嘗與龎涓學兵法涓既事魏得為將軍自以能不及臏以法刑㫁其兩足而黥之臏之齊齊將田忌善而客待之進于威王威王問兵法遂以為師後魏與趙攻韓韓吿急于齊齊使田忌直走大梁魏將龎涓聞之去韓而歸齊軍已過而西矣孫子謂田忌曰兵法百里而趨利者蹶上將使齊軍入魏地日減其竈涓大喜倍日并行逐之孫子度其暮當至馬陵令齊軍善射者夾道而伏涓果夜至萬弩俱發涓乃自剄故滕公釋韓信之囚韓信傳信亡楚歸漢坐法當斬其疇十三人皆已斬信乃仰視適見滕公曰上不欲就天下乎而斬壯士滕公竒其言壯其貎釋勿斬而小白解夷吾之縛國語桓公自莒反于齊使鮑叔為宰辭曰臣君之庸臣也若必治國家者則管夷吾乎使人請諸魯莊公使束縛以予齊使齊使受而退比至三釁三浴之桓公親逆之于郊而與之坐問焉知其不可復續刑法志死者不可復生刑者不可復屬雖俊欲改過自新其道亡繇也所以寜失不經尚書與其殺不辜寕失不經向使當時滛及善人左傳賞濫則懼及滛人刑濫則懼及善人又滛刑以逞安得異日報以國士豫讓傳范中行氏皆衆人遇我我故衆人報之至於智伯國士遇我我故國士報之如某者詩書門户夏矦湛傳承門户之業受過庭之訓杜詩鼎食為門户詳見前燈火生涯韓詩燈火稍可親莊子吾生也有涯注所稟之分各有極也杜詩生涯似衆人小杖則受大杖則走非其職矣家語舜事瞽瞍使之未嘗不在于側索而殺之未嘗可得小杖則待過大杖則逃走司馬彪九州春秋崔烈入錢為司徒問其子鈞曰吾居三公於議者何如鈞曰論者嫌其銅臭耳烈怒舉杖擊之鈞走烈罵曰死卒父撾而走孝乎鈞曰舜之事父小杖則受大杖則走非不孝也隗囂傳昔虞舜事父大杖則走小杖則受臣雖不敏敢忘斯義漢書溺其職矣淮南子非其人之不肖也其所以官之者非其職也千乘之邑百乘之賦竊願學焉惟是受滕一㕓敢辭于役詩君子于役不知其期蕭頴士詩于役勞往還然且去齊三宿難疾其驅韓文無疾其驅天子有詔偶隣境之胥戕尚書無胥戕無胥虐坐家人之失告鶴非有禄徒以鶴警之失期左傳狄人伐衞懿公好鶴鶴有乘軒者將戰國人授甲者皆曰使鶴鶴實有祿位予焉能戰大戴禮千嵗鶴警露而鳴繁露鶴知夜半鶴水鳥也夜半水位感其生氣則喜而鳴也周處風土記鳴鶴戒露此鳥性警至八月白露䧏流于草上滴滴有聲因即高鳴相警移徙所宿處慮有變害也東坡詩由來警露鶴山谷詩自然身如警露鶴鴈或不鳴要亦鴈奴之有罪莊子夫子出於山舍于故人之家故人喜命竪子殺鴈而烹之竪子曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者玉堂閒話鴈宿于江湖之岸沙渚之中動計千百大者居中鴈奴圍而警察南人有採捕者俟天色隂暗或無月時于瓦罐中藏燭持棒者數人屏氣潜行將欲及之則略舉燭便藏之鴈奴警呌大者亦驚頃之復定又復前舉燭鴈奴又驚如是數四大者怒啄鴈奴秉燭者徐徐逼之更舉燭則鴈奴懼啄不復動矣乃高舉其燭持棒者齊入群中亂擊之所獲甚多王荆公鴈奴詩鴻鴈無定棲随陽以南北嗟哉此為奴至性能懇惻人將伺其怠奴輒告之亟舉群寤而飛機巧無所得夜或以火取奴鳴火因匿頻驚莫我捕顧謂奴不直嗷嗷身百憂冺冺衆一息相随入矰繳豈不聼者惑偷安與受紿自古有亡國君㸔鴈奴篇禍福甚明白此一聯運思入㣲不虞投足卒禍及身業已逮扵桁楊説文逮及也刑法志逮繫師古曰及也辭之所及則追捕之故謂之逮一曰逮者在道將送防禦不絶若今傳送囚桁寒剛切木在足曰械大械曰桁莊子接摺桁楊注械夾足及頸皆曰桁楊勢難逃于榎楚禮記夏楚二物収其威也注夏古雅反槄也爾雅槄山榎楚荆也二者所以撲撻犯禮者自度受李曰知之杖朝野僉載唐刑部尚書李日知自為畿赤不曾行杖罸其事克濟及為刑部尚書有令史受勅三日忘不行者尚書索杖剝衣喚令史縂集欲决之責曰我欲笞汝一頓恐天下人稱汝云撩得李日知嗔喫李日知杖汝亦不是人妻子亦不禮汝遂放之自是令史無敢犯者又當變余安道之名宋史余靖字安道韶州曲江人少不事覊檢為諫官時嘗劾奏太常博士茹孝標不孝匿母䘮坐廢靖既失勢孝標詣闕言靖少游廣州犯法受榜靖聞之不自得求侍飬去歴官工部尚書謚曰襄涑水紀聞靖本名希古舉進士未預觧薦曲江主簿王仝善遇之時知韶州者舉制科仝亦舉制科知州怒以為玩已捃其罪無所得惟得仝與希古按坐仝坐違勅停任希古杖臀二十仝遂閑居䖍州不復仕進希古更名靖取他州觧及第景祐中為館職為范文正訟寃獲罪由是知名范公入参大政引為諫官及靖遷龍圖閣直學士王仝數以書干靖求貨靖不能應其求茹孝標聞靖嘗犯刑詐匿應舉乃自詣韶州購其案得之時錢子飛為諫官方攻范黨孝標以其事語之子飛即以聞詔下韶州問王仝靖諷仝令避去仝辭以貧不能出靖置銀百兩於茶籠中託人餉之所託者恠其重開籠竊銀而致茶于仝仝大怒州官勸仝對當日接坐者余希古今不知所在仝不從對稱希古即靖是也靖遂以將軍分司然使撻之市朝得無傷扵冠帯無小人無君子宜玉石之俱焚尚書火炎昆岡玉石俱焚有里胥有大夫乞薫蕕之是辨周禮治官之屬有大夫士府史胥徒家語薫蕕不同器而藏左傳一薫一蕕十年尚猶有臭薫香草蕕臭草伏遇某官堯族俊徳尚書克明俊徳以親九族周家懿親左傳雖有小忿不廢懿親曹植表廣封懿親以藩屏王室粹然麟角之祥詩麟之角振振公族吁嗟麟兮傳麟角所以表其徳也箋云麟角之末有肉示武而不用正義云角示武肉示不用有武而不用是其徳也屈此牛刀之試謂重士所以重國要當體朝廷長育之心詩序菁菁者莪樂育材也君子能長育人材則天下喜樂之矣韓文詩曰菁菁者莪在彼中阿既見君子樂且有儀説者曰菁菁者盛也莪㣲草也阿大陵也言君子之長育人材若大陵之長育㣲草能使之菁菁然盛也知察獄先扵察情又豈容胥吏上下其手左傳穿封戌囚皇頡王子圍與之争正于伯州犁伯州犁曰請問於囚乃立囚因上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也言州犁畏王子故上下其手又抑揚其辭以導囚意欲使曲證王子圍獲已以媚之也况開設學校方將馴化扵鴟梟仇覽傳天子修設太學豈但使人游談其中又父母何在在我庭化我鳲梟哺所生隖梟即鴟梟也詩翩彼飛鴞集于泮林食我桑黮懐我好音則愛惜人材何忍鞭笞扵鸞鳯劉陶傳放鴟梟而囚鸞鳯韓詩上界真人足官府豈如散仙鞭笞鸞鳯終日相追陪致此㸑餘之棄蔡邕傳吳人有焼桐以㸑者邕聞火烈之聲知其良木因請而裁為琴果有異音而其尾猶焦故時人名曰焦尾琴焉薛逢詩臨岐莫恠朱絃絶曾是君家入㸑桐亦從金作之刑尚書朴作教刑金作贖刑某敢不策髀肉之功名九州春秋劉偹住荆州數年嘗于劉表坐起至厠見髀裏肉生慨然流涕表恠問偹偹曰吾常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老將至矣而功業不建是以悲耳髀音彼説文股也增韻股骨也勉皮膚之學問禮記膚革充盈䟽云膚革外薄皮革膚内厚皮皮膚以喻淺也張衡東京賦末學膚受貴耳賤目杜預春秋序膚引公羊榖梁䟽膚謂皮膚言淺近引之也痛懲臨難之茍免禮記臨財毋茍得臨難毋茍免益思學道以愛人儻許國之可期周札傳以身許國死而後已孔稚珪詩本持許國志况復武功彰當措刑扵不試淮南子神農氏之治天下也威厲而不試刑措而不用法省而不煩文帝紀賛幾致刑措應劭曰措置也民不犯法無所刑也武帝紀周之成康刑錯不用師古曰錯置也刑法志三代之盛至於刑錯兵寢者其本末有序帝王之極功也王吉傳周之所以能致刑措而不用者以其禁邪於冥冥絶惡於未萌也司馬相如傳芔然興道而還義刑錯而不用晉江統傳成王為太子周召為保傅史佚昭文章故能刑措不用治聲洋溢陳子昻傳刑之所加人必惨怛故聖人貴措刑也自此不復贖矣家語魯國之法魯人有贖臣妾于諸侯者皆取金于府子貢贖人于諸侯而還其金孔子聞之曰賜失之矣夫聖人之舉事也可以移風易俗而教導可以施於百姓非獨適身之行也今魯國富者寡而貧者衆贖人受金則為不廉則何以相贖乎自今以後魯人不復贖人于諸侯矣此贖字乃金作贖刑之贖此特借用其句耳安用撻以記之尚書侯以明之撻以記之書用識哉欲並生哉鞭寗越而立威名既知免扵東海晉書王承字安期湛之子遷東海太守政尚清静不為細察有犯夜者為吏所拘承問其故答曰從師受書不覺日暮承曰鞭撻寗越以立威名非政化之本使吏送令歸家其從容寛恕若此説苑寗越中牟鄙人也苦耕之勞謂其友曰何為而可以免此苦也友曰莫如學學二十年則可以逹矣寗越曰請十五嵗人將休吾將不休人將卧吾不敢卧十三嵗學而周威公師之夫走者之速也而過二里止歩者之遲也而百里不止今寗越之材而乆不止其為諸侯師豈不宜哉南史王敬𢎞諸子未嘗教以學問人問之答曰丹朱未應乏教寗越不聞被撻出鄒陽而為上客尚有望扵梁園鄒陽傳鄒陽者齊人也梁孝王貴盛待士陽之梁從孝王游陽為人有智畧忼慨不茍合介于羊勝公孫詭之間勝等疾陽惡之孝王孝王怒下陽吏將殺之陽客游以讒見禽恐死而負絫廼從獄中上書曰臣聞忠無不報信不見疑臣常以為然徒虗語耳今欲使天下寥廓之士籠於威重之權脅于位埶之貴回靣汚行以事謟䛕之人而求親近於左右則士有伏死堀穴巖藪之中耳安有盡忠信而趨闕下者哉書奏孝王孝王立出之卒為上客謝惠連雪賦嵗將暮時既昏寒風積愁雲繁梁王不悦遊于兔園西京雜記梁孝王好營宫室苑囿之樂作曜華之宫築兔園園中有百靈山山有膚寸石落猿巖棲龍岫又有鴈池池間有鶴洲鳬渚其諸宫觀相連延亘數十里竒果異樹瑰禽恠獸畢偹王日與官人賔客弋釣其中漢書梁孝王傳孝王築東苑方三百餘里廣睢陽城七十里大治宫室為複道連屬于平臺三十餘里得賜天子旌旗從千乘萬騎出稱警入言䟆儗於天子招延四方豪傑自山東游士莫不至齊人羊勝公孫詭鄒陽之屬西京雜記梁王遊于忘憂之館集諸游士各使為賦枚乘為栁賦路喬如為鶴賦公孫詭為文鹿賦鄒陽為酒賦公孫乗為月賦羊勝為屏風賦韓安國作几賦不成鄒陽代作謝曹直學賀雨伏以和巴歌之二闋遏雲足繼扵謳青文選客有歌于郢中者其始曰下里巴人國中屬而和者數千人闋音闕張良傳歌闋師古曰盡也曲終為闋列子薛談學謳于秦青未窮青之伎自謂盡之遂辭歸秦青弗止餞于郊衢拊節悲歌聲振林木響遏行雲薛談乃謝求反終身不敢言歸贈唐律之七言喜雨宛同扵醉白珊瑚鈎詩話蘇李而上高簡古澹謂之古沈宋而下法律精切謂之律韓魏公喜雨詩何假嗔雷擊怒桴黙然嘉澤泱民區經時亢隔群心駭數月焦熬一陣蘇已發宋苖安在揠再生莊鮒不虞枯須臾慰滿三農朢歛却神工寂似無東坡醉白堂記故魏國忠獻韓公作堂于私第之池上名之曰醉白取樂天池上之詩以為醉白堂之歌若有羡於樂天而不及者云云莫辦雙金之報張載擬四愁詩佳人遺我綠綺琴何以報之䨇南金徒深什襲之藏闞子宋之愚人得燕石于梧臺之東歸而藏之以為大寶周客聞而觀之主人齋七日端冕之衣釁之以特牲革匱十重緹巾十襲客見之俛而掩口盧胡而笑曰此燕石也與瓦甓不殊應劭傳宋愚夫寳燕石緹䌌十重夫睹之者掩口盧胡而笑注䌌音襲謝曹直學喜雨詩伏以瘨我以旱良窘望雲瘨音顛詩旱既太甚黽勉畏去胡寜瘨我以旱􅉃不知其故箋瘨病也天何曾病我以旱曾不知為政所失而致此害有志乎民辱書喜雨春秋魯僖公三年春正月不雨夏四月不雨傳言不雨者閔雨也閔雨者有志乎民者也徒切誦清風之穆詩吉甫作誦穆如清風注穆和也清㣲之風化飬萬物者也未遑和白雪之髙文選其為陽春白雪國中屬而和者數十人是其曲彌高其和彌寡回平江府沈侍郎送酒平江府春秋吳國所都秦置㑹稽郡後漢分浙江以西置吳郡三國時吳郡與吳興丹陽為三吳陳置吳州隋平陳改曰蘇州宋太平興國改曰平江軍政和三年陞為府互見後以下二條徽本闕今補杓斡龍躔日又賔扵暘谷杓音標説文枓柄徐曰北斗之柄第一星取此為名杓猶標也史記天官書玉衡屬杓魁為璇璣又杓攜龍角魁鎮参首隋天文志魁杓象號令之主又為帝車取運動之義也斡烏括切廣韻轉也增韻旋也運也躔音廛方言度也日運為躔月運為晙徐曰星之躔次星所履行也後漢書斗綱所建青龍所躔尚書宅嵎夷曰暘谷寅賔出日香凝燕寢地孰勝扵蘇州韋蘇州詩燕寢凝清香兵衞森畫㦸矧惟荷槖之賢見前宜介椒盤之祉詩介以繁祉杜詩椒盤已頌花東坡詩堆盤紅縷細茵陳巧與椒花兩閫新恭惟某官徳參隂隲尚書惟天隂隲下民相恊厥居道配陽休禮記盛色顛實陽休注揚讀為陽聲之誤也若陽氣之休物也奉行寛大之書繭絲免矣侯覇傳每春下寛大之書奉四時之令餘見前宣布中和之樂襦袴煖然王襃傳使襃作中和樂職宣布詩莊子暖然如春餘見前諒報政扵吳門史記魯世家伯禽封于魯三年而報政盧照隣詩星樓朢蜀道月峡指吳門即歸班扵魏闕莊子身在江海之上心居魏闕之下某一寒寡與獨冷何辭並見前猶幸太嵗之在申例容乞酒袁子正書嵗在申酉乞漿得酒遥祝夀星之出丙莫遂稱觴前郊祀志武帝祠太一賛享夀星仍出淵曜光明後禮儀志仲秋之月祀老人星于國都南郊隋天文志老人一星在弧南一曰南極常以秋分之旦見於丙春分之旦沒於丁月令秋分日饗夀星於南郊爾雅夀星角亢也注列宿之長故曰夀星回岳總領珂送酒賀正宋史理宗寶慶三年五月詔岳珂户部侍郎依前淮東縂領兼制置使岳忠武王生五子雲雷霖震霆珂霖之子知嘉興府所著有愧剡録桯史世稱為亦齋先生伏以天躔回甲聿新歴數之朌尚書協用五紀五曰厯數尸子造厯數者羲和子也嵗紀在申將應酒泉之䜟應劭漢官儀酒泉城下有金泉泉味如酒故曰酒泉時庸膚使楊子雖古之膚使其猶劣諸注膚羙也日進啿祺啿徒感切漢禮樂志羣生啿啿惟春之祺服䖍曰啿音湛湛露斯如淳曰祺福也師古曰啿啿豐厚之貎恭惟某官徳配陽休功多隂隲見上條漕下氷觧師有宿飽之期趙充國傳分屯要害處氷觧漕下掌下月昇日佇辰猷之告杜詩卿月昇金掌王春度玉墀詩訏謨定命逺猷辰告注猶圖也大謀定命謂正月始和布政于邦國都鄙也為天下逺圖庶事而以嵗時告施之聊暫紆於羔袖左傳齊人以郲寄衞侯及其復也以郲糧歸右宰榖從而逃歸衞人將殺之辭曰余不説初矣余狐裘而羔䄂乃赦之注狐裘羔袖喻已暫從君即歸國善多而惡少也即徑上於鷄翹後漢輿服志鸞旗者編羽旄列繫幢旁民或謂之鷄翹非也李商隠詩屬車無復挿鷄翹某家本一寒官宜獨冷見前窮年兀兀只自慙廪粟之靡進學觧恒兀兀以窮年又月費俸錢嵗靡廪粟清夜沉沉頼肯續燈花之酌杜詩清夜沉沉動春酌燈前細雨簷花落回新都廖宰子材送酒及石榴徽州春秋屬吳戰國属越秦屬鄣郡漢屬丹陽郡吳分置新都郡晉改新安郡宋宣和三年改新安郡曰徽州伏蒙郇翰新唐書韋陟傳自謂所書陟字若五朶雲時人慕之號郇公五雲體寵賁陶籬陶靖節詩種菊東籬下悠然見南山餉以乘壺定有可人之味禮記以乘壺酒束脩一犬賜人注乘壺四壺也唐鄭綮開元傳信録葉法善坐客思酒忽有人扣門曰麴秀才居坐末論難鋒起葉疑其魑魅以小劒擊之化為瓶榼乃盈瓶醇醖坐客醉而揖其瓶曰麴生風味不可忘也陳後山詩風味如麴君山谷詩一邱風味極可人又奈此尊前風味何詳見前侑之碩果中存多子之祥侑尤救切説文耦也禮以樂侑食鄭云勸食也詩以妥以侑毛傳勸也易碩果不食比齊書魏收傳安徳王延宗納趙郡李祖収女為妃後帝幸李宅宴而妃母宋氏薦二石榴於席前問諸人莫知其意帝投之收曰石榴房中多子王新婚毋欲子孫衆多帝大喜詔收卿返將來賜收羙錦二疋稗史果中子繁者唯夏𤓰冬石榴故嗜果者呼為多子甕李商隐詩榴枝婀娜榴實繁山谷詩紅榴罅多子續歡伯之風流焦氏易林坎之兊曰酒為歡伯除憂來樂適體頥性陸龜䝉詩持來歡伯内坐使賢人清山谷詩身入醉郷無畔岸心與歡伯為友朋又尊中歡伯笑爾軰我本和氣如三春又歡伯可觧藜藿朝洗醋兒之酸楚博異記天寶中崔元徽春時月夜于苑中見青衣女伴曰楊氏李氏陶氏又緋衣小女曰石醋醋即石榴也本草石榴有酸淡兩種道家謂之三尸酒鄴中記石虎苑中有安石榴子大如椀盞其味不酸晉安帝起居注武陵臨沅獻安石榴子大如椀其味不酸一蒂六實已從竹葉獲觀令尹之清張衡七辨𤣥酒白醴蒲萄竹葉張華輕薄篇蒼梧竹葉宜成九醖陳張正見詩竹葉三清泛蒲萄百味開唐李嶠詩臨風竹葉滿湛月桂香浮徐邈傳酒客謂酒清者為聖人鄒陽酒賦清者為酒濁者為醴尚想榴皮可頌中書之考東坡集回先生過湖州東林沈氏飲醉以石榴皮書其家東老庵之壁云西隣已富憂不足東老雖貧樂有餘白酒釀來因好客黄金散盡為收書東坡和之云凄凉雨露三年後髣髴塵埃數字餘至用榴皮緣底事中書君豈不中書侯鯖錄熈寕中有道人過沈東老飲酒用石榴皮冩絶句于壁自稱回山人東老送出門至石橋上先渡頭數十歩不知所在或曰此吕先生也七年坡過晉陵見東老之子能道其事東老已歿三年矣坡為和其詩代回安撫趙尚書送物共六尺之輿同寅是幸袁盎傳天子所與共六尺輿者皆天下豪英尚書同寅協恭和衷哉分丈二之組先甲巳頒嚴助傳陛下以方寸之印丈二之組鎮撫方外易先甲三日後甲三日詳見前悵遂告違顧勤亟餽恵而好我慙取數之孔多詩惠而好我攜手同行箋性仁愛而又好我者禮記取數多者仁也卻之不恭敢下拜而登受左傳王使宰孔賜齊侯胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜下拜登受言拜於階下而登堂以受賜區區𠂻謝左傳是區區者而不予畀又宋國區區而有詛有祝注區區小也杜詩浮名尋己巳嬾計託區區互見前續續靣陳陳后山詩續續題詩不耐閑又聲問應須續續來同前一麾出守漸可解維見前同官為僚蒙加折爼左傳同官為寮吾嘗同寮敢不盡心乎又王享有體薦宴有折爼公當享卿當宴王室之禮也言天子設享禮則半觧其體而荐之為不食故不觧折謂之房蒸所以示儉也天子設宴禮則體觧節折升之于爼物皆可食謂之殽蒸所以示慈恵也維多維㫖詩君子有酒㫖且多又君子有酒多且㫖又物其多矣維其嘉矣物其㫖矣維其偕矣注有酒㫖絶句且多二字為一句言非特有此鱨鯋之大魚又君子有酒矣其魚酒如何酒既㫖美魚復衆多多且旨言酒多而此魚又美也且感且慙敢貢記室之辭續漢百官志三公大將軍皆有記室上表章報書記何曽傳人以小帋為書勅記室勿報事物紀原云魏太祖以陳琳阮瑀為記室掾其官始見于此宋用晉制自明帝後皇子弟雖非都督亦置記室参軍則記室而為参軍晉官也宋亦置于諸王府曰某王府記室少致兵厨之謝阮籍傳聞歩兵厨營人善釀貯酒三百斛乃求為歩兵校尉代回趙京尹餞送已辭軒陛漸理艅艎説文艎艅艎也唐劉晏為歇艎艅艎吳大舟名通作皇左傳楚敗吳師獲其乘舟余皇更勤加餽之稠重重音蟲複也増韻疊也又累也冞仞大寮之篤叙冞音彌深也從冖從米冞與穼不同穼音森從穴從木詩冞入其阻注冞者有深入之意故為深也仞而振切通作認列子仞而有之東坡集仰仞至恩益堅素守尚書有服在大僚又恵篤叙又篤叙乃正父既醉既飽腹不勝其屬饜饜么鹽切通作猒有平去二音左傳屬厭而已杜氏曰言小人之腹飽猶知厭足載忻載奔靣無由而控謝歸去來辭乃瞻衡宇載忻載奔僮僕歡迎稚子候門代回臨安府七夕送物抱拙終身倦乞犬牙之巧栁子厚乞巧文剖𤓰犬牙且拜且祈又抱拙終身以死誰惕未能免俗願安犢鼻之貧竹林七賢傳阮咸字仲容籍兄子也舊俗七月七日法當曬衣諸阮庭中爛然莫非綈錦咸乃竪長竿標大布犢鼻裩曝於庭中曰未能免俗聊復爾耳臺餽鼎來匡衡傳無説詩匡鼎來服䖍曰鼎猶言當也若言匡且來也應劭曰鼎方也尹釐意厚尚書命畢公保釐東郊酒醪醇壹况加鷄跖之甘醪音勞説文汁滓酒也爰盎傳買二石醇醪師古曰汁滓合之酒也醇廣韻醲也通作淳史記日飲淳酒壹説文專壹也從壺吉聲廣韻醇也史丹傳秉義醇壹跖音隻與蹠同脚掌也淮南子善學者若齊王之食鷄必食其跖數千而後足張協七命封熊之蹯翰音之跖翰音鷄也應璩詩狂言雖寡善猶如有鷄跖􅊡餌馨香仍儐螺甲之㫖乞巧文􅊡餌馨香蔬果交羅􅊡諸延切徐曰此今饘字説文糜也周謂之饘宋謂之餬禮記注䟽厚曰饘希曰粥荀子酒醴􅊡鬻餌説文粉餅也儐通作擯説文道也螺甲香名廣志甲香出南方南州異物志甲香螺屬也大者如甌靣一邉直攙長數寸圍殻岨峿有刺其掩可合衆香焼之能使益芳獨焼則臰甲香一名流螺謂之中流最厚味范曄香序棗膏昏䝉甲煎淺俗唐本草螺甲蟲類生雲南者大如掌青黄色取靨焼灰用之今合香多用謂能發香復聚香煙按韻書蠡亦作螺韓鄂四時纂要載修甲香方取大甲如崑崙耳者酒煮蜜熬入諸香等用東坡詩香螺脱黶來相羣注香螺脱黶甲香也能聚衆香山谷詩石蜜化螺甲榠樝煑水沉博山孤煙起對此作森森又螺甲割崑崙耳香材屑鷓鴣斑欲雨鳴鳩日永下帷睡鴨春閒山谷自䟦云螺甲磨去齟齬以胡麻膏熬之色正黄則以蜜湯劇洗此製法也備此四美滕王閣序四美具二難屏跂彼七襄詩跂彼織女終日七襄雖則七襄不成報章跂翹移切又去智切注跂隅貌織女三星跂然如隅三星鼎足而成三角朢之跂然故云隅貌襄駕也駕謂更其肆也天有十二次日月所止舍舍即肆也在天為次在地為辰每辰為肆是歴其肆舍有七也莫宣衘職之私陶詩衘戢知何謝㝠報以相貽戢音節説文藏兵也詩載戢干戈爾雅聚也䟽藏聚也但劇嚅嚌之感嚌音劑嘗也飲至齒也唐藝文傳嚅嚌道真回蹇學諭賀得粟九穂穗音遂説文禾成秀一莖九穂昔嘗疑司馬之䛕史記司馬相如封禪書導一莖六穗於庖後漢紀光武生於建平元年十二月是嵗濟陽縣界有嘉禾生一莖九穗因名曰秀古今注和帝元年嘉禾生濟隂城陽一莖九穗異壟同榮今顧辱昌黎之頌昌黎河中府連理木頌殊本連理之柯同榮異隴之禾又奏汴州得嘉禾狀或兩根並植一穗兩房雖君子之政不以物恠栁河東零陵郡復乳穴記君子之祥也以政不以恠誠乎物而信乎道人樂用命熈熈然以效其有斯其為政也而獨非祥也歟然太師扵詩可見民風禮記命大師陳詩以觀民風注陳詩謂采其詩而視之要非于祥而于仁栁文貞符受命不于天于其人休符不于祥于其仁恨弗以規而以頌昌黎送許郢州序愈於使君非燕游一朝之好也故其贈行不以頌而以規民曰太守太守不有何敢當儒館之歌東坡喜雨亭記民曰太守太守不有歸之天子天子曰不然歸之造物秀升司馬司馬辨材請以旅天子之命禮記大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告于王而定其論書序唐叔得禾異畆同穎獻諸天子王命唐叔歸周公於東作歸禾周公既得命禾旅天子之命作嘉禾孔傳已得唐叔之禾遂陳成王歸禾之命而推羙成王善則稱君回李僉判賀瑞粟某導九穂扵漢庖此真偶爾導擇也擇嘉禾之米于庖厨以供祭祀也歌五言之唐律何徳當之謝瀹傳齊武帝問王儉當今誰能為五言對曰朏得父膏腴江淹有意王襃傳此盛徳之事吾何足以當之不敢續貂趙王倫傳貂不足狗尾續恐譏集鶡漢書循吏傳京兆尹張敞舍鶡雀飛集丞相府丞相覇以為神雀議欲以聞敞劾奏之天子嘉納覇甚慙學齋佔畢云黄覇傳鶡雀集丞相府蘇林云今虎賁所著鶡也師古曰蘇説非也此鶡音芬字本作鳻此通用耳鳻雀大而色青出羗中非虎賁所著也虎賁鶡者色黒出上黨以其闘死不止故以其尾餙武臣首云鳻似鳯今人例以曷音讀之誤矣今按以梅亭之博雅而誤讀鶡字甚矣識字之難也唐叔之得同穎安敢望周公之歸注見上條劔南之進嘉禾亦難上栁子之表栁子厚賀嘉禾及芝草表伏見劒南所進嘉禾圖及陜州所進紫芝草者獻于王庭唐叔慙同穎之異薦諸郊廟班史謝連葉之竒姑藏佳句杜詩清談慰老夫開巻得佳句又佳句染華牋又羙名人不及佳句法如何又為人性癖耽佳句語不驚人死不休山谷詩不似㶚橋風雪中半臂騎驢得佳句以俟豐年詩豐年多黍多稌回王監酒提督修城伏以三里之城不修則壊左傳宗子維城毋俾城壊韓文滕王閣記此屋不修且壊公為邦伯烏得無情哉一日必葺欲罷不能左傳叔孫所舍雖一日必葺其牆屋去之日如始至擬煩督戊巳之屯見前相與營甲戌之築尚書甲戌我惟築龍見而畢不妨節用以使民左傳凡土功龍見畢務戒事也注龍星角亢晨見東方隼射扵墉亦可待時而藏器繫辭易曰公用射隼于高墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也代回運使賀雪詳啟意乃冬至賀雪黄雲紀瑞肇新魯觀之書春秋孔演圖黄帝之將興黄雲升于堂文命之候春秋合誠圖堯母慶都常有黄雲覆葢之京房易飛候黄雲如覆車大豐也左傳僖公五年辛亥朔日南至公既視朔遂登觀臺以朢而書禮也凡分至啟閉必書雲物為偹故也易占卦騐冬至之日其雲赤者旱黒者水白者為兵黄者有土功白雪效祥遄應梁園之賦謝惠連雪賦嵗將暮時既昏寒風積愁雲繁梁王不悦遊於兎園俄而㣲霰零宻雪下相如於是避席而起逡巡而揖曰臣聞雪宫建于東國雪山峙於西域云云能令公喜見前不在我先詩心之憂矣寜自今矣不自我先不自我後恭惟某官徳配陽和氣排冬凛杜詩喜氣排寒冬有功使臣歌四牡兼此二難詩序四牡勞使臣之來也有功而見知則説矣省事天公厭兩回併成一賀東坡元日立春詩省事天公厭兩回新年春日并相催方圗靣慶又辱手牋不成報章尚㡬幸察回陳術士某適勤狂顧寵畀儷箋不但知五行之精昌黎李虛中墓誌君最深於五行書以人之始生年月日所值日辰支干相生勝衰死王相斟酌抑人夀夭貴賤利不利輒先處其年時百不失一二抑又窺多文之富禮記不祈多積多文以為富其為感佩罔既報酬四六標準巻十一, SBCK: ''}
