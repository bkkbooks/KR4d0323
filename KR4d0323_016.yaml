body:
  text: 四六標凖卷十六宋李劉撰參政文獻通考參知政事堂副丞相毗大政參庶務其除授不宣制不押班不知印不預奏事不升政事堂殿庭别設磚位于宰相後敕尾署銜降宰相數字至道元年詔宰相與參政輪班知印同升政事堂二年詔復如舊制賀喬樞密行簡除參政兼知院成都運司作喬行簡傳拜參知政事兼樞密院事晉用真儒升參大政宋薛居正拜相制預大政於萬機下丞相之一等運籌決勝久注意於安危見前當軸處中仍兼資於文武車千秋傳贊車丞相履伊吕之列當軸處中朱雲傳平陵朱雲兼資文武忠正有智略可試守御史大夫陳蕃傳聰明亮達文武兼姿臣不如李膺劉攽曰姿是姿貌此當作資也朱穆傳朱公兼資文武海內竒士蜀志關羽傳孟起兼資文武雄烈過人魏志蔣濟傳兼資文武服勤盡節晉書劉𢎞傳詔曰將軍文武兼資前委大夏王衍傳中國已亂當賴方伯冝得文武兼資以任之張重華傳謝艾文武兼資國之方邵南史劉洽傳謝朓文章盛于一時見洽深相賞好每稱其兼資文武北齊書魏釗傳有當世才兼資文武南史禇玠傳贊公平諒直文武兼資栁世隆傳高帝與武帝書曰汝既入朝當須文武兼資人世隆其人也用人如此魏志毛玠傳玠為東曹掾太祖歎曰用人如此使天下人自治吾復何為哉通國歡然恭惟某官廣淵而篤誠尚書克齊聖廣淵左傳高陽氏有才子八人齊聖廣淵明允篤誠天下之民謂之八愷晉起居注太保衛瓘明允篤誠有匪躬之志高明而博厚好學本孔顔之學喬行簡傳學於吕祖謙之門用心乃禹稷之心非仁義不陳於前雨露夙深於獻納杜詩獻納司存雨露邊有謀猷則順於內風霆不顯其流形見前翊贊斗樞春秋運斗樞斗第一天樞五帝所行同道異位皆循斗樞機衡之分遵七政之紀九星之法燮和天縡尚書率循大卞燮和天下揚雄傳上天之縡杳旭卉兮師古曰縡事也杳高逺也旭卉速疾也縡讀與載同折衝尊俎鯨鯢服京觀之刑鯨其京反亦作䲔翟方進傳古者伐不敬取其鯨鯢築武封軍以為大戮于是乎有京觀互見前申畫郊圻鱗介慕衣裳之㑹尚書申畫郊圻慎固封守法言朱崖之絶捐之之力也否則鱗介易我衣裳注朱崖蠻夷故云鱗介穀梁傳衣裳之㑹十有一未嘗有插血之盟也信厚也兵車之㑹四未嘗有大戰也愛民也詳見前然南北兩朝不能一統董仲舒傳春秋大一統韻㑹毛氏曰統字諸家皆去聲惟玉篇音桶公羊傳大一統無音合從通用由東西二府分作兩塗宋㑹要樞密院與中書對持文武二柄號為二府歸田録唐制樞密使以內臣為之後唐莊宗用郭崇韜與宰相分柄朝政文事出中書武事出樞密自此其權漸盛至本朝號為兩府矣今內治外治交急之時見前乃政柄兵柄合謀之日賈誼新書賞罰者政之柄也袁盎傳絳侯為太尉本兵柄宜崇夙夜宥密之任詩成王不敢康夙夜基命宥密注基始命信宥寬密寧也文武不敢暫自安逸常早起夜卧行寬仁安靜之政基為始者言修德常如始命為信者既有所信必將順之故言早夜如順天命此斷章并策旦夕承弼之功尚書罔非正人以旦夕承弼厥辟蘇民力之中乾左傳外彊中乾回敵情之內奰奰音避說文壯大也本作從三犬三目二目為三目為益大也一曰追也詩內奰于中國覃及鬼方傳奰怒也不醉而怒曰奰鬼方達方也正義曰西京賦云巨靈奰鼐以流河曲則奰者怒而自作氣之貌建久安之勢而成長治之業賈誼傳使顧成之廟稱為太宗上配太祖與漢亡極建久安之勢成長治之業以承祖廟以奉六親至孝也杜羣枉之塗而開衆正之門劉向傳放逺佞邪之黨壞散險詖之聚杜閉羣枉之門廣開衆正之路嵗大旱而作霖啓沃良資於傅說尚書若嵗大旱用汝作霖雨啓乃心沃朕心天未陰而徹土綢繆永賴於周公邦其允孚於休公有無窮之聞並見前某雲邊挽粟嚴安傳飛芻挽粟雪裏聞麻蜀有雪山故云雪裏董巴記云東京有蔡侯紙即倫也故麻名麻紙本皮名穀紙故網名網紙也初學記倫搗故魚網作紙名網紙後人以生布作紙絲綖如故麻名麻紙翰林志唐中書用黃白二麻為綸命其後翰林專掌白麻中書獨得用黃麻㑹要凡赦書德音立后建儲大誅討拜免三公宰相命將竝用白麻玉堂雜記凡鎖院文臣職事明日赴文德殿聽麻回思太學之十年嘗侍司成之丈席李為國録時葛洪為祭酒喬行簡為司業禮記凡侍坐于大司成者逺近間三席可以問終則負墻列事未盡不問注大司成司徒之屬師氏也逺近間三席可以問者去大司成逺近中間可容三席之地席制廣三尺三寸三尺寸之一三席則函一丈可以指畫而問也今三賢方施政於天下必無不獲之夫三賢謂鄭清之葛洪喬行簡梅亭與三人同官國學時清之簽知樞密院事洪行簡皆參知政事縱四牡非有功之使臣願鑒懷歸之悃詩序四牡勞使臣之來也有功而見知則說矣詩四牡騑騑周道逶遲豈不懷歸王事靡盬我心傷悲代賀鄭簽書昭先除參政兼太子賔客宋史寧宗嘉泰八年秋七月以鄭昭先參知政事顯用正人進參大政試之宥密已折衝樽俎之間詩夙夜基命宥密注基始命信宥寬密寧也文王不敢暫自安逸常早起夜卧行寬仁安靜之政以定天下寬仁所以止苛刻也安靜所以息暴亂也按宥密本義止此宋人以樞密院無他雅稱遂文之曰宥府如王禹稱云宥密之府總樞密于萬幾是也又謂之宥省如王岐公批答云旋冠謨于宥省是也又轉而為密勿如楊文公表密勿之司是也倚以弼諧必銷患廟堂之上尚書謨明弼諧徐樂傳賢主獨觀萬化之原明於安危之機修之廟堂之上而銷未形之患也一賢得路蔡襄詩自古忠賢得路難四海傾心恭惟某官清任以和直方而大陽休山立粹然廊廟之珍禮記山立時行盛氣顛實陽休玉色注山立不搖動也時行時而後行也詩云威儀孔時顛讀為闐揚讀陽聲之誤也盛身中之氣使之闐滿其息若陽氣之休物也玉色色不變也正義曰此明戎容之體地負海涵凜然有社稷之器韓文其富若生蓄萬物必具海涵地負放恣橫從無所統紀然而不煩於繩削而自合也晉袁宏詩汲黯杜稷器棟梁天表骨來從百里甫閲七年遍儀清切之司杜詩獻納司存雨露邊地分清切任才賢徐嶷詩還從清切禁再沐聖明恩彌積均𢎞之望韓文海嶺之陬既足既濡胡不均𢎞俾執事樞果由樞管管主當也荀子人君管分之樞要遂贊機衡作天子之股肱兼儲皇之羽翼張良傳彼四人為之輔羽翼已成難動矣惟公懋德尚書惟公懋德克勤小物相我受民尚書相我受民和我庶獄庶慎式觀鼎鼐之調杜詩調和鼎鼐新益永旗常之載某屬拘郡組莫旅賔綦綦音其禮記綦組纓釋文云雜色也又履飾周禮辨師注綦結也千萬間之歡顏既深賀厦見前三十輻之共轂尤慶得輿老子三十輻共一轂當其無有車之用易君子得輿賀俞樞密應符兼參政鼎升兵本晉豫政機鼎升晉豫四卦名立武有常將見五原之欵塞詩序常武召穆公美宣王也有常德以立武事因以為戒然漢書宣帝甘露二年胸奴呼韓邪單于欵五原塞願奉國琛朝三年正月師古欵叩也欲於甘露三年正月行朝禮用儒無敵更觀三后之協心法言魯不用真儒故也如用真儒無敵于天下安得削尚書三后協心同底于道膺一時稠疊之榮疊說文本作曡揚雄說古理官決罪三日得其宜乃㑹意字王莽疑圖讖漢有再受之象惡三日太盛改為三田則失六書之義矣廣韻重也杜詩烈士痛稠疊王荆公詩勝餞此稠疊契千載明良之㑹見前恭惟某官才宜王佐管子霸言篇才振四海王之佐也董仲舒傳贊劉向稱仲舒有王佐之才雖伊吕亡以加管晏之屬伯者之佐殆不及也後漢書李固傳郎顗薦之曰元精所生王之佐臣延篤傳李文德謂公卿曰延叔堅有王佐之才王允傳郭林宗見而竒之曰王生一日千里王佐才也魏志荀彧傳南陽何顒異之曰王佐才也晉書張華傳阮藉見之歎曰王佐才也世說司馬景王命虞松作表不可意鍾㑹為定五字王召見㑹至鼓二乃出王拊手歎息曰此真王佐才也南史臧盾傳幼從諸葛璩受五經璩學常有數十百人盾處其間無所狎比璩曰此生王佐才也北史宋辨傳至京帥見尚書李冲言論移日冲異之曰此生一日千里王佐才也新唐書李靖傳仕隋為殿內直長吏部尚書牛𢎞見之曰王佐才也杜如晦傳秦王引為府兵曹參軍時府屬多外遷王患之房𤣥齡曰去者雖多不足吝如晦王佐才也蕭遇傳負大節以王佐自任齊浣傳年十四見李嶠嶠稱其有王佐才杜黃裳傳達權變有王佐才略崔造傳與韓㑹盧東美張正則三人友皆自謂王佐才號四夔互見前智可帝師杜詩如逢渭水獵猶可帝王師自其不辭小官之時自警編范正平字子夷嘗言其家家學不卑小官居一官便盡心治一官之事只此便是學聖人也若以為州縣之職徒勞人耳非所以學聖人也已負將降大任之器夙夜宥密甫參帷幄之籌見前乾坤清夷益結冕旒之眷韓文乾坤清夷境落搴舉李詩願言保名德王室佇清夷既兼資於文武見此卷首條宜竝注於安危見前爰命宗工式兼亞相上帝將復高祖德坐令趙璧之還尚書肆上帝將復我高祖之德亂越我家宋史寧宗嘉定十三年得恭膺天命之實詳見前皇天既付中國民豈但齊疆之復尚書皇天既付中國民越厥疆土于先王續資治通鑑寧宗嘉定元年六月庚子金人歸大散關辛未歸濠州以韓托胄首易之也時太學生為詩有云朝錯既誅終叛漢於期已入竟亡燕惟股肱之寄在忠力新唐書馬周傳帝嘗以飛帛書賜周曰鸞鳳冲霄必假羽翼股肱之寄要在忠力則道德之威成安彊荀子威有三有道德之威有暴察之威有狂妄之威此三威者不可不察也道德之威成乎安彊暴察之威成乎危弱狂妄之威成乎滅亡周平園啓帝王之制坦然明白寖揚聞於西垣道德之威成乎安彊亦宜勞於右府邦其永孚于休公有無窮之聞某夙蒙揃拂揃子淺切說文搣也史記蒙恬傳周公自揃其爪沈於河通作剪廣絶交論顧眄增其重價揃拂使皆長鳴李詩伯樂揃拂中道遺又希君一剪拂令可逞中衢杜詩剪拂念途窮又老醜難揃拂皆以馬喻竟自沉冥法言蜀莊沉冥注晦迹不仕故曰沉冥直柄當權恐不吝曲成之陶冶見前近畿入幕固未為逺去於門墻賀陳簽書貴誼除參政兼同知成都運使作宋史陳貴誼字正甫福州福清人慶元五年進士中博學宏詞科轉對激怒史彌逺出知江陰軍理宗朝纍官端明殿學士簽書樞密院事紹定六年進參知政事卒贈少保升參六政復翊洪樞宋元祐趙瞻拜同知院事敕宜煩故老就翊洪樞仲子之辭三公夫固輕千鍾之祿鄒陽傳於陵子仲辭三公為人灌園師古曰子仲陳仲子也兄戴為齊相仲子以為不義乃將妻子適楚居于於陵自謂於陵子仲楚王聞其賢使使者持金百鎰聘之欲以為相仲子不許遂夫妻相與逃而為人灌園終身不屈其節曲逆之出六計終當遂萬物之宜陳平傳高帝南過曲逆曰壯哉縣更封平為曲逆侯平自初從至天下定後凡六出竒計輒益邑封竒計或頗祕世莫得聞也王陵傳平對文帝曰宰相者上佐天子理陰陽順四時下遂萬物之宜一賢得輿易君子得輿民所載也多士舉笏自警編仁宗問王懿敏曰大寮中孰可命以相事者懿敏曰惟宦官宫妾不知姓名者可充其選帝憮然有閒曰唯富弼耳懿敏下拜曰陛下得人矣既告大庭相富公士大夫皆舉笏相賀或密以聞帝益喜曰吾之舉賢于夢卜矣劉後村詩話富公由并州入相外庭至於舉笏相賀王逢原獨云要須待見成堯舜未敢輕浮作頌聲所見高於石徂徠一等矣恭惟某官直方而大智勇且仁早收麟角之科夙負鼇頭之望並見前讀孔璋之檄嚴嚴經國之文魏志陳琳字孔璋軍國書檄多琳所作三國典略琳作諸書及檄草成呈太祖太祖先苦頭風是日疾發卧讀琳所作翕然而起曰此愈我病數加厚賜卧元龍之樓耿耿濟時之略魏志陳登字元龍許汜與劉備共論人汜曰陳元龍湖海之士豪氣不除昔遭亂過下邳見元龍無主客之意自上大牀卧使客卧下牀備曰今天下大亂望君憂國忘家而君求田問舍是元龍所諱也如小人欲卧百尺樓上卧君于地何但上下牀之間耶四國荗蕃宣之績六條高澄按之功貴誼忤史彌逺出知江陰軍提舉江西常平彌逺諷言者論罷起知徽州登山有得於徐行許彥周詩話遊嵩山峻極院壁間題云登山有道徐行則不困措足於實地則不危乃司馬溫公𨽻書張茂中遊城南記自炭谷口穿雲渡水躡亂石冒縣崖數峯聳削蹬道之半有司馬溫公𨽻書二十八字曰登山有道徐行則不困擇平穩之地而置足則不跌乘舟惟恐其偏重宋史陳瓘傳章惇入相瓘從衆道謁惇聞其名獨邀與同載詢當世之務瓘曰請以所乘舟為喻偏重可行乎移左置右其偏一也明此則可行矣按此一聯用當代人語恐覽者未察特表出之禁中頗牧鼓舞號令之風雷新唐書畢誠傳誠為翰林學士黨項擾河西宣宗嘗召訪邊事誠援質古今條破羌狀甚悉帝悅曰朕將擇能帥者孰謂頗牧在吾禁署卿為朕行乎法言鼓舞萬物者其風雷乎鼓舞萬民者其號令乎氊上唐虞緝熙光明之日月王吉傳廣厦之下細㫋之上上論唐虞之際下及殷周之盛詩日就月將學有緝熙于光明詳見前迄由翰院貴誼知徽州召授司封郎中兼翰林權直兼玉牒所檢討進陟機庭尊俎折衝京觀正鯨鯢之戮見前郊圻申畫介胄無蟣蝨之生韓非子天下無道攻擊不已甲胄生蟣蝨燕雀處幄帷而兵不歸故曰戎馬生于郊揚雄長楊賦鞮鍪生蟣蝨甲胄被霑汙嚴安傳馳車轂擊介胄生蟣蝨立武事以有常顯真儒之無敵竝見前今南北分庭和戰未一沙鉢羅可汗建庭于雎合水謂之南庭吐陸建牙於鏃合山謂之北庭詳見前則東西二府謀慮宜同中書與樞密院對持文武二柄號東西二府樞省亦云西樞爰藉前疑後丞之功尚書太傳古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑有志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其祿視大國之君入攄經文緯武之智唐牛僧孺賢良䇿制緯武經文以大其業梁肅受命寶賦以文經天以武緯地邇人安逺人至憂民正急於憂邊尚書不寶遠物則逺人格所寶惟賢則邇人安大臣法小臣亷正已不難於正物禮記大臣法小臣亷官職相序君臣相正國之肥也相尊等耳田蚡傳太尉相尊等耳有讓賢名今按相字當句絶此斷章取義時來為之見前無謂於我如浮雲當念逮天之未雨不遐有佐詩於萬斯年不遐有佐注武王受此萬年之責不逺有佐輔之臣共蒙其福無競維人詩無競維人注言人君為國無疆乎維在得其賢人得賢人則國家彊矣某學既拙疏法當憔悴山谷詩法當憔悴百僚底十暑自安於絺葛杜詩十暑岷山葛一寒誰與之綈袍范睢傳須賈曰范叔一寒如此哉乃取其一綈袍以賜之注綈厚繒也音啼蓋今之絁也昔周旋元方之間亦欲學屠龍之技陳紀字元方今疲敝益州之役良難見流馬之功出師表天下三分益州疲敝言為蜀漕欣聞黃麻之六經杜詩黃麻似六經合入繡衣之九罭詩九罭之魚鱒魴我覯之子衮衣繡裳詳見前燕雀賀厦捲簾必念其差池見前蟋蟀鳴秋瑾户願徐於穹窒詩十月蟋蟀入我牀下穹窒熏鼠塞向墐户注蟲既近人天寒將至故穹塞其室之孔穴熏鼠令出其窟塞北出之嚮塗墐荆竹所織之户使令室無隙孔寒氣不入此借用賀宣參政繒宋史寧宗嘉定十四年八月以宣繒同知樞密院事十二月兼參知政事理宗寶慶元年十一月以宣繒同知樞密院事申命真儒易重㢲以申命顓參大政公輔間於兩社德因服而益彰左傳間于兩社為公室輔注周社亳社之間朝廷執政所在詳見前天子必有四鄰官惟人而後備見上條制書誕布歡頌交馳恭惟某官忠結主知道先民覺泰山喬嶽無運動之迹人蒙潤而不知東坡集譬如大川喬嶽不見其運動而功利之及于物者蓋不可以數計而周知又蒙霧而行皆獲不知之潤祥風和氣以長養為心物有生而自遂與其參夙夜有命之寄不若策旦夕承弼之功臣哉孰重於鄰哉賢者固識其大者竝見前今海內之事勢若火未然賈誼傳夫抱火厝之積薪之下而寢其上火未及燃因謂之安方今之勢何以異此公主上之信臣知風之自賈誼過秦論信臣精卒陳利兵而誰何韓信傳使其信臣招所亡城馮衍傳將軍之先為漢信臣敵鋒外熾民力中乾即戎七年而無休息之期李詩龍虎方戰爭于焉自休息拓地千里而無堅凝之術後漢書胸奴傳建安二十五年呼韓邪單于遣弟左賢王莫將兵萬餘人擊北單于左賢王生獲之北單于震恐卻地千里初帝作戰車可駕數牛上作樓櫓置于塞上以拒胸奴時人見者或相謂曰讖言漢九世當却北狄地千里豈謂此耶及是果拓地焉杜篤傳拓地萬里威振八荒南史徐羡之傳今二方已平拓地萬里唯有小羌未定使能定未保其能應則所憂將重於所欣王羲之傳與㑹稽王箋陳殷浩不宜北伐并論時事曰今雖有可欣之㑹內求諸已而所憂乃重於所欣傳云自非聖人內寧必有外憂實賴同心同德之臣尚書于有亂臣十人同心同德亟合羣策羣力之助法言漢屈羣䇿羣策屈羣力收草茅之公議而用之邦國推槐棘之和氣而逹諸閻閭說文閻里中門也李斯傳李斯以閭閻厯諸侯非常之功待非常之人陳琳為袁紹檄州郡有非常之人然後有非常之事有非常之事然後立非常之功無窮之基有無窮之聞尚書公其惟時成周建無窮之基則亦有無窮之聞某﨑嶇巢幕說文嶇􅀈也潘嶽賦軌崎嶇以低昻增韻山路一曰不安貌或作﨑嶇山峻也通作踦􅛤魏都賦山阜猥積而踦􅛤左傳季子曰夫子之在此也猶燕之巢於幕上謂孫文子冒昧掃門山甫舉之莫助之敢忘陳於千慮竝見前原憲貧也非病也詎妄冀於一陶家語端木賜結駟連騎以從原憲憲居蓬蒿中並日而食子貢曰甚矣子之病也憲曰豫貧也非病也樞密元馬端臨云樞密之名始於唐代宗寵任宦官故置內樞密使使之掌機密文書如漢之中書謁者令是也若內中處分則令內樞密使宣付中書門下省施行則其權已侔宰相至僖昭間楊復恭西門季𤣥之徒遂至視事行文書矣昭宗既誅劉季述乃勑近年宰相延英奏事樞密院侍側爭論紛然既出又稱上㫖未允復有改易撓權亂政自今竝依大中舊制俟宰相奏事畢方得上殿承受公事蓋當時樞使其橫如此朱梁懲唐弊不用宦者然徒知宦者之不可用而不知樞密院之不必存也至後唐以郭崇韜安重誨領其事皆心腹大臣是宰相之外復有宰相三省之外復有三省矣宋興始以樞密與中書對持文武二柄號稱二府然後樞密院始有專職然樞密院雖曰掌兵祖宗時亦兼任宰相之事如景德四年詔樞密院所行關民政及京朝官者報中書是得預除授之事也命樞密使王欽若等同修國史是得預文史之事也至慶厯以後始以宰相兼樞密使及元豐官制行各正其名遂不復兼乃詔釐其事大小大事則三省與樞密院同議進呈小事則樞密院獨取㫖行遂為定例然密院雖可參謀三省之事又在委任何如如潞公溫公當熙寧之時與國論不合則責其專任本兵不預他事蔡確當元祐之初欲引章惇以自助則欲其共立異議陰排正人至紹聖以後則兩府皆憸人附㑹紹述更無異議亦不聞以文馬之儔參錯其間矣代賀禮部曾尚書從龍除簽書兼太子賔客宋寧宗嘉定八年秋七月以曾從龍簽書樞密院事宋太平興國四年石熙載以樞密直學士簽書院事簽書之名始此登延駿望前五行志延登受策師古曰延入而登殿也漢舊儀丞相御史大夫初拜星帝延登親詔也王莽傳延登贊曰假王蒞政駿大也詩駿命不易為人所仰曰望詩令聞令望易萬夫之望宋治平四年以吕公著兼寶文閣學士詔竝揭嘉名以登駿望翊贊鴻樞司馬溫公集宜總鴻樞增寶鼎九九之安國由人重戰國䇿昔周之代殷得九鼎凡一鼎而九萬人挽之九九八十一萬人士卒師徒器械被具所以備者稱此齊泰階兩兩之色魁與台連春秋運斗樞北斗第一至四為魁王劭傳斗杓謂之外廷陽精之所布斗魁謂之㑹府陽精之所復天官書斗魁戴匡六星曰文昌宫前律厯志魁下六星兩兩而比者曰三能三能色齊君臣和能與台同廊廟得賢華夷胥慶恭惟某官造道自得經德不回一舉首登固有榮進之素定從龍慶元五年擢進士第一孤忠自立宜卑英俊之竝游枚乘傳乘久為大國上賔與英俊竝游得其所好李師中贈唐介詩孤忠自許衆不與特立敢言人所難竝游英俊顔何厚未死姦諛骨已寒眷既深於兩宫名益高於九牧孔融論盛孝章書孝章要為有天下大名九牧之人所共稱歎果登宥府王禹稱制宥密之府總樞要於萬幾仍冠儲僚時來則為之佇正久虛於宰席丁未録除張方平制擢陪宰席餘見前年不可及也諒多仰羡於端門沈隱侯集侯府寄隆儲端任顯注儲端謂太子詹事也職官分紀江總為宫端通典唐龍朔二年改詹事為端尹詹事府為端尹府餘見前民無不獲之夫公有無窮之聞某逖聞成命倍動歡顔孤鶩落霞正竊垂天之庇莊子翼若垂天之雲六鼇抃地莫殫賀厦之悰見前賀薛樞使極成都運司作薛極傳紹定元年拜參知政事兼同知樞密院事尋知樞密院事兼參知政事詳見前顓席紫樞通典尚書令與司𨽻校尉御史中丞朝㑹皆顓席而坐京師號曰三獨坐又司𨽻校尉顓道而行顓席而坐李尋傳紫宫極樞通位帝紀注紫宫天之北宫也極天之北極星也樞是其回轉者也均茵黃閣說文茵車重席也詩文茵暢轂注車內席也禮記少儀注著褥也著音佇周陽由傳同車未嘗均茵慿詳見前仲虺居薛宜登左揆之虛薛任姓黃帝之後左傳仲虺居薛為湯左相杜詩左轄慿虛位臯陶謨虞還倚右平之重西都賦左墄右平重軒三階注平以平磚相亞次有常立武無競維人恭惟某官學可帝師才堪王佐並見前智周萬物炳蓍龜先見之明繫辭知周乎萬物而道濟天下故不過法言樗里子之智也使其知國如知葬則吾以疾為蓍龜節貫四時凜松柏後凋之操禮記其在人也如松柏之有心也故貫四時不改柯易葉王儉高松賦貫四時而不改超五玉之嘉容周旋三省兩省之掾極為中書門下省檢正諸房公事中興㑹要孝宗即位詔尚書省吏房兵房三省樞密院機速房尚書省刑房户房工房三省樞密院看詳賞功房尚書省禮房令左右分房書擬其中書門下諸房㑹檢正書擬續漢書百官志公府掾比古元士三命者也練達一日二日之機合文武以兼資佩安危而注意熙帝載宅百揆民具爾瞻俱見前掌邦政統六師軍則誰與尚書司馬掌邦政統六師平邦國式端兵本專領使權胸奴欵塞五原固出羽干之舞子房決勝千里正須帷幄之籌帝曰欽哉相尊等耳俱見前山有木而工則度姑遜滕侯之先封左傳滕侯薛侯來朝爭長薛侯曰我先封公使羽父請於薛侯曰諺有之曰山有木工則度之賔有禮主則擇之周之宗盟異姓為後願以滕君為請薛侯許之乃長滕侯河如帶而國永存實自薛公之上計漢功臣表封爵之誓曰使黃河如帶泰山若礪國以永存爰及苗裔英布傳布反上問薛公對曰使布出於上計山東非漢之有也出於中計勝負之數未可知也出於下訃陛下安枕而卧矣上曰是計將安出薛公曰出下計上曰善封薛公千户佇膺帝眷徑位宰衡酈炎傳絳灌臨宰衡某夙纍一陶尚驅六轡挽武功原上之粟覺心瘵而力疲後漢書郡國志右扶風武功有斜谷蜀志諸葛亮悉大衆由斜谷出以流馬運據武功五丈原分兵屯田瘵音債病也詩士民其瘵朱超道詩冲天勢已逺控地力先疲聞文德殿下之麻歎形留而神往賀薛僉書極宋史寧宗嘉定十五年九月以薛極僉書樞密院事顯膺上第薛極傳極權刑部尚書尋試户部尚書兼權吏部尚書遂為真暫兼權户部尚書嘉定十五年特賜同進士出身拜端明殿學士簽書樞密院事極原以父任調上元主簿中詞科進二洪樞道德之威成安强有常立武股肱之寄在忠力無競維人見賀俞樞密兼參政條渙號再揚師虞允穆尚書出入自爾師虞恭惟某官風猷膚敏宇量浚明才刃立解於千牛豈躊蹰於肯綮意匠洗空於凡馬寧滲淡於斯須輔造化而不言正朝廷於既治星辰聽履久勤朝夕之論思雨露賜袍遂參夙夜之宥密漢用三傑運籌允藉於子房舜有四鄰舞羽實資於伯益並見前遹觀偉績追配前聞某濫厠冗貟獲瞻盛事帝王之興建輔弼固知時亮於天工漢書功臣表序自古帝王之興曷嘗不建輔弼之臣所與共成天功者乎尚書欽哉惟時亮天功甲兵之問至廟堂更願勿窮於國力韓文小大之官各守其職錢穀甲兵之問不至于廟堂賀程同知卓宋史寧宗嘉定十五年九月以給事中程卓同知樞密院事五代有參知樞密院事宋初闕淳化二年王顯出鎮張遜知樞密院事始以溫仲舒冦凖同知院同知之名始此登庸儒宗蕭望之傳贊身為儒宗有輔位之能匡張孔孟傳贊咸以儒宗居宰相位翟方進傳身為儒宗致位宰相劉向傳董仲舒為世儒宗師丹傳丹經為世儒宗德為國黃耉後漢賈逵傳論鄭賈之學行乎數百年中遂為諸儒宗晉書賀循傳朝廷疑滯皆咨于循循依經禮而對為當世儒宗儒林傳鄭冲以儒宗登保輔又范平等學府儒宗譽隆望重孟陋傳學為儒宗宜引在府以和鼎味陪輔兵本綢繆牖户及國家閒暇之時典領樞機基夙夜宥密之命軍民心愜邉塞膽寒竝見前恭惟某官峻稟扶輿相如賦扶輿倚靡郭璞注淮南所謂曾折摩地扶輿倚委也韓文蜿蟺扶輿磅礴而鬱積詳見前清儲沆瀣相如賦呼吸沆瀣餐朝霞應劭曰列仙傳陵陽子言春食朝霞夏食沆瀣沆瀣北方夜半氣也並天地𤣥黃之氣為六氣何蕃初入於太學共知仁義之必流韓文何蕃傳蕃淮南人父母具全初入太學嵗率一歸惜乎蕃之居下其可以施於人者不流也是故蕃之仁義充諸心行諸太學積者多施者不遐也下惠不卑於小官豈以遺佚而或怨揚厯勞人之州縣梁竦傳竦自負其才鬱鬱不得志嘗登高望逺歎息言曰大丈夫居世生當封侯死當廟食如其不然閒居可以養志詩書足以自娛州縣之職徒勞人耳從容範我之馳驅逮作牧於閩山周禮八命作牧九命作伯閩山在今福州府城西南隅一名烏石山與九仙山對峙山有薛老峯鄰霄臺鴉浴池蟠桃塢金蟒穴之類皆自然天成寢簡知於魏闕廣雅象魏闕也莊子身處江海之上心在魏闕之下蜀志譙周嘗問杜瓊曰昔周徵君羣以為當塗高者魏也其義何也瓊答曰魏闕名也紬書史觀昭回雲漢之章司馬遷傳紬史記石室金匱之書師古曰紬音胄謂綴集之吳志東觀儒林之府唐百官志後漢東觀藏書之室亦著作之所通典漢東京圖書悉在東觀多使名儒碩學入直東觀撰述國史謂之著作東觀詩倬彼雲漢昭回于天注回轉也雲漢謂天河也昭光也倬然天河水氣也精光轉運於天說文倬著大也批敕瑣闈鼓舞風雷之令漢舊儀黃門屬黃門令日暮入對音瑣門拜名曰夕郎宫閣簿青瑣門在南宫新唐書李藩傳藩再遷給事中制有不便就敕尾批卻之吏驚請聯他紙藩曰聯紙是牒豈曰敕耶迄由東省杜牧之行崔璪制左省駁議不畏强禦白集除劉㑑芻制給事東闥實掌駁議初僚宅毛友制惟東臺論駁之司乃萬世出納之地宴公類要給事中謂之東掖進二西樞宋熙寧三年詔國家以西樞內輔翊贊本兵任為重矣惟春秋九世之讐固將酬於千古春秋紀侯大去其國公羊傳大者何滅之也孰滅之齊滅之曷為不言齊滅為襄公諱也春秋為賢者諱何賢乎襄公復讐也何讐爾逺祖也哀公烹乎周紀侯譛之以襄公之為于此焉者事祖禰之心盡矣盡者何襄公將復讐乎紀卜之曰師喪分焉不為不吉也逺祖者幾世乎九世矣九世猶可以復讐乎雖百代可也然乾坤一擲之舉不如出於萬全晉書孫綽傳捨百勝之常理舉天下而一擲劉元海傳命將四出決機一擲韓詩龍疲虎困割川原億萬蒼生性命存誰勸君王回馬首真成一擲賭乾坤朝錯傳帝王之道出於萬全今按一擲蓋以博喻南史張瓌傳張冲曰瓌以百口一擲出手得盧矣李白詩云六博爭雄勝綵來金盤一擲萬人回則一擲之為博明矣願思無競之維人益務有常而立武運幄幃而決勝千里正賴協心亮天地而弼豫一人即觀顓面俱見前某隴西冷裔李氏二望趙郡一望六房隴西一望四房江右庸儒頃作廛氓正出藍田老槐之下韓文藍田縣丞㕔壁記庭有老槐四行南墻巨竹千挺儼若立相持茲為幕客詎忘豐水有芑之仁詩豐水有芑武王豈不仕注芑草也仕事也豐水是無情之物猶以潤澤而生菜為已事况武王豈不以功業為事乎此借用禮記豐水有芑武王豈不仕詒厥孫謀以燕翼子數世之仁也我今不閲遑恤我後終身之仁也所未知鼎鼐之新杜詩調和鼎鼐新果猶念爐錘之舊燕雀之賀大厦豈憂凌雨而震風見前烏鵲之繞何枝尚託稀星於明月魏武短歌行月明星稀烏鵲南飛繞樹三匝何校可依賀俞僉書應符宋史寧宗嘉定十四年八月以給事中俞應符僉書樞密院事十五年六月應符薨使北道而簡僚曽玷網羅之舊容齊隨筆東漢書載北道主人乃有三事常山太守鄧晨㑹光武於巨鹿請從擊邯鄲光武曰偉卿以一身從我不如以一郡為我北道主人又光武至薊將欲南歸耿弇以為不可官屬腹心皆不肯光武指弇曰見我北道主人也彭寵將反光武問朱浮浮曰大王倚寵為北道主人今既不然所以失望後人罕引用之翼西樞而基命茲逢鼎鼐之新往年身未可以許人今日士固伸於知己輒修燕雀賀厦之敬併吐蟋蟀吟秋之懷恭惟某官背負天風胸吞雲夢自其克勤小物於州縣已具可以大受之規模二螭坳處之記言一麾乃出竝見前千騎上頭之賦政再命茲共古辭陌上桑東方千餘騎夫壻居上頭詩賦政於外四方爰發漢書尚書出納王命賦政四海餘見前回回紫槖之間張衡思𤣥賦焱回回其揚靈劉公幹詩沉迷簿領書回回自昏亂諤諤青蒲之上家語湯武以諤諤而昌史記商君傳千人之諾諾不如一士之諤諤劉向新序願為諤諤之臣餘見前露門晝講緝熙日月之光明慶厯賈昌朝拜相制露門勸講周書武帝建德三年朝羣臣于露門武帝平齊拜熊安生露門博士保定中置露門學沈重於露門館講論語劉臻明堯遜為露門學士蕭撝傳撝入朝屬置露門學高祖以撝與唐瑾元瑾王褒等四人為文學博士瑣闈夕趨鼓舞風雷之號令王維詩夕奉天書拜瑣闈廷臣無出右者高帝紀漢廷臣無能出其右者天子居然器之循吏傳以經術潤飾吏事天子器之朱邑傳性公正不可交以私天子器之朝廷敬焉迄自東臺東臺謂給事唐龍朔中改門下省曰東臺東臺舍人峻躋西府續㑹要國朝循唐制即中書之北置樞密院元豐改制遂變於中書之西九天渙號簡二三執政之股肱兩地升賢繫億兆生民之肝膽有常立武無競維人春秋九世之讐固將必報並見前胸奴百年之運已及其時胸奴傳孝宣之世承武帝奮擊之威直胸奴百年之運因其壞亂幾亡之厄權時施宜覆以威德值蛩驉並負之已非計蚌鷸相持之不久見前下䇿莫危於浪戰上兵實貴於伐謀漢書上兵伐謀其次伐交注知敵有謀則沮其所為不用兵革也在帝王之萬舉萬全固求耆定伍被傳聖人萬舉而萬全耆音指詩勝殷遏劉耆定爾功注耆致也王肅云致定其大功謂誅紂定天下而疆埸之一彼一此正缺堅凝左傳疆埸之邑事一彼一此注疆埸邊境也幸而及閒暇之時亟宜定修攘之計詩序宣王內修政事外攘夷狄取亂侮亡兼弱也時則易然尚書兼弱攻昧取亂侮亡左傳隨武子曰仲虺有言曰取亂侮亡兼弱也汋曰於鑠王師遵養時晦耆昧也武曰無競維烈撫弱耆昧以務烈所可也同寅協恭和衷哉政將焉往洪鈞既轉於一氣黃麻即似於六經伏念某拓落一官嶔﨑萬狀才固自知其無似命亦可歎其不猶竝見前瞻白日於舉頭遭海風而引去韓詩舉頭看白日泣涕下霑襟郊祀志三神山者其傳在渤海中去人不逺及到三神山反居水下水臨之患且至則風輒引船而去上青天而仰脅窘峽水之倒流見前甫欲釣錦江之魚杜詩奉引濫騎大宛馬幽棲真釣錦江魚乃忽騎將軍之馬韓詩長把種樹書人云避世士忽騎將軍馬自號報恩子二年劔外寸步矛頭俱見前徒令蟣蝨甲胄之生韓非子天下無道攻擊不已甲胄生蟣蝨燕雀處帷幄而兵不歸故曰戎馬生於郊揚雄長楊賦鞮鍪生蟣蝨甲胄被霑汙徐樂傳介胄生蟣蝨民無所告訴互見前安得貂蟬兜鍪之出蕭子顯齊書周盤龍為東平太守求解職見許還為散騎常侍武帝戲之曰卿著貂蟬何如兜鍪盤龍曰此貂蟬從兜鍪中生耳茲歸身於司敗左傳楚滅若敖氏子文孫針尹堯黃使於齊還自拘於司敗妄干祿於有司適值大君子之登庸不勝小丈夫之距躍躍舉身而上之名左傳距躍三百曲躍三百距躍直跳也曲踊橫跳也百音陌阡陌也士曰時哉相君實皆舉笏以相歡東坡司馬溫公神道碑民曰樂哉既相司馬爾賈於途我耕於野士曰時哉既用君實我後子先時不可失餘見前誰其識之有歐陽辱捲簾之有素陳後山贈二蘇公詩異人間出駭四方嚴王陳李司馬楊一翁二季對相望竒寶橫道驥服箱誰其識者有歐陽大科異等固其常小卻盛之白玉堂餘見前願煩啄菢菢薄報切鳥伏卵謂之菢韓詩天不生鶴翎變化在啄菢稍養翅翎韓詩路逺翅翎短不能持汝歸山谷詩身如病鶴翅翎短樂莫樂兮相知更傍誰家之門户章孝標詩舊壘危巢泥已落今年故向社前歸連雲大厦無棲處更傍誰家門户飛遲之遲而又久正須大匠之爐錘禮記夫武之修戒之已久則既聞命矣敢問遲之遲而又久何也注備戒已久是遲久立於綴亦是遲而又久此借用四六標準卷十六
