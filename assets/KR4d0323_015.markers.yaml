  - {type: variant, offset: 16, length: 188, content: 三公之官昉於虞夏歴代沿革不常不能殫述宋承唐制以太師太傅太保為三師太尉司徒司空為三公為宰相親王使相加官其特拜者不預政事赴上於尚書省太尉舊在三師下由唐以來至宋加重以太尉居太傅之上若宰臣官至僕射致仕者以在位乆近或已任司空司徒則拜太尉太傅等官若太師則為異數自趙普以開國元勲文彥博以屢朝耆德方特拜焉徽宗政和二年以司徒司空六卿之官非三公之任太尉主兵柄亦非三公並罷依周制立三孤之官為次相之任, SBCK: ''}
