body:
  text: 四六標準卷二十三宋李劉撰都大宋都大有二有都大提舉茶馬有都大提㸃坑冶詳見各題下賀新除川秦茶馬魏戶部泌成都紀國朝熙寧七年始詔三司鹽鐵判官李杞勾當公事蒲宗閔經畫川蜀買茶充秦國熙河路博馬就除成都府路買茶公事杞于秦川宗閔于成都置司後改名都大提舉茶馬事朝野雜記元豐四年群牧判官郭茂恂又言茶司既不兼買馬遂立法以害馬政乞併茶場買馬為一司從之茶馬司掌收摘山之利以佐邦國凡市馬于蕃夷以茶易之大觀以來茶馬之政廢川茶不以博馬唯市珠玉故馬政廢缺紹興四年從關師古之請以乏戰馬始令四川宣撫司支茶博馬七年宰臣趙鼎言得㫖復置茶馬官舊有主管茶馬同提舉茶馬都大提舉茶馬凡三等上曰考其資歷命之乾道川秦買馬之額川司六千秦司五千九百成都利州路十一州産茶二千一百二萬斤茶馬司所收大較如此顯陟臺郎杜詩臺郎選才俊虞詡傳臺郎顯職仕之通階總提廄政文昌六部地官見謂之劇曹白居易行裴垍制及領地官且司邦賦㑹計事劇出納孔殷投利刃以皆虛委棼絲而必理武騎萬營天府復専於隆委揚雄傳罕車飛揚武騎聿皇又敦萬騎於中營兮方玉車之千乘師古曰敦讀曰屯聚也周禮天府以詔王察群吏之治祿因德詔說文詔告也周禮太宰以八柄詔王馭群臣八者人君馭臣之大柄冡宰不敢専告王以施之而已材與事宜恭惟某官心平而氣和人今而學古公矦子孫之必復固有世臣左傳畢萬筮仕於晉辛廖占之曰吉其必蕃昌公矦之子孫必復其始互見前名義鬼神之難欺實由家學舊唐書宋璟傳張易之誣搆魏元忠有不順之言引鳯閣舍人張說使證之說惶惑迫懼璟謂曰名義至重神道難欺必不可黨邪陷正以求茍免若緣犯顔流貶芬芳多矣琮璧不雕而自貴說文琮瑞玉大八寸似車釭徐曰其狀外八角而中圓也琮之言宗八方所宗故以祭地白虎通方中圓外曰璧內方象地外圓象天鸞和隨動而有聲鸞通作鑾詩和鑾雍雍毛注和在軾鑾在鑣嚴氏曰和鑾皆鈴也詳别見屹立䕫人之藩籬容齊隨筆山谷詩相戒莫浪出月黑虎䕫藩䕫字甚新其意蓋言抵觸之義而莫究所出惟杜工部課伐木詩序中云必皆黑摚突䕫人屋壁乃知魯直用此然杜公時在䕫府所謂䕫人者述其土俗耳本無抵觸之義魯直蓋誤用耳按山谷誤用杜詩而此又誤用山谷詩蓋文人好奇如此何翅晉陽之保障晉語趙簡子使尹鐸為晉陽請曰以為繭絲乎抑為保障乎簡子曰保障哉注繭絲賦稅保障蔽扞也儉以足用節而愛人迄轉上聞首膺表選循吏傳公卿則選諸所表以次用之握蘭依烏之位內陪從於太微天文志太微三光之廷五帝坐後聚十五星曰哀烏郎位天文志權衡太微三光之廷淮南子太微者太一之廷也紫宫者太一之居也餘見前摘茗市駿之司外分節於少府初寮除李昌孺制在昔元豐留神武備摘山市駿具著科條乃詔攸司悉遵成憲將其使指實克推行百官公卿表少府秦官掌山海池澤之稅以給共飬屬官有尚書符節韓文讀命於庭出節少府職任昔分而今合職源國朝熙寧七年差李杞蒲宗閔成都府買茶熙河路博馬並令杞等提舉置都大提舉及主管同主管元豐四年羣牧判官郭茂恂言茶司既不兼買馬遂立法以害馬政恐誤國事乞併茶場買馬為一司從之蓋茶馬司始此事權滋重以不輕一洗空萬古之凡㑹如雲錦杜詩一洗萬古凡馬空新唐書王毛仲傳毛仲始見飾櫂於牧事尤力婉息不訾從帝東封取牧馬數萬匹每色一隊相間如錦繡天子才之東坡詩想見開元天寶年八坊分屯隘秦川四十萬匹如雲煙言馬六經濟三尺之法歸近天顔山谷煎茶賦乃至中夜不眠耿耿既作溫齊殊可屢㰱如以六經濟三尺法雖有除治與人安樂互見前言茶輕破睡正濃之詩盧同走筆謝孟諫議寄新茶詩日髙五丈睡正濃軍將打門驚周公言茶小試思無邪之學詩駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車袪袪思無邪思馬斯徂言馬某苦慙駑骨言馬復領蟇頥東坡蝦蟇培詩蟆背如覆盂蟇頥如偃月謂是月中蟇開口吐月液根源來甚逺百尺蒼崖裂豈惟煮茶好釀酒應無敵按蝦蟇培在夷陵之南凡出蜀者必酌水以瀹茗陸羽第其品為第四張又新水記言峽川扇子峽石中突而泄水俗謂蝦蟇石其水煎茶為第一山谷云蝦蟇培從舟中望之頥頓口吻甚類蝦蟇尋泉源入洞中石氣清寒流泉出石骨若虬龍吼言茶王良後造父先亦有馳驅之志韓文若駟馬駕輕車就熟路而王良造父為之先後也言馬汲黯戅寬饒猛恐非採掇之材東坡和錢安道寄惠建茶詩建溪所産雖不同一一天與君子性森然可愛不可慢骨清肉膩和且正雪花雨腳何足道啜過始知真味永縱復苦硬終可録汲黯少戅寬饒猛言茶此篇全用茶馬事渾然無迹代通制帥四川趙茶馬彥綰分巴徼之旌旗濫膺守土占益州之分野知有使星見前欣竊庇之自今愧修辭之已晚恭惟某官風猷凝逺天韻宏深博極羣書太乙之藜相照司馬遷傳自劉向揚雄博極羣書皆稱遷有良史之才餘見前文熖萬丈長庚之夢不虛李陽氷草堂集序驚姜之夕長庚入夢故生而名白以太白字之世稱太白之精得之矣餘見前藉未陳周召之詩書詩書如周南召南洛誥召誥之類亦宜獻間平之禮樂河間獻王傳武帝時獻王來朝獻雅樂對三雍宫東平憲王傳蒼以天下化平宜修禮樂乃與公卿共議定南北郊冠冕車服制度及光武廟登歌八佾舞數王㮊野客叢書云事有承襲用之不以為異者如宗室用間平二字之類是也河間東平漢家二王封號間平難於拆用間猶言中耳然用此二字其來舊矣北史論齊文襄諸子雖有謝間平徐陵啓有間平就國之語恬為丞之再轉韓文再轉而為丞兹邑甘出守之一麾顔延之五君詠一麾乃出守刻銅虎之符洊揚美最護木牛之餉益茂膚公謂宜運海以摶鵬俱見前又使摘山而市駿劉言史詩宛如摘山時自啜指下春餘見上條周原之荼膴膴包以緗奩詩周原膴膴堇荼如怡說文荼苦荼也徐曰即今之茶字茶茗也本作荼爾雅價苦荼注樹小如梔子冬生葉可煮作羮飯今呼早采者為茶晚取者為茗一名荈蜀人名之苦荼本草苦荼能去脂使人不睡陸羽茶經一曰茶二曰檟三曰葭四曰茗五曰荈山谷謝送碾壑源揀茶詩矞雲從龍小蒼璧元豐至今人未識壑源包貢第一春緗奩碾香供玉食魯坰之馬駉駉爛如雲錦詩駉駉牡馬在坰之野注駉駉良馬腹幹肥張也坰逺野也邑外曰郊郊外曰野野外曰林林外曰坰餘見上條豈容黔突行有紫泥某頑頓之資踈鹵於事將指以出濫持天子之節旄並見前無功而還不得月氏之要領張騫傳騫從月氏至大夏竟不能得月氏要領師古曰月氏西域胡國也氏音支要衣要也領衣領也凡持衣者則挈要與領言騫不能得月支意趣無以持歸於漢故以要領為喻要音一遙反敢意冒升於荷槖且令假守於銅梁銅梁縣今屬重慶府本巴國地楚滅巴封其子為銅梁矦銅梁山在合州石照縣南五里山有茶色白甘腴謂之水茶甲於巴蜀朝公武詩銅梁山昏空翠重石鏡水落灘聲遲有如凌競甘泉賦馳間闔而入凌競師古曰凌競者言寒凉戰栗之處何以全度趙充國傳宜全度之師古曰安全而免度之不令喪敗也東西之瞻使節儻未賦於旋歸杜詩川合東西瞻使節前後之間清塵尚有餘於同味司馬相如傳犯屬車之清塵注言清者尊貴之意楚辭聞亦松之清塵謝靈運詩遙遙播清塵蘇頲詩嘉㑹阻清塵杜詩昔在嚴公幕俱為蜀使臣艱危參大府前後間清塵代回張茶馬子震純用茶馬事奏最蕃宣易司𣙜牧卧雲而逼象緯榮分東壁之光杜詩天闕象緯逼雲卧衣裳冷摘山而市駿蹄益固西秦之圉爾雅圉垂也注守圉在外垂也左傳聊以固吾圉也疏拒邉垂也李嶠詩將軍臨北塞天子入西秦恭惟某官味甘苦永喻茶見本心卷第一條秉塞淵喻馬詩東心塞淵騋牝三千注秉操也塞充實也淵深也秉操其心能誠實且復深逺故能興國以致殷富騋牝乃有三千出乘兩腋之清風已親法駕喻茶盧同謝寄新茶詩七碗喫不得也唯覺兩腋習習清風生勒回中道之奔電歸捍戎羌喻馬王褒傳追奔電逐遺風兹揚春山之旗言茶塵史荆公送元厚之詩云新茗齊中試一旗世謂茶之始生而嫩者為一槍寖大而開為一旗過此則不堪矣荆公博學多聞豈自有所稽而非淺陋之所能察也劉彥波詩然松煮鼎山泉冽槍旗一水分優劣歐陽永叔嘗新茶詩終朝採摘不盈掬通犀銙小圓復窊鄙哉榖雨槍與旗多不足貴如刈麻又約共試新茶旗槍幾時緑又擁東方之騎言馬漢書東方千騎長人古樂府東方千餘騎夫壻居上頭張于湖詩千騎東方白玉鑣非環非玦上有雙鸞言茶東坡月兔茶詩環非環玦非玦中有迷離玉兔兒一似佳人裙上月月圓還缺缺還圓此月一缺圓何年君不見鬬茶公子不忍鬬小團上有雙銜夀帶雙飛鸞載馳載驅駕彼四牡言馬見前取月團三百片之美包以緗奩言茶盧同謝寄新茶詩開緘宛見諫議面手閲月團三百片學林新編云茶之佳品珍踰金玉未易多得而以三百片惠同其品可知也餘見上條供天子十二間之須爛如雲錦言馬周禮校人掌主馬之政天子有十二間馬六種邦國六間馬四種家四間馬二種新唐書百官志尚乘局掌內外間廄之馬左右六間一曰飛黃二曰吉良三曰龍媒四曰騊駼五曰駃騠六曰天苑佇頒鳳詔趣扈龍旗某有味溪芽喻茶東坡詩我官於南今幾時嘗盡溪茶與山茗胸中似記故人靣口不能言心自省建溪所産雖不同一一天與君子性無心天秣喻馬東坡詩可憐老驥真老矣無心更秣天山禾烹玉澆過秦之論徒抱渴塵喻茶山谷以團茶贈朝無咎詩朝無咎贈君越矦所貢蒼玉璧可烹玉塵試春色澆君胸中過秦論斟酌古今來活國籋雲作徠漢之歌更觀逸足喻馬漢書禮樂志太乙况天馬下籋浮雲暗上馳注籋音躡言天馬上躡浮雲也又天馬徠從西極涉流沙九夷服徠古來字代錢塘趙縣丞通史都大彥的詳啓意乃都大提㸃坑冶九朝通略宋景祐二年始置浙江川廣福建等路都大提㸃坑冶鑄錢一員以魏兼為之與提㸃刑獄序官元豐二年定為兩司在饒者領江東淮浙七閩在䖍者領江西荆湖二廣至元祐元年以坑冶鑄錢通為一司紹興二年置䖍州提㸃司六年銜內添都大二字與提刑序官二十六年並罷乾道八年詔鑄錢司依舊置提㸃官於饒贑二州置司淳熙三年併贑司歸饒司王楫専為提㸃官加都大焉佐赤縣於京畿曽微善狀史記孟子荀卿列傳中國名曰赤縣神州赤縣神州內自有九州禹之序九州是也通典唐縣有赤畿望緊上中下六等京都所治為赤縣京之㫄邑為畿縣宋之問詩赤縣求人隱青門起路岐韓詩嗟我身為赤縣令操權不用欲何俟杜延年傳甚亡狀師古曰無善狀望繡衣於霄漢輒贄空函杜詩繡衣春當霄漢立殷浩傳開閉者數十竟達空函梁武帝紀是馳兩空函定一州矣誠知使者之輶軒說文輶輕車也風俗通周秦常以嵗八月遣輶軒之使採異代方言寧顧丞哉之㕔壁韓文藍田縣丞㕔壁記丞哉丞哉余不負丞而丞負余恃仁人之在上韓文今有仁人在上若不往告之而遂行是果于自棄而不以古之君子待吾相也實善類之焉依左傳我周之東遷晉鄭依焉敢瀝寸丹敬裁尺素伏念某地寒無挾天賦甚慳濫綴族盟既愧宗英之卓爾僅慿門䕃又慙舉首之褒然粗謹守於亷勤亦徒勞於州縣並見前每發辛勤三十年之歎韓詩始我來京師止擕一束書辛勤三十年以有此屋廬若為扶搖九萬里之程頃贊武夷之六條武夷山在崇安南三十里周回百二十里凡峰巒巖石三十有六古記云昔有神降於山自稱武夷君因名及識文昌之八座劉伯疏八座比於文昌詳見前青冥强箭妄希一發以五豝韓詩青冥送吹噓强箭射魯縞詩彼茁者葭一發五豝儀禮注詩有一發五豝五豵之言樂得賢者衆多嗟思至仁之人以充其官緑水寒波竟少九門之兩翼見前兹贊日畿之邑輒為露剡之謀冒於一來左傳楚子伐鄭鄭人禦之子産曰晉楚將平諸矦將和楚王是故昧于一來昧猶貪冒也茫然四顧盡枿去牙角豈無對立之松槐藍田縣丞㕔壁記盡枿去牙角一躡故迹破崖岸而為之庭有老槐四行南墻巨竹千挺斯立痛掃溉對樹二松日哦其間有問者輒對曰余方有公事于姑去託根借恩光誰念無言之桃李山谷上蘇子瞻詩江梅有佳實託根桃李場桃李終不言朝露借恩光兹聞皇華之使實司造化之爐李商隱詩千年管鑰誰鎔範只自先天造化爐遂忘躍冶之嫌莊子大冶鑄金金踴躍曰我且必為莫邪大冶必以為不祥之金輒控問鈞之請劉禹錫有問大鈞賦詳别見恭惟某官清涵沆瀣沆下朗切瀣下介切說文沆瀣乞也王逸楚辭注北方夜半氣相如大人賦呼吸沆瀣兮餐朝霞峻禀扶輿司馬相如傳扶輿猗靡師古曰言鄭女曼姫為侍從者所扶輿而猗靡耳韓文蜿蟺扶輿磅礴而鬱積詳見前若伊陟若巫賢合繼相門之相孟嘗君傳文聞將門必有將相門必有相南史王訓傳訓召見文德殿上目送之謂朱异曰可謂相門有相有封胡有羯末乃安常調之常世說新語王凝之謝夫人既往王氏大薄凝之既還謝家意大不悅大傅慰釋之曰王郎逸少之子人身亦不惡汝何以恨乃爾答曰一門叔父則有阿大中郎群從兄弟則有封胡遏末不意天壤之中乃有王郎注封胡謝韶小字遏末謝淵小字韶字穆度萬子車騎司馬淵字叔度奕第二子義興太守時人稱其尤彥秀者或曰封胡遏末封謂朗遏謂𤣥末謂韶朗淵𤣥一作胡謂淵遏謂𤣥末謂韶也調徒釣反張釋之傳十年不得調師古曰調選也五馬不受於二毛杜詩人生五馬貴不受二毛侵八駿又馳於四牡穆天子傳天子之八駿赤驥盜驪白義踰輪山子渠黃華騮緑耳良弓良冶廣開槖籥之權禮記良冶之子必學為裘良弓之子必學為箕老子天地之間其猶槖籥乎虛而不屈動而愈出注槖籥中空又能有聲氣蓋冶者所用鑄金鑄人總出隂陽之炭法言或問世言鑄金金可鑄歟曰吾聞覿君子者問鑄人不問鑄金或曰人可鑄歟曰孔子鑄顔淵矣或人踧爾曰問鑄金得鑄人賈誼傳隂陽為炭萬物為銅圜法令行而禁止食貨志凡貨金錢布帛之用夏殷以前其詳靡記太公為周立九府圜法圜即錢也方兄昔歉而今豐晉魯褒錢神論使內方象地外圓象天為世神寶親愛如兄字曰孔方又云天有所短錢有所長四時行焉百物生焉錢不如天逹窮開塞振貧濟乏天不如錢若藏武仲之智卞莊子之勇冉求之藝文之以成人矣今之成人者何必然唯孔方而已㸃鐵成金實在一陶之巧匠傳燈録雲門如九轉丹砂㸃鐵成金澄公藥汞銀徒可玩人入煆則流去鎔銅合穎即成百尺之浮圖翻譯云塔西國浮圖也言浮圖者此翻聚相戒壇洛陽伽藍記景明寺浮圖去地百仭唐𤣥裝傳健馭國有雀離浮圖元魏靈太后遣沙門道主等賫大幡長七百餘尺往彼披之腳才及地五代史李嵩傳長興中明宗春秋髙秦王從榮多不法晉髙祖為六軍副使懼禍及求出外藩時契丹入鴈門明宗選將以捍太原晉祖欲之議久不决嵩曰太原國之北門宜得重臣非石敬塘不可晉祖深德之隂遣人謝之曰為浮圖者必合其尖蓋欲使嵩終始成己事也代回史都大定之光奉宸綸真持使蕩方千里而賦役久斂惠於一州見前圜九府以通財遂搴華於數路漢書食貨志太公為周立九府圜法師古曰周官大府玉府內府外府泉府天府職內職金職幣皆掌財幣之官故云九府圜謂均而通也恭惟某官人門有偉陳書蔡凝傳髙宗嘗謂凝曰我欲用義興主壻錢肅為黃門郎卿意何如凝正色對曰黃散之職故須人門兼美惟陛下察之東坡詩清朝固多士人門子皆冠風調不凡楊素傳朝臣之內頗推髙熲其才藝風調優於熲番君得江湖之心不但蕃宣之績吳芮傳秦時畨陽令也甚得江湖間民心號曰番君史公引漳鄴之利更髙城築之功溝洫志魏文矦時西門豹為鄴令有令名至文矦曾孫襄王時與群臣飲酒王為群臣祝曰令吾臣皆如西門豹之為人臣也史起進曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在其旁西門豹不知用是不智也知而不興是不仁也仁智豹未之盡何足法也於是以史起為鄴令遂引漳水溉鄴以富魏之河內民歌之曰鄴有賢令兮為史公决漳水兮灌鄴旁終古舄鹵兮生稻粱暫司壞冶之權崔駰傳壞冶一陶群生得理注壞土器未燒郭璞爾雅注鎔物之冶洞識貨財之本恩隆正任使以大名地上流錢㑹當裕子母之積國語周景王二十一年將鑄大錢以賑救人於是乎有母權子而行注母重也重大倍故為母子輕也其輕小半故為子干寶搜神記南方有蟲其形似蟬而大其子著草葉如蠶種得子以歸則母飛來就之殺其母以血塗其子以其子塗母用錢貨市旋則自還故淮南子術以之還錢名曰青蚨唐詩子母錢成不患貧階前生玉行將繼叔父之風晉書謝𤣥少頴悟為叔父安所器重安嘗戒約子姪因曰子弟亦何豫人事而正欲使其佳𤣥曰譬如芝蘭玉樹欲使其生於庭階耳某密託鄰光逺依夏庇六轡如組未遑瞻原隰之華詩有力如虎執轡如組傳組織組也武力比于虎可以御亂御衆有文章言能治衆動于近成于逺也疏御者執轡于此使馬騁于彼織組者總紕于此而成文于彼皆動于近成于逺也萬物為銅願益㮊陶鎔之業見上條諸本此下有代回鞏都大一條係賀正啓今從徽本歸賀正類代回鞏都大嶸平齊集鞏嶸權都大提㸃坑冶公事職事修舉直祕閣因其任冶司孝宗朝定鑄額嵗十五萬緡積久寖虧六不及一嶸推原弊端揣知楮輕資重乃使楮與􅶏各時其直輕重足以相權􅶏丁競勸􅶏務倍入先是冶卒窳惰多遺􅶏泥滓中有司莫之察嶸置局淘洗所得皆精良於是盡還故額􅶏音礦恭惟某官總攝三官阜通九府食貨志太公為周立九府圜法圜即錢也錢流地上知鞭算之奏功劉晏傳自言如見錢流地上每朝謁馬上以鞭算互見前人自日邉佇軺封之趣覲見前代回鞏都大持槖無功蒙誤恩之起廢東坡湖州謝上表荷先帝之誤恩推置三館蒙陛下之過聽付以兩州又辭免翰林學士承㫖狀計此誤恩必難安處陳後山詩將老蒙誤恩太史公自叙春秋補敝起廢栁文有起廢答山谷詩諸公起廢自林泉東坡詩今年聞起廢飛箋為惠勤妙語之噓枯鄭太傳孔公緒清談髙論噓枯吹生有味其言不知所謝恭惟某官器資凝逺材諝深長時方多艱政有藉貨財之本公雖少屈亦足試陶冶之權行觀地上之泉流即聽日邉之璽召並見前某投閒暮境韓文投閒置散乃分之宜躐陟秋卿煜然赤牘之臨赤通作尺陳遵傳性善書與人尺牘主皆藏去以為榮甚矣蒼顔之愧藏之十襲感恩意以無忘雖則七襄覺報章之弗稱並見前提舶宋開寶四年置市舶司於廣州以知州兼使通判兼判官咸平二年令杭州明州各置市舶聽蕃官從便熙寧中始變市法泉人賈海外者往復必使東詣廣否則沒其貨哲宗即位之二年始置泉州市舶後盡罷提舉官至大觀元年續置建炎中興罷兩浙福建市舶司歸轉運司明年復四年復置廣司紹興二年廢福建市舶司十二年復乾道二年罷兩浙市舶凡舶舟之來最大者為獨檣舶能載一千婆蘭蕃人謂三百斤為一婆蘭也次曰牛頭舶比獨檣得三之一次三木舶次料河舶遞得三之一也代回市舶聶提舉周臣肅駕星軺總司海舶市舶録海南諸國海舶所䌖蠻夷貨也䌖似接子立二切舶音白蠻夷泛海舟增韻海中大船舳艫千里有無得以懋遷舳音軸艫音盧武帝紀舳艫千里注言其船多前後相御千里不絶也詳見前胡越一家內外服其平凖唐貞觀七年上從上皇宴故漢未央宫上皇命頡利可汗起舞馮智戴詠詩既而笑曰胡越一家古未有也是為膚使允屬通材見前恭惟某官世濟象賢左傳世濟其美濟成也尚書惟稽古崇德象賢早騰燕譽詩慶既令居韓姞燕譽燕安譽樂也青氊舊物盍旋北斗之樞畫㦸凝香勉試南交之宅並見前不嚴而化孝經曽子曰則天之明因地之義以順天下是以其教不肅而成不嚴而治萬石衛直周陳傳贊不肅而成不嚴而治所去見思循吏傳序所居民富所去見思惟是嶺陬韓文海嶺之陬既足既濡久資碇稅碇丁定切本作矴錘舟石也韓文孔戣墓志蕃舶之至泊步有下碇之稅始至有閲貨之燕公皆罷之扶胥黃木習亷介之具孚韓文扶胥之口黃木之灣互見前銀甕白環紛貢珍之並入杜詩寸地尺天皆入貢竒祥異瑞爭來送不知何國致白環復道諸山得銀甕帝王世紀西王母慕舜之德來獻白環魏志自虞暨周西戎有白環之獻東夷有慎肅之獻皆曠世而至宋志西王母舜時來獻白環白琯丘希範書白環西獻楛矢東來禮運山出器車注器車謂若銀甕丹甑顧野王瑞應圖王者宴不及醉刑罰中人不為非則銀甕出貪泉酌水已知吳隱之心晉書循吏傳吳隱之字處默弱冠而介立有清操廣州包帶山海珍異所出一篋之寶可資數世前後刺史多黷貨朝廷革嶺南之弊以隱之為廣州刺史未至州二十里地名石門有水曰貪泉飲者懷無厭之欲隱之既至語其親人曰不見可欲使心不亂越崖喪清吾知之矣乃至泉所酌而飲之因賦詩曰古人云此水一㰱懷千金試使夷齊飲終當不易心及在州清操愈厲祥飇送帆佇應孔戣之召飇卑遙切說文扶搖風也從風猋聲呂氏春秋東北風曰猋顔延年詩雕雲麗璇蓋祥飇被采斿帆通作帆舟上幔所以泛風韓文南海廟碑國子祭酒魯國孔公為廣州刺史視册有皇帝名曰其恭且嚴如是吾將宿廟下以供晨事將事之夕天地開除月星明穊祥飇送帆旗纛旌麾飛揚暗藹又尚書左丞孔戣墓志云廣州南海廟入海口為州者皆憚之不自奉事唯公嵗常自行元和十五年遷尚書吏部侍郎孔戣傳拜嶺南節度使交廣晏然大治穆宗即位以吏部侍郎召改散騎常侍選為左丞某卜鄰有幸賀厦已稽六秬五羊難續遊仙之夢廣州記廣州㕔事梁工畫五羊像又作五榖囊隨像懸之云昔髙固為楚相五羊銜榖萃於楚庭故圖其像為瑞六國時廣州屬楚寰宇記固為楚相有五仙人騎五色羊各持穀穗一莖六出以遺州人騰空而去今呼為五羊城南部新書吳修為廣州刺史未至州有五仙人騎五色羊負五榖而來今州庭上圖之為瑞尺書雙鯉空慙寄驛之情見前代回趙市舶伯鳳奏課分符乘軺司舶候風入貢固常聚蠻越之珍韓文海外雜國若耽浮羅流求毛人夷亶之州林邑扶南真臘于陀利之屬東南際天地以萬數或時候風潮朝貢蠻胡賈人舶交海中酌水獻針要當試夷齊之飲見上條聞君亷甚職此宜哉恭惟某官蔚若宗英濟之世美再試絃歌之政所去見思一陶襦袴之功不嚴而治並見前惟時嶺外交貨海中見上文然商賈算至舟車漢非得已食貨志非吏北者三老北邉騎士軺車一算商賈人軺車二算船丈五以上一算匿不自占占不悉戍邉一嵗沒入緡錢有能告者以其半畀之若犀珠賄及僕𨽻唐已病之韓文孔戣墓志犀珠磊落賄及僕𨽻公皆罷之今大夫不務富其家韓文使大夫恆無變其初無務富其家而饑其師則行旅必願出於市得人如此通國稱之某雖縻於兹行引而去露螢不暖安得照十二乘之車潘嶽螢火賦啖朝露於曠野李百藥咏螢詩不辭逢露濕祗為重宵行梁元帝咏螢火詩著人疑不熱集草訝無煙史記魏王謂齊威王曰若寡人國小尚有徑寸之珠照車前後十二乘檣燕語留聊復答咫尺書之便杜詩岸花飛送酒檣燕語留人四六標準卷二十三
