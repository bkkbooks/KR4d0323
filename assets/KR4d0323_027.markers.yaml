  - {type: variant, offset: 30358, length: 364, content: 王濬傳濬夢懸三刀於屋梁上須㬰又益一刀意甚惡之主簿李毅賀曰三刀為州字又益一者明府其臨益州乎岑參詩刀州先入夢李端詩夜夢見刀州雍陶詩今宵難作刀州夢張華傳初吳未滅斗牛之間常有紫氣道術者皆以吳方强盛未可圖惟華以為不然及吳平紫氣愈明華聞豫章人雷煥妙達緯象乃要煥登樓仰觀煥曰寳劒之精上徹于天耳因問在何郡煥曰在豫章豐城華即補煥為豐城令煥到縣掘地得雙劒一以送華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰靈異之物終當化去不永為人佩也華報書曰詳觀劒文乃干将也莫邪何復不至雖然天生神物終當合耳華誅失劒所在煥卒子華為州從事持劒經延平津劒忽於腰間躍出墮水使人取之見雙龍蟠縈有文章於是失劒華歎曰先君化去之言張公終合之論此其騐乎交劎潭在今南平縣治東東溪自建溪来西溪邵武順昌沙縣来合流於此即劒躍之所唐歐陽詹詩想像精靈欲見難通津一去水漫漫空餘昔日淩霜色長與澄潭生畫寒, SBCK: ''}
