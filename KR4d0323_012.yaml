body:
  text: 四六標準卷十二宋李劉撰謝惠詩文謝張祕校晉臣投詩並代月湖蒙以契家之舊栁子厚送崔羣序豫於崔君有通家之舊外黨之睦贈之佳句之新杜詩每於百僚上猥誦佳句新又為人性僻耽佳句昔人三百篇世寡和矣史記古詩三千篇孔子刪取三百五篇皆絃歌以合韶武之音文選是其曲彌髙其和彌寡栁文深寡和之憤積無徒之歎古詩十九首君突過之古詩十九首青青西北涉江迢迢東城明月六首或作枚乘冉冉驅車二首入樂府以下諸詩並係漢人而失其名或云建安中曹王所製也杜詩再聞誦新作突過黃初詩但深巾笥之藏莊子王巾笥而藏之莫效䄡䄖之報見前謝汪祕校惠詩方味大篇韓文寥寂乎短章舂容乎大篇又叨長句叨他刀切說文貪也杜詩近來海內為長句汝與山東李白好冠切雲佩明月正自不凡屈原九章余幼愛此竒服兮年既老而不衰帶長鋏之陸離兮冠切雲之崔巍被明月兮佩寶璐世汚濁而莫豫知吾方髙馳而不顧先賢傳薛勤造陳仲舉其父出迎勤曰足下有不凡子吾來候之不從卿也濟白水登閬風居然相導屈原離騷經吾將濟于白水兮登閬風而緤馬忽反顧以流涕兮哀髙邱之無汝白水神泉也閬風仙山也詩居然生子恭惟某官抱負竒志後儒林傳莫不抱負墳策雲㑹京師屈指壯圗屈通作詘荀子詘五指而頓之陳湯傳詘指計其日曰不出五日當有吉語聞陸機文雄心摧於弱情壯圗終於衰志杜詩居然屈壯圗文采離離猶可和其聲而鳴國家之盛禮記省其文采韋元成傳守正持重不及父賢而文采過之杜詩文采風流今尚存詩其桐其椅其實離離毛傳華也疏云其子實離離然垂而繁多張衡傳曵雲旗之離離兮韓文抑不知天將和其聲而使鳴國家之盛邪抑將窮餓其身思愁其心腸而使自鳴其不幸耶詩律坎坎何至虛其腹而藏天地之愁王粲流落荆南多有名士日問詩律杜詩詩律羣公問詩坎坎鼓我蹲蹲舞我坎坎擊鼓聲老子虛其心實其腹庾信詩誰知一寸心盛此萬斛愁仲長統詩寄愁天上埋愁地下子亦來見我乎僕未有可師者栁文僕道不篤業甚淺近環顧其中未見可師者參橫月落不堪喚夢于羅浮龍城録隋開皇中趙師雄遷羅浮一日天寒日暮於梅林間酒肆傍舍見美人淡粧素服出迎時已昏黑殘雪未消月色微明師雄與叩酒家門共飲酒寢但覺風寒相襲久之東方已白起視在大梅樹下月落參橫但惆悵而已容齊隨筆云今人梅花詞多用參橫二字蓋出龍城録所載趙師雄事然此實妄書或以為劉燾無言所作也其語云東方已明起視大梅花樹下月落參橫且以夜半視之黃昏時參已見至于夜則西沒矣安得將旦而橫乎秦少游詩月落參橫畫角哀承此誤也唯東坡詩云云乃為精當東坡詩羅浮山下梅花村玉雪為骨氷為魂紛紛初疑月掛樹耿耿獨與參橫昏山谷詩為公喚起黃州夢獨載扁舟向五湖目擊道存何必相期於汗漫莊子若夫人者目擊而道存矣亦不可以客聲矣淮南子盧敖遊乎北海見一士焉方倦龜殼而食蛤蜊盧敖與之語曰子殆可與敖為友乎若士者番然而笑曰嘻子中州之民寧肯而逺至此若我南遊乎岡㝗之野北息乎沉墨之鄉西窮窅冥之黨東開鴻濛之光吾與汗漫期于九垓之外吾不可久駐若士舉臂而竦身遂入雲中盧敖仰而望之弗見悖若有喪也曰吾比夫子猶黃鵠與壤蟲也區區𠂻曲續續靣陳並見前回陸監鎮子遹惠詩宋有監鎮官黃庭堅監德州德安鎮召為校書郎為神宗實録檢討官今早特勤古風見畀山谷詩伯倫酒德無人頌太白詩名有古風句有家法信他日之聞詩徐昉傳博士弟子皆以意說不修家法儒林傳各以家法教授山谷詩小謝有家法老無喜機羡故人之有子恭惟某官爽貫眉目陳後山詩津津爽氣貫眉目十五男兒萬里身筆下倒傾三峽水胸中别作一家春僧慧洪詩眉間爽氣照秋色山水頓覺生精神清入肝脾僧貫休詩乾坤有清氣散入詩人脾聖賢有清風不在惡木枝韓詩功能喻其誠深淺抽肝脾昌黎門庭未見金根之誤韓昶昌黎之子誤改金根車為金銀詳見前杜陵衣鉢僅存玉案之吟杜陵示武宗詩覔句新知律攤書解滿床試吟青玉案莫帶紫羅囊郎君于此勉之應休璉書外嘉郎君謙下之德杜詩郎君玉樹髙注古稱貴人之子及嘗事其父者曰郎君東坡詩又見郎君白髮新注古人識其父而又識其子則謂為郎君如李義山與令狐綯詩郎君官貴施行馬是也信陵君傳公子勉之矣放翁為不亡矣宋陸游字務觀號放翁佃之孫也蚤有文名為秦檜所嫉檜死始為寧德主簿孝宗時擢編修官後知夔嚴二州皆有令聞終寶章閣待制某幸蒙委重韓文若以義請而強委重焉愧乏報嘉欲爼豆豫我久周旋寧作我莊子今以畏壘之細民而竊竊焉欲爼豆豫於賢人之間我其杓之人耶殷浩傳浩少與桓溫齊名而每心競溫嘗問浩曰君何如我浩曰我與我周旋久寧作我也願金玉汝君家所有更贈君詩母金玉爾音山谷詩我提飬生之四印君家所有更贈君謝林祕校李熊投詩伏勤枉顧寵賁名篇曾前惠之未酬已後章之洊至洊通作臶重也廣韻再至也易水洊至雪巢有子不孤珠玉之編宋林憲字景思號雪巢東魯人初寓吳興從徐度游後寓臨海為人髙尚詩清淡五言四韻古句尤佳殆逼陶謝梁溪尤延之誠齊楊廷秀皆為之序且為雪巢賦及記有雪巢小集二卷行于世誠齊序略曰延之謂景思詩似唐人信矣然至如桃花飛後楊花飛楊花飛後無可飛天空霜無影等句超出詩人凖繩之外其遐不可追其出不可跂矣使李太白在必笑領此句也似唐人而已乎雪巢賦略云天台林君景思之廬字以雪巢尤延之為之作記廬陵楊廷秀為賦之云巢成雪至雪與巢㑹式瑶我室式珠我廨空無一埃㸃我勝槩自今匪仙客其勿迎匪詩人其勿對乃大書其楣曰雪巢標俗子出諸大門之外李詩咳唾落九天隨風生珠玉山谷詩使君忽來吐珠玉月湖無詩可作瓊琚之報月湖何異别號宋史稱其髙自標致有詩名所著月湖集行于世詩投我以木瓜報之以瓊琚聊以數語寫此寸誠謝盛登仕夢弼長書寵示長箋就貽大册非至篤好何能多如是耶昌黎送浮屠文暢師序解其裝得所得叙詩纍百餘篇非至篤好其何能致多如是耶所謂立言亦甚似而幾矣昌黎與李翊書生所謂立言者是也生所為與所期者甚似而幾矣抑不知生之意蘄勝於人而取於人耶將蘄至于古之立言者耶愧乏襜褕之報徒深巾笥之藏並見前謝許新恩裕惠詩茲勤嘉句良感髙情或疑年使之年此事可念左傳晉悼公夫人食輿人之城杞者絳縣人或年長矣無子而往與于食有與疑年使之年言同食者疑此老之年使自言其年以吾老及人老何力可施徒參患腳之禪墨莊漫録東坡在黃州陳慥季常在岐亭時相往來季常喜談飬生自謂吐納有所得後季常因病公以書戲之云公飬生之效有成績今又病彌月雖使臯陶聽之未易平反公之飬生正如小子之圎覺可謂害腳法師鸚鵡禪五通氣毬黃門妾也莫救旋渦之佛宋王栐燕翼詒謀録云近世目宰屬樞屬官為旋渦人不以為樂其人主親擢則又有跳出旋渦之號頗恃以自矜矣按旋渦佛蓋當時謔語謝蘇祕校丙杜門具奏方此乞骸司馬相如傳為杜門不出文選退守邱塋杜門不出疏廣傳上疏乞骸骨叩户論詩失於倒屣屣或作屣履不躡跟說文舞履也徐曰謂足跟不正納履也雋不疑傳屣履起迎師古曰履不著跟曵之而行言其遽也魏志王粲傳粲徙長安左中郎將蔡雍見而竒之時雍才學顯著貴重朝廷車騎填巷賔客盈坐聞粲在門倒屣迎之恭惟某官長材素藴世說太傅府有三才劉慶孫長才餘事清吟韓詩餘事作詩人王荊公餘事文章海外傳觀秋月之兩章杜詩兩章對秋月一字偕華星羡春雲之多態韓詩君詩多態度藹藹春空雲天未喪斯文也復聞永嘉之音衛玠傳王敦鎮豫章長史謝鯤先雅重玠相見欣然言論彌月敦謂鯤曰昔王嗣輔吐金聲於中朝此子復玉振於江表微言之緒絶而復續不意永嘉之末復聞正始之音何平叔若在當復絶倒永嘉晋孝惠帝年號正始魏髙貴鄉公年號子亦來見我乎應認江西之𣲖苕溪漁隱吕居仁近時以詩得名自言傳衣於江西嘗作宗派圖自豫章以降列陳師道潘大臨謝逸洪芻饒節僧祖可徐俯洪朋林敏修洪炎汪革李錞韓駒李彭眺冲之江端本楊符謝邁夏倪林敏政潘大觀何顗王直方僧善權髙荷合二十五人以為法嗣謂其源流皆出于豫章也豫章謂山谷吕居仁集歌詩至豫章始大出而學者同作共和録其名曰江西宗派以其源流皆出豫章也其次曰陳無已潘邠老謝無逸洪龜父饒德操何正平徐師川林子仁洪玉父汪信民李希聲韓子蒼李商老眺師川正平曰吾乃居行間乎韓子蒼云我自學古人夏均父又以在下列為耻某亦聿既耄禮八十九十曰髦詩借曰未知亦聿既髦兆足以行贈我緑綺琴乏雙南之報答白帖司馬相如有緑綺琴從卓氏奏鳯求凰張載擬四愁詩美人贈我緑綺琴何以報之雙南金乞君飛霞佩請萬里之頡頏乞音氣說文與也廣韻與人物也朱買臣傳吏卒更乞丐之韓詩乞君飛霞佩與我髙頡頏回程監丞凖茲勤真蹟談賔録開元十六年五月內出二王真蹟及張芝張昶等書一百六十卷付集賢院加貺名篇對秋月之兩章見春雲之多態見上條為施多矣無謝可乎恭惟某官一世典刑詩雖無老成人尚有典刑三朝夀雋雋亦作俊尚書罔克耆夀俊在厥服雖老子婆娑自安于橘顆說文婆娑舞也詩市也婆娑又衣貌思元賦修初服之婆娑曹植文老萊婆娑于林窟班彪西征賦登障隧而遙望兮聊須臾以婆娑陶侃傳侃遜位歸國謂司馬王􅀢期曰老子婆娑正生諸君輩杜詩方知不才者生事漫婆娑陳後山詩西歸端著便老子不婆娑元怪録有巴卭人家有橘園霜後諸橘盡收餘二大橘剖開每橘有二老叟相對象戲談笑但與决賭訖一叟曰君輸我海龍王第七女髮十兩智瓊額黃十二枝紫絹帔一幅絳臺山霞實散二劑一叟曰君輸我瀛洲玉塵九斛阿母療髓凝酒四鍾阿母女熊盈娘子躋虗龍縞襪八兩後日于王先生青城草堂還我耳又一叟曰王先生許我來竟待不得一叟曰僕饑虗矣須龍根脯食之即于袖中抽出一草宛轉如龍因削食之隨削復滿以水噀之化為一龍四叟共乘之而去互見前而是翁矍鑠猶可以蒲輪馬援傳矍鑠哉是翁也注矍鑠勇貌枚乘傳以安車蒲輪徴乘師古曰蒲輪以蒲裹輪雖知幽桂之遺榛菅菅居顔切說文茅也韓詩稱多量少鍳裁密豈念幽桂遺榛菅詳見前坐令積雪之困桃李栁詩坐令宫樹無顔色東坡詩積雪困桃李春心誰為客咀氷嚼玉戲刻畫于無鹽劉思真醜婦賦暗鈍拙梳髻刻畫又更醜無鹽邑名地里志東平郡之縣在今鄆州之東劉向列女傳齊鍾離春齊無鹽邑女宣王之正后也其為人極醜無雙凹頭深目長肚大節卬鼻結㗋肥項少髮折腰出胸皮膚若漆行年四十無所容入衒嫁不售于是拂拭短褐自謁宣王願備後宫宣王納之為后周顗傳庾亮嘗謂顗曰諸人咸以君方樂廣顗曰何乃刻畫無鹽唐突西施也互見前洗盞傾樽巧噤吟于唐舉盞阻限切說文爵也一曰酒濁而微清也禮記醴盞在户注云盞與盎蓋同物也集韻杯也揚雄解嘲范雎以折摺而危穰侯蔡澤雖噤吟而笑唐舉師古曰噤吟頷頥之貌噤巨錦反吟魚錦反史記蔡澤者燕人也遊學于諸矦小大甚衆不遇而從唐舉相唐舉熟視而笑曰先生曷鼻巨肩魋顔蹙齃膝攣吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自有吾所不知者夀也唐舉曰先生之壽從今以往者四十三嵗蔡澤笑謝而去謂其御者曰吾持粱齧肥躍馬疾驅懷黃金之印結紫綬于要揖讓人主之前食肉富貴四十三年足矣惠而好我見前何以報公某久倚長松竟成小草山谷詩青松出澗壑千里聞風聲小草有逺志相依在平生借君詩而消永夜自不成眠東坡夜直玉堂讀李端叔詩書其後云玉堂清冷不成眠伴直難呼孟浩然暫借君詩消永夜每逢佳處輒參禪愁侵滴研初含凍喜入燈花欲鬪妍寄語君家小兒子他時此句一時編期吾王之召將軍更宜善飯史記亷頗傳趙王思復得亷頗使使者視頗尚可用否趙使還報曰亷將軍雖老尚善飯然與臣坐頃之三遺矢矣王以為老遂不召謝朱新恩遜投書比辱訪存特勤書貺雖過情之可恥然荷意則甚勤恭惟某官學踵乃翁氣吞餘子東坡詩氣吞餘子無全目詩到諸郎尚絶倫襟懷磊落不專紙上之蟲魚韓詩爾雅注蟲魚定非磊落人又開緘忽覩送歸作字向紙上皆軒昂孟東野詩春雲生紙上新唐書儒林傳徐曠字文逺時耆儒沈重講學授業徐曠從之質問不數日辭去或問其故曰先生所說紙上語爾若奧境彼有所未見者談笑從容遂蹙草中之狐兔杜詩草中狐兔盡何益東坡詩草中狐兔不須驚當季康子患盜之日正班定逺封侯之時班超傳超為人有逺志不修細飾嘗為官傭書輟業投筆歎曰大丈夫無他志略猶當效傅介子張騫立功異域以取封矦安能久事筆研間乎其後行詣相者指曰祭酒布衣諸生耳而當萬里封矦之外超問其狀相者指曰生燕頷虎頸飛而食肉此萬里封矦相也超立功西域封定逺侯食千戶乃援古人以方我輩晋書桓溫問劉真長曰㑹稽王惔更進耶劉曰極進然是第二流人桓曰第一流人是誰曰正在我輩又王衍喪子悲甚山簡曰孩抱中物何至于此衍曰聖人忘情最下不及情情之所鍾正在我輩又孫綽作天台賦成以示范榮期云卿試擲地當作金石聲榮期曰恐此金石非中宫商然每至佳句輒云應是我輩語又許允謂石苞曰卿是我輩人舊唐書劉蕡傳時登科者二十二人考官不敢留蕡在籍中登科人李郤語人曰劉蕡不第我輩登科實厚顔矣一之為甚左傳一之為甚其可再乎四者難并謝靈運擬魏太子鄴中集詩序天下良辰美景賞心樂事四者難并人豈不自知耶今願竊有復也禮記若有告者曰少間願有復也殺賊奴取金印何待來年見前紀威德勒燕然更期他日後漢書竇憲傳溫犢日逐等八十一部率衆降憲秉遂登燕然山刻石勒功紀漢威德令班固作銘唐書安北大都護府夲燕然都護府謝吉州楊司里彭年惠詩吉州見後太守類此勤三顧出師表三顧臣于草廬之中南史袁昂傳明帝謂昂曰我昔以卿有美名親往相詣昂答曰陛下在田之日遂䝉三顧草廬杜詩三顧頻煩天下計寵惠六詩束晳有補亡六詩巧刻畫于無鹽見前條力扶持于夜燎陳後山詩人言我語勝黃語扶竪夜燎齊朝光不知所報左傳君不任受怨臣亦不任受德無怨無德不知所報當贈以言荀子贈人以言重于金石珠玉觀人以言美于黼黻文章聽人之言樂于鍾鼓琴瑟說苑贈人以軒不若贈人以言恭惟某官自策英躔吳都賦未知英雄之所躔也宜收名第韓詩連年收科第青衫白首氣硉兀而未降東坡詩青衫莫厭百僚底白首上有千薪積韻㑹硉兀石崖也栁文蕩突硉兀注危石也歐詩青雲白日有深趣其氣硉兀何由降丹筆墨曹翅翩翻而方展㑹稽典録盛吉為廷尉性多仁恕務在哀矜每至冬月罪囚當斷其妻執燭吉手丹筆夫妻相向垂涕杜氏通典兩漢有决曹賊曹掾主刑法歷代皆有或謂之賊曹或為法曹或為墨曹髙適詩鴻雁來翩翻不謂睡龍之寶莊子千金之珠必在九重之淵驪龍頷下子得之必遭其睡也猥加羅雀之門鄭當時傳邳下翟公為廷尉賔客填門及廢門外可張爵羅師古曰言寂靜無人行也銜杯酒接殷勤且承至止司馬遷傳僕與李陵俱居門下素非相善也趣舍異路未嘗􅔷杯酒接殷勤之歡遣一介奉咫尺更幸亮之韓信傳發一乘之使奉咫尺之書孔融書馳一介之使加咫尺之書謝周祕校噩之惠梅詩叢桂移文問周倫之好在淮南招隱士桂樹叢生兮山之幽偃蹇卷兮枝相繚宋周顒字彥倫初隱北山後出為山隂令秩滿入京後經此山孔稚圭移文絶之略云誘我松桂欺我雲壑又云秋桂遣風春蘿罷月文多不載杜詩因君問消息好在阮元瑜白樂天詩好在李使君官梅動興笑何遜之重來杜詩注何遜任揚州法曹廨舍有梅花一株吟詠其下後居洛思之再請其任抵揚州花方盛開對花倣徨終日不能去楊升菴丹鉛總録云杜工部和裴迪登州東亭送客逢早梅相憶見寄詩云東閣官梅動詩興還如何遜在揚州按遜傳無揚州事而遜集亦無揚州梅花詩但有早梅詩云枝橫却月觀花繞凌風臺云云杜公以裴迪逢早梅而作詩故用何遜比之又以却月凌風皆揚州臺觀名耳所謂東閣官梅乃新津之地非揚州有東閣也宋有妄人假東坡名作杜詩注一時爭尚杜詩而坡公名重天下人爭傳之不知其僞也何遜未嘗為揚州法曹是時南北分裂遜為梁臣何由得居洛陽洛陽魏地也既居魏何得又請再任于梁乎其說之無稽如此宋世洪容齊嚴滄浪劉須溪馬端臨皆力辨其僞而近世文章巨公邵文莊乃獨信之可怪也宋張邦基墨莊漫録云人多不詳遜在揚州之說按别本遜東海剡人南平王為中權將軍揚州刺史擁篲分庭愛客接士東閣一開競收揚馬左席皆啓爭趍鄒枚君以詞藝早聞故加親禮引為水部行參軍事仍掌文記室乃知何遜曾在揚州也非吾之故人耶所見者今我也東坡答李端叔書謫居無事默自觀省回視三十年以來所為多其病者足下所見皆故我非今我也無乃聞其聲而不考其情取其華而遺其實乎今按釋惠淨云無常者故吾去也緣起者新吾來也故吾去矣吾豈當乎新吾來矣吾豈斷乎故我今我蓋本于此恭惟某官城市大隱文選小隱隱陵藪大隱隱朝市白樂天詩大隱在朝市小隱入邱樊邱樊太冷落朝市太囂喧不如作中隱隱作留司官山澤真臞司馬相如傳列仙之儒居山澤間形容甚臞此非帝王之仙意也爾雅臞瘠也說文少肉也拍洪崖揖浮邱疑遊八極郭璞逰仙詩左挹浮邱袖右拍洪崖肩列仙傳王子喬好吹笙作鳯凰鳴逰伊洛之間道士浮邱公接以上嵩山神仙傳漢儀鳯二年八月武帝聞居殿上忽有一人從天而下帝問為誰答曰吾中山衛叔卿也帝曰子若是中山人乃朕臣也叔卿默焉不應忽不知所在帝遣使者與其子度世求尋其父至太華山望見其父與數人博戲于石上度世問為誰叔卿曰洪崖先生許由巢父大低公飛黃子王子晋薛容耳莊子夫至人者上窺青天下潜黃淵麾斥八極神氣不變淮南地形訓天地之間九州八極人間訓周八極隱一管召鄒生延枚叟又客諸侯謝惠連雪賦置甘酒㑹賔友召鄒生延枚叟范雎傳穰侯專秦權惡內諸侯客謂王稽曰謁君得無與諸侯客子俱來乎杜詩早作諸侯客茲辱顧存說文存恤問也嚴助傳使重臣臨存師古曰存謂省問之未遑仰肅禮記主人肅客而入注進也疏進謂先導之也吕氏曰俯首以揖之所謂肅拜也終然不可口過勤黃山谷之詩山谷上東坡詩江梅有佳實託根桃李場終然不可口擲置官道傍莊子三皇五帝之禮義法度其猶柤梨橘柚耶其味相反而皆可于口殊不類其人殆似宋廣平之賦皮日休桃花賦序余嘗慕宋廣平之為相貞姿徑質剛態毅狀疑其鐵腸石心不解吐婉媚辭然覩其文而有梅花賦清便富艷得南朝徐庾體殊不類其為人也某甚安斗食戰國策自斗食以上至尉內使及王左右史記始皇紀斗食以下注一日得斗粟為料焉用鼎羮尚書若作和羮爾惟鹽梅月落參橫荷喚起羅浮之夢山谷詩感君詩句喚夢覺邯鄲初未熟黃梁又為公喚起黃州夢一葉扁舟向五湖詳見謝汪祕校條水邉雪後願更續和靖之篇林和靖梅花詩吟懷長恨負芳時為見梅花輒入詩雪後園林惟半樹水邉籬落忽橫枝人憐紅艷多應俗天與清香似有私堪笑羌兒亦風味醉將聲調角中吹謝㑹稽趙宰善韞㑹稽本秦山隂縣地漢晋以後因之陳析置㑹稽縣隋以山隂縣省入唐復置山隂縣屬越州宋㑹稽與山隂二縣並治郭下今因之委刺見臨書姓名于奏白曰刺禰衡傳刺字漫滅髙彪傳覆刺遺馬融書井丹傳性清髙未嘗修刺候人魏志注夏侯榮幼聰惠文帝聞而請焉賔客百餘人人奏一刺書其鄉邑名字所謂爵里刺也一客示之一寓目使之遍談不謬一人袖書為贄韓文文書􅔷袖惟是事契之有素豈假文字而後明韓文與足下情義寧須言而後自明耶恭惟某官仕有長才政多善狀杜延年傳甚亡狀師古曰無善狀製劔池釀丹井久樂林居劔池在虎邱山丹井在常熟縣相傳漢天師孫張道裕煉丹處豫章亦有許真君劔池洪崖丹井未詳所指探禹穴上㑹稽猶須瓜戌司馬遷傳上㑹稽探禹穴窺九疑浮沅湘北涉汶泗師古曰㑹稽山名本茅山也禹于此㑹諸矦之訃因曰㑹稽張晏曰禹巡狩至㑹稽而崩因葬焉上有孔穴民間云禹入此穴雖淵明不辭五斗之屈然士元豈是百里之才並見前兆足以行改之為貴改謂改官此借用某緬懷先契幸及英遊主司疑則辨之此情可亮韓文此四子皆可以當執事首薦而極論者主司疑焉則以辨之問焉則以告之未知焉則殷勤而語之期乎有成而後止可也相國知之至矣何說之云韓文相國之知至矣又其何說之辭謝石祕校巖比勤下顧寵示髙文西京雜記廟廊之下朝廷之中髙文典册用相如贈盈把之瓊瑶拜嘉已腆韓詩外傳盈把之木無合拱之枝杜詩浩歌淚盈把又盈把那須滄海珠入懷本倚崑山玉詩報之以瓊瑶左傳鹿鳴所以嘉寡君也敢不拜嘉栁詩丹墀共拜嘉列成編之鍾磬取數何多三禮圗凡鍾十六枚同為一簨虡為編鍾磬十六枚同一筍虞謂之編磬禮記取數多者仁也恭惟某官水北名聲韓詩水北山人得名聲去年去作幕下士水南山人又繼往鞍馬僕從塞閭里詳下文山西家世辛慶忌傳秦漢以來山東出相山西出將恥懷繃之簮笏韓詩簮笏自懷繃詳見前服韋布之縑緗栁文具筆札拂縑緗贊揚大功縑緗謂書帙唐四庫書縹囊緗帙梁書王僧孺傳含吐緗縹之上翩躚樽爼之側昭明太子傳遍該緗素殫極邱墳昭明太子詠書秩詩幸雜緗囊用聊因班女織晋中興書傳元盛書有青縑袠布袠絹袠江總陶貞白集序校之鉛墨緘以緹緗傖父機雲欲上窺于姚姒傖鋤庚切吳人罵楚人曰傖晋陽秋吳謂中州人曰傖左思傳初陸機入洛欲作三都賦聞思作之撫掌而笑與弟雲書曰此間有傖父欲作三都賦須其成當以覆酒甕耳韓文上規姚姒渾渾無涯衙官屈宋肯平到于隂何新唐書杜審言傳嘗語人曰吾文章當得屈宋作衙官吾筆當得王羲之北靣其矜誕如此杜詩熟知二謝將能事頗學隂何苦用心王荊公詩因得擬隂何山谷詩灰𠂻撥隂何又詩才法度迫隂何陳後山詩崔蔡論文不足多新詩平處到隂何隂謂隂鏗字子堅武威姑臧人善五言詩為時所重為梁湘東王法曹參軍纍遷散騎常侍何謂何遜字仲言宋何承天孫起家奉朝請南平王引為記室薦之武帝與吳筠俱進幸藉少低建隆之功勳建隆宋太祖年號石守信浚儀人仕周為鎮南軍節度使宋纍加中書令河南尹封衛國公卒贈武威郡王諡武烈足可備慶厯之諫議慶厯宋仁宗年號石介奉符人進士及第躬耕徂徠山魯人號徂徠先生除國子監直講進慶歷聖德頌時用歐陽修余靖蔡襄王素為諫官號慶歷四諫公等安在主父偃傳公皆安在何相見之晚也吾道非耶家語匪兕匪虎率彼曠野吾道非耶奚為至于此遺我明珠皆照骨而映驪目韓詩遺我明珠九十六寒光照骨映驪目乞君飛佩㑹刺手而拔鯨牙韓詩我願生兩翅捕逐出八荒精誠忽交通百怪入我腸刺手拔鯨牙舉瓢酌天漿騰身跨汗漫不著織女襄顧語地上友經營無太忙乞君飛霞佩與我髙頡頏注魏道輔云髙至于酌天漿幽至于拔鯨牙其思賾深逺如此詎止于曹劉沈宋之間耶某得非所蒙陳後山詩呼我過其廬所得非所䝉願竊有復見前文章小技計已空處士之羣杜詩文章一小技韓文伯樂一過冀北之野而馬羣遂空非無馬也無良馬也大夫烏公以鈇鉞鎮河陽之三月以石生為才以禮為羅羅而致之幕下未數月也以溫生為才以禮為羅又羅而致之幕下若是而稱曰大夫烏公一鎮河陽而東都處士之廬無人焉豈不可也節誼大間願不替純臣之教新唐書卓行傳贊節誼天下大間士不可不勉左傳石厚問定君于石子石子曰王覲為可若朝陳使請而必可得也厚從州吁如陳石碏使告于陳曰此二人者實弒寡君敢即圗之陳人執之而請涖于衛衛使右宰醜涖殺州吁石碏使其宰獳羊肩涖殺石厚君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎代月湖回劉進士日起惠書及封事藁惠以長書將之奏藁一介而言天下古亦有之新唐書馬周傳贊周之遇太宗顧不異哉由一介草茅言天下事若素宦于朝明習憲章者非王佐才疇以及兹其自視與築巖釣渭亦何以異十漸之當帝心人誰辦此新唐書魏徴傳徴自以不世遇乃展盡底藴無所隱凡二百餘奏無不剴切當帝心者貞觀十三年自冬至五月不雨徴上疏極言不克終十漸文多不載恭惟某人山澤志士畎畝忠臣范希文之居憂不忘國計言行録范文正公服中上宰相書言朝政得失民間利病凡萬餘言王曾見而偉之晏殊荐為館職詳見第一卷張齊賢之獻策㑹即靣陳言行録太祖幸西都齊賢以布衣獻策太祖召至便坐令靣陳其事文定以手畫地條陳十策內四說稱㫖文定固執其六說皆善太祖怒令武士拽出及車駕還京謂太宗曰我幸西都唯得一張齊賢耳某久已語離忽勤言贈吾愧之不敢恨也徒抱朝饑欒城集潁濵遺老傳對入轍自謂必黜然考官司馬君實第以三等范景仁難之蔡君謨曰吾三司使也司㑹之言吾愧之而不敢怨惟胡武平以為不遜力請黜之上不許詩未見君子惄如調饑傳惄饑意也調朝也箋惄思也未見君子之時如朝饑之思食今按惄饑也釋言文李巡曰宿不食之饑也以宿不食故朝饑丹鉛續録云調韓詩作朝薛君采章句云朝饑最難忍其義晰矣毛詩作調本屬魯魚鄭氏求其說而不得乃云調音禱又改字作輖調饑也稠饑也輖饑也三者均之不通也不若朝饑為長焦氏易林云㑂如旦饑晋郭遐周詩云言别在斯須惄焉如朝饑漢晋去古未逺當得其實耳杜詩念子忍朝饑公安在何見晚耶佇觀暮召主父偃傳乃上書闕下朝奏暮召入見又上召見三人謂曰公皆安在何相見之晚也代衛參帥回謝祕校耘投詩詳啓意衛蓋以梨桃酒餉謝而謝投以詩遂復此啓寵投短刺就貺長篇梨非飣座之珍豈能抵玉新唐書崔逺有文而風致整峻世慕其為目曰飣座梨言席所珍也王充論衡崑山之旁以玉抵鵲彭蠡之濵以魚食犬鹽鐵論崑山之旁以玉璞抵烏鵲桃匪蟠枝之實敢辱報瓊山海經桃樹盤屈三千里十洲記東海有山名度索山有大桃樹屈盤數千里曰蟠桃東坡詩期君蟠桃枝千嵗終一嘗詩投我以木桃報之以瓊琚至於濁醪江淹賦濁醪夕飲素琴晨張髙適詩黃花隨濁醪杜詩濁醪有妙理亦如惡札不敢詠酌君之語山谷詩酌君以蒲城桑落之酒乃先辱啓豫之詩杜詩休煩獨啓豫韓詩先惠髙文謝啓豫孟東野詩今乃實啓豫東坡詩何人為啓豫山谷詩還有新詩來啓豫占此奉酬占章艷切隱度其辭口以受人曰口占朱博傳口占檄文陳遵傳憑几口占察之良幸回吳教授投啓和詩伏勤巧思思相吏切蜀志武侯傳性長于巧思南史張永傳永涉獵詩史能為詩文又有巧思見和拙詩和胡臥切細窺明月之兩章備見春雲之多態見前迫斯可以見矣敢疑識靣之遲忠焉能勿誨乎安用過情之譽代回朱上舍中有宋史選舉志凡學皆肄國子監國子生以京朝七品以上子孫為之初無定員後以二百人為額太學生以八品以下子弟若無人之俊異者為之及三舍法行則太學始定置外舍生二千人內舍生三百人上舍生百人歲時月各有試程其藝能以若次升舍餉以新詩餉式亮切說文餉也爾雅饋也杜詩新詩句句好應任老夫傳儐之舊藁儐必仞切說文導也蕭然四立之壁司馬相如傳家徒四壁立師古曰徒空也但有四壁更無資産得此兼乘之珠史記魏王謂齊威王曰若寡人國小尚有徑寸之珠照車前後十二乘藏弆為榮不知所報見前恭惟某人胸蟠古學手抉天章東坡詩手抉雲漢分天章兹遙賦于髙唐宋玉神女賦楚襄王與宋玉遊于雲夢之浦使玉賦髙唐之事其夜王寢夢與神女遇云云已洗空于下蔡宋玉登徒子好色賦嫣然一笑惑陽城迷下蔡注蔡國今上蔡縣後遷州來故以州來為下蔡詳味三四篇之健語載觀十九首之遺音見前失餘子于牛毛莊子夀陵餘子禰衡傳衡善孔融及楊修嘗曰大兒孔文舉小兒楊德祖餘子碌碌莫足數也晋書或問人之相去如九牛毛寧有是乎華談曰昔者許巢讓天子之貴市道小人爭半錢之利此之相去何啻九牛毛東坡詩乃知賢逹于愚陋豈直相去九牛毛山谷詩去來何有校牛毛發寒光于驪目韓詩寒光照骨映驪目惠而好我見前雋甚迫人謝安傳安弱冠詣王濛清言良久既去濛子修曰向客何如大人濛曰此客亹亹為來逼人某愛莫助之見前顔之厚矣詩巧言如簧顔之厚矣箋云顔之厚者出言虛僞而不知慙于人開張篋笥諒無須津筏之求韓詩開張篋中寶自可得津筏劃豁垠崖所願見琳琅之取韓詩想當施手時巨刃磨天揚垠崖劃崩豁乾坤擺雷硠平生千萬篇金薤垂琳琅仙官敕六丁雷電下取將回新蘄春陳尉格惠詩西漢蘄春縣𨽻江夏郡三國時屬魏吳為蘄春郡晋以為縣屬弋陽郡東晋改蘄春為蘄陽縣避宣太后諱也北齊置齊昌郡及羅州後周改為蘄州隋廢為郡唐復為蘄州宋為蘄州治𨽻淮南西路今為蘄州𨽻黃州府昨日奉勤古風見惠論交既久陳義甚髙莊子屠羊說居處卑賤而陳義甚髙恭惟某官服襲典刑緒餘翰墨莊子道之真以治身其緒餘以為國家其土苴以治天下太邱遺愛多池上之鳯毛陳實傳再遷除大邱長修德清靜百姓以安杜詩欲知世掌絲綸美池上于今有鳯毛季方難為蓋眼中之犀角世說陳元方子長文有英才與季方子孝先各論其父功德不决咨于太邱太邱曰元方難為兄季方難為弟陳羣字長文紀之子陳忠字孝先諶之子東坡詩眼中犀角真吾子鄭語惡犀角豐盈而近頑童窮固注犀謂顔角有伏犀豐盈謂頰輔豐滿皆賢明之相也猶憐緑水紅蓮之舊客見前曾陪碧梧翠竹之英遊昌黎殿中少監馬君墓志退見少傅翠竹碧梧鸞鵠停峙能守其業者也枚乘傳與英俊並遊舂容大篇韓文舂容乎大篇刻畫老醜阮籍詩夕暮成老醜乞巧文獨溺臣心使甘老醜杜詩舉動見老醜又老醜難剪拂又自覺成老醜又親故傷老醜山谷詩兩鬢飄零成老醜陳後山詩時一過目驚老醜又疾置送詩驚老醜餘見前如猛起約世故之句顧不偉歟抑擇術無小用之言猶相憶否王何必假更為綵棒之淹儒果用真㑹復青氊之舊俱見前某過勤投璧鄒陽傳明月之珠夜光之璧以暗投人于道莫辦報瓊見前登樓而憶侍郎既無及矣杜詩風物悲遊子登臨憶侍郎今云登樓未詳指㕔而坐縣尉何幸見之回張上舍端道博我以文竊承嘉㑹漢書叙傳從容諷議博我以文師古曰博我以文謂以文章開博我也易嘉㑹足以合禮李陵詩嘉㑹難再遇三載為千秋愛人以德何至溢言禮記君子愛人以德莊子兩喜必有溢美之言又傳其常情無傳其溢言請以屬辭報其厚意恭惟某人勇髙六館韓文何蕃傳朱泚之亂太學諸生舉將從之來請起蕃蕃正色叱之六館之士不從亂者兹非其勇歟詳見前學綜九流見前觀其崇論谹議之間司馬相如傳必有崇論谹義創業垂統為萬世規師古曰谹深也音宏眇然深思長慮之計以道相與兹意甚深覺民之先此言何為至我董仲舒傳吾聞伐國不問仁人此言何為至于我哉任士之重所有更以贈君山谷詩君家所有更贈君某有幸納交願安承教凡是爼豆豫之意固已拜嘉莊子竊竊焉欲爼豆豫于賢人之間左傳鹿鳴所以嘉寡君也敢不拜嘉亦有金玉汝之情尚幾見亮幾舉豈切爾雅庶幾尚也注引詩不尚息焉疏云尚謂心所希望也禮記吾今日其庶幾乎注幾冀也回羅省元埀琳琅于金薤得所未曾韓詩金薤埀琳琅注金薤書也古有倒薤書琳琅石也言李杜文章播于金石曽音層從古囱字從田非經也又嘗也王荊公詩初知歡喜得未曾報瓊琚以木瓜闕然無有詩投我以木瓜報之以瓊琚敢修儷語略謝盛心恭惟某官蘭菊之家楩柟其質司馬相如傳楩柟豫章楩音便師古曰即今黃楩木也韻㑹木似豫章柟音南師古曰今所謂楠木說文梅也詩疏孫炎曰荊州曰梅揚州曰柟陸璣云梅皮葉似豫章豫章子青不可食柟葉大可三四葉木理細子赤者材堅子白者材脆一經接踵不難俯拾于紫青韋元成傳遺子黃金滿籯不如一經夏侯勝傳其取青紫如俯拾地芥耳師古曰青紫卿大夫之服也萬卷蟠胸安得長嘲于元白山谷詩胸蟠萬卷夜光寒筆倒三江墨滴乾又故衣未補新衣綻空蟠胸中書萬卷揚雄傳意者元得無尚白乎時來為耳張嘉貞傳宰相者時來則為非可長保南史膺時來之運東魏于謹四州縣之職昔人所鄙台鼎之位須待時來劉長卿詩勿謂州縣卑時來自為用詳見前人謂斯何韓文昔者人謂斯何今者人謂斯何有來秋月之兩章足見春雲之多態並見前然下有千歲苓之意雖東坡尚不敢當山谷上東坡古詩云青松出澗壑十里聞風聲上有百尺絲下有千嵗苓自性得久要為人制頽齡小草有逺志相依在平生醫和不並世深根且固蒂人言可醫國何用大早計小大材則殊氣味固相似東坡次韻云空山學仙子妄意笙簫聲千金得竒藥開視有豨苓不知市人中自有安期生今君已度世坐閲霜中蒂摩娑古銅人嵗月不可計䦘風安在哉要君相指似至向來一瓣香之恭惟南豐乃為無愧陳後山觀兖文忠公六一堂圗書詩向來一瓣香敬為曾南豐世雖嫡孫行名在惡子中某自知不武左傳勝之不武又以亂易整不武又仁而不武無能逹也難與斯文借聽于聾求道于盲正恐無益于賢者韓文是所謂借聽于聾求道于盲雖請之勤勤教之云云未見其有得者也加膏而光飬根而實其敢有愛于言乎韓文飬其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄又今吾子所為皆善矣謙謙若不足而以徴于愈愈又敢有愛于言乎回熊省元蒙正投贈漫刺下臨極慰仰髙之想禰衡傳乃隂懷一刺既而一無所之適至于刺字漫滅趙一傳仰髙希驥歷年滋多屬辭先賁能無投暗之疑見前恭惟某官學富家傳美宜世濟桑弧有志豈徒糊口于四方禮記子生男子設弧于門左又男子生桑弧蓬矢六以射天地四方天地四方男子之所有事也故必先有志于其所有事注弧音胡桑弧蓬矢取其質也左傳寡人有弟不能和協而使糊其口於四方糊口猶言寄食也蓽路何憂蓋將友士于千乘左傳蓽路藍縷以啓山林蓽音必蓽路柴車藍縷敝衣茲沐襜褕之贈但深巾衍之藏並見前某德愧多凉左傳虢多凉德凉薄也言多薄德之事官甘獨冷厚意慰跫然之喜何敢或忘跫音胸人行聲莊子聞人足音跫然而喜虛名誤賢者之來不知所報回徐殿幹暄投四六登畿入幕榮不掩慙顔延之詩結綬登王畿趨隅摳衣幸堪親教禮記摳衣趨隅必慎唯諾又兩手摳衣去齊尺甫諧望履莊子願望履幕下注言視不敢望其靣望履結而還也遄辱鳴謙見前藹然仁義之言既聞之矣韓文仁義之人其言藹如也豈以筋骨之禮望長者哉禮記老者不以筋骨為禮重勤四六之貽莫效萬分之報見前輒裁狂簡少謝髙明孔融傳髙明祖父嘗與僕有舊恩乎又髙明必為偉器代回張祕校子賢惠詩比勤謁入比必至切禮記比時具物注猶先時也儀禮既夕比奠注猶先也謁說文白也爾雅請也告也禮記士之子長曰能典謁矣注謂能賔贊出入以事請告也左傳唯我鄭國之有請謁焉史記酈生踵軍門上謁案劔叱使者使者跪而失謁拾謁還走入報謁于歇切尋辱詩來尋俄也史記尋復其舊良深感荷之情敢虛往復之義恭惟某官湖海豪氣陳登傳陳元龍湖海之士豪氣未除風雲壯懷韓詩風雲入壯懷泉石别幽耳諫批逆鱗昔嘗長太息者六史記韓非傳諫說之士不可不察愛憎之主而後說之矣夫龍之為蟲也可擾狎而騎也然其㗋下有逆鱗徑尺人有嬰之則必殺人人主亦有逆鱗說之者能無嬰人主之逆鱗則幾矣賈誼傳竊惟事勢可痛哭者一可為流涕者二可謂長太息者三工歌鳴鹿今將肄宵雅之三左傳工歌文王之三又不拜歌鹿鳴之三三拜注工樂人也禮記宵雅肄三官其始也注宵之言小也肄習也習小雅之三謂鹿鳴四牡皇皇者華也此皆君臣宴樂相勞苦之詩為始學者習之所以勸之以官且取上下相和厚得句驚人杜詩為人性僻耽佳句語不驚人死不休以文博我卿言大好能無夜光暗投之疑後漢司馬微不談人短美惡皆言好有人問徽安否答曰好有人自陳子死答曰大好妻責曰人以君有德故此相告何聞人子死反亦言好徽曰如卿之言亦大好餘見前民可小康當在朝奏暮召之後詩民亦勞止汔可小康汔音肸幾也今周民既罷勞矣王幾可以小安之乎餘見前回吳判院玭惠詩榮被新除寵貽佳句脫身枳棘來監公子之倉杜詩脫身事幽討又脫身簿尉中仇覽傳枳棘非鸞鳯所棲東坡詩但見東軒堪隱几不知公子是監倉回首芙蓉寧戀假王之印李文饒詩芙蓉客暫依劉夢得詩歸路芙蓉賦餘見前我厭朝班之綴杜詩幾回青瑣㸃朝班韓詩滌瑕蕩垢清朝班東坡詩他日許綴蓬萊班又豈意彤庭綴兩班公方故步之尋班固傳有學步于邯鄲者未得髣佛失其故步判院不比尋常惟當拭目楊修書觀者駭視而拭目唐書溫彥博進止詳華人皆拭目山莊原無呵殿更望埀情回屈學正投書詩屈音橘丞哉負余余負丞哉殊乏吟哦之伴見前長者絶子子絶長者抑何交際之遲振履鼎來鳴謙泰過履鼎謙泰四卦名恭惟某官莫敖華胄左傳楚屈瑕將盟二軫鄖人軍于蒲莫騷將與隨絞州蓼伐楚師莫敖患之敖楚官名即屈瑕也瑕受屈為客卿因以為氏正則故家離騷經名余曰正則兮字余曰靈均宗派江西識快閣千山之大快閣在泰和縣寺山谷送吕知常赴泰和丞詩觀山千尺夜泉落快閣六月江風寒登快閣詩癡兒了却公家事快閣東西倚晚晴落木千山天逺大澄江一道月分明朱絃已為佳人絶青眼聊因美酒橫萬里歸船㺯長笛此心吾與白鷗盟楊廷秀題快閣詩太史留題快閣詩舊碑未必是真題六丁搜出嚴家墨白日青天橫紫霓僑居東鄙開逺軒三尺之明栁文武岡銘黔巫東鄙蠻獠雜擾屈蓋僑寓武岡兹終素韠之祥詩庶見素韠兮我心藴結兮行奉丹墀之對夏竦詩從橫禮樂三千字獨對丹墀日未斜龍飛九五桑庚盍早于贏糧易乾九五飛龍在天利見大人莊子桑庚子曰今吾才小不足以化子子胡不南見老子南榮趎贏糧七日七夜至老子之所贏音盈方言儋也齊楚陳宋之間謂之贏一音果鵬擊三千子木何勞于𠂻甲莊子鵬之徙于南溟也水擊三千里左傳晋楚將盟于宋西門之外楚人𠂻甲伯州犁請釋甲子木曰晋楚無信久矣事利而已茍得志焉焉用有信𠂻甲謂穿甲在衣中將以襲晋子木楚令尹兹蒙布武禮記堂上接武堂下布武見賁雄文加之仁義之七篇華此蓬蒿之三徑三輔决録張仲蔚扶風人隱居不仕居平陵蓬蒿滿宅惟開一行徑續漢書蔣詡舍中三徑歸去來辭三徑就荒不知所報藏去為榮俱見前某為州治中通典治中從事史一人居中治事主衆曹文書用漢制也謝承後漢書陳禪為州治中從事世說習鑿齒吏才不常桓宣武器之未三十用為荊州治中在疆域內固恨何相見之晚也見前猶欲就有道而正焉友其士之仁子若無言幾失子左傳賈辛將適其縣見于魏子魏子曰辛來晋叔向適鄭鄭鬷蔑惡欲觀叔向從使之收器者而往堂下一言而善叔向執其手而上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已子若無言吾幾失子矣文以氣為主君家所有更贈君魏文帝典論文以氣為主氣之清濁有主不可以強而致譬諸古樂曲度雖均節度同檢至于引氣不齊巧拙有素雖有父兄不能以移子弟周書庾信傳夫文章之作本乎性情撮其指要舉其大抵莫若以氣為文以文傳意回吕將仕某伏蒙紆顧紆音於說文詘也又曲也勞也寵賁長箋未先覩于景星幸兹小慰韓文朝廷之士引領東望若景星慶雲之始見也爭先睹之為快辱暗投之明月復此大慙但深篋笥之藏莫效瓊瑶之報並見前回衆官袖啓伏蒙銜袖韓文文書銜袖見賁儷箋合璧連珠于粲光芒之正後天文志三王道化協神醇朴日月如合璧五星如連珠劉禹錫栁文序粲然如繁星麗天而芒寒色正人望而敬者五行而已編鍾列磬了非世俗之音見謝石祕校條良欽墨妙以筆精文選淵雲之墨妙嚴樂之筆精但覺禮逾而情過昌黎答李翊書言辭之不酬禮貌之不答雖孔子不得行于互鄉茍來者吾斯進之而已矣烏待其禮踰而情過乎兩喜而多溢美曷克堪任見前七襄不成報章但深愧負詩雖則七襄不成報章注襄駕也駕謂更其肆也天有十二次日月所止舍舍即肆也雖則終日歷七辰有西而無東不成織法報反之文章蓋織之有緯一去一來故報反成章今織女之星駕有西無東不見倒反是有名無成也回官員學職袖啓洊承厚意疊貺儷箋墨妙筆精仰窺贍麗禮逾情過尤極感慙並見上條嘗修造謝之恭僅奉留名之命惟息肩之方始左傳子駟請息肩於晋覺脫腕之頗勞腕烏貫切齊任昉集時京師臺閣文帙遭火無遺詔郡國悉上民間所藏鄧阿魯為郡小吏差送圖籍至京奏乞書吏二百人口占分授并自布籌敏速如飛吏曰告公緩之腕將脫矣新唐書蘇頲傳頲字廷碩元宗平內難書詔填委獨頲在太極後閣口所占授功狀萬緒輕重無所差書吏白曰丐公徐之不然手腕脫矣七襄不成報章良孤隆施去聲兩喜之多溢美仰懼瀆辭並見前回學職士人袖啓兹蒙盛刺書姓名于奏白曰刺禰衡傳隂懷一刺又至刺字漫滅見賁屬辭竊窺四六之工良重再三之歎易初筮吉再三瀆宋謝伋四六談塵云韓子蒼為舍人曾公衮以啓賀之韓答云舊知四六之工彌起再三之歎此聫全祖之亟嘗造謝僅辱留名退深巾衍之藏莫效襜褕之報並見前回景省元夙勤臨顧見賁儷箋偶缺肅迎退深誦味辱引前賢之跡俾為後學之師佩意甚殷拊躬曷稱靣規晤語晤音悟詩彼美淑姬可與晤語傳遇也箋猶對也正義云釋言遇偶也然則傳以晤為遇亦為對偶之義或作旿敬布謝忱回宗子與銓伏勤屢顧見畀屬辭極欽著語之工但重過情之愧恭惟某官天潢擢秀晋書文苑傳擢秀士林文選植根芳苑擢秀清流杜詩偶然擢秀非難取北堂書抄簡竒擢秀宗賢講智餘見前風調軼羣隋書楊素頗推髙熲其才藝風調優于熲晋書索琳少有逸羣之才上方重歆向之才錫之蕃庶易晋康侯用錫馬蕃度晝日三接君宜勉賀白之學副此簡求歆向賀白皆宗子佇觀千里之駒楚元王傳劉德字路叔有智略少時數言事召見甘泉宫武帝謂之千里駒師古曰言若駿馬可致千里也年齒幼小故謂之駒北齊書馮翊王潤字子澤神武第十四子幼時神武稱曰此吾家千里駒也今按千里駒事難以枚舉此外魏則曹休晋則傅咸劉曜符朗宋則張敏梁則蕭映王規劉杳王茂任昉齊則邱仲孚袁昂北魏則李孝伯袁曜北齊則崔昂元文選後周則景杜隋則張乾威唐則李嵩皆有是稱亟振九苞之鳯論語鐸鳯苞一曰口包含不妄鳴也二曰心含度進退精也三曰耳聽逹居髙明也四曰舌屈伸能變聲也五曰彩色光文采呈也六曰冠距朱南方行也七曰距鋭鉤武可稱也八曰音激揚聲逺聞也九曰腹文戶不妄納也某濫膺郡守幸託里仁承焚林竭澤之餘若為共理吕氏春秋竭澤而漁豈不得魚而明年無魚焚林而田豈不得獸而明年無獸有拔薤置水之警切幸告忠見前回王省元通篇用王氏故事屣履迎門喜接雙鳬之舄王粲傳粲徙長安中郎將蔡雍見而竒之時雍才學顯著貴重朝廷常車騎填巷賔客盈坐聞粲在門倒屣迎之崔駰傳駰候竇憲憲屣履迎門屣履曵之而行言忽遽也王喬傳為葉令每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳬從東南飛來于是候鳬至舉羅張之但得一雙舄焉文書銜袖辱摛孤鶩之辭韓文試大理評事王適墓志君娶侯氏處士髙女處士將嫁其女曰吾一女憐之必嫁官人君即謾謂媒嫗吾明經及第且選即官人嫗白翁翁曰誠官人耶取文書來君計窮吐實嫗曰無苦翁大人不疑人欺我得一卷書粗若告身者我袖以往翁望見文書銜袖果信不疑曰足矣王勃滕王閣序落霞與孤鶩齊飛秋水共長天一色既見異人袁山嵩漢書王充所作論衡中土未有傳者蔡雍入吳始得之其後王期為㑹稽太守又得其書及還許下時人稱其才進或曰不見異人當得異書問之果以論衡之益頓忘九折王尊傳琅琊王陽為益州刺史至卭郲九折阪嘆曰奉先人遺體奈何數乘此險後以此去及尊為刺史至其阪問吏曰此非王陽所畏道耶叱其馭曰驅之王陽為孝子王尊為忠臣恭惟某人談髙玉塵王衍傳妙善元言唯談老莊為事每捉玉柄塵尾與手同色後進之士莫不景慕材擅瓊杯新唐書楊炯傳張說與徐堅論近世文章王翰如瓊杯玉斝雖爛然可珍而多玷缺逃狗曲之譏暫且謝諸生而還舍前漢儒林傳王式字翁思東平新桃人詔除博士諸大夫博士共持酒肉勞式皆注意髙仰之博士江公心嫉式謂歌吹諸生曰歌驪駒式曰聞之于師客歌驪駒主人歌客母容歸在曲禮江翁曰何狗曲也式耻之遂謝病免歸依鹿鳴之樂行將頌聖主之得賢王褒傳益州刺史王襄欲宣風化于衆庶使褎作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之益州刺史因奏褎有軼材詔褎為聖主得賢臣頌結襪以須張釋之傳王生者善為黃老言處士嘗召居廷中公卿盡㑹立王生老人曰吾襪解顧謂釋之為我結襪釋之跪而結之左傳磨厲以須彈冠伊邇王吉傳吉字子陽與貢禹為友世稱王陽在位貢公彈冠言其取舍同也師古曰彈冠者且入仕也詩不逺伊邇某十年出幕杜詩十年出幕府自可持旌麾兩熖生巾諸集拾遺李畋為國子直講求郡晨登講席諸生見畋巾上兩熖火起是日得榮州甚苦月攘一雞之征無復人生五馬之樂杜詩人生五馬貴莫受二毛侵乏李膺之模楷誤辱肯臨黨錮傳太學諸生三萬餘人郭林宗賈偉節為其冠並與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏彊禦陳仲舉天下俊秀王叔茂韓信傳大王乃肯臨臣灌夫傳將軍乃肯幸臨况魏其侯範王良之馳驅當圗請益臨益卦名回李叔璋伏蒙􅔷袖寵賁駢珠知為河北之相家且接江南之宗派見前欣逢若士淮南子若士者齤然而笑又若士舉臂而竦身遂入雲中詳見前何啻似人莊子子不見夫越之流人乎去國數日見所知而喜去國旬月見所嘗見于國中者喜及朞年也見似人者而喜矣惟是過情之褒殆非望賜之意他人不如同姓願聞拔薤之規詩豈無他人不如我同姓終日雖則七襄莫稱投桃之報見前回合同王將仕合同疑當作㑹同更詳之兹蒙寵顧見賁雄文竊窺四六之工良重再三之感見前回學職士人條恭惟某官人門具美陳書蔡凝傳髙宗嘗謂凝曰我欲用義興主壻錢肅為黃門郎卿意何如凝正色對曰黃散之職故須人門兼美惟陛下察之新唐書李揆傳揆美風儀善奏對帝歎曰卿門第人物文學皆當世第一信朝廷羽儀乎東坡詩清朝固多士人門子皆冠地位夙髙南史豫章王嶷傳自以地位隆重深懷退素盧同詩山下羣仙司下土地位清髙隔風雨淹回管𣙜之卑𣙜訖嶽切漢書𣙜酤注以木度水曰𣙜謂禁民酤獨官開置如道路設木為𣙜獨取利也培益事功之㑹某過勤奬豫彌切兢慙徒勞篋笥之藏莫效䄡䄖之報並見前回王進士伏蒙紆顧紆雍俱切音與於同說文詘也周禮連行紆行廣韻曲也勞也寵賁長書味藹如仁義之言知賢者深逺之慮宿蠧正難于驟革頽瀾未易以亟回茍有祝規韓文蚤夜以求從祝規更希忠告區區𠂻曲續續靣陳並見前回董將仕伏蒙下顧損賁長篇知宗派之由來見前信家風之不墜蕭綸書誠為國政實亦家風王荆公詩有客問家風見似人而喜真足慰藜藿之逃莊子夫逃虛空者藜藿柱乎鼪鼬之徑踉位其空聞人足音跫然而喜矣而况乎昆弟親戚之謦咳其側者乎和此君之題㑹便洗筝琶之俗唐段安節樂府雜録筝者蒙恬所造也琵琶始自烏孫公主造馬上彈之有直項者曲項者范曄石崇謝奕皆善此樂國史補于頔令客彈琴其嫂知音曰三分中一分筝聲二分人琶全無琴韻東坡詩歸家且覓千斛水盡洗從前筝笛耳山谷寄題榮州祖元大師此君軒詩云王師學琴二十年響如清夜落澗泉滿堂洗盡筝琶耳請師停手恐斷絃回王進士兹佩髙情見貽佳句歌刺史之頌愧非西京二千石之良王褒傳褒既為刺史作頌又作其傳注解釋頌歌之義及作者之意循吏傳與我共此者其唯良二千石乎繫諸侯之風乃合召公十四篇之數詩序鵲巢騶虞之德諸侯之風也先王之所以教故繫之召公報于何有藏以為榮見前回楊貢士伏以樂正論士而升之未皇請益禮記大樂正論士之秀者以告于王而升諸司馬曰進士公等何見之晚也忽辱鳴謙非所宜蒙願竊有復益謙蒙復四卦名恭惟某官詞章炳蔚器度端溫得意狗監之官肯輕進取司馬相如傳蜀人楊得意為狗監師古曰主天子田獵犬也子雲羽獵之賦行有吹噓揚雄傳十二月羽獵雄從故聊因校獵賦以風杜詩揚雄更有河東賦唯待吹噓送上天試觀屬辭比事之文禮記屬辭比事春秋教也足見决策發科之學法言須以决策發科某濫分守印獲託士鄉非浮橋之魚迫斯可以見矣劉向說苑子賤為單父宰過於陽畫陽畫曰吾少也賤不知治民之術有釣道二焉請以送子夫投綸錯餌迎而吸之者陽橋也其為魚薄而不美若存若亡若食若不食者魴也其為魚也博而厚味子賤曰善于是未至單父冠蓋迎之者交接于道子賤曰車驅之車驅之夫陽晝之所陽橋者至矣楊用修丹鉛總録云陽橋魚名不釣而來喻士之不招而至者也其魚之形未詳按荀子曰倏䱁者浮陽之魚也唐文粹宓子賤碑豈意浮鱎化而為魴喬從魚為鱎于義乃全今按說苑本作陽橋原無浮字荀子明指鯈䱁為浮陽之魚而下文云胠于沙而思水則無逮矣故楊倞云此魚好浮水上用修遂指之陽橋似為牽合字書亦無鱎字哀涸轍之鮒忠焉能勿誨乎見前回蘇祕校材吳蜀萬里夙知益者之多聞萬里橋在成都中和門外寰宇記諸葛孔明送費禕聘吳至此曰萬里之行始于此矣蘇李五言良愧倡焉而寡和梁書文學傳鍾嶸詩評序曰逮漢李陵始著五言之目又云五言居文辭之要是衆作之有滋味者也韓詩五言出漢時蘇李首更號近古之三信在東坡眉山逺景樓記吾州之俗有近古者三其士大夫貴經術而重氏族其民尊吏而畏法其農夫合耦以相助蓋有三代漢唐之遺風而他州之所莫及也得名之雙謂何東坡詩從來蘇李得名雙只恐全齊笑陋邦注前漢蘇武李陵能詩謂之蘇李唐蘇味道里人李嶠俱以文章顯時人號蘇李又蘇晋李嶠知制誥時號蘇李又蘇頲李又對掌文誥明皇謂頲曰前朝有李嶠蘇味道今有卿及李又亦代不乏人地下日月光應察驥箱之服陳後山贈二蘇公詩竒寶橫道驥服箱誰其識者有歐陽天髙地下日月光授公以柄扶病傷士如稻苖待公秧臨流不度公為航江空歲月晚誰為馬口之銜後山送蘇公知杭州詩昔如馬口銜今為禁門鍵一雨五月涼中宵大江滿風帆目力短江空嵗年晚回史機宜大異一門三秀未見長公之波濤北史杜正元字知禮隋文帝開皇十五年舉秀才試策髙第楊素志在試退正元乃手題使擬司馬相如上林賦王褒聖主得賢臣頌班固燕然山銘張載劔閣銘白鸚鵡賦曰我不能為君住宿可至未時令就正元及時並了素讀數遍大驚曰誠好秀才其弟正藏字為善開皇十六年舉秀才時蘇綽監試擬賈誼過秦論及尚書湯誓匠人針連理樹賦几賦弓銘應時並就又無㸃竄煬帝大業中與劉炫同以學業博通應詔被舉時正藏弟正儀貢充進士正倫為秀才兄弟三人同時應命當世嗟美之新唐書杜正倫傳正倫相州洹水人隋世重舉秀才天下不十人而杜正倫一門三秀才皆髙第為世歆美杜詩波瀾獨老成又文章曹植波瀾濶七言五章始窺幼婦之機軸世說魏武嘗過曹娥碑下楊修從碑背見題作黃絹幼婦外孫韲臼八字魏武謂修曰解不答曰解黃絹色絲於字為絶幼婦少女於字為妙外孫女子於字為好韲臼受辛於字為辭所謂絶妙好辭也陸機文賦雖杼軸于余懷怵他人之我先北史祖瑩以文學見重嘗語人曰文章須自出機杼成一家風骨何能共人同生活也僧齊已詩李白李賀遺機杼散在人間不知處聞君收在芙蓉江日鬪鮫人織秋浦喜故人之有子為老成于賦詩但深巾笥之藏莫效瓊琚之報見前回程祕校以南辨蘆蔔之獄夙知纘隂德之功東坡記外祖程公遺事云公諱仁霸眉山人治平中公攝録事參軍眉山尉有得盜蘆蔔根者所持刃誤中主人尉幸賞以劫聞獄掾受賕掠成之太守將慮囚囚坐廡下涕泣衣盡濕公適見之知其寃謂盜曰汝寃盍自言吾為汝直之盜果稱寃移獄竟殺盜公坐罷歸不及月尉掾皆暴卒餘二十餘年公晝日見盜拜庭下曰尉掾未服待公而决前日地府欲召公暫對我叩頭爭曰不可以我故驚公是以至今公夀盡今日我為公荷擔而往暫對即生人天子孫夀祿朱紫滿門矣纘祖管切說文繼也尚書纘乃舊服于定國傳我治獄多隂德未嘗有所寃子孫必有興者謁薤本之規未及望陽休之色見前有勤枉駕更賁屬辭伏惟某官德裕乃身尚書𢎞于天若德裕乃身世濟其美待時藏器冠蜀都沉冥之珍繫辭君子藏器于身待時而動法言蜀莊沉冥蜀莊之才之珍也不作茍見不治茍得久幽而不改其操雖隋和何以加諸他日趨庭實漢朝方正之學漢文帝紀舉賢良方正能直言極諫者若為公等之見晚見前真覺我輩之厚顔舊唐書劉蕡傳蕡對䇿激切士林感動而中官當塗考官不敢留蕡在籍中物論喧然不平登科人李郃謂人曰劉蕡不第我輩登科實厚顔矣請以所授官讓蕡事雖不行人士多之某未遑欵門晏子春秋前驅欵門廣韻欵叩也先辱傾蓋家語孔子之剡遭程子于途傾蓋而語終日鄒陽傳白頭如新傾蓋如故自衛尉將軍之宿契自可通家灌夫傳武安謂灌夫曰程李俱東西宫衛尉今衆辱程將軍仲孺獨不為李將軍地乎藉翰林墨客以報章别圗問政見前回見任官袖啓承流支郡曾微牧御之方董仲舒今之郡守縣令令民之師帥所使承流而宣化也鼂錯傳割其支郡師古曰支郡在國之四邉者也宋史職官志昔者興國初詔廢支郡出于一時十國為連周法斯在一道署使唐制可尋至若號令之出風教之行先及于府府以及州州以及縣縣及鄉里自上而下由近及逺支郡之不可廢明矣宜復置支郡𨽻于大府韓詩漢刑支郡黜東坡集得請支郡備負屬城後漢書光武定河內鄧禹曰冦恂文武備足有牧人御衆之材乃拜恂河內太守出節本朝誤被將輸之命漢書少府出節唐劉三復渭州節堂記受脤之日掌節者以王命傳信俾先啓行至此考善地庇豐屋麾斾以易之歌鐘以樂之非征伐宴犒申威行令未嘗出蕭望之傳望之雅意在本朝將資良切爾雅送也詩百兩將之輸音書說文委輸也又春遇切委也送也漢有三輸委輸官增韻凡以物送之曰輸音平聲指所送之物曰輸音去聲已伸免牘亟奉俞音敢圖銜袖之書特枉編磬之奏蓋十六人餘並見前恭惟某官風猷俊茂任昉表存樹風猷沒著徽烈天韻碩膚齒牙秋露之甘手筆春雲之藹申屠蟠傳申以手筆趙一傳逺辱手筆追路相尋王儉傳手典典裁為當時所重范曄傳手筆差易于文不拘韻故也蘇頲傳頲封許國公張說燕國公以文章顯故時號燕許大手筆韓文貶損道德乃至手筆以問之陸務觀老學庵筆記南朝詞人謂文為筆故沈約傳云謝元暉善為詩任彥升工于筆約兼而有之梁簡文論文章之敇曰詩既若此筆又如之又曰謝眺沈約之文任昉陸倕之筆任昉傳又有沈詩任筆之語韓詩君詩多態度藹藹春空雲噓物以氣可回燕谷之溫劉向别録方士傳言鄒衍在燕燕有谷地美而寒不生五榖鄒子居之吹律而溫氣至而穀生今名黍谷贈人以言何啻楚珩之重楚語王孫圉聘于晋定公饗之趙簡子鳴玉以相問于圉曰楚之白珩猶在乎其為寶也幾何矣注珩佩上之橫者遂令載馳載驅之任猥及不狩不獵之夫某辱此簡書並見前薾然疲役莊子薾然疲役而不知其所歸可不哀耶杜詩疲薾茍懷䇿詳見前某水某邱某樹願歸遂於釣遊韓文楊矦始冠舉于其鄉今之歸指其樹曰某樹吾先人之所種也某水某邱吾童子時所釣遊也古之所謂鄉先生沒而可祭于社者其在斯人歟我任我輦我車希别謀於咨度見前回史祕校公誨獻策迷日五色智良愧於失人置水一盂惠足占於好我詩惠而好我餘並見前屬辭為教陳誼益髙見前恭惟某人直哉史魚飄然司馬司馬相如傳相如既奏大人賦天子大說飄飄有凌雲氣遊天地之間意遐想六王畢之作托言崔偃試進士東都吳武陵謂偃曰公方為天子求竒才敢獻所益因出䄂中書偃讀之乃杜牧阿房宫賦坐客皆驚武陵曰牧方試有司請以第一人處之偃謝已得其人至第五偃未應間武陵勃然曰不爾宜以賦見還偃曰如教牧果異等必無萬物茁之疑筆談嘉祐中士人劉幾纍為國學第一人驟為險怪之語學者翕然效之遂成風俗歐陽公深惡之㑹公主文决意痛懲有一舉人論曰天地軋萬物茁聖人發公曰此劉幾也戲續之曰秀才刺試官刷盡以大朱筆橫抹之自首至尾謂之紅勒帛判大紕繆字榜之既而果幾也大樂正詔王升之宜登春誦禮記春誦夏絃大師詔之瞽宗注誦謂歌樂也絃謂以絲播詩諸弟子隨臣久矣竟坐冬烘叔孫通傳諸弟子儒生隨臣久矣唐鄭薰侍郎主文舉人中有顔標者薰誤謂是魯公之後時徐方未寧志在激勸忠烈即以摽為狀元及謝恩日從容問及廟院摽曰摽寒進也未嘗有廟院薰始大悟塞默而已尋為無名子所嘲曰主司頭腦太冬烘錯認顔摽作魯公敢謂愛忘吕氏春秋陳有醜人名敦洽龎眉權顙廣眼垂肩唇薄鼻昂皮膚皴黑陳侯悅之外使治國內使制身後為楚兵所圍發言拙僻楚遂大怒促兵滅陳人有言曰敦洽貌陋足以駭人語拙足以喪國陳矦可謂愛忘其醜者耳不加督過髙帝紀聞將軍有意督過之師古曰督謂視責也有來論事益見憂時言言非無益之談鑿鑿皆可行之策鑿即各切鮮明貌詩白石鑿鑿顧恨挈瓶之守左傳雖有挈瓶之知守不假器不敢越畔而思左傳子大叔問政於子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣前茅中權今皆鄉人之善者見前積薪上寢自可纓冠而救之賈誼傳夫抱火厝之積薪之下而寢其上火未及燃因謂之安幸疾其驅且忠以告言所獻之策雖善不能出位而行可告鄉人之任前茅中權者某一麾乃出再鼓而衰並見前磨牙殺人未見早還家之非計太白蜀道難磨才吮血殺人如麻錦城雖云樂不如早還家涕泣陳策何待夜前席而後言賈誼傳文帝思誼徴之問鬼神之本誼具道所以然之故夜半文帝前席數問以得失誼數上疏陳政事多所欲匡建其大略言可痛哭者一可涕泣者二回楊普州伯雨袖詩啓普州春秋戰國為巴蜀之境秦為巴蜀二郡地今州即漢之資中牛韠墊江後漢之德揚四縣之境晋因之梁置普慈郡於此後周武帝于郡立普州又置多葉於此隋改多葉縣為普慈縣煬帝罷屬資州唐置普州宋因之千古在前萬古後僕安知栗陸之書六韜昔柏皇氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏此古之王者未使民民化未賞民民勸此古之善為政者也莊子昔容成氏大庭氏柏皇氏中央氏栗陸氏驪連氏軒轅氏當是時也結繩而治之則至治也禪通紀史皇氏後有柏皇氏柏皇氏後為中皇氏中皇氏後為大庭氏大庭氏後為栗陸氏古以陸為睦栗睦敖昏勤民愎諫自用於是乎民始擕東里子者賢臣也諫不行而醳之栗陸氏殺之栗陸氏以亡六字常語一字難公真得柏梁之體昌黎紀夢詩夜夢神官與我言羅縷道妙角與根壯非少者吟七言六字常語一字難漢武帝元封三年作柏梁臺詔羣臣二千石有能為七言詩乃得上坐後宋武帝華林都亭曲水聨句梁武帝清暑殿聫句梁元帝晏清言殿皆效柏梁體所慙佳句適重愧情恭惟某官氣抗岷峨文濯江漢子雲河東之賦天自吹噓杜詩揚雄更有河東賦唯待吹噓送上天伯起關西之聲家傳清白楊震傳震字伯起宏農華隂人明經博覽無不窮䆒諸儒為之語曰關西孔子楊伯起為涿郡太守性公亷不受私謁子孫常蔬食步行故舊長者或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦可乎所居民富循吏傳序所居民富所去見思生有榮名死見奉祀而畏人知晋書良吏傳胡威字伯武父質以忠清著稱遷徐州刺史勤于政術風化大行後入朝武帝謂威曰卿孰與父清對曰臣不如也臣父清恐人知臣清恐人不知帝以威言直而婉謙而順行登鵷鷺之班安用蚍蜉之援見前金鑾論事之語何至我哉六典大明宫有金鑾殿李白傳天寶中賀知章言之召見金鑾殿論當世事奏頌一篇賜食親為調羮互見前鈞天無人之悲今召君矣東坡詩鈞天無人帝悲傷謳吟下招遣巫陽汲黯傳君薄淮陽耶吾今召君矣回趙進士大正伏辱郇公之翰見前知為韓國之家蓋趙韓王之裔社禝世臣自合襲山河之爵見前箕裘夙學亦應簉俊造之班簉初救切韻㑹齊飛順疾也唐書簉羽鵷鷺禮記司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升于學者不征于司徒曰造士餘並見前兹窺筆下之雲煙杜詩揮毫落紙如雲烟可見胸中之湖海願安承教不成報章並見前回史僉判文舒謝饋送辱講嵗饋見貺風宜孔安國尚書序土地所生風氣所宜口腹之奉纍人難鯉盤之牢拒後漢書太原閔仲叔者世稱節士客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞之敇使常給焉仲叔怪而問之知乃歎曰閔仲叔豈以口腹纍安邑耶遂去客沛家語伯魚之生也魯昭公使人遺之鯉夫子榮君之貺故因以名曰鯉而字伯魚綵繡之光翻座盍鯨錦之捲還杜詩客從西北來遺我紬織成開緘風濤湧中有掉尾鯨客云充君褥承君終宴榮領客珍重意顧我非公卿留之懼不祥施之混柴荆鯨錦卷還客始覺心和平未寓投桃報李之誠詩投我以桃報之以李且舉受飱返璧之義左傳晋公子重耳及曹僖負羈乃饋盤飱置璧焉公子受飱返璧願無再遣必就寸忱四六標準卷十二
