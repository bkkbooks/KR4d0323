  - {type: variant, offset: 32973, length: 358, content: 凌雲寺在嘉定之南山唐開元中僧海通於瀆江沫水濛水三江之合悍流怒浪之濵鑿山為彌勒大像踰三百六十尺建七層閣以覆之至韋臯時積十九年而工始備臯有大像記又有清音亭天下山水之勝在蜀蜀之勝曰嘉州州之勝在凌雲寺寺之南又其勝也東坡名其亭曰清音又南山之勝也范石湖吳船錄云嘉州凌雲寺天寧間即大像所在嘉為衆水之㑹導江沫水為岷江皆合於山下南流以下犍為沫水合大渡河由雅州而來直擣山壁灘瀧險惡號舟檝至危之地唐開元中浮屠海通始鑿山為彌勒佛像以鎮之高三百六十尺頂圍十丈目廣二丈為樓十三層自頭面以及其足極天下佛像之大兩耳猶以木為之佛足去江數步驚濤怒號洶湧過前不可安立正視今謂之佛頭灘佛閣正面三峨餘三面皆佳山衆江錯流諸山間登臨之勝自西州來始見此耳東坡送張嘉州詩少年不願萬戶侯亦不願識韓荆州頗願身為漢嘉守載酒時作凌雲遊又送吕嘉州詩卧看古佛凌雲閣勅賜詩人明月湖, SBCK: ''}
