  - {type: punctuation, offset: 14859, content: (, id: KR4d0323_krp_027-bkkpn1618}
  - {type: variant, offset: 14859, length: 341, content: 韶石在韶州東北八十里郡國志斗勞水開有兩石相峙髙百仞廣五里相去一里大小畧均似雙闕州取名焉此外又有三十六石各有名楊廷秀望韶亭詩新隆寺後看韶石三三兩兩畧依稀金坑井頭看韶石十十五五不整齊一来望韶亭上看九韶八音堆一案金鐘大鏞浮水涯玉瑟瑶琴倚天半堯時文物也麄疎禮樂猶帶鴻荒餘茅茨殿上搥土鼓葦葉聲外無笙竽黄能郎君走州嶽領取后夔搜禮樂嶧山桐樹夜半鳴泗水石頭清盡曜山神川后争獻珎姚家制作初一新帝思南嶽来時廵宮琛廟寳皆駿奔曲江清澈碧瓊軟海山孤尖翠屏展天顔有喜后夔和一奏雲韶供亞飯帝登九疑忘却歸不知斑盡湘笛枝后夔一脛跛莫随坐委衆樂江之湄儀鳳舞獸掃無迹獨留一狻守其側至今喚作獅子石雨淋日炙爛不得洞庭張樂已莓苔犍為獲磬亦塵埃不如九韶故無恙戞擊尚可起冬雷何時九秋霜月裏来聴湘妃瑟聲美曲終莫道不見人江上數峰是誰子, SBCK: ''}
