  text: 之四
  hash: sha256:814c36aad96852d52aaf2c61f190be4cebb24e4bace4fdf5946d8af10d89ea3e
body:
  text: 舉科目謝劉閣學光祖舉節操方正可備獻納科遠客從軍自分塵埃之内近臣薦士許司雨露之邊以仞墻則未窺且尺牘之不貢敢謂暗中之摸索忽􅂪送上以吹嘘此難求之今人斯可稱曰知己竊以爲臣止於敬皆有陳善閉邪之心事君致其身豈無明目張膽之志自方正爲賢良之號而獻納㱕侍從之班視嘉言罔伏之時無不諫亦入之意然元祐十科之創建不落第三至紹興五載之選掄以此居一蓋象龍亦有致雨之理而存羊實餘愛禮之心儻非其人難稱此意如某者學未聞道年不後人好論古今未離舉子之習氣儳説得失不過處士之大言本浪爲錦城雪嶺之觀乃輙與祈山天水之役空有幕中之辯竟無堂上之奇誰誤聽聞忽􅂪論薦我於辭命則不能也謾稱春藻之葩人之彦聖其心好之浪許秋竿之節平生失在小丈夫之悻迺今亦有大君子之知所可貴者遇大賢韓子所以賀侯喜不待求而後施德栁侯於是感崔卿不謂古心復見今世兹蓋伏遇某官四朝壽俊一世儒真本本元元所學皆周孔之學孜孜汲汲此心即禹稷之心胷中風月之無邊筆下源泉之不擇使天下之大老二盍歸乎來則匈奴之長技三亦何所措方居家而爲善思報國之以人若爲控地之飛亦入牋天之剡某敢不圖惟報稱益自激昂待以國士待以衆人何敢作厠中之報不負天子不負所學庶免爲門下之羞謝李參政壁舉獻納科塵纓解􅅞方將發興於雲山宗衮垂褒欲使司存於雨露喜固多於溢美耻乃在於過情其殆無私之私豈容不德其德竊以士無賢不肖均欲希一世之知德不孤有隣亦樂道諸人之善蓋近來仕進之徑蓋罕由薦舉之門心肯命通厎勞介紹言甘幣重自有寅縁宗臣之考十科本爲何事冡宰之計羣吏不出此途遂令牋天之章僅作畫地之餠然某所見與衆則殊樂莫樂􅀆相知止願出大賢之門下得不得之有命寕湏啇小利於禇中矧如不腆之蹤可謂所持者狹識字有数學何有於多聞了事亦癡才豈周於庶務質不足以望粹然之器文不足以窺作者之藩宜諸公臺省之登任此士江湖之落莽誰欺於鑒裁羌忽累於明揚方正乃賢良之稱必名門而後稱獻納盖侍從之事豈俗吏之能爲况去國十三年之餘閱人多矣今起家二千石之薦舉丗觀焉不應凡材猥玷異目此蓋伏遇某官清朝良弼名丗真儒錬色石以􅀘天親揮九日觸佞山而還里坐閱一星甫尋川路之風煙適值岡巒之烽火内嚴殄捕外示招懷賊憚崇文之名若杵投臼民誦西平之子惟我有臣俊乂冝在於旁招巧拙猥容於雜進有如庸下亦備数中某敢不勉自激昻圖惟稱塞有吏才更丗事愧非臨川老子之倫絶當世追古人敢忘眉山端明之薦謝任尚書希夷舉著述科上命公以納言甫膺隆委公報上而薦士冝首異材是何濡滯出晝之人辱此吹嘘上天之賜名充著述實發兢慙某聞簡厥修簡其不修古不謂之恩地觀其主觀其所主近反類於市區然而推賢揚善之盛心乃是輔世長民之元氣眇然一世知此幾人司馬公請建十科本爲何事崔祐甫盡除羣吏不假此途謾勤爲天啓齒之勞間有畫地作餅之笑如僕所見與衆則殊盖伯牙之絶朱弦特爲知者如虞卿之取白璧是有命焉第令収名定價於大君子之門何必啇功計利於賤丈夫之隴况歐陽公不能挽聖俞之逹而東坡老亦難拔方叔之窮物固假於氣嘘命實通於心肯况某無狀觸事多畸荷鋤而耕寛閑只傷地脉乘槎而游汗漫又犯天河無端讀書有時爲養既痛三千鐘之弗洎又瀕四五十之無聞小材不離於小官已知安分大慙或謂之大好人自過情馴致誤執事之知欲令備弟子之列先唱之矣又唱之矣肯引去蓬島之風舡昔謂斯何今謂斯何却回作瞿唐之煙棹旁觀千丈之落自計三寸之存心不同􅀆媒勞委禽勿強射有似乎君子正鵠是求敢圖進退之間偶合髙明之見徑持典䴡舉及妄庸皇帝曰嘻往賛碧幢之帥翰林爲主入言墨客之卿不以昧於時冝爲俗儒是可稱於天下曰知己兹盖伏遇某官眼髙四海胷首千年盛之白玉堂辭足以鼔天下之動拜于青􅃈闥學足以格君心之非龍墀引聽履之星辰鶴禁賓重離之日月是固見耐官之器孰能窺憂世之心大厦非一木之枝故椳闑扂楔與欂櫨而並蓄小市無千金之藥故芝苓參木合薑桂以兼収急求燭武則無以重朝廷近捨皇甫則無以勸巖穴雖隻字片言之無用亦三光五嶽之所関不忍弃􅂢力加収拾何其乆也必有以也知己在於遣中我儀圖之愛莫助之亦漫爲之言上感知而已勿謝得乎某敢不圖稱所􅂪力鞭其後舍文章之小技勉節義之大閑孔明之栢四十圍香葉試尋於鸞鳳任公之竿五十犗大鈎㑹掣於鯨鯢代虞制參謝劉閣學舉科目光祖梧幕綴貟曾微寸善荷囊薦士猥玷異科予之豈以爲私受者未能無愧蓋知祢而稱獻納嘗聞摩詰之詩若依劉而增感傷已發仲宣之賦殆主擇客則客亦擇主使官求人則人不求官自甘桃李之不言誰識蘋蘩之可薦矧如剛簡籍是迃踈山東山西不能世將相之業水南水北居然仕賓客之聮雖學問粗知德性之尊然英華恐非和順之發蛙拘墟而局促何所見聞燕巢幕以徘徊若爲材識徒以固窮之力頗知尚志之功反觀寸心粗識無邊之風月洞視萬古略知不廢之江河所願就有道而正焉未得事大夫之賢者曾摳衣之不敏乃推轂以見収元祐宗臣之立十科本爲何事紹興宰相之計羣吏尚出此途今徒有存羊之名或者發􅀞餅之嘆然受德者不待成身而拜賜栁子厚固已言之既有知􅀆又欲識路而疾驅韓退之亦安取此所感大矣無謝得乎此蓋伏遇某官道純粹精德直方大羽翼孔孟學傳先聖之不傳黼黻卿雲文到古人之未到碩果何嫌於不食匏􅀲自得於含章人之爲言何得焉特祝承明廬之三入天之未䘮斯文也故應靈光殿之獨存時來爲之民生幸甚豈謂誠心之傾倒肯収孤迹之沈􅁳得於不求亦可自賀某敢不佩所品題銘之􅂨曲歲月坐成晩且熏坡老之香江湖永相忘更勉後山之報謝曾尚書㬇舉著述科裁小子而成章亡能爲役觀近臣而爲主有味其言予之豈以爲私受者未能免愧切以十科薦士著述難堪八坐舉賢銓綜尤重唐文章之籙登者幾人晉人物之甄拔於一字使品題之太過恐稱塞之易孤伏念某命固不猶才亦無似萬巻未供於啜飲一科何補於遺餘結栁送窮仍斍語言之無味剖􅀲乞巧不堪豪傑之跪呈雖庚桑乆役於老聃然毛遂無聞於趙勝不圖科薦特辱名聞惟才薰班馬之香乃名秀發非斈􅊥舒向之海莫號渊􅀷至求英詞能配古作自李杜韓栁之不出殆歐蘇陳黄爲庶幾何者妄庸得此奬拂前言戯耳不待智者而後知小子識之則欲假之而自厲考古人之所佩仰盛德之安窮非盡讀三萬軸之牙籖難仰答十六枚之古磬恭惟某官國之喬木學者泰山公方引韋世康而告休士皆知杜如晦之必相平生五色線豈皖織女之㐮向來一瓣香不廢嫡孫之行滿期開閤早與捲簾某敢不仰體鴻鈞俯鞭駑鈍著作前烈之餘事豈足醻知節􅁩天下之大閑持此誓報謝趙尚書舉可備著述科汝述小子成章無可薦揚之實近臣爲主猥騰典麗之褒未嘗敢請於墻藩乃辱徑収之箧櫝感知而已懷愧柰何切以一字拔人今古稱山公之啓十科舉士兒童誦司馬之賢幸猶愛礼以存羊誰復按圖而索駿著作雖前列之餘事文斈亦先聖之末科珠玉不􅀘於飢寒豈堪混泥塗之辱干羽無取於戰陣猶足備宗廟之容有如一藝之不庸亦是匹夫之弗獲昔趙尚書垂德於不報栁侯甞感其収撫之恩至李從事因文而得交韓子又念其飢寒之聚不圖今日復見古人如某者蠢蠢隨行狙狙何取徒守寒素之氣習尚持文墨之生涯居於大江之濆甘見􅀏於獱􅆩行乎劎閣之險幸偶脫於豺狼既衘三釡弗洎之悲又罹二子更死之禍兩髦巳雪百念俱氷學業實負其􅀄心精􅀷安在詞華甚慙於大手炳蔚謂何今屡爲丞相而言蓋甚愧丈人之厚枚皐之窮且忍何敢躁耶孟郊之乆無成㑹且歸矣不虞科薦又累甄収伏遇某官氣杳秋天愛􅀷冬日作納言之喉舌惟山甫克舉之用夾輔之股肱則周公其人也長慮却顧爲根本之計兼収並蓄无葑菲之遺凡今􅀓羽翼而飛誰非借齒牙之助尚念朝廷半老儒之日無弃文章一小技之人必令綢繆於束芻廉耻缺矣故雖參差之荇菜左右芼之某敢不勉自激昻圖爲稱塞上不負天子下不負所學日監在兹待之以國士報之以衆人天厭之矣謝成都帥黄侍郎疇若舉科目旅床爭席夢難蜀道之登軍將打門驚報禰書之至世固有十科之薦士公獨能萬里而舉人愧在其肝感􅀷於髓伏念某至愚不肖素賤且貧無端讀書遂奪耕田之樂有時爲養不供啜菽之􅌚猛思萬物之皆塵彌斍一科之不􅀘汗漫卓踔欲尋墜緒之茫茫勃窣媻跚尚踵常途之役役雖大慙必謂大好然小材不離小官安得自髙聊復爾耳能令公喜定未必然行搴湘水之芙蓉誰托江梅之桃李今作禁門鍵要湏百年幾見之人君如雙井茶眞副衆口一償之願顧持著述猥舉妄庸經學無游夏之源修明安在文詞乏屈宋之艶秀發謂何然經品題敢自暴弃孰云􅀞餅初無益於飢腸如入太倉亦莫不有飽意伏遇某官斗牛間氣奎璧清􅄤筆裁霧而縫雲不作人間煙火之語身馭風而騎氣直依天上日月之光倦持上雍之囊出草諭巴之檄雪山增重天府益腴斯人乃德星頓釋冕旒之西顧用汝作霖雨共觀衮綉之東歸諒勱相於國家先旁招於俊乂兼収馬渤曲抱鶴翎仰盛德之安窮望夫人􅀆已逺主簿乃有分職縱欲福以難功侍郎非通神明曷不祈而得施某敢不謹佩恩意自鞭古心諸侯薦人與之諸侯寧有是事國士遇我報以國士請誦斯言代趙撫属謝衛參帥汝諿百舍治任己問征夫之前路十科取士又勞播物之大鈞頂踵知恩肺肝懷感切以賓筵有秩古歌衛武之功藩翰多賢舊説湖南之客今已時移而事異誰堪德舉以言揚况如日夕之牛羊㑹且歸矣相彼月明之烏鵲愛莫助之又勤科薦之榮允謂陶成之厚伏念某一寒無挾百拙有餘偶躐末科非有宗英之礼樂來依大府適逢元帥之詩書假以三能之光借以九鼎之重從骨而肉如翼斯飛粛粛宵征乆馳心於魏闕遲遲晝出終戀德於膺門果􅂪吹嘘薦以科目取其材術固无師友之渊源旌以勤勞是亦塵埃之職分政事之可觀安在館閣之稱選謂何强名器采之詳華浪應文章之典麗前言戯耳不待智者而後知小子識之敢不假兹而自勵伏遇某官清廟一柱泰階六符虛已受人不厭􅂪再三之瀆承天載物眞得坤六二之方暫爲召畢之保釐聊續荆潭之唱和牛溲馬渤隨所用以兼収虫臂䑕肝不以微而見弃故令庸下亦在数中某敢不增所未能求爲可貴著作前輩之餘事不足酬知節􅁩天下之大閑持此誓報代回舒尉謝科目從臣十科之薦一歲三人牧夫庶獄之難千變萬狀兹以盡公而舉又何私謝之爲恭惟某官遠抱甚都賢勞已乆居然前跋而後㚄誰其右挈而左提今歸幕下之羅定脫囊中之頴比來科選擬用名聞􅀷疑詐木鶴之仙豈復尋蕉鹿之夢然此本畫地之餅何以假爲果能受去堊之斤徑當削入不然時夜之早計無乃明月而暗投某疾讀來函病頓去枕家君作宰好吟孤騖之齊飛客食加餐持報雙魚之遠遺謝座主謝中書舍人曽從龍五芒色正夙瞻柱史之􅄤一刺字漫始見舍人之様仰髙山而景行感流水之知音由其願一識之未償是以身十返而不悔切惟去民就吏牛堪未始謝於門負業歸家齊皡亦不非其上惟是筆硯荒凉之業實受鑪錘特逹之知説戰􅂣文人還迷於五色讀刑賞論公放出於一頭若揆門生坐主之常當辨國士衆人之報伏念某學未至古年不後人少也好脩強記輙数千字長而無述覓舉凡二十年雖有道則耻賤貧亦無心於圖富貴可堪親老又着儒冠而忍羞寧試有司不願君門之徑入冒陳三策略吐寸􅂨自知明主可爲忠言特恐貴人不喜生語頭顱自揣口吻益悲卒猛吐其狂愚竟儳説於得失不謂暗中之摸索遂􅂪送上之吹嘘既有詞意皆精妙之褒復加筆力可敬服之語喘竹筒於儕輩増紙價於京朝人亦有言衣鉢恐成於故事我則無勇鼓旗空譟於後塵既經品題敢自暴弃遺餘不補十年任韓子之窮名節茍全一第眞魯山之溷身未可許人也猶欲與後死之斯文子亦來見我乎政恐事先生之有罪伏遇某官求士爲國事君以人言動必書今立二螭頭而和墨汁榮進素定寧止四龍首之至黄扉切聞滿籠之參芝豈少一株之桃李然勱相國家之業自旁招俊乂而基公求士甚士之求公㑹湏連茹子絶長非長者絶子自合負荆某一莊未荒萬間是芘向來瓣香之敬眞爲南豐此去翹材之延願觀東閤謝宗縣尉炳薦書下士徼君子之異知奏記中㳙缺門生之庸敬抑馬周實淹於逆旅非牛堪敢傲於有司未之負荆遐不削櫝恭惟某官眼髙四海筆落九天繙十二經尤有取太平之典對三千字謂當冠秀士之羣馬小殿於及門鰲固安於戴石孜孜甘旨屈爲孟東野之官懇懇忠精方抱梅南昌之節凄其風木越在塊苫諒朝祥之琴成声則暮召之蓋相望某頃偕鄉計嘗累公知由庶士而登司徒不知恩者非人也去民畒而就吏祿豈進謝則爲私乎顧迷京洛之塵實隔蓬萊之水故者无失爲故乃不知􅌂然衰絰之中誅之不可勝誅自當即麾之門墻之外顧勤一介先枉雙魚既倒植之可慙復暗投而失報青衫短笏漸從矮屋以着身紫磨眞金尚負洪鑪之定價然已長伯樂之廐敢逐荒陸氏之莊某無以報恩期於強學其行已若有愧於道何以文爲雖無報而不辱其門請從今始梅亭先生四六標凖巻之四梅亭先生四六標凖卷之五謝到任帥到任謝任參政代鄒給事輿轎隃嶺方營三徑之謀鼔枻浮湘又玷十連之􅀉在相國知之至矣殆郷人善者好之昉涖事之云􅀄豈修辭其敢後恭惟某官人今而心古氣勁而貌和學問淵源得尊主庇民之道緒餘土苴爲開物成務之才自翊輔於天樞迄規恢於土宇晉參大政益播壯猷天將降任是人庸釋髙文之􅀫憤予惟克邁乃訓共􅀚周召之同心某分閫罔功歸田巳幸敢意躋班於延閣更令承惠於价藩惟是淸淑扶輿之區尚多愁恨嘆息之俗䑕窮巳甚蚊􅀒奚堪必先逹之士爲之前焉旣感裏言之賜有剌史之榮無其難者尚祈終惠之私師到任謝鄭參政代鄒給事籲天還印甫辭五嶺之炎昜地剖符遽得三湘之勝將母固諧於安便拊躬但愧於叨逾冒再僂而弗俞知一陶之有自恭惟某官才弘而毅器􅀶以周鬷假無言賛一日萬機之運柔嘉維則聳六服羣辟之瞻人固料代何之用參上亦知安劉之必勃兩地碧雲之暫駐旣厚仔肩九天黄道之安行亟膺顓靣某守藩弗績席䕃終更所願歸田徑返林烏之哺敢期易鎮竟爲檣燕之留惟一重一掩號淳古之江山而九辨九歌餘芬香之草木豈小材之能任由大造之曲成謂國小不足回旋此豈爲我輩而設使政平而無愁嘆庶不爲門下之羞太守到任謝丞相􅁠武岡軍􅀼以邊郡􅀒丞愧何功於渉筆中朝攺牧命以次而設麾雖時暫以從權亦日虞於非據重感大造陶鎔之賜敢廢小吏竿牘之恭伏念某全抱迂踈倍勤抆拭廣文轗軻旣保全茅屋之歸半剌翺翔又减縮葵丘之代無蟹昜嫌於監郡不􅀛敢望於封侯方圖下考之書恪布中㳙之謝日君乏使故侯􅄃轡以疾驅夜枕不安新尹懷章而未上勤廟堂之軫念慮獄市之擾姦姑令副貳之車且護方寸之印鶉􅀆胡瞻於不獵馬也詎可以守閭正使五日京兆之間亦有千里宅生之􅀉科􅃈邊吏非􅂪真漢相之知申畫郊圻安得假齊王之命兹者伏遇某官得聖之任爲帝者師萬億年敬天之休豈止書郭中令之考五百􅀊名丗者出蓋欲傳孟軻氏之宗更新紹定之􅀄元遴選神爵之良吏謂友􅀖必立之亞旅正欲充虚幸督郵未逐於聾丞不妨借聽雖小人乗器終於必奪然大鈞播物允矣無垠某敢不三思而行一日必葺雖慙尸祝越尊爼而代庖人之勞當籍吏民封府庫以待將軍之至榮州到任謝丞相佐黔巫之東鄙甘半剌之翶翔守巴􅈎之南榮累一陶之坯冶幕府十年之未乆角巾兩火之可逃間􅀜半朞辛苦萬狀甫兹領事率爾裁牋伏念某才不瘉人學徒泥古招諸生於館下幾毀于隨處別駕之治中無材可展姑俟及􅀲之代式遄行李之歸敢圖分銅獸之符猥使展石􅀛之郡惟和義之僻壌實光廟之潜藩升軍開府獨未沾恩視􅀖選侯率多就近蓋民田􅀊租止五千石而公使年計僅六百緡財匪􅀑輸全仰作鹹之􅃳郡資井養詎堪竭澤之漁比縁花破於皂胥今遂草薙而赤立欲俾㝷常之外頓増十萬之輸數􅅈入池寕保四郊之無擾強弩射市但嗟薄命之先穿上下交征公私可痛弗獲於上不可治矣欲加之罪其無辭乎恭惟某官師保萬民弼亮四丗天欲吾君繼壽皇之聖帝賚我公紹忠定之勳禹以功皐以謨遹全絶德絳之果霍之勇抑又餘収不惟垂紳正笏而措泰山之安且復守志厲操而抗浮雲之節勤勞二紀無寸晷之敢休懇避三公至累年而不受戒謹恐懼之如此熾昌􅂄艾以固然周公仰而思之不迷勤教伊尹聖之任也尤務旁招肆令愚儒來效凋郡尚念某進退維谷兢戰履冰思庶民所以安恐有􅀒十行之賜得一事可自罷庶幾免百謫之盈輙修謝上之緘併控申中之悃太守謝史丞相眉州到任伏以乗榮隱之障方幸終更分通義之符濫叨詳試適值賔賢而觀國又令主試於坤文旣徹􅁄圍遂趨􅀲戍伏念某賦資蹇淺觸事坎艱學術荒卑弗知􅀷造之以道技能譾薄又非適用之謂才出幕十年一登文石奉祠三載半剌武岡曽未滿秩之間倐奉專城之寵跨犍䍧之徼命與􅄷謀求牛羊之芻心勞政拙得以理去不自意全丙穴維舟徑欲歸耕於谷口庚書傳置顧令攺牧於峩眉惟是四蜀之封疆重在三蘇之郷國然好文而慕權􅀔至今餘西漢之風其事守如古君臣近丗異北墉之記比縁兵潰轉覺民流厥旣獻賢能之書甫及理愁恨之嘆伋去誰守猶幸滴博之雲収超願乞歸孰念玉関之人老兹蓋伏遇某官箕裘輔弼祉角君臣精神峻喬嶽之瞻談􅀏回狂瀾之倒大鈞播物實細别於九流直柄當權亦曲成於萬物有念一寒之蹇剥巳成十暑之睽離更以一麾試之再鼔某敢不謹固封守宣布中和前江陵後洪農詎能及劉昆之政治南陽如上蔡仰在中召父之規感悚惟􅀷敷陳罔旣榮州到任謝桂制置假守三榮叨塵統部牽江萬里旣見吏民比甞奏記以徹名復敢修辭而謝上惟和義之斗絶寔夜郎之奎隈事簡地偏舊􅁛道院吏貪俗悍今􅀋法場蓋一􅀊止五千石之經租而諸司近八十萬之折估郡資井養財匪􅀑輸属因􅁠攝之多馴至綱維之敗壯哉雀䑕公肆侵牟翩彼鴟鴞交騰喧譟致連帥括三井之羡爲属縣代兩稅之輸上関閫制之聽聞下籍吏胥之專擅去其螟螣始云歛此以錫民信及豚魚今則攺之而備塞莫非王事均是􅀖財黔其廬赭其垣正足爲參元之喜馬􅀂羊金􅀂粟􅀄何與張奐之家不才之某甞仕於蜀亦知風寒之數處何止日費於千金與其􅂢潤下之鹹徒滋它族孰􅀂助攻苦之淡以張吾軍然一郡四邑之間有百孔千瘡之費得斗勺之水斯活矣庶逃涸轍之枯無尺寸之膚不愛焉實恐剥牀之及恭惟某官弘􅀷而肅括簡要而淸通後勁中􅁠文武作萬􅀖之憲外鎮内附精神折千里之衝定不奪牛於蹊田但欲捕蝗之害稼有憐薄命值雷轟薦福之碑或辱寛征使乳復零陵之􅔙乞從舊額以惠疲甿某敢不祗遹寛條布宣隆指修慘怛忠利之實銷愁恨嘆息之聲可以言未可以言歟亦恃有仁人之在上哀之命不哀之命也更惟恕躁者之多辭歸􅀝惟􅀷敷宣罔旣通判到任謝參政宣薛滿神圉之祠􅅒無繼粟賛夫夷之長戍偶及􅀲題輿佐岳以安能伐輻寘河之有愧輙裁小牘少謝大鈞伏念某全抱迂踈平沉庸俗徒有黽俛六九年之歎尚何扶揺三萬里之圗頃由掌故之官猥分齒胄之教大風有隧俄然電掃以雷驅古井無波幸爾水淸而石見特􅂌治中之任俾從方外之游維時都梁之區乃昔槃瓠之境􅀊租仰於永邵峒窟接於辰沅元和遣兵惡其置魁而立伍崇寕升郡猶未建牧而立參蓋一􅀊止萬石之租而四郊無百金之子然而事簡鴈鶩之左右亦稀况巳食浮螃蠏之有無何計儻水火不交於百姓則風月亦足以平分此蓋伏遇某官弼亮天功平章人品謂栁子而在䑓省未必如司馬之可傳使趙温而果丈夫又何患郡丞之能伏况黔東嘯呼之巳靖有湖南淸絶之可親使自謀之何以過此某敢不謹脩厥職勉旣厥心思曹王踔􅀐之功無羞宗􅂀哦杜老化鯤之句更問詞源通判到任謝簽樞􅁑誨舘下之諸生夙􅂪釆菲􅀘黔中之上佐兹遂及􅀲揣弱念以易盈撫窮途而致感伏念某學不聞道才無瘉人􅀒米爲親飽固悲於弗洎析薪無子賤亦覺其有涯頋平生􅀼禄以代耕乃三􅀊賣文而求活頃申以栁易播之請遂忘得隴望蜀之嫌愧在其肝悵莫追於駟馬言提其耳甘束咮於􅀌雄旣待牧羝詎容展􅂹兹出回天之力竟諧縮地之謀鮑叔不以我爲貪傷哉資也伊尹耻匹夫不獲真􅀂推之公豈謂長史之有材僕固感國士之遇我兹盖伏遇某官爽􅀖良弼輔丗真儒欲立立人所學實資於孔孟匪求求我此心脗合於羲文然韓魏公自恨用明允之太遟而歐陽子亦愧知聖俞而不薦雖昔何如今今何如昔願公之求士甚士之求公庶皆有突兀大夏之驩斯不但屬饜小人之腹某敢不俯安雌伏仰任鳶飛文儒申申詎能繼巫嶓之公綽武岡矯矯尚及見江左之夷吾通判到任謝臺諌李趙留梁汪別洛下之諸生乆歸來於茅屋􅀘黔中之上佐偶及代於葵丘旣滌籕以服勤盍濡毫而貢謝伏念某地寒寡挾天巧素慳鹵莽而耕鹵莽而耘巳慙學落鼔譟以入鼔譟以岀更愧名浮頃從文學掌故之聮躐綴國子先生之後經笥之嘲未發謗篋之惡巳盈郷人不善者惡之成是貝錦相國之賜也大矣止於甌􅁷荏苒三年僥倖貳郡軫之旁鶉之尾不惟非螃蟹之宫丹之穴犀之顚近又築鯨鯢之觀然以非材之典午固在恊恭而同寅水火弗與百姓交寕湏餞别風月不用一錢買何必平分兹蓋伏遇某官道格君心識通治體進務閑邪而陳善退思激濁以揚淸天豁露繁􅀯嶽要聞於鳴鳯冰清霜㓗北臺自肅於捿烏姑試治中且游方外某敢不修其可願勉爾遁思聾且何傷正欲不聞於黜陟噤不得用又當且止於吟哦除兩浙運幹謝趙尚書汝述䑛淮􅀯之丹乆辱青􅁳之送涸江西之轍仍爲緑水之依非公實與之主張此事亦幾於濩落旣祗賤役盍控謝牋恭惟某官北海脩身東平樂善禮樂三雍之對卓爾不羣文章萬丈之光飄然無敵密勿星辰之履彌縫天地之爐當江濤如此之時思烝徒楫之之計汲引不遺於片善縶維長恐其遐心􅃳物之澤無聲旣優旣渥推轂之言有味不進不休斷度収羅欲細桷大杗之各得义􅀒偃植將震風凌雨而後知能令此意之常存豈獨于今之受賜如某無用所向多艱未能茹啇嶺之芝還復索長安之米誰其知者公獨惻然夲欲化鯤以爲鵬不料喝盧而成雉然感恩固在於知已則受德豈待於成身但令古路之末荒敢恨吾廬之獨破愈幸甚三爲属吏矣相國知之起在此勤至他人乎執事責也代石僉判孝理到任謝丞相絃歌學道偶得代於􅀲期造化爲工俾充􅀒於蓮幕待闕之日旣淺陪京之地甚雄偏親有就養之驩數口無啼飢之苦孰主張是遂濟登兹全岀大鈞鑪錘之功敢廢小夫竿牘之敬伏念某粗勤家學尚缺丗科揆材僅可以麄供渉丗敢萌於厚望惟宵人之乃祖乃父與先生則非故非親辱収夾袋之姓名力加論薦凡今懷綳之簮笏實出挈提家丗受知巳四十年兄弟感恩非一二數兹偶償百里之債亦欲干半剌之除然而母老家貧難需乆次矧是望輕資淺當避勝流適聞僉椽之虚輙致緘詞之請亟􅂪中入非有裏言㝷承繼粟繼􅁏之頒又沐載􅀏載色之遇由􅂨所請如響之從人或謂分寸之躋攀何其廉也自不翅三百之距踊惟恐失之捧檄而歸􅀝門亦喜伏遇某官相􅀖哲輔經國元勳喬木有臣旣丗襲格天之業泰山􅀂厲將代膺裂地之封惟元老克壯其猷故人兵不戰而屈寧王遺寳復還受命之符匈奴奉珍行納稱藩之欵諒􅀷綢繆牖户之計不廢収蓄欂櫨之材有如龍蟠虎踞之􅀖豈但魚泳鳥飛之樂因其粗更於民事使之往賛於藩條某敢不滌濯其心靖共爾位石生羅致於幕下巳叨從欲之仁越王胎養於國中終兾亢身之賜幕官到任謝丞相掃曹相之門慙非齊俊趨嚴公之幕巳次蜀都仰衘坯冶之陶退整韋弦之佩輙干㳙史肅布謝牋伏念某窳薄無堪嶔﨑可􅀏弱於材腐於力絶知天巧之慳加其膏希其光又覺巳功之淺徒縁稽古之力未忘及物之心然旣更憂患之甞亦漸失賤貧之耻漢庭諸老誤欲招之使來魯國一男何所恃而敢傲豈謂没階之進洊勤吐哺之勞誨之以先正之規模未甞忘虜勉之以中權之謨畫莫􅀂審機􅃐令沐浴以宵行不容濡滯於晝出南浮江漢旣聞克敵之聲西望岷峨僅獻養威之䇿只今疆埸粗立藩籬要恃吾有以待之則雖來無能爲也維是受禕允之任居然乏羣博之材大鈞坱圠以無垠寧忍匹夫之求備小枝卷曲而不中徒勞巧匠之旁觀每念食浮倍成顔厚此蓋伏遇某官直方而大智勇且仁王曰惟爾君陳率由舊典時則有􅀂伊陟克對保衡積十年調鼎之功成四海覆盂之􅀔豈謂魚潰之虜尚爲䑕􅀼之謀未煩十乗之啓行巳使􅃗輪之不返破竹数刄之後當無留難取果旬日之間不妨持重願徇金城之略勿貪石堡之功周公方且膺之勝於天定昆夷維其喙矣必以地降如某者戰野非長銘山猶勇􅀚我竒士極知東閤之多賢􅁉乃父功只頌西平之有子代回鄒泉州應龍到任執草東臺憇棠南國言求諸道駁正之氣凛然惠歛一州牧御之材􅁉矣恭惟某官弘􅀷而肅括明允而篤誠魁下三台付榮進於素定胷中五色肯噤默以求容名滿四海而守之以謙忠結兩宫而退然不恃露門晩講緝熈日月之光明天禁夕趨鼔舞風雷之號令念含飴之樂力抗陳情之章萬牛挽之首不回六鰲去而山爲重前驅􅀞㦸出鎮清源海道無虞雖京師􅂪九里之􅃳天子有詔則剌史乃三公之儲某夙托同寮尤􅀷賛慶燭之武老矣無能爲矣一力謀歸仲山甫舉之愛莫助之萬祈自重代回史吉州定之到任選侯相閱作牧价藩除目􅀄傳道路知其辨治建牙伊始氣色益以精明恭惟某官材應時湏美由丗濟踈廣與受早承給侍之恩謝安有元當是後來之慶有華分竹俶載戍􅀲斡白粲之連檣驅紅旗而破賊帶牛佩犢漫游魑魅之䰟鋒蝟斧螗佇築鯢鯨之觀印金斗大詔璽星馳某快覩未先賀成巳後烹魚拜貺良深藏去之榮揷羽奏功預卜遄歸之慶代回張建昌嵩到任入覲夲朝出藩支郡朱轓皂蓋分竹使之半符碧澗紅泉壯麻源之三谷􅀟旌戾止五袴煖然恭惟某官濟美篤誠受材膚敏神俊一鳴之表萬馬皆瘖躊躇四顧之間全牛自解需章交上渙渥留中忽願奏於民庸遽勇収於朝蹟江漘閩徼旴爲佳麗之􅀖顔記謝詩公有按行之便無嫌十絶㑹即升迁某漸欲投簮帰聽擊柝有山房三萬軸之私積託在部封願剌史二千石之公餘賜之覆護代回楊贑州長孺到任坐分􅀛組卧護虎城丗選爾勞上固望象賢之媺皇揆余度公肯􅀌熊夢之􅀖建牙有􅀄交口相慶恭惟某官麋珠果腹佩璐潤身素所自期豈止二中而四下見於歷試真覺一洗而萬空甫畢素冠聿來朱紱即家以拜得郡也榮清氷在壷决不作繭絲之計丹砂點鐵復何憂薤本之強􅀂作霖雨則無咨怨之民如臨父母則有慘怛之愛惠而好我更以贈君願􅀚清白之子孫大慰華㒹之父老崆峒日麗姑暫歌桂子之香閶闔天開即歸報麥岐之熟某罔功分閫有幸卜隣属州之得陽公同業也同道也便道而至滕閣爲記之爲賦之謝解任太守解任謝丞相􅁠武岡軍􅀘上佐以罔功叨書下考攝邊城而非據又遂合符䖍控謝於大鈞併修辭於小櫝伏念某至愚不肖多病早衰壯不如人紛兩髦之巳雪老而無子寒百念以成冰徒依突兀之萬間尚獲翶翔於半剌夜聽紞如之五鼔頗似官蛙曉聞欵乃之一聲便如野鹿偶挈瓶之缺守暫越爼以代庖敢言田里便無於歎愁似覺蠻貊可行其忠信淺有蒲蓮􅀷有葭葦小不虺蜮大不鯨鯢胡瞻爾庭人固疑其鶉穾此非子坐自亦愧於象環幸新尹之鼎來許陳人之退屏竹齋藥竈尚堪淸風明月之分桂棹蘭舟巳夢秋水長天之共滿秩雖無於多日庇身尚假於一雲恭惟某官直大以方清和而任天以寧皇同符於孝廟帝賚我公濟美於越王繼今文子文孫冝用汝而作霖雨乃立太師太􅀓真於我而如浮雲竟回渙汗之揚可見謙撝之確邴侯病瘉合從隂德以受封冨公年髙固有本朝之故事諒益耻匹夫之不獲必思遂萬物以攸冝尚念某何足控􅅮不堪位置雞壅也豕苓也亦甞累藥籠之収䑕肝乎蟲臂乎斯固在化鑪之運其爲頌徯罔旣編摩代林提管岊謝五府抱管􅅦之文書真成爲米守踐更之􅀊月有幸及􅀲帡幪曲免於震凌川藪密藏其汙疾孰主張是遂濟登兹良勞大造之鈞陶敢廢小夫之竿牘某箕裘有緒筆硯不靈勃窣盤􅘐僅脫身於選穽嶔﨑歷落姑䇿足於縣灘盍求泥軾之榮却落銅官之冗聚鐵成錯未能羡泉府之泉餔糟獨醒豈善㑹酒人之酒冒依行缺聊復坐曹二親髙年一則以喜而一則以懼三釜微禄時乎爲養而時乎爲貧誰爲元帥之謀載復歩兵之餼􅀊縻月費不共桂玉之爨炊冬煖年登未辦布荆之包褁有懷覲省屢願汰歸日食太倉之陳亦皆帝力人言長安之樂豈爲我曹不自意全遂得善罷伏遇某官彌綸天縡涵養人材椳闑扂楔各得冝與其進也風雨霜露無非教栽者培之福遂及於容容考亦書於下下某自非木石亦有肺腸烏獲力足爲氣足施維其時矣伯樂過不睨遇不顧亦有命焉梅亭先生四六標凖卷之五梅亭先生四六標凖卷之六通交代代董侍郎居􅁩回聶制置子述聮鑣北闕不得同父母之􅀖分閫西垂兹又託子孫之契頓足欲舞盥手修辭㳟惟某官節凛松筠識髙􅆱蔡有謀猷則順于外孰窺省闥之功非仁義不陳於前親結冕旒之眷兹峻登瀛之歩載馳諭蜀之車􅀐火照山紅奏功易邇雪嶺界天白借重方􅀷佇展壯猷進膺顯􅁽某乆於蚊􅀒甚矣䑕窮糠粃在前安得有告新之政山薮藏疾尚或希議故之恩通項運使寅孫星臨玉壘氷解金城王人之上諸侯冝復次地官之属使臣之拜五善乃肯來天府之雄江漢頓淸岷峨増重㳟惟某官忠爲國許學冨家傳聖門服七􅀊之師兵法擅萬人之敵矧在鯉趨之日巳聞禽拜之風筆鋒万馬之交奔才刄千牛之立解廉而不劌出幕府之十年直哉惟淸典容臺之三礼出登郡最入庀郎闈旋爲一節之趨盡司六路之餉生財有道立武足兵爰􅃐覲於嚴宸謂亟登於禁甬師旅因之飢饉天顧在西礼樂逺而光華水焉得北爰進木天之直重㝷蓬雪之游歷井捫參昔旣依蓮於緑水張箕舒翼今將轉粟於青天寕湏漕軵之淹即報賦輿之緫月升金掌天近玉京某一介無它八年于外何幸故人之至可容老我之歸糠粃揚前愧無􅀘庚癸之諾樵蘇㸑後知可飽戊己之營願及戍􅀲亟戒行李遣信使諭蜀道巳騰父老之驩與將軍皆楚人亦有子孫之託其爲欣幸罔旣編摩通眉州趙開國希濬魯衛弟兄之政班固後於先茅召杜父母之􅁔揚更慙於前粃粛迎千􅀐敬遣􅀟魚㳟惟某官卓爾不羣飄然無敵更生寳􅁐藴金淵玉海之竒長吉錦嚢挾陣馬風檣之逸三峽洊依於緑水連鑣决勝於赤雲寰内五等之侯洊揚巳徧腰間六國之印滌濯方新今得蟇頥大似雞肋然四蜀衣冠之郡冝煩礼樂之英在三蘇翰墨之場合着文章之守尚念􅀺侯之晩賦無爲叔度之暮來千里之駒原隰毎懷於靡及九罭之鱒朝廷何患其不知某夙託門朋連依鄰䕃豈料託子孫之契又將合郡國之符綈􅂁戀戀願見故人歩屧村村乆誇新尹恐鞭其後俾營斜谷之木牛幸疾其驅式慰并州之竹馬其爲忻幸罔旣敷宣通徐架閣天麟隨冠蓋於京華昔焉託契主文書於几閣今乃爲寮偶因越尊爼而代庖人之勞又可封府庫以待將軍之至不容礼緩敢用書先㳟惟某官􅀯州髙士之家西園先生之子通介寕隨丗俗不煩孟徳之疑名位豈肯卑微真符釋氏之送蔚然三館之望巳在八年之前誰令甲科亦􅀘文學之掌故聊復庚約即是翰林之主人某偶􅀗交􅀛真成附􅂹合而離離而合詎知有聮事之期同自異異自同又當廣結交之句通魏府判岠李膺非昔自應陪澤畔之大夫魏相有孫頋亦􅀘黔中之上佐將託交􅀛之契盍修致鯉之恭㳟惟某官家夲黄扉心如白屋風烈挺挺稱故國之丗臣領䄂堂堂成外家之宅相聞塤箎之伯仲皆規矩於髙曽白眉最良黒頭必貴頋屈閬風之歩來監巫水之州此地之峻嶺崇岡昔罕羣賢之至同坐之淸風明月近方別駕之添公胡爲乎來哉民何修而得此但恐傍觚稜之月難乆淹緹屏之星不俟突黔即迎泥紫某一寒􅀼禄再暑􅀒丞北山乆􅀏於驚猿南岳忻迎於鳴鳯半載之期非逺尺書之貢敢稽願察來何暮之謡及􅀲而代庶幾推不去之令接淅而行通武岡權通判譚知録良弼湘濵試吏綴寮寀於元昆黔鄙轉丞附交承於貴介旣共飲玻璃之水又並馳琬琰之山託契良多修辝敢後恭惟某官魯沂華胄虞學髙流所謂傑然摘頷不難於取第式相好矣因心尤篤於友兄屈從樾䕃之淸良見棣華之厚兹借紏曹之望式隆監郡之􅁠行矣章交亟其圭覲某里閭晩出閥閱早凋昨􅀝席之不才投閑乃分兹題輿之有命佐治何能所幸規矩之陳前可容瓦石之在後友一郷之善舊正頼於告新歌別駕之功今敢希於勝昔通李制機元龍望太白於岷峨知登上佐辝石洪之􅈆榖來託底寮漫期飛逐於溟鴻敢耻弃餘之竹馬斐裁手畢敬控心期恭惟某官飛譽隠谹掞材良實大科異等一翁二季之相望鉅典雄編三史六經之可亞君陳父祖固存丗績越公兒郎信有家風滿腹精神燭照數計而􅀛卜撐腸文字日光玉㓗而蛟翔􅀂爲碧落之功名淹此靑油之談􅀏辟書薦墨一飛皆可以冲天檄筆幙謀三進顧遟於及霤諒惟中幄正借前籌斟酌損益必盡忠言治法征謀抑有主出􅀼聞機筦徑即州麾君薄淮陽耶寕更迂朱幡之駕誰踰仲卿者㑹即趨丹掖之班某無挾而窮不殖以落上靑天而仰脅頃逢三峽之倒流瞻白日於舉頭還望九門而却走偶文翁剖符之再駐許于思弃甲而復來舊政旣幸於告新大事又忻於從長豈無他人不如同姓後先兩託於交承旣見君子庶幾有臧蚤夜一期於規誨通呉運幹彬登畿入幕濫同賔客之聮授印合符將託子孫之契恐以我而爲簡敢修辭而立誠恭惟某官學業醇明器資凝逺長卿凌雲之氣入室何難興公擲地之聲摩空有素自來歸於韶石謂徑上於瀛洲顧煩上界之官更賛中都之漕駕輕車就夷路聊養脩名入太學招諸生請觀近比某不堪索米又復泛蓮敢圗解后之間適有交承之好隴西李愽與處者所敬惟賢河南呉公甞學焉自今以始通兩浙林運幹良顯湖􅂳一􅀏夙傾解后之心氷幕同僚強附交承之契望筍輿而來止飭竿牘而斐然恭惟某官秀岀三山譽騰四海摩空作賦能瘖萬馬之聲發䇿决科卓踞六鼇之首釆魯芹於冸水燃楚竹於淸湘藉未爲國子之先生亦合入文學之掌故顧屈淸廟之器來賛皇華之光飄氣凌雲寕肯乆依於緑水舉頭見日便應直上於青霄某拆襪短材濫巾末属偶然承乏遂供越爼之勞正爾失真乆抱佩環之愧属聞行李之問道喜至捲書而欲狂江漢以濯之豈但慰懷賢之渇草木吾味也庶幾安承教之私通潭州劉教授時可􅀕孫寳之竈旣竭吾財􅀝仲尼之墻此非子坐懷哉解去賢者鼎來是雖期㑹之偶然強曰交承亦可也恭惟某官學有源本行無瑕玼自題千佛之姓名冝展三神之歩武居官能大何嫌枳􅁄之棲匪我求􅂪思樂藻芹之釆槃槃潭府犖犖楚材人非生知之其必由學教亦多術矣先致其知道本諸身士速哉肖舞雩沂水共觀夫子之循循發􅮾天津即継諸公之衮衮某強顔越爼矯首望塵佩有若之環此難乆假叱王尊之馭所兾疾驅通善化盧縣丞􅀘之請隣􅀕竈不知枳􅁄之棲越爼代庖定匪竹松之對懷哉解去賢者鼎來請從臭味之同試論踐更之代恭惟某官胷蟠萬卷學綜九流人見千佛之名經有垂涎者渠知一第之溷子真摘頷然惟其具大受之規模故不辭小官於州縣九年考績再轉爲丞亟辤禹穴之雲煙來慰湘江之草木守經据古寕肯破崖岸而爲文騰實飛聲㑹即登瀛洲而入直某非據而據時行則行顚倒衣裳公豈嫌於李下簸揚糠粃我真愧於盧前幸叱馭而疾驅即褁章而送上子生孫孫生子且強􅀒於交承余􅀒丞丞􅀒余姑别容於啇搉梅亭先生四六標凖卷之六梅亭先生四六標凖卷之七
