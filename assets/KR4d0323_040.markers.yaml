  - {type: variant, offset: 15881, length: 1, content: 徳, SBCK: 德潜剛克功播民和星駕回天又見一陽之復雲書占嵗載忻五榖之豐諒䇿持斧綉衣之庸即詠鳴玉紫宸之句某心如灰冷材乏線長使者汝容固足回春於􅁰谷丞哉余􅀒行歸曝日於茅簷賀趙提舉冬甲申魯雲書至實呈紛郁之祥趙日御冬益顯光華之逺錫公純嘏乂我烝民恭惟某官德配陽休氣排霜凛舊游天禄飽看芸草之生今使江南尚作梅花之􅀉驗剌綉五紋之永知衮衣九罭之歸某材乏綫長心尤灰冷􅀒暄炙背詎敢輸􅅵畒之忠安性掩身尚或備輶軒之訪賀林提舉冬清䑓課曆肇新三統之元綉節􅀚風順應一陽之動恭惟某官剛大養氣豈弟近民歛散得冝粟若原泉之混中和誕布􅁰回寒谷之温諒對休辰益裒純嘏某適拘分閫良阻造門視履考祥願􅀚不逺之復仁民愛物無忘自養之頥賀趙提舉冬汝譡按緹候氣律巳兆於六雄衣綉􅀚風功益髙於四牡道隨剛長德與福崇恭惟某官清湛氷壷和鍾玉琯趙日可愛旣開南岳之雲豳雨其濛更激西江之水􅁣然􅄃轡行矣賜環某濫長十連又逢亞嵗江湖兩地幸再同君子之寮原隰五章請重拜使臣之喜賀王提舉冬與􅁠身爲國史自當書辛日之雲君遣使臣頋使餐丁年之雪有功則恱何福不臻恭惟某官致孝卧氷移忠叱馭生芸挺荔厭夜直於承明舒栁放梅甘曉行於湘水花甲方周於六十椿齡正衍於八千某雌伏􅀒丞鳯鳴􅀝岳綉衣持斧儻怜同三㸃之鴛行黄鍾爲宫尚或収一聲之牛鐸賀薛知府冬甲申師旦嵗籥在申驗乞漿之踰願斗柄挿子盍挹酒以迎年時維二千石之良敷錫十萬户之福恭惟某官功參隂隲德配陽休􅃭袴温然適應重緹之暖絲綸近只遹隨一線之添諒經伯趙司至之餘即有薛侯來朝之命某身棲棠䕃心委葭灰陪五更三㸃之鴛行敢論交於結綬依一寸四分之牛晷或委照於受􅒡賀趙全州冬必愿魯雲必書暮映衡山之月趙日可愛曉行湘水之春特惟大雅之英茂對細書之札恭惟某官道隨剛長德配陽休字民之仁温若重緹之律嘘物以氣煖然五袴之歌諒􅀚荔挺而芸生益慶竹苞而松茂某襪材綫短泥軾氷寒三壽作朋請效魯頌萬千之祝七日來復幸􅀚羲爻六二之辭賀寳慶趙知府冬善湛魯雲必書將召和於嶰竹趙日可愛况小憇於甘棠維時循良茂介福禄恭惟某官以佳公子継古諸侯報政龍藩驗龍杓之回次潜心鴻寳佇鴻羽之來儀履芸生荔挺之辰萃松茂竹苞之慶即歸北闕遂冠南班某半剌灰寒寸材線短空睆牽牛之景了無展􅂹之能楚波有餘自足回春於燕谷魯酒甚薄不堪賦雪於梁園賀胡通判冬衍甲申嵗在申而得酒巳回葭室之温斗建子以挹漿正作菊潭之壽星屏所舎雲氣可占恭惟某官德與時偕道隨剛長千里分風月之半􅀖國不空六爻見天地之心公侯必復諒裒純嘏即上清班某百念灰寒寸材綫短窮簷日短不堪輸炙背之忠别駕氷清詎敢作持柸之祝賀史通判冬湜葭律浮灰􅀱臨小至棘評佐獄慶叶大來逺莫捧於兕觥誠敢輸於魚素恭惟某官氣鍾温厚德迪中和傑然􅂹展之材監此龍潜之邸鸚鵡盃鸕鷀杓滿介壽祺孔雀扇麒麟爐即儀禁甬某襪材綫短泥軾氷寒乃分之冝詎敢耻狐貉之側惟鄰是卜尚祈分燈燭之光代回大理少卿師石冬緹陽襲筦綫景延圭􅀱六律而}
