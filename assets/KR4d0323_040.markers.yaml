  - {type: variant, offset: 15890, length: 2, content: 前合, SBCK: 天地之心十國爲連共載詩書之帥且從榖旦茂介叢休恭惟某官肅括弘􅀷靖共正直圖書中祕星連五緯之光樽爼邊城雷動三軍之喜佇應葭莩之動歸儀槐􅁄之班某猥辱手書無由面賀維藩維翰願歸疆理之功如阜如岡共享國家之福代回淮}
