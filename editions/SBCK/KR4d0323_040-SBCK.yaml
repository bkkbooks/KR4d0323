front:
  text: 四六標凖巻之三十四
  hash: sha256:77437568c8a15512cbafbdc9a832577dd90113c8557c5b44bbcf925337b1b13e
body:
  text: 丞通寜郷陳縣丞愷武功之丞簡靖乆矣沐芳臨邑之簿卑棲兹焉假䕃敢以尺書之敬進於再拜之先恭惟某官逺抱甚都壯猷孔碩清明志氣胷中風月之無邊沈浸文章筆下源泉之不擇盍徑要津之立顧淹賛邑之留鳳凰自下而升髙聊復爾耳鴈鶩鉗左而摘右端使然哉􅀟陸之􅀔無休九萬之程斯下某﨑嶇副墨漫浪勾朱士安得自高妄欲比鄰之託余方有公事願聞掃溉之吟回桐廬朱丞中肖短啓代庖已忘西施之唐突長牋倒廪尚憐東野之龍鍾一謙之光三復以愧恭惟某官人門済美風調軼羣觀東閣之竒詎當相吏歌南陽之直真足自强試窺千萬琳琅之毫芒豈以八九雲夢而芥蔕對藍田千挺之竹肯負丞哉續桐江一􅁝之風今召君矣某見賢不敏拜賜何居士廉未識桃椎亟當進謁永叔强差韓愈願勿失言回華陽李丞梃題曲江之名夙甞託契賛武功之理兹幸為寮方有􅀱於中㳙乃先勤於下問恭惟某官行無瑕纇斈有本原充長吉錦囊之文命騷可僕飽鄴侯牙籤之讀継别為宗胡為再命之材淹此一同之貳鴈鶩鉗左而摘右端使然哉鳳凰自下而升髙將在此矣某冐甞險阻全蹈拙踈数同年琴上之星感舊游之如夢共萬里橋邊之月幸末路之得朋代回武進陳縣丞貴成名家勝士自有公言助國舉賢古無私謝枉長牋之委重搔短髮以寘慚恭惟某官千里名駒九苞威鳳大科異等一翁二季之相望茂實英聲七略羣書之兼緫謂即登瀛洲而給札猶欲破崖岸而為文余不負丞丞負余誰其知者斈而優仕仕優斈似是兼之無謂我豈要子隣始為人識亦知吾徒得君重少應時湏所愧明陟之章適引暗投之惠某三復墨妙十襲珍藏儀圖之莫助之更期進徳匪報也為好也聊復成章回樂安趙縣丞彦杉老􅂹媻􅘐猶戀天山之秣名駒竒俊遹追電影之鞭幸許論交過勤執訊恭惟某官近於大雅博以羣書太白詞章冝有六丁之取更生經術豈無太乙之知不應賜第之餘復作賛公之試鴈鶩平立未妨破崖岸以為文鸞鳳髙翔㑹即决雲霄而布武某為寮有舊辱問相先揣弘景之頭顱歸已晚矣畫嚴丞之手版猶願見之代回樂安趙縣丞彦杉推士轂而及丞味言何有旁使車而從子哦句已來一謙之光三復以愧恭惟某官諸劉族屬為漢宗英馳閶闔入凌兢則為冝耳去角牙破崖岸端使然哉剡三載之陟明愧一言之不智然無華乃安静之吏則所美豈鞶帨之文有望於君不孤此意某已成㱕計更辱贈言布襪青行纒吾已從此逝矣珠宫紫貝闕子盍歸而求之代回樂安趙縣丞彦杉題藍田之壁君受代以不遥厭承明之廬我治任兮更迫何勤委翰仍費属辤恭惟某官以貴王孫為名進士巖邑更刀之後非復昔時賛公游刃其間疑有餘地及􅀲近只拔茹誰歟敢愉陟明之章少寓愛助之意某投簮不力曳履胡顔以一身而備百工朞可已矣緫羣書而奏七略子必勉之回錢塘趙縣丞彦的余方有公事鼎來赤縣之官曹我未免鄉人益愧白頭之幕府有勤執訊敢闕報章恭惟某官卓爾不羣飄然無敵尋玉清洞中之字已書㑹計之功展錢塘江上之圖更動吟哦之興手版暫煩於畫地觚稜何逺於去天某轍鮒孤蹤磨牛陳迹喜似人於千里况辱託於枌榆雖異事而同寮尚不遺於葑菲回冨陽趙縣丞光祖倚使者之車笑癡兒之未了題丞哉之壁聞公子之鼎來未果修辭先勤執訊恭惟某官五潢龍種千里駒材早宣采棒之威坐獲緑林之賞鴈鶩箝行而平立端使然哉鳳凰自下而升髙恐不免耳某強名入幕正愧面墻赤縣官曹喜依仁之有幸黄塵衣㡌或分䕃之自今回益陽李縣丞江西之有宗􅂀昔巳論交湘水之逢故人今將聮事尺紙良勞於遺逺白頭何至於如新恭惟某官翰墨勝流典刑前輩人言短李釣竿已負於􅃢瑚天遣長庚霞佩正垂於金薤謂進參於諸老頋退貳於一􅀖箝尾無辭需頭有薦某束春秋於五傳訪離騷之一經士安得自髙政欲比鄰之請余方有公事願聞掃溉之吟代回麗水童知壎考陟明之績輙剡需章属比事之辭遽鳴謙德於禮為過此意則勤恭惟某官文獻故家詩書宿好彼不即汝而汝即彼既執蝮蛇余不負丞而丞負余寜問鴈鶩烏何関於屋上黔固詠於邑中時而颺之聊復爾耳某有二冝去以兆足行㪯能其官亦有無窮之聞仕優則斈願収可大之功代回宣仁張縣丞曼徳升陟一章何能借重謙勤尺牘又復拜嘉其文固是粲然此禮略之可也恭惟某官清餘家法敏有吏材翠竹􅀷林乆巳􅀚於停峙老槐古縣兹良費於吟哦無俟書來亦當剡入未見分毫之補又勤四六之貽某辭璧未能報瓊又乏楼臺近水柰何秋月之䦨干桃李成蹊佇見春風之披拂代回宣城張縣丞曼徳厭承明之廬我動歸歟之興題藍田之壁公傳至止之期四六鼎來再三復熟恭惟某官彯纓華秩簮筆名家再轉為丞坐閱十年之乆一鼓作氣㑹搏万里之程願嗇龍文虎脊之精神静聽蟲臂䑕肝之造化某自知日薄豈可夜行疲馬之恋君軒已將告老騎驢之到京國猶及語離代回海塩梁丞成章五雉分工近承誤渥􅀟魚尺素逺認故情恭惟某官拾芥有年哦松何晚翦伐誰能送只令志士之嗟精悍無所聞正自可人之意猶借齒牙之餘論見華㗋舌之納言某似是水曹已承天寵告者過也想以為司馬之官行或使之惟當返屠羊之肆回崇仁朱丞况文昌之座髙華偶然序進武功之官簡靖亦以書來所愧陳人有慚善頌恭惟某官天葩吐藻地芥决科鸞鳳髙翔時來則為之耳鴈鶩平立丞豈端使然哉似聞臺府之見知又欲弦歌而相試解牛既效薦鶚何疑某司臬無庸僝功有命老夫耄矣恐孤喉舌之納言曷月歸哉猶借齒牙之餘論回彰明黄縣丞亘老我蹣跚甘一麾之出守故人騰踏甫再轉而為丞馳情室迩而人遐示問禮踰而情過恭惟某官金華一􅂀玉井􅀟流煎瀘川之茶忘酸寒之異味賦􅈎道之笋尚冠冕於兩川獨怜胷次書傳之香方從此中文字之樂鴈鶩箝左而摘右端使然哉鳳凰自下而升髙恐不免耳某凄其一别瞠若百罹立館下招諸生嘆虀塩之亡味坐堂上稱太守驚􅂎菊之已莎方欲求拔薤之規乃聞對哦松之壁桃李春風一盃酒尚佇來歸風霆劇談九河翻願安承教回江原郭縣丞允拜屣履迎門未皇執贄文書衘袖猥沐贈言仰佩鳴謙之光俯􅀷盱豫之悔恭惟某官見聞殫洽意氣醇明發而中節謂之和見於眉睫粲然有文以相接示以肺肝所慙先施之未能更斍徽言之難受某欲還鯨錦懼損繭緘雖則七㐮終乏襜褕之報藏之十襲永為篋笥之珍回新津孫縣丞庭傑吟哦公事藍田丞端使然哉觀采風謡益州分故知之耳有勤迂顧更費属辭恭惟某官齊子武之家楚叔敖之胄枕流漱石尚有典刑擲地作金粲然文采淹回貳令之壁鏗鏘千室之弦有怜并州之迎已孤竹馬安得祁山之出能辦木牛或錫之鞶願還此笏十鍾一石自昔固病於西南三令五申湏君更教其左右若為委翰頗似過情某已控需章匄還節傳承夙駕之命弗敢與聞補晚賦之章願安承教梅亭先生四六標凖巻之三十四梅亭先生四六標凖巻之三十五簿通寜鄉蔡主簿汝說交代望俊􅄤於淮海知敬儒先問邅道於洞庭偶從誤後貂不足而狗續鴻髙舉而燕來及未治任可無執訊恭惟某官負材鴻碩蓄學駿厖中郎典刑晚亦冝於東觀客卿冨貴乆盍見於西秦吾道非耶公等安在跨揚州之鶴安得自髙麾湘水之蛟能令公喜方今漢庭之老用矣敢問呉㑹之意何如某志大心勞材䟽意拙一科不􅀘欲釣鰲而未能五技易窮覺屠龍之無用所頼鸞凰之先戒棲枳何如無謂牛羊之下來求芻而止尚托子孫之契欲窮師友之源向來一瓣曾南豐苦難並世安知四海習鑿齒不勝讀書代回上髙劉簿昌詩衆賢雜遝共騰薦士之章老子婆娑切與挂名之寵無可謝者安用文之恭惟某官節抱秋竿詞摛春藻諸公評論謂當䇿足於要津何物簿書欲使擡頭於矮屋人争送上我亦譟旁引重鼎兮不程問大鈞而未答某挽士不寸冝休者三遺我雙鯉魚似虚取勤渠之辱漸階羣振鷺願無忘醇正之歸回江夏范主簿之損屈就􅁄棲榮趨􅀲戍漢之廣江之永古稱夏口之雄簿如􅁝訟如糜今敢秋毫之隱方圖賛喜巳沐飛牋恭惟某官翰墨功名塤箎學問一門叔父慨然孟博之登車十萬甲兵喜爲㓜度而折屐頋就銓曹之調俯從簿正之供難爲弟難爲兄正􅀚競秀能令喜能令怒佇即蜚英㑹蹋翻鸚鵡之洲見􅀝頼巨鰲之釣某一寒寡與三暑投閑頃者綴文石之班不堪教胄今兹佐武岡之治正恐負丞所忻楚服之同尚切晉波之及修西門種栁之課君必勉之尋南嶽煨芋之禪我之懐矣回綏寜譚簿尉成子老􅂹垂頭有愧治中之展名駒䇿足不孤簿正之供幸游從諸父之間有稠疊同僚之好恭惟某官美由世濟仕本學優乃翁知國如知兵手板無倉黄之失它日聞詩又聞禮心印得清白之傳寕嫌矮屋之卑㑹即髙門之亢某再叨半刺不羡羣飛士安得自髙儻可請比鄰而與祭余方有公事亦當破崖岸而為文回武岡黄主簿海􅀷叢見孤羆曾聽阿房之讀逺方遺雙鯉來司臨邑之曹可謂聞音而跫然抑訝何見之晚也恭惟某官源委􅀷厚波瀾老成潁川第一之功固起甚廉之簿江夏無雙之學蓋觀未見之書暫湏矮屋以擡頭即快要津之策足某㒺功教胄承乏佐州聾丞尚可送迎儻或免督郵之逐短簿能令喜怒何幸同君子之僚回蔣主簿時懋雌伏郡丞自笑廣文之何用鸞棲簿領渠云髙士之不為聞湏及􅀲之期尚請拔薤之教恭惟某官掞材有裕蓄學不貲黔山之㠝夙負權竒之質湘水如舞聊攄㑹計之材佇即飛騰徧儀華膴某卧雲已幸分月何為靡有他長友其士之仁者能令公喜忠焉能勿誨乎代回廬陵嚴簿世明老夫耄矣不堪再皷之衰主簿何如猶致一牋之賀恐孤厚意聊具報章恭惟某官􅂀分釣瀬之清文似漆園之壯驊騮開道㑹即秣天山之禾鸞鳳冲霄姑少棲人間之枳交章載路增秩匪朝贈我明月珠可見多時之簸弄乞君飛霞佩㑹看萬里之頡頏某髙卧北䆫卻遮西日軟紅可厭敢長戀屬車之塵堅白争鳴惟欲據槁梧而瞑謀歸决矣因謝及之代回吳主簿盟昭誣辨謗方欲賀君比事屬辭何為至我恭惟某官居官能大遇事直前象有齒以焚身古今如此䑕無牙而速訟事理固然幸疑似之既明將功名之自致暫蹶霜蹄未為失何必尤人勿諱泥坑乃良規願觀進德代回永豐洪簿樒尋陶潜之丘壑方此息交托孫寶之比隣惠然執訊頋有復也何以報之恭惟某官地望穹華人門炳蔚故國非喬木信有典刑用人如積薪寕分先後暫勾朱之遊戯佇薦墨之飛騰某已乞垂車殆難推轂俟有可乗之間詎敢蔽賢設或未同而言則懼辱命代回崇仁黄簿元告移文之猿鶴方此投林訪奉詔之鳳凰居然棲枳先勤下問良戢髙情恭惟某官家學􅀷純天才膚敏誦詩三百已多識草木之名下筆五行遂得雋蓬萊之殿乃屈丹鈆之點暫為朱墨之勾聊復培鵬行且展􅂹某抗章納履望寵剖符賦張衡之歸田便堪税駕聞孫寳之祭􅍳尤幸卜鄰回范主簿君子實冩我心未遑走謁主簿能令公喜猥辱飛牋既勞十部之臨敢廢七襄之報恭惟某官噐姿瓌碩學問醇明胷中十萬之甲兵吐為筆陣硯裏三千之禮樂俯拾儒科便應䇿足於要津厎用擡頭於矮屋兩府以孫寳為可如彼斯何百里非􅄷覧所棲自此升矣某偶巢燕幕例拜魚書遺我翠織成欲卷還而不敢報之青玉案愧營度之無竒代回上饒趙簿汝騋老夫耄矣陞華五雉之工鄉人好之委重􅀟魚之素伏惟某官學優而仕業􅁛其家邑大民殷無憚勾朱之冗政成事舉㑹觀薦墨之飛有憐龍鍾之共鳩僝某偶然曵履甚矣濫巾已再具致休之章期於得請行重尋邂逅之願兹不瀆辭回武岡何簿尉强顔貮郡慚非典午之材箝尾爲僚喜有同寅之幸曾修辭之未敏辱垂問之相先恭惟某官淸神五兵肝膽一劒積月書於右序己播英聲奏天對於左廬更登峻級方西北二邊之未靖何杳南一尉之足淹行矣章交亟其王􅀚某無能教冑頋使轉丞烹􅀟魚得尺素書良勤垂念從一􅀐踔五百里即遂承顔忻幸良􅀷敷宣罔旣回靈泉李主簿君子之居是􅀖未皇進謁它人不如同姓先辱陳牋既感臨存亦􅀷訟愧恭惟某官隆山望族隴右名家飛將軍之功名寜論妄校謫仙人之苗裔頋落夜郎進士論定而官之公等何見之晚也暫且出朱而入墨猶堪紆紫以懐黄某有幸識賢特勤委贄置一盂之水正有望於吾宗夢三刀於梁􅀄何關於我輩回長沙蕭主簿歌鹿鳴而􅂆駕叨預旁􅀚聞鵬化之回程巳違旅賀有髙陳􅁩猶念故侯恭惟某官挺秀楚材效珍嶽貢頃􅀚奥義洞明吕辟之三千固擬大庭當擢蕭何於第一􅀛果登於前列鸞暫屈於卑棲長沙不足回旋㑹計而已短簿能令喜怒騰踏在兹惟是資水之淵源寥乎曲江之姓字閱世三紀闔郡一人進士業於進士同若為愛助天下寳為天下惜當自激昻某叨守三榮將書一考已進南嶽香火之請或可言旋儻過東園山水之亭更希勿毀回新威逺蕭主簿與橒鳳凰千仞不辭棲􅁄之卑鯉魚尺書見報戍􅀲之及良髙陳􅁩復愧過情伏惟某官卓爾不羣飄然無敵心潜寳苑冨金淵玉海之藏句滿錦囊多篆鼎風檣之作既儒科之峻擢何簿領之足淹矮屋擡頭聊復爾耳要津䇿足由是而之某乆於知名行矣聮事取青嫓白愧修報之弗工入墨出朱惟疾驅之是望回新盤石曹主簿開驊騮之道萬馬皆瘖飛鸞鳳之驂一䕫亦足未皇􅀱氣先辱修辭恭惟某官履行醇明風猷凝逺吐天葩而抜俗拾地芥以决科齒清如冰豈羡景宗之笳皷學至於海方觀子建之波瀾俯從簿正之供宻近里仁之美能令公喜公怒直為假館之謀爾有嘉謀嘉猷又恐趣裝之入某欣聞還舍未遑欵門諸侯不臣寓公無曰一㕓之願受進士於吾同業尚湏尊酒以細論回趙主簿伏䝉枉顧見畀屬辭備知家學之淵源仍見詞場之根柢繼沈侯之八詠諒有祖風吟趙嘏之一聮肯孤宗􅂀但􅀷藏感曷既報酬回任主簿二錫欲見組纓取瑟尚疑於將命鼎來緑綺彈琴足想於成聲望履未先鳴謙何厚恭惟某官諸任望族四蜀名家鄉老使興賢能乆應定爵主簿能令喜怒晚乃栖鵉属聞纒風木之悲未敢于水薤之教捄䝉袂葺屨之餓乃辱協心推纓冠被髮之仁可占用世朝祥既御暮召何疑某方欲欵門已勤命駕發棠殆不可復敢更希馮婦之下車治齊問所以安或可延葢公而避舍回榮徳馬主簿竒之應靈趙主簿綸一麾出守慚非牧御之才同官為僚正藉老成之助有來下問極仞髙情伏惟某官腹溢儒書氣吞晚輩倚頼巨鰲之釣時來為之低回祥鳳之棲公等安在諒奏勾朱之最即遄薦墨之飛某自笑倦游何堪共理友其士之仁者行即盍簮忠焉能勿誨乎更希倒廩其為傾徯罔既敷宣回汶川文主簿聞覲省之歸未遑一詣辱臨存之寵仍畀属辭得非所䝉願竊有復恭惟某官學優而仕徳世其家蕡不第之厚顔雖淹衆論龔好古而篤論自有祖風少屈鸞栖行看鯤化某濫膺郡寄幸託士鄉將因其嫌乎將諱其姓乎固非所望吾見其人矣吾聞其語矣愧莫之酬回長江李主簿出幕罔功詎堪再辱分符非據恐負三榮所幸在賢者之邦或可冀忠焉之誨恭惟某官學探聖處譽藹明時炷史五千言潜心有素鄴侯三萬軸載腹不遺顧薄蓬萊暫栖枳棘王珣能令公喜不足為欤孫寳安得自高聊復爾耳某濫守和義葢擇里仁無以我公歸兮使解凝塵之榻事其大夫賢者惠之止水之盂普回簿尉監當已下不願封侯已快盍簮之悃既見君子又勤衘䄂之文感煖於布帛之言乏報以襜褕之語徒知十襲莫效七襄回趙主簿頂戴登科記知一日之成名跪讀尺素書喜同年之有子旣髙陳誼又耻過情恭惟某官賦檀凌雲文成翻水能吟青玉案學素􅁉於鯉庭甫緃黄金覊名果聮於鴈塔暫棲枳􅁄即上蓬萊某辱託通家過勤委贄憶曲江杏花之㑹陪野鶴於未仙尋平羌江水之流幸海鯨之有種回崇仁趙主簿聞公子之翩翩受㕓良幸還使臣之靡靡返室有期將遂識賢預深引領恭惟某官負材開敏迪德忱恂名千里之駒早騰燕譽振九苞之鳯迄對龍光便當遡紫以凌青顧屈岀朱而入墨會膺鴞表徑簉鴛行某將指雪邊傾心日下一詣習主簿合應勝於讀書獨冷鄭廣文尚從容於歸賦其爲欣幸罔旣編摩梅亭先生四六標準巻之三十五梅亭先生四六標凖巻之三十六尉通寜郷李縣尉尚一行作吏祭竈􅀑以媚飢同官爲僚禱尉仙而徼福可無牋記先布姓名恭惟某官機量浚明風猷膚敏千里之馬騏􅂹顧伏塩車九罭之魚鱒魴合登廟鼎鬱鬱赤墀之志匆匆采棒之行茅舍之聽雞聲孰非王事花村之無犬吠即是民庸人憐横水之孤舟誰識􅀝天之長劒乗除必爾翹跂俟之某不自力田輙謀耕禄家貧親老誠有待於斗升官小職輕亦欲伸其尺寸然平生之短朱墨須寮友之助丹青儻念卑棲難倚掣鰲之釣猶能拍浪請陪射鴨之弓通寜鄉陳縣尉愷我為祭竈之謀惟鄰是卜公有折腰之役及爾同寮聞五綵之鼎來盍尺牋之豫附恭惟某官潜心蓄斈敏手决科文石陛髙定抱南昌之憤青􅁳箭送暫為東野之酸狐定蹙於草中蛟何為乎水裔某效顰白戰失步朱勾所至賈胡願早酬於一識不知仙吏竟尚隔於幾塵回武岡東尉東膠退士合佐黔中北部英遊冝留洛下顧訪湘纍之悴不辤溧尉之酸恭惟某官材調崇谹器資果毅久游􅀟宇夙閑龍豹之韜斈敵萬人足奪貔貅之氣冝䇿勲於榆塞顧試步於竹弓繞黄山穿昆明㑹當奏揚雄之賦涉赤墀登文石不徒上梅福之書某自分駑庸甘心雌伏别駕始可展足豈其然乎同寮敢不尽心乃所望耳代回湘潭游尉林青鞋左計又迷京洛之塵繡叚右牋可認瀟湘之故誰能執熱此不聽氷恭惟某官胄出清門源流正斈單傳伊洛寕忘厥祖之典刑平視莊騷盍勉乃翁之文字得解牛於肯綮失射鴨之酸寒行矣交章從而増秩某重尋故步真是陳人懐鈞天一餉之榮且然聊爾追汗漫九垓之約行或使之代回崇仁舒尉若拙識中散於雞羣夙有通家之好懐少傅之鵠峙未諧識面之期飛牋惠然佩意厚甚恭惟某官冠裳閥閲詩禮典刑無忌即劉牢之甥風流是似鄭公乃魏謩之祖氣象如存綵棒所臨緑林其遁佇公侯之必復豈州縣之徒勞某正爾借交偶然浪出北山馳驛儻無俗駕之勒移東野回頭猶及射堂之着句回舒縣尉再書美最陪賀旅以未能十部華牋感鳴謙之先辱榮於藏去愧在暗投恭惟某官䟽通之才膚敏於斈南昌小隱自當登文石之􅂗東野壯圖誰可任通家之漕願少安之無譟孰云多而不揚某芻狗已陳露螢不暖友其士之仁者敢隱於言今者人謂斯何恐孤此意更容見可續得表微回通山廖尉蓬矢之生厚甚臨存之寵􅀲期而往先之謙施之光似㒹倒於衣裳亦輪囷於肝膽恭惟某官美由世濟才應時湏抱壁中科斗之文人無能識對殿上龍蛇之影日獨未斜顧為東野之酸小作南昌之隱願俟時乎將刈正安結緑之委虵既識路又疾驅忽報飛黄之騰踏勉為親屈剰了兒癡某已拜散人足休餘日或出或處漸為雋􅁤之踈惟孝惟忠敢置祝規之敬回錢塘張尉屢薦入官明公淹矣一官禦㓂前輩願之愧執訊之不先辱屬辭之見及恭惟某官珪璋之質藻火其文誦三箧之亡書深於汲古授一編之秘略盍以濟時顧尋東野之酸來主西湖之勝弓刀閑睱聊暫為平地之僊文字芳鮮行即入明經之佛某濫巾畿幕投袂吏塵􅀟魚書之臨極承厚意九牛毛之冗聊具報章代回武進黄尉大中曵履罔功我二冝去飛牋見問君獨賢勞恭惟某官早决儒科晩遊吏役願登文石豈無梅福之書猶抱竹弓小著孟郊之句有勤魚素見勞雉工某自揣頭顱難司喉舌巳控挂冠之請聞命即行敢因授簡之歸占辭奉報回善化黄尉習委吏之㑹計正爾卑棲聞飛仙之遨逰超然髙隱方圖執訊先辱飛牋恭惟某官文獻名流典刑勝士爲公室輔家夙近於魁三有伯父風學諒求於已百顧紆􅂗轍小試弓刀河西之尉凄凉不常厥邑湖南之地清絶幸疾其驅行即交章亟膺剡辟某􅁳心祭竈迫命代厨短主簿髯參軍緫無􅀜於喜怒飱落英飲墜露願同廣於離騷回新威逺王縣尉癸之題千佛之經夙聞秀望試五采之棒似屈長材有來委翰之勤良動得朋之喜恭惟某官天葩掞藻地芥拾科頌聖主之得賢定是雲仍之􅂀移忠臣而為孝固諳風土之冝若為翰墨之材肯就弓刀之役月明静夜應無犬吠之聲雲入古㕔小寓燕巢之舍東野寕淹於射鴨南昌㑹見於參鸞某濫守郡符幸聮王事瓊玖匪報永以為好也聊􅅚魚緘珠玉將至得無修容乎惟占騎氣回新榮徳郭縣尉光旿效官錦里昔未識賢乗障斗州今將聮事鳴謙委况擊節拜嘉伏惟某官摛藻天葩决科地芥待公車之詔誰明東郭之賢涉文石之􅂗還作南昌之隱顧慙陋邑恐負英躔然代公實發軔於通泉至尚父亦奮身於長史繼其風烈將在雲仍無嫌射鴨之弓即引穿鵰之箭某出幕十暑試郡一寒同僚敢不盡心必䝉愛助一官願為禦㓂更幸疾驅回新應靈趙縣尉与槱一門父子謂皆分唐叔之珪五色神仙顧少屈趙家之玉有來委翰知可得朋恭惟某官千里名駒九苞威鳳宗室隨二千石飽聞議論之髙文章長萬丈光坐想垠崖之豁况已摩空而奏賦不難趾美以决科何為渭北清新之材乃屈河西凄凉之職吟竹弓之射始昌東野之詩登文石之􅂗即上南昌之䟽某舊交中壘今見休侯正望弓刀帖䑕竊狗偷之警却從筆硯窺蛇神牛鬼之竒回新資陽曹縣尉趣曹裝而東上莫企風㠶試梅隱以西還末瞻星表方規賀謁已沐贄牋伏惟某官學有家傳文為國緯偉然九尺之幹輔以八斗之材進士論定然後官之久冝脱頴公等安在何見晩也今始奪袍折腰暫就於河西入幕即空於兾北某濫兹假守幸可借交以公歸兮正望發棠之恵無吾以也更希拔薤之規回新遂寜長江張縣尉瞻海上之槎恨差池於八月取圯下之履望傳授之一編䄂牋臨之展巻愧甚恭惟某官負材孔碩蓄學不貲英英脩月之文飄飄凌雲之賦朝華本髙於夕秀夙知乃墜於暮成入對大庭良負誦書之三箧出次逺闕尚賢不調之十年况長江素委之詩人豈市門可淹於仙吏暫返輕舟於吳㑹即歸大老於周家某甫欲欵門先䝉命駕以覇陵李將軍之老儻不見呵則天上張公子之賢敢忘加敬回王縣尉昌大訪南榮之隱冒懐太守之章宣北部之威正藉少公之棒有來委翰良仞垂情恭惟某官科級髙華器能膚敏試竹弓之射不辤東野之酸寒登文石之􅂗行繼南昌之讜直功名之㑹磨厲以湏某出幕星終得州斗大烹鮮勿撓固當謹庭戸之脩吠犬不驚是則藉弓刀之助回秦縣尉謝差校正九韶善繼人志當為黄素之校讎肯從吾游小試丹鈆之點勘表微愧甚嘗巧可乎恭惟某官心夷而志崇齒新而意宿試劒馳馬早欲範王良之驅游刃解牛今將進庖丁之道綵棒行施於北部青氊㑹憶於西崑今開萬巻餘義理在文辤之表端能幾字正始終有條理之科所望逺來之朋共成相觀之善卿自用卿法在良弓之子必學為箕人患為人師然它山之石可以攻玉卷之三十六梅亭先生四六標準巻之三十七監官代回新監鄂州大軍向士芳五雉分工謬叨誤渥􅀟魚尺素良認故情恭惟某官冑出髙華才猷秀整所謂故國非喬木蓋有典刑不知公子是監倉誰相料理無忘澤霧更與培風某罔功雲司攝長水部血氣既衰戒在得何敢忘耶田園將蕪胡不歸兆足行矣回向監倉老我匄閑濫分丈二之組故人委重逺貽咫尺之書倚擔報之摇毫率甚恭惟某官象賢舄奕燕譽飛騰大耐官職之餘暫司倉粟小試山林之久遂及戍􅀲駕賢業而心馳佇薦書之交上某更勤來問仍費属辝腐於力弱於才無能爲役問則告疑則辨敢愛乎言回宣城劉監税趣譏征之期仕未能信講交承之好禮辱相先既登受之未安欲捲還而不敢藏惟深於十襲報敢廢於七襄恭惟某官學本家傳美由世濟凛凛更生之志節博以羣書英英夢得之詞章雄於一代顧從三語之椽復甘再轉之丞勇尋葛井之神仙遂作宣州之賔客左右望而罔市為政在人貨賄掌其征㕓生財有道迄參幕畫入賛藩條馬也守閭雖少淹於歳月鳳焉巢閣即徑上於雲霄某聞詩於庭千禄以閥抱闗非耻方浪為鎻棘之謀得闕正賖敢躐兾及􅀲之代藉使承竹馬之棄亦未得蕉鹿之真敢圖䑓􅀠之臨許論子孫之契去之日如始至知來者之䝉成舊之政必告新敢因之而請益回郫縣侯監税無隴西李博之材濫兹巢幕有夷門侯嬴之智亦爾抱闗委贄相先報章敢後恭惟某官學卑衆楚家近三蘇衫曵枯荷難裹崔嵬之氣筆摛玄草漫為拓落之官暫屈関譏聊從吏隱佇漢庭之用老從吴市以登仙某未洗袴袍辱迂車轍載披郇翰有言何至於失人儻憶郫筒無酒或容於酤我回髙監税李巡檢區區薦士蓋採公言亹亹陳牋何勤私謝所願激昻於事業庶無孤負於品題報不成章言不盡意回江監酒名門諸彦夙忻投分之多計幕一時兹有為寮之幸欲倐辭而不敏愧執訊之相先恭惟某官材本家傳美由世濟英辭倚馬秀子弟芝蘭之階喜色乗龍隱王孫美蓉之褥尚何事麯蘖之託居然營糟粕之餘郎君可是筦庫人聊復爾耳碧香􅀼比主家釀將有望焉茍無平原督郵之嘲㑹博凉州刺史之任某自安飲水敢望啜醨交公瑾如醇醪將從今始為穆生設醴酒幸勿我忘回李監酒景初元辛之號重光天回西顧剛夘之稱單閼日䴡東迎亨在泰通祥因履考恭惟某官淸材蔟達懿識規圓蒼璧絶瑕彌聳旦評之望青旗簇仗行登元㑹之班諒對於莵顧兎之交益介食蛤踞􅀛之壽某尚稽賀牘過辱頌言尚可歸田正有望王牛之送不堪立仗詎肯希櫪馬之喧回新榮州史監酒季儉鳳凰千仞昔聞將下而復飛鯉魚尺書今見肯來之甚惠有勤委贄敢廢報章伏惟某官胄出典刑家傳忠烈振振公姓不肯附黄閣之家挺挺祖風殆欲伏青蒲之節謂立登於膴仕顧小隱於步兵惟是三榮之陋哉詎堪再辱於賢者攺邑不攺井竟困井遷有民此有財不勝財竭所謂蠅頭之入全仰犢鼻之酤郎君可是管庫人聊復爾耳先生未出禁酒國幸疾驅之某尚耳强顔真成厲尾一郡之政守與酒因利利之衆人皆醉我獨醒執事事也回史監酒文舒同官爲寮輙剡公車之牘薦賢報國豈収私室之恩一謙之撝三復以愧恭惟某官美由丗濟材應時須舉瓢而酌天漿更觀逺業明經而拾地芥佇决巍科將猶錐之處囊中何止羅而致幕下某每勤婉畫良覺賢勞推轂有味其言式稽于衆引鼎不程其力姑見此心回新榮州家監酒民献某乏葡萄之博郡既竭吾才累糟粕以築䑓徒得君重顧念步兵隱嗣宗之職何勤天子使家父之來恭惟某官業精于勤學優則仕族庖之刀有餘刃争自致於功名良弓之子必為箕諒夙精於詩禮少時嘗讀醉鄉記郎君可是管庫人惟此三榮之窮仰於一醉之冨㫖且多多且㫖當辨聖賢私勝公公勝私在權子母惟尊不空而客常滿則人皆醉而我獨醒引勝地於一盃趣朝天於三斗某啜醨何有罰酎是憂爾來三月寔無塩不堪寡助破除萬事何過酒切幸疾驅回周監酒孝爕叨恩試郡正懼曠瘝聮事為寮幸逢名勝愧陳箋之不敏辱垂問之相先伏惟某官抱負恢宏典刑膚碩暫屈糟丘之隱小試清醇諒知酒誥之篇益加醲郁佇階騰踏即踐髙華某老矣倦游冒焉逺戍對北海而捉私醸免俗未能交公瑾如飲醇醪同寅是望其為傾徯罔既敷陳回榮州吕監酒逢年守榮黎之徼方幸終更分通義之符洊叨詳試有勤下問益仞髙情恭惟某官學有家傳材髙世濟故國非喬木之謂蓋有箕裘惠風汜崇蘭之光有華階序㑹即登於玉筍式並美於金屏某前者為僚兹焉改戍猶䝉奬借及於芻狗之陳要是飄流念在蓴鱸之熟回監叙州茶帛庫張世永海上八月之仙槎昔幸逢於博望山下十年之老石今再遇於榖城凄其一夢之驚愧此尺箋之貺恭惟某官風標靖重器識端温近世名卿疇若乃翁之清介當家奥學定存是似之典刑紆餘入幕之賔協相摘山之畫春風萱草承燕喜之慈顔秋露蘭芽已蟬聮於宦牒佇觀濟美還入旁招某叨領蟇頤獲迎鷁首見名駒之汗血良慰故情懐野鶴於未仙還悲往事回趙舡埸必孚巨川作楫夙知家學之髙野水横舟謾借時材之重䄂長牋而見畀搔短髮以懐慚恭惟某官籍甚宗英蔚然相種若射有志已穿鵰鶚於西風其釣維何行掣鯨魚於東海顧屈箕裘之學暫司刳剡之工當斧斤間睱之時聊聽數聲之鶴唳收文字芳鮮之績即看萬斛之龍􅋮某巢幕非材濫巾有靦登天而攀蜀道昔逢峽水之倒流航海而遡斗門今覺村船之逆上幸百聞之一見及異事而同寮胡越協心何况不殊於臭味魁台齊色尚期勉繼於芳馨回新添差趙監押懦緩無庸濫分郡寄戎昭且整將倚宗英貽書粲然陳誼厚甚文有勤於四六感益倍於尋常恭惟某官胄出文昭學􅀷武略振振麟定夙髙趾角之仁肅肅兎罝合任腹心之選以斗州之甚褊辱天族之肯來桴鼔不驚藩維自壯某獲叨聮事將幸分憂察閭里之姦邪願無犬吠冠宗室之議論庻欵燕談回龔監嶽良臣懐湘屈之清來隱城池之上聞楚龔之㓗實在邦域之中方圖羾箋已沐􅐹記恭惟某官器資膚敏業履端方清淑炳衡嶽之靈忠信挺巫嶓之秀學歐陽子端是百年能幾見之人師昌黎公頋有四舉乃一得之歎謂髙登於雲路乃勇退於急流洊奉真祠益彰雅操寕與騏􅂹將與雞鶩甘從考澗之槃小不虺蜮大不鯨鯢可見在山之潤紅藥猶堪於傍砌青蒲㑹報於褁輪某拙不瘉人狷弗諧世誨諸生於館下以冗見治試别駕於治中何卑敢憚正擬編蒲之暇欵求拔薤之規居是邦事其大夫願依賢者舉進士吾爲同業能勿誨乎回史監廟􅀛十年出幕濫分和義之麾千室鳴絃將竊依仁之益未皇􅐹記先沐蜚牋恭惟某官行無瑕玼學有源委儒林發藻不難地芥之収簿枳擇棲行踐天衢之直某立朝無補乗障非材火兩㷔之生巾真成妖夢水一盂而窺户更望忠規請謁非遥占謝惟略梅亭先生四六標凖巻之三十七梅亭先生四六標凖卷之三十八學職謝永州鄭學諭一聽履聲巳喜似人之見載披手畢更欽􅀶我之文得非所蒙願竊有復恭惟某官學探聖瀆秀出愚溪竆司農之經諒皆殫洽客廣文之舎大似淹回佇郎摘髭亟其奮翼某不能教胄有􅀒轉丞儻簿書獄訟之餘其交以道則道德性命之理當誦所聞謝張學諭元之吟墻竹之公事自分聾丞聞泮林之好音還成伎癢亟裁四六就謝萬分恭惟某人氣韻淑均風猷膚敏尋西塞桃花之鱖豈其河鯉之逢思東吴蓴莱之鱸行矣溟鯤之化無厭俗情之傲贅即觀郷賦之拔􅀹某聊爾治中奚勞賀上膺何如昔巳無可取之楷模籍也抱能尚可相從於閭里囬唐學録淵題輿非據箝􅁓尾以何心衘䄂見貽羡筆頭之有口一謙厚甚三復悚然恭惟某官清挹畹蘭秀分絆藻蒙開蜀道諒餘挺挺之風勤讀楚詞定出選遥之胄佇帝庭之大對豈郷校之乆淹某教胄無庸􅀒丞有靦露繁天豁有慙􅀯嶽之鳯鳴澗愧林慚但覺北山之鶴怨囬呉學正􅀿龍洗塵圡之􅂁未皇請益披月露之牘良佩鳴謙藏以爲榮報於何有恭惟某官風猷凝逺天韻淑均炳扶輿磅礴之靈富詰屈聱牙之學生九辯九歌之地豈自隔於脩門挾八克之能將能將差強於敵國四六且工於駢儷三千足想於縱横某有幸依仁過勤委贄故將軍之雌伏難言李廣之無􅀟新進士之龍飛惟祝呉公之第一囬卓學諭邁聞凌雲之作方幸友仁拜明月之投更髙陳義不知所報藏去爲榮恭惟某官秀出閩中僑游黔鄙横經重席方依夫子之宫墻問舎求田豈爲王孫之僮客佇摘髭於名第即䇿足於要津某教胄無庸􅀒丞何筭楊脩有智但欽絶妙之受辛韓子非才頗覺長慙於典午囬寕郷魏學賔抗塵縣􅁺眞成拓落之官引領黨庠知有􅂄明之彦未瞻文席先沐尺書恭惟某官漢相雲仍鄭公風烈北多良馬老伏櫪之駿厖南有嘉魚秩賔筵之燕衎正爾廪人之継粟何如天子之執漿佇褁蒲輪即空蕙帳某盍請鄰而􅀕竈頋越爼以代庖禮貌衰則去之友其士之仁者㑹計當而巳矣忠焉能勿誨乎回魏教諭得一旅進接辭未皇欵曲謙撝委贄備仞勤渠所慙枵然之胷有􅀌厚甚之意恭惟某官故家古汴乆客都梁渾渾無涯窮虞夏啇周之奥義挺挺有烈願皐䕫稷契之良臣昨膺氷漕之計偕盍對天堦之親䇿暫留鴞泮行奮鵾溟某教胄非材􅀒丞知愧友其士之仁者蓋有望於名􅀖忠焉能勿誨乎詎敢當於溢美回彭學賔居仁􅀚國之賔顧屈習郷之齒愛人以德何勤博我之文一謙惠然三復感甚恭惟某官夙充嶽貢見謂楚材子佩明經詎肯受安昌之薦籛鏗好古祗欲爲孔子之徒行膺拾芥之科寕乆采芹之客某自慙斈落更愧名浮憂則違之頼不失黔中之上佐士之仁者當或憐澤畔之大夫回朱齋長兹􅂪謙巽又復賁臨退而歌鹿鳴之三何止重車渠之百蟾枝鵬路所有更以贈君燕夏鶯喬此言何爲至我回趙省元易學諭兹承纚履寵臨鳴謙垂賁栁子之業甚淺未見可師李翊之問何恭恐􅀌求益伏惟某官器函趙璧學貫羲圖家人則有嚴君觀復不逺主器莫若長子幹蠱奚先惟精研三聖之書且博䆒九師之傳鴻漸之爲儀可必鶴鳴之好爵何逃某屯蹇餘生乾坤長物相從講朋友之兊不亦恱乎然有非頰舌之咸所能宣者回宋直學學詩侯貢士友德史掌儀霆楊賛講大介宗西漢之文詞未皇請益祖東坡之翰墨猥辱鳴謙所願就有道而正焉敢恨何相見之晩也恭惟某官岷峨山立江漢淵澄晏如揚雄固巳度越於諸子飄然李白詎容流落於六丁無忘澤豹以培鵬㑹即騰蛟而起鳳某再皷愈淡五技巳窮甞聞蜀都蓋亦兆基於上世思樂冸水尚期克廣於德心回衆學職濯太白之氷壷知卧月花之影磨文饒之璞玉願聞水薤之規辱委贄之寵先愧識賢之緩後恭惟某人炳靈世載文獻老成蚤聞髙軒過之吟羅胷有耀詎意古戰埸之讀過眼還迷是冝不見於諸侯猶辱􅀚過於吾黨九萬里風斯下願培鵬路之程三千字日未斜即對龍墀之影某兹􅂪投璧始悟遺珠有司以公不以情且相同於采藻於我無德亦無怨願更草於凌雲進士回李校正息肩属爾未遂見賢振履跫然猥勤委贄退而展玩悚若感慚恭惟某官作賦摩空成文翻水飄然太白空望眼於岷峨籍甚仲元輩脩名於夷惠若爲將仕之諾當淹行秘之書暫客諸侯無謂道旁之苦行賔王國即爲席上之珍某得姓偶同卜隣不敏事其賢者友其仁者足慰逺游爱勿勞乎忠勿誨乎尚希餘論代回曽祕校炳世契故人有子昻然野鶴之標妙語及門副以家雞之帖恍如喚夢殆不勝情恭惟某人自出清門不爲俗斈接茶山先生之􅂀信有委而有源継郴陽從事之賢諒肯堂而肯播有懐父黨見惠客卿共阿戎談自斍後生之可畏薦祢衡表孰知餘力之不任姑記丸苞鳳之祥徐思千里馬之報代回陳宣教植世契紅蓮緑水談舊事以無人翠竹碧梧喜故人之有子投文爲惠陳義甚髙恭惟某官閥閲芳華典刑炳蔚塤箎伯仲皆嶄然之秀金玉氣質疑小者之佳早騰吐鳳之詞夙記鳴蟬之賦雖偶遺於世禄㑹自􅁬於儒科􅀚其紙上之辭此豈池中之物栁宗元之記先友賸有人焉山巨源之念遺孤焉知來者某有懐世契幸及英游思不忘乆要之言旣聞耳矣有可相料理之處願盡心焉代回廖宣義慶成共阿戎談獨未見其父耳作靈光賦果有異於人乎申之雄箋展也厚意恭惟某官清門有奕素斈甚都安在何見晩耶小淹賢業幸哉有子如此足表義方頗聞及􅀲巳戒行李頋念江湖之賜號亦勤煙霧之勒移想象朝雲巳斍鋪張之巧扶持夜燎更勞駢􅓻之工某無以報瓊重於辤璧靈椿一而仙桂五跂予望之胡琴四而鹿鳴三聊相復也回韋省元患在爲師濫綴虞庠之属惠而好我獲窺唐律之工恭惟某人詩解人頥句穿月脇金籝一經之斈信有家傳蒲㠶百尺之風勉爲國許某有勤投璧所乏報瓊郷人之善好之􅀇遂忘其尚白後生焉知來者青正望於出藍代回孫祕校暄薄宦走何邕躐升五雉故人有孫宰忽􅀉􅀟魚恭惟某官學業甚均交情未憖重憐瓠落壯不如人矧復蒲凋老當佚我與其佩水蒼而徒爾不如飲山緑而終焉某自揣頭顱難司喉舌未能免俗復叨曵履之榮豈不懐歸巳動挂冠之興代回辛宣教穣辨謗惠以朋箋申之儷語辨先正之謗勁氣凛然叙通家之情髙懐厚甚恭惟某人象賢濟美燕譽蜚英李師中之讀書不難擢第王文正之有子猶未沾恩是非以乆而明公侯必復其始一生一死詎敢爲翟公之交三沐三熏所望聽韓子之説某􅃡懐契闊倍有䀌傷吾言之聽者誰歟法當小待子歸而求有餘也願益自強代回曽祕校三益共千里之月猶愆半靣之期􅀉五朶之雲仍􅀒隔年之債雖迷於復實感所􅂪恭惟某人咳唾成珠弟兄連璧素所蓄積捲湖海之波瀾作爲文章粲朝廷之翰墨公等安在吾道非耶某日旣薄西星猶拱北邯鄲借枕雖重游廣樂之天神武挂冠行將老菟裘之地如君善頌非我敢知回蹇祕校兹􅂪盛服見賁長箋吾政何及公言耶􅀷慙溢美是􅀖友其士仁者尚頼告忠至如社廪之儲尤頼里仁之唱并此叙謝兼布願言回􅀽進士此君將無是乎愧識賢之不早公等何見晩也辱委贄以甚恭景星􅀒先覩之懐明月重暗投之恨恭惟某人器資凝逺業履端温文章滿家有曄天葩之吐俊乂觀國何難地芥之収始疑泄栁之閉門今感任棠之出户某濫分小壘乆避正堂聞髙論傾枚鄒何嫌末至見刺史即周孔則不敢知回景省元所求乎友未能方􅀷訟愧不見諸侯何義始辱臨存有勤委贄之華寕恨盍簮之晩恭惟某人胷蟠義氣腹溢儒書春登孟子之門固妾婦儀秦之學差入子貢之室定奴僕屈宋之騷其在雲仍諒有風烈况巳入地官之獻佇亟膺天網之収某假守非材識賢不早當户而見龐守旣爼豆予避堂而舎蓋公無金玉爾回尋進士救荒某問隱遯之肥見賢不早捄流離之瘠借助良多方圖草具以盍簮遽辱英詞之衘䄂伏惟某官才髙時輩譽藹月評不見諸侯若小然方踰垣而閉户爲食於路待餓者乃􅀍髪以纓冠思飢諒切於巳飢獨樂孰如於衆樂彼或以鄰國而爲壑此獨耻匹夫之納溝相友助相扶持得人焉耳無衆寡無小大易地則然某假守􅂪成強顔逃責旣見君子巳忻慰趯趯之螽爰及矜人要共念嗷嗷之鴈回􅂫祕校榮祖九州四海知有百年幾見之家五兩半通偶在一翁二季之里世濟其羙吾見其孫恭惟某人規矩髙曽淵源師友黄楼一河水親承宗􅂀之傳青松三萬栽更覺孫枝之茂佇用元祐之學入對蓬萊之宫某爲長於斯得人焉耳袴歌今五詎能及廉叔之暮來樓近古三儻肯爲􅀺侯而晩賦回􅂫祕校烝􅀌雲落照敢言歌樂職之聲名山大川疑尚有英靈之氣在賢者識其大者惟有之是以似之恭惟某人學有家傳文必已岀不作人間煙火之語冝在天上雲霧之䆫遥遥賈誼之有嘉挺挺魏謩之似證子弟何預人事兒郎自有家風力行所知不聞亦式某朅來假守獲識真儒松聲聞十里之風幸同臭味薤本置一盂之水更望箴規回􅂫貢士辰之下第童而挾䇿莫非誦眉山之書老矣懐章乃獲守通德之里未皇下榻先辱踵門恭惟某人學有宫庭詞爲枝葉承老翁青松之植擅㓜婦黄絹之才平時謾説古戰埸豈料還迷於五色歸家但草凌雲賦㑹將放出於一頭某正愧遺賢頋勤委贄貧家見珠貝真成􅀒昡晃之羞使君洗樽罍行欲致荒唐之謝回孫省元和之吟風弄月之歸未皇請益裁霧縫雲之作猥辱擊蒙喜聞足音仍拜手畢恭惟某人學行之上世載其英古稱閉户之先生豈其苖裔近耻呈身之御史殆有典刑乆江湖魏闕之遊識伊洛濂溪之􅂀知其主信其客必窮游夏之渊源加其膏希其光詎止卿雲之黼黻某未皇避舎猥辱踵門一瓣薫南豐之香願􅀚卒業幅巾援東坡之筆嗣得乞言梅亭先生四六標凖卷之三十八梅亭先生四六標凖卷之三十九賀正賀嗣秀王師揆正斗攜龍角又頒羲仲之春雪滿兎園請賦梁王之壽恭惟某官宗藩明德政路崇班慶襲璿源黙應璿璣之運寳分玉帶益調玉燭之和冝從桃葦之辰丕介椿松之祉某愧無善頌可賀履端曵鄒陽之􅅂方規旅進授司馬之簡更佩謙光賀史丞相正代董制置鳯紀更端復對戊寅之曆龍􅄤回次又新甲乙之司時維元勲坐膺純嘏恭惟某官勲髙王室忠簡帝心以道德而位三公應千載明良之運理隂陽而遂萬物成十年生聚之功冝誕受於春祺用永扶於皇極某一違鈞範五見嵗華身在西陲阻效椒觴之祝神馳東閣輙輸竹簡之誠賀鄭參政曽樞宻正代董制置三陽交泰驗正月之始和五福照臨瞻輔星而有耀冝介簡穣之慶用彰弼亮之功恭惟某官德恊春温氣排冬凛參賛陶鈞之化機之柄曽云樞允釐百工沈潜帷幄之謀折衝千里宜對青規之旦亟登黄閣之榮某一自西來五逢朔易呉蜀萬里未由稱壽於椒觴蕭曹同心所願垂光於竹帛賀制置安撫正辛夘太嵗在辛令豫孚於三甲吉日維戊春先撫於五辰相維玉帳之籌對越璇璣之運恭惟某官川流厚化山立陽休仁行而春爲青規而圜萬物剛養其氣轉洪鈞以壽八荒聊賦頋兎追龍蛇之詩更均􅅙叢及魚鳬之福問訊梅邊之味亟催花底之朝某辱芘陳人尚棲故壘千林有喜固忻捲賀燕之簾三徑就荒巳願返屠羊之肆賀黄制置正送赴壑之鱗喜避蛇於劒閣振治兵之甲行歸馬於華陽啓寅車之勞還回午門而愷奏恭惟某官盛心懿識惠氣威風横腰下之黄升作眉間之色推腹中之赤立爲城上之祥嘘師律而􅁰生播民和於麥實紅塵晝靖不妨圍夜觀之棊紫禁春回㑹歸押曉班之仗某又看新曆真是陳人騎火照山紅遥想元功之疊賞雪嶺界天白何時尊酒以重論賀諸司正庚寅知榮州作庚寅孟陬六十齡之復見甲子朔旦四五紀之罕逢其在皇皇之華冝膺簡簡之福恭惟某官德潜天粹政播民和圓萬物以青規之仁厥臨孔惠轉八荒於洪鈞之氣其泰大來盤旣頌於椒花户益蟠於桃實某得州斗絶觸緒氷寒多且㫖㫖且多不敢貢􅈋柴之醸熾而昌昌而熾但知祝椿柏之祺頌傒惟􅀷敷陳罔旣賀曽安撫從龍正三統肇子運開豐㮊之辰萬物出寅律應棣通之㑹維時重德茂擁啿祺恭惟某官得天委和行地載厚望公如嵗便當晝對於延英與物爲春可但曉行於湘水南人不復反矣東山以公歸􅀆某投老黄塵佐州黔鄙願開壽域使無不逹之勾萌尚念荒莊俾預向陽之花木賀監司正日月􅀄􅄤星紀復回於赤奮地天交泰雲墟益播於青陽時惟六轡之華茂輯百嘉之慶恭惟某官德潜剛克道配陽休繡斧淑旂暫􅂆楚郷之農事瑶車玉􅋴還逢湘水之孟陬仁風轉蕙以汎蘭善􅀋拔茅而連茹某二年黔佐萬斛緇塵破崖岸而爲文丞詎復敢喧於櫪馬瞻原隰之有華使尚祈岀送於土牛賀緫領運使正嵗在元辛承以長生之兎日維吉戊臨于正旦之雞載維四牡之有功定促八鸞之入覲恭惟某官陽休山立大德川流福星臨參井之墟民無遣便卿月代房心之次帝有恩言三陽茅拔以茹連百禄竹苞而松茂某尚棲舊䕃又見新年兩鬢霜濃難望東風之解凍一犂雨足願從南畒以歸耕賀緫領正陽春肇始是生萬物之輝王人載馳亶序諸侯之上冝介穣穣之福以稱皇皇之華恭惟某官清徹冰壷和鍾玉律錦衣諭蜀榮弩矢之前驅繡斧控荆慰樵􅂫之後㸑履端於始何福不臻某濫守竹符阻持椒斚木牛坐運送寒寕假於土牛櫪馬交喧召見即登於金馬賀王緫領正鉛陽春生萬物之輝維其時矣王人序諸侯之上何以予之冝對三陽茂綏百福恭惟某官清標氷峙和氣緹温給餽江流聊緫木牛之運揚鑣天路即符櫪馬之喧某濫守竹符良􅂪樾隂太元八十一首又􅀚頒朔之新廣成千二百年請致脩身之祝賀林緫領正祖洽代何尚書作嵗統開端茂蕆始和之吉王人共命肇迎滋至之休恭惟某官望重持荷功髙輓粟三陽謹始時巳進於泰交一札遄歸寵益新於渙渥某又看新曆真是陳人道阻且長缺致椒觴之慶儀圖莫助載馳竿牘之恭賀安緫領正癸仲國典待來嵗之冝元正啓祚王人序諸侯之上壽考維祺况峙魯侯之糗糧均啖安期之􅀲􅀥恭惟某官氣排冬凛德配春融寒送土牛坐斡木牛之運飽喧櫪馬行􅀚銅馬之降梅放栁舒竹苞松茂緫領甚稱上意式副師征朋亡得尚中行共扶泰道某尚􅂪戍雪未解漕氷糴榖湟中所願丘山之􅁀􅁀轉粟天上更宣原隰之皇皇賀李提刑正鐊重光單閼載新一嵗之元五善六條誕布九重之意與時偕極何福不臻恭惟某官德配春融氣排冬凛徧儀兵衛之􅀞㦸岀當霄漢之繡衣皇皇者華遣使臣喚起曲肱之夢行行且止避御史遹􅀚直指之威仁風梅放以栁舒和氣竹苞而松茂某自怜苦李獲掃甘棠我有二天正託故人之芘士更三日尚希舊雨之恩賀周提刑正代董侍郎青帝執規驗三陽之引逹繡衣持斧新六轡之光華諒對端辰益裒純嘏恭惟某官氣鍾温厚德尚和同苞栩逶遲又逢梅於嶺驛甘棠蔽芾還鞠草於圜扉佇有召除亟登要近某罔功分閫有幸爲寮對天地交泰之時當馳善頌體官師相規之義正頼恊恭賀提刑正六螭廻轄目又岀於嵎夷四牡載馳春徧行於湘水端陽旣達純嘏其裒恭惟某官禀氣中和與時消息皇華原隰之上暫借平反清切雨露之邊即司獻納某濫陪結綬莫獲稱觴霆聲發榮共􅒆洲之􅀫莽星言夙駕願揔轡於扶桑賀游提刑正佀九十春光稱霄漢繡衣之立三千夏辟補日月黄道之明時哉泰内之亨天只咸中之慶恭惟某官臯陶明允世叔討論發白獸之樽尚存諌紙拜碧雞之使暫擁節旄對六龍回日之標奏四牡觀風之最脩鱗赴􅐿巳知夕避於長蛇召馹追鋒即作朝來之走馬某一寒戍雪獨冷漕氷偙有一株儻庇無言之苦李用兼庶獄惟依所茇之甘棠賀林提舉正行知代衛參六螭御日曆正羲嵎四牡􅀚風春回楚澤其在皇皇之轡冝膺啿啿之祺恭惟某官政得陽和氣排冬凛周爰咨度使星巳驗於回天胡不均弘卿月無勞於閲嵗與時偕極何福不臻某濫守竹符阻持椒斚籥周一甲極知媿見於葦桃盤薦五辛尚託味同之草木賀趙提舉正乙酉汝談春王三朝元加于嵗使臣五善帝降之祥諒當道長之辰即副公歸之望恭惟某官小宗繼别大雅不羣氣貫斗牛乆鬱長庚之熖星回奎璧即吹太乙之燈行將繫麟趾之風詎止詠兎園之雪某宻依樾䕃又見桃符喧馬盍簮固巳甘立仗之斥􅀞雞貼户詎更思失旦之鳴賀薛知府正乙酉師旦乞漿得酒之占嵗仍在酉轉璣窺衡之驗斗又建寅幸惠仁侯永膺多福恭惟某官氣鍾温厚政布中和有脚陽春享人生五馬之貴細氊廣厦佇河東三鳯之來暫凝􅀞㦸之香即簇青旗之仗某陳人何用新尹焉依舊綴筍班固巳借天街之􅃳兹鋤菜把詎敢忘地主之恩賀趙婺州正善下玉律導和氣巳諧於蔟逹璇源襲慶禄益厚於􅀲綿與國同休裒時多祉恭惟某官飛英宗邸賦政价藩近尺五之天旍旂有爛方千里之地􅃭袴巳温某濫綴槖班阻趨㦸衛三朝受四海之籍肇蕆上儀八荒轉一氣之鈞佇觀歸衮賀永州陳守正疇戊巳日月之樞氣交離坎子丑天地之紀喜溢乾坤况行湘水之春冝有魯人之頌恭惟某官令修王正政播民和奉寛大書盡解東風之凍反離騷賦遂開南嶽之雲攝提旣正於孟陬耋老争祈於萬石某一來黔鄙再見靑陽德不􅀌必有鄰願終垂於樾䕃壽維祺介以福愧莫捧於椒花賀史通判正湜􅀊臨赤奮日月􅀄臨律動青陽地天交泰式對予環之慶亟催鳴玉之班恭惟某官和與春融剛排冬凛大君有命復進司􅁄寺之平天下無􅁈行即報草扉之鞠不但簇青旗之仗又將開白獸之尊某方􅀼隣光忽聞召節舉頭而見白日羡君即近於長安側身而上青天􅀏我方趨於昧谷賀黄制機正慥天地泰交乗少陽而岀震雷霆振旅利長子之帥師外健蓋内順之亨後勁亦中權之助恭惟某官氣排冬凛德嫓春融偕召伯以來旬瓉流秬鬯共阿戎而守􅀊盤頌椒花人知江夏之無􅀟我羡西平之有子某漕居氷下身在雪邊聲聞于天請以勉在隂之鶴稼豐於野庶或寛我輦之牛代回畢安撫再遇正天運璇璣又届履端之始春生玉帳載迎善政之祥恭惟某官豹略沈􅀷虎符静謐麥苖緑漲挽回幾千萬户之和栁葉青歸喚起二十四橋之夢三陽爲泰百禄交升某方欲具箋猥勤委翰椒盤啓節莫殫頌禱之私樺燭朝天願保功名之重代回程監丞凖正重來及芳菲􅀏逢春之白􅀓誰能更拘束羡守􅀊之杜陵三壽作朋百禄是緫恭惟某官以道怡性未老得閑櫪馬盍簮看破塞翁之馬􅀞雞貼户望成渻子之雞冝對新年益裒盛福某過勤尺櫝更枉五詩􅀒三冝休愴歸日之巳晚况四多懼何善頌之敢當代回淮西趙緫領不儳正轉洪鈞之一氣正月始和序王人於諸侯百禄是緫恭惟某官德儀震動道恊泰交峙乃糗粮坐給和門之衆分之寳玉行䟽中詔之温駱馬遄歸蟄蟲始振某巳投西崦又見東風學舊桃符漸恐門墻之逺築新沙路莫觀衮繍之來代回福建趙運使善宣正行夏之時撫辰熈績孟春之月視履考祥冝有休祺以勞華使恭惟某官德儀震動道恊泰交律轉東風添旌旗之和氣杓回北斗聽綸綍之新除某濫綴荷班阻稱椒斚雲鴻江鯉聊紓削櫝之私櫪馬林鴉㑹遂盍簮之願代回大理趙少卿師石正履端於始茂迎鼎至之祥同官爲僚丕對咸中之慶恭惟某官􅀖之司直民以不􅁈凍解勾萌漸鞠圜扉之草日遲棘木益清訟舍之棠冝有天休相時星聚某濫同秋紀又見春朝有椒其馨未遂稱觴之慶如松之茂敢輸削櫝之私代回趙節使正曆起丁丑數合太􅀄之元陬正庚寅慶在髙陽之裔齊旄整暇戩榖駢臻恭惟某官大雅不羣在宗載考詠梁園之雪客至如雲鑿豳國之氷公歸有日振振公子啿啿春祺某自􅀏陳人又逢新嵗酌九霞之醑莫陪璩瑒之賔對列仙之圖願介松喬之壽代回趙開府師垂正玉曆授時日始和於象闕金支胙土天益厚於龍光恭惟某官揆路崇勲宗藩令德棣華韡韡増光伯仲之聮􅀲瓞綿綿襲慶神明之胄冝從榖旦益衍叢祥某濫綴荷班阻稱椒斚夏正人統已孚草木之和周以宗強願介椿松之壽代回周馬帥虎正正月始和光轉崇蘭之畹元戎小隊暖生細栁之營恭惟某官克壯其猶共武之服東風解凍知挾纊於雲屯北斗回杓即出綸於天陛某濫持荷槖莫捧椒觴玉漏聲長行或聮於朝著金印斗大願益懋於勲名代回建康莊都統松正嵗開端月頓回寒谷之温春入和門益壯長江之重恭惟某官戎昭果毅剛克沈潜千里運籌令肅蟠花之甲三軍挾纊暖生細栁之營交泰大來在師中吉某無由叙賀猥辱貽牋草木知其威名諒􅀷自愛葦桃禳夫惡氣願對殊休代回浙東譙提刑令憲正青帝執規届始和之吉繡衣持斧裒滋至之休恭惟某官澄按日畿振揚風采刑者侀也以待猾夏之姦欲並生哉乃見先春之意君侯如此福禄綏之某濫司白雲猶趨紫禁履端於始未諧杜老之盍簮式遄其歸敢後皐陶之拜首代回江東葉提刑簣正青帝執規兆三陽之泰繡衣持斧賔百禄之升恭惟某官德體冲和氣鍾温厚勾萌畢出想茂鞠於圜扉楊栁方華應勞旋於牡轡一和所囿多祉是冝某濫綴朝行阻陪賀列雲鴻江鯉輙傾削櫝之恭櫪馬林鵶尤切盍簮之願代回福建陳提舉鑄正成咢於午肇新玉曆之頒物蔟乎寅宻驗銅儀之轉維時膚使丕對蕃􅁵恭惟某官德禀惠和政先仁恕六條奉漢乆司廉察之權七聚維閩咸服清平之教泰來旣驗節召不遐某進旅莫陪鳴謙先辱送土牛之寒氣願護衣篝喧櫪馬之盍簮即迎詔綍代回福建張提舉聲道正陽春有脚驗正月之始和肆夏升歌粛使臣之拜善單車所戾百禄是遒恭惟某官氣禀冲和詔行寛大黄堂整暇新美䕃於甘棠繡節光華侈新榮於苞栩有開燕喜㑹即鶯遷某縻身於朝莫面以賀杓􅂝龍角􅁡占星駕之旋氣轉鴻鈞㑹鬯天機之運代回常州王宫教遇正日出嵎夷曆紀孟陬之月春回陽羡祥開剌史之天恭惟某官德體震亨道隨泰長將明振貸之議猶巳飢民奉行寛大之書自今有嵗鴻鈞一轉馹召載馳某乆矣凋年見此芳嵗変則通通則乆願體君子之四時仁者生生者圜茂享太平之五福代回史安豐天錫正􅀱一氣於葭莩曰爲攺嵗望八公之草木更與頒春恭惟某官世濟壯猶躬行仁政地控壽陽之阻莫重安豐天銷固隂之凝巳成交泰冝属始和之吉益臻諸福之祥某欽承履端缺陪旅賀上林鴈過先勤繫帛之書下蔡馬肥願懋扞城之績代回魏湖州大中正羲仲授時日巳賔於暘谷甸侯宣化春自滿於苕溪恭惟某官奉寛大之書布中和之政水晶宫冷何資桃梗之禳鸚鵡盃􅀷滿介椿松之祉某巳投西崦又見東風皂蓋晝行莫遂稱觴之賀白蘋日莫㑹􅀚賜璽之來代回王寕國􅀘之正三陽底日肇新正月之和五馬頒春茂介自天之祐恭惟某官中和布政豈弟冝民椒盤巳頌花嵗今始有澄江净如練福莫不増某􅀼承履端阻陪旅賀信宣州主人之賢者益侈新榮忘翰林客卿之輾然敢伸善禱代回常台州建正日在營室肇新太史之迎霞起天台茂介元侯之祉恭惟某官布中和之政行寛大之書維斗􅂝龍表少陽之用亊俾民􅀚象驗正月之始和君子履之天休萃止某退然厄閠見此芳辰道阻且長愧長稱於椒斚年運而往只擬學於桃符代回林嘉興正揆三微於人統旣届始和牧千里之日畿冝裒多祉恭惟某官道符泰長德體震亨賔暘谷之春湖山目得作嘉禾之命朝夕以湏某􅀼承履端莫陪旅賀􅀟魚中有尺素猥勤桃李之投五馬不受二毛請致椿松之祝代回史蘄州正日賔暘谷曆敬授於堯時天惠仁侯和先驅於楚澤恭惟某官榮分半竹言憇甘棠淮水湯湯扇條風而解凍周原膴膴生麥氣以烘晴冝在凝香益裒流祉某濫持荷槖莫捧椒觴遵渚之有歸鴻請馳善頌盍簮而喧櫪馬佇慶遄歸代回趙徽州希逺正王正謹始肇新人統之頌侯度承休始自日畿之近恭惟某官奉行寛大宣布中和凍解東風共詠袴􅃭之煖杓回北斗茂迎綸綍之温某仰辱先施未由􅀱賀有椒有飶願儲滋至之休如竹如松益介方來之慶代回張建昌嵩正正月始和少陽用事諒魯侯之燕喜受周祉之鴻厖恭惟某官宣布中和奉行寛大東風解凍暫勤南囯之藩宣北斗回杓即接西樞之歩武某未由削櫝先辱嘘枯有椒其馨莫遂飛觴之慶如松之茂願陪隆棟之休代回建寕􅀓大諫伯成正王正紀月肇頒象魏之和侯度􅀚時丕對巃光之渥冝裒百禄以應三陽恭惟某官早伏諫蒲岀分符竹陽春布德巳行寛大之書肆夏升歌即展論思之藴仁賢來止福履綏之某落日在簾浮雲出岫憶爛柯之邂逅又見東風及焙茗之後先願歸北闕代回施温州正挾日􅀚治肇頒正月之和受地視侯丕介自天之祐恭惟某官良二千石福十万家將明寛大之書昔無今有參酌隂陽之運小往大來與物爲春􅅮風斯下某属拘朝綴莫旅賀綦櫪馬林烏但切盍簮之願雲鴻江鯉聊傾削櫝之私代回施温州椷正魯觀占雲周正紀月驗陽律鳯鳴之應符凝香燕寢之祥恭惟某官政爲吏師學有家法召棠所舎迎化日之舒長燕􅁰旣回揚仁風於􅀺庶冝裒多祉以對休辰某濫綴朝行阻陪賔謁碧油紅斾願加意於頒春紫詔緑綈猶傾心於賀夏代回程慶元凖正夏正建寅三陽蔟逹東風拆甲萬物光輝時惟哲人天錫純嘏恭惟某官氣鍾温厚德禀中和化洽甘棠接京師而蒙潤威行若木環瀚海以無波當羲仲之授時冝魯侯之燕祉某又􅀚新曆真是陳人有椒其馨莫遂樽罍之捧如松之茂姑伸竿牘之恭代回王廬州柟正天回北斗新太史之授時地重南巢慶元侯之受祉恭惟某官三槐襲組半竹分符虎豹之皮和戎旣寕諸夏鴻鴈之民安宅咸與爲春一氣始和三靈錫羡某無由捧爵還復烹魚分北果之甘芳又勤實篚愧東華之塵土僅有空函代回臨江洪寺簿伋正夏正建寅三陽蔟逹春風拆甲萬物光輝天惠仁侯日綏景福恭惟某官丗濟其美政皷以和擁朱轓二千石之榮令行庭户環清江十萬户之衆家有袴􅃭冝届始和益裒多祉某濫班朝綴莫旅賀綦佩犢帶牛願懋循良之績林鵶櫪馬式諧㑹合之期代回史吉州定之正陽春有脚又新象魏之頒函夏無塵正􅀝螺江之重恭惟某官氣全温厚政恊中和息潢池之干戈自温􅃭袴厚晋陽之保障豈盡繭絲時維泰亨坐膺鼎吉某備貟朝綴莫簉賀綦佩犢帶牛願挽河而洗甲林鵶櫪馬㑹列炬以盍簮代回李封州煥正分符北闕宅牧南交騎竹交迎不問瀧岡之吏驛梅逺寄巳知嶺表之春恭惟某官服襲典刑發舒政術自爲單父技巳敏於割雞及試海沂才益新於展􅂹兹宣寛札出領臨封諒因報政之來即遂立朝之願某凋零嵗月㸃綴星辰逺方􅀟魚不盡相酬之意人生五馬願収自養之功代回孫衢州子直正頒象魏之法仗簇春祺凝燕寢之香服先夏甸時惟竹使天錫茨禧恭惟某官躬綰左符化行右翊朞年而變莫不頌而歌之諸侯之風未有速於此者有開鳯暦㑹出鶯喬某束緼力微盍簮願切建牙開府阻斟勺於椒花上齒習郷猶徑從於棠䕃代回紹興黄尚書由正條風應節和生元帥之幢樺燭朝天光映尚書之履恭惟某官德儀震動道恊泰亨與物爲春乆騰歌於􅃭袴履端於始行促覲於冕旒某擬斈桃符阻􅁛椒斚杓􅂝龍角巳旋北斗之魁身到鳯池即解東風之凍代回趙湖州正嵗行在午布􅀆方新斗指於寅棣通伊始是惟君子之道長實應諸侯之化行恭惟某官材應時湏美全世濟水晶宫冷巳回􅃭袴之温金鑾殿髙即奉冕旒之對某濫竽幕􅁺􅀼䕃甸侯一紙十部之肯臨巳慚倒置四方六客之併至更尉俄空代回鄰州守倅龍杓回次恊豐茂之嘉辰鳯暦紀元新隆平之美號其在温温之德冝膺啿啿之祺恭惟某官剛體震亨道偕泰長召棠蔽芾拓函夏以無塵湘芷芳菲散陽春而有脚佇簇青旗之仗趣歸紫禁之朝某賦分朱愚􅀒丞黔鄙東風解凍不能消華髪之霜南嶽焉依安得聽清談之露代回敖宗簿賀正嵗躔恊洽仰參長烈之常月旅孟陬俯應大來之泰恭惟某官温温秉德啿啿受祺九関巳驗於氣衝三殿何求於風引佇對蒼龍之礎亟開白獸之樽某甫欲修容巳􅂪惠翰代回南康章僉判攀正春回青陸正月之吉始和水泛紅蓮諸福之物畢至恭惟某官器資温厚政術融明畫諾雍容行趣葵丘之戍􅀏談辨治飽尋廬阜之游當此履端宜其鼎盛某未由削櫝猥辱貽緘列炬盍簮又見嵗華之換染雲翦水莫酬頌語之工回史郡僉賀正文舒庚寅孟陬恊建寅之夏正甲子昧爽轉拆甲之春風仁賢履之吉祥萃止伏惟某官德潜剛克和配陽休正其所爲王道之端云爾惠而不費仁言之利博哉官師無廢於相規福禄遹􅀚於來下某幸同聮事良感贈言兩鬢霜濃難望東風之解凍一犂雨足願歸南畒以躬耕回見任官賀正羲和之賔春日復出嵎夷甘石之占嵗星適臨益部有如百禄之緫是在同官之良恭惟某官德叶陽休氣排冬凛􅀏於菟絶維之去迎玉兎以長生對櫪馬盍簮之喧依金鴉而髙翥共餞梅邊之臈亟催花底之朝某自頋陳人又看新暦但希善類聮翩茅茹之征庶遂寒蹤退托桃符之換回寄居郷官正太嵗在辛令旣先於三甲吉日維戊春豫撫於五辰有如郷大夫之賢冝介王正月之慶恭惟某官氣鍾温厚德備中和􅂨紱懐章暫養旦評之望彯纓澤笏行催元㑹之朝三陽茅拔以茹連百禄竹苞而松茂某自慙政拙􅀼席里仁一榻延徐孺子之來又勤衘䄂五皷推謝令尹之去所願歸田回衆官䄂啓賀正庚寅孟陬度適符於皇覧甲子朔旦壽將邁於降人惟言行得雷風之常則吉亨應地天之泰伏惟某官氣排冬凛仁叶春融從容以和體東風之解凍洵美且直契北斗之回杓冝裒啿啿之祺式對温温之德某幸同僚宷過辱頌言老我陳陳但願學桃符之退諸公衮衮幸早從樺燭之朝代回諸縣賀正嵗躔恊洽暦稽長烈之常月旅孟陬卦應大來之泰時維茂宰坐擁啿祺恭惟某官德並陽休氣排冬凛藹然政譽續花縣之風流籍甚除音漏栁條之消息亟飛鳬舄進簉鴛行某自是陳人又逢新暦尺書􅀉鯉愧􅐹記之不先列炬散鴉尚餘光之見及回外縣官賀正葦桃􅀝户正月之吉始和椒栢浮觴賢人之德可乆凡吾同志即日異除恭惟某官氣恊陽休功多隂隲培温植厚夙存有孚惠之心噓枯吹生共勉不忍人之政撫辰凝績視履考祥某辱託爲僚又逢改嵗所使承流宣化也尤謹履端同寅恊恭和􅂨哉當蒙終惠回學職士人賀正杓􅂝龍角魁枕參維氣轉鴻鈞嵗􅄤益部其在藻芹之秀聿􅀚茅茹之連恭惟某人文艶春葩香浮秋桂百歩楊葉不難鵰鶚之穿三月桃花即看鯤鵬之化不􅀒旦評之望即先天老之題某方欲修辭先勤委贄習郷上齒何幸陪庠序之申重席説經尚幾見賢能之獻回學職賀正庚寅孟陬適合靈均之􅀄度甲子朔旦共希絳縣之老人未祓賀牋巳勤慶語伏惟某官陽休山立隂隲天通列炬盍簮不但習郷而上齒鳴佩澤笏行當重席以講經亟看紫禁之鶯花何羡元都之燕麥某又看新暦真是陳人聽櫪馬之喧真難立仗􅀚土牛之送但願歸耕回李秘校叔璋元日之至人日未果修辭新年之勝故年反勤善頌味􅀟鱗之佳甚抽獨繭而報之伏惟某官胄出兩河僑游四蜀謫仙零佩飄然春樹之天長吉錦囊亂若桃花之雨琢句冝供於帖子䄂牋猥及於衰翁某閲嵗又新守藩亡狀同姓也同業也何必勤五朶之雲勿勞乎勿誨乎所願拜一盂之水謝蹇校正賀正伏以丹鈆㸃勘借重良多朱墨縱横遣書未暇有勤謙施見賀履端八千嵗之爲春何敢當噓枯之意斗升水之活涸所祈廣貸粟之仁梅亭先生四六標凖卷之三十九梅亭先生四六標凖巻之四十賀冬賀楊尚書冬汝明貢禹舉冬式敬人時之授伯趙司至肇迎天統之長相維玉帳之籌歸斡旋璣之柄恭惟某官望隆星履清湛氷壷仁風舒栁以放梅和氣生芸而挺荔侯伯以七爲節教民旣閱於七年天下有三逹尊論道亟登於三事某寸材線短一障􅁅寒困窮井遷要匪井遷而射鮒剥爛復反但希復反於屠羊尚怜九地之微芒曲借五雲之終䕃賀桂制置冬庚寅如淵舉貢禹之冬人時敬授司伯趙之至天正踐長有如元帥之詩書庸介冝民之福禄恭惟某官德潜剛克道配陽休前茅中權威巳肅武功之草采薇遣戍人期聽文德之麻諒由於莵頋兎之交遂趣孔雀麒麟之覲椿齡彌永槐䕃益髙某􅀼芘五雲苟容再嵗井勿幕於元吉在上猶兾有孚復閉􅀜而啇旅不行尚何祗悔賀黄制置冬伯固暢月建子觀復見兩儀之心至日得壬帥師應三錫之命時維玉帳妙合璇璣恭惟某官濟北一編汝南千頃和門晝静士知挾纊之温􅀱柝宵沉民謝閉關之樂頋恐六日四分之鳳律將催五更三㸃之鴛行獻履徑上於星辰合璧長依於日月某身依雲芘心實􅁅寒雷在地中想魏博三軍之喜氷解漕下乏營平一線之功賀曽安撫冬從龍任武岡倅作長至之逢辛日允符雲觀之書南極之次丁􅄤正應星沙之壽維時玉帳昭對璇璣恭惟某官德配陽休道偕剛長地中雷復豈容小䄂之回旋魁下台明即播大鈞之坱圠仁等沅湘之永福齊翼軫之髙某半刺灰寒寸材綫短碧油元帥繡歸即相於西周白脚門生襪貢尚怜於東郭賀安撫提刑都大壽考維祺介以福福豈待祈至朔同日謂之章章必有慶輙修魚繭仰頌鴻厖恭惟某官德合陽休氣排冬凛五雉五工之正帝有絲絇一􅀛一琴之回民皆􅃭袴兹對五雲之瑞宻回九地之春某􅀼伏蟇頥阻瞻龍節天隅把繡自知無一線之長月琯吹葭更願假重緹之庇都大恭惟某官德合陽休氣排冬凛萬馬並馳而獨立恪秉素絲四牡有功而遄歸亟登紫槖兹對五雲之瑞宻回九地之春首末同前提刑恭惟某官德合陽休氣排冬凛合東西而瞻使節載駕星軺審簡孚以嚴天威益掦風釆兹對五雲之瑞宻回九地之春首末同前賀黄緫領冬申律諧鳳應日迎天統之長士飽馬騰雷動雲屯之喜王人序諸侯之上小人腓君子之依恭惟某官道配陽休德存隂隲緫領甚稱豈惟足戊巳之營留屯並行諒巳得甲寅之報茂對丈三之景亟膺尺一之褒某自分灰寒仍逢澤竭所見者今我也無有一線之長非吾之故人耶更望垂五雲之庇賀王緫領冬天復一陽滋萌帝澤星連五緯宻應使􅄤恭惟某官望重握蘭功髙輓粟樵􅂫􅀫飽暖生細栁之營繡斧晝行歸行瑞􅕴之陛自今以始何福不臻某限以守符阻陪賀履錢流地上煩坐運於木牛人自日邊即召還於金馬賀綦緫領冬奎占七日之來道漸通於君子序諸侯之上權莫重於王人與時偕行何福不至恭惟某官氣排冬凛德配陽和灰動重緹撫三軍於挾纊日長一綫緫六轡以如絲諒從獻履之辰行拜予環之命某甚慚玩嵗又見書雲涸轍西江愧難辦青雀之舸挹漿北斗何因搥黄鶴之樓賀安緫領冬癸仲雷在地復君子占七日之來雪應年豐王人序諸侯之上自今以始何福不臻恭惟某官德並春融氣排冬凛糴湟中之粟未易斗量流地上之錢端如雲滃伯趙聿司於短至安期逺迓於長年某百念灰寒單車氷冷繭絲巳竭何由沃六轡之絲襪線非長更願寛五雲之綫賀牛茶馬冬大年端策拂􅀛地雷之復攸往摘茗市駿山澤之節遄歸與時偕行有秩斯祜恭惟某官陽休山立神動天隨獨鶴整江海之毛雲程駿歩萬牛立丘山之首風節自髙諒當伯趙司至之辰益對顔氏庶幾之吉某真成浪出乆俟汰歸紛紜滿眼趨走傷心良厭看於新曆風物相親形容獨老儻尚念於故人賀黃運使冬桂斗北中而建子暦肇應於周郊日南至而逢辛書允符於魯􅀚維時英節茂擁啿祺恭惟某官德配陽剛氣排冬凛氷解漕下旣曉行湘水之春雷復地中即夜對宣室之席諒應四分之牛晷坐齊七政於龍魁某材乏綫長分甘車副儻怜紫陌看花曽綴於馬蹄雖在黔山吹􅁰固希於鳳律賀李運使冬鼎化日舒長共紀魯臺之至卿雲紛郁重行湘水之春况兼熊旂龍節之華冝介羔酒兕觥之壽恭惟某官仁排冬凛德配陽休物換星移又復濯滄浪之水漕下氷解便當登碧落之天仁風梅放以栁舒和氣竹苞而松茂某寸材綫短半刺氷寒飯􅂼飲水而曲肱將歸尋於舊物衣繡􅀚風之直指諒未按於故人賀吕提刑冬祖烈六雄召律􅀚象見天地之心四牡周咨用龍在山澤之節矧佩纍纍之重冝膺簡簡之祥恭惟某官道與時偕德隨剛長二節三節之趨走詎鬱鬱於岷峨八命九命之朝宗即浮浮於江漢諒對一陽之復益臻百禄之遒某席芘雲􅀷效官氷冷嘆至日之長爲客但切懷歸因風物而暗相親敢伸善頌賀樂提刑冬代衛參政緹陽襲筦綫晷延圭明謹用刑克廣好生之德靖共介福諒裒滋至之休恭惟某官清徹氷壷和鍾玉律棠隂晝永訟巳息於楚氛葭室灰浮暖自回於嶰谷某偶叨分閫正阻造門端䇿拂􅀛七日巳占於不逺聽筩鳴鳳九成更佇於來儀賀陳提刑冬天冝黃鍾恊律可推復見之心繡斧詳刑茂對咸中之慶惟明克允何福不臻恭惟某官德配陽休氣排冬凛周原苞栩乆勞六轡之驅馳漢節梅花巳報一枝之消息風雲之㑹日月以需某有幸同寮惟深善頌㫖且多多且㫖莫遂稱觴昌而熾熾而昌願加視履賀劉提刑垕冬鳳筩回律肇倡應於六雄龍節詳刑方驅馳於四牡勞行邁之靡靡冝降福之穣穣恭惟某官德本剛潜道偕陽長綉衣持斧曉行湘水之春縞帶隨車暮對江天之雪所虞馹召靡俟鴈回某佐此斗州微哉星屏託刺史二天之庇聊復編茅占夫子七日之爻敢希拔茹賀游提刑冬佀雷在地而復吉實開泰内之亨天違水而訟清冝介咸中之慶矧壬公之司至趣辰告之遠猶恭惟某官德與氣游道偕剛長昔時諌草􅂴看省砌之花今日判花聊鞠圜扉之草栁舒梅放松茂竹苞知幾其神何福不除某身依雲芘心實灰寒乃積乃倉吹鳳尚希於生􅁰我任我輦牽牛何補於服箱賀提刑提舉冬律動黄鍾倡六雄而叶氣風生􅀞蕩歌四牡之有功其在皇皇之華冝膺簡簡之福恭惟某官德潜剛克功播民和星駕回天又見一陽之復雲書占嵗載忻五榖之豐諒䇿持斧綉衣之庸即詠鳴玉紫宸之句某心如灰冷材乏線長使者汝容固足回春於􅁰谷丞哉余􅀒行歸曝日於茅簷賀趙提舉冬甲申魯雲書至實呈紛郁之祥趙日御冬益顯光華之逺錫公純嘏乂我烝民恭惟某官德配陽休氣排霜凛舊游天禄飽看芸草之生今使江南尚作梅花之􅀉驗剌綉五紋之永知衮衣九罭之歸某材乏綫長心尤灰冷􅀒暄炙背詎敢輸􅅵畒之忠安性掩身尚或備輶軒之訪賀林提舉冬清䑓課曆肇新三統之元綉節􅀚風順應一陽之動恭惟某官剛大養氣豈弟近民歛散得冝粟若原泉之混中和誕布􅁰回寒谷之温諒對休辰益裒純嘏某適拘分閫良阻造門視履考祥願􅀚不逺之復仁民愛物無忘自養之頥賀趙提舉冬汝譡按緹候氣律巳兆於六雄衣綉􅀚風功益髙於四牡道隨剛長德與福崇恭惟某官清湛氷壷和鍾玉琯趙日可愛旣開南岳之雲豳雨其濛更激西江之水􅁣然􅄃轡行矣賜環某濫長十連又逢亞嵗江湖兩地幸再同君子之寮原隰五章請重拜使臣之喜賀王提舉冬與􅁠身爲國史自當書辛日之雲君遣使臣頋使餐丁年之雪有功則恱何福不臻恭惟某官致孝卧氷移忠叱馭生芸挺荔厭夜直於承明舒栁放梅甘曉行於湘水花甲方周於六十椿齡正衍於八千某雌伏􅀒丞鳯鳴􅀝岳綉衣持斧儻怜同三㸃之鴛行黄鍾爲宫尚或収一聲之牛鐸賀薛知府冬甲申師旦嵗籥在申驗乞漿之踰願斗柄挿子盍挹酒以迎年時維二千石之良敷錫十萬户之福恭惟某官功參隂隲德配陽休􅃭袴温然適應重緹之暖絲綸近只遹隨一線之添諒經伯趙司至之餘即有薛侯來朝之命某身棲棠䕃心委葭灰陪五更三㸃之鴛行敢論交於結綬依一寸四分之牛晷或委照於受􅒡賀趙全州冬必愿魯雲必書暮映衡山之月趙日可愛曉行湘水之春特惟大雅之英茂對細書之札恭惟某官道隨剛長德配陽休字民之仁温若重緹之律嘘物以氣煖然五袴之歌諒􅀚荔挺而芸生益慶竹苞而松茂某襪材綫短泥軾氷寒三壽作朋請效魯頌萬千之祝七日來復幸􅀚羲爻六二之辭賀寳慶趙知府冬善湛魯雲必書將召和於嶰竹趙日可愛况小憇於甘棠維時循良茂介福禄恭惟某官以佳公子継古諸侯報政龍藩驗龍杓之回次潜心鴻寳佇鴻羽之來儀履芸生荔挺之辰萃松茂竹苞之慶即歸北闕遂冠南班某半剌灰寒寸材線短空睆牽牛之景了無展􅂹之能楚波有餘自足回春於燕谷魯酒甚薄不堪賦雪於梁園賀胡通判冬衍甲申嵗在申而得酒巳回葭室之温斗建子以挹漿正作菊潭之壽星屏所舎雲氣可占恭惟某官德與時偕道隨剛長千里分風月之半􅀖國不空六爻見天地之心公侯必復諒裒純嘏即上清班某百念灰寒寸材綫短窮簷日短不堪輸炙背之忠别駕氷清詎敢作持柸之祝賀史通判冬湜葭律浮灰􅀱臨小至棘評佐獄慶叶大來逺莫捧於兕觥誠敢輸於魚素恭惟某官氣鍾温厚德迪中和傑然􅂹展之材監此龍潜之邸鸚鵡盃鸕鷀杓滿介壽祺孔雀扇麒麟爐即儀禁甬某襪材綫短泥軾氷寒乃分之冝詎敢耻狐貉之側惟鄰是卜尚祈分燈燭之光代回大理少卿師石冬緹陽襲筦綫景延圭􅀱六律而合八能旣滋羣動敬五刑以成三德冝介百祥恭惟某官同寅恊恭分職率属各抱黄鍾之器韻共司丹筆之簡書佇積平反入儀華要某濫因聮事獲慶踐長一道氷衘猥辱先施之寵五色雲物願迎方至之休代回程監丞凖冬灰浮緹縵新北臺太史之占雲卧衣裳添南極老人之壽恭惟某官襟懷霜㓗談􅀏春温未老得閑飽味桑榆之暖乆静思動佇儀槐棘之班某莫捧兕觥過勤魚素蒲萄一㪷知公不爲於凉州嶰竹数聲在我頓忘其寒谷代回王寺丞庭芝冬陽德由子而孳地氣上騰善􅀋􅀚復之亨天休滋至恭惟某官沉潜剛克消息時偕手縮䄂間復添補衮之線春回井底巳驗浮緹之灰對此令辰冝其遐福某適拘旅􅃈莫綴賀綦鳴鳳聽筩應九天之詔下拂􅀛端䇿驗七日之朋來代回江東李制帥大東冬七日來復可知天地之心千里折衝實頼詩書之帥道隨剛長政與和俱恭惟某官德配陽休氣排冬凛名播江淮之草木識通河洛之圖書緩帶輕裘方静􅀚於雲祲献履貢襪佇直上於星辰㑹由五更三㸃之行益近一寸四分之景某材如綫短心亦灰寒􅀝棠棣之華猶書紙尾曝茅簷之煖但夢刀頭代回楊州崔安撫与之冬三微肇始萬彚滋亨集康寕冨壽之疇在禮樂詩書之帥恭惟某官克壯其猷乆勞于外斗牛有耀坐􅀚推䇿之長淮海無波自適􅀚梅之興卦巳占於七日班即近於五雲某託契惟􅀷修辝不敏拜長牋之委重搔短髪以寘慚報不成章永以爲好代回淮西王安撫柟冬一陽來復旣見天地之心十國爲連共載詩書之帥且從榖旦茂介叢休恭惟某官肅括弘􅀷靖共正直圖書中祕星連五緯之光樽爼邊城雷動三軍之喜佇應葭莩之動歸儀槐􅁄之班某猥辱手書無由面賀維藩維翰願歸疆理之功如阜如岡共享國家之福代回淮東畢安撫再遇冬緹􅁅候氣一新太史之占茸纛宣風載重元戎之􅀉冝從亞歳茂擁百祺恭惟某官識逺且明材沉而毅輕裘緩帶備􅀚雲祲之祥堅甲利兵孰測霜威之勁佇寕邊鑰入揔中􅁠徑從魯􅀚之登即見漢壇之築某属紆朝組莫捧賀觴玉律和聲旣届朋來之慶金印如斗願迎方至之休代回宋緫領鈎冬日轂回輈舒永五紋之線星軺給餉光華六轡之􅁝諒對剛辰益綏純嘏恭惟某官盛名晝永清徳氷明弩矢前驅見流錢於地上撨􅂫後㸑如梜纊於軍中厎績懋哉歸班近只某濫聮筆槖阻奉椒觴君子占一陽之來當體復亨之動王人序諸侯之上即膺晉錫之蕃代回林緫領祖洽冬陽月終更慶一陽之亨復福星出使符五福之照臨冝對令辰茂膺純嘏恭惟某官剛隨天運和本時中養九德於黄鍾鳳鳴解谷持貳卿之紫槖虎卧長江衮繡晝行樵蘇􅀫飽牽牛極晷旣占􅀱於漢臺駱馬懷歸寕逶遲於周道某濫塵朝綴莫旅賀綦烹鯉得書先辱五雲之墜拂􅀛占易惟期七日之來代回趙緫領不儳冬化日迎長卿雲紀瑞諸侯之上序莫重於王人一陽之來道益亨於君子茂綏福履請致頌言恭惟某官秉德忱恂凝姿信厚峙粮天塹星夙駕以載驅給餽雲屯雷􅂬聲而四起暫司留鑰坐鎮陪京冝對南至之書即侈東歸之詠某材如線短心亦灰寒剌繡吹葭空覺杜陵之老大獻履貢襪但􅀚曹植之文章代回鞏都大嶸冬天復一陽滋萌帝澤星連五緯照映使華維時山立之休翕受川増之祉恭惟某官和鍾玉律淸徹氷壷方今之務孔殷孰堪經濟圜法之司尤急政藉阜通㑹當錢流地上之餘即有人自日邊之召某心隨灰冷技蔑線長賦問大鈞將爲天下而實賀詩成小至亦驚人事之相催代回喬運使行簡冬短日舒長益永六螭之馭長淮清晏遥知四牡之功對此令辰冝其遐福恭惟某官和鍾玉律清徹氷壷聚人曰財坐斡流泉之運嘘物以氣潜回寒谷之温式遄其歸可拱而俟某濫持荷槖阻捧栢觴占卦六日七分是爲道長修身千二百嵗請致祝規代回淮西徐運使煇冬緹灰襲􅀱肇基來復之祥繡節臨邊茂介踐長之慶恭惟某官身兼數器夙駕單車招來鴻鴈之民衆如雲集餽給􅆛貅之旅令若霜嚴冝對天統之辰丕擁日來之福某属拘朝綴莫旅賀絇鳴鳳律和知巳宣於九德牽牛晷逺聊具報以七襄回永州知府陳提刑翿冬􅀼頴川之河􅃳亦飽聞新尹之誇隔巫水之山㠝未果賀中丞之涖􅂪以羲爻之七日賁然郇翰之五雲遂令寒灰頓有生氣恭惟某官仁排冬凛義配陽剛英蕩繡衣固巳淹五色之線朱轓皂蓋聊復壯萬石之亭重緹回襦袴之温一札趣􅁝綸之召某覩先未快禮後知慙陳遵之尺牘可藏詎止榮從事之十部李膺之别駕非昔正足辱太學之諸生惟依湘水之􅀷當借楚波之及代回浙東譙提刑今憲冬清臺占􅀱肇推三統之元繡斧馳驅茂應一陽之動恭惟某官清標範俗雅度鎮浮望蓬萊之雲巳書五色吹􅀌竹之管即簉九階某濫綴朝紳阻陪賀履驗丈三尺餘之日晷旣麗牽牛列五六百炬之火城更􅀚仗馬代回江東葉提刑簣冬魯雲紀瑞堯日迎長黄鍾倡應於六雄繡斧光華於四牡恭惟某官氣養剛大德合中和慷􅁣澄清節凛氷霜之操將明欽恤復見天地之心茂對令辰冝裒蕃祉某才如線短心亦灰寒對五更三㸃之御床無由陪賀布一札十行於方國佇見遄歸代回浙西王提舉某冬和叔正冬伯趙司至儀圖道長之慶允属陽休之賢伏惟某官清徹氷壷和鍾玉琯送之禮樂不離尺五之天任以公卿即近丈三之日某無由面賀例辱手箋烹魚得書莫報五雲之體拂􅀛端䇿但占七日之爻代回福建陳提舉鑄冬日官候氣書嚴魯􅀚之登星使􅀚風福等閩山之厚恭惟某官器資凝逺業履端宏平糴有方粟若源泉之混廉車所部􅁰回寒谷之温冝對亨辰茂綏純嘏某贅貟簮筆辱賜函牋視履考祥願􅀚不逺之復裕民足國無忘自養之頥代回周馬帥虎冬星轉璇璣一陽旣復霜嚴玉帳百福交升恭惟某官肅振戎昭恪共武服馬騰士飽力夸洪鼎之扛鳯應律諧氣恊黄鍾之動佇寕邊鑰入緫中􅁠某謀慶踐長先勤委重仰􅀚雲祲旣符登􅀚之書歸扈日營即見築壇之拜代回全州趙守必愿懷五更三㸃之鴛行舊同班於呉下驗一寸四分之牛晷今假䕃於黔中方圖修獻履之辭已先拜鳴謙之寵故情未愸弱念易盈恭惟某官禮樂宗英侯王相種决科唐殿肯吟麗日之煌煌宅牧湘源􅂓和舞風之湑湑對此重緹之􅀱藹然五袴之歌魯雲必書翻手足看於短至趙日可愛舉頭即近於長安某比德微芒甘心半剌地爐煨芋已漸參南岳之禪山意放梅儻尚憶西湖之飲代回王婺州􅀘之冬鳳筩􅀱氣律中黄鍾燕寢凝香衞森􅀞㦸届新陽之漸進知純嘏之鼎來恭惟某官平易近民中和布政温其五袴不惟田里之安清在一盂可作京師之潤履長之後晉接何疑某濫綴周行又逢趙至㫖且多多且百莫捧蒲萄之觴昌而熾熾而昌請祝喬松之壽代回韓慶元元禮冬堯曆正冬魯臺書至其在惟良之牧冝膺滋至之休恭惟某官明氷其相愛日之政民無遺便巳歌􅃭袴之功帝有恩言即布絲綸之命諒對復來之慶即膺晉接之榮某濫次近班無從旅賀猥勤謙德特畀問緘餘同前回王提㪯啓代回鄭吉州寅冬天復一陽氣陶萬彚其在惟良之牧冝膺可致之祥恭惟某官淸德猶氷盛名如晝白鷺青原之山水暫屈外庸黄龍五鳳之詔書即膺表選㑹從亞嵗入覲書雲某濫綴紫囊阻趨􅀞㦸先辱飛緘之况惟􅀷藏襲之榮代回趙信陽善張冬周圭測日魯觀書雲諒惟牧御之賢冝介康寕之福恭惟某官秉姿剛大賦政中和洞明固圉之方茂著扞城之績若時道長行有詔追某濫綴荷囊阻持椒斚謹慿手畢略布􅂨忱代回諸州賀冬璿杓建子􅀚仍驗於五雲綺甸選侯復聿來於七日仁賢所茇茀禄其穰恭惟某官德與時偕道隨剛長絲綸邇只祥催宫線之添􅃭袴煖然聲恊律緹之應諒對四分之鳳曆趣歸三㸃之鴛行某百念灰寒寸材襪短歸吾視諸故府漫見新陽蹇誰留􅀆中洲願膺表選代回紹興黃尚書由冬陽生於子曆嚴伯趙之司星拱乎辰光粲文昌之座冝從亞嵗茂介新祺恭惟某官德禀中和氣全剛大給符鳴履早儀喉舌之司均佚偃藩暫鎮股肱之郡南至旣書於魯史東歸冝詠於周詩某才無線長心亦灰冷紫宸朝散空驚獨老之形容􅀞㦸晝森願謹凝香之寢衛代回廣德余守嶧冬緹灰應律圭綫迎長諒􅀞㦸之凝香叶黄鍾而宣德恭惟某官温恭爲政平易近民善頌洋溢於内畿和氣周流於寒谷兹一陽之旣復諒百禄之交升某偶綴朝參莫陪賀旅五雲下墜如瞻魯􅀚之書七日朋來㑹見頴川之璽代回台州常守建冬斗柄北􅂝日􅄤南至驗侯伯化行之美應君子道長之休恭惟某官江海把麾京師􅂪潤擁碧油之斾歛惠一州標赤城之雲載書五色冝從榖旦即覲楓宸某偶綴顔行無從面慶頌魯侯之受祉益熾而昌問顔子之爲􅀖不逺而復代回平江李大諌大異冬黄鍾律應地回燕谷之春􅀞㦸凝香人詠􅂫州之守冝從亞嵗益介繁禧恭惟某官以厭承明而試馮翊獻履貢襪益􅀷旒扆之思今袴昔􅃭聊借京師之􅃳布緹宻驗召綍顯頒某縻身於朝莫面以賀靈臺龡竹巳黙應於殿中山意放梅更相期於鼎實代回處州林守孔昭冬化日迎長卿雲紀瑞黄鍾動地叶陽律六鳳之鳴紅斾行春驗人生五馬之貴恭惟某官剛全天運和協時中言從古括之􅀖暫布甘棠之教三重緹縵旣􅀚葭律之浮一扎絲綸即趣楓宸之侍某無由旅賀猥辱謙施問顔子之爲􅀖不逺而復願魯侯之受祉俾熾而昌代回常州王守遇冬氣動黄鍾潜應一陽之復香凝􅀞㦸孰如千里之常冝對休辰茂膺蕃祉恭惟某官心焉禹稷政則龔黄似聞十萬户之民各安汝止咸願二千石之福以莫不増緹縵灰浮絲綸鼎至某未由望履莫獲稱觴山意放梅試問和羮之信靈臺龡竹盡回寒谷之温代回建寕􅀓大諌伯成冬魯臺觀象肇新五物之書漢殿陳儀爰合八能之奏惟良作牧与國同休恭惟某官節凛氷霜氣塞天地一麾出守績巳茂於循良千里見王道豈忘於仁義當陽德彚進之始非君子道長而何冝對熈辰茂綏純嘏某無由稱慶輙致頌言􅂝角斗杓暦巳開於周正植鰭箕尾夢即兆於啇巖代回慶元程守凖冬鳳籥寸全中黄鍾之律虎符分握凝􅀞㦸之香履此休辰冝其遐福恭惟某官氣全剛大德禀中和聊卧治於潜藩迄坐寕於瀚海六宫一線添樂国之棠隂五緯連珠接故家之樞柄何天之寵不日而還某濫司秋雲莫捧春酒葭添六琯足知君子之亨麥熟兩岐請副輿人之禱代回湖州魏守大中冬杓􅂝龍而建子象自天旋筩吹鳳以及辰陽從地復諸侯之應百禄是冝恭惟某官坐分左符卧治􅀂翊三微統正知顧渚之春回一線影舒覺長安之日近道隨剛長福与時升某兹辱朋緘無回旅賀葭莩六琯是爲神策朔復朔之祥麥熟兩岐莫陪太守樂其樂之宴代回林嘉興良冬鳯暦起黄鍾之籥地氣上騰燕寢凝􅀞㦸之香天休滋至恭惟某官謹身帥下善政致和魯􅀚雲開接呉王之􅂝李周畿日永憇召伯之甘棠緹氣旣温綸音必渙某濫塵豹尾莫捧兕觥諧秬􅁰之和旣知谷暖作嘉禾之命即聽庭揚代回李通州直養冬􅀄陽見天地之心三微旣兆太守爲吏民之本百禄是遒恭惟某官和而不流剛而旡虐森凝􅀞㦸共稱二千石之良顧瞻白雲遥上九十親之壽勞謙有吉視履考祥某方具賀緘先承慶牘五袴旣聀共瞻剌史之天一線巳添請近長安之日代回胡嚴州䈢冬叚管􅁅浮肇正三微之統棠隂日永况親千里之畿百禄是遒諸侯之應恭惟某官敷華緯國歛惠等城嶰谷冬寒旣協鳳鳴之律桐江春滿足凝燕寢之香雲物一新天休滋至某未由旅賀猥辱謙危氣有推移願體璇璣之運民無愁嘆佇調玉燭之和代回趙婺州善下冬月臨周正肇書魯􅀚之雲天胙漢宗佇賦梁園之雪冝裒茨福以厚桐封恭惟某官德禀忱恂才無驕吝天子有命俾司玉葉之盟价人維藩暫試金華之牧不逺之復未占巳孚某濫綴秋官阻陪夏賀獻履貢襪旣書南至之祥衮衣繡裳願副東歸之詠代回邵武周知軍章冬維斗建子旣復一陽受地視侯懋綏百禄恭惟某官中和布政抚字勞心今五袴之載歌紛迎騎竹添一線之徙䕃聊復憇棠諒當凝燕之香丕介厖鴻之祉某未遑旅賀先辱謙施鳴鳳召和想二天之獨有拂􅀛端䇿驗七日之朋來代回無爲趙知軍善湘冬魯雷旣復星􅄧􅀄臨州牧之政惟和君子之道斯祉恭惟某官名駒千里分雉列城淮水湯湯逺借藩維之重周原膴膴近􅀚還定之功冝對剛辰茂膺紀嘏某無由陪賀兹辱飛緘憇甘棠之隂益舒樂音奏􅀌竹之管即聽鈞天代回寕國王知府􅀘之冬魯􅀚臺而書雲物載叶剛辰頌宣州之賢主人冝裒景貺恭惟某官氣鍾髙厚德備中和昔華貫之徧儀今大􅀖之爲殿何天之寵如日之升某莫捧児觥過勤魚素反復其道公冝歸槐棘之班支離其形我欲息桑榆之影代回池州陳知府奕冬鳳律浮葭旣迎日至虎符分竹茂擁天休恭惟某官克壯其猷共武之服甘棠教洽樂晝晷之移隂細栁營堅新岸容之待臘冝裒多祉以對休期某濫綴朝行阻陪賀旅􅀟旌風動熟􅀚雲祲之祥六纛霜嚴佇應霆聲之震代回安豐史知軍天錫冬魯臺南至卦占七日之來淮水東馳人詠二天之可冝裒多祉以錫諸侯恭惟某官風調不羣器資甚茂承師旅飢饉之後力撫瘡痍収愁恨嘆息之聲復堅保障属當荔挺冝介椿祺某莫獲飛觴猥勤染翰惟君子之道旣長如川之増願方伯之政惟和何天之寵代回信州李寺丞昌冬律中黄鍾日運躔於斗北香凝􅀞㦸雲紀瑞於江東肇對剛辰冝裒蕃祉恭惟某官器資氷㓗德政川流盤仙李之根豈假葭莩之援憇甘棠之䕃茂騰桑麥之歌來復之爻旣占視履之祥可考某濫班朝綴莫履賀絇問微陽之回未回誰汲無波之井知太守之樂其樂賸朌有脚之春代回濠州何都統汝霖冬新陽浮琯寅賔化日之長元帥開藩茂介自天之佑恭惟某官􅀷沉而能勇果毅而善謀鶴唳淮淝草立鼔鼙之績魚游濠上今宣保障之勞茂對休辰冝裒多祉某未遑馳慶猥辱貽箋登􅀚書雲宻巳􅀚於道長築壇擇日佇益振於戎昭代回趙無爲善湘冬宻緹布室地氣上騰緩帶專城天休滋至恭惟某官飛英属籍歛惠价藩草木知名威粛江淮之遠葭莩􅀱律春回嶰谷之温燕喜惟新龍光有渥某無由稱慶過辱属辭梅放栁舒旣宻回於一氣竹苞松茂願益對於百祺代回孫衢州子直冬孤竹之管雲和之琴律諧冬至太末之城姑蔑之里和共春回時惟甸侯懋綏疇祉恭惟某官器資氷㓗政術泉流桑䕃在庭認憇棠之勿翦􅁰生干盛􅀏刻楮之不成佇即從日邊而來斯可後天下而樂某漫聮枌社阻捧栢觴􅀞㦸香凝巳不殊於雲物紫宸朝散猶及見於風標代回南安趙知軍師􅀓冬魯雲旣書陽從地復趙日可愛福与時升恭惟某官信厚存心中和布政􅁅浮緹室民知􅃭袴之温線永繡文公豈繭􅁝之急佇息潢池之盗益凝􅀞㦸之香某未果馳箋猥勤飛翰軍聲破竹㑹淸洞口之塵埃山意放梅試問嶺頭之消息代回史吉州定之冬律中黄鍾謹書雲於太史香凝􅀞㦸歌湛露之諸侯茂對休辰冝膺純嘏恭惟某官榮分漢竹式憇召棠執樂三千俯就專城之樂提兵數萬更書擊賊之功福與時升道隨剛長某未由叙賀猥辱馳箋敢因勒復之間輙致鳴謙之謝代回江州陳守卓冬七日來復聖人見天地之心九江孔殷太守宅生靈之命致和以政均福于民恭惟某官喜氣排冬盛名如晝日長一線賦豈急於繭絲氣煖重緹香自凝於燕寢佇朌褒璽遂秉覲圭某辱託為寮過勤示問修户庭之令有愧頌言寛田里之愁無忘愛助代回新順慶李知府鏜冬書雲登􅀚願靣慶於考祥至日閉関辱手箋之却謁敢慿尺櫝就布寸扃恭惟某官心與氣游德隨剛長出守數巳六逺邁鄴侯之行年近古俗有三喜見坡仙之歸里旣新鳳律冝簉鴛行至朔同日謂之章章有慶矣壽考維祺介以福福履綏之某欲旅賔綦先廑旅拒静以待隂陽之定願致頌言復其見天地之心即􅀚征吉代回前權萬州趙守􅄧星正冬式應堯時之授辛日書至允符魯觀之占維時元帥之詩書茂介冝民之福禄恭惟某官德潜剛克道配陽休雷在地中吉旣亨於七日風行水上身即近於五雲押鴛行三㸃之班轉鴻鈞八荒之氣某寸材線短一障氷寒牽牛之景丈三實窘蹊田之奪鳴鳳之䇶七寸誰回嶰谷之温
