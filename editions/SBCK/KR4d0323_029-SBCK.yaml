front:
  text: 四六標準卷二十八梅亭先生四六標準卷之二十九
  hash: sha256:4a5580fa347fa86a97159b4fd845fb3c41cddc278b0ed64c520c5df693a4bf5d
  markers:
  - {type: page-break, offset: 8, content: '', id: KR4d0323_SBCK_028-27a}
body:
  text: 倅通潭州馬通判赴寧郷簿榮膺宸綍顯貳价藩千里展長沙之平古稱清絶別駕居刺史之半今得仁賢先驅有嚴和氣已溢恭惟某官材猷凝逺識度閎夷勲業終歸於伏波雲仍固在方略何如於討虜風烈隠然久載休声宜躋華貫尚屏星之借重使湘水之安流清風明月之平分折瓊枝而繼佩高蓋華軒之一丈齊玉軑而並馳􅀖國不空公侯必復某失身副墨食志勾朱綴簿上而趨閣前繞枝巳乆采水中而搴木末託䕃方新尚徼風雨之帡幪庶免塵埃之箠楚通潭州張通判履信書生漫仕抗塵祭竈之卑卜史㳙期􅀠役題輿之下昉去民而就吏持不肖以事賢共承攝􅀛尤願前馬恭惟某官器資凝逺德宇洪􅀷紅蓮幕下之婉謀青草湖邊之美製所立皆偉其他可知天道好還共擬公侯之必復王事靡盬肯辤州縣之徒勞駕言屏星戾止湘水平分風月巳歌􅀖國之不空暫建鼔旗更覺湖山之自得㑹趣長沙之召徑登文石之班某副墨陋儒勾朱冗職無蚍蜉之援奈何與上大夫言非鸞鳳所棲此豈爲我等軰設惟倚帡幪於夏屋庶寛箠楚於塵埃通潭州吳通判鏜歌海沂之別駕無路事賢詠臨邑之卑棲㳙辰效役敢以尺書之敬徹於再拜之先恭惟某官地望穹華人門峻特冠切雲帶長鋏夙超四姓之侯佩明月懐連城要是萬人之敵舒翹綠水展足赤城盍歸乎來何去之速峻溫洛榮河之直分清風明月之平􅀖國不空足表監州之績公侯必復益光著令之忠卧而治之行且召矣某﨑嶇白戰漫浪朱勾不卑小官寕免塵埃之箠楚當詣大府尚希風雨之帡幪代回衡州謝通判曳革履之聲足容縮縮擁緹屏之駕手畢渠渠敢因謝緘并致賀臆恭惟某官人今而學古齒宿而意新徘徊金馬之門何相見晩璀粲銀魚之佩曾不逾時泛綠水之芙蓉栽赤縣之桃李兹展􅂹足乃在熊湘王祥垂年别駕之功始立柬之雖老宰相之器固存某見謂龍鍾猶共鳩僝迫壬戌赤壁之夢恍已九齡同甲子絳縣之人幸成二老代回婺州高倅禾鳳凰下千仞頗疑遥增擊而去之鯉魚中尺書乃有長相憶而遺我形骸更逺臭味已同恭惟某官賦料凌雲文成翻水排空直上合盛之白玉之堂取勢斜飛亦冝在青藜之館居然雞肋屈此牛刀冝未折彭澤之腰已先盡剡溪之興空願一㕓於仁政竟違十乗於他􅀖何許飛鳬乃今展􅂹聞及􅀲之不逺知行李之鼎來某已薄暮齡冝收朝蹟聞有長塵尾固願再欵於名談何當大刀頭却恐寖踈於良覿代回肇慶方倅信孺託先世之遊從凄其一夢見通家之姓字粲若尺書似聞逸氣之無前尤喜故人之有後恭惟某官褆身膚敏發聞芳馨頃冐甚危之機肯使不測之虜迄從權變復合和親奈何衆口之難調責以一言之相應忠無不報事乆益明果復舊氊遄紆新組治中展􅂹足才即應於時須池上有鳳毛美更觀於世濟某偶然浪出頗似倒行綠槐十二街此非佚我老之計白髪三千丈行當致爲臣而歸代回撫州魏倅峴伏勤專介見畀屬辭試乞巧於天女孫則爲冝耳頋求福於木居士不亦左乎得非所蒙願竊有復恭惟某官世濟其美材稱乎官一同甚敏於割雞半刺即觀於展􅂹有渥題輿之寵何待推轂之功不即人而人即之行且召矣其求士甚士求我盖亦有焉某既受一㕓當迎別駕比何武之薦龔舍則恐過情期魏謩之繼鄭公所當拭目代回處州董通判居􅁩一官藏拙焉知賢材而舉之三載陟明不如鄉人之善者冒焉剡去何以謝爲恭惟某官敏手决科潔身從政君門不可以徑寧緩其驅公事之了雖癡姑行所學事常出乎名上材益展於治中足應時須敢孤嵗舉需章比入巽牘鼎來頋恐將去齊之情莫酬復望蜀之意某余髪如此歸志浩然儀圖之莫助之浪將短綆匪報也爲好也􅂓實空函代回單通判端巳識中散於未仙知音者寡思元賔而不見訪别其孤報謁良勞贈言尤寵恭惟某官槐根之芷蘭茁其芽題别駕之輿少紆轍迹聽文昌之履㑹振家聲疑只在於山中遂徑造其竹下亦既見止萬金之産不虚何以贈之兼乗之珠相比某愧無瓊報徒辱珍投書門前之一死一生客則陋矣坐足下而三熏三沐愛莫助之代回臨江鄭通判元鼎奉詔舉賢幸不􅀒公車之櫝開緘見面乃猶題别駕之輿揣力則綿摛文何綺恭惟某官才猷膚敏器度浚明君子學道愛人巳之無愠廉吏謹身率下去則見思意一鶚之可言忘匹雛之無力此亦公舉殆非私謝之求所愧外除無復裏言之助猥勤􅅺軾更枉緹函某歸老杜門味言推轂治中展􅂹足豈徒風月之平分池上有鳯毛即看雲霄之獨步代施倅梮囬邵州王倅祖壵褁緹命駕引綬露章湖南二郡之豪雄今稱第一江右諸王之竒俊頋屈平分下車之初載路相慶恭惟某官典刑炳蔚才諝浚明楩柟大夏之材乆於聳壑瑚璉清廟之器何乃潤山滿期留中還又補外厥爲資水尚存漁父之滄浪匪直海沂可飬公台之度量飛騰由此翹企竢之某再轉無庸同寅有幸託交承於隔政不但爲瀟湘之故人話契闊於期年渾未隔京華之舊夢問兩鴻鵠諒歸詔之鼎來遺􅀟鯉魚覺報章之不腆代回紹興史倅䇿􅂹足於治中方開軌轍棲燕巢於幕下正託帡幪曾望履之未皇乃鳴謙之先辱藏固深於十襲報敢廢於七襄恭惟某官天分素高人門具美焜煌相業接王家三樹之槐爛漫丗科掩竇氏五枝之桂冝自庭階之秀徑躋臺閣之崇要津頋厭於立登佳境不辤於漸入鳴琴單父已昭利器之功別駕海沂更飬佩刀之望有來易地益近去天萬壑千巖暫煩應接清風明月眞足平分長史有宰相之材寧無識者群從繼叔父之烈行即見之某一拙百罹十趨九蹶未了癡兒之事復蒙華使之咨一水相望悵有同於蓬弱五雲借潤幸不弃於菅茅代回道州宋倅蒙司臬罔功躐升雉正發函得教似是馬曹歸斯受之告者過也恭惟某官抱負甚偉楊歴益深酌別駕一杯之清試舂陵二三之䇿佇觀􅂹展㑹即雄飛某久覺龍鐘又共鳩僝甲兵之問不至乃所願聞山林之味更長奚其不去代回黄通判犖題別駕之坐君子冝之戀屬車之塵老夫耄矣鼎來郵問益認鄰光恭惟某官早䇿名躔寖儀華路文章爾雅猶存元祐之故家風采老成不減正元之朝士小淹􅂹展佇即雄飛某密託枌榆既凋蒲栁榮鈞天之一餉續夢無多及崦日之半規告歸已决小須驛召猶或郊迎代回李通判銓嘆峨峰之客子舊嘗綴於金臺懐石林之主人今獲依於玉樹所願拜一盂之水乃先飛五朶之雲恭惟某官丗載其英學優則仕繩其祖武合薰班馬之香􅁉乃父功冝踵韋平之武况是一門叔父之貴新領三軍元帥之權雪夜鵝鳴亦識西平之有子風聲鶴唳倚湏幼度之平戎詎容全材更淹半刺式觀挺挺之風烈克稱衮衮之公侯時來爲之風斯下矣某朅來通義正幸依仁所恨五色之迷有􅀒六王之畢同姓同業也底勞叙元礼之通家三熏三沐之尚擬迎盖公而避舍代回綿州程通判植化闥禮闈不隔云堂之霧廉泉遜水久睽緹屏之星伻來以書僕感且悚恭惟某官器資冲逺業德碩膚崛然岷峨之高皜乎江漢之濯發硎游刃已知立解於千牛按轡徐驅亦覺坐空於萬馬不謂九垓之汗漫尚從半刺之翺翔然富樂之山固有富樂之實佐磊落之府正須磊落之人豈有不亀之封侯而忘無蟹之監郡某罔功龍邸洊試蟇津無以我公歸兮試問蕭朱之好事其大夫賢者尚修程李之驩代回吳通判昌裔對月半輪荷不厭平分之破觀風一道乃遽叨進寸之除感曳履以見臨且鳴謙而加賁共惟某官清摽山立奥學淵停濮陽朱弦之桐洗盡人間之箏笛豫章白羽之扇留爲世上之舟航詎容蟇頥乆淹􅂹足頗哀老子夙託年家嘘枯吹生絡繹寄聲於圎嶠駕輕就熟馳驅俾踵於方舟某已控需章丐還節傳集于苞栩集于苞杞但切懐歸投以木瓜投以木桃祗慚匪報代回叙州通判楊承議德輔楊舲監郡懐寳睦鄰秋月兩章真有風人之託春雲多態不爲時世之粧載味落英踐實之言足窺結根孤生之節水色異諸水安能爲清紺之塵君家更贈君無忘厚培埴之力梅亭先生四六標凖卷之二十九梅亭先生四六標凖卷之三十諸司属官
