  - {type: variant, offset: 24095, length: 869, content: 詩彼美淑姬可與晤語代回傅贛州伯召贛州已見趣齊國之裝方圖迎候曹參傳相齊九年齊國安集蕭何薨參聞之告舍人趣治行注治行謂修行治裝也展山谷之啓乃辱先施雖多溢辭莊子兩喜必多溢美之言兩怒必多溢惡之言傳其常情無傳其溢言則幾乎全亦感厚意恭惟某官精明玉立芳潤春溫陸機文賦潄六藝之芳潤史記田完世家大絃濁以春温者君也翩翩者鵻一洗而空凡馬鵻朱惟切鳺鴀也詩四牡翩翩者鵻載飛載下集于包栩王事靡盬不遑將父毛云夫不也鄭云夫不鳥之慤謹人皆愛之此是謹慤孝順之鳥也又南有嘉魚翩翩者鵻烝然來思毛傳一宿之鳥鄭云壹宿者壹意於其所宿之水也恢恢其刃四顧而解全牛洊持江海之麾竝見前始駕山澤之節周禮山國用虎節澤國用龍節夜郎為徼西南夷傳南夷君長以十數夜郎最大夜郎者臨牂柯江江廣百餘步足以行船徼古弔切境也謂以木石水為界司馬相如傳南至牂柯為徼注以牂柯作徼塞也東北謂之塞西南謂之徼塞以障塞為名徼取徼遮之義彭蠡無波尚書彭蠡既瀦荆州記宫亭湖即彭蠡澤也一名青草湖一名洞庭湖史記左洞庭右彭蠡屈原九歌洞庭波兮木葉下又令沅湘兮無波乃今易鎮之除其殆過家之計岑彭傳有詔過家上冢詳見前虎頭城下雖爭為竹馬之迎虔名虎頭州東坡詩詔下虎頭州詳見前豹尾班中恐催看槐龍之舞前漢書揚雄傳在屬車豹尾中後漢書輿服志屬車八十一乗法駕半之尚書御史所載最後一乗懸豹尾豹尾以前比省中注小學漢官篇曰豹尾過後罷屯解圍胡廣曰施于道路豹尾之内為省中故須過後屯圍乃得解皆所以戒不虞也東坡詩日高黄繖下西清風動槐龍舞交翠注邇英閣前有雙槐樛然屬地如龍形宋張邦基墨莊漫錄云邇英閣前雙槐極高而柯葉掃地狀如龍蛇或謂之鳳尾槐蘇子由詩云銅缾灑徧不知寒雨㸃勻圓凍未乾回首曈曨朝日上槐龍對舞覆衣冠某不堪視䕃䕃說文草隂地又入䕃景曰䕃左傳趙孟視䕃曰朝夕不相及誰能待五又復綴班歐陽公詩玉殿清霜綴曉班東坡詩他日許綴蓬萊班又豈意彤庭綴兩班無以公歸少辦朝廷之事豈惟我賀是蓋邦國之光左傳叔弓如晉賀虒祈也游吉相鄭伯以如晉亦賀虒祈也史趙見子大叔曰甚哉其相蒙也可弔也而又賀之子大叔曰若何弔也其非唯我賀將天下實賀歐陽晝錦堂記其豐功茂烈所以銘彝鼎而被絃歌者乃邦家之光非閭里之榮也代回胡峽州坦峽州已見, SBCK: ''}
