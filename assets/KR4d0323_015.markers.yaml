  - {type: variant, offset: 10, length: 1, content: 撰, SBCK: 省元應起制春秋之義傑出妙齡貢郷曲之英褎爲舉首未遑賛慶過辱修辭恭惟某人青藜故家碧梧雋質被孟母三遷之教獨抱遺經當陶舒二八之年創通大義遂魁里選行冠臚傳某何預升賢亦􅂪巽謝愧游夏一辭之莫措但知頂戴於名經慕回路二子之與言更兾潜心於大業謝成都解元五十一人恭審論秀貢英䇿名偕計少城百重列隧自應炳井絡之靈後賢五十一人夙已載華陽之志兹應元年明先聖之詔式副吾皇紹烈祖之期伏惟某人屹自岷峨濯以江漢相如七經之授不專靡麗之辭子雲四賦之工蓋有湛深之思兹並登於天府聞允愜於月評某未遂納交過勤委贄客星入斗恐當回八月之槎魁首枕參尚及窺五雲之瑞回臨安江解頭克家遺經究終始指洞識於數千考官敢瑕玼擢冝居於第一雖知有無德無怨之語然可逭不公不明之嘲何煩摛文更加摧謝恭惟某人傳家忠孝餘事文章安夏攘夷聊復道威文之事發凡言例又能措游夏之詞空萬馬以皆瘖戴六鰲而爲首其義則竊取矣幸不辱天府之書盡心將親覧焉尚幸聽雲門之奏某慙無識鍳濫主文衡掣鯨鯢於碧海之中僅塞直鈎之責對龍蛇於丹墀之下願無曲學以言謝解頭景簡文屢入澤宫聞夙擅春秋之學褎爲舉首喜可塞月旦之評有勤属辭良髙陳誼伏惟某官學濟世美敎自母慈景子君臣之大倫乆於舒究仲尼筆削之微意何止創通當再進再郤之餘厲萬選萬中之技楚雖有玉正恐在三獻之餘秦豈無人其誓告羣言之首某濫叨勸駕愧闕贈鞭先十二以犒}
