body:
  text: 四六標準卷八宋李劉撰謝除授外任代潭州鄒帥應龍謝丞相守藩灕水莫奏膚公灕音離水名在桂州灕山之隂輿地廣記灕水湘水二水皆出海陽山而分源南流為灕北流為湘漢討南粵戈船將軍出零陵下灕水即此漢書注灕水出零陵郡栁詩桂州西南又千里灕水鬬石麻蘭高又崩雲下灕水陶弼詩湘灕水色秋前老獨秀嵐灮霽後勻桂州即今桂林府詩薄伐玁狁以奏膚公毛傳膚大公功也分閫湘流又承嘉惠謝安傳贊任總中臺效彰分閫賈誼傳恭承嘉惠兮俟罪長沙張九齡詩征鞍窮郢路歸棹入湘流仍進璧奎之直孝經援神契奎星屈曲相鉤似文章之畫晉天文志東壁二星主文章天下圖書之祕府也益華翼軫之旁地理沿革表潭州鶉尾之次翼軫之度古三苖之地禹貢荆州之域楊誠齋詩使星下照翼軫旁西山南浦回風光知勤洪造之甄陶敢廢小夫之竿牘俱見前恭惟某官乾坤間氣春秋演孔圖正氣為帝間氣為臣秀氣為人詳見前社稷世臣見前一日萬幾殫輔贊彌縫之力尚書一日二日萬幾新唐書房杜傳贊宰相所以代天者也輔贊彌縫而藏諸用使斯人由而不知非明哲曷臻此哉九州四海知親附填撫之心王陵傳宰相者外填撫四夷諸矦內親附百姓故齊人章章有侵疆之歸見前而魏地糾糾方樂郊之適詩糾糾葛屨可以履霜糾糾稀踈之貌屨夏葛冬皮魏俗趨利惟取其賤故糾糾然夏日所服之葛屨至冬日猶謂其可以履霜也詩序葛屨刺褊也魏地狹隘其民機巧趨利其君儉嗇褊急而無德以將之又碩鼠碩鼠無食我苖三歲貫女莫我肯勞逝將去汝適彼樂郊非用儒無敵於天下見前何不戰可屈於人兵法言堯舜不戰而屈人兵惟公克成厥終永息四夷之警尚書惟周公克慎厥始惟君陳克和厥中惟公克成厥終四夷左袵罔不咸賴俾豫從欲以治允為萬世之功尚書俾豫從欲以治四方風動又萬世允賴時乃功況方中二十四考之書見前詎容專五三六經之美尚書罔俾阿衡專美有商司馬相如傳五三六經載籍之傳維見可觀也師古曰五五帝也三三王也某久違東閣幸宅南交俱見前徒以奉萱草之親詩焉得諼草言樹之背野客叢書云今人稱母為北堂萱蓋祖毛詩云云按注諼草令人忘憂背北堂也其意謂君子為王前驅過時不反思念之切安得諼草種于北堂以忘其憂蓋北堂幽隂之地可以種萱初未嘗言母也不知何以遂相承為母事借謂北堂為幽隂之地則凡婦人皆可以言北堂矣何獨母哉難於戀梅花之外杜詩漢節梅花外春城海水邊又梅花萬里外雪片一冬深所祈便養徑歸綿上之田左傳介之推不言祿祿亦弗及與母偕隱晉侯求之不獲以綿上為之田曰以志吾過且旌善人亦欲投間稍養漳濵之疾韓文投間置散乃分之宜漳江在漳浦縣梁山下豈意大鈞之坱圠見前復容小袖之回旋漢書注景帝後二年諸王來朝有詔更前稱壽歌舞定王但張裏小舉手左右笑其拙上怪問之對曰臣國小地狹不足回旋潭州漢長沙國爵祿兩崇敢但襲荆潭之倡和昌黎荆潭唱和詩序德刑之政並勤爵祿之報兩崇中和並播庶無傷衡嶽之扶輿王褒傳益州刺史王襄使褒為中和樂職宣布詩藝苑雌黃云後漢陳球傳太尉李咸時病乃扶輿而起退之送廖道士序云衡山之神既靈而郴之為州又當中州清淑之氣蜿蟺扶輿磅礴而鬱積王褒九懷云登芊角兮扶輿王介甫詩扶輿渡陽羡窈窕一川花又趙穆别傳汲郡修武趙君薦宰相不就太守羊伊遂扶輿激俞以灮歲貢除成都漕到任謝史丞相伏以再命典州愧偏城之玩愒周禮再命受服杜詩詔下選郎署傳聲典信州又宇宙蜀城偏臧洪傳論偏城既危曹袁方穆李燾詩絶塞邛郲外偏城越雋東愒音契説文息也又音慨貪也左傳玩歲而愒日其與幾何六條遣使玷夲道之轉輸寇恂傳以輦車驪駕轉輸前後不絶餘見前不由推轂之功全出轉鈞之賜俱見前恩隆頂踵感激肺肝竊以益部夙繫使星星詎知其隕石李郃傳使者二人當到益部又有二使星向益州分野春秋僖公十六年春隕石于宋五左傳隕石于宋五隕星也注但言星則嫌星使石隕故重言隕石杜詩丹砂同隕石成都舊稱陸海海烏料其揚塵漢書地理志號稱陸海為九州膏腴師古曰言其地髙陸而饒物如海之無所不出故云陸海杜篤傳帶以涇渭號曰陸海注東方朔曰漢都涇渭之南此謂天下陸海之地潘嶽西征賦班述陸海珍藏張敘神臯奧區注高平曰陸萬物出於海關中地高物産饒富是謂陸海神仙傳麻姑謂王方平曰見東海三變為桑田矣向到蓬萊水淺於往者略半也東海行復揚塵乎蓋自利路之荒殘宋史地理志利州路三府興元隆慶同慶十二州利金洋閬巴沔文蓬龍階西和鳳二軍大安天水尋至潼川之剽掠地理志潼川府九縣郪中江涪城射洪鹽亭通泉飛烏銅山東關永泰左思賦劫剞熊羆之室剽掠虎豹之落督責惟深於西道劬勞良慘於北山詩陟彼北山言采其杞又或不知呌號或慘慘劬勞巧婦尸之尚難責無麵之餅詩誰其尸之有齊季女陳後山詩巧婦難為無麵餅老農惰甚若為取不稼之禾尚書惰農自安詩不稼不穡胡取禾三百廛兮伏念某多病不才至愚極陋王褒傳無有遊觀廣覽之知顧有至愚極陋之纍少年躁妄夏蟲語氷而不知莊子夏蟲不可語於氷者篤於時也中歲險艱吳牛見月以猶喘世説滿奮畏風在晉武帝坐北窗作琉璃屏實密似疏奮有難色帝笑之答曰臣猶吳牛見月而喘注今之水牛唯生江淮間故謂之吳牛也南土多暑而此牛畏日見月疑是日所以喘風俗通吳牛望見月則喘使之苦于日見月怖而喘焉進既乏雞犬之效轉詩進乏雞犬效退巳孤鷗鷺之盟山谷詩老驥心猶在白鷗盟已寒又唯有白鷗盟未寒又此心惟與白鷗盟天宇浮眉尚青眼逢迎之舊韓詩天宇浮修眉濃緑畫新就注言遠山橫如修眉也此眉指眉山東坡送吕嘉州詩橫空好在修眉色青箱雜記范諷詩惟有南山與君眼相逢不改舊時青阮籍傳能為青白眼見禮俗之士以白眼對之嵇康齎酒挾琴造焉籍大悅乃見青眼山谷詩今日相看青眼舊他年肯作白頭新荆軻傳太子逢迎却行為導杜詩錦里逢迎有主人雪山到面驚白頭彼此之新范石湖吳船録云雪山三峯爛銀琢玉出大面山後雪山在西域去此不知幾里而了然見之其峻極可知又云雪山崔嵬刻削凡數十百峯初日照之雪色洞明如爛銀晃耀曙灮中此雪自古至今未嘗消也杜詩經心石鏡月到面雪山風鄒陽傳白頭如新傾蓋如故劉禹錫詩雪裏高山頭白早杜詩别來頭併白相對眼終青山谷詩讀書頭愈白見士眼終青王立之詩話云身更萬事已頭白相對百年終眼青看鏡白頭知我老平生青眼為君明故人相見尚青眼新貴如今多白頭江山萬里將頭白骨肉十年終眼青此東坡詩也用青眼對白頭非一而工拙有差比聞驪駕之虛寇恂傳以輦車驪駕轉輸注驪駕併駕也擊車人絶行也韻會駕三馬為驪大有鶚書之薦見前蜀人題柱頗榮弩矢之前驅華陽國志成都十里有升仙橋送客觀司馬相如初入長安題其門曰不乘赤馬駟車不過汝下成都記司馬相如初西去過升仙橋題柱曰不乘高車駟馬不過此橋果以車馬至其處杜詩壯節初題柱司馬相如傳相如至蜀太守以下郊迎縣令負弩矢先驅蜀人以為榮吳客思蓴恐負樵蘇之後爨晉書文苑傳張翰字李鷹吳郡人齊王冏辟為東曹掾因見秋風起乃思吳中菰菜蓴羮鱸魚膾曰人生貴得適志何能羈官數千里以要名爵乎遂命駕而歸著首丘賦俄而冏敗人皆謂之見機餘見前駭采葑於下體詩采葑采菲無以下體注葑音豐蕪青也郭璞云今菘菜也上下皆可食而其根有美時有惡時采之者不可以根惡時并棄其葉孰蟠木之先容見前人則擇官官則擇人上思異甚蜀志許靖傳審量五材為官擇人茍得其人雖仇必舉茍非其人雖親不授晉愍帝紀贊選者為人擇官官者為身擇利郭默傳時當為官擇才若人臣自擇官安得不亂乎南史何尚之傳官當圖人人安得圖官欒城集若謂侍郎久次當遷尚書臣不知尚書久次遂當遷執政乎此則為人擇官而非為官擇人也用者不才才者不用外議謂何陸贄傳任者不必才才者不必任此蓋伏遇某官柱石九筵見前權衡六幕漢書禮樂志專精厲意逝九閡紛云六幕浮大海師古曰六幕猶言六合也熙帝載使宅百揆燮和歷二紀之間尚書有能奮庸熙帝之載使宅百揆又率循大卞燮和天下立太傅兹惟三公辭遜閲十年之久見前蓋欲復文武之竟竟今文作境詩序宣王能內修政事外攘夷狄復文武之竟土然後受周畢之封帝王出萬全率由先正舊典之式鼂錯傳帝王之道出於萬全兩軍相為表裏各用其長技衡加之以衆此萬全之策也尚書乃惟由先正舊典時式民之治亂在兹春秋大一統迄還寧人有指之疆董仲舒傳春秋大一統者天地之常經古今之通誼也尚書率寧人有指疆土孔傳循文王所有指意以安疆土率土莫非王臣皇天既付中國尚書皇天既付中國民越厥疆土于先王始由孤棘周禮秋官朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公矦伯子男位焉羣吏在其後注樹棘以為位者取其赤心而外刺象以赤心三刺也疏取其赤心而外刺者據三詢三刺而言出正顓槐又面三槐三公位焉州長衆庶在其後注槐之言懷也懷來人於此欲與之謀疏此亦據三詢而言也李尋傳顓面正朝窺於我如浮雲之心豈貪富貴有逮天未隂雨之責尚克綢繆眷言黑水之惟梁尚書華陽黑水惟梁州宋程大昌禹貢論云梁雍二州皆指黑水為境而歷代地書迄無的指今得二書以為之證漢志葉榆貪僕自滇嶲故地南行接會勞水終入南海會其源派近三四千里又滇池有黑水祠在焉可證一也唐咸通中樊綽宣慰安南親行西南諸夷而著為蠻書以載其所見山川曰蠻水之南流入于南海者凡四區江西珥河麗水彌諾江皆羅絡西南諸夷而南入大海其間有麗水者古黑水也三危山實臨峙其上可證二也正窘青天之轉粟杜詩轉粟上青天飛芻既急主父偃傳飛芻挽栗注運載芻粟令其疾至故曰飛刻楮尤艱楮即會子之屬文獻通考云糴米以楮鹽夲以楮百官之俸給以楮軍士之支犒以楮州縣支吾無一而非楮銅錢以罕見為寶物價翔騰楮價損折民生憔悴戰士常有不飽之憂州縣小吏無以養亷為歎皆楮之弊也列子宋人有為其君以玉為楮葉者三年而成鋒殺莖柯毫芒繁澤亂之楮葉之中而不可别也列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣此借用知其熟魚鳧之遊揚雄蜀夲紀蜀始王曰蠶叢次曰伯雍次曰魚鳧念其無蚍蜉之援見前特加識察俾效馳驅某敢不思廣咨諏力圖任負三十鍾致一石無敢辭難主父偃傳使天下飛芻挽粟起于黃腄琅邪負海之郡轉輸北河率三十鍾而致一石師古曰六斛四斗為鍾計其道路所費凡用百九十二斛乃得一石至百畞分食九人亦當加念惟知黽勉黽音閔爾雅勉也詩黽勉同心詳見前皇恤駑庸流馬木牛儻可息民而休士豢龜籠鶴終希置散以投間俱見前除成都漕謝政府連四千石之任蔑聞蜀郡之歌吾丘壽王傳連十餘城之守任四千石之重師古曰郡守都尉皆二千石以壽王為都尉不置太守兼總二任故云四千石也亷范傳范遷蜀郡太守成都民物豐盛邑宇逼側舊制禁民夜作而更相隱蔽燒者日屬范乃削毁先令但嚴使儲水而已百姓為便乃歌之曰亷叔度來何暮不禁火民安作平生無𥜗今五袴餽十萬竈之屯仍玷益州之分東坡詩令嚴鐘鼓三更月野宿貔貅萬竈煙由支郡驅馳於夲路見前恐短材蹩躠於長塗蹩蒲結切音與别同躠音屑蹩躠旋行貌一曰行不正莊子蹩􅍷為仁踶跂為義注用力貌亦作徶㣯史記相如傳媥姺徶㣯漢書相如傳作便姍嫳屑令先甲以惟行易先甲三日王弼注甲者創制之令也創制不可責之以舊故先之三日後之三日正義云甲為十日之首故創造之令謂之為甲漢謂令之重者為甲令即此意也尚書令出惟行命重申而莫避易重巽以申命竊以雲門陸澤夙稱要害之膏腴左思蜀都賦指渠口以為雲門灑滮池而為陸澤雖畢星之滂沱尚未齊其膏液雲門言自渠口而灌田故指渠口為雲門猶雲來則雨至也滮池蓄水池也言自此而灑田為陸地之膏澤雖月離于畢而雨滂沱不若膏澤之齊也石棧天梯素忌吮磨之牙血蜀道難地崩山摧壯士死然後天梯石棧相鉤連又朝避猛虎夕避長蛇磨牙吮血殺人如麻六步七伐周不愆於庸蜀尚書及庸蜀羌髳微盧彭濮人今日之事不愆于六步七步乃止齊焉夫子勗哉不愆于四伐五伐六伐七伐乃止齊焉勗哉夫子孔傳就敵不過六步七步擊刺少則四五多則六七庸在江漢之南十鍾一石漢實敝於西南漢食貨志時又通西南夷道作者數萬人千里負擔餽餉率十餘鍾致一石師古曰言其勞費用功重兵不寓農新唐書兵志古者兵法起於井田自周衰王制壞而不復至唐立府兵始一寓之于農其居處教養畜材待事動作休息皆有節目雖不能盡合古法蓋得其大意焉今益異古三逢單閼之歲太歲在卯曰單閼許愼注曰單盡閼止也言陽氣推萬物而起隂氣盡止也一無強禦之人詩不侮鰥寡不畏強禦疏不畏懼於強梁禦善之人萬夫莫開之劒關踆踆奔走李白蜀道難劒閣崢嶸而崔嵬一夫當關萬夫莫開杜詩焉能心怏怏祗是走踆踆踆或作䞭説文行速䞭也張衡西京賦大雀踆踆五百餘里之石穴綽綽去來漢溝洫志作褎斜道五百餘里道果便近而水多湍石不可漕魏志注孫資別傳曰諸葛武矦在南鄭議者欲就討之帝以問資資曰昔武皇帝征南鄭取張魯陽平之役危而後濟又自往拔出夏侯淵軍數言南鄭直為天獄中斜谷道為五百里石穴耳言其深險喜出淵軍之辭也戰不因糧孫子故善用兵者用兵于國因糧於敵陳湯傳不煩一夫之役不開府庫之藏因敵之糧以贍軍用敗必仇餉剜心醫眼忍能閉眼而不醫聶夷中詩醫得眼前瘡剜去心頭肉椎髓剝膚安有曼膚之可剝昜剝牀以膚韓文剝膚椎髓公私掃地赤立楚辭平脅曼膚何以肥之注肥澤之貌此際把天隅之繡杜詩春日垂山鬢天隅把繡衣何術流地上之錢新唐書劉晏傳晏能權萬貨重輕使天下無甚貴賤而物常平自言如見錢流地上每朝謁馬上以鞭算伏念某不才之人無用於世教胄乏祝螟之效法言螟􅀈之子殪而逢蜾裸祝之曰類我類我久則肖之矣韓詩入學誨螟蛉監州無展驥之能見前三暑僰侯分終身之不齒禮記屏之遠方西方曰棘東方曰寄終身不齒注棘當僰僰之言逼使之逼寄于夷狄説文僰挺為蠻夷從人棘聲司馬相如傳略通夜郎僰中齒猶録也古者謂年齡齒亦齡也以年相次是録其長幼故云齒猶録也一寒瓦屋甘俯首以為眉瓦屋山在榮經縣東一百二十里形如瓦屋上有念佛烏娑羅花其岩朝見辟支午見普賢夜有神燈號辟支道場或問禪惠大師瓦屋何以木皮蓋師曰錦府豈從機上織劒門寧自匣中開范石湖吳船録云瓦屋山在雅州少南則大瓦屋形狀宛然瓦屋一間也小瓦屋亦有灮相謂之辟支佛現過秦論俯首係頸委命下吏眉謂眉州未能銷愁歎之聲更冀玷禮樂之遣並見前依蓮而泛緑水況當傍籌邊之樓籌邊樓在成都府治西李德裕傳文宗太和中德裕自兵部侍郎為劒南西川節度成都及南失姚協西亡維松由清溪下洙水而左盡為蠻有乃建籌邊樓按南道山川險要與蠻相入者圖之左西道與吐蕃接者圖之右其部落衆寡饋餫遠邇曲折咸具乃召習邊事者與之指畫啇訂凡虜之情偽盡知之於是二邊侵懼南詔請還所俘略四千人吐蕃維州將悉怛謀以城降餘見前轉粟而上青天又可訪支機之石支機石在今成都府城東嚴真觀張華博物志載有人居海上乘槎到天河得一支機石歸以問嚴君平今蜀人相傳即此石也宋之問詩更將織女支機石還訪成都賣卜人然造幣則刻楮難於刻玉見上條而調夫則鑄人重於鑄金法言或問世言鑄金金可鑄與曰吾聞覿君子者問鑄人不聞鑄金刈葵巳覺其傷根杜詩淘米少汲水汲多井水渾刈葵莫放手放手傷葵根緩步又難於拯溺跋胡疐尾詩狼跋其胡載疐其尾胡頷下懸肉也載則疐跲也老狼有胡進而躐其胡則退而跲其尾劌目鉥心劌姑衛切音與愧同利傷也老子亷而不劌鉥時橘切又音沭長針也説文綦針也韓文劌目鉥心刃迎縷解昧於一來左傳楚子伐鄭鄭人將禦之子産曰晉楚將平諸矦將和楚王是故昧於一來昧猶貪冒也瞪若四顧瞪抽庚切音與琤同直視也莊子瞪若乎其後高適詩四顧何慘烈恭惟某官基命兩社棟國九筵並見前太微三光風霆閟流形之用漢書天文志南宫朱鳥權衡衡太微三光之廷孟康曰軒轅為權太微為衡也禮記地載神氣神氣風霆風霆流形萬物露生鴻鈞一氣雨露無甘苦之分杜詩雨露之所濡甘苦可結實已欲立而立人道先覺以覺後謂江漢朝宗於海必導岷而導嶓尚書荆及衡陽惟荆州江漢朝宗于海又岷山導江東别為沱又嶓冡導漾東流為漢當荆益跨有之時欲保吳則保蜀諸葛武矦傳荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國益州險塞沃野千里天府之土若跨有荆益保其巖阻西和諸戎南撫夷越則霸業可成漢室可興矣重載必歸於牛負兒寬傳大家牛車小家擔負畏塗何止於烏飛莊子畏塗者日殺一人則父子兄弟相戒管子以任重行畏塗至逺期為君子為能矣烏飛恐當作鳶飛馬援傳仰視飛鳶跕跕墮水中雲深憐滴博之邊杜詩已收滴博雲中戍詳别見氷解思先零之漕趙充國傳充國擊先零土屯田奏請分屯要害處氷解漕下繕鄉亭浚溝渠治湟狹云云宋人所謂冰漕皆夲諸此乾矣暵矣遇人之艱難矣詩中谷有蓷暵其乾矣有女仳離慨其歎矣慨其歎矣遇人之艱難矣暵音漢傳煙也煙緌也正義云燥也由煙死而至于乾燥故以暵為煙也谷是水之所注蓷處其中而乾故至以陸草傷水為喻輔之翼之又從而振德之某敢不盡力鞠躬出師表鞠躬盡力死而後已愛人節用安危之意注將相使臣弗敢與聞陸賈傳天下安注意相天下危注意將將相和則士豫附左傳三夏天子所以享元矦也使臣弗敢與聞錢榖之問至廟堂君子惟能通志韓文幸今天下無事小大之官各守其職錢榖甲兵之問不至于廟堂論道經邦之暇捨此宜無大者焉王陵傳問天下錢榖一歲出入幾何易同人唯君子為能通天下之志繫辭唯深也故能通天下之志唯幾也故能成天下之務除成都漕謝侍從無中和之歌轉上聞於太學王褒傳益州刺史王褒欲宣風化於衆庶聞褒有俊材請與相見使褒作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之時汜鄉矦何武為僮子選在歌中久之武等學長安歌太學下轉而上聞有禮樂之雅獲下拜於少城舊唐書地理志蜀王夲都廣都之樊鄉張儀平蜀後自赤里街移治于少城今州城是也郡志成都太城即府子城秦張儀所築謂之太城初儀屢築屢頽忽有大龜出于江儀以問巫巫曰隨龜築之功果就又稱龜城少城在子城西惟西南北之三壁東即太城之西墉張儀既築太城後一年又築少城容齋筆録云晉益州刺史治太城成都太守治少城左太沖蜀都賦亞以少城接乎其西注少城小城也杜詩秋盡東行且未回茅齋寄在少城隈又憶昨離少城而今異楚蜀又東望少城花滿煙百花高樓更可憐又重遊先主廟更歷少城闉十年出幕之孤鴻杜詩十年出幕府北史盧思道周時為武陽太守位下不得志為孤鴻賦以寄情萬里題橋之駟馬萬里橋在成都中和門外寰宇記諸葛武矦送費禕聘吳至此曰萬里之行始于此矣又唐史載玄宗狩蜀過此問橋名左右對以萬里玄宗歎曰開元末僧一行謂更二十年國有難朕當逺遊至萬里之外此是也遂駐蹕成都杜詩萬里橋西宅百花潭北莊餘見前超遷寵甚稱塞闕然靖循表選之由循吏傳公卿缺則選諸所表以次用之定出裏言之賜見前竊以收蜀而給轉漕史稱蕭何之功蕭何傳何以丞相留收巴蜀計户轉漕給軍鄂千秋曰何轉漕關中給食不乏此萬世功也諭巴以擅運輸文見相如之檄司馬相如諭巴蜀檄聞其發兵興制驚懼子弟憂患長老郡又擅為轉粟運輸皆非陛下之意非天府前腴而後瘠見上條殆雪山昔重而今輕杜詩諸葛蜀人愛文翁儒化成公來雪山重公去雪山輕萬甕萬牛窘韋臯之去鎮昌黎元和聖德詩疆外之險莫過蜀土韋臯去鎮劉闢守後萬牛臠炙萬甕行酒有惟其凶有餌其誘一琴一鶴欠清獻之乘軺見前況從漢棧之囂闐張良傳良因説漢王燒絶棧道師古曰棧道閣道也囂説文聲也氣出頭上從㗊從頁頁首也鄭氏曰象聲之形聲形不可象故象其氣從口出左傳湫隘囂塵注聲也詩選徒囂囂闐説文盛貌詩振旅闐闐不見秦兵之耐戰史記張儀曰秦帶甲百餘萬車千乘騎萬匹虎賁之士踀局科頭貫頥奮戟者至不可勝計山東之士披甲蒙胄以會戰秦人捐甲徒裼以趨敵左挈人頭右挾生虜夫秦卒與山東之卒猶孟賁之與怯夫烏獲之與嬰兒垂千鈞于鳥卵必無幸矣益州疲敝民不聊生出師表天下三分益州疲敝劒閣崢嶸君誰與守蜀道難劒門崢嶸而崔嵬飛鳥桃蟲當徴於後思詩豫其懲而毖後患莫豫荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難注肇始允信也桃蟲鷦也鳥之始小終大者爾雅云桃蟲鷦其雌名鴱陸機疏云今鷦鷯是也微小于黃雀其雛化而為雕故俗語鷦鷯生雕言始小終大者始為桃蟲長大而為鷦鳥以喻小惡不誅成為大惡木牛流馬詎宜付之庸人如某者志夲熊熊山海經其光熊熊其氣魄魄注皆光氣炎盛相焜耀之貌史記索隱亷頗傳贊清飆凛凛壯氣熊熊庾信趙國公集序熊熊旦上增城抱日月之光焰焰宵飛南斗觸蛟龍之氣才終鹿鹿見前滿頭素髮意已蕭條潘嶽賦斑鬢彪以承辨兮素髮颯以垂領杜詩素髮乾垂領又飄蕭將素髮又不堪人事日蕭條眯目黃塵法當憔悴山谷詩法當憔悴百寮底進豨苓於館下以冗見治言為國録希驥足於治中無才可展法言晞驥之馬亦驥之乘也注晞慕也言為武岡通判火焰生於兩角諸集拾遺李􅌈為國子直講求郡晨登講席諸生見􅌈巾上兩焰火起是日得榮州月影轉於半輪李詩峨眉山月半輪秋影入平羌江水流雖洊擁於雙旌悄無聞於五袴悄七小切增韻靜也適承驪駕之缺見前驟蒙龍節之頒周禮地官掌節凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之求者不豫而豫者不待求此恩厚甚食以足兵而兵不足以食兹事奈何冒哀籲而弗回尚書以哀籲天恐顚隮之難免尚書我乃顛隮兹蓋伏遇某官國之元氣學者泰山並見前惓惓先天下之憂范文正公嶽陽樓記先天下之憂而憂後天下之樂而樂卓卓得聖人之任韓詩高意還卓卓論思獻納精神折千里之衝文選朝夕論思日月獻納餘見前諏度詢謀採訪遴十道之選詩周爰咨諏周爰咨謀周爰咨度周爰咨詢舊唐書地理志貞觀元年因山河形便分天下為十道一曰關內道二曰河南道三曰河東道四曰河北道五曰山南道六曰隴右道七曰淮南道八曰江南道九曰劒南道十曰嶺南道開元二十一年分天下為五十道每道置採訪使檢察非法如漢刺史之職萬里東溟之隔導江漢以朝宗王維詩大河注東溟尚書江漢朝宗于海十年北風之涼閔岷峨之悽愴詩北風其涼雨雪其雱王褒傳襲貂狐之燠者不憂至寒之悽愴杜詩岷峨氣悽愴行行且止避御史難歷井以捫參桓典傳拜侍御史常乘驄馬京師畏憚為之語曰行行且止避驄馬御史餘見前皇皇者華遣使臣且翕箕而挹斗詩序皇皇者華君遣使臣也詩維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之揭正義曰箕星不可簸揚者徒翕置其舌而已斗星不可挹㪺者亦徒西其柄之揭然耳亦猶王之宫司虛列而無所用也某敢不問民疾苦察吏否臧寧損食以節衣無剝廬而豐屋易小人剝廬又豐其屋蔀其家象曰豐其屋天際翔也損節剝豐四卦名戍蓬婆之雪謹操蘇武之節旄杜詩已收滴博雲中戍欲奪蓬婆雪外城蓬婆吐蕃城名在雪山之外蘇武傳杖漢節牧羊卧起操持節旄盡落陶侃傳王導入石頭城令取故節侃笑曰蘇武節似不如是跂織女之星徐問張騫之機石詩跂彼織女終日七襄注跂隅貌織女三星跂然如隅三星鼎足而成三角望之跂然故云隅貌襄反也終一日歷七辰至夜而反徒見其如是何曽織乎餘見前除成都漕謝檢正都司宋宰屬有檢正有左右司左右司即隋尚書都司國史補二十四司呼左右司為都公分江鄉之符偶綴益州之分王灣詩飛棹歷江鄉李詩流浪憶江鄉李郃傳有二使星向益州分野出澤國之節就令周道之馳周禮澤國有龍節詩周道倭遲輕孤熟路之車韓文若駟馬駕輕車就熟路言先守榮眉二州就除成都漕也大乏生財之道循牆莫避家語三命而俯循牆而走叱馭知慙見前竊以中和布宣金馬亦煩於遣使王褒傳方士言益州有金馬碧雞之寶可祭祀致也宣帝使褒往祀焉餘見前疲敝危急木牛尚困於餽師出師表益州疲敝此誠危急存亡之秋也蓋窘十餘鍾一石之輸見前頗仰三百萬斛榖之糴趙充國傳吾謂耿中丞糴二百萬斛榖食貨志昭帝五鳯中大司農耿壽昌奏言故事歲漕關東榖四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原郡榖足供京師可以省關東漕卒過半比既失丘山之暴暴暴音僕茍子上得天時下得地利中得人和財貨渾渾如泉源汸汸如河海暴暴如丘山注暴暴卒起之貌言物多委積高大如丘山也乃專責原隰之皇皇見前琴鶴清規或又似劈琴而煮鶴李啇隱雜纂殺風景八事內有燒琴煮鶴東坡詩明朝只恐兼烹鶴注小説不好事者爨琴煮鶴其詩曰自從烹鶴燒琴後獨坐青山背月明東坡帖衛懿公好鶴以亡其國房次律好琴得罪至死乃知燒煮之士亦自有理繭絲拙計今不待成繭而取絲委之駑庸何以黽勉伏念某秉心抗直涉世迂疏綿力薄材位合居於人下並見前虛悲空警憂乃犯於衆先韓詩離離挂空悲戚戚抱虛警甘以狂愚老於廢棄慨一寒之去國驚十暑之浮家新唐書張志和傳顔真卿為湖州刺史志和來謁真卿以舟敝漏請更之志和曰願為浮家泛宅往來霅苕間晨入太學而招諸生投間乃分見前夜發清溪而向三峽假守非才李詩夜發清溪向三峽思君不見下渝州方弄月於峨眉李詩一振高名滿帝都歸時還弄峨眉月遽觀風於海眼杜工部石笋行君不見益州城西門陌上石笋雙高蹲古來相傳是海眼苔蘚食盡波濤䀶杜光庭石笋記云舊傳石笋之名有六曰石笋曰蜀妃闕曰沉西石曰魚鳧仙壇曰西海之眼曰五丁石門又成都記云距石笋二三尺每夏月大雨往往陷作土穴泓水湛然凡三五日忽然不見故有海眼之説唐段柯古續酉陽雜俎蜀石笋街夏中大雨往往得雜色小珠俗謂地當海眼莫知其故蜀僧惠嶷曰前史説蜀少城飾以金璧珠翠桓溫惡其太侈焚之合在此誦詩授政敢曰使四方而不能咨諏為謀是當拜五善以求獲見前此蓋伏惟撿正云司存雨露身逼雲霄檢詳云彌綸省闥弼亮廟廊編修云司存雨露感會風雲後漢書二十八將傳論中興二十八將世以為上應二十八宿未之詳也然咸能感會風雲奮其知勇稱為佐命亦各志能之士也杜詩風雲感會起屠釣韓詩風雲一朝會變化在一身詳定云燮和帝載翊贊天樞鬼谷子人君亦有天樞生養成藏亦復不别左右史云身為國史杜氏左傳序身為國史躬覽載籍必廣記而備言之君舉必書左傳君舉必書書而不法後嗣何觀推轂多有味之言見前蒙霧獲不知之潤東坡集餘膏所燭常分無盡之灮蒙霧而行皆獲不知之潤謂吳蜀相為唇齒當廣咨諏陸機傳或曰吳蜀脣齒之國也夫蜀滅吳亡理則然矣夫蜀蓋藩援之與國而非吳之存亡也得信布以任爪牙亦資餽餉漢書序傳爪牙信布腹心良平有可福虛危之次東坡詩斯人乃福星遣出虛危間諒多憚參井之捫見前病駒弗稱於文羈栁河東起廢答病顙駒大而不尨可秣飾焉於是衆牽駒上燥土大廡下莝以雕胡秣以香萁錯貝鱗纕鑿金文羈絡以和鈴纓以朱緌老馬或諳於故路韓非子齊桓公伐孤竹春往冬還返迷失道管仲曰老馬之智可用也乃放老馬而隨之遂得道焉杜詩古來存老馬不必取長途藐然外服尚書越在外服假以裏言見前乘白露以采葭詩蒹葭采采白露未已所謂伊人在水之涘遡回從之道阻且右遡遊從之宛在水中沚注采采猶萋萋盛也蒹葭之草采采然雖盛未堪家用必待白露凝戾為霜然後堅實中用以興秦國之民雖衆而未順德教必待周禮以教然後能從上命國乃得興此采葭借用俾青天之轉粟見前某敢不愛人節用盡力鞠躬勉千里之贏糧韓信傳千里餽糧士有飢色甘三年之刻楮然公車實無希於暮召俱見前但錦城能不願於早還蜀道難朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家四牡遄歸而苞栩載飛且謹戍西山之雪詩翩翩者隼載飛載下集于苞栩王事靡盬不遑將父隼鳺鴀也鳥之慤謹者人皆愛之可以不勞猶則飛而下止于栩木喻人雖無事豈可獲安乎感勵之杜詩西山白雪三城戍南浦清江萬里橋萬象皆春而孤槎自客何因近南斗之星杜詩萬象皆春氣孤槎自客星蘇味道詩逺從南斗外遙仰列星文除成都漕謝李制置􅌫守江鄉之符正慙玩愒出澤國之節濫僃將輸俱見前亟控需章需章章之有需頭者詳見前冀回渙汗劉向傳易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也需渙卦名兹奉大元帥之承制袁紹傳承制以韓馥為奮威將軍必欲小行人之疾驅周禮秋官司冦大行人中大夫二人小行人下大夫四人小行人掌邦國賓客之禮籍以待四方之使者冒昧滌紅李賀詩金科篆字紅屈盤滌紅謂滌印也新唐書百官志節度使視事三日洗印視其刓缺凌兢布白甘泉賦馳閶闔而入淩兢師古曰淩兢者寒涼戰栗之處伏念某百無操挾獨有迂疏學無所成空敝精神於蹇淺莊子小夫之智不離苞苴竿牘敝精神于蹇淺注昏于小物所得者淺仕未能信僅存肝膽之輪囷韓詩窮途致感激肝膽還輪囷立館下招諸生一鳴輒斥新唐書姦臣傳李林甫居相位十九年蔽欺天子耳目諫臣皆持祿養資補闕杜璡再上書言政事斥為下邽令因以語動其餘曰君等獨不見立仗馬乎終日無聲而飫三品芻豆一鳴則黜之矣餘見前坐堂上稱太守再鼓已衰東坡後杞菊賦吁嗟先生誰使汝坐堂上稱太守前賓客之造請後掾屬之趨走言歷守榮眉獨感吾選韓厥之知晉語趙宣子言韓獻子于靈公以為司馬河曲之役趙孟使人以其乘車干行獻子執而戮之宣子召而禮之皆告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免于罪矣詳見後皇顧孰殺子産之怨見前止須書考力乞投間韓文投間置散敢圖清朝李詩更奏逺清朝驟畀漕事惟成都夙稱陸海海已近於揚塵而益部舊號使星星今同於隕石俱見前除成都漕到任謝史丞相條熬波無潤南史張融傳作海賦文辭詭激以示顧顗之顗之曰卿此賦實超玄虛但恨不道鹽耳融即求筆注曰漉沙搆白熬波出素積雪中春飛霜暑路尚書潤下作鹹刻楮難成見前百畞食九人寧忍奪金於白晝列子齊人有欲金者清旦衣冠而之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何曰取金之時不見人徒見金賈誼傳白晝大都之中剽吏而奪之金師古曰剽劫也十鍾致一石尤難轉粟於青天此豈駑庸所能黽勉俱見前聞將軍之令不聞天子之詔敢不膝行周亞夫傳軍中聞將軍之令不聞天子之詔項籍傳羽見諸侯將入轅門膝行而前莫敢仰視急觀察於賦與急刺史於民尚期指教昌黎送許郢州序為刺史者恆私於其民不以實應乎府為觀察使者恆急於其賦不以情信乎州誠使刺史不私於其民觀察使不急於其賦如是而政不均令不行者未之有也恭惟某官識𢎞且毅氣直以方學廣而聞多爭臣論學廣而聞多不求聞於人也才全而能巨荆潭唱和詩序鏗鏘發金石幽眇動鬼神信所謂材全而能巨者也光猗蘭之葉世載其英杜詩仙李盤根大猗蘭奕葉光蜀都賦江漢炳靈世載其英徑前茅之權帝嘉乃績尚書子懋乃德嘉乃丕績餘見前受任危難之際出師表受任於敗軍之際奉命於危難之間折衝談笑之間邉境膽寒士民心服薦吳起薦西門豹悉送吹噓劉向説苑田子方謂翟黃曰何子賜車輿之厚也翟黃對曰昔者西河無守臣進吳起而西河之外寧鄴無令臣進西門豹而魏無趙患酸棗無令臣進北門可而魏無齊憂魏欲攻中山臣進樂羊而中山拔魏無使治之臣臣進李克而魏國大治是以進此五大夫者爵祿倍以故至於此咨向寵咨郭攸之尤加摸索出師表侍中侍郎郭攸之費禕董允等此皆良實志慮忠純愚以為宫中之事事無大小悉以咨之將軍向寵性行淑均曉暢軍事愚以為營中之事悉以咨之餘見前有如蹩躠蹩蒲結切説文踶也一曰跂也躠私列切旋行貌一曰行不正莊子蹩躠為仁踶跂為義注用力貌亦俾馳驅某敢不恪奉六條圖拜五善俱見前維駒維騏維駰維駱肯自怠於鞭笞詩我馬維駒六轡如濡又我馬維騏我馬維駱我馬維駰説文馬二歲曰駒詩注六尺以上馬五尺以上駒説文騏馬青驪文如博棊也爾雅隂白雜毛駰注隂淺黑今之泥驄白馬黑鬛駱注夏后氏駱馬黑鬛互見前陸賈傳漢王起巴蜀鞭笞天下我任我輦我車我牛願少寬於轡策詩我任我輦我車我牛我行既集蓋云歸哉注轉餫之役有負任者有挽輦者有將車者有牽傍牛者虞詡傳願寬假轡策勿令有所拘閡而已其為頌徯罔既敷宣謝黃制副賀除成都漕某受容察於偏城正虞謫滿韓文受容受察不復進謝餘見前畀將輸於一道安得誤除知必出於流言荀子流言止于智者乃遽蒙於􅐹記􅐹音往揚雄傳因江潭以􅐹記兮注􅐹往也記書記也謂弔文也言因江水之邊而投書記以往弔也蠅雖貪夫附驥隗囂傳蒼蠅之飛不過數步即託驥尾得以絶羣廣絶交論附騏驥之旄端軼歸鴻于碣石犬不足以續貂趙王倫傳倫僣即帝位諸黨皆登卿將並列大封其餘同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位每朝會貂蟬盈坐時人謂之諺曰貂不足狗尾續使萬一如傳聞當再三而退避區區之懇左傳是區區者而不豫畀又宋國區區而有詛有祝楚元王傳豈為區區之禮哉師古曰區區謂小也食貨志桓公用區區之齊陸賈傳欲以區區之越與天子抗衡為敵國竇田灌韓傳贊藉福區區其間崔駰傳思效其區區禰衡傳宣操區區之惠又臣等區區敢不以聞古詩一心抱區區杜詩浮名尋已已懶計託區區續續以陳陳後山詩續續題詩不耐間比羞蘋蘩甚愧施輕而報重羞説文進獻也左傳蘋蘩蕰藻之菜可羞于王公兹奉竿牘不覺情過而禮踰韓文茍來者吾斯進之而已矣烏待其禮踰而情過乎百感稠重尺箋勃窣司馬相如傳媻姍勃窣師古曰謂行于叢薄之間亟其申稟仰乞丙原丙明也説文萬物成炳然漢志明協于丙此啓自比羞蘋蘩以下似有舛錯謝順慶李知府賀除成都漕順慶府古巴子國秦屬巴郡漢為充國安漢等縣地晉屬巴西郡劉宋析置宕渠郡唐天寶初改南充郡大厯中改充州宋初以州𨽻梓州路寶厯間升順慶府某蕭然塵土殊乏郡庸聞之道途謂有使命左傳祝他私於萇𢎞曰聞諸道路不知信否南史何敬容傳草萊之人聞諸道路知流言之難信省孤迹之不堪正使誤除亦當請免敢圖采聽便辱品題某有敢簸揚實無被受不稼蔑取禾之理見前負乘惟致寇之憂繫辭易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣先布尺箋少攄寸悃攄抽居切博雅舒也嗣規申控敢幸丙原代羅制機􅀈改除太守謝史丞相自黎州改衡州地理沿革表黎州秦漢屬蜀郡東晉李特據蜀置漢源郡後周開越雋置黎州唐天寶曰洪源郡蜀劒南道宋復黎州屬成都府路衡州秦屬長沙郡漢屬長沙國東漢屬長沙零陵二郡吳置湘東郡劉宋為湘東國梁置衡州隋為衡山郡唐天寶為衡陽郡宋復衡州屬荆湖南路假守漢源冒控陳情之請注見題下改麾晉嶺實諧便養之謀郡志晉嶺山在今衡州府桂陽州南八十里相傳此嶺晉時出銀鉛砂礦寬庭闈萬里之懷杜詩我已無家尋弟妹君今何處訪庭闈錢起詩借問還珠盈合浦何如鯉也入庭闈王介甫詩刻章琢句獻天子釣取薄祿歡庭闈出壞冶一陶之力見前福如天而徼受左傳如天之福又君惠徼福於敝邑之社稷詩並受其福感無地以寄言嵇康琴賦吟詠之不足則寄言以廣意山谷集諒無地以寄言故莫傳于膾炙又風流無地寄言章帝紀注無可寄言故云無狀伏念某學殖蕪疏賦材蹇淺莊子敝精神于蹇淺詩書門户所求無忝於父兄晉書孫盛傳若此史遂行自是關君門户事南史陸慧曉傳顧琛一公兩掾英英門户王奐傳百年門户宜思後計王曇首傳武帝問王𢎞曰卿弟何如卿答曰若但如下官門户何寄王訓傳僧正惠超見而竒之曰四郎舉動和韻是興門户者唐任瓌傳瓌早孤叔父忠每曰吾子雖多庸保耳所以寄門户者瓌也新唐書姦臣傳許敬宗除著作郎喜謂所親曰仕宦不為著作無以成門户詳見前塵土簪裳其實徒勞於州縣梁竦傳州縣之職徒勞人耳倚閩山而製邑閩山一名烏石山在今福州府城西南隅與九仙山對峙蔡襄詩低回傾北斗突兀起東閩攀蜀道以籌邊成都府有籌邊樓詳見前過灔澦百牢之關甚安蓮幕灔澦堆百牢關皆在今夔州府十道志梁州有百牢關一統志魏辛毗云夔州百牢關兵馬不可越杜詩夔州險過百牢關李義山詩莫嘆萬重山君還我未還武關猶在望何況百牢關叱邛崍九折之坂忽冒竹符邛崍山在今榮經縣東四十里夲名卭筰故卭人筰人界也九折坂在卭崍山路阻峻回曲九折乃至山上惟此沉黎漢書西南夷傳徙筰都最大師古曰筰都後為沉黎郡武帝紀定西南夷以為武都牂柯越雋沉黎文山郡臣瓚曰沉黎治笮都去長安三千三百三十五里領縣二十一界在雪嶺杜詩雪嶺界天白李燾詩絶塞卭崍外偏城越雋東山含初夏雪林偃夕陽風綏懷六詔安有竒功新唐書南蠻列傳南詔或曰鶴拓曰龍尾曰苴咩曰陽劒夲哀牢夷後烏蠻别種也夷語王為詔其先渠帥有六自號六詔曰蒙雋詔越析詔浪穹詔邆睒詔施浪詔蒙舍詔兵埒不能相君蜀諸葛武矦討平之元李京雲南志略詔漢語國君也蒙氏居蒙舍川號蒙舍詔施望久據石和城號施浪詔豐咩據鄧睒川號鄧睒詔豐時據浪穹號浪穹詔波衝據越折川號越折詔輔原羅據越雋號蒙雋詔是為六詔荏苒二年僅無乏事起家至二千石萬有餘榮揚雄傳諸附離之者或起家至二千石倚門有九十親一則以懼敢謂洪鈞之轉復容畫戟之森俱見前許邛筰之還轅筰材各反音昨漢書西南夷傳自滇以北君長以十數卭都最大自嶲以束北君長以十數徙筰都最大指衡湘而昜組衡山在今衡山縣西三十里周禮職方氏荆州之鎮曰衡山寰宇記宿當翼軫度應璣衡故曰衡山湘水在衡州東源出廣西興安縣陽海山流至分水嶺分流北流者謂之湘水蓋范史之傳循吏僅十數人如桂陽之有治聲乃二三輩衡州漢初屬長沙國又分屬桂陽郡東漢長沙桂陽二郡𨽻荆州范曄後漢書循吏傳魏颯字子産遷桂陽太守俗不知禮颯下車修庠序之教設婚姻之禮期年邦俗從化視事十年郡內清理茨充字子河代颯為桂陽亦善其政教民種殖桑柘麻紵之屬勸令養蠶織屨民得利益焉許荆字少張遷桂陽太守郡濱南州風俗脆薄不識學義荆為設喪紀婚姻制度使知禮禁在事十二年父老稱歌徴拜諫議大夫卒于官桂陽人為立廟樹碑後漢循吏舉天下郡國三百餘年僅得十二人桂陽居其三而颯為稱首傅介子傳殺略三輩尚詭圖於後效京房傳自詭效功師古曰詭責也自以為憂責也期力企於前修有民人焉有社稷焉姑俟及瓜之代孰主張是孰綱維是俾全啜菽之歡禮記啜菽飲水盡其歡斯謂之孝餘俱見前揆厥所元亶知其自恭惟某官名垂宇宙杜詩諸葛大名垂宇宙力負乾坤作室而厥子肯堂有偉相門之相尚書若考作室既底法厥子乃弗肯堂矧肯構孟嘗君傳相門必有相南史王訓傳訓召見文德殿上目送之謂朱異曰可謂相門有相若金而用汝作礪是維功令之功尚書若金用汝作礪史記太史公曰余讀功令至于廣勵學官之路漢書請著功令注新立此條請以著于功令功令篇若今選舉令談笑郤萊人之兵家語定公與齊侯會于夾谷獻酢既畢齊使萊人以兵鼓譟劫定公孔子歷階而進以公退曰裔不謀髮夷不亂華俘不干盟兵不逼好君必不然齊侯心怍麾而避之於是乃歸所侵魯之四邑及汶陽之田笞係制單于之命賈誼傳行臣之計請必係單于之頸而制其命伏中行説而笞其背隂陽和而在內附何難外撫於四夷王陵傳宰相者上佐天子理隂陽順四時下遂百姓之宜外填撫四夷諸矦內親附百姓上下交而其志同尤欲曲成乎萬物易泰小往大來吉亨則是天地交而萬物通也上下交而其志同也繫辭範圍天地之化而不過曲成萬物而不遺故如椎鈍亦預甄收某敢不刻骨藏恩指心誓報乃瞻衡宇快林烏反哺之情歸去來辭乃瞻衡宇載欣載奔餘見前當走京師窺槐龍顓面之拜東坡詩日髙黃繖下西清風動槐龍舞交翠詳别見代董通判居誼除知惠州謝丞相佐州東輔偶計日以合符三輔郡名前百官表注京兆在尚官前街東入故中尉府馮翊在太上皇廟西入右扶風在夕陽街北入故主爵府長安以東為京兆長陵以北為左馮翊渭城以西為右扶風餘見前乞郡南荒忽何天之從欲説文何儋也徐鉉曰儋何即負何也爾雅何鼓謂之儋鼓是何為負何也今負何字作荷又皆上去二聲而何但為誰何字矣雖云小壘亦出大鈞請裁狂簡之章少答生成之造伏念某蠧書淺學見前鴈塔末科古今詩話唐韋肇及第偶於慈恩寺鴈塔題名後人效之遂成故事宋張茂中遊城南記慈恩寺夲隋無漏寺唐永徽三年沙門玄裝起塔初惟五塔磚表上心效西域窣堵波即袁宏漢記所謂浮屠祠也長安中摧倒天后及王公施錢重加營建至十層其云鴈塔者天竺記逹親國有伽葉佛伽藍穿石山作塔五層最下一層作鴈形謂之鴈塔嘉話録謂張莒及進士第間行慈恩寺因書同年姓名于塔壁後以為故事按唐登科記有張台無張莒台于大中十三年崔鉶下及第馮氏引之以為自台始若以為張莒則台詩亦有題名之説矣塔自兵火之後止存七層長興中西京留守安重霸再修之判官王仁裕為記長安士庶每嵗春時遊者相屬熙寧中失火經宵塗圬皆剝而磚始露唐人墨迹于是畢見今孟郊舒元輿輩尚存其無聞後世者不可勝數互見前自役俗吏之塵始習癡兒之了依蓮何有薦屢剡於公車俱見前種秫既登政偶安於田里陶潛傳為彭澤令在縣公田悉令種秫榖曰令吾常醉於酒足矣冒昧題輿之座聊息吾黔見前解后越俎之庖偶調衆口東坡詩醋釅不堪調衆口煩需章之交上冀渙渥之留中俱見前人豈不自知耶小才未容於大用仕者行其義也分憂亦所以近君孟浩然詩郎官舊華省天子命分憂輒從五嶺之間乞乘一障而去俱見前蹌蹌儀鳯鷁自分於退飛尚書鳥獸蹌蹌鳯凰來儀餘見前跕跕墮鳶馬何辭於後殿馬援傳當吾在浪泊西里間毒氣熏蒸仰視飛鳶跕跕墮水中鵝城斗大惠州志飛鵝嶺在惠州南五里四面皆水水源自石埭山發西南而東繞嶺折而過大通橋入于西湖郡以此名為鵝城方輿勝覽舊經相傳有古仙放本鵝流而至于此因建城故至今稱為鵝城僧曇秀來惠州見東坡坡曰山中人見公還必求土物何以應之秀曰鵝城清風鶴嶺明月人人送與東坡白鶴新居上梁文鵝城萬室錯居二水之間鶴觀一峯獨立千巖之上夢歸惠州白鶴山居詩鵝城亦何有偶拾鶴毳遺又鵝城見諸孫貧苦我為傷斗俗作斗毛氏曰考工記一豆注當作斗豆即古斗字左傳豆區鍾釜當作斗後人誤作俎豆之豆讀之今俗書作斗蓋訛併耳餘見前鱷穴淵深鱷湖在惠州豐湖南小而深亦曰鱷池東坡云西新橋下舊名鱷湖蓋嘗有蛟鱷之類飽惠州之飯讀淵明之詩兹亦竒矣讀當作和山谷跋子瞻和陶詩詩云子瞻責嶺南時宰欲殺之飽喫惠州飯細和淵明詩彭澤千載人東坡百世士出處雖不同氣味乃相似使渤海之民沾宣帝之化所願學焉龔遂傳宣帝即位渤海左右郡盜賊並起上以遂為渤海太守問何以息其盜賊遂對曰海濱遐逺不霑聖化其民困于飢寒而吏不恤故盜弄陛下之兵于潢池中耳恭惟某官佐王經邦周禮以佐王均邦國疏王不獨治故云佐王尚書論道經邦孔傳經緯國事量能授職雖馬勃牛溲兼收並蓄何所不容見前然蠅營狗茍驅去復來奚其為政送窮文朝悔其行暮已復然蠅營狗茍驅去復還凡干內補悉與外除求仁得仁我則異於是以德報德公其許之歟某尚逺戍期敢忘政學左傳子産曰僑聞學而後入政未聞以政學者也一麾乃出守孰非大丞相之恩庶民所以安願課良刺史之效俱見前除武岡通判謝丞相散人細滿干續食於夲朝莊子散人又惡知散木新唐書隱逸傳陸龜蒙字魯望居于甫里不乘車升舟設蓬齎束書茶竈筆牀釣具往來時謂江湖散人南史宋文帝元嘉時守宰以六期為斷及宋末以治民之官六年過久乃以三年為斷謂之小滿齊武帝永明元年宋末以治民之官六年過久乃以三年為斷謂之小滿而遷換去來又不能依三年之制詔自今一以小滿為限武帝紀徴吏民有明當世之務習先聖之術者縣次續食令與計偕宰物曲成特轉丞於支郡鼂錯傳削其支郡師古曰支郡在國之四邊者也宋史職官志昔者興國初詔廢支郡出于一時十國為連周法斯在一道署使唐制可尋至若號令之行風教之出先及于府府以及州州以及縣縣以鄉里自上而下由近及逺支郡之不可廢也明矣宜復置支郡𨽻于大府韓詩漢刑支郡黜東坡啓得請支郡僃負屬城又重使一夫之不獲特捐支郡以見收詎能希展足之驥賴未廢病顙之駒俱見前愧溢情顔感踰分願伏念某平沉庸俗全抱拙疏骨相既屯乏雲雷經綸之學吳志虞翻字仲翔孫權以為騎都尉數犯顔諫爭權不能容又性不協俗多見謗毁坐徙丹陽涇縣復徙交州翻别傳翻放棄南方云自恨疏節骨體不媚犯上獲罪韓詩久欽江總文才妙自嘆虞翻骨相屯昜雲雷屯君子以經綸注君子經綸之時杜詩雲雷屯不已丘園自賁非河漢黼黻之文昜賁于丘園束帛戔戔疏丘園是質素之處于此施飾不華侈費用則所束之帛戔戔衆多也劉峻廣絶交論舒向金玉淵海卿雲黼黻河漢猥蒙養士之仁濫綴教胄之屬謂國録經笥之嘲未發謗篋之惡已盈俱見前先生學雖勤言雖多譽難酬毁進學解先生學雖勤而不由其統言雖多而不要其中文雖竒而不濟於用行雖修而不顯于衆相國禮之過知之至罪止從疑見前俾奉叢祠陳勝傳廣之次所旁叢祠中師古曰叢謂草木岑蔚處也祠神祠也實為寬典掘雲而破嵽嵲歸尋黃獨之苖嵽音迭嵲音孽韻會嵽嵲山高貌杜詩凌晨過驪山御榻在嵽嵲韓詩掘雲破嵽嵲採月漉坳泓注嵽嵲山小而不安貌杜詩黃獨無苖山雪盛短衣數挽不掩脛乘月而弄潺湲飽飲紅泉之水紅泉在撫州府城西三十二里銅山下謝靈運詩乘月弄潺湲又石磴寫紅泉倏三周於歲籥東坡集屢更歲籥冒一問於化甄兹蒙天恩俾二斗壘都梁樂土都梁城在武岡州東五里長沙定王子封都梁矦國于此都梁山在武岡州東一百三十里都梁水出武岡州西南武岡漢為都梁夫夷二縣地詩逝將去汝適彼樂土巫水舊磻栁文巫水之磻崇寧拔縣而升軍甫百餘歲宋崇寧四年以郡州疆境廣漠析武岡綏寧二縣置武岡軍嘉定揠僉而置倅方一二員及瓜之戍雖遙種漆之謀有待樊宏傳宏父重字君雲營理産業物無所棄嘗欲作器物先種梓漆時人嗤之然積以歲月皆得其用向之笑者咸求假焉威為龍蛇恩為赤子當贊郡條韓文以武則忿以憾以恩月積而肆一以為赤子一以為龍蛇小不虺蜮大不鯨鯢仰憑國力栁文武岡銘序由公之仁小不為虺蜮大不為鯨鯢恩重事持不邇而逺恭惟某官得聖之任為帝者師張良傳以三寸舌為帝者師東坡集才惟王佐學夲帝師父子繼世三公邁史丹仕漢朝之績史丹傳贊史丹父子相繼高以重厚位至三公丹之輔導副主掩惡揚美傳會善意雖宿儒逹士無以加焉明良慶會六字紹越王輔孝廟之勳宋史史浩傳浩治第鄞之西湖上建閣奉兩朝賜書又作堂上為書明良慶會名其閣舊學名其堂鹽梅水火鼎實惟和粉米繡絺衮章亦别俱見前存竹頭於舸艦陶侃傳時造船木屑及竹頭悉令舉掌之咸不解所以及桓溫伐蜀以侃所佇竹頭作丁裝船詳别見拾桐尾而宫商見前念椎鈍之無他嘆陸沉之已久莊子方且與世違而心不屑與之俱是陸沉者也注人中隱者譬無水而沉儲光羲詩王屋嘗逺遁伊川復陸沉杜詩反朴時難遇忘機陸易沉日月出矣時雨降矣將令萬物之得宜莊子日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎江漢濯之秋陽暴之寧忍匹夫之不獲因其素出於門下使之姑試於治中某敢不滌濯其心靖共爾位思稱屏星之重俱見前圖為杯水之清隋書循吏傳趙軌為齊州别駕在州四年考績連最徴入朝父老相送者各揮涕曰公清若水請酌一杯水奉餞軌受而飲之魚尾既頳詎敢竭斗升於東海頳音柳説文赤色也夲作赬詩魴魚赬尾王室如燬通作竀左傳如魚竀尾注魚勞則尾赤烏頭可白儻或憐三匝於南枝燕丹子燕太子丹質於秦秦遇之無禮不得意欲歸秦王不聽謬言曰令烏白頭馬生角乃可丹仰天嘆烏即白頭馬為生角秦王不得已而遣之餘見前除武岡通判謝宣參政繒祝釐秩滿干續食於大鈞釐説文福也封禪書文帝制曰祝釐者歸福于朕百姓不與焉自今祝致敬母有所祈師古曰釐夲字作福假借用耳音同僖武帝紀縣次續食令與計偕注令所徴之人與上計者俱來而縣次給之食宥過恩深俾轉丞於小壘尚書宥過無大得逾劵外莊子劵內者行乎無名劵外者志乎期費山谷詩人生但安樂劵外豈無力愧益情涯伏念某全蹈拙疏見謂庸俗趙充國傳見謂忠謹乾愁漫解初非了事之癡韓詩乾愁漫解坐自纍與衆異趣誰相親餘見前虛警空悲直坐信書之誤韓詩離離挂空悲戚戚抱虛警栁詩信書成自誤經事漸知非偶蒙灮範擢糾成均糾吉酉切察也謂為學録詳見前韓愈乏赤箭之材徒勞晨入進學解國子先生晨入太學又赤箭青芝詳别見鄭虔荒蒼苔之屋端合早歸杜詩先生早賦歸去來石田茅屋荒蒼苔獲領叢祠見上條允為寬典青精可飯居然乏大藥之資杜詩豈無青精飯使我顔色好苦乏大藥資山林迹如掃學林新編云陶隱居登真訣有乾食青精䭀飯其法即南燭草浸米蒸飯暴乾其色青如􅀢珠食之延年丹書抱陽山人藥證曰夫大藥者須鍊沙中汞能取鉛底金黃芽為根蒂水火鍊功深黃獨無苖聊爾託長鑱之寄杜詩長鑱長鑱白木柄我生託子以為命黃獨無苖山雪盛詳見前三年於此百念蕭然誰為推轂之言忽有題輿之命並見前青袍朝士之最困遽借牙緋杜詩青袍朝士最困者黃紙除書之無名特加齒録白樂天詩緑醅新酎嘗初熟黃紙除書到不知又紅旗破賊非吾事黃紙除書無我名王濬傳有二孫過江不見齒録沈佺期回波詞姓名雖蒙齒録袍笏未賜牙緋此聮蓋用其語雖尚俟數年之戍亦強名半刺之官常清淨經吾不知其名強名曰道伏遇某官弼亮天工辨章人物後漢書劉愷傳職在辨章百姓宣美風俗班固傳惇睦辨章之化洽鄭玄注辨别也章明也元周密癸辛雜志人呼平章為辨章見尚書大傳第一曰辨章百姓百姓昭明史記則又以為便章百姓韓文公袁氏先廟碑亦用辨章二字贊一氣洪鈞之槖籥槖籥音託藥老子天地之間其猶槖籥乎虛而不屈動而愈出注槖籥中空虛又能有聲氣覃萬間廣厦之帡幪天地為爐造化為工力扶公道江漢以濯秋陽以暴洞見物情閔其嘗誨館下之諸生使之姑試治中之别駕初無驥足之可展始見牛溲之不遺俱見前某敢不銘骨鏤心曹植責躬表臣自抱釁歸藩鏤肌刻骨栁文銘心鏤骨無報上天杜詩食恩暫鹵莽鏤骨抱酸辛洗腸滌胃南齊書竺景秀以過繫作部荀伯玉曰使得自新必吞刀割腸飲灰洗胃帝釋之七年之病三年之艾未容急祿以代耕百畞之田五畞之桑且合力田而報國除武岡通判謝葛僉書洪奉祠秩滿學干祿於天朝韓文流聲實于天朝起廢恩深轉為丞於斗壘史記太史公自敘春秋補敝起廢栁文今兹是州起廢者二焉東坡詩今年聞起廢山谷詩諸公起廢自林泉自匪推當時之轂何由題仲舉之輿拜渥自天歸恩有地伏念某材真無似命亦不猶並見前糞壤孤豚初豈願犧於太廟史記莊子傳子獨不見郊祭之犧牛乎養食之數歲衣以文繡以入太廟當是之時雖欲為孤豚豈可得乎韓詩孤豚眠糞壤不慕太廟犧糞壤二字出此榆枋斥鷃抑難附鳯於高岡莊子我決起而飛槍榆枋時則不至而控於地而已矣又斥鷃笑之法言附鳯翼詩鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽弗能藏畔以自埋莊子是自埋于民自藏于時注修田農之業是隱藏于隴畔猥取入朝之見妬鄒陽傳女無美惡入宫見妬士無賢不肖入朝見嫉館下之誨言未既粗免嘲師見前臺中之評品為傾渠能原毁昌黎言針臺中之評人反以汝為傾又有原性原毁等篇兩年雲卧鮑昭詩雲卧恣天行謝靈運詩披雲卧石門杜詩雲卧衣裳冷李詩雲卧遊八極又雲卧從所適又雲卧歸丹壑又雲卧起咸爭百念氷銷負米為身飽只增於多感杜詩負米晚為身每食臉必泫析薪無子賤亦覺其有涯任諸公臺省之登甘此士江湖之落並見前獨嘗侍夫子之履舄舄􅛛也古今注以木置􅛛下乾臘不畏泥濕故曰舄三禮圖復下曰舄單下曰履頗辱知小人之肺肝方通國稱匡章之非乃逄人説項斯之善士固伸於知己況受殊知身未可以許人詎容弗許伏遇某官四朝元老一代真儒並見前自治治人所學皆周孔之學法言先自治而後治人之謂大器韓詩生平企仁義所學皆周孔先覺覺後斯民即堯舜之民從容取日於虞淵吕溫狄梁公立廬陵王傳贊取日虞淵洗光咸池濳授五龍夾之以飛於休梁公社稷之臣濡迹應變與唐屈伸妖虹橫夭鳴牝專晨獨立大道指南生人談笑作霖於商野耆壽俊在服精神真足以折衝尚書罔或耆壽俊在厥服李尋傳夲疆則精神折衝敉寧武圖功夙夜密陪於基命尚書以于敉寧武圖功孔傳翼佐我周用撫安武事謀立其功詩夙夜基命宥密注基始命信宥寬密寧也早起夜卧行寬仁安靜之政獨念江濤之如此深思人物之眇然並見前與其倚信於詐忠張湯傳狄山曰臣固愚忠若御史大夫湯乃詐忠不若收羅於戇直汲黯傳甚矣汲黯之戇也又汲黯之正直賈捐之傳置之爭臣則汲直留何蕃於太學昔誰從祭酒之言昌黎何蕃傳太學六館之士百餘人以蕃之義行言於司業陽先生城請諭留蕃於是太學闕祭酒會陽先生出道州不果留處士元以治中今端出將軍之力有感在此無謝得乎某敢不銘鏤殊私激昂晚節且忍飢而待麨俱見前無乞酒而厭漿袁子正書太歲在酉乞漿得酒不利走趨梅福難班於文石韓文佩玉長裾不利走趨梅福傳願一登文石之陛尚能拜起李臯願踔於武岡黃霸傳許丞亷吏雖老尚能拜起送迎正頗重聽何傷韓文曹成王碑國良以武岡叛正以討良為事從一騎踔五百里抵良壁盡降其軍代衛太社朴除袁州通判謝丞相袁州秦屬九江郡漢屬豫章郡孫吳及晉兼屬安成郡隋於宜春縣置袁州因袁山為名大業初改為宜春郡唐初復置袁州屬江南道開元間屬江南西道天寶初復為宜春郡乾元初仍為袁州宋因之互見後徼恩改秩義難社下之留乞闕養親許待治中之次川藪密藏其汙疾帡幪曲免於震凌終始生成後先超躐全出大鈞坱北之造請陳小子狂簡之章伏念某天巧素慳地寒寡挾父書是讀願再續於世科並見前門蔭可羞空屢偕於計吏宋史選舉志真宗大中祥符二年以門蔭授京官年二十五以上求差使者令于國學受業及二年審官院與判監官考試其業乃以名聞﨑嶇三仕踸踔七階選人七階迪功修職從仕從政文林儒林承直詳見前獨蒙公相之憫憐宋朱彧可談云祖宗故事宰相呼相公節度使帶開府儀同三司元豐官制前同中書門下平章事亦呼相公謂之使相三公正真相之任呼公相尚書改令廳為公相廳蔡京首以太師為公相其子攸自淮康軍節度使除開府儀同三司遂父呼公相子呼相公時傳京父子入侍西宴上云相公公相子京對云人主主人翁其際遇如此老學菴筆記菴京為太師賜印文曰公相之印因自稱公相童貫亦官至太師都下人謂之嫗相杜牧詩我家公相家劍佩常丁當不翅子姪之覆育燕巢於幕方欣得近於樓臺魚濳在淵敢望上汚于池沼乃辱綴太常之屬亟令脫小宰之銓並見前計校平生擢髮固難於數罪韓詩計較平生事殺却理亦宜范雎傳擢賈之髮以贖賈之罪尚未足躋攀分寸吹毛宜速於求疵韓詩躋攀分寸不可上前漢書有司吹毛求疵後漢書杜林傳吹毛索疵詆欺無限四子講德論莫不肌栗懾伏吹毛求疵益施螫毒牽牛自分於奪牛失馬敢期於得馬適嚴君之引疾從神圉而祝釐並見前懷眷戀庭闈之情欲甘啜菽禮記啜菽飲水盡其歡斯謂之孝注菽大豆也熬豆而食曰啜啜菽飲水以菽為粥以常啜之飲水更無餘物以水而已願出宰山水之縣少徯及瓜韓詩出宰山水縣讀書松桂林忽蒙一陶之仁超升半刺之任並見前宜春多勝蓋具見韓昌黎之詩韓詩莫以宜春逺江山在勝遊爾袁得賢亦足考李泰伯之記李泰伯袁州學記今代遭聖神爾袁得賢君俾爾由庠序踐古人之迹詎應伐輻詩坎坎伐輻兮置之河之側兮注坎坎伐檀聲輻檀輻也君子不得進仕坎坎然身自斬伐檀木欲以為輪輻之用猥玷題輿收之沸湯烈火之中分以清風明月之寄子來幾日我有二天伏念某官心契禹臯道侔伊吕書汾陽二十四考事方半於古人取河朔一百餘州功已高於今日璇璣密運而屢躋豐稔寶玉來歸而重見泰平寧宗嘉定十三年鎮江副都統翟朝宗以恭膺天命之寶來獻詳見前時惟萬世永賴之功尚恥一夫不被其澤老老幼幼皆重費於保全東坡集顧已于時齟齬于人費力保全子子孫孫將奚為而報稱某敢不銘恩鏤膂圖報誓心肉骨之卵翼之可坐須於泥軾左傳所謂生死而肉骨之也又勝如卵豫翼而長之黃霸傳泥于軾前以章有德吹噓是披拂是尚終託於化爐見前除兩浙運幹謝丞相掃門執贄曽干相國之知見前得闕登畿俾贊使家之畫選詩結綬登王畿韓詩州家申名使家抑免待及瓜之次足寬索米之憂頓令小人之屬饜實感大鈞之坱圠伏念某學落不殖器窳無竒並見前一科玷鄉老之賓周禮地官司徒鄉大夫之職三年則大比考其德行道義而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之三仕作諸侯之客杜詩甫也諸矦老賓客又早作諸矦客鉥心擢胃僅成抽黃對白之文貞曜先生墓志其為詩劌目鉥心刃迎縷解鉤章棘句搯擢胃腎神施鬼設間見曽出乞巧文抽黃對白啽哢飛走歷井捫參安識泛緑依紅之樂見前心胃井參四宿名既脫岷峨之險岷山在成都之西青城山是也峨山在成都西南峨眉山是也復罹嬴博之悲禮記延陵季子適齊於其反也其長子死葬於嬴博之間注嬴博齊地今泰山縣是也兩年甫詣於選曹百拙難營於近祿獨蒙三握髮之遇許垂一舉手之恩並見前嚴徐奮飛共勸枚臯之且忍韓詩東馬嚴徐已奮飛枚臯即召窮且忍歸張嗟悼或疑東野之無成韓詩況承歸與張二公迭嗟悼青冥送吹噓強箭射魯縞胡為久無成更以歸期告適聞掾屬之虛實在神臯之近文選實為地之奧區神臯注神者美言之澤畔曰臯冒為冶躍見前便辱陶成滿腹飲河止冀斗升之水莊子偃鼠飲河不過滿腹又豈有斗升之水而活我哉舉頭見日乃依尺五之天韓詩舉頭看白日泣涕下沾襟杜詩爾家最近魁三象時論同歸尺五天公自注俚語曰城南韋杜去天尺五祿足代耕政堪學製十年出幕或笑未了公事之癡杜詩十年出幕府自可持旌麾傅咸傳生子癡了公事詳見前三命循牆可無不入帝城之恨陳咸傳王音輔政信用陳湯咸數賂遺湯豫書曰即蒙子公力得入帝城死不恨餘見前孰披拂是遂濟登兹並見前恭惟某官坤厚承天昜地勢坤君子以厚德載物又至哉坤元乃順承天謙平稱物昜地中有山謙君子以裒多益寡稱物平施作典寶於俘寶之日共知出伊尹之功書序夏師敗績湯遂從之遂伐三朡俘厥寶玉義伯仲伯作典寶詳見前書得玉於竊玉之餘益足表魯公之德春秋定公八年冬盜竊寶玉大弓九年夏得寶玉大弓左傳書曰得器用也凡獲器用曰得得用焉曰獲史彌逺封魯公按宋史寧宗嘉定十五年春正月御大慶殿受恭膺天命之寶詳見前不然肅愼底貢之舉國語昔武王克商通道于九夷八蠻肅愼氏貢楛矢石弩以分大姬配虞胡公而封諸矦于陳曷在君奭為保之時史記召公為保周公為師帝於一二日之幾誕敷文德尚書帝乃誕敷文德公其億萬年之敬肅將祗歡尚書公其以豫萬億年敬天之休又公功肅將祗歡必令四夷之來王亦惟九德之咸事賜之大禮之過知之至豈終捐已爨之桐視所以觀所由察所安姑使作向陽之木並見前所慚小物尚書克勤小物亦纍曲成繫辭曲成萬物而不遺某敢不欽乃攸司尚書欽乃攸司慎乃出令事從其長周禮大事則從其長小事則專逹合東西而贍使節思漕波尺地之通杜詩川合東西瞻使節韓詩通波非難圖尺地易可漕敬蚤夜以從祝規俟洪鈞一氣之轉昌黎送石處士序先生起拜祝辭曰敢不敬蚤夜以求從祝規於是東都之人咸知大夫與先生果能相與以有成也除兩浙運幹謝俞樞密應符十年幕府公事未了於癡兒見上條千里邦畿幹譽又思於傖父易幹父之蠱用譽注以柔處尊用中而應承先以斯用譽之道也韻會傖音與棖同吳人罵楚人曰傖晉陽秋云吳謂中州人曰傖左思傳此間有傖父欲作三都賦廣韻楚人别種不失依蓮之職足寬索米之憂一陶甚恩三沭以謝恭惟某官基命夙夜勱相國家敉寧武圖功茂展同寅之略任舊人共政共期先甲之孚迓寧人遺寶之休受胸奴奉珍之賀並見前俾豫從欲以治玄圭足可以告功尚書禹錫玄圭告厥成功惟公克成厥終大器益思於自治法言先自治而後治人之謂大器昆夷喙矣蒸徒楫之思無競之維人圖有辭於永世並見前伏念某百無象似曽南豐詩深愧薄材無象肖獨有駑庸已知咋舌以悔狂史記灌夫傳齚舌自殺注齚齧也無敢刺口而論事韓詩彼皆刺口論世事有力未免遭驅使詎意贊木牛之運見前乃猶用芻狗之陳莊子夫芻狗之未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘇者取而爨之而已城南巷窮漫云去天之尺五韋曲杜鄠近長安諺曰城南韋杜去天尺五山谷詩城南窮巷有佳人不索賓郎常晏食江西轍涸亦惟乞水之斗升然或蒙二三執政之知猶可僃八百除吏之數並見前小枝卷曲而不中詎容詰匠氏而杙楹莊子吾有大樹人謂之樗其大夲擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧韓文是所謂詰匠氏之不以杙為楹杙橛也楹柱也杙小而楹大大鈞坱圠而無垠儻或陶河濱之苦窳史記舜陶河濱河濱器皆不苦窳否則安倉庫之氏王嘉傳孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也言為監倉亦願甘盆盎之中簡齋詩盆盎三年裡詩篇四海傳注朝無咎謫監信州酒日和東坡梅花詩落身麴糵盆盎裏晨對梅花無酒溫言監海務客燕差池曽辱捲簾之顧杜詩秋燕已如客餘見前病駒局促更希膏鬛之恩河東起廢答或膏其鬛或劘其脽御夫盡飾然後敢持詳見前代衛機宜朴謝史丞相偕計吏於外臺未能拾紫後漢書謝夷吾傳尋功簡能為外臺之表晉書陳頵傳刺史銜命國之外臺餘見前司間曹於內幕乃使奉親拔之墨水之餘開寶通禮北齊朝會儀諸郡守勞訖遣陳士儀字有謬誤及書迹濫劣者必令飲墨水一升杜氏通典北齊選舉多沿後魏之制其課試之法字有脫誤者呼起立席後書有濫劣立飲墨水一升東坡詩麻衣如再著墨水真可飲注梁試進士不中程者飲以墨水付以青氊之舊請裁小牘少謝大鈞並見前惟國家重謀帥之權左傳晉謀元帥故子弟許主書之辟豈惟機事繫辭幾事不密則害成宜有司存亦將培德而蓄材欲使象賢而趾美韓文若既自克自敬勤及先人存趾美成進士當建炎多壘之日實等咨謀洎紹興偃革以來始逃僉擬高宗建炎四年改元紹興似若取禾於不稼詩不稼不穡胡取禾三百廛兮然當肯播于厥災尚書厥父災厥子乃弗肯播矧肯穫如某者百拙無堪一愚自信恥襲懷繃之簮笏妄希弓冶之箕裘豈知下俚之音並見前不中儀曹之度六典魏晉宋齊梁陳後魏北齊有儀曹郎鄭谷詩小儀澄淡轉中儀禮記用器不中度不粥于市兵車不中度不粥于市能門有矜式也獨無君貺之科宋史王拱辰字君貺開封咸平人元名拱壽年十九舉進士第一仁宗賜以今名有司豈枉我哉姑利齊生之器昌黎送齊皥下第序齊生之兄為時名相出藩于南朝之碩臣皆其舊交齊生舉進士有司用是連枉齊生齊生不以云乃曰我之未至也有司其枉我哉我將利吾器而俟其時耳欲返邯鄲之步莊子子獨不聞夫壽陵餘子之學行於邯鄲與未得國能又失其故行矣直匍匐而歸耳注邯鄲趙國都更為湘水之行適侍親闈既移他鎮姑求管庫之節以慰倚門之思見前敢意甄收曲加器使猥從新府王勃滕王閣詩序南昌故郡洪都新府復得舊除畫棟朝雲此非吾事王勃滕王閣詩畫棟朝飛南浦雲珠簾夕捲西山雨短檠夜雨適與心謀韓詩長檠八尺空自長短檠二尺便且光此時提擕當案前看書到曉那能眠不勞奔走於顔行嚴助傳逆執事之顔行文穎曰顔行猶雁行在前行故曰顔也師古曰行胡郎反賸可周旋於膝下碧幢整睱更無可奉之文書綵服雍容此外何求於造化杜詩綵服日向庭闈趨又朝夕高堂念應宜彩服新兹蓋伏遇某官道先民覺忠結主知嶽立八年李詩多君秉古節嶽立冠人曹淵澄百揆收公道於廟堂之上用必惟人散和氣於宇宙之間動無棄物遂令太史馬牛之走見前來觀旌陽雞犬之飛許遜字敬之汝南人舉孝亷拜蜀旌陽令尋以晉室棼亂棄官東歸以東晉孝武帝太康二年八月一日於洪州西山舉家四十二口拔宅上升雞犬亦隨飛去某敢不增所未能求為可貴孝友施政當思令德之君陳尚書君陳惟爾令德孝恭惟孝友于兄弟克施有政法令為師肯作無能之薛惠薛宣傳宣子惠為彭城令宣從臨江遷至陳留過其縣宣心知惠不能留彭城數日終不問惠以吏事惠自知治縣不稱宣意遣門下掾送宣至陳留令掾進見自從其所問宣不教戒惠吏職之意宣笑曰吏道以法令為師可問而知及能與不能自有資材何可學也衆人傳稱以宣言為然代衛機宜朴謝陳憲天宜贅員內幕漫為寸祿之謀左太沖詩外望無寸祿內顧無斗儲受察外臺忝與一人之數平原君傳今少一人願君即以遂備員而行矣韓文朝取一人焉拔其尤餘見前可無竿牘自逹姓名伏念某學未之方仕非能信呻其占畢頗不後于衆人並見前觀我朵頥終未聞于大道易舍爾靈龜觀我朵頥象曰觀我朵頥亦不足貴也注朵頥嚼也朵是動義靈龜喻已之明德朵頥謂朵動之頥以嚼物喻貪婪也屠龍有志見前畫虎何功馬援傳所謂畫虎不成反類狗者也爨無欲清遂強隨於計吏莊子吾食也執粗而不臧爨無欲清之人吾今朝受命而夕飲氷吾其內熱與注對火而不思涼明其所饌儉薄也所饌儉薄而內熱飲氷者誠憂事之難非美食之為貨不中度竟見黜於儀曹見上條姑求管庫之官以慰倚門之望敢圖申令復使主書臺隍枕夷夏之交有嚴屏翰王勃滕王閣詩序臺隍枕夷夏之交賓主盡東南之美户庭得湖山之外亦簡文書韓文令修于庭户數日之間而人自得于湖山千里之外姑從容膝下之歡且增益胸中之學幸孰大此端有由然恭惟某官器宇浚明風猷凝逺自其不辭小官於州縣已具可以大受之規模模通作摹説文規也韻會規倣也高帝紀規摹𢎞逺鄧展曰若畫工規模物之摹韋昭曰正圓之器曰規摹者如畫工未施采事摹之矣師古曰取喻用摹謂立制垂範也暨宅牧于南交尚書宅南交又宅乃牧果馳聲於北闕北山移文馳聲九州牧高帝紀立東闕北闕師古曰未央殿雖南嚮而上書奏事謁見之徒皆詣北闕公車司馬亦在北焉是則以北闕為正門也帝念江右俗近嶺陬非得持斧之繡衣武帝紀遣直指使者暴勝之等衣繡衣持斧分部逐捕莫戢弄兵之赤子龔遂傳陛下赤子弄陛下之兵於潢池中耳濡轡甫驅於駱馬詩六轡如濡又我馬維駱注如濡言鮮澤也埋輪已讋於豺狼張綱傳漢安元年遣八使循行風俗餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸讋質涉切音與浙同説文失氣言也張湯傳羣臣震讋或作攝翠羽浮雲便作絳宫之想紅旗破賊即觀黃紙之除白樂天詩紅旗破賊非吾事黃紙除書無我名某有愧伐檀之官詩事伐檀刺貪也在位貪鄙無功而受祿君子不得仕進焉莫施橫草之力見前尚徼餘芘惠及間曹子弟亦何預人聊復爾耳謝玄傳謝安嘗戒約子姪因曰子弟亦何預人事而正欲使其佳玄答曰譬如芝蘭玉樹欲使其生於庭階耳阮咸傳未能免俗聊復爾耳孝友是亦為政幸卒教之代衛機宜謝樓提舉起同前恭惟某官昭代儒宗杜詩昭代麒麟閣何人第一功劉向傳仲舒為世儒宗師丹傳丹經為世儒宗德為國黃耉詳見前清朝壽俊李詩更奏逺清朝精神灑落光風霽月之標張九齡詩灑落出重雲山谷濓溪詩序舂陵周茂叔人品甚高胸中灑落如灮風霽月翰墨淋漓貯霧含雲之筆栁河東楊尚書寄郴筆詩截玉銛錐作妙形貯雲含霧到南溟自三年之博士韓文三年博士冗不見治盍旬日以封矦車千秋傳千秋無他材能術學又無伐閲功勞特以一言寤意旬月取宰相封矦世未嘗有也行莫為乎王留去孰如於公猛兩轓焜耀久遊康樂之城謝靈運封康樂公為臨川內史六轡委遲遂訪右軍之宅詩四牡騑騑周道倭遲倭夲作委於危反倭遲歷逺之貌王右軍宅在撫州府治東即今府學是也散積倉於南畞蘇涸轍於西江皇華寧久於馳驅清切即司於獻納並見前代衛機宜謝陳知府起同前恭惟某官天韻浚明風猷膚碩早參諸彥孰如棠棣之華杜詩入幕諸彥集遍閲後生不起積薪之嘆民庸既茂朝績亦高居然專城尚此斂惠田疇之成子産既永歌之並見前朝廷之知弱翁行且召矣魏相傳遷揚州刺史考案郡國守相多所貶退相與丙吉相善時吉為光祿大夫豫相書曰朝廷已深知弱矦治行方且大用矣願少愼事自重藏器於身相心善其言為霽威嚴代王支鹽謝丞相定辟差投光範之書方委身於爐錘錘主蘂切鍛器莊子在爐錘之間從英簜之辟許效役於牢盆周禮以英蕩輔之注蕩當為帑謂以函器盛此節或曰英蕩畫函漢食貨志募民自給費因宫器作鬻鹽官與牢盆蘇林曰牢價直也今世人言顧手牢如淳曰牢廪食也古者名廪曰牢盆鬻鹽盆也劉禹錫崔公倕碑公幹池鹽于蒲修牢盆謹衡石煎和既精斂散乃盈既無待闕之淹又有便家之樂小人屬饜足以行矣大均坱圠於是見之伏念某赤城迂儒白屋賤士並見前往歲從獨湖之學難強附於同門中年題慈恩之名偶適逢於當軸田千秋傳贊當軸處中括囊不言餘見前然雖生三台之下未及望六符之光東方朔傳願陳泰階六符注泰階三台也每台二星六符六星之符驗也供簿四方師友粗稱其願慤二令一邑臺府過謂之亷勤其如通籍之章難及守株之士並見前百拙自安於到部諸公或勸其千堂馬勃牛溲妄作兼收之想見前龜毛兔角理無速就之期書云商紂之時蔡生毛毚生角童謡曰彼毛者貂而龜也毛彼角者鹿而兔也角占者謂干戈將起尋果有武王之事述異記商紂時大龜生毛兔生角兵甲將興之兆山谷詩截斷中流爭一句不離兔角與龜毛東坡詩刮毛龜背上何時得成氊姑安轅下齷齪之蹤見前往守海瀕廣斥之𣙜尚書海濱廣斥厥貢鹽絺孔傳濱涯也言復其斥鹵疏鹵鹹地也東方謂之斥西方謂之鹵頗聞此職夲亦在遴選之中偶遂爾私兹端出曲成之賜感恩厚甚無謝可乎伏遇某官世濟王勳周禮司勳王功曰勳注輔成王業若周公家傳相業從容而飪百度談笑而羈四夷斷度收羅細桷大杗之各得栁文然後斷度收羅捎危顚芟繁柯乘水潦之波以入于河而流焉韓文大木為杗細木為桷各得其宜施以成室者匠氏之工也滌濯剗磢精金頑礫之自分剗楚簡切削也磢通作㼽楚兩切説文磋垢瓦石以碎瓦石去垢韓文濯滌剗磢磨滅瑕垢每隨物以賦形常量能而授職憐其乏泛水依紅之質見前姑且贊熬波出素之司南史張融傳融作海賦文辭詭激以示顧顗之顗之曰卿此賦實超玄虛但恨不道鹽耳融即求筆注曰漉沙搆白熬波出素積雪中春飛霜暑路庶羡地征周禮以土均之法辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政無棄天産周禮以天産作隂德以中禮防之以地産作陽德以和樂防之鄭注天産者動物六牲之屬地産者植物九榖之屬某敢不謹司倉廩平用權衡舉膠鬲於魚鹽之中敢妄希於尺寸活禦冦於鮒轍之內當知感於斗升並見前回諸郡賀成都漕弄半輪之月正慙俯首以為眉李詩峨眉山月半輪秋影入平羌江水流觀一道之風猥使強顔而將指見前薾然疲役莊子薾然疲役而不知其所歸可不哀耶注薾音捻忘貌疲病困之狀凡物各以其所好役其形骸至于疲困薾然不知所以好此者歸于已云何也杜詩疲薾茍懷䇿又疲薾煩親故畏此簡書見前未敢驅六轡之絲詩六轡如絲傳言調忍也已蒙褒一字之衮恭惟某官溫恭為德豈弟宜民飛紫馬之英聲杜詩使君騎紫馬注謝靈運守永嘉人曰騎紫馬者太守也按謝靈運事不見正史蓋附會也奉黃龍之寬詔宣帝紀黃龍元年詔曰朕既不明數申詔公卿大夫務行寬大順民所疾苦將欲配三王之隆明先帝之德也平生無襦今五袴已騰蜀郡之歌見前勉勵增秩賜千金即拜漢庭之璽循吏傳序二千石有治理效輒以璽書勉一增秩賜金或爵至關內矦有憐濩落俾效轉輸自非送上之吹噓安得暗中之摸索並見前某終慙非據亟已引辭投以木瓜愧乏衛人之厚報詩序木瓜美齊桓公也衛國有狄人之敗出處于漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也集于苞栩但深周道之懷歸詩肅肅鴇羽集于苞栩又四牡騑騑周道倭遲豈不懷歸王事靡盬我心傷悲回諸郡通判賀除成都漕守藩支郡曽微牧御之才出節夲朝忽冒轉輸之委方免章之需報辱慶櫝之鼎來並見前或承之羞不知所賀左傳子文治兵于暌終朝不戮一人子玉復治兵于蒍終日鞭七人貫三人耳國老皆賀子文蒍賈尚幼後至不賀子文問之對曰不知所賀子玉子文所薦賀者賀其所舉得人蓋謂子文略而子玉詳也不知所賀策其必敗互見後伏惟某官材優世濟學夲躬行宜澤佩以登朝暫題輿而佐嶽陳子昻表題輿佐嶽無展驥之能車蓋一丈詎容緹屏之淹黃霸傳賜車蓋特高一丈别駕主簿車緹油屏泥于軾前以章有德風月平分行膺佩刀之贈晉書王裁傳裁覽之子導之父初吕虔有佩刀工相之以為必登三公可服此刀虔謂祥曰茍非其人刀或為害卿有公輔之量故以相與祥臨薨以刀授覽曰汝後必興定稱此刀覽後奕世多賢才興于江左矣餘見前某自惟骯髒趙一傳伊優北堂上骯髒倚門邊注骯髒高亢悻直之貌曷稱馳驅流馬木牛冀選管蕭之亞諸葛武矦傳評可謂識治之良才管蕭之亞匹矣餘見前湖魚藪獸願亟歸濠濮之間濠濮二水名莊子與惠子遊濠梁水上又釣于濮水世説簡文入華林園顧謂左右曰會心處不必在逺翳然林木便自有濠濮間想覺鳥獸禽魚自來親人徒勤繭幅之遺法書要録王羲之蘭亭序用蠶繭紙鼠鬚筆北户録晉宋間有一種紙長丈餘就船抄之世謂繭紙莫效貂襜之報張衡詩美人贈我貂襜䄖何以報之明月珠回諸郡教授賀除成都漕對月半輪愧無治狀唐穆寧剛正為侍御史及為廣州刺史治有狀拜太子諭德餘見前觀風一道忽玷恩除已控懇辭力祈俞允敢意三鱣之席楊震傳有冠雀銜三鱣魚飛集講堂前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣見貽雙鯉之書伏惟某官夙掞天葩早收地芥朋來遊夏共師夫子之循循道出羲皇不羡諸公之衮衮並見前堂下不嫌于繫馬杜詩廣文到官舍繫馬堂階下海中即佇於掣鯨杜詩式看翡翠蘭苕上未掣鯨魚碧海中行題千佛之名徑上三神之島某自憐芻狗詎稱木牛並見前美人琅玕良感草木之吾味張衡詩美人贈我金琅玕何以報之雙玉盤餘見前愛我藥石幸母金玉乎爾音左傳臧孫曰季孫之愛我疢疾也孟孫之惡我藥石也夫石猶生我疢之美其毒滋多詩母金玉爾音而有遐心回諸司屬官賀除成都漕再乘一障慙無牧養之功張湯傳居一障間又乃遣山乘障韓文下猶取一障而乘之分察六條猥被將輸之命已力申於巽避何誤辱以謙施伏惟某官仕與學優美由世濟羅而致幕下便覺羣空錐之處囊中即觀穎脫並見前鴻儀有漸易鴻漸于陸其羽可用為儀鵬怒斯飛莊子鵬之背不知其幾千里也怒而飛其翼若垂天之雲某已控需章丏還節傳集于苞栩籲天但切於懷歸投以木瓜厚誼更漸於匪報並見前四六標準卷八
