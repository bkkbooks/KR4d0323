  - {type: variant, offset: 14, length: 304, content: 宋初有四書院廬山白鹿洞嵩陽嶽麓應天府未建州學也乾道元年兗州守臣孫奭私建學舍聚生徒乞請太學助教楊光輔充本州講從之餘鎮未置學也景祐四年詔藩鎮始立學他州勿聽也寶元元年潁州守臣蔡齊請立學時大郡始立學而小郡猶未置也慶厯四年詔諸路州軍監各令立學學者二百人以上許吏置縣學於是州郡不置學者鮮矣又置教授以三年為一任以經術行義訓導諸生掌其課試之事而糾正其不如規者委運司及長吏於幕職州縣官内薦教授或本處舉人舉有德藝者充當時雖置教授或用兼官或舉士人委於漕司而未隸朝廷也熈寧六年詔諸路學官竝委中書門下差選至是教授始命於朝廷矣元豐元年州府學官共五十三員諸路惟大郡有之軍監蓋未盡有也元祐元年詔齊廬宿常等州各置教授一員自是以後列郡多有教官矣, SBCK: ''}
