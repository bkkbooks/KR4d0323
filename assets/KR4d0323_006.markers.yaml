  - {type: variant, offset: 9, length: 1, content: 撰, SBCK: 昆之政治南陽如上蔡仰在中召父之規感悚惟􅀷敷陳罔旣榮州到任謝桂制置假守三榮叨塵統部牽江萬里旣見吏民比甞奏記以徹名復敢修辭而謝上惟和義之斗絶寔夜郎之奎隈事簡地偏舊􅁛道院吏貪俗悍今􅀋法場蓋一􅀊止五千石之經租而諸司近八十萬之折估郡資井養財匪􅀑輸属因􅁠攝之多馴至綱維之敗壯哉雀䑕公肆侵牟翩彼鴟鴞交騰喧譟致連帥括三井之羡爲属縣代兩稅之輸上関閫制之聽聞下籍吏胥之專擅去其螟螣始云歛此以錫民信及豚魚今則攺之而備塞莫非王事均是􅀖財黔其廬赭其垣正足爲參元之喜馬􅀂羊金􅀂粟􅀄何與張奐之家不才之某甞仕於蜀亦知風寒之數處何止日費於千金與其􅂢潤下之鹹徒滋它族孰􅀂助攻苦之淡以張吾軍然一郡四邑之間有百孔千瘡之費得斗勺之水斯活矣庶逃涸轍之枯無尺寸之膚不愛焉實恐剥牀之及恭惟某官弘􅀷而肅括簡要而淸通後勁中􅁠文武作萬􅀖之憲外鎮内附精神折千里之衝定不奪牛於蹊田但欲捕蝗之害稼有憐薄命值雷轟薦福之碑或辱寛征使乳復零陵之􅔙乞從舊額以惠疲甿某敢不祗遹寛條布宣隆指修慘怛忠利之實銷愁恨嘆息之聲可以言未可以言歟亦恃有仁人之在上哀之命不哀之命也更惟恕躁者之多辭歸􅀝惟􅀷敷宣罔旣通判到任謝參政宣薛滿神圉之祠􅅒無繼粟賛夫夷之長戍偶及􅀲題輿佐岳以安能伐輻寘河之有愧輙裁小牘少謝大鈞伏念某全抱迂踈平沉庸俗徒有黽俛六九年之歎尚何扶揺三萬里之圗頃由掌故之官猥分齒胄之教大風有隧俄然電掃以雷驅古井無波幸爾水淸而石見特􅂌治中之任俾從方外之游維時都梁之區乃昔槃瓠之境􅀊租仰於永邵峒窟接於辰沅元和遣兵惡其置魁而立伍崇寕升郡猶未建牧而立參蓋一􅀊止萬石之租而四郊無百金之子然而事簡鴈鶩之左右亦稀况巳食浮螃蠏之有無何計儻水火不交於百姓則風月亦足以平分此蓋伏遇某官弼亮天功平章人品謂栁子而在䑓省未必如司馬之可傳使趙温而果丈夫又何患郡丞之能伏况黔東嘯呼之巳靖有湖南淸絶之可親使自謀之何以過此某敢不謹脩厥職勉旣厥心思曹王踔􅀐之功無羞宗􅂀哦杜老化鯤之句更問詞源通判到任謝簽樞􅁑誨舘下之諸生夙􅂪釆菲􅀘黔中之上佐兹遂及􅀲揣弱念以易盈撫窮途而致感伏念某學不聞道才無瘉人􅀒米爲親飽固悲於弗洎析薪無子賤亦覺其有涯頋平生􅀼禄以代耕乃三􅀊賣文而求活頃申以栁易播之請遂忘得隴望蜀之嫌愧在其肝悵莫追於駟馬言提其耳甘束咮於􅀌雄旣待牧羝詎容展􅂹兹出回天之力竟諧縮地之謀鮑叔不以我爲貪傷哉資也伊尹耻匹夫不獲真􅀂推之公豈謂長史之有材僕固感國士之遇我兹盖伏遇某官爽􅀖良弼輔丗真儒欲立立人所學實資於孔孟匪求求我此心脗合於羲文然韓魏公自恨用明允之太遟而歐陽子亦愧知聖俞而不薦雖昔何如今今何如昔願公之求士甚士之求公庶皆有突兀大夏之驩斯不但屬饜小人之腹某敢不俯安雌伏仰任鳶飛文儒申申詎能繼巫嶓之公綽武岡矯矯尚及見江左之夷吾通判到任謝臺諌李趙留梁汪別洛下之諸生乆歸來於茅屋􅀘黔中之上佐偶及代於葵丘旣滌籕以服勤盍濡毫而貢謝伏念某地寒寡挾天巧素慳鹵莽而耕鹵莽而耘巳慙學落鼔譟以入鼔譟以岀更愧名浮頃從文學掌故之聮躐綴國子先生之後經笥之嘲未發謗篋之惡巳盈郷人不善者惡之成是貝錦相國之賜也大矣止於甌􅁷荏苒三年僥倖貳郡軫之旁鶉之尾不惟非螃蟹之宫丹之穴犀之顚近又築鯨鯢之觀然以非材之典午固在恊恭而同寅水火弗與百姓交寕湏餞别風月不用一錢買何必平分兹蓋伏遇某官道格君心識通治體進務閑邪而陳善退思激濁以揚淸天豁露繁􅀯嶽要聞於鳴鳯冰清霜㓗北臺自肅於捿烏姑試治中且游方外某敢不修其可願勉爾遁思聾且何傷正欲不聞於黜陟噤不得用又當且止於吟哦除兩浙運幹謝趙尚書汝述䑛淮􅀯之丹乆辱青􅁳之送涸江西之轍仍爲緑水之依非公實與之主張此事亦幾於濩落旣祗賤役盍控謝牋恭惟某官北海脩身東平樂善禮樂三雍之對卓爾不羣文章萬丈之光飄然無敵密勿星辰之履彌縫天地之爐當江濤如此之時思烝徒楫之之計汲引不遺於片善縶維長恐其遐心􅃳物之澤無聲旣優旣渥推轂之言有味不進不休斷度収羅欲細桷大杗之各得义􅀒偃植將震風凌雨而後知能令此意之常存豈獨于今之受賜如某無用所向多艱未能茹啇嶺之芝還復索長安之米誰其知者公獨惻然夲欲化鯤以爲鵬不料喝盧而成雉然感恩固在於知已則受德豈待於成身但令古路之末荒敢恨吾廬之獨破愈幸甚三爲属吏矣相國知之起在此勤至他人乎執事責也代石僉判孝理到任謝丞相絃歌學道偶得代於􅀲期造化爲工俾充􅀒於蓮幕待闕之日旣淺陪京之地甚雄偏親有就養之驩數口無啼飢之苦孰主張是遂濟登兹全岀大鈞鑪錘之功敢廢小夫竿牘之敬伏念某粗勤家學尚缺丗科揆材僅可以麄供渉丗敢萌於厚望惟宵人之乃祖乃父與先生則非故非親辱収夾袋之姓名力加論薦凡今懷綳之簮笏實出挈提家丗受知巳四十年兄弟感恩非一二數兹偶償百里之債亦欲干半剌之除然而母老家貧難需乆次矧是望輕資淺當避勝流適聞僉椽之虚輙致緘詞之請亟􅂪中入非有裏言㝷承繼粟繼􅁏之頒又沐載􅀏載色之遇由􅂨所請如響之從人或謂分寸之躋攀何其廉也自不翅三百之距踊惟恐失之捧檄而歸􅀝門亦喜伏遇某官相􅀖哲輔經國元勳喬木有臣旣丗襲格天之業泰山􅀂厲將代膺裂地之封惟元老克壯其猷故人兵不戰而屈寧王遺寳復還受命之符匈奴奉珍行納稱藩之欵諒􅀷綢繆牖户之計不廢収蓄欂櫨之材有如龍蟠虎踞之􅀖豈但魚泳鳥飛之樂因其粗更於民事使之往賛於藩條某敢不滌濯其心靖共爾位石生羅致於幕下巳叨從欲之仁越王胎養於國中終兾亢身之賜幕官到任謝丞相掃曹相之門慙非齊俊趨嚴公之幕巳次蜀都仰衘坯冶之陶退整韋弦之佩輙干㳙史肅布謝牋伏念某窳薄無堪嶔﨑可􅀏弱於材腐於力絶知天巧之慳加其膏希其光又覺巳功之淺徒縁稽古之力未忘及物之心然旣更憂患之甞亦漸失賤貧之耻漢庭諸老誤欲招之使來魯國一男何所恃而敢傲豈謂没階之進洊勤吐哺之勞誨之以先正之規模未甞忘虜勉之以中權之謨畫莫􅀂審機􅃐令沐浴以宵行不容濡滯於晝出南浮江漢旣聞克敵之聲西望岷峨僅獻養威之䇿只今疆埸粗立藩籬要恃吾有以待之則雖來無能爲也維是受禕允之任居然乏羣博之材大鈞坱圠以無垠寧忍匹夫之求備小枝卷曲而不中徒勞巧匠之旁觀每念食浮倍成顔厚此蓋伏遇某官直方而大智勇且仁王曰惟爾君陳率由舊典時則有􅀂伊陟克對保衡積十年調鼎之功成四海覆盂之􅀔豈謂魚潰之虜尚爲䑕􅀼之謀未煩十乗之啓行巳使􅃗輪之不返破竹数刄之後當無留難取果旬日之間不妨持重願徇金城之略勿貪石堡之功周公方且膺之勝於天定昆夷維其喙矣必以地降如某者戰野非長銘山猶勇􅀚我竒士極知東閤之多賢􅁉乃父功只頌西平之有子代回鄒泉州應龍到任執草東臺憇棠南國言求諸道駁正之氣凛然惠歛一州牧御之材􅁉矣恭惟某官弘􅀷而肅括明允而篤誠魁下三台付榮進於素定胷中五色肯噤默以求容名滿四海而守之以謙忠結兩宫而退然不恃露門晩講緝熈日月之光明天禁夕趨鼔舞風雷之號令念含飴之樂力抗陳情之章萬牛挽之首不回六鰲去而山爲重前驅􅀞㦸出鎮清源海道無虞雖京師􅂪九里之􅃳天子有詔則剌史乃三公之儲某夙托同寮尤􅀷賛慶燭之武老矣無能爲矣一力謀歸仲山甫舉之愛莫助之萬祈自重代回史吉州定之到任選侯相閱作牧价藩除目􅀄傳道路知其辨治建牙伊始氣色益以精明恭惟某官材應時湏美由丗濟踈廣與受早承給侍之恩謝安有元當是後來之慶有華分竹俶載戍􅀲斡白粲之連檣驅紅旗而破賊帶牛佩犢漫游魑魅之䰟鋒蝟斧螗佇築鯢鯨之觀印金斗大詔璽星馳某快覩未先賀成巳後烹魚拜貺良深藏去之榮揷羽奏功預卜遄歸之慶代回張建昌嵩到任入覲夲朝出藩支郡朱轓皂蓋分竹使之半符碧澗紅泉壯麻源之三谷􅀟旌戾止五袴煖然恭惟某官濟美篤誠受材膚敏神俊一鳴之表萬馬皆瘖躊躇四顧之間全牛自解需章交上渙渥留中忽願奏於民庸遽勇収於朝蹟江漘閩徼旴爲佳麗之􅀖顔記謝詩公有按行之便無嫌十絶㑹即升迁某漸欲投簮帰聽擊柝有山房三萬軸之私積託在部封願剌史二千石之公餘賜之覆護代回楊贑州長孺到任坐分􅀛組卧護虎城丗選爾勞上固望象賢之媺皇揆余度公肯􅀌熊夢之􅀖建牙有􅀄交口相慶恭惟某官麋珠果腹佩璐潤身素所自期豈止二中而四下見於歷試真覺一洗而萬空甫畢素冠聿來朱紱即家以拜得郡也榮清氷在壷决不作繭絲之計丹砂點鐵復何憂薤本之強􅀂作霖雨則無咨怨之民如臨父母則有慘怛之愛惠而好我更以贈君願􅀚清白之子孫大慰華㒹之父老崆峒日麗姑暫歌桂子之香閶闔天開即歸報麥岐之熟某罔功分閫有幸卜隣属州之得陽公同業也同道也便道而至滕閣爲記之爲賦之謝解任太守解任謝丞相􅁠武岡軍􅀘上佐以罔功叨書下考攝邊城而非據又遂合符䖍控謝於大鈞併修辭於小櫝伏念某至愚不肖多病早衰壯不如人紛兩髦之巳雪老而無子寒百念以成冰徒依突兀之萬間尚獲翶翔於半剌夜聽紞如之五鼔頗似官蛙曉聞欵乃之一聲便如野鹿偶挈瓶之缺守暫越爼以代庖敢言田里便無於歎愁似覺蠻貊可行其忠信淺有蒲蓮􅀷有葭葦小不虺蜮大不鯨鯢胡瞻爾庭人固疑其鶉穾此非子坐自亦愧於象環幸新尹之鼎來許陳人之退屏竹齋藥竈尚堪淸風明月之分桂棹蘭舟巳夢秋水長天之共滿秩雖無於多日庇身尚假於一雲恭惟某官直大以方清和而任天以寧皇同符於孝廟帝賚我公濟美於越王繼今文子文孫冝用汝而作霖雨乃立太師太􅀓真於我而如浮雲竟回渙汗之揚可見謙撝之確邴侯病瘉合從隂德以受封冨公年髙固有本朝之故事諒益耻匹夫之不獲必思遂萬物以攸冝尚念某何足控􅅮不堪位置雞壅也豕苓也亦甞累藥籠之収䑕肝乎蟲臂乎斯固在化鑪之運其爲頌徯罔旣編摩代林提管岊謝五府抱管􅅦之文書真成爲米守踐更之􅀊月有幸及􅀲帡幪曲免於震凌川藪密藏其汙疾孰主張是遂濟登兹良勞大造之鈞陶敢廢小夫之竿牘某箕裘有緒筆硯不靈勃窣盤􅘐僅脫身於選穽嶔﨑歷落姑䇿足於縣灘盍求泥軾之榮却落銅官之冗聚鐵成錯未能羡泉府之泉餔糟獨醒豈善㑹酒人之酒冒依行缺聊復坐曹二親髙年一則以喜而一則以懼三釜微禄時乎爲養而時乎爲貧誰爲元帥之謀載復歩兵之餼􅀊縻月費不共桂玉之爨炊冬煖年登未辦布荆之包褁有懷覲省屢願汰歸日食太倉之陳亦皆帝力人言長安之樂豈爲我曹不自意全遂得善罷伏遇某官彌綸天縡涵養人材椳闑扂楔各得冝與其進也風雨霜露無非教栽者培之福遂及於容容考亦書於下下某自非木石亦有肺腸烏獲力足爲氣足施維其時矣伯樂過不睨遇不顧亦有命焉梅亭先生四六標凖卷之五梅亭先生四六標凖卷之六}
