  - {type: variant, offset: 3, length: 1, content: 庫, SBCK: 牡載馳禮樂有光公不􅀒澄清之志哀矜勿喜吏何敢輕重其心有功見知不逺伊邇某民唐索寞歸夢飛騰望南浦之朝雲未能捲雨懷江東之暮日正阻論文代回福建詹提刑徽之䟽恩中禁持憲外臺褰帷風動於列城洗印日新於衆聽湖山自得原隰有光恭惟某官早抱通材徧儀華貫㳺刃有餘矣經肯綮之未甞善刀而藏之得躊躇之滿志属時更化加意審刑徑疇淑問之賢徃任皇華之􅀉維閩七聚不勝鱗介之勞奉漢六條寜止狐狸之問必有澄清之志乃無愁恨之民其審克之行且召矣某未遑燕賀先辱魚書君乗使者車固可想雲煙之風釆詔詣行在所或少慰塵􅁟之心期代回湖南胡提刑澥還節荆襄按刑湘楚父老迎嘆見百年之故家叔姪交承侈一門之盛事賢勞何憚聖眷方深恭惟某官擇乎中庸好是正直一經教子謟機寜觸於屏風萬里隨翁直氣早鏘於門限忠無不報孝可以移何周道之驅馳忘漢闥之􅀘拾天髙蜀道甫休捫歴之嗟地􅄶長沙又作回旋之舞蓋今褰帷之所自昔稅駕其間嶺北長蛇無復元城之迎侍遼東孤鶴足榮華表之來歸某視螺川為近隣恍䕫門之逺别殘燈翳復吐寜有可借之光可人期不來徒抱相違之恨滿期召璽猶可盍簮代回江西李提刑􅑻予環將漕持斧按刑一道三司公殆踐揚之徧兼旬並命上應簡注之􅀷前賀方馳後緘狎至恭惟某官鎮浮雅量撥劇長材左馮翊右扶風居多善政朝天津夕西極未究逺猷當戎狄講解之餘有溪洞猖披之醜見大夫無可使者明天子選而用之知效一官􅀏他人之刼刼身兼數器覺餘地之恢恢民為上所不為本原安在我徃㓂亦能徃保障奚先願繼周使臣之光華豈徒漢刺史之風釆某見賢忍渇得報忘飢不解丗俗書謾瓊瑶之效報實為天下賀願金玉之盡珍代回湖南胡憲澥老形巳具乆自分於投簮成命莫回猶罔功而曵履燁然下問厚甚髙情恭惟某官政為吏師行有家法皇華原隰之上乆職咨諏清切雨露之邊合班獻納顧令衰白亦復佩蒼得非隣壁之光宻借滎河之􅃳某􅀒二冝去巳三上章行或使之即返屠羊之肆願有復也遥瞻回鴈之峯代回成都林憲㓗巳􅀞㦸疇庸繍衣䟽寵田里之無愁恨歴試茂哉原隰之有光華載驅榮甚恭惟某官人門具美天分仍髙我搴時流窘邊幅者多矣公抱國器願繰籍以須之乆於典州方此將指川合東西而瞻使豈不足歟王置左右而輔台恐未免耳旣均牡轡益煥龍光某年以衰侵心爲形役巳屢章而告老兆足以行望三節之鼎來每懷靡及代回江東葉憲簣骯髒雲司將謀退而飲山緑便蕃天寵使無功而佩水蒼徒嘖人言誰侜予美恭惟某官好是正直多所平反江以東之瘡痍各安饘粥斗維北之喉舌難挹酒漿猶贈以言欲華其老然持緫衆職而相望恐難備百工之所爲某鳩僝非長狐疑巳决薦尚書不煩以政終非孔戣之冝白丞相去歸其郷當希踈廣之老代回江西李憲􅑻制五刑以即天已慙占筆居四民而時地猥使代庖諒皆皇華之光宻有蔽芾之䕃恭惟某官徧持三節洊歴諸司方赤子之弄兵金堅蔓熾頼繍衣之持斧風動草披仁逺及於一㕓官躐升於八座某水焉得北日巳薄西緫余轡於扶桑安知飭化集王事於苞栩願見勞還代回廣西郭提刑斌隨而薦栢酒逺莫致之得書而已麥秋報之何以恭惟某官馳心拱北將指宅南漢節梅花巳弄青黄之實周原苞栩旣成蒼翠之隂諒惟平秩之功如在始和之吉某雲司玩􅀊水部媮閑三月不違仁勞飛鴻之逺到五嶺皆炎􅀬願秣馬以遄歸代回利路鮮于提刑申之虎符遲次龍節載驅禮樂逺而光華遐心何有師旅因之飢饉敏手是資恭惟某官籍甚人門燁然地望吏民相告方懷季子之章郡縣未澄冝􅄃孟􅀶之轡劒閣今為平地鮮于丗號福星公有埋輪之心民何懸釡之慮功德如是祥祉如是其善持之刑獄幾何錢􅂖幾何行且召矣某老而浪出冗未汰歸五雉為工徒積汗顔之媿四牡勞使願収直指之功代回江西陳提刑天冝自天申命易地詳刑南海之陬旣濡無復跕鳶之困西江之水方涸更為活鮒之謀恭惟某官奥學名家通材資丗恢乎餘刃孰嬰紫電之鋒飛不盡翰斜取青雲之􅀔頃分半竹惠滿三楓尋專剌舉之六條迄用澄清於五管惟是􅀞冠之化未孚珥珥筆之民欲銷赤子之弄兵必假繍衣之持斧周爰咨度行將勞星駕之還逺有光華何况接日畿之近某濫兹聮事幸甚依仁所望使者之車疾驅沃轡庶假忠焉之誨叶濟疲甿代回廣東潘提刑㳙分符奏最持節祥刑田里之無嘆愁選諸所表原隰之周咨度逺乃有光恭惟某官器宇浚明風猷膚碩頃儀六舘實倡諸儒玉石一區時方􅀒隴西之媿淄澠異味何至空冀北之群迄著顯庸蔚為循吏一麾出守方幸同寅六轡載馳復聞後甲片言可折必能體欽恤之心五嶺皆炎正足展澄清之志星言夙駕天不違顔某十國為連再皷愈淡落霞􅀌鶩不能奪蓴菜之思尺素􅀟魚願無廢梅花之􅀉代回江東葉憲簣斜日投閑冒誤恩而入侍朶雲借􅃳􅓻好語以相先有味其言不知所報恭惟某官恢然抱􅀒乆矣踐􅆒榮分刺史之符勇襆郎官之􅀍甫陞華於卿月又趣駕於使星簸弄明珠自是驚人之質追隨􅃈闥㑹歸宻地之班某起家一寒去國十暑頭顱如此難􅃒西崦之光隂膂力旣愆又踏東華之塵土㑹且歸矣焉用文之代回曹提刑叔逺顯奉郡庸肅將使指凝香􅀞戟政成数月之間直指繍衣象應一星之入用賢如此載路驩然恭惟某官天韻崇谹風猷峻㓗三年􅀶士誰韓愈之見治六館諸生留陽城而不果徘徊南浦檢校東屯却念枳城實産伊川之易因㝷涪水欲昌山谷之詩孔席未温曹裝又趣刑罰不中則無措自昔欽哉禮樂言逺而有光是在使者佇從四牡歸侍六飛某方襞賀緘已􅂪謝牘我留綿谷正方􅀷通漢之防君把繍衣未可動思呉之興代回新䕫路李提刑􅹅凝􅀞㦸之香乆分漢竹持繍衣之斧式憇甘棠燕賀厦之未能鴈􅀉書而何速恭惟某官氣鐘井絡秀出岷峨真難兄之弟難弟之兄信名父之子名子之父人生五馬貴四出守而無嫌􅁠門九牛毛屢掉頭而不顧乃今直指猶是斜飛持衡秉鈞此言何為至我明刑種德所有更以贈君某日旣薄山雲猶出岫惠文柱後殆非佚老之謀神武門中行進乞身之請代回方提刑信孺已下代衛參作􅀚風嶺外公逺有於光華易地江湄我但慙於玩愒鼎來下問益仞髙情恭惟某官學與古稽美}
