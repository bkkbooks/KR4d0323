  - {type: punctuation, offset: 22041, content: (, id: KR4d0323_krp_007-bkkpn2533}
  - {type: variant, offset: 22041, length: 534, content: 地理沿革表惠州春秋百越地後屬南海郡宋秦齊屬南海東莞二郡隋立循州大業州廢立龍川郡唐武徳曰循州天寳曰海豊郡屬嶺南道漢改禎州别立循州於北境今按郡志惠州秦漢屬南海晉析置東官梁陳改梁化隋廢梁化置循州煬帝廢循州改龍川郡唐復循州中宗改雷鄉郡𤣥宗改海豊郡南漢劉鋹改禎州又析興寧置齊昌府宋仁宗天禧二年避御名改禎州為惠州徽宗宣和二年改博羅郡高宗紹興三年復為惠州會要登聞鼔院國初曰鼓司以内臣掌之在宣徳門南街北廊至道三年命太子中舍王濟勾當鼓司用朝臣勾當自此始景徳四年詔改為登聞鼓院掌諸上封而進之以達萬人之情燕翼詒謀録唐有理匭使五代以来無聞淳化三年詔置理檢司以錢若水領之其後改曰登聞院又置鼓于禁門外以逹下情名曰鼔司宋張湜雲谷雜記云文昌雜録云登聞鼔院未知起于何代因讀唐會要顯徳五年有抱屈人賫鼓于朝堂愬遂令東西都門各置登聞鼓葢始于此愚按世説晉元帝時張闓私作都門早閉晚開羣小患之詣州府不理撾登聞鼓又晉范堅傳帳吏邵廣盗官幔正刑棄市二子撾登聞鼓求自没為奚官奴以贖父命後魏刑法志世祖闕左懸登聞鼔有窮寃則撾鼔公車上奏又隋高祖詔四方詞訟有枉屈州縣不理者乃詣闕伸愬有所未聽撾登聞鼓則登聞鼓其來已久非始于唐也元周密癸辛雜識云今登聞鼓院初供職吏具湏知軍狀稱夲院舊管鼓一面在東京宣政門外被太學生陳東等擊碎不曽搬取前來負, SBCK: 􅀒}
