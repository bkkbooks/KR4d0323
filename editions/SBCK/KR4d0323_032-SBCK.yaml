front:
  text: 三十二
  hash: sha256:4c0141fefded8916aafb0ac1941c51328a5073371a48ae31ce9ece4b84657949
body:
  text: 州官通宋簽判億赴寕郷簿作一官走俗指囊粟以媚飢千里懷賢望嶺梅而傾渴將為半面之張本請先三祓以修辭恭惟某官天韻浚明風華膚敏不自多其閥閲必身致於功名鳳覧德輝下之則冝巢閣麟為聖人出也而乃在郊自古多才莫若湖南之賔客得公為重兄空兾北之士夫無久紅蓮之依恐有青藜之照某偶逃飲墨遂得勾朱仕有時乎為貧惟㑹計當而已矣學然後知不足願教誨式穀似之通臨安趙簽判崇寔天府元僚亦既入芙蓉之幕氷臺末属何幸託桃李之場謂已納交遂忘執贄敢圖衘䄂之禮適重歛祍之慙恭惟某官卓爾宗英濟之世美平氏之與韋氏僅聞閥閲之傳周公之謂魯公冝襲勳勞之舊俯試一同之治迄騰三異之聲故國蓋有世臣藉未取苴茅之賞他人不如同姓自應聮棠棣之輝頋甘僉舍之勞來借神臯之潤雲飛川泳是為近咫尺之天海運風摶行即擊三千之水某濫塵吏底缺效恭先倒着白接籬所愧反躬之未稱報之青王案更慙出吻之無竒回費簽判易地借材詰朝入幕遷于喬木可見主人之相知陟彼髙岡良勞君子之于役恭惟某官典刑勝士文獻故家子弟欲其自佳不顯亦丗公侯必復其始無競維人暫兹泛緑以依紅行矣紆青而拖紫某濫乗一障正窘百罹忻聞主畫之良將有􅂪成之託集思廣益何幸承賢者之來同寅恊恭所望有忠焉之誨回史僉判文舒謝饋遺某辱講嵗饋見貺風冝口腹之奉累人難鯉盤之牢拒綵繡之光翻坐盍鯨錦之卷還未寓㱼桃報李之誠且舉受飱返璧之義願無再遣必亮寸忱回史㑒判文舒一麾出守逺從戍於安南同官為寮幸留良於兾北有勤下問尤佩髙情伏惟某官業茂家傳美專世濟人人宗眉山之學維其有之字字出史籕之餘由來久矣兹屈糟丘之隱且兼氷幕之游衆皆醉而我獨醒是亦為政人有酒而身無事定不廢書某一障之乗再鼓甚淡思元賔而不見良忻子弟之自佳待崔羣以相親尚幸友朋之責善回權僉判李司法申子被命帥連屈參郡畫聞風已久幸分鄰壁之光易地此來良覺賔筵之重恭惟某官蟠根奕葉騰茂飛英古錦為囊非瓦棺之竒詭飛霞有佩足金薤之光芒胡為繡節之家猶屈墨曹之椽取青嫓白諒必工進取之文汎綠依紅何足留軒騰之步此州斗絶毎事氷寒兹乃得君子之寮必能圖仁人之利某強顔乗障束手面墻倒屣相迎何幸一賢之入幕同舟共濟庶無百姓之填溝回權僉判李司法申子比沐䄂牋已感再三之意兹承祓籕又貽四六之文良感勞謙亦幾迷復恭惟某官臨卭重客成紀故家仲元在夷惠之間席珍審矣太白落羌渝之上袍錦謂何如聞飽曲禮之三千今復探直筆之数萬大廷奉天人之問固利春秋廣殿對日月之明今條禮樂拾芥不難於取紫泛蓮寕久於依紅肯為某來徒得君重某濫兹主畫正爾䝉成三熏三沐之初何俟於三語同姓同業也固有望於同寅回郭僉判仲洪偏城假守凛虞末路之難貳郡得賢忻託初筵之重未皇􅐹記先辱飛牋恭惟某官學富家傳美優世濟林宗砥礪之節壯若山淵子儀金石之忠貫於日月其在遥遥之胄諒餘挺挺之風四國于蕃寕止三令尹而無喜五年湏假頋方半刺史而同流惟時三榮強號一鄣蠱小有悔无咎尚可爬梳井居其所而遷竟難回斡求牧與芻而不得無􅋗造餅之滋難何幸别駕之來將頼同舟之助相勉以忠義冝兩家子弟之通知衆望為神仙詎千載風流之敢繼第恐飛黃之服皂誰能泛緑以依紅某昔未借交今欣聮事瓊瑶匪報永以為好也敬飭魚緘珠玉將至得無修容乎惟占騎氣回郭僉判仲洪函牘相先已佩再三之意袖牋為况更勤四六之文損惠稠重訟慚襞襀恭惟某官西岷秀望東郭故家宰松桂之林良多美最汎芙蓉之幕似欎壯圖佇自民庸式遄王覲某幸兹聮事甫此識賢凋郡蕭然正有望忠焉之誨佳賔戾止或可容拙者之歸回趙僉判卨行吟憔悴忽玷竹符坐嘯從容將依蓮幕方圖􅐹記遽辱鳴謙恭惟某官學富家傳材優時措成季之勳有後夙載英聲廣漢之政甚高冝躋膴仕頋紆僉賛良􅊊師言鴻漸于磐聊復爾耳鵬怒而翼其孰禦之某出幕星終得州斗大於焉嘉客定非圖利於大夫及爾同寮尚冀頗哀於老子通潭州于節推晉數淮右之衣冠髙門以世謁湖南之賔客上幕其人眇焉枳棘之棲仰止芙蓉之幕不容禮後請以書先恭惟某官服襲典刑飛騰聲實莽西北三邊之警岌東南一尉之危誠死君上誠死封疆言之易耳今為妻子今為窮乏去者紛然能障狂瀾可知勁草章交甚盛召擢冝優猶出依綠水之光殆斜取青雲之勢天地亦大矣㑹當錄德而計功人物方眇然願思任重而致逺某因貪蝗粟為養蝨官今兩府之髙士不為乃甘為此後五日之孺子可教幸卒教之回呉節推代月湖作蓮綠水之風流於焉嘉客􅀲青門之瓠落似是昔人藻翰惠然故情厚甚恭惟某官浚明其質膚敏於才錐之處囊中久於見頴羅而致幕下信矣拔尤聊秩初筵即騰夷路某罔功于國歸老是邦龐公入城或奉笑談之適楊儀在幕正觀聲實之流回李節推欽十年别德謂已遡紫而凌清一榻延賢今顧依紅而泛綠有勤委贄良愧過情恭惟某官學有家傳才冝時措仙李盤根猗蘭奕葉夙髙通德之門椒蘭臭芙蓉為裳冝待承明之詔頋勞主畫暫屈賔僚川泳雲飛此豈容於煖席幕開風動佇即拜於温綸某再守竹符獲依梓里同姓也故人也惟是焉依儀圖之愛助之尚祈無隱通潭州趙察推汝倕下邑椽曹之卑謬兹祭竈上府元僚之重正爾秩筵妄欲託桃李之埸盍起敬芙蓉之幕恭惟某官身端行治學廣聞多禮樂宗英其賢城也逺矣詩書元帥以禮羅而致之湖南之客多賢姑紉蘭芷天禄之書當校行薄蓬萊某弄筆得官代耕求禄輕舟主簿柰何凌萬頃之茫叢桂王孫或者哀衆芳之穢回新武岡王判官之經駕丹桂之梯夙聞香譽依紅蓮之幕兹屈英游先辱朋箋良高僚誼恭惟某官負才膚碩蓄斈奫沄早收名第於摘髭盍徑要津而策足頋由倉􅁃欲試弦歌㑹外臺重黔巫之邦以一賢任温石之責使者持斧既已加桑梓之恭賔之初筵必首入蘋蘩之薦某一寒寡與獨冷多畸涉筆負丞已慙記壁挈瓶假守更使捫參猶幸勝士之肯來或望餘光而後去百聞不如見靣未易立談同寮敢不盡心尚希愛助回榮州羅推官聞琳琅之譽愧未盍簮賓玳瑁之筵幸聞命駕鼎來儷語益仞髙情恭惟某官子貢名門公逺仙裔扶摇三萬里謂立致於要津才名四十年胡尚淹於選穽暫此依紅而泛綠亟其拽紫以紆朱某濫守麾符正資幕畫戒行李載書􅁽幸疾其驅廣忠益集衆思無孤此意回羅推官萬里試郡叨分和義之麾聮事為簝正藉友仁之益未皇􅐹記先沐蜚牋恭惟某官世德蟬聮器能駿發明經而拾地芥早題千佛之名舉瓢而酌天漿合上三神之島頋未吟於芍藥尚小泛於芙蓉煖席未幾温綸即下某重捫井絡濫領斗州同寅恊恭和衷哉正湏賢者罔利征商自始矣能勿誨乎詹晤非遥敷陳罔既回新本州藺推官尊祖慕藺相如夙服題橋之志從李虞部暫為入幕之賔一介未先􅀟鱗甚厚伏惟某官美優世濟才應時湏智囊衮衮以生風才刃恢恢而餘地初試神仙之隱五采宣威繼為法令之師片言平獄便合紆朱而拖紫乃猶泛緑以依紅蕞爾三榮隣於九頂事頓異於昔者公胡為乎來哉廣忠益集衆思國無陋矣戒行李載書􅁽予日望之某乗障非材觸藩無計求牧與芻而不得專俟罪歸襆被束擔而未行或容晤語回武岡彭知錄岊共江西之水昔嘗附緫屬之題名分黔東之風今乃際糾曹而聮事未皇􅐹記已沐飛箋恭惟某官學裕家傳才優世用考三世登科之記安俟金籯續一門叔父之芳正湏玉樹頋厄銓曹之限不辭郡􅁺之卑竊聞文斈之穰穰足賛武岡之矯矯操持綱紀自來喜見於朱􅁝明習憲章詎得久淹於丹筆不容煖席即對温綸某教胄非材佐州何取督郵地忍儻未逐重聽之聾丞錄事天通固甘作折威之司馬代回新􅃊州郭知錄伯長對比臺之馬耳自昔通家問南山之鳳雛乃今補􅁺貽書勤甚喚夢凄然恭惟某官詩禮磨礲典刑服襲飲氷食蘖不忘先訓之勤㰸板折腰猶待紏曹之次三語之機相契五章之剡何難某星且拱辰日將入酉伏波床下敢當盛意之勤渠子陵臺邊或恐歸舟之邂逅代回李知錄短綆汲深聊備一人之数長牋委重何啻三語之多受之赧然無可謝者恭惟某官持心近厚克敬惟刑京兆浩穰小大之獄難察參軍俊逸輕重諸罰有權冒騰一鶚之章自笑匹雛之力譬之推轂信當遵平陸之塗然而盤根豈冝後朽株之木某儀圖莫助欲與同升惜露螢無自煖之光莫分鄰壁願天馬有長驅之足早入帝関回司理司法楊蕃林木䝉恩佐郡慙非典午之材聮事為僚將有同寅之契方圖􅐹記已沐飛箋恭惟某官業履直温風猷明浚補三語之􅁺暫屈通材培萬里之程盍躋要路佇由鶚表徑造鴛班某倚席罔功題輿非據别乗分月愧初無倡和之能同舟遇風幸不靳維持之助過此以往未知所裁代回江隂趙司法桑榆婉晚又塵紫槖之聮竹素勤渠良感墨曹之意慚無好語莫報故人恭惟某官清出璇源粹藏玉質頃者勾稽之試藹然廉直之聲滿謂頡頏身結飛霞之佩不虞簸弄胎寒明月之珠佇積平反入儀華要勉為國計巳振家聲某壯不如人老當佚我聊復爾耳更穿振鷺之行姑少遲之徑返屠羊之肆代回全州劉司法西崦餘齡冒誤恩而還綴東鄰厚意飭儷語以分光情溢乎文愧浮于感恭惟某官簮裳胄望衣被典刑斕斑綵服之華趨庭有得局促墨曹之試游刃不難諒積平反之功即登華要之路某枌榆相託蒲柳既凋迷觚稜闕角之雲煙誤為出計懐江上山間之風月已卜歸期代回江隂趙司法崇价冬官率属誤拜上恩春藻摛辭猥勤下問恭惟某官禔身廉靖臨政䟽明行矣􅀲期又作墨曹之試豈其茅茹長為白璧之投願少湏之自此升矣某未能免俗豈不懐歸猶戀君軒小曵鄭崇之履行秣余馬言㱕䟽廣之廬回新任李司法公澆題千佛之名夙欽雋望補三語之椽兹屈英游望履不先鳴謙何厚恭惟某官掞材肅括蓄學碩膚五千言之修身盤根有種三萬軸之貫腹奕葉彌芳蚤擷頷於廣廷甘擡頭於矮屋盍騰華貫又領决曹昔狄梁公之於并門韓昌黎之在荆渚皆居此職能大其官景行行之執事事也某負丞將滿聮事亦榮惟内惟貨惟來知片言之可折同姓同業同道或一見而後行代回唐司理惟良折獄何擇非人恤功于民不聞亦式鼎來良椽式慰疲甿恭惟某官有偉儒宗蔚爲壽俊禀江陽之秀清德可知觀雪嶺之竒雄材斯展不煩三語行剡五章某㱕夢飛騰亦已買江西之舫行即解維或可識劒南之英當圖望履回羅司理十年出幕濫叨一障之乗同官為寮頼有三語之椽方規請益先辱鳴謙伏惟某官學有家傳材優世用撥煩剸劇共知從事之賢勞登明選公將在參軍之俊逸騫騰近只翹企俟之某又入坤垠叨分斗壘同舟共濟諒無有於遐心縮䄂旁觀亦恐孤於大手厥惟期傒莫旣編摩通潭州曾司户應甫操觚學步敢論臭味之同舍墁代庖強附交承之契揆材名而藐甚接歩武以幸然恭惟某官胄出魯洙秀鍾閩嶺鏗爾舍瑟學傳先聖之不傳向來瓣香文到古人之未到事業巳其土苴科名真是遺餘居然三語之除淹此八年之久争先捷徑君不行兮夷猶猶抱古心羌難得而覼縷寧有圖書之彦可留版籍之司深霧雨而澤之望雲霄而近只某徂徂有志鹿鹿無竒栖枳棘於叢中甚安斯寢搴芙蓉於木末敢襲其裳重違大府約束之嚴姑俟前驅弩矢之至鳳凰尚遥於千仞鯉魚盍貢於尺書糠粃在前令公怒之未免珠玉將至覺我穢以何疑代回邵武曾司户復老子婆娑濫紆蒼佩參軍俊逸逺寄素書恭惟某官植德潤身掞材資世用計然之半策已足豪雄試掞之之一官㑹觀霹靂有憐西崦之景猶庀北斗之司某曵履罔功投簮孔武吾車吾馬漸為膏秣之謀某水某丘或遂釣遊之願回叚司户干木之廬必式尚阻面承子松之歲當更反勤言贈撝謙寵甚内訟悚然伏惟某官毓秀岷峨炳靈江漢秀實仁勇之節風烈固存文昌翰墨之聲雲仍是似草凌雲而入奏芥拾地以决科小試椽曹未展霹靂之手固為檄屈忽纒悽愴之心素冠已畢於三年丹檢㑹膺於一札制禮弗敢過也俯就朝祥任官然後爵之亟觀暮召某避堂不敏下榻已稽將軍乃肯幸臨既不以服而為解進士於吾同業是固將賀其善鳴回綿州家司户燩翁家將仕坤翁鸞停鵠峙舊聞英物之不凢鴈後鴻前今見故人之有子未皇修贄先辱贈言恭惟某官世載其英學造乎道取青拾芥誇映秀士之羣泛綠依蓮卓犖椽曹之表恭惟將仕學有家傳美由世濟俯拾地芥不難一律之塤箎小試天葩便入三銓之衡尺佇遄王覲亟踐世官某自嘆孤蓬復分半竹事其賢者友其仁者幸其在邦域之中愛勿勞乎忠勿誨乎特有望文辭之表通潭州叚支使齒下士而望光明漫為委吏詣大府而受約束將見元僚或有三年之託根可無一紙以張本恭惟某官恢然材諝籍甚典刑故笏猶存可落姦雄之膽新硎既發孰嬰肯綮之芒兹依綠水之華暫賛碧油之畫湖山自得皆春生秋殺之仁賔主相驩有川泳雲飛之樂得文武於幕下已空兾北之士夫流聲實於天朝是必湖􅀯之支使某一科不補三釡是謀使我有二頃田肯争雞鶩屈公為數旬客幸䕃􅀛魚武官代回林御帶㟽十年去國恍然孤鶴之歸千里故人厚甚􅀟魚之遺所慙善頌未免過情恭惟某官鈐略通材璇魁名第朱華庀職早通二閤之班畫㦸凝香屢作三刀之夢頋因微恙力請真祠尊足者存䕫何怜於踸踔奉身而退龍豈困於騰驤既兩踵之生輝冝單車之促覲君王神武雖已謝單于而閉玉關男子功名正當殺賊奴以取金印某無能為役非所納交天子欲誅羌酋未覺營平之老丞相必舉龔遂佇觀渤海之安謝戴將使木邂后適願已幸識荆倥偬裝懐未遑訪戴既感輕身先匹夫之意復有一紙賢十部之榮恭惟某官天分軼羣人門濟美翼扶九萬里决應海運於南溟腹笥五十家暫隱天樞之北落勇早聞於六館陣獨掃於千軍㑹當定一覇於蝥弧何難連八科之麟角衮明日月更看黃牓之新履上星辰始是青氊之舊某舊交羣從今識清標聞元方季方之齊名亦既見止從延君少君而受禮更幸進之回成副將鑑懐章試郡叨分榮邸之麾訓旅將屯知有和門之副逺勤一介見畀􅀟鱗開緘粲然佩意厚甚恭惟某官共武之服克壯其猷禀山西六郡之良性資鷙勇應婁北一星之象世胄蟬聮兹煩寡二之良來貳第三之指為王􅀲士足增劒閣之天髙歸衞羽林寧俟玉關之人老某濫乗一障將幸同寮共惟帝臣正爾頼熊羆之士能以衆整尚願聞龍豹之韜占叙惟勤敷陳罔既寄居官代董制帥通許侍郎奕劉閣學光祖石坳和墨躐升献納之班玉壘分符更冒蕃宣之寄巋然地重蕞爾人微實惟隣寶之依敢廢書函之敬恭惟某官清時碩德名世真儒惟其特立而獨行造道自得故能難進而易退經德不回至今猶侍臣之冠歷年賜方伯之履在外則植旗旄羅弓矢公豈此榮其功之銘鼎彞被弦歌士誠有望佇起几安之舄亟馳介大之圭某見謂踈庸誤䝉簡注願乗一障豈能堪十乗之行縱駕兩轓何敢作三刀之夢冒焉叱馭願在執鞭嗟逺道胡為來哉孰寛脅息居是􅀖事其賢者載慰心期代通費參政士寅分小隊於少城將安問政倚鉅人之長德行可庇身請裁吾黨之裴然來事是邦之賢者恭惟某官賦資肅括蹈行中庸長卿吞雲夢之胷豈以八九而芥蔕太白空岷峨之眼尚餘千萬之琳琅簡上帝心為公室輔固已重清廟九九之鼎謂當應泰階兩兩之符乃甘松菊之主人暫作園林之勝事道之將行也命天將降任是人佇一馬二童之來增六鰲三極之重公有無窮之聞民無不獲之夫某薾然棗昏重以木訥躐冒清華之選遂塵碧落之班所期乞一障之乗詎敢作三刀之夢惟是夙仰翹材之舘乃今得依通德之鄉避正堂而舍蓋公定難屈致置盂水以教任守尚幸告忠回寄居官楊􅀯平牟涪州蒲運骨俟茂州再命專城甚慙愒日六條察郡誤玷觀風所幸依長者之墻用是􅄃慨然之轡曾修辭之不敏辱委贄以相先恭惟牟涪州楊南平文武兼資循良可紀云俟守器博而周才􅀪以毅官云蒲運洵美且仁柔嘉維則回汎云衆官筆力挾岷詞源倒峽作為黼黻卿雲河漢之亡窮粲然琳琅李杜光艶之固在有怜弄峨眉之月詎能應益部之星財匪鬼輸安得有錢而使鬼粟非天雨若為轉粟以上天匪藉大家之牛車難沃小雅之牡轡某自知負乗更愧贈刀大夫儼然造焉既知感矣是邦事其賢者能勿誨乎回寄居官賀除漕依君子之鄉正虞謫滿歌使臣之雅忽冒恩除亟以籲天期於易地敢意緘縢之賜過形黼黻之詞恭惟某官厚德嘘枯英詞發藻通經學古用西漢以為宗援筆賦詞鍳東坡之太晚崇金蘭之氣類致水薤之箴規送以禮樂而有光恐孤煩使編之詩書而無愧曷稱徽言某􅄃轡安能循墻知懼是邦大夫之賢者知久敬以善交吾黨小子之斐然愧成章而匪報回鄉官未相識守鄭公之鄉方規問政辱子雲之札有味贈言愧先施之未能感髙情之見厚藏惟􅀷於篋笥報莫辦於瓊琚回鮮于將仕􅑻五月渡瀘曾奉青油之談笑十年去蜀未瞻丹穴之羽毛敢圖伻來辱篤世好恭惟某官學優而仕父教之忠德星出虚危本南隆衣冠之望高論已河漢信東坡眼目之長竊聞塤箎不替弓冶章矣是以有慶矣正湏子弟之自佳咺兮終不可諼兮􅀝見公侯之復始某未皇望履先辱鳴謙識野鶴於未仙固將有後期廐駒之越國所向無前梅亭先生四六標凖卷之三十二梅亭先生四六標凖巻之
