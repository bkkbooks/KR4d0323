body:
  text: 四六標準卷十三宋李劉撰及第回王省元胄謝取中嘉泰元年起居舍人章良能陳主司三弊其一曰假借春秋太過諸處解榜多置首選觀此卷諸啓良然觀春秋之林潛心久矣司馬相如傳覽觀春秋之林如淳曰春秋義理繁茂故比之于林藪也法言敢問潜心于聖曰昔仲尼潜心于文王矣逹之顔淵亦潜心于仲尼矣未逹一間耳登文章之籙為首褎然栁文登文章之籙波及後代越不過數十人耳董仲舒傳子大夫褎然為舉首師古曰褎然盛服貌足愜公言何勤私謝恭惟某官深於蓄德易君子以多識前言往行以蓄其德餘以績文韓文種學績文以蓄其有束五傳而抱遺經獨明大義漢藝文志春秋分為五左氏傳三十卷公羊傳十一卷榖梁傳十一卷鄒氏傳十一卷夾氏傳十一卷韓詩春秋五傳東髙閣獨抱遺經究終始鄒夾有録無書外四夷而內中國洞䆒微言何休春秋有三科九㫖內其國而外諸夏內諸夏而外夷狄此三科九㫖也藝文志仲尼沒而微言絶七十子喪而大義乖果以海內寡二之才吾邱夀王傳天下少雙海內寡二出當天下第一之選賈誼傳河南守吳公治平為天下第一公孫宏傳太常奏宏居下天子擢之宏對為第一翟酺傳酺對第一義則竊取矣可逭有司之不明韓文諸生業患不能精無患有司之不明行患不能成無患有司之不公來不亦樂乎更幸斯文之未喪至如榮進之素定見前何待抗聲而自陳國史范鎮舉進士禮部奏名第一故事殿庭唱過第二人則禮部第一人必越次抗聲自陳因擢置上第鎮不肯自言至第七十九人乃出拜退就列無一言廷中皆異之石林燕語故事南省奏名第一人殿試唱過三名不及則必越衆抗聲自陳雖考校在下列必得升等吳春卿歐陽公皆由此升第一甲獨范景仁避不肯言等輩屢趣之皆不應至第七十九人方及徐出拜命而退時服其靜退自此遂成故事某偶綴蝨官杜牧孔子廟碑隂記仁義蝨官也可以置之韓詩官無蝨其間豫窺麟筆吳融詩偶特麟筆侍金閨盧綸詩麟筆刪金篆求珠而徑寸先得自賀其遭東方朔神異經西北荒中有二金闕髙百丈上有明月珠徑三寸光照千里史記魏王謂齊威王曰寡人國雖小尚有徑寸之珠唐詩紀事長慶中元微之劉夢得韋楚客同㑹樂天舍賦金陵懷古劉引滿一杯飲已即成曰王濬樓船下益州金陵王氣黯然收千尋鐡鎖沉江底一片降旗出石頭人世幾回傷往事山形依舊枕寒流而今四海為家日故壘蕭蕭蘆荻秋白公覽詩曰四人探驪龍子先獲珠所餘麟爪何用耶於是罷唱栁文譬之求珠于海而徑寸先得則衆皆快然罷去知奇寶之有所歸也跂織而七襄不成未知所報見前回何釋褐大圭揚雄傳或解縛而相或釋褐而傅世語鍾育嘲周泰曰君釋褐登宰府三十六日擁麾蓋宋史選舉志每春季太學辟雍生悉公試混取總五百七十四人以四十七人為上等即推恩釋褐一百四十人為中等遇親策士許入試一百八十七人為下等補內舍生朝野雜記舊制太學上舍生積校已優而舍試又入優等者就化原堂釋褐號釋褐狀元例補承事郎太學正録東萊吕氏曰自漢至唐進士登第者尚未釋褐或是為人所論荐或再應皆中或藩方辟舉然後始得釋褐至本朝始放進士及第即放釋褐宋朝㑹要云太平興國二年賜新及第進士諸科吕䝉正以下緑袍靴笏非常例也御前釋褐蓋自是始中的璇魁賀若弼傳突朔入朝上賜之射一發中的上曰非賀若弼無能當此于是命弼既射一發而中杜詩破的由來事先鋒孰敢爭史記天官書玉衡中屬杓魁為璇璣晉天文志魁一星曰天樞二曰璇三曰璣四曰權五曰玉衡六曰開陽七曰搖光一至四為魁五至七為杓解韋璧省禮記天子辟雍注辟雍圓如璧實以水白虎通天子立辟雍辟者象璧圓法天桓談新論王者作圓池如璧形實水其中以圜壅之名曰辟雍璧省猶言學省十九年無全牛之刃頓見異材莊子三年之後未嘗見全牛也又十九年而刀創若新發于硎九萬里運化鵬之程實開逺業莊子化而為鳥其名曰鵬摶扶搖而上者九萬里恭惟某官學有源委學記三王之祭川也皆先河而後海或源也或委也此之謂務本源泉所出委泉所聚行無瑕玼玼音慈亦作疵黃憲傳去玼吝左傳豫取豫求不爾瑕疵韓詩佳句喧衆口考官敢瑕疵曲禮三千富春誦夏絃之學禮記春誦夏絃太師詔之瞽宗注誦謂歌樂也絃謂以絲播詩圜門億萬髙月書季考之功後儒林傳縉紳冠帶之人圜橋門而觀聽者蓋億萬計宋史選舉志始入學驗所𨽻州公據試補外舍齊長諭月書其行藝于籍行謂率教不戾規矩藝謂治經程文季終考于學諭次學録次正次博士後考于長二嵗終㑹其髙下書于籍以俟覆試參驗而序進之果收傑出之科徐稚傳角立傑出宜當為先亟被非常之渥榮進素定無負明天子之殊知見前要路在前自有鄉先生之近比韓文古之所謂鄉先生沒而可祭于社者其在斯人歟餘見前某濫叨倚席後儒林傳博士倚席不講朋徒相視怠散樊凖傳博士倚席不講儒者競論浮麗例沐投瓊夀知武故厚之敢為諛語何武傳初武為郡吏時事太守何夀夀知武有宰相器以其同姓故厚之堅於愈同業也敬誦祝規昌黎送何堅序何與韓同姓為近堅以進士舉于吾為同業送石處士序敢不敬蚤夜以求從祝規此啓蓋代月湖故用何武何堅事回郭正奏應王正奏已之宋史選舉志髙宗建炎初親䇿士於集英殿賜正奏名李易以下四百五十一人進士及第特奏名第一人附第二甲賜進士及第紹興二十一年御試得正奏名四百人特奏名五百三十一人中興以來得人始盛策名外省宋史選舉志髙宗建炎初駐蹕揚州時方用武念士人不能至行在詔諸道提刑轉運司選官即置司州軍引試使副或判官一人董之河東路附京西轉運司國子監開封府人就試於留守司命御史一人董之國子監人願就本路試者聽趣對中宸張衡賦消氛埃于中宸賈逹曰宸室之奧者後人指帝居曰宸五卯風塵率聚五星於十月真誥五卯之日謂乙丁己辛癸髙帝紀元年冬十月五星聚東井天文志此髙帝受命之符魏髙允傳允謂崔浩曰按星傳金水二星常附日而行冬十月日旦在箕尾昏沒于申南而東井方出于寅北二星何因背日而行浩曰果如君言以前三月聚東井非十月也東井為蜀分野故云六丁雷電迄摶六翮於九霄韓詩仙官敕六丁雷電下取將注道書陽官六甲隂官六丁六丁者六甲中丁神也後漢書梁節王傳能使六丁注六丁謂六甲中丁神也若甲子旬中則丁卯為神甲寅旬中則丁巳為神之類也老君六甲圖云丁卯神司馬卿丁丑神趙子壬丁亥神張文通丁酉神臧文公丁未神石叔通丁巳神崔明卿淮南子若虎豹之有牙爪飛鳥之有六翮韓詩外傳鴻鵠一舉千里所恃者六翮爾曽子固詩鴻鵠舉千里鸞鳯翔九霄得賢之稱通國以懌恭惟某人箕裘家學圭璧鄉評讀百篇科斗之文夙研奧義孔安國尚書序先君孔子討論墳典斷自唐虞以下迄于周舉其宏綱撮其機要典謨訓誥誓命之文凡百篇及秦始皇焚書坑儒我先人用藏其書于家屋壁至魯共王好治宫室壞孔子舊宅以廣其居得先人所藏虞夏商周之書皆科斗文字及重闈慈烏之哺遂擢巍科春秋元命苞飛翔羽翮為陽陽飛仁故烏反哺杜詩林烏反哺聲某人夙堅雅操獨抱遺經韓詩獨抱遺經究終始瀘水七擒轉蓬不嫌於地逺瀘水在瀘州一名復江源自岷山漢晉春秋諸葛武侯在南中所在戰捷聞孟獲為夷漢所服募生致之既得縱使更戰七縱七擒杜詩有喜留攀桂無勞問轉蓬又生涯獨轉蓬山谷詩一身轉孤蓬又年光如轉蓬說文蓬蒿也陸佃云草之不理者葉散生遇風輒拔而旋古者觀轉蓬為輪東觀漢紀栗駭蓬轉因遇際㑹沅江九肋擢桂遂破於天荒托言盧肇赴舉至京師先逹或問所從來曰某袁民也或曰袁州出舉人耶答曰袁州出舉人亦猶沅江出鱉甲九肋者希㑹昌三年肇狀元及第杜詩禮闈曽擢桂孟浩然詩桂枝如已擢早逐鴈南歸楊誠齊詩惟君有子又擢桂北夢瑣言荆州衣冠藪澤每嵗解送舉人多不成名號曰天荒解劉蛻舍人以荆解及第號為破天荒托言時崔魏公作鎮以破天荒錢七十萬資蛻蛻謝書略曰五十年來自是人廢一千里外豈曰天荒東坡詩滄海何曽斷地脉白袍端合破天荒諒加強學待問之功法言君子强學而力行學記善待問者如撞鍾叩之以小者則小鳴叩之以大者則大鳴儒行夙夜强學以待問式究正主庇民之藴禮記下之事上也雖有庇民之大德不敢有君民之心舊唐書太宗紀贊以房杜之智不踰乎丘軻遂能尊主庇民者遭時也東坡詩尊主庇民君有道樂天知命我無憂某誤蒙渙號濫主坤文蜀為坤維言主其文衡渙坤卦名潁人稱之曰門生既聞耳矣東坡祭歐陽文忠公夫人文蒼顔白髮復見潁人潁人思公曰此門生雖無以報不辱其門漢書食貨志嵗惡不入請賣爵子既聞耳矣如淳曰聞于天子之耳仲舒褎然為舉首尚拭目焉見前占謝惟勤何劭傳諸方貢獻帝輒賜之而觀其占謝焉謝皓傳詣齊髙帝自占謝言辭清麗客儀端雅左右為之傾目敷陳罔既回嘉定王正奏庚仲嘉定別見奏賦蜀都司馬相如傳相如既奏大人賦登名漢殿西望太白固疑有沉冥之珍李詩西當太白有鳥道東坡詩西望太白橫岷峨法言蜀莊沉冥詳見前東越玉津乃今得暐曄之秀玉津縣在今嘉定州西北三十里隋大業間置以江有璧玉故名屬嘉州宋初省入􅛳為縣玉津在眉州城東四里陸務觀詩玻瓈江上送殘春疊鼓催帆過玉津左思蜀都賦西踰金湜東越玉津蔚若相如皭如君平王褒暐曄而秀發揚雄含章而挺生公言甚愜私謝何厪厪渠斤切說文勞也通作勤揚雄賦其厪至矣師古曰古勤字恭惟某人岷峨之英江漢以濯學皆齊魯箕裘殆張叔之家文翁傳選郡縣小吏開敏有材者張叔等十餘人親自飭厲遣詣京師受業博士數嵗蜀生皆成就還歸文翁以為右職又修起學宫於成都市中招下縣子弟以為學官弟子繇是大化蜀地學於京師者比齊魯焉文麗卿雲鼓吹有平子之作廣絶交論卿雲黼黻河漢後漢書張衡字平子南陽西鄂人少善屬文擬班固兩都作二京賦精思傅㑹十年乃成世說左思作三都賦十年乃成孫興公云三都二京五經鼓吹嘉魚固出於丙穴蜀都賦嘉魚出于丙穴良木撰於褎谷水經注裦水東南得丙水泉上承丙穴穴出嘉魚常以三月出十月入地穴口廣五六尺去平地七八尺泉懸注魚自穴下透入水穴口向丙故曰丙穴下注褎水又柏枝山下有丙穴穴方數丈中嘉魚常以春末遊渚冬初入穴抑褎漢丙穴之類也任豫益州記嘉魚生丙穴蜀人謂之拙魚從石孔隨泉出大者五六尺一統志雅州城南有丙穴産嘉魚味醎而美杜詩魚知丙穴由來美宋陸佃埤雅曰嘉魚鯉質鱘鱗肌肉甚美食乳泉出于丙穴先儒言丙穴在漢中沔南縣北穴口向丙故曰丙穴舊言尾象篆文丙字故曰丙穴蓋爾雅魚枕謂之丁魚腸謂之乙魚尾謂之丙則魚尾象丙豈特嘉魚而已顧兔迄變於卯年天問夜光何德死而又育厥利維何顧兔在腹桞詩毫末應傳顧兔靈王充論衡卯兔也酉陽雜爼石旻有奇術隨錢徽尚書至湖州嘗求兔湯餅曰可留兔皮聊志一事詰之曰欲與諸君共記卯年也鼓三級以先登山谷詩三級定知魚尾進一鳴已作鴈行連左傳潁考叔取鄭伯之旗蝥弧以先登孟浩然詩髙帝徵學問虛薄濫先登及雙親之未老古詩一舉成名日雙親未老時龍墀之對三千字更幸勉之見前犍為之磬十六枚自此升矣漢書禮樂志犍為郡於水濵得古磬十六枚議者以為譱祥犍為縣在今嘉定州東坡答范端明啓得商頌十二篇于周太師雖賢者之事也獲古磬十六枚于犍為郡豈偶然而已哉楊震傳先生自此升矣某幾迷五色東坡詩過目還迷日五色幸放一頭東坡詩尚欲放子出一頭自注云嘉祐初軾與子由寓興國浴堂美叔忽見訪云從歐陽公遊久矣公令我來與子定交謂子必名世老夫須放他出一頭地歐陽公與梅聖俞書云讀蘇軾書不覺汗出快哉快哉老夫當避此人放出一頭地也吟叨蝨濕薪之詩何幸快風塵之洗山谷禮部貢院詩儀鸞供帳叨蝨行翰林濕薪爆竹聲風簾官燭淚從橫木穿石槃未遽透坐窗不遨令人瘦貧馬百藖逄一豆眼明見此玉花􅍡徑思著鞭隨詩翁城西野桃尋小紅又題伯時頓塵馬詩忽看髙馬頓風塵亦思歸家洗袍袴傳走馬看花之句願亟承天地之寬孟郊詩春風得意馬蹄疾一日看遍長安花又出門即有礙誰云天地寬回辛正奏守謙張正奏東寅摛藻奏名文選飛辨摛藻華繁玉振又幽思絢道德摛藻掞天庭集英趣對宋集英殿舊曰元德亦曰廣政開寶二年改大明淳化元年改含光祥符八年改㑹慶明道元年改元和尋改今名春秋誕聖節錫宴此殿熙寧以後親䇿進士于此殿熙寧三年三月八日上御集英殿試進士毛穎封於卯地開蟾蜍八月之祥韓文毛穎傳毛穎者中山人也其先明視佐禹治東方土飬萬物有功因封於卯地死為十二神明視八世孫䨲世傳當殷時居中山得神仙之術能匿光使物竊姮娥騎蟾蜍入月其後代遂隱不仕云五經通義月中有兔與蟾蜍何兔隂也蟾蜍陽也而與兔並明隂係陽也淮南子日中有踆烏月有蟾蜍又羿請不死之藥于西王母姮娥竊之奔月宫姮娥羿妻也服藥得仙奔入月中兔月精張衡靈憲姮娥奔月是為蟾蜍雲夢吞於子虛展駟馬題橋之志子虛賦吞若雲夢者八九于胸中曽不蒂芥華陽國志司馬相如初入長安題市門曰不乘赤馬駟車不過汝下也其郫西上有永平橋于是江衆多作橋故蜀立里多以橋為名恭惟某人玉津育秀見上條磬水蜚聲漢水在犍為縣東北一百八十里漢成帝時得古磬十六枚于水濵故亦名寶磬川辛云周太史之雲仍宜針王闕左傳昔辛甲之為周太史也命百官官針玉闕辛甲周武王太史使百官各以所居官事為針以針王之闕失爾雅晜孫之子為仍孫仍孫之子為雲孫魏佐治之風烈盍引帝裾魏志辛毗字佐治文帝時為治中帝欲徙冀州十萬户實河南毗諫帝不答起入內毗隨引其裾帝奮衣不還良久出曰佐治卿持我何太急耶杜詩牽裾驚魏帝張云遙遙張叔之家學固同于齊魯見上條巖巖孟陽之裔銘逺綴于岷嶓張載傳載字孟陽安平人父收蜀郡太守載博學有文章至蜀省父道經劔閣以蜀人恃險好亂因著銘以作戒其略云巖巖梁山積石峩峩逺屬荆衡近綴岷嶓云云遂掃三峽千人之軍杜詩詞源倒流三峽水筆陳獨掃千人軍上輔五星日月之聚見前條九萬里風斯下已開鵬海之程三千字日未斜無負龍墀之問並見前某朅來石郭朅邱傑切韻㑹發語辭吕氏春秋膠鬲見武王于鮪水曰西伯朅來無欺我也武王曰不子欺將伐殷也膠鬲曰朅至武王曰將以甲子日至注朅何也然則朅之為言盍也非是發語之辭互見前蜀都賦金城石郭兼市中區獲讀阿房說古戰場未免眼迷于五色並見前吟髙軒過尚幾手抉于天章托言李賀年七嵗以長短歌名動京師時韓愈與皇甫湜覽賀所業奇之而未知其人因相謂曰若是古人吾曹不知若是今人豈有不知之理㑹有以其父瑨肅行止言者二公因連騎造門請其子既而總角荷衣而出二公不信因靣試一篇賀欣然操觚染翰旁若無人目曰髙軒過二公大驚遂以所乘馬命聫鑣而還所居幾几利切通作覬希望也左傳庸可幾乎郊杞志幾遇其真東坡詩手抉雲漢分天章回類元唐正奏應龍學者發凡言例多違舊章杜氏左傳序其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而修之以成一經之通體又周德既衰官失其守上之人不能使春秋昭明赴告䇿書諸所記注多違舊章大夫精心致思褎為舉首董仲舒傳今子大夫褎然為舉首朕甚嘉之子大夫其精心致思朕垂聽而問焉幸公言之惟允何私謝之敢當恭惟某人大江炳靈蜀都賦江漢炳靈世載其英通泉濆薄通泉縣𨽻潼川府楊天惠通泉縣連鼇閣記梓于西南為大都通泉為梓名邑唐詩紀事郭元振神龍間尉通泉任俠使氣不事小節武后召欲詰問既與語奇之索所為文章上寶劔篇后覽之嘉歎杜子美過代公宅詩豪傑初未遇其跡或脫略代公尉通泉放意何自若及夫登衮冕直氣森濆薄濆薄水相激蕩也左思吳都賦濆薄沸騰郭璞江賦濆薄相陶能賦如勒夙擅詞章史記屈原傳屈原既死之後楚有宋玉唐勒景差之徒皆好詞而以賦見稱學易于都更深經術前漢律厯志武帝造太初厯乃選治厯鄧平及長樂司馬可酒泉候宜君侍郎尊及與民間治厯者凡二十餘人方士唐都巴郡落下閎與焉史記太史公自叙太史公學天官于唐都受易于楊何習道論於黃子師古曰唐都即律厯志所云方士唐都者今云學易于都未詳䆒遺經于獨抱見前㑹大義于創通杜氏左傳序劉子駿創通大義疏云初左氏傳多古字古言學者傳訓詁而已及歆治左氏引傳文以解經經傳相發明由是章句義理備焉是其創通大義也文成數萬指數千首先鳴於雞口太史公自序春秋文成數萬其指數千萬物之散聚皆在春秋張晏曰春秋萬八千字當言减而云成字誤也眉山李氏古經後序云今細數之更缺一千四百二十八字數最易見尚爾錯誤况聖人筆削之㫖乎左傳州綽曰平隂之役先二子鳴蘇秦傳寧為雞口無為牛後詳見前臣書第一無第二今徑躡於龍頭南史王僧䖍傳髙帝素善書篤好不已與僧䖍賭書畢謂曰誰為第一對曰臣書第一陛下亦第一帝笑曰卿可謂善自為謀或云帝問我書何如卿答曰臣正書第一草書第二陛下草書第二而正書第三臣無第三陛下無第一帝大笑曰卿善為辭然天下有道丘不與易也惟功名留久逺之看蔡君謨詩世間萬事俱塵土留取功名久逺看詳別見即溫飽非平生之志東軒筆録王沂公青州發解南省廷試皆為首冠中山劉子儀為翰林學士戲語之曰狀元試三場一生喫著不盡公正色答曰曽平生之志不在溫飽察牛堪之意既不違俗而取名韓文送牛堪序吾未聞有登第於有司而進謝于其門者無乃人事之未思或者不能舉其禮乎若牛堪者思慮足以及之材質足以行之而又不聞其往者其將何以哉違衆而求識立奇而取名非堪心之所存也知顧郎之恩更期蓄力而秉志柳文與顧十郎書凡號門生而不知恩之所自者非人也知恩則烏乎辨大抵當隆赫柄用而蜂附蟻合一旦勢異則電滅颷逝不復為門下用矣然則當其時而確固自守蓄力秉志不為嚮者之態則于勢之異也固有望焉某初微風鑒袁宏傳風鑒散朗或搜或引王導傳少有風鑒識量清逺陸機傳贊風鑒澄爽神情俊邁濫佐星堂梅聖俞詩五星明處夜堂深青袍白紵之糊名已多迷於方叔東坡送李方叔下第詩平生漫說古戰場過眼終迷日五色青袍白紵五千人知子無怨亦無德唐武后以吏部選人多不實乃令試日自糊其名暗考以定等第張說永昌中武后策賢良方正詔吏部尚書李景諶糊名校覆說所對第一后署乙等紫磨真金之定價願無負於長公林邑記上金為紫磨金又曰揚邁金詳見前回郭正奏佺詳啓意郭蓋昔遺而今取者故起聫項聫云云闕郭公之疑昔常恐春秋之罪我公羊傳莊公二十四年赤歸于曹郭公傳赤者何曹無赤者蓋郭公也郭公者何失地之君也杜氏曰郭公無傳蓋經闕誤也鄭樵曰春秋疑則闕之如郭公之闕其人之類一說春秋書夏五郭公人皆以為闕文夏五固無可疑至郭公胡氏以為郭亡蓋因齊威有郭何故亡之問父老有善善惡惡之對然以公為亡疑其未然按春秋書有蜮有蜚謂昔無而今有至螽之一字凡六書而無他說以此為例恐郭公亦是一物書之以記異耳本草江東呼布榖為郭公豈此物耶愚謂信如此說則所為赤歸于曹又將何如解耶當從闕文為是道齊威之事今始論秀造而告王愧豫五色之眼迷並見前遲公十年之身到宋張唐卿進士第一人登科期集于興國寺題詩句于壁曰一舉首登龍虎榜十年身到鳳凰池有人續云君看姚曄并梁固不得朝官未可知後果終于京官恭惟某人岷峨世載蜀都賦世載其英江漢淵回陸機漢髙祖功臣贊大略淵回元功響效墊林宗之巾夫子步亦夫子後漢書郭泰字林宗太原介休人與李膺相友善名震京師嘗于陳梁間行遇雨巾一角墊時人乃故折巾一角以為林宗巾其見慕皆如此林宗別傳林宗遇雨故其巾一角霑而墊二國名士著巾皆折其角云此林宗巾其見儀則如此莊子夫子步亦步夫子趍亦趍老汾陽之考中書乃不中書新唐書郭子儀傳以身為天下安危者二十年校中書令考二十四毛穎傳上嘻笑曰中書君老而秃不任吾用吾嘗謂中書君今不中書耶信大器之晚成老子大方無隅大器晚成大音希聲大象無形嫌修門之徑入宋玉招魂魂兮來歸入修門些韓文復志賦君之門不可徑而入兮遂從試于有司秋風退鷁坐觀巴火之九鑽左傳六鷁退飛過宋都風也注鷁水鳥髙飛遇風而退正義曰鳥飛不能自退傳言風也是鳥髙飛遇風而退却也杜詩九鑽巴噀火神仙傳欒巴為尚書正旦㑹得酒西南潄云成都市失火潄酒作雨春浪化龍始透禹門之三級林登博物志龍門之下每嵗季春有黃鯉二魚自海及諸川爭來赴之一嵗中登龍門者不過七十一初登龍門即有風雨隨之天人自後燒其尾乃化為龍矣願培鵬背莊子風之積也不厚則其負大翼也無力故九萬里則風斯在下矣而後乃今培風背負青天而莫之天閼者而後乃今將圖南徑跨鼇頭國老間談宋景文公祈守益州久次不見用以翰林學士承㫖召寄梁丞相詩云粉署重來憶舊逰蟠桃開盡海山秋定知不是神仙骨上到鼇峯最上頭某濫佐星堂安知風鍳並見前束之髙閣知無用公榖左氏之文韓詩春秋五傳束髙閣晉杜乂殷洪並才名冠世庾翼弗之重曰此輩宜束之髙閣造在大庭尚聳聽朝董公孫之䇿武帝紀詔諸賢良明于古今王事之體受策發問咸以書對於是董仲舒公孫宏等出焉回曹正奏策名上第趣對中宸司徒論秀而升諸幾迷五色公等何見之晚也亟放一頭並見前幸愜公言何勤私謝恭惟某人振鐸昭穆左傳曹叔振鐸文之昭也又郜雍曹滕文之昭也子建波瀾杜詩文章曹植波瀾濶列仙甚臞聞素甘於蓼藿司馬相如傳列仙之儒居山澤間形容甚􅋯蓼朗鳥切說文辛菜薔􅒶也于調和有用禮記秋用蓼詩豫又集于蓼注辛苦之菜故以為多難之喻藿忽郭切爾雅注今鹿豆也本草云味苦葉似豌豆人取以為菜離騷云蓼蟲不能從乎葵藿則葵藿甘而蓼苦故也良工獨苦善致飬於棘薪杜詩更覺良工心獨苦詩凱風自南吹彼棘薪母氏聖善我無令人注南風謂之凱風樂夏之長飬棘難長飬者風吹難飬之棘以成就猶母長飬七子以成人此斷章兹遂一鳴以驚人史記此鳥不鳴則已一鳴驚人式副三遷之教子列女傳孟軻母其舍近墓孟子少嬉遊于墓間為其事母曰此非所以處吾子也乃去舍市傍其嬉戲乃賈人衒賣之事又曰此非所以處吾子也復徙學宫之傍其嬉戲乃設爼豆楫遜進退母曰此真可以處吾子遂居焉晉左九嬪孟軻母贊曰鄒母善導三徙成教鄰止庠序爼豆是效曹交假館所謂求之有餘師仲舒造庭佇見褎然為舉首並見前某朅來玉壘玉壘山在今灌縣西北二十九里湔水所出左思蜀都賦包玉壘以為宇郭璞江賦玉壘作東別之標杜詩玉壘浮雲變古今得讀阿房青衫當綵衣至羡封人之有母左傳穎考叔為穎谷封人有獻于公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食未嘗君之羮請以遺之公曰爾有母遺繄我獨無丹墀攄素藴更觀讜論之告君回曹正奏三年滿戍鷁回首以東歸左傳正義廣志云鷁古退飛者今以其首為船頭再作州蟇朵頥而四顧蟇頥山在眉州城東七里自象耳山連峯壁立西瞰玻璃江五十餘里至此磅礴蹲踞形類蟇頥故名易觀我朵頥詩乃眷西顧互見前有勤賀語祗發愧情恭惟某人春藻吐葩曹植文章序質素也如秋蓬摛藻也如春葩韓詩天葩吐奇芬秋竿秉節白樂天詩無波古井水有節秋竹竿一第溷子聊賞戀闕之丹心唐書元結舉進士禮部侍郎楊浚見其文歎曰一第慁子耳有司得子是賴韓詩潮陽南去倍長沙戀闕那堪又憶家三釡及親足慰在堂之白髮莊子曽子曰吾及親仕三釜而心樂猥承妙製見遺陳人某藏弆為榮並見前已知所賀左傳不知所賀踟蹰五馬良愧出谷以遷喬見前縹眇孤鴻但願送江而入海東坡卜算子缺月掛踈桐漏斷人初靜時見幽人獨往來縹眇孤鴻影逰金山寺詩我家江水初發源宦游直送江入海回王正奏正寅一第直慁子耳安用謝為見前幾日來見我乎更勤言贈為之三復南史何遜傳沈約嘗謂遜曰吾每讀卿詩一日三復猶不能已其為名流所稱如此佩此一謙恭惟某人世載其英見前學優則仕紫電將軍之庫尚有典刑三國典略蕭淵明與王僧辨書云霜戈電㦸無非武庫之兵龍甲犀渠皆是雲臺之仗王勃滕王閣序紫電清霜王將軍之武庫楊升菴藝林伐山云王勃滕王閣序正用三國典略事以十四嵗之童子胸中萬卷豈非間世奇才近時胡元瑞筆叢譏之曰勃文之工不在此事正緣四字稍僻楊偶得之便自手舞足蹈耳今按四字皆指劒言崔豹古今注吳大帝有寶劔六一曰白虹二曰紫電三曰辟邪四曰流星五曰青冥六曰百里唐中宗授張錫尚書制白虹良寶紫電奇鋒陶宏景刀劔録梁武帝普通中命宏景造神劔十三口一曰凝霜淮南子寶劔之色如秋霜魏文帝歌辭歐氏寶劔何為低昻白如積雪利若秋霜吳筠寶劔詩鍔邊霜凛凛匣上風凄凄四字似亦非僻紅帶宣義之家豈其苖裔東坡詩集慶源宣義王丈人以纍舉得官為洪雅主簿雅州户掾遇吏如家人人安樂之既謝事居眉之青神瑞草橋放懷自得有書來求紅帶既以遺之且作詩為戲黃魯直學士秦少游賢良各賦一兮為老人光華楚辭帝髙陽之苖裔兮史記項羽本紀舜目蓋重瞳子又聞項羽亦重瞳子豈其苖裔耶霍光傳贊昔霍叔封于晉晉即河東光豈其苖裔乎一奏河東之賦揚雄傳雄以為臨川羡魚不如歸而結網還上河東賦以勸載空冀北之羣見前某偶佐文衡栁文觀文章宜若縣衡然增之銖兩則俯反是則仰無可私者裴皞詩宦塗最重是文衡獲觀筆陳杜詩筆陳獨掃千人軍東坡啓射䇿玉堂方觀筆陳校書天祿遂秀儒林於我無怨亦無德但吟坡老之詩東坡詩青袍白紵五千人知子無怨亦無德有司以公不以情愧乏昌黎之序韓文送牛堪序豈有司之待之也以公不以情舉者之望於有司也亦將然乎回張正奏申之策名外省趣對中宸知我者春秋罪我者春秋幸已酬俯拾之芥並見前先進於禮樂後進於禮樂安知非居上之薪汲黯傳陛下用人如積薪後來者居上恭惟某人家傳一編張良傳出一編書曰讀是則為王者師東坡詩圯上從來一編足胸藏三篋張安世傳上行幸河東嘗亡書三篋詔問莫能知惟安世讀之具知其事後購求得書以相校無所遺失上奇其才擢為尚書令遺經獨抱精于措游夏之辭史記孔子世家孔子在位聽訟文辭有可與人共者弗獨有也至於為春秋筆則筆削則削子夏之徒不能贊一辭典論昔尼父之文辭與人通流至于制春秋遊夏之徒不能措一字餘見前大義創通較若道威文之事史記曹相國世家顜若畫一注顜音較言法明直若畫一也餘見前迄膺衆選進以言揚文王世子或以德進或以事舉或以言揚某偶綴文闈獲觀筆陳見前辨棟梁于七年之後幸免遺材淮南子藜藿之生懦懦然日加數寸不可以為櫨棟楩梓豫章之生也七年而後知故可以為棺舟嵇康飬生論夫至物微妙可以理知難以目識譬猶豫章生七年然後可覺耳廣志云豫章生七年外使辨注凡木似豫章故待七年當分别器根柢于萬乘之前更觀拔萃鄒陽傳蟠木根柢輪困離奇而為萬乘器者以左右先為之容也回特奏名李學正鳴鳳宋制特奏名第一等二名附前五甲餘並登仕郎第二等京府助教第三等上州文學第四等下州文學並候郊恩出官第五等諸州助教聞見録至和間富公當國立一舉三十年推恩之法蓋公與河南進士段希元魏升平同場屋相善公作相不欲私之故為天下之制燕翼貽謀録開寶三年三月詔曰貢士司馬甫等一百六人困頓風塵潦倒場屋非有特恩終成遐棄宜各賜本科出身此特奏名之所由始也自是士之潦倒不第者皆覬覦一官老死不止至景德三年因賜李迪等進士賜特奏名五舉以上本科六十四人三傳十八人同學䆒二十三人三禮四十三人年老授將作監主簿二十一人此特奏名之所由立也至景祐元年正月詔進士諸科十取其二進士三經殿試則又以人多而裁抑之也况進士入官十倍舊數多至二十倍而特奏之多自是亦如之英雄豪傑皆汩沒消磨其中而不自覺故亂不起于中國而起于外裔豈非御天下之要術歟宋史選舉志元祐初知貢舉蘇軾孔文仲言特奏名約已及四百五十人又許例外遞減一舉則當復增數百此曹垂老無他望布在州縣惟務黷貨以為歸計前後恩科命官幾千人矣何有一人能自奮厲有聞于時以此知其無益有損宋趙彥衛雲麓漫抄云國朝進士纍科不第者限年許赴特奏名號為恩科即漢下第者聽為太子舍人唐制補官為大理評事著作佐郎郎中之類當時以為官稱不理事不然郎中舍人何其冗也射策登名拜恩諾仕公等何見晚也而迷其邦見前論定然後官之其有所試禮記論定然後官之論官然後爵之恭惟某人負材瓌特瓌或作瑰說文玫瑰徐曰火齊珠赤色挺立曰特儒行特立獨行蓄學奫深吳都賦泓澄奫潫奫回復之貌太白有文章之光宜早登于唐殿韓詩李杜文章在光熖萬丈長李白傳天寶中賀知章言之召見金鑾殿詳見前仲元豈華藻之力顧久滯於蜀都法言或問子蜀人也請人曰有李仲元者人也如是奚名之不彰也曰無仲尼則西山之餓夫與東國之絀臣惡乎聞曰王陽貢禹遇仲尼乎曰明星皓皓華藻之力也歟有來桑榆之收不孤芹藻之采見前富貴必從勤苦得少酬鐵硯之勞杜詩富貴必從勤苦得男兒須讀五車書五代史桑維翰傳初舉進士有司惡其姓以為桑喪同音人有勸其不必舉進士可以從他求仕者維翰慨然乃著日出扶桑賦以見志又鑄鐵硯以示人曰硯弊則改而他仕卒以進士及第功名亦在老大時行對蒲輪之召杜詩男兒功名遂亦在老大時某未皇走慶猥沐貽箋春草隨袍等是天公之雨露庾信哀江南賦青袍如草白馬如練杜詩汀草亂青袍又水花笑白首春草隨青袍秋竿有節相期嵗晚之氷霜白樂天詩無波古井水有節秋竹竿回王特奏相悟顯膺恩紀蜀志先主至京見權綢繆恩紀二主妃子傳人倫之始恩紀之隆莫始于此矣晉書陳敏傳公胄早交恩紀特隆刁協傳素無恩紀募從者皆委之南史蒯恩傳甚有恩紀陳書江總傳夙荷昭晉恩紀契濶姚察傳東朝攀附恩紀繆加孔融傳文舉既非舊好鴻豫亦無恩紀江淹雜體詩儲后降嘉命恩紀被微身榮簉儒科簉初救切齊飛順疾也東隅而收桑榆雖負心期之壯南齊書豫章王傳居今之地非心期所及南史向栁字元季立身方雅與顔峻友善及峻貴桞猶以素情自許不推先之范璩戒栁曰名位不同禮有異數卿何得作曩時意耶桞曰我與士遜心期久矣豈可一旦以勢利處之任昉詩中道遇心期栁詩誰為後來者當與此心期王荆公詩心期自與衆人殊山谷詩少日心期轉謬悠又心期曉月秋霜又心期誠不淺陳後山詩得失妍蚩只自如略容千載有心期餘見前北山之有杻楰足為眉夀之光杻音紐爾雅杻檍似棣楰音庾說文鼠梓爾雅注楸屬詩南山有栲北山有杻樂只君子遐不眉夀樂只君子德音是茂南山有枸北山有楰樂只君子遐不黃耉樂只君子保艾爾後注眉夀秀眉也亦夀徴恭惟某人波瀾老成杜詩毫髮無遺恨波瀾獨老成魁壘耆艾鮑宣傳骨鯁白首耆艾魁壘之士服䖍曰魁壘壯貌也師古曰魁音口賄反壘音磊如尊乃勇合為叱馭之忠臣王尊傳天下皆言王勇顧但負勢安能勇如尊乃勇耳餘見前薦褒有材宜即運籌於聖主王褒傳益州刺史奏褒有軼材又運籌合上意諫諍即見聽餘見前何據鞍之矍鑠見前如奮褎以低昂楊惲傳拂衣而起奮褎低昻諒無恨青衫之枯東坡詩青衫半作霜葉枯行即膺紅帶之寵見前回王正奏條某未遑贊慶周禮大行人慶賀以贊諸侯之喜注贊助也猥沐貽箋拔薤而規龎參願聞忠告褁蒲而迎枚乘尚見詔除並見前回特奏侯新恩曽榮偕計該恩東坡與程正輔書伏讀赦書有責降官量移指揮自惟無狀恐可該此恩命按宋人謂特奏名為該恩免解舉人登名筮仕左傳畢萬筮仕于晉注初官也半世就選舉良欣叔起之未衰昌黎贈侯喜詩我友侯生字叔起呼我持竿釣溫水又半世遑遑就舉選一名始得紅顔衰人間事勢豈不見徒自辛苦終何為朝廷少舊臣更喜君房之肯出後漢書侯霸字君房河南密人也建武四年光武檄霸與車駕㑹夀春拜尚書令時無故典朝廷又少舊臣霸明習故事收録遺文條奏當世善政有益于時者皆施行之每春下寬大之詔奉四時之令皆霸所建也伏惟某人抱材膚碩蓄學宏深風翮大鵬本有埀雲之翼並見前天間老驥不爭暮日之塗周禮天子有十二間馬六種魏武樂府老驥伏櫪志在千里史記伍子胥傳吾日暮塗逺故倒行而逆施之器固大於晚成召亟膺於暮奏並見前魏有隱士實由年德之髙信陵君傳魏有隱士曰侯嬴年七十家貧為大梁夷門監者漢迎太公亦藉老成之力髙帝紀漢使陸賈說羽請太公羽弗聽漢復使侯公說羽羽乃與漢約中分天下歸太公吕后乃封侯公為平國君某未遑謁賀猥沐貽箋愧無乖崖翁屈留長者東坡送潞都曹詩序乖崖公在蜀有録事參軍老病廢事公責之曰胡不歸明日參軍求去且以詩留別其略曰秋光都似宦情薄山色不如歸意濃公驚謝之曰吾過矣同寮有詩人而吾不知因留而慰荐之近識峩眉老尚問政焉杜詩近識峨眉老知余懶是真科舉補中附謝得解丁卯按丁卯為寧宗開禧三年仰破屋而抱遺經嘖㑹心之無幾昌黎寄盧同詩玉川先生洛城裏破屋數間而已矣春秋三傳束髙閣猶抱遺經究終始東坡詩破屋那愁仰見天嘖音責嘖嘖鳴也又爭言貌左傳嘖有煩言世說簡文入華林園顧左右曰㑹心處不必在逺褁粗繒而隨舉子嘻免俗之未能東坡詩粗繒大布裹生涯腹有詩書氣自華厭伴老儒烹瓠葉强隨舉子踏槐花阮咸傳未能免俗聊復爾耳詳見前邂逅吾味之偶同詩邂逅相遇左傳譬諸草木吾臭味也文選及爾臭味異苔同岑摸索此君之小異說林許敬宗性輕傲見人多忘之或謂其不聰曰卿自難記若遇何劉沈謝暗中摹索著亦識孟嘉傳褚褒為豫章太守正旦朝庾亮褒有器識亮大㑹州府人士嘉坐次甚逺褒問亮聞江州有孟嘉其人何在亮曰在坐卿但自覓褒歷觀指嘉謂亮曰此君小異將無是乎詳別見欲棄雞肋九州春秋夏侯淵為黃忠所殺曹操臨漢中至陽平欲攻劉元德而不得進欲守又難為功乃出令曰雞肋官屬不知所謂楊修便自嚴裝人驚問修何以知之修曰雞肋棄之可惜食之無所得以比漢中知公欲還也互見前復美羊腔腔音羌說文肉空也亦作羫韓詩雌聲吐欵段酒壺綴羊腔山谷詩蟹胥與竹萌乃不美羊羫又野人井芹味敢饋厭羊羫人驚喝盧得雉之危晉書劉毅于東府聚摴蒱大擲一判應至數百萬餘人並黑犢以還唯劉裕及毅在後毅次擲得雉大喜褰衣繞牀呌謂同坐曰非不能盧不事此耳裕惡之因桵五木久之曰老兄試為卿答既而四子俱黑其一子轉躍未定裕厲聲喝之即成盧焉馬融摴蒱賦見利電發紛綸滂沸精誠一呌十盧九雉宋張荃翁貴耳集云市井呼盧盧四也博徒索采曰四紅赤緋皆一骰也俗說唐明皇與太真妃喝采若成盧即賜緋之義楚辭招魂成梟而牢牢即盧也杜詩統牀大呼呌五白袒跣不肯成梟盧注引劉毅事唐李翱撰五木經元革注云雉為二梟為六盧為五我抱志目中眉之愧左傳顔息射人中眉退曰吾無勇志其目也常謂選舉所以籠豪傑安知亦足銷豪傑之心舊唐書今之舉人有乖事實鄉議决小人之筆行修無長者之論策第喧競於州府祈恩不勝於拜伏或明經才出試遣搜敡驅馳府寺之前出入王公之第上啓陳詩唯希咳唾之澤摩頂至踵冀荷提携之恩故俗號舉人皆稱覓舉覓為有求之稱未是人知之詞察其行而度其材則人品於茲見矣江陵項氏曰風俗之弊至唐極矣王公大人巍然于上以先達自居不復求士天下之士什什伍伍戴破帽騎蹇驢未到門首百步輒下馬奉弊刺再拜以謁于典客者投其所為之文名之曰求知巳如是而不問則再如前所為者名之曰溫劵如是而又不問則有執贄於馬前自贊曰某人上謁者嗟乎風俗之弊至此極矣場屋謂之興賢能或者疑為老賢能之術周禮三年則大比考其德行道藝而興賢者能者國史補進士科始于隋大業中盛于貞觀永徽之際縉紳雖位極人臣不由進士者終不為美其負倜儻之才變通之術蘇張之辨說荆聶之膽氣仲由之武勇子房之籌畫𢎞羊之書算方朔之詼諧咸以是而晦之修身慎行雖處子之不若其有老死於場屋者亦無所恨故有詩曰太宗皇帝真長策賺得英雄盡白頭士任重而道逺辰去速而來遲法言辰乎辰曷來之遲去之速也君子競之鄧髙密願效尺寸之心笑人寂寂鄧禹傳禹對光武曰但願明公威德加于四海禹得效尺寸垂功名于竹帛耳天下平定封髙密侯南齊書王融字元長少而神明警惠自恃人地三十內望為公輔直中書省夜歎曰為爾寂寂鄧禹笑人行逄大􅟘開喧湫不得進又歎曰車前無八騶卒何得稱為丈夫桓溫傳溫窺覦非望或卧對親寮曰為爾寂寂將為文景所笑禇彥回少過三十之念便已囂囂南齊書褚淵字彥回河南陽翟人南史彥回幼有清譽王訓為侍中武帝問何敬容曰褚彥回年幾為宰相敬容曰少過三十帝曰今之王訓無謝彥回蓋欲乘感㑹之風雲後漢書二十八將傳贊咸能感㑹風雲奮其智勇豈堪送瀟灑之日月杜詩非無江海志瀟酒送日月生逢堯舜君不忍便永訣某至愚不肖王褒傳有至愚極陋之纍王制簡不肖以絀惡甚賤且貧每懷萬物皆塵土之思蔡君謨詩世間萬物皆塵土留取功名久逺看頗念吾道非曠野之物史記孔子世家詩云匪兕匪虎率彼曠野吾道非耶吾何為於此年當五嵗日記萬言列女辨通傳管仲妾倩云睪子生五嵗而佐禹劉沆字茂瀣五嵗時父撝于屏風抄古詩沆請教讀一遍便能諷誦房元齡幼聰敏五嵗能誦毛詩蘇頲年五嵗時裴談歎異之韓休蘇頲集序公神秀穎發自然生知五嵗便措意于文宋王元之五嵗能詩黃庭堅五嵗已誦五經北齊邢邵字子才十嵗能屬文聰明强記日誦萬餘言實希蹤楊文公之辭章宋五朝名臣言行録楊億字大年建州浦城人七嵗能屬文年十一太宗聞其名詔送闕下試詩賦授祕書省正字歷官翰林學士仁宗即位贈禮部尚書賜諡曰丈復妄意晏元獻之科目五朝名臣言行録晏殊字同叔撫州臨川人父本撫州手力節級公幼能為文李虛已知滁州一見奇之許妻以女因荐于楊大年大年以聞時年十三真宗靣試詩賦疑其宿搆明日再試文采愈美上大奇之授祕書省正字仁宗朝拜相諡元獻莫能送上杜詩唯待吹噓送上天安得熱中付甲子於泥塗左傳絳縣人或年長矣有與疑年使之年曰臣生之嵗五月甲子朔四百有四十五甲子矣趙孟問其縣大夫則其屬也召之而謝過焉曰使吾子辱在泥塗久矣武之罪也逐庚癸之饑渴左傳若登首山以呼庚癸則諾君門不可以徑入法當從試于有司韓文君之門不可徑而入兮遂從試于有司馮奉世傳反虜無慮三萬法當倍用六萬人山谷詩法當憔悴百僚底夜光屢失之暗投或是晚成之大器鄒陽傳明月之珠夜光之璧以暗投人於道老子大器晚成雖杜陵許身稷契之意誰肯信之杜詩杜陵有布衣老大意轉拙許身一何愚自比稷與契然草廬自比管樂之心恐不免耳蜀志諸葛亮躬耕隴畝好為梁父吟身長八尺每自比於管仲樂毅時人莫之許也唯博陵崔州平潁川徐庶謂為信然謝安傳安妻劉惔妹既見家門富貴而安獨靜退乃謂曰丈夫不如此也安掩鼻曰恐不免耳吟髙軒過羅胸謾詫于星芒李賀髙軒過東京才子文章巨公二十八宿羅心胸元精耿耿貫當中說古戰場過眼還迷于日色東坡詩平生漫說古戰場過眼還迷日五色詳見前五隨秋試例困冬烘見前剪翎觀百鳥之翔韓詩翦翎送籠中使看百鳥翔回首覺萬牛之重杜詩大厦如傾要梁棟萬牛回首邱山重無能辨璞蔡雍琴操卞和得玉獻楚懷王使樂正子占之言石王以為欺謾斬其一足子平王立和復獻之平王又以為欺斬其一足只合更刀莊子良庖嵗更刀割也族庖月更刀折也脫漢賦辭楚騷尚依依而未忍宋熙寧四年始罷詞賦取士凡十五年元祐元年詞賦與經義並行紹聖元年復罷詞賦凡三十五年至建炎紹興之間則以經義取士者凡五六十年其間兼用詩賦止十餘年耳觀魯史知周典幸歷歷之可明杜氏左傳序仲尼因魯史策書成文考其真僞而志其典禮上以遵周公之遺制下以明將來之法技癢為之應劭風俗通義髙漸離變易姓名為人傭保聞其堂上有客擊筑技癢不能無出言潘嶽射雉賦徒心煩而伎懩言有技不能自忍如膚癢欲搔也梁書劉孝綽傳古人不以委約而能不伎癢文苑庾肩吾傳又慙伎癢更同故態杜詩貫穿無遺恨薈蕞何伎癢宋景文詩伎癢新禽百種鳴山谷賦彼族庖之伎癢兮代大觚以嘗巧途窮甚矣魏氏春秋阮籍率意獨往不由徑路車跡所窮輒慟哭而反求田問舍已破除湖海之豪魏志陳登字元龍劉表與備共論天下人許汜曰元龍湖海之士豪氣不除備曰君有國士之名今天下大亂帝王失所望君憂國忘家有救世之意而君求田問舍言無可采是元龍所諱也應舉覓官又勒回山林之駕北山移文馳煙驛路勒移山庭請回俗士駕為君謝逋客餘見前或謂餘勇左傳齊髙固入晉師桀石以投人禽之而乘其車繫桑本焉以狥齊壘曰欲勇者賈余餘勇東坡詩筆陳賈餘勇猶足先登左傳穎考叔取鄭伯之旗蝥弧以先登周勃傳下下邑先登樊噲傳從沛公擊章邯軍濮陽攻城先登桞文戰藝之徒推為先登韓詩猶思脫儒冠棄死取先登互見前及工歌鹿鳴之三左傳工歌鹿鳴之三禮記宵雅肄三注習小雅之三謂鹿鳴四牡皇皇者華也韓詩州家舉進士選試謬所當相公朝席立工席歌鹿鳴乃夢踐飛翼之八陶侃傳夢生八翼飛而上天見天門九重已登其八唯一門不得入閽者以杖擊之因墜地折其左翼芳杜厚顔薜荔蒙恥願一洗之北山移文豈可使芳杜厚顏薜荔蒙恥碧嶺再辱丹崖重滓菉葹盈室荃蕙為茅由來久矣菉王芻也葹枲耳也蒼色上多刺好著人衣離騷薋菉葹以盈室兮判獨離而不服蘭芷變而不芳兮荃蕙化而為茅薛宣傳日至服以休息所繇來久翼奉傳所繇來久不改其本要之借汝腹中過耳東坡詩但見蒼石螭開口吐清井借汝腹中過何為眼耽耽又何出人跨下慙乎韓信傳淮隂少年侮信曰能死刺我不能出跨下於是信熟視俯出跨下鵬怒而飛莊子鵬之背不知其幾千里也怒而飛翼若垂天之雲鷙匿則擊白帖史鷙鳥之擊必先匿形太公六韜鷙鳥將擊卑飛斂翼猛獸將摶弭耳俯伏吳越春秋猛獸將擊必弭毛帖伏鷙鳥將摶必卑飛戢翼禽經鷺啄則絲弭鷹捕則角弭藏殺機也淮南子飛鳥之摰也俯其首猛獸之攫也匿其爪是亦細事韓文固哲人之細事無足多言老子多言數窮左傳賜不幸言而中是使賜多言也惟是吾皇頒詔舉賢之時韓詩吾皇紹祖烈天下再太平詔下諸郡國嵗貢鄉曲英實以今日多事得人為急裴晉公之解韋釋布正淮西盜起之時新唐書裴度字中立貞元初擢進士第淮西平策勳進金紫光祿大夫宏文館大學士上柱國晉國公公微時羈游洛中一日䇿蹇驢上天津橋時淮西不庭已數年矣二老人倚柱歎曰蔡州何時得平俄見晉公愕然而退有僕夫在後聞其語曰適憂蔡州未平須得此人為將僕遽告公公曰見我龍鍾故相戲耳韓魏公之發策决科乃天聖日升之始法言須以發䇿决科五朝名臣言行録天聖五年仁宗初臨軒試進士公年二十名在第二唱名第一甲方終太史奏日下五色雲見左右從官皆賀於殿上詩如日之升有益於國無競維人詩無競維人四方其訓之注言人君為國無彊乎維在得其賢人若得賢人則國家彊矣感人物之眇然王羲之帖蔡公遂委篤深可憂當今人物眇然而艱疾若此令人短氣山谷詩人物方眇然誰能委圭幣又馬當一曲孤煙人物於今眇然蔡光啓詩人物於今歎眇然孤墳宿草已生煙歎江濤之如此謝安傳嘗與孫綽等泛海風起浪湧諸人並懼安吟嘯自若舟人以安為悅猶去不止風轉急安徐曰如此將安歸耶宋朱新仲詩天氣未佳宜且住風濤如此亦安歸四郊多壘士之恥也禮記四郊多壘此卿大夫之辱也地廣大荒而不治此亦士之辱也萬里長城國有人乎宋書檀道濟傳道濟見收脫幘投地曰乃壞汝萬里之長城桞文萬里長城九重安枕唐詩天與三台座人當萬里城宜拔實才入充嵗貢禮記古者天子之制諸侯嵗獻貢士于天子韓詩嵗貢鄉曲英不應庸下亦在選中劉孝綽啓寵光曲被獨在選中伏遇某官持刑明允已清碧草之扉尚書惟明克允文選鞠茂草于圜扉畫諾從容復入紅蓮之幕兹獲聯於薦送何謬及于單微云云某敢不髙束三傳精研一經思游夏不能措之辭條舒蕡所未陳之策並見前謹按直筆猶足誅未死之奸諛北史魏收傳願得直筆束觀早出魏書李師中詩並游英俊顏何厚未死姦諛骨已寒稍遂初心誓不志平生之溫飽見前縣補魁中謝縣令聖經賢傳指未究于數千韓文近世公羊學幾絶何氏注外不見他書聖經賢傳屏而不省司馬遷傳春秋文成數萬其指數千詳見前遂序黨庠首辱推于第一禮記古之教者家有孰黨有庠術有序國有學注術當作遂聲之誤也古之仕焉而已者歸教於閭里朝夕坐於門門之堂謂之孰周禮五百家為黨萬二千五百家為遂黨屬於鄉遂在逺郊之外其細已甚左傳其細已甚民弗堪也王荆公詩細甚客卿因筆墨卑於爾雅注蟲魚不足乎揚榖梁傳其不言齊侯何也以其不足乎揚不言齊侯也注不足稱揚然纍土乃九層之階老子合抱之木生於毫末九層之臺起于纍土千里之行始于足下故積律自一黍而起律厯志度者本起于黃鍾之長以子榖秬黍中者一黍之起積一千二百黍之廣度之九十分黃鍾之長又權輕重者不失黍絫注十黍為絫宋景佑二年製玉律詔下潞州上黨羊頭山求秬黍及下懷州河內縣取葭莩況是萬家之縣文帝詔今萬家之縣云無應令豈實人情是吏舉賢之道未備也利用百篇之書孔安國尚書序典謨訓誥誓命之文凡百篇由鄉校以發聲粲仕途之接武至如直筆見前見謂孤經唐開元中祭酒楊瑒上言主司帖試明經不務求述作大㫖專取難知問以孤經絶句請自今並帖平文從之新唐書楊瑒傳有司帖試明經不質大義乃取年頭月尾孤經絶句且今習春秋三家儀禮者才十二恐諸家廢無日請帖平文以存家學其能通者稍加優宦奬孤學從之杜預傳左邱明本為春秋作傳而左傳遂自孤行釋例本為傳設而所發明何但左傳故亦孤行前輩罕用此以下帷董仲舒傳少治春秋孝景時為博士下帷講誦弟子傳以次相授業或莫見靣蓋三年不窺園其精如此後學遂束之於髙閣見前豈知數百世盛衰之監且在萬八千褒貶之言漢書注春秋萬八千字詳見前孫宏慙而謝鄉人丈夫淺矣漢書公孫𢎞菑川薛人家貧牧豕海上年四十餘乃學春秋雜說武帝招賢良文學士𢎞年六十以賢良徵為博士使胸奴還報不合意移病免歸元光五年復徵賢良文學菑川國復推上𢎞𢎞謝曰前已嘗西用不能罷願更選國人固推𢎞𢎞至太常左傳吾淺之為丈夫也仲舒褎然為舉首吾道非耶見前某甲志無竒丁年逾邁李陵書丁年奉使白首而歸梁書王僧孺傳丁年積蓄與此銷亡盧照鄰詩丁年遊蜀道斑鬢向長安溫庭筠詩回日樓臺非甲帳去時冠蓋是丁年王荆公詩丁年結客盛游從宛洛氊車處處逄無端讀書已墮左計韓文今者無端讀書史智慧只足勞精神又身勤而事左辭重而請約非計之得也登髙能賦更負初心韓詩外傳孔子遊於景山之上子路子貢顔淵從孔子曰君子登髙必賦小子曷言其願丘將啓汝漢藝文志傳曰不歌而誦謂之賦登髙能賦可以為大夫韓文余生三十有八年聰明不及于前時道德日負于初心手縱敏于八叉全唐詩話溫庭筠才思艷麗工于小賦每入試押官韻凡八叉手而八韻成多為鄰鋪假手日救數人而士行有鈌縉紳薄之眼易迷于五色見前造化無功于筆補李賀詩筆補造化天無功詳見前瑕疵皆得而毛吹韓詩佳句喧衆口考官敢瑕疵韓子不吹毛而求疵不洗垢而索瘢漢書有司吹毛求疵杜林傳吹毛求疵詆欺無限四子講德論莫不肌栗懾伏吹毛求疵並施螫毒用是息黥莊子庸詎知夫造物者不息我黥而補我劓使我乘成以隨先生耶倦于取刖昌黎與崔立之書足下乃比之獻玉者以為必俟工人之剖然後見知于天下雖兩刖足不足為病僕之玉固未嘗獻而足固未嘗刖足下無為為我戚戚也蠧書叢只韓詩豈如蠧書蟲生死文字間麟史在焉杜氏左傳序絶筆于獲麟之一句者所感而起固所以為終也疏麟是仲尼所感書為感麟而作遂因白日之閒古詩白日莫閒過青春不再來竊考素王之㫖杜氏左傳序說者以為仲尼自衛反魯修春秋立素王邱明為素臣正義曰董仲舒對䇿云孔子作春秋先正王而繫以萬事是素王之文焉賈逵春秋序云孔子覽史記就是非之說立素王之法鄭𤣥六藝論云孔子既西狩獲麟自號素王盧欽公羊序云孔子自因魯史記而修春秋制素王之道是先儒皆言孔子立素王也孔子家語稱齊太史子餘歎美孔子言云天其素王之乎素空也言無位而空王之也彼子餘美孔子之深原上天之意故為此言耳非孔子自號為素王也筆則筆削則削頗知齊晉正譎之情考工記築氏為削注今之書刀鄭云漢時蔡倫造紙蒙恬造筆古者未有紙筆則以削刻字韻㑹云古用竹簡筆誤則以刀削之因名其刀曰削史記孔子世家孔子為春秋筆則筆削則削子夏之徒不能贊一辭詳見前信傳信疑傳疑仍見公榖婉裁之趣榖梁傳甲戌己丑陳侯鮑卒何為以二日卒之春秋之義信以傳信疑以傳疑陳侯以甲戌之日出己丑之日得不知其死日故舉二日以包也榖梁傳序左氏艷而富其失也誣榖梁清而婉其失也短公羊辨而裁其失也俗若能富而不誣清而不短裁而不俗則深於道者也亦創通于大義杜氏序劉子駿創通大義詳見前豈盡逹于微言榖梁傳序九流分而微言隱異端作而大義乖長恐畫虎而不成馬援傳所謂畫虎不成反類狗者也必至屠龍之無用莊子宋泙漫學屠龍於支離益殫千金之家三年技成而無所用其巧自為鑄錯唐哀帝時魏博羅紹威以牙軍之逼召朱全忠全忠殪八千餘家其餘攻討悉平全忠留魏半年紹威供億所殺牛羊豕近七十萬資糧稱是所賂遺又近百萬比全忠去蓄積為之一空紹威雖除其逼而魏兵自是衰弱紹威悔之謂人曰合六州四十三縣鐡不能為此錯也互見前孰與訂頑屬聞君子之絃歌將興春誦見前咸謂有司之衡鍳莫遁秋毫聊爾逢場傳燈録鄧隱峯辭道一禪師師曰甚麼處去曰石頭去師曰石頭路滑曰竿木隨身逄場作戲東坡詩一絲不掛且逢場又逢場作戲三昧具豈其定霸左傳先軫曰報施救患取威定霸于是乎在矣舊唐書白居易傳贊建安才子始定霸於曹劉永明辭宗先讓功于沈謝萋菲貝錦果聞其後詩萋兮菲兮成是貝錦注讒人集作已過以成于罪猶女工之集采色以成錦文播揚糠粃不意在前見前謂我不堪于公何有伏遇某官以魯禽父律厯志燮父禽父並事康王師古曰禽父即伯禽也父讀曰甫甫者男子之美稱為楚縣公冊府元龜縣令楚謂之尹沈尹戍為方城之外縣尹是也亦謂之公葉公諸梁是也左傳諸侯縣公皆慶寡人注縣公楚縣大夫妙割無雞牛民自得于桁楊之外東坡詩微官有民社妙割無雞牛又使君飲我言妙割無雞牛韓文人自得于湖山千里之外桁寒剛切木在足曰械大械曰桁莊子椄槢桁楊注械夾足及脛皆曰桁楊空弦落狐兔士亦慙于檟楚之威戰國䇿更嬴與魏王處京臺之下仰視飛鳥引弓虛發而下之魏王曰射可至此乎更嬴曰此孽也其飛徐而鳴悲故瘡未息而驚心未去也聞弦音引而髙飛故瘡殞也東坡詩先鳴落虛弦又故應驚羽落虛弦禮記夏楚二物收其威也注夏槄也楚荆也爾雅槄山檟注今之山楸夏古雅反有懷桑椹之好音詩翩彼飛梟集于泮林食我桑黮懷我好音注喻人感于恩則化也還舉棘闈之故事且從隗始並見前以善鄭來左傳我周之東遷晉鄭焉依善鄭以勸來者猶懼不蔇况不禮焉鄭不來矣某敢狃近功說文狃犬性驕也徐曰􅏸慣習也左傳莫敖狃于蒲騷之役遂忘逺業玉川破屋而已矣盍益抱於遺經見上條武城得人焉耳乎請僣陳於故事故事語復疑有誤西府先生之在吾泮賸有菁莪賸以證切說文物相增加也今鄙俗謂物餘為賸增韻冗長也益也餘也詩序菁菁者莪樂育材也君子能長育人材則天下喜樂之矣東閣郎君之稱其家可無桃李北夢瑣言李商隱令狐綯父楚之故吏也殊不展分商隱恨之因題㕔閣落句云郎君官貴施行馬東閣無因許再窺綯怒之戴氏鼠璞云今人以宰相子為東閣郎君東閣乃公孫宏延賔之地與子弟無預今之引用乃本李義山九日詩郎君指令狐綯東閣指令狐楚之舊館東坡九日詩聞道郎君閉東閣且容老子上南樓又云南屛老宿間相過東閣郎君懶重尋如此用却無病今之以東閣呼郎君則誤矣世說諸葛瑾為豫州别駕詣喜語云小兒知談卿可與語速往詣恪恪不與相見後相遇別駕喚出郎君文選應璩與蒲炳書云外喜郎君謙下之用璩嘗事其父寵故稱郎君也韓文幼子娟好靜秀瑶環瑜珥稱其家兒也胡不招諸生而立館下進學解國子先生晨入太學招諸生立館下從而飬弟子以教國中盡拔十得五之功必有濟以上蜀志龎統性好人倫勤于長飬每所稱述多過其才時人怪而問之統答曰當今天下大亂雅道陵遲善人少而惡人多今拔十失五猶得其半而可以崇邁世教使有志者自勵不亦可乎新唐書趙憬傳拔十得五賢愚猶半李絳傳古人言拔十得五猶得其半晉書王湛初有隱德人莫能知兄弟宗族皆以為癡兄子濟輕之嘗詣湛見牀頭有周易濟請言之湛因剖析𤣥理微妙有奇趣皆濟所未聞還白其父曰濟始得一叔乃濟以上人也酬以一當千之夢寧謂秦無人王荆公詩東都曽以一當千場屋聲名十五年左傳士㑹歸繞朝贈之䇿曰子無謂秦無人吾謀適不用也謝成都解頭劉省元應龍制春秋之義傑出妙齡王荆公詩妙齡終日對書龕又飛揚獨妙齡東坡集妙齡秀發秉筆入侍又妙齡馳譽百人雄貢鄉曲之英褎為舉首韓詩嵗貢鄉曲英未皇贊慶過辱修辭俱見前恭惟某人青藜故家王子年拾遺記劉向校書天祿閣夜有老人著黃衣植青黎杖扣閣而進詳見前碧梧雋質韓文退見少傳翠竹碧梧鸞停鵠峙能守其業者也被孟母三遷之教獨抱遺經見前回曹正奏條當陶舒二八之年創通大義遂魁里選漢章帝詔夫鄉舉里選必纍功勞今刺史守相不明真僞茂才孝廉嵗以百數既非能著而當授之以政事甚無謂也行冠臚傳叔孫通傳大行設九賔臚句傳蘇林曰上傳語告下為臚下告上為句某何預升賢亦蒙巽謝豫升䝉㢲四卦名愧游夏一辭之莫措但知頂戴於名經史記孔子世家孔子在位聽訟文詞有可與共者弗獨有也至於為春秋筆則筆削則削子夏之徒不能贊一辭典論昔尼父之文辭與人通流至於制春秋遊夏之徒不能措一字唐張倬東之之孫屢舉進士不第捧登科記頂上戴之曰此千佛名經也慕回路二子之與言更冀潜心於大業韓文送張童子序愈與童子俱陸公之門人也慕回路二子之相請贈與處也故有以贈童子禮記子路去魯謂顔子曰何以贈我顔子請曰何以處我董仲舒傳贊仲舒遭漢承秦滅學之後六經離析下帷發憤潜心大業令後學者有所統一為羣儒首謝成都解元五十一人恭審論秀貢英禮記命鄉論秀士升之司徒曰選士韓詩嵗貢鄉曲英策名偕計左傳策名委贄謂書名於所事之䇿武帝紀令與計偕注令所徵之人與上計者俱來詳見前少城百重列隧自應炳井絡之靈左思蜀都賦亞以少城接乎其西市鄽所會萬商之淵列隧百重羅肆巨千逺則岷山之精上為井絡近則江漢炳靈世載其英後賢五十一人夙已載華陽之志晉常璩著華陽國志十二卷兹應元年明先聖之詔漢武帝元光元年詔賢良受策察問咸以書對於是董仲舒公孫宏等出焉董仲舒傳子大夫明先聖之業習風俗之變終始之序講聞髙誼之日久矣其明以諭朕式副吾皇紹祖烈之期韓詩吾皇紹祖烈天下再太平伏惟某人屹自岷峨濯以江漢相如七經之授不專靡麗之辭司馬相如傳作春秋一蓻將襲六為七文穎曰六經加一為七經也相如傳贊相如雖多虛辭濫說然要其歸引之於節儉與詩之風諫何異揚雄以為靡麗之賦勸百而風一猶騁鄭衛之聲曲終而奏雅不已戲乎揚雄四賦之工蓋有湛深之思揚雄傳辭莫麗於相如作四賦雄為人簡易佚蕩口吃不能劇談而好深湛之思清淨無為少嗜欲兹並登於天府周禮三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之厥明鄉老及鄉大夫羣吏獻賢能之書於王王再拜受之登于天府內史二之聞允愜於月評見前某未遂納交過勤委贄客星入斗恐當回八月之槎張華博物志舊說天河與海通有人居海渚者年年八月有浮槎去來不失期其人多齎糧乘槎而去至一處見丈夫牽牛渚次飲之問此是何處答曰君還至蜀訪嚴君平後問君平曰某年某月有客星犯牽牛計年月正是此人到天河時也互見前魁首枕參尚及窺五色之瑞天文志杓攜龍首衡殷南斗魁枕參首宋韓魏公登第太史奏日下五色雲見又唐鄭仁表以門閥文章自尊曰天瑞有五色雲人瑞有鄭仁表回臨安江解頭克家遺經究終始指洞識於數千韓詩獨抱遺經究終始餘見前考官敢瑕疵宜擢居於第一韓詩佳句喧衆口考官敢瑕疵雖知有無怨無德之語東坡詩青袍白紵五千人知子無怨亦無德然可逭不公不明之嘲韓文進學解諸生業患不能精無患有司之不明行患不能成無患有司之不公言未既有笑于側者嘲陟交切說文謔也何煩摛文更加抒謝抒丈吕切說文挹也又引而泄之也班固賦抒下情而通諷諭恭惟某人傳家忠孝東坡詩洛陽相君忠孝家餘事文章王荆公詩餘事文章海內傳東坡詩餘事作詩人安夏攘夷聊復道威文之事發凡言例又能措游夏之辭杜氏左傳序其發凡言例皆經國之常制餘見前空萬馬以皆喑東坡三馬贊振鬛長鳴萬馬皆喑詳見前戴六鼇而為首宜春傳信録盧肇開成中就江西解為試官末送肇有謝啓云巨鼇贔屭首冠蓬山試官謂之曰昨限以人數擠排雖獲仰展深慙名第奉凂焉得首冠蓬山之謂肇曰必知明公垂問大凡頑石在上巨鼇戴之非首冠耶一座聞之大笑其義則竊取矣幸不辱天府之書周禮鄉老及鄉大夫羣吏獻賢能之書於王王再拜受之登於天府疏天府掌祖宗之寶藏者賢能之書亦是寶物故藏於天府盡心將親覽焉尚幸聽雲門之奏董仲舒傳子大夫其盡心靡有所隱朕將親覽焉周禮大司樂以樂舞教國子舞雲門大卷大咸大磬大夏大濩大武乃分樂而序之以祭以享以祀乃奏黃鍾歌大吕舞雲門以祀天神某慙無識鍳濫主文衡掣鯨鯢於碧海之中僅塞直鈎之責杜詩或看翡翠蘭苕上未掣鯨魚碧海中楚辭以直針而為鈎維何魚之能得盧同詩人鈎曲我鈎直嗟哉我鈎又無食文王已沒不復生直鈎之道何時行對龍蛇于丹墀之下願無曲學以言儒林傳轅固以賢良徵公孫宏亦徵仄目而視固固曰公孫子務正學以言無曲學以阿世回景解頭簡文屢入澤宫聞夙擅春秋之學禮記天子將祭必先習射于澤澤者所擇士也已射于澤而後射于射宫射中者得與于祭不中者不得與于祭注澤宫名也士謂諸侯朝者諸臣及所貢士也疏澤是宫名于此宫中射而擇士故謂此宫為澤蓋于寬間之處近水澤而為之也韓詩初隨計吏貢屢入澤宫射儒林傳公羊春秋有顔嚴之學榖梁春秋有尹何申張房氏之學公羊傳何休學疏學者言為此經之學即注述之意褎然舉首喜可塞月旦之評有勤屬辭良髙陳誼伏惟某人學濟世美教自母慈並見前景子君臣之大倫久於舒究詩君子不惠不舒究之箋究謀也王不愛太子故間讒言則放之不舒謀也箋不肯安舒而謀慮之仲尼筆削之微意何止創通見前當再進再郤之餘厲萬選萬中之技唐張鷟字文成深州人少聰慧絶倫為文下筆輒成舉進士擢考功員外郎纍官至學士時稱其文猶青銅錢萬選萬中號為青錢學士楚雖有玉正恐在三獻之餘見前秦豈無人其誓告羣言之首左傳子無謂秦無人尚書秦誓嗟我士無譁其誓告羣言之首某濫叨勸駕髙帝紀必身勸為之駕文穎曰有賢者郡守身自往勸勉令至京師駕車遣之愧闕贈鞭李詩惜別傾壺醑臨分贈馬鞭先十二以犒師已窺肯綮左傳秦師過周鄭商人弦髙將市于周遇之以乘韋先牛十二犒師莊子技經肯綮之未嘗注肯著骨肉也說文骨間肉肯肯著也綮音啓一音罄猶結處也擊三千而徙海尚見扶搖莊子鵬之徒于南溟也水擊三千里摶扶搖而上者九萬里回衆解元貢郡國之英濫修嵗事射義古者天子之制諸侯嵗獻貢士于天子王制成嵗事制國用詢鄉曲之譽喜協月評司馬遷傳少負不羈之才長無鄉曲之譽何勤屬辭特枉抒謝伏惟某人學窺根柢史記莊子傳其學無所不窺潘安仁文章瑰瑋人謂潘詞林繁茂根柢衍密不然何妙秀美發如斯杜詩詞林有根柢柢木根文識波瀾杜詩文章子建波瀾濶又波瀾獨老成插架五千恥為無用之蠧韓詩鄴侯家多書插架三萬軸盧同詩唯有文字五千卷東坡詩平生五千卷韓詩豈殊蠧書蟲生死文字間纍碁十二迄承若掇之蜩張焱省元劉向說苑晉靈公作九層臺荀息曰臣不敢諫臣能纍十二博碁加九卵其上公曰危哉息曰復有危於此者九層之臺三年不成國用空虛社稷將亡也蜩音條說文蟬也莊子仲尼適楚出于林中見痀瘻者承蜩猶掇之也仲尼曰子巧乎有道耶曰我有道也五六月纍丸二而不墜則失者錙銖纍三而不墜則失者十一纍五而不墜猶掇之也孔子顧謂弟子曰用志不分乃疑于神其痀瘻丈人之謂乎用百篇坦然之書孔安國尚書序典謨訓誥誓命之文凡百篇帝王之制坦然明白可舉而行三千之徒並受其義占七人作者之例髙拱辰省元兹提麟筆之孤見前上應鳯苞之九句龍道省元兹策雕蟲之工法言童子雕蟲刻篆盧僎詩仰天歌聖道猶隗乏雕蟲竟登乘鴈之數揚雄傳乘鴈集不為多注乘鴈四鴈也有司論秀免不明不公之嘲見前國家急賢望斯猷斯謀之入尚書爾有嘉謀嘉猷則入告爾后于內某過勤委贄何與提衡韓非子賢智提衡而立張湯杜周傳贊繼世立朝相與提衡三魁天下之儒在加意耳宋馮京王曽孫何楊置皆三魁天下五靈王者之瑞尚寓目焉杜氏左傳序麟鳳五靈王者之嘉瑞也注龍鳳麟白虎元龜左傳子玉請戰曰請與君之士戲君慿軾而觀之得臣與寓目焉回陳上舍伯鳳相如入室蜀賦自工法言如孔氏之門用賦也則賈誼升堂相如入室矣如其不用何張叔詣京漢都增重文翁傳翁少好學通春秋為蜀郡守見蜀地僻陋有蠻夷風欲誘進之乃選郡縣小吏開敏有材者張叔等十餘人親自飭厲遣詣京師受業博士皆成就還歸有勤曵履鄭崇傳每見曵革履且辱鳴謙易鳴謙貞吉中心得也恭惟某人江漢載靈蜀都賦江漢炳靈世載其英岷峨擢秀見前子昂始髙蹈信有雲仍韓詩國朝盛文章子昻始髙蹈勃興得李杜萬物困陵暴季方難為兄夙髙月旦見前比者齊魯之賦文翁傳繇是大化蜀地學于京師者比齊魯焉粲然虞夏之庠禮記有虞氏飬國老于上庠飬庶老于下庠夏后氏飬國老于東序飬庶老于西序志目中眉屈居曰俊曰造之選禮記司徒論選士之秀者而升之學曰俊士升于司徒者不征于鄉升于學者不征于司徒曰造士餘見前擢角拔齒粗免不公不明之嘲新唐書舒元輿傳元輿獻文闕下不得報上書自言漢主父偃徐樂嚴安以布衣上書朝奏暮召而臣所上八萬言其文煆錬精粹出入古今數千百年搜剔剖决拔犀之角擢象之齒豈主父等可比哉兹蒙四六之遺良重再三之愧見前某頃從化闥獲讀阿房吹河東以上天已窺吐鳯杜詩揚雄更有河東賦唯待吹噓送上天西京雜記揚雄讀書有人語之曰無為自苦元故難傳忽然不見雄著太元經夢吐鳳凰集元之上頃而滅圗天南而擊海更願培鵬見前回水邱先輩褎謝解李肇國史補通稱謂之秀才得第謂之進士互相推敬謂之先輩韻㑹小補云唐宋間人呼謂有先輩之稱或曰此互相推敬耳然不聞施之于同朝同官同年而所稱皆未任官職李方叔為東坡門人坡書札稱方叔為先輩按北夢瑣言王疑知舉日司空圖第四人登科王謂衆曰某叨沗文柄今年榜帖為司空先輩一人而已則是所謂先輩者實後輩士也唐王福畤雜録文中子謂魏徵房杜曰先輩雖聰明特逹非董薛程仇之比然則隋唐初蓋已如此宋吳枋宜齊野乘云按容齊續筆載貽子録云同年小録是雙雙小輩各一人分寫宴上長少分雙雙相向而坐以東為上襯以西為首給舍員外補遺多來突宴東先輩不遷而西先輩避位又紹聖間王聖塗澠水燕談云蘇德祥漢相禹圭之子建隆四年進士第一人登第初還鄉里太守置宴以慶之樂作伶人致語云昔年隨侍嘗為宰相郎君今日登科又是狀元先輩又司馬溫公勸學歌云一朝雲路果然登姓名亞等呼先輩味溫公之言則登雲路者方呼先輩如今黃甲並呼狀元一般先輩猶言前名也又葛常之丹陽集云小說載優人有以李義山服藍縷之衣而出或問曰先輩之衣何在曰為館中諸學士撏將去矣又王直方詩話云蕭貢嘗夢至宫庭中賦詩有一人云先輩異日必貴又春渚記聞載棊待詔劉仲甫聞祝不疑先輩名品髙著人傳今秋來試南省若以二家所載觀之則以先輩為稱呼决非前輩之比又韋莊浣花集有癸丑年下第獻新先輩詩又墨客揮犀言人于榜下擇壻號曰臠壻有一新先輩少年為貴家所慕欲以女妻之又彭應來有賀新先輩及第詩言新先輩則為狀元為前名明矣若以為長上先生則安得加一新字又曰少年托言載牛僧孺應舉時韓愈皇甫湜見之于青龍寺稱牛為即先輩又田表聖錫咸平集與胡旦書云秀才即先輩乃即日可為先輩也其義甚明今人認作前輩誤矣按唐李昌符有下第後䝉侍郎示意㫖于新先輩宣恩感謝詩今按世說王子敬問謝公林公何如庾公謝殊不受答曰先輩初無論又人有問太傅子敬可是先輩誰比謝曰阿敬近撮王劉之標則先輩之稱其來久矣考其行藝恐遺天府之賢周禮三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府內史二之擇乎中庸偶協月評之望所謂得子之是賴新唐書元結傳結舉進士禮部侍郎楊浚見其文曰一第溷子耳有司得子是賴果擢上第少逭有司之不明敢圗撝謙更加巽謝恭惟某人殖學有裕左傳學殖也不學將落賦才不資蓋寬饒傳用不訾之軀貨殖傳家亦不訾師古曰訾與資同不資者言無資量可以比之貴重之極也曲禮三千得恭儉莊敬之教禮記恭儉莊敬禮教也重言十七非瑣碎排偶之文莊子重言十七所以已言也是為耆艾郭象注以其耆艾故俗共重之雖使言不借外猶十信其七栁文眩耀為文瑣碎排偶茲歌鹿鳴之三遂賦良馬之四詩孑孑干旄在浚之郊素絲紕之良馬四之強學待問不難得祿以得名禮記儒有席上之珍以待聘夙夜强學以待問懷忠信以待舉力行以待取其自立有如此者正心修身諒必踐言而踐行某摩娑俗眼後漢書蒯子訓傳與一老翁摩挲銅人韓詩誰復著手為摩挲杜詩途窮每遭俗眼白邂逅譽髦詩邂逅相遇又譽髦多士何勤屣履之迎雋不疑傳勝之屣履起迎師古曰履不著跟曰屣屣謂納履未正曵之而行言其遽也屣音山爾反更埀􅔷袖之贈見前洗風塵之袍袴愧少緩于報章山谷禮部試院題伯時頓塵馬詩忽看髙馬頓風塵亦思歸家洗袍袴對日月之衮衣願更思于長策辛慶忌傳誠萬世之長策也王吉傳未有建萬世之長策舉明主於三代之隆者也餘見前回趙先輩子直謝解登于天府正恐負賢能之書見前採之月評幸不失鄉曲之譽司馬遷傳少負不羈之才長無鄉曲之譽何勤私謝更費雄文恭惟某人學深百篇見本卷回郭正奏王正察條氣蓋諸子史記季布傳布弟季心氣蓋關中晉書王濟傳風姿英爽氣蓋一時李詩大梁貴公子氣蓋蒼梧雲陳後山詩才名四十年盛氣蓋諸儒不但勤簡編之燈火韓詩燈火稍可親簡編可卷舒蓋亦富師友之淵源董仲舒傳贊考其師友淵源所漸猶未及乎遊夏浩乎沛然久已喧京師之價韓文如是亦有年然後浩乎其沛然矣法言谷口鄭子真耕于巖穴七下名震于京師論其秀者固應拔俊造之羣禮記司徒論選士之秀者而升之學曰俊士升于司徒者不征于鄉升于學者不征于司徒曰造士茲歌鹿鳴之三見前果空鷙鳥之百鄒陽傳鷙鳥絫百不如一鶚某濫賔計吏冒主文盟歐文主斯文之盟㑹考十七之重言幸逃迷眼見上條勉三千之獨對更望盡心董仲舒傳子大夫其盡心靡有所隱朕將親覽焉回武岡新舉蕭漢龍詢鄉曲之譽未遂承顔雋不疑傳承顔接辭獻賢能之書欣聞舉首見前有來委贄左傳策名委贄益仞鳴謙恭惟某官巫水之英桞文武岡銘黔山之㠝巫水之磻斗山其秀深灝灝噩噩之學法言虞夏之書渾渾爾商書灝灝爾周書噩噩爾䆒明明穆穆之源尚書明明在上穆穆在下吕侯之辟三千既知奧義吕刑五刑之屬三千蕭何之功第一宜稱名家蕭何傳鄂千秋曰蕭何轉漕關中給食不乏此萬世功也蕭何當第一曹參次之幸益窮上世之遺書孔安國尚書序以其上古之書謂之尚書庶亟對皇帝之清問尚書皇帝清問下民某濫叨涉筆見前何與提衡韓非子貴賤不相踰愚智提衡而立聞東海生之名喜先鳴于雞口蕭望之傳地節三年夏京師雨電望之因上疏願賜清閒之宴口陳災異之意宣帝自在民間聞望之名曰此東海蕭生耶餘見前飬北宫黝之勇願拭目于龍頭回新舉王道明采芹論秀夙聞能賦之聲藝文志傳曰不歌而誦謂之賦登髙能賦可以為大夫撤棘登名果中賢書之選五代史和凝傳凝知貢舉是時進士多浮薄喜為喧譁以動主司主司每放榜則圍之以棘閉省門絶人出入以為常凝撤棘開門而士皆肅然無譁所取皆一時之秀稱為得人未遑走賀猶辱謝箋恭惟某官家學有源左雄傳諸生試家法注儒有一家之學故稱家鄉評甚膴擬靈光之作久負軼材漢王延夀字文考有雋才父逸欲作靈光殿賦命延夀往圖其狀延夀因韻之以獻其父父曰吾無以加也時蔡雍亦有此作十年不成見此賦遂隱而不出奏混成之篇行占逺器孔平仲談苑王沂公有物混成賦云不縮不盈賦象寧窮於廣狹匪雕匪斫流形罔滯于盈虛則宰相鈞陶之意可見矣又云得我之小者散而為草木得我之大者聚而為山川則擇任群材使大小各得其所又可見矣茲步漢南之獨王坦之傳弱冠有重名時人為之語曰江東獨步王文度遂空冀北之羣鵬擊三千更觀變化俱見前龍飛九五亟快依乘易九五龍飛在天利見大人注不行不躍而在乎天則大人之路亨也新唐書李靖傳贊依乘風雲勒功帝籍某不武之資斯文何與一第溷子未足見志士之榮三釡及親願以為執事者勉並見前回免舉士人謝啓樂正論秀而升諸得時則駕史記老子傳君子得其時則駕不得其時則蓬纍而行注蓬沙磧上轉蓬也纍轉行貌也言君子得明主則駕車而事不遭時則若蓬轉流移而行可止則止也公等何見之晚也博我以文鳴謙尊光擊節降嘆晉書謝尚傳坐者撫掌擊節袁宏傳尚想遐風載揖載味後生擊節懦夫增氣南史王籍傳至若邪溪賦詩云蟬噪林逾靜鳥鳴山更幽劉孑焉正見之擊節不能已已王筠傳沈約製郊居賦讀至墜石堆星及水懸塪而帶坻筠皆擊節稱贊東坡詩擊節為爾謡恭惟某官舊穿楊葉枚乘傳飬由基楚之善射者也去楊葉百步百發百中楊葉之大加百中焉可謂善射矣杜詩舊穿楊葉真自知暫蹶霜蹄未為失新攝桂叢淮南招隱桂樹叢兮山之幽鵬怒而飛九萬里風斯在下見前龍潜以躍三千字日固未斜易乾初九潜龍勿用九四或躍在淵惟時懋哉尚書汝平水土惟時懋哉遐不謂矣詩心乎愛矣遐不謂矣注遐逺謂勤也我心愛此君子君子雖逺在野豈能不勤思之乎某已稽掃榻偶失迎門髙帝紀迎門却行子來見我乎良感贈言之繾綣集韻繾綣纒綿貌詩以謹繾綣傳反復也左傳繾綣從公無通內外則繾綣者牢固相著之意吾亦欲東耳尚容拭目于騰驤韓信傳吾亦欲東耳安能鬱鬱久居此乎張敞傳拭目傾耳杜詩絆之欲動轉欹反此豈有意仍騰驤李詩無人辨駿骨騄耳空騰驤曽南豐詩康衢四闢通萬里天駟得地方騰驤回免解杜省元論定秀士之賢者久欲納交禮記大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後祿之不見諸矦若小然茲勤委贄文雖工于儷六桞文駢四儷六錦心繡口雅復許之肄三禮記宵雅肄三官其始也詳見前恭惟某官句似少陵學如元凱杜預傳預字元凱京兆杜陵人博學多通明于興廢之道吕與叔詩學如元凱方成癖文似相如始類俳牧之能賦宜髙擢于唐科新唐書杜牧字牧之善屬文第進士復舉賢良方正于詩情致豪邁人號為小杜以别杜甫子夏直言盍亟登于漢殿漢書杜鄴字子夏元夀元年正月朔日食詔舉方正直言扶陽侯韋育舉鄴方正公等安在主司喟然從先生者七十人有勤私淑摶扶搖而九萬里㑹即髙騫有如骳骩之文枚皋傳自詆諆其文骩骳曲隨其事皆得其意師古曰骩古委字也骳音被骩骳猶言屈曲也何辱播揚之巧詩維南有箕不可以簸揚某聿來和義榮州唐天寶初改和義郡乾元初復為榮州深願友仁一話一言固已可觀于奇崛尚書自一話一言我則末惟成德之彥以入我受民崛渠勿切說文山短而髙也何遜詩懸崖抱奇崛絶壁駕崚嶒三熏三沐尚圗續欵于清揚國語莊公束縛管仲以與齊使齊使受之而退比至三舋三浴之注以香塗身曰舋或作熏詩有美一人清揚婉兮傳清揚眉目之間婉然美也回試官袖啓某伏以獻賢能之書有嚴春貢見前登文章之籙來主夏盟栁文自孔氏以來茲道大闡家修人厲刓精渴慮者幾千年矣其間耗費簡札役用心神者其可數乎登文章之籙波及後代越不過數十人耳髙帝紀贊晉主夏盟師古曰言晉為霸主諸夏之盟既為國以得人更以文而博我漢書叙傳從容風議博我以文師古曰博我以文謂以文章開博我也恭惟某官學探宏奧說文宏屋深響也奧宛也室之西南隅味别澠淄列子白公問于孔子曰人可與微言乎孔子不應白公曰若以水投水何如孔子曰澠淄之合易牙嘗而知之白公曰人故不可以微言也夜几跋紅寧慮三條之燭盡禮記獨不見跋注疏跋本也謂把處古未有蠟燭呼大炬為燭火炬易盡盡則藏所然殘本山谷考進士卷詩書窗過白駒夜几跋紅燭唐制舉人試日既暮許燒燭三條韋承矩試日先畢有三條燭盡鍾初動九轉丹成鼎未開薛能有才報第三條燭盡文昌風景畫難成之句舊說舉人試日已晚主文權德輿於簾下戲云三條燭盡燒殘舉子之心而舉子遽答云八韻賦成驚破侍郎之膽故國史竇正固傳舊制夜試以三燭為限寒窗穿碧豈容五色之眼迷提玉尺以裁雲倒珠胎之貫月揚雄傳剖明月之殊胎吳都賦蚌蛤珠胎與月虧全吳筠碎珠賦謝驪宫之瑞飾粉靈蚌之神胎山谷詩貝宫胎寒㺯明月又乳雉五色蜃胎寒搜阿房之賦料亦焦心見前論石渠之經諒多拔角施讐傳與五經諸儒雜論同異于石渠閣三輔故事石渠閣在未央宫北舒元輿傳拔犀之角擢象之齒詳見前春秋十二已歸此日之權衡漢蓻文志春秋古經十二篇蓋十二公各為一篇也宋劉敞原父著春秋權衡以平三家之得失禮樂三千何惜當年之衣鉢內典謂傳心印為傳衣鉢五代時和凝應舉自期榜首後及第五及知貢舉賞范質之文以第五處之語范曰欲君傳老夫衣鉢爾後范歷官皆與和同因而場屋間謂之傳衣鉢當時有詩曰從此廟堂添故事登庸衣鉢亦相傳及後馮京知貢舉特擢彭汝礪為首而彭後官不如馮有詩云當時已自傳衣鉢羞愧猶為食肉僧乃為科舉云然今人動以傳衣鉢言誤矣葉石林云唐末禮部知貢舉有得程文優者即以已登第時名次處之不以甲乙為髙下也謂之傳衣鉢和凝登第名在十三後得范魯公質遂處以十三其後范登相位官至太子太傅封國于魯與凝皆同世以為異五代史和凝傳唐故事知貢舉者所放進士以已及第時名次為重凝舉進士及第時第五後知貢舉選范質為第五後質官封皆與凝同當時以為榮某茲承撤棘五代史和凝傳凝知貢舉是時進士多浮薄喜為喧譁以動主司主司每放榜則圍之以棘閉省門絶人出入以為常凝撤棘開門而士皆肅然無譁所取皆一時之秀幸遂識荆思饑蠶食葉之聲悵難尋于舊夢歐陽永叔詩無譁戰士銜枚勇下筆春蠶食葉聲寫叨蝨濕薪之景尚願聽於新編山谷詩儀鸞供帳叨蝨行翰林濕薪爆竹聲互見前四六標準卷十三
