body:
  text: 四六標準卷二宋李劉撰論事代王縣丞上薛檢正極捕盜求改官宋史薛極字會之常州武進人以父任調上元主簿中詞科為大理評事嘉定十五年特賜同進士出身歷官參知政事封毗陵郡公加少保和國公致仕時為中書門下省檢正諸房公事效微勞於采棒曾發宿姦魏志曹操年二十舉孝廉為郎除洛陽北部尉曹瞞傳曰太祖初入尉廨繕治四門造五色棒懸門左右各十餘枚有犯禁者不避豪強皆棒殺之京師斂迹莫敢犯者晉崔豹古今注車輻棒也漢朝執金吾金吾亦棒也以銅為之黃金塗兩末謂為金吾御史校尉郡守都尉縣長之類皆以木為吾用以夾車故謂之車輻趙廣漢傳其發姦摘伏如神開公道於青雲與叨信賞范雎傳不意君能自致於青雲之上髙適贈縣尉詩迹留黃綬人皆歎心在青雲世莫知曹鄴杏園即席上同年詩岐路不在天十年行不至一旦公道開青雲在平地楊升菴丹鉛總録云史記所云青雲之士蓋指聖賢立言傳世者後世乃以登仕路為青雲謬矣京房易傳云青雲所覆其下有賢人隱續逸民傳嵇康早有青雲之志南史陶宏景曰仰青雲睹白日不為遠矣梁衡陽王鈞曰形入紫闥意在青雲袁彖贈隱士庾易詩白日清明青雲遼亮昔聞巢許今見臺尚阮籍詩抗身青雲中羅網孰能施李白詩所以青雲人髙歌在巖户合而説之青雲豈仕進之謂哉韓非子信賞以盡能必罰以禁邪管子開必得之門信慶賞也漢宣帝紀贊信賞必罰綜核名實吳志潘濬傳信賞必行法不可干唐書陸贄傳信賞必罰霸王之資也料虎頭而茍免莊子丘所謂無病而自炙也疾走料虎頭編虎須幾不免虎口哉料音聊棄雞肋而未能九州春秋夏侯淵為黃忠所殺操臨漢中至陽平欲攻劉玄德而不得進欲守又難為功乃出令曰雞肋官屬不曉所謂楊修便自嚴裝人驚問何以知之修曰雞肋棄之可惜食之無所得以比漢中知公欲還也俄操回師後漢書楊修傳曹操自平漢中欲因討劉備而不得進欲守之又難為功護軍不知進退何依操於是出教唯曰雞肋而已外曹莫能曉修獨曰夫雞肋食之則無所得棄之則如可惜公歸計決矣幸而得之知所自矣切以鬻牒度民者非國計之得已僧史略曰度牒自南北朝有之見髙僧傳名籍限局必有憑由即今祠部牒也唐會要曰天寶六年制僧尼令祠部給牒則僧尼之給牒自玄宗始亂名改作者乃王制之必誅今有偽為二三尺之綾遂可坐罔八百緡之鏹燕翼貽謀録僧道度牒每歲試補刋印板用紙摹印新法既行獻議者立價出賣每牒一紙為價百三十千然猶歲立為定額不得過數熙寧元年始出賣於民間初歲不過三四千人至元豐六年限以萬數而夔路轉運司增價至三百千以次減為百九十千建中靖國元年增至二百二十千六年詔改用綾紙依將仕郎校尉例南渡以後再立新法度牒自六十千增至百千淳熙初增為五百千又增為七百千又著為停榻之令許客人增百千興販又增作八百千漢書注鏹錢貫也韻會以鏹貫錢也通作繦是姦夫與人主同利賈山傳錢者亡用器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也貨殖傳上爭王者之利故平世而天下乏財我能往彼亦能往歟左傳楚人謀徙於阪髙蒍賈曰不可我能往寇亦能往不如伐庸是可忍孰不可忍也稽諸令甲宣帝紀地節四年詔曰令甲死者不可復生如淳曰令有先後故有令甲令乙令丙師古曰如説是也甲乙者若今之第一第二篇耳後漢書后妃紀設外戚之禁編諸甲令注前書音義曰甲令者前帝第一令也有甲令已令丙令載在先庚易巽九五先庚三日後庚三日吉王弼注申命令謂之庚天以正齊物不可卒也民迷固久直不可肆也故先申三日令著之後復申三日然後誅而無怨咎矣茍能掩羣而得其人曲禮大夫不掩羣疏羣謂禽獸共聚也羣聚則多不可掩取之王制諸侯不掩羣注為盡物也則有第功而改其秩周必大論縣尉捕盜賞格云國朝會要凡縣尉躬親鬬敵捉殺賊全火以上合入令録人並授京官仍賜緋章服其後姦弊日生凡縣尉因弓手捉到強盜七人其奏狀必云馬前三步親自捉獲以此為軍功捕盜例得改次等官輿論猶疑其未厚輿衆也易弟子輿尸左傳輿人之誦臺端至見於申明唐百官志侍御史久次者一人知雜事謂之雜端殿中監察職掌進名遷改及令史考第臺內事專決亦號臺端詎知應格之官終困舞文之吏汲黯傳好興事舞文法注舞猶弄也新唐書栁公綽傳行部至鄧縣吏有納賄舞文二人同繫獄縣令以公綽素持法謂必殺貪者公綽判曰贓吏犯法法在姦吏壞法法亡誅舞文者功疑從重顧以無可疑而從輕尚書罪疑惟輕功疑惟重令出惟行必欲扼其出而惟反尚書令出惟行弗惟反自非國論恪守邦條孰云牛馬走之功司馬遷傳太史公牛馬走注言已為太史公掌牛馬之僕便有雞犬飛之幸神仙傳伍被得罪於淮南王安恐為所誅乃誣告安謀反八公謂安曰可以去矣此乃天之發遣王王若無此事日復一日未能去世也八公使安登山大祭埋金地中即白日升天漢史祕之恐人主廢萬機而競求安道乃言自殺安臨去時餘藥器置在中庭雞犬舐啄盡得升天故雞鳴天上犬吠雲中也伏念某粗識丁字新唐書張宏靖傳宏靖素貴其詬責士皆曰反虜嘗曰天下無事而輩挽兩石弓不如識一丁字宋王楙野客叢書云今文人多用不識一丁字祖唐書語按續世説乃個字非丁字蓋個與丁相似傳寫之誤又觀張翠微考異亦作個字乃知世説之言為信又觀蜀志南史皆有所識不過十字之語史通謂王平所識僅通十字恐是十字亦未可知按所識不過十字即蜀志王平傳中語史通特述之耳濫塵乙科儒林傳歲課甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故以十年而到鳳池可羞儕輩夢溪筆談張虞進士第一登科期集於興國寺題詩句於壁曰一舉首登龍虎榜十年身到鳳凰池有人續云君看姚曄并梁固不得朝官未可知後果終於京官儕牀皆切説文等輩也左傳吾儕小人增韻類也又在詣切等也呼五百而取鼠穴何等勳庸崔豹古今注五伯一伍之伯也五人曰伍五長為伯故稱伍伯一曰戶伯漢制兵吏五人一户竈置一伯故户伯亦曰火伯以為一竈之主也漢諸公行則戶伯率其伍以導引也古兵士服韋辨今户伯服赤幘纁衣素韎辨之遺制也後漢書虞詡傳走卒注走卒五百之類也續漢志曰伍伯公八人中二千石六人千石六百石皆四人自百石以下皆二人黃綬武官五百文官辟車鈴下侍閣門闌部署街里走卒皆有程品多少隨所典領率皆赤幘絳褠即今行鞭杖者也曹節傳越騎營五百妻有美色韋昭曰伍當也伯導也使之導引當道陌中以驅除也案今俗呼行杖人為五百也禰衡傳令五百將出欲加箠注五百猶今之問事也晉書庾純傳賈充嘗宴朝士而純後至充謂曰君行常居人前今何以在後純曰且有小市井事不了是以來後世言純之先嘗有五百者充之先嘗有市魁者以此相譏焉唐蘇世長為刺史因民不率教引咎自撻伍伯疾其詭鞭之見血趙奢傳猶兩鼠鬬於穴中將勇者勝韓詩立召賊曹呼伍伯盡取鼠輩尸諸市然用一尉之酸寒揚雄傳東南一尉韓詩酸寒溧陽尉五十幾何髦盡得羣凶之狼藉漢書注狼藉甚盛韻會離披雜亂貌草不編為狼藉不言祿而祿亦弗及左傳晉侯賞從亡者介之推不言祿祿亦弗及轉為丞而丞亦負余韓文博陵崔斯立以前大理評事言得失黜官再轉而為丞喟然曰丞哉丞哉余不負丞而丞負余既有功而不見知詩序四牡勞使臣之來也有功而見知則悅矣則為善者亦何利陳湯傳司馬法曰軍賞不踰月欲民速得為善之利也會逢上哲出正舊條事若出於天然谷永傳陛下天然之性鄧隲傳陛下躬天然之姿賈逵傳陛下通天然之明桓郁傳陛下躬天然之姿第五倫傳躬天然之德南史王僧虔傳僧虔論宋文帝書天然勝羊欣功夫少於欣又云天然縱放極有筆力杜詩天然二寸魚恩有為之地者張湯傳不能為地灌夫傳仲孺獨不為李將軍地乎注言今既毀程令李何地自安也田延年傳欲為道地伏遇某官靖共正直詩靖共爾位好是正直注靖謀也共具也言有德未仕之君子勿汲汲求仕自有明君謀具汝之爵位此斷章明允篤誠左傳有髙陽氏才子八人齊聖廣淵明允篤誠天下之民謂之八愷晉起居注太保衛瓘明允篤誠有匪躬之志文選先識博覽明允篤誠東坡集才全而德備積厚而施博明允篤誠坐屈羣策數典廷平識胥皂百端之情偽通典漢宣帝地節三年初於廷尉置左右平員四人光武省右平唯有左平一人掌平決詔獄冠法冠續漢書百官志廷尉平一人秩六百石周禮胥有十二人注胥讀如胥謂其有才知為什長皂賤人直馬者左傳士臣皂皂臣𨽻皂在早切馬間也揚雄太僕針僕臣司馬敢告執皂屢將使指知寒素五剡之艱難司馬相如傳宣其使指剡奏剡也法言奏不剡察其捕蒲澤之姦可僥寸賞左傳鄭國多盜取人於萑苻之澤萑胡官切韻會薍也苻馮無切爾雅苻鬼目憐其索長安之米將及三年東方朔傳無令但索長安米詳見一卷首條故因屯膏易屯其膏小貞吉大貞凶象曰屯其膏施未光也注處尊位不能恢宏博施屯難其膏澤非能光其施者也復申巽命易重巽以申命象曰隨風巽君子以申命行事疏風之隨至非是令初故訓以申命行事惟是望賜更欲乞靈左傳齊來乞師曰願乞靈於臧氏使早遂通籍之圖元帝紀得為大父母父母兄弟通籍注籍者為二尺作牒記其年紀名字縣之宫門案省相應乃得入也陳湯傳宜以時解縣通籍注通籍不禁止令得出入也魏相傳光夫人顯及諸女皆通籍長信宫注謂禁門之中皆有名籍恣出入也無久受逆旅之困李斯傳雖逆旅之宿不勤于此矣潘嶽傳語曰許由辭帝堯之命舍於逆旅外傳曰晉陽處父過寧舍於逆旅舊唐書馬周傳宿於新豐逆旅主人惟供諸商販而不顧待駱賔王集遂歸逆旅再軫危途歐陽永叔詩道路今猶困旅人是為終始盡出生成某敢不俯策駑庸蘇武傳陵雖駑怯王陵傳陛下不知其駑下石奮傳疲駑無以輔治師古曰駑凡馬之稱故以自喻仰酬駿惠詩駿惠我文王曾孫篤之注大順文王之意此借用日之夕矣踏可免於選人詩日之夕矣牛羊下來宋史選舉志元祐初左司諫王巖叟言自罷辟舉而言選格可以見功過而不可以見人材中外病之於是不得已而别為之名以用其平日之所信故有踏逐申差之目踏逐實薦舉而不與同罪且選才薦能而謂之踏逐非雅名也又按東坡與鮮于子駿尺牘云若可踏逐辟召幸先之以此見踏逐為當時語天實臨之報敢忘於國士豫讓傳范中行氏皆衆人遇我我故衆人報之至於智伯國士遇我我故國士報之上樞密鄭知院昭先宋史寧宗嘉定七年以左諫議大夫鄭昭先簽書樞密院事出幕罔功妄作大鈞之問劉禹錫有問大鈞賦詳見前掃門得請敬投光範之書髙五王傳魏勃少時欲求見齊相曹參家貧無以自通乃常獨早掃齊相舍人門外舍人怪之以為物而司之得勃於是舍人見勃曹參以為舍人餘見前引吭何有於鏗鍧韓詩引吭吐鏗轟出吻謾勞於營度韓文每營度欲出口吻姑裁狂簡仰黷髙明孔融傳髙明必為偉器伏念某質窳而材凡窳音愈勇士切説文汚窬也史記器不苦窳缺也又墮窳病也氣凋而力腐韓文弱於才而腐於力少也師為己之學未深志於四方左傳子有四方之志禮記天地四方者男子之所有事也故必先有志於其所有事孔叢子人生有四方之志豈鹿豕哉而當羣聚乎壯而恥有道之貧始強顔於一第駱賔王啓雖無為光宅欣預比屋之封而有道賤貧恥作歸田之賦每懷竹帛之尺寸鄧禹傳禹得效其尺寸垂功名於竹帛耳詎甘溝瀆之尋常爾雅水注谷曰溝注澮曰瀆六尺曰尋倍尋曰常孔鮒小爾雅四尺謂之仞倍仞謂之尋尋舒兩股也倍尋謂之常俯焉孳孶俯本作俯漢書注即俯字亦音勉孶孜通禮記俯焉日有孳孶斃而後已為爾寂寂晉書桓溫傳溫以雄武專朝窺覦非望或卧對親寮曰為爾寂寂將為文景所笑南齊書王融字元長自恃人地三十內望為公輔夜直中書省歎曰作此寂寂使鄧禹笑人猶有布韋之氣習山谷詩平生習氣須料理未忘子墨之生涯揚雄傳聊因筆墨成文章故藉翰林以為主人子墨為客卿以風王荆公詩多難飄零歲月賖空餘文墨舊生涯灰撥隂何不過人間煙火之語山谷詩寒爐餘幾火灰裏撥隂何後山詩話言深思苦求乃得西京雜記揚子雲曰長卿賦似不從人間來其神化所至耶山谷跋東坡卜算子詞云東坡道人黃州時作語意髙妙似非吃煙火食人語非胸中有萬卷書筆下無一點塵俗氣孰能至此氣摩屈賈亦非天上雲漢之章杜詩氣劘屈賈壘目短曹劉墻東坡詩手抉雲漢分天章然小人僅可以小知故大慙或謂之大好韓文與馮宿論文書僕為文意中以為好則人必以為惡矣小稱意人亦小怪之大稱意即人必大怪之也時時應事作俗下文字下筆令人慙及示人則人以為好矣小慙者亦蒙謂之小好大慙者即必以為大好矣劉後村啓大慙謂之大好每觀舊作而忸怩小人可以小知焉覩斯文之巨麗摹訓誥之軌範稍續茶經唐陸羽著茶經蒸焙有法留藏有方烹煎有訣甫里先生陸龜蒙嗜茶置園於顧渚山下歲入茶租自為品題以繼茶經東坡詩先生有意續茶經會使老謙名不朽凖筆削之權衡頗修僧史宋史藝文志僧贊寧撰僧史略三卷雖諸公貴人欲出其門下韓文栁子厚墓志名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦譽之然古來此物當棄之道傍山谷詩古來和鼎實此物升廟廊歲月坐成晚煙雨青已黃得升桃李盤以遠初見嘗終然不可嘗擲棄官道傍迄回蓬島之船郊祀志蓬萊方丈瀛洲三神山望之如雲及到反居水下水臨之患且至風輒引船而去去泛瞿塘之棹僧圓澤詩吳越山川尋已遍却回煙棹上瞿塘郾城之陪宗閔本圖向闕以連鑣韓退之郾城晚飲贈副使馬侍郎及馮李二員外詩城上赤雲呈勝氣眉間黃色見歸期幕中無事惟須飲即是連鑣向闕時馮李謂馮宿李宗閔時並從征故云少陵之客嚴公幾入磨牙之吮血雲溪友議嚴武擁麾西蜀纍於飲筵對客騁其筆札杜甫拾遺乘醉言曰不謂嚴挺之有此兒也武恚目久之曰杜審言孫子擬捋虎鬚合座皆笑以彌縫之房太尉綰亦微有所忤憂怖成疾二公幾不免虎口矣李白作蜀道難為房杜危之也其略曰劒閣崢嶸而崔嵬一夫當關萬夫莫開所守或非人化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家二年劒外杜詩劒外忽傳收薊北又草木變衰行劒外又劒外官人冷又劒外春天遠又何曽劒外清皆指蜀言寸步矛頭晉書顧愷之傳桓元與顧愷之同在殷仲堪座共作危語元曰矛頭淅米劒頭炊堪曰百歲老翁攀枯枝動與仇謀詎敢愛鴻毛之命韓文命與仇謀取敗幾時又死有重於泰山或輕於鴻毛嘗有天幸乃偶全馬革之尸衛青傳其大將軍軍亦有天幸未嘗困絶也遊俠傳適有天幸窘急常得脫馬援傳男兒要當死於邊野以馬革裹尸還葬耳何能卧牀上在兒女子手中耶難擊柱以爭功叔孫通傳羣臣飲酒爭功醉或妄呼拔劒擊柱姑闔門而俟罪西曹地忍幸不汝疵丙吉傳西曹地忍之李竒曰地猶第也師古曰地亦但也語聲之急耳左傳豫取豫求不爾瑕疵東閣天寬理難自絶公孫宏傳開東閣以延賢人朱雲傳且留我東閣師古曰閣者小門也東向開之避當庭門而引賔客以别於椽史官屬也閣音葛説文門旁户也爾雅小閨謂之閣實為時輩所見推許夸哉韓子之辭昌黎潮州謝上表臣受性愚陋人事多所不通惟酷好學問文章未嘗一日暫廢實為時輩所見推許圖報國恩獨惟文章悲矣栁侯之志栁子厚獻平淮西雅表伏自忖度有方剛之力不得備戎行致死命况今已無事思報國恩獨惟文章然果恥匹夫之弗獲韓文聞古之君子相其君也一夫不獲其所若已推而內之溝中今有人生七年而學聖人之道以修其身積二十年不得已一朝而毀之是亦不得其所矣詎容名一藝而不庸韓文占小善者率以録名一藝者無不庸冒焉以前恃此無恐左傳豈其嗣世九年而棄命棄職其若先王何恃此以不恐韓文若防之制水恃以無恐恭惟某官冠冕四輔蜀志薑維傳注忠孝義節百行之冠冕尚書亂為四輔傳為我四維之輔禮運注左輔右弼前疑後丞為四輔大戴禮周公立於前謂之道太公立於左謂之充召公立於右謂之弼史佚立於後謂之丞是為四輔柱石九筵霍光傳將軍為國柱石師古曰柱者梁下之柱石者承柱之礎也言大臣負國重任如屋之柱及其石也元后傳位歷將相國家柱石臣也朱浮傳事有柱石之寄注以屋為喻也周禮注周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵自其不卑小官之時已見將降大任之器獨司兵本全樞機品式之功爰盎傳絳侯為太尉本兵柄注執兵權之本宣帝紀樞機周密品式具備上下相安莫有茍且之意參秉國鈞總甲胄衣裳之柄詩秉國之鈞四方是維注均平也持國政之平維制四方疏居權衡之任四方之事是其所維制尚書惟甲胄啓戎惟衣裳在笥孔傳甲鎧胄兜鐅也言不可輕用兵服不可加非其人有常立武詩序常武召穆公美宣王也有常德以立武事因以為戒然無競維人詩無競惟人四方其訓之注言人君為國無強乎維在得其賢人若得賢人則國家強矣齊人歸鄆歡之田已見仲尼之小試左傳定公十年齊人來歸鄆歡龜隂田按宋史寧宗嘉定元年六月以韓托胄蘇師旦首畀金金人來歸大散關及濠州所謂齊人歸田也宣王復文武之境亦惟方叔之壯猷詩序車攻宣王復古也宣王能內修政事外攘夷狄復文武之境土修車馬備器械復會諸侯於東都因田獵而選車徒焉詩方叔元老克壯其猷諒欲四夷之來王尚書無怠無荒四夷來王益思九德之咸事尚書九德咸事俊乂在官爾惟麴糵固將齊酒醴之和尚書若作酒醴爾惟麴蘖周禮酒正辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊鄭注齊者每有祭祀以度量節作之雖有絲麻定不棄蒯菅之賤左傳楚人入鄆莒無備故也詩曰雖有絲麻無棄蒯菅雖有姬薑無棄蕉萃凡百君子莫不代匱此逸詩也絲可為帛麻可為布皆精細之物也蒯苦怪切茅之類可為繩菅音姦似茅而滑澤無毛柔韌宜為索皆草之粗者尚念某百無操挾再有干摩蘇秦傳以出揣摩索隱曰摩姥何反髙誘曰摩合也江邃曰揣人主之情摩而近之天下官豈以洵故冗耶或容寸進見第一卷末條海內士賢於隗者至矣是在一陶崔駰傳壞冶一陶餘見第一卷上曽運使條上衛參帥涇辭權司户衛涇字清叔華亭人舉進士第一伉直尚氣節屢上封事論宰執專權不為勢怵勸光宗朝壽皇請誅韓托胄歷官參知政事三世同居御書友順二字扁其堂一統志涇自華亭徙居崑山之石浦淳熙中舉進士第一纍官參知政事歷事三朝出入內外憂國忘家終始一節與朱文公友善文公卒移文新安取經書傳注刋行卒贈太師諡文節第三十二卷有通潭州曽司户啓蓋辭而不允衛涇時為湖南帥請鄰祭竈正虞詘道之非孫寶傳御史大夫張忠署寶為主簿寶徙入舍祭竈請比鄰忠怪之使所親問寶寶曰道不可詘身詘何傷且不遭者可無不為况主簿乎越俎代庖滋負畔官之恥莊子庖人雖不治庖尸祝不越尊俎而代之矣尚書畔官離次處賤良難於拒貴曲禮長者賜賤者不敢辭栁文段太尉逸事狀太尉自涇州以司農徴戒其族過岐朱泚幸致貨幣慎勿納過岐泚固致大綾三百匹太尉壻韋晤堅拒不得命至都太尉怒曰果不用吾言晤謝曰處賤無以拒也靡初猶願於圖終尚書既往背師保之訓弗克於厥初尚賴匡救之德圖維厥終退未遂於一辭禮記君子三揖而進一辭而退告敢忘於三瀆易初筮告再三瀆瀆則不告切以士伸於知己固若錐之處囊史記晏嬰傳越石父賢在縲紲中晏子解左驂贖之載歸弗謝入閨越石父請絶晏子戄然謝曰嬰雖不仁免子于厄何子求絶之速也石父曰不然吾聞君子詘於不知己而信於知己者方吾在縲絏中彼不知我也夫子既以感寤而贖我是知已知己而無禮固不如在縲絏之中晏子於是延為上客平原君傳夫賢士之處世若錐之處囊中其末立見上急於貪賢則有羅而致幕新唐書孔戣傳韓愈上疏留戣曰今戣據禮求退陛下若不聽亦無傷義而有貪賢之美韓文不聽其去以明人君貪賢敬老之道也荆公詩從來貴勢公何慕自是賢名上所貪韓文以禮為羅羅而致之幕下至如常鱗凡介之儔匹韓文天池之濵大江之濆曰有怪物焉蓋非常鱗凡介之品彚儔匹也何計雙鳬乘鴈之去來揚雄傳譬若江湖之雀渤澥之烏乘鴈集不為之多雙鳬飛不為之少彼方惡蟹於水中解系傳我於水中見蟹且惡之東坡詩怒移水中蟹詳見前此敢探龍於頷下莊子河上有家貧恃緯蕭而食者其子沒於淵得千金之珠其父謂其子曰取石來鍛之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而寤子尚奚微之有哉伏念某自紆士服紆音於韻會縈也粗識亷隅説文亷仄也徐曰稜也儀禮注側邊曰亷禮記注堂亷謂堂基南畔亷稜之上隅陬也又方也角也詩維德之隅注疏隅者角亷者稜角必有稜以比屋之外角喻人貌由內而外正儒行近文章砥礪亷隅東坡詩夢回布被起亷隅萬物皆塵妄意古人之學業蔡襄詩世間萬物皆塵土留取功名久遠看一科不補墮身俗吏之簿書韓文豈不登名於一科兮曾不補其遺餘賈誼傳夫移風易俗使天下回心而鄉道類非俗吏之所能為也俗吏之所務在于刀筆筐篋而不知大體今趨蹌閣前之鈴韓詩點綴簿上字趨蹌閣前鈴雖倚賴天涯之釣杜詩倚賴天涯釣猶能掣巨鰲然於茍賤甘茂傳以茍賤不亷聞於世終不忍為誰誤兩連帥之知禮記五國以為屬屬有長十國以為連連有帥俾承三語掾之乏晉書阮瞻字千里司徒王戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良久即命辟之時人謂之三語掾比權量力等齊汩之與俱賈誼過秦論度長潔大比權量力則不可同年而語矣莊子與齊俱入與汩偕出詳見前商財計資真唯阿之相去韓文商財賄之有無計班資之髙卑老子唯之與阿相去幾何注同為應對而相去幾何疾時賤質而貴文老子翼云唯阿皆應聲唯恭而阿慢也吕吉甫云唯之與阿出于聲一也相去幾何奈朝有逐客之令李斯傳秦王乃除逐客之令使士無出位之思難恥過以作非尚書無恥過作非孔傳誤而文之遂成大非盍為法而受惡左傳孔子曰董狐古之良史書法不隱趙宣子古之良大夫也為法受惡彼有取爾藉不為鼷鼠而發機魏志杜襲為丞相長史時許攸不附太祖而有慢言欲先伐之襲曰千鈞之弩不為鼷鼠發機萬石之鍾不以莛撞起音區區許攸何足以勞神武哉太祖曰善仰而思之何苦與雞鶩而爭食屈原卜居寧與黃鵠比翼乎將與雞鶩爭食乎當望塵而雅拜潘嶽傳嶽性輕躁趍世利與石崇等諂事賈謐每候其出輒望塵而拜何武傳槃辟雅拜服虔人行禮容拜也嘗敷袵以陳詞離騷經跪敷袵以陳辭兮耿吾得此中正言語精神不能自明韓文意雖甚專事似率爾言語精神不能自明不蒙察允遽以慙歸頑頓奊詬殆於無恥陳平傳士之頑頓嗜利無恥者亦多歸漢注頑頓謂無亷隅也賈誼傳奊詬之節注奊詬謂無志分也奊音胡詰反杜陵既蹭蹬於垂翅忍辭大臣杜詩青冥卻垂翅蹭蹬無縱鱗又常擬報一飯況懷辭大臣韓子非狂惑而喪心豈傲相國韓愈釋言若夫狂惑喪心之夫蹈河而入火妄言罵詈者則有之矣而愈人知其無是疾也二公合處而會必曰韓愈亦人耳彼傲宰相又傲翰林其將何求今日之受非前日之受是吉人之辭寡躁人之辭多易將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈萬一矜從俾自得湖山之外韓文令修於户庭數日之間而人自得於湖山千里之外尺寸勉竭固猶在邦域之中孔光傳卒無尺寸之效恭惟某官勳塞兩儀繫辭易有太極是生兩儀惠斂一道韓文斂此大惠兮施施一川翕受敷施而下士之風厚見前注旁招謹簡而蓄德之地寬尚書旁招俊乂慎簡乃僚易君子多識前言往行以畜其德陜而東陜而西方宏周召之化史記召公世家自陜以西召公主之自陜以東周公主之注陜者蓋今宏農陜縣是也郡國志陜縣有陜陌二伯所分括地志陜原在陜州西南二十五里分陜從原為界洛之南洛之北自多溫石之材韓文東都固士太夫之冀北也恃才能深藏而不市者洛之北涯曰石生南涯曰溫生願從祝雞之翁列仙傳祝雞公者洛陽人也居尸鄉北山下養雞百餘年雞皆有名字千餘頭暮棲樹下朝放散之欲取呼名即種别而至賣雞及子得千餘萬輒置錢去之吳作池養魚後登吳山鴉雀數百常出其旁北夢瑣言李太尉德裕左降朱崖與段少常成式書曰自到朱崖幸且頑健居人多養雞往往飛入官舍今且作祝雞翁耳杜詩尸鄉餘土室難説祝雞翁徑返屠羊之肆見第一卷上董制置條庶不重勞於造化賈誼傳天地為爐兮造化為工莊子以天地為大爐造化為大冶淮南子造化者之攫援物也譬猶陶人之埏埴也抑令少遠於嫌疑禮記決嫌疑别同異某敢不洗濯其心左傳在上位者灑濯其心一以待人灑亦作洗山禮切説文滌也平帝紀灑心自新靖共爾位詩靖共爾位好是正直詳見前大鈞播物切勿為小智而私賈誼傳大鈞播物兮坱北無垠小智自私兮賤彼貴我通人大觀兮物無不可直道事人持此作曲成之報繫辭曲成萬物而不遺代趙縣丞上衛參帥師展參帥蓋衛涇時帥湖南進光範之三書昔徼一顧韓文伯樂一顧增價三倍餘見前試藍田之二令今𨽻四封韓文藍田縣丞廳記丞之職所以二令左傳我有四封而詰其盜何故不可張儀傳敝邑恐懼懾伏繕甲厲兵守四封之內事非出於天然谷永傳陛下天然之性詳見前誰肯為之地者灌夫傳武安謂灌夫曰程李俱東西宫衛尉今衆辱程將軍仲孺獨不為李將軍地乎注言今既毀程令李何地自安也田延年傳欲為道地切恃處囊之舊遂忘躍冶之嫌俱見前歲在丁卯之間丁卯謂寧宗開禧三年是年吳曦叛自稱蜀王日有戊申之奏趙充國傳六月戊申奏七月甲寅璽書報從充國計焉行人爭御下暴骨於三軍國語秦景公使其弟針來求成叔向命召行人子員行人子朱曰朱也在此叔向曰召子員子朱曰朱也當御叔向曰肸也欲子員之對客也子朱怒曰皆君之臣也班爵同何以黜朱也撫劒就之叔向曰秦晉不和久矣今日之事幸而集子孫饗之不集三軍之士暴骨夫子員道賔主之言無私子常易之姦以事君者吾所能禦也拂衣從之人救之權首逋誅上寒心者纍月後漢書夫為權首鮮或不及吳王濞傳毋為權首將受其咎殷浩傳寇讐稽誅姦逆並起東坡詩天誅亦久稽李斯傳足以為寒心荆軻傳足為寒心谷永傳臣永所以破膽寒心孫楚書引領南望良用寒心維時新豐之旅舊唐書馬周傳西遊長安宿於新豐逆旅忍愧宗周之嫠左傳嫠不恤其緯而憂宗周之隕虎守九關難叩閽而告天子離騷虎豹九關兮啄害下人些張衡賦呌帝閽使闢扉兮覿天皇於瓊宫鵲繞三匝遂升階而揖侍郎韓詩升階揖侍郎餘見前冒投銜袖之書韓文文書銜袖賈島詩銜袖有新詩欲見張與韓極論寢薪之勢賈誼傳夫抱火厝積薪之下而寢其上火未及然因謂之安恐坐西曹之謫陳遵傳曹事數廢西曹以故事適之注適讀曰謫按舊法令而罰之也反蒙東閣之延公孫宏傳起客館開東閣以延賢人師古曰閣小門也引之後堂使竭陳其議論待以前席多優假之過辭賈誼傳文帝前席師古曰漸促近誼聽説其言也不踰時聞所陳略施行矣賈誼傳贊追觀孝文元默躬行以移風俗誼之所陳略施行矣為知已死此意何敢忘耶史記士為知己者死女為悅己者容東坡與刁景純書吳興自晉以來賢守風流相望而不肖獨以罪去垢纍溪山景純相愛之深特與洗飾此意何敢忘耶伏念某強名皇宗其實素士南史始興王傳王儉嘗歎云始興王雖尊貴而行履都是素士寡更生之經術蹉跎太乙之期王子年拾遺記劉向于成帝之末校書天祿閣專精覃思夜有老人著黃衣植青藜杖叩閣而進見向暗中獨坐誦書老父乃吹杖端爛然大明因以照向説開闔以前事向因受洪範五行之文恐辭説繁廣忘之乃裂裳及紳以記其言至曙而去向請問姓名云我是太乙之精天帝聞金卯之子有博學者下觀焉乏太白之詞章牢落長庚之夢李陽冰草堂集序李白字太白涼武昭王九世孫驚薑之夕長庚入夢故生而名白以太白字之上林賦牢落陸離魏都賦臨災牢落鄢郢丘墟然猶可自别於流俗未嘗肯受知於衆人逢麴未免於流涎杜詩汝陽三斗始朝天道逢麴車口流涎恨不移封向酒泉見彈何嫌於求炙莊子且女大早計見卵而求時夜見彈而求鶚炙三吐哺而下白屋昔者見之蕭望之傳恐非周公相成王躬吐握之禮致白屋之意師古曰周公攝政一沐三握髮一飯三吐哺以接天下之士白屋謂白蓋之屋以茅覆之賤人所居説苑周公下白屋七十人而天下之士皆至髙彪傳垂接白屋王莽傳開門延士下及白屋吾丘壽王傳由窮巷起白屋一舉手而轉清波今其時矣韓文庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎欲卜終身之計試裁小子之章恭惟某官學覺天民忠結人主司馬遷傳有竒䇿材力之譽自結明主禮樂三千字早獨斡於倫魁夏竦詩縱橫禮樂三千字斡烏括切説文蠡柄也揚雄傳乃搜逑索耦臯伊之徒冠倫魁注冠等倫而魁傑才名四十年晚始參於政路杜詩才名三十年坐客寒無氊陳後山詩才名四十年盛氣蓋諸儒惟其已大而物小是以退易而進難禮記事君難進而易退則位有序易進而難退則亂也逺使問潞公之年幸其未老文彥博傳彥博逮事四朝任將相五十年名聞四夷元祐間契丹使耶律永昌劉霄來聘見彥博於殿門外卻立改容曰此潞公也耶問其年曰何壯也兒童誦君實之字持此安歸東坡詩兒童誦君實走卒知司馬持此欲安歸造物不我捨魏志鍾會傳我自淮南以來畫無遺䇿四海所共知也我欲持此安歸乎入亞秩於紫宸梁王僧辨表紫宸曠位江淹文衍教紫宸唐六典紫宸殿即內朝正殿也兩京記大明宫有紫宸殿在宣政殿北即內衙正殿唐會要右補闕施敬本疏紫宸殿者漢之前殿周之路寢出分符於赤社文帝紀初與郡守為銅虎符竹使符師古曰與郡守為符者謂各分其半右留京師左以與之史記三王世家受兹赤社展洞庭九州之大聊卧孤舟韓詩洞庭九州間厥大誰與讓南匯羣崖水北注何奔放瀦為七百里吞吐各殊狀措長沙千里之平如安九鼎韓詩長沙千里平左傳夏之有德貢金九牧鑄鼎象物又武王克啇遷九鼎於洛邑帖楚之衣裳一正帖音鐵通作怗廣韻安也服也公羊傳僖四年卒帖荆注服也博雅靜也榖梁傳衣裳之會十有一未嘗有插血之盟也信厚也歸周之衮繡何疑詩我覯之子衮衣繡裳公歸無所於汝信處馬勃牛溲儻廣儲藏之用韓文玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也鼠肝蟲臂敢干亭毒之中莊子以汝為鼠肝乎以汝為蟲臂乎又通於亭毒之表列子亭之毒之注亭毒化育也亭謂品其形毒謂成其質毒韻會音篤官豈以洵故冗邪士賢於隗者至矣俱見前某敢不服襲廉勤刮摩躁妄韓文刮垢磨光小草有遠志敢自詭於參苓世説謝太傅始有東山之志桓公見藥中有遠志公問謝此藥又名小草何以一物二名謝未即答郝參軍答曰處則為遠志出則為小草謝公殊有愧色山谷詩青松出澗壑十里聞風聲上有百尺松下有千歲苓自性得久要為人制頽齡小草有遠志相依在平生舊唐書元行沖傳行沖性不阿順嘗謂狄仁傑曰下之事上譬貴家儲蓄脯臘胰膎以供滋膳參术芝桂以防痾病門下堪充旨味者多願以小人備一藥物仁傑曰此吾藥籠中物何可一日無大匠無棄材或兼收於扂楔韓文送張道士詩大匠無棄材尋尺各有施况當營都邑杞梓用不疑進學解欂櫨侏儒椳闑扂楔各得其宜施以成室者匠氏之工也上安撫衛大參涇備老𣆀之役不贏數米之糧莊子老𣆀之役有庚桑楚者偏得老𣆀之道又簡髮而櫛數米而炊郭象注理錐刀之末也又南榮趎贏糧七日七夜至老子之所贏音盈方言儋也倚孔子之墻輒起鑄金之問揚子人有倚孔子之墻誦莊韓之書則引諸門乎曰在夷貉則引之倚門墻則麾之又或問世言鑄金金可鑄歟曰吾聞覿君子者問鑄人不問鑄金或曰人可鑄歟曰孔子鑄顔淵矣或人踧爾曰問鑄金得鑄人見彈固嫌於太早索裘尤戒於大寒敢因麴車之逢俱見前預祝甌窶之滿史記滑稽傳楚大發兵加齊齊王使淳于髠之趙請救兵齎金百斤車馬十駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰今者臣從東方來見道傍有禳田者操一豚蹄酒一盂而祝曰甌窶滿篝汙邪滿車五榖蕃熟穰穰滿家臣見其所持者挾而所欲者奢故笑之伏念某門庳無挾質弱不張迫於三釜之謀妄斗升之饞嚼莊子曾子曰吾及親仕三釜而心樂饞音讒與饞通叨也韓詩雖食八九無饞名嚼噬也或作噍山谷詩看人取卿相妄意亦饞嚼墮在一科之底空分寸以躋攀底下也韓詩躋攀分寸不可上失勢一落萬丈強尋飲露之湘纍楚辭飲菌苦之朝露兮揚雄反騷敬弔楚之湘纍栁文魂其安遊覲湘纍兮不以罪死曰纍難乞火於曹相蒯通傳初田榮叛項羽劫齊士不與者死處士東郭先生梁石君在劫中強從及榮敗二人醜之入深山隱居客謂通曰先生知梁石君東郭先生世俗所不及何不進之於相國乎通曰諾臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜而逐之婦過所善諸母語以事里母即束藴請火于亡肉家曰昨暮夜犬得肉爭鬬相殺請火治之亡肉家遽追呼其婦臣請乞火於曹相國乃見相國曰婦人有夫死三日而嫁者有幽居守寡者將何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君隱居不嫁願足下使人禮之相國曰敬受命皆以為上賔韓詩外傳齊有隱士東郭先生梁石君當曹相國為齊相也客謂匱生曰東郭先生梁石君世之賢也吾聞先生得謁曹相國願先生為之先臣里母相善婦見疑盜肉其姑去之恨而告于里母里母曰安行今令姑呼汝即束藴請火去婦之家曰吾犬爭肉相殺請火治之姑乃直使人追去婦還之故里母非談説之士束藴請火非還婦之道然物有所感事有適可何不為之先匱生曰請盡力為東郭先生梁石君束藴請火於是曹相國因匱生迎東郭先生梁石君元戎十乘忽來霄漢之邊詩元戎十乘以先啓行泰階六符首照盆盎之下東方朔傳願陳泰階六符詳見前盎於浪切廣雅盎謂之盆瓿􅀈罏缶也説文盎盆也山谷詩碌碌盆盎中陳簡齊詩盆盎三年裡詩名四海傳言監酒稅受約束於大府韓文以為當得躬詣大府受約束於下執事郅都傳郡守畏都如大府言猶如統屬之也付竿牘於小夫莊子小夫之知不離苞苴竿牘苦乏君房之語言賈捐之傳君房下筆言語妙天下輒冒晉公之書記新唐書舒元輿傳擢髙第有能名裴度表掌興元書記文檄豪傑一時推許代匱丞壁左傳凡百君子莫不代匱君子指在位者言君子或有匱乏之時不可不得人以代其事也韓文有藍田縣丞廳壁記承乏椽曹左傳攝官承乏言攝其官守承其空乏以事君猶云代匱杜詩椽曹乘逸興初無左右之容馬援傳無公輔一言之薦無左右為容之介亶為特達之遇四子講德論特達而相知者千載之一遇也招賢而處友者衆士之常路也韻會云特但也獨也禮記圭璋特達德也疏云行聘之時惟執圭璋特以通達不加餘幣今既數月矣幸免適於西曹陳遵傳西曹以故事適之師古曰適讀曰謫案舊法令而罰之也勤至他人乎盍輸誠於東閣左傳鄭六卿餞宣子於郊子太叔賦褰裳宣子曰起在此敢勤子至于他人乎子太叔拜詩子惠思我褰裳涉溱子不我思豈無他人宣子答言已今崇好在此不復令子適他人太叔拜以答之梅福傳且留我東閣欲借一陶之力將為再命之階近水樓臺諒不難於得月俱見前連雲門户幸無憚於捲簾唐元和中士人下第多為詩刺試官獨章孝標作歸燕詩獻庾承宣侍郎曰積壘危巢泥已落今年故向社前歸連雲大厦無棲處更傍誰家門户飛恭惟某官柱石朝家霍光傳將軍為國柱石師古曰柱者梁下之柱石者承柱之礎也言大臣負國重任如屋之柱及其石也朝家猶言朝廷新唐書劉巨容傳朝家多負人顔真卿傳朝家使程萬里統十萬衆自太行而來周必大詩朝家法備農啇信王安石詩須信朝家重儒術一時同榜用三人又尊賢優老朝家美又朝家意在取遺才權衡士類衡山千里暫勤申伯之于蕃禮記自江至於衡山千里而遙宋湖南安撫司在潭州即今長沙府也衡山在衡陽縣北詩維申及甫維周之翰四國于蕃四方于宣注四國有難則往捍禦之為之藩屏淇澳三章即詠武公之入相詩序淇澳美武公之德也有文章又能聽其規諫以禮自防故能入相於周美而作是詩也廣馬勃牛溲之蓄韓文牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也厚豕苓雞壅之儲莊子藥也其實堇也桔梗也雞癕也豕零也是時為帝者也注豕零即豬苓雞癕即雞頭名芡豈無他人皆借吹噓而送上詩豈無他人惟子之故杜詩揚雄更有河東賦惟待吹噓送上天頗有此客必蒙摸索於暗中謝安傳征西大將軍桓溫請安為司馬既到溫甚喜言生平歡笑竟日既出溫問左右頗嘗見我有如此客不餘見前忍飢既及於明年東坡詩忍飢待食明年麨詳見前卜稼請從於嗣歲禮記社之日位卜來年之稼詩載燔載烈以興嗣歲某縱無以報東坡祭韓忠獻公文雖無以報不辱其門敢負此心身雖未可以許人史記刺客傳老母在政身未敢以許人也注禮記云父母存不許人以死士固必伸於知己黑頭宰相必賸滋九畹之蘭俱見前白腳門生或請備一株之李談叢王泠然上裴耀卿書云拾遺補闕寧有種乎僕不佞亦相公一株之桃李也代上安撫乞寬假采杖禽姦罪已幾於失入見本卷首條洪鈞貸下情卒附於從輕貸音泰説文施也又借也愧在其肝東坡詩吾刀不汝問有愧在其肝感深至骨永言百吏之底杜詩有才無命百僚底山谷詩法當憔悴百僚底無如一尉之卑揚雄傳東南一尉白樂天詩王夫子送君為一尉東南三千五百里路途雖逺位雖卑月俸猶堪活妻子日噉二升便謂養鷹鸇以逐鳥雀南史傳僧祐與子琰並為山隂令著竒績時云諸傅有治縣譜不以示人時劉元明歷山隂令政常為第一琰子翽代元明為山隂令問元明答曰我有竒術卿家譜所不載作令唯日噉一升飯莫飲酒此第一䇿也左傳見無禮于其君者誅之如鷹鸇之逐鳥雀也夜半片紙常使摶虎豹而捕龍蛇稍遺亡命之徒張耳傳亡命遊外黃師古曰命者名也凡言亡命謂脫其名籍而逃亡吳漢傳亡命至漁陽蔡雍傳張敞亡命擢授劇州又亡命江海遠迹吳會王常傳亡命江海即褫告身而去褫音池説文奪衣也易終朝三褫之唐制凡選主者受行旨而奏行謂之奏受視品及流外則判補皆給以符謂之告身至德中專以官爵賞功及收散卒大將軍告身一通才易一醉江陵幾雜志唐告身初用紙肅宗朝有用絹者貞元後始用綾至有毫釐之謬禮記差之毫釐謬以千里又難三尺之逃杜周傳不循三尺法孟康曰以三尺竹簡書法律也要之為不捕之貓尉真無狀崔祐甫傳禮迎貓為其能食田鼠以其為人去害雖細必録今不能食鼠而反乳之貓職不修東坡集養貓以捕鼠不可以無鼠而養不捕之貓蓄犬以防姦不可以無姦而蓄不吠之犬史記鯀之治水無狀索隱曰言無功狀杜延年傳甚亡狀師古曰無善狀杜欽傳哀老姊垂白隨無狀子出關師古曰無狀猶言不肖賈誼傳自傷為傅無狀章帝紀詔刺史明加督察尤無狀者注謂其罪惡尤大其狀無可寄言故云無狀至於鞫受辨之鼠職在有司張湯傳父為長安丞出湯為兒守舍還鼠盜肉父怒笞湯湯掘薰得鼠及餘肉劾鼠掠治傅爰書訊鞫論報并取鼠與肉具獄磔堂下某之迂愚人所鄙笑無子真之骨浪求吏隱於吳門梅福傳福字子真九江壽春人也為郡文學補南昌尉王莽顓政一朝棄妻子去九江至今傳以為仙後人有見福于會稽者變姓名為吳門市卒云互見前李詩一尉居倐忽梅生有仙骨杜詩吏隱逢梅福遊山憶謝公非隨會之材安得盜奔於秦國左傳晉以士會將中軍於是晉國之盜逃奔於秦羊舌職曰吾聞之禹稱善人不善人遠此之謂也善人在上則國無幸民列子晉國苦盜晉侯問趙文子曰取盜何方文子曰周諺有言察見淵中魚者不祥智析隱匿者有殃君欲無盜莫若舉賢而任之於是用隨會而羣盜奔秦焉既青氊之物略在王獻之傳獻之夜卧齋中有偷兒入其室盜物都盡獻之徐曰偷兒青氊我家舊物可特置之而絳裾之迹粗明張敞傳敞守京兆尹長安市偷盜尤多敞乃召其酋長數人責問因貰其罪令致諸偷以自贖皆以為吏遣歸休置酒小偷悉來賀且飲醉偷長以赭汙其衣裾吏坐里閭閲出者汙赭輒收縛之絳或作縫虞詡傳潛遣貧人能縫者傭作賊衣以采綖縫其裾為幟有出市里者吏輒禽之悉上送官乞從辨究惟良折獄反責過差尚書非佞折獄惟良折獄罪無在多已聽惟行之令尚書惟厥罪無在大亦無在多又令出惟行人有不及誰原可恕之情晉書衛玠字叔寶好言元理常以人有不及可以情恕非意相干可以理遣故終身不見喜愠之容伏遇某官日月容光山藪藏疾左傳山藪藏疾瑾瑜匿瑕俯念鼠肝之細莊子以汝為蟲臂乎以汝為鼠肝乎難安雞肋之拳劉伶傳嘗醉與俗人相忤其人攘袂奮拳而往伶徐曰雞肋不足以安尊拳其人笑而止罪疑惟輕但令勿誤於庶獄尚書罪疑惟輕功疑惟重又其勿誤于庶獄惟有司之牧夫人誰無過寧忍求備於一夫左傳人誰無過過而能改善莫大焉尚書毋忿疾于頑毋求備于一夫致此孤危迄從寬假某敢不謹衡諸念深佩此恩王者之法若江河不再犯矣君子之過如日月願一洗之代上楊提刑求庇主會計之文書恐無多日瞻光華之禮樂將近二天見前亟函疵賤之名韓詩自嗟孤賤足瑕疵范石湖詩物情棄疵賤謹候涓疇之聽涓音蠲石奮傳為髙祖中涓陳勝傳涓人注涓人主潔除之人中涓官名主居中而涓潔者四人為儔律厯志疇人子弟伏念某一寒無似范雎傳范叔一寒如此哉禮記哀公曰寡人雖無似也注無似猶言不肖百拙有餘十年身事於考亭未聞大道宋道學名臣言行録晦翁晚居考亭作精舍曰滄洲號滄洲病臾千載胄傳於渭水安識壯圖史記齊太公世家西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔於是西伯獵果遇太公於渭之陽杜詩居然屈壯圖妄緣一日之長世説顧劭問龎士元吾與子孰愈曰陶冶世俗與時浮沉吾不如子論王霸之餘䇿覽倚伏之要害吾似有一日之長王圭曰臣於數子有一日之長躐受乙科之寵儒林傳乙科二十人為太子舍人中更家棘詩棘人欒欒兮傳棘急也箋急于哀戚之人形貌欒欒然瘦瘠遂爽戌瓜左傳齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代宋蕭參希通録云士大夫以交代為瓜期據此乃一季代守耳今例稱瓜期不當況因請代弗許而作亂非美事乎甘踸踔者九年莊子趻踔而行趻音踸義同踸踔行不進也始雎盱於寸祿雎翾規切説文仰目也盱胸于切説文張目也莊子盱盱雎雎前五行志萬衆睢睢一曰睢盱小人喜悅貌左思詩外望無寸祿內顧無斗儲李頎送盧少府詩行人懷寸祿小吏獻新圖白氏六帖縣尉一命寸祿王珣能令公喜恐未必然郗超傳超為大司馬桓溫參軍傾意禮待時王珣為溫主簿亦為溫所重府中語曰髯參軍短主簿能令公喜能令公怒超髯珣短故也孫寶安得自髙聊復爾耳孫寶傳士安得自高阮咸傳咸與籍居道南諸阮居道北北阮富而南阮貧七月七日北阮盛曬衣服皆錦綺燦目咸以竿挂大布犢鼻於庭人或怪之答曰未能免俗聊復爾耳北史慕容紹宗自云有水厄遂于戰艦中浴并自投於水冀以厭當之主簿房豹白曰公若實有水厄非禳所能卻若其實無禳之何有紹宗笑曰不能免俗為復爾耳惟是塵埃而捶楚韓詩判司卑官不堪説未免撻楚塵埃間詳見前孰為風雨之帡幪法言震風凌雨然後知厦屋之為帡幪也敢持矮屋之官天寶遺事進士張彖授華隂簿時縣令太守俱非其人多行不法張生有吏道勤于政每申舉一事則太守令尹抑而不從張生曰大丈夫有凌雲蓋世之志而拘于下位若立身于矮屋中使人擡頭不得遂拂衣遁于嵩山聊纍崇臺之芘恭惟某官果達而藝清任以和自其不辭於小官可卜晚成之大器老子大方無隅大器晚成大音希聲大象無形編之詩書而無愧肯詭十禽韓文編之乎詩書之䇿而無愧措之乎天地之間而無虧送以禮樂而有光遄驅四牡見前肅受周祥刑之寄尚書受王嘉師監于兹祥刑實專唐採訪之權唐百官志景雲三年置十道按察使開元二年改曰十道按察採訪處置使乾元元年改曰觀察置使展衡山千里而遙民無遺便禮記自江至于衡山千里而遙韓文凡為民去害興利若嗜欲於江西八州無遺便滋沅湘九畹之種士有特招楚辭濟沅湘以南征兮又余既滋蘭之九畹兮漢武帝紀朕嘉賢者樂知其人廣宣厥道士有特招使者之任也有如至賤以至愚自此受容而受察韓文宜行則行宜止則止受容受察不復進謝主簿自有職分雖無可備於使令韓文主簿尉乃有分職使臣周爰咨諏更乞曲加於全護詩載馳載驅周爰咨諏傳忠信為周訪問于善為咨咨事為諏箋爰於也大夫出使馳驅而行見忠信之賢人則于是訪問求善道也代許提幹上丞相宋建炎四年詔諸路提刑司除武臣提刑添置幹辦公事官許其存留文臣一員此提刑幹也熙寧六年提舉常平司置主管官五年改為幹辦公事此常平幹也宣和間置茶鹽提舉屬官一員此茶鹽幹也紹興十一年置提舉坑冶司幹辦公事一員此提泉幹也詳啓意當是坑冶司提幹贊冶鑄之司滿秩濡須之塢説文冶銷也遭熱即流遇冷即合與冰同意故從冰鑄讀如唾呪之呪説文銷金也董仲舒傳惟冶者之所鑄淮南子冶工之鑄器濡須水在今廬州府巢縣一名天河水俗呼馬尾溝源出巢湖吳志吕蒙傳蒙從權拒曹公于濡須勸權夾水口立塢宋龔相濡須塢詩南北安危限兩關迅流一去幾時還凄涼千古干戈地春水方生鷗自間宋提舉司治所在無為軍巢其屬邑也恃爐錘之舊歸身光範之門錘主纍切莊子皆在爐捶之間耳捶亦作錘皆治煆而為器者餘見前持幕府十年之蹤李廣傳莫府省文書師古曰莫府者以軍幕為義軍旅無常居止故以帳幕言之杜詩十年出幕府自可持旌麾干泰階六符之照見前切惟遺大投艱之日尚書豫造天役遺大投艱于朕身正任賢使能之時天既全付豫有家昆夷喙矣韓昌黎平淮西碑天既全付豫有家今傳次在豫豫不能事事其何以見郊廟詩混夷駾矣維其喙矣注混夷夷狄國也駾突喙困也見文王之使者將士衆過己國則惶怖驚走奔突入此柞棫之中而逃甚困劇也我惟無斁其康事蒸徒楫之尚書我惟無斁其康事公勿替刑四方其世享詩奉璋峩峩髦士攸宜渒彼涇舟蒸徒楫之注渒舟行貌蒸衆也渒渒然涇水中之舟順流而行者乃衆徒舟人以楫棹之故也興衆臣之賢者行君政令與其拮據捋荼之獨勞詩豫手拮據豫所捋荼豫所蓄租豫口卒瘏拮音吉據音居撠持撠據謂以手爪挶持草也荼萑苕也豫所捋者是荼之草言作巢之苦不若疏附奔走之分任詩豫曰有疏附豫曰有先後豫曰有奔奏豫曰有禦侮傳率下親上曰疏附相通前後曰先後喻德宣譽曰奔奏武臣折衝曰禦侮孔明之布公道先廣腹心蜀志諸葛亮評曰亮為相國撫百姓示儀軌均官職從權制開誠心布公道用心平而勸戒明可謂識治之良才管蕭之亞匹矣玄齡之訪賢才在恢耳目舊唐書房喬字玄齡署渭北道行軍記室參軍賊冦每平衆人競求珍玩玄齡獨先取人物致之幕府使嘉魚不入於釣罩詩南有嘉魚蒸然罩罩疏嘉魚喻賢者有善德罩音笊傳罩罩籗也捕魚器也籗助角反捕魚籠也爾雅籗謂之罩李巡曰編細竹以捕魚也韓詩依然當鼎味豈不辱釣罩則凡馬空費於豆芻誠能開衆正之路杜羣枉之門劉向傳杜閉羣枉之門廣開衆正之路何難建久安之勢成長治之策賈誼傳天下順治海內之氣清和咸理名譽之美垂于無窮建久安之勢成長治之策以承祖廟以奉六親至孝也恭惟某官清和而任直大以方續師保萬民之功人羡魯公之拜後尚書惟周公師保萬民民懷其德宋史理宗紹定六年史彌遠進太師左丞相兼樞密使魯國公加食邑一千户開父子三公之美天諒史丹之推誠史丹傳贊史丹父子相繼高以重厚位至三公丹之輔道副主掩惡揚美傅會善意雖宿儒達士無以加焉不惟歸齊疆之侵法言孔子用于魯齊人章章歸其侵疆又將取燕人之悅寧王遺寶果全璧以來歸尚書寧王遺我大寶龜史記藺相如傳趙惠文王時得楚和氏璧秦昭王聞之願以十五城請易璧趙王求人可使報秦者相如曰臣願捧璧往使城入趙而璧留秦城不入臣請完璧歸趙宋史寧宗嘉定十五年正月朔御大慶殿受恭膺天命之寶詳見首卷代趙催綱上丞相條下國綴旒爭奉珍而入賀詩帝命式於九圍受大球小球為下國綴旒注綴結也旒旌旗之垂者小玉謂尺二寸圭大玉長三尺珽湯既為天所命則得用之是受之於天故言受也湯執圭搢珽以與諸侯會同結定其心如旌旗之旒縿著焉諒思翕受於九德尚書翕受敷施九德咸事益用勤施於四方尚書惟公德明先於上下勤施於四方庶幾折千里之衝見前無使有一朝之患如某者揆材無似禮記哀公曰寡人雖無似注無似猶言不肖知命不猶詩彗彼小星維參與昴肅肅宵征抱衾與裯實命不猶注猶若也不若者言禮命之數不同此借用向者偶然一第之登固在作者七人之後再命既升於畿幕周禮再命受服選詩結綬登王畿三熏幾沐於甄陶韓文三浴而三熏之不虞局促之駒灌夫傳局促效轅下駒竟作差池之燕詩燕燕于飛差池其羽箋謂舒張其尾翼一星終矣左傳十二年矣是謂一終一星終也歲星十二歲一周天十日寒之兹偶幸於章交漢書章交公車復得瞻於禮樂草茅言天下聊復陳千一之愚新唐書馬周傳贊周之遇太宗顧不異哉由一介草茅言天下事若素宦于朝明習憲章者非王佐才疇以及兹韓信傳愚者千慮必有一得桃李在公門或不罪再三之獻見上卷代見丞相條代王丞上丞相躡南墻之故迹有幸終更韓文藍田縣丞廳壁記庭有老槐四行南墻巨竹千挺更工衡反漢書注天下人皆直戍邊三日亦名為更律所謂繇戍也谷永與段會宗書終更亟還企東閣之翹材無能為役西京雜記平津侯開東閣營客館以招天下賢士一曰欽賢館以待大賢次曰翹材館以待大材次曰接士館以待國士左傳於先大夫無能為役言不足為其役使也徒以生三台之下久於望六符之光俱見前既乏根柢之先容鄒陽傳蟠木根柢輪囷離竒而為萬乘器者以左右為之先容也恐成草木之徒腐後漢書朱穆傳彼與草木俱朽此與金石相傾新唐書髙儉竇威傳贊髙竇雖緣外戚姻家然自以才猷結天子厠迹名臣垂榮無窮時有遇合故見諸事業古來賢豪不遭興運埋光鏟采興草木俱腐者可勝吒哉東坡淮隂侯廟碑使水行未殞火流猶潛則將軍與草木同朽麋鹿俱死敢修駢斐敬布依歸伏念某赤城迂儒孫靈符會稽記赤城山土色皆赤巖岫連沓狀似雲霞懸霤十仞謂之瀑布飛流灑散冬夏不竭山谷絶澗崢嶸無底長松葛藟幽藹其上又云赤城山內則有天台虛嶽玉室璿臺名山略記赤城山一名燒山其上石壁皆如霞色望之如雉堞故名東鄉司君所居洞周回三百里上有玉清平天按赤城山在天台縣北六里為第六大洞天白屋賤士蕭望之傳非周公致白屋之意師古曰謂白蓋之屋以茅覆之賤人所居詳見前壯歲從燭湖之學敢論同門之朋中年題慈恩之名偶直更弦之化托言神龍以來杏園宴後皆於慈恩寺塔下題名同年中推善書者記之他日有將相則朱書之戴氏鼠璞云豫得唐鴈塔題名刻細閲之凡留題姓名僧道士庶前後不一非止新進士也唐進士時于曲江宴賞之暇有此會猶今北使過錢塘例於浙江觀潮天竺焚香耳若以鴈塔題名為登第慶賀之辭則觀潮燒香亦可顓言穹廬之來使乎雖已長伯樂之廄韓文是生於匠石之園長於伯樂之廄者也未及掃曹相之門見前供簿四方空釣鰲於海上侯鯖録李白謁宰相板上題云海上釣鰲客李白宰相問曰先生臨滄海釣巨鰲以何物為釣線白曰以風波逸其情乾坤縱其志以虹霓為線明月為鈎又曰以何物為餌白曰以天下無義氣丈夫為餌宰相竦然杜詩舍弟卑棲邑防川領簿曹又云倚賴天涯釣猶能掣巨鰲此兼用兩事二令一邑聊聽鶴於雲間陸機傳華亭鶴唳豈可復聞乎適逢操刀製錦之傷左傳子皮欲使尹何為邑子産曰不可猶未能操刀而使割也其傷實多子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎連為越俎代庖之役莊子庖人雖不治庖尸祝不越尊俎而代之士民相安其勞拙陽城傳撫字心勞征科政拙臺府過謂之亷勤然所謂推轂之章漢書吕氏雅故本推轂髙帝就天下馮唐傳跪而推轂鄭當時傳其推轂士及官屬丞史師古曰言薦舉人如推轂之運轉也田蚡傳推轂趙綰為御史大夫師古曰謂升薦之若轉車轂之為也竟奪於負舟之力莊子藏山於澤藏舟於壑謂之固矣然而夜半有力者負之而趨昧者不知也辟書在手元非夢鹿之真阮籍傳辟書始下下走為首栁文垂露在手清風入懷列子鄭人有薪于野者遇駭鹿而斃之藏諸隍中覆之以蕉俄而遺其所藏之處遂以為夢順塗而詠其事傍人用其言而取之薪者不厭失鹿其夜真夢藏之之處又夢得之之主遂訟而爭之士師曰若初真得鹿妄謂之夢真夢得鹿妄謂之實請二分之以聞鄭君鄭君曰士師將復夢分人鹿乎銓法如毛率是待羝之乳杜詩秦時用商鞅法令如牛毛蘇武傳牧羝羝乳乃得歸師古曰羝牡羊也羝不當乳故設此言示絶其事若燕太子丹烏頭白馬生角之比也極知乾璞應劭傳昔鄭人以乾鼠為璞鬻之於周宋愚人亦寶燕石緹緁十重夫覩之者掩口胡盧而笑難問大鈞劉禹錫有問大鈞賦詳見前然橘柚柤梨既匪老人之宜種莊子柤梨橘柚其味相反而皆可于口老泉集譬如豫章橘柚非老人所種也椳闑扂楔惟祈宰相之兼收見前代趙縣丞上衛參帥條况大臣以至公為心令匹夫無不被其澤敢以尚能起拜之賤黃霸傳長吏許丞老病聾督郵白欲逐之霸曰許丞亷吏雖老尚能拜起迎送正頗重聽何傷善助之毋失賢者意仰依雜進巧拙之仁韓文登明選公雜進巧拙紆餘為妍卓犖為傑恭惟某官世濟王勳周禮夏官司勳王功曰勳注輔成王業若周公家傳相業我聞在昔有伊尹伊陟之相望尚書我聞在昔成湯既受命時則有若伊尹格於皇天在太戊時則有若伊陟臣扈格于上帝民到于今稱召虎召公之是似召康公奭十六世孫召穆公虎佐宣王平淮夷故江漢之詩曰王命召虎來旬來宣文武受命召公維翰豫曰無小子召公是似注似嗣也汝之所為乃嗣汝先祖召公之功然雖箕裘於鼎鼐禮記良冶之子必學為裘良弓之子必學為箕疏裘衣裘也良冶之子習見世業陶鑄金鐵使之柔合以補治破器故子弟仍學為裘續補獸皮片片相合箕栁箕良弓之子習見世業使幹角屈撓調和成弓故子弟仍學為箕取栁之和軟撓之成箕説文鼎三足兩耳和五味之彛器也爾雅鼎絶大謂之鼐漢書宣帝時漢陽得寶鼎上刻書曰王命尸臣云云張敞議曰殆周之褎賜子孫刻銘其先功者也杜詩調和鼎鼐新未能粉澤於旗常釋名九旗之名日月為常畫日月于其端天子所建言常明也交龍為旗旗倚也畫作兩龍相倚依也通以赤色為之無文采諸侯所建也周禮司勳凡有功者銘書于王之太常按鼎鼐旗常皆銘功之物詎如格天格帝之勳卓乎是父是子之懿揚子法言石奮石建父子之美也無是父無是子無是子無是父從容而調萬化談笑而制四夷六十之甲子甫周已是十六年之相國宋史寧宗嘉定元年冬十月史彌遠為右丞相此啓蓋十六年所上八千歲之春秋方盛會當率千八百而朝王莊子上古有大椿者以八千歲為春八千歲為秋賈誼傳春秋鼎盛淮南子禹決江疏河隨山刋木平水土定千八百國賈山傳昔者周蓋千八百國孔融傳九牧之地千八百君諒圖百志之惟熙尚書疑謀勿成百志惟熙益思九德之咸事尚書九德咸事老者之閲少者之決參用所長十二國史齊子竒年十八齊君任為東阿既行矣君悔之使追焉使者不追還曰臣見所與同載者白首矣夫老者之智少者決之此必能理東阿矣洋然而動于然而來各安所適韓文今若聞有以書進宰相而求仕者而宰相不辱焉而薦之天下枯稿沉溺魁閎寬通之士必且洋洋焉動其心峩峩焉纓其冠于于焉而來矣公有無窮之聞尚書公其惟時成周建無窮之基則亦有無窮之聞邦其永孚于休尚書君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休尚念某壯雖無聞老尚有志王通之門出房杜或能垂記於賈瓊杜淹文中子世家王通字仲淹隋文帝時奏太平十二策公卿不悅文中子知謀之不用也乃續詩書正禮樂修元經讚易道九年而六經大就門人自遠而至河南董常大山姚義京兆杜淹趙郡李靖南陽程元扶風竇威河東薛收中山賈瓊清河房元齡巨鹿魏徴太原溫大雅潁川陳叔達等咸稱師北面受王佐之道焉諸葛之器亞管蕭終不遺於廖立蜀志諸葛武侯傳贊器能政理抑亦管蕭之亞匹也廖立傳立字公淵武陵臨沅人先主以為巴郡太守後主襲位徙長水校尉立本意自謂才名宜為諸葛之二而更遊散常懷怏怏丞相亮表廢為民立躬耕自守聞亮卒垂泣歎曰吾終為左袵矣代趙尉上丞相寒酸一尉不當詣相國之門韓詩酸寒溧陽尉齋沐三熏輒復飾小夫之櫝韓文方將坐足下三浴而三熏之莊子小夫之智不離苞苴竿櫝忘此身之為不肖韓文忽忘身之不肖兮謂青紫其可拾恃在上之有仁人韓文今有仁人在上若不往告之而遂行是果於自棄而不以古之君子待吾相也斐然抽毫謝莊賦抽毫進牘以命仲宣惕若負刺易君子終日乾乾夕惕若霍光傳若有芒刺在背切惟大臣事君以得士為急後學進身於知己獨難如將恥有道之賤貧東坡集忠臣可使死封疆而不能受無根之謗議志士本不求富貴而不能安有道之賤貧烏得安不求之聞達諸葛丞相出師表臣本布衣躬耕於南陽茍全性命于亂世不求聞達于諸侯故水火之急當大聲而疾呼呼呼箇切韓文蹈水火者之求免於人也不惟其父兄子弟之慈愛然後呼而望之也將有介於其側者雖其所憎怨茍不至乎欲其死者則將大其聲疾呼而望其仁之也而根柢之容患無因而至前鄒陽傳明月之珠夜光之璧以暗投人於道衆莫不按劒相眄者何則無因而至前也燕趙如椎汝潁如錐所愧處囊之無穎啓顔録祖士言與鍾雅相嘲鍾曰我汝潁之士利如錐卿燕代之士鈍如鎚祖曰以我鈍捶打汝利錐鍾曰自有神錐不可得打祖曰既有神錐亦有神捶鍾遂屈史記平原君傳毛遂曰使遂得蚤處囊中乃脫穎而出非特末見而已天地為爐隂陽為炭何嫌躍冶之不祥賈誼傳天地為爐兮造化為工隂陽為炭兮萬物為銅莊子今大冶鑄金金踴躍曰我且為莫邪大冶必以為不祥之金惟其有不並蓄而俱收韓文俱收並蓄待用無遺然後可以高舉而遠引以古待吾相儻未獻昌黎之書韓文上宰相書聞古之君子相其君也一夫不獲其所若已推而內之溝中今有仁人在上位若不往告之而遂行是果於自棄而不以古之君子之道待吾相也況懷辭大臣何敢賦少陵之句杜詩常擬報一飯況懷辭大臣輒忘三瀆易再三瀆瀆則不告猶幸一陶崔駰傳壞冶一陶恭惟某官道純粹精易大哉乾乎剛健中正純粹精也德直方大東坡賀韓丞相啓如乾之中正挺然而純粹精如坤之六二隤然而直方大恢然秉鈞當軸之望車千秋傳贊車丞相履伊尹之列當軸處中見於縫掖章甫之時禮記哀公問於孔子曰夫子之服其儒服與孔子對曰某少居魯衣縫掖之衣長居宋冠章甫之冠注縫猶大也大掖之衣大袂禪衣也六館諸生仁勇未窺其全美唐百官志祭酒司業掌邦國儒學訓導之政令有六學一國子學二太學三四門四律學五儒學六算學也昌黎太學生何蕃傳歐陽詹生言曰蕃仁勇人也或者曰蕃居太學諸生不為非義葬死者之無歸哀其孤而字焉惠之大小必以力復斯其所謂仁歟蕃之力不任其體其貌不任其力吾不知其勇也歐陽詹生曰朱泚之亂太學諸生舉將從之來請起蕃蕃正色叱之六館之士不從亂兹非其勇歟三年博士聖賢已兆於相逄韓文三年博士冗不見治又聖賢相逢治具畢張方將破崖岸而為文韓文既噤不得施用則盡枿去牙角一躡故蹤破崖岸而為文俄遽登瀛洲而給札唐太宗初作文學館以房杜等十八人為學士每訪以詩書政事號十八學士命閻立本圖像以章禮賢天下仰慕謂之登瀛洲司馬相如傳上令尚書給筆札師古曰札木簡之小薄者也時未多用紙故給札以書獨儀烏府朱博傳御史府中列柏樹常有野烏數千棲宿其上晨去暮來號曰朝夕鳥數進鯁言鯁通作鯁徐氏曰古有骨鯁之臣遇事敢刺鯁不從俗也漢陳平傳至諸史中五六處字皆從魚廣韻刺在喉又骨鯁謇諤之臣謂直言難受如骨之咈咽歐陽氏曰骨鯁二字説者多誤以骨刺喉為説宋景文以骨強四支冠其上以骨書之蓋欲正世人之失又於本贊尾後出鯁正一語蓋欲互見二字可通用二字訓堅強正直之義骨鯁猶言骨立之類按新唐書李棲筠傳贊云剛者天德故孔子稱剛近仁骨強四支故君有忠臣謂之骨鯁又云吉甫踐天宰謀謨是矣而鯁正有愧於父云旋升端殿之崇後唐明宗始置端明殿學士以馮道趙鳳為之宋明道二年改承明殿為端明殿復置學士以宋綬為之寖陟宥庭之密詩基命宥密注宥寬密寧也此借用宋人以樞密院為宥庭領衆職甚稱上意獨與漢樞魏相傳宣帝始親萬機厲精為治練羣臣核名實而相總領衆職甚稱上意有一德克享天心迄調商鼎尚書惟尹躬暨湯咸有一德克享天心受天明命東方朔傳伊尹負鼎俎和五味以干湯璇璣密運平象緯於泰階尚書在璿璣玉衡以齊七政文選玉衡正而泰階平杜詩天闕象緯逼寶厯紹開演鴻休於神策梁書畏上天而躬寶厯史記封禪書黃帝得寶鼎神策又天增授皇帝太元神策退小人進君子邦其永孚于休尚書君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休扶皇極正人心公有無窮之聞尚書公其惟時成周建無窮之基則亦有無窮之聞然且日下七十士而無驕士之色劉向説苑周公旦白屋之士所下者七十人而天下之士皆至抑將歲用八百員而破限員之私舊唐書崔祐甫傳常衮當國雖賄賂稍絶然無所甄異故賢愚同滯及祐甫代衮薦延推舉無復疑滯日除十數人作相未逾年凡除吏幾八百員多稱允當新唐書李絳傳崔祐甫為宰相不半歲除吏八百員德宗曰公多姻故何耶祐甫曰所問當與不當耳非臣親故孰知其才無毫髮絲粟之遺老泉集方是之時天下之人毛髮絲粟之材紛紛然而起合而為一為木屑竹頭之用陶侃傳時造船木屑及竹頭悉令舉掌之咸不解所以後正會積雪始晴廳事前餘雪猶濕於是以屑布地及桓溫伐蜀又以侃所貯竹頭作丁裝船其綜理微密皆此類也洋洋動于于來者皆有歲不我與之歎韓文洋洋焉動其心峩峩焉纓其冠于于焉而來矣衮衮登紛紛厭者復無世不吾知之憂杜詩諸公衮衮登臺省廣文先生官獨冷甲第紛紛厭粱肉廣文先生飯不足自非頑頓奊垢而悉無寸長賈誼傳頑頓無恥奊詬無節師古曰頓音鈍奊音胡結反詬音后謂無志分也説文奊頭斜骫奊態也集韻傾頭作態也音纈孰不呌呼攀援以求伸尺屈繫辭尺蠖之屈以求信也龍蛇之蟄以有身也伏念某叨承王胄僅讀父書趙奢傳括徒能讀父書傳不知合變也乏李白之文章莫望六丁之取韓詩李杜文章在光焰萬丈長平生千萬篇金薤垂琳琅仙官勑六丁雷電下取將流落人間者太山一豪芒無劉向之經術難希太乙之知見前代趙縣丞上衛參帥條顧念青氊王獻之傳青氊我家舊物悉由白戰漁隱叢話云歐公守汝隂因雪會客賦詩禁體物語如玉月梨梅練絮露鵠鵝銀等事皆禁勿用東坡守汝隂得雪會飲聚星堂約客賦詩效歐公體不以鹽玉鶴鷺等為比不使皓白鮮素等事落句云汝南先賢有故事醉翁詩語誰續説當時號令君聽取白戰不許持寸鐵常恐墜箕裘之緒見上條且重為門户之羞晉書郤鑒傳是臣門户子弟孫盛傳自是關君門户事南史王曇首傳門户何寄王訓傳是興門户者陸慧曉傳顧琛一公兩椽英英門户王奐傳百年門户宜思後計夏侯湛傳承門户之業王茂傳成門户者必此兒也新唐書姦臣傳許敬宗除著作郎喜謂所親曰仕宦不為著作無以成門户故自脫懷綳以來綳通作繃音與崩同説文束也廣韻束兒衣漢書襁褓孟康注即今小兒繃韓詩爵勳逮僮𨽻簪笏自懷繃惟知力筆硯之技解后兩隨於秋計蹉跎獨黜於春官並見前再屈於人未能續三世登科之記揮麈録李昌武宗諤之子昭遘十八歲鎖廳及第昭遘子果卿果卿之子士亷皆不逾是歲登甲科三世俱曽為探花郎亦衣冠盛事也東觀奏記宣宗尤重科目鄭皓知舉帝索科自記皓撰十三卷自武德至大中仍乞今後放榜録及第人姓名記賦題進入有司按續編次此登科記之始也宋洪適編大宋登科記三十二卷自建隆庚申迄紹興庚辰二萬三千六百人有竒李椿撰中興登科小録三卷自建炎戊申至嘉熙戊戌取名字鄉貫三代諱刋之一行作吏亦既踰十年不調之期見前墮在常鱗凡介之行韓文蓋非常鱗凡介之品彚匹儔也絶無蚍蜉蟻子之援韓文當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳歸意濃而宦情薄徒索米以何為東坡送路都曹詩序乖崖公在蜀有録事參軍老病廢事公責之曰何不歸明日參軍求去且以請留别其略曰秋光都似宦情薄山色不如歸興濃公驚歎曰吾過矣同僚能詩而吾不知因留而慰薦之餘見前君恩重而臣命輕欲製衣而豈敢東坡到昌化軍謝表恩重命輕咎深責淺離騷製芰荷以為衣俯隨篲擁揚雄傳或擁帚篲而先驅應劭曰鄒衍之燕昭王郊迎擁篲為之先驅師古曰篲亦以掃者也互見後仰賴甄收惟其識我公之如古人是以提孤身而進門下所望翹材之館不遺光範之書並見前或一經於品題李白與韓朝宗書一經品題便作佳士必百倍於光價唐文粹生其羽翼長其光價韓詩光價豈止百倍過小草有遠志已為深根固蒂之謀山谷詩小草有遠志相依在平生醫和不並世深根且固蒂人言可醫國何用太早計小大材則殊氣味固相似老子是謂深根固蒂長生久視之道大厦無棄材願借枯木朽株之託韓詩大匠無棄材尋尺各有施鄒陽傳有人先遊則枯木朽株樹功而不忘代上宣同知繒宋史本傳宣繒慶元府人嘉泰三年太學兩優釋褐歷官兵部尚書嘉定十四年同知樞密院事兼參知政事卒贈太師諡忠靖登庸瑣闥尚書疇咨若時登庸孔傳誰能咸熙庶績順是事者將登用之李頎詩徒言青瑣闥不愛承明廬翊贊機庭五材誰能去兵實自右樞而基命左傳天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也詩基命宥密注基始命信宥寬密寧也四人丕單稱德聿觀左袵之革心尚書惟兹四人昭武王惟冒丕單稱德孔傳使布冒天下大盡舉行其德又四夷左袵罔不咸賴一賢得輿易剝上九君子得輿小人剝廬疏君子居之則為民覆蔭使得全安則得車輿也多士舉笏自警編仁宗問王懿敏曰大寮中孰可命以相事者懿敏曰下臣其敢言帝曰姑言之懿敏曰惟宦官宫妾不知姓名者可充其選帝憮然有間曰唯富弼耳懿敏下拜曰陛下得人矣既告大庭相富公士大夫皆舉笏相賀或密以聞帝益喜曰吾之舉賢於夢卜矣劉後村詩話富公由并州入相外庭至于舉笏相賀王逢原獨云要須待見成堯舜未敢輕浮作頌聲所見高于石徂徠一等矣恭惟某官心潛百聖法言敢問潛心于聖曰昔仲尼潛心於文王矣達之顔子亦潛心於仲尼矣未達一間耳識洞萬微尚書一日二日萬幾孔傳幾微也兩學諸生共服何蕃之仁勇詳見前繒由太學兩優釋褐三年博士獨推韓愈之公明韓文三年博士冗不見治又進學解諸生業患不能精無患有司之不明行患不能成無患有司之不公繒由太學博士召試為校書郎六鼇方戴於海中列子渤海之中有大海焉實惟無底之谷其中有五山焉一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊五山之根無所連著常隨波上下帝使巨鼇十五舉首而戴之五山始峙而龍伯之國有大人暨五山之所一釣而連六鼇華嶠後漢書學者稱東觀為老氏藏室道家蓬萊繒嘗為祕書少監千騎忽臨於江右漢書東方千騎長人古辭陌上桑東方千餘騎夫壻居上頭繒權考功郎出知吉州即今吉安府載馳使蕩周禮掌節以英蕩輔之注謂為函器盛飾繒提點福建刑獄重入郎闈遷考功員外郎進領袖於羣仙晉書魏舒堂堂人之領袖又後進領袖有裴秀唐詩引領羣仙上紫微文選羣仙縹眇餐玉清涯廣登庸於千佛唐王保定托言張倬柬之之孫數舉進士不第捧登科記頂上戴之曰此千佛名經也楊誠齋詩強仕初登千佛名合從碧落韻會碧落天也杜詩碧落真難陟青雲不可梯李詩步綱繞碧落王摩詰詩鳳扆朝碧落又碧落風煙外李陟詩碧落高高雲萬里山谷詩心似蛛絲遊碧落徑啓黃扉翰苑新書漢丞相金印紫綬黃扉熊轓所以異車服於百辟也宋子京詩七年辭玉署再入佐黃扉顧展轉於納言尚書命汝作納言復回翔於批勑禮記回翔焉李蕃傳蕃遷給事中勑有不可遂於黃紙後批之吏曰宜别連白紙蕃曰别以白紙是文狀也何名批勑耶公蓋得賢人之久繫辭可久則賢人之德上亦占已日之孚易革巳日乃孚彖曰已日乃孚革而信之注民可與習常難與通變故革之為道即日不孚已日乃孚也比繹師虞尚書出入自爾師虞庶言同則繹孔傳出納之事當與衆言度之衆言同則陳而布之晉陪兵柄繒試吏部侍郎權兵部尚書精神千里李尋傳本強則精神折衝家語折衝千里之外掌股四夷國語將還玩於掌股之上以得其志注還轉也玩弄也脛本曰股袁紹傳譬之嬰兒在掌股之上絶其哺乳立可餓殺張元傳則邊章之徒宛轉掌股之上矣齊人歸鄆歡之田曾無亡矢遺鏃之費春秋定公十年齊人來歸鄆歡龜隂田三田即汶陽田為齊所侵者賈誼過秦論九國之師逡巡遁逃而不敢進秦無亡矢遺鏃之費而天下諸侯固已困矣宋史嘉定元年金人來歸大散關及濠州蓋以韓托胄首易之也竇憲據高文之憤必有犁庭掃穴之期班固勒燕然山銘有漢元舅竇憲爰該六師跨安候登燕然躡冒頓之區落焚老上之龍庭將上以攄高文之宿憤光祖宗之元靈漢書胸奴傳犁其庭掃其閭郡縣而置之師古曰犁耕也然所憂正重於所欣王羲之傳與會稽王箋陳殷浩不宜北伐并論時事曰今雖有可欣之會內求諸已而所憂乃重於所欣傳曰自非聖人內寧必有外憂故知己當詳於知彼孫武子凡戰知已知彼然後可也知己知彼百戰不殆不知彼而知己一勝一負不知彼不知己每戰必敗惟事事備難察察言俱見第一卷首條寇萊公之拜同知邊徼聞風而交懼寇凖傳凖字平仲華州下邽人淳化二年拜諫議大夫樞密院副使改同知院事范文正之除副使士夫置酒以相歡職官分紀慶厯初方委任韓琦范仲淹入討元昊元昊大懼上表稱藩上曰昊賊納欵皆琦仲淹之力也即召為樞密副使天下聞之欣然士夫皆酌酒相賀曰上用韓琦范仲淹非惟為社稷之福乃天下生民之幸世皆以此望公公當出而拯世天民非豫覺而誰也惟尹暨湯尚書惟尹躬暨湯咸有一德宰相以時來則為之安劉必勃張嘉貞傳宰相者時來則為之豈能長據詳見前高帝紀周勃厚重少文然安劉氏者必勃也如某者夙持蹇拙栁文驅去蹇拙手目開利全蹈迂疏恥忍貧於有道之邦強顔拾第見前疾沒世於無稱之域妄意策名左傳策名委質魏志臧洪傳吾子託身於盟主臧洪策名於長安韓文況策名於薦書效官既局於卑微莊子智效一官杜詩名位豈肯卑微休臨事每牽於才分分符問切徒持文墨蕭何傳徒持文墨議論頗慕老蒼杜詩結交皆老蒼韓詩田巴兀老蒼山谷詩兒中兀老蒼縫霧裁雲本欲和其聲而鳴國家之盛杜詩裁縫雲霧成御衣韓文抑不知天將和其聲而使鳴國家之盛耶抑將窮餓其身思愁其心腸而使自鳴其不幸耶穿天出月今乃破其體而成窮苦之言皇甫湜顧況集序逸歌長句駿發踔厲往往穿天心出月脅意外驚人語非尋常所能及也韓文歡愈之辭莫工窮苦之辭易好張文潛集唐之晚年詩人類多窮士如孟東野賈閬仙之流皆以刻琢窮苦之言為工東坡詩胡為三十載尚作窮苦辭人憐王某之文最宜為誥昌黎王仲舒神道碑天子曰王某之文可思最宜為誥豈可久以吏事役之復拜中書舍人自笑盧殷之讀止用資詩昌黎盧殷墓志君能為詩自少至老詩可録傳者在紙凡千餘篇無書不讀然止用以資為詩然使之作一頌以勒燕然竇憲傳憲與北單于戰於稽落山大破之斬名王以下萬三千級降者前後二十餘萬人遂登燕然山去塞三千餘里刻石勒功紀漢威德令班固作銘又否則草尺書而招贊普新唐書吐畨列傳吐畨本西羌屬在析支水西其俗謂強雄為贊丈夫曰普故號君長曰贊普東坡詩小臣願對紫薇花試草尺書招贊普於人未肯多遜昌黎潮州謝上表紀泰山之封鏤白玉之牒鋪張對天之閎休揚厲無前之偉績雖使古人復生臣亦未肯多讓雖老尚堪一行舊唐書李靖傳吐谷渾冦邊太宗顧謂侍臣曰得李靖為帥豈非善也靖乃見房元齡曰靖雖年老固堪一行騎驢到京自己舉頭於白日昌黎孟生詩騎驢到京國欲和熏風琴舉頭看白日泣涕下霑襟上馬橫槊誰令仰脅於青天槊色角切矛屬通作矟南史桓榮祖傳或曰何不讀書榮祖曰曹操曹丕上馬橫槊下馬談論此可不負飲食矣君輩無自全之技何異犬羊乎李詩蜀道難難於上青天又捫參歷井仰脅息不惟入悽愴之岷山岷山在今茂州即隴山之南首直上六十里可望成都山海經岷山江水出焉而東流注於大江杜詩珠玉走中原岷峨氣悽愴又使度嗚咽之隴水隴山在隴州西北六十里山高而長其頂有泉説文云隴山天水坂也辛氏三秦記云隴西關其坡坂九回不知高幾里欲上者七日乃越高處可容百餘家下處數十萬戶其上有清水四注俗歌曰隴頭流水鳴聲幽咽遙望秦川心肝斷絶去長安千里望秦川如帶閩中人上隴者還望故鄉悲思而歌則有絶死者周地圖記云其山高處可三百里登高東望秦川可五百里目極泯然桑梓與雲霞一色其上有懸溜吐於山中為澄潭曰萬石潭流溢散下皆注於渭東人西役升此而望故鄉莫不悲思其歌云隴頭泉水流離西下念我行役飄然曠野登高望遠涕淚雙墮是此山也杜詩磨刀嗚咽水奪其數寸之管管筆管也崔豹古今注蒙恬作筆以枯木為管史官載事用彤管言以赤心紀事王子年拾遺記張華述博物志晉武賜麟角筆以麟角為管庾廙字幼簡侍中袁彖雅慕之贈以象牙筆管梁元帝著書筆有三品忠孝全者用金管書之德行清稡者用銀管書之文章贍麗者以斑管書之歐陽通詢之子自矜能書必以犀象為管湘州守贈李德裕斑竹筆管竒采爛然因為賦報之王羲之筆經有人以緑沉漆竹管及鏤管見遺青箱雜記紀少瑜嘗夢陸倕授青鏤管一束白樂天元微之應制科有纖鋒細管筆攜以就試韓文操數寸之管書盈尺之紙高可以釣爵位循次而進亦不失萬一於甲科授以丈二之殳殳音殊説文以殳殊人也禮殳以積竹八觚長丈有二尺建於兵車旅賁以先驅詩伯也執殳為王前驅釋名殳矛殳咮也長丈二尺而無刃有所撞桎於車上使殊離也杜牧詩誰知我亦輕生者不得君王丈二殳馘獻皂郊取印頗如於斗大馘古獲切説文軍戰斷耳也詩在泮獻馘方輿勝覽皂郊堡在天水軍天水縣東北四十里去秦州三十里宋有皂郊博易鋪場舊𨽻沔戎司劉甲為利路安撫乞還本司劉昌祖在西和州王大才在沔州大才之兵屢衄昌祖不救遂棄皂郊按宋史寧宗嘉定七年四川制置司遣提舉皂郊博易務何九齡率諸將戰於秦州城下敗還十一年春正月金人圍皂郊堡二月金人破皂郊死者五萬人十三年九月金人犯皂郊堡沔州統制董照等與戰大敗宋劉時舉中興編年通鑑云嘉定十一年正月金人圍皂郊堡二月陷皂郊王師與戰勝負半之死者五萬人制置司招忠義人復皂郊三月利州統制王逸等率官軍及忠義人收復忠義人十萬出攻秦州官軍繼進至赤谷口忽王逸傳劉昌祖之命退師而忠義軍遂潰金統制包長壽合長安鳳翔之衆復攻皂郊不克引兵趍西和州劉昌祖焚西和州而遁金人陷西和州昌祖奪五官韶州安置周顗傳今年殺諸賊奴取金印如斗大繫肘威申赤谷積甲幾至於山齊殄徒典切説文盡也左傳俾殄其師赤谷有二漢書陳湯傳郅支數借兵擊烏孫深入至赤谷城又從間道入赤谷過烏孫涉康居界至滇池西西域傳烏孫國大昆彌治赤谷城去長安八千九百里賈逵永平頌威震赤谷此西域赤谷也此赤谷在今秦州西南七里中有赤谷川杜詩晨發赤谷亭艱險方自兹指秦州赤谷也上文所謂忠義人攻秦州至赤谷口即此赤谷也東觀漢紀劉盆子與丞相已下二十餘萬人詣宜陽降光武積甲於宜陽城西高與熊耳山等劉子玄史通曰赤眉既降棄甲誠衆必與山比峻則血流漂杵之説也梁書高祖紀熊耳比峻未足云擬睢水不流曷其能及韋睿傳睿破魏軍高祖遣中書郎周捨勞於淮上睿積所獲於軍門捨觀之謂睿曰君此獲復與熊耳山等李詩積甲應將熊耳齊豈期一落千丈之強韓詩躋攀分寸不可上失勢一落千丈強乃在百里九十之半戰國策甘茂謂秦王曰詩云行百里者半於九十此言末路之難注逸詩言行九十里適足為五十里耳魏尚削爵自難聨向闕之鑣馮唐傳魏尚為雲中守坐上功首虜差六級下之吏削其爵罰作之韓詩城上赤雲呈勝氣眉間黃色見歸期幕中無事惟須飲即是連鑣向闕時雍齒封侯何敢拔擊柱之劒張良傳上置酒封雍齒為什方侯羣臣罷酒皆喜曰雍齒且侯我屬無患矣叔孫通傳羣臣飲爭功醉或妄呼拔劒擊柱雖一發五豝舉員粗備詩彼茁者葭一發五豝于嗟乎騶虞注豕牝曰豝虞人翼五豝以待公之發儀禮注詩有一發五豝五豵于嗟騶虞之言樂得賢者衆多歎思至仁之人以充其官宋史選舉志初選人四考有舉者四人得磨勘遷京官始詔增為六考舉者五六人須有本部使者然九門八翼第考尚虧陶侃傳夢生八翼飛而上天見天門九重已登其八唯一門不得入閽者以杖擊之因墮地折其左翼及寤左腋猶痛猶泥在甄只合大鈞之問董仲舒傳夫上之化下下之從上猶泥之在鈞惟甄者之所為師古曰甄作瓦之人也鈞造瓦之法其中旋轉者劉禹錫問大鈞賦序云始余失臺郎為刺史又貶州司馬俟罪朗州三見閏月人咸曰數之極理當遷焉因作謫九年賦以自廣是歲臘月詔追明年自闕下重領連山郡印綬人咸曰美惡周必復第行無恤歲抄其復乎居五年不得調歲二月有事于社致齊孤居慮靜滯念數起伊人理之不可曉也將質諸天乎謹貢誠馳精敢問大鈞云云析薪匪斧誰為蟠木之容詩析薪如之何匪斧弗克疏言析薪之法如之何乎非用斧不得斫之鄒陽傳蟠木根柢輪囷離竒而為萬乘器者以左右為之先容也師古曰容謂雕刻加飾雅聞嚴徐之奮飛韓詩東馬嚴徐已奮飛枚皋即召窮且忍率出歸張之吹送韓詩況承歸與張二公迭嗟悼青冥送吹噓強箭射魯縞注孟郊為歸登張建封所知非親非故誠無半面之夤緣唐崔祐甫為相不至期年而除吏八百多其親舊或者以為譏祐甫曰不然非親與舊則安得而知之謝承後漢書應奉嘗詣袁賀賀時出行閉門造車匠於內開扇出半面視奉後數十年於路是車匠識而呼之北齊書楊愔聰記強識半面不忘陳後山詩平生天上張公子尚記門間半面人元稹詩半面契終始夤通作寅夤緣連也韓詩青壁無路難夤緣立巳立人所望高情之特達四子講德論特達而相知者千載之一遇也禮記圭璋特達德也疏云行聘之時唯執圭璋得特通達不加餘幣正義云聘享之禮有圭璋璧琮璧琮則有束帛加之乃得達圭璋則不用束帛故云特達互見前惟是賀厦之燕淮南子湯沐具而蟣蝨相吊大厦成而燕雀相賀東坡詩驚飛賀厦燕便學鳴秋之蟲王褎傳蟋蟀俟秋吟古今注蟋蟀一名吟蛩一名寒蛩韓文以雷鳴夏以蟲鳴秋非所謂氣和而言甘韓文心醇而氣和左傳幣重而言甘安得必命通於心肯翰府名談云唐莊宗時禁旅王慶乞敘功賞曰侍從濟河日臣係第一隊入汴臣屬先鋒乞推補莊宗頷之他日又言亦不納莊宗好樂樂工子弟至有得官者謂慶曰子何不學我吹管稍稍能之亦不獲用後李嗣源亦言其勞莊宗曰知慶薄有功但每見慶則心憤然安得更有賜與之意因舉唐太宗詩曰待余心肯日是汝命通時夫主天下生靈賞罰之柄而所言若此誠有命也尚念某從軍無狀傅介子傳以從軍為官史記鯀之治水無狀注言無功狀詳别見己事何言賈誼傳三代之所以長久者己事可知也蕭望之傳此己事之驗也然或蒙羞蘋藻於王公左傳澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公固猶能蒸芝菌之祥瑞菌音窘説文地菌也爾雅中馗菌疏大者名仲馗小者名菌栁文使受天澤餘潤雖朽枿敗腐不能生植猶足蒸出芝菌以為瑞物東坡詩枯朽猶能出菌芝定百四十三人元功之籍難爭汗馬之勞漢功臣表漢興自秦二世元年之秋初以沛公總帥雄俊三年然後西滅秦立漢王之號五年東克項羽即皇帝位八載而天下乃平始論功而定封訖十二年侯者百四十有三人究其本末并敘位次以昭元功之侯籍云蕭何傳汗馬之勞作千二十四字聖德之詩或助飫羶之奏韓文輒依古作四言元和聖德詩一篇凡千有二十四字指事實録具載明天子文武神聖以警動百姓耳目傳示無極其詩略云乃以上辛於郊用牡宵升於丘奠璧獻斚飫沃羶薌産祥降嘏代上曾運使槃庾吏抱關將踐更而受代庾音與説文水漕倉也一云倉無屋者詩傳露積曰庾詩我庾維億疏庾是未入倉囷昭帝紀注貧者願得顧更錢者次直者出錢顧之月二千是謂踐更也臺郎持斧行奏記以遄歸虞詡傳臺郎顯職仕之通階李詩臺郎選才俊張謂詩共襆臺郎被漢武帝紀遣直指使者衣繡衣杖斧朱博傳文學儒史時有奏記文心雕龍公府奏記郡將奏箋詩式遄其歸列子不若遄歸遄速也所幸𨽻容察之中韓文受容受察亦既拜存全之賜未遂托根之願山谷詩託根桃李場難忘繞樹之情魏武帝短歌行繞樹三匝何枝可依伏念某才不逮中知難語上學詩學禮固非但志於世科肯構肯堂不謂失身於門蔭尚書若考作室既底法厥子乃弗肯堂矧肯構易臣不密則失身趙廣漢傳失身墮功司馬相如傳文君既失身於司馬山谷詩失身來作管城公晉書范宏之傳階籍門蔭屢登崇顯宋真宗大中祥符二年以門蔭授京官年二十五以上求差使者令于國學受業及二年審官院與判監官考試其業乃以名聞文選門籍勳蔭頃嘗鶚舉後漢樊凖薦龎參曰鷙鳥纍百不如一鶚孔融薦禰衡亦云語出鄒陽傳竟作鷁飛左傳僖公十六年六鷁退飛過宋都眯目簸粳又強顔於秋賦莊子播粳眯目則天地四方易位矣蚊虻噆膚則通昔不寐矣賦鄉貢也朝錯傳乃以臣錯充賦薛能下第詩秋賦春還計盡違自知身是拙求知盧嗣業詩徒步求秋賦持杯給暮饘宋太平興國八年詔歲選秋賦是曰彞章爰自近年遂隳前制轉喉捩手還觸忌於冬烘昌黎送窮文捩手覆羮轉喉觸諱凡所以使吾面目可憎語言無味者皆子之志也托言鄭薰侍郎主文誤謂顔標乃魯公之後時徐方未寧意在激勸忠烈乃以標為狀元謝日問及廟院標曰寒畯未嘗有也始知誤取或嘲曰主司頭腦太冬烘錯認顔標作魯公葉少藴避暑録話云唐人言冬烘是不了了之語故有錯認顔標之句人以為戲談今蜀人多稱之行且及瓜見前誰其采菲詩采葑采菲無以下體葑音豐蕪青也菲始鬼反爾雅菲茐詩箋云此二菜者上下皆可食而其根有美時有惡時采者勿以根惡而并棄其葉喻夫婦以禮義合以顔色親不可因色衰而并棄其禮人不易知而知亦未易固乾璞之可羞范睢傳人固未易知知人亦未易也應劭傳昔鄭人以乾鼠為璞鬻之於周宋愚夫亦寶燕石緹緁十重夫睹之者掩口盧胡而笑注緁音襲公固求士而士不自求恐缶鐘之難辨莊子以二缶鐘惑而所適不得矣郭象注各自信據故不知所之餘見前妄乞一封之奏韓詩一封朝奏九重天或為再命之階周禮再命受服敬為曽南豐試展瓣香之禮陳后山詩素琴久絶絃碁酒頗闕供向來一瓣香敬為曾南豐何為陳師道長令三徑之荒陳后山詩耕蠶無一㕓庖井要三徑又蕭條寒巷荒三徑又三徑未成心己冥世間惟有白鷗知山谷詩何為陳師道白髮三徑草恭惟某官學者泰山新唐書韓愈傳贊自愈沒其言大行學者仰之如泰山北斗云國之喬木撑腸文字抉雲漢而批天章盧同詩三碗搜枯腸惟有文字五千卷東坡詩撑腸拄腹文字五千卷又公昔騎龍白雲鄉手抉雲漢分天章滿腹精神噓海岱而出雲氣溫嶠傳錢世儀精神滿腹韓文龍噓氣成雲尚書海岱惟青州昨倦握蘭之直應劭漢官儀尚書郎伏奏事與黃門對揖跪受故稱尚書郎懷香握蘭趨走丹墀洊收分竹之庸唐子西詩漢節從分竹劉鞭不用蒲禮樂之遣使臣惟道王之志慮周禮秋官掌交道王之德意志慮使知王之好惡辟行之注好者行之惡者辟而不為仁義之利吾國肯隨俗之酸鹹韓詩雲夫吾兄有狂氣嗜好與俗殊酸鹹然而華原隰之中詩皇皇者華于彼原隰毛傳皇皇猶煌煌也高平曰原下濕曰隰忠臣奉使能光君命無遠無近如華不以高下易其色孰若引星辰而上杜詩持衡留藻鑒聽履上星辰所聞四輩之召新唐書馬周傳中郎將常何言臣客馬周忠孝人也帝即召之未至乃遣四輩督趣之不出期月之間山川出雲皆望及時之潤公羊傳觸石而出雲膚寸而合不崇朝而遍雨乎天下者惟泰山耳樓臺近水寧無得月之思范文正公鎮錢唐兵官皆被薦獨巡檢蘇麟不遇乃上詩曰近水樓臺先得月向陽花木易為春公即薦之詳見前勉驢技之一鳴栁文黔無驢有好事者載以入放之山中虎視之尨然大物也驢一鳴虎大駭以為且噬已然往來視之覺無異能者稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳因跳踉大口闞斷其喉盡其肉乃去希馬價之三倍韓文昔人有鬻馬不售於市者知伯樂之善相也從而求之伯樂一顧價增三倍畫地作餅固知無補於飢腸魏志盧育傳前此諸葛誕鄧揚等馳名譽有四窗八達之誚帝疾之詔曰選舉莫取有名如畫地作餅不可啖也點鐵成金尚冀少回於頑面傳燈録雲門如九轉丹砂點鐵成金澄公藥汞銀徒可玩入煆則飛去山谷與洪駒父書古之能為文章者真能陶冶萬物雖取古人之陳言入於翰墨如靈丹一粒點鐵成金也代上林提舉行知服百里之勞偶逃訶譴賈誼傳大譴大何之域師古曰譴責也何問也干六條之察尚冀吹噓六條見第一卷上曾運使條鄭泰傳孔公緒清談高論噓枮吹生初非俊偉之才王褎傳褎有俊才儒林傳兒寬有俊才王充傳以俊才知名虞詡傳子恭有俊才楊修傳好學有俊才龎參傳卓爾竒偉高才武略有魏尚之風成公綏傳少有俊才及乏依乘之舊李靖贊依乘風雲乃敢持小人而纍君子其殆恃我公之如古人竊以褎斜二谷之深未如選穽漢溝洫志褎水通渭斜水通沔師古曰褎斜二谷名其谷皆各自有水耳順帝紀注褎斜漢中谷名南谷名褎北谷名斜首尾七百里呂梁千仞之峻豈若縣灘莊子孔子觀於呂梁懸水三十仞流沫四十里黿鼉魚鱉之所不能遊也注司馬云河水有石絶處也是以繡衣之褎揚杜詩繡衣春當霄漢立罕及銅章之疏賤百官表縣令長皆秦官秩比六百石以上皆銅印墨綬然舉管庫舉賊盜尚且推賢禮記趙文子所舉于晉國管庫之士七十有餘家孔子曰管仲遇盜取二人焉上以為公臣曰其所遊僻也可人也呂氏春秋顔涿聚梁甫大盜也學於孔子後漢書左原傳顔涿聚梁甫之巨盜段干木晉國之大駔卒為齊之忠臣魏之名賢韓文昔者管敬子取盜二人為大夫於公趙文子舉管庫之士七十有餘家夫惡求其初又古之進人者或取於盜或舉於管庫今布衣雖賤猶足以方於此況有社稷有人民是亦為政嘻亦甚矣禮記嘻其甚也史記魯仲連傳噫嘻亦太甚矣先生之言也委而棄之必有命世之賢劉向傳贊聖人不出其間必有命世者焉魏志天下將亂非命世之才不能濟也裴駰史記序信命世之宏才也索隱云按孟子云其間必有名世者趙岐云名世次聖之才物來能名此言命者名也言賢人有名于世也乃能反今之俗伏念某名為宗姓實則儒生不忍窮於多士之時妄斗升之饞嚼饞音讒與饞通韓詩雖食八九無饞名嚼噬也也或作噍山谷詩看人取卿相妄意亦饞嚼雖得雋於一科之末竟分寸以躋攀左傳凡師得雋曰克韓詩躋攀分寸不可上九載績用之弗成尚書九載績用弗成三仕令尹而無愠所幸拙勤之相補莊子聞道雖晚而以勤補拙也陳後山詩拙勤終不補他日愧無傳山谷詩他人勤拙猶相補不逃裁鑒之至公烏獲力足為器足施維其時矣栁文有行三塗而墜千仞之下者仰望于道號以求出過之者日千百人皆去而不顧然其猶望而不止也俄而有若烏獲者持長綆千尋徐而過焉其力足為也其器足施也號之而不顧顧而曰力不能則其人知必死於大壑矣詩物其有矣維其時矣伯樂過不睨遇不顧誰復念之韓文木在山馬在肆遇之而不顧者雖日纍千萬人未為不材與下乘也及至匠石過之而不睨伯樂遇之而不顧然後知其非棟梁之材超逸之足也敢裁小子之章試作大鈞之問見前代上宣同知條恭惟某官眼高四海東坡詩眼髙四海空無人胸綜九流綜子宋切説文機縷也又作孔切郭璞巫咸贊經技是搜術藝是綜九流一曰儒二曰道三曰隂陽四曰法五曰名六曰墨七曰縱橫八曰雜九曰農榖梁序九流分而微言隱藝文志諸子十家其可觀者九家而巳使其人遭明主聖王得所折𠂻皆股肱之材也仲尼有言禮失而求諸野彼九家者不猶愈于野乎自其不辭小官於州縣之時已知可以大受為社稷之器袁宏詩汲黯社稷器棟梁天表骨屹持家學左雄傅諸生試家法注儒有一家之學故稱家傑立朝行行寒剛切詩置彼周行傳列也箋周之列位謂朝廷臣也韓詩使獲升朝行再轉為丞至於三而無悶韓文再轉為丞兹邑易遁世無悶不見是而無悶説文悶悶也一麾出守取其二而無嫌選詩一麾乃出守上嘉風雷之新易風雷益君子以見善則遷有過則改中有星軺之遣褰帷燭隱按行蔽芾之甘棠後漢書郭賀字喬卿荆州刺史有殊政百姓歌曰厥德仁明郭喬卿中正朝廷上下平顯宗賜以三公之服黼黻冕旒敕行部去襜帷使百姓見其容貌以彰有德唐賈琮冀州刺史之部言曰刺史當逺聽廣視紏察美惡何有反垂帷裳以自掩塞乎乃帝御者塞帷百城聞風竄竦詩蔽芾甘棠勿翦勿伐總轡馭姦湔袚逶遲之苞栩戰國策汗明説春申君曰君獨無湔袚㒒也山谷詩寄語諸公肯湔袚又能澆茗碗湔袚我又一朝被湔袚又湔袚用神兵又其誰湔袚汝又湔袚瘴霧姿又道家蓬蓬見仙伯我亦湔袚與清流詩周道逶遲又肅肅鴇羽集于苞栩王事靡盬不能蓻稷黍尚念一寒之迹范睢傳范叔一寒如此哉若為寸進之謀老子不敢進寸而退尺韓文進寸退尺卒無可成幸而桑梓之偶同詩維桑與梓必恭敬止或者蒯菅之可采左傳雖有絲麻無棄菅蒯儻使藏舟於楚壑半夜遽移莊子藏舟于壑藏山于澤謂之固矣然則夜半有力者負之而走昧者不知也是雖操瑟於齊門三年奚益韓文齊王好竽有求仕於齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下吾鼓瑟合軒轅氏之律呂客罵之曰王好竽而子鼓瑟雖工如王不好何是所謂工於瑟而不工於求齊也敢裁小牘試卜終身雕鶚之有秋天恐即登於碧漢杜詩蛟龍得雲雨雕鶚在秋天龜魚之蔭瓦影望亟轉於清波韓詩湖上新亭好公來日出初水紋浮枕簟瓦影蔭龜魚應科目時與人書庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎代回袁通判求汲引同官為僚凄其一夢左傳先蔑之使也荀林父止之曰同官為寮吾嘗同寮敢不盡心乎詩絺兮綌兮凄其以風注凄寒風也杜詩白首颯凄其東坡詩舊遊空在人何處三十三年真一夢千里命駕厚甚尺書嵇康傳東平吕安服康高致每一相思輒千里命駕史記若使一介奉咫尺書古樂府中有尺素書遙驚吳下之非江表傳孫權謂吕蒙曰卿今當塗掌事宜學問以自開益蒙始就學篤志不倦後魯肅過蒙言議常欲受屈肅拊蒙背曰吾謂大弟但有武略耳至于今者學識英博非復吳下阿蒙蒙曰士别三日即更刮目相待大兄今諭何一稱穰侯乎愧乏郢中之和文選楚襄王問于宋玉曰先生其有遺行歟何士民衆庶不譽之甚也宋玉對曰客有歌于郢中者其始曰下里巴人國中屬而和者數千人其為陽阿薤露國中屬而和者數百人其為陽春白雪國中屬而和者數十人引商刻羽雜以流徵國中屬而和者不過數人而已是其曲彌高其和彌寡世俗之民又安知臣之所為哉恭惟某官抱負甚偉後漢儒林傳抱負墳策雲集京師韓文抱負其業東歸于家揚歷彌深當日鸞棲困打頭之矮屋仇覽傳覽字季智一名香考城令王渙署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志耶覽曰以為鷹鸇不若鸞鳳渙謝遣之曰枳棘非鸞鳳所棲百里豈大賢之路以一月俸為資勉入太學天寶遺事張彖為華隂簿為守令所抑歎曰大丈夫有凌雲蓋世之志而拘于下位若立身矮屋之下東坡與子由詩宛丘先生長如丘宛丘學舍小如舟常時低頭誦經史忽然欠伸屋打頭乃今驥展會籋足於浮雲蜀志龎統以從事守萊陽令不治免官魯肅遺先主書曰龎士元非百里之才使處治中别駕始當展其驥足耳漢天馬歌志俶儻精權竒籋浮雲暗上馳注籋音躡言天馬上躡浮雲暗然而上馳顧恐陳人莊子人而無人道是之謂陳人或能為地灌夫傳獨不為李將軍地乎詳見前喚殷兄呼張丈各無少年之誇白樂天詩猶有誇張少年處笑呼張文喚殷兄東坡詩頭白江南醉司馬寬心時復喚殷兄謁周君扺李生甚思得交之幸昌黎送湖南李正字序侍御與周君於今為先輩成德李生溫然為君子有詩八百篇傳詠於時惟愈也業不益進行不加修顧惟未死耳往拜侍御謁周君扺李生退未嘗不發愧也只恨鴻毛泰山之輕重司馬遷傳死有重於泰山或輕於鴻毛用之所趨異也東坡集天下無事則公卿之言輕於鴻毛天下有事則匹夫之言重於泰山決非鶴髮老子之堪任梁庾肩吾詩鶴髮辭軒冕鮐背烹葵菽杜詩清秋鶴髮翁庾信賦鶴髮雞皮馬援傳頗哀老子使得遨遊陶侃傳老子婆娑正坐諸君輩某有可推賢尚書推賢讓能寧當愛力韓文吾豈有愛於力乎哉今作禁門鍵頗切懷歸陳后山詩昔為馬口銜今作禁門鍵詩豈不懷歸贈以金錯刀别規效報張衡四愁詩美人贈我金錯刀何以報之英瓊瑶代回謝判院求推挽期年作别又占騎氣之來漢志車氣騎氣徒氣白土功氣黃車氣乍高乍下往往而聚騎氣卑而布卒氣搏東坡詩馭風騎氣我何勞楊廷秀詩乘風騎氣不用行一見甚歡便辱雄文之寵喜邂逅之適願詩邂逅相遇適我願兮忘褎拂之過情恭惟某官鄉里清門杜詩於今為庶為清門朝廷素學佳人在空谷愛莫助之杜詩絶代有佳人幽居在空谷詩愛莫助之公子是監倉寧無識者東坡詩但見東軒堪隱几不知公子是監倉君來何暮亷范傳亷叔度來何暮我計已成魏志杜襲傳吾計已定卿勿復言東坡詩君歸定何日我計久已熟自此恐有出處之疏奈何敢當推挽之寄左傳或推之或挽之某罔功曵履馬周傳鳴玉曵履決意投簪文選昔聞投簪逸海岸又聊以投吾簪某水某丘所釣遊敢祈加敬韓文楊侯始冠舉于其鄉歌鹿鳴而來也今之歸指其樹曰某樹吾先人之所種也某水某丘吾童子時所釣遊也鄉人莫不加敬誡子孫以楊侯不去其鄉為法在阡在陌可來往請俟倦歸韓文古之老于鄉者將自佚非自苦閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨來往也回林省元求牒試逃虛空之境過辱寵臨莊子夫逃虛空者藜藋柱乎鼪鼬之徑踉位其空聞人足音跫然而喜矣而況乎昆弟親戚之謦咳其側者乎讀駢驪之文益加謙巽栁文駢四驪六報於何有左傳勞之不圖報於何有藏弆為榮遊俠傳陳遵字孟公性善書與人尺牘主皆藏弆以為榮師古曰弆亦藏也恭惟某官秀出七閩閩東南越周禮職方氏七閩注叔熊逃難於濮蠻其後分七種東坡詩青山漫漫七閩路僑遊三楚韻會僑寓也增韻旅寓而居也别作僑史記貨殖傳夫自淮北沛陳汝南南郡此西楚也彭城以東東海吳廣陵此東楚也衡山九江江南豫章長沙是南楚也舊聞林藻科目之選唐林藻莆田人貞元中進士纍官侍御史藻披之子披有九子俱為刺史號九林而藻蕰尤知名實出常衮教育之前新唐書常衮傳衮為福建觀察使始閩人未知學衮至為設鄉校使作為文章親加講導與為客主鈞禮觀遊燕饗與焉由是俗一變歲貢士與內州等韓文歐陽生哀辭衮以文辭進有名於時又作大官臨􅊩其民時未幾皆化翕然詹于時獨秀出襄加敬愛閩越之人舉進士由詹始晬然風標南史栁憕傳風標才氣恐不能為少主臣任昉進封衡陽王詔風標秀特氣體淹宏山谷詩遺編想風標實是苖裔離騷帝高陽之苖裔兮詳别見欲作摶鵬扶搖之快莊子冥海者天池也有鳥焉其名為鵬背若泰山翼若垂天之雲搏扶搖羊角而上者九萬里然後圖南特在雕蟲篆刻之工法言或問吾子少而好賦曰然童子雕蟲篆刻俄而曰壯夫不為也幸擷天葩韓詩天葩吐竒芬早收地芥夏侯勝傳士病不明經術經術茍明其取青紫如俯拾地芥耳某重勤覓舉舊唐書今之舉人有乖事實鄉議決小人之筆行修無長者之論策第喧競於州府祈恩不勝於拜伏上啓陳詩惟希咳唾之澤摩頂至足冀荷提攜之恩故俗號舉人皆稱覓舉覓為自求之稱未是知人之辭察其形而度其材則人品於兹見矣又薛登疏方今舉士俗號覓舉覓者自求也是以耿介之士羞于自拔極欲備員史記博士雖七十人特備員弗用儒林傳文學掌故補郡屬備員師古曰云備員者示以升擢之非藉其實用也申屠剛傳武帝時相許昌等皆以列侯繼踵􅐅􅐅亷謹為丞相備員而已杜詩幕府初交辟郎官幸備員顧慙識賢之不先且復聞命之已晚誠不忍竒寶之橫道愛莫助之韓文誠不忍竒寶橫棄道側而閣下篋櫝尚有少闕不滿之處猶足更容何待譬美玉之即人會有識者後漢書逸民傳即人者人亦即之注即就也東坡答黃魯直書此人如精金美玉不即人而人即之將逃名而不可得何以我稱揚為回卓省元求牒試辱賁儷箋見需舉牒賁需卦名諸弟子隨臣久矣宿諾已多叔孫通傳諸弟子儒生隨臣久矣與共為儀願陛下官之高帝悉以為郎大樂正詔王升之限員有數禮記大樂正論造士之秀以告於王而升諸司馬曰進士司馬辨論官材論進士之賢者以告于王而定其論然以橫棄道傍之寶見上條孰無欲出門下之心韓文栁子厚墓志諸公要人爭欲令出我門下交口薦譽之思成物之成更俟暗中之摸索語林許敬宗性輕傲見人多忘之或謂其不聰曰卿自難記若遇何劉沈謝暗中摸索著亦可識問有餘曰有則當送上以吹噓杜詩惟藉吹噓送上天韓詩青冥送吹噓回張學諭求牒試辱賁儷箋見需舉牒當暑紾絺綌君未謂之失時大寒索衣裘僕且疑其已晚法言大寒而後索衣裘不亦晚乎蓋卜稼當先於嗣歲禮記社之日位卜來歲之稼注卜者問後歲稼所宜詩再燔再烈以興嗣歲非積薪可望於後來汲黯傳陛下用人如積薪耳後來者居上按積薪事如此用極活及觀李衛公積薪賦云雖後束之高處必居上而先焚又得翻案之法始知文章妙處無窮在人筆力斡旋之耳嘉魚得賢與共之愛而莫助詩序南有嘉魚樂與賢也太平之君子至誠樂與賢者共之也有馬借人今亡矣報不成章詩跂彼織女終日七襄雖則七襄不成報章回鄭解元求牒百適裝懷見賢不敏遊俠傳陳遵為京兆史曹事數廢西曹以故事適之故事有百適者斥滿百西曹白請斥東坡詩號訴甘百適文選牒訴倥偬裝其懷左傳謝不敏焉朋緘委貺取數何多獸二為友具二為朋詩朋酒斯饗毛傳兩尊曰朋禮記取數多者仁也夫勉于仁者不亦難乎恭惟某人傑出七閩僑遊三楚見上回林省元條寸心如水家有履聲李詩男兒方寸心杜詩退食遲回達寸心王荆公詩千里歸來一寸心鄭崇傳臣門如市臣心如水又我識鄭尚書履聲兩鬢成絲客無氊坐杜子美送鄭虔貶台州司戶詩鄭公樗散鬢如絲酒後常稱老畫師乂戲贈鄭廣文詩才名三十年坐客寒無氊顧慙溢格無可薦賢大寒而後索衣裘愛焉莫助見上條明月以暗投道路報不成章鄒陽傳明月之珠夜光之璧以暗投人於道衆莫不按劒相眄者何則無因而至前也回李新恩求宏詞文字宋紹興三年立博學宏詞科凡十二題制誥詔表露布檄針銘記贊頌序於內雜出六題分為三場每場一今一古試人先投所業三卷朝廷降付學士院考其能者召試討論宗𣲖不無意於通家孔融傳融幼有異才年十歲隨父詣京師時河南尹李膺以簡重自居勑外非當世名人及與通家皆不得白融欲觀其人語門下曰我是李君通家子弟門者言之膺問高明祖父嘗與僕有舊恩乎融曰先君孔子與君先人李老君同德比義而相師友則融與君纍世通家衆坐莫不歎息栁詩通家殊孔李舊好即潘楊東坡詩喜見通家賢子弟問訊淵源知有心於緯國晉書躡履問訊杜詩道甫問訊今何如成帝紀儒林之官四海淵源班彪傳敷文華以緯國典守賤薄而無悶客贈言甚辱荀子贈人以言重于金石珠玉説苑贈人以軒不若贈人以言辱猶屈也士昏禮今吾子辱請吾子就宫注以白造淄曰辱疏云謂以潔白之物造置於淄色器中是汙白色猶今賔至巳門亦是屈辱故云左傳拜命之辱借聽則孤韓文借聽於聾求道於盲恭惟某人胸湛秋霜唐卓行傳元德秀其志凜凜若秋霜爭嚴孫楚書志厲秋霜梁簡文詩影類九秋霜筆翻春潦眺董公孫之對固是世科眺錯傳詔有司舉賢良文學士錯在選中上親策詔之武帝紀詔賢良明于古今王事之體受策發問或以書對於是董仲舒公孫宏等出焉稷契臯陶之良亦其家學顧薄人間之風日梁四公記羅子春為梁武帝入龍洞求珠得食如花藥膏飴食之香美賫食至京師得人間風日乃堅如石不可食唐蘇鶚杜陽雜編寶厯二年浙東國貢舞女二人舞態豔逸非人間所有每舞罷上令內藏之金屋寶帳蓋恐風日所侵故也山谷詩人間風日不到處天上玉堂森寶書又人間風日不可奈故待成隂葉下來欲裁天上之煙雲杜詩揮毫落紙如雲煙又裁縫雲霧成御衣千金寧殫於屠龍莊子朱泙漫學屠龍於支離益殫千金之家一箭即觀於中鵠某語力已腐韓文弱于才而腐于力論才亦庳所謂博學所謂宏詞昔嘗親炙韓昌黎答崔立之書夫所謂博學者豈今之所謂者乎所謂宏詞者豈今之所謂者乎又送鄭十校理序觀道德於前後聽教誨於左右可謂親薰而炙之矣既傲翰林既傲相國今已迷津韓文既傲宰相又傲翰林其將何求李詩迷津覺路失託勢隨風翻孟浩然詩桃花何處是遊子已迷津山谷詩坐閲歲月代青雲已迷津初非有得魚之筌莊子筌者所以得魚得魚而忘筌乃蒙問不龜之藥莊子宋人有善為不龜手之藥者世世以洴澼絖為事客聞之請買其方百金客得之以説吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也同姓也同業也詎敢吝一編之傳韓文同姓而近也同業也張良傳良遊下邳圯上有一老父至良所直墮其履圯下曰孺子下取履良為下取履因跪進父以足受之曰孺子可教矣出一編書曰讀是則為王者師視其書乃太公兵法良異之常習誦自求之自趣之更願博萬卷之讀杜詩讀書破萬卷山谷詩要讀田郎萬卷書四六標準卷二
