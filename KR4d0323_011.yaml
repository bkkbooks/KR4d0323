body:
  text: 四六標準卷十一宋李劉撰雜謝代林運幹良顯謝丞相書考求文字書考謂書其考之殿最唐趙璘因話録云裴充為太常寺太祝年甚少時京司書考官之清髙者例得上考充之同儕以例止得中考訴于卿長曰此舊例也充曰奉常職重地高不同他寺大卿在具瞻之地作事當出于人本設考課為奬勤勞豈係于官秩若一一以官髙下為優劣則卿合書上上考少卿合上中考丞合中上考主簿合中考協律合下考某等合喫杖矣卿笑且慙遂特書上考干大播於一陶俾登畿幕顔延之詩結綬登王畿餘見前積小成於三考獲進選階杜氏通典周制三載考績三考黜陟其訓曰三嵗而小考其功也小考者正職而行事也九嵗而大考其功也大考者黜無職而賞有功也頂踵歸坱圠之功見前肝膽極輪囷之感韓詩窮途致感激肝膽還輪囷敢因摧謝張湯傳奏事即譴湯摧謝蘇林曰深自挫按也師古曰若上有責即摧折而謝也更敘依歸韓文彼人者有聖者為之依歸又若僕無所依歸伏念某材無愈人汲黯傳亡以愈人師古曰愈勝也讀與愈同學未聞道半世寒窗之燈火元稹詩暗風吹雨入寒窗陳後山詩寒窗冷硯欲生塵中年太學之虀鹽送窮文太學四年朝虀暮鹽篆刻雕蟲覺兔毫之欲脫法言或問吾子好賦曰然童子雕蟲篆刻俄而曰壯夫不為也李詩書秃千兔毫詩裁兩牛腰銜枚戰蟻偶雞口之先鳴歐陽公詩無譁戰士銜枚勇下筆春蠶食葉聲梅聖俞詩萬蟻戰酣春晝永五星明處夜堂深蘇秦傳寧為雞口無為牛後索隱曰戰國策曰寧為雞尸不為牛從延篤注云尸雞中主也從謂牛子也言寧為雞中之主不為牛子之從後也左傳平隂之役先二子鳴遂采魯芹詩思樂泮水薄采其芹魯矦戾止言觀其旗注芹水菜也言水則采取其芹宫則采取其化出燃楚竹柳詩漁翁夜傍西岩宿曉汲清湘燃楚竹未滿戍瓜之代見前忽纏家棘之悲詩棘人注棘急也身服喪服情急隙駒之制易終莊子人生天地間若白駒之過隙忽然而已魏豹傳人生一世間如白駒之過隙師古曰言其速疾也白駒謂日景也隙壁際也林烏之哺益切杜詩林烏反哺聲詳别見上書光範初無蟠木之先容得闕長安乃辱采葑之下體並見前朅來半載朅邱傑切説文去也又發語辭呂氏春秋膠鬲見武王于鮪水曰西伯朅來無欺我也注朅何也若然則朅之言盍也非發語辭矣楚詞車既駕兮朅而歸不得見兮心傷悲文選注劉向七言曰朅來歸耕禾自踈顔延年詩朅來空復辭皆謂盍來始通何有寸勞夏屋督工粗逃曠敗夏大屋也通作廈詩夏屋渠渠禮記若見覆夏屋者矣注今之門廡旁廣而卑春闈考士獲厠使令見前及大庭聞魁三之傳杜詩爾家最近魁三象時論同歸尺五天則本房有簋二之數易坎六四樽酒簋二用缶然雖有依紅之樂見前尚未霑破白之章燕翼貽謀録云元祐元年以改官員多吏部侍郎孫覺請嵗以百人為額從之紹聖三年吏部乞以每甲五人引見不拘數則是嵗有三百餘員也中興以來改官人數絶少嵗不過數十人雖令選人舉官逐員放散數亦不增至紹興初號為頓增亦僅三十餘員慶元以後嵗有溢額蓋孤寒路絶得者舉有五員俱足不得者多不破白勢使然也七十偏親一則以喜一則以懼斗升微祿時乎為飬時乎為貧茫然寸步之謀甚矣分隂之惜陶侃傳大禹聖人乃惜寸隂至于凡俗當惜分隂鼠肝蟲臂固難躁進以妄圗馬渤牛溲或恐兼收而並蓄並見前恭惟某官鼎彛家學衮冕世臣撫五辰於泰階之平尚書撫于五辰庶績其凝東方朔傳願陳泰階六符注泰階三台也三階平則隂陽和風雨時社稷神祗咸獲其宜天下大安是謂太平載萬物以坤元之厚見前復文武之境已昭元老之壯猶詩序宣王能內修政事外攘夷狄復文武之竟土詩方叔元老克壯其猶注元大也五官之長出于諸矦曰天子之老壯大猶道也方叔天子之大老能光大其軍謀之道以討之歸鄆歡之田足見真儒之已效法言孔子用于魯齊人章章歸其侵疆魯不用真儒故也如用真儒無敵於天下安得削然益旁求於俊乂見前欲令聚在於闕庭梅福傳天下布衣各厲志竭精以赴闕廷故凡絲粟之材老泉集天下之人毛髮絲粟之才紛紛而起合而為一未始蒯菅之棄蒯音快菅音姦左傳詩曰雖有絲麻無棄菅蒯雖有姬薑無棄蕉萃此逸詩也絲可為帛麻可為布皆精細之物菅蒯皆草之可為粗布者尚念某亢身無策卬首自鳴俱見前桃李成蹊自合安不言之分李廣傳桃李不言下自成蹊師古曰蹊謂徑道也言桃李以其華實之故非有所召呼而人爭歸趍來往不絶其下自然成蹊以喻人懷誠信之心故能潛有所感也樓臺近水誰能忘先得之情見前代察判徐願謝史丞相得五紙文字補京兆之掾曾微贊畫之長掾俞絹切從手彖聲官屬北堂書抄五官掾後漢有之署功曹及諸曹事交公車之章兹拜成終之賜自匪載驅於四牡何由一發而五豝並見前毫髮不假之他門頂踵皆歸於化冶李義山集卵翼不自於他門頂踵實非其己物莊子天地為大爐造化為大冶有言雖淺進謝敢稽伏念某才乏線長力尤綿薄並見前十年太學身嘗百甕之虀韓文太學四年朝虀暮鹽東坡集王狀元未第時醉墮汴河為水神扶出曰公有三百千料錢若死何處消破士有效之陽醉落河河神亦扶出士人喜曰我料錢幾何神曰吾不知也但有三百甕黃虀無處消破耳山谷詩世傳寒士有食籍一生當飯百甕菹一第集英袍已半霜之葉集英殿舊名元德亦曰廣政明道元年改元和尋改今名春秋誕聖節錫宴此殿熙寧以後親䇿進士于此殿東坡詩青袍半作霜葉枯昨終素韠詩庶見素韠兮箋祥祭朝服素韠者韠從裳色重纍洪鈞泛緑依紅猥使近長安之日劉劭幼童傳元帝為江東都督鎮揚州時中原散亂有人從長安來元帝問洛中消息潸然流涕時明帝年數嵗問泣故具以東渡意告之因問帝汝意謂長安何如日逺答曰不聞人從日邉來只聞人從長安來居然可見元帝念之明日集群臣宴會設以此問明帝又以為日近元帝動容問何故異昨日之言曰舉頭見日不見長安以是知近帝大悅餘見前草元尚白誰肯箋閶闔之風揚雄傳時雄方草太玄有以自守泊如也或嘲雄以玄尚白師古曰玄黑色也言雄作之不成其色猶白故無祿位也餘見前始焉一鶚之飛繼以乘鴈之集再而衰三而竭孰與點睛二之下四之中正須合頴况當百里九十之半更覺分寸千丈之強並見前忽蒙雷電下取之勞韓詩平生千萬篇金薤垂琳琅仙官敕六丁雷電下取將異人記上元中台州道士王逺知善易知人生死禍福作易總十五卷一日雷雨雲霧中一老人語逺知曰所泄者書何在上帝命吾攝六丁雷電追取上方祕文自有飛天保衛金科祕藏玄都汝何者輒藏緗帙逺知曰青邱元老傳授也遂有埃風上征之路離騷經駟玉蚪以乘鷖兮溘埃風余上征埃塵也言我設往行遊將乘玉蚪駕鳯車奄塵埃而上征何物不由於洪造東坡集草木賤微敢干洪造此身獨拜於全功兹蓋伏遇某官八柱世臣淮南子地有九州八柱神異經崑崙有柱焉其髙入天所謂天柱也圍三千里圖如削下有仙人九府治與天地同休息張説姚崇碑八柱承天髙明之法列四時成嵗亭毒之功存三槐家學周禮朝士掌建邦外朝之法靣三槐三公位焉注槐之言懷也懷來人於此欲與之謀方當鯉趨過庭之際已傳虎拜稽首之心詩虎拜稽首天子萬年虎拜稽首對揚王休注拜稽首者受王命策書也臣受恩無可以報謝者稱言使君夀考而已更化十六年無匹夫不被其澤董仲舒傳為政而不行甚者必變而更化之乃可理也當更化而不更化雖有大賢不能善治也闢國數千里復寧王有指之疆詩昔我先王受命有如召公日辟國百里今也日蹙國百里尚書率寧人有指疆土益宏翕受之規丕廣旁招之意里仁為美似憐桑梓之偶同舉能其官特取蘋蘩之可薦感一力挈提之厚增寸心銘鏤之私某敢不勉自激昻圗惟報稱雞犬舐鼎難更千點化之功並見前鼷鼠飲河當自詭承流之效莊子偃鼠飲河不過滿腹注偃鼠鼷鼠也京房傳臣得出守郡自詭效功師古曰詭責也自以為憂責也董仲舒傳郡守縣令民之師帥所使承流而宣化者也感藏不盡敷述奚殫代吳省倉玭謝丞相縮次中興會要紹興三年行在省倉內鎮城倉改為行在南倉州倉仁和倉改為行在北倉監官四員兼管幹和糴十一年詔行在三倉以行在省倉上中下界為名監官監行在省倉上中下界繫銜貧纍清時許守漢倉之粟杜牧詩清時有味是無能高帝紀據敖倉之粟後周史蘇綽為郎中文帝至城西漢故倉地顧問左右莫有知者綽具以狀對帝大悅老須逺次忽臨齊戍之瓜此恩夙出于大鈞于義宜伸于小牘並見前伏念某身勤事左昌黎與竇秀才書身勤而事左辭重而情約非計之得也意廣才踈見前家世占寶唐之濵寶唐山在撫州崇仁縣西南一百五里跨樂安之境寶唐水出焉學問皆環溪之訓吳沆崇仁人幼孤事母孝致和間獻書于朝不用歸隱環溪後舉不求聞逹郡以沆應詔所著有易論語發微老子解環溪集省倉蓋其後也少而有志頗欲就博習修潔之科董仲舒傳郡國諸矦公選賢良修潔博習之士欲聞大道之要至論之極壯則無竒亦屢玷德行道藝之貢周禮卿大夫之職三年則大比考其德行道藝而興賢者能者歲不我與命與仇謀韓文命與仇謀取敗幾時陳後山詩命與仇謀得老窮烏帽黃塵凡五排于禮部山谷詩九陌黃塵烏帽底五湖春水白鷗前青衫白首又兩進于計臺白樂天詩白髮更添今日鬢青衫不改去年身又青衫不改白髮已多終然蹉跎説文蹉跎失時也一曰跌也廣韻失足杜詩淮海莫蹉跎韓詩烏乎吾意其蹉跎成此遲暮離騷經惟草木之零落兮恐美人之遲暮漫作兵厨之隱阮籍傳籍聞步兵厨營人善釀有貯酒三百斛乃求為步兵校尉遺落世事聊為簿竈之依孫寶傳御史大夫張忠署寶主簿寶徙入舍祭竈請比鄰詳見前青天鳥道之拊膺雖嘗奏辟李詩蜀道之難難于上青天西當太白有鳥道可以橫絶峩眉巔捫參歷井仰脅息以手撫膺坐長歎白水魚竿之入幕何敢疾驅杜詩白水魚竿客清秋鶴髮翁胡為來幕下祗合在舟中韓文既識路又疾驅兮又無疾其驅天子有詔如此頭顱托遺陶𢎞景與從兄書三十六方作奉朝請頭顱可知詳别見凄其腳色詩凄其以風東軒筆録張鑄河北轉運使降通判太平州時葛原初得江東西提點銀銅坑冶欲荐鑄移文取其腳色鑄不與以詩答之曰銀銅坑冶是新差職比催綱勝一階若使下官供腳色下官蹤迹轉塵埋侯鯖録東坡云世之對偶如紅生白熟手文腳色二對無復加也奚敢作堂除之夢續事始曰舊制內外皆吏部授自隋以來五品以上官中書門下訪擇聞奏然後下制肅宗復令中書以功除官今謂堂除也李濟翁資暇集云除授二字當辨分明今多不能窮審意義俗吏非調選得官者皆自大曰我乃堂除而亦有隨俗語新拜官者曰某乙除某官至有遺賀書題之曰送上新除某官是詛新官俾除去之也按漢書凡言除其官以除故官就新官也晉宋已降史無班馬之筆語不根理或以拜授為除及載夲語則義旨宛在如王導讓中書監請為三師表云乞得除中書監竭誠保傳是也今授代無新拜之官者云有除無授唯此語允當其有謂之除書者乃除去前人舊官與新人也欒城集祖宗朝堂除舊例皆見缺然後差除因事然後超擢所除皆有限量故用缺不至久逺乞今後堂除皆俟有缺方差且將見今堂除人輪環充補尤難干京局之推宋以封樁庫贍軍所打套局惠民局軍器所車輅院騏驥院省倉豐儲倉交引庫草料場樓店務排岸司為京局時方張更化之絃公實秉曲成之柄冒為冶躍便辱甄收並見前使守九年之儲禮記三年耕必有一年之食九年耕必有三年之食令待四政之闕樝梨橘柚大非老人所種之宜欂櫨侏儒偶在宰相兼收之列並見前聊裝鋪席歸老林泉不謂俟河之清左傳俟河之清人夀幾何王粲賦惟日月之逾邁兮俟河清乎其未極乃成縮地之脈列異傳費長房能縮地脈坐客在家至市買鮓一日之間人見之千里者數處洛中親舊書傳犬耳之黃陸機傳初機有駿犬名曰黃耳甚愛之既而羈寓京師久無家問笑語犬曰我家絶無書信女能齎書取消息否犬搖尾作聲機乃為書以竹筒盛之而繫其頸犬尋路南走遂至其家得報還洛其後因以為常述異記陸機少時頗好遊獵在吳豪盛客獻快犬名曰黃耳機後仕洛常將自隨此犬黠慧能解人語機羈旅京師久無家問戲語犬曰吾家絶無書信汝能賫書馳還取消息否犬喜搖尾作聲應之機試為書盛以竹筒繫之犬頸犬出驛路疾走向吳徑至機家得書馳還計人行程五旬犬往返才半月吳下官曹事報烏頭之白燕丹子燕太子丹質於秦秦王遇之無禮不得意欲歸秦王不聼謬言曰令烏頭白馬生角乃可丹仰天歎烏即白頭馬為生角秦王不得已而遣之僮奴欣怪里巷驚疑髙下在心只合避賢者之路左傳諺曰髙下在心川澤納汗山藪藏疾瑾瑜匿瑕國君含垢天之道也殷浩傳桓溫上疏罪浩曰浩過蒙朝恩寵靈超卓不能恭慎所任恪居職次而侵官離局髙下在心隋書楊素傳贊阿諛時主髙下其心公孫𢎞傳願歸侯乞骸骨避賢者路劉向傳宣帝進蕭望之等以通賢者之路進退維谷反恐負相國之知詩進退維谷傳谷窮也正義云谷是山谷墜谷是窮困之義故云谷窮韓文相國之知至矣尚堪一行李靖傳臣雖老尚堪一行詳見前不逺千里然非恃無垠之坱圠見前亦寧免將進而趦趄韓文足將進而趑趄口將言而囁嚅恭惟某官清任以和直方而大見前手麾九日太陽行黃道之中淮南子堯時十日並出草木焦枯堯命羿仰射十日中其九日日中九烏皆死墮其羽翼莊子疏堯時十日並出使羿射九烏落為沃焦歸藏鄭母經昔者羿善射彃九日果彃之天問羿焉彃日烏焉解羽黃帝占天有三道黃道者日月五星所乘漢天文志日有中道中道者黃道一曰光道中興天文志王奕按渾天説黃道九道厥初本無是因日行而強名之日行曰黃道者黃色之中也黃道即中道也日道居中月五星循道而行故日道獨謂之黃坐鎮八年微物荷洪鈞之播文選坐鎮雅俗雖風霆不言流形之利禮記地載神氣神氣風霆風霆流形庶物露生易乾始能以美利利天下而不言所利然天地能照許國之心周札傳以身許國死而後已孔稚圭詩本持許國志况復武功彰東坡詩許國心猶在匡時術已虛外撫四夷王陵傳外填撫四夷諸矦內熙百度收毛髮絲粟之細入竹頭木屑之藏晉卿之舉七十家不遺管庫祐甫之除八百吏皆是舊知冒焉而來恃以無恐某敢不靖共爾位洗濯其心並見前却日揮戈收效在桑榆之景淮南子魯陽公與韓搆難戰酣日暮援戈而撝之日為之退三舍又日西垂景在樹端謂之桑榆注言其光在桑榆樹上郭璞詩槐無魯陽德回日令三舍梁李鏡逺詩曾泉豈停舍桑榆忽在斯回戈安得中長繩不可羈涓辰擁篲奉身歸桃李之門左傳奉身而退餘見前代饒運幹誼謝史丞相改任斡茗事于畨禺妄求易地漢書注斡謂主領音與管同爾雅檟苦茶注早採者為茶晚採者為茗晉書溫嶠表遣取供御之條列真上茶千斤茗三百大薄番禺秦南海郡番禺縣以番禺二山得名番山在南禺山在北韓詩番禺軍府盛贊漕輸于湘浦竟辱回天浦説文水濵也風土記大水有小口别通曰浦詩餘依稀淮岸湘浦張玄素傳張公論事遂有回天之力俾依青草之湖荆州記巴陵南有青草湖周回百里日月出沒其中湖南有青草山故因以為名青草湖一名洞庭湖洞庭亦謂之太湖南遷録洞庭湖西岸有沙洲堆阜隆起即青草廟下一湖之內中有此洲南名青草北名洞庭所謂重湖也杜詩洞庭猶在目青草續為名顧况詩青草湖邉日色低黃茅瘴裏杜鵑啼庶免黃茅之瘴番禺雜編嶺外二三月為青草瘴四五月為黃梅瘴六七月為新禾瘴八九月為黃茅瘴桂海虞衡云瘴者山嵐水毒與草莾冷氣鬱勃蒸熏之所為春曰青草瘴夏曰黃梅瘴六七月新禾瘴八九月曰黃茅瘴通真子瘴論曰嶺南從仲春訖仲夏行青草瘴季夏訖孟冬行黃茅瘴舊五代史成汭鎮荆門與宰相徐彥若不平銜之及彥若出鎮南海路過江陵汭思嶺外有黃茅瘴患者髮落乃謂彥若曰黃茅瘴望相公深重彥若應聲答曰南海黃茅瘴不死成和尚蓋譏汭曾為僧也汭甚愧之東坡詩陳雲冷壓黃茅瘴此恩渥甚何感猶之伏念某朴學亡奇儒林傳兒寬有俊材初見武帝語經學上曰吾始以尚書為朴學弗好及聞寬説可觀散材不腆莊子匠石之齊至乎曲轅見櫟社樹其大蔽牛潔之百圍觀者如市匠石不顧弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何耶曰已矣勿言之矣散木也是不材之木也無所可用故能若是之夀注不在可用之數故曰散木踏槐半世幾隨兔目之黃南部新書長安舉子六月後落第者不出京謂之過夏多借靜坊廟院及間宅居住作新文章謂之夏課亦有十人五人醵率酒饌請題目於知已朝逹謂之私試七月後投獻新課并於諸州府拔解人為語曰槐花黃舉子忙翁承贊有詩云雨中粧點望中黃勾引蟬聲送夕陽憶得當年隨計吏馬蹄終日為君忙山谷詩槐催舉子著黃花淮南子槐之生也入季春五日而兔目十日而鼠耳更旬而始規二旬而葉成齊民要術凡栽樹棗雞口槐兔目桑蝦蟇眼榆負瘤散自餘雜木鼠耳虻趨各其時采藻十年似守烏頭之白偶叨終秩未及問鈞並見前五嶺聞其皆炎初無去志杜詩五嶺皆炎熱宜人獨桂林諸公憐其獨冷誤有辟書見前元戎欲處之油幢之中方干詩問津求拜碧油幢真宰遂置之茗寮之末等勤大播徑合疾驅惟是孤煢之蹤寸勇尺懦山谷詩士為欲心縛寸勇輒尺懦實聞瘴癘之地十室九空杜詩江南瘴癘地逐客無消息率爾陳情期于避禍媒身無策難空冀北之士夫韓文伯樂一過冀北之野而馬羣遂空東都固士大夫之冀北也又以石生為媒以禮為羅又羅而致之幕下換骨有方乃綴湖南之賔客歐詩換骨莫求丹九轉山谷詩欲換凡骨無金丹韓文有問湖南之賔客者愈曰知其主可以信其客者湖南也去年奉詔為邑於陽山然後得謁湖南之賔客於幕下於是知前之信之也不失矣獲避飛鳶之跕馬援傳下潦上霧毒氣熏蒸仰視飛鳶跕跕墮水中注鳶鴟也跕跕墮貌跕音都牒泰牒二反姑從檣燕之留杜詩檣燕語留人茲蓋伏遇某官秉國之鈞詩尹氏太師維周之氐秉國之均四方是維注均平也言尹氏持國政之平居權衡之任熙帝之載更政化當更之琴瑟並見前續聖賢難續之鼎彛益贊禹而格苖誕布舞干之化尚書益贊于禹曰惟德動天無逺弗屆至諴感神矧茲有苗帝乃誕敷文德舞干羽于兩階七旬有苗格尹相湯而伐夏迄垂典寶之書史記湯遂伐三朡俘厥寶玉義伯仲伯作典寶注言國之常寶寧宗嘉定十五年正月朔御大慶殿受恭膺天命之寶然猶耻溝中之推必欲濟天下之溺東坡韓文公廟碑文起八代之衰而道濟天下之溺印趣銷而趣刻足昭從善之仁張良傳項羽急圍漢王于滎陽漢王憂恐與酈食其謀撓楚權酈生曰秦無道伐滅六國陛下復立其後楚必斂袵而朝漢王曰善趣刻印先生因行佩之酈生未行具以其計告張良曰於子房何如良曰臣請借前箸籌之誠用此謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗乃公事令趣銷印衣改造而改為益表好賢之意詩緇衣之宜兮敝豫又改為兮緇衣之好兮敝豫又改造兮傳緇衣卿士聽朝之正服此衣若敝願王家復改而為之願其常居此位常服此服也禮記好賢如緇衣惡惡如巷伯則爵不瀆而民作願刑不試而民咸服某敢不敬其可願欽乃攸司並見前緑水紅蓮已感移栽之惠杜子美海棕行移栽北辰不可得時有西域胡僧識青芝赤箭尚希並蓄之恩見前代李總幹伯長改任謝史丞相總領古無其官宋南渡後置天下凡四總領總幹以總領某處軍馬錢糧所幹辦公事繫銜樓玫愧集汪大猷為淮西總幹金兵犯邉饋餉王師髙宗巡幸供億百出公佐其長以辦羣工扈從皆知公名此蓋以京口總幹改任監倉回馬首于鹽亭不良擇地杜詩馬首見鹽亭髙山擁縣青注鹽亭縣屬梓州東九里也一統志鹽亭縣本漢廣漢縣地屬廣漢郡梁置北宕渠及鹽亭縣護鼠牙于倉庾有渥自天詩誰謂鼠無牙何以穿我墉當趦趄將進之間拜坱圠無垠之賜左傳若從君惠而免之三年將拜君賜餘並見前謭焉孤賤辱此一陶竊惟京口之積倉圖經京口因山以為壘緣江以為境爾雅邱絶髙曰京故名一説京峴山在府東五里謂之京鎮京口得名以此劉禹錫詩土山京口峻鐵甕郡城牢王元之詩京口浪花迎棹白海門山色入樓寒劉貢父詩縹壺盈前京口酒紅斾相隨北府兵宋鎮江諸軍錢糧𨽻淮東總領治鎮江積音恣聚也儲蓄也左傳居則具一日之積注芻米菜薪詩乃積乃倉乃褁餱糧實切邉頭之仰哺杜詩邉頭公卿仍獨驕岑參詩邉頭詞客舊來稀總司創闕褁糧兼坐甲之司下司字復疑有舛誤堂選掄才弄印致閲時之久周昌傳髙祖持御史大夫印㺯之皇甫冉詩位重登壇後恩深㺯印時蓋戰德戰謀之際惟去兵去食之難為米折腰雖不離于祿仕東坡詞為米折腰因酒棄家口體交相纍簸粳眯目易有誤于軍須莊子播粳眯目則天地四方易位矣朝野雜記東南三總領皆仰朝廷科發獨四川總領專括契佐軍須即有軍興朝亦不問必為官而擇人蜀志許靖傳審量五材為官擇人晉愍帝紀贊選者為人擇官官者為身擇利郭默傳時當為官擇才若人臣自擇官安得不亂乎詳第八卷成都漕到任謝丞相條庶因能而任職伏念某一微無挾百拙有餘伯父取之庭階補以京秩謝玄傳為叔父安所器嘗曰子弟亦何豫人事而正欲使其佳玄答曰譬如芝蘭玉樹欲使其生于庭階耳兄弟習乎弓冶志在世科偶尺寸之蹉跎漫斗升之饞嚼並見前中嬰家難詩未堪家多難豫又集于蓼復詣吏銓煮海為鹽妄欲供富媪之役世本宿沙氏煮海為鹽宋衷曰宿沙齊靈公臣齊負海故有魚鹽之利或曰宿沙氏炎帝時諸矦鹽鐵論古者豪強大家得煮海為鹽民皆效之作姦之業也吳都賦煮海為鹽採山鑄錢杜詩煮海為鹽速燒畬度地偏栁文晉問猗氏之鹽晉寶之大也人之賴之與榖同化若神造非人力之功也決源釃流脈寫膏浸神液隂漉甘鹵密起富媪孕靈不愛其美回眸一瞬積雪百里注媪烏皓切老女稱禮樂志后土富媪注媪老母稱也坤為母故稱媪無麵作餅或謂非巧婦之能陳后山詩巧手難為無麵餅誰能留渴待逺井况當避嫌趙充國傳偷得避慊之使注慊即嫌字公羊傳言伐何避嫌也惡乎嫌嫌與鄭人戰也不免易闕自笑鮎魚之上竹見前何啻羝羊之觸藩易羝羊觸藩不能退不能遂無攸利艱則吉一指之不若人猥勤伯氏之請匹夫之失其所亦關造物之憐迄蒙倉庫氏之除王嘉傳孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也全出光範門之造恭惟某官鼎彛家學東京賦銘勳彛器歷世彌光曹植表功銘于景鍾名垂于竹帛社稷世臣巫賢之繼巫咸不但底王家之乂伊陟之紹伊尹真足格上帝之心並見前雖九德敷施均不遐遺易泰九二包荒用馮河不遐遺而一門大小尤蒙器使烏鵲繞樹真同撼木之蚍蜉蚍音毗蜉音浮大蟻也韓詩蚍蜉撼大樹可笑不自量餘見前牛羊求芻乃肯發機于鼷鼠魏志杜襲為丞相長史時許攸不附太祖而有慢言欲先伐之襲曰千鈞之弩不為鼷鼠發機萬石之鍾不以挺撞起音區區許攸何足以勞神武哉某敢不修其可願欽乃攸司並見前錢榖甲兵問于廟堂當識士大夫之職韓文上宰相書幸今天下無事小大之官各守其職錢榖甲兵之問不至于廟堂論道經邦之暇捨此宜無大者焉椳闑扂楔成其室屋無忘明宰相之功韓文進學解夫大木為杗細木為桷樽櫨侏儒椳闑扂楔各得其宜施以成室者匠氏之功也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也謝丞相書考補上佐于黔巑偶書下考王忠嗣傳不則黔中上佐耳巑族凡切髙也栁文黔山之巑巫水之磻陽城傳州當上考功第城自署曰撫字心勞追科政拙考下下貢空函于黃閣莫報實恩殷浩傳桓溫將以浩為尚書令遺書告之浩欣然許焉將答書慮有謬誤開閉者數十竟逹空函梁書武帝紀是馳兩空函定一州矣通典陳三公之制開黃閣廳事置鴟尾比齊三公之官並置府其府三門當中門黃閣設內屏沈約宋書三公黃閣前史無其義按禮記云士韠與天子同公矦大夫即異鄭玄注云三公之與天子禮數相亞故黃其閣以示謙不敢斥天子疑是漢末制也偶暫攝于竹符權武岡軍尤倍希于樾蔭樾王伐切字林樹隂也淮南子盥汗交流休樾蔭則脫然而喜注樹如車蓋狀為樾言多蔭也又武王蔭暍人于樾下而天下懷之感于恩也忘其喋喋喋音牒張釋之傳豈效此嗇夫喋喋利口捷給哉布此惓惓見第一卷伏念某學殖疏蕪見前涉道短淺青泥盤足每思範我之馳驅蜀道難青泥何盤盤百步九折縈巖巒白雪滿頭寧復初心之邂逅杜詩鬢髮還應雪滿頭韓詩出宰山水縣讀書松竹林蕭條捐末事邂逅得初心進乏雞犬之效韓詩進乏雞犬效退從鹿豕之遊辱坯冶之一陶見前俾翺翔于半刺杜詩半刺已翺翔牂牱為徼雖非監螃蟹之州盤瓠見容偶免築鯨鯢之觀並見前竹齋藥竈不礙雲山杜詩竹齋燒藥竈花嶼讀書牀芰製荷衣無邉風月離騷經製芰荷以為衣兮集芙蓉以為裳適挈瓶之缺守左傳雖有挈瓶之知守不假器禮也注瓶汲水器也言小知為人守器尚知不以假人又越爼而代庖胡瞻爾庭人固疑其鶉突此非子座自亦耻于象環所祈新尹之疾驅庶遂陳人之退屏明年今日固可歸三徑之荒凌雨震風尚合假萬間之庇並見前恭惟某官得聖之任為帝者師衡紞紘綖增鼎鉉九九之重易鼎六五鼎黃耳金鉉利貞上九玉鉉大吉戰國策昔周之代殷得九鼎凡一鼎而九萬人挽之九九八十一萬人士卒師徒械器被具所以偹者稱此餘見前箕裘弓冶協泰階兩兩之符東方朔傳願陳泰階六符注泰階三台也每台二星凡六星六符六星之符驗也天文志三台六星兩兩而居者在天為三台在人為三公餘見前行由絶席之尊張禹傳禹為太尉居禁中詔與三公絶席來歙傳賜歙班坐絶席在諸將之右王常傳拜常為橫野大將軍位次與諸將絶席注絶席謂尊顯之也徑陟維垣之峻詩太師維垣注太師三公也垣墻也人主職論一相具瞻槐靣之尊荀子治國有道人主有職論一相以兼率之使臣下百吏莫不宿道嚮方而務君者論一相陳一法明一指以兼覆之兼照之以觀其盛者也注論謂討論選擇之也餘見前太傅府有三才詎棄木頭之細晉東海王越少有令名謙虛持布衣之操惠帝反洛陽詔越以太傅録尚書以劉輿為長史時稱越府三才潘滔大才劉輿長才裴邈清才八王故事云劉輿才長於綜核潘滔以博學為名裴邈強立方正皆為東海王所昵俱顯一府故時人稱太傅府有三才劉慶孫長才潘仲陽大才裴景聲清才也時史彌逺為太傅餘見前所祈全度趙充國傳安世本持槖簮筆事孝武帝數十年見謂忠謹宜全度之師古曰安全而免度之不令喪敗也非冀超遷某敢不補拙以勤白樂天詩救煩無若靜補拙莫如勤山谷詩他人勤拙猶相補謹終如始尚書謹終于始深懲往轍躋分寸而落千丈之強見前雖踵常塗視九十而行百里之半韓文踵常塗之役役窺陳編以盜竊餘見前其為歸倚罔既敷宣謝魏侍郎了翁為先祖先父作墓志先美無傳凛負子孫之責禮記先祖無美而稱之是誣也有美而弗知不明也知而弗傳不仁也幽鐫有託蔚為祖考之光鐫遵全切廣韻鑽也韓文鑽石埋辭以列幽墟敘傳蔚為辭宗師古曰蔚文采盛也音鬱屬拘柱後之文張敞傳以柱後惠文彈治之晉灼曰漢執法冠也莫布堂下之武禮記堂上接武堂下布武敬裁儷啓恪布謝悰竊惟隧刻罕見于先秦之前宋顧文薦負暄日録墓有碑碣未詳所起按儀禮廟中有碑所以繫牲并視日景禮記公室視豐碑三家桓楹天子諸矦葬時下棺之柱其上有孔以貫綷索懸棺而下取其安審事畢則閉壙中臣子或書君父勳伐於其上後人立隧口故謂之神道碑言神靈之道也今碑碣往往有孔者蓋貫綷之遺制前漢碑極少後漢蔡雍崔瑗之徒乃為人立碑魏晉之後其流浸盛灸轂子雜録云齊太子穆妃將葬議立石志王儉曰石志不出禮經起宋元嘉中顔延之為王洙作墓志以其素族無名誄故以紀行自爾遂相祖習儲妃之重禮絶常例既有哀册不煩石志也又齊時有發古塜得銘云東州世子東海女郎河東豐旻以為司馬越子嫁為茍晞子婦驗之果然又東都殖業坊十字街有王戎墓穿旁得銘曰晉司徒安豐元公王君之銘然則昔之葬者晉魏以來皆有墓志也按西京雜記前漢杜子夏臨終作文曰魏郡杜鄴立志忠欵犬馬未陳奄先草露骨肉歸于后土魂氣無所不之及死命刋石埋于墓側厥後墓志恐自此始矣墓碑似昉于後漢之末釋名碑被也此本王莾時所設也施其轆轤以繩被其上以引棺也臣子追述君父之功美以書其上後人因焉乃建于道陌之頭顯見之處名其文就謂之碑也正而斃斯亦已矣禮記曾子曰吾何求哉吾得正而斃斯已矣身將隱焉用文之左傳言身之文也身將隱焉用文之是求顯也遂隱而死如郭林宗尚可免伯喈之愧郭泰傳泰卒四方之士千餘人皆來會葬同志者乃共刻石立碑蔡雍為文既而謂盧植曰吾為碑銘多矣皆有慙德惟郭有道無愧色耳若陶元亮又何待延年之辭顔延年為始安郡道經尋陽嘗飲淵明舍自晨逹昏及淵明卒延之為誄極其思致其略曰仁焉而終知焉而斃黔婁既沒展禽亦逝其在先生同塵往世降逮李唐最重韓栁韓銘正曜定非諛墓以攫金正當作貞避宋廟諱昌黎貞曜先生墓志銘曰於戲貞曜維執不猗維出不訾維卒不施以昌其詩新唐書劉乂者亦一節士聞韓愈接天下士步歸之後以爭語不能下賔客因持愈金數斤去曰此諛墓中人得耳不若與劉君為夀攫厥縳切持也撲取也列子攫其金而去栁表文通亦豈遺人之矴石栁子厚陸文通先生墓表以先生能文聖人之書通於後世遂相與諡曰文通先生矴丁定切亦作碇錘舟石隋文王子齊王攸薨寮佐請立碑帝曰欲求名只一卷史書足矣不能為後人作矴石新唐書楊瑒傳瑒在官清白吏請立石紀德瑒曰事益于人書名史氏足矣若碑頌者徒遺後人作矴石耳蓋覺良工之獨苦杜詩已知仙客意相親更覺良工心獨苦有憐沒世而不稱發其幽光韓文發潛德之幽光時乃天道尚書滿招損謙受益時乃天道重惟先祖父之學不事今科舉之謀一門千餘指之肅雍是亦為政貨殖傳童手指千孟康曰古者無空手遊口皆有作務作務須手指以别馬牛蹄角也師古曰手指謂有巧技者指千則人百九流百三家之貫穿止以潤身穿摳絹切貫也漢藝文志有儒道隂陽法名墨縱橫雜農九流凡六藝一百三家三千一百二十三篇司馬遷傳貫穿經傳馳騁古今不徒稱鄉里之善人馬援傳援從容謂官屬曰吾從弟少遊常哀吾慷慷多大志曰士生一世但取衣食裁足乘下澤車御欵段馬為郡掾吏守墳墓鄉里稱善人斯可矣致求盈餘但自苦耳實有得名教之樂地樂廣傳名教內自有樂地何必乃爾雖亷藺固不羡曹蜍之無恙世説庾道季云藺相如雖千載上死人凛凛恆如有生氣曹蜍李志雖見在厭厭如在九泉下恙音樣賈誼傳令此六七公者皆亡恙師古曰無恙言無憂病也元陶宗儀輟耕録戰國䇿趙威后問齊使嵗無恙耶王亦無恙耶楚辭九辨還及君之無恙魏文矦語倉庚曰擊無恙乎元帝詔貢禹今生有恙聘禮注拜其無恙顧愷之箋行人安穩布帆無恙神異經曰北方大荒中有獸咋人則疾名曰㺊恙也爾雅恙憂也風俗通上古草居露宿恙噬人蟲也然則恙有三義廣干祿書兼取憂及蟲事物紀原兼取憂及獸廣韻分㺊恙為二神異經合之誤矣然夷齊要是得夫子而益彰伯夷傳伯夷叔齊雖賢得夫子而名益彰顔淵雖篤學附驥尾而名益顯恭惟某官有德立言以文貫道李漢韓文序文者貫道之器也不深于斯道有至焉者不也粹若出六經之正新唐書韓愈傳贊愈以六經之文為諸儒倡當其所得粹然一出於正凛然寒五緯之芒劉夢得栁文序粲然如繁星麗天而芒寒色正人望而敬者五行而已搴芙蓉而賦詩洞識隂陽之消長九歌米薜荔兮水中搴芙蓉兮木末易內陽而外隂內健而外順內君子而外小人君子道長小人道消也傍梅花而讀易詎忘天地之彌綸鶴林玉露魏鶴山了翁詩云逺鐘入枕報新晴衾鐵衣稜夢不成起傍梅花讀周易一窗明月四簷聲後貶渠陽於古梅下立讀易亭作詩云向來未識梅生時繞溪問訊巡簷索絶憐玉雪倚橫參又愛青黃弄煙日中年易裏逢梅生便向根心見華實候蟲奮地桃李妍野火燒原葭菼出方從陽壯爭出門直待隂窮排闥入隨時作計何太癡爭似此君藏用密推究精微前此咏梅花者未之及繫辭易與天地凖故能彌綸天地之道頗哀墜緒之茫茫馬援傳頗哀老子韓文尋墜緒之茫茫恐與常流而泯泯既取贊皇之實録以志楚金贊皇謂李翺翺嘗自為其皇祖考貝州司法參軍楚金實録求韓文公銘其墓實録末云先祖有美而不知不明也知而不傳不仁也翺欲傳懼文章不足以稱頌道德光耀來世是以頓首欲假辭於執事者此翶乞銘之辭也山谷詩云習之實録葬皇祖斯文如女有正色蓋謂此也復敘欒城之世家就銘明允歐陽公蘇明允墓志銘曰蘇顯唐世實欒城人以宦留眉蕃蕃子孫自其髙曾鄉里稱仁偉歟明允大發於文亦既有文而又有子其存不朽其嗣彌昌嗚呼明允可謂不亡仍加篆畫八分之賜郭忠恕法書苑自小篆散而八分生八分破而𨽻書出蔡文姬云吾父割𨽻字八分取二分割李篆字二分取八分故名八分大篆者周宣王太史史籕所作小篆者秦丞相李斯所作增損大篆謂之小篆杜詩蒼頡鳥迹既茫昧字體變化如浮雲陳倉石鼓文已訛大小二篆生八分俾免不稱三服之羞昌黎科斗書後紀愈叔父當大厯世文辭獨行中朝天下之欲銘述其先人功行取信來世者咸歸韓氏於時李監陽氷獨能篆書而同姓叔父擇木善八分不問可知其人不如是者不稱三服故三家傳子弟往來一門存亡百世感激某敢不昭告屏攝攝色甲切音與殺同亦作翣説文棺羽飾也天子八諸侯六大夫四士二漢謂扇為攝通作翜楚語屛攝之位注屏者并攝主人之位昭謂屏屏風也攝形如今翣扇皆所以分别尊卑為祭祀之位表刻墓埏埏墓道也文選哀永逝文棺冥冥兮埏窈窈注埏墓隧也儻得保首領從九京之逰禮記文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也京音原庶無泚靣目以逹中心之愧微薄不以廢其禮何足為碑版之酬詩序瓠葉大夫刺幽王也上棄禮而不能行雖有牲牢􅛰餼不肯用也故思古之人不以微薄廢禮焉舊唐書栁公權志耽書學不能治生為勳戚家碑版問遺嵗時巨萬杜詩干謁走其門碑版照四裔蘇子由詩平生碑版無容繼此日銘詩誰能題夙夜無忝爾所生用此為師門之報詩我日斯邁而月斯征夙興夜寐無忝爾所生注當早起夜卧無辱所生之父母其為感鍥鍥吉屑切罔既鋪棻棻與紛通盛貌文選桑麻鋪棻謝衛參政涇差校正書籍小材出位願歸朱墨之勾稽羅隱詩金庭飬真地朱墨勾稽官大府量能留備丹鉛之點勘韓詩不如覷文字丹鉛事點勘少振塵埃之冗班固傳令塵埃之中永無荆山汨羅之恨倍勤坯冶之陶並見前竊以三館文書固遴讐正編摩之選三館謂昭文集賢史館總名崇文院東坡詩三館曝書防蠧毁諸侯賔客率多訟獄財賦之司寧有伺侯公卿之門韓文伺候於公卿之門奔走於形勢之途更容休息篇章之囿司馬相如傳遊于六藝之囿又遙集乎文雅之囿文選吳質答魏太子箋優遊典籍之場休息篇章之囿班固答賔戲婆娑乎藝術之場休息乎篇章之囿憐韓愈之非職俾就間官昌黎和裴晉公詩長慙典午非材職得就間官即至公期吕蒙之讀書豈為博士江表傳孫權謂吕蒙蔣欽曰卿今並當塗掌事宜學問以自開益蒙曰在軍事常苦多務恐不容復讀書權曰孤豈欲卿治經為博士邪但當令涉獵見往事耳沫濡鮒轍莊子泉涸魚相與處乎陸相煦以濡相濡以沫不若相忘於江湖啄菢鶴翎韓詩鶴翎不天生變化在啄菢注菢薄報切鳥伏卵謂之菢使飬是氣而塞天地之間將和其聲以鳴國家之盛昌黎送孟東野序三子者之鳴信善矣抑不知天將和其聲而使鳴國家之盛耶抑將窮餓其身思愁其心腸而使自鳴其不幸耶知花于見根之始邵康節見商守趙郎中與章子厚同會議論縱橫不知敬康節語中因及洛中牡丹之盛趙謂章曰先生洛人也知花為甚詳康節因言洛人以見根撥而知花之髙下者上也見枝葉而知高下者次也見菩蕾而知高下者下也章默然山谷詩見葉知根論材性乞漿有得酒之恩袁子正書嵗在申酉乞漿得酒嵗在辰己鬻妻賣子求之古人魏志陳登字元龍劉偹曰元龍文武膽志當求于古人耳王衍傳武帝聞衍名問王戎曰夷甫當世誰比戎曰不見其比當從古人中求耳宋書顔延之與武帝書司馬平西體國忠貞欵愛待物當于古人中求耳杜詩似君須向古人求亶在今日伏念某少諧平側側通作仄韻會平仄字聲也南齊陸厥傳周顒善識聲韻沈約等文皆以平上去入為四聲以此制韻不可增減世呼為永明體長識偏傍崇文目序爾雅出漢世而有訓詁之學三倉志字法許慎作説文而有偏傍之學皇甫湜與李生書書字未識偏旁高談稷契讀書未知句度下視服虔林罕有字源偏旁小説三卷其序云漢大尉祭酒許子取其形類作偏旁餘例十五卷名為説文山谷詩摹書説偏旁不深石室之紬司馬遷傳紬史記石室金匱之書僅曉金根之讀古今注金根車秦制也秦并天下閲天下之輿服謂殷得瑞山車一曰金根車故因作金根之車秦乃增飾而乘御焉漢因而不改唐李綽尚書故實昌黎韓昶名父子雖教有義方而性頗暗劣為集賢校理史傳中有金根車處皆臆斷之曰豈其誤歟必金銀車悉改根字為銀字至除拾遺果為諫院不受俄有以故人子憐之者因辟為鹿門從事也遺經獨抱未辨豕渡河之三韓詩春秋三傳束髙閣獨抱遺經究終始家語卜商字子夏嘗返衛見讀史志者云晉師伐秦三豕渡河子夏曰非也己亥耳讀史志者問諸晉史果曰己亥於是衛人以子夏為聖埤雅云已象蛇之形亥象豕之形故三豕渡河子夏曰是己亥也張鷟集亥之與豕涇渭難分魯之與魚淄澠莫辨良史博觀粗知馬與尾而五萬石君傳石建為郎中令奏事下建讀之驚恐曰書馬者與尾而五今乃四不足一獲譴死矣師古曰馬字下曲者為尾并四點為四足凡五有時北窗髙卧之夢陶潛傳嘗曰夏月虛間高卧北窗之下清風颯至自謂羲皇上人頗思東觀未見之書黃香傳肅宗詔香詣東觀讀所未見書三神眇在于海中漢郊祀志使人入海求蓬萊方丈瀛洲此三神山者其傳在海中五鬼難驅于坐上昌黎送窮文凡此五鬼為吾五患蠅營狗茍驅去復還又燒車與船延之上座插架三萬軸但當守鄴侯之書韓詩鄴矦家多書插架三萬軸家集二百篇幸皆是撫州之寫杜牧示小姪阿宜詩我家公相家劒佩常丁當舊第開朱門長安城中央第中無一物萬卷書滿堂家集二百篇上下馳皇王多是撫州寫今來五紀強尚可與爾讀助爾為賢良然作吏此事便廢嵇康絶交書一行作吏此事便廢安能舍其所樂而從其所懼哉梁書何胤傳欲卧遊千載畋漁百氏一行為吏此事遂乖惟投間乃分之宜韓文投間置散乃分之宜傷哉貧也禮記傷哉貧也生無以為飬死無以為禮也亦有命焉韓文是有命焉不可幸而致也久留戲下戲音羲大將之旗曰戲韓信傳兩將之頭可致戲下宜在遣中三國典略州郡被詔書有軍功為長吏者當沙汰之劉偹疑在遣中韓文中山劉夢得亦在遣中遽冒小朝廷之除新唐書鄭從讜傳從讜以宰相秩復為河東節度使詔自擇參佐從讜即表長安令王調自副兵部員外郎劉崇龜司勳員外郎趙崇為節度觀察府判官前進士劉崇魯推官左拾遺李渥掌書記長安尉崔澤支使皆一時選京師士人比太原為小朝延言得才多也使策行祕書之職隋唐嘉話太宗嘗出行有司請載副書以從帝曰不須虞世南在此行祕書也兹蓋伏遇某官榮分湘閫並用楚材左傳其大夫則賢皆卿材也雖楚有材晉實用之孟浩然詩共理分荆國招賢貴楚材叉負偃植各安所施耻匹夫之不獲新唐書二劉殷許等傳贊若榱椽梁柱以成大室叉負偃植各安所施詳見前椳闑扂楔惟器是適無一藝之不庸試黃閣之規模並見前收碧油之人物歐陽詹詩十萬兵樞擁碧油楊誠齋送趙子直帥益州詩錦水花潭照碧油西清學士舊鼇頭至如狂簡之小子亦勞坱圠之大鈞某敢不祗此簡書呻其占畢並見前珥貂分陜已收下體之菲葑曹植文戴蟬珥貂左思詩金張藉舊業七葉珥漢貂餘見前給札登瀛願備一株之桃李司馬相如傳上令尚書給筆札師古曰札木簡之薄小者也時末多用紙故給札以書談叢王冷然上裴耀卿書拾遺補闕寧有種乎僕不佞亦相公一株之桃李也餘見前代袁子固謝縣宰寬假詳啓意蓋鄉鄰有鬪傷而失于先告法當坐笞縣令貸之故有此謝箠楚之下何求知難全璧漢書路溫舒傳人情安則樂生痛則思死捶楚之下何求而不得晉書劉隗傳捶楚之下無求不得囚人畏痛飭辭應之史記藺相如傳臣請完璧歸趙縲絏之中非罪迄就罰金沈佺期詩昔日公冶長無罪遭縲絏聖人降兄子古來歎獨絶白帖冶長非罪始因尼父而知張釋之傳釋之奏當此人犯蹕當罰金注乙令蹕先至而犯者罰金四兩敢不持咫尺之書韓信傳奉咫尺之書師古曰八寸曰咫咫尺者言其簡牘或長咫或長尺喻輕率也今俗言尺書或言尺牘蓋其遺語耳少謝寬一分之賜宋史邵雍傳熙寧行新法雍門生故吏居州縣者皆貽書訪雍雍曰此賢者所當盡力之時新法固嚴能寬一分則民受一分賜矣惟越人之相攻擊蓋其俗然高帝紀粵人之俗好相攻擊南海尉陀居南方長治之粵人相攻擊之俗益止汲黯傳東粵相攻上使黯往視之至吳而還報曰粵人相攻固其俗不足以辱天子使者嚴助傳越人相攻擊其常事閩粵王傳閩粵發兵圍東甌東甌使人告急天子問太尉田蚡蚡曰粵人相攻擊固其常不足以煩中國往救也而長安之羣殺傷各有主者丙吉傳吉嘗出逢清道群鬪者死傷橫道吉過之不問或以譏吉吉曰民鬪相殺傷長安令京兆尹職所當禁偹捕逐宰相不親小事非所當於道路間也王陵傳各有主者况已過都而歷塊王褒傳過都越國蹶如歷塊師古曰如經歷一塊言其速疾之甚塊音口內反誠難被髮以纓冠儒者好髙未免為役而耻役𨽻也不力又可與言而不言楚公子微服出亡過宋門者難之其僕操箠而罵曰𨽻也不力門者出之但催科未動是間人韓詩白布長衫紫領巾催科未動是間人麥苖含穟桑生椹共向田頭樂社神豈期會不報為大政賈誼傳大臣特以簿書不報期會之間以為大故師古曰言公卿大臣特以簿書期會為急不知正風俗厲行誼也所謂行人失者左傳彘子以為諂使趙括從而更之曰行人失辭王羲之傳遣使詣朝廷求分會稽為越州行人失辭大為時賢所笑乃使吾身親之方入聞言偃之絃史記仲尼弟子傳言偃吳人字子遊為武城宰孔子過聞絃歌之聲忽使受曾參之杖家語曾子耘瓜誤斬其根曾晳怒建大杖以擊其背曾子仆地而不知人久之乃蘇主人讀未知主人罪也自怪其頑公羊傳定哀多微辭主人習其讀而問其傳則未知己之有罪焉爾何休注讀謂經傳謂訓詁主人謂定哀設使定哀習其經而讀之問其傳解詁則不知己之有罪此借用天下寶當為天下惜之誰興此念王坦之傳初謝安愛好聲律期功之慘不廢妓樂坦之遺書曰天下之寶故為天下所惜天下之所非何為不可以天下為心乎劉琨答盧諶書天下之寶固當與天下共之惟髮膚受之父母孝經身體髮膚受之父母不敢毁傷孝之始也而衣冠耻在國家新唐書李傑傳代宋璟為御史大夫尚衣奉御長孫昕素惡傑遇于道內恃玄宗婭壻與所親湯仙玉共驅辱之傑訴曰敗髮膚痛在身辱衣冠恥在國帝怒敕杖殺之馬遷腐刑何靣上先人之墓司馬遷傳僕以口語遇遭此禍重為卿黨戮笑汙辱先人亦何面目復上父母之邱墓乎孫臏刖足快心蹶上將之軍史記孫子傳臏亦孫武之後世子孫也嘗與龎涓學兵法涓既事魏得為將軍自以能不及臏以法刑斷其兩足而黥之臏之齊齊將田忌善而客待之進于威王威王問兵法遂以為師後魏與趙攻韓韓告急于齊齊使田忌直走大梁魏將龎涓聞之去韓而歸齊軍已過而西矣孫子謂田忌曰兵法百里而趨利者蹶上將使齊軍入魏地日減其竈涓大喜倍日并行逐之孫子度其暮當至馬陵令齊軍善射者夾道而伏涓果夜至萬弩俱發涓乃自剄故滕公釋韓信之囚韓信傳信亡楚歸漢坐法當斬其疇十三人皆已斬信乃仰視適見滕公曰上不欲就天下乎而斬壯士滕公竒其言壯其貌釋勿斬而小白解夷吾之縛國語桓公自莒反于齊使鮑叔為宰辭曰臣君之庸臣也若必治國家者則管夷吾乎使人請諸魯莊公使束縛以豫齊使齊使受而退比至三釁三浴之桓公親逆之于郊而與之坐問焉知其不可復續刑法志死者不可復生刑者不可復屬雖俊欲改過自新其道亡繇也所以寧失不經尚書與其殺不辜寧失不經向使當時淫及善人左傳賞濫則懼及淫人刑濫則懼及善人又淫刑以逞安得異日報以國士豫讓傳范中行氏皆衆人遇我我故衆人報之至於智伯國士遇我我故國士報之如某者詩書門户夏矦湛傳承門户之業受過庭之訓杜詩鼎食為門户詳見前燈火生涯韓詩燈火稍可親莊子吾生也有涯注所稟之分各有極也杜詩生涯似衆人小杖則受大杖則走非其職矣家語舜事瞽瞍使之未嘗不在于側索而殺之未嘗可得小杖則待過大杖則逃走司馬彪九州春秋崔烈入錢為司徒問其子鈞曰吾居三公於議者何如鈞曰論者嫌其銅臭耳烈怒舉杖擊之鈞走烈罵曰死卒父撾而走孝乎鈞曰舜之事父小杖則受大杖則走非不孝也隗囂傳昔虞舜事父大杖則走小杖則受臣雖不敏敢忘斯義漢書溺其職矣淮南子非其人之不肖也其所以官之者非其職也千乘之邑百乘之賦竊願學焉惟是受滕一㕓敢辭于役詩君子于役不知其期蕭頴士詩于役勞往還然且去齊三宿難疾其驅韓文無疾其驅天子有詔偶鄰境之胥戕尚書無胥戕無胥虐坐家人之失告鶴非有祿徒以鶴警之失期左傳狄人伐衛懿公好鶴鶴有乘軒者將戰國人授甲者皆曰使鶴鶴實有祿位豫焉能戰大戴禮千嵗鶴警露而鳴繁露鶴知夜半鶴水鳥也夜半水位感其生氣則喜而鳴也周處風土記鳴鶴戒露此鳥性警至八月白露降流于草上滴滴有聲因即高鳴相警移徙所宿處慮有變害也東坡詩由來警露鶴山谷詩自然身如警露鶴鴈或不鳴要亦鴈奴之有罪莊子夫子出於山舍于故人之家故人喜命竪子殺鴈而烹之竪子曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者玉堂間話鴈宿于江湖之岸沙渚之中動計千百大者居中鴈奴圍而警察南人有採捕者俟天色隂暗或無月時于瓦罐中藏燭持棒者數人屏氣潛行將欲及之則略舉燭便藏之鴈奴警呌大者亦驚頃之復定又復前舉燭鴈奴又驚如是數四大者怒啄鴈奴秉燭者徐徐逼之更舉燭則鴈奴懼啄不復動矣乃高舉其燭持棒者齊入群中亂擊之所獲甚多王荆公鴈奴詩鴻鴈無定棲隨陽以南北嗟哉此為奴至性能懇惻人將伺其怠奴輒告之亟舉群寤而飛機巧無所得夜或以火取奴鳴火因匿頻驚莫我捕顧謂奴不直嗷嗷身百憂泯泯衆一息相隨入矰繳豈不聼者惑偷安與受紿自古有亡國君看鴈奴篇禍福甚明白此一聯運思入微不虞投足卒禍及身業已逮于桁楊説文逮及也刑法志逮繫師古曰及也辭之所及則追捕之故謂之逮一曰逮者在道將送防禦不絶若今傳送囚桁寒剛切木在足曰械大械曰桁莊子接摺桁楊注械夾足及頸皆曰桁楊勢難逃于檟楚禮記夏楚二物收其威也注夏古雅反槄也爾雅槄山檟楚荆也二者所以撲撻犯禮者自度受李曰知之杖朝野僉載唐刑部尚書李日知自為畿赤不曾行杖罰其事克濟及為刑部尚書有令史受敕三日忘不行者尚書索杖剝衣喚令史總集欲決之責曰我欲笞汝一頓恐天下人稱汝云撩得李日知嗔喫李日知杖汝亦不是人妻子亦不禮汝遂放之自是令史無敢犯者又當變余安道之名宋史余靖字安道韶州曲江人少不事羈檢為諫官時嘗劾奏太常博士茹孝標不孝匿母喪坐廢靖既失勢孝標詣闕言靖少遊廣州犯法受榜靖聞之不自得求侍飬去歷官工部尚書諡曰襄涑水紀聞靖本名希古舉進士未預解薦曲江主簿王同善遇之時知韶州者舉制科同亦舉制科知州怒以為玩已捃其罪無所得惟得同與希古按坐同坐違敕停任希古杖臀二十同遂間居虔州不復仕進希古更名靖取他州解及第景祐中為館職為范文正訟寃獲罪由是知名范公入參大政引為諫官及靖遷龍圖閣直學士王同數以書干靖求貨靖不能應其求茹孝標聞靖嘗犯刑詐匿應舉乃自詣韶州購其案得之時錢子飛為諫官方攻范黨孝標以其事語之子飛即以聞詔下韶州問王同靖諷同令避去同辭以貧不能出靖置銀百兩於茶籠中託人餉之所託者怪其重開籠竊銀而致茶于同同大怒州官勸同對當日接坐者余希古今不知所在同不從對稱希古即靖是也靖遂以將軍分司然使撻之市朝得無傷于冠帶無小人無君子宜玉石之俱焚尚書火炎昆岡玉石俱焚有里胥有大夫乞薰蕕之是辨周禮治官之屬有大夫士府史胥徒家語薰蕕不同器而藏左傳一薰一蕕十年尚猶有臭薰香草蕕臭草伏遇某官堯族俊德尚書克明俊德以親九族周家懿親左傳雖有小忿不廢懿親曹植表廣封懿親以藩屏王室粹然麟角之祥詩麟之角振振公族吁嗟麟兮傳麟角所以表其德也箋云麟角之末有肉示武而不用正義云角示武肉示不用有武而不用是其德也屈此牛刀之試謂重士所以重國要當體朝廷長育之心詩序菁菁者莪樂育材也君子能長育人材則天下喜樂之矣韓文詩曰菁菁者莪在彼中阿既見君子樂且有儀説者曰菁菁者盛也莪微草也阿大陵也言君子之長育人材若大陵之長育微草能使之菁菁然盛也知察獄先于察情又豈容胥吏上下其手左傳穿封戌囚皇頡王子圍與之爭正于伯州犁伯州犁曰請問於囚乃立囚因上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也言州犁畏王子故上下其手又抑揚其辭以導囚意欲使曲證王子圍獲已以媚之也况開設學校方將馴化于鴟梟仇覽傳天子修設太學豈但使人遊談其中又父母何在在我庭化我鳲梟哺所生塢梟即鴟梟也詩翩彼飛梟集于泮林食我桑黮懷我好音則愛惜人材何忍鞭笞于鸞鳯劉陶傳放鴟梟而囚鸞鳯韓詩上界真人足官府豈如散仙鞭笞鸞鳯終日相追陪致此㸑餘之棄蔡雍傳吳人有燒桐以㸑者雍聞火烈之聲知其良木因請而裁為琴果有異音而其尾猶焦故時人名曰焦尾琴焉薛逢詩臨岐莫怪朱絃絶曾是君家入㸑桐亦從金作之刑尚書朴作教刑金作贖刑某敢不策髀肉之功名九州春秋劉偹住荆州數年嘗于劉表坐起至厠見髀裏肉生慨然流涕表怪問偹偹曰吾常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老將至矣而功業不建是以悲耳髀音彼説文股也增韻股骨也勉皮膚之學問禮記膚革充盈疏云膚革外薄皮革膚內厚皮皮膚以喻淺也張衡東京賦末學膚受貴耳賤目杜預春秋序膚引公羊榖梁疏膚謂皮膚言淺近引之也痛懲臨難之茍免禮記臨財毋茍得臨難毋茍免益思學道以愛人儻許國之可期周札傳以身許國死而後已孔稚圭詩本持許國志况復武功彰當措刑于不試淮南子神農氏之治天下也威厲而不試刑措而不用法省而不煩文帝紀贊幾致刑措應劭曰措置也民不犯法無所刑也武帝紀周之成康刑錯不用師古曰錯置也刑法志三代之盛至於刑錯兵寢者其本末有序帝王之極功也王吉傳周之所以能致刑措而不用者以其禁邪於冥冥絶惡於未萌也司馬相如傳卉然興道而還義刑錯而不用晉江統傳成王為太子周召為保傅史佚昭文章故能刑措不用治聲洋溢陳子昻傳刑之所加人必慘怛故聖人貴措刑也自此不復贖矣家語魯國之法魯人有贖臣妾于諸侯者皆取金于府子貢贖人于諸侯而還其金孔子聞之曰賜失之矣夫聖人之舉事也可以移風易俗而教導可以施於百姓非獨適身之行也今魯國富者寡而貧者衆贖人受金則為不廉則何以相贖乎自今以後魯人不復贖人于諸侯矣此贖字乃金作贖刑之贖此特借用其句耳安用撻以記之尚書侯以明之撻以記之書用識哉欲並生哉鞭寧越而立威名既知免于東海晉書王承字安期湛之子遷東海太守政尚清靜不為細察有犯夜者為吏所拘承問其故答曰從師受書不覺日暮承曰鞭撻寧越以立威名非政化之本使吏送令歸家其從容寬恕若此説苑寧越中牟鄙人也苦耕之勞謂其友曰何為而可以免此苦也友曰莫如學學二十年則可以逹矣寧越曰請十五嵗人將休吾將不休人將卧吾不敢卧十三嵗學而周威公師之夫走者之速也而過二里止步者之遲也而百里不止今寧越之材而久不止其為諸侯師豈不宜哉南史王敬𢎞諸子未嘗教以學問人問之答曰丹朱未應乏教寧越不聞被撻出鄒陽而為上客尚有望于梁園鄒陽傳鄒陽者齊人也梁孝王貴盛待士陽之梁從孝王遊陽為人有智略慷慨不茍合介于羊勝公孫詭之間勝等疾陽惡之孝王孝王怒下陽吏將殺之陽客遊以讒見禽恐死而負絫乃從獄中上書曰臣聞忠無不報信不見疑臣常以為然徒虗語耳今欲使天下寥廓之士籠於威重之權脅于位藝之貴回靣汚行以事諂諛之人而求親近於左右則士有伏死堀穴巖藪之中耳安有盡忠信而趨闕下者哉書奏孝王孝王立出之卒為上客謝惠連雪賦嵗將暮時既昏寒風積愁雲繁梁王不悅遊于兔園西京雜記梁孝王好營宫室苑囿之樂作曜華之宫築兔園園中有百靈山山有膚寸石落猿巖棲龍岫又有鴈池池間有鶴洲鳬渚其諸宫觀相連延亘數十里竒果異樹瑰禽怪獸畢偹王日與官人賔客弋釣其中漢書梁孝王傳孝王築東苑方三百餘里廣睢陽城七十里大治宫室為復道連屬于平臺三十餘里得賜天子旌旗從千乘萬騎出稱警入言蹕擬於天子招延四方豪傑自山東遊士莫不至齊人羊勝公孫詭鄒陽之屬西京雜記梁王遊于忘憂之館集諸遊士各使為賦枚乘為栁賦路喬如為鶴賦公孫詭為文鹿賦鄒陽為酒賦公孫乘為月賦羊勝為屏風賦韓安國作几賦不成鄒陽代作謝曹直學賀雨伏以和巴歌之二闋遏雲足繼于謳青文選客有歌于郢中者其始曰下里巴人國中屬而和者數千人闋音闕張良傳歌闋師古曰盡也曲終為闋列子薛談學謳于秦青未窮青之伎自謂盡之遂辭歸秦青弗止餞于郊衢拊節悲歌聲振林木響遏行雲薛談乃謝求反終身不敢言歸贈唐律之七言喜雨宛同于醉白珊瑚鈎詩話蘇李而上高簡古淡謂之古沈宋而下法律精切謂之律韓魏公喜雨詩何假嗔雷擊怒桴默然嘉澤泱民區經時亢隔群心駭數月焦熬一陳蘇已發宋苖安在揠再生莊鮒不虞枯須臾慰滿三農望斂却神工寂似無東坡醉白堂記故魏國忠獻韓公作堂于私第之池上名之曰醉白取樂天池上之詩以為醉白堂之歌若有羡於樂天而不及者云云莫辦雙金之報張載擬四愁詩佳人遺我緑綺琴何以報之雙南金徒深什襲之藏闞子宋之愚人得燕石于梧臺之東歸而藏之以為大寶周客聞而觀之主人齋七日端冕之衣釁之以特牲革匱十重緹巾十襲客見之俯而掩口盧胡而笑曰此燕石也與瓦甓不殊應劭傳宋愚夫寶燕石緹緁十重夫睹之者掩口盧胡而笑注緁音襲謝曹直學喜雨詩伏以癲我以旱良窘望雲癲音顛詩旱既太甚黽勉畏去胡寧癲我以旱􅉃不知其故箋癲病也天何曾病我以旱曾不知為政所失而致此害有志乎民辱書喜雨春秋魯僖公三年春正月不雨夏四月不雨傳言不雨者閔雨也閔雨者有志乎民者也徒切誦清風之穆詩吉甫作誦穆如清風注穆和也清微之風化飬萬物者也未遑和白雪之髙文選其為陽春白雪國中屬而和者數十人是其曲彌高其和彌寡回平江府沈侍郎送酒平江府春秋吳國所都秦置會稽郡後漢分浙江以西置吳郡三國時吳郡與吳興丹陽為三吳陳置吳州隋平陳改曰蘇州宋太平興國改曰平江軍政和三年升為府互見後以下二條徽本闕今補杓斡龍躔日又賔于暘谷杓音標説文枓柄徐曰北斗之柄第一星取此為名杓猶標也史記天官書玉衡屬杓魁為璇璣又杓攜龍角魁鎮參首隋天文志魁杓象號令之主又為帝車取運動之義也斡烏括切廣韻轉也增韻旋也運也躔音廛方言度也日運為躔月運為晙徐曰星之躔次星所履行也後漢書斗綱所建青龍所躔尚書宅嵎夷曰暘谷寅賔出日香凝燕寢地孰勝于蘇州韋蘇州詩燕寢凝清香兵衛森畫戟矧惟荷槖之賢見前宜介椒盤之祉詩介以繁祉杜詩椒盤已頌花東坡詩堆盤紅縷細茵陳巧與椒花兩閫新恭惟某官德參隂隲尚書惟天隂隲下民相協厥居道配陽休禮記盛色顛實陽休注揚讀為陽聲之誤也若陽氣之休物也奉行寬大之書繭絲免矣侯霸傳每春下寬大之書奉四時之令餘見前宣布中和之樂襦袴暖然王褒傳使褒作中和樂職宣布詩莊子暖然如春餘見前諒報政于吳門史記魯世家伯禽封于魯三年而報政盧照鄰詩星樓望蜀道月峽指吳門即歸班于魏闕莊子身在江海之上心居魏闕之下某一寒寡與獨冷何辭並見前猶幸太嵗之在申例容乞酒袁子正書嵗在申酉乞漿得酒遙祝夀星之出丙莫遂稱觴前郊祀志武帝祠太一贊享夀星仍出淵曜光明後禮儀志仲秋之月祀老人星于國都南郊隋天文志老人一星在弧南一曰南極常以秋分之旦見於丙春分之旦沒於丁月令秋分日饗夀星於南郊爾雅夀星角亢也注列宿之長故曰夀星回嶽總領珂送酒賀正宋史理宗寶慶三年五月詔嶽珂户部侍郎依前淮東總領兼制置使嶽忠武王生五子雲雷霖震霆珂霖之子知嘉興府所著有愧剡録桯史世稱為亦齋先生伏以天躔回甲聿新歷數之朌尚書協用五紀五曰厯數尸子造厯數者羲和子也嵗紀在申將應酒泉之讖應劭漢官儀酒泉城下有金泉泉味如酒故曰酒泉時庸膚使楊子雖古之膚使其猶劣諸注膚美也日進啿祺啿徒感切漢禮樂志羣生啿啿惟春之祺服虔曰啿音湛湛露斯如淳曰祺福也師古曰啿啿豐厚之貌恭惟某官德配陽休功多隂隲見上條漕下氷解師有宿飽之期趙充國傳分屯要害處氷解漕下掌下月升日佇辰猷之告杜詩卿月升金掌王春度玉墀詩訏謨定命逺猷辰告注猶圖也大謀定命謂正月始和布政于邦國都鄙也為天下逺圖庶事而以嵗時告施之聊暫紆於羔袖左傳齊人以郲寄衛侯及其復也以郲糧歸右宰榖從而逃歸衛人將殺之辭曰余不説初矣余狐裘而羔袖乃赦之注狐裘羔袖喻已暫從君即歸國善多而惡少也即徑上於雞翹後漢輿服志鸞旗者編羽旄列繫幢旁民或謂之雞翹非也李商隱詩屬車無復插雞翹某家本一寒官宜獨冷見前窮年兀兀只自慙廪粟之靡進學解恆兀兀以窮年又月費俸錢嵗靡廪粟清夜沉沉賴肯續燈花之酌杜詩清夜沉沉動春酌燈前細雨簷花落回新都廖宰子材送酒及石榴徽州春秋屬吳戰國屬越秦屬鄣郡漢屬丹陽郡吳分置新都郡晉改新安郡宋宣和三年改新安郡曰徽州伏蒙郇翰新唐書韋陟傳自謂所書陟字若五朵雲時人慕之號郇公五雲體寵賁陶籬陶靖節詩種菊東籬下悠然見南山餉以乘壺定有可人之味禮記以乘壺酒束修一犬賜人注乘壺四壺也唐鄭綮開元傳信録葉法善坐客思酒忽有人扣門曰麴秀才居坐末論難鋒起葉疑其魑魅以小劒擊之化為瓶榼乃盈瓶醇醖坐客醉而揖其瓶曰麴生風味不可忘也陳後山詩風味如麴君山谷詩一邱風味極可人又奈此尊前風味何詳見前侑之碩果中存多子之祥侑尤救切説文耦也禮以樂侑食鄭云勸食也詩以妥以侑毛傳勸也易碩果不食比齊書魏收傳安德王延宗納趙郡李祖收女為妃後帝幸李宅宴而妃母宋氏薦二石榴於席前問諸人莫知其意帝投之收曰石榴房中多子王新婚毋欲子孫衆多帝大喜詔收卿返將來賜收美錦二匹稗史果中子繁者唯夏瓜冬石榴故嗜果者呼為多子甕李商隱詩榴枝婀娜榴實繁山谷詩紅榴罅多子續歡伯之風流焦氏易林坎之兊曰酒為歡伯除憂來樂適體頥性陸龜蒙詩持來歡伯內坐使賢人清山谷詩身入醉鄉無畔岸心與歡伯為友朋又尊中歡伯笑爾輩我本和氣如三春又歡伯可解藜藿朝洗醋兒之酸楚博異記天寶中崔元徽春時月夜于苑中見青衣女伴曰楊氏李氏陶氏又緋衣小女曰石醋醋即石榴也本草石榴有酸淡兩種道家謂之三尸酒鄴中記石虎苑中有安石榴子大如碗盞其味不酸晉安帝起居注武陵臨沅獻安石榴子大如碗其味不酸一蒂六實已從竹葉獲觀令尹之清張衡七辨玄酒白醴蒲萄竹葉張華輕薄篇蒼梧竹葉宜成九醖陳張正見詩竹葉三清泛蒲萄百味開唐李嶠詩臨風竹葉滿湛月桂香浮徐邈傳酒客謂酒清者為聖人鄒陽酒賦清者為酒濁者為醴尚想榴皮可頌中書之考東坡集回先生過湖州東林沈氏飲醉以石榴皮書其家東老庵之壁云西鄰已富憂不足東老雖貧樂有餘白酒釀來因好客黃金散盡為收書東坡和之云凄涼雨露三年後髣佛塵埃數字餘至用榴皮緣底事中書君豈不中書侯鯖録熙寧中有道人過沈東老飲酒用石榴皮寫絶句于壁自稱回山人東老送出門至石橋上先渡頭數十步不知所在或曰此吕先生也七年坡過晉陵見東老之子能道其事東老已歿三年矣坡為和其詩代回安撫趙尚書送物共六尺之輿同寅是幸袁盎傳天子所與共六尺輿者皆天下豪英尚書同寅協恭和衷哉分丈二之組先甲巳頒嚴助傳陛下以方寸之印丈二之組鎮撫方外易先甲三日後甲三日詳見前悵遂告違顧勤亟餽惠而好我慙取數之孔多詩惠而好我攜手同行箋性仁愛而又好我者禮記取數多者仁也卻之不恭敢下拜而登受左傳王使宰孔賜齊侯胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜下拜登受言拜於階下而登堂以受賜區區𠂻謝左傳是區區者而不豫畀又宋國區區而有詛有祝注區區小也杜詩浮名尋己巳懶計託區區互見前續續靣陳陳后山詩續續題詩不耐間又聲問應須續續來同前一麾出守漸可解維見前同官為僚蒙加折爼左傳同官為寮吾嘗同寮敢不盡心乎又王享有體薦宴有折爼公當享卿當宴王室之禮也言天子設享禮則半解其體而荐之為不食故不解折謂之房蒸所以示儉也天子設宴禮則體解節折升之于爼物皆可食謂之殽蒸所以示慈惠也維多維旨詩君子有酒旨且多又君子有酒多且旨又物其多矣維其嘉矣物其旨矣維其偕矣注有酒旨絶句且多二字為一句言非特有此鱨鯋之大魚又君子有酒矣其魚酒如何酒既旨美魚復衆多多且旨言酒多而此魚又美也且感且慙敢貢記室之辭續漢百官志三公大將軍皆有記室上表章報書記何曽傳人以小紙為書敕記室勿報事物紀原云魏太祖以陳琳阮瑀為記室掾其官始見于此宋用晉制自明帝後皇子弟雖非都督亦置記室參軍則記室而為參軍晉官也宋亦置于諸王府曰某王府記室少致兵厨之謝阮籍傳聞步兵厨營人善釀貯酒三百斛乃求為步兵校尉代回趙京尹餞送已辭軒陛漸理艅艎説文艎艅艎也唐劉晏為歇艎艅艎吳大舟名通作皇左傳楚敗吳師獲其乘舟余皇更勤加餽之稠重重音蟲復也增韻疊也又纍也冞仞大寮之篤敘冞音彌深也從冖從米冞與穼不同穼音森從穴從木詩冞入其阻注冞者有深入之意故為深也仞而振切通作認列子仞而有之東坡集仰仞至恩益堅素守尚書有服在大僚又惠篤敘又篤敘乃正父既醉既飽腹不勝其屬饜饜么鹽切通作猒有平去二音左傳屬厭而已杜氏曰言小人之腹飽猶知厭足載欣載奔靣無由而控謝歸去來辭乃瞻衡宇載欣載奔僮僕歡迎稚子候門代回臨安府七夕送物抱拙終身倦乞犬牙之巧栁子厚乞巧文剖瓜犬牙且拜且祈又抱拙終身以死誰惕未能免俗願安犢鼻之貧竹林七賢傳阮咸字仲容籍兄子也舊俗七月七日法當曬衣諸阮庭中爛然莫非綈錦咸乃竪長竿標大布犢鼻裩曝於庭中曰未能免俗聊復爾耳臺餽鼎來匡衡傳無説詩匡鼎來服虔曰鼎猶言當也若言匡且來也應劭曰鼎方也尹釐意厚尚書命畢公保釐東郊酒醪醇一况加雞跖之甘醪音勞説文汁滓酒也爰盎傳買二石醇醪師古曰汁滓合之酒也醇廣韻醲也通作淳史記日飲淳酒一説文專一也從壺吉聲廣韻醇也史丹傳秉義醇一跖音隻與跖同腳掌也淮南子善學者若齊王之食雞必食其跖數千而後足張協七命封熊之蹯翰音之跖翰音雞也應璩詩狂言雖寡善猶如有雞跖􅊡餌馨香仍儐螺甲之旨乞巧文􅊡餌馨香蔬果交羅􅊡諸延切徐曰此今饘字説文糜也周謂之饘宋謂之糊禮記注疏厚曰饘希曰粥荀子酒醴􅊡鬻餌説文粉餅也儐通作擯説文道也螺甲香名廣志甲香出南方南州異物志甲香螺屬也大者如甌靣一邉直攙長數寸圍殼岨峿有刺其掩可合衆香燒之能使益芳獨燒則臰甲香一名流螺謂之中流最厚味范曄香序棗膏昏蒙甲煎淺俗唐本草螺甲蟲類生雲南者大如掌青黃色取靨燒灰用之今合香多用謂能發香復聚香煙按韻書蠡亦作螺韓鄂四時纂要載修甲香方取大甲如崑崙耳者酒煮蜜熬入諸香等用東坡詩香螺脫黶來相羣注香螺脫黶甲香也能聚衆香山谷詩石蜜化螺甲榠樝煮水沉博山孤煙起對此作森森又螺甲割崑崙耳香材屑鷓鴣斑欲雨鳴鳩日永下帷睡鴨春間山谷自跋云螺甲磨去齟齬以胡麻膏熬之色正黃則以蜜湯劇洗此製法也備此四美滕王閣序四美具二難屏跂彼七襄詩跂彼織女終日七襄雖則七襄不成報章跂翹移切又去智切注跂隅貌織女三星跂然如隅三星鼎足而成三角望之跂然故云隅貌襄駕也駕謂更其肆也天有十二次日月所止舍舍即肆也在天為次在地為辰每辰為肆是歷其肆舍有七也莫宣銜職之私陶詩銜戢知何謝冥報以相貽戢音節説文藏兵也詩載戢干戈爾雅聚也疏藏聚也但劇嚅嚌之感嚌音劑嘗也飲至齒也唐藝文傳嚅嚌道真回蹇學諭賀得粟九穗穗音遂説文禾成秀一莖九穗昔嘗疑司馬之諛史記司馬相如封禪書導一莖六穗於庖後漢紀光武生於建平元年十二月是嵗濟陽縣界有嘉禾生一莖九穗因名曰秀古今注和帝元年嘉禾生濟隂城陽一莖九穗異壟同榮今顧辱昌黎之頌昌黎河中府連理木頌殊本連理之柯同榮異隴之禾又奏汴州得嘉禾狀或兩根並植一穗兩房雖君子之政不以物怪栁河東零陵郡復乳穴記君子之祥也以政不以怪誠乎物而信乎道人樂用命熙熙然以效其有斯其為政也而獨非祥也歟然太師于詩可見民風禮記命大師陳詩以觀民風注陳詩謂采其詩而視之要非于祥而于仁栁文貞符受命不于天于其人休符不于祥于其仁恨弗以規而以頌昌黎送許郢州序愈於使君非燕遊一朝之好也故其贈行不以頌而以規民曰太守太守不有何敢當儒館之歌東坡喜雨亭記民曰太守太守不有歸之天子天子曰不然歸之造物秀升司馬司馬辨材請以旅天子之命禮記大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告于王而定其論書序唐叔得禾異畝同穎獻諸天子王命唐叔歸周公於東作歸禾周公既得命禾旅天子之命作嘉禾孔傳已得唐叔之禾遂陳成王歸禾之命而推美成王善則稱君回李僉判賀瑞粟某導九穗于漢庖此真偶爾導擇也擇嘉禾之米于庖厨以供祭祀也歌五言之唐律何德當之謝瀹傳齊武帝問王儉當今誰能為五言對曰朏得父膏腴江淹有意王褒傳此盛德之事吾何足以當之不敢續貂趙王倫傳貂不足狗尾續恐譏集鶡漢書循吏傳京兆尹張敞舍鶡雀飛集丞相府丞相霸以為神雀議欲以聞敞劾奏之天子嘉納霸甚慙學齋占畢云黃霸傳鶡雀集丞相府蘇林云今虎賁所著鶡也師古曰蘇説非也此鶡音芬字本作鳻此通用耳鳻雀大而色青出羌中非虎賁所著也虎賁鶡者色黑出上黨以其鬪死不止故以其尾飾武臣首云鳻似鳯今人例以曷音讀之誤矣今按以梅亭之博雅而誤讀鶡字甚矣識字之難也唐叔之得同穎安敢望周公之歸注見上條劔南之進嘉禾亦難上栁子之表栁子厚賀嘉禾及芝草表伏見劒南所進嘉禾圖及陜州所進紫芝草者獻于王庭唐叔慙同穎之異薦諸郊廟班史謝連葉之竒姑藏佳句杜詩清談慰老夫開卷得佳句又佳句染華箋又美名人不及佳句法如何又為人性癖耽佳句語不驚人死不休山谷詩不似灞橋風雪中半臂騎驢得佳句以俟豐年詩豐年多黍多稌回王監酒提督修城伏以三里之城不修則壞左傳宗子維城毋俾城壞韓文滕王閣記此屋不修且壞公為邦伯烏得無情哉一日必葺欲罷不能左傳叔孫所舍雖一日必葺其牆屋去之日如始至擬煩督戊巳之屯見前相與營甲戌之築尚書甲戌我惟築龍見而畢不妨節用以使民左傳凡土功龍見畢務戒事也注龍星角亢晨見東方隼射于墉亦可待時而藏器繫辭易曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也代回運使賀雪詳啓意乃冬至賀雪黃雲紀瑞肇新魯觀之書春秋孔演圖黃帝之將興黃雲升于堂文命之候春秋合誠圖堯母慶都常有黃雲覆蓋之京房易飛候黃雲如覆車大豐也左傳僖公五年辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為偹故也易占卦驗冬至之日其雲赤者旱黑者水白者為兵黃者有土功白雪效祥遄應梁園之賦謝惠連雪賦嵗將暮時既昏寒風積愁雲繁梁王不悅遊於兔園俄而微霰零密雪下相如於是避席而起逡巡而揖曰臣聞雪宫建于東國雪山峙於西域云云能令公喜見前不在我先詩心之憂矣寧自今矣不自我先不自我後恭惟某官德配陽和氣排冬凛杜詩喜氣排寒冬有功使臣歌四牡兼此二難詩序四牡勞使臣之來也有功而見知則説矣省事天公厭兩回併成一賀東坡元日立春詩省事天公厭兩回新年春日并相催方圗靣慶又辱手箋不成報章尚幾幸察回陳術士某適勤狂顧寵畀儷箋不但知五行之精昌黎李虛中墓志君最深於五行書以人之始生年月日所值日辰支干相生勝衰死王相斟酌抑人夀夭貴賤利不利輒先處其年時百不失一二抑又窺多文之富禮記不祈多積多文以為富其為感佩罔既報酬四六標準卷十一
