  - {type: variant, offset: 14, length: 219, content: 上宋祖懲五季之患召諸鎭留京師命朝臣出守列郡號權知軍州事軍謂兵州謂民政其後文武官參為知軍州事二品以上及帶中書樞密院宣徽使職事稱判太守若河南應天大名府則兼留守司公事太原府延安府慶州渭州衡州秦州則兼經畧安撫使馬歩軍都總管定州眞定府瀛州大名府京兆府則兼安撫使馬歩軍都總管瀘州潭州廣州桂州雄州則兼安撫使兵馬鈐轄潁昌府青州鄆州許州鄧州則兼安撫使兵馬廵檢其餘大蕃府或沿邊州郡或當一道衝要者並兼兵馬鈐轄廵檢都監或帶沿邊安撫提轄兵甲沿邊溪峒都廵檢餘州軍則否, SBCK: ''}
