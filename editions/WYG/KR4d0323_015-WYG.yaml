body:
  text: 四六標準巻十五宋李劉撰師傅封爵附三公之官昉於虞夏歴代沿革不常不能殫述宋承唐制以太師太傅太保為三師太尉司徒司空為三公為宰相親王使相加官其特拜者不預政事赴上於尚書省太尉舊在三師下由唐以來至宋加重以太尉居太傅之上若宰臣官至僕射致仕者以在位乆近或已任司空司徒則拜太尉太傅等官若太師則為異數自趙普以開國元勲文彥博以屢朝耆德方特拜焉徽宗政和二年以司徒司空六卿之官非三公之任太尉主兵柄亦非三公並罷依周制立三孤之官為次相之任賀史丞相除少師宋史史彌逺傳寧宗崩彌逺擁立理宗於是拜太師依前右丞相兼樞密使進封魏國公六辭不拜因乞解機政歸田里亟出闗帝從之寶慶二年拜少師賜玉帶巽避公槐墨莊漫録翟㢲致語公槐避寵衣繡歸家升魁孤棘周禮左九棘孤卿位焉萬世策定盍徑躋萬石之班霍光傳天子思光功德下詔曰故大司馬大將軍定萬世册以安社稷功德茂盛朕甚嘉之辛慶忌傳誠萬世之長册王吉傳公卿未有建萬世之長册王莽傳莽三世為三公典周公之職建萬世策六典注梁制十八班班高者為貴上公班第十八秩萬石栁文永州萬石亭記漢之三公秩號萬石我公之德宜受兹錫三台色齊乃退處三孤之長天文志三台色齊君臣和不齊為乖戾漢百官表立三少為三公之副少師少傅少保是為孤卿寸心如此謝靈運詩寸心若不諒㣲命察如絲杜詩寸心亦何有又戀主寸心明又以兹報主寸心赤又平生方寸心千載無之恭惟某官厚大而裕和端凝而𢎞毅周拜乎前魯拜乎後邁韋平父子之榮公羊傳封魯公為周公也周公拜乎前魯拜乎後曰生以養周公死以為周公主注始受封時拜於文王之廟也史記韋丞相賢者魯人以讀書術為吏至大鴻臚有相工相之當至丞相有男四人使相之至第二子名𤣥成相工曰此子貴當封丞相曰我即為丞相有長子是安從得之後竟為丞相長子不得嗣而立𤣥成𤣥成代父後失列侯復自遊宦而起至丞相父子俱為丞相世間美之漢書平當字子思漢哀帝朝拜相賜爵闗内侯子宴亦以明經拜相封侯漢興父子拜相惟韋平二氏陟格於帝尹格於天續堯舜君民之業見前自開僖之末一麾九日史彌逺傳開僖三年改禮部侍郎兵端既開敗䘐相屬累使求和金人不聽都城震摇宫闈疑懼皆畏韓侂胄莫敢言彌遠力陳危迫之勢皇子詢具奏侂胄乃就誅寧宗紀開僖三年禮部侍郎史彌逺等以密㫖命夏震誅韓侂胄于玉津圉淮南子堯時十日並出草木焦枯堯命羿仰射十日其九鳥皆死墮羽翼山海經大荒之中湯谷上有扶桑木十日可浴九日居下枝一日居上枝皆載烏傅𤣥詩湯谷發清曜九日棲高枝互見前相嘉定之治十有七年寧宗紀嘉定元年冬十月以錢象祖為左丞相史彌遠為右丞相十七年寧宗崩彌逺擁立理宗於我如浮雲心本游於澹泊劉愷傳躬浮雲之志兼浩然之氣淮南子超然獨立此聖人所以游心揚雄傳人君以澹泊為本又泊如也用汝作霖雨身爰佩於安危陸賈傳天下安注意相天下危注意將新唐書李晟傳贊晟提孤軍抗羣賊身佩安危而不少衰者徒以忠義感人故豪英樂為之死耳舊唐書裴度傳出入中外以身繫國之安危時之輕重者二十年東都事略王曾毅然大節身佩安危既莫挽鼎湖之龍史記封禪書黄帝采首山銅鑄鼎於荆山下鼎既成有龍垂胡髯下迎黄帝黄帝上騎羣臣從宫從上者七十餘人龍乃上去餘小臣不得上乃悉持龍髯龍髯拔墮墮黄帝之弓百姓仰望黄帝既上天乃抱其弓與胡髯號故後世因名其處曰鼎湖其弓曰烏號寧宗紀嘉定十七年八月帝不豫閏八月崩於福寧殿乃力洗咸池之日淮南子日出於暘谷浴於咸池拂於扶桑是謂晨明詳見前周勃之誅吕迎代尚觀望於軍情周勃傳勃與丞相平朱虛侯章共誅諸吕迎立代王是為孝文皇帝高后紀勃入軍門行令軍中曰為吕氏右袒為劉氏左袒軍皆左袒勃遂將北軍霍光之擁昭立宣㡬動摇於廷議霍光傳光將廢昌邑㑹議未央宫羣臣皆驚愕失色莫敢發言田延年離席按劔曰今日之議不得旋踵羣臣後應者臣請劔斬之於是議者皆叩頭曰萬姓之命在於將軍唯大將軍令贊曰光處廢置之際臨大節而不可奪遂匡國家安社稷擁昭立宣光為師保雖周公阿衡何以加此未有獨運於掌上荀子圖迴天下于掌上不煩執事之顔行行胡郎切嚴助傳逆執事之顔行文頴曰顔行猶鴈行在前故曰顔為天下得人與生民立極栁文立極垂統貽於後裔道慿几之命而宴然仍几尚書顧命王乃洮頮水相被冕服慿玉几又華玉仍几又皇后慿玉几道揚未命宋寧宗嘉定十三年太子詢卒十四年以沂王嗣子貴和為皇子更名竑進封沂國公尋立為皇太子立貴誠為沂王後時彌逺用事乆權勢熏灼竑心不能平與彌逺有違言彌逺買美人納諸竑使瞷竑動息思以處竑而竑不知十七年帝崩彌遠矯詔立貴誠更名盷輔垂簾之政而遄已撤簾理宗紀帝立尊楊皇后為皇太后垂簾聽政寶慶元年皇太后手書多病自今免垂簾聽政帝兩請垂簾不允三邊絶赤白之囊丙吉傳驛騎持赤白囊邊郡發奔命書馳來至詳見前萬國布黄朱之乘尚書太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黄朱賔稱奉圭兼幣風雷屛息繫辭雷以動之風以散之日月重光古今注明帝為太子羣臣為樂人作歌詩四章以贊太子之德一曰日重光二曰月重輪三曰星重輝四曰海重潤舊説曰天子之德光明如日規輪如月衆耀如星浩潤如海太子皆比德焉故云重宜聖神建道德之師賈誼新書天子不諭於先聖人之德不知君國畜民之道凡此屬太師之任也古者齊太公職之見輔弼為社稷之寶比播維垣之命允孚巖石之瞻乃執撝謙力回成渙並見前弗敢基命定命正倚弼諧尚書王如弗敢及天基命定命予乃允保大相東土又謨明弼諧謝安傳安義存輔導雖㑹稽王道子亦頼弼諧之益若曰父師少師何拘等級尚書微子若曰父師少師説文級絲次第也又等也階也杜詩孤陋忝末戚等級敢比肩姑冠班於洪化尚書少師少傳少保曰三孤貳公𢎞化寅亮天地弼子一人即顓面以經邦李尋傳天官上相上將皆顓靣正朝孟康曰朝太微宫垣也西垣為上將東垣為上相各專一靣而正天之朝事也周禮靣三槐三公位焉尚書兹惟三公論道經邦坤載物而承天蓋得下裳之吉易至哉坤元萬物資生乃順承天坤厚載物德合无疆六五黄裳元吉注黄中之色也裳下之飾也鼎以木而巽火實存上鉉之虛易鼎象也以木巽火亨餁也上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也鉉湖畎切説文舉鼎也易謂之鉉禮謂之鼎九重尊李泌以先生唐肅宗至德二年收復西都使李泌革表請上皇東歸因就泌飲酒同榻而寢泌曰臣今報德足矣復為閑人何樂如之上曰朕與先生乆同憂患今方同樂奈何遽去四海戴子儀為尚父詩維師尚父時維鷹揚劉向别録師之尚之父之故曰師尚父父亦男子之美號也唐代宗大厯十四年尊郭子儀為尚父加太尉兼中書令黄河如帶山如礪豈惟難拒於公珪漢書功臣表封爵之誓曰使黄河如帶泰山若礪國以永存爰及苗裔應劭曰封爵之誓國家欲使功臣傳祚無窮也帶衣帶也礪砥礪石也河當何時如衣帶山當何時如礪石言如帶礪國猶永存以及後世之子孫也周禮大宗伯之職以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭史彌逺傳嘉定元年拜右丞相兼樞密使兼太子少傅進開國公青櫺有洞石有牕恐合紹開於王社青櫺洞石牕在今靳縣四明山郡志四明山舊產青櫺子盖洞旁所出其山周廻八百里跨紹興台州之境二百八十峯其巔五峯絶高形如芙蓉上有石牕四穴通日月星辰之光故曰四明山唐陸龜蒙云四明山有峯最高四穴在峯上每天色澄霽望之如户牖相傅石牕四明之日也彌逺靳人父浩嘉定十四年追封越王理宗紹定五年進封彌逺㑹稽郡王卒特贈中書令進封衛王某夙勤坏冶崔駰傳坏冶一陶羣生待理自抵簡書詩畏此簡書泥塗乆隔於朝紳夢寐尚隨於賀臆輒慿魚繭之素韓詩書饒罄魚繭又繭浄雪難如書訣紙取東陽魚卯墨取廬阜松煙又蘭亭㑹者四十一人王羲之製序用蠶繭紙鼠鬚筆遒勁絶妙恭布燕雀之私淮南子大厦成而燕雀相賀亮天地而弼一人諒益基無窮之聞理陰陽而遂萬物尚祈澤不獲之夫並見前代董侍郎賀丞相除少師巽避公槐升魁孤棘見上條奮庸而宅百揆輔茂陵十八載之隆平寧宗紀嘉定十七年閏八月帝崩理宗寶慶元年三月葬于㑹稽之永茂陵彌逺以開禧三年誅韓侂胄同知樞密院事嘉定元年參知政事寅亮而弼一人開寶慶億萬年之晏粲寶慶理宗年號尚書公其以予萬億年敬天之休爾雅宴宴粲粲尼居息也注云盛飾宴安近處優閒䟽宴宴安息貌粲粲鮮盛也法言成天地之化使粒食之民粲也晏也注粲文采宴和柔祕曰粲然明盛宴然安和明良交際動植均驩恭惟某官德鉅材全韓文信所謂材全而能鉅者也器閎用博累世躬行於忠孝四朝身佩於安危見上條河決平原力挽百川而注海韓文障百川而東之風摇厦屋獨高一柱之擎天詩予室翹翹風雨所漂摇法言震風凌雨而後知厦屋之軿幪也神異經崑崙有柱焉其高入天所謂天柱也圍三千里圖如削下有仙人府治與天地同休息雲溪友議鄭太穆為金州刺史致書於襄陽于司空傲睨自若閣下為南溟之大鵬作中天之一柱騫騰則日月暗摇動則山岳頽楚辭八柱何當東南何虧言天有八山為柱列子折天柱絶地維張説姚崇神道碑八柱承天高明之位列四時成嵗亭毒之功深盡返齊疆全歸趙壁並見前金甌閒暇從容作商野之霖梁書侯景傳景歸附高祖議納之而意猶未決曾夜出視事至武德閣獨言我國家猶若金甌無一傷缺今便受地詎是事宜新唐書崔琳傳𤣥宗每命相皆先書其名一日書琳等名覆以金甌㑹太子入謂曰此宰相名若自意之誰乎即中且賜酒太子曰非崔琳盧從愿乎帝曰然賜太子酒玉几導揚談笑取虞淵之日尚書皇后慿玉几導揚末命吕温狄仁傑頌取日虞淵洗光咸池濳授五龍夾日以飛詳見前與生民而立極為天下以得人九夷八蠻服整頓乾坤之手尚書惟克商遂通道于九夷八蠻傳九八言非一䟽曲禮云東夷西戎南蠻北狄經舉夷蠻則戎狄可知爾雅釋地云九夷八狄七戎六蠻謂之四海杜詩成王功大心轉小郭相謀深古來少司徒清鑒懸明鏡尚書氣與秋天杏二三豪俊為時出整頓乾坤濟時了兩宫二聖知扶持社稷之心舊唐書則天紀當時稱為二聖王允傳故得扶持王室於危亂之中李固傳論至矣哉社稷之心乎其顧視胡廣趙戒猶糞土也肆疇巖石之瞻祭遵傳疇其爵邑世無絶嗣注疇等也言功臣死後子孫襲封世世與先人等亟出維垣之命甫揚成渙遽執撝謙重違三命再命之共並見前甫轉父師少師之拜尚書父師少師孔傳父師太師三公少師孤卿元圭衮冕上猶恨無官以酬公尚書禹錫元圭周禮上公之禮執桓圭九寸冕服九章新唐書李德裕傳劉闢誅䇿功拜太尉德裕固讓帝曰吾恨無官以酬公詳見前夏篆通旃公豈以辭榮而邀上周禮春官巾車服車五乘孤乘夏篆卿乗夏縵注服車服事者之車故書夏篆為夏縁鄭司農云夏赤也縁縁色或曰夏篆轂有約也𤣥謂夏篆五彩畫轂約也旃當作旜春官司常掌九旗之物名通帛為旜注通帛謂大赤從周正色無飾䟽云周建子物萌色赤今旂旌通體盡用絳之赤帛是用周之正色無他物之飾也又諸侯建旟孤卿建旜惟楓陛比隆於皇祖皇祖謂光祖則茅封克紹於先王漢雜事天子太社以五色為壇封諸侯者取其土苴以白茅授之各以所封方之色以立社于其國謂之授茅土彌逺父浩卒封㑹稽郡王西平有子我有臣垂光簡冊栁文蔡人率止惟西平有子惟我有臣周公拜前魯拜後濟美鼎彞任昉文功銘鼎彞杜詩昭然開鼎彞餘見前某自分泥塗夙蒙甄冶毫釐千里既自投丹筆之書釐通作氂十毫曰氂禮記易曰君子慎始差若毫氂繆以千里謝承後漢書盛吉為廷尉每至冬節罪囚當斷婁夜執燭吉持丹筆夫妻相對垂泣決罪首尾八年未易復白圭之玷兹服坦明之制孔安國尚書序帝王之制坦然明白可舉而行但增踴躍之私黄麻之似六經自此尚觀於蕃錫杜詩紫誥仍兼綰黄麻似六經易康侯用錫馬蕃庶晝日三接洪鈞之轉一氣更祈俯振於餘生説文振舉救也荆軻傳禍必不振矣索隱曰振救也甘茂傳願君以餘光振之餘見前賀史丞相除太傅任成都運使作師臣巽命晉書王導傳論軒轅聖人也仗師臣而授圖商湯哲后也託負鼎而成業帝傅升班歐陽公李昭諒制增其帝傳之業七十從心公亦何心於極品三千同德獨高崇德之紹勲尚書予有臣三千惟一心又惟稽古崇徳象賢叶朱衣介幘之祥晉書陶侃傳侃嘗如厠見一人朱衣介幘斂板曰以君長者故來相報君後當為公位至八州都督按晉宋太傅金章紫綬進賢三梁冠介幘絳朝服佩山𤣥玉增黄耳玉鉉之重易六五鼎黄耳金鉉利貞上九鼎玉鉉大吉无不利王弼注耳黄則能納剛正以自舉也餘見首條竊以傅者傅之德義不惟其官惟其人大戴禮傅傅之德義孔安國尚書注相傅天子於徳義尚書明王立政不惟其官惟其人臣哉臣作股肱罕有是父有是子尚書臣哉隣哉又臣作朕股肱耳目法言無是父無是子詳見前若西京厚王陵之寵通典太傅古官漢高后元年初置太傅金印紫綬初用王陵後省及東都旌卓茂之年通典後漢有太傅上公一人掌以善道無常職光武以卓茂為之卓茂傳茂知更始政亂以年老乞骸骨歸光武即位以茂為太傅封襃德侯雖加衡紞以鞶纓張衡東京賦乃整法服正冕帶珩紞紘綖玉弁綦㑹火龍黼黻藻繂鞶厲鞶厲帶之垂者俱匪箕裘之鼎鼐見前於皇孝廟詩於皇武王又於皇時周注於乎美哉君是周邦潘岳詩於皇時晉舊學越王尚書台小子舊學于甘盤史浩傳浩晩治第鄞之西湖上建閣本兩朝賜書又作堂光宗為書明良慶㑹名其閣舊學名其堂當淳熈丙午之夀上皇孝宗紀淳熈十三年春正月庚辰朔率羣臣詣德夀宫行慶壽禮大赦文武臣僚並理三年磨勘以正月戊子而進亞父孝宗紀十三年正月癸巳以史浩為太傅陳俊卿為少師嗣濮王士歆為少保癸已後戊子六日史與此異未知孰是史記亞父者范增也如淳曰亞次也尊敬之次父猶管仲為仲父今專槐之正位有喬木之世臣父子一家兩兩齊三台之色史記天官書魁下七星兩兩相比者曰三能三能色齊君臣和詳見前君臣千載重重聚四紀之間廣溪詩話蘇易簡在翰林一日召對賜酒甚歡上謂易簡曰君臣千載遇易簡應聲答曰忠孝一生心上悦賁然緑綈之新外戚傳持詔記盛緑綈方底師古曰綈厚繒也緑其色也方底盛書囊形若今之算幐耳綈音大奚反西京雜記漢中書以武都紫泥為璽室加緑綈其上復此青氊之舊見前恭惟某官清和而任直大以方禹以功臯以謨遹全絶德法言或問絶德曰舜以孝禹以功臯陶以謨非絶徳耶絳之果霍之勇難擬脩能法言或問近世社稷之臣曰若張子房之智陳平之無悞絳侯勃之果霍將軍之勇終之以禮樂則可謂社稷之臣矣離騷經紛吾既有此内美兮又重之以脩能無敵知儒者之真法言魯不用真儒故也如用真儒無敵於天下安得削可乆見賢人之德一柱障黄河之決兩手洗白日之光並見前三登二十七年漢書食貨志民三年耕則餘一年之畜餘三年食進業曰登再登曰平餘六年食三登曰太平二十七年遺九年食然後王德流洽禮樂成焉注登進上百工之業也或曰進上農工諸事業名曰登萬機㡬千百變李濟翁資暇集云萬㡬字出尚書孔安國云㡬微也言當戒萬事之微也史以晉太宗為丞相於事動每經年桓温患其稽遲對曰萬㡬那得速耶此對真得書義近改為樞禨之機當由王嘉傳引用之誤内除狗鼠旋安鴻鴈之居叔孫通傳此特羣盜鼠竊狗偷詩鴻鴈子飛集於中澤之子于歸百堵皆作雖則劬勞其究安宅詩序鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之故作此詩外率貔貅顯築鯨鯢之觀左傳古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝餘見前風震雨凌而棟梁自若法言震風凌雨然後知厦屋之為帲幪也火炎水潤而鼎實各調尚書水曰潤下火曰炎上易鼎象也以木巽火又木上有火九二鼎有實象曰鼎有實慎所之也六五鼎黄耳象曰鼎黄耳中以為實也晉書劉寔傳正位上台光餁鼎實葢享天心尚書惟尹躬暨湯咸有一德堯享天心受天明命非要人爵陶侃之指紋貫徹猶三遜以滋高陶侃傳有善相者師圭謂侃曰君左手中指有竪理當為公若徹千上貴不可言侃以針決之見血灑壁而為公字以紙裛之公字愈明後漢書和帝紀皇太后詔曰故太尉鄧彪元功之族三讓彌高海内歸仁為羣賢首可謂老成黄耉矣其以彪為太傅賜爵闗内侯梁書謝朏傳假使魏早依唐虞故事亦當三讓彌高丁固之松夢畱連甘十年之不調吳志甘露三年以左右御史大夫丁固孟仁為司徒司空吳書初固為尚書夢松樹生其腹上謂人曰松字十八公也後十八嵗吾其為公乎卒如夢焉張釋之傳事文帝十年不得調亡所知名注調選也上念慈闈之訓日思元老之功無官酬公見前惟師尚父詩維師尚父時維鷹揚猶堅謙抑力反渙揚易渙汗其大號又揚於王庭姑隆絶席之班張禹傳延平元年遷為太傅録尚書事每朝見特贊與三公絶席式舉載輿之典魏志太傅鍾繇有膝疾拜起不便朝見使載輿車虎賁畀就坐是後三公有疾遂以為故事虹明帶玉通典太傅佩山𤣥玉禮記君子比德於玉氣如白虹天也唐常衮謝賜緋衣魚袋玉帶牙笏表銀章雪明朱紱電映魚須在手虹玉横腰龜顧印金晉書孔愉傳以討華軼功封餘不亭侯愉嘗行經餘不亭見籠龜於路者買而放之溪中龜左顧者數四及是鑄侯印而印龜左顧三鑄如初印工以告愉乃悟遂佩焉李徳裕詩云龜顧垂金鈕鸞飛曳錦袍備冠冕之上儀栁文爰自中古實為上儀増衣冠之盛事改容而禮賈誼傳今自王侯三公之貴皆天子之所改容而禮之也論道以經尚書兹惟三公論道經邦平淮用八千兵更酬謝傅蒼生之志謝𤣥傳苻堅率兵次於項城衆號百萬𤣥與從弟輔國將軍琰西巾郎將桓伊等以精鋭八千渉渡淝水堅衆奔潰謝安傳桓温請安為司馬高崧戲之曰諸人每相與言安石不肯出將如蒼生何蒼生今亦将如卿何安有愧色卒贈太傅諡文靖辭齊封三萬户㑹尋留侯黄石之盟張良傳漢六年封功臣高帝曰運籌䇿帷幄中決勝負千里外子房功也自擇齊三萬户良曰始臣起下邳與上㑹留此天以臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬户良始所見下邳圯上老人與書者後從高帝過濟北果得穀城山下黄石取而寶祠之及良死并葬黄石每上塚伏臘祠黄石某乆累播鈞遐瞻巖石聳聽上公之一命應劭漢官儀漢以大司馬大司徒大司空為三公立師傅保之官位在三公上崇號為上公東漢已後以太尉司徒司空為三公師傅保常曰上公禮記制三公一命卷若有加則錫也不過九命沮陪潭府之三才韓詩一為公與相潭潭府中居晉東海王越為太傅時稱越府有三才潘滔大才劉輿長才裴邈清才詳見前斐然成章是以有慶詩維其有章矣是以有慶矣乘雪邊之節傳無因拜夀杖之尊杜詩鷗鳥鏡裏來闗山雪邊看孔光傳平帝立徙光為太傅位四輔明年徙為太師賜靈夀杖孟康曰扶老杖也師古曰木似竹有枝節長不過八九尺圍三四寸自然有合杖制不煩削治也窺天上之階符願長輔化樞之運見前賀史丞相除太傅史彌逺傳紹定元年上皇太后尊虢拜太傳八辭不拜顯拜師臣榮躋帝傅聖人惟能饗帝復歸美於重闈易鼎聖人亨以享上帝禮記因吉土以饗帝于郊理宗紀紹定元年春正月上夀明慈睿皇太后尊號冊寶於慈明殿太宰以禮佐王併加恩於一命周禮太宰祀五帝則掌百官之誓戒與其具脩前期十日帥執事而卜日遂戒及執事眂滌濯及納亨贊王牲事及祀之日贊王幣爵之事通典三公一命衮若有加則賜也注三公八命矣復加一命則服衮龍與王者之後同實清廟之盛典詩序清廟祀文王也周公既成洛邑率以祀文王焉鄭注清廟者祭有清明之德者之宫也謂祭文王天德清明文王象之故歌此詩而祭之詩於穆清廟肅雝顯相濟濟於多士秉文之徳對越在天駿奔走在廟不顯不承無射人斯非元老之私榮昔周家既立三事之官詩三事大夫莫肯夙夜箋三事三公也尚書立政任人凖夫牧作三事韋𤣥成傳天子我監登我三事師古曰三事三公之位謂丞相也在成王尤遴仲父之選劉向管子序管仲者類上人也名夷吾號仲父韓非子管仲相齊曰臣貴矣然而臣貧桓公曰使子有三歸之家曰臣富矣然而臣車桓公使立於齊國之上曰臣尊矣然而臣疎乃立為仲父王導傳朝野傾心號為仲父始命姬旦以其師保萬民尚書昔周公師保萬民民懷其德繼用畢高以其弼亮四世尚書畢命弼亮四世正色率下自茲以往稱此惟艱若西京之選王陵見前與東都之寵鄧禹鄧禹傳顯宗即位以禹先帝元功拜為太傅進見東嚮甚見尊寵雖稱異數左傳名位不同禮亦異數實飾虛文惟我孝廟之盛時夙敬越王之舊學尚書台小子舊學於甘盤奉巵為夀驩既洽於兩宫高帝紀九年冬置酒前殿上奉玉巵為太上皇夀師古曰巵飲酒圜器也今尚有之為夀進酒而獻夀也絶席隆師秩爰登於一品見前疇昔鯉趨而學禮只今虎拜以揚休詩虎拜稽首天子萬年虎拜稽首對揚王休千載君臣聚見四十年之内見前一家父子并成二萬石之榮萬石君傳人臣尊寵廼舉集其門凡號奮為萬石君師古曰凡最計也總合其一門嚴延年傳東海號曰萬石嚴嫗師古曰一門之中五二千石故總云萬石後漢書馮勤傳曽祖揚為𢎞農太守八子皆為二千石趙魏間號為萬石君栁文漢之三公秩號萬石史彌逺父子仍世作相故云幷成二萬石與國咸休尚書與國咸休永世無窮生民未有恭惟某官鼎彞舊學舊學字重上柱石世臣霍光傳將軍為國柱石師古曰柱者梁下之柱石者承柱之礎也言大臣負國重任如屋之柱及其石也朱浮傳事有柱石之寄注以屋為喻也杜詩冀公柱石姿又扶顛待柱石惟説總百官力贊事神之勿黷尚書惟説命總百官又黷於祭祀時謂弗欽禮煩則亂事神則難暨湯有一德首明立愛之惟親尚書立愛惟親立敬惟長始於家邦終於四海相儀南至之郊左傳僖公五年辛夘朔日南至周禮大司樂冬至日祀天於地上之圓丘鄭𤣥曰謂冬至祭天於圓丘所以祀天皇大帝蕆敬東朝之冊蕆音闡左傳以蕆陳事注敕也又備也灌夫傳東朝廷辯之如淳曰東朝太后朝也克禋克祀敷皇極而錫厥庶民詩生民如何克禋克祀注克能也能禋敬能恭祀於郊禖之神尚書皇建其有極斂時五福用敷錫厥庶民得禄得名受介福而於其王母易晉六二晉如愁如貞吉受茲介福於其王母象曰受茲介福以中正也注介大也母處内而成德者也鳴鶴在陰則其子和之立誠於闇闇亦應之故履貞不回終能受此大福於王母也二難具美三遜滋高既力避於維垣亦何辭於命衮並見前日月如璧映玉佩之魚垂後天文志日月如合璧禮記公侯佩山𤣥玉而朱組綬唐制自一品至六品以上皆佩魚韓詩玉帶懸金魚天地為鑪鑄金章而龜顧賈誼傳天地為鑪造化為工陰陽為炭萬物為銅衛宏漢舊儀丞相將軍黄金印龜鈕文曰章齊職儀三師品第一紫綬金章進賢冠絳朝服杜詩金章紫綬照青春龜顧見前一相主乎内㡬年淹九棘之班公羊傳三公者向天子之相也天子之相則何以三自陜而東者周公主之自陜而西者召公主之一相處乎内三公惟其人今日正專槐之靣尚書茲惟三公官不必備惟其人是固舊物青氊之赤舄周禮履人職掌王赤舄黒舄鄭注云複下曰舄詩赤舄几几餘見前尤覺明公黄閣之黑頭行開茅土之封式對山河之誓並見前某夙勤甄録聳聽郵音雖箝尾在虺蜮之區韓文藍田縣丞㕔壁記箝以左手右手摘紙尾栁文武岡銘序由公之仁小不為虺蜴大不為鯨鯢李時倅武岡然馳心賀燕雀之厦見前宣麻綴文德之聽身隔重湖玉海文德殿後唐曰端明國初改文明太平興德九年改今名即正衙殿淳化中張洎奏今之文德殿即唐之宣政在周為中朝在漢為前殿在唐為正衙凡朔望起居大冊拜對四夷君長試制舉人皆在此玉堂雜記凡鎻院文臣職事明日越文德殿聽麻宰相樞宻皆不往惟輪參政一員押麻張舜南遷録岳州洞庭湖南名青草北名洞庭所謂重湖也揲蓍考武岡之占公宜百禄栁文武岡銘烹牲是祀公受介福揲蓍以占公宜百禄賀史丞相除少傅詳啓意少傅當作少保雄麻渙命孤棘升班相堯之功已書二十八載之半吳都賦灌注乎天下之半𢎞周之化始介三公九卿之間取之甚亷簡在則厚恭惟某官直方而大智勇且仁海晏河清藉整頓乾坤之手並見前天明地察鑒經綸社稷之心孝經昔者明王事父孝故事天明事母孝故事地察天地明察神明彰矣奏琴瑟改絃之功董仲舒傳譬之琴瑟不調甚者必解而更張之乃可調也贊匕鬯主器之決易震驚百里不喪匕鬯彖曰震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也繫辭主器者莫若長子故受之以震進律固加於有德王制有功德于民者加地進律詳見前酬公真恨於無官新唐書李德裕傳劉稹誅策功拜太尉進封趙國公德裕固讓言唐興太尉惟七人尚父子儀乃不敢拜裴度為司徒十年亦不遷臣願守舊秩足矣帝曰吾恨無官酬公毋固辭矧如拔去兇邪收洪範威福之柄尚書惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食且復芟夷煩亂整素王筆削之功杜氏春秋序修春秋立素王邱明為素臣史記筆則筆削則削子夏之徒不能贊一辭宋史嘉定六年史彌逺以進部條法總類幷百司吏職補授法轉金紫光禄大夫進封魯國公是皆非常之元司馬相如傳非常之元黎民懼焉師古曰元始也非常之事其始難知衆人懼之宜受不次之賞荀子賢能不待次而舉罷不能不待頃而廢白樂天詩老逢不次恩詳别見猶且固辭於專靣專通作顓李尋傳天官上相上將皆顓靣正朝注各專一靣而正天之朝事也姑令明陟於貳公尚書貳公𢎞化惟時亞保之官初寮除余深制峻陞亞保位孤棘於外朝蓋古司空之選通典司馬主天司徒主人司空主地是謂三公周禮疏下台司禄為司空若稽漢制專司萬乘之宴私應劭漢官儀傅者覆也賈生曰天子居處出入不以禮衣服冠帶不以制御器列側不以度采服從好不以章忿悦不以義與奪不以節此少傅之責也天子居處宴私安而易樂而眈飲食不時醉飽不節寢起蚤宴無常玩好器弄無制此少保之責也其在周官實在兩儀之寅亮見前聊丕昭於蕃錫見前豈盡答於元勲漢書功臣表以昭元功之侯籍魏志高柔䟽並以元勲代作心膂謝靈運謝封康樂侯表分虎鈕龜復顯茅土鳴玉拖紱班景元勲梁簡文詩䕶羗擁漢節校尉立元勲昔魏王再相於淳熈首升此職史浩傳淳熈初上問執政乆不見史浩無他否遂除少保觀文殿大學士醴泉觀使兼侍讀五年復為右丞相故高宗獨稱於德夀謂無㡬人德夀宫名在大内之北高宗内禪居之馴正師垣詩太師維垣𢎞開夀域杜詩八荒開壽域尚式周公之猷訓惟其有之是以似之尚書爾尚式時周公之猷訓惟日孜孜無敢逸豫詩左之左之君子宜之右之右之君子有之維其有之是以似之注君子斥其先人也似嗣也左陽道朝祀之事我先人則宜而行之右陰道喪伐之事我先人則能有而曉之此二德者我先人維其並能有之是以先王使其子孫嗣之以覲文王之耿光心乎愛矣遐不謂矣尚書以覲文王之耿光以揚武王之大烈詩心乎愛矣遐不謂矣中心藏之何日忘之注遐逺謂勤也我心愛此君子君子雖逺在野豈能不勤思之乎某欣逢盛典倍激懽悰歌芘士之詩敢忘燕雀之賀厦杜詩安得廣厦千萬間大庇天下寒士俱歡顔作得賢之頌或憐蟋蟀之吟秋王褒聖主得賢臣頌蟋蟀竢秋吟蜉蝣出以陰代任參政希夷賀丞相除少保冊命元勲序升孤傅孤傅當作孤保初寮除鄭洵武制眷予孤保三少特揖雖均為貳公之官周禮夏官司士正朝儀之位孤卿特揖注特揖一一揖之也四夷咸賔見時乃萬世之績尚書明王盛德四夷咸賔又萬世永賴時乃功君臣叶慶朝野交驩恭惟某官明允而篤誠左傳齊聖廣淵明允篤誠𢎞深而肅括法言或問士何如斯可以褆身曰其為中也𢎞深其為外也肅括則可以褆身矣調政化不調之琴瑟見上條續古今難續之鼎彞漢書宣帝時漢陽得寶鼎銘曰王命尸臣官此枸邑張敞議曰殆周之襃賜子孫刻銘其先功者也彞宗廟常器也東京賦銘勳􅂜器歴世彌光鼎彞皆銘功之器中書十五秋得賢人可乆之德職官分紀真宗時王旦拜平章事陜郊處士魏野以詩寄旦曰聖朝丞相年年出云在中書十四秋西祀東封俱已畢好來相伴赤松遊旦感悟遂求退闢國數百里復寧王有指之疆詩昔先王受命有如召公日闢國百里今也日蹙國百里尚書率寧人有指疆士迄令大寶之還寧宗嘉定十五年正月朔御大慶殿受恭􅈾天命之寶詎止小球之受球玉也詩受大球小球為下國綴旒球音求美玉也小玉謂尺二寸圭也大玉謂珽也長三尺執圭進珽以與諸侯㑹同結定其心如旌旗之旒縿縿著焉受者受之於天蓋帝王盛德之必頌獨頌獻琛詩序頌者美盛德之形容爾雅琛寶也詩憬彼淮夷來獻其琛李尤函谷闗賦會萬國之玉帛徠百蠻之貢琛而春秋常事之不書特書得玉春秋桓公八年春正月己卯烝公羊傳常事不書此何以書譏何譏爾譏亟也定公八年盜竊寶玉大弓九年得寶玉大弓左傳書曰得器用也凡獲器用曰得得用焉曰獲寶玉夏后氏之璜也公羊傳何以書國寶也喪之書得之書韓文特書大書然皆出魯公之力詩序泮水頌僖公能修泮宫也獻琛僖公事得玉定公事彌逺封魯公故云今按宋人頌彌逺輒以歸疆得玉為辭不知濠州大散闗之歸乃韓侂胄函首易之也張荃翁貴耳集云侂冑首至北界彼中臺諫交章言侂胄忠於其國謬於其身封為忠謬侯將函首附葬魏公韓琦墓下仍劄報南朝嗚呼知侂冑為忠則知誅侂冑者之非忠矣而米之君臣方且侈大其事以為美談嗚呼亦昧於春秋復仇之義矣庸竝垂周室之休敢圖古風復見今日宜亟正專槐之靣乃姑循次棘之階功臣封爵山河聿觀繼世少傅寅亮天地詎足酬庸某全託一陶並見前獲歸三徑陶潛歸去來辭三徑就荒松菊猶存龜魚竊新亭之䕃亦有肺腸韓詩湖上新亭好公來日出初水紋浮枕簟瓦影䕃龜魚詩自有肺腸注肺腸五臟之物言之以表其心元氏長慶集忝非草木粗有肺肝燕雀賀大厦之成恨無羽翼見前賀史丞相父太師魏王追封越王代任樞密希夷宋史寧宗嘉定十四年八月賜史彌逺家廟追封史浩為越王改諡忠定配享孝宗廟庭加冊元勳配祠清廟見前考十八侯定位之次惟蕭葢侑於祭庭漢書功臣表作十八侯位次師古曰謂蕭何曹參張敖周勃樊噲酈商奚涓夏侯嬰灌嬰傅寛靳歙王陵陳武王吸薛歐周昌丁復蟲達從第一至十八也通典漢制祭功臣於庭生時侍讌於堂死則降在庭位與士庶為列應五百年異姓之封於越肇開於胙土杜詩功業汾陽異姓王又馳牋異姓王東坡詩緬懷異姓王注世傳郭璞天目山讖五百年生異姓王葢錢氏應之彌逺父浩亦封越王故云春秋定公五年於越入吳公羊傳於越者何越者何於越者未能以其名通也越者能以其名通也何休注越人自名於越君子名之曰越即今會稽山陰地潘朂魏公九錫文先王並建明德胙之以土分之以民遂吾相顯親之願彰我皇念舊之恩恭惟先正大丞相文惠師王史浩傳光宗即位進浩太師卒封㑹稽郡王寧宗即位賜諡文惠嘉定十四年追封越王改諡忠定配享孝宗廟庭尚書昔先正保衡陳自强傳自强惟一死以報師王則師王葢當時之謟辭也始終三紀尚書既歴三紀世變化移師保萬民湯於伊尹葢學而臣之克咸一德並見前舜舉臯陶不仁者逺矣允協重華尚書重華協于帝淳熈十六年改德夀宫為重華宫宜侑食以匹休禮宫伯以樂侑食鄭云勸食也詩以妥以侑毛傳勸也通作宥大司樂王食三宥鄭云勸也曾易名之未稱禮記公叔文子卒其子請諡于君曰日月有時將葬矣請所以易其名者䟽生存之日若呼其名今既死將葬故請所以誄行為之作諡易代其名者增韻諡者誄行之號以易名也思股肱於甘露蘇武傳宣帝甘露三年上思股肱之美廼圖畫其人於麒麟閣法其形貌著其官爵姓名明著中興輔佐列於方叔召虎仲山甫焉想形貎於凌煙凌煙閣名在唐西内太極宫三清殿側秦瓊傳十七年詔司徒趙國公長孫無忌等二十三人圖形凌煙閣詔曰甘露良佐麟閣著其美建武功臣雲臺紀其迹李晟傳貞元三年晟與馬燧見延英帝嘉其勲詔中宗時桓彥範等𤣥宗時劉幽求等肅宗時郭子儀及晟等有司叙先後圖其像于舊臣之次忠義傳宣宗大中二年詔求李峴等三十七人畵像續圖凌煙閣杜詩凌煙功臣少顔色將軍下筆開生靣襃公鄂公毛髮動英姿颯爽來酣戰一巻之書必立師矧實先朝之舊學法言一閧之市不勝異意焉一巻之書不勝異説焉一閧之市必立之平一巻之書必立之師尚書台小子舊學于甘盤七世之廟可觀德誰踰烈祖之老臣尚書七世之廟可以觀徳萬夫之長可以觀政又𢎞乃烈祖趙充國傳無踰老臣者矣徹彼土疆詩王命召伯徹申伯土疆以峙其粻式遄其行注徹治也王使召公治申伯土界之所至又王命召虎式辟四方徹我疆土匪疚匪棘注治我疆界于天下謂畫其土境正定其疆界也儐爾籩豆儐陳也詩儐爾籩豆飲酒之飫惟冐丕單厥德峻加茅胙之分尚書昭武王惟冐丕單稱徳建置社稷曰胙左傳胙之土而命之氏孔安國尚書注王者封五色土為社燾以黄土苴以白茅茅取其潔黄取王者覆被四方餘見前茲予大享先王永配椒馨之薦尚書茲予大享于先王爾祖其從與享之詩有椒其馨胡考之寧毛傳椒猶飶也鄭箋以芬香之酒醴祭於祖妣丕昭異數夐掩前聞伏遇少保樞使大丞相國公克享天心尚書克享天心受天明命善繼人志故國非謂喬木葢倚世臣成績紀於太常以昭先烈並見前用𢎞茲賁尚書各非敢違卜用宏兹賁孔傳宏賁皆大也用大此遷都大業曰篤不忘尚書予嘉乃德曰篤不忘孔傳我善汝徳謂厚不可忘某世沐殊恩身逢盛事屬嬰美疢莫陪東閣之賔左傳季孫之愛我疾疢也孟孫之惡我藥石也美疢不如藥石疢丑忍切病也美嗜為病疇允大邦切頌西平之子栁文平淮西雅蔡人率止惟西平有子惟西平有子惟我有臣疇允大邦俾惠我人于廟告成以顧萬方宰相宋承唐制以同平章事為宰相之職無常貟有二人則分日知印以丞郎以上至三師為之其上相為昭文館大學士監脩國史其次為集賢殿大學士或置三相則昭文集賢兩學士幷監修國史並除焉賀鄭參政清之除右相兼樞密使進光禄大夫成都運司作鄭清之傳清之字德源靳人嘉泰十年進士理宗寶慶六年史彌逺卒命清之為右丞相兼樞密使卒贈尚書令追封魏郡王諡忠定清之自與彌逺議廢濟王竑立理宗駸至宰輔召用正人時號小元祐至再相則年齒衰暮政歸妻子而閒退之人或以賄進為世所少云登庸舊學見前揆序元台周禮疏上台司命為太尉中台司中為司徒下台司禄為司空晉天文志西近文昌二星曰上台為司命主壽次二星曰中台為司中主宗室東二星曰下台為司禄主兵杜詩冠冕通南極文章落上台能自得師謹厥終而惟始尚書能自得師者王又慎厥終惟其始爰立作相置諸右以輔台尚書爰立作相王置諸其左右命之曰朝夕納誨以輔台德兼總鈞樞屹隆柱石見前恭惟某官兩儀間氣春秋演孔圖正氣為帝間氣為臣秀氣為人詳見前四海真儒淡乎如列仙之癯司馬相如傳列仙之儒居山澤間形容甚癯此非帝王之仙意也傑然乃萬夫之特詩維此奄息百夫之特䟽百夫之中特立雄俊者挺立曰特虀鹽太學四賦接古詩之流韓文太學十年朝虀暮鹽揚雄傳辭莫麗於相如作四賦摯虞文章流别論賦者敷陳之稱古詩之流也芹藻泮宫三峽避詞源之水杜詩詞源倒流三峽水領袖冠六經之庫晉書魏舒堂堂人之領袖又後進領袖有裴秀王子年拾遺記鄭康成人以為經庫杜預傳朝野稱美號曰杜武庫贊元凱文塲稱為武庫隋書儒林傳房暉逺字崇儒真定人幼有志行治三禮春秋三傳詩書周易兼善圖緯遷太常博士太常卿牛𢎞稱為五經庫新唐書儒學傳谷􅄼律昌樂人貞觀中遷國子博士淹識羣書禇遂良嘗稱為九經庫範模徧雙宇之宫通典有虞氏大學為上庠小學為下庠夏后大學為東序小學為西序殷制大學為左學小學為右學周制大學為束膠小學為虞庠後世國學太學兩立沿革不常潘岳傳閒居賦兩學齊列雙宇如一右延國冑左納良逸清之以嘉秦二年入太學十年登進士第監國子監書庫十六年遷國子學録與史彌逺謀廢立遷太學博士虎觀螭坳司存雨露白虎門名於門立觀因名白虎觀章帝紀建初四年詔下太常將大夫博士議郎郎官及諸生諸儒㑹白虎觀講論五經同異作白虎奏議即今白虎通也儒林傳詔賈逵入講北宫白虎觀又魏應丁鴻李育魯恭廣陵王羡清河王慶皆與諸儒講論於白虎觀餘見前麟臺鰲禁鼓舞風雷通典漢氏圖籍所在有石渠石室延閣廣内貯之於外府又有蘭臺秘書及麒麟天禄二閣蔵之於内禁後漢圖書在東觀桓帝延熈二年始置秘書監歴代沿革不常唐天授初改為麟臺翰苑新書宋公白賈公黄中皆先達鉅儒同在鰲禁餘見前杞人憂天馭方危於六馬列子杞國有人憂天地崩墜身無所寄廢寢食者尚書子臨兆民凜乎若朽索之馭六馬虞淵取日功卓冠於五龍吕温狄仁傑頌取日虞淵洗光咸池潛授五龍夾之以飛五龍謂桓彥範敬暉崔𤣥暐張柬之袁恕已學焉而後臣之政不足與間也況苞苴賄賂獨不入沂公之門莊子小夫之智不離苞苴竿牘左傳賄賂公行王曾傳景佑元年拜右僕射封沂國公時知秦州王繼明納賂吕夷簡曽以白帝且鼎鼐樓臺抑未聞㓂相之第五朝名臣言行録處士魏野贈㓂萊公詩曰有官居鼎鼐無宅起樓臺及上即位北使至賜宴兩府預坐北使歴視坐中問譯者曰誰是無宅起樓臺相公衆浩然其歸重公持此以安歸蒯通傳歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎魏志鍾㑹傳㑹語所親曰我自淮南以來畫無遺䇿四海所共知也我欲持此安歸乎東坡詩持此欲安歸造物不我舍餘見前天下無如召公乆當相成王之左詩序召旻凡伯刺幽王大壞也旻閔也閔天下無如召公之臣也大戴禮保傅篇道者導天子以道者也常立於前是周公也充者充天子之志者也常立于左是太公也弼者弼天子之過者也常立於左是召公也承者承天子之遺忘者也常立于後是史佚也生民未有夫子今乃得伊尹之時然萬世永賴乃可謂功見前使匹夫不獲焉能無恥予惟克邁乃訓千載一時尚書爾交脩予罔予棄予惟克邁乃訓北史于謹傳謹言於周文曰闗中秦漢舊都古稱天府今若據其要害招集英雄足觀時變千載一時也天之降任是人百年㡬見陳後山送蘇公知抗州詩一代不數人百代能㡬見萬國魚頭正有闗於已任南史康絢傳淮水瀑漲堰壞奔流于海殺數萬人怪物隨流而下或人頭魚身或龍形馬首韓詩堯呼大水浸十日不惜萬國赤子魚頭生盧仝詩天高日走沃不及但見萬國赤子戢戢魚頭生十年鳳沼亦何足為公榮見前見伊吕而失蕭曹則知管晏之卑矣杜詩伯仲之間見伊吕指麾若定失蕭曹濟英衛而遜王魏此豈房杜之細耶新唐書房杜傳贊唐栁芳有言帝定禍亂而房杜不言功王魏善諫而房杜讓其直英衛善兵而房杜濟以文持衆美效之君彼揚已取名瞭然使户曉者盖房杜之細耶願荷棟桴班固西都賦列棼橑以布翼荷棟桴而高驤爾雅棟謂之桴廣韻屋棟也力光竹帛鄧禹傳垂功名於竹帛某一寒戍雪范睢傳范叔一寒如此哉杜詩已收滴博雲中戍欲奪蓬娑雪外城十暑飲􅖅杜詩十暑岷山葛莊子朝受命而夕飲􅖅昔周旋康成之間夙親氊坐鄭𤣥字康成杜子美贈鄭廣文詩坐客寒無氊且班次巨君之下實認履聲後漢書鄭𢎞字巨君代鄧彪為太尉時舉将第五倫為司空班次其下每正朔朝見𢎞曲躬而自卑帝問知其故遂聽置雲母屏風分隔其間由此以為故事漢書鄭崇為尚書每聞曳革履上笑曰我識鄭尚書履聲鄭清之傳嘉泰十六年清之遷國子學録公甫時亦為學録故云此一聯用四事皆鄭氏故事今聞宣黄麻之六經杜詩黄麻似六經適尚盤青泥之九折蜀道難青泥何盤盤百歩九折縈巖巒緇衣三章知不遺於寸善禮記好賢如緇衣惡惡如巷伯詩序緇衣美武公也父子並為周司徒善于其職國人宜之故美其徳以明有國善善之功焉洪鈞一氣亦何間於八荒杜詩八荒開夀域一氣轉洪鈞子獻相國書乎往愬㡳虞於逢怒韓文釋言有來謂愈者曰子獻相國詩書乎詩薄言往愬逢彼之怒鄭箋君不受已之志君遣使臣禮也終更願聽其亟還詩皇皇者華君遣使臣也段會宗傳毋求竒功終更亟還賀丞相明堂慶夀并冊皇后禮成平淮冦奏捷宋史理宗紹定三年冬十二月丁卯冊命貴妃謝氏為皇后癸未上壽明仁福慈睿皇太后冊寶四年春正月戊子皇太后年七十有五上詣慈明殿行慶壽禮大赦史彌遠以下進秩有差壬寅趙范趙葵等誅李全於新塘邦慶頻仍仍如烝切爾雅厚也註云頻仍李義山文光陰荏苒遷授頻仍王勳赫奕周禮王功曰動赫盛貌説文奕大也從大亦聲裴子野賦赫奕翬煥陰臨鬱律事天明事母孝新周南正始之基孝經明王事父孝故事天明事母孝故事地察詩序周南召南正始之道王化之基有文德有武功策召公平夷之績詩文武吉甫萬邦為憲疏王師所以得勝者以有文德武功之臣尹吉甫其才略可為萬國之法詩序江漢尹吉甫美宣王也能興衰撥亂命召公平淮夷一相主内見前四夷具瞻恭惟某官氣塞乾坤心貫日月大鈞播揚風霆不顯其流形禮記風霆流形庶物露生餘見前直柄當權水火共成於正味石鼎聫句詩直柄未當權塞口且吞聲左傳和如羮焉水火醯醢鹽梅以烹魚由燀之以薪宰夫和之齊之以味君子食之以平其心若以水濟水誰能食之旡妄式遄於勿藥易无妄之疾勿藥有喜詩式遄其歸遄重圓切連也理宗紀紹定三年冬十二月詔史彌逺敷奏精敏氣體向安未欲勞以朝謁可十日一赴都堂治事有孚信利於渉川易中孚豚魚吉利渉大川利貞理身理國厥既兩全崔寔傳夫熊經鳥伸雖延歴之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏盖為國之法有似理身平則致養疾則攻焉治内治外粲然兼舉詩序天保以上治内采薇以下治外疏内謂諸夏也外謂夷狄也肅雍顯相而於穆清廟詩於穆清廟肅雝顯相詳見前㳙選休成而爰熈紫壇禮樂志建始元年丞相匡衡奏罷鸞路龍鱗更定詩曰㳙選休成天地竝況惟子有慕爰熈紫壇注㳙除也除惡選取美成者也熈興也紫壇壇紫色也漢舊儀皇帝自行羣臣從齋皆百日紫壇帷幄高皇帝配天居堂下西向組帷帳紺席成帝紀甘泉泰峙紫壇八觚宣通象八方梁簡文南郊頌郊宫載静紫壇新謐太姒嗣徽音正九重之寶冊詩太姒嗣徽音則百斯男傳太姒文王之妃也太姒十子衆妾則宜百子也箋徽美也嗣太任之美音謂續行其善教令王母受介福奉萬嵗之玉巵易受茲介福于其王母高帝紀置酒殿上奉玉巵為太上皇壽應劭曰飲酒禮器也古以角作受四升古巵字作觗晉灼曰音支師古曰巵飲酒圓器也今尚有之豈謂孽臣之奸驕元結大唐中興頌孽臣姦驕為昏為妖韓文孽臣姦𨽻蠧居棋處文選孽臣朝入九服夕亂此孽臣指李全敢負湛恩之汪濊司馬相如傳威武紛紜湛恩汪濊師古曰汪濊深廣也湛讀曰沈楚氛甚惡動兵邦域之中韻㑹氛侵妖氣左傳楚氛甚惡懼難宋史理宗寶慶二年楚州忠義李福作亂逐姚翀詔改楚州為淮安軍張林等歸淮安討李福平之尋李全自青州復入淮安殺張林紹定三年李全冦揚州趙范趙葵擊敗之漢相有真折衝尊俎之上王商傳此真漢相也詳見前薄言討伐詩薄伐玁狁注言逐出之而已亟遂殄殲尚書殄殲乃讐南方之强歟北方之强歟風移俗易賈誼傳夫移風易俗使天下回心而嚮道類非俗吏之所能為也東夷之人也西夷之人也氣奪膽寒風聲鶴唳不但平淮謝𤣥傳堅衆奔潰棄甲宵遯聞風聲鶴唳皆以為王師雪夜鵝鳴更觀擒蔡李愬傳夜半至懸弧城雪甚城旁皆鵝鶩池愬令擊之以亂軍聲信君子不戰戰必勝知人臣無將將則誅公羊傳君親無將將而誅焉注親謂父母叔孫通傳人臣無將將則反罪無赦師古曰將有其意説文將本將帥字一曰有漸之詞蘇林曰甫始之詞董賢傳君親無將將而誅之師古曰將謂將為亂逆也非能人百而已千疇見兼三而施四輔成帝略悉出廟謨光武紀贊明明廟謨﨣﨣雄斷近使觀其知煩使觀其能曾不陳於聲色莊子逺使之而觀其志近使之而觀其敬煩使之而觀其能詳見前無事用之禮有事用之戰悉顯奏於膚公禮記勇敢强有力者天下無事則用之於禮義天下有事則用之于戰勝用之于戰勝則無敵用之于禮義則順治外無敵内順治此之謂盛德詩以奏膚公注膚大公功也非無敵用儒者之真法言魯不用真儒故也如用真儒無敵于天下焉得削孰自任以天下之重黄河如帶山如礪疇高蕭相之功西平有子我有臣請繼栁侯之雅某乆違光範並見前逖守夜郎西南夷傳南夷君長以十數夜郎最大司馬相如傳略通夜郎僰中即今蜀地揆分雖一蟻之㣲聞喜極六鼇之抃屈原天問鼇戴山抃何以安之列子龍伯之國有大人一釣而連六鼇燕雀賀厦豈惟免風雨之憂見前鴻鴈賔秋更乞遂江湖之樂禮記季秋之月鴻鴈來賔注來賔言其客止未去也正義曰上仲秋直云鴻鴈來今季秋云來賔以仲秋初來則過去故不云賔今季秋鴻鴈來賔者客止未去也上史丞相從辟入蜀西去而辭大臣誤辱再三之命杜詩今欲東入海即將西去秦尚憐終南山回首清渭濵常擬報一飯况懷辭大臣東征而勞歸士竟無分寸之功詩序東山周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也李廣傳終無尺寸之功以封侯杜詩從軍十年餘能無分寸功顧忘百謫之盈陳遵傳曹事數廢西曹以故事謫之侍曹輒詣寺舍白遵遵曰滿百乃相聞故事有百謫者斥東坡詩號訴甘百謫猶冐一慙之忍左傳一慙之不忍而終身慙之乎斐裁狂簡忸布鬱陶伏念某意廣才疎孔融傳融負其高氣志在靖難而才疎意廣迄無成功南史蕭惠開傳才疎意廣竟無成功嚴用威刑蜀人號曰卧虎身勤事左韓文身勤而事左辭重而請約饑來驅我遂違吾斯未能信之防陶詩饑來驅我去不知竟何之年不後人已落無聞不足畏之境陳後山集學不前人年不後人徒守童烏之氣習法言育而不苗者吾家之童烏乎九齡而與我𤣥文又童而習之東坡詩不使童烏與我𤣥又書生習氣未應無山谷詩平生習氣須料理未忘子墨之生涯揚雄傳藉翰林以為主人子墨為客卿以風杜詩生涯似衆人又生涯獨轉蓬王荆公詩多難飄零嵗月賒空餘文墨舊生涯滿七除二之跳踉誠覺語言之無味昌黎送窮文子之朋儔非六非四在十去五滿七除二凡所以使吾靣目可憎語言無味者皆子之志也言未畢五鬼相與張眼吐舌跳踉偃仆扺掌頓脚失笑相顧踉盧當切踉䠙行貌莊子跳踉乎井幹之上駢四儷六之啽哢底堪豪傑之跪呈河東乞巧文抽黄對白啽哢飛走駢四儷六錦心繡口獨溺臣心使甘老醜旁羅萬金不鬻敝帚跪呈豪傑投棄不有啽音弇哢音弄鳥吟聲間或小慙小好之逢韓文小慙者亦蒙謂之小好大慙者即必以為大好矣詳見前迄難大言大利之望禮記事君大言入則望大利小言入則望小利故君子不以小言受大禄易曰不家食吉相國禮之過矣昔嘗伏光範之門大夫羅而致之乃使入河陽之幕俱見前路經灩澦鬢已雙蓬杜詩路經灩澦雙蓬鬢天入滄浪一釣舟身入褎斜命危一葉蘇子由入峽詩峽門石為户鬱怒水力驕扁舟落中流浩如一業飄范文正公過淮境遇風詩一棹危於葉旁觀亦損神他時在平地無忽險中人既乏先登搴旗之績左傳頴考叔請鄭伯之旗蝥弧以先登曹參傳攻轅戚及亢父先登家語攘地千里搴旗執馘唯由能之陳湯傳搴歙侯之旗斬郅支之首師古曰搴抜也音騫楊僕傳非有斬將搴旗之實也師古曰騫與搴同拔取之何逃相收連坐之刑商君傳秦孝公初衛鞅定變法之令令民為什伍而相收司連坐史記索隱收司謂相紏發也一家有罪而九家相舉發若不紏舉則十家連坐按公甫為董居誼所辟居誼僨蜀事故云然而聖主不加誅復令因任進學解然而聖主不加誅宰臣不見斥茲非其幸歟因任如漢増秩賜金孝宗朝鞏嶸提舉坑冶職事脩舉直秘閣因其任凡十餘年曠典也此因任言仍幕職此非元戎所自辟殆出密庸韓文書記之任亦難矣然皆元戎自辟然後命於天子㑹既建宣威之牙禮舍文嘉牙旗者將軍所建也魏志初平中張邈舉義兵典韋為士屬司馬趙寵牙門長大人莫能勝韋一手建之後漢滕輔祭牙文敬建高牙神武攸託宋王綖祭牙文敬建崇牙顯兹威靈宋鄭宣之祭牙文崇牙既建義鋒増厲人鬼一揆三才同契互見前始獲捧從事之檄西曹地忍幸不汝疵東閣天寛理難自絶並見前惟受性酷好學問迂哉韓子之謀昌黎潮州謝上表臣受性愚陋人事多所不通惟酷好學問文章未嘗一日暫廢實為時輩所見推許矧報國獨惟文章悲矣栁侯之志栁文獻平淮西雅表思報國恩獨惟文章顧且甘敗鼓勃溲之比進學解牛溲馬勃敗鼓之皮至欲效朽株芝菌之祥栁文使受天澤餘潤雖朽枿敗腐不能生植猶足蒸出芝菌以為瑞物有如萬不及於古人其他百無用於今世天之未喪斯文也儻或容小道之觀人之為言胡得焉益勉作大鈞之問詩茍亦無然人之為言胡得焉注教君止讒之法若有言人之罪過令君舍之舍之者誠亦無得答然但能如此不受偽言則人之偽言復何所得焉餘見前恭惟某官道濟四海勳塞兩儀續古今難續之鼎彞調政化不調之琴瑟屹承天之一柱回障海之百川並見前業業兢兢贊一日萬㡬而無曠尚書兢兢業業一日二日萬㡬無曠庶官天工人其代之湯湯蕩蕩作十有三載而乃同尚書湯湯洪水方割蕩蕩懷山襄陵浩浩滔天又厥賦貞作十有三載乃同念茲哀鳥之鳴宋史寧宗嘉定元年三月以韓侂胄蘇師旦首付王柟畀金以易淮陕侵地夏六月金人來歸大散闗及濠州九月金遣使來和議成尚為困獸之鬬左傳困獸猶鬬況人乎非用儒無敵於天下何不戰可屈於人兵俱見前齊歸侵疆寧須慿軾之力法言齊人章章歸其侵疆蒯通傳通説韓信曰酈生一士伏軾掉三寸舌下齊七十餘城將軍將數萬之衆反不如一豎儒之功乎此指歸淮陜侵地魏適樂土曾無傳檄之勞詩逝將去女適彼樂土蒯通傳此臣所謂傳檄而千里定者也我式克至今日休尚書我式克至于今日休我咸成文王功于不怠汝其敬識百辟享尚書汝其敬識百辟享亦識其有不享為天地立心生民立極賔春布萬國之和周禮正月之吉始和布治于邦國都鄙禮記孟春之月命相布徳和令行慶施惠下及兆民以陰陽為炭造化為工修月揭重輪之照段柯古酉陽雜俎月勢如丸其影荆爍其凸處也常有八萬二千戸修之王公詩玉斧修成寶月圓東坡詩天匠麾月斧又月斧雲斤琢肺肝又從來修月手合在廣寒宫又借君月斧修朦朧又從來天上修月手山谷詩執斧修月輪煉石補天陬餘見前茲峻三孤之秩益彰萬世之功見前以保保身賈誼新書保保其身體傅傅之德義師師道之教訓三公之職也在明明德恥一夫之不獲當無求備於一夫尚書爾無忿疾于頑無求備于一夫輔萬物之自然要必曲成乎萬物見前巨川作舟楫則剡木皆有用之器繫辭刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下盖取諸渙震風知帡幪則廣厦無可棄之材邦其永孚于休公有無窮之聞俱見前尚念某倍勤埏埴荀子陶人埏埴而為器注埏摩也獨困泥塗青莪在彼中阿曾出於春風披拂之内韓文詩序曰菁菁者莪樂育材也菁菁者盛也莪㣲草也阿大陵也言君子之長樂人材若大陵之長育㣲草能使之菁菁然盛也葑菲無以下體望收之秋霜刻轢之餘注葑蕪菁也即今菘菜葉與根皆可食而根時有美惡采者勿以其根惡時幷棄其葉故云無以下體轢琅狄切説文車所踐也漢書酷吏傳刻轢宗室師古曰轢謂陵踐也韓詩秋霜喜刻轢賀史丞相起復史彌逺傳嘉定元年拜右丞相丁母憂歸治葬太子請賜第行在令就第持服以便咨訪二年以使者趣行急乃就道起復右丞相兼樞密使兼太子少師劉本闕此條起躋上衮牟融傳贊牟公簡帝身終上衮併領元樞家事雖勤詎可辭於王事國容既肅爰兼整於軍容禮記軍容不入國國容不入軍宗社奠安華夷震服竊以人臣名世之盛者固宜獨佩於安危見前天子舉國而聽焉豈容或去於左右商君傳願王舉國而聽之如房𤣥齡奪服於貞觀之際新唐書房𤣥齡傳以母喪賜塋昭陵園起復其官㑹伐遼畱守京師詔曰公當蕭何之任朕無西顧憂矣若趙韓王復位於建隆之時趙普傳乾德五年春加右僕射昭文館大學士俄丁内艱詔起復視事真宗咸平初追封韓王時則宇縣迄平縣本作寰穀梁傳寰内諸侯注古縣字師古曰古書縣邑字皆作寰此直縣掛字後人轉用為州縣字乃加心以别之也邦家底定尚書震澤底定注底之履反致也史記音致非有干戈搶攘之事攘女耕切搶攘亂貎賈誼傳首尾衡決國制搶攘與夫疆埸騷動之虞埸音亦説文疆也通作易黄氏曰疆是大界場是小界詩廼場廼疆又疆埸有𤓰左傳疆埸之事又疆埸無主注邊境也正惟朝廷恃以稽疑尚書明用稽疑社稷因之倚重所謂同德惟一伊尹乃格於天見前豈無他人雖百曹參何補於漢詩豈無他人蕭何傳今雖無曹參等百數何缺於漢故一時必圖舊而共政尚書古我先王亦惟圖任舊人共政而二公亦移孝以為忠孝經君子之事親孝故忠可移于君事兄弟故順可移于長居家理故治可移于官况若主威雖振而體統未明國蠧既除而姦宄未戢天變洊臻而未弭詩饑饉薦臻民力乆困而未甦此豈具臣可以克相自非才若擎天之八柱河圖括地象地下有八柱柱廣一萬里有三千六百軸互相牽制名山巨川孔穴相通力如負海之六鼇列子渤海之中有五山焉其根無所連著帝使巨鼇十五舉首而戴之五山始峙而龍伯之國有大人一釣而連六鼇精誠一心勵翼庶務尚書庶明勵翼則何以結異眷於黄屋高帝紀黄屋左纛李斐曰天子車以黄繒為盖裏奪至情於素冠詩序素冠刺不能三年也詩庶見素冠兮廷有贊書漢書外戚傳刻侯印書贊師古曰贊謂延拜之文國無異論恭惟某官德崇而業鉅學博而用周功烈在人豈管晏之可許規模所至及周召而乃畱蕭望之傳鄭朋奏記望之曰窟穴黎庶莫不懽喜咸曰將軍其人也今將軍規橅云若管晏而休遂行日仄至周召乃留乎師古曰問望之立意當趣如管宴而至為欲恢廓其道至日昃不食追周召之蹟然後已乎橅讀曰模其字从木早繇禁塗獨贊密議祛邪崇俊決大疑於立談之間揚雄解嘲或七十説而不遇或立談而封侯偃武修文興長利於旋踵之頃尚書乃偃武修文司馬相如傳計不旋踵國本安固人心敉寧尚書予翼以于敉寧武圖功孔傳用撫安武事此借用弼諧未㡬經濟方懋甫正台衡之位宇文融詩謬立台衡重俱承雨露偏俄纏風木之悲見前中宸深懷竣迄襄於大事左貂洊遣爰趣復於宰司後漢書宦者傳漢興仍襲秦制置中常侍官然亦引用士人以參其選皆銀璫左貂給事殿省唐百官志㪚騎常侍分左右𨽻中書門下省皆金貂珥蟬左散騎與侍中為左貂右散騎與中書令為右貂謂之八貂張説詩賜釜同榮拜樅金宴宰司厥今為政之當先大率如前之所述雖無伯禽金革之事禮記子夏曰金革之事無避也者非與孔子曰吾聞之老聃曰昔者魯公伯禽有為為之也三年之喪從其利者吾不知也鄭注伯禽有徐戎作難喪卒哭而征之急王事也公羊傳古者臣有大喪則君三年不呼其門已練可以行冕服金革之事君使之非也臣行之禮也注謂以兵事使之當資傅説舟楫之才至若邊備弛於通和邦財空於横費名為更化而士夫趣向之莫一實欲恤民而州縣奉行之不䖍此其次焉又有大者必也羣工百職守法度而不變外戚近習保富貴而有終城社無所容其奸漢書虞延傳乆依城社不畏熏燒劉向説苑客謂孟嘗君曰狐者人之所攻也鼠者人之所熏也臣未見稷狐見攻社鼠見熏何則所託者然也韓非子社樹木而塗之鼠穴其間熏之則恐焚木灌之則恐塗陁此社鼠之所以不得也漢中山王傳社鼷不灌屋鼠不熏所託者然也韓詩外傳稷蜂不攻社鼠不熏所託者然也廟堂常得行其政孰出身而辦此韓延壽傳韓義出身彊諫嚴延年傳皆親鄉之出身不顧岑彭傳願出身自效三國志吕岱傳出身萬里為國勤事晉書邵續傳我出身為國豈得顧子而為叛臣哉顧舍公其誰哉此四海所以具瞻正九重所以虚竚任天下之重幸瞻赤舄之來詩赤舄几几舄音昔傳赤舄人君之盛履也几几絇貎正義曰上公九命得服衮冕故履赤舄為帝者之師佇復青氊之舊留侯世家以三寸舌為帝者師此布衣之極要使一門勳業之盛有光千載簡冊之傳某夙出洪鈞欽聆渙號􅔔疇昔已䝉於百諾季布傳得黄金百不如得季布諾高適詩何異千里心仍求百金諾諒匪伊定沐於一陶張于湖集趣召來歸匪朝伊夕歌杜陵之詩願永依於廣厦見前為魏公之客豈復出於他門李義山集卵翼不自於他門頂踵實非其已物代黄知縣燾上史丞相詳啓意黄盖丁内艱服闋赴都恐復補縣故以情懇政府即彌逺之同年也觀虎榜沙堤之句可見錦製彌年天不哀其陟圯詩序陟岵孝子行役思念父母也詩陟彼屺兮瞻望母兮琴祥踰月人交勸其入京禮記魯人有朝祥而莫歌者子路笑之夫子曰爾責於人終無已夫三年之喪亦已乆矣夫子路出夫子曰又多乎哉踰月則其善也又子張既除喪而見予之琴和之而和東坡詩祥琴雖未調餘悲不敢留盍從小宰之銓勿累大鈞之播惟是沈憂之後難於故歩之尋故提孤踪更千宰物伏念某骨凡難換器窳亡竒並見前廣殿賜袍已作半枯之葉李白外傳白作樂章賜錦袍杜詩龍舟移棹晩獸錦奪袍新白日來深殿青雲滿後塵短檠照字終無大喜之花幸脱選於七階甘服勞於百里凄其風木越在塊苫並見前棘人欒欒亦既畢三年之制詩棘人欒欒兮勞心慱慱兮注棘急也欒欒瘠貎急于哀戚之人形貎欒欒然瘠也余髮種種難更宰百乘之家左傳齊侯田于莒盧婆嫳見泣且請曰余之髮如此種種余奚能為種種短也儻繩以半九十之行寧免落千丈之懼並見前然痛定而思方痛其可再乎韓文如痛定之人思當痛之時不知何能自處左傳一之謂甚其可再乎謂弓人而恥為弓則無是也窮於五技望在一陶見前此盖伏遇某官忘已愛民承天載物易至哉坤元萬物資生乃順承天坤厚載物德合無疆暨湯有一德既簡在上帝之心尚書惟簡在上帝之心惟説總百官必監於先王之憲尚書惟説命總百官又監於先王成憲其永無愆然竝用江湖之士未嘗拘日月之功董仲舒傳毋以日月為功實試賢能為上既於萬物而曲成豈忍一夫之求備並見前乞漿得酒詎敢希鵷鷺之行袁子正書太歲在酉乞漿得酒㸃鐵成金庶不辱龍虎之榜傳燈録雲門如九轉丹砂㸃鐵成金詳别見科舉記唐貞元八年陸贄主司試明水賦御溝新栁詩其人賈稜陳羽歐陽詹李博馮宿王涯張季友齊孝若劉遵古許季同侯繼穆贊韓愈李絳温商庚承宣員結胡諒崔羣邢冊裴光輔是年一榜多天下名雋偉傑之士號龍虎榜某敢不刮摩所學澡雪此心莊子汝齋戒疏瀹而心澡雪而精神桃李悉在公門詎敢詠沙堤之避唐故事凡拜相之後禮絶班行府縣載沙填路自私第至於子城東街名曰沙堤唐楊收王鐸薛逢皆同年也收作相逢作詩曰須知金印朝天客同是沙堤避路人威鳳偶時皆瑞聖應龍無水謾通神收大銜之王拜相逢又作詩曰昨日鴻毛萬鈞重今朝山嶽一毫輕鐸又怒之詳見前葑菲無以下體尚庶幾藥籠之收見前四六標凖巻十五
