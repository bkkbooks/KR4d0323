  - {type: page-break, offset: 2, content: '', id: KR4d0323_SBCK_035-8a}
  - {type: variant, offset: 3, length: 2, content: 庫全, SBCK: 蜀名家鄉老使興賢能乆應定爵主簿能令喜怒晚乃栖鵉属聞纒風木之悲未敢于水薤之教捄䝉袂葺屨之餓乃辱協心推纓冠被髮之仁可占用世朝祥既御暮召何疑某方欲欵門已勤命駕發棠殆不可復敢更希馮婦之下車治齊問所以安或可延葢公而避舍回榮徳馬主簿竒之應靈趙主簿綸一麾出守慚非牧御之才同官為僚正藉老成之助有來下問極仞髙情伏惟某官腹溢儒}
  - {type: page-break, offset: 3, content: '', id: KR4d0323_SBCK_035-8b}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 氣吞晚輩倚頼巨鰲之釣時來為之低回祥鳳之棲公等安在諒奏勾朱之最即遄薦墨之飛某自笑倦游何堪共理友其士之仁者行即盍簮忠焉能勿誨乎更希倒廩其為傾徯罔既敷宣回汶川文主簿聞覲省之歸未遑一詣辱臨存之寵仍畀属辭得非所䝉願竊有復恭惟某官學優而仕徳世其家蕡不第之厚顔雖淹衆論龔好古而篤論自有祖風少屈鸞栖行看鯤化某濫膺郡寄幸託士鄉將因其嫌乎將諱其姓乎固非所望吾見其人矣吾聞其語矣愧莫之酬回長江李主簿出幕罔功詎堪再辱分符非據恐負三榮所幸在賢者之邦或可冀忠焉之誨恭惟某官學探聖處譽藹明時炷史五千言潜心有素鄴侯三萬軸載腹不遺顧薄蓬萊暫栖枳棘王珣能令公喜不足為欤孫寳安得自高聊復爾耳某濫守和義葢擇里仁無以我公歸兮使解凝塵之榻事其大夫賢者惠之止水之盂普回簿尉監當已下不願封侯已快盍簮之悃既見君子又勤衘䄂之文感煖於布帛之言乏報以襜褕之語徒知十襲莫效七襄回趙主簿頂戴登科記知一日之成名跪讀尺素書喜同年之有子旣髙陳誼又耻過情恭惟某官賦檀凌雲文成翻水能吟青玉案學素􅁉於鯉庭甫緃黄金覊名果聮於鴈塔暫棲枳􅁄即上蓬萊某辱託通家過勤委贄憶曲江杏花之㑹陪野鶴於未仙尋平羌江水之流幸海鯨之有種回崇仁趙主簿聞公子之翩翩受㕓良幸還使臣之靡靡返室有期將遂識賢預深引領恭惟某官負材開敏迪德忱恂名千里之駒早騰燕譽振九苞之鳯迄對龍光便當遡紫以凌青顧屈岀朱而入墨會膺鴞表徑簉鴛行某將指雪邊傾心日下一詣習主簿合應勝於讀書獨冷鄭廣文尚從容於歸賦其爲欣幸罔旣編摩梅亭先生}
