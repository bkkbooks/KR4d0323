  - {type: variant, offset: 7, length: 0, content: '', SBCK: 年獨力而有餘得伊尹以格皇天亦既俘三鬷之寳玉問鄧禹而披輿地行將膺萬國之貢珍諒欲四海之㑹同益思九徳之咸事矧惟􅀌迹夙累一陶兹加􅋞拭之仁殆有發生之漸某敢不銘心圖報沒齒衘恩桃李尽在公門豈終使一株之慘淡葑菲無以下体尚希發寸草之華滋致仕回李致政坤載聮事少城一星終矣懐章仁里數月于兹未皇致擁篲之恭猥先辱踵門之見恭惟某官盤根仙種發藻儒英夷恵可否之間夙播仲元之譽逹榮前後之舉莫回令伯之髙終難縮手於袖間竟出摘髭於頷下一第直溷子終嫌識路之疾驅再轉不負丞甘作急流之勇退㝷橘中之四皓見林下之一人致爲臣而歸良可厚近古之俗從邦君其上尚爲賦逺景之樓某爲長於斯得人焉耳車幾兩馬幾駟孰不羡楊侯之賢薤一本水一盂更願聞任棠之誨回彭致政琛謝致政壬仲一經教子人服義方五福錫民天頒仁爵未皇走慶先沐陳箋㐲惟某官典刑老成魁壘耆艾漢庭用少功名雖恨於蹉跎周王作人夀考固同於飛躍蔚秋蘭之流馥忻春草之隨袍貴老爲近於親式稱綵衣之飬乞言以成其禄㑹聞黄髪之詢某及交阿戎還識叔夜夀胥與試此何與魯侯之功盍歸乎來行即顯文王之世卷之十梅亭先生四六標凖卷之十一雜謝代林運幹良顕謝丞相書考求文字干大播於一陶俾登畿幕積小成於三考獲進選階頂踵歸坱圠之功肝膽極輪囷之感敢因摧謝更叙依歸伏念某材無瘉人學未聞道半世寒牕之燈火中年太學之虀塩篆刻雕蟲覺兎毛之欲秃衘枚戰蟻偶雞口之先鳴遂采魯芹出燃楚竹未滿戍􅀲之代忽纏家棘之悲隙駒之制易終林烏之哺益切上書光範初無蟠木之先容得闕長安乃辱采葑於下體朅來半載何有寸勞夏屋督工粗逃曠敗春闈考士獲厠使令及大庭聞魁三之傳則本房有簋貳之數然雖有依紅之樂尚未霑破白之章七十偏親一則以喜一則以懼斗升微禄時乎爲飬時乎爲貧茫然寸歩之謀甚矣分隂之惜䑕肝蟲臂固難躁進以妄圖馬渤牛溲或恐兼收而並蓄恭惟某官鼎彛家學衮冕世臣撫五辰於泰階之平載萬物以坤元之厚復文武之境已昭元老之壯猶歸鄆讙之田足見真儒之已效然益旁招於俊乂欲令聚在於闕庭故凡絲粟之材未始蒯菅之棄尚念某亢身無䇿仰首自鳴桃李成蹊自合安不言之分樓臺近水詎能忘先得之情代察判徐愿謝史丞相得五帋文字補京兆之椽曾㣲賛畫之長交公車之章兹拜成終之賜自匪載驅於四牡何由一發而五豝毫髪不假之他門頂踵皆歸於化冶有言雖淺進謝敢稽伏念某才乏線長力尤綿薄十年太學身甞百甕之虀一第集英袍已半霜之葉昨終素韠重累洪鈞泛緑依紅猥使近長安之日草􅀇尚白誰肯牋閶闔之風始焉一鶚之飛繼以乗鴈之集再而衰三而竭孰與㸃睛二之下四之中正湏合穎况當百里九十之半更覺分寸千丈之強忽蒙雷電下取之勞遂有埃風上征之路何物不由於洪造此身獨拜於全功兹蓋伏遇某官八柱世臣三槐家學方當鯉趨過庭之際已傳虎拜稽首之心更化十六年無匹夫不被其澤闢國數千里復寜王有指之疆益閎翕受之規丕廣旁招之意里仁爲美似怜桑梓之偶同舉能其官特取蘋蘩之可薦感一力挈提之厚增寸心銘鏤之私某敢不勉自激昻圗惟報稱雞犬䑛鼎難更干㸃化之功鼴䑕飲河當自詭承流之效感藏不盡敷述奚殫代吳省倉玭謝丞相縮次貧累清時許守漢倉之粟老湏逺次忽臨齊戍之􅀲此恩夙出於大鈞於義冝伸於小牘伏念某身勤事左意廣才踈家丗占寳唐之濵學問皆環溪之訓少而有志頗欲就博習修㓗之科壯則無竒亦屢玷徳行道藝之貢嵗不我與命與仇謀烏帽黄塵凡五排於禮部青衫白首又兩進於計臺終然蹉跎成此遲暮漫作兵厨之隱聊爲簿竈之依青天鳥道之拊膺雖甞奏辟白水魚竿之入幕何敢疾驅如此頭顱凄其脚色奚敢作堂除之夢猶難干京局之除時方張更化之弦公實權造化之柄冐爲冶躍便辱甄收使守九年之儲令待四政之闕樝梨橘柚大非老人所種之冝欂櫨侏儒偶在宰相兼收之列聊裝鋪席歸老林泉不謂俟河之清乃成縮地之脉洛中親舊書傳犬耳之黄吳下官曹事報烏頭之白僮奴欣怪里巷驚疑髙下在心只合避賢者之路進退維谷反恐負相國之知尚堪一行不逺千里然非恃無垠之坱圠亦寕免將進而趑趄恭惟某官清任以和直方而大手麾九日太陽行黄道之中坐鎮八年微物岀洪鈞之播雖風霆不言流形之利然天地能照許國之心外撫四夷内熈百度收毛髪絲粟之細入竹頭木屑之藏晉卿之舉七十家不遺筦庫祐甫之除八百吏皆是舊知冒焉而來恃此無恐某敢不靖共爾位洗濯其心却日揮戈收效在桑榆之景涓辰擁篲奉身歸桃李之門代饒運幹􅁩謝史丞相改任幹茗事於畨禺妄求易地賛漕輸於湘浦竟辱回天俾依青草之湖庶免黄茅之瘴此恩渥甚何感猶之伏念某樸學無竒散材不腆踏槐半世幾隨兎目之黄采藻十年似守烏頭之白偶叨終秩未及問鈞五嶺聞其皆炎初無去志諸公怜其獨冷誤有辟書元戎欲處之油幢之中真宰遂寘之茗寮之末等勤大播徑合疾驅惟是􅀌㷀之蹤寸勇尺懦實聞疫癘之地十室九空率爾陳情期於避禍媒身無䇿難空兾北之士夫換骨有方乃綴湖南之賔客獲避飛鳶之跕姑從檣燕之留茲蓋伏遇某官秉國之鈞熈帝之載更政化當更之琴瑟續聖賢難續之鼎彛益賛禹而格苖誕布舞干之化尹相湯而伐夏迄垂典寳之書然猶耻溝中之推必欲濟天下之溺印趣銷而趣刻足昭從善之仁衣改造而攺爲益表好賢之意某敢不敬其可願欽乃攸司緑水紅蓮已感移栽之恵青芝赤箭尚希並蓄之恩代李緫幹伯長改任謝史丞相回馬首於塩亭不良擇地䕶䑕牙於粟􅁃有渥自天當趑趄將進之間拜坱圠無垠之賜謭焉􅀌賤辱此一陶竊惟京口之積倉實切邊頭之仰哺緫司創闕褁粮兼坐甲之司堂選掄材弄印致閲時之乆蓋戰徳戰謀之際惟去兵去食之難爲米折腰雖不離於禄仕簸糠眯目易有誤於軍須必爲官而擇人庶因能而任職伏念某一寒無挾百拙有餘伯父取之庭階補以京秩弟兄習乎弓冶志在世科偶尺寸之蹉􅋸漫斗升之嚵嚼中嬰家難復詣吏銓煮海爲塩妄欲供富媪之役無麪作餅或謂非巧婦之能况當避嫌不免易闕自笑鮎魚之上竹何翅羝羊之觸藩一指之不若人猥勤伯氏之請匹夫之失其所亦関造物之憐迄蒙倉庫氏之除全出光範門之造恭惟某官鼎彛家學社稷世臣巫賢之継巫咸不但底王家之乂伊陟之紹伊尹真足格上帝之心雖九徳敷施均不遐遺而一門小大尤蒙器使烏鵲遶樹真同撼木之蚍蜉牛羊求芻乃肯發機於鼷䑕某敢不修其可願欽乃攸司錢榖甲兵問於廟堂當識士大夫之職椳闑扂楔成其室屋無忘明宰相之功謝丞相書考補上佐於黔㠝偶書下考貢空函於黄閣莫報實恩偶暫攝於竹符尤倍希於樾䕃忘其喋喋布此惓惓伏念某殖學踈蕪渉道短淺青泥盤足毎思範我之馳驅白雪滿頭寕復􅀄心之邂逅進乏犬雞之效退從鹿豕之遊辱坯冶之一陶俾翺翔於半剌䍧牱爲徼雖非監螃蠏之州盤瓠見容偶免築鯨鯢之觀竹齋藥竈不礙雲山芰製荷衣無邊風月適挈瓶之缺守又越爼而代庖胡瞻爾庭人固疑其鶉宎此非子坐自亦愧於象環所祈新尹之疾驅庶遂陳人之退屏明年今日固可歸三逕之荒凌雨震風尚合假萬間之芘恭惟某官得聖之任爲帝者師衡紞紘綖増鼎鉉九九之重箕裘弓冶恊泰階兩兩之符行由絶席之尊徑陟維垣之峻人主聀論一相具瞻槐面之專太􅀓府有三才詎棄竹頭之細所祈全度非兾超遷某敢不補拙以勤謹終如始深懲往轍躋分寸而落千丈之強雖踵常塗視九十爲行百里之半其爲㱕􅀝罔旣敷宣謝魏侍郎了翁爲先祖先父作墓誌先美無傳凛負子孫之責幽䥴有託蔚爲祖考之光属拘柱後之文莫布堂下之武敬裁儷啟恪布謝悰竊惟隧刻罕見於先秦之前墓碑似昉於後漢之末正而斃斯亦已矣身將隠焉用文之如郭林宗尚可免伯喈之愧若陶元亮又何待延年之辭降逮李唐㝡崇韓栁韓銘正曜定非䛕墓以攫金栁表文通亦豈遺人之矴石蓋斍良工之獨苦有怜没世而不稱發其幽光時乃天道重惟先祖父之斈不事今科第之謀一門千餘指之肅雍是亦爲政九流百三家之貫穿止以潤身不徒稱鄉里之善人實有得名教之樂地維廉藺固不羡曹蜍之無恙然夷齊要是得夫子而益彰恭惟某官有徳立言以文貫道粹若出六經之正凛然寒五緯之芒搴芙蓉而賦詩洞識隂陽之消長傍梅花而讀易詎忘天地之彌綸頗哀墜緒之茫茫恐与常流而泯泯既取賛皇之實録以誌楚金復叙奕城之世家就銘明允仍加篆書八分之賜俾免不稱三服之羞一門存亡百世感激某敢不昭告屏攝表刻墓埏儻得保首領從九京之遊庶無泚面目逹中心之愧㣲薄不以廢其礼何足爲碑板之酬夙夜無忝爾所生用此爲師門之報其爲感鍥罔既鋪棻謝衛參政涇差校正書籍小材出位願㱕朱墨之勾稽大府量能留備丹鈆之㸃勘少振塵埃之冗倍勤坯冶之陶竊以三館文書固遴讎正編摩之選諸侯賔客率多獄訟財賦之司寕有伺候公卿之門更容休息篇籍之囿憐韓愈之非聀俾就閑官期吕蒙之讀書非爲博士沫濡鮒轍啄抱鶴翎使飬是氣而塞天地之間將和其聲以鳴國家之盛知花於見根之始乞漿有得酒之恩求之古人亶在今日伏念某少諧平側長識偏傍不深石室之紬僅曉金根之讀遺經獨抱未辨豕渡河之三良史博觀粗知馬与尾而五有時北䆫髙卧之夢頗思東觀未見之書三神􅄅在於海中五鬼難驅於坐上挿架三萬軸但當守鄴侯之書家集二百篇幸皆是撫州之冩然作吏此事便廢亦有命焉惟投閑乃分之冝傷哉貧也乆留戯下冝在遣中遽冒小朝廷之除使䇿行祕書之職兹蓋伏遇某官榮分湘閫並用楚材义􅀒偃植各安所施耻匹夫之弗獲椳闑扂楔惟器是適無一藝之不庸試黄閣之規模收碧油之人物至如狂簡之小子亦勞坱北之大鈞某敢不祗此簡書呻其佔畢珥貂分陜已收下體之菲葑給札登瀛願備一株之桃李代袁子固謝縣宰寛假箠楚之下何求知難全璧縲絏之中非罪迄就罰金敢不持咫尺之書少謝寛一分之賜惟越人之相攻擊蓋其俗然而長安之羣殺傷各有主者况已過都而歷塊誠難被髪以纓冠儒者好髙未免爲役而耻役􅀠也不力又可與言而不言但催科未動是閑人豈期㑹不報爲大政所謂行人失者乃使吾身親之方入聞言偃之弦忽使受曾參之杖主人讀未知主人罪也自怪其頑天下寳當爲天下惜之誰興此念惟體膚受之父母而衣冠耻在國家馬遷腐刑何面上先人之墓孫臏刖足快心蹶上將之軍故滕公釋韓信之囚而小白解夷吾之縛知其不可復續所以寜失不經向使當時滛及善人安得異日報以國士如某者詩書門户燈火生涯非其職矣千乗之邑百乗之賦切願學焉惟是受滕一㕓敢辭于役然且去齊三􅀫難疾其驅偶隣境之胥􅆷坐家人之失告鶴非有禄徒以鶴警之失期鴈或不鳴要亦鴈奴之有罪不虞投足卒禍及身業已逮於桁楊􅀔難逃於􅅰楚自度受李日知之杖又當變余安道之名然使撻之市朝得無傷於冠帯無小人無君子冝玉石之俱焚有里胥有大夫伏遇某官堯族俊德周家懿親粹然麟角之祥屈此牛刀之試謂重士所以重國要當躰朝廷長育之心知察獄先於察情又豈容胥吏上下其手况開設學校方將馴化於鴟梟則愛惜人才何忍鞭笞於鸞鳯致此㸑餘之棄亦從金作之刑某敢不䇿髀肉之功名勉皮膚之學問痛懲臨難之苟免益思學道以愛人儻許國之可期當措刑於不式自此不復贖矣安用以撻記之鞭􅑔越而立威名既知免於東海出鄒陽而爲上客尚有望於梁園謝曹直學賀雨伏以和巴歌之二闋遏雲足繼於謳青贈唐律之七言喜雨宛同於醉白莫辦雙金之報徒深十襲之藏謝曹直學喜雨詩伏以瘨我以旱良窘望雲有志乎民辱書喜雨徒切誦清風之穆未遑和白雪之髙回平江府沈侍郎送酒杓斡龍躔日又賔於暘谷香凝燕寢地孰勝於蘇州矧惟荷槖之賢冝介椒盤之祉恭惟某官徳參隂隲道配陽休奉行寛大之書繭絲免矣宣布中和之樂襦袴煖然諒報政於吳門即歸班於魏闕某一寒寡與獨冷何辭猶幸太嵗之在申例容乞酒遥祝夀星之出丙莫遂稱觴回岳緫領珂送酒賀正天躔回甲聿新曆數之朌嵗紀在申將應酒泉之䜟時維膚使日進啿祺恭惟某官徳配陽休功多隂隲漕下氷解師有宿飽之期掌上月升日佇辰猷之告聊暫紆於羔袖即徑上於雞翹某家本一寒官冝獨冷窮年兀兀只自慙廪粟之糜清夜沉沉頼肯續燈花之酌回新都廖宰子材送酒及石榴伏蒙郇翰寵賁陶籬餉以乗壺定有可人之味侑之碩果中存多子之祥續歡伯之風流洗醋兒之酸楚已從竹葉獲觀令尹之清尚想榴皮可頌中書之考代回安撫趙尚書送物共六尺之輿同寅良幸分丈二之組先甲巳頒悵遂告違顧勤亟餽恵而好我慚取數之孔多卻之不恭敢下拜而登受區區􅂨謝續續面陳又同前一麾出守漸可解維同官爲寮蒙加折爼維多維㫖且感且慚敢貢記室之辭少致兵厨之謝代回趙京尹餞送已辤軒陛漸理艅艎更勤加餽之稠重冞仞大寮之篤叙既醉既飽腹不勝其属饜載忻載奔面無由而控謝代回臨安府七夕送物抱拙終身倦乞犬牙之巧未能免俗頗安犢鼻之貧臺餽鼎來尹釐意厚酒醪醇壹况加雞柘之甘􅊡餌馨香仍儐螺甲之㫖備此四美跂彼七襄莫宣衘戢之私但劇嚅嚌之感回寋學諭賀得粟九穂一莖九穂昔甞疑司馬之䛕異壟同榮今顧辱昌黎之頌雖君子之政不以物恠然太師於詩可見民風要非于祥而于仁恨弗以規而以頌民曰太守太守不有何敢當儒館之歌秀升司馬司馬辨材請以旅天子之命回李僉判賀瑞粟某導九穂於漢庖此真偶爾歌五言之唐律何徳當之不敢續貂恐譏集鶡唐叔之得同頴安敢望周公之歸劔南之進嘉禾亦難上栁子之表姑藏佳句以俟豐年回王監酒提督修城伏以三里之城不修則壊一日必葺欲罷不能擬煩督戊巳之屯相與營甲戌之築龍見而畢不妨節用以使民隼射于墉亦可待時而藏器代回運使賀雪黄雲紀瑞肇新魯觀之書白雪效祥遄應梁園之賦能令公喜不在我先恭惟某官徳配陽和氣排冬凛有功使臣歌四牡兼此二難省事天公厭兩回併成一賀方圖面慶又辱手牋不成報章尚幾幸察回陳術士某適勤枉顧寵畀儷箋不但知五行之精抑又窺多文之冨其爲感佩罔既報酬梅亭先生四六標凖卷之十一梅亭先生四六標凖卷之十二謝惠詩文謝張祕校晉臣投詩並代月湖蒙以契家之舊贈之佳句之新昔人三百篇世寡和矣古詩十九首君突過之但深巾笥之藏莫效䄡䄖之報謝汪祕校莘惠詩方味大篇又饕長句冠切雲佩明月正自不凡濟白水登閬風居然相導恭惟某官抱負竒志屈摺壯圖文采離離猶可和其聲而鳴國家之盛詩律坎坎何至虛其腹而藏天地之愁子亦來見我歟僕未有可師者參横月落不堪喚夢於羅浮目擊道存何必相期於汗漫區區􅂨曲續續面陳謝監鎮陸子遹惠詩今早特勤古風見畀句有家法信他日之聞詩老無喜機羡故人之有子恭惟某官爽貫眉目清入肝脾昌黎門庭未免金根之誤杜陵衣鉢僅存玉案之吟郎君於此勉之放翁爲不亡矣某幸蒙委重愧乏報嘉欲爼豆予我乆周旋寜作我願金玉汝君家所有更贈君謝林祕校季熊投詩伏勤枉顧寵惠名篇曾前惠之未酬已厚章之洊至雪巢有子不􅀌珠玉之編月湖無詩可作瓊瑶之報聊以數語寫此寸誠謝盛登仕夢弼長書寵示長牋就貽大􅁽非至篤好何能多如是耶所謂立言亦甚似而幾矣愧乏䄡褕之報徒華巾笥之藏謝許新恩􅁉惠詩兹勤佳句良感髙情或疑年使之年此事可念以吾老及人老何力可施徒參患脚之禪莫救旋渦之佛謝蘇祕教丙杜門具奏方此乞骸叩户論詩失於倒屣恭惟某官長材素藴餘事清唫觀秋月之兩章羡春雲之多態天未䘮斯文也復聞永嘉之音子亦來見我乎應認江西之􅂀某亦聿既耄兆足以行贈我綺琴乏雙南之報答乞君霞珮請萬里以頡頏謝程監丞凖荐勤真蹟加貺名篇對秋月之兩章仰春雲之多態爲施厚矣無謝可乎恭惟某官一世典刑三朝夀雋雖老子婆娑自安於橘顆然此翁矍鑠猶可以蒲輪誰知幽桂之遺榛菅坐令積雪之困桃李咀氷嚼玉戲刻畫於無鹽洗醆傾樽巧噤吟於唐舉惠而好我何以報公某乆􅀝長松竟成小草借君詩而消永夜自不成眠期吾王之召將軍更宜善飯謝朱新恩遜投書比辱訪存特勤書况雖過情之可耻然荷意則甚勤恭惟某官學踵乃翁氣吞餘子襟懐磊落不專紙上之蟲魚談笑從容遂蹙草中之狐兎當季康子患盗之日正班定逺封侯之時乃援古人以方我輩一之爲甚四者難并人豈不自知耶今願竊有復也殺賊奴取金印何待明年縛單于寘藁街更期他日謝吉州楊司理彭年惠詩比勤三顧寵惠六詩巧刻畫於無鹽力扶持於夜燎不知所報當贈以言恭惟某官自䇿英躔冝收名第青衫白首氣硉兀而未降丹筆墨曹翅翩翻而方展不謂睡龍之寳猥加羅雀之門衘盃酒接慇勤且承至止遣一介奉咫尺更幸亮之謝周祕校噩之惠梅詩叢桂移文問周倫之好在官梅動興笑何遜之重來非吾之故人耶所見者今我也恭惟某官城市大隱山澤真癯拍洪崖挹浮丘疑遊八極召鄒生延枚叟又客諸侯兹辱顧存未遑迎肅終然不可口過勤黄山谷之詩殊不類其人殆似}
