  - {type: variant, offset: 23555, length: 375, content: 庚而具孚輿人旁午以相慶並見前恭惟某官器資山立禮記山立時行注山立不摇動也正義曰山立者若住立則巋如山之固不摇動也樂記云總干而山立不摇動也才諝淵停石崇楚妃歎矯矯莊王淵停嶽峙洊著民庸政安駭馬荀子馬駭輿則君子不安輿庶人駭政則君子不安政馬駭輿則莫若静之庶人駭政則莫若惠之韓非子造父御四馬馳驟周旋而恣欲於馬者擅轡筴之制也然馬驚於出彘而造父不能禁制者非轡筴之嚴不足也威分於出彘也遍儀宰旅妙割全牛宰旅言為宰相屬官檢正之屬東坡詩妙割無全牛考前此之彛章宜引之於禁近屬日畿之選使勤天陛之掄材青雲不厭於斜飛劉禹錫詩青雲直上無多路却作斜飛取勢回互見前繡斧暫勞於直指未離五尺天之近儼立筍班前知七八月之間即持荷槖並見前某卜隣舊矣聞報躍然誦水鏡是人材之篇喜詩仙之有後山谷詩塞上金湯惟粟粒胸中水鏡是人材思金石出丞相之語恐里諺之可占豫章有日月湖中有石人灘里諺相傳日月湖明良將出石人灘合狀元, SBCK: ''}
