  - {type: line-break, offset: 0, content: '', id: KR4d0323_WYG_015-1a01}
  - {type: variant, offset: 0, length: 1, content: 欽, SBCK: 六標凖卷之九謝辟置再辟制幹入蜀謝丞相遮曰而走長安幾穿破履登天而攀蜀道忽得舊氊知坱圠之無垠難趑趄而不進輙修贄見併吐謝􅂨伏念某骯髒亡竒雎盱有志一科不補墮身溝瀆之尋常萬物皆塵妄意簡編之尺寸繇頃年之從辟抵中道而遭艱跨海渉湖痛尤未}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 捫參歷井夢不敢尋故因祥除甘就部闕適於西清之衆論許爲東閣而一言遂令索米之人或動乞漿之興鬻璞而售乾璞誰適爲容翹材以待大材汝非所及猶頼益州之元德尚思吳下之阿蒙羅而致之兆足行矣幾葬魚腹固甞回孝子之車又過羊腸益合叱忠臣之馭切聞殿西之顧頗及雲南之師要是}
  - {type: page-break, offset: 2, content: '', id: KR4d0323_SBCK_009-1b}
  - {type: variant, offset: 3, length: 1, content: 庫, SBCK: 蜀之可憂殆匪一端而遽止雖托重固在詩書之帥然㧞尤宜得文武之才置諸鄒枚之間蓋有禕允之任豈應庸下可在選中伏遇某官身佩安危功存開濟獨揮九日再爲天地以立心八荒一雲復令山澤之通氣行政如彼其乆樂不存焉當今捨我其誰聖之任也粤從更化專務調元三階既平元首有股肱之喜五胡方擾中國無疥癬之憂然欲折千里之衝是必開衆正之路得人朝廷得人幕下寕有重輕誠死城郭誠死封疆要加儲飬如有所試俾勉此行某敢不體認一陶攀縁九折堪其事者謂之力藉莫酬相國之知逺而使之觀其忠詎敢作衆人之報謝董制置居誼辟充成都撫幹簿領抗塵自分湘濵之憔悴帥幢辟属許令蜀道之攀縁初無待於懇祈便力爲之振㧞請裁四六少謝萬分切觀我宋帥蜀之臣無若後趙前張之懿忠定之薦辟必方廉恬退之人清獻之奏惕皆骨鯁敢言之士欲濟其美在簡乃僚伏念某殖學不豐聞道尤淺怵於爲飬強營三釡之謀拙不適時竟墮一科之底謂屠龍之可學又􅀞虎之不成孫寳安得自髙且棲矮屋王珣能令公喜偶傍轅門其實出朱入墨之材終非泛緑依紅之器駭從臣之出牧指尊選以見招我猶未免鄉人固應累陶鎔之造翁真善幹國事何至湏斗筲之材聞已牋閶闔之風欲共泛瞿塘之水成都萬事好每歌誰能委珪幣之詩長沙千里平恐發忍着主衣裳之笑進退維谷傴僂循墻及見文移不容控避鮑叔真能知我他復誰知政身未可許人盍爲公許恭惟某官含弘光大明允篤誠親結冕旒進儀筆槖晝日三接而天心黙契終嵗九迁而人望尚奢一節使燕言靣無幾微之見三刀夢益氣色歸號令之明欲擇幙賔必先朝彦况幾兩幾駟而出定多驥尾之攀何一琴一􅀛之餘亦取鶴翎之短以識字有數爲敏贍淹該之學以多言數窮爲貫穿通逹之材自視歉然公言過矣然已入朝取良馬之數難更作夕避長蛇之疑某敢不澡雪此心鞭磨所學銘諸肺腑惟國士遇之國士報之借以齒牙乃執事事也執事責也縱使盡無用於世亦將求不辱其門舉李生何辭當謹佩愛直之贈爲董公從事豈但陪合樂之嬉代趙主簿希坡謝衛參帥辟撫属黄綬抗塵幸蒙恩而受代碧幢率属辱剡奏以充貟雖未占天問之果酬豈不假人言而後得頂踵皆歸於特逹肺肝倍激扵輪囷伏念某名爲皇宗實本素士先人存趾甞首列於儒科元舅拊頭謂必成於宅相遭家多難欲仕無津躡屩擔簦輕别家園之松菊懐鈆抱槧甘依學舎之虀塩偶爾登名漫而試吏㑹計而已初無出位之思名實未加濫􅀼代庖之譽不堪位置何足控摶泰堦六符忽擁旄麾而至明堂一柱不遺扂楔之微曲假存}
