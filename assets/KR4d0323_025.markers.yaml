  - {type: variant, offset: 5, length: 20351, content: 二十五宋李劉撰憲使東萊吕氏曰太宗即位之久天下無事淳化初詔諸路轉運使各命常參官一人專知紏察州軍刑獄公事此初置外路刑獄官之始是時猶𨽻轉運司然行之二年勞擾無補於是淳化四年降詔省罷委轉運司振舉之真宗景徳四年復置不𨽻轉運別為一司稍重其權矣仍借緋紫以三年為任増給緡錢如轉運使之數當日詔㫖專為刑禁詞訟寃枉天禧中已兼勸農一事至仁宗天聖六年詔令諸路提㸃刑獄司朝臣使臣交割本職公事與轉運司副令轉運司條所省事件以聞既罷兩年天聖八年復置尋罷至明道二年復置自後提刑一司雖專以刑獄為事封樁錢糓盗賊保甲軍器河渠事務浸繁權勢益重而漕使所總惟財賦綱運之責而已司局愈多官吏愈衆而事愈不治今日之弊正在按察司官之不一也賀李知府除潼川提刑錫一作鐊丹檢起家說文檢書署也徐曰書函之盖也三刻其上繩緘之然後填以泥題書而印之也詳别見繡衣問俗唐貞觀六年分遣蕭瑀李靖等廵省天下延問疾苦觀風俗之得失察刑政之苛弊故國非喬木之謂世選爾勞尚書世選爾勞予不掩爾善奕葉茂猗蘭之光汝陳時臬杜詩仙李盤根大猗蘭奕葉光尚書汝陳時臬事䟽臬為凖限之義星言雙節詩星言夙駕新唐書百官志節度使辭日賜雙旌雙節風聳列城賈琮傳百城聞風自然悚震㳟惟某官器博而通材𢎞以毅卓犖坐空於萬馬卓犖超絶也晉孫綽潁州府君碑天縦傑邁竒逸卓犖韓文卓犖為傑音力角切笑談立觧於千牛謂之檮杌謂之春秋素髙家學有若伊陟有若臣扈宜襲世官與其勞四國之蕃宣不若奉六條而亷察竝見前公私之積可痛有賴阜通漢食貨志漢之為漢幾四十年矣公私之積猶可哀痛失時不雨民且狼顧輕重諸罸有權尤資閱實尚書輕重諸罸有權刑罸世輕世重又其罸百鍰閱實其罪昔者鯉趨而獨立今兹虎拜以揚休載馳載驅共說西平之有子善繼善述更觀東府之象賢某濫守憩棠復依䕃樾竝見前作鹹作辛作苦幾不容一日之安尚書潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘惟内惟貨惟來詎敢逭二天之按尚書五過之疵惟官惟反惟内惟貨惟來其罪惟均其審克之其為歸倚罔既編摩賀潼川李提刑除䕫路提刑錫自天出綍易地褰帷家人有嚴君焉舊膺此選皇華遣使臣也今世其官雖曰因避親之嫌亦見善繼人之志䕫藩幸甚竝見前梓部駭然潼川即隋梓州因梓潼水為名姚合送楊尚書赴東川詩郄縠詩書將銜恩到梓州恭惟某官器重以周材𢎞且毅與人忠而執事敬見善明而用心剛四國于蕃茂甘棠之蔽芾六轡如組訝苞栩之逶迤曽未煖席之間倐有改轅之命竝見前惟四蜀之門戸董鉞制勝樓序䕫為一路當左右全蜀之口倚三峽為吭咽水經注廣溪峽巫峽西陵峽為三峽丁公言記䕫州慿髙控深咽㗋巴峽吭寒剛切咽也亦作亢爾雅亢鳥嚨亦作肮婁敬傳搤其肮昔先正保衡於此展澄清之志尚書昔先正保衡作我先王今命汝大正庶乎體欽恤之心尚書今予命汝作大正正于羣僕侍御之臣遥知叱馭以驅之見前㑹有觧印而去者朱穆傳穆為冀州刺史冀令長聞穆濟河觧印綬去者四十餘人及到奏劾諸部至有自殺者賈琮傳其諸臧過者望風觧印綬去忠信缺矣蓄積缺矣暫勞雙節之馳詩序皇皇者華廢則忠信缺矣華黍廢則蓄積缺矣錢榖幾何刑獄幾何佇對九宸之問王陵傳天下一嵗决獄幾何錢榖一嵗出入幾何九宸猶言九重說文宸屋宇也廣韻天子之居増韻帝居北辰之宫故從宀從辰某方依雲覆忽報星移王勃詩物换星移幾度秋雖難留有脚之陽春然尚冀驩顔於廣夏見前送我而入楚澤固猶恨逺水之遮韓詩堆堆路傍􅕤一雙復一隻迎我出秦闗送我入楚澤千以髙山遮萬以逺水隔思君而下渝州㑹問訊清溪之發李詩夜發清溪向三峽思君不見下渝州互見前其為懽懌罔既編摩賀潼川王提刑禧奏最觀風詳刑易地劉愷傳以輕從重懼及善人非先王詳刑之意也注書曰有邦有土告爾詳刑鄭𤣥註詳審察之也晉書元帝紀布帳練帷詳刑簡化詳見前天旋夔峽垂光來近於蔚藍少陵續得觀書定出三峽詩天旋夔子峽春近岳陽湖又冬到金華山觀因得故拾遺陳公遺迹詩涪右衆山内金華紫崔嵬上有蔚藍天垂光抱瓊臺潼川在涪江之右故云涪右蔚藍洞天名一云蔚藍青色韓子蒼詩水色山光盡蔚藍是也老學菴筆記蔚藍乃隐語天名非可以義理觧也如杜詩所云猶未有害韓子蒼乃云水色天光共蔚藍乃謂天與水之色俱如藍耳恐又因杜詩而失之星入益都載驟復歌於苞栩詩駕彼四駱載驟駸駸餘見前仁聲藉甚封部驩然恭惟某官從容以和尚書寛而有制從容以和洵羙且直自為名進士之日蔚有古君子之風既疇庸磊落之州栁文皇天疇庸審厥保承杜詩綿州州府何磊落顯慶年中越王作互見前合入從通明之殿東坡詩侍臣鵠立通明殿一朶紅雲捧玉皇顧煩雙節徃控三巴孟浩然詩􅍮門控三巴蜂腰鶴膝之饑甿復盈膚革南史齊陸厥傳沈約等文皆用四聲制韻有平頭上尾蜂腰鶴膝此借用以擬饑民之狀甿通作氓說文民也周禮遂人注氓猶懵懵無知貌詩甿之蚩蚩亦作萌劉向傳民萌何以戒勉革猶皮也禮記四體既正膚革充盈人之肥也䟽云膚是革外薄皮革是膚内之厚皮革也雀角䑕牙之滯訟洞燭肺肝陸佃埤雅云雀角䑕牙皆言以無為有以是為非也盖雀有咮而無角䑕有齒而無牙雀依人又畫動而無角在首且所穿者屋事之易察者也䑕畏人又夜動而無牙在口且所穿者墉事之難知者也召南之初事之易察者至于獄而後明及其久也衰亂之俗已微貞信之教已興則雖事之難知者不待訟而明矣故于雀言獄䑕言訟也古井無波白樂天詩無波古井水有節秋竹竿東坡詞無波真古井有節是秋筠陽春有脚還濡牡轡見前來顧鶴林杜陵望牛頭寺詩牛頭見鶴林梯徑繞幽深春色浮山外天河宿殿隂傳燈無白日布地有黄金休作狂歌老回㸔不住心注鶴林即靈仙觀也按牛頭鶴林皆潼川勝地禮樂言逺而有光既接鄉閭之近刑罰不中則無措更兼倉庾之平提刑兼提舉常平雖則劬勞又復馳驅於原隰周爰諮度便當獻納於軒墀某乘障非材奉身受察五善重拜忻聞君子之得輿百拙一勤儻許小人之全璧竝見前其為頌詠未易編摩通劉提刑垕丹墀賜對繡斧詳刑君遣使臣固光華於在逺俱見前獄為司命必明謹而不留漢書獄者人之大命易山上有火旅君子以明慎用刑而不留獄一賢觀風萬物吐氣恭惟某官氣涵方重識抱浚明胸中風月之無邉一塵不染山谷濓溪詩序周茂叔人品甚髙胸中灑落如光風霽月又䟦東坡卜筭子詞東坡道人語意髙妙非胸中有萬巻書筆下無一㸃塵俗氣孰能到此筆下源泉之不擇萬斛而贏陳後山詩胸中歴歴着千年筆下源源赴百川山谷詩想見東坡舊居士揮毫百斛㵼明珠頃厭承明出將英簜周禮掌節皆金也以英簜輔之英餙也簜說文大竹也以竹為函加以畫餙而盛其節也以九畿施邦政天不違顔周禮大司馬之職以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿注畿猶限也自王城以外五千里為界有分限者九障百川㢠狂瀾海為縮足韓文障百川而東之廻狂瀾于既倒顧退須於棨㦸棨遣禮切前漢書匈奴傳有衣之㦸曰棨㦸師古曰以赤白繒為之後漢書杜詩傳賜以棨㦸漢雜事曰漢制假以代斧鉞崔豹古今注棨㦸前驅之器以木為之後代刻偽無復典刑以赤油韜之亦謂之油㦸亦曰棨㦸王公以下通用之復出駕於軺軒食貨志筭軺車師古曰軺小車也外戚傳軒中得幸師古曰軒謂軒車即今車之施幰者司長沙萬里之平惟良折獄韓詩長沙萬里平勝地猶在險尚書非佞折獄惟良折獄澄洞庭九州之大何擇非人韓詩洞庭九州間厥大誰與讓尚書何擇非人何敬非刑何度非及徒知察小大之情禮記必察小大之比而成之注小大猶輕重必不容上下其手見第十一巻代袁子固謝縣宰寛假條周爰咨度即開衡嶽之雲詩載馳載驅周爰咨度韓退之謁衡嶽廟詩我來正逢秋雨節隂氣晦昧無清風須臾静掃衆峰出仰見突兀撑青空慨然澄清何愧滄浪之水范滂傳登車攬轡慨然有澄清天下之志世說新語陳仲舉言為士則行為世範登車攬轡有澄清天下之志尚書又東為滄浪之水永初山川記漢水古為滄浪即漁父所歌滄浪之水清兮者今滄浪之水合流出鐔城北界山北盖後人名之非古滄浪也一統志滄浪水在今常徳府龍陽縣西一十五里自滄山浪山發源合流為滄浪之水漁父歌滄浪即此水也所恐思賢於宣室刑法志上常幸宣室如淳曰宣室布政教之室也晉灼曰未央宫中有宣室殿師古曰其殿在前殿之側賈誼傳誼為長沙太傅文帝思而召之入見上方受釐坐宣室東方朔傳宣室者先帝之正處何武傳召見武等於宣室陳湯傳上召見湯宣室王嘉傳召見宣室對得失政事互見前還當問路於修門歸去來辭問征夫以前路宋玉招魂魂兮來歸入修門些修門郢城門也某起家一寒去國三暑强顔倚席昔慙洛下之生司馬遷傳及已至此言不辱者所謂强顔耳後漢書儒林傳博士倚席不講注倚席言不施講坐也樊凖傳博士倚席不講儒者競論浮麗謝安傳安能為洛下書生詠南史張融傳賊將殺食之融神色不動方作洛生詠箝尾對墻今補黔中之佐韓文箝以左手右手摘紙尾又南墻鉅竹千挺對樹二松日哦其間張儀傳秦要楚欲得黔中地白起傳取楚定巫黔中郡蘇秦傳一軍出武闗一軍下黔中則鄢郢動矣雖云貳郡正𨽻六條見前亷不掩聾敢歎丞哉之余負黄覇傳許丞亷吏雖老尚能拜起送迎正頗重聽何傷戇今成癖亦惟使者之汝容東坡詩勸農使者不汝容因君作詩先自劾通成都周提刑居信捫參歴井再為油幕之趨李詩捫參歴井仰脅息韓詩談笑青油幕杜詩曰頭趨幕府挹斗揚箕總𨽻繡衣之察詩維南有箕不可以簸揚維北有斗不可以挹酒漿餘見前欲徹畸孤之名字畸居宜切說文殘田也通作竒例須耦儷之簡書耦通作偶儷也又二也隻曰竒雙曰偶儷偶也左傳不能庇其伉儷又畏此簡書斐然拙毫謝莊月賦抽毫進牘以命仲宣滂若下汗吳質書申之再三赧然下汗伏念某學未聞道年不後人見前亦知富貴之浮雲不如貧賤豈無名教之樂地何必事功樂廣傳名教内自有樂地何必乃爾直以饑驅陶詩饑來驅我去為此禄仕西望太白窘峽水之倒流東坡詩西望太白横岷峨餘見前東訪蓬萊值海風而引去不謂詩書之元帥竝見前尚憐鄉里之小兒陶潜傳吾不能為五斗米折腰拳拳事鄉里小人杜詩五陵豪貴反顛倒鄉里小兒狐白裘表之鶚書隨以馬幣韓文譔書詞具馬幣卜日以授使者遂冐瞿唐五六月之險韓詩瞿唐五六月驚電讓歸船怒水忽中裂千尋墮幽泉來訪巫山十二峰之髙齊王融巫山髙詩想像巫山髙薄暮陽臺曲梁范雲巫山髙詩巫山髙不極白日隐光輝梁元帝詩巫山髙不窮迥出荆門中陳蕭詮詩巫山映巫峽髙髙殊未窮隋凌敬詩巫山鬱岧嶤髙髙入紫霄唐閻立本詩巫山髙髙半天起絶壁千仞盡相似喬知之詩巫山十二峰㕘差互相見宋之問詩巫山峰十二環合像昭囘李端詩巫山十二峰皆在碧虚中孟郊詩巴江上峽重復重陽臺碧峭十二峰十二峰見前揆材地以闕然魏書辛雄傳選補之法妙盡才望如不可竝後地先才晉書王藴傳遷吏部尚書郎毎一官缺求者十軰藴輙連狀白之曰某人有地某人有才務存進達各隨其方故不得者無怨焉陳書蔡嶷傳嶷年位未髙而才地為時所重後主謂蔡徴曰蔡嶷負地矜才無所用也王通傳王生才地豈可游外府乎託使天之近只恭惟某官人今而心古韓詩孟生江海士古貌又古心行峻而氣平少年公瑾之綸巾豈甘寂寂吳志周瑜字公瑾廬江舒人長壯有姿貌孫䇿授建威中郎將時年二十四吳中皆呼為周郎東坡赤壁懐古詞遥想公瑾當年小喬初嫁了雄姿英發羽扇綸巾談笑間檣艣灰飛烟滅晉書謝萬傳萬著白綸巾鶴氅裘履版而前又嘗衣白綸巾乘平肩輿鄧粲晉書王敦欲伐甘卓遣使送白綸巾與卓卓不受梁書賀徳基衣資罄乏嘗於白馬寺前逄一婦人脫白綸巾以贈之南史王融傳為爾寂寂鄧禹笑人他日伯仁之金印徑可纍纍周顗傳王敦舉兵王導詣闕請罪值顗將入導呼顗曰伯仁以百口累卿顗不與言顧左右曰今年殺諸賊奴取金如斗大繫肘石顯傳印何纍纍師古曰纍纍重積也居然盤旋州縣之間詩居然生子孔疏居處黙然盤本作槃蔡邕傳槃旋乎周孔之庭宇韓文隐者之所盤旋無乃培飬廟廊之業勇訪半輪之月李詩峨睂山月半輪秋徑登九折之塗九折坂在今雅州卭崍山路阻峻囘曲九折乃至山上即漢王尊叱馭處載酒凌雲頓釋里閭之愁歎凌雲寺在今嘉定州治東唐岑參詩寺出飛鳥外青峯載朱樓構壁躋半空喜得登上頭始知宇宙闊下㸔三江流天晴見峨眉如在波上游東坡送張嘉州詩少年不願萬户侯亦不願識韓荆州頗願身為漢嘉守載酒時作凌雲游埋輪當道欲周原隰之咨諏張綱傳餘人受命之部綱獨埋其輪於洛陽都亭曰豺狼當道安問狐狸何敬非刑惟明克允見前歛此大惠亦既洽魚鳬之民韓文歛此大惠兮施于一州餘見前訖其外庸即歸接䕫龍之武韓文迄其外庸可作承輔新唐書上官儀傳時以雍州司士參尉韋絢為殿中侍御史或疑非遷儀曰此野人語耳御史供奉赤墀下接武䕫龍簉羽鵷鷺豈雍州判佐比乎尚念某不逺萬里來奉六條見前安於小官而不辭亦惟君子之易事昔在嚴公幕聞俱為蜀使之知杜詩昔在嚴公幕俱為蜀使臣艱危參大府前後間清塵難甘原憲貧或竊效貢公之喜杜詩竊效貢公喜難甘原憲貧通潼川丁提刑必稱登蜀猶天撫塵蹤而自歎仰韓如斗瞻榮次以非遥竝見前敢裁小子之斐然敬告大夫之賢者伏念某才踈而力腐少賤而長窮託疲薾於山林未能辟糓莊子薾然疲役而不知其所歸可不哀耶薾音捻忘貌疲病困之狀杜詩疲薾茍懐䇿史記留矦世家乃學辟榖道引輕身漢書郊祀志李少君以榖道郤老方見上李竒曰榖道辟榖不食之道也魏文帝典畧潁川郤儉能辟榖餌茯苓梁書陶𢎞景傳善辟穀導引之法慕張良之為人云繫饑愚於簮笏却愧伐檀杜詩况我饑愚人焉能尚安宅詩序伐檀刺貪也在位貪鄙無功而受祿君子不得仕進爾居然四十之頭顱孰是寸尺之竹帛竝見前頃自湘濵之憔悴屈原漁父屈原既放遊於江潭行吟澤畔顔色憔悴誤為錦里之逢迎杜詩雪山斥候無兵馬錦里逄迎有主人半路迍邅先勒囘於俗駕孔稚圭北山移文請廻俗士駕為君謝逋客三年飄忽難重入於禮羅陸機歎逝賦時飄忽其不再劉勰文心雕龍嵗月飄忽性靈不居東坡詩此生嵗月行飄忽不謂再剖符之文翁杜詩真為文翁再剖符未廢三折肱之韓子左傳三折肱知為良醫惟伐君為不可韓文送孟秀才序吾嘗折肱焉撰書詞而具幣又委重焉韓文譔書詞具馬幣卜日以授使者又以義請而彊委重焉扄岫幌而掩關既無及矣北山移文宜扄岫幌掩雲關歛輕霧藏鳴湍截來轅於谷口杜妄轡於郊端惟是居攸之禕允之任孔明出漢中䟽斟酌損益進盡忠言則攸之禕允之任也却愧乏儀之羣博之材昌黎送楊支使序愈在京師時嘗聞當今藩翰之賔客惟宣州為多賢與之游者二人隴西李博清河崔羣云云及儀之之來也聞其言而見其行則向之所謂羣與博者吾何先後焉儀之智足以造謀材足以立事忠足以勤上恵足以存下而又侈之以詩書六藝之學先聖賢之徳音以成其文以附其質宜乎從事於是府而流聲實於天朝也治法征謀逼人已甚韓文治法征謀宜有所出謝安傳安弱冠詣王濛清言良乆既去濛子修曰向客何如大人濛曰此客亹亹為來逼人法帖衛夫人書衛有弟子王逸少甚能學衛真書咄咄逼人山谷詩逼人太駸駸臺評幕辯忤物亦多韓文幕中之辯人反以汝為叛臺中之評人反以汝為傾未論鷄犬之求僊見前誰許龜魚之託䕃韓詩水紋浮枕簟瓦影䕃龜魚恭惟某官器資凝逺材具寛宏畫棟朱簾屈平蠻之籌䇿王忠嗣傳上平戎十八䇿清江碧嶂蔚治郡之功名黄覇傳功名損於治郡時謂宜進之清朝楊震傳損辱清朝塵㸃日月庶可行其素學居然龍節戾止蠶叢戾至也詩魯矦戾止亦是戾矣傳至也箋止也禮樂言逺而有光斯言信矣刑罰不中則無措自古謹之有如使者之賢足寄欽哉之恤繡衣持斧寜乆滯銅官之山銅官山在今潼川府中江縣九十八里産銅即卓王孫鄧通冶錢之所簮筆荷囊行入侍玉皇之案元稹詩我是玉皇香案吏謫居猶得近蓬萊尚念某藐無所挾誰適與容燕谷自寒敢望春風之披拂劉向别錄方士傳言鄒衍在燕燕有谷地羙而寒不生五榖鄒子居之吹律而温氣至而榖生今名黍谷吳船未辦尚依夏屋之帡幪范石湖吳船錄云蜀人入吳者皆自合江亭登舟其西則萬里橋諸葛孔明送費禕使吳曰萬里之行始於此因以名橋杜詩門泊東吳萬里船此橋正為吳人設通湖南楊提刑楫晨入太學之下曾識明師淮南子君子積志委政以趣明師曉行湘水之春今依膚使杜詩夜醉長沙酒曉行湘水春潭州宋𨽻湖南路即今長沙也互見前禮有嚴於事大書敢廢於㳟先尚書作周恭先恭惟某官守道真儒庇民正學禮記下之事上也雖有庇民之大徳不敢有君民之心自其馳驅於外不辭小官固知磅礴於中而可大受磅礴充塞也太𤣥經昆侖磅礴幽注昆侖天之氣磅礴地之形幽人之心也通作薄揚雄傳旁薄羣生亦作魄司馬相如傳旁魄四塞韓文磅礴而鬱積由子男之百里洊賔客於諸矦廪給百司簿正九扈俱見前人皆疑其晼晩晼晩日落貌陸機歎逝賦老晼晚其將及潘岳懐舊賦日晼晩而將暮栁詩晼晚驚移律山谷詩嵗月坐晼晩又光隂坐晼晚公何有於鄙夷韓文栁矦為州不鄙夷其民圜橋億萬人甫知矜式起家二千石忽有薦揚竝見前上憐皖伯之邦方輿勝覽安慶府春秋時皖國周大夫皖伯始封之地匽姓咎繇之後亦為舒桐二國之地皖山在懐寜西十里上有皖伯祠乆缺桐君之政桐春秋楚附庸國即今桐城縣地徒得君重無俾民憂一札細書朝聞命而夕引道新唐書郭子儀傳賛朝聞命夕引道無纎介自嫌三年成聚今有袴而昔無襦史記一年所居成聚二年成邑三年成都正義曰聚謂村落也孰期清絶之鄉杜詩湖南清絶地又簡皇華之使爰將隆指出總祥刑徳星臨翼軫之間楚氛已靖長沙當鶉尾之次翼軫之度左傳伯夙謂趙孟曰楚氛甚惡懼難餘見前仙槎來雲漢之表衡嶽頓開遥知登車之慨然必有觧印而去者周爰咨度竝見前胡不均𢎞韓文海嶺之陬既足既濡何不均𢎞俾執事樞某副墨謏聞莊子聞諸副墨之子李云可以副貳𤣥墨也吕吉甫云道以體之為正則文墨所論者乃其副也禮記發慮憲求善良足以謏聞不足以動衆註謏之言小也聞聲聞也言不學之人能有片職謀慮法式求善以自輔此是人身上小善故小有聲聞也勾朱末屬羅隐寄剡縣主簿詩金庭飬真地朱篆勾稽官劉向傳同姓末屬此借用譬諸川澤之下獨何蕃歟韓文何蕃傳譬之水其為澤不為川乎川者髙澤者卑髙者流卑者止云云故凡貧賤之士必有待然後能有所立獨何蕃歟不知酃醁之前有賈生否說文酃長沙縣也从邑霝聲今衡州按字書酃淥湘東地名有酃淥酒又醽醁酒名郭仲堅湘中記衡陽縣東二十里有酃湖周二十里深八尺湛然緑色土人取以釀酒其味醇羙晉武帝平吳始薦酃酒於太廟吳錄湘東有酃水酒有名左思吳都賦飛輕軒而酌淥酃盛𢎞之荆州記淥水出豫章康樂縣其間烏程鄉有酒官取水為酒極甘羙與湘中醽湖酒年嘗獻之世稱酃淥酒陸機七羡云湘隂有酎其色澄清秋醪春醖酒惟九成張載酃酒賦珍酒出於湘東丕顯於皇都乃潜淪於呉邦其為酒也造釀以秋告成以春備味滋和體淳色清宣御神志導氣飬形異聞録魏左相能治酒其名有醽醁翠濤常以大甕納酒貯十年不敗太宗嘗賜詩云醽醁稱蘭生翠濤過玉薤千日醉不醒十年味不敗王荆公送吳仲庶守潭州詩自古楚有材酃淥多羙酒不知樽前客更得賈生否適是褰帷之始欣然祭竈之榮見前簿領中有是人耶非敢望也宋四朝國史吳擇仁字智夫為開封雍丘主簿元祐中金水河堤壊十六縣皆選屬他役獨擇仁詣朝堂白事宰相范純仁獨異之曰簿領中乃有是人耶夫子嘗為委吏矣能勿誨乎代囘䕫路李憲􅘊奏最涪江涪音浮說文水出廣漢巴徼外南至墊江入漢涪州本漢涪陵縣西魏置合州以涪江與嘉陵江合隋改涪州方輿勝覽費溪發源經五十八節名灘方至黔州溉自黔州溉與施州江㑹流九十里經彭水武徳二縣凡五百餘里與蜀江㑹於州之東水常湛然徹底以其出於黔州又呼黔江東坡詩合水來如電黔江綠似藍昔司馬錯泝此水南上擊奪楚黔中地按行巫峽于蕃而歴四國所去見思見前察州而奉六條其有所試漢百官表刺史以六條問事非條所問即不省唐貞觀中以六條察十道武后永昌中分命使者以六條察州縣恭惟某官分輝井絡擅秀岷峨竝見前名父子之天資璠璵之器蕭育傳以育名父子著材能王述傳名父之子不患無禄山谷詩慶州名父子杜詩李舟名父子璠璵魯之寳玉宋史李燾字仁甫眉州丹稜人唐曹王後紹興八年進士博極載籍捜羅百氏倣司馬光資治通鑑例斷自隆興迄于建康為編年一書名曰長編累官禮部侍郎進敷文閣學士兼侍講同修國史卒謚文簡累贈太師温國公􅘊其仲子也難兄弟之家學金玉其相􅘊兄垕試賢良方正直言極諌科為秘書省正字尋遷著作郎兼國史實錄院編修檢討官弟壁寜宗朝累官參知政事同知樞宻院以資政殿學士致仕卒謚文懿􅌫舉進士累官禮部尚書資政殿學士卒謚文肅詩追琢其章金玉其相注相質也言治寳物以為器所以可彫琢其體以為文章者以金玉本有其質性故也環轍久之韓文轍環天下卒老於行褰帷晩矣惟良折獄何擇非人送以禮樂而有光既深簡在編之詩書而無愧願益周爰竝見前某跂逺莫前賀成已後三巴䟽鑿雖莫瞻繡斧之持杜詩䟽鑿控三巴六轡馳驅猶願謹衣篝之護見前代囘浙東譙提刑令憲畫㦸奏功韋蘓州詩兵衛森畫㦸繡衣䟽寵專城作牧既優撫字之材古辭陌上桑四十專城居陳張正見採桑詩恐疑夫壻逺聊復答專城周禮八命作牧九命作伯一道觀風更展澄清之志有嚴星駕増重日畿恭惟某官蓄徳淵深褆身肅括竝見前郎潜甚久不矯世以為中楊王孫傳吾是以羸𦵏將以矯世也卿列彌髙忽抗章而請外寄隆名于壁府見前歛大惠於金華韓文歛此大惠兮施於一州玉臺新詠序云金星與婺女争華故婺州曰金華有金華山即黄初平牧羊處李詩落帆金華岸赤松若可招民欲借君於一年宼恂傳願從陛下復借寇君一年詳見前公已報政於五月史記周公世家太公封於齊五月而報政周公進之甸服尚書五百里甸服寄以獄平曹參傳以獄市為寄慎勿擾也逺有光華况近長安之日見前周爰咨度已接蓬萊之雲杜詩雲近蓬萊常五色蓬萊宫名即大明宫某甚慶得輿未遑削牘儻無雀角可使圜扉之空竝見前似是馬曹亦竊廣厦之庇晉書王徽之字子猷性卓犖不羈為車騎桓冲騎兵參軍冲問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何由知數又問馬比死多少曰未知生焉知死代囘陳提刑守藩弗績扁舟欲問於吳江杜詩輕舟下呉㑹主簿意如何改組有嚴輿轎復踰于闗嶺嚴助傳輿轎而踰嶺拖舟而入水服䖍曰轎音橋梁謂隘道輿車也瓉曰今竹輿車也江表作竹輿以行是也方露章而請免倐雲翰之寵貽愧非所蒙羊祜表臣雖小人敢緣所䝉念存斯義陳後山詩呼我過其廬所得非所蒙竊願有復禮記若有告者少間曰願有復也恭惟某官抱才膚碩蓄學崇谹左墄右平獻納盍司於清切班固西都賦左墄右平重軒三階注墄者為階級平者以文塼相亞次也上原下隰咨諏乆屈於皇華詩皇皇者華于彼原隰注皇皇猶煌煌也髙平曰原下濕曰隰忠臣奉使能光君命如草木之華無逺無近不以髙下易其色既潜消佩劔之風龔遂傳民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢又宻移珥筆之俗山谷江西道院賦江西之俗士太夫多秀而文其細民險而健以終訟為能命曰珥筆之民雖有辯者不能自解免也古諺云筠袁贑吉腦後挿筆故云日月之貴名方起荀子貴名白而天下治又君子務積於身則貴名起之如日月而天下應之如雷霆乾坤之新渥必蕃杜詩髙名入竹帛新渥照乾坤啓劄淵海熊充啟云貴名起乎日月新渥照乎乾坤則二語當時已相襲矣諒凡吾味之同皆借君波之及見前某罙入其阻罙音民卑切說文周也本作䍘從网米聲詩冞入其阻徐曰网即周布之意今文作冞毛傳深也箋云冐也毛氏曰與罙不同罙音森从穴从木冞从冖从米俗从木誤兆足以行共飲玻瓈之江已有倚蒹之幸東坡詩相望六十里共飲玻瓈江世說魏文帝使后弟毛曽與夏侯𤣥共坐時人謂蒹葭倚玉樹或入鳴珂之里或希㧞薤之規新唐書張嘉祐嘉貞弟有幹畧方嘉貞為相時任右金吾衛將軍昆弟每上朝軒盖騶道盈閭巷時號所居坊曰鳴珂里餘見前代囘提刑樂郎中繡衣平糴乆勤周道之馳驅糴亭歴切說文市榖也魏文矦相李悝曰糴甚貴傷人甚賤傷農人傷則離散農傷則國貧故甚貴與甚賤其傷一也是故善平糴者必謹觀嵗有上中下熟故大熟則糴三而舍一中熟則糴二下熟則糴一使人適足價平則止行之魏國國以富强漢食貨志善平糴者必謹觀嵗有上中下熟上熟其收自四餘四百石中熟自三餘三百石下熟自倍餘百石丹筆詳刑更奉漢條之寛大後漢書劉愷傳以輕從重懼及善人非先王詳刑之意也注書曰有邦有上告爾詳刑鄭𤣥注云詳審察之也唐龍朔中改廷尉正為詳刑大夫晉元帝紀布帳練帷詳刑簡化侯覇傳每春下寛大之詔民非改聚官不易方方道也周詔官不易方任昉表齊楚陵遲官方淆亂雖四海之望未饜饜么鹽切足也左傳屬饜而已杜注言小人之腹飽猶知饜足然重湖之幸何厚重湖謂洞庭湖青草湖詳别見恭惟某官器資凝逺徳履直方摩蜀道之青天豺虎莫投其距詩取彼䜛人投畀豺虎歌郢中之白雪䲭鴞亦好其音見前名大震於京師法言谷口鄭子真耕於巖石之下名震於京師材合居於給諫韓詩才名三十年久合居給諌惟是山海之征㩁難損一鷄食貨志浮食竒民欲擅斡山海之貨以致富羡欲其財貨之貿遷是資四牡遂煩英節見前來按熊湘史記黄帝紀南至於江登熊湘注封禪書南伐至於召陵登熊耳山地理志曰湘山在長沙益陽縣正義曰括地志云熊耳山在商州洛縣西十里齊桓公登之以望江漢也湘山一名艑山在岳州巴陵縣南十八里皇皇原隰之華民無遺便韓文韋丹墓誌凡為民去害興利於江西八州無遺便暴暴丘山之積居有積倉荀子財貨渾渾如泉源汸汸如河海暴暴如丘山注暴暴卒起之貌言物多委積如丘山也互見前公若違之他邦民必争於境上宋杜衍知乾州未滿令權知鳯翔府二邦之民争於境上一曰我公也汝奪之一曰我公也汝何有焉惟良折獄何擇非人既無得而易堯信莫如於借㓂衡雲改觀頓令山嶽之自摇湘水澄波便覺河江之易避苐虞詔紫不俟突黔竝見前某辱託比肩鬻子千里而得一士猶比肩也路温舒傳比肩而立杜詩孤陋忝末親等級敢比肩每蒙合志禮記合志同方勞來還定安集欲慰疲甿同寅協恭和𠂻正資益友竝見前所慙尺牘有觖朋箋􅔵羊列切怨望也觖者缺也觖望不滿所望而怨耳隂興傳令天下觖望獸二為友貝二為朋朋箋二箋也魚相忘於江湖諒不責腹中之素莊子魚相忘于江湖人相忘於道術陳勝傳丹書帛置人所罾魚腹中古詩呼童烹鯉魚中有尺素書鳯又繼之日夜尚同歌肘後之騷離騷經鸞皇為余先戒兮雷師告余以未具吾令鳯皇飛騰兮又繼之以日夜代囘江東提刑譙寳文令憲宋㑹要寳文閣在天章閣之東西序羣玉蘂珠殿之北即舊日壽昌閣改曰寳文嘉祐八年英宗即位詔以仁宗御書御集藏于寳文閣命王珪撰記立石治平四年神宗即位始置學士直學士待制㤙賜依龍圖哲宗御書附於閣寳廬寓直宋有寳文寳謨寳章閣直宿所止曰廬嚴助傳厭承明之廬玉節按刑周禮守邦國者用玉節守都鄙者用角節梁元帝詩玉節居分陜江淮草木之威名亶孚有衆張萬福傳徳宗以萬福為濠州刺史召謂曰先帝改爾名正者所以襃也朕謂江淮草木亦知爾威名若所從改恐賊不曉是卿也河洛圖書之經緯爰寵此行宋龍圖閣在㑹慶殿西偏以奉太宗御書御製文集楊億詩群玉天中開䇿府神龜温洛薦圖書恭惟某官奥閥刺天杜詩門閥冠雲霄韓文羣飛刺天修名㧞地離騷恐修名之不立孫樵書玉川子月蝕詩韓吏部進學觧莫不㧞地倚天句句欲活胸吞雲夢何小者之足言舟近蓬萊又悠然而引去竝見前萬牛莫挽杜詩萬牛囘首丘山重四牡載馳禮樂有光公不負澄清之志哀矜勿喜吏何敢輕重其心有功見知竝見前不逺伊邇詩中心有違不逺伊邇某民庸索莫索莫猶言落莫索盡也散也尚書惟家之索禮記離羣索居物散則盡歸夢飛騰望南浦之朝雲未能捲雨懐江東之暮日正阻論文竝見前代囘福建詹提刑徽之疏㤙中禁持憲外臺見前褰帷風動於列城後漢賈琮傳琮為冀州刺史之部升車言曰刺史當逺視廣聽紏察羙惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震互見前洗印日新於衆聽唐百官志三日洗印視其刓缺湖山自得原隰有光見前恭惟某官早抱通材徧儀華貫㳺刃有餘矣經肯綮之未嘗莊子恢恢乎其於㳺刃必有餘地矣又技經肯綮之未嘗注肯著骨肉也綮結處也善刀而藏之得躊躇之滿志莊子為之四顧為之躊躇滿志善刀而藏之注躊躇滿志逸足容豫自得之謂善刀藏之謂拭而弢之也屬時更化加意審刑徑疇淑問之賢徃任皇華之寄俱見前維閩七聚不勝鱗介之勞山谷詩維閩七聚落􅑱獨困吏饕土弊禾黍惡水煩鱗介勞奉漢六條寜止狐狸之問必有澄清之志乃無愁歎之民俱見前其審克之尚書其罪惟均其審克之行且召矣某未遑燕賀先辱魚書竝見前君乗使者車固可想雲煙之風采郭丹傳從師長安買符入函谷闗乃慨然歎曰丹不乘使者車終不出闗丹自去家十有二年果乘髙車出闗如其志焉注諸矦使車皆朱班輪四輻赤衡􅀈岑參詩故人方乗使者車吾知郭丹却不如詔詣行在所或少慰塵土之心期史記滑稽傳武帝時徴北海太守詣行在所漢制車駕所在曰行在所蔡邕獨斷曰天子以四海為家故謂所在曰行在所漢書武帝紀徴詣行在所師古曰天子或在京師或出廵守不可豫言故言行在所耳梅福傳求假軺傳詣行在所東平王蒼傳乞詣行在所極陳至誠任彦昇詩中道遇心期王荆公詩心期自與衆人殊山谷詩少日心期轉謬悠又心期曉月秋霜又心期誠不淺代囘湖南胡提刑澥還節荆襄荆山名括地志云荆山在襄州又州名夏周為荆州秦為南郡即郢都之渚宫襄亦州名本楚之西津魏武置襄陽郡西魏改襄州因水立名宋升襄陽府按行湘楚說文湘水出零陵陽海山北入江從水相聲韻㑹至巴丘入於江又山名史記黄帝登熊湘楚國名周封熊繹於丹陽至熊逹僣稱王遷郢郢本名荆至成頵始改號楚父老迎歎見百年之故家叔姪交承侈一門之盛事按字書無侄字今人嫌姪字從女遂改從人不知姪字原為女設非男稱也潁川語小曰禮大夫不名世臣姪娣姪是妻之兄女娣是妻之妹左傳姪其從姑謂我姪者我謂之姑是也今謂兄弟之子為姪盖取字林音義作丈乙切呼之古史傳所未詳自唐至本朝諸書稍見之如狄仁傑諫武后曰姑姪與子母孰親猶指武姓人為姪也此字唯可施之書問以便俗呼或有著作不若稱兄子弟子從子族子之為雅也據此則姪止可施内兄弟之女不當施之男子改稱則可改字可乎又按顔延之曰伯叔有父名則兄弟之子不得稱姪從母有母名則姊妹之子不可言甥盖甥姪唯可施于姑舅耳雷次宗曰姪字有女明不及伯叔甥字有男見不及從母劉共父刋二程先生集改姪為猶子朱子謂古人固不稱兄弟之子為姪亦無言猶子者但云兄弟之子然從俗稱姪亦無害也但改從人為杜園蒼頡耳賢勞何憚聖眷方深恭惟某官擇乎中庸好是正直一經教子謟機寜觸於屏風韋賢傳遺子黄金滿籯不如一經陳萬年傳子咸以萬年任為郎抗直數言事刺譏近臣萬年嘗病召咸教戒于牀下語至夜半咸睡頭觸屏風萬年大怒欲杖之咸叩頭謝曰具曉所言大要教咸讇也按史言咸亷不如父而數賂陳湯求進則讇乃其素性何待教哉萬里隨翁直氣早鏘於門限東坡次韻子由使契丹見寄詩始憶庚寅降屈原旋㸔蠟鳳戲僧䖍隨翁萬里心如鐵此子何勞為買田公自注時猶子遲侍行限下簡切増韻閾也鏘當作蹡昌黎贈張籍詩云吾老懶讀書餘事不掛眼有兒雖甚憐教示不免簡君來好呼出踉蹡越門限言其少有直氣自踉蹡戸限時已然如此類非意㑹難觧忠無不報鄒陽傳忠無不報信不見疑孝可以移孝經君子之事親孝故忠可移于君何周道之馳驅忘漢闥之補拾汲黯傳出入禁闥拾遺補過天髙蜀道甫休捫歴之嗟地褊長沙又作囘旋之舞盖今褰帷之所竝見前自昔稅駕其間李斯傳物極則衰吾未知所稅駕也注稅駕猶觧駕言休息也張協賦停輿蕙渚稅駕蘭田嶺北長蛇無復元城之迎侍山海經大同之山有蛇名曰長蛇其毛如彘豪其音如鼓柝左傳吳為封豕長蛇以薦食上國宋劉安世字器之學者稱為元城先生宋史安世初除諌官未拜命入白母曰脫有觸忤禍譴立至若以母老辭當可免母曰得罪流放無問逺近吾當從汝所之遼東孤鶴足榮華表之歸來續搜神記遼東城門有華表柱忽有一鶴集徘徊空中言曰有鳥有鳥丁令威去家千嵗今來歸城郭如故人民非何不學仙去空伴冢纍纍遂上冲天某視螺川為近隣螺山在吉安府城北十里南臨贑江宛委如螺或云昔有漁人逰此忽遇風雨見神螺光彩五色取而懐之至山下渉水螺失所在俗呼為螺子山螺湖繞府城西北而東流入贑江郡名螺川以此恍䕫門之逺别殘燈翳復吐寜有可借之光東坡詩念此坐達晨殘燈翳復吐又清風來無邉明月翳復吐按翳復止字本杜詩初日翳復吐坡詩兩用之可人期不來徒抱相違之恨陳後山詩書當快意讀易盡客有可人期不來又俗子推不去可人費招呼滿期召璽猶可盍簮易豫九四由豫大有得勿疑朋盍簮代囘江西李提刑珏予環將漕持斧按刑見前一道三司公殆踐敡之徧宋江西路轉運司治隆興即今南昌提刑司治贑州提舉司治撫州兼旬竝命上應簡注之深前賀方馳後緘押至息夫躬傳羽檄重跡而押至文潁曰押音狎習之狎師古曰押至言相因而至也恭惟某官鎮浮雅量撥劇長材南史臧盾傳盾為人敏瞻有風力長于撥劇職事甚理左馮翊右扶風居多善政漢書地理志注左馮翊故秦内史髙帝元年屬塞國更名河上郡九年罷復為内史武帝建元六年分為左内史太初元年更為左馮翊右扶風故秦内史髙帝元年屬雍國二年更為中地郡九年罷復為内史太初元年更名主爵都尉為右扶風朝天津夕西極未究逺猷離騷經朝發軔於天津兮夕余至乎西極天津即析水之津在箕斗之間日月五星於此徃來故謂之津西極日所入也當邉隅講觧之餘觧舉蟹切說文判也從刀判牛角廣韻講也說也項籍傳業已講觧有溪洞猖披之醜猖蚩良切狂也通作昌揚雄傳先零昌狂韻㑹披猖縦裂貌離騷經何桀紂之昌披兮夫唯㨗徑以窘歩見大夫無可使者見形甸切漢書王嘉傳前蘇令發欲遣大夫使逐問狀時見大夫無可使者召盩厔令尹逢拜為諌議大夫遣之師古曰謂見在大夫皆不堪為使也申屠嘉傳以髙帝時大臣餘見無可者乃以御史大夫嘉為丞相師古曰見謂見在之人明天子選而用之韓文送陸歙州詩序宰臣之所薦聞天子之所選用知效一官笑他人之劫劫莊子知效一官行比一鄉徳合一君而徴一國劫訖業切說文人欲去以力脅止曰劫從力去㑹意韓文人皆劫劫我獨有餘身兼數器覺餘刃之恢恢見前民為上所不為本原何在左傳上之所為民之歸也上所不為而民或為之是以加刑罸焉而莫敢不懲若上之所為而民亦為之乃其所也我徃㓂亦能徃保障奚先左傳我能徃㓂亦能徃不如伐庸詳見前願繼周使臣之光華豈徒漢刺史之風采黄覇傳風采不及丙魏于定國某見賢思渴得報忘饑不觧世俗書謾瓊瑶之效報韓文石鼎聯句詩序吾不觧世俗書子為我書實為天下賀願金玉之盡珍韓文其以吾所稱為天下賀代囘湖南胡憲澥老形已具乆自分於投簮陳後山詩老形已具臂膝痛春事無多櫻笋來左思詩躇蹰足力煩聊與投吾簮成命莫囘猶㒺功而曵履曄然下問厚甚髙情恭惟某官政為吏師薛宣傳贊所在而治為世吏師行有家法後漢徐防傳不修家法左雄傳諸生試家法注儒有一家之學故稱家儒林傳各以家法教授山谷詩小謝有家法皇華原隰之上乆職咨諏清切雨露之邉合班獻納顧令衰白亦復佩蒼得非隣壁之光宻借榮河之潤某負二宜去已三上章行或使之即返屠羊之肆竝見前願有復也遥瞻囘鴈之峰回鴈峯在衡陽之南鴈至衡陽不過遇春而囘或曰峰勢如鴈之囘故名徐靈期云南嶽周迴八百里囘鴈為首嶽麓為足唐杜荀鶴詩猿到夜深啼嶽麓鴈知春信别衡陽元㣲之詩迴鴈峯前鴈春迴却盡迴代囘成都林憲潔已畫㦸疇庸繡衣疏寵田里之無愁歎歴試懋哉原隰之有光華載驅榮甚竝見前恭惟某官人門具羙摭言崔仁師之孫湜􅎵等昆仲數人文翰列官清要每私宴之際自比王謝之家謂人曰吾之門人及出身官之未嘗不為第一丈夫當先擬要路以制人豈能黙黙受制于人天分仍髙分去聲分劑限量也晉書謝道韞傳嘗譏謝𤣥學植不進曰為塵務經心為天分有限耶我搴時流窘邉幅者多矣馬援傳修餙邉幅注若布帛修餙其邉幅也唐書駱賔王傳張九齡文如輕縑素練實濟時用而窘邉幅公抱國器願繰藉以須之繰子皎切亦作繅藉慈夜切周禮典瑞繅藉五采五就以朝日注繅五采文所以薦玉木為中幹用韋衣而畫之就成也五就五匝也又大行人上公之禮執桓圭九寸繅藉九寸注繅藉以五采韋衣板若奠玉則以藉之左傳磨厲以須乆於典州新唐書韋嗣立傳唐休璟請選臺閣賢者分典大州方此將指川合東西而瞻使豈不足歟竝見前王置左右而輔台恐不免耳謝安傳安妻劉倓妹也既見家門冨貴而安獨静退乃謂曰丈夫不如此也安掩鼻曰恐不免耳既均牡轡詩六轡既均注均調也益煥龍光詩既見君子為龍為光注龍寵也為寵為光言天子㤙澤光耀被及已也某年以衰侵心為形役歸去來辭既自以心為形役奚惆悵而獨悲已屢章而告老兆足以行望三節之鼎來每懷靡及禮記凡君召以三節二節以走一節以趨注使使召臣急則持二緩則持一詩駪駪征夫每懐靡及注駪駪衆多之貌征夫行人也使臣之行必有上介衆介衆行夫既受君命當速行每人懐其私相稽留則於事將無所及代囘江東葉憲簣骯髒雲司將謀退而飲山綠髒子朗切趙壹傳伊優比堂上抗髒倚門邉注伊優屈曲侫媚之貌抗髒髙亢悻直之貌侫媚者見親故升堂婞直者見棄故倚門裴復除制俾踐白雲司以黄帝時秋官為白雲也東坡詩吳儂生長湖山曲呼吸湖光飲山綠便蕃天寵使無功而佩水蒼左傳便蕃左右亦是率從詩何天之龍注龍當作寵榮名之謂負荷天之榮寵禮記天子佩白玉公矦佩山𤣥玉大夫佩水蒼玉晉公卿禮秩曰許進佩水蒼玉尚書令僕射中書監令皆佩水蒼玉徒嘖人言嘖音簀争言貌左傳嘖有煩言誰侜子美侜音周說文有廱蔽也詩誰侜子羙心焉忉忉注侜張誑也誰誰䜛人也汝衆䜛人誰侜張欺誑我所羙之人乎恭惟某官好是正直見前多所平反反音幡雋不疑傳多所平反詳見前江以東之瘡痍各安饘粥饘音㫋說文麋也檀弓注疏厚曰饘希曰粥斗維北之㗋舌難挹酒漿詩維北有斗不可以挹酒漿李固傳斗為天㗋舌尚書亦陛下之㗋舌猶贈以言見前欲華其老東坡答丁連州啓過情之譽知無其實而愧于中起廢之文猶借此言以華其老然總持衆職而相望恐難備百工之所為某鳩僝非長竝見前狐疑已决文帝紀朕狐疑皆止朕師古曰狐之為獸其性多疑每渡冰河且聴且渡故言疑者而稱狐疑酈善長水經注狐性多疑故俗有狐疑之說薦尚書不煩以政終非孔戣之宜昌黎論孔戣致仕狀左丞政事亦極清簡若戣尚以繁要為辭自可别授秩崇而務少者又孔戣墓誌吾負二宜去尚奚顧子言白丞相去歸其鄉當希踈廣之老疏廣傳父子相隨出闗歸老故鄉以壽命終不亦善乎代囘江西李憲珏按宋史何異傳異嘉定元年召為刑部侍郎明年權工部尚書告老與此啓合前後諸啓皆代異所作異别號月湖制五刑以即天已慙占筆禮記凡制五刑必即天論注制立也即就也必即天論言與天意合閔子曰古之道不即人心韓文丞渉筆占位署惟謹居四民而時地猥使代庖尚書司空掌邦土居四民時地利諒皆皇華之光宻有蔽芾之䕃見前恭惟某官徧持三節洊歴諸司方赤子之弄兵金堅蔓織龔遂傳陛下赤子盗弄陛下之兵于潢池中耳杜牧之字論天下幾里列郡幾所而自河以比蟠城數百金堅蔓織角奔為㓂何吾人之顦顇天時之不利則將與其朋伍羅絡郡國將駭亂吾民于掌肱之上耳賴繡衣之持斧風動草披司馬相如傳風之所被罔不披靡仁逺及於一㕓官躐升于八座某水焉得北杜詩愁邉有江水焉得北之朝日已薄西揚雄傳臨汨羅而自殞兮恐日薄於西山總余轡于扶桑安知飭化離騷經飲余馬於咸池兮總余轡乎扶桑周禮以九職任萬民五曰百工飭化八材興事造業謂之工致力攻治謂之飭因形移易謂之化八材則珠象玉石木金革羽也珠曰切象曰磋玉曰琢石曰磨木曰刻金曰鏤革曰剝羽曰折集王事于苞栩願見勞還見前代囘廣西郭提刑斌隨軺而薦栢酒逺莫致之崔寔四民月令元日進椒栢酒椒是玉衡星精服之令人身輕能走栢是仙藥得書而已麥秋報之何以禮記孟夏之月靡草死麥秋至蔡邕月令章句曰百榖各以其初生為春熟為秋故麥以孟夏為秋梁書昭明太子傳首夏司開麥秋紀節杜詩麥秋晨氣潤槐夏午風凉山谷詩黄雲見麥秋又汾上午雲初麥秋張衡四愁詩何以報之英瓊瑶恭惟某官馳心拱北將指宅南見前漢節梅花已弄青黄之實杜詩漢節梅花外春城海水邉山谷詩嵗月坐成晩煙雨青已黄魏鶴山梅詩絶憐玉雪倚横參又愛青黄弄煙日周原苞栩既成蒼翠之隂王昌齡詩槁葉零落盡空柯蒼翠殘杜詩郊扉及我私我圃日蒼翠諒惟平秩之功尚書寅賔出日平秩東作如在始和之吉周禮正月之吉始和布治於邦國都鄙疏吉謂朔日也某雲司玩嵗左傳主民翫嵗而愒日其與幾何水部媮閑杜氏通典水部郎中周禮夏官司險盖其職也魏尚書有水部郎歴代或置或否後魏北齊有水部屬都官尚書後周有司水大夫隋初為水部侍郎屬工部唐改司川大夫天寳中改水部為司水閑當作閒曲禮少閒願有復也注疏謂清閒也居閑切俗作閑非山谷詩九衢塵裏偷閒三月不違仁勞飛鴻之逺到五嶺皆炎熱願秣馬以遄歸竝見前代囘利路鮮于提刑申之虎符遲次龍節載驅禮樂逺而光華遐心何有竝見前師旅因之饑饉敏手是資山谷詩敏手擘泰華恭惟某官籍甚人門見前曄然地望北史公孫表傳鴈門李氏地望懸隔吏民相吿方懐季子之章朱買臣傳懐其印綬歩歸郡邸守邸恠之視其印㑹稽太守章也史記蘇秦傳佩六國相印譙周曰蘇秦字季子郡縣未澄宜攬孟博之轡見前劍閣今為平地陸暢詩蜀道易易于履平地鮮于世號福星四朝國史哲宗念東國困于役復以鮮于侁為京東轉運使司馬光曰福星徃矣安得如侁百軰布列天下乎東坡詩我懐元祐初珪璋滿清班維時南隆老奉使獨未還迂叟向我言青齊嵗方艱斯人乃福星遣出虗危間南隆閬中也侁閬中人迂叟光自號互見前公有埋輪之心民何懸釡之慮史記趙世家城中懸釡而炊易子而食功徳如此祥祉如此其善持之韓文禄位富貴人之所大欲也得之難未若持之之難也得之于功或失于徳得之于身或失于子孫今夫功徳如是祥祉如是其善持之也可知已刑獄幾何錢榖幾何行且召矣某老而浪出杜詩龎公不浪出蘓氏今有之冗未汰歸五雉為工徒積汗顔之媿四牡勞使願收直指之功竝見前代囘江西陳提刑天宜宜抄本作誼詳啓意盖以南雄太守改廣東提刑轉江西提刑自天申命易地詳刑見前南海之陬既濡無復跕鳶之困韓文南海神廟碑海嶺之陬既足既濡跕的協切跕跕墮落也馬援傳飛鳶跕跕墮水中注鳶鴟也跕跕墮貌也跕音都牒泰牒二反西江之水方涸更為活鮒之謀見前恭惟某官奥學名家通才資世恢乎餘刃孰嬰紫電之鋒三國典畧蕭淵明與王僧辯書霜戈電㦸無非武庫之兵龍甲犀渠皆是雲臺之仗王勃滕王閣序紫電青霜王將軍之武庫唐中宗授張錫尚書制白虹良寳紫電神鋒互見前飛不盡翰斜取青雲之勢韓文不長其年飛不盡翰劉禹錫詩青雲直上無多路却作斜飛取勢囘互見前頃分半竹文帝紀初與郡守為竹使符注竹使符皆以竹箭五枚長五寸䥴刻篆書第一至第五各分其半右留京師左以與之惠滿三楓方輿韶州記曰曲江縣修仁水西南注連水北有三楓亭五渡水齊范雲為始興太守至修仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲修仁水不挹背邪流尋專刺舉之六條迄用澄清於五管廣桂邕容安南為五管皆𨽻嶺南節度使詳别見惟是畫冠之化漢書刑法志盖聞有虞氏之時畫衣冠異章服以為戮而民弗犯尚書大傳唐虞象刑犯墨者蒙巾帛犯劓者赭其衣犯臏者蒙其臏犯大辟者衣無領晉書刑法志犯黥者帛其巾犯劓者丹其服犯臏者墨其體犯宫者雜其屨大辟之罪殊死之極布其衣裾而無緣領未孚珥筆之民山谷江西道院賦江西之俗士大夫多秀而文其細民險而健以終訟為能由是玉石俱焚名曰珥筆之民欲銷赤子之弄兵必假繡衣之持斧竝見前周爰咨度行將勞星駕之還詩星言夙駕詩序出車以勞還逺有光華况接日畿之近某濫兹聨事幸甚依仁所望使者之車疾驅沃轡詩六轡沃若庶假忠焉之誨叶濟疲甿代囘廣東潘提刑涓分符奏最持節詳刑見前田里之無歎愁選諸所表歎音灘他丹切又他干切大息也循吏傳序二千石有理效輙以璽書勉厲增秩賜金或爵至闗内矦公卿缺則選諸所表以次用之師古曰所表謂増秩賜金爵也原隰之周咨度逺乃有光見前恭推某官器宇浚明風猷膚碩頃儀六館實倡諸儒竝見前玉石一區時方負隴西之媿淄澠異味何至空冀北之群水經淄水出泰山萊蕪縣原山澠水出營丘城東淮南子淄澠之水合易牙嘗而知之迄著顯庸蔚為循吏敘傳蔚為辭宗師古曰蔚文采盛也音欎任昉王文憲集序蔚為帝師一麾出守方幸同寅六轡載馳復聞後甲片言可折必能體欽恤之心五嶺皆炎正足展澄清之志星言夙駕天不違顔某十國為連竝見前再鼓愈淡韓詩有琴具徽絃再鼓聽愈淡落霞孤鶩不能奪蓴菜之思尺素雙魚願無廢梅花之寄竝見前代囘江東葉憲簣斜日投閒冐誤㤙而入侍梁元帝詩東方曉星沒西山晩日斜韓文投閒置散乃分之宜蔡謨傳昔階繆㤙蒙忝非據東坡集蒙先帝之誤㤙權寘三館又計此誤㤙必難安處朶雲借潤儷好語以相先李賀詩沙路歸來聞好語東坡詩山寺歸來聞好語野花啼鳥亦欣然又輦路歸來聞好語共驚堯顙似髙辛有味其言鄭當時傳誠有味其言也不知所報左傳臣不任受怨君亦不任受徳無怨無徳不知所報恭惟某官恢然抱負久矣踐敡榮分刺史之符勇襆郎官之被魏舒傳時欲沙汰郎官非其才者罷之舒曰吾即其人也襆被而出甫陞華於卿月又趣駕於使星見前簸弄明珠自是驚人之質韓詩婆娑海水南簸弄明月珠追隨瑣闥㑹歸宻地之班杜詩曉漏追隨青鎖闥晴牕檢㸃白雲篇某起家一寒去國十暑見前頭顱如此難遮西崦之光隂崦音淹崦嵫山名山海經鳥䑕同穴西南曰崦嵫下有虞泉日所入離騷經吾令羲和弭節兮望崦嵫而勿廹淮南子日入崦嵫經於細栁入虞淵之地曙于濛谷之浦日西垂景在樹端謂之桑榆張九齡詩眇眇惜光隂韓詩士女競光隂山谷詩歌舞送光隂餘見前膂力既愆又踏東華之塵土尚書番番良士旅力既愆東坡詩軟紅猶戀屬車塵公自注戲語有西湖風月不如東華軟紅香土又東華塵土北忩風注東華門百官入朝所從出入之門㑹且歸矣詩㑹且歸矣無庶予子憎焉用文之左傳介子推曰言身之文也身將隐焉用文之是求顯也代囘曹提刑叔逺顯奏郡庸肅將使指凝香畫㦸政成數月之間直指繡衣象應一星之入竝見前用賢如此載路驩然詩厥聲載路沈休文碑威令首塗仁風載路恭惟某官天韻崇谹風猷峻潔三年博士推韓愈之見治治音持進學觧三年博士冗不見治治理也六館諸生留陽城而不果新唐書卓行傳陽城出為道州刺史太學諸生何蕃等三百人頓首闕下請留城為吏遮抑不得上既行皆涕泣立石紀徳徘徊南浦楚辭望羙人兮南浦王勃詩畫棟朝飛南浦雲檢校東屯東屯杜少陵故宅在䕫州少陵有自瀼西移居東屯及檢校收稻等詩詳見前却念枳城實産伊川之易漢書地理志巴郡枳如淳曰音徙或音抵師古曰音之爾反方輿勝覧涪州春秋為巴國地秦置巴郡在西漢領縣十一東漢領縣十四而涪陵與枳縣居其二蜀先主以其地控巴江之源因於此立涪陵郡領漢平漢葭縣晉以涪郡理枳縣地宋齊竝屬涪陵及巴郡後周於故枳城立涪陵一統志枳城在今重慶府北一百一十五里晉桓温伐蜀移枳縣於隣溪此城遂廢按枳通作軹枳城有數處大事記顯王十一年韓使計息以枳道易鹿於魏水經注年表赧王三十六年秦伐魏至軹取城大小六十一皆魏之軹也蘇秦傳秦下軹道則南陽危又云我下軹道南陽封冀亦指此其言秦者在雍州萬年縣東北去㶚水百歩軹道亭秦王降處也蘇代所謂楚得枳而國亡則巴郡之枳也伊川先生年譜紹聖四年十一月送涪州編管元符二年正月易傳成而序之三年正月徽宗即位移峽州尹和靖語錄先生自涪陵歸易傳已成是易傳涪州所著也方輿勝覧鈎深堂在涪州北巖紹聖丁丑伊川謫居於涪即普浄院闢堂著易閱再嵗而成元符庚辰徙夷陵㑹太史黄公自涪移戎過其堂因榜曰鈎深因尋涪水欲昌山谷之詩宋史黄庭堅傳章惇蔡卞與其黨論實錄多誣摘問前史官庭堅皆直辭以對貶涪州别駕黔州安置自號涪翁與秦太虚書曰某屏棄不毛之鄉以禦魑魅耳目昬塞舊學廢忘是黔中一老農耳韓文貞曜先生墓誌銘維卒不施以昌其詩注蘓子瞻嘗舉此以問王定國當昌其身耶昌其詩也來詩下語不契作詩答之有云昌身如飽腹飽盡還復饑昌詩如膏靣為人作容姿不如昌其氣鬰鬰老不衰雖云老不衰却懐安所之不如昌其志志一氣自隨飬之塞天地孟軻不吾欺韓公謂東野昌其詩而東坡乃云不如昌其志盖蘇嘗讀東野詩有未足當韓豪之句不為所取也孔席未温曹裝又趣刑罸不中則無措自昔欽哉禮樂言逺而有光是在使者佇從四牡歸侍六飛竝見前某方襞賀緘襞必益切韻㑹摺疊衣也故禮注謂裙摺為襞積也已䝉謝牘我留綿谷正方深通漢之防綿水在廣漢郡綿州以綿水經其左故謂之左綿左思蜀都賦于東則有左綿巴中綿者綿歴也君把繡衣未可動思呉之興杜詩天隅把繡衣餘見前代囘新䕫路李提刑凝畫㦸之香久分漢竹杜詩幾分漢庭竹持繡衣之斧式憩甘棠燕賀厦之未能竝見前鴈寄書而何速蘇武傳天子射上林中得鴈足有係帛書杜詩一聲何處送書鴈恭惟某官氣鍾井絡秀出岷峨真難兄之弟難弟之兄竝見前信名父之子名子之父蕭育傳育以名父子著才能王述傳王導謂述曰名父之子不患無禄屈臨小縣自不宜耳詳見前人生五馬貴四出守而無嫌權門九牛毛屢掉頭而不顧乃今直指猶是斜飛竝見前持衡秉鈞此言何為至我董仲舒傳此言何為至于我哉明刑種徳所有更以贈君尚書臯陶邁種徳徳乃降山谷詩君家所有更贈君某日既薄山雲猶出岫見前恵文柱後殆非佚老之謀莊子大塊載我以形勞我以生佚我以老息我以死神武門中行進乞身之請南史陶𢎞景傳永明十年脫朝服挂神武門上表辭禄詔許之囘方提刑信孺以下代衛帥宋史方信孺字孚若興化軍人有雋才未冠能文周必大楊萬里見而異之以父崧卿䕃補番禺尉時韓侂胄開邉釁諸將潰軍朝廷尋悔金人亦厭兵無能得其要領近臣薦信孺可使自蕭山丞召赴都命以使事自春至秋使金三徃返以口舌折强敵金人計屈情見㑹蜀兵取散闗金人益疑信孺還言敵所欲五事舉其四其一不言侂胄厲聲詰之信孺徐曰欲得太師頭耳侂胄大怒奪三秩臨江軍居住已而王倫孫柟出使定和議増幣函首皆信孺所持不可者柟白廟堂信孺辯折敵酋於彊愎未易告語之時信孺當其難柟當其易柟每見金人必問信孺安在公論所推雖敵人不能掩也乃召信孺自便尋知韶州累遷淮東轉運判官兼提刑知真州觀風嶺外公逺有於光華見前易地江湄我但慙於玩愒湄旻悲切說文水草交為湄釋名湄眉也臨水如眉許渾詩秦樓心斷楚江湄東坡詩弭節江之湄王介甫詩出戲清江湄鼎來下問益仞髙情東坡集仰仞至㤙益堅素守鼎益卦名恭惟某官學與古稽羙全世濟信孺從祖廷實政和間進士父崧卿隆興初進士皆有名於時江濤如此誰知戮力於神州謝安傳嘗與孫綽等泛海風起浪湧諸人竝懼安吟嘯自若舟人以安為悦猶去不止安徐曰如此將安歸王𨗳傳當共戮力王室尅復神州詳見前人物𦕈然士頗傾心於執事王逸少帖蔡公遂委篤深可憂當今人物𦕈然而艱疾若此令人短氣山谷詩人物方𦕈然誰能委珪幣又人物于今眇然久於直指無乃斜飛見前然小大之獄既得其情禮記必察小大之比以成之注小大猶輕重則澄清之志亦足以展風雲之㑹後漢書感㑹風雲奮其智勇朝夕以須左傳磨厲以須某分閫何功投林是幸袁閎傳散髪絶世投迹深林叔夜不便於書疏遂緩報章稽康與山濤絶交書素不便書不喜作書而人間多事堆案盈几不相酬答則犯教傷義莊周無索其形骸尚祈終恵荘子今子與我遊於形骸之内而子索我於形骸之外不亦過乎注形骸外矣其徳内也今子與我徳遊耳非與我形交而索我外好豈不過哉囘方提刑信孺報政九嶷說文九嶷山虞舜所𦵏在零陵營道從山疑聲九峰相似可疑也通作疑武帝紀望祀虞舜于九疑文潁曰山半在蒼梧半在零陵楚詞九疑紛兮為三十三小洞天方輿勝覧九疑山在道州寜逺縣南六十里有九峰峰各有一水四水流灌于南海五水北注合為洞庭其一曰朱明峰其下湘水源二曰石城峰其下沲水源女冠魯妙典所居元結登九疑第二峰詩九疑第二峰其上有仙壇松杉映飛泉蒼蒼在雲端何人居此處云是魯女冠不知幾百年晏坐餌金丹相傳羽化時鸞鶴滿峯巒婦中有髙人相望空長歎三曰石樓峯其下巢水源四曰娥皇峰其下池水源五曰舜源峰其下瀑水源亦曰華盖此峯最髙六曰女英峰其下砅水源七曰簫韶峯其下渀水源八曰桂林峯其下洑水源九曰梓林峯其下湎水源元結詩九疑山深幾千里峰谷﨑嶇人不到韓愈詩吾聞九疑好夙志今欲伸戴叔倫詩九疑深路遶山回木落天晴猿正哀觀風五嶺大庾始安臨賀桂陽掲陽為五嶺詳别見萬物吐氣正須結軰之賢少陵詩集覽道州元使君舂陵行兼賊退示官吏作二首志之曰當天子分憂之地效漢官良吏之目今盗賊未息知民疾苦得結軰十數公參錯天下為邦伯萬物吐氣天下少安可待矣六轡周咨何慮越人之瘠韓文若越人視秦人之肥瘠忽焉不加喜戚於其心恭惟某官風猷强濟業履浚明學禮之有異聞蚤駿萬夫之望駿通作峻髙也詩駿極於天繫辭君子知㣲知彰知柔知剛萬夫之望誦詩而能專對卒鳩二國之民鳩安也左傳君釋三國之圖以鳩其民又匄在此敢使魯無鳩乎晉語庶可以鑑而鳩趙宗乎九重念功尚書惟帝念功再命作牧周禮八命作牧九命作伯與夫田里之無歎息賀其見鳯之鳴韓文吾聞鳥有鳯者恒出於有道之國當漢時黄覇為潁川是鳥實集而鳴焉若史可信堅歸吾將賀其見鳯而聞其鳴也已何如原隰之有光華恵爾跕鳶之外星言雙節山鎮百城刑獄幾何錢榖幾何不嫌纍印竝見前功徳如是祥祉如是佇即予環韓文今夫功徳如是祥祉如是其善持之也可知已餘見前某方欲修辭遽勤委重雙魚尺素何敢言衛公綠竹之詩詩序淇澳羙衛公之徳也有文章又能聴其規諌以禮自防故能入相於周美而作是詩也兩驂四黄請繼方叔葱珩之詠詩四黄既駕兩驂不猗不失其馳舍矢如破又方叔率止約軧錯衡八鸞瑲瑲服其命服朱芾斯皇有瑲䓤珩注言王乘四黄之馬既駕矣兩驂之馬不相依倚瑲珩聲也䓤蒼也三命葱珩言周室之强車服之羙也囘䕫路李提刑錫二年和義之郡粗護憩棠榮州唐天寳初改和義郡再命通徳之邦獲依仙李杜詩仙李盤根大不謂我入而公出昌黎祭張員外文觧手背面遂十一年君出我入如相避然生闊死休吞不復宣真成室邇而人遐詩東門之墠茹藘在阪其室則邇其人甚逺陳後山詩室邇人則逺燕黙勞者歌梁書阮孝緒傳任昉尋其兄履之欲造而不敢歎曰其室則邇其人則逺為名流所欽尚如此辱寄朶雲見前如對落月少陵夢李白詩落月滿屋梁猶疑照顔色恭惟某官負材鯁亮蓄徳鴻深雪檜霜松凛凛祖風之似公槐卿棘英英家學之傳四奏郡庸兩將使指巖巖漢沔帳下之甲多奔徃徃已渝舟中之指可掬董仲舒傳是王道徃徃而絶也揚雄傳徃徃離宫般以相燭兮注言所徃之處皆有之咸宣傳徃徃而羣無可奈何匈奴傳徃徃而聚者百有餘戎又精騎徃徃隨後去司馬遷傳詩書徃徃間出外戚傳壁帶徃徃為黄金釭西域傳徃徃為數國呉王濞傳徃徃而有注言處處皆有之西域傳巴渝注巴渝所謂賨人左傳晉中軍下軍争舟舟中之指可掬也去孔伋君誰與守見王導吾復何憂共歌四牡之有功竝見前行趣八鸞之入覲詩韓矦入覲以其介珪入覲于王八鸞鏘鏘不顯其光某獲通族譜新唐書張九齡傳張說為宰相親重之與通譜系常曰後出詞人之冠也新唐書羅紹威傳江東羅隱工為詩紹威厚幣遺之通譜系昭穆且託交盟勿勞乎勿誨乎尚希忠告同姓也同業也宜不遐遺易㤗九二包荒用溤河不遐遺朋亡得尚于中行餘見前四六標準卷二十五, SBCK: ''}
