  - {type: page-break, offset: 3, content: '', id: KR4d0323_SBCK_009-4a}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 屢令任使及􅀲而代詎希東閣之留繞木何依空結南枝之戀不圖裁鍳忽辱薦揚錐之處囊中初無見頴羅而致幕下欲使空羣重惟蟣蝨之官夐乏蚍蜉之援一齊衆楚豈能回莊岳之音九舜十堯不敢望隆冬之榖知賢而舉惟断乃成縱􅀉牋閶闔之風未知利鈍然銘心泰華之石豈易銷磨伏遇某官四海真儒三朝舊弼文章有再見武公之賢招選無遺一洗將軍之陋自元戎十乗之啟至長沙千里之平苟有寸長悉入大鈞之播不遺餘力復收小子之狂欲令奔走於顔行力借吹噓而送上萬一所請或不見却㝷常之恩豈可並言某敢不銘佩異知激昂晚節將母來諗身雖未可以許人懐德惟寕士固必伸於知己代盧尉仲雋謝諸司辟知資興縣箠楚塵埃之徼福偶幸代更繭絲保障之謀人猥勤特辟戴使天之私覆循材地以中慙惟義郴據楚之上流而資興號晉之古縣數百年瓦礫之迹猶有刼灰五六載鋒鏑之餘肇稱新邑俗多䑕嘯財欠鬼輸欲其賣劔以買牛相與抱孫而歌犢是在撫字之職宜得通練之材歷數部封何限囊中之頴豈期庸委遂蒙送上之嘘雖未占天問之果酬然敢不星言而夙駕伏念某起於寒逺持是空踈三年飲墜露於湘濵一念繞落霞於滕閣下車攘臂敢嬰搏虎之嘲學道愛人難奉割雞之笑不虞製錦輙使代庖此蓋伏遇某官大鈞無垠小善必録耻納溝不被其澤欲惠逺黔出推轂有味之言不遺寒素或者封囊之露許還假印之真借以聲光寛其轡䇿某敢不力摩凋俗盡布教條不鄙夷其民當使鳥言夷靣之俗事慈惠之帥如在熊旂金節之前舉自代謝李侍郎􅐉舉自代玉堂圖舊趣四軰以來宣寳閣冠班舉匹夫而爲代止流言於智者發􅐹記而信然感固感於相知慙則慙於不稱竊以伯禹固遜于后稷曷甞稽首于殳斨宣尼謂不如顔淵何與及肩之子貢蓋惟善能舉其類然擬人必以其倫未聞取原隰馳驅之夫謂可備軒墀供奉之數鳯􅀆巢閣方將揚覧德之輝馬也守閭正恐累知人之鍳伏念某嶔﨑萬狀拓落一官器窳識凡安能超卓學荒術陋何有深醇當先皇之末年教胄子者數月一鳴輙斥剌天不羡於羣飛四國于宣見雪幸逃於衆吠十暑貫岷山之葛一寒仍范叔之袍乏四騏四駱之咨諏端方烏有無一鶴一􅀛之風采登按何功豈謂我家侍郎之賢曲念吾宗孫子之老惟學士學先王之道况敷文敷國典之華两命以起知章足爲光寵一字之拔叔夜却恐麄踈德不待於成身士固伸於知己此蓋伏遇某官四朝元老一世真儒奉命任危難之間固國還封疆之界南人不復反矣東山以公歸􅀆然神旗㦸纛既乆長於魏師則光禄金紫當即封於晉國走卒知司馬頋今領嵩陽崇福之宫胡兒問大蘇亦知起元祐眉山之學宜煩泥檢來趣脂車幸舎人之治裝副天子之虛佇帝乃誕敷文德正藉臣鄰王惟圖任舊人遹登丞弼藉令念小草之有逺志何至引老芋而替伏神某敢不衘佩異知磨礲晚節集賢以待侍讀固使臣不敢與聞征夫豈不懐歸願君子惟能通志代回董惠州居􅁩謝舉自代咨垂共工自當申稽首之遜舉康自代得無笑炙背之䟽衘䄂惠然開緘愧甚恭惟某官有致逺之器無欲速之心屢薦不入官姑取一麾而去三宿而出晝無勤千里之追難進易退我不如見賢不薦誰當耻聊復尔耳止或尼之某欲爲王留徒得君重得隴望蜀戯已驗於前言召鄒延枚客正觀於末至代回倪告院千里謝舉自代禀令推賢得公爲重袖箋委貺陳義甚髙文則其文謝非所謝恭惟某官學有源本行無瑕疵委蛇結緑之珍是宜廟序騰踏飛黄之駿而伏塩車使在論思献納之班必有輔賛弥縫之益某濫持荷槖謬厠李官守正奉公實不如於戴胄明刑弼教義當遜於臯陶不謂髙情猶勤私謝惠而好我皆藹如仁義之言更以贈君願力蹈中庸之正宣賜賀黄制置伯固賜金帶分閫疇庸錫鞶䟽寵三品百鍊焜煌内府之朌萬釘九環褒表中權之勁不勤使請弥覺道存恭惟某官追琢其相柔惠以直言忠信行篤敬學素得於}
