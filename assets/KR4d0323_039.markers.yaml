  - {type: line-break, offset: 0, content: '', id: KR4d0323_WYG_039-1a01}
  - {type: variant, offset: 0, length: 972, content: 欽定四庫全書四六標準巻三十九宋李劉撰賀正賀嗣秀王師揆宋孝宗繼統封秀王子孫為嗣秀王斗攜龍角又頒羲仲之春史記天官書杓攜龍角注杓北斗杓也龍角東方宿也攜連也正義曰按角星為天闗其間天門其内天庭黄道所經七曜所行左角為理主刑其南為太陽道右角為將主兵其北為太隂道也頒通作班崔駰傳强起班春注班布春令尚書分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春孔傳羲仲居治東方之官雪滿兎園請賦梁王之夀謝恵連雪賦嵗將暮時既昏寒風積愁雲繁梁王不恱逰於兎園俄而㣲霰零宻雪下王乃歌北風於衛詩詠南山於周雅授簡於司馬大夫曰抽子秘思騁子妍辭侔色揣稱為寡人賦之恭惟某王宗藩明徳詩大宗維翰价人維藩史記楚元王世家為漢宗藩潘朂册魏公九錫文先王並建明徳胙之以土分之以民崇其寵章備其禮物所以藩衛王室左右厥世也左傳選建明徳以藩屏周故周公相王室以尹天下于周為睦政路崇班蘇烱制鳥臺峻秩朢總鐵冠蒼佩崇班威髙石室襲慶璿源黙應璿璣之運璿亦作璇說文美玉也宋宗室有璇源分派字號宗正有四書曰玉牒曰仙源積慶圖曰宗藩慶系録曰宗支屬籍顔延年詩玉水記方流璇源載圓折尚書在璿璣玉衡以齊七政寳分玉帶益調玉燭之和尚書分寳玉於伯叔之國通鑑唐𤣥宗從複道中見衛士棄餘食寧王憲從容諫釋之是日上宴飲極歡自解紅玉帶賜憲第九巻有代回嗣秀王師揆賀賜玉帶啟爾雅四時和謂之玉燭注道光照也疏道言也言四時和氣温潤明照故曰玉燭李巡云人君徳美如玉而明若燭束晳詩玉燭陽明顯猷翼翼宜從桃葦之辰沈約宋書舊時嵗朔常設葦莢桃梗磔鷄子宫及百寺之門以禳惡氣梁尚書宗懍荆楚嵗時記正月一日造桃板著户謂之仙木注桃鬼所畏畫作人首可以有所收縳不死之祥又桃者五行之精能制百鬼謂之仙木括地圖曰桃都山有大桃樹下有二神一名欝一名壘執葦索以伺不祥之鬼得即殺之應劭風俗通云黄帝書稱上古有神荼欝壘兄弟二人在度朔山桃樹下簡百鬼鬼妄搰人援以葦索執以食虎于是縣官以臘除夕飾桃人垂葦索畫虎于門效前事也丕介椿松之祉介助也詩介以繁祉栁文永介丕祉莊子上古有大椿者以八千嵗為春八千嵗為秋而彭祖乃今以乆特聞衆人匹之不亦悲乎詩秩秩斯干幽幽南山如竹苞矣如松茂矣某愧無善頌禮記君子謂之善頌善禱疏頌者美盛徳之形容禱者求福以自輔也張老因美而譏之故為善頌文子聞過即服而拜故為善禱也可賀履端左傳履端于始王燭寳典正月為端月臧榮緒晉書熊逺議曰履端元日正始之初有識之士於是觀禮樂榮耳目之觀崇玩㺯之好晉荀朂正大㑹行禮歌詩曰於皇元首羣, SBCK: ''}
