  - {type: variant, offset: 17965, length: 260, content: 晉懐帝紀步出西掖門至銅駝街載記咸寧二年石季龍使牙將張彌徙洛陽銅駝于鄴索靖傳靖有先識逺量知天下將亂指洛陽宫門銅駝歎曰㑹見汝在荆棘中耳陳書徐陵傳盧龍之徑于彼新開銅駝之街於我長閉陸機洛陽記洛陽有銅駝街漢鑄銅駝二枚在宫南四㑹道相對俚語云金馬門外聚羣賢銅駝陌上集少年顔師古曰亦云銅駝街在洛陽西京無也華延雋洛陽記兩銅駝在宫之南街東西相向高九尺洛陽謂之銅駝陌劉夢得詩籍通金馬門身在銅駝陌栁子厚詩玉漏天門靜銅駝御路荒東坡詩銅駝陌上㑹相見握手一笑三千年嚴陵瀨即七里灘在桐廬縣西即子陵垂釣處諺云有風七里無風七十里謝靈運詩目睹嚴子瀨想屬任公釣, SBCK: ''}
