body:
  text: 四六標準卷九宋李劉撰謝辟置文獻通考徐氏曰公府辟命自西京則然東漢之世公卿尤以辟士相髙卓茂習詩禮為通儒而辟丞相府蔡雍博學好詞章而辟司徒橋元府周舉博學洽聞為儒者宗而辟司徒李郃府又有五府俱辟如黃瓊者四府並命如陳紀者往往名公巨卿以致賢才為髙而英才俊士以得所依乘為重一洗末世茍合輕就之風矣宋周輝清波雜志云建炎兵興日帥臣許辟置幕屬既素為知己其於婉畫禆助良多今惟四川制帥如故事他皆命於朝賓主邈不通情殆與郡縣官等閫寄兵謀無從咨訪川泳雲飛豈復有相得之樂緩急利害既不相及相忘於江湖宜也再辟制幹入蜀謝丞相遮曰而走長安幾穿破履杜牧詩惆悵江湖釣竿手却遮西日向長安莊子衣敝履穿史記東郭先生待詔公車貧困飢寒衣破履不完杜詩頻遊任履穿又履穿四明雪山谷詩寧穿東郭履不遺子公書登天而攀蜀道忽得舊氊知坱圠之無垠並見前難趦趄而不進韻會趦趄趨不進貌通作咨且易臀無膚其行次且王肅云行止之礙張載銘一人荷戟萬夫趦趄輒修贄見併吐謝𠂻伏念某骯髒亡奇雎盱有志一科不補墮身溝瀆之尋常萬物皆塵妄意簡編之尺寸並見前繇頃年之從辟抵中道而遭艱跨海涉湖痛猶未定韓文如痛定之人思當痛之時不知何能自處也捫參歷井夢不敢尋六國張敏與髙惠為友每相思不能相見便于夢中相尋王昌齡詩曉夕雙帆歸鄂渚愁將孤月夢中尋東坡詩夢尋西南路故因祥除甘就部闕適干西清之衆論許為東閣而一言遂令索米之人並見前或動乞漿之興袁子正書太嵗在酉乞漿得酒鬻璞而售乾璞誰適為容應邵傳昔鄭人以乾鼠為璞鬻之于周宋愚夫亦寶燕石緹緁十重夫覩之者掩口盧胡而笑翹材以待大材非汝所及西京雜記平津侯開東閣營客館以招天下賢材次曰翹材館以待大材詳見前猶見益州之元德尚思吳下之阿蒙羅而致之兆足行矣並見前幾葬魚腹固嘗回孝子之車史記屈原傳寧赴常流而葬乎江魚腹中耳韓詩魚腹甘所葬又過羊腸益合叱忠臣之馭魏武苦寒行羊腸坂詰曲車輪為之摧晉太康地記常山曲陽有恆山坂號飛狐口上壺關縣有羊腸坂史記羊腸之西正義云大行山坂道名南屬懷州北屬澤州劉向新序趙簡子上羊腸之坂羣臣皆推車唐楊炯詩山路繞羊腸江城鎮魚腹宋鮑照詩淖坂既馬領磧路又羊腸陳江總詩三春别帝鄉五月度羊腸竊聞殿西之顧頗及雲南之師要是四蜀之可憂巴蜀黔漢為四蜀殆非一端而遽止雖托重固在詩書之帥見前然拔尤宜得文武之材韓文朝取一人焉拔其尤又將為天子得文武士于幕下置諸鄒枚之間李詩梁苑傾鄒枚韓詩卓犖傾鄒枚王摩詰詩侍從有鄒枚蓋有禕允之任見前豈應愚下可在選中劉孝綽啓寵先曲被獨在選中王裒傳選好事者令依鹿鳴之聲習而歌之時汜鄉侯何武選在歌中兹蓋伏遇某官身佩安危新唐書李晟傳贊提孤軍抗羣賊身佩安危而氣不少衰者徒以忠義感人故豪英樂為之死耳心存開濟杜詩百年開濟老臣心獨揮九日再為天地而立心見前八荒一雲復令山澤之通氣杜詩四海八荒同一雲繫辭天地定位山澤通氣疏艮兊象山澤山澤異體而通氣從政如彼其久樂不存焉當今舍我其誰聖之任也粵從更化董仲舒傳為政而不行甚者必變而更化之乃可理也當更化不更化雖有大賢不能善治也專務調元班固傳降煙煴調元氣髙適詩獨立調元氣三階既平元首有股肱之喜尚書股肱起哉元首喜哉餘見前五部方擾中國無疥癬之憂疥音芥説文瘙也或作蚧癬音蘚説文乾痬也釋名徙也浸淫移徙後漢書鮮卑傳蔡雍議邉垂之患手足之蚧搔中國之困胸背之瘭疽餘見前然欲折千里之衝是必開衆正之路並見前得人朝廷得人幕下寧有重輕韓文相為天子得人于朝廷將為天子得文武士于幕下誠死城郭誠死封疆要加儲飬賈誼傳父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守禦扞敵之臣誠死城郭封疆故曰聖人有金城者此物此志也如有所試俾勉此行某敢不體認一陶攀緣九折並見前堪其事者謂之力藉莫酬相國之知韓文自百官已下欲以其業徹相國左右者多矣皆憚而莫之敢獨愈辱先索相國之知至矣凡適于用之謂才堪其事之謂力愈于二者雖日勉焉而不近不見斥以不肖幸矣其何敢敖于言乎遠而使之觀其忠詎敢作衆人之報莊子逺使之而觀其忠近使之而觀其敬煩使之而觀其能委之以財而觀其仁卒然問焉而觀其智急與之期而觀其信醉之以酒而觀其量雜之以處而觀其色臨之以危而觀其節謝董制置居誼辟充成都撫幹宋史寧宗嘉定七年三月以成都府路安撫使董居誼為四川制置使八年夏四月秦州人唐進與其徒何進等引衆十萬來歸居誼拒却之十年四月金人分兵圍棗陽光化軍詔四川制置使董居誼酌量緩急便宜行事十一年金人焚大散關破皂郊十二月正月召居誼詣行在以利路安撫聶子述代之二月金人犯洋州居誼自利州遁四月紅巾賊張福入利州聶子述遁殺總領楊九鼎居誼落職奪三官七月復奪居誼二官居誼帥蜀大失士心金人乘之宋師所至輒潰簿領抗塵自分湘濵之憔悴梁書朱異傳當局簿領咨詢詳斷伏挺傳簿領沉廢臺閣未理王瞻傳精神益朗不廢簿領劉孝綽傳美錦未可便製簿領亦宜稍習何敬容傳聰明識治勤于簿領又簿領文案不復經懷陳書黃法氍傳便書疏間明簿領北史司馬子如傳簿領之務豫奪任情北山移文抗塵容而走俗狀屈原漁父屈原既放遊于江潭行吟澤畔顔色憔悴帥幢辟屬許令蜀道之攀緣太白蜀道難黃鶴之飛尚不得過猿猱欲度愁攀緣初無待于懇祈便力為之振拔請裁四六少謝萬分詳見第一卷竊觀我宋帥蜀之臣無若前後趙張之懿漢書傳贊前有趙張後有三王此指趙抃張詠忠定之薦辟必方亷恬退之人宋史張詠字復之濮州人中進士第位至工部尚書諡忠定太宗朝知益州真宗朝以詠前在蜀治行優異復命知益州傳諭詠曰得卿在蜀臣無西顧之憂矣五朝名臣言行録轉運使黃觀好舉時才之士公勸曰舉人當舉好退者好退則亷謹知耻舉之志節愈堅少有敗事莫舉奔競者奔競則能曲事諂媚求人知已舉之必矜材好利纍及舉者其人既解奔競何必舉乎清獻之奏揚皆骨鯁敢言之士宋史趙抃字閲道衢州西安人舉進士事仁宗英宗神宗位至參政諡清獻初知睦州移梓州路轉運使改益州英宗朝加龍圖閣直學士知成都神宗朝以大學士復知成都其為政善因俗設施寬猛不同在成都尤為世所稱論曰包拯吳奎趙抃唐介四臣面諍鯁吭逆心或不能堪而仁宗容之無咈誠盛德之主哉欲濟其美在簡乃僚伏念某殖學不豐聞道猶淺怵於為飬強營三釡之謀拙不適時竟墮一科之底謂屠龍之可學並見前又畫虎之不成馬援傳所謂畫虎不成反類狗者也孫寶安得自髙且棲矮屋見前王珣能令公喜偶傍轅門言以主簿受辟其實出朱入墨之材終非泛緑依紅之器並見前駭從臣之出牧杜詩民到于今歌出牧指尊選以見招山谷送李次翁别友賦曩聞義于孫李指尊選以先招惜豫行之舒舒曰其夜以為朝我猶未免鄉人固應纍陶鎔之造翁真善幹國事何至須斗筲之徒五朝名臣言行録淳化四年兩川民飢起復張詠知成都公至問城中所屯兵尚三萬人而無半月之食公知鹽價素髙而廪有餘積乃下其估聽民以米易鹽未踰月得米數萬斛軍中聞而呼曰前所給米皆不可食今一一精好此翁真善幹國事者聞已箋閶闔之風晉劉謐之有與天公箋韓詩寄箋東南風天門西北祈風通易緯西方為閶闔風欲共泛瞿塘之水成都萬事好每歌誰能委圭幣之詩杜詩成都萬事好豈若歸吾廬山谷詩人物方眇然誰能委圭幣長沙千里平恐發忍著主衣裳之笑韓詩長沙千里平勝地猶在險陳後山詩主家十二樓一身當三千古來妾薄命事主不盡年起舞為主壽相送南陽阡忍著主衣裳為人作春妍進退維谷詩人亦有言進退維谷注谷窮也谷是山谷墜谷是窮困之義傴僂循墻左傳一命而僂再命而傴三命而俯循墻而走初命為士其容僂再命為大夫其容傴三命為卿其容俯位益髙身益下也墻謂公門循墻不敢安行也及見移文不容控避鮑叔真能知我他復誰知政身未可許人盍為公許並見前恭惟某官含洪光大易坤厚載物德合無疆含宏光大品物咸享明允篤誠左傳昔髙陽氏有才子八人齊聖廣淵明允篤誠天下謂之八愷親結冕旒進儀筆槖並見前晝日三接而天心默契易晉康侯用錫馬蕃庶晝日三接終嵗九遷而人望尚奢見前一節使燕言靣無幾微之見寧宗嘉定五年六月遣董居誼賀金主生辰會金國亂不至而還禮記一節以趍韓文今人適數百里出門惘惘有離别可憐之色今子使萬里外國獨無幾微出于言靣豈不真知輕重大丈夫哉三刀夢益氣色歸號令之明晉書王濬傳夜夢懸三刀于卧屋梁上須臾又益一刀濬驚覺意甚惡之主簿李毅再拜賀曰三刀為州字又益一者明府其臨益州乎及賊張宏殺益州刺史皇甫晏果遷濬為益州刺史王摩詰詩逺樹刀州出天際栁詩夢喜三刀近欲擇幕賔必先朝彥居誼為成都府路安撫使餘見前况幾兩幾駟而出定多驥尾之攀韓文不知楊侯去時城門外送者幾人車幾兩馬幾匹餘見前何一琴一龜之餘亦取鶴翎之短山谷詩身如病鶴翅翎短餘見前以識字有數為敏贍淹該之學楊文公談苑晉開運中詔令兩制各作詩賦一篇付禮部為考試之式獨學士李懌不肯曰李懌識字有數因人成事使令白衣入貢部中下第必矣胡能作文章為世模楷時論美之山谷詩識字有數我自知又按蜀志南史皆有所識不過十字之語史通謂王平所識僅通十字此亦識字有數之意以多言數窮為貫穿通逹之才老子多言數窮不如守中數王弼注去聲謂理數也明皇注音朔今以對識字有數當從朔音穿去聲司馬遷傳贊貫穿經傳馳騁古今杜詩貫穿無遺恨薈蕞何技癢賈誼傳贊通逹國體自視歉然公言過矣然已入朝取良馬之數昌黎送溫處士序伯樂知馬遇其良輒取之又朝取一人焉拔其尤難更作夕避長蛇之疑太白蜀道難朝避猛虎夕避長蛇某敢不澡雪此心鞭磨所學銘諸肺腑惟國士遇之國士報之見前借以齒牙乃執事事也執事責也老泉集若其言之可用與其身之可貴與否者執事事也執事責也于洵何有哉縱使盡無用于世亦將求不辱其門東坡祭韓忠獻公文敢不師公治民與軍雖無以報不辱其門又祭歐陽文忠公夫人文潁人思公曰此門生雖無以報不辱其門舉李生何辭當謹佩愛直之贈韓文有愛直篇贈李君房别略云李生南陽公之甥也今之從事于彼也吾為南陽公愛之又未知人之舉李生于彼者何辭彼之所以待李生者何道舉不失辭待不失道雖失之此足愛惜而得之彼為歡欣于李生道猶若也為董公從事豈但陪合樂之嬉韓文汴州東西水門記序隴西公作東西水門成大合樂設水嬉會監軍軍司馬賓佐僚屬將校熊羆之士肅四方之賔客以落之士女和會闐郭溢郛既卒事其從事昌黎韓愈請紀成績隴西公謂董晉晉本仲舒之裔自廣川徙隴西故云代趙主簿希坡謝衛參帥辟撫屬黃綬抗塵幸蒙恩而受代薛宣傳欲言縣丞尉者刺史不察黃綬師古曰丞尉職卑皆黃綬北山移文抗塵容走俗狀碧幢率屬辱剡奏以充員方干詩問津求拜碧油幢法言奏不剡雖未占天問之果酬劉禹錫問大鈞賦楚臣天問不酬今臣過幸一獻三酬豈不假人言而後得頂踵皆歸于特逹禮記圭璋特逹疏行聘之時惟執圭璋特以通逹不加餘幣四子講德論特逹而相知者千載之一遇也韻會特但也獨也肺肝倍激于輪囷韓詩肝膽還輪囷伏念某名為皇宗實本素士南史始興王傳王儉嘗歎云始興王雖尊貴而行履都是素士先人存趾嘗首列于儒科韓文若既自克自敬勤及先人存趾美進士續聞成宗惟服任遂功為孝子在不怠元舅拊頭謂必成其宅相唐楊于陵登第調潤州句容尉浙西觀察使韓滉有知人之鑒謂其妻栁氏曰吾閲人多矣後貴且夀無如楊生者生子必位宰相以女妻之既而生嗣復滉拊其頂曰名位皆踰其父楊門之慶也竟如其言陳後山詩少日拊頭斯類我莫年垂淚向西風魏舒傳少孤為外家寧氏所飬寧氏起宅相宅者云當出貴甥外祖母以魏氏甥小而慧意謂應之舒曰當為外祖成此宅相梁書王規傳規子褒七嵗能屬文外祖司空袁昂重之謂賔客曰兒當成吾宅相北史李繪傳河間邢晏繪舅也與繪清言歎其髙逺曰若披雲霧如對珠玉宅相之寄良在此矣遭家多難詩維豫小子未堪家多難欲仕無津陶侃傳鄱陽孝亷范逵嘗過侃侃追送百餘里逵曰卿欲仕郡乎侃曰欲之用于無津耳躡屩擔簦輕别家園之松菊史記虞卿者遊説之士也躡屩擔簦説趙孝成王徐廣曰蹻草履也簦長柄笠音登笠有柄者謂之簦歸去來辭三徑就荒松菊猶存懷鉛抱槧甘依學舍之韲鹽槧有三音于亷切削牘也在敢切斷木為槧削版牘也七豔切説文櫝朴也謂始削粗朴也西京雜記揚子雲好事常懷鉛提槧從諸計吏訪殊方絶域四方之語以為裨補輶軒所載東觀漢紀曹褒為漢禮儀晝夜研精寢則懷抱鉛筆餘見前偶爾登名韓文豈不登名于一科兮漫而試吏元結傳浪者亦漫為官乎呼為漫郎會計而已初無出位之思名實未加濫竊代庖之譽不堪位置何足控摶泰階六符忽擁旄麾而至並見前明堂一柱不遺扂楔之微禮記疏夏曰世室殷曰重屋周曰明堂周禮殷人四阿重屋鄭元注云四阿若今四柱餘見前曲假存全屢令任使及瓜而代詎希東閣之留朱雲傳且留我東閣繞木何依空結南枝之戀不圗裁鑒忽辱薦揚錐之處囊中初無見穎羅而致幕下欲使空羣並見前重惟蟣蝨之官盧同詩下士蟣蝨臣韓詩官無蝨其間杜牧書孔子廟碑隂記彼仁義蝨官也可以置之敻乏蚍蜉之救見前一齊衆楚豈能回莊嶽之音九舜十堯不敢望隆冬之穀桓範要論執權者衆雖九舜猶亂韓子桀紂生而在上位雖十堯舜不能化之梁元帝伐侯景檄文叶和萬邦平章百姓十堯九舜曷足云也淮南子禹決江疏河以為天下興利不能使水西流后稷闢王墾草以為百姓力農然而不能使禾冬生知賢而舉惟斷乃成昌黎平淮西碑凡此蔡功惟斷乃成縱寄箋閶闔之風未知利鈍韓詩寄箋東南風天門西北祈風通易緯秋分閶闔風至注西風也然銘心泰華之石豈易銷磨伏遇某官四海真儒三朝舊弼文章有斐再見武公之賢詩序淇澳美武公之德也有文章又能聽其規諫以禮自防故能入相于周美而作是詩也詩有斐君子如切如磋又有斐君子充耳琇瑩招選無遺一洗將軍之陋衛青傳贊蘇建嘗責大將軍至尊重而天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賔客天子常切齒彼親待士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士自元戎十乘之啓至長沙千里之平茍有寸長悉入大鈞之播不遺餘力復收小子之狂欲令奔走于顔行力借吹噓而送上萬一所請或不見却尋常之恩豈可並言某敢不銘佩異知激昂晚節並見前將母來諗身雖未可以許人諗音審謀也告也相思念也詩是用作歌將母來諗箋諗告也以飬父母之志來告于君也懷德維寧士固必伸于知己詩懷德維寧宗子維城注懷和也和安汝德以施于民無行酷虐之政惟安汝之國矣餘見前代盧尉仲雋謝諸司辟知資興縣資興本郴縣地漢永和初析置漢寧縣三國吳改曰陽安晉改曰晉寧𨽻桂陽郡陳廢入郴縣隋改晉興縣唐貞觀中省咸亨中改置資興縣𨽻郴州五代時廢為寨宋嘉定四年平冦析郴縣兩鄉于青要置資興縣紹定中改興寧縣徙治管子壕今因之箠楚塵埃之徼福偶幸代更韓詩判司卑官不堪説未免捶楚塵埃間餘見前繭絲保障之謀人猥勤特辟尚書鞠人謀人之保居餘見前戴使天之私覆循材地以中慙晉謝琨自負材地不妄交納後魏辛雄疏選補之法妙盡才具如不可並後地先才晉書王藴傳遷吏部郎每一官闕求者十輩藴輒連狀行之曰某人有地某人有材務存進退各隨其才故不得者無怨焉陳書蔡凝傳凝年位未髙而才地為時所重後主謂蔡徽曰蔡凝負地矜才無所用也惟義郴據楚之上流郴州秦長沙郡項羽徙義帝都郴故曰義郴項藉傳古之王者必居上遊徙之長沙都郴師古曰遊流也宋凌伯裕郴江前集序郴居湘楚上遊以山水名而資興為晉之故縣注見題下數百年瓦礫之迹猶有劫灰曹毗志怪云漢武鑿昆明池極深悉是灰墨無復土舉朝不解以問東方朔朔曰臣愚不足以知之可試問西域胡帝以朔不知難以移問至後漢明帝時外國道人來入洛陽時有憶方朔言者乃試以武帝時灰墨問之胡人云經云天地大劫將盡則劫燒此劫燒之餘乃知朔言有旨周書庾信傳談劫燼之灰飛辨常星之夜落唐詩眼看朝市為陵谷始信昆明有劫灰王荆公詩愆陽陵秋更暴橫焮我欲作昆明灰又日月紛紛付劫灰山谷詩收足垂親子存身亘劫灰五六載鋒鏑之餘肇稱新邑尚書王肇稱殷禮祀于新邑俗多鼠嘯財欠鬼輸欲其賣劔以買牛相與抱孫而歌犢是在撫字之職宜得通練之材歷數部封何限囊中之頴豈期庸妄遂蒙送上之噓並見前雖未占天問之果酬劉禹錫問大鈞賦楚臣天問不酬今臣過幸一獻三售詎敢不星言而夙駕詩星言夙駕説于桑田注雨止星見夙早也文公于雨下命主駕者雨止為我晨早駕伏念某起于寒逺持是空疏三年飲墜露于湘濵楚辭朝飲木蘭之墜露兮一念繞落霞于滕閣下車攘臂敢嬰搏虎之嘲學道愛人難奉割雞之笑不虞製錦輒使代庖並見前此蓋伏遇某官大鈞無垠小善必録韓文占小善者率以録耻納溝不被其澤欲惠逺黔出推轂有味之言不遺寒素或者封囊之露許還假印之真並見前借以聲光寬其轡䇿虞詡傳願寬假轡策勿令有所拘閡而已某敢不力摩凋俗盡布教條不鄙夷其民當使鳥言夷靣之俗韓文栁侯為州不鄙夷其民動以禮法又小吏十餘家皆鳥言夷靣始至言語不通事慈惠之帥如在熊旗金節之前釋名熊虎為旗象其猛也昌黎平淮西碑金節煌煌錫盾雕戈犀甲熊旗威命是荷舉自代共三條徽本缺今補唐制常參官及刺史授上訖三日內舉一人自代宋咸平間祕書丞陳彭年請用唐故事舉官自代詔祕書丞直學士馮拯陳堯叟參詳之拯等上言常參官及節度觀察防禦刺史少尹畿赤令并七品以上清望官授訖三日內于四方館上表讓一人以自代其表付中書門下每官缺以見舉多者量而授之今官品制度沿革不同請令兩省御史臺尚書省六品以上諸司四品以上授訖具表讓一人自代于閣門投下方得入謝在外者授訖三月內具表附驛以聞遂著為令謝李侍郎􅌫舉自代玉堂圗舊趣四輩以來宣馬周傳遣使者四輩敦趣傅介子傳殺略三輩王翦傳使使還請善田者五輩張湯傳使使八輩簿責湯婁敬傳使者十輩韓安國傳漢使十輩至梁趙充國傳凡七十輩餘見前寶閣冠班舉匹夫而為代止流言于智者發􅐹記而信然並見前感固感于相知慙則慙于不稱竊以伯禹固遜于后稷曷嘗稽首于殳斨尚書禹拜稽首讓于稷契暨臯陶又垂拜稽首讓于殳斨暨伯與仲尼謂不如顔淵何與及肩之子貢家語子夏問于孔子曰顔回之為人奚若子曰回之仁賢于丘曰子貢之為人奚若子曰賜之敏賢于丘曰子路之為人奚若子曰由之勇賢于丘曰子張之為人奚若子曰師之莊賢于丘蓋惟善能舉其類然擬人必以其倫禮記擬人必于其倫郤鑒傳王敦謂鑒曰樂彥輔短才耳考之以實豈勝滿武秋耶鑒曰擬人必于其倫彥輔道韻平淡體識沖粹武秋失節之士何可同年而言三國志辛毗傳注裴松之曰擬人必于其倫取譬宜引其類故君子于其言無所茍而已矣未聞取原隰馳驅之人謂可備軒墀供奉之數新唐書百官志元宗以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢學士分掌制誥東坡詩供奉清班非老處會稽何日乞方回鳯兮巢閣方將揚覽德之輝尚書中候堯即位七十年鳯凰止庭伯禹拜曰黃帝軒轅時鳯皇巢閣皇甫謐帝王世紀黃帝齊于中宫鳯皇或止帝之東園或巢阿閣賈誼傳鳯皇翔于千仞兮覽德輝而下之馬也守閭正恐纍知人之鑒韓文鼎也不可以柱車馬也不可使守閭伏念某嶔﨑萬狀拓落一官器窳識凡安能超卓學荒術陋何有深醇當光皇之末年教胄子者數月尚書命汝典樂教胄子一鳴輒斥刺天不羡于羣飛昌黎祭栁子厚文子之視人自以無前一斥不復羣飛刺天四國于宣見雪幸逃于衆吠詩四國于蕃四方于宣正義曰四方恩澤不至則往宣暢之使霑王化栁文僕來南二年冬幸大雪踰嶺被南越中數州數州之尖皆蒼黃吠噬狂走者纍日至無雪乃已十暑貫岷山之葛貫音射説文貸也廣韻賖也杜詩十暑岷山葛三霜楚户砧一寒仍范叔之袍乏四騏四駱之咨諏端方烏有無一鶴一龜之風采澄按何功並見前豈謂我家侍郎之賢李詩今日竹林晏我家賢侍郎三杯容小阮醉後發清狂曲念吾宗孫子之老杜詩吾宗老孫子詳見前惟學士學先聖之道見下文况敷文敷國典之華宋紹興十年置敷文閣以藏徽宗御製詔曰徽宗皇帝宸章奎畫煥乎若三辰之文麗天垂光賁飾羣物殆與詩書相表裏崇建層閣以嚴宅藏恭以敷文為名宜置學士直學士待置以次列職備西清之咨訪為儒學之華寵其著于令兩命以起知章足為光寵新唐書隱逸傳賀知章字季真越州永興人開元中遷禮部侍郎兼集賢院學士一日併謝宰相源乾矅語張説曰賀公兩命之榮足為光寵然學士侍郎孰為美説曰侍郎衣冠之選然要為具員吏學士懷先王之道經緯之文然後處之此其為間也一字之拔叔夜却恐粗踈山濤傳濤所奏甄拔人物各為題目蔡謨傳謨父克未仕時山簡嘗與王衍書曰蔡子尼今之正人衍以書示衆曰山子以正字拔人然未易可稱嵇康傳山濤將去選官舉康自代康乃與濤書告絶曰足下舊知吾潦倒粗踈不切事情自惟亦皆不如今日之賢能也德不待于成身士固伸于知己並見前此蓋伏遇某官四朝元老詩方叔元老注元大也五官之長出于諸侯曰天子之老方叔天子之大老一世真儒奉命任危難之間諸葛武侯出師表受任于敗軍之際奉命于危難之間固國還封疆之界南人不復反矣漢晉春秋諸葛武侯在南中所在戰捷聞孟獲者為夷漢所並服募生致之使觀營陳問曰此軍何如獲曰向者不知虗實故敗今蒙賜觀看若祗如此即定易勝耳武侯笑縱使更戰七縱七擒而猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池東山以公歸兮詩我徂東山慆慆不歸又無以我公歸兮無使我心悲兮箋東都之人欲周公留之為君謂成王所齎來衮衣願即封周公子此無以我公西歸然神旗戟纛既久長于魏師韓文旌節有韜豹尾神旗橐兜戟纛以長魏師則光祿金紫當即封于晉國事物記原云魏晉以來有左右光祿及光祿大夫皆銀印青綬重者加金章紫綬因稱金紫光祿大夫後周以為散官裴度傳蔡平䇿勳進金紫光祿大夫宏文館大學士上柱國晉國公户三千復知政事走卒知司馬顧令領嵩陽崇福之宫東坡詩兒曹誦君實走卒知司馬宋在外宫觀杭州洞霄宫亳州明道宫華州雲臺觀建州武夷觀召州崇道觀成都玉局觀建州仙都觀江州太平觀洪州玉隆觀五嶽廟嵩山崇福宫舒州靈仙觀東坡溫公行狀公四任崇福宫單于問大蘇亦知起元祐眉山之學東坡詩時時鴂舌問三蘇又單于若問君家世莫道中朝第一人宜煩泥檢説文檢書署也徐曰書函之蓋也三刻其上繩緘之然後填以泥題書而印之也詳見前來趣脂車曹植詩星陳夙駕秣馬脂車詩爾之亟行遑脂爾車幸舍人之治裝見前副天子之虛佇帝乃誕敷文德正藉臣鄰尚書帝乃誕敷文德舞千羽于兩階王惟圗任舊人適登丞弼見前藉令念小草之有逺志山谷詩小草有逺志何至引老芋而替茯神栁文余病痜且悸謁醫視之曰惟茯神為宜眀日買諸市烹而餌之病加甚召醫而尤其故醫求觀其滓曰吁盡老芋也某敢不銜佩異知磨礲晚節韓文磨礲乎事業集賢以待侍讀固使臣不敢與聞新唐書開元十二年宴學士張説等于集仙殿于是改殿名集賢改修書使為集賢殿學士書院學士五品以上為學士每以宰相為學士知院事左傳三夏天子所以享元侯也使臣弗敢與聞征夫豈不懷歸願君子惟能通志詩侁侁征夫每懷靡及又豈不懷歸王事靡盬繫辭惟深也故能通天下之志代回董惠州居誼謝舉自代咨垂共工自當申稽首之遜尚書帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓于殳斨暨伯與舉康自代得無笑炙背之疏嵇康傳山濤將去選官舉康自代康乃與濤書告絶曰野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣銜袖惠然開緘愧甚並見前恭惟某官有致逺之器無欲速之心屢薦不入官姑取一麾而去顔延年詩屢薦不入官一麾乃出守杜牧之詩擬把一麾江海去三宿而出晝無勤千里之追難進易退我不如禮記事君難進而易退則位有序易進而難退則亂也東坡鶴歎園中有鶴馴可呼我欲呼之立坐隅鶴有難色側睨豫豈欲臆對如鵩乎驅之上堂立須臾投以餅餌視若無戞然長鳴乃下趨難進易退我不如見賢不薦誰當耻東坡送任伋通判黃州詩吾州之豪任公子少年盛壯日千里無媒自進誰識之有才不用今老矣知命無憂子何病見賢不薦誰當耻聊復爾耳止或尼之某欲為王留徒得君重並見前得隴望蜀戲已驗于前言岑彭傳人苦不知足既得隴復望蜀每發一兵頭髮為白召鄒延枚客正觀于末至謝惠連雪賦梁王不悅逰于兔園乃置旨酒命賓客召鄒生延枚叟相如末至居客之右代回倪告院千里謝舉自代宋初于右掖門置院四司告身案並集于此以備中書除改本司郎官各主其事淳化五年始專置司官于省內凡官誥各以本司告身印印之官誥院提舉一人以知制誥充判院一人以帶職京朝官充元豐五年行官制文武告身屬吏部審官告屬兵部封贈及命婦告屬司封加勳及拜將校告屬司勳倪千里字起萬東陽人紹熙中任蘇學教授因其羡積飬士復作義廪以資禮文之費士心悅服稟令推賢得公為重尚書王言惟作命不言臣下罔攸稟令又推賢讓能庶官乃和袖箋委貺陳義甚髙莊子屠羊説居處卑賤而陳義甚髙文則其文謝非所謝恭惟某官學有原本行無瑕疵左傳豫取豫求不汝疵瑕也韓詩佳句喧衆口考官敢瑕疵栁詩進身齊選擇失路同瑕疵山谷詩遇人不崖異順物無瑕疵互見前委蛇結緑之珍是宜廟序委於危反蛇音移詩委蛇委蛇傳行可蹤迹也箋委曲自得之貌疏動而有常使人可蹤迹而效之范雎傳周有砥砨宋有結緑梁有縣黎楚有和璞此四寶者良工之所失也而為天下名器曹植七啓佩則結緑縣黎寶之妙微曹丕與鍾繇書晉之垂棘魯之璵璠宋之結緑楚之和璞價越萬金貴重都城序東西墻也騰踏飛黃之駿而伏鹽車淮南子飛黃神馬也文選整頓雲輅驂飛黃韓詩飛黃騰踏丢戰國策驥伏鹽車而上太行伯樂遭之驥俯而噴仰而長鳴賈誼傳驥垂兩耳服鹽車兮師古曰駕鹽車也李商隱詩人疑迷麥市馬似困鹽車使在論思獻納之班班固西都賦朝夕論思日月獻納必有輔贊彌縫之益新唐書房杜傳贊輔贊彌縫而藏諸用某濫持荷槖見前謬厠李官天文志房南衆星曰騎官左角理右角將史記天官書作李蓋古文理與李通守正奉公實不如于戴胄王圭傳濟繁治劇衆務必舉臣不如戴胄明刑弼教義當孫于臯陶尚書明于五刑以弼五教又禹拜稽首讓于稷契暨臯陶不謂髙情猶勤私謝惠而好我皆藹如仁義之言詩惠而好我攜手同行韓文仁義之人其言藹如也更以贈君願力蹈中庸之正山谷詩君家所有更贈君宣賜賀黃制置伯固賜金帶青箱雜記本朝之制待制止繫皂鞓犀帶遷龍圖閣直舉士始賜金帶歸田録太宗皇帝謂銙玉不離石犀不離角可貴者惟金創為金銙以賜羣臣方團毬路賜兩府御仙花賜學士以上今俗謂毬路為笏頭御仙花為荔枝黃伯固將樂人為建昌尉纍官四川安撫制置使終兵部侍郎涖官行已為時所重卒諡忠簡分閫疇庸杜詩分閫救世用賢豪漢宣帝紀疇其爵邑祭遵傳疇其爵邑世無絶嗣注疇等也言功臣死後子孫襲封世世與先人等栁文皇天疇庸審厥保承荀彧傳增疇户邑注疇等也錫鞶疏寵説文鞶大帶也易或錫之鞶帶終朝三禠之左傳鞶厲遊纓昭其數也又鄭伯之享王也王以后之鞶鑑與之注鞶帶而以鑑為飾三品百鍊焜煌內府之朌尚書厥貢惟金三品孔傳金銀銅也白帖百鍊之金言百鍊之不耗劉琨詩何意百鍊鋼化為繞指柔唐詩光生百鍊金焜户衮切説文煌也煌胡光切説文輝也增韻焜煌光也朌賦也禮記名山大川不以朌萬釘九環褒表中權之徑楊素傳開皇十八年素大破突厥優詔褒揚賜縑三萬匹及萬釘寶帶新唐書夷狄傳西統葉護可汗獻萬釘寶鈿金帶山谷詩萬釘寶帶雕狨席職官分紀隋薛道衡出為襄州總管髙祖謂曰爾之去朕如斷一臂于是賚物三百段九環金帶馬十匹遣之周書熊安生傳髙祖入鄴幸其第賜象笏及九環金帶李德林傳開皇元年令德林與于翼髙熲等同修律令事訖奏聞别賜九環金帶一腰六一居士詩白髮垂兩鬢黃金腰九環不勤使請彌覺道存恭惟某官追琢其相詩追琢其章金玉其相注追雕也金曰雕玉曰琢相質也治寶物為器所以可雕琢其體以為文章者以金玉本有其質性故也以喻文王所以可修飾其道以為聖教者由本心性有睿聖故也柔惠且直詩申伯之德柔惠且直揉此萬邦聞于四國注申伯之德安順而且正直言忠信行篤敬學素得于書紳極髙明道中庸強何虞於袵革疏髙明謂天也言賢人由學如天之髙明之德道通也又能通逹乎中庸之理也袵卧席也北方剛猛好鬬故以甲鎧為席寢宿于中上嘉羊祜輕裘之緩羊祜傳祜在軍常輕裘緩帶身不被甲鈴閣之下侍衛者不過十數人欲厲田單仗鍤之橫戰國策田單將攻狄往見魯仲子仲子曰將軍攻狄不能下也將軍之在即墨坐而織簣立而仗插為士卒倡當此之時將軍有死之心而士卒無生之氣此所以破燕也當今將軍黃金橫帶而馳乎淄澠之間有生之樂無死之心所以不勝者也肆分紫磨之真爾雅黃金謂之蕩美者謂之鏐郭璞云鏐即紫磨金也林邑記上金為紫磨金又曰陽邁金南史南海扶南國王諸農死子陽邁立陽邁初在孕其母夢生兒有人以金席藉之其色光麗夷人以金之精者為陽邁若中國云紫磨者因以為名昭示黃河之信功臣表封爵之誓曰使黃河如帶泰山若礪國以永存爰及苖裔于是申以丹書之信重以白馬之盟為兵餽之何不受從革作辛尚書金曰從革從革作辛匪伊垂之則有餘在師中吉詩匪伊埀之帶則有餘匪伊卷之髮則有旟注言非故埀此帶也帶于禮自當有餘也禮大帶埀三尺易在師中吉無咎王三錫命向來衆口之鑠鄒陽傳衆口鑠金積毁銷骨師古曰美金見毁衆共疑之數被燒鍊以至銷鑠讒佞之人肆其詐巧離散骨肉而不覺知野客叢書屈原九章曰故衆口其鑠金兮初若是而逢殆注引鄒陽之語在後豈宜引證鄧析子曰衆口鑠金三人成虎則先原已有此言矣國語衆心成城衆口鑠金王充論衡在五行二曰火五事二曰言言與火值故衆口鑠金風俗通云俗説有美金于此衆人咸共詆訾言其不純賣金者欲其售因取煆燒以見真故云曾不纍月而銷賜爾通天略吐胸中之十萬昌黎平淮西碑賜汝節斧通天御帶崔浩傳世祖指浩示髙車渠帥曰汝曹視此人尫纎懦弱其胸中所懷乃踰于甲兵宋名臣傳范文正公領延安閲兵選將日夕訓練夏人聞之相戒曰無以延州為意今小范老子腹中自有數萬甲兵不比大范老子可欺也用汝作礪便看腰下之兩重尚書若金用汝作礪宋魏泰東軒筆録舊制學士以上並有一人朱衣吏引馬所服帶用黃金而無魚至入兩府則朱衣二人引馬謂之雙引金帶懸魚謂之重金矣世傳館閣望為學士者賦詩云眼裏何時赤腰間甚日黃及為學士又作詩曰眼赤何時兩腰黃幾日重謂雙引重金也眼前何日赤腰下幾時黃白樂天詩也某聳聽夬揚易夬揚于王庭孚號有厲疏夬決也以君子決小人故可以顯然發揚決斷之事于王者之庭此借用阻陪旅賀夬旅卦名寬營平先零之漕儻免裹尸趙充國傳與大將軍霍光定册尊立宣帝封營平侯擊先零羌上屯田奏分屯要害處氷解漕下馬援傳男兒要當死于邉野以馬革裹尸還葬耳賜贊皇于闐之珍尚祈拭目新唐書李靖傳靖五代孫彥芳家藏靖破蕭銑時所賜于闐玉帶十三胯七方六刓胯各附環以金固之楊修書觀者駭視而拭目杜詩拭目萬人看賀魏侍郎了翁賜金帶宋史理宗紹定六年十一月以魏了翁為華文閣待制知瀘州潼川安撫使賜金帶魏了翁傳知瀘州進華文閣待制賜金帶因其任賜璽褒賢循吏傳序以璽書勉厲增秩賜金橫金增秩見上條書盈于閣進思緯國之文華漢刑法志文書盈于几閣班彪傳敷文華以緯國帶錫之鞶昭示立朝之賓客見上條登庸有漸寵錫非常恭惟某官根柢六經柢典禮切説文木根也徐曰華葉之根曰蒂木之根曰柢杜詩詞林有根柢光芒五緯劉禹錫栁先生文集序粲然如繁星麗天而芒寒色正人望而敬者五行而已忠信篤敬學素得于書紳髙明中庸強何關于袵革一笑微生於偃月新唐書姦臣傳李林甫有堂如偃月號月堂每欲排搆大臣即居之思所以中傷者若喜而出即其家碎矣唐岑嵓吉凶影響録李林甫創一堂有却月之形名曰却月堂欲破人家族則入堂精思後有斫棺之禍惡之者有詩云却月堂中喜色新明朝應有破家人祿山反噬家還破須信難欺是鬼神十年良耻於倚氷天寶遺事楊國忠為右相公卿以下頥指氣使或勸陜郡進士張彖謁之彖曰君輩倚楊右相如泰山吾以為氷山耳若皎日既出君輩得無失所恃乎遂隱居嵩山上應念徙薪之言霍先傳臣有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患人望還采薇之帥詩序采薇遣戍役也文王之時西有昆夷之患北有玁狁之難以天子之命命將率遣戍役以守衛中國故歌采薇以遣之姑朌芝檢檢書函之蓋也三刻其上繩檢之然後填以泥題書而印之也陳江總為南陽王讓吳郡表芝泥馳印發命開函張鷟奏章芝泥發彩宣鳯藻而騰文蘭檢流香潤龍縑而動色王子年拾遺記元封二年浮欣國貢蘭金芝泥常以此泥封諸函匣漢世上將出征及使絶國多以此泥為璽封衛青張騫蘇武傳介子之使皆受金泥封璽所謂芝泥蘭檢也仍進松班唐開成元年正月詔以入閣日次對官班退立于東階松樹下須宰臣奏事畢齊至香案前各言本司事雖紫宸殿亦有松樹為待制官立位元微之詩松門待制應全逺馬戴詩待制松隂移玉殿申錫九環誰曰有常而循故庚金百鍊式彰從革之作辛尚書金曰從革從革作辛孔傳金可以改更佩則有餘見上條服之無斁詩為絺為綌服之無斁箋服整也整治之無厭倦是其性貞專此借用裊蹄麟趾不由郿塢之貯儲漢武帝紀詔曰往者朕郊見上帝泰山見金又有白麟神馬之瑞宜以黃金鑄麟趾裊蹄以協瑞焉注獲白麟有瑞故鑄金如麟馬以協嘉瑞也古有駿馬名騕裊赤喙黑身日行萬五千里也董卓傳築塢于郿髙厚七丈曰萬嵗塢卓誅塢中珍藏有金二三萬斤鳯閣鸞臺端屬趙家之世界新唐書百官志光宅元年改中書為鳯閣令為內史埀拱元年改門下省為鸞臺李嶠傳進麟臺少監同鳯閣鸞臺平章事姚崇傳進同鳯閣鸞臺平章事新唐書劉禕之傳不經鳯閣鸞臺何謂之敕無勤使請更覺道存橫安平之金不難破敵見上條解武侯之帶寧久渡瀘蜀志諸葛亮傳劉備以亮有殊量及三顧亮於草廬之中亮深謂備雄姿傑出遂解帶寫誠厚相結納又五月渡瀘深入不毛沈約王僧逹顔峻傳論披胸解帶義止賓僚王勃餞霍使君序臨風雲而解帶眄江山以揮涕衮以公歸礪資汝作某聳聞郵報竊賀厦成並見前兩赤重黃自異佩芄蘭之葉芄音丸芄蘭草名詩序芄蘭刺惠公也驕而無禮大夫刺之詩芄蘭之葉童子佩韘雖則佩韘能不我甲容兮遂兮埀帶悸兮箋容容刀也遂瑞也言惠公佩容刀與瑞及埀紳帶三尺悸悸然行止有節度然其德不稱服餘見前千紅萬紫寧能對松柏之柯王荊公詩百紫千紅占得春頌詠惟深敷宣罔既代回嗣秀王師揆賀賜玉帶宋孝宗繼統封秀王子孫為嗣秀王按宋史師揆太祖九世孫揚庭渙號易夬揚于王庭渙渙汗其大號詳見前分寶展親尚書分寶玉于同姓之國時庸展親追琢其章璀璨簮紳之長詩追琢其章金玉其相注追雕也金曰雕玉曰琢周禮追師掌治衡笄衡笄以玉為之而職曰追師則追亦治玉之名追琢金玉使成文章璀音崔璨音粲説文玉光也溫潤而澤彰施衮繡之光禮記君子比德于玉溫潤而澤仁也縝密以栗知也亷而不劌義也埀之如墜禮也叩之其聲清越以長樂也瑕不掩瑜瑜不掩瑕忠也孚尹旁逹信也氣如白虹天也精神見于山川地也圭璋特逹德也天下莫不貴者道也尚書以五采彰施于五色恭惟某官德濬璿源顔延年詩玉水記方流璇源載圎折宋璿源分𣲖太祖位下德惟從世令豫伯師希與孟由字號師字係九世孫望儲琳館合宫薦瑞恪陪圭邸之恭管子黃皇有合宫以廣政尸子欲觀黃帝之行于合宫史記成王削桐葉為圭以封叔虞邸典禮切説文屬國舍徐曰諸矦來朝所舍曰邸顔師古曰漢制郡國朝宿之舍在京師者悉名邸白帖諸王朱邸御府闡珍寧假玉人之琢萬釘錯落崔皓詩錯落金鎖甲注間厠也東坡詩錦袍錯落真相稱六服焜煌焜戶衮切説文煌也增韻焜煌先也或作輝封禪書燠炳輝煌又公渾切服虔曰明也煌胡先切説文輝也某未能造朝猶稽走賀揚休屹立更勤珠璧之投鄒陽傳明月之珠夜光之璧以暗投人于道餘見前病骨難堪莫辦瓊瑶之報東坡詩病骨難堪玉帶圍詩投我以木桃報之以瓊瑶被召共四條徽本闕今補賀綿州髙知府定子赴召綿州在成都東北三百六十里本漢廣漢郡之涪縣蜀漢屬梓潼郡晉以後屬梓潼巴西二郡西魏改縣曰巴西置潼州隋初改為綿州後改為金山郡唐初復為綿州天寶初改巴西郡乾元初復為綿州宋仍舊互見後宋史髙定子字瞻叔嘉定二年舉進士授郪縣主簿辟丹稜令以同産弟魏了翁守眉改監資州酒務差知夾江縣長寧軍尋知綿州時元兵穿鳯州塞破武休下興元小校張鉞以其徒潰入文州殺守臣楊必復將自龍趨綿以闖成都安撫使黃伯固奏定子兼參議官措置文龍備禦定子乃部分諸軍扼青塘嶺鉞就擒定子身任兩司之責極其勞勩以收捕張鉞功進三官以防遏收招潰兵功又進一官進直寶章閣再任頃之召入奏事吏民追送莫不流涕鄰郡聞定子至焚香夾道舉手加額曰微公吾屬塗炭久矣歷官簽書樞密院事兼權參知政事卒贈少保疇庸亷水栁文皇天疇庸審厥保承亷水在綿州彰明縣北平地泉出宋書明帝因言及貪泉問梓潼人范柏年曰卿鄉土有此泉否柏年對曰梁益間惟有亷泉讓水不聞有貪泉帝善之即拜梁州刺史按今漢中府亦有此二水奏計甘泉文帝紀上幸甘泉師古曰甘泉在雲陽即奏林光宫武帝紀受計于甘泉師古曰受郡國所上計簿也若今之諸州計帳髙駢詩歸來長安道召見甘泉宫駕兩朱轓去載屹頽波之柱劉禹錫詩世道劇頽波我心如砥柱山谷詩砥柱閲頽波餘見前奉尺一詔兹晨趨文石之塗陳蕃傳尺一選舉注漢以尺一板寫詔書山濤傳宰相三日不朝與尺一令歸第令何慮耶陽球傳不得稽留尺一魏志明帝紀尺一詔書用人如斯魏志毛玠傳玠為東曹掾太祖歎曰用人如此使天下人自治吾復何為哉通國幸甚恭惟某官參旗孕秀晉輿服志參旗分景帝車含曜晉天文志參魏益州禮記參取象熊旗象伐注輈人熊旗六斿以象伐也晉天文志參旗九星在參西一曰天旗一曰天弓西南九星曰九斿天子之旗也蘇易簡擬宋玉大言賦參旗井鉞嚴武備也井絡載英蜀都賦岷山之精上為井絡江漢炳靈世載其英師友卿雲黼黻交輝于河漢廣絶交論舒向金玉淵海卿雲黼黻河漢伯仲伊吕羽毛盍在於雲霄杜詩伯仲之間見伊吕指揮若定失蕭曹三分割據紆籌策萬古雲霄一羽毛言從磊落之州杜詩綿州州府何磊落顯慶年中越王作孤城西北起髙樓碧瓦朱甍照城郭茂著蕃宣之最見前適貔貅之狼狽貔貅猛獸史記黃帝教熊羆貔貅貙虎以與炎帝戰于阪泉之野狽音貝狼屬生子欠一足二足相離而行離故猝遽謂之狼狽神異經狽無前足附狼而行委鴻鴈於牛羊詩序鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之詩鴻鴈于飛哀鳴嗸嗸一人之情千萬人之情親援桴而立鼓杜牧之阿房宫賦一人之心千萬人之心也桴音浮擊鼓杖亦作枹桴棟之桴音夫世多誤用史記司馬穰苴傳援桴鼓之急則忘其身索隱曰枹音浮正義曰鼓挺也田仁傳提桴鼓立軍門不及任安百步而止五十步而止紛棄甲以曵兵公獨作張雎陽之守城新唐書張許傳贊張巡許逺以疲卒數萬嬰孤墉抗方張不制之虜鯁其喉牙使不得摶食東南牽掣首尾豗潰梁宋間大小數百戰雖力盡乃死而唐全得江淮財用以濟中興引利償害以百易萬可矣上不識顔平原之何狀新唐書顔真卿傳祿山反河朔盡陷獨平原城守具備使參軍李平馳奏帝大喜謂左右曰朕不識真卿何如人所爭乃若此兹令四輩陳餘傳候者往十輩皆死傅介子傳三輩趙充國傳凡七十輩馬周傳遣使者四輩敦趣互見前趣覲九宸此行登仙富貴乃緒餘之事新唐書倪若水傳時天下久平朝廷尊榮人皆重內任雖自冗官擢方靣皆自謂下遷班景倩自揚州採訪使入為大理少卿過汴州若水餞于郊顧左右曰班公是行若登仙吾恨不得為騶僕惟公懋德功名留久逺之看尚書惟公懋德克勤小物蔡襄詩世間萬事俱塵土留取功名久逺看某屯蹇百罹詩我生之初尚無為我生之後逢此百罹説文罹心憂也又遭也冒也爾雅毒也注憂思慘毒暌離半世韓詩與子昔暌離嗟豫苦屯剝屯蹇暌離四卦名玷征夫之濡轡幸君子之得輿並見前有德進則朝廷尊既聞耳矣東坡集士以德望進則風俗厚而朝廷尊食貨志既聞耳矣注聞于天子之耳所用賢則功施普當拭目焉王褒傳賢者國家之利器也所任賢則趨舍省而功施普器用利則用力少而就效衆餘見前回諸處賀召命匹雛無力久動歸去來兮之思四牡何功誤叨詣行在所之命俱見前方切循孔墻之避家語三命而俯循墻而走未遑謝鄭轂之推鄭當時傳其推轂士及官屬丞史師古曰推轂言薦舉人如車轂之運轉也敢意雲箋先馳霧驛恭惟某官璽書增秩斧繡生輝德既厚於蘇栝道仍隆於拔茹並見前噓是拂是起死草之華風李賀詩誰知死草生華風縶之維之憐生芻之空谷詩皎皎白駒食我場苖縶之維之以永今朝皎皎白駒在彼空谷生芻一束其人如玉注宣王不能用賢有乘白駒而去願此去者乘白駒而來使食我場中之苖我則絆之繫之以永今朝愛而欲留之也今乘此皎皎然白駒之賢人在彼大谷之中矣汝行所舍主人禮餼雖薄止有束芻要得其德如玉者就之不可貪餼而棄賢也齒牙所借見前羽翼斯成張良傳羽翼已成難動矣顧某欲拜威顔左傳天威不違顔咫尺既愆膂力尚書番番良士旅力既愆不能者止詎堪再傍于九關宋玉招魂虎豹九關言天門九重虎豹守之兆足以行或許退專于一壑謝鯤傳明帝問鯤曰論者以君方庾亮自謂何如答曰端委廟堂使百僚準則則鯤不如亮一邱一壑自謂過之陸機文古之逸民輕天下而欲專一邱之歡擅一壑之美豈不身重于宇宙哉徒勤褒飾但愧感藏謝趙制置彥呐安總領癸仲賀辭召不允宋史趙彥呐字敏若彭州人登四川類試第少以材稱吳曦叛彥呐結義士殺其偽夔守祿禧遂顯名嘉定十二年安丙檄使經理西和州轉提點尋帥沔寶慶元年移帥興元紹定間為桂如淵李􅌫黃伯固副使端平元年遂升正使三年金人大入至三泉彥呐大敗貶衡州詳見後安癸仲安丙之子董居誼帥蜀大失士心金人乘之宋師所至輒潰聶子述代之時癸仲知果州子述檄兼參議官紅巾賊叛子述檄癸仲兼節制軍馬任討賊之責宋史理宗寶慶元年以安癸仲為戶部郎中總領四川財賦漕氷未解敢希全璧之歸趙充國傳氷解漕下戍雪將更誤玷與環之寵杜詩西山白雪三城戍南浦江清萬里橋荀子聘人以圭問士以璧召人以瑗絶人以玦反絶以環范寧榖梁傳注君賜之環則還賜之玦則往栁詩未賜大夫環又賜環留逸響傴僂再三而引避家語一命而傴再命而僂三命而俯循墻而走傴於語切僂音樓身向前也傴恭于僂俯恭于傴威顔咫尺之難處此非左右之先容孰與吹噓而送上伏念某志隨學落氣與年凋虛警空悲皆信書而成誤乾愁漫解覺行道之猶非並見前自再泝於岷江已九鑽於巴火杜詩九鑽巴噀火奉法循理奈倡矣而莫隨節用愛人愧行之之未盡自警篇李文靖公作相常讀論語或問之公曰沆為宰相如論語中節用而愛人使民以時兩句尚未能行聖人之言終身誦之可也每覺匹雛之無力敢言四牡之有功詩序四牡勞使臣之來也有功而見知則説矣招大夫以旌豈為我設阮籍傳嫂嘗歸寧籍相見與别或譏之籍曰禮豈為我設哉越小臣諸節亦厠旁招尚書惟厥正人越小臣諸節孔傳于小臣諸有符節之吏厠初吏切釋名雜也一曰間也次也未敢隨召驛之塵將復返屠羊之肆詎期巽櫝莫反渙章此蓋制置某官以禮樂英為詩書帥十七年干城之底績數百戰尊爼之折衝並見前迄厲二矛重弓之威詩朱英緑縢二矛重弓注二矛重弓備折壞也美僖公用兵征伐俾無匹馬隻輪之返榖梁傳秦伯襲鄭晉人與薑戎要而結之殽匹馬倚輪無返者注倚輪一隻之輪公羊傳匹馬隻輪無反者注匹馬一馬也隻踦也皆喻盡潘嶽西征賦曽隻輪之不反緤三帥以渡河草尺書而招贊普聞已請降東坡詩試草尺書招贊普詳見前奬三軍而定中原即觀奏凱出師表南方已定兵甲已足當奬帥三軍北定中原凱通作愷軍勝之樂周禮春官王師大獻奏凱樂左傳晉文公振旅愷以入于晉樂書風謂之凱風天地之怒氣散王師大獻謂之愷樂人之怒氣已焉雲笈軒轅記帝五十二戰天下大定始作棡鼓曲靈夔吼雕鶚爭石墜崖壯士怒元雲朱鷺等曲謂之凱歌每借齒牙之餘論不遺毛髮之謭材並見前致茲無用之人亦有罔功之奏尚書敷同日奏罔功此蓋總領某官世濟膚公詩薄伐玁狁以奏膚公家傳逺略張九齡詩山川動逺略原隰軫皇情卿月髙升於金掌杜詩卿月升金掌陳雲連捷于玉關庾信詩陳雲千里散黃河一代清玉關在燉煌郡壽昌縣漢龍勒縣也玉關在縣北陽關在玉關之南故曰陽一縣而兩關者自此而趨西域有南北道故也智運木牛師不憂於左次易師左次無咎象曰左次無咎未失常也權兼茗駿貢爭效於右牽禮記效馬效羊者右牽之效犬者左牽之佇積勛庸徑登鬷假鬷音奏假音格詩既載清酤賚我思成亦有和羮既戒既平鬷假無言時靡有爭綏我眉夀黃耇無疆妄借齒牙之重不遺毛毳之微韓詩外傳盍胥對晉平公曰鴻鵠一舉千里所恃者六翮耳背上之毛腹下之毳益一把飛不為加髙損一把飛不為加下今君之食客門左門右各千人亦有六翮在其中矣將皆背上之毛腹下之毳耶毳嗤瑞切細毛也按此一聫與前重復宜更訂之致此絲綸許令敷奏尚書敷奏以功某敢不益加黽勉復策駑庸雖無治聲塞海內寡二之問吾邱夀王傳子在朕前之時知略輻湊以為天下少雙海內寡二及至連十餘城之守任四千石之重甚不稱在前時何也願陳民德當雲中第一之歌謝利路髙提刑稼賀辭召不允宋史忠義傳髙稼字南叔卭州蒲江人真德秀一見以國士期之嘉定七年進士潼川制置使崔與之聞其名辟幹辦本司公事稼持論不阿及鄭損為制置使即求去損之入蜀也稼同産弟魏了翁誦言于朝謂必敗事損銜之遂劾罷稼寶慶三年元兵至武階損棄沔而遁桂如淵鎮蜀辟通判沔州如淵以便宜命稼利路提刑司兼權興元府制置司如淵既罷李􅌫代之御史汪剛中如淵黨也欲使稼分其罪乃謂蜀之敗實由稼削二官李心傳見上訟稼無罪制置使趙彥呐以參議官避之會彥呐召還密奏留稼以直祕閣知沔州利州提點刑獄兼參議官沔無城依山為阻北兵大至稼死之詔進稼七官為正議大夫龍圗閣直學士諡曰忠後以子斯得報政纍贈太師稼為人慷慨有大志推轂人士常恐不及視財如糞土死之日聞者莫不流涕所著有縮齊類稿三十卷斯得自有傳氷漕終更誤玷豫環之寵見上條露章未允難從俟駕之私何武傳所舉奏二千石長吏必先露章禮記凡君召在官不俟屨在外不俟車退循頂踵之歸皆出齒牙之借並見前至勤下問尤佩髙情恭惟某官胸著千年陳後山詩胸中歷歷著千年身兼數器薛宣傳經術文雅足以謀王體斷國論身兼數器有退食自公之節人或劫劫而不足韓文人皆劫劫我獨有餘公獨恢恢乎有餘莊子恢恢乎其于逰刃必有餘地矣縶之維之惟恐生芻之空谷詩皎皎白駒食我場苖縶之維之以永今朝又皎皎白駒在彼空谷生芻一束其人如玉注縶絆維繫也宣王不能用賢有乘白駒而去者願此白駒食我場中之苖我則絆之繫之以永今朝愛而欲留之也空大也言乘白駒而去之賢人今在大谷之中矣汝行所舍之主人禮餼雖薄止有生芻一束耳當得其人如玉者而就之不可貪餼而棄賢也噓是拂是能吹死草之華風德既辱于蘇枯道亦隆于拔茹並見前致兹頑鈍亦預招徠徠古文來字某敢違威顔左傳天威不違顔咫尺言君尊如天其威嚴常在顔靣既愆膂力尚書番番良士膂力既愆不能者止詎堪再傍於九關兆足以行或許退休於一壑並見前四六標準卷九
