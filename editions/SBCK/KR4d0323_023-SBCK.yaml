front:
  text: 之二十二
  hash: sha256:9a868ec0a67051942d85d3ea755e555f67e79657aa5fa4f2c1f69a17a304c101
body:
  text: 緫領賀牛都大除緫領大年知榮州作結知宸扆攺領餉臺千里餽糧有飢孰堪將指六計以廉為本疇可易公成命風馳驩聲雷動恭惟某官弘深而肅括忠肅而篤誠為淮海維揚之俊人得伊洛入河之宗􅂀仁為已任此心即禹稷之心謹厥身修所學皆孔周之學安行􅂗轍動中和鑾名旣震于京師才合居於給諌行行且止避御史巳播流聞皇皇者華遣使臣乃煩咨度茗駿之登旣羡槐龍之對可占留蕭相於関中且專餉事任武侯於渭上式敏戎公然劔閣雖曰峥嶸而崔嵬而益州實斍疲敝之危急䑛糠何止於及米放手寕恤於傷葵人知罪􅀊之徒然天遣福星之臨止序諸侯之上暫借重於王人折千里之衝即遄歸於政地某比縁井攺益斍困窮雖飲氷食蘖以自將然求牧與芻之未獲置郵傳命喜聞君子之得輿升斗踈恩庶免波臣之涸轍其為忻懌罔旣敷宣賀黄運使除緫領申内躋郎省外緫餉臺西賔出幕之十年遂專主席東漕下車之三月盡緫賦輿人歆錫命之蕃上恨用公之晩恭惟某官器資凝逺業履端温言行夙擇乎中庸名實乆孚於上下頃嵗紅巾之変折衝白刃之間数進忠規刈葵惟恐其放手縱無恩澤徙薪豈下於焦頭共推江夏之無􅀟再試頴川之第一維駒維騏維駱暫紆苞栩之飛如熊如羆如􅆛孰飽樵蘇之㸑帝咨衆望僉曰公冝王人下視於諸侯有嚴天節郎官上應於列􅀫肯歷土山政令先庚而已孚軍民旁午以相賀田里愁恨嘆息乆已周知財貨本末源流尤皆􅀫講皮不存則毛將安傳唇旣亡則齒得無寒欲兵食兼足之沛然在制閫同心而已爾旣無間越秦之肥瘠何難圖韓范之功名某百無一能億或屡中頃進緫領甚稱之語蓋在咨諏周爰之􅀄兹聆除目之頒豈勝頓足之喜惟榮之􅀊租無五千斛而使所月觧近七萬緡昨頼管煎抱賣之贏用􅀘大科帶􅀘之欠近困井仙之後難施箕歛之苛在小郡官兵旣多空腸而大司符移尚理虚額巧但施於有麫窮莫甚於無錐與物為春望公如嵗今夕飲者恩明日按者法正累故人觀察急於賦刺史私於民願哀老子賀楊緫領九鼎升賢九列緫賦兩川無踰老臣乆望甲寅之報厥有成命足寛庚癸之憂除目一傳滿口交慶恭惟某官資弘且毅器博而周解十二牛而有餘才固髙於一丗繫千駟馬而弗視氣亦蓋於諸公天使之爲入蜀之星人以此卜擒胡之月知彼知巳漢中方務於養民擒賊擒王許下幾爲之避地徒縁食乏遂致師還皇欲我公身任此事爰峻上卿之拜俾專計相之權金掌月升光無不燭玉關夜閉守或有餘聊寛西顧之憂即聽東歸之命某聳聞出綍竊喜得輿敢問遲之遲長恐遭羣吠之恠可以速則速幸即遄四牡之驅通四川王緫領鈆代董制帥企郎􅀫之周天夙瞻景耀望使星於蜀野行挹餘光同是天涯莫非王事欲捈方寸之悃可無咫尺之書恭惟某官器度崇谹典刑炳蔚江左風流之後代不乏人襄陽耆舊之家丗濟其美恬於再轉翩若一麾日近長安謂即登於金馬天通蜀道又出護於木牛惟􅀜中餽餉之功實海内安危之本樵蘇後㸑今多􅀫飽之師弩矢前驅古有晝行之羡行詠勞還之四牡佇觀趣侍於六飛某起家單平􅂪恩優渥立朝巳濫况塵六典之卿試郡猶慙輙冒十連之帥躊躇四顧冒昧一來惟方國奉十行之書妄希宣布諒王人序諸侯之上亦願將明代回趙緫領不餉師天塹晉秩月卿峙乃糗糧坐給列屯之衆厲以爵禄冝登九州之命恭惟某官育德忱恂掞材膚敏方公私之積可哀痛孰與阜通顧財貨之出有源流當加斟酌朞年而變千里無飢載疇流馬之功冝進執羔之寵某阻陪賀旅先辱撝謙卿不同乎巳升華於元冕公歸無所㑹加􅂌於繡裳代董帥回楊緫卿交割榮駕駟車遄開犀印卿士惟月班通河海之間軍聲如雷驩溢􅀜山之外恭惟某官材弘且毅器博而周運斤成風解全牛於四顧䇿轡奔電洗凡馬而一空皇咨分閫之勲命亞執珪之位合東西而瞻使節共稱緫賦之有人分南北而立王庭何患擒胡之無日亟觀舎爵佇即歸班某有幸為寮又將徼福百里九十正􅀝同舟共濟之功一日三秋願叱􅀒弩前驅之效代回趙緫領不祥刑訓夏深愧曠官事典司冬猥令率屬冒恩有靦竊芘知歸恭惟某官給餽上流簡知中扆樵蘇􅀫飽知調度之賢勞衮繡晝行佇詔書之趣覲有華餘􅃳且及陳人某度其夕陽冝於野服猶曳鄭崇之履小立斯湏行巾元亮之車又奚惆悵代回四川陳緫卿咸陞卿九農給餉四蜀事權増重光弩矢之前驅氣色益明飽樵蘇之後㸑恭惟某官學宗洙泗秀禀岷峨介然忠勤屹立江流之砥見於調度傍流地上之錢致詳慮於講解之餘定經制於裁節之内粟塞其􅁃巳成末乃取闢之功印弄於庭冝有無以易堯之命庸進執羔之寵以彰流馬之勞正觀游刃之若新何慮強弩之巳末某僝功愒日得謝為期取御史於九卿之中行觀更迭序王人於諸侯之上願立斯湏代回湖廣趙緫領彦橚疇庸外府進位上卿禮樂光華旣茂明於調度貨財平凖兹益重於事權除目一朌輿言胥穆恭惟某官持心信厚臨事浚明恭懿篤誠繼髙陽之六子切磋磨􅅣蹈衛國之武公揚歷彌􅀷聲華甚茂兹肅將於使指俾緫視於軍儲曽不淹時巳聞奏最爰進四大夫之禄仍斡半天下之贏是亦平遷行有峻擢某未繇旅賀例辱巽牋卿不同乎巳陞華於元冕公歸無所㑹加寵於繡裳代回湖北錢緫領文子自違貝闕寖逺珠庭迹雖逺於行藏心實馳於賢德恭惟某官材全而業鉅學廣而聞多鞭霆駕風巳上蓬萊之島捫參歷井遽登蜀道之天飛芻遍給於列屯叱馭不辭於九折成功者去盍歸乎來惟是洞庭彭蠡之間實接夜郎牂牁之徼少湏澄按庶免繹騷當飢饉師旅之餘民亦勞止在諮諏詢度之事公優為之顧恐詔温不容席煖某腰黄無􅀘頭白思歸嬉􅀏文章良感􅀟魚之遺光華禮樂願遄四牡之驅遷召新榮眷委庸敬不敢煩瀆併幸照知代回淮西趙緫卿不儳陞卿九扈給餽列屯人自日邊恩榮晝錦之遣錢流地上師有􅀫飽之期下車云􅀄載路相慶恭惟某官直温而肅括明敏而䟽通早練逹於民庸洞講明於􅀖計懋轉輸之績飛不盡翰持經濟之材翔而後集屬邊防之小定惟糧道之孔艱爰興前席之思乆不見賈復念弄印而授無以易堯庸䟽執羔之榮俾專流馬之運序王人於諸侯之上姑驅馳數月之間求宰相於宗室之中㑹凌厲九人之後某託交惟舊話别方新闖伺眡􅀛正欲致燕雀之賀勤渠專􅀐乃先辱鯉魚之書徒華巾笥之藏莫遂䄡䄖之報梅亭先生四六標凖卷之二十二梅亭先生四六標凖卷之二十三宫城書藏都大賀新除州秦茶馬魏户部泌顯陟臺郎總提廐政文昌六部地官見謂之劇曹武􅀐萬營天府復專於隆委禄因德詔材與事冝恭惟某官心平而氣和人今而學古么侯子孫之必復固有丗臣名義􅀑神之難欺實由家學琮璧不雕而自貴鸞和隨動而有聲屹立䕫人之藩籬何翅晉陽之保障儉以足用節而愛人迄轉上聞首膺表選握蘭依烏之位内陪從於太微摘茗市駿之司外分節於少府職任昔分而今合事權滋重以不輕一洗空萬古之凡㑹如雲錦六經濟三尺之法歸近天顔輕破睡正濃之詩小試思無邪之斈某苦慙駑骨復飲蟇頥王良後造父先亦有馳驅之志汲黯戇寛饒猛恐非採掇之材代通制帥通四川趙茶馬彦綰分巴跡之旌旗濫膺守土占益州之分野知有使星欣竊庇之自今愧修辭之巳晩恭惟某官風猷凝逺天韻宏􅀷博極羣書太乙之藜相照文熖萬丈長庚之夢不虚藉未陳周召之詩書亦冝献間平之禮樂恬為丞之再轉甘出守之一麾刻銅虎之符洊揚美最護木牛之餉益茂膚公謂冝運海以􅅮鵬又使摘山而市駿周原之荼膴膴包以緗奩魯坰之馬駉駉爛如雲錦豈容黔突行有紫泥某頑頓之資踈鹵於事將指以出濫持天子之節旄無功而還不得月氏之要領敢意冒升於荷槖且令假守於銅梁有如凌兢何以全度東西之瞻使節儻未賦於旋歸前後之間清塵尚有餘於同味代回張茶馬子震純用茶馬事奏最蕃宣易司㩁牧卧雲而逼象緯榮分東壁之光摘山而市駿蹄益固西秦之圉恭惟某官味甘苦永心秉塞淵出乗兩腋之清風已親法駕勒回中道之奔電歸扞渇羌兹揚春山之旗乆擁東方之􅀐非環非玦上有􅀟鸞載馳載驅駕彼四牡取月􅇛三百片之羡包以緗奩供天子十二閑之湏爛如雲錦佇頒鳯夸趣扈龍旂某有味溪芽無心天秣烹玉澆過秦之論徒抱渇塵籋雲作徠漢之歌更觀逸足代錢塘趙縣丞通史都大彦的佐赤縣於京畿曽微善狀望繡衣於霄漢輙贄空函誠知使者之輶軒寜顧丞哉之㕔壁恃仁人之在上實善􅀋之焉依敢瀝寸丹敬裁尺素伏念某地寒無挾天賦甚慳濫綴族盟旣愧宗英之卓爾僅慿門䕃又慙舉首之褎然粗謹守於廉勤亦徒勞於州縣每發辛勤三十年之嘆若為扶摇九萬里之程頃賛武夷之六條及識文昌之八座青冥強箭妄希一發以五豝緑水寒波竟少九門之兩翼兹賛日畿之邑輒為露剡之謀冒於一來茫然四顧盡枿去牙角豈無對立之松槐託根借恩光誰念無言之桃李兹聞皇華之使實司造化之爐遂忘躍冶之嫌輙控問鈞之請恭惟某官清涵沆瀣峻禀扶輿若伊陟若咸賢合繼相門之相有封胡有羯末乃安常調之常五馬不受於二毛八駿又馳於四牡良弓良冶廣開槖籥之權鑄金鑄人緫出隂陽之炭圜法令行而禁止方兄昔歉而今豐㸃鐵成金實在一陶之巧匠鎔銅合頴即成百尺之浮屠代回史都大定之光奉宸綸眞持使蕩方千里而賦政乆歛惠於一州圜九府以通財遂褰華於数路恭惟某官人門有偉風調不凢番君得江湖之心不但蕃宣之績史公引漳鄴之利更髙城築之功暫司坯冶之權洞識貨財之本恩隆正任使以大名地上流錢㑹當􅁉子母之積階前生玉行將繼叔父之風某宻託隣光逺依夏庇六轡如組未遑瞻原隰之華萬物為銅願益㮊陶鎔之業代回鞏都大嶸杓􅂝龍角星駕賢勞氣轉鴻鈞天休滋至恭惟某官司存圜法贍足方今坯冶一陶財不期而豐美隂陽爲炭道巳長於泰交撫于五辰歛是百福某空糜囊俸猶綴槖班誤岀山林聚鐵巳難於鑄錯頌成椒相磨鈆聊具於報章代回鞏都大恭惟某官緫攝三官阜通九府錢流地上知鞭筭之奏功人自日邊佇軺封之􅃐覲代回鞏都大持槖無功􅂪誤恩之起廢飛箋為惠勤妙語之嘘枯有味其言不知所謝恭惟某官器資凝逺材諝深長時方多艱政有藉貨財之本公雖少屈亦足試陶冶之權行觀地上之錢流即聽日邊之璽召某投閑暮境躐貳秋卿燁然尺櫝之臨甚矣蒼顔之愧藏之十襲感厚意以無忘雖則七㐮覺報章之弗􅁛提舶代回市舶聶提舉周臣肅駕星軺緫司海舶舳艫千里有無得以懋遷胡越一家内外服其平凖是為膚使允屬通材恭惟某官丗濟象賢早騰燕譽青氊舊物蓋旋北斗之樞􅀞㦸凝香晚試南交之宅不嚴而化所去見思惟是嶺陬乆資碇稅扶胥黄木習廉介之具孚銀甕白環紛貢珍之並入貪泉酌水巳知呉隱之心祥飈送颿佇應孔戣之召某卜鄰有幸賀厦巳稽六秬五羊難續遊仙之夢尺書􅀟鯉空慙􅀉驛之情代回趙市舶怕鳯奏課分符乗軺司舶候風入貢固常聚蠻越之珍酌水獻箴要當試夷齊之飲聞君廉甚職此冝哉恭惟某官蔚若宗英濟之世美再試弦歌之政所去見思一陶􅃭袴之功不嚴而治惟時嶺外交貨海中然啇賈筭至舟車漢非得巳􅀂犀珠賄及僕􅀠唐巳病之今大夫不務冨其家則行旅必願出於市得人如此通國􅁛之某雖縻於兹行引而去露螢不暖安得照十二乗之車檣燕語留聊復答咫尺書之便卷之二十三梅亭先生四六標凖卷之二十四漕使
