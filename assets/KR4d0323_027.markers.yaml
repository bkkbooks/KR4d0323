  - {type: variant, offset: 26908, length: 317, content: 太平已見宋史王居安字資道黄巖人淳熙十四年進士授徽州推官連遭内外艱十年不調授江東提刑司幹官入為國子正太學博士遷校書郎改司農丞遷著作郎兼國史實錄院檢討編修官兼權考功郎誅韓侂胄實贊其决擢右司諫遷起居郎兼崇政殿説書上疏極言御史中丞雷孝友論其越職奪一官罷太學諸生舉旛乞留四明揚簡邂逅山隂道中謂此舉吾道増重江陵項安世致書曰左史人中龍也踰年復官知太平州威惠流行以龍圖閣提㸃浙西刑獄入對權工部侍郎以集英殿修撰知隆興府平峒寇徙鎮襄陽以言者罷閒居十有一年嘉定十五年與魏了翁同召遷工部侍郎甫兩月以集英殿修撰提舉玉隆宮未幾以寳謨閣待制知温州理宗即位以敷文閣待制知福州升龍圖閣直學士轉大中大夫提舉崇福宫㑹鹽冦起寧化命居安專任招捕降之即拜疏歸卒贈少保有方巖集行世, SBCK: ''}
