  - {type: line-break, offset: 0, content: '', id: KR4d0323_WYG_017-1a01}
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 賀喬樞宻行簡除參政兼知院成都運司作􅀳用真儒升參大政運籌决勝乆注意於安危當軸處中仍兼資於文武用人如此通國驩然恭惟某官廣渊而篤誠髙明而博厚好學本孔顔之學用心乃禹稷之心非仁義不陳於前雨露夙􅀷於獻納有謀猷則順于外風霆不顯其流形翊賛斗樞爕和天縡折衝尊爼鯨鯢服京􅀚之刑申畫郊圻鱗介慕衣裳之㑹然南北兩朝不能一統由東西二府分作兩􅂗今内治外治交急之時乃政柄兵柄合謀之日冝崇夙夜宥宻之任并䇿旦夕丞弼之功􅂫民力之中乾回夷情之内奰建乆安之􅀔而成長治之業杜羣枉之塗而開衆正之門嵗大旱而作霖啓沃良資於􅀓􅀃天未隂而徹土綢繆允頼於周公􅀖其永孚于休公有無窮之聞某雲邊輓粟雪裏聞麻回思太學之十年甞侍司成之丈席今三賢方施政於天下必無不獲之夫縱四牡非有功之使臣願鑒懷歸之悃代賀鄭簽書昭先除參政兼太子賔客顯用正人進參大政試之宥宻巳折衝樽爼之間􅀝以弼諧必銷患廟堂之上一賢得路四海傾心恭惟某官清任以和直方而大陽休山立粹爲廊廟之珍地􅀒海涵凛有社稷之器來從百里甫閱七年徧儀清切之司弥積均弘之望果由樞筦遂賛機衡作天子之股肱兼儲皇之羽翼惟公懋德相我受民式􅀚鼎鼐之調益永旂常之載某属拘郡組莫旅賔綦千萬間之􅂬顔旣􅀷賀厦三十幅之共轂尤慶得輿賀俞樞宻應符兼參政鼎升兵本晉豫政機立武有常將見五原之欵塞用儒无敵更􅀚三后之恊心膺一時稠疊之榮契千載明良之㑹恭惟某官材冝王佐智可帝師自其不辤小官之時巳􅀒將降大任之器夙夜宥宻甫參帷幄之籌乾坤清夷益結冕旒之眷旣兼資於文武盍並注於安危爰命宗工式兼亞相上帝將復髙祖德坐令趙璧之還皇天旣付中國民豈但齊疆之復惟股肱之􅀉在忠力則道德之威成安彊􅀖其永孚于休公有無窮之聞某夙蒙揃拂竟自沈冥直柄當􅁠恐不吝曲成之陶冶近畿入幕固未爲逺去於門墻賀陳簽書貴􅁩除參政兼同知成都運司作升參六政復翊洪樞仲子之辤三公夫固輕千鍾之禄曲逆之出六計終當遂萬物之冝一賢得輿多士舉笏恭惟某官直方而大智勇且仁早収麟角之科夙􅀒鼇頭之望讀孔璋之檄嚴嚴經國之文卧元龍之樓耿耿濟時之略四國茂蕃宣之績六條髙澄按之功登山有得於徐行乗舟惟恐其偏重禁中頗牧鼔舞號令之風雷氊上唐虞緝熈光明之日月迄由翰􅁐進陟機庭尊爼折衝京􅀚正鯨鯢之戮郊圻申畫介胄無蟣蝨之生立武事以有常顯真儒之無敵今南北分庭和戰未一則東西二府謀慮冝同爰籍前疑後丞之功入攄經文緯武之智邇人安逺人至憂民正急於憂邊大臣法小臣廉正已不難於正物相尊等耳時來爲之無謂於我如浮雲當念迨天之未雨不遐有佐無競維人某學旣拙踈法當憔悴十暑自安於絺葛一寒誰與之綈􅂁昔周旋元方之間亦欲學屠龍之技今疲敝益州之役良難見流馬之功忻聞黄麻之六經合入繡衣之九罭燕雀賀夏捲簾必念其差池蟋蟀鳴秋瑾户願徐於穹窒賀宣參政繒申命真儒顓參大政公輔間于兩社德因服而益彰天子必有四鄰官惟人而後備制書誕布􅂬頌交馳恭惟某官忠結主知道先民覺泰山喬岳無運動之迹人蒙􅃳而不知祥風和氣以長養爲心物有生而自遂與其參夙夜宥宻之􅀉不􅀂䇿旦夕承弼之功臣哉孰重於鄰哉賢者固識其大者今海内之事􅀔􅀂火未然公主上之信臣知風之自夷情外狡民力中乾即戎七年而無休息之期拓地千里而無堅凝之術使能定未保其能應則所憂將重於所欣實頼同心同德之臣亟合羣䇿羣力之助収草茅之公議而用之􅀖國推槐􅁄之和氣而逹諸閻閭非常之功待非常之人無窮之基有無窮之聞某﨑嶇巢幕冒昧掃門山甫舉之莫助之故妄陳於千慮原憲貧也非病也詎敢兾於一陶樞宻代賀禮部曾尚書從龍除簽書兼太子賔客登延駿望翊賛鴻樞增寳鼎九九之安國由人重齊泰階兩兩之色魁與台連廊廟得賢華夷胥慶恭惟某官造道自得經德不回一舉首登固有榮進之素定孤忠自立冝卑英俊之並游眷旣厚於兩宫名益髙於九牧果登宥府仍冠儲寮時來則爲之佇正乆虛之宰席年不可及也諒多仰羡於端門民無不獲之夫公有無窮之聞某逖聞成命倍動􅌚顔孤鶩落霞正􅀼垂天之庇六鰲抃地莫殫賀厦之悰賀薛樞使極成都運司作顓席紫樞均茵黄閣仲虺居薛冝登左揆之虛臯陶謨虞還􅀝右平之重有常立武無競維人恭惟某官學可帝師材堪王佐智周萬物炳蓍􅀛先見之明節貫四時凛松栢後凋之操周旋三省兩省之椽練逹一日二日之機合文武以兼資佩安危而注意熈帝載宅百揆民具爾瞻掌􅀖政統六師軍則誰與式端兵本專領使􅁠匈奴欵塞五原固出干羽之舞子房决勝千里正湏帷幄之籌帝曰}
