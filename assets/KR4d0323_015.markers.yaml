  - {type: variant, offset: 6, length: 0, content: '', SBCK: 紳極髙明道中庸強何虞於祍革上嘉羊祐輕裘之緩欲厲田單仗鍤之横肆分紫磨之真昭示黄河之信爲兵餽之何不受從革作辛匪伊垂之則有餘在師中􅁻向來衆口之鑠曾不累月而銷賜爾通天略吐胷中之十萬用汝作礪便㸔腰下之两重某聳聽夬揚阻陪旅賀寛營平先零之漕倘免褁屍賜賛皇于闑之珍尚祈拭目賀魏侍郎了翁賜金帶賜璽褒賢横金增秩書盈于閣進思緯國之文華帶錫之鞶昭示立朝之賔客登庸有漸賚爾非常恭惟某官根柢六經光芒五緯忠信篤敬學素得於書紳髙明中庸強何関於祍革一笑微生於偃月十年良耻於􅀝氷上應念徙薪之言人望還采薇之帥姑朌芝檢仍進松班申錫九鐶誰曰有常而循故庚金百鍊式彰從革之作新垂則有餘服無不斁褭蹏麟趾不由郿塢之貯儲鳯閣鸞臺端属趙家之世界無勤使請更覺道存横安平之金不難破狄解武侯之帶寕乆渡瀘衮以公歸礪資汝作某聳聞郵報切賀厦成兩赤重黄自異佩芄蘭之葉千紅萬紫寕能對松栢之柯頌詠惟深敷宣罔既代回嗣秀王師揆謝賜玉帯揚庭渙號分寳展親追琢其章璀璨簮紳之長温潤而澤彰施衮綉之光恭惟某官徳濬璿源望儲琳館合宫薦瑞恪陪圭邸之恭御府闡珍寕假玉之人琢萬釘錯落六服焜煌某未能造朝猶稽走賀揚休屹立更勤珠璧之投病骨難堪莫辦瓊瑶之報被召賀綿州髙知府赴召定子疇庸廉水奏計甘泉駕朱兩轓去載屹頽波之柱奉尺一詔兹辰趍文石之塗用人如斯通國幸甚恭惟某官參旗孕秀井絡載英師友卿雲黼黻交輝於河漢伯仲伊吕羽毛盍在於雲霄言從磊落之州茂著蕃宣之最適貔貅之狼狽委鴻鴈於犬羊一人之情千萬人之情親援桴而立鼓百歩而止五十歩而止紛棄甲以曵兵公獨作張雎陽之守城上不識顔平原之何狀兹令四輩趣覲九宸此行登仙冨貴乃緒餘之事惟公懋德功名留乆逺之㸔某屯蹇百罹暌離半世玷征夫之濡轡幸君子之得輿有德進則朝廷尊既聞耳矣所任賢則功施普當拭目焉回諸處賀召命匹雛無力乆動歸去來􅀆之思四牡何功誤叨詣行在所之命方切循孔墻之避未皇謝鄭轂之推敢意雲箋先馳霧驛恭惟某官璽書增秩斧綉生輝徳既厚於蘇枯道仍隆於㧞茹嘘是拂是起死草之華風縶之維之怜生芻之空谷齒牙所借羽翼斯成頋某欲拜威顔既愆膂力不能者止詎堪再傍於九関兆足以行或許退專於一壑徒勤褒􅅚但愧感藏謝趙制置彦呐安緫領癸仲賀辤召不允漕氷未解敢希全璧之歸戍雪將更誤玷予環之寵傴僂再三而引避威顔咫尺之難違此非左右之先容孰與吹嘘而送上伏念某志隨學落氣與年凋虛警空悲皆信書而成誤乾愁漫解覺行道之猶非自再泝於岷江已九鑚於巴火奉法循理奈倡矣而莫隨節用愛人愧行之之未盡毎覺匹雛之無力敢言四牡之有功招大夫以旌豈爲我設越小臣諸節亦厠旁招未敢隨召馹之塵但乞返屠羊之肆詎期巽櫝莫返渙揚此蓋制置某官以禮樂英爲詩書帥十七年干城之底績數百戰尊爼之折衝迄厲二矛重弓之威俾無疋馬隻輪之返草尺書而招賛普聞巳請降奬三軍而定中原即􅀚奏凱每借齒牙之餘論不遺毛髪之謭材致兹無用之人亦有罔功之奏此蓋緫領某官丗濟膚公家傳逺略卿月髙升於金掌陣雲連捷於玉関智運木牛師不憂於左次􅁠兼茗駿貢争效於右牽佇積勲庸徑登鬷假每借齒牙之重不遺毛毳之微致此湮淪許令敷奏某敢不益加黾勉復䇿駑庸雖無治聲塞海内寡二之問願陳民隱當雲中第一之歌謝利路髙提刑稼賀辤召不允氷漕終更誤玷予環之寵露章未允難從俟駕之私退循頂踵之歸皆出齒牙之借至勤下問尤佩髙情恭惟某官胷着千年材兼數器人或劫劫而不足公獨恢恢乎有餘􆇅之維之惟恐生芻之空谷嘘是拂是能吹死草之華風德既辱於蘇枯道亦隆於㧞茹致兹頑鈍亦預招徠某敢違威顔既愆膂力不能者止詎堪再傍於九関兆足以行或可退休於一壑梅亭先生}
