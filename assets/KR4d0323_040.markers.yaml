  - {type: punctuation, offset: 13459, content: (, id: KR4d0323_krp_040-bkkpn1582}
  - {type: variant, offset: 13459, length: 778, content: 見前代回喬運使行簡喬行簡傳升秘書郎為淮西轉運判官知嘉興府改淮南轉運判官兼淮西提㸃刑獄提舉常平詳啟意與本傳合餘見前短日舒長益永六螭之馭月令仲冬之月日短至隂陽爭諸生蕩又日短至則伐木取竹箭王符傳化國之日舒以長淮南子爰止羲和爰息六螭廣雅日馭曰羲和長淮清晏遥知四牡之功韓詩淮水出桐栢山東馳遥遥千里不能休揚雄傳天清日晏師古曰晏無雲也説文晏天清也三輔人以日出清濟為晏晏而温楊素傳東夏清晏嘉庸茂勣于是乎在對此令辰宜其遐福詩降爾遐福維日不足㳟惟某官和鍾玉律清徹氷壺俱見前聚人曰財坐斡流泉之運繫辭何以聚人曰財注財所以資物生者也食貨志擅斡山海之貨師古曰斡謂主領也讀與管同又貨寶於金利於刀流於泉布於布如淳曰流行如泉也噓物以氣潜回寒谷之温見前式遄其歸遄淳沿切説文往來數也爾雅疾也詩式遄其歸可拱而竢終軍傳斯拱而竢之耳某濫持荷槖阻捧栢觴歳時記元旦進椒栢酒栢是仙藥詳見前占卦六日七分是為道長易反復其道七日來復天行也利有攸往剛長也詳見前賀黄制置符脩身千二百歳請致祝規莊子黄帝問於廣成子曰敢問治身奈何而可以長久廣成子曰慎守女身物將自壯我守其一以處其和故我脩身千二百歳矣吾形未嘗衰韓文敢不敬蚤夜以求從祝規代回淮西徐運使煇緹灰襲候肇基來復之祥見前繡節臨邊茂介踐長之慶三朝志旌節唐天寶中置凡命節度使有司給門旗二旌一節一麾槍二豹尾二金節隋制也黑漆竿上施圓盤周綴紅綜拂八層黄繡龍袋籠之王公以下皆有節制同金節韜以碧油恭惟某官身兼數器薛宣傳經術文雅足以謀王體斷國論身兼數器有退食自公之節夙駕單車詩星言夙駕信陵君傳今單車來代之何如哉龔遂傳單車獨行至府張綱傳單車之職魏裴潜拜代郡單車之部互見前招來鴻鴈之民衆如雲集餽餉貔貅之旅令若霜嚴並見前宜對天統之辰律厯志天統之正始於子半丕擁日來之福易七日來復某屬拘朝綴莫旅賀絇絇權俱切禮記童子不屨絇注屨頸餙也鳴鳳律和知已宣於九徳尚書日宣三徳又九徳咸事牽牛晷短聊具報以七襄見前, SBCK: ''}
