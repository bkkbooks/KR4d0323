  - {type: variant, offset: 13, length: 230, content: 倅音翠說文副也副車曰倅周禮戎僕掌王倅車之政宋懲五季蕃鎮之弊乾徳初下湖南始置諸州通判命刑部郎中賈玭等充建隆四年詔知府公事竝須長史通判簽議連書方許行下時大郡置兩員餘置一員州不及萬戸不置廣南小州有試秩充通判兼知州者正刺史以上及諸司使副知州者雖小郡亦特置掌倅貳郡政與長吏均禮凡兵民錢榖户口賦役獄訟聽斷之事可否裁決與守通簽所部官有善否及職事修廢得舉刺以聞至景徳宋興三十四年户口寢息解州以滿萬户置通判自是諸郡多滿萬户矣宣和二年詔諸州茶鹽香礬竝委通判建炎初諸州通判二員減一員, SBCK: ''}
