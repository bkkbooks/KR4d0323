  - {type: variant, offset: 20120, length: 1383, content: 晉明帝紀王敦將舉兵内向帝宻知之乃乘巴滇駿馬㣲行至于湖隂察敦營壘而出有軍士疑帝非常人又敦正晝寢夢日環其城驚曰此必黄鬚鮮卑奴來也使五騎物色追帝帝已馳去劉夢得詩望夫人化石夢帝日環營賀薛太守師旦甲申是為寧宗嘉定十七年梅亭時年五十一歳籥在申驗乞漿之踰願説文籥本作龠樂之竹管三孔以和衆聲也律厯志龠者黄鍾律之實也躍㣲動氣而生物也釋名籥躍也氣躍而出古者取卯地之竹以為籥春分之音萬物振躍而出也蘇文屢更歳籥袁子正論太歳在酉乞漿得酒斗柄挿子盍挹酒以迎年韓詩元和庚寅斗挿子月十四日三更中詩維北有斗不可以挹酒漿封禪書黄帝時為五城十二樓以候神人於執期命曰迎年時維二千石之良循吏傳與我共此者其唯良二千石乎敷錫十萬户之福尚書皇建其有極斂時五福用敷錫厥庶民新唐書陳子昻傳一州得才刺史十萬户頼其福得不才刺史十萬户受其困國家興衰在此職也恭惟某官功參隂隲徳配陽休襦袴温然適應重緹之煖絲綸近只遹随一綫之添諒經伯趙司至之餘並見前即有薛侯來朝之命春秋隠公十有一年春滕侯薛侯來朝某身棲棠䕃心委葭灰見前陪五更三㸃之鵷行敢論交於結綬蕭育傳少與陳咸朱愽為友著聞當世往者有王陽貢禹故長安語曰蕭朱結綬王貢彈冠言其相薦達也依一寸四分之牛晷或委照於受廛尚書考靈曜冬至日月五緯俱起牽牛初劉向洪範傳冬至景一丈三尺一寸四分賀全州趙守必愿按本傳必愿差充兩浙運使主管文字再考特差充提舉安邊所主管文字差知全州陛辭奏乞下道江二州訪周惇頥之後餘見前魯雲必書暮映衡山之月趙日可愛曉行湘水之春全州有湘春樓在郡治西特惟大雅之英景十三王傳賛夫唯大雅卓爾不羣敘傳禮樂是修為漢宗英茂對細書之札恭惟某官道随剛長徳配陽休字民之仁温若重緹之律噓物以氣煖然五袴之歌諒觀荔挺而芸生益慶竹苞而松茂某襪材綫短並見前泥軾氷寒黄覇傳别駕主簿車緹油屏泥于軾前以章有徳三夀作朋請效魯頌萬千之祝詩三夀作朋如岡如陵萬有千歳眉夀無有害注三夀三卿也國之三夀考之卿與作朋友七日來復幸觀羲爻六二之辭易復六二休復吉象曰休復之吉以下仁也賀寶慶趙守善湛寶慶已見魯雲必書將召和於嶰竹見前趙日可愛况小憩於甘棠詩蔽芾甘棠勿翦勿敗召伯所憩毛傳憩息也維時循良茂介福禄恭惟某官以佳公子史記平原君翩翩濁世之佳公子也繼古諸侯王隠晉書郡守之權雖輕猶御千里比之於古列國之君也白集殷彪制今之郡守古侯伯也服政龍藩驗龍杓之回次寶慶府本唐邵州宋乾徳間陞為中州以理宗潜邸陞寶慶府故曰龍藩天文志杓攜龍角注杓斗柄也龍角東方宿也月令日窮于次月窮于紀星回于天潜心鴻寶佇鴻羽之來儀劉向傳淮南有枕中鴻寶苑秘書師古曰鴻寶苑秘書並道術篇名易鴻漸于陸其羽可用為儀吉履芸生荔挺之辰萃松茂竹苞之慶即歸北闕遂冠南班某半刺灰寒寸材綫短並見前空睆牽牛之景詩睆彼牽牛不以服箱注睆明星貌河鼓謂之牽牛了無展驥之能楚波有餘自是回春於燕谷並見前魯酒甚薄不堪賦雪於梁園莊子魯酒薄而邯鄲圍音義曰楚宣王朝諸侯魯恭公後至而酒薄宣王怒恭公曰我周公之𦙍勲在王室送酒已失禮方責其薄無乃太甚遂不辭而還宣王乃發兵與齊攻魯梁惠王常欲擊趙而畏楚楚以魯為事故梁得圍邯鄲言事相因也一説古者魯人不能為酒惟中山之人善釀美者醉人至千日魯人求其方不得有仕于中山者主酒家取其糟歸以魯酒漬之謂人曰中山之酒也一日中山之酒主來索而飲之吐而笑曰此余之糟液也奚其酒謝惠連雪賦歳將暮時既昏寒風積愁雲繁梁王不悦遊于兔園乃置㫖酒命賔友召鄒生延枚叟相如末至居客之右王乃授簡于司馬大夫曰抽子秘思騁子妍辭侔色揣稱為寡人賦之, SBCK: ''}
