  - {type: punctuation, offset: 20859, content: (, id: KR4d0323_krp_033-bkkpn2503}
  - {type: variant, offset: 20859, length: 1142, content: 玻瓈江即蜀江在眉州城外漢安帝以蜀都廣漢犍為為三蜀故名蜀江東坡送楊孟容詩我家峨眉隂與子同一邦相望六十里共飲玻瓈江回新神泉史知縣大川神泉本漢涪縣地晉僑置西充國以縣屬巴西郡隋屬金山郡開皇改神泉唐屬綿州宋置石泉軍以龍安神泉隸焉今廢神泉在縣西平地冬温夏沸氣如附子能愈衆疾今亦不驗矣依芙蓉之幕嘗辱贈言荀子贈人以言重於金石珠玉宰松桂之林未遑執訊韓詩出宰山水縣讀書松桂林詩執訊連連詳見前兹守鳴珂之里見前回劒門王知縣條還蒙投璧之光恭惟某官器宇宏深梁書朱异傳器宇𢎞深神表峯峻王僧辨傳器宇𢎞深風格詳逺丰神峻整陽休山立克世金魁之家玉潤冰清近續符溪之學衛玠傳玠妻父樂廣有海内重名議者以為婦公冰清女壻玉潤暫牛刀之小試即鶚表之交飛論坡頴歐蘇之文既聞耳矣食貨志既聞耳矣如淳曰聞於天子之耳嗣嚴揚陳李之響尚寓目焉嚴君平揚雄陳子昻李白皆蜀名人陳後山詩異人間出駭四方嚴王陳李司馬揚左傳得臣與寓目焉言得寄目某未果避堂見前先蒙枉駕拜闗雎五章之貺真盈耳以洋洋毛詩闗雎五章章四句正義云五章是鄭𤣥所分歌白駒一束之詩無遐心而皎皎詩皎皎白駒在彼空谷生芻一束其人如玉毋金玉爾音而有遐心正義云言乗皎皎然白駒而去之賢人令在彼大國之中矣汝於彼所至主人禮餼雖薄止有生芻一束耳當得其人如玉者而就之不可以貪餼而棄賢也餘見前回新都史知縣奉温新都在成都府北六十五里本漢舊縣屬廣漢郡後置新都郡晉徙新都郡治維縣仍屬焉梁置始康郡西魏郡廢隋改新都曰興樂縣後併入成都唐復置新都縣宋因之聞武城之歌未窺半面謝承後漢書應奉嘗詣彭城相袁賀賀時出行造車匠於内開門出半面視奉後數十年於路見匠識而呼之北齊書楊愔聰明强識半面不㤀毎有所召問或單稱姓或單稱名無有誤者後有選人魚漫漢自言猥賤獨不見識愔曰卿前在元子思坊騎秃尾草驢經見我不下以方麴障面我何不識卿漫漢驚服人調之曰名以定體漫漢果自不虛互見前讀阿房之賦敢靳一言靳居焮切韻㑹吝也粗欲無患其不公進學解行患不能成無患有司之不公敢冀有文以相接董仲舒傳粲然有文以相接驩然有恩以相愛此人之所以貴也恭惟某官玉壘名閥玉壘山在灌縣西北二十九里湔水所出左思賦包玉壘以為宇郭璞賦玉壘作東别之標杜詩玉壘浮雲變古今金魁故家文勝質質勝文不難百勝史記百戰百勝趙充國傳戰而百勝非善之善者也學優仕仕優學信是兩優戰青袍白紵之中東坡送李方叔詩青袍白紵五千人知子無怨亦無徳鏗緑綺黄鍾之韻梁元帝纂要古琴名有清角鳴廉修況籃脅號鐘自鳴空中繞梁緑綺焦尾鳳凰注緑綺司馬相如琴樂叶圖徵黄鐘生一一生萬物故君子鑠金為鐘比見天地人之策本本元元班固西都賦元元本本殫見洽閒漢書叙傳元元本本數始於一可知果達萟之材恢恢綽綽漫爾吹河東之賦俾之空冀北之羣其叨領竹符獲依枌社並見前於我本無怨而無徳詎敢收私室之恩見上文贈行不以頌而以規更願直大廷之對昌黎送許郢州序余與使君非燕遊一朝之好也故其贈行不以頌而以規, SBCK: ''}
