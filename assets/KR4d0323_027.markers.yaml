  - {type: page-break, offset: 0, content: '', id: KR4d0323_SBCK_025-2a}
  - {type: variant, offset: 1, length: 0, content: '', SBCK: 恤之心遥知叱馭而驅之㑹有解印而去者忠信缺矣蓄積缺矣暫勞􅀟節之馳錢榖幾何斷獄幾何佇對九宸之問某方依雲覆忽報星移雖難留有脚之陽春然尚冀驩顔於廣厦送我而入楚澤固猶恨逺水之􅃒思君而下渝州㑹問訊清溪之發其爲忻懌罔旣編摩賀新潼川王提刑禧奏最􅀚風詳刑易地天旋夔峽垂光來近於蔚藍星入益都載驟復歌於苞栩仁聲籍甚封部驩然恭惟某官從容以和洵美且直自為名進士之日蔚有古君子之風旣疇庸磊落之州合入從通明之殿顧煩􅀟節往控三巴蜂腰鶴膝之飢甿復盈膚革雀角䑕牙之滯訟洞燭肺肝古井無波陽春有脚還濡牡轡來顧鶴林禮樂言逺而有光况接郷閭之近刑罰不中則無措更兼倉􅁃之平雖則劬勞又復馳驅於原隰周爰咨度便當獻納於軒墀某乗障非材奉身受察五善重拜忻聞君子之得輿百拙一勤儻許小人之全璧其為頌詠未易編摩通劉提刑垕丹墀賜對繡斧詳刑君遣使臣固光華於在逺獄為司命必明謹而不留一賢􅀚風萬物吐氣恭惟某官器函方重識抱浚明胷中風月之無邊一塵不染筆下源泉之不擇萬斛而贏頃厭承明出將英盪以九畿施􅀖政天不違顔障百川回狂瀾海為縮足頋退湏於棨㦸復出駕於軺軒司長沙千里之平惟良折獄澄洞庭九州之大何擇非人從知察小大之情必不容上下其手周爰咨度即開衡嶽之雲􅁣然澄清何愧滄浪之水所恐思賢於宣室還當問路於脩門某起家一寒去國三暑强顔􅀝席昔慚洛下之生䈤尾對墻今􅀘黔中之佐雖云貳郡正􅀠六條廉不掩聾敢嘆丞哉之余􅀒戇今成癖亦惟使者之汝容通成都周提刑居信捫參歴井再為油幙之趨挹斗揚箕揔􅀠綉衣之察欲徹畸􅀌之名氏例湏耦儷之簡書斐然抽毫滂􅀂下汗伏念某學未聞道年不後人亦知冨貴之浮雲不如貧賤豈無名教之樂地何必事功直以飢驅為此禄仕西望太白窘峽水之倒流東訪蓬萊值海風而引去不謂詩書之元帥尚憐郷里之小兒表之鶚書隨以馬幣遂冐瞿唐五六月之險來訪巫山十二峯之髙揆材地以闕然託使天而近只恭惟某官人今而心古行峻而氣平少年公瑾之綸巾豈甘寂寂他日伯仁之金印徑可纍纍居然盤旋州縣之間無乃培飬廊廟之業勇訪半輪之月徑登九折之􅂗載酒凌雲頓釋里閭之愁嘆埋輪當路欲周原隰之咨諏何敬非刑惟明克允歛此大惠亦旣洽魚鳬之民訖其外庸即歸接䕫龍之武尚念某不逺萬里來奉六條安於小官而不辭亦惟君子之易事昔在嚴公幙聞俱為蜀使之知難甘原憲貧或竊效貢公之喜通潼川丁提刑必􅁛登蜀猶天撫塵蹤而自嘆仰韓如斗瞻熒次以非遥敢裁小子之斐然敬告大夫之賢者伏念某才踈而力腐少賤而長窮託疲􅒒於山林未能辟糓繫飢愚於簮笏却媿伐檀居然四十之頭顱孰是尺寸之竹帛頃自湘濱之憔悴誤為錦里之逢迎半路迍邅竟勤回於俗駕三年飄忽難重入於禮羅不謂再剖符之文翁未廢三折肱之韓子撰書詞而具幣又委重焉扃岫幌而掩􅀜旣無及矣惟是居攸之禕允之任却愧乏儀之群􅀶之材治法征謀逼人已甚臺評幙辯忤物亦多未論雞犬之求仙誰許􅀛魚之託䕃恭惟某官器資凝逺材具寛宏􅀞棟朱簾屈平蠻之籌䇿清江碧嶂蔚治郡之功名謂冝進之清朝庶可行其素學居然龍節戾止􅅙叢禮樂言逺而有光斯言信矣刑罰不中則無措自古謹之有如使者之賢足􅀉欽哉之恤綉衣持斧寜乆滯銅官之山簮筆荷囊行入侍玉皇之案尚念某藐無所挾誰適與容燕谷自寒敢望春風之披拂呉舡未辦尚依夏屋之帡幪通湖南楊提刑楫晨入太學之下曽識明師曉行湘水之春今依膚使禮有嚴於事大書敢廢於恭先恭惟某官守道眞儒庇民正學自其驅馳於外不辝小官固知磅礴於中而可大受由子男之百里洊賔客於諸侯廪給百司簿正九扈人皆疑其婉晩公何有於鄙夷圜橋億萬人甫知矜式起家二千石忽有薦揚上憐皖伯之􅀖乆缺桐君之政徒得君重無俾民憂一札細書朝聞命而夕引道三年成聚今有袴而昔無􅃭孰期清絶之郷又缺皇華之使爰將隆指出揔祥刑德星臨翼軫之間楚氛已靖仙槎來雲漢之表衡嶽頓開遥知登車之􅁣然必有解印而去者周爰咨度胡不均弘某副墨謏聞勾朱末属譬諸川澤之下獨何蕃歟不知酃醁之前有賈生否適是褰帷之始欣然􅀕竈之榮簿領中有是人耶非敢望也夫子甞為委吏矣能勿誨乎代回䕫路李憲􅘊奏最涪江按刑巫峽于蕃而歴四國所去見思察州而奉六條其有所試恭惟某官分輝井絡擅秀岷峨名父子之天資璵璠之器難弟兄之家學金玉其相環轍乆之褰帷晩矣惟良折獄何擇非人送以禮樂而有光旣􅀷簡在編之詩書而無媿願益周爰某􅉥逺莫前賀成巳後三巴䟽鑿雖莫瞻繡斧之持六轡馳驅猶願謹衣篝之護代回浙東譙提刑令憲􅀞㦸奏功繍衣䟽寵專城作牧旣優撫字之材一道􅀚風更展澄清之志有嚴星駕増重日畿恭惟某官蓄德奫􅀷禔身肅括郎潜甚乆不矯丗以為中卿列彌髙忽抗章而請外􅀉隆名於壁府歛大惠於金華民欲借君於一年公已報政於五月進之甸服􅀉以獄平逺有光華况近長安之日周爰咨度已接蓬萊之雲某甚慶得輿未遑削牘儻無雀角可使圜扉之空似是馬曹亦竊廣厦之芘代回陳提刑守藩弗績扁舟欲問於呉江攺組有嚴輿轎俾踰於関嶺方露章而請免倐雲翰之寵貽愧非所􅂪願􅀼有復恭惟某官抱材膚碩蓄學崇谹右墄左平獻納盍司於清切上原下隰咨諏乆屈於皇華旣潜消佩劔之風又宻移珥筆之俗日月之貴名方起乾坤之新渥必蕃諒凢吾味之同皆借君波之及某罙入其阻兆足以行共飲玻瓈之江已有􅀝蒹之幸或入鳴珂之里尚希拔薤之規代回提刑樂郎中繍衣平糴乆勤周道之馳驅丹筆祥刑更奉漢條之寛大民非攺聚官不易方雖四海之望未饜然重湖之幸何厚恭惟某官器資凝逺德履直方摩蜀道之青天􅉘虎莫投其距歌郢中之白雪犬羊難肆其腥名大震於京師材合居於給諌惟是山海之征搉難損一雞欲其財貨之懋遷是資四牡遂煩英節來按蒸湘皇皇原隰之華民無遺便暴暴丘山之積居有積倉公􅀂違之他􅀖民必争於境上惟良折獄何擇非人旣無得而易堯信莫如於借㓂衡雲攺􅀚頓令山嶽之自摇湘水澄波便覺江河之易避第虞詔紫不俟突黔某辱託比肩每􅂪合志勞來還}
