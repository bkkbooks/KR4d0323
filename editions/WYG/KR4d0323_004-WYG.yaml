body:
  text: 四六標準巻四宋李劉撰舉科目宋史選舉志凡六門一曰科目二曰學校試三曰銓注四曰補䕃五曰保任六曰攷課謝劉閣學光祖舉節操方正可僃獻納科宋史劉光祖字德脩簡州陽安人登進士第累官起居郎集議卜孝宗山陵與朱熹皆謂㑹稽山陵土薄水淺乞議改卜熹與祠光祖再疏畱之劉德秀劾光祖出為湖南運判不就韓伲冑擅朝目士夫為偽學光祖撰涪州學記諫官張全指為謗訕謫居房州侂胄誅召除右文殿修撰知襄陽府進寳謨閣待制知遂寧府改京湖制置使以寳謨閣學士知潼州府嘉定十五年卒諡文節趙汝愚稱其論諫激烈似蘇軾懇惻似范祖禹世以為名言遠客從軍自分塵埃之内鄭吉傳以卒伍從軍數出西域王粲從軍詩從軍有苦樂但問所從誰漢詩十五從軍征八十始得歸左延年從軍行苦哉邊地人一歲三從軍又從軍何等樂一驅乗雙駁梁江淹從軍詩從軍出隴北長望隂山雲隋孫萬壽詩郗超初入幕王粲始從軍李詩從軍玉門道逐虜金微山王維詩簇甲從軍易風雲識陣難近臣薦士許司雨露之邊杜詩獻納司存雨露邊地分清切任才賢以仞牆則未窺栁文杜黄裳為相有牆仞不佞以謀又難窺夫子牆唐文粹烏可究其津涯而窺其牆仞且尺牘之不貢陳遵傳與人尺牘文選盡言非尺牘敢謂暗中之摸索怱蒙送上以吹嘘此難求之今人斯可稱曰知己俱見前竊以為臣止於敬皆有陳善閉邪之心事君致其身豈無明目張膽之志大唐新語韋仁約彈右僕射褚遂良遂為同州刺史遂良復職黜仁約為清水令或慰勉之仁約􅍟曰僕守狂鄙之性假以雄權而觸物使發丈夫當正色之地必明目張膽不能碌碌為保妻子也自方正為賢良之號漢文帝紀二年詔舉賢良方正能直言極諫者以匡朕之不逮武帝紀建元元年詔舉賢良方正直言極諫之士而獻納歸侍從之班隋唐嘉話武宗即位謂兩省為侍從班視嘉言罔伏之時尚書嘉言罔攸伏無不諫亦入之意詩不聞亦式不諫亦入然元祐十科之創建不落第三宋史選舉志元祐中司馬光為相奏請設十科舉士一曰行義純固可為師表科有官無官人皆可舉二曰節操方正可僃獻納科舉有官人三曰智勇過人可僃將帥科舉文武有官人四曰公正聰明可僃監司科舉知府以上資序五曰經術精通可僃講讀科六曰學問該博可僃顧問科七曰文章典麗可僃著述科以上有官無官人皆可舉八曰善聽獄訟盡公得實科九曰善治財賦公私俱便科十曰練習法令能斷請讞科以上舉有官人應職事官自尚書至給舍諫議寄祿官自開府儀同三司至大中大夫職官自觀文殿大學士至待制每歲須於十科内舉三人仍具狀保任中書置籍記之其人任官無狀坐以謬舉之罪詔皆從之至紹興五載之選掄以此居一宋史選舉志紹興三年復司馬光十科蓋象龍亦有致雨之理法言象龍之致雨艱矣哉龍乎龍乎淮南子土龍致雨許愼注云湯遭旱作土龍以象雲從龍也唐牛僧孺象化説象龍禱雨三月不應巫病民盜王甚愁孺有言曰王無愁也象之誤也夫龍善化雨而時乎在天天使雨龍得化不使雨龍不得化聖人象龍而救民是乃象其化者也而存羊實餘愛禮之心儻非其人難稱此意如某學未聞道年不後人陳後山集聖俞以詩名家仕不前人年不後人可謂窮矣好論古今未離舉子之習氣東坡詩習氣尚饞貪又多情好事餘習氣又書生習氣未能無儳説得失不過處士之大言儳音讒又仕陷切説文儳互不齊也廣韻輕言也又參雜也禮記母儳言朱氏曰謂儳長者之先而言後漢書孔僖傳鄰房生梁郁儳和之注儳謂不與之言而傍􅍟也方術傳論處士純盜虛名無益于用東坡答李端叔書妄論利害儳說得失此正制舉人習氣譬之􅇋蟲時鳴自鳴自己何足損益又上皇帝書賈生固天下之奇才所言亦一時之奇䇿然請為屬國以繫單于則是處士之大言少年之鋭氣夲浪為錦城雪嶺之觀杜詩煙塵犯雪嶺又雪嶺界天白錦城熏日黄乃輒與祈山天水之役蜀志諸葛丞相率諸軍攻祁山南安天水安定三郡叛魏應蜀關中響震郡國志祁山在成州長道縣東十里漢水逕其南有諸葛武矦壘壘之左右猶有豐草葢武矦所植也圖經云祁山去秦之天水縣三十里山圍六七里髙數十丈晉志天水郡漢明改漢陽治上邽魏為重鎮晉分為天水及武陽兩郡兼置秦州唐為秦川空有幕中之辯見前竟無堂上之奇文選張協詩何必操干戈堂上有奇兵誰誤聽聞忽蒙論薦我於辭命則不能也謾稱春藻之葩曹植文章序質素也如秋蓬摛藻也如春葩山谷詩挽條咀春葩韓詩天葩吐奇芬人之彦聖其心好之浪許秋竿之節白樂天詩無波古井水有節秋竹竿平生失在小丈夫之悻迺今亦有大君子之知所可䝿者遇大賢韓子所以賀矦喜昌黎薦矦喜狀其人自言為閣下所知面有矜色曰矦喜死不恨矣愈感其言賀之以酒謂之曰盧公天下之賢刺史也未聞有所推引葢難其人而重其事耳今子鬱然為選首其言死不恨固宜也身在貧賤為天下所不知獨見遇於大賢為可貴耳不待求而後施德柳侯於是感崔卿柳河東上大理崔大卿應制舉啓古之知己者不待來求而後施德舉能而已其受德者不待成身而後拜賜感知而已故不叩而響不介而合則其舉必至而其感亦甚不謂古心韓文孟生江海士古貌又古心復見今世兹蓋伏遇某官四朝壽俊尚書罔或耆壽俊在厥服一世眞儒法言魯不用眞儒故也如用真儒無敵于天下夲夲元元所學皆周孔之學漢書叙傳元元夲夲數始于一班固傳元元本本殫見洽聞韓詩生平企仁義所學皆周孔孜孜汲汲此心即禹稷之心尚書予思日孜孜禮記皇皇然汲汲然如有追而弗及也胷中風月之無邊山谷集舂陵周茂叔胷中灑落如光風霽月筆下源泉之不擇陳後山詩筆下源源赴百川使天下之大老二盍歸乎來則匈奴之長技三亦何所措鼂錯傳上下山阪出入溪澗中國之馬弗與也險道傾仄且馳且射中國之騎弗與也風雨疲勞饑渇弗困中國之人弗與也此匈奴之長技也匈奴之長技三方居家而為善後漢書問東平王處家何等最樂土言為善最樂思報國之以人若為控地之飛莊子我決起而飛槍榆枋時則不至而控於地而已矣亦入牋天之剡山谷詩此事可牋天公蘇子美愛愛歌此樂亦可牋天公某敢不圖惟報稱益自激昂王章傳不自激昂待以國士待以衆人何敢作厠中之報豫讓傳乃變名姓為刑人入宫塗厠中挾匕首欲以刺襄子襄子如厠心動執問塗厠之刑人則豫讓内持刀兵曰欲為知伯報仇不負天子不負所學庻免為門下之羞舊唐書陸贄傳贄以受人主殊遇不敢愛身事有不可極言無隱朋友規之以為太過䞇曰吾上不負天子下不負吾所學不恤其他謝李參政璧舉獻納科宋史李璧傳璧字季章眉之丹稜人少英悟日誦萬餘言周必大見其文異之曰此謫仙才也歴官參知政事端明殿學士進資政殿學士致仕諡文懿塵纓解縛方將發興於雲山北山移文昔聞投簪逸海岸今見解蘭縛塵纓宗衮垂襃欲使司存於雨露文選阽危頼宗衮餘見上條喜固多於溢美莊子兩喜多溢美之言恥乃在於過情其殆無私之私豈容不德其德老子上德不徳是以有德竊以士無賢不肖俱欲希一世之知德不孤有隣亦樂道諸人之善葢近來仕進之徑唐書盧藏用初隱終南山後出仕司馬承禎甞召至闕下將還天台山羣公祖道藏用指終南山曰此中大有佳處何必天台承禎徐曰以余觀之此乃仕塗之㨗徑耳藏用大慙或罕由薦舉之門心肯命通底勞介紹見第二巻上宣同知條言甘幣重自有夤縁左傳幣重而言甘誘我也韓詩青璧無路難夤縁宗臣之考十科夲為何事曹參傳贊為一代之宗臣師古曰言為後世之所尊仰故曰宗臣也杜詩居守付宗臣又宗臣集精選冡宰之計羣吏不出此途周禮太宰之職三嵗則大計羣吏之治而誅賞之注三載考績遂令牋天之章僅作畫地之餠俱見前然某所見與衆則殊樂莫樂兮相知止願出大賢之門下屈原九歌樂莫樂兮新相知韓文諸公要人爭欲令出我門下得不得之有命寧須商小利於楮中韓文商財賄之有無山谷集計楮中者心醉于九九矧如不腆之蹤見前可謂所持者狹史記滑稽傳臣見其所持者狭而所欲者奢識字有數學何有於多聞了事亦癡才豈周於庶務詳第三巻謝衛參帥舉關陞條質不足以望粹然之器文不足以窺作者之藩柳詩難窺夫子牆莊子吾願游其藩宜諸公臺省之登庸杜詩諸公衮衮登臺省任此士江湖之落莫山谷詩天恢獵德網日饎養賢鼎此士落江湖熟思令人癭韓詩吾相兩優游他人雙落莫繄誰欺於裁鑒繄音衣語助左傳繄我獨無羌忽累於眀揚羌音腔發語端楚辭羌中道而改路又羌内恕已以量人兮注猶乃也尚書明明揚側陋方正乃賢良之科必名門而後稱見上條獻納蓋侍從之事豈俗吏之能為賈誼傳類非俗吏之所能為也况去國十三年之餘閱人多矣葢寛饒傳富貴無常忽則易人如此傳舍所閲多矣陸機文川閲水以成川世閲人而為世北齊書王晞曰我少年以來閲要人多矣房𤣥齡傳髙孝基曰僕觀人多矣未有如此郎者唐韓滉有知人之鑒見楊於陵甚悦曰吾閲人多矣無如楊生貴而有壽山谷詩小夫閲人葢多矣東坡詩此帶閲人如傳舍今起家二千石之薦舉世觀焉楊雄傳丁傅董賢用事諸附離之者或起家至二千石不應凡材猥玷異目此葢伏遇某官清朝良弼尚書夢帝賚予良弼名世真儒錬色石以補天親揮九日列子天地亦物也物有不足故女媧氏煉五色石以補其闕山海經大荒之中暘谷上有扶桑十日所浴九日居上枝一日居下枝皆載烏淮南子堯時十日竝出草木焦枯堯命羿仰射十日中其九烏皆死墮羽翼晉傅𤣥詩湯谷發清曜九日棲髙枝郭璞十日贊十日竝出草木焦枯羿乃控弦仰落陽烏可謂洞感天人懸符觸佞山而還里坐閱一星史記三皇記共工氏與祝融戰不勝而怒乃頭觸不周山崩天柱折地維闕劉向傳去佞如㧞山左傳一星終矣李璧傳御史葉時論璧反復詭譎削三秩謫居撫州後復官提舉洞霄宮久之復以御史奏削三秩罷祠甫尋川路之風煙杜詩川路風煙擾俱宜下鳳凰適值岡巒之烽火杜詩萬國盡征戍烽火被岡巒内嚴殄捕外示招懷李璧傳璧復除端明殿學士知遂寧府未至而潰兵張福入益昌戕王人略閬剽果至遂寧璧傳檄諭之福等讀檄泣下約解甲降㑹官軍至挑賊賊忽盡燔其城璧馳書大將張威使先斷賊汲路與糧道以長圍法授之威用其謀賊遂平璧尋引疾奉祠賊憚崇文之名如杵投臼韓文元和聖德詩是日崇文入處其宇闢窮見窘無地自處俯視大江不見洲渚遂自顛倒若杵投臼民誦西平之子惟我有臣柳文平淮夷雅蔡人率止惟西平有子西平有子惟我有臣李璧傳璧父燾典國史孝宗甞問燾卿諸子孰可用燾以璧􅍟璧父子與弟􅌫皆以文學知名蜀人比之三蘇云俊乂宜在於旁招尚書旁求俊彦巧拙猥容於雜進韓文登明選公雜進巧拙有如庸下亦僃數中某敢不勉自激昂圖惟稱塞有吏材更世事媿非臨川老子之倫六一居士集薦王安石呂公著劄子王安石德行文學為衆所推守道安貧剛而不屈久更吏事兼有時才曾召試館職固辭不就絶當世追古人敢忘眉山端明之薦宋史黄庭堅傳蘇軾為侍從時舉庭堅以自代有瓌偉之文妙絶當世孝友之行追配古人其重之也如此謝任尚書希夷舉著述科上命公以納言甫膺隆委尚書命汝作納言公報上而薦士宜首異材吳良傳為國所重必在得人報恩之義莫大薦士是何濡滯出晝之人辱此吹嘘上天之賜杜詩惟待吹嘘送上天名充著述實發兢慙某聞簡厥修簡其不修古不謂之恩地尚書簡厥修亦簡其或不修觀其主觀其所主近反類於市區然而推賢揚善之盛心乃是輔國長民之元氣眇然一世知此幾人司馬公請建十科夲為何事崔祐甫盡除羣吏不假此途俱見前謾勤為天啓齒之勞山谷詩佳人何時來天為啓玉齒間有畫地作餠之笑魏志盧毓傳選舉莫取名名如畫地作餅不可啖也如僕所見與衆則殊蓋伯牙之絶朱絃特為知者呂氏春秋伯牙鼔琴鍾子期聽之方鼔琴而志在泰山鍾子期曰善哉鼓琴巍巍乎若泰山少選之間而志在流水鍾子期又曰善哉乎鼔琴湯湯乎若流水鍾子期死伯牙破琴絶絃終身不復鼔琴以為世無足復為鼓琴者非獨琴若此也賢者亦然山谷詩朱絃已為佳人絶青眼聊因美酒横如虞卿之取白璧是有命焉史記虞卿者游説之士也躡蹻擔簦説趙孝成王一見賜黄金百鎰白璧一雙再見為趙上卿故號為虞卿韓文是有命焉不可幸而致也第令收名定價於大君子之門何必商功計利於賤丈夫之隴韓文商財賄之有無計班資之崇痺況歐陽公不能挽聖俞之逹見第三巻謝衛參帥特薦條而東坡老亦難拔方叔之窮宋史李廌傳廌字方叔蘇軾謂其筆墨瀾飜有飛沙走石之勢拊其背曰子之才萬人敵也鄉舉試禮部軾典貢舉遺之賦詩以自責與范祖禹將同薦諸朝未幾相繼去國不果物固假於氣嘘命實通於心肯見第二巻代上宣同知條況某無狀史記鯀之治水亡狀賈誼傳自傷為傅亡狀師古曰亡善狀章帝紀刺史明加督察尤無狀者注言其罪惡尤大其狀無可寄言故云無狀觸事多畸畸通作奇不耦也荷鋤而耕寛閒只傷地脉韓文耕於寛閑之野釣於寂寞之濱餘見前乘槎而游汗漫又犯天河見前無端讀書韓詩今者無端讀書史有時為養既痛三千鍾之弗洎見前又瀕四五十之無聞小材不離於小官已知安分董仲舒傳小材雖絫日不離于小官賢材雖未久不害為輔佐大慙或謂之大好人自過情見前馴致誤執事之知易馴致其道欲令僃弟子之列韓文若世無孔子不當在弟子之列先唱之矣又唱之矣肯引去蓬萊之風船柳文答貢士元公瑾論仕進書足下之文左馮翊崔公先唱之矣秉筆之徒由是增敬足下之行汝南周頴客又先唱之矣逢掖之列亦以加慕餘見前昔謂斯何今謂斯何卻囘作瞿唐之煙棹韓文昔者人謂斯何今者人謂斯何僧圓澤詩吳越山川尋已遍却囘煙棹上瞿唐旁觀千丈之落韓詩失勢一落千丈强自計三寸之存平原君傳毛先生以三寸之舌彊于百萬之師蒯通傳掉三寸舌下齊七十餘城張良傳以三寸舌為帝者師張儀傳視吾舌尚在不其妻笑曰舌在也儀曰足矣心不同兮媒勞委禽勿強屈原九歌心不同兮媒勞恩不甚兮輕絶左傳強委禽焉射有似乎君子正鵠是求敢圖進退之間偶合髙明之見孔融傳髙明必為偉器徑持典麗舉及妄庸見前皇帝曰嘻徃贊碧幢之帥韓文皇帝曰嘻豈不在我方干詩問津求拜碧油幢武元衡詩碧幢遙隔霧紅斾漸依山詳見前翰林為主入言墨客之卿揚雄傳聊因筆墨為文章故藉翰林以為主人子墨為客卿以諷不以昧於時宜為俗儒是可稱於天下曰知己韓文感恩則有之矣將以稱於天下曰知己知己則未也兹葢伏遇某官眼髙四海東坡詩眼髙四海空無人胷著千年陳后山詩胷中歴歴著千年筆下源源赴百川盛之白玉堂辭足以鼔天下之動陳后山詩大科異等固其常小却盛之白玉堂法言鼔萬物者其雷風乎鼓萬民者其號令乎拜於青瑣闥學足以格君心之非漢舊儀黄門屬黄門令日暮入􅍟青瑣門拜名曰夕郎龍墀引聽履之星辰舊唐書劉棲楚傳以額叩龍墀出血苦諫韓渥詩靜時閒語上龍墀杜詩聽履上星辰鶴禁賓重離之日月漢宮闕疏鶴宫太子所居凡人不得輙入故曰鶴禁列仙傳周靈王太子七月七日乘白鶴駐山顛謝時人而去後世稱太子之駕曰鶴駕禁曰鶴禁易明兩作離大人以繼明照于四方是固見耐官之器杜陽雜編朱泚始亂長安源休姚令言為偽宰相日益自負乃收圖書貯倉廪作蕭何事業休語偽黄門侍郎蔣諫曰若度其才即吾為蕭姚為曹耳識者聞之謂休不耐官職五朝名臣言行録向敏中除右僕射麻下日翰學李昌武當􅍟眞宗謂之曰朕自即位未嘗除右僕射今日以命敏中此殊命也敏中應甚喜門下賀客必多卿徃觀之昌武往見門無一人乃具以所見􅍟上笑曰敏中大耐官職孰能知憂國之心大厦非一木之枝故椳闑扂楔與欂櫨而竝蓄韓文大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其宜施以成室者匠氏之工也小市無千金之藥故芝苓參术合薑桂以兼收灌夫傳適有萬金良藥舊唐書元行沖傳嘗謂狄仁傑曰下之事上亦猶蓄聚以自資也譬貴家儲積則脯腊膎胰以供滋味參术芝桂以防痾疾門下堪充百味者多願以小人僃君藥物韓詩外傳薑桂因地而生不因地而辛禮記必有草木之滋焉以為薑桂之類也急求燭武則無以重朝廷左傳晉秦圍鄭佚之狐言于鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉從之近捨皇甫則無以勸巖穴新唐書皇甫湜傳裴度辟為判官度脩福先寺將立碑求文於白居易湜怒曰近捨湜而逺取居易請從此辭度謝之湜即請斗酒飲酣援筆立就度贈以車馬繒綵甚厚湜大怒曰自吾為顧況集序未嘗許人今碑字三千字三縑何遇我簿耶度笑而從之雖隻字片言之無用陸機謝平原内史表片言隻字不關其間東坡詩隻字片紙皆收藏亦三光五嶽之所分劉夢得栁文序八音與政通而文章與時髙下三代之文至戰國而病秦漢復起漢之文至列國而病唐興復起夫政龎而土裂三光五嶽之氣分大音不完故必混一而後大振不忍棄捐髙適詩直道常兼濟微才肯棄捐力加收拾韓詩無人收拾理則那又收拾不可遲何其久也必有以也知己在於遣中詩何其處也必有與也何其久也必有以也注黎之臣子言我君何以久畱于衛必以衛有功德于我故也典略州郡被詔書有軍功為長吏者當沙汰之劉僃疑其遣中韓文中山劉夢得亦在遣中我儀圖之愛莫助之亦漫為之言上見前感知而已柳文其受德者不待成身而後拜賜感知而已勿謝可乎某敢不圖稱所蒙羊祜傳臣雖小人敢縁所蒙念存斯義力鞭其後莊子善養生者如牧羊然視其後者而鞭之舍文章之小技杜詩文章一小技勉節義之大閑新唐書卓行傳贊節誼天下大閑士不可不勉孔明之栢四十圍香葉試尋於鸞鳳杜詩孔明廟前有老栢柯如青銅根如石霜皮溜兩四十圍黛色參天二千尺苦心豈免容螻蟻香葉終經宿鸞鳳任公之竿五十犗大鉤㑹掣於鯨鯢莊子任公子為大鉤巨緇五十犗以為餌蹲乎㑹稽投竿東海犗居拜切説文騬牛也廣韻犍牛也增韻凡畜健强者皆曰犗代虞制參謝劉閣學光祖舉科目詳啓意制參名剛簡允文之孫子珏知連州孫伋翰林編修徙居臨川曽孫集元奎章閣學士槃湘州判官著辯國語集子安民知安福蓋以文學科第世其家者詳見下方梧幕綴員曾微寸善杜詩清秋幕府井梧寒獨宿江城蠟炬殘永夜角聲悲自語中天月色好誰看荷囊薦士猥玷異科野客叢書前輩謂尚書紫荷囊事荷乃負荷之荷人誤讀為平聲雖歐陽文忠公宋景文公有所不免僕謂不然唐類表有云佩蒼玉負紫荷沈約宋志蕭子顯齊志皆曰紫祫囊俗呼曰紫荷隋志朝服綴紫荷則是紫荷之説自晉宋以來有之矣予之豈以為私受者未能無愧葢知爾而羞獻納嘗聞摩詰之詩王摩詰送邱為落第歸江東詩憐君不得意况復栁條春為客黄金盡還家白髮新五湖三畞宅萬里一歸人知爾不能薦羞稱獻納臣若依劉而增感傷已發仲宣之賦魏志王粲字仲宣山陽高平人年十七除黄門侍郎以西京擾亂不就乃之荆州依劉表表以粲貌寢而體弱通侻不甚重也文選注仲宣依劉表登江陵城樓懷歸作登樓賦述進退危懼之情其略云登兹樓以四望兮聊暇日以銷憂心悽愴以感發兮意忉怛而㦧惻杜詩徑欲依劉表還疑厭禰衡殆主擇客則客亦擇主馬援傳當今之世非獨君擇臣也臣亦擇君矣使官求人則人不求官晉愍帝紀贊選者為人擇官官者為身擇利南史何尚之傳官當圖人人安得圖官自甘桃李之不言李廣傳桃李不言下自成蹊誰識蘋蘩之可薦矧如剛簡虞允文傳允文出入將相垂二十年子三人公亮公著杭孫孫八人皆好脩唯剛簡最知名嘉定中召不至終利路提㸃刑獄按虞剛簡與魏了翁范仲黼李心傳輩講學蜀東門外得程朱㣲旨著易詩論語説以發明其義蜀人師尊之子珏知連州亦以文學知名籍是迂疎山東山西不能世將相之業趙光國辛慶忌傳贊秦漢已來山東出相山西出將其風聲氣俗自古而然今之歌謠慷慨風流猶存耳水南水北居然任賓客之聫韓詩水北山人得名聲去年去作幕下士水南山人又繼往鞍馬僕從塞閭里水北石洪水南温造雖學問粗知德性之尊然英華恐非和順之發禮記情湥而文明氣盛而化神和順積中而英華發外蛙拘墟而局促何所見聞荘子井鼃不可以語于海者拘于虛也燕巢幕以徘徊若為材識左傳季札謂孫林父曰夫子在此猶燕之巢于幕上文選巢幕無畱燕徒以固窮之力不忘尚志之功反觀寸心粗識無邊之風月杜詩得失寸心知洞視萬古略知不廢之江河李漢韓文序洞視萬古憫惻當世杜詩王楊盧駱當時體輕薄為文嘲未休爾曹身與名俱滅不廢江河萬古流所願就有道而正焉未得事大夫之賢者曾摳衣之不敏禮記侍先生之禮摳衣趨隅必謹唯諾乃推轂以見收元祐宗臣之立十科夲為何事紹興宰相之計羣吏尚出此途今徒有存羊之名或者發畵餅之歎然受德者不待成身而拜賜柳子厚固已言之俱見前既有知兮又欲識路而疾驅韓退之亦安取此昌黎復志賦昔余之既有知兮誠坎軻而艱難既識路又疾驅兮孰知余力之不任所感大矣無謝得乎此葢伏遇某官道純粹精易剛健中正純粹精也德直方大易直方大不習旡不利羽翼孔孟學傳先聖之不傳黼黻卿雲文到古人之未到廣絶交論舒向金玉淵海卿雲黼黻河漢韓文但力為之古人不難到碩果何嫌於不食易剝上九碩果不食君子得輿小人剝廬王弼注處卦之終獨全不落故果至于碩而不見食也匏瓜自得於含章易姤九五以杞包瓜含章有隕自天王弼注杞生肥地包𤓰繫而不食九五得地而不食含章而未發人之為言胡得焉特祝承明廬之三入詩采苓采苓首陽之巔人之為言茍亦無信舍旃舍旃苟亦無然人之為言胡得焉疏教君止讒之法若有言人之罪過令君舍之舍之者誠亦無得答然矣但能如此不受偽言則人之偽言復何所得焉既無所得自然讒止應瑒詩問我何功德三入承明廬言初為侍郎又為常侍又為侍中天之未喪斯文也故應靈光殿之獨存王延壽魯靈光殿賦魯恭王好治宮室遭漢中微盜賊奔突自西京未央建章之殿皆見隳壞而靈光巋然獨存時來為之見前民生幸甚豈謂誠心之傾倒山谷詩推轂天下士誠心要傾倒肯收孤迹之沈冥法言蜀莊沈冥注晦迹不仕故曰沈冥孟郊詩沈冥不計日得於不求曹植與吳質書夫求而不得者有之矣未有不求而得者也亦自可賀某敢不佩所品題銘之衷曲詩亂我心曲鄭箋心曲心之委曲也疏亂我心中委曲之事歲月坐成晩且熏坡老之香山谷上子瞻詩歲月坐成晚煙雨青已黄杜牧詩濃熏班馬香江湖永相忘更勉後山之報后山贈魯直詩陳詩傳筆意願立弟子行何以報嘉惠江湖永相忘謝曾尚書㬇舉著述科裁小子而成章無能為役左傳於先大夫無能為役言不足為其役使也觀近臣而為主有味其言鄭當時傳誠有味其言也予之豈以為私受者未能免愧切以十科薦士著述難堪詳見前八座舉賢銓綜尤重續漢書光武分增三公曹為二其一曹主嵗終書課諸州郡事改常侍曹為吏曹主選舉祠祀事民曹主繕脩功作鹽池苑囿事客曹主護駕羌胡朝賀事二千石曹主詞訟中都官主水火盜賊與三公為六曹幷一令一僕二人謂之八座晉蔡謨譲尚書疏八座之任非賢莫居綜子宋切三蒼云理經也謂機縷持絲交者屈侂制經令得開合唐高季輔為吏部侍郎凡所銓綜時稱平允太宗賜金背鏡以表清鑒考功貟外郎劉思立子憲為河内尉思立今日亡明日選人有索憲闕者時馬載為吏部侍郎書曰無乃注冬集朝廷咸曰真銓綜流品之司可謂振理風俗也宋璟為吏部尚書與侍郎李乂盧從愿等大革前弊取舍平允銓綜有叙唐文章之籙登者幾人柳文自孔氏以來兹道大闡家修人勵刓精竭慮者幾許年矣其間登文章之籙波及後代越不過數人耳晉人物之甄拔於一字山濤傳濤所奏甄㧞人物各為題目時稱山公啓事蔡謨傳謨父充未仕時河内山簡嘗與琅邪王衍書目蔡子當今之正人衍以書示衆曰山子以正字拔人然未易可稱後衍聞克在選官曰山子正人之言驗于今矣使品題之太過恐稱塞之易孤伏念某命固不猶詩寔命不猶才亦無似禮記寡人雖無似也萬巻未供於啜飲一科何補於遺餘見前結柳送窮仍覺語言之無味昌黎送窮文主人使奴星結柳為車縛草為船載糗與粻牛繫軛下引㠶上檣三揖窮鬼而告之又凡所以使吾面目可憎語言無味者皆子之志也剖瓜乞巧不堪豪傑之跪呈河東乞巧文剖瓜犬牙且拜且祈又㫄羅萬金不鬻敝帚跪望豪傑投棄不有雖庚桑久役於老聃莊子老聃之役有庚桑楚者偏得老聃之道以北居畏壘之山居三年畏壘大穰然毛遂無聞於趙勝史記平原君謂毛遂曰先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有也不圖科薦特辱名聞惟才薰班馬之香乃名秀發杜牧詩髙摘屈宋豔濃薰班馬香非學探舒向之海莫號淵源廣絶交論舒向全玉淵海董仲舒傳淵源所漸至求英詞能配古作自李杜韓柳之不出殆歐蘇陳黄為庻幾何者妄庸得此奬拂前言戲耳不待智者而後知小子識之則欲假之以自厲攷古人之所佩韓文復志賦攷古人之所佩兮閱時俗之所服仰盛德之安窮韓文復志賦仰盛德以安窮兮又何忠之能輸非盡讀三萬軸之牙籖韓詩揷架三萬軸一一懸牙籖難仰答十六枚之古磬見前恭惟某官國之喬木學者泰山公方引韋世康而告休隋書韋世康京兆杜陵人性恬素好古不以得喪干懷為絳州刺史慨然有止足之志與子弟書曰吾生因緒餘夙霑纓弁亟登衮命頻涖方岳志除三惑心慎四知今髦雖未及壯年已謝霜早梧楸風先蒲桺祿豈須多防滿則止年不待暮有疾則辭世康逍遙公夐之子也士皆知杜如晦之必相舊唐書杜如晦傳秦王府中多英俊被外遷者衆太宗患之房𤣥齡曰府僚去者雖多葢不足惜杜如晦聰明識逹王佐才也必欲經營四方非此人莫可遂奏為府屬平生五色線豈睆織女之襄杜牧之詩平生五色線願補舜衣裳睆當作跂詩跂彼織女終日七襄睆彼牽牛不以服箱注織女三星鼎足而成三角望之跂然襄駕也駕謂更其肆也肆謂止舍之處天有十二次日月所止舍舍即肆也七襄謂自卯至酉向者一瓣香不廢嫡孫之行陳后山詩向來一瓣香敬為曾南豐世雖嫡孫行名在惡子中滿期開閣早與捲簾見前某敢不仰體鴻鈞俯鞭駑鈍著作前烈之餘事豈足醻知班固答賔戲取舍者昔人之上務著作者前列之餘事節誼天下之大閑持此誓報新唐書卓行傳贊節誼天下之大閑士不可不勉謝趙尚書汝述舉可補著述科宋史趙汝述字明可太宗八世孫淳熈十一年進士歴官刑部侍郎遷尚書知平江府卒汝述為尉應詔上封事論議懇惻立朝薦引多知名之士然為時相所親躐躋通顯人亦以此少之小子成章無可薦揚之實近臣為主猥騰典麗之襃未嘗敢請於牆藩揚雄賦雷鬱律而巖突兮電倐忽於牆藩乃辱徑收之箧櫝韓文足下箧櫝尚有少闕不滿之處猶足更容感知而已柳文其受德者不待成身而後拜賜感知而已懷愧奈何切以一字拔人今古稱山公之啓一字㧞人山簡事山公啓事山濤事十科舉士兒童誦司馬之賢東坡詩兒童誦君實走卒知司馬幸猶愛禮以存羊誰復按圖而索駿符子齊景公好馬命善畵者圖之訪似者朞年不得今人君攷古籍以求賢亦不可得也梅福傳今不循伯者之道迺以三代選舉之法取當世之士猶察伯樂之圖求騏驥於市而不可得亦已明矣杜詩應圖求駿馬驚世得麒麟著述雖前烈之餘事見上條文學亦先聖之末科珠玉不補於饑寒豈堪混泥塗之辱東坡上韓魏公求葬進士董傳書傳之才器固不通於世用然譬之犀象珠玉雖無補于饑寒要不可使在泥塗中左傳使吾子辱在泥塗久矣干羽無取于戰陣猶足僃宗廟之容尚書舞干羽于兩階孔傳干楯羽翳也皆舞者所執孔疏爾雅干扞也孫炎云干楯自蔽扞也以楯為人扞通以干為楯名故干為楯爾雅又云纛翳也郭璞云舞者執以自蔽翳也故明堂位云朱干玉戚以舞大武戚斧也是武舞執斧執楯詩云左手執籥右手秉翟是文舞執籥故干羽者舞者所執周禮樂師凡舞有羽舞有干舞注羽舞者折羽干舞者兵舞疏云干戈兵事所用故以干舞為兵舞有如一藝之不庸韓文名一藝者無不庸亦是匹夫之弗獲昔趙尚書垂德於不報柳矦嘗感其收撫之恩河東上趙宗儒尚書啓收撫之恩始於枯朽動心於無情之地施惠於不報之人至李從事因文而得交韓子又念其饑寒之聚昌黎送李正字序李生之尊府以侍御管汴之鹽鐵李生與其弟學讀書習文辭故得交李生父子間侍御有無盡費於朋友今則又不忍其三族之饑寒聚而館之不圖今日光武紀不圖今日復見漢官威儀袁紹傳不圖今日乃相得也復見古人如某者蠢蠢隨行韓詩我今進退幾時失十年蠢蠢隨朝行行胡剛切徂徂何取韓文瞿瞿徂徂徒守寒素之氣習東坡詩書生習氣未能無尚持文墨之生涯蕭何傳徒持文墨議論王荆公詩多難飄零嵗月賖空餘文墨舊生涯居於大江之濱甘見笑於獱獺韓文天池之濱大江之濆有怪物焉窮涸不能自致乎水為獱獺之笑行乎劎閣之險幸偶脫於豺狼李詩劎閣峥嶸而崔嵬一夫當關萬夫莫開所守或匪親化為狼與豺既銜三釡弗洎之悲莊子曾子曰吾及親仕三釡而心樂後仕三千鍾弗洎吾心悲又罹一子更死之禍東坡乞常州居住表舉家重病一子喪亡兩髦已雪百念俱氷學業實負其初心精深安在韓文余生三十有八年髮之短者日益白齒之摇者日益脱聰明不及于前時道德日負其初心詞華甚慚於大手炳蔚謂何王珣傳夢人以大筆如椽與之既覺語人云比當有大手筆事陸瓊傳諸大手筆並中勅付瓊徐陵傳世祖髙宗之世國家有大手筆皆陵草之蘇頲傳頲封許國公張説燕國公以文章顯故時號燕許大手筆韓詩章彚霍炳蔚今屢為丞相而言昌黎送諸葛覺往隨州讀書詩我雖官在朝氣勢日局縮屢為丞相言雖懇不見錄蓋甚愧丈人之厚杜詩甚愧丈人厚甚知丈人眞枚臯之窮且忍何敢躁耶韓文東馬嚴徐已奮飛枚臯即召窮且忍又願少安之毋躁孟郊之久無成㑹且歸矣韓詩有窮者孟郊受材實雄驁廟堂有賢相愛過均覆燾胡為久無成便以歸期告詩㑹且歸矣無庶予子憎傳㑹㑹于朝也卿大夫朝㑹于君朝聴政夕歸治其家焉不虞科薦又累甄收伏遇某官氣杳秋天杜詩尚書氣與秋天杳愛深冬日左傳趙衰冬日之日也趙盾夏日之日也作納言之㗋舌惟山甫克舉之詩王命仲山甫式是百辟出納王命王之㗋舌德輶如毛民鮮克舉之我儀圖之維仲山甫舉之箋云出王命者王口所自言承而施之納王命者時之所宜復于王也皆奉順其意如王口㗋舌親所言也正義曰舉者提持之言謂施行之用夾輔之股肱則周公其人也左傳昔周公太公股肱王室夾輔成王成王勞之而賜之盟平當傳孝莫大于嚴父嚴父莫大于配天則周公其人也長慮却顧為根夲之計兼收竝蓄無葑菲之遺韓文俱收竝蓄待用無遺餘見前凡今得羽翼而飛柳文假以羽翼偶之騫騰劉賓客集表而出之為生羽翼誰非借齒牙之助南史謝朓傳士子聲名未立應共奬成無惜齒牙餘論尚念朝廷半老儒之日杜詩文物多師古朝廷半老儒直詞寧戮辱賢路不﨑嶇無棄文章一小技之人見前必令綢繆於束芻廉恥缺矣詩綢繆束芻三星在隅今夕何夕見此邂逅子兮子兮如此邂逅何注綢繆纏綿束薪之貌言薪芻待人事而束猶室家待禮而成詩序白華廢則廉恥缺矣故雖參差之荇菜左右芼之詩參差荇菜左右芼之注左右助也芼擇也后妃既得荇菜必有助而擇之者上不負天子下不負所學日監在兹新唐書陸贄傳吾上不負天子下不負所學皇它恤乎詩無曰高高在上陟降厥士日監在兹待之國士報之以衆人天厭之矣見前謝成都帥黄侍郎疇若舉科目宋史黄疇若字伯庸隆興豐城人淳熈五年進士歴官華文閣待制知成都府進龍圖閣待制以平蠻功進一秩畱蜀四年弊根蠧穴苖耨髮櫛以煥章閣學士致仕所著有竹坡集旅牀爭席夢難蜀道之登莊子其反也舍者與之爭席矣軍將打門驚報禰書之至盧仝詩軍將打門驚周公禰衡傳孔融深愛其才上疏薦之世固有十科之薦士公獨能萬里而舉人愧在其肝東坡詩有愧在其肝感深於髓韓詩緘封在骨髓伏念某至愚不肖素賤且貧無端讀書遂奪耕田之樂韓詩今者無端讀書史有時為養不供菽水之歡禮記孔子曰啜菽飲水盡其歡斯之謂孝猛思萬物之皆塵蔡襄詩世間萬事俱塵土彌覺一科之不補韓文豈不登名于一科兮曾不補其遺餘汗漫踸踔欲尋墜緒之茫茫淮南子吾與汗漫期于九垓之外汗漫𦕈茫也莊子吾以一足趻踔而行韓文尋墜緒之茫茫獨旁捜而逺紹勃窣媻珊尚踵常途之役役司馬相如傳媻珊勃窣上金隄師古曰謂行於叢薄之間也韓文踵常途之促促窺陳編以盜竊雖大慙必謂大好韓文大慙者即必以為大好矣然小材不離小官董仲舒傳小材雖纍日不離于小官安得自髙聊復爾耳能令公喜定未必然俱見前行搴湘水之芙蓉屈原湘君搴芙蓉兮木末誰託江梅之桃李山谷詩江梅有佳實託根桃李塲今作禁門鍵要須百年幾見之人陳后山送蘇公知杭州詩一代不數人百年能幾見昔如馬口銜今為禁門鍵君如雙井茶眞副衆口一嘗之願陳后山詩子如雙井茶衆口願一嘗顧持著述猥舉妄庸經術無游夏之源脩明安在董仲舒傳考其師友淵源所漸猶未及乎游夏文詞乏屈宋之豔秀發謂何杜牧詩高摘屈宋豔然經品題敢自暴棄孰云畵餅初無益於饑腸魏志盧毓傳名如畵地作餅不可啖也陳后山詩顧我如麥飯猶足塡饑腸如入太倉亦莫不有飽意伏遇某官斗牛間氣雷次宗豫章記吳未亾恒有紫氣見斗牛之間張華聞雷孔章妙逹緯象乃要宿問天文孔章曰唯斗牛之間有異氣是寳物也精在豫章豐城張華遂以孔章為豐城令至縣掘深二丈得玉匣長八尺開之得二劒其夕斗牛間氣不復見孔章乃畱其一匣而進之劍至光耀煒曄煥若電發奎璧清躔孝經援神契奎星屈曲相鉤似文章之畫晉志東璧二星主文章天下圖書之秘府也杜詩聲華夾宸極早晩到星躔筆裁霧而縫雲不作人間煙火之語杜詩裁縫雲霧成御衣詳見前身馭風而騎氣直依天上日月之光東坡答黄魯直書意其超逸絶塵獨立萬物之表馭風騎氣以與造物者游楊廷秀詩御風騎氣不用行倦持上雍之囊司馬遷傳僕又薄從上上雍郊祀志自古以雍州積高神明之隩故立畤郊上帝秦德公立遂都雍雍之諸祠自此興武帝紀行幸雍祠五畤東坡詩筆橐從上雍出草諭巴之檄司馬相如傳乃遣相如責唐蒙等因諭告巴蜀民以非上意雪山增重杜詩公來雪山重公去雪山輕天府益腴婁敬傳膏腴之地此所謂天府師古曰府聚也萬物所聚斯人乃福星頓釋冕旒之西顧東坡謝二鮮于君以詩文見寄詩我懷元祐初珪璋滿清班維時南隆老奉使獨未還迂叟向我言青齊歲方艱斯人乃福星遣出虛危間公自注司馬温公謂軾曰子駿福星也東京人困甚且令往彼寇恂傳昔髙祖任蕭何於關中無復西顧之憂用汝作舟楫共觀衮繡之東歸諒勱相於國家先旁招於俊乂俱見前兼收馬勃昌黎進學解牛溲馬勃敗鼔之皮俱收竝蓄待用無遺曲菢鶴翎韓詩鶴翎不天生變化在啄菢注鳥伏卵謂之菢仰盛德之安窮昌黎復志賦時乗閒以獲進兮顔垂懽而愉愉仰盛德以安窮兮又何忠之能輸望夫人兮已逺昌黎閔已賦昔顔氏之庶幾在隱約而平寛余昬昬其無類望夫人其已逺主簿乃有分職縱欲福以難功韓文藍田縣丞㕔壁記主簿尉乃有分職謁衡岳廟詩竄逐蠻荒幸不死衣食纔足甘長終侯王將相望久絶神縱欲福難為功侍郎非通神明曷不祈而得施新唐書百官志肅代以後天下多故官員益溢銓法無可道者協律郎沈既濟極言其弊曰古今選用之法九流常叙有三科而已曰德也才也勞也而今選曹皆不及且吏部令甲雖曰度德量材計勞然攷校之法皆在書判簿歴言辭俯仰之間侍郎非通神不可得而知則安行徐言非德也空文善書非才也累資積攷非勞也苟執不失猶乖得人况衆流茫茫耳目有不足者乎柳文古之知己者不待來求而後施德舉能而已某敢不謹佩惠意自鞭古心韓詩古心雖自鞭世路終難抝山谷詩古心自有着鞭地諸矦薦人與之諸矦寧有是事國士遇我報以國士請誦斯言代趙撫屬謝衛參帥汝楫舉科目百舍治任己問征夫之前路莊子百舍重趼而不敢息注百舍止宿也增韻三十五里為一舍廣韻任擔也負也詩疏任者謂器物人所扶持任在前負在後如林切陶淵明歸去來辭問征夫以前路恨晨光之熹微十科舉士又勞播物之大鈞見前頂踵知恩文選自頂至踵功歸造化肺肝懷感竊以賓筵有秩古歌衛武之功詩序賓之初筵衛武公刺時也詩賓之初筵左右秩秩注筵席也左右謂折旋揖讓也古者將行燕射先為燕禮其賓之初入門以至于升筵其折旋揖讓隨其左右趨翔威儀甚肅敬而秩秩然不失禮也藩翰多賢舊説湖南之客昌黎送楊支使序當今藩翰之賓客惟宣州為多賢又知其客可以信其主者宣州也知其主可以信其客者湖南也今以時移而事異誰堪德舉以言揚禮記或以德進或以事舉或以言揚况如日夕之牛羊㑹且歸矣詩日之夕矣牛羊下来注言雞之將棲日則夕矣牛羊從下牧地而來畜産出入尚使有期節至于行役者乃反不也又㑹且歸矣無庶予子憎解見前相彼月明之烏鵲愛莫助之見前又勤科薦之榮允謂陶成之厚伏念某一寒無挾百拙有餘偶躐末科非有宗英之禮樂河間獻王傳武帝時獻王來朝獻雅樂􅍟三雍叙傳四國絶祀河間賢明禮樂是脩為漢宗英來依大府適逢元帥之詩書韓文躬詣大府受約束于下執事餘見前假以三能之光漢書注能音台詳見前借以九鼎之重平原君傳毛先生一至楚而使趙重於九鼎大呂從骨而肉左傳所謂生死而肉骨之也如翼斯飛詩如跂斯翼如翬斯飛肅肅宵征久馳心於魏闕詩肅肅宵征夙夜在公注肅肅疾貌宵夜征行也莊子身在江海之上心居乎魏闕之下遲遲晝出終戀德於膺門李膺傳膺以聲名自髙士有被其容接者名為登龍門果蒙吹嘘薦以科目取其材術固無師友之淵源董仲舒傳贊考其師友淵源所漸旌以勤勞是亦塵埃之職分韓詩判司卑官不堪説未免捶楚塵埃間政事之可觀安在館閣之稱選謂何强名器識之詳華浪應文章之典麗前言戲耳不待智者而後知小子識之敢不假兹而自勵伏遇某官清廟一柱詩箋清廟者祭有清明之德者之宮也天德清明文王象焉故謂其廟曰清廟杜詩初聞伐松栢猶卧天一柱泰階六符見前虛已受人不厭䝉再三之瀆易山下有澤咸君子以虛受人又䝉初筮告再三瀆瀆則不告承天載物眞得坤六二之方易彖曰至哉坤元萬物資生乃順承天象曰地勢坤君子以厚德載物六二直方大不習旡不利暫為召畢之保釐尚書命畢公保釐東郊聊續荆潭之倡和韓文有荆潭唱和詩序詳别見牛溲馬勃隨所用以兼收蟲臂䑕肝不以微而見棄故令庸下亦在數中某敢不增所未能求為可貴著作前烈之餘事不足酬知節誼天下之大閑持此誓報俱見前代囘舒尉謝舉科目從臣十科之薦一歲三人牧夫庶獄之難千變萬狀尚書庶獄庶慎惟有司之牧夫新唐書杜甫傳贊千彚萬狀李漢韓文序千態萬貌兹以盡公而舉又何私謝之為恭惟某官遠抱甚都都美也盛也司馬相如傳車從雍容閑雅甚都賢勞已久居然前跋而後㚄詩狼跋其胡載㚄其尾公孫碩膚赤舄几几正義曰老狼垂頷有胡進則躐其胡而前倒退則跲其尾而倒于尾上進退有難而不失其猛韓文跋前而躓後動輒得咎注躓多作㚄誰其右挈而左提張耳陳餘傳以兩賢王左提右挈而責殺王滅燕易矣今歸幕下之羅足脫囊中之穎見前比來科選擬用名聞深疑詐木鶴之仙述異記天姥山南峯昔魯般刻木為鶴一飛七百里酉陽雜俎魯班巧侔造化嘗作木鳶其父乗之至吳㑹吳人以為妖殺之般怨吳人于肅州城南作一木仙人舉手指東南吴地大旱三年豈復尋蕉鹿之夢列子鄭人有薪于野者遇駭鹿擊而斃之覆之以蕉俄而遺其所藏之處遂以為夢詳見前然此夲畵地之餅何以假為韓信傳大丈夫定諸矦即為眞王耳何以假為餘見前謝成都帥黄侍郎條果能受去堊之斤徑當削入莊子郢人堊墁其鼻端若蠅翼使匠石斵之匠石運斤成風聽而斵之盡堊而鼻不傷郢人端立不失容削息約切考工記築氏為削注即今書刀古用竹簡筆誤則以刀削去因名其刀曰削原陟傳削牘為䟽孔光時有所言輒削其藁樊宏所上便宜削夲草陳羣上封事輒削其草不然時夜之早計無乃明月而暗投俱見前某疾讀來函病頓去枕三國典略陳琳作諸書及草檄成呈太祖太祖先苦頭風是日疾發臥讀琳所作翕然而起曰此愈我病家君作宰好吟孤騖之齊飛王勃滕王閣序家君作宰路出名區童子何知躬􅑮盛餞又落霞與孤騖齊飛秋水共長天一色客食加餐特報雙魚之遠遺古辭飲馬長城窟行客從遠方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書中意何如上言加餐飯下言長相憶謝座主謝曾中書舍人從龍五芒色正夙瞻柱史之躔劉禹錫柳河東文集序粲然如繁星麗天而芒寒色正人望而敬者五行而已晉天文志東一星曰柱史主記過古有左右史之象也一刺字漫始見舍人之様禰衡傳衡有才辯而氣尚剛傲建安初來遊許下始逹潁州乃陰懐一刺既而無所之適至於刺字漫滅舊唐書徐堅傳揚再思王方慶為東都畱守引為判官表奏專以委之賞其文章典實曰此鳳閣舍人樣如此才識走避不得仰髙山而景行感流水之知音俱見前由其願一識之未償太白集但願一識韓荆州是以身十返而不悔竊以去民就吏牛堪未始謝於門昌黎送牛堪序去民畞而就吏祿其為獲也亦大矣然吾未嘗聞有登第於有司而進謝於其門者負業歸家齊皥亦不非其上又送齊皥下第序齊生之兄為時名相朝之碩臣皆其舊交有司用是連枉齊生齊生不以云抱負其業東歸於家吾觀於人有不得志則非其上者衆矣若齊生者不以閔於有司其不亦鮮乎哉惟是筆硯荒涼之業東坡集塵埃筆硯漸忘舊學之淵源奔走簿書粗識小人之情偽實受錘鑪特逹之知見前説戰塲文人還迷於五色唐李華作弔古戰塲文汚為故書他日與蕭穎士讀之稱工華問今誰可及穎士曰君加精使能至矣華愕然而服摭言李程貞元中試日五色賦先牓落矣初出試楊於陵見其賦藁破曰德動天鑒祥開日華謂程曰公今須作狀元翼日雜文無名於陵不平㩦之以詣主文主文歎賞不已於陵曰當今塲中若有此賦侍郎何以待之主文曰非狀元不可於陵曰茍如此侍郎已遺賢矣亟取程所納巻對之不差一字因擢為狀元前牓不復放矣東坡詩集余與李薦方叔相知久矣領貢舉事而李不得第愧甚作詩送之其略云與君相從非一日筆勢翩翩疑可識平生謾説古戰塲過眼終迷日五色讀刑賞論公放出於一頭東坡詩尚欲放子出一頭自注云嘉祐初軾與子由寓興國浴堂美叔怱見訪云從歐陽公游久矣公令我來與子定交謂子必名世老夫須放他出一頭也又歐陽公與梅聖俞書云讀蘇軾文不覺汗出快哉快哉老夫當避此人放出一頭地也陳後山詩老子終當讓一頭東坡年譜嘉祐二年文忠公知舉患時文以詭異相髙思欲救之梅聖俞與其事得公論刑賞以示文忠公公驚喜欲以冠多士疑曽子固所為子固文忠公門下士也乃寘第二復以春秋義第一若揆門生座主之常唐玉保定摭言得第謂之前進士俱㨗謂之同年有司謂之座主南部新書杜審權知舉放盧處權有戲之曰座主審權門生處權崔沆放盧瀣談者稱座主門生沆瀣一氣當辨國士衆人之報伏念某學未至古年不後人陳后山集學不前人年不後人少也好修強記輒數千字新唐書韓愈傳愈自知讀書日記數千百言又孔穎逹八歲受學記誦日千餘言長而無述覓舉凡二十年舊唐書俗號舉人皆稱覓舉覓為自求之稱未是人知之辭雖有道則恥賤貧亦無心於圖富貴揚素傳但恐富貴來逼臣臣無心圖富貴可堪親老又著儒冠而忍羞杜詩儒冠多誤身寧試有司不願君門之徑入昌黎復志賦君之門不可徑而入兮遂從試於有司冐陳三策略吐寸衷自知明主可為忠言趙充國傳明主可為忠言遂上屯田奏特恐貴人不喜生語韓文諸公貴人既得志皆樂軟熟媚耳目者不喜聞生語一見輒戒門以絶頭顱自揣摭遺陶𢎞景與從弟書云昔仕宦期四十左右作尚書郎即投簪髙邁今三十六方作奉朝請頭顱可知不如早去口吻益悲韓文每營度欲出口吻聲鳴益悲卒猛吐其狂愚竟儳説於得失不謂暗中之摸索遂蒙送上之吹嘘俱見前既有詞意皆精妙之襃復加筆力可敬服之語韓詩龍文百斛鼎筆力可獨扛喘竹筒於儕輩昌黎寄崔立之詩童稚見稱説祝身得如斯儕輩妬且熱喘如竹筒吹老婦願嫁女約不論財貲老翁不量力累日笞其兒増紙價於京朝左思傳思賦三都搆思十年時人未之重張華見而歎曰班張之流也於是豪貴之家竸相傳寫洛中紙貴南史殷淑儀傳謝莊作哀䇿文奏之帝卧覽讀起坐流涕曰不謂當今復有此才都下傳冩紙墨為之貴世説庾闓作楊都賦成人競傳寫都下為之紙貴郭受詩衡陽紙價頓能髙人亦有言衣鉢恐成於故事詩人亦有言進退維谷又人亦有言靡哲不愚又人亦有言德輶如毛摭言放牓後狀元以下到主司庭謝名曰謝衣鉢衣鉢謂得主司名第其㦯主司先人同名第即謝大衣鉢也葉石林云唐末禮部知貢舉有得程文優者即以己登科時名次處之不以甲乙為髙下也謂之傳衣鉢和凝登第名在十三後得范魯公質遂處以十三其後范登相位官至太子太傅封國於魯與凝皆同有獻詩云自此廟堂添故事登庸衣鉢亦相傳我則無勇鼓旗空譟於後塵左傳我無勇吾志其目也又師之耳目在吾旗鼔進退從之又鼔譟而出冦恂傳士馬四集幡旗蔽野恂乃令士卒乗城鼓譟六一居士詩安得二子接揮鋒兩交鋩我亦願助勇鼔旗譟其旁既經品題敢自暴棄遺餘不補十年任韓子之窮俱見前名節茍全一第眞魯山之溷新唐書元結傳結少不羈十七乃折節向學事元徳秀天寳十二載舉進士禮部侍郎楊俊見其文曰一第溷子耳有司得子是頼果擢上第復舉制科按魯山當作次山豈因紫芝誤記耶身未可許人也猶欲與後死之斯文聶政傳老母在政身未敢以許人也子亦來見我乎政恐事先生之有罪伏遇某官求士為國事君以人荀子上臣事君以人言動必書今立二螭頭而和墨汁百官志起居舍人分侍左右秉筆隨宰相入殿若殿在紫宸内閣則夾香案分立殿下直第二螭首和墨濡筆皆即㘭處時號螭頭許渾詩纔歸龍尾含雞舌更立螭頭運兔毫榮進素定寧止四龍首之至黄扉西清詩話本朝狀頭入相者呂文穆蒙正王文正曾李文定迪宋元憲庠元憲登庸知制誥石揚休賀以詩曰皇朝四十三龍首身到黄扉止四人副樞王伯庸堯臣曰何不道已四人而特言止惜哉盖伯庸繼元憲魁天下士然未幾薨于位自慶厯及今迄未有先多士而後大拜者異哉餘見前竊聞滿籠之參芝豈少一株之桃李然勱相國家之業自旁招俊乂而基公求士甚士之求公㑹須連茹俱見前子絶長非長者絶子自合負荆廉頗傳廉頗聞之肉袒負荆因賓客至藺相如門謝罪注肉袒者謂袒衣而露肉也荆楚也可以為鞭也某一莊未荒萬間是芘向來瓣香之敬眞為南豐此去翹材之延願觀東閤俱見前及第謝宗縣尉炳薦書下士徼君子之異知昌黎感二鳥賦曾不得薦書齒下士於朝以仰望天子之光明奏記中涓缺門生之庸敬蕭望之傳鄭朋奏記望之曹參傳參以中涓從如淳曰中涓如中謁者師古曰涓潔也言在中主知潔清灑掃之事葢親近左右也戴氏鼠璞云今人通竿牘言典籖王府官也記府掌記幕府官也已難用之書吏中涓之稱尤更為僭漢石奮為中涓受書謁此豈臣下所宜用抑馬周實淹於逆旅舊唐書馬周傳少孤貧落拓不為州里所敬補博州助教刺史逹奚恕屢加咎責又為浚儀令崔賢所辱遂感激西遊長安宿於新豐逆旅主人唯供諸商販而不顧待周遂命酒一㪷八升悠然獨酌主人深異之非牛堪敢傲於有司注見下文未之負荆見上條遐不削牘詩遐不謂矣注遐遠謂勤也雖逺在野豈能不勤思之乎禮記引詩瑕不謂矣注瑕之言胡也原陟傳削牘為疏注牘木簡也恭惟某官眼髙四海東坡詩眼髙四海空無人筆落九天山谷詩空餘詩語工落筆九天上繙十二經尤有取太平之典莊子孔子往見老聃而老􅆅不許於是繙十二經以説老􅆅杜淹文中子世家西游長安見隋文帝坐太極殿召見因奏太平䇿十有二策尊王道推覇略稽古驗今恢恢乎運天下于指掌矣􅍟三千字謂當冠秀士之羣禮記命鄉論秀士升之司徒曰選士韓詩誇映秀士羣馬小殿於及門鼇固安於戴石宜春傳信錄盧肇就江西解為試官末送肇有謝啓云巨鼇屓屭首冠蓬山試官謂之曰昨限以人數擠排雖獲仰展深慙名第奉凂焉得首冠蓬山之謂肇曰必知明公垂問大凡頑石在上巨鼇戴之豈非首冠耶一座大笑夢溪筆談鄭毅夫自負時名國子監以第五人送意甚不平謝主司啓事有李廣事業自謂無雙杜牧文章止得第五之句又云騏驥已老甘駑馬以先之巨鼇不靈因頑石之在上主司深銜之他日廷策主司為考官必欲黜落以報其不遜有試業似􅞄者枉遭斥逐既而發考巻則􅞄乃第一人及第孜孜甘旨屈為孟東野之窮韓詩有窮者孟郊受材實雄驁孜孜營甘旨辛苦久所冐懇懇精忠方抱梅南昌之節梅福傳為郡文學補南昌尉後去官歸壽春數因縣道上言變事求假軺傳詣行在所條􅍟急政凄其風木詩凄其以風注凄寒風也韓詩外傳樹欲靜而風不止子欲飬而親不在越在塊苫禮記寢苫處塊所以為至痛飾也諒朝祥之琴成聲見前則暮召之葢相望主父偃傳朝奏暮召入見文帝紀冠葢相望結轍于道食貨志千里游敖冠葢相望董仲舒傳使者冠葢相望問勤勞恤孤獨某頃偕鄉計武帝紀令與計偕師古曰計者上計簿使也偕者俱也令所徴之人與上計者俱來嘗累公知由庶士而登司徒不知恩者非人也柳河東與顧十郎書大凡以文出門下由庶士而登司徒者七十有九人又凡號門生而不知恩之所自者非人也去民畞而就吏祿豈進謝則為私乎昌黎送牛堪序登第於有司者去民畞而就吏祿其為獲也亦大矣未聞進謝於其門者豈有司之待之也抑以公不以情其進而謝於其門也則為私乎顧迷京洛之塵陸機詩京洛多風塵謝朓詩誰能久京洛淄塵染素衣孟郊詩如知呉楚水不及京洛塵實隔蓬萊之水史記蓬萊方丈瀛洲此三神山者在渤海中及到反居水下終莫能至故者無失為故乃不知儼然衰絰之中禮記親者毋失其為親也故者毋失其為故也又吾子儼然在憂服之中左傳在衰絰之中是以未敢請誅之不可勝誅自當即麾之門牆之外法言在夷狄則引之倚門墻則麾之顧勤一介左傳一介之使注一夫也先枉雙魚既倒植之可慙莊子草木之倒植者過半賈誼賦聖賢逆曵兮方正倒植復暗投而失報鄒陽傳以闇投人於道青衫短笏漸從矮屋以著身見前紫磨眞金尚負洪鑪之定價孔融聖人優劣論金優者曰紫磨猶人之有聖也南史林邑傳林邑王陽邁初在孕其母夢生兒有人以金席藉之其色光麗夷人謂金之精者為陽邁若中國云紫磨者因以為名尚書惟金三品疏黄金謂之􅀢其美者謂之鏐郭璞曰鏐即紫磨金也然已長伯樂之廐敢遂荒陸氏之莊俱見前某無以報恩期於強學禮記夙夜強學以待問法言君子強學而力行其行已若有愧於道何以文為韓文感二烏賦其行已不敢有愧於道其閒居思念前古當今之故亦僅志其一二大者焉雖無報而不辱其門請從今始東坡祭韓忠獻公文公惟人傑而不自賢堂名閱古以古律身况我小生罕見寡聞敢不師公洽民與軍雖無以報不辱其門又祭歐文忠公夫人文蒼顔白髮復見潁人潁人思公曰此門生雖無以報不辱其門四六標準巻四
