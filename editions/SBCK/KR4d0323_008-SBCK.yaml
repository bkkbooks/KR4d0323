body:
  text: 謝除授外任代潭州鄒帥應龍謝丞相守藩灕水莫奏膚公分閫湘流又承嘉惠仍進璧奎之直益華翼軫之旁知勤洪造之甄陶敢廢小夫之竿牘恭惟某官乾坤間氣社稷丗臣一日萬機殫輔賛弥縫之力九州四海知親附鎮撫之心故齊人章章有侵疆之歸而魏地紏紏方樂郊之適非用儒無敵於天下何不戰可屈於人兵惟公克成厥終永息四夷之警俾予從􅁒以治允爲萬丗之功况方中二十四考之書詎容專五三六經之羙某乆違東閣幸宅南交徒以奉萱草之親難於戀梅花之外所祈便養徑歸綿上之田亦􅁒投閑稍養漳濵之疾豈意大鈞之坱北復容小䄂之囬旋爵禄兩崇敢但襲荆潭之唱和中和並布庻無傷衡嶽之扶輿除成都漕到任謝史丞相伏以再命典州愧偏城之玩愒六條遣使玷本道之轉輸不由推轂之功全岀轉鈞之賜恩隆頂踵感激肺肝􅀼以益部夙繫使星星詎知其隕石成都舊稱陸海海烏料其揚塵蓋自利路之荒殘㝷至潼川之剽掠督責惟深於西道邭勞良慘於北山巧婦尸之尚難責無麫之餅老農墮甚若爲取不稼之禾伏念某多病不材至愚極陋少年躁妄夏蟲語冰而不知中歳險艱呉牛見月以猶喘進既乏大雞之效退巳􅀌鷗鷺之盟天宇浮眉尙青眼逢迎之舊雪山到面驚白頭彼此之新比聞驪駕之虚大有鶚書之薦蜀人題柱頗榮弩矢之前駈呉客思蓴恐􅀒樵蘇之後㸑駭釆封於下躰孰蟠木之先容人則擇官官則擇人上恩異其用者不才才者不用外議謂何此蓋伏遇某官柱石九筵權衡六幕熈帝載使宅百揆爕和歴二紀之間立太􅀓兹惟三公辤遜閱十年之乆蓋􅁒復文武之境然後受周畢之封帝王出萬全率由先正舊典之式春秋大一統迄還寕人有指之疆率􅁟莫非王臣皇天旣中中國始由􅀌􅁄出正顓槐窺於我如浮雲之心豈貪冨貴有迨天未隂雨之責尚克綢繆眷言黒水之惟梁正窘青天之轉粟飛芻旣急刻楮􅀹艱知其熟魚鳬之游念其無蚍蜉之援特加識察俾效馳駈某敢不思廣咨諏力圗任􅀒三十鍾致一石無敢辤難百畒分食九人亦當加念惟知黽勉皇恤駑庸流馬木牛儻可息民而休士豢􅀛籠鶴終希置散以投閑除成都漕謝政府連四千石之任蔑聞蜀郡之歌餽十萬竈之屯仍玷益州之分由支郡馳駈於本路恐短材蹩躠於長􅂗令先甲以惟行命重申而莫避􅀼以雲門陸澤夙􅁛要害之膏􅃾石棧天梯素忌吮磨之牙血六歩七伐周不愆於庸蜀十鍾一石漢實敝於西南兵不寓農今益異古三逢單閼之􅀊壹無強禦之人萬夫莫當之劔関踆踆奔走五百餘里之石􅔙綽綽去來􅀾不因粮敗必􅄷餉剜心醫眼忍能閉眼而不醫推髓剥膚安有曼膚之可剥此際把天隅之繡何術流地上之錢伏念某不材之人無用於丗教胄乏祝螟之效監州無展􅂹之功三暑僰侯分終身之不齒一寒瓦屋甘俛首以爲眉未能消愁嘆之聲更兾玷禮樂之遣依蓮而泛緑水况當傍籌邊之楼轉粟而上青天又可訪支機之石然造幣則刻楮難於刻玉調夫則鑄人重於鑄金刈葵巳覺其傷根緩歩又難於拯溺跋胡㚄尾劌目鉥心昧於一來瞠􅀂四頋恭惟某官基命兩社棟國九筵太微三光風霆閟流形之用洪鈞一氣雨露無甘苦之分己欲立而立人道先覺以覺後謂江漢朝宗于海必導岷而導嶓當荆益跨有之時欲保呉則保蜀重載必歸於牛􅀒畏􅂗何止於烏飛雲􅀷怜滳􅀶之邊氷解思先零之漕乾矣暵矣遇人之艱難矣輔之翼之又從而振德之某敢不盡力鞠躬爱人節用安危之意注將相使臣弗敢與聞錢榖之問至廟堂君子惟能通志除成都漕謝侍從無中和之􅁔轉上聞於太學有禮樂之雅獲下拜於少城十年出幕之􅀌鴻萬里題橋之駟馬超迁寵甚􅁛塞闕然靖循表選之由定出裏言之賜􅀼以収蜀而給轉漕史􅁛蕭何之功諭巴以擅運輸文見相如之檄非天府前􅃾而後瘠殆雪山昔重而今輕萬甕萬牛窘韋皐之去鎮一琴一鶴欠清獻之乗軺况從漢棧之囂闐不見秦兵之耐戰益州疲敝民不聊生劔閤峥嶸君誰與守飛鳥桃虫當亟懲於後患木牛流馬詎冝付之庸人如某者志夲熊熊才終鹿鹿滿頭素髮意本蕭條眯目黄塵法當憔悴進豨芩於館下以冗見治希􅂹足於治中無才可展火􅆋生於兩角月影轉於半輪雖洊擁於雙旌悄無聞於五袴適承􅌐駕之缺驟􅂪龍節之朌求者不子而子者不待求此恩厚甚食以足兵而兵不足於食兹事奈何冐哀籲而弗囬恐顚隮之難免兹蓋伏遇某官國之元氣學者㤗山惓惓先天下之􅁨卓卓得聖人之任論思獻納精神折千里之衝取度詢謀採訪十道遴之選萬里東溟之隔導江河以朝漢十年北風之涼閔岷峨之悽愴行行且止避御史難歴井以捫參皇皇者華遣使臣且翕箕而挹斗某敢不問民疾苦察吏否藏寕損食以節衣無剥廬而豐屋戍蓬婆之雪謹操蘇武之節旄跂織女之星徐問張騫之石機除成都漕謝檢正都司分江郷之符偶綴益州之分出澤國之節就令周道之馳輕􅀌熟路之車大乏生財之道循墻莫避叱馭知慚竊以中和布宣金馬亦煩於遣使疲敝危急木牛尚困於餽師蓋窘十餘鍾一石之輸頗仰三百萬斛榖之糴比旣失丘山之􅁀􅁀乃專責原隰之皇皇琴鶴清規或又似劈琴而煑鶴繭絲拙計今不待成繭而取絲委之駑庸何以黽勉伏念某秉心抗直渉丗迂踈綿力薄材位合居於人下虚悲空警􅁨乃犯於衆先甘以狂愚老於廢棄􅁣一寒之去國驚十暑之浮家晨入太學而招諸生投閑乃分夜發清溪而向三峽假守非才方弄月於峨眉遽􅀚風於海眼誦詩授政敢曰使四方而不能咨難爲謀是當拜五善以求􅀗此盖伏遇云檢正司存雨露身逼雲霄云檢詳弥綸省闥弼亮廟廊云編修司存雨露感㑹風雲云詳定爕和帝載翊賛天樞史左右身爲國史君舉必書推轂多有味之言蒙霧不知之􅃳謂呉蜀相爲唇齒當廣咨諏得信布以任爪牙亦資餽餉有可福虚危之次諒多憚參井之捫病駒弗稱於文覊老馬或諳於故路藐然外服假以裏言乗白露以釆葮俾青天之轉粟某敢不愛人節用盡力鞠躬勉千里之嬴粮甘三年之刻楮然公車實無希於暮召任錦城能不願於早還四牡還歸而苞栩載飛且謹成西山之雪萬象皆春面􅀌槎自客何因近南斗之星除成都漕謝李制置守江郷之符正慙玩愒出澤國之節濫備將輸亟控需章兾回渙汗兹奉大元帥之承制必欲小行人之疾驅冒昧滌紅凌兢布白伏念某百無操挾獨有迂踈學無所成空敝精神於蹇淺仕未能信僅存肝膽之輪囷立館下招諸生一鳴輙斥坐堂上稱太守再鼔巳衰獨感吾選韓厥之知皇頋孰殺子産之怨止湏書考力乞投閑敢圖清朝驟􅂌漕事惟成都夙稱陸海海巳近於揚塵而益部舊號使星星今同於隕石熬波無􅃳刻楮難成百畒食九人寕忍奪金於白晝十鍾致一石尤難轉粟於青天此豈庸奴所能黽勉聞將軍之令不聞天子之詔敢不􅂰行急􅀚察於賦與急剌史於民尚祈指教恭惟某官識弘且毅氣直以方學廣而聞多才全而業鉅光猗蘭之葉丗載其英勁前茅之􅁠帝嘉乃績受任危難之際折衝談􅀏之間夷虜膽寒士民心服薦呉起薦西門豹悉送吹嘘咨向寵咨郭攸之尤加摸索有如蹩躠亦俾驅馳某敢不恪奉六條圖拜五善維駒維騏維駰維駱敢自怠於鞭笞我任我輦我車我牛願少寛於轡䇿其爲頌徯罔旣敷宣謝黄制副賀除成都漕某受容察於偏城正虞謫滿􅂌將輸於一道安得誤除知必出於流言廼遽􅂪於􅐹記蠅雖貪於附􅂹犬不足以續貂使萬一如傳聞當再三而懇避區區之懇續續以陳比羞蘋蘩甚愧施輕而報重兹奉竿牘不覺情過而禮踰百感稠重尺牋勃窣亟具申禀仰乞丙原謝順慶李知府賀除成都漕某蕭然塵土殊乏郡庸聞之道􅂗謂有使命知流言之難信省􅀌跡之不堪正使誤除亦當請免敢圖釆聽便辱品題某有感簸揚實無􅀍受不稼蔑取禾之理􅀒乘惟致㓂之憂先布尺牋少攄寸悃嗣規申控敢幸丙原代羅制機壎攺除太守謝史丞相假守漢源冒控陳情之請攺麾晉嶺實諧便養之諸寛庭闈萬里之懷出坯冶一陶之力福如天而徼受感無地以􅀉言伏念某殖學踈蕪賦材蹇淺詩書門户所求無忝於父兄塵土簮裳其實徒勞於州縣􅀝閩山而製邑攀蜀道以籌邊過灔澦百牢之関甚安蓮幕叱卭徠九折之坂忽冒竹符惟此沈􅀺界在雪嶺綏懷六詔安有竒功荏苒二年僅無乏事起家至二千石萬有餘榮􅀝門有九十親一則以懼敢謂洪鈞之轉復容􅀞㦸之森許卭筰之還轅指衡湘而易組蓋范史之傳循吏僅十数人如桂陽之有治聲乃二三輩尚詭圖於後效期力企於前修有民人焉有社稷焉姑俟及􅀲之戍孰主張是孰綱維是俾全啜菽之驩揆厥所元亶知其自恭惟某官名垂宇宙力􅀒乾坤作室而厥子肯堂有偉相門之相􅀂金而用汝作礪是維功令之功談􅀏却萊人之兵笞係制單于之命隂陽和而在内附何難外撫於四夷上下交而其志同尤欲曲成於萬物故如椎鈍亦預甄収某敢不刻骨藏恩指心誓報乃瞻衡宇快林烏反哺之情當走京師窺槐龍顓面之拜代董通判居􅁩除知惠州謝丞相佐州東輔偶計日以合符乞郡南荒忽何天之從欲雖云小壘亦出大鈞請裁狂簡之章少荅生成之造伏念某蠧書淺學鴈塔末科自役俗吏之塵始習癡兒之了依蓮何有薦屡剡於公車種秫旣登政偶安於田里冒昧題輿之座聊息吾黥解后越爼之庖偶調衆口煩需章之交上兾渙渥之留中人豈不自知耶小才未容於大用仕者行其義也分憂亦所以近君輒從五嶺之間乞乗一障而去蹌蹌儀鳯鷁自分於退飛跕跕墮鳶馬何辤於後殿鵝城㪷大鰐􅔙淵􅀷飽惠州之飯讀淵明之詩兹亦竒矣使渤海之民沾宣帝之化所願學焉恭惟某官佐王經􅀖量能授職雖馬渤牛溲兼収並蓄何所不容然蠅營狗苟驅去復來奚其爲政凡干内􅀘悉與外除求仁得仁我則異於是以德報德公其許之歟某尚逺戍期敢忘政學一麾乃出守孰非大丞相之恩庶民所以安願課良剌史之效除武岡通判謝丞相散人細滿干續食於夲朝宰物曲成特轉丞於支郡詎能希展足之􅂹頼未廢病顙之駒愧溢情顔感踰分願伏念某平沉庸俗全抱拙踈骨相旣屯乏雲雷經綸之學丘園自賁非河漢黼黻之文猥􅂪養士之仁濫綴教胄之属經笥之嘲未發謗篋之惡巳盈先生學雖勤言雖多譽難酬毀相國禮之過知之至罪上從疑俾奉叢祠實爲寛典掘雲而破嵽嵲歸㝷黄獨之苖乗月而弄潺湲飽飲紅泉之水倐三周於􅀊籥冒一問於化甄兹􅂪天恩俾貳斗壘都梁樂土巫水舊嶓崇寕拔縣而升軍甫百餘􅀊嘉定揠僉而置倅方一二貟及􅀲之戍雖遥種􅃮之謀有待威爲龍蛇㤙爲赤子當賛郡條小不虺蜮大不鯨鯢仰慿國力恭惟某官得聖之任爲帝者師父子継丗三公邁史丹仕漢朝之績明良慶㑹六字紹越王輔孝廟之勳塩梅水火鼎實惟和粉米絺繡衮章亦别存竹頭於舸艦拾桐尾而宫啇念椎鈍之無他嘆陸沈之巳乆日月出矣時雨降矣將令萬物之得冝江漢濯之秋陽􅁀之寕忍匹夫之不獲因其素出於門下使之姑試於治中某敢不滌濯其心靖共爾位思稱屏星之重圖爲杯水之消魚尾旣頳詎敢急斗升於東海烏頭可白儻或憐三匝於南枝除武岡通判謝宣參政繒祝釐秩滿干續食於大鈞宥過㤙􅀷俾轉丞於小壘得逾劵外愧溢情涯伏念某全蹈拙踈見謂庸俗乾愁漫解􅀄非了事之癡虚警空悲直坐信書之誤偶􅂪光範擢紏成均韓愈乏赤箭之材徒勞晨入鄭䖍荒蒼苔之屋端合早㱕獲領叢祠允爲寛典靑精可飯居然乏大藥之資黄獨無苖聊爾託長鑱之􅀉三年于此百念蕭然誰爲推轂之言忽有題輿之命青􅂁朝士之最困遽借牙緋黄紙除書之無名特加齒録雖尚俟数年之戍亦強名半剌之官伏遇某官弼亮天功辨章人物賛一氣洪鈞之槖籥覃萬間廣厦之帡幪天地爲鑪造化爲工力扶公道江漢以濯秋陽以􅁀洞見物情閔其甞誨館下之諸生使之姑試治中之别駕􅀄無􅂹足之可展姑見牛溲之不遺某敢不銘骨鏤心洗腸滌胃七年之病三年之艾未容急禄以代耕百畒之田五畒之桑且合力農而報國除武岡通判謝􅁑僉書洪奉祠秩滿學干禄於天朝起廢恩􅀷轉爲丞於斗壘自匪推當時之轂何由題仲舉之輿拜渥自天㱕恩有地伏念某材真無似命亦不猶糞壌􅀌豚􅀄豈願犧於太廟榆枋斥鷃抑難附鳯於髙岡弗能藏畔以自埋猥取入朝之見嫉館下之誨言未旣粗免嘲師臺中之評以爲傾渠能原毀兩年雲卧百念氷消􅀒米爲身飽只増於多感析薪無子賤亦覺其有涯任諸公臺省之登甘此士江湖之落獨甞侍夫子之履舄頗辱知小人之肺肝方通國􅁛康章之非乃逢人􅀃項斯之善士固伸於知己况受殊知身未可以許人詎容弗許伏遇某官四朝元老一代眞儒自治治人所學皆周孔之學先覺覺後斯民即堯舜之民從容取日於虞淵談􅀏作霖於啇野􅂄壽俊在服精神眞足以折衝敉寕武圖功夙夜密陪於基命獨念江濤之如此􅀷思人物之眇然與其􅀝信於詐忠不􅀂収羅於戇直留何蕃於太學昔誰從􅀕酒之言處士元以治中今端出將軍之力有感在此無謝得乎某敢不銘􅍢殊私激昻晚節且忍飢而待麨無乞酒以厭漿不利走趨梅福難班於文石尚能拜起李皐願踔於武岡代衛太社樸除􅀽州通判謝丞相徼恩攺秩􅁩難社下之留乞闕養親許待治中之次川薮宻藏其汙疾帡幪曲免其震凌終始生成後先超躐全出大鈞坱圠之造請陳小子狂簡之章伏念某天巧素慳地寒寡挾父書是讀願載續於丗科門䕃可羞空屡偕於計吏﨑嶇三仕踸踔七階獨􅂪公相之憫憐不翅子姪之覆育燕巢于幕方欣得近於楼臺魚潜在淵敢望上汙於池沼乃辱綴太常之属亟令脫小宰之銓計校平生擢髮固難於数罪躋攀分寸吹毛冝速於求疵牽牛自分於奪牛失馬敢期於得馬適嚴君之引疾從神圉而祝􅁵懷眷恋庭闈之情欲甘啜菽願出宰山水之縣少傒及􅀲忽􅂪一陶之仁超陞半剌之任冝春多勝蓋具見韓昌􅀺之詩尓􅀽得賢亦足考李泰伯之記詎應伐輻猥玷題輿拔之沸湯烈火之中分以清風明月之􅀉子來幾日我有二天伏遇某官心契禹皐道侔伊吕書汾陽二十四考事方半於古人取河朔一百餘州功巳髙於今日璇璣宻運而屡躋豊稔寳玉來㱕而重見泰平時惟萬丗永頼之功尚恥一夫不􅀍其澤老老㓜㓜皆重費於保全子子孫孫將􅀂爲而報􅁛某敢不銘㤙􅍢膂圖報誓心肉骨之夘翼之可坐湏於泥軾吹嘘是披拂是尚終托於化爐除兩浙運幹謝丞相掃門執贄冒干相國之知得闕登畿俾賛使家之畫免待及􅀲之次足寛索米之憂頓令小人之属饜實感大鈞之坱圠伏念某學落不殖器窳無竒一科玷郷老之賔三仕作諸侯之客鉥心擢胃僅成抽黄對白之文歴井捫參安識泛緑依紅之樂既脱岷峨之險復罹嬴博之悲兩年甫謁於選曹百拙難營於近禄獨􅀩三握髮之遇許垂一舉手之恩嚴徐􅁬飛共勸枚臯之且忍韓張嗟悼或疑東野之無成適聞􅁺屬之虚實在神臯之近冒爲冶躍便辱陶成滿腹飲河止冀斗升之水舉頭見日乃依尺五之天禄足代耕政堪學製十年出幕或笑未了公事之癡三命循牆可無不入帝城之恨孰披拂是遂濟登茲恭維某官坤厚承天謙平稱物作典寳于浮寳之日共知出伊尹之功書得玉於竊玉之餘益足表魯公之德不然肅謹底貢之舉􅂚在君奭爲保之餘帝于一二日之幾誕敷文德公其億萬年之敬肅將祗歡必今四夷之來王亦惟九德之咸事賜之大禮之過知之至豈終􅂢巳爨之桐視所以觀所由察所安姑使作向陽之木所慙小物亦累曲成某敢不欽乃攸司事從其長合東西而瞻使莭思漕波尺地之通敬蚤夜以從祝規俟洪鈞一氣之轉除兩浙運幹謝俞樞密應十年幕府公事未了於癡兒千里􅀖畿幹譽又思於傖父不失依蓮之職足寛索米之憂一陶甚恩三沐以謝恭惟某官基命夙夜勱相國家敉寧武圖功茂􅗗同寅之畧任舊人共政共期先甲之孚迓寧王遺寳之休受匈奴奉珍之賀俾予從欲以治元圭何足以告功惟公克成厥終大器益思於自治昆夷喙矣烝徒楫之思無競之惟人圖有辭於永世伏念某百無象似獨有駑庸己知咋舌以悔狂無敢剌口而論事詎意賛木牛之運乃猶用芻狗之陳城南巷窮漫曰去天之尺五江西轍涸亦惟乞水于斗升然或􅀩二三執政之知猶可備八百除吏之數小技卷曲而不中詎應詰匠氏而杙楹大鈞坱圠以無垠儻或陶河濵之苦窳否則安倉庫之氏亦願甘盆盎之中客燕差池曾辱捲簾之顧病駒局促更希膏鬛之恩代衛機宜樸謝史丞相偕計吏於外臺未能拾紫司閑曹於内幕乃使􅆢親拔之墨水之餘付以青氊之舊請裁小牘少謝大鈞惟國家重謀帥之權故子弟許主書之辟豈惟機事宜有司存亦將培德以蓄材欲使象賢而趾美當建炎多壘之日實等諮謀洎紹興偃革以來始逃僉擬似􅀂取禾於不稼然當肯播於厥菑如某者百拙無堪一愚自信耻襲懷綳之簮笏妄希弓冶之箕裘豈知下俚之音不中儀曹之度能門有矜式也獨無公貺之科有司豈枉我哉姑利齊生之器欲返邯鄲之歩更爲湘水之行適是親闈旣移他鎮姑求筦庫之節以慰􅀝門之思敢意甄収曲加器使猥從新府復得舊除􅀞棟朝雲此非吾事短檠夜雨姑與心謀不勞奔走於顔行賸可周旋於􅂰下碧幢整睱更無可奉之文書綵服雍容此外何求於造化兹蓋伏遇某官道先民覺忠結主知嶽立八年淵澄百揆收公道於廟堂之上用必惟人散泰和於宇宙之間動無棄物遂令太史牛馬之走來觀旌陽雞犬之飛某敢不増所未能求爲可貴孝友施政當思令德之君陳法令爲師肯作無能之薛惠代衛機宜樸謝陳憲天宜贅員内幕漫爲寸祿之謀受察外台忝預一人之數可無竿牘自達姓名伏念某學未知方仕非能信伸其呫嗶頗不後于衆人觀我朶頤終未聞於大道屠龍有志畫虎何功爨無欲清遂强隨於計吏貨不中度竟見岀於儀曹姑求筦庫之官以慰倚門之望敢圖申令復使主書台皇枕夷夏之交有嚴屏翰庭戸得湖山之外亦簡文書姑從容膝下之懽且増益胷中之學幸孰大此端有由然恭惟某官器宇浚明風猷凝逺自其不辭小官於州縣已具可以大受之規模暨宅牧於南交果馳聲於北闕帝念江右俗近嶺陬非得持斧之繡衣莫戢弄兵之赤子濡轡甫驅於駱馬埋輪已讋於豺狼翠羽浮雲便作絳官之想紅旗破賊即觀黄紙之除某有愧伐檀之官莫施横草之力尙徼餘芘惠及閑曹子弟亦何預人聊復爾耳孝友是亦爲政幸卒教之代衛機宜謝樓提舉起語同前恭維某官昭代儒宗清朝夀俊精神洒落光風霽月之標翰墨淋漓貯霧含雲之筆自三年之博士盍旬月以封侯行莫爲乎王留去孰如於公猛兩轓焜燿久游康樂之城六轡委遲遂訪右軍之宅散積倉於南畝蘇涸轍於西江皇華寍久於馳驅清切即司於獻納代衛機宜謝陳太守起語同前恭維某官天韵浚明風猷膚碩早參諸彦孰如棠棣之華徧閲後生不起積薪之歎民庸既茂朝績亦髙居然專城尚此歛惠田疇之成子産既永歌之朝廷之知弱翁行且召矣代王支鹽謝丞相定辟差投光範之書方委身於罏錘從英蕩之辟設效役于牢盆既無待闕之淹又有便家之樂小人屬饜足以行矣大鈞坱圠於是見之伏念某赤城迂儒白屋賤士壯歳從獨湖之學難强坿於同門中年題慈恩之名偶適逢於當軸然雖生三台之下未及望六符之光供簿四方師友粗稱其愿慤貳令一邑台府過謂之亷勤其如通籍之章難及守株之士百拙自安於到部諸公或勸其干堂馬渤牛溲妄作兼收之想􅀛毛兔角理無速就之期姑安轅下齷齪之蹤往守海瀕廣斥之榷頗聞此職本亦在遴選之中偶遂爾私茲端出曲成之賜感恩厚甚無謝可乎伏遇某官丗濟王勳家傳相業從容而餁百度談笑而覊四夷断度收羅細桷大杗之各得滌濯剗磢精金頑礫之自分毎随物以賦形常量能而授職憐其乏汎水依紅之質姑且賛熬波出素之司庶羡地征無棄天産某敢不謹司倉廪平用權衡舉膠鬲於魚鹽之中敢妄希於尺寸活禦㓂於鮒轍之内當知感于斗升囬諸郡賀除成都漕弄半輪之月正慚俛目以爲眉觀一道之風猥使強顔而將指薾然疲役畏此簡書未敢驅六轡之􅁝已蒙褒一字之衮恭惟某官温恭爲德豈弟宜民飛紫馬之英聲􅆢黄龍之寛詔平生無襦今五袴已騰蜀郡之歌勉勵增秩賜千金即拜漢庭之璽有憐濩落俾效轉輸自非送上之吹嘘安得暗中之摸索某終慙非據亟已引辭投以木瓜愧乏衞人之厚報集於苞栩但深周道之懷歸回諸郡通判賀除成都漕守藩支郡曾微牧御之才出節本朝忽冐轉輸之委方免章之需報辱慶牘之鼎來或承之羞不知所賀伏惟某官材優世濟學夲躬行宜澤佩以登朝暫題輿而佐嶽車蓋一丈詎容緹屏之淹風月平分行膺佩刀之贈某自惟骯髒曷稱馳驅流馬木牛冀別選管簫之亞湖魚藪獸願亟歸濠濮之間徒勤繭幅之貽莫效貂襜之報回諸郡教授賀除成都漕對月半輪愧無治狀觀風一道忽玷恩除已控懇辭力祈俞允敢意三鱣之席見貽雙鯉之書伏惟某官夙掞天葩早収地芥朋來游夏共師夫子之循循道出羲黃詎羡諸公之衮衮堂下不嫌于繫馬海中即佇於掣鯨即題千佛之名徑上三神之島某自憐芻狗詎稱木牛美人琅玕良感草木之吾味愛我藥石幸毋金玉乎爾音回諸司屬官賀除成都漕再乘一障慙無牧養之功分察六條猥被將輸之命已力申於巽避何誤辱以謙施伏惟某官仕與學優美由丗濟羅而致幕下便覺羣空錐之處囊中即觀穎脫鴻儀有漸鵬怒斯飛某已控需章丏還節傳集于苞栩籲天但切於懷歸投以木瓜厚誼更慚于匪報梅亭先生四六標凖卷之八梅亭先生四六標凖卷之九
