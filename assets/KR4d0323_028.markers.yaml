  - {type: variant, offset: 21, length: 271, content: 峽州秦漢為南郡魏武置臨江郡蜀改宜都郡吳曰西陵宋齊竝為宜都郡梁置宜州西魏改為托州後周以地扼三峽之險改托為硤隋改夷陵郡唐改峽州始從山宋因之范石湖吳船録云古語曰荆門虎牙楚之西塞夷陵即其地自古以為重鎮三國時又為吳之西陵陸遜以為夷陵要害國之關限今吳蜀共道此地但為蕞爾荒壘耳陸務觀入蜀記云峽州在唐為硤州後改峽而印文則為陜州元豐中郎官何洵直建言陜與陜相亂請改鑄印文從山事下少府監而監丞歐陽發言湖北之陜州從阜從夾陜西之陜州從阜從夾邊㫄不同本不相亂恐四方謂少府監官皆不識字今按陜州之陜從夾夾音閃從二入湖北之陜從夾夾訖洽切從二人左右持也陜亦作峽詳啓意葢代月湖下同, SBCK: ''}
