body:
  text: 四六標準卷三十宋李劉撰諸司屬官詳各題下代回丁置機鎔宋制置司屬官有參謀參議主管機宜書寫文字各一員幹辦公事三員準備將領差遣差使各五員餘隨時勢輕重而増損焉某恭審進通閨籍杜詩顧我蓬屋姿謬通金閨籍出運幄籌閲道放出蜀之龜侯誰在矣趙抃字閲道欲龜事詳見前詩侯誰在矣張仲孝友注侯維也吉甫所進諸友之中維復誰在其中間矣令威跨歸遼之鶴而子和之易中孚九二鶴鳴在隂其子和之我有好爵吾與爾縻之餘見前恭惟某官學裕家傳才優時用一經受業固無羨黃金之贏韋賢傳遺子黄金滿贏不如一經萬里隨翁欲重吟青玉之案東坡次韻子由使契丹見寄詩始憶庚寅降屈原旋看蠟鳳戲僧䖍隨翁萬里心如鐵此子何勞為買田公自注時猶子遲侍行杜詩試吟青玉案莫羨紫羅囊宜輕蒲璧周禮子執榖璧男執蒲璧樂近蘭陔束晢補亡詩南陔孝子相戒以養也詩云循彼南陔言採其蘭春戀庭闈心不遑安丁蓋辭縣令就幕職以便養暫主畫於中權黨錮傳汝南太守范孟博南陽宗資主畫諾左傳中權後勁言居中軍者出權謀以制勝即舒翹於表選柳文今之聖知莫不舒翹揚英推類援朋循吏傳公卿缺則選諸所表以次用之乃今王謝之子弟見前率多布信之功名敘傳爪牙信布佇奏膚公詩薄伐玁狁以奏膚公亟觀趾美韓文克自敬勤及先人存趾美進士續聞成宗唯服任遂功為孝子在不怠某八年於外一節以趨禮記凡君召以三節二節以走一節以趨注使使召臣急則持二緩則持一欲贈丁儀愧乏子建之好句曹植贈丁儀詩初秋凉氣發庭樹微銷落凝霜依玉除清風飄飛閣朝雲不歸山霖雨成川澤黍稷委疇隴農夫安所積在貴多㤀賤為恩誰能博狐白足禦寒焉念無衣客思慕延陵子寶劒非所惜子其寧爾心親交義不薄得見嵇紹益知中散之有人嵇紹傳紹始入洛或謂王戎曰昨於稠人中始見嵇紹昻昻然如野鶴之在鷄羣戎曰君復未見其父耳代回楊制幹異制置司幹辦公事凡三員桂林勞從事之賢講聞高誼久矣史記秦略定楊越置桂林象郡詩大夫不均我從事獨賢董仲舒傳講聞高誼之日久矣其明以諭朕草堂就參謀之辟邂逅適我願兮草堂在浣花溪少陵卜居詩浣花流水水西頭主人為卜林塘幽西郊詩時出碧鷄坊西郊向草堂新唐書杜甫傳上元二年黄門侍郎鄭國公嚴武鎮成都奏為節度參謀檢校尚書工部員外郎詩邂逅相遇適我願兮况聞在揚侯之鄉揚雄傳揚在河汾之間周衰而揚氏或稱侯號曰揚侯㑹晉六卿爭權韓魏趙興而范中行智伯弊當是時偪揚侯揚侯逃于楚巫山楚漢之興揚氏遡江上處巴江州漢元鼎避仇復遡江上處岷山之陽已嘗識李邕之面杜詩李邕求識面王翰願卜隣偶忘摸索唐許敬宗性輕傲見人多忘之或謂其不聰曰卿自難記若遇何劉沈謝暗中摸索著亦可識重感記憐恭惟某官姱節紉蘭姱音誇好也離騷經紛獨有此姱節又紉秋蘭以為佩妙齡拾芥王荆公詩妙齡終日對書龕又飛揚獨妙齡東坡詩妙齡馳譽百夫雄章㫖之義數萬志在春秋司馬遷傳春秋文成數萬其指數千孔子曰吾志在春秋行在孝經縱橫之對三千文之禮樂夏竦詩縱横禮樂三千字獨對丹墀日未斜畫諾肥越人之瘠談笑易蜀道之難竝見前北山有楊想君子樂與賢者詩南山有桑北山有楊樂只君子邦家之光詩序太平之君子至誠樂與賢者共之也西方曰棘嗟逺道何為來哉禮記西方曰棘東方曰寄注棘當作僰僰之言偏使之偏寄於夷戎蜀道難嗟爾逺道之人胡為乎來哉行矣章交劉向傳章交公車人滿北軍亟其王覲左傳王覲為可某昔遲去魯今倦游梁司馬相如傳客游梁得與諸侯游士居又長卿故倦遊忻聞瀟湘之故人許渾詩瀟湘逢故人來作臨卭之重客相如傳臨卭多富人乃相謂曰令有貴客為具召之潭府淳古亦嘗倚席於麓山少陵岳麓山道林二寺行潭府邑中甚淳古太守庭内不喧呼後漢書儒林傳博士倚席不講注倚席言不施講坐也盛𢎞之荆州記長沙西岸有麓山蓋衡山之足又名靈麓峰乃嶽山七十二峰之數有嶽麓書院張南軒記云湘西故有藏室背陵向壑木茂而泉潔為士子肄業之地山長周式以行著祥符八年召見便殿拜國子學主簿使歸教授錦里逢迎更覺驚心於石鏡杜詩錦里逢迎有主人又經心石鏡月到面雪山風石鏡在武擔山蜀記武都山精化為女子蜀王納為妃不習水土而死王遣五丁於武都山擔土為冡故曰武擔今山有石照表其門焉代回耿制屬重客及隍缺於逺肅漢高帝紀聞令有重客説文隍城池也有水曰池無水曰隍曲禮主人肅客而入注進也疏進謂先導之也高文銜袖厚甚先施韓文文書􅋦袖恭惟某官山立清標禮記山立時行淵回懿學文選大略淵回元功響效暫試三語之掾晉書阮瞻字千里見司徒王戎戎問曰聖人貴名教老莊明自然其㫖同異瞻曰將無同戎咨嗟良久即命辟之時人謂之三語掾迄無一夫之寃兹被制梱之知梱苦本切通作閫説文門橛也徐曰謂門兩旁挾門短限今人亦謂門限俯按荒城之陋某幸諧再覿仍拜屬辭徒深巾衍之藏莊子盛以篋衍巾以文繡注衍延善反又怡面反李云笥也盛狗之物也司馬云合也更效襜褕之報代回陳制幹噲青天轉粟之難漸欲歸鷄豚之社杜詩築城依白帝轉粟上青天韓詩願為同社人鷄豚燕春秋東坡詩鷄豚異日為同社應有千篇唱和詩綠水依蓮之麗鼎來見鴻鴈之賓南史庾杲之為王儉長史蕭緬與儉書曰庾景行汎綠水依芙蓉何其麗也詳見前禮記季秋之月鴻鴈來賓疏上仲冬直云鴻鴈來今季秋云來賓以仲秋初來則過去故不云賓今季秋鴻鴈來賔者客止未去也猶如賔客故云客止未去也與汝為隣世説晉武帝問孫皓曰聞南方人好作爾汝歌頗能不時皓飲酒因舉觴勸帝而言曰昔與汝為隣今為汝作臣上汝一杯酒令汝壽萬春帝悔之於余同業昌黎送何堅序堅以進士舉於余為同業何幸萬里似人之喜莊子子不聞夫越之流人乎去國數日見其所知而喜去國旬月見所嘗見於國中者喜及期年也見似人者而喜矣然非九垓若士之期淮南子若士笑曰吾與子汗漫游乎九垓之上詳見前伏惟某官學行醇明詞章炳蔚頃嘗識老人大父之處郊祀志少君資好方善為巧發竒中嘗從武安侯宴坐中有年九十餘老人少君迺言與其大父游射處老人為兒從其大父識其處一坐盡驚以為少君神數百歲人也已知異吾黨小子之狂八韻之驚試官果妙年而中鵠舊説舉人試日已晩主文權德輿於簾戲云三條燭盡燒殘舉子之心舉子遽答云八韻賦成驚破侍郎之膽三仕而為令尹宜即日以飛鳬顧從嶺表之炎杜詩五嶺皆炎熱宜人獨桂林來依劒外之冷杜詩劒外官人冷關中驛騎疎孔明用蜀府中實委之費禕出師表宫中府中俱為一體侍中郎中郭攸之費禕等此皆良實志慮忠純宫中之事事無大小悉以咨之嚴武鎮川幕下固謀之杜甫嚴武鎮成都辟杜甫為參謀詳見前所謂有為之亦若安知來者之不如某戍雪無庸杜詩西山白雪三城戍南浦清江萬里橋漕冰欲解趙充國傳冰解漕下十乘久違於文子至于他邦尺書如見於孟公為之驚坐游俠傳陳遵字孟公性善書與人尺牘主者皆藏弃以為榮時列侯有與遵同姓字者毎至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云代回史機宜中興㑹要國朝安撫司其屬有勾管機宜文字建炎初許置主管機宜文字書冩機宜文字各一員紹興四年詔書冩機宜文字除係事干機密其餘文字竝不得簽書俸給京官依通判選人依簽判識嵇父於未仙知敬人中之鶴東坡詩何人更識嵇中散野鶴昻藏未是仙詳見前見徐卿之有子真成地上之麟杜詩徐卿二子生絶竒感應吉夢相追隨孔子釋氏親抱送竝是天上麒麟兒南史徐陵字孝穆母臧氏嘗夢五色雲化為鳳集肩上已而誕陵年數歲家人攜候沙門寶誌寶誌摩頂曰天上石麒麟也劉禹錫送李秀才赴舉詩爾生始懸弧我作坐上賔引箸舉湯餅祝詞天麒麟辱貽秋月之兩章杜詩兩章對秋月一字借華星尤服春雲之多態韓詩君詩多態度藹藹春空雲恭惟某官材為國瑞學有家傳手敏八叉亦欲吹嘘而送上唐孫光憲北夢瑣言溫廷筠字飛卿與李商隱齊名時號曰溫李才思艷麗工於小賦毎入試押官韻作賦凡八叉手而八韻成多為隣鋪假手日救數人士行有缺縉紳薄之杜詩揚雄更有河東賦唯待吹嘘送上天眼迷五色竟難摸索於暗中東坡送李方叔下第詩過眼終迷日五色詳見前摸索見本卷回楊制幹條不妨利吾器以俟時韓文有司其枉我哉我將利吾器而俟其時耳行即溉其根而食實韓文浚其源𨗳其所歸溉其根將食其實斯文如女有正色安用自憐山谷次東坡送李方叔韻詩驥子墮地追風日未試千里誰能識習之實錄葬皇祖斯文如女有正色我相夫子非癯仙即騰善價東坡送李方叔詩買羊酤酒謝玉川為我醉倒春風前歸家但草凌雲賦我相夫子非癯仙某方謀下榻聞偶税郊兹勤連璧之臨魏書陸暐字道暉與弟恭之季順竝有時譽洛陽令賈楨見其兄弟歎曰僕以老年更觀雙璧世説潘安仁夏侯湛並有美容喜同行時人謂之連璧竝有聨珠之贈律厯志五星若聨珠寸田耕不盡益信任忠敏之詩宋史任伯雨字徳翁眉山人紹興初贈直龍圖閣又加諫議大夫淳熈中賜諡忠敏二季對相望誰有歐陽子之識陳後山贈二蘇公詩一翁二季對相望竒寶橫道驥服箱誰其識者有歐陽代回成機宜晉疏寵承家易開國承家小人勿用拜恩諾仕男兒慷慨不難自致於一科韓文豈不登名於一科兮母氏劬勞且合亟營於三釡詩凱風自南吹彼棘心棘心夭夭母氏劬勞莊子吾及親仕三釡而心樂後仕三千鍾不洎而吾心悲固為親屈後漢書毛義家貧以孝行稱南陽張奉往候之坐定而府檄適至以義為安陽令義捧檄而入喜動顏色奉心鄙之及母亡遂不仕奉曰賢者固不可測往日之喜乃為親也難與俗言司馬遷傳事未易一二為俗人言也又此可為智者道難為俗人言也伏惟某官茂實英聲瑰意琦行象賢崇德豈惟聞禮以聞詩尚書惟稽古崇德象賢續聞成宗是在難兄而難弟韓文趾美進士續聞成宗詳見前姑紆綠綬用當綵衣列女傳老萊子孝養二親行年七十作嬰兒自娯著五采斒斕衣佇觀名第之摘髭韓詩連年收科第若摘頷下髭即步要津而策足文選何不策高足先據要路津某未遑贊慶周禮大行人慶賀以贊諸侯之喜詳别見猥辱貽箋識野鶴於未仙但深感愧見上條期名駒之越國㑹見騫騰後漢趙熹傳更始徵熹熹年未二十既引見更始笑曰繭栗犢豈能負重致逺乎除為郎中行偏將軍事使詣舞隂李氏遂降更始大悦謂熹曰卿名家駒努力勉之王褒傳過都越國蹶如歴塊杜詩章罷鳳騫騰代回劉撫幹孟虎宋中興㑹要國朝安撫司屬有勾當公事後避高宗諱改幹辦公事建炎三年詔浙西安撫大使許置幹辦公事官五員紹興四年江東西湖西浙西安撫大使許置幹辦五員安撫使置幹辦公事四員先庚有命焉知賢才而舉之易巽九五先庚三日後庚三日吉王弼曰申命令謂之庚高甲為郎何見公等之晩也匡衡傳射策甲科儒林傳能通一蓻以上補文學掌故缺其高第可以為郎中太常籍奏冒然剡入無以謝為談賔錄唐證聖中劉竒為侍郎注張文成司馬鍠為御史二人因申屠瑒以謝竒正色曰舉賢無私何見謝恭惟某官學超人羣裴迫詩吾師久禪寂在世超人羣調窺天巧韓詩規模背時利文字窺天巧一第直溷子政有貴於晩成元結傳舉進士禮部楊浚見其文曰一第慁子耳有司得子是賴馬援傳大材當晩成良工不示人以朴屢薦不入官亦何嫌於同隊顔延之五君詠屢薦不入官一麾乃出守韓詩兩家各生子提孩巧相如少長聚嬉戲不殊同隊魚假以歲月矯然雲霄某得於所聞言之不怍燭之武老矣無能為矣一力告休左傳秦伯圍鄭鄭使燭之武見秦君辭曰臣之壯也猶不如人今老矣無能為也已仲山甫舉之愛莫助之萬祈自重詩我儀圖之維仲山甫舉之愛莫助之詳見前代回胡帥機綱帥機即安撫司機宜諸公獻納共騰薦士之章老子婆娑亦竊挂名之寵陶侃傳老子婆娑正坐諸君輩挂通作掛史通使名挂史筆韓文挂名經端自託不腐徒得君重何以謝為見上條恭惟某官父教之忠世濟其美竝見前故國非謂喬木意風烈之猶存魏謩傳贊挺挺有祖風烈此笏乃今甘棠况天章之固在魏謩傳帝問卿家書詔有存者乎謩對惟故笏在詔令上送鄭覃曰在人不在笏帝曰覃不識朕意此笏乃今甘棠黃閣門闌之喜杜詩門闌多喜氣女壻近乘龍清油談笑之長李正封詩從軍古云樂談笑清油幕推轂有言滿座稱善聊附蒼蠅之尾隗囂傳蒼蠅之飛不過數步即託驥尾得以絶羣何補黃鵠之毛韓詩外傳夫鴻鵠一舉千里所恃者六翮耳背上之毛腹下之毳益一把飛不為高損一把飛不加下然未嘗得承顔而接辭雋不疑傳今乃承顔接辭則非所謂納交而要譽履聲來止巽謝何哉履巽卦名某無與提衡韓非子貴賤不相踰賢知提衡而立治之至也張湯莊周傳贊繼世立朝相與提衡亦勤銜袖韓文文書銜袖暗投珠於道路何以相酬鄒陽傳明月之珠夜光之璧以闇投入於道朝發軔於梁津幸其自愛離騷經朝發軔於天津兮夕余至乎西極代回楊撫屬紹雲撫屬見前老形已具濫塵喉舌之司陳後山詩老形已具臂膝痛春事無多櫻笋來詩出納王命王之喉舌漢繁欽尚書箴龍作納言帝命惟允山甫翼周實司喉吻賀櫝鼎來逺借齒牙之論匡衡傳匡鼎來注鼎方也南史謝朓傳士子聲名未立應共奬成無惜齒牙餘論恭惟某官文獻博雅機量疏明為入幕之賔諒多禆贊舉筦庫之士㑹即騫騰禮記趙文子所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉注管庫之士府史以下官長所置也舉之於君以為大夫士也管鍵也即今鑰匙庫物所藏杜詩筆飛鸞聳立章罷鳳騫騰某歸興雲飛宦情冰冷王衍傳吾少無宦情隨牒推移遂至於此梁書何𦙍傳吾年已五十七月食四斗米不盡何容得有宦情推賢揚善亦有味其言哉度力量時懼無補於賢者代回蒲撫機仲乙撫機見前聨名接武憶共尋皇子之陂禮記堂上接武注武迹也迹相接謂毎移足半躡之説文陂池也皇子陂在萬年縣西南秦葬皇子起塜陂北原上得名杜詩秋水憶皇陂又天清皇子陂又皇陂岸北結愁亭注第五橋皇子陂皆在長安城外乃㑹别之地也宋張禮游城南記云循清明渠而西至皇子陂注云在龍堂之西秦葬皇子於陂底起冢於陂北原上因以名陂隋文帝改永安陂唐復舊司空曙皇子陂詩岸芳春色曉水影夕陽微寂寂深煙裏漁舟夜不歸異事同僚喜來入烏公之幕詩我雖異事及爾同寮注我雖與爾異其所職之事乃與汝同其官僚韓文大夫烏公以鈇鉞鎮河陽之三月以石生為才以禮為羅羅而致之幕下情親有素辭費何居伏惟某官逺抱淵深清標冲粹二十而作文賦早拾科名杜陵醉歌行陸機二十作文賦汝更小年能綴文晉書陸機字士衡少有異才文章冠世年二十而呉滅退居舊里閉門勤學文賦序云毎自屬文尤見其情恒患意不稱物文不逮意蓋非知之難能之難也故作文賦以述先士之盛藻因論作文之利害所由八百之除吏員偶非親故新唐書崔祐甫字貽孫拜中書侍郎未踰年除吏幾八百員莫不諧允帝嘗謂曰人言卿擬官多親舊何邪對曰夫進擬者必悉其才行如不與聞知何由得實帝以為然然檻檻大車毎難鋭進檻通作轞户黤切車行聲也詩大車檻檻毳衣如菼而恢恢餘刃正覺硎新見前杜老參謀正不出浣花之里趙子櫟杜工部年譜云上元二年冬嚴武鎮成都奏為節度參謀檢校尚書工部員外郎賜緋魚公先赴成都裴公為卜居浣花里晉公贊畫固可參古栢之碑况今連鑣向闕之人韓詩幕中無事惟須飲却是連鑣向闕時莫非講劒摛文之客李正封聨句摛文揮月毫講劒淬霜鍔北多良馬暫入禮羅韓文冀北馬多天下伯樂知馬遇其良輒取之羣無留良焉又以禮為羅詳見前南有喜魚即登賢罩罩陟教切説文捕魚器也爾雅籗謂之罩注捕魚籠也詩南有嘉魚蒸然罩罩詩詁云魚罟有自上而下者有自下而上者今人謂自上而下者為罩則罟之自上而下者今提罟也某託交年拜起敬月評風動帳中亦欲更觀於談笑郄超傳桓溫懐不軌欲立霸王之基超為之謀謝安與王坦之嘗詣溫論事溫令超帳中卧聽之風動悵開安笑曰郄生可謂入幕之賔矣韓詩談笑青油幕冰解漕下自兹恐隔於行藏趙充國傳分屯要害處冰解漕下代回李總屬鑄總謂總領所詳見前淮東總領官屬有幹辦公事差遣四川有主管文字二員懐中散之野鶴夙荷心知東坡詩何人更識嵇中散野鶴昻藏未是仙詳見前見少傅之停鸞今能趾美昌黎殿中少監馬君墓誌退見少傅翠竹碧梧鸞鵠停峙能守其業者也又及先人存趾美進士續聞成宗未遑贊慶周禮大行人慶賀以贊諸侯之喜猥辱懐箋恭惟某官學有家傳才為國許竝見前金閨天上夙尋瑶草之期杜詩李侯金閨彦脱身事幽討亦有梁宋遊方期拾瑶草山海經始瑶之山帝女死焉化為瑶草江淹别賦惜瑶草之徒勞玉樹風前善繼石林之志杜詩宗之瀟灑美少年舉觴白眼朢青天皎如玉樹臨風前石林蓋李之先人佇膺世選不俟民庸某家寓峨峰族出成紀漢書李廣隴西成紀人李氏族朢重來訪鴈湖之鴈已隔煙霄鄧德明南康記固平縣覆笥山上有大湖周數十里靈果異物皆不可識有石鴈浮在湖中至秋天石鴈飛鳴如候時也何幸見龍津之龍早騰雲漢龍津在今延平即宋南劒州亦名交劒潭晉書雷煥卒子華為州從事持劒行經延平津劒忽於腰間躍出墮水使人沒水取之不見劒但見兩龍各長數丈蟠縈有文章沒者懼而反其為頌詠曷既敷陳代回朱總屬喻講書徽本逸此二字久於暌離辱此臨賁四卦名頓解塵埃之渴更勤月露之文李諤論文體書連篇累牘不出月露之形詳見前退而復白圭之三何翅得黃金之百季布傳得黄金百不如得季布諾詳見前駕彼四牡量材未敢以載驅詩駕彼四牡四牡騤騤遺我雙魚拜賜惟知於長跽古詩長跽讀素書書中意何如代回鄧總幹綱共州隔邑偶萬里之盍簪易勿疑朋盍簪注盍合也簪疾也孔疏云若能不疑於物以信待之則衆隂羣朋合聚而疾來也歐陽永叔詩惜予不與合朋簪王介甫詩天涯無路盍朋簪互見前異事同寮借一章而推轂詩我雖異事及爾同寮詳見前所慙假蓋家語孔子將行雨無蓋門人曰商也有之孔子曰商之為人也甚恡於財吾聞與人交推其長者遺其短者故能久也何用陳箋恭惟某官才氣鴻龎龎盧東切充實也帝王世紀質始萌而未兆謂之龎鴻詞華犀鋭犀堅也鼂錯傳器不犀利增韻古以犀兕為甲故謂堅為犀馮奉世傳器不犀利晉灼曰犀堅也倦乘箕而騎尾莊子傅説得之以相武丁奄有天下乘東維騎箕尾而比於列星疏傅説星精也而傅説一星在箕尾上然箕尾則是二十八宿之數維持東方故言乘東維騎箕尾而與角亢等星比竝行故云北於列星甘歷井以捫參李詩捫參歴井仰脅息參井魏之分野屬益州北風既亟只且獨何為乎愁苦只音紙且音疽詩北風其凉雨雪其雱惠而好我擕手同行其虛其徐既亟只且詩序北風刺虐也衞國竝為威虐百姓不親莫不擕持而去焉屈原九歌夫人自有兮美子孫何以兮愁苦南鄭多道亡者顧不行兮夷猶韓信傳至南鄭諸將道已者數十人屈原九歌君不行兮夷猶褰誰留兮中洲天實生之人為瞠若莊子瞠若乎後者瞠敇庚反又丑郎反字林云直視貌去國朞年見似者喜矣莊子子不聞夫越之流人乎去國數日見其所知而喜去國旬月見所嘗見於國中者喜及朞年也見似人者而喜矣不亦去人滋久思人滋深乎嗟爾逺道何為乎來哉蜀道難其險也如此嗟爾逺道之人胡為乎來哉引鼎不程禮記引重鼎不程其力注程猶量也重鼎大鼎也引重不量勇力堪之與否當之則往也詳見前乞隣非直偉卿以一身從我安敢蔽賢後漢書鄧晨字偉卿更始以晨為常山太守㑹王郎反光武自薊走信都晨亦間行㑹於鉅鹿下自請從擊邯鄲光武曰偉卿以一身從我不如以一郡為我北道主人伯道之五鼓不來忽聆執誶晉書良吏傳鄧攸字伯道為呉郡守載米之郡俸禄無所受唯飲呉水而已稱病去職百姓數千人留牽攸船不得進攸乃小停夜中發去呉人歌之曰紞如打五鼓鷄鳴天欲曙鄧侯挽不留謝令推不去誶或作訊詩執訊連連注又作執誶詩歌以訊之釋文作誶音信左傳鄭子家使執訊與之書注通訊問之官某久於戍雪杜詩西山白雪三城戍行矣解冰趙充國傳冰解漕下當百里半九十之時敢辭賤役戰國策甘茂謂秦王曰詩云行百里者半于九十此言末路之難注此逸詩也言行九十里適足為五十里耳有一石三十鍾之窘更賴仁言漢書主父偃傳奏欲攻匈奴使天下飛芻輓粟起於黃腄瑯琊至負海之郡轉輸北河率三十鍾而致一石師古曰六斛四斗為鍾計其道路所費凡用百九十二斛乃得一石至左傳仁人之言其利溥哉代回陳檢察鑄仰仲子之世家積百聞於一見趙充國傳百聞不如一見兵難隃度得孟公之手牘將異事而同寮游俠傳陳遵字孟公性善書與人尺牘主皆藏去以為榮所愧先施之未能乃䝉下問而不恥恭惟某官學有家法後漢徐防傳博士弟子皆以意説不修家法左雄傳諸生試家法注儒有一家之學故稱家儒林傳序各以家法教授才應時須杜詩管葛本時須詳見前登賢能之書竟合丹墀之對周禮鄉老及鄉大夫羣吏獻賢能之書於王王再拜受之登於天府夏竦詩縱橫禮樂三千字獨對丹墀日未斜作神仙之尉未忘文石之忠梅福傳為郡文學補南昌尉上書願壹登文石之陛盡平生之愚慮王莽顓政一朝棄妻子去九江至今傳以為仙尋小試於幕謀謂徑通於閨籍李詩謬通金閨籍居然斂板晉輿服志古者貴賤皆執笏主書君上之教令後惟八座執笏其餘卿士但執手板職林州别駕治中見刺史持板拜刺史答拜梁書到溉傳溉斂板對復此曵裾鄒陽傳何王之門不可曵長裾乎仇香傳曵長裾飛名譽東坡詩白髮侯門尚曵裾百斛千鍾來察聖賢之實孔叢子平原君與子高飲强子高酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲百榼古之聖賢無不能飲吾子何辭焉子高曰以予所聞聖賢以道德兼人未聞以飲也平原君曰即如先生言則此言何生子高曰生於嗜酒者蓋其勸勵之辭非實然也傳𤣥酒賦唐堯干鍾周文百觚江統酒誥歴代悠逺經史彌長上自三皇下逮五帝雖曰聖賢亦咸斯嘗今按百斛當作百觚一石五斗肯聽婦兒之言劉伶傳嘗渴甚求酒於妻妻捐酒泣諫伶曰善吾不能自禁惟當祝鬼神自誓耳便可具酒肉妻從之伶跪祝曰天生劉伶以酒為名一飲一斛五斗解酲婦兒之言慎不可聽仍飲酒御肉隗然復醉一斛語林作一石聽平聲無嫌從事之獨勞詩序北山大夫刺幽王也役使不均已勞於從事而不得養其父母焉詩大夫不均我從事獨賢行應司徒之計治某燕巢既舊見前蝗粟知慙白樂天詩是時粟斗錢三百蝗蟲之價與粟同明珠暗投固已覺我之形穢鄒陽傳明月之珠以闇投人於道世説驃騎王武子是衞玠之舅雋爽有風姿見玠輒歎曰珠玉在側覺我形穢寒冰烱立尚或使人之眼明杜詩烱如一段清冰出萬壑置在迎風寒露之玉壺又鸕鷀鸂鶒莫漫喜我與汝曹俱眼明貫休詩只有天上人見我雙眼明山谷詩吾與北人俱眼明又獨我一雙眼明通湖南韓運管職官分紀熈寧二年詔廣州等七路轉運司依京東等路各舉官一員充管勾文字續㑹要元豐元年詔轉運司勾管文字不得隨本司出巡政和四年詔依舊法如别官陳情差委雖奉行㫖亦不許委出職源建炎初避高宗諱改勾管為主管詳啓意簿寧鄉時作望桐韓之閥閲夙仰泰山宋韓億字從魏其先真定靈壽人八子綱綜絳繹維縝緯緬而絳縝位宰相維門下侍郎真定韓氏忠憲公家也忠憲諸子名連系字康公兄弟也生宗字宗之下從玉玉之下從日日之下從元元之下從水世謂桐樹韓家韓愈傳贊學者仰之如泰山北斗持苦李之姓名敢通北海李氏帝顓頊高陽之裔顓頊生大業大業生女莘女莘生臯陶為堯理官子孫因姓理氏裔孫理徵得罪於紂其子利貞逃難伊侯之墟食木子得全因變姓李氏利貞十一代孫李耳字伯陽居苦縣賴鄉曲仁里又王戎傳樹在道邊而多子必苦李也東坡詩顧我如苦李全生依路傍新唐書李邕傳為汲郡北海太守邕雖詘不進而文名天下時稱李北海𦕈然縣掾之賤掾俞絹切官屬望之使筦之尊以言自鳴於分甚僭恭惟某官材猷孔碩增韻碩大也又充實也詩為爼孔碩太𤣥經我心孔碩文獻甚都司馬相如傳閒雅甚都師古曰都閒美之稱也東萊其師驥固宜於汗血東萊先生吕成公祖謙也西域傳大宛國多善馬馬汗血言其先天馬子也神異經西南大宛宛邱有良馬日行千里至日中而汗血東觀漢記聞武帝歌天馬洽赤汗今親見其然血從前髆上小孔中出杜詩驊騮作駒已汗血南澗之嫡鳳何有於凡毛南史謝超宗鳳之子殷淑儀卒超宗作誄奏之帝大嗟賞謂謝莊曰超宗殊有鳳毛靈運復出時右衞將軍劉道隆在御坐出候超宗曰聞君有異物可見乎超宗曰懸磬之室復有異物耶道隆武人無識正觸其父名曰旦侍宴至尊説君有鳳毛超宗徒跣還内道隆謂檢覓毛至闇待不得乃去杜詩池上於今有鳳毛君遣使之皇皇詩序皇皇者華君遣使臣也筵得賔而秩秩詩賔之初筵左右秩秩坐紆三組楊僕傳懐銀黃垂三組臥護重湖裴度傳侍中舊德敢煩卧護北門韓詩卧護北門牢重湖謂洞庭青草詳别見使胸吞雲夢而恢然司馬相如傳吞若雲夢者八九於其胸中曾不蔕芥則背負天風也必矣莊子而後乃今培風背負青天而莫之夭閼者某卑棲矮屋杜詩舍弟卑棲邑防川領簿曹天寳遺事進士張彖授華隂尉時縣令太守俱非其人多行不法張生有吏道勤於政毎申舉一事則太守令尹抑而不從張生曰大丈夫有凌霄蓋世之志而拘於下位若立身於矮屋中使人擡頭不得遂拂衣歸遯於嵩山仰席崇臺席當作藉慈夜切漢書注謂借助也安得自高政有資於引重孫寶傳士安得獨自高詳見前灌夫傳兩人相為引重張晏曰相薦達為聲勢也師古曰相牽引而致於尊重也能令公怒寧無朢於包荒晉書郄超傳王珣為桓溫主簿為溫所重府中語曰髯參軍短主簿能令公喜能令公怒易包荒用馮河詳見前代回胡運管極回首祝融之峰前久無鴻鴈祝融峰在今衡州府衡山縣西北三十里位直離宫以配火德乃祝融君遊息之所上有青玉壇道書以為第二十四福地迥鴈峰在衡陽之南鴈至此不過遇春而迥故名濯足清江之窻下忽送鯉魚既感故情又慙褒語恭惟某官士林翹楚詩翹翹錯薪言刈其楚正義曰翹翹然而高者乃是錯薪箋云楚雜薪中之尤翹翹者宦海汩齊太平廣記顔真卿卧病有道士稱北山君出丹砂粟許救之謂之曰子有青簡之名已誌金臺可以度世不宜沉於名宦之海列子與齎俱入與汩偕出從水之道而不為私焉齎莊子作齊郭象注磨翁而旋入者齊也回伏而湧出者汩也騰身方脱於選堦斂手又償於縣債賴割鷄之敏甚卒馴雉以靡然魯恭傳有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方將雛風漢書燕齊之間靡然發動又天下學士靡然鄉觀其不辭州縣之勞終焉必為臺閣之器聊依緣水即致青雲史記范睢傳不意君能自致於青雲之上某不安田廬東坡詩居貧豈無食不自安畎畝又塵班列老矣無能為也行即告歸見前回劉撫幹條忠焉能弗誨乎毋忘嗣訊代回胡運管極西清舉賢爭剡需頭之薦司馬相如傳象輿婉僤於西清師古曰西清者西箱清靜之處也蔡邕獨斷章者需頭稱稽首上書謝恩陳事詣闕通者也詳見前南郭濫吹與題箝尾之名韓子齊宣王使人吹竽必三百人齊吹南郭先生不善竽而濫於三百之中食禄宣王死湣王立好一一吹之先生乃逃箝其淹切説文薾也韓文藍田縣丞㕔壁記箝以左手右手摘紙尾南史蔡廓傳我不能為徐干木署紙尾選案黃紙錄尚書與吏部尚書連名故廓言署紙尾也計效則無何謝之有恭惟某官抱致逺之度無欲速之心才名四十年始償邑債扶摇九萬里猶作幕賔竝見前歸張迭嗟昌黎薦士詩廟堂有賢相愛遇均覆燾况承歸與張二公迭嗟悼言孟郊嘗為歸登張建封所知崔李交説昌黎答楊敬之書平昌孟東野説足下不離口崔大敦詩毎毎説人物亦以足下為處子之秀近又得李七翺書亦云足下之文逺其兄甚夫以平昌之賢其言一人固足信矣况又崔與李繼至而交説耶射雉而用一矢緜力可慙易旅六五射雉一矢亡終以譽命王弼注射雉以一矢而復亡之明雖有雉終不可得矣山谷詩晁張作薦書射雉用一矢任淵注陸機薦戴淵於趙王倫曰蓋聞繁弱登御然後高墉之功顯孤竹在肄然後降神之樂成按易曰公射隼於高墉之上獲之无不利繁弱弓名山谷蓋用此意但改射隼為射雉繁弱為一矢耳嚴助傳緜力薄材師古曰緜弱也言柔弱如緜烹魚而得尺書雄文何腆某亡能為役有味其言竝見前末路再得朋喜而不寐韓詩幸同學省官末路再得朋吾負二宜去人謂斯何韓文吾負二宜去尚奚顧子言又昔者人謂斯何詳見前代回添差呉運管鑰詳啓意鑰蓋高宗憲聖慈烈呉皇后之族戚侯四姓既聨中秘之華漢書外戚恩澤侯表漢興外戚與定天下侯者二人後漢書明帝紀為四姓小侯開立學校置五經師注為外戚樊氏郭氏隂氏馬氏諸子弟立學號四姓小侯以非列侯故曰小侯禮記曰庶方小侯亦其義也成帝紀河平三年光禄大夫劉向校中秘書劉向傳詔向領校中五經秘書師古曰言中者以别於外唐六典漢書府在外則有太常太史博士掌之内則有延閣廣内石渠之藏劉向揚雄典校皆在禁中謂之中書猶今言内庫書也後漢時藏之東觀亦禁中也宋廣平集睠彼蘭臺古稱華省部使六條顧倚上賔之重漢武帝元封五年置部刺史掌詔六條察州詳見前枚乘傳乘乆為大國上賔與英俊竝游方欲展大賢之敬乃先勤小牘之恭一謙尊光三復感愧恭惟某官器函天粹法言天精天粹萬物作類才軼人羣岑參詩詞賦超人羣太姒徽音雖不聞而亦式詩太姒嗣徽音則百斯男又不聞亦式不諫亦入少君高節豈以貴而自驕外戚傳孝文竇皇后兄長君弟廣國字少君家於長安絳侯灌將軍等曰吾屬不死命乃且縣此二人於是迺選長者之有節行者與居長君少君由此為退讓君子不敢以富貴驕人榮通東壁之圖書見前暗接西箱之筆槖漢書西清注西箱清靜之處顧肯參聨於冰漕趙充國傳冰解漕下不辭主諾於日畿白虎通京師者千里之邑號也法日月之徑千里世選爾勞聊復養修門之朢尚書世選爾勞予不掩爾善宋玉招魂魂兮歸來入修門些詳見前徒得君重詎真煩細務之親見前無王事鞅掌之勤詩王事鞅掌毛傳鞅掌失容也箋鞅猶荷也掌謂捧之也負荷捧持以趨走言促遽也正義云促遽亦是失容詩疏煩勞狀鄭云鞅如馬鞅之鞅掌以手拘物詩補傳鞅掌皆所以拘物謂王事所拘有皇華咨譎之任見前銅龍甲觀生民久朢於姜嫄漢書元帝召太子出龍樓門張晏曰門樓上有銅龍又孝成皇帝元帝太子母曰王皇后元帝在太子宫生甲觀畫堂為世嫡皇孫宣帝愛之字曰太孫應劭曰甲觀在太子宫甲地師古曰甲者甲乙丙丁之次也元后傳言見於丙殿是其例也詩厥初生民時維姜嫄路馬乘車褒賞誰如於申伯詩王遣申伯路車乘馬我圖爾居莫如南土錫爾介珪以作爾寶往近王舅南土是保詩序崧高尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉按路馬乘車當作乘馬路車某凄其紛白復此依紅見前蛙以墟拘豈是緣青㝠之脚莊子并鼃不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也曲士不可以語於道者束於教也昌黎月蝕詩嘗聞古老言疑是蝦蟇精把沙脚手鈍誰使女解緣青冥魚於川泳尚或同白水之心昌黎節度使㕔壁記志同而氣合魚川泳而鳥雲飛也左傳所不與舅氏同心者有如白水代回許運幹儀職官分紀國朝熈寧三年詔諸路轉運司奏舉京朝官知縣資序二人充本司勾當其京東西淮南西浙各許舉一員職源元祐中除三路外竝罷後復置建炎初避高宗諱改勾當為幹辦枉駕臨存嚴助傳使重臣臨存師古曰存謂省問之屬辭賁重臨賁卦名今作禁門鍵敢當百年幾見之稱陳後山送東坡知杭州詩一代不數人百年能幾見昔如馬口銜今為禁門鍵詳見前君如雙井茶㑹赴衆口一嘗之願陳後山詩君如雙井茶衆口願一嘗恭惟某官氣嘘海岱韓文龍嘘成雲尚書海岱唯青州文耀虹霓禰衡傳揚聲紫微垂光虹蜺羅致幕中信一第之直溷子見前寶橫道側乃屢薦而不入官韓文誠不忍竒寶橫棄道側顔延之五君詠屢薦不入官今歸張之迭嗟又崔李之交説俱見前敢愛其力韓文吾豈有愛於力乎哉而隱於言惟是日夕之牛羊㑹且歸矣詩日之夕矣牛羊下來又㑹且歸矣瞻彼月明之烏鵲愛莫助之某有味推賢無能為役竝見前然前驅弩矢固余力之不任司馬相如傳縣令負弩矢先驅師古曰導路也韓文固孰知余力之不任若旁譟鼓旗或此心之可效寇恂傳士馬四集幡旗蔽野恂乃令士卒乘城鼓噪六一居士集安得二子接揮鋒兩交鋩我亦願助勇鼓旗譟其旁代回奚運幹祝題鴈塔之名夙有同升之幸見前依驪駕之漕兹叨聨事之榮寇恂傳時軍食急乏恂以輦車驪駕轉輸前後不絶注驪駕併駕也擊車人絶行也愧削牘之未遑原陟傳削牘為疏注牘木簡也感飛箋之先辱恭惟某官巋然地望莊子巋然而有餘王廷夀靈光殿賦巋然獨存北史公孫表傳鴈門李氏地望懸隔雋甚天姿手決世科不用懐綳之簪笏法言須以發策决科韓詩爵勲逮僮𨽻簪笏曰懐綳繃悲萌切束兒衣漢書襁褓注即今小兒繃或作綳力行家學固求竹帛之功名鄧禹傳垂功名於竹帛詳見前便當正奚仲之車續漢書輿服志奚仲為車正具物以時六材皆良譙周古史考黃帝作車引重致逺少昊時略加牛禹時奚仲加馬何用主李悝之糴杜氏通典魏文侯相李悝曰糶甚貴傷人甚賤傷農人傷則離散農傷則國貧故甚貴與甚賤其傷一也是故善平糴者必謹觀歲有上中下熟大熟則糴三而舍一中熟則糴二下熟則糴一使人適足價平則止行之魏國國以富强湟中四百萬石暫倚經營説文湟水出金城臨羌縣塞外至允吾東入河史記平準書下河漕度四百萬石及官自糴乃足趙充國傳金城湟中穀斛八錢吾謂耿中丞糴二百萬斛榖羌人不敢動矣耿中丞請糴百萬斛迺得四十萬斛耳廣内一百三家卽行校理漢書藝文志六經凡一百三家詳見前某偶攀末甲復託同寅自揣頭顱猶是五侯之賓客西京雜記五侯不相能賔客不得往來婁護豐辯傳食五侯間各得其懽心競致竒膳護乃合以為鯖世稱五侯鯖以為竒味焉漢書河平二年上悉封舅王譚為平阿侯商成都侯根曲陽侯逢時高平侯立紅陽侯五人同日封故世謂之五侯視如手足亦惟四海之弟兄後漢書袁譚欲攻尚别駕王脩曰兄弟者左右手也譬人將鬬而斷其右手曰我必勝若是者可乎老泉集兄弟之情如足於手山谷詩鬼門關外莫言逺四海一家皆兄弟代衞内機回新任趙運幹師秀内幕主書濫竊機謀之禄宋安撫司其屬有管勾機宜文字晦菴集張忠獻公宣撫都督諸軍事奏以栻書冩機宜文字是時年甫二十内贊密謀外參庶務夙夜懍懔以君父之責為已憂外臺贊畫鼎來禮樂之英敘傳河間賢明禮樂是修為漢宗英晉書陳頵刺史銜命國之外臺盍修同寅之恭適坐旁午之冗一從一橫曰旁午猶言交積也霍光傳使者旁午注分布也學林云古篆五字為義象隂陽六爻之義午字亦取此義周禮壺涿氏掌除水蟲若欲殺其神則以牡橭午貫象齒而沉之鄭氏注故書橭為梓午為五交互貫於梓木之上也史言旁午者四方八達皆通亦從横交五之義也高情厚甚下問煜然恭惟某官傑立宗標焯為儒倡焯通作灼説文明也韓愈傳贊以六經之文為諸儒倡麟振振而一角詩麟之角振振公族毛詩義疏麟一角角端有肉春秋感精符麟一角明海内共一主也孫氏瑞應圖一角獸者六合同歸則至漢書終軍傳從上幸雍獲白麟一角五蹄鳳翽翽以九苞詩鳳凰于飛翽翽其羽噦音諱毛傳翽翽衆多也鄭箋羽聲也餘見前太乙吹燈豈特傳五行之學王子年拾遺記劉向校書天禄閣夜有老人植青藜杖扣閣而進見向暗中獨坐讀書乃吹杖端爛然大明因以照向向因受五行洪範之文向問其姓名云我是太乙之精劉向傳向見尚書洪範箕子為武王陳五行隂陽休咎之應向乃集合上古以來至秦漢符瑞災異之記著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論長庚吐焰固宜光萬丈之文李陽冰草堂集序驚姜之夕長庚入夢故生而名白以太白字之世稱太白之精得之矣韓詩李杜文章在光燄萬丈長吾道非耶家語吾道非乎奚為至於此公等安在主父偃傳公皆安在何相見之晚也既低飛於枳棘言為簿又屢泛於芙蓉南史庾杲之傳王儉用杲之為衞將軍長史安陸侯蕭緬與儉書曰盛府元僚實難其選庾景行汎錄水依芙蓉何其麗也時人以入儉府為蓮花池故緬書美之言為幕職輟天塹之元僚天塹謂長江於湖居士集流柹投鞭規濟天塹詳見前佐星軺之計吏棟簾雲雨似聞曾駐於襜帷王勃滕王閣詩序詳見前庭户湖山復見重來之賓佐韓文滕王閣記詳見前聊副皇華之咨度即登清切之司存杜詩獻納司存雨露邊地分清切任才賢某濩落束書莊子瓠落無所容注瓠音濩濩落猶廓落也韓詩始我來京師止擕一束書參差一第參初林反差楚宜切參差不齊也説文亂絲貌參相參為參兩相參為差亦作㠁差甘泉賦曾宫㠁差元結傳一第慁子耳不狩不獵豈能談笑於青油詩不狩不獵胡瞻爾庭有縣貆兮張正封詩從軍古云樂談笑青油幕為箕為裘聊戲斕斑之綵服禮記良冶之子必學為裘良弓之子必學為箕斕郎于切色不純也斑逋還切説文駁文也列女傳老萊子孝養二親行年七十作嬰兒自娯著五綵斒斕衣嘗取漿上堂跌仆因卧地為小兒啼或弄雛鳥於親側杜詩綵服日向庭圍趨薾然薄陋莊子薾然疲役注薾音捻㤀貌安所依歸異事同僚儻憐草木之吾味左傳今譬於草木寡人在君君之臭味也又譬諸草木吾臭味也而何敢差池餘見前百聞一見當為珠玉之修容趙充國傳百聞不如一見禮記曾子與子貢入於其廐而修容焉代回曾運幹準射雉而用一矢緜力可慙見前代回胡運幹條烹魚而得尺書雄文甚寵初無足謝何過乎恭恭惟某官殖學精深左傳夫學殖也不學將落摛辭鉅麗司馬相如傳君未覩夫巨麗也師古曰巨大也麗美也呉質與東阿王書奉所惠貺發函伸紙是何文采之巨麗而慰諭之綢繆乎一讀阿房之賦信凡馬之皆空見前再歌泮水之詩知祝螟之速肖詩思樂泮水法言螟􅘾之子殪而逢蜾羸祝之曰類我類我乆則肖之矣速哉七十子之肖仲尼也仰贊星軺之畫盍歸天網之收老子天網恢恢疎而不漏魏文帝典論設天網以該之頓八紘以掩之山谷詩天恢獵德網日饎養賢鼎某老矣綴班闕然報國徒得君重輒剡牘於公車見前何以文為更歸恩於私室羊祜傳拜爵公朝謝恩私門吾所不取不辦七襄之報姑容十襲之藏竝見前代回新成都趙帳幹益宋熈寧詔諸路漕司始置屬官元祐詔運司管勾文字除三路外竝罷其職掌帳司兼管後復故計幕借材鼎來主諾郵筒聞報方欲貢書猥勤下問之光殊感高情之厚恭惟某官世濟其美父教之忠竝見前材刃有餘解全牛而不頓莊子三年之後未嘗見全牛也賈誼傳屠牛坦一朝解十二牛而芒刃不頓注頓讀曰鈍智囊無底洗凡焉而可空史記樗里子名疾滑稽多智秦人號曰智囊晁錯傳太子家號曰智囊師古曰言其一身所有皆是智算若囊槖之盛物也魯㳟傳祖父匡有權數號曰智囊干寶晉書桓範出赴曹爽司馬宣王謂蔣濟曰智囊往矣濟曰駑馬戀棧豆爽必不能用也王充論衡劉歆漢朝智囊筆墨淵海高僧傳支謙月支人游漢境博覽經籍時人為之語曰支郎眼中黃形軀雖細是智囊白氏六帖云樗里子癭多智號曰智囊又云杜預多智人號智囊釋常談云患癭者謂之智囊史記樗里子癭而多智時人號為智囊又杜預亦有癭也今按史記樗里子傳止言滑稽多智不言患癭晉書杜預亦無智囊之目但云呉人知預病癭憚其智計以瓠繫狗頸示之惟新唐書李義府傳云王德儉癭而智豈指癭為智囊耶晉書載記慕容垂欲伐慕容永曰吾投老叩囊底智足以尅之列子渤海之東有大壑焉實惟無底之谷山谷詩書囊無底談未了是宜即復於青氊不謂尚淹於墨綬惟兹漕軵軵乳勇切音與冗同説文推車令有所付也淮南子軵車而餉馮奉世傳再三發軵如淳曰推也正重賓筵惠然肯來協贊皇皇之轡詩惠然肯來又皇皇者華又六轡如濡出其所學行豐暴暴之財荀子上得天時下得地利中得人和則財貨渾渾如泉源汸汸如河海暴暴如邱山注暴暴卒起之貌言物多委積高大如邱山也不俟章交劉向傳章交公車㑹應召用某冒焉行險甫此依仁杜詩此邦今尚武何處且依仁及同君子之僚亶為幸㑹韓文留守無事多君子僚所媿小夫之牘不盡傾期見前代回唐提幹元齡詳啓意蓋代月湖中興㑹要建炎四年詔諸路提刑司除武臣提刑添置幹辦公事官許存留文臣一員夏辟三千參聨無補言為刑侍冬官六十攝長可慙言為工書何勤執訊之來訊音信説文問也爾雅疏訊問以言也詩執訊連連左傳鄭子家使執訊而與之書注執訊通訊問之官更辱徽言之寵尚書予旦已受人之徽言徽美也恭惟某官摘髭名第韓詩連年收科第若摘頷底髭策足英游古詩何不策高足枚乘傳與英俊竝游暮拔其尤久幕中之羅致韓文暮取一人焉抜其尤又羅而致之幕下歲計其入如地上之錢流劉晏傳自言如見錢流地上行交公車之章見上註當為清廟之器新唐書李珏傳珏以數諫不得留出為下邽令武昌牛僧孺辟掌書記薦為殿中侍御史宰相韋處厚曰清廟之器豈擊搏才乎除禮部員外郎某不能者止乃分之宜韓文投閒置散乃分之宜方鳩僝功忘以年之當廢尚書共工方鳩僝功孔傳鳩聚僝見也僝仕簡反晉武帝紀時張貴人有寵年幾三十帝戲之曰汝以年當廢矣我龜既厭知曷月之還歸詩我龜既厭不我告猷鄭𤣥注卜筮數而凟龜龜靈厭之不復告其所圖之吉凶也言雖得兆繇不中也詩懐哉懐哉曷月予還歸哉代回陳提幹伯震詳啓意亦代月湖明詔選賢爭抗需頭之薦蔡邕獨斷章者需頭稱稽首上書謝恩陳事詣闕通者也詳見前老夫涉筆但深遯尾之慙左傳老夫髦矣無能為也韓文涉筆占位署惟謹易遯尾厲勿用有攸往孔氏正義云遯尾厲者為遯之尾最在後者也自謙去位之晚幸而得君可以報國恭惟某官摘髭名第策足俊游俱詳上條人歎老而嗟卑急於速化昌黎答陳生書足下求速化之術不於其人乃以訪愈又速化之術如是而已士任重而道逺當在晚成馬援傳大材當晚成欲功名留久逺之看信溫飽非平生之志竝見前日諸公之暗摸唐許敬宗見人多忘之或謂其不聰曰卿自難記若遇何劉沈謝暗中摸索亦可識露尺牘以明揚尚書明明揚側陋今猶待詔於公車東方朔傳令待詔公車師古曰公車令屬衞尉上書者所詣也底用謝恩於私室見前某隨人作計為役無能感北山之移文逝將命駕宋周顒字彦倫初隱北山後為山隂令秩滿入京復經此山孔德璋代此山移文以絶之逝逮也詩逝不古處通作噬詩噬肯適我毛傳逮也觀東閤之竒士更幸改轅朱雲傳且留我東閤可以觀天下竒士代回䕫路馬提幹已二年滿戍鷁回首以東歸集韻鷁首天子舟也淮南子龍舟鷁首浮吹以虞此游於水也方言船首或謂之閣又謂之鷁首注今江東貴人船首作青雀是其象也子虚賦浮文鷁揚旌栧再命觸藩蟇朶頥而西顧易羝羊觸藩不能退不能遂蟇頥山在眉州東七里自象耳山連峰壁立西瞰玻瓈江五十餘里至此磅礴蹲踞形類蟇頥故名陸務觀入蜀記云嘏蟆培水品所載第四泉是也蝦蟆在山麓臨江頭鼻吻頷絶類而背脊皰處尤逼真造物之巧有如此者自背上深入得一洞穴石色綠潤泉泠泠有聲自洞出垂蝦蟆口鼻間成水簾入江本欲潛深而伏隩顧使出幽而遷喬欲罷不能不知所賀恭惟某官岷峨擢秀江漢養源淬剸犀之鋒馳騁不難於萬里王褒傳巧冶鑄千將之樸清水淬其鋒越砥斂其鍔水斷蛟龍陸剸犀革駕齧䣛驂乘旦縱馳騁騖忽如景靡周流八極萬里壹息賦射熊之館吹嘘亦在於九天黃圖長楊宫有射熊館在􅉦厔地理志秦昭王起元帝紀永光五年冬幸長楊宫射熊館布車騎大獵揚雄傳雄從至射熊館還上長楊賦以風杜詩揚雄更有河東賦惟待吹嘘送上天若為二紀之塵埃良負兩科之冠劒雋不疑傳不疑冠進賢冠帶櫑具劔門下欲使解劒不疑曰劔者君子武備所以衞身不可解方江濤之如此覺人物之𦕈然俱見前勳業終伏波之歸杜詩勲業終歸馬伏波詳見前圖畫勉凌煙之繼唐太宗紀貞觀十三年圖功臣於凌煙閣閣在西内太極宫三清殿側某濫竽榜下韓非子齊宣王使人吹竽必三百人齊吹南郭先生不善竽而濫於三百之中食禄曵尾泥中莊子吾將曵尾於泥中矣詳見前推轂有味其言心乎愛矣鄭當時傳其推轂士及官屬丞史誠有味其言也詩心乎愛矣遐不謂矣引鼎不程其力人謂斯何禮記引重鼎不程其力韓文昔者人謂斯何今者人謂斯何代回新班李茶幹鎰宋宣和間置茶鹽提舉屬官一員名茶鹽提舉司幹辦公事白髮强顔洊叨乘障黃塵眯目未暇見賢敢圖宗家之英辱貽記室之牘竝見前恭惟某官人門第一新唐書李揆傳揆美風儀善奏對帝嘆曰卿門第人物文學皆當世第一信朝廷羽儀乎東坡詩單于若問君家世莫道中朝第一人材氣無雙李廣傳數與匈奴戰典屬國公孫昆邪為上泣曰李廣材氣天下亡雙自負其能數與虜确恐亡之麒麟地上已通籍於煙霄龍鶴山中難窺斑於霧雨世説王獻之數歲時嘗看諸門生摴蒲見有勝負因曰南風不競門生輩輕其小兒乃曰此郎亦管中窺豹時見一斑魏志注論者之言一似管窺虎劉向列女傳陶答子化陶三年名譽不興家富三倍其妻諫曰妾聞南山有𤣥豹霧雨七日不下食者欲以澤其衣毛而成其文章故藏以逺害藏隱也謝朓詩雖無𤣥豹姿終隱南山霧切聞三史六經之學詩書禮樂易春秋為六經詩書春秋為三史又史記及前後漢書為三史唐諫議大夫殷侑言三史為書勸善懲惡亞於六經比來史學多廢至有身處班列而朝廷舊章莫能知者於是立史科及三傳科欲追一翁二季之蹤陳後山詩一翁二季相對朢謂三蘇行膺綸綍之招何待絃歌之試某夙同鱓譜鱓疑當作蟬揚雄傳有周氏之蟬嫣兮或鼻祖於汾隅注蟬嫣連也自言系出周氏近倚龍門李膺傳膺獨持風裁以聲名自高士有被其容接者名為登龍門辛氏三秦記河津一名龍門水險不通魚鼈之屬莫能上江海大魚薄集龍門下數千不得上上即為龍也所恨室邇而人遐未由展覿詩其室則邇其人則逺陳後山詩室邇人則逺燕黙勞者歌梁書阮孝緒傳御史中丞任昉欲造而不敢朢而歎曰其室雖邇其人甚逺為名流所欽尚如此敢謂禮踰而情過更費屬辭韓文茍來者吾斯進之而已矣烏待其禮逾而情過乎感鍥惟深鍥苦結切集韻刻也鋪棻曷既班固西都賦桑麻鋪棻代回提幹監鎮揚修職填問一得三夙服名駒之譽趙熹傳卿名家駒努力勉之詳見前駢四儷六兹窺汗馬之功韓文駢四儷六錦心繡口蕭何傳未有汗馬之勞得非所䝉陳後山詩呼我過其廬所得非所䝉竊願有復禮記侍坐于君子若有告者曰少問願有復也恭惟某官岷峨毓秀江漢濯英挺有祖風固合間於兩社魏謩傳贊挺挺有祖風烈左傳間於兩社為公室輔禮記注魯之外朝在庫門内東亳社西國社朝廷執政之處故曰間於兩社裕乃父烈寧當久於諸侯柳文皇曰咨愬裕乃父功兹耿耿以發硎詩耿耿不寐錢氏曰耿耿小明李賀詩元精耿耿貫當中已纍纍其綴組漢書印何纍纍詳見前芝蘭庭下子弟正欲自佳謝𤣥傳謝安戒約子姪因曰子弟亦何豫人事而正欲使其佳𤣥曰譬如芝蘭玉樹欲使其生於庭階耳互見前槐棘班中公侯必復其始左傳合而能固安而能殺公侯之卦也公侯子孫必復其始畢萬畢公高子孫言當復為公侯也某辱崇世契見顧邦交老欲荷鋤歸問南山而種荳陶淵明詩種荳南山下草盛豆苗稀晨興理荒穢帶月荷鋤歸古來和鼎相期東閣之觀梅山谷詩古來和鼎實杜詩東閣官梅動詩興代回許知縣鴻祖虞判院提幹垚袖賀屣履迎門獲解塵埃之渴屣所倚切通作躧説文舞履也徐曰足根不正納履也史記跕躧履舞者足跟不正納也雋不疑傳躧履起迎師古曰履不著跟曰躧躧謂納履未正曵之而行言其遽也王符傳衣不及帶屣履出迎互見前文書􅔷袖辱貽月露之篇韓文文書􅔷袖賈島詩􅔷袖有新詩隋李愕上書連篇累牘不出月露之形所慙先施之未能又覺成章之匪報詩雖則七襄不成報章又匪報也永以為好也惟感千金之贈特深十襲之藏代回䕫路常平馬提幹已榮宋熈寧六年改提舉常平司主管官為幹辦公事依漕屬例偏城守土曾微牧御之庸一道觀風猥被將輸之命竝見前亟控循牆之避左傳三命而俯循牆而走牆謂公門循牆不敢安行也但期接淅而行敢意鳴謙易鳴謙貞吉祇深自訟謙訟卦名恭惟某官銅標氣槩漢馬援既平交趾立銅柱為漢界相傳在欽州古森洞上有援誓云銅柱折交趾滅新唐書馬總字㑹元系出扶風遷安南都護獠夷安之建二銅柱於漢故處劖著唐德以明伏波之裔日南郡西有西屠夷國援嘗經其地亦植二銅柱表漢界及北還留十餘户於柱下至隋乃有三百餘户悉姓馬絳帳文章馬融傳達生任性不拘儒者之節常坐高堂施絳紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者早收楊葉之功史記楚有養由基者去柳葉百步而射之百發百中杜詩舊穿楊葉真自知白樂天喜弟敏中及第詩桂折一枝先許我楊穿三葉盡驚人尋擢桂林之第郤詵傳詵對武帝曰臣舉賢良對策為天下第一猶桂林之一枝崑山之片玉帝笑全材孔碩迅步何稽羅而致幕中逆占穎脱竝見前爭令出門下行即章交韓文諸公要人爭欲令出我門下交口薦譽之佇軒翥以砉然翥章恕切音與著同説文飛舉也楚辭鸞鳥軒翥而翔班固傳三足軒翥於茂樹砉霍虢切皮骨相離聲或作騞莊子奏刀騞然又騞然而過知乘除之必爾呉趙達九宫一算之術頭乘尾除父子不相語韓詩聲名相乘除注厯象有增減率遲速積故有乘除之法夢溪筆談云算法多門皆不離乘除唯增成一法稍異其術多不用乘除但補缺就盈而已假如欲九除者增一便是八除者增二便是但一位一因之若位數少則頗簡捷位數多則愈煩不若乘除之有常某濫叨小節甚愧同升節升卦名兩科文武之英幸獲恩於下拜三川人物之論亦竊服於旦評所愧匹雛無力之人莫旅萬牛回首之送杜詩萬牛回首邱山重區區之悃見前續續以言陳後山詩聲問應須續續來代回詹書監淵蓋代月湖庶獄哀矜參聨弗績尚書皇帝哀矜庶戮之不辜五材飭化率屬罔功周禮或審曲面勢以飭五材以辨民器又頒職事十有二於邦國五曰飭材七曰化材過辱高情更勤下問恭惟某官有志於世用力斯文儼素韠之倚廬韠音畢詩庶見素韠兮我心藴結兮揚雄傳結以倚廬孟康曰在倚廬行服三年也應劭曰漢律以不為親行三年服不得選舉師古曰倚廬倚牆至地而為之無楣柱倚於綺反耿丹心之戀闕范希文之守服必通時相之書洓水紀聞范文正公服中上宰相書言朝政得失及民間利病凡萬餘言王曾見而偉之時晏殊亦在京師薦一人為館職曾謂殊曰公知范仲淹捨不薦而薦斯人乎詳見前富彦國之從權宜有天子之詔東坡富鄭公神道碑公丁秦國太夫人憂詔為罷春宴故事執政遇喪皆起復公以謂金革變禮不可用於平世仁宗待公而為政五遣使起之卒不從命天下稱焉韓文無疾其驅天子有詔不然暮召主父偃傳朝奏暮召入見宜在朝祥禮記魯人有朝祥而莫歌者子路笑之某久玷憲曹唐天寶中改司刑太常伯為憲部又共事典周禮六曰事典以富邦國以任百官以生萬民㑹且歸矣所願為聖人之民詩㑹且歸矣無庶予子憎愛莫助之猶幸惜天下之寶王坦之傳初謝安愛好聲律朞功之慘不廢妓樂坦之苦諫之安遺以書坦之答曰天下之寶故為天下所惜天下之所非何為不可以天下為心乎互見前代回詹書監淵八年一别瞠若可驚瞠抽更切直視也莊子瞠若乎其後千里尺書跫然有喜顔氏家訓書奏尺牘千里眉目跫虚容切人行聲又喜貌莊子聞人足音跫然而喜只慙善頌未免過情恭惟某官叉手成章唐温庭筠才思艷麗工於小賦毎入試押官韻凡八叉手而八韻成多為隣鋪假手日救數人摘髭取第韓詩連年收科第若摘頷下髭民曹補掾已小試十二牛之刀隋開皇三年改度支為民部曾南豐制民曹上卿賈誼傳屠牛坦一朝解十二牛而芒刃不頓詳見前詞學問津又將垂五十犗之餌犗音界説文騬牛也廣韻犍牛也增韻凡畜健强者皆曰犗莊子任公子為大鉤巨緇五十犗為餌不虞銜恤詩無父何怙無母何恃出則銜恤入則靡至疏無父母出門則以中心銜憂旋來入門則堂宇空曠不復覩見如行田野無有所至猶鬱交章少須彈琴之成聲禮記子夏既除喪而見予之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也子張既除喪而見予之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉㑹見積薪之居上汲黯傳陛下用人如積薪後來者居上東坡詩青衫莫厭百僚底白首上有千薪積詳見前某强顔於此視䕃幾何説文䕃草隂也又隂景曰䕃左傳趙孟視䕃尋有味推轂之言老夫髦矣見前持受羮反錦之意執事諒之左傳衞人使屠伯饋叔向羮與一篋錦叔向受羮反錦代回饒殿幹時亨貳職詳刑罔功犴獄誤恩率屬遂長雉工視䕃幾何取數多矣竝見前恭惟某官素材孔碩清德不腓腓符非切避也詩小人所腓毛傳避也醉面春風之和良多行樂宦情秋光之薄還動出機東坡送潞都曹詩序乖崖公在蜀有錄事參軍老病廢事公責之曰胡不歸明日求去留詩為别其略曰秋光都似宦情薄山色不如歸意濃公留而慰薦之莊子萬物皆出於機入於機有赫寶儲行觀幹裕易幹父之蠱又裕父之蠱注蠱者事也能承先軌和裕其事某宜燕居息而鳩僝功見前某水某邱所釣游㑹且歸矣韓文某水某邱吾童子時所釣游也餘見前在阡在陌可來往亦有意與韓文親戚之不仕與倦而歸者不在東阡在北陌可杖屨往來也代回饒殿幹時亨頭顱如此甚慙朝夕之論思班固兩京賦序朝夕論思日月獻納足音跫然真成親戚之謦欬莊子夫逃虚空者藜藿柱乎鼪鼬之逕踉位其空聞人足音跫然而喜矣而况乎昆弟親戚之謦欬其側者乎謦苦頂切又音罄欬苦愛切一音器注謦欬喻言笑也但呼聞所好猶大悦况骨肉之情歡之至也輙因陳謝併賀新除恭惟某官家食甚都易大畜不家食吉彖曰不家食吉養賢也王弼注有大畜之實以之養賢令賢者不家食乃吉也司馬相如傳雍容閒雅甚都師古曰都閒雅之稱也宦情未愸王衍傳吾少無宦情隨牒推移遂至于此南史王微傳微素無宦情梁書何𦙍傳吾年已五十七月食四斗米不盡何容得有宦情文選謝靈運詩序徐幹少無宦情有箕潁之心憖疑僅切爾雅强也詩不憖遺一老箋云心不欲自彊之辭晉語憖庇州犁焉注願也里門養朢久倦游紫樞之庭李尋傳紫宫極樞通位帝紀注紫宫天之北宫極天之北極樞是其旋轉者冊府辦嚴將司存白玉之牒穆天子傳癸巳至於羣玉之山先王所謂策府也呉漢傳毎當出師朝受詔夕即引道初無辦嚴之日注嚴即裝也避明帝諱故改之後漢書祭祀志用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉檢時以印工不能刻玉牒欲用丹漆書之㑹求得能刻玉者遂書書秘方石中命容玉牒不妨游戲東坡詩退之仙人也游戲於斯文㑹在薦揚某宜在掛冠又此持槖聊復爾耳姑出應於俗緣阮咸傳未能免俗聊復爾耳東坡僧圓澤傳俗緣未盡慎勿相近歸去來兮猶可尋於情話歸去來兮辭悦親戚之情話四六標準卷三十
