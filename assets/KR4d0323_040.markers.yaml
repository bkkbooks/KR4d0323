  - {type: variant, offset: 5222, length: 647, content: 綦綦音竒廣韻履餙鳴鳳聽筩應九天之下詔李詩鳳凰初下紫泥詔餘見前拂龜端策驗七日之朋來屈原卜居詹尹乃端策拂龜曰君將何以教之易復亨出入无疾朋來无咎反復其道七日來復利有攸往代回江東李制帥大東七日來復可知天地之心見賀黄制置條千里折衝實頼詩書之帥道随剛長政與和俱恭惟某官徳配陽休並見前氣排冬凛李賀詩依移和氣排冬嚴名播江淮之草木張萬福傳江淮草木亦知爾威名詳見前識通河洛之圖書繫辭河出圖洛出書聖人則之緩帶輕裘方靜觀於雲祲羊祜傳常緩帶輕裘身不被甲詳見前易通卦驗冬至之日見雲送迎從下嚮來歳大美人民和不疾疫無雲送迎徳薄歳惡故其雲赤者旱黒者水白者為兵黄者有土功諸從日氣送迎其効也獻履貢襪佇直上於星辰見前㑹由五更三㸃之行見上賀黄制置條益近一寸四分之景劉向洪範傳夏至景一尺五寸八分冬至景一丈三尺一寸四分春秋二分景七尺三寸六分某材如綫短心亦灰寒並見前倚棠棣之華猶書紙尾詩棠棣之華鄂不韡韡凡今之人莫如兄弟南史蔡廓傳徴為吏部尚書廓問傅亮選事若悉以見付不論不然不能拜也亮以問録尚書徐羨之羨之曰黄門郎以下悉以委蔡吾徒不以厝懷自此以上固宜共參同異廓曰我不能為徐干木署紙尾遂不拜選案黄紙録尚書與吏部尚書連名故廓言署紙尾也韓文藍田縣丞㕔壁記右手摘紙尾鴈鶩以進平立睨丞曰當署丞渉筆占位署惟謹曝茅簷之煖但夢刀頭歐文内制集序凉竹簟之暑風曝茅簷之冬日韓詩暉暉簷日暖且鮮陳後山詩暮年五斗得千里有愧寒簷背朝日古詩藁砧今何在山上復有山何當大刀頭破鏡飛上天大刀頭謂環也杜詩滿目飛明鏡歸心折大刀栁詩贈君從此去何日大刀頭王荆公詩世事但知吹劒首官身難得問刀頭賀曾, SBCK: 曽}
