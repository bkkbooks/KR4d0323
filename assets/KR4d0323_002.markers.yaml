  front:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR4d0323_krp_002-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR4d0323_WYG_002-1a01}
  - {type: variant, offset: 0, length: 1169, content: 欽定四庫全書四六標準卷二宋李劉撰論事代王縣丞上薛檢正極捕盗求改官宋史薛極字㑹之常州武進人以父任調上元主簿中詞科為大理評事嘉定十五年特賜同進士出身歴官參知政事封毘陵郡公加少保和國公致仕時為中書門下省檢正諸房公事效微勞於采棒曾發宿奸魏志曹操年二十舉孝廉為郎除洛陽北部尉曹瞞傳曰太祖初入尉廨繕治四門造五色棒懸門左右各十餘枚有犯禁者不避豪彊皆棒殺之京師斂迹莫敢犯者晉崔豹古今注車輻棒也漢朝執金吾金吾亦棒也以銅為之黄金塗兩末謂為金吾御史校尉郡守都尉縣長之類皆以木為吾用以夾車故謂之車輻趙廣漢傳其發奸摘伏如神開公道於青雲與叨信賞范雎傳不意君能自致於青雲之上髙適贈縣尉詩迹留黄綬人皆歎心在青雲世莫知曹鄴杏園即席上同年詩岐路不在天十年行不至一旦公道開青雲在平地楊升菴丹鉛總録云史記所云青雲之士蓋指聖賢立言傳世者後世乃以登仕路為青雲謬矣京房易傳云青雲所覆其下有賢人隠續逸民傳嵇康早有青雲之志南史陶宏景曰仰青雲睹白日不為遠矣梁衡陽王鈞曰形入紫闥意在青雲袁彖贈隠士庾易詩白日清明青雲遼亮昔聞巢許今見臺尚阮籍詩抗身青雲中羅網孰能施李白詩所以青雲人髙歌在巖户合而説之青雲豈仕進之謂哉韓非子信賞以盡能必罰以禁邪管子開必得之門信慶賞也漢宣帝紀贊信賞必罰綜核名實吳志潘濬傳信賞必行法不可干唐書陸贄傳信賞必罰霸王之資也料虎頭而茍免莊子丘所謂無病而自炙也疾走料虎頭編虎須㡬不免虎口哉料音聊棄雞肋而未能九州春秋夏侯淵為黄忠所殺操臨漢中至陽平欲攻劉𤣥徳而不得進欲守又難為功乃出令曰雞肋官屬不曉所謂楊脩便自嚴裝人驚問何以知之脩曰雞肋棄之可惜食之無所得以比漢中知公欲還也俄操迴師後漢書楊脩傳曹操自平漢中欲因討劉備而不得進欲守之又難為功䕶軍不知進退何依操於是出教唯曰雞肋而已外曹莫能曉脩獨曰夫雞肋食之則無所得棄之則如可惜公歸計決矣幸而得之知所自矣切以鬻牒度民者非國計之得已僧史略曰度牒自南北朝有之見髙僧傳名籍限局必有憑由即今祠部牒也唐㑹要曰天寶六年制僧尼令祠部給牒則僧尼之給牒自𤣥宗始亂名改作者乃王制之必誅今有偽為二三尺之綾遂可坐罔八百緡之鏹燕翼貽謀録僧道度牒毎歳試補刋印板用紙摹印新法既行獻議者立價出賣毎牒一紙為價百三十千然猶歳立為定額不得過數熈寧元年始出賣於民間初歳不過三四千人至元豐六年限以萬數而䕫路轉運司増價至三百千以次減為百九十千建中靖國元年増至二百二十千六年詔改用綾紙依將仕郎校尉例南渡以後再立新法度牒自六十千増至百千淳熈初増為五百千又増為七百千又著為停榻之令許客人増百千興販又増作八百千漢書注鏹錢貫也韻㑹以鏹貫錢也通作繦是姦夫與人主同利賈山傳錢者亡用器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也貨殖傳上爭王者之利故平世而天下乏財我能往彼亦能往歟左傳楚人謀徙於阪髙蔿賈曰不可我能往㓂亦能往不如伐庸是可忍孰不可忍也稽諸令甲宣帝紀地節四年詔曰令甲死者不可復, SBCK: ''}
