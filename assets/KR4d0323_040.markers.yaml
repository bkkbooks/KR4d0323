  - {type: punctuation, offset: 15889, content: (, id: KR4d0323_krp_040-bkkpn1918}
  - {type: variant, offset: 15889, length: 0, content: '', SBCK: 名播江淮之草木識通河洛之圖書緩帶輕裘方静􅀚於雲祲献履貢襪佇直上於星辰㑹由五更三㸃之行益近一寸四分之景某材如綫短心亦灰寒􅀝棠棣之華猶書紙尾曝茅簷之煖但夢刀頭代回楊州崔安撫与之冬三微肇始萬彚滋亨集康寕冨壽之疇在禮樂詩書之帥恭惟某官克壯其猷乆勞于外斗牛有耀坐􅀚推䇿之長淮海無波自適􅀚梅之興卦巳占於七日班即近於五雲某託契惟􅀷修辝不敏拜長牋之委重搔短髪以寘慚報不成章永以爲好代回淮西王安撫柟冬一陽來復旣}
