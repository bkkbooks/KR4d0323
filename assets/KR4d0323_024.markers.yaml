  - {type: variant, offset: 20989, length: 195, content: 左傳古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲滛慝鯨鯢皆海中大魚鯨長千里鯢者鯨之雌亦長千里崔豹古今注云鯨鯢一生數萬子常以五六月就岸生子至七八月𨗳從其子還大海中鼓浪成雷噴沫成雨水族畏避莫敢當者盖鯨鯢有力能驅食小魚故以為疆暴凌弱之喻如獸之有猰㺄蟲之有長虵鳥之有鴟梟然京觀之喻不取彼而取此者盖鯨鯢導從種類䟦扈海中有渠魁之義且其死也彗為之出玉者行戮亦除舊布新之義京大也鯨字從京亦京觀之義與, SBCK: ''}
