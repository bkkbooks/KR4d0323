body:
  text: 四六標準卷十九宋李劉撰六院朝野雜記六院官檢鼓糧審官誥進奏也例以京官知縣有政績者為之亦有自郡守除者則繼即除郎如康伯可是也故恩數略視職事官而不入雜壓紹興十一年胡汝明以料院除監察御史遂遷副端乾道後相繼入臺者有宋敦書等數人而六院彌重號為察官之儲矣淳熙初龔實之秉政其內弟林宓幹辦審計司遇郊思而林尚京秩乃白上以六院官班寺監丞之上林用是得封贈父母紹興二年夏六院官始復入雜壓在五寺簿之下焉代回史文思彌忠蓋彌逺之弟事物紀原云唐有文思院蓋天子內殿之比也其事見畫斷然非工作之所宋置文思院掌工巧之事非唐制矣宋之文思院太平興國三年置掌造金銀犀玉工巧之物金彩繪素裝鈿之飾以供輿輦册寶法物及凡器服之用𨽻少府監熙寧三年詔文思院兩界監官立定文臣一員武臣一員並朝廷選差其內侍勾當官並罷紹興三年詔少府監併歸文思院其上下界監官從工部差辟工部言所轄文思院舊分上下界監官三員內一員文臣係京朝官上界造作金銀珠玉下界造作銅鐵竹木雜料欲依舊分為上下界從之隆興二年詔併禮物局入文思院吳處厚青箱雜記云考工記栗氏掌攻金其量銘曰時文思索故今世攻作之所號文思院詳啓意以下俱代月湖率其屬以僝功慙於尸位尚書共工方鳩僝功僝雛戀切説文具也又見也方鳩聚見其功又太康尸位朱雲傳尸位素餐師古曰尸主也尸位者不舉其事但主其位而已簡乃僚而剡奏幸甚得賢法言奏不剡公義宜然私謝何也談賓録唐證聖中劉竒為侍郎注張文成司馬鍠為御史二人因申屠瑒以謝竒正色曰舉賢無私何見謝恭惟某官早收名第晚步選階鶺鴒在原固不私詔王之爵祿詩脊令在原兄弟急難注脊令雍渠也飛則鳴行則搖不能自舍以求其類如兄弟于急難周禮內史掌王之八柄之法以詔王治一曰爵二曰祿鴻雁于野寧當廢治世之羽儀詩鴻雁于飛肅肅其羽之子于征劬勞于野易鴻漸于陸其羽可用為儀茲聯事之偶同難見善而不舉惟是四六之惠則貽方寸之慙􅍌子吾見子之心矣方寸之地虛矣蜀志徐庶辭先主指其心曰本欲與將軍共圖王霸之業者以此方寸之地也今已失老母方寸亂矣某非曰納交聊復借重子若無言幾失子幸暮取之拔尤見前君家所有更贈君無嵗寒而易葉禮記其在人也如松柏之有心也故貫四時不改柯易葉餘見前代回黃文思燾共工率屬獲陪鄉曲之英尚書垂汝共工又六卿分職各率其屬韓詩嵗貢鄉曲英應格薦賢實致邦家之助是為公舉何以謝為見上條恭惟某官早決科名久淹選調學深純而有本氣穩重而不浮久矣卜鄰欠李雍之識靣杜詩李雍求識靣王翰願卜鄰偶然結綬勤貢禹之彈冠王吉傳吉與貢禹為友世稱王陽在位貢公彈冠言其取舍同也注彈冠者且入仕也何愛一鶚之章少效匹雛之力名節皎日富貴浮雲願無忘激昻之言王章傳不自激昻乃反涕泣何鄙也庶不孤期待之意某不善為斫韓文不善為斫血指汗顔兆足以行偶成一簣之山亦持自賀韓詩於身實已多敢不持自賀切玩連編之月却愧所蒙北史李諤書連篇纍牘不出月露之形積案盈箱唯是風雲之狀代回王文思自聯事為僚見賢當舉同年有子相識已深東坡答劉沔都曹書文章如金玉珠貝未易鄙棄見足下詞學如此又喜吾同年兄龍圖公之有後也輒剡牘於公車豈收恩於私室恭惟某官世濟其美父教之忠並見前不謂二十年之間未脫六七階之選聊為破白見前何必謝青阮籍傳籍能為青白眼見禮俗之士以白眼對之及稽喜來弔籍作白眼喜不懌而退喜弟康聞之乃齎酒挾琴造焉籍大悅乃見青眼某老矣斫輪莊子行年七十而老斫輪山谷詩問取人間老斫輪味於推轂鄭當時傳其推轂士及官屬丞吏誠有味其言也奏記誓報非所望於高明玉海薛登曰方今舉士詔下陳篇希恩奏記誓報俗號舉人皆稱覓舉舊唐書薛登傳時選舉頗濫登上疏云云朱博傳文學儒吏時有奏記孔融傳高明必為偉器處事立身願不孤於題品代回趙文思師栗率屬共工已愧薦賢之不武陳篇奏記更勤博我之以文並見前恭惟某官天派甚清人門具慶托言崔仁師之孫湜􅎵等昆仲數人文翰列官清要自比王謝之家謂人曰吾之人門及出身官厯未嘗不為第一大丈夫當先據要路以制人安能默默受制於人耶東坡詩清朝固多士人門子皆冠轅駒奏步自是千里之竒方鳩僝功未脫七階之選察其實厯當以名聞某不勝匹雛濫長五雉並見前同官為僚之義固已盡心左傳同官為僚吾嘗同僚敢不盡心乎為善最樂之功更期勉力見前代回彭文思耕五雉為工正甚幸為僚雙魚有尺書先勤委贄古樂府客從逺方來遺我雙鯉魚呼童烹鯉魚中有尺素書恭惟某官崇蘭流馥宋玉招魂光風轉蕙汜崇蘭些喬木故家在梓匠輪輿亦足以試有準繩規矩何患無成法言大器其猶規矩準繩乎先自治而後治人之謂大器老子大器晚成所恐出入如相避然韓文君出我入如相避然生闊死休吞不復宣莫助左右為先容也鄒陽傳蟠木根柢輪囷離竒而為萬乘器者以左右先為之容也師古曰容謂雕刻加飾馬援傳無左右為容之介某濫茲攝長行矣告休聞絃賞音已認相求之意留渴待飲所望見察以情山谷詩空餘見賢心忍渴望梅嶺陳後山詩巧手莫為無麵餅誰能留渴需逺井代回龔告院堪宋初於右掖門置官誥院四司告身案並集於此以備中書除改本司郎中各主其事淳化五年始專置官司於省內凡官誥各以本司告身印印之官誥院提舉一人以知制誥充判院一人以帶職京朝官充元豐五年行官制文武告身屬吏部蕃官告屬兵部封贈及命婦告屬司封加勳并將校告屬司勳崇寧四年罷令尚書右選主管大觀二年復置中興以來因仍不改疇庸外轄見前服采中朝尚書服休服采采事也乃積乃倉乃糧久勤回謁如絲如綸如綍盍賴主張莊子孰主張是餘見前恭惟某官學本家傳美由世濟京邑翼翼恬於風月之分詩商邑翼翼四方之極注商邑之禮俗翼翼然可則效乃四方之中正也東京賦京邑翼翼四方所視分風月言為倅江漢浮浮裕此邱山之積詩江漢浮浮武夫滔滔注浮浮衆疆貌江漢之水浮浮然合流衆疆之處荀子知節國裕民則必有仁義聖良之名而且有富厚邱山之積矣進此四司之告詳題下出專一札之文諒不俟駕而行必有勿藥之喜易無妄之疾勿藥有喜某凄其骯髒詩凄其以風趙一傳骯髒倚門邊久此蹣跚蹣跚跛行貌蹣或作􅩚司馬相如傳姍勃窣上金隄已騰二宜去之章足以行矣昌黎孔戣墓志吾年至一宜去吾為左丞不能進退郎官惟相之為二宜去猶及再相别而去顧不幸哉代回万俟檢院侣宋文帝元嘉九年魏主詔闕右懸登聞鼓以達寃人唐大厯十四年詔天下寃滯於朝堂受詞推決尚未盡者聽撾登聞鼓宋雍熙元年改匭為檢景德四年改為登聞檢院命樞密直學士張泳判凡進狀者先鼓院若為所抑則詣檢院外有理檢使以知制誥錢若水領之復唐制也宋張淏雲谷雜記云文昌雜録云登聞鼓院未知起于何代因讀唐會要顯德三年有抱屈人賫鼓于朝堂訴遂令東西都門各置登聞鼓蓋始于此愚按世説晉元帝時張闓私作都門早閉晚開羣小患之詣州府不理撾登聞鼓又晉范堅傳邵廣盜官物棄市二子撾登聞鼓乞恩求沒為奚奴以贖父命後魏刑法志世祖闕左懸登聞鼓人有窮寃則撾鼓公車上奏又隋高祖詔四方詞訟有枉屈詣闕伸訴有所未聽撾登聞鼓則登聞鼓其來已久非始于唐也吕覽堯署敢諫之鼓鬻子禹懸鐘鼓鐸磬于簨簷曰教寡人以訟者揮鞀二事當為登聞鼓之始万俟侣奉直大夫陽武縣男知廬州軍事渙奉明綸晉司理匭唐季華含光殿賦乃立匭司掌舒通之吏職在達下情于上天警下言于有位隆平集天聖間于檢院鼓院各以匭函為檢匣凡言大事朝政闕失或訴寃未辨者悉令檢匣以進即言涉竒邪無得通聞置理檢使領之𨗳人使諫聖上實千載之逢新唐書魏徴傳徴對太宗曰陛下導臣使言所以敢然若不受臣敢數批逆鱗哉又曰陛下貞觀之初𨗳人使諫三年以後見諫者悅而從之一二年勉強受諫而終不平也命汝納言堂下無萬里之隔尚書命汝作納言管子步者一日百里之情通矣堂上有事十日而君不聞此所謂逺於百里也步者十日千里之情通矣堂下有事一月而君不聞此所謂逺於千里也步者百日萬里之情通矣門庭有事期年而君不聞此所謂逺於萬里也恭惟某官世濟其美德浮於言練詳臺閣之儀黃瓊傳瓊隨父在臺閣習見故事及後居職練逹官曹爭議莫能抗奪新唐書選舉志李德裕對武宗曰朝廷選官須公卿子弟為之何者少習其業自熟朝廷事臺閣之儀不教而自成寒士縱有出人之材固不能嫺習也則子弟未易可輕服襲廟堂之學積勞於外益閎於中果騰列剡之章入掌四方之牘唐百官志武后垂拱二年有魚保宗者上書請置匭以受四方之書乃鑄匭告嘉謀於后應無不得其言下膏澤於民亦有無窮之聞某未遑燕賀並見前先辱魚箋魚箋魚子箋也嶺表異録廣管羅州多棧香樹身似耜栁其花白而繁其葉如橘皮堪作紙名為香皮紙灰白色有紋如魚子負暄雜録南番出香皮紙色白紋如魚子唐初將相官誥亦用銷金箋鳯凰紙書之餘皆魚箋花箋而已驅飛亷而寄聲恍已疑於昨夢栁文安得不憑豐隆訴飛亷以寄聲于寥廓耶山谷詩驚夢如昨日又昨夢春冰釋東坡詩昨夢那可逐排閶闔而披腹猶有望於朝陽韓詩排雲呌閶闔披腹呈琅玕新唐書韓瑗傳自瑗與褚遂良相繼死內外以言為諱將二十年帝造奉天宫御史李善感始上疏極言時人喜之謂為鳳鳴朝陽代回新監文思院門史從政彌忠分職率屬疇若豫工同官為寮徒得君重並見前貽書寵甚陳義曄然恭惟某官氣節雄深詞華炳蔚丹穴五色皆鳴孤竹之聲南山經丹穴之山其上有鳥焉其狀如雞五采而文名曰鳳凰首文曰德翼文曰義背文曰禮膺文曰仁腹文曰信抱朴子鳳值孟戲而反丹穴漢書律厯志黃帝使泠綸自大夏之西昆侖之陰取竹之解谷斷兩節間而吹之以為黃鍾之宫制十二以聽鳯之鳴其雄鳴六雌鳴亦六比黃鍾之宫而皆可以生之周禮孤竹之管於圓邱奏之鄭玄云孤竹竹之特生者也青雲共登已正三槐之靣謂彌逺居然斂板蜀志唐彬傳陳騫在坐斂板而稱南史到溉傳溉斂板對褚彥回傳上謂朝臣曰卿等並宋時公卿亦當不言我應得天子彥回斂板曰陛下不得言臣不早識天顔獨此抱關漢相不以兄故私未妨緩步田蚡傳召客飲坐其兄蓋侯北鄉自坐東鄉以為漢相尊不可以兄故私撓杜詩高岑殊緩步史魚直哉邦有道願接芳塵某為長於斯懷歸久矣或論道或審曲等是王官考工記國有六職百工居一焉或坐而論道或作而行之或審曲靣勢以飭五材以辨民器坐而論道謂之王公作而行之謂之士大夫審曲靣勢以飭五材以辨民器謂之百工非要譽非納交願成晚器老子大器晚成注大器之人如九鼎瑚璉不可卒成也架閣續會要元豐有六曹架閣庫崇寧元年何執中為吏部尚書四選案牘吏多藏于家以舞文取賄執中請置庫架閣命官蒞之是後六曹皆倣其法中興題名記云舊制官庀其司置六部之內或遇其廢則以郎省兼之否則以監六部門兼之逮于紹興寺監正官俱復然始庀司于外一也舊制金耀門文書庫多藏三司帳籍三司今版曹也自銓曹而下儲藏帳籍之所未之詳焉其後置六部架閣下大抵成案皆留部二年然後畀而藏之又八年則入之金耀今金耀無復曩日則悉藏于架閣庫二也二者不同而至于諸曹二十四司之文書盡歸儲蓄以待有用則今猶昔也代回吳架閣柔勝起自珍祠入司故府見前人登龍斷孰知靜退之風公不蠅營宜有登崇之命韓文蠅營狗茍驅去復來恭惟某官器資莊裕德履淑均出師表將軍向寵性行淑均讀數萬言信一第之真溷子見前閲三十嵗猶屢薦而不入官文選屢薦不入官一麾乃出守茲回香火之功名劉禹錫詩魚書曽替代香火有因緣詳見前來主文書之几閣見前假塗數月發軔九衢軔音認離騷經朝發軔于蒼梧兮説文軔礙車也爾雅四逹謂之衢白樂天詩明朝别九衢某有幸協恭先勤遣記匪我言髦實慚堂下之斫輪詩匪我言髦爾用憂謔注八十曰髦非我之言為老髦有所失誤及爾同僚知免袖間之縮手詩我雖異事及爾同僚韓文巧匠傍觀縮手袖間代回薛架閣君用渙奉新綸晉司故籍文書盈於几愛莫助之漢刑法志文書盈於几閣典者不能遍睹牒訴裝其懷今知免矣北山移文敲朴喧囂犯其慮牒訴倥偬裝其懷恭惟某官河東鸑鷟鸑逆角切鷟仕角切説文鳳屬神鳥也國語周之興也鸑鷟鳴於岐山張説握乾符頌鳴鸑改號禽經紫鳳謂之鷟唐薛收與弟德音元敬齊名號河東三鳳時目收為長離德音為鸑鷲元敬年最少為鵷雛冀北麒麟自中雋於文闈左傳得雋曰克又以中雋也即舒翹於侯泮栁文今之聖智莫不舒翹楊英推類援朋鴟梟未集詩翩彼飛鶚集于泮林豺虎已多詩投畀豺虎豺虎不食車轔轔馬蕭蕭君誰與守杜詩車轔轔馬蕭蕭行人弓箭各在腰耶娘妻子走相送塵埃不見咸陽橋印纍纍綬若若吾不徒行若爾者切石顯傳牢耶石耶五鹿客耶印何纍纍綬若若耶師古曰纍纍重積也若若長貌宜哉薦揚有此除寵佇憲章之明習馬周傳贊由一介草茅言天下事明習憲章若素宦於朝即臺閣之飛騰某甚愧濫巾猥勤銜袖見前居州在宋真足為王所之賢夫子却齊願更觀儒者之效代回曾架閣準奉一札之新除司兩部之故籍見前簿書獄訟之事似屈長材文學禮義之官豈非妙選儒林傳序以治禮掌故以文學禮義為官遷留滯師古曰言治禮掌故之官本以有文學習禮義而為之又所以遷擢留滯之人未繇旅賀猥辱損箋旅損卦名恭惟某官琴瑟亷溫禮記絲聲哀哀以立亷亷以立志君子聽琴瑟之聲則志忠義之臣琮璜秀潤説文琮瑞玉大八寸似車缸徐曰謂其狀外八角而中圓也琮之言宗八方所宗故外八方中虛圓以應無窮德象地故以祭地周禮黃琮注八方象地之形璜半璧也周禮大宗伯以玄璜禮北方鄭曰半璧曰璜象冬月閉藏祀北方用玄璜摩空作賦早呼殿陛之臚李賀詩殿前作賦聲摩空臚音盧漢書注上傳語告下為臚重席談經久繫堂階之馬杜詩鄭文到官舍繫馬堂階下醉即乘馬歸頗遭官長罵餘見前身才趨於幕府杜詩白頭趨幕府名益震於京師法言谷口鄭子真不屈其志而耕乎巖石之下名震于京師朝方虛掌故之員人皆有欲炙之色顧榮傳榮與同寮宴飲見執炙者貌狀不凡有欲炙之色榮割炙啖之坐者問其故榮曰豈有終日執之而不知其味及趙王倫敗榮被執將誅執炙者為督率救之得免下交章而薦禰上弄印以授堯趙堯傳高祖持御史大夫印弄之曰誰可以為御史大夫者熟視堯曰無以易堯遂拜堯為御史大夫羣無留良韓文伯樂知馬遇其良輒取之羣無留良焉衆乃退聽今雖刑清而獄簡政須綱舉而目張几閣文書何厭數旬之客並見前朝廷翰墨會歸三館之英三館謂昭文集賢史館總名崇文院某一自識賢數勤委贄引重鼎不程力長恐見笑於大方禮記鷙蟲攫摶不程勇者引重鼎不程其力往者不悔來者不豫注程猶量也重鼎大鼎也摶猛引重不量勇力堪之與否當之則往也雖有負者後不悔也疏此摶攫引鼎喻艱難之事言儒者見艱難之事遇則行之不預量度也莊子吾長見笑於大方之家注方道也既識路又疾驅敢願益堅於壯履韓文既識路又疾驅兮孰知余力之不任易大壯君子以非禮弗履代回黃架閣伯劑渙奉新綸晉司故府俎豆軍旅之事允籍通材文學禮義之官亶為妙選見上條恭惟某官蟠書拄腹東坡詩撑腸拄腹文字五千卷僧慧洪詩胸中撑拄萬卷書取第摘髭見前祭竈一同有珞珞琭琭之氣左傳天子之地一圻列國一同注方百里為同老子不欲琭琭如玉落落如石注琭琭喻少落落喻多玉少故為貴石多故見賤言不欲如玉為人所貴如石為人所賤當處其中也隨軺萬里無乖乖剌剌之情説文乖戾也韓文語刺刺不能休洪慶善云刺慮達切樊云刺七迹切如洪讀則當以戾為義顧婢子語何戾耶潘嶽閣道謡和嶠刺促不得休語意皆同此當以七迹切為正野客叢書云刺力達反勢有不便順謂之乖剌乖剌言乖戾也如東方朔謂吾強乖剌而無當杜欽謂陛下無乖剌之心是也今人言作事不順猶有此語呼剌為賴聲之轉也今按漢書杜欽傳本作外戚親屬無乖刺之心師古曰刺戾也音來曷反又劉向傳膠戾乖剌師古曰言志意不和各相違背流聲實於朝廷韓文宜乎從事於是府而流聲實於天朝也主文書於几閣更培風力會決雲衢某何與推賢過勤委翰投我木李莫輸論報之情詩投我以木李報之以瓊玖期君蟠桃姑寫願忠之意東坡答山谷詩期君蟠桃枝千嵗終一嘗顧我如苦李全生依路傍四六標準卷十九
