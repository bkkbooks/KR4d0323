  - {type: variant, offset: 8937, length: 360, content: 史記范睢傳謁君得無與諸侯客子俱來乎曹丕詩棄置勿復陳客子常畏人徐陵詩關山三五月客子憶秦川杜詩客子入門日杲杲上谷郡圖經金臺在易水東南十八里傅毅述遊賦出北薊厯良鄉登金臺顧武陽選詩豈伊白璧賜將起黄金臺李詩燕昭延郭隗遂築黄金臺又灑掃黄金臺招邀廣平客又如登黄金臺遥謁紫霞仙又侍宴黄金臺傳觴青玉案又何人更掃黄金臺杜詩揚眉義結黄金臺又黄金臺貯俊賢多羅隠詩百尺黄金郭隗臺栁詩燕有黄金臺逺致望諸君元周公謹癸辛雜志云郭隗史記止云築宫而師事之初無臺字而李白詩有何人為築黄金臺之語吳虎臣漫錄以此為據按新序通鑑皆云為築宫不言臺也然李杜及栁子厚詩皆有黄金臺之語唐人承用甚多不特本於白也又按唐皇甫松有登郭隗臺詩梁任昉述異記云郭隗臺在幽州故城中則實有此臺矣孔文舉論盛孝章書曰昭王築臺以尊郭隗然皆無黄金字鮑昭放歌行云豈伊白璧賜將起黄金臺然則黄金之名始見於此, SBCK: ''}
