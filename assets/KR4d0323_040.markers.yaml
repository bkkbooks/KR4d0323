  - {type: variant, offset: 3082, length: 2139, content: 趙充國傳以定册尊立宣帝封營平侯又氷解漕下明皇雜録唐宫中以女功揆日之長短冬至後比常日増一線之功焦氏筆乗云杜詩刺繡五紋添弱線又愁日愁随一線長魯直詩宫線添尺餘皆指女紅以驗日也荆楚歳時記則云冬至後日影添長一線又與此異未知孰是代回大理趙少卿師石緹陽襲管後漢書律厯志候氣之法為室三重户閉塗釁必周宻布緹縵室中以木為案每律各一内痺外髙從其方位加律其上以葭莩灰抑其内端案厯而候之氣至者灰去其為氣所動者其灰散人及風所動者其灰聚蕭慤詩天宫初動磬緹室已飛灰杜詩吹葭六管動飛灰韓偓詩中宵忽見動葭灰劉商詩灰管移新律窮隂變一陽綫景延圭線古文作綫説文縷也歳時記晉魏間宫中以紅線量日影冬至後日添長一線周禮大司徒以土圭之法測土深正日景以求地中易緯通卦驗冬至之日植八尺之表日中視晷景長短以占和否周髀云成周土中夏至景一尺六寸冬至景一丈三尺五寸候六律而合八能既滋羣動易通卦驗冬至始人主致八能之士或調黄鍾或調六律或調五行或調律厯或調隂陽或調正徳樂協圖徴八能之士以日冬至作隂樂以成天文後漢書禮儀志冬至使八能之士八人或吹黄鍾之律間竽或撞黄鍾之鐘或度晷景權水輕重或擊黄鍾之磬或鼓黄鍾之瑟或擊黄鍾之鼓樂叶圖徴聖人作樂非以自娯所以觀得失之效故不取備一人必從八能之士故撞鐘者當知鐘擊鼓者當知鼓吹管者當知管吹竽者當知竽擊磬者當知磬鼓瑟者當知瑟故八士曰或調隂陽或調律厯或調五音故撞鐘者以知法度鼓瑟者以知四海擊磬者以知民事鍾音調則君道得黄鍾㽔賔之律應鼓音調則臣道得太蔟之律應管音調則律厯正夷則之律應磬音調則民道得林鍾之律應竽音調則法度得無射之律應瑟音調則四海合歳氣百川一合徳鬼神之道行祭祀之道得如此則姑洗之律應五樂皆得則應鍾之律應否則反是敬五刑以成三徳宜介百祥尚書惟敬五刑以成三徳一人有慶兆民頼之其寧惟永又作善降之百祥恭惟某官同寅協恭見前分職率屬尚書六卿分職各率其屬以倡九牧阜成兆民各抱黄鍾之氣韻禮記仲冬之月律中黄鍾髙誘曰陽氣聚于下隂氣盛于上萌于黄泉下故曰黄鍾晉書樂志冬至徳為上土色黄故曰黄鍾共司丹筆之簡書㑹稽典録盛吉字君達拜廷尉吉性多仁恩務在哀矜每至冬月罪囚當斷其妻執燭吉手丹筆夫妻相向垂泣詩豈不懷歸畏此簡書佇積平反入儀華要某濫因聨事獲慶踐長並見前一道氷銜猥辱先施之寵國老談苑陳彭年在翰苑兼十餘職皆文翰清秘之目人謂其署銜為一條氷五色雲物願迎方至之休詩如川之方至餘見前代回程監丞準灰浮緹縵新北臺太史之占緹縵注見上條杜氏通典周官太史掌建邦之六典正歳年以敘事左傳日南至登觀臺以望而書禮也凡分至啟閉必書雲物為備故也歳華紀麗漢樂曾陳於前殿魯雲爰紀於候臺雲卧衣裳添南極老人之夀杜詩天闕象緯逼雲卧衣裳冷天丈志狼北地有大星曰南極老人老人見治安不見兵起常以秋分時候之南郊晉天文志南極老人一星在弧南常以秋分之旦見于丙春分之夕没于丁見則化平主夀昌月令秋分日饗夀星于南郊杜詩南極老人應夀昌恭惟某官襟懷霜潔談笑春温未老得閒飽味桑榆之暖遯齊閒覽趙嘏詩早晚粗酬心事了水邊歸去一閒人若身事了則仕宦之心益熾愈無歸期矣王易簡云青山得去且歸去官職有來還自來是豈能須臾忘情於軒冕哉余嘗於驛舍見人題壁云謀生待足何時足未老得閒方是閒余深味其言服其精當而愧其未能行也此與夫一日看除目三年損道心者異矣詩話唐閩川長溪縣薛令之登第開元中為東宫侍讀官作詩自歎曰朝日上團團照見先生盤盤中何所有苜蓿長闌干飯澁匙難綰羮稀箸覺寛只宜謀旦夕何由保歳寒𤣥宗至東宫見其詩舉筆續之曰啄木觜距長鳳凰毛羽短若嫌松桂寒任逐桑榆暖薛遂謝病歸久靜思動佇儀槐棘之班某莫捧兕觥兕徐履反獸名爾雅兕似牛説文如野牛而青交州記兕有一角角長三尺餘形如馬鞭柄陸佃云兕善抵觸故先王制罰爵以為酒戒觥古横反以兕角為之詩我姑酌彼兕觥乂兕觥其觩過勤魚素見前葡萄一㪷知公不為於凉州燉煌張氏傳扶風孟佗字伯郎中常侍張讓專權用事佗以葡萄酒一斗遺讓即拜凉州刺史東坡詩誰能斗酒博西凉史記大宛國以蒲蔔為酒富人藏酒多至萬石數十年不敗漢武内傳西王母當下帝設蒲蔔酒博物志西域有蒲蔔酒積年不敗彼俗傳云可至十年欲飲之醉彌日方解魏文帝詔朝臣曰蒲蔔釀以為酒過之流涎咽唾况親飲之毛氏曰考工記一豆注當作斗豆即古斗字左傳豆區鍾釜當音斗後人誤作俎豆之豆讀之今俗書作㪷盖誤併耳嶰竹數聲在我頓忘其寒谷律厯志取竹之解谷㫁兩節間而吹之以為黄鍾之宫制十二筩以聽鳳之鳴其雄鳴為六雌鳴亦六劉向别録燕有谷地美而寒不生五榖鄒衍居之吹律而温氣至而榖生今名黍谷代回王寺丞庭芝陽徳由子而蘖地氣上騰説文子十一月陽氣動萬物滋入以為偁徐曰十一月夜半陽氣所起人承陽故以為稱白虎通子孳也孶孳無已也蘖牙枿也律厯志始于子在十一月大吕吕旅也言隂大旅助黄鍾宣氣而牙物也月令孟春之月天氣下降地氣上騰孟冬之月天氣上騰地氣下降正義曰若以爻象言之則七月天氣上騰地氣下降若以氣應言之則從五月地氣上騰至十月地氣六陽俱升各取其義不相妨也善類觀復之亨天休滋至恭惟某官沉潛剛克並見前消息時偕月令注陽生為息隂死為消莊子消息盈虛一晦一明易終日乾乾與時偕行手縮袖間復添補衮之線韓文巧匠旁觀縮手袖間杜牧詩平生五色線願補舜衣裳山谷詩公有胸中五色線平生補衮用功深春回井底已驗浮緹之灰東坡詩井底微陽回未回月令冬至則水泉動對此令辰任昉牋今月令辰肅膺典册宜其遐福某適拘旅𤨏易旅𤨏𤨏斯其所取災正義云𤨏𤨏者細少卑賤之貌也初六當旅下極寄旅不得所安而為斯卑賤之役莫綴, SBCK: ''}
