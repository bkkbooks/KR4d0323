  - {type: variant, offset: 521, length: 184, content: 燕翼貽謀錄元祐元年以改官甚多吏部侍郎孫覺請歲以百人為限從之紹聖三年吏部乞以毎申五人引見不拘數則其歲有三百餘員也中興以來改官人數絶少歲不過數十人雖令選人舉官逐員放散數亦不増至紹熈初號為頓増亦僅三十餘員慶元以後歲有溢額蓋孤寒路絶得者五員俱足而不得者多不破白勢使然也按破白宋人語指舉員而言鄭雪巖啓經年夜雨誰憐泮茆之清一日春風忽破庾梅之白戴象麓啓榮甚初官之破白怳如再第之取青面, SBCK: 靣}
