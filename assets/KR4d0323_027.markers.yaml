  - {type: variant, offset: 45775, length: 1078, content: 室見前出守湖隂岳州在洞庭之北布寛大之六條百官表刺史以六條問事非條所問即不省詳見前銷愁歎於千里見前桐魚既合唐髙祖紀武徳元年改銀兔符為銅魚符隋文帝紀開皇九年頒木魚符竹馬交驩恭惟某官操行靖共賦姿凝逺學術齊相之清淨猶有典刑曹參傳百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靜民以寧一文章子建之波瀾豈其苗裔杜詩文章曹植波瀾闊史記舜目蓋重瞳子又聞項羽亦重瞳子豈其苗裔耶霍光傳贊昔霍叔封于晉晉即河東光豈其苗裔乎自蚤騰於夷路謂立據於要津杜詩立登要路津居然偏城臧洪傳論偏城既危曹袁方睦杜詩宇宙蜀城偏李燾詩偏城越雋東斂此大惠韓文斂此大恵兮施于一州展洞庭萬頃之眼自足行春范文正公岳陽樓記上下天光一碧萬頃杜氏通典太守常以春行所主縣秋冬遣無害吏按訊諸囚平其罪法論課殿最吞雲夢八九於胸不妨坐嘯黨錮傳南陽太守岑公孝𢎞農成瑨但坐嘯化行俗美何必慮潢池之驚見前政通人和自可後天下而樂范文正公岳陽樓記慶厯四年春滕子京謫守巴陵郡越明年政通人和百廢具興又先天下之憂而憂後天下之樂而樂某坐遲一職過辱屢書韓文将特書大書屢書此借用吟髙柱清唱之詩悵莫陪於履舄昌黎岳陽樓别竇司直詩開筵交履舄爛漫倒家釀盃行無停留髙柱送清唱史記滑稽傳履舄交錯柱謂瑟柱持燕寢凝香之句願更切於鼎茵見前代回黄筠州榮筠州已見為丞再轉出守一麾用山谷先生之家試江西道院之郡山谷江西道院賦武陵栁侯守筠之明年樂其俗之美使為政者不勤乃新燕居之堂榜曰江西道院互見前先聲所暨和氣可知恭惟某官離竒長材鄒陽傳輪囷離竒注委曲盤戾也奫宏雅量奫紆倫切水深貌吳都賦泓澄奫潫奫潫迴復貌人皆刼刼知足效於一官韓文人皆刼刼我獨有餘荘子知效一官行比一郷公獨恢恢身可兼於數器韓宣傳身兼數器有退食自公之節聴琵琶于湓浦幾成三嵗之淹白樂天琵琶行序元和十年予左遷九江郡司馬明年秋送客湓浦口聞舟中夜彈琵琶者聴其音錚錚然有京都聲問其人本長安倡女嘗學琵琶於穆曹二善才年長色衰委身為賈人婦遂命酒使快彈數曲曲罷憫然自叙少小時歡樂事今漂淪憔悴轉徙于江湖間予出官二年恬然自安感斯人言是夕始覺有遷謫意因為長句歌以贈之命曰琵琶行夢綵筆於武夷又作一年之借方輿志建寧浦城邑本漢東侯官之地吳永興三年改為吳興縣梁尚書郎江淹嘗為吳興令齊書江淹嘗宿于冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃探懐中得五色筆一以授之爾後為詩絶無美句時人謂之才盡魏鶴山夢筆山房記世傳江文通為吳興令夢人授五色筆繇是文藻日新今浦城縣故吳興也縣故有孤山里人因以夢筆稱之真希元於山之麓營闔廬為蔵修遊息之所以書抵了翁曰子為我發之了翁毎惟聖賢之生鮮不百年曷嘗以老少為鋭惰窮逹為榮悴哉如史所書任彦升丘靈鞠江文通諸人皆有才盡之歎而史, SBCK: 麻}
