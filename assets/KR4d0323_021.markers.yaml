  - {type: indent, offset: 0, content: 　, id: KR4d0323_krp_021-bkkind1}
  - {type: variant, offset: 3, length: 2, content: 準巻, SBCK: 凖卷之十九梅亭先生四六標凖卷之二十制帥賀桂侍郎如淵再任制帥知榮州作進直奎文借留井絡惟益部剌史之􅀉在漢巳嚴而瀛洲學士之官至唐尤重備兹異數允在真儒恭惟某官器博以周材洪而毅文武式萬􅀖之憲精神折千里之衝江漢經營早追蹤於羊杜日月獻納旋接武於䕫龍帝念岷峨地連関陜四松􅀱對中權足壯於前茅尺箠䇿勲數節可窺於破竹爰進真學士之職式重大元帥之威河内共借於㓂君䄡帷暫駐􅀜中旣留於蕭相營壘益堅光増東壁之圖書權重北門之管鑰式遄衮繡歸耀旂常某乗障雪邊庇身宇下愧涸魚之喁噞隨賀燕以差池牽牛而奪之牛誰能回幕中之辯御馬而窮其馬度决非門下之心儻或愛尺寸之膚更幸貸斗升之水我有二天之飲酒誰敢望於私恩爾來三月之無塩更乞參於公議其爲頌望曷旣敷陳賀黄安撫大卿除工部侍郎仍兼安撫制置副使渙􅁽元戎升卿起部修車馬備噐械夙重小司空之權閱禮樂崇詩書將正大行臺之任命申重巽驩溢全坤恭惟某官知勇且仁直方而大肝膽鍾一􅀟之劒精神峻百丈之峯叔度萬頃之陂丗莫得而澄撓次公重臨之政人轉服其寛明坐令火井之沈熒真覺雪山之増重敬刑而成三德旣平夏辟之三千事典以治萬民爰長冬官之六十藉五雉五工之正挽一􅀛一琴之留當益州疲敝之秋湏朔方精明之令星辰聽履豈但髙法從之班日月爲常佇滿載元功之籍某承流支郡席芘和門誰其采白露之葭頋使轉青天之粟不能者止未容叱馭而驅之克壯其猶尚􅀝約軝之率只賀聶侍郎子述除制置代董侍郎躋班禹閣宅牧蜀都輟言語侍從之臣盡護諸將藉文武威風之帥式遏四夷渙號風行坤垠雷動恭惟某官氣嘘海岱胸湛氷霜善刀遊肯綮之間全牛立解意匠淡經營之表凢馬坐空惟其日千里而有餘是以嵗九遷而無慊鸞臺鳯閣積彌縫輔賛之功螭陛雞翹弘獻納論思之益上矜逺服中遣近臣弄印無以易堯爰峻西清之職披圖指以示禹俾圖北代之功惟真學士象十二月之班而大府帥緫六十州之重玁狁匪茹湏方叔之壯猷皇帝曰嘻命崇文而奉詔不但洗岷峨之愴又將蕩秦隴之妖玉壘旣安金甌必啓某五年承乏百􅇊巳窮頼公爲父老而來許我託子孫之契田間索栗看即騰新尹之誇門外種􅀲便可遂故侯之隱賀聶侍郎交割代董侍郎㳙選剛辰恢張制閫千二百里之邊面威令風行六十餘郡之人心驩呼雷動恭惟某官秀姿玉峙烔識冰明鞭霆駕風旣出漢廷臣之右捫參歷井肯爲蜀父老而來行宣暢於皇靈即蕩摇於戎索佛狸之死夘有數何待來年晉公之雄甲成功應在今日氣色一新於壁壘勲勞滿載於旂常某聳聞建牙遂可納履催飛將而追驕虜正虞或累於躍歸鞍而飛賀書猶兾亟諧於邂逅賀聶制置子述庭􅀭成渙閫制全坤璧府奎圖莫重東頭之學士參旂井􅃏况專西道之行營夷虜膽寒士民心愜恭惟某官天資弘毅風采浚明精神五兵六丁莫擬其銳肝膽一劒百壬争避其鋒䇿勲自馴雉而來取官有驅羊之易今之從政容有位隆而道汚公所過人正惟功大而心小兹煩雍橐來牧蜀都許以金城之便冝盡護玉􅀜之疆場三分籌䇿小試渭濵耕戰之謀百二山河行復関中帝王之業功名留於久逺冨貴乃其緒餘某夙累公知何辭吏役然受敢不敬蚤夜之祝愧乏寸長况讀忍着主衣裳之詩義難再適况妻病不離於牀簀而男寒乆澁於詩書固知公爾以忘私然亦愛之而莫助某榆枋尺鷃但願適逍遥之遊渤澥􅀟鳬亦不計多少之數賀丁制置交割紫殿陞班建碧幢而制閫緑綈趣駕滌紅籕以開藩四履重臨萬井攺􅀚恭惟某官材弘以毅德直而方所學一本於孔周有言皆合於稷契一堂偃月􅀔炙手以絶倫四海􅀝冰公掉頭而不住四國于蕃之巳乆九卿當相以何疑頋自桂林復尋卭竹清獻之琴再鼔當阜民財乖崖之劒重磨足新軍律中􅁠有資於後勁外攘全頼於内修暫分治於四封即盡護於諸將先聲誕播和氣交騰雪嶺之白界天公來則重􅀐火之紅照夜王曰遄歸某乗傳無堪代庖非據崇詩書閲禮樂忻逢元帥之鼎來封府庫籍吏民敬待將軍而解去通董制置居􅁩十乗啓行旣孤剡牘三年過隙又玷招羅曽微曉暢之才可荅頻煩之頋疾驅行李往役前茅伏念某學餒而材蕪氣凋而力腐少年妄意頗懐竹帛之功名半丗拙謀未了布韋之事業強爲禄仕直坐飢驅諸公貴人間欲出其門下古來此物自當弃之道旁獨衘國士之知積愧文人之厚因同邑而薦嚴助自古有之未下車而辟慈明此恩異甚窮人命薄中道憂歸勞心慱慱鑚火頓驚於三蟄逹官衮衮剌天難附於羣飛止或尼之㑹且歸矣駭置郵之有命仍尊選以見招惟兩喜多溢美之言故再鼔回愈淡之聽奏函朝徹俞㫖夕頒荀文􅀂之不進不休今寕愧古閔仲叔之且喜且懼寵實􅀂驚兹蓋伏遇某官以社稷臣爲詩書帥留泰階台符之歩撫坤垠井絡之民去來􅀜雪山之重輕出入係蜀道之難易公鎮踰嵗月共期裴相之來歸小隊出郊坰復喜嚴公之再駐羣彦固多於集幙匹夫猶耻於納溝􅀛放長江使認重來之路燕尋故壘復窺新捲之簾豈但顯不遺故舊之仁亦足占􅄂進巧拙之量某敢不循其頂踵銘在肺肝謹無􅀒有志斯丗之將仍每守圖利大夫之戒忽􅀐將軍馬難希處士之壯懷真釣錦江魚敢學拾遺之􅂴性通制帥安大資丙代董制帥作筆橐贅貟濫竊郡符之寵鞾刀執禮行依制閫之尊瞻中􅁠勁後之威修小侯事大之敬輙裁柔櫝仰溷髙牙恭惟某官直大以方清和而任凛然忠貫於日月巍乎義薄於雲天左􅃝以呼作熊羆不二之士右頋而跽収麒麟第一之功皇咨􅂄定之勲􅁽命保􅁵之􅀉盡護諸將外撫四夷料天驕之必亡諒風寒之冝護蕭何全関中以鎮撫西頋何憂周公有天下之勲勞東歸孔邇佇由節斧經秉鈞樞立非常之功待非常之人剩光竹帛建無窮之基有無窮之聞滿載旂常某承學無竒立朝何􅀘二螭載筆􅀄無紀述之長五雉貳卿非有論思之益誤蒙一扎假守三刀不辤捫歷之艱但切震凌之懼欲且宣於上意正有託於下風望太白横岷峨惟切髙山之仰止詣大府受約束更希隂雨而膏之代回成都黄待制疇􅀂輟賢禁甬作鎮少城周家地官方頼小司徒之貳益州天府遽勤大元帥之行戾止髙牙屹然方面恭惟某官靖恭而肅括膚敏而䟽通生寳劔之故墟地靈人傑接金華之宗􅂀玉㓗日光自䇿名躔徧儀要路厭承明勞侍從乆陪上雍之祠望太白横峨嵋爰馳諭蜀之檄擁元戎之小隊布方國之細書火井沉熒雪山増重考西鄰之近比歸秉左鈞况東極之􅀷知可操右契某老不得謝命作納言慕幾兩幾駟之榮㑹且歸矣望一琴一􅀛之出行或使之代回成都吴制置獵裁一箋而起敬未宣摧謝之私疊累幅以鳴謙仍拜駢章之寵施輕報重虚往實來佩故舊之髙情發衰遲之􅀷愧恭惟某官知推人傑學覺天民屹偉績於控荆蔚竒勳於諭蜀凜然趙淸獻之氣節行以張忠定之規模撫五十四州之軍民瘡痍帖泰壯一百八盤之門户氣色晶明雪山之重旣多沙堤之築非逺某不堪視䕃復此綴班無以公歸或一見而後去豈惟我賀亦衆目之具瞻代回李制帥大東疇庸帥閫升鎮制垣犀甲熊旂名在江淮之草木麟符魚鑰光通河洛之圖書甚惬師言可爲國賀恭惟某官材由丗濟學與古稽自其不卑於小官人知將降之大任故國非喬木之謂夙盤仙李之根今人莫棠棣之如皆近宫槐之影雅聞偉望尤抱長材洊分半虎之符妙落全牛之刃風寒數處人物渺然固封守以畫郊圻徒得君重訖外庸作而丞輔無以公歸某濫守洪都宻依廣厦落霞秋水漸欲㝷吳㑹之舟暮日春天安得對江東之酒代董侍郎回京湖趙制置万分閫罔功濫叨玺詔循墻俟命敢辱賀緘頋蒙一介之專逺畀􅀟鱗之重卷還有􅌤冒受何居恭惟某官以社稷臣爲詩書帥細氊廣厦應接武於夔龍緩帶輕裘即近蹤於羊杜一賢制勝萬里折衝天子遣趙將軍真得破羌之䇿路人問霍去病行収絶漠之勲功名剰跨於數公同書竹帛歩武徑躋於兩社歸勒鼎勲某守蜀非才擒胡不力以此衆戰無可奏之膚公不自意全亦粗殱於羣醜尚欲决焚舟之戰乃不容俟駕而行巳貢天牋願省愆於田里尚依雲芘得佚老於林泉回趙副帥彦呐守偏城而愒日無以瘉人使一道以􅀚風何爲至我方兹蹐地志在回天敢圖副元帥之尊先畀小行人之問恭惟某官篤誠而明允剛直而忱恂無鳯笙龍管之豪奢有麟趾兎置之信厚文王之昭周人之祚固多千里之駒河間之略江夏之功罕露一斑之豹獨公慷􅁣同國戚休星紀一周未皇皇而奠枕風寒數處屹在在之長城寸心如丹百錬愈白四郊多壘未容㝷鷗鷺之閑二矛重弓且並揔貔貅之旅峴山旣捷泗水來歸不十日至長安㑹有官軍見威儀之喜用丸泥封函谷無以賊虜遺君父之憂惟國爾忘家主爾忘身則男子當戰女子當運黄河以南行皆晉土自陜而東是在周公某愛莫助之遐不謂矣木牛流馬敢辝轉粟以上天桃蟲荓蜂但願徹桑於未雨經略代回廣西李經略訦代何月湖小司㓂之持平躐陞五雉大府帥之委重逺􅀉􅀟魚懷感有之寘懷無所恭惟某官名髙斗北恵滿天南槃槃都會之雄庶􅀖君之奔走英英文武之特一號令而精明公無遐心民可吐氣某斵輪旣老整履巳晡冝人獨桂林遥想玉篸之碧忍渴望梅嶺願調金鉉之黄代回廣西李經略訦荷囊輟直桂筦分符靴刀列郡之迎古稱大府􅃭袴萬家之喜今在細侯仁氣南驅善聲東迤恭惟某官通材治劇厚德鎮浮財貨本末源流早振地官之職侍從論思獻納晚􅀷天扆之知遽厭承明之廬歸拜散人之號時方多事公未可閑謀帥湏賢起家甚寵􅀂衛公之鎭撫九十六郡與襲志之都督二十八年能安越人莫非李姓冝其苗裔復此蕃宣顧恐靑羅碧玉之江山難駐黄閣紫樞之歩武某龍鍾巳乆燕賀無由夔府竹枝之歌旣成昨夢漢節梅花之句願􅀉故人代回廣西李經略訦价藩報政祕殿升班八桂不曰炎荒固號登僊之勝四松取之􅀬撰殆非􅀉禄之常帝綍渙孚帥符鼎重恭惟某官材全業鉅器博聲宏厭直承明之廬作牧始安之徼玉簮羅帶江山分一半之天金節油幢庭户行千里之外果臻帝璽進庀宸奎河洛圖書之淵榮灮上燭嶺海輦轂之治和氣旁行㑹見出綸又迎歸衮某無由旅賀猥辱撝謙誦大古而歌散人吾事濟矣去上天而辤宰相公自計之梅亭先生四六標凖卷之二十梅亭先生四六標凖卷之}
