seq: 27
front:
  text: 卷之二十五
  hash: sha256:19d2f36862397ebbe2c0e792db86e26d5f51b715e5e6bd600429747bfc7b2abd
body:
  text: 憲使賀李知府除潼川提刑鐊丹檢起家繡衣問俗故國非喬木之謂世選爾勞奕葉茂猗蘭之光汝陳時臬星言􅀟節風聳列城恭惟某官器􅀶而通材弘以毅卓犖坐空於萬馬笑談立解於千牛謂之檮杌謂之春秋素髙家學有􅀂伊陟有􅀂臣扈冝襲丗官與其勞四國之蕃宣不􅀂奉六條而廉察公私之積可痛有頼阜通輕重諸罰有􅁠尤資閱實昔者鯉趍而獨立今兹虎拜以揚休載馳載驅共說西平之有子善繼善述更􅀚東府之象賢某濫守憇棠獲依䕃樾作鹹作辛作苦幾不容一日之安惟内惟貨惟來詎敢逭二天之按其為歸􅀝罔旣編摩賀潼川李提刑除䕫路提刑鐊自天出綍易地褰帷家人有嚴君焉舊膺此選皇華遣使臣也今丗其官雖曰因避親之嫌亦見善繼人之志䕫藩幸甚梓部駭然恭惟某官器重以周材弘且毅與人忠而執事敬見善明而用心剛四國于蕃茂甘棠之蔽芾六轡如組訝苞栩之倭遲曽未暖席之間倐有攺轅之命惟四蜀之門戸􅀝三峽爲咽吭昔先正保衡於此展澄清之志今命汝大正庶乎體欽恤之心遥知叱馭而驅之㑹有解印而去者忠信缺矣蓄積缺矣暫勞􅀟節之馳錢榖幾何斷獄幾何佇對九宸之問某方依雲覆忽報星移雖難留有脚之陽春然尚冀驩顔於廣厦送我而入楚澤固猶恨逺水之􅃒思君而下渝州㑹問訊清溪之發其爲忻懌罔旣編摩賀新潼川王提刑禧奏最􅀚風詳刑易地天旋夔峽垂光來近於蔚藍星入益都載驟復歌於苞栩仁聲籍甚封部驩然恭惟某官從容以和洵美且直自為名進士之日蔚有古君子之風旣疇庸磊落之州合入從通明之殿顧煩􅀟節往控三巴蜂腰鶴膝之飢甿復盈膚革雀角䑕牙之滯訟洞燭肺肝古井無波陽春有脚還濡牡轡來顧鶴林禮樂言逺而有光况接郷閭之近刑罰不中則無措更兼倉􅁃之平雖則劬勞又復馳驅於原隰周爰咨度便當獻納於軒墀某乗障非材奉身受察五善重拜忻聞君子之得輿百拙一勤儻許小人之全璧其為頌詠未易編摩通劉提刑垕丹墀賜對繡斧詳刑君遣使臣固光華於在逺獄為司命必明謹而不留一賢􅀚風萬物吐氣恭惟某官器函方重識抱浚明胷中風月之無邊一塵不染筆下源泉之不擇萬斛而贏頃厭承明出將英盪以九畿施􅀖政天不違顔障百川回狂瀾海為縮足頋退湏於棨㦸復出駕於軺軒司長沙千里之平惟良折獄澄洞庭九州之大何擇非人從知察小大之情必不容上下其手周爰咨度即開衡嶽之雲􅁣然澄清何愧滄浪之水所恐思賢於宣室還當問路於脩門某起家一寒去國三暑强顔􅀝席昔慚洛下之生䈤尾對墻今􅀘黔中之佐雖云貳郡正􅀠六條廉不掩聾敢嘆丞哉之余􅀒戇今成癖亦惟使者之汝容通成都周提刑居信捫參歴井再為油幙之趨挹斗揚箕揔􅀠綉衣之察欲徹畸􅀌之名氏例湏耦儷之簡書斐然抽毫滂􅀂下汗伏念某學未聞道年不後人亦知冨貴之浮雲不如貧賤豈無名教之樂地何必事功直以飢驅為此禄仕西望太白窘峽水之倒流東訪蓬萊值海風而引去不謂詩書之元帥尚憐郷里之小兒表之鶚書隨以馬幣遂冐瞿唐五六月之險來訪巫山十二峯之髙揆材地以闕然託使天而近只恭惟某官人今而心古行峻而氣平少年公瑾之綸巾豈甘寂寂他日伯仁之金印徑可纍纍居然盤旋州縣之間無乃培飬廊廟之業勇訪半輪之月徑登九折之􅂗載酒凌雲頓釋里閭之愁嘆埋輪當路欲周原隰之咨諏何敬非刑惟明克允歛此大惠亦旣洽魚鳬之民訖其外庸即歸接䕫龍之武尚念某不逺萬里來奉六條安於小官而不辭亦惟君子之易事昔在嚴公幙聞俱為蜀使之知難甘原憲貧或竊效貢公之喜通潼川丁提刑必􅁛登蜀猶天撫塵蹤而自嘆仰韓如斗瞻熒次以非遥敢裁小子之斐然敬告大夫之賢者伏念某才踈而力腐少賤而長窮託疲􅒒於山林未能辟糓繫飢愚於簮笏却媿伐檀居然四十之頭顱孰是尺寸之竹帛頃自湘濱之憔悴誤為錦里之逢迎半路迍邅竟勤回於俗駕三年飄忽難重入於禮羅不謂再剖符之文翁未廢三折肱之韓子撰書詞而具幣又委重焉扃岫幌而掩􅀜旣無及矣惟是居攸之禕允之任却愧乏儀之群􅀶之材治法征謀逼人已甚臺評幙辯忤物亦多未論雞犬之求仙誰許􅀛魚之託䕃恭惟某官器資凝逺材具寛宏􅀞棟朱簾屈平蠻之籌䇿清江碧嶂蔚治郡之功名謂冝進之清朝庶可行其素學居然龍節戾止􅅙叢禮樂言逺而有光斯言信矣刑罰不中則無措自古謹之有如使者之賢足􅀉欽哉之恤綉衣持斧寜乆滯銅官之山簮筆荷囊行入侍玉皇之案尚念某藐無所挾誰適與容燕谷自寒敢望春風之披拂呉舡未辦尚依夏屋之帡幪通湖南楊提刑楫晨入太學之下曽識明師曉行湘水之春今依膚使禮有嚴於事大書敢廢於恭先恭惟某官守道眞儒庇民正學自其驅馳於外不辝小官固知磅礴於中而可大受由子男之百里洊賔客於諸侯廪給百司簿正九扈人皆疑其婉晩公何有於鄙夷圜橋億萬人甫知矜式起家二千石忽有薦揚上憐皖伯之􅀖乆缺桐君之政徒得君重無俾民憂一札細書朝聞命而夕引道三年成聚今有袴而昔無􅃭孰期清絶之郷又缺皇華之使爰將隆指出揔祥刑德星臨翼軫之間楚氛已靖仙槎來雲漢之表衡嶽頓開遥知登車之􅁣然必有解印而去者周爰咨度胡不均弘某副墨謏聞勾朱末属譬諸川澤之下獨何蕃歟不知酃醁之前有賈生否適是褰帷之始欣然􅀕竈之榮簿領中有是人耶非敢望也夫子甞為委吏矣能勿誨乎代回䕫路李憲􅘊奏最涪江按刑巫峽于蕃而歴四國所去見思察州而奉六條其有所試恭惟某官分輝井絡擅秀岷峨名父子之天資璵璠之器難弟兄之家學金玉其相環轍乆之褰帷晩矣惟良折獄何擇非人送以禮樂而有光旣􅀷簡在編之詩書而無媿願益周爰某􅉥逺莫前賀成巳後三巴䟽鑿雖莫瞻繡斧之持六轡馳驅猶願謹衣篝之護代回浙東譙提刑令憲􅀞㦸奏功繍衣䟽寵專城作牧旣優撫字之材一道􅀚風更展澄清之志有嚴星駕増重日畿恭惟某官蓄德奫􅀷禔身肅括郎潜甚乆不矯丗以為中卿列彌髙忽抗章而請外􅀉隆名於壁府歛大惠於金華民欲借君於一年公已報政於五月進之甸服􅀉以獄平逺有光華况近長安之日周爰咨度已接蓬萊之雲某甚慶得輿未遑削牘儻無雀角可使圜扉之空似是馬曹亦竊廣厦之芘代回陳提刑守藩弗績扁舟欲問於呉江攺組有嚴輿轎俾踰於関嶺方露章而請免倐雲翰之寵貽愧非所􅂪願􅀼有復恭惟某官抱材膚碩蓄學崇谹右墄左平獻納盍司於清切上原下隰咨諏乆屈於皇華旣潜消佩劔之風又宻移珥筆之俗日月之貴名方起乾坤之新渥必蕃諒凢吾味之同皆借君波之及某罙入其阻兆足以行共飲玻瓈之江已有􅀝蒹之幸或入鳴珂之里尚希拔薤之規代回提刑樂郎中繍衣平糴乆勤周道之馳驅丹筆祥刑更奉漢條之寛大民非攺聚官不易方雖四海之望未饜然重湖之幸何厚恭惟某官器資凝逺德履直方摩蜀道之青天􅉘虎莫投其距歌郢中之白雪犬羊難肆其腥名大震於京師材合居於給諌惟是山海之征搉難損一雞欲其財貨之懋遷是資四牡遂煩英節來按蒸湘皇皇原隰之華民無遺便暴暴丘山之積居有積倉公􅀂違之他􅀖民必争於境上惟良折獄何擇非人旣無得而易堯信莫如於借㓂衡雲攺􅀚頓令山嶽之自摇湘水澄波便覺江河之易避第虞詔紫不俟突黔某辱託比肩每􅂪合志勞來還定安集欲慰疲甿同寅恊恭和􅂨正資益友所慙尺牘有觖朋箋魚相忘於江湖諒不責腹中之素鳯又繼之日夜尚同歌肘後之騷代回江東提刑譙寳文令憲寳廬寓直玉節按刑江淮草木之威名亶孚有衆河洛圖書之經緯爰寵此行恭惟某官奥閥剌天脩名拔地胷吞雲夢何小者之足言舟近蓬萊又悠然而引去萬牛莫挽四牡載馳禮樂有光公不􅀒澄清之志哀矜勿喜吏何敢輕重其心有功見知不逺伊邇某民唐索寞歸夢飛騰望南浦之朝雲未能捲雨懷江東之暮日正阻論文代回福建詹提刑徽之䟽恩中禁持憲外臺褰帷風動於列城洗印日新於衆聽湖山自得原隰有光恭惟某官早抱通材徧儀華貫㳺刃有餘矣經肯綮之未甞善刀而藏之得躊躇之滿志属時更化加意審刑徑疇淑問之賢徃任皇華之􅀉維閩七聚不勝鱗介之勞奉漢六條寜止狐狸之問必有澄清之志乃無愁恨之民其審克之行且召矣某未遑燕賀先辱魚書君乗使者車固可想雲煙之風釆詔詣行在所或少慰塵􅁟之心期代回湖南胡提刑澥還節荆襄按刑湘楚父老迎嘆見百年之故家叔姪交承侈一門之盛事賢勞何憚聖眷方深恭惟某官擇乎中庸好是正直一經教子謟機寜觸於屏風萬里隨翁直氣早鏘於門限忠無不報孝可以移何周道之驅馳忘漢闥之􅀘拾天髙蜀道甫休捫歴之嗟地􅄶長沙又作回旋之舞蓋今褰帷之所自昔稅駕其間嶺北長蛇無復元城之迎侍遼東孤鶴足榮華表之來歸某視螺川為近隣恍䕫門之逺别殘燈翳復吐寜有可借之光可人期不來徒抱相違之恨滿期召璽猶可盍簮代回江西李提刑􅑻予環將漕持斧按刑一道三司公殆踐揚之徧兼旬並命上應簡注之􅀷前賀方馳後緘狎至恭惟某官鎮浮雅量撥劇長材左馮翊右扶風居多善政朝天津夕西極未究逺猷當戎狄講解之餘有溪洞猖披之醜見大夫無可使者明天子選而用之知效一官􅀏他人之刼刼身兼數器覺餘地之恢恢民為上所不為本原安在我徃㓂亦能徃保障奚先願繼周使臣之光華豈徒漢刺史之風釆某見賢忍渇得報忘飢不解丗俗書謾瓊瑶之效報實為天下賀願金玉之盡珍代回湖南胡憲澥老形巳具乆自分於投簮成命莫回猶罔功而曵履燁然下問厚甚髙情恭惟某官政為吏師行有家法皇華原隰之上乆職咨諏清切雨露之邊合班獻納顧令衰白亦復佩蒼得非隣壁之光宻借滎河之􅃳某􅀒二冝去巳三上章行或使之即返屠羊之肆願有復也遥瞻回鴈之峯代回成都林憲㓗巳􅀞㦸疇庸繍衣䟽寵田里之無愁恨歴試茂哉原隰之有光華載驅榮甚恭惟某官人門具美天分仍髙我搴時流窘邊幅者多矣公抱國器願繰籍以須之乆於典州方此將指川合東西而瞻使豈不足歟王置左右而輔台恐未免耳旣均牡轡益煥龍光某年以衰侵心爲形役巳屢章而告老兆足以行望三節之鼎來每懷靡及代回江東葉憲簣骯髒雲司將謀退而飲山緑便蕃天寵使無功而佩水蒼徒嘖人言誰侜予美恭惟某官好是正直多所平反江以東之瘡痍各安饘粥斗維北之喉舌難挹酒漿猶贈以言欲華其老然持緫衆職而相望恐難備百工之所爲某鳩僝非長狐疑巳决薦尚書不煩以政終非孔戣之冝白丞相去歸其郷當希踈廣之老代回江西李憲􅑻制五刑以即天已慙占筆居四民而時地猥使代庖諒皆皇華之光宻有蔽芾之䕃恭惟某官徧持三節洊歴諸司方赤子之弄兵金堅蔓熾頼繍衣之持斧風動草披仁逺及於一㕓官躐升於八座某水焉得北日巳薄西緫余轡於扶桑安知飭化集王事於苞栩願見勞還代回廣西郭提刑斌隨而薦栢酒逺莫致之得書而已麥秋報之何以恭惟某官馳心拱北將指宅南漢節梅花巳弄青黄之實周原苞栩旣成蒼翠之隂諒惟平秩之功如在始和之吉某雲司玩􅀊水部媮閑三月不違仁勞飛鴻之逺到五嶺皆炎􅀬願秣馬以遄歸代回利路鮮于提刑申之虎符遲次龍節載驅禮樂逺而光華遐心何有師旅因之飢饉敏手是資恭惟某官籍甚人門燁然地望吏民相告方懷季子之章郡縣未澄冝􅄃孟􅀶之轡劒閣今為平地鮮于丗號福星公有埋輪之心民何懸釡之慮功德如是祥祉如是其善持之刑獄幾何錢􅂖幾何行且召矣某老而浪出冗未汰歸五雉為工徒積汗顔之媿四牡勞使願収直指之功代回江西陳提刑天冝自天申命易地詳刑南海之陬旣濡無復跕鳶之困西江之水方涸更為活鮒之謀恭惟某官奥學名家通材資丗恢乎餘刃孰嬰紫電之鋒飛不盡翰斜取青雲之􅀔頃分半竹惠滿三楓尋專剌舉之六條迄用澄清於五管惟是􅀞冠之化未孚珥珥筆之民欲銷赤子之弄兵必假繍衣之持斧周爰咨度行將勞星駕之還逺有光華何况接日畿之近某濫兹聮事幸甚依仁所望使者之車疾驅沃轡庶假忠焉之誨叶濟疲甿代回廣東潘提刑㳙分符奏最持節祥刑田里之無嘆愁選諸所表原隰之周咨度逺乃有光恭惟某官器宇浚明風猷膚碩頃儀六舘實倡諸儒玉石一區時方􅀒隴西之媿淄澠異味何至空冀北之群迄著顯庸蔚為循吏一麾出守方幸同寅六轡載馳復聞後甲片言可折必能體欽恤之心五嶺皆炎正足展澄清之志星言夙駕天不違顔某十國為連再皷愈淡落霞􅀌鶩不能奪蓴菜之思尺素􅀟魚願無廢梅花之􅀉代回江東葉憲簣斜日投閑冒誤恩而入侍朶雲借􅃳􅓻好語以相先有味其言不知所報恭惟某官恢然抱􅀒乆矣踐􅆒榮分刺史之符勇襆郎官之􅀍甫陞華於卿月又趣駕於使星簸弄明珠自是驚人之質追隨􅃈闥㑹歸宻地之班某起家一寒去國十暑頭顱如此難􅃒西崦之光隂膂力旣愆又踏東華之塵土㑹且歸矣焉用文之代回曹提刑叔逺顯奉郡庸肅將使指凝香􅀞戟政成数月之間直指繍衣象應一星之入用賢如此載路驩然恭惟某官天韻崇谹風猷峻㓗三年􅀶士誰韓愈之見治六館諸生留陽城而不果徘徊南浦檢校東屯却念枳城實産伊川之易因㝷涪水欲昌山谷之詩孔席未温曹裝又趣刑罰不中則無措自昔欽哉禮樂言逺而有光是在使者佇從四牡歸侍六飛某方襞賀緘已􅂪謝牘我留綿谷正方􅀷通漢之防君把繍衣未可動思呉之興代回新䕫路李提刑􅹅凝􅀞㦸之香乆分漢竹持繍衣之斧式憇甘棠燕賀厦之未能鴈􅀉書而何速恭惟某官氣鐘井絡秀出岷峨真難兄之弟難弟之兄信名父之子名子之父人生五馬貴四出守而無嫌􅁠門九牛毛屢掉頭而不顧乃今直指猶是斜飛持衡秉鈞此言何為至我明刑種德所有更以贈君某日旣薄山雲猶出岫惠文柱後殆非佚老之謀神武門中行進乞身之請代回方提刑信孺已下代衛參作􅀚風嶺外公逺有於光華易地江湄我但慙於玩愒鼎來下問益仞髙情恭惟某官學與古稽美全丗濟江濤如此誰知戮力於神州人物􅆌然士頗傾心於執事乆於直指無乃斜飛然小大之獄旣得其情則澄清之志亦足以展風雲之㑹朝夕以須某分閫何功投林是幸叔夜不便於書䟽遂緩報章莊周無索其形骸尚祈終惠代回方提刑信孺報政九疑􅀚風五嶺萬物吐氣正須結輩之賢六轡周咨何慮越人之􅇤恭惟某官風猷強濟業履浚明學禮之有異聞蚤駿萬夫之望誦詩而能專對卒鳩二國之民九重念功再命作牧與其田里之無嘆息賀其見鳯之鳴何如原隰之有光華恵尔跕鳶之外星言􅀟節山鎮百城刑獄幾何錢􅂖幾何不嫌纍印功德如是祥祉如是佇即予環某方欲修辭遽勤委重􅀟魚尺素何言衛公緑竹之詩兩驂四黄請継方叔葱珩之詠回䕫路李提刑鐊二年和義之郡粗護憇棠再命通德之􅀖獲依仙李不謂我入而公出真成室邇而人遐辱􅀉朶雲如對落月恭惟某官􅀒材鯁亮蓄德鴻􅀷雪檜霜松凛凛祖風之似公槐卿􅁄英英家學之傳四奏郡庸兩將使指巖巖漢􅃆帳下之甲多奔往往巴渝舟中之指可掬去孔伋君誰與守見王導吾復何憂共歌四牡之有功行趣八鸞之入覲某􅀗通族譜且託交盟勿勞乎勿誨乎尚希忠告同姓也同業也冝不遐遺梅亭先生四六標凖卷之二十五梅亭先生四六標凖卷之二十六倉使通王提舉與􅁠抗章引外掲節司平正士去朝四海之疑未釋望郎問俗三湘之幸則多况以部刺史之天來臨舊令尹之地民信之矣帝念在兹恭惟某官天韻崇谹風猷膚碩學問廣大日光玉㓗而蛟翔志氣清明燭照数計而􅀛卜早提邑最入踐朝行徧儀清選而人訝其遲立登要路而公不之領古之君子寕可禄歉而氣豐今之謀人渠恤身進而徳退拂衣勇甚􅄃轡􅁣然載􅁔小雅之皇華復領大招之清絶我聞在昔三異具見於一同民到于今五善固忻於重拜所虞馹召靡俟鴈回某去國三年起家貳郡瞻霄漢之佳士昔􅂪或輓以或推逢瀟湘之故人今乃受容而受察偶甫至丞哉之璧末由望使者之車文儒申申旣喜迎柳公之不逺武岡矯矯亦幾見王導而無􅁨通湖南樂提舉章人一天而我二未遑樂霧之披戒七日而齋三將展衡雲之拜持不腆之上轄曠莫逹乎中㳙削櫝斐然􅀒芒悚甚恭惟某官器資􅂋允德履碩膚亞卿之呼吸智謀雲仍固在正子之充实善信風烈猶存巍科摘髭要路䇿足落筆坐奔於万馬善刀立解於千牛縣庸蔚乎浮湘郡最卓於守郢不但别盤根之利器要已知勁草於疾風盍歸清切之班朝夕獻納勉副皇華之遣原隰馳驅甫湘水之曉行遄蔡城之夜􅅞酃醁有酒洞庭無波六轡旣均復戍淸絶之地一節以走恐登碧落之天某不肖至愚無聞甚陋二科鹿鹿遂謀三釡以養親千里魚魚誰以四方而供簿然專令朱出而墨入决不敢黄放而白催有先逹者為之前此六或遂居下位不獲於上兹道難行受察云􅀄願忠敢隱移慈竹而㘽率土定未忘故里之情賦梅花而獻繍衣敢妄兾聞人之目通新江西提舉兼知撫州徐監丞瑑榮驅龍節兼綰魚符内府轉丞方表循良之最外臺選使更疇牧御之庸一道驩然六條秩􅀂恭惟某官器資膚敏業履淑均無終義理之文夙髙朱賈有功平反之徳逺邁于張峻名胄之遥遥知餘風之挺挺君山出牧屹隆維屏之藩汝水竊鄰巳沐餘波之􅃳帝念西江之涸民多南􅅿之離肆咨六轡之良并任双旌之重安其田里而無恨有蔽芾之甘棠送以礼楽而有光寕逶遲於苞栩諒耻納溝之失所必已㩜轡而􅁣然式遄其歸不諌亦入某淹回蜀道企想􅅬仁畏此簡書乏流馬木牛之智􅒒然疲役知奔蜂藿蠋之難何由回北斗之槎尚兾下南州之榻其為頌傒罔旣鋪棻代回胡提㪯楶訢合守符載馳使節田里之無愁恨已茂民庸原隰之有光華冝膺君選恭惟某官器資凝逺德履端􅀷迎寒露置玉壷撓而不濁懷連城佩寳璐即之也温有華左轓詳試右翊歛嚴瀬釣竿之手將賦歸來適武夷粟粒之牙猶煩料理龍光甚渥牡轡如濡君乗使者車民知免矣詔詣行在所予日望之方欲通咫尺之書乃先勤四六之惠某老未得謝命作納言不善斵而汗顔稍麾即去望持斧之直指更勉其驅代回淮東齊倉砺訢合守符粛將使指田里之無愁恨厥績茂焉礼楽之有光華此行寵矣恭惟某官人門具美風調不羣温恭維德之基於文無害平易近民之政所去見思眷是榆邊欎然棠䕃兹自天而出綍不易地而褰帷淮水湯湯式展澄清之志周原膴膴行􅀚勞來之功某縻迹於朝莫靣以賀五雉之爲工正乆巳懷歸四牡之勞使臣别遟賛喜代回湖南楊倉九鼎􅂋陞簿正攺賁使華國方貪賢使服班行之上民􅀹望賜故資原隰之驅晝繍分光宵衣寛頋恭惟某官性資寛栗材具碩庸􅀚其不辭州縣之勞固知必爲廊廟之器兩著扞城之績去則見思一罹枕塊之悲毅然執礼旣畢祥琴之御爰膺戎器之除適是重湖年饑而用不足加之諸洞地大而孽易牙欲其澄清知所歛散非輟寛閎通敏之士難課還定安集之功四牡載馳万物吐氣突不黔席不煖了無偷安避事之情居有倉行有粮㑹見節用爱人之斈某賀我選厥逢人説斯暮見呉山有老大徒傷悲之感曉行湘水願功名留乆逺之看代回浙東孟提舉植粛將星駕分察日畿逺而光華况去天之尺五近在旦夕佇擊水之三千曽旅進之末由何謙撝之先辱恭惟某官器資凝重德宇浚明方公少年甞栖􅁄於獨秀之下維時老子偶泛蓮於欎􅀌之傍屡獲過從不勝傾倒凄其三紀存者幾人細思一夢之回何翅千㠶之過天子有詔選公卿於西漢之循太守謂誰疑姓名必東家之故顧取斜飛之􅀔又為直指之行登蓬萊宫問百万蒼生之辛苦􅊥㑹稽穴添一部史記之雄􅀷舉頭即在於長安濯足㑹登於雲漢某鷄豚共社虎䑕同宫方欲冩賛喜之情乃先沐過情之謝承明之廬勞侍從之事無以公歸􅀖家之光非閭里之榮豈惟我賀代回江西王提舉顧問簮筆何功􅂪誤恩之起廢凾牋爲惠感妙語之嘘枯有味其言不知所賀恭惟某官王之膚使古之謀人慷􅁣登車覺范滂之不逺勤渠下榻延徐穉以來前故當駕彼四牡之勤不廢遺我双魚之寵某老將及耄生也有涯雖則荷囊還本來之靣目其如蓬􅁂當自揣於頭顱􅂚月還歸定相從於杖屦因風占謝愧莫報於瓊琚代回湖南葉提舉宗魯起自家林粛將􅁃節民以財爲本當加培埴之功君乗使者車必有阜通之政得人如此通國驩然恭惟某官風調不群天材甚茂郎潜旣乆忽為襆􅀍之謀邊􅂩方開亟進徙薪之計身謀雖左物望益髙兹膺礼楽之光華復仕貨財之平凖政恐公車之暮召不容湘水之曉行某甞具一箋未敢多賀駕彼四牡諒有功而見知雖則七㐮愧成章之匪報代回孟提舉植生日庭芾門弧方切蓼莪之感函牋臺餽仰勤桑梓之情郤之不恭用是下拜恭惟某官髙􅁩絶俗厚意嘘枯記孟陬之庚寅撫其遟暮憐絳人之甲子混在􅅺塗華以緹緘加之飲饌某丁年託契亥字過期鵝鴨之惱比鄰甚華登爼雞豚之同保社敢不舉觴代回章提舉良肱郡符訢合􅁃節光華昔湘南之一州歛此大惠今江西之列郡汔可小康演而申之自此升矣恭惟某官器資凝逺學行淵􅀷領著讎中豈固薄蓬萊之島抗章請外必欲開祝融之雲人言衡山千里而遥孰知周公朞年而変兹從􅀞㦸易畀繍衣載馳載驅民巳安於四境受容受察吏知服於六條將由膚使之功又趣靣君之詔燕人為函粤人為鎛奏技闕然伯氏吹壎仲氏吹箎均茵幸甚某自聞除目􅀹切􅂬顔託諸侯以寓公自今以始受一㕓於仁政􅂚月于歸代回文思趙提舉希倉疇庸百里進轄五工礼儀知皇帝之尊所閞甚重䑓閣須子弟之習未占已孚恭惟某官礼楽宗英典刑家法兩試一同之地並騰三異之声所去見思願留借㓂後來居上無以易堯夏氏上匠虞氏上陶小煩鳩僝周公拜前魯公拜後㑹即象賢某天幸同曹早勤委贄名父子之􅊗塊俯仰為僚老詩書之斵輪始終知免代回孟提舉植憲曹賛治自揆罔功起部虚貟遽叨攝長冒國恩而有􅌤託鄰芘以知歸恭惟某官宻邇王畿乆將使蕩有功則說行當勞四牡之來位事惟能必進扈六飛之御何旁􅀚之巧匠猶不廢於拙工特枉双魚見華五雉某瀆三不告􅀒四冝休某水某丘乃童子所釣遊也彼鋸彼斧惟梓人之進退焉代回浙東王倉遇右翊合符左畿易節田里之無愁恨畫地共談原隰之有光華去天一握恭惟某官學爲儒倡政号吏師岀守晉陵適楚氛之甚惡獨明召教救周民於孑遺兹由􅀞㦸之香進席綉衣之寵公方念越人之􅇤加戚于心上將思王某之文最冝爲誥某比方謁入復辱書來四牡之勞使臣行且召矣五雉之爲工正猶幸見之代回廣東孟提舉植避直郎闈服勤使節番陽之召來朝何錫予之嶺嶠于行言逺而光華也恭惟某官受才膚敏賦政中和不俟駕固將朝陳前甚敬將入門奔而殿敢後則非駈駱馬之嘽嘽妥飛鳶之跕跕梅花雪片洗空五嶺之炎茶焙塩㠶贍足九年之食使乎不辱王所謂何某有幸卜鄰謂當聮事北山瞋膽巳移猿鶴之文東野回頭猶有駏蛩之願代回湖北趙提舉師石虎符訢合牡轡光華卧護重湖材素雄於辨治身兼数印權益重於按臨恭惟某官德秉忱恂識全膚敏一路大計惟錢榖幾何刑獄幾何連年多虞蓋蓄積缺矣忠信缺矣繍斧兹煩於直指綵衣尤楽於平反載馳載驅想星言之夙駕是穮是衮將天道之好還某闕然僝功偶此攝長送之以礼楽愧賀幅之巳稽是以有衮衣願徳音之是懋代回淮東陳倉孔碩抗辭請外將指臨逐明啓刑書末覺丞哉之􅀒式遏㓂虐正􅀚使者之功恭惟某官表嚴而裏寛人今而學古孔懷同氣蟬孰歎於有緌折獄片言雀難欺於無角適淮民之飢饉勤周道之倭遟側聞褰帷良多􅀒襁粟塞其􅁃斯成末乃取闢之勲印弄於朝行有無以昜堯之命某濫司􅅚化莫賛光華遺我双魚豈止加餐之字駕彼四駱請􅁔靡盬之詩代回江西章提舉良肱五雉工正之聮承人之乏四牡使臣之重博我以文得非所䝉願切有復恭惟某官内外楊歴表裏融明開南嶽之雲厥功已茂激西江之水所惠滋多蘇民氣於崇朝斧盗吭􅀆未晩皇華原隰之上願益咨􅓪清切雨露之逐㑹􅀚献納某強顔曵履决意投簮􅀚風而問髙年想憐其出畫地而数佳政亦足以歸代回浙西林提舉拱辰簮筆何功􅂪誤恩之起廢函牋為惠感妙語之嘘枯或承之羞不知所賀恭惟某官髙􅁩絶俗厚徳鎮浮冝頡頏於飛霞猶簸弄於明月駕彼四牡名大震于京師遺我双魚光自生於庭户某拜命之辱有味其言咫尺不違顔雖少華於末路八十猶行脚諒見􅀏於大方代回淮東劉提舉庻斜日投閑冒誤恩而入侍朶雲借􅃳儷好語以相先自惟闕然何以得此恭惟某官早飛雋望寖踐夷塗忽持漢節之光華出問淮人之飢饉民為國之本不應壹付之烏鳶君乗使者車乃可再安於鴻鴈行且召矣願少需之某生也有涯身其餘幾意行迷路又渉赤墀之塗㒷尽回舡終㝷黄石之約代回淮東趙提舉希道甸侯厎績􅁃節遄驅十二政之聚民可􅀚近效六百石之察郡益䆒逺圖逐靣得賢上心􅀝重恭惟某官禀資信厚毓德直温頃結綬於王畿即分符於輔郡適時艱食極力救荒能活数十万人之飢何必二十四考之政有華出綍亟命褰帷財貨本末源流諒皆素習勞來還定安集自有成規六轡旣均二節以走某欽聞視篆未果襞牋遺我双魚良感從逺方之惠駕彼四牡何幸勞使臣之來代回湖北曹提舉彦約短衣疋馬又塵紫槖之班長跪双魚如見繍衣之靣雖無以報敢誦所聞恭惟某官學本遺經用周當丗一種陶潜之秫再依王儉之蓮扞索虜於淮濆屹長城於漢水恢然游刃經肯綮之未甞快哉此風摶扶摇而在下属重湖之瘡痏煩一節之咨􅓪因而訪桃源之桃不妨假舘恐未熟橘洲之橘己見􅃐裝某乆於離群兹焉還綴老夫耄矣更数旬金馬之門我公歸􅀆或一􅀏銅駞之陌代回趙提舉汝讜代衛參分閫罔功願歸呉下攺轅有命俾牧閩中業已控辤期於得請欲謝吹嘘之送已成臯緩之慚恭惟某官屈漢宗英持周使簜江湖表裏勤四牡之載驅山嶽動摇覺千牛之立解飢者欲令其得食􅁣然巳見於登車諒必由洪都新府而來猶可陪兾州故人之飲行止非人能也得無恋恋之情解后適我願􅀆冝有諄諄之誨第恐一節之走能回六轡之馳某正爾思蓴又􅂪分竹罙入其阻足􅀚海上之禽魚不巳于行只􅀒山中之猿鶴回王提舉遇代月湖右翊合符左畿易節田里之無愁嘆畫地共談原隰之有光華去天一握恭惟某官學為儒倡政作吏師出守晉陵適楚氛之甚􅁖獨明召教救周民於孑遺兹由􅀞㦸之香進席繍衣之寵公方念越人之瘠加戚于心上將思王某之文最冝為誥某比方謁入復辱書來四牡之勞使臣行且召矣五雉之為工正猶幸見之囘􅀹提舉棐去國奉祠乆抱伐檀之媿起家進聀忽叨分竹之榮曽巽謝之未皇何謙撝之甚寵恭惟某官見聞殫洽議論崇欲尚書之履有声典刑是似部使之斧直指風釆凛然皇華寕乆於咨􅓪清切即􅀚於献納某同為呉客共落楚郷德必有鄰􅀝輔車而増重服之無斁藏簡牘以為榮宗正代回西外趙知宗不懬小宰立班愧星辰之曵履大宗維翰貽月露之連編雖過乎情良感此意恭惟某官忱恂有守信厚不浮天揖同姓之聮粛然紏合尽日宣三德之敬莫不浚明雖云為善之居家􅀹楽推賢而報國有華新渥猥及陳人某司臬亡庸共工甚忝虎拜稽首願􅀚蕃鍚之榮龍作納言巳懼曠官之辱代回西外趙知宗不懬䟽詔東平展親西外王曰叔父立爱始于家􅀖汝作秩宗受祉施于孫子棣華韡韡瓜瓞綿綿恭惟某官大雅不群為善最楽箴規磨琢蹈衛武之流風忠義輪囷粲劉向之封事庸專糾合之任助成睦族之仁周之宗盟誰若􅅬侯之長唐之宰相豈遺德􅁉之賢某側聽渙揚未遑旅賀召伯分治諒信如麟趾之詩長卿倦游愧莫續􅇠園之賦梅亭先生四六標凖卷之二十六梅亭先生四六標準卷之二十七太守賀趙尚書知平江府汝述通班媯閣作牧吳門厭承明之勞岀領黄堂之寄游姑蘇之勝請吟畫㦸之詩和氣先庚而已孚驩聲旁午以交慶恭惟某官飄然無敵卓爾不羣重禄勸親亦既曵星辰之履大宗維翰乃欲把江海之麾尺一之留甚堅再三之請彌力君陳順我后于内寧煩更尹於東郊召公繫諸侯之風何害暫分於西陜登以瀛洲之秩試之馮翊之邦月滿一輪虎丘幸甚河潤九里鳳闕頼之無以我公歸兮恐須袞繡有安社稷臣者冝在廟堂某全抱迂踈獨䝉賞識燕巢于幕正有望於捲簾鴻漸于磐今若爲而遵渚然感恩正在於知己則受德豈待於成身使相國賜之相國禮之則韓愈亦人耳此執事事也執事責也於蘇洵何有哉賀李參政知遂寧府璧升班書殿宅牧价藩入爲帝王師難戀洞霄之香火岀補父兄處重尋川路之風煙民説無涯公歸有漸恭惟某官材全而業鉅學廣而聞多伯夷待天下之清一星終矣伊尹得聖人之任四海信之若爲聽文德之麻尚使分武信之竹周公主陜曷嘗瑕公孫之碩膚山甫徂齊殆欲纘祖考之明哲然有撫四夷之急能無先一州之疑向參耐官或謂恐任宣威之寄冦公暫撫不如歸圖笞虜之勳所謂真儒無敵之功豈容匹夫不被其澤某聞報失喜捲書欲狂眉山之見端明不但願岀陳黄之泒洛社之起司馬庶幾卒成遼夏之盟賀寶慶李知府到任大謙錫命菟符開藩龍邸鄴侯岀守􅄛苦李之盤根召伯來宣新甘棠之美䕃驩騰千里喜溢四隣恭惟某官筆槖丗臣箕裘家學禀衡嶽之淑氣真磅礴而扶輿汎濂溪之光風􅂓逍遥兮容與既贊星軺之畫又司天塹之粮所去見思厥臨孔惠自合歸軒墀之供奉頋猶試田里之循良惟此三湘壯哉二邵考姚合之句夸五雲才子之除參韓翃之詩詫萬里滄波之勝矧今新府密邇故郷汛掃松楸宿舂粮而可至綿聨桑梓晝衣綉以何殊暫擁㦸香亟遄圭覲某漫爲佐貳正託附庸向忻一識於荆州今幸再依於劉表偶欲卭叱崍之馭難隣燭之久分尚或濯滄浪之纓叙宗盟而後去賀虞漢州公著代月湖渙奉恩綸復紆郡組紫樞黄閣蓋舊物之青氊紅斾碧油又凝香於畫㦸亶爲歛惠㑹即疇庸恭惟某官父教之忠仕優則學識其小者指爲東閣之郎君見而知之始信西州之竒士勞心兩郡袖手四年兹奉板輿之親仍分竹符之使維今廣漢實古雒城登橋而訪君平探河漢之逺泒臨池而憶諸葛懷宇宙之大名無疑牛鼎之烹雞政使蟻封而試馬佇䇿勳於召杜歸接武於韋平某舊及同僚新聞報政老驥真老空歌挽士不能寸之詩􅁳鴻未􅁳猶見治平爲第一之召賀太平宇文守紹彭恭審輟賢中臺作牧上郡引嫌得請辤兄弟並相之榮歛惠承流新父母斯民之政雙旌戾止五袴煖然恭惟某官氣禀岷峨家傳莘渭抗㫋出使勇登老上之庭持節來歸亟荷甘泉之槖惟時重鎮孰若當塗爰分半竹之符小憇甘棠之䕃朱轓皂蓋暫凝畫㦸之香黄閣紫樞自是青氊之舊某取違未久遣賀猶稽方國一札之成寧須符合刺史三公之入即佇衮歸代羅司法有開上撫州林守岊一官待戍頗安塵土之卑千里懷賢未快雲天之覩忘越國過都之逺失檐簦躡蹻之勞宋之滕而踵門若爲藉手何與韓之同業庸可潔身不然凝清兵衛之香視此卑陬法曹之椽無謂而謁匪狂則諛恭惟某官德宇浚明性資凝逺深造自得獨扛百斛之龍文幼學壯行連舉八科之麟角諸老未能言者天子居然器之彯組西崑不受人間之風日緫書東璧漸摩天上之星辰六鰲忽戴於瀛洲五馬遄驅於汝水穿天出月續康樂之詩章貫日凌霜儲平原之氣節無多借冦㑹即詔黄功名剰誇於數公史冊相期於千載某地寒無挾天禀甚慳童而習之偶成蠅於誤筆齒已長矣僅得雉於鳴盧欲留久逺之看恐未遺餘之補渠其繞樹何所託根柱笏而看西山幸遲􅀲代挂席而上南斗徑造棠隂初非商財賄之有無計班貲之崇庳止欲觀道德於前後聽議論於左右特恐驢鳴之止一難希馬價之倍三見刺史即周孔之初無他望與童子慕回路也請在下風通撫州林知府澤之隨鵷鷺之行昔陪朝綴投雞豚之社兹􅀠氓編未修負弩之恭敢緩馳牋之敬恭惟某官心扄凝粹德宇恢通杞梓廊廟之材宜其隆棟璵璠瑚璉之器而乃潤山粤課民庸入司簿正居然難進而易退可見特立而獨行厭承明之廬抗嚴助之素志照臨川之筆尋靈運之舊遊維此偏城雖云凋郡登瀛平地了無三島之風波擬峴高臺盡領五峯之煙雨均洪十萬户之福企望二千石之良亟聽璽褒式遄圭覲某强名半刺實受一㕓㧞薤而擊强宗諒無待任棠之諷索棗而夸新尹但切吟杜甫之詩通武岡呂知府祖烈典午非材偶躐踐更之次㳙辰祗戍式嚴事長之恭半生傾耳以懐賢一旦奉身而佐治斐裁四六聊具萬分恭惟某官才應時需美兼丗濟丹青霖雨家傳三相之畫圖朱紫風流人敬千鍾之名字道統聿新於南渡文盟實主於東萊今人莫棠棣之如蓋優家學故國非喬木之謂正倚丗臣乃再轉而爲丞始一麾而出守由也果賜也逹政從裕如黔之㠝巫之嶓斯民幸甚然稽近比詎許久留式觀一節之趍入侍九扉之闢某學未能信禄以代耕入誨諸生非敢絶吟而停手出延五鬼眞成觸諱於轉喉甘心曝簷日之溫豈意趣屏星之代今何如昔寧敢爲李膺之大言我不爲公抑豈兾呂䖍之嘉贈所幸處治中之任而展其足固有負天下之望者爲之前風清月明秪望平分於别乗露繁天豁或容􅅃奉於清談上知贑州胡尚書榘聽尚書之履無以公歸分刺史之符徒得君重地便過家之計天知體國之忠冝奉十行遂倡九牧恭惟某官篤誠而明允肅括而􅀪深雲岫無心自然萬物之吐氣秋竿有節豈以四時而改柯萬人仰星辰之班六合無風塵之警誰因五單于争立之釁遂主十萬衆横行之謀非上智必英豪談何容易厭承明勞侍從兆足以行尚煩西清學士之眞俾爲南國諸侯之長牙旗鐵馬虎頭素重於百城寶帶金魚龍尾仍通於八座納獨峰於胸次攬八境於毫端富貴歸郷人知從太守之樂其樂謀猷告后誰其先天下之憂而憂無疾其驅不諌亦入某一違絇繶五見袗絺從軍無分寸之功失勢有千丈之落路經灧澦􅁂己雙蓬身出褒斜命危一葉謫甘滿百黜不待三北宮之挫一毫縱無膚撓東野之失連産轉覺心寒惟是頃者之誤傳或聞舉之以自代士固伸於知己吾不足以累公巨源之表嵇康良非素望昌黎之薦侯喜亦足自竒幸而出大賢之門亦合進小夫之牘實以熏心於憂患未由奏記於門墻道逢千騎之上頭喜甚六鼇之抃足輙裁賀語併控謝忱名在惡子之中敢廢南豐瓣香之敬門無行媒之迹亦甘師道三徑之荒通武岡虞知軍衡仁侯出牧和氣先驅黔之巑巫之磻地稱樂土軫之旁鶉之尾天假德星謹藉雙魚􅃸迎千騎恭惟某官人門具美風調不羣利器盤根縣最茂朝歌之長清談繁露家聲稱祕監之孫從容再轉之丞恬退一麾之守惟武岡之矯矯晉數茂洪若文儒之申申唐推公綽考之近比尤不久留吳公治平之勳甫簪筆而持槖呂侯詳刑之命又􅄃轡以登車我公來合於左符此事即探於右契湘水如舞暫迎五袴之來嶽雲既開又趣雙旌之入某頃因退鷁及識匿犀何幸宣州主人之来將有黔中上佐之託惟是䈤尾以涉筆偶然越爼而代庖兹僣修副貳之恭非强附交承之好除道路而迎太守願亟驅畫隼之􅒅封府庫以待將軍庶早反屠羊之肆謝綿州虞知府普將指非材連需章而祈免陳情未逹勤巽命之重申力不足以回天錢何從而流地洊䝉問勞祗重悚慚恭惟某官才應時需美全丗濟連擁雙旌之駕喜騰五袴之歌紫闥黄扉自合傳登庸之鉢朱甍碧瓦且暫分磊落之州有怜芻狗之陳非具木牛之智薾然疲役畏此簡書猶加從􅁷之詞乃相親重之道某冒申傴僂兾免驅馳澤國龍節土國人竟莫回於先甲大家牛車小家擔尚有望於同寅代回開州張守晉榮分漢竹少憇召棠絶兾北騎麒麟真成歴塊出巴東属朐䏰審已開藩恭惟某官文學浚明器資膚敏談笑千牛之解游刃有餘超騰一鶚之飛揷翎甚勁言從涪水易守固陵編元子之珠璣多傳詩賦奏韋侯之金石又妙辭章卧而治之行且召矣某罔功犴獄躐長雉工無論思朝夕之才漫誇文石有追迎雲月之友邈在盛山代回融州沈守暐出綸西掖宅牧南交惟帝念功不泄邇而忘逺建侯植屏率崇徳而象賢恭惟某官風調不羣人門俱美製百里之錦游刃有餘題别駕之輿建轓甚速朝陽之鳴已近夜郎之徼方虛君無遐心民有吐氣某無由旅賀猥辱謙施五馬不受二毛此可慶耳􅀟魚中有尺素何以報之代回江州莫殿撰中書子純叢棘藏瘝改司平之常伯五花委重勤解事之舍人敢祓謝牋并捈賀臆恭惟某官多士冠冕九牧羽儀要路在前獨有韓稚圭之識榮進素定了無張師德之譏忠結人主之知文皷天下之動乃從右掖而綰左符鞭鳳笞鸞宜有燕閑之樂帶牛佩犢反勤禽制之威兹升祕殿之華就易大邦之翰九江虎渡交騰来暮之謡十年鳳池恐有見晚之召某老當謝事頑復即工君薄淮南耶計登庸之不逺吾在汶上矣恐邂逅之無期代回方韶州信五雉分工何補雞翹之末􅀟魚尺素又勤驛使之来藏去爲榮不知所賀恭惟某官器資膚敏政術融明以專對之學專城裕乎不裕用平戎之策平盜難豈其難輟從三章之溪使鎮九韶之石顯允方叔佇獲醜以言歸執競武王豈忘逺而泄邇某罔功雲部攝長水曹勞侍從厭承明㑹且歸矣選賢良安渤海跂予望之代回譙沅州得遇榮分竹使出牧杏城安邊境立功名維其時矣崇詩書閱禮樂盍少試焉恭惟某官濟美勳門蜚英學省班超投筆當加萬里之封韓信登壇可决千里之勝得州如斗游刃成風沅沚公子之思􅂓逍遥兮容與楚茅王祭之入應紏合而彌縫豈舍王哉今召君矣某雖甞請别猶闕賀成選用賢良欲安之願察舉龔之意備足文武可使也更疇借冦之功代回張澧州忠恕夏后之辟三千罔功亞旅冬官其属六十謬玷上卿五馬髙情􅀟魚下問恭惟某官受材膚敏涖事靖共挺挺魏謩寧無祖烈昻昻嵇紹宜有父風聊分漢竹之符出結澧蘭之佩某罔功曳履有味投簪荒元亮之菊籬竟成何事想浮丘之松塢空送此心代回尤衡州棐榮分漢竹言憇召棠崇德象賢共謂錫山之有後牧人御衆從知衡嶽之無虞恭惟某官業履粹明聲華茂麗喬木非謂故國文獻固存茁蘭稱其家兒典刑是似兹紆魚珮作牧熊湘平庶民愁恨之心去其螟螣還中州清淑之氣懐彼鴟梟佇增秩以賜金復鳴履而曳玉某無由旅賀猥沐謙撝用賢良固欲安之既深簡在兾京師并䝉福也更乞勉㫋代回富和州嘉謀起之家林分以符竹用忠良慈惠之帥慰愁恨嘆息之民邊圉底寧前旒寛頋恭惟某官名門濟美雋􅁤舒翹方事之殷能運粮而排泗相時而動復得計於觀濠何小智之自私疑大勇之若怯忠無不報事乆益明兹從珍臺遂殿藩服惟是烏江之重鎮實係垣墉非資青社之餘規難安田里民之瘼矣君必勉之某雖忻除目之頒猶缺建牙之賀緑琴委贈莫辦貂䄡之酬􅀞㦸凝香願謹燕寢之衛代回趙饒州師㞧取材右戚予節左符南土跕鳶風俗昔諳於瀧吏東方擁􅀐江湖今樂於番君恭惟某官麟趾清標鴻寳奥學文章賀白决科俊造之羣政事龔黄接武循良之傳梅花萬里麥穟兩􅄮盍歸乎来爲王卿士然宅乃牧亦福京師訪九賢之風流安庶民於田里亟其璽賜當以衮歸某猶缺賀成乃勤委重􅀟魚中有尺素已尊君子之謙五馬不受二毛更覺王孫之貴代回林撫州岊右虎留符左􅀛拂印以栁易播君何改刺之嫌自宋之滕我得受㕓之幸恭惟某官材全業鉅學廣聞多七嵗而賦方圓靜若得意連年而取科第易於摘髭教胄西宗抗㫋北漠旋被南衙之薦入讎東觀之書輟從第一之祕丞進陪十五之郎位願試馮翊勇下蓬莱今轉爲汝水之行殆亦是吾州之慶寘薤一本未能獻郡人之規歌麥兩岐已略聞太守之政所願召參之使少寛借冦之民某方欲賀成先勤委重唱父老曰陽公賢也行亦謀㱕有子弟而子産誨之别遲善頌代回方連州桶䟽恩北闕宅牧南交唐陽山之都雖云窮處漢桂陽之守蓋有聞人恭惟某官抱負雄深踐揚詳熟爲丞再轉人歌别駕之功出守一麾上念專城之重有蕐銀嶺逺畀銅符無疾其驅恐有天子之詔起視汝穴更觀刺史之謡某遥想履封無由旅賀望千騎上頭之去應有光華因􅀟魚中素之来就申冩送代回錢漳州蔤榮剖漢符既臨漳浦人生五馬賸收及物之功山有九龍豈少專城之樂恭惟某官飛騰声實明習憲章近使之逺使之皆駕韶鈞之韻汝器也何器也冝爲廊廟之珍惟其洊著於民庸是以復煩於郡寄􅀟旌􅀞㦸無辭遵海而南一札緑綈㑹即自天而下某持荷惟舊視䕃無多馮熊兩轓愧莫陪於賀厦烹魚尺素聊復具於報章代回唐光化燁考工弗績人慙五雉之司宅牧惟良逺致􅀟魚之問洗此執熱儼如即温恭惟某官冝在中朝頋乗邊障九夷通道既㱕馬于華山之陽千里專城姑擊牛享雲中之士今召君矣豈舎王哉某曳履胡顔投簪甚力人生五馬貴願森衛之有加天髙数鴻鳴愧報章之不腆代回趙袁州彦惔起自家林分之符竹庶民安其里是在二千石之良刺史得其人兹爲十萬户之福恭惟某官蜚英属籍擢秀宗標頃聞弦歌之聲已髙物表不謂肯綮之技久縮袖間兹由祝釐始復出牧袁雖小郡古號名􅀖江山勝遊謝靈運之風流猶在閭里無事韓昌黎之政術可師臥而治之行且召矣某違離滋久企仰良深聞去騎之逐􅀟旌喜而不寐因烹魚之有尺素文以足言代回處州趙守伯麟分竹南衙憇棠東輔庶民安其里是在二千石之良刺史得其人何止十萬户之福恭惟某官凝資信厚蓄德惠和大雅不羣信其来之有自小邦懐德冝所去之見思兹屈髙陽子之才出爲縉雲山之牧民庸益懋王覲不遥某側聞建牙未由削櫝􅀟魚中有尺素先承君子之謙五馬不受二毛祗覺王孫之貴代回葉廣德延年分命竹符承流桐汭安庶民於田里是在刺史之良潤千里之京師尤借近畿之重恭惟某官識宏且敏材裕而通鏘百里之絃歌紛諸臺之剡薦明庭擢雋方通振鷺之班神圉祝釐遽抗􅁳鴻之志起家而得二千石去天而在咫尺間勉䇿民庸佇遄王覲某未馳賀幅猥辱謝緘豈自知雲中哉固行藏之難料吾必在汶上矣恐邂逅之無期回趙全州賀權軍必愿比䝉省劄暫攝郡章退惟渉筆之文丞詎久挈瓶之假守秪慚越畔無敢告鄰然在五日京兆之間亦竊千里滎河之潤輙憑咫尺僣布萬分代回信州李守昌振職司均抗章請外治粟方資於内史傳聲俄典於信州周南之滯有之江東之幸多矣恭惟某官茂騰聲實蔚有典刑仙李盤根三百年之閥閱秋蘭流馥四十載之才名方陞九扈之司忽念五馬之貴詔書催發難漱石以枕流德政甫臨已反風而滅火爲繭􅁝爲保障豈無素定之規有社稷有民人足展平生之學某未諧旅賀猥沐損箋耄矣綴班將何逃於司敗歸歟假道猶有謁於舘人代回林嘉興良輟丞外府作牧内畿羞崑崙薄蓬莱孰窺雅意右扶風左馮翊欲展通材卧而治之行且召矣恭惟某官持操甚正揚歴彌深武城之愛播於弦歌海沂之康流於頌詠藹然譽處服在班行甫更再轉之餘遽請一麾之去言從􅂝李少憇甘棠舉頭即在於長安濯足㑹登於雲漢某未遑燕賀先辱魚書儻未挂洪景之冠猶願見黄覇之璽代回晁南康百談訪靈谷之煙雲既擁千􅀐懐廬山之風月忽􅀉􅀟魚忻然發函喜至折屐恭惟某官清門秀望名世真材即之温然不减天球之器韻識其小者漫知月斧之精神方群飛之剌天寧一麾而出守兵衛森􅀞㦸豈特昌韋應物之詩山水含清暉政欲考謝康樂之句徒得君重行以公歸某宻託桑隂既凋蒲質腰黄何􅀘愧山靈之移文頭白早㱕煩謫仙之寄語代回眞州閻宗簿一德持槖無功忝青氊之舊物飛牋爲惠辱黄絹之好辤有味其言不知所謝恭惟某官踐􅆒茲久望實具孚既朝蹟之居多亦民庸之荐著以恢然十二牛之刃冝快哉九万里之風属淮甸兵甲之餘民亦勞止惟閻公棨㦸之雅帝曰俞哉不待席温行膺璽召某乆安芰製又玷荷囊斜日衘山所謂聊復尔耳浮雲出岫未妨歸去来兮徒佩先施莫諧厚報代回魏湖州大中陞華簿正得請州麾既建髙牙屹隆方面曽未遑於馳慶猥先辱於飛牋恭惟某官早煥英􅄤寖儀膴仕神皐治劇久風月之平分匠監參聮去雲霄而一握惟古馮翊乃今吳興帝掄輔郡之材僉曰明公之可承流方尔㱕譽翕然潤九里而及京師君有餘矣先一州而後天下人謂斯何某自笑龍鍾阻陪燕賀天時向􅀬望少留水晶之宮氣候稍凉却㱕侍玉皇之案代回和州李守大東上車强顔又綴甘泉之法從開緘見靣重逢采石之謫仙妙語爛然髙情厚甚恭惟某官名門勝士昭代通材自其不卑於小官固已可卜其逺器婉婉幕謀之賛煌煌簿正之光胡然把麾爲此歛惠意淮民之離散已數萬人寛漢詔之嘆愁惟二千石徒得君重無俾民憂郷黨宗族稱盛焉何朱輪之陸續父子兄弟相繼也㑹紫槖之聮翩某幸託南鄰已投西崦聊復尔耳便當挂神武之冠行或使之猶見賜潁川之璽代回太平王左史居安諫大夫之去國公議謂何良刺史之爲􅀖疲民幸甚愧貢書之已後辱垂問之相先恭惟某官粹學渊回英姿山立識其小者巍巍拾芥之科誰其似之挺挺伏蒲之節交懽將相拔去兇邪此非淺之爲丈夫所謂上不負天子捫中無愧補外亦榮載酒龍山尋孟嘉之風味泛舟牛渚問公瑾之功名雖未均􅀪亦不落寞某年運而徃日昊之離猶冒恩除聊復持甘泉之槖小須興盡行當挂神武之冠代回鄒汀州非熊黄帽青鞋又踏東華之塵土朱轓􅀞㦸未忘北社之比鄰有來緘縢良慰離索恭惟某官温然國器厚甚交情自頃杜門寂寞雀羅之設猥蒙枉駕從容雞􅁰之期求今人中有此客否自榮駈於五馬已屢寄於双魚平生所聞陳汀州流風未逺丞相皆㪯龔渤海即日當迁孰知厚禄之故人政尔頗哀於老子某持荷仍舊視䕃轉斜骯髒伊優揔不若挂冠而去媻跚勃􅌥或猶及召璽之来此心所期須面以既代回錢漳州蔤晚景投閑叨承賜召秋官庀属竊玷貳卿靖循僥忝之由寧匪游揚之助未遑控謝先辱飛牋千騎上頭悵莫陪於祖送双魚尺素窘不尽於報酬代回筠州王守樞停鵉起敬長懐東閣之郎君烹鯉得書知在西江之道院飛文璀璨荷意勤渠恭惟某官早著英猷寖躋膴仕渊然韋元成之斈問済以伯禽父之謙恭簿正搴華人已疑於婉晚民庸得請君何有於鄙夷風行水波少爲髙安之父老雪耻日獻月納行見王家之子弟超人郎選方虛公來則重某不量衰白猶踏軟紅山翁愛山行乞身而去矣相門有相望進德以須之代回前建昌羅知軍勲巳下並代衛參帥及􅀲受代分竹過家適聞千騎之還未遑賀下洊辱双魚之遺有媿積中恭惟某官從容以和柔嘉維則日奉平反之笑五馬甚榮人无愁嘆之声衆狙亦喜去之日如始至昔者人謂斯何引綬還郷端足見買臣之貴昔襦今袴恐已歌叔度之來某正尔蒙成又承解替知賢當㪯慮无益於髙明所去見思㑹亟登於華要代回新南劒朱守疇庸監郡䟽寵專城别駕之功澤既瀦於彭蠡三刀之夢劒終合於延平銅魚初分竹馬交慶恭惟某官丗科舄奕政斈練詳属尔立朝名實既孚於上下翩然引外動静不失其光明乆題湓浦之輿遂擁演山之㦸佇由明試亟用遄歸某辱託同寅良深賛喜引㑹稽之綬足紹光榮聽臨淮之歌更觀强直代回興國趙知軍引嫌抗䟽改命作州共此大江尤倚上流之重均之維屏是資公族之英恭惟某官濯秀銀潢舒翹玉幹持平棘寺獄勿誤於有司歛惠竹符民甫誇於新尹倦游廬阜乗興卬山初非求喬木之迁姑欲廣甘棠之憇恐未煖席又有温綸某倡牧亡庸爲寮有幸千里湖山之自得此豈力能庶民田里之相安尚希愛助代回建昌趙知軍時適巳下代衛參抗章請外得郡來南兩科禮樂之英冝居表著千里循良之寄寔頼藩維恭惟某官大雅軼群清標映世七略百家之浩浩既䇿雋􅄤十事九律之嚴嚴更游餘刃方觀再轉遽取一麾金盤玉柸考顔碑之遺蹟銅陵石澗尋謝屐之舊游特恐未煖席之間又有不俟駕之召某濫兹聮事行且蒙成我思古人雖有媿户庭之令民曰太守尚相圖田里之安代回鄂州趙監丞彦綰借材武監作鎮价藩皇華以遣使臣有嚴並命他人不如同姓足壯上流恭惟某官卓爾不群淵乎似道翔而後集刺天不羡於羣飛用之則行奔電何難於千里甫從再轉亟領一麾種柳西門人固望陶公之政憇棠南國公盍明召伯之風㑹於文昭武穆之英復此漢廣江沱之化冨貴乃其自有治行當以上聞某襆被歸田分符易地東連吳㑹馬牛非不及之風西望武昌烏鵲有可依之月代回南安趙知軍伯鳯解珮治中分符嶺下疇庸外服知更試之已詳就任除書見用賢之不次伏惟某官天資㢘靖政術寛明惟其有之美不忘於世濟潔其清矣畏猶在於人知洊分男國之封綽有子民之惠與其半吉陽之刺何如專横浦之城耎􅁀而循惟良共理報政無遲於五月飛車即下於九天某政爾藏瘝濫兹聮事胡越同舟而濟尚無可異之心魯邾擊柝之聞幸假相扶之力代回沈興化紡諸公奉詔共騰薦士之章老子綴班亦切挂名之寵徒得君重實獲我心恭惟某官實德蜚英名門濟美閩有山川之勝在昔巳然莆爲文物之􅀖惟良共此頗聞賢明慈惠之政寂無愁恨嘆息之民輙以名聞是爲衆選未見升迁之報又何巽謝之爲某陳力不能奉身而退亦有專城之命似可卜鄰已無叱馭之心何因假舘代回何巴州友諒符分銅虎將尋栗里之歸興在驪駒獨奉巴州之寄勤渠逺問感戢深情恭惟某官井絡聞家坤維秀望南賓出守是爲四十而專城北闕上書且有九重之知己謂式遄於王覲乃復懋於民庸他日有殊恩計不逺矣十年爲同姓與有榮焉某納履星辰把麾江海歸鴻遵渚難隨鳥翼之過浮鷁朝天猶覬鴈行之附代回建寧李守訦巳下代衛參政贈琴兮桂林知將行於湘水發軔兮元圃復出守於价藩愧迎賀之未遑感勞謙之見及恭惟某官典刑炳蔚器采端深靈光殿之獨存是関衆目承明廬之三入又把一麾五年憇南國之棠再命典西清之槖謂歸班於文石還分閫於武夷無疾其驅即有詔追之寵不聞亦式况深猷告之知某承惠長沙懐歸茂苑􅀟魚中素莫殚報施之情千騎上頭尚佇臨存之惠代回臨江丁知軍必稱得覲楓宸分蕐竹使朱轓皂蓋豈但人生五馬之榮碧嶂清江盡在都城百雉之内恭惟某官􅂄明山立廉潤春温才名四十年久於許國刺史二千石甫此起家伊誰云從何見之晚吳城葛井袁水蕭灘無嫌如斗之州正藉成風之刃不容席煖行有輪迎某聮事方新懐歸已切叔度何暮定関襦袴之有無令尹重来試問人民之非是代回建昌趙守訪洪崖之井漸欲東還問歐冶之地又令南徙上章自列中詔未俞欲馳話别之牋已辱駢章之寵恭惟某官身兼數器氣蓋諸公暫爲清香畫㦸之吟益增碧澗紅泉之勝二千石之有効冝莫如君一再鼓而已衰何以教我某又隨旄纛特畏簡書閩越地肥聞亦有禽魚之樂吳江水冷何當逐鷗鷺之吟代回姚開州自舜題慈恩之姓乆遂託交傳盛山之詩始知出守逺勤委翰更費屬辭某官續三世科爲諸儒唱頡頏飛霞之佩冝在漢庭簸弄明月之珠久留蜀道㑹膺表選亟有裏除某洊守銅魚甚思蓴鱠同年千里恍如琴上之星何日一罇共聽簾間之雨代回林饒州㓗巳顯膺帝綍榮領价藩番君得江湖之心定酬民望雷令候牛斗之氣乃借鄰光恭惟某官籍甚才名蔚爲壽俊道赤水而容与揚歴已深上青天之峥嶸咨諏有頼居然蠖屈始此雄飛惟是餘干控于粤服逺考劉長卿之舊政近師范文正之餘規御屏記名天子有詔某留連洪府密迩大邦飛昼棟之雲既勤郇汗酌青湾之水尚頼晉波代回徐濠州翦巳下代何月湖作拔尤蓮幕分寄竹符當從軍四五年之餘有起家二千石之寵可知才美超出等夷恭惟某官滿腹甲兵摘髭科第小試東南之尉勇隨西北之師賛畫碧幢息氛紫塞側聞鴻鴈之離散淮甸皆然重罹犬羊之腥羶濠梁爲甚帝咨誰守僉曰公冝非常之任待非常之材斯言益信不次之除有不次之報指日可期某偶綴公朝例蒙私謝窺威顔咫尺天之意寕有遐心誦良吏拊循時之詩即觀奏最代回興化張知府声道畫㦸清香有闕恭先之問明珠繡段例承委貺之勤情文燦然衰遲媿甚恭惟某官器資凝逺材具端方久朝績之踐􅆒思民庸之展布選侯千里岀守一麾閩爲保障之雄莆乃衣冠之㑹徒得君重无俾民憂某偶綴近班過勤私謝乞爲寒水玉方无計以滌煩贈我金錯刀諒不深於責報代回王㱕州茹塵埃伺候甚思何氏之山林翰墨淋漓似見王家之子弟玩之終日洒如清風恭惟某官材地寛餘人門秀整瑰意琦行真淮海之俊人玉友金昆皆正元之朝士未空羣於兾北姑歛恵於巴東方千里而封諸侯豈不足以爲政先一州而後天下特有感於斯文某自笑衰蒲更爲小草迷途未逺已令童僕之迎俗駕當回何待逋客之謝代回金黄州㒜百舎思賢夢過黄􅅺之坂一書委貺坐来赤壁之風讀之洒然何以得此恭惟某官彯纓膴仕脱穎竒材屢風月之平分盍雲霄之獨歩属當冦至能與城存遂就畀於麾符俾益堅於保障綸巾羽扇訪故壘於西邊昼㦸清香歌大江之東去何以累君子猶有十萬之羸進而彊本朝行膺尺一之詔某既乗下澤又戀屬車邊秋一鴈聲漸起江湖之興人生五馬貴願精茵鼎之調代回太平州王左史居安迎五馬問専城已嘗上記烹雙魚有尺素始報下車厚賜駢蕃旅酬窘澁恭惟某官眼髙四海氣蓋諸公惟傃其位而行不得其言則去今之君子遑恤位隆而道汚賢哉大夫可使頑廉而懦立故於去國一二年之近遄有起家二千石之榮報政匪朝歸班有日某久踈顔采未隔心期君薄淮陽耶願早還於禁闥吾在汶上矣㑹猶見於璽書代回饒州􅅬知府安入膺􅂋命出殿雄藩餘干乃番之故都有華作牧逺方聞滕之仁政必願受􅌀眡􅀛之賀未遑烹鯉之書何腆恭惟某官禔身肅括操行淑均獨扛百斛之龍文恢然抱負連中兩科之麟角雋甚聲華歴試民庸率登政最再持平於廷讞旋入直於郎闈萋􅀆織文翩若襆􅀍水清石見雲散月明故從二千石以起家且使十萬户之􅂪福考古文翁之宅題詩栁惲之楼拜顔魯公於堂己見心期之磊落継范文正之轍㑹看步武之騫騰某方此違離悒然馳傃傾蓋如故何幸兵衛之凝香游刃若新亦使皷旗之旁譟代回林處州孔昭起自家林岀守輔郡以賢明慈惠之帥寛愁恨嘆息之民上意甚隆下情惟允恭惟某官蜚英雋􅁤䇿歩華塗表裏瑩乎純明中外乆於揚歴属當赤白囊之警岀分赭黄繖之憂未明李廣之功遽得樂羊之謗忠無不報事久益明徑畀竹符徃臨括郡抱濟北老人之石何必知勇之功名訪江南處士之星㑹有太平之官府某猥塵班綴過辱緘縢弩矢前驅雖少稽於賀厦皷旗旁譟猶有待於賜環代回劉袁州履忠光膺漢詔岀牧江城􅂖旦于差瓜期而徃所謂十萬户之福其惟二千石之良恭惟某官望實髙華典刑秀整自頓割雞之政交騰薦鶚之章服在班行藹然譽處恬爲丞於再轉甘出守之一麾布新澤勸耕桑請驗韓昌黎之表得賢君游庠序自有李泰伯之文洗空珥筆之聲即聽璽書之召某偶塵槖綴例辱緹緘當太守入境之初雖稽燕雀之賀夏頌聖主得賢之美猶期蟋蟀之吟秋代回慶元程知府準榮駈節傳易殿价藩凝燕寢之清香護龍潛之舊邸寛條一布和氣四騰恭惟某官器宇端凝才猷敏劭盤根利器游刃有餘野水横舟乗流則逝一襆潛郎之被屢褰華使之帷宣室不見賈生方議以公卿之任潁川必得黄覇始慰其父老之心瀚海澄波京師蒙潤近長安之日豈舍王哉望蓬莱之雲今召君矣某比方蒙教復辱損箋陪進旅退旅之餘雖已遲於賀夏拜特書屡書之况亦自足以生春代回姜道州楷起從珍舘岀綰銅符板輿迎飬之榮竹馬歡呼之切教條一布喜氣四馳恭惟某官夙抱通材蚤儀華貫西風便面厭隨京洛之塵東海邊頭歸望蓬莱之氣雖某水某丘方便於幽討然吾山吾溪正頼於主盟考陽城之勞心知所從矣得元結而吐氣竊有待焉安知良刺史之歸不應吾太公之望某未遑旅賀先辱謙施欲徃從之湘水深莫效綺琴之報歸去來兮山酒熟亦吟畫㦸之香代回光化唐知軍燁蘭芷可佩頗懐瀟湘之故人草木知名似是江淮之刺史徒得君重實獲我心恭惟某官文史蟠胷精神滿腹觀牛刀之游刃已犬足之生氂自爲入幕之賔彌露處囊之穎果從交辟徑把一麾邊城蹂躙之餘野馬也塵埃也郡守經理之始繭􅁝乎保障乎無有遐心政觀逺業某恭承嘉恵甚覺故情汎乎不繫舟漸爲興盡之計賞此無瑕璧但歌靡􅐭之詩代回傅贑州伯召奉詔舉賢詘公充賦貽書陳誼期我過情言及而言謝非所謝恭惟某官器資宏毅識量浚明四顧而解金牛號霹靂手一洗而空凢馬眞騕褭蹄臥汲黯於淮陽固許召還於禁闥試望之於馮翊不如即置之本朝日君有命於庭星郎多虛其户凢在班列許以名聞雖不勝匹雛固爲無力人矣然有如一鶚敢不表而出之露請頗勤天髙未動不度德不量力雖見笑於大方非要譽非納交亦粗賢於流俗不虞手畢却重背芒回首丘山何害四十圍之溜雨濯足雲漢㑹看九萬里之摶風某濩落無容媻跚未去迷􅀖故令晚方微吟黄太史之詩可人期不来亦太息陳後山之句代回嘉定林守㓗巳對月半輪好在漢嘉之太守披雲五朶乃是瀟湘之故人間者闊焉得此足矣恭惟某官玲瓏俊識卓􅕸通材和荆潭之詩氣已吞於餘子隨巴蜀之檄名益震於諸公兵衛森畫㦸之香談笑入青油之幕􅂓將八詠還受一錢載酒訪揚雄之居登樓歌李白之句亦職有利盍歸乎来某久欲挂冠又還持槖庚星之配殘月寧容到曉之不收丙􅔙之有嘉魚所願得賢之與共二十七卷終梅亭先生四六標凖卷之二十八太守代回新建寧府李大諌大異代月湖蒼玉青旂趣元侯之北覲清香􅀞戟轉仁氣以南驅誕對端辰裒時蕃祉恭惟某官蜚英騰荗聽厲即温肆夏升歌擬宣麻於文德陽春有脚還擷茗於武夷芳􅀊維新叢休滋至某龍鐘甚矣燕賀缺然列炬盍簮願遂同朝之喜習郷上齒便爲告老之謀
