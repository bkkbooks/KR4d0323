  - {type: variant, offset: 4439, length: 287, content: 木居士廟在衡州來陽縣鼇口寺韓文公題詩云火透波穿不計春根如頭面幹如身偶然題作木居士便有無窮求福人羅隠詩云鳥噪殘陽草滿庭此中枯木似人形只應水物長為主未必浮槎即有靈八月風波飄不去四時黍稷薦惟馨南朝庾信無因賦牢落祠前水氣腥宋元豐初來陽令禱雨無應析而薪之今所祀者乃寺僧再刻也宋鄭景望蒙齋筆談云昌黎木居士詩蓋有所為來陽令伐而焚之東坡在黄州聞而喜曰木居士之誅固已晩矣世間乃有此明眼人乎過丹霞逺矣後主寺者利其祭餘復倣其像刻之張芸叟謫郴州過而見之題詩云波穿水透本無竒初見潮州刺史詩當日老翁終不免後來居士欲奚為山中雷雨誰宜主水底蛟龍自不知若使天年俱自遂如今已復有孫枝得非所蒙陳後山詩呼我過其廬所, SBCK: ''}
