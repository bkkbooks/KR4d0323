  - {type: variant, offset: 5, length: 0, content: '', SBCK: 丗濟江濤如此誰知戮力於神州人物􅆌然士頗傾心於執事乆於直指無乃斜飛然小大之獄旣得其情則澄清之志亦足以展風雲之㑹朝夕以須某分閫何功投林是幸叔夜不便於}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 䟽遂緩報章莊周無索其形骸尚祈終惠代回方提刑信孺報政九疑􅀚風五嶺萬物吐氣正須結輩之賢六轡周咨何慮越人之􅇤恭惟某官風猷強濟業履浚明學禮之有異聞蚤駿萬夫之望誦詩而能專對卒鳩二國之民九重念功再命作牧與其田里之無嘆息賀其見鳯之鳴何如原隰之有光華恵尔跕鳶之外星言􅀟節山鎮百城刑獄幾何錢􅂖幾何不嫌纍印功德如是祥祉如是佇即予環某方欲修辭遽勤委重􅀟魚尺素何言衛公緑竹之詩兩驂四黄請継方叔葱珩之詠回䕫路李提刑鐊二年和義之郡粗護憇棠再命通德之􅀖獲依仙李不謂我入而公出真成室邇而人遐辱􅀉朶雲如對落月恭惟某官􅀒材鯁亮蓄德鴻􅀷雪檜霜松凛凛祖風之似公槐卿􅁄英英家學之傳四奏郡庸兩將使指巖巖漢􅃆帳下之甲多奔往往巴渝舟中之指可掬去孔伋君誰與守見王導吾復何憂共歌四牡之有功行趣八鸞之入覲某􅀗通族譜且託交盟勿勞乎勿誨乎尚希忠告同姓也同業也冝不遐遺梅亭先生四六標凖卷之二十五梅亭先生四六標凖卷之二十六倉使通王提舉與􅁠抗章引外掲節司平正士去朝四海之疑未釋望郎問俗三湘之幸則多况以部刺史之天來臨舊令尹之地民信之矣帝念在兹恭惟某官天韻崇谹風猷膚碩學問廣大日光玉㓗而蛟翔志氣清明燭照数計而􅀛卜早提邑最入踐朝行徧儀清選而人訝其遲立登要路而公不之領古之君子寕可禄歉而氣豐今之謀人渠恤身進而徳退拂衣勇甚􅄃轡􅁣然載􅁔小雅之皇華復領大招之清絶我聞在昔三異具見於一同民到于今五善固忻於重拜所虞馹召靡俟鴈回某去國三年起家貳郡瞻霄漢之佳士昔􅂪或輓以或推逢瀟湘之故人今乃受容而受察偶甫至丞哉之璧末由望使者之車文儒申申旣喜迎柳公之不逺武岡矯矯亦幾見王導而無􅁨通湖南樂提舉章人一天而我二未遑樂霧之披戒七日而齋三將展衡雲之拜持不腆之上轄曠莫逹乎中㳙削櫝斐然􅀒芒悚甚恭惟某官器資􅂋允德履碩膚亞卿之呼吸智謀雲仍固在正子之充实善信風烈猶存巍科摘髭要路䇿足落筆坐奔於万馬善刀立解於千牛縣庸蔚乎浮湘郡最卓於守郢不但别盤根之利器要已知勁草於疾風盍歸清切之班朝夕獻納勉副皇華之遣原隰馳驅甫湘水之曉行遄蔡城之夜􅅞酃醁有酒洞庭無波六轡旣均復戍淸絶之地一節以走恐登碧落之天某不肖至愚無聞甚陋二科鹿鹿遂謀三釡以養親千里魚魚誰以四方而供簿然專令朱出而墨入决不敢黄放而白催有先逹者為之前此六或遂居下位不獲於上兹道難行受察云􅀄願忠敢隱移慈竹而㘽率土定未忘故里之情賦梅花而獻繍衣敢妄兾聞人之目通新江西提舉兼知撫州徐監丞瑑榮驅龍節兼綰魚符内府轉丞方表循良之最外臺選使更疇牧御之庸一道驩然六條秩􅀂恭惟某官器資膚敏業履淑均無終義理之文夙髙朱賈有功平反之徳逺邁于張峻名胄之遥遥知餘風之挺挺君山出牧屹隆維屏之藩汝水竊鄰巳沐餘波之􅃳帝念西江之涸民多南􅅿之離肆咨六轡之良并任双旌之重安其田里而無恨有蔽芾之甘棠送以礼楽而有光寕逶遲於苞栩諒耻納溝之失所必已㩜轡而􅁣然式遄其歸不諌亦入某淹回蜀道企想􅅬仁畏此簡書乏流馬木牛之智􅒒然疲役知奔蜂藿蠋之難何由回北斗之槎尚兾下南州之榻其為頌傒罔旣鋪棻代回胡提㪯楶訢合守符載馳使節田里之無愁恨已茂民庸原隰之有光華冝膺君選恭惟某官器資凝逺德履端􅀷迎寒露置玉壷撓而不濁懷連城佩寳璐即之也温有華左轓詳試右翊歛嚴瀬釣竿之手將賦歸來適武夷粟粒之牙猶煩料理龍光甚渥牡轡如濡君乗使者車民知免矣詔詣行在所予日望之方欲通咫尺之書乃先勤四六之惠某老未得謝命作納言不善斵而汗顔稍麾即去望持斧之直指更勉其驅代回淮東齊倉砺訢合守符粛將使指田里之無愁恨厥績茂焉礼楽之有光華此行寵矣恭惟某官人門具美風調不羣温恭維德之基於文無害平易近民之政所去見思眷是榆邊欎然棠䕃兹自天而出綍不易地而褰帷淮水湯湯式展澄清之志周原膴膴行􅀚勞來之功某縻迹於朝莫靣以賀五雉之爲工正乆巳懷歸四牡之勞使臣别遟賛喜代回湖南楊倉九鼎􅂋陞簿正攺賁使華國方貪賢使服班行之上民􅀹望賜故資原隰之驅晝繍分光宵衣寛頋恭惟某官性資寛栗材具碩庸􅀚其不辭州縣之勞固知必爲廊廟之器兩著扞城之績去則見思一罹枕塊之悲毅然執礼旣畢祥琴之御爰膺戎器之除適是重湖年饑而用不足加之諸洞地大而孽易牙欲其澄清知所歛散非輟寛閎通敏之士難課還定安集之功四牡載馳万物吐氣突不黔席不煖了無偷安避事之情居有倉行有粮㑹見節用爱人之斈某賀我選厥逢人説斯暮見呉山有老大徒傷悲之感曉行湘水願功名留乆逺之看代回浙東孟提舉植粛將星駕分察日畿逺而光華况去天之尺五近在旦夕佇擊水之三千曽旅進之末由何謙撝之先辱恭惟某官器資凝重德宇浚明方公少年甞栖􅁄於獨秀之下維時老子偶泛蓮於欎􅀌之傍屡獲過從不勝傾倒凄其三紀存者幾人細思一夢之回何翅千㠶之過天子有詔選公卿於西漢之循太守謂誰疑姓名必東家之故顧取斜飛之􅀔又為直指之行登蓬萊宫問百万蒼生之辛苦􅊥㑹稽穴添一部史記之雄􅀷舉頭即在於長安濯足㑹登於雲漢某鷄豚共社虎䑕同宫方欲冩賛喜之情乃先沐過情之謝承明之廬勞侍從之事無以公歸􅀖家之光非閭里之榮豈惟我賀代回江西王提舉顧問簮筆何功􅂪誤恩之起廢凾牋爲惠感妙語之嘘枯有味其言不知所賀恭惟某官王之膚使古之謀人慷􅁣登車覺范滂之不逺勤渠下榻延徐穉以來前故當駕彼四牡之勤不廢遺我双魚之寵某老將及耄生也有涯雖則荷囊還本來之靣目其如蓬􅁂當自揣於頭顱􅂚月還歸定相從於杖屦因風占謝愧莫報於瓊琚代回湖南葉提舉宗魯起自家林粛將􅁃節民以財爲本當加培埴之功君乗使者車必有阜通之政得人如此通國驩然恭惟某官風調不群天材甚茂郎潜旣乆忽為襆􅀍之謀邊􅂩方開亟進徙薪之計身謀雖左物望益髙兹膺礼楽之光華復仕貨財之平凖政恐公車之暮召不容湘水之曉行某甞具一箋未敢多賀駕彼四牡諒有功而見知雖則七㐮愧成章之匪報代回孟提舉植生日庭芾門弧方切蓼莪之感函牋臺餽仰勤桑梓之情郤之不恭用是下拜恭惟某官髙􅁩絶俗厚意嘘枯記孟陬之庚寅撫其遟暮憐絳人之甲子混在􅅺塗華以緹緘加之飲饌某丁年託契亥字過期鵝鴨之惱比鄰甚華登爼雞豚之同保社敢不舉觴代回章提舉良肱郡符訢合􅁃節光華昔湘南之一州歛此大惠今江西之列郡汔可小康演而申之自此升矣恭惟某官器資凝逺學行淵􅀷領著讎中豈固薄蓬萊之島抗章請外必欲開祝融之雲人言衡山千里而遥孰知周公朞年而変兹從􅀞㦸易畀繍衣載馳載驅民巳安於四境受容受察吏知服於六條將由膚使之功又趣靣君之詔燕人為函粤人為鎛奏技闕然伯氏吹壎仲氏吹箎均茵幸甚某自聞除目􅀹切􅂬顔託諸侯以寓公自今以始受一㕓於仁政􅂚月于歸代回文思趙提舉希倉疇庸百里進轄五工礼儀知皇帝之尊所閞甚重䑓閣須子弟之習未占已孚恭惟某官礼楽宗英典刑家法兩試一同之地並騰三異之声所去見思願留借㓂後來居上無以易堯夏氏上匠虞氏上陶小煩鳩僝周公拜前魯公拜後㑹即象賢某天幸同曹早勤委贄名父子之􅊗塊俯仰為僚老詩書之斵輪始終知免代回孟提舉植憲曹賛治自揆罔功起部虚貟遽叨攝長冒國恩而有􅌤託鄰芘以知歸恭惟某官宻邇王畿乆將使蕩有功則說行當勞四牡之來位事惟能必進扈六飛之御何旁􅀚之巧匠猶不廢於拙工特枉双魚見華五雉某瀆三不告􅀒四冝休某水某丘乃童子所釣遊也彼鋸彼斧惟梓人之進退焉代回浙東王倉遇右翊合符左畿易節田里之無愁恨畫地共談原隰之有光華去天一握恭惟某官學爲儒倡政号吏師岀守晉陵適楚氛之甚惡獨明召教救周民於孑遺兹由􅀞㦸之香進席綉衣之寵公方念越人之􅇤加戚于心上將思王某之文最冝爲誥某比方謁入復辱書來四牡之勞使臣行且召矣五雉之爲工正猶幸見之代回廣東孟提舉植避直郎闈服勤使節番陽之召來朝何錫予之嶺嶠于行言逺而光華也恭惟某官受才膚敏賦政中和不俟駕固將朝陳前甚敬將入門奔而殿敢後則非駈駱馬之嘽嘽妥飛鳶之跕跕梅花雪片洗空五嶺之炎茶焙塩㠶贍足九年之食使乎不辱王所謂何某有幸卜鄰謂當聮事北山瞋膽巳移猿鶴之文東野回頭猶有駏蛩之願代回湖北趙提舉師石虎符訢合牡轡光華卧護重湖材素雄於辨治身兼数印權益重於按臨恭惟某官德秉忱恂識全膚敏一路大計惟錢榖幾何刑獄幾何連年多虞蓋蓄積缺矣忠信缺矣繍斧兹煩於直指綵衣尤楽於平反載馳載驅想星言之夙駕是穮是衮將天道之好還某闕然僝功偶此攝長送之以礼楽愧賀幅之巳稽是以有衮衣願徳音之是懋代回淮東陳倉孔碩抗辭請外將指臨逐明啓刑書末覺丞哉之􅀒式遏㓂虐正􅀚使者之功恭惟某官表嚴而裏寛人今而學古孔懷同氣蟬孰歎於有緌折獄片言雀難欺於無角適淮民之飢饉勤周道之倭遟側聞褰帷良多􅀒襁粟塞其􅁃斯成末乃取闢之勲印弄於朝行有無以昜堯之命某濫司􅅚化莫賛光華遺我双魚豈止加餐之字駕彼四駱請􅁔靡盬之詩代回江西章提舉良肱五雉工正之聮承人之乏四牡使臣之重博我以文得非所䝉願切有復恭惟某官内外楊歴表裏融明開南嶽之雲厥功已茂激西江之水所惠滋多蘇民氣於崇朝斧盗吭􅀆未晩皇華原隰之上願益咨􅓪清切雨露之逐㑹􅀚献納某強顔曵履决意投簮􅀚風而問髙年想憐其出畫地而数佳政亦足以歸代回浙西林提舉拱辰簮筆何功􅂪誤恩之起廢函牋為惠感妙語之嘘枯或承之羞不知所賀恭惟某官髙􅁩絶俗厚徳鎮浮冝頡頏於飛霞猶簸弄於明月駕彼四牡名大震于京師遺我双魚光自生於庭户某拜命之辱有味其言咫尺不違顔雖少華於末路八十猶行脚諒見􅀏於大方代回淮東劉提舉庻斜日投閑冒誤恩而入侍朶雲借􅃳儷好語以相先自惟闕然何以得此恭惟某官早飛雋望寖踐夷塗忽持漢節之光華出問淮人之飢饉民為國之本不應壹付之烏鳶君乗使者車乃可再安於鴻鴈行且召矣願少需之某生也有涯身其餘幾意行迷路又渉赤墀之塗㒷尽回舡終㝷黄石之約代回淮東趙提舉希道甸侯厎績􅁃節遄驅十二政之聚民可􅀚近效六百石之察郡益䆒逺圖逐靣得賢上心􅀝重恭惟某官禀資信厚毓德直温頃結綬於王畿即分符於輔郡適時艱食極力救荒能活数十万人之飢何必二十四考之政有華出綍亟命褰帷財貨本末源流諒皆素習勞來還定安集自有成規六轡旣均二節以走某欽聞視篆未果襞牋遺我双魚良感從逺方之惠駕彼四牡何幸勞使臣之來代回湖北曹提舉彦約短衣疋馬又塵紫槖之班長跪双魚如見繍衣之靣雖無以報敢誦所聞恭惟某官學本遺經用周當丗一種陶潜之秫再依王儉之蓮扞索虜於淮濆屹長城於漢水恢然游刃經肯綮之未甞快哉此風摶扶摇而在下属重湖之瘡痏煩一節之咨􅓪因而訪桃源之桃不妨假舘恐未熟橘洲之橘己見􅃐裝某乆於離群兹焉還綴老夫耄矣更数旬金馬之門我公歸􅀆或一􅀏銅駞之陌代回趙提舉汝讜代衛參分閫罔功願歸呉下攺轅有命俾牧閩中業已控辤期於得請欲謝吹嘘之送已成臯緩之慚恭惟某官屈漢宗英持周使簜江湖表裏勤四牡之載驅山嶽動摇覺千牛之立解飢者欲令其得食􅁣然巳見於登車諒必由洪都新府而來猶可陪兾州故人之飲行止非人能也得無恋恋之情解后適我願􅀆冝有諄諄之誨第恐一節之走能回六轡之馳某正爾思蓴又􅂪分竹罙入其阻足􅀚海上之禽魚不巳于行只􅀒山中之猿鶴回王提舉遇代月湖右翊合符左畿易節田里之無愁嘆畫地共談原隰之有光華去天一握恭惟某官學為儒倡政作吏師出守晉陵適楚氛之甚􅁖獨明召教救周民於孑遺兹由􅀞㦸之香進席繍衣之寵公方念越人之瘠加戚于心上將思王某之文最冝為誥某比方謁入復辱書來四牡之勞使臣行且召矣五雉之為工正猶幸見之囘􅀹提舉棐去國奉祠乆抱伐檀之媿起家進聀忽叨分竹之榮曽巽謝之未皇何謙撝之甚寵恭惟某官見聞殫洽議論崇欲尚書之履有声典刑是似部使之斧直指風釆凛然皇華寕乆於咨􅓪清切即􅀚於献納某同為呉客共落楚郷德必有鄰􅀝輔車而増重服之無斁藏簡牘以為榮宗正代回西外趙知宗不懬小宰立班愧星辰之曵履大宗維翰貽月露之連編雖過乎情良感此意恭惟某官忱恂有守信厚不浮天揖同姓之聮粛然紏合尽日宣三德之敬莫不浚明雖云為善之居家􅀹楽推賢而報國有華新渥猥及陳人某司臬亡庸共工甚忝虎拜稽首願􅀚蕃鍚之榮龍作納言巳懼曠官之辱代回西外趙知宗不懬䟽詔東平展親西外王曰叔父立爱始于家􅀖汝作秩宗受祉施于孫子棣華韡韡瓜瓞綿綿恭惟某官大雅不群為善最楽箴規磨琢蹈衛武之流風忠義輪囷粲劉向之封事庸專糾合之任助成睦族之仁周之宗盟誰若􅅬侯之長唐之宰相豈遺德􅁉之賢某側聽渙揚未遑旅賀召伯分治諒信如麟趾之詩長卿倦游愧莫續􅇠園之賦梅亭先生四六標凖卷之二十六梅亭先生}
