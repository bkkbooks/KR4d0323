  - {type: variant, offset: 5, length: 0, content: '', SBCK: 之三十五梅亭先生四六標凖巻之三十六尉通寜郷李縣尉尚一行作吏祭竈􅀑以媚飢同官爲僚禱尉仙而徼福可無牋記先布姓名恭惟某官機量浚明風猷膚敏千里之馬騏􅂹顧伏塩車九罭之魚鱒魴合登廟鼎鬱鬱赤墀之志匆匆采棒之行茅舍之聽雞聲孰非王事花村之無犬吠即是民庸人憐横水之孤舟誰識􅀝天之長劒乗除必爾翹跂俟之某不自力田輙謀耕禄家貧親老誠有待於斗升官小職輕亦欲伸其尺寸然平生之短朱墨須寮友之助丹青儻念卑棲難倚掣鰲之釣猶能拍浪請陪射鴨之弓通寜鄉陳縣尉愷我為祭竈之謀惟鄰是卜公有折腰之役及爾同寮聞五綵之鼎來盍尺牋之豫附恭惟某官潜心蓄斈敏手决科文石陛髙定抱南昌之憤青􅁳箭送暫為東野之酸狐定蹙於草中蛟何為乎水裔某效顰白戰失步朱勾所至賈胡願早酬於一識不知仙吏竟尚隔於幾塵回武岡東尉東膠退士合佐黔中北部英遊冝留洛下顧訪湘纍之悴不辤溧尉之酸恭惟某官材調崇谹器資果毅久游􅀟宇夙閑龍豹之韜斈敵萬人足奪貔貅之氣冝䇿勲於榆塞顧試步於竹弓繞黄山穿昆明㑹當奏揚雄之賦涉赤墀登文石不徒上梅福之書某自分駑庸甘心雌伏别駕始可展足豈其然乎同寮敢不尽心乃所望耳代回湘潭游尉林青鞋左計又迷京洛之塵繡叚右牋可認瀟湘之故誰能執熱此不聽氷恭惟某官胄出清門源流正斈單傳伊洛寕忘厥祖之典刑平視莊騷盍勉乃翁之文字得解牛於肯綮失射鴨之酸寒行矣交章從而増秩某重尋故步真是陳人懐鈞天一餉之榮且然聊爾追汗漫九垓之約行或使之代回崇仁舒尉若拙識中散於雞羣夙有通家之好懐少傅之鵠峙未諧識面之期飛牋惠然佩意厚甚恭惟某官冠裳閥閲詩禮典刑無忌即劉牢之甥風流是似鄭公乃魏謩之祖氣象如存綵棒所臨緑林其遁佇公侯之必復豈州縣之徒勞某正爾借交偶然浪出北山馳驛儻無俗駕之勒移東野回頭猶及射堂之着句回舒縣尉再書美最陪賀旅以未能十部華牋感鳴謙之先辱榮於藏去愧在暗投恭惟某官䟽通之才膚敏於斈南昌小隱自當登文石之􅂗東野壯圖誰可任通家之漕願少安之無譟孰云多而不揚某芻狗已陳露螢不暖友其士之仁者敢隱於言今者人謂斯何恐孤此意更容見可續得表微回通山廖尉蓬矢之生厚甚臨存之寵􅀲期而往先之謙施之光似㒹倒於衣裳亦輪囷於肝膽恭惟某官美由世濟才應時湏抱壁中科斗之文人無能識對殿上龍蛇之影日獨未斜顧為東野之酸小作南昌之隱願俟時乎將刈正安結緑之委虵既識路又疾驅忽報飛黄之騰踏勉為親屈剰了兒癡某已拜散人足休餘日或出或處漸為雋􅁤之踈惟孝惟忠敢置祝規之敬回錢塘張尉屢薦入官明公淹矣一官禦㓂前輩願之愧執訊之不先辱屬辭之見及恭惟某官珪璋之質藻火其文誦三箧之亡書深於汲古授一編之秘略盍以濟時顧尋東野之酸來主西湖之勝弓刀閑睱聊暫為平地之僊文字芳鮮行即入明經之佛某濫巾畿幕投袂吏塵􅀟魚書之臨極承厚意九牛毛之冗聊具報章代回武進黄尉大中曵履罔功我二冝去飛牋見問君獨賢勞恭惟某官早决儒科晩遊吏役願登文石豈無梅福之書猶抱竹弓小著孟郊之句有勤魚素見勞雉工某自揣頭顱難司喉舌巳控挂冠之請聞命即行敢因授簡之歸占辭奉報回善化黄尉習委吏之㑹計正爾卑棲聞飛仙之遨逰超然髙隱方圖執訊先辱飛牋恭惟某官文獻名流典刑勝士爲公室輔家夙近於魁三有伯父風學諒求於已百顧紆􅂗轍小試弓刀河西之尉凄凉不常厥邑湖南之地清絶幸疾其驅行即交章亟膺剡辟某􅁳心祭竈迫命代厨短主簿髯參軍緫無􅀜於喜怒飱落英飲墜露願同廣於離騷回新威逺王縣尉癸之題千佛之經夙聞秀望試五采之棒似屈長材有來委翰之勤良動得朋之喜恭惟某官天葩掞藻地芥拾科頌聖主之得賢定是雲仍之􅂀移忠臣而為孝固諳風土之冝若為翰墨之材肯就弓刀之役月明静夜應無犬吠之聲雲入古㕔小寓燕巢之舍東野寕淹於射鴨南昌㑹見於參鸞某濫守郡符幸聮王事瓊玖匪報永以為好也聊􅅚魚緘珠玉將至得無修容乎惟占騎氣回新榮徳郭縣尉光旿效官錦里昔未識賢乗障斗州今將聮事鳴謙委况擊節拜嘉伏惟某官摛藻天葩决科地芥待公車之詔誰明東郭之賢涉文石之􅂗還作南昌之隱顧慙陋邑恐負英躔然代公實發軔於通泉至尚父亦奮身於長史繼其風烈將在雲仍無嫌射鴨之弓即引穿鵰之箭某出幕十暑試郡一寒同僚敢不盡心必䝉愛助一官願為禦㓂更幸疾驅回新應靈趙縣尉与槱一門父子謂皆分唐叔之珪五色神仙顧少屈趙家之玉有來委翰知可得朋恭惟某官千里名駒九苞威鳳宗室隨二千石飽聞議論之髙文章長萬丈光坐想垠崖之豁况已摩空而奏賦不難趾美以决科何為渭北清新之材乃屈河西凄凉之職吟竹弓之射始昌東野之詩登文石之􅂗即上南昌之䟽某舊交中壘今見休侯正望弓刀帖䑕竊狗偷之警却從筆硯窺蛇神牛鬼之竒回新資陽曹縣尉趣曹裝而東上莫企風㠶試梅隱以西還末瞻星表方規賀謁已沐贄牋伏惟某官學有家傳文為國緯偉然九尺之幹輔以八斗之材進士論定然後官之久冝脱頴公等安在何見晩也今始奪袍折腰暫就於河西入幕即空於兾北某濫兹假守幸可借交以公歸兮正望發棠之恵無吾以也更希拔薤之規回新遂寜長江張縣尉瞻海上之槎恨差池於八月取圯下之履望傳授之一編䄂牋臨之展巻愧甚恭惟某官負材孔碩蓄學不貲英英脩月之文飄飄凌雲之賦朝華本髙於夕秀夙知乃墜於暮成入對大庭良負誦書之三箧出次逺闕尚賢不調之十年况長江素委之詩人豈市門可淹於仙吏暫返輕舟於吳㑹即歸大老於周家某甫欲欵門先䝉命駕以覇陵李將軍之老儻不見呵則天上張公子之賢敢忘加敬回王縣尉昌大訪南榮之隱冒懐太守之章宣北部之威正藉少公之棒有來委翰良仞垂情恭惟某官科級髙華器能膚敏試竹弓之射不辤東野之酸寒登文石之􅂗行繼南昌之讜直功名之㑹磨厲以湏某出幕星終得州斗大烹鮮勿撓固當謹庭戸之脩吠犬不驚是則藉弓刀之助回秦縣尉謝差校正九韶善繼人志當為黄素之校讎肯從吾游小試丹鈆之點勘表微愧甚嘗巧可乎恭惟某官心夷而志崇齒新而意宿試劒馳馬早欲範王良之驅游刃解牛今將進庖丁之道綵棒行施於北部青氊㑹憶於西崑今開萬巻餘義理在文辤之表端能幾字正始終有條理之科所望逺來之朋共成相觀之善卿自用卿法在良弓之子必學為箕人患為人師然它山之石可以攻玉卷之三十六梅亭先生四六標準巻之三十七監官代回新監鄂州大軍向士芳五雉分工謬叨誤渥􅀟魚尺素良認故情恭惟某官冑出髙華才猷秀整所謂故國非喬木蓋有典刑不知公子是監倉誰相料理無忘澤霧更與培風某罔功雲司攝長水部血氣既衰戒在得何敢忘耶田園將蕪胡不歸兆足行矣回向監倉老我匄閑濫分丈二之組故人委重逺貽咫尺之書倚擔報之摇毫率甚恭惟某官象賢舄奕燕譽飛騰大耐官職之餘暫司倉粟小試山林之久遂及戍􅀲駕賢業而心馳佇薦書之交上某更勤來問仍費属辝腐於力弱於才無能爲役問則告疑則辨敢愛乎言回宣城劉監税趣譏征之期仕未能信講交承之好禮辱相先既登受之未安欲捲還而不敢藏惟深於十襲報敢廢於七襄恭惟某官學本家傳美由世濟凛凛更生之志節博以羣書英英夢得之詞章雄於一代顧從三語之椽復甘再轉之丞勇尋葛井之神仙遂作宣州之賔客左右望而罔市為政在人貨賄掌其征㕓生財有道迄參幕畫入賛藩條馬也守閭雖少淹於歳月鳳焉巢閣即徑上於雲霄某聞詩於庭千禄以閥抱闗非耻方浪為鎻棘之謀得闕正賖敢躐兾及􅀲之代藉使承竹馬之棄亦未得蕉鹿之真敢圖䑓􅀠之臨許論子孫之契去之日如始至知來者之䝉成舊之政必告新敢因之而請益回郫縣侯監税無隴西李博之材濫兹巢幕有夷門侯嬴之智亦爾抱闗委贄相先報章敢後恭惟某官學卑衆楚家近三蘇衫曵枯荷難裹崔嵬之氣筆摛玄草漫為拓落之官暫屈関譏聊從吏隱佇漢庭之用老從吴市以登仙某未洗袴袍辱迂車轍載披郇翰有言何至於失人儻憶郫筒無酒或容於酤我回髙監税李巡檢區區薦士蓋採公言亹亹陳牋何勤私謝所願激昻於事業庶無孤負於品題報不成章言不盡意回江監酒名門諸彦夙忻投分之多計幕一時兹有為寮之幸欲倐辭而不敏愧執訊之相先恭惟某官材本家傳美由世濟英辭倚馬秀子弟芝蘭之階喜色乗龍隱王孫美蓉之褥尚何事麯蘖之託居然營糟粕之餘郎君可是筦庫人聊復爾耳碧香􅀼比主家釀將有望焉茍無平原督郵之嘲㑹博凉州刺史之任某自安飲水敢望啜醨交公瑾如醇醪將從今始為穆生設醴酒幸勿我忘回李監酒景初元辛之號重光天回西顧剛夘之稱單閼日䴡東迎亨在泰通祥因履考恭惟某官淸材蔟達懿識規圓蒼璧絶瑕彌聳旦評之望青旗簇仗行登元㑹之班諒對於莵顧兎之交益介食蛤踞􅀛之壽某尚稽賀牘過辱頌言尚可歸田正有望王牛之送不堪立仗詎肯希櫪馬之喧回新榮州史監酒季儉鳳凰千仞昔聞將下而復飛鯉魚尺書今見肯來之甚惠有勤委贄敢廢報章伏惟某官胄出典刑家傳忠烈振振公姓不肯附黄閣之家挺挺祖風殆欲伏青蒲之節謂立登於膴仕顧小隱於步兵惟是三榮之陋哉詎堪再辱於賢者攺邑不攺井竟困井遷有民此有財不勝財竭所謂蠅頭之入全仰犢鼻之酤郎君可是管庫人聊復爾耳先生未出禁酒國幸疾驅之某尚耳强顔真成厲尾一郡之政守與酒因利利之衆人皆醉我獨醒執事事也回史監酒文舒同官爲寮輙剡公車之牘薦賢報國豈収私室之恩一謙之撝三復以愧恭惟某官美由丗濟材應時須舉瓢而酌天漿更觀逺業明經而拾地芥佇决巍科將猶錐之處囊中何止羅而致幕下某每勤婉畫良覺賢勞推轂有味其言式稽于衆引鼎不程其力姑見此心回新榮州家監酒民献某乏葡萄之博郡既竭吾才累糟粕以築䑓徒得君重顧念步兵隱嗣宗之職何勤天子使家父之來恭惟某官業精于勤學優則仕族庖之刀有餘刃争自致於功名良弓之子必為箕諒夙精於詩禮少時嘗讀醉鄉記郎君可是管庫人惟此三榮之窮仰於一醉之冨㫖且多多且㫖當辨聖賢私勝公公勝私在權子母惟尊不空而客常滿則人皆醉而我獨醒引勝地於一盃趣朝天於三斗某啜醨何有罰酎是憂爾來三月寔無塩不堪寡助破除萬事何過酒切幸疾驅回周監酒孝爕叨恩試郡正懼曠瘝聮事為寮幸逢名勝愧陳箋之不敏辱垂問之相先伏惟某官抱負恢宏典刑膚碩暫屈糟丘之隱小試清醇諒知酒誥之篇益加醲郁佇階騰踏即踐髙華某老矣倦游冒焉逺戍對北海而捉私醸免俗未能交公瑾如飲醇醪同寅是望其為傾徯罔既敷陳回榮州吕監酒逢年守榮黎之徼方幸終更分通義之符洊叨詳試有勤下問益仞髙情恭惟某官學有家傳材髙世濟故國非喬木之謂蓋有箕裘惠風汜崇蘭之光有華階序㑹即登於玉筍式並美於金屏某前者為僚兹焉改戍猶䝉奬借及於芻狗之陳要是飄流念在蓴鱸之熟回監叙州茶帛庫張世永海上八月之仙槎昔幸逢於博望山下十年之老石今再遇於榖城凄其一夢之驚愧此尺箋之貺恭惟某官風標靖重器識端温近世名卿疇若乃翁之清介當家奥學定存是似之典刑紆餘入幕之賔協相摘山之畫春風萱草承燕喜之慈顔秋露蘭芽已蟬聮於宦牒佇觀濟美還入旁招某叨領蟇頤獲迎鷁首見名駒之汗血良慰故情懐野鶴於未仙還悲往事回趙舡埸必孚巨川作楫夙知家學之髙野水横舟謾借時材之重䄂長牋而見畀搔短髮以懐慚恭惟某官籍甚宗英蔚然相種若射有志已穿鵰鶚於西風其釣維何行掣鯨魚於東海顧屈箕裘之學暫司刳剡之工當斧斤間睱之時聊聽數聲之鶴唳收文字芳鮮之績即看萬斛之龍􅋮某巢幕非材濫巾有靦登天而攀蜀道昔逢峽水之倒流航海而遡斗門今覺村船之逆上幸百聞之一見及異事而同寮胡越協心何况不殊於臭味魁台齊色尚期勉繼於芳馨回新添差趙監押懦緩無庸濫分郡寄戎昭且整將倚宗英貽書粲然陳誼厚甚文有勤於四六感益倍於尋常恭惟某官胄出文昭學􅀷武略振振麟定夙髙趾角之仁肅肅兎罝合任腹心之選以斗州之甚褊辱天族之肯來桴鼔不驚藩維自壯某獲叨聮事將幸分憂察閭里之姦邪願無犬吠冠宗室之議論庻欵燕談回龔監嶽良臣懐湘屈之清來隱城池之上聞楚龔之㓗實在邦域之中方圖羾箋已沐􅐹記恭惟某官器資膚敏業履端方清淑炳衡嶽之靈忠信挺巫嶓之秀學歐陽子端是百年能幾見之人師昌黎公頋有四舉乃一得之歎謂髙登於雲路乃勇退於急流洊奉真祠益彰雅操寕與騏􅂹將與雞鶩甘從考澗之槃小不虺蜮大不鯨鯢可見在山之潤紅藥猶堪於傍砌青蒲㑹報於褁輪某拙不瘉人狷弗諧世誨諸生於館下以冗見治試别駕於治中何卑敢憚正擬編蒲之暇欵求拔薤之規居是邦事其大夫願依賢者舉進士吾爲同業能勿誨乎回史監廟􅀛十年出幕濫分和義之麾千室鳴絃將竊依仁之益未皇􅐹記先沐蜚牋恭惟某官行無瑕玼學有源委儒林發藻不難地芥之収簿枳擇棲行踐天衢之直某立朝無補乗障非材火兩㷔之生巾真成妖夢水一盂而窺户更望忠規請謁非遥占謝惟略梅亭先生四六標凖巻之三十七梅亭先生四六標凖卷之三十八學職謝永州鄭學諭一聽履聲巳喜似人之見載披手畢更欽􅀶我之文得非所蒙願竊有復恭惟某官學探聖瀆秀出愚溪竆司農之經諒皆殫洽客廣文之舎大似淹回佇郎摘髭亟其奮翼某不能教胄有􅀒轉丞儻簿書獄訟之餘其交以道則道德性命之理當誦所聞謝張學諭元之吟墻竹之公事自分聾丞聞泮林之好音還成伎癢亟裁四六就謝萬分恭惟某人氣韻淑均風猷膚敏尋西塞桃花之鱖豈其河鯉之逢思東吴蓴莱之鱸行矣溟鯤之化無厭俗情之傲贅即觀郷賦之拔􅀹某聊爾治中奚勞賀上膺何如昔巳無可取之楷模籍也抱能尚可相從於閭里囬唐學録淵題輿非據箝􅁓尾以何心衘䄂見貽羡筆頭之有口一謙厚甚三復悚然恭惟某官清挹畹蘭秀分絆藻蒙開蜀道諒餘挺挺之風勤讀楚詞定出選遥之胄佇帝庭之大對豈郷校之乆淹某教胄無庸􅀒丞有靦露繁天豁有慙􅀯嶽之鳯鳴澗愧林慚但覺北山之鶴怨囬呉學正􅀿龍洗塵圡之􅂁未皇請益披月露之牘良佩鳴謙藏以爲榮報於何有恭惟某官風猷凝逺天韻淑均炳扶輿磅礴之靈富詰屈聱牙之學生九辯九歌之地豈自隔於脩門挾八克之能將能將差強於敵國四六且工於駢儷三千足想於縱横某有幸依仁過勤委贄故將軍之雌伏難言李廣之無􅀟新進士之龍飛惟祝呉公之第一囬卓學諭邁聞凌雲之作方幸友仁拜明月之投更髙陳義不知所報藏去爲榮恭惟某官秀出閩中僑游黔鄙横經重席方依夫子之宫墻問舎求田豈爲王孫之僮客佇摘髭於名第即䇿足於要津某教胄無庸􅀒丞何筭楊脩有智但欽絶妙之受辛韓子非才頗覺長慙於典午囬寕郷魏學賔抗塵縣􅁺眞成拓落之官引領黨庠知有􅂄明之彦未瞻文席先沐尺書恭惟某官漢相雲仍鄭公風烈北多良馬老伏櫪之駿厖南有嘉魚秩賔筵之燕衎正爾廪人之継粟何如天子之執漿佇褁蒲輪即空蕙帳某盍請鄰而􅀕竈頋越爼以代庖禮貌衰則去之友其士之仁者㑹計當而巳矣忠焉能勿誨乎回魏教諭得一旅進接辭未皇欵曲謙撝委贄備仞勤渠所慙枵然之胷有􅀌厚甚之意恭惟某官故家古汴乆客都梁渾渾無涯窮虞夏啇周之奥義挺挺有烈願皐䕫稷契之良臣昨膺氷漕之計偕盍對天堦之親䇿暫留鴞泮行奮鵾溟某教胄非材􅀒丞知愧友其士之仁者蓋有望於名􅀖忠焉能勿誨乎詎敢當於溢美回彭學賔居仁􅀚國之賔顧屈習郷之齒愛人以德何勤博我之文一謙惠然三復感甚恭惟某官夙充嶽貢見謂楚材子佩明經詎肯受安昌之薦籛鏗好古祗欲爲孔子之徒行膺拾芥之科寕乆采芹之客某自慙斈落更愧名浮憂則違之頼不失黔中之上佐士之仁者當或憐澤畔之大夫回朱齋長兹􅂪謙巽又復賁臨退而歌鹿鳴之三何止重車渠之百蟾枝鵬路所有更以贈君燕夏鶯喬此言何爲至我回趙省元易學諭兹承纚履寵臨鳴謙垂賁栁子之業甚淺未見可師李翊之問何恭恐􅀌求益伏惟某官器函趙璧學貫羲圖家人則有嚴君觀復不逺主器莫若長子幹蠱奚先惟精研三聖之書且博䆒九師之傳鴻漸之爲儀可必鶴鳴之好爵何逃某屯蹇餘生乾坤長物相從講朋友之兊不亦恱乎然有非頰舌之咸所能宣者回宋直學學詩侯貢士友德史掌儀霆楊賛講大介宗西漢之文詞未皇請益祖東坡之翰墨猥辱鳴謙所願就有道而正焉敢恨何相見之晩也恭惟某官岷峨山立江漢淵澄晏如揚雄固巳度越於諸子飄然李白詎容流落於六丁無忘澤豹以培鵬㑹即騰蛟而起鳳某再皷愈淡五技巳窮甞聞蜀都蓋亦兆基於上世思樂冸水尚期克廣於德心回衆學職濯太白之氷壷知卧月花之影磨文饒之璞玉願聞水薤之規辱委贄之寵先愧識賢之緩後恭惟某人炳靈世載文獻老成蚤聞髙軒過之吟羅胷有耀詎意古戰埸之讀過眼還迷是冝不見於諸侯猶辱􅀚過於吾黨九萬里風斯下願培鵬路之程三千字日未斜即對龍墀之影某兹􅂪投璧始悟遺珠有司以公不以情且相同於采藻於我無德亦無怨願更草於凌雲進士回李校正息肩属爾未遂見賢振履跫然猥勤委贄退而展玩悚若感慚恭惟某官作賦摩空成文翻水飄然太白空望眼於岷峨籍甚仲元輩脩名於夷惠若爲將仕之諾當淹行秘之書暫客諸侯無謂道旁之苦行賔王國即爲席上之珍某得姓偶同卜隣不敏事其賢者友其仁者足慰逺游爱勿勞乎忠勿誨乎尚希餘論代回曽祕校炳世契故人有子昻然野鶴之標妙語及門副以家雞之帖恍如喚夢殆不勝情恭惟某人自出清門不爲俗斈接茶山先生之􅂀信有委而有源継郴陽從事之賢諒肯堂而肯播有懐父黨見惠客卿共阿戎談自斍後生之可畏薦祢衡表孰知餘力之不任姑記丸苞鳳之祥徐思千里馬之報代回陳宣教植世契紅蓮緑水談舊事以無人翠竹碧梧喜故人之有子投文爲惠陳義甚髙恭惟某官閥閲芳華典刑炳蔚塤箎伯仲皆嶄然之秀金玉氣質疑小者之佳早騰吐鳳之詞夙記鳴蟬之賦雖偶遺於世禄㑹自􅁬於儒科􅀚其紙上之辭此豈池中之物栁宗元之記先友賸有人焉山巨源之念遺孤焉知來者某有懐世契幸及英游思不忘乆要之言旣聞耳矣有可相料理之處願盡心焉代回廖宣義慶成共阿戎談獨未見其父耳作靈光賦果有異於人乎申之雄箋展也厚意恭惟某官清門有奕素斈甚都安在何見晩耶小淹賢業幸哉有子如此足表義方頗聞及􅀲巳戒行李頋念江湖之賜號亦勤煙霧之勒移想象朝雲巳斍鋪張之巧扶持夜燎更勞駢􅓻之工某無以報瓊重於辤璧靈椿一而仙桂五跂予望之胡琴四而鹿鳴三聊相復也回韋省元患在爲師濫綴虞庠之属惠而好我獲窺唐律之工恭惟某人詩解人頥句穿月脇金籝一經之斈信有家傳蒲㠶百尺之風勉爲國許某有勤投璧所乏報瓊郷人之善好之􅀇遂忘其尚白後生焉知來者青正望於出藍代回孫祕校暄薄宦走何邕躐升五雉故人有孫宰忽􅀉􅀟魚恭惟某官學業甚均交情未憖重憐瓠落壯不如人矧復蒲凋老當佚我與其佩水蒼而徒爾不如飲山緑而終焉某自揣頭顱難司喉舌未能免俗復叨曵履之榮豈不懐歸巳動挂冠之興代回辛宣教穣辨謗惠以朋箋申之儷語辨先正之謗勁氣凛然叙通家之情髙懐厚甚恭惟某人象賢濟美燕譽蜚英李師中之讀書不難擢第王文正之有子猶未沾恩是非以乆而明公侯必復其始一生一死詎敢爲翟公之交三沐三熏所望聽韓子之説某􅃡懐契闊倍有䀌傷吾言之聽者誰歟法當小待子歸而求有餘也願益自強代回曽祕校三益共千里之月猶愆半靣之期􅀉五朶之雲仍􅀒隔年之債雖迷於復實感所􅂪恭惟某人咳唾成珠弟兄連璧素所蓄積捲湖海之波瀾作爲文章粲朝廷之翰墨公等安在吾道非耶某日旣薄西星猶拱北邯鄲借枕雖重游廣樂之天神武挂冠行將老菟裘之地如君善頌非我敢知回蹇祕校兹􅂪盛服見賁長箋吾政何及公言耶􅀷慙溢美是􅀖友其士仁者尚頼告忠至如社廪之儲尤頼里仁之唱并此叙謝兼布願言回􅀽進士此君將無是乎愧識賢之不早公等何見晩也辱委贄以甚恭景星􅀒先覩之懐明月重暗投之恨恭惟某人器資凝逺業履端温文章滿家有曄天葩之吐俊乂觀國何難地芥之収始疑泄栁之閉門今感任棠之出户某濫分小壘乆避正堂聞髙論傾枚鄒何嫌末至見刺史即周孔則不敢知回景省元所求乎友未能方􅀷訟愧不見諸侯何義始辱臨存有勤委贄之華寕恨盍簮之晩恭惟某人胷蟠義氣腹溢儒書春登孟子之門固妾婦儀秦之學差入子貢之室定奴僕屈宋之騷其在雲仍諒有風烈况巳入地官之獻佇亟膺天網之収某假守非材識賢不早當户而見龐守旣爼豆予避堂而舎蓋公無金玉爾回尋進士救荒某問隱遯之肥見賢不早捄流離之瘠借助良多方圖草具以盍簮遽辱英詞之衘䄂伏惟某官才髙時輩譽藹月評不見諸侯若小然方踰垣而閉户爲食於路待餓者乃􅀍髪以纓冠思飢諒切於巳飢獨樂孰如於衆樂彼或以鄰國而爲壑此獨耻匹夫之納溝相友助相扶持得人焉耳無衆寡無小大易地則然某假守􅂪成強顔逃責旣見君子巳忻慰趯趯之螽爰及矜人要共念嗷嗷之鴈回􅂫祕校榮祖九州四海知有百年幾見之家五兩半通偶在一翁二季之里世濟其羙吾見其孫恭惟某人規矩髙曽淵源師友黄楼一河水親承宗􅂀之傳青松三萬栽更覺孫枝之茂佇用元祐之學入對蓬萊之宫某爲長於斯得人焉耳袴歌今五詎能及廉叔之暮來樓近古三儻肯爲􅀺侯而晩賦回􅂫祕校烝􅀌雲落照敢言歌樂職之聲名山大川疑尚有英靈之氣在賢者識其大者惟有之是以似之恭惟某人學有家傳文必已岀不作人間煙火之語冝在天上雲霧之䆫遥遥賈誼之有嘉挺挺魏謩之似證子弟何預人事兒郎自有家風力行所知不聞亦式某朅來假守獲識真儒松聲聞十里之風幸同臭味薤本置一盂之水更望箴規回􅂫貢士辰之下第童而挾䇿莫非誦眉山之書老矣懐章乃獲守通德之里未皇下榻先辱踵門恭惟某人學有宫庭詞爲枝葉承老翁青松之植擅㓜婦黄絹之才平時謾説古戰埸豈料還迷於五色歸家但草凌雲賦㑹將放出於一頭某正愧遺賢頋勤委贄貧家見珠貝真成􅀒昡晃之羞使君洗樽罍行欲致荒唐之謝回孫省元和之吟風弄月之歸未皇請益裁霧縫雲之作猥辱擊蒙喜聞足音仍拜手畢恭惟某人學行之上世載其英古稱閉户之先生豈其苖裔近耻呈身之御史殆有典刑乆江湖魏闕之遊識伊洛濂溪之􅂀知其主信其客必窮游夏之渊源加其膏希其光詎止卿雲之黼黻某未皇避舎猥辱踵門一瓣薫南豐之香願􅀚卒業幅巾援東坡之筆嗣得乞言梅亭先生四六標凖卷之三十八梅亭先生四六標凖卷之三十九賀正賀嗣秀王師揆正斗攜龍角又頒羲仲之春雪滿兎園請賦梁王之壽恭惟某官宗藩明德政路崇班慶襲璿源黙應璿璣之運寳分玉帶益調玉燭之和冝從桃葦之辰丕介椿松之祉某愧無善頌可賀履端曵鄒陽之􅅂方規旅進授司馬之簡更佩謙光賀史丞相正代董制置鳯紀更端復對戊寅之曆龍􅄤回次又新甲乙之司時維元勲坐膺純嘏恭惟某官勲髙王室忠簡帝心以道德而位三公應千載明良之運理隂陽而遂萬物成十年生聚之功冝誕受於春祺用永扶於皇極某一違鈞範五見嵗華身在西陲阻效椒觴之祝神馳東閣輙輸竹簡之誠賀鄭參政曽樞宻正代董制置三陽交泰驗正月之始和五福照臨瞻輔星而有耀冝介簡穣之慶用彰弼亮之功恭惟某官德恊春温氣排冬凛參賛陶鈞之化機之柄曽云樞允釐百工沈潜帷幄之謀折衝千里宜對青規之旦亟登黄閣之榮某一自西來五逢朔易呉蜀萬里未由稱壽於椒觴蕭曹同心所願垂光於竹帛賀制置安撫正辛夘太嵗在辛令豫孚於三甲吉日維戊春先撫於五辰相維玉帳之籌對越璇璣之運恭惟某官川流厚化山立陽休仁行而春爲青規而圜萬物剛養其氣轉洪鈞以壽八荒聊賦頋兎追龍蛇之詩更均􅅙叢及魚鳬之福問訊梅邊之味亟催花底之朝某辱芘陳人尚棲故壘千林有喜固忻捲賀燕之簾三徑就荒巳願返屠羊之肆賀黄制置正送赴壑之鱗喜避蛇於劒閣振治兵之甲行歸馬於華陽啓寅車之勞還回午門而愷奏恭惟某官盛心懿識惠氣威風横腰下之黄升作眉間之色推腹中之赤立爲城上之祥嘘師律而􅁰生播民和於麥實紅塵晝靖不妨圍夜觀之棊紫禁春回㑹歸押曉班之仗某又看新曆真是陳人騎火照山紅遥想元功之疊賞雪嶺界天白何時尊酒以重論賀諸司正庚寅知榮州作庚寅孟陬六十齡之復見甲子朔旦四五紀之罕逢其在皇皇之華冝膺簡簡之福恭惟某官德潜天粹政播民和圓萬物以青規之仁厥臨孔惠轉八荒於洪鈞之氣其泰大來盤旣頌於椒花户益蟠於桃實某得州斗絶觸緒氷寒多且㫖㫖且多不敢貢􅈋柴之醸熾而昌昌而熾但知祝椿柏之祺頌傒惟􅀷敷陳罔旣賀曽安撫從龍正三統肇子運開豐㮊之辰萬物出寅律應棣通之㑹維時重德茂擁啿祺恭惟某官得天委和行地載厚望公如嵗便當晝對於延英與物爲春可但曉行於湘水南人不復反矣東山以公歸􅀆某投老黄塵佐州黔鄙願開壽域使無不逹之勾萌尚念荒莊俾預向陽之花木賀監司正日月􅀄􅄤星紀復回於赤奮地天交泰雲墟益播於青陽時惟六轡之華茂輯百嘉之慶恭惟某官德潜剛克道配陽休繡斧淑旂暫􅂆楚郷之農事瑶車玉􅋴還逢湘水之孟陬仁風轉蕙以汎蘭善􅀋拔茅而連茹某二年黔佐萬斛緇塵破崖岸而爲文丞詎復敢喧於櫪馬瞻原隰之有華使尚祈岀送於土牛賀緫領運使正嵗在元辛承以長生之兎日維吉戊臨于正旦之雞載維四牡之有功定促八鸞之入覲恭惟某官陽休山立大德川流福星臨參井之墟民無遣便卿月代房心之次帝有恩言三陽茅拔以茹連百禄竹苞而松茂某尚棲舊䕃又見新年兩鬢霜濃難望東風之解凍一犂雨足願從南畒以歸耕賀緫領正陽春肇始是生萬物之輝王人載馳亶序諸侯之上冝介穣穣之福以稱皇皇之華恭惟某官清徹冰壷和鍾玉律錦衣諭蜀榮弩矢之前驅繡斧控荆慰樵􅂫之後㸑履端於始何福不臻某濫守竹符阻持椒斚木牛坐運送寒寕假於土牛櫪馬交喧召見即登於金馬賀王緫領正鉛陽春生萬物之輝維其時矣王人序諸侯之上何以予之冝對三陽茂綏百福恭惟某官清標氷峙和氣緹温給餽江流聊緫木牛之運揚鑣天路即符櫪馬之喧某濫守竹符良􅂪樾隂太元八十一首又􅀚頒朔之新廣成千二百年請致脩身之祝賀林緫領正祖洽代何尚書作嵗統開端茂蕆始和之吉王人共命肇迎滋至之休恭惟某官望重持荷功髙輓粟三陽謹始時巳進於泰交一札遄歸寵益新於渙渥某又看新曆真是陳人道阻且長缺致椒觴之慶儀圖莫助載馳竿牘之恭賀安緫領正癸仲國典待來嵗之冝元正啓祚王人序諸侯之上壽考維祺况峙魯侯之糗糧均啖安期之􅀲􅀥恭惟某官氣排冬凛德配春融寒送土牛坐斡木牛之運飽喧櫪馬行􅀚銅馬之降梅放栁舒竹苞松茂緫領甚稱上意式副師征朋亡得尚中行共扶泰道某尚􅂪戍雪未解漕氷糴榖湟中所願丘山之􅁀􅁀轉粟天上更宣原隰之皇皇賀李提刑正鐊重光單閼載新一嵗之元五善六條誕布九重之意與時偕極何福不臻恭惟某官德配春融氣排冬凛徧儀兵衛之􅀞㦸岀當霄漢之繡衣皇皇者華遣使臣喚起曲肱之夢行行且止避御史遹􅀚直指之威仁風梅放以栁舒和氣竹苞而松茂某自怜苦李獲掃甘棠我有二天正託故人之芘士更三日尚希舊雨之恩賀周提刑正代董侍郎青帝執規驗三陽之引逹繡衣持斧新六轡之光華諒對端辰益裒純嘏恭惟某官氣鍾温厚德尚和同苞栩逶遲又逢梅於嶺驛甘棠蔽芾還鞠草於圜扉佇有召除亟登要近某罔功分閫有幸爲寮對天地交泰之時當馳善頌體官師相規之義正頼恊恭賀提刑正六螭廻轄目又岀於嵎夷四牡載馳春徧行於湘水端陽旣達純嘏其裒恭惟某官禀氣中和與時消息皇華原隰之上暫借平反清切雨露之邊即司獻納某濫陪結綬莫獲稱觴霆聲發榮共􅒆洲之􅀫莽星言夙駕願揔轡於扶桑賀游提刑正佀九十春光稱霄漢繡衣之立三千夏辟補日月黄道之明時哉泰内之亨天只咸中之慶恭惟某官臯陶明允世叔討論發白獸之樽尚存諌紙拜碧雞之使暫擁節旄對六龍回日之標奏四牡觀風之最脩鱗赴􅐿巳知夕避於長蛇召馹追鋒即作朝來之走馬某一寒戍雪獨冷漕氷偙有一株儻庇無言之苦李用兼庶獄惟依所茇之甘棠賀林提舉正行知代衛參六螭御日曆正羲嵎四牡􅀚風春回楚澤其在皇皇之轡冝膺啿啿之祺恭惟某官政得陽和氣排冬凛周爰咨度使星巳驗於回天胡不均弘卿月無勞於閲嵗與時偕極何福不臻某濫守竹符阻持椒斚籥周一甲極知媿見於葦桃盤薦五辛尚託味同之草木賀趙提舉正乙酉汝談春王三朝元加于嵗使臣五善帝降之祥諒當道長之辰即副公歸之望恭惟某官小宗繼别大雅不羣氣貫斗牛乆鬱長庚之熖星回奎璧即吹太乙之燈行將繫麟趾之風詎止詠兎園之雪某宻依樾䕃又見桃符喧馬盍簮固巳甘立仗之斥􅀞雞貼户詎更思失旦之鳴賀薛知府正乙酉師旦乞漿得酒之占嵗仍在酉轉璣窺衡之驗斗又建寅幸惠仁侯永膺多福恭惟某官氣鍾温厚政布中和有脚陽春享人生五馬之貴細氊廣厦佇河東三鳯之來暫凝􅀞㦸之香即簇青旗之仗某陳人何用新尹焉依舊綴筍班固巳借天街之􅃳兹鋤菜把詎敢忘地主之恩賀趙婺州正善下玉律導和氣巳諧於蔟逹璇源襲慶禄益厚於􅀲綿與國同休裒時多祉恭惟某官飛英宗邸賦政价藩近尺五之天旍旂有爛方千里之地􅃭袴巳温某濫綴槖班阻趨㦸衛三朝受四海之籍肇蕆上儀八荒轉一氣之鈞佇觀歸衮賀永州陳守正疇戊巳日月之樞氣交離坎子丑天地之紀喜溢乾坤况行湘水之春冝有魯人之頌恭惟某官令修王正政播民和奉寛大書盡解東風之凍反離騷賦遂開南嶽之雲攝提旣正於孟陬耋老争祈於萬石某一來黔鄙再見靑陽德不􅀌必有鄰願終垂於樾䕃壽維祺介以福愧莫捧於椒花賀史通判正湜􅀊臨赤奮日月􅀄臨律動青陽地天交泰式對予環之慶亟催鳴玉之班恭惟某官和與春融剛排冬凛大君有命復進司􅁄寺之平天下無􅁈行即報草扉之鞠不但簇青旗之仗又將開白獸之尊某方􅀼隣光忽聞召節舉頭而見白日羡君即近於長安側身而上青天􅀏我方趨於昧谷賀黄制機正慥天地泰交乗少陽而岀震雷霆振旅利長子之帥師外健蓋内順之亨後勁亦中權之助恭惟某官氣排冬凛德嫓春融偕召伯以來旬瓉流秬鬯共阿戎而守􅀊盤頌椒花人知江夏之無􅀟我羡西平之有子某漕居氷下身在雪邊聲聞于天請以勉在隂之鶴稼豐於野庶或寛我輦之牛代回畢安撫再遇正天運璇璣又届履端之始春生玉帳載迎善政之祥恭惟某官豹略沈􅀷虎符静謐麥苖緑漲挽回幾千萬户之和栁葉青歸喚起二十四橋之夢三陽爲泰百禄交升某方欲具箋猥勤委翰椒盤啓節莫殫頌禱之私樺燭朝天願保功名之重代回程監丞凖正重來及芳菲􅀏逢春之白􅀓誰能更拘束羡守􅀊之杜陵三壽作朋百禄是緫恭惟某官以道怡性未老得閑櫪馬盍簮看破塞翁之馬􅀞雞貼户望成渻子之雞冝對新年益裒盛福某過勤尺櫝更枉五詩􅀒三冝休愴歸日之巳晚况四多懼何善頌之敢當代回淮西趙緫領不儳正轉洪鈞之一氣正月始和序王人於諸侯百禄是緫恭惟某官德儀震動道恊泰交峙乃糗粮坐給和門之衆分之寳玉行䟽中詔之温駱馬遄歸蟄蟲始振某巳投西崦又見東風學舊桃符漸恐門墻之逺築新沙路莫觀衮繍之來代回福建趙運使善宣正行夏之時撫辰熈績孟春之月視履考祥冝有休祺以勞華使恭惟某官德儀震動道恊泰交律轉東風添旌旗之和氣杓回北斗聽綸綍之新除某濫綴荷班阻稱椒斚雲鴻江鯉聊紓削櫝之私櫪馬林鴉㑹遂盍簮之願代回大理趙少卿師石正履端於始茂迎鼎至之祥同官爲僚丕對咸中之慶恭惟某官􅀖之司直民以不􅁈凍解勾萌漸鞠圜扉之草日遲棘木益清訟舍之棠冝有天休相時星聚某濫同秋紀又見春朝有椒其馨未遂稱觴之慶如松之茂敢輸削櫝之私代回趙節使正曆起丁丑數合太􅀄之元陬正庚寅慶在髙陽之裔齊旄整暇戩榖駢臻恭惟某官大雅不羣在宗載考詠梁園之雪客至如雲鑿豳國之氷公歸有日振振公子啿啿春祺某自􅀏陳人又逢新嵗酌九霞之醑莫陪璩瑒之賔對列仙之圖願介松喬之壽代回趙開府師垂正玉曆授時日始和於象闕金支胙土天益厚於龍光恭惟某官揆路崇勲宗藩令德棣華韡韡増光伯仲之聮􅀲瓞綿綿襲慶神明之胄冝從榖旦益衍叢祥某濫綴荷班阻稱椒斚夏正人統已孚草木之和周以宗強願介椿松之壽代回周馬帥虎正正月始和光轉崇蘭之畹元戎小隊暖生細栁之營恭惟某官克壯其猶共武之服東風解凍知挾纊於雲屯北斗回杓即出綸於天陛某濫持荷槖莫捧椒觴玉漏聲長行或聮於朝著金印斗大願益懋於勲名代回建康莊都統松正嵗開端月頓回寒谷之温春入和門益壯長江之重恭惟某官戎昭果毅剛克沈潜千里運籌令肅蟠花之甲三軍挾纊暖生細栁之營交泰大來在師中吉某無由叙賀猥辱貽牋草木知其威名諒􅀷自愛葦桃禳夫惡氣願對殊休代回浙東譙提刑令憲正青帝執規届始和之吉繡衣持斧裒滋至之休恭惟某官澄按日畿振揚風采刑者侀也以待猾夏之姦欲並生哉乃見先春之意君侯如此福禄綏之某濫司白雲猶趨紫禁履端於始未諧杜老之盍簮式遄其歸敢後皐陶之拜首代回江東葉提刑簣正青帝執規兆三陽之泰繡衣持斧賔百禄之升恭惟某官德體冲和氣鍾温厚勾萌畢出想茂鞠於圜扉楊栁方華應勞旋於牡轡一和所囿多祉是冝某濫綴朝行阻陪賀列雲鴻江鯉輙傾削櫝之恭櫪馬林鵶尤切盍簮之願代回福建陳提舉鑄正成咢於午肇新玉曆之頒物蔟乎寅宻驗銅儀之轉維時膚使丕對蕃􅁵恭惟某官德禀惠和政先仁恕六條奉漢乆司廉察之權七聚維閩咸服清平之教泰來旣驗節召不遐某進旅莫陪鳴謙先辱送土牛之寒氣願護衣篝喧櫪馬之盍簮即迎詔綍代回福建張提舉聲道正陽春有脚驗正月之始和肆夏升歌粛使臣之拜善單車所戾百禄是遒恭惟某官氣禀冲和詔行寛大黄堂整暇新美䕃於甘棠繡節光華侈新榮於苞栩有開燕喜㑹即鶯遷某縻身於朝莫面以賀杓􅂝龍角􅁡占星駕之旋氣轉鴻鈞㑹鬯天機之運代回常州王宫教遇正日出嵎夷曆紀孟陬之月春回陽羡祥開剌史之天恭惟某官德體震亨道隨泰長將明振貸之議猶巳飢民奉行寛大之書自今有嵗鴻鈞一轉馹召載馳某乆矣凋年見此芳嵗変則通通則乆願體君子之四時仁者生生者圜茂享太平之五福代回史安豐天錫正􅀱一氣於葭莩曰爲攺嵗望八公之草木更與頒春恭惟某官世濟壯猶躬行仁政地控壽陽之阻莫重安豐天銷固隂之凝巳成交泰冝属始和之吉益臻諸福之祥某欽承履端缺陪旅賀上林鴈過先勤繫帛之書下蔡馬肥願懋扞城之績代回魏湖州大中正羲仲授時日巳賔於暘谷甸侯宣化春自滿於苕溪恭惟某官奉寛大之書布中和之政水晶宫冷何資桃梗之禳鸚鵡盃􅀷滿介椿松之祉某巳投西崦又見東風皂蓋晝行莫遂稱觴之賀白蘋日莫㑹􅀚賜璽之來代回王寕國􅀘之正三陽底日肇新正月之和五馬頒春茂介自天之祐恭惟某官中和布政豈弟冝民椒盤巳頌花嵗今始有澄江净如練福莫不増某􅀼承履端阻陪旅賀信宣州主人之賢者益侈新榮忘翰林客卿之輾然敢伸善禱代回常台州建正日在營室肇新太史之迎霞起天台茂介元侯之祉恭惟某官布中和之政行寛大之書維斗􅂝龍表少陽之用亊俾民􅀚象驗正月之始和君子履之天休萃止某退然厄閠見此芳辰道阻且長愧長稱於椒斚年運而往只擬學於桃符代回林嘉興正揆三微於人統旣届始和牧千里之日畿冝裒多祉恭惟某官道符泰長德體震亨賔暘谷之春湖山目得作嘉禾之命朝夕以湏某􅀼承履端莫陪旅賀􅀟魚中有尺素猥勤桃李之投五馬不受二毛請致椿松之祝代回史蘄州正日賔暘谷曆敬授於堯時天惠仁侯和先驅於楚澤恭惟某官榮分半竹言憇甘棠淮水湯湯扇條風而解凍周原膴膴生麥氣以烘晴冝在凝香益裒流祉某濫持荷槖莫捧椒觴遵渚之有歸鴻請馳善頌盍簮而喧櫪馬佇慶遄歸代回趙徽州希逺正王正謹始肇新人統之頌侯度承休始自日畿之近恭惟某官奉行寛大宣布中和凍解東風共詠袴􅃭之煖杓回北斗茂迎綸綍之温某仰辱先施未由􅀱賀有椒有飶願儲滋至之休如竹如松益介方來之慶代回張建昌嵩正正月始和少陽用事諒魯侯之燕喜受周祉之鴻厖恭惟某官宣布中和奉行寛大東風解凍暫勤南囯之藩宣北斗回杓即接西樞之歩武某未由削櫝先辱嘘枯有椒其馨莫遂飛觴之慶如松之茂願陪隆棟之休代回建寕􅀓大諫伯成正王正紀月肇頒象魏之和侯度􅀚時丕對巃光之渥冝裒百禄以應三陽恭惟某官早伏諫蒲岀分符竹陽春布德巳行寛大之書肆夏升歌即展論思之藴仁賢來止福履綏之某落日在簾浮雲出岫憶爛柯之邂逅又見東風及焙茗之後先願歸北闕代回施温州正挾日􅀚治肇頒正月之和受地視侯丕介自天之祐恭惟某官良二千石福十万家將明寛大之書昔無今有參酌隂陽之運小往大來與物爲春􅅮風斯下某属拘朝綴莫旅賀綦櫪馬林烏但切盍簮之願雲鴻江鯉聊傾削櫝之私代回施温州椷正魯觀占雲周正紀月驗陽律鳯鳴之應符凝香燕寢之祥恭惟某官政爲吏師學有家法召棠所舎迎化日之舒長燕􅁰旣回揚仁風於􅀺庶冝裒多祉以對休辰某濫綴朝行阻陪賔謁碧油紅斾願加意於頒春紫詔緑綈猶傾心於賀夏代回程慶元凖正夏正建寅三陽蔟逹東風拆甲萬物光輝時惟哲人天錫純嘏恭惟某官氣鍾温厚德禀中和化洽甘棠接京師而蒙潤威行若木環瀚海以無波當羲仲之授時冝魯侯之燕祉某又􅀚新曆真是陳人有椒其馨莫遂樽罍之捧如松之茂姑伸竿牘之恭代回王廬州柟正天回北斗新太史之授時地重南巢慶元侯之受祉恭惟某官三槐襲組半竹分符虎豹之皮和戎旣寕諸夏鴻鴈之民安宅咸與爲春一氣始和三靈錫羡某無由捧爵還復烹魚分北果之甘芳又勤實篚愧東華之塵土僅有空函代回臨江洪寺簿伋正夏正建寅三陽蔟逹春風拆甲萬物光輝天惠仁侯日綏景福恭惟某官丗濟其美政皷以和擁朱轓二千石之榮令行庭户環清江十萬户之衆家有袴􅃭冝届始和益裒多祉某濫班朝綴莫旅賀綦佩犢帶牛願懋循良之績林鵶櫪馬式諧㑹合之期代回史吉州定之正陽春有脚又新象魏之頒函夏無塵正􅀝螺江之重恭惟某官氣全温厚政恊中和息潢池之干戈自温􅃭袴厚晋陽之保障豈盡繭絲時維泰亨坐膺鼎吉某備貟朝綴莫簉賀綦佩犢帶牛願挽河而洗甲林鵶櫪馬㑹列炬以盍簮代回李封州煥正分符北闕宅牧南交騎竹交迎不問瀧岡之吏驛梅逺寄巳知嶺表之春恭惟某官服襲典刑發舒政術自爲單父技巳敏於割雞及試海沂才益新於展􅂹兹宣寛札出領臨封諒因報政之來即遂立朝之願某凋零嵗月㸃綴星辰逺方􅀟魚不盡相酬之意人生五馬願収自養之功代回孫衢州子直正頒象魏之法仗簇春祺凝燕寢之香服先夏甸時惟竹使天錫茨禧恭惟某官躬綰左符化行右翊朞年而變莫不頌而歌之諸侯之風未有速於此者有開鳯暦㑹出鶯喬某束緼力微盍簮願切建牙開府阻斟勺於椒花上齒習郷猶徑從於棠䕃代回紹興黄尚書由正條風應節和生元帥之幢樺燭朝天光映尚書之履恭惟某官德儀震動道恊泰亨與物爲春乆騰歌於􅃭袴履端於始行促覲於冕旒某擬斈桃符阻􅁛椒斚杓􅂝龍角巳旋北斗之魁身到鳯池即解東風之凍代回趙湖州正嵗行在午布􅀆方新斗指於寅棣通伊始是惟君子之道長實應諸侯之化行恭惟某官材應時湏美全世濟水晶宫冷巳回􅃭袴之温金鑾殿髙即奉冕旒之對某濫竽幕􅁺􅀼䕃甸侯一紙十部之肯臨巳慚倒置四方六客之併至更尉俄空代回鄰州守倅龍杓回次恊豐茂之嘉辰鳯暦紀元新隆平之美號其在温温之德冝膺啿啿之祺恭惟某官剛體震亨道偕泰長召棠蔽芾拓函夏以無塵湘芷芳菲散陽春而有脚佇簇青旗之仗趣歸紫禁之朝某賦分朱愚􅀒丞黔鄙東風解凍不能消華髪之霜南嶽焉依安得聽清談之露代回敖宗簿賀正嵗躔恊洽仰參長烈之常月旅孟陬俯應大來之泰恭惟某官温温秉德啿啿受祺九関巳驗於氣衝三殿何求於風引佇對蒼龍之礎亟開白獸之樽某甫欲修容巳􅂪惠翰代回南康章僉判攀正春回青陸正月之吉始和水泛紅蓮諸福之物畢至恭惟某官器資温厚政術融明畫諾雍容行趣葵丘之戍􅀏談辨治飽尋廬阜之游當此履端宜其鼎盛某未由削櫝猥辱貽緘列炬盍簮又見嵗華之換染雲翦水莫酬頌語之工回史郡僉賀正文舒庚寅孟陬恊建寅之夏正甲子昧爽轉拆甲之春風仁賢履之吉祥萃止伏惟某官德潜剛克和配陽休正其所爲王道之端云爾惠而不費仁言之利博哉官師無廢於相規福禄遹􅀚於來下某幸同聮事良感贈言兩鬢霜濃難望東風之解凍一犂雨足願歸南畒以躬耕回見任官賀正羲和之賔春日復出嵎夷甘石之占嵗星適臨益部有如百禄之緫是在同官之良恭惟某官德叶陽休氣排冬凛􅀏於菟絶維之去迎玉兎以長生對櫪馬盍簮之喧依金鴉而髙翥共餞梅邊之臈亟催花底之朝某自頋陳人又看新暦但希善類聮翩茅茹之征庶遂寒蹤退托桃符之換回寄居郷官正太嵗在辛令旣先於三甲吉日維戊春豫撫於五辰有如郷大夫之賢冝介王正月之慶恭惟某官氣鍾温厚德備中和􅂨紱懐章暫養旦評之望彯纓澤笏行催元㑹之朝三陽茅拔以茹連百禄竹苞而松茂某自慙政拙􅀼席里仁一榻延徐孺子之來又勤衘䄂五皷推謝令尹之去所願歸田回衆官䄂啓賀正庚寅孟陬度適符於皇覧甲子朔旦壽將邁於降人惟言行得雷風之常則吉亨應地天之泰伏惟某官氣排冬凛仁叶春融從容以和體東風之解凍洵美且直契北斗之回杓冝裒啿啿之祺式對温温之德某幸同僚宷過辱頌言老我陳陳但願學桃符之退諸公衮衮幸早從樺燭之朝代回諸縣賀正嵗躔恊洽暦稽長烈之常月旅孟陬卦應大來之泰時維茂宰坐擁啿祺恭惟某官德並陽休氣排冬凛藹然政譽續花縣之風流籍甚除音漏栁條之消息亟飛鳬舄進簉鴛行某自是陳人又逢新暦尺書􅀉鯉愧􅐹記之不先列炬散鴉尚餘光之見及回外縣官賀正葦桃􅀝户正月之吉始和椒栢浮觴賢人之德可乆凡吾同志即日異除恭惟某官氣恊陽休功多隂隲培温植厚夙存有孚惠之心噓枯吹生共勉不忍人之政撫辰凝績視履考祥某辱託爲僚又逢改嵗所使承流宣化也尤謹履端同寅恊恭和􅂨哉當蒙終惠回學職士人賀正杓􅂝龍角魁枕參維氣轉鴻鈞嵗􅄤益部其在藻芹之秀聿􅀚茅茹之連恭惟某人文艶春葩香浮秋桂百歩楊葉不難鵰鶚之穿三月桃花即看鯤鵬之化不􅀒旦評之望即先天老之題某方欲修辭先勤委贄習郷上齒何幸陪庠序之申重席説經尚幾見賢能之獻回學職賀正庚寅孟陬適合靈均之􅀄度甲子朔旦共希絳縣之老人未祓賀牋巳勤慶語伏惟某官陽休山立隂隲天通列炬盍簮不但習郷而上齒鳴佩澤笏行當重席以講經亟看紫禁之鶯花何羡元都之燕麥某又看新暦真是陳人聽櫪馬之喧真難立仗􅀚土牛之送但願歸耕回李秘校叔璋元日之至人日未果修辭新年之勝故年反勤善頌味􅀟鱗之佳甚抽獨繭而報之伏惟某官胄出兩河僑游四蜀謫仙零佩飄然春樹之天長吉錦囊亂若桃花之雨琢句冝供於帖子䄂牋猥及於衰翁某閲嵗又新守藩亡狀同姓也同業也何必勤五朶之雲勿勞乎勿誨乎所願拜一盂之水謝蹇校正賀正伏以丹鈆㸃勘借重良多朱墨縱横遣書未暇有勤謙施見賀履端八千嵗之爲春何敢當噓枯之意斗升水之活涸所祈廣貸粟之仁梅亭先生四六標凖卷之三十九梅亭先生四六標凖巻之}
