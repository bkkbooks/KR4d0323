  - {type: variant, offset: 12, length: 217, content: 宋史選舉志紹興二十二年右諫議大夫林大鼐言薦舉一路貪躁者速化亷靜者陸沉請立為限隔舉狀年勞參酌竝用下其議中書舍人洪遵給事中王希亮等上議曰本朝立薦舉之法必使厯任六考所以遲其歲月而責其赴功必使舉官五員所以多其保任而必其可用今如議臣之請則有力者惟圖見㳄無材者茍冀終更出官十餘年可以坐待京秩不可一也今欲減改官分數以待無舉削者則當被舉之人必有失職淹滯之歎不可二也京官易得馴至郎位任子之恩愈不可減非可以救入流之弊不可三也更祖宗成法不可四也如故便議遂寢, SBCK: ''}
