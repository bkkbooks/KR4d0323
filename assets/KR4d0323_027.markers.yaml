  - {type: variant, offset: 45307, length: 467, content: 茂實宜在本朝荀子人君用之則勢在本朝而宜竒寶横道驥服箱誰其識者陳後山贈二蘇公詩竒寳横道驥服箱誰其識者有歐陽大科異等固其常小却盛之白玉堂張衡思𤣥賦繫騕褭以服箱斜風吹帷雨注面愛莫助之東坡戱子由詩斜風吹帷雨注面先生不愧傍人羞任從飽死笑方朔肯為雨立求秦優今雖方千里而為諸侯猶是先一州而後天下韓文先一州而後天下豈吾君吾相愛之心哉昨者命出輙以名聞天空而日月髙或未裁擇於此奏昌黎送張道士詩天空日月髙下照理不遺或是章奏繁裁擇未及斯水深而波浪闊寜當憔悴於斯人杜陵夢李白詩水深波浪闊無使蛟龍得又冠蓋滿京華斯人獨顦顇細讀綺談選詩髙談一何綺只慙緜力嚴助傳緜力薄材某無能為役左傳於先大夫無能為役詳見前豈不懐歸詩豈不懐歸王事靡盬直如朱絲絃願加意於自愛鮑昭白頭吟直如朱絲絃清如玉壺冰髙帝紀願季自愛報之青玉案媿出吻之無竒張衡四愁詩美人贈我錦繡段何以報之青玉案韓文毎營度欲出口吻聲鳴益悲操筆欲書将下復止竟亦不能竒也餘見前代囘曹岳州格岳州為春秋麋羅二國秦屬長沙漢屬南郡吳以為重鎮晉屬長沙宋曰巴陵梁置巴州又置羅州隋曰岳州又置玉州唐置巴州改岳州宋因之以英宗潛邸陞岳陽軍節度入對, SBCK: 荗聽厲即温肆夏升歌擬}
