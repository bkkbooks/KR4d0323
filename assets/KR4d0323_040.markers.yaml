  - {type: variant, offset: 15964, length: 0, content: '', SBCK: 墜拂􅀛占易惟期七日之來代回趙緫領不儳冬化日迎長卿雲紀}
  - {type: variant, offset: 15965, length: 1, content: 宻, SBCK: 諸侯之上序莫重於王人一陽之來道益亨於君子茂綏福履請致頌言恭惟某官秉德忱恂凝姿信厚峙粮天塹星夙駕以載驅給餽雲屯雷􅂬聲而四起暫司留鑰坐鎮陪京冝對南至之書即侈東歸之詠某材如線短心亦灰寒剌繡吹葭空覺杜陵之老大獻履貢襪但􅀚曹植之文章代}
