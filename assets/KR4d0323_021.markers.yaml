  - {type: variant, offset: 23798, length: 472, content: 見前代衛大參涇囘沈安撫作賔以下四條徽本闕宋史沈作賔字賔王吴興歸安人中刑法科厯江西提刑司檢法官入為大理評事改秩通判紹興府秩滿知台州除大理正改太府丞遷刑部郎淮南轉運判官直文蕐閣因其任擢太府少卿總領淮東軍馬錢糧繼升為卿直龍圖閣帥浙東知紹興府除兩浙轉運副使權工部侍郎兼戸部侍郎以言者罷歸起知鎮江府除集英殿修撰改知寧國府除寳謨閣待制知潭州除戸部侍郎龍圖閣待制知平江府㝷命參賛督府兼權鎮江府權工部尚書權戸部尚書丁母憂服闋授顯謨閣直學士知建寧府入覲除寶謨閣學士江西安撫除煥章閣學士提舉隆興府玉隆萬壽宫進顯謨閣學士贈金紫光禄大夫煥被宸綸屈臨藩服都督居翼軫之分龍光近映於越壇王勃滕王閣秋曰餞别序星分翼軫地接衡廬义物蕐天寶龍光射牛斗之墟又都督閻公之雅望棨㦸遥臨尚書象台斗之躔符采上聫於奎閣杜詩尚書踐台斗曹子建七啓符采照爛流景揚耀魏文帝車渠椀賦發符采而揚榮魏略鍾繇報太子書賜玦尚方耆老頗識舊物名其符采必得處所傅𤣥乗輿馬賦符采横發楊盈川送東川孫尉詩序東川孫尉文章動俗符采射人隋劉斌詩符采照千里銓衡總九流杜詩符采髙無敵聪明達所為杜牧之詩壇宇寛帖帖符采髙酋酋所欣晚歲及話平, SBCK: 梅亭先}
