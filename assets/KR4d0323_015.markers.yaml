  - {type: variant, offset: 12, length: 1, content: 傅, SBCK: 已窺肯綮擊三千而徙海尚見扶摇謝衆解元貢郡國之英濫修嵗貢詢鄉曲之譽喜恊月評何勤属辭特枉抒謝伏惟某官學窮根柢文識波瀾挿架五千耻爲無用之蠧累棊十二迄承若掇之蜩省元張焱用百篇坦然之書占七人作者之列辰省髙拱元兹提麟筆之􅀌上應鳯苞之九省元句龍道兹䇿彫蟲之工竟登乗鴈之數有司論秀免不公不明之嘲國家急賢望斯謀斯猷之入某過勤委贄何與提衡三魁天下之儒在加意耳五靈王者之瑞尚寓目焉回陳上舎伯鳯相如入室蜀賦自工張叔詣京漢都增重有勤曵履且辱鳴謙恭惟某人江漢載英岷峨擢秀子昻始髙蹈信有雲仍季方難爲兄夙髙月旦比者齊魯之賦粲然虞夏之庠志目中眉屈居曰俊曰造之冠擢角㧞齒粗免不公不明之嘲兹蒙四六之貽良重再三之愧某頃從化闥獲讀阿房吹河東以上天幸窺吐鳯圗天南而擊海更願培鵬回水丘先輩謝解褎考其行藝恐遺天府之賢擇乎中庸偶協月評之望所謂得子之是頼少逭有司之不明敢圗撝謙更加巽謝考其行藝恐遺天府之賢擇乎中庸偶恊月評之望所謂得子之是頼少逭有司之不明敢圗謙撝更加巽謝恭惟某人殖學有裕掞才不貲曲禮三千得恭儉莊敬之教重言十七非􅃈碎排偶之詞兹歌鳴鹿之三遂賦良馬之四強學待問不難得禄以得名正心脩身諒必踐言而踐行某摩挲俗眼邂逅譽髦何勤纚履之臨更垂衘袖之贈洗風塵之袍袴愧少緩於報章對日月之衮衣願更思於長䇿回趙先輩子直謝解登于天府正恐􅀒賢能之書採之月評幸不失鄉曲之譽何勤私謝更費雄文恭惟某人學深百篇氣蓋諸子不但勤簡編之燈火蓋亦冨師友之淵源浩乎沛然乆已喧京師之價論其秀者固應㧞俊造之羣兹歌鹿鳴之三果空鷙鳥之百某濫賔計吏冒主文盟考十七之重言幸逃迷眼勉三千之獨對更望盡心回武岡新舉蕭漢龍詢鄉曲之譽未遂承顔獻賢能之書忻聞舉首有來委質益仞鳴謙恭惟某官巫水之英斗山其秀深灝灝噩噩之學䆒明明穆穆之源吕侯之辟三千既知奥義蕭何之功第一冝稱名家幸益窮上世之遺書庶亟對皇帝之清問某濫叨渉筆何與提衡聞東海生之名喜先鳴於雞口飬北宫黝之勇願拭目於龍頭回新舉王道明采芹論秀夙聞能賦之聲撤􅁄登名果中賢書之選未皇走賀猶辱謝牋恭惟某官家學有源鄉評甚膴擬靈光之作乆􅀒逸材奏混成之篇行占逺器兹歩漢南之獨遂空冀北之羣鵬擊三千更觀變化龍飛九五亟快依乗某不武之資斯文何與一第溷子未足見志士之榮三釡及親願以爲執事者勉回免舉士人謝啓樂正論秀而升諸得時則駕公等何見之晚也博我以文鳴謙尊光擊節降嘆恭惟某官舊穿楊葉新躡桂叢鵬怒而飛九萬里風斯在下龍潜以躍三千字日固未斜惟時懋哉遐不謂矣某已稽掃榻偶失迎門子來見我乎良感贈言之繾綣吾亦欲東耳尚容拭目於騰驤回免解杜省元論定秀士之賢者乆欲納交不見諸侯若小然兹勤委贄文旣工於儷六雅復許之肄三恭惟某官句似少陵學如元凱牧之能賦冝髙擢於唐科子夏直言盍亟登於漢殿公等安在主上喟然從先生者七十人有勤私淑摶扶摇而九萬里㑹即髙騫有如骳骩之文何辱簸揚之巧某聿來和義深願友仁一話一言固已可觀於竒崛三熏三沐尚圗續欵於清揚回試官袖啓某伏以獻賢能之書有嚴春貢登文章之籙來主夏盟既爲國以得人更以文而博我恭惟某官學探宏奥味别澠淄夜凡䟦紅寕慮三條之燭盡寒䆫穿碧豈容五色之眼迷提玉尺以裁雲倒珠胎之貫月捜阿房之賦料亦焦心論石渠之經諒多㧞角春秋十二已歸此日之權衡禮樂三千何惜當年之衣鉢某兹承撤􅁄幸遂識荆思飢􅅙蝕葉之聲悵難㝷於舊夢冩饕蝨濕薪之景尚願聽於新篇及第回王省元冑謝取中觀春秋之林潜心乆矣登文章之籙爲首褎然足愜公言何勤私謝恭惟某官深於蓄德餘以績文束五傳而抱遺經獨明大義外四夷而内中夏洞䆒微言果以海内寡二之才出當天下第一之選義則竊取矣可逭有司之不明來不亦樂乎更幸斯文之未䘮至如榮進之素定何待抗聲而自陳某偶綴蝨官預窺麟筆求珠而徑寸先得自賀其遭跂織而七襄不成未知所報回何釋褐大圭中的璇魁解韋璧省十九年無全牛之刃頓見異材九萬里運化鵬之程實開逺業恭惟某官學有源委行無瑕玼曲禮三千冨春誦夏弦之學圜橋億萬髙月書季攷之功果收傑出之科亟被非常之渥榮進素定無􅀒明天子之殊知要路在前自有鄉先生之近比某濫叨􅀝席例沐投瓊夀知武故厚之敢爲䛕語堅於愈同業也敬誦祝規回郭正奏應王正奏巳之䇿名外省趣對中宸三卯風塵率聚五星於十月六丁雷電迄摶六翮于九霄得賢之稱通國以懌恭惟某人箕裘家學圭璧鄉評讀百篇科斗之文夙研奥義及重闈慈烏之哺遂擢巍科某人夙堅雅操獨抱遺經瀘水七禽轉蓬不嫌於地逺沅江九肋擢桂遂破於天荒諒加強學待問之功式究正主庇民之藴某誤蒙渙號濫主坤文頴人稱之曰門生既聞耳矣仲舒褎然爲舉首尚拭目焉占謝惟􅀷敷宣罔既回嘉定張正奏庚仲奏賦蜀都登名漢殿西望太白固疑有沉􅁳之珍東越玉津乃今得暐曄之秀公言甚惬私謝何厪恭惟某人岷峨之英江漢以濯學皆齊魯箕裘殆張叔之家文麗卿雲皷吹有平子之作嘉魚固出於丙穴頋兎迄變於卯年皷三級以先登及雙親之未老龍墀之對三千字更幸勉之犍爲之磬十六枚自此升矣某幾迷五色幸放一頭吟饕蝨濕薪之詩何幸快風塵之洗轉走馬㸔花之句願亟乗天地之寛回辛正奏守謙張正奏東寅摛藻奏名集英趣對毛頴封於卯地開蟾蜍入月之祥雲夢吞於子虚展駟馬題橋之志恭惟某人玉津毓秀磬水蜚聲辛云周太史之雲仍冝箴王闕魏佐治之風烈盍引帝裾張云遥遥張叔之家學固同於齊魯巖巖孟陽之裔銘逺綴於岷嶓遂掃三峽千人之軍上輔五星十月之聚九萬里風斯下已開鵬海之程三千字日未斜無􅀒龍墀之問某朅來石郭獲讀阿房􅀃古戰場幸免眼迷於日色吟髙軒過尚幾手决於天章回類元唐正奏應龍學者發凡言例多違舊章大夫精心致思褎爲舉首幸公言之惟允何私謝之敢當恭惟某人大江炳靈通泉噴薄能賦如勒夙擅詞章學易於都更深經術䆒遺經於獨抱㑹大義於創通文成數萬指數千首先鳴於雞口臣書第一無第二今徑躡於龍頭惟功名留乆逺之看即温飽非生平之志察牛堪之意既不違俗而取名知頋郎之恩更期蓄力而秉志某初微風鑒濫佐星堂青袍白紵之糊名已多迷於方叔紫磨黄金之定價願無􅀒於長公回郭正奏佺闕郭公之疑昔甞恐春秋之罪我道齊威之事今始論秀造而告王愧余五色之眼迷遲公十年之身到恭惟某人岷峨世載江漢淵回墊林宗之巾夫子歩亦夫子老汾陽之考中書乃不中書信大器之晚成嫌脩門之徑入秋風退鷁坐觀巴火之九鑚春浪化龍始透禹門之三級願培鵬背徑跨鰲頭某濫佐星堂安知風鍳束之髙閣知無用公榖左氏之文造在大庭尚聳聽晁董公孫之䇿回曹正奏䇿名上第趣對中宸司徒論秀而升諸幾迷五色公等何見之晚也亟放一頭幸愜公言何勤私謝恭惟某人振鐸昭穆子建波瀾列仙甚癯聞素甘於蓼藿良工獨苦善致飬於􅁄薪兹遂一鳴以驚人式副三遷之教子曹交假館所謂求之有餘師仲舒造庭佇見褎然爲舉首某朅來五壘得讀阿房青衫當綵衣至羡封人之有母丹墀攄素藴更觀讜論之告君回曹正奏二年滿戍鷁回首以東歸再命作州蟇朶頥而西頋有勤賀語祗發愧情恭惟某人春藻吐葩秋竿秉節一第溷子聊償戀闕之丹心三釡及親足慰在堂之白髪猥承妙製見遺陳人某藏去爲榮已知所賀踟蹰五馬良慙出谷以迁喬縹緲􅀌鴻但願送江而入海回王正奏正寅一第直溷子耳安用謝爲幾日來見我乎更勤言贈爲之三復佩此一謙恭惟某人世載其英學優則仕紫電將軍之庫尚有典刑紅帶宣義之家豈其苖裔奏河東之賦空兾北之羣某偶佐文衡獲觀筆陣於我無怨亦無德但吟坡老之詩有司以公不以情愧乏昌黎之序回張正奏申之䇿名外省趣對中宸知我者春秋罪我者春秋幸已酬俯拾之芥先進於禮樂後進於禮樂安知非居上之薪恭惟某人家傳一編胷藏三篋遺經獨抱精於措游夏之詞大義創通較若辨威文之事迄膺衆選進以言揚某偶綴文闈獲觀筆陣辨棟樑於七年之後幸免遺材器根柢於萬乗之前更觀㧞萃回特奏名李學正鳴鳯射䇿登名拜恩諾仕公等何見晚也而迷其邦論定然後官之其有所試伏惟某人負材瓌特蓄學奫深太白有文章之光冝早登於唐殿仲元豈華藻之力頋乆滯於蜀都有來桑榆之收不􅀌芹藻之采冨貴必從勤苦得少酬鐵硯之勞功名亦在老大時行對蒲輪之召某未皇走慶猥沐貽箋春草隨袍等是天公之雨露秋竿有節相期嵗晩之氷霜回王特奏相悟􅂋膺恩紀榮簉儒科東隅而收桑榆雖􅀒心期之壯北山之有杻楰足爲眉夀之光恭惟某人波瀾老成魁壘耆艾如尊乃勇合爲叱馭之忠臣薦褒有材冝即運籌於聖主何踞鞍之矍鑠始奮䄂以低昂亮無恨青衫之枯行即膺紅帶之寵某未皇賛慶猥沐貽牋㧞薤而規龐參願聞忠告褁蒲而迎枚乗尚見詔除回特奏侯新恩曾榮偕計該恩登名筮仕半世就舉選良忻叔起之未衰朝廷少舊臣更喜君房之肯出伏惟某人抱材膚碩蓄斈弘深風翮大鵬本有垂雲之翼天閑老驥不争暮日之塗器固大於晩成召亟膺於朝奏魏有隱士實由年德之髙漢迎太公亦籍老成之力某未皇謁賀猥沐貽牋愧無乖崖翁屈留賢者近識峨眉老尚問政焉梅亭先生四六標凖卷十三梅亭先生四六標凖卷之十四生辰代胡侍郎謝朝士賀生日生我劬勞撫六弧而增感俾爾􅂄艾捧連璧以知慚恭惟某官厚德嘘枯高詞發藻五十之年過二應憐坡老之衰三萬之日無多欲擬茶山之老華其斑白飾以青黄人情欲壽欲安知所蒙矣君子善頌善禱何以報之代謝朝士巳下五十之年過二孰記衰顔什伍之星有三猥勤善頌頋方思罔極之德何敢當不􅀋之歌簸弄明珠藏但􅀷於十襲嘘呵凍筆報有愧於七襄謝黄侍郎伯固生日詩絳縣老人之生甲擁翠節以知慙黄絹㓜婦之受辛感碧幢之委重愧踰垣之莫避且返璧之未能恭惟某官帷幄近臣詩書元帥怜生我勞瘁之旦有愴蒿莪歌俾爾􅂄艾之詩使堅松栢勞以春天之尊酒副之秋月之兩章殆念苞栩憇棠之隂􅂚稱飛芻刻楮之役某平頭六十関慮萬千思玉局老之養生安得還郷而􅀐鵠從金華仙而學道或􅂪叱石以爲羊謝魏侍郎了翁生日詩乆生不學蹇蒲栁之先零􅀄度無能困樵蘇之後㸑過辱兩章之秋月見期千載之春風留歸壓於魚舟難捲還於鯨錦恭惟某官拍肩諸老畜眼一人天不㭬民將謀及詩書之帥人能棟道恐冝在條理之科閔六十服戎之夫窘千里餽糧之役我辰安在敢祈牛斗之能神夫子言之或免蟪菌之俱腐某属有國故且無親存方兹疚懷於劬勞只得痛謝於頌禱先生與之言則對參乎奚避席之疑小子何莫學夫詩武也請卒章之受謝諸處監司賀生日我年六一真成薄頽景於西山春餘半分未許託老人於南極茲届劬勞之旦敢當褒借之詞恭惟云提刑六轡澄清十行炳煥云運使斧繡光輝珠璣咳唾賢者告以善揆亡菑亡害之􅀄愛之欲其生有爾熾爾昌之詠所愧泥􅂗之絳甲要非光熖之白庚某有味其言不知所賀君子謂之善頌相期食蛤以踞􅀛使臣不敢與聞但願放牛而歸馬謝都大賀生日詩匪莪伊蔚正􅃡思罔極之天以蘿施松辱許共後凋之嵗然頭白走雪山之戍覺􅁂青􅀒寳蓋之峯幸聮公子之婚姻見假長庚之光熖恭惟某官粃糠團鳯轡䇿翔麟一雄將十萬之雌識神駿於驪黄之外六經佐三尺之法辨澠淄於兎􅄄之中眷此陳人寵其􅀄度正欲歸耕於詎思入對於延英某有味其言不知所報絳縣老人之生甲花六十以旣周黄絹㓜婦之受辛椿八千其安用謝都大賀生日詞皇揆余度巳勤溢羙之言子與人歌更作新凉之賀輙駢四六仰謝再三恭惟某官學廣文多筆精墨妙歌鍾二肆和諧魏絳之聲騋牝三千教習開元之舞寛望秋先零之念賦陽春寡和之章某重拜珍投宛成珠貫贈以緑綺愧莫報於􅀟南冩之烏絲惟謹藏於十襲謝吕提刑壽詩泥􅂗絳老正自疑甲子之年霄漢繡衣猶記揆庚寅之度鼎來好語賁飾孤生恭惟某官高􅁩薄雲長毫裁霧舊游楚地未寒車馬笠之盟今戴蘇天尚念斗牛箕之􅀫􅀟節帡風而幪雨兩章對月以偕星某逺守石􅀛􅀷慚玉燕報德罔極劬勞但感於蓼莪有功見知勞來請歌於枤杜謝提刑蕭艾賤生桑蓬􅀄度但切劬勞之感敢當頌禱之勤恭惟某官盛德嘘枯髙文發藻旣旌厚意又蕆多儀區區私情拳拳戢佩謝吕運使賀生日霄漢繡衣遷轉木牛之運瓊瑶錦叚寵光芻狗之陳揆􅀄度以何榮受徽言而增愧恭惟某官脩名揭日高􅁩薄雲篤車馬笠之盟不挾貴不挾長問斗牛箕之􅀫無以名無以懷七言撮白玉之舟一字重黄金之價某身方受察心巳懷歸使臣必諮於周惠而好我人情莫不欲壽更以贈君謝生日投詩代何月湖彼其之子鵜積愧於在梁我生之辰牛豈神於奮角茲勤善頌徒發愧情恭惟某官藻掞天庭句穿月脇怜絳人之甲子混在泥􅂗記孟陬之庚寅眷焉遲暮特華其老相贈以言某取數旣多餘年無幾欲報罔極之德巳廢蓼莪敢當不􅀋之歌請辭假樂代謝生日投詞皇覽揆余􅀄度漫扈江蘺子欲養親不存但悲風木茲勤妙語徒發愧情恭惟某官脫時丗粧續古樂府温柔重厚有二雅之正言婉麗清新無六朝之俳體惠而好我何以報公某愧乏辰猷空踰亥首聽陽春之寡和爲調彌髙享肆夏之升歌請拜其細普謝見任官賀生日詩詞伏以小人不知紀年恍近平頭之六十君子爲善頌禱仰勤厚意之再三受言藏之有感多矣恭惟某官英詞漱潤盛德噓枯愛之欲其生忘泥􅂗之爲辱賢者告以善任牛斗之不神所慙雌甲之辰難擬長庚之夢某未能返璧又乏報瓊三嘆而音有遺良服朱弦之䟽越千嵗而眉無害還祈黄髮之壽胥謝學職十四人投詩賀生日伏以召南之詩十四固足繫騶虞之風魯侯之嵗萬千何以當冸宫之頌良見維桑與梓之敬然增匪莪伊蔚之思伏惟某人學士岷峨之英江漢以濯他年事業半雲閣之功臣此日詞章倍建安之才子怜香山艶陽之過九信眉山近古之有三勁氣芳詞髙文大冊序所爲作者之意陳􅁩尤髙相接以粲然之文過情是耻某薾然蒲桞感此桑蓬人情莫不欲壽欲安生則烏可巳也君子謂之善頌善禱忠焉能勿誨乎謝潼川提刑謝太博賀生日伏以問甲辰之雄木旣遄諏度之載驅守癸亥之犍爲眞覺棲遲之萬狀猶蒙佳句見貺陳人恭惟某官髙義薄雲英詞組霧牛頭衮衮詎止隨丗界之花象耳耽耽猶記生池塘之草曲怜苦李承藉甘棠皇揆余降庚寅紛吾有此我與君皆丙子欲並生哉某獲守蕭規敢當唐律思其人愛其樹何如對秋月之兩章誦其詩讀其書安得共春天之尊酒謝郷官􅀉居士人賀生日詩伏以匪莪伊蒿增劬勞勞瘁之感維桑與梓辱熾昌昌大之詞何以報木􅀲之三用是光蓬矢之六恭惟某官嘘枯意厚發藻才雄半百過九年􅀏白傳艶陽之巳老分寸落千丈怜韓公牛斗之不神贈汝好辭揆余􅀄度某安知燕喜但􅀏龍鍾一唱三嘆而音有遺難和朱弦之䟽越萬有千嵗而眉無害還祈黄髮之壽胥謝潼川知府趙監丞賀生日詩伏以男子始生有負大人占之之夢我辰安在敢當先生長者之褒有愧徽言莫酬隆眷恭惟某官爲善最樂大雅不羣發更生寳􅁐之書浩如淵海岀長吉錦囊之句迅􅀂風檣有怜桃李之一株重感桑蓬之六矢吹以七言之律重於􅀟璧之貽某夙荷甄収竟成椎鈍老人無一子誰知絳甲之泥􅂗仙官勑六丁長􅀝白庚之光熖謝列郡太守以上賀生日小劫六十之風雨齒邁二齡大川三百之波濤心驚萬里揆余􅀄而增感俾爾壽以何居恭惟某官云云河漢淵海冨卿雲舒向之儲月露風煙陋盧駱王􅀭之作憐絳縣老人之生甲贈黄絹㓜婦之受辛某仕則慕君老當佚我不俟駕固將朝也良感徽言射以弧受乃􅀒之敢忘㓜志謝通判以下賀生日六十二嵗之樂愧無白鶴之新居萬里幾年之歸孰念碧雞之老客皇揆余度何及公言伏惟某官盛德嘘枯英文掞藻念苞栩之使雖叨四牡之還感蓼莪之詩無復三牲之養煖於布帛贈以襜褕某六轡旣均二節以走夙興夜寐亦希無忝於所生日邁月征尚祈不諌之亦入謝王制參等八貟賀生日王制參翊丁制機鎔蒲制機仲乙楊制幹異陳制幹噲宋制幹拱王撫幹三桂王鈐幹澥四方有志愧孤􅀒於桑蓬八公同辰辱褒期於樗櫟固辤不獲厚意何居恭惟某官合志同方集思廣益依紅泛緑培懷黄拖紫之程取白媲青忘看朱成碧之醜揆余􅀄度贈汝好詞某返璧未能報瓊焉有􅀚我生之進退真成維谷之羞俾爾壽而熾昌􅂚副如岡之頌謝丁制置壽詞轉粟青天之上牋詞來謝於青天射蓬白雪之邊度曲敢當於白雪有美朝中之措見貽方外之游恭惟某官遼鶴髙標庖牛餘刃春風楊栁之句冝拍紅牙夜月梧桐之篇何関白髮某旣聞耳矣又寓目焉適有髙峯縁雲之行别圖公堂披霧之謝謝丁制置賀壽詩塵外花村巳辱春風之一曲雪邊蓬矢又勤秋月之兩章拜君貺以何多揆余􅀄而增感恭惟某官詩書元帥翰墨宗工歷井捫參憐長庚之伴月簸箕挹斗􅀏韓子之生辰旣貽一倡之三復畀七言之二拊躬感槩拜賜駢蕃某政爾避喧又蒙委重自爲青城客愧擬住之未能贈我翠織成欲捲還而安敢回賀生日戊子生我勞悴揆􅀄度以增悲俾爾熾昌受徽言而重愧甞巳戒門而辤璧猶蒙擲地以鏗金恭惟某官厚德嘘枯英文發藻憐香山花前之嵗正可閑行吟老坡月下之風不妨同坐特􅂢妙語見寵孤蹤某自􅀏朱愚老爲黔佐問昌􅀺之南斗乗除難挹於酒漿歌靈均之東皇偃蹇謾陳於竽瑟回武官賀生日勞我以生却青雲於垂上愛人以德歌白雪以彌髙感及爾同僚之私增揆余􅀄度之愧恭惟某官共武之服克壯其猷談􅀏詞鋒足當八面緒餘筆陣亦掃千軍有憐桑弧蓬矢之辰見致松荗竹苞之祝某不能返璧又乏報瓊人情欲壽欲安尚徼餘芘君子善頌善禱但耻過情代回曽運使生我劬勞廢蓼莪而興感俾爾􅂄艾攬茹惠以增慚敢圗髙情見畀妙語恭惟某官文得家法句通古人怜牛斗之不神了無善狀因參辰之相比借以餘光摛藻粲然厚甚某不知所賀藏去爲榮八千爲春盡自之五十而慕但激終身之思代回安撫趙尚書師睪賀生日蒲栁旣凋又届始生之旦蓼峩罔極滋􅀷弗洎之思特逹髙情勤渠下問置慚無所懷感有之恭惟某官曵履公餘鳴謙私惠憐絳人之甲子混在泥􅂗記孟陬之庚寅撫其遲暮函牋甚寵䑓餽孔殷某祗佩眷存但􅀷衘戢取公竹馬愧請謝之未能投我木桃復報章之不稱代回衆官賀生日皇揆余以􅀄度内美闕然牛與斗􅀆不神善名安在過勤妙語秪發愧情恭惟某官嬉􅀏文章游戯翰墨摩娑銅狄欲相許以乆長刻畫無塩殊不知其老醜此意厚甚而我謂何某返璧未能報瓊無有此乃相親重道拜而受之何敢當不􅀋歌顔之厚矣代回道士賀生日勞我以生能嬰兒之除滌游方之外􅀏老子之婆娑佳句惠然私情媿甚恭惟某人簸弄明月頡頏飛霞指石鼎於爐中便成聮句用榴皮於壁上豈不中書見􅂌名章有光􅀄度某偶差一念獻􅀏諸公飲馬麾蛟望崦嵫而勿迫踞􅀛食蛤與汗漫以相期代回僧賀生日拖泥帶水􅀂爲還我之未生賞月吟風更愧情人之相訪恭惟某人句中有眼筆下無痕應憐生朝認本來之面目雖脫死籍當自揣於頭顱特贈以言足華其老某似僧有髮在俗得禪庵外松枝覺嵗華之難數庭前栢樹或祖意之少分回張縣尉煥五十學易闕然觀我之生七歩成章厚甚揆余之度顧切劬勞之感敢當頌禱之私恭惟某官簮笏名家弓刀小隱擬姑熟之十詠肯爲東野之酸師廬陵之諸賢尚接江西之􅂀值分鄰燭見貺門弧某德旣多凉官仍獨冷弟子有􅀏于列者雖未見治郷人皆好之何如莫知所報回同官預賀壽詩生我勞瘁隔彌月之實訏俾爾熾昌荷祈年之孔夙感髙情之見厚豈善頌之敢當恭惟某官義篤官聮禮隆僚好怜絳縣老人之辱越在泥􅂗加黄絹㓜婦之辭寵其遲暮及差科之未動勞朋友之先施某旣感且慚罔知所報人生不滿百孰非欲壽而欲安天下逹尊三各願彌髙而彌邵回郷官上壽庚寅伏以我生之辰與王􅀲而同日物出於甲柰雌木之非材何勤黄絹㓜婦之辭更爲絳縣老人之祝恭惟某官英文發藻厚德嘘枯五十七之歸遲每怜白􅀓二千石之強直俯念朱卿假以徽言寵其􅀄度某不知所賀藏去爲榮吾黨小子之斐然乏瓊琚之效報是􅀖大夫之賢者希藥石以相生回謝同官投詩五十七之歸遲愧見唐人之句萬有千之無害敢當魯頌之歌何勤黄絹㓜婦之辭更爲蒼顔太守之祝恭惟某官薄雲髙􅁩翻水成文及爾同寮喜參辰之相比揆余􅀄度􅀏牛斗之不神贈以徽言極其善頌某自憐雌甲難問長庚匪莪伊蒿但感劬勞之罔極有枤之杜敢希守衛之勤歸回士人投生日詩生我劬勞曽莫報昊天之德俾爾昌熾詎敢當冸水之詩有勤黄絹之辭但重朱絃之歎伏惟某官文如翻水思􅀂涌泉憐白􅀓五十七之齡巳遲歸計比絳人三分一之數大似疑年贈以徽言寵其􅀄度某不知所賀藏去爲榮愛之欲其生倍有加於布帛施不求其報愧莫辨於瓊琚回三江文將仕誦白􅀓五十七之詩巳遲歸計辱魯侯萬有千之頌俾試壽胥愧非所蒙願􅀼有復恭惟某官瑰辭發藻瓊翰嘘枯贈汝好辭磨厲桑蓬之意揆余􅀄度堅凝松栢之心得非愛之欲其生所謂友以乆其道某自怜單獨倍感劬勞維摩想日邊之朝難陪雄甲謫仙尋夜郎之夢且伴長庚回學職二十四人投詩香山五十七嵗嘆歸計之巳遲凌煙二十四賢忘歌詩之不􅀋揆余􅀄度懷我好音伏惟某官氣應嵗躔才堪郎省比周家八士之數價喜倍三較魯頌四篇之文數幾用六冠以鱣堂之序寵茲鯉饋之辰小人不知紀年自甘雌甲君子善爲頌禱誤擬長庚列磬編鍾舂金撼玉某自慚一喙莫辨七襄孰殺子産吾其與之幸可免輿人之誦守得陽公民又賢也所希篤同業之盟回同官上壽詩詞揆余􅀄度終身惟切於慕親及爾同寮君子頋多於善頌過情可耻佩意亦勤伏惟某官義篤官聮材雄筆陣憐白􅀓五十七之感歸計巳遲比絳人三分一之年輿人何筭旣加膏沃復借品題某自頋衰殘難當奬予加桑弧於蓬矢之六空走四方報綺琴以南金之􅀟僅慿尺牘回衆官賀生日詩癸巳蘧伯六十之年重感劬勞於􅀄度魯侯萬千之頌難當褒拂之徽言無容屣履以迎門正恐文書之衘䄂拜珠璣之終惠列鍾磬以成編恭惟某官直氣抗峨英詞倒峽濯錦江之錦洗空黄絹之􅁝撫琴臺之琴髙掩朱絃之瑟厚同官爲僚之􅁩忘歌詩必􅀋之言使臣弗敢與聞固以王宅憂之故人情莫不欲壽且懷祝矯舉之羞某莫報七襄但藏十襲今日之受非也璧恐暗於投人忠告而善道之石尚期於生我其爲感佩罔旣敷陳回諸㕔属官賀生日五十人生我劬勞永􅀒綵衣七旬之養俾爾􅂄艾敢當錦瑟五十之絃良感同僚之盡心􅂚稱髙文之大冊恭惟某官文濯江漢筆抗岷峨四揲二分洞包犧大􅄛之數三章九㫖合公羊外傳之篇有憐揆􅀄寵貽善頌考華陽之志復見三州之後賢享穆叔之歌敢忘五善之重拜某捲還不敢藏去爲榮虀臼外孫固荷假長庚之光熖桑弧男子巳甘付雌甲於泥􅂗回魏制幹賀生日老瞻南極違入丁出丙之躔詩夢西堂愧换甲生申之句有勤親􅁩見畀英詞恭惟某官挺有祖風卓爲人鑑老者人所敬爲近於親愛之欲其生俾昌而熾對兩章之秋月藹多態之春雲某􅀝玉知慙報瓊何有沈香吟芍藥之調詎敢與聞逺志有當歸之心尚希愛助回黄侍郎伯固賀生日白鶴新居有頽景六十一之嘆碧雞老客無廣厦千萬間之思敢意逹尊特形善頌恭惟某官疇庸參井趣覲房心草蟲阜螽之勞還自天子所木牛流馬之積困哀我人斯有怜花甲之周曲借虀辛之妙某未知淑後况敢揆􅀄錦城早還徒仰羡夏官之典午清溪夜發或思伴秋月之長庚回魏機冝賀生日糟糠之堂偶當􅀄度芙蓉之褥猥辱英詞非所冝蒙願竊有復恭惟某官句穿月脇筆掞天庭借泛霞之光轉而白雪􅄃浣溪之水冩以烏絲所愧瓦磚之床􅂚副珠璣之詠但􅀷十襲莫效七㐮婚姻爲顯孫通魏宅問名啓了翁言念二星分野適並舎於魚鳬兩家提孩許問津於烏鵲仰甘棠之有笏愧苦李之無蹊熟固在於地同合殆由於天作兹者伏承某官小娘子周旋内則夙閑十七之少儀而某大學生位長孫某温習中庸詎逹三千之曲禮况未䇿賛皇之名第乃􅀼附公子之婚姻亦惟陪萬里之游因得合二姓之好卜妻占八丗克協鳯飛之和􅂆郎勤六經寔望雞鳴之戒爲顯孫通魏宅納釆啓言念納釆問名嘉禮寧嫌於重請居敬行簡省事固厭於兩回不敢虚拘敬將厚意必河之魴必河之鯉亦惟釆藻以釆蘋言秣其馬言秣其駒更冀刈蔞而刈楚菲儀不腆别楮是陳請媒書言念㭊薪匪斧􅂚諧二姓之驩釣􅁝伊緡良借一言之重况以葭莩之契獲聮榛􅀥之昏遂孫枝攀附之榮皆媒葉往來之助請期書十月在䇿交月夙契於丙辰五曰爲期吉日又符於庚午冝其孫子宴爾室家敢修一介之尺書拱俟八鸞之百兩代姜寺丞注回史丞相府定親相門岀相方託身槐􅁄之隂丞璧􅀒丞敢妄意松蘿之附􅂪以遣而下賤聘不腆之􅀂人徼福甚榮雀心知愧恭承某官階蘭堪佩足繼史魚之風而某女澗藻可湘粗閑姜鯉之教屈禮絶百僚之重今好合二姓之驩君子不㢮其親巳敬佩魯公之訓公俟必復其始願益綿魏國之封梅亭先生四六標凖卷之十四梅亭先生四六標凖卷之十五師􅀓}
